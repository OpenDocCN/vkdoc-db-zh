  | 作业活动 | 描述 |

  | --- | --- |

  | 作业执行 | EM12c 中的单次作业执行——通常归因于一个目标，但根据任务不同，可以有多个目标或根本没有目标。 |

  | 作业运行 | 特定作业所有执行的汇总 |

  ```


  在搜索作业执行和作业运行时，您可以在作业名称搜索选项中使用通配符 (`%`)，如图 11-8 所示。此通配符可用于任何需要您输入值（而不是提供下拉选择）的字段。


  ![9781430249382_Fig11-08.jpg](img/9781430249382_Fig11-08.jpg)


  图 11-8. 使用通配符选项的作业活动搜索


  前面的示例中的作业搜索查找了名称中包含字母 `EXTR` 的任何作业。搜索中未请求区分作业类型（已计划、成功、有问题等），因此返回了所有符合搜索条件的作业。


  EM 作业支持表 11-2 中列出的作业操作。


  表 11-2. 作业活动操作




  '
- "# Enterprise Manager 作业管理\n\n## 作业操作说明\n\n| 操作 | 描述 |\n| --- | --- |\n| 创建 | 创建一个操作系统或\
  \ SQL 脚本作业，以及其他类型的作业。 |\n| 编辑 | 更新现有作业，更改计划时间、间隔、参数等。 |\n| 类似创建 | 从现有作业创建一个新作业，可以选择编辑现有参数、计划等。（备份作业和某些其他维护作业可能不允许使用“类似创建”选项。）\
  \ |\n| 删除 | 从 EM 作业活动视图中移除单个计划/失败的作业，或移除该作业的所有实例。（任何库副本将被保留。） |\n| 挂起 | 将作业“挂起”直到恢复，使现有计划得以继续。\
  \ |\n| 恢复 | 恢复已挂起的作业计划。作业必须单独恢复。 |\n| 失败时重试 | 如果作业属于允许的作业类型列表，则重试该作业。 |\n\n## 作业库\n\
  \nEnterprise Manager 作业库允许提交作业到 EM 作业调度程序的存储库。此存储库包含管理员在备份和 EM 控制台处理之外创建的所有作业。该库仅保留已保存到其中的内容，并且必须与活动作业的更改保持同步。如果能有一个导出程序将当前作业的快照保存到库中，那将是非常有益的，但不幸的是目前并不存在。因此，务必将所有更改过的作业（包括简单的执行时间更改）从“作业活动”页面保存到库中。如果因任何原因必须参考库来重新创建作业，这将确保作业正确地重新提交到调度程序。\n\
  \n对于早期 10g 和 11g EM 作业的用户，没有将作业迁移到新 EM12c 环境的过程。此功能在新版 EM12c 中同样缺失，但 Oracle 计划在即将发布的版本中包含一个。此功能应具有多重好处，不仅适用于迁移，也作为升级的一部分、备份/恢复的次选方案以及复制的一部分。\n\
  \n作业库界面（如图 11-9 所示）与作业活动页面类似，并使用许多相似的选项，包括“编辑”和“访问”。\n\n![9781430249382_Fig11-09.jpg](img/9781430249382_Fig11-09.jpg)\n\
  \n图 11-9. EM12c 控制台的生产作业库示例\n\n## 作业模式\n\n在`SYSMAN`模式中存在超过 70 个`JOB`表，但只有少数几个涉及\
  \ EM 作业系统的主要组件，需要基本了解。您可以对这些表执行查询，以获得对 EM 作业环境更明确的视图。图 11-10 显示了两个主要表以及对象之间的关系。\n\
  \n![9781430249382_Fig11-10.jpg](img/9781430249382_Fig11-10.jpg)\n\n图 11-10. 注意连接`SYSMAN`模式中\
  \ EM 作业系统部分最常见对象的列\n\n以下示例查询将针对作业数据进行报告。经常在后续查询中使用的`MGMT_JOB`表同时包含作业库和`job_activity`信息，因此在查询时必须牢记这一点，如图\
  \ 11-11 所示。如果 EM 作业活动或作业库界面在任何时候无法成功管理作业，而必须使用 Enterprise Manager 命令行界面（`EMCLI`），那么这些数据通常是必不可少的。\n\
  \n```sql\nselect  mj.job_owner, mj.job_name,\ndecode(mj.is_library, 1, 'JOB_LIBRARY',\
  \ 0, 'JOB_ACTIVITY')\nfrom sysman.mgmt_job mj\norder by mj.job_owner, mj_job_name;\n\
  ```\n\n![9781430249382_Fig11-11.jpg](img/9781430249382_Fig11-11.jpg)\n\n图 11-11.\
  \ 活动作业（已提交）和库中保留作业的备份作业信息示例\n\n`EMCLI`也可用于收集有关环境中作业的数据。此实用程序有其自己的一组动词（命令），通过命令行界面调用以查询、执行、配置、部署和管理\
  \ Enterprise Manager，通常提供比 EM 控制台图形界面更强大的功能。\n\n作为此功能的示例，我们可以通过执行以下命令从`EMCLI`查询作业数据：\n\
  \n```text\nemcli get_jobs\n\nREFRESH_MV_ORCL.MV_DEVA_PART.1                    SQLScript\
  \              416E2CE166724F53BCF3ECD798E1759B\nB16A12D945A1466C871B99E1A5226309\n\
  2013-01-21 07:00:00  2013-01-21 07:02:22America/Chicago\nSucceeded  5    SYSJOB\
  \  oracle_database  ORCL5\n\nORCL5_MFC_APP_REF.1                               SQLScript\
  \              F39C0BE9B9F74F758FFDA95392778CDF\nE088B023C23048E79768BC4FEC2888B3\n\
  2013-01-20 06:00:00  2013-01-20 06:00:23\nAmerica/Chicago\nSucceeded  5    SYSJOB\
  \  oracle_database  ORCL5\n```\n\n`JOB_ID`列是此模式中最常用的连接列之一，用于标识相关作业。在上面的结果中，您可以看到返回了两个作业，包括作业名称、作业类型、作业\
  \ ID 和目标 GUID，以及执行信息，包括时间、时区和作业是否成功。\n\n在下一个示例中，将`MGMT_JOB_EXEC_SUMMARY`与`MGMT_JOB`表连接以显示最近的历史记录并验证作业状态。\n\
  \n```sql\nselect mj.job_name, mjes.start_time,  mjes.end_time,\nDECODE(mjes.status,\n\
  \ 1, 'SCHEDULED', 2, 'RUNNING', 3, 'FAILED INIT',\n 4, 'FAILED', 5, 'SUCCEEDED',\
  \ 6, 'SUSPENDED',\n 7, 'AGENT DOWN', 8, 'STOPPED', 9, 'SUSPENDED/LOCK',\n 10, 'SUSPENDED/EVENT',\
  \ 11, 'SUSPENDED/BLACKOUT',\n 12, 'STOP PENDING', 13, 'SUSPEND PENDING', 14, 'INACTIVE',\n\
  \ 15, 'QUEUED', 16, 'FAILED/RETRIED', 17, 'WAITING', 18, 'SKIPPED',status) \"Execution\
  \ STATUS\"\nfrom sysman.mgmt_job mj, sysman.mgmt_job_exec_summary mjes\nwhere mj.job_id=mjes.job_id\n\
  and mj.job_name ='BACKUP_EM12REP_000044'\norder by mjes.start_time desc;\n```\n\n\
  此查询的输出将产生关于数据库存储库的备份作业信息。当前正在运行的作业以及历史作业信息都可以在图 11-12 中看到。\n\n![9781430249382_Fig11-12.jpg](img/9781430249382_Fig11-12.jpg)\n\
  \n图 11-12. 查询作业状态信息\n\n然后我们可以查询满足以下条件的过去 24 小时内的数据：不需要纠正操作（`is_corrective_action\
  \ = 0`），状态为标准作业历史记录（`status IN (5,4,3,18,8)`），并且有重试要求（`retried`不为空）。\n\n```sql\n\
  SELECT mjes.job_id, mj.job_name, mjes.retried\nFROM MGMT_JOB_EXEC_SUMMARY mjes,\
  \ MGMT_JOB mj\nWHERE mjes.job_id = mj.job_id AND mj.is_corrective_action = 0\nAND\
  \ mjes.status IN (5,4,3,18,8)\nAND  mjes.start_time > sysdate-1\nand mjes.retried\
  \ is not null;\n```\n\n![9781430249382_Fig11-13.jpg](img/9781430249382_Fig11-13.jpg)\n\
  \n图 11-13. 经历过至少一次重试的作业的结果\n\n这些基本查询提供了如何连接表以及如何从`SQL*Plus`报告 EM 作业系统信息的示例。这些数据随后可以帮助您进行故障排除，或者您可以使用`EMCLI`来处理问题或在\
  \ EM 控制台之外执行任务。\n\n### 权限与责任\n\n了解谁有权创建和管理作业至关重要。作业应由个别用户拥有，并在此级别设置首选凭据，以确保对这些凭据使用的问责制。\n\
  \n通过创建 EM12c 管理员登录并安全地设置它们，您可以查看谁运行了作业以及谁编辑了作业，确保创建、执行甚至删除作业的用户在 Enterprise Manager\
  \ 访问日志中被有效跟踪。由于用户不是存储库所有者（`SYSMAN`），这消除了在 EM12c 环境中默认授予该用户的广泛角色和权限可能引发的安全问题。\n\n\
  \n\n要查看谁有凭证来运行和管理作业，您可以运行一个简单的查询来显示谁拥有哪些权限（参见图 11-14），以及这些凭证与 `SYSMAN` 模式拥有的凭证相比如何（参见图\
  \ 11-15）。图 11-16 提供了一个示意图以供参考。\n\n![9781430249382_Fig11-14.jpg](img/9781430249382_Fig11-14.jpg)\n\
  \n图 11-14. 查询 EM `SYSMAN` 模式后显示的拥有目标凭证的用户\n\n![9781430249382_Fig11-15.jpg](img/9781430249382_Fig11-15.jpg)\n\
  \n图 11-15. 环境中可能出现的 `SYSMAN` 凭证示例\n\n![9781430249382_Fig11-16.jpg](img/9781430249382_Fig11-16.jpg)\n\
  \n图 11-16. 用于对作业活动进行细粒度查询的凭证、作业命令和作业信息表\n\n```\nSELECT mt.target_name, mtc.user_name,\
  \ mtc.credential_set_name\nFROM MGMT_TARGET_CREDENTIALS mtc, MGMT_TARGETS mt\nWHERE\
  \ mtc.TARGET_GUID=mt.target_GUID;\n```\n\n```\nSELECT mt.target_name, mtc.user_name,\
  \ mtc.credential_set_name\nFROM MGMT_TARGET_CREDENTIALS mtc, MGMT_TARGETS mt\nWHERE\
  \ mtc.TARGET_GUID=mt.target_GUID\nAnd mtc.USER_NAME='SYSMAN';\n```\n\n`MGMT_JOB_CREDENTIALS`\
  \ 表包含所有作业凭证数据，可以单独查询，也可以与 `MGMT_JOB` 和其他表连接以获取更多信息。\n\n## 作业创建\n\n作业创建界面与之前版本的 Enterprise\
  \ Manager 保持相似。然而，由于该界面的复杂性，本节提供一个清晰的作业创建示例。在这个例子中，我们将创建一个简单的安全作业，用于检查谁拥有访问 `DBA_*`\
  \ 视图的权限。\n\n从“作业活动”菜单中，点击 `创建作业` 下拉菜单并选择 `安全规则配置`。然后点击 `执行`（参见图 11-17）。\n\n![9781430249382_Fig11-17.jpg](img/9781430249382_Fig11-17.jpg)\n\
  \n图 11-17. 开始创建作业\n\n这将打开作业创建页面。从 `常规` 选项卡开始，填写名称和描述（如果需要）。然后选择一个目标类型（本例中选择 `数据库实例`）并点击\
  \ `添加` 来选择一个数据库目标。\n\n在“添加目标”窗口中选择目标后，您将返回到主屏幕，此时屏幕显示的信息类似于图 11-18。\n\n![9781430249382_Fig11-18.jpg](img/9781430249382_Fig11-18.jpg)\n\
  \n图 11-18. 为新作业配置的 `常规` 选项卡\n\n您现在已成功填写 `常规` 选项卡，可以继续进行 `参数` 选项卡。\n\n从 `安全规则` 下拉列表中选择\
  \ `访问 DBA_* 视图` 选项。对于要返回的最大行数，输入 `全部`（参见图 11-19）。\n\n![9781430249382_Fig11-19.jpg](img/9781430249382_Fig11-19.jpg)\n\
  \n图 11-19. 检查对 `DBA_*` 视图访问权限的参数设置\n\n接下来，点击 `凭证` 选项卡。本例中，`凭证` 选项选择 `命名的`（参见图 11-20）。我们将填写详细信息以清晰地理解界面，但为了便于管理，最好事先设置好首选凭证。\n\
  \n![9781430249382_Fig11-20.jpg](img/9781430249382_Fig11-20.jpg)\n\n图 11-20. 作业创建的凭证设置\n\
  \n完成凭证设置后，继续进行 `计划` 选项卡。图 11-21 显示了一个计划，设置为每周一上午 9:30 发送报告，并且永不过期或没有结束日期宽限期。\n\n\
  ![9781430249382_Fig11-21.jpg](img/9781430249382_Fig11-21.jpg)\n\n图 11-21. 为新作业设置计划\n\
  \n接下来，您可以选择为每个管理员（所有者除外）设置查看或管理作业的权限，如图 11-22 所示。也可以通过勾选 `删除` 列下的方框（图中未显示，但在最右侧）将管理员从访问列表中移除。\n\
  \n![9781430249382_Fig11-22.jpg](img/9781430249382_Fig11-22.jpg)\n\n图 11-22. 谁有访问权限以及将发送哪些通知\n\
  \n在 `安全规则配置` 部分下方是 `电子邮件通知` 部分。在这里，您可以选择以下通知选项：\n\n*   `已计划`：作业已计划运行。\n*   `正在运行`：作业正在执行。\n\
  *   `已暂停`：作业已被暂停运行。\n*   `已成功`：作业已成功完成。\n*   `问题`：作业在某个步骤或整体上遇到失败或问题。\n*   `需要操作`：需要管理员介入。这包括状态为“已跳过”的作业。\n\
  \n由于作业由用户 `KPOTVIN` 拥有，任何与该用户关联并已在 EM 控制台中配置的电子邮件地址都将根据设置接收通知。该用户也有权查看、管理和监控作业。\n\
  \n### 作业类型\n\nEnterprise Manager 在 12c 版本中扩展了对作业类型的支持。虽然 `操作系统命令`、`SQL 脚本` 和 `RMAN`\
  \ 可能很常见，但现在 EM 作业环境支持数十种作业类型：\n\n\n\n### 12.5.2 作业类型、作业事件和通知\n\nEnterprise Manager\
  \ 中存在多种作业类型，以下是一些常见的和新增的类型：\n\n*   `Application Development Protocol (ADP)`: Oracle\
  \ ADF 使用的作业协议。\n*   `Agent Configuration and Control Operations`: 这是一系列 Enterprise\
  \ Manager 计划作业类型中的前两种。这些作业是在 EM 控制台中作为代理配置或控制请求的一部分创建的。\n*   `ASM Scripts`: 自动存储管理中的许多任务被安排为\
  \ EM 控制台中的作业。这是另一种由 EM 控制台创建的作业，与通过 EM Jobs 界面创建的作业相对。\n*   `Clone Home`: 这是最受期待的新增功能之一，这种新的作业类型允许您轻松地将现有的\
  \ Oracle 主目录克隆到一个新的 Oracle 主目录。\n*   `Database Configuration`: 另一种 EM 控制台作业类型，它可以在不要求您在目标服务器上执行任务的情况下更新数据库配置。\n\
  *   `Deployments`: EM12c 的一项新功能，此作业从 EM 控制台部署到目标，用于监控和配置。\n*   `Discovery of Specific\
  \ Oracle Components`: 作业也会被安排用于通过 EM 控制台在指定的 Oracle 目标上发现 Oracle 组件。这种自动发现通过从服务器动态提取配置和目标信息来节省时间和精力，确保任何目标的正确配置。\n\
  *   `Log Rotation`: 如果日志、跟踪文件和 Enterprise Manager 日志变得太大，可能会难以管理。这种作业类型可以在 EM Jobs\
  \ 界面中创建，用于管理您定期访问和监控的许多数据库日志。\n*   `OPatch Updates`: EM12c 的另一种新作业类型，自动化的 `OPatch`\
  \ 更新确保您在 EM12c 环境中监控的每个目标上都安装了最新版本的 `OPatch` 实用程序。\n*   `OS Commands`: 这种作业类型允许您将现有的\
  \ `OS` 脚本从 `cron` 调度程序或其他 `OS` 级调度程序迁移到 Enterprise Manager 控制台内的单一调度程序中。通过迁移到 EM\
  \ Jobs 界面，在 EM 中断期间无需再通过第二个调度程序进行管理，所有操作都可以通过单一界面管理。\n*   `RMAN`: 所有的 `Recovery\
  \ Manager` 作业，虽然通过 EM 控制台中的 `RMAN` 界面创建，但它们会在 Job Activity 界面中显示为计划作业。这些作业类型无法保存到库中，并且在\
  \ Job Activity 界面中的编辑功能有限。\n*   `Security`: 这种作业类型涉及从 EM 控制台的 `Setup` -> `Security`\
  \ 部分访问的安全界面。这些作业包括针对管理员、角色、凭据和审计数据的作业。\n*   `SQL Scripts`: 涉及 EM 作业的最常见作业类型，这允许您执行\
  \ `SQL`、存储过程以及任何其他将在 `SQL*Plus` 会话中执行的任务。\n*   `Multitask Jobs`: 对于需要多个步骤来完成一个过程的作业，这是\
  \ EM12c 中的一项新功能。过去，您必须为复杂的、多步骤的过程编写脚本。现在，EM12c Jobs 界面使得创建具有多个步骤的作业变得简单，包括那些在每个步骤都有成功逻辑请求的作业。\n\
  \n定位 EM12c Jobs Service 支持的常见和新的作业类型非常简单。以下查询不仅显示了支持的作业类型，还显示了用于 `EMCLI` 执行的作业类型\
  \ ID。\n\n```sql\nselect * from sysman.MGMT_JOB_TYPE_INFO\nwhere job_type_category=0\n\
  and editable=1\nand agent_bound=1\nand job_type not like '%Obsolete%'\nand job_type_default\
  \ is not null;\n```\n\n图 11-23 显示了查询结果，其中包含了来自 `OMS` 存储库数据库中 `SYSMAN` 模式的作业类型以及每个作业类型的任何相关信息。这些数据清楚地显示了支持前端的作业类型\
  \ (`job_type_category=0`)、在作业创建后能够被编辑的作业类型（例如，备份作业在备份和恢复调度程序外部创建后无法被编辑），并且所有作业类型都可用于代理（`agent_bound`\
  \ 与 `OMS` 级别的作业相对）。如图所示，所有过时的作业类型都被跳过，但仍在存储库中列出。\n\n![9781430249382_Fig11-23.jpg](img/9781430249382_Fig11-23.jpg)\n\
  \n**图 11-23** 作业类型信息查询结果，显示了系统可用的一些特定作业类型。\n\n### 12.5.3 有效监控和作业状态\n\n在 EM 作业系统中运行的任何给定作业的状态都极其重要，因为通知和警报都基于此状态。由于一个作业可能包含多个步骤，状态会随着每个步骤的执行而变化，并且可以触发事件来提醒管理员作业运行的不同状态。此作业状态可以通过作业事件进行监控、警报和管理。\n\
  \n作业事件返回报告状态并提醒责任方。您可以手动设置这些事件，因为作业事件默认是未启用的。这样做是为了避免系统因事件监控而过载。\n\n作业事件如下：\n\n\
  *   `All`: 报告任何作业的所有状态。\n*   `Scheduled`: 作业已计划运行。\n*   `Action Required`: 需要管理员介入作业才能运行完成。这包括因计划中断而被跳过的作业。\n\
  *   `Suspended`: 作业已被暂停，因此无法执行其常规计划。\n*   `Succeeded`: 作业已成功执行。\n*   `Problems`:\
  \ 一个或多个作业步骤中发生了故障。\n\n可以通过 Job Events Generation Criteria 页面配置作业事件。您可以通过在 EM 控制台中选择\
  \ `Setup` -> `Incidents` -> `Job Events` 来访问此页面，如图 图 11-24 所示。随后将出现第 1 步页面，如图 图\
  \ 11-25 所示。在这里，您可以决定默认情况下哪些事件会发送警报通知，并且可以按目标或组缩小范围。\n\n![9781430249382_Fig11-24.jpg](img/9781430249382_Fig11-24.jpg)\n\
  \n**图 11-24** 从 EM 控制台的 `Setup` 菜单进入 `Job Events` 功能\n\n![9781430249382_Fig11-25.jpg](img/9781430249382_Fig11-25.jpg)\n\
  \n**图 11-25** 在 EM12c 环境中为所有作业设置警报和通知的默认选项\n\n一些管理员选择接收作业运行成功 (`Succeeded`) 的通知。根据我的专业经验，我建议不要配置作业来执行此通知。管理员在警报上花费的大部分时间并非由于监控不足，而是监控过度。如果\
  \ Enterprise Manager 被配置为包含电子邮件“成功”通知，您会习惯于接收它们，知道它们不需要响应，这可能导致错过关键问题通知。\n\n对于那些希望关闭个别成功消息并简单地每天报告一次这些成功和作业失败的管理员，可以设置一个辅助作业来报告并消除不必要的个别通知。\n\
  \n```sql\nselect mj.job_id, mj.job_name, mjes.start_time, mjes.end_time,\nmjes.status_detail,\
  \ mjes.retried\nfrom sysman.mgmt_job mj, sysman.mgmt_job_exec_summary mjes\nwhere\
  \ mj.job_id=mjes.job_id\nand mjes.start_time >= sysdate-1\nand mj.job_status!=0\n\
  and mj.expired=0;\n\nJOB_ID\n```\n\n\n\n```\n作业名称                              \
  \           开始时间\n-------------------------------------------------------------------------\n\
  结束时间        状态详情        重试次数\n---------     -------------     ----------\n285DCE9F51ED4E6D843974116963EDC3\n\
  DPEXP_ORCL_1230                                     2012 年 12 月 31 日\n2012 年 12\
  \ 月 31 日                 0\n```\n\n上面的输出显示了一个失败、未过期且从未重试过的作业。查询请求的是在过去一天内运行过的、未失败\
  \ (`successful=0`) 且未过期 (`0` 表示按计划处于活动状态) 的任何作业。这条信息可以用来替代报告每个单独的作业。选择权在管理员手中，但了解如何查找作业信息至关重要，特别是当默认选项不符合管理员偏好时。\n\
  \n**权限**\n\n我多次遇到过计划作业之间的冲突，例如，一个任务是通过 `cron` 的 shell 脚本计划的，另一个是在 `DBMS_SCHEDULER`\
  \ 中计划的，而第三个则是在 `EM 作业调度器` 中计划的。`EM12c 作业服务` 提供了一个可以处理多种任务脚本格式和作业类型的作业调度器，并具有单一的作业界面来管理作业。作业管理的安全性是管理员创建步骤的一部分，用于保护能够创建、管理和删除作业的用户。\n\
  \n在 `EM12c` 环境中，有多种方法可以查看谁可以创建和管理作业。由于管理员可能并不总是知道谁在环境中创建作业、创建了多少以及频率如何，因此确保 `EM`\
  \ 作业需求不会损害系统性能至关重要。\n\n以下查询清晰地展示了哪些用户被授予了创建和计划作业的权限，如 图 11-26 所示。\n\n```\nSELECT\
  \ grantee  from SYSMAN.MGMT_PRIV_GRANTS\nWHERE PRIV_NAME='SUPER_USER';\n```\n\n\
  ![9781430249382_Fig11-26.jpg](img/9781430249382_Fig11-26.jpg)\n\n图 11-26。`EM12c`\
  \ 超级用户也可以创建和管理 `EM` 作业。\n\n**EM 作业服务图表与指标**\n\n`EM 作业服务` 界面，如 图 11-27 所示，使您能够轻松评估\
  \ `EM 作业` 环境的健康状况。界面顶部的选项卡可以快速访问 `作业服务` 的高级功能。可以通过选择 `目标` ![箭头](img/arrow.jpg) `所有目标`，然后对\
  \ ``%Service%`` 进行通配符搜索，最后点击 `EM 作业服务` 来访问这些选项卡。\n\n![9781430249382_Fig11-27.jpg](img/9781430249382_Fig11-27.jpg)\n\
  \n图 11-27。`EM 作业服务` 主页，显示了高级统计信息和事件信息。\n\n从该界面，您可以查看有关性能、使用情况和事件的详细信息。\n\n**EM 作业服务图表**\n\
  \n借助 `EM12c EM 作业服务` 中的性能图表，判断在给定时间范围内多少作业算“过多”变得容易得多。可以通过 `图表` 选项卡访问这些图表。\n\n`EM\
  \ 作业服务` 图表显示了有关作业调度器性能、作业步骤积压和吞吐量的信息（参见 图 11-28）。这种数据的图形化视图使您能够快速确定 `EM12c` 环境中是否存在作业性能问题。\n\
  \n![9781430249382_Fig11-28.jpg](img/9781430249382_Fig11-28.jpg)\n\n图 11-28。三个预配置的\
  \ `EM` 作业性能图表。\n\n对于“作业繁重”的环境，您可以在 `EM 作业服务` 的 `监控配置` 选项卡上创建进一步的监控增强功能。然后，您可以查看此图表以了解繁重的资源使用情况，因为数据被有效地分解为三个部分：`作业步骤`、`处理时间`\
  \ 和 `吞吐量 (作业步骤/秒)`。\n\n**性能指标**\n\n性能指标允许您设置专门与某个功能（本例中为 `EM` 作业）相关的指标。默认指标是为标准数据库环境设置的，如果需要，您可以在现有界面中编辑它们，尽管这种情况很少需要。有两个关键指标只需要最少的配置，因为大多数数据库环境都具有独特性：\n\
  \n*   `吞吐量—作业步骤/秒`\n*   `积压—作业步骤`\n\n一旦为环境配置了所需的值，这两个指标将在作业的吞吐量超过每秒设定值，或积压的作业步骤数量超过阈值时发出警报。\n\
  \n**使用情况指标**\n\n列表中预设了一个指标：`作业调度器处理时间 (过去一小时百分比)`。您还可以向环境添加和配置特定的使用情况指标。它们的设置方式与性能指标非常相似，并应基于之前在\
  \ 图 11-28 中展示的性能图表收集的信息进行彻底测试。\n\n可以通过选择 `目标` ![箭头](img/arrow.jpg) `所有目标` ![箭头](img/arrow.jpg)\
  \ `EM 作业服务` ![箭头](img/arrow.jpg) `指标配置` ![箭头](img/arrow.jpg) `使用情况指标` 来访问 `使用情况指标`\
  \ 区域。或者，您也可以通过 `监控配置` 选项卡上的链接访问这些指标（参见 图 11-29）。\n\n![9781430249382_Fig11-29.jpg](img/9781430249382_Fig11-29.jpg)\n\
  \n图 11-29。`使用情况指标` 选项位于 `监控配置` 选项卡的右下角区域。\n\n您可以从 `使用情况指标` 界面添加、编辑或删除指标。在下面的示例中，我们将通过简单地点击\
  \ `添加` 按钮并按照向导操作来添加一个系统使用情况指标。图 11-30 和 图 11-31 展示了向导第一页的不同部分。\n\n在此示例中，我们将添加一个使用情况指标来监控未受监控的\
  \ `NFS` 服务器上的映射错误（参见 图 11-30）。\n\n![9781430249382_Fig11-30.jpg](img/9781430249382_Fig11-30.jpg)\n\
  \n图 11-30。添加使用情况指标以检查目标主机上未受监控的 `NFS` 服务器的映射错误。\n\n![9781430249382_Fig11-31.jpg](img/9781430249382_Fig11-31.jpg)\n\
  \n图 11-31。为无存储使用情况指标的配置选择正确的系统组件设置。\n\n将 `目标类型` 选项设置为 `主机`，将 `指标` 设置为 `未受监控的 NFS\
  \ 服务器映射错误`。然后选择您希望基于其设置指标的主机目标，并选择是允许 `EM12c` 分别监控每个磁盘，还是根据特定磁盘上可用存储总量的平均值进行监控（参见\
  \ 图 11-31）。\n\n接下来，点击 `继续`，为使用情况指标命名并设置警告和严重阈值（参见 图 11-32）。然后点击 `确定` 保存新的使用情况指标。\n\
  \n![9781430249382_Fig11-32.jpg](img/9781430249382_Fig11-32.jpg)\n\n图 11-32。为使用情况指标赋予描述性标题后，设置合理的阈值。\n\
  \n该指标现在可供使用，可以从 `EM` 控制台的 `所有指标` 部分访问。\n\n**将脚本迁移到 EM 作业系统**\n\n将可能当前使用 `cron` 或其他调度器的现有脚本化作业迁移到\
  \ `EM 作业系统` 是一个简单的过程。\n\n必须考虑对现有脚本进行以下更改：\n```\n\n\n# EM12c 作业系统管理\n\n## 作业系统优势\n\
  *   不再需要许多曾经必需的环境变量。EM 作业系统将通过 EM 和目标属性自动获知 `ORACLE_HOME`、目标 `ORACLE_SID` 等信息。\n\
  *   针对多个目标提交作业变得简单，而在此之前，可能需要进行复杂的跨服务器身份验证。\n*   可以向 EM 中的目标组提交维护及其他作业，从而简化数据库管理。如果组被更新，作业也会随之适应组的变更。\n\
  *   作业可归属于多种类型的目标，包括主机、集群和目录。\n\nEM 作业权限非常精细，允许创建者/管理员与其他管理员共享作业。这些权限包括：\n*   完全的编辑、删除或管理作业的权限。\n\
  *   查看作业结果的权限。\n\n## 管理 EM12c 作业\n本章前面的章节清晰地描述了 EM12c 作业系统和 EM 作业服务组件。下一步——由于与前面章节的基础知识相似，深度稍浅——是理解如何正确管理作业。\n\
  \n作业管理通过“作业活动”页面执行，并可从 EM12c 摘要或特定于目标的层级访问。要直接从这些选项访问该页面，请转到“数据库”选项卡并选择 `Jobs` ->\
  \ `Job Activity`。根据任务的不同，有各种可用选项；本节涵盖以下主题：\n*   查看作业结果\n*   编辑作业\n*   停止作业\n*  \
  \ 挂起作业\n*   复制到库\n*   删除作业\n\n### 查看作业结果\n自 EM10g 以来，清晰查看作业结果和访问执行日志信息的能力几乎保持不变。当管理员需要管理并接收有关\
  \ EM 作业问题的通知时，这些数据在今天仍然具有相关性和价值。图 11-33 展示了“作业活动”界面。\n\n![9781430249382_Fig11-33.jpg](img/9781430249382_Fig11-33.jpg)\n\
  \n图 11-33。从“作业活动”界面查看作业\n\n例如，如果我们选择查看 `Backup_APEX_DEV.1` 作业的信息，只需在它未被选中时点击其单选按钮，然后点击其上方的“查看结果”按钮。\n\
  \n然后，作业的任何输出都会显示出来，如图 11-34 所示。\n\n![9781430249382_Fig11-34.jpg](img/9781430249382_Fig11-34.jpg)\n\
  \n图 11-34。EM 作业日志输出\n\n### 从活动视图编辑作业\n计划运行的作业以及已执行的作业都可以进行编辑。（取决于作业类型，例如备份，可能只能进行微小的更改。）之前已执行的作业随后可以作为新作业重新提交。当您更新一个新作业并做出更改时，这些更改也会提交给该作业的任何未来计划间隔。这是一个重要的区别，因为如果作业只需要一次性更改，那么更好的选择可能是对现有作业执行一次“类似创建”并安排单次执行，以确保常规执行时间不受影响。\n\
  \n> **注意** 从“作业活动”视图编辑的任何作业都不会自动保存到库中。任何应保留在库中的永久性更改都应在“作业库”视图中保存。\n\n### 停止正在运行的作业\n\
  点击“停止”按钮将停止该作业及其所有后续运行。作业将不再有未来的调度计划。\n\n### 挂起作业\n点击“挂起”按钮是将作业“搁置”以进行维护（这将导致目标暂时不可用）的正确方法。您可以在稍后时间重新启动该作业。\n\
  \n### 复制到库\n“复制到库”选项将选定的作业复制到库中，以便以后访问、编辑、提交等。备份作业、数据泵作业和其他杂项作业无法保留在库中，如果您尝试保存它们，将会失败。这些作业可以通过\
  \ EM12c 的备份和恢复来保留，但目前，备份和数据泵作业没有库。\n\n### 删除作业\n删除作业时，可以选择删除该作业的特定运行，或者从作业系统中删除所有作业（包括历史记录）。请确保，如果您选择删除所有作业历史记录，不会违反业务所需的任何保留策略。删除后，作业将从调度程序中移除，必须重新提交。因此，如果您删除了所有历史记录且作业信息将来还需要使用，确保作业保留在库中就很重要。\n\
  \n### 管理管理器\nEM12c 第 2 版增加了一个名为“管理管理器”(MTM)的作业系统页面。此页面使您能够执行类似于“作业活动”、“作业库”和“作业健康状况监视器”页面上的任务，但提供了更增强、更完整的作业环境视图。\n\
  \nMTM 显示以下内容：\n*   EM 作业系统的标准健康状况\n*   作业状态\n*   诊断信息\n*   代理管理\n*   跟踪的上传间隔和通知\n\
  \n虽然直到 EM12c 第 2 版才可用，但“健康状况概览”页面现在结合了环境的整体负载和活动以及特定于目标的作业负载。\n\n## 故障排除 EM12c 作业系统\n\
  如果遇到的问题超出了由于作业语法或配置不正确（这些错误会被 EM 控制台界面日志文件捕获）而导致的简单作业失败，您可能需要使用企业管理器诊断工具包，也称为 EMDIAG。\n\
  \n这些数据不仅有价值，而且是通过 My Oracle Support 提交大多数服务请求所必需的。\n\nEMDIAG 基本存储库工具包随 EM12c 一起提供。另外两个工具包可通过\
  \ My Oracle Support 下载获取。EMDIAG 工具包的文档可通过 MOS 说明：*MOS ID#* 421053.1 获取。这三个工具包如下：\n\
  *   `repvfy`：包含在 EM12c 安装中，该工具包直接从 OMS 存储库中提取数据。\n*   `agtvfy`：特定于 Cloud Control\
  \ 的工具包，用于维护和诊断问题。\n*   `omsvfy`：用于诊断和维护 OMS 数据库存储库的特定工具包。\n\n### 执行安装\n执行以下步骤安装\
  \ EMDIAG。\n\n1.  首先，切换到新创建的目录（您将在其中安装 EMDIAG），因此 `cd` 到 EMDIAG 主目录（您选择用于解压文件的新目录）：\n\
  ```\n    cd $EMDIAG_HOME/bin\n    ```\n2.  在`bin`目录中有三个常见文件——可执行文件、支持 Windows 的批处理文件以及支持两者的\
  \ Perl 脚本：\n```\n    -rwxrwxr-- 1 oracle dba   3331 Feb 23  2012 repvfy.bat\n  \
  \  -rwxrwxr-- 1 oracle dba 198800 Aug 31 18:57 repvfy.pl\n    -rwxrwxr-x 1 oracle\
  \ dba   7195 Aug 31 18:57 repvfy\n    ```\n    通过执行以下命令启动安装：\n```\n    ./repvfy\
  \ install -tns em12rep -pwd password\n    ```\n3.  安装开始，最后显示以下内容：\n```\n    PL/SQL\
  \ procedure successfully completed.\n    COMPONENT            INFO\n    --------------------\
  \ --------------------\n    EMDIAG Version       2012.0831\n    Repository Version\
  \   12.1.0.1.0\n    Database Version     11.2.0.3.0\n    Test Version         2012.0926\n\
  \    Repository Type      CENTRAL\n    Verify Tests         381\n    Object Tests\
  \         157\n    Deployment           SMALL\n    8 rows selected.\n    Disconnected\
  \ from Oracle Database 11g Enterprise Edition Release 11.2.0.3.0 - 64 bit Production\
  \ With the Partitioning, OLAP, Data Mining and Real Application Testing options\n\
  \    ```\n4.  检查安装并验证版本：\n```\n    $ ./repvfy version -tns em12rep version\n   \
  \ ```\n    在提示时输入 `SYSMAN` 密码。输出结果如下：\n\n\n\n### 在 EM12c 中使用 EMDIAG\n\n根据提交的参数不同，可以运行多种诊断报告。`EMDIAG`\
  \ 套件是一个完整的诊断工具集，当 `EM12c` 环境中出现问题时，它将协助管理员和 My Oracle Support 进行诊断。\n\n## 作业级诊断\n\
  \n来自 Enterprise Manager 的以下查询将收集运行作业级诊断报告所需的数据。此示例使用一个 `Apex` 的备份作业。\n\n以具有 `SYSMAN`\
  \ 模式选择权限的用户身份从 `SQL*Plus` 执行以下操作：\n\n```sql\nselect mj.job_id, mj.job_name, mjh.execution_id,\
  \ mjh.step_id\nfrom sysman.mgmt_job mj, sysman.mgmt_job_history mjh\nwhere mj.job_id\
  \ = 'BFC78F41009876F3E04014AC08003231'\nand mj.job_id=mjh.job_id\nand mjh.start_time\
  \ > sysdate-1;\n```\n\n图 11-35 显示了输出结果。\n\n![9781430249382_Fig11-35.jpg](img/9781430249382_Fig11-35.jpg)\n\
  \n图 11-35. 前述查询的输出\n\n利用作业名称，我们可以对作业本身执行一些诊断报告收集。由于生成的诊断数据量很大，建议将输出重定向到文件。\n\n```bash\n\
  $ cd $EMDIAG_HOME/bin\n./repvfy dump job -name BACKUP_APEX.1 –pwd w0rldw1d3 -tns\
  \ em12rep > ./rep_apex_job.lst\n```\n\n输出文件随后会显示关于该作业的完整报告，从诊断工具、数据库、测试和存储库的信息开始。图\
  \ 11-36 显示了这些信息。图 11-37 显示了一些作业参数。图 11-38 显示了参数参数。图 11-39 显示了作业源和目标。\n\n![9781430249382_Fig11-36.jpg](img/9781430249382_Fig11-36.jpg)\n\
  \n图 11-36. 关于存储库的版本和 `EMDIAG` 信息\n\n![9781430249382_Fig11-37.jpg](img/9781430249382_Fig11-37.jpg)\n\
  \n图 11-37. 从这里开始，报告深入到作业运行时、时区和其他详细信息\n\n![9781430249382_Fig11-38.jpg](img/9781430249382_Fig11-38.jpg)\n\
  \n图 11-38. `EMDIAG` 作业报告中 `EM12c` 作业步骤的参数参数\n\n![9781430249382_Fig11-39.jpg](img/9781430249382_Fig11-39.jpg)\n\
  \n图 11-39. 关于运行作业的主机的 `GUID` 信息\n\n接下来的部分会告知您谁拥有该作业、谁拥有该作业的权限，以及权限类型。由于此作业仅由 `SYSMAN`\
  \ 用户拥有和运行，因此我们的示例报告中仅显示此用户。\n\n报告的下一部分，如图 11-40 所示，展示了历史上最后十次运行的情况，包括运行时间、重试次数和作业的成功信息。\n\
  \n![9781430249382_Fig11-40.jpg](img/9781430249382_Fig11-40.jpg)\n\n图 11-40. 显示 `EM`\
  \ 作业服务中有关作业运行的历史数据\n\n在此示例中，`EMDIAG` 指示一个作业处于等待状态。图 11-41 中的近期历史记录显示所有作业都已成功。但是，存在一个\
  \ 17 级别的作业，这表示有一次运行由于某些未在执行摘要中显示的未公开问题而不得不等待。\n\n![9781430249382_Fig11-41.jpg](img/9781430249382_Fig11-41.jpg)\n\
  \n图 11-41. 作业运行状态值和历史报告的摘要计数\n\n如果在作业分析过程中出现任何错误，这些错误将保存在报告的最后部分。我们的示例成功编译且未发现问题，因此输出结果如您在图\
  \ 11-42 中所见。\n\n![9781430249382_Fig11-42.jpg](img/9781430249382_Fig11-42.jpg)\n\n\
  图 11-42. 作业分析成功完成，报告末尾未显示错误\n\n如果一个作业包含多个步骤，并且您只想收集该步骤的详细诊断信息，可以通过运行以下命令生成辅助报告：\n\
  \n```bash\n./repvfy dump –tns <oms_sid> step –id <step_id>\n```\n\n## GUID 目标诊断\n\
  \n在下一个场景中，我们将利用 `EM12rep`（`EM12c` 的 `OMS` 存储库）的 `GUID` 来收集 `EM` 环境数据：\n\n```bash\n\
  ./repvfy dump -tns <oms_sid> execution\n-guid EFD92E6468B02696B602A650E085B5A9 -pwd\
  \ <pwd>\n> ./rep_guid.lst\n```\n\n通过运行 `GUID` 级别的命令，您可以获得关于 `EM` 作业服务健康状况的一站式诊断报告。（`GUID`\
  \ 是您的目标 `GUID`，它会转储所有目标上所有作业的信息。）\n\n报告开始部分与作业级报告非常相似，列出了存储库和 `EM` 信息。但是，当您查看目标信息时，会注意到明显的差异，特别是当您的\
  \ `EM` 环境很大时。\n\n如果有任何由 `EM` 作业服务提交的后台作业遇到问题，它们会在自己的部分中被清晰地报告出来，如图 11-43 所示。\n\n\
  ![9781430249382_Fig11-43.jpg](img/9781430249382_Fig11-43.jpg)\n\n图 11-43. 关于作业执行中错误的跟踪数据\n\
  \n我目前唯一的抱怨是，对于 `EM12c` 的 `BP1` 版本，在完整环境级别运行 `EMDIAG` 时，会在作业分析摘要步骤遇到错误。您可以在图 11-44\
  \ 中看到该错误。\n\n![9781430249382_Fig11-44.jpg](img/9781430249382_Fig11-44.jpg)\n\n图\
  \ 11-44. `OMS` 诊断级 `EMDIAG` 的单一错误\n\n因此，如果您仍在使用 `BP1` 版本并且需要提取此级别的诊断数据，我希望您已将问题范围缩小到单个作业或目标作为报告的焦点，从而避免此错误。Release\
  \ 2 版本已修正此问题。\n\n## 全局诊断\n\n在此示例中，我们将运行一个 9 级诊断，该诊断将针对整个 Enterprise Manager 环境运行报告，检查健康状况和其他问题：\n\
  \n```bash\n./repvfy -tns em12rep verify -level 9 –detail\n```\n\n此级别的诊断首先检查您正在使用的\
  \ `EMDIAG` 版本，以及是否有更新的版本可用。\n\n然后，诊断继续对 `EM` 环境执行完整的验证，如图 11-45 所示，然后登录 `SQL*Plus`\
  \ 以对 `EM` 测试、`EM` 系统的安装信息以及来自 `EM` 环境的内部作业和警报执行辅助诊断。\n\n![9781430249382_Fig11-45.jpg](img/9781430249382_Fig11-45.jpg)\n\
  \n图 11-45. 显示来自 `EMDIAG` 的度量标准收集问题的全局级别诊断\n\n\n\n诊断过程会遍历所有已提升和未提升的**目标**，提出更改建议，最后通过验证任何非标准的\
  \ EM 用户来结束报告，如图 11-46 所示。\n\n![9781430249382_Fig11-46.jpg](img/9781430249382_Fig11-46.jpg)\n\
  \n图 11-46. 验证用户非标准 EM 系统账户的建议\n\n## 查询作业数据\n\n我们可以再次查询`SYSMAN`模式中`MGMT_JOB`表的数据，以查看那些非一次性作业（`status<>2`）的备份作业。\n\
  \n```sql\nselect job_name, job_id\nfrom SYSMAN.MGMT_JOB\nwhere job_name like '%BACKUP%'\n\
  and job_status <> 2;\n```\n\n图 11-47 显示了查询的结果。\n\n![9781430249382_Fig11-47.jpg](img/9781430249382_Fig11-47.jpg)\n\
  \n图 11-47. 示例查询结果，显示所有名称包含 BACKUP 的作业\n\n## 使用 EMDIAG 实用程序\n\n使用 EMDIAG 实用程序命令`repvfy`，我们可以通过执行以下命令将作业的所有数据转储到日志文件中：\n\
  \n```bash\n$repvfy dump job –name  BACKUP_APEX.1\n```\n\n或者，我们也可以从 SQL*Plus 进行查询，以从原始查询中收集`STEP_ID`数据：\n\
  \n```sql\nselect mj.job_id, mj.job_name, mjh.execution_id, mjh.step_id\nfrom sysman.mgmt_job\
  \ mj, sysman.mgmt_job_history mjh\nwhere mj.job_id = 'BFC78F41009876F3E04014AC08003231'\n\
  and mj.job_id=mjh.job_id\nand mjh.start_time > sysdate-1;\n```\n\n图 11-48 展示了一个`JOB_ID`、`EXECUTION_ID`和`STEP_ID`的示例，这些\
  \ ID 可在我们执行 EMDIAG 步骤将数据转储到日志文件时使用。\n\n![9781430249382_Fig11-48.jpg](img/9781430249382_Fig11-48.jpg)\n\
  \n图 11-48. JOB_ID、EXECUTION_ID 和 STEP_ID 示例\n\n然后我们可以使用`STEP_ID`，继续将有关该作业的更多数据转储到日志文件中：\n\
  \n```bash\n$repvfy dump step –id 1554907\n```\n\n`STEP_ID`也位于`emoms.trc`文件中最后一次出现的错误中，该文件位于`$OMS_HOME/gc_inst/em/EMGC_OMS1/sysman/log`。如果出于某种原因\
  \ SQL*Plus 查询没有返回信息，这个跟踪文件会指引您找到目标和作业信息。\n\n`EXECUTION_ID`（同样显示在图 11-48 中）随后可用于收集有关执行步骤失败的更多信息，这些信息随后将被转储到另一个日志文件中，该文件位于与执行日志相同的`$EMDIAG_HOME/logs`目录下：\n\
  \n```bash\n$repvfy dump execution –guid C979658693B409C9E043080014ACD94B\n```\n\n\
  EMDIAG 执行的输出相当广泛。如果您不熟悉它，或者您对自己的数据分析感到不确定，您应该毫不犹豫地向 My Oracle Support 提出服务请求，并上传文件供\
  \ Oracle 的技术代表审查。\n\n这些报告的输出日志随后会生成到`<EMDIAG_HOME>/log`目录中，以便审查或上传到 My Oracle Support。我更倾向于将屏幕输出重定向到一个文件以便于查看，如前面的示例所示。这些数据应该能帮助您回答有关`EM12c`环境的问题，而不必总是提出\
  \ SR（服务请求），但如果需要，这些宝贵的诊断数据可以生成以节省时间和精力，从而让您可以执行除回答 My Oracle Support 问题之外的其他任务。\n\
  \n# 维护窗口期与 EM12c 作业影响\n\n在`EM12c`环境中，通常在维护窗口期从任何维护窗口期创建入口点发出维护窗口期，以避免产生非必要的通知和警报。当为单个作业设置作业通知时，与通过作业事件设置维护窗口期相比，`EM\
  \ 作业系统`可能会引起显著的警报。\n\n在设置维护窗口期时，您对作业有两个选择：作业可以在维护窗口期内被跳过，或者作业可以继续运行，仅在目标对作业不可用的时间段内发出警报。\n\
  \n\n# 配置与控制作业和中断期\n\n默认情况下，系统会在中断期继续运行作业，因此您必须**取消选中**复选框才能阻止作业运行。\n\n![9781430249382_Fig11-49.jpg](img/9781430249382_Fig11-49.jpg)\n\
  \n图 11-49. 如果您不希望尝试运行作业，必须取消选中默认复选框，以在中断期间跳过作业执行\n\n做出选择时需要考虑两点：\n\n*   如果您允许作业在中断期继续运行，而目标在作业即将结束时变得不可用（此时目标代理本应向作业服务发送成功执行代码），该作业将继续显示为正在运行，并且该作业的任何后续运行都将被跳过。\n\
  *   如果您在整个中断期内停止作业运行，则作业将在该中断期内被跳过。如果作业设置为在需要操作时通知，则会为每个被跳过的计划作业发送通知。\n\n由于中断期也是作为作业（但在后台运行）发出的，因此您也可以通过查询数据库中的表来查看这些中断期。以下查询示例展示了如何首先通过连接\
  \ `MGMT_JOB`、`MGMT_JOB_EXEC_SUMMARY` 和 `MGMT_BLACKOUTS` 这三个表，获取有关任何已安排中断期的信息。\n\n\
  ```sql\nSELECT mj.job_name, mj.job_id, mje.status, mje.scheduled_time\nFROM    MGMT_JOB\
  \ mj, MGMT_JOB_EXEC_SUMMARY mje, MGMT_BLACKOUTS mb\nWHERE   mb.start_job_id=mj.job_id\n\
  AND     mj.job_id=mje.job_id;\n```\n\n![9781430249382_Fig11-50.jpg](img/9781430249382_Fig11-50.jpg)\n\
  \n图 11-50. 在 EM12c 中查询中断期的输出结果\n\n下一个查询则为我们提供了有关计划中断期的详细信息，包括 EM 作业服务所见的具体步骤。\n\n\
  ```sql\nSELECT  mje.step_id, mje.step_name, mje.step_type, mje.step_status,\n  \
  \      mje.start_time, mje.output_id, mje.error_id\nFROM    MGMT_JOB_EXECUTION mje,\
  \ MGMT_BLACKOUTS mb\nWHERE   mje.job_id=mb.start_job_id\nORDER BY mje.step_id;\n\
  ```\n\n![9781430249382_Fig11-51.jpg](img/9781430249382_Fig11-51.jpg)\n\n图 11-51.\
  \ 在 EM12c 环境中提交的中断期的详细信息\n\n这些查询也很有帮助，因为中断期可能是为未来计划/安排的，在 EM 控制台中不可见。您可以查询数据库以确保代理已向\
  \ OMS 发出所需的通信，从而验证中断期是否存在或报告是否正确。\n\n### 通过 EM 作业控制多个管理代理\n\n全系统范围的维护可能是一项艰巨的任务，但可以使用\
  \ EM 作业界面进行简化。管理代理使您能够通过一个作业向多个目标提交任务。这可用于对多个目标设置中断期、关闭实例、应用补丁以及执行大量其他常见任务。要提交可供多个代理使用的任务，必须正确创建作业。\n\
  \n要访问管理代理设置页面（如 图 11-52 所示），请选择 **设置** → **代理**。\n\n![9781430249382_Fig11-52.jpg](img/9781430249382_Fig11-52.jpg)\n\
  \n图 11-52. EM12c 中的管理代理\n\n选择需要包含在任务中的代理。然后单击要执行的任务。任务包括以下选项：\n\n*   阻止/取消阻止\n*\
  \   启动/关闭/重新启动\n*   重新保护/保护/取消保护\n*   属性\n\n您可以单击其中一个任务按钮，然后“创建作业”页面会要求您提交 EM 作业的标准信息（参见\
  \ 图 11-53）。\n\n![9781430249382_Fig11-53.jpg](img/9781430249382_Fig11-53.jpg)\n\n\
  图 11-53. 有关代理控制作业的常规信息\n\n这是一个非常出色的功能，可协助完成需要代理关闭然后重新启动的重复性维护任务，无需您登录每个控制台单独执行任务。\n\
  \n然后，您可以通过代理界面使用 EM 作业，在一个作业执行中配置多个代理。\n\n\n## 摘要\n\n这包括更改时区、设置代理主机，甚至执行常规安全任务，例如更改仓库密码。\n\
  \nEM 作业系统是增强型 EM12c 产品线中的一项成熟功能，为数据库环境提供了更为集成的调度程序选项。考虑到 EM12c 的监控设计，其支持数据库和服务器环境作业需求的能力使其成为显而易见的选择。对于当今需要承担要求苛刻的数据库专家角色的管理员来说，将所有作业（包括脚本、多步骤作业、高级逻辑检查和服务测试）迁移过来都是值得的。\n\
  \n# 第 12 章 事件管理\n\n作者：Pete Sharman\n\n事件管理的目标是使管理员能够尽可能快速、高效地监控和解决其数据中心中可能正在发生的服务中断。我们的目标不是管理这些服务中断可能引发的众多离散事件，而是管理数量更少但更有意义的问题事件，并在这些问题事件的整个生命周期中根据业务优先级进行管理。\n\
  \n为此，EM12c 提供了一个名为“事件管理器”的集中式事件控制台，使管理员能够跟踪、诊断和解决这些问题事件，同时还提供功能帮助消除重复问题事件的根本原因。事件管理器还包含与\
  \ Oracle 专业知识对接的功能，通过相关的 My Oracle Support 知识库文章和文档，使管理员能够加速诊断和解决问题事件与故障的过程。最后，事件管理器还提供了对问题事件执行生命周期操作的能力，因此您可以将问题事件的所有权分配给特定用户、确认问题事件、设置问题事件的优先级、跟踪问题事件的状态、升级问题事件或将其抑制以便推迟到以后处理。您还可以针对问题事件发起通知，或通过服务台连接器创建服务台工单。\n\
  \n由于事件管理器是 EM12c 中的全新功能，本章将提供以下内容：\n\n*   对新术语的解释，包括事件、问题事件和问题\n*   用户界面介绍，以便您能够设置事件管理器\n\
  *   一些关于如何充分利用此新功能的建议指南\n\n## 事件管理器术语\n\n在深入探讨如何使用事件管理器功能之前，您需要了解一些新术语。让我们从了解事件和问题事件，以及它们之间的区别开始。\n\
  \n### 事件和问题事件\n\n企业管理器仍然是管理和监控 Oracle 数据中心的主要工具，因此它也管理和监控从应用服务器到数据库再到主机及其操作系统的应用程序堆栈。当企业管理器检测到此基础架构中的任何问题时，它会引发事件。*事件*\
  \ 可能是以下任何一种：\n\n*   *指标警报*：这些警报（例如，CPU 利用率或表空间使用警报）表示您设置的关键阈值已被突破。\n*   *作业事件*：这些事件可能是由于您使用作业系统时作业失败引起的。会引发一个事件来发出特定作业失败的信号。\n\
  *   *标准违规*：如果您正在使用合规性标准，并且任何被监控的目标违反了这些标准，则可能引发标准违规事件。\n*   *可用性事件*：如果企业管理器检测到目标宕机，则可能引发可用性事件。\n\
  *   *其他事件*：也可能发生其他类型的事件，例如 SLA 警报或高可用性与连接器外部类。当然，用户可以定义自己的事件类型并引发事件。\n\n所有这些事件都表明\
  \ Oracle 数据中心中发生了特定问题。在所有事件中，您真正希望能够确定哪些是重要的，并且能够从这些重要事件中关联出那些与相同潜在问题相关的事件。归根结底，作为管理员，您想要管理的是数量更少的重要问题事件。您可能有一个性能问题事件，它合并了多个性能事件；另一个与空间相关的问题事件；以及一个基于可用性问题的不同问题事件。因此，事件管理的目标不是管理数量众多的单个事件，而是管理数量更少、更有意义的问题事件。一个问题事件可以是一个重大事件（例如，目标宕机），也可以是一组都与同一问题相关的事件的组合（例如，空间耗尽可能被企业管理器检测为从数据库、主机和存储目标类型引发的独立事件）。\n\
  \n事件是企业管理器检测到并在您的 IT 基础设施中引发的重要事件。每个事件都有一组属性，表明事件的类型、其严重性（致命、严重等）、引发事件的对象或实体（通常是一个目标，但也可能是作业或其他对象）、与事件关联的消息、发生时间戳以及功能类别（如可用性、安全等）。\n\
  \n与这些事件相关联的是事件严重性。第一个是“致命”，这是企业管理器中一个新增的严重性级别，专门与目标可用性事件类型关联，表示目标已宕机。“严重”和“警告”事件的含义与先前版本中的含义相同。接下来，“建议”级别通常与合规性标准违规事件关联。“信息”级别仅用于表示事件已发生，但无需对此采取任何措施。\n\
  \n如前所述，一个问题事件可以包含一个或多个事件。让我们来看一个包含一个事件的问题事件的详细信息。图 12-1 显示了一个包含一个可用性事件的问题事件。\n\n\
  ![9781430249382_Fig12-01.jpg](img/9781430249382_Fig12-01.jpg)\n\n图 12-1。包含一个事件的问题事件\n\
  \n该事件发出信号表明数据库 DB1 已宕机，并包含一个指示事件引发时间的时间戳。由于这是一个目标可用性事件且数据库已宕机，因此严重性标记为“致命”。可以为该事件创建一个问题事件，因此该问题事件仅包含一个事件。为了管理和跟踪问题事件的解决情况，问题事件还具有其他属性，例如所有者（正在处理该问题事件的企业管理器用户）、状态、问题事件严重性（基于事件严重性）、优先级和一个注释字段。\n\
  \n问题事件也可以包含多个事件；这些事件将是相关的，并且指向相同的潜在原因。图 12-2 中的示例显示了一个主机目标上的两个指标警报事件——内存利用率指标警报事件和\
  \ CPU 利用率指标警报事件，因为该主机开始承受高负载。我们有一个警告严重性的内存利用率指标警报事件，不久之后又有一个严重严重性的 CPU 利用率指标警报事件。\n\
  \n![9781430249382_Fig12-02.jpg](img/9781430249382_Fig12-02.jpg)\n\n图 12-2。包含多个事件的问题事件\n\
  \n\n\n可以创建一个包含多个事件的**事件**，以便管理和跟踪整个事件的解决过程。与之前的示例类似，我们还有与该事件关联的其他属性。`Enterprise\
  \ Manager` 会根据事件中包含的所有事件中最严重的事件严重级别，自动分配事件的严重级别。由于最严重的事件级别是“严重”，因此事件严重级别也被设置为“严重”。最后，事件还有一个摘要，即关于事件内容的简短描述。各个事件表明机器负载很高，因此您可以将摘要设置为该内容。或者，您也可以将事件摘要设置为与事件消息相同。\n\
  \n如果您使用某个帮助台连接器来连接帮助台系统，事件还可能生成一个帮助台工单，从而允许帮助台分析师处理该事件。在 `Enterprise Manager` 内，您将能够跟踪工单编号及其特定状态。\n\
  \n### 问题\n\n`问题`是事件的根本原因。在 `Enterprise Manager` 的术语中，问题特指与 `Automatic Diagnostic\
  \ Repository (ADR)` 事件或 Oracle 软件事件相关的问题。每当 `Enterprise Manager` 检测到 `ADR` 事件被引发时，它会自动创建一个问题。一个\
  \ `ADR` 事件可被视为一个关键的 Oracle 软件问题，通常需要联系 Oracle 支持部门、提出服务请求，并可能收到针对该问题的修补程序。\n\n每当引发一个\
  \ `ADR` 事件时，我们会为该 `ADR` 事件在 `Enterprise Manager` 中生成一个事件，同时也会自动生成一个问题对象。所有具有相同问题签名（即相同根本原因）的\
  \ `ADR` 事件将被链接到单个问题对象中（例如，具有相同参数的 `ORA-0600` 错误的 `ADR` 事件将被链接到同一个问题对象）。管理员可以在 `Incident\
  \ Manager` 中管理问题，其方式与管理事件相同，因此您可以为问题分配负责人、跟踪解决进度等。此外，还有指向 `Support Workbench` 功能的上下文链接，允许管理员打包诊断材料、提出服务请求，并在用户界面中查看诊断活动的状态，例如\
  \ SR 编号以及最终的 Bug 编号（如果生成了的话）。\n\nFigure 12-3 说明了事件与问题之间的关系。在此示例中，数据库中发生了两个 `ADR`\
  \ 事件（两个 `ORA-600` 错误）。这两个事件的严重级别均为“严重”。`Enterprise Manager Cloud Control` 自动创建一个包含这些事件的问题对象。在\
  \ `Incident Manager` 用户界面内，您可以链接到 `Support Workbench` 以提出服务请求，然后从 `Incident Manager`\
  \ 跟踪该请求。\n\n![9781430249382_Fig12-03.jpg](img/9781430249382_Fig12-03.jpg)\n\nFigure\
  \ 12-3. 事件与问题\n\n### 事件规则集\n\n`事件规则集`是对通知规则的替代和增强。它们提供了一种自动化与事件、事件或问题相关的操作的方法。事件规则集的一些常见场景或用例包括：基于事件创建事件、发送电子邮件或寻呼等通知、创建帮助台工单，以及自动化事件工作流操作（例如，自动分配事件负责人或在事件打开一段时间后将其升级）。\n\
  \n`Enterprise Manager Cloud Control 12.1` 中有两种类型的事件规则集：企业规则集和私有规则集。`企业规则集`旨在用于实施您在管理事件和事件方面的操作实践。我们前面讨论的所有操作，例如创建事件、发送通知和创建工单，都在企业规则集类型中得到支持。由于这些操作会影响所有类型的事件和问题，因此创建这些规则集的用户需要具有\
  \ `Rule Set` 资源权限。一旦创建了企业类型规则集，它对所有 `Enterprise Manager` 用户都是可见的。当您创建规则集时，可以对该规则集进行进一步的协作开发，因此每个规则集基本上可以有多个作者（即多个\
  \ `Enterprise Manager` 用户）可以编辑该特定规则集。而 `私有规则集` 仅设计用于向您自己发送电子邮件通知。因此，创建私有规则集不需要特殊权限。\n\
  \n规则集被定义为应用于一组通用对象（如目标（包括组）或作业）的一个或多个规则的集合。在组内，您可以为规则集指定一组异构目标（即一组不同的目标类型）进行应用。规则集的理念是使您能够将与同一对象相关的不同规则逻辑地组合到一个可管理的单元中。这是我们在早期版本中针对通知规则多次听到的一项增强请求，当时管理员经常基于目标类型创建多个通知规则，最终这些规则都对同一个组进行操作。将这些规则逻辑地组合成一个单元，是从早期功能自然演进而来的，使得跟踪和管理这些多个规则更加容易。\n\
  \n特定规则集内的规则按特定顺序执行。默认情况下，规则按创建顺序执行，但您可以随时更改此顺序。规则集本身也可以按特定顺序执行。同样，默认情况下这是规则集的创建顺序，但也可以更改。\n\
  \n`Enterprise Manager Cloud Control 12.1` 附带提供的一些开箱即用的规则集，会自动为 Oracle 公司认为有意义的事件创建事件，并自动删除事件。您可以按原样使用这些规则集，但无法编辑它们。不过，您可以使用\
  \ `Create Like` 功能创建自己的版本，如果原始规则集不符合您的要求，可以将其禁用。\n\n规则是规则集的组成部分。`规则`基本上是给 `EM12c`\
  \ 的指令，指示在发生事件、事件或问题时如何自动执行操作。规则不会追溯操作，因此规则仅对在其创建之后发生的事件、事件或问题生效。\n\n规则由两部分组成：条件和操作。`条件`指定规则所应用的事件、事件或问题。`操作`告诉\
  \ `EM12c` 您希望它对这些指定的事件、事件或问题执行哪些操作。每个操作又可以有一些附加条件。让我们看几个示例来了解其工作原理：\n\n\n# Incident\
  \ Manager 用户界面\n\n现在您已经了解了事件管理的基本术语和概念，让我们花点时间介绍 Incident Manager 用户界面。该界面包含两部分：\n\
  \n*   事件规则设置界面，用于创建自己的事件规则，以自动化响应事件和告警\n*   Incident Manager 控制台，用于搜索、查看和管理未解决的事件、告警和问题\n\
  \n让我们首先了解如何创建您自己的事件规则。\n\n### 创建事件规则\n\n要创建事件规则，您需要点击任何屏幕右上角的 `Setup` 菜单，然后选择 `Incidents`\
  \ -> `Incident Rules`，如 图 12-5 所示。\n\n![9781430249382_Fig12-05.jpg](img/9781430249382_Fig12-05.jpg)\n\
  \n图 12-5. 访问 Incident Rules - All Enterprise Rules 页面\n\n这将带您进入 `Incident Rules\
  \ - All Enterprise Rules` 页面，在此您可以查看、编辑或删除现有规则集，或创建您自己的规则集。在此示例中，您将定义一个规则集中的规则，当\
  \ `orcl` 数据库的 `USERS` 表空间即将用尽空间时，创建一个事件并发送电子邮件给您。为使此规则执行，您需要将 `USERS` 表空间的默认设置更改为当空间用尽时不自动扩展，并将表空间的关键阈值触发点更改为\
  \ 90% 满。这些操作在规则集创建过程之外完成（以下截图中省略了该部分）。点击 `Create Rule Set` 按钮，如 图 12-6 所示，以开始创建新规则集的过程。\n\
  \n![9781430249382_Fig12-06.jpg](img/9781430249382_Fig12-06.jpg)\n\n图 12-6. 创建规则集的第一步\n\
  \n`Create Rule Set` 页面的重要部分在底部，您在此指定规则适用的目标以及构成规则集的规则（参见 图 12-7）。填写规则集名称（必填字段）并提供规则集的描述。规则集类型默认为\
  \ `Enterprise`。（`Private` 用于当您希望获得非标准业务实践的通知时；它唯一能执行的操作是发送电子邮件。）接下来点击 `Add` 按钮，如\
  \ 图 12-7 所示，以添加此规则集将应用到的组（虽然也可以添加特定目标，但当规则集同时应用于多个目标时，才能充分发挥此工具的威力）。\n\n![9781430249382_Fig12-07.jpg](img/9781430249382_Fig12-07.jpg)\n\
  \n图 12-7. 向规则集添加目标\n\n会出现 `Search and Select: Targets` 弹出窗口（前提是你已在浏览器中禁用了弹出窗口拦截器；如果未禁用，请为该站点允许弹出窗口并重试操作）。从这里，您可以为此规则集选择不同的目标。在\
  \ 图 12-8 所示的示例中，您选择了 `HQ GROUP` 组，您知道它包含 `orcl` 数据库。\n\n![9781430249382_Fig12-08.jpg](img/9781430249382_Fig12-08.jpg)\n\
  \n图 12-8. Search and Select: Targets 屏幕\n\n一旦选择了目标组，您需要向规则集添加相关规则。要开始此操作，请点击 `Rules`\
  \ 选项卡。然后点击 `Create` 按钮，如 图 12-9 所示。\n\n![9781430249382_Fig12-09.jpg](img/9781430249382_Fig12-09.jpg)\n\
  \n图 12-9. 向规则集添加规则\n\n因为规则可以应用于事件、告警或问题，您需要选择正在创建的规则类型。在此示例中，如 图 12-10 所示，您正在为 `Tablespace\
  \ Full` 指标告警事件创建规则，因此您在 `Select Type of Rule to Create` 弹出窗口中选择第一个选项。\n\n![9781430249382_Fig12-10.jpg](img/9781430249382_Fig12-10.jpg)\n\
  \n图 12-10. Select Type of Rule to Create 屏幕\n\n接下来，您需要通过从下拉列表中选择 `Metric Alert`\
  \ 来指定事件类型（参见 图 12-11）。\n\n![9781430249382_Fig12-11.jpg](img/9781430249382_Fig12-11.jpg)\n\
  \n图 12-11. Create New Rule: Select Events 屏幕\n\n您希望此规则仅作用于特定的指标告警，因此您选择 `Specific\
  \ Events of Type Metric Alert` 单选按钮。然后点击 `Add` 按钮以添加事件，如 图 12-12 所示。\n\n![9781430249382_Fig12-12.jpg](img/9781430249382_Fig12-12.jpg)\n\
  \n图 12-12. 向规则添加指标告警事件\n\n选择 `Target Type` 为 `Database Instance`。然后搜索名称中包含 `*Tablespace*`\
  \ 的所有指标以最小化列表（参见 图 12-13）。\n\n![9781430249382_Fig12-13.jpg](img/9781430249382_Fig12-13.jpg)\n\
  \n图 12-13. Select Specific Metric Alert 屏幕\n\n在这种情况下，如 图 12-14 所示，您希望使用 `Tablespace\
  \ Free Space (MB)` 指标，并将规则限制到 `USERS` 表空间，特别是针对 `Critical` 严重性情况。\n\n![9781430249382_Fig12-14.jpg](img/9781430249382_Fig12-14.jpg)\n\
  \n图 12-14. 选择特定指标和严重性\n\n完成后，点击 `Next` 按钮。现在您需要添加相关操作，因此点击 `Add` 按钮，如 图 12-15 所示。\n\
  \n![9781430249382_Fig12-15.jpg](img/9781430249382_Fig12-15.jpg)\n\n图 12-15. 向规则添加操作\n\
  \n在继续之前，让我们先看一下规则的示例。图 12-4 展示了一个应用于 `Production` 组 `PROD-GROUP` 的企业规则集。\n\n![9781430249382_Fig12-04.jpg](img/9781430249382_Fig12-04.jpg)\n\
  \n图 12-4. 一个事件规则集\n\n这个异构组由一组目标组成，包括主机、数据库和 WebLogic 服务器。此规则集有两个规则。第一个是 `Target\
  \ Down` 规则；该规则的条件是任何数据库或 WebLogic 服务器宕机。在这种情况下，操作是自动创建一个事件并将其优先级设置为高。此规则集中的第二个规则与发送通知有关。该规则的条件是针对\
  \ `PROD-GROUP` 内目标上的任何严重性为 `Fatal`、`Critical` 或 `Warning` 的事件。这里的操作是仅在严重性设置为 `Warning`\
  \ 时发送电子邮件，或者在严重性设置为 `Fatal` 或 `Critical` 时发送页面通知。\n\n*   如果规则条件是特定的指标告警（例如，CPU 利用率或表空间使用百分比超过某个警告或严重阈值），操作可能是创建一个事件。\n\
  *   另一个规则可以针对严重性为警告或严重的事件进行操作，操作是发送通知。在这种情况下，可能还有一个附加条件，即如果规则条件是 `Severity = Critical`，则操作是通过寻呼通知，而如果\
  \ `Severity = Warning`，则操作是通过电子邮件通知。\n*   规则的另一个例子可能是针对已开启超过七天的事件，其中规则操作是将升级级别设置为\
  \ 1（升级级别范围为 1 到 5）。\n\n## 创建并配置规则\n\n现在，你需要告知规则创建一个事件（分配给你的 EM 管理员名称），将其优先级设置为紧急，并同时向你发送电子邮件以确保你收到通知，如图\
  \ 12-16 所示。\n\n![9781430249382_Fig12-16.jpg](img/9781430249382_Fig12-16.jpg)\n\n\
  图 12-16. 向规则添加通知\n\n完成后，点击`Continue`按钮，然后点击`Next`按钮。为规则提供名称和描述，然后点击`Next`，如图 12-17\
  \ 所示。\n\n![9781430249382_Fig12-17.jpg](img/9781430249382_Fig12-17.jpg)\n\n图 12-17.\
  \ 指定规则名称和描述\n\n点击`Continue`按钮。在下一个屏幕，点击`OK`按钮，然后点击`Save`以保存规则集。最后，点击`OK`以确认规则集创建消息，如图\
  \ 12-18 所示。\n\n![9781430249382_Fig12-18.jpg](img/9781430249382_Fig12-18.jpg)\n\n\
  图 12-18. 确认规则集已成功创建的窗口\n\n现在你应该开始在`Incident Manager`控制台中看到生成的事件，如图 12-19 所示。根据检查事件的频率，这可能需要长达\
  \ 30 分钟。\n\n![9781430249382_Fig12-19.jpg](img/9781430249382_Fig12-19.jpg)\n\n图 12-19.\
  \ `Incident Manager`控制台中的表空间满警报\n\n### 查看事件详情\n\n现在，让我们继续查看特定事件的详细信息，使用我们刚刚创建的示例规则集。第一步是滚动浏览未解决事件列表，直到找到相关事件。（在此示例中，表空间`USERS`已使用\
  \ 93%。）\n\n当你通过单击任意位置选中包含该事件的行时，屏幕的下半部分会切换到该事件的详细信息，就像在普通主从窗体中看到的那样。图 12-20 显示了一个示例。\n\
  \n![9781430249382_Fig12-20.jpg](img/9781430249382_Fig12-20.jpg)\n\n图 12-20. 事件详情\n\
  \n按照`EM12c`的标准，你可以通过将鼠标悬停在其两个部分之间的分隔线上来更改屏幕布局（如图 12-20 屏幕顶部中间所示），然后拖动光标以在不滚动的情况下显示更多信息。如图\
  \ 12-21 所示的`General`选项卡，显示了关于事件和生成它的指标数据的具体详细信息、一个引导你完成解决事件的指导性解决区域，以及一个我们将在查看其他选项卡后回来讨论的跟踪区域。\n\
  \n![9781430249382_Fig12-21.jpg](img/9781430249382_Fig12-21.jpg)\n\n图 12-21. `Incident\
  \ Manager`中的`General`选项卡\n\n通过点击`Events`选项卡，你可以看到生成此事件的所有事件。在此特定情况下，只有一个事件，如图 12-22\
  \ 所示。\n\n![9781430249382_Fig12-22.jpg](img/9781430249382_Fig12-22.jpg)\n\n图 12-22.\
  \ `Incident Manager`中的`Events`选项卡\n\n转到下一个选项卡`My Oracle Support Knowledge`（如图 12-23\
  \ 所示），你可以看到从`My Oracle Support`提取的可能有助于解决问题的相关信息。信息按相关性排序，因此希望更相关的文章能帮助解决问题。\n\n\
  ![9781430249382_Fig12-23.jpg](img/9781430249382_Fig12-23.jpg)\n\n图 12-23. `Incident\
  \ Manager`中的`My Oracle Support Knowledge`选项卡\n\n`Updates`选项卡显示有关事件任何更新的信息。（在此示例中，没有任何更新，因此未包含屏幕截图。）你还可以通过点击最后一个选项卡查看任何相关事件和事件（同样，由于此特定事件目前没有，此处未显示）。\n\
  \n现在让我们转到`General`选项卡上的`Tracking`区域。在这里，你可以确认事件、向其添加注释或管理它（这也允许确认事件或添加注释）。点击`Manage`按钮以访问如图\
  \ 12-24 所示的屏幕。\n\n![9781430249382_Fig12-24.jpg](img/9781430249382_Fig12-24.jpg)\n\
  \n图 12-24. 管理事件的工作流\n\n在图 12-24 所示的示例中，我已将事件状态更改为`Work in Progress`，添加了优先级和注释，并将事件升级到级别\
  \ 1（如前所述，允许五个升级级别）。这向系统中的其他管理员表明此事件正在处理中。\n\n### 创建自定义视图\n\n你可能已经注意到，在`Incident\
  \ Manager`控制台的首次截图中，在复杂环境中，你会看到大量的未解决事件，要找到你特别感兴趣的那些并不容易。值得庆幸的是，`EM12c`允许你构建自定义视图，以将你看到的事件数量限制在更易于管理的范围内。为此，点击`Incident\
  \ Manager`控制台左侧`Views`窗格中的`Create`按钮，如图 12-25 所示。\n\n![9781430249382_Fig12-25.jpg](img/9781430249382_Fig12-25.jpg)\n\
  \n图 12-25. 开始创建自定义视图\n\n对于此特定示例，你希望构建一个过去 24 小时内未解决事件和问题的视图，因此你为这里的不同字段选择相关值。如图\
  \ 12-26 所示，然后你可以点击`Get Results`按钮以确保这确实显示了你希望看到的内容。\n\n![9781430249382_Fig12-26.jpg](img/9781430249382_Fig12-26.jpg)\n\
  \n图 12-26. 搜索匹配自定义视图的事件\n\n当你对结果满意后，点击`Create View`按钮。\n\n当系统提示时，为自定义视图提供一个有意义的名称，如图\
  \ 12-27 所示。\n\n![9781430249382_Fig12-27.jpg](img/9781430249382_Fig12-27.jpg)\n\n\
  图 12-27. 为自定义视图输入视图名称\n\n现在你将在左侧的自定义视图列表中看到该视图，如图 12-28 所示。\n\n![9781430249382_Fig12-28.jpg](img/9781430249382_Fig12-28.jpg)\n\
  \n图 12-28. 选择你刚创建的自定义视图\n\n### 规则与通知的优先级\n\n在某些情况下，你的`EM12c`站点可能处于高负载状态。在这些情况下，更重要的事件和事件会优先于其他事件进行处理。在确定处理优先级时会考虑两个因素。\n\
  \n第一个是目标的生命周期状态，优先级基于以下顺序：关键任务目标具有最高优先级，其次是生产、阶段和测试目标，然后开发目标的优先级最低。作为管理员，你的职责之一是为每个目标适当设置生命周期状态。此处显示的状态是产品附带的开箱即用状态。\n\
  \n第二个因素是事件或事件的类型。任何与可用性相关的事件或事件，例如目标宕机，始终设置为最高优先级。接下来，处理任何严重级别为关键或警告的事件或事件，最后，任何仅信息性的事件被视为最低优先级。\n\
  \n\n这种优先级处理仅在系统处于高负载时才会考虑。在系统正常负载下，事件和事故会按到达顺序处理。\n\n### 向后兼容性\n\n在向后兼容性方面，当您从早期版本迁移到`EM12c`时，通知功能提供了向后兼容性。如果您基于`PL/SQL`、操作系统脚本或`SNMP`陷阱创建过任何通知，这些通知方法将被迁移并在`EM12c`中继续工作。\n\
  \n不过，Oracle 确实鼓励您使用新的事件模型创建这些通知方法的新版本，以便利用我们一直在讨论的新特性。如果您在早期版本中创建过通知规则，Oracle 会在升级过程中将其作为一部分迁移为新版本中的事故规则集。\n\
  \n让我们通过一个示例看看这种通知规则到事故规则集的映射是如何完成的。图 12-29 展示了一个`Enterprise Manager` 11.1 的通知规则，该规则应用于组`PROD-GROUP`及其中的数据库目标。\n\
  \n![9781430249382_Fig12-29.jpg](img/9781430249382_Fig12-29.jpg)\n\n图 12-29。将通知规则映射到事故规则集\n\
  \n如果您熟悉早期版本中的通知规则，会了解通知规则设置中的选项卡。在我们的示例中，`可用性`选项卡显示了选择的`数据库关闭`标准，`指标`选项卡显示了所选关注指标及其严重性。最后，操作被设置为向两个用户`user1`和`user2`发送电子邮件。\n\
  \n当此规则被迁移到`EM12c`中的事故规则集时，该规则集将应用于相同的目标（组`PROD-GROUP`），并且其类型为`企业型`。规则集中将创建一个事件规则，以涵盖通知规则中指定的目标可用性标准。在通知规则中，标准是`数据库关闭`。在事故规则集中，这转换为：事件类型是目标可用性、目标类型是数据库、目标状态是关闭。并且由于通知规则中的操作是向用户发送电子邮件，该操作也会延续到事故规则集中。此外，还会为该特定事件创建一个事故对象。对于您可能在通知规则的`指标`选项卡上选择的指标，将创建一个指标警报规则，其标准如下：事件类型是指标警报、目标类型是数据库，并且也为指标警报设置了具体标准。这里的操作同样延续为向用户发送电子邮件，并且会为此事件创建一个事故。\n\
  \n## 事件管理器指南\n\n既然您已经了解了如何在`EM12c`版本中使用`事件管理器`功能，接下来让我们看看一些关于如何充分利用此功能的建议指南。不过，在此之前，最好先定义一些您可能希望达成的目标，以确保使用`事件管理器`实现可扩展、更智能的监控。从高层次来看，这些目标可定义如下：\n\
  \n### 满足您的监控要求。\n这些要求当然因客户而异，但一般来说，这意味着必须发送适当的通知，并遵循事故管理操作流程。实现此目标的最简单方法是部署监控标准。\n\
  \n### 遵守安全实践。\n在授予目标权限时，请确保遵循最小权限原则。换句话说，只授予执行所需监控所需的权限级别。\n\n### 易于管理。\n重要的是，您的基础设施不会成为管理难题，因此请充分利用管理组，以便能够“将多个作为一个”进行管理，同时只需最少的努力来监控新目标。\n\
  \n设置目标监控和目标权限角色已在第 7 章中介绍，因此这里只看看设置规则来管理事故的建议指南。\n\n## 管理事件和事故\n\n管理事件和事故的首要考虑之一是从源头控制事件。正如在性能管理中您希望确保只完成需要完成的工作一样，在`事件管理器`中，有意义的做法是只让那些您希望响应的事件和事故发生。不必要的事件会给您的系统带来不必要的负载。以下是您为实现此目的可能需要考虑的一些事项：\n\
  \n*   审查您的指标设置。这看似显而易见，但请确保只对您实际关心的指标设置阈值。\n*   根据指标趋势调整指标阈值。您可以对监控系统执行的一项更重要的操作是，在一段时间内跟踪指标趋势（时长取决于您可能已有的历史数据量以及指标测量频率），以便您可以就哪些指标重要（这可以反馈到前一点）以及阈值应设置在什么水平做出明智的决定。\n\
  *   适当设置发生次数。例如，如果某些事件只发生一两次，您可能不需要被通知。您可以设置在收到通知前必须达到的指标发生次数。\n*   使用修正操作自动清除指标警报。根据指标本身，您可以定义一个将自动执行的修正操作来解决问题。这将自动清除指标警报，因此您无需采取行动。您可能还需要考虑创建一个规则，如果事件已打开一定天数，则清除所有指标警报的事件。\n\
  *   为您可能不关心的指标禁用指标收集。一旦您拥有了第二点中讨论的历史信息，您就可以利用它来设置指标阈值，并禁用在您的特定环境中可能不重要的那些指标。\n*\
  \   在监控模板中定义指标设置，并在监控集合中使用这些模板。这将使您能够充分利用管理组，当新目标添加到您的环境或需要调整阈值时，减少您需要做的工作量。\n\n\
  ### 规则集建议\n\n关于规则集的建议，让我们从一些通用建议开始。首先，正如刚刚讨论的，强烈建议将组作为规则集的目标。您希望将属于该组成员的所有相关规则放在同一个规则集中。然后，尽可能利用您可以控制规则集中规则执行顺序这一事实。\n\
  \n当您在`EM12c`中的规则集中创建规则时，您会注意到三种类型的规则。让我们看看关于如何使用这些类型的具体建议。对于操作事件的规则，其用例是为在`Enterprise\
  \ Manager`中管理的警报或事件创建事故。如果您想在`Enterprise Manager`中使用工单连接器为这些事故创建工单，请使用事件规则来实现，即通过规则操作首先在事件上创建事故，然后为该事故创建工单。事件规则的另一个用例是使用事件连接器将事件简单地发送到第三方管理系统。最后一种情况是仅发送事件通知而不创建事故，这在早期版本中也是可以的。\n\
  \n\n\n# 规则\n\n对于处理事件的规则，其主要用例之一是自动化与事件工作流相关的操作（例如，自动为事件分配负责人），设置事件的优先级或其升级级别，或者为事件发送通知。你还可以在另一个用例中，根据事件条件创建工单，例如，当事件升级到第\
  \ 2 级时创建一个工单。\n\n规则用于问题，以自动化管理工作问题的工作流，其方式与处理事件非常相似。例如，你可以自动为问题分配负责人，设置问题的优先级或升级级别，或者为问题发送通知。\n\
  \n事件规则集可轻松用于自动化和工作流管理。例如，你可能会执行以下操作：\n\n*   自动分配事件以加快解决速度。创建事件时，自动分配事件负责人。或者，创建一个单独的规则，基于特定标准分配负责人。无论哪种情况，这都节省了手动将事件分配给特定负责人的需要。\n\
  *   自动化你的升级流程。你可能希望根据事件处于打开和未解决状态的时间长度来设置其升级级别。如果你没有像第一个要点中讨论的那样自动分配事件，你可能希望升级未分配的重要事件。\n\
  *   为升级的事件或问题发送通知。当事件或问题被升级时，你可以发送电子邮件通知、分配负责人或为事件或问题设置优先级。\n*   自动分配优先级级别。与负责人分配一样，你可以在事件创建时自动分配一个优先级级别。然后，你可以在事件管理器控制台中按优先级排序，并首先处理高优先级的事件。\n\
  \n# 摘要\n\n事件管理器为管理员提供了一个中心控制点，用于管理由企业经理检测到的基础设施内的事件、事故和问题。它使你能够快速有效地监控和解决服务中断，并提供了一种管理数量较少但有意义的事件，而不是大量离散事件的方法。通过与\
  \ My Oracle Support 的集成，它允许你访问集成的 Oracle 专业知识，以加速事件和问题的诊断与解决。\n\n# 第 13 章 高可用性、备份与恢复\n\
  \n![image](img/frontdot.jpg)\n\n作者：Leighton Nelson\n\n本章探讨了为建立高可用的 Oracle Enterprise\
  \ Manager Cloud Control 12c 环境所需的三层架构。它还涵盖了系统各组件的备份和恢复方法，包括存储库数据库、管理服务和代理。\n\nEnterprise\
  \ Manager Cloud Control 12c 为数据库、应用程序和硬件提供了完整的基础设施管理解决方案。在企业中拥有如此关键的组件，自然会引发对冗余和高可用性的担忧。如果配置中确实出现问题，恢复应以最短的时间进行，从而将对企业的可管理性和监控的干扰降至最低。维护也是必需的，需要为\
  \ Enterprise Manager 软件组件（即数据库、管理服务、代理和操作系统）打补丁。正是考虑到这些担忧，Oracle Enterprise Manager\
  \ 被设计为通过使用不同的高可用性机制来满足期望的服务和操作级别。\n\n## 高可用性\n\nEnterprise Manager 架构中的每个组件都应具有高可用性，以实现完整的高可用配置。需要考虑的主要组件如图\
  \ 13-1 所示，如下：\n\n*   `Management Agent`：在目标上运行，与`OMS`通信并发送指标。\n*   `Management Server`：Enterprise\
  \ Manager 的核心，提供`Management Services`。\n*   `Repository`：在 Oracle 数据库中存储来自监控目标的持久数据。\n\
  *   `Software Library`：存储用于修补、配置以及代理和插件部署的文件。\n\n![9781430249382_Fig13-01.jpg](img/9781430249382_Fig13-01.jpg)\n\
  \n图 13-1 .  Enterprise Manager Cloud Control 12c 架构\n\n可以为每个组件配置不同级别的复杂性和成本的不同级别的高可用性。在考虑高可用性要求时，应在成本、复杂性、性能和数据丢失方面做出最小的权衡。通常，复杂性和高可用性级别是成比例的。\n\
  \n`Oracle Management Agent`应配置为开机启动。这确保了在服务器重启后不需要手动干预，并能在服务中断后快速启用目标监控。在 Unix 和\
  \ Linux 操作系统上，一个名为`gcstartup`的脚本被放置在`/etc/init.d`中，并在特定的运行级别下运行。在 Microsoft Windows\
  \ 上，会创建一个服务以在启动时自动启动。\n\nOracle 为 Enterprise Manager Cloud Control 定义了四个高可用性级别。这些级别在表\
  \ 13-1 中进行了总结。本章仅涵盖级别 1 到 3。\n\n表 13-1. Enterprise Manager 高可用性级别\n\n![Table13-1.jpg](img/Table13-1.jpg)\n\
  \n## Oracle Management Agent\n\n`Oracle Management Agent`负责发送其安装主机的指标和待处理警报。为了提供高可用性，应为代理启用以下功能：\n\
  \n*   启用代理在操作系统启动时自动启动。这应在运行`root.sh`脚本后自动配置。\n*   在冗余存储上安装代理。这包括配置了 RAID 的存储后端。\n\
  *   为代理看门狗进程配置重启参数。看门狗进程负责基于以下环境变量重启代理：\n    ```\n    EM_MAX_RETRIES  表示看门狗进程在 `EM_MAX_RETRY_WINDOW`\
  \ 内尝试重启代理的最大次数。默认设置为 3。\n    EM_RETRY_WINDOW  表示与 `EM_MAX_RETRIES` 一起使用的时间间隔，用于在尝试启动管理代理之前进行等待。默认设置为\
  \ 600 秒。\n    ```\n\n安装 Enterprise Manager 代理后，应执行`<AGENT_HOME>/root.sh`脚本。这将在 Linux\
  \ 和某些 Unix 操作系统上创建以下控制管理代理启动的脚本：\n\n*   `/etc/init.d/gcstartup`\n*   `/etc/init/gcstartup`\n\
  *   `/etc/rc.d/init.d/gcstartup`\n\n如果这些文件不存在，请确保已执行`<AGENT_HOME>/root.sh`脚本。\n\n\
  代理的丢失或损坏将导致其关联目标的监控和指标数据上传丢失。同样，如果代理关闭，目标将无法与管理服务器通信，导致可管理性丧失。\n\n### Management\
  \ Repository\n\n\n\n资料库是代理上传的监控数据的持久化存储。它存储所有监控目标的指标和配置数据。资料库丢失将导致管理服务器故障。建议启用数据库高可用性功能，例如用于数据文件存储（取决于冗余级别和后端\
  \ RAID 配置）的实时应用集群 (`RAC`) 或 `RAC One Node`、自动存储管理 (`ASM`)，以及用于资料库的数据卫士 (`Data Guard`)。此外，如果资料库配置为\
  \ `RAC` 数据库，则管理服务应配置为使用单客户端访问名称 (`SCAN`) 和非默认的 `RAC` 服务名。以下是一个为 `RAC` 数据库配置管理服务的示例：\n\
  ```\nemctl config oms -store_repos_details -repos_conndesc \"\n(DESCRIPTION= (ADDRESS=(PROTOCOL=TCP)\n\
  (HOST=emrep-scan.example.com)(PORT=1521) )\n(CONNECT_DATA=(SERVER=DEDICATED) (SERVICE_NAME\
  \ = emrep)))\"\n-repos_user sysman\n```\n\n图 13-2 展示了一个使用 `SCAN` 名称配置的、采用 `RAC`\
  \ 资料库数据库的 `OMS` 示例。有关配置 `SCAN` 的更多详细信息，请参阅 *《Oracle Clusterware 管理与部署指南 11g 第 2\
  \ 版 (11.2)》*。\n\n![9781430249382_Fig13-02.jpg](img/9781430249382_Fig13-02.jpg)\n\
  \n图 13-2 . 使用 `RAC` 数据库配置的资料库数据库\n\n考虑使用 Enterprise Manager Cloud Control 12c 中的最大可用性架构¹\
  \ (`MAA`) 顾问来配置额外的 `HA` 组件，包括以下内容：\n*   启用 `ARCHIVELOG` 模式，以便可以执行数据库的一致性热备份。\n*\
  \   启用块校验和，使 Oracle 能够检测物理磁盘或存储系统导致的损坏。将 `DB_BLOCK_CHECKSUM` 参数设置为 `TYPICAL` 或 `FULL`。\n\
  *   适当配置重做日志文件和组的大小。优化数据库的 `I/O` 吞吐量和性能，以使日志切换不会过于频繁。使用重做日志大小调整顾问（通过设置 `FAST_START_MTTR_TARGET`\
  \ 启用）有助于确定最佳大小。\n*   使用快速恢复区² 存储重做日志和归档日志等与恢复相关的文件。然后 Oracle 可以使用建议的、利用快速恢复区的备份机制。\n\
  *   启用闪回数据库，以便使用闪回日志实现更快的数据库恢复。\n*   使用快速启动故障恢复来控制实例恢复时间。设置初始化参数 `FAST_START_MTTR_TARGET`\
  \ 以指定实例恢复应占用的秒数。\n*   启用数据库块检查，以便及早检测和防止数据及内存损坏。将 `DB_BLOCK_CHECKING` 设置为 `TRUE`\
  \ 或 `FULL`。\n\n配置完组件后，您可以使用高可用性控制台（如 图 13-3 所示）监控每个组件的状态。\n\n![9781430249382_Fig13-03.jpg](img/9781430249382_Fig13-03.jpg)\n\
  \n图 13-3 . Enterprise Manager Cloud Control 12c 高可用性控制台\n\n![image](img/sq.jpg)\
  \ **注意** 管理资料库应配置在其自己的数据库中，以确保对资料库的操作不会影响其他应用程序，反之亦然。\n\n建议使用物理备用数据库，以便在主站点发生故障时提供灾难恢复。主资料库上的数据将与备用数据库保持同步。为资料库数据库配置物理备用时，请使用与主站点类似的硬件和资源，以便在发生故障切换/切换时不会出现任何性能影响。使用\
  \ Enterprise Manager 从主数据库创建备用数据库。根据您的网络带宽和恢复目标确定要用于同步备用数据库的网络模式：\n*   `最大保护`：同步写入备用库\n\
  *   `最大可用性`：同步写入备用库\n*   `最高性能`：异步写入备用库\n\n![image](img/sq.jpg) **注意** Enterprise\
  \ Manager 只能创建单实例备用数据库。您可以使用 Enterprise Manager 中的“转换为 `RAC`”功能将单实例物理备用数据库转换为 `RAC`。\n\
  \n### 管理服务\n\n管理服务 (`OMS`) 通过 Enterprise Manager 控制台提供用户界面，并处理来自代理的数据。`OMS` 丢失将导致\
  \ Enterprise Manager 完全中断：代理上传、作业、事件和通知都将停止运行。Oracle WebLogic Node Manager 和 Oracle\
  \ 进程管理器与通知服务器 (`OPMN`) 将尝试在管理服务宕机时自动重启它。虽然这提供了一些好处，但如果主机宕机，它并不能保护 `OMS`。至少，如果可能，`OMS`\
  \ 和资料库应安装在不同的主机上。多个 `OMS` 可以部署在服务器负载均衡器之后，以提供针对单台主机故障的保护。此外，您可以选择在共享文件系统上安装 `OMS`，这将在单台主机丢失时提供被动故障转移。我们将详细探讨保护\
  \ `OMS` 的每种选项。\n\n### 级别 1 — 分离的 `OMS` 和资料库主机/无冗余\n\n级别 1 配置由单个 `OMS` 和资料库组成，每个都安装在其自己的主机上。此配置提供的保护最少，因为任何主机的故障都将导致\
  \ Enterprise Manager 系统完全中断。应考虑 `OMS` 和资料库之间的距离，因为两者之间的高网络延迟会降低性能。建议除最小配置外的所有配置都采用此配置。\n\
  \n图 13-4 是级别 1 高可用性配置的示意图。代理直接上传到管理服务主机，而用户通过 Enterprise Manager 控制台或命令行 `EMCLI`\
  \ 直接与物理 `OMS` 主机交互。如果管理服务或资料库数据库主机中的任何一个变得不可用，将发生完全中断，导致目标监控丢失。将每个组件保留在其自己的服务器上可以降低它们因资源开销而相互影响的可能性。例如，增加数据库参数\
  \ `sga_max_size` 和 `sga_target` 可能会降低 `OMS` 的性能，因为这样做会减少操作系统可用的内存量。此外，它为根据业务需求扩展环境奠定了基础。\n\
  \n![9781430249382_Fig13-04.jpg](img/9781430249382_Fig13-04.jpg)\n\n图 13-4 . `OMS`\
  \ 和资料库位于不同服务器上的级别 1 高可用性配置\n\n### 级别 2 — 主动/被动 `OMS` 和数据卫士资料库\n\n为了减少计划内或计划外中断期间的\
  \ `OMS` 停机时间，应在配置中引入一些冗余。级别 2 配置使用共享文件系统实现管理服务的主动/被动（或冷）故障转移集群解决方案。文件系统在两个或多个主机之间共享，且一次仅在一个主机上处于活动状态。\n\
  \n作为级别 2 高可用性配置的先决条件，应执行以下步骤：\n1.  `OMS` 的共享文件系统可以安装在通用集群文件系统上，包括 `NFS`、Oracle 集群文件系统\
  \ (`OCFS2`) 和 Oracle 自动存储管理集群文件系统 (`ACFS`)。如果使用 `NFS` 作为共享存储，请确保在 `/etc/fstab`（AIX\
  \ 上为 `/etc/filesystems`）中设置正确的挂载选项，以防止潜在的 `I/O` 问题。具体来说，应设置 `rsize` 和 `wsize`。\n\
  \n\n\n以下示例展示了 Linux 服务器上`/etc/fstab`文件中的一个条目；NFS 共享被挂载在名为`filer1`的文件器上的`/vol1/oms_share`目录下。\n\
  \n```\nfiler:/vol1/oms_share /u01/app/oms_share nfs rw,bg,rsize=32768,wsize=32768,hard,nointr,tcp,noac,vers=3,timeo=600\
  \ 0 0\n```\n\n2.  在共享文件系统上安装 OMS 的二进制文件以及库存。\n3.  使用 Oracle Clusterware 或第三方软件和硬件设置虚拟主机名和\
  \ IP 地址（VIP）。通过将 OMS 的虚拟主机名与一个解析到该主机名的唯一 IP 地址一起使用来实现故障转移。\n4.  使用带有 Data Guard\
  \ 的本地物理备用数据库配置仓库数据库（参见图 13-5）。\n\n![9781430249382_Fig13-05.jpg](img/9781430249382_Fig13-05.jpg)\n\
  \n图 13-5. 具有主动/被动 OMS 和本地备用的 2 级 Enterprise Manager Cloud Control 12c 高可用性配置\n\n\
  在我们的示例中，我们将使用 Oracle Clusterware 来创建和管理虚拟主机名，并执行应用程序的故障转移。`OCFS2`被选为共享文件系统。\n\n\
  ![image](img/sq.jpg) **注意** `OCFS v1`不支持作为 OMS 的共享存储。\n\n在安装管理服务之前，您应在所有主机上配置以下先决条件：\n\
  \n1.  确保安装 OMS 的每台主机上的操作系统用户 ID 相同。\n\n![image](img/sq.jpg) **注意** 对于 Red Hat Enterprise\
  \ Linux 和 Oracle Linux 操作系统，请安装`oracle-validated`或`oracle-preinstall-11gr2`软件包以确保\
  \ UID 和 GID 的一致性。\n\n```\n[oracle@oms1 ∼]$ id -a\nuid=1101(oracle) gid=1000(oinstall)\
  \ groups=1000(oinstall),1021(asmdba),1032(dba)\n```\n\n2.  设置环境变量。\n    *   a. 操作系统时区变量`TZ`:³\n\
  \n    ```\n    export TZ='America/New_York'\n    ```\n\n    *   b. 应取消设置`PERL5LIB`变量，以避免关联到错误的\
  \ PERL 库。\n3.  在两台服务器上安装 Oracle Clusterware（参见*Oracle Grid Infrastructure Installation\
  \ Guide*）。\n4.  安装并配置`OCFS2`。\n5.  准备数据库以供`OMS`使用（更多信息参见第 2 章）。\n\n在安装`OMS`之前，应有一个映射到唯一静态\
  \ IP 地址的虚拟主机名可用（这意味着一个当前未使用、与 Enterprise Manager 其他组件在同一子网中的 IP 地址）。VIP 配置在用于访问服务器的公共子网上。如果托管\
  \ VIP 的服务器宕机，Oracle Clusterware 会将其重新定位到集群中可用的成员。同样，如果需要对托管 VIP 的服务器进行维护，也可以将其重新定位到集群中的另一台服务器。\n\
  \n可以像创建任何其他 Clusterware 资源一样创建 VIP。但是，Oracle 建议您使用 Oracle Clusterware 11gR2 中的`appvipcfg`实用程序来创建应用\
  \ VIP。VIP 是使用一组适用于应用 VIP 的预定义设置创建的，例如放置策略和回退⁴选项。有关使用`appvipcfg`的详细信息，请参阅*Oracle\
  \ Clusterware Administration and Deployment Guide11gR2*文档。\n\n按照以下步骤，为`OMS`创建一个应用\
  \ VIP：\n\n1.  安装 Oracle Clusterware 11gR2 后，以`ROOT`用户登录并执行以下命令：\n\n    ```\n   \
  \ GRID_HOME/bin/appvipcfg create -network=1 \\\n           -ip=192.168.1.0 \\\n\
  \           -vipname=omsvip \\\n           -user=root\n    ```\n\n运行`appvipcfg`的示例输出如下：\n\
  \n```\n[root@oms1 bin]# /u01/app/11.2.0/grid/bin/appvipcfg create -network=1 \\\n\
  -ip=192.168.1.0 \\\n-vipname=omsvip \\\n-user=root\nProduction Copyright 2007, 2008,\
  \ Oracle.All rights reserved\n2012-10-28 03:30:29: Creating Resource Type\n2012-10-28\
  \ 03:30:29: Executing /u01/app/11.2.0/grid/bin/crsctl add type\napp.appvip_net1.type\
  \ -basetype ora.cluster_vip_net1.type -file\n/u01/app/11.2.0/grid/crs/template/appvip.type\n\
  2012-10-28 03:30:29: Executing cmd: /u01/app/11.2.0/grid/bin/crsctl add type\napp.appvip_net1.type\
  \ -basetype ora.cluster_vip_net1.type -file\n/u01/app/11.2.0/grid/crs/template/appvip.type\n\
  2012-10-28 03:30:37: Create the Resource\n2012-10-28 03:30:37: Executing /u01/app/11.2.0/grid/bin/crsctl\
  \ add resource\nomsvip -type app.appvip_net1.type -attr\n\"USR_ORA_VIP=192.168.1.0,START_DEPENDENCIES=hard(ora.net1.network)\n\
  pullup(ora.net1.network),STOP_DEPENDENCIES=hard(ora.net1.network),\nACL='owner:root:rwx,pgrp:root:r-x,other::r--,user:root:r-x',\n\
  HOSTING_MEMBERS=oms1.example.com,APPSVIP_FAILBACK=\"\n2012-10-28 03:30:37: Executing\
  \ cmd: /u01/app/11.2.0/grid/bin/crsctl add\nresource omsvip -type app.appvip_net1.type\
  \ -attr\n\"USR_ORA_VIP=192.168.1.0,START_DEPENDENCIES=hard(ora.net1.network)\npullup(ora.net1.network),STOP_DEPENDENCIES=hard(ora.net1.network),\n\
  ACL='owner:root:rwx,pgrp:root:r-x,other::r--,user:root:r-x',\nHOSTING_MEMBERS=oms1.example.com,APPSVIP_FAILBACK=\"\
  \n```\n\n这将在网络 1 上创建一个 VIP，定义为 IP 地址`192.168.1.0`。VIP 名称为`omsvip`，由`ROOT`用户所有。\n\
  \n2.  接下来，您需要允许 Oracle Grid Infrastructure 软件所有者（例如`GRID`）运行脚本来启动 VIP。作为`ROOT`，执行以下命令：\n\
  \n    ```\n    GRID_HOME/bin/crsctl setperm resource omsvip -u user:grid:r-x\n \
  \   ```\n\n3.  以`GRID`用户身份启动 VIP。\n\n    ```\n    GRID_HOME/bin/crsctl start resource\
  \ omsvip\n    ```\n\n例如：\n\n```\n[grid@oms1 ∼]$ $GRID_HOME/bin/crsctl start resource\
  \ omsvip\nCRS-2672: Attempting to start 'omsvip' on 'oms1'\nCRS-2676: Start of 'omsvip'\
  \ on 'oms1' succeeded\n```\n\n4.  检查 VIP 的状态。\n\n    ```\n    GRID_HOME/bin/crsctl\
  \ status resource omsvip\n    ```\n\n输出状态应类似于以下内容：\n\n```\nNAME=omsvip\nTYPE=app.appvip_net1.type\n\
  TARGET=ONLINE\nSTATE=ONLINE on oms1\n```\n\n5.  在 DNS 中定义虚拟主机名，并且应解析到使用上述步骤创建的应用\
  \ VIP 地址。使用`nslookup`或`dig`命令检查虚拟主机名和 VIP 是否可解析。\n\n    ```\n    $ nslookup omsvip\n\
  \    ```\n\n这应该解析到集群中每个节点上虚拟主机名的唯一 IP 地址。\n\n6.  同时对 IP 地址进行反向查找。\n\n    ```\n \
  \   $nslookup <virtual IP address>\n    ```\n\n7.  验证从`nslookup`输出返回的 IP 地址是否在`OMS`主机上运行。\n\
  \n    ```\n    ifconfig –a|grep <virtual IP address>\n    ```\n\n8.  验证虚拟主机名和 VIP\
  \ 已正确配置后，您就可以继续进行`OMS`安装了。在启动安装程序之前应执行以下操作：\n    *   a. 在所有集群节点的共享存储上为`OMS`创建一个新的`ORACLE_HOME`：\n\
  \n        ```\n        $ mkdir –p /u01/app/oms_share\n        ```\n\n    *   b.\
  \ 在所有节点上的`OMS`的`ORACLE_HOME`下创建 Oracle 库存目录：\n\n        ```\n        $ mkdir /u01/app/oms_share/oraInventory\n\
  \        ```\n\n    *   c. 在`oraInventory`目录中创建库存指针：\n\n        ```\n        $ vi\
  \ oraInst.loc\n        ```\n\n`oraInst.loc`文件应包含`OMS`的库存路径和软件所有者的组。例如：\n\n```\n\
  inventory_loc=/u01/app/oracle/oms_share/oraInventory\ninst_group=oinstall\n```\n\
  \n9.  接下来，通过指定`ORACLE_HOSTNAME`环境变量为您的虚拟主机名，并指向共享库存位置，来进行安装。\n\n\n\n```\nrunInstaller\
  \ -invPtrloc /u01/app/oms_share/oraInst.loc \\\nORACLE_HOSTNAME=omsvip.example.com\
  \ –debug\n```\n\n## 在第一台主机上安装 OMS\n\n按照《Oracle Enterprise Manager Cloud Control\
  \ 12c 基础安装指南》中描述的安装步骤，在第一台主机上安装 OMS。您只需要完成一次安装。由于位置是共享的，二进制文件将可以从共享文件系统的另一台主机访问。\n\
  \nOMS 成功安装并启动运行后，如果主机宕机，VIP 会自动迁移到另一个节点。然后，您可以在集群中任何运行 VIP 的剩余节点上手动启动管理服务。\n\n###\
  \ 手动迁移 VIP\n\n要将 VIP 手动迁移到集群中的另一台主机，请执行以下命令：\n\n```\n[grid@oms1 ∼]$ crsctl relocate\
  \ res omsvip\nCRS-2673: Attempting to stop 'omsvip' on 'oms1'\nCRS-2677: Stop of\
  \ 'omsvip' on 'oms1' succeeded\nCRS-2672: Attempting to start 'omsvip' on 'oms2'\n\
  CRS-2676: Start of 'omsvip' on 'oms2' succeeded\n```\n\n### 检查迁移后的主机\n\n1.  检查与\
  \ VIP 关联的 IP 地址是否在迁移后的主机上运行。\n\n```\nifconfig –a|grep <vip>\n```\n\n存储库数据库应可从集群中的其他主机访问，并且监听器应已启动并运行。\n\
  \n2.  将 `ORACLE_HOSTNAME` 环境变量设置为虚拟主机名。沿用我们的示例，使用以下命令：\n\n```\nexport ORACLE_HOSTNAME=omsvip.example.com\n\
  ```\n\n3.  在新节点上启动 OMS。\n\n```\n$OMS_HOME/bin/emctl start oms\n```\n\n或者，可以通过创建\
  \ `start`、`check`、`stop`、`clean` 和 `abort` 例程来配置 Oracle Clusterware 以完全管理 OMS，这些例程告诉它如何对\
  \ OMS 进行操作。此配置的详细信息超出了本章的范围。有关详细信息，请参阅《Oracle Clusterware Administration and Deployment\
  \ Guide 11gR2》。\n\n## 为 OMS 实施冷故障切换\n\n为 OMS 实施冷故障切换方案后，您就受到了保护，免受单台主机故障的影响。然而，执行故障切换的时间可能从几分钟到几小时不等，具体取决于是手动完成还是通过\
  \ Oracle Clusterware 或其他方法自动完成。\n\n存储库也需要受到保护，因为它现在是一个单点故障。如前所述，强烈建议设置一个本地 Data\
  \ Guard，包含一个物理备用数据库。备用数据库应配置在与管理服务器和主数据库分离的主机上。但是，为了降低成本，也有可能在另一台 OMS 主机上创建主数据库和物理备用数据库。如果主存储库发生计划内或计划外的中断，物理备用数据库可以在剩余的主机上切换或故障转移到备用数据库。请注意，该主机现在将成为一个单点故障。\n\
  \n### 使用 Enterprise Manager 创建备用数据库的前提条件\n\n要使用 Enterprise Manager 创建备用数据库，目标主机应安装有\
  \ Oracle Management Agent，并由 Enterprise Manager 进行监控。此外，如果使用 ASM 作为数据库存储，它应与监听器一起被监控。\n\
  \n### 使用 Enterprise Manager 创建备用数据库的步骤\n\n1.  导航到存储库数据库主页，从菜单中选择 **可用性** > **添加备用数据库**。\n\
  2.  备份主数据库（参见图 13-6）。Data Guard 使用 RMAN 基于新的或现有的备份创建备用数据库。联机备份要求数据库处于 `ARCHIVELOG`\
  \ 模式。\n\n![9781430249382_Fig13-06.jpg](img/9781430249382_Fig13-06.jpg)\n\n图 13-6.\
  \  使用 RMAN 联机备份添加备用数据库\n\n如果使用联机方法，请在高峰时段之外的时间执行备份，以免对 Enterprise Manager Cloud\
  \ Control 的性能产生负面影响。使用此方法时，您还可以决定使用 RMAN 的功能通过 Oracle Net Services 将备份直接复制到目标主机，或者在复制前暂存备份。后一种选项需要在主站点和辅助站点都有额外的存储空间。如果存在常规备份过程或先前的“添加备用数据库”操作产生的现有备份，也可以使用它。\n\
  \n3.  接下来，您将选择一个备份选项。如图 13-7 所示，您提供 RMAN 将使用的并行度以及主主机的凭据。备用数据库将需要备用重做日志以进行实时应用。在发生角色转换时，它们也会在主数据库上创建。您可以为备用重做日志使用\
  \ OMF（默认）或手动指定日志文件。对于使用 ASM 的数据库，请提供磁盘组名称。\n\n![9781430249382_Fig13-07.jpg](img/9781430249382_Fig13-07.jpg)\n\
  \n图 13-7.  添加备用数据库，备份选项\n\n4.  添加用于在备用数据库上存储数据库文件和快速恢复区的文件位置，如图 13-8 所示。如果使用 ASM，请指定磁盘组。\n\
  \n![9781430249382_Fig13-08.jpg](img/9781430249382_Fig13-08.jpg)\n\n图 13-8.  添加备用数据库，文件位置\n\
  \n5.  选择备用数据库的配置属性，如图 13-9 所示。\n\n![9781430249382_Fig13-09.jpg](img/9781430249382_Fig13-09.jpg)\n\
  \n图 13-9.  添加备用数据库，配置\n\n如果备用服务器上配置了 Oracle Restart[⁵]，请为其启用配置：\n    *   a.  为备用数据库提供一个唯一的名称，并为\
  \ Enterprise Manager 中的目标提供一个名称。\n    *   b.  通过选择 **使用 SYSDBA 监视凭据** 复选框来指定 Enterprise\
  \ Manager 要使用的监视凭据。这是因为备用数据库在重做应用期间将处于 `mounted` 状态。使用 `SYSDBA` 角色将使更多监视信息可用。\n\
  \    *   c.  选择 **使用 Data Guard Broker** 复选框以启用使用 Data Guard Broker 管理主数据库和备用数据库。它简化了\
  \ Data Guard 配置中主数据库和备用数据库的管理，包括角色转换和运行状况检查。Data Guard 需要一个连接标识符来与所有主数据库和备用数据库进行通信。提供一个供\
  \ Data Guard 使用的连接描述符。可以使用 Enterprise Manager 连接描述符或现有的服务名。\n6.  在下一个屏幕（如图 13-10\
  \ 所示）上查看您的选项，然后单击 **完成** 按钮。\n\n![9781430249382_Fig13-10.jpg](img/9781430249382_Fig13-10.jpg)\n\
  \n图 13-10.  添加备用数据库，复查\n\n7.  将创建一个作业来构建备用数据库。单击作业名称以查看步骤和输出，如图 13-11 所示。\n\n![9781430249382_Fig13-11.jpg](img/9781430249382_Fig13-11.jpg)\n\
  \n图 13-11.  Data Guard 作业创建\n\n### 管理备用数据库\n\n备用数据库成功创建后，您将能够通过 Enterprise Manager\
  \ 控制台管理它。从存储库数据库主页中，选择 **可用性** > **Data Guard 管理**，如图 13-12 所示。\n\n![9781430249382_Fig13-12.jpg](img/9781430249382_Fig13-12.jpg)\n\
  \n图 13-12.  Data Guard 管理选项\n\n[⁵]: Oracle Restart 是一项功能，可在单个服务器上为 Oracle 实例、监听器和其他相关组件提供高可用性。\n\
  \n\n\nData Guard 界面展示了 Data Guard 状态概览以及有关主数据库和备用数据库的配置信息，如 图 13-13 所示。\n\n![9781430249382_Fig13-13.jpg](img/9781430249382_Fig13-13.jpg)\n\
  \n图 13-13 . Data Guard 状态\n\n默认情况下，备用数据库是使用“最高性能”保护模式创建的。⁶ 此模式确保，如果主数据库和备用数据库之间存在网络连接问题，不会影响主数据库的性能。然而，这有可能导致数据丢失。由于我们使用的是本地\
  \ Data Guard，启用“最高可用性”保护模式可能是可行的。此模式同样不会在出现网络连接问题时影响主数据库的可用性和性能，但提供了更高级别的数据保护。将保护模式更改为“最高可用性”（参见\
  \ 图 13-14）。\n\n![9781430249382_Fig13-14.jpg](img/9781430249382_Fig13-14.jpg)\n\n\
  图 13-14 . 更改 Data Guard 保护模式\n\n保护模式的更改将反映在控制台中，如 图 13-15 所见。从“最高性能”更改为“最高可用性”也会将重做传输模式从异步\
  \ (`ASYNC`) 更改为同步 (`SYNC`)。\n\n![9781430249382_Fig13-15.jpg](img/9781430249382_Fig13-15.jpg)\n\
  \n图 13-15 . Data Guard 最高可用性保护模式\n\n此外，我们建议使用 Data Guard Broker 来管理 Data Guard 操作，例如故障切换、切换和运行状况检查。Data\
  \ Guard Broker 通过 Enterprise Manager 或命令行实用程序 Data Guard Broker Line Manager (`dgmgrl`)\
  \ 提供 GUI 界面，从而简化了此配置中数据库的管理。关于 Data Guard 和 Data Guard Broker 的完整讨论超出了本章的范围。有关详细信息，请参阅\
  \ *Oracle Data Guard Concepts and Administration 11g Release 2 (11.2)* 文档。为了管理 Enterprise\
  \ Manager 存储库的角色更改操作，应使用后一种方法，因为 Enterprise Manager Cloud Control 12c 系统将无法用于完成这些操作。\n\
  \n还可以配置管理服务，以便在存储库数据库更改角色（即在切换/故障切换期间）后无需进行配置更改。使用 Oracle Database 11gR2，您可以通过 `srvctl`\
  \ 命令行实用程序配置仅在数据库担任主角色时才处于活动状态的服务。以下示例说明了在 Data Guard 配置中为 OMS 配置数据库服务的步骤：\n\n1.\
  \  在主数据库 `emrepprim` 上创建一个名为 `emrepsrvc` 的数据库服务，供 OMS 使用。\n\n    ```\n    $ srvctl\
  \ add service -d emrepprim -s emrepsrvc -l PRIMARY -q FALSE -e NONE -m NONE -w 0\
  \ -z 0\n    ```\n\n2.  验证服务的配置。\n\n    ```\n    $ srvctl config service -d emreptst\
  \ -s emrepsrvc\n    Service name: emrepsrvc\n    Service is enabled\n    Cardinality:\
  \ SINGLETON\n    Disconnect: false\n    Service role: PRIMARY\n    Management policy:\
  \ AUTOMATIC\n    DTP transaction: false\n    AQ HA notifications: false\n    Failover\
  \ type: NONE\n    Failover method: NONE\n    TAF failover retries: 0\n    TAF failover\
  \ delay: 0\n    Connection Load Balancing Goal: LONG\n    Runtime Load Balancing\
  \ Goal: NONE\n    TAF policy specification: NONE\n    Edition:\n    ```\n\n3.  在主数据库上启动并检查服务的状态。\n\
  \n    ```\n    $ srvctl start service -d emreptst -s emrepsrvc\n    $ srvctl status\
  \ service -d emreptst -s emrepsrvc\n    Service emrepsrvc is running\n    ```\n\n\
  4.  在备用数据库上创建相同的服务，供角色更改为备用时使用。\n\n    ```\n    $ srvctl add service -d emrepsby\
  \ -s emrepsrvc -l PRIMARY -q FALSE -e NONE -m BASIC -w 0 -z 0\n    $ srvctl config\
  \ service -d emrepsby -s emrepsrvc\n    Service name: emrepsrvc\n    Service is\
  \ enabled\n    Cardinality: SINGLETON\n    Disconnect: false\n    Service role:\
  \ PRIMARY\n    Management policy: AUTOMATIC\n    DTP transaction: false\n    AQ\
  \ HA notifications: false\n    Failover type: NONE\n    Failover method: BASIC\n\
  \    TAF failover retries: 0\n    TAF failover delay: 0\n    Connection Load Balancing\
  \ Goal: LONG\n    Runtime Load Balancing Goal: NONE\n    TAF policy specification:\
  \ NONE\n    Edition:\n    ```\n\n5.  重新配置 OMS 以在连接描述符中使用新服务。\n\n    ```\n    $OMS_HOME/bin/emctl\
  \ config oms -store_repos_details -repos_conndesc\n    '(DESCRIPTION=(FAILOVER=ON)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oemhost1)(PORT=1521))\n\
  \    (ADDRESS=(PROTOCOL=TCP)(HOST=oemhost2)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=emrepsrvc.\n\
  \    smrcy.com))(FAILOVER_MODE=(TYPE=select)(METHOD=basic)))' -repos_user sysman\n\
  \    Oracle Enterprise Manager Cloud Control 12c Release 2\n    Copyright (c) 1996,\
  \ 2012 Oracle Corporation.  All rights reserved.\n    Enter Repository User's Password\
  \ :\n    Successfully updated datasources and stored repository details in Credential\
  \ Store.\n    If there are multiple OMSs in this environment, run this store_repos_details\
  \ command on\n    all of them.\n    And finally, restart all the OMSs using 'emctl\
  \ stop oms -all' and 'emctl start oms'.\n    ```\n\n6.  停止并重新启动 OMS。\n    *   a.\
  \ 要停止 OMS，请使用 `emctl stop oms -all`：\n\n        ```\n        $emctl stop oms -all\n\
  \        Oracle Enterprise Manager Cloud Control 12c Release 2\n        Copyright\
  \ (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n        Stopping WebTier...\n\
  \        WebTier Successfully Stopped\n        Stopping Oracle Management Server...\n\
  \        Oracle Management Server Successfully Stopped\n        AdminServer Successfully\
  \ Stopped\n        Oracle Management Server is Down\n        ```\n\n    *   b. 要重新启动，请使用\
  \ `emctl start oms`：\n\n        ```\n        $emctl start oms\n        Oracle Enterprise\
  \ Manager Cloud Control 12c Release 2\n        Copyright (c) 1996, 2012 Oracle Corporation.\
  \  All rights reserved.\n        Starting Oracle Management Server...\n        Starting\
  \ WebTier...\n        WebTier Successfully Started\n        Oracle Management Server\
  \ Successfully Started\n        Oracle Management Server is Up\n        Verify that\
  \ the new DG connection string is in use\n        $emctl config oms -list_repos_details\n\
  \        Oracle Enterprise Manager Cloud Control 12c Release 2\n        Copyright\
  \ (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n        Repository Connect\
  \ Descriptor : (DESCRIPTION=(FAILOVER=ON)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oemhost1)(PORT=1521))\n\
  \        (ADDRESS=(PROTOCOL=TCP)(HOST=oemhost2)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=emrepsrvc.\n\
  \        smrcy.com))(FAILOVER_MODE=(TYPE=select)(METHOD=basic)))\n        Repository\
  \ User : sysman\n        ```\n\n### 第 3 级 — 使用 SLB 和 RAC Data Guard 存储库的主动/主动 OMS\n\
  \n\n\n# 三级高可用性配置\n\n在上一节中，我们确定了当 `OMS` 故障转移到另一台主机时，会出现一定的停机时间。某些环境无法容忍此类停机，因此需要提高可用性级别。幸运的是，这可以通过使用多个管理服务器并结合\
  \ `RAC` 数据库作为存储库来实现。`RAC` 为数据库提供了高可用性和可扩展性。你也可以考虑采用主动/被动 `RAC One Node`⁷ 配置。此外，还使用本地物理备用数据库来保护数据库以防数据库存储故障。管理服务位于服务器负载均衡器（`SLB`）之后。`SLB`\
  \ 随后将来自企业管理器控制台和管理代理的流量定向到可用的 `OMS`。每个管理服务器可以安装在与 `RAC` 节点不同的主机上（参见图 13-16）。然而，你可能需要平衡使用独立服务器的成本与此类配置所需的保护级别。管理服务器和存储库数据库应彼此靠近以减少网络延迟。这可能要求管理服务器和\
  \ `RAC` 数据库实例共存于同一服务器上。\n\n![9781430249382_Fig13-16.jpg](img/9781430249382_Fig13-16.jpg)\n\
  \n图 13-16 .  三级高可用性配置：多个 `OMS` 配置在服务器负载均衡器之后，并使用 `RAC` 数据库作为管理存储库\n\n此级别的可用性还提供了根据业务需求进行扩展的能力。可以添加更多\
  \ `OMS` 服务器以进行横向扩展，同时可以向 `RAC` 数据库添加节点以扩展存储库。\n\n## 配置步骤\n\n设置三级高可用性配置所需的步骤如下：\n\
  \n1.  安装主 `OMS`。\n2.  配置 `SLB`。\n3.  添加存储库目标。\n4.  配置软件库。\n5.  添加第二个 `OMS`。\n6.\
  \  创建备用数据库。\n7.  将备用数据库转换为 `RAC`。\n\n## 初始 OMS 状态\n\n在首次安装第一个 `OMS` 后，代理和用户通过物理主机名连接：\n\
  \n```shell\n$ $OMS_HOME/bin/emctl status oms -details\nOracle Enterprise Manager\
  \ Cloud Control 12c Release 2  Copyright (c) 1996, 2012 Oracle Corporation.  All\
  \ rights reserved.\nEnter Enterprise Manager Root (SYSMAN) Password :\nConsole Server\
  \ Host        : oem1.example.com\nHTTP Console Port          : 7790\nHTTPS Console\
  \ Port         : 7803\nHTTP Upload Port           : 4890\nHTTPS Upload Port    \
  \      : 4904\nEM Instance Home           : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1\n\
  OMS Log Directory Location : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1/sysman/log\n\
  OMS is not configured with SLB or virtual hostname\nAgent Upload is locked.\nOMS\
  \ Console is locked.\nActive CA ID: 1\nConsole URL: https://oem1.example.com:443/em\n\
  Upload URL: https://oem1.example.com:4904/empbs/upload\n\nWLS Domain Information\n\
  Domain Name      : GCDomain\nAdmin Server Host: oem1.example.com\n\nManaged Server\
  \ Information\nManaged Server Instance Name: EMGC_OMS1\nManaged Server Instance\
  \ Host: oem1.example.com\nWebTier is Up\nOracle Management Server is Up\n```\n\n\
  ## 服务器负载均衡器配置\n\n当配置了服务器负载均衡器时，`SLB` 会将代理和控制台流量定向到多个管理服务。`SLB` 配置应在安装第一个 `OMS` 之后进行。\n\
  \n### SLB 配置要求\n\n`SLB` 的配置可能因设备制造商而异。然而，`SLB` 有几个要求，列举如下：\n\n*   `虚拟服务器端口`：应配置四个端口——安全上传、代理注册、安全控制台和非安全控制台。如果\
  \ `OMS` 仅配置了安全上传和代理流量，则只需要安全上传和安全控制台虚拟服务器端口。\n*   `持久性`：企业管理器控制台与 `OMS` 之间的 `HTTP`\
  \ 和 `HTTPS` 流量需要持久性或“粘性”，以便发送到某个 `OMS` 的请求在同一会话期间不会切换到另一个。没有持久性可能导致用户因会话被不同的管理服务处理而不得不持续登录。\n\
  *   `应用程序监控`：检查管理服务的健康状况，以便请求不会被发送到不可用或性能下降的服务。\n\n除了这些要求，某些设备可能还需要额外的设置，例如 `F5\
  \ BIG-IP TCP 配置文件`。表 13-2 展示了一个仅使用安全上传和安全控制台端口的管理端口配置示例。\n\n表 13-2. 管理服务端口\n\n![Table13-2](img/Table13-2.jpg)\n\
  \n上述配置假设安全上传端口配置为端口 `4899`，安全控制台端口配置为端口 `7803`。这些端口在 `OMS` 安装过程中配置。请确认你提供了与企业管理器云控制\
  \ `12c` 安装期间使用的相同端口。虚拟主机名和 `IP` 地址也在 `DNS` 中注册，以允许客户端连接到 `SLB`。\n\n### SLB 配置项\n\
  \n接下来你需要创建以下项目：\n\n*   `池`：两台或多台 `OMS` 服务器的组，进行负载均衡，每个池运行不同的管理服务。\n*   `运行状况检查器`：确定服务正在运行并可接受连接。\n\
  *   `虚拟服务器`：代表服务器池的唯一 `IP` 地址和端口。\n\n## 使用 SLB 保护 OMS\n\n`SLB` 配置完成后，下一步是配置 `OMS`\
  \ 以使用 `SLB`。为此，你需要重新保护管理服务以重新生成证书。\n\n```shell\nemctl secure oms –sysman_pwd <sysman_password>\
  \ \\\n       -reg_pwd <agent_reg_password> \\\n       -host <virtualhostname> \\\
  \n       -secure_port 4899 \\\n       -slb_port 4899 \\\n       -slb_console_port\
  \ 443 \\\n       -console \\\n       –lock_console\n```\n\n以下示例说明了通过使用端口 `4904`\
  \ 的 `HTTPS` 上传和端口 `443` 的 `HTTPS` 控制台，利用 `SLB` 虚拟主机名保护 `OMS`。控制台也被锁定以防止非 `HTTPS`\
  \ 流量访问。\n\n```shell\n$OMS_HOME/bin/emctl secure oms -sysman_pass \\\n-reg_pwd regpass\
  \ \\\n-host slb.example.com \\\n-secure_port 4904 \\\n-slb_port 4904 \\\n-slb_console_port\
  \ 443 \\\n-reset \\\n-console \\\n-lock_console\nOracle Enterprise Manager Cloud\
  \ Control 12c Release 2\nCopyright (c) 1996, 2012 Oracle Corporation.  All rights\
  \ reserved.\nSecuring OMS... Started.\nSecuring OMS... Successful\nRestart OMS\n\
  ```\n\n运行这些命令后，需要重启 `OMS`。\n\n```shell\nemctl stop oms –all\n\nemctl start oms\n\
  ```\n\n## 验证配置\n\n要验证 `OMS` 是否已成功保护，请执行以下命令：\n\n```shell\nemctl status oms –details\n\
  ```\n\n此命令的输出应表明已配置 `SLB` 或虚拟主机名，以及 `SLB` `HTTPS` 上传和 `HTTPS` 控制台的端口。\n\n\n```\n\
  $ $OMS_HOME/bin/emctl status oms -details\nOracle Enterprise Manager Cloud Control\
  \ 12c Release 2  Copyright (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n\
  Enter Enterprise Manager Root (SYSMAN) Password :\nConsole Server Host        :\
