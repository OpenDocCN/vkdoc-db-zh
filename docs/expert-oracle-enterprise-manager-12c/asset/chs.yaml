  \ Cloud Control 12c 的安装。\n\n![9781430249382_Fig02-37.jpg](img/9781430249382_Fig02-37.jpg)\n\
  \n图 2-37. 安装完成\n\n## 15.  现在您可以登录到 Enterprise Manager Cloud Control，如图 2-38 所示。\n\
  \n![9781430249382_Fig02-38.jpg](img/9781430249382_Fig02-38.jpg)\n\n图 2-38. Oracle\
  \ Enterprise Manager 登录屏幕\n\n## 部署管理代理\n\nOracle Management Agent 是 Enterprise Manager\
  \ Cloud Control 的核心组件之一。如果您想要监控在某个主机上运行的目标（例如数据库或应用服务器），您需要通过部署管理代理将该主机转换为受管主机。然后您就可以发现该主机上运行的目标并将其添加到\
  \ Enterprise Manager 系统。\n\n有几种部署代理的方式：\n\n*   使用“添加主机目标”向导\n*   使用 RPM 文件\n*  \
