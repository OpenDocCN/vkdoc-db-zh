  \n图 4-16. 角色创建向导 — 步骤 3\n\n4.  最后，将任何现有用户添加到该角色。在此示例中，添加 `Joe_DBA`。要进行分配，请将管理员从左侧列表框移动到右侧列表框，如图\
  \ 4-17 所示。单击 **下一步** 以继续向导。\n\n![9781430249382_Fig04-17.jpg](img/9781430249382_Fig04-17.jpg)\n\
  \n图 4-17. 角色创建向导 — 步骤 4\n\n5.  最后，单击 **复查**，然后单击 **完成**，您就创建了新角色。\n\n![image](img/sq.jpg)\
  \ **注意** Oracle 提供了 `PUBLIC` 角色，专门用于适合所有 EM 安装用户的定制。\n\n## 配置支持集成\n\nEnterprise\
  \ Manager 与 **My Oracle Support** 网站紧密集成，该网站面向所有拥有支持合同的客户开放。然而，不设置此集成的客户站点并不少见。这是一个重大错误。幸运的是，Cloud\
  \ Control 菜单栏使所需任务变得简单明了。\n\n配置与 **My Oracle Support** 的集成可提供以下关键优势，使您支持 Oracle\
  \ 的工作变得更加轻松：\n\n*   增强的事件和问题报告\n*   从 Enterprise Manager 内部访问支持知识库\n*   补丁生命周期管理\n\
  \n支持集成需要设置以下内容：从 OMS 访问 **My Oracle Support** 网站的权限、代理配置以及 **My Oracle Support**\
  \ 凭证。此外，您可以通过将受管目标链接到该 CSI 的管理员帐户，有选择地将受管目标分配给不同的客户支持标识符（CSI）。\n\n### 代理配置\n\n在大多数组织中，从公司网络访问互联网是通过使用代理服务器来控制的。该服务器旨在充当促进和控制对互联网资源访问的中介。在这种情况下，您需要访问的资源是\
  \ **My Oracle Support** Web 门户以及提供 Oracle 客户作为支持合同一部分可请求的服务的各种 Oracle 和第三方服务器。在本节中，您将逐步完成代理配置。如果您的组织有一个通过\
  \ Microsoft Active Directory 域自动对用户进行身份验证的代理服务器，您可能需要阅读即将介绍的“使用 NTLMAPS 代理”部分作为解决方法。\n\
  \n### 配置代理服务器访问\n\n请完成以下步骤来配置代理服务器：\n\n1.  从 **设置** 菜单中选择 `代理设置`。出现如图 4-18 所示的屏幕。\n\
  \n![9781430249382_Fig04-18.jpg](img/9781430249382_Fig04-18.jpg)\n\n图 4-18. 代理详细信息\n\
  \n2.  输入您的代理服务器详细信息，或者输入您配置为替代方案的 NTLMAPS 代理详细信息，以及任何必要的身份验证。使用 `测试` 按钮测试对 `updates.oracle.com`\
  \ 的访问。\n3.  您可能还希望确保代理**不**用于代理到 OMS 的通信。为此，请选择页面底部的 **不使用代理** 选项，如图 4-19 所示。\n\n\
  ![9781430249382_Fig04-19.jpg](img/9781430249382_Fig04-19.jpg)\n\n图 4-19. 将代理排除在代理访问之外\n\
  \n4.  最后一步是配置 MOS 凭证。这可以并且应该为 `SYSMAN` 完成，也许使用组织拥有的通用帐户（例如 `em@lab.org`）。这可以通过使用图\
  \ 4-20 所示的 `设置凭证` 菜单选项来完成。\n\n![9781430249382_Fig04-20.jpg](img/9781430249382_Fig04-20.jpg)\n\
  \n图 4-20. 配置 My Oracle Support 凭证\n\n\n**注意** 如果您因是第三方支持公司而拥有多个客户支持标识符（CSI），您可以为不同目标分配不同的\
  \ CSI。这样，每位管理员将只能根据其合同规定，获得其授权范围内的系统支持。您可以通过“支持标识符分配”选项进行设置。\n\n虽然使用质询/响应机制的简单代理认证设置起来很简单，但多年来，企业管理员中与代理配置相关的错误屡见不鲜。产品在这方面确实在不断改进；然而，在与使用\
  \ NTLM 自动认证用户的公司企业代理服务器进行认证时，您可能仍会遇到问题——考虑到 Active Directory 作为认证存储库在市场中的普遍存在，这种配置相当常见。这是因为云控制不支持\
  \ NTLM 代理服务器。因此，Oracle 官方建议是将各种 oracle.com 站点排除在公司代理配置之外。\n\n## 使用 NTLMAPS 代理\n\n\
  NTLM 认证代理服务器 (`NTLMAPS`) 是一个代理服务器——本质上是一个智能的 Python 脚本和一些开源的 NTLM 库，它将针对互联网 URI\
  \ 的请求重定向到上游或父代理服务器。如果需要，它会添加适当的浏览器标头，并且，对于 `EM12c` 至关重要的是，它能使用 NT 凭证正确地通过上游代理服务器认证。该项目在\
  \ GNU 通用公共许可证下授权，因此是免费的，可以在 [`ntlmaps.sourceforge.net/`](http://ntlmaps.sourceforge.net/)\
  \ 找到。\n\n**注意** 本节介绍的是使用轻量级开源专用代理的替代解决方案的设置。如果您选择使用此选项，请确保获得网络管理员的同意。\n\n这意味着我们可以运行自己的代理服务器，无需云控制知晓\
  \ Active Directory 认证，同时仍能使用公司代理进行认证，并遵守所有公司安全规则。安装时，请下载并解压发行版到 `/opt/ntlmaps`。如果您使用的是\
  \ RedHat 或类似系统，Python 已作为标准发行版的一部分提供。否则，您还需要安装 Python。`NTLMAPS` 使用配置文件 `server.cfg`。您需要为以下参数输入值：\n\
  \n*   `PARENT_PROXY`：父服务器的 IP 地址\n*   `PARENT_PORT`：父服务器监听的端口\n*   `USER`：配置的 Active\
  \ Directory 用户名\n*   `PASSWORD`：该用户的配置的 AD 密码\n*   `NT_DOMAIN`：NT 域名\n\n完成这些设置后，暂时通过执行提供的脚本\
  \ `python main.py` 手动启动代理服务器。默认情况下，`NTLMAPS` 使用端口 `5865`。这个端口通常应该是可以接受的。无论您选择哪种方式，现在都应该为\
  \ `OMS` 服务器配置互联网访问，在上文“配置代理服务器访问”的步骤 2 中，将代理地址设置为 `NTLMAPS` 的地址。一旦代理正常工作，下一步就是使用\
  \ `chkconfig` 配置一个 Linux 服务。我使用的脚本是本书代码库中提供的一个开源脚本。\n\n### 通知\n\n企业管理员的主要作用之一是，当受管目标遇到需要关注的事件时触发警报。典型的例子包括\
  \ Web 服务器宕机或数据存储因数据增加而空间不足。企业管理员将此任务分为两个不同的阶段：警报和通知。这两个区域都可以从云控制菜单栏进行配置。\n\n警报阶段关注的是记录特定事件的发生，通常由某个度量驱动。经管理服务器处理后，该信息会在目标主页上显示。警报会触发但不一定为管理员引发警报这一事实，是新用户对该产品感到困惑的常见原因。\n\
  \n相比之下，通知阶段是通过某种方式发送警报详细信息，以使相应的管理员能够响应警报状况的过程。例如，可能会呼叫一位数据库管理员（`DBA`），让她知道数据库的系统表空间空间严重不足，需要紧急增加空间。传统上，通知通过电子邮件进行，但也可以通过\
  \ `SNMP` 路由（例如发送到运营控制中心）、由数据库管理员或数据库开发人员编写的 `PL/SQL` 过程，或通过在管理服务器上运行操作系统命令（可能是 shell\
  \ 脚本）来实现。\n\n一旦您成功安装了企业管理员并使用 `SYSMAN` 账户登录后，您的首要任务之一应该是添加一个可用于通知您所设置管理员的通知方法。在此示例中，我们将使用电子邮件，因为这是实际安装中最常见的方法。要开始此过程，请选择“设置”>\
  \ “通知”> “通知方法”，如 图 4-21 所示。\n\n![9781430249382_Fig04-21.jpg](img/9781430249382_Fig04-21.jpg)\n\
  \n图 4-21. 通知方法\n\n然后会显示如 图 4-22 所示的屏幕。您可以使用此屏幕设置公司邮件服务器的详细信息以及所需的任何认证凭据。您使用的邮件服务器*必须*配置为允许\
  \ `SMTP` 通信。您可能需要询问您的邮件管理员应该使用哪些服务器，因为许多公司邮件配置只允许来自特定服务器的 `SMTP`，并且可能要求您配置的账户是特定组的成员。\n\
  \n![9781430249382_Fig04-22.jpg](img/9781430249382_Fig04-22.jpg)\n\n图 4-22. SMTP\
  \ 服务器详细信息\n\n默认情况下，企业管理员提供两种用于发送事件通知的电子邮件模板，分别称为长格式和短格式电子邮件。您可能需要自定义这些模板，特别是为了确保您的电子邮件客户端已配置规则以高效处理这些邮件。要自定义电子邮件格式，请从“通知”子菜单（如前面的\
  \ 图 4-21 所示）中选择“自定义电子邮件格式”。这将显示如 图 4-23 所示的屏幕，默认显示度量警报的长格式，不过您可以通过屏幕顶部的下拉菜单更改此设置。\n\
  \n![9781430249382_Fig04-23.jpg](img/9781430249382_Fig04-23.jpg)\n\n图 4-23. 电子邮件自定义\n\
  \n## 通知格式定制\n\n如你所见，长格式命名详尽，提供了几乎所有你可能需要的信息。遗憾的是，它几乎无法阅读。此时，你可能会选择查看短格式，如 **图 4-24**\
  \ 所示，尤其是当这些消息要发送到移动设备（如手机或寻呼机）时。不幸的是，这种格式将简洁性发挥到了极致，甚至没有包含引发告警的度量细节。这是一个设计特性，专门将消息长度限制在\
  \ 155 个字符以内。此限制旨在允许通过 SMS 发送，尽管提供商的限制和 SMS 的字符集可能比这更少（例如，许多限制为 140 个字符）。因此，为了生产使用，你无疑会希望自定义这两种格式之一。\n\
  \n![9781430249382_Fig04-24.jpg](img/9781430249382_Fig04-24.jpg)\n\n**图 4-24. 短格式通知**\n\
  \n![image](img/sq.jpg) **提示**  我们建议你从短格式开始并扩展它，而不是从长格式中删减。\n\n定制是一个相对简单的过程，由配置纯文本和占位符的混合组成，这些占位符在运行时会被告警的属性（例如，目标名称或告警时间戳）替换。注释可以用\
  \ `--` 字符组合进行前缀，就像 SQL 语句一样。此外，可以应用条件逻辑来包含相关详细信息，例如，如果这是一个重复通知。目前尚无创建新告警模板的能力，因此你只能使用这两种邮件格式。然而，通过仔细使用条件逻辑功能并配合适当的属性，可以有效地规避这一限制。例如，可以基于目标部署类型为生产环境和\
  \ QA 定义不同的短格式响应模板。**图 4-25** 展示了一个为生产环境定义所有告警类型（包括重复告警），而仅为 QA 定义一个常规邮件的示例。\n\n\
  ![9781430249382_Fig04-25.jpg](img/9781430249382_Fig04-25.jpg)\n\n**图 4-25. 条件格式逻辑的使用**\n\
  \n### 管理包访问\n\n客户经常反对实施 Oracle Enterprise Manager 的一个主要原因是其感知成本。尽管 Enterprise Manager\
  \ 本身是一个完全免费的产品。然而，该产品以易于使用的方式暴露了按目标许可的高级功能。这些功能包含在管理包中。由于 GUI 使得管理员能够轻松访问他们未获许可的功能，因此在实施后不久应执行的任务之一是为你目标配置管理包访问。这需要从\
  \ `Cloud Control` 菜单完成。\n\n要开始该过程，请从 `Setup` 菜单中选择 `Management Packs`。其子菜单有四个选项，如\
  \ **图 4-26** 所示。\n\n![9781430249382_Fig04-26.jpg](img/9781430249382_Fig04-26.jpg)\n\
  \n**图 4-26. 管理包配置菜单**\n\n`Management Pack Access` 选项允许你启用——更重要的是，禁用——你未付费因此无权使用的高级功能。**图\
  \ 4-27** 显示了展示这些选项的屏幕。\n\n![9781430249382_Fig04-27.jpg](img/9781430249382_Fig04-27.jpg)\n\
  \n**图 4-27. 限制对管理包的访问**\n\n`Management Packs` 子菜单的 `License Information` 项会带你前往一个长列表，其中包含你可以购买以帮助管理和管理\
  \ Oracle 产品的各种管理包和插件。这些包和插件扩展了 Enterprise Manager 和/或基础产品的功能，以提供增强的管理体验。\n\n此外，子菜单的\
  \ `Packs for This Page` 选项现在提供了一个弹出窗口，详细说明了访问给定 EM 页面所需的管理包。此功能在整个产品中可用。例如，在数据库性能主页上单击此菜单选项会产生\
  \ **图 4-28** 所示的对话框。\n\n![9781430249382_Fig04-28.jpg](img/9781430249382_Fig04-28.jpg)\n\
  \n**图 4-28. 显示所需管理包的“此页面的包”示例**\n\n![image](img/sq.jpg) **注意**  遗憾的是，`Packs for\
  \ This Page` 功能提供的包访问信息粒度不如先前版本中启用文本管理包标签那样细。\n\n## 导航菜单栏\n\n用于导航控制台界面本身的 `Navigation`\
  \ 菜单位于每个屏幕顶部的蓝色导航栏中。共有四个菜单，允许快速导航到以下位置：\n\n*   整个企业范围内的位置\n*   基于目标的管理页面\n*   保存的位置（或收藏夹）\n\
  *   访问过的位置（或历史记录）\n\n菜单栏如 **图 4-29** 所示。此外，导航栏在屏幕右侧还包含一个搜索框（图中未显示）。\n\n![9781430249382_Fig04-29.jpg](img/9781430249382_Fig04-29.jpg)\n\
  \n**图 4-29. 导航菜单栏条目**\n\n无论你在产品中导航到何处，这些菜单始终可用。其主要优点在于，你将始终拥有一致的方法来快速轻松地导航到所选位置。\n\
  \n### Enterprise 菜单\n\n`Enterprise` 菜单，如 **图 4-30** 所示，包含你全面了解企业运行状况所需的项，以及各种不适合基于目标菜单的项。\n\
  \n![9781430249382_Fig04-30.jpg](img/9781430249382_Fig04-30.jpg)\n\n**图 4-30. Enterprise\
  \ 菜单**\n\n接下来，你将了解该菜单的各种选项，然后花点时间看看可用的报告选项。\n\n#### 探索 Enterprise 菜单\n\n`Summary`\
  \ 项带你前往企业的整体摘要视图，该视图为你提供所有你有权访问的托管目标的实时状态信息的概览。对于熟悉先前产品版本的用户来说，这是传统的主页。\n\n`Monitoring`\
  \ 子菜单为你提供了几个企业范围的选项，用于审查和标准化整个企业的监控和管理。因此，例如，此菜单是定义监控模板和纠正措施的起点。此领域将在 **第 7 章**\
  \ 中介绍。现在，请注意此子菜单提供了一条通往监控和自动故障纠正一站式配置的途径。\n\n`Job` 子菜单是内置的 Enterprise Manager 作业调度程序的接口。这个集中式作业调度系统允许你在整个企业的托管目标上运行各种标准化作业。例如，可以定义标准化的\
  \ Recovery Manager (`RMAN`) 备份脚本，并将相同脚本部署到企业中的所有数据库。作业接口将在 **第 11 章** 中介绍。\n\n\n"
- '# 企业菜单功能


  ![image](img/sq.jpg) **提示** 您需要决定 `EM12c` 作业系统在您的环境中是否提供了足够的灵活性和可靠性，或者替代的作业调度系统是否满足您的要求。一般来说，如果您已有现成的企业调度器，我们推荐您使用它。如果您有一堆有些失控的
  shell 脚本，我们建议您，`EM12c` 提供了一个实现集中化和简化的契机。


  ## 报告子菜单


  报告子菜单旨在帮助您基于通过 `Oracle Enterprise Manager` 运行所积累的集中存储库数据生成报告。这部分信息提供了集中式管理数据存储库的大部分附加价值。我们将在本节末尾详细介绍此菜单的功能。


  ## 配置子菜单


  下一个子菜单是配置，它允许您收集和比较组织中受管目标的配置详情。这使您可以确保，例如，在两个相似的主机上安装了相同的操作系统软件包版本。此菜单体现了产品的配置管理能力。


  ## 合规性子菜单


  接下来是合规性子菜单。*合规性* 指的是特定目标的实际配置符合该类型配置项预定义标准的程度。该产品领域在 `12c` 版本中有了一些显著改进。在之前的版本中，所能实现的只是将受管目标与一组单一的、不可编辑的、预定义的最佳实践集进行比较。这有显著的缺点，要么是因为预定义策略限制过严，要么是因为不够严格。后者的最佳例子是受
  `支付卡行业 (PCI)` 标准约束的组织。


  ![9781430249382_Fig04-31.jpg](img/9781430249382_Fig04-31.jpg)


  **图 4-31.** 合规性子菜单


  全面覆盖目标合规性超出了本章的范围。不过，这里有一些基本概念供您入门。`Oracle` 设想，根据行业实践，您定义一套标准实践（例如，您将为数据库存储需求使用
  `自动存储管理 (ASM)`，或者数据库监听器不会使用默认端口 `1521`）。这些作为合规性标准规则单独管理。然后，您将一组相关规则归为一个公司标准，通常针对一种目标类型。因此，您可能会将您的
  `ASM` 标准，与声明您不会使用大文件表空间的标准，以及要求使用统一区大小的本地管理表空间的标准一起，整合为一个数据库存储标准。最后，您可以将相关的标准分组到一个合规性框架中。在我们的例子中，我们可以创建一个如上所述的存储标准，以及一个符合公司密码策略的数据库密码标准。然后，这两者可以一起归组，为您的组织形成一个数据库合规性框架。截至此版本，标准和策略规则可为您的组织编辑。此外，`Oracle`
  还随附了多个带有支持性标准和规则的合规性框架。


  ![image](img/sq.jpg) **注意** 这一个变化意味着，在之前版本中很少使用的 `Enterprise Manager` 的合规性功能，现在应该列入您的待调查清单。


  您创建的规则、标准和框架构成一个合规性库。您可以从合规性菜单中的库链接查看此库。`Enterprise Manager` 然后允许您通过两种方式确保合规性。首先，合规性分数是根据对受管目标评估您的合规性标准规则的结果计算出的加权平均值。该分数显示在目标和企业主页上。其次，合规性负责人可以交互式地查看目标状态，并使用
  `Enterprise Manager` 报告框架来维持公司对标准得到遵守的保证，并确保对标准的偏差通过纠正措施或记录不合规原因得到处理。


