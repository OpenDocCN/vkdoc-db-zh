  ### SQL 计划控制


  `计划控制`选项卡可用于高级功能，如`SQL 配置文件`、`SQL 补丁`和`SQL 计划基线`。此窗格有助于快速确定基线是否将计划锁定在潜在的次优执行计划版本中，以及是否存在`SQL
  配置文件`或`SQL 补丁`在控制优化器为窗格中详细信息的 SQL 所做的选择。与`SQL 详细信息`页面中的所有选项卡一样，您可以从面板右下角轻松执行 SQL
  工作表或安排`SQL 调优顾问`。


  ![image](img/sq.jpg) **注意** 由于`SQL 调优顾问`非常易于使用且每晚自动运行，`SQL 配置文件`正成为数据库标准。这种提示、大纲和统计信息的组合，通过其`SQL
  ID`连接到语句，为 DBA 在流程存在复杂问题时解决棘手问题提供了快速解决方案。由于`SQL 配置文件`仅通过`SQL ID`连接，对 SQL 语句的任何更改都会导致`SQL
  配置文件`停止工作。


  ## SQL 调优历史记录


  `调优历史记录`选项卡支持`SQL 详细信息`页面的`计划控制`部分，提供有关针对所详述 SQL 的先前顾问任务或在相关历史时期内的任何`ADDM`发现的历史信息。如果已针对`SQL
  ID`执行了`SQL 调优`任务，它将在历史记录中显示，并且即使计划未实施，也有链接可用于查看有关发现的详细信息。


  ### SQL 监控


  `SQL 监控`选项卡提供了完整`SQL Monitor`（本章后面将详细介绍）中所提供内容的微观视图。这清晰地显示了会话正在执行的 SQL、会话涉及的先前执行中已完成的
  SQL、每次执行耗时多久、I/O 请求以及开始/完成时间（参见图 9-20）。


