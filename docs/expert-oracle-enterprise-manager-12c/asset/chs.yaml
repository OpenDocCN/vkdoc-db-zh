- "# Oracle Enterprise Manager Cloud Control 12c 扩展性指南\n\n## 概述\n\nOracle Enterprise\
  \ Manager (OEM) 的 10g 和 11g 版本引入了一些基础功能，旨在帮助该产品成为一个企业级可管理性和监控框架。然而，OEM 首先是一个为 Oracle\
  \ 产品构建的可管理性工具，其部分功能扩展了对其他非开箱即用目标类型的支持能力。Oracle Enterprise Manager Cloud Control\
  \ 12c 已被彻底重新架构，其首要定位是一个企业级可管理性框架。几乎所有针对特定 Oracle 及第三方产品的管理和监控功能，都是作为插件构建在该框架之上。\n\
  \n就像之前版本的 OEM 一样，EM12c 为用户和产品供应商提供了两种基本方式来扩展其能力。本章第一部分介绍最简单的方式：*度量扩展* (Metric Extensions)。第二部分涵盖管理插件开发的基础知识以及一些高级功能。\n\
  \n我建议您在阅读本章时尝试动手操作示例，并备好 EM12c 可扩展性文档作为参考。全面覆盖该主题需要单独一本书，而本章更像是对扩展 EM12c 的一个介绍。\n\
  \n然而，即使您不打算自己开发插件，也不要跳过本章。了解 EM12c 的内部机制将帮助您更好地理解其工作原理。最终，这将使您更高效，并发现该环境更直观易用。\n\
  \n## 度量扩展\n\nEM12c 中的*度量扩展*取代了最初在 OEM 10g 中引入、现已于 12c 中弃用的用户定义度量 (User-Defined Metrics,\
  \ UDMs)。与 UDMs 相比，度量扩展在数据收集方面提供了更大的灵活性，并且更易于大规模部署和管理。\n\n正如您现在应该已经了解的，每个受监控目标都附带一组由插件创建者（可能是\
  \ Oracle 或第三方供应商）设计的预定义度量。例如，主机目标收集 CPU 利用率度量，Oracle Database 目标收集物理 IO 度量等。通常这些度量已足够，但有时您可能希望收集比开箱即用更多的度量，以监控特定于您的环境或应用程序的状况。\n\
  \n度量扩展由部署在其所在主机上的代理运行。虽然您是通过 OMS 集中创建和管理度量扩展，但它们需要分发到监控已部署度量扩展的目标的代理上。一旦度量扩展部署到某个代理的第一个目标上，该分发过程就会自动完成。\n\
  \n与旧式的 UDMs 相比，度量扩展的开发生命周期稍微复杂一些，但这正是度量扩展在多用户环境中更易于大规模管理的原因。要访问度量扩展主页，请选择 **Enterprise**\
  \ → **Monitoring** → **Metric Extensions**。在那里，您将看到度量扩展开发生命周期的快速概览，如图 10-1 所示。\n\
  \n![图 10-1：度量扩展开发生命周期](img/9781430249382_Fig10-01.jpg)\n\n*图 10-1. 度量扩展开发生命周期*\n\
  \n## 您的第一个度量扩展\n\n让我们创建一个示例度量，以便您了解实际过程。假设您需要监控数据库中的会话接近其每会话最大打开游标数的程度。该最大值由 `open_cursors`\
  \ init.ora 参数控制。您可以使用清单 10-1 中的查询，返回相对于定义最大值的打开游标百分比。\n\n***清单 10-1***. 用于打开游标度量扩展的\
  \ SQL\n\n```sql\nSELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct\n\
  \  FROM (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
  \        GROUP BY sid\n        ORDER BY 2 DESC) c,\n       v$parameter p\n WHERE\
  \ p.name = 'open_cursors' AND ROWNUM = 1\n```\n\n### 创建新的度量扩展\n\n要创建此度量，请单击度量扩展主页上可用度量扩展列表上方的\
  \ `Create` 按钮。如果该按钮呈灰色且不可点击，说明您没有创建新度量扩展的权限。您需要由 EM 超级管理员授予 `Create Metric Extension`\
  \ 权限。此权限在资源特权屏幕的 `Metric Extensions Resource` 行中，在创建或编辑 EM 用户时分配。只有一个相关权限：`Create\
  \ Metric Extension`。此权限允许您创建和导入新的度量扩展。\n\n单击 `Create` 按钮后，新的度量扩展向导将会出现。图 10-2 显示了该向导的“常规属性”选项卡。\n\
  \n![图 10-2：open_cursors_pct 度量扩展的常规属性](img/9781430249382_Fig10-02.jpg)\n\n*图 10-2.\
  \ open_cursors_pct 度量扩展的常规属性*\n\n将“目标类型”选项设置为 `Database Instance`，以便该度量可以部署在单实例数据库以及\
  \ RAC 数据库的每个实例上。如果您要从真实表中选择度量或监控全局条件（例如队列表中的消息数量），您应将“目标类型”设置为 `Cluster Database`\
  \ 而不是每个 RAC 数据库实例。将“名称”属性设置为 `open_cursors_pct`。这是 EM 内部使用的名称，如果您以后需要从存储库中提取信息（例如为自定义报告编写\
  \ SQL 语句），将会用到它。选择 `SQL` 作为适配器，并选择 1 分钟的采集间隔和 1 的上传间隔（表示每次采集后上传）。我建议您谨慎选择采集间隔，避免采集度量的频率高于\
  \ 5-15 分钟。您应该仅将少数需要快速通知的关键度量的间隔设置为低于 5 分钟。否则，您将对代理和 EM 框架的其余部分引入显著的额外开销，以处理和存储过量的数据。在测试和开发期间（如本示例）使用\
  \ 1 分钟的采集间隔是可以的，以避免等待度量历史记录出现的时间过长。在“适配器”选项卡上，将清单 10-1 中的 SQL 文本复制到“基本属性”部分的“SQL\
  \ 查询”字段中。在此示例中，您不会使用任何高级属性或上传文件。\n\n接下来是“列”选项卡。向度量添加一个列，并根据图 10-3 进行定义。\n\n![图 10-3：度量扩展列](img/9781430249382_Fig10-03.jpg)\n\
  \n*图 10-3. 度量扩展列*\n\n在“警报阈值”部分，选择大于号 (`>`) 比较运算符。将警告和严重状况的默认阈值分别设置为 70% 和 90%。在高级选项中，您可以编辑触发警报前的发生次数，以及创建自定义消息。您还可以将度量分配到预定义的类别之一，然后\
  \ EM12c 控制台会将您的度量与其他类似度量进行分组。\n\n在“凭证”选项卡上，保留“使用默认监视凭证”。现在，您已准备好测试您的度量。\n\n\n##\
  \ 测试度量扩展\n\n在**测试**选项卡中，添加一个或多个数据库（请记住，如果您不是超级管理员用户，您应该对这些数据库拥有**查看**权限）。然后点击**运行测试**按钮。您应该会看到收集进度对话框短暂出现（除非您选择了许多数据库实例），随后收集结果将被显示。如果没有错误信息且结果符合预期，您就可以继续在**审查**选项卡上完成操作。\n\
  \n如果您点击**完成**按钮后度量扩展创建成功，您将在**度量扩展**主页上看到它，其状态为`可编辑`。您还会看到此度量扩展的版本为`1`。在`可编辑`状态下编辑度量扩展不会增加版本号。您可以多次检查和编辑您的度量扩展，直到在实时测试对话框中按预期完成收集工作。\n\
  \n如果初稿运行符合预期，下一步就是在真实目标上执行测试运行。在将度量部署到目标之前，必须先将其保存为可部署的草稿。选择您的度量，然后从度量扩展表格上方的**操作**菜单中选择**另存为可部署草稿**。度量的状态将变为`可部署草稿`。在此阶段，度量仅对您（其所有者）可见，除非您通过**操作**\
  \ -> **管理访问权限**明确授予其他用户或角色权限。另请注意，除非您创建新版本（稍后将进行），否则无法编辑处于`可部署草稿`状态的度量扩展。\n\n为确保您的度量扩展按预期运行，让我们将其部署到一些目标。这通过选择**操作**\
  \ -> **部署到目标**来完成。选择目标并提交部署作业后，度量扩展将在后台运行。所有部署作业都是异步操作，在`EM12c`中作为作业调度。在少数目标上部署度量扩展通常非常快，因此您可以点击右上角的刷新图标，如果作业从待处理部署列表中消失，并且没有出现在屏幕下半部分的失败部署列表中，则表示部署成功。您还可以从**度量扩展**主页查看部署进度，该主页指示待处理和失败部署的总数，以及库中每个度量扩展的已部署目标数量，如图\
  \ 10-4 所示。\n\n![9781430249382_Fig10-04.jpg](img/9781430249382_Fig10-04.jpg)\n\n\
  图 10-4. 显示部署状态的`度量扩展`主页\n\n现在度量扩展已经部署，您可以像使用`数据库实例`目标类型附带的任何其他开箱即用的度量一样使用它。收集几个小时后，您可能会看到类似于图\
  \ 10-5 中的数据。要进入此屏幕，您需要导航到已部署度量的目标，然后从目标的菜单中选择**Oracle Database** -> **监控** -> **所有度量**。请注意，与用户定义的度量不同，度量扩展没有自己的视图。\n\
  \n![9781430249382_Fig10-05.jpg](img/9781430249382_Fig10-05.jpg)\n\n图 10-5. 度量扩展详细信息和历史记录\n\
  \n## 发布度量扩展\n\n当您的度量按预期工作时，您就可以发布它，以便任何`EM`用户都可以部署该度量扩展。请注意，处于`可部署草稿`状态的已部署度量扩展对所有可以查看该目标的用户都是可见的。他们甚至可以编辑度量设置，就像对任何其他度量一样。发布度量扩展只是提供了将此度量扩展（或更准确地说，此特定版本的度量扩展）部署到其他目标的能力。\n\
  \n您可以从**度量扩展**主页通过选择**操作** -> **发布度量扩展**来发布度量扩展。状态变为`已发布`，并且该度量扩展对任何`EM`用户可用。请注意，`已发布`度量也可以包含在**监控模板**中，这是与`可部署草稿`状态的另一个重要区别。\n\
  \n现在假设度量运行良好，但一段时间后，您意识到拥有关于会话的额外信息会很有帮助。您希望看到打开的游标的最高数量，而不仅仅是打开游标计数接近限制的程度。在度量本身中拥有`SID`、`用户名`、`客户端机器`、`客户端操作系统用户`和`客户端程序`信息将极大地帮助您对新度量扩展生成的警报进行故障排除。\n\
  \n## 创建度量扩展的新版本\n\n让我们改进您刚刚创建的度量扩展。从**度量扩展**主页中，选择当前版本并选择**操作** -> **创建下一版本**。然后更改反映描述中更改的常规属性。\n\
  \n在**适配器**选项卡上，用清单 10-2 中的`SQL`替换旧的`SQL`，该`SQL`收集有关具有最多打开游标的会话的信息。\n\n清单 10-2. 用于打开游标的度量扩展的修改后`SQL`\n\
  \n```sql\nSELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct,\n    \
  \   c.open_cursors, c.sid, s.username, s.machine,\n       s.program, s.osuser, s.process\n\
  \  FROM (select * from (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
  \        GROUP BY sid\n        ORDER BY COUNT (*) DESC)\n        WHERE ROWNUM =\
  \ 1) c,\n       v$parameter p, v$session s\n WHERE p.name = 'open_cursors'\n   AND\
  \ s.sid = c.sid\n```\n\n在**列**选项卡上，您需要添加新列。请注意，您仅在`open_cursors`列上设置了比较运算符，以防有人想使用绝对游标计数作为阈值。其他列不能设置任何警告或严重状况，因为它们仅用于提供信息。参见图\
  \ 10-6。\n\n![9781430249382_Fig10-06.jpg](img/9781430249382_Fig10-06.jpg)\n\n图 10-6.\
  \ 修改后的打开游标度量扩展的列列表\n\n现在测试您的度量扩展。如果一切正常且度量收集工作正常，请完成其创建。您将看到同一个度量扩展的下一个版本，版本号为`2`，出现在**度量扩展**主页上。您现在可以将版本`2`另存为`可部署草稿`并部署它以验证其是否按预期工作。如果该目标上已部署了先前版本的度量扩展，它将被升级。最后一步是发布最新版本，以便所有`EM12c`用户都可以使用它。\n\
  \n当发布度量扩展的更新版本时，可以从显示目标部署的屏幕完成旧部署的升级。您可以从**度量扩展**主页访问此屏幕：点击先前版本度量扩展的已部署目标数量链接，然后点击**部署**按钮（首先选择要升级的所有目标）。完成后，您将在此度量中看到更多列。新的度量扩展收集结果将类似于图\
  \ 10-7。\n\n\n![9781430249382_Fig10-07.jpg](img/9781430249382_Fig10-07.jpg)\n\n图\
  \ 10-7. 修改后的开放游标指标扩展\n\n请注意，你可能希望获取到的不仅仅是单个具有开放游标的顶级会话——也许是前十个。为此，你需要将你的指标扩展转换为多行指标，这需要将一个或多个列作为键列。在这种情况下，你可以使用\
  \ `SID` 列作为键，然后修改查询以返回前十个会话。遗憾的是，在指标扩展的下一个版本中，你将无法添加键列，而是需要创建一个新的指标扩展。幸运的是，通过在指标扩展主页使用\
  \ `操作` ![arrow](img/arrow.jpg) `类似创建`，可以轻松克隆现有的指标扩展。请注意，创建新的指标扩展版本还有其他限制——例如，你不能移除或更改旧列的顺序，但可以更改显示名称。\n\
  \n尽管 `SID`（以及可以说 `SERIAL#`）对于键列来说已经足够，但请考虑在键中添加其他列。这样，告警通知就可以包含键值。默认的告警消息（在编辑指标扩展列时的高级设置中查看）如下所示：\n\
  \n*   %columnName% 的值对于 %keyValue% 来说是 %value%\n\n键值将由所有键通过逗号连接生成一个字符串，因此你的告警消息将如下所示：\n\
  \n*   对于会话 260,SYSMAN,em12c2.oracloid.com,OMS,oracle,1234，open_cursors_pct 的值是 72\n\
  \n你可以修改告警消息，使其更具描述性。例如，你的告警消息模板可以是这样的：\n\n*   会话 %keyValue%（SID，用户名，机器，程序，操作系统用户，进程）的开放游标百分比为\
  \ %value%\n\n从这条告警消息中，你立即就能看出哪些会话是问题所在。遗憾的是，目前无法引用指标的特定键列来使告警消息更用户友好。至少，我还没有找到方法。\n\
  \n到目前为止，你使用的是 SQL 适配器来收集指标。从 `12.1.0.2.0` 版本的 EM 开始，指标扩展提供了六个有文档记载的适配器，以及一个未记载的适配器。尽管你很可能主要会使用两个适配器（SQL\
  \ 适配器和 OS 命令—多列适配器），但为了获得更完整的概览，让我们回顾一下所有可用的适配器。\n\n### SQL 适配器\n\nSQL 适配器是你在前面的例子中使用的那个。因为你已经熟悉了它的基本功能，我们就只回顾一下它的附加选项。\n\
  \n如果你的 SQL 语句太长，你可能会倾向于上传一个 SQL 文件，而不是内联指定 SQL 代码。上传的 SQL 文件会随你的指标扩展一起分发到收集指标的代理上，然后由这些代理运行文件中的\
  \ SQL。\n\n如果你正在选择一组预定义的名称-值测量，你可以使用转置的结果，而不是创建一个两列的指标（名称作为键列，值作为数据列）。例如，假设你想使用代码清单\
  \ 10-3 中的查询来收集四个指标。你需要将第一列创建为键列。然而，你将无法控制列的命名，告警消息也只能是泛泛的。\n\n***代码清单 10-3***. 用于收集物理读和写的\
  \ SQL 语句\n\n```sql\nselect name, value\n  from v$sysstat\n where name in ('physical\
  \ read total IO requests',\n                'physical read total bytes',\n     \
  \           'physical write total IO requests',\n                'physical write\
  \ total bytes')\n order by name;\n\nNAME                                  VALUE\n\
  ------------------------------------- -----------\nphysical read total IO requests\
  \       2285653\nphysical read total bytes             21313147392\nphysical write\
  \ total IO requests      1245633\nphysical write total bytes            27849077248\n\
  ```\n\n注意，添加了 `ORDER BY` 子句是为了确保结果总是按相同顺序排列（在此例中，与 `IN` 列表中的顺序一致）。现在你只需要创建四个数据列，并且可以指定更具描述性的名称，比如*总物理读请求数*，以及自定义告警消息：\n\
  \n*   总物理读请求数过高 - %value%（警告阈值为 %warning_threshold%，严重阈值为 %critical_threshold%）\n\
  \n如本例所示，你可以在告警消息中包含阈值。\n\n你也可以在 SQL 文本中指定绑定变量，而不是字面量。然而，这仅在你能动态生成变量值时才真正有用，而指标扩展在这方面并未提供太多灵活性（除了预定义变量，但它们作为\
  \ SQL 参数并不十分有用）。如果你最终遇到这种情况，最好重新设计并通过使用额外的键列将这些指标扩展合并成一个。但是，如果你有多个使用相同 SQL 但不同字面量的指标扩展，那么绑定变量就是可行的方法。\n\
  \n也可以使用返回游标（这正是高级属性中 `Out` 参数的用途）的 `PL/SQL` 块，而不是简单的 SQL。如果你需要使用动态 SQL 或根据某些条件（例如\
  \ Oracle 数据库版本或你提取数据的应用程序版本）以不同方式执行指标收集，这会很有用。\n\n最后一个例子也展示了指标扩展的一个重要限制：当处理需要基于先前多次收集进行额外处理的数据时（例如本例中使用的累积计数器），它们不是很有用。我们真正感兴趣的并不是数据库实例启动以来的\
  \ `IO` 请求总数，而是收集周期内的平均 `IO` 请求次数。尽管公式会非常简单（两个收集值之差除以收集间隔），但指标扩展没有提供计算此类比率的方法。当然，你可以使用\
  \ `PL/SQL` 块来存储先前收集的计数器并计算每个间隔的比率，但这并不简单，并且当你的测量实际上导致了数据库的变化时，会引入更显著的测量侵入。\n\n无论你为指标扩展使用什么适配器，累积计数器的这个限制都存在。到目前为止，我们一直关注\
  \ SQL 适配器，但现在让我们看看其他选项。\n\n### OS 命令适配器\n\n有三种 OS 命令适配器，你可能比 SQL 适配器使用得更频繁。OS 命令适配器之间的区别仅在于它们是否可以收集多列和多行：\n\
  \n*   OS 命令—多列\n*   OS 命令—单列\n*   OS 命令—多值\n\n所有三种 OS 命令适配器都有三个基本属性：`命令`、`脚本` 和\
  \ `参数`。代理基本上是执行命令行，连接这三个属性。事实上，你可以在单个 `命令` 属性中指定它们全部，所以我们不确定为什么要用三个属性，除了使属性更具可读性。你可以上传脚本（甚至多个脚本、程序和其他所需文件），然后在任何属性中使用\
  \ `%scriptsDir%` 替换变量来引用上传文件的位置——例如，`Script` 属性的 `%scriptsDir%/myscript.sh`。\n\n\
  我强烈建议使用 Perl 脚本来确保你的指标扩展是平台无关的。每个 Oracle Management Agent 都附带相同版本的 Perl，因此你不会依赖于服务器上安装了哪个\
  \ Perl 版本（如果有的话）。只需在命令属性中使用 `%perlBin%/Perl`，它将自动替换为 Oracle Management Agent 附带的\
  \ Perl 二进制文件的位置（通常是 `<AGENT_HOME>Perl/bin/Perl`）。\n\n\n\n除了在命令行上传递参数外，还有几种其他方法。当你希望避免过长的命令行、避免处理与平台相关的不同转义规则，或者需要传递敏感信息（例如凭据）时（因为命令行参数在许多平台上很容易被任何用户看到），这些方法非常有用。传递参数的一种方法是使用环境变量。代理在调用操作系统命令之前设置环境变量，程序或脚本可以在执行过程中读取该变量。一种更好的传递参数方式是使用标准输入，然后由程序解析。Oracle\
  \ 将这种机制称为 `输入属性`。后者是将凭据传递给脚本的最安全方式，因为在某些平台上，即使是进程的环境变量也可以轻松检索。\n\n**注意** 有关环境变量和输入属性的更多详细信息，请参阅\
  \ `Oracle Enterprise Manager Cloud Control 12c 管理员指南`（第 8 章，“指标扩展”，第 8.4 节）。\n\n\
  ## 操作系统命令适配器的凭据\n\n操作系统命令适配器有两套凭据：主机凭据和输入凭据。`主机凭据` 用于登录运行目标类型代理的服务器。默认情况下，操作系统命令适配器使用默认监控凭据——即用于收集目标预定义指标的凭据。但是，你可以选择创建自己的主机凭据集，然后为计划部署指标扩展的目标设置凭据。例如，你可能需要以特定的操作系统用户（例如\
  \ `ROOT` 或运行代理本身之外的其他应用程序用户）身份运行收集脚本。请注意，SQL 适配器具有相同的功能，因此你可以定义自定义数据库凭据集，以与默认监控用户（例如\
  \ `DBSNMP`）不同的数据库用户身份运行。\n\n输入凭据是第二种可以定义的凭据类型。这些凭据完全独立于主机凭据，并使用标准输入传递给正在执行的程序或脚本，就像\
  \ `输入属性` 一样。`输入凭据` 的优势在于，你可以独立于指标扩展定义来设置它们。如果不同的目标需要不同的凭据，指标扩展的用户可以轻松定义凭据，而无需创建具有各种硬编码密码的唯一指标扩展——这正是如果使用\
  \ `输入属性` 传递凭据时你需要做的。\n\n**注意** 使用 `输入凭据` 的示例可以在 `Oracle Enterprise Manager Cloud\
  \ Control 12c 管理员指南`（第 8 章，“指标扩展”，第 8.4.1 节）中看到。\n\n## 操作系统命令—多列适配器\n\n现在让我们逐一看看操作系统命令适配器。\n\
  \n操作系统命令—多列适配器可能是你最常使用的。命令的输出由适配器解析，使得每一行成为单个行，然后每一行本身被标记化为多个值。无论行尾是以类 Unix 格式（单个\
  \ `LF`）还是 Windows 格式（`CR+LF`）标记，适配器都能正确分割行。\n\n该适配器允许使用“以...开始”前缀来过滤掉输出中不包含指标的行。这是一种良好的实践，可以防止潜在的输出噪声干扰——例如，未预期或你只想忽略的警告。广泛接受的前缀标准是\
  \ `em_result=`。清单 10-4 显示了一个输出示例。\n\n***清单 10-4***. 使用 `em_result=` 前缀的操作系统命令的示例输出\n\
  \n```\nem_result=<指标行 1>\n此行被忽略\nem_result=<指标行 2>\n如果 em_result= 不在行首，它也会被忽略\n\
  em_result=<指标行 3>\n```\n\n请注意，前缀中的前导和尾随空格是有效的，不会被截断。\n\n### 处理分隔符和空格\n\n前缀之后的行内容随后使用一个简单的分隔符字符串被标记化为多个列。默认（且常用）的分隔符是管道符号（`|`）。但是，如果你的列内容可能包含该字符，你可以使用任何其他分隔符，甚至可以使用多字符字符串使其真正唯一，例如\
  \ `{=-DELIMITER-=}`，这样像下面这样的行就会被正确解析为三个值：\n\n```\nem_result=一些常见的分隔符有 | , % ;{=-DELIMITER-=}123{=-DELIMITER-=}456\n\
  ```\n\n空格在分隔符字符串中具有特殊含义。首先，前导和尾随空格会被截断并忽略。其余的空格似乎会将分隔符字符串拆分为多个分隔符，但它们的应用非常不一致，因此很难预测最终结果。我曾尝试创建一个分隔符来解析以逗号分隔值、并可能用双引号括起来的行，但未能想出一个可靠的分隔符字符串。我怀疑代码可能原本就不是用来处理分隔符中的空格的。文档没有提及如何处理空格，而且它们的处理似乎不可靠，因此我强烈建议此时避免在分隔符字符串中使用空格。\n\
  \n关于空格的最后一点说明：收集到的值中的空格在存储到存储库时不会被截断。但是，EM 用户界面在显示它们时会截断前导和尾随空格。如果你在文本列上设置诸如 `CONTAINS`\
  \ 之类的条件，那么前导和尾随空格在条件字符串和收集到的指标值中都是重要的，请注意。我建议尽可能避免前导和尾随空格，因为你在用户界面中看不到它们，但它们确实存在。（只需检查存储库视图\
  \ `MGMT$METRIC_CURRENT`，例如。）\n\n### 数据列与键列\n\n在定义适配器时，你需要定义命名列及其属性。你已经看过了前面的例子，所以我们只简要说明数据列和键列之间的区别。\n\
  \n`数据列` 实际上是你要收集的指标值。例如，你可能希望监视暂存目录的大小，文件被加载到该目录中以便后续处理。该目录中文件的总大小是你想要计算的指标——这将是一个数据列。你可能还想计算暂存目录中的文件总数——这是另一个数据列。对于这些数据列中的每一个，你可能都想定义一个比较运算符。在这种情况下，你很可能希望选择大于（`>`）警报条件，这样当暂存目录中的大小或文件数量增长超过预定义的阈值时，你就可以生成警告和错误。请注意，在指标开发过程中选择正确的运算符很重要。阈值本身是可选的，并且可以由指标扩展用户为每个目标自定义。然而，运算符只能由指标扩展作者更改，并且更改它们需要创建指标扩展的新版本。\n\
  \n\n\n现在设想一下，你想要监控的不是一个而是多个临时目录，并且需要分别监控每一个。你无需定义多个指标扩展（每个目录一个），而是可以将它们合并到同一个`指标扩展`中，将目录大小和文件数作为单独的一行收集，然后添加目录路径来区分这些行。这便是你需要使用`键列`的场景。在这个例子中，目录路径将是`键列`，而文件大小将是`数据列`。请注意，如果你正在创建一个`指标扩展`的新版本，你不能移除任何现有的列或添加任何`键列`。至于修改，你只能更改现有列的某些属性，例如显示名称和比较运算符。但是，你可以添加额外的`数据列`。例如，如果你已经有一个监控目录大小的指标，你不能创建一个新版本并添加一个包含目录路径的`键列`来监控多个目录的大小。相反，你需要将其克隆为一个新的`指标扩展`，而不仅仅是下一个版本。\n\
  \n`键列`（或多个列）对于每次数据收集必须是唯一的。否则将引发错误。如果一个适配器接收到多行数据，并且没有为`指标扩展`定义`键列`，同样会引发错误。最后，请记住选择正确的列类型：`字符串`或`数字`。请记住，只有`数字`指标才会显示在图表上，并且在`EM12c`中，随着收集数据从详细快照转为每小时和每日快照而进行回滚或聚合。`字符串`指标仅在`EM`界面中以表格形式显示。\n\
  \n## 操作系统命令—单列\n\n`操作系统命令—单列`适配器仅返回一个值。你仍然应将其视为包含一列一行的表格（`EM12c`始终将指标视为表格），因此你需要在“列”选项卡中定义单个列。命令的完整输出——即使是多行输出——也会作为一个值返回。我尚未发现此适配器的许多用途，但如果你需要传回多行文本片段，这是一种可行的方法。然后，你可以设置`包含`或`匹配`告警条件，来测试返回文本中是否存在子字符串或正则表达式匹配。\n\
  \n请注意，此适配器没有`操作系统命令—多列`适配器那样的`分隔符`和`起始于`属性。你无法使用前缀过滤输出行。不幸的是，此适配器仅适用于非常有限的目标集合，如本章稍后“适配器与目标类型”部分所述。\n\
  \n## 操作系统命令—多值\n\n`操作系统命令—多值`适配器使用与`操作系统命令—多列`适配器相同的前缀机制返回多行结果。它没有`分隔符`属性，因为适配器不会将行内容拆分为多个值；前缀后的整行内容作为值传递。最终结果是一个单列表。请注意，你只需定义一个数据列，且无需`键列`。该适配器本质上是收集一组值。因此，此适配器与`操作系统命令—多列`的区别在于，`操作系统命令—多值`不需要任何`键列`。\n\
  \n此类适配器的一个用途是从日志文件收集行，你可以在列上定义`包含`或`匹配`条件。请注意，如果你尝试使用`操作系统命令—多列`适配器并仅使用单个`键列`来模拟类似的收集，你将无法在该列上定义告警条件。此外，重复的值会产生错误。\n\
  \n### SNMP 适配器\n\n虽然通过`SNMP`（简单网络管理协议）收集指标的想法很好，但当前`SNMP`适配器的实现使其对`指标扩展`的用途非常有限。`SNMP`适配器设计用于从单个`SNMP`服务器收集指标，该服务器通常在本地运行。然而，截至`EM`版本`12.1.0.2.0`，`SNMP`适配器基本上已损坏，因为它需要主机目标的一个特定动态属性被正确评估——`SNMPHostname`——而此属性仅在极少数硬件平台上能被解析。你可以使用`emcli`命令手动设置该属性名称作为变通方法，但你无法使用`SNMP`适配器通过部署`指标扩展`的单个主机目标来从多个设备收集指标。\n\
  \n请注意，使用`SNMP`适配器还需要设置`SNMP`凭据。此适配器的文档相当不完整，因此我建议你目前避免使用它。相反，可以使用`操作系统命令`适配器来收集`SNMP`指标，或使用插件（这些插件具有功能齐全的`SNMP`指标收集方法，将在本章第二部分介绍）。\n\
  \n### JMX 适配器\n\n`JMX`（Java 管理扩展）适配器用于从 Java 应用程序收集指标，这些应用程序具有基于`JMX`的标准检测，嵌入在支持`JMX`的服务器中，如\
  \ Oracle WebLogic、IBM WebSphere、Red Hat JBoss，甚至是独立的`JVM`（Java 虚拟机）。更多信息，请参考标准文档《Oracle\
  \ Enterprise Manager Cloud Control 12c 管理员指南》（第 8 章，第 8.4.1 节）。\n\n尽管公认此文档内容单薄，但当你学习本章其余部分的管理插件时，你也会了解到底层的获取器，而关于`JMX`获取器的文档描述得稍为详尽。更多信息，请参见《Oracle\
  \ Enterprise Manager Cloud Control 可扩展性程序员参考》（第 20 章，“使用获取器”，第 20.11 节）。更完整的示例可在《Oracle\
  \ Enterprise Manager Cloud Control 12c 管理员指南》（第 20 章，“使用 Web 服务和 JMX 进行监控”）中找到。\n\
  \n### 适配器与目标类型\n\n`EM12c`为每种目标类型限制了适配器的选择。虽然文档没有涵盖哪些适配器可用于哪些目标类型，但你可以从`EM_MEXT_TARGETTYPE_ADAPTERS`存储库视图中查看这些关联。从该视图中，你还可以看到几种目标类型有`Web\
  \ 服务适配器`支持，尽管这未被记录。你还可以在`EM_MEXT_ADAPTERS`视图中看到，甚至有更多的适配器可用，例如`RESTful Web Wervices\
  \ Wdapter`。然而，它们未被任何目标类型启用。我预期这些是为后续版本预留的，正如我们见过一些功能在内部交付，但直到后续版本才对外公开。\n\n各种`操作系统命令`适配器可用于某些目标但不适用于其他目标，这确实没什么道理可言。例如，`操作系统命令—单列`适配器可用于自动存储管理（但不能用于集群\
  \ ASM）、集群数据库、数据库实例以及少数其他目标类型。几乎每种目标类型都有`操作系统命令—多列`适配器可用。`操作系统命令—多值`适配器与系统上安装了默认插件的`12.1.0.2.0`版本中任何可用的目标类型都没有关联。\n\
  \n你可以在《Oracle Enterprise Manager Cloud Control 12c 管理员指南》（第 8.4 节）中找到关于`指标扩展`适配器的详细官方文档。如果你对底层实现更感兴趣，可以查看`SYSMAN`模式中的`EM_MEXT_%`视图和表。在本章稍后讨论插件时，我将回到这些表中的某些内容（参见“指标扩展内部揭秘”部分）。\n\
  \n\n\n第 8 章 `Oracle Enterprise Manager Cloud Control 12c 管理员指南`详细介绍了指标扩展的其他功能，例如管理对指标扩展的访问、使用警报选项以及导出/导入指标扩展。在那里您还可以了解如何将旧版的用户定义指标从\
  \ Grid Control 10g 和 11g 迁移到 12c Cloud Control 中的新指标扩展。\n\n## 管理插件\n\n指标扩展易于创建，并且与\
  \ 10g 风格的用户定义指标相比，它们更易于大规模管理，并为用户提供了更大的灵活性。然而，在监控更复杂的目标和指标方面，它们仍然非常有限。\n\n插件的强大之处在于开发者可以创建新的目标类型。目标类型为您管理的基础设施的每个组件提供了已熟悉的托管目标概念。例如，数据库实例是一个目标，监听器也是一个目标。甚至\
  \ Oracle 主目录在 EM12c 中也以目标形式呈现。\n\n如果您的应用程序作为守护程序在服务器上运行，并且您有十个指标想要收集，您可以定义十个指标扩展并全部部署，也可以在插件中定义一个新的目标类型，然后只需部署一个插件。目标还具有实例属性，可根据其部署参数配置目标。相比之下，指标扩展完全没有参数化，因此如果您的应用程序在每台服务器上的配置不同，或者您在同一台服务器上运行多个应用程序实例，则必须为每个应用程序创建一套专用的指标扩展。\n\
  \n此外，插件提供的功能远不止监控扩展。它们提供全面的管理能力，使得插件开发者能够对目标实施操作，例如启动和停止应用程序、按需检索日志进行分析或启用调试模式。控制台中的目标页面也完全可自定义。有方法可以定义\
  \ EM12c 如何自动发现新目标，并且还有许多其他功能可用，例如作业、报告、配置管理和合规标准。在本章剩余部分通过查看示例插件时，您将了解到其中一些内容。\n\
  \n### 可扩展性框架入门\n\n如前所述，EM12c 可扩展性框架不像 10g 和 11g 版本中那样仅仅是一个附加功能。相反，它构成了所有管理插件的基础，包括\
  \ Oracle 提供的插件，用于监控其核心产品，如数据库、中间件、应用程序和集成系统。\n\n可扩展性框架包含创建新的、功能齐全的目标类型所需的一切——从高级指标收集功能到自动发现、配置管理、作业支持和合规管理，以及成熟的仪表板和完全交互式的目标管理界面。\n\
  \nEnterprise Manager 可扩展性文档为插件开发者提供了两份指南：\n\n*   `Oracle Enterprise Manager Cloud\
  \ Control 可扩展性程序员指南` 是对插件概念及其如何组合在一起的简要概述。在阅读下一份指南之前通读它是很有用的。像 `管理插件概念指南` 这样的标题会更好地反映其内容。\n\
  *   `Oracle Enterprise Manager Cloud Control 可扩展性程序员参考手册` 是您将一直使用的文档。它的结构是指南而非简单参考，因此请将其视为\
  \ `管理插件开发者指南`。\n\n本节重点介绍插件开发的实际方面以及文档中不太清晰的细节。由于可扩展性框架在 EM12c 中发生了巨大变化，并且不像其他最终用户功能那样广泛使用，因此其文档不如\
  \ EM12c 的其他文档清晰和全面。但是，请务必始终查阅最新版本的 Oracle 文档，因为在线文档会不时静默发布改进内容。\n\n即使您不计划自己开发插件，本节也将帮助您理解\
  \ EM12c 的一些内部机制，因此我建议您无论如何都浏览一下。\n\n在深入研究细节之前，让我们先看看插件的生命周期：\n\n*   *设计与开发*：这是插件开发者花费大部分精力的地方。\n\
  *   *将插件打包成 Oracle 插件存档 (OPAR) 文件*：这是一个可以轻松分发的单一包。\n*   *在 Enterprise Manager 系统上部署插件*：EM12c\
  \ 管理员从 OPAR 文件导入插件并将其部署到 OMS 上，使其对最终用户可用。最终用户然后可以添加要监控和管理的新目标。\n\n当您完成本章中的示例时，您将看到如何在插件开发过程中迭代此周期。首先我们将介绍如何设置您的开发环境。\n\
  \n### 开发环境\n\n我建议您拥有一个专用的 EM12c 插件开发环境。这样更容易在故障排除期间分析日志，并完全隔离您可能遇到的问题。作为插件开发者，您的一些活动可能会对环境造成干扰，因此拥有开发环境比在共享的\
  \ EM12c 系统上开发并冒影响其他用户的风险更安全。\n\n一个虚拟机 (VM) 非常适合此目的。我在笔记本电脑上的虚拟机使用两个虚拟处理器核心和 6GB\
  \ 内存。单核和 3-4GB 内存也可以应付，但请确保有合理的交换空间大小，因为除了运行 EM12c 环境本身之外，您还会使用一些 Java 工具。例如，如果内存或交换空间不足，在使用\
  \ `empdk` 命令行工具打包插件时可能会遇到奇怪的故障。\n\n我的开发虚拟机运行 Oracle Enterprise Linux，承载了 EM 存储库、OMS\
  \ 和代理。我还在同一个虚拟机中安装并配置了可扩展性开发工具包 (EDK)。这样，我在一个虚拟机上就拥有了完整的开发环境。值得为您的开发虚拟机保留备份，以防您对\
  \ EM12c 存储库造成任何不一致，因为您将在 SYSMAN 模式以及一些元数据记录中创建和删除对象。\n\n您可能希望在工作站上进行开发，那里有您喜欢的开发工具和编辑器（我的是\
  \ vi，所以在虚拟机上已就绪）。在这种情况下，应在安装 `EDK` 之前先在其中安装 Enterprise Manager 命令行接口 (`EMCLI`)。有关安装\
  \ `EMCLI` 的详细说明，请参阅第 1 章或在您的 EM12c 控制台中导航到 设置 ![arrow](img/arrow.jpg) 命令行接口。\n\n\
  ### 可扩展性开发工具包\n\n可扩展性开发工具包 (`EDK`) 包含多个组件：\n\n\n\n## 工具包内容\n\n*   用于验证和打包插件的插件开发工具。\n\
  *   参考文档，包含前面提到的两个可扩展性指南的 PDF 版本以及 XML 模式定义文档，其中包含所有可能的 XML 元素——比 PDF 中描述的要多得多，但大多数元素的描述要么缺失，要么非常简略，因此如果您想使用未记录的选项，需要进行大量实验。\n\
  *   插件示例。截至 EDK 12.1.0.2 版本，提供了同一插件的多个变体：即 Host Sample 插件。这些版本在实现的功能上有所不同，变得越来越复杂和丰富。之前的\
  \ EDK 版本只有一个示例插件，文件数量、代码量和实现的功能让初学者简直不知所措，因此真的很难将其用作示例。\n\n## 安装 EDK\n\n安装 EDK 的最佳方式是导航到\
  \ EM12c 控制台：选择 Setup ![arrow](img/arrow.jpg) Extensibility ![arrow](img/arrow.jpg)\
  \ Development Kit，然后按照说明操作。简而言之，您需要下载一个压缩的发行版，将其解压缩到您喜欢的文件夹中，并在设置好适当的环境后，就可以调用`empdk`工具。我通常会确保`empdk`和`emcli`都在我的路径中。当需要将\
  \ EDK 位置作为路径的一部分时，我将称其为`<EDK>`。\n\n请注意，您应该只在受支持的平台之一上运行 EDK。例如，虽然大多数功能在我的 Mac OS\
  \ X 上有效，但插件打包功能会挂起，因为它是一个不受支持的平台，因为 EDK 使用 Oracle Universal Installer 来执行其部分功能。\n\
  \n![image](img/sq.jpg) **注意**  *Oracle Enterprise Manager Cloud Control Extensibility\
  \ Programmer’s Reference* (第 1 章，第 1.3 节) 提供了更详细的安装 EDK 说明。\n\n## 部署示例插件\n\n在继续之前，让我们打包并部署三个随\
  \ EDK 提供的示例插件——执行前一节描述的插件生命周期中的步骤 2 和步骤 3。假设您使用的是 Unix/Linux，请转到`<EDK>/samples/utl`并运行`./build_sample_plugin.sh\
  \ oracle.samples.xsh1`。（您可能需要在此之前为脚本添加可执行权限。如果您使用的是 Windows，请查看 shell 脚本内部并修改它以在\
  \ Windows 上运行，或者使用 Windows 记法自行调用命令。）该脚本将在您的主目录中创建 OPAR 包：`12.1.0.0.0_oracle.samples.xsh1_2000_0.opar`。为另外两个更高级的插件版本运行此脚本：`xsh2`和`xsh3`。我们将部署它们，您可以看到插件在开发过程中如何从简单演变为更复杂。现在您的主目录中有三个\
  \ OPAR 文件。\n\n请注意，创建 OPAR 归档文件会在后台调用 Oracle Universal Installer，因此您需要满足其通用要求，例如有足够的可用交换空间。\n\
  \n在继续之前，您需要执行一个额外的步骤：配置软件库（Software Library）。（有关更详细的软件库介绍，请参见第 6 章。）这在安装 OMS 后只需执行一次，您通常也会为修补和供应功能以及\
  \ EM12c 自更新执行此操作。一种方法是使用 EMCLI（您也可以使用 EM12c 控制台添加它）。到现在您应该已经可以让 EMCLI 工作了，因此使用`emcli\
  \ login -username=SYSMAN`登录。我也习惯将 EMCLI 与 OMS 同步，所以我运行`emcli sync`，但实际上并不需要每次都运行。接下来，创建软件库位置：\n\
  \n```\nemcli add_swlib_storage_location -name=swlib -path=/some/path/on/OMS/server\n\
  ```\n\n如果您认为软件库位置已经配置过，只需运行`emcli list_swlib_storage_locations`进行验证。您需要至少有一个活动位置。\n\
  \n现在您可以将 OPAR 文件上传到 OMS 了。如果您的 OPAR 文件位于运行 OMS 的同一服务器本地，请使用以下命令上传每个文件：\n\n```\n\
  emcli import_update -file=<绝对路径到.opar 文件> -omslocal\n```\n\n请注意，`emcli`实际上并不上传文件，而只是向\
  \ OMS 发送一个命令（在 EMCLI 术语中称为动词）来执行导入操作。如果 OPAR 文件不在 OMS 本地，您可以指定主机和凭据，以便 OMS 可以从该远程主机检索文件。此示例可以在*Oracle\
  \ Enterprise Manager Cloud Control Extensibility Programmer's Reference*（第 13 章，第\
  \ 13.5.2 节）中找到。\n\n## 部署插件到 OMS\n\n现在是将插件部署到 OMS 的时候了。这时 OMS 会激活插件的某个版本，并使其目标类型成为其接口和\
  \ API 的组成部分，就像数据库实例目标类型一样。您可以通过使用 EM12c 控制台来部署插件，如*Oracle Enterprise Manager Cloud\
  \ Control Extensibility Programmer's Reference*（第 13 章，第 13.5.3 节）所示。但是，我们将在这里使用命令行，因为它更易于重复且文档记录更快。我们将再次使用\
  \ EMCLI：\n\n```\nemcli deploy_plugin_on_server -plugin=oracle.samples.xsh1\n```\n\
  \n同样部署`oracle.samples.xsh2`和`oracle.samples.xsh3`。请注意，`emcli`会在部署过程中询问 SYS 密码，而不仅仅是\
  \ SYSMAN 密码，大概是因为插件部署需要 SYSDBA 角色。请注意，`emcli`实际上在后台发送了一个部署作业，您可以使用`emcli get_plugin_deployment_status\
  \ -plugin_id=oracle.samples.xsh1`检查进度。\n\n## 添加目标类型实例\n\n最后，高潮部分：添加目标类型实例！您将再次使用`emcli`，以避免在\
  \ EM12c 控制台中进行长时间导航和多次截图。对于三个目标类型中的每一个，请使用此命令：\n\n```\nemcli add_target -name='Sample\
  \ Host 1' -type=sample_host1 -host=<现有主机名> -properties=\"sample_host1_username:<操作系统用户>;sample_host1_password:<操作系统密码>\"\
  \n```\n\n`<现有主机名>`是新插件将部署到的位置。使用您在 EM12c 控制台中为该主机目标看到的确切拼写。对于`<操作系统用户>`和`<操作系统密码>`，您可以使用\
  \ Oracle 用户凭据（实际上，EDK 12.1.0.2.0 中提供的示例插件根本不使用它们，因为它只是以运行本地管理代理的操作系统用户身份运行命令）。为另外两个插件版本运行此命令，递增名称、类型和属性中的索引。您将获得三个示例主机目标。它们都监控同一台服务器（运行代理的本地服务器），但每个目标都提供了逐渐更多的功能。\n\
  \n为了模拟主机的上/下状态，插件读取`/tmp/hostsample_status`。当文件内容为“up”时，目标被视为启动。请使用命令`echo up >\
  \ /tmp/hostsample_status`在部署目标的主机上初始化该文件。否则，您的 Sample Host X 目标将无限期处于“状态待定”状态。\n\
  \n## 基本插件目标类型和指标\n\n在本节中，您将开始使用位于`<EDK>/samples/plugins/oracle.samples.xsh1`中的最简单的示例\
  \ EDK 插件。内部是`plugin_dist`目录，我将其称为暂存区或分段区域。\n\n### 暂存区结构\n\n要使用 EDK 打包插件，其文件必须在暂存区内组织。EDK\
  \ 定义了需要遵循的特定目录结构。我建议您在开发一开始就创建该目录结构。您将从图 10-8 所示的最简单的结构开始。\n\n![9781430249382_Fig10-08.jpg](img/9781430249382_Fig10-08.jpg)\n\
  \n图 10-8。插件暂存区结构\n\n\n\n"
- "# Oracle Enterprise Manager Cloud Control 插件开发基础\n\n## 插件基础结构\n\n暂存根目录包含 `plugin.xml`，这是一个插件定义文件，其中包含了\
  \ OMS 所需的基本插件信息。暂存根目录中有两个必需的子目录：`oms` 和 `agent`。`oms` 目录包含所有用于在 OMS 上部署的文件，而 `agent`\
  \ 目录包含用于在代理上部署的文件。你可以将它们视作代理端和 OMS 端区域。你会发现某些文件必须同时包含在两个区域中。`plugin_registry.xml`\
  \ 文件在某种程度上类似于暂存根目录中的 `plugin.xml` 文件，但其内容用于部署在管理代理上。可以将 `plugin.xml` 和 `plugin_registry.xml`\
  \ 共同视作插件定义。请注意，如果设计用于支持复杂系统，单个插件可能包含不止一个目标类型。例如，Oracle Exadata 插件就包含了十种新的目标类型。\n\
  \n**目标类型元数据** 是插件的关键组件。XML 目标类型元数据文件同时包含在 OMS 和代理区域中。由于我的开发平台是 Linux，我通常将目标类型元数据文件放置在\
  \ `<stage>/oms/metadata/targetType/` 中，并从 `<stage>/agent/metadata/` 创建一个指向它的软链接。虽然文件名本身可以自由选择，但建议的做法是根据它定义的目标类型来命名，并添加\
  \ `.xml` 扩展名。\n\n**默认采集元数据** 与目标类型元数据紧密耦合，定义了所有指标（包括告警条件）的采集计划和采集相关属性。就像目标类型元数据一样，默认采集元数据\
  \ XML 文件也存在于 OMS 和代理区域中，因此我通常也使用软链接。建议将文件命名为与目标类型元数据 XML 文件相同的名称。\n\n你会了解到，在 OMS\
  \ 端区域可以包含更多文件，但这通常是任何插件中都会看到的最低要求。通过创建这个基本的目录树来开始你的每一个新插件。\n\n## 插件元数据\n\n一个简化版的\
  \ `plugin.xml` 如 清单 10-5 所示。你可以在 `<stage>/plugin.xml` 中找到它。请记住，我们第一个示例插件的暂存区域是 `<EDK>/samples/plugins/oracle.samples.xsh1/plugin_dist`。\n\
  \n**清单 10-5**. 简单主机插件 1 的插件元数据 `plugin.xml`\n\n```xml\n<?xml version = \"1.0\"?>\n\
  <Plugin xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\n\
  \       \"http://www.oracle.com/EnterpriseGridControl/plugin_metadataplugin_metadata.xsd\"\
  \n    xmlns=\"http://www.oracle.com/EnterpriseGridControl/plugin_metadata\">\n \
  \ <PluginId vendorId=\"oracle\" productId=\"samples\" pluginTag=\"xsh1\"/>\n  <PluginVersion\
  \ value=\"12.1.0.0.0\"/>\n  <PluginOMSOSAruId value=\"2000\"/>\n  <ShortDescription>Sample\
  \ Host Plugin 1</ShortDescription>\n  <Readme>Sample Host Plugin 1\\. See Book Expert\
  \ Oracle Enterprise Manager 12c.</Readme>\n  <PluginAttributes Category=\"Others\"\
  \ DisplayName=\"Sample Host Plugin 1\"/>\n  <TargetTypeList>\n    <TargetType name=\"\
  sample_host1\" isIncluded=\"TRUE\"/>\n  </TargetTypeList>\n</Plugin>\n```\n\n要获取更多选项，请参阅示例的完整\
  \ `plugin.xml` 文件，以及文档 *Oracle Enterprise Manager Cloud Control Extensibility Programmer's\
  \ Reference*（第 2 章，第 2.4 节）。更多选项可以在插件元数据参考中找到，位于 `<EDK>/doc/partnersdk/mrs/emcore/pluginMetadata/`。这里，我们只介绍几个必需的基本元素。根元素\
  \ `Plugin` 的庞大属性 `xmlns:xsi`、`xsi:schemaLocation` 和 `xmlns` 引用了各种命名空间和 XML 架构。只需确保你从示例模板中原样保留它们即可。这同样适用于我们将使用的其他\
  \ XML 文件。\n\n`PluginId` 由三个部分组成，用点分隔：`vendorId.productId.pluginTag`。点表示法稍后将在代理端定义中使用。供应商\
  \ ID 和产品 ID 最多可包含 8 个字符，而插件标签必须为 4 个字符或更少。例如，Oracle 的示例插件 ID 是 `oracle.sysman.xsh1`，而对于我的演示\
  \ MySQL 插件，我使用 ID `pythian.mysql.demo`。\n\n插件版本由五个数字表示：`a.b.c.d.e`。前两个数字（`a.b`）应与你开发所基于的\
  \ EM12c 版本相同。第三个数字（`c`）应始终为 0。第四个数字是你每次发布插件时递增的数字。Oracle 将第五个数字（`e`）保留供将来使用，并指示你始终将其设置为\
  \ 0。然而，我一直用它来标识插件的次要版本。例如，在撰写本文时，`12.1.0.1.2` 是 Pythian MySQL 插件的当前版本。\n\n你需要在开发环境中部署后续版本时递增版本号。你可以使用最后一个数字用于开发版本递增，或者在开发期间只修改插件\
  \ ID。例如，我使用 `pythian.mysql.prod` 表示公开发布的版本，使用 `pythian.mysql.test` 表示开发和测试。\n\n\
  `PluginOMSOSAruId` 元素定义了 OMS 应在哪个操作系统上运行才能支持此插件。值 `2000` 表示通用平台，你经常会发现你的插件对 OMS\
  \ 服务器平台几乎没有依赖性，但通常对代理操作系统有依赖。这里我不深入探讨兼容性的细节（参见前面引用的文档），但 `plugin.xml` 是你可以定义插件与其他\
  \ EM12c 组件兼容性的地方。\n\n`ShortDescription` 和 `Readme` 标签的作用不言自明。`PluginAttributes`\
  \ 元素包含一些基本属性。你可以为 `Category` 属性设置一些预定义的类别，例如 `Databases`、`Middleware` 等。`DisplayName`\
  \ 属性是你的插件在 EM12c 用户界面中显示的方式。\n\n最后，是 `TargetTypeList` 元素，它列出了插件包含的所有目标类型。一个简单的插件通常只包含一个目标类型，因此只有一个\
  \ `TargetType` 子元素。目标类型名称是插件中包含的目标类型的内部 ID。本章稍后在实际定义目标类型时，会展示更多关于目标类型 ID 选择的内容。\n\
  \n插件定义还支持定义插件依赖关系、版本支持和兼容性，以及许多其他属性，例如“新增功能”部分。你现在不需要深入研究这些，并且总可以在以后使插件元数据变得更加复杂。我通常建议从简单开始，然后慢慢向你的插件中添加功能。\n\
  \n## 插件注册表\n\n虽然 `plugin.xml` 包含 OMS 端的元数据，但 `plugin_registry.xml` 定义了插件部署的代理所需的元数据——通常只是目标类型元数据文件和默认采集元数据文件的列表。对于单目标类型插件，每种文件只有一个。它们使用\
  \ `TargetTypes` 和 `TargetCollections` 元素来定义，这些元素是一个或多个 `FileLocation` 元素的简单容器。`FileLocation`\
  \ 中的路径是相对于暂存区域中的 `agent` 目录的。清单 10-6 是示例中简化的 `plugin_registry.xml` 文件。\n\n**清单 10-6**.\
  \ 简单主机插件 1 的代理端插件元数据 `plugin_registry.xml`\n\n\n\n## XML 配置文件示例\n\n```xml\n<?xml\
  \ version=\"1.0\"?>\n<PlugIn ID=\"oracle.samples.xsh1\" Description=\"Sample Host\
  \ Plugin 1\" Version=\"12.1.0.0.0\"\n    xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n    xsi:schemaLocation=\"http://www.oracle.com/EnterpriseGridControl/pluginplugin.xsd\"\
  \ >\n  <TargetTypes>\n    <FileLocation>metadata/sample_host1.xml</FileLocation>\n\
  \  </TargetTypes>\n  <TargetCollections>\n    <FileLocation>default_collection/sample_host1.xml</FileLocation>\n\
  \  </TargetCollections>\n</PlugIn>\n```\n\n可以看到，属性 `ID`、`Description` 和 `Version`\
  \ 是从 OMS 端的 `plugin.xml` 文件复制过来的。请注意，`ID` 是 `PluginId` 的点表示法版本。更高级的选项是可用的，但文档记录仍然相当差，且未在示例中提供。例如，你可以通过定义一个自定义的\
  \ fetchlet（你很快会了解到 fetchlet）来注册你自己的指标收集方法，但在你精通插件开发之前，不会这样做。\n\n除了 Oracle *Enterprise\
  \ Manager Cloud Control Extensibility Programmer's Reference*（第 2 章，第 2.5 节）中的标准文档外，更多详细信息可以在\
  \ EDK API 参考中找到，路径为 `<EDK>/doc/partnersdk/mrs/emcore/agentPluginMetadata/`。这个 XML\
  \ API 文档是由定义此 XML 结构的 XML Schema 生成的——什么元素可以存在于何处以及数量、它们的属性是什么、哪些是可选的，以及一些零散的注释，对于那些在其他地方未文档化的元素，你仍会发现它们很有用。\n\
  \n在这一点上，已经有足够的机会犯很多错误。幸运的是，EDK 提供了验证工具，可以帮助我们确保我们的定义在语法和语义上是正确的。例如，它将捕获格式错误的 XML\
  \ 文件以及不匹配的插件 ID。清单 10-7 展示了一个示例验证命令行和成功的验证输出。末尾引用的输出文件包含更多详细信息。请注意，将插件打包到 OPAR 文件之前会执行显式验证。\n\
  \n### 插件验证示例\n```\n[oracle@em12c2 oracle.samples.xsh1]$ empdk validate_plugin -stage_dir\
  \ plugin_dist\nValidating Plugin Xml : Passed\nValidating Plugin Structure: Passed\n\
  \nValidating Metadata Syntax: Passed\nValidating Metadata Semantic: Passed\nValidating\
  \ Embedded SQL strings in meta data: Passed\nPlugin Validation : Passed\nValidation\
  \ Report generated to: /home/oracle/edk/samples/plugins/oracle.samples.xsh1/./plugin_validation_report_121127.txt\n\
  ```\n\n请注意，如果你删除了 `Readme` 元素，例如，验证将通过但会有警告，因为这个元素在 XML Schema 中是可选的，所以从语法上讲一切正确，但\
  \ EDK 有一个语义规则，即这个元素应该作为最佳实践存在。我使用 EDK 主机示例的暂存区，但你也可以使用前面的 XML 内容启动自己的暂存区并并行进行。\n\
  \n现在验证已经成功，你可以继续创建核心结构：目标类型元数据。\n\n### 目标类型元数据\n\n目标类型元数据定义了插件的基本结构——其属性、指标以及如何收集它们。这是创建新目标类型的绝对最低要求。目标类型元数据在单个\
  \ XML 文件中定义，该文件放置在 `<stage>/oms/metadata/targetType` 目录中。Oracle 最新的建议是使用 `vendorID_productID_PluginTag.xml`\
  \ 模板，根据插件 ID 命名文件。之前的命名约定是根据目标类型 ID 添加 `.xml` 扩展名，但一般来说，它可以是任何文件名。我建议使用目标类型来命名目标类型元数据文件，因为你可以在同一个插件中打包多个目标类型。你还需要在\
  \ `<stage>/agent/metadata` 目录下的 agent 区域提供相同的 XML 文件，该文件随后从 `plugin_registry.xml`\
  \ 中引用，正如你之前所了解的。在 Unix/Linux 服务器上，我只需从 agent 区域创建到 OMS 区域主副本的符号链接。这样，我就不会忘记同步它们。（如果你忘记了同步副本，就像我曾做过的几次那样，故障排除可能是一个巨大的时间消耗。那时我改用了符号链接。）\n\
  \n目标类型元数据的一般结构如清单 10-8 所示。\n\n### 元素示例\n```\n<TargetMetadata META_VER=\"1.8\" TYPE=\"\
  sample_host1\">\n  <Display>...</Display>\n  <Metric>...</Metric>\n  ......\n  <Metric>...</Metric>\n\
  \  <InstanceProperties>...</InstanceProperties>\n</TargetMetadata>\n```\n\n顶级元素\
  \ `TargetMetadata` 在 `TYPE` 属性中包含唯一的目标类型 ID `\"sample_host1\"`，并在 `META_VER` 属性中包含元数据版本\
  \ `\"1.8\"`。如果更改了文件，你应该更改版本号。当 EM12c 检测到目标类型版本已更改时，它将重新加载新的元数据。我曾花费无数小时排查为什么在更新元数据定义后我的插件不工作，后来才发现我漏掉了更改\
  \ `META_VER` 属性。当部署较新版本的插件时，EM12c 会分析元数据版本是否已更改，如果新目标类型元数据定义中的 `META_VER` 未更改，则会跳过一些内部更新。\n\
  \n请注意，随 EDK 打包的示例，例如 `sample_host1`，在注释中引用了 XML 数据类型定义（DTD）`$OMS_HOME/sysman/admin/dtds/TargetMetadata.dtd`。这是来自\
  \ 10g/11g Grid Control 的旧定义，不仅风格陈旧，而且已过时。请使用 `<EDK>/doc/partnersdk/mrs/emcore/targetType`\
  \ 中基于 XML Schema 的 API 参考。例如，`TargetMetadata` 根元素在 `<EDK>/doc/partnersdk/mrs/emcore/targetType/noNamespace/element/TargetMetadata.html`\
  \ 中描述。\n\n`TargetMetadata` 元素的子元素通常包括三个元素：`Display`、`Metric` 和 `InstanceProperties`。\n\
  \n### Display\n\n\n### 目标类型元数据\n\n## 显示元素\n\n首先，我们来检查 `Display` 元素。此元素仅用于存储属性，这些属性指示了父元素所定义的组件在\
  \ EM12c 控制台中的显示方式。您几乎会在任何在用户界面中具有一定可见性的目标类型元数据的其他元素下看到 `Display` 元素。在本例中，它对应于目标类型本身，`Display`\
  \ 元素定义了目标类型的显示方式。在最简单的形式中，`Display` 元素将包含一个用于在控制台中显示目标类型的 `Label` 元素，如 列表 10-9 所示。`Label`\
  \ 的可选属性 `NLSID` 是一个唯一标识符，可用于将此目标类型相关的控制台用户界面翻译为其他语言。如果指定它，请养成将 `NLSID` 前缀设置为目标类型\
  \ ID 的习惯，以便在所有可能的插件中保持唯一性（因为您的目标类型 ID 是唯一的，您只需确保所有 `NLSID` 在您自己的目标类型内是唯一的）。根据上下文，`Display`\
  \ 元素内部可以包含其他元素，正如您将在本章后面看到的。\n\n```\n<Display>\n  <Label NLSID=\"hs_displayname\"\
  >Sample Plugin Host 1</Label>\n</Display>\n```\n\n请注意，目标类型元数据 XML 文件中元素的顺序很重要；`Metric`\
  \ 元素必须始终位于 `InstanceProperties` 元素之前。接下来您将了解 `InstanceProperties` 结构，因为它对理解指标及其收集方式很有用。\n\
  \n## 实例属性\n\n`InstanceProperties` 是一个必需的元素，必须放置在所有 `Metric` 元素之后。在根元素 `TargetMetadata`\
  \ 中应恰好有一个 `InstanceProperties` 描述符。此描述符由一个或多个 `InstanceProperty` 元素以及可选的 `DynamicProperties`\
  \ 元素组成，如 列表 10-10 所示。每个 `InstanceProperty` 条目指定一个目标属性，当在 EM12c 控制台中添加新目标实例时，应由用户定义该属性（参见\
  \ 图 10-9）。`DynamicProperties` 元素定义由代理自动计算的属性。\n\n```\n<InstanceProperties>\n   \
  \     <InstanceProperty NAME=\"USE_FAKE_DATA\" ... </InstanceProperty>\n       \
  \ <InstanceProperty NAME=\"sample_host1_username\" ... </InstanceProperty>\n   \
  \     <InstanceProperty NAME=\"sample_host1_password\" ... </InstanceProperty>\n\
  \        <DynamicProperties>...</DynamicProperties>\n        <DynamicProperties>...</DynamicProperties>\n\
  </InstanceProperties>\n```\n\n![9781430249382_Fig10-09.jpg](img/9781430249382_Fig10-09.jpg)\n\
  \n图 10-9. 实例属性在 EM12c 控制台的“目标监控配置”中设置\n\n实例属性通常表示目标实例的配置，以便代理可以收集各种指标并计算动态属性。许多目标在实例属性中包含凭据——用于连接到目标并收集信息的用户名和密码。其他属性通常包括安装目录的路径、用于通信的端口或套接字路径，甚至如果目标运行在代理所在主机之外的主机上，则包括主机名。\n\
  \n由于这是一个演示插件，Oracle 包含了属性 `USE_FAKE_DATA`，因此您可以将其设置为 `TRUE`，以使收集脚本返回预定义的数据而不是真实收集的指标。这是一种很好的调试技术。\n\
  \n列表 10-11 提供了一个密码属性的示例。\n\n```\n<InstanceProperty NAME=\"sample_host1_password\"\
  \ CREDENTIAL=\"TRUE\" OPTIONAL=\"TRUE\">\n  <Display>\n    <Label NLSID=\"host_password\"\
  >Host Password</Label>\n  </Display>\n</InstanceProperty>\n```\n\n`NAME` 属性定义了您稍后在定义指标收集时可以用来引用此属性的句柄。将\
  \ `CREDENTIAL` 设置为 `TRUE` 确保此属性以加密方式存储，而不是明文存储，使得未经授权的用户更难检索密码。对于标记为凭据的属性，`HIDE_ENTRY=\"\
  TRUE\"` 属性使 EM12c 控制台使用密码样式的输入框，其中显示星号而不是浏览器中输入的真实文本。`HIDE_ENTRY` 默认设置为 `TRUE`，因此如果您希望凭据的用户名部分以明文显示，则需要将此属性设置为\
  \ `FALSE`。另一个属性 `NEED_REENTER`，当设置为 `TRUE` 时，将使 EM12c 控制台显示该属性的双重输入——这是密码常见的做法。\n\
  \n`OPTIONAL` 属性表示那些不必定义且因此具有默认值的属性，这些值在许多情况下是可接受的。例如，`USE_FAKE_DATA` 属性的默认值是一个空字符串，它指示插件使用真实收集的指标。\n\
  \n您还可以看到 `InstanceProperty` 有一个您已经熟悉的子元素 `Display`。在本例中，它定义了此属性在 EM12c 控制台中的显示方式。要查看其实际操作，请导航到您的\
  \ “Host Sample 1” 目标，并从目标菜单中选择 “目标设置” → “监控配置”，如 图 10-9 所示。\n\n## 指标\n\n指标集是目标类型元数据的核心内容；它们定义了收集的信息以及收集方式。`Metric`\
  \ 是目标类型元数据中最重要的，也可以说是最复杂的元素。一个目标类型可以（并且通常确实）包含多个 `Metric` 子元素，它们都必须放置在 `InstanceProperties`\
  \ 元素之前。列表 10-12 展示了来自 `sample_host1` 目标类型的 `Response` 指标。\n\n```\n<Metric NAME=\"\
  Response\" TYPE=\"TABLE\">\n  <Display>\n    <Label NLSID=\"hs_response_displayname\"\
  >Response</Label>\n  </Display>\n  <TableDescriptor>\n    <ColumnDescriptor NAME=\"\
  Load\" TYPE=\"NUMBER\" IS_KEY=\"FALSE\">\n      <Display>\n        <Label NLSID=\"\
  hs_response_cpuload\">CPU Load</Label>\n      </Display>\n    </ColumnDescriptor>\n\
  \    <ColumnDescriptor NAME=\"Status\" TYPE=\"NUMBER\" IS_KEY=\"FALSE\">\n     \
  \ <Display>\n        <Label NLSID=\"hs_response_status\">Status (up/down)</Label>\n\
  \      </Display>\n    </ColumnDescriptor>\n  </TableDescriptor>\n  <QueryDescriptor\
  \ FETCHLET_ID=\"OSLineToken\">\n    <Property NAME=\"scriptsDir\" SCOPE=\"SYSTEMGLOBAL\"\
  >scriptsDir</Property>\n    <Property NAME=\"fake\" SCOPE=\"INSTANCE\" OPTIONAL=\"\
  TRUE\">USE_FAKE_DATA</Property>\n    <Property NAME=\"perlBin\" SCOPE=\"SYSTEMGLOBAL\"\
  >perlBin</Property>\n    <Property NAME=\"command\" SCOPE=\"GLOBAL\">%perlBin%/perl</Property>\n\
  \    <Property NAME=\"script\" SCOPE=\"GLOBAL\">\n       %scriptsDir%/sample_host1/data_collector.pl\
  \ --collect Response --fake \"%fake%\"\n    </Property>\n    <Property NAME=\"startsWith\"\
  \ SCOPE=\"GLOBAL\">em_result=</Property>\n    <Property NAME=\"delimiter\" SCOPE=\"\
  GLOBAL\">|</Property>\n  </QueryDescriptor>\n</Metric>\n```\n\n\n## 度量元素与描述符基础\n\
  \n度量元素必须具有在目标类型中唯一的`NAME`。`TYPE`最常见是`TABLE`，但也可能是其他值（此处不作探讨）。每个度量元素应包含一个`TableDescriptor`。`TableDescriptor`定义了具有名称、类型和标签的列。最后，`QueryDescriptor`标签描述了如何通过某个\
  \ fetchlet 来收集度量值。这些类似于度量扩展适配器，但 fetchlet 类型更多，在 XML 中配置的灵活性也更大。`TableDescriptor`中列的顺序很重要，因为配置在`QueryDescriptor`元素下的\
  \ fetchlet 必须按该顺序返回值。\n\n## TableDescriptor 元素详解\n\n`TableDescriptor`元素是多个`ColumnDescriptor`元素的简单容器（每个描述表中的一列，正如您可能已猜到的那样）。每个列描述符都有熟悉的`Display`元素，描述该列在用户界面中的显示方式。列描述符的属性定义了列名和类型。`STRING`和`NUMBER`是您将最常使用的两种列类型。`IS_KEY`属性允许您指定此列是否属于度量的唯一键的一部分，从而像在“度量扩展”章节中学习的多行度量那样返回多行。\n\
  \n## 响应指标的特殊要求\n\n对于每种目标类型，定义一个名为`Response`、类型为`TABLE`的特殊度量至关重要，它需包含一个名为`Status`的列。`EM12c`框架将使用此列来表示目标的上下状态和历史可用性统计信息。您还必须为此度量定义一个关键条件（稍后将学习）。`EM12c`知道，如果`Response`度量的`Status`列生成了严重警报，则目标已宕机。获取目标可用性历史的一种方式是通过目标菜单：选择“目标信息”选项，然后点击可用性百分比。示例“Sample\
  \ Plug-in Host 1”的可用性历史如图 10-10 所示。\n\n![9781430249382_Fig10-10.jpg](img/9781430249382_Fig10-10.jpg)\n\
  \n图 10-10. Sample Plug-in Host 1 的示例可用性历史\n\n除了`Status`，您还可以在`Response`度量中收集更多列。在检查目标状态的同时，收集几个关键测量值通常很容易。例如，一个测量值可能是数据库连接请求的响应时间，或者是如“Sample\
  \ Plug-in Host 1”目标类型那样的主机负载平均值。这将节省收集调用次数，但不会影响目标的可用性。只有`Status`列被计入目标可用性。\n\n\
  ## 数据收集机制概述\n\n最后，让我们继续讨论数据收集。在绝大多数情况下，您将使用由`QueryDescriptor`元素配置的可用 fetchlet 之一。管理代理将根据定义的\
  \ fetchlet 执行收集方法并“获取”度量值。\n\n其他收集选项允许`EM12c`通过连接或聚合一些先前收集的度量来计算度量值。此类收集通过使用`ExecutionDescriptor`元素而非`QueryDescriptor`来定义。另一种度量收集选项是将代理配置为目标发送给它的数据的被动“监听器”（例如，通过使用\
  \ SNMP 陷阱）。可用的机制称为`receivelets`，并由`PushDescriptor`定义。我仅涵盖 fetchlet 的使用，因为这是唯一有完整文档记录的机制，但如果您想尝试使用另外两种高级度量收集机制，可以深入研究\
  \ XML Schema 文档。《Oracle Enterprise Manager Cloud Control 可扩展性程序员参考》（第 19 章）描述了 SNMP\
  \ receivelet 的用法。\n\n`QueryDescriptor`有一个属性`FETCHLET_ID`，用于唯一标识用于收集所需信息的 fetchlet\
  \ 类型。随着后面讨论各种 fetchlet，您会发现之前讨论的度量扩展适配器无非就是使用了其中一些 fetchlet。\n\n## Fetchlet 配置与属性\n\
  \n每个 fetchlet 都有自己的一组具有预定义名称的必需和可选属性。您通过定义具有这些名称的`Properties`元素来配置 fetchlet。例如，`OSLineToken`\
  \ fetchlet 对应于度量扩展中的“OS 命令—多列”适配器。此 fetchlet 有一个必需的`command`属性以及一些可选属性，如`startWith`和`delimiter`。您还可以指定额外的临时属性，这些属性可以作为“助手”来构成\
  \ fetchlet 的预定义配置属性。例如，`perlBin`和`fake`属性是从`command`属性中引用的。\n\n`Property`元素的`SCOPE`属性定义了属性值被解析的上下文。以下是最重要的`SCOPE`选项：\n\
  \n*   `GLOBAL`：值是具有占位符变量的`Property` XML 元素的内容，这些占位符被解析为当前`QueryDescriptor`元素的属性。在我们的示例中，`command`属性的作用域为`GLOBAL`，值为`%perlBin%/Perl`。`%%`内的占位符被替换为当前`QueryDescriptor`元素的属性值，例如`perlBin`。另一个`GLOBAL`属性的例子是引用`scriptDir`和`fake`属性的`script`属性。`GLOBAL`作用域也用于常量定义，例如`delimiter`属性。名称`GLOBAL`可能有误导性，但请记住其作用域是当前的`QueryDescriptor`元素。\n\
  *   `SYSTEMGLOBAL`：此值在`$AGENT_HOME/sysman/config`目录下的`emd.properties`配置文件的上下文中被解析。`Property`\
  \ XML 元素的内容是来自`emd.properties`代理配置文件的变量名。例如，`emd.properties`包含`perlBin`，定义了 Perl\
  \ 可执行文件的路径。如果使用 Perl 脚本收集度量值，这将非常有用，因为您可以始终使用随管理代理安装的 Perl 发行版，而不必希望系统上安装了兼容版本的\
  \ Perl。另一个有用的`SYSTEMGLOBAL`值是`scriptsDir`，它指向为所有插件安装脚本的路径，这些脚本位于一个与目标类型 ID 同名的子目录中。\n\
  *   `INSTANCE`：此值在目标实例的上下文中被解析（即目标配置时定义的实例属性的值）。这些值对于每个目标实例都是不同的。在我们的示例中，您可以看到`USE_FAKE_DATA`是如何被引用的，但没有引用`sample_host1_username`或`sample_host1_password`。如果度量收集实际使用了这些属性，它们会以某种方式传递给连接脚本。\n\
  *   `ENV`：此值取自环境变量。例如，如果您的监控脚本需要在服务器上安装一个特殊二进制文件，并且该二进制文件未随插件分发，您可以通过在代理启动前设置的某个环境变量来指定该二进制文件的路径。例如，`<Property\
  \ NAME=\"mypath\" SCOPE=\"ENV\">MYSQL_PATH</Property>`将获取环境变量`MYSQL_PATH`的值作为`mypath`属性的值，以便您稍后可以从`command`属性中以`%mypath%`的形式引用它。\n\
  \n\n\n可以在命令执行前设置环境变量——无论是用于定义需求还是传递参数。如果命令行参数包含特殊符号，在不同平台上的处理方式可能有所不同。环境变量似乎能在所有平台（包括\
  \ Linux、Windows 和 Unix）上可靠地传递。通过环境变量传递凭证和其他敏感信息可能比通过命令行更安全，因为命令行内容通常很容易被任何已登录的主机用户观察到。然而，某些平台可能会将进程的环境变量内容暴露给其他用户，就像\
  \ Linux 通过 `/proc` 文件系统所做的那样。本章后续部分，你将了解凭证监控，这是一种更安全地向脚本传递登录名和密码的方式。\n\n让我们总结一下\
  \ 清单 10-12 中 `Response` 指标的定义。`Response` 指标是一个单行指标，包含 `Load` 和 `Status` 两列。它使用了\
  \ `OSLineToken` 获取器，该获取器能够从操作系统命令返回一个多行、多列的结果集。获取器被配置为运行一个名为 `data_collector.pl`\
  \ 的 Perl 脚本，并通过管道符号 (`|`) 分隔列值来解析输出，同时只筛选以 `em_result=` 开头的行。\n\n**默认采集元数据**\n\n\
  现在你已经了解了 EM12c 用户如何配置新的目标实例（通过 `InstanceProperties` 元素），以及目标类型将采集哪些指标以及如何采集（通过 `Metric`\
  \ 元素），唯一缺失的部分是定义指标的采集频率以及指标的告警条件。这定义在默认采集元数据 XML 文件中，该文件位于 `<EDK>/oms/metadata/default_collection`，并从\
  \ `<EDK>/agent/default_collection` 链接。使用与目标类型元数据文件相同的命名约定。清单 10-13 展示了一个示例默认采集元数据定义。有关完整示例，请参阅示例主机\
  \ 1 目标的默认采集定义。\n\n清单 10-13. 示例默认连接元数据定义\n\n```\n<TargetCollection TYPE=\"sample_host1\"\
  >\n  <CollectionItem NAME=\"Response\">\n    <Schedule>\n      <IntervalSchedule\
  \ INTERVAL=\"5\" TIME_UNIT=\"Min\"/>\n    </Schedule>\n    <Condition COLUMN_NAME=\"\
  Status\" CRITICAL=\"1\" OPERATOR=\"LT\"/>\n  </CollectionItem>\n  <CollectionItem\
  \ NAME=\"Perf\" UPLOAD=\"1\">\n    <Schedule>\n      <IntervalSchedule INTERVAL=\"\
  5\" TIME_UNIT=\"Min\"/>\n    </Schedule>\n    <MetricColl NAME=\"CPUPerf\">\n  \
  \    <Condition COLUMN_NAME=\"non_nice\" WARNING=\"NotDefined\" CRITICAL=\"NotDefined\"\
  \n         OPERATOR=\"GE\"\n         MESSAGE=\"The value for %columnName% is %value%%%.\
  \  It has risen above the\n           critical (%critical_threshold%%%) or warning\
  \ (%warning_threshold%%%) threshold.\"\n         CLEAR_MESSAGE=\"The value for %columnName%\
  \ is %value%%%.\" />\n      <Condition ... />\n      ...\n    </MetricColl>\n  \
  \  <MetricColl NAME=\"MemoryPerf\">...</MetricColl>\n    <MetricColl NAME=\"CPUProcessorPerf\"\
  >...</MetricColl>\n    ...\n  </CollectionItem>\n  ...\n</TargetCollection>\n```\n\
  \n根元素是 `TargetCollection`，其 `TYPE` 属性应与目标类型元数据 XML 文件（`sample_host1`）中 `TargetMetadata`\
  \ 根元素的 `type` 属性相匹配。`TargetCollection` 元素包含多个 `CollectionItem` 元素，每个 `CollectionItem`\
  \ 元素对应目标类型元数据文件中的一个 `Metric` 元素。`CollectionItem` 的 `NAME` 属性应与指标名称匹配。\n\n当需要相同的采集频率或指标采集顺序时，还有一种方法可以在同一个采集中对多个指标进行分组。这是通过在\
  \ `CollectionItem` 内部包含 `MetricColl` 元素（每个指标一个）来实现的（例如，采集项 \"Perf\"）。在这种情况下，子元素\
  \ `MetricColl` 的 `NAME` 属性应与指标名称匹配，如示例中的 \"CPUPerf\"、\"MemoryPerf\" 和 \"CPUProcessorPerf\"\
  。请参阅 *Oracle Enterprise Manager Cloud Control Extensibility Programmer's Reference*（第\
  \ 3 章，第 3.5.1 节）。\n\n对于每个采集项，我们可以定义一个 `Schedule` 子元素，该子元素通常包含一个 `IntervalSchedule`\
  \ 子元素，使用数值属性 `INTERVAL` 和字符串属性 `TIME_UNIT` 来指示采集的频率。后者可以设置为 `Sec`、`Min`、`Hr` 或 `Day`，默认为\
  \ `Min`。由于这是一个默认采集定义，此设置代表初始的默认频率。EM12c 用户可以像修改任何其他指标一样修改采集间隔，插件开发人员可以使用 `IntervalSchedule`\
  \ 元素的 `MIN_INTERVAL` 和 `MAX_INTERVAL` 属性来设置这些设置的限制。其他调度选项也可用，例如在每月的某一天或每周的某一天运行。这些选项在可扩展性指南中没有文档说明，但你可以在\
  \ `<EDK>/doc/partnersdk/mrs/emcore/default_collection` 查看 XML 模式文档以获取更多选项，也可以在控制台中修改采集计划时看到它们。\n\
  \n如果未为某个指标定义计划，则除非 EM12c 用户打开实时指标视图（此时 OMS 每次刷新实时视图时都会向代理请求采集），否则代理不会自动采集该指标。无论初始采集计划是否在默认采集文件中定义，都可以在\
  \ EM12c 控制台中自定义计划。你可以使用目标的\"所有指标\"视图，如图 10-11 所示，对应于名为 \"Perf\" 的采集项（在前面的 清单 10-13\n\
  \n图 10-11. 自定义采集计划\n\n指标中的每一列都可以定义一个条件，用于测试警告和严重阈值——每列一个 `Condition` 元素。如果为每个指标定义一个采集项，则\
  \ `Condition` 元素是 `CollectionItem` 的子元素。否则，`Condition` 元素是 `MetricColl` 的子元素。`Condition`\
  \ 元素有两个必需属性：`COLUMN_NAME` 和 `OPERATOR`。后者定义了一个比较运算符，可以是数值关系运算符或字符串匹配运算符。在 清单 10-13\
  \ 中，`LT` 表示*小于*，`GT` 表示*大于*。字符串条件包括用于子字符串匹配的 `CONTAINS` 和用于正则表达式匹配的 `MATCH`。*可扩展性程序员参考*的第\
  \ 3.5.5 节提供了运算符的完整列表。请注意，运算符代码必须为大写。\n\n\n\n"
- "# 设置阈值与打包插件\n\n## 定义阈值与告警信息\n\n默认的警告和严重阈值可以通过使用 `WARNING` 和 `CRITICAL` 属性在 `Condition`\
  \ 元素中定义。就像收集计划一样，EM12c 用户可以修改这些阈值。警告和严重阈值都是可选的，如果找不到一个合理良好的默认值，通常可以不定义它们。值 `\"NotDefined\"\
  ` 等同于完全没有定义值，正如 清单 10-13 中针对 `\"non_nice\"` 列条件所示。我倾向于直接跳过定义，以保持元数据定义的简洁，就像 `Response`\
  \ 指标的 `Status` 列没有 `WARNING` 阈值一样。\n\n您还可以看到，可以定义列特定的告警信息，并使用像 `%columnName%` 这样的占位符变量来包含列名、最新值以及阈值。由于百分号\
  \ (`%`) 具有特殊含义，您应使用双百分号 (`%%`) 来在消息中包含真正的百分号。同样地，您可以定义当条件被清除时在 EM12c 中生成的自定义消息。还可以通过指定属性\
  \ `OCCURRENCES` 来设置在触发告警之前，该条件连续发生的次数。\n\n只要在目标默认收集文件中指定了条件操作符，就可以在 EM12c 控制台中自定义阈值以及发生次数。但是，操作符本身无法更改。因此，请特别注意选择正确的条件操作符。\n\
  \n### 打包插件\n\n现在您已经了解了最小化 EM12c 插件的所有组件，还需要放置由目标类型元数据中定义的指标收集提取器所调用的操作系统脚本。我建议使用\
  \ Perl 编写操作系统脚本，并使用随 Oracle Management Agents 安装的 Perl 版本。这是最独立于平台的方法（尽管出于简洁性考虑，Oracle\
  \ 提供的示例仅在 Linux 上工作——Perl 脚本只是调用一些操作系统实用程序来收集数据）。脚本放置在代理端暂存区的 `scripts` 目录中，并创建一个与目标类型同名的子目录。因此，在我们的示例中，`data_collector.pl`\
  \ 文件被放置在 `<stage>/agent/scripts/sample_host1` 中，其中 `sample_host1` 是目标类型。\n\n所有组件和脚本就位后，您现在可以打包插件归档文件了。您可以在打包之前运行插件验证，就像之前在\
  \ 清单 10-7 中所做的那样。但是，插件创建过程本身包含一个验证步骤，因此不必单独运行验证。\n\n在部署示例插件时，我使用了脚本 `build_sample_plugin.sh`，它不过是\
  \ `empdk create_plugin` 命令的一个小包装器。部署插件的完整命令如下：\n\n```\nempdk create_plugin -stage_dir\
  \ <stage_dir> -out_dir <output_dir>\n```\n\n两个必需参数定义了暂存目录的位置以及生成 OPAR 文件的输出目录。有关\
  \ `empdk create_plugin` 的可选参数的详细信息，请参阅 *Extensibility Programmer's Reference*（第\
  \ 13 章，第 13.4 节）。\n\n在打包插件期间，EDK 会在您的暂存区中创建额外的文件，这些文件将被打包到插件归档中。例如，它会创建在部署期间将目标类型定义导入到\
  \ OMS 中的 PL/SQL 代码。您无需担心或维护它们；每次创建插件归档时，它们都会被重新创建。\n\n创建的 OPAR 文件用于将插件分发给其他用户（EM12c\
  \ 管理员），无论您是为自己的组织还是为外部用户创建它，也无论它是免费插件还是商业插件。其部署过程与之前概述的示例插件部署过程相同，也在 *Extensibility\
  \ Programmer's Reference*（第 13 章，第 13.5 和 13.6 节）中有详细描述。最终用户关于插件管理的文档可在 *Oracle\
  \ Enterprise Manager Cloud Control 12c Administrator's Guide* 的第 22 章中找到（如果您直接向最终用户分发\
  \ OPAR 文件，请参阅第 12.4.3.2 小节的“导入插件归档”部分）。\n\n对于这三个主机示例插件，所有步骤都已在前面完成，因此初始示例已经部署且目标已创建。请注意，`oracle.samples.xsh1`\
  \ 插件实现了更多功能，您将在本章后面部分学习，但到目前为止您所学的内容基本上是任何带有新目标类型的插件的核心。\n\n## 代理的指标浏览器\n\n使用代理的指标浏览器\
  \ (Metric Browser) 接口来查看代理实际收集的内容，甚至查看所收集指标的一些调试信息，通常很有用。这在故障排除时特别有用，当不清楚问题是出在代理端的指标收集环节，还是发生在上传到\
  \ OMS 端并加载到存储库的过程中时。要为代理激活指标浏览器，请以运行代理的操作系统用户身份运行以下命令：\n\n```\nemctl setproperty\
  \ agent -name _enableMetricBrowser -value true\n```\n\n要确定指标浏览器的 URL，请运行命令 `emctl\
  \ status agent`。`Agent URL` 行将显示为 `http://host:port/emd/main/` 格式。修改此 URL，在 `emd`\
  \ 和 `main` 之间添加 `/browser/` 字符串，如下所示：`http://host:port/emd/browser/main`。如果您的代理是安全的，它可能使用\
  \ `https` 而不是 `http`，因此在那种情况下请使用 `https` URL。\n\n在使用临时列和计算列时，使用指标浏览器特别有用，这些内容将在后面描述。这里还提供了一个完整的指标定义\
  \ XML 片段，其中所有属性都显式定义，甚至包括默认值——这是学习一些未文档化选项的好方法。指标浏览器让您能够访问任何目标类型，而不仅仅是您自己的目标，因此您可以查看\
  \ Oracle 自身目标的完整（通常很复杂的）指标定义，这些定义可以为您提供关于如何创建自己指标的绝佳思路。还有其他关于指标收集的调试信息可用，但不幸的是，它尚未在任何文档中详细说明，而且到目前为止我还没有使用它的需要。\n\
  \n## 指标扩展的内部机制\n\n您可能已经注意到，定义目标类型指标与定义指标扩展 (Metric Extensions) 类似，只是采用 XML 格式。实际上，指标扩展功能本质上是用户界面，用于在没有创建全新插件和目标类型的负担下，向现有目标添加新指标。在幕后，指标扩展与您在目标类型元数据中看到的\
  \ XML 指标定义是相同的。\n\n所有指标扩展都存储在存储库数据库的 `SYSMAN` 模式中的表 `EM_MEXT_VERSIONS` 里。`METADATA_DEFINITION`\
  \ 列存储的不是别的，正是作为指标扩展定义的 XML `Metric` 元素。相关的 `CollectionItem` 元素位于该表的 `COLLECTION_DEFINITION`\
  \ 列中。\n\n`清单 10-14` 包含了我创建的第一个 `\"Open Cursors, %\"` 指标扩展的 XML 定义。这里为了可读性进行了格式化。\n\
  \n`清单 10-14`. 指标扩展的 XML 表示\n\n\n```\n<Metric NAME=\"ME$open_cursors_pct\" TYPE=\"\
  TABLE\">\n  <Display>\n    <Label NLSID=\"NLS_METRIC_oracle_databaseME$open_cursors_pct\"\
  >打开的游标数，百分比</Label>\n    <Description NLSID=\"NLS_DESCRIPTION_oracle_databaseME$open_cursors_pct\"\
  >\n      打开的游标数相对于 open_cursors 初始化参数的百分比。\n      仅返回会话的最大值。</Description>\n  </Display>\n\
  \  <TableDescriptor>\n    <ColumnDescriptor NAME=\"open_cursors_pct\" TYPE=\"NUMBER\"\
  >\n      <Display>\n        <Label NLSID=\"NLS_COLUMN_oracle_databaseME$open_cursors_pctopen_cursors_pct\"\
  >\n           打开的游标数</Label>\n        <Unit NLSID=\"mext_unit_nlsid_ME$open_cursors_pct_open_cursors_pct\"\
  >%</Unit>\n      </Display>\n      <CategoryValue CLASS=\"Default\" CATEGORY_NAME=\"\
  Capacity\">\n    </CategoryValue>\n  </ColumnDescriptor>\n</TableDescriptor>\n \
  \ <QueryDescriptor FETCHLET_ID=\"SQL\">\n    <Property NAME=\"STATEMENT\" SCOPE=\"\
  GLOBAL\" OPTIONAL=\"TRUE\">\n  SELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct\n\
  \  FROM (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
  \        GROUP BY sid\n        ORDER BY 2 DESC) c,\n       v$parameter p\n  WHERE\
  \ p.name = 'open_cursors' AND ROWNUM = 1;</Property>\n    <Property NAME=\"MachineName\"\
  \ SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">MachineName</Property>\n    <Property NAME=\"\
  Port\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">Port</Property>\n    <Property NAME=\"\
  SID\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">SID</Property>\n    <Property NAME=\"\
  UserName\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">UserName</Property>\n    <Property\
  \ NAME=\"password\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">password</Property>\n \
  \   <Property NAME=\"Role\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">Role</Property>\n\
  \    <CredentialRef NAME=\"SQLCreds\">\n  </CredentialRef>\n</QueryDescriptor>\n\
  </Metric>\n```\n\n如果你发现从头开始创建 XML 指标定义具有挑战性，可以先创建一个指标扩展作为原型，然后直接从存储库中提取 XML 定义，将其复制到你的目标类型元数据定义\
  \ XML 文件中，并根据需要进行修改。原始的 XML 定义为你提供了更大的灵活性。\n\n## EM12c 获取组件\n\nEM12c 自带了十几个有文档说明的获取组件。以下是可用获取组件的简要概述：\n\
  \n### OS 命令获取组件\n这类获取组件允许你运行操作系统命令和脚本，并将指标值作为输出传递。你已经看过示例了，这三个 OS 命令获取组件的功能与你在“指标扩展”部分看到的\
  \ OS 命令适配器相同。OS 命令由代理使用运行代理本身的同一操作系统用户执行，该代理位于代理安装的主机上。为了尽可能确保平台兼容性，我建议你使用 Perl\
  \ 脚本作为命令，并使用代理附带的 Perl。脚本和任何依赖项可以添加到插件中，并在插件部署到代理上时进行分发。请注意，如果依赖项无法简单地复制，而需要在主机上进行编译或任何其他配置，那么这些依赖项很可能需要在运行代理的主机上预先安装。这会使部署复杂化，应尽量避免。例如，如果你想通过\
  \ Perl 脚本使用 `DBI` 连接到非 Oracle 数据库，你需要编译所需的 `DBD` 模块，如 `DBD::MySQL`，这需要在插件部署之前，在主机的每个代理上手动完成。因此，更推荐使用\
  \ Perl 本地模块（例如此示例中的 `Net::MySQL`——这是我用于 MySQL 插件的模块）。\n\n### SQL 获取组件\n此获取组件允许你针对\
  \ Oracle 数据库运行 SQL 语句或 `PL/SQL` 块，并返回一个值表。可以为 `SQL` 和 `PL/SQL` 指定多个输入参数。对于 `PL/SQL`\
  \ 块，必须定义一个输出参数，并以 `PL/SQL REF CURSOR` 形式或定义为对象数组的命名类型的形式从 `PL/SQL` 返回。该获取组件的属性定义了数据库连接和凭据，以及\
  \ `SQL` 参数、要运行的内联 `SQL` 语句或 `SQL` 文件，以及要检索的最大行数。此获取组件不能用于针对非 Oracle 数据库运行 `SQL`。此获取组件的一些用例包括从\
  \ Oracle 数据库中的状态表收集应用指标，或监控在数据库内部运行的应用，例如 Oracle Application Express (`APEX`) 应用。\n\
  \n### SNMP 获取组件\n此获取组件允许从 `SNMP` 目标收集指标。基于 `SNMP` 获取组件的指标可以从多个对象标识符 (`OID`) 收集值。每个\
  \ `OID` 可以引用单个变量或多个实例（例如，每个网络接口一个实例）。该获取组件还支持 `PINGMODE`，这是一种创建响应指标的简单方法，如果 `SNMP`\
  \ 端口响应则返回 1，如果超时则返回 0。这比生成指标收集错误要好。该获取组件支持基于团体字符串的 `SNMP v1` 和 `v2` 协议，以及更安全的 `v3`\
  \ 协议，后者需要凭据而不是团体字符串。显而易见的用例是监控 Oracle 代理原生不支持的远程网络设备或远程主机（例如 Ubuntu Linux），或者因某些原因无法安装代理的设备。正如你可能猜到的，指标扩展的\
  \ `SNMP` 适配器就是基于此获取组件。然而，`SNMP` 适配器的配置非常有限，以至于在指标扩展的上下文中几乎无用。\n\n### HTTP 数据获取组件\n\
  这类获取组件与 OS 命令获取组件非常相似，但它通过使用指定的 `URL` 执行 `HTTP GET` 请求来获取输出，而不是执行 OS 命令。输出可以是原始值、值行或基于分隔符的标记化值行——所有选项与\
  \ OS 命令获取组件相同。\n\n### URLXML 获取组件\n此获取组件可以处理从 `HTTP URL` 检索的 `XML` 响应，并根据预定义的模式匹配提取表格数据。它仅支持\
  \ `HTTP GET` 请求，也可以配置代理服务器，类似于 HTTP 数据获取组件。\n\n\n请注意，模式被定义为从分层的 XML 结构中提取行，因为指标接受的是值表格。每个值是一个数字或字符串，因此无法返回和处理复杂类型。你需要将数据集合扁平化。\n\
  \n*   `REST fetchlet`：此组件提供了从 RESTful 数据源收集数据的方法。它支持`GET`和`POST` HTTP 方法以及基本身份验证。响应格式可以是`XML`或`JavaScript\
  \ 对象表示法`（`JSON`），并可以通过使用`XPath`或`JSONPath`转换为用于指标的表格化呈现。同时支持`HTTPS`。\n*   `URL Timing\
  \ fetchlet`：这是一种用于测试 Web 应用程序性能的有用收集机制。它支持简单的代理，并可用于`HTTP`和`HTTPS`协议。该 fetchlet\
  \ 支持`HTTP`的基本身份验证。它具备定义连接超时和重试次数的能力，并且在配置所收集的指标方面非常灵活。该 fetchlet 可以接受多个 URL。对于每个\
  \ URL，它不仅获取页面本身，还获取页面所需的任何内容，如图像、样式表等。它可以提供每个 URL 或每个 URL 的详细统计信息。有几十个统计指标，从明显的如接收的总字节数和检索页面的总时间，到高级统计如`DNS`解析时间或每个请求接收第一个字节前的平均时间。\n\
  *   `JDBC fetchlet`：此组件与`URL Timing fetchlet`类似，因为它收集针对任何支持`JDBC`连接的数据库执行指定 SQL\
  \ 语句的时间信息。它收集诸如请求状态、总时间、检索行数等指标，以及更精细的计时指标，如独立的连接时间和获取时间。遗憾的是，这个`JDBC fetchlet`不返回`SELECT`命令执行结果所检索到的值。为了更好地反映其目的，将其称为`JDBC\
  \ Timing fetchlet`可能更合适，但 Oracle 可扩展性文档并非如此命名。\n*   `Web Services and JMX fetchlets`：这些组件提供了使用\
  \ Web 服务或 Java 管理扩展（`JMX`）来检索数据的机制。两者都是被广泛采用的行业标准。Web 服务是一种通用的分布式消息传递和远程执行标准，而`JMX`是专门为\
  \ Java 应用程序可管理性设计的标准。虽然每个 Java 虚拟机（`JVM`）实现通常都支持`JMX`，但应用程序需要进行插桩，以便将其指标报告给`JVM`，从而使监控工具能够访问这些指标。Oracle\
  \ 的应用服务器支持`JMX`，许多其他软件产品如 IBM WebSphere 和 Red Hat JBoss 也同样支持。许多 Apache 项目也支持`JMX`——例如\
  \ Apache Tomcat 或 Hadoop 生态系统中的 Apache ZooKeeper。事实上，Hadoop 的核心组件`NameNode`和`JobTracker`都进行了插桩，以便通过`JMX`暴露其运行时指标。*可扩展性程序员参考手册*的第\
  \ 20 章详细介绍了如何基于 Web 服务和`JMX`创建新的目标类型。\n*   `WBEM fetchlet`：此收集器用于从支持基于 Web 的企业管理（`WBEM`）标准的组件检索指标。该标准在业界被广泛采用，并得到许多开源和专有软件的支持。`WBEM`标准比过时的`SNMP`协议先进得多，因为它包含所有元数据、更安全，并且在不同供应商之间兼容性更好。`WBEM\
  \ fetchlet`本质上是一个通用信息模型（`CIM`）客户端，它连接到`CIM 对象管理器`（`CIMOM`），通常称为`CIM 服务器`。Windows\
  \ 管理接口（`WMI`）是微软对`WBEM/CIM`的实现。`CIMOM`服务器可以嵌入在设备或服务器中（例如某些 Cisco 设备或 Windows 或 HP-UX）。\n\
  \n此外，还有一个与`WBEM fetchlet`相似的`WS-Management fetchlet`，但它基于`WS-Management`标准。微软 Windows\
  \ 远程管理（`WinRM`）就是`WS-Management`实现的一个例子。\n*   `DMS Fetchlet`：此收集器允许使用动态监控服务（例如，在\
  \ Oracle 应用服务器和融合中间件中实现）。它允许应用程序进行插桩，以通过`DMS`展示运行时指标，然后代理可以使用非常高效的收集机制。与基于 Shell\
  \ 脚本的指标不同，`DMS fetchlet`收集器不会派生任何进程，因此在资源消耗方面非常高效。`DMS API`于 2001 年作为 Java 规范请求\
  \ 138：性能指标插桩提交给了 Java 社区进程。然而，它并未在业界广泛采用，并于 2010 年被撤回。\n\n\n\n![image](img/sq.jpg)\
  \ **注意** 你可以在*《可扩展性程序员参考手册》*的第 20 章找到关于 fetchlet 的完整描述。\n\n此外，一些 fetchlet 并未被文档记录（因此，不能保证在将来甚至当前版本中仍能工作）。例如，`JDBCSQL`\
  \ fetchlet 与 JDBC 定时 fetchlet 不同，它允许通过 JDBC 连接到任何带有 JDBC 驱动的数据库来收集 SQL 返回的值，而不仅限于\
  \ Oracle。但是，请谨慎依赖未记录的 fetchlet，因为任何 EM12c 补丁集或补丁都可能影响这些 fetchlet 的功能或可用性，即使它们目前看起来工作正常。\n\
  \n## 计算指标列\n\n最可靠且同时最简单的收集机制是无状态的——它们返回的值仅源自被监控目标的当前状态，而不考虑之前的收集。一个典型的例子是当前活动数据库会话的数量。然而，我们经常需要计算指标相对于之前收集值的增量差异。例如，你可能希望收集累积计数器的当前值，例如自数据库实例启动以来的用户提交次数，或者如你将在主机示例中看到的，CPU\
  \ 核心在某种模式下工作的累积 CPU ticks 数（例如在 Linux 中使用 `vmstat -s`）。这些累积值本身并不有用，但可以用于指示自上次收集以来的差异。\n\
  \n让我们看一下来自 sample_host1 目标类型的 CPU 利用率收集示例（参见 清单 10-15）。\n\n**清单 10-15**. 使用 `TRANSIENT`\
  \ 和 `COMPUTE_EXPR` 列\n\n```xml\n<Metric NAME=\"CPUPerf\" TYPE=\"TABLE\">\n  <TableDescriptor>\n\
  \      <ColumnDescriptor NAME=\"non_nice_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
  />\n      <ColumnDescriptor NAME=\"nice_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n\
  \      <ColumnDescriptor NAME=\"system_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n\
  \      <ColumnDescriptor NAME=\"idle_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n\
  \      <ColumnDescriptor NAME=\"io_wait_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n\
  \      <ColumnDescriptor NAME=\"irq_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n \
  \     <ColumnDescriptor NAME=\"non_nice\" TYPE=\"NUMBER\"\n                    \
  \    COMPUTE_EXPR=\"100.0 * (non_nice_t - _non_nice_t)/(\n                     \
  \                           (non_nice_t - _non_nice_t) +\n                     \
  \                           (nice_t - _nice_t) +\n                             \
  \                   (system_t - _system_t) +\n                                 \
  \               (idle_t - _idle_t) +\n                                         \
  \       (io_wait_t - _io_wait_t) +\n                                           \
  \     (irq_t - _irq_t)\n                                               )\">\n  \
  \      <Display>...</Display>\n      </ColumnDescriptor>\n      <ColumnDescriptor\
  \ NAME=\"nice\" TYPE=\"NUMBER\"\n                        COMPUTE_EXPR=\"100.0 *\
  \ (nice_t - _nice_t)/(\n                                                (non_nice_t\
  \ - _non_nice_t) +\n                                                (nice_t - _nice_t)\
  \ +\n                                                (system_t - _system_t) +\n\
  \                                                (idle_t - _idle_t) +\n        \
  \                                        (io_wait_t - _io_wait_t) +\n          \
  \                                      (irq_t - _irq_t)\n                      \
  \                         )\">\n      ...\n  </TableDescriptor>\n</Metric>\n```\n\
  \n首先，你会看到前七列被标记了属性 `TRANSIENT=\"TRUE\"`。这告诉代理，这些列的值实际上不会被发送到 OMS 存储到仓库中，而是被收集起来以便用于计算其他列的值。定义了\
  \ `COMPUTE_EXPR` 属性的列，其值不是来自 fetchlet，而是使用该定义的表达式来计算值。计算表达式可以通过名称引用现有的列，并且这些被引用的列必须在\
  \ `TableDescriptor` 中先定义，然后才能在 `COMPUTE_EXPR` 中被引用，因为列值是按从上到下的顺序依次计算的。\n\n要引用前一次收集中列的值，只需在列名前加上一个下划线符号\
  \ (`_`)。因此，如果当前值是 `nice_t`，那么前一次收集的值就是 `_nice_t`。于是，差值就是 `nice_t - _nice_t`，这表示自上次收集以来在用户模式下执行\
  \ niced 进程所花费的 CPU ticks 数。将自上次收集以来的所有 CPU ticks 相加，就得到了自上次收集以来的 CPU ticks 总数。CPU\
  \ 执行 niced 用户进程的时间百分比，就是 niced CPU ticks 与总 ticks 数的比值，通过乘以 100 归一化为百分比。这同样适用于其他所有\
  \ CPU 模式，如 system 或 idle CPU。\n\n让我们看另一个例子：计算用户回滚和提交的次数。Oracle 数据库保留了自数据库启动以来的提交和回滚计数器，但纯粹基于累积计数器的计算对于监控并不有用。有用的是两次收集间隔之间平均每秒的提交和回滚次数。因此，如果前一次提交数是在时间\
  \ `t0` 收集的 `c0`，当前收集是在 `t1` 收集的 `c1`，那么每秒提交次数就是 `(c1–c0)/(t1–t0)`。我不会在指标定义中特别引用时间戳，因为\
  \ EM12c 会隐式添加时间戳（有一种方法可以显式收集它，但很少需要）。因此，我们无法从 `COMPUTE_EXPR` 定义中访问该时间戳值。然而，我们真正需要的是时间间隔。\n\
  \n尽管你在默认收集定义中指定了间隔，但你不应该将这个值硬编码到 `COMPUTE_EXPR` 中，因为 (1) 用户可以自定义它，并且 (2) 实际间隔可能略有不同，因为配置的间隔只是一个目标值。幸运的是，EM12c\
  \ 有一个内置变量 `__interval`（注意是双下划线前缀），它返回自上次收集以来的秒数。因此，一个包含每秒提交和回滚次数的指标可能如 清单 10-16\
  \ 所示。\n\n**清单 10-16**. 在 `COMPUTE_EXPR` 列中使用 `__interval`\n\n```xml\n<Metric NAME=\"\
  transactions_stat\" TYPE=\"TABLE\">\n  <TableDescriptor>\n    <ColumnDescriptor\
  \ NAME=\"commits\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n    <ColumnDescriptor NAME=\"\
  commits_ratio\" TYPE=\"NUMBER\"\n                      COMPUTE_EXPR=\"(commits -\
  \ _commits) / __interval\">\n      <Display>...</Display>\n    </ColumnDescriptor>\n\
  \    <ColumnDescriptor NAME=\"rollbacks\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n\
  \    <ColumnDescriptor NAME=\"rollbacks_ratio\" TYPE=\"NUMBER\"\n              \
  \        COMPUTE_EXPR=\"(rollbacks - _rollbacks) / __interval\">\n      <Display>...</Display>\n\
  \    </ColumnDescriptor>\n  </TableDescriptor>\n  <QueryDescriptor>...</QueryDescriptor>\n\
  </Metric>\n```\n\n\n\n**清单 10-16** 中的示例并非来自示例主机目标，但请设想 `QueryDescriptor` 使用了一个 SQL\
  \ fetchlet，该 fetchlet 返回两列数据：自启动以来数据库实例的提交和回滚累积次数。假设在第一次采集时，fetchlet 返回的提交列值为 1,000。因为是首次采集，之前没有\
  \ `_commits` 或 `__interval` 的值，且计算列尚未计算。在 60 秒后进行的第二次采集中，设想 fetchlet 返回的提交数为 1,300。这种情况下，`commit_ratio`\
  \ 列将计算为 `(1,300 – 1,000)/60`，即每秒 5 次提交。回滚列也适用相同的逻辑。\n\n## 使用计算表达式 (COMPUTE_EXPR)\n\
  \n请注意，`QueryDescriptor` 中定义的 fetchlet 应返回值，并跳过计算列。并非必须将所有计算列的定义延迟到 `TableDescriptor`\
  \ 的末尾，您可以将计算列放在它们所引用的列之后。计算列由代理计算，您可以在 Metric Browser 中清晰地监控此过程。代理会跟踪 `TRANSIENT`\
  \ 列的值，但不会将其提交给 OMS，因此不会增大 EM12c 存储库的大小。\n\n计算表达式也可用于转换单位（例如，如果不需要精确度，可从字节转换为千字节或兆字节），或者当某些指标返回块（blocks）时，将其转换为实际字节数。\n\
  \n### 处理重置的累积计数器\n\n我发现，当处理可能随时重置的累积计数器（如同实例统计信息在实例重启时会被重置）时，使用一个技巧很有用，否则可能导致负差值，进而产生巨大的负比率。相反，应跳过此类采集。这对于使您的指标采集值得信赖至关重要。\n\
  \n`COMPUTE_EXPR` 支持一种条件运算符，形式为 `{条件} ? {真值} : {假值}`。如果先前采集的值高于当前值，则应返回一个空值，我倾向于使用空值而非\
  \ 0，因为它表明采集数据只是缺失。因为 `COMPUTE_EXPR` 不希望公式中出现 `NULL`（无值），我使用了一个技巧来为列生成空值：我通过除以 0\
  \ 来引发异常。因此，我的公式看起来像 `_val > val ? 1/0 : (val - _val)/__interval`。我了解到 EM12c 会捕获此异常并假定该列值为空。此方法至少从\
  \ Grid Control 10.2 开始有效，并且在 12.1.0.2 中仍然有效。但是，请使用任何新的补丁集测试您的指标采集；因为此行为未文档化，不能保证它不会改变。我很希望能有一个显式的表达式来返回类似\
  \ `NULL` 的值。\n\n## 关键列 (Key Columns)\n\n就像在指标扩展中一样，可以将某些列声明为关键列，并将从 fetchlet 返回的多行作为表中的多行进行处理。**清单\
  \ 10-17** 展示了一个按 CPU 统计指标的示例，其中 CPU 编号被定义为 `KEY` 列。结果与指标扩展中的关键列相同。完整的 XML 片段位于 `sample_host1`\
  \ 目标类型的目标类型元数据中。\n\n**清单 10-17**.  关键列定义示例\n\n```\n<Metric NAME=\"CPUProcessorPerf\"\
  \ TYPE=\"TABLE\">\n  <TableDescriptor>\n      <ColumnDescriptor NAME=\"CPUNumber\"\
  \ TYPE=\"NUMBER\" IS_KEY=\"TRUE\"/>\n      <ColumnDescriptor NAME=\"CPUUser\" TYPE=\"\
  NUMBER\" IS_KEY=\"FALSE\"/>\n      ...\n  </TableDescriptor>\n  ...\n</Metric>\n\
  ```\n\n## 动态属性 (Dynamic Properties)\n\n我目前只介绍了 EM12c 用户在添加目标实例时定义的静态实例属性。然而，存在一种机制可以动态收集属性，这些属性之后可在指标采集的插件配置中使用。例如，您可能希望收集目标版本或其运行的平台信息，以便随后收集依赖于平台的指标（例如，Linux\
  \ 和 Windows 平台通常需要不同处理）。您也可以使用动态属性在目标主页上显示（稍后您将了解这部分内容）。\n\n就像静态实例属性一样，动态属性在 `InstanceProperties`\
  \ 下定义为一个 `DynamicProperties` 元素。该元素结构与 `Metric` 元素相似，但没有 `TableDescriptor`。属性列表在\
  \ `PROP_LIST` 属性中定义为分号分隔的列表（例如，`\"prop1;prop2;prop3\"`）。它还有一个特殊的格式 `ROW`，替代通常用于指标的\
  \ `TABLE`。与指标类似，`DynamicProperties` 包含一个 `QueryDescriptor`，定义了用于收集 `PROP_LIST` 中列出属性的\
  \ fetchlet。该 fetchlet 应仅返回一行，其值与 `PROP_LIST` 属性相对应。**清单 10-18** 展示了一个来自我们一直用作示例的\
  \ `sample_host1` 目标的动态属性的简化片段。\n\n**清单 10-18**.  来自 sample_host1 目标的启动日期动态属性示例\n\
  \n```\n<InstanceProperties>\n  <InstanceProperty ...>...</InstanceProperty>\n  <DynamicProperties\
  \ NAME=\"HostSampleBootDate\" PROP_LIST=\"bootDate\" FORMAT=\"ROW\">\n    <QueryDescriptor\
  \ FETCHLET_ID=\"OSLineToken\">\n      <Property .../>\n      <Property NAME=\"script\"\
  \ SCOPE=\"GLOBAL\">\n          %scriptsDir%/sample_host1/data_collector.pl --collect\
  \ BootDate --fake \"%fake%\"\n      </Property>\n      <Property .../>\n    </QueryDescriptor>\n\
  \  </DynamicProperties>\n</InstanceProperties>\n```\n\n然后，可以在指标采集的 fetchlet 配置中，通过\
  \ `SCOPE=\"INSTANCE\"` 的 `Property` 元素引用动态属性——就像引用任何其他静态属性一样。\n\n您可以在 *可扩展性程序员参考手册*\
  \ 的第 3.3.6.2 节中找到关于 `DynamicProperties` 的更多信息。然而，官方文档相当稀少。您可以在 `<EDK>/doc/partnersdk/mrs/emcore/targetType`\
  \ 下的 XML 模式文档中找到更多细节。\n\n动态属性的最佳用途之一是定义类别属性，这些属性继而用于目标类型元数据中使用 `ValidIf` 元素的条件定义中。此元素可以定义为多个元素（如\
  \ `Metric` 或 `QueryDescriptor`）的子元素，以便仅当定义的类别属性匹配某些选择时才激活某些指标。另一个用例是根据类别属性的值配置不同的\
  \ fetchlet 来收集指标值。不幸的是，截至 EM12c 版本 12.1.0.2.0，此功能尚未正式文档化，因此依赖它时应谨慎。然而，它自 Grid Control\
  \ 10g 版本就已可用，您可以在 Oracle 开箱即用的插件中看到它的使用方式（例如，在其 `rac_database` 目标类型中）。您可以在 `<AGENT_BASE>/plugins/oracle.sysman.db.agent.plugin_12.1.0.2.0/metadata/rac_database.xml`\
  \ 中找到 `rac_database` 目标类型的元数据定义。请注意，Oracle 通过包含其他文件的 XML 内容来使用 XML 功能，以方便重用相同的定义。例如，RAC\
  \ 数据库、ASM 实例和数据库实例的数据库版本计算是相同的，因此它被定义在 `dyn_props.xmlp` 文件中，并从多个目标类型元数据定义文件中引用。\n\
  \n\n\n请注意，Oracle 的 `sample_host` 目标还包含定义相关链接的其他动态属性。我认为这部分示例自 10g/11g Grid Control\
  \ 以来就未被移除，且现在已不再相关。在 EM12c 之前，可扩展性框架的功能很少用于自定义目标的主页面，而向主页面的相关链接部分添加自定义链接是其中之一。EM12c\
  \ 拥有丰富的目标用户界面定义选项，不再使用通过动态属性定义的相关链接，因此所有 `sample_host` 演示目标中的这个动态属性都会被忽略，并且应该已被移除。\n\
  \n## 报告\n\nEM12c 提供了两种报告机制：\n\n*   `Information Publisher`：这与 Grid Control 10g/11g\
  \ 版本中存在的机制相同，该机制拥有 `Information Publisher` PL/SQL API，并且过去需要使用 PL/SQL 创建报告定义。EM12c\
  \ 现在的 `Information Publisher` 报告定义是基于 XML 的，并且能够通过使用 EM12c 控制台设计报告以及通过使用 `emcli`\
  \ 导出报告。为了在 10g/11g 中获得类似的功能，我不得不创建一个自定义提取器，从使用控制台 UI 开发的报告中生成基于 PL/SQL API 的定义。EM12c\
  \ 仍然会在后台将 XML 转换为 PL/SQL 调用，但与那些冗长繁琐、几乎无法在不尝试执行的情况下进行语法验证的 PL/SQL 定义相比，XML 定义的便利性是巨大的。有关创建和自定义\
  \ `Information Publisher` 报告的详细文档（包括 XML 元素的细节），请参阅《*可扩展性程序员参考手册*》的第 4 章。\n*   `BI\
  \ Publisher`：EM12c 可以与 Oracle Business Intelligence Publisher 集成，以获得更高级的报告功能。然而，与\
  \ `BI Publisher` 的集成可能需要为 Oracle Business Intelligence Publisher 购买许可，根据我的观察，这阻碍了\
  \ `BI Publisher` 在 EM12c 中的采用。如果你正在为外部用户（而不仅仅是你自己的组织）开发插件，你可能不应该依赖目标 EM12c 环境中 `BI\
  \ Publisher` 的可用性，因此请务必使用 `Information Publisher` 提供功能相当的报告。《*可扩展性程序员参考手册*》的第 5\
  \ 章提供了关于创建 `BI Publisher` 报告的非常简要的说明，但其文档质量和深度远不及 `Information Publisher` API 的文档。它还要求读者预先了解\
  \ Oracle Business Intelligence Publisher 产品。\n\n尽管《*可扩展性程序员参考手册*》的第 4 章指出 `Information\
  \ Publisher` 已弃用，但现实情况是，有太多现有的报告和客户依赖它，除非 Oracle 将 `BI Publisher` 默认捆绑在 EM12c 中，否则它在\
  \ EM12c 乃至可能的后续版本中都不会消失。我个人对于插件开发的建议是，目前坚持使用 `Information Publisher`，直到 Oracle 提供不需要与额外产品（和许可）集成的报告功能。这也确保了你的插件可以在任何\
  \ EM12c 安装中运行，无论其是否与 `BI Publisher` 集成。本节仅涵盖 `Information Publisher` 报告。尽管《*可扩展性程序员参考手册*》的第\
  \ 5 章涵盖了部署 `BI Publisher` 报告，但没有关于如何将它们与插件归档文件打包在一起的说明。\n\n在 EM12c 中创建 `Information\
  \ Publisher` 报告相当简单。你可以研究包含在 `oracle.samples.xsh1` 插件中、随 `sample_host1` 目标打包的报告示例。请按照以下步骤使用\
  \ `Information Publisher` API 创建新的报告定义并将其与你的插件打包：\n\n1.  当插件的第一个版本（尚未包含报告）和目标类型开发并部署后，使用\
  \ EM12c 控制台的报告向导创建报告定义。这将需要创建 SQL 和/或 PL/SQL 来查询存储库视图并以报告组件（如图表、文本标签、链接和表格）所需的格式提取信息（例如目标的指标、配置等）。在这个阶段，你将尽可能接近期望的报告，并通过迭代改进你的报告。有关可用存储库视图的文档，请参阅《*可扩展性程序员参考手册*》第\
  \ 18 章。\n2.  使用 `emcli export_report` 命令提取所设计报告的 XML 定义。\n3.  你可以修改并进一步自定义提取出的 XML\
  \ 报告定义。XML 格式为报告开发者提供了 EM12c 控制台报告向导中不直接提供的额外设计功能。《*可扩展性程序员参考手册*》第 4 章的大部分内容都致力于记录\
  \ `Information Publisher` 报告的 XML 元素，你应该将其用作参考。\n4.  最后，将创建的报告定义文件放入 `<STAGE>/oms/metadata/reports`\
  \ 中，并打包新版本的插件。只要报告定义放在正确的位置，EDK 在创建 OPAR 文件时会自动提取报告。\n\n当包含报告的插件部署到 OMS 上时，其报告在\
  \ EM12c 控制台的 `Information Publisher` Reports 部分作为 `SYSTEM` 报告可用。这些报告不能被 EM12c 用户删除或修改。但是，可以克隆这些报告以创建一个副本，以便在需要时进行自定义。10g/11g\
  \ Grid Control 允许将某些 `SYSTEM` 报告标记为直接在目标主页的 Reports 选项卡中可用。此选项卡已从 EM12c 中移除，因为它提供的目标主页面\
  \ UI 自定义功能远远超过了简单嵌入报告的旧功能。\n\n`oracle.samples.xsh1` 插件中性能报告类别下的两个报告是很好的研究示例。该插件中的配置报告使用了虚拟数据（从\
  \ `DUAL` 表中选择常量），因此不是一个有用的研究示例。\n\n使用元数据注册服务 (MRS) 直接更新存储库中的报告定义而无需重新打包和重新部署插件是很有用的。有关\
  \ MRS 的更多详细信息，请参阅本章末尾。\n\n## 企业配置管理\n\nEM12c 可扩展性框架完全支持企业配置管理 (ECM)。虽然 10g/11g Grid\
  \ Control 支持 ECM 功能，但它未为第三方插件开发者记录并提供官方支持（尽管 Oracle 自己的插件使用了 ECM）。EM12c 为 ECM 添加了基于\
  \ XML 的元数据定义，取代了笨拙的基于 PL/SQL 的定义，这为插件开发者提供了简单的支持。\n\n添加配置管理功能有三个步骤：\n\n\n\n"
- '# 1. 确定并收集配置


  首先，确定需要收集的配置。将配置组织在一个或多个表中，其中每个表对应一个配置项。配置项可以是单行或多行的，就像收集监控指标一样。如果定义配置的表之间存在关系，则可以定义具有层次关系的完整
  ECM 模式。可以将其视为 ECM 元数据，它向 EM12c 描述配置信息，以便可以像使用开箱即用的目标一样使用它。ECM 元数据是一个 XML 文件，放置在
  OMS 暂存区的 `<STAGE>/oms/metadata/snapshotlive` 目录中。基于 ECM 元数据，EM12c 会在存储库的 `SYSMAN`
  模式中创建自定义表和视图。


  '
- '# 2. 定义配置指标


  每个配置项都作为目标类型元数据 XML 文件中定义的指标进行收集，但配置指标需要特殊设置。因此，你需要在目标类型元数据中定义特殊的收集指标。


  '
- "# 3. 定义默认收集项\n\n在默认收集元数据 XML 文件中定义特殊的默认收集项。\n\n在 EDK 提供的三个示例中，只有 `oracle.samples.xsh3`\
  \ 插件包含了完整的 ECM 实现。`oracle.samples.xsh1` 和 `oracle.samples.xsh2` 插件确实定义了配置指标，但缺少\
  \ ECM 元数据，因此不会创建存储库表，这意味着代理收集的配置信息实际上没有被加载到任何地方。忽略前两个示例插件中的指标即可。我怀疑开发人员在将演示插件拆分为多个示例时，只是忘记删除这些指标。\n\
  \n**清单 10-19** 包含了来自 `oracle.samples.xsh3` 插件的 ECM 元数据片段。此文件应放置在暂存区的 `<STAGE>/oms/metadata/snapshotlive`\
  \ 中。\n\n## 清单 10-19. ECM 元数据片段\n\n```xml\n<METADATAS>\n  <METADATA SNAP_TYPE=\"\
  HostSample3Snap\" TARGET_TYPE=\"sample_host3\" VER=\"1\">\n    <METADATA_UI_NAME>Hostsample\
  \ Configuration Data</METADATA_UI_NAME>\n    <TABLE NAME=\"MGMT_EMX_HS_SYSTEM\"\
  \ SINGLE_ROW=\"Y\">\n      <UI_NAME>Hostsample System Configuration</UI_NAME>\n\
  \      <COLUMN NAME=\"hostname\" TYPE=\"STRING\" TYPE_FORMAT=\"256\" IS_KEY=\"N\"\
  >Hostname</COLUMN>\n      <COLUMN NAME=\"version\" TYPE=\"STRING\" TYPE_FORMAT=\"\
  256\" IS_KEY=\"N\">Version</COLUMN>\n    </TABLE>\n    ...\n    <TABLE NAME=\"MGMT_EMX_HS_NET\"\
  \ SINGLE_ROW=\"N\">\n      <UI_NAME>Hostsample Network Configuration</UI_NAME>\n\
  \      <COLUMN NAME=\"net_interface\" TYPE=\"STRING\" TYPE_FORMAT=\"32\" IS_KEY=\"\
  Y\">Interface</COLUMN>\n      <COLUMN NAME=\"net_mtu\" TYPE=\"NUMBER\" IS_KEY=\"\
  N\">Maximum Transmission Unit (bytes)</COLUMN>\n      <COLUMN NAME=\"net_flag\"\
  \ TYPE=\"STRING\" TYPE_FORMAT=\"16\" IS_KEY=\"N\">Flag</COLUMN>\n    </TABLE>\n\
  \  </METADATA>\n</METADATAS>\n```\n\nECM 元数据包含根元素 `METADATAS`，它只是一个容器，用于包含由 `METADATA`\
  \ 元素定义的一个或多个快照。一个 `METADATA` 元素必须匹配到我稍后将在默认收集元数据中定义的一个 `CollectionItem`。可以将其视为一个配置快照。\n\
  \n每个配置快照定义一个或多个表，其中每个表匹配目标类型元数据中定义的一个配置指标。所有配置指标也必须包含在默认收集元数据中匹配的 `CollectionItem`\
  \ 中。配置表和配置指标之间的列当然也必须匹配。多行表用 `SINGLE_ROW=\"N\"` 属性标记，并且必须包含至少一个使用 `IS_KEY=\"Y\"\
  ` 标记为键的列。由于你对元数据定义很熟悉，我就不逐一解释每个属性了。大多数属性都是自解释的，你可以在 *可扩展性程序员参考手册* 的第 6 章中找到完整的细节。\n\
  \n请注意，每次更改 ECM 元数据时，都需要增加其版本号（`VER` 属性），就像目标类型元数据一样。\n\n文档中提到了 `generate_ecm_resources`\
  \ 实用程序，它大概是 EDK 的一部分。该实用程序旨在生成配置指标模板以及相关的默认收集模板，以便所有表名、列名和其他项目都能匹配——我发现从头开始创建这些可能会相当混乱。不幸的是，在我使用的最新\
  \ EDK 发行版（随 EM12c 的 12.1.0.2 版本一起提供）中缺少这个实用程序，因此我无法利用它。\n\n"
- "# 创建目标类型元数据的配置指标\n\n目标类型元数据的配置指标需要创建，如 **清单 10-20** 所示。请注意，该清单只提供了相关的片段，因为 `QueryDescriptor`\
  \ 元素中的 fetchlet 配置和 `Display` 元素对你来说已经很熟悉了。完整的 XML 定义可在 EDK 示例插件中找到。\n\n## 清单 10-20.\
  \ 配置指标片段\n\n```xml\n<Metric NAME=\"HostConfig\" TYPE=\"RAW\" CONFIG=\"TRUE\">\n\
  \  <TableDescriptor TABLE_NAME=\"MGMT_EMX_HS_SYSTEM\">\n    <ColumnDescriptor NAME=\"\
  hostname\" COLUMN_NAME=\"hostname\" TYPE=\"STRING\" IS_KEY=\"FALSE\"/>\n    <ColumnDescriptor\
  \ NAME=\"version\" COLUMN_NAME=\"version\" TYPE=\"STRING\" IS_KEY=\"FALSE\"/>\n\
  \  </TableDescriptor>\n  <QueryDescriptor ...>...</QueryDescriptor>\n</Metric>\n\
  ...\n<Metric NAME=\"NetConfig\" TYPE=\"RAW\" CONFIG=\"TRUE\">\n  <TableDescriptor\
  \ TABLE_NAME=\"MGMT_EMX_HS_NET\">\n    <ColumnDescriptor NAME=\"net_interface\"\
  \ COLUMN_NAME=\"net_interface\"\n                      TYPE=\"STRING\" IS_KEY=\"\
  TRUE\"/>\n    <ColumnDescriptor NAME=\"net_mtu\" COLUMN_NAME=\"net_mtu\" TYPE=\"\
  NUMBER\" IS_KEY=\"FALSE\"/>\n    <ColumnDescriptor NAME=\"net_flag\" COLUMN_NAME=\"\
  net_flag\" TYPE=\"STRING\" IS_KEY=\"FALSE\"/>\n  </TableDescriptor>\n  <QueryDescriptor\
  \ ...>...</QueryDescriptor>\n</Metric>\n```\n\n配置指标应设置 `CONFIG=\"TRUE\"` 属性。其类型必须设置为\
  \ `\"RAW\"`，这意味着值被直接收集到存储库模式的一个表中。**清单 10-20** 中 `TableDescriptor` 的 `TABLE_NAME`\
  \ 属性必须与 **清单 10-19** 中 ECM 元数据对应的 `TABLE` 元素的 `NAME` 匹配。**清单 10-20** 中 `ColumnDescriptor`\
  \ 元素的 `NAME` 和 `COLUMN_NAME` 属性必须与 **清单 10-19** 中列元素的 `NAME` 属性匹配。我天真地以为只有 `COLUMN_NAME`\
  \ 需要匹配，这导致了我长时间的故障排除，直到我意识到 `NAME` 属性也必须设置为相同的值。ECM 元数据表中标记为唯一键部分的列也必须在相应的配置指标中标记为键，正如你在\
  \ `net_interface` 列中看到的那样。\n\n既然你已经理解了 ECM 元数据的内容以及目标类型元数据中需要什么，是时候通过将所需的 `CollectionItem`\
  \ 添加到默认收集元数据来完成整个画面了，如 **清单 10-21** 所示。\n\n## 清单 10-21. 用于配置快照的 CollectionItem\n\
  \n```xml\n<CollectionItem NAME=\"HostSample3Snap\" UPLOAD_ON_FETCH=\"TRUE\" CONFIG=\"\
  TRUE\">\n  <Schedule OFFSET_TYPE=\"INCREMENTAL\">\n    <IntervalSchedule INTERVAL=\"\
  24\" TIME_UNIT=\"Hr\"/>\n  </Schedule>\n  <MetricColl NAME=\"HostConfig\" />\n \
  \ ...\n  <MetricColl NAME=\"NetConfig\" />\n</CollectionItem>\n```\n\n\n\n\n\n在清单\
  \ 10-21 中，`CollectionItem`的`NAME`必须与清单 10-19 中`METADATA`元素的`SNAP_TYPE`属性匹配。`CollectionItem`属性还必须使用`CONFIG=\"\
  TRUE\"`属性标记为配置集合。将`OFFSET_TYPE`属性设置为`incremental`并非关键，因为它只意味着时间间隔是从上一个集合的结束时间开始计算，而不是集合开始时间之间。对于快速执行的集合而言，这没有区别。一个集合项必须包含清单\
  \ 10-20 中定义的所有配置指标，每一项都匹配清单 10-19 中定义的表。\n\n假设`ECM`元数据在暂存区的位置正确，它将在打包期间自动包含在插件归档文件中。请注意，如果您只是调整`ECM`元数据而不更改其他组件，通常可以像处理报告一样，仅使用`MRS`上传`ECM`元数据。`MRS`同样会在本章末尾再次描述。\n\
  \n您可以在*可扩展性程序员参考手册*的第 6 章中找到关于`ECM`的完整文档。在那里，您可以查看例如如何定义`ECM`表列上的索引以及如何在配置项之间创建依赖关系。请注意，除非您需要将`ECM`标题翻译成其他语言，否则可以忽略生成放置在`<STAGE>/oms/rsc/ecm`目录下的`.dlf`文件的说明。（该文档提到了不存在的`generate_ecm_resources`实用程序，但`.dlf`文件本身可以通过运行`empdk\
  \ generate_metadata_resource -service LiveSnapshotRegistration`命令来生成。）\n\n如果`ECM`定义正确且收集了配置指标，您可以通过目标的菜单导航到\
  \ Configuration ![arrow](img/arrow.jpg) `Last Collected`，查看收集到的最新配置，如图 10-12 所示。如果您需要对配置信息收集进行故障排查，本章前面介绍的代理`Metric\
  \ Browser`会非常有帮助。*可扩展性程序员参考手册*的第 6 章也包含有用的故障排查建议。\n\n![9781430249382_Fig10-12.jpg](img/9781430249382_Fig10-12.jpg)\n\
  \n图 10-12. EM12c 控制台中的配置信息\n\n虽然定义配置指标看起来有点繁琐，但一旦掌握诀窍，就会变得相当清晰。好消息是，所有配置管理功能都立即可用，就像处理标准的\
  \ Oracle 目标一样，而且不需要任何变更管理许可选项。这些功能包括不同目标之间的配置比较、与保存的配置进行比较以及随时间跟踪配置变化。\n\n## 更高级的功能\n\
  \n您已经了解了基本的插件功能以及一些高级功能，如配置管理，但还有更多功能可用。凭借这些基础知识以及通过实践示例获得的实用技能，您可以查阅文档以获取更多作为插件开发者可用的高级功能。请注意，如果文档不够清晰（您会在某些情况下注意到这一点），您还可以参考`EDK`附带的现有示例插件、Oracle\
  \ 自己的开箱即用插件，以及作为`EDK`一部分提供的附加文档中的`XML Schema`定义。\n\n以下列表简要介绍了本章未涵盖的功能及其提供的功能：\n\n\
  ```\n*   作业类型：插件开发者可以通过定义新的作业类型来扩展 EM12c 作业系统。作业系统灵活，允许指定规则来定义作业参数、应使用哪些凭据、如何控制对作业的访问以及如何序列化作业。作业类型在`oracle.samples.xsh2`插件中定义。\n\
  *   凭据：凭据需要用于支持作业框架，并提供一种安全的替代方案，以比通过实例属性传递更安全的方式定义和传递密码给获取程序。（请记住，命令行和环境变量内容不会受到其他用户的保护。）虽然凭据已在`oracle.samples.xsh1`插件中定义，但直到`oracle.samples.xsh2`插件中才被使用，因此请使用此插件来研究凭据示例。\n\
  *   派生关联：EM12c 可扩展性框架提供了一种定义目标类型之间依赖关系和其他关系的方法，可以通过使用预定义的关联（如`deployed_on`、`provided_by`或`cluster_contains`），也可以通过定义新的关联来实现。这为\
  \ EM12c 提供了复杂系统的拓扑结构，例如集群数据库或 Web 场，其中多个被监控组件是相互连接的。关联通常与配置管理一起实现，以确保定义了系统拓扑，并且可以管理整个系统的配置。派生关联在`oracle.samples.xsh2`示例插件中定义。\n\
  *   目标发现：除了手动添加目标的过程（EM12c 用户必须从头开始配置目标实例）外，插件开发者还可以启用自动和引导发现模式。这通常涉及用 Java 或 Perl\
  \ 实现定义特殊的发现规则和脚本。使用`oracle.samples.xsh3`插件来研究一个发现实现的示例。\n*   合规标准：此功能允许您定义合规规则。规则可以基于存储库中现有的指标和配置集合（基于`SQL`或`PL/SQL`），也可以基于针对文件、用户、进程、数据库对象、Windows\
  \ 注册表项或 Active Directory 实体的实时收集。规则被分层组织为合规标准，然后基于这些标准定义合规框架。关于定义合规标准的详细示例位于*可扩展性程序员参考手册*的第\
  \ 12 章。合规标准示例实现在插件`oracle.samples.xsh3`中。\n*   管理用户界面：这可能是 EM12c 可扩展性最令人兴奋的新能力，它允许插件开发者创建完全自定义的用户界面并控制用户体验。自定义用户界面不仅让插件开发者能够控制收集的指标和配置信息的显示方式，还为交互式用户界面提供了全面能力，包括执行管理操作，如启动和停止组件、终止会话或用户、创建目标资源，以及管理员可能需要执行的几乎任何其他操作。有两种方法可以创建自定义用户界面。更简单但功能更有限的方法是使用基于元数据的管理界面，通过`XML`结构以纯声明方式定义页面、屏幕布局和操作。虽然相比`10g`和`11g`这是一个巨大的进步，但可用的交互功能有限。更复杂的方法是使用基于`Adobe\
  \ Flex`的框架，它能提供对用户体验的完全控制和完整的交互能力，并允许您将自定义 UI 组件与插件一起打包。基于元数据的声明式 UI 在`oracle.samples.xsh2`中实现。基于`Flex`的\
  \ UI 在`oracle.samples.xsh3`中实现。然而，其中只有一个预构建的`Flex`组件，我在源代码中找不到它。\n```\n\n\n\n\n\
  ## 更完整的基于 Flex 的示例\n\n有关更完整的基于 Flex 的示例，请使用 `<EDK>/samples/plugins/HostSample` 中的另一个示例。\n\
  \n### 自定义事件管理\n\n此功能允许插件开发人员自定义在事件管理器页面上选择事件时所看到的内容。他们可以在事件详细信息区域添加信息、自定义诊断链接、定义一个新的引导式解决区域，以及覆盖\
  \ My Oracle Support 的默认搜索表达式。文档提到仅使用 MRS 注册事件管理自定义，但根据元数据在 OMS 中存储的目标路径，如果插件档案被放置在\
  \ `<STAGE>/oms/metadata/events/custmzn` 或 `<STAGE>/oms/metadata/custmzn` 下，`empdk`\
  \ 应该能够将事件管理自定义作为插件档案的一部分打包。\n\n请注意，基于 Flex 的 UI 的最佳实现在位于 EDK 的 HostSample 演示中，路径为\
  \ `<EDK>/samples/plugins/HostSample`。一个 `README` 文件解释了如何构建插件，以及如何使用 Adobe Flash\
  \ Builder 打开和处理基于 Flex 的 UI，这是学习 EM12c 高级 UI 开发的绝佳方式。虽然自定义管理 UI 是可扩展性中最复杂的领域，但文档并不十分清晰，并且难以划定基于元数据的\
  \ UI 和基于 Flex 的 UI 之间的界限。因此，通过示例学习会对您大有帮助。我还发现，搜索诸如图表属性等通用的 Adobe Flex 解决方案，让我能够猜测出一些在\
  \ EM12c 可扩展性文档或 EDK 中未能找到的、用于基于元数据 UI 的 XML 属性。\n\n## 元数据注册服务\n\n在开发插件期间，您可能需要进行许多迭代调整，并在每次更改后在\
  \ EM12c 控制台中验证其影响。对每次小改动都进行打包、部署和升级插件可能是令人畏惧的。为了减少这种部署开销，EM12c 通过 `emctl register\
  \ oms metadata` 命令提供了元数据注册服务 (MRS)，用于有选择地上传和升级特定元数据。MRS 在《可扩展性程序员参考》的第 13.7 节中有文档说明，但在撰写本文时，其文档覆盖并不全面。\n\
  \n根据我的经验，MRS 在动态更新报告定义、更新用户界面定义 (`mpcui` 服务) 和 ECM 元数据 (`LiveSnapshotRegistration`\
  \ 服务) 方面运行良好。然而，注册新目标类型元数据对我来说并不总是成功，可能是因为目标元数据未能成功传播到代理。\n\n例如，要更新或注册一个新的报告定义，您可以使用以下命令：\n\
  \n```\nemctl register oms metadata -service report -file report_file.xml -pluginId\
  \ oracle.samples.xsh1\n```\n\n请注意，某些服务在注册组件时需要特殊步骤。例如，通过 MRS 注册合规标准服务后，必须手动在存储库数据库中执行\
  \ `EM_COMPLIANCE_UTIL.trigger_rule_dependency_job` 过程。\n\nMRS 还允许您实现一些新功能——例如，具有现有目标的新作业类型和合规标准——而实际上无需开发任何新插件。事实上，虽然大多数情况下您创建插件是为了打包新的目标类型，但您也可以创建没有任何目标类型的插件，仅打包报告或合规标准等内容。\n\
  \n## 总结\n\n在本章中，您已经熟悉了指标扩展及其大部分功能。您了解到，虽然 EM12c 指标扩展比 Grid Control 10g/11g 的用户定义指标更加灵活和可管理，但它们仍然缺乏许多对于从多个新目标甚至现有目标收集指标至关重要的功能。例如，您无法轻松处理累积计数器、创建参数化指标扩展或使用额外的收集机制。随后，您还了解到指标扩展构建在\
  \ EM12c 可扩展性框架之上，基本上会转换为您在开发新目标类型时创建的类似 XML 定义。\n\n在本章的第二部分，您学习了如何为插件开发设置环境、在哪里可以找到文档和示例，以及如何构建和部署这些示例。基于这些示例插件，您学习了插件开发的所有基础知识以及一些使您的工作更轻松、插件开发更高效的技巧。您还深入研究了一些有用的高级功能的细节，例如配置管理，并了解了可以在哪里查找示例实现和文档。\n\
  \n\n\n本章强调，有许多资源可用于进一步了解**可扩展性**和插件——无论是使用官方文档、XML Schema 文档，还是深入研究 Oracle 提供的插件以理解某些功能的工作原理。即使你不打算开发供自己使用或对外分发的插件，掌握`EM12c`可扩展性框架的知识也应能加深你对`EM12c`内部机制的理解，使你成为更出色的故障排查者，并帮助你找到那些即使\
  \ Oracle 未提供文档的问题的答案。`EM12c`的存在是为了让你更高效地管理企业基础设施，而通过以各种方式利用可扩展性框架，你可以自动化更多任务并覆盖更广泛的\
  \ IT 基础设施范围。\n\n"
- '# 第 11 章


  ## 企业管理员作业


  作者：Kellyn Pot''Vin


  数据库作业被定义为“管理员定义的用于自动化常运行任务的一个工作单元”。管理员需要安排数据库维护任务、在非工作时间维护或运行批处理的脚本，或进行数据库备份，这是显而易见的；这些作业是
  DBA 角色的必备要求。`EM`作业系统赋予用户灵活的调度能力，可在任何时间、以任何时间间隔运行作业。它与`EM12c`环境无缝集成，这与独立于主要数据库管理和监控系统之外的调度器不同。


  企业管理员作业系统在 Oracle 9i 中引入，然而在 Enterprise Manager 12c 中，`EM`作业的使用频率仍不及其他功能，如监控、告警、备份和性能页面。


  在我作为数据库管理员的多年经历中，我遇到的将`EM`作业系统优先于其他作业调度器使用的环境寥寥无几，我对此感到好奇。尽管`EM`作业系统提供了管理的便捷性、通知和调度功能，但许多管理员似乎仍然忠于他们自己收集的脚本来管理数据库中执行的工作。Oracle
  已经提供了历史上颇具挑战性的`DBMS_JOBS`，以及最近引入且更先进的`DBMS_SCHEDULER_JOBS`，后者包含链式作业和更明确的调度等增强功能。此外，操作系统的`cron`调度器允许管理员使用操作系统（OS）级别可用的任何语言来编写所需脚本并进行调度。


  提供更多调度和管理选项，再加上另一组用于支持的数据库级视图/表，可能看起来有些多余。我在本章的主要任务是说服管理员，为什么`EM12c`作业系统不仅是一个更好的选择，而且优于早期版本的`EM`作业系统，是在任何数据库环境中管理数据库作业的更先进方式。


  增强功能包括：


  *   简单的作业调度界面

  *   一个位置管理环境中所有作业事件

  *   作业库可用作作业的存储库

  *   能够轻松关联作业对停机和维护的要求

  *   通过作业部署简化全局任务


  `EM`作业系统还支持`EM`控制台中基础设施的所有领域，为许多对管理员（与控制台界面交互时）透明发生的任务执行作业。


  ## 为何使用 EM12c 作业


  需要回答的主要问题是，管理员为何应从当前的作业管理程序/调度器切换到企业管理员作业系统。当我首次接触使用`EM12c`的环境时，我也想知道这个问题的答案。我一直使用自己的一套
  shell 和 Perl 脚本，并觉得在操作系统`cron`调度器中调度它们很舒适。在对环境变量和代码进行了小的调整以考虑服务器环境的独特性后，我发现脚本/操作系统级调度器是一个令人满意的解决方案。对于易于进行数据库管理而言，选择操作系统级调度器似乎仍然是最好的。


  当我开始为多个客户、多个服务器平台以及操作系统配置文件设计和偏好管理新环境时，我遇到了一个有趣的挑战。我现在在一个大型数据库团队环境中工作，这要求我快速熟悉他人的调度选择或新脚本作者的编码风格，或者在调查备份和维护脚本时，我甚至不确定使用了哪种调度器。当使用多个作业调度器时，关于哪个调度器在监控、备份和告警方面执行哪个任务，常常会做出错误的假设。


  立即显而易见的是，在那些通过企业管理员使用作业系统的环境中，几乎不需要时间来适应。无论是在 10g 或 11g 企业管理员，还是新的 12c 版本中，界面都是相似的。在企业管理员作业界面内维护、更改、“跳过”或执行与作业相关的任何其他任务，管理员都很容易熟悉。由于所有作业都包含在企业管理员内，在停机期间创建维护窗口也更容易管理。


  使用`EM12c`作业界面相对于其他调度器的优势如下：


  *   具有通配符功能的简单或高级作业搜索功能

  *   可以查看任何作业计划是否与整个环境中其他正在运行的作业冲突

  *   可以选择在目标停机期间跳过所有作业，或配置作业即使在目标处于停机状态时也运行，从而简化了对任务在维护期间运行的担忧

  *   能够将脚本整合到`EM12c`作业系统中以执行任何任务，为所有作业任务提供统一的调度、通知和告警系统


  ### 企业管理员作业架构


  如图 11-1 所示，`EM12c`的`EM`作业界面核心涉及三个领域：


  *   `EM 作业服务`：管理企业管理员中所有作业的企业管理目标服务

  *   `作业库`：作业的存储库

  *   `作业活动`：用于查看、创建和管理作业的作业界面系统


  ![9781430249382_Fig11-01.jpg](img/9781430249382_Fig11-01.jpg)


  **图 11-1.** EM 作业系统作为高级 EM12c 架构的一部分


  前面的章节已经对 Oracle 管理服务（第 3 章）、存储库（第 1 章）以及 EM 控制台和 WebLogic 服务器（第 4 章）进行了重要介绍。本章接下来的篇幅将更详细地解释`EM`作业的每个组件——`EM
  作业服务`、`作业活动`和`作业库`。


  ### EM 作业系统组件


  `EM`作业系统包含大量复杂的组件，这些组件与`EM12c`环境的几乎所有方面都有交互。随着你对由`EM 作业服务`管理的用户作业、系统作业和代理作业越来越熟悉，你将会看到`EM12c`环境的持续健康和监控如何依赖此功能来立即或在预定时间执行任务。


  ### EM 作业服务




  ### EM 作业服务


  EM 作业服务是运行中的服务，负责控制 EM12c 环境中的所有作业处理。此界面可能不易找到，但通过点击 `目标` → `所有目标`，在“搜索目标名称”框中输入
  `服务`，然后点击箭头，是最容易访问的方式。接着点击 `EM 作业服务`（参见图 11-2）。随后，EM 作业服务界面（如图 11-3 所示）便会显示。我们将反复回到此界面，因为它是通往
  EM12c 作业服务高级功能的重要入口。


  ![9781430249382_Fig11-02.jpg](img/9781430249382_Fig11-02.jpg)


  图 11-2. EM 服务仪表板，包含 EM 作业服务和 EM 控制台服务，以及状态、性能、使用率、组件和重要服务级别


  ![9781430249382_Fig11-03.jpg](img/9781430249382_Fig11-03.jpg)


  图 11-3. EM 作业服务界面，展示主左窗格中显示的基本信息，包括状态、事件和正常运行时间


  此控制台界面允许用户查看服务状态、事件、违规情况、性能图表、测试性能、作业环境的配置拓扑以及 EM 作业系统中包含的所有其他功能。


  您也可以通过点击 `目标` → `所有目标`，在“搜索目标名称”框中输入 `%job%`，然后点击箭头来找到 EM 作业服务页面（并了解通配符搜索在 EM12c
  中如何工作）。代理 `EM 作业服务` 会显示在列表中，可通过点击目标名称访问。


  ![9781430249382_Fig11-04.jpg](img/9781430249382_Fig11-04.jpg)


  图 11-4. 在“所有目标”视图中进行通配符搜索非常简单


  ## 监控配置


  EM 作业服务界面包含多个选项卡，提供对作业系统功能的访问。DBA 最常用的选项卡可能就是“监控配置”选项卡（参见图 11-5）。


  ![9781430249382_Fig11-05.jpg](img/9781430249382_Fig11-05.jpg)


  图 11-5. “监控配置”选项卡是 EM 作业服务界面中最常用的选项卡之一


  用户界面的“监控配置”部分包含众多选项，用于与 EM 作业服务的功能进行交互。


  “根因分析配置”选项可用于在 EM 服务发生故障时执行自动或手动检查。此分析可以精确定位问题，或上传到 `My Oracle Support` 以协助处理服务请求。此功能非常有益，可以节省管理员在
  `My Oracle Support` 界面手动填写服务请求所浪费的时间。本节涵盖的服务请求主要针对 EM12c 核心服务，包括企业管理器控制台、Oracle
  管理服务和 EM 作业服务。


  “性能指标”链接使您能够配置 EM 作业步骤吞吐量和作业步骤积压的阈值。当将 EM 作业系统用作数据库环境的主要作业调度程序时，这可以提供大多数其他作业调度程序所缺乏的监控激励。收集执行后性能信息在其他调度/日志记录方法中可能不可用，但在
  EM12c 作业服务中，所有数据默认保留 31 天。


  “监控配置”选项卡中的另一个链接是“服务测试与信标”。服务测试是测试网页能否定期完成简单事务、测试正常运行时间或登录网站并在特定时间验证文件是否可供下载的绝佳方法。与指标扩展（在第
  13 章中描述）不同，此功能非常特定于 URL，并使用 EM 作业在请求的间隔执行任务。


  此功能具有独特的选项，可通过使用 ActiveX 插件记录 Web 会话，该会话随后作为 EM 作业的一部分进行配置，以在预定时间间隔执行任务，检查用户访问同一网站时会完成的已记录步骤是否成功完成。图
  11-6 显示了一个来自网站的会话记录——成功登录、访问四个文件，然后注销。此会话将被 EM 作业服务用于创建性能测试，然后继续进行信标设置。


  ![9781430249382_Fig11-06.jpg](img/9781430249382_Fig11-06.jpg)


  图 11-6. 正在为性能测试和信标设置记录的会话


  > **注意**

  >

  > 要记录用于性能测试的 Web 事务，Microsoft Internet Explorer 是唯一受支持的 Web 浏览器。尝试使用其他浏览器时，选项不会出现。在某些情况下，即使使用带有
  ActiveX 插件的 Internet Explorer，Web 事务也可能会失败，管理员将被 `My Oracle Support` 指导使用 Oracle
  应用程序开发框架 (`ADF`) 来记录 Web 事务，并将保存的会话文件导入服务测试界面。


  ## 作业活动页面


  作业活动页面使您能够执行以下操作：


  *   创建作业

  *   将已计划、正在运行或先前执行的作业保存到作业库，以供将来使用

  *   在活动部分查看或编辑现有作业

  *   查看作业执行结果、编辑、创建、恢复、暂停、停止或删除作业执行

  *   通过各种方法搜索作业，包括作业名称（允许使用通配符）、作业类型和状态


  作业活动页面（如图 11-7 所示）可以在数据库、集群或完整监控环境的级别查看。


  ![9781430249382_Fig11-07.jpg](img/9781430249382_Fig11-07.jpg)


  图 11-7. 作业活动示例，管理员首先查看计划时间最远的活动，并通过向下滚动查看当前和过去的活动


  在搜索和查看作业活动页面时，请记住表 11-1 中的以下术语。


