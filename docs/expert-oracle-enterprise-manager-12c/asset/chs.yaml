  \ 角色创建向导 — 步骤 2\n\n3.  单击 **下一步**。资源管理权限分配屏幕打开。此屏幕的关键部分如图 4-16 所示，位于最右侧，标记为 **管理权限授予**。单击每个权限类别的铅笔图标并单独分配权限。在这种情况下，添加**目标发现框架**下的所有权限，以允许您的\
