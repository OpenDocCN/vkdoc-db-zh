  \n图 4-14. 角色创建向导 — 步骤 1\n\n2.  单击 **下一步**。然后添加您需要的 EM12c 角色。在此示例中，您添加发现操作员角色，以及允许全面管理补丁生命周期的补丁管理员角色（参见图\
