  OMS 和存储库的管理


  作者：Pete Sharman




  既然我们已经介绍了安装 Enterprise Manager Cloud Control 12c 的选项，包括代理部署，现在来看看维护 EM 基础设施需要做些什么。正如在第
  1 章所讨论的，Enterprise Manager 由三个主要活动组件构成：`Oracle Management Agent`、`Oracle Management
  Service`和`Oracle Management Repository`。让我们依次 examine 每个组件。


  ## Oracle Management Agent


  代理管理是随着 Enterprise Manager 12c 版本的发布而变得**非常直接**的一个领域。在之前的版本中，代理管理必须通过命令行使用`EMCTL`或`EMCLI`工具来执行。虽然在
  12c 版本中，你仍然可以使用命令行界面来管理代理，但大部分管理也可以通过`Cloud Control 控制台`完成。本节首先介绍控制台的使用，然后再介绍命令行界面。


  ### 使用控制台进行代理管理


  要从`Cloud Control 控制台`访问代理管理功能，请从`设置`菜单中选择`管理 Cloud Control` ![arrow](img/arrow.jpg)
  `代理`，如图 3-1 所示。


