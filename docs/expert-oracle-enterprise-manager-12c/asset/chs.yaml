  \ OMS by visiting:\n Setup->Change Management->Software Library\n\nResecure the\
  \ OMS...\nOMS secured!\nImportConfig completed successfully!\n```\n\n8.  停止备用 OMS。\n\
  \n```\nemctl stop oms\n```\n\n9.  在主 Enterprise Manager 控制台中，使用“添加手动目标引导发现”来添加 WebLogic\
  \ 域及相关目标，以发现备用主机上的 Fusion Middleware 目标。\n10. 如果在主服务器上先前配置过单点登录，则在备用服务器上配置单点登录。这包括为\
  \ Enterprise Manager Cloud Control 管理员配置 Active Directory 身份验证。\n11. 如果在主服务器上配置过，则执行任何其他组件的配置，例如\
  \ BI Publisher 或 Real User Experience Insight。\n\n\n\n# 备用管理服务器安装后注意事项\n\n拥有备用站点的一个需要注意的点是，它需要额外的管理工作量。初始配置后，必须使备用站点与主站点保持同步。对于仓库数据库，`Data\
  \ Guard` 会自动处理同步。应用于主站点软件主目录的补丁也需要在备用站点应用。作为补丁过程一部分在主站点执行的任何数据库脚本都由 `Data Guard`\
  \ 处理，不应在备用站点再次执行。在主站点部署或更新的插件也要求在备用站点进行部署和更新。如果未能这样做，在尝试切换时将导致 `OMS` 无法启动。有关在备用站点部署和升级插件的详细信息，请参阅\
  \ `Oracle Enterprise Manager Cloud Control Administrator’s Guide 13c Release 2`。\n\
  \n除了上述更改外，`SYSMAN` 凭据也应在主站点和备用站点保持同步。如果不这样做，角色转换将在备用 `OMS` 上失败。要更改主备用 `OMS` 上的 `SYSMAN`\
  \ 凭据，请遵循以下步骤：\n\n1.  在主 `OMS` 上更改 `SYSMAN` 密码。\n\n    ```\n    $ emctl config oms\
  \ -change_repos_pwd\n    Oracle Enterprise Manager Cloud Control 13c Release 2\n\
