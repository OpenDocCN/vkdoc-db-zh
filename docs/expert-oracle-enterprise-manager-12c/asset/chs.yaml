  \   Copyright (c) 1996, 2013 Oracle Corporation.  All rights reserved.\n    Starting\
  \ Admin Server only...\n    Admin Server Successfully Started\n    ```\n\n### 软件库\n\
  \n软件库用于打补丁、代理部署、资源调配和自更新。应将其安装在共享存储上，以便多个管理服务器可以访问。以下任何选项都可用于共享存储：\n\n*   `NFS`\n\
  *   `OCFS2`\n*   `DBFS`\n*   `ACFS`\n\n由于软件库至关重要，因此应位于高可用性文件系统上。这意味着使用 `RAID`（镜像和条带化）后端存储系统。\n\
  \n可以通过登录 Enterprise Manager 控制台并选择 `Setup` -> `Provisioning and Patching` -> `Software\
  \ Library` 来配置软件库。为软件库选择一个已挂载到 `OMS` 上的共享文件系统位置（参见 图 13-29）。也可以添加多个位置。\n\n![9781430249382_Fig13-29.jpg](img/9781430249382_Fig13-29.jpg)\n\
  \n图 13-29 . 软件库设置\n\n## 备份\n\n在高可用性 Enterprise Manager Cloud Control 配置中，`OMS`、仓库和代理这三个组件都单独配置以减少停机时间。尽管我们建议实施最高级别的可用性，但相关的成本和所需资源可能令人望而却步。此外，在任何\
  \ IT 框架中，随着时间的推移，组件故障很可能会发生。因此，任何高可用性架构如果不讨论备份和恢复策略都是不完整的。\n\n备份 Enterprise Manager\
  \ 生态系统需要一个涵盖仓库、`OMS` 和代理的解决方案。每个组件都根据其可用方法单独备份。管理仓库数据库存储由代理提供的指标和数据。应使用 `RMAN` 按照\
  \ Oracle 数据库的推荐备份策略进行备份。\n\n## 仓库备份\n\n为仓库数据库配置备份策略的第一步是确保其处于 `ARCHIVELOG` 模式。这将允许进行一致的联机备份，并便于数据库的及时点恢复。应使用推荐的备份策略定期进行热备份。还应启用数据库高可用性功能，如\
  \ `快速恢复区` 和 `闪回数据库`，以便在发生故障时能够更快地恢复数据库。可以通过使用 Enterprise Manager Cloud Control 控制台来配置备份。考虑使用\
  \ Enterprise Manager 的 `推荐备份策略` 选项来备份仓库数据库。\n\n要使用 Enterprise Manager 计划数据库备份，请遵循以下步骤：\n\
  \n1.  转到仓库数据库主页并选择 `Availability` -> `Backup & Recovery` -> `Schedule Backup`。\n\
  2.  以具有 `SYSDBA` 凭据的用户身份登录。\n3.  单击 `Schedule Oracle-Suggested Backup` 按钮，根据备份的目标位置（`磁盘`、`磁带`\
  \ 等）创建完全自动化的备份策略，如 图 13-30 所示。Oracle 建议的备份基于增量更新备份策略。它将首先安排完整备份，之后将安排增量备份。基于此备份，可以恢复到一天中的任何时间点。\n\
  \n![9781430249382_Fig13-30.jpg](img/9781430249382_Fig13-30.jpg)\n\n图 13-30 . 计划\
  \ Oracle 建议的备份\n\n**注意** 如果使用基于磁盘的备份策略，Oracle 建议使用 `快速恢复区` 以实现更快的恢复。\n\n4.  选择备份的目标介质，如\
  \ 图 13-31 所示。\n\n![9781430249382_Fig13-31.jpg](img/9781430249382_Fig13-31.jpg)\n\
  \n图 13-31 . 计划备份目标类型\n\n\n\n## 调度备份\n\n1.  输入备份的位置，如 图 13-32 所示。在基于磁盘的备份策略中，默认使用已配置的快速恢复区域。\n\
  \n    ![9781430249382_Fig13-32.jpg](img/9781430249382_Fig13-32.jpg)\n    图 13-32\
  \ . 选择快速恢复区域作为基于磁盘的备份位置\n\n2.  输入循环备份的时间表，如 图 13-33 所示。\n\n    ![9781430249382_Fig13-33.jpg](img/9781430249382_Fig13-33.jpg)\n\
  \    图 13-33 . Oracle 建议的备份时间表\n\n3.  检查备份设置和生成的 `RMAN` 脚本（参见 图 13-34）。单击“提交作业”以计划备份。\n\
  \n    ![9781430249382_Fig13-34.jpg](img/9781430249382_Fig13-34.jpg)\n    图 13-34\
  \ . Oracle 建议的备份设置\n\n使用 Oracle Enterprise Manager Cloud Control 计划备份作业还可以让你接收有关作业状态的通知，并查看包括运行时间和上次备份时间在内的备份信息。\n\
  \n### Oracle 管理服务备份\n\nOracle 管理服务负责与管理代理通信并将数据上传到管理存储库。它包括 Oracle Fusion Middleware\
  \ 主目录、OMS 主目录以及插件主目录之外的 Web 层（OHS）Oracle 主目录。应定期备份 OMS 文件系统以保存任何更改，例如补丁、更新或配置更改。使用\
  \ `exportconfig` 命令备份 OMS 实例主目录（`MW_HOME/gc_inst`），包括 WebLogic Server、Web 层和管理服务器。要创建实例和所有子组件的备份，请使用以下语法：\n\
  \n```\nemctl exportconfig oms [-sysman_pwd <sysman password>]\n     [-dir <backup\
  \ dir>]     指定存储备份文件的目录\n     [-oms_only]             指定在管理服务器主机上进行仅 OMS 的备份\n \
  \    [-keep_host]            指定如果未定义 slb 则备份主机名\n                            （仅当将在响应此主机名的机器上执行恢复时才使用此选项）\n\
  ```\n\n以下示例将 OMS 配置备份到共享目录。将创建一个扩展名为 `.bka` 的归档文件。\n\n```\n$ $OMS_HOME/bin/emctl\
  \ exportconfig oms -sysman_pwd oracle12c -dir /mnt/backup\nOracle Enterprise Manager\
  \ Cloud Control 12c Release 2\nCopyright (c) 1996, 2012 Oracle Corporation.  All\
  \ rights reserved.\nExportConfig started...\nMachine is Admin Server host. Performing\
  \ Admin Server backup...\nExporting emoms properties...\nExporting secure properties...\n\
  Exporting configuration for pluggable modules...\nPreparing archive file...\nBackup\
  \ has been written to file: /mnt/backup/opf_ADMIN_20121104_224806.bka\n\nThe export\
  \ file contains sensitive data.\nPlease ensure that it is kept secure.\n\nExportConfig\
  \ completed successfully!\n```\n\n除了备份 OMS 配置外，还应执行 Oracle 清单和 `opatch lsinventory\
  \ –detail` 命令输出的备份。\n\n以下示例生成 `opatch` 清单输出并将其写入共享文件系统。\n\n```\n$OMS_HOME/OPatch/opatch\
  \ lsinventory –detail > /mnt/backups/opatch_bkup.log\n```\n\nOMS 的备份可以手动完成，也可以通过\
  \ Enterprise Manager Cloud Control 作业系统计划完成。\n\n### 管理代理备份\n\n管理代理是无状态的，因此不需要备份。相反，应为所有受监控的平台创建代理的参考金镜像。任何补丁和自定义设置都应包含在金配置中。如果管理代理丢失，应从参考金镜像安装。\n\
  \n## 恢复\n\n执行每个 Enterprise Manager Cloud Control 组件的定期备份很重要。然而，更重要的是在需要时能够成功恢复这些组件。Enterprise\
  \ Manager 的恢复可能需要恢复多个组件，包括存储库、管理服务和代理，具体取决于问题的性质。例如，在主机丢失的情况下恢复管理服务可能需要比将管理服务恢复到原始主机更多的步骤。你将在以下部分中研究这些场景。\n\
  \n## 存储库恢复\n\n如果 `OMS` 关闭，Cloud Control 控制台将不可用。要恢复存储库数据库，应使用 `RMAN` 命令行实用程序。使用\
  \ `RMAN`，你可以通过完全恢复或时间点恢复来恢复数据库（请参阅 `Oracle Database Backup and Recovery Guide`）。对于后者，你可能需要重新同步与存储库不同步的代理。要使用\
  \ `EMCTL` 重新同步代理，请使用以下语法：\n\n```\nemctl resync repos (-full|-agentlist \"agent names\"\
  )\n[-name \"resync name\"]\n[-sysman_pwd \"sysman password\"]\n```\n\n此命令应在管理存储库恢复之后且在启动\
  \ `OMS` 之前执行。\n\n在恢复存储库数据库后，使 Enterprise Manager Cloud Control 运行所需的步骤将根据执行的是完全恢复还是不完全恢复，以及是在同一主机还是不同主机上执行恢复而有所不同。表\
  \ 13-3 总结了不同恢复场景所需的步骤。在每种情况下，都应在停止 `OMS` 后恢复存储库数据库。\n\n表 13-3. OMS、存储库和代理的恢复场景\n\
  \n![Table13-3](img/Table13-3.jpg)\n\n每当在不同的主机上恢复存储库数据库时，都需要重新配置 `OMS`。这将新的数据库连接描述存储在\
  \ `OMS` 中。我们使用以下命令在 `OMS` 中重新配置存储库数据库：\n\n```\nemctl config oms -store_repos_details\
  \ (-repos_host <host> -repos_port <port> -repos_sid\n<sid> | -repos_conndesc <connect\
  \ descriptor>) -repos_user <username> [-repos_pwd <pwd>]\n```\n\n按照以下步骤重新配置 `OMS`：\n\
  \n1.  停止所有 `OMS`。\n\n    ```\n    emctl stop oms\n    ```\n\n2.  在每个 `OMS` 上重新配置存储库连接字符串。\n\
  \n    ```\n    emctl config oms -store_repos_details\n    ```\n\n    使用以下命令重新启动管理服务器和所有\
  \ `OMS`：\n\n    ```\n    emctl stop oms -all\n    emctl start oms\n    ```\n\n在不同的主机上恢复存储库还需要将管理存储库数据库目标重新定位到运行在新主机上的不同代理。这仅在主机上已存在代理且未由其发现任何其他数据库的情况下才可完成。使用以下语法将目标重新定位到新主机：\n\
  \n```\nemctl config repos [-sysman_pwd <sysman password>]\n      [-agent <new agent>]\
  \    指定存储库目标的新目标代理\n      [-host <new host>]      指定存储库目标的新主机名\n      [-oh <new\
  \ oracle home>] 指定存储库目标的新 OracleHome\n      [-conn_desc [<jdbc connect descriptor>]]\n\
  \                              如果指定了值，则使用该值更新连接描述符，\n                          \
  \    否则使用存储在 emoms.properties 中的值\n      [-ignore_timeskew]      忽略代理上的时间偏差\n```\n\
  \n还应使用此命令更新 `OMS` 和存储库目标的监控配置：\n\n\n\n```\nemctl config emrep [-sysman_pwd <sysman\
  \ 密码>]\n      [-agent <新代理>]    指定 emrep 目标的新目标代理\n      [-conn_desc [<JDBC 连接描述符>]]\n\
  \                              如果指定则使用该值更新连接描述符，\n                             \
  \ 否则使用 emoms.properties 中存储的值\n      [-ignore_timeskew]      忽略代理上的时间偏移\n```\n\n\
  在数据库恢复并重新配置后，下一步是登录到 Enterprise Manager Cloud Control 控制台，验证所有操作是否已恢复。\n\n### Oracle\
  \ 管理服务恢复\n\n恢复 OMS 需要恢复软件主目录（Fusion Middleware）和实例主目录（gc_inst）。软件主目录可以从文件系统备份恢复，或使用\
  \ Enterprise Manager Cloud Control 12c 安装程序在相同或不同主机上使用“仅安装软件”选项重新安装。OMS 主目录必须与正在恢复的\
  \ OMS 主目录位置相同。\n\nOMS 中存在的所有插件都必须安装才能成功恢复。应以 SYSMAN 用户身份运行以下 SQL 查询：\n\n```\nSELECT\
  \ epv.display_name, epv.plugin_id, epv.version, epv.rev_version,decode(su.aru_file,\n\
  null, 'Media/External', 'https://updates.oracle.com/Orion/Services/download/ '\n\
  ||aru_file||'?aru='||aru_id||chr(38)||'patch_file='||aru_file) URL\nFROM em_plugin_version\
  \ epv, em_current_deployed_plugin ecp, em_su_entities su\nWHERE epv.plugin_type\
  \ NOT IN ('BUILT_IN_TARGET_TYPE', 'INSTALL_HOME')\nAND ecp.dest_type='2'\nAND epv.plugin_version_id\
  \ = ecp.plugin_version_id\nAND su.entity_id = epv.su_entity_id;\n```\n\n以下示例输出显示了插件、版本、修订版和\
  \ URL。如果通过 Self Update 下载，URL 将显示。否则，状态将显示为 Media/External。\n\n```\nSQL>\n\nDISPLAY_NAME\
  \                      PLUGIN_ID           VERSION      REV_VERSION   URL\n------------------------------\
  \  ------------------  -----------  ------------  ----------------\nOracle MOS (My\
  \ Oracle Support)  oracle.sysman.mos   12.1.0.2.0              0  Media/External\n\
  Oracle Fusion Middleware        oracle.sysman.emas  12.1.0.3.0              0  Media/External\n\
  Oracle Database                 oracle.sysman.db    12.1.0.2.0       20120804  Media/External\n\
  Oracle Exadata                  oracle.sysman.xa    12.1.0.3.0              0  Media/External\n\
  ```\n\n如果列出了任何其他插件，应将它们下载到单个目录中；然后将扩展名从`.zip`重命名为`.opar`。如果未从文件系统备份恢复，请使用“仅安装软件”选项安装中间件和\
  \ OMS Oracle 主组件。软件重新安装或恢复后，下一步是安装其他插件（如果有）。通过指定`–PluginLocation`标志来选择下载插件的位置，执行位于`OMS_HOME/sysman/install`中的`PluginInstall.sh`脚本。在仅软件安装的情况下，之前应用的所有补丁都必须重新应用。\n\
  \n恢复软件主目录后，下一步是恢复或重新创建 OMS。这通过使用`omsca`实用程序并指定由`emctl exportconfig`命令生成的备份文件路径来完成。\n\
  \n```\nomsca recover –as –ms -nostart –backup_file <exportconfig 文件>\n```\n\n恢复\
  \ OMS 所需的步骤可能因是否使用 SLB 或配置了多个管理服务以及是否在同一主机或不同主机上恢复而异。以下步骤是在没有 SLB 的同一主机上恢复单个 OMS\
  \ 所必需的。OMS 实例将通过使用`emctl exportconfig`获取的 OMS 配置备份进行恢复。\n\n1.  清理失败的主机。\n2.  验证软件库是否可用。\n\
  3.  通过恢复文件系统备份或运行安装程序的“仅软件”选项来恢复软件主目录。（参见`Oracle Enterprise Manager Cloud Control\
  \ 高级安装与配置指南第 2 版`）。\n4.  在恢复模式下执行`omsca`，并指定先前获取的备份文件位置。\n5.  如有必要，恢复代理。\n6.  启动\
  \ OMS。\n7.  验证 OMS 是否正常工作。\n\n有关其他 OMS 恢复场景的详细信息，请参阅`Oracle Enterprise Manager Cloud\
  \ Control 12c 管理员指南`。\n\n### 管理代理恢复\n\n管理代理的恢复需要重新安装它，最好从参考安装进行，或执行从先前备份的文件系统恢复。代理应使用现有补丁和自定义设置进行克隆。代理也应使用相同端口安装。重新安装后，应从\
  \ Enterprise Manager Cloud Control 中的“代理重新同步”页面执行重新同步。\n\n![image](img/sq.jpg) `注意`\
  \ 重新安装后，代理会被 OMS 阻止，以防止目标覆盖先前配置的数据。使用“重新同步代理”按钮重新同步并取消阻止代理。\n\n在典型场景中，代理恢复通常遵循以下步骤：\n\
  \n1.  使用 Oracle Universal Installer (OUI) 清理现有代理 Oracle 主目录以清理库存。\n2.  安装新代理或从参考安装克隆，使用相同端口和路径。也可以从先前备份恢复文件系统。\n\
  3.  从 Enterprise Manager Cloud Control 代理主页执行代理重新同步。\n4.  如有必要，重新配置用户定义的指标。\n5.\
  \  验证代理状态。\n\n```\nemctl status agent\nemctl upload agent\n```\n\n## 切换和故障转移\n\n\
  当使用级别 2、3 或 4 高可用性配置时，管理服务和存储库都可以独立切换和故障转移。切换通常在计划维护期间进行，包括操作系统和软件打补丁，而故障转移通常在计划外维护期间发生，例如硬件或软件故障。\n\
  \n在级别 2 配置中，管理服务的切换和故障转移遵循相同的程序。如前所述，这需要将 OMS 虚拟主机名和 VIP 重新定位到另一主机，然后手动启动 OMS 或使用\
  \ Clusterware 自动化重新定位。在使用物理备用数据库用于 Enterprise Manager 存储库的级别 2、3 或 4 配置中，数据库必须切换（计划）或故障转移（未计划）。在级别\
  \ 3 高可用性中，OMS 不需要任何操作，因为涉及多个管理服务。SLB 将监视管理服务，检测到一个服务失败时将流量路由到可用的 OMS。\n\n要使用 Data\
  \ Guard 切换管理存储库，请使用 DGMRL 命令行实用程序，因为 Enterprise Manager 控制将无法切换存储库。按照以下步骤切换管理存储库，而管理服务尚未切换：\n\
  \n1.  从 Enterprise 控制台，选择`可用性` ä `Data Guard 管理`。\n2.  检查 Redo Apply 进程是否是最新的。验证\
  \ ApplyLag 状态为零，如图 13-35 所示。\n\n![9781430249382_Fig13-35.jpg](img/9781430249382_Fig13-35.jpg)\n\
  \n图 13-35 . Data Guard 管理界面，显示 ApplyLag 和 TransportLag 状态\n\n3.  通过运行以下命令停止主站点上的管理服务。如果使用多个管理服务，应在每个\
  \ OMS 上执行此操作。\n\n```\nemctl stop oms -all\n```\n\n\n## 4. 使用 DGMGRL 命令行工具切换到备用数据库。在切换操作的情况下，可以在主数据库或备用数据库站点执行此操作。执行切换前，请验证\
  \ Data Guard 配置和数据库状态。以下示例说明了这些步骤。\n\n### a. 执行切换前，验证 Data Guard 配置和数据库状态：\n\n```\n\
  $ dgmgrl\nDGMGRL for Linux: Version 11.2.0.3.0 - 64bit Production\nCopyright (c)\
  \ 2000, 2009, Oracle. All rights reserved.\nWelcome to DGMGRL, type \"help\" for\
  \ information.\nDGMGRL> connect sys/<password>\nConnected.\nDGMGRL> show configuration\n\
  \nConfiguration - emrep\n\nProtection Mode: MaxPerformance\n  Databases:\n    emrep\
  \  - Primary database\n    emrep2 - Physical standby database\n\nFast-Start Failover:\
  \ DISABLED\n\nConfiguration Status:\nSUCCESS\n\nDGMGRL> show database emrep\n\n\
  Database - emrep\n\nRole:            PRIMARY\n  Intended State:  TRANSPORT-ON\n\
  \  Instance(s):\n    emrep\n\nDatabase Status:\nSUCCESS\n\nDGMGRL> show database\
  \ emrep2\n\nDatabase - emrep2\n\nEnterprise Manager Name: emrep_sby\n  Role:   \
  \                 PHYSICAL STANDBY\n  Intended State:          APPLY-ON\n  Transport\
  \ Lag:           0 seconds\n  Apply Lag:               0 seconds\n  Real Time Query:\
  \         OFF\n  Instance(s):\n    emrep2\n\nDatabase Status:\nSUCCESS\n```\n\n\
  ### b. 发出 SWITCHOVER 命令：\n\n```\nDGMGRL> switchover to emrep2;\nPerforming switchover\
  \ NOW, please wait...\nNew primary database \"emrep2\" is opening...\nOperation\
  \ requires shutdown of instance \"emrep\" on database \"emrep\"\nShutting down instance\
  \ \"emrep\"...\nORACLE instance shut down.\nOperation requires startup of instance\
  \ \"emrep\" on database \"emrep\"\nStarting instance \"emrep\"...\nUnable to connect\
  \ to database\nORA-12514: TNS:listener does not currently know of service requested\
  \ in connect descriptor\n\nFailed.\nWarning: You are no longer connected to ORACLE.\n\
  \nPlease complete the following steps to finish switchover:\n       start up and\
  \ mount instance \"emrep\" of database \"emrep\"\n```\n\n![image](img/sq.jpg) `注意`\
  \ 根据 Data Guard 配置的当前状态，发出切换命令后可能需要执行额外步骤。如示例所示，新的备用数据库应手动启动并挂载。\n\n### c. 验证 Data\
  \ Guard 配置状态，确认角色已切换：\n\n```\nDGMGRL> connect sys/<password>\nConnected.\nDGMGRL>\
  \ show configuration;\n\nConfiguration - emrep\n\nProtection Mode: MaxPerformance\n\
  \  Databases:\n    emrep2 - Primary database\n    emrep  - Physical standby database\n\
  \nFast-Start Failover: DISABLED\n\nConfiguration Status:\nSUCCESS\n\nDGMGRL> show\
  \ database emrep2;\n\nDatabase - emrep2\n\nEnterprise Manager Name: emrep_sby\n\
  \  Role:                    PRIMARY\n  Intended State:          TRANSPORT-ON\n \
  \ Instance(s):\n    emrep2\n\nDatabase Status:\nSUCCESS\n\nDGMGRL> show database\
  \ emrep;\n\nDatabase - emrep\n\nRole:            PHYSICAL STANDBY\n  Intended State:\
  \  APPLY-ON\n  Transport Lag:   0 seconds\n  Apply Lag:       0 seconds\n  Real\
  \ Time Query: OFF\n  Instance(s):\n    emrep\n\nDatabase Status:\nSUCCESS\n```\n\
  \n此处，你可以看到数据库的角色已成功更改。下一步是重新配置 OMS 以使用新的主数据库。\n\n## 5. 如果 Admin Server 尚未运行，请启动它。\n\
  \n```\nemctl start oms –admin_only\n```\n\n## 6. 使用新的主数据库存储库配置 OMS。\n\n```\n$OMS_HOME/bin/emctl\
  \ config oms -store_repos_details -repos_conndesc \"(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oem3)(PORT=1522)))\n\
  (CONNECT_DATA=(SID=emrep2)))\" -repos_user sysman\nOracle Enterprise Manager Cloud\
  \ Control 12c Release 2\nCopyright (c) 1996, 2012 Oracle Corporation.  All rights\
  \ reserved.\nEnter Repository User's Password :\n```\n\n## 7. 启动 OMS。\n\n```\nemctl\
  \ start oms\n```\n\n## 8. 重新定位管理存储库目标。OMS 上的管理代理会监控 OMS 和管理存储库目标。切换后，需要更新存储库目标以反映已切换过来的存储库数据库，即新的主数据库。\n\
  \n```\nemctl config emrep –agent <central_agent_name> -conn_desc <conn_desc_of_new_primary>\n\
  ```\n\n使用 Data Guard 对管理存储库进行故障转移与切换类似，区别在于使用 DGMGRL 发出的命令将是 `failover to <standby_db_name>`。\n\
  \n除了使用上述手动步骤外，你还可以利用 Data Guard 快速启动故障转移功能自动化 OMS 和管理存储库的故障转移：\n\n*   快速启动故障转移通过一个独立于主备服务器运行的\
  \ Observer 进程来判断何时需要故障转移到备用数据库。如果 Observer 在一段可配置的时间内无法联系到主站点，它将自动故障转移到备用数据库。\n\
  *   故障转移发生后，会触发一个名为 `DB_ROLE_CHANGE` 的数据库事件。\n*   `DB_ROLE_CHANGE` 事件会触发一个触发器，该触发器进而启动\
  \ Enterprise Manager 应用层。\n\n可以创建一个脚本来自动化这些步骤。使用 `<OMS_HOME>/sysman/ha` 目录中提供的示例脚本，创建一个用于配置\
  \ OMS 指向新的主数据库并启动所有管理服务的脚本。清单 13-1 是一个脚本示例，它将在备用站点启动 OMS 并重新配置 OMS 使其使用在 Data Guard\
  \ 配置中切换过来的新主管理存储库数据库。\n\n## 清单 13-1. 在备用站点启动 EM 层的示例脚本\n\n```\n#!/bin/sh\nLOGFILE=\"\
  /oms_swlib/em/failover/em_failover.log\"\nOMS_ORACLE_HOME=\"/u01/app/oracle/Middleware/oms\"\
  \nCENTRAL_AGENT=\"oem2.example.com:3872\"\nSYSMAN_PWD=\"oracle12c\"\n\n#log message\n\
  echo \"###############################\" >> $LOGFILE\ndate >> $LOGFILE\necho $OMS_ORACLE_HOME\
  \ >> $LOGFILE\nid >>  $LOGFILE 2>&1\n\n#switch all OMS to point to new primary and\
  \ startup all OMS\n$OMS_ORACLE_HOME/bin/emctl config oms -store_repos_details -repos_conndesc\
  \ \"(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oem1)(PORT=1521)))\n\
  (CONNECT_DATA=(SID=emrep2)))\" \\\n-repos_user sysman –repos_pwd $SYSMAN_PWD >>\
  \ $LOGFILE 2>&1\n$OMS_ORACLE_HOME/bin/emctl sync_opss_policy_store \\\n-sysman_pwd\
  \ oracle12c  >> $LOGFILE 2>&1\n$OMS_ORACLE_HOME/bin/emctl stop oms >>  $LOGFILE\
  \ 2>&1\n$OMS_ORACLE_HOME/bin/emctl start oms >>  $LOGFILE 2>&1\n\n#relocate Management\
  \ Services and Repository target\n#to be done only once in a multiple OMS setup\n\
  #allow time for OMS to be fully initialized\n$OMS_ORACLE_HOME/bin/emctl config emrep\
  \ -agent $CENTRAL_AGENT \\\n-conn_desc -sysman_pwd $SYSMAN_PWD >> $LOGFILE 2>&1\n\
  \n#always return 0 so that dbms scheduler job completes successfully\nexit 0\n```\n\
  \n清单 13-2 中的示例脚本创建了一个触发器，该触发器将在切换或故障转移操作期间发生 `DB_ROLE_CHANGE` 事件时被触发。此触发器随后将调用前面的脚本以启动\
  \ Enterprise Manager 层。\n\n## 清单 13-2. 数据库角色变更触发器示例\n\n\n```\nCREATE OR REPLACE\
  \ TRIGGER FAILOVER_EM\nAFTER DB_ROLE_CHANGE ON DATABASE\nDECLARE\n    `v_db_unique_name`\
  \ varchar2(30);\n    `v_db_role` varchar2(30);\nBEGIN\n    select upper(VALUE) into\
  \ `v_db_unique_name`\n    from `v$parameter` where NAME='db_unique_name';\n    select\
  \ database_role into `v_db_role`\n    from `v$database`;\n\nif `v_db_role` = 'PRIMARY'\
  \ then\n\n-- 提交作业以与存储库同步 Resync 代理\n      -- 如果在最大性能模式下运行，并且故障转移时可能存在数据丢失风险，则需要此步骤\n\
  \      -- 如果需要，请取消下面代码块的注释\n      -- begin\n      --  `SYSMAN.setemusercontext('SYSMAN',\
  \ SYSMAN.MGMT_USER.OP_SET_IDENTIFIER)`;\n      --  `SYSMAN.emd_maintenance.full_repository_resync('AUTO-FAILOVER\
  \ to '||\n          `v_db_unique_name`||'- '||systimestamp, true);\n      --  `SYSMAN.setemusercontext('SYSMAN',\
  \ SYSMAN.MGMT_USER.OP_CLEAR_IDENTIFIER)`;\n      -- end;\n\n-- 启动 EM 中层服务\n    \
  \  `dbms_scheduler.create_job`(\n          `job_name`=>'START_EM',\n          `job_type`=>'executable',\n\
  \          `job_action`=> '/oms_swlib/em/failover/' || `v_db_unique_name`|| '_start_oms.sh',\n\
  \          `enabled`=>TRUE\n      );\n    end if;\nEXCEPTION\nWHEN OTHERS\nTHEN\n\
  \    `SYSMAN.mgmt_log.log_error`('LOGGING', `SYSMAN.MGMT_GLOBAL.UNEXPECTED_ERR`,\n\
  `SYSMAN.MGMT_GLOBAL.UNEXPECTED_ERR_M` || 'EM_FAILOVER: ' ||`SQLERRM`);\nEND;\n/\n\
  ```\n\n## 总结\n\n本章介绍了企业管理系统云控制（Enterprise Manager Cloud Control）的主要组件——`Oracle 管理服务`、`Oracle\
  \ 管理存储库`、`Oracle 管理代理`以及`软件库`——这些组件都需要配置为高可用性。每个组件都需要通过不同的方法进行保护。\n\n存储库数据库的高可用性需要使用数据库的高可用性特性，包括`ASM`、`RAC`和`数据守护`。每种特性都应在适当的时候使用\
  \ Oracle 推荐的最佳实践进行配置。`RAC`提供了可扩展性，并能在单个主机故障时实现无缝故障转移。`数据守护`则能在主机和存储发生故障时提供保护，在角色切换期间实现最短的停机时间（通常少于一分钟）。在最具可配置性的形态下，存储库数据库部署在`RAC`数据库上，并使用`数据守护`配置了一个本地的`RAC`物理备用库。一个具有相同配置的备用站点也可用于在主站点丢失时提供服务。\n\
  \n`Oracle 管理服务`可以使用多种技术来实现高可用性，每种技术在成本和复杂性上有所不同。最简单的技术涉及将`OMS`主机与存储库主机分离。您还了解了主动/被动或冷故障转移解决方案，其中多个主机在共享文件系统上共享单个`OMS`，但在任何给定时间点只有一个处于活动状态。这利用了`VIP`的概念，以便在集群中一个主机丢失时进行故障转移。需要手动进行故障转移，并且在`OMS`在另一台主机上重新启动时会出现一些停机时间。下一个层级是在负载均衡器后面设置多个管理服务。这可以在单个`OMS`丢失时实现无缝故障转移解决方案。在`MAA`配置中，备用站点的配置与主站点类似。这显然成本最高。然而，它不仅提供单站点可用性，还能抵御灾难。\n\
  \n管理代理通过在软件库中配置参考镜像来实现高可用性。这使得使用部署过程更容易恢复代理。\n\n高可用性架构的一个关键方面是其备份和恢复策略。企业管理系统云控制中的每个组件都应在适当的时候遵循推荐的最佳实践，以确保可恢复性，满足业务的恢复点和恢复时间目标，从而将对业务的影响降至最低。\n\
  \n除了本章讨论的四个高可用性级别外，其他技术解决方案也可以提供不同级别的高可用性。这些包括但不限于虚拟化软件（如`Oracle VM Server`）、数据复制技术（包括`Oracle\
  \ GoldenGate`和`Oracle Streams`）以及存储级复制解决方案。解决方案的选择取决于业务需求、资源和成本。\n\n¹ `最大可用性架构 (MAA)`\
  \ 是一套基于高可用性特性的 Oracle 推荐实践。这些建议基于产品开发验证和客户运行 Oracle 产品的经验。\n\n² `快速恢复区` 在 11.2 版之前的\
  \ Oracle 数据库中被称为闪回恢复区。\n\n³ `TZ`环境变量的格式取决于您的操作系统。有关设置`TZ`变量的更多信息，请参阅您的操作系统文档。\n\n\
  ⁴ 回切的默认值设置为 0，这意味着`VIP`及其依赖资源在原始节点再次可用后不会自动回切。\n\n⁵ `Oracle Restart`是 Oracle Database\
  \ 11gR2 的单实例高可用性功能。它通过在发生故障时重新启动数据库实例、服务和监听器来提供高可用性。它还会在服务器启动时重新启动数据库组件。\n\n⁶ `保护模式`指的是在主数据库故障时接受的潜在数据丢失。三种可用模式是：最大性能、最大可用性和最大保护。\n\
  \n⁷ `Oracle RAC One Node`是 Oracle Database 11g 第 2 版中提供的一项新选件。`Oracle RAC One Node`是一个在集群中的一个节点上运行的\
  \ Oracle `RAC`启用数据库的单实例。\n\n⁸ `rsync`是一种软件，它能够在将文件和目录从一个系统复制到另一个系统的同时，通过使用差异算法最小化数据传输。\n\
