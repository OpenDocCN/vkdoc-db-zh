  \n    ![9781430249382_Fig02-14.jpg](img/9781430249382_Fig02-14.jpg)\n    *图 2-14.\
  \ 数据库标识*\n\n4.  对于“管理选项”步骤，如 图 2-15 所示，取消选中“配置 Enterprise Manager”，然后单击“下一步”。\n\n\
