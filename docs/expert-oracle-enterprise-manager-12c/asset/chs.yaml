  图 9-17. `SQL 详细信息`页面中的`统计信息`活动


  ## SQL 计划


  `计划`选项卡以图形或表格形式提供所详述`SQL ID`的实际执行计划。表格版本（如图 9-18 所示）如果 SQL 语句有多个可用的哈希计划值，则会提供下拉菜单。显示基本计划信息，如解析模式、优化器模式、语句来源和捕获时间。


  ![9781430249382_Fig09-18.jpg](img/9781430249382_Fig09-18.jpg)


