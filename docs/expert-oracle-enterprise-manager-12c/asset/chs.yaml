  \ MOS 凭据以下载并应用最新的补丁。（在本例中，我们将跳过此步骤并手动应用关键补丁集更新。）选择适当的选项后，单击“下一步”。\n\n    ![9781430249382_Fig02-02.jpg](img/9781430249382_Fig02-02.jpg)\n\
  \    *图 2-2. 下载软件更新的选项*\n\n3.  对于“选择安装选项”步骤，如 图 2-3 所示，选择“仅安装数据库软件”。然后单击“下一步”。\n\
