  ### 创建测试环境


  在您的场景运行完毕并产生可接受的结果后，就需要确定要迁移的应用程序以及目标工程化系统的详细信息了。您需要创建一个测试环境，该环境应在一定程度上镜像您的目标目的地，以测试并减轻与迁移相关的所有潜在风险。


  与任何测试环境一样，存储大量数据可能成本高昂，因此应使用理想的数据子集。Oracle 针对此问题开发了两种方法：`Test Data Management Pack`
  和 `Oracle Application Testing Suite`。


  `Test Data Management Pack` 支持数据子集化、数据发现和建模。数据子集化功能使您能够在生产、开发和测试系统上创建具有参照完整性的数据子集。为测试目的进行数据子集化，允许您选择所需数据的百分比（如
  1%或 5%），从而使测试更轻松。


  此工具包中的其他功能使您可以执行以下操作：


  *   创建/编辑子集定义

  *   预览子集详细信息和空间估算

  *   定义和执行子集化前/后脚本

  *   在目标之间执行子集定义

  *   导出/导入子集定义


  第二个选项是 `Oracle Application Testing Suite`，它是 `EM12c` 的一个扩展，提供与 `Test Data Management
  Pack` 相同的功能。`Oracle Application Testing Suite` 解决了所有相同的问题，并提供了一个完整的套件来创建测试环境并按需执行测试。


  ![image](img/sq.jpg) `注` 有关 `Oracle Application Testing Suite` 的更多信息，请访问 `http://otn.oracle.com`
  上的 Enterprise Manager 部分。


  随着应用程序复杂性的增加，尤其是在云等共享计算环境中，访问敏感数据的机会也在增加。对敏感数据（如社会安全号码）的访问可以通过在不同环境之间对数据进行脱敏来限制。`Oracle
  Data Masking Pack` 用外观逼真的、经过清理的数据替换原始敏感数据，这些数据具有与原始数据相同的类型特征。这使组织能够共享完全脱敏的数据，同时仍能遵守内部公司治理和政府法规。


  `Data Masking Pack` 使您可以执行以下操作：


  *   创建或使用脱敏定义

  *   对真实的应用程序测试工作负载进行脱敏

  *   定义可重用的格式库

  *   导出/导入脱敏模板

  *   导出/导入格式库


  `EM12c` 通过 `Data Masking Pack` 引入了发现数据依赖关系和进行建模的能力。此功能允许您发现环境中的数据模型和敏感数据，从而可以通过数据脱敏来保护它们。使用
  Oracle 的 `FAST`（查找、评估、保护和测试）方法论来实施数据脱敏，您可以在 `Oracle Exadata` 上创建一个测试环境，其中所有敏感信息在进行下一步系统性能验证之前都已被脱敏。


  其他数据脱敏功能使您可以执行以下操作：


  *   创建/编辑应用程序数据模型

  *   手动定义应用程序、模式和表

  *   使用开箱即用的元数据收集驱动程序，用于客户和打包的应用程序

  *   手动或通过使用敏感列发现来定义敏感列

  *   按敏感类型对敏感列进行分类

  *   定义和管理敏感类型

  *   导出和导入应用程序数据模型

  *   验证定义并将其与多个目标关联




  这些管理包允许您定义并提取测试数据，用于在各类工程系统与通用系统平台上创建测试环境。总体而言，这些管理包有助于定义、优化测试过程，并为迁移与整合工作提供真实的测试结果。


  ### 验证应用程序性能


  建立测试环境后，您需要执行测试，以验证与当前生产负载相比性能是否可接受。Oracle 开发了三种工具来帮助验证应用程序性能：`Database Replay`、`SQL
  Performance Analyzer` 和 `SQL Tuning Sets`。这些功能均属于 `Real Application Testing (RAT)`
  套件。`RAT` 是 Oracle Database 的一个可选组件，为在测试环境中验证生产负载性能提供了理想解决方案。


  ### 数据库重放


  `Database Replay` 功能能够捕获生产负载（包括在线与批处理负载），并在测试环境中重放。它使数据库管理员无需编写定制测试脚本即可测试系统变更、依赖关系及执行时序。通过减少测试所需时间，从而降低总体测试成本，节省时间与精力。`EM12c`
  通过简化保存和传输捕获的负载及性能数据至测试系统、设置测试系统以及通过其中央控制台进行重放的流程，对 `RAT` 功能进行了补充。


  ![image](img/sq.jpg) **注意** 要使用 `Real Application Testing (RAT)` 的功能，您必须购买许可。唯一的例外是
  `SQL Tuning Sets`，它可以在 Oracle Tuning Pack 或 `RAT` 下获得许可。


  `EM12c` 还针对中间层引入了功能类似于 `Database Replay` 的 `Application Replay`。`Application Replay`
  为验证所有 Web 及打包 Oracle 应用程序的应用基础设施变更提供了最高效、优化且最优质的测试。


  ### SQL 性能分析器与 SQL 调优集


  `SQL Performance Analyzer` 有助于预测并防止 SQL 执行性能问题。它通过在变更前后依次运行 SQL 语句，详细展示环境变化带来的影响。同时，它还会生成清晰、详细的报告，概述系统变更对工作负载的影响以及性能下降的
  SQL 语句集。`Oracle Enterprise Manager 12c Tuning Advisor` 对 `SQL Performance Analyzer`
  进行了补充，并提供优化和调整 SQL 语句以获取最佳性能的建议。


  `SQL Tuning Sets` 是 SQL 语句的集合，可作为输入提供给 `Automatic Database Diagnostic Monitor (ADDM)`、`SQL
  Tuning Advisor` 或 `SQL Access Advisor`。它们是包含一个或多个 SQL 语句及其相关执行统计信息和上下文的数据库对象。这些调优集用于帮助
  DBA 对 SQL 语句进行自动调优，并且可以导出到测试系统中进行评估和改进。


  本节讨论的三种工具——`Database Replay`、`SQL Performance Analyzer` 和 `SQL Tuning Sets`——由 Oracle
  开发，为测试数据库负载提供了一种方法论途径。这些工具各自表现出色，而它们协同工作时，则为监控任何环境（尤其是工程系统）提供了强大的方式。


  ## 管理阶段


  数据库或应用程序在生产环境中部署后，确保应用程序性能最优并达到预期服务水平至关重要。`EM12c` 控制台中集成的 Oracle Exadata 硬件与软件组件视图，允许
  DBA 从数据库性能页面导航至 Oracle Exadata 系统运行状况页面。当 Exadata 运行正常无问题时，附加在数据库上的系统运行状况按钮为绿色。当
  `Oracle Enterprise Manager` 检测到错误时，系统运行状况按钮会变为红色，表明可能存在问题影响数据库可用性。


  许多原因（例如，负载不均衡、`ASM` 相关问题、存储节点故障、存储节点配置问题或网络相关故障）都可能影响 Exadata 性能。`EM12c` 可帮助对 Exadata
  及其他工程系统中的此类问题进行故障排除与诊断。数据库的 `Automatic Database Diagnostic Monitor (ADDM)` 和 `Automatic
  Workload Repository (AWR)` 功能是使用 Exadata 数据库一体机进行性能分析的关键工具。


  ### ADDM 与 AWR


  `ADDM` 是 Oracle 数据库诊断基础架构的核心部分。`ADDM` 始于对数据库内基于关键工作负载指标获取的快照进行分析。这些快照包含与数据库内核、数据库工作负载以及操作系统级别相关的关键性能信息。`ADDM`
  定期运行，分析这些信息并针对识别出的问题提出建议。


  例如，当存在 SQL 负载问题时，SQL 顾问会就如何调整 SQL 语句提出建议。同样，当存在 I/O 或 CPU 问题时，`ADDM` 会提供系统资源优化建议。如果您正在运行
  `RAC`，`ADDM` 会分析您的整个 `RAC` 基础架构（包括互联网络），并就如何提高整体性能提供建议。


  `AWR` 是一个内置的存储库，包含在 `SYSAUX` 表空间中，每个 Oracle 数据库都维护着关于操作统计信息的该存储库。`AWR` 是 Oracle
  数据库中所有自我管理功能的基础。它是关于 Oracle 数据库及其使用方式的历史信息的主要来源。`AWR` 存储库及相关快照使数据库能够做出专为其运行环境量身定制的决策。


  ## ASH 分析


  `EM12c` 引入了一个新工具来探索 `Active Session History (ASH)` 数据。`ASH Analytics` 允许 DBA 跨各种性能维度分析性能数据。这种在不同维度上创建过滤器的能力极大地简化了性能问题的识别过程。


  ![image](img/sq.jpg) **注意** `Active Session History (ASH)` 是一个 `PL/SQL` 包，使用前必须安装。有关
  `ASH` 的更多信息，请参阅 第 9 章。


  如 图 8-17 所示，`ASH Analytics` 的下拉菜单允许管理员使用预定义的性能维度层次结构来探索性能数据。


  ![9781430249382_Fig08-17.jpg](img/9781430249382_Fig08-17.jpg)


  图 8-17. 活动会话历史 (ASH) 分析


  `ASH Analytics` 功能可用于运行在 Oracle Exadata 数据库一体机或非 Oracle 平台上的任何 Oracle 11g 数据库。例如，通过使用等待事件维度，您可以聚焦于
  Oracle Exadata 特定的等待事件，并解决与性能相关的问题。


  ### I/O 资源管理器


  Exadata `I/O Resource Manager (IORM)` 是 Oracle Exadata 的另一项关键能力，它保证数据库在每个存储服务器上获得资源计划中定义的最小
  I/O 量。让我们以运行多个应用程序和数据库的 Exadata 环境为例。


  图 8-18 展示了 Exadata 存储服务器网格视图，从中您可以看到 `IORM` 未启用，并且 `CRM` 数据库未获得足够的 I/O 资源，因为 `DW`
  数据库占用了大量资源。`DW` 数据库是合法的数据库，您不能仅仅因为它消耗大量资源就终止其进程。您需要找到更具创造性的方法来解决问题。


  ![9781430249382_Fig08-18.jpg](img/9781430249382_Fig08-18.jpg)


  图 8-18. 未启用 IORM 的 Exadata 存储服务器网格




