  在撰写本文时，`Enterprise Manager` 处于一个过渡阶段，正从之前版本中可用的技术 `Information Publisher` 转向 `Business
  Intelligence Publisher` 报告，后者提供了大大增强的格式、调度和分发选项。在 `12c Release 2` 中，您有两个不同的选项，第一个是链接到
  `Information Publisher` 报告。（这是在 `12c Release 2` 之前唯一的选项），但已被 `BI Publisher Reports`
  取代。`Oracle` 为 `Enterprise Manager` 提供了 `BI Publisher` 的嵌入式许可证，这显然是前进的方向。然而，目前存在一些限制，我们希望在未来的版本中看到放宽。




  目前，仅支持 `BI Publisher 11.1.0.6`（是的，版本号有四位小数），并且仅限于将其加载到与 Cloud Control 相同的 `WebLogic`
  域中。出于所有实际目的，这意味着您要么需要扩展域以包含一个新的 `BI Publisher` 服务器，要么将 `BI Publisher` 安装到现有的 `OMS`
  服务器上。无论哪种方式，在复杂性和管理方面都是一项重大投入——并且确实会带来额外的 CPU、内存和磁盘需求。希望在未来，对同一域的依赖可以放宽，`BI Publisher`
  模板可以安装到现有的企业 `BI Publisher` 环境或独立的 `BI Publisher` 实例中。最后，Oracle 目前不保证您开发的 `BI Publisher`
  报表的向后兼容性。因此，本书不涵盖 `BI Publisher` 报表，因为我们认为这些限制意味着在撰写本书时采用 `BI Publisher` 是不明智的。


