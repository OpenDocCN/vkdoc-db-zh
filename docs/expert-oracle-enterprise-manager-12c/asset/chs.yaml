  ```\n\n![image](img/sq.jpg) 注意  这一行 `1001\\. Undefined verification modules: 1`\
  \ 是此特定版本 `REPVFY` 中的一个错误，应予以忽略。\n\n```\n$ ./repvfy verify all -level 9 details\n\
