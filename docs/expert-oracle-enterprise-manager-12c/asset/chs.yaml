- '# 性能页面与 ASH 分析


  作者：Kellyn Pot''vin


  通过 `顶级活动` 功能监控性能自 Oracle 9i 引入以来，一直是企业管理员最常用的方面之一。在 `EM12c` 控制台中，将优化功能更深入地集成到现有和新的性能页面中，是新版本中为满足更复杂的数据库和云环境需求而取得的主要成就之一。


  这些成就还包括在 `顶级活动` 中更高效的数据报告，以及利用 `活动会话历史` (`ASH`) 数据的新机会，这些数据以 `ASH 分析` 和 `实时自动数据库诊断监控器`
  (`ADDM`) 性能图的形式呈现。现在，从 `顶级活动` 和 `ASH 分析` 界面中就可以使用新的顾问和报告选项，而在过去，您可能不得不离开当前的性能页面，或打开辅助浏览器窗口，或寻求其他工具来解决问题。


  登录到 `EM12c` 数据库目标界面后，您可以单击 `性能` 并选择各种选项来查看数据库中的活动。本章涵盖主要的性能类别，这些类别在以下领域提供优势：


  - 主机性能主页

  - 性能主页

  - `顶级活动`

  - `ASH 分析`

  - `SQL 监控`

  - SQL 优化选项

  - 顾问主页

  - `实时 ADDM`

  - `ADDM` 比较报告


  ## 许可要求


  您必须注意与 `自动工作负载仓库` (`AWR`)、`ASH` 和 `ADDM` 相关的许可要求。在利用这些性能报告功能之前，请确保您已获得 Oracle 的
  `诊断` 和 `调优` 管理包的许可。


  可以通过单击 `EM12c` 控制台中的 `设置` ![arrow](img/arrow.jpg) `管理包` 来访问许可信息。您可以查看单个页面、整个环境或特定管理包/功能的信息。图
  9-1 显示了此菜单层次结构。


  ![9781430249382_Fig09-01.jpg](img/9781430249382_Fig09-01.jpg)




  图 9-1。 任何 EM12c 页面或功能的管理包和许可信息都可以从控制台的 `设置` 菜单轻松获取。


  ![image](img/sq.jpg) **提示** 管理员可以通过点击 `设置` ![arrow](img/arrow.jpg) `管理包` ![arrow](img/arrow.jpg)
  `此页面的管理包`，来访问控制台页面中用于任何 EM12c 功能的管理包。


  解决了许可问题后，您就可以专注于性能数据以及 EM12c 控制台提供的众多选项了。用于性能数据的最常用界面是目标级别的界面，通常涉及单个实例或集群数据库。


  ## 主机性能


  主机目标的性能信息可以通过在 EM 控制台页面中选择 `目标` ![arrow](img/arrow.jpg) `主机`，然后选择所需的主机来访问。您可以检查基本的性能指标，例如
  CPU 使用率、内存使用率、文件系统使用率和网络利用率，如 图 9-2 所示。


