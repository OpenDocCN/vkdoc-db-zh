- '# 第 1 章


  ![image](img/frontdot.jpg)


  ## Enterprise Manager Cloud Control 12c 架构


  作者：Pete Sharman


  *Oracle Enterprise Manager Cloud Control 12c*（下文简称`EM12c`）是 Oracle 公司针对 Oracle 及非
  Oracle 技术推出的最新端到端管理工具。该工具此前被称为 Oracle Enterprise Manager (OEM) 或 Oracle Enterprise
  Manager Grid Control，已经存在了相当长的时间。然而，12c 版本是一个里程碑式的版本，在其功能的广度和深度上都取得了巨大进步。在许多方面，这个版本使
  Enterprise Manager 从一个数据库管理员的监控工具，转变为一个可用于管理整个数据中心的工具。EM12c 现在涵盖多个重点领域，包括以下内容：




  '
- '# EM12c 核心功能与架构


  *   **框架与基础设施**：EM12c 提供了安全性、可扩展性、丰富的用户界面、新的自更新功能等。

  *   **企业监控**：您可以监控整个基础设施的状态，包括数据库、中间件和应用程序。EM12c 提供了问题通知、解决和报告的方法。

  *   **云管理**：云管理是当今行业热点，EM12c 在此领域提供了一系列解决方案，包括费用分摊/展示、基于策略的资源管理和自助式供应。

  *   **生命周期管理**：如今管理计算系统需要许多手动流程来完成发现、供应、打补丁、变更管理和配置管理。EM12c 自动化了其中许多手动流程，让管理员有更多时间处理其他更高优先级的任务。

  *   **数据库管理**：数据库管理一直是 OEM 自首次发布以来的关键功能。这在 EM12c 版本中得以延续，包括围绕打补丁、升级、供应、性能调优、数据脱敏和子集化，以及配置和变更管理的解决方案。

  *   **中间件管理**：EM12c 的一个关键组件是为所有 Oracle 中间件产品（包括 WebLogic Server、SOA Suite、Identity
  Management、WebCenter 和 Coherence）以及非 Oracle 中间件（如 IBM 的 WebSphere 或 JBoss Application
  Server）提供全面的管理能力。

  *   **应用程序管理**：EM12c 开箱即用地提供了对所有 Oracle 提供的应用程序（E-Business Suite、PeopleSoft、Siebel、JD
  Edwards 和 Fusion Applications）的监控和管理解决方案，此外还具备管理您自己构建的自定义或第三方应用程序的能力。

  *   **应用程序性能管理**：EM12c 提供应用程序的端到端监控，包括通过 Real User Experience Insight (RUEI) 进行真实用户监控，以及通过
  Service Level Management 信标进行合成事务监控。此处引入的其他功能包括监控和跟踪业务事务、拓扑发现，以及 Java 和数据库监控与诊断。

  *   **应用程序质量管理 (AQM)**：提供三个测试领域——通过 Application Testing Suite 产品进行应用测试，通过 Real Application
  Testing 和 Application Replay 进行基础设施测试，以及包括测试系统创建、数据脱敏和数据子集化技术在内的测试数据管理功能。

  *   **硬件与虚拟化管理**：为物理和虚拟环境提供完整的生命周期管理，包括供应、打补丁、配置管理、管理和监控。这包括管理运行在 Linux、Unix、Windows
  和 Oracle Virtualization Server (Oracle VM Server) 操作系统上的系统，以及为基于 Oracle Sun 硬件构建的系统提供对服务器、网络和存储层的洞察。

  *   **异构（非 Oracle）管理**：通过提供一系列称为连接器和插件的扩展（以及其他），EM12c 除了 Oracle 环境外，还具备管理非 Oracle
  技术的能力。这些扩展可以由 Oracle、合作伙伴甚至客户自己构建。它们基于与 EM12c 产品其余部分相同的管理框架，因此可以通过自更新机制下载、导入和部署。


  涵盖所有这些关注领域，构成了一个用于管理整个数据中心的强大产品。本书的其余部分将深入探讨其中许多领域的细节。本章的其余部分将介绍基本架构，在您进一步深入了解 EM12c
  的精彩功能之前需要理解这些内容。


  ## 架构概览


  从架构角度看，EM12c 由五个主要部分组成：


  *   `Cloud Control console`

  *   `Oracle Management Agent`

  *   `Oracle Management Service`

  *   `Oracle Management Repository`

  *   `Plug-ins`


  让我们更详细地了解每一个组件。


  ![image](img/sq.jpg) **注意** 对 EM12c 的许可讨论超出了本书的范围。（完整的许可文档可在 Enterprise Manager
  文档中找到，网址为 [`docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm`](http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm)。）然而，值得注意的是，一般来说，此处描述的大多数基本功能都带有受限使用许可，因此是免费的。此受限使用许可特指
  Enterprise Manager，但许多附加选项确实会产生许可费用。有关完整详情，请参阅许可文档。


  ## Cloud Control 控制台


  `Cloud Control console` 提供了用于访问、监控和管理计算环境的用户界面。该控制台通过 Web 浏览器访问，因此允许您从任何位置访问中央控制台。与之前的版本相比，您可以对
  EM12c 控制台进行更多定制，为您提供以下选项：


  *   从各种预定义页面中选择您的主页（或者确实设置任何您想要的页面作为个人主页）

  *   在目标主页上移动区域

  *   添加可能比默认区域更让您感兴趣的区域

  *   删除不感兴趣的区域


  图形用户界面 (GUI) 提供了您最近访问过的目标的历史记录（标准浏览器历史记录也可用）。此外，您可以将页面标记为收藏夹，它们会出现在基于新菜单的界面中的收藏夹列表中。图
  1-1 显示了默认主页的示例。


  ![9781430249382_Fig01-01.jpg](img/9781430249382_Fig01-01.jpg)


  图 1-1. EM12c 中的新默认主页


  ## Oracle Management Agent


  `Oracle Management Agent`（通常简称为 `agent` 或缩写为 `OMA`）通常安装在计算环境中被监控的每个主机上。（EM12c 还引入了在某些情况下远程管理环境的能力。）这些代理从控制台部署（见图
  1-2），然后监控由代理发现的所有目标。它们用于控制这些目标上的中断、执行作业、收集指标等，并反过来向 `Oracle Management Service`
  提供可用性、指标和作业状态等详细信息。


  ![9781430249382_Fig01-02.jpg](img/9781430249382_Fig01-02.jpg)


  图 1-2. EM12c 中管理代理的用户界面


  对于 EM12c 版本，代理为了更高的可靠性、可用性和性能而完全重写（有关如何实现此目的的详细信息，请参见即将关于插件的部分）。此更改的唯一缺点是您必须使用 EM12c
  代理来与 EM12c `Oracle Management Service` 通信。由于新版本中进行的大量更改，12c 及更早版本代理之间的向后兼容性已丢失。


  ## Oracle Management Service


  `Oracle Management Service (OMS)` 是一个基于 Web 的应用程序，它与代理和 `Oracle Management Repository`
  通信，以收集和存储有关各个代理上所有目标的信息。（请注意，信息本身存储在 `Oracle Management Repository` 中，而不是 OMS 中。）OMS
  还负责为控制台呈现用户界面。




  `OMS` 被安装到一个 Oracle 中间件主目录中，该目录还包含 Oracle `WebLogic Server`（包括 `WebLogic Server`
  管理控制台）、用于中间件层的 Oracle `Management Agent`、管理服务实例基础目录、`Java 开发工具包`（`JDK`）以及其他配置文件。如果存在现有的
  `WebLogic Server`（`WLS`）配置，你可以将 `OMS` 安装进去，但从可用性角度来看，通常最好将其安装在专用的 `WLS` 主目录中。


  ## Oracle Management Repository


  `Oracle Management Repository`（也称为 `repository` 或 `OMR`）是一个 Oracle 数据库，用于存储所有管理代理收集的信息。它由数据库用户、表空间、表、视图、索引、包、过程和数据库作业组成。


  与 `OMS` 不同，`OMR` 的安装过程要求数据库已为存储库存在。这意味着在安装 `OMS` 之前，你需要已在环境中的某处创建好数据库。同样，通常建议在专用数据库中创建存储库。


  ## Plug-ins


  在 `EM12c` 中，`Plug-ins` 被赋予了全新的含义。在早期版本中，插件主要是用于监控和管理非 Oracle（异构）软件（包括数据库和中间件）的系统监控工具。它们通常由合作伙伴或
  Oracle 公司自身构建。一些技术娴熟的客户也构建了自己的插件，但总体而言插件数量并不多。


  在 `EM12c` 版本中，虽然保留了一些此类监控插件，但插件的概念已大大扩展，涵盖了所有被管理的目标类型。因此，现在有用于管理 Oracle 数据库的 Oracle
  数据库插件、用于管理 Oracle 中间件的 `Fusion Middleware` 插件、用于管理 Oracle `Fusion Applications`
  产品套件的 `Fusion Application` 插件，等等。由于 Oracle 软件的新版本将包含用于管理该软件的插件，这意味着 `EM12c`（及后续版本）将能够比过去更快地监控和管理这些新版本。插件可以通过
  `Cloud Control` 控制台中新的 `Self Update` 功能（如果你有足够的权限使用它）来下载、应用和部署。


  此外，这种模块化的插件架构意味着代理不再被配置为能够监控任何目标类型。现在，代理只会下载其监控目标所需的插件。这意味着代理本身比以前版本的代理更小。这一变化是
  `EM12c` 版本架构中最重要的改进之一。


  ## 高可用 EM12c 配置


  在最基本的 `EM12c` 安装中，`OMS` 和存储库可以物理地位于单台机器上。但是，Oracle 建议将这两个组件放置在不同的机器上。图 1-3 展示了最简单的安装方式。


  ![9781430249382_Fig01-03.jpg](img/9781430249382_Fig01-03.jpg)


  图 1-3. 基本的 EM12c 架构


  尽管这种相对简单的架构可能足以满足初始部署的需求，但你可能需要将其发展为可扩展性更高、可用性更强的架构。有四种部署级别可用于 `EM12c`，以实现更高的可扩展性和可用性。当然，与任何需要同时具备可扩展性和可用性的架构一样，随着性能和可用性的提高，成本也会增加，需要在其中进行权衡。


  ### Level 1


  图 1-3 展示了 `level 1` 的部署。`OMS` 和存储库要么安装在单台主机上，要么（更可取地）安装在两台独立的主机上。但是，这两台主机都没有配置任何故障转移。


  ### Level 2


  对于 `level 2`，`OMS` 安装在共享存储上，并使用基于 `VIP`（虚拟 IP）的故障转移。存储库数据库通过使用本地物理备用数据库技术进行保护。通常，这意味着
  `level 2` 部署使用的机器数量是 `level 1` 的两倍。`Level 2` 的主动/被动配置（尽管位于本地而非远程被动站点）在从主动站点故障转移到被动站点时会导致停机窗口。该架构如图
  1-4 所示。


  ![9781430249382_Fig01-04.jpg](img/9781430249382_Fig01-04.jpg)


  图 1-4. level 2 部署示意图


  ### Level 3


  在 `level 3` 配置中，`OMS` 使用主动/主动配置进行安装，需要本地负载均衡器。存储库数据库由 `Real Application Clusters`（`RAC`）和本地
  `Data Guard` 共同保护。该级别如图 1-5 所示。


  ![9781430249382_Fig01-05.jpg](img/9781430249382_Fig01-05.jpg)


  图 1-5. level 3 部署示意图


  ### Level 4


  `Level 4` 是提供最高可扩展性和可用性的部署级别。在这种情况下，`OMS` 在主站点以主动/主动配置运行（就像 `level 3` 一样），但在远程站点有额外的备用
  `OMS` 安装。（请注意，由于 `OMS` 和存储库之间的网络延迟要求持续小于 1 毫秒，远程站点不能运行活动的 `OMS`）。此配置需要在主站点和备用站点都设置本地负载均衡器。存储库数据库再次运行在
  `RAC` 上，但在这种情况下，备用 `RAC` 数据库位于灾难恢复站点。可以看出，这是一个相当复杂的架构，如图 1-6 所示（图中省略了所有会使它更难理解的通信线路）。


  ![9781430249382_Fig01-06.jpg](img/9781430249382_Fig01-06.jpg)


  图 1-6. level 4 部署示意图


  现在你已经了解了四种可能的部署级别的要点。第 13 章 在高可用性的背景下更详细地介绍了它们。另外，请注意，可以创建与这些级别不完全匹配的配置。如果有一天你看到一个与刚才描述的稍有不同的配置，请不要太过惊讶。`EM12c`
  为你提供了极大的灵活性。


  ## Software Library


  Enterprise Manager 安装的另一个重要部分是 `Software Library`。`Software Library` 是一个存储区域，用于存放补丁、`Self
  Update` 下载内容和黄金镜像等。在“高可用 EM12c 配置”一节前面的示意图中，它被描绘为位于 `OMS` 之间的共享存储。（图 1-5 清晰地展示了它，在那里你几乎可以在正中间看到共享存储的图标）。要创建
  `Software Library`，你需要使用 `Software Library: Administration` 页面，可通过 `Setup` → `Provisioning
  and Patching` → `Software Library` 菜单路径访问。`Software Administration` 页面如图 1-7 所示。


  ![9781430249382_Fig01-07.jpg](img/9781430249382_Fig01-07.jpg)


  图 1-7. Software Library: Administration 页面


  创建 `Software Library` 时需要注意的一个重要点是，如果你认为你的 `EM12c` 部署在某个阶段需要某种程度的高可用性，则需要确保创建 `Software
  Library` 的位置可以从每个 `OMS` 访问。这可以通过在每个 `OMS` 上挂载相同的网络文件系统（`NFS`）共享，或使用任何其他允许在机器之间共享文件系统的技术来实现。




  '
- '# EM12c 版本包含多项与软件库相关的新功能：


  *   在此版本中，**软件库**成为更多实体的单一存放位置，例如指令和程序集。（这些新实体在第 5 章中有解释。）其中许多实体能够自我更新，因此我们现在与 `Self
  Update` 实现了集成。

  *   Oracle 还扩展了存储类型的支持，因此现在支持 `NFS` 文件系统在 `OMS` 之间共享，以及任何我们可以访问的文件系统（即，代理文件系统现在也可用于托管软件库）。

  *   软件库现在支持**引用位置**。因此，如果您有一个用于提供这些实体的集中式位置，且该位置独立于 `OMS`，您现在可以通过 `HTTP`、`NFS` 等方式引用它们。在这种情况下，`OMS`
  存储有关此引用位置的元数据，而软件位（bits）则存储在外部。

  *   此版本还包含一系列其他功能。例如，您可以将支持说明或自述文件附加到软件库实体。该库包含改进的搜索功能，当然，新的权限模型允许使用细粒度权限进行实体访问。


  ## 管理工具


  那么现在，您可能要问了：“好吧，那 Oracle 的其他那些管理工具呢？” 通常你会发现，人们对所有这些工具是什么、如何区分它们，当然还有何时使用哪一个，都存在一定程度的混淆。我们现在就花些时间来讨论一下。


  首先，`Cloud Control` 与其他 Oracle 管理工具（如 `Database Control (DB Control)` 和 `Fusion Middleware
  Control (FMW Control)`）的主要区别在于架构。`Cloud Control` 设计用于管理整个数据中心，因此它拥有比其他工具健壮得多的多层架构。


  其次，其他管理工具是简化版工具，通常一次只能连接到单一环境，而不是提供更广泛的数据中心级别的环境视图。例如，`DB Control` 一次只能连接到一个 Oracle
  数据库。如果您想使用 `DB Control` 来管理或监控另一个 Oracle 数据库，必须先断开与原始数据库的连接，然后才能连接到新的数据库。事实上，如果您不这样做，Oracle
  会自动为您断开连接。


  最后，不同工具之间存在一些不兼容性。例如，当您使用 `Database Configuration Assistant (DBCA)` 创建 Oracle 数据库时，系统会询问您是否希望数据库被集中管理（通过
  `EM12c`）还是本地管理（通过 `DB Control`）。这是一个二选一的决定；您不能两者都选。这种不兼容性在 `OMR` 上达到了顶峰。当您安装 `EM12c`
  时，系统会提示您指定库的位置。（安装程序不会为您创建数据库；它只是提示您指向环境中某个现有 Oracle 数据库的位置。）如果您指向的数据库已被 `DBCA`
  配置为由 `DB Control` 本地管理，安装程序实际上会报错，指出该数据库已经是本地管理的。（安装程序确实会为您提供删除 `DB Control` 配置的命令（如果您选择这样做），但实际上不会为您执行该命令。）


  最后需要说明的是，在撰写本章时，Oracle 已宣布 `DB Control` 将在 11.2 之后的数据库版本中停止支持。尽管我们尚不清楚新产品将叫什么名字，但
  Oracle 指出：“在未来的 Oracle 数据库版本中，基本的数据库管理将通过一个简化的管理工具提供，而广泛的管理功能将通过从 Oracle Enterprise
  Manager Cloud Control 部署的最新 Oracle 数据库插件实现”（详情请参见 My Oracle Support 上的 Note 1484775.1）。


  ### 命令行工具


  除了大多数 `EM12c` 用户用于日常工作的 `GUI` 外，Oracle 还提供了两个您需要熟悉的命令行工具：


  *   `Enterprise Manager Command Line Interface (EMCLI)`：此工具主要用于可能需要重复执行的脚本操作。它是一家咨询公司常用的工具，这些公司以配置
  `EM12c` 为业务，因此需要跨不同客户重复执行相同的操作。`EMCLI` 可以安装在任何计算机上（不一定是 `OMS` 或 `OMR`），只需通过 `Cloud
  Control` 的“设置”菜单下载该工具，然后按照安装说明操作即可。然而，并非所有可以通过 `GUI` 执行的操作都能通过 `EMCLI` 完成。

  *   `Enterprise Manager Control (EMCTL)`：此实用程序用于执行各种任务，其中最重要的是启动、停止和检查 `OMS`、代理以及
  `Cloud Control` 本身的状态。它还用于保护/取消保护代理和 `OMS`，启动和停止维护窗口以及其他操作。


  ### 库用户


  就数据库用户而言，`EM12c` 安装中最重要的用户是 `SYSMAN` 用户。`SYSMAN` 用户已经存在多个版本了。它基本上是包含库的数据库模式的所有者。在许多方面，它类似于
  Oracle 数据库中的 `SYS` 用户，因此，除了在第一次创建另一个超级管理员帐户时使用外，不应再使用它（有关超级管理员帐户的更多详细信息，请参见第 4 章）。


  除了 `SYSMAN` 帐户外，在库创建或升级期间，库中还会创建其他数据库用户。这些包括：


  *   `CLOUD_ENGINE_USER` 和 `CLOUD_SWLIB_USER` 用于执行云操作。

  *   `MGMT_VIEW` 用于生成报告。

  *   `SYSMAN_APM`、`SYSMAN_MDS` 和 `SYSMAN_OPSS` 是 Fusion Middleware 组件的元数据模式。

  *   `SYSMAN_BIP` 用于商业智能 (`BI`) Publisher 集成。

  *   `SYSMAN_RO` 是一个通用的只读用户。


  Oracle 文档中对这些帐户提供的细节不多。但可以说，这些都是特殊帐户，您不应删除它们，也不应更改它们的密码。


  ### 库视图


  有关管理员、目标、指标、维护窗口和作业的信息都存储在 Oracle 管理库的一组库视图中。尽管这些视图中的信息显然被 `Cloud Control` 控制台用来向您显示信息，但它也可以用于其他用途，主要是由在
  Enterprise Manager 产品之上构建可扩展性的程序员使用。例如，作为插件开发人员，您可能希望扩展 Enterprise Manager 以管理您自己定制开发的目标，或者确实扩展
  Oracle 开箱即用的目标类型。您可能还想编写自己的脚本来从这些视图中查询历史数据，或者构建自己的自定义报告，以便从 `SQL Developer` 或其他产品中运行。显然，关于
  Enterprise Manager 架构的章节不是深入探讨如何完成所有这些事情的细节的地方，但了解这些库视图是什么以及如何找到有关它们的更多信息是值得的。



  好的，作为您的文档工程师和翻译员，我已仔细阅读了注意事项和示例。现在，我将严格按照要求，将您提供的英文技术文档翻译成中文，并确保所有格式元素（如标题、列表、链接、代码、图片引用等）得到妥善处理。



  ## 仓库视图与通信流程


  仓库视图在《Enterprise Manager Cloud Control Extensibility Programmer’s Reference》中有文档说明（您可以从位于[`docs.oracle.com/cd/E24628_01/index.htm`](http://docs.oracle.com/cd/E24628_01/index.htm)的
  EM12c 文档访问该参考手册）。该在线参考的第 18 章详细说明了这些视图的使用，并提供了显示每个视图列名的视图的完整列表。


  ### 通信流程


  当您首次开始使用像 Enterprise Manager Cloud Control 12c 这样的产品时，最令人困惑的领域之一就是产品各个部分之间的通信流程是如何进行的。本质上，您需要理解三个领域：涉及的协议、正在使用的端口，以及是否使用了防火墙。


  ### 协议


  在 EM12c 安装的组件之间进行通信时，使用三种主要协议：


  *   `Hypertext Transfer Protocol (HTTP)` 或 `Hypertext Transfer Protocol/Secure (HTTP/S)`：这些是万维网使用的基础协议。它们定义了消息如何传输和格式化，以及浏览器和
  Web 服务器对不同命令的响应操作。`HTTP`和`HTTP/S`用于在`OMA`、`OMS`和`OMR`之间进行通信。出于安全原因，Oracle 通常建议使用`HTTP/S`而非`HTTP`。

  *   `Java Database Connectivity (JDBC)`：这个 Java 标准由`OMS`用于与仓库通信，以及与任何数据库目标通信。

  *   `Internet Control Message Protocol (ICMP)`：该协议由`OMS`用于与主机通信，以检查主机的状态。本质上，使用`ping`命令来检查其状态。


  ### 端口


  在 EM12c 安装过程中，系统会提示您提供实体通信的端口列表。默认列表显示在“端口配置详细信息”页面上，如图 1-8 所示。该页面显示了“推荐端口范围”列。此列中列出的第一个端口号是默认端口。如果出于任何原因，在您进行安装时默认端口已被占用，将使用“推荐端口范围”中的下一个端口号。安装后，您还可以在位于
  OMS 主机上的`staticports.ini`文件中找到已使用的端口号。


  ![9781430249382_Fig01-08.jpg](img/9781430249382_Fig01-08.jpg)


  图 1-8. 端口配置详细信息页面


  ### 防火墙


  在许多情况下，企业会要求使用防火墙来控制进出网络流量。这通常涉及限制端口的可用性或限制可以通过特定端口的流量类型。由于这种限制可能难以设置，通常建议在部署 Enterprise
  Manager 配置之后再进行防火墙配置和启用。但是，如果防火墙已经就位，您应该打开计划使用的通信端口，直到安装完成。


  将这三个领域（协议、端口和防火墙）结合起来，EM12c 安装中的默认通信流程如图 1-9 所示。


  ![9781430249382_Fig01-09.jpg](img/9781430249382_Fig01-09.jpg)


  图 1-9. EM12c 配置中的端口、协议和防火墙


  ## EM12c 中的认证


  借助 EM12c 版本中提供的新可插拔框架，您现在在认证方面有了更多选择。该框架接受一系列可插拔的认证方案，使您能够选择最适合您环境的方法。由于 EM12c 依赖
  Oracle 的 WebLogic Server 进行外部认证，因此 WLS 支持的任何认证方法都可用于对 EM12c 进行认证。支持的认证方法包括以下内容：


  *   `Repository-based authentication`：在这个您可能从之前版本的 Enterprise Manager 熟悉的默认认证选项中，系统会提示您输入用户名和密码。此认证方法提供标准的密码选项，如密码有效期、密码宽限期、失败尝试次数和密码复杂度。

  *   `Single sign-on authentication`：如果您的企业中使用单点登录（SSO）认证，您可以将这些 SSO 凭据注册为 EM12c
  中的管理员。然后，您可以使用这些凭据访问 Cloud Control 控制台。

  *   `Oracle Access Manager SSO authentication`：Oracle Access Manager（OAM）是 Oracle
  Fusion Middleware 产品附带的 SSO 解决方案。同样，如果您正在使用 OAM SSO，您可以将这些凭据注册为 EM12c 中的管理员，并使用它们访问控制台。

  *   `Enterprise User Security authentication`：`EUS`允许您在符合轻量级目录访问协议（`LDAP`）的目录服务器中将企业用户和角色创建并存储为目录对象。然后，您可以使用`EMCTL`设置一些属性，以允许您深入到这些数据库中，而不显示标准登录页面。

  *   `LDAP authentication`：在之前版本的 Enterprise Manager 中，允许使用`LDAP`认证，但它仅限于 Oracle
  的`LDAP`解决方案，Oracle Internet Directory（`OID`）。在 12c 版本中，现已扩展到除了`OID`之外，还可以使用 Microsoft
  的 Active Directory 产品。


  ## 总结


  本章向您介绍了 Enterprise Manager Cloud Control 12c 的主要架构组件：Cloud Control 控制台、Oracle Management
  Agent、Oracle Management Service、Oracle Management Repository 以及插件。您了解了部署此架构的选项以及可用于连接到
  EM12c 的认证方法。本章还涵盖了 EM12c 使用的协议、端口和防火墙，因此您现在已准备好更详细地钻研产品的安装。这是我们下一章的主题。


