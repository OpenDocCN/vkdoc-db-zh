  ### 使用命令行管理存储库



  '
- "# Oracle Enterprise Manager 存储库命令行管理\n\n## 介绍\n\n在之前的章节中，你已经看到，从命令行对 `OMS` 和 `agent`\
  \ 进行管理，主要使用 `EMCTL` 和 `EMCLI` 实用程序。从命令行对 `repository` 的管理则有所不同。它实际上就是另一个 `Oracle`\
  \ 数据库（尽管是一个有特殊用途的数据库），因此 `repository` 管理的命令行界面是 `DBA` 的老朋友——`SQL*Plus`。由于本书并非针对\
  \ `DBA 101` 级别的技能，本节不会带你完成启动或停止 `repository` 的过程。你唯一需要注意的是以下几点：\n\n*   在停止并重启 `repository`\
  \ 数据库之前，你应该先停止 `OMS`（使用 `emctl stop oms` 命令）。\n*   在启动 `repository` 数据库之前，你也应该确保监听器已启动。\n\
  \n话虽如此，你确实需要了解一些可以在 `SQL*Plus` 中为 `repository` 管理的其他领域，特别是围绕空间消耗和性能考量方面。在本节中，你将了解以下内容：\n\
  \n*   数据保留\n*   队列管理\n*   优化器统计信息\n*   `repository` 视图\n\n## 数据保留\n\n`Enterprise\
  \ Manager` 收集大量数据。默认情况下，这些数据在以下生命周期中进行处理和聚合：\n\n*   由管理 `agent` 根据你定义的收集策略上传的原始度量数据，将保留\
  \ `7` 天。\n*   `7` 天后，仅保留每小时的汇总数据（度量的最大值、最小值和平均值）。\n*   这些数据默认保留 `31` 天，之后仅保留每日汇总数据。\n\
  *   最后，每日汇总数据保留 `12` 个月。\n\n你可能希望审查这些策略。特别是，目标管理员执行的一项常见任务是与上一个业务周期进行性能比较。因此，你很可能希望原始度量数据的保留时间超过\
  \ `7` 天，以便深入分析更细粒度的数据。同样，你可能希望每小时数据的保留时间超过一个月，以便能够（例如）比较月度终数据。最后，许多组织选择将每日数据保留多年。\n\
  \n![image](img/sq.jpg) `注意` `Enterprise Manager` 在 `repository` 数据库中使用分区来维护度量和其他数据。就许可而言，这通常是一项附加功能，但只要你仅将分区选项用于\
  \ `Enterprise Manager` 基表，你就不需要额外付费。请**不要**在没有分区的情况下重新链接 `Oracle`，因为我曾有一位客户因为担心额外的许可成本而这样做了。如果你这样做，将会严重破坏\
  \ `repository`！\n\n`Enterprise Manager` 通过删除过期的度量表分区来归档旧数据。因此，可以通过修改要保留的分区数量来设置保留策略。`Enterprise\
  \ Manager` 提供了一个存储过程来执行此任务。清单 3-1 实现了一个保留策略：详细数据 `10` 天，每小时数据 `40` 天，每日数据 `3` 年。\n\
  \n***清单 3-1***. 修改 `EM` 保留策略\n\n```\nBEGIN\n        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES',10);\n\
  \        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES_HOURLY',40);\n\
  \        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES_DAILY',36);\n\
  END;\n/\n```\n\n![image](img/sq.jpg) `注意` 表 `EM_INT_PARTITIONED_TABLES` 包含了作为 `repository`\
  \ 一部分提供的各种 interval 分区表的默认保留时间。\n\n## 队列管理\n\n`Enterprise Manager` 大量使用 `Oracle`\
  \ 的数据库内队列技术（`Oracle Streams Advanced Queuing`，通常简称为 `AQ`）。该技术可能需要一些细心和维护，以确保性能保持在最佳水平。如果你选择为\
  \ `repository` 数据库实施 `Oracle Real Application Clusters` 解决方案，这一点尤其重要。`AQ` 队列使用多种数据库技术实现，包括索引组织表。如果消息出队未高效或完全进行，那么随着时间的推移，底层数据结构可能会显著增长，消息入队和出队时间可能会增加。\n\
  \n`Enterprise Manager` 大量使用队列，特别是用于度量加载和上传以及通知。你可能会发现此区域问题的第一个迹象是出现持续且不断增长的上传积压，或通知延迟。不幸的是，这两种症状也可能有其他原因。\n\
  \n`Oracle Enterprise Manager` 的初始数据库设置并未专门按照 `AQ` 的通用指南配置数据库。特别是，`AQ` 将受益于一个称为 `Streams\
  \ pool` 的专用内存池。在默认安装中，你可能会发现此池大小未设置，因此 `Advanced Queuing` 只会使用最小的内存分配。我建议你将初始化参数\
  \ `STREAMS_POOL_SIZE` 设置为 `100MB` 作为起点（`AQ` 文档建议 `20MB`，但根据我的经验，这对于繁忙的系统来说太小了）。你可以使用清单\
  \ 3-2 中的查询来监控 `streams pool` 的内存使用情况。\n\n***清单 3-2***. `Streams Pool` 的内存使用情况\n\n\
  ```\nSELECT name,round(sum(bytes)/1024/1024,1) memory_mb\nFROM v$sgastat\nWHERE\
  \ pool = 'streams pool'\nGROUP BY name;\n```\n\n如果你选择为 `repository` 数据库采用 `RAC`\
  \ 实施，你可能还希望为队列表配置实例关联性，以最小化实例内块 `ping`。当然，你应该通过 `Oracle Support` 验证对此队列定义的任何此类修改是否受支持。为了执行此任务，你将需要\
  \ `AQ_ADMINISTRATOR_ROLE` 角色和在 `SYS.DBMS_AQADM` 包上的执行权限。你可以使用清单 3-3 中的代码分配首选实例。\n\
  \n***清单 3-3***. 更改队列表的实例关联性\n\n```\nBEGIN\n        SYS.DBMS_AQADM.ALTER_QUEUE_TABLE(\n\
  \        queue_table => 'SYSMAN.EM_CNTR_QTABLE',\n        primary_instance => 1\n\
  );\nEND;\n/\n```\n\n![image](img/sq.jpg) `注意` 设置实例关联性仅控制哪个 `QMN` 进程消费消息，并不阻止其他实例使用队列。\n\
  \n### 优化器统计信息\n\n任何 `Oracle` 数据库管理员的核心任务之一是确保优化器拥有关于数据库应用程序访问对象的代表性统计信息，以确定执行计划的成本并据此进行优化。在没有代表性统计信息的情况下，`Oracle`\
  \ 更有可能选择低效的访问路径。为此，`Oracle` 为 `Enterprise Manager repository` 统计信息维护提供了一个内置的统计信息收集作业。该作业实现了一个统计信息收集策略，比数据库内置的统计信息收集作业更具灵活性。\n\
  \n该作业由 `EM_STATS_MONITOR` 表的内容控制，该表包含 `Enterprise Manager` 使用的表的一个子集，以及要提供给 `DBMS_STATS`\
  \ 包的偏好值。在此版本中，统计信息收集作业覆盖的唯一偏好是：对象被视为陈旧所需更改行的百分比，以及收集统计信息的粒度。\n\n## 调度任务配置\n\n这个单一的调度任务在逻辑上被组织成两个独立的统计信息收集活动：\n\
  \n*   一个每日运行的任务，确保所有过时的 Enterprise Manager 对象统计信息得到更新\n*   第二个每两小时运行的任务，针对 `EM_STATS_MONITOR`\
  \ 表中最过时的对象进行统计信息收集\n\n每日任务在数据库服务器所在时区的午夜至凌晨 1 点之间运行。第二个任务每 2 小时运行一次，旨在达成以下目标：\n\n\
  *   确保易变表拥有当前的统计信息\n*   确保为站点特定需求做出规定\n\n对于每两小时一次的收集，其统计信息收集机制可能过于激进。很少有站点真正需要对存储库表进行每两小时一次的运行。因此，您可能希望修改\
  \ `EM_GATHER_SYSMAN_STATS` 计划任务的调度计划，但如果这样做，请确保它仍然在午夜至凌晨 1 点之间执行，以保证隔夜收集仍然发生。\n\n\
  ## 存储库视图\n\n归根结底，Enterprise Manager 将其数据存储在一组表中。对这些基表的访问由一组存储库视图提供，这些视图已在《*Oracle\
  \ Enterprise Manager Cloud Control Extensibility Programmer's Reference*》的第 18 章中记录（可在\
  \ [`http://docs.oracle.com/cd/E24628_01/doc.121/e25161/views.htm#sthref1292`](http://docs.oracle.com/cd/E24628_01/doc.121/e25161/views.htm#sthref1292)\
  \ 在线获取）。请注意，此参考对应的是 `12.1.0.2` 版本的文档。如果您仍在使用 `12.1.0.1`，则需要查看等效文档的第 17 章。\n\n![image](img/sq.jpg)\
  \ 注意  您可能感兴趣的一些视图记录在可扩展性开发工具包（EDK）中，因此您可能还需要安装该工具包才能查看这些视图的文档。安装方法是：从控制台选择“设置”菜单，选择“可扩展性”![arrow](img/arrow.jpg)\
  \ “开发工具包”，然后按照那里的说明进行操作。\n\n显然，对于像 Enterprise Manager 这样庞大的产品，同样有大量的视图可供查看，因此这里并未记录全部。重要的是要知道如何查找关于它们的更多信息，而这些都在前面提到的章节中记录了。根据您的需求，您可能还想研究一下\
  \ BI Publisher 的使用，它是随 `EM12c` 提供的新报告功能，允许针对 EM 存储库创建高度格式化的自定义报告。（另外，EM 包含一个受限使用许可证，允许\
  \ BI Publisher 用于 EM 存储库。用于其他数据源则需要 BI Publisher 许可证。）\n\n![image](img/sq.jpg) 提示\
  \  我一直惊讶于了解这些视图的人如此之少，所以请花时间查阅 Oracle 文档并熟悉它们。特别要查看《*Oracle Enterprise Manager Cloud\
  \ Control Extensibility Programmer's Reference*》第 18 章末尾记录的示例用法。\n\n### 故障排除\n\n\
  还有一个您应该熟悉的实用程序，用于跨技术栈所有三层的故障排除。该工具是 `EMDIAG`。`EMDIAG` 是一组脚本和工具的集合，旨在帮助对 EM 的问题进行故障排除和诊断。每个\
  \ EM 层都有一个特定的工具包：`AGTVFY` 用于代理层，`OMSVFY` 用于 OMS 层，`REPVFY` 用于存储库层，每个工具包都通过查找已知问题特征来识别已知问题。Oracle\
  \ Support 提供了一个 `EMDIAG` 主索引说明（说明 `421053.1`），解释了如何下载、安装和使用每个工具包。请务必下载适用于 `EM12c`\
  \ 的正确版本。\n\n每个工具包都是一组命令，可用于显示有关相关层的设置、配置和使用的信息，或者转储对象。即使该层本身未运行（或确实已损坏），也可以使用它们。运行这些命令时，您可以像这样传入一个\
  \ 0 到 9 的级别参数：\n\n```\n$ ./agtvfy verify all -level 2 details\n```\n\n当命令接受级别作为参数时，您应该从最低值（0）开始，修复该命令报告的问题，然后在下一个最高级别再次运行它。0\
  \ 到 4 级报告功能问题，6 到 8 级报告报告问题，9 级用于内部诊断。您应仅在 Oracle Support 的指导下在 9 级运行报告。仅举一例，当（例如）运行\
  \ `REPVFY` 时，您可以预期在级别 2 和级别 9 之间看到以下类型的差异：\n\n![image](img/sq.jpg) 注意  这是一个特意配置得很糟糕的环境。希望您不会看到接近这种程度的问题！\n\
  \n```\n$ ./repvfy verify all -level 2 details\n\nPlease enter the SYSMAN password:\n\
  \n-- --------------------------------------------------------------------- --\n\
  -- REPVFY: 2013.0327     Repository: 12.1.0.2.0     04-Apr-2013 16:14:52 --\n\n\
  verifyAGENTS\n0001\\. 没有主机目标的代理：2\n1005\\. 存在时钟偏差问题的活动代理：1\n2001\\. 没有关联受管 ORACLE_HOME\
  \ 的受管代理：2\nverifyASLM\nverifyAVAILABILITY\nverifyBLACKOUTS\nverifyCAT\nverifyCORE\n\
