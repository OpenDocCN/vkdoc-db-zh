  ### 通过命令行管理 OMS


  让我们从讨论命令行管理 OMS *不再* 提供的功能开始本节，那就是 `OPMNCTL` 实用程序。虽然该实用程序仍然存在，但它已被 `EMCTL` 实用程序取代。所以让我们更详细地看看它。


  ## EMCTL 实用程序


  `EMCTL` 实用程序用于对 OMS 执行许多操作，类似于它用于代理的方式。话虽如此，有许多 `emctl` 命令在您从 OMS 主目录通过 `emctl`
  命令发出时，似乎是对存储库进行操作。这是因为许多存储库信息（凭据、连接性等）也存储在 OMS 中，以使其能够连接到存储库并完成工作，因此这些命令基本上是在两者之间进行同步。


  表 3-3 列出了一些从 OMS 主目录常用的 `emctl` 命令。


  表 3-3. OMS emctl 命令




  ## EMCTL 命令参考


  | 命令 | 描述 |

  | --- | --- |

  | `emctl abortresync repos (-full|-agentlist "agent names") -name "resync name"
  [-sysman_pwd "sysman password"]` | 中止当前正在运行的存储库重新同步操作。使用 `-full` 选项可停止完整的存储库重新同步。使用
  `-agentlist` 选项可停止对指定代理列表的重新同步。 |

  | `emctl config oms -change_repos_pwd [-change_in_db] [-old_pwd ] [-new_pwd ] [-use_sys_pwd
  [-sys_pwd ]]` | 更改存储库密码。 |

  | `emctl config oms -change_view_user_pwd [-sysman_pwd ] [-user_pwd] [-auto_generate]`
  | 更改 `MGMT_VIEW` 用户的密码。`-auto_generate` 可生成随机密码。 |

  | `emctl config oms -list_repos_details` | 显示 OMS 中的存储库详细信息。 |

  | `emctl config oms -store_repos_details (-repos_host -repos_port -repos_sid | -repos_conndesc
  ) -repos_user [-repos_pwd ] [-no_check_db]` | 在 OMS 中更改并存储存储库信息。 |

  | `emctl delete property [-sysman_pwd "sysman password"] -name` | 从 `emoms.properties`
  文件中删除给定属性名称对应的属性。 |

  | `emctl dump oms` | 转储所有节点管理器日志、管理服务器日志、托管服务器日志、sysman 日志和堆栈跟踪文件。 |

  | `emctl dump omsthread` | 转储导致 CPU 旋转（自旋）的线程。 |

  | `emctl exportconfig oms [-sysman_pwd ] [-dir ] [-keep_host]` | 从主管理服务导出配置。 |

  | `emctl get property [-sysman_pwd "sysman password"] -name` | 从 `emoms.properties`
  文件中获取给定属性名称对应的属性值。 |

  | `emctl importconfig oms -file` | 在备用管理服务上导入已导出的配置。 |

  | `emctl list oms` | 提供在该本地 Oracle 主目录中配置的 OMS 名称。 |

  | `emctl list properties [-sysman_pwd "sysman password"] [-module]` | 列出从 `emoms.properties`
  文件设置的所有属性。 |

  | `emctl resync repos -full -name "<resync name>"` | 从一个 OMS Oracle 主目录启动存储库重新同步。
  |

  | `emctl secure lock [-upload] [-console]` | 限制对管理服务的 HTTP 访问（即，仅允许 HTTP/S 访问）。
  |

  | `emctl secure oms [-sysman_pwd ] [-reg_pwd ] [-host ] [-slb_port ] [-slb_console_port
  ] [-reset] [-console] [-lock] [-lock_console] [-secure_port ] [-upload_http_port
  ] [-root_dc ] [-root_country] [-root_email ] [-root_state ] [-root_loc] [-root_org
  ] [-root_unit ] [-wallet -trust_certs_loc ] [-wallet_pwd ] [-key_strength ] [-cert_validity
  ] [-protocol ]` | 启用 OMS 以接受来自代理的上传请求和以 HTTP/S 模式的控制台请求。 |

  | `emctl secure setpwd [authpasswd] [newpasswd]` | 创建新的代理注册密码。 |

  | `emctl secure unlock [-upload] [-console]` | 允许对 OMS 进行非安全的 HTTP 访问。 |

  | `emctl set property [-sysman_pwd "sysman password"] -name -value[-module (default
  emoms)]` | 在 `emoms.properties` 文件中设置属性值。 |

  | `emctl start oms` | 按以下顺序启动 OMS：1\. 如果 OPMN 和 OHS 尚未启动，则启动它们。2\. 如果节点管理器未运行，则启动它。3\.
  如果在管理服务器上运行，则启动它（如果尚未启动）。4\. 通过节点管理器启动托管服务器。 |

  | `emctl status oms` | 提供 OMS 的状态。使用 `-details` 获取详细信息（包括安全状态和使用的协议）。 |

  | `emctl statusresync repos -name "resync name"` | 列出给定存储库重新同步操作的状态。 |

  | `emctl stop oms [-all] [-force]` | 按以下顺序停止 OMS：1\. 停止 OHS。2\. 停止 OPMN。3\. 停止托管服务器。使用
  `-all` 按以下顺序停止 OMS：1. 停止 OHS。2\. 停止 OPMN。3\. 停止托管服务器。4\. 如果管理服务器正在运行，则停止它。5\. 停止节点管理器。如果任一停止命令未能关闭相关进程，请使用
  `-force` 强制停止它们。 |


  ### OMS 目录结构


