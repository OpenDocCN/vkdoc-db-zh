  此屏幕包含了定义整合项目所需的全部信息。首先要决定的是将要进行的整合类型。两个选项是 `Physical to Oracle Virtual Machine (P2V)`
  和 `Physical to Physical (P2P)`。接下来，我们必须选择哪些服务器将参与整合。当添加整合目标时，首先必须添加源服务器。如果需要，我们还可以选择添加现有的虚拟服务器作为目标。添加源目标或
  OVM 目标后，您将看到许多特定于该源或目标服务器的估算（参见 图 5-32）。


  ![9781430249382_Fig05-32.jpg](img/9781430249382_Fig05-32.jpg)


  图 5-32. 为整合添加的源服务器


  > **注意**  指定服务器 I/O 容量是 Oracle 提供的估算值。如果您点击 `Specify Server I/O Capacity` 按钮，将弹出一个对话框，使您能够指定乘数因子或绝对值来更新所有选定服务器的容量。


  ![9781430249382_unFig05-02.jpg](img/9781430249382_unFig05-02.jpg)


  ### 数据收集


  为了让 Consolidation Planner 对节省或资源做出正确估算，它将基于收集的数据量。在 `Create Consolidation Project`
  屏幕的 `Data Collection` 部分，管理员可以指定应用于估算整合的最小和最大天数。与 Enterprise Manager 中的许多其他任务一样，数据收集由一个将被创建的作业处理。作为数据收集的一部分，可以指定是立即开始数据收集还是稍后开始。


  ### 预配置方案


  创建整合项目的最后一步是指定项目是否应使用任何预配置的方案。默认情况下，未选择任何方案。但是，可以从三个选项中选择一个预配置的方案；这些方案使用 CPU、内存和磁盘存储的指标来分析整合项目。图
  5-33 提供了这些方案的详细分解。


  ![9781430249382_Fig05-33.jpg](img/9781430249382_Fig05-33.jpg)


  图 5-33. 预配置方案


  ## 提交与查看项目


  选择预配置方案后，即可提交并创建项目。如果项目创建成功，Consolidation Planner 页面将反映项目已创建以及项目当前的状态。在屏幕底部，您还会注意到三个选项卡，提供有关项目的具体信息。这些选项卡是
  `General`、`Source Servers` 和 `Source Workload`。




  “常规”选项卡提供与项目相关的所有具体信息，包括项目名称、识别编号、整合类型以及数据收集的当前状态。“源服务器”选项卡提供的信息类似于将源目标添加到项目时所呈现的内容。这里会显示诸如
  CPU 利用率、内存利用率和磁盘存储等项目。该选项卡的有趣之处在于，它通过告知您数据收集的开始和结束日期来提供相关信息。“源工作负载”选项卡以表格形式提供一个
  24 小时的视图，展示为整合而衡量的资源（参见图 5-34）。可以通过“资源类型”下拉菜单查看这些资源。


  ![9781430249382_Fig05-34.jpg](img/9781430249382_Fig05-34.jpg)


  图 5-34. 包含项目信息的整合规划器


  项目完成收集整合工作所需的信息后，可以通过点击整合规划器屏幕上的“报告”菜单项来生成报告。与成本分摊报告类似，整合项目报告将在浏览器中显示。如果企业管理器中安装了
  Oracle BI Publisher，将提供发布报告的选项，允许管理员将整合报告发布给最终用户。图 5-35 展示了一个从整合规划器中的报告表发布的示例报告。


  ![9781430249382_Fig05-35.jpg](img/9781430249382_Fig05-35.jpg)


  图 5-35. 整合项目的 BI Publisher 报告


  整合规划器是一个可用于帮助考虑迁移到云端或新物理硬件（例如 Exadata）的组织识别并缩减其基础设施足迹的工具。


  ## 总结


  在本章中，您回顾了云计算、其关键特性以及交付和部署模型。您还了解到，为了充分利用云基础设施，高效管理云生命周期的所有阶段至关重要。对于高效的云管理而言，仅有用于配置或监控的非常好的解决方案是不够的。EM12c
  让您能够完全掌控云生命周期的所有阶段，从而使您在企业私有云上的投资获得最高回报。


