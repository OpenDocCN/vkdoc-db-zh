  *   *业务服务管理* 帮助监控、诊断和管理你的交易正在执行的跨服务生命周期。这些服务可能开发于许多技术组件之上，而 `Oracle Enterprise Manager`
  支持所有这些组件。`EM12c` 引入了创建复合应用程序（如图 5-15 所示）的能力，它代表了你的应用程序环境的所有系统组件。这增强了端到端业务服务管理的能力。


