  ### 使用 EM 代理浏览器


  EM 代理浏览器是另一个图形用户界面（GUI），在几个版本前开发，用于在构建 OMS 时访问代理。它在 10g 和 11g 版本中默认禁用，但在 12c 中似乎又恢复可用。未来是否保持如此尚不可知。然而，如果您的代理卡在“挂起”状态（尽管也可以通过控制台清除），或者某些指标未被收集，它可能对您非常有用。


  要访问代理浏览器，您需要使用类似 `https://<agent_host_name>:<agent_port_number>/emd/browser/main`
  的 URL（例如，`https://em12c.acme.com:3872/emd/browser`）。然后，系统会提示您输入用户 ID 和密码，可以是代理所有者的，也可以是
  root 用户的（在 Unix 环境中）。这将打开一个类似图 3-9 所示的屏幕。


  ![9781430249382_Fig03-09.jpg](img/9781430249382_Fig03-09.jpg)


  图 3-9。代理浏览器


  即将介绍的“EMCTL 实用程序”一节中描述的许多 `emctl` 命令也可通过此浏览器界面获得。其中更有趣的一个是获取代理系统状态转储的命令，这对于调试问题代理的状态特别有用。要执行系统状态转储，只需单击链接“System
  State Dumps”（如图 3-9 所示），然后在打开的窗口中单击“Perform System Dump”。请注意，生成此文件可能需要一些时间，并且会生成一个相当大的
  XML 文件，由于篇幅原因，此处不作展示。


  ## 使用命令行进行代理管理


  当然，您刚才看到的所有区域也可以从命令行访问。Enterprise Manager 有两个命令行界面：EMCTL 和 EMCLI。让我们依次看看。


  ### EMCTL 实用程序


  Enterprise Manager Control 实用程序（EMCTL）主要用于——不出所料！——控制 EM 基础架构的不同部分。由于本节是关于管理代理的，因此这里仅讨论与代理一起使用的函数。您需要确保使用的是代理主页中的
  `emctl` 来执行这些命令。可以使用 `emctl getemhome` 来验证这一点，因为很容易混淆正在使用的是哪个 `emctl`！


  许多 `emctl` 命令与之前的版本相比没有变化。为了完整起见，表 3-1 列出了管理代理中更常用的 `emctl` 命令。


  表 3-1。emctl 命令


  | 命令 | 描述 |

  | --- | --- |

  | `emctl clearstate` | 清除状态目录内容。位于 `$ORACLE_HOME/sysman/emd/state` 下的文件将被此命令删除。
  |

  | `emctl clearsudoprops` | 清除代理的 sudo 属性。 |

  | `emctl config [agent] listtargets [<EM loc>]` | 列出 `targets.xml` 中存在的所有目标。 |

  | `emctl config agent getSupportedTZ` | 显示基于环境设置的受支持时区。 |

  | `emctl config agent getTZ` | 显示环境中设置的当前时区。 |

  | `emctl control agent runCollection <target_name>:<target_type> <metric_name>`
  | 手动运行特定目标的特定指标的收集。 |

  | `emctl deploy agent [-s <install-password>] [-o <omshostname:consoleSrvPort>]
  [-S] <deploy-dir> <deploy-hostname>:<port> <source-hostname>` | 仅创建并部署代理。 |

  | `emctl dumpstate agent <component> . . .` | 为代理生成转储，允许您分析代理的 CPU 或内存问题。 |

  | `emctl gensudoprops` | 生成代理的 sudo 属性。 |

  | `emctl getemhome` | 打印代理主目录。 |

  | `emctl getversion agent` | 打印代理的版本。 |

  | `emctl listplugins agent` | 列出在代理上部署的插件、它们的版本和安装目录。 |

  | `emctl pingOMS [agent]` | 向 OMS 发送 ping 以检查代理是否能够到达 OMS，并等待 OMS 的反向 ping，以便代理声明
  `pingOMS` 成功。 |

  | `emctl reload agent dynamicproperties [<Target_name>:<Target_Type>]...` | 为指定目标重新计算和生成动态属性。
  |

  | `emctl resetTZ agent` | 重置代理的时区。您需要执行以下步骤：<br>1. 首先停止代理。<br>2. 运行此命令将当前时区更改为不同的时区。<br>3.
  重启代理。 |

  | `emctl secure agent [registration password]` | 使代理对 OMS 安全。这将提示输入注册密码。 |

  | `emctl start agent` | 启动管理代理。 |

  | `emctl start blackout <Blackoutname> [-nodeLevel] [<Target_name>[:<Target_Type>]]....
  [-d <Duration>]` | 在目标上启动中断。 |

  | `emctl status agent` | 显示代理的状态。 |

  | `emctl status agent cpu [-depth n &#124; -full_cpu_report]` | 提供 CPU 统计信息（使用 `depth`
  的 top-n 列表或完整详细信息）。需要在 `emd.properties` 中设置 `topMetricReporter=true`。 |

  | `emctl status agent dbconnections` | 显示 DBConnection Cache 的内容。 |

  | `emctl status agent jobs` | 显示当前正在运行的作业的状态。 |

  | `emctl status agent mcache <target name>,<target type>,<metric>` | 显示在指标缓存中具有值的指标名称。
  |

  | `emctl status agent scheduler` | 显示所有已调度、准备就绪或正在运行的收集线程。 |

  | `emctl status agent -secure` | 显示代理是否在安全模式下运行，以及它所报告的 OMS 的安全性。 |

  | `emctl status agent target <target name>,<target type>,<metric>` | 按目标名称、目标类型的顺序显示特定目标的详细状态。
  |

  | `emctl status blackout [<Target_name>[:<Target_Type>]]....` | 提供目标中断的状态。 |

  | `emctl stop agent` | 停止管理代理。 |

  | `emctl stop blackout <Blackoutname>` | 停止在特定目标上启动的中断。只有通过 EMCTL 工具启动的中断才能使用 EMCTL
  停止。 |

  | `emctl unsecure agent` | 取消代理的安全状态。通常，这不是推荐做法。 |

  | `emctl verifykey` | 通过发送 `pingOMS` 来验证 OMS 和代理之间的通信。 |



  当你运行一个 `emctl` 命令时，该命令的输出会被记录到 `emctl.log` 文件中，该文件位于 `$AGENT_HOME/agent_inst/sysman/log`
  目录下。（有些命令也会将其输出显示到 `stdout`。）关于代理日志和跟踪文件的更多细节将在后续一个巧妙命名为“代理日志和跟踪文件”的章节中给出。


  ## EMCLI 实用程序


  不过，在更详细地查看代理日志和跟踪文件之前，让我们先审视一下另一个用于管理代理的命令行实用程序——企业管理器命令行界面实用程序 (`EMCLI`)。`EMCLI`
  实用程序主要用于自动化需要针对大量目标执行的命令，因为通过脚本实现这一点通常比通过 EM 控制台逐个选择目标来处理操作要快得多。


  举个例子，假设你有一个名为 `ProdDB` 的生产数据库组，该组由即将离职的管理员管理。如果该组中有 500 个数据库，你肯定不希望逐个更新 `联系人` 生命周期属性。相反，你可以执行以下操作：


  ```

  emcli set_target_property_value -property_records="ProdDB:composite:Contact:psharman"
  -propagate_to_members

  ```


  这会将联系人详细信息一次性更改为 `psharman` 用户 ID，适用于全部 500 个数据库。


  然而，使用 `EMCLI` 相对于 `EMCTL` 的一个主要优势在于，`EMCLI` 拥有一个客户端，可以安装在任何能够访问 `OMS` 的系统上。这意味着它可以在你的管理环境中的任何地方执行。例如，许多
  Cloud Control 管理员会在他们的本地机器上安装 `EMCLI`。`EMCLI` 还允许你调用自定义脚本，如 TCL、Perl、SQL 或操作系统脚本。


  从架构角度来看，`EMCLI` 由两部分组成。一部分是 `EMCLI` 客户端（即你安装在所需位置的部分），另一部分是 `OMS` 扩展，它会自动安装在 `OMS`
  中。基于 Java 的客户端使用 `emcli` 动词向 `OMS` 扩展发送命令请求，`OMS` 扩展再将这些请求传递给 `OMS` 以执行。这些动词是插件扩展，包含了相关的命令和选项。


  安装 `EM CLI` 客户端首先需要将 `EMCLI` 套件下载到你想要安装的位置。你可以通过从 EM 控制台的 `Setup`（设置）菜单中选择 `Command
  Line Interface`（命令行界面）来下载该套件，如图 3-10 所示。


  ![9781430249382_Fig03-10.jpg](img/9781430249382_Fig03-10.jpg)


  图 3-10. 访问 EM CLI 套件


  一旦你下载并安装了 `EM CLI` 套件，你只能访问少数几个基本动词，例如 `help`、`login`、`logout` 和 `setup`。要完全设置客户端，你需要执行命令
  `emcli setup`。至少，你需要传递 EM 控制台的 URL 以及你想要用于 `emcli` 登录的用户名（这个用户名通常是你登录控制台使用的用户名），但我发现有时包含
  `-autologin` 参数很有用。此参数可确保在你的会话超时后自动重新登录。


  `注意` 仅在你安装客户端的工作站是安全的情况下才使用 `-autologin` 参数，特别是如果你同时传递的用户名具有超级管理员级别的访问权限。


  例如，以下是在本地工作站上执行以完成设置的命令：


  ```

  $ ./emcli setup -url=https://em12.acme.com/em -username=psharman -autologin

  ```


  命令完成后，你将可以访问 `EMCLI` 能识别的所有动词。动词数量太多，无法在此一一描述，但执行命令 `emcli help` 会为你列出它们。它提供的列表相当长，因此你可能需要将输出重定向到文件以便查阅。你可以通过将特定动词作为参数传递给
  `help` 命令来获取关于该动词的详细帮助。例如，`emcli help setup` 会为你提供关于 `setup` 动词的更详细帮助。在 `EM12c`
  文档集中也提供了关于 `EMCLI` 实用程序的完整手册（[`docs.oracle.com/cd/E24628_01/em.121/e17786/toc.htm`](http://docs.oracle.com/cd/E24628_01/em.121/e17786/toc.htm)）。


  ### 代理日志和跟踪文件


  当你安装管理代理时，系统会提示你指定一个 `AGENT_BASE` 目录。该目录类似于数据库安装中使用的 `ORACLE_BASE` 目录。在其下方，你会找到代理实例目录（`agent_inst`，包含所有与代理相关的配置文件）以及管理代理主目录。管理代理主目录将是
  `<AGENT_BASE>/core/12.1.0.2.0`。显然，目录名中的版本号反映了代理的版本号，因此根据你的安装情况，此数字可能与示例有所不同。你将需要的大多数代理日志和跟踪文件都位于此管理代理主目录下的某个地方。你可能需要查看以查找信息的一些目录如表
  3-2 所示。在此表中，`<AGENT_HOME>` 指的是管理代理主目录（例如，`<AGENT_BASE>/core/12.1.0.2.0`），而 `<AGENT_INST>`
  指的是代理实例目录（例如，`<AGENT_BASE>/agent_inst`）。


  表 3-2. 代理日志和跟踪文件的位置


  | 信息类型 | 位置 |

  | --- | --- |

  | 代理心跳历史 | `<AGENT_INST>/sysman/log/gcagent.log` |

  | 代理和看门狗的启动信息 | `<AGENT_INST>/sysman/log/emagent.nohup` |

  | 代理跟踪文件 | `<AGENT_INST>/sysman/log/*.trc` |

  | 配置助手错误 | `<AGENT_HOME>/cfgtoollogs/cfgfw/CfmLogger_<timestamp>.log` |

  | `emctl` 命令输出 | `<AGENT_INST>/sysman/log/emctl.log` |

  | 代理安全设置错误 | `<AGENT_INST>/sysman/log/secure.log` |

  | 系统状态转储 | `<AGENT_INST>/sysman/emd/dumps/SystemDump_<number>.xml` |


  `注意` 表 3-2 中提到的看门狗是代理看门狗。启动代理时，它也会启动一个代理看门狗进程，其作用是监控代理并在代理失败时尝试重启它。


  你可以使用 `emctl` 命令来控制这些文件的数量和大小。默认情况下，代理只将信息、警告和关键消息写入跟踪文件，但你可以使用以下命令更改写入的信息级别：


  ```

  $ emctl set property agent -name "Logger.log.level" -value "<LEVEL>"

  ```


  其中 `<LEVEL>` 是以下值之一——`DEBUG`、`INFO`、`WARN`、`ERROR` 或 `FATAL`。由于这可能产生大量信息，你可以通过为
  `-name` 设置不同的值来限制。但是，最好仅在 Oracle 支持人员的指导下进行此操作，因此如果需要，请联系他们。


  ## Oracle 管理服务


  现在让我们继续讨论 Oracle 管理服务 (`OMS`)。如第 1 章所述，`OMS` 是一个基于 Web 的应用程序，它与代理和 Oracle 管理资料库通信，以收集和存储有关各个代理上所有目标的信息。`OMS`
  还负责呈现控制台的用户界面。与代理一样，`OMS` 可以通过 `EM12c` 控制台和命令行实用程序进行控制。让我们首先更详细地了解控制台。


  ### 使用控制台管理 OMS




  要通过控制台管理 OMS，您可以选择 `设置 > 管理云控制 > 管理服务`，如图 3-11 所示。


