  ![9781430249382_Fig04-51.jpg](img/9781430249382_Fig04-51.jpg)


  图 4-51. 数据库目标的可用指标


  ![image](img/sq.jpg) `注意` 我们还会立即获取前五个告警指标的趋势以及任何未解决的指标事件。这是对以往呈现相同信息方式的一项巧妙改进。


  如果您展开“容量”类别并点击一个表空间使用率指标，您将看到通用的指标配置页面，如图 4-52 所示，允许您设置收集频率和上传间隔。此功能对所有受管目标的所有指标都是通用的。在此上下文中，管理指标只是一个感兴趣的数据点——例如，Oracle
  表空间中的空闲空间量。指标由代理按配置的频率收集，并每隔若干次收集上传一次（在此情况下是每次都上传）。


  ![9781430249382_Fig04-52.jpg](img/9781430249382_Fig04-52.jpg)


  图 4-52. “表空间已满”指标详情


  可用的指标因目标类型而异，但收集和上传的配置在整个产品中是通用的。当然，收集指标的主要目的是为了进行分析和告警。在 Enterprise Manager 中，由于历史原因，`告警`具有特定的技术含义，这与常见的英语用法不同。具体来说，当指标超过管理员设定的阈值时就会发生告警（为避免误报，这可能需要连续发生多次收集）。告警的发生与管理员收到通知之间没有关联。


  “指标与收集设置”菜单提供了指标收集配置的不同视图，按类型对指标进行分组，并允许您更改收集指标值的计划，以及为该指标定义阈值，以表示收集指标的警告或严重状态。图
  4-53 展示了数据库目标的此界面。


  ![9781430249382_Fig04-53.jpg](img/9781430249382_Fig04-53.jpg)


  图 4-53. 指标与收集设置


  通知是使用前面描述的“云控制”菜单栏上的“设置”菜单，按管理员逐个进行配置的。可以在此处以目标为单位配置告警阈值。


  ![image](img/sq.jpg) `注意` 如第 7 章所述，您将主要使用监控模板来设置告警阈值。“监控”菜单提供了一种在必要时覆盖这些设置的方法。设置好指标和告警后，请务必使用`指标收集错误`菜单项定期检查目标是否存在任何指标收集错误。


  ### 诊断


  部分（但非全部）目标类型使用“诊断”子菜单来提供对 Oracle 支持工作台和健康状况检查监视器的访问。我预计提供此子菜单的目标范围会随时间扩大。这为打包您的支持事件并将其上传给支持团队提供了一种便捷方式，以及将您基础设施的现有状态与已发布的
  Oracle 实践进行比较。


  对于数据库目标，此子菜单允许访问支持工作台，使您可以打包由高级诊断存储库检测到的事件并将其上传给支持团队。图 4-54 显示了一个 EM 存储库数据库目标出现`ORA-0600`错误的情况。


  ![9781430249382_Fig04-54.jpg](img/9781430249382_Fig04-54.jpg)


  图 4-54. 支持工作台


  此界面允许您与支持团队一起管理事件，并将该事件的进度与受管目标集成。全屏视图提供了事件时间线的图形化展示，以及`ADR`将事件与问题记录关联的方式（参见图 4-55）。


  ![9781430249382_Fig04-55.jpg](img/9781430249382_Fig04-55.jpg)


  图 4-55. 事件发生情况


  ### 目标状态与通知控制


  “控制”子菜单为您提供两项基本功能，应适用于所有目标类型（参见图 4-56）。第一项是能够简单地使用目标特定的适当程序来启动或停止受管目标。然而，紧接其下的是设置或管理“维护窗口期”的功能。`维护窗口期`是一个预定义的时段，在此期间正常的监控和告警将被暂停，并且可选择在此期间不运行管理任务。维护窗口期功能允许您考虑计划内的停机时间（例如，为每月操作系统安全补丁应用），避免在托管主机关闭和重启时收到大量目标状态变更告警通知。


  ![9781430249382_Fig04-56.jpg](img/9781430249382_Fig04-56.jpg)


  图 4-56. “控制”子菜单


  点击`创建维护窗口期`将打开“创建维护窗口期”向导，如图 4-57 所示。如您所见，维护窗口期功能相当广泛，可应用于复合目标（最常见的是一个主机及其上运行的所有目标）。


  ![9781430249382_Fig04-57.jpg](img/9781430249382_Fig04-57.jpg)


  图 4-57. “创建维护窗口期”欢迎屏幕


  ![image](img/sq.jpg) `提示` 不要使用维护窗口期来隐藏您不想或不知道如何调查的告警。这`总是`会导致您错过本应处理的重要告警。请仅将维护窗口期用于计划内的维护。


  ### 日志审查




  目标类型菜单还提供了一个便捷的 `日志` 子菜单，用于查看与各种目标相关的系统日志（参见 图 4-58）。该菜单本身对所有目标都是通用的，但可用的详细程度取决于目标的性质和插件设计者。例如，对于数据库，`日志`
  子菜单允许您访问并查看 `alert.log` 文件，审阅所有记录的错误，并管理跟踪文件。


  ![9781430249382_Fig04-58.jpg](img/9781430249382_Fig04-58.jpg)


  图 4-58. 数据库诊断日志访问


  相比之下，Web 服务器目标仅提供一个单一的 `日志` 选项，允许您根据条件搜索和查看日志消息（参见 图 4-59）。


  ![9781430249382_Fig04-59.jpg](img/9781430249382_Fig04-59.jpg)


  图 4-59. 搜索应用服务器日志


  ### 目标设置


  您肯定会花费一些时间的地方是 `目标设置` 子菜单，如 图 4-60 所示。在这里，您将配置监控凭据和有关目标的元数据，这些数据可用于分组和访问控制。


  ![9781430249382_Fig04-60.jpg](img/9781430249382_Fig04-60.jpg)


  图 4-60. 目标设置子菜单


  要配置用于监控目标的帐户，请选择 `监控配置`。实际提供的详细信息因目标类型而异。图 4-61 显示了数据库目标的配置屏幕。如您所见，您需要输入监控帐户详细信息（对于数据库，包括
  `用户名`、`密码`、`端口`、`角色` 和 `SID/服务名称`）。


  ![9781430249382_Fig04-61.jpg](img/9781430249382_Fig04-61.jpg)


  图 4-61. 必需的数据库监控详细信息


  类似地，对于其他目标，您很可能需要各个目标监控基础架构的名称、密码和端口。


  ### 自定义


  Cloud Control 设计为可根据单个管理员的需求进行定制，您首次登录时就会感受到这一点。登录后，您将看到一个页面，该页面为您提供机会，根据多个预定义的工作角色之一来选择主页。本书的大多数读者可能希望从两个选项中选择一个。如果您主要担任数据库管理员或开发人员，您可能会选择
  `数据库` 页面。如果您从事运维或支持工作，您可能希望从 `事件` 页面开始，该页面专注于为企业中管理运维事件的员工设计。


  ![image](img/sq.jpg) **注意** 您在此阶段不必选择任何主页，我们建议您不要选择。相反，请审阅所有可用页面，以找到适合您角色的起点。然后，您可以在稍后更具体地定制您的主页。


  由于本书的主要读者是数据库专业人员，除非另有说明，我们将以数据库特定页面为例重点介绍本节内容。但是，此处所述的内容适用于整个产品。图 4-62 展示了数据库目标的主页。


  ![9781430249382_Fig04-62.jpg](img/9781430249382_Fig04-62.jpg)


  图 4-62. 数据库主页


  Enterprise Manager 中的每个页面都划分为多个区域。每个区域都可以由最终用户进一步定制。作为一个例子，我们将以 `数据库摘要` 区域为例，并删除不是很有帮助的合规性摘要。


  要开始自定义，请点击位于页面右上角、上次刷新时间旁边的 `个性化此页面` 图标（参见 图 4-63）。这将向页面添加菜单，允许您自定义页面和每个区域。在这种情况下，点击
  `摘要` 区域右上角的扳手图标。


  ![9781430249382_Fig04-63.jpg](img/9781430249382_Fig04-63.jpg)


  图 4-63. 处于编辑模式的主页


  然后，您将看到一个类似于 图 4-64 的自定义对话框。我们只是从视图中删除了 `合规性摘要` 部分，但您可以尝试使用各种可用的样式和显示选项，以根据公司标准或个人喜好显著地个性化该页面。


  ![9781430249382_Fig04-64.jpg](img/9781430249382_Fig04-64.jpg)


  图 4-64. 自定义摘要组件


  您应该意识到，自定义页面的选项取决于提供该页面的插件。因此，对于表面上类似的区域，确切的定制选项可能会有所不同。


  ## 小结


  本章向您介绍了新界面以及为了获取 Enterprise Manager 产品的可管理性优势而需要掌握的一些基本任务。您了解了 `云控制`、`导航` 和 `目标管理`
  菜单的作用。在此过程中，您学习了如何设置 Enterprise Manager 安全性、设置与 My Oracle Support 的强大集成以及配置通知。您简要浏览了导航功能。最后，您了解了目标设置功能，并学习了如何配置监控和查看诊断日志。


