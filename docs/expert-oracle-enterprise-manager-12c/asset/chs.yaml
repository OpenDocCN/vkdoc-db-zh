  Oracle 管理代理、管理服务实例基目录、Java 开发工具包 (JDK) 和其他配置文件。根据您在安装时的决定，其中一些目录可能位于中间件主目录之外。您需要熟悉重要的目录，以便配置、维护和故障排除
  OMS。可能以图表方式查看最为容易，因此请从查看 图 3-17 开始，它展示了示例环境中的默认中间件主目录结构。


