  \nverifyUSERS\n6001\\. 非标准的 EM 系统管理员账户：2\n8001\\. 已被阻止的 EM 管理员账户：5\n\n## 本章小结\n\n\
  本章带您了解了 EM12c 基础架构的一些主要维护和保养领域，既涉及控制台，也涉及命令行实用程序。既然您对管理 EM 基础架构已感到更加得心应手，那么接下来您已准备好进一步熟悉控制台本身。这正是我们下一章的主题。\n\
  \n## 第四章 与 EM12c 控制台交互\n\n作者：Niall Litchfield\n\nOracle Enterprise Manager 是一款功能丰富的产品，但本书专注于技术管理与运维。为此，Enterprise\
  \ Manager 必须使管理和运维任务比仅利用底层技术的原始功能时更简单、更一致、更快速。本章将通过向您介绍 Enterprise Manager 的主要用户界面——Web\
  \ 控制台，帮助您实现这一目标。\n\n因此，本章包含以下部分：\n\n*   对先前版本局限性的简要历史回顾\n*   EM12c 如何解决这些局限性的概述\n\
  *   您将用于导航控制台的菜单结构回顾\n*   对产品附带的定制功能的简要讨论\n\n在此过程中，您将学习如何配置 Enterprise Manager 以与\
  \ Oracle 的支持门户 My Oracle Support 进行有效交互。您还将学习如何配置通知、控制额外付费管理包的使用，并熟悉控制台作为您的管理主阵地。\n\
  \n## EM 简史\n\nOracle Enterprise Manager 于 2002 年 7 月首次亮相，是一款用于管理 Oracle Database\
  \ 9.2 的基于 Java 的客户端应用程序。随着 Oracle Database 10g 的发布，该应用程序被重新构想为一个基于 Web 的管理界面，主要聚焦于数据库，但具备管理跨多个物理主机的\
  \ Oracle 数据库的能力——10g 中的 g 代表 *网格*，而这个以数据库为中心的管理产品后来被称为 Enterprise Manager Grid Control。Grid\
  \ Control 为数据库管理人员提供了三个关键特性，这些特性在管理集群环境和企业内各种数据库方面具有显著优势。它们如下：\n\n*   管理员可以将分布式环境作为一个整体进行管理，而非管理一系列独立目标。\n\
  *   可以在单一屏幕上查看整个 Oracle 数据库资产的状态。\n*   它引入了管理除 Oracle 数据库之外的其他目标类型的能力，特别是针对日益增长的\
  \ Oracle 应用服务器市场。\n\n与当时主导数据库领域的、碎片化且基于主机的先前管理方式相比，这些优势显著改善了管理员的工作生活。当然，还有另一个优势使得\
  \ Enterprise Manager Grid Control 对运行 Oracle 的组织极具吸引力：它的实现不需要（并且至今仍然不需要）额外的许可成本。\n\
  \n![image](img/sq.jpg) **提示**  Enterprise Manager 确实使得一些额外付费功能易于获取，这些功能要么内嵌在基础产品中，要么单独销售。我们将在本章后面探讨如何控制对此类管理功能的访问。需要明确的是，当使用例如在第\
  \ 9 章中讨论的“性能”页面时，您使用的是一个需要单独许可的功能，而非免费的基础产品。正如我们讨论管理包访问时将看到的，您可以使用“此页面的管理包”链接来确定当前活动页面所需的许可。\n\
  \n随着 Oracle 在 2000 年代将其产品扩展到中间件、应用程序及其他领域，一个企业级的管理工具将带来巨大优势，并成为 Oracle 的额外收入来源，这一点变得显而易见。然而，Oracle\
  \ 销售的每个产品往往都内置了管理功能，并且内部拥有精通其特定技术栈管理的团队。Oracle 通过确保现有团队在 Enterprise Manager 产品栈内为其产品开发管理功能，确定了解决方案。\n\
  \n到了该十年末期，Oracle 原先的数据库管理产品已发展成为一个成熟的企业技术管理产品，允许通过一个集中管理控制台管理所有 Oracle 产品及部分第三方产品。然而，随着产品的成熟，至少存在两个结构性问题：\n\
  \n*   技术栈\n*   界面\n\n## 技术栈\n\n用于 10.x 系列 Enterprise Manager 的技术栈是 Oracle 旧的 J2EE\
  \ 应用服务器平台——Oracle Internet Application Server。Oracle 在收购 BEA WebLogic 产品线后，实际上已放弃了这个平台。Grid\
  \ Control 的 11.x 版本将现有的 Grid Control 产品迁移到了较新的 WebLogic 技术栈，并将源自数据库的 Grid Control\
  \ 界面与使用 Oracle 自身应用开发框架（ADF）开发的新 Fusion Middleware Control 相集成。因此，自 11g 起，Enterprise\
  \ Manager 使用了如图 4-1 所示的软件栈。该架构在未来至少五年内很可能仍将是当前状态。\n\n![9781430249382_Fig04-01.jpg](img/9781430249382_Fig04-01.jpg)\n\
  \n图 4-1. Oracle Enterprise Manager 技术栈\n\n\n\n然而，`Grid Control` 能够管理的所有技术都在进步，而且进步速度各不相同，在某些情况下，其发展速度和方向甚至超出了`Oracle\
  \ 公司`的控制范围。以往`Enterprise Manager`版本的整体式设计意味着，该产品几乎从设计上就注定要永久落后于被监控产品的发布周期。这种情况意味着，客户可能会对监控目标进行修补以解决生产问题，然后却发现他们无法获得监控问题的支持，因为修补后的版本并未获得企业管理产品的认证。`Oracle`\
  \ 已通过 `EM12c` 的插件架构解决了此问题以及其他问题。\n\n![image](img/sq.jpg) 注意：我们熟悉一个项目，该项目为一家英国企业实施\
  \ `Oracle Enterprise Manager 11g`，该企业部署了 `RAC`、`WebLogic`、`SOA` 和 `E-Business Suite`。当时特别选择\
  \ `EM 11g` 是因为它支持 `SOA`，而 `SOA` 是客户的关键技术。然而，`EM` 的认证永久性地滞后于 `SOA` 的版本发布，这导致当 `Oracle\
  \ Support` 因为 `WebLogic` 服务器的四位数版本号比认证版本领先一个补丁集而拒绝接收服务请求时，客户面临重大的支持问题。我们期望通过插件化的方式支持受管目标，能够解决此问题。\n\
  \n## 界面\n\n`Grid Control` 的可视化界面一直掌握在提供底层管理功能的开发团队手中。这带来了两个重大后果。首先，界面设计——客气地说——已经过时。原始产品于\
  \ 2004 年初发布，这几乎可以肯定它的开发生命始于 2001 年至 2003 年之间的某个时候。值得回忆一下本世纪初的网页界面是什么样子；`Grid Control`\
  \ 产品存在可用性问题，但它绝非个例。图 4-2 展示了旧式界面，本质上是一个充满链接的白色页面，大致按功能区域排列。\n\n![9781430249382_Fig04-02.jpg](img/9781430249382_Fig04-02.jpg)\n\
  图 4-2. 旧式界面\n\n一个好的 `GUI`，除了其他方面，还应具备以下特征：\n\n*   *清晰性*：易于找到所需内容。\n*   *一致性*：类似任务以类似方式完成。\n\
  *   *效率*：任务能够快速轻松地达成。\n\n`Grid Control` 在所有这些方面都令人失望，这主要是由于其界面设计和产品中糟糕的导航。数据库页面的主要范式是分类链接列表。这导致页面文本密集，链接有时出现在意想不到的地方——例如，您可能期望在`性能`选项卡上找到的\
  \ `AWR` 界面，实际上却位于主数据库管理屏幕的`服务器`选项卡上。总体而言，链接的选择和布局更让人联想到像 `Craigslist` 这样的小型社区广告网站，而不是一个面向任务的管理应用程序。\n\
  \n这个决定很重要，可能比设计者想象的更重要，因为一个好的 `UI` 应该清晰明了的原则。旧的 `Grid Control` 界面有时甚至让经验丰富的操作人员也不得不在选项卡和链接之间点击，试图找到他们知道列在某个地方的页面。该产品还充斥着从未真正解决的奇怪问题；例如，数据库的服务器管理屏幕有两个不同的标记为`作业`的链接，它们会将用户带到不同的页面，一个用于数据库调度程序，另一个用于`Enterprise\
  \ Manager`调度程序。却没有指向当时大多数 `DBA` 熟悉的作业调度程序 `DBMS_JOB` 的链接。\n\n![image](img/sq.jpg)\
  \ 注意：`Grid Control` 界面一个特别烦人的方面是每个页面底部的列排列不一致。这些列或多或少是相同的，但在每个选项卡上的排列顺序不同。因此，监控配置链接的位置取决于当时激活的是哪个选项卡。\n\
  \n其次，不同产品之间的界面设计不一致。从数据库管理切换到应用服务器管理会带来全新的界面范式。例如，上下文菜单出现在产品的某些部分而非其他部分，并且用于提供图形显示的插件也不同。这种外观和风格上的不一致，积极地阻碍了熟悉产品某一部分的用户在需要用产品管理不同技术时找到相应的功能。\n\
  \n下图很好地说明了这些问题。两张图都是性能管理页面，一张用于数据库，另一张用于 `J2EE` 应用服务器，但它们简直像是来自不同的产品。图 4-3 展示了数据库实例的当前性能。该页面广泛使用面积图来表示实例上的\
  \ `CPU` 和 `I/O` 负载，并对当前活动进行分类。相比之下，图 4-4 是最接近的 `WebLogic` 等效页面，主要使用折线图表示当前活动，允许对显示的信息进行广泛定制，并且具有完全不同的外观和感觉。对于负责多个领域的管理员来说，这种界面的不断变化直接干扰了他们的操作效率。\n\
  \n![9781430249382_Fig04-03.jpg](img/9781430249382_Fig04-03.jpg)\n图 4-3. 数据库性能主页\n\
  \n![9781430249382_Fig04-04.jpg](img/9781430249382_Fig04-04.jpg)\n图 4-4. WebLogic\
  \ 服务器性能主页\n\n与当时许多其他网页开发人员一样，负责 `Grid Control` 的人员不得不应对各种功能各异的浏览器。然而，正如您所看到的，`Oracle`\
  \ 的产品在一致性和效率——优秀 `GUI` 的核心特性——方面存在显著缺陷。所有这些在 `Cloud Control` 版本中都得到了解决。\n\n## Cloud\
  \ Control\n\n此时，您可能想知道为什么本章花了数页篇幅讨论之前的版本。介绍这些材料是为了让您拥有适当的背景知识，帮助您理解 `Enterprise\
  \ Manager` 团队在为这个新产品创建界面时所做的设计决策，这些决策初看可能显得繁复且过于复杂。`EM12c` 的用户界面已从头开始彻底重新设计，几乎解决了围绕产品前几代的所有担忧。这不可避免地意味着，即使是经验丰富的管理员也必须面对学习曲线。帮助您度过这条曲线是本章的主要焦点。\n\
  \n![image](img/sq.jpg) 注意：`EM12c` 中唯一仍需显著改进的领域是浏览器兼容性（例如，`Google Chrome/Chromium`\
  \ 存在一些渲染问题）以及与浏览器导航的集成——例如，后退按钮。\n\n`Cloud Control` 使用以下主要的 `UI` 特性，允许用户高效、清晰、一致地与产品交互。主要的导航元素不再是超链接，而是一个菜单系统，结合用于多步骤任务的各种向导。所有这些工作的最终结果是，现在将\
  \ `Enterprise Manager` 描述为基于网络的应用程序，而不是基于网络的管理界面，要更为恰当。\n\n`Cloud Control` 提供三个不同的菜单栏：\n\
  \n*   `Cloud Control` 菜单栏 (图 4-5)\n\n![9781430249382_Fig04-05.jpg](img/9781430249382_Fig04-05.jpg)\n\
  \n\n\n"
- "# 云控制菜单栏\n\n*   导航菜单栏 (图 4-6)\n\n![9781430249382_Fig04-06.jpg](img/9781430249382_Fig04-06.jpg)\n\
  \n图 4-6. 导航菜单栏\n\n*   目标管理菜单栏 (图 4-7)\n\n![9781430249382_Fig04-07.jpg](img/9781430249382_Fig04-07.jpg)\n\
  \n图 4-7. 目标管理菜单栏\n\n以下部分将讨论每个菜单栏在您操作云控制产品时所扮演的角色。一旦您对这些角色有了清晰的理解，任何给定功能的位置应该就很明确了，而且您与该功能交互的方式也将是一致且高效的。\n\
  \n![image](img/sq.jpg) **注意** 在 Oracle 文档中没有为这些菜单栏记录官方名称，因此本章将统一使用这些术语。\n\n云控制菜单位于屏幕右上角，用于管理云控制本身。此菜单包含一个实用的“帮助”菜单和一个用于为您的管理账户个性化系统选项的简短菜单。然而，主要的菜单是“设置”菜单。您将广泛使用此菜单来管理企业管理员安装的访问和操作。“设置”菜单分为五个部分，如\
  \ 图 4-8 所示。\n\n![9781430249382_Fig04-08.jpg](img/9781430249382_Fig04-08.jpg)\n\n\
  图 4-8. 设置菜单\n\n“设置”菜单体现了应用程序设计者在合理化和精简应用程序方面所面临的一些问题，我们预计随着产品的成熟，这方面还会有进一步的工作。该菜单确实为您提供了一个集中位置来访问设置和维护企业管理员应用程序所需的所有系统范围功能，但对于某些项目的位置，却没有清晰的依据。我们将不会逐项介绍菜单，而是着眼于此菜单在您作为管理员需要执行的最常见任务中的用途。\n\
  \n我们将要完成的管理任务如下：\n\n*   安全管理\n*   我的 Oracle 支持集成\n*   网络代理配置\n*   通知和警报配置\n*   控制管理包访问\n\
  \n我们不涵盖事件管理（详见第 12 章），也不涵盖更高级的功能，如产品可扩展性和命令行界面。本章主要旨在让您熟悉控制台的基本布局以及您最初将执行的基本操作。\n\
  \n### 安全管理\n\n从这个版本开始，Oracle 将产品中的大量安全管理集中化了。为了有效操作，您将需要花时间配置所需的凭证。特别是，您将需要管理 表\
  \ 4-1 中包含的安全领域。\n\n表 4-1. 云控制中的可保护项\n\n| 领域 | 目的 | 示例 |\n| --- | --- | --- |\n|\
  \ 企业管理员用户 | 用户访问 EM | `SYSMAN` |\n| 企业管理员角色 | EM 内的权限 | `PUBLIC` |\n| 命名凭证 | 目标访问\
  \ | `NC_DB_ORCL_SYS` |\n| 首选凭证 | 目标访问 | `NC_DB_ORCL_SYSTEM` |\n| 监视凭证 | 代理访问目标 |\
  \ `DBSNMP` |\n\n此外，您可能希望设置一个权限委托方案，以便管理所需权限通过简单的角色层级和代理注册密码轮换进行传递。然而，这些项目高度依赖于您所服务企业的组织和安全要求，因此超出了本书的范围。\n\
  \n这里的核心概念是“命名凭证”。这些预配置的身份验证凭证允许用户和管理员以安全的方式访问各种受管目标，而无需记住大量的用户名/密码组合。设置这些凭证所花费的时间可能会显得相当繁琐，尤其是在大型环境中，但就节省日常操作时间以及允许最终用户在无需透露密码的情况下获得适当权限访问而言，这是非常值得的。您应使用一个不太可能被删除的账户来设置命名凭证。（例如，您可以使用\
  \ `SYSMAN` 来拥有所有命名凭证，然后授予命名的管理员访问权限。）这种管理员可以访问的凭证集的概念是安全方面的一大进步，很可能会受到您内部安全管理员的欢迎。不利的一面是，您最终可能需要引导他们完成此过程并解释访问控制，这现在比以前更复杂了。\n\
  \n![image](img/sq.jpg) **提示** 我们强烈建议您为凭证实施命名约定，因为您将有许多凭证需要管理。一个例子是使用 `NC_<目标类型>_<目标名称>_<用户>`\
  \ 来指示凭证适用的用户和目标。这适用于目标间密码不同的环境，但您的设置可能有所不同。\n\n第一个安全管理任务是添加管理员账户。完成此操作后，您可以定义和分配角色并设置访问权限。\n\
  \n### 添加管理员\n\n本节概述了添加新管理员账户的过程。如果您尚未为自己创建专用的管理账户，您可能希望跟随以下练习操作。\n\n您将需要 表 4-2 中所示的信息项。在添加管理员时，您可能需要为自己制作一个类似的表格。\n\
  \n表 4-2. 新管理员详细信息\n\n| 项目 | 目的 | 示例 |\n| --- | --- | --- |\n| 用户名 | 标识用户 | `JOE_DBA`\
  \ |\n| 密码 | 用于身份验证 | `Welcome1` |\n| 电子邮件地址 | 接收通知的邮件 | joe.dba@lab.org |\n\n请按照以下步骤添加新的管理员账户：\n\
  \n1.  要启动向导，请选择 设置 ![arrow](img/arrow.jpg) 安全 ![arrow](img/arrow.jpg) 管理员。将显示一个屏幕，列出系统上的所有管理账户。如果这是您添加的第一个管理员，您将看到如\
  \ 图 4-9 所示的页面。\n\n    ![9781430249382_Fig04-09.jpg](img/9781430249382_Fig04-09.jpg)\n\
  \n    图 4-9. 安全向导\n\n2.  点击“创建”按钮。然后填写管理员的基本详细信息，如 图 4-10 所示。（这时您的表格就派上用场了。）请注意，添加电子邮件地址将自动创建一个\
  \ 24×7 的通知计划。您稍后可以调整此设置。\n\n    ![9781430249382_Fig04-10.jpg](img/9781430249382_Fig04-10.jpg)\n\
  \n    图 4-10. 管理员详细信息\n\n3.  点击“下一步”。然后选择此管理员将担任的企业管理员角色。您将在下一节中了解更多关于角色的信息。现在，请注意角色的范围非常广泛，并为各种管理任务引入了基于角色的管理。在此示例中，只需使用产品附带的默认角色（参见\
  \ 图 4-11）。您创建的每个基于库的用户实际上都是库数据库上的一个数据库账户。您可以使用数据库的内置资源和配置文件管理来管理配置文件和资源。\n\n\n\n\
  ### 创建管理员角色与配置支持集成\n\n![image](img/sq.jpg) **提示** 至少，我们建议利用数据库的密码复杂度和过期选项，以确保您的\
  \ EM 管理员帐户遵循公司策略。\n\n![9781430249382_Fig04-11.jpg](img/9781430249382_Fig04-11.jpg)\n\
  \n图 4-11. 添加角色\n\n4.  现在，单击 **下一步**。您将看到如图 4-12 所示的屏幕，您可以在其中为用户分配权限，包括跨整个企业的权限以及针对特定目标的权限。\n\
  \n![9781430249382_Fig04-12.jpg](img/9781430249382_Fig04-12.jpg)\n\n图 4-12. 目标权限分配\n\
  \n5.  单击 **下一步**。如图 4-13 所示的配置屏幕为您呈现了管理员可以管理的各种 Enterprise Manager 资源类型。例如，您可以确保管理员可以查看和编辑用于在企业范围内部署补丁的修补计划。\n\
  \n![9781430249382_Fig04-13.jpg](img/9781430249382_Fig04-13.jpg)\n\n图 4-13. 资源分配\n\
  \n6.  单击 **下一步**。在接下来的屏幕上，复查管理员创建信息。然后单击 **完成**。\n\n## 创建角色进行访问控制\n\n一旦您正确设置了管理员帐户并测试了用户自身的登录访问权限，您就应该使用\
  \ Enterprise Manager 角色来配置基于角色的访问控制。在**角色管理**主页上，您将看到内置的 EM12c 角色以及您可以执行的各种管理操作。\n\
  \n**角色**是在目标和 Enterprise Manager 功能上的一组已命名的权限集合。因此，角色可以定义，例如，管理特定目标类型所需的权限，或执行 Enterprise\
  \ Manager 操作（如请求新的自助数据库）所需的权限。此外，角色可以包含其他角色。因此，角色设计是任何有效 Cloud Control 部署的核心部分，但将取决于您企业的具体情况。\n\
  \n您将通过创建一个数据库管理员角色来逐步完成示例，该角色将拥有适合该工作角色的权限。您可以在接下来的练习中跟随操作。如您将看到的，向导按以下顺序分配权限：角色、目标、资源。\n\
  \n![image](img/sq.jpg) **提示** 通常，请尝试定义与您组织中的工作角色或任务相匹配的角色。此外，使用适当的命名约定——例如，您可以使用定义操作系统安全性的\
  \ LDAP 目录组名称。\n\n要创建您的**数据库管理员**角色，请执行以下步骤：\n\n1.  在**角色管理**页面上，单击 **创建**。图 4-14\
