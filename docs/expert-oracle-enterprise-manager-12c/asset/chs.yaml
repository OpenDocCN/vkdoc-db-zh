  9-18 中突出显示）以查看谓词和过滤器，以及有关该步骤的更详细信息。


  `SQL 详细信息`中的`计划`选项卡的图形版本提供了执行计划的可视化显示（参见图 9-19）。这是语句的逐步路径，通过 SQL 执行显示连接、循环和分组对象。


