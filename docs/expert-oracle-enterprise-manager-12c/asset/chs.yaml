  ## Services 菜单


  Services 是此组中的最后一个菜单选项，也是 Enterprise Manager 服务级别管理能力的基础。一个*服务*被简单地定义为向一个或多个用户提供有用的功能。这与广泛使用的
  ITIL 定义非常相似，后者侧重于向客户交付有用的成果。如前所述，系统可以交付服务，但您也可以定义不基于系统的服务（也许您不拥有或不监控提供它们的 IT 基础设施）。Enterprise
  Manager 中可用于监控的服务类型的确切列表取决于您安装中的插件。


  下一组菜单项由您已配置监控的各种受管目标类型的首页组成。例如，您可能有主机、数据库和中间件的条目。点击这些条目中的任何一个，都会将您带到受管资产的视图，按指定类型的所有目标进行过滤。每个页面都允许您查看该特定类型的现有目标，通过发现过程添加新目标，或在目标使用寿命结束时删除旧目标。


