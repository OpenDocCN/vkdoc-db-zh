- "# 第 5 章\n\n![image](img/frontdot.jpg)\n\n## 云生命周期管理\n\n作者：Bobby Curtis 和 Anand\
  \ Akela\n\nOracle Enterprise Manager 12c 云控制致力于为动态业务需求提供更强的适应性、显著的运营效率和更低的整体运营成本。为了让组织实现这些目标，我们需要一个全面且完整的管理解决方案。没有\
  \ EM12c 的云生命周期管理组件，这些承诺就无法实现，企业可能无法从其云计算基础设施中获得最大价值。云生命周期管理中的组件使组织能够灵活调整其架构，并从扩展的资源中获取更大的业务价值。云生命周期管理涵盖的工具包括以下内容：\n\
  \n*   `自助服务门户`：允许管理员配置云并执行各种操作，例如定义与云关联的策略、将云暴露给用户、决定每个用户可预留的总资源量以及定义系统策略。\n*  \
  \ `费用分摊`：允许企业组织将信息技术资源的成本分配给消耗这些资源的人员、部门或组织。\n*   `整合规划器`：允许企业组织将受管服务器映射到整合资源（例如\
  \ Oracle Exadata 或 Oracle 虚拟机），并使用存储在 Oracle Management 存储库中的指标和配置数据来规划整合。\n\n在我们深入探讨使用\
  \ EM12c 的这些云生命周期管理工具之前，让我们回顾一下云计算到底是什么。\n\n## 什么是云计算？\n\n虽然您可以找到许多关于云计算的定义，但美国国家标准与技术研究院（NIST）在\
  \ 2011 年 9 月发布了最完整和最可信的定义之一。¹\n\n\n\n根据美国国家标准与技术研究院（NIST）的定义，“云计算是一种模型，用于实现对可配置计算资源（例如，网络、服务器、存储、应用程序和服务）共享池的泛在、便捷、按需网络访问，这些资源能够通过最少的管理工作或与服务提供商的交互而快速配置和释放。”\n\
  \n在本节中，我们将为这个总体定义补充一些细节。首先，我们将回顾云计算的基本特征。然后，我们将了解基本的云计算服务和支持的部署模型。\n\n## 基本特征\n\n\
  根据 `NIST` 的定义，云计算具有五项基本特征。让我们详细了解一下每一项：\n\n*   `按需自助服务`：云消费者应能够按需使用云服务，无需与云服务提供商进行人工交互。\n\
  *   `广泛的网络访问`：云服务应通过网络和各种常用接口（例如，Web、移动设备、软件客户端等）进行访问。\n*   `资源池化`：云提供商将计算资源汇集起来，以高效地服务多个消费者。\n\
  *   `快速弹性`：云服务应能弹性地配置和释放，以满足业务需求。\n*   `可衡量的服务`：应监控云资源的使用情况，并可进行报告，用户可能为其所使用的服务付费。\n\
  \n`NIST` 的定义还列出了三种 `服务模型`（软件、平台和基础设施）和四种 `部署模型`（私有、社区、公共和混合），这些模型结合起来对提供云服务的方式进行了分类。这些将在后续章节中讨论。\n\
  \n## 服务模型\n\n对于任何企业组织而言，要使云计算成为一个可行的选项，该组织需要选择提供哪种服务模型。`服务模型` 是一种可用于满足特定需求的方法。在云架构中，可以使用三种主要服务模型——软件即服务（`SaaS`）、平台即服务（`PaaS`）和基础设施即服务（`IaaS`）：\n\
  \n*   `软件即服务 (SaaS)`：在此模型中，云服务的消费者使用软件应用程序。消费者不管理或控制底层的任何基础设施，包括网络、服务器、应用服务器、操作系统、存储，甚至单个应用程序功能，可能仅限于有限的用户特定应用程序配置设置。`SaaS`\
  \ 的例子包括由 Yahoo!、Google 和其他供应商提供的基于 Web 的电子邮件服务。\n*   `平台即服务 (PaaS)`：在此模型中，云的消费者利用云提供商提供的软件平台（包括数据库、中间件、编程语言、库、服务和工具）来构建和操作最终用户应用程序。消费者不管理或控制软件平台或底层基础设施（包括网络、服务器、操作系统或存储），但可以控制已部署的应用程序以及可能的应用程序托管环境配置设置。`PaaS`\
  \ 的例子包括 Google Apps，它使客户能够在移动办公的同时使用一个平台进行工作。\n*   `基础设施即服务 (IaaS)`：在此模型中，`IaaS`\
  \ 云的消费者负责管理软件平台（数据库、中间件、工具等）以及开发和操作最终用户应用程序。消费者不管理或控制底层云基础设施，但可以控制操作系统、存储和已部署的应用程序，并可能对选定的网络组件（例如，主机防火墙）有有限的控制权。Amazon\
  \ Elastic Compute Cloud 为开发人员提供服务器和数据库，是 `IaaS` 的一个例子。\n\n## 部署模型\n\n除了描述服务模型外，`NIST`\
  \ 还列出了部署云服务的四种模型。让我们快速了解一下：\n\n*   `公共云`：云提供商构建和运营云基础设施，供公众使用。该基础设施位于云提供商的场所，提供商管理消费者的访问控制和潜在的按使用付费模型。\n\
  \    *   示例：Box 和 Dropbox 向公众提供一定数量的免费在线存储，并对超出该限制的存储收费。\n*   `私有云`：云基础设施为单个组织内的业务线或分支机构专属使用而配置。通常由该组织的\
  \ IT 部门构建和运营私有云（或企业私有云）。\n    *   示例：Oracle Global IT 为全球 Oracle 员工提供开发和测试云基础设施。但在某些情况下，云基础设施可能由第三方供应商拥有和运营，该供应商专门为单个组织管理私有云。\n\
  *   `社区云`：云基础设施为具有共同目标和关注点的组织中的特定消费者社区专属使用而配置。\n    *   示例：许多联邦和州组织通过云基础设施共享资源。\n\
  *   `混合云`：组织可能决定将某些关键应用程序和数据部署在其私有云中，而将其他应用程序部署在公共云中。如果私有云中的应用程序遭遇灾难或需求激增，组织可能会决定暂时将其部分工作负载迁移到公共云。在峰值负载期间从私有云临时扩展到公共云的过程称为\
  \ `云爆发`。混合云基础设施是私有云和公共云（和/或社区云）的组合，通过标准或专有技术连接以实现数据和应用程序的可移植性。\n\n## 企业私有云\n\n本章的其余部分将重点介绍由\
  \ `EM12c` 管理的企业私有云基础设施。但是，公共、社区或混合云基础设施提供商也可以决定使用 `EM12c` 来管理其整个云生命周期。例如，Oracle\
  \ 使用 `EM12c` 来管理其公共的 Oracle Cloud。\n\n如前所述，企业的 IT 部门通常成为负责企业私有云及其相关部署模型的云服务提供商。\n\
  \n如 图 5-1 所示，业务部门中的云用户当他们从 `IaaS` 横向移动到 `PaaS`，然后再移动到 `SaaS` 时，会获得更多价值。企业内的 `IaaS`\
  \ 云用户负责数据库、中间件以及在其 IT 部门提供的云基础设施之上开发和操作最终用户应用程序。如果 IT 部门提供 `PaaS`，云用户将仅负责其应用程序的开发、测试和操作，而\
  \ IT 则负责软件平台及其底层基础设施的管理和操作。与 `IaaS` 模型相比，企业 IT 部门在建立 `PaaS` 或 `SaaS` 模型时将会有更多的前期投资。\n\
  \n![9781430249382_Fig05-01.jpg](img/9781430249382_Fig05-01.jpg)\n\n图 5-1. 在企业私有云中部署的云服务模型\n\
  \n到目前为止，您已经了解了云计算的概述、其关键特性以及其交付和部署模型。尽管云计算提供了极高的效率、灵活性和成本节约，但只有当企业能够跨整个技术栈管理完整的云生命周期时，企业私有云的效益才能最大化。让我们详细了解一下云生命周期，看看\
  \ Oracle Enterprise Manager 如何帮助完全控制该生命周期的各个阶段。\n\n## 完整的云生命周期管理\n\n\n\n"
- '# Oracle Enterprise Manager 云生命周期管理


  为了从云基础设施中获得最佳价值，对云生命周期所有阶段的各种活动进行端到端管理和自动化工作流至关重要——从规划和设置云，到最终用户自助式配置和取消配置应用程序，再到对云资源使用的计量和收费（参见图
  5-2）。


  ![9781430249382_Fig05-02.jpg](img/9781430249382_Fig05-02.jpg)


  **图 5-2. 完整的云生命周期**


  EM12c 帮助您从单一工具管理整个云生命周期。让我们更详细地看看这个生命周期的各个阶段。


  ## 规划云


  从现有 IT 基础设施迁移到云本质上是变革性的。它需要广泛规划，以考虑各种设计和操作标准，确保云基础设施的成功部署和运行。


  首先，您需要确定环境中的所有应用程序和基础设施资产。您还需要理解它们之间的关系，以便决定哪些保持原样，哪些需要更新，哪些需要淘汰。在迁移到云之前或作为迁移的一部分整合应用程序和底层基础设施，被认为是行业最佳实践。多年来，数据中心积累了过多的服务器，它们占用机架空间，消耗大量电力用于冷却，并需要系统维护（例如打补丁），其中许多服务器未被充分利用。


  EM12c 提供了自动化功能，允许 IT 部门发现现有的应用程序和基础设施资产以及它们之间的关系。这个数据中心的蓝图为云转型规划提供了基线。此外，EM12c 提供了一个名为
  `Consolidation Planner` 的工具（本章稍后将详细讨论），它可以基于存储在 `OEM` 仓库中的使用数据和未来整合平台的预计能力，模拟各种整合场景。在图
  5-3 所示的示例中，正在分析在七台服务器上运行的数据库，以整合到一个 Oracle Exadata 四分之一机架中。


  ![9781430249382_Fig05-03.jpg](img/9781430249382_Fig05-03.jpg)


  **图 5-3. Oracle Enterprise Manager Consolidation Planner**


  `Consolidation Planner` 工具的建议也可以考虑技术和功能约束——例如，生产环境和测试环境不能共置。通过 `Consolidation Planner`，公司的
  IT 部门可以识别未充分利用的服务器，并找到整合它们的方法，以尽可能多地释放资源，同时维持当前的服务水平。这种精细的场景规划可以缓解许多云转型风险。您可以确信应用程序在整合后会运行良好。本章稍后将更详细地讨论
  `Consolidation Planner`。


  在规划阶段，您还需要选择与企业的业务需求最匹配的云服务交付模型（即 IaaS、PaaS 或 SaaS）。当您的业务部门不一定拥有标准化的应用程序开发平台，而只是希望
  IT 为其多样化的应用程序和开发环境提供计算基础设施时，IaaS 可以是一个很好的起点。正如我们之前讨论的，企业可以通过向企业用户交付 PaaS 云来获得更多价值。云用户可以专注于在企业私有
  PaaS 上开发、测试和部署他们的应用程序，而将运维工作委托给 IT。企业可以在最大化组件重用、灵活性和控制的同时，受益于增强的安全性和合规性。


  ## 设置云


  在您基线化 IT 资产、决定作为云转型的一部分进行升级或淘汰的内容，并最终确定云服务交付模型后，您需要设置和配置云。这不仅需要在现有 IT 基础设施前添加一个自助服务门户，还需要设置广泛的网络访问、资源池、快速弹性和计量服务。您不仅设置虚拟化基础设施，还可以在物理基础设施中池化资源。例如，您可以在运行在
  Oracle Exadata 系统之上的 PaaS 云中进行数据库整合。


  为了适应各种云服务（DBaaS、MWaaS 或 IaaS），Oracle Enterprise Manager 支持丰富的云资源模型——从应用程序到存储基础设施中的磁盘，涵盖物理和虚拟化基础设施。您可以创建区域（zone），这是云基础设施所需的一组资源的逻辑分组。例如，MWaaS
  用户只关心中间件区域或域，而不必担心底层基础设施。您可以在使用 Oracle Enterprise Manager 的自助服务门户时，根据组织结构、区域或企业选择的任何标准来设置区域。EM12c
  支持管理程序和操作系统的裸机置备。在云设置过程中，Enterprise Manager 还可以帮助集成来自 F5 Networks、NetApp、Hitachi
  和 Fujitsu 等供应商的最佳网络和存储技术。让我们逐步了解 IaaS 的设置过程。


  您通过选择机器大小开始设置 IaaS 云。如图 5-4 所示，您也可以添加自定义机器大小以满足您的业务需求，并为您的云选择该大小。


  ![9781430249382_Fig05-04.jpg](img/9781430249382_Fig05-04.jpg)


  **图 5-4. 添加自定义机器大小**


  选择机器大小后，您可以为 IaaS 用户定义基础设施请求的设置。如图 5-5 所示，您可以指示是否可以保留云资源、资源可以请求多长时间、是否应配置管理代理等等。


  ![9781430249382_Fig05-05.jpg](img/9781430249382_Fig05-05.jpg)


  **图 5-5. 为请求定义设置**


  您还可以创建和选择用户角色，并为这些角色设置访问控制。如图 5-6 所示，您可以为角色分配配额、区域和网络配置文件。


  ![9781430249382_Fig05-06.jpg](img/9781430249382_Fig05-06.jpg)


  **图 5-6. 配置角色**


  您还可以在设置基础设施时向其中添加软件组件。最后，您可以在设置阶段为基础设施资源设置收费和计量参数，并发布基础设施云资源供云用户使用。除了此处展示的基础设施云示例外，Oracle
  Enterprise Manager 还可以帮助开箱即用地设置数据库或中间件云。


  在云设置阶段可能存在不同的管理任务和角色。云管理员可以是设置云基础设施（包括系统、数据库或作为服务提供的任何其他云资源）的人。自助服务管理员可以是业务部门或其他云租户的管理员，他们为其用户设置配额和角色。


  与云管理员相关的一些典型任务包括：置备裸机管理程序、配置存储阵列和网络、创建服务器池，以及根据功能和操作边界定义区域。他们还为云用户配置软件库的策略和访问控制。




  自助服务管理员定义允许的虚拟机（VM）大小，为用户/角色分配配额，定义访问边界，将角色映射到区域，设置分摊计费计划，并为云的自助服务用户准备可供部署的软件。


  `EM12c` 开箱即用地支持这些典型角色及其常见活动。正如你在图 5-6 中所见，在通过`自助服务`门户进行云设置的过程中，这些用户角色和策略可以根据需要进行定制。云、用户角色和策略的定制设置有助于根据云服务模型自动化资源调配。`自助服务`门户用于调配资源的相同自动化技术，也可通过名为`EMCLI`的命令行
  API（本书不作讨论）使用。


  ## 构建云


  在你的云管理员设置好共享资源后，业务单元或其他云用户组织中的自助服务管理员将需要构建完整的基础设施，他们最终将在此部署其业务应用程序。


  通常，IT 部门设置硬件基础设施。数据库管理员（DBA）部署数据库。各种应用团队构建、测试和部署他们的应用程序。一个跨职能团队将它们连接起来，使所有部分协同工作。应用组件之间的依赖关系和部署约束（例如，数据库和中间件应位于不同的网段）可能使这项任务变得更加困难。


  `EM12c` 和 Oracle Virtual Assembly Builder (`OVAB`) 解决了这一挑战。图 5-7 展示了将多层应用程序打包成一个程序集并使其可供部署的步骤。


  ![9781430249382_Fig05-07.jpg](img/9781430249382_Fig05-07.jpg)


  图 5-7. 为部署而打包多层应用程序的步骤


  使用`OVAB`，应用开发人员和架构师可以图形化地建模应用程序拓扑，定义所有依赖关系和部署约束，并将整个应用程序打包成我们称为`应用程序程序集`的形式。然后，这些程序集可以上传到企业管理器中集中的软件库，以供自助部署使用。一个完整的多层应用程序（包括各种应用组件、中间件软件、数据库、操作系统以及包含它们的虚拟机）可以打包在一个程序集中。然后，该程序集被发布到企业管理器软件库，如图
  5-8 所示，并通过企业管理器的`自助服务`门户提供给云用户进行部署。这可以将应用程序部署所需的时间从数月、数天缩短到数小时、数分钟。由此产生的软件栈标准化最大限度地降低了合规风险和运营停机时间。


  ![9781430249382_Fig05-08.jpg](img/9781430249382_Fig05-08.jpg)


  图 5-8. 将程序集上传到企业管理器软件库


  Oracle 计划为其所有产品提供程序集，这将允许你只需点击几下即可部署任何 Oracle 产品，包括打包的应用程序。Oracle Enterprise Manager
  可以在有新的程序集可用时通知你，如果你感兴趣，可以下载它们。


  ## 在云中测试


  应用程序，无论是作为程序集的一部分还是独立存在，在部署到生产环境之前都需要进行测试。应用程序需要针对功能以及潜在高负载下的性能进行测试。Oracle Enterprise
  Manager 12c Application Testing Suite 包含 Oracle Functional Testing、Oracle Load Testing
  和 Oracle Test Manager，为你的 Oracle 应用程序、中间件和数据库提供全面的测试解决方案。


  在将应用程序部署到生产环境之前，在全负载下进行测试至关重要，以确保应用程序在其活动高峰期能够处理该负载。Oracle Enterprise Manager 的负载测试工具允许你使用不同模块并发用户的不同组合来模拟高负载。负载测试的结果以图形化报告的形式呈现，类似于图
  5-9 所示。


  ![9781430249382_Fig05-09.jpg](img/9781430249382_Fig05-09.jpg)


  图 5-9. Oracle Enterprise Manager 负载测试报告


  该测试解决方案的一个独特之处在于能够捕获生产负载并在测试环境中重放，从而允许你使用真实的生产工作负载来测试你的应用程序。这项技术作为`Oracle Real Application
  Testing`功能已随 Oracle 数据库提供了一段时间。`EM12c` 引入了一个用于自动化应用程序测试的类似解决方案，称为`Application Replay`。与传统的应用程序测试工具不同，`Application
  Replay` 使用真实的生产工作负载对被测应用程序生成负载，无需任何脚本开发或维护。它为你所有的 Web 和打包的 Oracle 应用程序验证应用程序基础设施变更提供了一种最佳实践方法。


  测试数据管理在云环境中至关重要，但常常被忽视。当你允许用户通过自助门户按需供应应用程序和数据库时，保护关键和敏感数据非常重要。Oracle Enterprise
  Manager 测试套件的数据屏蔽功能可以发现数据模型的相互依赖关系，并“屏蔽”任何敏感信息以保护它。还为 Oracle E-Business Suite 和
  Fusion 应用程序提供了包含预定义敏感列和屏蔽格式的数据屏蔽模板。


  `EM12c` 的数据子集化功能让你能够创建包含应用程序数据子集的较小数据库，这些子集在关系上保持一致，因此你只需使用生产数据的一小部分即可进行真实的测试和开发。


  Oracle Enterprise Manager 测试套件还利用了构建在技术层中的深度诊断能力，并提供了修复建议。所有这些测试功能确实可以帮助你最小化部署在云中的应用程序的停机风险。


  ## 部署云


  在构建、测试并将应用程序发布到企业管理器软件库之后，它们就可以通过`EM12c`的`自助服务`门户进行部署了。根据 NIST（美国国家标准与技术研究院），按需自助服务是云的五个关键特性之一。它提供了一个抽象层，向最终用户隐藏了云平台底层的复杂性。


  `EM12c`中开箱即用的`自助服务`门户（如图 5-10 所示）允许云用户部署广泛的云服务。云用户可以在云平台上部署数据库、Java 应用程序或完整的应用程序程序集，这些服务列在服务目录中，目录显示了企业管理器软件库中发布的所有内容。对于部署请求，用户可以指定其应用程序所需的底层资源（CPU、内存、数据库、`WebLogic`域等），企业管理器将自动供应这些资源。自助服务用户还可以根据计划或性能指标定义策略。


  ![9781430249382_Fig05-10.jpg](img/9781430249382_Fig05-10.jpg)


  图 5-10. Oracle Enterprise Manager 的`自助服务`门户


  除了通过`自助服务`门户部署外，云用户还可以使用 Oracle Enterprise Manager 命令行 API 来部署应用程序或应用程序程序集。


  ## 监控云




  ### 云监控


  云基础设施构建完成并部署应用程序后，需要在持续运行期间监控应用程序及底层云基础设施。`Oracle Enterprise Manager` 帮助企业监控完整的云堆栈，从应用程序到存储磁盘，如图
  5-11 所示。


  ![9781430249382_Fig05-11.jpg](img/9781430249382_Fig05-11.jpg)


  图 5-11. `Oracle Enterprise Manager` 对完整云堆栈的监控


  应用程序和底层基础设施需要从不同层级、由我们之前讨论过的不同云角色进行监控。表 5-1 总结了 `Oracle Enterprise Manager` 不同用户执行的监控任务。


  表 5-1. 用户角色及其监控任务


  | 角色 | 监控任务 |

  | --- | --- |

  | 云管理员 | 监控云请求<br>监控整体云服务的运行状况<br>监控补丁<br>跟踪合规性 |

  | 自服务管理员 | 监控应用程序 SLA<br>监控业务交易和指标<br>监控终端用户体验 |

  | 自服务用户 | 监控自己的请求<br>监控自己的应用程序、虚拟机、数据库<br>监控配额、计费等 |


  云管理员（云基础设施的管理员）使用 `Oracle Enterprise Manager` 来跟踪资源变动、租户、策略违规和其他事件，从而监控整个“从应用程序到磁盘”云堆栈的运行状况。`Oracle
  Enterprise Manager Incident Manager`（如图 5-12 所示）为云管理员提供了一个单一界面，可用于查看、管理、解决和跟踪其监控环境中发生的所有类型的问题。第
  12 章将更详细地介绍 `Incident Manager`。


  ![9781430249382_Fig05-12.jpg](img/9781430249382_Fig05-12.jpg)


  图 5-12. `Oracle Enterprise Manager Incident Manager`


  此外，云管理员持续监控请求和故障率，并识别潜在的性能瓶颈以进行修复。云管理员可以通过使用管理组来自动监控云目标，这些组定义了动态标准来对云目标进行分组，并自动分配监控设置和策略。这些组可以根据位置、部门、测试或生产等属性创建。


  自服务管理员（他们管理业务线应用程序所有者使用的公共资源）负责监控应用程序堆栈、基础设施上的服务级别和依赖关系、终端用户体验以及许多其他领域。


  自服务用户或应用程序所有者则监控其托管在云环境中的自身应用程序的运行状况和配额方面。他们可以对已配置的资源（包括虚拟机、主机和数据库）执行基本监控，也可以监控终端用户的应用程序体验。


  第 7 章提供了监控和管理阶段的更多细节和最佳实践。


  ### 云管理


  你刚刚了解了云监控，这是一个了解应用程序和底层云基础设施状态的过程。监控通常会产生不相关的数据集。*云管理* 是一套功能和流程，它利用这些数据为云基础设施和部署在云中的应用程序提供预期的目标。它涉及管理和分配云资源以产生有用的成果。


  `EM12c` 提供了全面的云堆栈管理和业务驱动的应用程序管理功能。`Enterprise Manager` 的方法是摆脱拼凑和零散的解决方案，将管理嵌入到核心解决方案中，并为管理整个堆栈提供一个完整的、统一的、集成的解决方案。通过
  `EM12c`，你拥有对整个基础设施堆栈（包括性能管理、配置管理以及诸如配置和打补丁等自动化生命周期操作）的单一控制点。


  `Enterprise Manager` 的另一个重要方面是，在管理 `Oracle` 软件时，它提供了无与伦比的深度。`Oracle` 为其驱动云的产品设计和内置了可管理性。新的
  `Enterprise Manager` 功能与 `Oracle` 产品一起开发和测试，以确保它们降低复杂性、增强自动化、优化性能并提高云环境的可用性。


  `Oracle Enterprise Manager` 使你能够构建和管理一个为 `Oracle` 应用程序优化的云，这些应用程序驱动着你的许多业务流程和服务。许多自定义应用程序是使用
  `Oracle` 中间件解决方案构建的；由 `Oracle Enterprise Manager` 驱动的云不仅可以运行你的关键任务应用程序，还可以让你深入了解这些应用程序提供的业务服务。我们将这种方法称为*业务驱动的应用程序管理*，它具有三个关键能力：


  *   *用户体验管理* 帮助你监控业务用户的体验。`Oracle Enterprise Manager Real User Experience Insight`
  监控网络流量，提供关于你的用户是谁、他们在哪里、他们在做什么以及他们是否获得了所需服务级别的完整而准确的视图。此解决方案适用于自定义和打包的应用程序。针对 `Oracle`
  应用程序的开箱即用型预构建知识模块，使你能够快速监控业务流程和活动。图 5-13 显示了 `Oracle Enterprise Manager Real User
  Experience Insight` 的仪表板。


  ![9781430249382_Fig05-13.jpg](img/9781430249382_Fig05-13.jpg)


