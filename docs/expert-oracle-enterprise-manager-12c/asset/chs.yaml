  会话 ID 和用户名在左上角显著显示。跟踪或终止会话的选项再次出现在右上角和右下角。


  ### 阻塞标签页


  阻塞标签页显示环境中可能处于活动状态的任何阻塞会话的信息。由于阻塞信息的复杂性，此标签页可能需要较长时间才能显示，但窗格中发现的数据非常有价值。


  ### 等待事件历史标签页


  如图 9-26 所示的等待事件历史标签页，显示等待事件信息，最近的等待事件在顶部。显示的内容包括等待类别、实际的等待事件以及 P1、P2 和 P3 文本，所有这些都链接到关于等待信息的详细数据（源自
  `dba_hist_active_sess_history` 的数据）。跟踪或终止会话的选项再次在右侧的顶部和底部提供。


  ![9781430249382_Fig09-26.jpg](img/9781430249382_Fig09-26.jpg)


  **图 9-26. 会话详情页面等待事件历史标签页中的等待信息**


  ### 并行 SQL 标签页


  并行 SQL 标签页显示会话参与的任何并行执行信息的数据——包括会话是属于协调器还是从属进程，如果是从属进程，则属于并行进程的生产者还是消费者。


  ### SQL 监控标签页


  SQL 监控标签页仅适用于 Oracle Database 11g Release 1 版本的命令行数据和 11g Release 2 版本的 HTML 格式报告。在未设置或不可用此功能的环境中，此标签页会显示为灰色。


  ## ASH 分析


  在 EM12c 控制台的性能页面中，顶部活动区域为经验丰富的管理员（具有先前 Enterprise Manager 经验）提供了用户友好的界面，并提供了新的详细信息以协助解决会话和
  SQL 性能问题。


  ASH 分析是管理员们在 Enterprise Manager 顶部活动图表中一直未能找到的、用于跨多个维度分析性能的功能。ASH 分析的引入旨在以先前未提供的可视化格式提供活动会话历史数据。该功能提供递归向下钻取、堆叠图或树状图视图，以及将当前报告数据与其他
  ASH 报告合并到协作视图中的能力。


  > **注意**：ASH 分析默认不安装。必须安装 `ASH_VIEWER` 包才能使用 ASH 分析视图。数据库必须是 11g 版本或更高版本。安装在许多 10g
  实例上可能会成功，但屏幕上不会显示数据，因为所需的活动会话历史记录将不可用以填充图表。


  主要的 ASH 分析屏幕显示按平均活动会话 (AAS) 排列的数据，通过图表或负载图查看。在主要性能视图中存在大量向下钻取的机会，允许调查不同的研究领域。


  ASH 分析主页的上部显示（如图 9-27 所示）可以更改为按小时、天、周或月显示数据。或者，您可以自定义显示以显示与监控任务更相关的数据。


