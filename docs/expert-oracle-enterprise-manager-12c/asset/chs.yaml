  SQL 语句。


  ## Top Sessions 窗格


  默认情况下，`Top Sessions`窗格位于`Top Activity`页面的右下部分。虽然此部分可以更改为显示关于服务、模块、操作、客户端、文件、对象或`PL/SQL`的
  Top 信息（参见图 9-21），但会话信息是管理员认为最有用的主要数据。


