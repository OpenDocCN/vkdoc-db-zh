    # 在 EM12c 中使用 EMDIAG


    根据提交的参数不同，可以运行多种诊断报告。`EMDIAG` 套件是一个完整的诊断工具集，当 `EM12c` 环境中出现问题时，它将协助管理员和 My Oracle
    Support 进行诊断。


    ## 作业级诊断


    来自 Enterprise Manager 的以下查询将收集运行作业级诊断报告所需的数据。此示例使用一个 `Apex` 的备份作业。


    以具有 `SYSMAN` 模式选择权限的用户身份从 `SQL*Plus` 执行以下操作：


    ```sql

    select mj.job_id, mj.job_name, mjh.execution_id, mjh.step_id

    from sysman.mgmt_job mj, sysman.mgmt_job_history mjh

    where mj.job_id = ''BFC78F41009876F3E04014AC08003231''

    and mj.job_id=mjh.job_id

    and mjh.start_time > sysdate-1;

    ```


    图 11-35 显示了输出结果。


    ![9781430249382_Fig11-35.jpg](img/9781430249382_Fig11-35.jpg)


    图 11-35. 前述查询的输出


    利用作业名称，我们可以对作业本身执行一些诊断报告收集。由于生成的诊断数据量很大，建议将输出重定向到文件。


    ```bash

    $ cd $EMDIAG_HOME/bin

    ./repvfy dump job -name BACKUP_APEX.1 –pwd w0rldw1d3 -tns em12rep > ./rep_apex_job.lst

    ```


    输出文件随后会显示关于该作业的完整报告，从诊断工具、数据库、测试和存储库的信息开始。图 11-36 显示了这些信息。图 11-37 显示了一些作业参数。图
    11-38 显示了参数参数。图 11-39 显示了作业源和目标。


    ![9781430249382_Fig11-36.jpg](img/9781430249382_Fig11-36.jpg)


    图 11-36. 关于存储库的版本和 `EMDIAG` 信息


    ![9781430249382_Fig11-37.jpg](img/9781430249382_Fig11-37.jpg)


    图 11-37. 从这里开始，报告深入到作业运行时、时区和其他详细信息


    ![9781430249382_Fig11-38.jpg](img/9781430249382_Fig11-38.jpg)


    图 11-38. `EMDIAG` 作业报告中 `EM12c` 作业步骤的参数参数


    ![9781430249382_Fig11-39.jpg](img/9781430249382_Fig11-39.jpg)


    图 11-39. 关于运行作业的主机的 `GUID` 信息


    接下来的部分会告知您谁拥有该作业、谁拥有该作业的权限，以及权限类型。由于此作业仅由 `SYSMAN` 用户拥有和运行，因此我们的示例报告中仅显示此用户。


    报告的下一部分，如图 11-40 所示，展示了历史上最后十次运行的情况，包括运行时间、重试次数和作业的成功信息。


    ![9781430249382_Fig11-40.jpg](img/9781430249382_Fig11-40.jpg)


    图 11-40. 显示 `EM` 作业服务中有关作业运行的历史数据


    在此示例中，`EMDIAG` 指示一个作业处于等待状态。图 11-41 中的近期历史记录显示所有作业都已成功。但是，存在一个 17 级别的作业，这表示有一次运行由于某些未在执行摘要中显示的未公开问题而不得不等待。


    ![9781430249382_Fig11-41.jpg](img/9781430249382_Fig11-41.jpg)


    图 11-41. 作业运行状态值和历史报告的摘要计数


    如果在作业分析过程中出现任何错误，这些错误将保存在报告的最后部分。我们的示例成功编译且未发现问题，因此输出结果如您在图 11-42 中所见。


    ![9781430249382_Fig11-42.jpg](img/9781430249382_Fig11-42.jpg)


