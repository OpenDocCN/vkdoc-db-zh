    Migrating Scripts to the EM Job System


    It is a simple process to migrate existing scripted jobs that may be currently
    using `cron` or another scheduler to the `EM Job System`.


    These changes to the preexisting scripts must be considered:

    ```'
  raw: 'JOB_NAME                                                         START_TIM

    ---------------------------------------------------------------- ---------

    END_TIME  STATUS_DETAIL    RETRIED

    --------- ------------- ----------

    285DCE9F51ED4E6D843974116963EDC3

    DPEXP_ORCL_1230                                                  31-DEC-12

    31-DEC-12             0

    ```


    The preceding output shows a job that failed, was not expired, and was never retried.
    The query reequested any job that was run in the last day, had not failed (successful=0),
    and was not expired (0 is actively scheduled jobs). This information can be used
    instead of reporting on each individual job. The choice is up to the administrator,
    but knowing how to find information about a job is essential when default options
    are not to the administrator’s preference.


    Permissions


    Many times I’ve experienced conflicts in scheduled jobs that have occurred, for
    example, between one task that was scheduled through a shell script via cron,
    another in theDBMS_SCHEDULER, and a third in the EM Job scheduler. The EM12c Jobs
    Service provides a job scheduler that can handle numerous task script formats
    and job types, and has a single job interface to manage the jobs. The security
    for job management is part of the administrator creation steps, securing the users
    who can create, manage, and remove jobs.


    There are many ways to view who can create and manage jobs in the EM12c environment.
    Because the administrator may not always be aware of who is creating jobs, how
    many, and how often in the environment, it is essential to ensure that EM job
    demands are not impairing the performance of the system.


    The following query provides a clear view, shown  in [Figure 11-26](#9781430249382_Ch11.xhtml#Fig26),
    of who has been granted the rights to create and schedule jobs.


    ```

    SELECT grantee  from SYSMAN.MGMT_PRIV_GRANTS

    WHERE PRIV_NAME=''SUPER_USER'';

    ```


    ![9781430249382_Fig11-26.jpg](images/9781430249382_Fig11-26.jpg)


    [Figure 11-26](#9781430249382_Ch11.xhtml#_Fig26). EM12c Super Users may also create
    and manage EM jobs


    EM Jobs Service Charts and Metrics


    The EM Jobs Service interface, shown in [Figure 11-27](#9781430249382_Ch11.xhtml#Fig27),
    enables you to easily assess the health of your EM Job environment. The tabs at
    the top of the interface allow quick access to the Jobs Service’s advanced features.
    These tabs can be reached by choosing Targets ![arrow](images/arrow.jpg) All Targets,
    performing a wildcard search for **%Service%**, and then clicking EM Jobs Service.


    ![9781430249382_Fig11-27.jpg](images/9781430249382_Fig11-27.jpg)


    [Figure 11-27](#9781430249382_Ch11.xhtml#_Fig27). EM Jobs Service home page, showing
    high-level statistics and incident information


    From this interface, you can view details about performance, usage, and incidents.


    EM Jobs Service Charts


    Making decisions on how many jobs are too many in a given time frame became much
    easier with the performance charts in the EM12c EM Jobs Service. These charts
    are accessed through the Charts tab.


    The EM Jobs Service charts show information regarding the performance of the job
    dispatcher, backlog of job steps, and throughput (see [Figure 11-28](#9781430249382_Ch11.xhtml#Fig28)).
    This graphical view of the data enables you to quickly ascertain whether there
    is an issue with job performance in the EM12c environment.


    ![9781430249382_Fig11-28.jpg](images/9781430249382_Fig11-28.jpg)


    [Figure 11-28](#9781430249382_Ch11.xhtml#_Fig28). Three preconfigured EM job perfomance
    charts


    You can create further monitoring enhancements for “job heavy” environments on
    the Monitoring Configuration tab of the EM Jobs Service. You can then view this
    chart for heavy resource usage, as the data is broken down effectively into three
    parts: Job Steps, Processing Time, and Throughput (Job Steps/Sec).


    Performance Metrics


    Performance metrics enable you to set up metrics specifically tied to a feature,
    in this case, EM jobs. The default metrics are set for a standard database environment,
    leaving you to edit them in the existing interface if needed, although that is
    rarely required. Two crucial metrics require only minimal configuration because
    of the uniqueness of most database environments:


    *   Throughput—Job Steps/Sec

    *   Backlog—Jobs Steps


    These two metrics, once configured for the value that is desired for the environment,
    will alert when the throughput for a job is above the amount set per second or
    when the quantity of job steps backlogged is above the threshold.


    Usage Metrics


    One metric is preset in the list: Job Dispatcher Processing Time (% of Last Hour).
    You can also add and configure specific usage metrics to the environment. These
    are set up very similarly to the performance metrics and should be tested thoroughly,
    based on the information gathered in the performance charts shown previously in
    [Figure 11-28](#9781430249382_Ch11.xhtml#Fig28).


    The Usage Metrics area can be accessed by choosing Targets ![arrow](images/arrow.jpg)
    All Targets ![arrow](images/arrow.jpg) EM Jobs Service ![arrow](images/arrow.jpg)
    Metric Configurations ![arrow](images/arrow.jpg) Usage Metrics. Alternatively,
    you can access these metrics via a link on the Monitoring Configuration tab (see
    [Figure 11-29](#9781430249382_Ch11.xhtml#Fig29)).


    ![9781430249382_Fig11-29.jpg](images/9781430249382_Fig11-29.jpg)


    [Figure 11-29](#9781430249382_Ch11.xhtml#_Fig29). The Usage Metrics option is
    located at the lower right area of the Monitoring Configuration tab


    You can add, edit, or delete metrics from the Usage Metrics interface. In the
    following example, we will add a systems usage metric by simply clicking the Add
    button and proceeding with the wizard. [Figure 11-30](#9781430249382_Ch11.xhtml#Fig30)
    and [Figure 11-31](#9781430249382_Ch11.xhtml#Fig31) show different parts of the
    first wizard page.


    In this example, we will add a usage metric to monitor for mapping errors on an
    unmonitored NFS server (see [Figure 11-30](#9781430249382_Ch11.xhtml#Fig30)).


    ![9781430249382_Fig11-30.jpg](images/9781430249382_Fig11-30.jpg)


    [Figure 11-30](#9781430249382_Ch11.xhtml#_Fig30). Adding a usage metric o check
    for NFS server mapping errors on a target host’s unmonitored NFS server


