    \ EM12c 的一个介绍。\n\n然而，即使您不打算自己开发插件，也不要跳过本章。了解 EM12c 的内部机制将帮助您更好地理解其工作原理。最终，这将使您更高效，并发现该环境更直观易用。\n\
    \n## 度量扩展\n\nEM12c 中的*度量扩展*取代了最初在 OEM 10g 中引入、现已于 12c 中弃用的用户定义度量 (User-Defined\
    \ Metrics, UDMs)。与 UDMs 相比，度量扩展在数据收集方面提供了更大的灵活性，并且更易于大规模部署和管理。\n\n正如您现在应该已经了解的，每个受监控目标都附带一组由插件创建者（可能是\
    \ Oracle 或第三方供应商）设计的预定义度量。例如，主机目标收集 CPU 利用率度量，Oracle Database 目标收集物理 IO 度量等。通常这些度量已足够，但有时您可能希望收集比开箱即用更多的度量，以监控特定于您的环境或应用程序的状况。\n\
    \n度量扩展由部署在其所在主机上的代理运行。虽然您是通过 OMS 集中创建和管理度量扩展，但它们需要分发到监控已部署度量扩展的目标的代理上。一旦度量扩展部署到某个代理的第一个目标上，该分发过程就会自动完成。\n\
    \n与旧式的 UDMs 相比，度量扩展的开发生命周期稍微复杂一些，但这正是度量扩展在多用户环境中更易于大规模管理的原因。要访问度量扩展主页，请选择 **Enterprise**\
    \ → **Monitoring** → **Metric Extensions**。在那里，您将看到度量扩展开发生命周期的快速概览，如图 10-1 所示。\n\
    \n![图 10-1：度量扩展开发生命周期](img/9781430249382_Fig10-01.jpg)\n\n*图 10-1. 度量扩展开发生命周期*\n\
    \n## 您的第一个度量扩展\n\n让我们创建一个示例度量，以便您了解实际过程。假设您需要监控数据库中的会话接近其每会话最大打开游标数的程度。该最大值由 `open_cursors`\
    \ init.ora 参数控制。您可以使用清单 10-1 中的查询，返回相对于定义最大值的打开游标百分比。\n\n***清单 10-1***. 用于打开游标度量扩展的\
    \ SQL\n\n```sql\nSELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct\n\
    \  FROM (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
    \        GROUP BY sid\n        ORDER BY 2 DESC) c,\n       v$parameter p\n WHERE\
    \ p.name = 'open_cursors' AND ROWNUM = 1\n```\n\n### 创建新的度量扩展\n\n要创建此度量，请单击度量扩展主页上可用度量扩展列表上方的\
    \ `Create` 按钮。如果该按钮呈灰色且不可点击，说明您没有创建新度量扩展的权限。您需要由 EM 超级管理员授予 `Create Metric Extension`\
    \ 权限。此权限在资源特权屏幕的 `Metric Extensions Resource` 行中，在创建或编辑 EM 用户时分配。只有一个相关权限：`Create\
    \ Metric Extension`。此权限允许您创建和导入新的度量扩展。\n\n单击 `Create` 按钮后，新的度量扩展向导将会出现。图 10-2\
    \ 显示了该向导的“常规属性”选项卡。\n\n![图 10-2：open_cursors_pct 度量扩展的常规属性](img/9781430249382_Fig10-02.jpg)\n\
    \n*图 10-2. open_cursors_pct 度量扩展的常规属性*\n\n将“目标类型”选项设置为 `Database Instance`，以便该度量可以部署在单实例数据库以及\
    \ RAC 数据库的每个实例上。如果您要从真实表中选择度量或监控全局条件（例如队列表中的消息数量），您应将“目标类型”设置为 `Cluster Database`\
    \ 而不是每个 RAC 数据库实例。将“名称”属性设置为 `open_cursors_pct`。这是 EM 内部使用的名称，如果您以后需要从存储库中提取信息（例如为自定义报告编写\
    \ SQL 语句），将会用到它。选择 `SQL` 作为适配器，并选择 1 分钟的采集间隔和 1 的上传间隔（表示每次采集后上传）。我建议您谨慎选择采集间隔，避免采集度量的频率高于\
    \ 5-15 分钟。您应该仅将少数需要快速通知的关键度量的间隔设置为低于 5 分钟。否则，您将对代理和 EM 框架的其余部分引入显著的额外开销，以处理和存储过量的数据。在测试和开发期间（如本示例）使用\
    \ 1 分钟的采集间隔是可以的，以避免等待度量历史记录出现的时间过长。在“适配器”选项卡上，将清单 10-1 中的 SQL 文本复制到“基本属性”部分的“SQL\
    \ 查询”字段中。在此示例中，您不会使用任何高级属性或上传文件。\n\n接下来是“列”选项卡。向度量添加一个列，并根据图 10-3 进行定义。\n\n![图\
    \ 10-3：度量扩展列](img/9781430249382_Fig10-03.jpg)\n\n*图 10-3. 度量扩展列*\n\n在“警报阈值”部分，选择大于号\
    \ (`>`) 比较运算符。将警告和严重状况的默认阈值分别设置为 70% 和 90%。在高级选项中，您可以编辑触发警报前的发生次数，以及创建自定义消息。您还可以将度量分配到预定义的类别之一，然后\
    \ EM12c 控制台会将您的度量与其他类似度量进行分组。\n\n在“凭证”选项卡上，保留“使用默认监视凭证”。现在，您已准备好测试您的度量。\n"
- fmt: "## Testing the Metric Extension\n\n在**Test**选项卡中，添加一个或多个数据库（请记住，如果您不是超级管理员用户，您应该对这些数据库拥有**View**权限）。然后点击**Run\
    \ Test**按钮。您应该会看到收集进度对话框短暂出现（除非您选择了许多数据库实例），随后收集结果将被显示。如果没有错误信息且结果符合预期，您就可以继续在**Review**选项卡上完成操作。\n\
    \n如果您点击**Finish**按钮后度量扩展创建成功，您将在**Metric Extensions**主页上看到它，其状态为`Editable`。您还会看到此度量扩展的版本为`1`。在`Editable`状态下编辑度量扩展不会增加版本号。您可以多次检查和编辑您的度量扩展，直到在实时测试对话框中按预期完成收集工作。\n\
    \n如果初稿运行符合预期，下一步就是在真实目标上执行测试运行。在将度量部署到目标之前，必须先将其保存为可部署的草稿。选择您的度量，然后从度量扩展表格上方的**Actions**菜单中选择**Save\
    \ as Deployable Draft**。度量的状态将变为`Deployable Draft`。在此阶段，度量仅对您（其所有者）可见，除非您通过**Actions**\
    \ -> **Manage Access**明确授予其他用户或角色权限。另请注意，除非您创建新版本（稍后将进行），否则无法编辑处于`Deployable Draft`状态的度量扩展。\n\
    \n为确保您的度量扩展按预期运行，让我们将其部署到一些目标。这通过选择**Actions** -> **Deploy to Targets**来完成。选择目标并提交部署作业后，度量扩展将在后台运行。所有部署作业都是异步操作，在`EM12c`中作为作业调度。在少数目标上部署度量扩展通常非常快，因此您可以点击右上角的刷新图标，如果作业从待处理部署列表中消失，并且没有出现在屏幕下半部分的失败部署列表中，则表示部署成功。您还可以从**Metric\
    \ Extensions**主页查看部署进度，该主页指示待处理和失败部署的总数，以及库中每个度量扩展的已部署目标数量，如[图 10-4](#9781430249382_Ch10.xhtml#Fig4)所示。\n\
    \n![9781430249382_Fig10-04.jpg](images/9781430249382_Fig10-04.jpg)\n\n[图 10-4](#9781430249382_Ch10.xhtml#_Fig4).\
    \ 显示部署状态的`Metric Extensions`主页\n\n现在度量扩展已经部署，您可以像使用`Database Instance`目标类型附带的任何其他开箱即用的度量一样使用它。收集几个小时后，您可能会看到类似于[图\
    \ 10-5](#9781430249382_Ch10.xhtml#Fig5)中的数据。要进入此屏幕，您需要导航到已部署度量的目标，然后从目标的菜单中选择**Oracle\
    \ Database** -> **Monitoring** -> **All Metrics**。请注意，与用户定义的度量不同，度量扩展没有自己的视图。\n\
    \n![9781430249382_Fig10-05.jpg](images/9781430249382_Fig10-05.jpg)\n\n[图 10-5](#9781430249382_Ch10.xhtml#_Fig5).\
    \ 度量扩展详细信息和历史记录\n\n## Publishing the Metric Extension\n\n当您的度量按预期工作时，您就可以发布它，以便任何`EM`用户都可以部署该度量扩展。请注意，处于`Deployable\
    \ Draft`状态的已部署度量扩展对所有可以查看该目标的用户都是可见的。他们甚至可以编辑度量设置，就像对任何其他度量一样。发布度量扩展只是提供了将此度量扩展（或更准确地说，此特定版本的度量扩展）部署到其他目标的能力。\n\
    \n您可以从**Metric Extensions**主页通过选择**Actions** -> **Publish Metric Extension**来发布度量扩展。状态变为`Published`，并且该度量扩展对任何`EM`用户可用。请注意，`Published`度量也可以包含在**Monitoring\
    \ Templates**中，这是与`Deployable Draft`状态的另一个重要区别。\n\n现在假设度量运行良好，但一段时间后，您意识到拥有关于会话的额外信息会很有帮助。您希望看到打开的游标的最高数量，而不仅仅是打开游标计数接近限制的程度。在度量本身中拥有`SID`、`username`、`client\
    \ machine`、`client OS user`和`client program`信息将极大地帮助您对新度量扩展生成的警报进行故障排除。\n\n##\
    \ Creating a New Version of Metric Extension\n\n让我们改进您刚刚创建的度量扩展。从**Metric Extensions**主页中，选择当前版本并选择**Actions**\
    \ -> **Create Next Version**。然后更改反映描述中更改的常规属性。\n\n在**Adapter**选项卡上，用[清单 10-2](#9781430249382_Ch10.xhtml#list2)中的`SQL`替换旧的`SQL`，该`SQL`收集有关具有最多打开游标的会话的信息。\n\
    \n[清单 10-2](#9781430249382_Ch10.xhtml#_list2). 用于打开游标的度量扩展的修改后`SQL`\n\n```sql\n\
    SELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct,\n       c.open_cursors,\
    \ c.sid, s.username, s.machine,\n       s.program, s.osuser, s.process\n  FROM\
    \ (select * from (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
    \        GROUP BY sid\n        ORDER BY COUNT (*) DESC)\n        WHERE ROWNUM\
    \ = 1) c,\n       v$parameter p, v$session s\n WHERE p.name = 'open_cursors'\n\
    \   AND s.sid = c.sid\n```\n\n在**Columns**选项卡上，您需要添加新列。请注意，您仅在`open_cursors`列上设置了比较运算符，以防有人想使用绝对游标计数作为阈值。其他列不能设置任何警告或严重状况，因为它们仅用于提供信息。参见[图\
    \ 10-6](#9781430249382_Ch10.xhtml#Fig6)。\n\n![9781430249382_Fig10-06.jpg](images/9781430249382_Fig10-06.jpg)\n\
    \n[图 10-6](#9781430249382_Ch10.xhtml#_Fig6). 修改后的打开游标度量扩展的列列表\n\n现在测试您的度量扩展。如果一切正常且度量收集工作正常，请完成其创建。您将看到同一个度量扩展的下一个版本，版本号为`2`，出现在**Metric\
    \ Extensions**主页上。您现在可以将版本`2`另存为`Deployable Draft`并部署它以验证其是否按预期工作。如果该目标上已部署了先前版本的度量扩展，它将被升级。最后一步是发布最新版本，以便所有`EM12c`用户都可以使用它。\n\
    \n当发布度量扩展的更新版本时，可以从显示目标部署的屏幕完成旧部署的升级。您可以从**Metric Extensions**主页访问此屏幕：点击先前版本度量扩展的已部署目标数量链接，然后点击**Deploy**按钮（首先选择要升级的所有目标）。完成后，您将在此度量中看到更多列。新的度量扩展收集结果将类似于[图\
    \ 10-7](#9781430249382_Ch10.xhtml#Fig7)。"
  raw: 'On the Test tab, add one or more databases (remember that you should have
    View privileges on them if you are not a Super Administrator user). Then click
    the Run Test button. You should see the collection progress dialog box appear
    for a short time (unless you selected many database instances), and the collection
    result is displayed. If you have no error messages and the result is what you
    expected, you can proceed to completion on the Review tab.


    If the metric extension was created successfully after you clicked the Finish
    button, you will see it on the Metric Extensions home page with the status Editable.
    You can also see that this metric extension is version 1\. Editing the metric
    extension in Editable status will not increment the version. You can review and
    edit your metric multiple times, until you get the collection working as you envisioned
    it in the real-time testing dialog box.


    Testing the Metric Extension


    If the first draft is working as expected, the next step is to perform test runs
    on the real targets. Before you can deploy a metric on a target, the metric must
    be saved as a Deployable Draft. Select your metric and then, from the Actions
    menu located above the table of metric extensions, choose Save as Deployable Draft.
    The metric’s status changes to Deployable Draft. At this stage, the metric is
    visible only to you, its owner, unless you explicitly grant permission to other
    users or roles by using Actions ![arrow](images/arrow.jpg) Manage Access. Also
    note that you cannot edit a metric extension in Deployable Draft status unless
    you create a new version, which you will do later.


    To ensure that your metric extension behaves as expected, let’s deploy it to some
    targets. This is done by choosing Actions ![arrow](images/arrow.jpg) Deploy to
    Targets. After you select the targets and submit the deployment jobs, the metric
    extension will be running in the background. All deployment jobs are asynchronous
    actions scheduled as jobs in EM12c. Metric extension deployment on one or a few
    targets is usually pretty quick, so you can click the refresh icon in the top-right
    corner, and if the job disappears from the list of pending deployments and doesn’t
    show up in the list of failed deployments in the second half of the screen, then
    deployment was successful. You can also see the deployment progress from the Metric
    Extensions home page, which indicates the total count of pending and failed deployments,
    as well as the number of deployed targets for each metric extension in the library,
    as shown in [Figure 10-4](#9781430249382_Ch10.xhtml#Fig4).


    ![9781430249382_Fig10-04.jpg](images/9781430249382_Fig10-04.jpg)


    [Figure 10-4](#9781430249382_Ch10.xhtml#_Fig4). Metric Extensions home page showing
    deployment status


    Now that the metric extension is deployed, you can use it just like any other
    out-of-the-box metric that came with the Database Instance target type. After
    a few hours of collection, you might see data similar to that in [Figure 10-5](#9781430249382_Ch10.xhtml#Fig5).
    To get to this screen, you navigate to the target where the metric is deployed
    and then from the target’s menu choose Oracle Database ![arrow](images/arrow.jpg)
    Monitoring ![arrow](images/arrow.jpg) All Metrics. Note that, unlike user-defined
    metrics, metric extensions do not have their own view.


    ![9781430249382_Fig10-05.jpg](images/9781430249382_Fig10-05.jpg)


    [Figure 10-5](#9781430249382_Ch10.xhtml#_Fig5). Metric extension details and history


    Publishing the Metric Extension


    When your metric is working as expected, you are ready to publish it so that the
    metric extension is available for deployment by any EM user. Note that a deployed
    metric extension in Deployable Draft status is visible to all users who can view
    the target. They can even edit metric settings, just as they can for any other
    metric. Publishing a metric extension accomplishes nothing more than providing
    the ability to deploy this metric extension (or to be more precise, this specific
    version of the metric extension) to other targets.


    You can publish a metric extension from the Metric Extensions home page by choosing
    Actions ![arrow](images/arrow.jpg) Publish Metric Extension. The status changes
    to Published, and the metric extension becomes available to any EM user. Note
    that Published metrics can also be included in Monitoring Templates, another important
    difference from Deployable Draft status.


    Now imagine that the metric is working well, but after some time you realize it
    would be helpful to have additional information about the session. You want to
    see the highest number of open cursors, and not just how close the open-cursors
    count is to the limit. Having the SID, username, client machine, client OS user,
    and client program available in the metric itself would greatly assist in troubleshooting
    alerts generated by your new metric extension.


    Creating a New Version of Metric Extension


    Let’s improve the metric extension that you just created. From the Metric Extensions
    home page, select the current version and choose Actions ![arrow](images/arrow.jpg)
    Create Next Version. Then change the general properties reflecting the changes
    in the description.


    On the Adapter tab, replace the old SQL with that in [Listing 10-2](#9781430249382_Ch10.xhtml#list2),
    which collects information about the session with the highest number of open cursors.


    ***[Listing 10-2](#9781430249382_Ch10.xhtml#_list2)***.  Modified SQL for Open
    Cursors Metric Extension


    ```

    SELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct,

           c.open_cursors, c.sid, s.username, s.machine,

           s.program, s.osuser, s.process

      FROM (select * from (SELECT   sid, COUNT (*) open_cursors

                FROM v$open_cursor

            GROUP BY sid

            ORDER BY COUNT (*) DESC)

            WHERE ROWNUM = 1) c,

           v$parameter p, v$session s

     WHERE p.name = ''open_cursors''

       AND s.sid = c.sid

    ```


    On the Columns tab, you need to add new columns. Note that you set a comparison
    operator only on the open_cursors column, in case somebody wants to use absolute
    cursor count as a threshold. Other columns can’t have any warning or critical
    conditions set, as they are intended only for informational purposes. See [Figure
    10-6](#9781430249382_Ch10.xhtml#Fig6).


    ![9781430249382_Fig10-06.jpg](images/9781430249382_Fig10-06.jpg)


    [Figure 10-6](#9781430249382_Ch10.xhtml#_Fig6). List of columns for the modified
    Open Cursors metric extension


    Now test your metric extension. If everything is fine and metric collection works,
    finish its creation. You will see the next version of the same metric extension
    with version number 2 appear on the Metric Extensions home page. You can now save
    version 2 as a Deployable Draft and deploy it to verify that it works as expected.
    If a previous version of the metric extension was already deployed on that target,
    it will be upgraded. The final step is to publish the latest version so it’s available
    to all users of EM12c.


    When a newer version of the metric extension is published, the upgrade of the
    older deployment can be done from the screen showing the target deployment. You
    can access this screen from the Metric Extensions home page: click the link with
    the number of deployed targets for the previous version of a metric extension
    and then click the Deploy button (select all targets you want to upgrade first).
    When that’s done, you can see more columns in this metric. The new metric extension
    collection will look like [Figure 10-7](#9781430249382_Ch10.xhtml#Fig7).'
  trans: "## 测试度量扩展\n\n在**测试**选项卡中，添加一个或多个数据库（请记住，如果您不是超级管理员用户，您应该对这些数据库拥有**查看**权限）。然后点击**运行测试**按钮。您应该会看到收集进度对话框短暂出现（除非您选择了许多数据库实例），随后收集结果将被显示。如果没有错误信息且结果符合预期，您就可以继续在**审查**选项卡上完成操作。\n\
    \n如果您点击**完成**按钮后度量扩展创建成功，您将在**度量扩展**主页上看到它，其状态为`可编辑`。您还会看到此度量扩展的版本为`1`。在`可编辑`状态下编辑度量扩展不会增加版本号。您可以多次检查和编辑您的度量扩展，直到在实时测试对话框中按预期完成收集工作。\n\
    \n如果初稿运行符合预期，下一步就是在真实目标上执行测试运行。在将度量部署到目标之前，必须先将其保存为可部署的草稿。选择您的度量，然后从度量扩展表格上方的**操作**菜单中选择**另存为可部署草稿**。度量的状态将变为`可部署草稿`。在此阶段，度量仅对您（其所有者）可见，除非您通过**操作**\
    \ -> **管理访问权限**明确授予其他用户或角色权限。另请注意，除非您创建新版本（稍后将进行），否则无法编辑处于`可部署草稿`状态的度量扩展。\n\n\
    为确保您的度量扩展按预期运行，让我们将其部署到一些目标。这通过选择**操作** -> **部署到目标**来完成。选择目标并提交部署作业后，度量扩展将在后台运行。所有部署作业都是异步操作，在`EM12c`中作为作业调度。在少数目标上部署度量扩展通常非常快，因此您可以点击右上角的刷新图标，如果作业从待处理部署列表中消失，并且没有出现在屏幕下半部分的失败部署列表中，则表示部署成功。您还可以从**度量扩展**主页查看部署进度，该主页指示待处理和失败部署的总数，以及库中每个度量扩展的已部署目标数量，如图\
    \ 10-4 所示。\n\n![9781430249382_Fig10-04.jpg](img/9781430249382_Fig10-04.jpg)\n\n\
    图 10-4. 显示部署状态的`度量扩展`主页\n\n现在度量扩展已经部署，您可以像使用`数据库实例`目标类型附带的任何其他开箱即用的度量一样使用它。收集几个小时后，您可能会看到类似于图\
    \ 10-5 中的数据。要进入此屏幕，您需要导航到已部署度量的目标，然后从目标的菜单中选择**Oracle Database** -> **监控** ->\
    \ **所有度量**。请注意，与用户定义的度量不同，度量扩展没有自己的视图。\n\n![9781430249382_Fig10-05.jpg](img/9781430249382_Fig10-05.jpg)\n\
    \n图 10-5. 度量扩展详细信息和历史记录\n\n## 发布度量扩展\n\n当您的度量按预期工作时，您就可以发布它，以便任何`EM`用户都可以部署该度量扩展。请注意，处于`可部署草稿`状态的已部署度量扩展对所有可以查看该目标的用户都是可见的。他们甚至可以编辑度量设置，就像对任何其他度量一样。发布度量扩展只是提供了将此度量扩展（或更准确地说，此特定版本的度量扩展）部署到其他目标的能力。\n\
    \n您可以从**度量扩展**主页通过选择**操作** -> **发布度量扩展**来发布度量扩展。状态变为`已发布`，并且该度量扩展对任何`EM`用户可用。请注意，`已发布`度量也可以包含在**监控模板**中，这是与`可部署草稿`状态的另一个重要区别。\n\
    \n现在假设度量运行良好，但一段时间后，您意识到拥有关于会话的额外信息会很有帮助。您希望看到打开的游标的最高数量，而不仅仅是打开游标计数接近限制的程度。在度量本身中拥有`SID`、`用户名`、`客户端机器`、`客户端操作系统用户`和`客户端程序`信息将极大地帮助您对新度量扩展生成的警报进行故障排除。\n\
    \n## 创建度量扩展的新版本\n\n让我们改进您刚刚创建的度量扩展。从**度量扩展**主页中，选择当前版本并选择**操作** -> **创建下一版本**。然后更改反映描述中更改的常规属性。\n\
    \n在**适配器**选项卡上，用清单 10-2 中的`SQL`替换旧的`SQL`，该`SQL`收集有关具有最多打开游标的会话的信息。\n\n清单 10-2.\
    \ 用于打开游标的度量扩展的修改后`SQL`\n\n```sql\nSELECT ROUND (c.open_cursors / p.value * 100)\
    \ open_cursors_pct,\n       c.open_cursors, c.sid, s.username, s.machine,\n  \
    \     s.program, s.osuser, s.process\n  FROM (select * from (SELECT   sid, COUNT\
    \ (*) open_cursors\n            FROM v$open_cursor\n        GROUP BY sid\n   \
    \     ORDER BY COUNT (*) DESC)\n        WHERE ROWNUM = 1) c,\n       v$parameter\
    \ p, v$session s\n WHERE p.name = 'open_cursors'\n   AND s.sid = c.sid\n```\n\n\
    在**列**选项卡上，您需要添加新列。请注意，您仅在`open_cursors`列上设置了比较运算符，以防有人想使用绝对游标计数作为阈值。其他列不能设置任何警告或严重状况，因为它们仅用于提供信息。参见图\
    \ 10-6。\n\n![9781430249382_Fig10-06.jpg](img/9781430249382_Fig10-06.jpg)\n\n图\
    \ 10-6. 修改后的打开游标度量扩展的列列表\n\n现在测试您的度量扩展。如果一切正常且度量收集工作正常，请完成其创建。您将看到同一个度量扩展的下一个版本，版本号为`2`，出现在**度量扩展**主页上。您现在可以将版本`2`另存为`可部署草稿`并部署它以验证其是否按预期工作。如果该目标上已部署了先前版本的度量扩展，它将被升级。最后一步是发布最新版本，以便所有`EM12c`用户都可以使用它。\n\
    \n当发布度量扩展的更新版本时，可以从显示目标部署的屏幕完成旧部署的升级。您可以从**度量扩展**主页访问此屏幕：点击先前版本度量扩展的已部署目标数量链接，然后点击**部署**按钮（首先选择要升级的所有目标）。完成后，您将在此度量中看到更多列。新的度量扩展收集结果将类似于图\
    \ 10-7。"
- fmt: "![9781430249382_Fig10-07.jpg](images/9781430249382_Fig10-07.jpg)\n\n[Figure\
    \ 10-7](#9781430249382_Ch10.xhtml#_Fig7). Modified Open Cursors metric extension\n\
    \nNote that you might want to have access to more than a single top session with\
    \ open cursors—perhaps to the top ten. For this, you need to convert your metric\
    \ extension to a multirow metric, which requires one or more columns as key columns.\
    \ In this case, you could use the `SID` column as a key and then modify the query\
    \ to return the top ten sessions. Unfortunately, you won’t be able to add a key\
    \ column in the next version of the metric extension but instead need to create\
    \ a new metric extension. Fortunately, it’s easy to clone existing metric extensions\
    \ by using `Actions` ![arrow](images/arrow.jpg) `Create Like` from the Metric\
    \ Extensions home page. Note that there are other limitations on creating a new\
    \ metric extension version—for example, you cannot remove or change the sequence\
    \ of the older columns but can change the Display Name.\n\nEven though the `SID`\
    \ (and arguably `SERIAL#`) is enough for the key column, consider adding other\
    \ columns in the key. This way, the alert notification can include the key values.\
    \ The default alert message (see the advanced settings when you edit the metric\
    \ extension column) is as follows:\n\n*   The value of %columnName% for %keyValue%\
    \ is %value%\n\nThe key value will be produced as a comma-concatenated string\
    \ from all keys, so your alert message will look like this:\n\n*   The value of\
    \ open_cursors_pct for 260,SYSMAN,em12c2.oracloid.com,OMS,oracle,1234 is 72\n\n\
    You can modify your alert message to be more descriptive. For example, your alert\
    \ message template could be as follows:\n\n*   Open cursors is at %value% percent\
    \ for session %keyValue% (SID, username,machine,program,osuser,process)\n\nRight\
    \ from this alert message, you can see which sessions are to blame. Unfortunately,\
    \ it’s currently not possible to refer to the specific key columns of the metric\
    \ to make the alert message more user-friendly. At least, I haven’t found a way\
    \ to do so.\n\nSo far, you have used a SQL adapter to collect metrics. As of the\
    \ `12.1.0.2.0` EM release, six documented adapters are available for metric extensions,\
    \ and one undocumented. Although you will most likely be using two adapters (the\
    \ SQL adapter and OS Command—Multiple Columns adapter), let’s review all the available\
    \ adapters for a more complete picture.\n\n### SQL Adapter\n\nThe SQL adapter\
    \ is the one you used in the preceding example. Because you are already familiar\
    \ with its basic capabilities, let’s just review its additional options.\n\nIf\
    \ your SQL is too long, you might prefer to upload a SQL file instead of specifying\
    \ SQL code inline. The uploaded SQL file is distributed with your metric extension\
    \ to the agents that collect your metrics, and these agents then run SQL from\
    \ the file.\n\nIf you are selecting a predefined set of name-value measurements,\
    \ you can use transposed results instead of creating a two-column metric with\
    \ the name as the key column and value as the data column. For example, say you\
    \ want to collect four metrics by using the query in [Listing 10-3](#9781430249382_Ch10.xhtml#list3).\
    \ You would need to create the first column as a key. However, you would have\
    \ no control of column naming, and alert messages could be only generic.\n\n***[Listing\
    \ 10-3](#9781430249382_Ch10.xhtml#_list3)***.  SQL Statement to Collect Physical\
    \ Reads and Writes\n\n```sql\nselect name, value\n  from v$sysstat\n where name\
    \ in ('physical read total IO requests',\n                'physical read total\
    \ bytes',\n                'physical write total IO requests',\n             \
    \   'physical write total bytes')\n order by name;\n\nNAME                   \
    \               VALUE\n------------------------------------- -----------\nphysical\
    \ read total IO requests       2285653\nphysical read total bytes            \
    \ 21313147392\nphysical write total IO requests      1245633\nphysical write total\
    \ bytes            27849077248\n```\n\nNote that the `ORDER BY` clause is added\
    \ to make sure the results are always in the same order (in this case, the same\
    \ order as in the `IN` list). Now you just need to create four data columns, and\
    \ you can specify more-descriptive names such as *Total Physical Read Requests*\
    \ and a custom alert message:\n\n*   Total Physical Read Requests is too high\
    \ - %value% (warning threshold is %warning_threshold% and critical threshold is\
    \ %critical_threshold%)\n\nAs you can see in this example, you can include the\
    \ thresholds in your alert message.\n\nYou can also specify bind variables in\
    \ SQL text instead of literals. However, this is useful only if you generate the\
    \ value of the variable dynamically, and metric extensions don’t really provide\
    \ much flexibility there (other than predefined variables that are not very useful\
    \ as SQL parameters). If you end up in this situation, you are probably better\
    \ off to redesign and merge those metric extensions into one by using additional\
    \ key column(s). However, if you have multiple metric extensions using the same\
    \ SQL but different literals, then bind variables are the way to go.\n\nIt’s also\
    \ possible to use a `PL/SQL` block returning a cursor (this is what the `Out`\
    \ parameter is used for in the advanced properties) instead of plain SQL. It’s\
    \ useful if you need to use dynamic SQL or perform metric collection differently\
    \ based on certain conditions, such as the Oracle database version or the version\
    \ of the application you are extracting the data from.\n\nThe last example also\
    \ demonstrates an important limitation of metric extensions: they are not very\
    \ useful when working with data that requires additional processing based on a\
    \ number of previous collections (such as the cumulative counters used in the\
    \ example). We are not really interested in the total number of `IO` requests\
    \ since the start of the database instance, but instead in the average number\
    \ of `IO` requests over the collection period. Even though the formula would be\
    \ very simple (the difference between two collected values divided by the collection\
    \ interval), metric extensions do not provide a way of calculating such ratios.\
    \ Of course, you can use a `PL/SQL` block to store previously collected counters\
    \ and calculate the ratio per interval, but it’s not as trivial and also introduces\
    \ much more significant measurement intrusion when your measurements actually\
    \ cause the changes to the database.\n\nThis limitation of cumulative counters\
    \ exists no matter what adapter you are using for your metric extensions. So far\
    \ we’ve focused on the SQL adapter, but let’s look at other options.\n\n### OS\
    \ Command Adapters\n\nThere are three OS Command adapters, and you may use them\
    \ even more frequently than the SQL adapter. OS Command adapters differ from one\
    \ another only in whether they can collect multiple columns and multiple rows:\n\
    \n*   OS Command—Multiple Columns\n*   OS Command—Single Column\n*   OS Command—Multiple\
    \ Values\n\nAll three OS Command adapters have three basic properties: `Command`,\
    \ `Script`, and `Arguments`. The agent basically executes the command line, concatenating\
    \ these three properties. In fact, you can specify them all in a single `Command`\
    \ property, so we’re not sure why there are three properties, other than making\
    \ properties more readable. You can upload the script (or even multiple scripts,\
    \ programs, and other required files) and then reference the location of the uploaded\
    \ files by using the `%scriptsDir%` substitution variable in any of the attributes—for\
    \ example, `%scriptsDir%/myscript.sh` for the `Script` property.\n\nI strongly\
    \ recommend using Perl scripts to ensure that your metric extensions are platform\
    \ independent. Each Oracle Management Agent comes with the same version of Perl,\
    \ so you won’t depend on what Perl version, if any, is installed on the server.\
    \ Just use `%perlBin%/Perl` in the command property, and it will be automatically\
    \ substituted with the location of the Perl binary installed with the Oracle Management\
    \ Agent (usually `<AGENT_HOME>Perl/bin/Perl`)."
