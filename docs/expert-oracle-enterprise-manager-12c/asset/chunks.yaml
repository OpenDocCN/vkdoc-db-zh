- fmt: '# 创建实体与指令


    ## 创建文件夹


    选择“创建文件夹”命令后，会出现一个对话框，允许您指定文件夹的名称（参见[图 6-11](#9781430249382_Ch06.xhtml#Fig11)）。此外，您可以提供文件夹的描述。这些详细信息将显示在软件库中，帮助您快速识别所创建的文件夹。请注意，“父文件夹”选项呈灰色显示。这是默认行为。此框中的文本将根据您在下方文件夹结构中的选择而变化。默认情况下，父文件夹是`/Software
    Library`。


    ![9781430249382_Fig06-11.jpg](images/9781430249382_Fig06-11.jpg)


    **[图 6-11](#9781430249382_Ch06.xhtml#_Fig11). 创建文件夹对话框**


    单击“确定”。如果文件夹创建成功，您将收到确认信息，如[图 6-12](#9781430249382_Ch06.xhtml#Fig12)所示。您还将在指定的父文件夹下的树形结构中看到该文件夹。


    ![9781430249382_Fig06-12.jpg](images/9781430249382_Fig06-12.jpg)


    **[图 6-12](#9781430249382_Ch06.xhtml#_Fig12). 在软件库中创建的文件夹**


    ![image](images/sq.jpg) **注意** 文件夹创建后，唯一有权限删除该文件夹的人是其所有者或超级管理员。


    ## 创建实体


    **实体**是存储在软件库中的已认证软件二进制文件。实体可以是任何软件，包括补丁、虚拟设备映像、参考金映像、应用软件及其关联的指令脚本。如前所述，实体类型大致有两种：Oracle
    拥有的和自定义的。在软件库中，您可以创建两种基本类型的自定义实体：


    *   通用组件

    *   指令


    让我们看看如何在软件库中创建这两种类型。


    ### 创建通用组件


    **通用组件**包含可创建为实体的各种软件项。这些实体使您能够定义一个安装过程，该过程将在生命周期框架内用于打补丁或配置。通用组件列表包括：


    *   配置模板

    *   数据库模板

    *   通用组件

    *   安装介质

    *   Java EE 应用程序

    *   Oracle 应用服务器

    *   Oracle Clusterware 克隆

    *   Oracle 数据库软件克隆

    *   Oracle 中间件主目录金映像

    *   PDB 模板

    *   WebLogic 域配置配置文件


    要在软件库中创建通用组件，您需要选择一个不是 Oracle 拥有的自定义文件夹。如果尚未建立此自定义文件夹，则需要创建它（请参阅前面的“组织实体”部分）。在软件库中选择了自定义文件夹后，“操作”菜单的“创建实体”选项和关联的子菜单将变为可用。选择
    **操作** ![arrow](images/arrow.jpg) **创建实体** ![arrow](images/arrow.jpg) **组件**，如[图
    6-13](#9781430249382_Ch06.xhtml#Fig13)所示。子菜单项“指令”和“裸机配置”也可用；我们很快将讨论指令。本章不讨论裸机系统的配置，因为它超出了数据库补丁的范围。


    ![9781430249382_Fig06-13.jpg](images/9781430249382_Fig06-13.jpg)


    **[图 6-13](#9781430249382_Ch06.xhtml#_Fig13). “操作” ![arrow](images/arrow.jpg)
    “创建实体”选项**


    选择“组件”选项将打开一个对话框，您可以在其中选择要创建的组件类型。如前所述，有许多选项。选择要创建的实体，然后单击“继续”，如[图 6-14](#9781430249382_Ch06.xhtml#Fig14)所示。


    ![9781430249382_Fig06-14.jpg](images/9781430249382_Fig06-14.jpg)


    **[图 6-14](#9781430249382_Ch06.xhtml#_Fig14). 选择组件类型**


    单击“继续”按钮将带您进入“创建通用组件：描述”页面，如[图 6-15](#9781430249382_Ch06.xhtml#Fig15)所示。在此页面上，您可以定义组件的名称、描述和其他属性等具体信息。如果需要，您还可以为组件添加附件。附件可以是从自述文件到许可信息的任何内容。如果要添加附件，请确保文件大小为
    2MB 或更小。此外，您可以添加有关组件的注释。但是，请谨慎操作，因为注释无法删除。


    ![9781430249382_Fig06-15.jpg](images/9781430249382_Fig06-15.jpg)


    **[图 6-15](#9781430249382_Ch06.xhtml#_Fig15). 描述组件**


    您会注意到，在此页面上，Oracle Enterprise Manager 会将您置于一个向导中以帮助您创建组件。可能有四个额外的步骤需要配置，也可能不需要。这完全取决于您尝试使用组件执行的操作。有趣的是，在“设置指令”屏幕（如[图
    6-16](#9781430249382_Ch06.xhtml#Fig16)所示）中，您可以添加指令以告诉组件遵循特定的步骤。我们稍后将深入探讨指令。


    ![9781430249382_Fig06-16.jpg](images/9781430249382_Fig06-16.jpg)


    **[图 6-16](#9781430249382_Ch06.xhtml#_Fig16). 设置指令**


    通过向导完成添加项目后，您将有机会查看您提供的配置。[图 6-17](#9781430249382_Ch06.xhtml#Fig17)显示了“审查”屏幕，该屏幕已为可读性进行了裁剪，并在正常上下文之外显示了选项按钮。关于“审查”屏幕有趣的一点是，您有两种保存组件的选项：**保存**或**保存并上传**。两个按钮都会保存您的组件；但是，第二个按钮还会将您的组件上传到软件库。


    ![9781430249382_Fig06-17.jpg](images/9781430249382_Fig06-17.jpg)


    **[图 6-17](#9781430249382_Ch06.xhtml#_Fig17). 审查并保存通用组件**


    “保存并上传”按钮会自动将您的新组件上传到软件库。组件保存到库后，您将返回到软件库主页。在页面顶部，您可以看到显示了确认消息，并且您的新组件列在创建组件时指定的文件夹中（参见[图
    6-18](#9781430249382_Ch06.xhtml#Fig18)）。


    ![9781430249382_Fig06-18.jpg](images/9781430249382_Fig06-18.jpg)


    **[图 6-18](#9781430249382_Ch06.xhtml#_Fig18). 确认已创建的通用组件及其位置**


    ### 创建指令


    现在您了解了什么是通用组件，让我们看看指令。**指令**是软件库中的实体，代表一组可以执行的指令。这些实体用于将脚本与软件组件和映像相关联。这些脚本包含如何解释和处理特定软件组件或映像内容的说明。


    设置指令时，必须使用与通用组件相同的界面。要创建指令，您需要从软件库主页开始（选择 **Enterprise** ![arrow](images/arrow.jpg)
    **Provisioning and Patching** ![arrow](images/arrow.jpg) **Software Library**）。请记住，为了创建新指令，您需要选择一个不是
    Oracle 拥有的自定义文件夹。


    要开始创建新指令，您将使用软件库中的“操作”菜单。这与您创建通用组件时使用的菜单相同。但是，这次您选择 **操作** ![arrow](images/arrow.jpg)
    **创建实体** ![arrow](images/arrow.jpg) **指令**，如[图 6-19](#9781430249382_Ch06.xhtml#Fig19)所示。


    ![9781430249382_Fig06-19.jpg](images/9781430249382_Fig06-19.jpg)


    **[图 6-19](#9781430249382_Ch06.xhtml#_Fig19). 创建新指令**'
  raw: 'After selecting the Create Folder command, a dialog box appears, allowing
    you to specify the name of the folder (see [Figure 6-11](#9781430249382_Ch06.xhtml#Fig11)).
    Additionally, you can provide a description of the folder. These details will
    show up in the Software Library and help you quickly identify the folder you created.
    Notice that the Parent Folder option is grayed out. This is the default behavior.
    The text in this box will change based on the selection you make in the folder
    structure below it. By default, the parent folder is /Software Library.


    ![9781430249382_Fig06-11.jpg](images/9781430249382_Fig06-11.jpg)


    [Figure 6-11](#9781430249382_Ch06.xhtml#_Fig11). Create Folder dialog box


    Click OK. If the folder is created successfully, you will receive a confirmation,
    as shown in [Figure 6-12](#9781430249382_Ch06.xhtml#Fig12). You will also be able
    to see the folder in the tree structure under the folder you specified as the
    parent folder.


    ![9781430249382_Fig06-12.jpg](images/9781430249382_Fig06-12.jpg)


    [Figure 6-12](#9781430249382_Ch06.xhtml#_Fig12). Folder created in the Software
    Library


    ![image](images/sq.jpg) **Note**  After a folder is created, the only person with
    the privilege to delete that folder is its owner or a Super Administrator.


    Creating Entities


    *Entities* are certified software binaries that are stored in the Software Library.
    An entity can be any software that includes patches, virtual appliance images,
    reference gold images, application software, and their associated directive scripts.
    As noted earlier, there are two, broadly defined entity types: Oracle-owned and
    custom. From within the Software Library, you can create two basic types of custom
    entities:


    *   Generic components

    *   Directives


    Let’s take a look at how to create both types within the Software Library.


    Creating Generic Components


    *Generic components* consist of a broad range of software items that can be created
    as entities. These entities enable you to define an installation process that
    will be used within the lifecycle framework for patching or provisioning. The
    list of generic components includes the following:


    *   Configuration template

    *   Database template

    *   Generic component

    *   Installation media

    *   Java EE application

    *   Oracle Application Server

    *   Oracle Clusterware Clone

    *   Oracle Database Software Clone

    *   Oracle Middleware Home Gold Image

    *   PDB template

    *   WebLogic domain provisioning profile


    To create generic components in the Software Library, you need to select a custom
    folder that is not an Oracle-owned folder. You need to create this custom folder
    if it has not already been established (see the “Organizing Entities” section
    earlier). After you have selected the custom folder in the Software Library, the
    Actions menu’s Create Entity option and associated submenus become enabled. Choose
    Actions ![arrow](images/arrow.jpg) Create Entity ![arrow](images/arrow.jpg) Component,
    as shown in [Figure 6-13](#9781430249382_Ch06.xhtml#Fig13). The submenu items
    Directives and Bare Metal Provisioning are also available; we will discuss directives
    shortly. Provisioning of bare metal systems is not discussed in this chapter,
    because it is outside the scope of database patching.


    ![9781430249382_Fig06-13.jpg](images/9781430249382_Fig06-13.jpg)


    [Figure 6-13](#9781430249382_Ch06.xhtml#_Fig13). The Actions ![arrow](images/arrow.jpg)
    Create Entity options


    Selecting the Component option opens a dialog box where you can select the type
    of component you want to create. As listed earlier, there are many options. Choose
    the entity you would like to create and then click Continue, as shown in [Figure
    6-14](#9781430249382_Ch06.xhtml#Fig14).


    ![9781430249382_Fig06-14.jpg](images/9781430249382_Fig06-14.jpg)


    [Figure 6-14](#9781430249382_Ch06.xhtml#_Fig14). Choosing the type of component


    Clicking the Continue button takes you to the Create Generic Component: Describe
    page, shown in [Figure 6-15](#9781430249382_Ch06.xhtml#Fig15). On this page, you
    can define specifics such as the component’s name, description, and other attributes.
    You can also add attachments to the component if desired. Attachments can be anything
    from a readme file to licensing information. If you are going to add attachments,
    make sure the files are 2MB or smaller. Additionally, you can add notes about
    the component. However, be cautious, because notes cannot be removed.


    ![9781430249382_Fig06-15.jpg](images/9781430249382_Fig06-15.jpg)


    [Figure 6-15](#9781430249382_Ch06.xhtml#_Fig15). Describing the component


    What you will notice about this page is that Oracle Enterprise Manager places
    you into a wizard to help you create the component. There are four additional
    steps that may or may not have to be configured. It all depends on what you are
    trying to do with the component. What is interesting at this point is that on
    the Set Directives screen, shown in [Figure 6-16](#9781430249382_Ch06.xhtml#Fig16),
    you can add directives to tell the component to follow specific steps. We will
    dive more into directives in a moment.


    ![9781430249382_Fig06-16.jpg](images/9781430249382_Fig06-16.jpg)


    [Figure 6-16](#9781430249382_Ch06.xhtml#_Fig16). Setting  directives


    When finished adding items through the wizard, you have the opportunity to review
    the configurations that you provided. [Figure 6-17](#9781430249382_Ch06.xhtml#Fig17)
    shows the Review screen, which is cropped for readability and shows the option
    buttons out of their normal context. The interesting thing about the Review screen
    is that you have two options for saving the component: Save, or Save and Upload.
    Both buttons will save your component; however, the second one will also upload
    your component to the Software Library.


    ![9781430249382_Fig06-17.jpg](images/9781430249382_Fig06-17.jpg)


    [Figure 6-17](#9781430249382_Ch06.xhtml#_Fig17). Reviewing and saving the generic
    component


    The Save and Upload button automatically uploads your new component to the Software
    Library. After the component is saved to the library, you are returned to the
    Software Library home page. At the top of the page, you can see that a confirmation
    message is displayed and your new component is listed in the folder you identified
    when creating the component (see [Figure 6-18](#9781430249382_Ch06.xhtml#Fig18)).


    ![9781430249382_Fig06-18.jpg](images/9781430249382_Fig06-18.jpg)


    [Figure 6-18](#9781430249382_Ch06.xhtml#_Fig18). Confirmation of the created generic
    component and its location


    Creating DirectivesDirectives:


    Now that you understand what generic components are, let’s take a look at directives.
    *Directives*are entities in the Software Library that represent a set of instructions
    that can be performed. These entities are used to associate scripts with software
    components and images. These scripts contain the directions on how to interpret
    and process the contents of a particular software component or image.


    When setting up directives, you have to use the same interface as you use for
    generic components. To create a directive, you start at the Software Library home
    page (choose Enterprise ![arrow](images/arrow.jpg) Provisioning and Patching ![arrow](images/arrow.jpg)
    Software Library). Remember, in order to create a new directive, you need to select
    a custom folder that is not owned by Oracle.


    To start creating a new directive, you will use the Actions menu in the Software
    Library. This is the same menu that you used to create a generic component. However,
    this time you choose Actions ![arrow](images/arrow.jpg) Create Entity ![arrow](images/arrow.jpg)
    Directive, as shown in [Figure 6-19](#9781430249382_Ch06.xhtml#Fig19).


    ![9781430249382_Fig06-19.jpg](images/9781430249382_Fig06-19.jpg)


    [Figure 6-19](#9781430249382_Ch06.xhtml#_Fig19). Creating a new directive'
