- fmt: '# Configuring Database Provisioning Tasks


    [Figure 6-71](#9781430249382_Ch06.xhtml#_Fig71). Providing configuration details


    The tasks outlined on the Configure page are required for provisioning a database
    to a host:


    1.  The `Setup Hosts` task allows us to set normal and privileged usernames and
    passwords to be used against the host. These passwords can be set up in advance
    under `Setup` → `Security` → `Named Credentials` or created during the task. Once
    all the passwords are configured, a green check mark appears in the status column.

    2.  The second task is to specify the software that you want to deploy. Click
    the `Deploy Software` link, and you are taken to a single-step wizard where you
    can specify the source, destination, and additional parameters for this deployment
    (see [Figure 6-72](#9781430249382_Ch06.xhtml#Fig72)). To deploy the database software,
    you need to select the software to deploy. Click the search tool in the Source
    section and then select the software from the Software Library. Next, provide
    the details for the deployment, such as destination and any additional parameters
    needed for deployment. Click `Next`.


    ![9781430249382_Fig06-72.jpg](images/9781430249382_Fig06-72.jpg)


    [Figure 6-72](#9781430249382_Ch06.xhtml#_Fig72). Selecting software locations


    3.  The third task in the configuration to provision a database is the `Create
    Database` task. Just as in the first two steps, you click `Create Database` to
    start the wizard. This six-step wizard is similar to the Oracle Database Configuration
    Assistant, but this one is inside Oracle Enterprise Manager. Click `Next` to walk
    through the wizard and configure many items such as `SID` and passwords, as shown
    in [Figure 6-73](#9781430249382_Ch06.xhtml#Fig73).


    ![9781430249382_Fig06-73.jpg](images/9781430249382_Fig06-73.jpg)


    [Figure 6-73](#9781430249382_Ch06.xhtml#_Fig73). Identification and placement


    4.  The last of the four tasks is `Compliance Standards`. Click `Compliance Standards`
    to access its one-step wizard. Here you assign a compliance standard to the new
    database. This greatly speeds up the configuration of databases to internal compliance
    standards (see [Figure 6-74](#9781430249382_Ch06.xhtml#Fig74)). For this example,
    select `None` and click `Next`.


    ![image](images/sq.jpg) `Note` For more information on compliance configuration
    within the Oracle Enterprise Manager, please see the Oracle documentation.


    ![9781430249382_Fig06-74.jpg](images/9781430249382_Fig06-74.jpg)


    [Figure 6-74](#9781430249382_Ch06.xhtml#_Fig74). Setting configuration standards


    5.  Once everything is configured, as shown in [Figure 6-75](#9781430249382_Ch06.xhtml#Fig75),
    you can move on to the next steps in the wizard. Click `Next`.


    ![9781430249382_Fig06-75.jpg](images/9781430249382_Fig06-75.jpg)


    [Figure 6-75](#9781430249382_Ch06.xhtml#_Fig75). Configuration is completed


    The third step in the wizard is skipped because we are not using any custom properties.
    In step 4, the Oracle Enterprise Manager schedules the deployment of the software.
    You can schedule the deployment to happen immediately (which is the default) or
    at a later time. Additionally, you can specify whether notifications should be
    used to indicate any issues or concerns, or to indicate when it succeeds. If there
    is nothing to change on this page, click `Next`.


    The final step in the provisioning of a database is step 5, the Review step (see
    [Figure 6-76](#9781430249382_Ch06.xhtml#Fig76)). From here you can see all the
    options that you configured and submit the job.


    ![9781430249382_Fig06-76.jpg](images/9781430249382_Fig06-76.jpg)


    [Figure 6-76](#9781430249382_Ch06.xhtml#_Fig76). Reviewing options for provisioning
    the Oracle database (partial screen)


    After submitting the job, you will be taken to the Provisioning page, where you
    can monitor the job. This page is loaded with a lot of valuable information. You
    can either stay on this page or move away and work on something else while the
    database is provisioned.


    ## Summary


    EM12c is a valuable tool for patching and provisioning within your environment.
    To be flexible and provide a lot of options, Oracle Enterprise Manager relies
    on the Software Library to be the central storage location for software such as
    patches, and to install software and gold images. Patching and provisioning are
    two valuable options within the lifecycle of Enterprise Manager. The options enable
    administrators to quickly patch old environments and provision new environments
    very quickly and securely.


    # CHAPTER 7


    # Managing and Monitoring Best Practices


    by Leighton Nelson


    Oracle Enterprise Manager Cloud Control 12c is built from the ground up to manage
    and monitor your enterprise infrastructure and applications across the entire
    IT stack. To effectively manage your environment, various techniques and best
    practices should be followed. Monitoring your environment ensures that no component
    goes unwatched. By using events, metrics, and incidents, you can provide yourself
    a comprehensive picture of the environment at any point in time.


    This chapter presents some of the best practices to apply to monitoring and managing
    your environment with EM12c. The following best-practice areas are discussed:


    *   Metric thresholds

    *   Monitoring templates

    *   Administration groups

    *   Template collections

    *   Synchronization schedules

    *   Incident management


    ## Metric Thresholds


    `Metric thresholds` are the main features when it comes to monitoring. They enable
    you to be proactive so you can identify issues and address them in a timely manner.
    Enterprise Manager Cloud Control includes many types of metrics, which can be
    used for monitoring targets. Several classes of metrics are available, depending
    on the type of target. Metric thresholds should be configured so that alerts are
    triggered and sent via notifications to administrators.


    Two levels of severity are associated with metric thresholds: `warning` and `critical`.
    For example, you may set a metric threshold for a tablespace in the database to
    send a warning alert when the tablespace becomes more than 80 percent full. Then
    you might set another threshold to send a critical alert when the tablespace becomes
    more than 95 percent full. A warning threshold will allow enough time to address
    issues before they become critical. Critical alerts would indicate an impending
    problem and require immediate action.


    When defining your thresholds, first determine the important components on which
    thresholds should be set. This could include database instances, listeners, and
    filesystems. Metrics can then be selected from EM12c for each target type.


    To view all metric thresholds and their values for a database instance, follow
    these steps:


    1.  From the Oracle Database drop-down menu, choose `Monitoring` → `All Metrics`,
    as shown in [Figure 7-1](#9781430249382_Ch07.xhtml#Fig1).


    ![9781430249382_Fig07-01.jpg](images/9781430249382_Fig07-01.jpg)


    [Figure 7-1](#9781430249382_Ch07.xhtml#_Fig1). Viewing a list of metric thresholds


    2.  A display of metrics and thresholds similar to that in [Figure 7-2](#9781430249382_Ch07.xhtml#Fig2)
    displays. Set thresholds only for the metrics that you care about. Selecting too
    many metrics could generate a lot of “white noise” and cause critical alerts to
    be overlooked. You should also disable metrics that you don''t need for reporting
    or monitoring purposes in order to reduce storage consumption.


    ![9781430249382_Fig07-02.jpg](images/9781430249382_Fig07-02.jpg)


    [Figure 7-2](#9781430249382_Ch07.xhtml#_Fig2). Database metrics and their current
    threshold settings'
