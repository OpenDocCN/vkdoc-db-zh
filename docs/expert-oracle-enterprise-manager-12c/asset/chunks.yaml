  trans: '# 管理工程化系统


    作者：Bobby Curtis 和 Anand Akela


    您已经了解到，`企业管理器云控制 12c` 为 IT 基础设施和应用程序提供了一个标准化的监控解决方案。它通过自动化将目标分配到组、应用模板以及管理目标成员资格的工作流程，提高了运营效率。通过合理规划标准和操作流程，`企业管理器`
    还通过规则集实现一致的事件、 incident 和问题管理，为管理员带来显著效益。最后，您已经学习了上述功能的最佳实践，这些实践将使您在使用 `EM12c`
    时，对环境的管理和监控变得更加无缝。


    ![图片](img/frontdot.jpg)


    Oracle 工程化系统是预先集成的硬件和软件集合，旨在降低企业基础设施的复杂性和成本，同时提高关键业务系统的生产力和性能。部分工程化系统是为企业内的特定功能设计的。例如，`Oracle
    Exadata 数据库一体机` 最初是为数据仓库设计的，但其当前版本已扩展为同时支持数据仓库和联机事务处理（`OLTP`）。其他工程化系统则服务于更通用的目的。例如，`Oracle
    数据库一体机` 为中小企业提供了一个支持双节点 `真正应用集群 (RAC)` 的解决方案。


    工程化系统包含完整的硬件基础设施（例如服务器、存储和网络），这些在传统配置中通常是分开的实体。这些工程化系统还附带一个完整的软件栈，可开箱即用运行系统。在这个层面上硬件和软件的统一，允许快速的实施周期。


    在本章中，您将了解工程化系统以及如何使用 `Oracle 企业管理器 12c` 来管理它们，同时还将了解如何查看和监控这些系统。


    ## 工程化系统类型


    在深入了解如何管理工程化系统之前，让我们先概览一下 Oracle 提供的工程化系统：


    *   `Oracle Exadata 数据库一体机`：通过将查询下推到存储单元层，为所有数据库应用程序（包括 `OLTP` 和数据仓库）提供极致性能。是整合数据库工作负载到私有云或数据中心的理想平台。

    *   `Oracle Exalogic 弹性云`：为企业应用程序（Java、Oracle 应用程序或第三方应用程序）和中间件提供极速性能，帮助企业无论在数据中心还是在云端都能运行得更快。

    *   `Oracle SPARC SuperCluster T4-4`：提供高性能、高可用性、可扩展性和安全性的通用解决方案，适用于 Oracle 和第三方应用程序。作为整合多样化环境的理想选择，该工程化系统由新型
    `SPARC T4` 处理器和 `Oracle Solaris 11` 提供支持。在单个工程化系统中结合了 `Oracle Exadata 数据库一体机`
    和 `Oracle Exalogic 弹性云` 的优势。

    *   `Oracle 数据库一体机`：为中端数据库工作负载提供了出色的开箱即用解决方案。旨在帮助中小企业或独立业务部门以创纪录的时间部署企业级解决方案。

    *   `Oracle Exalytics 内存分析一体机`：提供首个用于商业智能（`BI`）建模、预测和规划应用程序的内存分析工程化系统，同时具备高级数据可视化功能，可从大型数据集中获得可操作的洞察。

    *   `Oracle 大数据一体机`：提供优化的硬件和软件，为获取、组织和加载非结构化数据到 `Oracle 数据库` 提供了一个完整、易于部署的解决方案。

    *   `Sun ZFS 存储一体机`：为使用网络附加存储（`NAS`）的企业应用程序、虚拟化、私有/云部署、存储整合和数据保护的客户提供强大、高效、快速的数据存储。


    ## 工程化系统生命周期


    `Oracle 企业管理器` 提供了对 `Oracle 工程化系统` 的全面管理，贯穿其上部署的应用程序或数据库的整个生命周期。工程化系统生命周期包含四个阶段，如
    图 8-1 所示：


    *   工程化系统的规划与设置

    *   用于部署的工程化系统测试

    *   为实现最佳性能和效率的管理

    *   为合规性和功能改进而进行的维护


    ![9781430249382_Fig08-01.jpg](img/9781430249382_Fig08-01.jpg)


    图 8-1. 工程化系统生命周期


    尽管所有 `Oracle 工程化系统` 都共享此生命周期并可从 `Oracle 企业管理器 12c` 进行管理，但本章中的示例均针对 `Oracle Exadata
    数据库一体机`。


    ## 支持的硬件和软件


    在深入探讨工程化系统生命周期的各个阶段之前，最好先了解 `EM12c` 支持哪些硬件和软件。以下 `Exadata 数据库一体机` 配置通过 `12.1.0.1`、`12.1.0.2`
    和 `12.1.0.3` 的插件得到支持：


    *   `V2`

    *   `X2-2`

    *   `X2-8`

    *   `X3-2`

    *   `X3-8`

    *   `Partitioned`


    受支持配置的部分是随 `Exadata 数据库一体机` 提供的组件。这些组件在 `EM12c` 中受支持：


    ```

    Exadata Storage Server Software 11g Release 2 (11.2.2.3.0 through 11.2.3.2)

    InfiniBand Switch Release 1.1.3.0.0 to 1.3.3.2.0

    Integrated Lights Out Manager (ILOM), 3.0.9.27.a r58740

    ILOM IPMItool Release 1.8.10.3 (for Oracle Linux)

    ILOM IPMItool Release 1.8.10.4 (for Oracle Solaris)

    Avocent MergePoint Unity KVM Switch Release 1.2.8

    Power Distribution Unit Release 1.04

    Cisco—Cisco IOS Software, Catalyst 4500 L3 Switch Software (cat4500-IPBASE-M),
    Version 12.2(46)SG, RELEASE SOFTWARE (fc1)

    ```'
- fmt: 'With every new revision of an Oracle product, some items become desupported.
    The Exadata Database Machine has a few desupported hardware components. The following
    hardware configurations have been desupported with `Oracle Enterprise Manager
    12c` or `12c Bundle Pack 1 (BP1)`:


    *   `V1` hardware

    *   `Super Clusters`

    *   `Expansion rack`

    *   `Multirack Exadata Database Machine`


    ![image](images/sq.jpg) **Note** In the `Exadata plug-in` releases `12.1.0.1`
    and `12.1.0.2`, using client network hostnames for compute nodes as `Oracle Enterprise
    Manager` target names is not supported. This is supported in the `12.1.0.3` plug-in.


    With the evolution of technology, hardware standards change and provide new ways
    of performing tasks. Engineered systems, especially the `Oracle Exadata Database
    Machine`, are susceptible to these changes. `EM12c`’s plug-in architecture was
    designed to work with not only the software stack but also the hardware stack.
    Moving forward, this plug-in architecture will allow for changes in existing engineered
    systems and future releases of the hardware.


    ## Planning and Setup Phase


    After an `Oracle Exadata Database Machine` arrives on site and has been acclimated
    to its surroundings, it can be configured with the network. The next task is to
    set up monitoring for the machine with `EM12c`.


    ![image](images/sq.jpg) **Note** The `Oracle Exadata Database Machine` is a complex
    piece of enterprise infrastructure. Its compact design makes it susceptible to
    condensation if it is not acclimated to its environment. We recommend letting
    it sit on site for 48 to 72 hours before plugging it in for configuration.


    Although `EM12c` can monitor `Exadata` out of the box, you still need to plan
    and configure monitoring before deploying applications to the `Exadata` and using
    its capabilities. Typically, the following steps are performed in order to configure
    the `Exadata` for proactive monitoring:


    1.  Install the management agents to compute nodes.

    2.  Launch `autodiscovery`.

    3.  Specify component credentials.

    4.  Review configurations and complete setup.


    After following these simple steps to discover `Oracle Exadata Database Machine`
    components, the configuration can be completed in a few minutes.


    ## Installing the Management Agent


    As with anything in `Oracle Enterprise Manager`, the first step starts with deploying
    the management agents to the `Oracle Exadata` compute nodes and then pushing the
    `Oracle Exadata plug-in` to the agents.


    ![image](images/sq.jpg) **Note** `Oracle Exadata` monitoring, like monitoring
    any other target in `EM12c`, is done through a set of plug-ins that is deployed
    at the management server and the agents.


    [Figure 8-2](#9781430249382_Ch08.xhtml#Fig2) shows how the `EM12c` agent interacts
    with the `Exadata plug-in` and other components of the `Exadata Database Machine`.


    ![9781430249382_Fig08-02.jpg](images/9781430249382_Fig08-02.jpg)


    [Figure 8-2](#9781430249382_Ch08.xhtml#_Fig2). `Oracle Enterprise Manager 12c`
    agent and `Exadata plug-in`


    Deploying the management agent to the compute nodes is done the same way as deploying
    the agent through `Oracle Enterprise Manager` for any other host target. The preferred
    method is to push the agent from `Enterprise Manager`. This process is discussed
    in more detail in [Chapter 2](#9781430249382_Ch02.xhtml).


    ## Launching Autodiscovery


    Once the management agents and `Exadata plug-ins` have been deployed, you can
    perform automatic discovery of targets to pull the `Exadata` components into `EM12c`.


    As with many targets types in `EM12c`, there is a wizard-driven discovery for
    `Exadata`. `Exadata` hardware can be added automatically through this wizard.
    To access the wizard from the `Enterprise Manager` home page, choose `Setup` ![arrow](images/arrow.jpg)
    `Add Targets` ![arrow](images/arrow.jpg) `Add Targets Manually`. The page that
    you land on should look like [Figure 8-3](#9781430249382_Ch08.xhtml#Fig3).


    ![9781430249382_Fig08-03.jpg](images/9781430249382_Fig08-03.jpg)


    [Figure 8-3](#9781430249382_Ch08.xhtml#_Fig3). `Add Targets Manually` page


    Once on the `Add Targets Manually` page, select the radio button for adding a
    `Non-Host` target. This enables you to then select the `Oracle Exadata Database
    Machine` option from the drop-down menu. Finally, click the button to use the
    guided discovery process.


    This takes you to the `Oracle Exadata Database Machine Discovery` page, shown
    in [Figure 8-4](#9781430249382_Ch08.xhtml#Fig4). Here you have the option of either
    adding a new database machine with associated hardware or discovering newly added
    hardware. After selecting an option, click the `Discover Targets` button.


    ![9781430249382_Fig08-04.jpg](images/9781430249382_Fig08-04.jpg)


    [Figure 8-4](#9781430249382_Ch08.xhtml#_Fig4). `Oracle Exadata Database Machine
    Discovery` page


    ## Specifying Component Credentials


    After clicking the `Discover Targets` button, `EM12c` launches the `Database Machine
    Discovery Wizard`, shown in [Figure 8-5](#9781430249382_Ch08.xhtml#Fig5). The
    wizard will walk you through the ten steps needed to add an `Exadata Database
    Machine` to `EM12c`. During each of the discovery steps, the user is requested
    to provide login credentials for the various `Oracle Exadata` components such
    as `Exadata cells` and `InfiniBand switches`.


    ![9781430249382_Fig08-05.jpg](images/9781430249382_Fig08-05.jpg)


    [Figure 8-5](#9781430249382_Ch08.xhtml#_Fig5). `Database Machine Discovery Wizard`


    As you work through the discovery wizard, on the `SNMP Subscription` step ([Figure
    8-6](#9781430249382_Ch08.xhtml#Fig6)), it is best to enable `SNMP` subscriptions
    on the cell and `InfiniBand switch` targets. This allows the management agent
    to automatically receive `SNMP traps` from the components being monitored.


    ![9781430249382_Fig08-06.jpg](images/9781430249382_Fig08-06.jpg)


    [Figure 8-6](#9781430249382_Ch08.xhtml#_Fig6). `SNMP Subscription` step


    ## Reviewing Configuration and Completing Setup


    Finally, when the wizard completes, you will be on the `Review` screen, shown
    in [Figure 8-7](#9781430249382_Ch08.xhtml#Fig7). Verify all information before
    clicking `Submit` and finishing the discovery wizard. You then land on the `Target
    Creation Summary` page; click `OK`. This brings you to the `Target Promotion`
    page, where the targets are now displayed as managed targets.


    ![9781430249382_Fig08-07.jpg](images/9781430249382_Fig08-07.jpg)


    [Figure 8-7](#9781430249382_Ch08.xhtml#_Fig7). `Exadata Database Machine Discovery
    Review` page


    After the `Exadata` monitoring is set up, `EM12c` can provide a unified view of
    `Oracle Exadata` hardware and software, as shown in [Figure 8-8](#9781430249382_Ch08.xhtml#Fig8).
    You can also see a detailed view of all of its components, such as the `InfiniBand
    switches`, `storage cells`, and so forth.


    ![9781430249382_Fig08-08.jpg](images/9781430249382_Fig08-08.jpg)


    [Figure 8-8](#9781430249382_Ch08.xhtml#_Fig8). `Oracle Exadata schematic view`


    ![image](images/sq.jpg) **Note** In addition to the automatic discovery process,
    an automation kit is available to help speed up the discovery. This kit simplifies
    the process of deploying the agent on each of the compute nodes by allowing the
    agent to be pushed to all compute nodes in one go.


    More information on downloading and configuring the automation kit can be located
    in `Doc ID: 1440951.1` in `My Oracle Support`.


    You can see the availability information for each component in the `schematic
    view`. The `Overview` section at the top shows the summary of incidents and availability
    information for all targets within the database machine. It also has the option
    to display the temperature for each component. The target navigation bar on the
    left of the `schematic view` allows drilling down to any particular component
    of your choice. The schematic display also supports viewing multiple `Exadata
    nodes` that are connected to each other using the same `InfiniBand network`.'
  raw: 'With every new revision of an Oracle product, some items become desupported.
