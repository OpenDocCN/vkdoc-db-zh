    的任何作业。这条信息可以用来替代报告每个单独的作业。选择权在管理员手中，但了解如何查找作业信息至关重要，特别是当默认选项不符合管理员偏好时。


    **权限**


    我多次遇到过计划作业之间的冲突，例如，一个任务是通过 `cron` 的 shell 脚本计划的，另一个是在 `DBMS_SCHEDULER` 中计划的，而第三个则是在
    `EM 作业调度器` 中计划的。`EM12c 作业服务` 提供了一个可以处理多种任务脚本格式和作业类型的作业调度器，并具有单一的作业界面来管理作业。作业管理的安全性是管理员创建步骤的一部分，用于保护能够创建、管理和删除作业的用户。


    在 `EM12c` 环境中，有多种方法可以查看谁可以创建和管理作业。由于管理员可能并不总是知道谁在环境中创建作业、创建了多少以及频率如何，因此确保 `EM`
    作业需求不会损害系统性能至关重要。


    以下查询清晰地展示了哪些用户被授予了创建和计划作业的权限，如 图 11-26 所示。


