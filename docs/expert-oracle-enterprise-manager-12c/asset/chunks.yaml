    \ Enterprise Manager 软件组件（即数据库、管理服务、代理和操作系统）打补丁。正是考虑到这些担忧，Oracle Enterprise Manager\
    \ 被设计为通过使用不同的高可用性机制来满足期望的服务和操作级别。\n\n## 高可用性\n\nEnterprise Manager 架构中的每个组件都应具有高可用性，以实现完整的高可用配置。需要考虑的主要组件如图\
    \ 13-1 所示，如下：\n\n*   `Management Agent`：在目标上运行，与`OMS`通信并发送指标。\n*   `Management\
    \ Server`：Enterprise Manager 的核心，提供`Management Services`。\n*   `Repository`：在\
    \ Oracle 数据库中存储来自监控目标的持久数据。\n*   `Software Library`：存储用于修补、配置以及代理和插件部署的文件。\n\n\
    ![9781430249382_Fig13-01.jpg](img/9781430249382_Fig13-01.jpg)\n\n图 13-1 .  Enterprise\
    \ Manager Cloud Control 12c 架构\n\n可以为每个组件配置不同级别的复杂性和成本的不同级别的高可用性。在考虑高可用性要求时，应在成本、复杂性、性能和数据丢失方面做出最小的权衡。通常，复杂性和高可用性级别是成比例的。\n\
    \n`Oracle Management Agent`应配置为开机启动。这确保了在服务器重启后不需要手动干预，并能在服务中断后快速启用目标监控。在 Unix\
    \ 和 Linux 操作系统上，一个名为`gcstartup`的脚本被放置在`/etc/init.d`中，并在特定的运行级别下运行。在 Microsoft\
    \ Windows 上，会创建一个服务以在启动时自动启动。\n\nOracle 为 Enterprise Manager Cloud Control 定义了四个高可用性级别。这些级别在表\
    \ 13-1 中进行了总结。本章仅涵盖级别 1 到 3。\n\n表 13-1. Enterprise Manager 高可用性级别\n\n![Table13-1.jpg](img/Table13-1.jpg)\n\
    \n### Oracle Management Agent\n\n`Oracle Management Agent`负责发送其安装主机的指标和待处理警报。为了提供高可用性，应为代理启用以下功能：\n\
    \n*   启用代理在操作系统启动时自动启动。这应在运行`root.sh`脚本后自动配置。\n*   在冗余存储上安装代理。这包括配置了 RAID 的存储后端。\n\
    *   为代理看门狗进程配置重启参数。看门狗进程负责基于以下环境变量重启代理：\n    ```\n    EM_MAX_RETRIES  表示看门狗进程在\
    \ `EM_MAX_RETRY_WINDOW` 内尝试重启代理的最大次数。默认设置为 3。\n    EM_RETRY_WINDOW  表示与 `EM_MAX_RETRIES`\
    \ 一起使用的时间间隔，用于在尝试启动管理代理之前进行等待。默认设置为 600 秒。\n    ```\n\n安装 Enterprise Manager 代理后，应执行`<AGENT_HOME>/root.sh`脚本。这将在\
    \ Linux 和某些 Unix 操作系统上创建以下控制管理代理启动的脚本：\n\n*   `/etc/init.d/gcstartup`\n*   `/etc/init/gcstartup`\n\
    *   `/etc/rc.d/init.d/gcstartup`\n\n如果这些文件不存在，请确保已执行`<AGENT_HOME>/root.sh`脚本。\n\
    \n代理的丢失或损坏将导致其关联目标的监控和指标数据上传丢失。同样，如果代理关闭，目标将无法与管理服务器通信，导致可管理性丧失。\n\n### Management\
    \ Repository\n"
- fmt: 'The repository is the persistent store for monitoring data uploaded by agents.
    It stores metrics and configuration data from all monitored targets. Loss of the
    repository will result in management server failure. It is recommended to enable
    database high-availability features such as Real Application Clusters (`RAC`)
    or `RAC One Node`, Automatic Storage Management (`ASM`) for data file storage
    (depending on redundancy levels and back-end RAID configuration), and Data Guard
    for the repository. Additionally, the management service should be configured
    to use the Single Client Access Name (`SCAN`) and a nondefault `RAC` service name
    if the repository is configured as a `RAC` database. The following is an example
    of configuring the management service for use with a `RAC` database:

    ```

    emctl config oms -store_repos_details -repos_conndesc "

    (DESCRIPTION= (ADDRESS=(PROTOCOL=TCP)

    (HOST=emrep-scan.example.com)(PORT=1521) )

    (CONNECT_DATA=(SERVER=DEDICATED) (SERVICE_NAME = emrep)))"

    -repos_user sysman

    ```


    [Figure 13-2](#9781430249382_Ch13.xhtml#Fig2) shows an example of an `OMS` configured
    with a `RAC` repository database using the `SCAN` name. For additional details
    on configuring `SCAN`, see the *Oracle Clusterware Administration and Deployment
    Guide 11g Release 2 (11.2)*.


    ![9781430249382_Fig13-02.jpg](images/9781430249382_Fig13-02.jpg)


    [Figure 13-2](#9781430249382_Ch13.xhtml#_Fig2) .  Repository database configured
    using `RAC` database


    Consider using the Maximum Availability Architecture[¹](#9781430249382_Ch13.xhtml#Fn1)
    (`MAA`) Advisor in Enterprise Manager Cloud Control 12c to configure additional
    `HA` components, including the following:

    *   Enable `ARCHIVELOG` mode so that consistent hot backups of the database can
    be performed.

    *   Enable block checksums to enable Oracle to detect corruption due to physical
    disks or storage systems. Set the `DB_BLOCK_CHECKSUM` parameter to `TYPICAL` or
    `FULL`.

    *   Configure the size of redo log files and groups appropriately. Optimize `I/O`
    throughput and performance of the database so that log switches do not occur too
    frequently. Use of the Redo Log Sizing Advisor (enabled by setting `FAST_START_MTTR_TARGET`)
    can help determine the optimal sizes.

    *   Use a Fast Recovery Area[²](#9781430249382_Ch13.xhtml#Fn2) to store recovery-related
    files such as redo logs and archive logs. Oracle can then use suggested backup
    mechanisms that use the Fast Recovery Area.

    *   Enable Flashback Database to enable faster database recovery using flashback
    logs.

    *   Use fast-start fault recovery to control the instance-recovery time. Set the
    initialization parameter `FAST_START_MTTR_TARGET` to specify the number of seconds
    that instance recovery should take.

    *   Enable database block checking to enable early detection and prevention of
    data and memory corruption. Set `DB_BLOCK_CHECKING` to `TRUE` or `FULL`.


    After configuring the components, you can monitor the status of each by using
    the High Availability Console, shown in [Figure 13-3](#9781430249382_Ch13.xhtml#Fig3).


    ![9781430249382_Fig13-03.jpg](images/9781430249382_Fig13-03.jpg)


    [Figure 13-3](#9781430249382_Ch13.xhtml#_Fig3) .  Enterprise Manager Cloud Control
    12c High Availability Console


    ![image](images/sq.jpg) **Note**  The management repository should be configured
    in its own database to ensure that operations on the repository do not affect
    other applications, and vice versa.


    A physical standby database is recommended to provide disaster recovery in case
    of a failure at the primary site. Data on the primary repository will be kept
    in sync with the standby database. When configuring a physical standby for the
    repository database, use similar hardware and resources as the primary site so
    that there aren’t any performance implications in the event of a failover/switchover.
    Use Enterprise Manager to create a standby database from the primary database.
    Determine the network mode that you want to use to synchronize the standby database
    based on your network bandwidth and recovery objectives:

    *   `Maximum Protection`: Synchronous writes to standby

    *   `Maximum Availability`: Synchronous writes to standby

    *   `Maximum Performance`: Asynchronous writes to standby


    ![image](images/sq.jpg) **Note**  Enterprise Manager can create only a single-instance
    standby database. You can use the Convert to `RAC` feature in Enterprise Manager
    to convert the single-instance physical standby database to `RAC`.


    ## Management Service


    The management service, or `OMS`, provides a user interface via the Enterprise
    Manager console and processes data from agents. A loss of the `OMS` will result
    in a complete Enterprise Manager outage: agent uploads, jobs, incidents, and notifications
    will all stop to function. The Oracle WebLogic Node Manager and the Oracle Process
    Manager and Notification Server (`OPMN`) will attempt to restart the management
    service automatically if it is down. Although this provides some benefit, it will
    not protect the `OMS` if the host is down. At a minimum, the `OMS` and repository
    should be installed on separate hosts if possible. Multiple `OMS`s can be deployed
    behind a server load balancer to provide protection against a single host being
    down. Also, you can opt to install the `OMS` on a shared filesystem, which will
    provide passive failover in case of the loss of a single host. You will look at
    each of these options for protecting the `OMS` in further detail.


    ### Level 1—Separate `OMS` and Repository Hosts/No Redundancy


    A level 1 configuration is composed of a single `OMS` and repository, with each
    installed on its own host. This configuration provides the least protection, as
    failure of any host will result in a complete outage of the Enterprise Manager
    system. Consideration should be given to the proximity between the `OMS` and repository,
    as high network latency between the two can diminish performance. This configuration
    is recommended for all but the smallest of configurations.


    [Figure 13-4](#9781430249382_Ch13.xhtml#Fig4) is a diagram of a level 1 high-availability
    configuration. Agents upload directly to the management service host, while users
    interact with the `OMS` via the Enterprise Manager console or the command-line
    `EMCLI` directly to the physical `OMS` host. If either the management service
    or repository database hosts become unavailable, a complete outage will occur,
    resulting in loss of monitoring for targets. Keeping each component on its own
    server reduces the likelihood of their impacting each other due to resource overhead.
    For example, increasing the database parameters `sga_max_size` and `sga_target`
    could lessen the performance of the `OMS` because doing so reduces the amount
    of memory available to the operating system. In addition, it lays the basis for
    a scalable environment as business requirements dictate.


    ![9781430249382_Fig13-04.jpg](images/9781430249382_Fig13-04.jpg)


    [Figure 13-4](#9781430249382_Ch13.xhtml#_Fig4) .  Level 1 high-availability configuration
    with `OMS` and repository on separate servers


    ### Level 2—Active/Passive `OMS` and Data Guard Repository


    To reduce `OMS` downtime during a planned or unplanned outage, some redundancy
    should be introduced into the configuration. A level 2 configuration uses a shared
    filesystem for the management service to achieve an active/passive, or cold, failover
    cluster solution. The filesystem is shared between two or more hosts and is active
    on only one host at a time.


    The following steps should be performed as a prerequisite to a level 2 high-availability
    configuration:

    1.  The shared filesystem for the `OMS` can be installed on a general-purpose
    cluster file system including `NFS`, Oracle Cluster File System (`OCFS2`), and
    Oracle Automatic Storage Management Cluster File System (`ACFS`). If `NFS` is
    used as the shared storage, ensure that the correct mount options are set in `/etc/fstab`
    (`/etc/filesystems` on AIX) to prevent potential `I/O` issues. Specifically, `rsize`
    and `wsize` should be set.'
