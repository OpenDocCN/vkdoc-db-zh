    \ 中先定义，然后才能在 `COMPUTE_EXPR` 中被引用，因为列值是按从上到下的顺序依次计算的。\n\n要引用前一次收集中列的值，只需在列名前加上一个下划线符号\
    \ (`_`)。因此，如果当前值是 `nice_t`，那么前一次收集的值就是 `_nice_t`。于是，差值就是 `nice_t - _nice_t`，这表示自上次收集以来在用户模式下执行\
    \ niced 进程所花费的 CPU ticks 数。将自上次收集以来的所有 CPU ticks 相加，就得到了自上次收集以来的 CPU ticks 总数。CPU\
    \ 执行 niced 用户进程的时间百分比，就是 niced CPU ticks 与总 ticks 数的比值，通过乘以 100 归一化为百分比。这同样适用于其他所有\
    \ CPU 模式，如 system 或 idle CPU。\n\n让我们看另一个例子：计算用户回滚和提交的次数。Oracle 数据库保留了自数据库启动以来的提交和回滚计数器，但纯粹基于累积计数器的计算对于监控并不有用。有用的是两次收集间隔之间平均每秒的提交和回滚次数。因此，如果前一次提交数是在时间\
    \ `t0` 收集的 `c0`，当前收集是在 `t1` 收集的 `c1`，那么每秒提交次数就是 `(c1–c0)/(t1–t0)`。我不会在指标定义中特别引用时间戳，因为\
    \ EM12c 会隐式添加时间戳（有一种方法可以显式收集它，但很少需要）。因此，我们无法从 `COMPUTE_EXPR` 定义中访问该时间戳值。然而，我们真正需要的是时间间隔。\n\
    \n尽管你在默认收集定义中指定了间隔，但你不应该将这个值硬编码到 `COMPUTE_EXPR` 中，因为 (1) 用户可以自定义它，并且 (2) 实际间隔可能略有不同，因为配置的间隔只是一个目标值。幸运的是，EM12c\
    \ 有一个内置变量 `__interval`（注意是双下划线前缀），它返回自上次收集以来的秒数。因此，一个包含每秒提交和回滚次数的指标可能如 清单 10-16\
    \ 所示。\n\n**清单 10-16**. 在 `COMPUTE_EXPR` 列中使用 `__interval`\n\n```xml\n<Metric NAME=\"\
    transactions_stat\" TYPE=\"TABLE\">\n  <TableDescriptor>\n    <ColumnDescriptor\
    \ NAME=\"commits\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n    <ColumnDescriptor\
    \ NAME=\"commits_ratio\" TYPE=\"NUMBER\"\n                      COMPUTE_EXPR=\"\
    (commits - _commits) / __interval\">\n      <Display>...</Display>\n    </ColumnDescriptor>\n\
    \    <ColumnDescriptor NAME=\"rollbacks\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n\
    \    <ColumnDescriptor NAME=\"rollbacks_ratio\" TYPE=\"NUMBER\"\n            \
    \          COMPUTE_EXPR=\"(rollbacks - _rollbacks) / __interval\">\n      <Display>...</Display>\n\
    \    </ColumnDescriptor>\n  </TableDescriptor>\n  <QueryDescriptor>...</QueryDescriptor>\n\
    </Metric>\n```\n"
- fmt: "The example in **[Listing 10-16](#9781430249382_Ch10.xhtml#list16)** is not\
    \ from the sample host target, but imagine that the `QueryDescriptor` uses the\
    \ SQL fetchlet that returns two columns, the cumulative number of commits and\
    \ rollbacks for a database instance since startup. Let’s say at the first collection,\
    \ the fetchlet returns 1,000 for the commits column. Because it’s the first collection,\
    \ there was no previous `_commits` or `__interval` value, and the computed column\
    \ isn’t calculated yet. At the second collection, which happens 60 seconds later,\
    \ imagine the fetchlet returning 1,300 for commits. In this case, the `commit_ratio`\
    \ column would calculate to `(1,300 – 1,000)/60`, or 5 commits per second. The\
    \ same logic applies to rollbacks.\n\n## 使用计算表达式 (COMPUTE_EXPR)\n\nNote that the\
    \ fetchlet defined in the `QueryDescriptor` should return values skipping computed\
    \ columns. It’s not required to delay the definition of all computed columns to\
    \ the very end of `TableDescriptor`, and you can place computed columns right\
    \ after the columns they reference. Computed columns are calculated by the agent,\
    \ and you can clearly monitor the process in the Metric Browser. The agent tracks\
    \ the values of `TRANSIENT` columns but doesn’t submit them to OMS, so it doesn’t\
    \ bloat the size of the EM12c repository.\n\nCompute expressions are also useful\
    \ to convert units (say from bytes to kilobytes or megabytes if precision is not\
    \ needed) or to convert from blocks to actual bytes if some metrics return blocks.\n\
    \n### 处理重置的累积计数器\n\nI found it useful to use a trick when working with cumulative\
    \ counters that can be reset from time to time (just as instance statistics are\
    \ reset at instance restart), resulting in a negative difference, which in turn\
    \ will produce huge negative ratios. Instead, such collections should be skipped.\
    \ This is essential to make your metric collections trustworthy.\n\n`COMPUTE_EXPR`\
    \ supports a conditional operator in the form of `{cond} ? {true value} : {false\
    \ value}`. If a previously collected value is higher than the current value, then\
    \ I should return an empty value, which I would prefer instead of 0 since it tells\
    \ me that the collection is simply missing. Because `COMPUTE_EXPR` doesn’t like\
    \ to take a `NULL` (no value) in the formula, I use a trick to produce an empty\
    \ value for the column: I cause an exception dividing by 0. So my formula looks\
    \ like `_val > val ? 1/0 : (val - _val)/__interval`. I learned that EM12c catches\
    \ the exception and assumes the column value is empty. This has been working since\
    \ at least Grid Control 10.2 and still works in 12.1.0.2. However, test your metric\
    \ collection with any new patch sets; because this behavior is not documented,\
    \ there is no guarantee it won’t change. I would love to have an explicit expression\
    \ to return a `NULL`-like value.\n\n## 关键列 (Key Columns)\n\nJust as in metric\
    \ extensions, it’s possible to declare some columns as key columns and process\
    \ multiple rows returned from the fetchlet as multiple rows in the table. **[Listing\
    \ 10-17](#9781430249382_Ch10.xhtml#list17)** demonstrates an example of a metric\
    \ for statistics per CPU, where the CPU number is defined as a `KEY` column. The\
    \ result is the same as with key columns in metric extensions. The complete XML\
    \ fragment is in the target type metadata of the `sample_host1` target type.\n\
    \n**[Listing 10-17](#9781430249382_Ch10.xhtml#_list17)**.  Key Columns Definition\
    \ Example\n\n```\n<Metric NAME=\"CPUProcessorPerf\" TYPE=\"TABLE\">\n  <TableDescriptor>\n\
    \      <ColumnDescriptor NAME=\"CPUNumber\" TYPE=\"NUMBER\" IS_KEY=\"TRUE\"/>\n\
    \      <ColumnDescriptor NAME=\"CPUUser\" TYPE=\"NUMBER\" IS_KEY=\"FALSE\"/>\n\
    \      ...\n  </TableDescriptor>\n  ...\n</Metric>\n```\n\n## 动态属性 (Dynamic Properties)\n\
    \nI have covered only static instance properties that are defined by EM12c users\
    \ when adding target instances. However, there is a mechanism to collect properties\
    \ dynamically that can later be used in the plug-in configuration for metric collections.\
    \ For example, you might want to collect the target version or the platform it’s\
    \ running on so that you can then collect platform-dependent metrics (often Linux\
    \ and Windows platforms are handled differently, for example). You can also use\
    \ dynamic properties to display on the target home page (something you will learn\
    \ about later).\n\nJust like static instance properties, dynamic properties are\
    \ defined under `InstanceProperties` as a `DynamicProperties` element. The element\
    \ structure is similar to that of `Metric` element but it doesn’t have a `TableDescriptor`.\
    \ The list of properties is defined in the `PROP_LIST` attribute as a semicolon-separated\
    \ list (for example, `\"prop1;prop2;prop3\"`). It also has a special format `ROW`\
    \ instead of `TABLE` used normally for metrics. Just like a metric, `DynamicProperties`\
    \ includes a `QueryDescriptor` defining the fetchlet used to collect the properties\
    \ listed in `PROP_LIST`. The fetchlet should return just one row with the values\
    \ corresponding to the `PROP_LIST` attribute. **[Listing 10-18](#9781430249382_Ch10.xhtml#list18)**\
    \ shows a shortened snippet of a dynamic property from the `sample_host1` target\
    \ that we’ve been using as an example so far.\n\n**[Listing 10-18](#9781430249382_Ch10.xhtml#_list18)**.\
    \  Boot Date Dynamic Property Example from sample_host1 Target\n\n```\n<InstanceProperties>\n\
    \  <InstanceProperty ...>...</InstanceProperty>\n  <DynamicProperties NAME=\"\
    HostSampleBootDate\" PROP_LIST=\"bootDate\" FORMAT=\"ROW\">\n    <QueryDescriptor\
    \ FETCHLET_ID=\"OSLineToken\">\n      <Property .../>\n      <Property NAME=\"\
    script\" SCOPE=\"GLOBAL\">\n          %scriptsDir%/sample_host1/data_collector.pl\
    \ --collect BootDate --fake \"%fake%\"\n      </Property>\n      <Property .../>\n\
    \    </QueryDescriptor>\n  </DynamicProperties>\n</InstanceProperties>\n```\n\n\
    A dynamic property can then be referenced in the fetchlet configuration for metrics\
    \ in the `Property` element with `SCOPE=\"INSTANCE\"`—just like any other static\
    \ property.\n\nYou can find more information on `DynamicProperties` in Section\
    \ 3.3.6.2 of the *Extensibility Programmer's Reference*. However, the official\
    \ documentation is pretty sparse. You can find more details in the XML Schema\
    \ documentation under `<EDK>/doc/partnersdk/mrs/emcore/targetType`.\n\nOne of\
    \ the best uses of dynamic properties is to define category properties that are,\
    \ in turn, used for conditional definitions in the target type metadata using\
    \ a `ValidIf` element. This element can be defined as a child of several elements\
    \ such as `Metric` or `QueryDescriptor` so that certain metrics are activated\
    \ only when the defined category property is matching certain choices. Another\
    \ use case is to configure different fetchlets to collect metric values depending\
    \ on the value of category property. Unfortunately, as of EM12c version 12.1.0.2.0,\
    \ this functionality is not officially documented, so you should be careful relying\
    \ on it. However, it was available since Grid Control 10g versions, and you can\
    \ see how it’s used in Oracle’s out-of-the-box plug-ins (for example, in its `rac_database`\
    \ target type). You can find the `rac_database` target type metadata definition\
    \ in `<AGENT_BASE>/plugins/oracle.sysman.db.agent.plugin_12.1.0.2.0/metadata/rac_database.xml`.\
    \ Note that Oracle uses XML functionality by including other files’ XML content\
    \ to facilitate the reuse of identical definitions. For example, the database\
    \ version calculations are the same for the RAC database, the ASM instance, and\
    \ the database instance, so it’s defined in the `dyn_props.xmlp` file that’s referred\
    \ from multiple target type metadata definition files."
  raw: 'The example in [Listing 10-16](#9781430249382_Ch10.xhtml#list16) is not from
    the sample host target, but imagine that the QueryDescriptor uses the SQL fetchlet
    that returns two columns, the cumulative number of commits and rollbacks for a
    database instance since startup. Let’s say at the first collection, the fetchlet
    returns 1,000 for the commits column. Because it’s the first collection, there
    was no previous _commits or __interval value, and the computed column isn’t calculated
    yet. At the second collection, which happens 60 seconds later, imagine the fetchlet
    returning 1,300 for commits. In this case, the commit_ratio column would calculate
    to (1,300 – 1,000)/60, or 5 commits per second. The same logic applies to rollbacks.


    Note that the fetchlet defined in the QueryDescriptor should return values skipping
    computed columns. It’s not required to delay the definition of all computed columns
    to the very end of TableDescriptor, and you can place computed columns right after
    the columns they reference. Computed columns are calculated by the agent, and
    you can clearly monitor the process in the Metric Browser. The agent tracks the
    values of TRANSIENT columns but doesn’t submit them to OMS, so it doesn’t bloat
    the size of the EM12c repository.


    Compute expressions are also useful to convert units (say from bytes to kilobytes
    or megabytes if precision is not needed) or to convert from blocks to actual bytes
    if some metrics return blocks.


    I found it useful to use a trick when working with cumulative counters that can
    be reset from time to time (just as instance statistics are reset at instance
    restart), resulting in a negative difference, which in turn will produce huge
    negative ratios. Instead, such collections should be skipped. This is essential
    to make your metric collections trustworthy.


    COMPUTE_EXPR supports a conditional operator in the form of {cond} ? {true value}
    : {false value}. If a previously collected value is higher than the current value,
    then I should return an empty value, which I would prefer instead of 0 since it
    tells me that the collection is simply missing. Because COMPUTE_EXPR doesn’t like
    to take a NULL(no value) in the formula, I use a trick to produce an empty value
    for the column: I cause an exception dividing by 0\. So my formula looks like
    _val > val ? 1/0 : (val - _val)/__interval. I learned that EM12c catches the exception
    and assumes the column value is empty. This has been working since at least Grid
    Control 10.2 and still works in 12.1.0.2\. However, test your metric collection
    with any new patch sets; because this behavior is not documented, there is no
    guarantee it won’t change. I would love to have an explicit expression to return
    a NULL-like value.


    Key Columns


    Just as in metric extensions, it’s possible to declare some columns as key columns
    and process multiple rows returned from the fetchlet as multiple rows in the table.
    [Listing 10-17](#9781430249382_Ch10.xhtml#list17) demonstrates an example of a
    metric for statistics per CPU, where the CPU number is defined as a KEY column.
    The result is the same as with key columns in metric extensions. The complete
    XML fragment is in the target type metadata of the sample_host1 target type.


    ***[Listing 10-17](#9781430249382_Ch10.xhtml#_list17)***.  Key Columns Definition
    Example


    ```

    <Metric NAME="CPUProcessorPerf" TYPE="TABLE">

      <TableDescriptor>

          <ColumnDescriptor NAME="CPUNumber" TYPE="NUMBER" IS_KEY="TRUE"/>

          <ColumnDescriptor NAME="CPUUser" TYPE="NUMBER" IS_KEY="FALSE"/>

          ...

      </TableDescriptor>

      ...

    </Metric>

    ```


    Dynamic Properties


    I have covered only static instance properties that are defined by EM12c users
    when adding target instances. However, there is a mechanism to collect properties
    dynamically that can later be used in the plug-in configuration for metric collections.
    For example, you might want to collect the target version or the platform it’s
    running on so that you can then collect platform-dependent metrics (often Linux
    and Windows platforms are handled differently, for example). You can also use
    dynamic properties to display on the target home page (something you will learn
    about later).


    Just like static instance properties, dynamic properties are defined under InstanceProperties
    as a DynamicProperties element. The element structure is similar to that of Metric
    element but it doesn’t have a TableDescriptor. The list of properties is defined
    in the PROP_LIST attribute as a semicolon-separated list (for example, "prop1;prop2;prop3").
    It also has a special format ROW instead of TABLE used normally for metrics. Just
    like a metric, DynamicProperties includes a QueryDescriptor defining the fetchlet
    used to collect the properties listed in PROP_LIST. The fetchlet should return
    just one row with the values corresponding to the PROP_LIST attribute. [Listing
    10-18](#9781430249382_Ch10.xhtml#list18) shows a shortened snippet of a dynamic
    property from the sample_host1 target that we’ve been using as an example so far.


    ***[Listing 10-18](#9781430249382_Ch10.xhtml#_list18)***.  Boot Date Dynamic Property
    Example from sample_host1 Target


    ```

    <InstanceProperties>

      <InstanceProperty ...>...</InstanceProperty>

      <DynamicProperties NAME="HostSampleBootDate" PROP_LIST="bootDate" FORMAT="ROW">

        <QueryDescriptor FETCHLET_ID="OSLineToken">

          <Property .../>

          <Property NAME="script" SCOPE="GLOBAL">

              %scriptsDir%/sample_host1/data_collector.pl --collect BootDate --fake
    "%fake%"

          </Property>

          <Property .../>

        </QueryDescriptor>

      </DynamicProperties>

    </InstanceProperties>

    ```


    A dynamic property can then be referenced in the fetchlet configuration for metrics
    in the Property element with SCOPE="INSTANCE"—just like any other static property.


    You can find more information on DynamicProperties in Section 3.3.6.2 of the *Extensibility
    Programmer''s Reference*. However, the official documentation is pretty sparse.
    You can find more details in the XML Schema documentation under <EDK>/doc/partnersdk/mrs/emcore/targetType.


    One of the best uses of dynamic properties is to define category properties that
    are, in turn, used for conditional definitions in the target type metadata using
    a ValidIf element. This element can be defined as a child of several elements
    such as Metric or QueryDescriptor so that certain metrics are activated only when
    the defined category property is matching certain choices. Another use case is
    to configure different fetchlets to collect metric values depending on the value
    of category property. Unfortunately, as of EM12c version 12.1.0.2.0, this functionality
    is not officially documented, so you should be careful relying on it. However,
    it was available since Grid Control 10g versions, and you can see how it’s used
    in Oracle’s out-of-the-box plug-ins (for example, in its rac_database target type).
    You can find the rac_database target type metadata definition in <AGENT_BASE>/plugins/oracle.sysman.db.agent.plugin_12.1.0.2.0/metadata/rac_database.xml.
    Note that Oracle uses XML functionality by including other files’ XML content
    to facilitate the reuse of identical definitions. For example, the database version
    calculations are the same for the RAC database, the ASM instance, and the database
    instance, so it’s defined in the dyn_props.xmlp file that’s referred from multiple
    target type metadata definition files.'
  trans: "\n**清单 10-16** 中的示例并非来自示例主机目标，但请设想 `QueryDescriptor` 使用了一个 SQL fetchlet，该\
    \ fetchlet 返回两列数据：自启动以来数据库实例的提交和回滚累积次数。假设在第一次采集时，fetchlet 返回的提交列值为 1,000。因为是首次采集，之前没有\
    \ `_commits` 或 `__interval` 的值，且计算列尚未计算。在 60 秒后进行的第二次采集中，设想 fetchlet 返回的提交数为 1,300。这种情况下，`commit_ratio`\
    \ 列将计算为 `(1,300 – 1,000)/60`，即每秒 5 次提交。回滚列也适用相同的逻辑。\n\n## 使用计算表达式 (COMPUTE_EXPR)\n\
    \n请注意，`QueryDescriptor` 中定义的 fetchlet 应返回值，并跳过计算列。并非必须将所有计算列的定义延迟到 `TableDescriptor`\
    \ 的末尾，您可以将计算列放在它们所引用的列之后。计算列由代理计算，您可以在 Metric Browser 中清晰地监控此过程。代理会跟踪 `TRANSIENT`\
    \ 列的值，但不会将其提交给 OMS，因此不会增大 EM12c 存储库的大小。\n\n计算表达式也可用于转换单位（例如，如果不需要精确度，可从字节转换为千字节或兆字节），或者当某些指标返回块（blocks）时，将其转换为实际字节数。\n\
    \n### 处理重置的累积计数器\n\n我发现，当处理可能随时重置的累积计数器（如同实例统计信息在实例重启时会被重置）时，使用一个技巧很有用，否则可能导致负差值，进而产生巨大的负比率。相反，应跳过此类采集。这对于使您的指标采集值得信赖至关重要。\n\
    \n`COMPUTE_EXPR` 支持一种条件运算符，形式为 `{条件} ? {真值} : {假值}`。如果先前采集的值高于当前值，则应返回一个空值，我倾向于使用空值而非\
    \ 0，因为它表明采集数据只是缺失。因为 `COMPUTE_EXPR` 不希望公式中出现 `NULL`（无值），我使用了一个技巧来为列生成空值：我通过除以\
    \ 0 来引发异常。因此，我的公式看起来像 `_val > val ? 1/0 : (val - _val)/__interval`。我了解到 EM12c\
    \ 会捕获此异常并假定该列值为空。此方法至少从 Grid Control 10.2 开始有效，并且在 12.1.0.2 中仍然有效。但是，请使用任何新的补丁集测试您的指标采集；因为此行为未文档化，不能保证它不会改变。我很希望能有一个显式的表达式来返回类似\
    \ `NULL` 的值。\n\n## 关键列 (Key Columns)\n\n就像在指标扩展中一样，可以将某些列声明为关键列，并将从 fetchlet 返回的多行作为表中的多行进行处理。**清单\
    \ 10-17** 展示了一个按 CPU 统计指标的示例，其中 CPU 编号被定义为 `KEY` 列。结果与指标扩展中的关键列相同。完整的 XML 片段位于\
    \ `sample_host1` 目标类型的目标类型元数据中。\n\n**清单 10-17**.  关键列定义示例\n\n```\n<Metric NAME=\"\
    CPUProcessorPerf\" TYPE=\"TABLE\">\n  <TableDescriptor>\n      <ColumnDescriptor\
    \ NAME=\"CPUNumber\" TYPE=\"NUMBER\" IS_KEY=\"TRUE\"/>\n      <ColumnDescriptor\
    \ NAME=\"CPUUser\" TYPE=\"NUMBER\" IS_KEY=\"FALSE\"/>\n      ...\n  </TableDescriptor>\n\
    \  ...\n</Metric>\n```\n\n## 动态属性 (Dynamic Properties)\n\n我目前只介绍了 EM12c 用户在添加目标实例时定义的静态实例属性。然而，存在一种机制可以动态收集属性，这些属性之后可在指标采集的插件配置中使用。例如，您可能希望收集目标版本或其运行的平台信息，以便随后收集依赖于平台的指标（例如，Linux\
    \ 和 Windows 平台通常需要不同处理）。您也可以使用动态属性在目标主页上显示（稍后您将了解这部分内容）。\n\n就像静态实例属性一样，动态属性在 `InstanceProperties`\
    \ 下定义为一个 `DynamicProperties` 元素。该元素结构与 `Metric` 元素相似，但没有 `TableDescriptor`。属性列表在\
    \ `PROP_LIST` 属性中定义为分号分隔的列表（例如，`\"prop1;prop2;prop3\"`）。它还有一个特殊的格式 `ROW`，替代通常用于指标的\
    \ `TABLE`。与指标类似，`DynamicProperties` 包含一个 `QueryDescriptor`，定义了用于收集 `PROP_LIST`\
    \ 中列出属性的 fetchlet。该 fetchlet 应仅返回一行，其值与 `PROP_LIST` 属性相对应。**清单 10-18** 展示了一个来自我们一直用作示例的\
    \ `sample_host1` 目标的动态属性的简化片段。\n\n**清单 10-18**.  来自 sample_host1 目标的启动日期动态属性示例\n\
    \n```\n<InstanceProperties>\n  <InstanceProperty ...>...</InstanceProperty>\n\
    \  <DynamicProperties NAME=\"HostSampleBootDate\" PROP_LIST=\"bootDate\" FORMAT=\"\
    ROW\">\n    <QueryDescriptor FETCHLET_ID=\"OSLineToken\">\n      <Property .../>\n\
    \      <Property NAME=\"script\" SCOPE=\"GLOBAL\">\n          %scriptsDir%/sample_host1/data_collector.pl\
    \ --collect BootDate --fake \"%fake%\"\n      </Property>\n      <Property .../>\n\
    \    </QueryDescriptor>\n  </DynamicProperties>\n</InstanceProperties>\n```\n\n\
    然后，可以在指标采集的 fetchlet 配置中，通过 `SCOPE=\"INSTANCE\"` 的 `Property` 元素引用动态属性——就像引用任何其他静态属性一样。\n\
    \n您可以在 *可扩展性程序员参考手册* 的第 3.3.6.2 节中找到关于 `DynamicProperties` 的更多信息。然而，官方文档相当稀少。您可以在\
    \ `<EDK>/doc/partnersdk/mrs/emcore/targetType` 下的 XML 模式文档中找到更多细节。\n\n动态属性的最佳用途之一是定义类别属性，这些属性继而用于目标类型元数据中使用\
    \ `ValidIf` 元素的条件定义中。此元素可以定义为多个元素（如 `Metric` 或 `QueryDescriptor`）的子元素，以便仅当定义的类别属性匹配某些选择时才激活某些指标。另一个用例是根据类别属性的值配置不同的\
    \ fetchlet 来收集指标值。不幸的是，截至 EM12c 版本 12.1.0.2.0，此功能尚未正式文档化，因此依赖它时应谨慎。然而，它自 Grid\
    \ Control 10g 版本就已可用，您可以在 Oracle 开箱即用的插件中看到它的使用方式（例如，在其 `rac_database` 目标类型中）。您可以在\
    \ `<AGENT_BASE>/plugins/oracle.sysman.db.agent.plugin_12.1.0.2.0/metadata/rac_database.xml`\
    \ 中找到 `rac_database` 目标类型的元数据定义。请注意，Oracle 通过包含其他文件的 XML 内容来使用 XML 功能，以方便重用相同的定义。例如，RAC\
    \ 数据库、ASM 实例和数据库实例的数据库版本计算是相同的，因此它被定义在 `dyn_props.xmlp` 文件中，并从多个目标类型元数据定义文件中引用。\n"
- fmt: 'Note that Oracle’s `sample_host` targets include other dynamic properties
    defining related links. I believe that this part of the example has not been removed
    since 10g/11g Grid Control and isn’t relevant anymore. Prior to EM12c, the Extensibility
    framework had very few features to customize the home page of a target, and adding
    custom links to the related links section on the home page was one of them. EM12c
    has rich target user interface definition options, and related links via dynamic
    properties are not used anymore, so this dynamic property in all `sample_host`
    demo targets is ignored and should have been removed.


    ## Reports


    EM12c provides two reporting mechanisms:


    *   `Information Publisher`: This is the same mechanism that existed in Grid Control
    10g/11g versions, which had the `Information Publisher` PL/SQL API and used to
    require reports definitions to be created using PL/SQL. EM12c has now XML-based
    `Information Publisher` report definitions and the ability to design reports by
    using the EM12c console and export them by using `emcli`. To have similar capabilities
    in 10g/11g, I had to create a custom extractor that produced PL/SQL API-based
    definitions from the reports developed using the console UI. EM12c will still
    transform XML into PL/SQL calls behind the scenes, but the convenience of XML
    definitions is huge, compared to long cumbersome PL/SQL definitions that were
    virtually impossible to validate syntactically without trying to execute them.
    See [Chapter 4](#9781430249382_Ch04.xhtml) of the *Extensibility Programmer''s
    Reference* for detailed documentation on creating and customizing `Information
    Publisher` reports, including details of XML elements.

    *   `BI Publisher`: EM12c can integrate with Oracle Business Intelligence Publisher
    for more-advanced reporting capabilities. However, integration with `BI Publisher`
    might require licensing Oracle Business Intelligence Publisher, which is holding
    back the adoption of `BI Publisher` with EM12c, based on my observation. If you
    are developing plug-ins for external users and not just for your organization,
    you probably shouldn’t rely on the availability of `BI Publisher` in the target
    EM12c environments, so be sure to provide comparable reports by using `Information
    Publisher`. [Chapter 5](#9781430249382_Ch05.xhtml) of the *Extensibility Programmer''s
    Reference* provides very brief instructions on creating the `BI Publisher` reports,
    but this documentation quality and depth is nowhere close to the documentation
    of `Information Publisher` API. It also relies on prior knowledge of the Oracle
    Business Intelligence Publisher product.


    Although [Chapter 4](#9781430249382_Ch04.xhtml) of the *Extensibility Programmer''s
    Reference* notes that `Information Publisher` is deprecated, the reality is that
    so many existing reports and customers are relying on it, that it will not go
    anywhere in EM12c or probably the next versions unless Oracle packages `BI Publisher`
    with EM12c by default. My personal recommendation for plug-in development is to
    stick with `Information Publisher` at the moment, until Oracle provides reporting
    capabilities that don’t require integration with additional products (and licenses).
    This also ensures that your plug-ins will work with any EM12c installation, whether
    it’s integrated with `BI Publisher` or not. This section covers only `Information
    Publisher` reports. Although [Chapter 5](#9781430249382_Ch05.xhtml) of the *Extensibility
    Programmer’s Reference* covers deploying `BI Publisher` reports, there are no
    instructions on how to package them with the plug-in archive.


    Creating `Information Publisher` reports is fairly simple in EM12c. You can study
    examples of a report packaged with the `sample_host1` target within the `oracle.samples.xsh1`
    plug-in. Follow these steps to create a new report definition using `Information
    Publisher` API and package with your plug-in:


    1.  When the first version of the plug-in (still without reports) and target type
    is developed and deployed, create report definitions by using the EM12c console
    reports wizard. This will require creating SQL and/or PL/SQL to query the repository
    views and extract information (such as the target’s metrics, configuration, and
    so forth) in the format required by reporting components such as charts, text
    labels, links, and tables. At this stage, you will get as close as possible to
    the desired report, iteratively improving your report. You can find documentation
    about the available repository views in Chapter 18 of the *Extensibility Programmer''s
    Reference*.

    2.  Use the `emcli export_report` command to extract the XML definition of the
    designed report.

    3.  You can modify and further customize the extracted XML report definition.
    The XML format provides the report developer additional design features not available
    directly in the EM12c console reports wizard. Most of [Chapter 4](#9781430249382_Ch04.xhtml)
    of the *Extensibility Programmer''s Reference* is dedicated to the documentation
    of XML elements for `Information Publisher` reports, and you should use that as
    a reference.

    4.  Finally, place the created report definition files into `<STAGE>/oms/metadata/reports`
    and package the new version of the plug-in. EDK will automatically pick up reports
    during creation of the OPAR file as long as the report definitions are placed
    in the correct location.


    When the plug-in with reports is deployed on the OMS, its reports are available
    in the EM12c console in the `Information Publisher` Reports section as `SYSTEM`
    reports. These reports cannot be deleted or modified by the EM12c users. However,
    the reports can be cloned to create a copy that can be customized if required.
    10g/11g Grid Control allowed to mark some `SYSTEM` reports to be available directly
    on the target’s home page in the Reports tab. This tab has been removed from EM12c,
    because it provides UI customization of the target home page that far supersedes
    the older capabilities of simply embedding reports.


    Two reports in the category Performance Reports of the `oracle.samples.xsh1` plug-in
    are good examples to study. The configuration report with this plug-in is using
    dummy data (selecting constants from `DUAL` table), so that isn’t a useful example
    to study.


    It’s useful to use the Metadata Registration Service (MRS) to update report definitions
    directly in the repository without repackaging and redeploying the plug-in. See
    more details about MRS at the end of this chapter.


    ## Enterprise Configuration Management


    The EM12c Extensibility framework has full support for Enterprise Configuration
    Management (ECM). While 10g/11g Grid Control supported ECM feature, it wasn’t
    documented and officially supported for third-party plug-in developers (even though
    ECM was used by Oracle’s own plug-ins). EM12c added XML metadata definitions to
    ECM instead of awkward PL/SQL-based definitions, and that allowed simple support
    for plug-in developers.


    There are three steps to adding configuration management capabilities:'
