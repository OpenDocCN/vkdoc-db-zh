    ![9781430249382_Fig05-21.jpg](images/9781430249382_Fig05-21.jpg)


    [Figure 5-21](#9781430249382_Ch05.xhtml#_Fig21). Adding a new cost center


    Once a cost center is added, it will show up under the Cost Center column on the
    Cost Centers tab. If you added sub–cost centers as members of an existing cost
    center, these can be viewed by expanding the tree view (see [Figure 5-22](#9781430249382_Ch05.xhtml#Fig22)).
    As you will notice, this can become a complex architecture of cost centers to
    manage. However, by diligently laying out your cost center, it will be easier
    to identify consumed resources and budgetary requirements down the road.


    ![9781430249382_Fig05-22.jpg](images/9781430249382_Fig05-22.jpg)


    [Figure 5-22](#9781430249382_Ch05.xhtml#_Fig22). Examples of cost centers defined'
  trans: '

    当云用户开始共享云平台或基础设施资源时，您需要对资源的使用情况进行问责；否则，资源可能会被部分用户过度使用，而其他用户在需要时却无法获得资源。为了缓解这种情况，企业需要衡量资源使用情况，并可选地向租户进行费用回收。尽管
    IT 组织可能不会实际向其业务部门收费，但用量报告提供了一个透明的机制，用于预算资源并持续优化云平台。


    ## 理解计量与收费


    EM12c 提供了一个复杂而灵活的计量与收费机制，您可以基于固定成本、配置（如版本、许可证）或利用率，或这些因素的组合来定义模型（参见图 5-16）。此功能使您能够在不同级别（例如，主机/虚拟机级别、数据库和中间件）计量资源。它与`LDAP`集成良好，因此您可以遍历组织层级结构，并在各个级别生成消耗报告。


    ![9781430249382_Fig05-16.jpg](img/9781430249382_Fig05-16.jpg)


    图 5-16. EM12c 收费控制台


    这些报告中的信息通常对企业管理器用户以外的人员（如业务部门经理或财务部门人员）很有用。因此，提供了与 BI Publisher 的开箱即用集成，以便这些报告可以与各种用户共享。BI
    Publisher 可以按计划生成这些报告，并以 `PDF`、`HTML` 和 Microsoft Office 等多种格式共享。然后，如果任何组织想要为租户/消费者生成账单，资源使用数据可以输入到
    Oracle Billing and Revenue Management 等计费工具中。


    现在您已经了解了什么是计量与收费、它的用途以及可用的功能。但是管理员如何设置此选项并开始使用这些高级功能呢？


    ## 安装收费插件


    要设置计量与收费，您必须在管理服务器上部署一个插件，然后定义六个任务。本节将讨论插件部署和定义的任务。


    要访问插件，请从屏幕右侧选择 `Setup` ![arrow](img/arrow.jpg) `Extensibility` ![arrow](img/arrow.jpg)
    `Plug-ins`。这将带您进入如图 5-17 所示的页面，其中列出了所有可用的插件。


    ![9781430249382_Fig05-17.jpg](img/9781430249382_Fig05-17.jpg)


    图 5-17. Oracle 收费与容量规划插件可用性


    要部署 Oracle 收费与容量规划插件，您需要知道仓库 `SYS` 密码。提供密码并继续部署（参见图 5-18）。


    ![9781430249382_Fig05-18.jpg](img/9781430249382_Fig05-18.jpg)


    图 5-18. 为部署提供仓库 `SYS` 密码


    ![image](img/sq.jpg) **注意**  如果插件部署在管理服务器上，部署将需要停机时间。在部署之前，请确保您已备份仓库和管理服务器的配置。您将看到类似以下的消息。


    ![9781430249382_unFig05-01.jpg](img/9781430249382_unFig05-01.jpg)


    在您选择确认已备份仓库和管理服务器的复选框之前，您将无法进行部署。


    部署完成后，企业管理菜单上会显示两个新菜单项：`Chargeback` 和 `Consolidation Planner`（参见图 5-19）。这意味着插件部署成功，您现在可以使用与收费插件相关的功能。您还会注意到，合并规划器的功能也已启用；本章稍后将讨论此功能。


    ![9781430249382_Fig05-19.jpg](img/9781430249382_Fig05-19.jpg)


    图 5-19. `Chargeback` 和 `Consolidation Planner` 的企业菜单选项


    ## 配置计量与收费


    一旦 EM12c 中启用了收费功能，就该关注成功设置环境收费所需的六个任务了：


    1.  定义收费计划。

    2.  创建成本中心。

    3.  添加用于收费的目标。

    4.  将成本中心分配给目标。

    5.  将收费计划分配给目标。

    6.  配置收费设置。


    此过程的第一步是定义应使用的收费计划。收费计划有两种类型：`通用`和`扩展`。`通用收费计划`使用三个基本指标来计算资源消耗：CPU、内存和存储。`扩展收费计划`通过包含特定于目标的指标来确定使用率，从而增强了此模型。


    要确定合适的收费计划，您必须根据具体情况决定`通用收费计划`（CPU、内存和存储）是否足以满足组织的需求。如果需要的指标超过核心的三个，则应应用`扩展收费计划`。


    要定义收费计划，请选择 `Enterprise` ![arrow](img/arrow.jpg) `Chargeback` 以访问收费界面中的“收费计划”选项卡。对于`通用收费计划`，通过突出显示然后编辑指标，可以轻松设置收费费率（参见图
    5-20）。可以在`通用收费计划`下方立即创建或编辑`扩展收费计划`。


    ![9781430249382_Fig05-20.jpg](img/9781430249382_Fig05-20.jpg)


    图 5-20. `通用`和`扩展`收费计划可在收费计划配置界面的同一屏幕上编辑


    配置收费的下一步是为组织设置成本中心。`成本中心`是用于汇总费用的载体。成本中心可以是个人、组织内的部门，或一个将费用分摊到整个企业的多层业务层级。要创建业务层级，请设置成本中心并将用户分配给业务单元。此外，可以通过从`LDAP`服务器导入组织的层级结构来实现业务层级。


    要添加成本中心，请单击“成本中心”选项卡，然后单击“添加”按钮。这将打开“新建成本中心”对话框，如图 5-21 所示。在这里，您可以输入成本中心的名称以及其显示名称和级别。如果有现有的成本中心可用，新成本中心可以作为这些成本中心之一的“成员”添加。


    ![9781430249382_Fig05-21.jpg](img/9781430249382_Fig05-21.jpg)


    图 5-21. 添加新成本中心


    添加成本中心后，它将显示在“成本中心”选项卡的“成本中心”列下。如果您将子成本中心作为现有成本中心的成员添加，则可以通过展开树状视图来查看它们（参见图 5-22）。如您将注意到的，这可能成为一个复杂的成本中心管理架构。然而，通过精心规划您的成本中心，将来更容易识别已消耗的资源和预算需求。


    ![9781430249382_Fig05-22.jpg](img/9781430249382_Fig05-22.jpg)


    图 5-22. 已定义成本中心示例

