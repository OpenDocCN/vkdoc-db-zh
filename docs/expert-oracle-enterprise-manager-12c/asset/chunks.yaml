- fmt: 'The lower Activity pane of the ASH Analytics page, shown in [Figure 9-28](#9781430249382_Ch09.xhtml#Fig28),
    displays data in a format similar to Top Activity, but the data is based on the
    `V$ACTIVE_SESSION_HISTORY` view and has more performance data available for access
    from the links shown.


    ![9781430249382_Fig09-28.jpg](images/9781430249382_Fig09-28.jpg)


    [Figure 9-28](#9781430249382_Ch09.xhtml#_Fig28). The Activity pane for ASH Analytics


    The `SQL ID` section at the lower left links to the SQL Details page. The User
    Session section on the right links to the Session Details page. The drop-down
    Wait Class options are extensive, as seen in [Figure 9-29](#9781430249382_Ch09.xhtml#Fig29).


    ![9781430249382_Fig09-29.jpg](images/9781430249382_Fig09-29.jpg)


    [Figure 9-29](#9781430249382_Ch09.xhtml#_Fig29). The drop-down menu options for
    the ASH Analytics Wait Class


    SQL can be broken down in many ways within the ASH Analytics Activity view. The
    options are shown in [Table 9-2](#9781430249382_Ch09.xhtml#Tab2). Depending on
    the needs of the administrator, the order of the presentation can be changed.


    [Table 9-2](#9781430249382_Ch09.xhtml#_Tab2). The Wait Class Options and Suboptions


    | Option | Suboptions |

    | --- | --- |

    | SQL | `SQL ID` `Top Level SQL ID` `SQL Force Matching Signature` `SQL Plan Hash
    Value` `SQL Plan Operation` `SQL Plan Operation Line` `SQL Opcode` `Top Level
    SQL Opcode` |

    | PL/SQL | `PL/SQL` `Top Level PL/SQL` |

    | Resource Consumption | `Wait Class` `Wait Event` `Object` `Blocking Session`
    |

    | Session Identifiers | `Instance` `Service` `User Session` `Parallel Process`
    `User ID` `Program` `Session Type` |

    | Session Attributes | `Consumer Group` `Module` `Action` |


    Each of these options gives a unique view of waits and/or resource usage in the
    environment. You can choose the combination that best suits the situation at hand
    and then view the data to investigate the issue.


    You can choose the `Top Level SQL ID`, subsequently creating a very different
    view of the database performance, and showing the percentage impact from the statement
    having that ID. See [Figure 9-30](#9781430249382_Ch09.xhtml#Fig30).


    ![9781430249382_Fig09-30.jpg](images/9781430249382_Fig09-30.jpg)


    [Figure 9-30](#9781430249382_Ch09.xhtml#_Fig30). Top-level `SQL ID` activity in
    ASH Analytics


    The percentage of impact of `SQL ID` `cwu5p1yyp1p40` in [Figure 9-30](#9781430249382_Ch09.xhtml#Fig30)
    is clearly demonstrated in the graph, which shows that two user sessions were
    executing the statement throughout the timeline. This can be assumed by the associated
    colors from the graph that identify the `SQL ID` and the user session, but also
    can be verified by clicking each of the links to the user sessions, which will
    then show the `SQL ID` `okwk7211pw296` identified with each.


    The example in [Figure 9-31](#9781430249382_Ch09.xhtml#Fig31) still displays the
    overall total activity as a black line in the graph. The system response time
    per call, which encompasses usage by two CPUs, also shows a small “blip” of activity
    when ASH data samples are rolled up into the AWR.


    ![9781430249382_Fig09-31.jpg](images/9781430249382_Fig09-31.jpg)


    [Figure 9-31](#9781430249382_Ch09.xhtml#_Fig31). ASH Analytics, graphing by `Action`,
    showing system response time, DB wait time and ASH roll-up


    ### The Load Map


    The load map, shown in [Figure 9-32](#9781430249382_Ch09.xhtml#Fig32), is the
    second choice for viewing data from ASH Analytics. The Activity graph is the view
    most administrators are familiar with from years of Enterprise Manager experience.
    The load map is a new way to display all data found in ASH Analytics, but often
    more clear for nonadministrator groups.


    ![9781430249382_Fig09-32.jpg](images/9781430249382_Fig09-32.jpg)


    [Figure 9-32](#9781430249382_Ch09.xhtml#_Fig32). An ASH Analytics advanced load
    map displaying `Wait Class` and `SQL ID`


    ![image](images/sq.jpg) **Tip**  The load map view is often lost on the administrator,
    who is familiar with and has training to understand data displayed from Top Activity.
    The load map displays performance data in a way that has more visual impact.


    The load map in [Figure 9-32](#9781430249382_Ch09.xhtml#Fig32) shows `SQL ID`
    `csu5p1yyp1p40` as almost 50 percent of the resource usage in the environment.
    For a nonadministrator, this representation provides a clearer picture of the
    SQL affecting performance than a graph display of the same data, which might very
    well be misleading.


    The same load map can then be changed to display the `SQL ID`s, but this time
    sorted by user session. [Figure 9-33](#9781430249382_Ch09.xhtml#Fig33) shows the
    same load as in [Figure 9-32](#9781430249382_Ch09.xhtml#Fig32), but the percentages
    are broken out by user session first, and then by `SQL ID` within each session.


    ![9781430249382_Fig09-33.jpg](images/9781430249382_Fig09-33.jpg)


    [Figure 9-33](#9781430249382_Ch09.xhtml#_Fig33). An ASH Analytics advanced load
    map, displayed by user session and `SQL ID`


    Dimensions for the same load map can be adjusted, and sample size can be changed
    (see [Figure 9-34](#9781430249382_Ch09.xhtml#Fig34)).


    ![9781430249382_Fig09-34.jpg](images/9781430249382_Fig09-34.jpg)


    [Figure 9-34](#9781430249382_Ch09.xhtml#_Fig34). An ASH Analytics load map with
    diminished dimensions and sample size


    The example in [Figure 9-34](#9781430249382_Ch09.xhtml#Fig34) displays only the
    user session information. If you use an advanced load map setting and limiting
    the samples to three, you can display even smaller subsets of sample information.


    By then increasing to three dimensions, building each of these dimensions by `Wait
    Class`, `SQL ID`, and `Client`, you can create a load map that shows the `SQL
    ID` as the header in each section, along with client information and then the
    `Wait Class` indicator (see [Figure 9-35](#9781430249382_Ch09.xhtml#Fig35)).


    ![9781430249382_Fig09-35.jpg](images/9781430249382_Fig09-35.jpg)


    [Figure 9-35](#9781430249382_Ch09.xhtml#_Fig35). ASH Analytics, displaying an
    advanced, three-dimension load map


    ASH Analytics is the future of Top Activity. With the advancements in ASH expected
    in future releases of Oracle, ASH Analytics will continue to provide more-enhanced
    performance data for the Oracle database environment.


    ### SQL Monitoring


    `SQL Monitor`, introduced in Oracle 11g, has been hailed as one of the best new
    features. The graphical display of `SQL Monitor` within Enterprise Manager offers
    a secondary view to session data in the database (see [Figure 9-36](#9781430249382_Ch09.xhtml#Fig36)).


    ![9781430249382_Fig09-36.jpg](images/9781430249382_Fig09-36.jpg)


    [Figure 9-36](#9781430249382_Ch09.xhtml#_Fig36). SQL executing in the `SQL Monitor`


    Data, ordered by active sessions displayed at the top, is followed by an active
    duration window, `SQL ID`, user info, database time, I/O wait info, start time,
    end time, and SQL text in the main monitoring view, as shown in [Figure 9-37](#9781430249382_Ch09.xhtml#Fig37).
    The page also offers links for `SQL ID` and user sessions to the Monitored Executions
    page.


    ![9781430249382_Fig09-37.jpg](images/9781430249382_Fig09-37.jpg)


    [Figure 9-37](#9781430249382_Ch09.xhtml#_Fig37). The top section of the `SQL Monitor`,
    the Monitored SQL Execution Details page'
