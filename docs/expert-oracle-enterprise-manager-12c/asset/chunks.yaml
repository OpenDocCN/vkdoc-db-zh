    ![9781430249382_Fig02-25.jpg](images/9781430249382_Fig02-25.jpg)


    [图 2-25](#9781430249382_Ch02.xhtml#_Fig25). 软件更新


    3.  安装程序重新启动后，继续下一步（如[图 2-26](#9781430249382_Ch02.xhtml#Fig26)所示）。为“清单位置”输入一个目录，并为您为`ORACLE用户`创建的组。当您单击“下一步”时，安装程序会检查先决条件。


