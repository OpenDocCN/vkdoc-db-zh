    The EM Job System is a mature feature in the enhanced EM12c product line that
    offers administrators a more integrated scheduler option for the database environment.
    Its ability to support the database and server environment’s job requirements
    make it the obvious choice, considering the monitoring EM12c design. The benefits
    to moving all jobs, including scripting, multistep jobs, advanced logic checks,
    and service tests, are all worthwhile to the administrator of today, who is expected
    to perform the demanding role of database specialist.


    # CHAPTER 12 Incident Management


    by Pete Sharman


    The goal of incident management is to enable administrators to monitor and resolve
    service disruptions that may be occurring in their data centers as quickly and
    efficiently as possible. Instead of managing the numerous discrete events that
    may be raised as the result of any of these service disruptions, we want to manage
    a smaller number of more-meaningful incidents, and to manage them based on business
    priority across the lifecycle of those incidents.


    To do this, EM12c provides a centralized incident console called Incident Manager
    that enables an administrator to track, diagnose, and resolve these incidents,
    as well as providing features to help eliminate the root causes of recurrent incidents.
    Incident Manager also includes features to tie in to Oracle expertise via relevant
    My Oracle Support knowledge base articles and documentation to enable administrators
    to accelerate the process of diagnosing and resolving incidents and problems.
    Finally, Incident Manager also offers the ability to do lifecycle operations for
    incidents, so you can assign ownership of an incident to a specific user, acknowledge
    an incident, set a priority for an incident, track an incident’s status, escalate
    an incident, or suppress it so you can defer it to a later time. You can also
    raise notifications on an incident or open a help-desk ticket via the help-desk
    connectors.


    Because Incident Manager is brand new functionality in EM12c, this chapter provides
    the following:


    *   An explanation of the new terminology, including events, incidents, and problems

    *   An introduction to the user interface so you will be able to set up Incident
    Manager

    *   Some suggested guidelines on how to get the most out of this new functionality


    ## Incident Manager Terminology


    Before drilling into how you use the Incident Manager functionality, you need
    to understand some of the new terminology. Let’s start with looking at events
    and incidents, and how they are differentiated.


    ### Events and Incidents


    Enterprise Manager continues to be the primary tool for managing and monitoring
    the Oracle data center, so it manages and monitors Oracle applications as well
    as the application stack, from application servers to databases to hosts, and
    the operating system. When Enterprise Manager detects issues in any of this infrastructure,
    it raises events. The *events* might be any of the following:


    *   *Metric alerts*:  These alerts (for example, CPU utilization or tablespace
    usage alerts) indicate that a critical threshold you set has been crossed.

    *   *Job events*: These could be caused by a failure in a job as you are using
    the job system. An event is raised to signal the failure of a particular job.

    *   *Standards violations*: If you are using compliance standards, and any of
    the targets that are being monitored violate any of those standards, a standards
    violation event could be raised.

    *   *Availability events*: If Enterprise Manager detects that a target is down,
    an availability event can be raised.

    *   *Other events*: Other types of events can occur as well, such as an SLA alert
    or High Availability and Connector External Class. Of course, users can define
    their own event types and cause an event to be raised.


    All these events signal that particular issues have occurred in the Oracle data
    center. Across all these events, you really want to be able to determine which
    are significant and, from these significant events, be able to correlate those
    that are related to the same underlying issue. At the end of the day, what you
    as an administrator want to manage is a smaller number of significant incidents.
    You may have a performance incident that amalgamates a number of performance events,
    another incident related to space, and a different incident based on availability
    problems. The goal for incident management is therefore to not manage individual
    numerous events but the smaller set of more-meaningful incidents. An incident
    could be a significant event (such as a target being down, for example) or a combination
    of events that all relate to the same issue (for example, running out of space
    could be detected by Enterprise Manager as separate events raised from the database,
    host, and storage target types).


    Events are significant occurrences in your IT infrastructure that Enterprise Manager
    detects and raises. Each event has a set of attributes indicating the type of
    event, its severity (Fatal, Critical, and so on), the object or entity on which
    the event is raised (typically a target, but possibly a job or some other object),
    the message associated with the event, the timestamp at which it occurred, as
    well as the functional category (such as availability, security, and so forth).


    Associated with these events are event severities. The first of these, Fatal,
    is a new severity level in Enterprise Manager specifically associated with the
    target availability event type that means the target is down. Critical and Warning
    events have the same meaning as they had in previous releases. Next, the Advisory
    level is typically associated with compliance standards violation events. The
    Informational level is  used to indicate simply that an event has occurred, but
    there is no need to do anything about it.


    As noted previously, an incident can contain one or more events. Let’s look at
    the details of an incident with one event. [Figure 12-1](#9781430249382_Ch12.xhtml#Fig1)
    shows an incident with one availability event.


    ![9781430249382_Fig12-01.jpg](images/9781430249382_Fig12-01.jpg)


    [Figure 12-1](#9781430249382_Ch12.xhtml#_Fig1). Incident with one event


    The event signals that the database DB1 is down and includes a timestamp indicating
    when the event was raised. Because this is a target availability event and the
    database is down, the severity is marked as Fatal. An incident can be created
    for that event, so the incident contains only one event. In order to manage and
    track the resolution of the incident, the incident has other attributes such as
    owner (the Enterprise Manager user who is working on the incident), status, incident
    severity (which is based on the event severity), priority, and a comment field.


    Incidents can also contain multiple events; those events would be related and
    point to the same underlying cause. The example in [Figure 12-2](#9781430249382_Ch12.xhtml#Fig2)
