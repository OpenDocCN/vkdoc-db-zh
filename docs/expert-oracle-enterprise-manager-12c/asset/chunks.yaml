    Manager target names is not supported. This is supported in the 12.1.0.3 plug-in.


    With the evolution of technology, hardware standards change and provide new ways
    of performing tasks. Engineered systems, especially the Oracle Exadata Database
    Machine, are susceptible to these changes. EM12c’s plug-in architecture was designed
    to work with not only the software stack but also the hardware stack. Moving forward,
    this plug-in architecture will allow for changes in existing engineered systems
    and future releases of the hardware.


    Planning and Setup Phase


    After an Oracle Exadata Database Machine arrives on site and has been acclimated
    to its surroundings, it can be configured with the network. The next task is to
    set up monitoring for the machine with EM12c.


    ![image](images/sq.jpg) **Note**  The Oracle Exadata Database Machine is a complex
    piece of enterprise infrastructure. Its compact design makes it susceptible to
    condensation if it is not acclimated to its environment. We recommend letting
    it sit on site for 48 to 72 hours before plugging it in for configuration.


    Although EM12c can monitor Exadata out of the box, you still need to plan and
    configure monitoring before deploying applications to the Exadata and using its
    capabilities. Typically, the following steps are performed in order to configure
    the Exadata for proactive monitoring:


    1.  Install the management agents to compute nodes.

    2.  Launch autodiscovery.

    3.  Specify component credentials.

    4.  Review configurations and complete setup.


    After following these simple steps to discover Oracle Exadata Database Machine
    components, the configuration can be completed in a few minutes.


    Installing the Management Agent


