    This takes you to the Oracle Exadata Database Machine Discovery page, shown in
    [Figure 8-4](#9781430249382_Ch08.xhtml#Fig4). Here you have the option of either
    adding a new database machine with associated hardware or discovering newly added
    hardware. After selecting an option, click the Discover Targets button.


    ![9781430249382_Fig08-04.jpg](images/9781430249382_Fig08-04.jpg)


    [Figure 8-4](#9781430249382_Ch08.xhtml#_Fig4). Oracle Exadata Database Machine
    Discovery page


    Specifying Component Credentials


    After clicking the Discover Targets button, EM12c launches the Database Machine
    Discovery Wizard, shown in [Figure 8-5](#9781430249382_Ch08.xhtml#Fig5). The wizard
    will walk you through the ten steps needed to add an Exadata Database Machine
