    \ to allow communication for the HTTP Console, HTTPS Console, HTTP Agent Upload,\
    \ and HTTPS Agent Upload ports as well as the Admin Server and Node Manager ports.\n\
    \nThe following deployment procedure provides a step-by-step workflow for cloning\
    \ the primary Enterprise Manager software including plug-ins and patches to another\
    \ server:\n\n1.  Copy the emkey to the management repository by running this command\
