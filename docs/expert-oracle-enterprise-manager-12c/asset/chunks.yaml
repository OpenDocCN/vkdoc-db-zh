    4.  四项任务中的最后一项是`合规性标准`。点击`合规性标准`进入其一步向导。在这里，您可以为新的数据库分配一个合规性标准。这大大加快了根据内部合规性标准配置数据库的速度（参见图
    6-74）。对于本示例，选择`无`并点击`下一步`。


    ![image](img/sq.jpg) `注意` 有关 Oracle 企业管理器内合规性配置的更多信息，请参阅 Oracle 文档。


