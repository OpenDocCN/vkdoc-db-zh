- fmt: '# 仓库视图与通信流程


    仓库视图在《Enterprise Manager Cloud Control Extensibility Programmer’s Reference》中有文档说明（您可以从位于[http://docs.oracle.com/cd/E24628_01/index.htm](http://docs.oracle.com/cd/E24628_01/index.htm)的EM12c文档访问该参考手册）。该在线参考的第18章详细说明了这些视图的使用，并提供了显示每个视图列名的视图的完整列表。


    ## 通信流程


    当您首次开始使用像Enterprise Manager Cloud Control 12c这样的产品时，最令人困惑的领域之一就是产品各个部分之间的通信流程是如何进行的。本质上，您需要理解三个领域：涉及的协议、正在使用的端口，以及是否使用了防火墙。


    ## 协议


    在EM12c安装的组件之间进行通信时，使用三种主要协议：


    *   `Hypertext Transfer Protocol (HTTP)` 或 `Hypertext Transfer Protocol/Secure
    (HTTP/S)`：这些是万维网使用的基础协议。它们定义了消息如何传输和格式化，以及浏览器和Web服务器对不同命令的响应操作。`HTTP`和`HTTP/S`用于在`OMA`、`OMS`和`OMR`之间进行通信。出於安全原因，Oracle通常建议使用`HTTP/S`而非`HTTP`。

    *   `Java Database Connectivity (JDBC)`：这个Java标准由`OMS`用于与仓库通信，以及与任何数据库目标通信。

    *   `Internet Control Message Protocol (ICMP)`：该协议由`OMS`用于与主机通信，以检查主机的状态。本质上，使用`ping`命令来检查其状态。


    ## 端口


    在EM12c安装过程中，系统会提示您提供实体通信的端口列表。默认列表显示在“端口配置详细信息”页面上，如[图1-8](#9781430249382_Ch01.xhtml#Fig8)所示。该页面显示了“推荐端口范围”列。此列中列出的第一个端口号是默认端口。如果出于任何原因，在您进行安装时默认端口已被占用，将使用“推荐端口范围”中的下一个端口号。安装后，您还可以在位于OMS主机上的`staticports.ini`文件中找到已使用的端口号。


    ![9781430249382_Fig01-08.jpg](images/9781430249382_Fig01-08.jpg)


    [图1-8](#9781430249382_Ch01.xhtml#_Fig8). 端口配置详细信息页面


    ## 防火墙


    在许多情况下，企业会要求使用防火墙来控制进出网络流量。这通常涉及限制端口的可用性或限制可以通过特定端口的流量类型。由于这种限制可能难以设置，通常建议在部署Enterprise
    Manager配置之后再进行防火墙配置和启用。但是，如果防火墙已经就位，您应该打开计划使用的通信端口，直到安装完成。


    将这三个领域（协议、端口和防火墙）结合起来，EM12c安装中的默认通信流程如[图1-9](#9781430249382_Ch01.xhtml#Fig9)所示。


    ![9781430249382_Fig01-09.jpg](images/9781430249382_Fig01-09.jpg)


    [图1-9](#9781430249382_Ch01.xhtml#_Fig9). EM12c配置中的端口、协议和防火墙


    # EM12c中的认证


    借助EM12c版本中提供的新可插拔框架，您现在在认证方面有了更多选择。该框架接受一系列可插拔的认证方案，使您能够选择最适合您环境的方法。由于EM12c依赖Oracle的WebLogic
    Server进行外部认证，因此WLS支持的任何认证方法都可用于对EM12c进行认证。支持的认证方法包括以下内容：


    *   `Repository-based authentication`：在这个您可能从之前版本的Enterprise Manager熟悉的默认认证选项中，系统会提示您输入用户名和密码。此认证方法提供标准的密码选项，如密码有效期、密码宽限期、失败尝试次数和密码复杂度。

    *   `Single sign-on authentication`：如果您的企业中使用单点登录（SSO）认证，您可以将这些SSO凭据注册为EM12c中的管理员。然后，您可以使用这些凭据访问Cloud
    Control控制台。

    *   `Oracle Access Manager SSO authentication`：Oracle Access Manager（OAM）是Oracle
    Fusion Middleware产品附带的SSO解决方案。同样，如果您正在使用OAM SSO，您可以将这些凭据注册为EM12c中的管理员，并使用它们访问控制台。

    *   `Enterprise User Security authentication`：`EUS`允许您在符合轻量级目录访问协议（`LDAP`）的目录服务器中将企业用户和角色创建并存储为目录对象。然后，您可以使用`EMCTL`设置一些属性，以允许您深入到这些数据库中，而不显示标准登录页面。

    *   `LDAP authentication`：在之前版本的Enterprise Manager中，允许使用`LDAP`认证，但它仅限于Oracle的`LDAP`解决方案，Oracle
    Internet Directory（`OID`）。在12c版本中，现已扩展到除了`OID`之外，还可以使用Microsoft的Active Directory产品。


    # 总结


    本章向您介绍了Enterprise Manager Cloud Control 12c的主要架构组件：Cloud Control控制台、Oracle Management
    Agent、Oracle Management Service、Oracle Management Repository以及插件。您了解了部署此架构的选项以及可用于连接到EM12c的认证方法。本章还涵盖了EM12c使用的协议、端口和防火墙，因此您现在已准备好更详细地钻研产品的安装。这是我们下一章的主题。


    # 第2章 安装与代理部署


    ![image](images/frontdot.jpg)


    作者：Gokhan Atil


    在本章中，您将学习如何创建仓库数据库并安装Oracle Enterprise Manager Cloud Control 12c。如果您有任何安装Enterprise
    Manager Grid Control（Cloud Control的前身）的经验，您会发现EM12c配备了一个更智能的安装向导，因此安装过程要容易得多。


    EM12c由三个组件组成：Oracle Management Service（`OMS`）、Oracle Management Agents（管理代理）和Oracle
    Management Repository（管理仓库）。


    本章的安装和代理部署演示使用三台服务器：


    *   `cloudcontrol12.testdomain.com`：Oracle Management Service将安装到此服务器。

    *   `repositorydb.testdomain.com`：此数据库服务器将托管管理仓库。

    *   `target.testdomain.com`：管理代理将部署到此目标服务器。


    所有这些服务器都运行Oracle Linux 5.8（64位）以及GNOME桌面环境和X Window系统。


    虽然您可以将管理仓库和`OMS`安装在同一服务器上，但我们更倾向于将管理仓库安装在单独的服务器上。如果您计划将两者安装在同一服务器上，则应满足两次安装的要求。


    我们建议您使用域名系统（`DNS`）服务器来解析服务器的主机名。如果您没有`DNS`服务器，则需要在Oracle Management Server上的`/etc/hosts`文件中输入所有目标的主机名和相应的IP地址。您还需要在所有目标服务器（您将在其上部署管理代理）上的`/etc/hosts`文件中输入`OMS`的主机名/IP地址。'
  raw: 'The repository views are documented as part of the *Enterprise Manager Cloud
    Control Extensibility Programmer’s Reference* (you can access this from the EM12c
    documentation located at [http://docs.oracle.com/cd/E24628_01/index.htm](http://docs.oracle.com/cd/E24628_01/index.htm)).
    Chapter 18 of that online reference details the use of those views, along with
    a complete listing of the views displaying the column names for each view.


    Communication Flow


    When you first start using a product such as Enterprise Manager Cloud Control
    12c, one of the areas of greatest confusion is just how communications flow between
    the various parts of the product. Essentially, you need to understand three areas:
    the protocols involved, the ports that are being used, and whether firewalls are
    being used.


    Protocols


    Three main protocols are used to communicate between the components in an EM12c
    installation:


    *   *Hypertext Transfer Protocol (HTTP)* *or Hypertext Transfer Protocol/Secure
    (HTTP/S)*: These are the underlying protocols used by the World Wide Web. They
    define how messages are transmitted and formatted, as well as the actions that
    browsers and web servers take in response to different commands. HTTP and HTTP/S
    are used to communicate between the OMA, OMS, and OMR. For security reasons, Oracle
    typically recommends using HTTP/S rather than HTTP.

    *   *Java Database Connectivity (JDBC)*: This Java standard is used by the OMS
    to communicate with the repository, as well as to communicate with any database
    targets.

    *   *Internet Control Message Protocol (ICMP)*: This protocol is used by the OMS
    to communicate with a host, to check the status of the host. Essentially, a ping
    command is used to check its status.


    Ports


    During the EM12c installation, you are prompted to supply a list of ports for
    entities to communicate on. A default list is provided on the Port Configuration
    Details page, shown in [Figure 1-8](#9781430249382_Ch01.xhtml#Fig8). The page
    displays a Recommended Port Range column. The first port number listed in this
    column is the default port. If for any reason the default port is already used
    when you are doing an installation, the next port number in the Recommended Port
    Range will be used. Post installation, you can also find the port numbers that
    were used in the staticports.ini file, located on the OMS host.


    ![9781430249382_Fig01-08.jpg](images/9781430249382_Fig01-08.jpg)


    [Figure 1-8](#9781430249382_Ch01.xhtml#_Fig8). The Port Configuration Details
    page


    Firewalls


    In many cases, a business will require firewalls to be used to control both outgoing
    and incoming network traffic. This typically involves restricting either the availability
    of ports or the type of traffic that can pass through a particular port. Because
    this restriction can be difficult to set up, it is usually recommended that firewall
    configuration and enablement are left until after you have deployed your Enterprise
    Manager configuration. However, if the firewalls are already in place, you should
    open the communication ports you are planning to use until the installation is
    complete.


    Pulling these three areas (protocols, ports, and firewalls) together, the default
    communication flows in an EM12c installation are shown in [Figure 1-9](#9781430249382_Ch01.xhtml#Fig9).


    ![9781430249382_Fig01-09.jpg](images/9781430249382_Fig01-09.jpg)


    [Figure 1-9](#9781430249382_Ch01.xhtml#_Fig9). Ports, protocols, and firewalls
    in an EM12c configuration


    Authentication in EM12c


    With the new pluggable framework that is available to you in the EM12c release,
    you now have more options as far as authentication is concerned. The framework
    accepts a range of pluggable authentication schemes, enabling you to choose the
    methods that are most suitable to your environment. Because EM12c relies on Oracle’s
    WebLogic Server for external authentication, any authentication method that WLS
    supports can be used to authenticate to EM12c. Supported authentication methods
    include the following:


    *   *Repository-based authentication*: In this default authentication option that
    you might be familiar with from previous releases of Enterprise Manager, you are
    prompted for a username and password. Standard password options—such as password
    lifetime, password grace, number of failed attempts, and password complexity—are
    available with this authentication method.

    *   *Single sign-on authentication*: If you use single sign-on (SSO) authentication
    in your enterprise, you can register those SSO credentials as an administrator
    in EM12c. You can then use those credentials to access the Cloud Control console.

    *   *Oracle Access Manager SSO authentication*: Oracle Access Manager (OAM) is
    the SSO solution supplied with Oracle’s Fusion Middleware product. Again, if you
    are using OAM SSO, you can register those credentials as an administrator in EM12c
    and use them to access the console.

    *   *Enterprise User Security authentication*: EUS allows you to create and store
    enterprise users and roles as directory objects in a directory server compliant
    with the Lightweight Directory Access Protocol (LDAP). You can then use EMCTL
    to set some properties to allow you to drill into those databases without displaying
    the standard logon pages.

    *   *LDAP authentication*: In previous releases of Enterprise Manager, LDAP authentication
    was allowed, but it was restricted to Oracle’s LDAP solution, Oracle Internet
    Directory (OID). In the 12c release, that has now been extended to allow you to
    use Microsoft’s Active Directory product in addition to OID.


    Summary


    This chapter has introduced you to the major architectural components of Enterprise
    Manager Cloud Control 12c: the Cloud Control console, the Oracle Management Agent,
    the Oracle Management Service, the Oracle Management Repository, and plug-ins.
    You’ve looked at options for deploying this architecture and the authentication
    methods you can use to connect to EM12c. This chapter also covered the protocols,
    ports, and firewalls used by EM12c, so you’re now ready to drill into the installation
    of the product in more detail. That’s the subject of our next chapter.


    CHAPTER 2


    ![image](images/frontdot.jpg)


    Installation and Agent Deployment


    **by Gokhan Atil**


    In this chapter, you will learn how to create a repository database and install
    Oracle Enterprise Manager Cloud Control 12c. If you have any experience with installing
    Enterprise Manager Grid Control (the ancestor of Cloud Control), you’ll see that
    EM12c comes with a smarter installation wizard, so the installation is much easier.


    EM12c consists of three components: Oracle Management Service (OMS), Oracle Management
    Agents (management agents), and Oracle Management Repository (management repository).


    This chapter’s demonstration of the installation and agent deployment uses three
    servers:


    *   cloudcontrol12.testdomain.com: Oracle Management Service will be installed
    to this server.

    *   repositorydb.testdomain.com: This database server  will host the management
    repository.

    *   target.testdomain.com: Management agents will be deployed to this target server.


    All of these servers are running Oracle Linux 5.8 (64-bit) as well as the GNOME
    desktop environment and the X Window System.


    Although you can install both the management repository and OMS on same server,
    we prefer to install the management repository on a separate server. If you’re
    planning to install both on the same server, you should accommodate the requirements
    for both installations.


    We recommend that you use a Domain Name System (DNS) server to solve the hostnames
    of the servers. If you do not have a DNS server, you need to enter the hostnames
    and corresponding IPs of all targets into /etc/hosts on the Oracle Management
    Server. You also need to enter the hostname/IP address of OMS into the /etc/hosts
    file on all target servers (to which you’ll deploy the management agent).'
