    Rocky Mountain Oracle Users Group (RMOUG) Training Days 会议的总监，该会议是最大的区域性会议之一。Kellyn
    在 `https://dbakevlar.com` 上写博客，并深陷社交媒体。可以在 Twitter 上通过句柄 `@DBAKevlar`、LinkedIn
    和 Facebook 上找到她，她经常在那里讨论她的日常技术冒险，因为她在家工作，没有同事可以倾诉。她还领导着本地和全球的技术女性 (WIT) 小组，指导技术领域的女性同仁。Kellyn
    与她的伴侣 Tim Gorman 以及她的三个孩子 Sam、Cait 和 Josh 一起居住在科罗拉多州的威斯敏斯特。


