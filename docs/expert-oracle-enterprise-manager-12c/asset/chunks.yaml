    workstation you are installing the client on is secured, particularly if the username
    you also pass in has Super Administrator–level access.


    As an example, here’s a command executed to complete setup on a local workstation:


    ```

    $ ./emcli setup -url=

    https://em12.acme.com/em

    -username=psharman -autologin

    ```


    Once the command completes, you will have access to all the verbs EMCLI recognizes.
    There are way too many to describe here, but executing the command emcli help
