    ## OMS Management with the Command Line


    Let’s start this section by discussing what’s *not* available for managing the
    OMS from the command line anymore, and that’s the `OPMNCTL` utility. Although
    the utility still exists, it has been superseded by the `EMCTL` utility. So let’s
    look at that in more detail.


    ## The EMCTL Utility


    The `EMCTL` utility is used for many operations against the OMS, in a similar
    manner to the way it is used against the agent. Having said that, there are many
    `emctl` commands that will appear to operate against the repository when you issue
    them via the `emctl` command from the OMS home. That’s because a lot of repository
    information (credentials, connectivity, and so forth) is also stored in the OMS
    to enable it to connect to the repository and do its work, so these commands are
    basically synchronizing between the two.


    [Table 3-3](#9781430249382_Ch03.xhtml#Tab3) lists some of the more commonly used
    `emctl` commands from the OMS home.


    [Table 3-3](#9781430249382_Ch03.xhtml#_Tab3). OMS emctl Commands'
  raw: 'To manage the OMS from the console, you choose Setup ![arrow](images/arrow.jpg)
    Manage Cloud Control ![arrow](images/arrow.jpg) Management Services, as shown
    in [Figure 3-11](#9781430249382_Ch03.xhtml#Fig11).


    ![9781430249382_Fig03-11.jpg](images/9781430249382_Fig03-11.jpg)


    [Figure 3-11](#9781430249382_Ch03.xhtml#_Fig11). Accessing the OMS from the EM12c
    console


    This takes you to the Management Services home page, shown in [Figure 3-12](#9781430249382_Ch03.xhtml#Fig12).


    ![9781430249382_Fig03-12.jpg](images/9781430249382_Fig03-12.jpg)


    [Figure 3-12](#9781430249382_Ch03.xhtml#_Fig12). The Management Services home
    page


    In this particular environment, we have two OMSs set up, with a load balancer
    controlling the connections to each one. There is actually more output to the
    right of this screen (CPU Usage, Heap Usage, and WebLogic Server) but it has been
    trimmed to fit on the page more easily.


    By clicking Configuration Properties at the top lright you can alter the runtime
    behavior of the OMS by setting properties as needed. The default setting shows
    you all the nondefault properties, , but you can change that to All or Non Default
    at Management Server Instances by clicking the drop-down arrow on the right of
    the highlighted box, as seen in [Figure 3-13](#9781430249382_Ch03.xhtml#Fig13).


    ![9781430249382_Fig03-13.jpg](images/9781430249382_Fig03-13.jpg)


    [Figure 3-13](#9781430249382_Ch03.xhtml#_Fig13). Configuration properties for
    the OMS


    You can also click a property name to change it. For example, if you want to set
    up tracing between an agent (or group of agents) and the OMS to diagnose problems
    between them, you can click the property oracle.sysman.core.gcloader.trace_agent,
    and change the setting as appropriate, as shown in [Figure 3-14](#9781430249382_Ch03.xhtml#Fig14).
    Depending on the property, you can either set this value globally (for all OMSs)
    or for an individual OMS. This can be particularly useful if you have more than
    one OMS and a problem occurs for just one of them. Note also (as highlighted in
    [Figure 3-14](#9781430249382_Ch03.xhtml#Fig14)) that you can see change history
    for this property, including the date of previous changes, old and new values,
    and who made the change.


    ![9781430249382_Fig03-14.jpg](images/9781430249382_Fig03-14.jpg)


    [Figure 3-14](#9781430249382_Ch03.xhtml#_Fig14). Changing a property value for
    the OMS


    You can see more detail on each OMS by clicking its name to go to the OMS home
    page. [Figure 3-15](#9781430249382_Ch03.xhtml#Fig15) shows an example page from
    a configuration having two OMSs with a load balancer in front of them . The OMS
    home page has several regions. The two most important are the Summary region (which
    shows the status, percentage availability, and so on) and the Incidents and Problems
    region (which shows a list of incidents and problems specific to this OMS). Incident
    management is covered in more detail in [Chapter 12](#9781430249382_Ch12.xhtml).


    The other section of the page that is of interest is the Oracle Management Service
    at the top left. Many of these options are similar to those on the agent home
    page, so they are not covered here.


    ![9781430249382_Fig03-15.jpg](images/9781430249382_Fig03-15.jpg)


    [Figure 3-15](#9781430249382_Ch03.xhtml#_Fig15). OMS home page


    So right about now you might be wondering where all the start, stop, and status
    commands are available from. These commands would cause the console to become
    unavailable, because the OMS is also responsible for rendering the user interface.
    Therefore, these commands are executed via our old friend, EMCTL, which you’ll
    look at in the context of the OMS shortly. Before you do so, however, there is
    one more part of the GUI that you need to look at for the OMS: the Health Overview
    page, shown in [Figure 3-16](#9781430249382_Ch03.xhtml#Fig16). This page provides
    an overview of both the OMS and repository operations and performance. It is accessed
    by choosing  Setup ![arrow](images/arrow.jpg) Manage Cloud Control ![arrow](images/arrow.jpg)
    Health Overview.


    ![9781430249382_Fig03-16.jpg](images/9781430249382_Fig03-16.jpg)


    [Figure 3-16](#9781430249382_Ch03.xhtml#_Fig16). Health Overview page


    The Health Overview page also has several useful regions. For a quick overview
    of the managed environment, the Overview region is quite useful, particularly
    for determining the number and status of all the targets being monitored. However,
    the most interesting part is the Upload Performance region, where you can identify
    probable loader problems and network problems. Also of interest is the OMS and
    Repository menu. This again has similar content to the equivalent menu on the
    OMS and Agents home pages, but there are a couple of other options that you don’t
    see on those pages. The one that’s of most relevance from the OMS perspective
    (others are covered in the equivalent repository section of this chapter) is the
    Add Management Service link, which starts the Deployment Procedure Manager to
    add an additional OMS to your existing system.


