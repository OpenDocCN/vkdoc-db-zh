    \ in the preceding sections may change from version to version, so you should\
    \ check the actual requirements in the Oracle Enterprise Manager Cloud Control\
    \ Basic Installation Guide.\n\nInstalling Management Repository\n\nIn this section,\
    \ you’ll download and install Oracle Database 11gR2 on the server named repositorydb.testdomain.com.\n\
    \nIt’s possible to use one of the certified databases: 11.2.0.3, 11.2.0.2, 11.2.0.1,\
    \ 11.1.0.7, or 10.2.0.5\\. If you already have a database server for the repository\
    \ database, you can skip to the installation of Oracle EM12c.\n\n![image](images/sq.jpg) **Tip**  You\
    \ can find an up-to-date list of certified databases for Enterprise Manager Cloud\
    \ Control on My Oracle Support: [https://support.oracle.com/epmos/faces/CertifyHome](https://support.oracle.com/epmos/faces/CertifyHome).\
    \ You may want to use an Oracle Real Application Clusters (RAC) database for high\
    \ availability.\n\nUsing the Oracle-Validated RPM Package and YUM\n\nIn order\
    \ to install Oracle Database 11gR2 on Oracle Linux, your system needs to meet\
    \ a few prerequisites. Using the oracle-validated RPM package, you can complete\
