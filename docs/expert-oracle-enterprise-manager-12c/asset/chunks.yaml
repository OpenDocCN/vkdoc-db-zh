  trans: '

    “创建指令”向导随即显示。首先，向导会引导您来到“描述”页面（如图 6-20 所示），让您描述该指令将属于何种类型。此页面上唯一必需的信息是实体的`名称`、`描述`和`其他属性`。与通用组件类似，您可以通过在“附件”和“备注”区域添加文件或备注，将文件和备注与该指令关联起来。


    ![9781430249382_Fig06-20.jpg](img/9781430249382_Fig06-20.jpg)

    图 6-20. 描述指令


    您可能还会注意到页面顶部的向导步骤。创建指令所需的步骤比创建通用组件要少。填写必填字段后，单击“下一步”进入向导的下一个界面。


    如前所述，指令是在软件库中对软件包执行一组指令的实体。在“配置”页面（如图 6-21 所示），您可以选择添加与指令关联的命令行参数和属性。如果命令行参数或您想要的属性类型没有需要添加的内容，可以直接单击“下一步”。


    ![9781430249382_Fig06-21.jpg](img/9781430249382_Fig06-21.jpg)

    图 6-21. 配置指令


    命令行参数就是参数——可以像使用脚本一样传递。参数可以包括稍后设置的变量、前缀和后缀。前缀和后缀文本分别附加在属性值之前和之后，以生成命令行参数。


    ![image](img/sq.jpg) **注意** 以下是一个命令行参数示例：

    `./test.sh –user={username}`

    其中，前缀是 `-user=`，属性是 `username`。


    要设置命令行参数，请单击 `添加` 按钮。会出现一个对话框，允许您配置参数前缀、属性名称和参数后缀，如图 6-22 所示。这个对话框的方便之处在于，它明确告诉您需要提供哪些信息，不像其他对话框。


    ![9781430249382_Fig06-22.jpg](img/9781430249382_Fig06-22.jpg)

    图 6-22. 添加命令行参数


    设置好所有所需的参数后，单击 `确定`。这会将参数添加到“配置”页面。随着您添加更多参数，命令行会开始在它们下方构建。图 6-23 显示我们添加了两个参数，并为我们生成了命令行。


    ![9781430249382_Fig06-23.jpg](img/9781430249382_Fig06-23.jpg)

    图 6-23. 添加参数后构建的命令行


    为指令添加完所有参数后，您需要告诉指令将运行哪种类型的脚本。这可以在同一页面的“配置属性”部分完成。您需要告知指令您将使用 `Perl` 或 `Bash`。此外，如果脚本需要以提升的权限运行，您可以通过勾选
    `以高权限运行` 框来指示。图 6-24 显示为一个 Bash 脚本选择了 `以高权限运行` 复选框。


    ![9781430249382_Fig06-24.jpg](img/9781430249382_Fig06-24.jpg)

    图 6-24. 指令的配置属性


    现在您已经配置好了指令“配置”页面上所有需要的项目，可以单击 `下一步` 继续。向导会将您带到“选择文件”界面。


    在此界面上，您会看到两个单选按钮，使您能够上传指令所需的文件，或通过位置引用它们。这两个选项与最初创建软件库时的选项非常相似；适用相同的规则：


    *   `上传文件`：如果您想从本地文件系统或代理机器将一些实体文件上传到选定的目标位置，请使用此选项。

    *   `引用文件`：此选项允许您输入源位置详细信息，因为您没有向软件库上传任何内容。


    选择 `上传文件` 选项，如图 6-25 所示。


    ![9781430249382_Fig06-25.jpg](img/9781430249382_Fig06-25.jpg)

    图 6-25. 选择要上传的文件


    接下来，您需要选择目标位置。在“指定目标”下，选择上传位置旁边的放大镜图标。这将打开一个对话框，您可以在其中选择 `OMS 共享文件系统` 或 `OMS 代理文件系统`。默认显示的是设置软件库时指定的位置（参见图
    6-26）。选择软件库并单击 `确定`。


    ![9781430249382_Fig06-26.jpg](img/9781430249382_Fig06-26.jpg)

    图 6-26. 选择上传位置


    接下来，您需要指定源文件。这些是指令执行其工作所需的脚本文件。这些文件可以从本地主机上传，也可以通过安全复制等远程传输过程从远程主机上传。


    ![image](img/sq.jpg) **注意** 如果从本地文件系统上传，文件大小限制为 25MB。如果从远程文件系统上传，“保存并上传”操作将提交一个文件传输任务，将远程文件移动到上传位置。


    要在“指定源”位置添加文件，您需要单击 `添加` 按钮。这将打开用于选择和添加文件的对话框（参见图 6-27）。选择您要添加的文件，提供文件名，然后单击 `确定`。默认情况下，文件名会被添加到“名称”文本框中。


    ![9781430249382_Fig06-27.jpg](img/9781430249382_Fig06-27.jpg)

    图 6-27. 向指令添加文件


    单击 `确定` 后，该文件会被添加到“选择文件”页面的“指定源”部分，如图 6-28 所示。请注意，文件的名称、大小和 mime 类型已列出。如果此指令有多个文件，下拉框允许您选择主文件。在此示例中，您只使用一个文件；默认情况下，这将是主文件。单击
    `下一步` 完成指令的创建。


    ![9781430249382_Fig06-28.jpg](img/9781430249382_Fig06-28.jpg)

    图 6-28. 指定源文件


    指令完成后，向导会将您带回软件库，并显示一条确认消息，说明创建成功。此时，您将能够找到您创建的指令。图 6-29 显示了确认消息。


    ![9781430249382_Fig06-29.jpg](img/9781430249382_Fig06-29.jpg)

    图 6-29. 新指令创建完成


    指令创建完成后，它就像软件库中的任何其他实体一样。它可由创建它的所有者或超级管理员查看、编辑或删除。


    ## 维护软件库中的实体


    与任何软件一样，维护任务也需要处理。软件库中的实体也不例外。我们已经讨论了如何创建和添加通用实体和指令实体。现在您已准备好学习维护实体。


    许多对实体的维护任务都可以从软件库中执行。我们在此不深入探讨这些内容。有关这些任务的更多信息，请参阅 Oracle 文档；本节仅列出可以完成的项目。

    '
- fmt: '## Maintaining the Software Library


    ![image](images/sq.jpg) **Note** Oracle documentation for EM12c Cloud Control
    is located here: [http://docs.oracle.com/cd/E24628_01/index.htm](http://docs.oracle.com/cd/E24628_01/index.htm).


    Maintenance tasks for entities are as follows:


    *   Granting or revoking privileges

    *   Moving entities

    *   Changing entity maturity

    *   Adding notes to entities

    *   Adding attachments to entities

    *   Viewing, editing, and deleting entities

    *   Searching entities

    *   Exporting/importing entities

    *   Staging files associated with an entity


    ![image](images/sq.jpg) **Note** Starting with version 12.1.0.2 of EM12c, you
    can use either the `GUI` or the `command-line interface` to perform the preceding
    tasks.


    Just as we maintain the entities in the Software Library, we have to maintain
    the health and functionality of the Software Library itself. Only the Software
    Library administrator or a designer who has administration access can do the following:


    *   Perform periodic maintenance tasks

    *   Reimport Oracle-owned entity files

    *   Remove (and migrate) the Software Library storage location

    *   Purge deleted entity files

    *   Back up the Software Library


    All of these tasks are critical to the proper functioning of the Software Library.


    ### Performing Periodic Maintenance Tasks


    To keep the Software Library functioning properly, the following tasks must be
    performed on a regular basis:


    *   Refreshing the Software Library to compute the free and used disk space

    *   Purging deleted entities to conserve disk space

    *   Checking the configured Software Library locations to ensure that they are
    accessible


    ### Reimporting Oracle-Owned Entity Files


    Reimporting Oracle-owned entity files is not a periodic activity. This process
    should be used only when needing to recover metadata files that are owned by Oracle.
    This should be done in only two situations:


    *   If you delete the filesystem location where the metadata was imported

    *   If the import job submitted while creating the first upload location fails


    To reimport the metadata of Oracle-owned files, access the Software Library Administration
    page under `Setup`. From the `Actions` menu, choose `Re-Import Metadata`, as shown
    in [Figure 6-30](#9781430249382_Ch06.xhtml#Fig30). This submits a job that will
    reimport the metadata.


    ![9781430249382_Fig06-30.jpg](images/9781430249382_Fig06-30.jpg)


    [Figure 6-30](#9781430249382_Ch06.xhtml#_Fig30). Reimporting metadata


    ![image](images/sq.jpg) **Note** Reimporting metadata applies only to the Oracle-owned
    files, which means all entity files that ship with the `OEM` product by default.
    User-owned entity metadata cannot be recovered through the `Re-Import` functionality.


    ### Removing (and Migrating) the Software Library Storage Location


    There may come a time when you need to move the Software Library from its current
    storage location to a new location. This can happen for any number of reasons.
    For example, you might need more storage space.


    Only `Software Library Storage Administrators` have the required permissions to
    delete a storage location. Before a storage location can be deleted, you will
    be prompted to choose an alternate location to migrate the files to. Next, a migration
    job will be submitted and the current location will be marked inactive. After
    the migration job is complete, the old storage location will be deleted.


    To delete the current storage location, you follow these steps:


    1.  Access the Software Library Administration page (`Setup` → `Provisioning and
    Patching` → `Software Library`).

    2.  Select the storage location. Then click `Migrate and Remove`.

    3.  In the confirmation box, click `Remove` to submit the job. Upon successful
    completion, the old storage area will be removed from the table.


    ### Purging Deleted Entity Files


    Starting with EM12c, entities can be purged from the Software Library when no
    longer needed. The purge jobs can now be scheduled, as well, in the `Purge Deleted
    Entities Files` dialog box, shown in [Figure 6-31](#9781430249382_Ch06.xhtml#Fig31).
    To schedule a job to purge entities from the Software Library, follow these steps:


    1.  Access the Software Library Administration page (`Setup` → `Provisioning and
    Patching` → `Software Library`).

    2.  Select the storage location and then click `Purge` from the `Actions` menu.

    3.  Enter all the details needed for the job and click `OK`. Upon successful completion,
    all deleted entities will be removed from the Software Library.


    ![9781430249382_Fig06-31.jpg](images/9781430249382_Fig06-31.jpg)


    [Figure 6-31](#9781430249382_Ch06.xhtml#_Fig31). Scheduling a purge of entities


    ### Backing Up the Software Library


    Until now, we have spent a lot of time defining the Software Library, what it
    is used for, and how to add entities to it. Since we have spent a lot time setting
    up the Software Library, the last thing we want to do is back it up. However,
    just like any other Oracle product, backups are critical to ensure recoverability
    in the event of a disaster.


    Backing up the Software Library is actually done when you back up the Oracle Enterprise
    Manager itself. Backing up the Oracle Enterprise Manager is covered in detail
    in [Chapter 13](#9781430249382_Ch13.xhtml).


    ## Patching


    Patching is one of the most important phases in the lifecycle of a product. It
    enables us to keep our software products updated with bug and security fixes.
    Throughout the year, Oracle releases several types of patches to help maintain
    our products. However, patching also has always been the most challenging lifecycle
    phase, because it often is complex, risky, time-consuming, and requires downtime
    for applications. Although we can use several approaches to patching our databases,
    the challenge of minimizing downtime or outages unfortunately remains the same.


    In this section, you will learn how patches should be managed within EM12c. Additionally,
    you will look at configuring Enterprise Manager to use `My Oracle Support` and
    review the overall process of patching within the Enterprise Manager environment.


    ### Patch Management


    Before diving into the new features of patch management within EM12c, you need
    to understand the challenges that were faced before. [Table 6-2](#9781430249382_Ch06.xhtml#Tab2)
    lists the patching approaches and their associated challenges.


    [Table 6-2](#9781430249382_Ch06.xhtml#_Tab2). Current Patching Tools and Challenges


    ![Table6-2.jpg](images/Table6-2.jpg)


    Oracle Enterprise Manager addresses the challenges listed in [Table 6-2](#9781430249382_Ch06.xhtml#Tab2)
    with its much-improved patch management solution that delivers maximum ease with
    minimum downtime. The new patch management solution offers the following benefits:'
