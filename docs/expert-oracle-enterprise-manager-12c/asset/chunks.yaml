    </Metric>\n```\n\n如果你发现从头开始创建 XML 指标定义具有挑战性，可以先创建一个指标扩展作为原型，然后直接从存储库中提取 XML 定义，将其复制到你的目标类型元数据定义\
    \ XML 文件中，并根据需要进行修改。原始的 XML 定义为你提供了更大的灵活性。\n\n## EM12c 获取组件\n\nEM12c 自带了十几个有文档说明的获取组件。以下是可用获取组件的简要概述：\n\
    \n### OS 命令获取组件\n这类获取组件允许你运行操作系统命令和脚本，并将指标值作为输出传递。你已经看过示例了，这三个 OS 命令获取组件的功能与你在“指标扩展”部分看到的\
    \ OS 命令适配器相同。OS 命令由代理使用运行代理本身的同一操作系统用户执行，该代理位于代理安装的主机上。为了尽可能确保平台兼容性，我建议你使用 Perl\
    \ 脚本作为命令，并使用代理附带的 Perl。脚本和任何依赖项可以添加到插件中，并在插件部署到代理上时进行分发。请注意，如果依赖项无法简单地复制，而需要在主机上进行编译或任何其他配置，那么这些依赖项很可能需要在运行代理的主机上预先安装。这会使部署复杂化，应尽量避免。例如，如果你想通过\
    \ Perl 脚本使用 `DBI` 连接到非 Oracle 数据库，你需要编译所需的 `DBD` 模块，如 `DBD::MySQL`，这需要在插件部署之前，在主机的每个代理上手动完成。因此，更推荐使用\
    \ Perl 本地模块（例如此示例中的 `Net::MySQL`——这是我用于 MySQL 插件的模块）。\n\n### SQL 获取组件\n此获取组件允许你针对\
    \ Oracle 数据库运行 SQL 语句或 `PL/SQL` 块，并返回一个值表。可以为 `SQL` 和 `PL/SQL` 指定多个输入参数。对于 `PL/SQL`\
    \ 块，必须定义一个输出参数，并以 `PL/SQL REF CURSOR` 形式或定义为对象数组的命名类型的形式从 `PL/SQL` 返回。该获取组件的属性定义了数据库连接和凭据，以及\
    \ `SQL` 参数、要运行的内联 `SQL` 语句或 `SQL` 文件，以及要检索的最大行数。此获取组件不能用于针对非 Oracle 数据库运行 `SQL`。此获取组件的一些用例包括从\
    \ Oracle 数据库中的状态表收集应用指标，或监控在数据库内部运行的应用，例如 Oracle Application Express (`APEX`)\
    \ 应用。\n\n### SNMP 获取组件\n此获取组件允许从 `SNMP` 目标收集指标。基于 `SNMP` 获取组件的指标可以从多个对象标识符 (`OID`)\
    \ 收集值。每个 `OID` 可以引用单个变量或多个实例（例如，每个网络接口一个实例）。该获取组件还支持 `PINGMODE`，这是一种创建响应指标的简单方法，如果\
    \ `SNMP` 端口响应则返回 1，如果超时则返回 0。这比生成指标收集错误要好。该获取组件支持基于团体字符串的 `SNMP v1` 和 `v2` 协议，以及更安全的\
    \ `v3` 协议，后者需要凭据而不是团体字符串。显而易见的用例是监控 Oracle 代理原生不支持的远程网络设备或远程主机（例如 Ubuntu Linux），或者因某些原因无法安装代理的设备。正如你可能猜到的，指标扩展的\
    \ `SNMP` 适配器就是基于此获取组件。然而，`SNMP` 适配器的配置非常有限，以至于在指标扩展的上下文中几乎无用。\n\n### HTTP 数据获取组件\n\
    这类获取组件与 OS 命令获取组件非常相似，但它通过使用指定的 `URL` 执行 `HTTP GET` 请求来获取输出，而不是执行 OS 命令。输出可以是原始值、值行或基于分隔符的标记化值行——所有选项与\
    \ OS 命令获取组件相同。\n\n### URLXML 获取组件\n此获取组件可以处理从 `HTTP URL` 检索的 `XML` 响应，并根据预定义的模式匹配提取表格数据。它仅支持\
    \ `HTTP GET` 请求，也可以配置代理服务器，类似于 HTTP 数据获取组件。"
- fmt: 'Note that a pattern is defined so that it extracts rows from a hierarchical
    XML structure, because metrics accept tables of values. Each value is a number
    or a string, so no complex types can be returned and processed. You need to flatten
    your data collection.


    *   `REST fetchlet`: This provides a mean of collecting data from RESTful web
    sources. It supports `GET` and `POST` HTTP methods and Basic Authentication. The
    response can be either in `XML` or in `JavaScript Object Notation` (`JSON`) formats
    and can be transformed into a tabular presentation for metrics by using either
    `XPath` or `JSONPath`. `HTTPS` is also supported.

    *   `URL Timing fetchlet`: This is a useful collection mechanism to test the performance
    of web applications. It supports a simple proxy and can be used for both `HTTP`
    and `HTTPS` protocols. The fetchlet supports Basic Authentication for `HTTP`.
    It has capabilities for defining a connection time-out and retries and is flexible
    in configuring the metrics it collects. The fetchlet can accept multiple URLs.
    For each URL, it retrieves not only the page itself but any content required on
    the page such as images, style sheets, and so forth. It can provide detailed statistics
    for each URL or per URL. There are couple dozen statistics from obvious ones such
    as total bytes received and total time to retrieve the page as well as advanced
    statistics such as `DNS` resolution time or average time before the first byte
    is received for each request.

    *   `JDBC fetchlet`: This is similar to the `URL Timing fetchlet` because it collects
    the timing information for running a specified SQL statement against any database
    supporting `JDBC` connectivity. It collects such metrics as request status, total
    time, number of rows retrieved, and other, more fine-grained timings such as separate
    connect time and fetch time. Unfortunately, this `JDBC fetchlet` does not return
    the values retrieved as the result of the `SELECT` command. It would be more appropriate
    to call it the `JDBC Timing fetchlet` to reflect its purpose better, but that’s
    not how the Oracle Extensibility documentation names it.

    *   `Web Services and JMX fetchlets`: These provide mechanisms for retrieving
    data by using Web Services or Java Management Extensions (`JMX`). Both are widely
    adopted industry standards. While Web Services are a generic distributed messaging
    and remote execution standard, `JMX` is a standard that’s designed specifically
    for Java applications manageability. While each Java virtual machine (`JVM`) implementation
    normally supports `JMX`, applications need to be instrumented to report their
    metrics to the `JVM` so that they are accessible to the monitoring tools. Oracle’s
    application servers support `JMX` as well as many other software products such
    as IBM WebSphere and Red Hat JBoss. Many Apache projects are supporting `JMX`
    as well—for example, Apache Tomcat or Apache ZooKeeper from the Hadoop ecosystem.
    In fact, Hadoop’s core `NameNode` and `JobTracker` components are instrumented
    to expose their runtime metrics via `JMX`. Chapter 20 of the *Extensibility Programmer’s
    Reference* has a detailed walk-through for creating a new target type based on
    Web Services and `JMX`.

    *   `WBEM fetchlet`: This is the collector to retrieve metrics from components
    supporting the Web-Based Enterprise Management (`WBEM`) standard. This standard
    is widely adopted by the industry and is supported by a lot of open source and
    proprietary software. The `WBEM` standard is much more advanced than the outdated
    `SNMP` protocol, as it includes all the metadata, is more secure, and is much
    more compatible among different vendors. The `WBEM fetchlet` is basically a Common
    Information Model (`CIM`) client that connects to `CIM Object Manager` (`CIMOM`),
    often called a `CIM Server`. Windows Management Interface (`WMI`) is Microsoft’s
    implementation of `WBEM/CIM`. `CIMOM` servers can be embedded on the devices or
    servers (such as some Cisco devices or Windows or HP-UX).


    There is also a `WS-Management fetchlet` that’s similar to the `WBEM fetchlet`
    but is based on `WS-Management` standards. Microsoft Windows Remote Management
    (`WinRM`) is one example of a `WS-Management` implementation.

    *   `DMS Fetchlet`: This collector allows using the Dynamic Monitoring Service
    (implemented, for example, in Oracle Application Server and Fusion Middleware).
    It allows applications to be instrumented to exhibit runtime metrics via `DMS`,
    and then an agent can use very effective collection mechanisms. Unlike using shell
    script-based metrics, `DMS fetchlet` collectors don’t fork any processes, so it’s
    very effective in terms of resource consumption. The `DMS API` was submitted to
    the Java Community Process in 2001 as Java Specification Request 138: Performance
    Metric Instrumentation. However, it wasn’t widely adopted in the industry and
    was withdrawn in 2010.'
