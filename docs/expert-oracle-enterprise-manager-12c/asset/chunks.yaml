  trans: '

    现在设想一下，你想要监控的不是一个而是多个临时目录，并且需要分别监控每一个。你无需定义多个指标扩展（每个目录一个），而是可以将它们合并到同一个`指标扩展`中，将目录大小和文件数作为单独的一行收集，然后添加目录路径来区分这些行。这便是你需要使用`键列`的场景。在这个例子中，目录路径将是`键列`，而文件大小将是`数据列`。请注意，如果你正在创建一个`指标扩展`的新版本，你不能移除任何现有的列或添加任何`键列`。至于修改，你只能更改现有列的某些属性，例如显示名称和比较运算符。但是，你可以添加额外的`数据列`。例如，如果你已经有一个监控目录大小的指标，你不能创建一个新版本并添加一个包含目录路径的`键列`来监控多个目录的大小。相反，你需要将其克隆为一个新的`指标扩展`，而不仅仅是下一个版本。


    `键列`（或多个列）对于每次数据收集必须是唯一的。否则将引发错误。如果一个适配器接收到多行数据，并且没有为`指标扩展`定义`键列`，同样会引发错误。最后，请记住选择正确的列类型：`字符串`或`数字`。请记住，只有`数字`指标才会显示在图表上，并且在`EM12c`中，随着收集数据从详细快照转为每小时和每日快照而进行回滚或聚合。`字符串`指标仅在`EM`界面中以表格形式显示。


    ## 操作系统命令—单列


    `操作系统命令—单列`适配器仅返回一个值。你仍然应将其视为包含一列一行的表格（`EM12c`始终将指标视为表格），因此你需要在“列”选项卡中定义单个列。命令的完整输出——即使是多行输出——也会作为一个值返回。我尚未发现此适配器的许多用途，但如果你需要传回多行文本片段，这是一种可行的方法。然后，你可以设置`包含`或`匹配`告警条件，来测试返回文本中是否存在子字符串或正则表达式匹配。


    请注意，此适配器没有`操作系统命令—多列`适配器那样的`分隔符`和`起始于`属性。你无法使用前缀过滤输出行。不幸的是，此适配器仅适用于非常有限的目标集合，如本章稍后“适配器与目标类型”部分所述。


    ## 操作系统命令—多值


    `操作系统命令—多值`适配器使用与`操作系统命令—多列`适配器相同的前缀机制返回多行结果。它没有`分隔符`属性，因为适配器不会将行内容拆分为多个值；前缀后的整行内容作为值传递。最终结果是一个单列表。请注意，你只需定义一个数据列，且无需`键列`。该适配器本质上是收集一组值。因此，此适配器与`操作系统命令—多列`的区别在于，`操作系统命令—多值`不需要任何`键列`。


    此类适配器的一个用途是从日志文件收集行，你可以在列上定义`包含`或`匹配`条件。请注意，如果你尝试使用`操作系统命令—多列`适配器并仅使用单个`键列`来模拟类似的收集，你将无法在该列上定义告警条件。此外，重复的值会产生错误。


    ## SNMP 适配器


    虽然通过`SNMP`（简单网络管理协议）收集指标的想法很好，但当前`SNMP`适配器的实现使其对`指标扩展`的用途非常有限。`SNMP`适配器设计用于从单个`SNMP`服务器收集指标，该服务器通常在本地运行。然而，截至`EM`版本`12.1.0.2.0`，`SNMP`适配器基本上已损坏，因为它需要主机目标的一个特定动态属性被正确评估——`SNMPHostname`——而此属性仅在极少数硬件平台上能被解析。你可以使用`emcli`命令手动设置该属性名称作为变通方法，但你无法使用`SNMP`适配器通过部署`指标扩展`的单个主机目标来从多个设备收集指标。


    请注意，使用`SNMP`适配器还需要设置`SNMP`凭据。此适配器的文档相当不完整，因此我建议你目前避免使用它。相反，可以使用`操作系统命令`适配器来收集`SNMP`指标，或使用插件（这些插件具有功能齐全的`SNMP`指标收集方法，将在本章第二部分介绍）。


    ## JMX 适配器


    `JMX`（Java 管理扩展）适配器用于从 Java 应用程序收集指标，这些应用程序具有基于`JMX`的标准检测，嵌入在支持`JMX`的服务器中，如 Oracle
    WebLogic、IBM WebSphere、Red Hat JBoss，甚至是独立的`JVM`（Java 虚拟机）。更多信息，请参考标准文档《Oracle
    Enterprise Manager Cloud Control 12c 管理员指南》（第 8 章，第 8.4.1 节）。


    尽管公认此文档内容单薄，但当你学习本章其余部分的管理插件时，你也会了解到底层的获取器，而关于`JMX`获取器的文档描述得稍为详尽。更多信息，请参见《Oracle
    Enterprise Manager Cloud Control 可扩展性程序员参考》（第 20 章，“使用获取器”，第 20.11 节）。更完整的示例可在《Oracle
    Enterprise Manager Cloud Control 12c 管理员指南》（第 20 章，“使用 Web 服务和 JMX 进行监控”）中找到。


    ## 适配器与目标类型


    `EM12c`为每种目标类型限制了适配器的选择。虽然文档没有涵盖哪些适配器可用于哪些目标类型，但你可以从`EM_MEXT_TARGETTYPE_ADAPTERS`存储库视图中查看这些关联。从该视图中，你还可以看到几种目标类型有`Web
    服务适配器`支持，尽管这未被记录。你还可以在`EM_MEXT_ADAPTERS`视图中看到，甚至有更多的适配器可用，例如`RESTful Web Wervices
    Wdapter`。然而，它们未被任何目标类型启用。我预期这些是为后续版本预留的，正如我们见过一些功能在内部交付，但直到后续版本才对外公开。


    各种`操作系统命令`适配器可用于某些目标但不适用于其他目标，这确实没什么道理可言。例如，`操作系统命令—单列`适配器可用于自动存储管理（但不能用于集群 ASM）、集群数据库、数据库实例以及少数其他目标类型。几乎每种目标类型都有`操作系统命令—多列`适配器可用。`操作系统命令—多值`适配器与系统上安装了默认插件的`12.1.0.2.0`版本中任何可用的目标类型都没有关联。


    你可以在《Oracle Enterprise Manager Cloud Control 12c 管理员指南》（第 8.4 节）中找到关于`指标扩展`适配器的详细官方文档。如果你对底层实现更感兴趣，可以查看`SYSMAN`模式中的`EM_MEXT_%`视图和表。在本章稍后讨论插件时，我将回到这些表中的某些内容（参见“指标扩展内部揭秘”部分）。

    '
- fmt: '[Chapter 8](#9781430249382_Ch08.xhtml) of `Oracle Enterprise Manager Cloud
    Control 12c Administrator''s Guide` has more details on other capabilities of
    metric extensions, such as managing access to metric extensions, using alert options,
    and exporting/importing metric extensions. There you can also find how to migrate
    your old user-defined metrics from Grid Control 10g and 11g to the new metric
    extensions in 12c Cloud Control.


    ## Management Plug-ins


    Metric extensions are easy to create and, compared to 10g-style user-defined metrics,
    are much easier to manage at scale and provide much more flexibility to users.
    However, they are still very limited when it comes to monitoring more-complex
    targets and metrics.


    The power of plug-ins is in new target types that developers can create. Target
    types provide the already familiar notion of managed targets for each component
    of your managed infrastructure. For example, a database instance is a target and
    so is a listener. Even Oracle homes are presented as targets in EM12c.


    If your application runs on a server as a daemon, and there are ten metrics you
    want to collect, either you can define ten metric extensions and deploy all of
    them or you can define a new target type in a plug-in and then deploy just one
    plug-in. Targets also have instance properties that enable configuration of the
    target according to its deployment parameters. In contrast, metric extensions
    are not parameterized at all, so if your application is configured differently
    on each server or you are running multiple instances of the application on the
    same server, you would have to create a dedicated set of metric extensions for
    each application.


    In addition, plug-ins provide so much more beyond monitoring extensions. They
    provide full management capabilities so that plug-in developers can implement
    actions on targets such as starting and stopping an application or retrieving
    logs for analysis on demand or enabling debug mode. Target pages in the console
    are also fully customizable. There are ways to define how the new targets can
    be autodiscovered by EM12c, and many more features are available such as jobs,
    reports, configuration management, and compliance standards. You will learn about
    some of them in the remainder of this chapter while reviewing the sample plug-ins.


    ## Getting Started with the Extensibility Framework


    As mentioned earlier, the EM12c Extensibility framework is not just an add-on
    feature as it was in the 10g and 11g versions. Instead, it forms the underlying
    foundation for all management plug-ins, including those delivered by Oracle, to
    monitor its core products such as databases, middleware, applications, and engineered
    systems.


    The Extensibility framework contains everything you need to create new, full-featured
    target types—from advanced metric-collection capabilities down to automated discovery,
    configuration management, jobs support, and compliance management, as well as
    full-blown dashboards and fully interactive target-management interfaces.


    The Enterprise Manager Extensibility documentation has two guides for plug-in
    developers:


    *   `Oracle Enterprise Manager Cloud Control Extensibility Programmer''s Guide`
    is a brief overview of plug-in concepts and how they all fit together. It’s useful
    to read it in full before going to the next guide. A title such as `Management
    Plug-ins Concepts Guide` would reflect the content better.

    *   `Oracle Enterprise Manager Cloud Control Extensibility Programmer''s Reference`
    is the documentation that you will be using all the time. It’s structured as a
    guide rather than a simple reference, so think of it as the `Management Plug-ins
    Developer''s Guide`.


    This section focuses on the practical aspects of plug-in development and details
    that are not very clear in the documentation. Because the Extensibility framework
    has been changed dramatically in EM12c and is not as broadly used as other end-user
    functionality, its documentation is not as clear and thorough as the rest of the
    EM12c documentation. However, always make sure to check the latest version of
    the Oracle documentation, as improvements are released quietly in online documentation
    from time to time.


    Even if you are not planning to develop plug-ins yourself, this section will help
    you understand some internals of EM12c, so I recommend you go through it anyway.


    Before you dive into the details, let’s look at the lifecycle of a plug-in:


    *   *Design and development*: This is where plug-in developers spend most of their
    efforts.

    *   *Packaging the plug-in into an Oracle Plug-in Archive (OPAR) file*: This is
    a single package that can easily be distributed.

    *   *Deploying the plug-in on the Enterprise Manager system*: EM12c administrators
    import a plug-in from the OPAR file and deploy it on the OMS, making it available
    for end users. End users can then add new targets to monitor and manage.


    As you go through the examples in this chapter, you will see how to iterate through
    this cycle during plug-in development. First we’ll cover how to set up your development
    environment.


    ### Development Environment


    I recommend that you have a dedicated EM12c plug-in development environment. It’s
    easier to analyze the logs during troubleshooting and to fully isolate the issues
    you might encounter. Some of your activities as a plug-in developer might cause
    disruption to the environment, so it’s safer to have a development environment
    than to develop on a shared EM12c system and risk affecting other users.


    A single virtual machine (VM) works very well for that purpose. I use two virtual
    processor cores and 6GB of RAM for my virtual machine on my laptop. You can get
    away with a single core and 3–4GB of RAM, but make sure you have a reasonable
    swap size, as you will be using some Java tools in addition to running the EM12c
    environment itself. If you don’t have enough memory or swap, you might experience
    weird failures while using the `empdk` command-line tool for packaging a plug-in,
    for example.


    My development VM with Oracle Enterprise Linux hosts the EM repository, OMS, and
    the agent. I also installed and configured the Extensibility Development Kit (EDK)
    in that same VM. This way, I have a complete development environment on a single
    VM. It pays to keep backups of your development VM in case you cause any inconsistencies
    to your EM12c repository, as you will be creating and deleting objects in the
    SYSMAN schema as well as some metadata records.


    You might want to do the development on your workstation where you have your favorite
    development tools and editors (mine is vi, so I’m all set on the VM). In this
    case, you should install the Enterprise Manager Command Line Interface (`EMCLI`)
    there before installing the `EDK`. For detailed instructions on installing `EMCLI`,
    refer to [Chapter 1](#9781430249382_Ch01.xhtml) or navigate to Setup ![arrow](images/arrow.jpg)
    Command Line Interface in your EM12c console.


