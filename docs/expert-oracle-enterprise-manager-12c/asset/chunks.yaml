    We also recommend downloading and installing the latest patch set of Oracle Database
    software from My Oracle Support.


    After you download the installation files, copy them to a directory that the  ORACLE
    user can access, and then switch to the ORACLE user and unzip them:


    ```

    [oracle@repositorydb ∼]$  unzip linux_11gR2_database_1of2.zip

    [oracle@repositorydb ∼]$  unzip linux_11gR2_database_2of2.zip

    ```


    After unzipping the files, you will see a newly created directory named database.
    Open this directory and run the installer:


    ```

    [oracle@repositorydb ∼]$ cd database

    [oracle@repositorydb ∼]$ ./runInstaller

    ```


    When the installer starts, complete the following steps:


    1.  The first installer step is Configure Security Updates, shown in  [Figure
    2-1](#9781430249382_Ch02.xhtml#Fig1). You may prefer not to enter My Oracle Support
    (MOS) credentials because you will be able to follow all security updates by using
    Cloud Control. So deselect the I Wish to Receive Security Updates option and click
    Next. The installer warns about the importance of receiving critical security
    updates, but ignore the warning.


    ![9781430249382_Fig02-01.jpg](images/9781430249382_Fig02-01.jpg)


    [Figure 2-1](#9781430249382_Ch02.xhtml#_Fig1). The Oracle Database installer


    2.  The Download Software Updates step, shown in [Figure 2-2](#9781430249382_Ch02.xhtml#Fig2),
    appears. If your database server has Internet access, you should enter your MOS
    credentials to download and apply the latest patches. (In this example, we’ll
    skip this step and apply critical patch set updates manually.)  After selecting
    the appropriate option, click Next.


    ![9781430249382_Fig02-02.jpg](images/9781430249382_Fig02-02.jpg)


    [Figure 2-2](#9781430249382_Ch02.xhtml#_Fig2). Options for downloading software
    updates


    3.  For the Select Installation Option step, shown in [Figure 2-3](#9781430249382_Ch02.xhtml#Fig3),
    select Install Database Software Only. Then click Next.


    ![9781430249382_Fig02-03.jpg](images/9781430249382_Fig02-03.jpg)


    [Figure 2-3](#9781430249382_Ch02.xhtml#_Fig3). Installation options


    4.  In the Grid Installation Options step, shown in [Figure 2-4](#9781430249382_Ch02.xhtml#Fig4),
    select Single Instance Database Installation. Then click Next. (If you wanted
    to create the OEM repository database as an Oracle RAC database, you would select
    the second or third option.)


    ![9781430249382_Fig02-04.jpg](images/9781430249382_Fig02-04.jpg)


    [Figure 2-4](#9781430249382_Ch02.xhtml#_Fig4). Grid installation options


    5.  Select English for the default language, as shown in [Figure 2-5](#9781430249382_Ch02.xhtml#Fig5).


    ![9781430249382_Fig02-05.jpg](images/9781430249382_Fig02-05.jpg)


    [Figure 2-5](#9781430249382_Ch02.xhtml#_Fig5). Language options


    6.  Now you’re ready to select a database edition. This server will be used only
    as the repository database of Oracle Enterprise Manager Cloud Control, so you
    don’t need to pay a license fee for Oracle Database. Select Enterprise Edition,
    as shown in [Figure 2-6](#9781430249382_Ch02.xhtml#Fig6), and click Next.


    ![9781430249382_Fig02-06.jpg](images/9781430249382_Fig02-06.jpg)


    [Figure 2-6](#9781430249382_Ch02.xhtml#_Fig6). Selecting the database edition


    7.  The Specify Installation Location step appears, as shown in [Figure 2-7](#9781430249382_Ch02.xhtml#Fig7).
    You created /u01/app for Oracle Database, so enter /u01/app/oracle for the Oracle
    base directory. The installer will determine the Oracle home according to the
    Optimal Flexible Architecture (OFA). Out-of-place upgrades have always been a
    best-practice recommendation, but starting with Oracle Database 11.2.0.2, patch
    set installations are all out of place by default. So you may prefer to enter
    the full version in the path, such as /u01/app/oracle/product/11.2.0.3/dbhome_1.


    ![9781430249382_Fig02-07.jpg](images/9781430249382_Fig02-07.jpg)


    [Figure 2-7](#9781430249382_Ch02.xhtml#_Fig7). Installation location


    8.  Enter (or just accept) the Inventory Directory and click Next, as shown in
    [Figure 2-8](#9781430249382_Ch02.xhtml#Fig8).


    ![9781430249382_Fig02-08.jpg](images/9781430249382_Fig02-08.jpg)


    [Figure 2-8](#9781430249382_Ch02.xhtml#_Fig8). Creating the inventory  directory


    9.  For the Privileged Operating System Groups step, shown in [Figure 2-9](#9781430249382_Ch02.xhtml#Fig9),
    accept the defaults and click Next. Oracle checks the prerequisites in the following
    step. If it doesn’t find any errors, the installer advances to the Summary step.


    ![9781430249382_Fig02-09.jpg](images/9781430249382_Fig02-09.jpg)


    [Figure 2-9](#9781430249382_Ch02.xhtml#_Fig9). Operating system groups


