    About the Authors


    ![image](images/9781430249382_unFM-01.jpg)


    **Kellyn Pot’Vin** is an Oracle ACE Director and senior technical consultant at
    Enkitec, managing Oracle and SQL Server. She specializes in environment optimization,
    tuning and creating systems that are robust and enterprise level. Kellyn works
    mostly on multiterabyte databases, including Exadata, and databases with driven
    performance involving solid-state disk solutions. Kellyn is deeply involved in
    the Oracle User Group community, speaking at conferences around the world, and
    is the director for the Rocky Mountain Oracle Users Group (RMOUG) Training Days
    conference, one of the largest regional conferences. Kellyn blogs at `https://dbakevlar.com`
    and is engrossed in social media. She can be found on Twitter under the handle
    `@DBAKevlar`, LinkedIn, and Facebook, where she often discusses her daily technical
    adventures since she works from home and doesn''t have any coworkers to tell them
    to. She also heads up local and global Women in Technology (WIT) groups, mentoring
    fellow women in technical fields. Kellyn resides in Westminster, Colorado, with
    her partner, Tim Gorman, and her three children, Sam, Cait, and Josh.


    ![image](images/9781430249382_unFM-02.jpg)


    **Anand Akela** is senior principal product marketing director for Oracle Enterprise
    Manager. He focuses on Oracle’s enterprise cloud, virtualization, and infrastructure
    management offerings. Prior to his current role at Oracle, he worked at HP in
    various product marketing, product management, and engineering roles in the areas
    of systems management, servers, data center energy efficiency, and enterprise
    software.


    Anand is an active participant in various data center industry consortiums and
    currently serves as chairman for the Data Collection and Analysis Work Group at
    The Green Grid. The Green Grid is a global consortium of IT companies and professionals
    seeking to improve energy efficiency in data centers and business computing ecosystems
    around the globe. Anand also serves as an advisor to PeersNet, a web services
    provider. Anand received his MBA from the Fuqua School of Business at Duke University
    and a BS in computer science from the University of Pune in India.


