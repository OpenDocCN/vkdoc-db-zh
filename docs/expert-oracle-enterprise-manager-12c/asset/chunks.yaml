    ## 本章小结


    本章带您了解了 EM12c 基础架构的一些主要维护和保养领域，既涉及控制台，也涉及命令行实用程序。既然您对管理 EM 基础架构已感到更加得心应手，那么接下来您已准备好进一步熟悉控制台本身。这正是我们下一章的主题。


    ## 第四章 与 EM12c 控制台交互


    作者：Niall Litchfield


    Oracle Enterprise Manager 是一款功能丰富的产品，但本书专注于技术管理与运维。为此，Enterprise Manager 必须使管理和运维任务比仅利用底层技术的原始功能时更简单、更一致、更快速。本章将通过向您介绍
    Enterprise Manager 的主要用户界面——Web 控制台，帮助您实现这一目标。


    因此，本章包含以下部分：


    *   对先前版本局限性的简要历史回顾

    *   EM12c 如何解决这些局限性的概述

    *   您将用于导航控制台的菜单结构回顾

    *   对产品附带的定制功能的简要讨论


    在此过程中，您将学习如何配置 Enterprise Manager 以与 Oracle 的支持门户 My Oracle Support 进行有效交互。您还将学习如何配置通知、控制额外付费管理包的使用，并熟悉控制台作为您的管理主阵地。


    ### EM 简史


    Oracle Enterprise Manager 于 2002 年 7 月首次亮相，是一款用于管理 Oracle Database 9.2 的基于 Java
    的客户端应用程序。随着 Oracle Database 10g 的发布，该应用程序被重新构想为一个基于 Web 的管理界面，主要聚焦于数据库，但具备管理跨多个物理主机的
    Oracle 数据库的能力——10g 中的 g 代表 *网格*，而这个以数据库为中心的管理产品后来被称为 Enterprise Manager Grid Control。Grid
    Control 为数据库管理人员提供了三个关键特性，这些特性在管理集群环境和企业内各种数据库方面具有显著优势。它们如下：


    *   管理员可以将分布式环境作为一个整体进行管理，而非管理一系列独立目标。

    *   可以在单一屏幕上查看整个 Oracle 数据库资产的状态。

    *   它引入了管理除 Oracle 数据库之外的其他目标类型的能力，特别是针对日益增长的 Oracle 应用服务器市场。


    与当时主导数据库领域的、碎片化且基于主机的先前管理方式相比，这些优势显著改善了管理员的工作生活。当然，还有另一个优势使得 Enterprise Manager
    Grid Control 对运行 Oracle 的组织极具吸引力：它的实现不需要（并且至今仍然不需要）额外的许可成本。


    ![image](img/sq.jpg) **提示**  Enterprise Manager 确实使得一些额外付费功能易于获取，这些功能要么内嵌在基础产品中，要么单独销售。我们将在本章后面探讨如何控制对此类管理功能的访问。需要明确的是，当使用例如在第
    9 章中讨论的“性能”页面时，您使用的是一个需要单独许可的功能，而非免费的基础产品。正如我们讨论管理包访问时将看到的，您可以使用“此页面的管理包”链接来确定当前活动页面所需的许可。


    随着 Oracle 在 2000 年代将其产品扩展到中间件、应用程序及其他领域，一个企业级的管理工具将带来巨大优势，并成为 Oracle 的额外收入来源，这一点变得显而易见。然而，Oracle
    销售的每个产品往往都内置了管理功能，并且内部拥有精通其特定技术栈管理的团队。Oracle 通过确保现有团队在 Enterprise Manager 产品栈内为其产品开发管理功能，确定了解决方案。


    到了该十年末期，Oracle 原先的数据库管理产品已发展成为一个成熟的企业技术管理产品，允许通过一个集中管理控制台管理所有 Oracle 产品及部分第三方产品。然而，随着产品的成熟，至少存在两个结构性问题：


    *   技术栈

    *   界面


    ### 技术栈


    用于 10.x 系列 Enterprise Manager 的技术栈是 Oracle 旧的 J2EE 应用服务器平台——Oracle Internet Application
    Server。Oracle 在收购 BEA WebLogic 产品线后，实际上已放弃了这个平台。Grid Control 的 11.x 版本将现有的 Grid
    Control 产品迁移到了较新的 WebLogic 技术栈，并将源自数据库的 Grid Control 界面与使用 Oracle 自身应用开发框架（ADF）开发的新
    Fusion Middleware Control 相集成。因此，自 11g 起，Enterprise Manager 使用了如图 4-1 所示的软件栈。该架构在未来至少五年内很可能仍将是当前状态。


    ![9781430249382_Fig04-01.jpg](img/9781430249382_Fig04-01.jpg)


    图 4-1. Oracle Enterprise Manager 技术栈

