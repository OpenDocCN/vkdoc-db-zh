    \ `注意` 根据 Data Guard 配置的当前状态，发出切换命令后可能需要执行额外步骤。如示例所示，新的备用数据库应手动启动并挂载。\n\n### c.\
    \ 验证 Data Guard 配置状态，确认角色已切换：\n\n```\nDGMGRL> connect sys/<password>\nConnected.\n\
