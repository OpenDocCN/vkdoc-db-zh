    `EXECUTION_ID`（同样显示在图 11-48 中）随后可用于收集有关执行步骤失败的更多信息，这些信息随后将被转储到另一个日志文件中，该文件位于与执行日志相同的`$EMDIAG_HOME/logs`目录下：


