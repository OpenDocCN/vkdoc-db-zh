  trans: "\n6.  如 图 13-22 所示的“创建后步骤”屏幕，列出了在尚未完成的情况下，设置 `SLB` 以包含新 `OMS` 主机的要求。还必须执行\
    \ `root.sh` 脚本。你还可以选择提供一个电子邮件地址来接收安装后步骤的通知。\n\n![9781430249382_Fig13-22.jpg](img/9781430249382_Fig13-22.jpg)\n\
    \n图 13-22 . 添加 OMS，创建后步骤\n\n7.  接下来会显示一个摘要屏幕，你可以在其中查看输入的信息（参见 图 13-23）。点击 `Finish`\
    \ 以创建部署过程作业。根据你的硬件资源情况，运行此作业可能需要很长时间。你可以查看部署过程中每个步骤的进度，如 图 13-24 所示。\n\n![9781430249382_Fig13-23.jpg](img/9781430249382_Fig13-23.jpg)\n\
    \n图 13-23 . 添加 OMS，复查\n\n![9781430249382_Fig13-24.jpg](img/9781430249382_Fig13-24.jpg)\n\
    \n图 13-24 . 过程活动\n\n如果任何步骤失败，你应该检查并执行必要的纠正措施，然后才能恢复或重试。如果你提供了用于接收安装后步骤通知的电子邮件地址，你将会收到配置\
    \ `SLB` 以使用新添加的 `OMS` 并执行 `root.sh` 脚本的步骤。\n\n以下新目标会在 `Enterprise Manager` 控制台中自动被发现：\n\
    - `Oracle WebLogic Server`\n- `Oracle Web Tier`\n- `Application deployments`\n\
    - `Oracle Management Service`\n- `Oracle Management Agent`\n- `Enterprise Manager\
    \ Cloud Control` 主机\n\n主机上任何其他现有目标应通过 `Add Manual Target` 或 `Auto Discovery Results`\
    \ 进行提升。\n\n配置完额外的管理服务后，高可用性配置的下一步是使用 `Data Guard` 为存储库创建一个本地物理备用数据库。`Oracle` `MAA`\
    \ 架构推荐使用 `RAC` 物理备用数据库，但也可以使用单实例备用数据库。备用数据库可以防止存储、介质损坏或任何导致主数据库丢失的事件。\n\n可以通过使用本章第\
    \ 2 级高可用性部分中描述的相同步骤来添加备用数据库。使用 `Enterprise Manager Cloud Control` 无法创建 `RAC` 备用数据库。但是，使用部署过程可以将单实例备用数据库转换为\
    \ `RAC` 备用数据库。\n\n### 第 4 级—带备用站点的 MAA\n\n前面描述的高可用性级别将针对计划外和计划停机提供保护。使用带有多个 `Oracle\
    \ Management Services` 的 `SLB` 可以在单个 `OMS` 变得不可用时提供服务。使用 `Real Application Clusters`\
    \ 结合本地 `Data Guard` 可为存储库提供最高级别的可用性，即使主机不可用也不会停机。如果执行了故障切换或切换操作，只会发生最短的停机时间。但是，如果主站点发生完全站点故障，整个\
    \ `Enterprise Manager Cloud Control` 环境将变得不可用，可能导致依赖于该基础设施的其他应用程序服务中断。\n\n###\
    \ 先决条件\n\n在单独的站点配置备用 `Enterprise Manager Cloud Control` 系统可提供高可用性并防范站点故障。此配置包括位于\
    \ `SLB` 后面的多个主动/主动 `OMS` 服务器，以及位于主站点和另一个异地位置的 `RAC` 主数据库和 `Data Guard` 中的备用数据库。备用管理服务的先决条件如下：\n\
    - 按照前面所述，使用 `MAA` 配置来配置主站点。\n- 使用类似的硬件和资源配置备用站点，以确保切换到备用站点后不会发生性能损失。\n- 用于 `Software\
    \ Library` 的共享存储应复制到备用站点。`Software Library` 的路径在两个位置也应相同。考虑使用基于磁盘的复制或基于软件的复制，例如\
    \ `rsync`⁸ 或类似工具。\n- 还应在备用站点部署第二个 `SLB`，以确保在灾难恢复环境中的完全冗余。使用提供从主站点到备用站点的 `VIP`\
    \ 故障转移的供应商解决方案。\n\n满足这些先决条件后，按照 *`Oracle Enterprise Manager Cloud Control 12c\
    \ Administrator’s Guide`* 中的说明安装和配置备用管理服务。\n\n### 备用管理服务器安装\n\n要安装备用管理服务器，你需要执行仅软件安装，可以使用来自\
    \ `Procedure Library` 的修改版 `Add Management Service` 部署过程，也可以使用 `Oracle Universal\
    \ Installer`。下一个示例将引导你完成使用前一种方法的步骤。\n\n如果主站点和备用站点之间存在防火墙，应将其配置为允许 `HTTP Console`、`HTTPS\
    \ Console`、`HTTP Agent Upload` 和 `HTTPS Agent Upload` 端口以及 `Admin Server` 和 `Node\
    \ Manager` 端口的通信。\n\n以下部署过程提供了将主 `Enterprise Manager` 软件（包括插件和补丁）克隆到另一台服务器的逐步工作流：\n\
    1.  在第一台管理服务（`Admin Server` 正在运行）上运行以下命令，将 `emkey` 复制到管理存储库：\n\n    ```\n    $\
    \ $OMS_HOME/bin/emctl config emkey -copy_to_repos\n    Oracle Enterprise Manager\
    \ Cloud Control 12c Release 2\n    Copyright (c) 1996, 2012 Oracle Corporation.\
    \  All rights reserved.\n    Enter Enterprise Manager Root (SYSMAN) Password :\n\
    \    The EMKey has been copied to the Management Repository. This operation will\
    \ cause the EMKey\n    to become unsecure.\n    After the required operation has\
    \ been completed, secure the EMKey by running \"emctl config\n    emkey -remove_from_repos\"\
    .\n    ```\n\n2.  从主站点的第一台管理服务导出配置。如果可能，使用共享文件系统以避免远程传输文件。\n\n    ```\n    $ $OMS_HOME/bin/emctl\
    \ exportconfig oms -sysman_pwd oracle12c -dir /u02/backup\n    Oracle Enterprise\
    \ Manager Cloud Control 12c Release 2\n    Copyright (c) 1996, 2012 Oracle Corporation.\
    \  All rights reserved.\n    ExportConfig started...\n    Machine is Admin Server\
    \ host. Performing Admin Server backup...\n    Exporting emoms properties...\n\
    \    Exporting secure properties...\n    Exporting configuration for pluggable\
    \ modules...\n    Preparing archive file...\n    Backup has been written to file:\
    \ /u02/backup/opf_ADMIN_20121227_131133.bka\n\n    The export file contains sensitive\
    \ data.\n    Please ensure that it is kept secure.\n\n    ExportConfig completed\
    \ successfully!\n    ```\n\n3.  如果目标备用主机上尚未存在管理代理，则安装一个管理代理。\n4.  使用修改后的 `Add\
    \ Standby Management Service` 部署过程执行 `Enterprise Manager` 软件的仅软件安装。\n    a. 从菜单中选择\
    \ `Enterprise` -> `Provisioning and Patching`。\n    b. 选择 `Add Management Service`\
    \ 过程，然后点击 `Create Like`，如 图 13-25 所示。\n\n    ![9781430249382_Fig13-25.jpg](img/9781430249382_Fig13-25.jpg)\n\
    \    图 13-25 . 为备用管理服务创建部署过程\n\n    c. 输入该过程的新名称，例如 `Add Standby Management Service`。参见\
    \ 图 13-26。\n"
