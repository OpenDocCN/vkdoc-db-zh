    # CHAPTER 11


    ## Enterprise Manager Jobs


    by Kellyn Pot’Vin


    A database job is defined as “a unit of work an administrator defines to automate
    commonly run tasks.” The need for administrators to schedule database maintenance
    tasks, scripts to maintain or run batch jobs after hours, or backups of the database
    is obvious; these jobs are a requirement of the DBA role. The `EM` Job System
    grants the user scheduling flexibility to run jobs at any time and at any interval.
    It integrates seamlessly with the `EM12c` environment, unlike schedulers that
    are separate from the main database management and monitoring system.


    The Enterprise Manager Job System was introduced in Oracle 9i, yet the `EM` jobs
    in Enterprise Manager 12c still aren’t utilized as often as other features, such
    as monitoring, alerting, backups, and performance pages.


    Throughout my years as a database administrator, I experienced few environments
    for which the `EM` Job System had been chosen over other job schedulers and was
    curious as to why. For all the ease of management, notification, and scheduling
    that the `EM` Job System offers, many administrators still appear loyal to their
    own collection of scripts to manage work performed in the database. Oracle already
    provides the historically challenged `DBMS_JOBS` and the more recently introduced
    and advanced `DBMS_SCHEDULER_JOBS`, which includes enhancements such as chained
    jobs and more-defined scheduling. In addition, the operating system `cron` scheduler
    allows the administrator to use any language that is available at the operating
    system (OS) level to script what is needed and schedule it.


    Offering more options for scheduling and managing, along with another set of database-level
    views/tables in regards to support, might seem like overkill. My main task in
    this chapter is to convince administrators why the `EM12c` Job System is not just
    a better choice, but superior to previous versions of the `EM` job systems and
    the more enhanced way to manage database jobs in any database environment.


    Enhancements include the following:


    *   Simple interface for job scheduling

    *   One location to manage all job events in an environment

    *   Job Library to be utilized as a repository of jobs

    *   Capability to easily tie in job requirements for blackouts and maintenance

    *   Simplification of global tasks through job deployment


    The `EM` Job System also supports all areas of the infrastructure in the `EM`
    console, executing jobs for many of the tasks occurring transparently to the administrator
    interacting with the console interface.


    ### Why Use EM12c Jobs


    The main question to be answered is why an administrator should switch from their
    current job management program/scheduler to the Enterprise Manager Job System.
    When first introduced to an environment with `EM12c`, I also wanted this question
    answered. I had always utilized my own suite of shell and Perl scripts that I
    felt quite comfortable scheduling in the OS `cron` scheduler. I found the scripts/OS-level
    scheduler a satisfactory solution after small adjustments to environment variables
    and code were put in place to take the uniqueness of the server environment into
    consideration. The choice of the OS-level scheduler still appeared to be the best
    for ease of database management.


    As I began to manage new environments for multiple clients, multiple server platforms,
    and OS profile designs and preferences, I encountered an intriguing challenge.
    I now was working in a large database team environment requiring me to quickly
    become familiar with others’ scheduling choices or a new script author’s coding
    style, or when investigating backup and maintenance scripts, I was even unsure
    of what kind of scheduler had been implemented. When multiple job schedulers were
    in use, often incorrect assumptions were made about which scheduler was executing
    which task in regards to monitoring, backup, and alerting.


    It was immediately apparent that almost no time was required to acclimate in environments
    that utilized the job system through Enterprise Manager. The interface was similar
    no matter whether it was in a 10g or 11g Enterprise Manager or even the new 12c
    version. Maintaining, changing, “skipping,” or any other tasks regarding the job
    within the Enterprise Manager Jobs interface were easy for administrators to familiarize
    themselves with. As all jobs were contained within the Enterprise Manager, creating
    maintenance windows during blackouts was simpler to manage.


    The benefits of using the `EM12c` Jobs interface over other schedulers are as
    follows:


    *   Simple or advanced job search feature with wildcard functionality

    *   Schedule can be viewed for any conflicts with other running jobs across the
    entire environment

    *   Choice to skip all jobs during a target blackout or to configure jobs to run
    even though the target is in a blackout state, simplifying concerns of tasks running
    during maintenance

    *   Ability to incorporate scripts into the `EM12c` Job System to perform any
    task, providing a uniform scheduling, notification, and alerting system for all
    job tasks


    ### Enterprise Manager Job Architecture


    Three areas, shown in Figure 11-1, are central to the `EM` Jobs interface for
    `EM12c`:


    *   `EM Jobs Service`: The enterprise management target service that manages all
    jobs in the Enterprise Manager

    *   `Job Library`: Repository for jobs

    *   `Job Activity`: Job interface system to view, create, and manage jobs


    ![9781430249382_Fig11-01.jpg](images/9781430249382_Fig11-01.jpg)


    **Figure 11-1.** The EM Job System as part of the high-level EM12c architecture


    Previous chapters provided a significant introduction to the Oracle Management
    Service (Chapter 3), the repository (Chapter 1), and the EM console and the WebLogic
    server (Chapter 4). Each of the `EM` Job components—the `EM Jobs Service`, `Job
    Activity`, and `Job Library`—are explained in further detail in the upcoming pages
    of this chapter.


    ### EM Job System Components


    The `EM` Job System envelops a large, complex number of components that interact
    with almost all aspects of the `EM12c` environment. As you become more familiar
    with the user jobs, system jobs, and agent jobs managed by the `EM Jobs Service`,
    you will see how the continued health and monitoring of the `EM12c` environment
    rely on this feature to execute tasks immediately or at scheduled times.


    ### EM Jobs Service'
