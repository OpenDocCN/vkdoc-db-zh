    Data, ordered by active sessions displayed at the top, is followed by an active
    duration window, SQL ID, user info, database time, I/O wait info, start time,
    end time, and SQL text in the main monitoring view, as shown in [Figure 9-37](#9781430249382_Ch09.xhtml#Fig37).
    The page also offers links for SQL ID and user sessions to the Monitored Executions
    page.


    ![9781430249382_Fig09-37.jpg](images/9781430249382_Fig09-37.jpg)


    [Figure 9-37](#9781430249382_Ch09.xhtml#_Fig37). The top section of the SQL Monitor,
    the Monitored SQL Execution Details page'
