    # 仓库视图与通信流程


    仓库视图在《Enterprise Manager Cloud Control Extensibility Programmer’s Reference》中有文档说明（您可以从位于[`docs.oracle.com/cd/E24628_01/index.htm`](http://docs.oracle.com/cd/E24628_01/index.htm)的
    EM12c 文档访问该参考手册）。该在线参考的第 18 章详细说明了这些视图的使用，并提供了显示每个视图列名的视图的完整列表。


    ## 通信流程


    当您首次开始使用像 Enterprise Manager Cloud Control 12c 这样的产品时，最令人困惑的领域之一就是产品各个部分之间的通信流程是如何进行的。本质上，您需要理解三个领域：涉及的协议、正在使用的端口，以及是否使用了防火墙。


    ## 协议


    在 EM12c 安装的组件之间进行通信时，使用三种主要协议：


    *   `Hypertext Transfer Protocol (HTTP)` 或 `Hypertext Transfer Protocol/Secure
    (HTTP/S)`：这些是万维网使用的基础协议。它们定义了消息如何传输和格式化，以及浏览器和 Web 服务器对不同命令的响应操作。`HTTP`和`HTTP/S`用于在`OMA`、`OMS`和`OMR`之间进行通信。出于安全原因，Oracle
    通常建议使用`HTTP/S`而非`HTTP`。

    *   `Java Database Connectivity (JDBC)`：这个 Java 标准由`OMS`用于与仓库通信，以及与任何数据库目标通信。

    *   `Internet Control Message Protocol (ICMP)`：该协议由`OMS`用于与主机通信，以检查主机的状态。本质上，使用`ping`命令来检查其状态。


    ## 端口


    在 EM12c 安装过程中，系统会提示您提供实体通信的端口列表。默认列表显示在“端口配置详细信息”页面上，如图 1-8 所示。该页面显示了“推荐端口范围”列。此列中列出的第一个端口号是默认端口。如果出于任何原因，在您进行安装时默认端口已被占用，将使用“推荐端口范围”中的下一个端口号。安装后，您还可以在位于
    OMS 主机上的`staticports.ini`文件中找到已使用的端口号。


    ![9781430249382_Fig01-08.jpg](img/9781430249382_Fig01-08.jpg)


    图 1-8. 端口配置详细信息页面


    ## 防火墙


    在许多情况下，企业会要求使用防火墙来控制进出网络流量。这通常涉及限制端口的可用性或限制可以通过特定端口的流量类型。由于这种限制可能难以设置，通常建议在部署
    Enterprise Manager 配置之后再进行防火墙配置和启用。但是，如果防火墙已经就位，您应该打开计划使用的通信端口，直到安装完成。


    将这三个领域（协议、端口和防火墙）结合起来，EM12c 安装中的默认通信流程如图 1-9 所示。


    ![9781430249382_Fig01-09.jpg](img/9781430249382_Fig01-09.jpg)


    图 1-9. EM12c 配置中的端口、协议和防火墙


    # EM12c 中的认证


    借助 EM12c 版本中提供的新可插拔框架，您现在在认证方面有了更多选择。该框架接受一系列可插拔的认证方案，使您能够选择最适合您环境的方法。由于 EM12c
    依赖 Oracle 的 WebLogic Server 进行外部认证，因此 WLS 支持的任何认证方法都可用于对 EM12c 进行认证。支持的认证方法包括以下内容：


    *   `Repository-based authentication`：在这个您可能从之前版本的 Enterprise Manager 熟悉的默认认证选项中，系统会提示您输入用户名和密码。此认证方法提供标准的密码选项，如密码有效期、密码宽限期、失败尝试次数和密码复杂度。

    *   `Single sign-on authentication`：如果您的企业中使用单点登录（SSO）认证，您可以将这些 SSO 凭据注册为 EM12c
    中的管理员。然后，您可以使用这些凭据访问 Cloud Control 控制台。

    *   `Oracle Access Manager SSO authentication`：Oracle Access Manager（OAM）是 Oracle
    Fusion Middleware 产品附带的 SSO 解决方案。同样，如果您正在使用 OAM SSO，您可以将这些凭据注册为 EM12c 中的管理员，并使用它们访问控制台。

    *   `Enterprise User Security authentication`：`EUS`允许您在符合轻量级目录访问协议（`LDAP`）的目录服务器中将企业用户和角色创建并存储为目录对象。然后，您可以使用`EMCTL`设置一些属性，以允许您深入到这些数据库中，而不显示标准登录页面。

    *   `LDAP authentication`：在之前版本的 Enterprise Manager 中，允许使用`LDAP`认证，但它仅限于 Oracle
    的`LDAP`解决方案，Oracle Internet Directory（`OID`）。在 12c 版本中，现已扩展到除了`OID`之外，还可以使用 Microsoft
    的 Active Directory 产品。


    # 总结


    本章向您介绍了 Enterprise Manager Cloud Control 12c 的主要架构组件：Cloud Control 控制台、Oracle
    Management Agent、Oracle Management Service、Oracle Management Repository 以及插件。您了解了部署此架构的选项以及可用于连接到
    EM12c 的认证方法。本章还涵盖了 EM12c 使用的协议、端口和防火墙，因此您现在已准备好更详细地钻研产品的安装。这是我们下一章的主题。


    # 第 2 章 安装与代理部署


    ![image](img/frontdot.jpg)


    作者：Gokhan Atil


    在本章中，您将学习如何创建仓库数据库并安装 Oracle Enterprise Manager Cloud Control 12c。如果您有任何安装 Enterprise
    Manager Grid Control（Cloud Control 的前身）的经验，您会发现 EM12c 配备了一个更智能的安装向导，因此安装过程要容易得多。


    EM12c 由三个组件组成：Oracle Management Service（`OMS`）、Oracle Management Agents（管理代理）和
    Oracle Management Repository（管理仓库）。


    本章的安装和代理部署演示使用三台服务器：


    *   `cloudcontrol12.testdomain.com`：Oracle Management Service 将安装到此服务器。

    *   `repositorydb.testdomain.com`：此数据库服务器将托管管理仓库。

    *   `target.testdomain.com`：管理代理将部署到此目标服务器。


    所有这些服务器都运行 Oracle Linux 5.8（64 位）以及 GNOME 桌面环境和 X Window 系统。


    虽然您可以将管理仓库和`OMS`安装在同一服务器上，但我们更倾向于将管理仓库安装在单独的服务器上。如果您计划将两者安装在同一服务器上，则应满足两次安装的要求。


    我们建议您使用域名系统（`DNS`）服务器来解析服务器的主机名。如果您没有`DNS`服务器，则需要在 Oracle Management Server 上的`/etc/hosts`文件中输入所有目标的主机名和相应的
    IP 地址。您还需要在所有目标服务器（您将在其上部署管理代理）上的`/etc/hosts`文件中输入`OMS`的主机名/IP 地址。

