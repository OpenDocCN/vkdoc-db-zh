    要查看谁有凭证来运行和管理作业，您可以运行一个简单的查询来显示谁拥有哪些权限（参见图 11-14），以及这些凭证与 `SYSMAN` 模式拥有的凭证相比如何（参见图
    11-15）。图 11-16 提供了一个示意图以供参考。


    ![9781430249382_Fig11-14.jpg](img/9781430249382_Fig11-14.jpg)


    图 11-14. 查询 EM `SYSMAN` 模式后显示的拥有目标凭证的用户


    ![9781430249382_Fig11-15.jpg](img/9781430249382_Fig11-15.jpg)


    图 11-15. 环境中可能出现的 `SYSMAN` 凭证示例


    ![9781430249382_Fig11-16.jpg](img/9781430249382_Fig11-16.jpg)


    图 11-16. 用于对作业活动进行细粒度查询的凭证、作业命令和作业信息表


    ```

    SELECT mt.target_name, mtc.user_name, mtc.credential_set_name

    FROM MGMT_TARGET_CREDENTIALS mtc, MGMT_TARGETS mt

    WHERE mtc.TARGET_GUID=mt.target_GUID;

    ```


    ```

    SELECT mt.target_name, mtc.user_name, mtc.credential_set_name

    FROM MGMT_TARGET_CREDENTIALS mtc, MGMT_TARGETS mt

    WHERE mtc.TARGET_GUID=mt.target_GUID

    And mtc.USER_NAME=''SYSMAN'';

    ```


    `MGMT_JOB_CREDENTIALS` 表包含所有作业凭证数据，可以单独查询，也可以与 `MGMT_JOB` 和其他表连接以获取更多信息。


    ## 作业创建


    作业创建界面与之前版本的 Enterprise Manager 保持相似。然而，由于该界面的复杂性，本节提供一个清晰的作业创建示例。在这个例子中，我们将创建一个简单的安全作业，用于检查谁拥有访问
    `DBA_*` 视图的权限。


    从“作业活动”菜单中，点击 `创建作业` 下拉菜单并选择 `安全规则配置`。然后点击 `执行`（参见图 11-17）。


    ![9781430249382_Fig11-17.jpg](img/9781430249382_Fig11-17.jpg)


    图 11-17. 开始创建作业


    这将打开作业创建页面。从 `常规` 选项卡开始，填写名称和描述（如果需要）。然后选择一个目标类型（本例中选择 `数据库实例`）并点击 `添加` 来选择一个数据库目标。


    在“添加目标”窗口中选择目标后，您将返回到主屏幕，此时屏幕显示的信息类似于图 11-18。


    ![9781430249382_Fig11-18.jpg](img/9781430249382_Fig11-18.jpg)


    图 11-18. 为新作业配置的 `常规` 选项卡


    您现在已成功填写 `常规` 选项卡，可以继续进行 `参数` 选项卡。


    从 `安全规则` 下拉列表中选择 `访问 DBA_* 视图` 选项。对于要返回的最大行数，输入 `全部`（参见图 11-19）。


    ![9781430249382_Fig11-19.jpg](img/9781430249382_Fig11-19.jpg)


    图 11-19. 检查对 `DBA_*` 视图访问权限的参数设置


    接下来，点击 `凭证` 选项卡。本例中，`凭证` 选项选择 `命名的`（参见图 11-20）。我们将填写详细信息以清晰地理解界面，但为了便于管理，最好事先设置好首选凭证。


    ![9781430249382_Fig11-20.jpg](img/9781430249382_Fig11-20.jpg)


    图 11-20. 作业创建的凭证设置


    完成凭证设置后，继续进行 `计划` 选项卡。图 11-21 显示了一个计划，设置为每周一上午 9:30 发送报告，并且永不过期或没有结束日期宽限期。


    ![9781430249382_Fig11-21.jpg](img/9781430249382_Fig11-21.jpg)


    图 11-21. 为新作业设置计划


    接下来，您可以选择为每个管理员（所有者除外）设置查看或管理作业的权限，如图 11-22 所示。也可以通过勾选 `删除` 列下的方框（图中未显示，但在最右侧）将管理员从访问列表中移除。


    ![9781430249382_Fig11-22.jpg](img/9781430249382_Fig11-22.jpg)


    图 11-22. 谁有访问权限以及将发送哪些通知


    在 `安全规则配置` 部分下方是 `电子邮件通知` 部分。在这里，您可以选择以下通知选项：


    *   `已计划`：作业已计划运行。

    *   `正在运行`：作业正在执行。

    *   `已暂停`：作业已被暂停运行。

    *   `已成功`：作业已成功完成。

    *   `问题`：作业在某个步骤或整体上遇到失败或问题。

    *   `需要操作`：需要管理员介入。这包括状态为“已跳过”的作业。


    由于作业由用户 `KPOTVIN` 拥有，任何与该用户关联并已在 EM 控制台中配置的电子邮件地址都将根据设置接收通知。该用户也有权查看、管理和监控作业。


    ## 作业类型


    Enterprise Manager 在 12c 版本中扩展了对作业类型的支持。虽然 `操作系统命令`、`SQL 脚本` 和 `RMAN` 可能很常见，但现在
    EM 作业环境支持数十种作业类型：

    '
- fmt: '### 12.5.2 作业类型、作业事件和通知


    Enterprise Manager 中存在多种作业类型，以下是一些常见的和新增的类型：


    *   `Application Development Protocol (ADP)`: Oracle ADF 使用的作业协议。

    *   `Agent Configuration and Control Operations`: 这是一系列 Enterprise Manager 计划作业类型中的前两种。这些作业是在
    EM 控制台中作为代理配置或控制请求的一部分创建的。

    *   `ASM Scripts`: 自动存储管理中的许多任务被安排为 EM 控制台中的作业。这是另一种由 EM 控制台创建的作业，与通过 EM Jobs
    界面创建的作业相对。

    *   `Clone Home`: 这是最受期待的新增功能之一，这种新的作业类型允许您轻松地将现有的 Oracle 主目录克隆到一个新的 Oracle 主目录。

    *   `Database Configuration`: 另一种 EM 控制台作业类型，它可以在不要求您在目标服务器上执行任务的情况下更新数据库配置。

    *   `Deployments`: EM12c 的一项新功能，此作业从 EM 控制台部署到目标，用于监控和配置。

    *   `Discovery of Specific Oracle Components`: 作业也会被安排用于通过 EM 控制台在指定的 Oracle 目标上发现
    Oracle 组件。这种自动发现通过从服务器动态提取配置和目标信息来节省时间和精力，确保任何目标的正确配置。

    *   `Log Rotation`: 如果日志、跟踪文件和 Enterprise Manager 日志变得太大，可能会难以管理。这种作业类型可以在 EM
    Jobs 界面中创建，用于管理您定期访问和监控的许多数据库日志。

    *   `OPatch Updates`: EM12c 的另一种新作业类型，自动化的 `OPatch` 更新确保您在 EM12c 环境中监控的每个目标上都安装了最新版本的
    `OPatch` 实用程序。

    *   `OS Commands`: 这种作业类型允许您将现有的 `OS` 脚本从 `cron` 调度程序或其他 `OS` 级调度程序迁移到 Enterprise
    Manager 控制台内的单一调度程序中。通过迁移到 EM Jobs 界面，在 EM 中断期间无需再通过第二个调度程序进行管理，所有操作都可以通过单一界面管理。

    *   `RMAN`: 所有的 `Recovery Manager` 作业，虽然通过 EM 控制台中的 `RMAN` 界面创建，但它们会在 Job Activity
    界面中显示为计划作业。这些作业类型无法保存到库中，并且在 Job Activity 界面中的编辑功能有限。

    *   `Security`: 这种作业类型涉及从 EM 控制台的 `Setup` -> `Security` 部分访问的安全界面。这些作业包括针对管理员、角色、凭据和审计数据的作业。

    *   `SQL Scripts`: 涉及 EM 作业的最常见作业类型，这允许您执行 `SQL`、存储过程以及任何其他将在 `SQL*Plus` 会话中执行的任务。

    *   `Multitask Jobs`: 对于需要多个步骤来完成一个过程的作业，这是 EM12c 中的一项新功能。过去，您必须为复杂的、多步骤的过程编写脚本。现在，EM12c
    Jobs 界面使得创建具有多个步骤的作业变得简单，包括那些在每个步骤都有成功逻辑请求的作业。


    定位 EM12c Jobs Service 支持的常见和新的作业类型非常简单。以下查询不仅显示了支持的作业类型，还显示了用于 `EMCLI` 执行的作业类型
    ID。


    ```sql

    select * from sysman.MGMT_JOB_TYPE_INFO

    where job_type_category=0

    and editable=1

    and agent_bound=1

    and job_type not like ''%Obsolete%''

    and job_type_default is not null;

    ```


    [Figure 11-23](#9781430249382_Ch11.xhtml#Fig23) 显示了查询结果，其中包含了来自 `OMS` 存储库数据库中
    `SYSMAN` 模式的作业类型以及每个作业类型的任何相关信息。这些数据清楚地显示了支持前端的作业类型 (`job_type_category=0`)、在作业创建后能够被编辑的作业类型（例如，备份作业在备份和恢复调度程序外部创建后无法被编辑），并且所有作业类型都可用于代理（`agent_bound`
    与 `OMS` 级别的作业相对）。如图所示，所有过时的作业类型都被跳过，但仍在存储库中列出。


    ![9781430249382_Fig11-23.jpg](images/9781430249382_Fig11-23.jpg)


    **图 11-23** 作业类型信息查询结果，显示了系统可用的一些特定作业类型。


    ### 12.5.3 有效监控和作业状态


    在 EM 作业系统中运行的任何给定作业的状态都极其重要，因为通知和警报都基于此状态。由于一个作业可能包含多个步骤，状态会随着每个步骤的执行而变化，并且可以触发事件来提醒管理员作业运行的不同状态。此作业状态可以通过作业事件进行监控、警报和管理。


    作业事件返回报告状态并提醒责任方。您可以手动设置这些事件，因为作业事件默认是未启用的。这样做是为了避免系统因事件监控而过载。


    作业事件如下：


    *   `All`: 报告任何作业的所有状态。

    *   `Scheduled`: 作业已计划运行。

    *   `Action Required`: 需要管理员介入作业才能运行完成。这包括因计划中断而被跳过的作业。

    *   `Suspended`: 作业已被暂停，因此无法执行其常规计划。

    *   `Succeeded`: 作业已成功执行。

    *   `Problems`: 一个或多个作业步骤中发生了故障。


    可以通过 Job Events Generation Criteria 页面配置作业事件。您可以通过在 EM 控制台中选择 `Setup` -> `Incidents`
    -> `Job Events` 来访问此页面，如图 [Figure 11-24](#9781430249382_Ch11.xhtml#Fig24) 所示。随后将出现第
    1 步页面，如图 [Figure 11-25](#9781430249382_Ch11.xhtml#Fig25) 所示。在这里，您可以决定默认情况下哪些事件会发送警报通知，并且可以按目标或组缩小范围。


    ![9781430249382_Fig11-24.jpg](images/9781430249382_Fig11-24.jpg)


    **图 11-24** 从 EM 控制台的 `Setup` 菜单进入 `Job Events` 功能


    ![9781430249382_Fig11-25.jpg](images/9781430249382_Fig11-25.jpg)


    **图 11-25** 在 EM12c 环境中为所有作业设置警报和通知的默认选项


    一些管理员选择接收作业运行成功 (`Succeeded`) 的通知。根据我的专业经验，我建议不要配置作业来执行此通知。管理员在警报上花费的大部分时间并非由于监控不足，而是监控过度。如果
    Enterprise Manager 被配置为包含电子邮件“成功”通知，您会习惯于接收它们，知道它们不需要响应，这可能导致错过关键问题通知。


    对于那些希望关闭个别成功消息并简单地每天报告一次这些成功和作业失败的管理员，可以设置一个辅助作业来报告并消除不必要的个别通知。


    ```sql

    select mj.job_id, mj.job_name, mjes.start_time, mjes.end_time,

    mjes.status_detail, mjes.retried

    from sysman.mgmt_job mj, sysman.mgmt_job_exec_summary mjes

    where mj.job_id=mjes.job_id

    and mjes.start_time >= sysdate-1

    and mj.job_status!=0

    and mj.expired=0;


    JOB_ID

    ```'
