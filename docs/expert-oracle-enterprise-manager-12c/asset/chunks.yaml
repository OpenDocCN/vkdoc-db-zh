    Chargeback 模块擅长帮助组织或服务提供商识别已用资源的潜在收入，而 Consolidation Planner 则为这些组织提供了一种降低与运行非云或云资源相关的内部成本的方法。每个企业数据中心都会随时间稳步增长，为了满足不断增加的业务需求，需要增加服务器。这种增长通常会导致机架空间以及用于系统冷却、维护（包括安全和补丁）的电力需求增加。


    为了应对这种增长趋势，许多企业正越来越多地调研和投资虚拟化技术，例如 Oracle Virtual Machine，通过将物理服务器迁移到虚拟服务器。此类迁移的目标是整合共享硬件，同时保留虚拟机提供的隔离优势。通过这种方式进行整合，企业可以在维持服务级别协议的同时，尽可能多地释放服务器。


    Consolidation Planner 使企业能够将托管服务器与它们可以整合到的通用物理机、Oracle Exadata 或 Oracle Virtual
    Machine 进行匹配。通过利用从 Enterprise Manager 中的受管目标收集的指标和配置数据，Consolidation Planner 帮助企业确定最佳的整合方案，这些方案也反映了与整合过程相关的业务和技术约束。


    ## 关键概念


    Consolidation Planner 中定义的每个整合项目都有一些对项目至关重要的关键概念。这些概念在 表 5-2 中定义。


    表 5-2. Consolidation Planner 的关键概念


    ![Table5-2.jpg](img/Table5-2.jpg)


    ## 约束条件


    现在您已经了解了 Consolidation Planner 的关键概念，理解一些您应该注意的约束也很重要。这些约束主要围绕源服务器和目标服务器。


    源服务器的约束基于兼容性或排他性。如果某些属性和配置值匹配，则认为服务器是兼容的。这些属性包括：生命周期状态、部门和位置。例如，当源服务器必须保留在特定位置或地理区域内时，可能需要设置某个属性。此外，源服务器可以通过配置值来定义，这些值包括：网络域、系统供应商、系统配置、CPU
    供应商、CPU 名称和操作系统。最后，源服务器可以是相互排斥的。这意味着它们可能被排除在整合范围之外，因为它们不符合 Oracle 最佳实践。要排除匹配的服务器，请设置以下任一或两个条件：RAC
    数据库的节点、Oracle Cluster 的节点。


    目标服务器可以针对新的或现有的候选服务器确定范围。与目标服务器相关的约束主要表示为 CPU 和内存资源利用率的百分比——即目标服务器可以使用多少任一资源类型。


    现在我们已经定义了源和目标服务器，您可以开始更详细地了解如何定义整合项目并评估方案了。


    ## 安装与访问


    Consolidation Planner 作为包含 Chargeback 模块的插件的一部分安装。要访问 Consolidation Planner，请选择
    Enterprise ![arrow](img/arrow.jpg) Consolidation Planner。这将打开 Consolidation Planner
    模块。如果这是 Consolidation Planner 的新实现，则不会定义任何项目。图 5-29 展示了如何打开 Consolidation Planner。


    ![9781430249382_Fig05-29.jpg](img/9781430249382_Fig05-29.jpg)


    图 5-29. Consolidation Planner 的 Enterprise 菜单选项


    ## Consolidation Planner 主页


    在 Consolidation Planner 主页上，您将找到已定义项目的列表以及菜单项，这些菜单项可以帮助定义新项目、创建方案、报告项目和删除项目。图
    5-30 显示了一个新实施的 Consolidation Planner，其中包含一个项目。我们将逐步演示如何为将物理服务器整合到 Oracle Virtual
    Machine 创建一个新项目。


    ![9781430249382_Fig05-30.jpg](img/9781430249382_Fig05-30.jpg)


    图 5-30. 包含项目的新实施 Consolidation Planner


    ## 创建整合项目


    在 Consolidation Planner 页面上，要创建新项目，管理员需要单击 `Create Project` 按钮。这将打开 `Create Consolidation
    Project` 详细信息页面（参见 图 5-31）。在这里，管理员可以定义项目的各个方面，例如将要执行的整合类型、参与整合的服务器、数据收集的时长以及任何预配置的方案（如果它们已被定义）。


    ![9781430249382_Fig05-31.jpg](img/9781430249382_Fig05-31.jpg)


    图 5-31. `Create Consolidation Project` 屏幕


    此屏幕包含了定义整合项目所需的全部信息。首先要决定的是将要进行的整合类型。两个选项是 `Physical to Oracle Virtual Machine
    (P2V)` 和 `Physical to Physical (P2P)`。接下来，我们必须选择哪些服务器将参与整合。当添加整合目标时，首先必须添加源服务器。如果需要，我们还可以选择添加现有的虚拟服务器作为目标。添加源目标或
    OVM 目标后，您将看到许多特定于该源或目标服务器的估算（参见 图 5-32）。


    ![9781430249382_Fig05-32.jpg](img/9781430249382_Fig05-32.jpg)


    图 5-32. 为整合添加的源服务器


    > **注意**  指定服务器 I/O 容量是 Oracle 提供的估算值。如果您点击 `Specify Server I/O Capacity` 按钮，将弹出一个对话框，使您能够指定乘数因子或绝对值来更新所有选定服务器的容量。


    ![9781430249382_unFig05-02.jpg](img/9781430249382_unFig05-02.jpg)


    ### 数据收集


    为了让 Consolidation Planner 对节省或资源做出正确估算，它将基于收集的数据量。在 `Create Consolidation Project`
    屏幕的 `Data Collection` 部分，管理员可以指定应用于估算整合的最小和最大天数。与 Enterprise Manager 中的许多其他任务一样，数据收集由一个将被创建的作业处理。作为数据收集的一部分，可以指定是立即开始数据收集还是稍后开始。


    ### 预配置方案


    创建整合项目的最后一步是指定项目是否应使用任何预配置的方案。默认情况下，未选择任何方案。但是，可以从三个选项中选择一个预配置的方案；这些方案使用 CPU、内存和磁盘存储的指标来分析整合项目。图
    5-33 提供了这些方案的详细分解。


    ![9781430249382_Fig05-33.jpg](img/9781430249382_Fig05-33.jpg)


    图 5-33. 预配置方案


    ## 提交与查看项目


    选择预配置方案后，即可提交并创建项目。如果项目创建成功，Consolidation Planner 页面将反映项目已创建以及项目当前的状态。在屏幕底部，您还会注意到三个选项卡，提供有关项目的具体信息。这些选项卡是
    `General`、`Source Servers` 和 `Source Workload`。

    '
- fmt: 'The General tab gives you all the specific information related to the project,
    including the project name, identification number, consolidation type, and current
    status of data collection. The Source Servers tab gives you information similar
    to that presented when adding the source targets to the project. Items such as
    CPU utilization, memory utilization, and disk storage are presented. What is interesting
    on this tab is the information that is provided by telling you the start and end
    dates of data collection. The Source Workload tab gives you a 24-hour view, in
    a table format, of the resources that are being measured for consolidation (see
    [Figure 5-34](#9781430249382_Ch05.xhtml#Fig34)). These can be viewed by using
    the Resource Type drop-down menu.


    ![9781430249382_Fig05-34.jpg](images/9781430249382_Fig05-34.jpg)


    [Figure 5-34](#9781430249382_Ch05.xhtml#_Fig34). Consolidation Planner with project
    information


    Once the project is done gathering information needed to project consolidation
    efforts, a report can be generated by clicking the Report menu item on the Consolidation
    Planner screen. Much like the Chargeback report, the Consolidation Project report
    will be displayed within the browser. With Oracle BI Publisher installed in Enterprise
    Manager, the option to publish reports will be available, allowing the administrator
    to publish consolidation reports to end users. [Figure 5-35](#9781430249382_Ch05.xhtml#Fig35)
    shows a sample report that is published from the report table in Consolidation
    Planner.


    ![9781430249382_Fig05-35.jpg](images/9781430249382_Fig05-35.jpg)


    [Figure 5-35](#9781430249382_Ch05.xhtml#_Fig35). BI Publisher report for the consolidation
    project


    Consolidation Planner is a tool that can be used to help organizations that are
    considering a move to the cloud or new physical hardware (for example, Exadata)
    to identify and shrink their infrastructure footprint.


    ## Summary


    In this chapter, you reviewed cloud computing, its key characteristics, and its
    delivery and deployment models. You also learned that in order to get the best
    out of your cloud infrastructure, it is important to efficiently manage all phases
    of the cloud lifecycle. You can’t have a very good solution just for provisioning
    or monitoring, for efficient cloud management. EM12c lets you gain total control
    over all the phases of the cloud lifecycle, allowing you to achieve the highest
    return on your investment in an enterprise private cloud.


    [¹](#9781430249382_Ch05.xhtml#_Fn1) The NIST definition of Cloud Computing: [http://csrc.nist.gov/publications/nistpubs/800-145/SP800-145.pdf](http://csrc.nist.gov/publications/nistpubs/800-145/SP800-145.pdf)


    # CHAPTER 6


    ![image](images/frontdot.jpg)


    ## Software Library, Patching, and Provisioning


    by Bobby Curtis


    One of the main benefits of using Oracle Enterprise Manager 12c is its ability
    to help database, system, and application administrators save time and automate
    the processes required to manage the Oracle database lifecycle. Patching and provisioning
    of resources is essential to daily operations and maintenance of critical business
    systems across the enterprise. Through the Database Lifecycle Management Pack,
    administrators are given tools to help eliminate manual and time-consuming tasks
    related to discovery, initial provisioning, patching, configuration management,
    and ongoing change management. In this chapter, you will take a look at the Software
    Library and the components of the Database Lifecycle Management Pack needed to
    implement the patching and provisioning options for EM12c.


    ## Software Library


    One of the core features in EM12c is the `Oracle Software Library`. This is the
    core repository that stores software entities such as agent software, patches,
    virtual appliance images, gold images, application software, and their associated
    scripts. Additionally, the Software Library allows you to maintain versions, maturity
    levels, and states of the various software entities stored. [Figure 6-1](#9781430249382_Ch06.xhtml#Fig1)
    gives you the general look and feel of the Software Library console.


    ![9781430249382_Fig06-01.jpg](images/9781430249382_Fig06-01.jpg)


    [Figure 6-1](#9781430249382_Ch06.xhtml#_Fig1). Software Library console


    To access the Software Library console page, you choose `Enterprise` ![arrow](images/arrow.jpg)
    `Provisioning and Patching` ![arrow](images/arrow.jpg) `Software Library`. In
    the Software Library console, there are two types of folders: the folders marked
    with a lock are Oracle-owned folders, and folders without a lock are user-owned
    folders. (Folders with and without locks can be seen in [Figure 6-1](#9781430249382_Ch06.xhtml#Fig1).)


    Oracle-owned folders (and subfolders) are those that ship with EM12c by default.
    These folders will appear in the Software Library console after the Software Library
    is configured. User-owned folders are top-level folders that users create to organize
    the software entities within the Software Library.


    ![image](images/sq.jpg) **Note**  The Software Library, once configured, contains
    a series of numbered directories that can be confusing to look at when first reviewed.
    According to the Oracle Enterprise Manager team, the numbered folders in the Software
    Library structure were designed to keep everyone focused on the GUI interface.


    Using the Software Library yields a lot of advantages for administrators, including
    the following:


    *   Facilitates patching and provisioning tasks in both modes, online and offline

    *   Supports referenced file locations, allowing administrators to leverage existing
    IT infrastructures (file servers, web servers, and storage systems) to store and
    stage software entities for patching and provisioning activities

    *   Allows for organization of software entities into logical folders for efficient
    management


    As mentioned earlier, the Software Library is the core repository for everything
    within EM12c, when it comes to patching and provisioning. We have briefly discussed
    how to get to the Software Library console, the types of folders that can be configured
    within the library, and its advantages. What we haven’t discussed yet is how to
    configure the Software Library so it can be used. Let’s take a look at that now.


    ### Configuring the Software Library


    Before you can start using the Software Library, you must set it up through the
    Software Library Administration console. A Software Library must consist of at
    least one upload file location on the host where the Oracle Management Server
    (OMS) is running. A storage location in the Software Library represents a directory
    that is either uploaded to the library or generated and saved by some user-owned
    processes.


    There are three options for upload file locations when configuring the Software
    Library: an `OMS Shared Filesystem`, `OMS Agent Filesystem`, or `Referenced File
    Location`. These are the only supported storage options for setting up the Software
    Library. Let’s take a quick look at these options:


    *   `OMS Shared Filesystem`: This location is required to be shared (or mounted)
    across all the OMS hosts.

    *   `OMS Agent Filesystem`: Using this option, ensure that you have a preferred
    or name credential for the OMS host set.

    *   `Referenced File Location`: This option allows you to leverage the organization’s
    existing IT infrastructure for sourcing software binaries and scripts. Referenced
    File Locations support three storage options:'
