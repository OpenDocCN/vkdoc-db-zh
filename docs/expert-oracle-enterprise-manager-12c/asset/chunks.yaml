  trans: '# ADDM 比较报告


    通过选择 **Performance ![arrow](img/arrow.jpg) AWR ![arrow](img/arrow.jpg) Compare
    Period ADDM** 路径，可以为任何数据库目标获取 `ADDM` 比较报告。点击链接后，系统会要求您提交有关相关时间线开始和结束时间的信息（参见 图
    9-51）。在下方区域，您可以从下拉选项中选择一个基础周期进行比较，选项包括前一个时间段、前一天或前一周。


    ![9781430249382_Fig09-51.jpg](img/9781430249382_Fig09-51.jpg)


    图 9-51. 为比较 `ADDM` 报告选择选项


    ![image](img/sq.jpg) **注意**  `ADDM` 比较报告要求在目标上为 `EM12c` 代理用户安装 `PL/SQL` 包以执行比较报告，默认情况下未安装。此安装通过
    `EM` 作业执行，可以立即实施或安排在以后的日期和时间执行。


    在 图 9-52 的示例中，展示了选择比较 `ADDM` 报告时的选项。可以选择最新偏移量、基线或自定义的开始和结束时间。


    ![9781430249382_Fig09-52.jpg](img/9781430249382_Fig09-52.jpg)


    图 9-52. `ADDM` 比较报告活动


    在 **Below Detail for Selected 30 Minute Interval** 下，您可以定位在 **Top Activity** 图底部窗格中详细显示的部分。利用此信息，您可以单击
    **Compare Period ADDM** 来识别关注时间线中任何不寻常的特定活动（参见 图 9-53）。


    ![9781430249382_Fig09-53.jpg](img/9781430249382_Fig09-53.jpg)


    图 9-53. 在 `EM12c` 数据库目标界面中定位 `ADDM` 比较报告


    选择与 图 9-52 场景匹配的时间线以获得问题的最清晰视图至关重要。


    由于 **Top Activity** 从晚上 11:30 开始并持续 30 分钟，准确比较的适当选择是在 `ADDM` **Begin Time** 中也匹配此时间，并将
    **End Time** 设置为 30 分钟后，导致结束时间“起始分钟”为晚上 11:59。


    由于活动发生在星期六晚上，而目标是了解前一个小时发生了什么变化，我们将把它与前一个时段进行比较。


    图 9-54 显示了 **Comparison ADDM Report** 字段的最终设置。


    ![9781430249382_Fig09-54.jpg](img/9781430249382_Fig09-54.jpg)


    图 9-54. 比较时间线和基线


    单击 **Run** 执行 `ADDM` 比较报告。报告首先指示两个时间线的共性（参见 图 9-55）。


    ![9781430249382_Fig09-55.jpg](img/9781430249382_Fig09-55.jpg)


    图 9-55. 一个 `ADDM` 比较报告，比较前一小时与使用率较高的一小时


    请注意，比较的持续时间是整个 1 小时快照，即使输入的时间是半小时。如果快照间隔设置得比默认值（1 小时）更频繁，`ADDM` 比较将显示覆盖所选开始和结束时间所需的最少快照的结果。


    检查图中左侧的值时，您必须注意，显示的平均会话数不是图之间的一对一表示，而是独立于每个会话，以最好地展示比较中使用的每个时段的数据。每个时段图在其右侧也有自己的等待事件类型图例。


    每个图的底部清楚地显示了平均活动会话数，右上角的按钮可用于以 `HTML` 格式保存或通过电子邮件发送图表。


    `ADDM` 比较报告底部区域的 **Details** 窗格分为三个部分：**Configuration**、**Finding** 和 **Resource**。


    ## Configuration


    `ADDM` 比较报告的 **Configuration** 部分提供有关物理配置、参数设置和会话参数的信息，这些可能影响了所比较时段之间的差异（参见 图
    9-56）。


    ![9781430249382_Fig09-56.jpg](img/9781430249382_Fig09-56.jpg)


    图 9-56. `ADDM` 比较报告的 **Configuration** 部分，设置为显示所有配置值


    您可以只显示差异（默认）或显示所有配置值。如果需要检查所有配置值，这确实提供了对参数设置和会话值的快速审查。


    ## Finding


    **Finding** 部分展示了每个 **Performance Difference** 类型、影响百分比，然后是它为每个基础时段创建的影响百分比（参见
    图 9-57）。由于这些值在一个时段可能为正，在另一个时段可能为负，您应注意变更影响的总计，并确保清楚地理解比较时段的变更影响，以防问题是随多个时间段升级的。如果确实发生了升级，变更影响百分比可能会产生误导，应考虑在更长时间段内对环境的整体影响。


    ![9781430249382_Fig09-57.jpg](img/9781430249382_Fig09-57.jpg)


    图 9-57. `ADDM` 比较报告的发现，显示了比较两个时段之间性能的改进和下降


    对于每个 **Performance Difference**，详细信息显示在 **Details** 窗格下方。由于在 **Top Segments by
    User I/O** 中发现了性能回归，因此产生了以下发现：


    *   发现了负责显著 `User I/O` 和 `Cluster` 等待的单个数据库段。

    *   影响从 0.04 个活动会话变为 0.1 个活动会话，变化为 –5%。


    ## Resource


    **Resource** 详细报告了 `CPU`、内存、`I/O` 和互连（如果涉及 `RAC`）方面的差异。这些数据可以以图形形式表示，如 图 9-58
    所示，也可以以表格报告形式表示，如 图 9-59 所示。


    ![9781430249382_Fig09-58.jpg](img/9781430249382_Fig09-58.jpg)


    图 9-58. 比较报告中两个 `ADDM` 时间线之间内存差异详细数据的表格表示


    ![9781430249382_Fig09-59.jpg](img/9781430249382_Fig09-59.jpg)


    图 9-59. 比较报告中两个 `ADDM` 时间线之间 `I/O` 差异详细数据的图形表示


    借助这些详细数据，您可以快速评估出内存使用量跃升了 75%，并且比较中使用的两个时间线之间的数据文件单块读取延迟存在显著差异。


    与 `EM12c` 界面中的其他报告一样，可以选择保存或通过电子邮件发送 `HTML` 报告以供日后审查或保留作为历史参考。


    ## Summary


    随着自动化和优化数据库及其环境需求的增加，`Enterprise Manager 12c` 性能控制台的重要性也将随之提高。**Top Activity**
    将逐渐迁移到 **ASH Analytics**，其具有强大、透明和有效的报告功能。从一个简单高效的图形界面收集数据并提供有效的优化建议和监控的机会，为企业级数据库控制指明了明确的方向。


    # CHAPTER 10


    ![image](img/frontdot.jpg)


    Metric Extensions and Management Plug-ins


    by Alex Gorbachev'
- fmt: "# Oracle Enterprise Manager Cloud Control 12c 扩展性指南\n\n## 概述\n\nOracle Enterprise\
    \ Manager (OEM) 的 10g 和 11g 版本引入了一些基础功能，旨在帮助该产品成为一个企业级可管理性和监控框架。然而，OEM 首先是一个为\
    \ Oracle 产品构建的可管理性工具，其部分功能扩展了对其他非开箱即用目标类型的支持能力。Oracle Enterprise Manager Cloud\
    \ Control 12c 已被彻底重新架构，其首要定位是一个企业级可管理性框架。几乎所有针对特定 Oracle 及第三方产品的管理和监控功能，都是作为插件构建在该框架之上。\n\
    \n就像之前版本的 OEM 一样，EM12c 为用户和产品供应商提供了两种基本方式来扩展其能力。本章第一部分介绍最简单的方式：度量扩展 (Metric Extensions)。第二部分涵盖管理插件开发的基础知识以及一些高级功能。\n\
    \n我建议您在阅读本章时尝试动手操作示例，并备好 EM12c 可扩展性文档作为参考。全面覆盖该主题需要单独一本书，而本章更像是对扩展 EM12c 的一个介绍。\n\
    \n然而，即使您不打算自己开发插件，也不要跳过本章。了解 EM12c 的内部机制将帮助您更好地理解其工作原理。最终，这将使您更高效，并发现该环境更直观易用。\n\
    \n## 度量扩展\n\nEM12c 中的*度量扩展*取代了最初在 OEM 10g 中引入、现已于 12c 中弃用的用户定义度量 (User-Defined\
    \ Metrics, UDMs)。与 UDMs 相比，度量扩展在数据收集方面提供了更大的灵活性，并且更易于大规模部署和管理。\n\n正如您现在应该已经了解的，每个受监控目标都附带一组由插件创建者（可能是\
    \ Oracle 或第三方供应商）设计的预定义度量。例如，主机目标收集 CPU 利用率度量，Oracle Database 目标收集物理 IO 度量等。通常这些度量已足够，但有时您可能希望收集比开箱即用更多的度量，以监控特定于您的环境或应用程序的状况。\n\
    \n度量扩展由部署在其所在主机上的代理运行。虽然您是通过 OMS 集中创建和管理度量扩展，但它们需要分发到监控已部署度量扩展的目标的代理上。一旦度量扩展部署到某个代理的第一个目标上，该分发过程就会自动完成。\n\
    \n与旧式的 UDMs 相比，度量扩展的开发生命周期稍微复杂一些，但这正是度量扩展在多用户环境中更易于大规模管理的原因。要访问度量扩展主页，请选择 **Enterprise**\
    \ → **Monitoring** → **Metric Extensions**。在那里，您将看到度量扩展开发生命周期的快速概览，如图 10-1 所示。\n\
    \n![图 10-1：度量扩展开发生命周期](images/9781430249382_Fig10-01.jpg)\n\n*图 10-1. 度量扩展开发生命周期*\n\
    \n## 您的第一个度量扩展\n\n让我们创建一个示例度量，以便您了解实际过程。假设您需要监控数据库中的会话接近其每会话最大打开游标数的程度。该最大值由 `open_cursors`\
    \ init.ora 参数控制。您可以使用清单 10-1 中的查询，返回相对于定义最大值的打开游标百分比。\n\n***清单 10-1***. 用于打开游标度量扩展的\
    \ SQL\n\n```sql\nSELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct\n\
    \  FROM (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
    \        GROUP BY sid\n        ORDER BY 2 DESC) c,\n       v$parameter p\n WHERE\
    \ p.name = 'open_cursors' AND ROWNUM = 1\n```\n\n### 创建新的度量扩展\n\n要创建此度量，请单击度量扩展主页上可用度量扩展列表上方的\
    \ `Create` 按钮。如果该按钮呈灰色且不可点击，说明您没有创建新度量扩展的权限。您需要由 EM 超级管理员授予 `Create Metric Extension`\
    \ 权限。此权限在资源特权屏幕的 `Metric Extensions Resource` 行中，在创建或编辑 EM 用户时分配。只有一个相关权限：`Create\
    \ Metric Extension`。此权限允许您创建和导入新的度量扩展。\n\n单击 `Create` 按钮后，新的度量扩展向导将会出现。图 10-2\
    \ 显示了该向导的“常规属性”选项卡。\n\n![图 10-2：open_cursors_pct 度量扩展的常规属性](images/9781430249382_Fig10-02.jpg)\n\
    \n*图 10-2. open_cursors_pct 度量扩展的常规属性*\n\n将“目标类型”选项设置为 `Database Instance`，以便该度量可以部署在单实例数据库以及\
    \ RAC 数据库的每个实例上。如果您要从真实表中选择度量或监控全局条件（例如队列表中的消息数量），您应将“目标类型”设置为 `Cluster Database`\
    \ 而不是每个 RAC 数据库实例。将“名称”属性设置为 `open_cursors_pct`。这是 EM 内部使用的名称，如果您以后需要从存储库中提取信息（例如为自定义报告编写\
    \ SQL 语句），将会用到它。选择 `SQL` 作为适配器，并选择 1 分钟的采集间隔和 1 的上传间隔（表示每次采集后上传）。我建议您谨慎选择采集间隔，避免采集度量的频率高于\
    \ 5-15 分钟。您应该仅将少数需要快速通知的关键度量的间隔设置为低于 5 分钟。否则，您将对代理和 EM 框架的其余部分引入显著的额外开销，以处理和存储过量的数据。在测试和开发期间（如本示例）使用\
    \ 1 分钟的采集间隔是可以的，以避免等待度量历史记录出现的时间过长。在“适配器”选项卡上，将清单 10-1 中的 SQL 文本复制到“基本属性”部分的“SQL\
    \ 查询”字段中。在此示例中，您不会使用任何高级属性或上传文件。\n\n接下来是“列”选项卡。向度量添加一个列，并根据图 10-3 进行定义。\n\n![图\
    \ 10-3：度量扩展列](images/9781430249382_Fig10-03.jpg)\n\n*图 10-3. 度量扩展列*\n\n在“警报阈值”部分，选择大于号\
    \ (`>`) 比较运算符。将警告和严重状况的默认阈值分别设置为 70% 和 90%。在高级选项中，您可以编辑触发警报前的发生次数，以及创建自定义消息。您还可以将度量分配到预定义的类别之一，然后\
    \ EM12c 控制台会将您的度量与其他类似度量进行分组。\n\n在“凭证”选项卡上，保留“使用默认监视凭证”。现在，您已准备好测试您的度量。"
  raw: 'The 10g and 11g versions of Oracle Enterprise Manager introduced some basic
    features aimed at helping the product become an enterprise manageability and monitoring
    framework. However, OEM was, above all, a manageability tool built for Oracle
    products, with some features extending its capabilities to other target types
    not supported out of the box. Oracle Enterprise Manager Cloud Control 12c has
    been completely rearchitected from the ground up to be, first of all, a framework
    for enterprise manageability. Nearly all functionality for management and monitoring
    of specific Oracle and third-party products has been built on top of that framework
    as plug-ins.


    Just like previous versions of OEM, EM12c provides options for users and product
    vendors to extend its capabilities in two basic ways. The first part of this chapter
    presents the simplest: metric extensions. The second part covers the basics of
    management plug-in development as well as some advanced features.


    I recommend that you try the hands-on examples as you read through this chapter,
    and have the EM12c extensibility documentation handy as a reference. Full topic
    coverage would require a book of its own, and this chapter is more of an introduction
    to extending EM12c.


    However, don’t skip this chapter even if you don’t expect to develop plug-ins
    yourself. Knowledge of EM12c internals will help you better understand how EM12c
    works. Ultimately, this will enable you to become more productive and find the
    environment more intuitive to use.


    Metric Extensions


    *Metric extensions* in EM12c replace user-defined metrics (UDMs) that were initially
    introduced in OEM 10g and are now deprecated in 12c. Compared to UDMs, metric
    extensions provide much more flexibility in data collection and are easier to
    deploy and manage at scale.


    As you should already know by now, each monitored target comes with a set of predefined
    metrics that are designed by the plug-in creator (which could be Oracle or a third-party
    vendor). For example, host targets collect CPU utilization metrics, and Oracle
    Database targets collect physical IO metrics, among others. Usually these metrics
    will be enough, but at times you might want to collect more metrics than are available
    out of the box in order to monitor conditions specific to your environment or
    applications.


    Metric extensions are run by an agent from the host that the agent is deployed
    on. While you are creating and managing metric extensions centrally by using the
    OMS, they need to be distributed to the agents that monitor targets where metric
    extensions are deployed to. That’s done automatically as soon as a metric extension
    is deployed on the first target of an agent.


    The development lifecycle of metric extensions is a little more involved compared
    to the old-style UDMs, but that’s what makes metric extensions simpler to manage
    at scale in a multiuser environment. To access the Metric Extensions home page,
    choose Enterprise ![arrow](images/arrow.jpg) Monitoring ![arrow](images/arrow.jpg)
    Metric Extensions. There you will see a quick overview of the metric extensions
    development lifecycle, as shown in [Figure 10-1](#9781430249382_Ch10.xhtml#Fig1).


    ![9781430249382_Fig10-01.jpg](images/9781430249382_Fig10-01.jpg)


    [Figure 10-1](#9781430249382_Ch10.xhtml#_Fig1). Metric extension development lifecycle


    Your First Metric Extension


    Let’s create a sample metric so you can see the process in action. Let’s say you
    need to monitor how close the sessions in your database get to the maximum number
    of open cursors per session. That maximum is controlled by the open_cursors init.ora
    parameter. You can use the query in [Listing 10-1](#9781430249382_Ch10.xhtml#list1)
    to return the percentage of open cursors in terms of the defined maximum.


    ***[Listing 10-1](#9781430249382_Ch10.xhtml#_list1)***.  SQL for Open Cursors
    Metric Extensions


    ```

    SELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct

      FROM (SELECT   sid, COUNT (*) open_cursors

                FROM v$open_cursor

            GROUP BY sid

            ORDER BY 2 DESC) c,

           v$parameter p

     WHERE p.name = ''open_cursors'' AND ROWNUM = 1

    ```


    Creating the New Metric Extension


    To create this metric, click the Create button on the Metric Extensions home page,
    just above the table listing available metric extensions. If the button is grayed
    out and not clickable, you don’t have permission to create new metric extensions.
    You need to have the Create Metric Extension privilege granted by your EM Super
    Administrator. This privilege is assigned while creating or editing an EM user
    from the Resource Privileges screen, in the row Metric Extensions Resource. There
    is only one relevant privilege: Create Metric Extension. This privilege allows
    you to create and import new metric extensions.


    After you click the Create button, the new Metric Extensions Wizard appears. [Figure
    10-2](#9781430249382_Ch10.xhtml#Fig2) shows the wizard’s General Properties tab.


    ![9781430249382_Fig10-02.jpg](images/9781430249382_Fig10-02.jpg)


    [Figure 10-2](#9781430249382_Ch10.xhtml#_Fig2). General properties of open_cursor_pct
    metric extension


    Set the Target Type option to Database Instance so the metric can be deployed
    on a single-instance database as well as on each instance of a RAC database. If
    you were to select the metric from a real table or to monitor a global condition
    such as the number of messages in a queue table, you would set the Target Type
    to Cluster Database instead of each RAC database instance. Set the Name property
    to open_cursors_pct. This is the name used by EM internally, and you would use
    it later if you needed to extract information from the repository—for example,
    writing a SQL statement for a custom report. Choose SQL as the Adapter and select
    a collection interval of 1 minute and an upload interval of 1 (indicating an upload
    on each collection). I recommend that you choose collection intervals carefully
    and avoid collecting metrics more frequently than 5–15 minutes. You should set
    the interval below 5 minutes for only a very few critical metrics requiring a
    fast notification time. Otherwise, you would be introducing significant overhead
    on the agent and the rest of the EM framework to process and store a excessive
    amount of data. It’s OK to use a 1-minute collection interval during testing and
    development (as in this example) to avoid waiting too long for the metric history
    to appear. On the Adapter tab, copy the SQL text from [Listing 10-1](#9781430249382_Ch10.xhtml#list1)
    into the SQL Query field in the Basic Properties section. You won’t be using any
    advanced properties or uploading files for this example.


    Next is the Columns tab. Add a single column to the metric and define it according
    to [Figure 10-3](#9781430249382_Ch10.xhtml#Fig3).


    ![9781430249382_Fig10-03.jpg](images/9781430249382_Fig10-03.jpg)


    [Figure 10-3](#9781430249382_Ch10.xhtml#_Fig3). Metric extension column


    In the Alert Threshold section, choose the greater-than (>) comparison operator.
    Set the default thresholds for warning and critical conditions to 70 and 90 percent,
    respectively. In the advanced options, you can edit the number of occurrences
    before an alert as well create a custom message. You can also assign the metric
    to one of the predefined categories which then enables EM12c Console to group
    your metrics with other similar metrics.


    On the Credentials tab, leave Use Default Monitoring Credentials. Now you are
    ready to test your metric.'
