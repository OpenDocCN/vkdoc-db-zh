- fmt: 'However, all the technologies that `Grid Control` is able to manage advance,
    and all at different rates, and in some cases at rates and directions outside
    the control of `Oracle Corporation`. The monolithic design of previous `Enterprise
    Manager` releases meant that the product was, almost by design, permanently behind
    the release cycle of monitored products. This situation meant that customers could
    patch monitored targets to address production issues and then find that they could
    not obtain support for monitoring issues because the patched release was not certified
    with the enterprise management product. `Oracle` has addressed this issue, and
    others, with the plug-in architecture of `EM12c`.


    ![image](images/sq.jpg) Note: We are familiar with a project to implement `Oracle
    Enterprise Manager 11g` for a UK-based enterprise with an installed estate of
    `RAC`, `WebLogic`, `SOA`, and `E-Business Suite`. `EM 11g` was specifically chosen
    because of its support for `SOA`, which was a key technology for the client. However,
    `EM` certification permanently lagged behind the `SOA` releases, and this led
    to significant support issues for the client when `Oracle Support` would not take
    service requests because the four-digit version number of the `WebLogic` server
    was one patch set ahead of the certified version. We expect the plug-in nature
    of support for managed targets to address this issue.


    ## Interface


    The visual interface for `Grid Control` had always been in the hands of the development
    teams providing the underlying management functionality. This had two large consequences.
    First, the interface design was, to put it charitably, old-fashioned. The original
    product was released in early 2004, which almost certainly means that it started
    development life sometime between 2001 and 2003. It’s worth remembering what web
    interfaces were like in the early part of this century; the `Grid Control` product
    had usability issues, but it was by no means alone. [Figure 4-2](#9781430249382_Ch04.xhtml#Fig2)
    shows the old-style interface, essentially a white page full of links arranged
    broadly by feature area.


    ![9781430249382_Fig04-02.jpg](images/9781430249382_Fig04-02.jpg)

    [Figure 4-2](#9781430249382_Ch04.xhtml#_Fig2). Old-style interface


    A good `GUI` has, among other things, the following characteristics:


    *   *Clarity*: It’s easy to find what you want.

    *   *Consistency*: Similar tasks are done in similar ways.

    *   *Efficiency*: Tasks are quickly and easily achieved.


    `Grid Control` was a letdown in all of these areas, primarily because of its interface
    design and poor navigation in the product. The prime paradigm for the database
    pages was that of a categorized list of links. This led to a text-heavy set of
    pages with links sometimes located in surprising places—for example, the `AWR`
    interface, which you might expect to find on the `Performance` tab, was in fact
    located on the `Server` tab of the main database management screen. Overall, the
    choice and layout of links was more reminiscent of small, community ad sites such
    as `Craigslist` rather than a task-oriented management application.


    This decision mattered, probably more than the designers imagined, because of
    the principle that a good `UI` should be clear. The old `Grid Control` interface
    left even experienced hands at times clicking from tab to tab and link to link,
    trying to find pages that they knew were listed somewhere. The product was also
    littered with odd artifacts that were never really addressed; for example, the
    server management screen for databases had two distinct links labeled `JOBS` that
    would take the user to separate pages, one for the database scheduler and one
    for the `Enterprise Manager` scheduler. There was no link to the job scheduler
    with which most `DBAs` of the time were familiar, `DBMS_JOB`.


    ![image](images/sq.jpg) Note: One particularly annoying aspect of the `Grid Control`
    interface was the inconsistent arrangement of columns at the bottom of each page.
    The columns were more or less common but arranged in a different order on each
    tab. Thus the location of the monitoring configuration link depended on which
    tab was active at the time.


    Second, the interface design was inconsistent between products. Switching from
    database to application server management gave you whole new interface paradigms.
    For example, context menus appeared in parts of the product but not others, and
    the plug-ins used to provide graphical displays were different. This inconsistency
    in appearance and style actively hindered users familiar with one part of the
    product from finding the appropriate functionality when they were required to
    manage a different technology with the product.


    The following figures illustrate these problems well. Both are performance management
    pages, one for the database and one for a `J2EE` application server, but they
    might as well come from different products. [Figure 4-3](#9781430249382_Ch04.xhtml#Fig3)
    represents the current performance of a database instance. The page uses area
    charts extensively to represent `CPU` and `I/O` load on the instance and to categorize
    current activity. By contrast, [Figure 4-4](#9781430249382_Ch04.xhtml#Fig4), which
    is the nearest equivalent `WebLogic` page, primarily uses line charts to represent
    current activity, allows extensive customization of the information presented,
    and has an entirely different look and feel. For administrators with responsibility
    for multiple areas, this constant changing of interface actively interfered with
    the effectiveness with which they could operate.


    ![9781430249382_Fig04-03.jpg](images/9781430249382_Fig04-03.jpg)

    [Figure 4-3](#9781430249382_Ch04.xhtml#_Fig3). Database Performance home page


    ![9781430249382_Fig04-04.jpg](images/9781430249382_Fig04-04.jpg)

    [Figure 4-4](#9781430249382_Ch04.xhtml#_Fig4). WebLogic Server Performance home
    page


    Like many other web developers of the time, those responsible for `Grid Control`
    had to contend with a variety of browsers with a range of capabilities. However,
    as you have seen, `Oracle`’s product had significant shortcomings in the areas
    of consistency and efficiency—the core features of an excellent `GUI`. These are
    all addressed by the `Cloud Control` release.


    ## Cloud Control


    At this point, you are probably wondering why this chapter has spent several pages
    on previous releases. This material is presented so you have the appropriate background
    to help you understand the design decisions of the `Enterprise Manager` team in
    creating the interface for this new product, which can seem overwhelming and overly
    complicated at first. The `EM12c` user interface has been entirely redesigned
    from the ground up, and addresses almost all of the concerns surrounding the previous
    generations of the product. This inevitably means that even experienced administrators
    must face a learning curve. Helping you through this curve is the main focus of
    this chapter.


    ![image](images/sq.jpg) Note: The only areas of `EM12c` that could still use significant
    improvement are browser compatibility (`Google Chrome/Chromium` has some rendering
    issues, for example) and integration with browser navigation—for example, the
    Back button.


    `Cloud Control` uses the following main `UI` features to allow the user to interact
    efficiently, clearly, and consistently with the product. The primary navigation
    element is no longer the hyperlink, but a menu system, combined with various wizards
    for multistep tasks. The net result of all this work is that it is now much more
    appropriate to describe `Enterprise Manager` as a web-based application rather
    than as a web-based management interface.


    `Cloud Control` provides three distinct menu bars:


    *   `Cloud Control` menu bar ([Figure 4-5](#9781430249382_Ch04.xhtml#Fig5))


