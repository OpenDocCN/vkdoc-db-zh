  trans: '

    除了在命令行上传递参数外，还有几种其他方法。当你希望避免过长的命令行、避免处理与平台相关的不同转义规则，或者需要传递敏感信息（例如凭据）时（因为命令行参数在许多平台上很容易被任何用户看到），这些方法非常有用。传递参数的一种方法是使用环境变量。代理在调用操作系统命令之前设置环境变量，程序或脚本可以在执行过程中读取该变量。一种更好的传递参数方式是使用标准输入，然后由程序解析。Oracle
    将这种机制称为 `输入属性`。后者是将凭据传递给脚本的最安全方式，因为在某些平台上，即使是进程的环境变量也可以轻松检索。


    **注意** 有关环境变量和输入属性的更多详细信息，请参阅 `Oracle Enterprise Manager Cloud Control 12c 管理员指南`（第
    8 章，“指标扩展”，第 8.4 节）。


    ## 操作系统命令适配器的凭据


    操作系统命令适配器有两套凭据：主机凭据和输入凭据。`主机凭据` 用于登录运行目标类型代理的服务器。默认情况下，操作系统命令适配器使用默认监控凭据——即用于收集目标预定义指标的凭据。但是，你可以选择创建自己的主机凭据集，然后为计划部署指标扩展的目标设置凭据。例如，你可能需要以特定的操作系统用户（例如
    `ROOT` 或运行代理本身之外的其他应用程序用户）身份运行收集脚本。请注意，SQL 适配器具有相同的功能，因此你可以定义自定义数据库凭据集，以与默认监控用户（例如
    `DBSNMP`）不同的数据库用户身份运行。


    输入凭据是第二种可以定义的凭据类型。这些凭据完全独立于主机凭据，并使用标准输入传递给正在执行的程序或脚本，就像 `输入属性` 一样。`输入凭据` 的优势在于，你可以独立于指标扩展定义来设置它们。如果不同的目标需要不同的凭据，指标扩展的用户可以轻松定义凭据，而无需创建具有各种硬编码密码的唯一指标扩展——这正是如果使用
    `输入属性` 传递凭据时你需要做的。


    **注意** 使用 `输入凭据` 的示例可以在 `Oracle Enterprise Manager Cloud Control 12c 管理员指南`（第
    8 章，“指标扩展”，第 8.4.1 节）中看到。


    ## 操作系统命令—多列适配器


    现在让我们逐一看看操作系统命令适配器。


    操作系统命令—多列适配器可能是你最常使用的。命令的输出由适配器解析，使得每一行成为单个行，然后每一行本身被标记化为多个值。无论行尾是以类 Unix 格式（单个
    `LF`）还是 Windows 格式（`CR+LF`）标记，适配器都能正确分割行。


    该适配器允许使用“以...开始”前缀来过滤掉输出中不包含指标的行。这是一种良好的实践，可以防止潜在的输出噪声干扰——例如，未预期或你只想忽略的警告。广泛接受的前缀标准是
    `em_result=`。清单 10-4 显示了一个输出示例。


    ***清单 10-4***. 使用 `em_result=` 前缀的操作系统命令的示例输出


    ```

    em_result=<指标行 1>

    此行被忽略

    em_result=<指标行 2>

    如果 em_result= 不在行首，它也会被忽略

    em_result=<指标行 3>

    ```


    请注意，前缀中的前导和尾随空格是有效的，不会被截断。


    ### 处理分隔符和空格


    前缀之后的行内容随后使用一个简单的分隔符字符串被标记化为多个列。默认（且常用）的分隔符是管道符号（`|`）。但是，如果你的列内容可能包含该字符，你可以使用任何其他分隔符，甚至可以使用多字符字符串使其真正唯一，例如
    `{=-DELIMITER-=}`，这样像下面这样的行就会被正确解析为三个值：


    ```

    em_result=一些常见的分隔符有 | , % ;{=-DELIMITER-=}123{=-DELIMITER-=}456

    ```


    空格在分隔符字符串中具有特殊含义。首先，前导和尾随空格会被截断并忽略。其余的空格似乎会将分隔符字符串拆分为多个分隔符，但它们的应用非常不一致，因此很难预测最终结果。我曾尝试创建一个分隔符来解析以逗号分隔值、并可能用双引号括起来的行，但未能想出一个可靠的分隔符字符串。我怀疑代码可能原本就不是用来处理分隔符中的空格的。文档没有提及如何处理空格，而且它们的处理似乎不可靠，因此我强烈建议此时避免在分隔符字符串中使用空格。


    关于空格的最后一点说明：收集到的值中的空格在存储到存储库时不会被截断。但是，EM 用户界面在显示它们时会截断前导和尾随空格。如果你在文本列上设置诸如 `CONTAINS`
    之类的条件，那么前导和尾随空格在条件字符串和收集到的指标值中都是重要的，请注意。我建议尽可能避免前导和尾随空格，因为你在用户界面中看不到它们，但它们确实存在。（只需检查存储库视图
    `MGMT$METRIC_CURRENT`，例如。）


    ### 数据列与键列


    在定义适配器时，你需要定义命名列及其属性。你已经看过了前面的例子，所以我们只简要说明数据列和键列之间的区别。


    `数据列` 实际上是你要收集的指标值。例如，你可能希望监视暂存目录的大小，文件被加载到该目录中以便后续处理。该目录中文件的总大小是你想要计算的指标——这将是一个数据列。你可能还想计算暂存目录中的文件总数——这是另一个数据列。对于这些数据列中的每一个，你可能都想定义一个比较运算符。在这种情况下，你很可能希望选择大于（`>`）警报条件，这样当暂存目录中的大小或文件数量增长超过预定义的阈值时，你就可以生成警告和错误。请注意，在指标开发过程中选择正确的运算符很重要。阈值本身是可选的，并且可以由指标扩展用户为每个目标自定义。然而，运算符只能由指标扩展作者更改，并且更改它们需要创建指标扩展的新版本。

    '
- fmt: 'Imagine now that you want to monitor not one but multiple staging directories—and
    each of them separately. Instead of defining multiple metric extensions (one per
    directory), you can combine them into the same `metric extension` and collect
    the directory size and the number of files as a separate line and then add a directory
    path to distinguish the lines. This is when you would use `key columns`. In this
    example, the directory path would be the `key column`, and the size of the files
    would be a `data column`. Note that if you are creating a new version of a `metric
    extension`, you can’t remove any of the existing columns or add any `key columns`.
    When it comes to modifications, you can change only some properties of the existing
    columns, such as display name and comparison operator. However, you can add additional
    `data columns`. For example, if you already have a metric monitoring the size
    of a directory, you can’t create a new version and add a `key column` with a directory
    path to monitor the sizes of multiple directories. Instead, you will need to clone
    it as a new `metric extension` and not just the next version.


    The `key column` (or columns) must be unique for each data collection. Otherwise,
    an error is raised. If an adapter receives multiple rows, and no `key columns`
    are defined for the `metric extension`, an error is raised as well. Finally, remember
    to choose the correct column type: `String` or `Number`. Remember that only `number`
    metrics are displayed on the charts and rolled up or aggregated as collection
    data aged in `EM12c` moving from detailed to hourly and daily snapshots. `String`
    metrics are displayed only as tables in the `EM` interface.


    ## OS Command—Single Column


    The `OS Command—Single Column` adapter returns just one value. You should still
    think of it as a table with one column and one row (`EM12c` always treats metrics
    as tables), so you need to define a single column in the Columns tab. The complete
    output of the command even multiline output—is passed back as a value. I haven’t
    found much use for this adapter, but if you need to pass back a multiline fragment
    of text, this is the way to go. You can then set up a `CONTAINS` or `MATCH` alert
    condition to test the existence of a substring or regular expression match for
    this returned text.


    Note that this adapter doesn’t have `Delimiter` and `Start With` properties as
    `OS Command—Multiple Columns` does. You can’t filter output lines with a prefix.
    Unfortunately, this adapter is available for only a very limited set of targets,
    as described later in the section “Adapters and Target Types.”


    ## OS Command—Multiple Values


    The `OS Command—Multiple Values` adapter returns multirow results by using the
    same prefix mechanism as the `OS Command—Multiple Columns` adapter. It doesn’t
    have the `Delimiter` property, because the adapter doesn’t split the content of
    the line in multiple values; the content of the whole line after the prefix is
    passed as the value. The end result is a single-column table. Note that you define
    only a single data column and no `key columns`. The adapter basically collects
    a set of values. So the difference between this adapter and `OS Command—Multiple
    Columns` is that `OS Command—Multiple Values` doesn’t require any `key columns`.


    One use for such an adapter is collecting lines from the log file, where you can
    define a `CONTAINS` or `MATCH` condition on the column. Note that if you try to
    simulate a similar collection with the `OS Command—Multiple Columns` adapter by
    using a single `key column`, you wouldn’t be able to define an alerting condition
    on that column. In addition, duplicate values would produce an error.


    ## SNMP Adapter


    While the idea of being able to collect metrics over `SNMP` (Simple Network Management
    Protocol) is nice, the current implementation of the `SNMP` adapter makes it of
    very limited use for `metric extensions`. The `SNMP` adapter is designed to collect
    metrics from a single `SNMP` server, normally running locally. However, up to
    the `EM` release `12.1.0.2.0`, the `SNMP` adapter is basically broken, because
    it requires a specific dynamic property of the host target to be evaluated correctly—`SNMPHostname`—and
    this property is resolved on only a very few hardware platforms. You can apply
    a workaround by using the `emcli` command to manually set that property name,
    but you can’t use the `SNMP` adapter to collect metrics from multiple devices
    by using a single host target to deploy the `metric extension` to.


    Note that you will also need to set `SNMP` credentials in order to use the `SNMP`
    adapter. The documentation on this adapter is rather incomplete, so I suggest
    that you avoid using it at this point. Instead, use `OS Command` adapters to collect
    `SNMP` metrics or use plug-ins (which have a full-featured `SNMP` metric-collection
    method, covered in the second part of this chapter).


    ## JMX Adapter


    A `JMX` (Java Management Extensions) adapter is used to collect metrics from Java
    applications that have `JMX`-based standard instrumentation embedded in `JMX`-enabled
    servers such as Oracle WebLogic, IBM WebSphere, Red Hat JBoss, and even stand-alone
    `JVM` (Java Virtual Machine). For more information, refer to the standard documentation,
    *Oracle Enterprise Manager Cloud Control 12c Administrator''s* Guide ([Chapter
    8](#9781430249382_Ch08.xhtml), Section 8.4.1).


    Although this documentation is admittedly skinny, as you learn about management
    plug-ins in the rest of this chapter, you will also learn about underlying fetchlets,
    and the documentation on `JMX` fetchlets is a bit more descriptive. For more information,
    see *Oracle Enterprise Manager Cloud Control Extensibility Programmer''s Reference*
    (Chapter 20, “Using Fetchlets.” Section 20.11). A more complete example can be
    found in *Oracle Enterprise Manager Cloud Control 12c Administrator''s Guide*,
    (Chapter 20, “Monitoring Using Web Services and JMX”).


    ## Adapters and Target Types


    `EM12c` limits the choice of adapters for each target type. Although the documentation
    doesn’t cover which adapters are available for which target type, you can see
    the associations from the `EM_MEXT_TARGETTYPE_ADAPTERS` repository view. From
    that view, you can also see that a couple of target types have `Web Services Adapter`
    support even though it’s not documented. You can also see in the `EM_MEXT_ADAPTERS`
    view that there are even more adapters available, such as the `RESTful Web Wervices
    Wdapter`. However, they are not enabled for any of the target types. I expect
    that these are provisions for the next releases, as we’ve seen features that were
    delivered internally and externalize only in a later version.


    Various `OS Command` adapters are available for some targets but not for others,
    which really makes little sense. For example, the `OS Command—Single Column` adapter
    is available for Automatic Storage Management (but not for Cluster ASM), Cluster
    Database, Database Instance, and a few other target types. Almost every target
    type has the `OS Command—Multiple Columns` adapter available. The `OS Command—Multiple
    Values` adapter isn’t associated with any of the target types that are available
    on a system with default plug-ins in release `12.1.0.2.0`.


    You can find detailed official documentation on the `metric extensions` adapters
    in the *Oracle Enterprise Manager Cloud Control 12c Administrator''s Guide* (Section
    8.4). If you are more interested in the under-the-hood implementation, check out
    `EM_MEXT_%` views and tables in the `SYSMAN` schema. I will get back to some content
    in those tables when I discuss plug-ins later in this chapter (see the “Under
    the Hood of Metric Extensions” section).'
