    in future releases of Oracle, ASH Analytics will continue to provide more-enhanced
    performance data for the Oracle database environment.


    SQL Monitoring


    SQL Monitor, introduced in Oracle 11g, has been hailed as one of the best new
    features. The graphical display of SQL Monitor within Enterprise Manager offers
    a secondary view to session data in the database (see [Figure 9-36](#9781430249382_Ch09.xhtml#Fig36)).


