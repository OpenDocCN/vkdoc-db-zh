    ![9781430249382_Fig03-11.jpg](img/9781430249382_Fig03-11.jpg)


    图 3-11. 从 EM12c 控制台访问 OMS


    这将带您进入`管理服务`主页，如图 3-12 所示。


    ![9781430249382_Fig03-12.jpg](img/9781430249382_Fig03-12.jpg)


    图 3-12. 管理服务主页


    在这个特定环境中，我们设置了两个 OMS，由一个负载均衡器控制到每个 OMS 的连接。实际上屏幕右侧还有更多输出内容（`CPU 使用率`、`堆使用率`和`WebLogic
    Server`），但已裁剪以便于页面显示。


    通过点击右上角的`配置属性`，您可以根据需要设置属性来更改 OMS 的运行时行为。默认设置显示所有非默认属性，但您可以通过点击图 3-13 中高亮显示框右侧的下拉箭头，在`管理服务器实例`处将其更改为`全部`或`非默认值`。


    ![9781430249382_Fig03-13.jpg](img/9781430249382_Fig03-13.jpg)


    图 3-13. OMS 的配置属性


    您也可以点击属性名称进行更改。例如，如果您想在代理（或代理组）与 OMS 之间设置跟踪以诊断它们之间的问题，可以点击属性 `oracle.sysman.core.gcloader.trace_agent`，并根据需要更改设置，如图
    3-14 所示。根据属性的不同，您可以全局（针对所有 OMS）设置此值，或针对单个 OMS 进行设置。如果您有多个 OMS，并且问题仅出现在其中一个上，这将特别有用。另请注意（如图
    3-14 中所突出显示），您可以查看此属性的更改历史记录，包括先前更改的日期、旧值和新值以及更改者。


    ![9781430249382_Fig03-14.jpg](img/9781430249382_Fig03-14.jpg)


    图 3-14. 更改 OMS 的属性值


    您可以通过点击其名称进入 OMS 主页来查看每个 OMS 的更多详细信息。图 3-15 展示了一个配置示例，其中有两个 OMS，前面有一个负载均衡器。OMS
    主页有几个区域。最重要的两个是`摘要`区域（显示状态、可用性百分比等）和`事件和问题`区域（显示此 OMS 特定的事件和问题列表）。事件管理将在第 12 章中更详细地介绍。


    页面另一个值得关注的部分是左上角的`Oracle Management Service`。这些选项中有许多与代理主页上的类似，因此这里不再赘述。


    ![9781430249382_Fig03-15.jpg](img/9781430249382_Fig03-15.jpg)


    图 3-15. OMS 主页


    所以现在您可能想知道所有的 `start`、`stop` 和 `status` 命令在哪里可用。这些命令会导致控制台不可用，因为 OMS 还负责呈现用户界面。因此，这些命令通过我们的老朋友
    `EMCTL` 来执行，您很快就会在 OMS 的上下文中看到它。然而，在此之前，您还需要了解 OMS GUI 的另一个部分：`运行状况概览`页面，如图 3-16
    所示。此页面提供 OMS 和存储库操作及性能的概览。通过选择`设置 > 管理云控制 > 运行状况概览`来访问。


    ![9781430249382_Fig03-16.jpg](img/9781430249382_Fig03-16.jpg)


    图 3-16. 运行状况概览页面


    `运行状况概览`页面也有几个有用的区域。对于托管环境的快速概览，`概览`区域非常有用，特别是用于确定所有受监视目标的数量和状态。然而，最有趣的部分是`上传性能`区域，在那里您可以识别可能的加载器问题和网络问题。同样值得关注的是`OMS
    和存储库`菜单。这与 OMS 和代理主页上的等效菜单内容相似，但有几个其他页面上没有的选项。从 OMS 的角度来看最相关的是`添加管理服务`链接（其他选项将在本章的存储库等效部分介绍），它会启动`部署过程管理器`以向您现有系统添加额外的
    OMS。


    ## 通过命令行管理 OMS


    让我们从讨论命令行管理 OMS *不再* 提供的功能开始本节，那就是 `OPMNCTL` 实用程序。虽然该实用程序仍然存在，但它已被 `EMCTL` 实用程序取代。所以让我们更详细地看看它。


    ## EMCTL 实用程序


    `EMCTL` 实用程序用于对 OMS 执行许多操作，类似于它用于代理的方式。话虽如此，有许多 `emctl` 命令在您从 OMS 主目录通过 `emctl`
    命令发出时，似乎是对存储库进行操作。这是因为许多存储库信息（凭据、连接性等）也存储在 OMS 中，以使其能够连接到存储库并完成工作，因此这些命令基本上是在两者之间进行同步。


    表 3-3 列出了一些从 OMS 主目录常用的 `emctl` 命令。


    表 3-3. OMS emctl 命令

