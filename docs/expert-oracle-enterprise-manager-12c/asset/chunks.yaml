    [Figure 11-47](#9781430249382_Ch11.xhtml#_Fig47). Results of a sample query, displayingall
    jobs with a name including BACKUP


    Using the EMDIAG utility commandrepvfy, we can dump all data from the job into
    a log file by executing the following:


    ```

    $repvfy dump job –name  BACKUP_APEX.1

    ```


    Or again, we can query from SQL*Plus to gather the STEP_ID with data from the
    original query:


    ```

    select mj.job_id, mj.job_name, mjh.execution_id, mjh.step_id

    from sysman.mgmt_job mj, sysman.mgmt_job_history mjh

    where mj.job_id = ''BFC78F41009876F3E04014AC08003231''

    and mj.job_id=mjh.job_id

    and mjh.start_time > sysdate-1;

    ```


    [Figure 11-48](#9781430249382_Ch11.xhtml#Fig48) shows an example of JOB_ID, EXECUTION_ID,
    and STEP_ID that can be used as we proceed through the EMDIAG steps to dump data
    to the log files.


    ![9781430249382_Fig11-48.jpg](images/9781430249382_Fig11-48.jpg)


    [Figure 11-48](#9781430249382_Ch11.xhtml#_Fig48). An example of JOB_ID, EXECUTION_ID,
    and STEP_ID


    We then can use the STEP_ID and proceed to dump to log files more data about the
    job in question:


    ```

    $repvfy dump step –id 1554907

    ```


    The STEP_ID is also located in the last occurrence of the error in the emoms.trc
    file, located in the $OMS_HOME/gc_inst/em/EMGC_OMS1/sysman/log. This trace file
    will direct you to the target and job information if for some reason the information
    did not return in the query from SQL*Plus.


    The EXECUTION_ID, also shown in [Figure 11-48](#9781430249382_Ch11.xhtml#Fig48),
    can be then used to gather more information on the failure from the execution
    steps, which will then be dumped to another log file, located in the same $EMDIAG_HOME/logs
    directory as an execution log:


    ```

    $repvfy dump execution –guid C979658693B409C9E043080014ACD94B

    ```


    The output from an EMDIAG execution is quite extensive. If you are not familiar
    with it, or if you feel uncomfortable with your own analysis of the data, you
    should not hesitate to open a service request with My Oracle Support and upload
    the files for a technical representative from Oracle to review.


    The logs for the output from these reports will then be generated to the <EMDIAG_HOME>/log
    directory to be reviewed or uploaded to My Oracle Support. I do prefer to redirect
    the screen output to a file for easy review, as seen in the preceding examples.
    This data should help you answer questions regarding your EM12c environment without
    having to always open an SR, but if the need arises, this valuable diagnostic
    data can then be generated to save time and effort so that the you can perform
    tasks other than just answering My Oracle Support questions.


    Blackouts and EM12c Job Impact


    Issuing a blackout from any of the blackout creation entry points in the EM12c
    environment is often performed during maintenance windows so as to not produce
    nonessential notifications and alerts. When job notifications are set up for individual
    jobs, the EM Job System can cause significant alerting compared to setting up
    blackouts through job events.


    You have two choices for jobs when setting up a blackout:  the jobs can be skipped
    during the blackout or the jobs can continue to run, alerting only during the
    time the target is unavailable to the job.'
