- fmt: 'The Create Directives wizard then displays. First, the wizard wants you to
    describe the type of directive this is going to be by placing you on the Describe
    page, shown in [Figure 6-20](#9781430249382_Ch06.xhtml#Fig20). The only required
    information on this page is the `Name`, `Description`, and `Other Attributes`
    for the entity. As with generic components, you can associate files and notes
    with the directive by adding files or notes in the Attachments and Notes areas.


    ![9781430249382_Fig06-20.jpg](images/9781430249382_Fig06-20.jpg)

    [Figure 6-20](#9781430249382_Ch06.xhtml#_Fig20). Describing the directives


    The other thing you may notice are the wizard steps at the top of the page. There
    are fewer steps required to create a directive than a generic component. Fill
    in the required fields and then click Next to move to the next screen of the wizard.


    As noted earlier, directives are entities that perform a set of instructions on
    a software package within the Software Library. On the Configure page, shown in
    [Figure 6-21](#9781430249382_Ch06.xhtml#Fig21), you have the option of adding
    command-line arguments and properties associated with the directive. If you have
    nothing to add for command-line arguments, or the type of properties you want,
    you can click Next.


    ![9781430249382_Fig06-21.jpg](images/9781430249382_Fig06-21.jpg)

    [Figure 6-21](#9781430249382_Ch06.xhtml#_Fig21). Configuring the directives


    Command-line arguments are just that—arguments that can be passed as if you were
    using a script. Arguments can include variables that can be set later, a prefix,
    and suffix. The prefix and suffix text are appended before and after the property
    value to produce the command-line argument.


    ![image](images/sq.jpg) **Note** The following is a command-line argument example:

    `./test.sh –user={username}`

    The prefix is `-user=`, and the property is `username`.


    To set up a command-line argument, you click the `Add` button. A dialog box appears,
    allowing you to configure the argument prefix, property name, and argument suffix,
    as shown in [Figure 6-22](#9781430249382_Ch06.xhtml#Fig22). The nice thing about
    this dialog box is that it tells you specifically what you need to provide, unlike
    other dialog boxes.


    ![9781430249382_Fig06-22.jpg](images/9781430249382_Fig06-22.jpg)

    [Figure 6-22](#9781430249382_Ch06.xhtml#_Fig22). Adding command-line arguments


    After all the arguments that you want set are in place, click `OK`. This adds
    the argument to the Configure page. As you add more arguments, the command line
    starts to build under them. [Figure 6-23](#9781430249382_Ch06.xhtml#Fig23) shows
    that we added two arguments, and the command line is created for us.


    ![9781430249382_Fig06-23.jpg](images/9781430249382_Fig06-23.jpg)

    [Figure 6-23](#9781430249382_Ch06.xhtml#_Fig23). Command line built with arguments
    added


    After all the arguments are added for the directive, you need to tell the directive
    what type of script will be running. This is accomplished on the same page, in
    the Configuration Properties section. You need to tell the directive that you
    will use either `Perl` or `Bash`. Additionally, if the script needs to run with
    elevated privileges, you can direct that by clicking the `Run Privileged` box.
    [Figure 6-24](#9781430249382_Ch06.xhtml#Fig24) shows the `Run Privileged` check
    box selected for a Bash script.


    ![9781430249382_Fig06-24.jpg](images/9781430249382_Fig06-24.jpg)

    [Figure 6-24](#9781430249382_Ch06.xhtml#_Fig24). Configuration properties for
    a directive


    Now that you have configured all the items you would like on the Configure page
    for the directive, you can move on by clicking `Next`. The wizard brings you to
    the Select Files screen.


    On this screen, you are presented with two radio buttons, which enable you to
    either upload the files needed for the directive or to refer to them by location.
    These two options are much like the options you had when initially creating the
    Software Library; the same rules apply:


    *   `Upload Files`: Use this option if you want to upload some entity files from
    the local filesystem or agent machine to the selected destination location.

    *   `Refer Files`: This option allows you to enter the source location details,
    since you are not uploading anything to the Software Library.


    Select the `Upload Files` option, as shown in [Figure 6-25](#9781430249382_Ch06.xhtml#Fig25).


    ![9781430249382_Fig06-25.jpg](images/9781430249382_Fig06-25.jpg)

    [Figure 6-25](#9781430249382_Ch06.xhtml#_Fig25). Selecting files to upload


    Next you need to select the destination location. Select the magnifier icon next
    to the upload location under Specify Destination. This opens the dialog box where
    you can choose either an `OMS Shared Filesystem` or an `OMS Agent Filesystem`.
    What appears by default is the location specified when setting up the Software
    Library (see [Figure 6-26](#9781430249382_Ch06.xhtml#Fig26)). Select the Software
    Library and click `OK`.


    ![9781430249382_Fig06-26.jpg](images/9781430249382_Fig06-26.jpg)

    [Figure 6-26](#9781430249382_Ch06.xhtml#_Fig26). Selecting the upload location


    Next you need to specify our source files. These are the script files that are
    needed for the directive to perform its job. These files can be uploaded either
    from the local host or from a remote host via a remote transfer process such as
    secure copy.


    ![image](images/sq.jpg) **Note** If uploading from the local filesystem, the file
    size limitation is 25MB. If uploading from a remote filesystem, the Save and Upload
    action will submit a file transfer to move the remote files to the upload location.


    To add files in the Specify Source location, you need to click the `Add` button.
    This opens the dialog box for selecting and adding a file (see [Figure 6-27](#9781430249382_Ch06.xhtml#Fig27)).
    Select the file you would like to add, provide the name for the file, and click
    `OK`. By default, the name of the file is added to the Name text box.


    ![9781430249382_Fig06-27.jpg](images/9781430249382_Fig06-27.jpg)

    [Figure 6-27](#9781430249382_Ch06.xhtml#_Fig27). Adding a file to the directive


    After you click `OK`, the file is added to the Specify Source section of the Select
    Files page, shown in [Figure 6-28](#9781430249382_Ch06.xhtml#Fig28). Notice that
    the name, size, and mime type are listed for the file. If there is more than one
    file for this directive, a drop-down box enables you to select the main file.
    In this example, you are using only one file; by default, that will be the main
    file. Click `Next` to complete the creation of the directive.


    ![9781430249382_Fig06-28.jpg](images/9781430249382_Fig06-28.jpg)

    [Figure 6-28](#9781430249382_Ch06.xhtml#_Fig28). Specifying source files


    When the directive is complete, the wizard drops you back in the Software Library
    with a confirmation message stating that the creation was successful. At this
    point, you will be able to find the directive you created. [Figure 6-29](#9781430249382_Ch06.xhtml#Fig29)
    displays the confirmation message.


    ![9781430249382_Fig06-29.jpg](images/9781430249382_Fig06-29.jpg)

    [Figure 6-29](#9781430249382_Ch06.xhtml#_Fig29). Completion of a new directive


    After the directive is completed, it is like any other entity in the Software
    Library. It can be viewed, edited, or deleted by the owner who created it or by
    a Super Administrator.


    ## Maintaining Entities in the Software Library


    As with any software, maintenance tasks need to be attended to. The entities in
    the Software Library are no exception. We have discussed how to create and add
    both a generic entity and a directive entity. Now you’re ready to learn about
    maintaining the entities.


    Many maintenance tasks on entities can be performed from the Software Library.
    We do not go into depth on these here. More information on these tasks can be
    found in the Oracle documentation; this section provides only a listing of items
    that can be accomplished.'
