  raw: 'The NAME of the CollectionItem in [Listing 10-21](#9781430249382_Ch10.xhtml#list21)
    must match the SNAP_TYPE attribute of the METADATA element from [Listing 10-19](#9781430249382_Ch10.xhtml#list19).
    The CollectionItem attribute also must be marked as a configuration collection
    with the CONFIG="TRUE" attribute. Setting the OFFSET_TYPE attribute to incremental
    is not critical, as it just means that the interval is counted from the end of
    the last collection rather than between collection start times. For quickly executing
    collections, that makes no difference. A collection item must include all configuration
    metrics defined in [Listing 10-20](#9781430249382_Ch10.xhtml#list20), each matching
    to a table defined in [Listing 10-19](#9781430249382_Ch10.xhtml#list19).


    Assuming that the ECM metadata is at the correct location in the staging area,
    it will be automatically included in the plug-in archive during packaging. Note
    that if you are tweaking ECM metadata without changing other components, you can
    normally upload only the ECM metadata by using MRS just as you can for reports.
    MRS is, again, described at the end of the chapter.


    You can find the complete documentation on ECM in [Chapter 6](#9781430249382_Ch06.xhtml)
    of the *Extensibility Programmer''s Reference*. There you can see, for example,
    how to define indexes on ECM table columns and how to create dependencies between
    configuration items. Note that unless you are translating ECM captions into other
    languages, you can ignore the instructions for generating a .dlf file that’s placed
    in <STAGE>/oms/rsc/ecm. (The documentation refers to nonexisting generate_ecm_resources
    utilities, but the .dlf file itself can be generated by using empdk generate_metadata_resource
    -service LiveSnapshotRegistration .)


    If ECM is defined correctly and configurtion metrics collected, you can navigate
    via the target’s menu to Configuration ![arrow](images/arrow.jpg) Last Collected
    and see the latest configuration collected, as shown in [Figure 10-12](#9781430249382_Ch10.xhtml#Fig12).
    If you need to troubleshoot the configuration information collection, the agent’s
    Metric Browser covered earlier in this chapter is a huge help. [Chapter 6](#9781430249382_Ch06.xhtml)
    of the *Extensibility Programmer’s Reference* contains useful troubleshooting
    recommendations as well.


    ![9781430249382_Fig10-12.jpg](images/9781430249382_Fig10-12.jpg)


    [Figure 10-12](#9781430249382_Ch10.xhtml#_Fig12). Configuration information in
    the EM12c console


    Although defining configuration metrics looks a bit cumbersome, it becomes reasonably
    clear once you get the hang of it. The good news is that all configuration management
    features are immediately available, just as for standard Oracle targets, but without
    any change management licensing options. These features include configuration
    comparison between different targets or comparison with a saved configuration
    as well as tracking configuration changes over time.


    More-Advanced Features


    You’ve gone through the basic plug-in features as well as some of the advanced
    features such configuration management, and there are more available. Armed with
    this basic knowledge and the practical skills you gained by playing with the provided
    sample, you can consult the documentation for more-advanced features available
    to you as a plug-in developer. Note that if the documentation is not clear (and
    you will notice that on several occasions), you can also consult the existing
    sample plug-ins provided with the EDK, Oracle’s own out-of-the-box plug-ins, as
    well as the XML Schema definitions in the additional documentation coming as part
    of the EDK.


    The following list briefly introduces the features not covered in this chapter
    and the functionality they provide:


    *   *Job Types*: Plug-in developers can extend the EM12c job system by defining
    new job types. The job system is flexible and allows specifying rules how job
    parameters are defined, which credential should be used, how to control access
    to jobs, and how to serialize jobs. Job types are defined in the oracle.samples.xsh2
    plug-in.

    *   *Credentials*: Credentials are needed to support the jobs framework as well
    as to provide a secure alternative to defining passwords and passing to fetchlets
    in a more secure way than via instance properties. (Remember that command lines
    and environment variable content is not protected from other users.) While credentials
    are already defined in the oracle.samples.xsh1 plug-in, they are not used until
    oracle.samples.xsh2, so use this plug-in to study Credentials examples.

    *   *Derived Associations*: The EM12c Extensibility framework provides a mean
    to define dependencies and other relations between target types, either by using
    one of the predefined associations (such as deployed_on, provided_by, or cluster_contains),
    or by defining new associations. This provides EM12c with the topology of a complex
    system, such as a cluster database or a web farm in which multiple monitored components
    are interconnected. Associations are usually implemented along with configuration
    management to ensure that a system topology is defined and configuration of the
    complete system can be managed. Derived associations are defined in the oracle.samples.xsh2
    example plug-in.

    *   *Target Discovery*: Plug-in developers can enable automatic and guided discovery
    modes in addition to manual targets addition process where EM12c users must configure
    a target instance from scratch. This involves defining special discovery rules
    and scripts generally implemented in Java or Perl. Use the oracle.samples.xsh3
    plug-in to study an example discovery implementation.

    *   *Compliance Standards*: This feature allows you to define compliance rules.
    The rules can be based on either the existing metrics and configuration collections
    in the repository (SQL or PL/SQL based) or on the real-time collection targeted
    toward files, users, processes, database objects, a Windows Registry entry, or
    an Active Directory entity. The rules are organized hierarchically into compliance
    standards, and then compliance frameworks are defined based on those standards.
    Extensive examples of defining compliance standards are in [Chapter 12](#9781430249382_Ch12.xhtml)
    of the *Extensibility Programmer''s Reference*. A Compliance Standards example
    implementation is in plug-in oracle.samples.xsh3.

    *   *Management User Interface*: This is probably the most exciting new capability
    of EM12c Extensibility, allowing plug-in developers to create a completely custom
    user interface and to control the user experience. The custom user interface not
    only lets plug-in developers control how collected metrics and configuration information
    is displayed, but also gives full capabilities for an interactive user interface,
    including performing administrative actions such as starting and stopping components,
    killing sessions or users, creating target resources, and pretty much any other
    action that an administrator might need to perform. There are two ways to create
    a custom user interface. The easier but more limited method is to use the metadata-based
    management interface for defining pages, screen layout, and actions purely declaratively
    via XML constructs. While it’s a huge step compared to 10g and 11g, limited interactive
    features are available. The more complex method is to use the Adobe Flex-based
    framework, which gives complete control over the user experience and full interactive
    capabilities, as well as allows you to package custom UI components with the plug-in.
    A metadata-based declarative UI is implemented in oracle.samples.xsh2\. A Flex-based
    UI is implemented in oracle.samples.xsh3. However, there is only a prebuild Flex
    component, and I couldn’t locate it in the sources.'
