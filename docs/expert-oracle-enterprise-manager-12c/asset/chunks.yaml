    \ 代理\n      -- 如果在最大性能模式下运行，并且故障转移时可能存在数据丢失风险，则需要此步骤\n      -- 如果需要，请取消下面代码块的注释\n\
    \      -- begin\n      --  `SYSMAN.setemusercontext('SYSMAN', SYSMAN.MGMT_USER.OP_SET_IDENTIFIER)`;\n\
    \      --  `SYSMAN.emd_maintenance.full_repository_resync('AUTO-FAILOVER to '||\n\
    \          `v_db_unique_name`||'- '||systimestamp, true);\n      --  `SYSMAN.setemusercontext('SYSMAN',\
    \ SYSMAN.MGMT_USER.OP_CLEAR_IDENTIFIER)`;\n      -- end;\n\n-- 启动 EM 中层服务\n  \
    \    `dbms_scheduler.create_job`(\n          `job_name`=>'START_EM',\n       \
    \   `job_type`=>'executable',\n          `job_action`=> '/oms_swlib/em/failover/'\
    \ || `v_db_unique_name`|| '_start_oms.sh',\n          `enabled`=>TRUE\n      );\n\
    \    end if;\nEXCEPTION\nWHEN OTHERS\nTHEN\n    `SYSMAN.mgmt_log.log_error`('LOGGING',\
    \ `SYSMAN.MGMT_GLOBAL.UNEXPECTED_ERR`,\n`SYSMAN.MGMT_GLOBAL.UNEXPECTED_ERR_M`\
    \ || 'EM_FAILOVER: ' ||`SQLERRM`);\nEND;\n/\n```\n\n# 总结\n\n本章介绍了企业管理系统云控制（Enterprise\
    \ Manager Cloud Control）的主要组件——`Oracle 管理服务`、`Oracle 管理存储库`、`Oracle 管理代理`以及`软件库`——这些组件都需要配置为高可用性。每个组件都需要通过不同的方法进行保护。\n\
    \n存储库数据库的高可用性需要使用数据库的高可用性特性，包括`ASM`、`RAC`和`数据守护`。每种特性都应在适当的时候使用 Oracle 推荐的最佳实践进行配置。`RAC`提供了可扩展性，并能在单个主机故障时实现无缝故障转移。`数据守护`则能在主机和存储发生故障时提供保护，在角色切换期间实现最短的停机时间（通常少于一分钟）。在最具可配置性的形态下，存储库数据库部署在`RAC`数据库上，并使用`数据守护`配置了一个本地的`RAC`物理备用库。一个具有相同配置的备用站点也可用于在主站点丢失时提供服务。\n\
    \n`Oracle 管理服务`可以使用多种技术来实现高可用性，每种技术在成本和复杂性上有所不同。最简单的技术涉及将`OMS`主机与存储库主机分离。您还了解了主动/被动或冷故障转移解决方案，其中多个主机在共享文件系统上共享单个`OMS`，但在任何给定时间点只有一个处于活动状态。这利用了`VIP`的概念，以便在集群中一个主机丢失时进行故障转移。需要手动进行故障转移，并且在`OMS`在另一台主机上重新启动时会出现一些停机时间。下一个层级是在负载均衡器后面设置多个管理服务。这可以在单个`OMS`丢失时实现无缝故障转移解决方案。在`MAA`配置中，备用站点的配置与主站点类似。这显然成本最高。然而，它不仅提供单站点可用性，还能抵御灾难。\n\
    \n管理代理通过在软件库中配置参考镜像来实现高可用性。这使得使用部署过程更容易恢复代理。\n\n高可用性架构的一个关键方面是其备份和恢复策略。企业管理系统云控制中的每个组件都应在适当的时候遵循推荐的最佳实践，以确保可恢复性，满足业务的恢复点和恢复时间目标，从而将对业务的影响降至最低。\n\
    \n除了本章讨论的四个高可用性级别外，其他技术解决方案也可以提供不同级别的高可用性。这些包括但不限于虚拟化软件（如`Oracle VM Server`）、数据复制技术（包括`Oracle\
    \ GoldenGate`和`Oracle Streams`）以及存储级复制解决方案。解决方案的选择取决于业务需求、资源和成本。\n\n¹ `最大可用性架构\
    \ (MAA)` 是一套基于高可用性特性的 Oracle 推荐实践。这些建议基于产品开发验证和客户运行 Oracle 产品的经验。\n\n² `快速恢复区`\
    \ 在 11.2 版之前的 Oracle 数据库中被称为闪回恢复区。\n\n³ `TZ`环境变量的格式取决于您的操作系统。有关设置`TZ`变量的更多信息，请参阅您的操作系统文档。\n\
    \n⁴ 回切的默认值设置为 0，这意味着`VIP`及其依赖资源在原始节点再次可用后不会自动回切。\n\n⁵ `Oracle Restart`是 Oracle\
    \ Database 11gR2 的单实例高可用性功能。它通过在发生故障时重新启动数据库实例、服务和监听器来提供高可用性。它还会在服务器启动时重新启动数据库组件。\n\
    \n⁶ `保护模式`指的是在主数据库故障时接受的潜在数据丢失。三种可用模式是：最大性能、最大可用性和最大保护。\n\n⁷ `Oracle RAC One Node`是\
    \ Oracle Database 11g 第 2 版中提供的一项新选件。`Oracle RAC One Node`是一个在集群中的一个节点上运行的 Oracle\
    \ `RAC`启用数据库的单实例。\n\n⁸ `rsync`是一种软件，它能够在将文件和目录从一个系统复制到另一个系统的同时，通过使用差异算法最小化数据传输。\n\
    \n# 索引\n\n![images](img/square1.jpg)  A\n\n主动/主动 `OMS`\n\n附加 `OMS`\n\n`管理服务`部署过程\n\
    \n选项\n\n`Oracle 管理服务`先决条件检查\n\n创建后步骤\n\n过程活动\n\n过程库访问\n\n复查\n\n选择目标\n\n目标\n\n\
    代理与用户连接\n\n管理服务器安装\n\n要求\n\n服务器负载均衡器配置\n\n主动/被动 `OMS`\n\n`数据守护`\n\n管理选项\n\n`数据守护代理`\n\
    \n`最大可用性`保护模式\n\n保护模式\n\n状态\n\n示例\n\n先决条件\n\n将 `VIP` 重新定位到另一台主机\n\n备用数据库\n\n备份选项\n\
    \n配置\n\n`数据守护`作业创建\n\n文件位置\n"
