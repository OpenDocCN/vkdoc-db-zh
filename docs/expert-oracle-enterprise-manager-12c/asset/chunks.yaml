    ## Job Creation


    The job creation interface has remained similar to previous versions of Enterprise
    Manager. However, because of the interface’s complexity, this section provides
    a clear example of job creation. In this example, we will create a simple security
    job that will check on who has privileges to the `DBA_*` views.


    From the Job Activity menu, click the `Create Job` drop-down menu and select `Security
    Rule Configuration`. Then click `Go` (see [Figure 11-17](#9781430249382_Ch11.xhtml#Fig17)).


    ![9781430249382_Fig11-17.jpg](images/9781430249382_Fig11-17.jpg)


    [Figure 11-17](#9781430249382_Ch11.xhtml#_Fig17). Starting the job creation


    This opens the job creation page. Starting with the `General` tab, fill in the
    name and a description (if desired). Then select a target type (for this example,
    choose `Database Instance`) and click `Add` to choose a database target.


    After the target is selected in the `Add Target` window, you return to the main
    screen, which now displays information similar to that in [Figure 11-18](#9781430249382_Ch11.xhtml#Fig18).


    ![9781430249382_Fig11-18.jpg](images/9781430249382_Fig11-18.jpg)


    [Figure 11-18](#9781430249382_Ch11.xhtml#_Fig18). The `General` tab configured
    for a new job


    You now have successfully filled out the `General` tab and can move on to the
    `Parameters` tab.


    Choose the `Access to DBA_* Views` option from the `Security Rule` drop-down list.
    For the maximum number of rows to be returned, enter `All` (see [Figure 11-19](#9781430249382_Ch11.xhtml#Fig19)).


    ![9781430249382_Fig11-19.jpg](images/9781430249382_Fig11-19.jpg)


    [Figure 11-19](#9781430249382_Ch11.xhtml#_Fig19). Parameter settings to check
    access to `DBA_*` views


    Next, click the `Credentials` tab. For this example, `Named` is selected for the
    `Credential` option (see [Figure 11-20](#9781430249382_Ch11.xhtml#Fig20)). We
    will fill out the details to give a clear understanding of the interface, but
    it is always preferable to have Preferred Credentials set up beforehand for ease
    of management.


    ![9781430249382_Fig11-20.jpg](images/9781430249382_Fig11-20.jpg)


    [Figure 11-20](#9781430249382_Ch11.xhtml#_Fig20). Credential settings for a job
    creation


    When you are finished with credentials, move on to the `Schedule` tab. [Figure
    11-21](#9781430249382_Ch11.xhtml#Fig21) shows a schedule set to send the report
    each Monday at 9:30AM and to never expire or to have an end-date grace period.


    ![9781430249382_Fig11-21.jpg](images/9781430249382_Fig11-21.jpg)


    [Figure 11-21](#9781430249382_Ch11.xhtml#_Fig21). Setting up the scheduling for
    the new job


    Next you have the option to set each of the administrators (outside of the owner)
    to view or manage the job, as shown in [Figure 11-22](#9781430249382_Ch11.xhtml#Fig22).
    The administrators can also be removed from the access list by placing a check
    mark in the box under the `Remove` column (which is not shown in [Figure 11-22](#9781430249382_Ch11.xhtml#Fig22),
    but is at the far right).


    ![9781430249382_Fig11-22.jpg](images/9781430249382_Fig11-22.jpg)


    [Figure 11-22](#9781430249382_Ch11.xhtml#_Fig22). Who has access and what notifications
    will be sent


    Below the `Security Rule Configuration` section is the `E-Mail Notification` section.
    Here you choose the following notification options:


    *   `Scheduled`: The job is scheduled to run.

    *   `Running`: The job is executing.

    *   `Suspended`: The job has been suspended from running.

    *   `Succeeded`: The job has completed successfully.

    *   `Problems`: The job has encountered failures or problems in a step or overall.

    *   `Action Required`: Intervention by an administrator is required. This includes
    jobs with a status of skipped.


    Because the job is owned by the user `KPOTVIN`, any e-mail addresses identified
    with that user and configured in the EM console will receive notifications according
    to the settings. This user also has the ability to view, manage, and monitor the
    job.


    ## Types of Jobs


    The Enterprise Manager has extended its support of job types in version 12c. Although
    `OS Command`, `SQL Script`, and `RMAN` may be prevalent, dozens of jobs are now
    supported by the EM Job environment:'
