    ![9781430249382_Fig11-23.jpg](images/9781430249382_Fig11-23.jpg)


    [Figure 11-23](#9781430249382_Ch11.xhtml#_Fig23). Results in job type information,
    showing some of the specific job types available to the system


    Effective Monitoring and Job Status


    The status of any given job running in the EM Job System is extremely important,
    as notifications and alerts are based on this status. Because a job may contain
    more than one step, the status changes as each step is executed, and events can
    be triggered to alert administrators to the different statuses of the job run.
    This job status can be monitored, alerted, and managed through job events.


    Job events return the reporting status and alert the responsible party. You can
    set these up manually, as job events are not enabled by default. This is done
    so as not to overload the system with event monitoring.


    Job events are as follows:


    *   *All*: Report on all statuses of any job.

    *   *Scheduled*: The job has been scheduled to run.

    *   *Action Required*: An administrator is required for the job to run to completion.
    This includes jobs that are skipped because of a scheduled blackout.

    *   *Suspended*: The job has been suspended and therefore is unable to execute
    its regular schedule.

    *   *Succeeded*: The job has executed successfully.

    *   *Problems*: A failure has occurred in one or more job steps.


    Job events can be configured via the Job Events Generation Criteria page. You
    access this page from the EM console by choosing Setup ![arrow](images/arrow.jpg)  Incidents
    ![arrow](images/arrow.jpg) Job Events, as shown in [Figure 11-24](#9781430249382_Ch11.xhtml#Fig24).
    The Step 1 page appears, shown in [Figure 11-25](#9781430249382_Ch11.xhtml#Fig25).
    Here you can decide which events by default will send alert notifications, and
    these can be narrowed down by target or group.


    ![9781430249382_Fig11-24.jpg](images/9781430249382_Fig11-24.jpg)


    [Figure 11-24](#9781430249382_Ch11.xhtml#_Fig24). Reaching the Job Events feature
    from the Setup menu in the EM console


    ![9781430249382_Fig11-25.jpg](images/9781430249382_Fig11-25.jpg)


    [Figure 11-25](#9781430249382_Ch11.xhtml#_Fig25). Setting up default options for
    alerting and notifications on all jobs in an EM12c environment


    Some administrators choose to be notified of job run successes (Succeeded). Based
    on my professional experience, I recommend not configuring jobs to perform this
    notification. The largest amount of time spent by an administrator on alerts is
    caused not by too little monitoring, but too much. If Enterprise Manager is configured
    to  include emailed “success” notifications, you become accustomed to receiving
    them, knowing that they do not require response, and this may result in critical
    issue notifications missed.


    For those administrators who want to shut off individual success messages and
    simply report  these andjob failures once a day, a secondary job can be set up
    to report and eliminate unnecessary inividual notifications.


    ```

    select mj.job_id, mj.job_name, mjes.start_time, mjes.end_time,

    mjes.status_detail, mjes.retried

    from sysman.mgmt_job mj, sysman.mgmt_job_exec_summary mjes

    where mj.job_id=mjes.job_id

    and mjes.start_time >= sysdate-1

    and mj.job_status!=0

    and mj.expired=0;


    JOB_ID'
