- fmt: '[Figure 9-1](#9781430249382_Ch09.xhtml#_Fig1). The management pack and licensing
    information for any EM12c page or feature is readily available from the `Setup`
    menu in the console.


    ![image](images/sq.jpg) **Tip** Administrators can gain access to any management
    packs used for any EM12c feature within a console page by clicking `Setup` ![arrow](images/arrow.jpg)
    `Management Packs` ![arrow](images/arrow.jpg) `Packs for This Page`.


    With licensing out of the way, you can focus on performance data and the many
    options available through the EM12c console. The most common interface utilized
    for performance data is at a target level, often involving a single instance or
    cluster database.


    ## Host Performance


    A host target’s performance information can be accessed from the EM console page
    by choosing `Targets` ![arrow](images/arrow.jpg) `Hosts` and then selecting the
    desired host. You can inspect basic performance metrics such as CPU utilization,
    memory utilization, filesystem usage, and network utilization, as shown in [Figure
    9-2](#9781430249382_Ch09.xhtml#Fig2).


    ![9781430249382_Fig09-02.jpg](images/9781430249382_Fig09-02.jpg)


    [Figure 9-2](#9781430249382_Ch09.xhtml#_Fig2). Host performance information—note
    the spike in network utilization after 1:44 PM in the bottom-right graph.


    In the left pane, you can view full summary information regarding the host status,
    incidents, configuration, and job activity.


    Any fluctuations in CPU usage and memory are displayed, along with filesystem
    usage and network utilization. For each of the four areas (CPU, Memory, Filesystem,
    and Network), you can also view the data in a table format, as shown in [Figure
    9-3](#9781430249382_Ch09.xhtml#Fig3). To access this format, you click the `Table
    View` link at the bottom right of any graph. The tabular representation can be
    inspected for out-of-the-ordinary values that may not show as clearly in a graphic
    interface, or the data can be copied and pasted to a CSV or Microsoft Excel file.


    ![9781430249382_Fig09-03.jpg](images/9781430249382_Fig09-03.jpg)


    [Figure 9-3](#9781430249382_Ch09.xhtml#_Fig3). Tabular display of performance
    metric charts in the host performance page.


    Each of these panes can be adjusted to display in any order you choose. Simply
    right-click the `View Actions` menu at the top right of each window to organize
    the performance summary view to your preference.


    ## Performance Home


    The database performance home offers a compact view of runnable processes, by
    CPU, including any baselines that are included for an individual database target.
    The performance home can be accessed in various ways, depending on the home page
    chosen by the administrator/user, but is always available once logged into EM12c
    by clicking `Targets` ![arrow](images/arrow.jpg) `Databases` and choosing a database.
    The `Performance` tab is the second from the left in the EM console database controls
    for the database home page (see [Figure 9-4](#9781430249382_Ch09.xhtml#Fig4))
    and includes options for viewing, diagnosing, and inspecting database performance.


    ![9781430249382_Fig09-04.jpg](images/9781430249382_Fig09-04.jpg)


    [Figure 9-4](#9781430249382_Ch09.xhtml#_Fig4). CPU usage across a database server
    in an Oracle 11g environment, currently set to 15-second refresh intervals, but
    demonstrating how to change to extended update intervals.


    The performance home, unlike the `Top Activity` performance page, is a summary
    of the database performance and is not specific to database performance, but overall
    performance of the database environment, including host and system info.


    ![image](images/sq.jpg) **Tip** Historical data from this section will be based
    on CPU data only. If you want more-specific data on database usage, you must go
    to `Top Activity`. For less-aggregated data, refer to `ASH Analytics`, which is
    discussed later in this chapter.


    The performance home grid data can be viewed and refreshed in 15-second intervals,
    1-minute intervals, or manually, or you can choose a historical view. Baselines
    can be included or excluded in the graph, along with load averages. Options to
    run `JVM Diagnostics`, `ADDM`, or `ASH` reports are available from this section.


    The main area is broken down into high-level database wait information. This view
    displays information about not just CPU usage, but CPU usage outside the database
    and the system load average.


    By clicking the `Settings` button, shown in the upper right of [Figure 9-4](#9781430249382_Ch09.xhtml#Fig4),
    you can change the chart default settings from CPU based to display I/O chart
    information or baseline values (see [Figure 9-5](#9781430249382_Ch09.xhtml#Fig5)).


    ![9781430249382_Fig09-05.jpg](images/9781430249382_Fig09-05.jpg)


    [Figure 9-5](#9781430249382_Ch09.xhtml#_Fig5). Changing the default performance
    home chart settings.


    In [Figure 9-6](#9781430249382_Ch09.xhtml#Fig6), the administrator has switched
    from high-level summary performance information to detailed performance information
    (not to be confused with `ASH`). This view can either display the foreground sessions
    only or include background sessions. At times, having the ability to display only
    foreground or background wait information is very valuable.


    ![9781430249382_Fig09-06.jpg](images/9781430249382_Fig09-06.jpg)


    [Figure 9-6](#9781430249382_Ch09.xhtml#_Fig6). The `Average Active Sessions` pane
    of the performance home page in EM12c, demonstrating an average load involving
    both CPU and some I/O waits.


    ![image](images/sq.jpg) **Tip** When diagnosing performance issues, inspecting
    just the foreground sessions and then inspecting both foreground and background
    sessions can help distinguish problems such as poor ETL batch load design or an
    issue with cursors not being closed correctly.


    From the `Average Active Sessions` pane, you can quickly assess the performance
    statistics of the database. By clicking one of the links at the bottom of the
    main page, you can access the `Top Activity` page to perform a more detailed investigation.


    Links can include the following:


    *   `Top Segments`

    *   `Cluster Cache Coherency` (in RAC)

    *   `Interconnects` (in RAC)

    *   `Parallel Execution`

    *   `Database Locks`

    *   `SQL Monitoring`

    *   `Top Consumers`

    *   `Top Activity`

    *   `Duplicate SQL`

    *   `Instance Activity` (in RAC)


    ### Throughput


    The `Throughput` tab shows throughput per second or per transaction. It has additional
    monitoring links to `Top Consumers`, `Duplicate SQL`, `Instance Locks`, `Instance
    Activity`, and `SQL Response Time`. These tabs relink back to `Top Activity`,
    locking pages, and information pages outside the `Top Activity` area.


    ### I/O


    The `I/O` tab has graphs for I/O latency in milliseconds and I/O in megabytes
    per second by I/O Function, Type, or Consumer Group (see [Figure 9-7](#9781430249382_Ch09.xhtml#Fig7)).
    There is a button to take you through a graphical interface to quickly perform
    I/O calibration (`DBMS_RESOURCE_MANAGER.CALIBRATE_IO`), needed if the database
    is going to utilize `Auto DOP` (degree of parallelism).


    ![9781430249382_Fig09-07.jpg](images/9781430249382_Fig09-07.jpg)


    [Figure 9-7](#9781430249382_Ch09.xhtml#_Fig7). I/O in megabytes during a data
    pump operation from the performance home page.


    ### Parallel Execution


    The `Parallel Execution` tab, shown in [Figure 9-8](#9781430249382_Ch09.xhtml#Fig8),
    shows pertinent information regarding active serial/parallel sessions. In addition,
    a second graph shows the coordinator and slave sessions for each parallel execution,
    and a third graph shows DDL, DML, and queries parallelized in the database environment.


    ![9781430249382_Fig09-08.jpg](images/9781430249382_Fig09-08.jpg)


    [Figure 9-8](#9781430249382_Ch09.xhtml#_Fig8). An example of parallel execution
    shown from the performance home, detailing parallel usage from many levels.


    ### Services'
  raw: '[Figure 9-1](#9781430249382_Ch09.xhtml#_Fig1). The management pack and licensing
    information for any EM12c page or feature is readily available from the Setup
    menu in the console


    ![image](images/sq.jpg) **Tip**  Administrators can gain access to any management
    packs used for any EM12c feature within a console page by clicking Setup ![arrow](images/arrow.jpg)
    Management Packs ![arrow](images/arrow.jpg) Packs for This Page.


    With licensing out of the way, you can focus on performance data and the many
    options available through the EM12c console. The most common interface utilized
    for performance data is at a target level, often involving a single instance or
    cluster database.


    Host Performance


    A host target’s performance information can be accessed from the EM console page
    by choosing Targets ![arrow](images/arrow.jpg) Hosts and then selecting the desired
    host. You can inspect basic performance metrics such as CPU utilization, memory
    utilization, filesystem usage, and network utilization, as shown in [Figure 9-2](#9781430249382_Ch09.xhtml#Fig2).


    ![9781430249382_Fig09-02.jpg](images/9781430249382_Fig09-02.jpg)


    [Figure 9-2](#9781430249382_Ch09.xhtml#_Fig2). Host performance information—note
    the spike in network utilization after 1:44 PM in the bottom-right graph


    In the left pane, you can view full summary information regarding the host status,
    incidents, configuration, and job activity.


    Any fluctuations in CPU usage and memory are displayed, along with filesystem
    usage and network utilization. For each of the four areas (CPU, Memory, Filesystem,
    and Network), you can also view the data in a table format, as shown in [Figure
    9-3](#9781430249382_Ch09.xhtml#Fig3). To access this format, you click the Table
    View link at the bottom right of any graph. The tabular representation can be
    inspected for out-of-the-ordinary values that may not show as clearly in a graphic
    interface, or the data can be copied and pasted to a CSV or Microsoft Excel file.


    ![9781430249382_Fig09-03.jpg](images/9781430249382_Fig09-03.jpg)


    [Figure 9-3](#9781430249382_Ch09.xhtml#_Fig3). Tabular display of performance
    metric charts in the host performance page


    Each of these panes can be adjusted to display in any order you choose. Simply
    right-click the View Actions menu at the top right of each window to organize
    the performance summary view to your preference.


    Performance Home


    The database performance home offers a compact view of runnable processes, by
    CPU, including any baselines that are included for an individual database target.
    The performance home can be accessed in various ways, depending on the home page
    chosen by the administrator/user, but is always available once logged into EM12c
    by clicking Targets ![arrow](images/arrow.jpg) Databases and choosing a database.
    The Performance tab is the second from the left in the EM console database controls
    for the database home page (see [Figure 9-4](#9781430249382_Ch09.xhtml#Fig4))
    and includes options for viewing, diagnosing, and inspecting database performance.


    ![9781430249382_Fig09-04.jpg](images/9781430249382_Fig09-04.jpg)


    [Figure 9-4](#9781430249382_Ch09.xhtml#_Fig4). CPU usage across a database server
    in an Oracle 11g environment, currently set to 15-second refresh intervals, but
    demonstrating how to change to extended update intervals


    The performance home, unlike the Top Activity performance page, is a summary of
    the database performance and is not specific to database performance, but overall
    performance of the database environment, including host and system info.


    ![image](images/sq.jpg) **Tip**  Historical data from this section will be based
    on CPU data only. If you want more-specific data on database usage, you must go
    to Top Activity. For less-aggregated data, refer to ASH Analytics, which is discussed
    later in this chapter.


    The performance home grid data can be viewed and refreshed in 15-second intervals,
    1-minute intervals, or manually, or you can choose a historical view. Baselines
    can be included or excluded in the graph, along with load averages. Options to
    run JVM Diagnostics, ADDM, or ASH reports are available from this section.


    The main area is broken down into high-level database wait information. This view
    displays information about not just CPU usage, but CPU usage outside the database
    and the system load average.


    By clicking the Settings button, shown in the upper right of [Figure 9-4](#9781430249382_Ch09.xhtml#Fig4),
    you can change the chart default settings from CPU based to display I/O chart
    information or baseline values (see [Figure 9-5](#9781430249382_Ch09.xhtml#Fig5)).


    ![9781430249382_Fig09-05.jpg](images/9781430249382_Fig09-05.jpg)


    [Figure 9-5](#9781430249382_Ch09.xhtml#_Fig5). Changing the default performance
    home chart settings


    In [Figure 9-6](#9781430249382_Ch09.xhtml#Fig6), the administrator has switched
    from high-level summary performance information to detailed performance information
    (not to be confused with ASH). This view can either display the foreground sessions
    only or include background sessions. At times, having the ability to display only
    foreground or background wait information is very valuable.


    ![9781430249382_Fig09-06.jpg](images/9781430249382_Fig09-06.jpg)


    [Figure 9-6](#9781430249382_Ch09.xhtml#_Fig6). The Average Active Sessions pane
    of the performance home page in EM12c, demonstrating an average load involving
    both CPU and some I/O waits


    ![image](images/sq.jpg) **Tip**  When diagnosing performance issues, inspecting
    just the foreground sessions and then inspecting both ­foreground and background
    sessions can help distinguish problems such as poor ETL batch load design or an
    issue with cursors not being closed correctly.


    From the Average Active Sessions pane, you can quickly assess the performance
    statistics of the database. By clicking one of the links at the bottom of the
    main page, you can access the Top Activity page to perform a more detailed investigation.


    Links can include the following:


    *   Top Segments

    *   Cluster Cache Coherency (in RAC)

    *   Interconnects (in RAC)

    *   Parallel Execution

    *   Database Locks

    *   SQL Monitoring

    *   Top Consumers

    *   Top Activity

    *   Duplicate SQL

    *   Instance Activity (in RAC)


    Throughput


    The Throughput tab shows throughput per second or per transaction. It has additional
    monitoring links to Top Consumers, Duplicate SQL, Instance Locks, Instance Activity,
    and SQL Response Time. These tabs relink back to Top Activity, locking pages,
    and information pages outside the Top Activity area.


    I/O


    The I/O tab has graphs for I/O latency in milliseconds and I/O in megabytes per
    second by I/O Function, Type, or Consumer Group (see [Figure 9-7](#9781430249382_Ch09.xhtml#Fig7)).
    There is a button to take you through a graphical interface to quickly perform
    I/O calibration (DBMS_RESOURCE_MANAGER.CALIBRATE_IO), needed if the database is
    going to utilize Auto DOP (degree of parallelism).


    ![9781430249382_Fig09-07.jpg](images/9781430249382_Fig09-07.jpg)


    [Figure 9-7](#9781430249382_Ch09.xhtml#_Fig7). I/O in megabytes during a data
    pump operation from the performance home page


    Parallel Execution


    The Parallel Execution tab, shown in [Figure 9-8](#9781430249382_Ch09.xhtml#Fig8),
    shows pertinent information regarding active serial/parallel sessions. In addition,
    a second graph shows the coordinator and slave sessions for each parallel execution,
    and a third graph shows DDL, DML, and queries parallelized in the database environment.


    ![9781430249382_Fig09-08.jpg](images/9781430249382_Fig09-08.jpg)


    [Figure 9-8](#9781430249382_Ch09.xhtml#_Fig8). An example of parallel execution
    shown from the performance home, detailing parallel usage from many levels


