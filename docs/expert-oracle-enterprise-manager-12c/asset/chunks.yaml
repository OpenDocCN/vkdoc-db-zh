  trans: '

    每当 Oracle 产品发布新版本时，某些项目就会停止支持。Exadata 数据库机器有一些已停止支持的硬件组件。以下硬件配置已随 `Oracle Enterprise
    Manager 12c` 或 `12c Bundle Pack 1 (BP1)` 停止支持：


    *   `V1` 硬件

    *   `超级集群`

    *   `扩展机架`

    *   `多机架 Exadata 数据库机器`


    ![image](img/sq.jpg) **注意** 在 `Exadata 插件` 的 `12.1.0.1` 和 `12.1.0.2` 版本中，不支持将计算节点的客户端网络主机名用作
    `Oracle Enterprise Manager` 目标名称。此功能在 `12.1.0.3` 插件中得到支持。


    随着技术的发展，硬件标准会发生变化，并提供执行任务的新方法。专用系统，特别是 `Oracle Exadata 数据库机器`，很容易受到这些变化的影响。`EM12c`
    的插件架构设计为不仅适用于软件堆栈，也适用于硬件堆栈。展望未来，此插件架构将允许对现有的专用系统和未来发布的硬件进行变更。


    ## 规划与设置阶段


    当 `Oracle Exadata 数据库机器` 抵达现场并适应周围环境后，就可以对其进行网络配置。接下来的任务是使用 `EM12c` 为该机器设置监控。


    ![image](img/sq.jpg) **注意** `Oracle Exadata 数据库机器` 是一件复杂的企业级基础设施。其紧凑的设计使其如果未适应环境，则容易产生冷凝水。我们建议在通电配置前，让其在现场放置
    48 至 72 小时。


    尽管 `EM12c` 可以开箱即用地监控 `Exadata`，但在将应用程序部署到 `Exadata` 并使用其功能之前，您仍然需要规划和配置监控。通常，为配置
    `Exadata` 以进行主动监控，需执行以下步骤：


    1.  将管理代理安装到计算节点。

    2.  启动 `自动发现`。

    3.  指定组件凭证。

    4.  审查配置并完成设置。


    按照这些简单的步骤发现 `Oracle Exadata 数据库机器` 组件后，配置可在几分钟内完成。


    ## 安装管理代理


    与 `Oracle Enterprise Manager` 中的任何操作一样，第一步是将管理代理部署到 `Oracle Exadata` 计算节点，然后将
    `Oracle Exadata 插件` 推送到这些代理。


    ![image](img/sq.jpg) **注意** `Oracle Exadata` 监控，就像监控 `EM12c` 中的任何其他目标一样，是通过部署在管理服务器和代理上的一组插件完成的。


    图 8-2 展示了 `EM12c` 代理如何与 `Exadata 插件` 以及 `Exadata 数据库机器` 的其他组件进行交互。


    ![9781430249382_Fig08-02.jpg](img/9781430249382_Fig08-02.jpg)


    图 8-2. `Oracle Enterprise Manager 12c` 代理与 `Exadata 插件`


    将管理代理部署到计算节点的方式，与通过 `Oracle Enterprise Manager` 为任何其他主机目标部署代理的方式相同。首选方法是从 `Enterprise
    Manager` 推送代理。此过程在 第 2 章 中有更详细的讨论。


    ## 启动自动发现


    一旦管理代理和 `Exadata 插件` 部署完毕，您就可以执行目标的自动发现，以将 `Exadata` 组件纳入 `EM12c`。


    与 `EM12c` 中的许多目标类型一样，`Exadata` 有一个向导驱动的发现过程。可以通过此向导自动添加 `Exadata` 硬件。要从 `Enterprise
    Manager` 主页访问此向导，请选择 `设置` ![arrow](img/arrow.jpg) `添加目标` ![arrow](img/arrow.jpg)
    `手动添加目标`。您将进入的页面应如 图 8-3 所示。


    ![9781430249382_Fig08-03.jpg](img/9781430249382_Fig08-03.jpg)


    图 8-3. `手动添加目标` 页面


    进入 `手动添加目标` 页面后，选择添加 `非主机` 目标的单选按钮。这使您能够从下拉菜单中选择 `Oracle Exadata 数据库机器` 选项。最后，单击按钮以使用引导式发现过程。


    这将带您进入 `Oracle Exadata 数据库机器发现` 页面，如 图 8-4 所示。在这里，您可以选择添加带有相关硬件的新数据库机器，或发现新添加的硬件。选择选项后，单击
    `发现目标` 按钮。


    ![9781430249382_Fig08-04.jpg](img/9781430249382_Fig08-04.jpg)


    图 8-4. `Oracle Exadata 数据库机器发现` 页面


    ## 指定组件凭证


    单击 `发现目标` 按钮后，`EM12c` 将启动 `数据库机器发现向导`，如 图 8-5 所示。该向导将引导您完成将 `Exadata 数据库机器` 添加到
    `EM12c` 所需的十个步骤。在每个发现步骤中，系统会要求用户提供各种 `Oracle Exadata` 组件的登录凭证，例如 `Exadata 单元格`
    和 `InfiniBand 交换机`。


    ![9781430249382_Fig08-05.jpg](img/9781430249382_Fig08-05.jpg)


    图 8-5. `数据库机器发现向导`


    在您使用发现向导的过程中，在 `SNMP 订阅` 步骤（图 8-6），最好在单元格和 `InfiniBand 交换机` 目标上启用 `SNMP` 订阅。这允许管理代理自动接收来自受监控组件的
    `SNMP 陷阱`。


    ![9781430249382_Fig08-06.jpg](img/9781430249382_Fig08-06.jpg)


    图 8-6. `SNMP 订阅` 步骤


    ## 审查配置并完成设置


    最后，当向导完成时，您将进入 `审查` 屏幕，如 图 8-7 所示。在点击 `提交` 并完成发现向导之前，请核实所有信息。然后您将进入 `目标创建摘要` 页面；点击
    `确定`。这将带您进入 `目标提升` 页面，此时目标将显示为受管目标。


    ![9781430249382_Fig08-07.jpg](img/9781430249382_Fig08-07.jpg)


    图 8-7. `Exadata 数据库机器发现审查` 页面


    在 `Exadata` 监控设置完成后，`EM12c` 可以提供 `Oracle Exadata` 硬件和软件的统一视图，如 图 8-8 所示。您还可以查看其所有组件的详细视图，例如
    `InfiniBand 交换机`、`存储单元` 等。


    ![9781430249382_Fig08-08.jpg](img/9781430249382_Fig08-08.jpg)


    图 8-8. `Oracle Exadata 示意图视图`


    ![image](img/sq.jpg) **注意** 除了自动发现过程外，还有一个自动化工具包可用于帮助加速发现。该工具包通过允许一次性将代理推送到所有计算节点，简化了在每个计算节点上部署代理的过程。


    有关下载和配置自动化工具包的更多信息，可在 `My Oracle Support` 的 `文档 ID: 1440951.1` 中找到。


    您可以在 `示意图视图` 中查看每个组件的可用性信息。顶部的 `概览` 部分显示了数据库机器内所有目标的事件和可用性信息摘要。它还有显示每个组件温度的选项。`示意图视图`
    左侧的目标导航栏允许下钻到您选择的任何特定组件。示意图显示还支持查看多个使用相同 `InfiniBand 网络` 互连的 `Exadata 节点`。

