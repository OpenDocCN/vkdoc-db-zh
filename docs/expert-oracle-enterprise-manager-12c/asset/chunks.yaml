- fmt: "![image](images/sq.jpg) **Note** 你可以在《*Extensibility Programmer’s Reference*》的第20章找到关于\
    \ fetchlets 的完整描述。\n\n此外，一些 fetchlet 并未被记录（因此，不能保证在将来甚至当前版本中仍能工作）。例如，`JDBCSQL`\
    \ fetchlet 与 JDBC Timing fetchlet 不同，它允许通过 JDBC 连接到任何带有 JDBC 驱动的数据库来收集 SQL 返回的值，而不仅限于\
    \ Oracle。但是，请谨慎依赖未记录的 fetchlet，因为任何 EM12c 补丁集或补丁都可能影响这些 fetchlet 的功能或可用性，即使它们目前看起来工作正常。\n\
    \n## 计算指标列\n\n最可靠且同时最简单的收集机制是无状态的——它们返回的值仅源自被监控目标的当前状态，而不考虑之前的收集。一个典型的例子是当前活动数据库会话的数量。然而，我们经常需要计算指标相对于之前收集值的增量差异。例如，你可能希望收集累积计数器的当前值，例如自数据库实例启动以来的用户提交次数，或者如你将在主机示例中看到的，CPU核心在某种模式下工作的累积CPU\
    \ ticks数（例如在Linux中使用 `vmstat -s`）。这些累积值本身并不有用，但可以用于指示自上次收集以来的差异。\n\n让我们看一下来自 sample_host1\
    \ 目标类型的 CPU 利用率收集示例（参见 [Listing 10-15](#9781430249382_Ch10.xhtml#list15)）。\n\n\
    **[Listing 10-15](#9781430249382_Ch10.xhtml#_list15)**. 使用 `TRANSIENT` 和 `COMPUTE_EXPR`\
    \ 列\n\n```xml\n<Metric NAME=\"CPUPerf\" TYPE=\"TABLE\">\n  <TableDescriptor>\n\
    \      <ColumnDescriptor NAME=\"non_nice_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
    />\n      <ColumnDescriptor NAME=\"nice_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
    />\n      <ColumnDescriptor NAME=\"system_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
    />\n      <ColumnDescriptor NAME=\"idle_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
    />\n      <ColumnDescriptor NAME=\"io_wait_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
    />\n      <ColumnDescriptor NAME=\"irq_t\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"\
    />\n      <ColumnDescriptor NAME=\"non_nice\" TYPE=\"NUMBER\"\n              \
    \          COMPUTE_EXPR=\"100.0 * (non_nice_t - _non_nice_t)/(\n             \
    \                                   (non_nice_t - _non_nice_t) +\n           \
    \                                     (nice_t - _nice_t) +\n                 \
    \                               (system_t - _system_t) +\n                   \
    \                             (idle_t - _idle_t) +\n                         \
    \                       (io_wait_t - _io_wait_t) +\n                         \
    \                       (irq_t - _irq_t)\n                                   \
    \            )\">\n        <Display>...</Display>\n      </ColumnDescriptor>\n\
    \      <ColumnDescriptor NAME=\"nice\" TYPE=\"NUMBER\"\n                     \
    \   COMPUTE_EXPR=\"100.0 * (nice_t - _nice_t)/(\n                            \
    \                    (non_nice_t - _non_nice_t) +\n                          \
    \                      (nice_t - _nice_t) +\n                                \
    \                (system_t - _system_t) +\n                                  \
    \              (idle_t - _idle_t) +\n                                        \
    \        (io_wait_t - _io_wait_t) +\n                                        \
    \        (irq_t - _irq_t)\n                                               )\"\
    >\n      ...\n  </TableDescriptor>\n</Metric>\n```\n\n首先，你会看到前七列被标记了属性 `TRANSIENT=\"\
    TRUE\"`。这告诉代理，这些列的值实际上不会被发送到 OMS 存储到仓库中，而是被收集起来以便用于计算其他列的值。定义了 `COMPUTE_EXPR`\
    \ 属性的列，其值不是来自 fetchlet，而是使用该定义的表达式来计算值。计算表达式可以通过名称引用现有的列，并且这些被引用的列必须在 `TableDescriptor`\
    \ 中先定义，然后才能在 `COMPUTE_EXPR` 中被引用，因为列值是按从上到下的顺序依次计算的。\n\n要引用前一次收集中列的值，只需在列名前加上一个下划线符号\
    \ (`_`)。因此，如果当前值是 `nice_t`，那么前一次收集的值就是 `_nice_t`。于是，差值就是 `nice_t - _nice_t`，这表示自上次收集以来在用户模式下执行\
    \ niced 进程所花费的 CPU ticks 数。将自上次收集以来的所有 CPU ticks 相加，就得到了自上次收集以来的 CPU ticks 总数。CPU\
    \ 执行 niced 用户进程的时间百分比，就是 niced CPU ticks 与总 ticks 数的比值，通过乘以 100 归一化为百分比。这同样适用于其他所有\
    \ CPU 模式，如 system 或 idle CPU。\n\n让我们看另一个例子：计算用户回滚和提交的次数。Oracle 数据库保留了自数据库启动以来的提交和回滚计数器，但纯粹基于累积计数器的计算对于监控并不有用。有用的是两次收集间隔之间平均每秒的提交和回滚次数。因此，如果前一次提交数是在时间\
    \ `t0` 收集的 `c0`，当前收集是在 `t1` 收集的 `c1`，那么每秒提交次数就是 `(c1–c0)/(t1–t0)`。我不会在指标定义中特别引用时间戳，因为\
    \ EM12c 会隐式添加时间戳（有一种方法可以显式收集它，但很少需要）。因此，我们无法从 `COMPUTE_EXPR` 定义中访问该时间戳值。然而，我们真正需要的是时间间隔。\n\
    \n尽管你在默认收集定义中指定了间隔，但你不应该将这个值硬编码到 `COMPUTE_EXPR` 中，因为 (1) 用户可以自定义它，并且 (2) 实际间隔可能略有不同，因为配置的间隔只是一个目标值。幸运的是，EM12c\
    \ 有一个内置变量 `__interval`（注意是双下划线前缀），它返回自上次收集以来的秒数。因此，一个包含每秒提交和回滚次数的指标可能如 [Listing\
    \ 10-16](#9781430249382_Ch10.xhtml#list16) 所示。\n\n**[Listing 10-16](#9781430249382_Ch10.xhtml#_list16)**.\
    \ 在 `COMPUTE_EXPR` 列中使用 `__interval`\n\n```xml\n<Metric NAME=\"transactions_stat\"\
    \ TYPE=\"TABLE\">\n  <TableDescriptor>\n    <ColumnDescriptor NAME=\"commits\"\
    \ TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n    <ColumnDescriptor NAME=\"commits_ratio\"\
    \ TYPE=\"NUMBER\"\n                      COMPUTE_EXPR=\"(commits - _commits) /\
    \ __interval\">\n      <Display>...</Display>\n    </ColumnDescriptor>\n    <ColumnDescriptor\
    \ NAME=\"rollbacks\" TYPE=\"NUMBER\" TRANSIENT=\"TRUE\"/>\n    <ColumnDescriptor\
    \ NAME=\"rollbacks_ratio\" TYPE=\"NUMBER\"\n                      COMPUTE_EXPR=\"\
    (rollbacks - _rollbacks) / __interval\">\n      <Display>...</Display>\n    </ColumnDescriptor>\n\
    \  </TableDescriptor>\n  <QueryDescriptor>...</QueryDescriptor>\n</Metric>\n```"
  raw: '![image](images/sq.jpg) **Note**  You can find a full description of fetchlets
    in Chapter 20 of the *Extensibility Programmer’s Reference*.


    In addition, several fetchlets are not documented (and thus, are not guaranteed
    to work in the future or even current releases). For example, the JDBCSQL fetchlet,
    unlike the JDBC Timing fetchlet, allows collection of values returned by SQL via
    a JDBC connection to any database with JDBC drivers, and not just Oracle. However,
    be careful relying on undocumented fetchlets, as any EM12c patch set or patch
    might affect functionality or availability of these fetchlets even if they seem
    to work well at the moment.


    Computed Metric Columns


    The most reliable and, at the same time, simple collection mechanisms are stateless—returning
    values derived only from the current state of the monitored target and not taking
    the previous collection into account. A typical example is the current number
    of active database sessions. However, we often need to calculate an incremental
    difference of the metric from the previously collected value. For example, you
    might want to collect the current value of cumulative counters such as the number
    of user commits since database instance startup or, as you will see in the host
    example, the cumulative number of CPU ticks that the CPU core spent doing work
    in a certain mode (using vmstat -s in Linux, for example). Such cumulative values
    are not useful on their own but are useful in indicating a difference since previous
    collections.


    Let’s look at the example of CPU utilization collection from the sample_host1
    target type (see [Listing 10-15](#9781430249382_Ch10.xhtml#list15)).


    ***[Listing 10-15](#9781430249382_Ch10.xhtml#_list15)***.  Using TRANSIENT and
    COMPUTE_EXPR Columns


    ```

    <Metric NAME="CPUPerf" TYPE="TABLE">

      <TableDescriptor>

          <ColumnDescriptor NAME="non_nice_t" TYPE="NUMBER" TRANSIENT="TRUE"/>

          <ColumnDescriptor NAME="nice_t" TYPE="NUMBER" TRANSIENT="TRUE"/>

          <ColumnDescriptor NAME="system_t" TYPE="NUMBER" TRANSIENT="TRUE"/>

          <ColumnDescriptor NAME="idle_t" TYPE="NUMBER" TRANSIENT="TRUE"/>

          <ColumnDescriptor NAME="io_wait_t" TYPE="NUMBER" TRANSIENT="TRUE"/>

          <ColumnDescriptor NAME="irq_t" TYPE="NUMBER" TRANSIENT="TRUE"/>

          <ColumnDescriptor NAME="non_nice" TYPE="NUMBER"

                            COMPUTE_EXPR="100.0 * (non_nice_t - _non_nice_t)/(

                                                    (non_nice_t - _non_nice_t) +

                                                    (nice_t - _nice_t) +

                                                    (system_t - _system_t) +

                                                    (idle_t - _idle_t) +

                                                    (io_wait_t - _io_wait_t) +

                                                    (irq_t - _irq_t)

                                                   )">

            <Display>...</Display>

          </ColumnDescriptor>

          <ColumnDescriptor NAME="nice" TYPE="NUMBER"

                            COMPUTE_EXPR="100.0 * (nice_t - _nice_t)/(

                                                    (non_nice_t - _non_nice_t) +

                                                    (nice_t - _nice_t) +

                                                    (system_t - _system_t) +

                                                    (idle_t - _idle_t) +

                                                    (io_wait_t - _io_wait_t) +

                                                    (irq_t - _irq_t)

                                                   )">

          ...

      </TableDescriptor>

    </Metric>

    ```


    First, you will see that the first seven columns are marked with the attribute
    TRANSIENT="TRUE". This tells the agent that the values of these columns are not
    actually sent to the OMS to be stored in the repository but collected to be available
    for calculating values of other columns. The columns with the defined COMPUTE_EXPR
    attribute do not take their values from the fetchlet but instead use that defined
    expression to compute the value. The compute expression can reference existing
    columns by name, and those referenced columns must be defined in the TableDescriptor
    before they are referenced in the COMPUTE_EXPR because column values are calculated
    in sequence, from the top down.


    To reference the value of the column from the previous collection, the value should
    simply be prefixed with a single underscore symbol (_). So if the current value
    is nice_t, the previous collection is _nice_t. Consequently, the difference is
    nice_t - _nice_t, which is the number of CPU ticks spent executing niced processes
    in user mode since the previous collection. Summing up all CPU ticks since the
    last collection would then give us the total number of CPU ticks since the last
    collection. The percent of time that the CPU was executing niced user processes
    is the ratio between niced CPU ticks and total ticks, normalized to a percentage
    by multiplying by 100\. The same applies to all other CPU modes such as system
    or idle CPU.


    Let’s look at another example: calculating the number of user rollbacks and commits.
    The Oracle database keeps a counter of commits and rollbacks since database startup,
    but calculating purely on a cumulative counter isn’t useful for monitoring. What’s
    useful is the average number of commits and rollbacks per second between two collection
    intervals. So if the previous number of commits is c0 collected at time t0, and
    current collection is c1 collected at t1, then the number of commits per second
    would be (c1–c0)/(t1–t0). I do not specifically reference timestamps in metric
    definitions because EM12c adds the timestamp implicitly (there is a way to explicitly
    collect it, but it’s rarely required). Thus, we don’t have access to that timestamp
    value from the COMPUTE_EXPR definition. However, all we need is the interval.


    Even though you define an interval in the default collection, you shouldn’t hard-code
    this value in COMPUTE_EXPR because (1) the user can customize it and (2) the real
    interval might be slightly different, because the configured interval is just
    a target. Fortunately, EM12c has an embedded variable __interval (note the double-underscore
    prefix) that returns the number of seconds since the last collection. Thus, a
    metric with the number of commits and rollbacks per second could look like the
    one in [Listing 10-16](#9781430249382_Ch10.xhtml#list16).


    ***[Listing 10-16](#9781430249382_Ch10.xhtml#_list16)***.  Using __interval in
    COMPUTE_EXPR Columns


    ```

    <Metric NAME="transactions_stat" TYPE="TABLE">

      <TableDescriptor>

        <ColumnDescriptor NAME="commits" TYPE="NUMBER" TRANSIENT="TRUE"/>

        <ColumnDescriptor NAME="commits_ratio" TYPE="NUMBER"

                          COMPUTE_EXPR="(commits - _commits) / __interval">

          <Display>...</Display>

        </ColumnDescriptor>

        <ColumnDescriptor NAME="rollbacks" TYPE="NUMBER" TRANSIENT="TRUE"/>

        <ColumnDescriptor NAME="rollbacks_ratio" TYPE="NUMBER"

                          COMPUTE_EXPR="(rollbacks - _rollbacks) / __interval">

          <Display>...</Display>

        </ColumnDescriptor>

      </TableDescriptor>

      <QueryDescriptor>...</QueryDescriptor>

    </Metric>

    ```'
