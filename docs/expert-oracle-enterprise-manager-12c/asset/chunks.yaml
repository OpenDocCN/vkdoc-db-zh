    你可以通过使用`emctl`命令来控制这些文件的数量和大小。具体的命令取决于你想要控制哪个文件。你还可以控制哪些信息写入`emoms.trc`。默认情况下，OMS
    只将警告和严重消息写入跟踪文件，但你可以使用以下命令更改写入该文件的信息级别：


    ```

    $ emctl set property -name "log4j.rootCategory" -value "<LEVEL>, emlogAppender,
    emtrcAppender" -module logging

    ```


    其中`<LEVEL>`是以下值之一——`INFO`、`WARN`、`ERROR`或`DEBUG`。因为这可能会生成大量信息，你可以通过为`-name`设置不同的值来限制。但是，最好只在
    Oracle 支持人员的指导下进行此操作，因此如有需要，请联系他们。


    ## Oracle Management Repository


    现在，我们继续讨论 Oracle Management Repository。如第 1 章所述，Oracle Management Repository（OMR，或更常称为，存储库）是一个
    Oracle 数据库，用于存储由各种管理代理收集的所有信息。它由数据库用户、表空间、表、视图、索引、包、过程和数据库作业组成。与代理和 OMS 一样，存储库可以通过
    EM12c 控制台和命令行实用程序进行控制。让我们从更详细地查看控制台开始。


    ### 使用控制台管理存储库


    要从控制台管理存储库，请选择**设置 → 管理云控制 → 存储库**，如图 3-18 所示。


    ![9781430249382_Fig03-18.jpg](img/9781430249382_Fig03-18.jpg)


    图 3-18. 访问存储库主页


    这将带你到存储库主页，如图 3-19 所示。（请注意，页面标题仍然是“管理服务和存储库”，与访问 OMS 主页时相同，但显示的区域都适用于存储库。）。请注意，在此图中，已在“存储库详细信息”区域中单击了“详细信息”链接，以显示所有访问存储库的会话。


    在这个页面上你能做的事情真的不多；它更多地用于快速浏览并确保一切正常。这里通常需要检查的一些事项包括：


    *   是否还有可用空间？检查“已用空间”栏会很快告诉你答案。

    *   存储库收集的积压是否在增加？这不是一个常见问题。它可能偶尔会激增，如你在图 3-19 的示例中所见，但一般来说，这不是问题。

    *   Oracle Scheduler 状态是否正常？这里的绿色箭头通常就足够了，但如果有问题，你可以查看“存储库调度程序作业状态”区域以获取更详细的粒度信息。

    *   管理服务 AQ 状态是否正常？同样，检查箭头是否为绿色通常就足够了。如果不是，你可以展开该区域以获取更多详细信息。


    从屏幕左上角的“OMS 和存储库”下拉菜单中，有几个特定于存储库的选项。其中一个就叫做“存储库”，它只是显示图 3-19 中看到的页面（所以它真的只有在你一直在查看具有相同菜单的
    OMS 主页时才有用）。


    ![9781430249382_Fig03-19.jpg](img/9781430249382_Fig03-19.jpg)


    图 3-19. 存储库主页


    另一个可能有用的选项是“存储库同步”，它会打开如图 3-20 所示的页面。希望你不需要经常使用它。它基本上用于在存储库从备份恢复后，监控代理和存储库之间的重新同步操作（通过`emctl
    resync repos -full`命令启动）。你无法从这里启动命令，因为发出命令时需要关闭 OMS（记住，OMS 呈现控制台用户界面，所以那时你无法访问此页面）。然而，一旦命令执行，你可以重新启动
    OMS 并从此屏幕监控重新同步的进度。


    ![9781430249382_Fig03-20.jpg](img/9781430249382_Fig03-20.jpg)


    图 3-20. 存储库同步页面


    还有另外两个位置可以从控制台查看有关存储库的信息。一个是之前讨论过的“运行状况概述”页面，其中包含有关存储库的部分。那里的信息并没有比你已经在存储库主页上看到的添加更多细节，所以我们现在先忽略它。另一个选项，当然，就是简单地将存储库作为数据库目标深入查看。如果你知道存储库数据库的名称，你只需将其键入屏幕右上角的“搜索目标名称”字段中。或者，你可以简单地单击**目标
    → 数据库**，然后单击数据库名称。这将带你到标准的“数据库”主页，如图 3-21 所示。这些功能中的大多数，即使用户界面不熟悉，你可能也已经从之前的版本中熟悉了。（顺便说一句，以防你注意到这些截图中存储库似乎缺乏备份，这是一个运行在`NOARCHIVELOG`模式下的相当临时的系统，所以我只是在必要时通过`tar`进行冷备份。）


    ![9781430249382_Fig03-21.jpg](img/9781430249382_Fig03-21.jpg)


    图 3-21. 存储库的数据库主页


