    \n[Table 2-2](#9781430249382_Ch02.xhtml#_Tab2). Hardware Requirements for the\
    \ Management Repository\n\n![table](images/Table2-2.jpg)\n\nHardware Requirements\
    \ for Management Agents\n\nEach agent deployment requires approximately 1GB of\
    \ free hard disk space. Although management agents do not consume large amounts\
    \ of CPU or RAM, we do not recommend  deploying agents to systems with less than\
