    Additional OMS Installation


    The next step is to install additional management services. This can be done by
    using either the Add Additional OMS Deployment Procedure (recommended) or Silent
    Mode. See the *Oracle Enterprise Manager Cloud Control Advanced Installation and
    Configuration Guide* for details on using Silent Mode installation.


    The deployment procedure simplifies the process of deploying additional management
    servers to meet high-availability requirements. It automates the steps required
    to prepare and install additional management services by collecting input via
    a wizard-driven interface. It will clone the existing middleware home, including
    the OMS configuration based on the collected input. Any additional servers should
    also meet the same requirements for installing an OMS. See [Chapter 8](#9781430249382_Ch08.xhtml)
    of the *Oracle Enterprise Manager Cloud Control Basic Installation Guide 12c Release
    2* for prerequisites for the additional management service.


    ![image](images/sq.jpg) **Note**  Any new servers that are intended to be used
    as an OMS should already have the agent deployed. The deployment procedures will
    not clone an agent to the target.


    Follow these steps to install an Additional OMS


    1.  From the Enterprise Manager console, choose Enterprise ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Procedure Library, as shown
    in [Figure 13-17](#9781430249382_Ch13.xhtml#Fig17).


    ![9781430249382_Fig13-17.jpg](images/9781430249382_Fig13-17.jpg)


    [Figure 13-17](#9781430249382_Ch13.xhtml#_Fig17) .  Accessing the Procedure Library


    2.  Select the Add Management Service radio button and click Launch (see [Figure
    13-18](#9781430249382_Ch13.xhtml#Fig18)). You can sort the columns by the name
    of the Procedure by clicking if the procedure is not visible in the list.


    ![9781430249382_Fig13-18.jpg](images/9781430249382_Fig13-18.jpg)


    [Figure 13-18](#9781430249382_Ch13.xhtml#_Fig18) .  Add Management Service deployment
    procedure


    3.  The next screen, shown in [Figure 13-19](#9781430249382_Ch13.xhtml#Fig19),  lists
    the prerequisites that should be met before continuing with the procedure. Select
    all the check boxes associated with the prerequisites already met. If any are
    not met, you should resolve them first before continuing with the processors.
    Click Next when you are finished.


    ![9781430249382_Fig13-19.jpg](images/9781430249382_Fig13-19.jpg)


    [Figure 13-19](#9781430249382_Ch13.xhtml#_Fig19) .  Add Oracle Management Service
    prerequisite checks


    4.  On the Select Destination screen, choose a managed host that will be used
    as the additional OMS, as shown in [Figure 13-20](#9781430249382_Ch13.xhtml#Fig20).
    The path for the Middleware home will be identical to that on the first OMS. Enter
    a path for the instance base location or accept the defaults. Choose or enter
    the credentials of the user who owns the software on both the source and destination
    (for example, oracle).


    ![9781430249382_Fig13-20.jpg](images/9781430249382_Fig13-20.jpg)


    [Figure 13-20](#9781430249382_Ch13.xhtml#_Fig20) .  Add OMS, Select Destination


    5.  Next you will choose how to transfer the cloned home from the source OMS host
    to the destination host and select the staging locations (see [Figure 13-21](#9781430249382_Ch13.xhtml#Fig21)).
    The staging locations should have a minimum of 4GB free. If a shared filesystem
    such as NFS is selected, no staging locations are required. For FTP and HTTP(S)
    options, there also needs to be 8GB of free space in the operating system temporary
    location (/tmp in Unix or Linux or C:\Temp in Windows). See [Chapter 9](#9781430249382_Ch09.xhtml)
    of the *Oracle Enterprise Manager Cloud Control Basic Installation Guide 12c Release
    2* for details on specifying the temporary location. In addition, you need to
    provide the ports to be used for the destination management service. They will
    default to the source management service ports. We recommend keeping the ports
    on all management services identical if possible.


