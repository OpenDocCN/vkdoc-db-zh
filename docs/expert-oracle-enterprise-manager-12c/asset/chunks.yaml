- fmt: 'The `OMS` is installed into an Oracle middleware home, which also contains
    the Oracle `WebLogic Server` (including the `WebLogic Server` administration console),
    an Oracle `Management Agent` for the middleware tier, the management service instance
    base directory, the `Java Development Kit` (`JDK`), and other configuration files.
    You can install the `OMS` into an existing `WebLogic Server` (`WLS`) configuration
    if it exists, but usually it is better from an availability perspective to have
    it installed in a dedicated `WLS` home.


    ## Oracle Management Repository


    The `Oracle Management Repository` (also called the `repository` or `OMR`) is
    an Oracle database that stores all the information collected by the various management
    agents. It is composed of database users, tablespaces, tables, views, indexes,
    packages, procedures, and database jobs.


    Unlike the `OMS`, the installation process for the `OMR` requires that a database
    already exists for the repository. This means you need to have created the database
    somewhere in your environment prior to installing the `OMS`. Again, it is typically
    recommended for the repository to be created in a dedicated database.


    ## Plug-ins


    `Plug-ins` take on a whole new meaning in `EM12c`. In earlier releases, plug-ins
    were largely system-monitoring utilities used to monitor and manage non-Oracle
    (heterogeneous) software including databases and middleware. Partners or Oracle
    Corporation itself usually built them. Some technically savvy customers built
    their own as well, but there weren’t many plug-ins overall.


    In the `EM12c` release, a few of these monitoring plug-ins remain, but plug-ins
    have been greatly expanded to include every target type being managed. As such,
    there is now an Oracle database plug-in to manage Oracle databases, a `Fusion
    Middleware` plug-in to manage Oracle’s middleware, a `Fusion Application` plug-in
    to manage Oracle’s `Fusion Applications` product suite, and so on. Because new
    releases of the Oracle software will include plug-ins used to manage that software,
    this means `EM12c` (and later releases) will be able to monitor and manage those
    releases much more quickly than has been the case in the past. Plug-ins can be
    downloaded, applied, and deployed using the new `Self Update` functionality available
    from the `Cloud Control` console (if you have sufficient privileges to use it).


    In addition, this modular plug-in architecture means that an agent is no longer
    configured to be able to monitor any target type. Now, an agent will download
    only the plug-ins that are needed for the targets that the agent is monitoring.
    This means the agents themselves are smaller than they were in previous releases.
    This change is one of the biggest improvements in the architecture of the `EM12c`
    release.


    ## A High-Availability EM12c Configuration


    In the most basic of `EM12c` installations, the `OMS` and the repository can be
    physically located on a single machine. However, Oracle recommends placing these
    two components on different machines. [Figure 1-3](#9781430249382_Ch01.xhtml#Fig3)
    shows the simplest installation.


    ![9781430249382_Fig01-03.jpg](images/9781430249382_Fig01-03.jpg)


    [Figure 1-3](#9781430249382_Ch01.xhtml#_Fig3). Basic EM12c architecture


    Although this relatively simple architecture may be sufficient for an initial
    deployment, you might need to grow it into a more scalable, available architecture.
    There are four levels of deployment that you could use with `EM12c` to achieve
    higher scalability and availability. Of course, as in any architecture requiring
    both scalability and availability, trade-offs need to be made in terms of increasing
    cost as performance and availability increase.


    ### Level 1


    [Figure 1-3](#9781430249382_Ch01.xhtml#Fig3) shows a `level 1` deployment. The
    `OMS` and repository are installed either on a single host or, more preferably,
    on two separate hosts. However, neither of these hosts has any failover configured.


    ### Level 2


    For `level 2`, the `OMS` is installed on shared storage and uses `VIP`-based (virtual
    IP–based) failover. The repository database is protected by using local physical
    standby database technology. Usually, this means that `level 2` deployments use
    double the number of machines used by `level 1`. `Level 2`’s active/passive configuration
    (albeit located locally rather than having remote passive sites), leads to a downtime
    window when failing over from the active site to the passive site. This architecture
    is shown in [Figure 1-4](#9781430249382_Ch01.xhtml#Fig4).


    ![9781430249382_Fig01-04.jpg](images/9781430249382_Fig01-04.jpg)


    [Figure 1-4](#9781430249382_Ch01.xhtml#_Fig4). Schematic diagram of a level 2
    deployment


    ### Level 3


    In a `level 3` configuration, the `OMS` is installed using an active/active configuration,
    requiring a local load balancer. The repository database is protected by both
    `Real Application Clusters` (`RAC`) and local `Data Guard`. This level is shown
    in [Figure 1-5](#9781430249382_Ch01.xhtml#Fig5).


    ![9781430249382_Fig01-05.jpg](images/9781430249382_Fig01-05.jpg)


    [Figure 1-5](#9781430249382_Ch01.xhtml#_Fig5). Schematic diagram of a level 3
    deployment


    ### Level 4


    `Level 4` is the deployment level providing the most scalability and availability.
    In this case, the `OMS` is running in an active/active configuration on a primary
    site (just like `level 3`), but additional standby `OMS` installations are at
    a remote site. (Note that because of network latency requirements between the
    `OMS` and the repository being less than 1 millisecond consistently, the remote
    site cannot be running an active `OMS`). This configuration requires a local load
    balancer at both the primary and standby sites. The repository database is again
    running on `RAC`, but in this case the standby `RAC` database is located at the
    disaster recovery site. As you can tell, this is quite a complex architecture,
    shown in [Figure 1-6](#9781430249382_Ch01.xhtml#Fig6) (without all the lines of
    communication that would make it even harder to understand).


    ![9781430249382_Fig01-06.jpg](images/9781430249382_Fig01-06.jpg)


    [Figure 1-6](#9781430249382_Ch01.xhtml#_Fig6). Schematic diagram of a level 4
    deployment


    You’ve now got the gist of the four possible deployment levels. [Chapter 13](#9781430249382_Ch13.xhtml)
    covers them in greater detail in the context of high availability. Also, be aware
    that it is possible to create configurations that do not match these levels exactly.
    Don’t be too surprised if someday you see a configuration slightly different from
    what’s just been described. `EM12c` provides you a great deal of flexibility.


    ## The Software Library


    Another important part of an Enterprise Manager installation is the `Software
    Library`. The `Software Library` is a storage area used for such things as patches,
    `Self Update` downloads, and gold images. It is depicted earlier, in the diagrams
    in the section “A High-Availability EM12c Configuration,” as shared storage sitting
    between the `OMS`s. ([Figure 1-5](#9781430249382_Ch01.xhtml#Fig5) shows it clearly.
    There you’ll see the shared storage icon almost dead-center). To create the `Software
    Library`, you use the `Software Library: Administration` page, available from
    the `Setup` → `Provisioning and Patching` → `Software Library` menu path. The
    `Software Administration` page is shown in [Figure 1-7](#9781430249382_Ch01.xhtml#Fig7).


    ![9781430249382_Fig01-07.jpg](images/9781430249382_Fig01-07.jpg)


    [Figure 1-7](#9781430249382_Ch01.xhtml#_Fig7). The Software Library: Admnistration
    page


    One important point to be aware of when creating your `Software Library` is that
    you need to ensure that the location you create the `Software Library` in is accessible
    from each `OMS`, if at some stage you believe your `EM12c` deployment will require
    some level of high availability. This can be achieved by using the same network
    file system (`NFS`) share mounted on each `OMS`, or any other technology that
    allows sharing file systems between machines.'
  raw: 'The OMS is installed into an Oracle middleware home, which also contains the
    Oracle WebLogic Server (including the WebLogic Server administration console),
    an Oracle Management Agent for the middleware tier, the management service instance
    base directory, the Java Development Kit (JDK), and other configuration files.
    You can install the OMS into an existing WebLogic Server (WLS) configuration if
    it exists, but usually it is better from an availability perspective to have it
    installed in a dedicated WLS home.


    Oracle Management Repository


    The *Oracle Management Repository* (also called the *repository* or *OMR*) is
    an Oracle database that stores all the information collected by the various management
    agents. It is composed of database users, tablespaces, tables, views, indexes,
    packages, procedures, and database jobs.


    Unlike the OMS, the installation process for the OMR requires that a database
    already exists for the repository. This means you need to have created the database
    somewhere in your environment prior to installing the OMS. Again, it is typically
    recommended for the repository to be created in a dedicated database.


    Plug-ins


    *Plug-ins* take on a whole new meaning in EM12c. In earlier releases, plug-ins
    were largely system-monitoring utilities used to monitor and manage non-Oracle
    (heterogeneous) software including databases and middleware. Partners or Oracle
    Corporation itself usually built them. Some technically savvy customers built
    their own as well, but there weren’t many plug-ins overall.


    In the EM12c release, a few of these monitoring plug-ins remain, but plug-ins
    have been greatly expanded to include every target type being managed. As such,
    there is now an Oracle database plug-in to manage Oracle databases, a Fusion Middleware
    plug-in to manage Oracle’s middleware, a Fusion Application plug-in to manage
    Oracle’s Fusion Applications product suite, and so on. Because new releases of
    the Oracle software will include plug-ins used to manage that software, this means
    EM12c (and later releases) will be able to monitor and manage those releases much
    more quickly than has been the case in the past. Plug-ins can be downloaded, applied,
    and deployed using the new Self Update functionality available from the Cloud
    Control console (if you have sufficient privileges to use it).


    In addition, this modular plug-in architecture means that an agent is no longer
    configured to be able to monitor any target type. Now, an agent will download
    only the plug-ins that are needed for the targets that the agent is monitoring.
    This means the agents themselves are smaller than they were in previous releases.
    This change is one of the biggest improvements in the architecture of the EM12c
    release.


    A High-Availability EM12c Configuration


    In the most basic of EM12c installations, the OMS and the repository can be physically
    located on a single machine. However, Oracle recommends placing these two components
    on different machines. [Figure 1-3](#9781430249382_Ch01.xhtml#Fig3) shows  the
    simplest installation.


    ![9781430249382_Fig01-03.jpg](images/9781430249382_Fig01-03.jpg)


    [Figure 1-3](#9781430249382_Ch01.xhtml#_Fig3). Basic EM12c architecture


    Although this relatively simple architecture may be sufficient for an initial
    deployment, you might need to grow it into a more scalable, available architecture.
    There are four levels of deployment that you could use with EM12c to achieve higher
    scalability and availability. Of course, as in any architecture requiring both
    scalability and availability, trade-offs need to be made in terms of increasing
    cost as performance and availability increase.


    Level 1


    [Figure 1-3](#9781430249382_Ch01.xhtml#Fig3) shows a *level 1* deployment. The
    OMS and repository are installed either on a single host or, more preferably,
    on two separate hosts. However, neither of these hosts has any failover configured.


    Level 2


    For *level 2*, the OMS is installed on shared storage and uses VIP-based (virtual
    IP–based) failover. The repository database is protected by using local physical
    standby database technology. Usually, this means that level 2 deployments use
    double the number of machines used by level 1\. Level 2’s active/passive configuration
    (albeit located locally rather than having remote passive sites), leads to a downtime
    window when failing over from the active site to the passive site. This architecture
    is shown in [Figure 1-4](#9781430249382_Ch01.xhtml#Fig4).


    ![9781430249382_Fig01-04.jpg](images/9781430249382_Fig01-04.jpg)


    [Figure 1-4](#9781430249382_Ch01.xhtml#_Fig4). Schematic diagram of a level 2
    deployment


    Level 3


    In a *level 3* configuration, the OMS is installed using an active/active configuration,
    requiring a local load balancer. The repository database is protected by both
    Real Application Clusters (RAC) and local Data Guard. This level is shown in [Figure
    1-5](#9781430249382_Ch01.xhtml#Fig5).


    ![9781430249382_Fig01-05.jpg](images/9781430249382_Fig01-05.jpg)


    [Figure 1-5](#9781430249382_Ch01.xhtml#_Fig5). Schematic diagram of a level 3
    deployment


    Level 4


    *Level 4* is the deployment level providing the most scalability and availability.
    In this case, the OMS is running in an active/active configuration on a primary
    site (just like level 3), but additional standby OMS installations are at a remote
    site. (Note that because of network latency requirements between the OMS and the
    repository being less than 1 millisecond consistently, the remote site cannot
    be running an active OMS). This configuration requires a local load balancer at
    both the primary and standby sites. The repository database is again running on
    RAC, but in this case the standby RAC database is located at the disaster recovery
    site. As you can tell, this is quite a complex architecture, shown in [Figure
    1-6](#9781430249382_Ch01.xhtml#Fig6) (without all the lines of communication that
    would make it even harder to understand).


    ![9781430249382_Fig01-06.jpg](images/9781430249382_Fig01-06.jpg)


    [Figure 1-6](#9781430249382_Ch01.xhtml#_Fig6). Schematic diagram of a level 4
    deployment


    You’ve now got the gist of the four possible deployment levels. [Chapter 13](#9781430249382_Ch13.xhtml)
    covers them in greater detail in the context of high availability. Also, be aware
    that it is possible to create configurations that do not match these levels exactly.
    Don’t be too surprised if someday you see a configuration slightly different from
    what’s just been described. EM12c provides you a great deal of flexibility.


    The Software Library


    Another important part of an Enterprise Manager installation is the Software Library.
    The Software Library is a storage area used for such things as patches, Self Update
    downloads, and gold images. It is depicted earlier, in the diagrams in the section
    “A High-Availability EM12c Configuration,” as shared storage sitting between the
    OMSs. ([Figure 1-5](#9781430249382_Ch01.xhtml#Fig5) shows it clearly. There you’ll
    see the shared storage icon almost dead-center). To create the Software Library,
    you use the Software Library: Administration page, available from the Setup ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Software Library menu path.
    The Software Administration page is shown in [Figure 1-7](#9781430249382_Ch01.xhtml#Fig7).


    ![9781430249382_Fig01-07.jpg](images/9781430249382_Fig01-07.jpg)


    [Figure 1-7](#9781430249382_Ch01.xhtml#_Fig7). The Software Library: Admnistration
    page


    One important point to be aware of when creating your Software Library is that
    you need to ensure that the location you create the Software Library in is accessible
    from each OMS, if at some stage you believe your EM12c deployment will require
    some level of high availability. This can be achieved by using the same network
    file system (NFS) share mounted on each OMS, or any other technology that allows
    sharing file systems between machines.'
  trans: '

    `OMS` 被安装到一个 Oracle 中间件主目录中，该目录还包含 Oracle `WebLogic Server`（包括 `WebLogic Server`
    管理控制台）、用于中间件层的 Oracle `Management Agent`、管理服务实例基础目录、`Java 开发工具包`（`JDK`）以及其他配置文件。如果存在现有的
    `WebLogic Server`（`WLS`）配置，你可以将 `OMS` 安装进去，但从可用性角度来看，通常最好将其安装在专用的 `WLS` 主目录中。


    ## Oracle Management Repository


    `Oracle Management Repository`（也称为 `repository` 或 `OMR`）是一个 Oracle 数据库，用于存储所有管理代理收集的信息。它由数据库用户、表空间、表、视图、索引、包、过程和数据库作业组成。


    与 `OMS` 不同，`OMR` 的安装过程要求数据库已为存储库存在。这意味着在安装 `OMS` 之前，你需要已在环境中的某处创建好数据库。同样，通常建议在专用数据库中创建存储库。


    ## Plug-ins


    在 `EM12c` 中，`Plug-ins` 被赋予了全新的含义。在早期版本中，插件主要是用于监控和管理非 Oracle（异构）软件（包括数据库和中间件）的系统监控工具。它们通常由合作伙伴或
    Oracle 公司自身构建。一些技术娴熟的客户也构建了自己的插件，但总体而言插件数量并不多。


    在 `EM12c` 版本中，虽然保留了一些此类监控插件，但插件的概念已大大扩展，涵盖了所有被管理的目标类型。因此，现在有用于管理 Oracle 数据库的 Oracle
    数据库插件、用于管理 Oracle 中间件的 `Fusion Middleware` 插件、用于管理 Oracle `Fusion Applications`
    产品套件的 `Fusion Application` 插件，等等。由于 Oracle 软件的新版本将包含用于管理该软件的插件，这意味着 `EM12c`（及后续版本）将能够比过去更快地监控和管理这些新版本。插件可以通过
    `Cloud Control` 控制台中新的 `Self Update` 功能（如果你有足够的权限使用它）来下载、应用和部署。


    此外，这种模块化的插件架构意味着代理不再被配置为能够监控任何目标类型。现在，代理只会下载其监控目标所需的插件。这意味着代理本身比以前版本的代理更小。这一变化是
    `EM12c` 版本架构中最重要的改进之一。


    ## 高可用 EM12c 配置


    在最基本的 `EM12c` 安装中，`OMS` 和存储库可以物理地位于单台机器上。但是，Oracle 建议将这两个组件放置在不同的机器上。图 1-3 展示了最简单的安装方式。


    ![9781430249382_Fig01-03.jpg](img/9781430249382_Fig01-03.jpg)


    图 1-3. 基本的 EM12c 架构


    尽管这种相对简单的架构可能足以满足初始部署的需求，但你可能需要将其发展为可扩展性更高、可用性更强的架构。有四种部署级别可用于 `EM12c`，以实现更高的可扩展性和可用性。当然，与任何需要同时具备可扩展性和可用性的架构一样，随着性能和可用性的提高，成本也会增加，需要在其中进行权衡。


    ### Level 1


    图 1-3 展示了 `level 1` 的部署。`OMS` 和存储库要么安装在单台主机上，要么（更可取地）安装在两台独立的主机上。但是，这两台主机都没有配置任何故障转移。


    ### Level 2


    对于 `level 2`，`OMS` 安装在共享存储上，并使用基于 `VIP`（虚拟 IP）的故障转移。存储库数据库通过使用本地物理备用数据库技术进行保护。通常，这意味着
    `level 2` 部署使用的机器数量是 `level 1` 的两倍。`Level 2` 的主动/被动配置（尽管位于本地而非远程被动站点）在从主动站点故障转移到被动站点时会导致停机窗口。该架构如图
    1-4 所示。


    ![9781430249382_Fig01-04.jpg](img/9781430249382_Fig01-04.jpg)


    图 1-4. level 2 部署示意图


    ### Level 3


    在 `level 3` 配置中，`OMS` 使用主动/主动配置进行安装，需要本地负载均衡器。存储库数据库由 `Real Application Clusters`（`RAC`）和本地
    `Data Guard` 共同保护。该级别如图 1-5 所示。


    ![9781430249382_Fig01-05.jpg](img/9781430249382_Fig01-05.jpg)


    图 1-5. level 3 部署示意图


    ### Level 4


    `Level 4` 是提供最高可扩展性和可用性的部署级别。在这种情况下，`OMS` 在主站点以主动/主动配置运行（就像 `level 3` 一样），但在远程站点有额外的备用
    `OMS` 安装。（请注意，由于 `OMS` 和存储库之间的网络延迟要求持续小于 1 毫秒，远程站点不能运行活动的 `OMS`）。此配置需要在主站点和备用站点都设置本地负载均衡器。存储库数据库再次运行在
    `RAC` 上，但在这种情况下，备用 `RAC` 数据库位于灾难恢复站点。可以看出，这是一个相当复杂的架构，如图 1-6 所示（图中省略了所有会使它更难理解的通信线路）。


    ![9781430249382_Fig01-06.jpg](img/9781430249382_Fig01-06.jpg)


    图 1-6. level 4 部署示意图


    现在你已经了解了四种可能的部署级别的要点。第 13 章 在高可用性的背景下更详细地介绍了它们。另外，请注意，可以创建与这些级别不完全匹配的配置。如果有一天你看到一个与刚才描述的稍有不同的配置，请不要太过惊讶。`EM12c`
    为你提供了极大的灵活性。


    ## Software Library


    Enterprise Manager 安装的另一个重要部分是 `Software Library`。`Software Library` 是一个存储区域，用于存放补丁、`Self
    Update` 下载内容和黄金镜像等。在“高可用 EM12c 配置”一节前面的示意图中，它被描绘为位于 `OMS` 之间的共享存储。（图 1-5 清晰地展示了它，在那里你几乎可以在正中间看到共享存储的图标）。要创建
    `Software Library`，你需要使用 `Software Library: Administration` 页面，可通过 `Setup` → `Provisioning
    and Patching` → `Software Library` 菜单路径访问。`Software Administration` 页面如图 1-7 所示。


    ![9781430249382_Fig01-07.jpg](img/9781430249382_Fig01-07.jpg)


    图 1-7. Software Library: Administration 页面


    创建 `Software Library` 时需要注意的一个重要点是，如果你认为你的 `EM12c` 部署在某个阶段需要某种程度的高可用性，则需要确保创建
    `Software Library` 的位置可以从每个 `OMS` 访问。这可以通过在每个 `OMS` 上挂载相同的网络文件系统（`NFS`）共享，或使用任何其他允许在机器之间共享文件系统的技术来实现。

