    the output to a file for easier perusal. You can get detailed help on any particular
    verb by passing that verb as an argument to the help command. For example, emcli
    help setup gives you more detailed help on the setup verb. There is also a complete
    manual on the EMCLI utility available in the EM12c documentation set ( [http://docs.oracle.com/cd/E24628_01/em.121/e17786/toc.htm](http://docs.oracle.com/cd/E24628_01/em.121/e17786/toc.htm)
    ).


