  trans: '

    这些管理包允许您定义并提取测试数据，用于在各类工程系统与通用系统平台上创建测试环境。总体而言，这些管理包有助于定义、优化测试过程，并为迁移与整合工作提供真实的测试结果。


    ## 验证应用程序性能


    建立测试环境后，您需要执行测试，以验证与当前生产负载相比性能是否可接受。Oracle 开发了三种工具来帮助验证应用程序性能：`Database Replay`、`SQL
    Performance Analyzer` 和 `SQL Tuning Sets`。这些功能均属于 `Real Application Testing (RAT)`
    套件。`RAT` 是 Oracle Database 的一个可选组件，为在测试环境中验证生产负载性能提供了理想解决方案。


    ### 数据库重放


    `Database Replay` 功能能够捕获生产负载（包括在线与批处理负载），并在测试环境中重放。它使数据库管理员无需编写定制测试脚本即可测试系统变更、依赖关系及执行时序。通过减少测试所需时间，从而降低总体测试成本，节省时间与精力。`EM12c`
    通过简化保存和传输捕获的负载及性能数据至测试系统、设置测试系统以及通过其中央控制台进行重放的流程，对 `RAT` 功能进行了补充。


    ![image](img/sq.jpg) **注意** 要使用 `Real Application Testing (RAT)` 的功能，您必须购买许可。唯一的例外是
    `SQL Tuning Sets`，它可以在 Oracle Tuning Pack 或 `RAT` 下获得许可。


    `EM12c` 还针对中间层引入了功能类似于 `Database Replay` 的 `Application Replay`。`Application Replay`
    为验证所有 Web 及打包 Oracle 应用程序的应用基础设施变更提供了最高效、优化且最优质的测试。


    ### SQL 性能分析器与 SQL 调优集


    `SQL Performance Analyzer` 有助于预测并防止 SQL 执行性能问题。它通过在变更前后依次运行 SQL 语句，详细展示环境变化带来的影响。同时，它还会生成清晰、详细的报告，概述系统变更对工作负载的影响以及性能下降的
    SQL 语句集。`Oracle Enterprise Manager 12c Tuning Advisor` 对 `SQL Performance Analyzer`
    进行了补充，并提供优化和调整 SQL 语句以获取最佳性能的建议。


    `SQL Tuning Sets` 是 SQL 语句的集合，可作为输入提供给 `Automatic Database Diagnostic Monitor
    (ADDM)`、`SQL Tuning Advisor` 或 `SQL Access Advisor`。它们是包含一个或多个 SQL 语句及其相关执行统计信息和上下文的数据库对象。这些调优集用于帮助
    DBA 对 SQL 语句进行自动调优，并且可以导出到测试系统中进行评估和改进。


    本节讨论的三种工具——`Database Replay`、`SQL Performance Analyzer` 和 `SQL Tuning Sets`——由
    Oracle 开发，为测试数据库负载提供了一种方法论途径。这些工具各自表现出色，而它们协同工作时，则为监控任何环境（尤其是工程系统）提供了强大的方式。


    ## 管理阶段


    数据库或应用程序在生产环境中部署后，确保应用程序性能最优并达到预期服务水平至关重要。`EM12c` 控制台中集成的 Oracle Exadata 硬件与软件组件视图，允许
    DBA 从数据库性能页面导航至 Oracle Exadata 系统运行状况页面。当 Exadata 运行正常无问题时，附加在数据库上的系统运行状况按钮为绿色。当
    `Oracle Enterprise Manager` 检测到错误时，系统运行状况按钮会变为红色，表明可能存在问题影响数据库可用性。


    许多原因（例如，负载不均衡、`ASM` 相关问题、存储节点故障、存储节点配置问题或网络相关故障）都可能影响 Exadata 性能。`EM12c` 可帮助对
    Exadata 及其他工程系统中的此类问题进行故障排除与诊断。数据库的 `Automatic Database Diagnostic Monitor (ADDM)`
    和 `Automatic Workload Repository (AWR)` 功能是使用 Exadata 数据库一体机进行性能分析的关键工具。


    ### ADDM 与 AWR


    `ADDM` 是 Oracle 数据库诊断基础架构的核心部分。`ADDM` 始于对数据库内基于关键工作负载指标获取的快照进行分析。这些快照包含与数据库内核、数据库工作负载以及操作系统级别相关的关键性能信息。`ADDM`
    定期运行，分析这些信息并针对识别出的问题提出建议。


    例如，当存在 SQL 负载问题时，SQL 顾问会就如何调整 SQL 语句提出建议。同样，当存在 I/O 或 CPU 问题时，`ADDM` 会提供系统资源优化建议。如果您正在运行
    `RAC`，`ADDM` 会分析您的整个 `RAC` 基础架构（包括互联网络），并就如何提高整体性能提供建议。


    `AWR` 是一个内置的存储库，包含在 `SYSAUX` 表空间中，每个 Oracle 数据库都维护着关于操作统计信息的该存储库。`AWR` 是 Oracle
    数据库中所有自我管理功能的基础。它是关于 Oracle 数据库及其使用方式的历史信息的主要来源。`AWR` 存储库及相关快照使数据库能够做出专为其运行环境量身定制的决策。


    ### ASH 分析


    `EM12c` 引入了一个新工具来探索 `Active Session History (ASH)` 数据。`ASH Analytics` 允许 DBA 跨各种性能维度分析性能数据。这种在不同维度上创建过滤器的能力极大地简化了性能问题的识别过程。


    ![image](img/sq.jpg) **注意** `Active Session History (ASH)` 是一个 `PL/SQL` 包，使用前必须安装。有关
    `ASH` 的更多信息，请参阅 第 9 章。


    如 图 8-17 所示，`ASH Analytics` 的下拉菜单允许管理员使用预定义的性能维度层次结构来探索性能数据。


    ![9781430249382_Fig08-17.jpg](img/9781430249382_Fig08-17.jpg)


    图 8-17. 活动会话历史 (ASH) 分析


    `ASH Analytics` 功能可用于运行在 Oracle Exadata 数据库一体机或非 Oracle 平台上的任何 Oracle 11g 数据库。例如，通过使用等待事件维度，您可以聚焦于
    Oracle Exadata 特定的等待事件，并解决与性能相关的问题。


    ## I/O 资源管理器


    Exadata `I/O Resource Manager (IORM)` 是 Oracle Exadata 的另一项关键能力，它保证数据库在每个存储服务器上获得资源计划中定义的最小
    I/O 量。让我们以运行多个应用程序和数据库的 Exadata 环境为例。


    图 8-18 展示了 Exadata 存储服务器网格视图，从中您可以看到 `IORM` 未启用，并且 `CRM` 数据库未获得足够的 I/O 资源，因为 `DW`
    数据库占用了大量资源。`DW` 数据库是合法的数据库，您不能仅仅因为它消耗大量资源就终止其进程。您需要找到更具创造性的方法来解决问题。


    ![9781430249382_Fig08-18.jpg](img/9781430249382_Fig08-18.jpg)


    图 8-18. 未启用 IORM 的 Exadata 存储服务器网格

    '
- fmt: '# IORM 配置与维护


    在 Exadata 中，您可以通过启用 IORM 来管理 I/O 资源的分配。您可以手动配置 I/O 分配以分配固定数量的 I/O 资源，也可以选择具有固定
    I/O 分配的预定义模板。


    如 [图 8-19](#9781430249382_Ch08.xhtml#Fig19) 所示，当前 IORM 处于禁用状态；此外，我们没有任何内部数据库间计划或磁盘
    I/O 目标启用。要启用 IORM，您需要更改所需设置，然后单击“全部更新”按钮。这将启用所有选定的更改，Exadata 将开始按定义的 I/O 资源计划分配资源。也有可以实施的预定义
    I/O 模板。


    ![9781430249382_Fig08-19.jpg](images/9781430249382_Fig08-19.jpg)


    [图 8-19](#9781430249382_Ch08.xhtml#_Fig19) IORM 设置


    启用 IORM 并分配所需资源后，任何性能瓶颈都应消失。在设置 IORM 计划时，请确保分配给资源的百分比符合已定义的服务级别协议（SLA）。


    ## 维护阶段


    在应用程序部署到 Oracle 工程系统上的生产环境，并确保资源已优化共享或分配给数据库后，您还需要维护环境中的配置。EM12c 通过使用合规框架来评估主机和数据库，帮助您确保所有组件的合规性。合规框架会主动检查受监控的环境，并通知您潜在的环境问题以及所需的关联补丁。


    除了 EM12c 中的合规框架外，还有其他强大的解决方案可用于维护受监控的环境配置：


    *   综合配置管理

    *   缺陷诊断

    *   自动化补丁解决方案


    尽管您可以在本书的其余部分找到关于这些 EM12c 功能的更多细节，但让我们在 Oracle 工程系统的背景下更详细地了解它们。


    ### 合规框架


    EM12c 提供了一种跨目标（包括 Exadata 数据库机）管理标准的分层方法。合规框架由三个可以管理和重用的核心组件组成：


    *   合规框架

    *   合规标准

    *   合规规则


    合规框架用于提供从合规标准得出的合规分数的聚合。根据需要遵守的要求，可以有多个框架。[图 8-20](#9781430249382_Ch08.xhtml#Fig20)
    显示了合规情况仪表板，该仪表板用于确保遵循合规性并显示关联的分数。


    ![9781430249382_Fig08-20.jpg](images/9781430249382_Fig08-20.jpg)


    [图 8-20](#9781430249382_Ch08.xhtml#_Fig20) 合规情况仪表板


    合规标准是合规框架中唯一与受管目标关联的部分。合规规则是与合规标准关联的规则。一旦合规标准与目标关联，标准内的规则就会针对目标执行，并存储在 Oracle
    管理库中。


    可以从合规情况仪表板的高层查看关联框架的结果，如[图 8-20](#9781430249382_Ch08.xhtml#Fig20) 所示。若要查看更详细的结果视图，可以从仪表板深入查看这些合规标准。[图
    8-21](#9781430249382_Ch08.xhtml#Fig21) 显示了“安全建议 Oracle 标准”的更详细视图。


    ![9781430249382_Fig08-21.jpg](images/9781430249382_Fig08-21.jpg)


    [图 8-21](#9781430249382_Ch08.xhtml#_Fig21) 合规标准结果详情


    合规框架关联的标准和规则是高层查看基础架构内配置的好方法。该框架可应用于所有硬件版本，包括 Oracle 工程系统。


    ### 配置管理


    EM12c 为 Exadata、其他工程系统和通用系统提供配置管理功能。配置管理使您能够从目标收集详细信息，这些信息通常是一个庞大且很少更改、具有非平凡结构的信息集合。与性能指标相比，这些集合很少收集。配置数据应仅由管理员显式更改目标而影响。管理员可以进行的更改示例包括为目标打补丁或重新配置目标，例如更改
    Oracle 主目录的文件权限。


    EM12c 中的配置管理提供许多功能，包括：


    *   相对较大的相关配置数据集的低频收集（每日）

    *   按需刷新和计划刷新配置信息

    *   比较配置以发现它们在不同目标之间的差异

    *   将配置作为保存的快照存储在管理存储库中，以供以后查看、比较和其他与配置相关的操作

    *   将配置导出到文件，并将此类文件导入回企业管理器作为保存的快照

    *   历史变更跟踪

    *   在企业或目标子集的所有配置信息中进行强大搜索

    *   由于与关联目标的关系而触发关联


    通过企业管理器用户界面查找配置时，可以通过在“所有目标”中右键单击目标并选择“配置” -> “最后收集的配置”来找到配置信息。[图 8-22](#9781430249382_Ch08.xhtml#Fig22)
    说明了如何访问目标的配置信息。


    ![9781430249382_Fig08-22.jpg](images/9781430249382_Fig08-22.jpg)


    [图 8-22](#9781430249382_Ch08.xhtml#_Fig22) 访问配置数据


    一旦进入目标的最后一个配置页面，您将在屏幕左侧看到一个导航树，在右侧看到一系列选项卡。这些结构使您能够浏览与目标关联的当前配置信息。每个目标类型将呈现不同的导航树；右侧的选项卡将保持不变。[图
    8-23](#9781430249382_Ch08.xhtml#Fig23) 显示了 Oracle 11g 数据库最新配置的示例。


    ![9781430249382_Fig08-23.jpg](images/9781430249382_Fig08-23.jpg)


    [图 8-23](#9781430249382_Ch08.xhtml#_Fig23) Oracle 数据库的最新配置


    在查看数据库的配置时，DBA 可以监控和强制执行与初始化文件（`spfile`）、操作系统参数以及 Exadata 或任何其他数据库内的单元配置关联的参数的配置。配置强制执行可以通过比较两个具有相同配置的主机来完成，以识别其中一个主机上的任何问题。也可以将配置与目标保存的配置（视为黄金标准）进行比较，以确定目标配置中是否存在任何偏差。


    ![image](images/sq.jpg) **提示**  比较目标配置或使用黄金镜像进行比较需要大量数据。最好在非高峰时段运行比较。


    Oracle 企业管理器还可以比较多个 Exadata 数据库机的配置。诸如变更历史跟踪或配置管理清单之类的功能也有助于配置合规性。Oracle 企业管理器持续捕获
    Oracle Exadata 中的变更事件，还可以生成配置变更的综合报告，详细信息包括变更内容、时间、地点以及由谁执行。'
  raw: 'In Exadata, you can manage the allocation of I/O resources by enabling the
    IORM. You could configure the I/O allocation manually to allocate a fixed amount
    of I/O resources. You could also select predefined templates with fixed I/O allocations.


    As you can see in [Figure 8-19](#9781430249382_Ch08.xhtml#Fig19), we currently
    have IORM disabled; additionally, we do not have any internal interdatabase plans
    or disk I/O objectives enabled. To enable IORM, you need to change the desired
    setting and then click the Update All button. This enables all the changes selected,
    and the Exadata will start allocating resources by the defined I/O resource plan.
    There are predefined I/O templates that can be implemented as well.


    ![9781430249382_Fig08-19.jpg](images/9781430249382_Fig08-19.jpg)


    [Figure 8-19](#9781430249382_Ch08.xhtml#_Fig19). IORM settings


    After enabling the IORM and allocating the resources needed, any performance bottlenecks
    should dissipate. When setting up an IORM plan, makes sure that the percentages
    allocated to resources meet service-level agreements (SLAs) that have been defined.


    Maintenance Phase


    After the application is deployed to production on an Oracle engineered system
    and you have ensured that the resources are optimally shared or assigned to databases,
    you also need to maintain the configuration within the environment. EM12c helps
    you ensure compliance across all components by using the Compliance Framework
    to evaluate the hosts and databases. The Compliance Framework proactively looks
    at the monitored environment and notifies you of potential environmental issues
    and associated patches needed.


    Along with the Compliance Framework within EM12c, other robust solutions exist
    for maintaining the monitored environment configuration:


    *   Comprehensive Configuration Management

    *   Defect Diagnostics

    *   Automated Patching Solution


    Although you will find a lot more details about these EM12c features in the rest
    of the book, let’s look at them in little more detail in the context of Oracle
    engineered systems.


    Compliance Framework


    EM12c provides a hierarchical approach to managing standards across targets to
    include Exadata Database Machines. The Compliance Framework consists of three
    core components that can be managed and reused:


    *   Compliance Framework

    *   Compliance standards

    *   Compliance rules


    The Compliance Framework is used to provide an aggregate of the compliance scores
    that are derived from the compliance standards. There can be more than one framework,
    depending on requirements needed to be complied with. [Figure 8-20](#9781430249382_Ch08.xhtml#Fig20)
    shows the Compliance Dashboard, which is used to ensure that compliance is being
    followed with associated scores.


    ![9781430249382_Fig08-20.jpg](images/9781430249382_Fig08-20.jpg)


    [Figure 8-20](#9781430249382_Ch08.xhtml#_Fig20). Compliance Dashboard


    The compliance standards are the only part of the Compliance Framework that is
    associated with a managed target. The compliance rules are rules that are associated
    with the compliance standard. Once the compliance standard is associated with
    a target, the rules within the standard are executed against the target and stored
    in the Oracle Management Repository.


    The results of the associated framework can be viewed from a high level on the
    Compliance Dashboard, as shown in [Figure 8-20](#9781430249382_Ch08.xhtml#Fig20).
    For a more detailed view of the results, these compliance standards can be drilled
    into from the dashboard. [Figure 8-21](#9781430249382_Ch08.xhtml#Fig21) show a
    more detailed view of the Security Recommendations Oracle standard.


    ![9781430249382_Fig08-21.jpg](images/9781430249382_Fig08-21.jpg)


    [Figure 8-21](#9781430249382_Ch08.xhtml#_Fig21). Compliance standard result detail


    The Compliance Framework’s associated standards and rules are a good way to keep
    a high-level view on the configurations within the infrastructure. This framework
    can be applied across all versions of hardware, including Oracle engineered systems.


    Configuration Management


    EM12c offers configuration management capabilities for Exadata, other engineered
    systems, and generic systems. Configuration management enables you to collect
    detailed information from a target, which is normally a large and rarely changing
    collection of information with nontrivial structure. These collections are collected
    rarely when compared to performance metrics. Configuration data should be affected
    only by administrators explicitly making changes to the target. Examples of changes
    that an administrator can make are patching or reconfiguring the target, such
    as changing file permissions on the Oracle home directory.


    Configuration management within EM12c provides a number of features, including
    these:


    *   Infrequent collection of a relatively large set of related configuration data
    (daily)

    *   On-demand refresh and scheduled refresh of the configuration information

    *   Comparison of configurations to discover how they differ across targets

    *   Storage of configurations in the management repository as saved snapshots
    for later viewing, comparison, and other operations related to configurations

    *   Export of configurations into files and importing such files back into Enterprise
    Manager as saved snapshots

    *   Historical change tracking

    *   Powerful searches across all the configuration information in the enterprise
    or a subset of targets

    *   Triggering associates due to relationships to related targets


    When looking for configurations through the Enterprise Manager user interface,
    configuration information can be found by right-clicking the target in All Targets
    and choosing Configuration ![arrow](images/arrow.jpg) Last Collected. [Figure
    8-22](#9781430249382_Ch08.xhtml#Fig22) illustrates how to access the configuration
    information for a target.


    ![9781430249382_Fig08-22.jpg](images/9781430249382_Fig08-22.jpg)


    [Figure 8-22](#9781430249382_Ch08.xhtml#_Fig22). Accessing configuration data


    Once you are on the last configuration page for the target, you are presented
    with a navigation tree on the left side of the screen and a series of tabs on
    the right side. These structures enable you to navigate the current configuration
    information associated with the target. Each target type will present a different
    navigation tree; the tab on the right will stay the same. [Figure 8-23](#9781430249382_Ch08.xhtml#Fig23)
    shows an example of the latest configuration for an Oracle 11g database.


    ![9781430249382_Fig08-23.jpg](images/9781430249382_Fig08-23.jpg)


    [Figure 8-23](#9781430249382_Ch08.xhtml#_Fig23). Lastest configuration for an
    Oracle database


    When looking at the configuration for a database, a DBA can monitor and enforce
    the configurations of parameters associated with the initialization file (spfile),
    OS parameters, and cell configuration within Exadata or any other database. Configuration
    enforcement can be done by comparing two hosts that have the same configuration
    to identify any issues on one of the hosts. Comparison of configurations can also
    be done against a target’s saved configuration, considered the gold standard,
    to determine whether any drift exists within the target’s configuration.


    ![image](images/sq.jpg) **Tip**  Comparing target configurations or using a gold
    image for comparison requires a large amount of data. It is best to run comparisons
    during nonpeak hours.


    Oracle Enterprise Manager can also compare the configurations of multiple Exadata
    Database Machines. Capabilities such as change history tracking or configuration
    management inventory help with configuration compliance as well. Oracle Enterprise
    Manager continuously captures the change events in the Oracle Exadata and can
    also generate comprehensive reports for configuration changes with details including
    what, when, and where the changes were done and by whom.'
