    *   `Agent Configuration and Control Operations`: 这是一系列 Enterprise Manager 计划作业类型中的前两种。这些作业是在
    EM 控制台中作为代理配置或控制请求的一部分创建的。

    *   `ASM Scripts`: 自动存储管理中的许多任务被安排为 EM 控制台中的作业。这是另一种由 EM 控制台创建的作业，与通过 EM Jobs
    界面创建的作业相对。

    *   `Clone Home`: 这是最受期待的新增功能之一，这种新的作业类型允许您轻松地将现有的 Oracle 主目录克隆到一个新的 Oracle 主目录。

    *   `Database Configuration`: 另一种 EM 控制台作业类型，它可以在不要求您在目标服务器上执行任务的情况下更新数据库配置。

