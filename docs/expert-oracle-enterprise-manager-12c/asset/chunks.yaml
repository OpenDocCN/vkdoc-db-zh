    client completely, you need to execute the command emcli setup. At a minimum,
    you need to pass parameters for the EM console and username that you want to use
    for logging in with emcli (this username is the one you normally log into the
    console with), but I find it useful sometimes to include the -autologin parameter.
    This parameter ensures that you are automatically logged back in if your session
    times out.


