    | Command | Description |

    | --- | --- |

    | `emctl abortresync repos (-full|-agentlist "agent names") -name "resync name"
    [-sysman_pwd "sysman password"]` | Aborts the currently running repository resynchronization
    operation. Use the `-full` option to stop a full repository resynchronization.
    Use the `-agentlist` option to stop resync on a list of agents. |

    | `emctl config oms -change_repos_pwd [-change_in_db] [-old_pwd ] [-new_pwd ]
    [-use_sys_pwd [-sys_pwd ]]` | Changes the repository password. |

    | `emctl config oms -change_view_user_pwd [-sysman_pwd ] [-user_pwd] [-auto_generate]`
    | Changes the password of the `MGMT_VIEW` user. `-auto_generate` generates a random
    password. |

    | `emctl config oms -list_repos_details` | Shows the repository details in the
    OMS. |

    | `emctl config oms -store_repos_details (-repos_host -repos_port -repos_sid |
    -repos_conndesc ) -repos_user [-repos_pwd ] [-no_check_db]` | Changes and stores
    repository information in the OMS. |

    | `emctl delete property [-sysman_pwd "sysman password"] -name` | Removes the
    property from the `emoms.properties` file for the given property name. |

    | `emctl dump oms` | Dumps all node manager logs, admin server logs, managed server
    logs, sysman logs, and stack trace files. |

    | `emctl dump omsthread` | Dumps thread that is causing CPU spin. |

    | `emctl exportconfig oms [-sysman_pwd ] [-dir ] [-keep_host]` | Exports the configuration
    from the primary management service. |

    | `emctl get property [-sysman_pwd "sysman password"] -name` | Gets the property
    value from the `emoms.properties` file for the given property name. |

    | `emctl importconfig oms -file` | Imports the exported configuration on the standby
    management service. |

    | `emctl list oms` | Gives the OMS name configured in that local Oracle home.
    |

    | `emctl list properties [-sysman_pwd "sysman password"] [-module]` | Lists all
    the properties set from the `emoms.properties` file. |

    | `emctl resync repos -full -name "<resync name>"` | Initiates repository resync
    from one of the OMS Oracle homes. |

    | `emctl secure lock [-upload] [-console]` | Restricts HTTP access (that is, allows
    only HTTP/S access) to the management service. |

    | `emctl secure oms [-sysman_pwd ] [-reg_pwd ] [-host ] [-slb_port ] [-slb_console_port
    ] [-reset] [-console] [-lock] [-lock_console] [-secure_port ] [-upload_http_port
    ] [-root_dc ] [-root_country] [-root_email ] [-root_state ] [-root_loc] [-root_org
    ] [-root_unit ] [-wallet -trust_certs_loc ] [-wallet_pwd ] [-key_strength ] [-cert_validity
    ] [-protocol ]` | Enables the OMS to accept upload requests from agents and console
    requests in HTTP/S mode. |

    | `emctl secure setpwd [authpasswd] [newpasswd]` | Creates a new agent registration
    password. |

    | `emctl secure unlock [-upload] [-console]` | Allows nonsecured HTTP access to
    the OMS. |

    | `emctl set property [-sysman_pwd "sysman password"] -name -value[-module (default
    emoms)]` | Sets the property values in the `emoms.properties` file. |

    | `emctl start oms` | Starts the OMS in the following order: 1\. Start OPMN and
    OHS if not already up. 2\. Start the Node Manager if not running. 3\. If running
    on Admin Server, start it (if not already up). 4\. Start the managed server through
    Node Manager. |

    | `emctl status oms` | Provides the status of the OMS. Use `-details` to get detailed
    information (including secure status and protocols used). |

    | `emctl statusresync repos -name "resync name"` | Lists the status of the given
    repository resynchronization operation. |

    | `emctl stop oms [-all] [-force]` | Stops the OMS in the following order: 1\.
    Stop the OHS. 2\. Stop the OPMN. 3\. Stop the managed server. Using `-all` stops
    the OMS in the following order: 1. Stop the OHS. 2\. Stop the OPMN. 3\. Stop the
    managed server. 4\. Stop the Admin Server if running. 5\. Stop the Node Manager.
    If either stop command does not shut down the relevant processes, use `-force`
    to forcefully stop them. |


    ## OMS 目录结构


    OMS 被安装到一个 Oracle 中间件主目录中，该目录可能还包含 Oracle WebLogic Server（包括 WebLogic Server 管理控制台）、用于中间件层的
    Oracle 管理代理、管理服务实例基目录、Java 开发工具包 (JDK) 和其他配置文件。根据您在安装时的决定，其中一些目录可能位于中间件主目录之外。您需要熟悉重要的目录，以便配置、维护和故障排除
    OMS。可能以图表方式查看最为容易，因此请从查看 [图 3-17](#9781430249382_Ch03.xhtml#Fig17) 开始，它展示了示例环境中的默认中间件主目录结构。


    ![9781430249382_Fig03-17.jpg](images/9781430249382_Fig03-17.jpg)


    [图 3-17](#9781430249382_Ch03.xhtml#_Fig17). OMS 目录结构


    [表 3-4](#9781430249382_Ch03.xhtml#Tab4) 解释了这些目录各自的用途。


    [表 3-4](#9781430249382_Ch03.xhtml#_Tab4). OMS 中间件主目录及其用途


    | Directory | Description |

    | --- | --- |

    | `agent` | 包含代理代码和配置文件 |

    | `agent/agent_inst` | `<AGENT_HOME>` 目录 |

    | `agent/agent_inst/bin` | 包含在 OMS 上运行的代理的可执行代码 |

    | `agent/plugins` | 包含在代理上安装的元数据插件的配置数据 |

    | `gc_inst` | `OMS_INSTANCE_HOME` 的默认位置 |

    | `gc_inst/em/EMGC_OMS1` | `EM_INSTANCE_HOME` 的默认位置 |

    | `gc_inst/NodeManager` | 包含 EM 特定的 NodeManager 目录 |

    | `gc_inst/NodeManager/emnodemanager` | EM 特定的 NodeManager 安装位置 |

    | `gc_inst/...servers` | WebLogic 域主目录的默认位置 |

    | `gc_inst/...servers/EMGC_ADMINSERVER` | 与 EMGC_ADMINSERVER 托管服务器相关的 WLS 域文件的位置
    |

    | `gc_inst/...servers/EMGC_OMS1` | 与 EMGC_OMS1 托管服务器相关的 WLS 域文件的位置 |

    | `gc_inst/WebTierIH1` | 中间件 WebTier 实例主目录 |

    | `jdk16` | 包含 JDK 配置文件 |

    | `logs` | 包含 Fusion Middleware 文件 |

    | `modules` | 包含 Fusion Middleware 文件 |

    | `oms` | 包含 OMS 代码和配置文件 |

    | `oms/bin` | 包含 OMS 二进制文件 |

    | `oms/sysman` | 包含各种实用程序，如 `RepManager` |

    | `oms/sysman/log` | 包含与 OMS 相关的日志文件，包括 `component_info.log` |

    | `Oracle_BI1 [optional]` | 如果安装了 BI Publisher，则包含 Oracle Business Intelligence
    Publisher 配置文件 |

    | `oracle_common` | 包含 OMS、Oracle WebTier 和 WebLogic Server 使用的公共文件 |

    | `Oracle_WT` | 包含 Oracle WebTier 配置文件 |

    | `plugins` | 包含在 OMS 上安装的元数据插件的配置文件 |

    | `user_projects` | 包含 Fusion Middleware 文件 |

    | `utils` | 包含 Fusion Middleware 文件 |

    | `wlserver_10.3` | 包含 Fusion Middleware 文件 |


    ## OMS 日志与跟踪文件


    有六个主要的日志和跟踪文件用于对 OMS 问题进行故障排除。这些文件位于 OMS 实例基目录（[表 3-4](#9781430249382_Ch03.xhtml#Tab4)
    中的 `gc_inst`）下。这些文件如下：


    *   `emctl.log` 包含来自 `emctl` 命令的输出。

    *   `emctl.msg` 在 OMS 因严重错误重新启动时生成。

    *   `emoms.log` 是控制台的日志文件，包含 OMS 执行操作（如启动或停止）或生成错误时创建的信息。

    *   `emoms.trc` 包含更详细的跟踪信息，以支持故障排除错误。

    *   `emoms_pbs.log` 包含后台模块（如事件和作业系统）的错误或警告。

    *   `emoms_pbs.trc` 包含更详细的跟踪信息，以对后台模块的问题进行故障排除。'
