- fmt: 'If you have more than one `Exadata Database Machine` in `Oracle Enterprise
    Manager`, they can be monitored from a high-level view by using the `Groups` framework.
    Using this framework, you can create a management dashboard that provides a single
    consolidated view of performance and usage metrics across many `Oracle` engineered
    systems and their components.


    ## Testing Phase


    When you’re migrating or upgrading your applications to the `Oracle` engineered
    systems, you need to think about any potential impacts on response time and throughput
    of the application. Also, you need to understand all the dependencies and potential
    risks that may affect the application and plan for comprehensive testing within
    the environment to mitigate any of those risks associated with the migration.


    For a typical migration and deployment onto an engineered system, such as the
    `Oracle Exadata Database Machine`, you could consider the following three-step
    process:


    1.  Identify applications to be migrated.

    2.  Create a test environment.

    3.  Validate application performance.


    The following sections cover each of these steps.


    ## Identifying Applications to Be Migrated


    As discussed in [Chapter 5](#9781430249382_Ch05.xhtml), `Oracle Enterprise Manager
    Consolidation Planner` can be used to help identify resources that could benefit
    from consolidation. `Consolidation Planner` can also be a valuable tool when looking
    to move to an engineered system. The data collected by `EM12c` can be leveraged
    to help derive business and technical requirements to validate consolidation plans
    to an engineered system. Additionally, `Consolidation Planner` can be used to
    analyze various migrations or upgrade scenarios and identify application concerns
    that need to be addressed before a migration.


    Each consolidation scenario takes three inputs:


    *   Details of the pre-consolidation environment

    *   Technical, business, or compliance constraints

    *   Details of the destination environment


    ![image](images/sq.jpg) **Note** When creating a consolidation project as outlined
    in [Chapter 5](#9781430249382_Ch05.xhtml), you can optionally choose to generate
    three preconfigured consolidation scenarios to add to the project. These out-of-the-box
    scenarios represent conservative, aggressive, and medium consolidation schemas.


    Once you have a consolidation project (`P2P`) created for moving a physical machine
    to an `Exadata Database Machine`, you can create a custom scenario to identify
    any applications that may be affected by the consolidation. In order to create
    a scenario, you have to use `Consolidation Planner`, which is accessible from
    the `Enterprise` menu. Once `Consolidation Planner` is open, highlight the desired
    `P2P` project and click the `Create Scenario` menu item, as shown in [Figure 8-9](#9781430249382_Ch08.xhtml#Fig9).
    This opens the `Create Scenario Wizard` to allow a customer scenario to be defined.


    ![9781430249382_Fig08-09.jpg](images/9781430249382_Fig08-09.jpg)

    [Figure 8-9](#9781430249382_Ch08.xhtml#_Fig9). Creating a scenario from `Oracle
    Consolidation Planner`


    When the `Create Scenario Wizard` starts, the default name of the scenario will
    be similar to the name of the project that it is associated with.


    The first step of the `Create Scenario Wizard` is `Resources`, shown in [Figure
    8-10](#9781430249382_Ch08.xhtml#Fig10). Here you can specify scenario details,
    such as the name and description. You can also specify the resource requirements.
    Resource type(s), applicable days, time intervals, and the consolidation algorithm
    for estimating resource requirements can be defined as well. After providing all
    the resource requirements, click the `Estimate Requirements` button to show the
    requirements for the source server(s).


    ![9781430249382_Fig08-10.jpg](images/9781430249382_Fig08-10.jpg)

    [Figure 8-10](#9781430249382_Ch08.xhtml#_Fig10). Defining resources in the `Create
    Scenario Wizard`


    As you move through the wizard, you need to select servers that are compatible
    only with each other. Servers that are compatible should be consolidated together.
    On the `Constraints` screen, you have the options of specifying server properties,
    server configurations, and conditions that are requirements within your consolidation
    plan. Once all the constraints have been specified, the `Preview Effect of Constraints`
    option will be enabled and you will be able to see any incompatible servers. [Figure
    8-11](#9781430249382_Ch08.xhtml#Fig11) shows the `Constraints` screen with constraints
    defined.


    ![9781430249382_Fig08-11.jpg](images/9781430249382_Fig08-11.jpg)

    [Figure 8-11](#9781430249382_Ch08.xhtml#_Fig11). Specifying constraints in the
    `Create Scenario Wizard`


    Clicking the `Preview Effect of Constraints` button opens a dialog box that shows
    the servers that are incompatible with the target server, as you can see in [Figure
    8-12](#9781430249382_Ch08.xhtml#Fig12). If there are any incompatible servers,
    adjust the constraints until there are none.


    ![9781430249382_Fig08-12.jpg](images/9781430249382_Fig08-12.jpg)

    [Figure 8-12](#9781430249382_Ch08.xhtml#_Fig12). Incompatibilities of servers


    After resolving any incompatibilities, the wizard moves you to the `Targets Planning`
    screen. Here you can identify destination candidates for the consolidation. By
    default, `Oracle Enterprise Manager` assumes you want to consolidate to a half-rack
    of `Exadata Database Machine`. Other options are available for `Exadata Database
    Machine`, along with generic servers or even using existing servers. In sticking
    with your examples of `Exadata Database Machine`, let’s go with a full rack, as
    shown in [Figure 8-13](#9781430249382_Ch08.xhtml#Fig13). On this screen, you can
    allocate the maximum resource utilization on the destination servers.


    ![9781430249382_Fig08-13.jpg](images/9781430249382_Fig08-13.jpg)

    [Figure 8-13](#9781430249382_Ch08.xhtml#_Fig13). Setting options for destination
    servers in the `Create Scenario Wizard`


    Once you have selected your planned target, it is time to map the source server
    to the destination servers. Since you stayed with the example of `Exadata Database
    Machine`, the `Create Scenario Wizard` is using automapping for our destination
    server (see [Figure 8-14](#9781430249382_Ch08.xhtml#Fig14)).


    ![9781430249382_Fig08-14.jpg](images/9781430249382_Fig08-14.jpg)

    [Figure 8-14](#9781430249382_Ch08.xhtml#_Fig14). Mapping servers in the `Create
    Scenario Wizard`


    ![image](images/sq.jpg) **Note** On the `Targets Planning` screen, if you selected
    `Use Existing Servers`, you can manually override the automatic mapping by selecting
    a list of destination servers that correspond to the source servers.


    On the `Review` screen, the wizard lists all the items that have been selected
    throughout the wizard. At this point, you have two options: you can save the scenario
    as a template or you can submit it to begin gathering the required information.
    Once the scenario has been submitted, `Oracle Enterprise Manager` will give you
    a confirmation message, as shown in [Figure 8-15](#9781430249382_Ch08.xhtml#Fig15).


    ![9781430249382_Fig08-15.jpg](images/9781430249382_Fig08-15.jpg)

    [Figure 8-15](#9781430249382_Ch08.xhtml#_Fig15). Confirmation of the submission


    After the scenario job is completed, `Consolidation Planner` will generate a report
    and recommend an optimal consolidation plan. As you can see in [Figure 8-16](#9781430249382_Ch08.xhtml#Fig16),
    it also details how consolidated workloads would perform on target servers.


    ![9781430249382_Fig08-16.jpg](images/9781430249382_Fig08-16.jpg)

    [Figure 8-16](#9781430249382_Ch08.xhtml#_Fig16). `Consolidation Planner`’s output
    for the scenario'
  raw: 'If you have more than one Exadata Database Machine in Oracle Enterprise Manager,
    they can be monitored from a high-level view by using the Groups framework. Using
    this framework, you can create a management dashboard that provides a single consolidated
    view of performance and usage metrics across many Oracle engineered systems and
    their components.


    Testing Phase


    When you’re migrating or upgrading your applications to the Oracle engineered
    systems, you need to think about any potential impacts on response time and throughput
    of the application. Also, you need to understand all the dependencies and potential
    risks that may affect the application and plan for comprehensive testing within
    the environment to mitigate any of those risks associated with the migration.


    For a typical migration and deployment onto an engineered system, such as the
    Oracle Exadata Database Machine, you could consider the following three-step process:


    1.  Identify applications to be migrated.

    2.  Create a test environment.

    3.  Validate application performance.


    The following sections cover each of these steps.


    Identifying Applications to Be Migrated


    As discussed in [Chapter 5](#9781430249382_Ch05.xhtml), Oracle Enterprise Manager
    Consolidation Planner can be used to help identify resources that could benefit
    from consolidation. Consolidation Planner can also be a valuable tool when looking
    to move to an engineered system. The data collected by EM12c can be leveraged
    to help derive business and technical requirements to validate consolidation plans
    to an engineered system. Additionally, Consolidation Planner can be used to analyze
    various migrations or upgrade scenarios and identify application concerns that
    need to be addressed before a migration.


    Each consolidation scenario takes three inputs:


    *   Details of the pre-consolidation environment

    *   Technical, business, or compliance constraints

    *   Details of the destination environment


    ![image](images/sq.jpg) **Note**  When creating a consolidation project as outlined
    in [Chapter 5](#9781430249382_Ch05.xhtml), you can optionally choose to generate
    three preconfigured consolidation scenarios to add to the project. These out-of-the-box
    scenarios represent conservative, aggressive, and medium consolidation schemas.


    Once you have a consolidation project (P2P) created for moving a physical machine
    to an Exadata Database Machine, you can create a custom scenario to identify any
    applications that may be affected by the consolidation. In order to create a scenario,
    you have to use Consolidation Planner, which is accessible from the Enterprise
    menu. Once Consolidation Planner is open, highlight the desired P2P project and
    click the Create Scenario menu item, as shown in [Figure 8-9](#9781430249382_Ch08.xhtml#Fig9).
    This opens the Create Scenario Wizard to allow a customer scenario to be defined.


    ![9781430249382_Fig08-09.jpg](images/9781430249382_Fig08-09.jpg)


    [Figure 8-9](#9781430249382_Ch08.xhtml#_Fig9). Creating a scenario from Oracle
    Consolidation Planner


    When the Create Scenario Wizard starts, the default name of the scenario will
    be similar to the name of the project that it is associated with.


    The first step of the Create Scenario Wizard is Resources, shown in [Figure 8-10](#9781430249382_Ch08.xhtml#Fig10).
    Here you can specify scenario details, such as the name and description. You can
    also specify the resource requirements. Resource type(s), applicable days, time
    intervals, and the consolidation algorithm for estimating resource requirements
    can be defined as well. After providing all the resource requirements, click the
    Estimate Requirements button to show the requirements for the source server(s).


    ![9781430249382_Fig08-10.jpg](images/9781430249382_Fig08-10.jpg)


    [Figure 8-10](#9781430249382_Ch08.xhtml#_Fig10). Defining resources in the Create
    Scenario Wizard


    As you move through the wizard, you need to select servers that are compatible
    only with each other. Servers that are compatible should be consolidated together.
    On the Constraints screen, you have the options of specifying server properties,
    server configurations, and conditions that are requirements within your consolidation
    plan. Once all the constraints have been specified, the Preview Effect of Constraints
    option will be enabled and you will be able to see any incompatible servers. [Figure
    8-11](#9781430249382_Ch08.xhtml#Fig11) shows the Constraints screen with constraints
    defined.


    ![9781430249382_Fig08-11.jpg](images/9781430249382_Fig08-11.jpg)


    [Figure 8-11](#9781430249382_Ch08.xhtml#_Fig11). Specifying constraints in the
    Create Scenario Wizard


