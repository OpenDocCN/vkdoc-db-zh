  trans: '

    请注意，Oracle 的 `sample_host` 目标还包含定义相关链接的其他动态属性。我认为这部分示例自 10g/11g Grid Control 以来就未被移除，且现在已不再相关。在
    EM12c 之前，可扩展性框架的功能很少用于自定义目标的主页面，而向主页面的相关链接部分添加自定义链接是其中之一。EM12c 拥有丰富的目标用户界面定义选项，不再使用通过动态属性定义的相关链接，因此所有
    `sample_host` 演示目标中的这个动态属性都会被忽略，并且应该已被移除。


    ## 报告


    EM12c 提供了两种报告机制：


    *   `Information Publisher`：这与 Grid Control 10g/11g 版本中存在的机制相同，该机制拥有 `Information
    Publisher` PL/SQL API，并且过去需要使用 PL/SQL 创建报告定义。EM12c 现在的 `Information Publisher`
    报告定义是基于 XML 的，并且能够通过使用 EM12c 控制台设计报告以及通过使用 `emcli` 导出报告。为了在 10g/11g 中获得类似的功能，我不得不创建一个自定义提取器，从使用控制台
    UI 开发的报告中生成基于 PL/SQL API 的定义。EM12c 仍然会在后台将 XML 转换为 PL/SQL 调用，但与那些冗长繁琐、几乎无法在不尝试执行的情况下进行语法验证的
    PL/SQL 定义相比，XML 定义的便利性是巨大的。有关创建和自定义 `Information Publisher` 报告的详细文档（包括 XML 元素的细节），请参阅《*可扩展性程序员参考手册*》的第
    4 章。

    *   `BI Publisher`：EM12c 可以与 Oracle Business Intelligence Publisher 集成，以获得更高级的报告功能。然而，与
    `BI Publisher` 的集成可能需要为 Oracle Business Intelligence Publisher 购买许可，根据我的观察，这阻碍了
    `BI Publisher` 在 EM12c 中的采用。如果你正在为外部用户（而不仅仅是你自己的组织）开发插件，你可能不应该依赖目标 EM12c 环境中 `BI
    Publisher` 的可用性，因此请务必使用 `Information Publisher` 提供功能相当的报告。《*可扩展性程序员参考手册*》的第 5
    章提供了关于创建 `BI Publisher` 报告的非常简要的说明，但其文档质量和深度远不及 `Information Publisher` API 的文档。它还要求读者预先了解
    Oracle Business Intelligence Publisher 产品。


    尽管《*可扩展性程序员参考手册*》的第 4 章指出 `Information Publisher` 已弃用，但现实情况是，有太多现有的报告和客户依赖它，除非
    Oracle 将 `BI Publisher` 默认捆绑在 EM12c 中，否则它在 EM12c 乃至可能的后续版本中都不会消失。我个人对于插件开发的建议是，目前坚持使用
    `Information Publisher`，直到 Oracle 提供不需要与额外产品（和许可）集成的报告功能。这也确保了你的插件可以在任何 EM12c
    安装中运行，无论其是否与 `BI Publisher` 集成。本节仅涵盖 `Information Publisher` 报告。尽管《*可扩展性程序员参考手册*》的第
    5 章涵盖了部署 `BI Publisher` 报告，但没有关于如何将它们与插件归档文件打包在一起的说明。


    在 EM12c 中创建 `Information Publisher` 报告相当简单。你可以研究包含在 `oracle.samples.xsh1` 插件中、随
    `sample_host1` 目标打包的报告示例。请按照以下步骤使用 `Information Publisher` API 创建新的报告定义并将其与你的插件打包：


    1.  当插件的第一个版本（尚未包含报告）和目标类型开发并部署后，使用 EM12c 控制台的报告向导创建报告定义。这将需要创建 SQL 和/或 PL/SQL
    来查询存储库视图并以报告组件（如图表、文本标签、链接和表格）所需的格式提取信息（例如目标的指标、配置等）。在这个阶段，你将尽可能接近期望的报告，并通过迭代改进你的报告。有关可用存储库视图的文档，请参阅《*可扩展性程序员参考手册*》第
    18 章。

    2.  使用 `emcli export_report` 命令提取所设计报告的 XML 定义。

    3.  你可以修改并进一步自定义提取出的 XML 报告定义。XML 格式为报告开发者提供了 EM12c 控制台报告向导中不直接提供的额外设计功能。《*可扩展性程序员参考手册*》第
    4 章的大部分内容都致力于记录 `Information Publisher` 报告的 XML 元素，你应该将其用作参考。

    4.  最后，将创建的报告定义文件放入 `<STAGE>/oms/metadata/reports` 中，并打包新版本的插件。只要报告定义放在正确的位置，EDK
    在创建 OPAR 文件时会自动提取报告。


    当包含报告的插件部署到 OMS 上时，其报告在 EM12c 控制台的 `Information Publisher` Reports 部分作为 `SYSTEM`
    报告可用。这些报告不能被 EM12c 用户删除或修改。但是，可以克隆这些报告以创建一个副本，以便在需要时进行自定义。10g/11g Grid Control
    允许将某些 `SYSTEM` 报告标记为直接在目标主页的 Reports 选项卡中可用。此选项卡已从 EM12c 中移除，因为它提供的目标主页面 UI 自定义功能远远超过了简单嵌入报告的旧功能。


    `oracle.samples.xsh1` 插件中性能报告类别下的两个报告是很好的研究示例。该插件中的配置报告使用了虚拟数据（从 `DUAL` 表中选择常量），因此不是一个有用的研究示例。


    使用元数据注册服务 (MRS) 直接更新存储库中的报告定义而无需重新打包和重新部署插件是很有用的。有关 MRS 的更多详细信息，请参阅本章末尾。


    ## 企业配置管理


    EM12c 可扩展性框架完全支持企业配置管理 (ECM)。虽然 10g/11g Grid Control 支持 ECM 功能，但它未为第三方插件开发者记录并提供官方支持（尽管
    Oracle 自己的插件使用了 ECM）。EM12c 为 ECM 添加了基于 XML 的元数据定义，取代了笨拙的基于 PL/SQL 的定义，这为插件开发者提供了简单的支持。


    添加配置管理功能有三个步骤：

    '
- fmt: "# 1. 确定并收集配置\n\n首先，确定需要收集的配置。将配置组织在一个或多个表中，其中每个表对应一个配置项。配置项可以是单行或多行的，就像收集监控指标一样。如果定义配置的表之间存在关系，则可以定义具有层次关系的完整\
    \ ECM 模式。可以将其视为 ECM 元数据，它向 EM12c 描述配置信息，以便可以像使用开箱即用的目标一样使用它。ECM 元数据是一个 XML 文件，放置在\
    \ OMS 暂存区的 `<STAGE>/oms/metadata/snapshotlive` 目录中。基于 ECM 元数据，EM12c 会在存储库的 `SYSMAN`\
    \ 模式中创建自定义表和视图。\n\n# 2. 定义配置指标\n\n每个配置项都作为目标类型元数据 XML 文件中定义的指标进行收集，但配置指标需要特殊设置。因此，你需要在目标类型元数据中定义特殊的收集指标。\n\
    \n# 3. 定义默认收集项\n\n在默认收集元数据 XML 文件中定义特殊的默认收集项。\n\n在 EDK 提供的三个示例中，只有 `oracle.samples.xsh3`\
    \ 插件包含了完整的 ECM 实现。`oracle.samples.xsh1` 和 `oracle.samples.xsh2` 插件确实定义了配置指标，但缺少\
    \ ECM 元数据，因此不会创建存储库表，这意味着代理收集的配置信息实际上没有被加载到任何地方。忽略前两个示例插件中的指标即可。我怀疑开发人员在将演示插件拆分为多个示例时，只是忘记删除这些指标。\n\
    \n**[Listing 10-19](#9781430249382_Ch10.xhtml#list19)** 包含了来自 `oracle.samples.xsh3`\
    \ 插件的 ECM 元数据片段。此文件应放置在暂存区的 `<STAGE>/oms/metadata/snapshotlive` 中。\n\n## [Listing\
    \ 10-19](#9781430249382_Ch10.xhtml#_list19). ECM 元数据片段\n\n```xml\n<METADATAS>\n\
    \  <METADATA SNAP_TYPE=\"HostSample3Snap\" TARGET_TYPE=\"sample_host3\" VER=\"\
    1\">\n    <METADATA_UI_NAME>Hostsample Configuration Data</METADATA_UI_NAME>\n\
    \    <TABLE NAME=\"MGMT_EMX_HS_SYSTEM\" SINGLE_ROW=\"Y\">\n      <UI_NAME>Hostsample\
    \ System Configuration</UI_NAME>\n      <COLUMN NAME=\"hostname\" TYPE=\"STRING\"\
    \ TYPE_FORMAT=\"256\" IS_KEY=\"N\">Hostname</COLUMN>\n      <COLUMN NAME=\"version\"\
    \ TYPE=\"STRING\" TYPE_FORMAT=\"256\" IS_KEY=\"N\">Version</COLUMN>\n    </TABLE>\n\
    \    ...\n    <TABLE NAME=\"MGMT_EMX_HS_NET\" SINGLE_ROW=\"N\">\n      <UI_NAME>Hostsample\
    \ Network Configuration</UI_NAME>\n      <COLUMN NAME=\"net_interface\" TYPE=\"\
    STRING\" TYPE_FORMAT=\"32\" IS_KEY=\"Y\">Interface</COLUMN>\n      <COLUMN NAME=\"\
    net_mtu\" TYPE=\"NUMBER\" IS_KEY=\"N\">Maximum Transmission Unit (bytes)</COLUMN>\n\
    \      <COLUMN NAME=\"net_flag\" TYPE=\"STRING\" TYPE_FORMAT=\"16\" IS_KEY=\"\
    N\">Flag</COLUMN>\n    </TABLE>\n  </METADATA>\n</METADATAS>\n```\n\nECM 元数据包含根元素\
    \ `METADATAS`，它只是一个容器，用于包含由 `METADATA` 元素定义的一个或多个快照。一个 `METADATA` 元素必须匹配到我稍后将在默认收集元数据中定义的一个\
    \ `CollectionItem`。可以将其视为一个配置快照。\n\n每个配置快照定义一个或多个表，其中每个表匹配目标类型元数据中定义的一个配置指标。所有配置指标也必须包含在默认收集元数据中匹配的\
    \ `CollectionItem` 中。配置表和配置指标之间的列当然也必须匹配。多行表用 `SINGLE_ROW=\"N\"` 属性标记，并且必须包含至少一个使用\
    \ `IS_KEY=\"Y\"` 标记为键的列。由于你对元数据定义很熟悉，我就不逐一解释每个属性了。大多数属性都是自解释的，你可以在 *Extensibility\
    \ Programmer's Reference* 的[第 6 章](#9781430249382_Ch06.xhtml)中找到完整的细节。\n\n请注意，每次更改\
    \ ECM 元数据时，都需要增加其版本号（`VER` 属性），就像目标类型元数据一样。\n\n文档中提到了 `generate_ecm_resources`\
    \ 实用程序，它大概是 EDK 的一部分。该实用程序旨在生成配置指标模板以及相关的默认收集模板，以便所有表名、列名和其他项目都能匹配——我发现从头开始创建这些可能会相当混乱。不幸的是，在我使用的最新\
    \ EDK 发行版（随 EM12c 的 12.1.0.2 版本一起提供）中缺少这个实用程序，因此我无法利用它。\n\n# 创建目标类型元数据的配置指标\n\n\
    目标类型元数据的配置指标需要创建，如 **[Listing 10-20](#9781430249382_Ch10.xhtml#list20)** 所示。请注意，该列表只提供了相关的片段，因为\
    \ `QueryDescriptor` 元素中的 fetchlet 配置和 `Display` 元素对你来说已经很熟悉了。完整的 XML 定义可在 EDK\
    \ 示例插件中找到。\n\n## [Listing 10-20](#9781430249382_Ch10.xhtml#_list20). 配置指标片段\n\n\
    ```xml\n<Metric NAME=\"HostConfig\" TYPE=\"RAW\" CONFIG=\"TRUE\">\n  <TableDescriptor\
    \ TABLE_NAME=\"MGMT_EMX_HS_SYSTEM\">\n    <ColumnDescriptor NAME=\"hostname\"\
    \ COLUMN_NAME=\"hostname\" TYPE=\"STRING\" IS_KEY=\"FALSE\"/>\n    <ColumnDescriptor\
    \ NAME=\"version\" COLUMN_NAME=\"version\" TYPE=\"STRING\" IS_KEY=\"FALSE\"/>\n\
    \  </TableDescriptor>\n  <QueryDescriptor ...>...</QueryDescriptor>\n</Metric>\n\
    ...\n<Metric NAME=\"NetConfig\" TYPE=\"RAW\" CONFIG=\"TRUE\">\n  <TableDescriptor\
    \ TABLE_NAME=\"MGMT_EMX_HS_NET\">\n    <ColumnDescriptor NAME=\"net_interface\"\
    \ COLUMN_NAME=\"net_interface\"\n                      TYPE=\"STRING\" IS_KEY=\"\
    TRUE\"/>\n    <ColumnDescriptor NAME=\"net_mtu\" COLUMN_NAME=\"net_mtu\" TYPE=\"\
    NUMBER\" IS_KEY=\"FALSE\"/>\n    <ColumnDescriptor NAME=\"net_flag\" COLUMN_NAME=\"\
    net_flag\" TYPE=\"STRING\" IS_KEY=\"FALSE\"/>\n  </TableDescriptor>\n  <QueryDescriptor\
    \ ...>...</QueryDescriptor>\n</Metric>\n```\n\n配置指标应设置 `CONFIG=\"TRUE\"` 属性。其类型必须设置为\
    \ `\"RAW\"`，这意味着值被直接收集到存储库模式的一个表中。**[Listing 10-20](#9781430249382_Ch10.xhtml#list20)**\
    \ 中 `TableDescriptor` 的 `TABLE_NAME` 属性必须与 **[Listing 10-19](#9781430249382_Ch10.xhtml#list19)**\
    \ 中 ECM 元数据对应的 `TABLE` 元素的 `NAME` 匹配。**[Listing 10-20](#9781430249382_Ch10.xhtml#list20)**\
    \ 中 `ColumnDescriptor` 元素的 `NAME` 和 `COLUMN_NAME` 属性必须与 **[Listing 10-19](#9781430249382_Ch10.xhtml#list19)**\
    \ 中列元素的 `NAME` 属性匹配。我天真地以为只有 `COLUMN_NAME` 需要匹配，这导致了我长时间的故障排除，直到我意识到 `NAME` 属性也必须设置为相同的值。ECM\
    \ 元数据表中标记为唯一键部分的列也必须在相应的配置指标中标记为键，正如你在 `net_interface` 列中看到的那样。\n\n既然你已经理解了 ECM\
    \ 元数据的内容以及目标类型元数据中需要什么，是时候通过将所需的 `CollectionItem` 添加到默认收集元数据来完成整个画面了，如 **[Listing\
    \ 10-21](#9781430249382_Ch10.xhtml#list21)** 所示。\n\n## [Listing 10-21](#9781430249382_Ch10.xhtml#_list21).\
    \ 用于配置快照的 CollectionItem\n\n```xml\n<CollectionItem NAME=\"HostSample3Snap\" UPLOAD_ON_FETCH=\"\
    TRUE\" CONFIG=\"TRUE\">\n  <Schedule OFFSET_TYPE=\"INCREMENTAL\">\n    <IntervalSchedule\
    \ INTERVAL=\"24\" TIME_UNIT=\"Hr\"/>\n  </Schedule>\n  <MetricColl NAME=\"HostConfig\"\
    \ />\n  ...\n  <MetricColl NAME=\"NetConfig\" />\n</CollectionItem>\n```"
  raw: '1.  Determine a configuration that needs to be collected. Organize that configuration
    in one or more tables, where each table corresponds to a configuration item. Configuration
    item can be single row or multirow, just like collecting monitoring metrics. If
    tables defining a configuration have relations between them, it’s possible to
    define the full ECM schema with hierarchical relations. Think of it as ECM metadata
    describing configuration information to EM12c so that it can be used in the same
    manner as for out-of-the-box targets. ECM metadata is an XML file placed in the
    OMS staging area in the <STAGE>/oms/metadata/snapshotlive directory. Based on
    the ECM metadata, EM12c creates custom tables and views in the SYSMAN schema of
    the repository.

    2.  Each configuration item is collected as a metric defined in the target type
    metadata XML file, with special settings required for configuration metrics. Thus,
    you need to define special collection metrics in the target type metadata.

    3.  Define special default collection items in the default collection metadata
    XML file.


    Out of three examples provided in the EDK, only the oracle.samples.xsh3 plug-in
    contains complete implementation of ECM. The oracle.samples.xsh1 and oracle.samples.xsh2
    plug-ins do have configuration metrics defined but are missing ECM metadata, so
    no repository tables are created, which means configuration information gathered
    by the agent is not actually loaded anywhere. Just ignore the metrics in the first
    two sample plug-ins. I suspect the developers simply forgot to remove these metrics
    when splitting the demo plug-in into multiple examples.


    ***[Listing 10-19](#9781430249382_Ch10.xhtml#list19)*** contains the ECM metadata
    snippet from the oracle.samples.xsh3 plug-in. This file should be placed in the
    staging area in <STAGE>/oms/metadata/snapshotlive.


    ***[Listing 10-19](#9781430249382_Ch10.xhtml#_list19)***.  ECM Metadata Snippet


    ```

    <METADATAS>

      <METADATA SNAP_TYPE="HostSample3Snap" TARGET_TYPE="sample_host3" VER="1">

        <METADATA_UI_NAME>Hostsample Configuration Data</METADATA_UI_NAME>

        <TABLE NAME="MGMT_EMX_HS_SYSTEM" SINGLE_ROW="Y">

          <UI_NAME>Hostsample System Configuration</UI_NAME>

          <COLUMN NAME="hostname" TYPE="STRING" TYPE_FORMAT="256" IS_KEY="N">Hostname</COLUMN>

          <COLUMN NAME="version" TYPE="STRING" TYPE_FORMAT="256" IS_KEY="N">Version</COLUMN>

        </TABLE>

        ...

        <TABLE NAME="MGMT_EMX_HS_NET" SINGLE_ROW="N">

          <UI_NAME>Hostsample Network Configuration</UI_NAME>

          <COLUMN NAME="net_interface" TYPE="STRING" TYPE_FORMAT="32" IS_KEY="Y">Interface</COLUMN>

          <COLUMN NAME="net_mtu" TYPE="NUMBER" IS_KEY="N">Maximum Transmission Unit
    (bytes)</COLUMN>

          <COLUMN NAME="net_flag" TYPE="STRING" TYPE_FORMAT="16" IS_KEY="N">Flag</COLUMN>

        </TABLE>

      </METADATA>

    </METADATAS>

    ```


    The ECM metadata contains the root element METADATAS, which is just a container
    for one or more snapshots defined by the METADATA element. One metadata element
    must match to one CollectionItem in the default collection metadata that I will
    define later. Think of it as a configuration snapshot.


    Each configuration snapshot defines one or more tables, where each table matches
    to a configuration metric defined in the target type metadata. All configuration
    metrics also must be included in the matching CollectionItem in the default collection
    metadata. Columns between configuration tables and configuration metrics must,
    of course, match. Multirow tables are marked with the SINGLE_ROW="N" attribute
    and must contain at least one column marked as key by using IS_KEY="Y". Because
    you are comfortable with metadata definitions, I won’t go through each attribute.
    Most of them are self-explanatory, and you can find full details in [Chapter 6](#9781430249382_Ch06.xhtml)
    of the *Extensibility Programmer''s Reference*.


    Note that you need to increment the version of the ECM metadata (VER attribute)
    every time it’s changed, just as for the target type metadata.


    The documentation refers to the generate_ecm_resources utility that’s presumably
    a part of the EDK. This utility is supposed to generate a configuration metric
    template as well as an associated default collection template, so that all table
    names, columns names, and other items are matching—which I found can be quite
    confusing to create from scratch. Unfortunately, the utility is missing in the
    latest EDK distribution that I used (the one coming with the 12.1.0.2 version
    of EM12c), so I couldn’t take advantage of it.


    Configuration metrics for the target type metadata need to be created, as shown
    in [Listing 10-20](#9781430249382_Ch10.xhtml#list20). Note that the listing provides
    only relevant snippets because the fetchlet configuration in the QueryDescriptor
    elements is already familiar to you as well as Display elements. The complete
    XML definitions are available in the EDK sample plug-ins.


    ***[Listing 10-20](#9781430249382_Ch10.xhtml#_list20)***.  Configuration Metrics
    Snippet


    ```

    <Metric NAME="HostConfig" TYPE="RAW" CONFIG="TRUE">

      <TableDescriptor TABLE_NAME="MGMT_EMX_HS_SYSTEM">

        <ColumnDescriptor NAME="hostname" COLUMN_NAME="hostname" TYPE="STRING" IS_KEY="FALSE"/>

        <ColumnDescriptor NAME="version" COLUMN_NAME="version" TYPE="STRING" IS_KEY="FALSE"/>

      </TableDescriptor>

      <QueryDescriptor ...>...</QueryDescriptor>

    </Metric>

    ...

    <Metric NAME="NetConfig" TYPE="RAW" CONFIG="TRUE">

      <TableDescriptor TABLE_NAME="MGMT_EMX_HS_NET">

        <ColumnDescriptor NAME="net_interface" COLUMN_NAME="net_interface"

                          TYPE="STRING" IS_KEY="TRUE"/>

        <ColumnDescriptor NAME="net_mtu" COLUMN_NAME="net_mtu" TYPE="NUMBER" IS_KEY="FALSE"/>

        <ColumnDescriptor NAME="net_flag" COLUMN_NAME="net_flag" TYPE="STRING" IS_KEY="FALSE"/>

      </TableDescriptor>

      <QueryDescriptor ...>...</QueryDescriptor>

    </Metric>

    ```


    Configuration metrics should have the CONFIG="TRUE" attribute set. Its type must
    be set to "RAW", which means that the values are collected directly into a table
    in the repository schema. The TABLE_NAME property of the TableDescriptor from
    [Listing 10-20](#9781430249382_Ch10.xhtml#list20) must match the NAME of the corresponding
    TABLE element from the ECM metadata in [Listing 10-19](#9781430249382_Ch10.xhtml#list19).
    The attributes NAME and COLUMN_NAME of the ColumnDescriptor element in [Listing
    10-20](#9781430249382_Ch10.xhtml#list20) must match the NAME attribute of the
    column elements in [Listing 10-19](#9781430249382_Ch10.xhtml#list19). I naively
    assumed that only COLUMN_NAME needs to match, and it caused me long hours of troubleshooting
    until I realized that the NAME attribute also must be set to the same value. The
    columns marked as part of the unique key in the tables in the ECM metadata must
    also be marked as keys in the corresponding configuration metric, as you can see
    for the net_interface column.


    Now that you understand the content of ECM metadata and what’s needed in target
    type metadata, it’s time to complete the picture by adding the required CollectionItem
    to the default collection metadata, as shown in [Listing 10-21](#9781430249382_Ch10.xhtml#list21).


    ***[Listing 10-21](#9781430249382_Ch10.xhtml#_list21)***.  CollectionItem for
    Configuration Snapshot


    ```

    <CollectionItem NAME="HostSample3Snap" UPLOAD_ON_FETCH="TRUE" CONFIG="TRUE">

      <Schedule OFFSET_TYPE="INCREMENTAL">

        <IntervalSchedule INTERVAL="24" TIME_UNIT="Hr"/>

      </Schedule>

      <MetricColl NAME="HostConfig" />

      ...

      <MetricColl NAME="NetConfig" />

    </CollectionItem>

    ```'
