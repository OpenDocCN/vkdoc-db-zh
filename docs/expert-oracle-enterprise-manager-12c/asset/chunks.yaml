    ## 创建自定义视图


    你可能已经注意到，在`Incident Manager`控制台的首次截图中，在复杂环境中，你会看到大量的未解决事件，要找到你特别感兴趣的那些并不容易。值得庆幸的是，`EM12c`允许你构建自定义视图，以将你看到的事件数量限制在更易于管理的范围内。为此，点击`Incident
    Manager`控制台左侧`Views`窗格中的`Create`按钮，如图 12-25 所示。


    ![9781430249382_Fig12-25.jpg](img/9781430249382_Fig12-25.jpg)


    图 12-25. 开始创建自定义视图


    对于此特定示例，你希望构建一个过去 24 小时内未解决事件和问题的视图，因此你为这里的不同字段选择相关值。如图 12-26 所示，然后你可以点击`Get Results`按钮以确保这确实显示了你希望看到的内容。


    ![9781430249382_Fig12-26.jpg](img/9781430249382_Fig12-26.jpg)


    图 12-26. 搜索匹配自定义视图的事件


    当你对结果满意后，点击`Create View`按钮。


    当系统提示时，为自定义视图提供一个有意义的名称，如图 12-27 所示。


    ![9781430249382_Fig12-27.jpg](img/9781430249382_Fig12-27.jpg)


    图 12-27. 为自定义视图输入视图名称


    现在你将在左侧的自定义视图列表中看到该视图，如图 12-28 所示。


    ![9781430249382_Fig12-28.jpg](img/9781430249382_Fig12-28.jpg)


    图 12-28. 选择你刚创建的自定义视图


    ## 规则与通知的优先级


    在某些情况下，你的`EM12c`站点可能处于高负载状态。在这些情况下，更重要的事件和事件会优先于其他事件进行处理。在确定处理优先级时会考虑两个因素。


    第一个是目标的生命周期状态，优先级基于以下顺序：关键任务目标具有最高优先级，其次是生产、阶段和测试目标，然后开发目标的优先级最低。作为管理员，你的职责之一是为每个目标适当设置生命周期状态。此处显示的状态是产品附带的开箱即用状态。


    第二个因素是事件或事件的类型。任何与可用性相关的事件或事件，例如目标宕机，始终设置为最高优先级。接下来，处理任何严重级别为关键或警告的事件或事件，最后，任何仅信息性的事件被视为最低优先级。'
- fmt: 'This prioritization is taken into account only when the system is under heavy
    load. When the system is under normal load, events and incidents are handled as
    they arrive.


    ## Backward Compatibility


    As far as backward compatibility is concerned, when you migrate from earlier releases
    to `EM12c`, backward compatibility for notifications is provided. If you have
    created any notifications based on `PL/SQL`, operating system scripts, or `SNMP`
    traps, these notification methods will be migrated and continue to work in `EM12c`.


    However, Oracle does encourage you to create new versions of these notification
    methods by using the new event model so you can leverage the new features we have
    been discussing. If you have created notification rules in earlier releases, Oracle
    will migrate those to incident rule sets in the new release as part of the upgrade
    process.


    Let’s look at an example of how this mapping of notification rules to incident
    rule sets is done. [Figure 12-29](#9781430249382_Ch12.xhtml#Fig29) shows an `Enterprise
    Manager` 11.1 notification rule that applies to the group `PROD-GROUP` and the
    database target in that group.


    ![9781430249382_Fig12-29.jpg](images/9781430249382_Fig12-29.jpg)


    [Figure 12-29](#9781430249382_Ch12.xhtml#_Fig29). Mapping a notification rule
    to an incident rule set


    If you’re familiar with notification rules in the earlier release, you’ll be aware
    of the tabs in the notification rule setup. In our example, the `Availability`
    tab shows the criteria of `Database Down` chosen, and the `Metric` tab shows selected
    metrics of interest and their severity. Finally, the action is set to e-mail two
    users, `user1` and `user2`.


    When this is migrated to an incident rule set in `EM12c`, the rule set is applied
    to the same target (the group `PROD-GROUP`) and it will be of type `Enterprise`.
    An event rule will be created in the rule set to cover the criteria for the target
    availability specified in the notification rule. In the notification rule, the
    criterion is `Database Down`. In the incident rule set, that translates to criteria
    where the event type is target availability, the target type is database, and
    the target status is down, and because the action in the notification rule is
    to e-mail the users, that action is carried over into the incident rule set as
    well. In addition, an incident object is created for this particular event. For
    the metrics you may have selected on the `Metrics` tab in your notification rule,
    a metric alert rule is created where the criteria is as follows: event type is
    metric alert, target type is database, and specific criteria are set for the metric
    alerts as well. The action here again is carried over to e-mail the users, and
    in addition an incident is created for this event.


    ## Incident Manager Guidelines


    Now that you’ve seen how to use the `Incident Manager` functionality in the `EM12c`
    release, let’s examine some suggested guidelines on how to get the most out of
    this functionality. Before we do that, however, it is best to define some goals
    that you might want to reach to ensure scalable, smarter monitoring with `Incident
    Manager`. At a high level, these goals might be defined as follows:


    ### Meeting your monitoring requirements.

    These will, of course, vary from customer to customer, but in general terms, this
    means that appropriate notifications must be sent and incident management operational
    processes must be followed. The easiest way of doing this is by deploying monitoring
    standards.


    ### Comply with security practices.

    Ensure that you follow the principle of least privilege when granting target privileges.
    In other words, grant only the level of privilege that is needed to perform the
    required monitoring.


    ### Ease of management.

    It is important that your infrastructure does not become an administrative headache,
    so make the best use of administrative groups so you can manage “many as one,”
    while requiring minimal effort to monitor new targets.


    Setting up target monitoring and roles for target privileges have been covered
    in [Chapter 7](#9781430249382_Ch07.xhtml), so let’s just look at suggested guidelines
    for setting up rules to manage incidents.


    ## Managing Events and Incidents


    One of the first considerations when managing events and incidents is to control
    events at the source. Just as in performance management, where you want to ensure
    that only the work that needs to be done is actually done, in `Incident Manager`
    it makes sense to have only those events and incidents occur that you want to
    respond to. Unnecessary events put an unnecessary load on your system. The following
    are some things you may want to consider toward this end:


    *   Review your metric settings. It may seem obvious, but ensure that you set
    thresholds only on metrics that you actually care about.

    *   Adjust your metric thresholds based on metric trends. One of the more important
    actions you can perform with your monitoring system is to track metric trends
    for some period of time (how long will depend on how much history you might already
    have, as well as how frequently metrics are measured) so you can take some intelligent
    decisions on what metrics are important (which can then feed back into the previous
    bullet) as well as what levels your thresholds should be set at.

    *   Set the number of occurrences appropriately. If some events occur only once
    or twice, for example, you might not need to be notified of them. You can set
    the number of occurrences of a metric that must be reached before you are notified.

    *   Use corrective actions to autoclear metric alerts. Depending on the metric
    itself, you may be able to define a corrective action that will take place automatically
    to resolve the issue. This will autoclear the metric alert so you do not need
    to take action. You might also want to consider creating a rule that clears events
    for all metric alerts if the event has been open for a certain number of days.

    *   Disable metric collection for those metrics that you might not care about.
    Once you have the history information discussed in the second bullet, you can
    use that to not only set metric thresholds but to disable those metrics that may
    not be important in your particular environment.

    *   Define metric settings in monitoring templates, and use those templates in
    monitoring collections. This will allow you to take full advantage of administration
    groups, lessening the amount of work involved for you when new targets are added
    to your environment or when threshold values need to be adjusted.


    ## Rule Set Recommendations


    In terms of recommendations for rule sets, let’s start off with some general recommendations.
    First, as just discussed, it is strongly recommended to use a group as the target
    for a rule set. You want to put together all the rules that pertain to members
    of that group in the same rule set. Then as much as possible, take advantage of
    the fact that you can control the execution order of the rules within the rule
    set.


    When you create a rule in a rule set within `EM12c`, you’ll notice three types
    of rules. Let’s look at specific recommendations on how you would use these types.
    For rules that operate on events, the use case is to create incidents for the
    alerts or events that are managed in `Enterprise Manager`. If you want to use
    a ticketing connector in `Enterprise Manager` to create tickets for these incidents,
    use rules on events to do so, by using the rule actions to first create an incident
    on the event and then create a ticket for the incident. Another use case for rules
    on events would be to simply send events to third-party management systems using
    event connectors. The final scenario would be to only send notifications on events
    rather than creating incidents, as you could in earlier releases.'
