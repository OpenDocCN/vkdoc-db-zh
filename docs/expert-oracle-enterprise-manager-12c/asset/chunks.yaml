    \ Enterprise Manager Cloud Control 12c Administrator’s Guide*.\n\nStandby Management\
    \ Server Installation\n\nTo install a standby management server, you perform a\
    \ software-only installation by using either a modified version of the Add Management\
    \ Service deployment procedures from the Procedure Library or Oracle Universal\
    \ Installer. The next example walks you through the steps used in the former method.\n\
