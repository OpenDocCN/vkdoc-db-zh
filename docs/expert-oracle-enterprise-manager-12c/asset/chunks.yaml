  trans: "\n以下示例展示了 Linux 服务器上`/etc/fstab`文件中的一个条目；NFS 共享被挂载在名为`filer1`的文件器上的`/vol1/oms_share`目录下。\n\
    \n```\nfiler:/vol1/oms_share /u01/app/oms_share nfs rw,bg,rsize=32768,wsize=32768,hard,nointr,tcp,noac,vers=3,timeo=600\
    \ 0 0\n```\n\n2.  在共享文件系统上安装 OMS 的二进制文件以及库存。\n3.  使用 Oracle Clusterware 或第三方软件和硬件设置虚拟主机名和\
    \ IP 地址（VIP）。通过将 OMS 的虚拟主机名与一个解析到该主机名的唯一 IP 地址一起使用来实现故障转移。\n4.  使用带有 Data Guard\
    \ 的本地物理备用数据库配置仓库数据库（参见图 13-5）。\n\n![9781430249382_Fig13-05.jpg](img/9781430249382_Fig13-05.jpg)\n\
    \n图 13-5. 具有主动/被动 OMS 和本地备用的 2 级 Enterprise Manager Cloud Control 12c 高可用性配置\n\
    \n在我们的示例中，我们将使用 Oracle Clusterware 来创建和管理虚拟主机名，并执行应用程序的故障转移。`OCFS2`被选为共享文件系统。\n\
    \n![image](img/sq.jpg) **注意** `OCFS v1`不支持作为 OMS 的共享存储。\n\n在安装管理服务之前，您应在所有主机上配置以下先决条件：\n\
    \n1.  确保安装 OMS 的每台主机上的操作系统用户 ID 相同。\n\n![image](img/sq.jpg) **注意** 对于 Red Hat\
    \ Enterprise Linux 和 Oracle Linux 操作系统，请安装`oracle-validated`或`oracle-preinstall-11gr2`软件包以确保\
    \ UID 和 GID 的一致性。\n\n```\n[oracle@oms1 ∼]$ id -a\nuid=1101(oracle) gid=1000(oinstall)\
    \ groups=1000(oinstall),1021(asmdba),1032(dba)\n```\n\n2.  设置环境变量。\n    *   a.\
    \ 操作系统时区变量`TZ`:³\n\n    ```\n    export TZ='America/New_York'\n    ```\n\n   \
    \ *   b. 应取消设置`PERL5LIB`变量，以避免关联到错误的 PERL 库。\n3.  在两台服务器上安装 Oracle Clusterware（参见*Oracle\
    \ Grid Infrastructure Installation Guide*）。\n4.  安装并配置`OCFS2`。\n5.  准备数据库以供`OMS`使用（更多信息参见第\
    \ 2 章）。\n\n在安装`OMS`之前，应有一个映射到唯一静态 IP 地址的虚拟主机名可用（这意味着一个当前未使用、与 Enterprise Manager\
    \ 其他组件在同一子网中的 IP 地址）。VIP 配置在用于访问服务器的公共子网上。如果托管 VIP 的服务器宕机，Oracle Clusterware 会将其重新定位到集群中可用的成员。同样，如果需要对托管\
    \ VIP 的服务器进行维护，也可以将其重新定位到集群中的另一台服务器。\n\n可以像创建任何其他 Clusterware 资源一样创建 VIP。但是，Oracle\
    \ 建议您使用 Oracle Clusterware 11gR2 中的`appvipcfg`实用程序来创建应用 VIP。VIP 是使用一组适用于应用 VIP\
    \ 的预定义设置创建的，例如放置策略和回退⁴选项。有关使用`appvipcfg`的详细信息，请参阅*Oracle Clusterware Administration\
    \ and Deployment Guide11gR2*文档。\n\n按照以下步骤，为`OMS`创建一个应用 VIP：\n\n1.  安装 Oracle Clusterware\
    \ 11gR2 后，以`ROOT`用户登录并执行以下命令：\n\n    ```\n    GRID_HOME/bin/appvipcfg create -network=1\
    \ \\\n           -ip=192.168.1.0 \\\n           -vipname=omsvip \\\n         \
    \  -user=root\n    ```\n\n运行`appvipcfg`的示例输出如下：\n\n```\n[root@oms1 bin]# /u01/app/11.2.0/grid/bin/appvipcfg\
    \ create -network=1 \\\n-ip=192.168.1.0 \\\n-vipname=omsvip \\\n-user=root\nProduction\
    \ Copyright 2007, 2008, Oracle.All rights reserved\n2012-10-28 03:30:29: Creating\
    \ Resource Type\n2012-10-28 03:30:29: Executing /u01/app/11.2.0/grid/bin/crsctl\
    \ add type\napp.appvip_net1.type -basetype ora.cluster_vip_net1.type -file\n/u01/app/11.2.0/grid/crs/template/appvip.type\n\
    2012-10-28 03:30:29: Executing cmd: /u01/app/11.2.0/grid/bin/crsctl add type\n\
    app.appvip_net1.type -basetype ora.cluster_vip_net1.type -file\n/u01/app/11.2.0/grid/crs/template/appvip.type\n\
    2012-10-28 03:30:37: Create the Resource\n2012-10-28 03:30:37: Executing /u01/app/11.2.0/grid/bin/crsctl\
    \ add resource\nomsvip -type app.appvip_net1.type -attr\n\"USR_ORA_VIP=192.168.1.0,START_DEPENDENCIES=hard(ora.net1.network)\n\
    pullup(ora.net1.network),STOP_DEPENDENCIES=hard(ora.net1.network),\nACL='owner:root:rwx,pgrp:root:r-x,other::r--,user:root:r-x',\n\
    HOSTING_MEMBERS=oms1.example.com,APPSVIP_FAILBACK=\"\n2012-10-28 03:30:37: Executing\
    \ cmd: /u01/app/11.2.0/grid/bin/crsctl add\nresource omsvip -type app.appvip_net1.type\
    \ -attr\n\"USR_ORA_VIP=192.168.1.0,START_DEPENDENCIES=hard(ora.net1.network)\n\
    pullup(ora.net1.network),STOP_DEPENDENCIES=hard(ora.net1.network),\nACL='owner:root:rwx,pgrp:root:r-x,other::r--,user:root:r-x',\n\
    HOSTING_MEMBERS=oms1.example.com,APPSVIP_FAILBACK=\"\n```\n\n这将在网络 1 上创建一个 VIP，定义为\
    \ IP 地址`192.168.1.0`。VIP 名称为`omsvip`，由`ROOT`用户所有。\n\n2.  接下来，您需要允许 Oracle Grid\
    \ Infrastructure 软件所有者（例如`GRID`）运行脚本来启动 VIP。作为`ROOT`，执行以下命令：\n\n    ```\n    GRID_HOME/bin/crsctl\
    \ setperm resource omsvip -u user:grid:r-x\n    ```\n\n3.  以`GRID`用户身份启动 VIP。\n\
    \n    ```\n    GRID_HOME/bin/crsctl start resource omsvip\n    ```\n\n例如：\n\n\
    ```\n[grid@oms1 ∼]$ $GRID_HOME/bin/crsctl start resource omsvip\nCRS-2672: Attempting\
    \ to start 'omsvip' on 'oms1'\nCRS-2676: Start of 'omsvip' on 'oms1' succeeded\n\
    ```\n\n4.  检查 VIP 的状态。\n\n    ```\n    GRID_HOME/bin/crsctl status resource omsvip\n\
    \    ```\n\n输出状态应类似于以下内容：\n\n```\nNAME=omsvip\nTYPE=app.appvip_net1.type\nTARGET=ONLINE\n\
    STATE=ONLINE on oms1\n```\n\n5.  在 DNS 中定义虚拟主机名，并且应解析到使用上述步骤创建的应用 VIP 地址。使用`nslookup`或`dig`命令检查虚拟主机名和\
    \ VIP 是否可解析。\n\n    ```\n    $ nslookup omsvip\n    ```\n\n这应该解析到集群中每个节点上虚拟主机名的唯一\
    \ IP 地址。\n\n6.  同时对 IP 地址进行反向查找。\n\n    ```\n    $nslookup <virtual IP address>\n\
    \    ```\n\n7.  验证从`nslookup`输出返回的 IP 地址是否在`OMS`主机上运行。\n\n    ```\n    ifconfig\
    \ –a|grep <virtual IP address>\n    ```\n\n8.  验证虚拟主机名和 VIP 已正确配置后，您就可以继续进行`OMS`安装了。在启动安装程序之前应执行以下操作：\n\
    \    *   a. 在所有集群节点的共享存储上为`OMS`创建一个新的`ORACLE_HOME`：\n\n        ```\n        $\
    \ mkdir –p /u01/app/oms_share\n        ```\n\n    *   b. 在所有节点上的`OMS`的`ORACLE_HOME`下创建\
    \ Oracle 库存目录：\n\n        ```\n        $ mkdir /u01/app/oms_share/oraInventory\n\
    \        ```\n\n    *   c. 在`oraInventory`目录中创建库存指针：\n\n        ```\n        $\
    \ vi oraInst.loc\n        ```\n\n`oraInst.loc`文件应包含`OMS`的库存路径和软件所有者的组。例如：\n\n\
    ```\ninventory_loc=/u01/app/oracle/oms_share/oraInventory\ninst_group=oinstall\n\
    ```\n\n9.  接下来，通过指定`ORACLE_HOSTNAME`环境变量为您的虚拟主机名，并指向共享库存位置，来进行安装。\n"
- fmt: "```\nrunInstaller -invPtrloc /u01/app/oms_share/oraInst.loc \\\nORACLE_HOSTNAME=omsvip.example.com\
    \ –debug\n```\n\n## 在第一台主机上安装 OMS\n\n按照《Oracle Enterprise Manager Cloud Control\
    \ 12c Basic Installation Guide》中描述的安装步骤，在第一台主机上安装 OMS。您只需要完成一次安装。由于位置是共享的，二进制文件将可以从共享文件系统的另一台主机访问。\n\
    \nOMS 成功安装并启动运行后，如果主机宕机，VIP 会自动迁移到另一个节点。然后，您可以在集群中任何运行 VIP 的剩余节点上手动启动管理服务。\n\n\
    ### 手动迁移 VIP\n\n要将 VIP 手动迁移到集群中的另一台主机，请执行以下命令：\n\n```\n[grid@oms1 ∼]$ crsctl relocate\
    \ res omsvip\nCRS-2673: Attempting to stop 'omsvip' on 'oms1'\nCRS-2677: Stop\
    \ of 'omsvip' on 'oms1' succeeded\nCRS-2672: Attempting to start 'omsvip' on 'oms2'\n\
    CRS-2676: Start of 'omsvip' on 'oms2' succeeded\n```\n\n### 检查迁移后的主机\n\n1.  检查与\
    \ VIP 关联的 IP 地址是否在迁移后的主机上运行。\n\n```\nifconfig –a|grep <vip>\n```\n\n存储库数据库应可从集群中的其他主机访问，并且监听器应已启动并运行。\n\
    \n2.  将 `ORACLE_HOSTNAME` 环境变量设置为虚拟主机名。沿用我们的示例，使用以下命令：\n\n```\nexport ORACLE_HOSTNAME=omsvip.example.com\n\
    ```\n\n3.  在新节点上启动 OMS。\n\n```\n$OMS_HOME/bin/emctl start oms\n```\n\n或者，可以通过创建\
    \ `start`、`check`、`stop`、`clean` 和 `abort` 例程来配置 Oracle Clusterware 以完全管理 OMS，这些例程告诉它如何对\
    \ OMS 进行操作。此配置的详细信息超出了本章的范围。有关详细信息，请参阅《Oracle Clusterware Administration and Deployment\
    \ Guide 11gR2》。\n\n## 为 OMS 实施冷故障切换\n\n为 OMS 实施冷故障切换解决方案后，您就受到了保护，免受单台主机故障的影响。然而，执行故障切换的时间可能从几分钟到几小时不等，具体取决于是手动完成还是通过\
    \ Oracle Clusterware 或其他方法自动完成。\n\n存储库也需要受到保护，因为它现在是一个单点故障。如前所述，强烈建议设置一个本地 Data\
    \ Guard，包含一个物理备用数据库。备用数据库应配置在与管理服务器和主数据库分离的主机上。但是，为了降低成本，也有可能在另一台 OMS 主机上创建主数据库和物理备用数据库。如果主存储库发生计划内或计划外的中断，物理备用数据库可以在剩余的主机上切换或故障转移到备用数据库。请注意，该主机现在将成为一个单点故障。\n\
    \n### 使用 Enterprise Manager 创建备用数据库的前提条件\n\n要使用 Enterprise Manager 创建备用数据库，目标主机应安装有\
    \ Oracle Management Agent，并由 Enterprise Manager 进行监控。此外，如果使用 ASM 作为数据库存储，它应与监听器一起被监控。\n\
    \n### 使用 Enterprise Manager 创建备用数据库的步骤\n\n1.  导航到存储库数据库主页，从菜单中选择 **Availability**\
    \ > **Add Standby**。\n2.  备份主数据库（参见图 13-6）。Data Guard 使用 RMAN 基于新的或现有的备份创建备用数据库。联机备份要求数据库处于\
    \ `ARCHIVELOG` 模式。\n\n![9781430249382_Fig13-06.jpg](images/9781430249382_Fig13-06.jpg)\n\
    \n图 13-6.  使用 RMAN 联机备份添加备用数据库\n\n如果使用联机方法，请在高峰时段之外的时间执行备份，以免对 Enterprise Manager\
    \ Cloud Control 的性能产生负面影响。使用此方法时，您还可以决定使用 RMAN 的功能通过 Oracle Net Services 将备份直接复制到目标主机，或者在复制前暂存备份。后一种选项需要在主站点和辅助站点都有额外的存储空间。如果存在常规备份过程或先前的“添加备用数据库”操作产生的现有备份，也可以使用它。\n\
    \n3.  接下来，您将选择一个备份选项。如图 13-7 所示，您提供 RMAN 将使用的并行度以及主主机的凭据。备用数据库将需要备用重做日志以进行实时应用。在发生角色转换时，它们也会在主数据库上创建。您可以为备用重做日志使用\
    \ OMF（默认）或手动指定日志文件。对于使用 ASM 的数据库，请提供磁盘组名称。\n\n![9781430249382_Fig13-07.jpg](images/9781430249382_Fig13-07.jpg)\n\
    \n图 13-7.  添加备用数据库，备份选项\n\n4.  添加用于在备用数据库上存储数据库文件和快速恢复区的文件位置，如图 13-8 所示。如果使用 ASM，请指定磁盘组。\n\
    \n![9781430249382_Fig13-08.jpg](images/9781430249382_Fig13-08.jpg)\n\n图 13-8.\
    \  添加备用数据库，文件位置\n\n5.  选择备用数据库的配置属性，如图 13-9 所示。\n\n![9781430249382_Fig13-09.jpg](images/9781430249382_Fig13-09.jpg)\n\
    \n图 13-9.  添加备用数据库，配置\n\n如果备用服务器上配置了 Oracle Restart[^5]，请为其启用配置：\n    *   a. \
    \ 为备用数据库提供一个唯一的名称，并为 Enterprise Manager 中的目标提供一个名称。\n    *   b.  通过选择 **Use SYSDBA\
    \ Monitoring Credentials** 复选框来指定 Enterprise Manager 要使用的监控凭据。这是因为备用数据库在重做应用期间将处于\
    \ `mounted` 状态。使用 `SYSDBA` 角色将使更多监控信息可用。\n    *   c.  选择 **Use Data Guard Broker**\
    \ 复选框以启用使用 Data Guard Broker 管理主数据库和备用数据库。它简化了 Data Guard 配置中主数据库和备用数据库的管理，包括角色转换和健康检查。Data\
    \ Guard 需要一个连接标识符来与所有主数据库和备用数据库进行通信。提供一个供 Data Guard 使用的连接描述符。可以使用 Enterprise\
    \ Manager 连接描述符或现有的服务名。\n6.  在下一个屏幕（如图 13-10 所示）上查看您的选项，然后单击 **Finish** 按钮。\n\n\
    ![9781430249382_Fig13-10.jpg](images/9781430249382_Fig13-10.jpg)\n\n图 13-10. \
    \ 添加备用数据库，复查\n\n7.  将创建一个作业来构建备用数据库。单击作业名称以查看步骤和输出，如图 13-11 所示。\n\n![9781430249382_Fig13-11.jpg](images/9781430249382_Fig13-11.jpg)\n\
    \n图 13-11.  Data Guard 作业创建\n\n### 管理备用数据库\n\n备用数据库成功创建后，您将能够通过 Enterprise Manager\
    \ 控制台管理它。从存储库数据库主页中，选择 **Availability** > **Data Guard Administration**，如图 13-12\
    \ 所示。\n\n![9781430249382_Fig13-12.jpg](images/9781430249382_Fig13-12.jpg)\n\n\
    图 13-12.  Data Guard 管理选项\n\n[^5]: Oracle Restart 是一项功能，可在单个服务器上为 Oracle 实例、监听器和其他相关组件提供高可用性。"
  raw: "```\n    runInstaller -invPtrloc /u01/app/oms_share/oraInst.loc \\\n    ORACLE_HOSTNAME=omsvip.example.com\
    \ –debug\n    ```\n\n10.  Install the OMS on the first host by following the installation\
    \ steps as described in the *Oracle Enterprise Manager Cloud Control 12c Basic\
    \ Installation Guide*. You need to complete the installation only once. Because\
    \ the location is shared, the binaries will be accessible from another host that\
    \ shares the filesystem.\n\nAfter the OMS has been successfully installed and\
    \ is up and running, if the host were to go down, then the VIP would be automatically\
    \ relocated to another node. The management service can then be manually started\
    \ on any remaining node in the cluster on which the VIP is running.\n\n1.  To\
    \ manually relocate the VIP to another host in the cluster, issue the following\
    \ command:\n\n```\n    [grid@oms1 ∼]$ crsctl relocate res omsvip\n    CRS-2673:\
    \ Attempting to stop 'omsvip' on 'oms1'\n    CRS-2677: Stop of 'omsvip' on 'oms1'\
    \ succeeded\n    CRS-2672: Attempting to start 'omsvip' on 'oms2'\n    CRS-2676:\
    \ Start of 'omsvip' on 'oms2' succeeded\n    ```\n\n2.  Check whether the IP address\
    \ associated with the VIP is running on the relocated host.\n\n```\n    ifconfig\
    \ –a|grep <vip>\n    ```\n\nThe repository database should be reachable from other\
    \ hosts in the cluster, and the listener should be up and running.\n\n3.  Set\
    \ the ORACLE_HOSTNAME environment variable to the virtual hostname. Continuing\
    \ with our example, we use the following command:\n\n```\n    export ORACLE_HOSTNAME=omsvip.example.com\n\
    \    ```\n\n4.  Start the OMS on the new node.\n\n```\n    $OMS_HOME/bin/emctl\
    \ start oms\n    ```\n\nAlternatively, Oracle Clusterware can be configured to\
    \ fully manage the OMS by creating start, check, stop, clean, and abort routines\
    \ that tell it how to operate on the OMS. Details on this configuration are outside\
    \ the scope of this chapter. See the *Oracle Clusterware  Administration and Deployment\
    \ Guide 11gR2* for details.\n\nWith a cold-failover solution in place for the\
    \ OMS, you are protected from the failure of a single host. However, time to perform\
    \ failover could range from a few minutes to hours, depending on whether it is\
    \ done manually or automated via Oracle Clusterware or other methods. The repository\
    \ also needs to be protected, as it is now a single point of failure. As mentioned\
    \ earlier, a local Data Guard setup consisting of a single physical standby is\
    \ highly recommended. The standby database should be configured on a separate\
    \ host from the management servers and primary database. However, it may be possible\
    \ to create both the primary and the physical standby on another OMS host to keep\
    \ costs down. In the event of a planned or unplanned outage of the primary repository,\
    \ the physical standby can be switched or failed over to the standby on a remaining\
    \ host. Please note that the host will now become a single point of failure.\n\
    \nAs a prerequisite to creating a standby database using Enterprise Manager, the\
    \ destination host should have an Oracle Management Agent installed and should\
    \ be monitored by Enterprise Manager. Also, if ASM is used as database storage,\
    \ it should be monitored along with the listener.\n\nTo create a standby database\
    \ using Enterprise Manager, use these steps:\n\n1.  Navigate to the repository\
    \ database home page and choose Availability ä Add Standby from the menu.\n2.\
    \  Back up the primary database (see [Figure 13-6](#9781430249382_Ch13.xhtml#Fig6)).\
    \ Data Guard uses RMAN to create the standby database based on either a new or\
    \ existing backup. An online backup requires that the database be in ARCHIVELOG\
    \ mode.\n\n![9781430249382_Fig13-06.jpg](images/9781430249382_Fig13-06.jpg)\n\n\
    [Figure 13-6](#9781430249382_Ch13.xhtml#_Fig6) .  Adding a standby database by\
    \ using a RMAN online backup\n\nIf using the online method, perform the backup\
    \ at a time outside peak hours so that performance of Enterprise Manager Cloud\
    \ Control is not negatively impacted. When using this method, you can also decide\
    \ to use RMAN’s feature to copy backups directly to the destination host using\
    \ Oracle Net Services or stage the backups before copying. The latter option requires\
    \ additional storage at both the primary and secondary sites. If there is an existing\
    \ backup as a result of routine backup procedures or from a previous Add Standby\
    \ Database operation, it may be used as well.\n\n3.  Next you’ll select a backup\
    \ option. As you can see in [Figure 13-7](#9781430249382_Ch13.xhtml#Fig7), you\
    \ provide the degree of parallelism RMAN will use, as well as the credentials\
    \ for the primary host. The standby database will require standby redo logs for\
    \ real-time apply. They will be created on the primary database as well in the\
    \ event of a role transition. You may use OMF for the standby redo logs (default)\
    \ or manually specify the log files. For databases using ASM, supply the disk\
    \ group name.\n\n![9781430249382_Fig13-07.jpg](images/9781430249382_Fig13-07.jpg)\n\
    \n[Figure 13-7](#9781430249382_Ch13.xhtml#_Fig7) .  Add Standby Database, Backup\
    \ Options\n\n4.  Add the file locations for storing database files and the Fast\
    \ Recovery Area on the standby, as shown in [Figure 13-8](#9781430249382_Ch13.xhtml#Fig8).\
    \ If using ASM, specify the disk groups.\n\n![9781430249382_Fig13-08.jpg](images/9781430249382_Fig13-08.jpg)\n\
    \n[Figure 13-8](#9781430249382_Ch13.xhtml#_Fig8) .  Add Standby Database, File\
    \ Locations\n\n5.  Choose configuration properties of the standby database, as\
    \ shown in [Figure 13-9](#9781430249382_Ch13.xhtml#Fig9).\n\n![9781430249382_Fig13-09.jpg](images/9781430249382_Fig13-09.jpg)\n\
    \n[Figure 13-9](#9781430249382_Ch13.xhtml#_Fig9) .  Add Standby Database, Configuration\n\
    \nIf Oracle Restart[⁵](#9781430249382_Ch13.xhtml#Fn5) is configured on the standby\
    \ server, enable it for the configuration:\n\n*   a.   Provide a unique name for\
    \ the standby database and a name for the target in Enterprise Manager.\n    *\
    \   b.   Specify the monitoring credentials to be used by Enterprise Manager by\
    \ selecting the Use SYSDBA Monitoring Credentials check box. This is because the\
    \ standby database will be in mounted state while the redo is being applied. Using\
    \ the SYSDBA role will enable more monitoring information to become available.\n\
    \    *   c.   Select the Use Data Guard Broker check box to enable management\
    \ of the primary and standby using the Data Guard Broker. It simplifies the management\
    \ of primary and standby databases in a Data Guard configuration, including role\
    \ transitions and health checks. A connect identifier is required by Data Guard\
    \ for all communication with the primary and standby databases. Provide a connect\
    \ descriptor to be used by Data Guard. Either the Enterprise Manager connect descriptor\
    \ or an existing service name can be used.\n6.  Review your options on the next\
    \ screen, shown in [Figure 13-10](#9781430249382_Ch13.xhtml#Fig10), and then click\
    \ the Finish button.\n\n![9781430249382_Fig13-10.jpg](images/9781430249382_Fig13-10.jpg)\n\
    \n[Figure 13-10](#9781430249382_Ch13.xhtml#_Fig10) .  Add Standby Database, Review\n\
    \n7.  A job is created to build the standby database. Click the job name to view\
    \ the steps and output, as shown in  [Figure 13-11](#9781430249382_Ch13.xhtml#Fig11).\n\
    \n![9781430249382_Fig13-11.jpg](images/9781430249382_Fig13-11.jpg)\n\n[Figure\
    \ 13-11](#9781430249382_Ch13.xhtml#_Fig11) .  Data Guard job creation\n\nAfter\
    \ the standby database has been successfully created, you will be able to manage\
    \ it via the Enterprise Manager console. From the repository database home page,\
    \ choose Availability ![arrow](images/arrow.jpg) Data Guard Administration, as\
    \ shown in [Figure 13-12](#9781430249382_Ch13.xhtml#Fig12).\n\n![9781430249382_Fig13-12.jpg](images/9781430249382_Fig13-12.jpg)\n\
    \n[Figure 13-12](#9781430249382_Ch13.xhtml#_Fig12) .  Data Guard Administration\
    \ option"
  trans: "\n```\nrunInstaller -invPtrloc /u01/app/oms_share/oraInst.loc \\\nORACLE_HOSTNAME=omsvip.example.com\
    \ –debug\n```\n\n## 在第一台主机上安装 OMS\n\n按照《Oracle Enterprise Manager Cloud Control\
    \ 12c 基础安装指南》中描述的安装步骤，在第一台主机上安装 OMS。您只需要完成一次安装。由于位置是共享的，二进制文件将可以从共享文件系统的另一台主机访问。\n\
    \nOMS 成功安装并启动运行后，如果主机宕机，VIP 会自动迁移到另一个节点。然后，您可以在集群中任何运行 VIP 的剩余节点上手动启动管理服务。\n\n\
    ### 手动迁移 VIP\n\n要将 VIP 手动迁移到集群中的另一台主机，请执行以下命令：\n\n```\n[grid@oms1 ∼]$ crsctl relocate\
    \ res omsvip\nCRS-2673: Attempting to stop 'omsvip' on 'oms1'\nCRS-2677: Stop\
    \ of 'omsvip' on 'oms1' succeeded\nCRS-2672: Attempting to start 'omsvip' on 'oms2'\n\
    CRS-2676: Start of 'omsvip' on 'oms2' succeeded\n```\n\n### 检查迁移后的主机\n\n1.  检查与\
    \ VIP 关联的 IP 地址是否在迁移后的主机上运行。\n\n```\nifconfig –a|grep <vip>\n```\n\n存储库数据库应可从集群中的其他主机访问，并且监听器应已启动并运行。\n\
    \n2.  将 `ORACLE_HOSTNAME` 环境变量设置为虚拟主机名。沿用我们的示例，使用以下命令：\n\n```\nexport ORACLE_HOSTNAME=omsvip.example.com\n\
    ```\n\n3.  在新节点上启动 OMS。\n\n```\n$OMS_HOME/bin/emctl start oms\n```\n\n或者，可以通过创建\
    \ `start`、`check`、`stop`、`clean` 和 `abort` 例程来配置 Oracle Clusterware 以完全管理 OMS，这些例程告诉它如何对\
    \ OMS 进行操作。此配置的详细信息超出了本章的范围。有关详细信息，请参阅《Oracle Clusterware Administration and Deployment\
    \ Guide 11gR2》。\n\n## 为 OMS 实施冷故障切换\n\n为 OMS 实施冷故障切换方案后，您就受到了保护，免受单台主机故障的影响。然而，执行故障切换的时间可能从几分钟到几小时不等，具体取决于是手动完成还是通过\
    \ Oracle Clusterware 或其他方法自动完成。\n\n存储库也需要受到保护，因为它现在是一个单点故障。如前所述，强烈建议设置一个本地 Data\
    \ Guard，包含一个物理备用数据库。备用数据库应配置在与管理服务器和主数据库分离的主机上。但是，为了降低成本，也有可能在另一台 OMS 主机上创建主数据库和物理备用数据库。如果主存储库发生计划内或计划外的中断，物理备用数据库可以在剩余的主机上切换或故障转移到备用数据库。请注意，该主机现在将成为一个单点故障。\n\
    \n### 使用 Enterprise Manager 创建备用数据库的前提条件\n\n要使用 Enterprise Manager 创建备用数据库，目标主机应安装有\
    \ Oracle Management Agent，并由 Enterprise Manager 进行监控。此外，如果使用 ASM 作为数据库存储，它应与监听器一起被监控。\n\
    \n### 使用 Enterprise Manager 创建备用数据库的步骤\n\n1.  导航到存储库数据库主页，从菜单中选择 **可用性** > **添加备用数据库**。\n\
    2.  备份主数据库（参见图 13-6）。Data Guard 使用 RMAN 基于新的或现有的备份创建备用数据库。联机备份要求数据库处于 `ARCHIVELOG`\
    \ 模式。\n\n![9781430249382_Fig13-06.jpg](img/9781430249382_Fig13-06.jpg)\n\n图 13-6.\
    \  使用 RMAN 联机备份添加备用数据库\n\n如果使用联机方法，请在高峰时段之外的时间执行备份，以免对 Enterprise Manager Cloud\
    \ Control 的性能产生负面影响。使用此方法时，您还可以决定使用 RMAN 的功能通过 Oracle Net Services 将备份直接复制到目标主机，或者在复制前暂存备份。后一种选项需要在主站点和辅助站点都有额外的存储空间。如果存在常规备份过程或先前的“添加备用数据库”操作产生的现有备份，也可以使用它。\n\
    \n3.  接下来，您将选择一个备份选项。如图 13-7 所示，您提供 RMAN 将使用的并行度以及主主机的凭据。备用数据库将需要备用重做日志以进行实时应用。在发生角色转换时，它们也会在主数据库上创建。您可以为备用重做日志使用\
    \ OMF（默认）或手动指定日志文件。对于使用 ASM 的数据库，请提供磁盘组名称。\n\n![9781430249382_Fig13-07.jpg](img/9781430249382_Fig13-07.jpg)\n\
    \n图 13-7.  添加备用数据库，备份选项\n\n4.  添加用于在备用数据库上存储数据库文件和快速恢复区的文件位置，如图 13-8 所示。如果使用 ASM，请指定磁盘组。\n\
    \n![9781430249382_Fig13-08.jpg](img/9781430249382_Fig13-08.jpg)\n\n图 13-8.  添加备用数据库，文件位置\n\
    \n5.  选择备用数据库的配置属性，如图 13-9 所示。\n\n![9781430249382_Fig13-09.jpg](img/9781430249382_Fig13-09.jpg)\n\
    \n图 13-9.  添加备用数据库，配置\n\n如果备用服务器上配置了 Oracle Restart[⁵]，请为其启用配置：\n    *   a.  为备用数据库提供一个唯一的名称，并为\
    \ Enterprise Manager 中的目标提供一个名称。\n    *   b.  通过选择 **使用 SYSDBA 监视凭据** 复选框来指定 Enterprise\
    \ Manager 要使用的监视凭据。这是因为备用数据库在重做应用期间将处于 `mounted` 状态。使用 `SYSDBA` 角色将使更多监视信息可用。\n\
    \    *   c.  选择 **使用 Data Guard Broker** 复选框以启用使用 Data Guard Broker 管理主数据库和备用数据库。它简化了\
    \ Data Guard 配置中主数据库和备用数据库的管理，包括角色转换和运行状况检查。Data Guard 需要一个连接标识符来与所有主数据库和备用数据库进行通信。提供一个供\
    \ Data Guard 使用的连接描述符。可以使用 Enterprise Manager 连接描述符或现有的服务名。\n6.  在下一个屏幕（如图 13-10\
    \ 所示）上查看您的选项，然后单击 **完成** 按钮。\n\n![9781430249382_Fig13-10.jpg](img/9781430249382_Fig13-10.jpg)\n\
    \n图 13-10.  添加备用数据库，复查\n\n7.  将创建一个作业来构建备用数据库。单击作业名称以查看步骤和输出，如图 13-11 所示。\n\n\
    ![9781430249382_Fig13-11.jpg](img/9781430249382_Fig13-11.jpg)\n\n图 13-11.  Data\
    \ Guard 作业创建\n\n### 管理备用数据库\n\n备用数据库成功创建后，您将能够通过 Enterprise Manager 控制台管理它。从存储库数据库主页中，选择\
    \ **可用性** > **Data Guard 管理**，如图 13-12 所示。\n\n![9781430249382_Fig13-12.jpg](img/9781430249382_Fig13-12.jpg)\n\
    \n图 13-12.  Data Guard 管理选项\n\n[⁵]: Oracle Restart 是一项功能，可在单个服务器上为 Oracle 实例、监听器和其他相关组件提供高可用性。\n"
- fmt: "The Data Guard screen presents an overview of the Data Guard status as well\
    \ as configuration information about the primary and standby databases, as shown\
    \ in [Figure 13-13](#9781430249382_Ch13.xhtml#Fig13).\n\n![9781430249382_Fig13-13.jpg](images/9781430249382_Fig13-13.jpg)\n\
    \n[Figure 13-13](#9781430249382_Ch13.xhtml#_Fig13) . Data Guard status\n\nBy default,\
    \ the standby was created by using Maximum Performance protection mode.[⁶](#9781430249382_Ch13.xhtml#Fn6)\
    \ This mode ensures that if a network connectivity problem exists between the\
    \ primary and the standby databases, it will not impact the primary database’s\
    \ performance. However, this has the potential for data loss. Because we are using\
    \ a local Data Guard, it may be feasible to enable Maximum Availability protection\
    \ mode. This will also not impact the availability and performance of the primary\
    \ database if a network connectivity issue arises, but provides a higher level\
    \ of data protection. Change the protection mode to Maximum (see [Figure 13-14](#9781430249382_Ch13.xhtml#Fig14)).\n\
    \n![9781430249382_Fig13-14.jpg](images/9781430249382_Fig13-14.jpg)\n\n[Figure\
    \ 13-14](#9781430249382_Ch13.xhtml#_Fig14) . Changing the Data Guard protection\
    \ mode\n\nThe protection mode changes will be reflected in the console, as seen\
    \ in [Figure 13-15](#9781430249382_Ch13.xhtml#Fig15). Changing from Maximum Performance\
    \ to Maximum Availability will also change the redo transport mode from Asynchronous\
    \ (`ASYNC`) to Synchronous (`SYNC`).\n\n![9781430249382_Fig13-15.jpg](images/9781430249382_Fig13-15.jpg)\n\
    \n[Figure 13-15](#9781430249382_Ch13.xhtml#_Fig15) . Data Guard Maximum Availability\
    \ protection mode\n\nIn addition, we recommend to use Data Guard Broker to manage\
    \ the Data Guard operations such as failover, switchover, and health checks. The\
    \ Data Guard Broker simplifies the management of databases in such a configuration\
    \ by providing a GUI interface via Enterprise Manager or the command-line utility\
    \ Data Guard Broker Line Manager, `dgmgrl`. A full discussion of Data Guard and\
    \ Data Guard Broker is outside the scope of this chapter. See the *Oracle Data\
    \ Guard Concepts and Administration 11g Release 2 (11.2)* documentation for details.\
    \ In order to manage role-change operations for the Enterprise Manager repository,\
    \ the latter method should be used, as the Enterprise Manager Cloud Control 12c\
    \ system would not be available to complete the operations.\n\nIt is also possible\
    \ to configure the management service so that no configuration changes are required\
    \ after the repository database changes roles (that is, during switchover/failover).\
    \ Using Oracle Database 11gR2, you can configure services by using the `srvctl`\
    \ command-line utility that will be active only when the database is assuming\
    \ the primary role. The following example illustrates the steps for configuring\
    \ a database service in a Data Guard configuration for use with the OMS:\n\n1.\
    \  Create a database service called `emrepsrvc` on the primary database `emrepprim`\
    \ for use with OMS.\n\n    ```\n    $ srvctl add service -d emrepprim -s emrepsrvc\
    \ -l PRIMARY -q FALSE -e NONE -m NONE -w 0 -z 0\n    ```\n\n2.  Verify the configuration\
    \ of the service.\n\n    ```\n    $ srvctl config service -d emreptst -s emrepsrvc\n\
    \    Service name: emrepsrvc\n    Service is enabled\n    Cardinality: SINGLETON\n\
    \    Disconnect: false\n    Service role: PRIMARY\n    Management policy: AUTOMATIC\n\
    \    DTP transaction: false\n    AQ HA notifications: false\n    Failover type:\
    \ NONE\n    Failover method: NONE\n    TAF failover retries: 0\n    TAF failover\
    \ delay: 0\n    Connection Load Balancing Goal: LONG\n    Runtime Load Balancing\
    \ Goal: NONE\n    TAF policy specification: NONE\n    Edition:\n    ```\n\n3.\
    \  Start and check the status of the service on the primary.\n\n    ```\n    $\
    \ srvctl start service -d emreptst -s emrepsrvc\n    $ srvctl status service -d\
    \ emreptst -s emrepsrvc\n    Service emrepsrvc is running\n    ```\n\n4.  Create\
    \ the same service on the standby database for use when the role changes to a\
    \ primary.\n\n    ```\n    $ srvctl add service -d emrepsby -s emrepsrvc -l PRIMARY\
    \ -q FALSE -e NONE -m BASIC -w 0 -z 0\n    $ srvctl config service -d emrepsby\
    \ -s emrepsrvc\n    Service name: emrepsrvc\n    Service is enabled\n    Cardinality:\
    \ SINGLETON\n    Disconnect: false\n    Service role: PRIMARY\n    Management\
    \ policy: AUTOMATIC\n    DTP transaction: false\n    AQ HA notifications: false\n\
    \    Failover type: NONE\n    Failover method: BASIC\n    TAF failover retries:\
    \ 0\n    TAF failover delay: 0\n    Connection Load Balancing Goal: LONG\n   \
    \ Runtime Load Balancing Goal: NONE\n    TAF policy specification: NONE\n    Edition:\n\
    \    ```\n\n5.  Reconfigure the OMS to use the new service in the connect descriptor.\n\
    \n    ```\n    $OMS_HOME/bin/emctl config oms -store_repos_details -repos_conndesc\n\
    \    '(DESCRIPTION=(FAILOVER=ON)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oemhost1)(PORT=1521))\n\
    \    (ADDRESS=(PROTOCOL=TCP)(HOST=oemhost2)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=emrepsrvc.\n\
    \    smrcy.com))(FAILOVER_MODE=(TYPE=select)(METHOD=basic)))' -repos_user sysman\n\
    \    Oracle Enterprise Manager Cloud Control 12c Release 2\n    Copyright (c)\
    \ 1996, 2012 Oracle Corporation.  All rights reserved.\n    Enter Repository User's\
    \ Password :\n    Successfully updated datasources and stored repository details\
    \ in Credential Store.\n    If there are multiple OMSs in this environment, run\
    \ this store_repos_details command on\n    all of them.\n    And finally, restart\
    \ all the OMSs using 'emctl stop oms -all' and 'emctl start oms'.\n    ```\n\n\
    6.  Stop and Restart the OMS.\n    *   a. To stop the OMS, use `emctl stop oms\
    \ -all`:\n\n        ```\n        $emctl stop oms -all\n        Oracle Enterprise\
    \ Manager Cloud Control 12c Release 2\n        Copyright (c) 1996, 2012 Oracle\
    \ Corporation.  All rights reserved.\n        Stopping WebTier...\n        WebTier\
    \ Successfully Stopped\n        Stopping Oracle Management Server...\n       \
    \ Oracle Management Server Successfully Stopped\n        AdminServer Successfully\
    \ Stopped\n        Oracle Management Server is Down\n        ```\n\n    *   b.\
    \ To restart, use `emctl start oms`:\n\n        ```\n        $emctl start oms\n\
    \        Oracle Enterprise Manager Cloud Control 12c Release 2\n        Copyright\
    \ (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n        Starting Oracle\
    \ Management Server...\n        Starting WebTier...\n        WebTier Successfully\
    \ Started\n        Oracle Management Server Successfully Started\n        Oracle\
    \ Management Server is Up\n        Verify that the new DG connection string is\
    \ in use\n        $emctl config oms -list_repos_details\n        Oracle Enterprise\
    \ Manager Cloud Control 12c Release 2\n        Copyright (c) 1996, 2012 Oracle\
    \ Corporation.  All rights reserved.\n        Repository Connect Descriptor :\
    \ (DESCRIPTION=(FAILOVER=ON)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oemhost1)(PORT=1521))\n\
    \        (ADDRESS=(PROTOCOL=TCP)(HOST=oemhost2)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=emrepsrvc.\n\
    \        smrcy.com))(FAILOVER_MODE=(TYPE=select)(METHOD=basic)))\n        Repository\
    \ User : sysman\n        ```\n\n### Level 3—Active/Active OMS with SLB and RAC\
    \ Data Guard Repository"
