- fmt: '# Managing Engineered Systems


    by Bobby Curtis and Anand Akela


    You have seen that `Enterprise Manager Cloud Control 12c` provides a standardized
    monitoring solution for IT infrastructure and applications. It provides increased
    operational efficiency by automating the workflow of assigning targets to groups,
    applying templates, and managing target memberships. With proper planning of standards
    and operational procedures, `Enterprise Manager` also provides significant benefits
    to administrators by enabling consistent event, incident, and problem management
    through rule sets. Finally, you have learned best practices for the aforementioned
    features that will make managing and monitoring your environment even more seamless
    when using `EM12c`.


    ![image](images/frontdot.jpg)


    Oracle engineered systems are sets of pre-integrated hardware and software aimed
    at reducing the complexity and cost of enterprise infrastructures while increasing
    the productivity and performance of critical business systems. A few of the engineered
    systems are designed for specific functions within the enterprise. For example,
    the `Oracle Exadata Database Machine` was originally designed for data warehousing,
    yet its current release has been expanded to support both data warehousing and
    online transaction processing (`OLTP`). Other engineered systems serve a more
    general purpose. For example, the `Oracle Database Appliance` provides a two-node
    `Real Application Cluster s(RAC)`–ready solution for small to medium businesses.


    Engineered systems include the complete hardware infrastructure (such as servers,
    storage, and networking) that would normally be separate entities in traditional
    configurations. These engineered systems also come with a complete software stack
    that runs the system out of the box. The unification of hardware and software
    at this level allows for fast implementation cycles.


    In this chapter, you will take a look at engineered systems and how they can be
    managed with `Oracle Enterprise Manager 12c`, as well as how these systems can
    be viewed and monitored.


    ## Types of Engineered Systems


    Before you dive into how to manage engineered systems, let’s look at a summary
    of the engineered systems that Oracle provides:


    *   `Oracle Exadata Database Machine`: Provides extreme performance, by off-loading
    queries to the storage-cell layer, for all database applications including `OLTP`
    and data warehousing. Ideal platform for consolidating database workloads to the
    private cloud or to a data center.

    *   `Oracle Exalogic Elastic Cloud`: Provides blazing-fast performance for enterprise
    applications (Java, Oracle applications, or third-party applications) and middleware
    to help businesses perform faster, whether in the data center or in the cloud.

    *   `Oracle SPARC SuperCluster T4-4`: Provides a general-purpose solution that
    delivers high performance, availability, scalability, and security across Oracle
    and third-party applications. Ideal for consolidating diverse environments, this
    engineered system is powered by the new `SPARC T4` processor and `Oracle Solaris
    11`. Offers the benefits of both the `Oracle Exadata Database Machine` and `Oracle
    Exalogic Elastic Cloud` in a single engineered system.

    *   `Oracle Database Appliance`: Provides an excellent in-the-box solution for
    midrange database workloads. Designed to help the small to midsize businesses
    or individual business units deploy an enterprise-level solution in record time.

    *   `Oracle Exalytics In-Memory Machine`: Provides the first engineered system
    for in-memory analysis for business intelligence (`BI`) modeling, forecasting,
    and planning applications, along with advanced data visualization for actionable
    insight to large data sets.

    *   `Oracle Big Data Appliance`: Provides optimized hardware and software to deliver
    a complete, easy-to-deploy solution for acquiring, organizing, and loading unstructured
    data into `Oracle Database`.

    *   `Sun ZFS Storage Appliance`: Provides robust, efficient, and fast data storage
    for customers using network-attached storage (`NAS`) for enterprise applications,
    virtualization, private/public cloud deployments, storage consolidation, and data
    protection.


    ## Engineered Systems Lifecycle


    `Oracle Enterprise Manager` provides comprehensive management of `Oracle engineered
    systems` throughout the lifecycle of the applications or databases deployed on
    these systems. There are four stages in the engineered systems lifecycle, as shown
    in [Figure 8-1](#9781430249382_Ch08.xhtml#Fig1):


    *   Planning and setup of the engineered systems

    *   Testing the engineered systems for deployment

    *   Managing for optimal performance and efficiency

    *   Maintaining for compliance and functionality improvements


    ![9781430249382_Fig08-01.jpg](images/9781430249382_Fig08-01.jpg)


    [Figure 8-1](#9781430249382_Ch08.xhtml#_Fig1). Engineered systems lifecycle


    Although all the `Oracle engineered systems` share this lifecycle and can be managed
    from `Oracle Enterprise Manager 12c`, the examples throughout this chapter are
    for the `Oracle Exadata Database Machine`.


    ## Supported Hardware and Software


    Before delving into the various phases of the engineered system lifecycle, it
    is good to understand which hardware and software is supported by `EM12c`. The
    following `Exadata Database Machine` configurations are supported with plug-ins
    for `12.1.0.1`, `12.1.0.2`, and `12.1.0.3`:


    *   `V2`

    *   `X2-2`

    *   `X2-8`

    *   `X3-2`

    *   `X3-8`

    *   `Partitioned`


    Parts of the supported configurations are the components that come with the `Exadata
    Database Machine`. These components are supported in `EM12c`:


    ```

    Exadata Storage Server Software 11g Release 2 (11.2.2.3.0 through 11.2.3.2)

    InfiniBand Switch Release 1.1.3.0.0 to 1.3.3.2.0

    Integrated Lights Out Manager (ILOM), 3.0.9.27.a r58740

    ILOM IPMItool Release 1.8.10.3 (for Oracle Linux)

    ILOM IPMItool Release 1.8.10.4 (for Oracle Solaris)

    Avocent MergePoint Unity KVM Switch Release 1.2.8

    Power Distribution Unit Release 1.04

    Cisco—Cisco IOS Software, Catalyst 4500 L3 Switch Software (cat4500-IPBASE-M),
    Version 12.2(46)SG, RELEASE SOFTWARE (fc1)

    ```'
