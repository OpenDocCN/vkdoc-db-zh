    Provisioning a Database


    Thus far, you have seen how to create a provision profile and create installation
    media. Now let’s take a look at how to provision a database by using one of these
    methods. For this example, you will use the installation media created in the
    “Creating Installation Media” section. Remember that Oracle Enterprise Manager
    can be used to provision many types of targets through tools such as Database
    Provisioning, Bare Metal Provisioning, and Middleware Provisioning. To get started
    in the provisioning of a database, you need to open the Database Provisioning
    console; choose Enterprise ![arrow](images/arrow.jpg) Provisioning and Patching
    ![arrow](images/arrow.jpg) Database Provisioning.


    From the Database Provisioning page, you will use deployment procedures to provision
    a database. Because we are provisioning a single database, select Provision Oracle
    Database and click the Launch button, as shown in [Figure 6-68](#9781430249382_Ch06.xhtml#Fig68).
    At this point, the provisioning wizard for Oracle database launches.


    ![9781430249382_Fig06-68.jpg](images/9781430249382_Fig06-68.jpg)


    [Figure 6-68](#9781430249382_Ch06.xhtml#_Fig68). Select and launch the Provision
    Oracle Database deployment procedure


    When the Provision Database wizard starts, you can see that it is similar to many
    other wizards within Oracle Enterprise Manager. This wizard is a five-step process,
    with the first step enabling you to select the host where you want to provision
    a database. Here are the steps of the wizard:


    1.  On the Select Host page, you have the option of using a provision profile.
    By default, this option is set to None. Because we are using installation media
    to provision a database, you do not need to select a provisioning profile.

    2.  The next two sections on the Select Hosts page are important to provisioning
    a database. In the Select Tasks to Perform section, you choose a platform and
    a version, and whether to install Grid Infrastructure and deploy database software.
    The Version drop-down box provides all the versions of Oracle that are supported
    for provisioning (see [Figure 6-69](#9781430249382_Ch06.xhtml#Fig69)).


    ![image](images/sq.jpg) **Note**  Oracle Enterprise Manager Cloud Control 12c
    Bundle Patch 2 Update 1 contains the plug-ins and support for upcoming releases
    of Oracle products.


    ![9781430249382_Fig06-69.jpg](images/9781430249382_Fig06-69.jpg)


    [Figure 6-69](#9781430249382_Ch06.xhtml#_Fig69). Selecting tasks to perform


    3.  In the Select Destination Hosts section, you add one or more hosts to provision
    the database software to. The selection of destination hosts is driven by the
    platform that is selected in the preceding Select Tasks to Perform section. [Figure
    6-70](#9781430249382_Ch06.xhtml#Fig70) shows a host selected for destination.
    Once everything is selected, click Next.


    ![9781430249382_Fig06-70.jpg](images/9781430249382_Fig06-70.jpg)


    [Figure 6-70](#9781430249382_Ch06.xhtml#_Fig70). Selection of destination hosts


    Now you end up at step 2, where you have to provide configuration details for
    the provision process. Each one of these tasks needs to be completed and checked
    off before you can move to step 3 (see [Figure 6-71](#9781430249382_Ch06.xhtml#Fig71)).


    ![9781430249382_Fig06-71.jpg](images/9781430249382_Fig06-71.jpg)'
