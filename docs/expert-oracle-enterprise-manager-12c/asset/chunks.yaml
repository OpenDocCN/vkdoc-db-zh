- fmt: '# SQL Monitor


    ![image](images/sq.jpg) `Tip` 如果有一个视图管理员应该考虑授予只读权限以监控数据库环境中的活动，那就是 SQL Monitor。这个视图极其易用，并能提供关于活动和性能的极其有价值的信息。SQL
    Monitor 视图可快速提醒开发人员或分析师可能出现异常的情况，这些情况在 EM12c 中不太可能升级为事件，但仍可能需要管理员的协助。在开发生命周期中，这能为数据库团队成员提供另一种方式，以可视化方式监控开发和测试阶段发生的情况。


    虽然 Top Activity 和 ASH Analytics 共享 SQL ID 和用户会话的详细信息页面，但 SQL Monitor 仅与用户会话和 CPU
    使用率共享会话详细信息。对于 SQL ID，SQL Monitor 拥有自己独立的性能页面，其数据基于 EM12c 控制台执行 `DBMS_SQLTUNE.REPORT_SQL_MONITOR`
    来填充主 SQL 监控页面。


    [Figure 9-38](#9781430249382_Ch09.xhtml#Fig38) 展示了当 EM12c 控制台执行 `report_level=>''ALL''`
    时，该报告的图形化表示。同样可以通过命令行使用该软件包来执行此报告，但 EM12c SQL Monitor 界面能方便地以用户友好的格式填充和显示数据，方便管理员使用。


    ![9781430249382_Fig09-38.jpg](images/9781430249382_Fig09-38.jpg)


    **图 9-38** SQL Monitor 为快照中涉及的 `SQL_IDs` 生成的“受监控 SQL 执行详细信息”报告的下方窗格


    通过简单地单击左上角的“指标”按钮，可以调整视图以显示 SQL 特定的指标，如 [Figure 9-39](#9781430249382_Ch09.xhtml#Fig39)
    所示。在调查有影响的 SQL 语句时，这些数据可能非常详细且有价值。


    ![9781430249382_Fig09-39.jpg](images/9781430249382_Fig09-39.jpg)


    **图 9-39** 与图 9-37 中 SQL Monitor 报告同一报告时间的指标使用情况，显示了以字节为单位的 CPU 和 I/O 读写请求


