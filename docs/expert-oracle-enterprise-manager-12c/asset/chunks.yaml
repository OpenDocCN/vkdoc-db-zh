    \            PLUGIN_ID           VERSION      REV_VERSION   URL\n------------------------------\
    \  ------------------  -----------  ------------  ----------------\nOracle MOS\
    \ (My Oracle Support)  oracle.sysman.mos   12.1.0.2.0              0  Media/External\n\
    Oracle Fusion Middleware        oracle.sysman.emas  12.1.0.3.0              0\
    \  Media/External\nOracle Database                 oracle.sysman.db    12.1.0.2.0\
    \       20120804  Media/External\nOracle Exadata                  oracle.sysman.xa\
    \    12.1.0.3.0              0  Media/External\n```\n\n如果列出了任何其他插件，应将它们下载到单个目录中；然后将扩展名从`.zip`重命名为`.opar`。如果未从文件系统备份恢复，请使用“仅安装软件”选项安装中间件和\
    \ OMS Oracle 主组件。软件重新安装或恢复后，下一步是安装其他插件（如果有）。通过指定`–PluginLocation`标志来选择下载插件的位置，执行位于`OMS_HOME/sysman/install`中的`PluginInstall.sh`脚本。在仅软件安装的情况下，之前应用的所有补丁都必须重新应用。\n\
    \n恢复软件主目录后，下一步是恢复或重新创建 OMS。这通过使用`omsca`实用程序并指定由`emctl exportconfig`命令生成的备份文件路径来完成。\n\
    \n```\nomsca recover –as –ms -nostart –backup_file <exportconfig 文件>\n```\n\n\
    恢复 OMS 所需的步骤可能因是否使用 SLB 或配置了多个管理服务以及是否在同一主机或不同主机上恢复而异。以下步骤是在没有 SLB 的同一主机上恢复单个\
    \ OMS 所必需的。OMS 实例将通过使用`emctl exportconfig`获取的 OMS 配置备份进行恢复。\n\n1.  清理失败的主机。\n\
    2.  验证软件库是否可用。\n3.  通过恢复文件系统备份或运行安装程序的“仅软件”选项来恢复软件主目录。（参见`Oracle Enterprise Manager\
    \ Cloud Control 高级安装与配置指南第 2 版`）。\n4.  在恢复模式下执行`omsca`，并指定先前获取的备份文件位置。\n5.  如有必要，恢复代理。\n\
    6.  启动 OMS。\n7.  验证 OMS 是否正常工作。\n\n有关其他 OMS 恢复场景的详细信息，请参阅`Oracle Enterprise Manager\
    \ Cloud Control 12c 管理员指南`。\n\n## 管理代理恢复\n\n管理代理的恢复需要重新安装它，最好从参考安装进行，或执行从先前备份的文件系统恢复。代理应使用现有补丁和自定义设置进行克隆。代理也应使用相同端口安装。重新安装后，应从\
    \ Enterprise Manager Cloud Control 中的“代理重新同步”页面执行重新同步。\n\n![image](img/sq.jpg)\
    \ `注意` 重新安装后，代理会被 OMS 阻止，以防止目标覆盖先前配置的数据。使用“重新同步代理”按钮重新同步并取消阻止代理。\n\n在典型场景中，代理恢复通常遵循以下步骤：\n\
    \n1.  使用 Oracle Universal Installer (OUI) 清理现有代理 Oracle 主目录以清理库存。\n2.  安装新代理或从参考安装克隆，使用相同端口和路径。也可以从先前备份恢复文件系统。\n\
    3.  从 Enterprise Manager Cloud Control 代理主页执行代理重新同步。\n4.  如有必要，重新配置用户定义的指标。\n\
    5.  验证代理状态。\n\n```\nemctl status agent\nemctl upload agent\n```\n\n## 切换和故障转移\n\
    \n当使用级别 2、3 或 4 高可用性配置时，管理服务和存储库都可以独立切换和故障转移。切换通常在计划维护期间进行，包括操作系统和软件打补丁，而故障转移通常在计划外维护期间发生，例如硬件或软件故障。\n\
    \n在级别 2 配置中，管理服务的切换和故障转移遵循相同的程序。如前所述，这需要将 OMS 虚拟主机名和 VIP 重新定位到另一主机，然后手动启动 OMS\
    \ 或使用 Clusterware 自动化重新定位。在使用物理备用数据库用于 Enterprise Manager 存储库的级别 2、3 或 4 配置中，数据库必须切换（计划）或故障转移（未计划）。在级别\
    \ 3 高可用性中，OMS 不需要任何操作，因为涉及多个管理服务。SLB 将监视管理服务，检测到一个服务失败时将流量路由到可用的 OMS。\n\n要使用 Data\
    \ Guard 切换管理存储库，请使用 DGMRL 命令行实用程序，因为 Enterprise Manager 控制将无法切换存储库。按照以下步骤切换管理存储库，而管理服务尚未切换：\n\
    \n1.  从 Enterprise 控制台，选择`可用性` ä `Data Guard 管理`。\n2.  检查 Redo Apply 进程是否是最新的。验证\
    \ ApplyLag 状态为零，如图 13-35 所示。\n\n![9781430249382_Fig13-35.jpg](img/9781430249382_Fig13-35.jpg)\n\
    \n图 13-35 . Data Guard 管理界面，显示 ApplyLag 和 TransportLag 状态\n\n3.  通过运行以下命令停止主站点上的管理服务。如果使用多个管理服务，应在每个\
    \ OMS 上执行此操作。\n\n```\nemctl stop oms -all\n```\n"
- fmt: "## 4. Switch over to the standby database by using the DGMGRL command-line\
    \ utility. This can be done on either the primary or standby site in the case\
    \ of a switchover. Verify the Data Guard configuration and databases before doing\
    \ a switchover. The following example illustrates these steps.\n\n### a. Verify\
    \ the Data Guard configuration and databases before doing a switchover:\n\n```\n\
    $ dgmgrl\nDGMGRL for Linux: Version 11.2.0.3.0 - 64bit Production\nCopyright (c)\
    \ 2000, 2009, Oracle. All rights reserved.\nWelcome to DGMGRL, type \"help\" for\
    \ information.\nDGMGRL> connect sys/<password>\nConnected.\nDGMGRL> show configuration\n\
    \nConfiguration - emrep\n\nProtection Mode: MaxPerformance\n  Databases:\n   \
    \ emrep  - Primary database\n    emrep2 - Physical standby database\n\nFast-Start\
    \ Failover: DISABLED\n\nConfiguration Status:\nSUCCESS\n\nDGMGRL> show database\
    \ emrep\n\nDatabase - emrep\n\nRole:            PRIMARY\n  Intended State:  TRANSPORT-ON\n\
    \  Instance(s):\n    emrep\n\nDatabase Status:\nSUCCESS\n\nDGMGRL> show database\
    \ emrep2\n\nDatabase - emrep2\n\nEnterprise Manager Name: emrep_sby\n  Role: \
    \                   PHYSICAL STANDBY\n  Intended State:          APPLY-ON\n  Transport\
    \ Lag:           0 seconds\n  Apply Lag:               0 seconds\n  Real Time\
    \ Query:         OFF\n  Instance(s):\n    emrep2\n\nDatabase Status:\nSUCCESS\n\
    ```\n\n### b. Issue the SWITCHOVER command:\n\n```\nDGMGRL> switchover to emrep2;\n\
    Performing switchover NOW, please wait...\nNew primary database \"emrep2\" is\
    \ opening...\nOperation requires shutdown of instance \"emrep\" on database \"\
    emrep\"\nShutting down instance \"emrep\"...\nORACLE instance shut down.\nOperation\
    \ requires startup of instance \"emrep\" on database \"emrep\"\nStarting instance\
    \ \"emrep\"...\nUnable to connect to database\nORA-12514: TNS:listener does not\
    \ currently know of service requested in connect descriptor\n\nFailed.\nWarning:\
    \ You are no longer connected to ORACLE.\n\nPlease complete the following steps\
    \ to finish switchover:\n       start up and mount instance \"emrep\" of database\
    \ \"emrep\"\n```\n\n![image](images/sq.jpg) `Note` Additional steps may be required\
    \ after issuing the switchover command depending on the current state of the Data\
    \ Guard configuration. In the example shown, the new standby database should be\
    \ started and mounted manually.\n\n### c. Verify the status of the Data Guard\
    \ configuration to see that the roles have been switched:\n\n```\nDGMGRL> connect\
    \ sys/<password>\nConnected.\nDGMGRL> show configuration;\n\nConfiguration - emrep\n\
    \nProtection Mode: MaxPerformance\n  Databases:\n    emrep2 - Primary database\n\
    \    emrep  - Physical standby database\n\nFast-Start Failover: DISABLED\n\nConfiguration\
    \ Status:\nSUCCESS\n\nDGMGRL> show database emrep2;\n\nDatabase - emrep2\n\nEnterprise\
    \ Manager Name: emrep_sby\n  Role:                    PRIMARY\n  Intended State:\
    \          TRANSPORT-ON\n  Instance(s):\n    emrep2\n\nDatabase Status:\nSUCCESS\n\
    \nDGMGRL> show database emrep;\n\nDatabase - emrep\n\nRole:            PHYSICAL\
    \ STANDBY\n  Intended State:  APPLY-ON\n  Transport Lag:   0 seconds\n  Apply\
    \ Lag:       0 seconds\n  Real Time Query: OFF\n  Instance(s):\n    emrep\n\n\
    Database Status:\nSUCCESS\n```\n\nHere you can see that the role of the database\
    \ has been successfully changed. The next step is to reconfigure the OMS to use\
    \ the new primary database.\n\n## 5. Start the Admin Server if it is not already\
    \ running.\n\n```\nemctl start oms –admin_only\n```\n\n## 6. Configure the OMS\
    \ with the new primary database repository.\n\n```\n$OMS_HOME/bin/emctl config\
    \ oms -store_repos_details -repos_conndesc \"(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oem3)(PORT=1522)))\n\
    (CONNECT_DATA=(SID=emrep2)))\" -repos_user sysman\nOracle Enterprise Manager Cloud\
    \ Control 12c Release 2\nCopyright (c) 1996, 2012 Oracle Corporation.  All rights\
    \ reserved.\nEnter Repository User's Password :\n```\n\n## 7. Start the OMS.\n\
    \n```\nemctl start oms\n```\n\n## 8. Relocate the management repository target.\
    \ The management agent on an OMS monitors the OMS and management repository targets.\
    \ After the switchover, the repository target needs to be updated to reflect the\
    \ switched-over repository database, which is the new primary.\n\n```\nemctl config\
    \ emrep –agent <central_agent_name> -conn_desc <conn_desc_of_new_primary>\n```\n\
    \nFailover of the management repository using Data Guard is similar to a switchover,\
    \ except the command issued using DGMGRL would be `failover to <standby_db_name>`.\n\
    \nIn addition to using the preceding manual steps, you can automate the failover\
    \ of the OMS and management repository by using Data Guard fast-start failover:\n\
    \n*   Fast-start failover determines when a failover to a standby is necessary\
    \ by using an Observer process that runs on another host independent of both primary\
    \ and standby servers. If the Observer cannot contact the primary site after a\
    \ certain configurable period, it will automatically fail over to the standby\
    \ database.\n*   After failover occurs, a database event called `DB_ROLE_CHANGE`\
    \ is fired.\n*   The `DB_ROLE_CHANGE` event causes a trigger to be fired, which\
    \ in turn starts up the Enterprise Manager Application tier.\n\nA script can be\
    \ created that will automate these steps. Using the sample script provided in\
    \ the `<OMS_HOME>/sysman/ha` directory, create a script that will configure the\
    \ OMS to point to a new primary database and start up all management services.\
    \ [Listing 13-1](#9781430249382_Ch13.xhtml#list1) is an example of a script that\
    \ will start up the standby OMS and reconfigure the OMS with the new primary management\
    \ repository database that has been switched over in a Data Guard configuration.\n\
    \n## [Listing 13-1](#9781430249382_Ch13.xhtml#_list1). Sample Script to Start\
    \ EM Tier on Standby Site\n\n```\n#!/bin/sh\nLOGFILE=\"/oms_swlib/em/failover/em_failover.log\"\
    \nOMS_ORACLE_HOME=\"/u01/app/oracle/Middleware/oms\"\nCENTRAL_AGENT=\"oem2.example.com:3872\"\
    \nSYSMAN_PWD=\"oracle12c\"\n\n#log message\necho \"###############################\"\
    \ >> $LOGFILE\ndate >> $LOGFILE\necho $OMS_ORACLE_HOME >> $LOGFILE\nid >>  $LOGFILE\
    \ 2>&1\n\n#switch all OMS to point to new primary and startup all OMS\n$OMS_ORACLE_HOME/bin/emctl\
    \ config oms -store_repos_details -repos_conndesc \"(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oem1)(PORT=1521)))\n\
    (CONNECT_DATA=(SID=emrep2)))\" \\\n-repos_user sysman –repos_pwd $SYSMAN_PWD >>\
    \ $LOGFILE 2>&1\n$OMS_ORACLE_HOME/bin/emctl sync_opss_policy_store \\\n-sysman_pwd\
    \ oracle12c  >> $LOGFILE 2>&1\n$OMS_ORACLE_HOME/bin/emctl stop oms >>  $LOGFILE\
    \ 2>&1\n$OMS_ORACLE_HOME/bin/emctl start oms >>  $LOGFILE 2>&1\n\n#relocate Management\
    \ Services and Repository target\n#to be done only once in a multiple OMS setup\n\
    #allow time for OMS to be fully initialized\n$OMS_ORACLE_HOME/bin/emctl config\
    \ emrep -agent $CENTRAL_AGENT \\\n-conn_desc -sysman_pwd $SYSMAN_PWD >> $LOGFILE\
    \ 2>&1\n\n#always return 0 so that dbms scheduler job completes successfully\n\
    exit 0\n```\n\nThe sample script in [Listing 13-2](#9781430249382_Ch13.xhtml#list2)\
    \ creates a trigger that will be fired whenever the `DB_ROLE_CHANGE` event occurs\
    \ during a switchover or failover operation. This trigger will then call the preceding\
    \ script to start the Enterprise Manager tier.\n\n## [Listing 13-2](#9781430249382_Ch13.xhtml#_list2).\
    \ Sample Database Role-Change Trigger"
