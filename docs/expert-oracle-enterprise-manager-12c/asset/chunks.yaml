  trans: '

    既然我们已经介绍了安装 Enterprise Manager Cloud Control 12c 的选项，包括代理部署，现在来看看维护 EM 基础设施需要做些什么。正如在第
    1 章所讨论的，Enterprise Manager 由三个主要活动组件构成：`Oracle Management Agent`、`Oracle Management
    Service`和`Oracle Management Repository`。让我们依次 examine 每个组件。


    ## Oracle Management Agent


    代理管理是随着 Enterprise Manager 12c 版本的发布而变得**非常直接**的一个领域。在之前的版本中，代理管理必须通过命令行使用`EMCTL`或`EMCLI`工具来执行。虽然在
    12c 版本中，你仍然可以使用命令行界面来管理代理，但大部分管理也可以通过`Cloud Control 控制台`完成。本节首先介绍控制台的使用，然后再介绍命令行界面。


    ### 使用控制台进行代理管理


    要从`Cloud Control 控制台`访问代理管理功能，请从`设置`菜单中选择`管理 Cloud Control` ![arrow](img/arrow.jpg)
    `代理`，如图 3-1 所示。


    ![9781430249382_Fig03-01.jpg](img/9781430249382_Fig03-01.jpg)


    图 3-1. 在 Cloud Control 控制台中选择代理管理


    这将带你进入`代理`页面，如图 3-2 所示。默认情况下，此页面显示系统中所有代理的状态，但你可以选择一个选项，仅显示那些处于`运行中`、`维护期`、`不可达`等状态的代理。


    ![9781430249382_Fig03-02.jpg](img/9781430249382_Fig03-02.jpg)


    图 3-2. 代理页面


    ![image](img/sq.jpg) **提示** `可升级`和`不可升级`的值仅在你已将 OMS 从 12.1.0.1 升级到 12.1.0.2 时才会出现。当然，升级
    OMS 并不会同时升级代理。不过，你可以通过在 EM12c 控制台中点击`可升级`，选择要升级的代理，然后点击`升级`按钮来批量升级代理。


    你还可以选择特定的代理（按住 Ctrl 键的同时进行选择）或一系列代理（按住 Shift 键的同时进行选择）来执行操作，例如启动、关闭、保障安全等。这些相当直接的操作在
    Oracle 的 Enterprise Manager 产品文档中有很好的介绍，因此这里不再赘述。


    ![image](img/sq.jpg) **提示** 新用户首次使用 EM12c 用户界面时常掉入的一个陷阱是**没有点击屏幕的正确部分**。请注意，代理名称是超链接，因此点击代理名称会带你到该特定代理的主页。如果你想选择代理并停留在此页面上执行特定操作，请点击代理名称左侧的列（如图
    3-2 所示），或者点击代理列中但超链接右侧的位置。


    ### 同时控制多个代理


    能够选择多个代理来执行操作是 EM12c 这一部分相对于之前版本的**主要增强功能**之一。此功能使管理员能够一次性对多个代理进行更改，而不是逐个进行。例如，假设你希望将一组代理上传累积数据文件到更小的值，因为这些代理监控着你更关键的系统。你需要做的就是选择要修改的代理，然后点击`属性`图标（如图
    3-2 右侧所示）。这将启动“创建代理配置操作”作业工作流，如图 3-3 所示。


    ![9781430249382_Fig03-03.jpg](img/9781430249382_Fig03-03.jpg)


    图 3-3. 创建“代理配置操作”作业工作流的第一步


    请注意，最初没有选择任何代理。因此，选择你想要的代理（或者直接点击`全选`来选择所有代理），然后点击`参数`选项卡。这将显示一个长长的代理属性列表供你更改，如图
    3-4 所示。向下滚动到`UploadInterval`参数，并以分钟为单位输入你希望代理上传的频率值。在图 3-4 中，该值被设置为每 5 分钟上传一次（默认值为
    15 分钟）。


    ![9781430249382_Fig03-04.jpg](img/9781430249382_Fig03-04.jpg)


    图 3-4. 更改 UploadInterval 参数


    你可以使用`计划`选项卡来安排此操作在稍后时间（例如，指定的维护时间）发生。但是，如果你不需要安排此作业稍后运行，可以直接点击`提交`。然后，你将返回到`代理`页面，并收到一条信息性消息，提示作业已提交，并附有一个用于检查作业进度的链接。


    ## 使用代理的主页


    从刚才描述的`代理`页面，你可以通过点击代理名称进入特定代理的主页。（你也可以通过从`所有目标`页面选择代理来访问代理的主页。）OMS 会连接到该代理，并显示有关该特定代理的各种更详细信息，包括以下内容。


    ### 摘要区域


    这提供了诸如代理的可用性和状态等详细信息。此区域中特别令人感兴趣的是列表，它显示了此代理中部署了哪些管理插件，如图 3-5 所示。（请记住，代理只包含其所在机器上存在的目标的插件，因此查看部署了哪些插件很有用。）


    ![9781430249382_Fig03-05.jpg](img/9781430249382_Fig03-05.jpg)


    图 3-5. 为代理安装的插件列表


    ### 监控区域


    这显示了此代理监控的目标的详细信息、这些目标的指标问题以及它们的主要收集项。


    ### 性能和使用情况区域


    这详细说明了代理自身的性能情况，如图 3-6 所示。在此区域中，你应注意几个重要事项：


    *   乍一看，这些图表可能令人困惑，因为 y 轴似乎没有测量单位。实际上，单位是存在的，只是在每张图表的说明中。

    *   y 轴是根据结果进行缩放的。这意味着性能看起来可能比实际情况更糟。例如，图 3-6 中的上传速率乍一看很糟糕，但它达到的最大值仅略高于 0.5 KB/秒，这显然不是问题！

    *   有时你需要查看两张图表来发现一个问题。使用相同的上传速率图表，只有当上传积压（上传速率右侧的图表）在增加而上传速率没有增加时，性能才成为问题。

    *   通过查看`收集性能`图表，你可以确定代理何时接近其可监控的最大目标数。正如代理下方的提示所示，当 y 轴上的值接近 100 时，代理就达到了容量极限。这可能是你不常见的情况。（本例中的代理监控了
    114 个目标，但执行所占收集间隔的百分比平均略低于 0.02，离 100 还差得远呢！）


    ![9781430249382_Fig03-06.jpg](img/9781430249382_Fig03-06.jpg)


    图 3-6. 来自代理主页的性能和使用情况区域

    '
- fmt: '**Resource Consumption region**：此区域显示代理的 CPU 和 Java 堆使用情况，如[图 3-7](#9781430249382_Ch03.xhtml#Fig7)所示。同样，这通常不应成为问题，但如果在此处发现异常，拥有此信息会很有用。


    ![9781430249382_Fig03-07.jpg](images/9781430249382_Fig03-07.jpg)


    [图 3-7](#9781430249382_Ch03.xhtml#_Fig7)。代理主页的“资源消耗”区域


    **Incidents region**：此区域显示为代理记录的事件列表。（事件管理在[第 12 章](#9781430249382_Ch12.xhtml)中有更详细的介绍，此处不再赘述。）


    代理主页上另一个值得关注的区域是代理菜单，如[图 3-8](#9781430249382_Ch03.xhtml#Fig8)所示。其中，最值得深入查看的选择如下：


    *   **Monitoring**：显示指标、指标设置、指标收集错误、状态和警报历史记录以及中断的详细信息，并提供对事件管理器控制台的访问。

    *   **Diagnostics**：链接到支持工作台，以便您打包最近的问题或事件的详细信息，用于上传到 My Oracle Support。

    *   **Control**：提供关闭或重启代理，或结束中断的相关链接。


    ![9781430249382_Fig03-08.jpg](images/9781430249382_Fig03-08.jpg)


    [图 3-8](#9781430249382_Ch03.xhtml#_Fig8)。代理主页上的代理菜单


    ## 使用 EM 代理浏览器


    EM 代理浏览器是另一个图形用户界面（GUI），在几个版本前开发，用于在构建 OMS 时访问代理。它在 10g 和 11g 版本中默认禁用，但在 12c 中似乎又恢复可用。未来是否保持如此尚不可知。然而，如果您的代理卡在“挂起”状态（尽管也可以通过控制台清除），或者某些指标未被收集，它可能对您非常有用。


    要访问代理浏览器，您需要使用类似 `https://<agent_host_name>:<agent_port_number>/emd/browser/main`
    的 URL（例如，`https://em12c.acme.com:3872/emd/browser`）。然后，系统会提示您输入用户 ID 和密码，可以是代理所有者的，也可以是
    root 用户的（在 Unix 环境中）。这将打开一个类似[图 3-9](#9781430249382_Ch03.xhtml#Fig9)所示的屏幕。


    ![9781430249382_Fig03-09.jpg](images/9781430249382_Fig03-09.jpg)


    [图 3-9](#9781430249382_Ch03.xhtml#_Fig9)。代理浏览器


    即将介绍的“EMCTL 实用程序”一节中描述的许多 `emctl` 命令也可通过此浏览器界面获得。其中更有趣的一个是获取代理系统状态转储的命令，这对于调试问题代理的状态特别有用。要执行系统状态转储，只需单击链接“System
    State Dumps”（如[图 3-9](#9781430249382_Ch03.xhtml#Fig9)所示），然后在打开的窗口中单击“Perform System
    Dump”。请注意，生成此文件可能需要一些时间，并且会生成一个相当大的 XML 文件，由于篇幅原因，此处不作展示。


    ## 使用命令行进行代理管理


    当然，您刚才看到的所有区域也可以从命令行访问。Enterprise Manager 有两个命令行界面：EMCTL 和 EMCLI。让我们依次看看。


    ### EMCTL 实用程序


    Enterprise Manager Control 实用程序（EMCTL）主要用于——不出所料！——控制 EM 基础架构的不同部分。由于本节是关于管理代理的，因此这里仅讨论与代理一起使用的函数。您需要确保使用的是代理主页中的
    `emctl` 来执行这些命令。可以使用 `emctl getemhome` 来验证这一点，因为很容易混淆正在使用的是哪个 `emctl`！


    许多 `emctl` 命令与之前的版本相比没有变化。为了完整起见，[表 3-1](#9781430249382_Ch03.xhtml#Tab1)列出了管理代理中更常用的
    `emctl` 命令。


    [表 3-1](#9781430249382_Ch03.xhtml#_Tab1)。emctl 命令


    | 命令 | 描述 |

    | --- | --- |

    | `emctl clearstate` | 清除状态目录内容。位于 `$ORACLE_HOME/sysman/emd/state` 下的文件将被此命令删除。
    |

    | `emctl clearsudoprops` | 清除代理的 sudo 属性。 |

    | `emctl config [agent] listtargets [<EM loc>]` | 列出 `targets.xml` 中存在的所有目标。 |

    | `emctl config agent getSupportedTZ` | 显示基于环境设置的受支持时区。 |

    | `emctl config agent getTZ` | 显示环境中设置的当前时区。 |

    | `emctl control agent runCollection <target_name>:<target_type> <metric_name>`
    | 手动运行特定目标的特定指标的收集。 |

    | `emctl deploy agent [-s <install-password>] [-o <omshostname:consoleSrvPort>]
    [-S] <deploy-dir> <deploy-hostname>:<port> <source-hostname>` | 仅创建并部署代理。 |

    | `emctl dumpstate agent <component> . . .` | 为代理生成转储，允许您分析代理的 CPU 或内存问题。 |

    | `emctl gensudoprops` | 生成代理的 sudo 属性。 |

    | `emctl getemhome` | 打印代理主目录。 |

    | `emctl getversion agent` | 打印代理的版本。 |

    | `emctl listplugins agent` | 列出在代理上部署的插件、它们的版本和安装目录。 |

    | `emctl pingOMS [agent]` | 向 OMS 发送 ping 以检查代理是否能够到达 OMS，并等待 OMS 的反向 ping，以便代理声明
    `pingOMS` 成功。 |

    | `emctl reload agent dynamicproperties [<Target_name>:<Target_Type>]...` | 为指定目标重新计算和生成动态属性。
    |

    | `emctl resetTZ agent` | 重置代理的时区。您需要执行以下步骤：<br>1. 首先停止代理。<br>2. 运行此命令将当前时区更改为不同的时区。<br>3.
    重启代理。 |

    | `emctl secure agent [registration password]` | 使代理对 OMS 安全。这将提示输入注册密码。 |

    | `emctl start agent` | 启动管理代理。 |

    | `emctl start blackout <Blackoutname> [-nodeLevel] [<Target_name>[:<Target_Type>]]....
    [-d <Duration>]` | 在目标上启动中断。 |

    | `emctl status agent` | 显示代理的状态。 |

    | `emctl status agent cpu [-depth n &#124; -full_cpu_report]` | 提供 CPU 统计信息（使用
    `depth` 的 top-n 列表或完整详细信息）。需要在 `emd.properties` 中设置 `topMetricReporter=true`。
    |

    | `emctl status agent dbconnections` | 显示 DBConnection Cache 的内容。 |

    | `emctl status agent jobs` | 显示当前正在运行的作业的状态。 |

    | `emctl status agent mcache <target name>,<target type>,<metric>` | 显示在指标缓存中具有值的指标名称。
    |

    | `emctl status agent scheduler` | 显示所有已调度、准备就绪或正在运行的收集线程。 |

    | `emctl status agent -secure` | 显示代理是否在安全模式下运行，以及它所报告的 OMS 的安全性。 |

    | `emctl status agent target <target name>,<target type>,<metric>` | 按目标名称、目标类型的顺序显示特定目标的详细状态。
    |

    | `emctl status blackout [<Target_name>[:<Target_Type>]]....` | 提供目标中断的状态。 |

    | `emctl stop agent` | 停止管理代理。 |

    | `emctl stop blackout <Blackoutname>` | 停止在特定目标上启动的中断。只有通过 EMCTL 工具启动的中断才能使用
    EMCTL 停止。 |

    | `emctl unsecure agent` | 取消代理的安全状态。通常，这不是推荐做法。 |

    | `emctl verifykey` | 通过发送 `pingOMS` 来验证 OMS 和代理之间的通信。 |'
