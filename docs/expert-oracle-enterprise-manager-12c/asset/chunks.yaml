  trans: "\nData Guard 界面展示了 Data Guard 状态概览以及有关主数据库和备用数据库的配置信息，如 图 13-13 所示。\n\n\
    ![9781430249382_Fig13-13.jpg](img/9781430249382_Fig13-13.jpg)\n\n图 13-13 . Data\
    \ Guard 状态\n\n默认情况下，备用数据库是使用“最高性能”保护模式创建的。⁶ 此模式确保，如果主数据库和备用数据库之间存在网络连接问题，不会影响主数据库的性能。然而，这有可能导致数据丢失。由于我们使用的是本地\
    \ Data Guard，启用“最高可用性”保护模式可能是可行的。此模式同样不会在出现网络连接问题时影响主数据库的可用性和性能，但提供了更高级别的数据保护。将保护模式更改为“最高可用性”（参见\
    \ 图 13-14）。\n\n![9781430249382_Fig13-14.jpg](img/9781430249382_Fig13-14.jpg)\n\
    \n图 13-14 . 更改 Data Guard 保护模式\n\n保护模式的更改将反映在控制台中，如 图 13-15 所见。从“最高性能”更改为“最高可用性”也会将重做传输模式从异步\
    \ (`ASYNC`) 更改为同步 (`SYNC`)。\n\n![9781430249382_Fig13-15.jpg](img/9781430249382_Fig13-15.jpg)\n\
    \n图 13-15 . Data Guard 最高可用性保护模式\n\n此外，我们建议使用 Data Guard Broker 来管理 Data Guard\
    \ 操作，例如故障切换、切换和运行状况检查。Data Guard Broker 通过 Enterprise Manager 或命令行实用程序 Data Guard\
    \ Broker Line Manager (`dgmgrl`) 提供 GUI 界面，从而简化了此配置中数据库的管理。关于 Data Guard 和 Data\
    \ Guard Broker 的完整讨论超出了本章的范围。有关详细信息，请参阅 *Oracle Data Guard Concepts and Administration\
    \ 11g Release 2 (11.2)* 文档。为了管理 Enterprise Manager 存储库的角色更改操作，应使用后一种方法，因为 Enterprise\
    \ Manager Cloud Control 12c 系统将无法用于完成这些操作。\n\n还可以配置管理服务，以便在存储库数据库更改角色（即在切换/故障切换期间）后无需进行配置更改。使用\
    \ Oracle Database 11gR2，您可以通过 `srvctl` 命令行实用程序配置仅在数据库担任主角色时才处于活动状态的服务。以下示例说明了在\
    \ Data Guard 配置中为 OMS 配置数据库服务的步骤：\n\n1.  在主数据库 `emrepprim` 上创建一个名为 `emrepsrvc`\
    \ 的数据库服务，供 OMS 使用。\n\n    ```\n    $ srvctl add service -d emrepprim -s emrepsrvc\
    \ -l PRIMARY -q FALSE -e NONE -m NONE -w 0 -z 0\n    ```\n\n2.  验证服务的配置。\n\n \
    \   ```\n    $ srvctl config service -d emreptst -s emrepsrvc\n    Service name:\
    \ emrepsrvc\n    Service is enabled\n    Cardinality: SINGLETON\n    Disconnect:\
    \ false\n    Service role: PRIMARY\n    Management policy: AUTOMATIC\n    DTP\
    \ transaction: false\n    AQ HA notifications: false\n    Failover type: NONE\n\
    \    Failover method: NONE\n    TAF failover retries: 0\n    TAF failover delay:\
    \ 0\n    Connection Load Balancing Goal: LONG\n    Runtime Load Balancing Goal:\
    \ NONE\n    TAF policy specification: NONE\n    Edition:\n    ```\n\n3.  在主数据库上启动并检查服务的状态。\n\
    \n    ```\n    $ srvctl start service -d emreptst -s emrepsrvc\n    $ srvctl status\
    \ service -d emreptst -s emrepsrvc\n    Service emrepsrvc is running\n    ```\n\
    \n4.  在备用数据库上创建相同的服务，供角色更改为备用时使用。\n\n    ```\n    $ srvctl add service -d emrepsby\
    \ -s emrepsrvc -l PRIMARY -q FALSE -e NONE -m BASIC -w 0 -z 0\n    $ srvctl config\
    \ service -d emrepsby -s emrepsrvc\n    Service name: emrepsrvc\n    Service is\
    \ enabled\n    Cardinality: SINGLETON\n    Disconnect: false\n    Service role:\
    \ PRIMARY\n    Management policy: AUTOMATIC\n    DTP transaction: false\n    AQ\
    \ HA notifications: false\n    Failover type: NONE\n    Failover method: BASIC\n\
    \    TAF failover retries: 0\n    TAF failover delay: 0\n    Connection Load Balancing\
    \ Goal: LONG\n    Runtime Load Balancing Goal: NONE\n    TAF policy specification:\
    \ NONE\n    Edition:\n    ```\n\n5.  重新配置 OMS 以在连接描述符中使用新服务。\n\n    ```\n    $OMS_HOME/bin/emctl\
    \ config oms -store_repos_details -repos_conndesc\n    '(DESCRIPTION=(FAILOVER=ON)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oemhost1)(PORT=1521))\n\
    \    (ADDRESS=(PROTOCOL=TCP)(HOST=oemhost2)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=emrepsrvc.\n\
    \    smrcy.com))(FAILOVER_MODE=(TYPE=select)(METHOD=basic)))' -repos_user sysman\n\
    \    Oracle Enterprise Manager Cloud Control 12c Release 2\n    Copyright (c)\
    \ 1996, 2012 Oracle Corporation.  All rights reserved.\n    Enter Repository User's\
    \ Password :\n    Successfully updated datasources and stored repository details\
    \ in Credential Store.\n    If there are multiple OMSs in this environment, run\
    \ this store_repos_details command on\n    all of them.\n    And finally, restart\
    \ all the OMSs using 'emctl stop oms -all' and 'emctl start oms'.\n    ```\n\n\
    6.  停止并重新启动 OMS。\n    *   a. 要停止 OMS，请使用 `emctl stop oms -all`：\n\n        ```\n\
    \        $emctl stop oms -all\n        Oracle Enterprise Manager Cloud Control\
    \ 12c Release 2\n        Copyright (c) 1996, 2012 Oracle Corporation.  All rights\
    \ reserved.\n        Stopping WebTier...\n        WebTier Successfully Stopped\n\
    \        Stopping Oracle Management Server...\n        Oracle Management Server\
    \ Successfully Stopped\n        AdminServer Successfully Stopped\n        Oracle\
    \ Management Server is Down\n        ```\n\n    *   b. 要重新启动，请使用 `emctl start\
    \ oms`：\n\n        ```\n        $emctl start oms\n        Oracle Enterprise Manager\
    \ Cloud Control 12c Release 2\n        Copyright (c) 1996, 2012 Oracle Corporation.\
    \  All rights reserved.\n        Starting Oracle Management Server...\n      \
    \  Starting WebTier...\n        WebTier Successfully Started\n        Oracle Management\
    \ Server Successfully Started\n        Oracle Management Server is Up\n      \
    \  Verify that the new DG connection string is in use\n        $emctl config oms\
    \ -list_repos_details\n        Oracle Enterprise Manager Cloud Control 12c Release\
    \ 2\n        Copyright (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n\
    \        Repository Connect Descriptor : (DESCRIPTION=(FAILOVER=ON)(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oemhost1)(PORT=1521))\n\
    \        (ADDRESS=(PROTOCOL=TCP)(HOST=oemhost2)(PORT=1521)))(CONNECT_DATA=(SERVICE_NAME=emrepsrvc.\n\
    \        smrcy.com))(FAILOVER_MODE=(TYPE=select)(METHOD=basic)))\n        Repository\
    \ User : sysman\n        ```\n\n### 第 3 级 — 使用 SLB 和 RAC Data Guard 存储库的主动/主动\
    \ OMS\n"
- fmt: "# Level 3 High Availability Configuration\n\nIn the previous section, we determined\
    \ that there would be some downtime while the `OMS` is failed over to another\
    \ host. Some environments cannot tolerate such downtime, and so an increased level\
    \ of availability is required. Fortunately, this can be achieved by using multiple\
    \ management servers coupled with a `RAC` database as a repository. `RAC` provides\
    \ both high availability and scalability for the database. You could also consider\
    \ an active/passive `RAC One Node`[⁷](#9781430249382_Ch13.xhtml#Fn7) configuration.\
    \ Additionally, a local physical standby is used to protect the database in the\
    \ event of a database storage failure. The management services are located behind\
    \ a Server Load Balancer (`SLB`). The `SLB` then directs traffic from the Enterprise\
    \ Manager console and management agents to an available `OMS`. Each management\
    \ server can be installed on separate hosts from the `RAC` nodes (see [Figure\
    \ 13-16](#9781430249382_Ch13.xhtml#Fig16)). However, you may need to balance the\
    \ costs of having separate servers and the level of protection needed for such\
    \ a configuration. The management servers and repository databases should be in\
    \ close proximity to each other to reduce network latency. This may dictate that\
    \ the management servers and `RAC` database instances coexist on the servers.\n\
    \n![9781430249382_Fig13-16.jpg](images/9781430249382_Fig13-16.jpg)\n\n[Figure\
    \ 13-16](#9781430249382_Ch13.xhtml#_Fig16) .  Level 3 high availability with multiple\
    \ `OMS`s configured behind a Server Load Balancer and a `RAC` database management\
    \ repository\n\nThis level of availability also provides the ability to scale\
    \ based on business requirements. More `OMS` servers can be added to scale out,\
    \ while nodes can be added to the `RAC` database to scale the repository.\n\n\
    ## Configuration Steps\n\nThe steps required in setting up a level 3 high-availability\
    \ configuration are listed here:\n\n1.  Install the primary `OMS`.\n2.  Configure\
    \ the `SLB`.\n3.  Add repository targets.\n4.  Configure the Software Library.\n\
    5.  Add a second `OMS`.\n6.  Create a standby database.\n7.  Convert the standby\
    \ database to `RAC`.\n\n## Initial OMS Status\n\nAfter an initial installation\
    \ of the first `OMS`, the agents and users connect via the physical hostname:\n\
    \n```shell\n$ $OMS_HOME/bin/emctl status oms -details\nOracle Enterprise Manager\
    \ Cloud Control 12c Release 2  Copyright (c) 1996, 2012 Oracle Corporation.  All\
    \ rights reserved.\nEnter Enterprise Manager Root (SYSMAN) Password :\nConsole\
    \ Server Host        : oem1.example.com\nHTTP Console Port          : 7790\nHTTPS\
    \ Console Port         : 7803\nHTTP Upload Port           : 4890\nHTTPS Upload\
    \ Port          : 4904\nEM Instance Home           : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1\n\
    OMS Log Directory Location : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1/sysman/log\n\
    OMS is not configured with SLB or virtual hostname\nAgent Upload is locked.\n\
    OMS Console is locked.\nActive CA ID: 1\nConsole URL: https://oem1.example.com:443/em\n\
    Upload URL: https://oem1.example.com:4904/empbs/upload\n\nWLS Domain Information\n\
    Domain Name      : GCDomain\nAdmin Server Host: oem1.example.com\n\nManaged Server\
    \ Information\nManaged Server Instance Name: EMGC_OMS1\nManaged Server Instance\
    \ Host: oem1.example.com\nWebTier is Up\nOracle Management Server is Up\n```\n\
    \n## Server Load Balancer Configuration\n\nWhen a Server Load Balancer is configured,\
    \ agent and console traffic is directed to multiple management services by the\
    \ `SLB`. The `SLB` configuration should be done after the installation of the\
    \ first `OMS`.\n\n### SLB Configuration Requirements\n\nThe configuration of the\
    \ `SLB` may vary depending on the manufacturer of the device. However, there are\
    \ several requirements for the `SLB`, which are listed here:\n\n*   `Virtual server\
    \ ports`: Four ports should be configured—Secure Upload, Agent Registration, Secure\
    \ Console and Unsecure Console. If the `OMS` is configured for only secure upload\
    \ and agent traffic, then only the Secure Upload and Secure Console virtual server\
    \ ports are required.\n*   `Persistence`: `HTTP` and `HTTPS` traffic between the\
    \ Enterprise Manager console and `OMS` require persistence or “stickiness” so\
    \ that requests sent to one `OMS` don’t switch to another during the same session.\
    \ Not having persistence could result in users constantly having to log in as\
    \ their sessions are handled by different management services.\n*   `Application\
    \ monitoring`: Checks the health of the management services so that requests aren’t\
    \ sent to one that is either unavailable or degraded.\n\nIn addition to these\
    \ requirements, some devices may also require additional settings such as `F5\
    \ BIG-IP TCP Profiles`. [Table 13-2](#9781430249382_Ch13.xhtml#Tab2) shows an\
    \ example management port configuration using only Secure Upload and Secure Console\
    \ ports.\n\n[Table 13-2](#9781430249382_Ch13.xhtml#_Tab2). Management Service\
    \ Ports\n\n![Table13-2](images/Table13-2.jpg)\n\nThe preceding configuration assumes\
    \ that the Secure Upload port was configured using port `4899` and that the Secure\
    \ Console port was configured using port `7803`. The ports are configured during\
    \ the `OMS` installation. Verify that you provide the same ports used during the\
    \ Enterprise Manager Cloud Control `12c` installation. A virtual hostname and\
    \ `IP` address are also registered in `DNS` to allow clients to connect to the\
    \ `SLB`.\n\n### SLB Configuration Items\n\nNext you need to create the following\
    \ items:\n\n*   `Pools`: Groups of two or more `OMS` servers that are load balanced,\
    \ with each pool running a different management service\n*   `Health monitors`:\
    \ Determines that the service is running and available to accept connections\n\
    *   `Virtual servers`: A unique `IP` address and port that represents a pool of\
    \ servers\n\n## Securing OMS with SLB\n\nAfter the `SLB` has been configured,\
    \ the next step is to configure the `OMS` to use the `SLB`. To do this, you need\
    \ to resecure the management service to regenerate the certificate.\n\n```shell\n\
    emctl secure oms –sysman_pwd <sysman_password> \\\n       -reg_pwd <agent_reg_password>\
    \ \\\n       -host <virtualhostname> \\\n       -secure_port 4899 \\\n       -slb_port\
    \ 4899 \\\n       -slb_console_port 443 \\\n       -console \\\n       –lock_console\n\
    ```\n\nThe following example illustrates securing the `OMS` with the `SLB` virtual\
    \ hostname by using the `HTTPS` Upload using port `4904` and `HTTPS` Console port\
    \ `443`. The console is also locked to prevent non-`HTTPS` traffic from accessing\
    \ it.\n\n```shell\n$OMS_HOME/bin/emctl secure oms -sysman_pass \\\n-reg_pwd regpass\
    \ \\\n-host slb.example.com \\\n-secure_port 4904 \\\n-slb_port 4904 \\\n-slb_console_port\
    \ 443 \\\n-reset \\\n-console \\\n-lock_console\nOracle Enterprise Manager Cloud\
    \ Control 12c Release 2\nCopyright (c) 1996, 2012 Oracle Corporation.  All rights\
    \ reserved.\nSecuring OMS... Started.\nSecuring OMS... Successful\nRestart OMS\n\
    ```\n\nAfter running these commands, the `OMS` will need to be restarted.\n\n\
    ```shell\nemctl stop oms –all\n\nemctl start oms\n```\n\n## Verifying the Configuration\n\
    \nTo verify that the `OMS` has been successfully secured, issue the following\
    \ command:\n\n```shell\nemctl status oms –details\n```\n\nThe output of this command\
    \ should indicate that `SLB` or virtual hostname as well as the ports for the\
    \ `SLB` `HTTPS` Upload and `HTTPS` Console."
  raw: 'In the previous section, we determined that there would be some downtime while
    the OMS is failed over to another host. Some environments cannot tolerate such
    downtime, and so an increased level of availability is required. Fortunately,
    this can be achieved by using multiple management servers coupled with a RAC database
    as a repository. RAC provides both high availability and scalability for the database.
    You could also consider an active/passive RAC One Node[⁷](#9781430249382_Ch13.xhtml#Fn7)
    configuration. Additionally, a local physical standby is used to protect the database
    in the event of a database storage failure. The management services are located
    behind a Server Load Balancer (SLB). The SLB then directs traffic from the Enterprise
    Manager console and management agents to an available OMS. Each management server
    can be installed on separate hosts from the RAC nodes (see [Figure 13-16](#9781430249382_Ch13.xhtml#Fig16)).
    However, you may need to balance the costs of having separate servers and the
    level of protection needed for such a configuration. The management servers and
    repository databases should be in close proximity to each other to reduce network
    latency. This may dictate that the management servers and RAC database instances
    coexist on the servers.


    ![9781430249382_Fig13-16.jpg](images/9781430249382_Fig13-16.jpg)


    [Figure 13-16](#9781430249382_Ch13.xhtml#_Fig16) .  Level 3 high availability
    with multiple OMSs configured behind a Server Load Balancer and a RAC database
    management repository


    This level of availability also provides the ability to scale based on business
    requirements. More OMS servers can be added to scale out, while nodes can be added
    to the RAC database to scale the repository.


    The steps required in setting up a level 3 high-availability configuration are
    listed here:


    1.  Install the primary OMS.

    2.  Configure the SLB.

    3.  Add repository targets.

    4.  Configure the Software Library.

    5.  Add a second OMS.

    6.  Create a standby database.

    7.  Convert the standby database to RAC.


    After an initial installation of the first OMS, the agents and users connect via
    the physical hostname:


    ```

    $ $OMS_HOME/bin/emctl status oms -details

    Oracle Enterprise Manager Cloud Control 12c Release 2  Copyright (c) 1996, 2012
    Oracle

    Corporation.  All rights reserved.

    Enter Enterprise Manager Root (SYSMAN) Password :

    Console Server Host        : oem1.example.com

    HTTP Console Port          : 7790

    HTTPS Console Port         : 7803

    HTTP Upload Port           : 4890

    HTTPS Upload Port          : 4904

    EM Instance Home           : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1

    OMS Log Directory Location : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1/sysman/log

    OMS is not configured with SLB or virtual hostname

    Agent Upload is locked.

    OMS Console is locked.

    Active CA ID: 1

    Console URL: https://oem1.example.com:443/em

    Upload URL: https://oem1.example.com:4904/empbs/upload


    WLS Domain Information

    Domain Name      : GCDomain

    Admin Server Host: oem1.example.com


    Managed Server Information

    Managed Server Instance Name: EMGC_OMS1

    Managed Server Instance Host: oem1.example.com

    WebTier is Up

    Oracle Management Server is Up

    ```


    When a Server Load Balancer is configured, agent and console traffic is directed
    to multiple management services by the SLB. The SLB configuration should be done
    after the installation of the first OMS.


    Server Load Balancer Configuration


    The configuration of the SLB may vary depending on the manufacturer of the device.
    However, there are several requirements for the SLB, which are listed here:


    *   *Virtual server ports*: Four ports should be configured—Secure Upload, Agent
    Registration, Secure Console and Unsecure Console. If the OMS is configured for
    only secure upload and agent traffic, then only the Secure Upload and Secure Console
    virtual server ports are required.

    *   *Persistence*: HTTP and HTTPS traffic between the Enterprise Manager console
    and OMS require persistence or “stickiness” so that requests sent to one OMS don’t
    switch to another during the same session. Not having persistence could result
    in users constantly having to log in as their sessions are handled by different
    management services.

    *   *Application monitoring*: Checks the health of the management services so
    that requests aren’t sent to one that is either unavailable or degraded.


    In addition to these requirements, some devices may also require additional settings
    such as F5 BIG-IP TCP Profiles. [Table 13-2](#9781430249382_Ch13.xhtml#Tab2) shows
    an example management port configuration using only Secure Upload and Secure Console
    ports.


    [Table 13-2](#9781430249382_Ch13.xhtml#_Tab2). Management Service Ports


    ![Table13-2](images/Table13-2.jpg)


    The preceding configuration assumes that the Secure Upload port was configured
    using port 4899 and that the Secure Console port was configured using port 7803\.
    The ports are configured during the OMS installation. Verify that you provide
    the same ports used during the Enterprise Manager Cloud Control 12c installation.
    A virtual hostname and IP address are also registered in DNS to allow clients
    to connect to the SLB.


    Next you need to create the following items:


    *   *Pools*: Groups of two or more OMS servers that are load balanced, with each
    pool running a different management service

    *   *Health monitors*: Determines that the service is running and available to
    accept connections

    *   *Virtual servers*: A unique IP address and port that represents a pool of
    servers


    After the SLB has been configured, the next step is to configure the OMS to use
    the SLB. To do this, you need to resecure the management service to regenerate
    the certificate.


    ```

    emctl secure oms –sysman_pwd <sysman_password> \

           -reg_pwd <agent_reg_password> \

           -host <virtualhostname> \

           -secure_port 4899 \

           -slb_port 4899 \

           -slb_console_port 443 \

           -console \

           –lock_console

    ```


    The following example illustrates securing the OMS with the SLB virtual hostname
    by using the HTTPS Upload using port 4904 and HTTPS Console port 443\. The console
    is also locked to prevent non-HTTPS traffic from accessing it.


    ```

    $OMS_HOME/bin/emctl secure oms -sysman_pass \

    -reg_pwd regpass \

    -host slb.example.com \

    -secure_port 4904 \

    -slb_port 4904 \

    -slb_console_port 443 \

    -reset \

    -console \

    -lock_console

    Oracle Enterprise Manager Cloud Control 12c Release 2

    Copyright (c) 1996, 2012 Oracle Corporation.  All rights reserved.

    Securing OMS... Started.

    Securing OMS... Successful

    Restart OMS

    ```


    After running these commands, the OMS will need to be restarted.


    ```

    emctl stop oms –all


    emctl start oms

    ```


    To verify that the OMS has been successfully secured, issue the following command:


    ```

    emctl status oms –details

    ```


    The output of this command should indicate that SLB or virtual hostname as well
    as the ports for the SLB HTTPS Upload and HTTPS Console.'
  trans: "\n# 三级高可用性配置\n\n在上一节中，我们确定了当 `OMS` 故障转移到另一台主机时，会出现一定的停机时间。某些环境无法容忍此类停机，因此需要提高可用性级别。幸运的是，这可以通过使用多个管理服务器并结合\
    \ `RAC` 数据库作为存储库来实现。`RAC` 为数据库提供了高可用性和可扩展性。你也可以考虑采用主动/被动 `RAC One Node`⁷ 配置。此外，还使用本地物理备用数据库来保护数据库以防数据库存储故障。管理服务位于服务器负载均衡器（`SLB`）之后。`SLB`\
    \ 随后将来自企业管理器控制台和管理代理的流量定向到可用的 `OMS`。每个管理服务器可以安装在与 `RAC` 节点不同的主机上（参见图 13-16）。然而，你可能需要平衡使用独立服务器的成本与此类配置所需的保护级别。管理服务器和存储库数据库应彼此靠近以减少网络延迟。这可能要求管理服务器和\
    \ `RAC` 数据库实例共存于同一服务器上。\n\n![9781430249382_Fig13-16.jpg](img/9781430249382_Fig13-16.jpg)\n\
    \n图 13-16 .  三级高可用性配置：多个 `OMS` 配置在服务器负载均衡器之后，并使用 `RAC` 数据库作为管理存储库\n\n此级别的可用性还提供了根据业务需求进行扩展的能力。可以添加更多\
    \ `OMS` 服务器以进行横向扩展，同时可以向 `RAC` 数据库添加节点以扩展存储库。\n\n## 配置步骤\n\n设置三级高可用性配置所需的步骤如下：\n\
    \n1.  安装主 `OMS`。\n2.  配置 `SLB`。\n3.  添加存储库目标。\n4.  配置软件库。\n5.  添加第二个 `OMS`。\n\
    6.  创建备用数据库。\n7.  将备用数据库转换为 `RAC`。\n\n## 初始 OMS 状态\n\n在首次安装第一个 `OMS` 后，代理和用户通过物理主机名连接：\n\
    \n```shell\n$ $OMS_HOME/bin/emctl status oms -details\nOracle Enterprise Manager\
    \ Cloud Control 12c Release 2  Copyright (c) 1996, 2012 Oracle Corporation.  All\
    \ rights reserved.\nEnter Enterprise Manager Root (SYSMAN) Password :\nConsole\
    \ Server Host        : oem1.example.com\nHTTP Console Port          : 7790\nHTTPS\
    \ Console Port         : 7803\nHTTP Upload Port           : 4890\nHTTPS Upload\
    \ Port          : 4904\nEM Instance Home           : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1\n\
    OMS Log Directory Location : /u01/app/oracle/Middleware/gc_inst/em/EMGC_OMS1/sysman/log\n\
    OMS is not configured with SLB or virtual hostname\nAgent Upload is locked.\n\
    OMS Console is locked.\nActive CA ID: 1\nConsole URL: https://oem1.example.com:443/em\n\
    Upload URL: https://oem1.example.com:4904/empbs/upload\n\nWLS Domain Information\n\
    Domain Name      : GCDomain\nAdmin Server Host: oem1.example.com\n\nManaged Server\
    \ Information\nManaged Server Instance Name: EMGC_OMS1\nManaged Server Instance\
    \ Host: oem1.example.com\nWebTier is Up\nOracle Management Server is Up\n```\n\
    \n## 服务器负载均衡器配置\n\n当配置了服务器负载均衡器时，`SLB` 会将代理和控制台流量定向到多个管理服务。`SLB` 配置应在安装第一个 `OMS`\
    \ 之后进行。\n\n### SLB 配置要求\n\n`SLB` 的配置可能因设备制造商而异。然而，`SLB` 有几个要求，列举如下：\n\n*   `虚拟服务器端口`：应配置四个端口——安全上传、代理注册、安全控制台和非安全控制台。如果\
    \ `OMS` 仅配置了安全上传和代理流量，则只需要安全上传和安全控制台虚拟服务器端口。\n*   `持久性`：企业管理器控制台与 `OMS` 之间的 `HTTP`\
    \ 和 `HTTPS` 流量需要持久性或“粘性”，以便发送到某个 `OMS` 的请求在同一会话期间不会切换到另一个。没有持久性可能导致用户因会话被不同的管理服务处理而不得不持续登录。\n\
    *   `应用程序监控`：检查管理服务的健康状况，以便请求不会被发送到不可用或性能下降的服务。\n\n除了这些要求，某些设备可能还需要额外的设置，例如 `F5\
    \ BIG-IP TCP 配置文件`。表 13-2 展示了一个仅使用安全上传和安全控制台端口的管理端口配置示例。\n\n表 13-2. 管理服务端口\n\n\
    ![Table13-2](img/Table13-2.jpg)\n\n上述配置假设安全上传端口配置为端口 `4899`，安全控制台端口配置为端口 `7803`。这些端口在\
    \ `OMS` 安装过程中配置。请确认你提供了与企业管理器云控制 `12c` 安装期间使用的相同端口。虚拟主机名和 `IP` 地址也在 `DNS` 中注册，以允许客户端连接到\
    \ `SLB`。\n\n### SLB 配置项\n\n接下来你需要创建以下项目：\n\n*   `池`：两台或多台 `OMS` 服务器的组，进行负载均衡，每个池运行不同的管理服务。\n\
    *   `运行状况检查器`：确定服务正在运行并可接受连接。\n*   `虚拟服务器`：代表服务器池的唯一 `IP` 地址和端口。\n\n## 使用 SLB\
    \ 保护 OMS\n\n`SLB` 配置完成后，下一步是配置 `OMS` 以使用 `SLB`。为此，你需要重新保护管理服务以重新生成证书。\n\n```shell\n\
    emctl secure oms –sysman_pwd <sysman_password> \\\n       -reg_pwd <agent_reg_password>\
    \ \\\n       -host <virtualhostname> \\\n       -secure_port 4899 \\\n       -slb_port\
    \ 4899 \\\n       -slb_console_port 443 \\\n       -console \\\n       –lock_console\n\
    ```\n\n以下示例说明了通过使用端口 `4904` 的 `HTTPS` 上传和端口 `443` 的 `HTTPS` 控制台，利用 `SLB` 虚拟主机名保护\
    \ `OMS`。控制台也被锁定以防止非 `HTTPS` 流量访问。\n\n```shell\n$OMS_HOME/bin/emctl secure oms\
    \ -sysman_pass \\\n-reg_pwd regpass \\\n-host slb.example.com \\\n-secure_port\
    \ 4904 \\\n-slb_port 4904 \\\n-slb_console_port 443 \\\n-reset \\\n-console \\\
    \n-lock_console\nOracle Enterprise Manager Cloud Control 12c Release 2\nCopyright\
    \ (c) 1996, 2012 Oracle Corporation.  All rights reserved.\nSecuring OMS... Started.\n\
    Securing OMS... Successful\nRestart OMS\n```\n\n运行这些命令后，需要重启 `OMS`。\n\n```shell\n\
    emctl stop oms –all\n\nemctl start oms\n```\n\n## 验证配置\n\n要验证 `OMS` 是否已成功保护，请执行以下命令：\n\
    \n```shell\nemctl status oms –details\n```\n\n此命令的输出应表明已配置 `SLB` 或虚拟主机名，以及 `SLB`\
    \ `HTTPS` 上传和 `HTTPS` 控制台的端口。\n"
