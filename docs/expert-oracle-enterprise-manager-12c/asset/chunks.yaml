    正如 `Consolidation Planner` 擅长识别如何将物理资源合并到虚拟资源中一样，这个有价值的工具提供了重要信息，在考虑将物理服务器迁移到更新的物理服务器时非常有帮助。使用
    `Consolidation Planner` 来规划向任何工程化系统的迁移，都可以轻松地确定范围、识别任务并充满信心地执行。


    ## 创建测试环境


    在您的场景运行完毕并产生可接受的结果后，就需要确定要迁移的应用程序以及目标工程化系统的详细信息了。您需要创建一个测试环境，该环境应在一定程度上镜像您的目标目的地，以测试并减轻与迁移相关的所有潜在风险。


    与任何测试环境一样，存储大量数据可能成本高昂，因此应使用理想的数据子集。Oracle 针对此问题开发了两种方法：`Test Data Management
    Pack` 和 `Oracle Application Testing Suite`。


    `Test Data Management Pack` 支持数据子集化、数据发现和建模。数据子集化功能使您能够在生产、开发和测试系统上创建具有参照完整性的数据子集。为测试目的进行数据子集化，允许您选择所需数据的百分比（如
    1%或 5%），从而使测试更轻松。


    此工具包中的其他功能使您可以执行以下操作：


    *   创建/编辑子集定义

    *   预览子集详细信息和空间估算

    *   定义和执行子集化前/后脚本

    *   在目标之间执行子集定义

    *   导出/导入子集定义


    第二个选项是 `Oracle Application Testing Suite`，它是 `EM12c` 的一个扩展，提供与 `Test Data Management
    Pack` 相同的功能。`Oracle Application Testing Suite` 解决了所有相同的问题，并提供了一个完整的套件来创建测试环境并按需执行测试。


    ![image](img/sq.jpg) `注` 有关 `Oracle Application Testing Suite` 的更多信息，请访问 `http://otn.oracle.com`
    上的 Enterprise Manager 部分。


    随着应用程序复杂性的增加，尤其是在云等共享计算环境中，访问敏感数据的机会也在增加。对敏感数据（如社会安全号码）的访问可以通过在不同环境之间对数据进行脱敏来限制。`Oracle
    Data Masking Pack` 用外观逼真的、经过清理的数据替换原始敏感数据，这些数据具有与原始数据相同的类型特征。这使组织能够共享完全脱敏的数据，同时仍能遵守内部公司治理和政府法规。


    `Data Masking Pack` 使您可以执行以下操作：


    *   创建或使用脱敏定义

    *   对真实的应用程序测试工作负载进行脱敏

    *   定义可重用的格式库

    *   导出/导入脱敏模板

    *   导出/导入格式库


    `EM12c` 通过 `Data Masking Pack` 引入了发现数据依赖关系和进行建模的能力。此功能允许您发现环境中的数据模型和敏感数据，从而可以通过数据脱敏来保护它们。使用
    Oracle 的 `FAST`（查找、评估、保护和测试）方法论来实施数据脱敏，您可以在 `Oracle Exadata` 上创建一个测试环境，其中所有敏感信息在进行下一步系统性能验证之前都已被脱敏。


    其他数据脱敏功能使您可以执行以下操作：


    *   创建/编辑应用程序数据模型

    *   手动定义应用程序、模式和表

    *   使用开箱即用的元数据收集驱动程序，用于客户和打包的应用程序

    *   手动或通过使用敏感列发现来定义敏感列

    *   按敏感类型对敏感列进行分类

    *   定义和管理敏感类型

    *   导出和导入应用程序数据模型

    *   验证定义并将其与多个目标关联

