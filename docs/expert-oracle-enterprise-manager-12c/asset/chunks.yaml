    在导航栏的右侧是一个搜索框，允许您直接从产品界面内搜索 Enterprise Manager 和 My Oracle Support (MOS)。搜索框的默认范围是“搜索目标名称”，但下拉列表使您可以将范围更改为例如
    Oracle 补丁或 My Oracle Support 知识库。举个例子，假设您不完全记得 Oracle Database 近期版本中的 `ADR retention
    policies` 是如何工作的。您推测此信息应该在 MOS 的知识库中可用。因此，您从下拉菜单中选择“搜索知识库”并输入查询，如图 4-45 所示。


    ![9781430249382_Fig04-45.jpg](img/9781430249382_Fig04-45.jpg)


    图 4-45. 从 Cloud Control 内部搜索知识库


    假设您已配置支持访问，您将被带到查询结果。在我们的案例中，我们需要的准确文档是第一个命中项（参见图 4-46）。如有必要，您可以按照正常的 MOS 方式修改搜索条件以缩小或扩大结果范围。


    ![9781430249382_Fig04-46.jpg](img/9781430249382_Fig04-46.jpg)


    图 4-46. Enterprise Manager 中的知识库搜索结果


    搜索下拉列表中的来源范围直接对应于 My Oracle Support Flash 界面中的可搜索来源列表。


    ## 目标管理菜单栏


    前面讨论的所有菜单项在整个 Enterprise Manager 中都可用，并为管理产品提供了一致、连贯且始终可用的导航范式。此外，每个插件，无论是 Oracle
    还是第三方提供，都负责为其提供可管理性服务的目标类型提供管理菜单栏。为了说明一般特性，我们将使用 Oracle Database 插件，因为我们假设大多数读者对数据库管理有一定了解。每个受管目标类型在其特定于目标的菜单栏上提供菜单，其中一些将与此处展示的菜单一致，而另一些将是特定于目标类型的，并暴露仅适用于该目标类型的可管理性接口。


    正如您在引言中回忆的那样，早期的 Enterprise Manager 版本具有一些不一致的界面，设计取决于各个产品组，并采用了多种范式，从数据库团队的链接列表到
    Fusion Middleware 团队采用的高度菜单驱动的方法。在此版本中，各个产品采用了 Fusion Middleware 团队开创的方法。例如，数据库目标的首页如图
    4-47 所示。


    ![9781430249382_Fig04-47.jpg](img/9781430249382_Fig04-47.jpg)


    图 4-47. 数据库首页


    Oracle 数据库的目标管理菜单栏有五个子菜单：`Oracle Database`、`Performance`、`Availability`、`Schema`
    和 `Administration`。这些在图 4-47 的顶部进行了说明。


    最左边的菜单，称为*目标类型菜单*，在整个产品中是通用的，并提供对目标各种配置项的访问。它始终标记为目标类型（`Oracle Database`、`WebLogic
    Server` 等）。任何进一步的菜单都是该目标类型插件的职责。为了说明这一点，请将数据库首页与 Enterprise Manager `WebLogic`
    管理服务器的首页进行比较，如图 4-48 所示。性能、可用性等菜单已丢失，因为底层产品以不同的方式暴露了这些功能的可管理性。但是，目标类型菜单仍然存在，这次标记为
    `WebLogic Server`。'
- fmt: '![9781430249382_Fig04-48.jpg](images/9781430249382_Fig04-48.jpg)


    [Figure 4-48](#9781430249382_Ch04.xhtml#_Fig48). Home page for a WebLogic administration
    server


    The target type menu items, as shown in [Figure 4-49](#9781430249382_Ch04.xhtml#Fig49),
    are designed for quick access to controlling the monitoring, configuration, and
    reporting for the target. Here you can change or set up both monitoring and alerting.
    In addition, the menu may offer the ability to control the state of the target—for
    example, to shut it down—as well as various informational and reporting options.
    The following sections discuss key options from this menu.


    ![9781430249382_Fig04-49.jpg](images/9781430249382_Fig04-49.jpg)


    [Figure 4-49](#9781430249382_Ch04.xhtml#_Fig49). The target type menu


    ## Monitoring Setup


    The Monitoring submenu contains at least the following items relating to metric
    collection and reporting:


    *   `User Defined Metrics`: User-created metrics for this target type

    *   `All Metrics`: All metrics for this target type

    *   `Metric Collection Settings`: Whether and how often to collect the metric

    *   `Metric Collection Errors`: Errors encountered when collecting metrics


    [Figure 4-50](#9781430249382_Ch04.xhtml#Fig50) shows the Monitoring submenu for
    a WebLogic server, illustrating these and WebLogic-specific options. The use of
    these options is reasonably self-explanatory, while the actual metrics vary by
    target type. [Figure 4-51](#9781430249382_Ch04.xhtml#Fig51) shows the result of
    selecting `All Metrics` for a database target. This gives you access to the full
    range of metrics available for this target. We have sorted by category to make
    the list easier to view, because databases have a very large number of potential
    metrics.


    ![9781430249382_Fig04-50.jpg](images/9781430249382_Fig04-50.jpg)


    [Figure 4-50](#9781430249382_Ch04.xhtml#_Fig50). The Monitoring submenu


    ![9781430249382_Fig04-51.jpg](images/9781430249382_Fig04-51.jpg)


    [Figure 4-51](#9781430249382_Ch04.xhtml#_Fig51). Available metrics for a database
    target


    ![image](images/sq.jpg) `Note` We also get an immediate trend for top-five alerting
    metrics plus any open metric events. This is a neat improvement on the way the
    same information was presented previously.


    If you expand the Capacity category and click on a tablespace used metric, you
    see the common metric configuration page, shown in [Figure 4-52](#9781430249382_Ch04.xhtml#Fig52),
    allowing you to set the frequency of collection and upload interval. This functionality
    is common to all metrics for all managed targets. A management metric in this
    case is just a data point of interest—for example, the amount of free space in
    an Oracle tablespace. The metrics are collected by the agent at the configured
    frequency and uploaded every so many collections (in this case, every time).


    ![9781430249382_Fig04-52.jpg](images/9781430249382_Fig04-52.jpg)


    [Figure 4-52](#9781430249382_Ch04.xhtml#_Fig52). Tablespaces Full metric details


    The available metrics vary by target type, but the configuration of the collection
    and upload is common across the product. The prime reason, of course, for collecting
    metrics is to allow analysis and alerting to take place. In Enterprise Manager,
    for historic reasons, `alerting` has a specific technical meaning that is different
    from common English usage. Specifically, an alert occurs when a metric crosses
    a threshold set by an administrator (this may have to occur for several collections
    in a row to avoid false positives). There is no association between an alert occurring
    and an administrator being notified.


    The Metric and Collection Settings menu offers a different view of the metric
    collection configuration, grouping metrics by type, and allowing you to change
    the schedule for collecting the value of the metric and to define thresholds for
    that metric that represent warning or critical states for the collected metric.
    [Figure 4-53](#9781430249382_Ch04.xhtml#Fig53) illustrates this interface for
    a database target.


    ![9781430249382_Fig04-53.jpg](images/9781430249382_Fig04-53.jpg)


    [Figure 4-53](#9781430249382_Ch04.xhtml#_Fig53). Metric and collection settings


    Notifications are configured on a per administrator basis by using the Setup menu
    located on the Cloud Control menu bar described earlier. The configuration of
    alert thresholds on a per target basis can be performed here.


    ![image](images/sq.jpg) `Note` As described in [Chapter 7](#9781430249382_Ch07.xhtml),
    you will mostly use monitoring templates to set alert thresholds. The Monitoring
    menu provides a method to override these where necessary. Once you have set up
    your metrics and your alerting, make sure to periodically review the target for
    any metric collection errors using the `Metric Collection Errors` menu item.


    ## Diagnostics


    Some, but not all, target types use the Diagnostics submenu to give you access
    to the Oracle Support Workbench and Health Check monitors. I expect the range
    of targets supplying this submenu to grow with time. This provides a handy way
    to package your support incidents and upload them to support, as well as to compare
    the existing state of your infrastructure with published Oracle practices.


    For a database target, this submenu allows access to the Support Workbench, which
    allows you to package incidents detected by the Advanced Diagnostic Repository
    and upload these to support. [Figure 4-54](#9781430249382_Ch04.xhtml#Fig54) shows
    an `ORA-0600` error appearing for an EM repository database target.


    ![9781430249382_Fig04-54.jpg](images/9781430249382_Fig04-54.jpg)


    [Figure 4-54](#9781430249382_Ch04.xhtml#_Fig54). Support Workbench


    This interface allows you to manage an incident with support and integrate the
    progress of that incident against the managed target. The full screen provides
    a graphic view of incident timelines and the way in which `ADR` has linked incidents
    to problem records (see [Figure 4-55](#9781430249382_Ch04.xhtml#Fig55)).


    ![9781430249382_Fig04-55.jpg](images/9781430249382_Fig04-55.jpg)


    [Figure 4-55](#9781430249382_Ch04.xhtml#_Fig55). Incident occurrence


    ## Target State and Notification Control


    The Control submenu gives you two basic functionalities and should be available
    for all target types (see [Figure 4-56](#9781430249382_Ch04.xhtml#Fig56)). The
    first is the ability simply to start or stop the managed target by using the target-specific
    appropriate procedures. Just below this, though, is the ability to set or manage
    blackouts. A `blackout` is a predefined period during which normal monitoring
    and alerting is suspended, and optionally during which management tasks do not
    run. The blackout feature allows you to take account of planned downtime (for
    example, for monthly operating system security patch application without receiving
    a blizzard of notifications of target state-change alerts as the managed hosts
    shut down and restart).


    ![9781430249382_Fig04-56.jpg](images/9781430249382_Fig04-56.jpg)


    [Figure 4-56](#9781430249382_Ch04.xhtml#_Fig56). The Control submenu


    Clicking `Create Blackout` opens the Create Blackout wizard, shown in [Figure
    4-57](#9781430249382_Ch04.xhtml#Fig57). As you can see, the blackout functionality
    is quite extensive and can apply to composite targets (most commonly a host and
    all targets running on that host).


    ![9781430249382_Fig04-57.jpg](images/9781430249382_Fig04-57.jpg)


    [Figure 4-57](#9781430249382_Ch04.xhtml#_Fig57). Create Blackout welcome screen


    ![image](images/sq.jpg) `Tip` Don’t use blackouts to hide alerts that you don’t
    want or know how to investigate. This `always` leads to missing alerts that you
    should have picked up. Instead, use blackouts only for planned maintenance.


