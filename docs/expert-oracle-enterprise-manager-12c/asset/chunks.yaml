- fmt: "# Oracle Enterprise Manager Cloud Control 插件开发基础\n\n## 插件基础结构\n\n暂存根目录包含 `plugin.xml`，这是一个插件定义文件，包含了\
    \ OMS 所需的基本插件信息。暂存根目录中有两个必需的子目录：`oms` 和 `agent`。`oms` 目录包含所有用于在 OMS 上部署的文件，而 `agent`\
    \ 目录包含用于在代理上部署的文件。你可以将它们视作代理端和 OMS 端区域。你会发现某些文件必须同时包含在两个区域中。`plugin_registry.xml`\
    \ 文件在某种程度上类似于暂存根目录中的 `plugin.xml` 文件，但其内容用于部署在管理代理上。可以将 `plugin.xml` 和 `plugin_registry.xml`\
    \ 共同视为插件定义。请注意，如果设计用于支持复杂系统，单个插件可能包含不止一个目标类型。例如，Oracle Exadata 插件就包含了十种新的目标类型。\n\
    \n**目标类型元数据** 是插件的关键组件。XML 目标类型元数据文件同时包含在 OMS 和代理区域中。由于我的开发平台是 Linux，我通常将目标类型元数据文件放置在\
    \ `<stage>/oms/metadata/targetType/` 中，并从 `<stage>/agent/metadata/` 创建一个指向它的软链接。虽然文件名本身可以自由选择，但建议的做法是根据它定义的目标类型来命名，并添加\
    \ `.xml` 扩展名。\n\n**默认采集元数据** 与目标类型元数据紧密耦合，定义了所有指标（包括告警条件）的采集计划和采集相关属性。就像目标类型元数据一样，默认采集元数据\
    \ XML 文件也存在于 OMS 和代理区域中，因此我通常也使用软链接。建议将文件命名为与目标类型元数据 XML 文件相同的名称。\n\n你会了解到，在 OMS\
    \ 端区域可以包含更多文件，但这通常是任何插件中都会看到的最低要求。通过创建这个基本的目录树来开始你的每一个新插件。\n\n## 插件元数据\n\n一个简化版的\
    \ `plugin.xml` 如 [清单 10-5](#9781430249382_Ch10.xhtml#list5) 所示。你可以在 `<stage>/plugin.xml`\
    \ 中找到它。请记住，我们第一个示例插件的暂存区域是 `<EDK>/samples/plugins/oracle.samples.xsh1/plugin_dist`。\n\
    \n[**清单 10-5**](#9781430249382_Ch10.xhtml#_list5). 简单主机插件 1 的插件元数据 `plugin.xml`\n\
    \n```xml\n<?xml version = \"1.0\"?>\n<Plugin xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\n       \"http://www.oracle.com/EnterpriseGridControl/plugin_metadataplugin_metadata.xsd\"\
    \n    xmlns=\"http://www.oracle.com/EnterpriseGridControl/plugin_metadata\">\n\
    \  <PluginId vendorId=\"oracle\" productId=\"samples\" pluginTag=\"xsh1\"/>\n\
    \  <PluginVersion value=\"12.1.0.0.0\"/>\n  <PluginOMSOSAruId value=\"2000\"/>\n\
    \  <ShortDescription>Sample Host Plugin 1</ShortDescription>\n  <Readme>Sample\
    \ Host Plugin 1\\. See Book Expert Oracle Enterprise Manager 12c.</Readme>\n \
    \ <PluginAttributes Category=\"Others\" DisplayName=\"Sample Host Plugin 1\"/>\n\
    \  <TargetTypeList>\n    <TargetType name=\"sample_host1\" isIncluded=\"TRUE\"\
    />\n  </TargetTypeList>\n</Plugin>\n```\n\n要获取更多选项，请参阅示例的完整 `plugin.xml` 文件，以及文档\
    \ *Oracle Enterprise Manager Cloud Control Extensibility Programmer's Reference*（[第\
    \ 2 章](#9781430249382_Ch02.xhtml)，第 2.4 节）。更多选项可以在插件元数据参考中找到，位于 `<EDK>/doc/partnersdk/mrs/emcore/pluginMetadata/`。这里，我们只介绍几个必需的基本元素。根元素\
    \ `Plugin` 的庞大属性 `xmlns:xsi`、`xsi:schemaLocation` 和 `xmlns` 引用了各种命名空间和 XML 架构。只需确保你从示例模板中原样保留它们即可。这同样适用于我们将使用的其他\
    \ XML 文件。\n\n`PluginId` 由三个部分组成，用点分隔：`vendorId.productId.pluginTag`。点表示法稍后将在代理端定义中使用。供应商\
    \ ID 和产品 ID 最多可包含 8 个字符，而插件标签必须为 4 个字符或更少。例如，Oracle 的示例插件 ID 是 `oracle.sysman.xsh1`，而对于我的演示\
    \ MySQL 插件，我使用 ID `pythian.mysql.demo`。\n\n插件版本由五个数字表示：`a.b.c.d.e`。前两个数字（`a.b`）应与你开发所基于的\
    \ EM12c 版本相同。第三个数字（`c`）应始终为 0。第四个数字是你每次发布插件时递增的数字。Oracle 将第五个数字（`e`）保留供将来使用，并指示你始终将其设置为\
    \ 0。然而，我一直用它来标识插件的次要版本。例如，在撰写本文时，`12.1.0.1.2` 是 Pythian MySQL 插件的当前版本。\n\n你需要在开发环境中部署后续版本时递增版本号。你可以使用最后一个数字用于开发版本递增，或者在开发期间只修改插件\
    \ ID。例如，我使用 `pythian.mysql.prod` 表示公开发布的版本，使用 `pythian.mysql.test` 表示开发和测试。\n\n\
    `PluginOMSOSAruId` 元素定义了 OMS 应在哪个操作系统上运行才能支持此插件。值 `2000` 表示通用平台，你经常会发现你的插件对 OMS\
    \ 服务器平台几乎没有依赖性，但通常对代理操作系统有依赖。这里我不深入探讨兼容性的细节（参见前面引用的文档），但 `plugin.xml` 是你可以定义插件与其他\
    \ EM12c 组件兼容性的地方。\n\n`ShortDescription` 和 `Readme` 标签的作用不言自明。`PluginAttributes`\
    \ 元素包含一些基本属性。你可以为 `Category` 属性设置一些预定义的类别，例如 `Databases`、`Middleware` 等。`DisplayName`\
    \ 属性是你的插件在 EM12c 用户界面中显示的方式。\n\n最后，是 `TargetTypeList` 元素，它列出了插件包含的所有目标类型。一个简单的插件通常只包含一个目标类型，因此只有一个\
    \ `TargetType` 子元素。目标类型名称是插件中包含的目标类型的内部 ID。本章稍后在实际定义目标类型时，会展示更多关于目标类型 ID 选择的内容。\n\
    \n插件定义还支持定义插件依赖关系、版本支持和兼容性，以及许多其他属性，例如“新增功能”部分。你现在不需要深入研究这些，并且总可以在以后使插件元数据变得更加复杂。我通常建议从简单开始，然后慢慢向你的插件中添加功能。\n\
    \n## 插件注册表\n\n虽然 `plugin.xml` 包含 OMS 端的元数据，但 `plugin_registry.xml` 定义了插件部署的代理所需的元数据——通常只是目标类型元数据文件和默认采集元数据文件的列表。对于单目标类型插件，每种文件只有一个。它们使用\
    \ `TargetTypes` 和 `TargetCollections` 元素来定义，这些元素是一个或多个 `FileLocation` 元素的简单容器。`FileLocation`\
    \ 中的路径是相对于暂存区域中的 `agent` 目录的。[清单 10-6](#9781430249382_Ch10.xhtml#list6) 是示例中简化的\
    \ `plugin_registry.xml` 文件。\n\n[**清单 10-6**](#9781430249382_Ch10.xhtml#_list6).\
    \ 简单主机插件 1 的代理端插件元数据 `plugin_registry.xml`"
  raw: 'The staging root contains plugin.xml, a plug-in definition containing the
    basic plug-in information required by the OMS. The two mandatory subdirectories
    in the staging root are oms and agent. The oms directory contains all the files
    used for deployment on the OMS, and the agent directory contains the files for
    deployment on the agent. You can think of them as agent-side and OMS-side areas.
    You will see that some files must be included in both areas. The plugin_registry.xml
    file is somewhat similar to the plugin.xml file in the staging root directory,
    but its content is for deployment on the management agent. Think of plugin.xml
    and plugin_registry.xml together as the plug-in definition. Note that a single
    plug-in may contain more than a single target type if it’s designed to support
    a complex system. For example, the Oracle Exadata Plug-in contains ten new target
    types.


    *Target type metadata* is the key component of a plug-in. The XML target type
    metadata file is included in both the OMS and the agent areas. I usually place
    the target type metadata file in <stage>/oms/metadata/targetType/ and create a
    soft link to it from <stage>/agent/metadata/ since my development platform is
    Linux. While the name of the file itself can be selected freely, the advised practice
    is to name it after the target type it defines and add the .xml extension.


    *Default collection metadata* is tightly coupled with the target type metadata
    and defines collection schedules and collection-related attributes for all metrics
    including alert conditions. Just like the target type metadata, the default collection
    metadata XML file is present in both OMS and agent areas, so I typically use a
    soft link as well. It’s advisable to name the file the same as the target type
    metadata XML file.


    You will learn that there are many more files that you can include in the OMS-side
    area, but this is the bare minimum you would normally see in any plug-in. Start
    each new plug-in by creating this basic directory tree.


    Plug-in Metadata


    A simplified version of plugin.xml is shown in [Listing 10-5](#9781430249382_Ch10.xhtml#list5).
    You will find it in <stage>/plugin.xml. Remember that the staging area of our
    first sample plug-in is <EDK>/samples/plugins/oracle.samples.xsh1/plugin_dist.


    ***[Listing 10-5](#9781430249382_Ch10.xhtml#_list5)***.  Plug-in Metadata plugin.xml
    for Simple Host Plugin 1


    ```

    <?xml version = "1.0"?>

    <Plugin xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

        xsi:schemaLocation=

           "http://www.oracle.com/EnterpriseGridControl/plugin_metadataplugin_metadata.xsd"

        xmlns="http://www.oracle.com/EnterpriseGridControl/plugin_metadata">

      <PluginId vendorId="oracle" productId="samples" pluginTag="xsh1"/>

      <PluginVersion value="12.1.0.0.0"/>

      <PluginOMSOSAruId value="2000"/>

      <ShortDescription>Sample Host Plugin 1</ShortDescription>

      <Readme>Sample Host Plugin 1\. See Book Expert Oracle Enterprise Manager 12c.</Readme>

      <PluginAttributes Category="Others" DisplayName="Sample Host Plugin 1"/>

      <TargetTypeList>

        <TargetType name="sample_host1" isIncluded="TRUE"/>

      </TargetTypeList>

    </Plugin>

    ```


    See the full plugin.xml file of the sample for more options, as well as the documentation,
    the *Oracle Enterprise Manager Cloud Control Extensibility Programmer''s Reference*
    ([Chapter 2](#9781430249382_Ch02.xhtml), Section 2.4). Even more options can be
    seen in the plug-in metadata reference located at <EDK>/doc/partnersdk/mrs/emcore/pluginMetadata/.
    Here, let’s just go through a few mandatory, basic elements. The bulky attributes
    xmlns:xsi, xsi:schemaLocation, and xmlns of the root element Plugin have references
    to various namespaces and XML Schemas. Just make sure you keep them as is from
    the sample template. The same applies to other XML files that we will use.


    The PluginId consists of three parts separated by dots: vendorId.productId.pluginTag.
    The dot notation will be used later in the agent-side definition. Vendor ID and
    Product ID can be up to eight characters long, while the plug-in tag must be four
    characters or fewer. For example, Oracle’s sample plug-in ID is oracle.sysman.xsh1,
    and for my demo MySQL plug-in, I use the ID pythian.mysql.demo.


    The plug-in version is indicated by five numbers: a.b.c.d.e. The first two numbers
    (a.b) should be the same as the EM12c version that you are developing on. The
    third number (c) should always be 0\. The fourth number is what you will be incrementing
    every time you’re publishing the plug-in. Oracle reserves the fifth number (e)
    for future use and instructs that you always set it to 0\. However, I have been
    using it to identify minor plug-in releases. For example, 12.1.0.1.2 is the current
    release of the Pythian MySQL plug-in at the time of this writing.


    You need to increment versions as you deploy the next versions in your development
    environment. You could use that last number for development release increments
    or you can just modify the plug-in ID during development. For example, I use pythian.mysql.prod
    for publicly released versions and pythian.mysql.test for development and testing.


    The PluginOMSOSAruId element defines on which OS the OMS should be running to
    support this plug-in. A value of 2000 indicates a generic platform, and you will
    often find that your plug-ins have pretty much no dependency on the OMS server
    platform but often have a dependency on the agent OS. I won’t go into the details
    of compatibility here (see the documentation referenced earlier) but plugin.xml
    is the place that you can define the compatibility of the plug-in and other EM12c
    components.


    The ShortDescription and Readme tags are self-explanatory. The PluginAttributes
    element hosts a few basic properties. You can set a few predefined categories
    for the Category attribute, such as Databases, Middleware, and so forth. The DisplayName
    attribute is how your plug-in will be shown in the EM12c user interface.


    Finally, there is the TargetTypeList element listing all the target types a plug-in
    contains. A simple plug-in usually contains just one target type, so there is
    only one TargetType child element. The target type name is an internal ID of the
    target type included in the plug-in. More on ID selection for target types is
    shown later in this chapter, when I actually define one.


    There are also provisions to define plug-in dependencies, version support and
    compatibility, and a multitude of other attributes such as a “What’s New” section.
    You don’t need to get into that now and can always make plug-in metadata more
    complex later. I generally recommend starting simple and slowly adding features
    into your plug-in.


    While plugin.xml contains OMS-side metadata, plugin_registry.xml defines the metadata
    required by the agents where the plug-in is deployed—usually just the list of
    target type metadata files and default collection metadata files. For a single
    target type plug-in, there is just one of each. They are defined by using the
    TargetTypes and TargetCollections elements, simple containers for one or more
    FileLocation elements. The path in FileLocation is relative to the agent directory
    in the staging area. [Listing 10-6](#9781430249382_Ch10.xhtml#list6) is the simplified
    plugin_registry.xml file from the example.


    ***[Listing 10-6](#9781430249382_Ch10.xhtml#_list6)***.  Agent-Side Plug-in Metadata
    plugin_registry.xml for Sample Host Plugin 1'
  trans: "\n# Oracle Enterprise Manager Cloud Control 插件开发基础\n\n## 插件基础结构\n\n暂存根目录包含\
    \ `plugin.xml`，这是一个插件定义文件，其中包含了 OMS 所需的基本插件信息。暂存根目录中有两个必需的子目录：`oms` 和 `agent`。`oms`\
    \ 目录包含所有用于在 OMS 上部署的文件，而 `agent` 目录包含用于在代理上部署的文件。你可以将它们视作代理端和 OMS 端区域。你会发现某些文件必须同时包含在两个区域中。`plugin_registry.xml`\
    \ 文件在某种程度上类似于暂存根目录中的 `plugin.xml` 文件，但其内容用于部署在管理代理上。可以将 `plugin.xml` 和 `plugin_registry.xml`\
    \ 共同视作插件定义。请注意，如果设计用于支持复杂系统，单个插件可能包含不止一个目标类型。例如，Oracle Exadata 插件就包含了十种新的目标类型。\n\
    \n**目标类型元数据** 是插件的关键组件。XML 目标类型元数据文件同时包含在 OMS 和代理区域中。由于我的开发平台是 Linux，我通常将目标类型元数据文件放置在\
    \ `<stage>/oms/metadata/targetType/` 中，并从 `<stage>/agent/metadata/` 创建一个指向它的软链接。虽然文件名本身可以自由选择，但建议的做法是根据它定义的目标类型来命名，并添加\
    \ `.xml` 扩展名。\n\n**默认采集元数据** 与目标类型元数据紧密耦合，定义了所有指标（包括告警条件）的采集计划和采集相关属性。就像目标类型元数据一样，默认采集元数据\
    \ XML 文件也存在于 OMS 和代理区域中，因此我通常也使用软链接。建议将文件命名为与目标类型元数据 XML 文件相同的名称。\n\n你会了解到，在 OMS\
    \ 端区域可以包含更多文件，但这通常是任何插件中都会看到的最低要求。通过创建这个基本的目录树来开始你的每一个新插件。\n\n## 插件元数据\n\n一个简化版的\
    \ `plugin.xml` 如 清单 10-5 所示。你可以在 `<stage>/plugin.xml` 中找到它。请记住，我们第一个示例插件的暂存区域是\
    \ `<EDK>/samples/plugins/oracle.samples.xsh1/plugin_dist`。\n\n**清单 10-5**. 简单主机插件\
    \ 1 的插件元数据 `plugin.xml`\n\n```xml\n<?xml version = \"1.0\"?>\n<Plugin xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\n       \"\
    http://www.oracle.com/EnterpriseGridControl/plugin_metadataplugin_metadata.xsd\"\
    \n    xmlns=\"http://www.oracle.com/EnterpriseGridControl/plugin_metadata\">\n\
    \  <PluginId vendorId=\"oracle\" productId=\"samples\" pluginTag=\"xsh1\"/>\n\
    \  <PluginVersion value=\"12.1.0.0.0\"/>\n  <PluginOMSOSAruId value=\"2000\"/>\n\
    \  <ShortDescription>Sample Host Plugin 1</ShortDescription>\n  <Readme>Sample\
    \ Host Plugin 1\\. See Book Expert Oracle Enterprise Manager 12c.</Readme>\n \
    \ <PluginAttributes Category=\"Others\" DisplayName=\"Sample Host Plugin 1\"/>\n\
    \  <TargetTypeList>\n    <TargetType name=\"sample_host1\" isIncluded=\"TRUE\"\
    />\n  </TargetTypeList>\n</Plugin>\n```\n\n要获取更多选项，请参阅示例的完整 `plugin.xml` 文件，以及文档\
    \ *Oracle Enterprise Manager Cloud Control Extensibility Programmer's Reference*（第\
    \ 2 章，第 2.4 节）。更多选项可以在插件元数据参考中找到，位于 `<EDK>/doc/partnersdk/mrs/emcore/pluginMetadata/`。这里，我们只介绍几个必需的基本元素。根元素\
    \ `Plugin` 的庞大属性 `xmlns:xsi`、`xsi:schemaLocation` 和 `xmlns` 引用了各种命名空间和 XML 架构。只需确保你从示例模板中原样保留它们即可。这同样适用于我们将使用的其他\
    \ XML 文件。\n\n`PluginId` 由三个部分组成，用点分隔：`vendorId.productId.pluginTag`。点表示法稍后将在代理端定义中使用。供应商\
    \ ID 和产品 ID 最多可包含 8 个字符，而插件标签必须为 4 个字符或更少。例如，Oracle 的示例插件 ID 是 `oracle.sysman.xsh1`，而对于我的演示\
    \ MySQL 插件，我使用 ID `pythian.mysql.demo`。\n\n插件版本由五个数字表示：`a.b.c.d.e`。前两个数字（`a.b`）应与你开发所基于的\
    \ EM12c 版本相同。第三个数字（`c`）应始终为 0。第四个数字是你每次发布插件时递增的数字。Oracle 将第五个数字（`e`）保留供将来使用，并指示你始终将其设置为\
    \ 0。然而，我一直用它来标识插件的次要版本。例如，在撰写本文时，`12.1.0.1.2` 是 Pythian MySQL 插件的当前版本。\n\n你需要在开发环境中部署后续版本时递增版本号。你可以使用最后一个数字用于开发版本递增，或者在开发期间只修改插件\
    \ ID。例如，我使用 `pythian.mysql.prod` 表示公开发布的版本，使用 `pythian.mysql.test` 表示开发和测试。\n\n\
    `PluginOMSOSAruId` 元素定义了 OMS 应在哪个操作系统上运行才能支持此插件。值 `2000` 表示通用平台，你经常会发现你的插件对 OMS\
    \ 服务器平台几乎没有依赖性，但通常对代理操作系统有依赖。这里我不深入探讨兼容性的细节（参见前面引用的文档），但 `plugin.xml` 是你可以定义插件与其他\
    \ EM12c 组件兼容性的地方。\n\n`ShortDescription` 和 `Readme` 标签的作用不言自明。`PluginAttributes`\
    \ 元素包含一些基本属性。你可以为 `Category` 属性设置一些预定义的类别，例如 `Databases`、`Middleware` 等。`DisplayName`\
    \ 属性是你的插件在 EM12c 用户界面中显示的方式。\n\n最后，是 `TargetTypeList` 元素，它列出了插件包含的所有目标类型。一个简单的插件通常只包含一个目标类型，因此只有一个\
    \ `TargetType` 子元素。目标类型名称是插件中包含的目标类型的内部 ID。本章稍后在实际定义目标类型时，会展示更多关于目标类型 ID 选择的内容。\n\
    \n插件定义还支持定义插件依赖关系、版本支持和兼容性，以及许多其他属性，例如“新增功能”部分。你现在不需要深入研究这些，并且总可以在以后使插件元数据变得更加复杂。我通常建议从简单开始，然后慢慢向你的插件中添加功能。\n\
    \n## 插件注册表\n\n虽然 `plugin.xml` 包含 OMS 端的元数据，但 `plugin_registry.xml` 定义了插件部署的代理所需的元数据——通常只是目标类型元数据文件和默认采集元数据文件的列表。对于单目标类型插件，每种文件只有一个。它们使用\
    \ `TargetTypes` 和 `TargetCollections` 元素来定义，这些元素是一个或多个 `FileLocation` 元素的简单容器。`FileLocation`\
    \ 中的路径是相对于暂存区域中的 `agent` 目录的。清单 10-6 是示例中简化的 `plugin_registry.xml` 文件。\n\n**清单\
    \ 10-6**. 简单主机插件 1 的代理端插件元数据 `plugin_registry.xml`\n"
- fmt: "## XML 配置文件示例\n\n```xml\n<?xml version=\"1.0\"?>\n<PlugIn ID=\"oracle.samples.xsh1\"\
    \ Description=\"Sample Host Plugin 1\" Version=\"12.1.0.0.0\"\n    xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.oracle.com/EnterpriseGridControl/pluginplugin.xsd\"\
    \ >\n  <TargetTypes>\n    <FileLocation>metadata/sample_host1.xml</FileLocation>\n\
    \  </TargetTypes>\n  <TargetCollections>\n    <FileLocation>default_collection/sample_host1.xml</FileLocation>\n\
    \  </TargetCollections>\n</PlugIn>\n```\n\n可以看到，属性 `ID`、`Description` 和 `Version`\
    \ 是从 OMS 端的 `plugin.xml` 文件复制过来的。请注意，`ID` 是 `PluginId` 的点表示法版本。更高级的选项是可用的，但文档记录仍然相当差，且未在示例中提供。例如，你可以通过定义一个自定义的\
    \ fetchlet（你很快会了解到 fetchlet）来注册你自己的指标收集方法，但在你精通插件开发之前，不会这样做。\n\n除了 Oracle *Enterprise\
    \ Manager Cloud Control Extensibility Programmer's Reference*（[第 2 章](#9781430249382_Ch02.xhtml)，第\
    \ 2.5 节）中的标准文档外，更多详细信息可以在 EDK API 参考中找到，路径为 `<EDK>/doc/partnersdk/mrs/emcore/agentPluginMetadata/`。这个\
    \ XML API 文档是由定义此 XML 结构的 XML Schema 生成的——什么元素可以存在于何处以及数量、它们的属性是什么、哪些是可选的，以及一些零散的注释，对于那些在其他地方未文档化的元素，你仍会发现它们很有用。\n\
    \n在这一点上，已经有足够的机会犯很多错误。幸运的是，EDK 提供了验证工具，可以帮助我们确保我们的定义在语法和语义上是正确的。例如，它将捕获格式错误的 XML\
    \ 文件以及不匹配的插件 ID。[清单 10-7](#9781430249382_Ch10.xhtml#list7) 展示了一个示例验证命令行和成功的验证输出。末尾引用的输出文件包含更多详细信息。请注意，将插件打包到\
    \ OPAR 文件之前会执行显式验证。\n\n### 插件验证示例\n```\n[oracle@em12c2 oracle.samples.xsh1]$ empdk\
    \ validate_plugin -stage_dir plugin_dist\nValidating Plugin Xml : Passed\nValidating\
    \ Plugin Structure: Passed\n\nValidating Metadata Syntax: Passed\nValidating Metadata\
    \ Semantic: Passed\nValidating Embedded SQL strings in meta data: Passed\nPlugin\
    \ Validation : Passed\nValidation Report generated to: /home/oracle/edk/samples/plugins/oracle.samples.xsh1/./plugin_validation_report_121127.txt\n\
    ```\n\n请注意，如果你删除了 `Readme` 元素，例如，验证将通过但会有警告，因为这个元素在 XML Schema 中是可选的，所以从语法上讲一切正确，但\
    \ EDK 有一个语义规则，即这个元素应该作为最佳实践存在。我使用 EDK 主机示例的暂存区，但你也可以使用前面的 XML 内容启动自己的暂存区并并行进行。\n\
    \n现在验证已经成功，你可以继续创建核心结构：目标类型元数据。\n\n## 目标类型元数据\n\n目标类型元数据定义了插件的基本结构——其属性、指标以及如何收集它们。这是创建新目标类型的绝对最低要求。目标类型元数据在单个\
    \ XML 文件中定义，该文件放置在 `<stage>/oms/metadata/targetType` 目录中。Oracle 最新的建议是使用 `vendorID_productID_PluginTag.xml`\
    \ 模板，根据插件 ID 命名文件。之前的命名约定是根据目标类型 ID 添加 `.xml` 扩展名，但一般来说，它可以是任何文件名。我建议使用目标类型来命名目标类型元数据文件，因为你可以在同一个插件中打包多个目标类型。你还需要在\
    \ `<stage>/agent/metadata` 目录下的 agent 区域提供相同的 XML 文件，该文件随后从 `plugin_registry.xml`\
    \ 中引用，正如你之前所了解的。在 Unix/Linux 服务器上，我只需从 agent 区域创建到 OMS 区域主副本的符号链接。这样，我就不会忘记同步它们。（如果你忘记了同步副本，就像我曾做过的几次那样，故障排除可能是一个巨大的时间消耗。那时我改用了符号链接。）\n\
    \n目标类型元数据的一般结构如[清单 10-8](#9781430249382_Ch10.xhtml#list8)所示。\n\n### 元素示例\n```\n\
    <TargetMetadata META_VER=\"1.8\" TYPE=\"sample_host1\">\n  <Display>...</Display>\n\
    \  <Metric>...</Metric>\n  ......\n  <Metric>...</Metric>\n  <InstanceProperties>...</InstanceProperties>\n\
    </TargetMetadata>\n```\n\n顶级元素 `TargetMetadata` 在 `TYPE` 属性中包含唯一的目标类型 ID `\"sample_host1\"\
    `，并在 `META_VER` 属性中包含元数据版本 `\"1.8\"`。如果更改了文件，你应该更改版本号。当 EM12c 检测到目标类型版本已更改时，它将重新加载新的元数据。我曾花费无数小时排查为什么在更新元数据定义后我的插件不工作，后来才发现我漏掉了更改\
    \ `META_VER` 属性。当部署较新版本的插件时，EM12c 会分析元数据版本是否已更改，如果新目标类型元数据定义中的 `META_VER` 未更改，则会跳过一些内部更新。\n\
    \n请注意，随 EDK 打包的示例，例如 `sample_host1`，在注释中引用了 XML 数据类型定义（DTD）`$OMS_HOME/sysman/admin/dtds/TargetMetadata.dtd`。这是来自\
    \ 10g/11g Grid Control 的旧定义，不仅风格陈旧，而且已过时。请使用 `<EDK>/doc/partnersdk/mrs/emcore/targetType`\
    \ 中基于 XML Schema 的 API 参考。例如，`TargetMetadata` 根元素在 `<EDK>/doc/partnersdk/mrs/emcore/targetType/noNamespace/element/TargetMetadata.html`\
    \ 中描述。\n\n`TargetMetadata` 元素的子元素通常包括三个元素：`Display`、`Metric` 和 `InstanceProperties`。\n\
    \n### Display"
