- fmt: 'The target type menu also provides a handy `Logs` submenu for reviewing the
    system logs associated with various targets (see [Figure 4-58](#9781430249382_Ch04.xhtml#Fig58)).
    The menu itself is common to all targets, but the available level of detail depends
    on the nature of the target and the plug-in designer. In the case of a database,
    for example, the `Logs` submenu gives you access to review the `alert.log` file,
    to review all recorded errors, and to manage trace files.


    ![9781430249382_Fig04-58.jpg](images/9781430249382_Fig04-58.jpg)


    [Figure 4-58](#9781430249382_Ch04.xhtml#_Fig58). Database diagnostic log access


    By contrast, a web server target simply provides a single `Logs` option that allows
    you to search for and view log messages based on criteria (see [Figure 4-59](#9781430249382_Ch04.xhtml#Fig59)).


    ![9781430249382_Fig04-59.jpg](images/9781430249382_Fig04-59.jpg)


    [Figure 4-59](#9781430249382_Ch04.xhtml#_Fig59). Searching application server
    logs


    ## Target Setup


    One place that you will definitely spend some time is in the `Target Setup` submenu,
    shown in [Figure 4-60](#9781430249382_Ch04.xhtml#Fig60). This is where you will
    configure both the monitoring credentials and the metadata about the target, which
    you can use for grouping and access control.


    ![9781430249382_Fig04-60.jpg](images/9781430249382_Fig04-60.jpg)


    [Figure 4-60](#9781430249382_Ch04.xhtml#_Fig60). Target Setup submenu


    To configure the account with which you monitor a target, select `Monitoring Configuration`.
    The actual details supplied vary by target type. [Figure 4-61](#9781430249382_Ch04.xhtml#Fig61)
    shows the screen for a database target. As you can see, you are required to enter
    the monitoring account details (in the case of a database, `Username`, `Password`,
    `Port`, `Role`, and `SID/Service_Name`).


    ![9781430249382_Fig04-61.jpg](images/9781430249382_Fig04-61.jpg)


    [Figure 4-61](#9781430249382_Ch04.xhtml#_Fig61). Required database monitoring
    details


    Similarly, for other targets you will likely need names, passwords, and ports
    for the monitoring of the individual target-monitoring infrastructure.


    ## Customization


    The first indication that you will have that Cloud Control is designed to be customized
    to the requirements of the individual administrator comes at the very first login.
    After logging in, you will be presented with a page that offers you the chance
    to choose a home page based on one of a number of predefined job roles. Most readers
    of this book will probably want to choose one of two of the choices. If you primarily
    work as a database administrator or developer, you will likely choose the `Databases`
    page. If you work in operations or support, you may want to start from the `Incidents`
    page, which is focused for staff managing operational incidents in the enterprise.


    ![image](images/sq.jpg) **Note** You don’t have to choose any home page at this
    stage, and we recommend that you don’t. Instead, review all of the available pages
    for an appropriate starting point for your role. You can then tailor your home
    page more specifically at a later point.


    As the primary audience for this book consists of database professionals, we concentrate
    on the database-specific pages as an example for this section, unless otherwise
    noted. However, everything said here applies throughout the product. [Figure 4-62](#9781430249382_Ch04.xhtml#Fig62)
    illustrates the home page for a database target.


    ![9781430249382_Fig04-62.jpg](images/9781430249382_Fig04-62.jpg)


    [Figure 4-62](#9781430249382_Ch04.xhtml#_Fig62). Database home page


    Each page in Enterprise Manager is divided into several regions. Each region can
    be further customized by the end user. As an example, we will take the `Database
    Summary` region and remove the compliance summary, which is not hugely helpful.


    To start the customization, click the `Personalize This Page` icon, located at
    the top right, next to the last refresh time for the page (see [Figure 4-63](#9781430249382_Ch04.xhtml#Fig63)).
    This will add menus to the page, allowing you to customize the page and each region.
    In this case, click the spanner icon at the top-right side of the `Summary` region.


    ![9781430249382_Fig04-63.jpg](images/9781430249382_Fig04-63.jpg)


    [Figure 4-63](#9781430249382_Ch04.xhtml#_Fig63). Home page in Editing mode


    You are then presented with a customization dialog box like the one in [Figure
    4-64](#9781430249382_Ch04.xhtml#Fig64). We simply removed the `Compliance Summary`
    section from view, but you can experiment with the various style and display options
    available to significantly personalize the page to your corporate standards or
    personal taste.


    ![9781430249382_Fig04-64.jpg](images/9781430249382_Fig04-64.jpg)


    [Figure 4-64](#9781430249382_Ch04.xhtml#_Fig64). Customizing the Summary component


    You should be aware that the options for customizing pages depend on the plug-in
    supplying the page. Thus the exact customization options may vary among apparently
    similar regions.


    ## Summary


    This chapter introduced you to the new interface and some of the basic tasks that
    you need to master in order to derive the manageability benefits of the Enterprise
    Manager product. You have learned about the roles of the `Cloud Control`, `Navigation`,
    and `Target Management` menus. Along the way, you have learned how to set up Enterprise
    Manager security, set up the powerful integration with My Oracle Support, and
    configure notifications. You’ve taken a brief tour around the navigation functionality.
    Finally, you’ve looked at the target setup functionality and learned how to configure
    monitoring and review diagnostic logs.


    # CHAPTER 5


    ![image](images/frontdot.jpg)


    ## Cloud Lifecycle Management


    by Bobby Curtis and Anand Akela


    Oracle Enterprise Manager 12c Cloud Control promises to deliver greater adaptability
    for dynamic business needs, significant operational efficiencies, and lower overall
    operational costs. For an organization to achieve these goals, we need to have
    a comprehensive and complete management solution. Without the cloud lifecycle
    management components of EM12c, these promises cannot be realized and enterprises
    may not derive maximum value out of their cloud computing infrastructure. The
    components in cloud lifecycle management allow organizations to be flexible with
    their architecture and derive greater business value from stretched resources.
    The tools covered by cloud lifecycle management include the following:


    *   `Self Service portal`: Allows administrators to configure the cloud and perform
    various operations such as defining policies associated with the cloud, exposing
    the cloud to users, deciding the total amount of resources that each user can
    reserve, and defining policies for the system.

    *   `Chargeback`: Allows enterprise organizations to allocate the costs of the
    Information Technology resources to the people, departments, or organizations
    that consume them.

    *   `Consolidation Planner`: Allows enterprise organizations to map managed servers
    to consolidated resources, such as Oracle Exadata or Oracle Virtual Machine, and
    to plan consolidation by using metrics and configuration data stored in the Oracle
    Management Repository.


    Before we dive into these cloud lifecycle management tools using EM12c, let’s
    review what cloud computing really is.


    ### What Is Cloud Computing?


    Although you can find many definitions of cloud computing, the National Institute
    of Standards and Technology (NIST) published one of the most complete and credible
    definitions in September 2011.[¹](#9781430249382_Ch05.xhtml#Fn1)'
