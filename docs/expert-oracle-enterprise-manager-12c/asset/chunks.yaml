    \ is not null;\n```\n\n![9781430249382_Fig11-13.jpg](img/9781430249382_Fig11-13.jpg)\n\
    \n图 11-13. 经历过至少一次重试的作业的结果\n\n这些基本查询提供了如何连接表以及如何从`SQL*Plus`报告 EM 作业系统信息的示例。这些数据随后可以帮助您进行故障排除，或者您可以使用`EMCLI`来处理问题或在\
    \ EM 控制台之外执行任务。\n\n### 权限与责任\n\n了解谁有权创建和管理作业至关重要。作业应由个别用户拥有，并在此级别设置首选凭据，以确保对这些凭据使用的问责制。\n\
    \n通过创建 EM12c 管理员登录并安全地设置它们，您可以查看谁运行了作业以及谁编辑了作业，确保创建、执行甚至删除作业的用户在 Enterprise Manager\
    \ 访问日志中被有效跟踪。由于用户不是存储库所有者（`SYSMAN`），这消除了在 EM12c 环境中默认授予该用户的广泛角色和权限可能引发的安全问题。\n"
- fmt: 'To see who has credentials to run and manage jobs, you can run a simple query
    to show who has what privileges (see [Figure 11-14](#9781430249382_Ch11.xhtml#Fig14)),
    along with how those credentials compare to those owned by the `SYSMAN` schema
    (see [Figure 11-15](#9781430249382_Ch11.xhtml#Fig15)). [Figure 11-16](#9781430249382_Ch11.xhtml#Fig16)
    provides a diagram for reference.


    ![9781430249382_Fig11-14.jpg](images/9781430249382_Fig11-14.jpg)


    [Figure 11-14](#9781430249382_Ch11.xhtml#_Fig14). Users with target credentials
    from a query to the EM `SYSMAN` schema


    ![9781430249382_Fig11-15.jpg](images/9781430249382_Fig11-15.jpg)


    [Figure 11-15](#9781430249382_Ch11.xhtml#_Fig15). Example of `SYSMAN` credentials
    that might appear in an environment


    ![9781430249382_Fig11-16.jpg](images/9781430249382_Fig11-16.jpg)


    [Figure 11-16](#9781430249382_Ch11.xhtml#_Fig16). Credential, job command, and
    job info tables to be used for granular queries on job activity


