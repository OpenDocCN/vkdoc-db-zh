- fmt: '# The EM Jobs Service


    The EM Jobs Service is the running service that controls all jobs processing in
    an EM12c environment. This interface can be difficult to locate, but is easiest
    to access by clicking `Targets` → `All Targets`, typing `Service` in the Search
    Target Name box, and clicking the arrow. Then click `EM Jobs Service` (see [Figure
    11-2](#9781430249382_Ch11.xhtml#Fig2)). The EM Jobs Service interface, shown in
    [Figure 11-3](#9781430249382_Ch11.xhtml#Fig3), then displays. We will return to
    this interface repeatedly, as it is an important gateway to the advanced features
    of the EM12c Jobs Service.


    ![9781430249382_Fig11-02.jpg](images/9781430249382_Fig11-02.jpg)


    [Figure 11-2](#9781430249382_Ch11.xhtml#_Fig2). The EM Services Dashboard, including
    the EM Jobs Service and the EM Console Service, along with status, performance,
    usage, components, and important service levels


    ![9781430249382_Fig11-03.jpg](images/9781430249382_Fig11-03.jpg)


    [Figure 11-3](#9781430249382_Ch11.xhtml#_Fig3). The EM Jobs Service interface,
    demonstrating the basic information displayed in the main, left pane, including
    status, incidents, and uptime


    This console interface allows the user to view the service status, incidents,
    violations, performance charts, test performance, configuration topology of the
    job environment, and all other features included in the EM Job System.


    You also can locate the EM Jobs Service page (and see how wildcard searches work
    in EM12c) by clicking `Targets` → `All Targets`, typing `%job%` in the Search
    Target Name box, and clicking the arrow. The agent `EM Jobs Service` shows in
    the list and can be accessed by clicking the target name.


    ![9781430249382_Fig11-04.jpg](images/9781430249382_Fig11-04.jpg)


    Figure 11-4. Wildcard searches are easy in the All Targets view


    ## Monitoring Configuration


    The EM Jobs Service interface includes various tabs that provide access to the
    Job System’s functionality. The tab that is perhaps the most frequently used by
    DBAs is the Monitoring Configuration tab (see [Figure 11-5](#9781430249382_Ch11.xhtml#Fig5)).


    ![9781430249382_Fig11-05.jpg](images/9781430249382_Fig11-05.jpg)


    [Figure 11-5](#9781430249382_Ch11.xhtml#_Fig5). The Monitoring Configuration tab
    is one of the most used in the EM Jobs Service interface


    The Monitoring Configuration section of the user interface contains numerous options
    to interact with features of the EM Jobs Service.


    The Root Cause Analysis Configuration option can be used to perform automatic
    or manual inspection of any EM service upon failure. This analysis can then pinpoint
    the issue or be uploaded to `My Oracle Support` to assist with a service request.
    This feature is very beneficial in saving the administrator time otherwise wasted
    when manually filling out a service request in the `My Oracle Support` interface.
    The service requests covered in this section are for the main EM12c services,
    including the Enterprise Manager console, the Oracle Management Service, and the
    EM Jobs Service.


    The Performance Metrics link enables you to configure thresholds for EM job-step
    throughput and job-step backlog. When using the EM Job System as the main job
    scheduler for a database environment, this can offer a monitoring incentive that
    is missing from most other job schedulers. Gathering postexecution performance
    information may not be available in other scheduling/logging methods, but with
    the EM12c Jobs Service, all data is retained for a default of 31 days.


    Another link within the Monitoring Configuration tab, is Service Tests and Beacons.
    Service tests are an excellent way to test the ability of a web page to complete
    a simple transaction on a regular interval, to test for uptime, or to log in to
    a web site and verify that files are available for download at a certain time.
    Unlike metric extensions (described in [Chapter 13](#9781430249382_Ch13.xhtml)),
    this feature is very URL specific and uses an EM Job to fulfill the task on the
    requested interval.


    This feature has the unique option to record a web session by using an ActiveX
    plug-in that is then configured as part of an EM job to perform the task during
    the scheduled interval, checking for successful completion of the recorded steps
    a user would complete if they were to access the same web site. [Figure 11-6](#9781430249382_Ch11.xhtml#Fig6)
    shows a session recording from the web site— successfully signing in, accessing
    four files, and then signing out. This session will be used by the EM Jobs Service
    to create the performance test and then continue on to the beacon settings.


    ![9781430249382_Fig11-06.jpg](images/9781430249382_Fig11-06.jpg)


    [Figure 11-6](#9781430249382_Ch11.xhtml#_Fig6). A session being recorded for use
    with a performance test and beacon settings


    > **Note**

    >

    > To record a web transaction to be used by a performance test, Microsoft’s Internet
    Explorer is the only supported web browser. Options won’t appear when attempted
    with other browsers. In certain instances, the web transaction may fail even through
    Internet Explorer using the ActiveX plug-in, and the administrator will be directed
    by `My Oracle Support` to utilize the Oracle Application Development Framework
    (`ADF`) to record web transactions and import into the service test interface
    as a saved session file.


    ## The Job Activity Page


    The Job Activity page enables you to do the following:


    *   Create a job

    *   Save jobs that have been scheduled, running, or previously executed to the
    Job Library to retain for future use

    *   View or edit an existing job in the activity section

    *   View results of, edit, create, resume, suspend, stop, or delete a job execution

    *   Search for jobs by various methods, including job name (wildcards allowed),
    job type, and status


    The Job Activity page, shown in [Figure 11-7](#9781430249382_Ch11.xhtml#Fig7),
    can be viewed at the level of the database, cluster, or full monitored environment.


    ![9781430249382_Fig11-07.jpg](images/9781430249382_Fig11-07.jpg)


    [Figure 11-7](#9781430249382_Ch11.xhtml#_Fig7). An example of job activity, with
    the administrator viewing the activity scheduled furthest into the future first,
    and descending into current and past activity by scrolling down


    When searching and viewing the Job Activity page, keep in mind the following terminology
    in [Table 11-1](#9781430249382_Ch11.xhtml#Tab1).


    [Table 11-1](#9781430249382_Ch11.xhtml#_Tab1). Important Job Activity Terms


    ```

    | Job Activity | Description |

    | --- | --- |

    | Job execution | A single job execution in EM12c—often attributed to one target,
    but can have multiple targets or none at all, depending on the task. |

    | Job run | A summary of all executions of a specific job |

    ```


    When searching job executions and job runs, you can use a wildcard (`%`) in the
    job name search options, as shown in [Figure 11-8](#9781430249382_Ch11.xhtml#Fig8).
    This wild card can be used for any of the fields requiring you to enter a value
    (rather than those offering drop-down choices).


    ![9781430249382_Fig11-08.jpg](images/9781430249382_Fig11-08.jpg)


    [Figure 11-8](#9781430249382_Ch11.xhtml#_Fig8). Job activity search using a wildcard
    option


    The job search in the preceding example searched for any job with the letters
    `EXTR` in the name. No distinction was requested in the search for job type (scheduled,
    succeeded, problem, and so forth), so all jobs were returned that met the search
    criteria.


    EM Job supports the job operations listed in [Table 11-2](#9781430249382_Ch11.xhtml#Tab2).


    [Table 11-2](#9781430249382_Ch11.xhtml#_Tab2). Job Activity Actions'
