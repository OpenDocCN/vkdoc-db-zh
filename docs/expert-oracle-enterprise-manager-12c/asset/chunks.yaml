  raw: '*   If the rule criteria is a specific metric alert (for example, CPU utilization
    or tablespace percent used crosses a certain threshold of either Warning or Critical
    severity), the action could be to create an incident.

    *   Another rule could operate on incidents that are of either Warning or Critical
    severity, and the action is to send a notification. In this case, there could
    be an additional condition that if the rule condition is Severity = Critical,
    then the action is to notify by page, while if Severity = Warning, the action
    is to notify by e-mail.

    *   Another example of a rule might be for incidents that have been open longer
    than seven days, where the rule action is to set the escalation level to 1 (esclation
    levels can range from 1 to 5).


    Let’s now look at an example of a rule set. [Figure 12-4](#9781430249382_Ch12.xhtml#Fig4)
    shows an enterprise rule set that operates on the Production group, PROD-GROUP.


    ![9781430249382_Fig12-04.jpg](images/9781430249382_Fig12-04.jpg)


    [Figure 12-4](#9781430249382_Ch12.xhtml#_Fig4). An incident rule set


    This heterogeneous group consists of a set of targets that includes hosts, databases,
    and WebLogic servers. This rule set has two rules. The first is a Target Down
    rule; the criteria for the rule are any database or WebLogic servers that are
    down. In this case, the action is to automatically create an incident and set
    its priority to high. The second rule within this rule set has to do with sending
    notifications. The criteria for this rule are for any incident on the targets
    within PROD-GROUP that has a severity of Fatal, Critical, or Warning. The actions
    here are to send an e-mail only if the severity is set to Warning, or to send
    a page if the severity is set to either Fatal or Critical.


    Incident Manager User Interface


    Now that you understand the basic terminology and concepts behind incident management,
    let’s spend a bit of time introducing the Incident Manager user interface. The
    user interface has two parts:


    *   The incident rule setup interface, used to create your own incident rules
    to automate responses for incidents and events

    *   The Incident Manager console, which is used to search for, view, and manage
    outstanding incidents, events, and problems


    Let’s look at creating your own incident rules first.


    Creating Incident Rules


    To create an incident rule, you need to click the Setup menu from the upper right
    of any screen and then choose Incidents ä Incident Rules, as shown in [Figure
    12-5](#9781430249382_Ch12.xhtml#Fig5).


    ![9781430249382_Fig12-05.jpg](images/9781430249382_Fig12-05.jpg)


    [Figure 12-5](#9781430249382_Ch12.xhtml#_Fig5). Accessing the Incident Rules -
    All Enterprise Rules page


    This takes you to the Incident Rules - All Enterprise Rules page, where you can
    view, edit, or delete existing rule sets, or create your own. In this example,
    you’re going to define a rule in a rule set that creates an incident and e-mails
    you when the USERS tablespace for the orcl database is close to running out of
    space. To get this rule to execute, you change the default setup of the USERS
    tablespace to not autoextend when it runs out of space, and also change the critical
    threshold for the tablespace to be triggered at 90 percent full. These operations
    are done outside the creation of the rule set (that part is left out of the following
    screenshots). Click the Create Rule Set button, shown in [Figure 12-6](#9781430249382_Ch12.xhtml#Fig6),
    to start the process of creating a new rule set.


    ![9781430249382_Fig12-06.jpg](images/9781430249382_Fig12-06.jpg)


    [Figure 12-6](#9781430249382_Ch12.xhtml#_Fig6). First step in creating a rule
    set


    The important part of the Create Rule Set page is the bottom, where you specify
    the targets the rule applies to and the rules that make up the rule set (see [Figure
    12-7](#9781430249382_Ch12.xhtml#Fig7)). Fill in the rule set name (a mandatory
    field) and provide a description for the rule set. The rule set type defaults
    to Enterprise. (Private is used when you want to be notified about something that
    is not a standard business practice; the only action it can perform is to send
    an e-mail.) Next click the Add button, as shown in [Figure 12-7](#9781430249382_Ch12.xhtml#Fig7),
    to add a group this rule set will apply to (while specific targets can also be
    added, the full power of this tool is used when rule sets are applied to multiple
    targets at one time).


    ![9781430249382_Fig12-07.jpg](images/9781430249382_Fig12-07.jpg)


    [Figure 12-7](#9781430249382_Ch12.xhtml#_Fig7). Adding targets to a rule set


    The Search and Select: Targets pop-up appears, provided you have disabled the
    pop-up blocker in your browser (if you haven’t, allow pop-ups for the site and
    retry the operation). From here, you can select the different targets for this
    rule set. In the example shown in [Figure 12-8](#9781430249382_Ch12.xhtml#Fig8),
    you choose the group HQ GROUP, which you know contains the orcl database.


    ![9781430249382_Fig12-08.jpg](images/9781430249382_Fig12-08.jpg)


    [Figure 12-8](#9781430249382_Ch12.xhtml#_Fig8). The Search and Select: Targets
    screen


    Once the target group is selected, you need to add the relevant rules to the rule
    set. To start this operation, click the Rules tab. Then click the Create button,
    shown in [Figure 12-9](#9781430249382_Ch12.xhtml#Fig9).


    ![9781430249382_Fig12-09.jpg](images/9781430249382_Fig12-09.jpg)


    [Figure 12-9](#9781430249382_Ch12.xhtml#_Fig9). Adding rules to a rule set


    Because rules can apply to events, incidents, or problems, you need to select
    the type of rule you are creating. In this example, as shown in [Figure 12-10](#9781430249382_Ch12.xhtml#Fig10),
    you’re creating a rule on the Tablespace Full metric alert event, so you choose
    the first option on the Select Type of Rule to Create pop-up.


    ![9781430249382_Fig12-10.jpg](images/9781430249382_Fig12-10.jpg)


    [Figure 12-10](#9781430249382_Ch12.xhtml#_Fig10). The Select Type of Rule to Create
    screen


    Next you need to specify the type of event by choosing Metric Alert from the drop-down
    list (see [Figure 12-11](#9781430249382_Ch12.xhtml#Fig11)).


    ![9781430249382_Fig12-11.jpg](images/9781430249382_Fig12-11.jpg)


    [Figure 12-11](#9781430249382_Ch12.xhtml#_Fig11). The Create New Rule: Select
    Events screen


    You want this rule to act on only specific metric alerts, so you choose the Specific
    Events of Type Metric Alert radio button. Then click the Add button to add the
    event, as shown in [Figure 12-12](#9781430249382_Ch12.xhtml#Fig12).


    ![9781430249382_Fig12-12.jpg](images/9781430249382_Fig12-12.jpg)


    [Figure 12-12](#9781430249382_Ch12.xhtml#_Fig12). Adding metric alert events to
    a rule


    Select a Target Type of Database Instance. Then search for all metrics that contain
    *Tablespace* in their name to minimize the list (see [Figure 12-13](#9781430249382_Ch12.xhtml#Fig13)).


    ![9781430249382_Fig12-13.jpg](images/9781430249382_Fig12-13.jpg)


    [Figure 12-13](#9781430249382_Ch12.xhtml#_Fig13). The Select Specific Metric Alert
    screen


    In this case, as shown in [Figure 12-14](#9781430249382_Ch12.xhtml#Fig14), you
    want to use the Tablespace Free Space (MB) metric, and restrict the rule to the
    USERS tablespace, specifically for the Critical severity case.


    ![9781430249382_Fig12-14.jpg](images/9781430249382_Fig12-14.jpg)


    [Figure 12-14](#9781430249382_Ch12.xhtml#_Fig14). Selecting a specific metric
    and severity


    When finished, click the Next button. Now you need to add the relevant actions,
    so click the Add button, as shown in [Figure 12-15](#9781430249382_Ch12.xhtml#Fig15).


    ![9781430249382_Fig12-15.jpg](images/9781430249382_Fig12-15.jpg)


    [Figure 12-15](#9781430249382_Ch12.xhtml#_Fig15). Adding an action to a rule'
  trans: '# Incident Manager 用户界面


    现在您已经了解了事件管理的基本术语和概念，让我们花点时间介绍 Incident Manager 用户界面。该界面包含两部分：


    *   事件规则设置界面，用于创建自己的事件规则，以自动化响应事件和告警

    *   Incident Manager 控制台，用于搜索、查看和管理未解决的事件、告警和问题


    让我们首先了解如何创建您自己的事件规则。


    ## 创建事件规则


    要创建事件规则，您需要点击任何屏幕右上角的 `Setup` 菜单，然后选择 `Incidents` -> `Incident Rules`，如 图 12-5
    所示。


    ![9781430249382_Fig12-05.jpg](img/9781430249382_Fig12-05.jpg)


    图 12-5. 访问 Incident Rules - All Enterprise Rules 页面


    这将带您进入 `Incident Rules - All Enterprise Rules` 页面，在此您可以查看、编辑或删除现有规则集，或创建您自己的规则集。在此示例中，您将定义一个规则集中的规则，当
    `orcl` 数据库的 `USERS` 表空间即将用尽空间时，创建一个事件并发送电子邮件给您。为使此规则执行，您需要将 `USERS` 表空间的默认设置更改为当空间用尽时不自动扩展，并将表空间的关键阈值触发点更改为
    90% 满。这些操作在规则集创建过程之外完成（以下截图中省略了该部分）。点击 `Create Rule Set` 按钮，如 图 12-6 所示，以开始创建新规则集的过程。


    ![9781430249382_Fig12-06.jpg](img/9781430249382_Fig12-06.jpg)


    图 12-6. 创建规则集的第一步


    `Create Rule Set` 页面的重要部分在底部，您在此指定规则适用的目标以及构成规则集的规则（参见 图 12-7）。填写规则集名称（必填字段）并提供规则集的描述。规则集类型默认为
    `Enterprise`。（`Private` 用于当您希望获得非标准业务实践的通知时；它唯一能执行的操作是发送电子邮件。）接下来点击 `Add` 按钮，如
    图 12-7 所示，以添加此规则集将应用到的组（虽然也可以添加特定目标，但当规则集同时应用于多个目标时，才能充分发挥此工具的威力）。


    ![9781430249382_Fig12-07.jpg](img/9781430249382_Fig12-07.jpg)


    图 12-7. 向规则集添加目标


    会出现 `Search and Select: Targets` 弹出窗口（前提是你已在浏览器中禁用了弹出窗口拦截器；如果未禁用，请为该站点允许弹出窗口并重试操作）。从这里，您可以为此规则集选择不同的目标。在
    图 12-8 所示的示例中，您选择了 `HQ GROUP` 组，您知道它包含 `orcl` 数据库。


    ![9781430249382_Fig12-08.jpg](img/9781430249382_Fig12-08.jpg)


    图 12-8. Search and Select: Targets 屏幕


    一旦选择了目标组，您需要向规则集添加相关规则。要开始此操作，请点击 `Rules` 选项卡。然后点击 `Create` 按钮，如 图 12-9 所示。


    ![9781430249382_Fig12-09.jpg](img/9781430249382_Fig12-09.jpg)


    图 12-9. 向规则集添加规则


    因为规则可以应用于事件、告警或问题，您需要选择正在创建的规则类型。在此示例中，如 图 12-10 所示，您正在为 `Tablespace Full` 指标告警事件创建规则，因此您在
    `Select Type of Rule to Create` 弹出窗口中选择第一个选项。


    ![9781430249382_Fig12-10.jpg](img/9781430249382_Fig12-10.jpg)


    图 12-10. Select Type of Rule to Create 屏幕


    接下来，您需要通过从下拉列表中选择 `Metric Alert` 来指定事件类型（参见 图 12-11）。


    ![9781430249382_Fig12-11.jpg](img/9781430249382_Fig12-11.jpg)


    图 12-11. Create New Rule: Select Events 屏幕


    您希望此规则仅作用于特定的指标告警，因此您选择 `Specific Events of Type Metric Alert` 单选按钮。然后点击 `Add`
    按钮以添加事件，如 图 12-12 所示。


    ![9781430249382_Fig12-12.jpg](img/9781430249382_Fig12-12.jpg)


    图 12-12. 向规则添加指标告警事件


    选择 `Target Type` 为 `Database Instance`。然后搜索名称中包含 `*Tablespace*` 的所有指标以最小化列表（参见
    图 12-13）。


    ![9781430249382_Fig12-13.jpg](img/9781430249382_Fig12-13.jpg)


    图 12-13. Select Specific Metric Alert 屏幕


    在这种情况下，如 图 12-14 所示，您希望使用 `Tablespace Free Space (MB)` 指标，并将规则限制到 `USERS` 表空间，特别是针对
    `Critical` 严重性情况。


    ![9781430249382_Fig12-14.jpg](img/9781430249382_Fig12-14.jpg)


    图 12-14. 选择特定指标和严重性


    完成后，点击 `Next` 按钮。现在您需要添加相关操作，因此点击 `Add` 按钮，如 图 12-15 所示。


    ![9781430249382_Fig12-15.jpg](img/9781430249382_Fig12-15.jpg)


    图 12-15. 向规则添加操作


    在继续之前，让我们先看一下规则的示例。图 12-4 展示了一个应用于 `Production` 组 `PROD-GROUP` 的企业规则集。


    ![9781430249382_Fig12-04.jpg](img/9781430249382_Fig12-04.jpg)


    图 12-4. 一个事件规则集


    这个异构组由一组目标组成，包括主机、数据库和 WebLogic 服务器。此规则集有两个规则。第一个是 `Target Down` 规则；该规则的条件是任何数据库或
    WebLogic 服务器宕机。在这种情况下，操作是自动创建一个事件并将其优先级设置为高。此规则集中的第二个规则与发送通知有关。该规则的条件是针对 `PROD-GROUP`
    内目标上的任何严重性为 `Fatal`、`Critical` 或 `Warning` 的事件。这里的操作是仅在严重性设置为 `Warning` 时发送电子邮件，或者在严重性设置为
    `Fatal` 或 `Critical` 时发送页面通知。


    *   如果规则条件是特定的指标告警（例如，CPU 利用率或表空间使用百分比超过某个警告或严重阈值），操作可能是创建一个事件。

    *   另一个规则可以针对严重性为警告或严重的事件进行操作，操作是发送通知。在这种情况下，可能还有一个附加条件，即如果规则条件是 `Severity = Critical`，则操作是通过寻呼通知，而如果
    `Severity = Warning`，则操作是通过电子邮件通知。

    *   规则的另一个例子可能是针对已开启超过七天的事件，其中规则操作是将升级级别设置为 1（升级级别范围为 1 到 5）。'
- fmt: '## 创建并配置规则


    现在你需要告诉规则创建一个事件（分配给你的EM管理员名称），将优先级设置为紧急，并同时发送电子邮件给你以确保收到通知，如[Figure 12-16](#9781430249382_Ch12.xhtml#Fig16)所示。


    ![9781430249382_Fig12-16.jpg](images/9781430249382_Fig12-16.jpg)


    [Figure 12-16](#9781430249382_Ch12.xhtml#_Fig16). 向规则添加通知


    完成后，点击`Continue`按钮，然后点击`Next`按钮。为规则提供名称和描述，然后点击`Next`，如[Figure 12-17](#9781430249382_Ch12.xhtml#Fig17)所示。


    ![9781430249382_Fig12-17.jpg](images/9781430249382_Fig12-17.jpg)


    [Figure 12-17](#9781430249382_Ch12.xhtml#_Fig17). 指定规则名称和描述


    点击`Continue`按钮。在下一个屏幕，点击`OK`按钮，然后点击`Save`以保存规则集。最后，点击`OK`以确认规则集创建消息，如[Figure 12-18](#9781430249382_Ch12.xhtml#Fig18)所示。


    ![9781430249382_Fig12-18.jpg](images/9781430249382_Fig12-18.jpg)


    [Figure 12-18](#9781430249382_Ch12.xhtml#_Fig18). 确认规则集已成功创建的窗口


    现在你应该开始看到`Incident Manager`控制台中生成的事件，如[Figure 12-19](#9781430249382_Ch12.xhtml#Fig19)所示。根据检查事件的频率，这可能需要长达30分钟。


    ![9781430249382_Fig12-19.jpg](images/9781430249382_Fig12-19.jpg)


    [Figure 12-19](#9781430249382_Ch12.xhtml#_Fig19). `Incident Manager`控制台中的表空间满警报


    ## 查看事件详情


    现在，让我们继续查看特定事件的详细信息，使用我们刚刚创建的示例规则集。第一步是滚动浏览未解决事件列表，直到找到相关事件。（在此示例中，表空间`USERS`已使用93%。）


    当你通过单击任意位置选中包含该事件的行时，屏幕的下半部分会切换到该事件的详细信息，就像在普通主从窗体中看到的那样。[Figure 12-20](#9781430249382_Ch12.xhtml#Fig20)显示了一个示例。


    ![9781430249382_Fig12-20.jpg](images/9781430249382_Fig12-20.jpg)


    [Figure 12-20](#9781430249382_Ch12.xhtml#_Fig20). 事件详情


    按照`EM12c`的标准，你可以通过将鼠标悬停在其两个部分之间的分隔线上来更改屏幕布局（如[Figure 12-20](#9781430249382_Ch12.xhtml#Fig20)屏幕顶部中间所示），然后拖动光标以在不滚动的情况下显示更多信息。如[Figure
    12-21](#9781430249382_Ch12.xhtml#Fig21)所示的`General`选项卡，显示了关于事件和生成它的指标数据的具体详细信息、一个引导你完成解决事件的指导性解决区域，以及一个我们将在查看其他选项卡后回来讨论的跟踪区域。


    ![9781430249382_Fig12-21.jpg](images/9781430249382_Fig12-21.jpg)


    [Figure 12-21](#9781430249382_Ch12.xhtml#_Fig21). `Incident Manager`中的`General`选项卡


    通过点击`Events`选项卡，你可以看到生成此事件的所有事件。在此特定情况下，只有一个事件，如[Figure 12-22](#9781430249382_Ch12.xhtml#Fig22)所示。


    ![9781430249382_Fig12-22.jpg](images/9781430249382_Fig12-22.jpg)


    [Figure 12-22](#9781430249382_Ch12.xhtml#_Fig22). `Incident Manager`中的`Events`选项卡


    转到下一个选项卡`My Oracle Support Knowledge`（如[Figure 12-23](#9781430249382_Ch12.xhtml#Fig23)所示），你可以看到从`My
    Oracle Support`提取的可能有助于解决问题的相关信息。信息按相关性排序，因此希望更相关的文章能帮助解决问题。


    ![9781430249382_Fig12-23.jpg](images/9781430249382_Fig12-23.jpg)


    [Figure 12-23](#9781430249382_Ch12.xhtml#_Fig23). `Incident Manager`中的`My Oracle
    Support Knowledge`选项卡


    `Updates`选项卡显示有关事件任何更新的信息。（在此示例中，没有任何更新，因此未包含屏幕截图。）你还可以通过点击最后一个选项卡查看任何相关事件和事件（同样，由于此特定事件目前没有，此处未显示）。


    现在让我们转到`General`选项卡上的`Tracking`区域。在这里，你可以确认事件、向其添加注释或管理它（这也允许确认事件或添加注释）。点击`Manage`按钮以访问如[Figure
    12-24](#9781430249382_Ch12.xhtml#Fig24)所示的屏幕。


    ![9781430249382_Fig12-24.jpg](images/9781430249382_Fig12-24.jpg)


    [Figure 12-24](#9781430249382_Ch12.xhtml#_Fig24). 管理事件的工作流


    在[Figure 12-24](#9781430249382_Ch12.xhtml#Fig24)所示的示例中，我已将事件状态更改为`Work in Progress`，添加了优先级和注释，并将事件升级到级别1（如前所述，允许五个升级级别）。这向系统中的其他管理员表明此事件正在处理中。


    ## 创建自定义视图


    你可能已经注意到，在`Incident Manager`控制台的首次截图中，在复杂环境中，你会看到大量的未解决事件，要找到你特别感兴趣的那些并不容易。值得庆幸的是，`EM12c`允许你构建自定义视图，以将你看到的事件数量限制在更易于管理的范围内。为此，点击`Incident
    Manager`控制台左侧`Views`窗格中的`Create`按钮，如[Figure 12-25](#9781430249382_Ch12.xhtml#Fig25)所示。


    ![9781430249382_Fig12-25.jpg](images/9781430249382_Fig12-25.jpg)


    [Figure 12-25](#9781430249382_Ch12.xhtml#_Fig25). 开始创建自定义视图


    对于此特定示例，你希望构建一个过去24小时内未解决事件和问题的视图，因此你为这里的不同字段选择相关值。如[Figure 12-26](#9781430249382_Ch12.xhtml#Fig26)所示，然后你可以点击`Get
    Results`按钮以确保这确实显示了你希望看到的内容。


    ![9781430249382_Fig12-26.jpg](images/9781430249382_Fig12-26.jpg)


    [Figure 12-26](#9781430249382_Ch12.xhtml#_Fig26). 搜索匹配自定义视图的事件


    当你对结果满意后，点击`Create View`按钮。


    当系统提示时，为自定义视图提供一个有意义的名称，如[Figure 12-27](#9781430249382_Ch12.xhtml#Fig27)所示。


    ![9781430249382_Fig12-27.jpg](images/9781430249382_Fig12-27.jpg)


    [Figure 12-27](#9781430249382_Ch12.xhtml#_Fig27). 为自定义视图输入视图名称


    现在你将在左侧的自定义视图列表中看到该视图，如[Figure 12-28](#9781430249382_Ch12.xhtml#Fig28)所示。


    ![9781430249382_Fig12-28.jpg](images/9781430249382_Fig12-28.jpg)


    [Figure 12-28](#9781430249382_Ch12.xhtml#_Fig28). 选择你刚创建的自定义视图


    ## 规则与通知的优先级


    在某些情况下，你的`EM12c`站点可能处于高负载状态。在这些情况下，更重要的事件和事件会优先于其他事件进行处理。在确定处理优先级时会考虑两个因素。


    第一个是目标的生命周期状态，优先级基于以下顺序：关键任务目标具有最高优先级，其次是生产、阶段和测试目标，然后开发目标的优先级最低。作为管理员，你的职责之一是为每个目标适当设置生命周期状态。此处显示的状态是产品附带的开箱即用状态。


    第二个因素是事件或事件的类型。任何与可用性相关的事件或事件，例如目标宕机，始终设置为最高优先级。接下来，处理任何严重级别为关键或警告的事件或事件，最后，任何仅信息性的事件被视为最低优先级。'
  raw: 'Now you need to tell the rule to create an incident (assigned to your EM administrator
    name), set the priority to urgent, and also e-mail you to ensure that you get
    the notification, as shown in [Figure 12-16](#9781430249382_Ch12.xhtml#Fig16).


    ![9781430249382_Fig12-16.jpg](images/9781430249382_Fig12-16.jpg)


    [Figure 12-16](#9781430249382_Ch12.xhtml#_Fig16). Adding notifications to a rule


    Once this is done, click the Continue button and then click the Next button. Provide
    a name and description for the rule and click Next, as shown in [Figure 12-17](#9781430249382_Ch12.xhtml#Fig17).


    ![9781430249382_Fig12-17.jpg](images/9781430249382_Fig12-17.jpg)


    [Figure 12-17](#9781430249382_Ch12.xhtml#_Fig17). Specifying a rule name and description


    Click the Continue button. On the next screen, click the OK button, and then click
    Save to save the rule set. Finally, click OK to acknowledge the rule set creation
    message, as shown in [Figure 12-18](#9781430249382_Ch12.xhtml#Fig18).


    ![9781430249382_Fig12-18.jpg](images/9781430249382_Fig12-18.jpg)


    [Figure 12-18](#9781430249382_Ch12.xhtml#_Fig18). Window confirming a ruleset
    was successfully created


    You should now start seeing incidents generated in the Incident Manager console,
    as shown in [Figure 12-19](#9781430249382_Ch12.xhtml#Fig19). This may take up
    to 30 minutes, depending on the frequency of checking for the event.


    ![9781430249382_Fig12-19.jpg](images/9781430249382_Fig12-19.jpg)


    [Figure 12-19](#9781430249382_Ch12.xhtml#_Fig19). Tablespace Full alerts in the
    Incident Manager console


    Looking at the Details of an Incident


    Now let’s move on to looking at the details for a particular incident, using the
    example rule set we just created. The first step is to scroll through the list
    of open incidents until you find the relevant incident. (In this case, Tablespace
    USERS is 93 percent full.)


    When you select the row containing that incident by clicking anywhere in it, the
    bottom half of the screen swaps to the details for that incident, as you would
    see in a normal master-detail form. [Figure 12-20](#9781430249382_Ch12.xhtml#Fig20)
    shows an example.


    ![9781430249382_Fig12-20.jpg](images/9781430249382_Fig12-20.jpg)


    [Figure 12-20](#9781430249382_Ch12.xhtml#_Fig20). Details of an incident


    As is standard in EM12c, you can change the layout of the screen by hovering over
    the separation between its two parts (as you can see in the top middle of the
    screen in [Figure 12-20](#9781430249382_Ch12.xhtml#Fig20)) and then dragging the
    cursor to show you more information without scrolling. The General tab, shown
    in [Figure 12-21](#9781430249382_Ch12.xhtml#Fig21), shows you specific details
    about the incident and the metrics data that generated it, a guided resolution
    region to walk you through resolving the incident, as well as a tracking region
    we’ll come back to after looking at the other tabs.


    ![9781430249382_Fig12-21.jpg](images/9781430249382_Fig12-21.jpg)


    [Figure 12-21](#9781430249382_Ch12.xhtml#_Fig21). The General tab in Incident
    Manager


    By clicking the Events tab, you can see all the events that have generated this
    incident. In this particular case, there is only one event, as shown in [Figure
    12-22](#9781430249382_Ch12.xhtml#Fig22).


    ![9781430249382_Fig12-22.jpg](images/9781430249382_Fig12-22.jpg)


    [Figure 12-22](#9781430249382_Ch12.xhtml#_Fig22). The Events tab in Incident Manager


    Moving over to the next tab, My Oracle Support Knowledge (shown in [Figure 12-23](#9781430249382_Ch12.xhtml#Fig23)),
    you can see information that has been pulled from My Oracle Support and may be
    relevant in helping to resolve the issue. The information is ranked on relevance,
    so hopefully the more relevant articles will help with the resolution.


    ![9781430249382_Fig12-23.jpg](images/9781430249382_Fig12-23.jpg)


    [Figure 12-23](#9781430249382_Ch12.xhtml#_Fig23). The My Oracle Support Knowledge
    tab in Incident Manager


    The Updates tab shows information on any updates that have been made to the incident.
    (In this example, there haven’t been any updates, so the screenshot is not included.)
    You can also see any related events and incidents by clicking the final tab (again,
    not shown here as there are none yet for this particular incident).


    Let’s move now to the Tracking region on the General tab. Here you can acknowledge
    the incident, add a comment to it, or manage it (which also allows acknowledging
    the incident or adding a comment to it). Click the Manage button to access the
    screen shown in [Figure 12-24](#9781430249382_Ch12.xhtml#Fig24).


    ![9781430249382_Fig12-24.jpg](images/9781430249382_Fig12-24.jpg)


    [Figure 12-24](#9781430249382_Ch12.xhtml#_Fig24). Managing the workflow for an
    incident


    In the example shown in [Figure 12-24](#9781430249382_Ch12.xhtml#Fig24), I’ve
    changed the status of the incident to Work in Progress, added a priority and comment,
    and also escalated the incident to level 1 (as indicated earlier, five levels
    of escalation are allowed). This shows any other administrators in the system
    that this incident is being worked on.


    Creating a Custom View


    You may have noticed with the screenshot you first saw of the Incident Manager
    console that in a complex environment, you can see a very large number of open
    incidents, and finding the ones you are specifically interested in isn’t easy.
    Thankfully, EM12c enables you to build a custom view to restrict the number of
    incidents you see to something more manageable. To do this, click the Create button
    in the left-hand Views pane on the Incident Manager console, as shown in [Figure
    12-25](#9781430249382_Ch12.xhtml#Fig25).


    ![9781430249382_Fig12-25.jpg](images/9781430249382_Fig12-25.jpg)


    [Figure 12-25](#9781430249382_Ch12.xhtml#_Fig25). Starting to create a custom
    view


    For this particular example, you want to build a view of the open incidents and
    problems in the past 24 hours, so you choose the relevant values for the different
    fields here. As seen in [Figure 12-26](#9781430249382_Ch12.xhtml#Fig26), you can
    then click the Get Results button to ensure that this does display what you want
    to see.


    ![9781430249382_Fig12-26.jpg](images/9781430249382_Fig12-26.jpg)


    [Figure 12-26](#9781430249382_Ch12.xhtml#_Fig26). Searching for incidents that
    match the custom view


    Once you’re happy with the results, click the Create View button.


    When prompted, provide a meaningful name for the custom view, as shown in [Figure
    12-27](#9781430249382_Ch12.xhtml#Fig27).


    ![9781430249382_Fig12-27.jpg](images/9781430249382_Fig12-27.jpg)


    [Figure 12-27](#9781430249382_Ch12.xhtml#_Fig27). Entering a view name for the
    custom view


    Now you will see the view in the list of custom views on the left side, as shown
    in [Figure 12-28](#9781430249382_Ch12.xhtml#Fig28).


    ![9781430249382_Fig12-28.jpg](images/9781430249382_Fig12-28.jpg)


    [Figure 12-28](#9781430249382_Ch12.xhtml#_Fig28). Selecting the custom view you
    just created


    Prioritization of Rules and Notifications


    In certain scenarios, your EM12c site might be under heavy load. In these cases,
    more important events and incidents are processed ahead of others. Two factors
    are taken into account when determining the processing priority.


    The first is the lifecycle status of the target, with the priority based on the
    following order: Mission Critical targets have the highest priority, followed
    by Production, Stage, and Test, and then Development targets have the lowest.  As
    an administrator, one of the responsibilities you have is to set the lifecycle
    status of each target appropriately. The statuses shown here are the ones shipped
    out of the box with the product.


    The second factor is the type of event or incident. Any events or incidents that
    have to do with availability, such as target down, are always set as highest priority.
    Next, any events or incidents that are for critical or warning severities are
    handled, and finally any events that are informational only are treated as the
    lowest priority.'
