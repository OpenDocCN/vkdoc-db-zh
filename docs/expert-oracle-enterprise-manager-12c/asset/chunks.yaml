    to define requirements or pass parameters. If command-line parameters contain
    special symbols, they might be handled differently on different platforms. Environment
    variables seem to be passed reliably on all platforms, including Linux, Windows,
    and Unix. Passing credentials and other sensitive information via environment
    variables could be more secure than via the command line, which is often easily
    observed by any logged-in host user. However, some platforms may expose the content
    of environment variables of a process to other users, as Linux does via the /proc
    filesystem. Later in this chapter, you will learn about monitoring credentials,
    which is a more secure way to pass a login and password to a script.


    Let’s summarize the definition of the Response metric from [Listing 10-12](#9781430249382_Ch10.xhtml#list12).
    A Response metric is a single-row metric with the columns Load and Status. It’s
    using the OSLineToken fetchlet that is capable of returning a multirow, multicolumn
    result set from an OS command. The fetchlet is configured to run a Perl script
    named data_collector.pl and parses output by separating column values with a pipe
    symbol (|) and filtering in only the lines prefixed with em_result=.


    Default Collection Metadata


    Now that you know how the EM12c user can configure new target instances (via the
    InstanceProperties element) and what metrics target type will collect and how
    (Metric elements), the only missing bit is to define how often metrics need to
    be collected and what the alerting conditions are on the metrics. This is defined
    in the Default Collection metadata XML file placed in <EDK>/oms/metadata/default_collection
    and linked from <EDK>/agent/default_collection. Use the same naming convention
    as for the target type metadata file. A sample default collection metadata definition
    is shown in [Listing 10-13](#9781430249382_Ch10.xhtml#list13). See the default
    collection definition of the Sample Host 1 target for the complete example.


    ***[Listing 10-13](#9781430249382_Ch10.xhtml#_list13)***.  Sample Default Connection
    Metadata Definition


    ```

    <TargetCollection TYPE="sample_host1">

      <CollectionItem NAME="Response">

        <Schedule>

          <IntervalSchedule INTERVAL="5" TIME_UNIT="Min"/>

        </Schedule>

        <Condition COLUMN_NAME="Status" CRITICAL="1" OPERATOR="LT"/>

      </CollectionItem>

      <CollectionItem NAME="Perf" UPLOAD="1">

        <Schedule>

          <IntervalSchedule INTERVAL="5" TIME_UNIT="Min"/>

        </Schedule>

        <MetricColl NAME="CPUPerf">

          <Condition COLUMN_NAME="non_nice" WARNING="NotDefined" CRITICAL="NotDefined"

             OPERATOR="GE"

             MESSAGE="The value for %columnName% is %value%%%.  It has risen above
    the

               critical (%critical_threshold%%%) or warning (%warning_threshold%%%)
    threshold."

             CLEAR_MESSAGE="The value for %columnName% is %value%%%." />

          <Condition ... />

          ...

        </MetricColl>

        <MetricColl NAME="MemoryPerf">...</MetricColl>

        <MetricColl NAME="CPUProcessorPerf">...</MetricColl>

        ...

      </CollectionItem>

      ...

    </TargetCollection>

    ```


    The root element is TargetCollection, and its TYPE attribute should match the
    type attribute of the TargetMetadata root element from the target type metadata
    XML file (sample_host1). The TargetCollection element contains a number of CollectionItem
    elements, and each CollectionItem element matches to a Metric element in the target
    type metadata file. The NAME attribute of CollectionItem should match the metric
    name.


    There is also a way to group the collection of multiple metrics in the same collection
    item when the same collection frequency or metric collection order is required.
    This is done by including MetricColl elements (one per metric) inside a CollectionItem
    (for example, the collection item "Perf"). In this case, the NAME attribute of
    the child MetricColl elements should match metric names as in the example ("CPUPerf",
    "MemoryPerf", and "CPUProcessorPerf"). See the *Oracle Enterprise Manager Cloud
    Control Extensibility Programmer''s Reference* ([Chapter 3](#9781430249382_Ch03.xhtml),
    Section 3.5.1).


    For each collection item, we can define a Schedule child element that typically
    includes an IntervalSchedule child element indicating the frequency of the collection
    by using the numerical attribute INTERVAL and string attribute TIME_UNIT. The
    latter can be set to Sec, Min, Hr, or Day, and default to Min. As this is a default
    collection definition, this setting represents the initial default frequency.
    EM12c users can modify collection intervals, as for any other metrics, and plug-in
    developers can set the limits on those settings by using the MIN_INTERVAL and
    MAX_INTERVAL attributes of the IntervalSchedule element. Other scheduling options
    are also available, such as running on a certain day of the month or week. They
    are not documented in the extensibility guides, but you can see the XML Schema
    documentation from <EDK>/doc/partnersdk/mrs/emcore/default_collection for additional
    options, and you can also see them in the console when modifying a collection
    schedule.


    If the schedule is not defined for a metric, this metric will not be automatically
    collected by the agent except when an EM12c user opens the real-time metric view,
    in which case OMS requests the collection from the agent each time the real-time
    view is refreshed. Whether or not the initial collection schedule is defined in
    the default collection file, the schedule can be customized in the EM12c console.
    You use the All Metrics view of a target, as shown in [Figure 10-11](#9781430249382_Ch10.xhtml#Fig11)
    for the collection item named "Perf" (shown earlier in [Listing 10-13](#9781430249382_Ch10.xhtml#list13)).


    ![9781430249382_Fig10-11.jpg](images/9781430249382_Fig10-11.jpg)


    [Figure 10-11](#9781430249382_Ch10.xhtml#_Fig11). Customizing the collection schedule


    Each column in a metric can have a condition defined for testing against warning
    and critical thresholds—one Condition element per column. If you define a collection
    item per metric, the Condition elements are children of CollectionItem. Otherwise,
    Condition elements are children of MetricColl. Condition elements have two required
    attributes: COLUMN_NAME and OPERATOR. The latter defines a comparison operator,
    which can either be a numerical relation or string matching operator. In [Listing
    10-13](#9781430249382_Ch10.xhtml#list13), LT means *less than* and GT means *greater
    than*. String conditions include CONTAINS for a substring match and MATCH for
    a regular expression match. Section 3.5.5 of the *Extensibility Programmer''s
    Reference* has a full list of operators. Note that operator codes must be in uppercase.'
  trans: "\n可以在命令执行前设置环境变量——无论是用于定义需求还是传递参数。如果命令行参数包含特殊符号，在不同平台上的处理方式可能有所不同。环境变量似乎能在所有平台（包括\
    \ Linux、Windows 和 Unix）上可靠地传递。通过环境变量传递凭证和其他敏感信息可能比通过命令行更安全，因为命令行内容通常很容易被任何已登录的主机用户观察到。然而，某些平台可能会将进程的环境变量内容暴露给其他用户，就像\
    \ Linux 通过 `/proc` 文件系统所做的那样。本章后续部分，你将了解凭证监控，这是一种更安全地向脚本传递登录名和密码的方式。\n\n让我们总结一下\
    \ 清单 10-12 中 `Response` 指标的定义。`Response` 指标是一个单行指标，包含 `Load` 和 `Status` 两列。它使用了\
    \ `OSLineToken` 获取器，该获取器能够从操作系统命令返回一个多行、多列的结果集。获取器被配置为运行一个名为 `data_collector.pl`\
    \ 的 Perl 脚本，并通过管道符号 (`|`) 分隔列值来解析输出，同时只筛选以 `em_result=` 开头的行。\n\n**默认采集元数据**\n\
    \n现在你已经了解了 EM12c 用户如何配置新的目标实例（通过 `InstanceProperties` 元素），以及目标类型将采集哪些指标以及如何采集（通过\
    \ `Metric` 元素），唯一缺失的部分是定义指标的采集频率以及指标的告警条件。这定义在默认采集元数据 XML 文件中，该文件位于 `<EDK>/oms/metadata/default_collection`，并从\
    \ `<EDK>/agent/default_collection` 链接。使用与目标类型元数据文件相同的命名约定。清单 10-13 展示了一个示例默认采集元数据定义。有关完整示例，请参阅示例主机\
    \ 1 目标的默认采集定义。\n\n清单 10-13. 示例默认连接元数据定义\n\n```\n<TargetCollection TYPE=\"sample_host1\"\
    >\n  <CollectionItem NAME=\"Response\">\n    <Schedule>\n      <IntervalSchedule\
    \ INTERVAL=\"5\" TIME_UNIT=\"Min\"/>\n    </Schedule>\n    <Condition COLUMN_NAME=\"\
    Status\" CRITICAL=\"1\" OPERATOR=\"LT\"/>\n  </CollectionItem>\n  <CollectionItem\
    \ NAME=\"Perf\" UPLOAD=\"1\">\n    <Schedule>\n      <IntervalSchedule INTERVAL=\"\
    5\" TIME_UNIT=\"Min\"/>\n    </Schedule>\n    <MetricColl NAME=\"CPUPerf\">\n\
    \      <Condition COLUMN_NAME=\"non_nice\" WARNING=\"NotDefined\" CRITICAL=\"\
    NotDefined\"\n         OPERATOR=\"GE\"\n         MESSAGE=\"The value for %columnName%\
    \ is %value%%%.  It has risen above the\n           critical (%critical_threshold%%%)\
    \ or warning (%warning_threshold%%%) threshold.\"\n         CLEAR_MESSAGE=\"The\
    \ value for %columnName% is %value%%%.\" />\n      <Condition ... />\n      ...\n\
    \    </MetricColl>\n    <MetricColl NAME=\"MemoryPerf\">...</MetricColl>\n   \
    \ <MetricColl NAME=\"CPUProcessorPerf\">...</MetricColl>\n    ...\n  </CollectionItem>\n\
    \  ...\n</TargetCollection>\n```\n\n根元素是 `TargetCollection`，其 `TYPE` 属性应与目标类型元数据\
    \ XML 文件（`sample_host1`）中 `TargetMetadata` 根元素的 `type` 属性相匹配。`TargetCollection`\
    \ 元素包含多个 `CollectionItem` 元素，每个 `CollectionItem` 元素对应目标类型元数据文件中的一个 `Metric` 元素。`CollectionItem`\
    \ 的 `NAME` 属性应与指标名称匹配。\n\n当需要相同的采集频率或指标采集顺序时，还有一种方法可以在同一个采集中对多个指标进行分组。这是通过在 `CollectionItem`\
    \ 内部包含 `MetricColl` 元素（每个指标一个）来实现的（例如，采集项 \"Perf\"）。在这种情况下，子元素 `MetricColl` 的\
    \ `NAME` 属性应与指标名称匹配，如示例中的 \"CPUPerf\"、\"MemoryPerf\" 和 \"CPUProcessorPerf\"。请参阅\
    \ *Oracle Enterprise Manager Cloud Control Extensibility Programmer's Reference*（第\
    \ 3 章，第 3.5.1 节）。\n\n对于每个采集项，我们可以定义一个 `Schedule` 子元素，该子元素通常包含一个 `IntervalSchedule`\
    \ 子元素，使用数值属性 `INTERVAL` 和字符串属性 `TIME_UNIT` 来指示采集的频率。后者可以设置为 `Sec`、`Min`、`Hr` 或\
    \ `Day`，默认为 `Min`。由于这是一个默认采集定义，此设置代表初始的默认频率。EM12c 用户可以像修改任何其他指标一样修改采集间隔，插件开发人员可以使用\
    \ `IntervalSchedule` 元素的 `MIN_INTERVAL` 和 `MAX_INTERVAL` 属性来设置这些设置的限制。其他调度选项也可用，例如在每月的某一天或每周的某一天运行。这些选项在可扩展性指南中没有文档说明，但你可以在\
    \ `<EDK>/doc/partnersdk/mrs/emcore/default_collection` 查看 XML 模式文档以获取更多选项，也可以在控制台中修改采集计划时看到它们。\n\
    \n如果未为某个指标定义计划，则除非 EM12c 用户打开实时指标视图（此时 OMS 每次刷新实时视图时都会向代理请求采集），否则代理不会自动采集该指标。无论初始采集计划是否在默认采集文件中定义，都可以在\
    \ EM12c 控制台中自定义计划。你可以使用目标的\"所有指标\"视图，如图 10-11 所示，对应于名为 \"Perf\" 的采集项（在前面的 清单 10-13\n\
    \n图 10-11. 自定义采集计划\n\n指标中的每一列都可以定义一个条件，用于测试警告和严重阈值——每列一个 `Condition` 元素。如果为每个指标定义一个采集项，则\
    \ `Condition` 元素是 `CollectionItem` 的子元素。否则，`Condition` 元素是 `MetricColl` 的子元素。`Condition`\
    \ 元素有两个必需属性：`COLUMN_NAME` 和 `OPERATOR`。后者定义了一个比较运算符，可以是数值关系运算符或字符串匹配运算符。在 清单 10-13\
    \ 中，`LT` 表示*小于*，`GT` 表示*大于*。字符串条件包括用于子字符串匹配的 `CONTAINS` 和用于正则表达式匹配的 `MATCH`。*可扩展性程序员参考*的第\
    \ 3.5.5 节提供了运算符的完整列表。请注意，运算符代码必须为大写。\n"
- fmt: '# Setting Thresholds and Packaging the Plug-in


    ## Defining Thresholds and Alert Messages


    The default warning and critical thresholds can be defined as part of a `Condition`
    element by using the attributes `WARNING` and `CRITICAL`. Just like a collection
    schedule, the thresholds can be modified by an EM12c user. Both warning and critical
    thresholds are optional and often left undefined if there is no value that is
    a reasonably good default. The value `"NotDefined"` is the same as defining no
    value at all, as shown in [Listing 10-13](#9781430249382_Ch10.xhtml#list13) for
    the `"non_nice"` column condition. I prefer to just skip the definition to keep
    the metadata definition clean, just as there is no `WARNING` threshold for the
    `Status` column of the `Response` metric.


    You can also see that it’s possible to define a column-specific alert message
    and include the column name and latest value as well as thresholds by using a
    placeholder variable such as `%columnName%`. Because the percent sign (`%`) has
    a special meaning, you should use a double percent sign (`%%`) to include a real
    percent sign in the message. In the same fashion, you can define a custom message
    generated in EM12c when a condition is cleared. It’s also possible to specify
    the attribute `OCCURRENCES` to set the number of consequent occurrences of the
    condition before an alert is raised.


    As long as a condition operator is specified in the target default collection
    file, thresholds as well as the number of occurrences can be customized in the
    EM12c console. The operator itself, however, cannot be changed. Thus, pay special
    attention to selecting the right condition operator.


    ## Packaging the Plug-in


    Now you know about all the components of the minimal EM12c plug-in, you also need
    to place the OS scripts called by metric collection fetchlets defined in target
    type metadata. I recommend writing OS scripts in Perl and use the version of Perl
    that’s installed with Oracle Management Agents. This is the most platform-independent
    approach (though the example Oracle provides works only on Linux for the sake
    of simplicity—the Perl script simply calls some OS utilities to collect data).
    Scripts are placed in the agent-side staging area in the `scripts` directory,
    and a subdirectory with the same name as the target type is created. So, in our
    example, the `data_collector.pl` file is placed in `<stage>/agent/scripts/sample_host1`
    where `sample_host1` is target type.


    With all the components and scripts in place, you can now package the plug-in
    archive. You can run plug-in validation before packaging, just as in [Listing
    10-7](#9781430249382_Ch10.xhtml#list7) earlier. However, plug-in creation includes
    a validation step, so it’s not necessary to run the validation as a separate step.


    When deploying sample plug-ins, I used the script `build_sample_plugin.sh`, which
    is nothing else but a small wrapper for the `empdk create_plugin` command. The
    full command for deploying the plug-in is as follows:


    ```

    empdk create_plugin -stage_dir <stage_dir> -out_dir <output_dir>

    ```


    Two mandatory parameters define the location of the staging directory and the
    output directory where the OPAR file is produced. See of the *Extensibility Programmer''s
    Reference* ([Chapter 13](#9781430249382_Ch13.xhtml), Section 13.4) for details
    on optional arguments of `empdk create_plugin`.


    During packaging of the plug-in, EDK creates additional files in your staging
    area that are packaged into the plug-in archive. For example, it creates PL/SQL
    code importing the target type definitions into OMS during deployment. You don’t
    need to worry about them or maintain them; they are re-created each time you create
    the plug-in archive.


    The created OPAR file is used to distribute the plug-in to other users (EM12c
    administrators) whether you created it for your own organization or for external
    users, and whether it’s a free plug-in or a commercial one. The deployment procedure
    is the same as that used in the deployment of the sample plug-ins outlined earlier
    and also described in detail in the *Extensibility Programmer''s Reference* ([Chapter
    13](#9781430249382_Ch13.xhtml), Sections 13.5 and 13.6). The end-user documentation
    on plug-in management is available in Chapter 22 of the *Oracle Enterprise Manager
    Cloud Control 12c Administrator''s Guide* (refer to the “Importing Plug-In Archives”
    part of Section 12.4.3.2 if you distribute an OPAR file directly to end users).


    For the three host sample plug-ins, all steps have already been done earlier,
    so the initial samples are already deployed and targets created. Note that the
    `oracle.samples.xsh1` plug-in implements a few more features that you will look
    into later in this chapter, but what you’ve learned so far is pretty much the
    core of any plug-in with new target types.


    ## Agent’s Metric Browser


    It’s often useful to use the agent’s Metric Browser interface to view what the
    agent is actually collecting and even some debugging information on the collected
    metrics. This is useful during troubleshooting, when it’s not clear whether the
    problem is with the metrics collection on the agent side or occurring during uploading
    and loading into the repository on the OMS side. To activate the Metric Browser
    for the agent, run the following as the OS user running the agent:


    ```

    emctl setproperty agent -name _enableMetricBrowser -value true

    ```


    To determine the URL of the Metric Browser, run the command `emctl status agent`.
    The `Agent URL` line will display in the format `http://host:port/emd/main/`.
    Modify this URL by adding the `/browser/` string between `emd` and `main`, like
    this: `http://host:port/emd/browser/main`. Your agent might have `https` instead
    of `http` if it’s secured, so use the `https` URL in that case.


    Using the Metric Browser is especially useful when using transient and computed
    columns, which are described later. There is also a full Metric Definition XML
    fragment available with all attributes explicitly defined, even including default
    values—a great way to learn about some nondocumented options. The Metric Browser
    lets you access any target type, and not only your own targets, so you can see
    complete (and often complex) metric definitions from Oracle’s own targets that
    can give you excellent ideas on how to create your own metrics. Other debugging
    information is available on metric collection but, unfortunately, it hasn’t yet
    been documented in any detail and I haven’t had a need to use it so far.


    ## Under the Hood of Metric Extensions


    You probably noticed that defining target type metrics is similar to defining
    metric extensions, but in XML format. In fact, Metric Extensions feature is basically
    the user interface for adding new metrics to existing targets without the burden
    of creating completely new plug-ins and target types. Behind the scenes, metric
    extensions are the same XML metric definitions that you see in target type metadata.


    All metric extensions are stored in the table `EM_MEXT_VERSIONS` in the `SYSMAN`
    schema in the repository database. The `METADATA_DEFINITION` column stores nothing
    else but the XML `Metric` element as the definition of the metric extension. The
    relevant `CollectionItem` element is in the `COLLECTION_DEFINITION` column of
    that table.


    `[Listing 10-14](#9781430249382_Ch10.xhtml#list14)` contains the XML definition
    of the very first `"Open Cursors, %"` metric extension I created. It is formatted
    here for readability.


    `[Listing 10-14](#9781430249382_Ch10.xhtml#_list14)`. XML Representation of a
    Metric Extension'
