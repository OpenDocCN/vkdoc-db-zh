    # 第 1 章


    ![image](img/frontdot.jpg)


    ## Enterprise Manager Cloud Control 12c 架构


    作者：Pete Sharman


    *Oracle Enterprise Manager Cloud Control 12c*（下文简称`EM12c`）是 Oracle 公司针对 Oracle
    及非 Oracle 技术推出的最新端到端管理工具。该工具此前被称为 Oracle Enterprise Manager (OEM) 或 Oracle Enterprise
    Manager Grid Control，已经存在了相当长的时间。然而，12c 版本是一个里程碑式的版本，在其功能的广度和深度上都取得了巨大进步。在许多方面，这个版本使
    Enterprise Manager 从一个数据库管理员的监控工具，转变为一个可用于管理整个数据中心的工具。EM12c 现在涵盖多个重点领域，包括以下内容：

    '
- fmt: '# EM12c 核心功能与架构


    *   **Framework and infrastructure**： EM12c 提供安全性、可扩展性、丰富的用户界面、新的自更新功能等。

    *   **Enterprise monitoring**： 您可以监控整个基础设施的状态，包括数据库、中间件和应用程序。EM12c 提供了问题通知、解决和报告的方法。

    *   **Cloud management**： 云管理是当今行业热点，EM12c 在此领域提供了一系列解决方案，包括费用分摊/展示、基于策略的资源管理和自助式供应。

    *   **Lifecycle management**： 如今管理计算系统需要许多手动流程来完成发现、供应、打补丁、变更管理和配置管理。EM12c 自动化了其中许多手动流程，让管理员有更多时间处理其他更高优先级的任务。

    *   **Database management**： 数据库管理一直是 OEM 自首次发布以来的关键功能。这在 EM12c 版本中得以延续，包括围绕打补丁、升级、供应、性能调优、数据脱敏和子集化，以及配置和变更管理的解决方案。

    *   **Middleware management**： EM12c 的一个关键组件是为所有 Oracle 中间件产品（包括 WebLogic Server、SOA
    Suite、Identity Management、WebCenter 和 Coherence）以及非 Oracle 中间件（如 IBM 的 WebSphere
    或 JBoss Application Server）提供全面的管理能力。

    *   **Application management**： EM12c 开箱即用地提供了对所有 Oracle 提供的应用程序（E-Business Suite、PeopleSoft、Siebel、JD
    Edwards 和 Fusion Applications）的监控和管理解决方案，此外还具备管理您自己构建的自定义或第三方应用程序的能力。

    *   **Application performance management**： EM12c 提供应用程序的端到端监控，包括通过 Real User
    Experience Insight (RUEI) 进行真实用户监控，以及通过 Service Level Management 信标进行合成事务监控。此处引入的其他功能包括监控和跟踪业务事务、拓扑发现，以及
    Java 和数据库监控与诊断。

    *   **Application quality management (AQM)**： 提供三个测试领域——通过 Application Testing
    Suite 产品进行应用测试，通过 Real Application Testing 和 Application Replay 进行基础设施测试，以及包括测试系统创建、数据脱敏和数据子集化技术在内的测试数据管理功能。

    *   **Hardware and virtualization management**： 为物理和虚拟环境提供完整的生命周期管理，包括供应、打补丁、配置管理、管理和监控。这包括管理运行在
    Linux、Unix、Windows 和 Oracle Virtualization Server (Oracle VM Server) 操作系统上的系统，以及为基于
    Oracle Sun 硬件构建的系统提供对服务器、网络和存储层的洞察。

    *   **Heterogeneous (non-Oracle) management**： EM12c 通过提供一系列称为连接器和插件的扩展（以及其他），除了
    Oracle 环境外，还具备管理非 Oracle 技术的能。这些扩展可以由 Oracle、合作伙伴甚至客户自己构建。它们基于与 EM12c 产品其余部分相同的管理框架，因此可以通过自更新机制下载、导入和部署。


    涵盖所有这些关注领域，构成了一个用于管理整个数据中心的强大产品。本书的其余部分将深入探讨其中许多领域的细节。本章的其余部分将介绍基本架构，在您进一步深入了解
    EM12c 的精彩功能之前需要理解这些内容。


    ## Architecture Overview


    从架构角度看，EM12c 由五个主要部分组成：


    *   `Cloud Control console`

    *   `Oracle Management Agent`

    *   `Oracle Management Service`

    *   `Oracle Management Repository`

