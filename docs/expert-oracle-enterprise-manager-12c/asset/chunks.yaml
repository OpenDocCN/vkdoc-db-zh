    \ web site, or you can use the YUM package manager. Oracle provides a free public\
    \ yum server that you can use even if you don’t buy support from Oracle.\n\nTo\
    \ use the Oracle public yum server, you first need to download and copy the appropriate\
    \ yum configuration file in place, by running the following commands as ROOT:\n\
    \n*   Oracle Linux 4, update 6 or newer\n    *   [root@repositorydb ∼]# cd /etc/yum.repos.d\n\
    \    *   [root@repositorydb ∼]# mv Oracle-Base.repo Oracle-Base.repo.disabled\n\
    \    *   [root@repositorydb ∼]# wget [http://public-yum.oracle.com/public-yum-el4.repo](http://public-yum.oracle.com/public-yum-el4.repo)\n\
