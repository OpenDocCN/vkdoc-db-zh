    ## 部署管理代理


    Oracle Management Agent是Enterprise Manager Cloud Control的核心组件之一。如果您想要监控在某个主机上运行的目标（例如数据库或应用服务器），您需要通过部署管理代理将该主机转换为受管主机。然后您就可以发现该主机上运行的目标并将其添加到Enterprise
    Manager系统。


    有几种部署代理的方式：


    *   使用“添加主机目标”向导

    *   使用RPM文件

    *   使用`AgentPull`脚本

    *   使用`agentDeploy`脚本


    以下各节描述了这些选项。


    ### 使用“添加主机目标”向导


    使用“添加主机目标”向导是部署管理代理最简单的方式。它对于大规模部署管理代理尤其有用。Oracle也推荐使用此向导。请按照以下步骤操作：


    1.  登录到Enterprise Manager Cloud Control控制台。

    2.  从“设置”菜单中，选择“添加目标” ![arrow](images/arrow.jpg) “手动添加目标”，如[图2-39](#9781430249382_Ch02.xhtml#Fig39)所示。


    ![9781430249382_Fig02-39.jpg](images/9781430249382_Fig02-39.jpg)


    [图2-39](#9781430249382_Ch02.xhtml#_Fig39). 添加主机向导


    3.  选择“添加主机目标”单选按钮，然后点击“添加主机”按钮，如[图2-40](#9781430249382_Ch02.xhtml#Fig40)所示。


    ![9781430249382_Fig02-40.jpg](images/9781430249382_Fig02-40.jpg)


    [图2-40](#9781430249382_Ch02.xhtml#_Fig40). 手动添加目标


    4.  为了能够监控仓库数据库，请在`repositorydb.testdomain.com`服务器上部署一个管理代理。点击带有加号的“添加”按钮，输入主机名，然后选择目标服务器的操作系统。在此示例中，我们在Linux
    x64上安装了Enterprise Manager，并且没有下载任何额外的代理软件，因此目前我们只能为64位Linux服务器部署代理（参见[图2-41](#9781430249382_Ch02.xhtml#Fig41)）。点击“下一步”。


    ![9781430249382_Fig02-41.jpg](images/9781430249382_Fig02-41.jpg)


    [图2-41](#9781430249382_Ch02.xhtml#_Fig41). 添加主机目标


    5.  输入代理软件将被安装到的目录。点击“命名凭据”选项旁边的蓝色加号，为主机添加一个凭据。在显示的“创建新的命名凭据”对话框中，为凭据起一个有意义的名字，然后点击“确定”保存它（参见[图2-42](#9781430249382_Ch02.xhtml#Fig42)）。


    ![9781430249382_Fig02-42.jpg](images/9781430249382_Fig02-42.jpg)


    [图2-42](#9781430249382_Ch02.xhtml#_Fig42). 创建新的命名凭据


    6.  使用命名凭据提供了一层额外的安全保护。管理员可以为操作员创建命名凭据，这样他们就可以使用登录信息，而无需知道与之关联的实际用户名和密码。点击“下一步”以检查配置详情，如[图2-43](#9781430249382_Ch02.xhtml#Fig43)所示。


    ![image](images/sq.jpg) `提示` Oracle建议配置权限委派（即，给管理代理用户赋予`sudo`权限）。


    ![9781430249382_Fig02-43.jpg](images/9781430249382_Fig02-43.jpg)


    [图2-43](#9781430249382_Ch02.xhtml#_Fig43). 代理安装检查


    7.  点击控制台右上角的“部署代理”按钮开始部署过程。'
  raw: '5.  Select Create a New Enterprise Manager System and then select Advanced
    (see [Figure 2-28](#9781430249382_Ch02.xhtml#Fig28)). Click Next.


    ![9781430249382_Fig02-28.jpg](images/9781430249382_Fig02-28.jpg)


    [Figure 2-28](#9781430249382_Ch02.xhtml#_Fig28). Installation types


    6.  For the Installation Details step, shown in [Figure 2-29](#9781430249382_Ch02.xhtml#Fig29),
    enter the Middleware Home Location as /u01/app/Middleware, the Agent Base Directory
    as /u01/app/agent, and your Host Name. Then click Next.


    ![9781430249382_Fig02-29.jpg](images/9781430249382_Fig02-29.jpg)


    [Figure 2-29](#9781430249382_Ch02.xhtml#_Fig29). Installation details


    7.  In the Plug-in Deployment step, shown in [Figure 2-30](#9781430249382_Ch02.xhtml#Fig30),
    select the management plug-ins you want to configure. It’s also possible to add
    or remove the management plug-ins after you install Enterprise Manager. Click
    Next.


    ![9781430249382_Fig02-30.jpg](images/9781430249382_Fig02-30.jpg)


    [Figure 2-30](#9781430249382_Ch02.xhtml#_Fig30). Plug-in deployment


    8.  The Oracle Management Service is the main application of the Enterprise Manager
    and it needs a WebLogic application server to run. In the next step, shown in
    [Figure 2-31](#9781430249382_Ch02.xhtml#Fig31), choose a username and password
    for the WebLogic server and a password for the node manager. Please keep this
    information safe. It can be required to troubleshoot problems related to WebLogic.
    Click Next.


    ![9781430249382_Fig02-31.jpg](images/9781430249382_Fig02-31.jpg)


    [Figure 2-31](#9781430249382_Ch02.xhtml#_Fig31). Weblogic Server configuration


    9.  Enter the connection info of the repository database and select the deployment
    size (see [Figure 2-32](#9781430249382_Ch02.xhtml#Fig32)). The installer checks
    the database settings according to the deployment size. Click Next.


    ![9781430249382_Fig02-32.jpg](images/9781430249382_Fig02-32.jpg)


    [Figure 2-32](#9781430249382_Ch02.xhtml#_Fig32). Database connection details


    10.  The installer creates the required database user and the tablespaces in the
    repository database. For the Repository Configuration Details step, shown in [Figure
    2-33](#9781430249382_Ch02.xhtml#Fig33), enter a password for the SYSMAN user,
    modify the directory locations if needed, and enter a registration password that
    will be used for securing agent communications. Click Next.


    ![image](images/sq.jpg) **Note**  If you are configuring the management repository
    on a database that uses Oracle Automatic Storage Management (ASM) for storage,
    then when you specify the data file location, only the disk group is used for
    creating the tablespaces. For example, if you specify +DATA/mgmt.dbf, only +DATA
    is used for creating the tablespaces on ASM, and the exact location of the data
    file on the disk group is decided by Oracle Managed Files.


    ![9781430249382_Fig02-33.jpg](images/9781430249382_Fig02-33.jpg)


    [Figure 2-33](#9781430249382_Ch02.xhtml#_Fig33). Repository configuration details


    11.  Check the ports that will be allocated for the Oracle Enterprise Manager
    (see [Figure 2-34](#9781430249382_Ch02.xhtml#Fig34)). You can modify them, but
    keep in mind that the port numbers must be higher than 1024 and lower than 65535.


    ![9781430249382_Fig02-34.jpg](images/9781430249382_Fig02-34.jpg)


    [Figure 2-34](#9781430249382_Ch02.xhtml#_Fig34). Port configuration details


    12.  Review the configuration (see [Figure 2-35](#9781430249382_Ch02.xhtml#Fig35)).
    When satisfied with the configuration, click Install to start the installation.


    ![9781430249382_Fig02-35.jpg](images/9781430249382_Fig02-35.jpg)


    [Figure 2-35](#9781430249382_Ch02.xhtml#_Fig35). Installation review


    13.  At the end of the installation, you need to execute some configuration scripts.
    Log in as ROOT to the server in another terminal session and run the scripts (see
    [Figure 2-36](#9781430249382_Ch02.xhtml#Fig36)). Then click OK to finish the installation.


    ![9781430249382_Fig02-36.jpg](images/9781430249382_Fig02-36.jpg)


    [Figure 2-36](#9781430249382_Ch02.xhtml#_Fig36). Executing configuration scripts


    14.  Review the information, as shown in [Figure 2-37](#9781430249382_Ch02.xhtml#Fig37),
    and click Close to complete the Oracle Enterprise Manager Cloud Control 12c installation.


    ![9781430249382_Fig02-37.jpg](images/9781430249382_Fig02-37.jpg)


    [Figure 2-37](#9781430249382_Ch02.xhtml#_Fig37). Installation completed


    15.  You now can log in to Enterprise Manager Cloud Control, as shown in [Figure
    2-38](#9781430249382_Ch02.xhtml#Fig38).


    ![9781430249382_Fig02-38.jpg](images/9781430249382_Fig02-38.jpg)


    [Figure 2-38](#9781430249382_Ch02.xhtml#_Fig38). Login screen of Oracle Enterprise
    Manager


    Deploying Management Agents


    The Oracle Management Agent is one of the core components of Enterprise Manager
    Cloud Control. If you want to monitor a target (such as a database or an application
    server) running on a host, you need to convert the host to a managed host by deploying
    a management agent. Then you can discover the targets running on that host and
    add them to the Enterprise Manager system.


    There are several ways to deploy agents:


    *   Using the Add Host Targets Wizard

    *   Using an RPM file

    *   Using the AgentPull script

    *   Using the agentDeploy script


    The following sections describe these options.


    Using the Add Host Targets Wizard


    Using the Add Host Targets Wizard is the easiest way to deploy a management agent.
    It’s especially useful for the mass-deployment of management agents. Oracle also
    recommends using this wizard. Follow these steps:


    1.  Log in to the Enterprise Manager Cloud Control console.

    2.  From the Setup menu, choose Add Target ![arrow](images/arrow.jpg) Add Targets
    Manually, as shown in [Figure 2-39](#9781430249382_Ch02.xhtml#Fig39).


    ![9781430249382_Fig02-39.jpg](images/9781430249382_Fig02-39.jpg)


    [Figure 2-39](#9781430249382_Ch02.xhtml#_Fig39). Add Hosts Wizard


    3.  Select the Add Host Targets radio button and then click the Add Host button,
    as shown in [Figure 2-40](#9781430249382_Ch02.xhtml#Fig40).


    ![9781430249382_Fig02-40.jpg](images/9781430249382_Fig02-40.jpg)


    [Figure 2-40](#9781430249382_Ch02.xhtml#_Fig40). Adding targets manually


    4.  To be able to monitor the repository database, deploy a management agent to
    the repositorydb.testdomain.com server. Click the Add button with the plus sign,
    enter the hostname, and then select the OS of the target server. For this example,
    we installed Enterprise Manager on Linux x64 and didn’t download any additional
    agent software, so for now, we can deploy agents only for Linux 64-bit servers
    (see [Figure 2-41](#9781430249382_Ch02.xhtml#Fig41)). Click Next.


    ![9781430249382_Fig02-41.jpg](images/9781430249382_Fig02-41.jpg)


    [Figure 2-41](#9781430249382_Ch02.xhtml#_Fig41). Adding host targets


    5.  Enter the directory where the agent software will be installed. Click the
    blue plus sign next to the Named Credential option to add a credential for the
    host. In the Create New Named Credential dialog box that displays, give the credential
    a meaningful name and then click OK to save it (see [Figure 2-42](#9781430249382_Ch02.xhtml#Fig42)).


    ![9781430249382_Fig02-42.jpg](images/9781430249382_Fig02-42.jpg)


    [Figure 2-42](#9781430249382_Ch02.xhtml#_Fig42). Creating a new named credential


    6.  Using named credentials provides an additional layer of security. An administrator
    can create named credentials for operators so they can use the login information
    without knowing the actual username and password associated with it. Click Next
    to review the configuration details, shown in  [Figure 2-43](#9781430249382_Ch02.xhtml#Fig43).


    ![image](images/sq.jpg) **Tip**  Oracle recommends configuring privilege delegation
    (i.e., giving sudo permission to the management agent user).


    ![9781430249382_Fig02-43.jpg](images/9781430249382_Fig02-43.jpg)


    [Figure 2-43](#9781430249382_Ch02.xhtml#_Fig43). Review of agent installation


    7.  Click the Deploy Agent button in the upper right of the console to start the
    deployment process.'
  trans: '

    ## 5.  选择“创建一个新的 Enterprise Manager 系统”，然后选择“高级”（参见图 2-28）。点击“下一步”。


    ![9781430249382_Fig02-28.jpg](img/9781430249382_Fig02-28.jpg)


    图 2-28. 安装类型


    ## 6.  对于“安装详情”步骤，如图 2-29 所示，输入中间件主目录位置为`/u01/app/Middleware`，代理基本目录为`/u01/app/agent`，以及您的主机名。然后点击“下一步”。


    ![9781430249382_Fig02-29.jpg](img/9781430249382_Fig02-29.jpg)


    图 2-29. 安装详情


    ## 7.  在“插件部署”步骤，如图 2-30 所示，选择您要配置的管理插件。您也可以在安装 Enterprise Manager 后添加或移除管理插件。点击“下一步”。


    ![9781430249382_Fig02-30.jpg](img/9781430249382_Fig02-30.jpg)


    图 2-30. 插件部署


    ## 8.  Oracle Management Service 是 Enterprise Manager 的主要应用程序，它需要一个 WebLogic 应用服务器来运行。在下一步中，如图
    2-31 所示，为 WebLogic 服务器选择一个用户名和密码，并为节点管理器设置一个密码。请妥善保管此信息。在排查与 WebLogic 相关的问题时可能需要它。点击“下一步”。


    ![9781430249382_Fig02-31.jpg](img/9781430249382_Fig02-31.jpg)


    图 2-31. Weblogic 服务器配置


    ## 9.  输入仓库数据库的连接信息并选择部署规模（参见图 2-32）。安装程序会根据部署规模检查数据库设置。点击“下一步”。


    ![9781430249382_Fig02-32.jpg](img/9781430249382_Fig02-32.jpg)


    图 2-32. 数据库连接详情


    ## 10.  安装程序将在仓库数据库中创建所需的数据库用户和表空间。对于“仓库配置详情”步骤，如图 2-33 所示，输入`SYSMAN`用户的密码，根据需要修改目录位置，并输入一个注册密码，该密码将用于保护代理通信的安全。点击“下一步”。


    ![image](img/sq.jpg) `注意` 如果您正在为一个使用 Oracle 自动存储管理（ASM）进行存储的数据库配置管理仓库，那么当您指定数据文件位置时，只有磁盘组用于创建表空间。例如，如果您指定`+DATA/mgmt.dbf`，则只有`+DATA`用于在
    ASM 上创建表空间，而数据文件在磁盘组上的确切位置由 Oracle 托管文件决定。


    ![9781430249382_Fig02-33.jpg](img/9781430249382_Fig02-33.jpg)


    图 2-33. 仓库配置详情


    ## 11.  检查将分配给 Oracle Enterprise Manager 的端口（参见图 2-34）。您可以修改它们，但请记住端口号必须大于 1024
    且小于 65535。


    ![9781430249382_Fig02-34.jpg](img/9781430249382_Fig02-34.jpg)


    图 2-34. 端口配置详情


    ## 12.  检查配置（参见图 2-35）。对配置满意后，点击“安装”开始安装。


    ![9781430249382_Fig02-35.jpg](img/9781430249382_Fig02-35.jpg)


    图 2-35. 安装检查


    ## 13.  安装结束时，您需要执行一些配置脚本。以 ROOT 身份登录到服务器（在另一个终端会话中）并运行脚本（参见图 2-36）。然后点击“确定”完成安装。


    ![9781430249382_Fig02-36.jpg](img/9781430249382_Fig02-36.jpg)


    图 2-36. 执行配置脚本


    ## 14.  检查信息，如图 2-37 所示，然后点击“关闭”以完成 Oracle Enterprise Manager Cloud Control 12c
    的安装。


    ![9781430249382_Fig02-37.jpg](img/9781430249382_Fig02-37.jpg)


    图 2-37. 安装完成


    ## 15.  现在您可以登录到 Enterprise Manager Cloud Control，如图 2-38 所示。


    ![9781430249382_Fig02-38.jpg](img/9781430249382_Fig02-38.jpg)


    图 2-38. Oracle Enterprise Manager 登录屏幕


    ## 部署管理代理


    Oracle Management Agent 是 Enterprise Manager Cloud Control 的核心组件之一。如果您想要监控在某个主机上运行的目标（例如数据库或应用服务器），您需要通过部署管理代理将该主机转换为受管主机。然后您就可以发现该主机上运行的目标并将其添加到
    Enterprise Manager 系统。


    有几种部署代理的方式：


    *   使用“添加主机目标”向导

    *   使用 RPM 文件

    *   使用`AgentPull`脚本

    *   使用`agentDeploy`脚本


    以下各节描述了这些选项。


    ### 使用“添加主机目标”向导


    使用“添加主机目标”向导是部署管理代理最简单的方式。它对于大规模部署管理代理尤其有用。Oracle 也推荐使用此向导。请按照以下步骤操作：


    1.  登录到 Enterprise Manager Cloud Control 控制台。

    2.  从“设置”菜单中，选择“添加目标” ![arrow](img/arrow.jpg) “手动添加目标”，如图 2-39 所示。


    ![9781430249382_Fig02-39.jpg](img/9781430249382_Fig02-39.jpg)


    图 2-39. 添加主机向导


    3.  选择“添加主机目标”单选按钮，然后点击“添加主机”按钮，如图 2-40 所示。


    ![9781430249382_Fig02-40.jpg](img/9781430249382_Fig02-40.jpg)


    图 2-40. 手动添加目标


    4.  为了能够监控仓库数据库，请在`repositorydb.testdomain.com`服务器上部署一个管理代理。点击带有加号的“添加”按钮，输入主机名，然后选择目标服务器的操作系统。在此示例中，我们在
    Linux x64 上安装了 Enterprise Manager，并且没有下载任何额外的代理软件，因此目前我们只能为 64 位 Linux 服务器部署代理（参见图
    2-41）。点击“下一步”。


    ![9781430249382_Fig02-41.jpg](img/9781430249382_Fig02-41.jpg)


    图 2-41. 添加主机目标


    5.  输入代理软件将被安装到的目录。点击“命名凭据”选项旁边的蓝色加号，为主机添加一个凭据。在显示的“创建新的命名凭据”对话框中，为凭据起一个有意义的名字，然后点击“确定”保存它（参见图
    2-42）。


    ![9781430249382_Fig02-42.jpg](img/9781430249382_Fig02-42.jpg)


    图 2-42. 创建新的命名凭据


    6.  使用命名凭据提供了一层额外的安全保护。管理员可以为操作员创建命名凭据，这样他们就可以使用登录信息，而无需知道与之关联的实际用户名和密码。点击“下一步”以检查配置详情，如图
    2-43 所示。


    ![image](img/sq.jpg) `提示` Oracle 建议配置权限委派（即，给管理代理用户赋予`sudo`权限）。


    ![9781430249382_Fig02-43.jpg](img/9781430249382_Fig02-43.jpg)


    图 2-43. 代理安装检查


    7.  点击控制台右上角的“部署代理”按钮开始部署过程。

