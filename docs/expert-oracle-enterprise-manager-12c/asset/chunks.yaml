- fmt: '## 导入LDAP层级结构


    如前所述，您也可以从LDAP层级结构导入您的成本中心。这可以从`Cost Center`表，通过`Action`菜单选择`LDAP Settings`来完成（参见[图5-23](#9781430249382_Ch05.xhtml#Fig23)）。有少数几个众所周知的LDAP是`EM12c`支持的：


    *   Oracle Internet Directory

    *   Microsoft Active Directory

    *   Sun iPlanet

    *   Novell eDirectory

    *   OpenLDAP


    当使用LDAP构建成本中心层级结构时，LDAP将覆盖同名的手动输入的成本中心，同时保留目标分配。成功导入LDAP后，它将生成一个计划任务，该任务将在每个报告周期运行，以同步成本中心与LDAP。也可以通过`Action`菜单执行按需同步。


    ![9781430249382_Fig05-23.jpg](images/9781430249382_Fig05-23.jpg)


    [图5-23](#9781430249382_Ch05.xhtml#_Fig23). 导入LDAP层级结构


    ## 为目标分配计费计划和成本中心


    设置好成本中心后，您需要为目标分配计费。要添加目标，您必须拥有`ADD_CHARGEBACK_TARGET`角色。此角色允许您添加任何由`EM12c`监控且符合计费支持条件的目标。如果未授予您此角色，`Add
    Targets`按钮将被禁用。


    ![image](images/sq.jpg) **Note**  除了`ADD_CHARGEBACK_TARGET`角色外，用户查看计费可能还需要另外两个角色。`VIEW_TARGET`角色允许您查看与特定目标相关的计费数据。`VIEW_ANY_TARGET`角色允许您查看与任何目标相关的计费数据。


    为了使目标能够分配到计费计划和成本中心，目标首先必须由`Enterprise Manager`监控。然后，在计费界面的`Targets`选项卡上，您将能够使用`Add
    Targets`按钮添加目标。单击`Add Targets`按钮会弹出添加目标的对话框，如[图5-24](#9781430249382_Ch05.xhtml#Fig24)所示。最初，此对话框将为空。可以通过单击`Target
    Selector`按钮来添加目标。


    ![9781430249382_Fig05-24.jpg](images/9781430249382_Fig05-24.jpg)


    [图5-24](#9781430249382_Ch05.xhtml#_Fig24). 添加目标对话框


    单击`Target Selector`按钮会弹出搜索您想要添加的目标的功能（参见[图5-25](#9781430249382_Ch05.xhtml#Fig25)）。默认情况下，列出所有目标类型。与`Enterprise
    Manager`中的许多搜索选项一样，您选择目标类型并搜索所需的目标。选择目标后，单击`Select`，然后单击`OK`将其添加到可以分配计费计划和成本中心的目标列表中。


    ![9781430249382_Fig05-25.jpg](images/9781430249382_Fig05-25.jpg)


    [图5-25](#9781430249382_Ch05.xhtml#_Fig25). 选择用于计费和成本中心的目标


    目标被添加到符合计费和成本中心分配的目标列表后，您可以通过单击列表上方的`Assign`按钮来添加之前设置好的计费计划和成本中心（参见[图5-26](#9781430249382_Ch05.xhtml#Fig26)）。许多通过按钮完成的添加和删除目标、分配计划和分配成本中心的命令也可以通过`Action`菜单完成。


    ![9781430249382_Fig05-26.jpg](images/9781430249382_Fig05-26.jpg)


    [图5-26](#9781430249382_Ch05.xhtml#_Fig26). 添加了计费计划和成本中心的目标


    如[图5-26](#9781430249382_Ch05.xhtml#Fig26)所示，我们添加了一个数据库并为其分配了计费计划和成本中心。但您会注意到，从未对此目标进行过数据收集。可以通过`Action`菜单选项`On-Demand
    Data Collection`手动对此目标执行数据收集。这将在`Enterprise Manager`中创建一个立即运行的作业。作业完成后，收集状态将变为`Succeeded`。


    ## 计费报告


    一段时间后，识别和提供报告显示资源使用情况将变得很方便。这可以在计费界面的最后一个选项卡，即`Reports`选项卡上完成。此选项卡允许您查看和发布计费报告，这些报告可用作跟踪资源使用情况和计费分布的强大分析工具（参见[图5-27](#9781430249382_Ch05.xhtml#Fig27)）。


    ![9781430249382_Fig05-27.jpg](images/9781430249382_Fig05-27.jpg)


    [图5-27](#9781430249382_Ch05.xhtml#_Fig27). 计费报告视图


    `Reports`选项卡显示了很多资源细节。在[图5-27](#9781430249382_Ch05.xhtml#Fig27)中，您可以看到按成本中心和目标类型的细分。更靠右的位置，您将看到按资源的细分。在屏幕底部的`Details`部分是一个表格，提供有关已配置资源的详细信息。报告表上的一切都可以在屏幕顶部进行搜索和报告。


    除了`Reports`选项卡上提供的报告外，报告还可以通过`Oracle Business Intelligence (BI) Publisher`推送。这使得`Enterprise
    Manager`能够以可通过电子邮件发送的格式提供更复杂的报告。安装了`BI Publisher`后，生成的报告可以通过单击`Publish Report`按钮发布为任意数量的格式（包括HTML、PDF、Word、Excel和PowerPoint）。[图5-28](#9781430249382_Ch05.xhtml#Fig28)显示了一个从计费界面的报告表中发布的示例报告。


    ![9781430249382_Fig05-28.jpg](images/9781430249382_Fig05-28.jpg)


    [图5-28](#9781430249382_Ch05.xhtml#_Fig28). 使用BI Publisher发布的报告


    计费模块现在是、并且可以成为IT部门的强大工具。凭借实施计费计划和成本中心，然后将其应用于目标并向最终用户提供报告的能力，计费模块是任何云环境的必需品。


    ## 优化云环境


    云基础设施及其上部署的应用程序需要针对性能、能源效率、用户体验和运营成本进行优化。`Oracle Enterprise Manager`丰富的云管理功能可帮助您重新发现资产、审查应用程序性能，并根据云持续运营期间收集的信息和智能，微调云生命周期的各个阶段。从设置阶段开始——您可以在此阶段扩大或缩小机器规模、更改配额或区域分配，或微调云资源策略——企业可以决定对程序集内的应用程序或云资源的部署进行更改，以优化云。`Enterprise
    Manager`还提供了一个丰富的性能管理数据库，该数据库提供云性能的历史视图，以帮助您对其进行优化。[第9章](#9781430249382_Ch09.xhtml)更详细地介绍了性能页面和优化。操作系统、数据库和中间件层的功能有助于持续优化云环境。


    在本章中，我们讨论了管理云环境的许多生命周期阶段。正如我们之前指出的，`Consolidation Planner`与计费插件一起安装。`Consolidation
    Planner`不仅可用于云环境，还可用于传统的IT环境，以帮助组织缩小其整体企业占用空间。现在让我们来看一下`Consolidation Planner`。


    ## Consolidation Planner'
  raw: 'As mentioned earlier, you could also import an LDAP hierarchy for your cost
    centers. This can be done from the Cost Center table, through the Action menu
    by selecting LDAP Settings (see [Figure 5-23](#9781430249382_Ch05.xhtml#Fig23)).
    There are a few, well-known LDAPs that are supported with EM12c:


    *   Oracle Internet Directory

    *   Microsoft Active Directory

    *   Sun iPlanet

    *   Novell eDirectory

    *   OpenLDAP


    When using an LDAP to build the cost center hierarchy, the LDAP will overwrite
    the manually entered cost centers of the same name while maintaining target assignments.
    When an LDAP is successfully imported, it will generate a scheduled job that will
    run each reporting cycle to sync the cost centers with the LDAP. On-demand sync
    can be performed with the Action menu as well.


    ![9781430249382_Fig05-23.jpg](images/9781430249382_Fig05-23.jpg)


    [Figure 5-23](#9781430249382_Ch05.xhtml#_Fig23). Importing the LDAP hierarchy


    After setting up the cost centers, you need to assign targets for chargeback.
    To add targets, you must have the ADD_CHARGEBACK_TARGET role. This role allows
    you to add any target monitored by EM12c that qualifies for chargeback support.
    If this role is not granted to you, the Add Targets button will be disabled.


    ![image](images/sq.jpg) **Note**  In addition to the ADD_CHARGEBACK_TARGET role,
    two other roles may be needed by a user looking into ­chargeback. The VIEW_TARGET
    role allows you to see chargeback data related to a specific target. The VIEW_ANY_TARGET
    role allows you to see chargeback data related to any target.


    For targets to be assigned to a chargeback plan and to a cost center, the target
    first has to be monitored by Enterprise Manager. Then on the Targets tab in the
    chargeback interface, you will be able to add targets by using the Add Targets
    button. Clicking the Add Targets button brings up the dialog box to add a target,
    as shown in [Figure 5-24](#9781430249382_Ch05.xhtml#Fig24). Initially, this dialog
    box will be empty. Targets can be added by clicking the Target Selector button.


    ![9781430249382_Fig05-24.jpg](images/9781430249382_Fig05-24.jpg)


    [Figure 5-24](#9781430249382_Ch05.xhtml#_Fig24). Add Targets dialog box


    Clicking the Target Selector button brings up the functionality to search for
    the target that you would like to add (see [Figure 5-25](#9781430249382_Ch05.xhtml#Fig25)).
    By default, all target types are listed. As with many of the search options within
    Enterprise Manager, you select the target type and search for the target you want.
    Once you select your target, click Select and then OK to add it to the targets
    that can be assigned charge plans and a cost center.


    ![9781430249382_Fig05-25.jpg](images/9781430249382_Fig05-25.jpg)


    [Figure 5-25](#9781430249382_Ch05.xhtml#_Fig25). Selection of targets for chargeback
    and cost centers


    After the target is added to the list of targets eligible for chargeback and cost
    center assignment, you can add the charge plan and cost center that was set up
    previously by clicking the Assign buttons above the list (see [Figure 5-26](#9781430249382_Ch05.xhtml#Fig26)).
    Many of the commands that are done via buttons for adding and removing targets,
    assigning plans, and assigning cost centers can also be done from the Action menu.


    ![9781430249382_Fig05-26.jpg](images/9781430249382_Fig05-26.jpg)


    [Figure 5-26](#9781430249382_Ch05.xhtml#_Fig26). Target added with charge plan
    and cost center


    As you can see in [Figure 5-26](#9781430249382_Ch05.xhtml#Fig26), we have added
    a database and assigned a charge plan and cost center to it. You will notice,
    though, that there has never been a collection done on this target. Collection
    on this target can be done manually via the Action menu option of On-Demand Data
    Collection. This will create a job within Enterprise Manager that runs immediately.
    When the job completes, the collection status will change to Succeeded.


    After some time, it will be handy to identify and provide reports that will show
    how resources are being used. This can be done on the last tab of the chargeback
    interface, the Reports tab. This tab allows you to view and publish chargeback
    reports that can be used as a powerful analytical tool for tracking resource usage
    and charge distributions (see [Figure 5-27](#9781430249382_Ch05.xhtml#Fig27)).


    ![9781430249382_Fig05-27.jpg](images/9781430249382_Fig05-27.jpg)


    [Figure 5-27](#9781430249382_Ch05.xhtml#_Fig27). Chargeback report view


    The Reports tab shows a lot of detail for resources. In [Figure 5-27](#9781430249382_Ch05.xhtml#Fig27),
    you see a breakout by cost center and target type. Further to the right, you will
    see a breakout by resource. At the bottom of the screen, in the Details section,
    is a table that provides detailed information about resources that have been configured.
    Everything on the reports table is searchable and reportable at the top of the
    screen.


    In addition to the report provided on the Reports tab, reports can be pushed with
    Oracle Business Intelligence (BI) Publisher. This allows Enterprise Manager to
    provide more-sophisticated reports in formats that can be e-mailed. With BI Publisher
    installed, the reports that are produced can be published to any number of formats
    (including HTML, PDF, Word, Excel, and PowerPoint) by clicking the Publish Report
    button. [Figure 5-28](#9781430249382_Ch05.xhtml#Fig28) shows a sample report that
    is published from the reports table in the Chargeback interface.


    ![9781430249382_Fig05-28.jpg](images/9781430249382_Fig05-28.jpg)


    [Figure 5-28](#9781430249382_Ch05.xhtml#_Fig28). Published report with BI Publisher


    The Chargeback module is and can be a powerful tool for an IT department. With
    the capacity to implement charge plans and cost centers, and then apply them to
    targets and provide reports to end users, the Chargeback module is a necessity
    for any cloud environment.


    Optimizing the Cloud


    The cloud infrastructure and the applications deployed on that infrastructure
    need to be optimized for performance, energy efficiency, user experience, and
    operational costs. Rich cloud management functionalities of Oracle Enterprise
    Manager help you rediscover assets, review application performance, and fine-tune
    various phases of the cloud lifecycle based on the information and intelligence
    collected during ongoing operations of the cloud. Starting from the setup phase—where
    you can scale up or down the machine sizes, change the quota or zone assignment,
    or fine-tune the policy for cloud resources—enterprises can decide to make changes
    to applications within an assembly or in the deployment of cloud resources in
    order to optimize the cloud. Enterprise Manager also provides a rich performance
    management database that provides a historical view of cloud performance to help
    you optimize it. [Chapter 9](#9781430249382_Ch09.xhtml) covers performance pages
    and optimization in more detail. Capabilities of the operating systems, database,
    and middleware layers help in continuous optimization of the cloud environment.


    Throughout this chapter, we have talked about the many lifecycle stages for managing
    a cloud environment. As we pointed out earlier, Consolidation Planner is installed
    along with the Chargeback plug-in. Consolidation Planner can be used for not only
    cloud environments, but also traditional IT environments to help organizations
    shrink their overall enterprise footprint. Let’s take a look at Consolidation
    Planner now.


    Consolidation Planner'
  trans: '## 导入 LDAP 层级结构


    如前所述，您也可以从 LDAP 层级结构导入您的成本中心。这可以从`成本中心`表，通过`操作`菜单选择`LDAP 设置`来完成（参见图 5-23）。有少数几个众所周知的
    LDAP 是`EM12c`支持的：


    *   Oracle Internet Directory

    *   Microsoft Active Directory

    *   Sun iPlanet

    *   Novell eDirectory

    *   OpenLDAP


    当使用 LDAP 构建成本中心层级结构时，LDAP 将覆盖同名的手动输入的成本中心，同时保留目标分配。成功导入 LDAP 后，它将生成一个计划任务，该任务将在每个报告周期运行，以同步成本中心与
    LDAP。也可以通过`操作`菜单执行按需同步。


    ![9781430249382_Fig05-23.jpg](img/9781430249382_Fig05-23.jpg)


    图 5-23. 导入 LDAP 层级结构


    ## 为目标分配计费计划和成本中心


    设置好成本中心后，您需要为目标分配计费。要添加目标，您必须拥有`ADD_CHARGEBACK_TARGET`角色。此角色允许您添加任何由`EM12c`监控且符合计费支持条件的目标。如果未授予您此角色，`添加目标`按钮将被禁用。


    ![image](img/sq.jpg) **注意**  除了`ADD_CHARGEBACK_TARGET`角色外，用户查看计费可能还需要另外两个角色。`VIEW_TARGET`角色允许您查看与特定目标相关的计费数据。`VIEW_ANY_TARGET`角色允许您查看与任何目标相关的计费数据。


    为了使目标能够分配到计费计划和成本中心，目标首先必须由`企业管理员工`监控。然后，在计费界面的`目标`选项卡上，您将能够使用`添加目标`按钮添加目标。单击`添加目标`按钮会弹出添加目标的对话框，如图
    5-24 所示。最初，此对话框将为空。可以通过单击`目标选择器`按钮来添加目标。


    ![9781430249382_Fig05-24.jpg](img/9781430249382_Fig05-24.jpg)


    图 5-24. 添加目标对话框


    单击`目标选择器`按钮会弹出搜索您想要添加的目标的功能（参见图 5-25）。默认情况下，列出所有目标类型。与`企业管理员工`中的许多搜索选项一样，您选择目标类型并搜索所需的目标。选择目标后，单击`选择`，然后单击`确定`将其添加到可以分配计费计划和成本中心的目标列表中。


    ![9781430249382_Fig05-25.jpg](img/9781430249382_Fig05-25.jpg)


    图 5-25. 选择用于计费和成本中心的目标


    目标被添加到符合计费和成本中心分配的目标列表后，您可以通过单击列表上方的`分配`按钮来添加之前设置好的计费计划和成本中心（参见图 5-26）。许多通过按钮完成的添加和删除目标、分配计划和分配成本中心的命令也可以通过`操作`菜单完成。


    ![9781430249382_Fig05-26.jpg](img/9781430249382_Fig05-26.jpg)


    图 5-26. 添加了计费计划和成本中心的目标


    如图 5-26 所示，我们添加了一个数据库并为其分配了计费计划和成本中心。但您会注意到，从未对此目标进行过数据收集。可以通过`操作`菜单选项`按需数据收集`手动对此目标执行数据收集。这将在`企业管理员工`中创建一个立即运行的作业。作业完成后，收集状态将变为`成功`。


    ## 计费报告


    一段时间后，识别和提供报告显示资源使用情况将变得很方便。这可以在计费界面的最后一个选项卡，即`报告`选项卡上完成。此选项卡允许您查看和发布计费报告，这些报告可用作跟踪资源使用情况和计费分布的强大分析工具（参见图
    5-27）。


    ![9781430249382_Fig05-27.jpg](img/9781430249382_Fig05-27.jpg)


    图 5-27. 计费报告视图


    `报告`选项卡显示了很多资源细节。在图 5-27 中，您可以看到按成本中心和目标类型的细分。更靠右的位置，您将看到按资源的细分。在屏幕底部的`详细信息`部分是一个表格，提供有关已配置资源的详细信息。报告表上的一切都可以在屏幕顶部进行搜索和报告。


    除了`报告`选项卡上提供的报告外，报告还可以通过`Oracle Business Intelligence (BI) Publisher`推送。这使得`企业管理员工`能够以可通过电子邮件发送的格式提供更复杂的报告。安装了`BI
    Publisher`后，生成的报告可以通过单击`发布报告`按钮发布为任意数量的格式（包括 HTML、PDF、Word、Excel 和 PowerPoint）。图
    5-28 显示了一个从计费界面的报告表中发布的示例报告。


    ![9781430249382_Fig05-28.jpg](img/9781430249382_Fig05-28.jpg)


    图 5-28. 使用 BI Publisher 发布的报告


    计费模块现在是、并且可以成为 IT 部门的强大工具。凭借实施计费计划和成本中心，然后将其应用于目标并向最终用户提供报告的能力，计费模块是任何云环境的必需品。


    ## 优化云环境


    云基础设施及其上部署的应用程序需要针对性能、能源效率、用户体验和运营成本进行优化。`Oracle Enterprise Manager`丰富的云管理功能可帮助您重新发现资产、审查应用程序性能，并根据云持续运营期间收集的信息和智能，微调云生命周期的各个阶段。从设置阶段开始——您可以在此阶段扩大或缩小机器规模、更改配额或区域分配，或微调云资源策略——企业可以决定对程序集内的应用程序或云资源的部署进行更改，以优化云。`企业管理员工`还提供了一个丰富的性能管理数据库，该数据库提供云性能的历史视图，以帮助您对其进行优化。第
    9 章更详细地介绍了性能页面和优化。操作系统、数据库和中间件层的功能有助于持续优化云环境。


    在本章中，我们讨论了管理云环境的许多生命周期阶段。正如我们之前指出的，`整合规划器`与计费插件一起安装。`整合规划器`不仅可用于云环境，还可用于传统的 IT
    环境，以帮助组织缩小其整体企业占用空间。现在让我们来看一下`整合规划器`。


    ## 整合规划器'
- fmt: '# Consolidation Planner 概述


    Chargeback 模块擅长帮助组织或服务提供商识别已用资源的潜在收入，而 Consolidation Planner 则为这些组织提供了一种降低与运行非云或云资源相关的内部成本的方法。每个企业数据中心都会随时间稳步增长，为了满足不断增加的业务需求，需要增加服务器。这种增长通常会导致机架空间以及用于系统冷却、维护（包括安全和补丁）的电力需求增加。


    为了应对这种增长趋势，许多企业正越来越多地调研和投资虚拟化技术，例如 Oracle Virtual Machine，通过将物理服务器迁移到虚拟服务器。此类迁移的目标是整合共享硬件，同时保留虚拟机提供的隔离优势。通过这种方式进行整合，企业可以在维持服务级别协议的同时，尽可能多地释放服务器。


    Consolidation Planner 使企业能够将托管服务器与它们可以整合到的通用物理机、Oracle Exadata 或 Oracle Virtual
    Machine 进行匹配。通过利用从 Enterprise Manager 中的受管目标收集的指标和配置数据，Consolidation Planner 帮助企业确定最佳的整合方案，这些方案也反映了与整合过程相关的业务和技术约束。


    ## 关键概念


    Consolidation Planner 中定义的每个整合项目都有一些对项目至关重要的关键概念。这些概念在 [表 5-2](#9781430249382_Ch05.xhtml#Tab2)
    中定义。


    [表 5-2](#9781430249382_Ch05.xhtml#_Tab2). Consolidation Planner 的关键概念


    ![Table5-2.jpg](images/Table5-2.jpg)


    ## 约束条件


    现在您已经了解了 Consolidation Planner 的关键概念，理解一些您应该注意的约束也很重要。这些约束主要围绕源服务器和目标服务器。


    源服务器的约束基于兼容性或排他性。如果某些属性和配置值匹配，则认为服务器是兼容的。这些属性包括：生命周期状态、部门和位置。例如，当源服务器必须保留在特定位置或地理区域内时，可能需要设置某个属性。此外，源服务器可以通过配置值来定义，这些值包括：网络域、系统供应商、系统配置、CPU
    供应商、CPU 名称和操作系统。最后，源服务器可以是相互排斥的。这意味着它们可能被排除在整合范围之外，因为它们不符合 Oracle 最佳实践。要排除匹配的服务器，请设置以下任一或两个条件：RAC
    数据库的节点、Oracle Cluster 的节点。


    目标服务器可以针对新的或现有的候选服务器确定范围。与目标服务器相关的约束主要表示为 CPU 和内存资源利用率的百分比——即目标服务器可以使用多少任一资源类型。


    现在我们已经定义了源和目标服务器，您可以开始更详细地了解如何定义整合项目并评估方案了。


    ## 安装与访问


    Consolidation Planner 作为包含 Chargeback 模块的插件的一部分安装。要访问 Consolidation Planner，请选择
    Enterprise ![arrow](images/arrow.jpg) Consolidation Planner。这将打开 Consolidation
    Planner 模块。如果这是 Consolidation Planner 的新实现，则不会定义任何项目。[图 5-29](#9781430249382_Ch05.xhtml#Fig29)
    展示了如何打开 Consolidation Planner。


    ![9781430249382_Fig05-29.jpg](images/9781430249382_Fig05-29.jpg)


    [图 5-29](#9781430249382_Ch05.xhtml#_Fig29). Consolidation Planner 的 Enterprise
    菜单选项


    ## Consolidation Planner 主页


    在 Consolidation Planner 主页上，您将找到已定义项目的列表以及菜单项，这些菜单项可以帮助定义新项目、创建方案、报告项目和删除项目。[图
    5-30](#9781430249382_Ch05.xhtml#Fig30) 显示了一个新实施的 Consolidation Planner，其中包含一个项目。我们将逐步演示如何为将物理服务器整合到
    Oracle Virtual Machine 创建一个新项目。


    ![9781430249382_Fig05-30.jpg](images/9781430249382_Fig05-30.jpg)


    [图 5-30](#9781430249382_Ch05.xhtml#_Fig30). 包含项目的新实施 Consolidation Planner


    ## 创建整合项目


    在 Consolidation Planner 页面上，要创建新项目，管理员需要单击 `Create Project` 按钮。这将打开 `Create Consolidation
    Project` 详细信息页面（参见 [图 5-31](#9781430249382_Ch05.xhtml#Fig31)）。在这里，管理员可以定义项目的各个方面，例如将要执行的整合类型、参与整合的服务器、数据收集的时长以及任何预配置的方案（如果它们已被定义）。


    ![9781430249382_Fig05-31.jpg](images/9781430249382_Fig05-31.jpg)


    [图 5-31](#9781430249382_Ch05.xhtml#_Fig31). `Create Consolidation Project` 屏幕


    此屏幕包含了定义整合项目所需的全部信息。首先要决定的是将要进行的整合类型。两个选项是 `Physical to Oracle Virtual Machine
    (P2V)` 和 `Physical to Physical (P2P)`。接下来，我们必须选择哪些服务器将参与整合。当添加整合目标时，首先必须添加源服务器。如果需要，我们还可以选择添加现有的虚拟服务器作为目标。添加源目标或
    OVM 目标后，您将看到许多特定于该源或目标服务器的估算（参见 [图 5-32](#9781430249382_Ch05.xhtml#Fig32)）。


    ![9781430249382_Fig05-32.jpg](images/9781430249382_Fig05-32.jpg)


    [图 5-32](#9781430249382_Ch05.xhtml#_Fig32). 为整合添加的源服务器


    > **注意**  指定服务器 I/O 容量是 Oracle 提供的估算值。如果您点击 `Specify Server I/O Capacity` 按钮，将弹出一个对话框，使您能够指定乘数因子或绝对值来更新所有选定服务器的容量。


    ![9781430249382_unFig05-02.jpg](images/9781430249382_unFig05-02.jpg)


    ### 数据收集


    为了让 Consolidation Planner 对节省或资源做出正确估算，它将基于收集的数据量。在 `Create Consolidation Project`
    屏幕的 `Data Collection` 部分，管理员可以指定应用于估算整合的最小和最大天数。与 Enterprise Manager 中的许多其他任务一样，数据收集由一个将被创建的作业处理。作为数据收集的一部分，可以指定是立即开始数据收集还是稍后开始。


    ### 预配置方案


    创建整合项目的最后一步是指定项目是否应使用任何预配置的方案。默认情况下，未选择任何方案。但是，可以从三个选项中选择一个预配置的方案；这些方案使用 CPU、内存和磁盘存储的指标来分析整合项目。[图
    5-33](#9781430249382_Ch05.xhtml#Fig33) 提供了这些方案的详细分解。


    ![9781430249382_Fig05-33.jpg](images/9781430249382_Fig05-33.jpg)


    [图 5-33](#9781430249382_Ch05.xhtml#_Fig33). 预配置方案


    ## 提交与查看项目


    选择预配置方案后，即可提交并创建项目。如果项目创建成功，Consolidation Planner 页面将反映项目已创建以及项目当前的状态。在屏幕底部，您还会注意到三个选项卡，提供有关项目的具体信息。这些选项卡是
    `General`、`Source Servers` 和 `Source Workload`。'
  raw: 'While the Chargeback module is good at helping organizations or service providers
    identify potential revenue from used resources, Consolidation Planner allows these
    same organizations a way to drive down internal costs associated with running
    noncloud or cloud resources. Every enterprise data center grows steadily over
    time, and addition of servers is needed to satisfy increasing business demands.
    This growth typically results in the increase of rack space and the power needed
    for cooling and maintenance of systems to include security and patching.


    To combat these growth trends, many enterprises are increasingly investigating
    and investing in virtualization technology, such as Oracle Virtual Machine, by
    moving physical servers to virtual ones. The goal of these types of moves is to
    consolidate shared hardware while retaining the benefits of isolation that virtual
    machines provide. Consolidation in this way enables the enterprise to free up
    as many servers as possible while maintaining service-level agreements.


    Consolidation Planner enables enterprises to match managed servers with generic
    physical machines, Oracle Exadata, or Oracle Virtual Machines they can be consolidated
    to. By leveraging metric and configuration data collected from managed targets
    within Enterprise Manager, Consolidation Planner helps the enterprise to determine
    the optimum consolidation scenarios that also reflect business and technical constraints
    associated with the consolidation process.


    Each consolidation project defined in Consolidation Planner has key concepts that
    are essential to the project. These concepts are defined in [Table 5-2](#9781430249382_Ch05.xhtml#Tab2).


    [Table 5-2](#9781430249382_Ch05.xhtml#_Tab2). Key Concepts for Consolidation Planner


    ![Table5-2.jpg](images/Table5-2.jpg)


    Now that you know the key concepts for Consolidation Planner, it is important
    to also understand a few constraints you should be aware of. These constraints
    center on the source server and the destination server.


    Source server constraints are based on compatibility or exclusivity. Servers are
    considered compatible if certain properties and configuration values match. These
    properties include the following: lifecycle status, department, and location.
    As an example, a property may need to be set when source servers must remain within
    a specific location or geographical area. Additionally, source servers can be
    defined by configuration values that include the following: network domain, system
    vendor, system configuration, CPU vendor, CPU name, and operating system. Finally,
    source servers can be mutually exclusive. This means that they can be excluded
    from the consolidation scope because they do not fit within Oracle best practices.
    To exclude matching servers, set either or both of the following conditions: Nodes
    of a RAC Database, Nodes of an Oracle Cluster.


    Destination servers can be scoped out against new or existing candidate servers.
    The constraints associated with destination servers are primarily expressed as
    a percentage of the CPU and memory resource utilization—that is, how much of either
    resource type can be used by the destination server.


    Now that we have defined source and destination servers, you’re ready to take
    a closer look at how to define a consolidation project and evaluate the scenarios.


    Consolidation Planner is installed as part of the plug-in that includes the Chargeback
    module. To access Consolidation Planner, choose Enterprise ![arrow](images/arrow.jpg)
    Consolidation Planner. This opens the Consolidation Planner module. If this is
    a new implementation of Consolidation Planner, no projects will be defined. [Figure
    5-29](#9781430249382_Ch05.xhtml#Fig29) illustrates how to open the Consolidation
    Planner.


    ![9781430249382_Fig05-29.jpg](images/9781430249382_Fig05-29.jpg)


    [Figure 5-29](#9781430249382_Ch05.xhtml#_Fig29). Enterprise menu options for Consolidation
    Planner


    On the Consolidation Planner home page, you will find a list of projects that
    are defined along with menu items that can help in defining new projects, create
    scenarios, report on projects, and delete projects. [Figure 5-30](#9781430249382_Ch05.xhtml#Fig30)
    shows a newly implemented Consolidation Planner with one project. We will walk
    through creating a new project for consolidating a physical server to an Oracle
    Virtual Machine.


    ![9781430249382_Fig05-30.jpg](images/9781430249382_Fig05-30.jpg)


    [Figure 5-30](#9781430249382_Ch05.xhtml#_Fig30). Newly implemented Consolidation
    Planner with project


    On the Consolidation Planner page, to create a new project, the administrator
    needs to click the Create Project button. This brings up the Create Consolidation
    Project details page (see [Figure 5-31](#9781430249382_Ch05.xhtml#Fig31)). Here
    the administrator can define all aspects of the project, such as the type of consolidation
    that is going to be performed, servers involved in the consolidation, length of
    data collection, and any preconfigured scenarios if they have been defined.


    ![9781430249382_Fig05-31.jpg](images/9781430249382_Fig05-31.jpg)


    [Figure 5-31](#9781430249382_Ch05.xhtml#_Fig31). Create Consolidation Project
    screen


    This screen is full of information needed to define a consolidation project. The
    first item that has to be decided is the type of consolidation that is going to
    be done. The two options are Physical to Oracle Virtual Machine (P2V) and Physical
    to Physical (P2P). Next, we have to choose what servers are going to be involved
    in the consolidation. When adding a target for consolidation, first we have to
    add a source server. We also have the option of adding existing virtual servers
    as destinations if needed. After the source target or OVM destination is added,
    you’ll see a lot of estimates that are specific to that source or destination
    server (see [Figure 5-32](#9781430249382_Ch05.xhtml#Fig32)).


    ![9781430249382_Fig05-32.jpg](images/9781430249382_Fig05-32.jpg)


    [Figure 5-32](#9781430249382_Ch05.xhtml#_Fig32). Source server added for consolidation


    ![image](images/sq.jpg) **Note**  Specifying server I/O capacities are estimates
    with Oracle. If you click the Specify Server I/O Capacity button, you’ll be presented
    with a dialog box that enables you to specify multiplier factors or absolute values
    to update the capacities for all selected servers.


    ![9781430249382_unFig05-02.jpg](images/9781430249382_unFig05-02.jpg)


    For Consolidation Planner to make correct estimations on savings or resources,
    it is going to be based on the amount of data collected. In the Data Collection
    section of the Create Consolidation Project screen, the administrator can specify
    the minimum and maximum number of days that should be used to estimate consolidation.
    Like many other tasks within Enterprise Manager, the collection of data is handled
    by a job that will be created. As part of the data collection, the option to start
    data collection immediately or later can be specified.


    The last step in creating a consolidation project is to specify whether the project
    should use any preconfigured scenarios. By default, no scenarios are selected.
    However, a preconfigured scenario can be selected from three options; these scenarios
    use the metric for CPU, Memory, and Disk Storage to analyze the consolidation
    project. [Figure 5-33](#9781430249382_Ch05.xhtml#Fig33) provides the breakdown
    of these scenarios.


    ![9781430249382_Fig05-33.jpg](images/9781430249382_Fig05-33.jpg)


    [Figure 5-33](#9781430249382_Ch05.xhtml#_Fig33). Preconfigured scenarios


    After selecting a preconfigured scenario, the project can be submitted and created.
    If the project is created successfully, the Consolidation Planner page will reflect
    the project being created and the current status of the project. At the bottom
    of the screen, you will also notice three tabs providing specific information
    on the project. These tabs are General, Source Servers, and Source Workload.'
