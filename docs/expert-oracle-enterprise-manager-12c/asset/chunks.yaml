- fmt: 'Self-service administrators define allowable VM sizes, assign quotas to users/roles,
    define access boundaries, map roles to zones, set up chargeback plans, and make
    software available for deployment by self-service users of the cloud.


    `EM12c` supports these typical roles and their common activities out of the box.
    As you saw in [Figure 5-6](#9781430249382_Ch05.xhtml#Fig6), these roles and policies
    for users can be customized if needed during the cloud setup process via the `Self
    Service` portal. The customized setup of cloud, user roles, and policies helps
    automate the provisioning of the resources depending on the cloud service models.
    The same automation technology, leveraged by the `Self Service` portal for provisioning
    the resources, is also available via command-line APIs called `EMCLI` (not discussed
    in this book).


    ## Building the Cloud


    After your cloud admins have set up the shared resources, self-service admins
    in the business units or other cloud user organizations will need to build the
    complete infrastructure, where they will ultimately deploy their business applications.


    Usually IT sets up hardware infrastructure. DBAs deploy the databases. Various
    application teams build, test, and deploy their applications. A cross-functional
    team wires them to make all of them work together. Dependency between application
    components and deployment constraints (for example, database and middleware) should
    be in different network segments, which can make this task even more difficult.


    `EM12c` and Oracle Virtual Assembly Builder (`OVAB`) address this challenge. [Figure
    5-7](#9781430249382_Ch05.xhtml#Fig7) shows the steps followed in packaging multi-tier
    applications into an assembly and making it available for deployment.


    ![9781430249382_Fig05-07.jpg](images/9781430249382_Fig05-07.jpg)


    [Figure 5-7](#9781430249382_Ch05.xhtml#_Fig7). Steps for packaging multi-tier
    applications for deployment


    Using `OVAB`, application developers and architects can model the application
    topology graphically, define all dependencies and deployment constraints, and
    package the entire application in the form of what we call an `application assembly`.
    These assemblies can then be uploaded to the centralized Software Library in Enterprise
    Manager for self-service deployments. An entire multi-tier application (including
    various application components, middleware software, databases, operating systems,
    and the virtual machines containing all of them) can be packaged together in an
    assembly. The assembly is then published into the Enterprise Manager Software
    Library, as shown in [Figure 5-8](#9781430249382_Ch05.xhtml#Fig8), and made available
    to the users of the cloud for deployment via the Enterprise Manager `Self Service`
    portal. This can reduce the time needed for application deployments, from months
    and days to hours and minutes. The resulting standardization in software stack
    minimizes compliance risks and operational downtime.


    ![9781430249382_Fig05-08.jpg](images/9781430249382_Fig05-08.jpg)


    [Figure 5-8](#9781430249382_Ch05.xhtml#_Fig8). Uploading the assembly to the Enterprise
    Manager Software Library


    Oracle plans to offer assemblies for all its products, which will allow you to
    deploy any Oracle product, including packaged applications, in a few clicks. Oracle
    Enterprise Manager can notify you of the availability of new assemblies so you
    can download them if you are interested.


    ## Testing in the Cloud


    Applications, as parts of assemblies or by themselves, need to be tested before
    they can be deployed into production. Applications need to be tested for functionalities
    as well as for performance during potential heavy loads. Oracle Enterprise Manager
    12c Application Testing Suite, which includes Oracle Functional Testing, Oracle
    Load Testing, and Oracle Test Manager, offers a comprehensive testing solution
    for your Oracle applications, middleware, and databases.


    Before you deploy the application in production, it is important to test it at
    full load to ensure that the application will be able to handle that load during
    its peak activity period. The Oracle Enterprise Manager load-testing tool allows
    you to simulate heavy loads with different combinations of concurrent users of
    different modules. The result from load testing is presented as a graphical report,
    similar to that shown [Figure 5-9](#9781430249382_Ch05.xhtml#Fig9).


    ![9781430249382_Fig05-09.jpg](images/9781430249382_Fig05-09.jpg)


    [Figure 5-9](#9781430249382_Ch05.xhtml#_Fig9). Oracle Enterprise Manager load-testing
    report


    A unique aspect of the testing solution is the ability to capture a production
    load and replay it in a test environment, allowing you to test your application
    with a real production workload. This technology has been available as the `Oracle
    Real Application Testing` feature for some time with the Oracle database. `EM12c`
    introduced a similar solution for automated application testing called `Application
    Replay`. Unlike traditional application testing tools, `Application Replay` uses
    real production workloads to generate a load against applications under testing
    and does not require any script development or maintenance. It provides a best-of-breed
    approach for validating application infrastructure changes for all your Web and
    packaged Oracle applications.


    Test data management is critical in a cloud environment but often gets overlooked.
    It is important that you protect critical and sensitive data when you allow users
    to provision applications and databases on demand via a self-service portal. The
    data-masking feature of Oracle Enterprise Manager testing suite can discover the
    data model interdependencies and “mask” any sensitive information to protect it.
    Data-masking templates with predefined sensitive columns and masking formats are
    also available for Oracle E-Business Suite and Fusion applications.


    The data subsetting feature of `EM12c` lets you create smaller databases with
    subsets of application data that are relationally consistent so you can perform
    realistic testing and development by using just a small percentage of production
    data.


    The Oracle Enterprise Manager testing suite also leverages the deep diagnostic
    capabilities built into the technology layers and provides prescriptions for remediation.
    All of these testing capabilities can really help you minimize the risk for downtime
    of applications deployed in the cloud.


    ## Deploying the Cloud


    After you build, test, and publish the applications in the Enterprise Manager
    Software Library, they are available for deployment via the `Self Service` portal
    of `EM12c`. As per NIST, on-demand self-service is one of the five key characteristics
    of the cloud. It provides a layer of abstraction that hides the underlying complexities
    of the cloud platform from the end user.


    The out-of-box `Self Service` portal in `EM12c`, shown in [Figure 5-10](#9781430249382_Ch05.xhtml#Fig10),
    allows cloud users to deploy a wide range of cloud services. Cloud users can deploy
    databases, Java applications, or complete application assemblies on the cloud
    platform listed in a service catalog that shows everything published in the Enterprise
    Manager Software Library. For deployment requests, users can specify the underlying
    resources (CPU, memory, database, `WebLogic` domain, and so forth) that they need
    for their applications, and Enterprise Manager will automatically provision them.
    Self-service users can also define policies based on schedule or performance metrics.


    ![9781430249382_Fig05-10.jpg](images/9781430249382_Fig05-10.jpg)


    [Figure 5-10](#9781430249382_Ch05.xhtml#_Fig10). Oracle Enterprise Manager’s `Self
    Service` portal


    In addition to the deployment via the `Self Service` portal, cloud users can also
    use Oracle Enterprise Manager command-line APIs for deploying applications or
    application assemblies.


    ## Monitoring the Cloud'
  raw: 'Self-service administrators define allowable VM sizes, assign quotas to users/roles,
    define access boundaries, map roles to zones, set up chargeback plans, and make
    software available for deployment by self-service users of the cloud.


    EM12c supports these typical roles and their common activities out of the box.
    As you saw in [Figure 5-6](#9781430249382_Ch05.xhtml#Fig6), these roles and policies
    for users can be customized if needed during the cloud setup process via the Self
    Service portal. The customized setup of cloud, user roles, and policies helps
    automate the provisioning of the resources depending on the cloud service models.
    The same automation technology, leveraged by the Self Service portal for provisioning
    the resources, is also available via command-line APIs called EMCLI (not discussed
    in this book).


    Building the Cloud


    After your cloud admins have set up the shared resources, self-service admins
    in the business units or other cloud user organizations will need to build the
    complete infrastructure, where they will ultimately deploy their business applications.


    Usually IT sets up hardware infrastructure. DBAs deploy the databases. Various
    application teams build, test, and deploy their applications. A cross-functional
    team wires them to make all of them work together. Dependency between application
    components and deployment constraints (for example, database and middleware) should
    be in different network segments, which can make this task even more difficult.


    EM12c and Oracle Virtual Assembly Builder (OVAB) address this challenge. [Figure
    5-7](#9781430249382_Ch05.xhtml#Fig7) shows the steps followed in packaging multi-tier
    applications into an assembly and making it available for deployment.


    ![9781430249382_Fig05-07.jpg](images/9781430249382_Fig05-07.jpg)


    [Figure 5-7](#9781430249382_Ch05.xhtml#_Fig7). Steps for packaging multi-tier
    applications for deployment


    Using OVAB, application developers and architects can model the application topology
    graphically, define all dependencies and deployment constraints, and package the
    entire application in the form of what we call an *application assembly*. These
    assemblies can then be uploaded to the centralized Software Library in Enterprise
    Manager for self-service deployments. An entire multi-tier application (including
    various application components, middleware software, databases, operating systems,
    and the virtual machines containing all of them) can be packaged together in an
    assembly. The assembly is then published into the Enterprise Manager Software
    Library, as shown in [Figure 5-8](#9781430249382_Ch05.xhtml#Fig8), and made available
    to the users of the cloud for deployment via the Enterprise Manager Self Service
    portal. This can reduce the time needed for application deployments, from months
    and days to hours and minutes. The resulting standardization in software stack
    minimizes compliance risks and operational downtime.


    ![9781430249382_Fig05-08.jpg](images/9781430249382_Fig05-08.jpg)


    [Figure 5-8](#9781430249382_Ch05.xhtml#_Fig8). Uploading the assembly to the Enterprise
    Manager Software Library


    Oracle plans to offer assemblies for all its products, which will allow you to
    deploy any Oracle product, including packaged applications, in a few clicks. Oracle
    Enterprise Manager can notify you of the availability of new assemblies so you
    can download them if you are interested.


    Testing in the Cloud


    Applications, as parts of assemblies or by themselves, need to be tested before
    they can be deployed into production. Applications need to be tested for functionalities
    as well as for performance during potential heavy loads. Oracle Enterprise Manager
    12c Application Testing Suite, which includes Oracle Functional Testing, Oracle
    Load Testing, and Oracle Test Manager, offers a comprehensive testing solution
    for your Oracle applications, middleware, and databases.


    Before you deploy the application in production, it is important to test it at
    full load to ensure that the application will be able to handle that load during
    its peak activity period. The Oracle Enterprise Manager load-testing tool allows
    you to simulate heavy loads with different combinations of concurrent users of
    different modules. The result from load testing is presented as a graphical report,
    similar to that shown [Figure 5-9](#9781430249382_Ch05.xhtml#Fig9).


    ![9781430249382_Fig05-09.jpg](images/9781430249382_Fig05-09.jpg)


    [Figure 5-9](#9781430249382_Ch05.xhtml#_Fig9). Oracle Enterprise Manager load
    -testing report


    A unique aspect of the testing solution is the ability to capture a production
    load and replay it in a test environment, allowing you to test your application
    with a real production workload. This technology has been available as the Oracle
    Real Application Testing feature for some time with the Oracle database. EM12c
    introduced a similar solution for automated application testing called Application
    Replay. Unlike traditional application testing tools, Application Replay uses
    real production workloads to generate a load against applications under testing
    and does not require any script development or maintenance. It provides a best-of-breed
    approach for validating application infrastructure changes for all your Web and
    packaged Oracle applications.


    Test data management is critical in a cloud environment but often gets overlooked.
    It is important that you protect critical and sensitive data when you allow users
    to provision applications and databases on demand via a self-service portal. The
    data-masking feature of Oracle Enterprise Manager testing suite can discover the
    data model interdependencies and “mask” any sensitive information to protect it.
    Data-masking templates with predefined sensitive columns and masking formats are
    also available for Oracle E-Business Suite and Fusion applications.


    The data subsetting feature of EM12c lets you create smaller databases with subsets
    of application data that are relationally consistent so you can perform realistic
    testing and development by using just a small percentage of production data.


    The Oracle Enterprise Manager testing suite also leverages the deep diagnostic
    capabilities built into the technology layers and provides prescriptions for remediation.
    All of these testing capabilities can really help you minimize the risk for downtime
    of applications deployed in the cloud.


    Deploying the Cloud


    After you build, test, and publish the applications in the Enterprise Manager
    Software Library, they are available for deployment via the Self Service portal
    of EM12c. As per NIST, on-demand self-service is one of the five key characteristics
    of the cloud. It provides a layer of abstraction that hides the underlying complexities
    of the cloud platform from the end user.


    The out-of-box Self Service portal in EM12c, shown in [Figure 5-10](#9781430249382_Ch05.xhtml#Fig10),
    allows cloud users to deploy a wide range of cloud services. Cloud users can deploy
    databases, Java applications, or complete application assemblies on the cloud
    platform listed in a service catalog that shows everything published in the Enterprise
    Manager Software Library. For deployment requests, users can specify the underlying
    resources (CPU, memory, database, WebLogic domain, and so forth) that they need
    for their applications, and Enterprise Manager will automatically provision them.
    Self-service users can also define policies based on schedule or performance metrics.


    ![9781430249382_Fig05-10.jpg](images/9781430249382_Fig05-10.jpg)


    [Figure 5-10](#9781430249382_Ch05.xhtml#_Fig10). Oracle Enterprise Manager’s  Self
    Service portal


    In addition to the deployment via the Self Service portal, cloud users can also
    use Oracle Enterprise Manager command-line APIs for deploying applications or
    application assemblies.


    Monitoring the Cloud'
  trans: '

    自助服务管理员定义允许的虚拟机（VM）大小，为用户/角色分配配额，定义访问边界，将角色映射到区域，设置分摊计费计划，并为云的自助服务用户准备可供部署的软件。


    `EM12c` 开箱即用地支持这些典型角色及其常见活动。正如你在图 5-6 中所见，在通过`自助服务`门户进行云设置的过程中，这些用户角色和策略可以根据需要进行定制。云、用户角色和策略的定制设置有助于根据云服务模型自动化资源调配。`自助服务`门户用于调配资源的相同自动化技术，也可通过名为`EMCLI`的命令行
    API（本书不作讨论）使用。


    ## 构建云


    在你的云管理员设置好共享资源后，业务单元或其他云用户组织中的自助服务管理员将需要构建完整的基础设施，他们最终将在此部署其业务应用程序。


    通常，IT 部门设置硬件基础设施。数据库管理员（DBA）部署数据库。各种应用团队构建、测试和部署他们的应用程序。一个跨职能团队将它们连接起来，使所有部分协同工作。应用组件之间的依赖关系和部署约束（例如，数据库和中间件应位于不同的网段）可能使这项任务变得更加困难。


    `EM12c` 和 Oracle Virtual Assembly Builder (`OVAB`) 解决了这一挑战。图 5-7 展示了将多层应用程序打包成一个程序集并使其可供部署的步骤。


    ![9781430249382_Fig05-07.jpg](img/9781430249382_Fig05-07.jpg)


    图 5-7. 为部署而打包多层应用程序的步骤


    使用`OVAB`，应用开发人员和架构师可以图形化地建模应用程序拓扑，定义所有依赖关系和部署约束，并将整个应用程序打包成我们称为`应用程序程序集`的形式。然后，这些程序集可以上传到企业管理器中集中的软件库，以供自助部署使用。一个完整的多层应用程序（包括各种应用组件、中间件软件、数据库、操作系统以及包含它们的虚拟机）可以打包在一个程序集中。然后，该程序集被发布到企业管理器软件库，如图
    5-8 所示，并通过企业管理器的`自助服务`门户提供给云用户进行部署。这可以将应用程序部署所需的时间从数月、数天缩短到数小时、数分钟。由此产生的软件栈标准化最大限度地降低了合规风险和运营停机时间。


    ![9781430249382_Fig05-08.jpg](img/9781430249382_Fig05-08.jpg)


    图 5-8. 将程序集上传到企业管理器软件库


    Oracle 计划为其所有产品提供程序集，这将允许你只需点击几下即可部署任何 Oracle 产品，包括打包的应用程序。Oracle Enterprise Manager
    可以在有新的程序集可用时通知你，如果你感兴趣，可以下载它们。


    ## 在云中测试


    应用程序，无论是作为程序集的一部分还是独立存在，在部署到生产环境之前都需要进行测试。应用程序需要针对功能以及潜在高负载下的性能进行测试。Oracle Enterprise
    Manager 12c Application Testing Suite 包含 Oracle Functional Testing、Oracle Load
    Testing 和 Oracle Test Manager，为你的 Oracle 应用程序、中间件和数据库提供全面的测试解决方案。


    在将应用程序部署到生产环境之前，在全负载下进行测试至关重要，以确保应用程序在其活动高峰期能够处理该负载。Oracle Enterprise Manager
    的负载测试工具允许你使用不同模块并发用户的不同组合来模拟高负载。负载测试的结果以图形化报告的形式呈现，类似于图 5-9 所示。


    ![9781430249382_Fig05-09.jpg](img/9781430249382_Fig05-09.jpg)


    图 5-9. Oracle Enterprise Manager 负载测试报告


    该测试解决方案的一个独特之处在于能够捕获生产负载并在测试环境中重放，从而允许你使用真实的生产工作负载来测试你的应用程序。这项技术作为`Oracle Real
    Application Testing`功能已随 Oracle 数据库提供了一段时间。`EM12c` 引入了一个用于自动化应用程序测试的类似解决方案，称为`Application
    Replay`。与传统的应用程序测试工具不同，`Application Replay` 使用真实的生产工作负载对被测应用程序生成负载，无需任何脚本开发或维护。它为你所有的
    Web 和打包的 Oracle 应用程序验证应用程序基础设施变更提供了一种最佳实践方法。


    测试数据管理在云环境中至关重要，但常常被忽视。当你允许用户通过自助门户按需供应应用程序和数据库时，保护关键和敏感数据非常重要。Oracle Enterprise
    Manager 测试套件的数据屏蔽功能可以发现数据模型的相互依赖关系，并“屏蔽”任何敏感信息以保护它。还为 Oracle E-Business Suite
    和 Fusion 应用程序提供了包含预定义敏感列和屏蔽格式的数据屏蔽模板。


    `EM12c` 的数据子集化功能让你能够创建包含应用程序数据子集的较小数据库，这些子集在关系上保持一致，因此你只需使用生产数据的一小部分即可进行真实的测试和开发。


    Oracle Enterprise Manager 测试套件还利用了构建在技术层中的深度诊断能力，并提供了修复建议。所有这些测试功能确实可以帮助你最小化部署在云中的应用程序的停机风险。


    ## 部署云


    在构建、测试并将应用程序发布到企业管理器软件库之后，它们就可以通过`EM12c`的`自助服务`门户进行部署了。根据 NIST（美国国家标准与技术研究院），按需自助服务是云的五个关键特性之一。它提供了一个抽象层，向最终用户隐藏了云平台底层的复杂性。


    `EM12c`中开箱即用的`自助服务`门户（如图 5-10 所示）允许云用户部署广泛的云服务。云用户可以在云平台上部署数据库、Java 应用程序或完整的应用程序程序集，这些服务列在服务目录中，目录显示了企业管理器软件库中发布的所有内容。对于部署请求，用户可以指定其应用程序所需的底层资源（CPU、内存、数据库、`WebLogic`域等），企业管理器将自动供应这些资源。自助服务用户还可以根据计划或性能指标定义策略。


    ![9781430249382_Fig05-10.jpg](img/9781430249382_Fig05-10.jpg)


    图 5-10. Oracle Enterprise Manager 的`自助服务`门户


    除了通过`自助服务`门户部署外，云用户还可以使用 Oracle Enterprise Manager 命令行 API 来部署应用程序或应用程序程序集。


    ## 监控云

    '
- fmt: '# 云监控


    云基础设施构建完成并部署应用程序后，需要在持续运行期间监控应用程序及底层云基础设施。`Oracle Enterprise Manager` 帮助企业监控完整的云堆栈，从应用程序到存储磁盘，如图
    5-11 所示。


    ![9781430249382_Fig05-11.jpg](images/9781430249382_Fig05-11.jpg)


    图 5-11. `Oracle Enterprise Manager` 对完整云堆栈的监控


    应用程序和底层基础设施需要从不同层级、由我们之前讨论过的不同云角色进行监控。表 5-1 总结了 `Oracle Enterprise Manager` 不同用户执行的监控任务。


    表 5-1. 用户角色及其监控任务


    | 角色 | 监控任务 |

    | --- | --- |

    | 云管理员 | 监控云请求<br>监控整体云服务的运行状况<br>监控补丁<br>跟踪合规性 |

    | 自服务管理员 | 监控应用程序 SLA<br>监控业务交易和指标<br>监控终端用户体验 |

    | 自服务用户 | 监控自己的请求<br>监控自己的应用程序、虚拟机、数据库<br>监控配额、计费等 |


    云管理员（云基础设施的管理员）使用 `Oracle Enterprise Manager` 来跟踪资源变动、租户、策略违规和其他事件，从而监控整个“从应用程序到磁盘”云堆栈的运行状况。`Oracle
    Enterprise Manager Incident Manager`（如图 5-12 所示）为云管理员提供了一个单一界面，可用于查看、管理、解决和跟踪其监控环境中发生的所有类型的问题。第
    12 章将更详细地介绍 `Incident Manager`。


    ![9781430249382_Fig05-12.jpg](images/9781430249382_Fig05-12.jpg)


    图 5-12. `Oracle Enterprise Manager Incident Manager`


    此外，云管理员持续监控请求和故障率，并识别潜在的性能瓶颈以进行修复。云管理员可以通过使用管理组来自动监控云目标，这些组定义了动态标准来对云目标进行分组，并自动分配监控设置和策略。这些组可以根据位置、部门、测试或生产等属性创建。


    自服务管理员（他们管理业务线应用程序所有者使用的公共资源）负责监控应用程序堆栈、基础设施上的服务级别和依赖关系、终端用户体验以及许多其他领域。


    自服务用户或应用程序所有者则监控其托管在云环境中的自身应用程序的运行状况和配额方面。他们可以对已配置的资源（包括虚拟机、主机和数据库）执行基本监控，也可以监控终端用户的应用程序体验。


    第 7 章提供了监控和管理阶段的更多细节和最佳实践。


    ## 云管理


    你刚刚了解了云监控，这是一个了解应用程序和底层云基础设施状态的过程。监控通常会产生不相关的数据集。*云管理* 是一套功能和流程，它利用这些数据为云基础设施和部署在云中的应用程序提供预期的目标。它涉及管理和分配云资源以产生有用的成果。


    `EM12c` 提供了全面的云堆栈管理和业务驱动的应用程序管理功能。`Enterprise Manager` 的方法是摆脱拼凑和零散的解决方案，将管理嵌入到核心解决方案中，并为管理整个堆栈提供一个完整的、统一的、集成的解决方案。通过
    `EM12c`，你拥有对整个基础设施堆栈（包括性能管理、配置管理以及诸如配置和打补丁等自动化生命周期操作）的单一控制点。


    `Enterprise Manager` 的另一个重要方面是，在管理 `Oracle` 软件时，它提供了无与伦比的深度。`Oracle` 为其驱动云的产品设计和内置了可管理性。新的
    `Enterprise Manager` 功能与 `Oracle` 产品一起开发和测试，以确保它们降低复杂性、增强自动化、优化性能并提高云环境的可用性。


    `Oracle Enterprise Manager` 使你能够构建和管理一个为 `Oracle` 应用程序优化的云，这些应用程序驱动着你的许多业务流程和服务。许多自定义应用程序是使用
    `Oracle` 中间件解决方案构建的；由 `Oracle Enterprise Manager` 驱动的云不仅可以运行你的关键任务应用程序，还可以让你深入了解这些应用程序提供的业务服务。我们将这种方法称为*业务驱动的应用程序管理*，它具有三个关键能力：


    *   *用户体验管理* 帮助你监控业务用户的体验。`Oracle Enterprise Manager Real User Experience Insight`
    监控网络流量，提供关于你的用户是谁、他们在哪里、他们在做什么以及他们是否获得了所需服务级别的完整而准确的视图。此解决方案适用于自定义和打包的应用程序。针对
    `Oracle` 应用程序的开箱即用型预构建知识模块，使你能够快速监控业务流程和活动。图 5-13 显示了 `Oracle Enterprise Manager
    Real User Experience Insight` 的仪表板。


    ![9781430249382_Fig05-13.jpg](images/9781430249382_Fig05-13.jpg)


    图 5-13. `Oracle Enterprise Manager Real User Experience Insight`


    *   *业务交易管理* 让你能透视在应用程序中跨多个组件执行的交易。如果你的应用程序作为组合在云中部署，`Enterprise Manager Business
    Transaction Manager` 可以让你透视跨该组合各个组件的交易。它甚至可以监控使用外部服务的跨组合或应用程序组件的交易。图 5-14 显示了
    `Business Transaction Manager`。


    ![9781430249382_Fig05-14.jpg](images/9781430249382_Fig05-14.jpg)


    图 5-14. `Oracle Enterprise Manager Business Transaction Manager`


    *   *业务服务管理* 帮助监控、诊断和管理你的交易正在执行的跨服务生命周期。这些服务可能开发于许多技术组件之上，而 `Oracle Enterprise
    Manager` 支持所有这些组件。`EM12c` 引入了创建复合应用程序（如图 5-15 所示）的能力，它代表了你的应用程序环境的所有系统组件。这增强了端到端业务服务管理的能力。


    ![9781430249382_Fig05-15.jpg](images/9781430249382_Fig05-15.jpg)


    图 5-15. `Oracle Enterprise Manager Business Service Manager`


    ## 计量与计费


    云的关键特性之一是能够衡量云资源的使用情况，并报告或可能对已使用的服务进行计费。虽然云和自助访问带来了很大的灵活性和敏捷性，但它们也带来了一些挑战。'
  raw: 'After the cloud infrastructure is built and applications are deployed in it,
    you need to monitor the applications and underlying cloud infrastructure during
    ongoing operation. Oracle Enterprise Manager helps enterprises monitor complete
    cloud stacks, from applications to the storage disk, as shown in [Figure 5-11](#9781430249382_Ch05.xhtml#Fig11).


    ![9781430249382_Fig05-11.jpg](images/9781430249382_Fig05-11.jpg)


    [Figure 5-11](#9781430249382_Ch05.xhtml#_Fig11). Complete cloud stack monitoring
    by Oracle Enterprise Manager


    Applications and the underlying infrastructure need to be monitored at different
    levels and by different cloud roles that we discussed earlier. [Table 5-1](#9781430249382_Ch05.xhtml#Tab1)
    summarizes monitoring tasks performed by various users of Oracle Enterprise Manager.


    [Table 5-1](#9781430249382_Ch05.xhtml#_Tab1). User Roles and Their Monitoring
    Tasks


    | Roles | Monitoring Tasks |

    | --- | --- |

    | Cloud admin | Monitor cloud requests Monitor the health of the overall cloud
    service

    Monitor patch Track compliance |

    | Self-service admin | Monitor application SLAs Monitor business transactions
    and metrics Monitor end-user experience |

    | Self-service user | Monitor own requests Monitor own apps, VMs, databases

    Monitor quota, chargeback, etc. |


    The cloud admin (the administrator of the cloud infrastructure) monitors the health
    of the overall cloud application-to-disk stack by using Oracle Enterprise Manager
    to track resource flux, tenants, policy violations, and other incidents. The Oracle
    Enterprise Manager Incident Manager, shown in [Figure 5-12](#9781430249382_Ch05.xhtml#Fig12),
    provides cloud administrators with a single interface that can be used to view,
    manage, resolve, and track all types of issues that have occurred within their
    monitored environments. Incident Manager is covered in more detail in [Chapter
    12](#9781430249382_Ch12.xhtml).


    ![9781430249382_Fig05-12.jpg](images/9781430249382_Fig05-12.jpg)


    [Figure 5-12](#9781430249382_Ch05.xhtml#_Fig12). Oracle Enterprise Manager Incident
    Manager


    In addition, the cloud administrator performs ongoing monitoring of requests and
    failure rates and identifies potential performance bottlenecks to remediate. Cloud
    administrators can automatically monitor cloud targets by using an administration
    group that defines dynamic criteria to group together cloud targets and auto-assign
    monitoring settings and policies. These groups can be created based on properties
    such as location, department, test, or production.


    Self-service admins, who administer the common resources used by application owners
    at the line of businesses, monitor the application stack, the service levels and
    dependencies on the infrastructure, the end-user experience, and many other areas.


    Self-service users or application owners monitor the health and quota aspects
    for their own applications hosted in the cloud environment. They can perform basic
    monitoring of provisioned resources including virtual machines, hosts, and databases.
    They can also monitor the end-user application experience.


    [Chapter 7](#9781430249382_Ch07.xhtml) provides more details and best practices
    for the monitoring and management phases.


    Managing the Cloud


    You just learned about cloud monitoring, which is a process of being aware of
    the state of the applications and underlying cloud infrastructure. Monitoring
    typically results in uncorrelated sets of data. *Cloud management* is a set of
    functionalities and processes that use this data to deliver a desired objective
    for the cloud infrastructure and the applications deployed in the cloud. It involves
    managing and allocating cloud resources to produce useful outcomes.


    EM12c provides comprehensive cloud stack management and business-driven application
    management functionalities. The Enterprise Manager approach is to move away from
    bolt-on and piecemeal management; embed management into the core solution; and
    deliver a complete, unified, and integrated solution for managing the entire stack.
    With EM12c, you have a single point of control for the entire infrastructure stack,
    including performance management, configuration management, and automated lifecycle
    operations such as provisioning and patching.


    The other important aspect of Enterprise Manager is that it provides unparalleled
    depth when it comes to managing Oracle software. Oracle designs and instruments
    its products that power the cloud, for manageability. New Enterprise Manager features
    are developed along with the Oracle products and tested to ensure that they reduce
    complexity, enhance automation, optimize performance, and increase availability
    of the cloud environment.


    Oracle Enterprise Manager enables you to build and manage a cloud that is optimized
    for the Oracle applications that power many of your business processes and services.
    Many custom applications are built using an Oracle middleware solution; a cloud
    powered by Oracle Enterprise Manager can not only run your mission-critical applications,
    but also provide you deep insight into the business services delivered by those
    applications. We call this approach *business-driven application management*,
    and it has three key capabilities:


    *   *User experience management* helps you monitor the experience of business
    users. Oracle Enterprise Manager Real User Experience Insight monitors network
    traffic to provide a complete and accurate view of who your users are, where they
    are located, what they are doing, and whether they are getting the desired service
    levels. This solution works with both custom and packaged applications. Out-of-the-box
    prebuilt knowledge modules for Oracle applications allow you to monitor business
    processes and activities quickly. [Figure 5-13](#9781430249382_Ch05.xhtml#Fig13)
    shows the dashboard of Oracle Enterprise Manager Real User Experience Insight.


    ![9781430249382_Fig05-13.jpg](images/9781430249382_Fig05-13.jpg)


    [Figure 5-13](#9781430249382_Ch05.xhtml#_Fig13). Oracle Enterprise Manager Real
    User Experience Insight


    *   *Business transaction management* gives you visibility into transactions that
    are executing across multiple components in the application. If your application
    is deployed in the cloud as an assembly, Enterprise Manager Business Transaction
    Manager can give you visibility into transactions across individual components
    of the assembly. It can even monitor transactions across assemblies or application
    components using external services. [Figure 5-14](#9781430249382_Ch05.xhtml#Fig14)
    shows Business Transaction Manager.


    ![9781430249382_Fig05-14.jpg](images/9781430249382_Fig05-14.jpg)


    [Figure 5-14](#9781430249382_Ch05.xhtml#_Fig14). Oracle Enterprise Manager Business
    Transaction Manager


    *   *Business service management* helps monitor, diagnose, and manage the lifecycle
    of services that your transaction is executing across. These services may be developed
    on many technology components, and Oracle Enterprise Manager supports them all.
    EM12c introduced the ability to create a composite application, shown in [Figure
    5-15](#9781430249382_Ch05.xhtml#Fig15), that represents all the system components
    of your application environment. This enhanced the capability of end-to-end business
    service management.


    ![9781430249382_Fig05-15.jpg](images/9781430249382_Fig05-15.jpg)


    [Figure 5-15](#9781430249382_Ch05.xhtml#_Fig15). Oracle Enterprise Manager Business
    Service Manager


    Metering and Chargeback


    One of the key characteristics of a cloud is the ability to measure the usage
    of cloud resources and report or potentially bill for the utilized services. While
    cloud and self-service access bring a lot of flexibility and agility, they also
    brings some challenges.'
