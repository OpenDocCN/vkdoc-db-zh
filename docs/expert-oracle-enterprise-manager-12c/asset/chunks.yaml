    图 9-1。 任何 EM12c 页面或功能的管理包和许可信息都可以从控制台的 `设置` 菜单轻松获取。


    ![image](img/sq.jpg) **提示** 管理员可以通过点击 `设置` ![arrow](img/arrow.jpg) `管理包` ![arrow](img/arrow.jpg)
    `此页面的管理包`，来访问控制台页面中用于任何 EM12c 功能的管理包。


    解决了许可问题后，您就可以专注于性能数据以及 EM12c 控制台提供的众多选项了。用于性能数据的最常用界面是目标级别的界面，通常涉及单个实例或集群数据库。


    ## 主机性能


    主机目标的性能信息可以通过在 EM 控制台页面中选择 `目标` ![arrow](img/arrow.jpg) `主机`，然后选择所需的主机来访问。您可以检查基本的性能指标，例如
    CPU 使用率、内存使用率、文件系统使用率和网络利用率，如 图 9-2 所示。


    ![9781430249382_Fig09-02.jpg](img/9781430249382_Fig09-02.jpg)


    图 9-2。 主机性能信息——请注意右下角图表中下午 1:44 之后网络利用率的峰值。


    在左侧窗格中，您可以查看关于主机状态、事件、配置和作业活动的完整摘要信息。


    CPU 使用率和内存的任何波动都会显示出来，同时还有文件系统使用率和网络利用率。对于这四个领域（CPU、内存、文件系统和网络）中的每一个，您也可以以表格格式查看数据，如
    图 9-3 所示。要访问此格式，请点击任何图表右下角的 `表格视图` 链接。可以检查表格表示形式，以查找在图形界面中可能显示不明显的异常值，或者可以将数据复制并粘贴到
    CSV 或 Microsoft Excel 文件中。


    ![9781430249382_Fig09-03.jpg](img/9781430249382_Fig09-03.jpg)


    图 9-3。 主机性能页面中性能指标图表的表格显示。


    这些窗格中的每一个都可以调整为您选择的任何顺序显示。只需右键单击每个窗口右上角的 `查看操作` 菜单，即可根据您的偏好组织性能摘要视图。


    ## 性能主页


    数据库性能主页提供了一个关于可运行进程（按 CPU 划分）的紧凑视图，包括为单个数据库目标包含的任何基线。性能主页可以通过多种方式访问，具体取决于管理员/用户选择的主页，但登录
    EM12c 后始终可以通过点击 `目标` ![arrow](img/arrow.jpg) `数据库` 并选择一个数据库来访问。`性能` 选项卡位于数据库主页的
    EM 控制台数据库控件中从左数第二个（参见 图 9-4），并包括用于查看、诊断和检查数据库性能的选项。


    ![9781430249382_Fig09-04.jpg](img/9781430249382_Fig09-04.jpg)


    图 9-4。 Oracle 11g 环境中数据库服务器的 CPU 使用率，当前设置为 15 秒刷新间隔，但演示了如何更改为扩展的更新间隔。


    与 `顶级活动` 性能页面不同，性能主页是数据库性能的摘要，并非特定于数据库性能，而是数据库环境的总体性能，包括主机和系统信息。


    ![image](img/sq.jpg) **提示** 此部分的历史数据将仅基于 CPU 数据。如果您想要有关数据库使用情况的更具体数据，必须转到 `顶级活动`。对于聚合度较低的数据，请参阅本章后面讨论的
    `ASH 分析`。


    性能主页网格数据可以以 15 秒间隔、1 分钟间隔查看和刷新，或手动刷新，您也可以选择历史视图。基线以及负载平均值可以包含或排除在图表中。可以从本节运行 `JVM
    诊断`、`ADDM` 或 `ASH` 报告的选项。


    主区域分为高级别的数据库等待信息。此视图不仅显示 CPU 使用率，还显示数据库外的 CPU 使用率和系统负载平均值。


    通过点击 图 9-4 右上角所示的 `设置` 按钮，您可以将图表默认设置从基于 CPU 更改为显示 I/O 图表信息或基线值（参见 图 9-5）。


    ![9781430249382_Fig09-05.jpg](img/9781430249382_Fig09-05.jpg)


    图 9-5。 更改默认性能主页图表设置。


    在 图 9-6 中，管理员已从高级摘要性能信息切换到详细性能信息（不要与 `ASH` 混淆）。此视图可以仅显示前台会话，也可以包含后台会话。有时，能够仅显示前台或后台等待信息非常有价值。


    ![9781430249382_Fig09-06.jpg](img/9781430249382_Fig09-06.jpg)


    图 9-6。 EM12c 中性能主页的 `平均活动会话` 窗格，展示了涉及 CPU 和一些 I/O 等待的平均负载。


    ![image](img/sq.jpg) **提示** 在诊断性能问题时，仅检查前台会话，然后检查前台和后台会话，可以帮助区分问题，例如 ETL 批量加载设计不佳或游标未正确关闭的问题。


    从 `平均活动会话` 窗格，您可以快速评估数据库的性能统计数据。通过点击主页底部的链接之一，您可以访问 `顶级活动` 页面以执行更详细的调查。


    链接可包括以下内容：


    *   `顶级段`

    *   `集群缓存一致性` (在 RAC 中)

    *   `互连` (在 RAC 中)

    *   `并行执行`

    *   `数据库锁`

    *   `SQL 监控`

    *   `顶级消费者`

    *   `顶级活动`

    *   `重复 SQL`

    *   `实例活动` (在 RAC 中)


    ### 吞吐量


    `吞吐量` 选项卡显示每秒或每事务的吞吐量。它具有到 `顶级消费者`、`重复 SQL`、`实例锁`、`实例活动` 和 `SQL 响应时间` 的额外监控链接。这些选项卡会重新链接回
    `顶级活动`、锁定页面以及 `顶级活动` 区域之外的信息页面。


    ### I/O


    `I/O` 选项卡具有以毫秒为单位的 I/O 延迟以及按 I/O 功能、类型或消费者组划分的以 MB/秒为单位的 I/O 图表（参见 图 9-7）。有一个按钮可以通过图形界面快速执行
    I/O 校准 (`DBMS_RESOURCE_MANAGER.CALIBRATE_IO`)，如果数据库要使用 `Auto DOP`（并行度），则需要此校准。


    ![9781430249382_Fig09-07.jpg](img/9781430249382_Fig09-07.jpg)


    图 9-7。 从性能主页进行数据泵操作期间以 MB 为单位的 I/O。


    ### 并行执行


    `并行执行` 选项卡（如 图 9-8 所示）显示有关活动串行/并行会话的相关信息。此外，第二个图表显示每个并行执行的协调器和从属会话，第三个图表显示数据库环境中并行化的
    DDL、DML 和查询。


    ![9781430249382_Fig09-08.jpg](img/9781430249382_Fig09-08.jpg)


    图 9-8。 从性能主页显示的并行执行示例，详细展示了多个级别的并行使用情况。


    ### 服务

