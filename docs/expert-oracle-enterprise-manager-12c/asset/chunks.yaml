    ## 总结


    EM12c 是在您的环境中进行打补丁和配置的宝贵工具。为了灵活性并提供多种选项，Oracle 企业管理器依赖软件库作为补丁、安装软件和黄金镜像等软件的中央存储位置。打补丁和配置是企业管理器生命周期中两个有价值的选项。这些选项使管理员能够快速为旧环境打补丁，并非常快速、安全地配置新环境。


    # 第 7 章


    # 管理和监控最佳实践


    作者：Leighton Nelson


    Oracle Enterprise Manager Cloud Control 12c 从底层开始构建，用于管理和监控整个 IT 堆栈中的企业基础设施和应用程序。为了有效管理您的环境，应遵循各种技术和最佳实践。监控您的环境可确保没有组件被忽视。通过使用事件、指标和事件，您可以随时为自己提供环境的全面概况。


    本章介绍了一些使用 EM12c 监控和管理环境的最佳实践。讨论了以下最佳实践领域：


    *   指标阈值

    *   监控模板

    *   管理组

    *   模板收集

    *   同步计划

    *   事件管理


    ## 指标阈值


    `指标阈值`是监控方面的主要功能。它们使您能够积极主动，以便及时发现问题并加以解决。企业管理器云控制包含多种类型的指标，可用于监控目标。根据目标类型，可以使用几类指标。应配置指标阈值，以便触发警报并通过通知发送给管理员。


    指标阈值关联两个严重级别：`警告`和`严重`。例如，您可以为数据库中的表空间设置一个指标阈值，当表空间使用率超过 80% 时发送警告警报。然后，您可以设置另一个阈值，当表空间使用率超过
    95% 时发送严重警报。警告阈值将在问题变得严重之前留出足够的时间来处理问题。严重警报则表示即将出现的问题，需要立即采取行动。


    在定义阈值时，首先确定应设置阈值的重要组件。这可能包括数据库实例、监听器和文件系统。然后，可以为每个目标类型从 EM12c 中选择指标。


    要查看数据库实例的所有指标阈值及其值，请按照以下步骤操作：


    1.  从 Oracle 数据库下拉菜单中，选择`监控` → `所有指标`，如图 7-1 所示。


    ![9781430249382_Fig07-01.jpg](img/9781430249382_Fig07-01.jpg)


    图 7-1. 查看指标阈值列表


    2.  将显示类似于图 7-2 的指标和阈值显示。仅为您关心的指标设置阈值。选择过多的指标可能会产生大量“白噪音”，导致严重警报被忽略。您还应禁用不需要用于报告或监控目的的指标，以减少存储消耗。


    ![9781430249382_Fig07-02.jpg](img/9781430249382_Fig07-02.jpg)


    图 7-2. 数据库指标及其当前阈值设置

    '
- fmt: '# 阈值设置与监控模板


    阈值应通过在性能或负载测试期间收集数据来获取。在性能可接受时，查看可用的指标历史记录以获取这些值。同时定义目标可用性的度量标准，例如数据库实例状态。为关键阈值选择的值应保守，以便仅在极其严重的情况下发出警报，例如表空间使用率超过97%时。


    要为指标设置值，请按照以下步骤操作：


    1.  点击一个指标类别，例如 `Tablespaces Full`。这些类别在[图 7-2](#9781430249382_Ch07.xhtml#Fig2)的左侧列出。

    2.  点击一个具体的指标，例如 `Tablespace Space Used (%)`。

    3.  点击 `Modify Thresholds` 按钮。您应该会看到一个类似于[图 7-3](#9781430249382_Ch07.xhtml#Fig3)的对话框。


    ![9781430249382_Fig07-03.jpg](images/9781430249382_Fig07-03.jpg)

    [图 7-3](#9781430249382_Ch07.xhtml#_Fig3). 为指标输入阈值


    4.  输入指标的值。


    EM12c包含开箱即用的阈值，可以作为您自己监控的基础。根据需要自定义这些阈值，以确保它们满足您业务的服务级别协议。如果阈值不符合要求，或为了响应服务级别变更，可以随时间对其进行微调。


    虽然本节中介绍的逐一设置方法为单一目标设置阈值提供了一种快捷方式，但随着企业中目标数量的增加，这种方法会变得越来越困难和耗时。因此，我推荐的设置指标阈值的方法是使用监控模板。


    ## 监控模板


    *监控模板*是针对特定目标类型的指标阈值集合。指标阈值应在监控模板上设置，然后应用于一个或多个目标。例如，可以为生产数据库实例创建一个监控模板，其中可能包含以下指标及警告/严重阈值：


    *   `Tablespace Space Used (%)` > 80/97

    *   `Archive Area Space Used (%)` > 75/90

    *   `Dump Area Used (%)` > 90/95

    *   `Status` = `DOWN`


    然后可以将该监控模板应用于所有生产数据库实例，从而简化标准化监控设置的任务。可以为每种目标类型创建单独的监控模板。例如，您可以创建监听器模板、主机模板等。


    监控模板中设置的指标阈值不应过于细粒度，而应足够宽泛以满足大多数目标的一般服务级别。如果需要更细的粒度，可以创建额外的模板并将其应用于有需要的目标。请以创建最少数量的模板来覆盖尽可能多的目标为思路。不要随意创建超过需要的模板，因为管理它们只会增加额外工作。只创建您需要的，但不要超出需要。


    要创建监控模板，请按照以下步骤操作：


    1.  运行 `Enterprise Manager Cloud Control` 控制台。

    2.  选择 `Enterprise` ![arrow](images/arrow.jpg) `Monitoring` ![arrow](images/arrow.jpg)
    `Monitoring Templates`，如[图 7-4](#9781430249382_Ch07.xhtml#Fig4)所示。


    ![9781430249382_Fig07-04.jpg](images/9781430249382_Fig07-04.jpg)

    [图 7-4](#9781430249382_Ch07.xhtml#_Fig4). 准备创建新的监控模板


    3.  `Monitoring Templates` 页面打开。点击 `Create` 按钮以创建模板。

    4.  选择一个代表性的目标，用于您要创建的监控设置，如[图 7-5](#9781430249382_Ch07.xhtml#Fig5)所示。此目标将用作监控模板中指标和策略的基础。例如，要创建数据库实例监控模板，请从现有数据库实例目标中选择一个以复制其现有监控设置。或者，您可以选择一个目标类型并手动输入设置。


    ![9781430249382_Fig07-05.jpg](images/9781430249382_Fig07-05.jpg)

    [图 7-5](#9781430249382_Ch07.xhtml#_Fig5). 创建监控模板


    5.  为模板输入一个有意义的名称，并可选择性地添加描述，如[图 7-6](#9781430249382_Ch07.xhtml#Fig6)所示。（写一个简短的描述以备日后回忆是个好主意。）


    ![9781430249382_Fig07-06.jpg](images/9781430249382_Fig07-06.jpg)

    [图 7-6](#9781430249382_Ch07.xhtml#_Fig6). 为模板命名


    6.  点击 `Metric Thresholds` 选项卡以打开如[图 7-7](#9781430249382_Ch07.xhtml#Fig7)所示的数据输入区域。


    ![9781430249382_Fig07-07.jpg](images/9781430249382_Fig07-07.jpg)

    [图 7-7](#9781430249382_Ch07.xhtml#_Fig7). 指定阈值


    7.  输入或修改要设置的指标的值。仅选择您关心的指标。请记住，指标的值应根据您的运营目标设置。如果不想收集某些指标，也可以将它们完全移除。如果未为指标设置阈值，则不会针对该指标发送警报。


    除了为指标指定阈值外，如果收集计划与您的运营目标不符，您还可以修改指标的收集计划。例如，`Archive Area Used (%)` 指标的收集计划默认设置为每15分钟收集一次。如果您的数据库实例事务率很高，生成大量归档重做日志，您可能希望将该指标的收集计划修改为每10分钟收集一次。点击
    `Collection Schedule` 列中的链接以修改计划。[图 7-8](#9781430249382_Ch07.xhtml#Fig8)显示了一个归档区域阈值的特写。您可以点击
    `Every 15 Minutes` 链接来修改计划。


    ![9781430249382_Fig07-08.jpg](images/9781430249382_Fig07-08.jpg)

    [图 7-8](#9781430249382_Ch07.xhtml#_Fig8). 点击 `Every 15 Minutes` 链接以修改检查归档区域阈值的计划


    为您希望监控的每种目标类型创建额外的监控模板。在RAC环境中，您可以为监听器、集群数据库、ASM实例和主机创建模板。


    虽然监控模板是标准化阈值设置的首选方法，但您确实需要承担将模板应用于不同目标类型的额外开销。此外，如果您更改监控模板中的指标，则必须将模板重新应用到其目标。反之，如果针对特定目标更改了指标阈值，这些更改不会同步到监控模板。


    EM12c提供了模板集合来帮助减轻将监控模板应用于不同目标类型的手动工作量。您可以创建模板集合来对不同类型的目标的阈值进行分组。


    ## 管理组


    *管理组*允许您通过根据监控模板集合将指标、合规性标准和云策略应用于目标，从而轻松实现目标的自动化管理和监控。成员会根据一组定义的全局属性自动动态添加到管理组中。任何符合标准的目标都会被添加到组中，并且可以将模板集合与这些目标相关联。作为最佳实践，在Enterprise
    Manager中使用管理组来管理目标。'
  raw: 'Threshold values should be obtained by gathering data during performance or
    load testing. View the available metric history to obtain these values while the
    performance is acceptable. Also define metrics for target availability such as
    database instance status. The values selected for critical thresholds should be
    chosen conservatively so that you are alerted under only extremely serious conditions,
    such as when a tablespace is over 97 percent full.


    To set values for a metric, follow these steps:


    1.  Click a metric category such as Tablespaces Full. These categories are listed
    to the left in [Figure 7-2](#9781430249382_Ch07.xhtml#Fig2).

    2.  Click a specific metric such as Tablespace Space Used (%).

    3.  Click the Modify Thresholds button. You should see a dialog box like the one
    in  [Figure 7-3](#9781430249382_Ch07.xhtml#Fig3).


    ![9781430249382_Fig07-03.jpg](images/9781430249382_Fig07-03.jpg)


    [Figure 7-3](#9781430249382_Ch07.xhtml#_Fig3). Entering threshold values for a
    metric


    4.  Enter the values for the metric.


    EM12c includes out-of-the-box thresholds that can be used as the basis for your
    own monitoring. Customize these as necessary to ensure that they meet service-level
    agreements for your business. Thresholds can then be fine-tuned over time if they
    are not meeting requirements, or in response to service-level changes.


    While the one-by-one method in this section provides a quick way to set thresholds
    for a single target, the method becomes increasingly difficult and time-consuming
    as the number of targets across the enterprise increases. Thus, my recommended
    method of setting metric thresholds is to employ monitoring templates.


    Monitoring Templates


    *Monitoring templates* are collections of metric thresholds for a specific target
    type. Metric thresholds should be set on monitoring templates, which are then
    applied to one or more targets. For example, a monitoring template can be created
    for production database instances that may include the following metrics and warning/critical
    thresholds:


    *   Tablespace Space Used (%) > 80/97

    *   Archive Area Space Used (%) > 75/90

    *   Dump Area Used (%) > 90/95

    *   Status = DOWN


    The monitoring template can then be applied to all production database instances,
    easing the task of standardizing your monitoring settings. Separate monitoring
    templates can be created for each target type. For example, you can create a listener
    template, a host template, and so forth.


    The metric thresholds set in your monitoring templates should not be fine-grained,
    but rather broad enough to meet general service levels for the majority of targets.
    If finer granularity is required, additional templates can be created and applied
    to those targets that require them. Think in terms of creating the minimum number
    of templates to cover the maximum possible targets. Don’t gratuitously create
    more templates than you need, because it’s just more work then to manage them.
    Create what you need, but no more than you need.


    To create a monitoring template, follow these steps:


    1.  Run the Enterprise Manager Cloud Control console.

    2.  Choose Enterprise ![arrow](images/arrow.jpg) Monitoring ![arrow](images/arrow.jpg)
    Monitoring Templates, as shown in [Figure 7-4](#9781430249382_Ch07.xhtml#Fig4).


    ![9781430249382_Fig07-04.jpg](images/9781430249382_Fig07-04.jpg)


    [Figure 7-4](#9781430249382_Ch07.xhtml#_Fig4). Preparing to create a new monitoring
    template


    3.  The Monitoring Templates page opens. Click the Create button to create a template.

    4.  Choose a representative target for the monitoring settings that you want to
    create, as shown in [Figure 7-5](#9781430249382_Ch07.xhtml#Fig5). This target
    will be used as the basis for metrics and policies in the monitoring template.
    For example, to create a Database Instance monitoring template, select an existing
    database instance target from which to copy existing monitoring settings. Alternatively,
    you may select a target type and enter the settings manually.


    ![9781430249382_Fig07-05.jpg](images/9781430249382_Fig07-05.jpg)


    [Figure 7-5](#9781430249382_Ch07.xhtml#_Fig5). Creating a monitoring template


    5.  Enter a meaningful name for the template, and optionally a description, as
    shown in [Figure 7-6](#9781430249382_Ch07.xhtml#Fig6). (Writing a short description
    to jog your memory later is a good idea.)


    ![9781430249382_Fig07-06.jpg](images/9781430249382_Fig07-06.jpg)


    [Figure 7-6](#9781430249382_Ch07.xhtml#_Fig6). Naming your template


    6.  Click the Metric Thresholds tab to open the data entry area shown in [Figure
    7-7](#9781430249382_Ch07.xhtml#Fig7).


    ![9781430249382_Fig07-07.jpg](images/9781430249382_Fig07-07.jpg)


    [Figure 7-7](#9781430249382_Ch07.xhtml#_Fig7). Specifying threshold values


    7.  Enter or modify the values for the metrics that you want to set. Select only
    the metrics that you care about. Remember, values for the metrics should be set
    according to your operational goals. You can also remove selected metrics altogether
    if you don’t want them to be collected. If a threshold value is not set for a
    metric, no alerts will be sent for the metric.


    In addition to specifying thresholds for your metrics, you can modify the collection
    schedules for the metrics if those schedules are not in line with your operating
    goals. For example, the Archive Area Used (%) metric collection schedule by default
    is set to collect every 15 minutes. If your database instance has a high transaction
    rate that generates a lot of archive redo logs, you may want to modify the collection
    schedule for the metric to collect at 10-minute intervals instead. Click the link
    in the Collection Schedule column to modify the schedule. [Figure 7-8](#9781430249382_Ch07.xhtml#Fig8)
    shows a close-up of an Archive Area threshold. The Every 15 Minutes link is what
    you would click to modify the schedule.


    ![9781430249382_Fig07-08.jpg](images/9781430249382_Fig07-08.jpg)


    [Figure 7-8](#9781430249382_Ch07.xhtml#_Fig8). Click the Every 15 Minutes link
    to modify the schedule for checking Archive Area thresholds


    Create additional monitoring templates for each target type that you wish to monitor.
    In a RAC environment, you might create templates for listener, cluster database,
    ASM instance, and host.


    While monitoring templates are the preferred method for standardized threshold
    settings, you do have the additional overhead involved in applying a template
    to different target types. In addition, if you change a metric in a monitoring
    template, the template will have to be reapplied to its targets. Conversely, if
    metric threshold values are changed for a specific target, the changes are not
    synchronized to the monitoring template.


    EM12c provides template collections to help alleviate the manual effort of applying
    monitoring templates to different target types. You can create template collections
    to group thresholds for targets of different types.


    Administration Groups


    *Administration groups* allow you to easily automate the management and monitoring
    of targets by applying metrics, compliance standards, and cloud policies to targets
    based on monitoring template collections. Members are dynamically added to an
    administration group automatically, based on a set of defined global properties.
    Any target that matches the criteria is added to the group, and template collections
    can be associated with those targets. As a best practice, use administration groups
    for managing targets in Enterprise Manager.'
  trans: '

    # 阈值设置与监控模板


    阈值应通过在性能或负载测试期间收集数据来确定。当性能处于可接受范围时，可参考可用的指标历史记录来获取这些值。同时，需定义目标可用性的度量标准，例如数据库实例状态。为关键阈值选择的数值应保守，以便仅在极其严重的情况下发出警报，例如表空间使用率超过
    97%时。


    要为指标设置数值，请遵循以下步骤：


    1.  点击一个指标类别，例如 `Tablespaces Full`。这些类别在图 7-2 的左侧列出。

    2.  点击一个具体的指标，例如 `Tablespace Space Used (%)`。

    3.  点击 `Modify Thresholds` 按钮。您应该会看到一个类似于图 7-3 的对话框。


    ![9781430249382_Fig07-03.jpg](img/9781430249382_Fig07-03.jpg)

    图 7-3. 为指标输入阈值


    4.  输入指标的数值。


    EM12c 包含开箱即用的默认阈值，可作为您自行监控的基础。您可以根据需要自定义这些阈值，以确保其满足您业务的服务级别协议。如果阈值不合适，或者为了响应服务级别的变更，您可以随时间对其进行微调。


    虽然本节介绍的逐一设置方法为单个目标设置阈值提供了一种便捷方式，但随着企业中目标数量的增加，这种方法会变得越来越困难和耗时。因此，我推荐的设置指标阈值的方法是使用监控模板。


    ## 监控模板


    *监控模板*是针对特定目标类型的指标阈值集合。指标阈值应在监控模板上设置，然后应用于一个或多个目标。例如，您可以为生产数据库实例创建一个监控模板，其中可能包含以下指标及其警告/严重阈值：


    *   `Tablespace Space Used (%)` > 80/97

    *   `Archive Area Space Used (%)` > 75/90

    *   `Dump Area Used (%)` > 90/95

    *   `Status` = `DOWN`


    然后，您可以将该监控模板应用于所有生产数据库实例，从而简化标准化监控设置的任务。您可以为每种目标类型创建单独的监控模板。例如，您可以创建监听器模板、主机模板等。


    在监控模板中设置的指标阈值不应过于细粒度，而应足够宽泛，以满足大多数目标的一般服务级别要求。如果需要更细的粒度，可以创建额外的模板并将其应用于有需要的目标。请以创建最少数量的模板来覆盖尽可能多的目标为思路。不要随意创建超出需要的模板，因为管理它们只会增加额外的工作量。只创建您需要的，但不要超出需要。


    要创建监控模板，请遵循以下步骤：


    1.  运行 `Enterprise Manager Cloud Control` 控制台。

    2.  选择 `Enterprise` ![arrow](img/arrow.jpg) `Monitoring` ![arrow](img/arrow.jpg)
    `Monitoring Templates`，如图 7-4 所示。


    ![9781430249382_Fig07-04.jpg](img/9781430249382_Fig07-04.jpg)

    图 7-4. 准备创建新的监控模板


    3.  `Monitoring Templates` 页面将打开。点击 `Create` 按钮以创建模板。

    4.  选择一个具有代表性的目标，该目标应与您要创建的监控设置相对应，如图 7-5 所示。此目标将用作监控模板中指标和策略的基础。例如，要创建数据库实例监控模板，请从现有的数据库实例目标中选择一个以复制其现有监控设置。或者，您可以选择一个目标类型并手动输入设置。


    ![9781430249382_Fig07-05.jpg](img/9781430249382_Fig07-05.jpg)

    图 7-5. 创建监控模板


    5.  为模板输入一个有意义的名称，并可以有选择地添加描述，如图 7-6 所示。（写一个简短的描述以备日后回忆是个好主意。）


    ![9781430249382_Fig07-06.jpg](img/9781430249382_Fig07-06.jpg)

    图 7-6. 为模板命名


    6.  点击 `Metric Thresholds` 选项卡以打开如图 7-7 所示的数据输入区域。


    ![9781430249382_Fig07-07.jpg](img/9781430249382_Fig07-07.jpg)

    图 7-7. 指定阈值


    7.  输入或修改您要设置的指标的数值。仅选择您关心的指标。请记住，指标的数值应根据您的运营目标来设置。如果您不想收集某些指标，也可以将它们完全移除。如果未为指标设置阈值，则不会针对该指标发送警报。


    除了为指标指定阈值外，如果收集计划与您的运营目标不符，您还可以修改指标的收集计划。例如，`Archive Area Used (%)` 指标的收集计划默认设置为每
    15 分钟收集一次。如果您的数据库实例事务率很高，生成大量归档重做日志，您可能希望将该指标的收集计划修改为每 10 分钟收集一次。点击 `Collection
    Schedule` 列中的链接以修改计划。图 7-8 显示了一个归档区域阈值的特写视图。您可以点击 `Every 15 Minutes` 链接来修改计划。


    ![9781430249382_Fig07-08.jpg](img/9781430249382_Fig07-08.jpg)

    图 7-8. 点击 `Every 15 Minutes` 链接以修改检查归档区域阈值的计划


    为您希望监控的每种目标类型创建额外的监控模板。在 RAC 环境中，您可以为监听器、集群数据库、ASM 实例和主机创建模板。


    虽然监控模板是标准化阈值设置的首选方法，但您确实需要承担将模板应用于不同目标类型的额外开销。此外，如果您更改了监控模板中的指标，则必须将模板重新应用到其关联的目标。反之，如果针对特定目标更改了指标阈值，这些更改不会同步回监控模板。


    EM12c 提供了模板集合来帮助减轻将监控模板应用于不同目标类型的手动工作量。您可以创建模板集合来对不同类型目标的阈值进行分组。


    ## 管理组


    *管理组*允许您通过根据监控模板集合将指标、合规性标准和云策略应用于目标，从而轻松实现目标的自动化管理和监控。成员会根据一组定义的全局属性被自动动态添加到管理组中。任何符合标准的目标都会被添加到组中，并且可以将模板集合与这些目标相关联。作为最佳实践，应在
    Enterprise Manager 中使用管理组来管理目标。

    '
- fmt: '![image](images/sq.jpg) **提示** 管理组是 EM12c 中一个出色的新功能。然而，每个目标只能分配一个通知组，因此该功能存在一些限制。在某些情况下，你可能希望一个目标有多个通知，为此你需要使用原始的
    Enterprise Manager 组功能。例如，某个目标的监控要求可能是在工作时间将事件分配给生产 DBA 组，并在工作时间之外向值班 DBA 组生成电子邮件。这种复杂的场景只能通过原始的
    Enterprise Manager 组功能来满足。


    ## 规划管理组层级


    在创建管理组之前，你应该规划你的管理组层级结构。这个层级结构包含根据全局目标属性在一个或多个级别上逻辑划分的不同目标。你还可以指定定义管理组的多种目标类型。


    规划层级结构时，确保其符合你组织的操作和监控标准非常重要。你应该了解目标的监控方式，以便将管理方式相似的目标分组在一起。例如，你可能希望根据 `LifeCycle
    Status` 属性为生产目标创建一个组，为非生产目标创建另一个组。此外，你可能还希望基于以下目标属性在层级结构中创建其他级别，作为生产组和非生产组的子组：


    *   部门

    *   业务线

    *   位置

    *   CSI 编号

    *   成本中心

    *   联系人


    是否在层级结构中创建更多级别的决定，应取决于目标组的监控特征。例如，你是否需要为 HR 和销售组维护独立的指标，还是可以用相似的指标来监控它们？[图 7-9](#9781430249382_Ch07.xhtml#_Fig9)
    中所示的图是一个基于 `LifeCycle Status`、`Location` 和 `Line of Business` 目标属性的管理组层级结构示例。


    ![9781430249382_Fig07-09.jpg](images/9781430249382_Fig07-09.jpg)


    [图 7-9](#9781430249382_Ch07.xhtml#_Fig9) 基于生命周期、位置和业务线属性的三层管理组层级结构


    只能存在一个管理组层级结构。这一限制防止了因多个层级结构可能产生的冲突。此外，一个目标在层级结构中只能属于一个组。


    目标不能直接添加到组中。相反，组成员资格由目标的属性（例如 `LifeCycle Status`）决定。这些属性可以在目标发现和提升时设置，也可以在目标已被发现后设置。可以使用
    Enterprise Manager 控制台或带有 `set_target_property_value` 动词的 `emcli` 命令行界面来设置目标属性。有关
    `emcli` 命令的更多信息，请参阅 *Oracle Enterprise Manager Command Line Interface* 文档的[第 2
    章](#9781430249382_Ch02.xhtml)。


    ![image](images/sq.jpg) **提示** 可以将规划层级结构想象成两个步骤：1）定义你的层级结构。2）为你的目标分配属性。“魔法”随后发生，因为你的目标会自动被分配到层级结构中的适当级别。


    目标加入管理组后，你可以关联模板集合，以便每个组的成员具有相似的指标、策略和标准。模板集合是由多种目标类型组成的模板指标集合。本章稍后将进行讨论。


    应为每个管理组创建单独的模板集合。在创建管理组之前，你应首先创建监控模板。每个监控模板都针对单一目标类型。因此，你需要创建一个由多个监控模板组成的模板集合：每个目标类型一个。例如，一个包含主机、监听器、数据库和
    ASM 实例的“生产目标”管理组将需要一个包含四个不同监控模板的模板集合。


    如果管理组层级结构包含多于两个级别，则应用模板集合的顺序很重要。叶级别上的模板集合会覆盖来自父级别的指标。每个组将有自己的模板集合，而来自父级别的模板集合则会传播到各自的子组。


    应用模板集合后，你应该将这些集合与组关联。这确保每个组包含一套标准的指标、策略和标准。完成此操作后，目标会被同步，以便将来对监控模板的任何更改都会自动应用到关联的目标。


    ## 实现管理组层级


    一旦定义了管理组，就可以使用 Enterprise Manager 控制台来实现它们。选择 `Setup` > `Add Target` > `Administration
    Groups`，如[图 7-10](#9781430249382_Ch07.xhtml#_Fig10) 所示。（注意“Administration Groups”显示在左侧。）


    ![9781430249382_Fig07-10.jpg](images/9781430249382_Fig07-10.jpg)


    [图 7-10](#9781430249382_Ch07.xhtml#_Fig10) 选择添加管理组


    在管理组主页（如[图 7-11](#9781430249382_Ch07.xhtml#_Fig11) 所示），你现在可以定义规划阶段确定的组层级结构。你还可以创建模板集合并将其与管理组关联。点击“Hierarchy”选项卡来定义层级结构。


    ![9781430249382_Fig07-11.jpg](images/9781430249382_Fig07-11.jpg)


    [图 7-11](#9781430249382_Ch07.xhtml#_Fig11) 从 Enterprise Manager 控制台创建基于 `LifeCycle
    Status` 的管理组层级结构


    级别是从上到下添加的。点击左侧“Hierarchy Levels”下的添加（+）并选择一个用于定义管理组的全局属性。在[图 7-11](#9781430249382_Ch07.xhtml#_Fig11)
    中，你可以看到 `LifeCycle Status` 属性表示管理组下的划分，而 `Line of Business` 属性表示下一级别的划分。默认情况下，这两个选择会根据
    `LifeCycle Status` 的预定义值为每个组自动创建一个节点。


    ![image](images/sq.jpg) **注意** 如果使用 `Target Type` 属性来创建管理组，请将数据库、监听器和 ASM 包含在同一组中，而不是分成三个独立的组。


    如果目的是拥有一个单一的生产目标组和一个非生产组，则可以合并一些组。例如，将 Production 和 Mission Critical 合并为一个名为 Production
    的组，然后将 Development、Test 和 Staging 合并到一个 Non-Production Targets 组中，将产生如[图 7-12](#9781430249382_Ch07.xhtml#_Fig12)
    所示的层级结构。


    ![9781430249382_Fig07-12.jpg](images/9781430249382_Fig07-12.jpg)


    [图 7-12](#9781430249382_Ch07.xhtml#_Fig12) 为非生产和生产组合并属性


    点击节点中每个组的详细信息，将组的名称更改为比默认自动生成的名称更有意义的名称。如果目标处于多个时区，也为每个组设置时区。所有子组默认使用相同时区。该时区用于组图表和作业调度目的。'
  raw: '![image](images/sq.jpg) **Tip**  Administration groups are a wonderful, new
    feature in EM12c. However, you can assign only one notification group per target,
    so this feature has some limitations. In some cases, you may want multiple notifications
    per target, and for that you need the original Enterprise Manager groups feature.
    For example, a target’s monitoring requirement might be to assign incidents to
    a production DBA group during business hours, and to generate e-mails to an on-call
    DBA group after hours. This sort of complicated scenario can be satisfied only
    with the original Enterprise Manager groups feature.


    Planning the Hierarchy


    Before administration groups are created, you should plan your administration
    group hierarchy. This hierarchy comprises different, logically divided targets
    arranged in one or more levels based on global target properties. You may also
    specify multiple target types that define an administration group.


    It is important that the hierarchy be planned so that it is in line with your
    organization’s operational and monitoring standards. You should have an understanding
    of how targets are monitored so that similarly managed targets are grouped together.
    For example, you may want to create a group for Production targets and another
    group for Non-Production targets based on the *LifeCycle Status* property. In
    addition, you may want to create other levels in the hierarchy that are subgroups
    of Production and Non-Production based on the following target properties:


    *   Department

    *   Line of business

    *   Location

    *   CSI number

    *   Cost center

    *   Contact


    The decision of whether to create more levels in the hierarchy should depend on
    the monitoring characteristics of the intended groups. For example, do you need
    to maintain separate metrics for HR and Sales groups, or can they be monitored
    using similar metrics? The diagram shown in [Figure 7-9](#9781430249382_Ch07.xhtml#Fig9)
    is an example of an administration group hierarchy based on the LifeCycle Status,
    Location, and Line of Business target properties.


    ![9781430249382_Fig07-09.jpg](images/9781430249382_Fig07-09.jpg)


    [Figure 7-9](#9781430249382_Ch07.xhtml#_Fig9). Administration group hierarchy
    with three levels based on Lifecycle, Location, and Line of Business properties


    There can be only one administration group hierarchy. This limit of one prevents
    conflicts that would arise from multiple hierarchies. Furthermore, a target can
    belong to only a single group in the hierarchy.


    A target cannot be added directly to a group. Instead, group membership is determined
    by the target’s properties (for example, LifeCycle Status). These properties can
    be set at target discovery and promotion time, or at a later time if the targets
    have already been discovered. Target properties can be set by using the Enterprise
    Manager console or the emcli command-line interface with the set_target_property_value
    verb. For more information about the emcli commands, see [Chapter 2](#9781430249382_Ch02.xhtml)
    of the *Oracle Enterprise Manager Command Line Interface* documentation.


    ![image](images/sq.jpg) **Tip**  Think of planning your hierarchy in terms of
    two steps: 1) Define your hierarchy. 2) Assign properties to your targets. The
    “magic” happens then, as your targets are automatically slotted into your hierarchy
    at the appropriate levels.


    After targets join the administration groups, you can associate template collections
    so that each group’s members have similar metrics, policies, and standards. Template
    collections are a set of template metrics composed of several target types. They
    are discussed later in the chapter.


    Separate template collections should be created for each administration group.
    Before creating administration groups, you should first create monitoring templates.
    Each monitoring template is specific to a single target type. Therefore, you will
    need to create a template collection consisting of several monitoring templates:
    one for each target type. For example, a Production Targets administration group
    consisting of hosts, listeners, database, and ASM instances will require a template
    collection consisting of four distinct monitoring templates.


    If the administration group hierarchy consists of more than two levels, the order
    in which template collections are applied is important. Template collections at
    the leaf levels override metrics from the parent levels. Each group will have
    its own template collection, and those from the parent levels are propagated to
    their respective subgroups.


    After template collections have been applied, you should associate the collections
    with the groups. This ensures that each group contains a standard set of metrics,
    standards, and policies. Once that is done, the targets are synchronized so that
    any future changes to monitoring templates are automatically applied to the associated
    targets.


    Implementing the Hierarchy


    Once you have defined your administration groups, you can implement them by using
    the Enterprise Manager console. Choose Setup ![arrow](images/arrow.jpg) Add Target
    ![arrow](images/arrow.jpg) Administration Groups, as shown in [Figure 7-10](#9781430249382_Ch07.xhtml#Fig10).
    (Note that Administration Groups is displayed to the left.)


    ![9781430249382_Fig07-10.jpg](images/9781430249382_Fig07-10.jpg)


    [Figure 7-10](#9781430249382_Ch07.xhtml#_Fig10). Choosing to add administration
    groups


    Within the administration group home page (shown in [Figure 7-11](#9781430249382_Ch07.xhtml#Fig11)),
    you can now define the group hierarchy determined in the planning phase. You can
    also create template collections and associate them with the administration groups.
    Click the Hierarchy tab to define the hierarchy.


    ![9781430249382_Fig07-11.jpg](images/9781430249382_Fig07-11.jpg)


    [Figure 7-11](#9781430249382_Ch07.xhtml#_Fig11). Creating an administration group
    hierarchy based on LifeCycle Status from the Enterprise Manager console


    Levels are added from top to bottom. Click Add (+) under the Hierarchy Levels
    section on the left and select a global property that will be used to define the
    administration group. In [Figure 7-11](#9781430249382_Ch07.xhtml#Fig11), you see
    that the LifeCycle Status property denotes the divisions under the administration
    group, and the Line of Business property denotes the next level of division. By
    default, those two choices cause a node for each group to be automatically created
    based on the predefined values for LifeCycle Status.


    ![image](images/sq.jpg) **Note**  If the Target Type property is used to create
    an administration group, include database, listener, and ASM in the same group
    instead of three separate groups.


    If the intention is to have a single Production Target group and a Non-Production
    group, some of the groups can be merged. For example, merging Production and Mission
    Critical into one group called Production and then merging Development, Test,
    and Staging into a Non-Production Targets group will result in the hierarchy shown
    in [Figure 7-12](#9781430249382_Ch07.xhtml#Fig12).


    ![9781430249382_Fig07-12.jpg](images/9781430249382_Fig07-12.jpg)


    [Figure 7-12](#9781430249382_Ch07.xhtml#_Fig12). Merged properties for Non-Production
    and Production groups


    Click on the details of each group in a node to change the names of the groups
    to something more meaningful than the autogenerated names they take on by default.
    If the targets are in multiple time zones, set the time zone for each group as
    well. All subgroups will default to the same time zone. The time zone is used
    for group charts and job scheduling purposes.'
  trans: '![image](img/sq.jpg) **提示** 管理组是 EM12c 中一个出色的新功能。然而，每个目标只能分配一个通知组，因此该功能存在一些限制。在某些情况下，你可能希望一个目标有多个通知，为此你需要使用原始的
    Enterprise Manager 组功能。例如，某个目标的监控要求可能是在工作时间将事件分配给生产 DBA 组，并在工作时间之外向值班 DBA 组生成电子邮件。这种复杂的场景只能通过原始的
    Enterprise Manager 组功能来满足。


    ## 规划管理组层级


    在创建管理组之前，你应该规划你的管理组层级结构。这个层级结构包含根据全局目标属性在一个或多个级别上逻辑划分的不同目标。你还可以指定定义管理组的多种目标类型。


    规划层级结构时，确保其符合你组织的操作和监控标准非常重要。你应该了解目标的监控方式，以便将管理方式相似的目标分组在一起。例如，你可能希望根据 `LifeCycle
    Status` 属性为生产目标创建一个组，为非生产目标创建另一个组。此外，你可能还希望基于以下目标属性在层级结构中创建其他级别，作为生产组和非生产组的子组：


    *   部门

    *   业务线

    *   位置

    *   CSI 编号

    *   成本中心

    *   联系人


    是否在层级结构中创建更多级别的决定，应取决于目标组的监控特征。例如，你是否需要为 HR 和销售组维护独立的指标，还是可以用相似的指标来监控它们？图 7-9
    中所示的图是一个基于 `LifeCycle Status`、`Location` 和 `Line of Business` 目标属性的管理组层级结构示例。


    ![9781430249382_Fig07-09.jpg](img/9781430249382_Fig07-09.jpg)


    图 7-9 基于生命周期、位置和业务线属性的三层管理组层级结构


    只能存在一个管理组层级结构。这一限制防止了因多个层级结构可能产生的冲突。此外，一个目标在层级结构中只能属于一个组。


    目标不能直接添加到组中。相反，组成员资格由目标的属性（例如 `LifeCycle Status`）决定。这些属性可以在目标发现和提升时设置，也可以在目标已被发现后设置。可以使用
    Enterprise Manager 控制台或带有 `set_target_property_value` 动词的 `emcli` 命令行界面来设置目标属性。有关
    `emcli` 命令的更多信息，请参阅 *Oracle Enterprise Manager Command Line Interface* 文档的第 2
    章。


    ![image](img/sq.jpg) **提示** 可以将规划层级结构想象成两个步骤：1）定义你的层级结构。2）为你的目标分配属性。“魔法”随后发生，因为你的目标会自动被分配到层级结构中的适当级别。


    目标加入管理组后，你可以关联模板集合，以便每个组的成员具有相似的指标、策略和标准。模板集合是由多种目标类型组成的模板指标集合。本章稍后将进行讨论。


    应为每个管理组创建单独的模板集合。在创建管理组之前，你应首先创建监控模板。每个监控模板都针对单一目标类型。因此，你需要创建一个由多个监控模板组成的模板集合：每个目标类型一个。例如，一个包含主机、监听器、数据库和
    ASM 实例的“生产目标”管理组将需要一个包含四个不同监控模板的模板集合。


    如果管理组层级结构包含多于两个级别，则应用模板集合的顺序很重要。叶级别上的模板集合会覆盖来自父级别的指标。每个组将有自己的模板集合，而来自父级别的模板集合则会传播到各自的子组。


    应用模板集合后，你应该将这些集合与组关联。这确保每个组包含一套标准的指标、策略和标准。完成此操作后，目标会被同步，以便将来对监控模板的任何更改都会自动应用到关联的目标。


    ## 实现管理组层级


    一旦定义了管理组，就可以使用 Enterprise Manager 控制台来实现它们。选择 `Setup` > `Add Target` > `Administration
    Groups`，如图 7-10 所示。（注意“Administration Groups”显示在左侧。）


    ![9781430249382_Fig07-10.jpg](img/9781430249382_Fig07-10.jpg)


    图 7-10 选择添加管理组


    在管理组主页（如图 7-11 所示），你现在可以定义规划阶段确定的组层级结构。你还可以创建模板集合并将其与管理组关联。点击“Hierarchy”选项卡来定义层级结构。


    ![9781430249382_Fig07-11.jpg](img/9781430249382_Fig07-11.jpg)


    图 7-11 从 Enterprise Manager 控制台创建基于 `LifeCycle Status` 的管理组层级结构


    级别是从上到下添加的。点击左侧“Hierarchy Levels”下的添加（+）并选择一个用于定义管理组的全局属性。在图 7-11 中，你可以看到 `LifeCycle
    Status` 属性表示管理组下的划分，而 `Line of Business` 属性表示下一级别的划分。默认情况下，这两个选择会根据 `LifeCycle
    Status` 的预定义值为每个组自动创建一个节点。


    ![image](img/sq.jpg) **注意** 如果使用 `Target Type` 属性来创建管理组，请将数据库、监听器和 ASM 包含在同一组中，而不是分成三个独立的组。


    如果目的是拥有一个单一的生产目标组和一个非生产组，则可以合并一些组。例如，将 Production 和 Mission Critical 合并为一个名为 Production
    的组，然后将 Development、Test 和 Staging 合并到一个 Non-Production Targets 组中，将产生如图 7-12 所示的层级结构。


    ![9781430249382_Fig07-12.jpg](img/9781430249382_Fig07-12.jpg)


    图 7-12 为非生产和生产组合并属性


    点击节点中每个组的详细信息，将组的名称更改为比默认自动生成的名称更有意义的名称。如果目标处于多个时区，也为每个组设置时区。所有子组默认使用相同时区。该时区用于组图表和作业调度目的。'
- fmt: "重复刚刚描述的过程来创建所需的任何其他级别。创建规划阶段确定的、为有效管理目标所需的那些级别。使用 `Preview` 面板进行缩放、平移并聚焦于层次结构的任何分支。点击双右箭头以展开\
    \ `Preview` 控件，如图 [7-13](#9781430249382_Ch07.xhtml#Fig13) 所示。\n\n![9781430249382_Fig07-13.jpg](images/9781430249382_Fig07-13.jpg)\n\
    \n[图 7-13](#9781430249382_Ch07.xhtml#_Fig13). 用于平移、缩放和布局的预览控件\n\n在定义管理组层次结构后，仔细检查它。一旦创建，你只能修改目标属性值，这会导致层次结构在同一级别内扩展或收缩。\n\
    \n考虑在测试的 Enterprise Manager 环境中尝试不同的层次结构组织方式。这让你有机会在将其投入生产环境之前，审视你的监控和管理策略。\n\n\
    如果在创建管理组层次结构之前已经设置了目标属性，你可以点击 `Calculate Members` 按钮，让组自动填充。一旦你对层次结构感到满意，点击 `Create`\
    \ 按钮。\n\n![image](images/sq.jpg) **注意** 如果你想在层次结构创建后添加或删除目标属性，则必须删除并重新创建该管理组。\n\
    \n加入管理组\n\n下一步是在目标上设置管理组层次结构中定义的那些目标属性。这可以通过使用 Enterprise Manager 控制台完成。或者，你也可以选择使用\
    \ `emcli` 和 `set_target_property_value` 命令的命令行方法。如果你要为少量目标设置属性，请使用控制台。否则，建议使用\
    \ `EMCLI` 为批量目标设置属性。\n\n要确定哪些目标的属性已设置，请转到 `All Targets` 菜单。默认视图显示目标名称、目标类型、目标状态和待激活列。点击\
    \ `View` 下拉菜单（如图 [7-14](#9781430249382_Ch07.xhtml#Fig14) 所示）以添加对应于管理组目标属性的列。\n\
    \n![9781430249382_Fig07-14.jpg](images/9781430249382_Fig07-14.jpg)\n\n[图 7-14](#9781430249382_Ch07.xhtml#_Fig14).\
    \ 自定义 All Targets 视图以显示额外的目标属性\n\n要使用控制台为非数据库目标设置目标属性，右键单击目标名称并选择 `Target Setup`\
    \ ![arrow](images/arrow.jpg) `Properties`。对于数据库实例，右键单击目标名称并选择 `Oracle Database`\
    \ 或 `Cluster Database`，然后选择 `Target Setup` 和 `Properties`。如图 [7-15](#9781430249382_Ch07.xhtml#Fig15)\
    \ 所示，为层次结构选择的管理组属性和值显示在所有目标属性表的上方。点击 `Edit` 按钮可编辑属性。\n\n![image](images/sq.jpg)\
    \ **注意** 在目标属性表上方显示所选值是从 12.1.0.2.0 版本开始提供的一项功能。\n\n![9781430249382_Fig07-15.jpg](images/9781430249382_Fig07-15.jpg)\n\
    \n[图 7-15](#9781430249382_Ch07.xhtml#_Fig15). 在管理组层次结构中定义的目标属性\n\n![image](images/sq.jpg)\
    \ **注意** 在添加或提升目标时设置目标属性。这样做可确保成员在创建后自动加入管理组。\n\n在非集群聚合目标上设置的目标属性不会自动应用于成员目标。这样做是为了防止目标已属于另一个管理组时产生歧义。要为非集群聚合目标设置目标属性，请使用带有\
    \ `set_target_property_values` 和 `-propagate_to_members` 选项的 `emcli`。这样，聚合的成员也会加入同一个管理组。\n\
    \n![image](images/sq.jpg) **注意** 非集群聚合目标包括数据库系统目标类型，它由数据库实例、侦听器、ASM 实例和高可用服务组成。诸如数据库集群、主机集群和冗余系统之类的集群目标将自动继承当前和新成员的目标属性。\n\
    \n任何聚合的新成员都需要手动设置其目标属性。以下示例展示了如何将 `LifeCycle Status` 和 `Line of Business` 目标属性传播到\
    \ `emrep_sys` 聚合：\n\n```\n$ emcli set_target_property_value -property_records\n\
    \  =\"emrep_sys:oracle_dbsys:LifeCycle Status:Production\" -propagate_to_members\n\
    ```\n\n此命令将使 `emrep_sys` 聚合的成员（数据库实例、侦听器和 ASM）具有相同的 `LifeCycle Status` 和 `Line\
    \ of Business` 属性。\n\n使用 `emcli` 时，目标属性区分大小写。例如，使用 `Lifecycle Status` 而不是 `LifeCycle\
    \ Status`（注意大写的 *C*）设置属性将生成错误。要查看可为特定目标设置的有效目标属性列表，请使用带有 `-target_type` 选项的 `emcli\
    \ get_target_properties` 命令。以下示例显示了 `oracle_dbsys` 聚合目标的所有有效属性：\n\n```\n$ emcli\
    \ get_target_properties -target_type=\"oracle_dbsys\"\nCommentContact\nCost Center\n\
    Customer Service Identifier\nDepartment\nLifeCycle Status\nLine of Business\n\
    Location\nOperating System\nPlatform\nTarget Version\nTarget properties fetched\
    \ successfully\n```\n\n请务必访问你计划监控的每个目标，并确保为该目标设置用于构建管理组层次结构的每个属性。任何未设置属性的目标将不属于管理组，因此也不会使用定义的监控标准进行监控。\n\
    \n多个目标\n\n为多个相关目标设置目标属性时，你可以使用 `emcli` 配合聚合/集群目标名称来简化此过程。例如，要为 `orcl_sys` 数据库系统的数据库实例、侦听器、ASM\
    \ 主目录和 Oracle 主目录一次性设置相同的 `Line of Business` 属性，你可以执行以下操作：\n\n```\nemcli set_target_property_value\
    \ -property_records\n```\n\n```\n=\"orcl_sys:oracle_dbsys:Line of Business:Marketing\"\
    \ –propagate_to_members\n```\n\n模板集合\n\n如前所述，*模板集合* 用于向一组相似的目标提供一致的指标集。监控模板按目标类型创建，并捆绑在一起形成模板集合。应为层次结构中的每个节点创建一个单独的集合。例如，一个“生产目标”组将与一个“生产目标”模板集合相关联，该集合包含不同目标类型的监控指标。一旦这些模板被关联，使用模板集合有助于你自动部署监控标准，这些标准使用监控模板中定义的指标阈值和策略。\n\
    \n要创建模板集合，选择 `Setup` ![arrow](images/arrow.jpg) `Add Targets` ![arrow](images/arrow.jpg)\
    \ `Administration Group`。点击 `Template Collections` 选项卡以创建集合，如图 [7-16](#9781430249382_Ch07.xhtml#Fig16)\
    \ 所示。这假设你已经为你的目标创建了监控模板。有关设置监控模板的详细信息，请参阅《*Oracle Enterprise Manager Cloud Control\
    \ 12c Administrator’s Guide*》。\n\n![9781430249382_Fig07-16.jpg](images/9781430249382_Fig07-16.jpg)\n\
    \n[图 7-16](#9781430249382_Ch07.xhtml#_Fig16). 添加模板集合"
  raw: 'Repeat the process just described to create any additional levels that are
    required. Create the levels identified during the planning phase that are needed
    to effectively manage your targets. Use the Preview panel to zoom in and zoom
    out, pan and center on any branch of the hierarchy. Click the double right arrow
    to expand the Preview controls, shown in  [Figure 7-13](#9781430249382_Ch07.xhtml#Fig13).


    ![9781430249382_Fig07-13.jpg](images/9781430249382_Fig07-13.jpg)


    [Figure 7-13](#9781430249382_Ch07.xhtml#_Fig13). Preview controls for panning,
    zooming, and layout


    Review the administration group hierarchy carefully after it has been defined.
    Once it has been created, you can modify only the target property values, which
    will result in the hierarchy expanding or shrinking in the same level.


    Consider experimenting with different hierarchy organizations in a test Enterprise
    Manager environment. That gives you a chance to review your monitoring and management
    strategy before taking it to production.


    If target properties have already been set prior to creating the administration
    group hierarchy, you can click the Calculate Members button to have the groups
    automatically populated. Once you are satisfied with the hierarchy, click the
    Create button.


    ![image](images/sq.jpg) **Caution**  If you want to add or remove target properties
    after the hierarchy has been created, the administration group will have to be
    deleted and re-created.


    Joining Administration Groups


    The next step is to set those target properties defined in the administration
    group hierarchy on the targets. This can be done by using the Enterprise Manager
    console. Or, you can chose the command-line approach using emcli and the set_target_property_value
    command. If you are setting properties for a small number of targets, use the
    console. Otherwise, EMCLI is recommended for setting the properties for batches
    of targets.


    To determine which targets have their properties set, go to the All Targets menu.
    The default view shows the Target Name, Target Type, Target Status, and Pending
    Activation columns. Click the View drop-down, as shown in [Figure 7-14](#9781430249382_Ch07.xhtml#Fig14),
    to add columns that correspond to target properties of the administration groups.


    ![9781430249382_Fig07-14.jpg](images/9781430249382_Fig07-14.jpg)


    [Figure 7-14](#9781430249382_Ch07.xhtml#_Fig14). Customize the All Targets view
    to display additional target properties


    To set the target properties for nondatabase targets using the console, right-click
    the target name and choose Target Setup ![arrow](images/arrow.jpg) Properties.
    For database instances, right-click the target name and choose Oracle Database
    or Cluster Database, and then Target Setup and Properties. As seen in [Figure
    7-15](#9781430249382_Ch07.xhtml#Fig15), the administration group properties and
    values chosen for the hierarchy are displayed above the table of all target properties.
    Click the Edit button to edit the properties.


    ![image](images/sq.jpg) **Note**  The display of values chosen above the table
    of target properties is a feature available starting in version 12.1.0.2.0.


    ![9781430249382_Fig07-15.jpg](images/9781430249382_Fig07-15.jpg)


    [Figure 7-15](#9781430249382_Ch07.xhtml#_Fig15). Target properties defined in
    administration group hieararchy


    ![image](images/sq.jpg) **Note**  Set target properties during target addition
    or promotion. Doing so ensures that members will join the administration groups
    automatically after they have been created.


    Target properties set on noncluster aggregate targets are not automatically applied
    to member targets. This is to prevent ambiguity if the target already belongs
    to another administration group. To set target properties for noncluster aggregate
    targets, use emcli with set_target_property_values and the –propagate_to_members
    option. That way, members of the aggregate also join the same administration group.


    ![image](images/sq.jpg) **Note**  Noncluster aggregate targets include the Database
    System target type, which consists of database instances, listeners, ASM instances,
    and high-availability services. Cluster targets such as database clusters, host
    clusters, and redundancy systems will automatically inherit the target properties
    for both current and new members.


    Any new members of an aggregate will require that their target properties be set
    manually. The example to follow shows how to propagate the LifeCycle Status and
    Line of Business target properties to the emrep_sys aggregate:


    ```

    $ emcli set_target_property_value -property_records

      ="emrep_sys:oracle_dbsys:LifeCycle Status:Production" -propagate_to_members

    ```


    This command will cause members of the emrep_sys aggregate (database instance,
    listener, and ASM) to have identical LifeCycle Status and Line of Business properties.


    When using emcli, the target properties are case-sensitive. For example, setting
    a property using Lifecycle Status instead of LifeCycle Status (note the uppercase
    *C*) will generate an error. To see the valid list of target properties that can
    be set for a particular target, issue the emcli get_target_properties command
    with the target_type option. The following example shows all valid properties
    for the oracle_dbsys aggregate target:


    ```

    $ emcli get_target_properties -target_type="oracle_dbsys"

    CommentContact

    Cost Center

    Customer Service Identifier

    Department

    LifeCycle Status

    Line of Business

    Location

    Operating System

    Platform

    Target Version

    Target properties fetched successfully

    ```


    Be sure to visit each target you plan to monitor, and be sure to set for that
    target each of the properties used to build your administration group hierarchy.
    Any target whose properties are not set will not be part of an administration
    group, and therefore will not be monitored using the defined monitoring standards.


    MULTIPLE TARGETS


    When setting target properties for multiple related targets, you can use emcli
    with the aggregate/cluster target name to simplify the process. For example, to
    set the same Line of Business property for the database instance, listener, ASM
    home, and Oracle home for the orcl_sys database system in one command, you would
    do the following:


    ```

    emcli set_target_property_value -property_records

    ```


    ```

    ="orcl_sys:oracle_dbsys:Line of Business:Marketing" –propagate_to_members

    ```


    Template Collections


    As mentioned earlier, *template collections* are used to provide a consistent
    set of metrics to a group of similar targets. Monitoring templates are created
    by target type, and are bundled together to form a template collection. A separate
    collection should be created for each node in the hierarchy. For example, a Production
    Targets group would be associated with a Production Targets template collection
    consisting of monitoring metrics of different target types. Once these templates
    have been associated, Use of template collections helps you to automate the deployment
    of monitoring standards using the metric thresholds and policies defined in the
    monitoring templates.


    To create a template collection, choose Setup ![arrow](images/arrow.jpg) Add Targets
    ![arrow](images/arrow.jpg) Administration Group. Click the Template Collections
    tab to create the collections, as shown in [Figure 7-16](#9781430249382_Ch07.xhtml#Fig16).
    This assumes that you have already created your monitoring templates for your
    targets. See the *Oracle Enterprise Manager Cloud Control 12c Administrator’s
    Guide* for details on setting up monitoring templates.


    ![9781430249382_Fig07-16.jpg](images/9781430249382_Fig07-16.jpg)


    [Figure 7-16](#9781430249382_Ch07.xhtml#_Fig16). Adding template collections'
