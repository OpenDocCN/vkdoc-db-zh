    # 企业菜单功能


    ![image](img/sq.jpg) **提示** 您需要决定 `EM12c` 作业系统在您的环境中是否提供了足够的灵活性和可靠性，或者替代的作业调度系统是否满足您的要求。一般来说，如果您已有现成的企业调度器，我们推荐您使用它。如果您有一堆有些失控的
    shell 脚本，我们建议您，`EM12c` 提供了一个实现集中化和简化的契机。


    ## 报告子菜单


    报告子菜单旨在帮助您基于通过 `Oracle Enterprise Manager` 运行所积累的集中存储库数据生成报告。这部分信息提供了集中式管理数据存储库的大部分附加价值。我们将在本节末尾详细介绍此菜单的功能。


    ## 配置子菜单


    下一个子菜单是配置，它允许您收集和比较组织中受管目标的配置详情。这使您可以确保，例如，在两个相似的主机上安装了相同的操作系统软件包版本。此菜单体现了产品的配置管理能力。


    ## 合规性子菜单


    接下来是合规性子菜单。*合规性* 指的是特定目标的实际配置符合该类型配置项预定义标准的程度。该产品领域在 `12c` 版本中有了一些显著改进。在之前的版本中，所能实现的只是将受管目标与一组单一的、不可编辑的、预定义的最佳实践集进行比较。这有显著的缺点，要么是因为预定义策略限制过严，要么是因为不够严格。后者的最佳例子是受
    `支付卡行业 (PCI)` 标准约束的组织。


    ![9781430249382_Fig04-31.jpg](img/9781430249382_Fig04-31.jpg)


    **图 4-31.** 合规性子菜单


    全面覆盖目标合规性超出了本章的范围。不过，这里有一些基本概念供您入门。`Oracle` 设想，根据行业实践，您定义一套标准实践（例如，您将为数据库存储需求使用
    `自动存储管理 (ASM)`，或者数据库监听器不会使用默认端口 `1521`）。这些作为合规性标准规则单独管理。然后，您将一组相关规则归为一个公司标准，通常针对一种目标类型。因此，您可能会将您的
    `ASM` 标准，与声明您不会使用大文件表空间的标准，以及要求使用统一区大小的本地管理表空间的标准一起，整合为一个数据库存储标准。最后，您可以将相关的标准分组到一个合规性框架中。在我们的例子中，我们可以创建一个如上所述的存储标准，以及一个符合公司密码策略的数据库密码标准。然后，这两者可以一起归组，为您的组织形成一个数据库合规性框架。截至此版本，标准和策略规则可为您的组织编辑。此外，`Oracle`
    还随附了多个带有支持性标准和规则的合规性框架。


    ![image](img/sq.jpg) **注意** 这一个变化意味着，在之前版本中很少使用的 `Enterprise Manager` 的合规性功能，现在应该列入您的待调查清单。


    您创建的规则、标准和框架构成一个合规性库。您可以从合规性菜单中的库链接查看此库。`Enterprise Manager` 然后允许您通过两种方式确保合规性。首先，合规性分数是根据对受管目标评估您的合规性标准规则的结果计算出的加权平均值。该分数显示在目标和企业主页上。其次，合规性负责人可以交互式地查看目标状态，并使用
    `Enterprise Manager` 报告框架来维持公司对标准得到遵守的保证，并确保对标准的偏差通过纠正措施或记录不合规原因得到处理。


    ## 配置和修补


    企业菜单中的“配置和修补”选项是进入 `EM` 配置和修补功能的入口。由于这些功能在第 6 章中有介绍，我们在此不深入探讨该功能。


    ## 质量管理


    下一个项目叫做质量管理，但在我看来，这是用词不当。图 4-32 所示的子菜单包含指向数据库和 `WebLogic` 产品的各种增值选项的链接。由于这些项目是单独授权的，我们不在这篇关于
    `Enterprise Manager` 界面的介绍中涵盖它们。


    ![9781430249382_Fig04-32.jpg](img/9781430249382_Fig04-32.jpg)


    **图 4-32.** 质量管理


    ## 我的 Oracle 支持子菜单


    我们要详细查看的最后一项是“我的 Oracle 支持”子菜单。它提供了访问 `Oracle` 在线支持工具的四个常用区域。这些是服务请求、知识库、认证信息以及我的
    Oracle 支持社区论坛。要使其中任何一项正常工作，您需要如前所述配置支持集成。我个人只使用服务请求选项，因为其他信息区域（知识库和社区内容）一旦建立了“我的
    Oracle 支持”连接，就可以直接从导航栏右上角的搜索框中搜索到。


    ![image](img/sq.jpg) **注意** 支持集成的一个方面可能会让您惊讶，即支持页面是从现已退役的 `Flash` 界面显示的我的 Oracle
    支持内容。我们预计这将在产品的未来更新中改变。


    ## 收费 back 和整合规划


    最后，在菜单底部，看起来像是设计师找不到更好的地方，是收费 back 和整合规划功能。这些高级功能超出了本章的范围。


    总的来说，企业菜单让您能够访问产品级或企业级的功能，并且是您配置或访问企业管理功能应该查看的地方。不过，在离开本节之前，您将更深入地了解产品的报告功能。


    # 配置报告


    在撰写本文时，`Enterprise Manager` 处于一个过渡阶段，正从之前版本中可用的技术 `Information Publisher` 转向 `Business
    Intelligence Publisher` 报告，后者提供了大大增强的格式、调度和分发选项。在 `12c Release 2` 中，您有两个不同的选项，第一个是链接到
    `Information Publisher` 报告。（这是在 `12c Release 2` 之前唯一的选项），但已被 `BI Publisher Reports`
    取代。`Oracle` 为 `Enterprise Manager` 提供了 `BI Publisher` 的嵌入式许可证，这显然是前进的方向。然而，目前存在一些限制，我们希望在未来的版本中看到放宽。

    '
- fmt: 'Currently, only `BI Publisher 11.1.0.6` (yes, that’s four decimal places of
    release number) is supported, and then only when loaded into the same `WebLogic`
    domain as Cloud Control. For all practical purposes, this means that you will
    either have to extend the domain to include a new `BI Publisher` server, or install
    `BI Publisher` onto the existing `OMS` servers. Either of these is a significant
    investment in complexity and management—and indeed come with additional CPU, memory,
    and disk requirements. Hopefully, in the future, the reliance on the same domain
    can be relaxed, and the `BI Publisher` templates can be installed either into
    an existing corporate `BI Publisher` environment or a stand-alone `BI Publisher`
    instance. Finally, Oracle currently offers no guarantee of backward compatibility
    for `BI Publisher` reports that you develop. This book, therefore, does not cover
    `BI Publisher` reports because we consider these restrictions to mean that it
    would be unwise to adopt `BI Publisher` at the time of writing.


    If `Information Publisher` reports are chosen, you will be presented with a list
    of predefined reports, organized by category, which will look something like the
    alphabetically presented list in [Figure 4-33](#9781430249382_Ch04.xhtml#Fig33).


    ![9781430249382_Fig04-33.jpg](images/9781430249382_Fig04-33.jpg)

    [Figure 4-33](#9781430249382_Ch04.xhtml#_Fig33). `Information Publisher` out-of-the-box
    reports


    These reports are grouped in predefined categories. The complete list is shown
    in [Figure 4-34](#9781430249382_Ch04.xhtml#Fig34). To produce this listing, choose
    `Collapse All` and then click the arrow next to `Information Publisher Reports`.


    ![9781430249382_Fig04-34.jpg](images/9781430249382_Fig04-34.jpg)

    [Figure 4-34](#9781430249382_Ch04.xhtml#_Fig34). Available report categories


    You cannot edit the predefined reports, but you can use the `Create Like` functionality
    to produce customized versions. To illustrate this principle, you will use the
    built-in `Oracle Database Monthly Space Usage Report` as the basis of a new daily
    space usage report. To find the report, expand the reports list so it looks like
    [Figure 4-35](#9781430249382_Ch04.xhtml#Fig35).


    ![9781430249382_Fig04-35.jpg](images/9781430249382_Fig04-35.jpg)

    [Figure 4-35](#9781430249382_Ch04.xhtml#_Fig35). Space Usage Report customization


    Select the `Monthly Space Usage Report` and click `Create Like`. You will see
    a screen like the one in [Figure 4-36](#9781430249382_Ch04.xhtml#Fig36). You can
    customize all the editable properties of this report and you **must** customize
    the report title.


    ![9781430249382_Fig04-36.jpg](images/9781430249382_Fig04-36.jpg)

    [Figure 4-36](#9781430249382_Ch04.xhtml#_Fig36). Initial report settings


    Update all the existing references to `Monthly` to refer to your new analysis
    period (in this example, you would use `Weekly`). In addition, choose `Set Time
    Period` and change from 31 days to 7. When you have finished, the report should
    resemble [Figure 4-37](#9781430249382_Ch04.xhtml#Fig37).


    ![9781430249382_Fig04-37.jpg](images/9781430249382_Fig04-37.jpg)

    [Figure 4-37](#9781430249382_Ch04.xhtml#_Fig37). Weekly Space Management Report


    Next, ignore the `Elements` tab for the moment and then click `Schedule`. This
    tab allows you to configure the report to run weekly on a Sunday and e-mail to
    an appropriate address (see [Figure 4-38](#9781430249382_Ch04.xhtml#Fig38)). This
    scheduling of reports so that they are in the in-box of administrators or management
    is a big advantage of centralizing the reporting functionality along with the
    management repository. I suggest that you save copies of sent reports and purge
    after a sensible timeframe that allows comparison across time so that you can
    answer questions such as “What happened at this time last year?”


    ![9781430249382_Fig04-38.jpg](images/9781430249382_Fig04-38.jpg)

    [Figure 4-38](#9781430249382_Ch04.xhtml#_Fig38). Two-year retention of Weekly
    Space reports


    ## Targets Menu


    The `Targets` menu gives you, as the name suggests, quick access to summary information
    about targets by type. The available target types vary according to the plug-ins
    you chose to install. [Figure 4-39](#9781430249382_Ch04.xhtml#Fig39) shows an
    example.


    ![9781430249382_Fig04-39.jpg](images/9781430249382_Fig04-39.jpg)

    [Figure 4-39](#9781430249382_Ch04.xhtml#_Fig39). Targets menu


    The `All Targets` option, or keyboard shortcut, takes you to a searchable list
    of targets organized in various ways. The screen looks similar to [Figure 4-40](#9781430249382_Ch04.xhtml#Fig40).


    ![9781430249382_Fig04-40.jpg](images/9781430249382_Fig04-40.jpg)

    [Figure 4-40](#9781430249382_Ch04.xhtml#_Fig40). `All Targets` option


    In addition to searching by target type, you can view targets by software version,
    target status, hardware platform, or operating system. This screen is faster if
    you want to review several targets of the same type or status; if you are searching
    for a specific target, you would likely do better to use the standard search box
    on the `Navigation` bar, which will achieve the same result.


    The next section of the menu covers `groups`, `services`, and `systems`, which
    are three ways of viewing and managing a collection of managed targets as one.
    You will need to understand the differences and uses of each of these constructs
    in order to make effective use of the platform.


    A `group` is a logical organization of a set of targets. For example, you might
    classify all production databases as a group, or all hosts in a specific data
    center. The effective use of groups is covered in [Chapter 7](#9781430249382_Ch07.xhtml).
    For now, all you need to know is that you can group logically related items and
    then view summary information about the group rather than the individual targets.
    [Figure 4-41](#9781430249382_Ch04.xhtml#Fig41) shows the sort of information you
    will see by default for a group (in this case, of database instances).


    ![9781430249382_Fig04-41.jpg](images/9781430249382_Fig04-41.jpg)

    [Figure 4-41](#9781430249382_Ch04.xhtml#_Fig41). Group information


    You may at this point be thinking something along the lines of, “That’s great;
    I can group all the devices that make up my important application installation
    together and view these as a single group.” Although this is true, it is likely
    that what is really required is a `system`. A system is defined by the service
    or services it provides. The formal definition is as follows:


    > A `system` is the set of infrastructure components (for example, hosts, databases,
    and application servers) that work together to host your applications.


    Systems come in several flavors, according to the services they provide. If you
    navigate to the systems page, you will see several predefined systems, including
    the `WebLogic` domain that runs the `Enterprise Manager Service`. Systems management
    is a comprehensive area of management and configuration, since `Enterprise Manager`
    allows you to define interdependencies and component roles and so on. The power
    of defining systems correctly comes into its own with the root-cause analysis
    and service-level analysis that `Enterprise Manager` offers for managed systems.
    The home page for a database system looks like [Figure 4-42](#9781430249382_Ch04.xhtml#Fig42)
    (we use the `Enterprise Manager` repository database system, so you can compare
    it with your installation).


    ![9781430249382_Fig04-42.jpg](images/9781430249382_Fig04-42.jpg)

    [Figure 4-42](#9781430249382_Ch04.xhtml#_Fig42). A database system'
