  trans: '

    # EM 作业服务


    EM 作业服务是运行中的服务，负责控制 EM12c 环境中的所有作业处理。此界面可能不易找到，但通过点击 `目标` → `所有目标`，在“搜索目标名称”框中输入
    `服务`，然后点击箭头，是最容易访问的方式。接着点击 `EM 作业服务`（参见图 11-2）。随后，EM 作业服务界面（如图 11-3 所示）便会显示。我们将反复回到此界面，因为它是通往
    EM12c 作业服务高级功能的重要入口。


    ![9781430249382_Fig11-02.jpg](img/9781430249382_Fig11-02.jpg)


    图 11-2. EM 服务仪表板，包含 EM 作业服务和 EM 控制台服务，以及状态、性能、使用率、组件和重要服务级别


    ![9781430249382_Fig11-03.jpg](img/9781430249382_Fig11-03.jpg)


    图 11-3. EM 作业服务界面，展示主左窗格中显示的基本信息，包括状态、事件和正常运行时间


    此控制台界面允许用户查看服务状态、事件、违规情况、性能图表、测试性能、作业环境的配置拓扑以及 EM 作业系统中包含的所有其他功能。


    您也可以通过点击 `目标` → `所有目标`，在“搜索目标名称”框中输入 `%job%`，然后点击箭头来找到 EM 作业服务页面（并了解通配符搜索在 EM12c
    中如何工作）。代理 `EM 作业服务` 会显示在列表中，可通过点击目标名称访问。


    ![9781430249382_Fig11-04.jpg](img/9781430249382_Fig11-04.jpg)


    图 11-4. 在“所有目标”视图中进行通配符搜索非常简单


    ## 监控配置


    EM 作业服务界面包含多个选项卡，提供对作业系统功能的访问。DBA 最常用的选项卡可能就是“监控配置”选项卡（参见图 11-5）。


    ![9781430249382_Fig11-05.jpg](img/9781430249382_Fig11-05.jpg)


    图 11-5. “监控配置”选项卡是 EM 作业服务界面中最常用的选项卡之一


    用户界面的“监控配置”部分包含众多选项，用于与 EM 作业服务的功能进行交互。


    “根因分析配置”选项可用于在 EM 服务发生故障时执行自动或手动检查。此分析可以精确定位问题，或上传到 `My Oracle Support` 以协助处理服务请求。此功能非常有益，可以节省管理员在
    `My Oracle Support` 界面手动填写服务请求所浪费的时间。本节涵盖的服务请求主要针对 EM12c 核心服务，包括企业管理器控制台、Oracle
    管理服务和 EM 作业服务。


    “性能指标”链接使您能够配置 EM 作业步骤吞吐量和作业步骤积压的阈值。当将 EM 作业系统用作数据库环境的主要作业调度程序时，这可以提供大多数其他作业调度程序所缺乏的监控激励。收集执行后性能信息在其他调度/日志记录方法中可能不可用，但在
    EM12c 作业服务中，所有数据默认保留 31 天。


    “监控配置”选项卡中的另一个链接是“服务测试与信标”。服务测试是测试网页能否定期完成简单事务、测试正常运行时间或登录网站并在特定时间验证文件是否可供下载的绝佳方法。与指标扩展（在第
    13 章中描述）不同，此功能非常特定于 URL，并使用 EM 作业在请求的间隔执行任务。


    此功能具有独特的选项，可通过使用 ActiveX 插件记录 Web 会话，该会话随后作为 EM 作业的一部分进行配置，以在预定时间间隔执行任务，检查用户访问同一网站时会完成的已记录步骤是否成功完成。图
    11-6 显示了一个来自网站的会话记录——成功登录、访问四个文件，然后注销。此会话将被 EM 作业服务用于创建性能测试，然后继续进行信标设置。


    ![9781430249382_Fig11-06.jpg](img/9781430249382_Fig11-06.jpg)


    图 11-6. 正在为性能测试和信标设置记录的会话


    > **注意**

    >

    > 要记录用于性能测试的 Web 事务，Microsoft Internet Explorer 是唯一受支持的 Web 浏览器。尝试使用其他浏览器时，选项不会出现。在某些情况下，即使使用带有
    ActiveX 插件的 Internet Explorer，Web 事务也可能会失败，管理员将被 `My Oracle Support` 指导使用 Oracle
    应用程序开发框架 (`ADF`) 来记录 Web 事务，并将保存的会话文件导入服务测试界面。


    ## 作业活动页面


    作业活动页面使您能够执行以下操作：


    *   创建作业

    *   将已计划、正在运行或先前执行的作业保存到作业库，以供将来使用

    *   在活动部分查看或编辑现有作业

    *   查看作业执行结果、编辑、创建、恢复、暂停、停止或删除作业执行

    *   通过各种方法搜索作业，包括作业名称（允许使用通配符）、作业类型和状态


    作业活动页面（如图 11-7 所示）可以在数据库、集群或完整监控环境的级别查看。


    ![9781430249382_Fig11-07.jpg](img/9781430249382_Fig11-07.jpg)


    图 11-7. 作业活动示例，管理员首先查看计划时间最远的活动，并通过向下滚动查看当前和过去的活动


    在搜索和查看作业活动页面时，请记住表 11-1 中的以下术语。


    表 11-1. 重要作业活动术语


    ```

    | 作业活动 | 描述 |

    | --- | --- |

    | 作业执行 | EM12c 中的单次作业执行——通常归因于一个目标，但根据任务不同，可以有多个目标或根本没有目标。 |

    | 作业运行 | 特定作业所有执行的汇总 |

    ```


    在搜索作业执行和作业运行时，您可以在作业名称搜索选项中使用通配符 (`%`)，如图 11-8 所示。此通配符可用于任何需要您输入值（而不是提供下拉选择）的字段。


    ![9781430249382_Fig11-08.jpg](img/9781430249382_Fig11-08.jpg)


    图 11-8. 使用通配符选项的作业活动搜索


    前面的示例中的作业搜索查找了名称中包含字母 `EXTR` 的任何作业。搜索中未请求区分作业类型（已计划、成功、有问题等），因此返回了所有符合搜索条件的作业。


    EM 作业支持表 11-2 中列出的作业操作。


    表 11-2. 作业活动操作

    '
- fmt: "# Enterprise Manager 作业管理\n\n## 作业操作说明\n\n| 操作 | 描述 |\n| --- | --- |\n| Create\
    \ | 创建一个操作系统或SQL脚本作业，以及其他类型的作业。 |\n| Edit | 更新现有作业，更改计划时间、间隔、参数等。 |\n| Create\
    \ Like | 从现有作业创建一个新作业，可以选择编辑现有参数、计划等。（备份作业和某些其他维护作业可能不允许使用“Create Like”选项。） |\n\
    | Delete | 从EM作业活动视图中移除单个计划/失败的作业，或移除该作业的所有实例。（任何库副本将被保留。） |\n| Suspend | 将作业“挂起”直到恢复，使现有计划得以继续。\
    \ |\n| Resume | 恢复已挂起的作业计划。作业必须单独恢复。 |\n| Retry on Failure | 如果作业属于允许的作业类型列表，则重试该作业。\
    \ |\n\n## 作业库\n\nEnterprise Manager作业库允许提交作业到EM作业调度程序的存储库。此存储库包含管理员在备份和EM控制台处理之外创建的所有作业。该库仅保留已保存到其中的内容，并且必须与活动作业的更改保持同步。如果能有一个导出程序将当前作业的快照保存到库中，那将是非常有益的，但不幸的是目前并不存在。因此，务必将所有更改过的作业（包括简单的执行时间更改）从“作业活动”页面保存到库中。如果因任何原因必须参考库来重新创建作业，这将确保作业正确地重新提交到调度程序。\n\
    \n对于早期10g和11g EM作业的用户，没有将作业迁移到新EM12c环境的过程。此功能在新版EM12c中同样缺失，但Oracle计划在即将发布的版本中包含一个。此功能应具有多重好处，不仅适用于迁移，也作为升级的一部分、备份/恢复的次选方案以及复制的一部分。\n\
    \n作业库界面（如[图11-9](#9781430249382_Ch11.xhtml#Fig9)所示）与作业活动页面类似，并使用许多相似的选项，包括“编辑”和“访问”。\n\
    \n![9781430249382_Fig11-09.jpg](images/9781430249382_Fig11-09.jpg)\n\n[图11-9](#9781430249382_Ch11.xhtml#_Fig9).\
    \ EM12c控制台的生产作业库示例\n\n## 作业模式\n\n在`SYSMAN`模式中存在超过70个`JOB`表，但只有少数几个涉及EM作业系统的主要组件，需要基本了解。您可以对这些表执行查询，以获得对EM作业环境更明确的视图。[图11-10](#9781430249382_Ch11.xhtml#Fig10)显示了两个主要表以及对象之间的关系。\n\
    \n![9781430249382_Fig11-10.jpg](images/9781430249382_Fig11-10.jpg)\n\n[图11-10](#9781430249382_Ch11.xhtml#_Fig10).\
    \ 注意连接`SYSMAN`模式中EM作业系统部分最常见对象的列\n\n以下示例查询将针对作业数据进行报告。经常在后续查询中使用的`MGMT_JOB`表同时包含作业库和`job_activity`信息，因此在查询时必须牢记这一点，如[图11-11](#9781430249382_Ch11.xhtml#Fig11)所示。如果EM作业活动或作业库界面在任何时候无法成功管理作业，而必须使用Enterprise\
    \ Manager命令行界面（`EMCLI`），那么这些数据通常是必不可少的。\n\n```sql\nselect  mj.job_owner, mj.job_name,\n\
    decode(mj.is_library, 1, 'JOB_LIBRARY', 0, 'JOB_ACTIVITY')\nfrom sysman.mgmt_job\
    \ mj\norder by mj.job_owner, mj_job_name;\n```\n\n![9781430249382_Fig11-11.jpg](images/9781430249382_Fig11-11.jpg)\n\
    \n[图11-11](#9781430249382_Ch11.xhtml#_Fig11). 活动作业（已提交）和库中保留作业的备份作业信息示例\n\n`EMCLI`也可用于收集有关环境中作业的数据。此实用程序有其自己的一组动词（命令），通过命令行界面调用以查询、执行、配置、部署和管理Enterprise\
    \ Manager，通常提供比EM控制台图形界面更强大的功能。\n\n作为此功能的示例，我们可以通过执行以下命令从`EMCLI`查询作业数据：\n\n```text\n\
    emcli get_jobs\n\nREFRESH_MV_ORCL.MV_DEVA_PART.1                    SQLScript\
    \              416E2CE166724F53BCF3ECD798E1759B\nB16A12D945A1466C871B99E1A5226309\n\
    2013-01-21 07:00:00  2013-01-21 07:02:22America/Chicago\nSucceeded  5    SYSJOB\
