  raw: 'The ADDM comparison report is available by choosing Performance ![arrow](images/arrow.jpg)
    AWR ![arrow](images/arrow.jpg) Compare Period ADDM for any database target. After
    clicking the link, you will be asked to submit information about the begin time
    and end time for the timeline in question (see [Figure 9-51](#9781430249382_Ch09.xhtml#Fig51)).
    In the lower section, you then choose a base period for comparison from drop-down
    options that include the preceding time period, the previous day, or the previous
    week.


    ![9781430249382_Fig09-51.jpg](images/9781430249382_Fig09-51.jpg)


    [Figure 9-51](#9781430249382_Ch09.xhtml#_Fig51). Choosing options for a comparison
    ADDM report


    ![image](images/sq.jpg) **Note**  The ADDM comparison report requires the installation
    of PL/SQL packages to be used by the EM12c agent user on the target to perform
    the comparison report and is not installed by default. This installation is performed
    as an EM Job and can be implemented immediately or scheduled to execute at a later
    date and time.


    In the example in [Figure 9-52](#9781430249382_Ch09.xhtml#Fig52), the options
    are shown for choices in comparisons of an ADDM report. The latest offset, a baseline
    or a custom begin and end time can be chosen.


    ![9781430249382_Fig09-52.jpg](images/9781430249382_Fig09-52.jpg)


    [Figure 9-52](#9781430249382_Ch09.xhtml#_Fig52). ADDM comparison report activity


    Below Detail for Selected 30 Minute Interval, you can locate the time of the section
    detailed in the bottom panes of the Top Activity graph. Using this information,
    you then can click Compare Period ADDM to identify any specific activity that
    was out of ordinary for the timeline of concern (see [Figure 9-53](#9781430249382_Ch09.xhtml#Fig53)).


    ![9781430249382_Fig09-53.jpg](images/9781430249382_Fig09-53.jpg)


    [Figure 9-53](#9781430249382_Ch09.xhtml#_Fig53). Locating ADDM comparison reports
    in the EM12c database target interface


    Choosing a timeline that matches the scenario from [Figure 9-52](#9781430249382_Ch09.xhtml#Fig52)
    to grant us the clearest view of the problem is essential.


    As the Top Activity starts at 11:30 PM and is for a 30-minute period, the appropriate
    choice for an accurate comparison is to also match this in the ADDM Begin Time
    and set the End Time to 30 minutes later, resulting in an end-time “starting minute”
    of 11:59 PM.


    As the night of the activity is on a Saturday, and the goal is to know what has
    changed from the hour previously, we will compare it to the preceding period.


    [Figure 9-54](#9781430249382_Ch09.xhtml#Fig54) shows the resulting settings for
    the Comparison ADDM Report fields.


    ![9781430249382_Fig09-54.jpg](images/9781430249382_Fig09-54.jpg)


    [Figure 9-54](#9781430249382_Ch09.xhtml#_Fig54). Comparison timelines and baselines


    Clicking Run executes the ADDM comparison report. The report first indicates the
    commonality of the two timelines (see [Figure 9-55](#9781430249382_Ch09.xhtml#Fig55)).


    ![9781430249382_Fig09-55.jpg](images/9781430249382_Fig09-55.jpg)


    [Figure 9-55](#9781430249382_Ch09.xhtml#_Fig55). An ADDM comparison report, comparing
    the previous hour with an hour of higher usage


    Note that the duration of the comparison is for the entire 1-hour snapshot, even
    though time was entered for a half hour. If snapshot intervals are set to occur
    more often than the default (1 hour), the ADDM comparison will show results for
    the minimum number of snapshots required to cover the beginning and end time chosen.


    Inspecting the left-hand values in the graph, you must note that the average sessions
    shown is not a one-to-one representation between the graphs, but independent of
    each session to best demonstrate the data for each period used in the comparison.
    Each period graph also contains its own legend for wait event types, to the right
    of each graph.


    The bottom of each graph clearly shows the average active sessions, along with
    buttons at the top right to save or e-mail the graphs in HTML format.


    The Details pane in the bottom section of the ADDM comparison report is divided
    into three sections: Configuration, Finding, and Resource.


    Configuration


    The Configuration section of the ADDM comparison report presents information regarding
    physical configurations, parameter settings, and session parameters that may have
    impacted the difference in the periods compared (see [Figure 9-56](#9781430249382_Ch09.xhtml#Fig56)).


    ![9781430249382_Fig09-56.jpg](images/9781430249382_Fig09-56.jpg)


    [Figure 9-56](#9781430249382_Ch09.xhtml#_Fig56). The Configuration section of
    the ADDM comparison report, set to show All configuration values


    You can show just differences (by default) or show all configuration values. If
    a review of all configuration values is warranted, this does offer a quick review
    of the parameter settings and session values.


    Finding


    The Finding section presents each Performance Difference type, percentage of impact,
    and then the percentage of impact it created for each base period (see [Figure
    9-57](#9781430249382_Ch09.xhtml#Fig57)). Since these values can be positive for
    one period and negative for another, you should note the totals for the change
    impact and ensure that the change impact is clearly understood for the comparison
    period in case the problem was one that had escalated over multiple time periods.
    If escalation did occur, the change impact percentage could be misleading, and
    the overall impact to the environment over a larger period of time should be taken
    into consideration.


    ![9781430249382_Fig09-57.jpg](images/9781430249382_Fig09-57.jpg)


    [Figure 9-57](#9781430249382_Ch09.xhtml#_Fig57). Findings for the ADDM comparison
    report, showing both improvement and degradation in performance between the two
    periods of the comparison


    For each Performance Difference, detailed information is displayed below the Details
    pane. As performance regression was discovered for Top Segments by User I/O, the
    following findings resulted:


    *   Individual database segments responsible for significant User I/O and Cluster
    waits were found.

    *   Impact changed from 0.04 active sessions to 0.1 active sessions, by –5%.


    Resource


    The Resource detail reports on differences in CPU, memory, I/O, and interconnect
    (if RAC is involved). This data can be represented in either a graphical form,
    shown in [Figure 9-58](#9781430249382_Ch09.xhtml#Fig58), or in a tabular report,
    shown in [Figure 9-59](#9781430249382_Ch09.xhtml#Fig59).


    ![9781430249382_Fig09-58.jpg](images/9781430249382_Fig09-58.jpg)


    [Figure 9-58](#9781430249382_Ch09.xhtml#_Fig58). Tabular representation of detail
    data on memory differences between two ADDM timelines in a comparison report


    ![9781430249382_Fig09-59.jpg](images/9781430249382_Fig09-59.jpg)


    [Figure 9-59](#9781430249382_Ch09.xhtml#_Fig59). Graphical representation of detail
    data on I/O difference between two ADDM timelines in a comparison report


    With this detailed data, you can quickly assess that there was a 75 percent jump
    in memory usage and a significant difference in data-file single-block read latency
    between the two timelines used in the comparison.


    As with other reports in the EM12c interface, there is an option to save or e-mail
    an HTML report for later review or to retain for historical reference.


    Summary


    As the need for automating and optimizing the database and its environment increases,
    the importance of the Enterprise Manager 12c performance console will increase
    in demand as well. Top Activity will slowly migrate to ASH Analytics, with its
    robust, transparent, and effective reporting. The opportunities to gather data
    from a simple and efficient graphical interface and provide effective optimization
    recommendations and monitoring provide the clear direction for enterprise-level
    database control.


