    SQL patches, and SQL plan baselines. This pane is helpful in quickly determining
    whether a baseline is locking the plan into a potential suboptimal explain plan
    version, and whether a SQL profile or SQL patch is in place controlling the choice
    the optimizer makes for the SQL detailed in the pane. As with all tabs in the
    SQL Details page, you can easily execute a SQL worksheet or schedule a SQL Tuning
    Advisor from the bottom right of the panel.


    ![image](images/sq.jpg) **Note**  Because the SQL Tuning Advisor is so readily
    available and automated with nightly runs, SQL profiles are becoming database
    standards. This combination of hints, outlines, and stats, connected to a statement
    through its SQL ID, provides the DBA with a quick solution to nagging problems
    when complex issues exist in a process. As a SQL profile is connected only through
    the SQL ID, any change to the SQL statement stops the SQL profile from functioning.


    SQL Tuning History


    The Tuning History tab supports the Plan Control section of the SQL Details page,
    offering historical information regarding previous advisor tasks against the SQL
    detailed or any ADDM findings during the historic period in question. If a SQL
    Tuning task has been executed against the SQL ID, it will show in the history,
    and a link is available to view details on the findings, even if the plan was
    not implemented.


    SQL Monitoring


    The SQL Monitoring tab gives a micro-view of what is offered in the full SQL Monitor
    (covered in full detail later in this chapter). This grants a clear view of what
    SQL is being executed for the session, along with completed SQL in previous executions
    for the session involved, how long each execution elapsed, I/O requests, and start/finish
    times (see [Figure 9-20](#9781430249382_Ch09.xhtml#Fig20)).


    ![9781430249382_Fig09-20.jpg](images/9781430249382_Fig09-20.jpg)


    [Figure 9-20](#9781430249382_Ch09.xhtml#_Fig20). SQL Monitoring view of a data
    pump process


    Each of these tabs offers valuable information when inspecting a SQL statement
    for optimization opportunities, baseline information, explain plan stability,
    and resource usage. By utilizing this small section of the Top Activity page,
    the administrator can provide great insight quickly into any SQL statement captured.


    Top Sessions Pane


    Top Sessions encompasses the bottom-right pane of the Top Activity page by default.
    Although this section can be changed to display top information regarding services,
    modules, actions, clients, files, objects, or PL/SQL (see [Figure 9-21](#9781430249382_Ch09.xhtml#Fig21)),
    session information is the main data that is found most useful by administrators.


    ![9781430249382_Fig09-21.jpg](images/9781430249382_Fig09-21.jpg)


    [Figure 9-21](#9781430249382_Ch09.xhtml#_Fig21). Top Sessions of the Top Activity
    page, along with the drop-down list of other Top options


    In this pane, you can not only highlight wait events that are color coded to match
    the legend in the Top Activity graph, but also access links to each of the SIDs
    and usernames. The program executing the session is also displayed prominently
    to the right, helping to quickly distinguish the session.


    As this page is distinguished by session information, clicking any SID opens the
    Session Details page.


    Session Details Page'
  trans: '

    # Oracle 企业管理器云控制 12c 中的 SQL 详细信息页面


    ![image](img/sq.jpg) **提示** 如果您定期从 EM12c 控制台运行 SQL，最好确保已设置好`主机`和`数据库首选凭据`，以减少执行失败的问题。


    执行后，将返回以下信息：


    ```

    OWNER        OBJECT_NAME            OBJECT_TYPE          PROGRAM_LINE#


    USER1        GET_NEW_FUNC           FUNCTION             9

    ```


    以上信息显示了对象名称、对象类型和行号。此数据可用于快速识别代码中的问题所在。


    ## SQL 详细信息活动选项卡


    `SQL 详细信息活动`选项卡（如图 9-16 所示）提供了特定于 SQL 的`Top Activity`数据视图，除了目标`SQL ID`之外，消除了所有其他
    SQL 等待和 SQL 执行。可以将灰色区域移动到时间线内的任何位置，以突出显示 SQL 活动中的等待。由于这是 SQL 活动而非会话活动，详细信息页面底部显示了执行
    SQL 的会话，以及活动百分比、会话 ID（如果该会话是并行进程的一部分）、`QC SID`（包括执行 SQL 用户的所有并行会话）、SQL 所属的程序，以及
    SQL 是否有关联的计划哈希值。


    ![9781430249382_Fig09-16.jpg](img/9781430249382_Fig09-16.jpg)


    图 9-16. `SQL 详细信息`页面的`活动`选项卡


    您可以单击`SQL ID`并进入`SQL 详细信息`页面界面，从此窗格执行 HTML 版本的`AWR`或`ASH`报告，以进一步研究活动和数据库性能。


    ## SQL 统计信息


    `SQL 详细信息`页面中的第一个选项卡`统计信息`包含 SQL 统计数据。此视图（如图 9-17 所示）提供活动会话信息，按等待、时间、耗用时间（数据库时间与
    CPU 时间）、执行统计信息和游标统计信息细分活动。


    ![9781430249382_Fig09-17.jpg](img/9781430249382_Fig09-17.jpg)


    图 9-17. `SQL 详细信息`页面中的`统计信息`活动


    ## SQL 计划


    `计划`选项卡以图形或表格形式提供所详述`SQL ID`的实际执行计划。表格版本（如图 9-18 所示）如果 SQL 语句有多个可用的哈希计划值，则会提供下拉菜单。显示基本计划信息，如解析模式、优化器模式、语句来源和捕获时间。


    ![9781430249382_Fig09-18.jpg](img/9781430249382_Fig09-18.jpg)


    图 9-18. 来自`SQL 详细信息`页面的语句执行计划的表格表示


    在 EM12c 控制台版本的表格计划中，还在`优化成本`部分通过图例颜色提供了等待类型。您还可以查看行数（附带图表线以快速访问预期返回的行数）和字节数（同样以预期字节数的视觉指示器显示）。您可以单击`谓词`列中的任何指示器（在图
    9-18 中突出显示）以查看谓词和过滤器，以及有关该步骤的更详细信息。


    `SQL 详细信息`中的`计划`选项卡的图形版本提供了执行计划的可视化显示（参见图 9-19）。这是语句的逐步路径，通过 SQL 执行显示连接、循环和分组对象。


    ![9781430249382_Fig09-19.jpg](img/9781430249382_Fig09-19.jpg)


    图 9-19. 语句的图形化执行计划，展示了在控制台窗格中突出显示的合并连接


    当突出显示执行计划图形格式的部分时，会显示投影、确定的列连接，甚至布隆过滤器。图 9-19 右上角的按钮使您可以将显示从水平更改为垂直地图、执行重写或打印执行计划图形。左侧`图形`和`表格`单选按钮下方的缩放栏使您可以根据需要放大和缩小。


    ## SQL 计划控制


    `计划控制`选项卡可用于高级功能，如`SQL 配置文件`、`SQL 补丁`和`SQL 计划基线`。此窗格有助于快速确定基线是否将计划锁定在潜在的次优执行计划版本中，以及是否存在`SQL
    配置文件`或`SQL 补丁`在控制优化器为窗格中详细信息的 SQL 所做的选择。与`SQL 详细信息`页面中的所有选项卡一样，您可以从面板右下角轻松执行 SQL
    工作表或安排`SQL 调优顾问`。


    ![image](img/sq.jpg) **注意** 由于`SQL 调优顾问`非常易于使用且每晚自动运行，`SQL 配置文件`正成为数据库标准。这种提示、大纲和统计信息的组合，通过其`SQL
    ID`连接到语句，为 DBA 在流程存在复杂问题时解决棘手问题提供了快速解决方案。由于`SQL 配置文件`仅通过`SQL ID`连接，对 SQL 语句的任何更改都会导致`SQL
    配置文件`停止工作。


    ## SQL 调优历史记录


    `调优历史记录`选项卡支持`SQL 详细信息`页面的`计划控制`部分，提供有关针对所详述 SQL 的先前顾问任务或在相关历史时期内的任何`ADDM`发现的历史信息。如果已针对`SQL
    ID`执行了`SQL 调优`任务，它将在历史记录中显示，并且即使计划未实施，也有链接可用于查看有关发现的详细信息。


    ## SQL 监控


    `SQL 监控`选项卡提供了完整`SQL Monitor`（本章后面将详细介绍）中所提供内容的微观视图。这清晰地显示了会话正在执行的 SQL、会话涉及的先前执行中已完成的
    SQL、每次执行耗时多久、I/O 请求以及开始/完成时间（参见图 9-20）。


    ![9781430249382_Fig09-20.jpg](img/9781430249382_Fig09-20.jpg)


    图 9-20. 数据泵进程的`SQL 监控`视图


    在检查 SQL 语句以寻找优化机会、基线信息、执行计划稳定性和资源使用情况时，这些选项卡中的每一个都提供了宝贵的信息。通过利用`Top Activity`页面的这一小部分，管理员可以快速深入了解捕获的任何
    SQL 语句。


    ## Top Sessions 窗格


    默认情况下，`Top Sessions`窗格位于`Top Activity`页面的右下部分。虽然此部分可以更改为显示关于服务、模块、操作、客户端、文件、对象或`PL/SQL`的
    Top 信息（参见图 9-21），但会话信息是管理员认为最有用的主要数据。


    ![9781430249382_Fig09-21.jpg](img/9781430249382_Fig09-21.jpg)


    图 9-21. `Top Activity`页面的`Top Sessions`，以及`其他 Top 选项`的下拉列表


    在此窗格中，您不仅可以突出显示与`Top Activity`图中图例颜色编码匹配的等待事件，还可以访问每个`SID`和用户名的链接。执行会话的程序也显著显示在右侧，有助于快速区分会话。


    由于此页面按会话信息区分，单击任何`SID`将打开`会话详细信息`页面。


    ## 会话详细信息页面

    '
- fmt: '## Session Details 页面概览


    Session Details 页面与 SQL Details 页面不同，它在会话级别分解数据。此页面的标签页包括：General、Activity、Statistics、Open
    Cursors、Blocking Tree、Wait Event History、Parallel SQL 和 SQL Monitoring。与 SQL Details
    页面类似，Session Details 页面默认显示 Activity 标签页，如[图 9-22](#9781430249382_Ch09.xhtml#Fig22)所示。


    ![9781430249382_Fig09-22.jpg](images/9781430249382_Fig09-22.jpg)


    **[图 9-22](#9781430249382_Ch09.xhtml#_Fig22). Session Details 页面，显示由 SID 执行的活动查询**


    ### Activity 标签页


    Activity 标签页通过颜色显示会话的等待活动，并在图例右侧显示等待类型。从页面的右上角，您可以启用跟踪、终止会话以及更改图表的刷新间隔。页面底部显示有关
    5 分钟时间间隔的信息（在图表时间线中以灰色高亮显示），以及 SQL ID。该 SQL ID 链接到高亮时间线内正在执行语句的 SQL Details 页面，还包括执行计划哈希值和模块信息。如果在
    5 分钟窗口内执行了多个语句，所有 SQL ID 都将显示在该间隔的详细部分。


    ### General 标签页


    如[图 9-23](#9781430249382_Ch09.xhtml#Fig23)所示的 General 标签页，显示了从 Top Activity 页面获取的关于该会话的所有信息。Session
    Details 页面与 SQL Details 页面一样，可以通过 EM12c 控制台内的多种方式访问，从而能够快速地从性能页面跳转到控制台，以获取特定会话的数据。


    ![9781430249382_Fig09-23.jpg](images/9781430249382_Fig09-23.jpg)


    **[图 9-23](#9781430249382_Ch09.xhtml#_Fig23). Session Details 页面中的 General 信息**


    Session Details 页面（如[图 9-24](#9781430249382_Ch09.xhtml#Fig24)所示）显示服务器级信息，包括操作系统进程
    ID、客户端信息、应用程序、发生的任何阻塞以及等待。另一部分包含并行执行信息。


    ![9781430249382_Fig09-24.jpg](images/9781430249382_Fig09-24.jpg)


    **[图 9-24](#9781430249382_Ch09.xhtml#_Fig24). Session Details General 页面中的阻塞会话**


    ### Statistics 标签页


    Statistics 标签页显示关于会话的所有统计信息，包括物理和逻辑等待、详细的 CPU 使用率信息、Gets 和缓冲区信息。[表 9-1](#9781430249382_Ch09.xhtml#Tab1)显示了
    Statistics 标签页的详细信息。


    **[表 9-1](#9781430249382_Ch09.xhtml#_Tab1). Session Details 页面 Statistics 标签页上的详细信息**


    ![Table9-1.jpg](images/Table9-1.jpg)


    Statistics 标签页不提供向下钻取或链接，但它提供了启用跟踪以收集更深层会话级数据或终止会话的选项。


    ### Open Cursors 标签页


    如[图 9-25](#9781430249382_Ch09.xhtml#Fig25)所示的 Open Cursors 标签页，对于识别会话中的游标或互斥锁级别的性能问题非常有帮助。该窗格快速显示游标及其计数，以
    SQL ID 为首，该 SQL ID 将再次链接到 SQL Details 页面以识别游标 SQL 中的任何问题。


    ![9781430249382_Fig09-25.jpg](images/9781430249382_Fig09-25.jpg)


    **[图 9-25](#9781430249382_Ch09.xhtml#_Fig25). Session Details 页面中正在进行进程的打开游标**


    会话 ID 和用户名在左上角显著显示。跟踪或终止会话的选项再次出现在右上角和右下角。


    ### Blocking 标签页


    Blocking 标签页显示环境中可能处于活动状态的任何阻塞会话的信息。由于阻塞信息的复杂性，此标签页可能需要较长时间才能显示，但窗格中发现的数据非常有价值。


    ### Wait Event History 标签页


    如[图 9-26](#9781430249382_Ch09.xhtml#Fig26)所示的 Wait Event History 标签页，显示等待事件信息，最近的等待事件在顶部。显示的内容包括等待类别、实际的等待事件以及
    P1、P2 和 P3 文本，所有这些都链接到关于等待信息的详细数据（源自 `dba_hist_active_sess_history` 的数据）。跟踪或终止会话的选项再次在右侧的顶部和底部提供。


    ![9781430249382_Fig09-26.jpg](images/9781430249382_Fig09-26.jpg)


    **[图 9-26](#9781430249382_Ch09.xhtml#_Fig26). Session Details 页面 Wait Event History
    标签页中的等待信息**


    ### Parallel SQL 标签页


    Parallel SQL 标签页显示会话参与的任何并行执行信息的数据——包括会话是属于协调器还是从属进程，如果是从属进程，则属于并行进程的生产者还是消费者。


    ### SQL Monitoring 标签页


    SQL Monitoring 标签页仅适用于 Oracle Database 11g Release 1 版本的命令行数据和 11g Release 2 版本的
    HTML 格式报告。在未设置或不可用此功能的环境中，此标签页会显示为灰色。


    ## ASH Analytics


    在 EM12c 控制台的性能页面中，Top Activity 区域为经验丰富的管理员（具有先前 Enterprise Manager 经验）提供了用户友好的界面，并提供了新的详细信息以协助解决会话和
    SQL 性能问题。


    ASH Analytics 是管理员们在 Enterprise Manager Top Activity 图表中一直未能找到的、用于跨多个维度分析性能的功能。ASH
    Analytics 的引入旨在以先前未提供的可视化格式提供活动会话历史数据。该功能提供递归向下钻取、堆叠图或树状图视图，以及将当前报告数据与其他 ASH 报告合并到协作视图中的能力。


    > **注意**：ASH Analytics 默认不安装。必须安装 `ASH_VIEWER` 包才能使用 ASH Analytics 视图。数据库必须是 11g
    版本或更高版本。安装在许多 10g 实例上可能会成功，但屏幕上不会显示数据，因为所需的活动会话历史记录将不可用以填充图表。


    主要的 ASH Analytics 屏幕显示按平均活动会话 (AAS) 排列的数据，通过图表或负载图查看。在主要性能视图中存在大量向下钻取的机会，允许调查不同的研究领域。


    ASH Analytics 主页面的上部显示（如[图 9-27](#9781430249382_Ch09.xhtml#Fig27)所示）可以更改为按小时、天、周或月显示数据。或者，您可以自定义显示以显示与监控任务更相关的数据。


    ![9781430249382_Fig09-27.jpg](images/9781430249382_Fig09-27.jpg)


    **[图 9-27](#9781430249382_Ch09.xhtml#_Fig27). ASH Analytics 主性能图表**


    > **注意**：如果为 ASH Analytics 选择“最大值”显示类型，数据的显示方式将与其他等待事件类型通常的显示方式不同。请确保您了解选择“最大值”将如何影响图表和负载图中的数据分散情况，以免发生不准确的诊断。


    能够将 ASH Analytics 数据本地保存到文件或通过电子邮件发送 HTML 报告是有价值的选项，如果您需要保留数据或向团队的关键成员提供信息。从主视图中，您还可以将窗口扩展到全屏并更改刷新间隔。时间线左右两侧的箭头使您能够轻松地导航到更早或更晚的时间线（如果刷新已停止）。


    窗口中灰色高亮的部分（如[图 9-27](#9781430249382_Ch09.xhtml#Fig27)所示）能快速吸引管理员的视线，进一步将 5 分钟的
    ASH 数据样本详细描述到图表中，包括等待事件，并默认显示“等待类别”事件。'
  raw: 'The Session Details page, unlike the SQL Details page, breaks down data at
    the session level. The tabs for this page are General, Activity, Statistics, Open
    Cursors, Blocking Tree, Wait Event History, Parallel SQL, and SQL Monitoring.
    Just as with the SQL Details page, the Session Details page defaults to the Activity
    tab, shown in [Figure 9-22](#9781430249382_Ch09.xhtml#Fig22).


    ![9781430249382_Fig09-22.jpg](images/9781430249382_Fig09-22.jpg)


    [Figure 9-22](#9781430249382_Ch09.xhtml#_Fig22). Session Details page, showing
    an active query execution by SID


    The Activity tab shows the wait activity of the session, by color, along with
    the type of wait in a legend to the right side of the graph. From the right-hand
    corner of the page, you can enable tracing or kill the session, along with changing
    the refresh interval of the graph. At the bottom of the page is information regarding
    the 5-minute interval, highlighted in gray within the graph timeline, along with
    the SQL ID, which links to the SQL Details page for the statement executing during
    the timeline highlighted, along with the plan hash value and module information.
    If more than one statement is executed during the 5-minute window, all SQL IDs
    will be displayed in the detailed section for the interval.


    The General tab, shown in [Figure 9-23](#9781430249382_Ch09.xhtml#Fig23), displays
    all information regarding the session from the Top Activity page. The Session
    Details page, as with the SQL Details page, can be reached numerous ways from
    within the EM12c console, providing quick access from performance pages to the
    console to provide data about specific sessions.


    ![9781430249382_Fig09-23.jpg](images/9781430249382_Fig09-23.jpg)


    [Figure 9-23](#9781430249382_Ch09.xhtml#_Fig23). General information in the Session
    Details page


    The Session Details page, shown in [Figure 9-24](#9781430249382_Ch09.xhtml#Fig24),
    displays the server-level information, including the OS process ID (PID), the
    client information, the application, any blocking that has occurred, and waits.
    Another section includes parallel execution information.


    ![9781430249382_Fig09-24.jpg](images/9781430249382_Fig09-24.jpg)


    [Figure 9-24](#9781430249382_Ch09.xhtml#_Fig24). Blocking session for a Session
    Details General page


    The Statistics tab displays all statistical information regarding the session,
    physical and logical waits, detailed CPU usage information, gets, and buffer information.
    [Table 9-1](#9781430249382_Ch09.xhtml#Tab1) shows detailed Statistics tab information.


    [Table 9-1](#9781430249382_Ch09.xhtml#_Tab1). Detailed Information on the Statistics
    Tab from the Session Details Page


    ![Table9-1.jpg](images/Table9-1.jpg)


    The Statistics tab contains no drill-downs or links, but it does offer the opportunity
    to enable tracing to collect deeper session-level data or to kill the session.


    The Open Cursors tab, shown in [Figure 9-25](#9781430249382_Ch09.xhtml#Fig25),
    is extremely helpful in identifying cursor- or mutex-level performance issues
    in a session. The pane quickly displays the cursor and count, led by the SQL ID,
    which will again link to the SQL Details page to identify any issues in the cursor
    SQL.


    ![9781430249382_Fig09-25.jpg](images/9781430249382_Fig09-25.jpg)


    [Figure 9-25](#9781430249382_Ch09.xhtml#_Fig25). Open cursors for ongoing processes
    from the Session Details page


    The session ID and username are displayed prominently in the upper-left corner.
    The options to either trace or kill the session are, again, available at the upper-right
    and lower-right corners.


    The Blocking tab displays information about any blocking sessions that may be
    active in the environment. Because of the complexity of blocking information,
    this tab can take an extended time to display, but the data found in the pane
    is quite valuable.


    The Wait Event History tab, shown in [Figure 9-26](#9781430249382_Ch09.xhtml#Fig26),
    displays the wait event information, with the most recent wait event at the top.
    Displayed are the wait class, the actual wait event, and the P1, P2, and P3 text,
    all linking to detailed data about the wait information (data resulting from dba_hist_active_sess_history).
    The option to trace or kill the session is again offered at the top and bottom
    of the right-hand side.


    ![9781430249382_Fig09-26.jpg](images/9781430249382_Fig09-26.jpg)


    [Figure 9-26](#9781430249382_Ch09.xhtml#_Fig26). Wait information from the Session
    Details page’s Wait Event History tab


    The Parallel SQL tab shows data regarding any parallel execution information the
    session is involved in—including whether the session belongs to the coordinator
    or a slave, and if a slave, the producer or consumer of the parallel process.


    The SQL Monitoring tab is available only for Oracle Database versions 11g Release
    1 for the command-line data, and 11g Release 2 for the HTML version of the reports.
    This tab appears grayed out in environments that do not have this feature set
    up or available.


    The Top Activity area of the performance pages in the EM12c console has a user-friendly
    interface for the seasoned administrator with previous Enterprise Manager experience
    and new, detailed information to assist with session and SQL performance issues.


    ASH Analytics


    Analyzing performance across multiple dimensions is a capability that administrators
    have searched for in the Enterprise Manager Top Activity graphs without success.
    ASH Analytics was introduced to offer Active Session History data in a visual
    format that previously wasn’t offered. The feature offers recursive drill-downs,
    stacked chart or tree map views, and the ability to incorporate the current report
    data into a collaborative view with other ASH reporting.


    ![image](images/sq.jpg) **Note**  ASH Analytics is not installed by default. The
    ASH_VIEWER package must be installed to use the ASH Analytics view. The database
    must be an 11g version or higher. An installation will be successful on many 10g
    instances, but no data will be displayed on the screen, as the required Active
    Session History will not be available to fulfill the graphs.


    The main ASH Analytics screen shows data displayed by Average Active Sessions
    (AAS), viewed by graph or load map. Numerous drill-down opportunities exist in
    the main performance view, allowing for distinct research areas to be investigated.


    The upper display of the ASH Analytics main page, shown in [Figure 9-27](#9781430249382_Ch09.xhtml#Fig27),
    can be changed to display data by hour, day, week, or month. Alternatively, you
    can customize the display to show more-pertinent data to the monitoring task.


    ![9781430249382_Fig09-27.jpg](images/9781430249382_Fig09-27.jpg)


    [Figure 9-27](#9781430249382_Ch09.xhtml#_Fig27). ASH Analytics main performance
    graph


    ![image](images/sq.jpg) **Note**  If choosing the Max display type for ASH Analytics,
    the data will be displayed differently than how other wait event types commonly
    would be displayed. Ensure that you understand how  choosing Max will impact the
    data dispersion in the graph and load map so that an inaccurate diagnosis does
    not occur.


    Being able to save ASH Analytics data locally to a file or to e-mail an HTML report
    are valuable options if you need to retain the data or provide information to
    key members of the team. From the main view, you can also expand the window to
    full screen and change the refresh interval. Arrows at the left and right of the
    timeline enable you to easily maneuver to earlier timelines or future ones if
    refreshes have been stopped.


    The gray highlighted section in the window, as shown in [Figure 9-27](#9781430249382_Ch09.xhtml#Fig27),
    quickly draws the administrator’s eye down, further detailing a 5-minute sample
    of ASH data to the graph, including wait events and defaulting with Wait Class
    events.'
  trans: '

    ## 会话详情页面概览


    会话详情页面与 SQL 详情页面不同，它在会话级别分解数据。此页面的标签页包括：常规、活动、统计信息、打开的游标、阻塞树、等待事件历史、并行 SQL 和 SQL
    监控。与 SQL 详情页面类似，会话详情页面默认显示活动标签页，如图 9-22 所示。


    ![9781430249382_Fig09-22.jpg](img/9781430249382_Fig09-22.jpg)


    **图 9-22. 会话详情页面，显示由 SID 执行的活动查询**


    ### 活动标签页


    活动标签页通过颜色显示会话的等待活动，并在图例右侧显示等待类型。从页面的右上角，您可以启用跟踪、终止会话以及更改图表的刷新间隔。页面底部显示有关 5 分钟时间间隔的信息（在图表时间线中以灰色高亮显示），以及
    SQL ID。该 SQL ID 链接到高亮时间线内正在执行语句的 SQL 详情页面，还包括执行计划哈希值和模块信息。如果在 5 分钟窗口内执行了多个语句，所有
    SQL ID 都将显示在该间隔的详细部分。


    ### 常规标签页


    如图 9-23 所示的常规标签页，显示了从顶部活动页面获取的关于该会话的所有信息。会话详情页面与 SQL 详情页面一样，可以通过 EM12c 控制台内的多种方式访问，从而能够快速地从性能页面跳转到控制台，以获取特定会话的数据。


    ![9781430249382_Fig09-23.jpg](img/9781430249382_Fig09-23.jpg)


    **图 9-23. 会话详情页面中的常规信息**


    会话详情页面（如图 9-24 所示）显示服务器级信息，包括操作系统进程 ID、客户端信息、应用程序、发生的任何阻塞以及等待。另一部分包含并行执行信息。


    ![9781430249382_Fig09-24.jpg](img/9781430249382_Fig09-24.jpg)


    **图 9-24. 会话详情常规页面中的阻塞会话**


    ### 统计信息标签页


    统计信息标签页显示关于会话的所有统计信息，包括物理和逻辑等待、详细的 CPU 使用率信息、Gets 和缓冲区信息。表 9-1 显示了统计信息标签页的详细信息。


    **表 9-1. 会话详情页面统计信息标签页上的详细信息**


    ![Table9-1.jpg](img/Table9-1.jpg)


    统计信息标签页不提供向下钻取或链接，但它提供了启用跟踪以收集更深层会话级数据或终止会话的选项。


    ### 打开的游标标签页


    如图 9-25 所示的打开的游标标签页，对于识别会话中的游标或互斥锁级别的性能问题非常有帮助。该窗格快速显示游标及其计数，以 SQL ID 为首，该 SQL
    ID 将再次链接到 SQL 详情页面以识别游标 SQL 中的任何问题。


    ![9781430249382_Fig09-25.jpg](img/9781430249382_Fig09-25.jpg)


    **图 9-25. 会话详情页面中正在进行进程的打开游标**


    会话 ID 和用户名在左上角显著显示。跟踪或终止会话的选项再次出现在右上角和右下角。


    ### 阻塞标签页


    阻塞标签页显示环境中可能处于活动状态的任何阻塞会话的信息。由于阻塞信息的复杂性，此标签页可能需要较长时间才能显示，但窗格中发现的数据非常有价值。


    ### 等待事件历史标签页


    如图 9-26 所示的等待事件历史标签页，显示等待事件信息，最近的等待事件在顶部。显示的内容包括等待类别、实际的等待事件以及 P1、P2 和 P3 文本，所有这些都链接到关于等待信息的详细数据（源自
    `dba_hist_active_sess_history` 的数据）。跟踪或终止会话的选项再次在右侧的顶部和底部提供。


    ![9781430249382_Fig09-26.jpg](img/9781430249382_Fig09-26.jpg)


    **图 9-26. 会话详情页面等待事件历史标签页中的等待信息**


    ### 并行 SQL 标签页


    并行 SQL 标签页显示会话参与的任何并行执行信息的数据——包括会话是属于协调器还是从属进程，如果是从属进程，则属于并行进程的生产者还是消费者。


    ### SQL 监控标签页


    SQL 监控标签页仅适用于 Oracle Database 11g Release 1 版本的命令行数据和 11g Release 2 版本的 HTML 格式报告。在未设置或不可用此功能的环境中，此标签页会显示为灰色。


    ## ASH 分析


    在 EM12c 控制台的性能页面中，顶部活动区域为经验丰富的管理员（具有先前 Enterprise Manager 经验）提供了用户友好的界面，并提供了新的详细信息以协助解决会话和
    SQL 性能问题。


    ASH 分析是管理员们在 Enterprise Manager 顶部活动图表中一直未能找到的、用于跨多个维度分析性能的功能。ASH 分析的引入旨在以先前未提供的可视化格式提供活动会话历史数据。该功能提供递归向下钻取、堆叠图或树状图视图，以及将当前报告数据与其他
    ASH 报告合并到协作视图中的能力。


    > **注意**：ASH 分析默认不安装。必须安装 `ASH_VIEWER` 包才能使用 ASH 分析视图。数据库必须是 11g 版本或更高版本。安装在许多
    10g 实例上可能会成功，但屏幕上不会显示数据，因为所需的活动会话历史记录将不可用以填充图表。


    主要的 ASH 分析屏幕显示按平均活动会话 (AAS) 排列的数据，通过图表或负载图查看。在主要性能视图中存在大量向下钻取的机会，允许调查不同的研究领域。


    ASH 分析主页的上部显示（如图 9-27 所示）可以更改为按小时、天、周或月显示数据。或者，您可以自定义显示以显示与监控任务更相关的数据。


    ![9781430249382_Fig09-27.jpg](img/9781430249382_Fig09-27.jpg)


    **图 9-27. ASH 分析主性能图表**


    > **注意**：如果为 ASH 分析选择“最大值”显示类型，数据的显示方式将与其他等待事件类型通常的显示方式不同。请确保您了解选择“最大值”将如何影响图表和负载图中的数据分散情况，以免发生不准确的诊断。


    能够将 ASH 分析数据本地保存到文件或通过电子邮件发送 HTML 报告是有价值的选项，如果您需要保留数据或向团队的关键成员提供信息。从主视图中，您还可以将窗口扩展到全屏并更改刷新间隔。时间线左右两侧的箭头使您能够轻松地导航到更早或更晚的时间线（如果刷新已停止）。


    窗口中灰色高亮的部分（如图 9-27 所示）能快速吸引管理员的视线，进一步将 5 分钟的 ASH 数据样本详细描述到图表中，包括等待事件，并默认显示“等待类别”事件。

