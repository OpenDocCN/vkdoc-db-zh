    \ when making the choice:\n\n*   If you allow jobs to continue to run during the\
    \ blackout and the target becomes unavailable at the very end of the job, when\
    \ the target agent would send a successful execution code back to the Jobs Service,\
    \ the job will continue to show as running, and any subsequent runs of the job\
    \ will be skipped.\n*   If you stop jobs from running during the entire blackout,\
    \ jobs will be skipped during that blackout. If the job is set to notify on Action\
    \ Required, notifications will be sent for every scheduled job that is skipped.\n\
    \nAs blackouts are also issued as jobs, but run in the background, you can view\
