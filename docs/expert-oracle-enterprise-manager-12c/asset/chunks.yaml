    and Fusion Applications) come out of the box with EM12c, in addition to capabilities
    for managing your own custom-built or third-party applications.

    *   *Application performance management*: EM12c delivers end-to-end monitoring
    of your applications, including real-user monitoring via Real User Experience
    Insight (RUEI) as well as synthetic-transaction monitoring via Service Level Management
    beacons. Other functionality introduced here includes the ability to monitor and
    trace business transactions, topology discovery, and Java and database monitoring
    and diagnostics.

    *   *Application quality management (AQM)*: Three areas of testing are provided—application
    testing via the Application Testing Suite product, infrastructure testing via
    Real Application Testing and Application Replay, and test data management functionality
    that includes test system creation, data masking, and data subsetting technologies.

    *   *Hardware and virtualization management*: Complete lifecycle management is
    offered for both physical and virtual environments, including provisioning, patching,
    configuration management, administration, and monitoring. This includes managing
    systems running on Linux, Unix, Windows, and Oracle Virtualization Server (Oracle
    VM Server) operating systems, as well as providing insight into the server, network,
    and storage layers for systems built on top of Oracle Sun hardware.

    *   *Heterogeneous (non-Oracle) management*: Supplying a range of extensions known
    as connectors and plug-ins (among others), EM12c provides capabilities to manage
    non-Oracle technology in addition to Oracle environments. These extensions could
    be built by Oracle, partners, or even customers themselves. They are based on
    the same management framework as the rest of the EM12c product, and so can be
    downloaded, imported, and deployed by the Self Update mechanism.


    Coverage of all these focus areas adds up to a robust product for managing the
    complete data center. The rest of this book drills into the details of many of
    these areas. The remainder of this chapter introduces you to the basic architecture
    that you need to understand before delving further into the wonders of EM12c.


    Architecture Overview


    From an architectural perspective, EM12c is composed of five main parts:


    *   Cloud Control console

    *   Oracle Management Agent

    *   Oracle Management Service

    *   Oracle Management Repository

    *   Plug-ins


    Let’s look at each of these in more detail.


    ![image](images/sq.jpg) **Note**  A discussion of the licensing for EM12c is beyond
    the scope of this book. (An entire licensing document is available in the Enterprise
    Manager documentation at [http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm](http://docs.oracle.com/cd/E24628_01/license.121/e24474/toc.htm).)
    However, it’s worth noting that, in general, most of the basic functionality described
    here carries a restricted-use license and therefore is free. This restricted-use
    license refers specifically to Enterprise Manager, however, and many add-on options
    do come with license costs. Refer to the licensing documentation for full details.


    The Cloud Control Console


    The *Cloud Control console* provides the user interface that you use to access,
    monitor, and administer your computing environment. The console is accessed via
    a web browser, thus allowing you to access the central console from any location.
    You can customize the EM12c console much more than in previous releases, allowing
    you the following options:


    *   Choosing your home page from various predefined pages (or indeed setting any
    page you want to be your personal home page)

    *   Moving regions around on a target home page

    *   Adding regions that might be of more interest to you than the defaults

    *   Deleting regions that aren’t of interest to you


    The graphical user interface (GUI) provides a history of the most recent targets
    you have visited (the standard browser history is also available). In addition,
    you can  mark pages as favorites and have them appear in a favorites list on the
    new menu-driven interface. [Figure 1-1](#9781430249382_Ch01.xhtml#Fig1) shows
    an example of the default home page.


    ![9781430249382_Fig01-01.jpg](images/9781430249382_Fig01-01.jpg)


    [Figure 1-1](#9781430249382_Ch01.xhtml#_Fig1). The new default home page in EM12c


    Oracle Management Agents


    An *Oracle Management Agent* (usually referred to as simply an *agent* or abbreviated
    to *OMA*) is generally installed on each host that is monitored in your computing
    environment. (EM12c also introduces the capability to manage environments remotely
    in some cases.) These agents are deployed from the console (see [Figure 1-2](#9781430249382_Ch01.xhtml#Fig2)),
    and then monitor all the targets that have been discovered by the agents. They
    are used to control blackouts on those targets, execute jobs, collect metrics,
    and so forth, and in turn provide details such as availability, metrics, and job
    statuses back to the Oracle Management Service.


    ![9781430249382_Fig01-02.jpg](images/9781430249382_Fig01-02.jpg)


    [Figure 1-2](#9781430249382_Ch01.xhtml#_Fig2). User interface for managing agents
    within EM12c


    For the EM12c release, agents were completely rewritten from the ground up for
    greater reliability, availability, and performance (see the upcoming section on
    plug-ins for details of how this was achieved). The only downside of this change
    is that you must use an EM12c agent to talk to the EM12c Oracle Management Service.
    Backward compatibility between 12c and earlier agents was lost because of the
    number of changes that were made in the new release.


    Oracle Management Service


    The *Oracle Management Service (OMS)* is a web-based application that communicates
    with the agents and the Oracle Management Repository to collect and store information
    about all the targets on the various agents. (Note that the information itself
    is stored in the Oracle Management Repository, not the OMS.) The OMS is also responsible
    for rendering the user interface for the console.'
