  raw: '*   *HTTP*: An HTTP storage location represents a base URL that acts as the
    source of files that can be referenced.

    *   *NFS*: An NFS storage location represents an exported filesystem directory
    on a server. The server does not need to be the OEM host target.

    *   *Agent*: An agent storage location is similar to the OMS Agent Filesystem
    option, but an OEM agent can monitor any host. The agent can be configured to
    serve the files located on that host.


    To configure the Software Library, you need to decide on the upload file location.
    In many of the configurations I have done, I use the OMS Shared Filesystem for
    the Software Library, because it is simple to set up and is local to the OMS.
    Let’s take a look at how to set up this type of share for the Software Library.


    ![image](images/sq.jpg) **Note**  When setting up the Software Library, no matter
    the type of location you use, the question of size comes to mind. How large is
    the Software Library supposed to be? What do I need to preallocate for the Software
    Library? You should allocate as much space as you think is going to be used. I’ve
    always recommended a starting size between 5GB and 50GB. This is due to the agent
    software needing to be downloaded into the Software Library before deployment.


    To access the Software Library Administration console, you choose Setup ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Software Library. [Figure
    6-2](#9781430249382_Ch06.xhtml#Fig2) shows the menu path to this location.


    ![9781430249382_Fig06-02.jpg](images/9781430249382_Fig06-02.jpg)


    [Figure 6-2](#9781430249382_Ch06.xhtml#_Fig2). Accessing the Software Library
    from the Setup menu


    In the Software Library Administration console, you will immediately see two tabs
    that help you distinguish between the upload locations on the OMS and the referenced
    locations. To set up an OMS Shared Filesystem location, you need to stay on the
    Upload File Locations tab. Here, the Storage Type drop-down menu gives you the
    option of either an OMS Shared Filesystem or an Agent Shared Filesystem (see [Figure
    6-3](#9781430249382_Ch06.xhtml#Fig3)).


    ![9781430249382_Fig06-03.jpg](images/9781430249382_Fig06-03.jpg)


    [Figure 6-3](#9781430249382_Ch06.xhtml#_Fig3). Software Library Administration
    console


    Now, because you are going to use the OMS Shared Filesystem for our Software Library,
    you need to ensure that you have a location on the local host to store the Software
    Library. Once this directory structure has been identified, you can add the filesystem
    to OEM. While in the Software Library Administration console, click the Add menu
    option. This opens a dialog box that allows you to name the Software Library and
    identify the location on the OMS server (see [Figure 6-4](#9781430249382_Ch06.xhtml#Fig4)).


    ![9781430249382_Fig06-04.jpg](images/9781430249382_Fig06-04.jpg)


    [Figure 6-4](#9781430249382_Ch06.xhtml#_Fig4). Adding an OMS Shared Filesystem
    location


    Click the OK button, and the creation of the Software Library begins. The library
    lists the location that you created with the Add menu command and the status of
    library, as shown in [Figure 6-5](#9781430249382_Ch06.xhtml#Fig5).


    ![9781430249382_Fig06-05.jpg](images/9781430249382_Fig06-05.jpg)


    [Figure 6-5](#9781430249382_Ch06.xhtml#_Fig5). Software Library name, status,
    and location


    As I mentioned earlier, if you were to go and look at the location where the Software
    Library populates its initial entries, you would see only a bunch of folders with
    numbers. This is designed to keep the Software Library clean and prevent anyone
    from modifying the library from outside OEM. [Figure 6-6](#9781430249382_Ch06.xhtml#Fig6)
    gives an example of the file structure.


    ![9781430249382_Fig06-06.jpg](images/9781430249382_Fig06-06.jpg)


    [Figure 6-6](#9781430249382_Ch06.xhtml#_Fig6). Software Library file structure


    At this point, you have walked through how easy it is to configure the Software
    Library within EM12c. Once the library is complete, it is ready to be used for
    all the software entities that you configured it for. A good first test of the
    Software Library is to download the agent software that you will need for your
    enterprise systems. Agent software download and installation was covered in [Chapter
    2](#9781430249382_Ch02.xhtml).


    Using Software Library Entities


    Now that the Software Library is configured, you want to use the entities that
    can be found in the library. To do this, you need to access the Software Library
    home page by choosing Enterprise ![arrow](images/arrow.jpg) Provisioning and Patching
    ![arrow](images/arrow.jpg) Software Library, as shown in [Figure 6-7](#9781430249382_Ch06.xhtml#Fig7).


    ![9781430249382_Fig06-07.jpg](images/9781430249382_Fig06-07.jpg)


    [Figure 6-7](#9781430249382_Ch06.xhtml#_Fig7). Software Library home page


    When working with entities in the Software Library, it is important to remember
    that there are two, broadly classified types: Oracle-owned entities and custom
    entities. Each entity has its own purpose and usage within the Software Library.
    [Table 6-1](#9781430249382_Ch06.xhtml#Tab1) describes these entity types.


    [Table 6-1](#9781430249382_Ch06.xhtml#_Tab1). Entities in the Software Library


    | Types | Description |

    | --- | --- |

    | Oracle-owned entities | These entities are available by default on the Software
    Library home page, once the Software Library is configured. |

    | Custom entities | The Software Library users create these entities. |


    Numerous lifecycle management tasks make use of the entities in the Software Library.
    Such tasks include patching and provisioning deployment procedures, which are
    covered later in this chapter. [Figure 6-8](#9781430249382_Ch06.xhtml#Fig8) shows
    how patching and provisioning deployment procedures use the Software Library.


    ![9781430249382_Fig06-08.jpg](images/9781430249382_Fig06-08.jpg)


    [Figure 6-8](#9781430249382_Ch06.xhtml#_Fig8). Patching and provisioning deployment
    procedures using the Software Library


    Performing Tasks via the Software Library Home Page


    When on the Software Library home page, it is helpful and handy to work with entities
    that are available to the Software Library user. The tasks that can be performed
    from the library home page are as follows:


    *   Organizing entities

    *   Creating entities

    *   Customizing entities

    *   Managing entities


    As you look at these tasks, keep in mind that managing entities within the Software
    Library is initially simple. However, depending on the complexity of your organization
    and environment, the Software Library can become time-consuming to maintain. Knowing
    what the Software Library will be used for will help simplify maintenance tasks.


    Organizing Entities


    Organizing entities within the Software Library is simply a process of creating
    folders within the library. The folder structure can be as simple or as complex
    as your organization would like to make it. [Figure 6-9](#9781430249382_Ch06.xhtml#Fig9)
    shows an example.


    ![9781430249382_Fig06-09.jpg](images/9781430249382_Fig06-09.jpg)


    [Figure 6-9](#9781430249382_Ch06.xhtml#_Fig9). Software Library home page


    From the Actions menu on the menu bar, you choose Create Folder, as shown in [Figure
    6-10](#9781430249382_Ch06.xhtml#Fig10). Note that additional commands from this
    menu are grayed out. These commands can be performed on existing folders after
    they are created. For now, let’s focus on the Create Folder command.


    ![9781430249382_Fig06-10.jpg](images/9781430249382_Fig06-10.jpg)


    [Figure 6-10](#9781430249382_Ch06.xhtml#_Fig10). Create Folder menu command'
