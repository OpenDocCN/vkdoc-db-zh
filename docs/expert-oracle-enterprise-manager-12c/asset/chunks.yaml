    \ The default value of the failback is set to 0, which means that the `VIP` and\
    \ its dependent resources will not automatically fail back to the original node\
    \ after it becomes available again.\n\n[⁵](#9781430249382_Ch13.xhtml#_Fn5) `Oracle\
    \ Restart` is the single-instance high-availability feature of Oracle Database\
    \ 11gR2. It provides high availability by restarting database instances, services,\
    \ and listeners in the event of a failure. It also restarts the database components\
    \ on bootup of the server.\n\n[⁶](#9781430249382_Ch13.xhtml#_Fn6) `Protection\
    \ mode` refers to the accepted potential data loss in event of primary database\
    \ failure. The three available modes are Maximum Performance, Maximum Availability,\
