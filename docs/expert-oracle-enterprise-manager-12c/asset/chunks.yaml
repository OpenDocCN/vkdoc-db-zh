- fmt: "*   The plug-ins should be a comma-separated list of this format:\n\n```\n\
    <plugin-id>=<plugin-version>,<plugin-id>=<plugin-version>,...\n```\n\n*   A query\
    \ such as the following can be used to extract the plug-ins in the required format:\n\
    \n```\nSELECT listagg(epv.plugin_id||'='||epv.version,',')\n        within group\
    \ (order by epv.plugin_id)\nFROM em_plugin_version epv, em_current_deployed_plugin\
    \ ecp\nWHERE epv.plugin_type NOT IN ( 'BUILT_IN_TARGET_TYPE' , 'INSTALL_HOME')\n\
    \        AND ecp.dest_type='2'\n        AND epv.plugin_version_id = ecp.plugin_version_id;\n\
    ```\n\n*   The results of the query can then be used as the `plugins` argument\
    \ in `pluginca`:\n\n```\n$ $OMS_HOME/bin/pluginca -action deploy -isFirstOMS true\
    \ -plugins \"oracle.sysman.db=12.1.0.2.0,oracle.sysman.emas=12.1.0.3.0,oracle.sysman.mos=12.1.0.2.0,\n\
    oracle.sysman.xa=12.1.0.3.0\" -oracleHome $OMS_HOME -middlewareHome $MW_HOME\n\
    pluginca - Plugin Configuration Tool\nOracle Enterprise Manager 12c Release 2\
    \ Grid Control\nCopyright (c) 1996, 2012 Oracle Corporation. All rights reserved.\n\
    Log file: /u01/oracle/Middleware/oms/cfgtoollogs/pluginca/gcinstall/configplugin_deploy_\n\
    2013-01-02_14-42-39.log\nTrace file: /u01/oracle/Middleware/oms/cfgtoollogs/pluginca/gcinstall/configplugin_deploy_\n\
    2013-01-02_14-42-39.trc\nInitializing PluginCA.\nOptions passed: -loglevel debug\
    \ -action deploy -isfirstoms true -plugins oracle.sysman.db=12.1.0.2.0,oracle.sysman.emas=12.1.0.3.0,oracle.sysman.mos=12.1.0.2.0,\n\
    oracle.sysman.xa=12.1.0.3.0 -oraclehome /u01/oracle/Middleware/oms –middlewarehome\n\
    /u01/oracle/Middleware\nStarting Deployment\nInvoking pre deploy callbacks.\n\
    OMS state could be found. It is down\nPerforming Midtier deconfig\nPerforming\
    \ Midtier config\nPerforming Opss deconfig\nPerforming Opss config\nPerforming\
    \ Post metadata registration\nPerforming Midtier update oh prop\nPerforming Post\
    \ config module\nInvoking post deploy callbacks.\nCompleted Deployment\n```\n\n\
    7.  Import the configuration exported from the primary management service in step\
    \ 2. If the configuration was exported to a local filesystem, copy it over to\
    \ the standby host first.\n\n```\n$OMS_HOME/bin/emctl importconfig oms -file /u02/backup/opf_ADMIN_20121227_131133.bka\n\
    Oracle Enterprise Manager Cloud Control 12c Release 2\nCopyright (c) 1996, 2012\
    \ Oracle Corporation.  All rights reserved.\nImportConfig started...\nEnter Enterprise\
    \ Manager Root (SYSMAN) Password :\nEnter Agent Registration Password:\nProcessing\
    \ export file...\nChecking OS and OMS Versions...\nOS check passed.\nOMS version\
    \ check passed.\nProceed with oms import...\nBacking up the OMS before import...\n\
    Pre-import backup of OMS failed...\nError: null\n\nDo you wish to continue with\
    \ import? (y/n)\ny\nContinuing with Importconfig...\nUpdating OMS properties...\n\
    Configuring emoms.properties...\nProcessing zipped files...\n\nIf you have software\
    \ library configured\nplease make sure it is functional and accessible\nfrom this\
    \ OMS by visiting:\n Setup->Change Management->Software Library\n\nResecure the\
    \ OMS...\nOMS secured!\nImportConfig completed successfully!\n```\n\n8.  Stop\
    \ the standby OMS.\n\n```\nemctl stop oms\n```\n\n9.  From the primary Enterprise\
    \ Manager console, add the WebLogic Domain and associated targets by using the\
    \ Add Manual Targets Guided Discovery to discover Fusion Middleware targets on\
    \ the standby host.\n10. Configure Single Sign On on the standby if previously\
    \ configured on the primary. This includes Active Directory authentication for\
    \ Enterprise Manager Cloud Control administrators.\n11. Perform configuration\
    \ of any additional components such as BI Publisher or Real User Experience Insight\
    \ if configured on the primary."
