    by setting different values for `-name`. However, it is best to do this only under
    guidance from Oracle Support, so contact them if needed.


    ## Oracle Management Repository


    Let’s move on now to discuss the Oracle Management Repository. As mentioned in
    [Chapter 1](#9781430249382_Ch01.xhtml), the Oracle Management Repository (OMR,
    or more commonly, just the repository) is an Oracle database that stores all the
    information collected by the various management agents. It is composed of database
    users, tablespaces, tables, views, indexes, packages, procedures, and database
    jobs. Like the agent and the OMS, the repository can be controlled both via the
    EM12c console and command-line utilities. Let’s start by looking at the console
    in more detail.


    ### Repository Management with the Console


    To manage the repository from the console, you choose **Setup → Manage Cloud Control
    → Repository**, as shown in [Figure 3-18](#9781430249382_Ch03.xhtml#Fig18).


    ![9781430249382_Fig03-18.jpg](images/9781430249382_Fig03-18.jpg)


    [Figure 3-18](#9781430249382_Ch03.xhtml#_Fig18). Accessing the repository home
    page


    This brings you to the repository home page, shown in [Figure 3-19](#9781430249382_Ch03.xhtml#Fig19).
    (Note that the page title remains Management Services and Repository, as it did
    when accessing the OMS home page, but the regions shown are all applicable to
    the repository.). Notice in this figure that the Details link has been clicked
    in the Repository Details region to display all the sessions accessing the repository.


    There’s not really a lot you can do on this page; it’s used more for a quick glance
    and making sure things are OK. Some things to typically check here include the
    following:


    *   Is there still space available? Checking the Space Used bar will quickly tell
    you that.

    *   Is the backlog of repository collections increasing? This isn’t a common problem.
    It may spike occasionally, as you can see in the example in [Figure 3-19](#9781430249382_Ch03.xhtml#Fig19),
    but in general, it’s not an issue.

    *   Is the Oracle Scheduler status OK? The green arrow here is generally enough,
    but if there are problems, you can look at the Repository Scheduler Job Status
    region for more-granular details.

    *   Is the Management Services AQ Status OK? Again, checking that the arrow is
    green is usually sufficient. If it’s not, you can expand that region for more
    details.


    From the OMS and Repository drop-down menu toward the top left of the screen,
    there are a couple of options specific to the repository. One of those is called
    just Repository, and it simply displays the page seen in [Figure 3-19](#9781430249382_Ch03.xhtml#Fig19)
    (so it’s really of use only if you’ve been looking at the OMS home page, which
    has the same menu).


    ![9781430249382_Fig03-19.jpg](images/9781430249382_Fig03-19.jpg)


    [Figure 3-19](#9781430249382_Ch03.xhtml#_Fig19). The Repository home page


    The other option that can be of use is Repository Synchronization, which opens
    the page shown in [Figure 3-20](#9781430249382_Ch03.xhtml#Fig20). Hopefully, you
    shouldn’t need to use this very often. It’s basically used to monitor resynchronization
    operations (initiated via an `emctl resync repos -full` command) between agents
    and the repository, after the repository has been restored from backup. You can’t
    start the command from here, as the OMS needs to be down when the command is issued
    (remember, the OMS renders the console user interface, so you can’t get to this
    page then). However, once the command is executed, you can restart the OMS and
    monitor the progress of the resynchronization from this screen.


    ![9781430249382_Fig03-20.jpg](images/9781430249382_Fig03-20.jpg)


    [Figure 3-20](#9781430249382_Ch03.xhtml#_Fig20). The Repository Synchronization
    page


    There are two other locations where you can see information about the repository
    from the console. One is the Health Overview page discussed before, which includes
    a section on the repository. The information there really doesn’t add more detail
    to what you’ve already seen on the repository home page, so let’s ignore that
    for now. The other option, of course, is simply to drill into the repository as
    a database target. If you know the name of the repository database, you can simply
    type it into the Search Target Name field at the top-right side of the screen.
    Alternatively, you can simply click **Targets → Databases** and then click the
    database name. That takes you to the standard Database home page, shown in [Figure
    3-21](#9781430249382_Ch03.xhtml#Fig21). Most of these features are ones you should
    probably be already familiar with from previous releases, even if the user interface
    is unfamiliar. (By the way, just in case you’ve picked up on the seeming lack
    of backup for the repository in these screenshots, it’s a fairly ad-hoc system
    running in `NOARCHIVELOG` mode, so I just use cold backups via `tar` when necessary.)


    ![9781430249382_Fig03-21.jpg](images/9781430249382_Fig03-21.jpg)


    [Figure 3-21](#9781430249382_Ch03.xhtml#_Fig21). Database home page for the repository


    ### Repository Management with the Command Line'
