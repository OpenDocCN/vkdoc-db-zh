  trans: "\n## XML 配置文件示例\n\n```xml\n<?xml version=\"1.0\"?>\n<PlugIn ID=\"oracle.samples.xsh1\"\
    \ Description=\"Sample Host Plugin 1\" Version=\"12.1.0.0.0\"\n    xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://www.oracle.com/EnterpriseGridControl/pluginplugin.xsd\"\
    \ >\n  <TargetTypes>\n    <FileLocation>metadata/sample_host1.xml</FileLocation>\n\
    \  </TargetTypes>\n  <TargetCollections>\n    <FileLocation>default_collection/sample_host1.xml</FileLocation>\n\
    \  </TargetCollections>\n</PlugIn>\n```\n\n可以看到，属性 `ID`、`Description` 和 `Version`\
    \ 是从 OMS 端的 `plugin.xml` 文件复制过来的。请注意，`ID` 是 `PluginId` 的点表示法版本。更高级的选项是可用的，但文档记录仍然相当差，且未在示例中提供。例如，你可以通过定义一个自定义的\
    \ fetchlet（你很快会了解到 fetchlet）来注册你自己的指标收集方法，但在你精通插件开发之前，不会这样做。\n\n除了 Oracle *Enterprise\
    \ Manager Cloud Control Extensibility Programmer's Reference*（第 2 章，第 2.5 节）中的标准文档外，更多详细信息可以在\
    \ EDK API 参考中找到，路径为 `<EDK>/doc/partnersdk/mrs/emcore/agentPluginMetadata/`。这个\
    \ XML API 文档是由定义此 XML 结构的 XML Schema 生成的——什么元素可以存在于何处以及数量、它们的属性是什么、哪些是可选的，以及一些零散的注释，对于那些在其他地方未文档化的元素，你仍会发现它们很有用。\n\
    \n在这一点上，已经有足够的机会犯很多错误。幸运的是，EDK 提供了验证工具，可以帮助我们确保我们的定义在语法和语义上是正确的。例如，它将捕获格式错误的 XML\
    \ 文件以及不匹配的插件 ID。清单 10-7 展示了一个示例验证命令行和成功的验证输出。末尾引用的输出文件包含更多详细信息。请注意，将插件打包到 OPAR\
    \ 文件之前会执行显式验证。\n\n### 插件验证示例\n```\n[oracle@em12c2 oracle.samples.xsh1]$ empdk\
    \ validate_plugin -stage_dir plugin_dist\nValidating Plugin Xml : Passed\nValidating\
    \ Plugin Structure: Passed\n\nValidating Metadata Syntax: Passed\nValidating Metadata\
    \ Semantic: Passed\nValidating Embedded SQL strings in meta data: Passed\nPlugin\
    \ Validation : Passed\nValidation Report generated to: /home/oracle/edk/samples/plugins/oracle.samples.xsh1/./plugin_validation_report_121127.txt\n\
    ```\n\n请注意，如果你删除了 `Readme` 元素，例如，验证将通过但会有警告，因为这个元素在 XML Schema 中是可选的，所以从语法上讲一切正确，但\
    \ EDK 有一个语义规则，即这个元素应该作为最佳实践存在。我使用 EDK 主机示例的暂存区，但你也可以使用前面的 XML 内容启动自己的暂存区并并行进行。\n\
    \n现在验证已经成功，你可以继续创建核心结构：目标类型元数据。\n\n## 目标类型元数据\n\n目标类型元数据定义了插件的基本结构——其属性、指标以及如何收集它们。这是创建新目标类型的绝对最低要求。目标类型元数据在单个\
    \ XML 文件中定义，该文件放置在 `<stage>/oms/metadata/targetType` 目录中。Oracle 最新的建议是使用 `vendorID_productID_PluginTag.xml`\
    \ 模板，根据插件 ID 命名文件。之前的命名约定是根据目标类型 ID 添加 `.xml` 扩展名，但一般来说，它可以是任何文件名。我建议使用目标类型来命名目标类型元数据文件，因为你可以在同一个插件中打包多个目标类型。你还需要在\
    \ `<stage>/agent/metadata` 目录下的 agent 区域提供相同的 XML 文件，该文件随后从 `plugin_registry.xml`\
    \ 中引用，正如你之前所了解的。在 Unix/Linux 服务器上，我只需从 agent 区域创建到 OMS 区域主副本的符号链接。这样，我就不会忘记同步它们。（如果你忘记了同步副本，就像我曾做过的几次那样，故障排除可能是一个巨大的时间消耗。那时我改用了符号链接。）\n\
    \n目标类型元数据的一般结构如清单 10-8 所示。\n\n### 元素示例\n```\n<TargetMetadata META_VER=\"1.8\"\
    \ TYPE=\"sample_host1\">\n  <Display>...</Display>\n  <Metric>...</Metric>\n \
    \ ......\n  <Metric>...</Metric>\n  <InstanceProperties>...</InstanceProperties>\n\
    </TargetMetadata>\n```\n\n顶级元素 `TargetMetadata` 在 `TYPE` 属性中包含唯一的目标类型 ID `\"sample_host1\"\
    `，并在 `META_VER` 属性中包含元数据版本 `\"1.8\"`。如果更改了文件，你应该更改版本号。当 EM12c 检测到目标类型版本已更改时，它将重新加载新的元数据。我曾花费无数小时排查为什么在更新元数据定义后我的插件不工作，后来才发现我漏掉了更改\
    \ `META_VER` 属性。当部署较新版本的插件时，EM12c 会分析元数据版本是否已更改，如果新目标类型元数据定义中的 `META_VER` 未更改，则会跳过一些内部更新。\n\
    \n请注意，随 EDK 打包的示例，例如 `sample_host1`，在注释中引用了 XML 数据类型定义（DTD）`$OMS_HOME/sysman/admin/dtds/TargetMetadata.dtd`。这是来自\
    \ 10g/11g Grid Control 的旧定义，不仅风格陈旧，而且已过时。请使用 `<EDK>/doc/partnersdk/mrs/emcore/targetType`\
    \ 中基于 XML Schema 的 API 参考。例如，`TargetMetadata` 根元素在 `<EDK>/doc/partnersdk/mrs/emcore/targetType/noNamespace/element/TargetMetadata.html`\
    \ 中描述。\n\n`TargetMetadata` 元素的子元素通常包括三个元素：`Display`、`Metric` 和 `InstanceProperties`。\n\
    \n### Display\n"
- fmt: "# Target Type Metadata\n\n## Display Element\n\n首先，让我们检查 `Display` 元素。此元素仅用于存储属性，这些属性指示父元素定义的组件在\
    \ EM12c 控制台中的显示方式。您几乎会在任何在用户界面中具有一定可见性的目标类型元数据的其他元素下看到 `Display` 元素。在本例中，它是目标类型本身，`Display`\
    \ 元素定义了目标类型的显示方式。在最简单的形式中，`Display` 元素将包含一个内容用于在控制台中显示目标类型的 `Label` 元素，如 [Listing\
    \ 10-9](#9781430249382_Ch10.xhtml#list9) 所示。`Label` 的可选属性 `NLSID` 是一个唯一标识符，可用于将此目标类型相关的控制台用户界面翻译为其他语言。如果指定它，请养成将\
    \ `NLSID` 前缀设置为目标类型 ID 的习惯，以便在所有可能的插件中保持唯一性（因为您的目标类型 ID 是唯一的，您只需确保所有 `NLSID` 在您自己的目标类型内是唯一的）。根据上下文，`Display`\
    \ 元素内部可以包含其他元素，正如您将在本章后面看到的。\n\n```\n<Display>\n  <Label NLSID=\"hs_displayname\"\
    >Sample Plugin Host 1</Label>\n</Display>\n```\n\n请注意，目标类型元数据 XML 文件中元素的顺序很重要；`Metric`\
    \ 元素必须始终位于 `InstanceProperties` 元素之前。接下来您将了解 `InstanceProperties` 结构，因为它对理解指标及其收集方式很有用。\n\
    \n## Instance Properties\n\n`InstanceProperties` 是一个必需的元素，必须放置在所有 `Metric` 元素之后。在根元素\
    \ `TargetMetadata` 中应恰好有一个 `InstanceProperties` 描述符。此描述符由一个或多个 `InstanceProperty`\
    \ 元素以及可选的 `DynamicProperties` 元素组成，如 [Listing 10-10](#9781430249382_Ch10.xhtml#list10)\
    \ 所示。每个 `InstanceProperty` 条目指定一个目标属性，当在 EM12c 控制台中添加新目标实例时，应由用户定义该属性（参见 [Figure\
    \ 10-9](#9781430249382_Ch10.xhtml#Fig9)）。`DynamicProperties` 元素定义由代理自动计算的属性。\n\
    \n```\n<InstanceProperties>\n        <InstanceProperty NAME=\"USE_FAKE_DATA\"\
    \ ... </InstanceProperty>\n        <InstanceProperty NAME=\"sample_host1_username\"\
    \ ... </InstanceProperty>\n        <InstanceProperty NAME=\"sample_host1_password\"\
    \ ... </InstanceProperty>\n        <DynamicProperties>...</DynamicProperties>\n\
    \        <DynamicProperties>...</DynamicProperties>\n</InstanceProperties>\n```\n\
    \n![9781430249382_Fig10-09.jpg](images/9781430249382_Fig10-09.jpg)\n\n[Figure\
    \ 10-9](#9781430249382_Ch10.xhtml#_Fig9). 实例属性在 EM12c 控制台的“目标监控配置”中设置\n\n实例属性通常表示目标实例的配置，以便代理可以收集各种指标并计算动态属性。许多目标在实例属性中包含凭据——用于连接到目标并收集信息的用户名和密码。其他属性通常包括安装目录的路径、用于通信的端口或套接字路径，甚至如果目标运行在代理所在主机之外的主机上，则包括主机名。\n\
    \n由于这是一个演示插件，Oracle 包含了属性 `USE_FAKE_DATA`，因此您可以将其设置为 `TRUE`，以使收集脚本返回预定义的数据而不是真实收集的指标。这是一种很好的调试技术。\n\
    \n[Listing 10-11](#9781430249382_Ch10.xhtml#list11) 提供了一个密码属性的示例。\n\n```\n<InstanceProperty\
    \ NAME=\"sample_host1_password\" CREDENTIAL=\"TRUE\" OPTIONAL=\"TRUE\">\n  <Display>\n\
    \    <Label NLSID=\"host_password\">Host Password</Label>\n  </Display>\n</InstanceProperty>\n\
    ```\n\n`NAME` 属性定义了您稍后在定义指标收集时可以用来引用此属性的句柄。将 `CREDENTIAL` 设置为 `TRUE` 确保此属性以加密方式存储，而不是明文存储，使得未经授权的用户更难检索密码。对于标记为凭据的属性，`HIDE_ENTRY=\"\
    TRUE\"` 属性使 EM12c 控制台使用密码样式的输入框，其中显示星号而不是浏览器中输入的真实文本。`HIDE_ENTRY` 默认设置为 `TRUE`，因此如果您希望凭据的用户名部分以明文显示，则需要将此属性设置为\
    \ `FALSE`。另一个属性 `NEED_REENTER`，当设置为 `TRUE` 时，将使 EM12c 控制台显示该属性的双重输入——这是密码常见的做法。\n\
    \n`OPTIONAL` 属性表示那些不必定义且因此具有默认值的属性，这些值在许多情况下是可接受的。例如，`USE_FAKE_DATA` 属性的默认值是一个空字符串，它指示插件使用真实收集的指标。\n\
    \n您还可以看到 `InstanceProperty` 有一个您已经熟悉的子元素 `Display`。在本例中，它定义了此属性在 EM12c 控制台中的显示方式。要查看其实际操作，请导航到您的\
    \ “Host Sample 1” 目标，并从目标菜单中选择 “Target Setup” → “Monitoring Configuration”，如 [Figure\
    \ 10-9](#9781430249382_Ch10.xhtml#Fig9) 所示。\n\n## Metrics\n\n指标集是目标类型元数据的核心内容；它们定义了收集的信息以及收集方式。`Metric`\
    \ 是目标类型元数据中最重要的，也可以说是最复杂的元素。一个目标类型可以（并且通常确实）包含多个 `Metric` 子元素，它们都必须放置在 `InstanceProperties`\
    \ 元素之前。[Listing 10-12](#9781430249382_Ch10.xhtml#list12) 展示了来自 `sample_host1`\
    \ 目标类型的 `Response` 指标。\n\n```\n<Metric NAME=\"Response\" TYPE=\"TABLE\">\n  <Display>\n\
    \    <Label NLSID=\"hs_response_displayname\">Response</Label>\n  </Display>\n\
    \  <TableDescriptor>\n    <ColumnDescriptor NAME=\"Load\" TYPE=\"NUMBER\" IS_KEY=\"\
    FALSE\">\n      <Display>\n        <Label NLSID=\"hs_response_cpuload\">CPU Load</Label>\n\
    \      </Display>\n    </ColumnDescriptor>\n    <ColumnDescriptor NAME=\"Status\"\
    \ TYPE=\"NUMBER\" IS_KEY=\"FALSE\">\n      <Display>\n        <Label NLSID=\"\
    hs_response_status\">Status (up/down)</Label>\n      </Display>\n    </ColumnDescriptor>\n\
    \  </TableDescriptor>\n  <QueryDescriptor FETCHLET_ID=\"OSLineToken\">\n    <Property\
    \ NAME=\"scriptsDir\" SCOPE=\"SYSTEMGLOBAL\">scriptsDir</Property>\n    <Property\
    \ NAME=\"fake\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">USE_FAKE_DATA</Property>\n\
    \    <Property NAME=\"perlBin\" SCOPE=\"SYSTEMGLOBAL\">perlBin</Property>\n  \
    \  <Property NAME=\"command\" SCOPE=\"GLOBAL\">%perlBin%/perl</Property>\n   \
    \ <Property NAME=\"script\" SCOPE=\"GLOBAL\">\n       %scriptsDir%/sample_host1/data_collector.pl\
    \ --collect Response --fake \"%fake%\"\n    </Property>\n    <Property NAME=\"\
    startsWith\" SCOPE=\"GLOBAL\">em_result=</Property>\n    <Property NAME=\"delimiter\"\
    \ SCOPE=\"GLOBAL\">|</Property>\n  </QueryDescriptor>\n</Metric>\n```"
  raw: 'First, let’s examine the Display element. This element is used solely for
    storing properties that indicate how a component defined by the parent element
    is displayed in the EM12c console. You will see the Display element present under
    almost any other element of the target type metadata that has some visibility
    in the user interface. In this case, it’s the target type itself, and the Display
    element defines how the target type is displayed. In its simplest form, the Display
    element will contain the single element Label with the content used to display
    the target type in the console, as in [Listing 10-9](#9781430249382_Ch10.xhtml#list9).
    The optional NLSID attribute of the Label is a unique identifier that can be used
    for translation of the console user interface associated with this target type
    to other languages. If you specify it, make a habit of prefixing the NLSID with
    the target type ID so that it’s unique across all possible plug-ins (since your
    target type ID is unique, you just need to make sure that all your NLSIDs are
    unique within your own target type). The Display element can have additional elements
    in it, depending on the context, as you will see later in this chapter.


    ***[Listing 10-9](#9781430249382_Ch10.xhtml#_list9)***.  <Display> Element


    ```

    <Display>

      <Label NLSID="hs_displayname">Sample Plugin Host 1</Label>

    </Display>

    ```


    Note that the order of the elements in the target type metadata XML file is important;
    Metric elements must always precede the InstanceProperties element. Next you will
    look at the InstanceProperties structure, as it will later be useful in understanding
    metrics and how they are collected.


    Instance Properties


    InstanceProperties is a required element that has to be placed after all Metric
    elements. There should be exactly one InstanceProperties descriptor in the root
    element TargetMetadata. This descriptor consists of one or several InstanceProperty
    elements and, optionally, DynamicProperties elements, as shown in [Listing 10-10](#9781430249382_Ch10.xhtml#list10).
    Each InstanceProperty entry specifies an attribute of the target that should be
    defined by a user in the EM12c console when adding a new target instance (see
    [Figure 10-9](#9781430249382_Ch10.xhtml#Fig9)). The DynamicProperties element
    defines attributes that are calculated automatically by the agent instead.


    ***[Listing 10-10](#9781430249382_Ch10.xhtml#_list10)***.  <InstanceProperties>
    Element Structure


    ```

    <InstanceProperties>

            <InstanceProperty NAME="USE_FAKE_DATA" ... </InstanceProperty>

            <InstanceProperty NAME="sample_host1_username" ... </InstanceProperty>

            <InstanceProperty NAME="sample_host1_password" ... </InstanceProperty>

            <DynamicProperties>...</DynamicProperties>

            <DynamicProperties>...</DynamicProperties>

    </InstanceProperties>

    ```


    ![9781430249382_Fig10-09.jpg](images/9781430249382_Fig10-09.jpg)


    [Figure 10-9](#9781430249382_Ch10.xhtml#_Fig9). Instance properties are set in
    the target''s monitoring configuration in the EM12c console


    Instance properties normally represent the configuration of the target instance
    so that an agent can collect various metrics and calculate dynamic properties.
    Many targets include credentials in the instance properties—a username and password
    used to connect to the target and collect information. Other properties often
    include the path to the installation directory, the port or socket path for communications,
    or even the hostname if the target is running on a host other than the one the
    agent is running on.


    Because it’s a demo plug-in, Oracle includes the property USE_FAKE_DATA so you
    can set it to TRUE to enable the collection script to return predefined data instead
    of real gathered metrics. This is a good debugging technique.


    ***[Listing 10-11](#9781430249382_Ch10.xhtml#list11)*** provides an example of
    the password property.


    ***[Listing 10-11](#9781430249382_Ch10.xhtml#_list11)***.  <InstanceProperty>
    Element for Password


    ```

    <InstanceProperty NAME="sample_host1_password" CREDENTIAL="TRUE" OPTIONAL="TRUE">

      <Display>

        <Label NLSID="host_password">Host Password</Label>

      </Display>

    </InstanceProperty>

    ```


    The NAME attribute defines the handle you can use later to reference this property
    when defining metric collections. Setting CREDENTIAL to TRUE ensures that this
    property is stored encrypted instead of as clear text, making it more difficult
    to retrieve passwords by unauthorized users. The HIDE_ENTRY="TRUE" attribute makes
    the EM12c console use a password-style input box in which stars are displayed
    instead of the real text entered in the browser, for properties marked as credentials.
    HIDE_ENTRY is set to TRUE by default, so if you want to have the username part
    of the credential displayed in clear text, you need to set this attribute to FALSE.
    Another attribute, NEED_REENTER, when set to TRUE will make the EM12c console
    display a dual entry for that property—something you often see done for passwords.


    The OPTIONAL attribute denotes properties that don’t have to be defined and, thus,
    have some default value acceptable in many cases. For example, the default value
    for the USE_FAKE_DATA attribute is an empty string, which signals the plug-in
    to use real collected metrics.


    You can also see that the InstanceProperty has a child Display element that is
    already familiar to you. In this case, it defines how this property is displayed
    in the EM12c console. To see that in action, navigate to your Host Sample 1 target
    and choose Target Setup ![arrow](images/arrow.jpg) Monitoring Configuration from
    the target’s menu, as shown in [Figure 10-9](#9781430249382_Ch10.xhtml#Fig9).


    Metrics


    The set of metrics is the real meat of the target type metadata; they define what
    information is collected and how. Metric is the most important and arguably most
    complex element of the target type metadata. A target type can (and normally does)
    contain multiple Metric child elements, and they all must be placed before the
    InstanceProperties element. [Listing 10-12](#9781430249382_Ch10.xhtml#list12)
    shows the Response metric from the sample_host1 target type.


    ***[Listing 10-12](#9781430249382_Ch10.xhtml#_list12)***.  Response Metric Definition
    in XML


    ```

    <Metric NAME="Response" TYPE="TABLE">

      <Display>

        <Label NLSID="hs_response_displayname">Response</Label>

      </Display>

      <TableDescriptor>

        <ColumnDescriptor NAME="Load" TYPE="NUMBER" IS_KEY="FALSE">

          <Display>

            <Label NLSID="hs_response_cpuload">CPU Load</Label>

          </Display>

        </ColumnDescriptor>

        <ColumnDescriptor NAME="Status" TYPE="NUMBER" IS_KEY="FALSE">

          <Display>

            <Label NLSID="hs_response_status">Status (up/down)</Label>

          </Display>

        </ColumnDescriptor>

      </TableDescriptor>

      <QueryDescriptor FETCHLET_ID="OSLineToken">

        <Property NAME="scriptsDir" SCOPE="SYSTEMGLOBAL">scriptsDir</Property>

        <Property NAME="fake" SCOPE="INSTANCE" OPTIONAL="TRUE">USE_FAKE_DATA</Property>

        <Property NAME="perlBin" SCOPE="SYSTEMGLOBAL">perlBin</Property>

        <Property NAME="command" SCOPE="GLOBAL">%perlBin%/perl</Property>

        <Property NAME="script" SCOPE="GLOBAL">

           %scriptsDir%/sample_host1/data_collector.pl --collect Response --fake "%fake%"

        </Property>

        <Property NAME="startsWith" SCOPE="GLOBAL">em_result=</Property>

        <Property NAME="delimiter" SCOPE="GLOBAL">|</Property>

      </QueryDescriptor>

    </Metric>

    ```'
  trans: "# 目标类型元数据\n\n## 显示元素\n\n首先，我们来检查 `Display` 元素。此元素仅用于存储属性，这些属性指示了父元素所定义的组件在\
    \ EM12c 控制台中的显示方式。您几乎会在任何在用户界面中具有一定可见性的目标类型元数据的其他元素下看到 `Display` 元素。在本例中，它对应于目标类型本身，`Display`\
    \ 元素定义了目标类型的显示方式。在最简单的形式中，`Display` 元素将包含一个用于在控制台中显示目标类型的 `Label` 元素，如 列表 10-9\
    \ 所示。`Label` 的可选属性 `NLSID` 是一个唯一标识符，可用于将此目标类型相关的控制台用户界面翻译为其他语言。如果指定它，请养成将 `NLSID`\
    \ 前缀设置为目标类型 ID 的习惯，以便在所有可能的插件中保持唯一性（因为您的目标类型 ID 是唯一的，您只需确保所有 `NLSID` 在您自己的目标类型内是唯一的）。根据上下文，`Display`\
    \ 元素内部可以包含其他元素，正如您将在本章后面看到的。\n\n```\n<Display>\n  <Label NLSID=\"hs_displayname\"\
    >Sample Plugin Host 1</Label>\n</Display>\n```\n\n请注意，目标类型元数据 XML 文件中元素的顺序很重要；`Metric`\
    \ 元素必须始终位于 `InstanceProperties` 元素之前。接下来您将了解 `InstanceProperties` 结构，因为它对理解指标及其收集方式很有用。\n\
    \n## 实例属性\n\n`InstanceProperties` 是一个必需的元素，必须放置在所有 `Metric` 元素之后。在根元素 `TargetMetadata`\
    \ 中应恰好有一个 `InstanceProperties` 描述符。此描述符由一个或多个 `InstanceProperty` 元素以及可选的 `DynamicProperties`\
    \ 元素组成，如 列表 10-10 所示。每个 `InstanceProperty` 条目指定一个目标属性，当在 EM12c 控制台中添加新目标实例时，应由用户定义该属性（参见\
    \ 图 10-9）。`DynamicProperties` 元素定义由代理自动计算的属性。\n\n```\n<InstanceProperties>\n \
    \       <InstanceProperty NAME=\"USE_FAKE_DATA\" ... </InstanceProperty>\n   \
    \     <InstanceProperty NAME=\"sample_host1_username\" ... </InstanceProperty>\n\
    \        <InstanceProperty NAME=\"sample_host1_password\" ... </InstanceProperty>\n\
    \        <DynamicProperties>...</DynamicProperties>\n        <DynamicProperties>...</DynamicProperties>\n\
    </InstanceProperties>\n```\n\n![9781430249382_Fig10-09.jpg](img/9781430249382_Fig10-09.jpg)\n\
    \n图 10-9. 实例属性在 EM12c 控制台的“目标监控配置”中设置\n\n实例属性通常表示目标实例的配置，以便代理可以收集各种指标并计算动态属性。许多目标在实例属性中包含凭据——用于连接到目标并收集信息的用户名和密码。其他属性通常包括安装目录的路径、用于通信的端口或套接字路径，甚至如果目标运行在代理所在主机之外的主机上，则包括主机名。\n\
    \n由于这是一个演示插件，Oracle 包含了属性 `USE_FAKE_DATA`，因此您可以将其设置为 `TRUE`，以使收集脚本返回预定义的数据而不是真实收集的指标。这是一种很好的调试技术。\n\
    \n列表 10-11 提供了一个密码属性的示例。\n\n```\n<InstanceProperty NAME=\"sample_host1_password\"\
    \ CREDENTIAL=\"TRUE\" OPTIONAL=\"TRUE\">\n  <Display>\n    <Label NLSID=\"host_password\"\
    >Host Password</Label>\n  </Display>\n</InstanceProperty>\n```\n\n`NAME` 属性定义了您稍后在定义指标收集时可以用来引用此属性的句柄。将\
    \ `CREDENTIAL` 设置为 `TRUE` 确保此属性以加密方式存储，而不是明文存储，使得未经授权的用户更难检索密码。对于标记为凭据的属性，`HIDE_ENTRY=\"\
    TRUE\"` 属性使 EM12c 控制台使用密码样式的输入框，其中显示星号而不是浏览器中输入的真实文本。`HIDE_ENTRY` 默认设置为 `TRUE`，因此如果您希望凭据的用户名部分以明文显示，则需要将此属性设置为\
    \ `FALSE`。另一个属性 `NEED_REENTER`，当设置为 `TRUE` 时，将使 EM12c 控制台显示该属性的双重输入——这是密码常见的做法。\n\
    \n`OPTIONAL` 属性表示那些不必定义且因此具有默认值的属性，这些值在许多情况下是可接受的。例如，`USE_FAKE_DATA` 属性的默认值是一个空字符串，它指示插件使用真实收集的指标。\n\
    \n您还可以看到 `InstanceProperty` 有一个您已经熟悉的子元素 `Display`。在本例中，它定义了此属性在 EM12c 控制台中的显示方式。要查看其实际操作，请导航到您的\
    \ “Host Sample 1” 目标，并从目标菜单中选择 “目标设置” → “监控配置”，如 图 10-9 所示。\n\n## 指标\n\n指标集是目标类型元数据的核心内容；它们定义了收集的信息以及收集方式。`Metric`\
    \ 是目标类型元数据中最重要的，也可以说是最复杂的元素。一个目标类型可以（并且通常确实）包含多个 `Metric` 子元素，它们都必须放置在 `InstanceProperties`\
    \ 元素之前。列表 10-12 展示了来自 `sample_host1` 目标类型的 `Response` 指标。\n\n```\n<Metric NAME=\"\
    Response\" TYPE=\"TABLE\">\n  <Display>\n    <Label NLSID=\"hs_response_displayname\"\
    >Response</Label>\n  </Display>\n  <TableDescriptor>\n    <ColumnDescriptor NAME=\"\
    Load\" TYPE=\"NUMBER\" IS_KEY=\"FALSE\">\n      <Display>\n        <Label NLSID=\"\
    hs_response_cpuload\">CPU Load</Label>\n      </Display>\n    </ColumnDescriptor>\n\
    \    <ColumnDescriptor NAME=\"Status\" TYPE=\"NUMBER\" IS_KEY=\"FALSE\">\n   \
    \   <Display>\n        <Label NLSID=\"hs_response_status\">Status (up/down)</Label>\n\
    \      </Display>\n    </ColumnDescriptor>\n  </TableDescriptor>\n  <QueryDescriptor\
    \ FETCHLET_ID=\"OSLineToken\">\n    <Property NAME=\"scriptsDir\" SCOPE=\"SYSTEMGLOBAL\"\
    >scriptsDir</Property>\n    <Property NAME=\"fake\" SCOPE=\"INSTANCE\" OPTIONAL=\"\
    TRUE\">USE_FAKE_DATA</Property>\n    <Property NAME=\"perlBin\" SCOPE=\"SYSTEMGLOBAL\"\
    >perlBin</Property>\n    <Property NAME=\"command\" SCOPE=\"GLOBAL\">%perlBin%/perl</Property>\n\
    \    <Property NAME=\"script\" SCOPE=\"GLOBAL\">\n       %scriptsDir%/sample_host1/data_collector.pl\
    \ --collect Response --fake \"%fake%\"\n    </Property>\n    <Property NAME=\"\
    startsWith\" SCOPE=\"GLOBAL\">em_result=</Property>\n    <Property NAME=\"delimiter\"\
    \ SCOPE=\"GLOBAL\">|</Property>\n  </QueryDescriptor>\n</Metric>\n```"
- fmt: '## Metric元素与描述符基础


    Metric元素必须具有在目标类型中唯一的`NAME`。`TYPE`最常见是`TABLE`，但也可能是其他值（此处不作探讨）。每个Metric元素应包含一个`TableDescriptor`。`TableDescriptor`定义了具有名称、类型和标签的列。最后，`QueryDescriptor`标签描述了如何通过某个fetchlet来收集度量值。这些类似于度量扩展适配器，但fetchlet类型更多，在XML中配置的灵活性也更大。`TableDescriptor`中列的顺序很重要，因为配置在`QueryDescriptor`元素下的fetchlet必须按该顺序返回值。


    ## TableDescriptor元素详解


    `TableDescriptor`元素是多个`ColumnDescriptor`元素的简单容器（每个描述表中的一列，正如您可能已猜到的那样）。每个列描述符都有熟悉的`Display`元素，描述该列在用户界面中的显示方式。列描述符的属性定义了列名和类型。`STRING`和`NUMBER`是您将最常使用的两种列类型。`IS_KEY`属性允许您指定此列是否属于度量的唯一键的一部分，从而像在“度量扩展”章节中学习的多行度量那样返回多行。


    ## 响应指标的特殊要求


    对于每种目标类型，定义一个名为`Response`、类型为`TABLE`的特殊度量至关重要，它需包含一个名为`Status`的列。`EM12c`框架将使用此列来表示目标的上下状态和历史可用性统计信息。您还必须为此度量定义一个关键条件（稍后将学习）。`EM12c`知道，如果`Response`度量的`Status`列生成了严重警报，则目标已宕机。获取目标可用性历史的一种方式是通过目标菜单：选择“目标信息”选项，然后点击可用性百分比。示例“Sample
    Plug-in Host 1”的可用性历史如图[10-10](#9781430249382_Ch10.xhtml#Fig10)所示。


    ![9781430249382_Fig10-10.jpg](images/9781430249382_Fig10-10.jpg)


    [图 10-10](#9781430249382_Ch10.xhtml#_Fig10). Sample Plug-in Host 1的示例可用性历史


    除了`Status`，您还可以在`Response`度量中收集更多列。在检查目标状态的同时，收集几个关键测量值通常很容易。例如，一个测量值可能是数据库连接请求的响应时间，或者是如“Sample
    Plug-in Host 1”目标类型那样的主机负载平均值。这将节省收集调用次数，但不会影响目标的可用性。只有`Status`列被计入目标可用性。


    ## 数据收集机制概述


    最后，让我们继续讨论数据收集。在绝大多数情况下，您将使用由`QueryDescriptor`元素配置的可用fetchlet之一。管理代理将根据定义的fetchlet执行收集方法并“获取”度量值。


    其他收集选项允许`EM12c`通过连接或聚合一些先前收集的度量来计算度量值。此类收集通过使用`ExecutionDescriptor`元素而非`QueryDescriptor`来定义。另一种度量收集选项是将代理配置为目标发送给它的数据的被动“监听器”（例如，通过使用SNMP陷阱）。可用的机制称为`receivelets`，并由`PushDescriptor`定义。我仅涵盖fetchlet的使用，因为这是唯一有完整文档记录的机制，但如果您想尝试使用另外两种高级度量收集机制，可以深入研究XML
    Schema文档。《Oracle Enterprise Manager Cloud Control可扩展性程序员参考》（第19章）描述了SNMP receivelet的用法。


    `QueryDescriptor`有一个属性`FETCHLET_ID`，用于唯一标识用于收集所需信息的fetchlet类型。随着后面讨论各种fetchlet，您会发现之前讨论的度量扩展适配器无非就是使用了其中一些fetchlet。


    ## Fetchlet配置与属性


    每个fetchlet都有自己的一组具有预定义名称的必需和可选属性。您通过定义具有这些名称的`Properties`元素来配置fetchlet。例如，`OSLineToken`
    fetchlet对应于度量扩展中的“OS命令—多列”适配器。此fetchlet有一个必需的`command`属性以及一些可选属性，如`startWith`和`delimiter`。您还可以指定额外的临时属性，这些属性可以作为“助手”来构成fetchlet的预定义配置属性。例如，`perlBin`和`fake`属性是从`command`属性中引用的。


    `Property`元素的`SCOPE`属性定义了属性值被解析的上下文。以下是最重要的`SCOPE`选项：


    *   `GLOBAL`：值是具有占位符变量的`Property` XML元素的内容，这些占位符被解析为当前`QueryDescriptor`元素的属性。在我们的示例中，`command`属性的作用域为`GLOBAL`，值为`%perlBin%/Perl`。`%%`内的占位符被替换为当前`QueryDescriptor`元素的属性值，例如`perlBin`。另一个`GLOBAL`属性的例子是引用`scriptDir`和`fake`属性的`script`属性。`GLOBAL`作用域也用于常量定义，例如`delimiter`属性。名称`GLOBAL`可能有误导性，但请记住其作用域是当前的`QueryDescriptor`元素。

    *   `SYSTEMGLOBAL`：此值在`$AGENT_HOME/sysman/config`目录下的`emd.properties`配置文件的上下文中被解析。`Property`
    XML元素的内容是来自`emd.properties`代理配置文件的变量名。例如，`emd.properties`包含`perlBin`，定义了Perl可执行文件的路径。如果使用Perl脚本收集度量值，这将非常有用，因为您可以始终使用随管理代理安装的Perl发行版，而不必希望系统上安装了兼容版本的Perl。另一个有用的`SYSTEMGLOBAL`值是`scriptsDir`，它指向为所有插件安装脚本的路径，这些脚本位于一个与目标类型ID同名的子目录中。

    *   `INSTANCE`：此值在目标实例的上下文中被解析（即目标配置时定义的实例属性的值）。这些值对于每个目标实例都是不同的。在我们的示例中，您可以看到`USE_FAKE_DATA`是如何被引用的，但没有引用`sample_host1_username`或`sample_host1_password`。如果度量收集实际使用了这些属性，它们会以某种方式传递给连接脚本。

    *   `ENV`：此值取自环境变量。例如，如果您的监控脚本需要在服务器上安装一个特殊二进制文件，并且该二进制文件未随插件分发，您可以通过在代理启动前设置的某个环境变量来指定该二进制文件的路径。例如，`<Property
    NAME="mypath" SCOPE="ENV">MYSQL_PATH</Property>`将获取环境变量`MYSQL_PATH`的值作为`mypath`属性的值，以便您稍后可以从`command`属性中以`%mypath%`的形式引用它。'
  raw: 'The Metric element must have a NAME unique within the target type. TYPE is
    most frequently a TABLE but can be some other value that I won’t be looking at
    here. Each Metric element should include one TableDescriptor. A TableDescriptor
    defines columns with names, types, and labels. Finally, a QueryDescriptor tag
    describes how to collect metric values via one of the fetchlets. These are similar
    to metric extension adapters, but there are many more fetchlet types available,
    and you have much more flexibility configuring them in XML. The order of the columns
    in a TableDescriptor is important because the fetchlet configured under the QueryDescriptor
    element must return the values in that order.


    The TableDescriptor element is a simple container for the multiple ColumnDescriptor
    elements (each describing a column in the table, as you might have already guessed).
    Each column descriptor has the familiar Display element describing how this column
    is displayed in the user interface. Attributes of the column descriptor define
    column names and types. STRING and NUMBER are two column types that you will be
    using most of the time. The IS_KEY attribute lets you specify whether this column
    is part of the unique key for the metrics, returning multiple rows as in the multirow
    metrics you learned about in the section “Metric Extensions.”


    For each target type, it’s important to define a special metric with the name
    Response, of type TABLE, with a column named Status. The EM12c framework will
    use this column for the target’s up and down status and historical availability
    statistics. You also must define a critical condition for this metric, as you
    will learn later. EM12c knows that the target is down if the Status column of
    the Response metric generates a critical alert. One way to get the availability
    history for a target is via the target’s menu: choose the Target Information option
    and then click the availability percentage. The example availability history for
    Sample Plug-in Host 1 is shown in [Figure 10-10](#9781430249382_Ch10.xhtml#Fig10).


    ![9781430249382_Fig10-10.jpg](images/9781430249382_Fig10-10.jpg)


    [Figure 10-10](#9781430249382_Ch10.xhtml#_Fig10). Example availability history
    for Sample Plug-in Host 1


    You can also collect more columns in the Response metric in addition to Status.
    It often is easy to collect a few key measurements while checking the status of
    the target. For example, one measurement might be the response time of the connection
    request to a database or the host’s load average, as is the case with the Sample
    Plug-in Host 1 target type. This will save on the number of collection calls but
    won’t affect the target’s availability. Only the column Status is taken into account
    for target availability.


    Finally, let’s move on to the data collection. In the vast majority of cases,
    you will be using one of the available fetchlets configured by the QueryDescriptor
    element. The management agent will execute collection methods according to the
    defined fetchlet and “fetch” values for the metrics.


    Other collection options let EM12c calculate metric values by joining or aggregating
    some of the previously collected metrics. Such a collection is defined by using
    an ExecutionDescriptor element instead of a QueryDescriptor. Another metrics collection
    option is to configure an agent to be a passive “listener” for the data sent to
    it by targets (for example, by using SNMP traps). The available mechanisms are
    called *receivelets* and are defined by the PushDescriptor. I cover only the use
    of fetchlets as that’s the only mechanism that’s fully documented, but you can
    dig into the XML Schema documentation if you want to try using two other advanced
    metric-collection mechanisms. The *Oracle Enterprise Manager Cloud Control Extensibility
    Programmer''s Reference* (Chapter 19) describes the use for the SNMP receivelet.


    The QueryDescriptor has a single attribute, FETCHLET_ID, that uniquely identifies
    the fetchlet type used to collect the required information. As the various fetchlets
    are discussed later, you will see that the metric extension adapters discussed
    earlier are using nothing else but some of those fetchlets.


    Each fetchlet has its own set of required and optional properties with predefined
    names. You configure a fetchlet by defining the Properties elements with these
    names. The OSLineToken fetchlet, for example, corresponds to the OS Command—Multiple
    Columns adapter from the metric extensions. This fetchlet has a required command
    property as well as a few optional properties, such as startWith and delimiter.
    You can also specify additional ad-hoc properties that can serve as “helpers”
    to form fetchlet’s pre-defined configuration properties. For example, the perlBin
    and fake properties are referenced from the command property.


    The SCOPE attribute of a Property element defines the context where the property
    value is resolved. The following are the most important SCOPE options:


    *   GLOBAL: The value is the content of the Property XML element with placeholder
    variables that are resolved to the properties of the current QueryDescriptor element.
    In our example, the command property has scope GLOBAL with the value %perlBin%/Perl.
    Placeholders within %% are substituted with the property values of the current
    QueryDescriptor element, such as perlBin. Another example of the GLOBAL property
    is the script property that references scriptDir and fake properties. GLOBAL scope
    is also used for constant definitions such as the delimiter property. The name
    GLOBAL might be misleading, but just remember that the scope is the current QueryDescriptor
    element.

    *   SYSTEMGLOBAL: This value is resolved in the context of the emd.properties
    configuration file in the directory $AGENT_HOME/sysman/config. The content of
    the Property XML element is the name of the variables from the emd.properties
    agent configuration file. For example, emd.properties contains perlBin, defining
    the path to the Perl executable. This is useful if Perl scripts are used to gather
    metric values, so you can always use the Perl distribution that’s installed with
    the management agent rather than hoping that a compatible system version of Perl
    is installed. Another useful SYSTEMGLOBAL value is scriptsDir, which points to
    the path where the scripts for all plug-ins are installed in a subdirectory with
    the same name as the target type ID.

    *   INSTANCE: This value is resolved in the context of the target instance (that
    is, the values of instance properties that are defined when the target is configured).
    These values are different for each target instance. In our example, you can see
    how USE_FAKE_DATA is referenced, but not sample_host1_username or sample_host1_password.
    If metric collections were actually using these properties, they would have been
    passed to the connection script one way or another.

    *   ENV: This is the value taken from the environment variable. For example, if
    your monitoring script requires a special binary to be installed on the server,
    and that binary is not distributed with the plug-in, you can specify a path to
    that binary via a certain environment variable set before the agent is started.
    For example, <Property NAME="mypath" SCOPE="ENV">MYSQL_PATH</Property> will take
    the value of the environment variable MYSQL_PATH as the value for the property
    mypath so that you can later refer to it as %mypath% from the command property.'
  trans: '

    ## 度量元素与描述符基础


    度量元素必须具有在目标类型中唯一的`NAME`。`TYPE`最常见是`TABLE`，但也可能是其他值（此处不作探讨）。每个度量元素应包含一个`TableDescriptor`。`TableDescriptor`定义了具有名称、类型和标签的列。最后，`QueryDescriptor`标签描述了如何通过某个
    fetchlet 来收集度量值。这些类似于度量扩展适配器，但 fetchlet 类型更多，在 XML 中配置的灵活性也更大。`TableDescriptor`中列的顺序很重要，因为配置在`QueryDescriptor`元素下的
    fetchlet 必须按该顺序返回值。


    ## TableDescriptor 元素详解


    `TableDescriptor`元素是多个`ColumnDescriptor`元素的简单容器（每个描述表中的一列，正如您可能已猜到的那样）。每个列描述符都有熟悉的`Display`元素，描述该列在用户界面中的显示方式。列描述符的属性定义了列名和类型。`STRING`和`NUMBER`是您将最常使用的两种列类型。`IS_KEY`属性允许您指定此列是否属于度量的唯一键的一部分，从而像在“度量扩展”章节中学习的多行度量那样返回多行。


    ## 响应指标的特殊要求


    对于每种目标类型，定义一个名为`Response`、类型为`TABLE`的特殊度量至关重要，它需包含一个名为`Status`的列。`EM12c`框架将使用此列来表示目标的上下状态和历史可用性统计信息。您还必须为此度量定义一个关键条件（稍后将学习）。`EM12c`知道，如果`Response`度量的`Status`列生成了严重警报，则目标已宕机。获取目标可用性历史的一种方式是通过目标菜单：选择“目标信息”选项，然后点击可用性百分比。示例“Sample
    Plug-in Host 1”的可用性历史如图 10-10 所示。


    ![9781430249382_Fig10-10.jpg](img/9781430249382_Fig10-10.jpg)


    图 10-10. Sample Plug-in Host 1 的示例可用性历史


    除了`Status`，您还可以在`Response`度量中收集更多列。在检查目标状态的同时，收集几个关键测量值通常很容易。例如，一个测量值可能是数据库连接请求的响应时间，或者是如“Sample
    Plug-in Host 1”目标类型那样的主机负载平均值。这将节省收集调用次数，但不会影响目标的可用性。只有`Status`列被计入目标可用性。


    ## 数据收集机制概述


    最后，让我们继续讨论数据收集。在绝大多数情况下，您将使用由`QueryDescriptor`元素配置的可用 fetchlet 之一。管理代理将根据定义的 fetchlet
    执行收集方法并“获取”度量值。


    其他收集选项允许`EM12c`通过连接或聚合一些先前收集的度量来计算度量值。此类收集通过使用`ExecutionDescriptor`元素而非`QueryDescriptor`来定义。另一种度量收集选项是将代理配置为目标发送给它的数据的被动“监听器”（例如，通过使用
    SNMP 陷阱）。可用的机制称为`receivelets`，并由`PushDescriptor`定义。我仅涵盖 fetchlet 的使用，因为这是唯一有完整文档记录的机制，但如果您想尝试使用另外两种高级度量收集机制，可以深入研究
    XML Schema 文档。《Oracle Enterprise Manager Cloud Control 可扩展性程序员参考》（第 19 章）描述了 SNMP
    receivelet 的用法。


    `QueryDescriptor`有一个属性`FETCHLET_ID`，用于唯一标识用于收集所需信息的 fetchlet 类型。随着后面讨论各种 fetchlet，您会发现之前讨论的度量扩展适配器无非就是使用了其中一些
    fetchlet。


    ## Fetchlet 配置与属性


    每个 fetchlet 都有自己的一组具有预定义名称的必需和可选属性。您通过定义具有这些名称的`Properties`元素来配置 fetchlet。例如，`OSLineToken`
    fetchlet 对应于度量扩展中的“OS 命令—多列”适配器。此 fetchlet 有一个必需的`command`属性以及一些可选属性，如`startWith`和`delimiter`。您还可以指定额外的临时属性，这些属性可以作为“助手”来构成
    fetchlet 的预定义配置属性。例如，`perlBin`和`fake`属性是从`command`属性中引用的。


    `Property`元素的`SCOPE`属性定义了属性值被解析的上下文。以下是最重要的`SCOPE`选项：


    *   `GLOBAL`：值是具有占位符变量的`Property` XML 元素的内容，这些占位符被解析为当前`QueryDescriptor`元素的属性。在我们的示例中，`command`属性的作用域为`GLOBAL`，值为`%perlBin%/Perl`。`%%`内的占位符被替换为当前`QueryDescriptor`元素的属性值，例如`perlBin`。另一个`GLOBAL`属性的例子是引用`scriptDir`和`fake`属性的`script`属性。`GLOBAL`作用域也用于常量定义，例如`delimiter`属性。名称`GLOBAL`可能有误导性，但请记住其作用域是当前的`QueryDescriptor`元素。

    *   `SYSTEMGLOBAL`：此值在`$AGENT_HOME/sysman/config`目录下的`emd.properties`配置文件的上下文中被解析。`Property`
    XML 元素的内容是来自`emd.properties`代理配置文件的变量名。例如，`emd.properties`包含`perlBin`，定义了 Perl
    可执行文件的路径。如果使用 Perl 脚本收集度量值，这将非常有用，因为您可以始终使用随管理代理安装的 Perl 发行版，而不必希望系统上安装了兼容版本的
    Perl。另一个有用的`SYSTEMGLOBAL`值是`scriptsDir`，它指向为所有插件安装脚本的路径，这些脚本位于一个与目标类型 ID 同名的子目录中。

    *   `INSTANCE`：此值在目标实例的上下文中被解析（即目标配置时定义的实例属性的值）。这些值对于每个目标实例都是不同的。在我们的示例中，您可以看到`USE_FAKE_DATA`是如何被引用的，但没有引用`sample_host1_username`或`sample_host1_password`。如果度量收集实际使用了这些属性，它们会以某种方式传递给连接脚本。

    *   `ENV`：此值取自环境变量。例如，如果您的监控脚本需要在服务器上安装一个特殊二进制文件，并且该二进制文件未随插件分发，您可以通过在代理启动前设置的某个环境变量来指定该二进制文件的路径。例如，`<Property
    NAME="mypath" SCOPE="ENV">MYSQL_PATH</Property>`将获取环境变量`MYSQL_PATH`的值作为`mypath`属性的值，以便您稍后可以从`command`属性中以`%mypath%`的形式引用它。

    '
- fmt: "It’s possible to set environment variables before the command is run—whether\
    \ to define requirements or pass parameters. If command-line parameters contain\
    \ special symbols, they might be handled differently on different platforms. Environment\
    \ variables seem to be passed reliably on all platforms, including Linux, Windows,\
    \ and Unix. Passing credentials and other sensitive information via environment\
    \ variables could be more secure than via the command line, which is often easily\
    \ observed by any logged-in host user. However, some platforms may expose the\
    \ content of environment variables of a process to other users, as Linux does\
    \ via the `/proc` filesystem. Later in this chapter, you will learn about monitoring\
    \ credentials, which is a more secure way to pass a login and password to a script.\n\
    \nLet’s summarize the definition of the `Response` metric from [Listing 10-12](#9781430249382_Ch10.xhtml#list12).\
    \ A `Response` metric is a single-row metric with the columns `Load` and `Status`.\
    \ It’s using the `OSLineToken` fetchlet that is capable of returning a multirow,\
    \ multicolumn result set from an OS command. The fetchlet is configured to run\
    \ a Perl script named `data_collector.pl` and parses output by separating column\
    \ values with a pipe symbol (`|`) and filtering in only the lines prefixed with\
    \ `em_result=`.\n\nDefault Collection Metadata\n\nNow that you know how the EM12c\
    \ user can configure new target instances (via the `InstanceProperties` element)\
    \ and what metrics target type will collect and how (`Metric` elements), the only\
    \ missing bit is to define how often metrics need to be collected and what the\
    \ alerting conditions are on the metrics. This is defined in the Default Collection\
    \ metadata XML file placed in `<EDK>/oms/metadata/default_collection` and linked\
    \ from `<EDK>/agent/default_collection`. Use the same naming convention as for\
    \ the target type metadata file. A sample default collection metadata definition\
    \ is shown in [Listing 10-13](#9781430249382_Ch10.xhtml#list13). See the default\
    \ collection definition of the Sample Host 1 target for the complete example.\n\
    \n[Listing 10-13](#9781430249382_Ch10.xhtml#_list13). Sample Default Connection\
    \ Metadata Definition\n\n```\n<TargetCollection TYPE=\"sample_host1\">\n  <CollectionItem\
    \ NAME=\"Response\">\n    <Schedule>\n      <IntervalSchedule INTERVAL=\"5\" TIME_UNIT=\"\
    Min\"/>\n    </Schedule>\n    <Condition COLUMN_NAME=\"Status\" CRITICAL=\"1\"\
    \ OPERATOR=\"LT\"/>\n  </CollectionItem>\n  <CollectionItem NAME=\"Perf\" UPLOAD=\"\
    1\">\n    <Schedule>\n      <IntervalSchedule INTERVAL=\"5\" TIME_UNIT=\"Min\"\
    />\n    </Schedule>\n    <MetricColl NAME=\"CPUPerf\">\n      <Condition COLUMN_NAME=\"\
    non_nice\" WARNING=\"NotDefined\" CRITICAL=\"NotDefined\"\n         OPERATOR=\"\
    GE\"\n         MESSAGE=\"The value for %columnName% is %value%%%.  It has risen\
    \ above the\n           critical (%critical_threshold%%%) or warning (%warning_threshold%%%)\
    \ threshold.\"\n         CLEAR_MESSAGE=\"The value for %columnName% is %value%%%.\"\
    \ />\n      <Condition ... />\n      ...\n    </MetricColl>\n    <MetricColl NAME=\"\
    MemoryPerf\">...</MetricColl>\n    <MetricColl NAME=\"CPUProcessorPerf\">...</MetricColl>\n\
    \    ...\n  </CollectionItem>\n  ...\n</TargetCollection>\n```\n\nThe root element\
    \ is `TargetCollection`, and its `TYPE` attribute should match the `type` attribute\
    \ of the `TargetMetadata` root element from the target type metadata XML file\
    \ (`sample_host1`). The `TargetCollection` element contains a number of `CollectionItem`\
    \ elements, and each `CollectionItem` element matches to a `Metric` element in\
    \ the target type metadata file. The `NAME` attribute of `CollectionItem` should\
    \ match the metric name.\n\nThere is also a way to group the collection of multiple\
    \ metrics in the same collection item when the same collection frequency or metric\
    \ collection order is required. This is done by including `MetricColl` elements\
    \ (one per metric) inside a `CollectionItem` (for example, the collection item\
    \ \"Perf\"). In this case, the `NAME` attribute of the child `MetricColl` elements\
    \ should match metric names as in the example (\"CPUPerf\", \"MemoryPerf\", and\
    \ \"CPUProcessorPerf\"). See the *Oracle Enterprise Manager Cloud Control Extensibility\
    \ Programmer's Reference* ([Chapter 3](#9781430249382_Ch03.xhtml), Section 3.5.1).\n\
    \nFor each collection item, we can define a `Schedule` child element that typically\
    \ includes an `IntervalSchedule` child element indicating the frequency of the\
    \ collection by using the numerical attribute `INTERVAL` and string attribute\
    \ `TIME_UNIT`. The latter can be set to `Sec`, `Min`, `Hr`, or `Day`, and default\
    \ to `Min`. As this is a default collection definition, this setting represents\
    \ the initial default frequency. EM12c users can modify collection intervals,\
    \ as for any other metrics, and plug-in developers can set the limits on those\
    \ settings by using the `MIN_INTERVAL` and `MAX_INTERVAL` attributes of the `IntervalSchedule`\
    \ element. Other scheduling options are also available, such as running on a certain\
    \ day of the month or week. They are not documented in the extensibility guides,\
    \ but you can see the XML Schema documentation from `<EDK>/doc/partnersdk/mrs/emcore/default_collection`\
    \ for additional options, and you can also see them in the console when modifying\
    \ a collection schedule.\n\nIf the schedule is not defined for a metric, this\
    \ metric will not be automatically collected by the agent except when an EM12c\
    \ user opens the real-time metric view, in which case OMS requests the collection\
    \ from the agent each time the real-time view is refreshed. Whether or not the\
    \ initial collection schedule is defined in the default collection file, the schedule\
    \ can be customized in the EM12c console. You use the All Metrics view of a target,\
    \ as shown in [Figure 10-11](#9781430249382_Ch10.xhtml#Fig11) for the collection\
    \ item named \"Perf\" (shown earlier in [Listing 10-13](#9781430249382_Ch10.xhtml#list13)).\n\
    \n![9781430249382_Fig10-11.jpg](images/9781430249382_Fig10-11.jpg)\n\n[Figure\
    \ 10-11](#9781430249382_Ch10.xhtml#_Fig11). Customizing the collection schedule\n\
    \nEach column in a metric can have a condition defined for testing against warning\
    \ and critical thresholds—one `Condition` element per column. If you define a\
    \ collection item per metric, the `Condition` elements are children of `CollectionItem`.\
    \ Otherwise, `Condition` elements are children of `MetricColl`. `Condition` elements\
    \ have two required attributes: `COLUMN_NAME` and `OPERATOR`. The latter defines\
    \ a comparison operator, which can either be a numerical relation or string matching\
    \ operator. In [Listing 10-13](#9781430249382_Ch10.xhtml#list13), `LT` means *less\
    \ than* and `GT` means *greater than*. String conditions include `CONTAINS` for\
    \ a substring match and `MATCH` for a regular expression match. Section 3.5.5\
    \ of the *Extensibility Programmer's Reference* has a full list of operators.\
    \ Note that operator codes must be in uppercase."
