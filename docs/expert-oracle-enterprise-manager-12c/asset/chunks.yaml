  raw: 'For rules that operate on incidents, one of the primary use cases is to automate
    operations that pertain to incident workflow (such as automatically assigning
    owners to incidents), to set priority for an incident or set its escalation level,
    or to send notifications for incidents. You can also as another use case create
    tickets based on incident conditions, such as creating a ticket when an incident
    is escalated to level 2.


    Rules are used on problems to automate the management of problem workflows in
    much the same way as for incidents. For example, you can automatically assign
    owners to problems, set the priority or escalation level for a problem, or send
    notifications for problems.


    Incident rule sets can be easily used for automation and workflow management.
    For example, you might do the following:


    *   Auto-assign incidents for faster resolution. When incidents are created, assign
    an incident owner automatically. Alternatively, create a separate rule to assign
    ownership based on specific criteria. In either case, this saves having to manually
    assign the incident to a specific owner.

    *   Automate your escalation processes. You may want to set the escalation level
    for an incident based on the length of time the incident has been open and unresolved.
    If you do not auto-assign incidents as discussed in the first bullet, you may
    want to escalate unassigned important incidents.

    *   Send notifications for escalated incidents or problems. When an incident or
    problem is escalated, you can send an e-mail notification, assign an owner, or
    set a priority for the incident or problem.

    *   Auto-assign priority levels. Just as with ownership, you can assign a priority
    level automatically when an incident is created. You can then sort by priority
    in the Incident Manager console and work on high-priority incidents first.


    Summary


    Incident Manager provides administrators with a central point of control for managing
    events, incidents, and problems within the infrastructure detected by Enterprise
    Manager. It allows you to monitor and resolve service disruptions quickly and
    efficiently, and provides a way to manage a smaller number of meaningful incidents
    rather than numerous discrete events. Using its integration with My Oracle Support
    allows you to access integrated Oracle expertise to accelerate incident and problem
    diagnosis and resolution.


    CHAPTER 13


    ![image](images/frontdot.jpg)


    High Availability, Backup, and Recovery


    by Leighton Nelson


    This chapter explores three levels of architecture required for setting up a highly
    available Oracle Enterprise Manager Cloud Control 12c environment. It also covers
    backup and recovery methods for the components of the system, including the repository
    database, management service, and agents.


    Enterprise Manager Cloud Control 12c provides a complete infrastructure management
    solution for databases, applications, and hardware. Having such a key component
    in the enterprise naturally leads to concerns about redundancy and high availability.
    If something does go wrong within the configuration, recovery should occur in
    the shortest possible time, thus minimizing disruptions to manageability and monitoring
    of the enterprise infrastructure. Maintenance will also be required to apply patches
    to the Enterprise Manager software components (that is, database, management service,
    agents, and operating systems). It is with these concerns in mind that Oracle
    Enterprise Manager has been designed to meet the desired service and operating
    levels by using different high-availability mechanisms.


    High Availability


    Each component within the Enterprise Manager architecture should be made highly
    available to enable a complete high-availability configuration. The main components
    to be considered, shown in [Figure 13-1](#9781430249382_Ch13.xhtml#Fig1), are
    as follows:


    *   *Management Agent*: Runs on targets and communicates with and sends metrics
    to the OMS

    *   *Management Server*: The heart of the Enterprise Manager that provides Management
    Services

    *   *Repository*: Stores persistent data from the monitored targets in an Oracle
    database

    *   *Software Library*: Stores files for patching, provisioning, and agent and
    plug-in deployment


    ![9781430249382_Fig13-01.jpg](images/9781430249382_Fig13-01.jpg)


    [Figure 13-1](#9781430249382_Ch13.xhtml#_Fig1) .  Enterprise Manager Cloud Control
    12c architecture


    Different levels of high availability can be configured for each component with
    varying levels of complexity and cost. When considering your high-availability
    requirements, there should be minimal trade-offs in cost, complexity, performance,
    and data loss. Generally, the complexity and level of high availability are proportional
    to each other.


    The Oracle Management Agent should be configured to start on boot. This ensures
    that no manual intervention will be required after a server reboots and quickly
    enables targets to be monitored after a service disruption. On Unix and Linux
    operating systems, a script called gcstartup is placed in /etc/init.d and made
    to run at certain runlevels. On Microsoft Windows, a service is created to start
    automatically on boot.


    Oracle has defined four levels of high availability for Enterprise Manager Cloud
    Control. These are summarized in [Table 13-1](#9781430249382_Ch13.xhtml#Tab1).
    Only levels 1 to 3 are covered in this chapter.


    [Table 13-1](#9781430249382_Ch13.xhtml#_Tab1). Levels of Enterprise Manager High
    Availability


    ![Table13-1.jpg](images/Table13-1.jpg)


    Oracle Management Agent


    The Oracle Management Agent is responsible for sending metrics and pending alerts
    for hosts on which it is installed. To provide high availability, the following
    features should be enabled for the agent:


    *   Enable the agent to start automatically on OS boot up. This should be configured
    automatically after running the root.sh script.

    *   Install the agent on redundant storage. This includes a RAID-configured storage
    back end.

    *   Configure restart parameters for the agent watchdog process. The watchdog
    process is responsible for restarting the agents based on the following environment
    variables:


    *   EM_MAX_RETRIES  indicates the maximum number of times the watchdog process
    will attempt to restart the agent within the EM_MAX_RETRY_WINDOW. The default
    is set to 3.

    *   EM_RETRY_WINDOW  indicates the time interval that is used with EM_MAX_RETRIES
    before trying to start the management agent. The default is set to 600 seconds.


    After installing the Enterprise Manager agent, the <AGENT_HOME>/root.sh script
    should be executed. This will create the following scripts on Linux and some Unix
    operating systems that control the startup of the management agent.


    *   /etc/init.d/gcstartup

    *   /etc/init/gcstartup

    *   /etc/rc.d/init.d/gcstartup


    If these files are not present, make sure the <AGENT_HOME>/root.sh script has
    been executed.


    Loss or corruption of the agent will result in loss of monitoring and metric data
    uploads for its associated targets. Likewise, if the agent is down, targets will
    not be able to communicate with the management server, resulting in loss of manageability.


