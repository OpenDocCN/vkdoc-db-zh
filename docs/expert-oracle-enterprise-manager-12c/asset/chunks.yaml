- fmt: "# Oracle Enterprise Manager Repository Command-Line Management\n\n## 介绍\n\n\
    在之前的章节中，你已经看到，从命令行对 `OMS` 和 `agent` 进行管理，主要使用 `EMCTL` 和 `EMCLI` 实用程序。从命令行对 `repository`\
    \ 的管理则有所不同。它实际上就是另一个 `Oracle` 数据库（尽管是一个有特殊用途的数据库），因此 `repository` 管理的命令行界面是 `DBA`\
    \ 的老朋友——`SQL*Plus`。由于本书并非针对 `DBA 101` 级别的技能，本节不会带你完成启动或停止 `repository` 的过程。你唯一需要注意的是以下几点：\n\
    \n*   在停止并重启 `repository` 数据库之前，你应该先停止 `OMS`（使用 `emctl stop oms` 命令）。\n*   在启动\
    \ `repository` 数据库之前，你也应该确保监听器已启动。\n\n话虽如此，你确实需要了解一些可以在 `SQL*Plus` 中为 `repository`\
    \ 管理的其他领域，特别是围绕空间消耗和性能考量方面。在本节中，你将了解以下内容：\n\n*   数据保留\n*   队列管理\n*   优化器统计信息\n\
    *   `repository` 视图\n\n## 数据保留\n\n`Enterprise Manager` 收集大量数据。默认情况下，这些数据在以下生命周期中进行处理和聚合：\n\
    \n*   由管理 `agent` 根据你定义的收集策略上传的原始度量数据，将保留 `7` 天。\n*   `7` 天后，仅保留每小时的汇总数据（度量的最大值、最小值和平均值）。\n\
    *   这些数据默认保留 `31` 天，之后仅保留每日汇总数据。\n*   最后，每日汇总数据保留 `12` 个月。\n\n你可能希望审查这些策略。特别是，目标管理员执行的一项常见任务是与上一个业务周期进行性能比较。因此，你很可能希望原始度量数据的保留时间超过\
    \ `7` 天，以便深入分析更细粒度的数据。同样，你可能希望每小时数据的保留时间超过一个月，以便能够（例如）比较月度终数据。最后，许多组织选择将每日数据保留多年。\n\
    \n![image](images/sq.jpg) `Caution` `Enterprise Manager` 在 `repository` 数据库中使用分区来维护度量和其他数据。就许可而言，这通常是一项附加功能，但只要你仅将分区选项用于\
    \ `Enterprise Manager` 基表，你就不需要额外付费。请**不要**在没有分区的情况下重新链接 `Oracle`，因为我曾有一位客户因为担心额外的许可成本而这样做了。如果你这样做，将会严重破坏\
    \ `repository`！\n\n`Enterprise Manager` 通过删除过期的度量表分区来归档旧数据。因此，可以通过修改要保留的分区数量来设置保留策略。`Enterprise\
    \ Manager` 提供了一个存储过程来执行此任务。[清单 3-1](#9781430249382_Ch03.xhtml#list1) 实现了一个保留策略：详细数据\
    \ `10` 天，每小时数据 `40` 天，每日数据 `3` 年。\n\n***[清单 3-1](#9781430249382_Ch03.xhtml#_list1)***.\
    \ 修改 `EM` 保留策略\n\n```\nBEGIN\n        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES',10);\n\
    \        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES_HOURLY',40);\n\
    \        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES_DAILY',36);\n\
    END;\n/\n```\n\n![image](images/sq.jpg) `Note` 表 `EM_INT_PARTITIONED_TABLES` 包含了作为\
    \ `repository` 一部分提供的各种 interval 分区表的默认保留时间。\n\n## 队列管理\n\n`Enterprise Manager`\
    \ 大量使用 `Oracle` 的数据库内队列技术（`Oracle Streams Advanced Queuing`，通常简称为 `AQ`）。该技术可能需要一些细心和维护，以确保性能保持在最佳水平。如果你选择为\
    \ `repository` 数据库实施 `Oracle Real Application Clusters` 解决方案，这一点尤其重要。`AQ` 队列使用多种数据库技术实现，包括索引组织表。如果消息出队未高效或完全进行，那么随着时间的推移，底层数据结构可能会显著增长，消息入队和出队时间可能会增加。\n\
    \n`Enterprise Manager` 大量使用队列，特别是用于度量加载和上传以及通知。你可能会发现此区域问题的第一个迹象是出现持续且不断增长的上传积压，或通知延迟。不幸的是，这两种症状也可能有其他原因。\n\
    \n`Oracle Enterprise Manager` 的初始数据库设置并未专门按照 `AQ` 的通用指南配置数据库。特别是，`AQ` 将受益于一个称为\
    \ `Streams pool` 的专用内存池。在默认安装中，你可能会发现此池大小未设置，因此 `Advanced Queuing` 只会使用最小的内存分配。我建议你将初始化参数\
    \ `STREAMS_POOL_SIZE` 设置为 `100MB` 作为起点（`AQ` 文档建议 `20MB`，但根据我的经验，这对于繁忙的系统来说太小了）。你可以使用[清单\
    \ 3-2](#9781430249382_Ch03.xhtml#list2)中的查询来监控 `streams pool` 的内存使用情况。\n\n***[清单\
    \ 3-2](#9781430249382_Ch03.xhtml#_list2)***. `Streams Pool` 的内存使用情况\n\n```\nSELECT\
    \ name,round(sum(bytes)/1024/1024,1) memory_mb\nFROM v$sgastat\nWHERE pool = 'streams\
    \ pool'\nGROUP BY name;\n```\n\n如果你选择为 `repository` 数据库采用 `RAC` 实施，你可能还希望为队列表配置实例关联性，以最小化实例内块\
    \ `ping`。当然，你应该通过 `Oracle Support` 验证对此队列定义的任何此类修改是否受支持。为了执行此任务，你将需要 `AQ_ADMINISTRATOR_ROLE`\
    \ 角色和在 `SYS.DBMS_AQADM` 包上的执行权限。你可以使用[清单 3-3](#9781430249382_Ch03.xhtml#list3)中的代码分配首选实例。\n\
    \n***[清单 3-3](#9781430249382_Ch03.xhtml#_list3)***. 更改队列表的实例关联性\n\n```\nBEGIN\n\
    \        SYS.DBMS_AQADM.ALTER_QUEUE_TABLE(\n        queue_table => 'SYSMAN.EM_CNTR_QTABLE',\n\
    \        primary_instance => 1\n);\nEND;\n/\n```\n\n![image](images/sq.jpg) `Note`\
    \ 设置实例关联性仅控制哪个 `QMN` 进程消费消息，并不阻止其他实例使用队列。\n\n## 优化器统计信息\n\n任何 `Oracle` 数据库管理员的核心任务之一是确保优化器拥有关于数据库应用程序访问对象的代表性统计信息，以确定执行计划的成本并据此进行优化。在没有代表性统计信息的情况下，`Oracle`\
    \ 更有可能选择低效的访问路径。为此，`Oracle` 为 `Enterprise Manager repository` 统计信息维护提供了一个内置的统计信息收集作业。该作业实现了一个统计信息收集策略，比数据库内置的统计信息收集作业更具灵活性。\n\
    \n该作业由 `EM_STATS_MONITOR` 表的内容控制，该表包含 `Enterprise Manager` 使用的表的一个子集，以及要提供给 `DBMS_STATS`\
    \ 包的偏好值。在此版本中，统计信息收集作业覆盖的唯一偏好是：对象被视为陈旧所需更改行的百分比，以及收集统计信息的粒度。"
  raw: 'In earlier sections, you’ve seen that agent and OMS management from the command
    line is largely performed using the EMCTL and EMCLI utilities. Management of the
    repository from the command line is different. It’s really just another Oracle
    database (albeit one with a special use), so the command-line interface for repository
    management is the DBA’s old friend, SQL*Plus. As this book isn’t aimed at DBA
    101–level skills, this section does not take you through the process of starting
    or stopping the repository. The only things you need to be aware of here are these:


    *   You should stop the OMS (using an emctl stop oms command) prior to stopping
    and restarting the repository database.

    *   You should also ensure that the listener is started before the repository
    database is started.


    Having said that, you do need to be aware of some other areas that you can manage
    from within SQL*Plus for the repository, particularly around space consumption
    and performance considerations. In this section, you’ll learn about the following:


    *   Data retention

    *   Queue management

    *   Optimizer statistics

    *   Repository views


    Data Retention


    Enterprise Manager gathers a lot of data. This data is processed and aggregated
    in the following lifecycle by default:


    *   Raw metric data, which is uploaded by the management agent according to the
    collection policy you define, is kept for 7 days.

    *   After 7 days, only hourly summaries (maximum, minimum, and average values
    for metrics) are kept.

    *   These are kept by default for 31 days, after which only daily summaries are
    kept.

    *   Finally, the daily summaries are kept for 12 months.


    You likely will want to review these policies. In particular, a common task carried
    out by target administrators is to compare performance with the previous business
    cycle. It’s therefore likely that you would want raw metrics available for longer
    than 7 days in order to drill down into more-granular data. Similarly, you might
    want to keep hourly data for more than a month so that you can, for example, compare
    month-end data between months. Finally, many organizations choose to keep daily
    data for many years.


    ![image](images/sq.jpg) **Caution**  Enterprise Manager uses partitioning in the
    repository database to maintain metric and other data. This would normally be
    an added feature as far as licensing is concerned, but provided you use only the
    Partitioning option for Enterprise Manager base tables, you do not need to pay
    extra. Please do *not* relink Oracle without partitioning, as I had one customer
    do who was concerned about extra licensing costs. You will seriously break the
    repository if you do!


    Enterprise Manager archives old data by dropping aged-out partitions for the metric
    tables. The retention policy can therefore be set by modifying the number of partitions
    to keep. Enterprise Manager provides a stored procedure to perform exactly this
    task. [Listing 3-1](#9781430249382_Ch03.xhtml#list1) implements a retention policy
    of 10 days for detail data, 40 days for hourly data, and 3 years for daily data.


    ***[Listing 3-1](#9781430249382_Ch03.xhtml#_list1)***.  Modifying EM Retention
    Policies


    ```

    BEGIN

            sysman.gc_interval_partition_mgr.set_retention(''SYSMAN'',''EM_METRIC_VALUES'',10);

            sysman.gc_interval_partition_mgr.set_retention(''SYSMAN'',''EM_METRIC_VALUES_HOURLY'',40);

            sysman.gc_interval_partition_mgr.set_retention(''SYSMAN'',''EM_METRIC_VALUES_DAILY'',36);

    END;

    /

    ```


    ![image](images/sq.jpg) **Note**  The table EM_INT_PARTITIONED_TABLES contains
    the default retention times for various interval-partitioned tables supplied as
    part of the repository.


    Queue Management


    Enterprise Manager makes significant use of Oracle’s in-database queuing technology
    (Oracle Streams Advanced Queuing, commonly referred to as AQ). This technology
    can require some care and maintenance to ensure that performance remains at optimal
    levels. This is especially true if you chose to implement an Oracle Real Application
    Clusters solution for your repository database. AQ queues are implemented using
    a variety of database technologies, including index-organized tables. If message
    dequeuing does not take place efficiently or completely, then over time the underlying
    data structures may grow significantly, and message enqueue and dequeue times
    may increase.


    Enterprise Manager uses queues heavily, specifically for metric load and upload
    and for notifications. The first indication you will likely have of a problem
    in this area will be that there is a persistent and increasing upload backlog,
    or a delay in notifications. Unfortunately, both of these symptoms can also have
    other causes.


    The initial database setup for Oracle Enterprise Manager doesn’t specifically
    configure the database as per the general guidance for AQ. In particular, AQ will
    benefit from a dedicated memory pool called the Streams pool. In a default installation,
    you will likely find this pool size unset, and so only a minimal memory allocation
    will be used for Advanced Queuing. I recommend you set the initialization parameter
    STREAMS_POOL_SIZE to a value of 100MB as a starting point (the AQ documentation
    suggests 20MB, but in my experience, that is undersized for busy systems). You
    can monitor memory usage of the streams pool by using the query in [Listing 3-2](#9781430249382_Ch03.xhtml#list2).


    ***[Listing 3-2](#9781430249382_Ch03.xhtml#_list2)***.  Memory Usage of the Streams
    Pool


    ```

    SELECT name,round(sum(bytes)/1024/1024,1) memory_mb

    FROM v$sgastat

    WHERE pool = ''streams pool''

    GROUP BY name;

    ```


    If you chose a RAC implementation for your repository database, you may also wish
    to configure instance affinity for your queue tables to minimize intra-instance
    block pinging. You should, of course, verify with Oracle Support that any such
    modification to the queue definition will be supported. In order to perform this
    task, you will need the AQ_ADMINISTRATOR_ROLE role and execute rights on the SYS.DBMS_AQADM
    package. You assign a preferred instance by using code like that in [Listing 3-3](#9781430249382_Ch03.xhtml#list3).


    ***[Listing 3-3](#9781430249382_Ch03.xhtml#_list3)***.  Altering a Queue Table’s
    Instance Affinity


    ```

    BEGIN

            SYS.DBMS_AQADM.ALTER_QUEUE_TABLE(

            queue_table => ''SYSMAN.EM_CNTR_QTABLE'',

            primary_instance => 1

    );

    END;

    /

    ```


    ![image](images/sq.jpg) **Note**  Setting the instance affinity controls only
    which QMN process consumes messages and doesn’t prevent other instances from using
    the queue.


    Optimizer Statistics


    One of the core tasks for an administrator of any Oracle database is ensuring
    that the optimizer has representative statistical data about the objects that
    database applications access in order to determine the cost of, and therefore
    optimize, execution plans appropriately. In the absence of representative statistics,
    Oracle is much more likely to choose inefficient access paths. To this end, Oracle
    supplies a built-in statistics-gathering job for Enterprise Manager repository
    statistics maintenance. This job implements a statistics-gathering policy that
    allows for more flexibility than the database built-in stats-gathering job.


    The job is controlled by the contents of the EM_STATS_MONITOR table, which contains
    a subset of the tables used by Enterprise Manager together with preference values
    to supply to the DBMS_STATS package. In this release, the only preferences overridden
    by the stats-gathering job are the percentage of changed rows required before
    an object is considered stale and the granularity at which to gather statistics.'
  trans: "# Oracle Enterprise Manager 存储库命令行管理\n\n## 介绍\n\n在之前的章节中，你已经看到，从命令行对 `OMS`\
    \ 和 `agent` 进行管理，主要使用 `EMCTL` 和 `EMCLI` 实用程序。从命令行对 `repository` 的管理则有所不同。它实际上就是另一个\
    \ `Oracle` 数据库（尽管是一个有特殊用途的数据库），因此 `repository` 管理的命令行界面是 `DBA` 的老朋友——`SQL*Plus`。由于本书并非针对\
    \ `DBA 101` 级别的技能，本节不会带你完成启动或停止 `repository` 的过程。你唯一需要注意的是以下几点：\n\n*   在停止并重启\
    \ `repository` 数据库之前，你应该先停止 `OMS`（使用 `emctl stop oms` 命令）。\n*   在启动 `repository`\
    \ 数据库之前，你也应该确保监听器已启动。\n\n话虽如此，你确实需要了解一些可以在 `SQL*Plus` 中为 `repository` 管理的其他领域，特别是围绕空间消耗和性能考量方面。在本节中，你将了解以下内容：\n\
    \n*   数据保留\n*   队列管理\n*   优化器统计信息\n*   `repository` 视图\n\n## 数据保留\n\n`Enterprise\
    \ Manager` 收集大量数据。默认情况下，这些数据在以下生命周期中进行处理和聚合：\n\n*   由管理 `agent` 根据你定义的收集策略上传的原始度量数据，将保留\
    \ `7` 天。\n*   `7` 天后，仅保留每小时的汇总数据（度量的最大值、最小值和平均值）。\n*   这些数据默认保留 `31` 天，之后仅保留每日汇总数据。\n\
    *   最后，每日汇总数据保留 `12` 个月。\n\n你可能希望审查这些策略。特别是，目标管理员执行的一项常见任务是与上一个业务周期进行性能比较。因此，你很可能希望原始度量数据的保留时间超过\
    \ `7` 天，以便深入分析更细粒度的数据。同样，你可能希望每小时数据的保留时间超过一个月，以便能够（例如）比较月度终数据。最后，许多组织选择将每日数据保留多年。\n\
    \n![image](img/sq.jpg) `注意` `Enterprise Manager` 在 `repository` 数据库中使用分区来维护度量和其他数据。就许可而言，这通常是一项附加功能，但只要你仅将分区选项用于\
    \ `Enterprise Manager` 基表，你就不需要额外付费。请**不要**在没有分区的情况下重新链接 `Oracle`，因为我曾有一位客户因为担心额外的许可成本而这样做了。如果你这样做，将会严重破坏\
    \ `repository`！\n\n`Enterprise Manager` 通过删除过期的度量表分区来归档旧数据。因此，可以通过修改要保留的分区数量来设置保留策略。`Enterprise\
    \ Manager` 提供了一个存储过程来执行此任务。清单 3-1 实现了一个保留策略：详细数据 `10` 天，每小时数据 `40` 天，每日数据 `3`\
    \ 年。\n\n***清单 3-1***. 修改 `EM` 保留策略\n\n```\nBEGIN\n        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES',10);\n\
    \        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES_HOURLY',40);\n\
    \        sysman.gc_interval_partition_mgr.set_retention('SYSMAN','EM_METRIC_VALUES_DAILY',36);\n\
    END;\n/\n```\n\n![image](img/sq.jpg) `注意` 表 `EM_INT_PARTITIONED_TABLES` 包含了作为\
    \ `repository` 一部分提供的各种 interval 分区表的默认保留时间。\n\n## 队列管理\n\n`Enterprise Manager`\
    \ 大量使用 `Oracle` 的数据库内队列技术（`Oracle Streams Advanced Queuing`，通常简称为 `AQ`）。该技术可能需要一些细心和维护，以确保性能保持在最佳水平。如果你选择为\
    \ `repository` 数据库实施 `Oracle Real Application Clusters` 解决方案，这一点尤其重要。`AQ` 队列使用多种数据库技术实现，包括索引组织表。如果消息出队未高效或完全进行，那么随着时间的推移，底层数据结构可能会显著增长，消息入队和出队时间可能会增加。\n\
    \n`Enterprise Manager` 大量使用队列，特别是用于度量加载和上传以及通知。你可能会发现此区域问题的第一个迹象是出现持续且不断增长的上传积压，或通知延迟。不幸的是，这两种症状也可能有其他原因。\n\
    \n`Oracle Enterprise Manager` 的初始数据库设置并未专门按照 `AQ` 的通用指南配置数据库。特别是，`AQ` 将受益于一个称为\
    \ `Streams pool` 的专用内存池。在默认安装中，你可能会发现此池大小未设置，因此 `Advanced Queuing` 只会使用最小的内存分配。我建议你将初始化参数\
    \ `STREAMS_POOL_SIZE` 设置为 `100MB` 作为起点（`AQ` 文档建议 `20MB`，但根据我的经验，这对于繁忙的系统来说太小了）。你可以使用清单\
    \ 3-2 中的查询来监控 `streams pool` 的内存使用情况。\n\n***清单 3-2***. `Streams Pool` 的内存使用情况\n\
    \n```\nSELECT name,round(sum(bytes)/1024/1024,1) memory_mb\nFROM v$sgastat\nWHERE\
    \ pool = 'streams pool'\nGROUP BY name;\n```\n\n如果你选择为 `repository` 数据库采用 `RAC`\
    \ 实施，你可能还希望为队列表配置实例关联性，以最小化实例内块 `ping`。当然，你应该通过 `Oracle Support` 验证对此队列定义的任何此类修改是否受支持。为了执行此任务，你将需要\
    \ `AQ_ADMINISTRATOR_ROLE` 角色和在 `SYS.DBMS_AQADM` 包上的执行权限。你可以使用清单 3-3 中的代码分配首选实例。\n\
    \n***清单 3-3***. 更改队列表的实例关联性\n\n```\nBEGIN\n        SYS.DBMS_AQADM.ALTER_QUEUE_TABLE(\n\
    \        queue_table => 'SYSMAN.EM_CNTR_QTABLE',\n        primary_instance =>\
    \ 1\n);\nEND;\n/\n```\n\n![image](img/sq.jpg) `注意` 设置实例关联性仅控制哪个 `QMN` 进程消费消息，并不阻止其他实例使用队列。\n\
    \n## 优化器统计信息\n\n任何 `Oracle` 数据库管理员的核心任务之一是确保优化器拥有关于数据库应用程序访问对象的代表性统计信息，以确定执行计划的成本并据此进行优化。在没有代表性统计信息的情况下，`Oracle`\
    \ 更有可能选择低效的访问路径。为此，`Oracle` 为 `Enterprise Manager repository` 统计信息维护提供了一个内置的统计信息收集作业。该作业实现了一个统计信息收集策略，比数据库内置的统计信息收集作业更具灵活性。\n\
    \n该作业由 `EM_STATS_MONITOR` 表的内容控制，该表包含 `Enterprise Manager` 使用的表的一个子集，以及要提供给 `DBMS_STATS`\
    \ 包的偏好值。在此版本中，统计信息收集作业覆盖的唯一偏好是：对象被视为陈旧所需更改行的百分比，以及收集统计信息的粒度。"
- fmt: '## 调度任务配置


    This single scheduler job is logically organized into two separate statistics-gathering
    activities:


    *   A daily run, which ensures that all stale Enterprise Manager object stats
    are updated

    *   A second bi-hourly run, which considers the top stale objects in the `EM_STATS_MONITOR`
    table for stats collection


    The daily task runs between midnight and 1 AM in the time zone of the database
    server. The second job runs every 2 hours and is designed to meet the following
    objectives:


    *   Ensure that volatile tables have current statistics

    *   Ensure that provision is made for site-specific needs


    In the case of the bi-hourly collection, it may well be that the statistics-gathering
    regime is overly aggressive. Few sites will really need bi-hourly runs against
    repository tables. You may, therefore, wish to modify the schedule of the `EM_GATHER_SYSMAN_STATS`
    scheduled task, but if you do so, make sure that it still executes between midnight
    and 1 AM so as to ensure that the overnight collection still occurs.


    ## Repository Views


    When all is said and done, Enterprise Manager stores its data in a set of tables.
    Access to these base tables is provided by a set of repository views, which have
    been documented in Chapter 18 of the *Oracle Enterprise Manager Cloud Control
    Extensibility Programmer''s Reference* (available online at [`http://docs.oracle.com/cd/E24628_01/doc.121/e25161/views.htm#sthref1292`](http://docs.oracle.com/cd/E24628_01/doc.121/e25161/views.htm#sthref1292)).
    Note that this reference is to the `12.1.0.2` version of the documentation. If
    you are still on `12.1.0.1`, you need to look at Chapter 17 of the equivalent
    document.


    ![image](images/sq.jpg) Note  Some of the views you may be interested in are documented
    in the Extensibility Development Kit (EDK), so you may also need to install that
    to see the documentation for those views. That’s done by selecting the Setup menu
    from the console, choosing Extensibility ![arrow](images/arrow.jpg) Development
    Kit, and following the instructions documented there.


    Obviously, with a product as large as Enterprise Manager, there are an equally
    large number of views that you can look at, so all are not documented here. The
    important thing to be aware of is how to find more information on them, and that’s
    all documented in the aforementioned chapter. Depending on your requirements,
    you may also want to investigate the use of BI Publisher, the new reporting capability
    with `EM12c` that allows highly formatted custom reports against the EM repository.
    (Again, EM includes a restricted-use license for BI Publisher for use against
    the EM repository. Use against other data sources will require a BI Publisher
    license.)


    ![image](images/sq.jpg) Tip  I’m continually amazed by how few people know about
    these views, so take the time to examine the Oracle documentation and become familiar
    with them. In particular, look at the example usage documented at the end of Chapter
    18 in the *Oracle Enterprise Manager Cloud Control Extensibility Programmer''s
    Reference*.


    ## Troubleshooting


    There is one more utility that you should be familiar with, which is used for
    troubleshooting across all three layers of the stack. That tool is `EMDIAG`. `EMDIAG`
    is a collection of scripts and tools designed to help troubleshoot and diagnose
    problems with EM. Each EM tier has a specific kit: `AGTVFY` for the agent tier,
    `OMSVFY` for the OMS tier, and `REPVFY` for the repository tier, each of which
    will identify known issues by looking for known problem signatures. Oracle Support
    has an `EMDIAG` Master Index note (Note `421053.1`) that explains how to download,
    install, and use each kit. Be sure to download the correct version for `EM12c`.


    Each kit is a set of commands that you can use for displaying information about
    the setup, configuration, and use of a relevant tier, or to dump objects. They
    can even be used when the tier itself is not running (or indeed when it is broken).
    When you run these commands, you can pass a level from 0 to 9 into them like this:


    ```

    $ ./agtvfy verify all -level 2 details

    ```


    When a command takes a level as a parameter, you should start with the lowest
    value (0), fix issues that are reported from that command, and then run it again
    at the next highest level. Levels from 0 to 4 report functional issues, 6 to 8
    are reporting issues, and 9 is for internal diagnostics. You should run the reports
    at level 9 only under guidance from Oracle Support. Just as an example, here’s
    the sort of difference you can expect between (for example) level 2 and level
    9 when running `REPVFY`:


    ![image](images/sq.jpg) Note  This is a purposefully badly set up environment.
    Hopefully, you won’t see anywhere near this level of problems!


    ```

    $ ./repvfy verify all -level 2 details


    Please enter the SYSMAN password:


    -- --------------------------------------------------------------------- --

    -- REPVFY: 2013.0327     Repository: 12.1.0.2.0     04-Apr-2013 16:14:52 --


    verifyAGENTS

    0001\. Agents without a host target: 2

    1005\. Active Agents with clock-skew problems: 1

    2001\. Managed Agents without a managed ORACLE_HOME: 2

    verifyASLM

    verifyAVAILABILITY

    verifyBLACKOUTS

    verifyCAT

    verifyCORE

    0003\. Invalid objects in EM schemas: 2

    verifyECM

    verifyEMDIAG

    1001\. Undefined verification modules: 1

    verifyEVENTS

    verifyEXADATA

    verifyJOBS

    verifyJVMD

    verifyLOADERS

    verifyMETRICS

    verifyNOTIFICATIONS

    verifyOMS

    verifyPLUGINS

    verifyREPOSITORY

    verifyTARGETS

    1003\. Discovered entities on Agents not linked to a plugin: 5

    1014\. Admin group properties with non-used values in leaf groups: 100

    2004\. Targets without an ORACLE_HOME association: 2

    2006\. Targets with missing ORACLE_HOME target: 1

    2007\. Targets with unpromoted ORACLE_HOME target: 1

    2010\. Targets with hostname and agent name mismatch: 141

    verifyUSERS

    ```


    ![image](images/sq.jpg) Note  The line `1001\. Undefined verification modules:
    1` is a bug in this particular version of `REPVFY` and should be ignored.


    ```

    $ ./repvfy verify all -level 9 details


    Please enter the SYSMAN password:


    -- --------------------------------------------------------------------- --

    -- REPVFY: 2013.0327     Repository: 12.1.0.2.0     04-Apr-2013 16:18:28 --

    ```'
