    ## 维护软件库


    ![image](img/sq.jpg) **注意** 适用于 EM12c 云控制的 Oracle 文档位于此处：[`docs.oracle.com/cd/E24628_01/index.htm`](http://docs.oracle.com/cd/E24628_01/index.htm)。


    针对实体的维护任务如下：


    *   授予或撤销特权

    *   移动实体

    *   更改实体成熟度

    *   向实体添加注释

    *   向实体添加附件

    *   查看、编辑和删除实体

    *   搜索实体

    *   导出/导入实体

    *   暂存与实体关联的文件


    ![image](img/sq.jpg) **注意** 从 EM12c 的 12.1.0.2 版本开始，您可以使用 `GUI` 或 `命令行界面` 来执行上述任务。


    正如我们维护软件库中的实体一样，我们也必须维护软件库自身的健康和功能性。只有软件库管理员或拥有管理权限的设计师才能执行以下操作：


    *   执行定期维护任务

    *   重新导入 Oracle 拥有的实体文件

    *   移除（并迁移）软件库存储位置

    *   清除已删除的实体文件

    *   备份软件库


    所有这些任务对于软件库的正常运行都至关重要。


    ### 执行定期维护任务


    为保持软件库正常运行，必须定期执行以下任务：


    *   刷新软件库以计算已用和可用磁盘空间

    *   清除已删除的实体以节省磁盘空间

    *   检查已配置的软件库位置以确保其可访问


    ### 重新导入 Oracle 拥有的实体文件


    重新导入 Oracle 拥有的实体文件并非周期性活动。此过程仅应用于恢复由 Oracle 拥有的元数据文件。仅在以下两种情况下应执行此操作：


    *   如果您删除了导入元数据的文件系统位置

    *   如果创建第一个上传位置时提交的导入作业失败


    要重新导入 Oracle 拥有的文件的元数据，请访问 `设置` 下的软件库管理页面。从 `操作` 菜单中，选择 `重新导入元数据`，如 图 6-30 所示。这将提交一个作业来重新导入元数据。


    ![9781430249382_Fig06-30.jpg](img/9781430249382_Fig06-30.jpg)


    图 6-30。重新导入元数据


    ![image](img/sq.jpg) **注意** 重新导入元数据仅适用于 Oracle 拥有的文件，即默认随 `OEM` 产品一起提供的所有实体文件。用户拥有的实体元数据无法通过
    `重新导入` 功能恢复。


    ### 移除（并迁移）软件库存储位置


    有时您可能需要将软件库从其当前存储位置移动到新位置。这可能出于多种原因。例如，您可能需要更多的存储空间。


    只有 `软件库存储管理员` 拥有删除存储位置所需的权限。在删除存储位置之前，系统会提示您选择一个备用位置来迁移文件。接着，将提交一个迁移作业，并将当前位置标记为非活动状态。迁移作业完成后，旧的存储位置将被删除。


    要删除当前存储位置，请按照以下步骤操作：


    1.  访问软件库管理页面（`设置` → `置备和修补` → `软件库`）。

    2.  选择存储位置。然后点击 `迁移并移除`。

    3.  在确认框中，点击 `移除` 以提交作业。成功完成后，旧存储区域将从表中移除。


    ### 清除已删除的实体文件


    从 EM12c 开始，不再需要的实体可以从软件库中清除。清除作业现在也可以安排，同样在 `清除已删除实体文件` 对话框中进行，如 图 6-31 所示。要安排从软件库清除实体的作业，请按照以下步骤操作：


    1.  访问软件库管理页面（`设置` → `置备和修补` → `软件库`）。

    2.  选择存储位置，然后从 `操作` 菜单中选择 `清除`。

    3.  输入作业所需的所有详细信息，然后点击 `确定`。成功完成后，所有已删除的实体将从软件库中移除。


    ![9781430249382_Fig06-31.jpg](img/9781430249382_Fig06-31.jpg)


    图 6-31。安排清除实体


    ### 备份软件库


    到目前为止，我们花了大量时间定义软件库、它的用途以及如何向其中添加实体。既然我们花了大量时间设置软件库，最不愿意做的事情就是备份它。然而，就像任何其他 Oracle
    产品一样，备份对于确保在发生灾难时可恢复性至关重要。


    实际上，备份软件库是在备份 Oracle 企业管理器本身时完成的。备份 Oracle 企业管理器在 第 13 章 中有详细介绍。


    ## 修补


    修补是产品生命周期中最重要的阶段之一。它使我们能够通过错误和安全修复来保持我们的软件产品更新。全年，Oracle 会发布几种类型的补丁来帮助我们维护产品。然而，修补也一直是最具挑战性的生命周期阶段，因为它通常复杂、有风险、耗时，并且需要应用程序停机。尽管我们可以使用多种方法来修补数据库，但不幸的是，最小化停机或中断的挑战依然存在。


    在本节中，您将学习如何在 EM12c 中管理补丁。此外，您将了解如何配置企业管理器以使用 `My Oracle Support`，并回顾在企业管理器环境中修补的整个过程。


    ### 补丁管理


    在深入探讨 EM12c 中补丁管理的新功能之前，您需要了解之前面临的挑战。表 6-2 列出了修补方法及其相关挑战。


    表 6-2。当前的修补工具和挑战


    ![Table6-2.jpg](img/Table6-2.jpg)


    Oracle 企业管理器通过其大幅改进的补丁管理解决方案来应对表 6-2 中列出的挑战，该解决方案以最小的停机时间提供最大的便利。新的补丁管理解决方案提供以下优势：

    '
- fmt: "## 集成补丁工作流的优势\n\n*   集成的补丁工作流与 `My Oracle Support`。因此，您可以使用相同的用户界面查看建议、搜索补丁并推出补丁。\n\
    *   使用*补丁计划*对补丁工作流进行完整的端到端编排，包括自动选择部署过程和分析补丁冲突。因此，只需最少的人工操作。\n*   设计师和操作员之间的职责划分清晰——设计师可以专注于创建补丁计划、在测试系统上测试它们，并将其保存为补丁模板。操作员可以专注于从模板创建补丁计划，以便在生产系统上推出补丁。\n\
    *   轻松审查补丁在您环境中的适用性、验证补丁计划，并自动接收补丁以解决验证问题。\n*   将成功分析或可部署的补丁计划另存为补丁模板，其中包含从源补丁计划保存的一组预定义的补丁和部署选项。\n\
    *   针对独立（单实例）数据库目标以及属于 `Oracle Exadata` 一部分的 `Oracle Grid Infrastructure` 目标进行异地补丁。\n\
    *   灵活的补丁选项，例如滚动和并行，同时支持离线和在线模式。\n\n## 配置 My Oracle Support\n\n在我们真正讨论一些新的补丁选项之前，必须将\
    \ `Oracle Enterprise Manager` 与 `My Oracle Support` 集成。Oracle 在集成这两个界面方面做得很好，使我们更容易从\
    \ `Oracle Enterprise Manager` 界面在 `MOS` 中找到补丁。\n\n要在 `Oracle Enterprise Manager`\
    \ 中设置 `My Oracle Support`，需要将我们的 `MOS` 凭据添加到 `OEM`。这可以通过选择 `Setup > My Oracle\
    \ Support > Set Credentials` 来完成，如图 6-32 所示。\n\n![9781430249382_Fig06-32.jpg](images/9781430249382_Fig06-32.jpg)\n\
    \n图 6-32. 为 `My Oracle Support` 设置凭据\n\n单击此菜单命令将转到 `My Oracle Support` 首选凭据页面。在这里输入\
    \ `MOS` 所需的单点登录名，如图 6-33 所示。然后单击 `Apply`。（`Apply` 按钮旁边是 `Remove` 按钮。如果您想从 `OEM`\
    \ 中删除 `MOS` 凭据，`Remove` 按钮可实现此功能。）\n\n![9781430249382_Fig06-33.jpg](images/9781430249382_Fig06-33.jpg)\n\
    \n图 6-33. 设置 `My Oracle Support` 首选凭据\n\n将 `MOS` 帐户信息添加到 `OEM` 后，您就可以开始从 `Enterprise\
    \ Manager` 内部查找补丁和更新。\n\n## 补丁计划\n\n补丁计划可帮助您创建要作为一个组应用到一个或多个目标的合并补丁列表。补丁计划具有映射到部署过程中关键步骤的状态。`Oracle\
    \ Enterprise Manager` 支持以两种形式创建补丁计划：\n\n*   补丁集\n*   补丁（一次性）\n\n*   临时补丁，包含单个错误修复或根据需要提供的一组错误修复。\n\
    *   诊断补丁，旨在帮助诊断或验证修复或一组错误修复。\n*   补丁集更新。\n*   关键补丁更新，现在称为安全补丁更新。\n\n> **注意** 您不能将补丁集和补丁添加到同一个补丁计划中。相反，您可以有一个用于补丁集的补丁计划，另一个用于补丁的补丁计划。\n\
    \n只有当补丁的版本和平台与添加到的目标相同时，才能将补丁添加到计划中的目标。如果您尝试添加与目标关联的产品不同的补丁，将会引发警告。但是，此警告不会阻止您将补丁添加到计划中。您可以在补丁计划中包含任何目标的任何补丁。该计划将根据您的环境验证任何补丁，并检查与已安装补丁的冲突。\n\
    \n根据添加到补丁计划中的补丁，`Oracle` 会自动选择用于应用补丁的适当部署过程。\n\n通过使用补丁计划，我们可以简化许多环境中补丁的识别和部署。这通过帮助我们在实际修补环境之前识别任何潜在冲突，大大增加了我们在补丁方面的灵活性。\n\
    \n> **注意** 补丁计划目前不适用于修补硬件系统或操作系统。如果修补属于 `Oracle Exadata` 一部分的 `Oracle Grid Infrastructure`\
    \ 目标，您每个补丁计划只能添加一个补丁（`Oracle Exadata`）。对于所有其他目标，只要补丁与要修补的目标具有相同的版本和平台，您可以添加任意数量的补丁。\n\
    \n补丁计划有两种基本类型：可部署和不可部署。\n\n*   当满足以下条件时，补丁计划是可部署的：\n    *   它仅包含相同类型的补丁（同质补丁）。\n\
    \    *   它包含受支持进行修补、配置相似且属于同一产品类型、平台和版本的目标。\n    *   计划中没有冲突。\n*   任何不满足上述部署条件的补丁计划都是不可部署计划。任何不可部署的补丁计划都无法使用该补丁计划部署补丁。您可以执行一些分析和检查，下载补丁并手动应用它们。\n\
    \n## 创建补丁计划\n\n现在您了解了什么是补丁计划以及两种计划类型，让我们快速浏览一下创建用于应用 `CPU` 补丁的补丁计划的过程。在本节中，您将逐步完成创建可用于补丁集或一次性部署的补丁计划所需的所有步骤。\n\
    \n### 设置补丁计划\n\n要创建补丁计划，您需要从 `Oracle Enterprise Manager` 中的 `Patches & Updates`\
    \ 页面开始。通过选择 `Enterprise > Provisioning and Patching > Patches & Updates` 导航到此页面，如图\
    \ 6-34 所示。此页面看起来与 `My Oracle Support` 页面完全相同。唯一的区别是此页面是从 `Enterprise Manager`\
    \ 内部访问的。\n\n![9781430249382_Fig06-34.jpg](images/9781430249382_Fig06-34.jpg)\n\
    \n图 6-34. 来自 `Enterprise` 菜单的 `Patches & Updates`\n\n在此页面上，您将通过查看 `Patch Recommendations`\
    \ 开始创建补丁计划（参见图 6-35）。\n\n![9781430249382_Fig06-35.jpg](images/9781430249382_Fig06-35.jpg)\n\
    \n图 6-35. `Patches & Updates` 页面上的补丁建议\n\n> **注意** 除非您过去创建过补丁计划，否则 `Patches &\
    \ Updates` 页面上的 `Plans` 部分将为空。\n\n页面的此部分包含两个单选按钮。默认情况下，选择 `Classification` 按钮。在此对话框中更重要的是\
    \ `Oracle` 提供的建议。在图 6-36 所示的示例中，似乎我们有等待处理的安全补丁。让我们将它们添加到计划中。\n\n![9781430249382_Fig06-36.jpg](images/9781430249382_Fig06-36.jpg)\n\
    \n图 6-36. 补丁建议屏幕\n\n单击 `Security` 链接，您将转到如图 6-36 所示的 `Patch Recommendations` 页面。此页面提供了建议的补丁列表及其建议的目标。选中补丁名称旁边的复选框，将打开一个对话框，使您可以直接将补丁下载到桌面或将其添加到补丁计划。"
  raw: '*   Integrated patching workflow with My Oracle Support Therefore, you see
    recommendations, search patches, and roll out patches all using the same user
    interface.

    *   Complete, end-to-end orchestration of patching workflow using *patch plans,*
    including automated selection of deployment procedures and analysis of the patch
    conflicts. Therefore, minimal manual effort is required.

    *   Clear division of responsibilities between designers and operators - Designers
    can focus on creating patch plans, testing them on a test system, and saving them
    as patch templates. Operators can focus on creating patch plans out of the template
    for rolling out the patches on a production system.

    *   Easy review of patches for applicability in your environment, validation of
    patch plans, and automatic receipt of patches to resolve validation issues.

    *   Saving successfully analyzed or deployable patch plans as patch templates,
    which contain a predetermined set of patches and deployment options saved from
    the source patch plan.

    *   Out-of-place patching for stand-alone (single-instance) database targets and
    Oracle Grid Infrastructure targets that are part of Oracle Exadata.

    *   Flexible patching options such as rolling and parallel, both in offline and
    online mode.


    Configuration of My Oracle Support


    Before we can truly discuss some of the new patching options, Oracle Enterprise
    Manager (OEM) has to be integrated with My Oracle Support (MOS). Oracle has done
    a good job of integrating the two interfaces, making it easier for us to find
    patches within MOS from the Oracle Enterprise Manager interface.


    To set up My Oracle Support within Oracle Enterprise Manager, our MOS credentials
    need to be added to OEM. This can be accomplished by choosing Setup ![arrow](images/arrow.jpg)
    My Oracle Support ![arrow](images/arrow.jpg) Set Credentials, as shown in [Figure
    6-32](#9781430249382_Ch06.xhtml#Fig32).


    ![9781430249382_Fig06-32.jpg](images/9781430249382_Fig06-32.jpg)


    [Figure 6-32](#9781430249382_Ch06.xhtml#_Fig32). Setting credentials for My Oracle
    Support


    Clicking this menu command lands you on the My Oracle Support Preferred Credentials
    page. Here you enter your single sign-on login needed for MOS, as shown in [Figure
    6-33](#9781430249382_Ch06.xhtml#Fig33). Then click Apply. (Next to the Apply button
    is the Remove button. If you want to remove your MOS credentials from OEM, the
    Remove button does that.)


    ![9781430249382_Fig06-33.jpg](images/9781430249382_Fig06-33.jpg)


    [Figure 6-33](#9781430249382_Ch06.xhtml#_Fig33). Setting My Oracle Support preferred
    credentials


    After adding your MOS account information to OEM, you can begin to look for patches
    and updates from within Enterprise Manager.


    Patch Plans


    Patch plans help you create a consolidated list of patches that you want to apply
    as a group to one or more targets. Patch plans have states that map to key steps
    in the deployment process. Oracle Enterprise Manager supports creating patches
    in two forms:


    *   Patch sets

    *   Patches (one-off)


    *   Interim patches that contain a single bug fix or a collection of bug fixes
    provided as required.

    *   Diagnostic patches, intended to help diagnose or verify a fix or a collection
    of bug fixes.

    *   Patch set updates (PSUs).

    *   Critical patch updates (CPUs), now known as security patch updates (SPUs).


    ![image](images/sq.jpg) **Note**  You cannot add both patch sets and patches to
    the same patch plan. Instead, you can have a patch plan for patch sets and another
    patch plan for patches.


    Patches can be added to a target in a plan only if the patch has the same release
    and platform as the target to which it is being added. A warning will be raised
    if you try to add a patch that is different from the product associated with the
    target. However, the warning will not prevent you from adding the patch to the
    plan. You can include any patch for any target in a patch plan. The plan will
    validate any patches against your environment and check for conflicts with the
    installed patches.


    Depending on the patches added to the patch plan, Oracle automatically selects
    the appropriate deployment procedure to be used for applying the patches.


    By using patch plans, we can simplify the identification and deployment of patches
    for many environments. This greatly increases our flexibility in patching by helping
    us identify any potential conflicts before actually patching environments.


    ![image](images/sq.jpg) **Note**  Patch plans are currently not available for
    patching hardware systems or operating systems. If patching an Oracle Grid Infrastructure
    target, which is part of Oracle Exadata, you can add only one patch (Oracle Exadata)
    per patch plan. For all other targets, you can add as many patches as you want,
    as long as the patches are of the same release and platform as the targets being
    patched.


    There are two basic types of patch plans: deployable and nondeployable.


    *   A patch plan is deployable when the following are true:


    *   It contains only patches of the same type (homogenous patches).

    *   It contains targets that are supported for patching, are similarly configured,
    and are of the same product type, platform, and version.

    *   There are no conflicts within the plan.


    *   Any patch plan that does not meeting the preceding conditions for deployment
    is a nondeployable plan. Any patch plan that is nondeployable cannot deploy patches
    using the patch plan. You can perform some analysis and checks, download patches,
    and manually apply them.


    Creation of a Patch Plan


    Now that you understand what a patch plan is and the two types of plans, let’s
    quickly walk through creating a patch plan for applying a CPU patch. In this section,
    you’ll walk through all the steps needed to create a patch plan that can be used
    for either a patch set or one-off deployment.


    Setting Up the Patch Plan


    To create a patch plan, you need to start on the Patches & Updates page in Oracle
    Enterprise Manager. Navigate to this page by choosing Enterprise ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Patches & Updates, as shown
    in [Figure 6-34](#9781430249382_Ch06.xhtml#Fig34). This page looks exactly like
    the My Oracle Support (MOS) page. The only difference is that the page is being
    accessed from within Enterprise Manager.


    ![9781430249382_Fig06-34.jpg](images/9781430249382_Fig06-34.jpg)


    [Figure 6-34](#9781430249382_Ch06.xhtml#_Fig34). Patches & Updates from the Enterprise
    menu


    On this page, you will start creating the patch plan by looking at Patch Recommendations
    (see [Figure 6-35](#9781430249382_Ch06.xhtml#Fig35)).


    ![9781430249382_Fig06-35.jpg](images/9781430249382_Fig06-35.jpg)


    [Figure 6-35](#9781430249382_Ch06.xhtml#_Fig35). Patch recommendations on the
    Patches & Updates page


    ![image](images/sq.jpg) **Note**  Unless you have created patch plans in the past,
    the Plans section on the Patches & Updates page will be empty.


    This section of the page contains two radio buttons. By default, the Classification
    button is selected. What is more important within this dialog box are the recommendations
    that Oracle is making. In the example shown in [Figure 6-36](#9781430249382_Ch06.xhtml#Fig36),
    it appears that we have security patches waiting. Let’s add these to a plan.


    ![9781430249382_Fig06-36.jpg](images/9781430249382_Fig06-36.jpg)


    [Figure 6-36](#9781430249382_Ch06.xhtml#_Fig36). Patch Recommendations screen


    Click the Security link, and you are taken to the Patch Recommendations page shown
    in [Figure 6-36](#9781430249382_Ch06.xhtml#Fig36). This page provides a list of
    patches that are recommended, along with the target they are recommended for.
    Select the check box next to the patch name, and a dialog box opens, enabling
    you to download the patch directly to your desktop or to add it to a patch plan.'
  trans: "\n## 集成补丁工作流的优势\n\n*   集成的补丁工作流与 `My Oracle Support` 相连。因此，您可以使用相同的用户界面查看建议、搜索补丁并推出补丁。\n\
    *   使用*补丁计划*对补丁工作流进行完整的端到端编排，包括自动选择部署过程和分析补丁冲突。因此，只需最少的人工操作。\n*   设计师和操作员之间的职责划分清晰——设计师可以专注于创建补丁计划、在测试系统上测试它们，并将其保存为补丁模板。操作员可以专注于从模板创建补丁计划，以便在生产系统上推出补丁。\n\
    *   轻松审查补丁在您环境中的适用性、验证补丁计划，并自动接收补丁以解决验证问题。\n*   将成功分析或可部署的补丁计划另存为补丁模板，其中包含从源补丁计划保存的一组预定义的补丁和部署选项。\n\
    *   针对独立（单实例）数据库目标以及属于 `Oracle Exadata` 一部分的 `Oracle Grid Infrastructure` 目标进行异地补丁。\n\
    *   灵活的补丁选项，例如滚动和并行，同时支持离线和在线模式。\n\n## 配置 My Oracle Support\n\n在我们真正讨论一些新的补丁选项之前，必须将\
    \ `Oracle Enterprise Manager` 与 `My Oracle Support` 集成。Oracle 在集成这两个界面方面做得很好，使我们更容易从\
    \ `Oracle Enterprise Manager` 界面在 `MOS` 中找到补丁。\n\n要在 `Oracle Enterprise Manager`\
    \ 中设置 `My Oracle Support`，需要将我们的 `MOS` 凭据添加到 `OEM`。这可以通过选择 `Setup > My Oracle\
    \ Support > Set Credentials` 来完成，如图 6-32 所示。\n\n![9781430249382_Fig06-32.jpg](img/9781430249382_Fig06-32.jpg)\n\
    \n图 6-32. 为 `My Oracle Support` 设置凭据\n\n单击此菜单命令将转到 `My Oracle Support` 首选凭据页面。在这里输入\
    \ `MOS` 所需的单点登录名，如图 6-33 所示。然后单击 `Apply`。（`Apply` 按钮旁边是 `Remove` 按钮。如果您想从 `OEM`\
    \ 中删除 `MOS` 凭据，`Remove` 按钮可实现此功能。）\n\n![9781430249382_Fig06-33.jpg](img/9781430249382_Fig06-33.jpg)\n\
    \n图 6-33. 设置 `My Oracle Support` 首选凭据\n\n将 `MOS` 帐户信息添加到 `OEM` 后，您就可以开始从 `Enterprise\
    \ Manager` 内部查找补丁和更新。\n\n## 补丁计划\n\n补丁计划可帮助您创建要作为一个组应用到一个或多个目标的合并补丁列表。补丁计划具有映射到部署过程中关键步骤的状态。`Oracle\
    \ Enterprise Manager` 支持以两种形式创建补丁计划：\n\n*   补丁集\n*   补丁（一次性）\n\n*   临时补丁，包含单个错误修复或根据需要提供的一组错误修复。\n\
    *   诊断补丁，旨在帮助诊断或验证修复或一组错误修复。\n*   补丁集更新。\n*   关键补丁更新，现在称为安全补丁更新。\n\n> **注意** 您不能将补丁集和补丁添加到同一个补丁计划中。相反，您可以有一个用于补丁集的补丁计划，另一个用于补丁的补丁计划。\n\
    \n只有当补丁的版本和平台与添加到的目标相同时，才能将补丁添加到计划中的目标。如果您尝试添加与目标关联的产品不同的补丁，将会引发警告。但是，此警告不会阻止您将补丁添加到计划中。您可以在补丁计划中包含任何目标的任何补丁。该计划将根据您的环境验证任何补丁，并检查与已安装补丁的冲突。\n\
    \n根据添加到补丁计划中的补丁，`Oracle` 会自动选择用于应用补丁的适当部署过程。\n\n通过使用补丁计划，我们可以简化许多环境中补丁的识别和部署。这通过帮助我们在实际修补环境之前识别任何潜在冲突，大大增加了我们在补丁方面的灵活性。\n\
    \n> **注意** 补丁计划目前不适用于修补硬件系统或操作系统。如果修补属于 `Oracle Exadata` 一部分的 `Oracle Grid Infrastructure`\
    \ 目标，您每个补丁计划只能添加一个补丁（`Oracle Exadata`）。对于所有其他目标，只要补丁与要修补的目标具有相同的版本和平台，您可以添加任意数量的补丁。\n\
    \n补丁计划有两种基本类型：可部署和不可部署。\n\n*   当满足以下条件时，补丁计划是可部署的：\n    *   它仅包含相同类型的补丁（同质补丁）。\n\
    \    *   它包含受支持进行修补、配置相似且属于同一产品类型、平台和版本的目标。\n    *   计划中没有冲突。\n*   任何不满足上述部署条件的补丁计划都是不可部署计划。任何不可部署的补丁计划都无法使用该补丁计划部署补丁。您可以执行一些分析和检查，下载补丁并手动应用它们。\n\
    \n## 创建补丁计划\n\n现在您了解了什么是补丁计划以及两种计划类型，让我们快速浏览一下创建用于应用 `CPU` 补丁的补丁计划的过程。在本节中，您将逐步完成创建可用于补丁集或一次性部署的补丁计划所需的所有步骤。\n\
    \n### 设置补丁计划\n\n要创建补丁计划，您需要从 `Oracle Enterprise Manager` 中的 `Patches & Updates`\
    \ 页面开始。通过选择 `Enterprise > Provisioning and Patching > Patches & Updates` 导航到此页面，如图\
    \ 6-34 所示。此页面看起来与 `My Oracle Support` 页面完全相同。唯一的区别是此页面是从 `Enterprise Manager`\
    \ 内部访问的。\n\n![9781430249382_Fig06-34.jpg](img/9781430249382_Fig06-34.jpg)\n\n\
    图 6-34. 来自 `Enterprise` 菜单的 `Patches & Updates`\n\n在此页面上，您将通过查看 `Patch Recommendations`\
    \ 开始创建补丁计划（参见图 6-35）。\n\n![9781430249382_Fig06-35.jpg](img/9781430249382_Fig06-35.jpg)\n\
    \n图 6-35. `Patches & Updates` 页面上的补丁建议\n\n> **注意** 除非您过去创建过补丁计划，否则 `Patches &\
    \ Updates` 页面上的 `Plans` 部分将为空。\n\n页面的此部分包含两个单选按钮。默认情况下，选择 `Classification` 按钮。在此对话框中更重要的是\
    \ `Oracle` 提供的建议。在图 6-36 所示的示例中，似乎我们有等待处理的安全补丁。让我们将它们添加到计划中。\n\n![9781430249382_Fig06-36.jpg](img/9781430249382_Fig06-36.jpg)\n\
    \n图 6-36. 补丁建议屏幕\n\n单击 `Security` 链接，您将转到如图 6-36 所示的 `Patch Recommendations` 页面。此页面提供了建议的补丁列表及其建议的目标。选中补丁名称旁边的复选框，将打开一个对话框，使您可以直接将补丁下载到桌面或将其添加到补丁计划。\n"
- fmt: 'Because you are going to add this patch to a patch plan, click the `Add to
    Plan` drop-down menu, as shown in [Figure 6-37](#9781430249382_Ch06.xhtml#Fig37).
    This menu enables you to add the patch to a new or existing plan. Choose the `Add
    to New` option, and a dialog box opens, allowing you to name the plan (see [Figure
    6-38](#9781430249382_Ch06.xhtml#Fig38)).


    ![9781430249382_Fig06-37.jpg](images/9781430249382_Fig06-37.jpg)


    [Figure 6-37](#9781430249382_Ch06.xhtml#_Fig37). Add to Plan menu


    ![9781430249382_Fig06-38.jpg](images/9781430249382_Fig06-38.jpg)


    [Figure 6-38](#9781430249382_Ch06.xhtml#_Fig38). The Create New Plan dialog box


    Name the plan and click `Create Plan`. If you want to add more than one patch,
    select both the patches first and then add them to the plan.


    ![image](images/sq.jpg) **Note** Patches can be added to the plan later, if needed.


    ## Reviewing the Plan and Deployment


    After the plan has been created, you can review it by clicking `View Plan`. You
    can also view the plan from the Patches & Updates page; the new plan is listed
    in the Plans window, shown in [Figure 6-39](#9781430249382_Ch06.xhtml#Fig39).
    Clicking the plan name enables you to review the plan in detail.


    ![9781430249382_Fig06-39.jpg](images/9781430249382_Fig06-39.jpg)


    [Figure 6-39](#9781430249382_Ch06.xhtml#_Fig39). Reviewing the plan from Patches
    & Updates


    Remember, a patch plan is nothing but a collection of patches that you want to
    apply to a target or targets. The plan review is a five-step process, which you
    can view on the left side of the screen. By default, the review starts on step
    2, where you can add patches to the plan if desired (see [Figure 6-40](#9781430249382_Ch06.xhtml#Fig40)).
    If you take a step back and click step 1, `Plan Information`, you can modify the
    name of the plan, set a deployment date, and add a plan description. You can also
    add permissions to the plan that will either grant `Full` or `View` permissions
    to various Enterprise Manager roles.


    ![9781430249382_Fig06-40.jpg](images/9781430249382_Fig06-40.jpg)


    [Figure 6-40](#9781430249382_Ch06.xhtml#_Fig40). Step 2 of reviewing the plan


    ## Adding Patches


    You add patches to the plan in step 2 by clicking the `Add Patch` button. After
    the analysis, the result may require patches to be added to the plan.


    You will notice that the plan is deployable (although this is not shown in [Figure
    6-40](#9781430249382_Ch06.xhtml#Fig40), this indication appears at the top-right
    corner). If there is nothing you want to change or add within the plan, you can
    click `Review` and end the wizard without doing steps 3 through 5.


    ![image](images/sq.jpg) **Note** The `Full` permission allows for the role to
    validate the plan. The `View` permission does not allow validation of the plan.


    ## Setting Deployment Options


    Clicking `Next` at the bottom of the Patches screen takes you to step 3, `Deployment
    Options`, as shown in [Figure 6-41](#9781430249382_Ch06.xhtml#Fig41). This screen
    contains a lot of configurable items that may or may not have to be changed. Reviewing
    all these options is critical for a successful patch plan.


    ![9781430249382_Fig06-41.jpg](images/9781430249382_Fig06-41.jpg)


    [Figure 6-41](#9781430249382_Ch06.xhtml#_Fig41). Deployment options (partial screen)


    In the `Where to Stage` option, you can specify the location where the patch is
    either downloaded to and/or stored for patching purposes. By default, patches
    will be downloaded and stored at the location specified by `%em_emstagedir%`.
    The staging location for the patches needs to be writable by the host, which is
    going to access the patch.


    The `How to Patch` section provides two options for patching: `Out of Place` and
    `In Place`. The hyperlink to the side explains each choice:


    *   `Out of Place`: Uses less downtime and keeps your old Oracle home available
    for recovery

    *   `In Place`: Requires bringing down all databases in the Oracle home during
    installation of the patches


    Both are good choices, depending on your required service level agreements (SLAs)
    or organizational policies. Oracle recommends out-of-place patching, because it
    basically clones your existing Oracle home and gives you the ability to back out
    any changes you do not want by returning to the old Oracle home.


    Additional sections on the Deployment Options page are `What to Patch`, `Customization`,
    `Recoverability`, `Rollback`, and `Oracle Home Credentials`. Each section needs
    to be reviewed and verified prior to completing the review of the patch plan.


    ## Validating the Patch Plan


    After verifying and configuring all options in step 3, click `Next` to move to
    step 4, `Validation`. In this step, Oracle Enterprise Manager checks the patches
    in the plan against previously installed patches for conflicts. This check is
    performed against the target inventory for conflicts. The validation takes many
    factors into account, and may take more than 10 minutes to complete. These validations
    include checks against the Oracle home for readiness, space requirements for the
    home, `OPatch` version validation, and other checks such as cluster node connectivity
    (if patching a `RAC` environment).


    [Figure 6-42](#9781430249382_Ch06.xhtml#Fig42) shows what the screen looks like
    before validation is done. Click the `Analyze` button to begin the validation
    of the patches against targets for the patch plan. While the validation is running,
    you can move off this screen and return to it later.


    ![9781430249382_Fig06-42.jpg](images/9781430249382_Fig06-42.jpg)


    [Figure 6-42](#9781430249382_Ch06.xhtml#_Fig42). Step 4: Validation


    After the validation starts, the message above the `Analyze` button changes, providing
    additional information on the process. You can get a detailed view by clicking
    `Show Detailed Progress Here`. You may notice that the analysis includes quite
    a few checks: verifying that the targets are supported for patching; verifying
    normal and elevated user credentials; verifying target tools, commands, permissions,
    and upgrades to `OPatch`; staging the selected patches; and then running the prerequisite
    checks for patching. If all the prerequisites pass, the patch is seen as `Ready
    for Deployment`.


    Any issues that the patching may have will show up at this point. For example,
    if a patch conflict exists, a replacement or merge patch may be required. If a
    replacement or merge patch is not available, you can request such a patch directly
    from this screen.


    If any issues need to be resolved, they will be listed under the `Issues to Resolve`
    heading. Anything that the analysis recommends to be added will be listed under
    `Added from Analysis`. General messages will be under `Informational Messages`.
    After reviewing all these messages, you can click the `Review` button.


    ## Reviewing and Deploying the Plan


    At this point, you are ready to move directly to step 5, `Review & Deploy`. You
    can reach this step by either clicking the `Review` button in step 4 or clicking
    `Review & Deploy` on the left side of the screen.


    On the Review & Deploy page, the patch plan is described in detail along with
    the targets that will be affected by the plan. If additional targets have been
    discovered after the analysis, they will be added to the `Impacted Targets` list.
    In our case, two additional listeners were found and added, because they run out
    of the same Oracle home that we are preparing to patch.


    The patches that are going to be applied to the Oracle home are listed on this
    page as well. The important thing to look for is a status of `Conflict Free`.
    In our case with `CPUAPR2013`, we have no conflicts with the patch. [Figure 6-43](#9781430249382_Ch06.xhtml#Fig43)
    shows a subset of the Review & Deploy screen indicating that the plan is ready
    for deployment.


    ![9781430249382_Fig06-43.jpg](images/9781430249382_Fig06-43.jpg)


    [Figure 6-43](#9781430249382_Ch06.xhtml#_Fig43). The Review & Deploy step'
