- fmt: '## 更完整的基于 Flex 的示例


    有关更完整的基于 Flex 的示例，请使用 `<EDK>/samples/plugins/HostSample` 中的另一个示例。


    ### 自定义事件管理


    此功能允许插件开发人员自定义在事件管理器页面上选择事件时所看到的内容。他们可以在事件详细信息区域添加信息、自定义诊断链接、定义一个新的引导式解决区域，以及覆盖
    My Oracle Support 的默认搜索表达式。文档提到仅使用 MRS 注册事件管理自定义，但根据元数据在 OMS 中存储的目标路径，如果插件档案被放置在
    `<STAGE>/oms/metadata/events/custmzn` 或 `<STAGE>/oms/metadata/custmzn` 下，`empdk`
    应该能够将事件管理自定义作为插件档案的一部分打包。


    请注意，基于 Flex 的 UI 的最佳实现在位于 EDK 的 HostSample 演示中，路径为 `<EDK>/samples/plugins/HostSample`。一个
    `README` 文件解释了如何构建插件，以及如何使用 Adobe Flash Builder 打开和处理基于 Flex 的 UI，这是学习 EM12c 高级
    UI 开发的绝佳方式。虽然自定义管理 UI 是可扩展性中最复杂的领域，但文档并不十分清晰，并且难以划定基于元数据的 UI 和基于 Flex 的 UI 之间的界限。因此，通过示例学习会对您大有帮助。我还发现，搜索诸如图表属性等通用的
    Adobe Flex 解决方案，让我能够猜测出一些在 EM12c 可扩展性文档或 EDK 中未能找到的、用于基于元数据 UI 的 XML 属性。


    ## 元数据注册服务


    在开发插件期间，您可能需要进行许多迭代调整，并在每次更改后在 EM12c 控制台中验证其影响。对每次小改动都进行打包、部署和升级插件可能是令人畏惧的。为了减少这种部署开销，EM12c
    通过 `emctl register oms metadata` 命令提供了元数据注册服务 (MRS)，用于有选择地上传和升级特定元数据。MRS 在《可扩展性程序员参考》的第
    13.7 节中有文档说明，但在撰写本文时，其文档覆盖并不全面。


    根据我的经验，MRS 在动态更新报告定义、更新用户界面定义 (`mpcui` 服务) 和 ECM 元数据 (`LiveSnapshotRegistration`
    服务) 方面运行良好。然而，注册新目标类型元数据对我来说并不总是成功，可能是因为目标元数据未能成功传播到代理。


    例如，要更新或注册一个新的报告定义，您可以使用以下命令：


    ```

    emctl register oms metadata -service report -file report_file.xml -pluginId oracle.samples.xsh1

    ```


    请注意，某些服务在注册组件时需要特殊步骤。例如，通过 MRS 注册合规标准服务后，必须手动在存储库数据库中执行 `EM_COMPLIANCE_UTIL.trigger_rule_dependency_job`
    过程。


    MRS 还允许您实现一些新功能——例如，具有现有目标的新作业类型和合规标准——而实际上无需开发任何新插件。事实上，虽然大多数情况下您创建插件是为了打包新的目标类型，但您也可以创建没有任何目标类型的插件，仅打包报告或合规标准等内容。


    ## 总结


    在本章中，您已经熟悉了指标扩展及其大部分功能。您了解到，虽然 EM12c 指标扩展比 Grid Control 10g/11g 的用户定义指标更加灵活和可管理，但它们仍然缺乏许多对于从多个新目标甚至现有目标收集指标至关重要的功能。例如，您无法轻松处理累积计数器、创建参数化指标扩展或使用额外的收集机制。随后，您还了解到指标扩展构建在
    EM12c 可扩展性框架之上，基本上会转换为您在开发新目标类型时创建的类似 XML 定义。


    在本章的第二部分，您学习了如何为插件开发设置环境、在哪里可以找到文档和示例，以及如何构建和部署这些示例。基于这些示例插件，您学习了插件开发的所有基础知识以及一些使您的工作更轻松、插件开发更高效的技巧。您还深入研究了一些有用的高级功能的细节，例如配置管理，并了解了可以在哪里查找示例实现和文档。'
  raw: 'For a more complete Flex-based example, use another example in <EDK>/samples/plugins/HostSample.

    *   *Customized Incident Management*: This feature allows plug-in developers to
    customize what you see on the Incident Manager page when selecting an incident.
    They can add information in the incident details region, customize the diagnostic
    links, define a new guided resolution region, as well as override the default
    search expression for My Oracle Support. The documentation refers to registering
    incident management customizations by using only MRS, but based on the target
    path where metadata is stored in OMS, empdk should be able to package incident
    management customizations as part of a plug-in archive if it’s placed under either
    <STAGE>/oms/metadata/events/custmzn or <STAGE>/oms/metadata/custmzn.


    Note that the best implementation of a Flex-based UI is in the HostSample demo
    located in the EDK in <EDK>/samples/plugins/HostSample. A README file explains
    how to build the plug-in as well as how to use Adobe Flash Builder to open and
    work with the Flex-based UI, which is a great way to learn advanced UI development
    with EM12c. While custom management UI is the most complex area of Extensibility,
    the documentation is not very clear, and it’s difficult to draw the line between
    metadata-based UI and Flex-based. Thus, learning by example will help you a lot.
    I’ve also found that searching for a generic Adobe Flex solution such as charts
    attributes lets me guess some of the XML attributes for metadata-based UI that
    I was not able to find in the EM12c Extensibility documentation or EDK.


    Metadata Registration Service


    During development of the plug-in, you might have to do many iterative adjustments
    and verify the impact in the EM12c console after each change. Packaging, deploying,
    and upgrading a plug-in with each small change can be daunting. To reduce this
    deployment overhead, EM12c provides the Metadata Registration Service (MRS) via
    the emctl register oms metadata command to selectively upload and upgrade specific
    metadata. MRS is documented in Section 13.7 of the *Extensibility Programmer''s
    Reference*, but at the time of this writing the documentation coverage is spotty.


    From my experience, MRS works well for updating definitions of reports on the
    fly, updating user interface definitions (mpcui service), and ECM metadata (LiveSnapshotRegistration
    service). However, registering new target type metadata didn’t always succeed
    for me, possibly because target metadata didn’t propagate successfully to the
    agent.


    For example, to update or register a new report definition, you can use the following
    command:


    ```

    emctl register oms metadata -service report -file report_file.xml -pluginId oracle.samples.xsh1

    ```


    Note that some services require special steps when registering components. For
    example, registration of the compliance standards service via MRS must be followed
    by manual execution of the EM_COMPLIANCE_UTIL.trigger_rule_dependency_job procedure
    in the repository database.


    MRS also lets you implement some new features—for example, new job types and compliance
    standards with existing targets—without actually developing any new plug-ins at
    all. In fact, although most of the time you create plug-ins to package new target
    types, you can also create plug-ins without any target types and package, for
    example, just reports or compliance standards.


    Summary


    In this chapter, you have become familiar with Metric Extensions and most of their
    features. You learned that while EM12c metric extensions are much more flexible
    and manageable than Grid Control 10g/11g user-defined metrics, they still lack
    many features that are essential for collecting metrics from multiple new targets
    and even existing ones. For example, you can’t easily process cumulative counters,
    create parameterized metric extensions, or use additional collection mechanisms.
    Later, you also learned that metric extensions are built on top of the EM12c Extensibility
    framework and are basically converted to similar XML definitions that you create
    when developing new target types.


    In the second part of the chapter, you learned how to set up an environment for
    plug-in development, where to find documentation and samples, and how to build
    and deploy those samples. Based on those sample plug-ins, you learned all the
    basics of plug-in development and some tricks to make your life easier and your
    plug-in development more efficient. You also drilled into the details of some
    useful advanced features such as configuration management and learned where to
    look for sample implementation and documentation.'
