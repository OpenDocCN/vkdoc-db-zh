- fmt: "# 硬件要求与安装准备\n\n使用完全限定主机名也很重要。完全限定域名（FQDN）是服务器的完整域名。它包含主机名和域名，以明确其在DNS层次结构中的确切位置。例如，`cloudcontrol12.testdomain.com`就是一个完全限定的主机名。至少应确保您的Oracle\
    \ Management Server拥有一个完全限定的主机名。\n\nOracle Enterprise Manager Cloud Control 12c可以从My\
    \ Oracle Support为您的服务器获取最新的补丁信息，并可以为事件创建服务请求。因此，我们建议您使Oracle Management Service能够访问My\
    \ Oracle Support网站。如果不希望服务器直接访问互联网，可以设置一个代理服务器，使OMS能够访问My Oracle Support网站。\n\n\
    # 硬件要求\n\n本节描述了安装OMS、管理仓库和管理代理的硬件要求。\n\n## OMS的硬件要求\n\n如[表2-1](#9781430249382_Ch02.xhtml#Tab1)所示，OMS的硬件要求取决于您拥有的目标数量以及将要部署的代理数量。\n\
    \n[表2-1](#9781430249382_Ch02.xhtml#_Tab1). OMS硬件要求\n\n![table](images/Table2-1.jpg)\n\
    \n## 管理仓库的硬件要求\n\n仓库数据库的硬件要求也取决于代理和目标的数量，如[表2-2](#9781430249382_Ch02.xhtml#Tab2)所示。\n\
    \n[表2-2](#9781430249382_Ch02.xhtml#_Tab2). 管理仓库硬件要求\n\n![table](images/Table2-2.jpg)\n\
    \n## 管理代理的硬件要求\n\n每个代理部署大约需要1GB的可用硬盘空间。虽然管理代理不会消耗大量的CPU或RAM，但我们不建议将代理部署到RAM少于512MB的系统上。\n\
    \n![image](images/sq.jpg) **提示** 前几节中的硬件要求可能因版本而异，因此您应在Oracle Enterprise Manager\
    \ Cloud Control基本安装指南中检查实际要求。\n\n# 安装管理仓库\n\n在本节中，您将在名为`repositorydb.testdomain.com`的服务器上下载并安装Oracle\
    \ Database 11gR2。\n\n可以使用一个经过认证的数据库：`11.2.0.3`、`11.2.0.2`、`11.2.0.1`、`11.1.0.7`或`10.2.0.5`。如果您已经有一个用于仓库数据库的数据库服务器，可以跳到Oracle\
    \ EM12c的安装部分。\n\n![image](images/sq.jpg) **提示** 您可以在My Oracle Support上找到Enterprise\
    \ Manager Cloud Control的最新认证数据库列表：[https://support.oracle.com/epmos/faces/CertifyHome](https://support.oracle.com/epmos/faces/CertifyHome)。您可能希望使用Oracle\
    \ Real Application Clusters（RAC）数据库以实现高可用性。\n\n## 使用Oracle-validated RPM包和YUM\n\
    \n为了在Oracle Linux上安装Oracle Database 11gR2，您的系统需要满足一些先决条件。使用`oracle-validated`\
    \ RPM包，您可以完成大部分预安装配置任务，包括创建用户和组。使用此包是在Oracle Linux上安装所有Oracle先决条件的推荐方法。您可以从Oracle网站下载RPM包，也可以使用YUM包管理器。Oracle提供了一个免费的公共YUM服务器，即使您不从Oracle购买支持也可以使用。\n\
    \n要使用Oracle公共YUM服务器，您首先需要以ROOT身份运行以下命令，下载并复制相应的YUM配置文件到位：\n\n*   Oracle Linux\
    \ 4, update 6 或更新版本\n    *   `[root@repositorydb ∼]# cd /etc/yum.repos.d`\n  \
    \  *   `[root@repositorydb ∼]# mv Oracle-Base.repo Oracle-Base.repo.disabled`\n\
    \    *   `[root@repositorydb ∼]# wget [http://public-yum.oracle.com/public-yum-el4.repo](http://public-yum.oracle.com/public-yum-el4.repo)`\n\
    *   Oracle Linux 5\n    *   `[root@repositorydb ∼]# cd /etc/yum.repos.d`\n   \
    \ *   `[root@repositorydb ∼]# wget [http://public-yum.oracle.com/public-yum-el5.repo](http://public-yum.oracle.com/public-yum-el5.repo)`\n\
    *   Oracle Linux 6\n    *   `[root@repositorydb ∼]# cd /etc/yum.repos.d`\n   \
    \ *   `[root@repositorydb ∼]# wget [http://public-yum.oracle.com/public-yum-ol6.repo](http://public-yum.oracle.com/public-yum-ol6.repo)`\n\
    \n在文本编辑器中打开`yum public-yum*.repo`配置文件。找到您计划从中更新的仓库的文件部分——例如`[el5_base]`——并将`enabled=0`更改为`enabled=1`。\n\
    \n保存文件并开始使用`yum`：\n```\n[root@repositorydb ∼]# yum install oracle-validated\n\
    ```\n对于Oracle Linux 6，您需要安装`oracle-rdbms-server-11gR2-preinstall`包，而不是`oracle-validated`包：\n\
    ```\n[root@repositorydb ∼]# yum install oracle-rdbms-server-11gR2-preinstall\n\
    ```\n您也可以从以下链接手动下载适用于Red Hat Enterprise Linux 5的`oracle-validated`包：[https://oss.oracle.com/el5/oracle-validated/](https://oss.oracle.com/el5/oracle-validated/)。\n\
    \n安装`oracle-validated`后，您需要为`ORACLE`用户设置密码。请确保也为OMS服务器设置YUM并安装`oracle-validated`包。\n\
    \n## 创建Oracle用户和组\n\n如果不使用`oracle-validated`包，您可以手动创建所需的组和用户。以ROOT身份登录并运行以下命令：\n\
    ```\n[root@repositorydb ∼]# groupadd oinstall\n[root@repositorydb ∼]# groupadd\
    \ dba\n[root@repositorydb ∼]# useradd -g oinstall -G dba oracle\n[root@repositorydb\
    \ ∼]# passwd oracle\n```\n在最后一个命令之后，输入`ORACLE`用户的密码。\n\n## 设置内核参数\n\nOracle Database\
    \ 11gR2安装程序可以检测并修复内核参数错误，因此您可以运行安装程序并让它创建脚本来设置所需参数。如果希望在没有安装程序帮助的情况下配置内核参数，请备份`/etc/sysctl.conf`，然后使用任何文本编辑器编辑该文件，使其包含类似以下的行：\n\
    ```\nfs.aio-max-nr = 1048576\nfs.file-max = 6815744\nkernel.shmall = 2097152\n\
    kernel.shmmax = 4536870912\nkernel.shmmni = 4096\nkernel.sem = 250 32000 100 128\n\
    net.ipv4.ip_local_port_range = 9000 65500\nnet.core.rmem_default = 262144\nnet.core.rmem_max\
    \ = 4194304\nnet.core.wmem_default = 262144\nnet.core.wmem_max = 1048576\n```\n\
    这些是Oracle Database的推荐值。如果任何当前值大于推荐值，请使用较大的值。\n\n![image](images/sq.jpg) **提示**\
    \ 在64位Linux系统上，`kernel.shmmax`可以设置为物理内存减去1字节的最大值。\n\n输入以下命令以设置`/etc/sysctl.conf`中的内核参数的当前值：\n\
    ```\n[root@repositorydb ∼]# /sbin/sysctl -p\n```\n\n## 创建所需目录\n\nOracle基础目录必须至少有5GB的可用磁盘空间。输入以下命令以创建推荐的子目录并在其上设置所有者、组和权限：\n\
    ```\n[root@repositorydb ∼]# mkdir -p /u01/app/\n[root@repositorydb ∼]# chown -R\
    \ oracle:oinstall /u01/app/\n[root@repositorydb ∼]# chmod -R 775 /u01/app/\n```\n\
    \n## 安装Oracle数据库软件\n\n要安装数据库软件，您需要下载安装文件，解压缩它们，然后运行安装程序。本节列出了所有步骤。\n\n您可以从Oracle技术网络（OTN）下载Oracle数据库软件。软件以zip文件形式提供。以下是Oracle\
    \ Database的链接："
  raw: "It’s also important to use fully qualified hostnames. A fully qualified domain\
    \ name (FQDN) is a complete domain name for a server. It contains both a hostname\
    \ and a domain name to specify its exact location in the DNS hierarchy. For example,\
    \ cloudcontrol12.testdomain.com is a fully qualified hostname. At least ensure\
    \ that your Oracle Management Server has a fully qualified hostname.\n\nOracle\
    \ Enterprise Manager Cloud Control 12c can fetch the latest patch information\
    \ from My Oracle Support for your servers and can create service requests for\
    \ incidents. Therefore, we recommend that you enable Oracle Management Service\
    \ to reach the My Oracle Support web site. If you don’t want to allow your servers\
    \ to directly access the Internet, you can set up a proxy server to make the My\
    \ Oracle Support web site accessible to OMS.\n\nMeeting Hardware Requirements\n\
    \nThis section describes the hardware requirements for installing OMS, the management\
    \ repository, and management agents.\n\nHardware Requirements for OMS\n\nAs you\
    \ can see in [Table 2-1](#9781430249382_Ch02.xhtml#Tab1), the hardware requirements\
