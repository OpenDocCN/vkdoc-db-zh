    \ Oracle Support的集成，它允许你访问集成的Oracle专业知识，以加速事件和问题的诊断与解决。\n\n# 第13章 高可用性、备份与恢复\n\
    \n![image](images/frontdot.jpg)\n\n作者：Leighton Nelson\n\n本章探讨了为建立高可用的Oracle Enterprise\
