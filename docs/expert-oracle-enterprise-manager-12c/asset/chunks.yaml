    This provides access to four commonly used areas of Oracle’s online support tool.
    These are Service Requests, Knowledge Base, Certification Information, and the
    My Oracle Support community forums. For any of these to work, you need to have
    configured support integration as described earlier. I personally use only the
    Service Requests option,  because the other informational areas (knowledge base
    and community content) are, once My Oracle Support connectivity is established,
    directly searchable from the search box at the top right of the Navigation bar.


    ![image](images/sq.jpg) **Note**  One aspect of the support integration that may
    surprise you is that support pages are displayed from the now-retired Flash interface
    to My Oracle Support. We expect this to change in future updates to the product.


    Finally, at the foot of the menu, looking suspiciously as through the designers
    couldn’t find a better place, are the Chargeback and Consolidation Planning features.
    These  advanced features are outside the scope of this chapter.


    Overall, the Enterprise menu gives you access to product- or enterprise-wide functionality
    and is the place you should look for configuring or accessing enterprise management
    functionality. Before you leave this section, though, you’ll look at the reporting
    capabilities of the product in a little more depth.


    Configuring Reports


    Enterprise Manager is in a transitional stage at the time of this writing, moving
    away from Information Publisher, which was the technology available in prior releases,
    towards Business Intelligence Publisher reporting, which offers greatly enhanced
    formatting, scheduling, and distribution options. With 12c Release 2, you have
    two distinct options, the first is a link to Information Publisher reports. (These
    are the only option available prior to 12c Release 2), but have been superseded
    by BI Publisher Reports. Oracle provides an embedded license for BI Publisher
    with Enterprise Manager, and this is clearly the way forward. At the moment, however,
    there are some restrictions, which we hope to see relaxed in future releases.'
