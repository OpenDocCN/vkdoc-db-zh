  trans: '## 调度任务配置


    这个单一的调度任务在逻辑上被组织成两个独立的统计信息收集活动：


    *   一个每日运行的任务，确保所有过时的 Enterprise Manager 对象统计信息得到更新

    *   第二个每两小时运行的任务，针对 `EM_STATS_MONITOR` 表中最过时的对象进行统计信息收集


    每日任务在数据库服务器所在时区的午夜至凌晨 1 点之间运行。第二个任务每 2 小时运行一次，旨在达成以下目标：


    *   确保易变表拥有当前的统计信息

    *   确保为站点特定需求做出规定


    对于每两小时一次的收集，其统计信息收集机制可能过于激进。很少有站点真正需要对存储库表进行每两小时一次的运行。因此，您可能希望修改 `EM_GATHER_SYSMAN_STATS`
    计划任务的调度计划，但如果这样做，请确保它仍然在午夜至凌晨 1 点之间执行，以保证隔夜收集仍然发生。


    ## 存储库视图


    归根结底，Enterprise Manager 将其数据存储在一组表中。对这些基表的访问由一组存储库视图提供，这些视图已在《*Oracle Enterprise
    Manager Cloud Control Extensibility Programmer''s Reference*》的第 18 章中记录（可在 [`http://docs.oracle.com/cd/E24628_01/doc.121/e25161/views.htm#sthref1292`](http://docs.oracle.com/cd/E24628_01/doc.121/e25161/views.htm#sthref1292)
    在线获取）。请注意，此参考对应的是 `12.1.0.2` 版本的文档。如果您仍在使用 `12.1.0.1`，则需要查看等效文档的第 17 章。


    ![image](img/sq.jpg) 注意  您可能感兴趣的一些视图记录在可扩展性开发工具包（EDK）中，因此您可能还需要安装该工具包才能查看这些视图的文档。安装方法是：从控制台选择“设置”菜单，选择“可扩展性”![arrow](img/arrow.jpg)
    “开发工具包”，然后按照那里的说明进行操作。


    显然，对于像 Enterprise Manager 这样庞大的产品，同样有大量的视图可供查看，因此这里并未记录全部。重要的是要知道如何查找关于它们的更多信息，而这些都在前面提到的章节中记录了。根据您的需求，您可能还想研究一下
    BI Publisher 的使用，它是随 `EM12c` 提供的新报告功能，允许针对 EM 存储库创建高度格式化的自定义报告。（另外，EM 包含一个受限使用许可证，允许
    BI Publisher 用于 EM 存储库。用于其他数据源则需要 BI Publisher 许可证。）


    ![image](img/sq.jpg) 提示  我一直惊讶于了解这些视图的人如此之少，所以请花时间查阅 Oracle 文档并熟悉它们。特别要查看《*Oracle
    Enterprise Manager Cloud Control Extensibility Programmer''s Reference*》第 18 章末尾记录的示例用法。


    ## 故障排除


    还有一个您应该熟悉的实用程序，用于跨技术栈所有三层的故障排除。该工具是 `EMDIAG`。`EMDIAG` 是一组脚本和工具的集合，旨在帮助对 EM 的问题进行故障排除和诊断。每个
    EM 层都有一个特定的工具包：`AGTVFY` 用于代理层，`OMSVFY` 用于 OMS 层，`REPVFY` 用于存储库层，每个工具包都通过查找已知问题特征来识别已知问题。Oracle
    Support 提供了一个 `EMDIAG` 主索引说明（说明 `421053.1`），解释了如何下载、安装和使用每个工具包。请务必下载适用于 `EM12c`
    的正确版本。


    每个工具包都是一组命令，可用于显示有关相关层的设置、配置和使用的信息，或者转储对象。即使该层本身未运行（或确实已损坏），也可以使用它们。运行这些命令时，您可以像这样传入一个
    0 到 9 的级别参数：


    ```

    $ ./agtvfy verify all -level 2 details

    ```


    当命令接受级别作为参数时，您应该从最低值（0）开始，修复该命令报告的问题，然后在下一个最高级别再次运行它。0 到 4 级报告功能问题，6 到 8 级报告报告问题，9
    级用于内部诊断。您应仅在 Oracle Support 的指导下在 9 级运行报告。仅举一例，当（例如）运行 `REPVFY` 时，您可以预期在级别 2 和级别
    9 之间看到以下类型的差异：


    ![image](img/sq.jpg) 注意  这是一个特意配置得很糟糕的环境。希望您不会看到接近这种程度的问题！


