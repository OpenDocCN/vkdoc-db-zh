    目标类型菜单还提供了一个便捷的 `日志` 子菜单，用于查看与各种目标相关的系统日志（参见 图 4-58）。该菜单本身对所有目标都是通用的，但可用的详细程度取决于目标的性质和插件设计者。例如，对于数据库，`日志`
    子菜单允许您访问并查看 `alert.log` 文件，审阅所有记录的错误，并管理跟踪文件。


    ![9781430249382_Fig04-58.jpg](img/9781430249382_Fig04-58.jpg)


    图 4-58. 数据库诊断日志访问


    相比之下，Web 服务器目标仅提供一个单一的 `日志` 选项，允许您根据条件搜索和查看日志消息（参见 图 4-59）。


    ![9781430249382_Fig04-59.jpg](img/9781430249382_Fig04-59.jpg)


    图 4-59. 搜索应用服务器日志


    ## 目标设置


    您肯定会花费一些时间的地方是 `目标设置` 子菜单，如 图 4-60 所示。在这里，您将配置监控凭据和有关目标的元数据，这些数据可用于分组和访问控制。


    ![9781430249382_Fig04-60.jpg](img/9781430249382_Fig04-60.jpg)


    图 4-60. 目标设置子菜单


    要配置用于监控目标的帐户，请选择 `监控配置`。实际提供的详细信息因目标类型而异。图 4-61 显示了数据库目标的配置屏幕。如您所见，您需要输入监控帐户详细信息（对于数据库，包括
    `用户名`、`密码`、`端口`、`角色` 和 `SID/服务名称`）。


    ![9781430249382_Fig04-61.jpg](img/9781430249382_Fig04-61.jpg)


    图 4-61. 必需的数据库监控详细信息


    类似地，对于其他目标，您很可能需要各个目标监控基础架构的名称、密码和端口。


    ## 自定义


    Cloud Control 设计为可根据单个管理员的需求进行定制，您首次登录时就会感受到这一点。登录后，您将看到一个页面，该页面为您提供机会，根据多个预定义的工作角色之一来选择主页。本书的大多数读者可能希望从两个选项中选择一个。如果您主要担任数据库管理员或开发人员，您可能会选择
    `数据库` 页面。如果您从事运维或支持工作，您可能希望从 `事件` 页面开始，该页面专注于为企业中管理运维事件的员工设计。


    ![image](img/sq.jpg) **注意** 您在此阶段不必选择任何主页，我们建议您不要选择。相反，请审阅所有可用页面，以找到适合您角色的起点。然后，您可以在稍后更具体地定制您的主页。


    由于本书的主要读者是数据库专业人员，除非另有说明，我们将以数据库特定页面为例重点介绍本节内容。但是，此处所述的内容适用于整个产品。图 4-62 展示了数据库目标的主页。


    ![9781430249382_Fig04-62.jpg](img/9781430249382_Fig04-62.jpg)


    图 4-62. 数据库主页


    Enterprise Manager 中的每个页面都划分为多个区域。每个区域都可以由最终用户进一步定制。作为一个例子，我们将以 `数据库摘要` 区域为例，并删除不是很有帮助的合规性摘要。


    要开始自定义，请点击位于页面右上角、上次刷新时间旁边的 `个性化此页面` 图标（参见 图 4-63）。这将向页面添加菜单，允许您自定义页面和每个区域。在这种情况下，点击
    `摘要` 区域右上角的扳手图标。


    ![9781430249382_Fig04-63.jpg](img/9781430249382_Fig04-63.jpg)


    图 4-63. 处于编辑模式的主页


    然后，您将看到一个类似于 图 4-64 的自定义对话框。我们只是从视图中删除了 `合规性摘要` 部分，但您可以尝试使用各种可用的样式和显示选项，以根据公司标准或个人喜好显著地个性化该页面。


    ![9781430249382_Fig04-64.jpg](img/9781430249382_Fig04-64.jpg)


    图 4-64. 自定义摘要组件


    您应该意识到，自定义页面的选项取决于提供该页面的插件。因此，对于表面上类似的区域，确切的定制选项可能会有所不同。


    ## 小结


    本章向您介绍了新界面以及为了获取 Enterprise Manager 产品的可管理性优势而需要掌握的一些基本任务。您了解了 `云控制`、`导航` 和 `目标管理`
    菜单的作用。在此过程中，您学习了如何设置 Enterprise Manager 安全性、设置与 My Oracle Support 的强大集成以及配置通知。您简要浏览了导航功能。最后，您了解了目标设置功能，并学习了如何配置监控和查看诊断日志。


    # 第 5 章


    ![image](img/frontdot.jpg)


    ## 云生命周期管理


    作者：Bobby Curtis 和 Anand Akela


    Oracle Enterprise Manager 12c 云控制致力于为动态业务需求提供更强的适应性、显著的运营效率和更低的整体运营成本。为了让组织实现这些目标，我们需要一个全面且完整的管理解决方案。没有
    EM12c 的云生命周期管理组件，这些承诺就无法实现，企业可能无法从其云计算基础设施中获得最大价值。云生命周期管理中的组件使组织能够灵活调整其架构，并从扩展的资源中获取更大的业务价值。云生命周期管理涵盖的工具包括以下内容：


    *   `自助服务门户`：允许管理员配置云并执行各种操作，例如定义与云关联的策略、将云暴露给用户、决定每个用户可预留的总资源量以及定义系统策略。

    *   `费用分摊`：允许企业组织将信息技术资源的成本分配给消耗这些资源的人员、部门或组织。

    *   `整合规划器`：允许企业组织将受管服务器映射到整合资源（例如 Oracle Exadata 或 Oracle 虚拟机），并使用存储在 Oracle
    Management 存储库中的指标和配置数据来规划整合。


    在我们深入探讨使用 EM12c 的这些云生命周期管理工具之前，让我们回顾一下云计算到底是什么。


    ### 什么是云计算？


    虽然您可以找到许多关于云计算的定义，但美国国家标准与技术研究院（NIST）在 2011 年 9 月发布了最完整和最可信的定义之一。¹

    '
- fmt: "According to NIST, “Cloud computing is a model for enabling ubiquitous, convenient,\
    \ on-demand network access to a shared pool of configurable computing resources\
    \ (for example, networks, servers, storage, applications, and services) that can\
    \ be rapidly provisioned and released with minimal management effort or service\
    \ provider interaction.”\n\nIn this section, we’ll add some details to this general\
    \ definition. First, we’ll review the essential characteristics of cloud computing.\
    \ Then we’ll look at the basic cloud computing service and supported deployment\
    \ models.\n\n## Essential Characteristics\n\nAccording to the `NIST`, cloud computing\
    \ has five essential characteristics. Let’s look at each in some detail:\n\n*\
    \   `On-demand self-service`: Cloud consumers should be able to consume the cloud\
    \ services on demand, without requiring human interaction with the cloud service\
    \ provider.\n*   `Broad network access`: Cloud services should be accessed over\
    \ the network and through various commonly used interfaces (for example, the Web,\
    \ mobile devices, software clients, and so forth).\n*   `Resource pooling`: Cloud\
    \ providers pool computing resources to efficiently serve multiple consumers.\n\
    *   `Rapid elasticity`: Cloud services should be elastically provisioned and released\
    \ to meet the business demand.\n*   `Measured service`: Cloud resources should\
    \ be monitored for usage and can later be reported, with users potentially billed\
    \ for the utilized service.\n\nThe `NIST` definition also lists three `service\
    \ models` (software, platform, and infrastructure) and four `deployment models`\
    \ (private, community, public, and hybrid) that, combined, categorize ways to\
    \ deliver cloud services. These are discussed in the following sections.\n\n##\
    \ Service Models\n\nFor the cloud to be a viable option for any enterprise organization,\
    \ that organization needs to choose which service model to provide. A `service\
    \ model` is an approach that can be used to satisfy a specific requirement. Within\
    \ the cloud architecture, three primary service models can be used— Software as\
    \ a Service (`SaaS`), Platform as a Service (`PaaS`), and Infrastructure as a\
    \ Service (`IaaS`):\n\n*   `Software as a Service (SaaS)`: In this model, the\
    \ consumer of cloud services uses the software application. The consumer does\
    \ not manage or control any of the underlying infrastructures to include network,\
    \ servers, application servers, operating systems, storage, or even individual\
    \ application capabilities, with the possible exception of limited user-specific\
    \ application configuration settings. `SaaS` examples include the Web-based e-mail\
    \ services provided by Yahoo!, Google, and other vendors.\n*   `Platform as a\
    \ Service (PaaS)`: In this model, the consumer of the cloud builds and operates\
    \ end-user applications leveraging the software platform—including database, middleware,\
    \ programming languages, libraries, services, and tools—offered by the cloud provider.\
    \ The consumer does not manage or control the software platform or the underlying\
    \ infrastructure including network, servers, operating systems, or storage, but\
    \ has control over the deployed applications and possibly configuration settings\
    \ for the application-hosting environment. `PaaS` examples include Google Apps,\
    \ which enables customers to work from a platform while being mobile.\n*   `Infrastructure\
    \ as a Service (IaaS)`: In this model, the consumer of the `IaaS` cloud has the\
    \ responsibility to manage the software platform (database, middleware, tools,\
    \ and so forth) and develop and operate the end-user applications. The consumer\
    \ does not manage or control the underlying cloud infrastructure but has control\
    \ over operating systems, storage, and deployed applications, and possibly limited\
    \ control of select networking components (for example, host firewalls). Amazon\
    \ Elastic Compute Cloud, which provides developers with servers and databases,\
    \ is an example of `IaaS`.\n\n## Deployment Models\n\nIn addition to describing\
    \ service models, `NIST` also lists four models for deploying cloud services.\
    \ Let’s look at them quickly:\n\n*   `Public cloud`: The cloud provider builds\
    \ and operates the cloud infrastructure for use by the general public. This infrastructure\
    \ exists on the premises of the cloud provider, and the provider manages the access\
    \ control and potential pay-per-use model for consumers.\n    *   Example: Box\
    \ and Dropbox offer a certain amount of online storage for free to the public,\
    \ and charge for storage beyond that limit.\n*   `Private cloud`: The cloud infrastructure\
    \ is provisioned for exclusive use of lines of business or branches within a single\
    \ organization. Usually the IT department of the organization builds and operates\
    \ the private cloud (or enterprise private cloud).\n    *   Example: Oracle Global\
    \ IT offers development and testing cloud infrastructure for Oracle employees\
    \ worldwide. However, in some cases the cloud infrastructure may be owned and\
    \ operated by a third-party vendor that manages the private cloud exclusively\
    \ for a single organization.\n*   `Community cloud`: The cloud infrastructure\
    \ is provisioned for exclusive use by a specific community of consumers from organizations\
    \ that have shared goals and concerns.\n    *   Example: Many federal and state\
    \ organizations share resources through a cloud infrastructure.\n*   `Hybrid cloud`:\
    \ Organizations may decide to deploy certain key applications and data in their\
    \ private cloud, but other applications in a public cloud. In case of a disaster\
    \ or heavy demand on the applications in the private cloud, organizations may\
    \ decide to temporarily move part of their workload to the public cloud. This\
    \ process of temporarily extending to a public cloud from a private cloud during\
    \ peak load is called `cloud bursting`. Hybrid cloud infrastructure is a combination\
    \ of a private and public cloud (and/or community cloud) that is connected by\
    \ standard or proprietary technology for data and application portability.\n\n\
    ## Enterprise Private Cloud\n\nThe rest of this chapter focuses on enterprise\
    \ private cloud infrastructures managed by `EM12c`. However, a public, community,\
    \ or hybrid cloud infrastructure provider can also decide to use `EM12c` for managing\
    \ their entire cloud lifecycle. For example, Oracle uses `EM12c` to manage its\
    \ public Oracle Cloud.\n\nAs mentioned earlier, the IT department of an enterprise\
    \ usually becomes the cloud service provider in charge of the enterprise private\
    \ cloud and its associated deployment model.\n\nAs you can see in [Figure 5-1](#9781430249382_Ch05.xhtml#Fig1),\
    \ the cloud users in the business units get more value when they move horizontally\
    \ from `IaaS` to `PaaS` and then to `SaaS`. `IaaS` cloud users within the enterprise\
    \ are responsible for databases, middleware, and development and operation of\
    \ end-user applications on top of the cloud infrastructure offered by their IT\
    \ department. If the IT department offers `PaaS`, cloud users will be responsible\
    \ only for development, testing, and operations of their applications, while IT\
    \ takes care of management and operations of the software platform and the underlying\
    \ infrastructure. Enterprise IT departments will have more up-front investment\
    \ in establishing a `PaaS` or `SaaS` model than an `IaaS` model.\n\n![9781430249382_Fig05-01.jpg](images/9781430249382_Fig05-01.jpg)\n\
    \n[Figure 5-1](#9781430249382_Ch05.xhtml#_Fig1). Cloud service models deployed\
    \ in an enterprise private cloud\n\nSo far, you have seen an overview of cloud\
    \ computing, its key characteristics, and its delivery and deployment models.\
    \ Although cloud computing offers great efficiency, flexibility, and cost savings,\
