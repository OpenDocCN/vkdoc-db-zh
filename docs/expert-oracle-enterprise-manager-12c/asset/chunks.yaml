  trans: '**注意** 如果您因是第三方支持公司而拥有多个客户支持标识符（CSI），您可以为不同目标分配不同的 CSI。这样，每位管理员将只能根据其合同规定，获得其授权范围内的系统支持。您可以通过“支持标识符分配”选项进行设置。


    虽然使用质询/响应机制的简单代理认证设置起来很简单，但多年来，企业管理员中与代理配置相关的错误屡见不鲜。产品在这方面确实在不断改进；然而，在与使用 NTLM
    自动认证用户的公司企业代理服务器进行认证时，您可能仍会遇到问题——考虑到 Active Directory 作为认证存储库在市场中的普遍存在，这种配置相当常见。这是因为云控制不支持
    NTLM 代理服务器。因此，Oracle 官方建议是将各种 oracle.com 站点排除在公司代理配置之外。


    ## 使用 NTLMAPS 代理


    NTLM 认证代理服务器 (`NTLMAPS`) 是一个代理服务器——本质上是一个智能的 Python 脚本和一些开源的 NTLM 库，它将针对互联网 URI
    的请求重定向到上游或父代理服务器。如果需要，它会添加适当的浏览器标头，并且，对于 `EM12c` 至关重要的是，它能使用 NT 凭证正确地通过上游代理服务器认证。该项目在
    GNU 通用公共许可证下授权，因此是免费的，可以在 [`ntlmaps.sourceforge.net/`](http://ntlmaps.sourceforge.net/)
    找到。


    **注意** 本节介绍的是使用轻量级开源专用代理的替代解决方案的设置。如果您选择使用此选项，请确保获得网络管理员的同意。


    这意味着我们可以运行自己的代理服务器，无需云控制知晓 Active Directory 认证，同时仍能使用公司代理进行认证，并遵守所有公司安全规则。安装时，请下载并解压发行版到
    `/opt/ntlmaps`。如果您使用的是 RedHat 或类似系统，Python 已作为标准发行版的一部分提供。否则，您还需要安装 Python。`NTLMAPS`
    使用配置文件 `server.cfg`。您需要为以下参数输入值：


    *   `PARENT_PROXY`：父服务器的 IP 地址

    *   `PARENT_PORT`：父服务器监听的端口

    *   `USER`：配置的 Active Directory 用户名

    *   `PASSWORD`：该用户的配置的 AD 密码

    *   `NT_DOMAIN`：NT 域名


    完成这些设置后，暂时通过执行提供的脚本 `python main.py` 手动启动代理服务器。默认情况下，`NTLMAPS` 使用端口 `5865`。这个端口通常应该是可以接受的。无论您选择哪种方式，现在都应该为
    `OMS` 服务器配置互联网访问，在上文“配置代理服务器访问”的步骤 2 中，将代理地址设置为 `NTLMAPS` 的地址。一旦代理正常工作，下一步就是使用
    `chkconfig` 配置一个 Linux 服务。我使用的脚本是本书代码库中提供的一个开源脚本。


    ## 通知


    企业管理员的主要作用之一是，当受管目标遇到需要关注的事件时触发警报。典型的例子包括 Web 服务器宕机或数据存储因数据增加而空间不足。企业管理员将此任务分为两个不同的阶段：警报和通知。这两个区域都可以从云控制菜单栏进行配置。


    警报阶段关注的是记录特定事件的发生，通常由某个度量驱动。经管理服务器处理后，该信息会在目标主页上显示。警报会触发但不一定为管理员引发警报这一事实，是新用户对该产品感到困惑的常见原因。


    相比之下，通知阶段是通过某种方式发送警报详细信息，以使相应的管理员能够响应警报状况的过程。例如，可能会呼叫一位数据库管理员（`DBA`），让她知道数据库的系统表空间空间严重不足，需要紧急增加空间。传统上，通知通过电子邮件进行，但也可以通过
    `SNMP` 路由（例如发送到运营控制中心）、由数据库管理员或数据库开发人员编写的 `PL/SQL` 过程，或通过在管理服务器上运行操作系统命令（可能是 shell
    脚本）来实现。


    一旦您成功安装了企业管理员并使用 `SYSMAN` 账户登录后，您的首要任务之一应该是添加一个可用于通知您所设置管理员的通知方法。在此示例中，我们将使用电子邮件，因为这是实际安装中最常见的方法。要开始此过程，请选择“设置”>
    “通知”> “通知方法”，如 图 4-21 所示。


    ![9781430249382_Fig04-21.jpg](img/9781430249382_Fig04-21.jpg)


    图 4-21. 通知方法


    然后会显示如 图 4-22 所示的屏幕。您可以使用此屏幕设置公司邮件服务器的详细信息以及所需的任何认证凭据。您使用的邮件服务器*必须*配置为允许 `SMTP`
    通信。您可能需要询问您的邮件管理员应该使用哪些服务器，因为许多公司邮件配置只允许来自特定服务器的 `SMTP`，并且可能要求您配置的账户是特定组的成员。


    ![9781430249382_Fig04-22.jpg](img/9781430249382_Fig04-22.jpg)


    图 4-22. SMTP 服务器详细信息


    默认情况下，企业管理员提供两种用于发送事件通知的电子邮件模板，分别称为长格式和短格式电子邮件。您可能需要自定义这些模板，特别是为了确保您的电子邮件客户端已配置规则以高效处理这些邮件。要自定义电子邮件格式，请从“通知”子菜单（如前面的
    图 4-21 所示）中选择“自定义电子邮件格式”。这将显示如 图 4-23 所示的屏幕，默认显示度量警报的长格式，不过您可以通过屏幕顶部的下拉菜单更改此设置。


    ![9781430249382_Fig04-23.jpg](img/9781430249382_Fig04-23.jpg)


    图 4-23. 电子邮件自定义'
- fmt: '## 通知格式定制


    如你所见，长格式命名详尽，提供了几乎所有你可能需要的信息。遗憾的是，它几乎无法阅读。此时，你可能会选择查看短格式，如 **图 4-24** 所示，尤其是当这些消息要发送到移动设备（如手机或寻呼机）时。不幸的是，这种格式将简洁性发挥到了极致，甚至没有包含引发告警的度量细节。这是一个设计特性，专门将消息长度限制在155个字符以内。此限制旨在允许通过SMS发送，尽管提供商的限制和SMS的字符集可能比这更少（例如，许多限制为140个字符）。因此，为了生产使用，你无疑会希望自定义这两种格式之一。


    ![9781430249382_Fig04-24.jpg](images/9781430249382_Fig04-24.jpg)


    **图 4-24. 短格式通知**


    ![image](images/sq.jpg) **提示**  我们建议你从短格式开始并扩展它，而不是从长格式中删减。


    定制是一个相对简单的过程，由配置纯文本和占位符的混合组成，这些占位符在运行时会被告警的属性（例如，目标名称或告警时间戳）替换。注释可以用 `--` 字符组合进行前缀，就像SQL语句一样。此外，可以应用条件逻辑来包含相关详细信息，例如，如果这是一个重复通知。目前尚无创建新告警模板的能力，因此你只能使用这两种邮件格式。然而，通过仔细使用条件逻辑功能并配合适当的属性，可以有效地规避这一限制。例如，可以基于目标部署类型为生产环境和QA定义不同的短格式响应模板。**图
    4-25** 展示了一个为生产环境定义所有告警类型（包括重复告警），而仅为QA定义一个常规邮件的示例。


    ![9781430249382_Fig04-25.jpg](images/9781430249382_Fig04-25.jpg)


    **图 4-25. 条件格式逻辑的使用**


    ## 管理包访问


    客户经常反对实施 Oracle Enterprise Manager 的一个主要原因是其感知成本。尽管 Enterprise Manager 本身是一个完全免费的产品。然而，该产品以易于使用的方式暴露了按目标许可的高级功能。这些功能包含在管理包中。由于
    GUI 使得管理员能够轻松访问他们未获许可的功能，因此在实施后不久应执行的任务之一是为你目标配置管理包访问。这需要从 `Cloud Control` 菜单完成。


    要开始该过程，请从 `Setup` 菜单中选择 `Management Packs`。其子菜单有四个选项，如 **图 4-26** 所示。


    ![9781430249382_Fig04-26.jpg](images/9781430249382_Fig04-26.jpg)


    **图 4-26. 管理包配置菜单**


    `Management Pack Access` 选项允许你启用——更重要的是，禁用——你未付费因此无权使用的高级功能。**图 4-27** 显示了展示这些选项的屏幕。


    ![9781430249382_Fig04-27.jpg](images/9781430249382_Fig04-27.jpg)


    **图 4-27. 限制对管理包的访问**


    `Management Packs` 子菜单的 `License Information` 项会带你前往一个长列表，其中包含你可以购买以帮助管理和管理 Oracle
    产品的各种管理包和插件。这些包和插件扩展了 Enterprise Manager 和/或基础产品的功能，以提供增强的管理体验。


    此外，子菜单的 `Packs for This Page` 选项现在提供了一个弹出窗口，详细说明了访问给定 EM 页面所需的管理包。此功能在整个产品中可用。例如，在数据库性能主页上单击此菜单选项会产生
    **图 4-28** 所示的对话框。


    ![9781430249382_Fig04-28.jpg](images/9781430249382_Fig04-28.jpg)


    **图 4-28. 显示所需管理包的“此页面的包”示例**


    ![image](images/sq.jpg) **注意**  遗憾的是，`Packs for This Page` 功能提供的包访问信息粒度不如先前版本中启用文本管理包标签那样细。


    ## 导航菜单栏


    用于导航控制台界面本身的 `Navigation` 菜单位于每个屏幕顶部的蓝色导航栏中。共有四个菜单，允许快速导航到以下位置：


    *   整个企业范围内的位置

    *   基于目标的管理页面

    *   保存的位置（或收藏夹）

    *   访问过的位置（或历史记录）


    菜单栏如 **图 4-29** 所示。此外，导航栏在屏幕右侧还包含一个搜索框（图中未显示）。


    ![9781430249382_Fig04-29.jpg](images/9781430249382_Fig04-29.jpg)


    **图 4-29. 导航菜单栏条目**


    无论你在产品中导航到何处，这些菜单始终可用。其主要优点在于，你将始终拥有一致的方法来快速轻松地导航到所选位置。


    ### Enterprise 菜单


    `Enterprise` 菜单，如 **图 4-30** 所示，包含你全面了解企业运行状况所需的项，以及各种不适合基于目标菜单的项。


    ![9781430249382_Fig04-30.jpg](images/9781430249382_Fig04-30.jpg)


    **图 4-30. Enterprise 菜单**


    接下来，你将了解该菜单的各种选项，然后花点时间看看可用的报告选项。


    #### 探索 Enterprise 菜单


    `Summary` 项带你前往企业的整体摘要视图，该视图为你提供所有你有权访问的托管目标的实时状态信息的概览。对于熟悉先前产品版本的用户来说，这是传统的主页。


    `Monitoring` 子菜单为你提供了几个企业范围的选项，用于审查和标准化整个企业的监控和管理。因此，例如，此菜单是定义监控模板和纠正措施的起点。此领域将在
    **第7章** 中介绍。现在，请注意此子菜单提供了一条通往监控和自动故障纠正一站式配置的途径。


    `Job` 子菜单是内置的 Enterprise Manager 作业调度程序的接口。这个集中式作业调度系统允许你在整个企业的托管目标上运行各种标准化作业。例如，可以定义标准化的
    Recovery Manager (`RMAN`) 备份脚本，并将相同脚本部署到企业中的所有数据库。作业接口将在 **第11章** 中介绍。'
  raw: 'As you can see, the long format is well named, providing nearly every available
    piece of information that you might require. Unfortunately, it’s almost impossible
    to read. You might then choose to look at the short format, shown in [Figure 4-24](#9781430249382_Ch04.xhtml#Fig24),
    especially if these messages are to be delivered to a mobile device such as a
    cell phone or pager. Unfortunately, this format takes brevity to the absolute
    limit, not even including the metric details that caused the alert. This is a
    design feature specifically limiting the message to fewer than 155 characters.
    This limit is intended to allow SMS sending, though provider limits and character
    sets for SMS may be more limited than this (many for example, limit you to 140
    characters). You will undoubtedly, therefore, wish to customize one or the other
    of these formats for production use.


    ![9781430249382_Fig04-24.jpg](images/9781430249382_Fig04-24.jpg)


    [Figure 4-24](#9781430249382_Ch04.xhtml#_Fig24). Short-format notifications


    ![image](images/sq.jpg) **Tip**  We suggest you start with the short format and
    expand it, rather than removing from the long format.


    Customization is a relatively simple process, consisting of configuring a mix
    of plain text and placeholders that are substituted at runtime with attributes
    from the alert (for example, target name or alert timestamp). Comments can be
    prefixed with the -- character combination in the same way that SQL statements
    can. In addition, conditional logic can be applied in order to include relevant
    details, perhaps if this is a repeat notification. There is as yet no capability
    for creating new alert templates, so you are stuck with the two mail formats.
    This limitation can, however, be effectively worked around by careful use of the
    conditional logic feature together with appropriate attributes. For example, it
    is possible to define different short-response templates for Production and QA
    based on target deployment type. [Figure 4-25](#9781430249382_Ch04.xhtml#Fig25)
    shows an example defining all alert types, including repeats for Production but
    only one regular mail for QA.


    ![9781430249382_Fig04-25.jpg](images/9781430249382_Fig04-25.jpg)


    [Figure 4-25](#9781430249382_Ch04.xhtml#_Fig25). Use of conditional formatting
    logic


    Management Pack Access


    One of the major objections customers often have to implementing Oracle Enterprise
    Manager is the perceived cost involved. This is despite the fact that Enterprise
    Manager itself is a completely free product. The product does, however, expose
    in an easy-to-use fashion premium functionality that is licensed by target. This
    functionality is contained in management packs. Because the GUI makes it simple
    for administrators to access functionality for which they are not licensed, one
    of the tasks you should perform fairly shortly after implementation is to configure
    management pack access for your targets. This is done from the Cloud Control menu.


    To begin the process, choose Management Packs from the Setup menu. Its submenu
    has four options, shown in [Figure 4-26](#9781430249382_Ch04.xhtml#Fig26).


    ![9781430249382_Fig04-26.jpg](images/9781430249382_Fig04-26.jpg)


    [Figure 4-26](#9781430249382_Ch04.xhtml#_Fig26). Management pack configuration
    menu


    The Management Pack Access option allows you to enable—or more important, disable—premium
    functionality for which you haven’t paid and are therefore not entitled to use.
    [Figure 4-27](#9781430249382_Ch04.xhtml#Fig27) shows the screen that displays
    the options.


    ![9781430249382_Fig04-27.jpg](images/9781430249382_Fig04-27.jpg)


    [Figure 4-27](#9781430249382_Ch04.xhtml#_Fig27). Restricting access to management
    packs


    The Management Packs submenu’s License Information item takes you to a long list
    of the various management packs and plug-ins you can buy to aid in the administration
    and management of Oracle products. These packs and plug-ins extend the functionality
    of Enterprise Manager and/or the base product in order to provide an enhanced
    management experience.


    In addition, the submenu’s Packs for This Page option now provides a pop-up detailing
    the management packs that are needed to access a given EM page. This feature is
    available throughout the product. For example, clicking this menu option on the
    Database Performance home page produces the dialog box shown in [Figure 4-28](#9781430249382_Ch04.xhtml#Fig28).


    ![9781430249382_Fig04-28.jpg](images/9781430249382_Fig04-28.jpg)


    [Figure 4-28](#9781430249382_Ch04.xhtml#_Fig28). Packs for This Page example showing
    required management packs


    ![image](images/sq.jpg) **Note**  The Packs for This Page feature regrettably
    doesn’t provide pack access information at the same granular level as enabling
    the textual management pack labels did in previous releases.


    Navigation Menu Bar


    The Navigation menus, used for navigating the console interface itself, are located
    in the blue navigation bar at the top of each screen. There are four menus, which  allow
    for quick navigation to the following:


    *   Enterprise-wide locations

    *   Target-based administration pages

    *   Saved locations (or favorites)

    *   Visited locations (or history)


    The menu bar appears as in [Figure 4-29](#9781430249382_Ch04.xhtml#Fig29). In
    addition, the Navigation bar also contains a search box on the right side of the
    screen (not shown in the figure).


    ![9781430249382_Fig04-29.jpg](images/9781430249382_Fig04-29.jpg)


    [Figure 4-29](#9781430249382_Ch04.xhtml#_Fig29). Navigation menu bar entries


    These menus are always available to you, no matter where you have navigated within
    the product. The chief advantage of this is that you will always have a consistent
    method available for navigating quickly and easily to the location of your choice.


    Enterprise Menu


    The Enterprise menu, shown in [Figure 4-30](#9781430249382_Ch04.xhtml#Fig30),
    contains the items you need for an overall view of the health of your enterprise,
    as well as various items that don’t naturally fit into the target-based menu.


    ![9781430249382_Fig04-30.jpg](images/9781430249382_Fig04-30.jpg)


    [Figure 4-30](#9781430249382_Ch04.xhtml#_Fig30). The Enterprise menu


    Next you’ll learn about the menu’s various options, and then take a little time
    to look at the reporting options that are available to you.


    Exploring the Enterprise Menu


    The Summary item takes you to the overall summary view of the enterprise, which
    gives at-a-glance current-state information for all managed targets to which you
    have access. For those familiar with previous product releases, this is the traditional
    home page.


    The Monitoring submenu provides you with several enterprise-wide options for reviewing
    and standardizing monitoring and management across the enterprise. So, for example,
    this menu is the starting point for defining monitoring templates and corrective
    actions. This area is covered in [Chapter 7](#9781430249382_Ch07.xhtml). For now,
    note that this submenu provides a route to one-stop configuration of monitoring
    and automatic fault correction.


    The Job submenu is the interface for the built-in Enterprise Manager job scheduler.
    This centralized job scheduling system allows you to run a variety of standardized
    jobs on managed targets across your enterprise. For example, it is possible to
    define standardized Recovery Manager (RMAN) backup scripts and deploy the same
    script across all databases in the enterprise. The job interface is covered in
    [Chapter 11](#9781430249382_Ch11.xhtml).'
  trans: '## 通知格式定制


    如你所见，长格式命名详尽，提供了几乎所有你可能需要的信息。遗憾的是，它几乎无法阅读。此时，你可能会选择查看短格式，如 **图 4-24** 所示，尤其是当这些消息要发送到移动设备（如手机或寻呼机）时。不幸的是，这种格式将简洁性发挥到了极致，甚至没有包含引发告警的度量细节。这是一个设计特性，专门将消息长度限制在
    155 个字符以内。此限制旨在允许通过 SMS 发送，尽管提供商的限制和 SMS 的字符集可能比这更少（例如，许多限制为 140 个字符）。因此，为了生产使用，你无疑会希望自定义这两种格式之一。


    ![9781430249382_Fig04-24.jpg](img/9781430249382_Fig04-24.jpg)


    **图 4-24. 短格式通知**


    ![image](img/sq.jpg) **提示**  我们建议你从短格式开始并扩展它，而不是从长格式中删减。


    定制是一个相对简单的过程，由配置纯文本和占位符的混合组成，这些占位符在运行时会被告警的属性（例如，目标名称或告警时间戳）替换。注释可以用 `--` 字符组合进行前缀，就像
    SQL 语句一样。此外，可以应用条件逻辑来包含相关详细信息，例如，如果这是一个重复通知。目前尚无创建新告警模板的能力，因此你只能使用这两种邮件格式。然而，通过仔细使用条件逻辑功能并配合适当的属性，可以有效地规避这一限制。例如，可以基于目标部署类型为生产环境和
    QA 定义不同的短格式响应模板。**图 4-25** 展示了一个为生产环境定义所有告警类型（包括重复告警），而仅为 QA 定义一个常规邮件的示例。


    ![9781430249382_Fig04-25.jpg](img/9781430249382_Fig04-25.jpg)


    **图 4-25. 条件格式逻辑的使用**


    ## 管理包访问


    客户经常反对实施 Oracle Enterprise Manager 的一个主要原因是其感知成本。尽管 Enterprise Manager 本身是一个完全免费的产品。然而，该产品以易于使用的方式暴露了按目标许可的高级功能。这些功能包含在管理包中。由于
    GUI 使得管理员能够轻松访问他们未获许可的功能，因此在实施后不久应执行的任务之一是为你目标配置管理包访问。这需要从 `Cloud Control` 菜单完成。


    要开始该过程，请从 `Setup` 菜单中选择 `Management Packs`。其子菜单有四个选项，如 **图 4-26** 所示。


    ![9781430249382_Fig04-26.jpg](img/9781430249382_Fig04-26.jpg)


    **图 4-26. 管理包配置菜单**


    `Management Pack Access` 选项允许你启用——更重要的是，禁用——你未付费因此无权使用的高级功能。**图 4-27** 显示了展示这些选项的屏幕。


    ![9781430249382_Fig04-27.jpg](img/9781430249382_Fig04-27.jpg)


    **图 4-27. 限制对管理包的访问**


    `Management Packs` 子菜单的 `License Information` 项会带你前往一个长列表，其中包含你可以购买以帮助管理和管理 Oracle
    产品的各种管理包和插件。这些包和插件扩展了 Enterprise Manager 和/或基础产品的功能，以提供增强的管理体验。


    此外，子菜单的 `Packs for This Page` 选项现在提供了一个弹出窗口，详细说明了访问给定 EM 页面所需的管理包。此功能在整个产品中可用。例如，在数据库性能主页上单击此菜单选项会产生
    **图 4-28** 所示的对话框。


    ![9781430249382_Fig04-28.jpg](img/9781430249382_Fig04-28.jpg)


    **图 4-28. 显示所需管理包的“此页面的包”示例**


    ![image](img/sq.jpg) **注意**  遗憾的是，`Packs for This Page` 功能提供的包访问信息粒度不如先前版本中启用文本管理包标签那样细。


    ## 导航菜单栏


    用于导航控制台界面本身的 `Navigation` 菜单位于每个屏幕顶部的蓝色导航栏中。共有四个菜单，允许快速导航到以下位置：


    *   整个企业范围内的位置

    *   基于目标的管理页面

    *   保存的位置（或收藏夹）

    *   访问过的位置（或历史记录）


    菜单栏如 **图 4-29** 所示。此外，导航栏在屏幕右侧还包含一个搜索框（图中未显示）。


    ![9781430249382_Fig04-29.jpg](img/9781430249382_Fig04-29.jpg)


    **图 4-29. 导航菜单栏条目**


    无论你在产品中导航到何处，这些菜单始终可用。其主要优点在于，你将始终拥有一致的方法来快速轻松地导航到所选位置。


    ### Enterprise 菜单


    `Enterprise` 菜单，如 **图 4-30** 所示，包含你全面了解企业运行状况所需的项，以及各种不适合基于目标菜单的项。


    ![9781430249382_Fig04-30.jpg](img/9781430249382_Fig04-30.jpg)


    **图 4-30. Enterprise 菜单**


    接下来，你将了解该菜单的各种选项，然后花点时间看看可用的报告选项。


    #### 探索 Enterprise 菜单


    `Summary` 项带你前往企业的整体摘要视图，该视图为你提供所有你有权访问的托管目标的实时状态信息的概览。对于熟悉先前产品版本的用户来说，这是传统的主页。


    `Monitoring` 子菜单为你提供了几个企业范围的选项，用于审查和标准化整个企业的监控和管理。因此，例如，此菜单是定义监控模板和纠正措施的起点。此领域将在
    **第 7 章** 中介绍。现在，请注意此子菜单提供了一条通往监控和自动故障纠正一站式配置的途径。


    `Job` 子菜单是内置的 Enterprise Manager 作业调度程序的接口。这个集中式作业调度系统允许你在整个企业的托管目标上运行各种标准化作业。例如，可以定义标准化的
    Recovery Manager (`RMAN`) 备份脚本，并将相同脚本部署到企业中的所有数据库。作业接口将在 **第 11 章** 中介绍。'
- fmt: '# Enterprise Menu Features


    ![image](images/sq.jpg) **Tip** You will have to decide whether the `EM12c` job
    system provides enough flexibility and reliability in your environment, or whether
    alternative job scheduling systems meet your requirements. In general, if you
    have an existing enterprise scheduler, we would recommend using that. If you have
    the usual collection of somewhat uncontrolled shell scripts, we would suggest
    that `EM12c` provides an opportunity for centralization and simplification.


    ## Reports Submenu


    The Reports submenu is designed to help you produce reports based on the centralized
    repository data that you accumulate through the operation of `Oracle Enterprise
    Manager`. This information provides much of the additional value of a centralized
    repository for management data. We cover the detailed functionality of this menu
    at the end of this section.


    ## Configuration Submenu


    The next submenu is Configuration, which allows you to collect and compare configuration
    details for the managed targets in your organization. This allows you to ensure
    that, for example, you have the same operating system package versions installed
    on two similar hosts. This menu is where the configuration management capabilities
    of the product show through.


    ## Compliance Submenu


    Next is the Compliance submenu. *Compliance* refers to the extent to which the
    actual configuration of a particular target conforms to a predefined standard
    for that type of configuration item. This area of the product has seen some significant
    improvement with `12c`. In previous releases, all that could be achieved was to
    compare a managed target against a single, uneditable, predefined set of best
    practices. This had significant drawbacks, either because the predefined policy
    was too restrictive or because it wasn’t restrictive enough. The best example
    of the latter is an organization that is subject to `Payment Card Industry (PCI)`
    standards.


    ![9781430249382_Fig04-31.jpg](images/9781430249382_Fig04-31.jpg)


    **Figure 4-31.** The Compliance submenu


    A full coverage of target compliance is beyond the scope of this chapter. There
    are some basic concepts to get you started, however. `Oracle` envisages that,
    in line with industry practice, you define a set of standard practices (for example,
    that you will use `Automatic Storage Management (ASM)` for your database storage
    requirements, or that database listeners won’t use the default port of `1521`).
    These are managed individually as compliance standard rules. You then group a
    set of related rules into a corporate standard for, typically, a target type.
    So you might roll up your `ASM` standard together with a standard that states
    you will not use bigfile tablespaces and one that requires locally managed tablespaces
    with a uniform extent size into a Database Storage Standard. Finally, you can
    group related standards into a compliance framework. In our example, we might
    create a storage standard as described earlier, and a database password standard
    to comply with corporate password policy. These can then both be grouped together
    to form a Database Compliance framework for your organization. As of this release,
    the standards and policy rules are editable for your organization. In addition,
    `Oracle` ships several compliance frameworks with supporting standards and rules.


    ![image](images/sq.jpg) **Note** This one change means that the compliance capability
    of `Enterprise Manager` that was rarely used in previous releases should now be
    on your to-investigate list.


    The rules, standards, and frameworks that you create form a Compliance Library.
    You can review this from the Library link in the Compliance menu. `Enterprise
    Manager` then allows you to ensure compliance in two ways. First, a compliance
    score is calculated as a weighted average of the results of evaluating your compliance
    standard rules against a managed target. This score shows up on the target and
    enterprise home pages. Second, a compliance officer can view target status interactively
    and use the `Enterprise Manager` reporting framework to maintain corporate assurance
    that standards are being complied with, and that variations from standards are
    addressed, either by corrective action or by documentation of the reasons for
    noncompliance.


    ## Provisioning and Patching


    The Enterprise menu’s Provisioning and Patching option is the entry point to `EM`’s
    provisioning and patching capabilities. As those capabilities are covered in Chapter
    6, we do not go into that functionality here.


    ## Quality Management


    The next item is called Quality Management, but this is, in my view, a misnomer.
    The submenu shown in Figure 4-32 contains links to a variety of added-value options
    for the Database and `WebLogic` products. As these items are separately licensed,
    we don’t cover these in this introduction to the `Enterprise Manager` interface.


    ![9781430249382_Fig04-32.jpg](images/9781430249382_Fig04-32.jpg)


    **Figure 4-32.** Quality management


    ## My Oracle Support Submenu


    The last item we will look at in any detail is the My Oracle Support submenu.
    This provides access to four commonly used areas of `Oracle`’s online support
    tool. These are Service Requests, Knowledge Base, Certification Information, and
    the My Oracle Support community forums. For any of these to work, you need to
    have configured support integration as described earlier. I personally use only
    the Service Requests option, because the other informational areas (knowledge
    base and community content) are, once My Oracle Support connectivity is established,
    directly searchable from the search box at the top right of the Navigation bar.


    ![image](images/sq.jpg) **Note** One aspect of the support integration that may
    surprise you is that support pages are displayed from the now-retired `Flash`
    interface to My Oracle Support. We expect this to change in future updates to
    the product.


    ## Chargeback and Consolidation Planning


    Finally, at the foot of the menu, looking suspiciously as through the designers
    couldn’t find a better place, are the Chargeback and Consolidation Planning features.
    These advanced features are outside the scope of this chapter.


    Overall, the Enterprise menu gives you access to product- or enterprise-wide functionality
    and is the place you should look for configuring or accessing enterprise management
    functionality. Before you leave this section, though, you’ll look at the reporting
    capabilities of the product in a little more depth.


    # Configuring Reports


    `Enterprise Manager` is in a transitional stage at the time of this writing, moving
    away from `Information Publisher`, which was the technology available in prior
    releases, towards `Business Intelligence Publisher` reporting, which offers greatly
    enhanced formatting, scheduling, and distribution options. With `12c Release 2`,
    you have two distinct options, the first is a link to `Information Publisher`
    reports. (These are the only option available prior to `12c Release 2`), but have
    been superseded by `BI Publisher Reports`. `Oracle` provides an embedded license
    for `BI Publisher` with `Enterprise Manager`, and this is clearly the way forward.
    At the moment, however, there are some restrictions, which we hope to see relaxed
    in future releases.'
