    to use has been successfully deployed. This can be done from the Patches & Updates
    page, accessed by choosing Enterprise ![arrow](images/arrow.jpg) Provisioning
    and Patching ![arrow](images/arrow.jpg) Patches & Updates. On this screen, all
    the patch plans are listed in the Plans list. What you are looking for is a status
    of Deployed Successfully, as shown in [Figure 6-45](#9781430249382_Ch06.xhtml#Fig45).


    ![9781430249382_Fig06-45.jpg](images/9781430249382_Fig06-45.jpg)


    [Figure 6-45](#9781430249382_Ch06.xhtml#_Fig45). Successful plan deployment


    Once you have a successful patch plan, you can create a template based on that
    plan. First, you click the plan name that was successful. This brings you back
    to the Review & Deploy page for the patch plan. At the top of the page, notice
    a lock with an explanation about the plan being locked. At this point, you need
    to create a template to use this plan against other targets.


    At the bottom of the Review & Deploy page is the Save as Template link. Click
    this link, and you are presented with a dialog box asking for the name of the
    template (see [Figure 6-46](#9781430249382_Ch06.xhtml#Fig46)). Enter a name that
    describes the patch plan that will be used against other targets.


    ![9781430249382_Fig06-46.jpg](images/9781430249382_Fig06-46.jpg)


    [Figure 6-46](#9781430249382_Ch06.xhtml#_Fig46). Create New Plan Template dialog
    box


    Click the Create Template button, and the template is created. At the top of the
    Patches & Updates screen, you can see a message that states it has been created.
    This same message contains a View Template link. Click that link to access the
    Edit Template Wizard. This wizard is similar to the Create Plan Wizard discussed
    earlier. There are only three steps to editing a template.


    The first step is Plan Information. On this page, you can add or modify the template
    name, set a plan deployment date, and add a description (see [Figure 6-47](#9781430249382_Ch06.xhtml#Fig47)).
    Click Next to move on to the next step of the wizard.


    ![9781430249382_Fig06-47.jpg](images/9781430249382_Fig06-47.jpg)


    [Figure 6-47](#9781430249382_Ch06.xhtml#_Fig47). The first step of the Edit Template
    Wizard: Plan Information


    The second step of the template wizard lists the patches associated with the template.
    Because the patch plan has already been successfully deployed, the patches have
    already been added to the template. It is not possible to add more patches to
    a template; any new patches have to be applied and validated through the patch
    plan process. [Figure 6-48](#9781430249382_Ch06.xhtml#Fig48) shows the patches
    added to the template. Click Next at the bottom of the screen.


    ![9781430249382_Fig06-48.jpg](images/9781430249382_Fig06-48.jpg)


    [Figure 6-48](#9781430249382_Ch06.xhtml#_Fig48). Step 2 of the Edit Template Wizard:
    Patches


    Step 3 provides deployment options similar to those available for a patch plan.
    However, there are no targets associated with the template. Just as you did with
    the patch plan, select the desired deployment options for the template. These
    options are taken from the options you previously used when creating the patch
    plan. You can keep what you previously selected or make new selections, as shown
    in [Figure 6-49](#9781430249382_Ch06.xhtml#Fig49).


    ![9781430249382_Fig06-49.jpg](images/9781430249382_Fig06-49.jpg)


    [Figure 6-49](#9781430249382_Ch06.xhtml#_Fig49). Step 3 of the Edit Template Wizard:
    Deployment Options


    When you are finished making selections, click Exit Wizard at the bottom of the
    page. This brings you back to the Deployment Successful page. At this point, you
    need to return to the Patches & Updates page to see whether the template is listed
    in the Plans window (see [Figure 6-50](#9781430249382_Ch06.xhtml#Fig50)).


    ![9781430249382_Fig06-50.jpg](images/9781430249382_Fig06-50.jpg)


    [Figure 6-50](#9781430249382_Ch06.xhtml#_Fig50). Plans window listing templates


    Saved Patches


    The patches that are deployed using patch plans or templates are stored in the
    Software Library. You can see what patches are stored in the Software Library
    from the Saved Patches location: choose Enterprise ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Saved Patches. [Figure 6-51](#9781430249382_Ch06.xhtml#Fig51)
    shows the listing of saved patches currently in the Software Library.


    ![9781430249382_Fig06-51.jpg](images/9781430249382_Fig06-51.jpg)


    [Figure 6-51](#9781430249382_Ch06.xhtml#_Fig51). Saved patches in the Software
    Library


    On the Saved Patches page, you can perform various operations. You can manually
    upload and remove patches if needed. You can also access the readme files for
    the associated patches. These features make it easier to work with offline patching
    if there is no connection to the Internet from the Oracle Management Server and
    need to download the patches manually.


    For more information on offline patching, refer to the *Oracle Enterprise Manager
    Lifecycle Management Administrator’s Guide 12c Release 2 (12.1.0.2)* at the following
    URL:


    ```

    http://docs.oracle.com/cd/E24628_01/em.121/e27046/pat_mosem_new.htm#BABBIEAI

    ```


    Additional Patching Procedures


    Additional patching procedures can be used for deployments of patches. You can
    access these procedures by choosing Enterprise ![arrow](images/arrow.jpg) Provisioning
    and Patching ![arrow](images/arrow.jpg) Procedure Library and then searching for
    patches in the Search Text Fields text box (see [Figure 6-52](#9781430249382_Ch06.xhtml#Fig52)).


    ![9781430249382_Fig06-52.jpg](images/9781430249382_Fig06-52.jpg)


    [Figure 6-52](#9781430249382_Ch06.xhtml#_Fig52). Procedure Library (partial listing)


    As you can see, many additional patching procedures are available, such as Clone
    and Patch Oracle Database, Patch Application Server, and parallel and rolling
    patches. With all these options, Oracle Enterprise Manager is a valuable tool
    in helping administrators patch their environments.


    Roles Needed for Patching'
  trans: '

    # 补丁部署与模板管理


    此前，在步骤 3 中，您已配置补丁计划以使用原地修补。这意味着此补丁计划部署后将会发生服务中断。单击 `Deploy` 按钮可立即开始部署补丁。屏幕会变为
    `Deployment in Progress`。后台作业启动，数据库将脱机进行修补。


    部署完成后，`Review & Deploy` 屏幕将显示状态为 `Deployment Successful`，如 图 6-44 所示。如果部署未成功，`Review
    & Deploy` 屏幕将指示部署失败并提供与失败相关的信息。


    ![9781430249382_Fig06-44.jpg](img/9781430249382_Fig06-44.jpg)

    *图 6-44. 部署成功*


    某个目标的部署成功后，该补丁计划无法再用于其他目标。要将补丁计划用于更多目标，需要将其另存为补丁模板。`Review & Deploy` 屏幕底部有一个 `Save
    as Template` 链接，可让您将补丁计划保存为模板。我们将在下一节讨论模板。


    ## 计划模板


    如前所述，补丁计划可以保存为计划模板。这可以在 `Deployment Successful` 页面底部启动。在创建计划模板之前，您需要确保要使用的补丁计划已成功分析和部署。


    与任何类型的模板一样，模板不关联任何目标，这使得该模板可应用于多个目标。在计划模板内部，可以使用 `Create Plan` 按钮基于该模板创建新计划，并可重复应用于多个目标。


    在创建模板之前，您需要确保要使用的补丁计划已成功部署。这可以通过 `Patches & Updates` 页面完成，访问路径为：选择 `Enterprise`
    ![arrow](img/arrow.jpg) `Provisioning and Patching` ![arrow](img/arrow.jpg) `Patches
    & Updates`。在此屏幕上，所有补丁计划都列在 `Plans` 列表中。您需要查找的状态是 `Deployed Successfully`，如 图 6-45
    所示。


    ![9781430249382_Fig06-45.jpg](img/9781430249382_Fig06-45.jpg)

    *图 6-45. 计划部署成功*


    一旦有了成功的补丁计划，就可以基于该计划创建模板。首先，单击成功的计划名称。这将带您返回该补丁计划的 `Review & Deploy` 页面。在页面顶部，请注意一把锁以及关于该计划已被锁定的说明。此时，您需要创建一个模板，以便将此计划用于其他目标。


    `Review & Deploy` 页面底部是 `Save as Template` 链接。单击此链接，会弹出一个对话框，要求输入模板名称（见 图 6-46）。输入一个能描述该补丁计划的名称，该计划将用于其他目标。


    ![9781430249382_Fig06-46.jpg](img/9781430249382_Fig06-46.jpg)

    *图 6-46. “创建新计划模板”对话框*


    单击 `Create Template` 按钮，模板即创建完成。在 `Patches & Updates` 屏幕顶部，您可以看到一条说明模板已创建的消息。此消息还包含一个
    `View Template` 链接。单击该链接可访问 `Edit Template Wizard`。此向导与前面讨论的 `Create Plan Wizard`
    类似。编辑模板只有三个步骤。


    第一步是 `Plan Information`。在此页面上，您可以添加或修改模板名称、设置计划部署日期以及添加描述（见 图 6-47）。单击 `Next`
    进入向导的下一步。


    ![9781430249382_Fig06-47.jpg](img/9781430249382_Fig06-47.jpg)

    *图 6-47. 编辑模板向导的第一步：计划信息*


    模板向导的第二步列出了与该模板关联的补丁。因为补丁计划已经成功部署，所以补丁已添加到模板中。无法向模板添加更多补丁；任何新补丁都必须通过补丁计划流程进行应用和验证。图
    6-48 显示了已添加到模板的补丁。单击屏幕底部的 `Next`。


    ![9781430249382_Fig06-48.jpg](img/9781430249382_Fig06-48.jpg)

    *图 6-48. 编辑模板向导的第二步：补丁*


    第三步提供的部署选项与补丁计划可用的选项类似。但是，模板没有关联的目标。就像处理补丁计划一样，为模板选择所需的部署选项。这些选项取自您先前创建补丁计划时使用的选项。您可以保留先前的选择，或做出新的选择，如
    图 6-49 所示。


    ![9781430249382_Fig06-49.jpg](img/9781430249382_Fig06-49.jpg)

    *图 6-49. 编辑模板向导的第三步：部署选项*


    完成选择后，单击页面底部的 `Exit Wizard`。这将带您返回 `Deployment Successful` 页面。此时，您需要返回 `Patches
    & Updates` 页面，查看模板是否列在 `Plans` 窗口中（见 图 6-50）。


    ![9781430249382_Fig06-50.jpg](img/9781430249382_Fig06-50.jpg)

    *图 6-50. 列出模板的“计划”窗口*


    ## 已保存的补丁


    使用补丁计划或模板部署的补丁存储在 `Software Library` 中。您可以从 `Saved Patches` 位置查看 `Software Library`
    中存储了哪些补丁：选择 `Enterprise` ![arrow](img/arrow.jpg) `Provisioning and Patching` ![arrow](img/arrow.jpg)
    `Saved Patches`。图 6-51 显示了当前在 `Software Library` 中的已保存补丁列表。


    ![9781430249382_Fig06-51.jpg](img/9781430249382_Fig06-51.jpg)

    *图 6-51. 软件库中的已保存补丁*


    在 `Saved Patches` 页面上，您可以执行各种操作。如果需要，可以手动上传和删除补丁。您还可以访问相关补丁的自述文件。如果 Oracle Management
    Server 无法连接到互联网且需要手动下载补丁，这些功能使离线修补更易于操作。


    有关离线修补的更多信息，请参阅 *Oracle Enterprise Manager Lifecycle Management Administrator’s
    Guide 12c Release 2 (12.1.0.2)*，网址如下：

    ```

    http://docs.oracle.com/cd/E24628_01/em.121/e27046/pat_mosem_new.htm#BABBIEAI

    ```


    ## 其他修补过程


    其他修补过程可用于补丁的部署。您可以通过选择 `Enterprise` ![arrow](img/arrow.jpg) `Provisioning and
    Patching` ![arrow](img/arrow.jpg) `Procedure Library`，然后在 `Search Text Fields`
    文本框中搜索补丁来访问这些过程（见 图 6-52）。


    ![9781430249382_Fig06-52.jpg](img/9781430249382_Fig06-52.jpg)

    *图 6-52. 过程库（部分列表）*


    如您所见，有许多可用的其他修补过程，例如 `Clone and Patch Oracle Database`、`Patch Application Server`
    以及并行和滚动补丁。凭借所有这些选项，Oracle Enterprise Manager 成为帮助管理员修补其环境的宝贵工具。


    ## 修补所需的角色

    '
- fmt: '# 补丁角色与数据库配置


    EM12c 提供了一些新的、专用于补丁操作的现成角色：`EM_PATCH_ADMINISTRATOR`、`EM_PATCH_DESIGNER` 和 `EM_PATCH_OPERATOR`。需要将这些角色授予负责补丁活动的管理员。


    要在 Oracle Enterprise Manager 中查看这些角色，请选择 Setup ![arrow](images/arrow.jpg) Security
    ![arrow](images/arrow.jpg) Roles。然后搜索关键字 `patch`。这将显示所有与补丁相关的角色（参见 [Figure 6-53](#9781430249382_Ch06.xhtml#Fig53)）。


    ![9781430249382_Fig06-53.jpg](images/9781430249382_Fig06-53.jpg)


    [Figure 6-53](#9781430249382_Ch06.xhtml#_Fig53). 位于 Security 下的补丁角色


    让我们了解一下这些为补丁定义的角色：


    *   `EM_PATCH_ADMINISTRATOR`：此角色用于在 Enterprise Manager 中为任何补丁计划创建、编辑、部署、删除和授予特权。创建后，此角色还可以将特权授予其他管理员。这是一个对
    Enterprise Manager 中任何补丁计划和模板拥有完全权限的访问角色。此角色应有限制地授予。

    *   `EM_PATCH_DESIGNER`：此角色可以创建和查看任何补丁计划。此角色通常在补丁生命周期（开发、测试和生产）中用于识别补丁。此角色通常分配给组织中的高级
    DBA。此角色能够创建补丁计划和模板，并将这些计划的特权授予 `EM_PATCH_OPERATOR`。

    *   `EM_PATCH_OPERATORS`：此角色用于部署补丁计划。此角色非常有限，因为它只能部署补丁计划。它没有创建或修改任何补丁计划或模板的权限。此角色非常适合组织中的初级
    DBA。


    这些新的补丁角色使管理员能够在部门的多个层级之间分配工作，同时确保补丁按照一致的时间表应用。


    # 配置


    *配置（Provisioning）* 是 Cloud Control 提供的生命周期中另一个重要部分。它允许我们以自动化方式配置数据库选项，例如单实例 Oracle
    数据库和 Oracle Real Application Cluster 数据库；从 Real Application Clusters、Oracle Real
    Application Clusters One 中扩展或删除节点；以及升级单实例数据库。


    ## 数据库配置概述


    首先，让我们对数据库配置有一个概览。[Figure 6-54](#9781430249382_Ch06.xhtml#Fig54) 以分层视图显示了解决方案。


    ![9781430249382_Fig06-54.jpg](images/9781430249382_Fig06-54.jpg)


    [Figure 6-54](#9781430249382_Ch06.xhtml#_Fig54). 配置的分层视图


    在继续之前，有几个特性需要理解。这些特性如下：


    *   `Designer and operator roles`：Cloud Control 为配置管理员提供设计师和操作员角色。这些明确定义的角色使您能够锁定部署过程的输入，以提供标准的部署配置。

    *   `Locking-down feature in the designer role`：配置的此特性使设计师能够锁定一组变量，例如主机目标、凭据和要在部署过程中配置的
    Oracle 主目录。这有助于标准化并最大程度地减少大规模部署中配置的错误。操作员可以部署设计师保存在过程库中的过程。

    *   `Provisioning profiles and database templates`：配置文件（Provisioning profiles）用于配置中，以确保部署的标准化并最小化错误。

    *   `Creating databases using Cloud Control`：您可以直接从 Cloud Control 控制台创建数据库。这是为了确保数据库可以从单一界面进行配置和创建。

    *   `Easy-to-navigate database provisioning wizards`：设计师和操作员可以轻松使用和导航 Cloud Control
    中的数据库配置向导。

    *   `Self Update`：自更新（Self Update）特性用于自动下载和安装配置实体的更新。

    *   `Database Provisioning console for all database provisioning activities`：数据库配置控制台是所有数据库配置活动的中心起点。控制台显示有关配置设置、配置文件、部署过程以及有关如何开始配置的信息。


    要访问数据库配置控制台，请选择 Enterprise ![arrow](images/arrow.jpg) Provisioning and Patching
    ![arrow](images/arrow.jpg) Database Provisioning。您会注意到用于裸机（Bare Metal）和中间件（Middleware）的附加配置选项；这些用于配置服务器和中间件目标。需要明确的是，本章我们关注的是数据库配置。[Figure
    6-55](#9781430249382_Ch06.xhtml#Fig55) 显示了数据库配置控制台的上部。


    ![9781430249382_Fig06-55.jpg](images/9781430249382_Fig06-55.jpg)


    [Figure 6-55](#9781430249382_Ch06.xhtml#_Fig55). 数据库配置控制台


    ## 支持的目标与部署过程


    既然您有了数据库配置的起点，那么可以配置什么？如何配置？Cloud Control 使您能够通过使用部署过程（deployment procedures）来执行数据库配置。*部署过程*
    是一系列按顺序运行以完成配置任务的预定义步骤。[Table 6-3](#9781430249382_Ch06.xhtml#Tab3) 列出了 Cloud Control
    中提供和用于配置数据库的过程。


    [Table 6-3](#9781430249382_Ch06.xhtml#_Tab3). 用于数据库配置的部署过程


    ![Table6-3.jpg](images/Table6-3.jpg)


    使用[表 6-3](#9781430249382_Ch06.xhtml#Tab3)中的部署过程，有多种用例。本章无法一一讨论，因此在本章剩余部分，我们将专注于单实例
    Oracle 数据库的配置。


    ## 数据库配置的设置


    使用 Oracle Enterprise Manager Cloud Control 中的配置选项，您可以使用模板、安装介质、数据库实体或配置文件来配置 Oracle
    数据库、Oracle Real Application Clusters 数据库和 Oracle Real Application Clusters One
    数据库，以实现标准化部署。


    ### 创建配置文件'
  raw: 'EM12c supplies some new roles out of the box that are specific to patching:
    EM_PATCH_ADMINISTRATOR, EM_PATCH_DESIGNER, and EM_PATCH_OPERATOR. These roles
    need to be granted to the administrators who are responsible for patching activities.


    To view these roles within Oracle Enterprise Manager, choose Setup ![arrow](images/arrow.jpg)
    Security ![arrow](images/arrow.jpg) Roles. Then search for the keyword *patch*.
    This brings up all the roles associated with patching (see [Figure 6-53](#9781430249382_Ch06.xhtml#Fig53)).


    ![9781430249382_Fig06-53.jpg](images/9781430249382_Fig06-53.jpg)


    [Figure 6-53](#9781430249382_Ch06.xhtml#_Fig53). Patching roles located under
    Security


    Let’s take a look at these roles as defined for patching:


    *   EM_PATCH_ADMINISTRATOR: This is the role for creating, editing, deploying,
    deleting, and granting privileges for any patch plan in Enterprise Manager. This
    role can also grant privileges to other administrators after creating them. This
    is a full privilege access role to any patch plan and template within Enterprise
    Manager. This role should be given out on a limited basis.

    *   EM_PATCH_DESIGNER: This role can create and view any patch plan. This role
    is normally used in the identification of patches across the patching lifecycle
    (development, testing, and production). This role would be assigned to a senior
    DBA in an organization. This role has the ability to create patch plans and templates
    and grant privileges to those plans to EM_PATCH_OPERATORS.

    *   EM_PATCH_OPERATORS: This is a role for deploying patch plans. This role is
    very limited in that is can only deploy patch plans. It has no privileges to create
    or modify any patch plans or templates. This role is ideal for junior DBAs of
    an organization.


    These new patching roles enable administrators to provide a division of work between
    many layers of a department while making sure that patches are applied on a consistent
    schedule.


    Provisioning


    *Provisioning* is another important part of the lifecycle offered with Cloud Control.
    It allows us to provision database options, such as single-instance Oracle databases
    and Oracle Real Application Cluster databases; extend or delete nodes from Real
    Application Clusters, Oracle Real Application Clusters One; and upgrade single-instance
    databases in an automated manner.


    Overview of Database Provisioning


    First, let’s take a general look at database provisioning. [Figure 6-54](#9781430249382_Ch06.xhtml#Fig54)
    shows the provisioning solution in a hierarchical view.


    ![9781430249382_Fig06-54.jpg](images/9781430249382_Fig06-54.jpg)


    [Figure 6-54](#9781430249382_Ch06.xhtml#_Fig54). Hierarchical view of provisioning


    There are a few features that you need to understand before moving on. These features
    are the following:


    *   *Designer and operator roles*: Cloud Control offers designer and operator
    roles for administrators for provisioning. These clearly defined roles give you
    the capability to lock down the deployment procedure inputs to provide standard
    deployment configurations.

    *   *Locking-down feature* *in the designer role*: This feature of provisioning
    enables the designers to lock down a set of variables, such as host target, credentials,
    and the Oracle home to be provisioned in the deployment procedure. This enables
    the standardization and minimizes errors in the configurations for mass deployments.
    The operator can deploy the procedure that was saved by the designer in the procedure
    library.

    *   *Provisioning profiles and database templates*: Provisioning profiles are
    used in provisioning to ensure standardization in deployments and minimize errors.

    *   *Creating databases using Cloud Control*: You can create databases directly
    from the Cloud Control console. This is to ensure that databases can be provisioned
    and created from a single interface.

    *   *Easy-to-navigate database provisioning wizards*: Designers and operators
    can easily use and navigate through the Database Provisioning Wizard in Cloud
    Control.

    *   *Self Update*: The Self Update feature is used to automatically download and
    install updates to your provisioning entities.

    *   *Database Provisioning console for all database provisioning activities*:
    The Database Provisioning console is the central starting point for database provisioning
    activities. The console displays information about provisioning setup, profiles,
    deployment procedures, and any information about getting started with provisioning.


    To access the Database Provisioning console, you choose Enterprise ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Database Provisioning. You
    will notice additional provisioning options for Bare Metal and Middleware; these
    are used to provision servers and middleware targets. Just to be clear, we are
    focusing on database provisioning in this chapter. [Figure 6-55](#9781430249382_Ch06.xhtml#Fig55)
    shows the upper portion of the Database Provisioning console.


    ![9781430249382_Fig06-55.jpg](images/9781430249382_Fig06-55.jpg)


    [Figure 6-55](#9781430249382_Ch06.xhtml#_Fig55). Database Provisioning console


    Supported Targets and Deployment Procedures


    Now that you have a starting point for database provisioning, what can you provision?
    How do you provision? Cloud Control enables you to perform database provisioning
    by using deployment procedures. A *deployment procedure* is a set of predefined
    steps that run in sequence to complete the provisioning tasks. [Table 6-3](#9781430249382_Ch06.xhtml#Tab3)
    lists procedures that are offered and used to provision databases from within
    Cloud Control.


    [Table 6-3](#9781430249382_Ch06.xhtml#_Tab3). Deployment Procedures used for Database
    Provisioning


    ![Table6-3.jpg](images/Table6-3.jpg)


    With the deployments procedures that are in [Table 6-3](#9781430249382_Ch06.xhtml#Tab3),
    there are a variety of use cases. There are far too many to discuss in this chapter,
    so we will focus on a single-instance Oracle database provisioning for the remainder
    of this chapter.


    Setup for Database Provisioning


    Using the Provisioning options in Oracle Enterprise Manager Cloud Control, you
    can provision Oracle databases, Oracle Real Application Clusters databases, and
    Oracle Real Application Clusters One databases by using templates, installation
    media, database entities, or provisioning profiles to standardize deployments.


    Creating a Provision Profile'
