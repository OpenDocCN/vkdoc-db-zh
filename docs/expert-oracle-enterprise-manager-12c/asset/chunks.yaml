    ## Problems


    `problem` is the underlying root cause of an incident. In `Enterprise Manager`
    terms, a problem is specifically related to an `Automatic Diagnostic Repository
    (ADR)` incident or Oracle software incident. `Enterprise Manager` automatically
    creates a problem whenever it detects that an `ADR` incident has been raised.
    An `ADR` incident can be thought of as a critical Oracle software problem typically
    contacting Oracle Support, opening a service request, and possibly receiving a
    patch for that problem.


    Whenever an `ADR` incident is raised, we generate one incident in `Enterprise
    Manager` for that `ADR` incident, and we also automatically generate a problem
    object as well. All the `ADR` incidents that have the same problem signature (that
    is, the same root cause) will be linked into a single problem object (for example,
    `ADR` incidents for an `ORA-0600` error that have the same arguments to the `ORA-0600`
    error will be linked into a single problem object). The administrator can manage
    the problem in `Incident Manager` in the same way as you would manage an incident,
    so you can assign an owner to the problem, track the resolution, and so on. In
    addition, there are in-context links to `Support Workbench` functionality that
    allow the administrator to package the diagnostic material, open a service request,
    and view the status of diagnostic activity such as the SR number and ultimately
    bug number (if one is generated) within the user interface.


    [Figure 12-3](#9781430249382_Ch12.xhtml#Fig3) illustrates how incidents and problems
    are related. In this example, two `ADR` incidents (two `ORA-600` errors) have
    occurred in a database. Both of these incidents are of Critical severity. `Enterprise
    Manager Cloud Control` automatically creates a problem object containing those
    incidents. Within the `Incident Manager` user interface, you can link to the `Support
    Workbench` to open a service request that you can then track from `Incident Manager`.


    ![9781430249382_Fig12-03.jpg](images/9781430249382_Fig12-03.jpg)


    [Figure 12-3](#9781430249382_Ch12.xhtml#_Fig3). Incidents and problems


    ## Incident Rule Sets


    `Incident rule sets` are the replacement of and an enhancement to notification
    rules. They provide a way to automate actions related to events, incidents, or
    problems. Some of the common scenarios, or use cases, for incident rule sets include
    creating an incident based on an event, sending notifications such as e-mails
    or pages, opening help-desk tickets, and automating incident workflow actions
    (such as automatically assigning the owner of an incident or escalating an incident
    after it has been open for some time).


    There are two types of incident rule sets in `Enterprise Manager Cloud Control
    12.1`: an enterprise rule set and a private rule set. An `enterprise rule set`
    is meant to be used to implement your operational practices when it comes to managing
    events and incidents. All the actions we discussed earlier, such as creating an
    incident, sending a notification, and opening a ticket, are supported within an
    enterprise rule set type. Because these are actions that affect all types of incidents
    and problems, the user who creates these rule sets requires the `Rule Set` resource
    privilege. Once an enterprise type rule set is created, it is visible to all `Enterprise
    Manager` users. When you create a rule set, further development of that rule set
    can be done in a collaborative manner, so each rule set can basically have multiple
    authors (that is, multiple `Enterprise Manager` users) who can edit that particular
    rule set. A `private rule set`, on the other hand, is designed only to send e-mail
    notifications to yourself. As a result, no special privileges are required to
    create a private rule set.


    A rule set is defined as a set of one or more rules that are applied to a common
    set of objects such as targets (including groups) or jobs. Within a group, you
    can specify a set of heterogeneous targets (that is, a group of different target
    types) for a rule set to be applied to. The idea of a rule set is to enable you
    to logically combine different rules that relate to the same object into a single
    manageable unit. This is one of the enhancement requests that we have heard many
    times for notification rules in earlier releases, where administrators have often
    created multiple notification rules based on the target type that at the end of
    the day operate on the same group. Logically combining these rules into one unit
    is a natural progression from the earlier functionality to make it easier to track
    and manage these multiple rules.


    The rules within a particular rule set are executed in a specific order. By default,
    the rules are executed in the order they are created, but you can change that
    at any time. The rule sets themselves can also be executed in a specific order.
    Again, by default this is the order in which the rule sets are created, but that
    can be changed as well.


    Some out-of-the-box rule sets that are provided with `Enterprise Manager Cloud
    Control 12.1` automatically create incidents for what Oracle Corporation believes
    are meaningful events as well as automating event deletion. You can use these
    rule sets as is, but you can’t edit them. You can, however, create your own versions
    by using the `Create Like` functionality, and the originals can be disabled if
    they do not meet your requirements.


    Rules are part of rule sets. A `rule` is basically an instruction to `EM12c` that
    indicates how to automate actions when an event, incident, or problem occurs.
    Rules do not operate retroactively, so a rule operates on events, incidents, or
    problems that occur only after the rule is created.


    A rule consists of two parts: the criteria and the action. The `criteria` specify
    the events, incidents, or problems that the rule applies to. The `action` tells
    `EM12c` what operations you want it to perform on those specified events, incidents,
    or problems. Each operation, in turn, can have some additional conditions. Let’s
    look at a couple of examples of how this works:'
