    \ 主目录、OMS 主目录以及插件主目录之外的 Web 层（OHS）Oracle 主目录。应定期备份 OMS 文件系统以保存任何更改，例如补丁、更新或配置更改。使用\
    \ `exportconfig` 命令备份 OMS 实例主目录（`MW_HOME/gc_inst`），包括 WebLogic Server、Web 层和管理服务器。要创建实例和所有子组件的备份，请使用以下语法：\n\
    \n```\nemctl exportconfig oms [-sysman_pwd <sysman password>]\n     [-dir <backup\
    \ dir>]     指定存储备份文件的目录\n     [-oms_only]             指定在管理服务器主机上进行仅 OMS 的备份\n\
    \     [-keep_host]            指定如果未定义 slb 则备份主机名\n                           \
    \ （仅当将在响应此主机名的机器上执行恢复时才使用此选项）\n```\n\n以下示例将 OMS 配置备份到共享目录。将创建一个扩展名为 `.bka` 的归档文件。\n\
    \n```\n$ $OMS_HOME/bin/emctl exportconfig oms -sysman_pwd oracle12c -dir /mnt/backup\n\
    Oracle Enterprise Manager Cloud Control 12c Release 2\nCopyright (c) 1996, 2012\
    \ Oracle Corporation.  All rights reserved.\nExportConfig started...\nMachine\
    \ is Admin Server host. Performing Admin Server backup...\nExporting emoms properties...\n\
    Exporting secure properties...\nExporting configuration for pluggable modules...\n\
    Preparing archive file...\nBackup has been written to file: /mnt/backup/opf_ADMIN_20121104_224806.bka\n\
    \nThe export file contains sensitive data.\nPlease ensure that it is kept secure.\n\
    \nExportConfig completed successfully!\n```\n\n除了备份 OMS 配置外，还应执行 Oracle 清单和 `opatch\
    \ lsinventory –detail` 命令输出的备份。\n\n以下示例生成 `opatch` 清单输出并将其写入共享文件系统。\n\n```\n$OMS_HOME/OPatch/opatch\
    \ lsinventory –detail > /mnt/backups/opatch_bkup.log\n```\n\nOMS 的备份可以手动完成，也可以通过\
    \ Enterprise Manager Cloud Control 作业系统计划完成。\n\n## 管理代理备份\n\n管理代理是无状态的，因此不需要备份。相反，应为所有受监控的平台创建代理的参考金镜像。任何补丁和自定义设置都应包含在金配置中。如果管理代理丢失，应从参考金镜像安装。\n\
    \n## 恢复\n\n执行每个 Enterprise Manager Cloud Control 组件的定期备份很重要。然而，更重要的是在需要时能够成功恢复这些组件。Enterprise\
    \ Manager 的恢复可能需要恢复多个组件，包括存储库、管理服务和代理，具体取决于问题的性质。例如，在主机丢失的情况下恢复管理服务可能需要比将管理服务恢复到原始主机更多的步骤。你将在以下部分中研究这些场景。\n\
    \n## 存储库恢复\n\n如果 `OMS` 关闭，Cloud Control 控制台将不可用。要恢复存储库数据库，应使用 `RMAN` 命令行实用程序。使用\
    \ `RMAN`，你可以通过完全恢复或时间点恢复来恢复数据库（请参阅 `Oracle Database Backup and Recovery Guide`）。对于后者，你可能需要重新同步与存储库不同步的代理。要使用\
    \ `EMCTL` 重新同步代理，请使用以下语法：\n\n```\nemctl resync repos (-full|-agentlist \"agent\
    \ names\")\n[-name \"resync name\"]\n[-sysman_pwd \"sysman password\"]\n```\n\n\
    此命令应在管理存储库恢复之后且在启动 `OMS` 之前执行。\n\n在恢复存储库数据库后，使 Enterprise Manager Cloud Control\
    \ 运行所需的步骤将根据执行的是完全恢复还是不完全恢复，以及是在同一主机还是不同主机上执行恢复而有所不同。表 13-3 总结了不同恢复场景所需的步骤。在每种情况下，都应在停止\
    \ `OMS` 后恢复存储库数据库。\n\n表 13-3. OMS、存储库和代理的恢复场景\n\n![Table13-3](img/Table13-3.jpg)\n\
    \n每当在不同的主机上恢复存储库数据库时，都需要重新配置 `OMS`。这将新的数据库连接描述存储在 `OMS` 中。我们使用以下命令在 `OMS` 中重新配置存储库数据库：\n\
    \n```\nemctl config oms -store_repos_details (-repos_host <host> -repos_port <port>\
    \ -repos_sid\n<sid> | -repos_conndesc <connect descriptor>) -repos_user <username>\
    \ [-repos_pwd <pwd>]\n```\n\n按照以下步骤重新配置 `OMS`：\n\n1.  停止所有 `OMS`。\n\n    ```\n\
    \    emctl stop oms\n    ```\n\n2.  在每个 `OMS` 上重新配置存储库连接字符串。\n\n    ```\n    emctl\
    \ config oms -store_repos_details\n    ```\n\n    使用以下命令重新启动管理服务器和所有 `OMS`：\n\n\
    \    ```\n    emctl stop oms -all\n    emctl start oms\n    ```\n\n在不同的主机上恢复存储库还需要将管理存储库数据库目标重新定位到运行在新主机上的不同代理。这仅在主机上已存在代理且未由其发现任何其他数据库的情况下才可完成。使用以下语法将目标重新定位到新主机：\n\
    \n```\nemctl config repos [-sysman_pwd <sysman password>]\n      [-agent <new\
    \ agent>]    指定存储库目标的新目标代理\n      [-host <new host>]      指定存储库目标的新主机名\n     \
    \ [-oh <new oracle home>] 指定存储库目标的新 OracleHome\n      [-conn_desc [<jdbc connect\
    \ descriptor>]]\n                              如果指定了值，则使用该值更新连接描述符，\n        \
    \                      否则使用存储在 emoms.properties 中的值\n      [-ignore_timeskew]\
    \      忽略代理上的时间偏差\n```\n\n还应使用此命令更新 `OMS` 和存储库目标的监控配置：\n"
