  trans: '

    如果您在 `Oracle Enterprise Manager` 中拥有多个 `Exadata Database Machine`，可以通过 `Groups`
    框架从高级视图进行监控。利用此框架，您可以创建一个管理仪表板，跨多个 `Oracle` 工程系统及其组件，提供性能和用量指标的统一整合视图。


    ## 测试阶段


    当您将应用程序迁移或升级到 `Oracle` 工程系统时，需要考虑其对应用程序响应时间和吞吐量的任何潜在影响。此外，您需要理解所有依赖关系和可能影响应用程序的潜在风险，并计划在环境中进行全面测试，以缓解与迁移相关的这些风险。


    对于迁移到工程系统（如 `Oracle Exadata Database Machine`）的典型迁移和部署，您可以考虑以下三个步骤：


    1.  识别要迁移的应用程序。

    2.  创建测试环境。

    3.  验证应用程序性能。


    以下各节将介绍这些步骤。


    ## 识别要迁移的应用程序


    如第 5 章所述，`Oracle Enterprise Manager 整合规划器` 可用于帮助识别可能从整合中受益的资源。在考虑迁移到工程系统时，`整合规划器`
    也是一个有价值的工具。`EM12c` 收集的数据可用于帮助推导业务和技术需求，以验证向工程系统整合的计划。此外，`整合规划器` 可用于分析各种迁移或升级场景，并识别迁移前需要解决的应用程序问题。


    每个整合场景需要三个输入：


    *   整合前环境的详细信息

    *   技术、业务或合规性约束

    *   目标环境的详细信息


    ![image](img/sq.jpg) **注意** 如第 5 章所述，在创建整合项目时，您可以选择生成三个预配置的整合场景添加到项目中。这些开箱即用的场景代表了保守、激进和中等的整合方案。


    一旦您创建了一个用于将物理机移动到 `Exadata Database Machine` 的整合项目 (`P2P`)，就可以创建一个自定义场景来识别可能受整合影响的任何应用程序。为了创建场景，您必须使用
    `整合规划器`，它可从 `Enterprise` 菜单访问。打开 `整合规划器` 后，突出显示所需的 `P2P` 项目，然后单击 `创建场景` 菜单项，如图
    8-9 所示。这将打开 `创建场景向导` 以定义客户场景。


    ![9781430249382_Fig08-09.jpg](img/9781430249382_Fig08-09.jpg)

    图 8-9. 在 `Oracle 整合规划器` 中创建场景


    当 `创建场景向导` 启动时，场景的默认名称将类似于其关联项目的名称。


    `创建场景向导` 的第一步是 `资源`，如图 8-10 所示。在这里，您可以指定场景详细信息，例如名称和描述。您还可以指定资源需求。可以定义资源类型、适用日期、时间间隔以及用于估算资源需求的整合算法。提供所有资源需求后，单击
    `估算需求` 按钮以显示源服务器的需求。


    ![9781430249382_Fig08-10.jpg](img/9781430249382_Fig08-10.jpg)

    图 8-10. 在 `创建场景向导` 中定义资源


    在向导中进行时，您需要仅选择彼此兼容的服务器。兼容的服务器应整合在一起。在 `约束` 页面上，您可以选择指定服务器属性、服务器配置以及作为您整合计划中必需条件的条件。一旦指定了所有约束，`预览约束效果`
    选项将启用，您将能够看到任何不兼容的服务器。图 8-11 显示了已定义约束的 `约束` 页面。


    ![9781430249382_Fig08-11.jpg](img/9781430249382_Fig08-11.jpg)

    图 8-11. 在 `创建场景向导` 中指定约束


    单击 `预览约束效果` 按钮将打开一个对话框，显示与目标服务器不兼容的服务器，如图 8-12 所示。如果有任何不兼容的服务器，请调整约束直到没有不兼容项。


    ![9781430249382_Fig08-12.jpg](img/9781430249382_Fig08-12.jpg)

    图 8-12. 服务器的不兼容性


    解决任何不兼容性问题后，向导将带您进入 `目标规划` 页面。在这里，您可以识别整合的目标候选者。默认情况下，`Oracle Enterprise Manager`
    假设您希望整合到半机架的 `Exadata Database Machine`。`Exadata Database Machine` 还有其他选项，以及通用服务器，甚至使用现有服务器。坚持使用您的
    `Exadata Database Machine` 示例，我们选择一个全机架，如图 8-13 所示。在此页面上，您可以分配目标服务器的最大资源利用率。


    ![9781430249382_Fig08-13.jpg](img/9781430249382_Fig08-13.jpg)

    图 8-13. 在 `创建场景向导` 中为目标服务器设置选项


    选择计划的目标后，就可以将源服务器映射到目标服务器了。由于我们坚持使用 `Exadata Database Machine` 示例，`创建场景向导` 正在为我们使用自动映射（参见图
    8-14）。


    ![9781430249382_Fig08-14.jpg](img/9781430249382_Fig08-14.jpg)

    图 8-14. 在 `创建场景向导` 中映射服务器


    ![image](img/sq.jpg) **注意** 在 `目标规划` 页面上，如果您选择了 `使用现有服务器`，可以通过选择与源服务器对应的目标服务器列表来手动覆盖自动映射。


    在 `复查` 页面上，向导列出了在整个向导中选择的所有项目。此时，您有两个选项：可以将场景另存为模板，也可以提交它开始收集所需信息。场景提交后，`Oracle
    Enterprise Manager` 将给您确认消息，如图 8-15 所示。


    ![9781430249382_Fig08-15.jpg](img/9781430249382_Fig08-15.jpg)

    图 8-15. 提交确认


    场景作业完成后，`整合规划器` 将生成报告并推荐最优的整合计划。如图 8-16 所示，它还详细说明了整合的工作负载在目标服务器上的执行情况。


    ![9781430249382_Fig08-16.jpg](img/9781430249382_Fig08-16.jpg)

    图 8-16. `整合规划器` 针对该场景的输出

    '
- fmt: 'Just as `Consolidation Planner` is good for identifying how to consolidate
    physical resources to virtual ones, this valuable tool provides important information
    that can be helpful when considering moving physical servers to newer physical
    servers. Making a move to any engineered system by using `Consolidation Planner`
    can easily be scoped, identified, and executed with confidence.


    ## Creating a Test Environment


    After your scenario has completed running and yielded results that are acceptable,
    it is time to identify the applications to move and the details of the engineered
    system where the application will be moved to. You will need to create a test
    environment, which should mirror your target destination to some degree, to test
    and mitigate all potential risks associated with the migration.


    As in any testing environment, storing a lot of data can be expensive, so idea
    subsets of data should be used. Oracle has developed two approaches to this concern:
    the `Test Data Management Pack` and the `Oracle Application Testing Suite`.


    The `Test Data Management Pack` allows for data subsetting, data discovery, and
    modeling. The data subsetting functionality enables you to create a referentially
    intact subset of data on production, development, and test systems. Subsetting
    data for testing purposes makes testing easier by allowing you to select a percentage,
    1% or 5%, of data required.


    Other features in this pack enable you to do the following:


    *   Create/edit subset definitions

    *   Preview the subset details and space estimates

    *   Define and execute pre- and post-subset scripts

    *   Execute the subset definition across targets

    *   Export/import subset definitions


    The second option is the `Oracle Application Testing Suite`, which is an extension
    to `EM12c` and enables the same features as the `Test Data Management Pack`. The
    `Oracle Application Testing Suite` addresses all the same concerns and provides
    a complete suite to create the test environment and perform the tests as needed.


    ![image](images/sq.jpg) `Note` More information on `Oracle Application Testing
    Suite` can be found at `http://otn.oracle.com` under Enterprise Manager.


    As the complexity of applications increases, especially in shared computing environments
    such as the cloud, access to sensitive data increases. Access to this data, such
    as social security numbers, can be limited by masking it between environments.
    The `Oracle Data Masking Pack` replaces the original sensitive data with realistic-looking
    scrubbed data that has the same type of characteristics as the original. This
    enables organizations to share fully masked data and still be in compliance with
    both internal corporate governance and government regulations.


    The `Data Masking Pack` enables you to do the following:


    *   Create or use masking definitions

    *   Mask real application testing workloads

    *   Define format libraries for reuse

    *   Export/import masking templates

    *   Export/import format libraries


    `EM12c`, through the `Data Masking Pack`, introduced the ability to discover data
    dependency and modeling. This functionality allows you to discover data models
    and sensitive data in your environment so that you can protect them through data
    masking. Using Oracle’s `FAST` (Find, Assess, Secure, and Test) methodology to
    implement data masking, you can create a test environment on `Oracle Exadata`
    that has all the sensitive information masked before proceeding with the next
    step of validating the performance of the system.


    Additional data-masking features enable you to do the following:


    *   Create/edit application data models

    *   Manually define applications, schemas, and tables

    *   Use out-of-the-box metadata collection drivers for customer and packaged applications

    *   Define sensitive columns manually or by using sensitive column discovery

    *   Classify sensitive columns by sensitive types

    *   Define and manage sensitive types

    *   Export and import application data models

    *   Verify and associate definitions with multiple targets'
