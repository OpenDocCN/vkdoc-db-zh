  trans: "\n![9781430249382_Fig10-07.jpg](img/9781430249382_Fig10-07.jpg)\n\n图 10-7.\
    \ 修改后的开放游标指标扩展\n\n请注意，你可能希望获取到的不仅仅是单个具有开放游标的顶级会话——也许是前十个。为此，你需要将你的指标扩展转换为多行指标，这需要将一个或多个列作为键列。在这种情况下，你可以使用\
    \ `SID` 列作为键，然后修改查询以返回前十个会话。遗憾的是，在指标扩展的下一个版本中，你将无法添加键列，而是需要创建一个新的指标扩展。幸运的是，通过在指标扩展主页使用\
    \ `操作` ![arrow](img/arrow.jpg) `类似创建`，可以轻松克隆现有的指标扩展。请注意，创建新的指标扩展版本还有其他限制——例如，你不能移除或更改旧列的顺序，但可以更改显示名称。\n\
    \n尽管 `SID`（以及可以说 `SERIAL#`）对于键列来说已经足够，但请考虑在键中添加其他列。这样，告警通知就可以包含键值。默认的告警消息（在编辑指标扩展列时的高级设置中查看）如下所示：\n\
    \n*   %columnName% 的值对于 %keyValue% 来说是 %value%\n\n键值将由所有键通过逗号连接生成一个字符串，因此你的告警消息将如下所示：\n\
    \n*   对于会话 260,SYSMAN,em12c2.oracloid.com,OMS,oracle,1234，open_cursors_pct 的值是\
    \ 72\n\n你可以修改告警消息，使其更具描述性。例如，你的告警消息模板可以是这样的：\n\n*   会话 %keyValue%（SID，用户名，机器，程序，操作系统用户，进程）的开放游标百分比为\
    \ %value%\n\n从这条告警消息中，你立即就能看出哪些会话是问题所在。遗憾的是，目前无法引用指标的特定键列来使告警消息更用户友好。至少，我还没有找到方法。\n\
    \n到目前为止，你使用的是 SQL 适配器来收集指标。从 `12.1.0.2.0` 版本的 EM 开始，指标扩展提供了六个有文档记载的适配器，以及一个未记载的适配器。尽管你很可能主要会使用两个适配器（SQL\
    \ 适配器和 OS 命令—多列适配器），但为了获得更完整的概览，让我们回顾一下所有可用的适配器。\n\n### SQL 适配器\n\nSQL 适配器是你在前面的例子中使用的那个。因为你已经熟悉了它的基本功能，我们就只回顾一下它的附加选项。\n\
    \n如果你的 SQL 语句太长，你可能会倾向于上传一个 SQL 文件，而不是内联指定 SQL 代码。上传的 SQL 文件会随你的指标扩展一起分发到收集指标的代理上，然后由这些代理运行文件中的\
    \ SQL。\n\n如果你正在选择一组预定义的名称-值测量，你可以使用转置的结果，而不是创建一个两列的指标（名称作为键列，值作为数据列）。例如，假设你想使用代码清单\
    \ 10-3 中的查询来收集四个指标。你需要将第一列创建为键列。然而，你将无法控制列的命名，告警消息也只能是泛泛的。\n\n***代码清单 10-3***.\
    \ 用于收集物理读和写的 SQL 语句\n\n```sql\nselect name, value\n  from v$sysstat\n where name\
    \ in ('physical read total IO requests',\n                'physical read total\
    \ bytes',\n                'physical write total IO requests',\n             \
    \   'physical write total bytes')\n order by name;\n\nNAME                   \
    \               VALUE\n------------------------------------- -----------\nphysical\
    \ read total IO requests       2285653\nphysical read total bytes            \
    \ 21313147392\nphysical write total IO requests      1245633\nphysical write total\
    \ bytes            27849077248\n```\n\n注意，添加了 `ORDER BY` 子句是为了确保结果总是按相同顺序排列（在此例中，与\
    \ `IN` 列表中的顺序一致）。现在你只需要创建四个数据列，并且可以指定更具描述性的名称，比如*总物理读请求数*，以及自定义告警消息：\n\n*   总物理读请求数过高\
    \ - %value%（警告阈值为 %warning_threshold%，严重阈值为 %critical_threshold%）\n\n如本例所示，你可以在告警消息中包含阈值。\n\
    \n你也可以在 SQL 文本中指定绑定变量，而不是字面量。然而，这仅在你能动态生成变量值时才真正有用，而指标扩展在这方面并未提供太多灵活性（除了预定义变量，但它们作为\
    \ SQL 参数并不十分有用）。如果你最终遇到这种情况，最好重新设计并通过使用额外的键列将这些指标扩展合并成一个。但是，如果你有多个使用相同 SQL 但不同字面量的指标扩展，那么绑定变量就是可行的方法。\n\
    \n也可以使用返回游标（这正是高级属性中 `Out` 参数的用途）的 `PL/SQL` 块，而不是简单的 SQL。如果你需要使用动态 SQL 或根据某些条件（例如\
    \ Oracle 数据库版本或你提取数据的应用程序版本）以不同方式执行指标收集，这会很有用。\n\n最后一个例子也展示了指标扩展的一个重要限制：当处理需要基于先前多次收集进行额外处理的数据时（例如本例中使用的累积计数器），它们不是很有用。我们真正感兴趣的并不是数据库实例启动以来的\
    \ `IO` 请求总数，而是收集周期内的平均 `IO` 请求次数。尽管公式会非常简单（两个收集值之差除以收集间隔），但指标扩展没有提供计算此类比率的方法。当然，你可以使用\
    \ `PL/SQL` 块来存储先前收集的计数器并计算每个间隔的比率，但这并不简单，并且当你的测量实际上导致了数据库的变化时，会引入更显著的测量侵入。\n\n\
    无论你为指标扩展使用什么适配器，累积计数器的这个限制都存在。到目前为止，我们一直关注 SQL 适配器，但现在让我们看看其他选项。\n\n### OS 命令适配器\n\
    \n有三种 OS 命令适配器，你可能比 SQL 适配器使用得更频繁。OS 命令适配器之间的区别仅在于它们是否可以收集多列和多行：\n\n*   OS 命令—多列\n\
    *   OS 命令—单列\n*   OS 命令—多值\n\n所有三种 OS 命令适配器都有三个基本属性：`命令`、`脚本` 和 `参数`。代理基本上是执行命令行，连接这三个属性。事实上，你可以在单个\
    \ `命令` 属性中指定它们全部，所以我们不确定为什么要用三个属性，除了使属性更具可读性。你可以上传脚本（甚至多个脚本、程序和其他所需文件），然后在任何属性中使用\
    \ `%scriptsDir%` 替换变量来引用上传文件的位置——例如，`Script` 属性的 `%scriptsDir%/myscript.sh`。\n\
    \n我强烈建议使用 Perl 脚本来确保你的指标扩展是平台无关的。每个 Oracle Management Agent 都附带相同版本的 Perl，因此你不会依赖于服务器上安装了哪个\
    \ Perl 版本（如果有的话）。只需在命令属性中使用 `%perlBin%/Perl`，它将自动替换为 Oracle Management Agent 附带的\
    \ Perl 二进制文件的位置（通常是 `<AGENT_HOME>Perl/bin/Perl`）。\n"
- fmt: 'There are a couple of other ways to pass parameters other than on the command
    line. This is useful when you want to avoid a long command line or avoid handling
    different escaping rules that are platform dependent as well as to pass sensitive
    information such as credentials (because command-line arguments are easily visible
    to any user on many platforms). One way to pass arguments is by using environment
    variables. An agent sets the environment variable before calling the OS command,
    and the program or script can read that variable during executions. An even better
    way of passing parameters is by using standard input that is then parsed by the
    program. Oracle refers to that mechanism as `input properties`. The latter is
    the most secure way to pass credentials to the script, because even environment
    variables for a process can be retrieved easily on some platforms.


    **Note** For more details on environment variables and input properties, refer
    to the `Oracle Enterprise Manager Cloud Control 12c Administrator’s Guide` ([Chapter
    8](#9781430249382_Ch08.xhtml), “Metric Extensions,” Section 8.4).


    ## Credentials for OS Command Adapters


    OS Command adapters have two sets of credentials: host credentials and input credentials.
    `Host credentials` are used to log in to the server running an agent for the target
    type. By default, an OS Command adapter uses default monitoring credentials—the
    credential used to collect the pre-defined metrics of a target. However, you can
    choose to create your own host credential sets and then set credentials for the
    targets where you plan to deploy your metric extensions. For example, you might
    need to run your collection scripts as a special OS user (for example, `ROOT`
    or another application user other than the one running the agent itself). Note
    that the SQL adapter has the same capability, so you can define a custom database
    credential set to run as a different database user than the default monitoring
    user (for example, `DBSNMP`).


    Input credentials are the second type of credentials that can be defined. These
    credentials are totally independent of host credentials and are passed to the
    program or script being executed using standard input just like `input properties`.
    The advantage of `input credentials` is that you can set them independent of the
    metric extension definition. If different targets require different credentials,
    users of the metric extension can easily define credentials without the need to
    create a unique metric extension with various passwords hard-coded, which is what
    you would need to do if using `input properties` for passing credentials.


    **Note** An example of using `input credentials` can be seen in the `Oracle Enterprise
    Manager Cloud Control 12c Administrator’s Guide` ([Chapter 8](#9781430249382_Ch08.xhtml),
    “Metric Extensions,” Section 8.4.1).


    ## OS Command—Multiple Columns Adapter


    Now let’s look at each of the OS Command adapters.


    The OS Command—Multiple Columns adapter is the one that you will likely be using
    most often. The output from the command is parsed by the adapter so that each
    line is a single row, and then each line itself is tokenized into multiple values.
    The adapter splits lines correctly, whether the end of line is marked in Unix-like
    format (single `LF`) or Windows (`CR+LF`).


    The adapter allows the use of a “Start With” prefix to filter out the lines of
    output that do not contain metrics. This is a good practice, preventing potential
    output noise from interfering—for instance, warnings that you didn’t expect or
    just want to ignore. The widely accepted standard for the prefix is `em_result=`.
    [Listing 10-4](#9781430249382_Ch10.xhtml#list4) shows an example of output.


    ***[Listing 10-4](#9781430249382_Ch10.xhtml#_list4)***. Sample Output from OS
    Command Using the `em_result=` Prefix


    ```

    em_result=<metrics line 1>

    This line is ignored

    em_result=<metrics line 2>

    If em_result= is not at the start of the line, it''s ignored too

    em_result=<metrics line 3>

    ```


    Note that leading and trailing spaces in the prefix are significant and are not
    truncated.


    ### Handling Delimiters and Spaces


    The content of the line after the prefix is then tokenized into columns by using
    a simple delimiter string. The default (and commonly used) delimiter is the pipe
    symbol (`|`). However, if your column content might contain that character, you
    can use any other delimiter and even a multicharacter string to make it truly
    unique, such as `{=-DELIMITER-=}` so that a line like this is parsed correctly
    into three values:


    ```

    em_result=Some common separators are | , % ;{=-DELIMITER-=}123{=-DELIMITER-=}456

    ```


    Spaces have a special meaning in the delimiter strings. First, the leading and
    trailing spaces are truncated and ignored. The rest of the spaces seem to be splitting
    the delimiter string into multiple delimiters, but they are applied very inconsistently,
    so it’s difficult to predict the end result. I’ve tried to create a delimiter
    to parse lines with comma-separated values and optionally enclosed in double quotes,
    but I couldn’t come up with a reliable delimiter string. I suspect the code simply
    never was meant to deal with spaces in the delimiter. The documentation says nothing
    about handling spaces, and their handling seems to be unreliable, so I strongly
    recommend avoiding spaces in your delimiter strings at this point.


    One final note about spaces: the spaces in the collected values are not truncated
    when they are stored in the repository. However, the EM user interface displays
    them with leading and trailing spaces truncated. If you are setting conditions
    on the text columns such as `CONTAINS`, then leading and trailing spaces are significant
    in both condition strings and collected metric values, so be careful. I recommend
    avoiding leading and trailing spaces, if possible, because you don’t see them
    in the user interface, but they are there. (Just check the repository view `MGMT$METRIC_CURRENT`,
    for example.)


    ### Data Columns vs. Key Columns


    When defining adapters, you need to define named columns and their attributes.
    You already went through the preceding examples, so let’s just touch on the distinction
    between data columns and key columns.


    `Data columns` are really the metric values you want to collect. For example,
    you might want to monitor the size of a staging directory in which files are loaded
    for subsequent processing. The total size of the files in that directory is the
    metric you want to calculate—that would be one data column. You might also want
    to calculate the total number of files in the staging directory—that’s another
    data column. For each of those data columns, you might want to define a comparison
    operator. In this case, you will most likely want to select the more-than (`>`)
    alert condition so you can generate warnings and errors when the size or number
    of files in the staging directory grows beyond the predefined threshold. Note
    that it’s important to select the right operator during metric development. The
    thresholds themselves are optional and can be customized by metric extension users
    for each target. However, the operators can be changed only by the metric extension
    author, and changing them requires creating a new version of the metric extension.'
