    Enterprise Manager Cloud Control 12c为数据库、应用程序和硬件提供了完整的基础设施管理解决方案。在企业中拥有如此关键的组件，自然会引发对冗余和高可用性的担忧。如果配置中确实出现问题，恢复应以最短的时间进行，从而将对企业的可管理性和监控的干扰降至最低。维护也是必需的，需要为Enterprise\
    \ Manager软件组件（即数据库、管理服务、代理和操作系统）打补丁。正是考虑到这些担忧，Oracle Enterprise Manager被设计为通过使用不同的高可用性机制来满足期望的服务和操作级别。\n\
    \n## 高可用性\n\nEnterprise Manager架构中的每个组件都应具有高可用性，以实现完整的高可用配置。需要考虑的主要组件如[图13-1](#9781430249382_Ch13.xhtml#Fig1)所示，如下：\n\
    \n*   `Management Agent`：在目标上运行，与`OMS`通信并发送指标。\n*   `Management Server`：Enterprise\
    \ Manager的核心，提供`Management Services`。\n*   `Repository`：在Oracle数据库中存储来自监控目标的持久数据。\n\
    *   `Software Library`：存储用于修补、配置以及代理和插件部署的文件。\n\n![9781430249382_Fig13-01.jpg](images/9781430249382_Fig13-01.jpg)\n\
    \n[图13-1](#9781430249382_Ch13.xhtml#_Fig1) .  Enterprise Manager Cloud Control\
    \ 12c 架构\n\n可以为每个组件配置不同级别的复杂性和成本的不同级别的高可用性。在考虑高可用性要求时，应在成本、复杂性、性能和数据丢失方面做出最小的权衡。通常，复杂性和高可用性级别是成比例的。\n\
    \n`Oracle Management Agent`应配置为开机启动。这确保了在服务器重启后不需要手动干预，并能在服务中断后快速启用目标监控。在Unix和Linux操作系统上，一个名为`gcstartup`的脚本被放置在`/etc/init.d`中，并在特定的运行级别下运行。在Microsoft\
    \ Windows上，会创建一个服务以在启动时自动启动。\n\nOracle为Enterprise Manager Cloud Control定义了四个高可用性级别。这些级别在[表13-1](#9781430249382_Ch13.xhtml#Tab1)中进行了总结。本章仅涵盖级别1到3。\n\
    \n[表13-1](#9781430249382_Ch13.xhtml#_Tab1). Enterprise Manager 高可用性级别\n\n![Table13-1.jpg](images/Table13-1.jpg)\n\
    \n### Oracle Management Agent\n\n`Oracle Management Agent`负责发送其安装主机的指标和待处理警报。为了提供高可用性，应为代理启用以下功能：\n\
    \n*   启用代理在操作系统启动时自动启动。这应在运行`root.sh`脚本后自动配置。\n*   在冗余存储上安装代理。这包括配置了RAID的存储后端。\n\
    *   为代理看门狗进程配置重启参数。看门狗进程负责基于以下环境变量重启代理：\n    ```\n    EM_MAX_RETRIES  表示看门狗进程在\
    \ `EM_MAX_RETRY_WINDOW` 内尝试重启代理的最大次数。默认设置为 3。\n    EM_RETRY_WINDOW  表示与 `EM_MAX_RETRIES`\
    \ 一起使用的时间间隔，用于在尝试启动管理代理之前进行等待。默认设置为 600 秒。\n    ```\n\n安装Enterprise Manager代理后，应执行`<AGENT_HOME>/root.sh`脚本。这将在Linux和某些Unix操作系统上创建以下控制管理代理启动的脚本：\n\
    \n*   `/etc/init.d/gcstartup`\n*   `/etc/init/gcstartup`\n*   `/etc/rc.d/init.d/gcstartup`\n\
    \n如果这些文件不存在，请确保已执行`<AGENT_HOME>/root.sh`脚本。\n\n代理的丢失或损坏将导致其关联目标的监控和指标数据上传丢失。同样，如果代理关闭，目标将无法与管理服务器通信，导致可管理性丧失。\n\
