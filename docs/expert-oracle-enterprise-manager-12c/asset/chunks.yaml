    [Figure 2-17](#9781430249382_Ch02.xhtml#_Fig17). Recovery options


    8.  For the Database Content step, shown in [Figure 2-18](#9781430249382_Ch02.xhtml#Fig18),
    deselect all components, because you do not need them for the repository database.
    Then click the Standard Database Components button.


    ![9781430249382_Fig02-18.jpg](images/9781430249382_Fig02-18.jpg)


    [Figure 2-18](#9781430249382_Ch02.xhtml#_Fig18). Database content


    9.  In the Standard Database Components dialog box, deselect Oracle Multimedia
    and Oracle Application Express, as shown in [Figure 2-19](#9781430249382_Ch02.xhtml#Fig19).
    Click OK to close the dialog box and then click Next to advance to the next step.


    ![9781430249382_Fig02-19.jpg](images/9781430249382_Fig02-19.jpg)


    [Figure 2-19](#9781430249382_Ch02.xhtml#_Fig19). Standard database components


    10.  While setting the memory (see [Figure 2-20](#9781430249382_Ch02.xhtml#Fig20)),
    ensure that total memory (SGA_max_size + PGA_aggregate_target) set for the database
    will not exceed 75 percent of the total physical memory of the system. Otherwise,
    the system will start using the swap device. We recommendthat you do not use the
    memory_target parameter with Enterprise Manager. Next click the Character Sets
    tab.


    ![9781430249382_Fig02-20.jpg](images/9781430249382_Fig02-20.jpg)


    [Figure 2-20](#9781430249382_Ch02.xhtml#_Fig20). Memory parameters


