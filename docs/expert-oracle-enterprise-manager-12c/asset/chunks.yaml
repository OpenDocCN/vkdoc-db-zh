    and then an agent can use very effective collection mechanisms. Unlike using shell
    script-based metrics, DMS fetchlet collectors don’t fork any processes, so it’s
    very effective in terms of resource consumption. The DMS API was submitted to
    the Java Community Process in 2001 as Java Specification Request 138: Performance
    Metric Instrumentation. However, it wasn’t widely adopted in the industry and
    was withdrawn in 2010.'
  trans: '

    请注意，模式被定义为从分层的 XML 结构中提取行，因为指标接受的是值表格。每个值是一个数字或字符串，因此无法返回和处理复杂类型。你需要将数据集合扁平化。


    *   `REST fetchlet`：此组件提供了从 RESTful 数据源收集数据的方法。它支持`GET`和`POST` HTTP 方法以及基本身份验证。响应格式可以是`XML`或`JavaScript
    对象表示法`（`JSON`），并可以通过使用`XPath`或`JSONPath`转换为用于指标的表格化呈现。同时支持`HTTPS`。

    *   `URL Timing fetchlet`：这是一种用于测试 Web 应用程序性能的有用收集机制。它支持简单的代理，并可用于`HTTP`和`HTTPS`协议。该
    fetchlet 支持`HTTP`的基本身份验证。它具备定义连接超时和重试次数的能力，并且在配置所收集的指标方面非常灵活。该 fetchlet 可以接受多个
    URL。对于每个 URL，它不仅获取页面本身，还获取页面所需的任何内容，如图像、样式表等。它可以提供每个 URL 或每个 URL 的详细统计信息。有几十个统计指标，从明显的如接收的总字节数和检索页面的总时间，到高级统计如`DNS`解析时间或每个请求接收第一个字节前的平均时间。

    *   `JDBC fetchlet`：此组件与`URL Timing fetchlet`类似，因为它收集针对任何支持`JDBC`连接的数据库执行指定 SQL
    语句的时间信息。它收集诸如请求状态、总时间、检索行数等指标，以及更精细的计时指标，如独立的连接时间和获取时间。遗憾的是，这个`JDBC fetchlet`不返回`SELECT`命令执行结果所检索到的值。为了更好地反映其目的，将其称为`JDBC
    Timing fetchlet`可能更合适，但 Oracle 可扩展性文档并非如此命名。

    *   `Web Services and JMX fetchlets`：这些组件提供了使用 Web 服务或 Java 管理扩展（`JMX`）来检索数据的机制。两者都是被广泛采用的行业标准。Web
    服务是一种通用的分布式消息传递和远程执行标准，而`JMX`是专门为 Java 应用程序可管理性设计的标准。虽然每个 Java 虚拟机（`JVM`）实现通常都支持`JMX`，但应用程序需要进行插桩，以便将其指标报告给`JVM`，从而使监控工具能够访问这些指标。Oracle
    的应用服务器支持`JMX`，许多其他软件产品如 IBM WebSphere 和 Red Hat JBoss 也同样支持。许多 Apache 项目也支持`JMX`——例如
    Apache Tomcat 或 Hadoop 生态系统中的 Apache ZooKeeper。事实上，Hadoop 的核心组件`NameNode`和`JobTracker`都进行了插桩，以便通过`JMX`暴露其运行时指标。*可扩展性程序员参考手册*的第
    20 章详细介绍了如何基于 Web 服务和`JMX`创建新的目标类型。

    *   `WBEM fetchlet`：此收集器用于从支持基于 Web 的企业管理（`WBEM`）标准的组件检索指标。该标准在业界被广泛采用，并得到许多开源和专有软件的支持。`WBEM`标准比过时的`SNMP`协议先进得多，因为它包含所有元数据、更安全，并且在不同供应商之间兼容性更好。`WBEM
    fetchlet`本质上是一个通用信息模型（`CIM`）客户端，它连接到`CIM 对象管理器`（`CIMOM`），通常称为`CIM 服务器`。Windows
    管理接口（`WMI`）是微软对`WBEM/CIM`的实现。`CIMOM`服务器可以嵌入在设备或服务器中（例如某些 Cisco 设备或 Windows 或 HP-UX）。


    此外，还有一个与`WBEM fetchlet`相似的`WS-Management fetchlet`，但它基于`WS-Management`标准。微软 Windows
    远程管理（`WinRM`）就是`WS-Management`实现的一个例子。

    *   `DMS Fetchlet`：此收集器允许使用动态监控服务（例如，在 Oracle 应用服务器和融合中间件中实现）。它允许应用程序进行插桩，以通过`DMS`展示运行时指标，然后代理可以使用非常高效的收集机制。与基于
    Shell 脚本的指标不同，`DMS fetchlet`收集器不会派生任何进程，因此在资源消耗方面非常高效。`DMS API`于 2001 年作为 Java
    规范请求 138：性能指标插桩提交给了 Java 社区进程。然而，它并未在业界广泛采用，并于 2010 年被撤回。

