    work, Oracle provides two command-line tools that you need to become familiar
    with:


    *   *Enterprise Manager Command Line Interface (EMCLI)*: This tool is largely
    used for scripting operations that might need to be repeated. It is a tool often
    used by consulting companies that make a business out of configuring EM12c, who
    thus have a need to execute the same operations repeatedly across different customers.
    EMCLI can be installed on any computer (not necessarily the OMS or OMR) simply
    by downloading the tool via the Cloud Control Setup menu and then following the
    installation instructions. Not all operations that can be performed through the
    GUI can be performed with EMCLI, however.

    *   *Enterprise Manager Control (EMCTL)*: This utility is used for a variety of
    tasks, the most important of which are starting, stopping, and checking the status
    of the OMS, agent, and Cloud Control itself. It is also used to secure/unsecure
    agents and the OMS, starting and stopping blackouts and other operations.


    Repository Users


    In terms of database users, the most important user in an EM12c installation is
    the SYSMAN user. The SYSMAN user has been around for a number of releases now.
    It is basically the owner of the database schema containing the repository. In
    many ways, it is akin to the SYS user in an Oracle database, and as such, should
    not be used apart from the first time you create another Super Administrator account
    (see [Chapter 4](#9781430249382_Ch04.xhtml) for more details on Super Administrator
    accounts).


    Apart from the SYSMAN account, other database users are created in the repository
    during repository creation or upgrade. These include the following:


    *   CLOUD_ENGINE_USER and CLOUD_SWLIB_USER are used to perform cloud operations.

    *   MGMT_VIEW is used for report generation.

    *   SYSMAN_APM, SYSMAN_MDS, and SYSMAN_OPSS are metadata schemas for Fusion Middleware
    components.

    *   SYSMAN_BIP is used for Business Intelligence (BI) Publisher integration.

    *   SYSMAN_RO is a general-purpose, read-only user.


    Not much detail is provided in the Oracle documentation on these accounts. Suffice
    it to say, though, that these are all special accounts that you should not drop.
    Nor should you change their passwords.


    Repository Views


    Information about administrators, targets, metrics, blackouts, and jobs is all
    kept in the Oracle Management Repository in a group of repository views. Although
    the information in these views is obviously used by the Cloud Control console
    to display that information to you, it can also be used in other ways, primarily
    by a programmer building extensibility on top of the Enterprise Manager product.
    As a plug-in developer, for example, you may want to extend Enterprise Manager
    to manage your own, custom-developed targets, or indeed expand on the target types
    that Oracle provides out of the box. You may also want to write your own scripts
    to query historical data from these views, or build your own custom reports to
    run from SQL Developer or other products. Clearly, a chapter on the Enterprise
    Manager architecture is not the place to drill into gory details on how to do
    all these things, but it is worthwhile to understand what these repository views
    are and how to find more information about them.'
  trans: '

    # EM12c 版本包含多项与软件库相关的新功能：


    *   在此版本中，**软件库**成为更多实体的单一存放位置，例如指令和程序集。（这些新实体在第 5 章中有解释。）其中许多实体能够自我更新，因此我们现在与
    `Self Update` 实现了集成。

    *   Oracle 还扩展了存储类型的支持，因此现在支持 `NFS` 文件系统在 `OMS` 之间共享，以及任何我们可以访问的文件系统（即，代理文件系统现在也可用于托管软件库）。

    *   软件库现在支持**引用位置**。因此，如果您有一个用于提供这些实体的集中式位置，且该位置独立于 `OMS`，您现在可以通过 `HTTP`、`NFS`
    等方式引用它们。在这种情况下，`OMS` 存储有关此引用位置的元数据，而软件位（bits）则存储在外部。

    *   此版本还包含一系列其他功能。例如，您可以将支持说明或自述文件附加到软件库实体。该库包含改进的搜索功能，当然，新的权限模型允许使用细粒度权限进行实体访问。


    ## 管理工具


    那么现在，您可能要问了：“好吧，那 Oracle 的其他那些管理工具呢？” 通常你会发现，人们对所有这些工具是什么、如何区分它们，当然还有何时使用哪一个，都存在一定程度的混淆。我们现在就花些时间来讨论一下。


    首先，`Cloud Control` 与其他 Oracle 管理工具（如 `Database Control (DB Control)` 和 `Fusion
    Middleware Control (FMW Control)`）的主要区别在于架构。`Cloud Control` 设计用于管理整个数据中心，因此它拥有比其他工具健壮得多的多层架构。


    其次，其他管理工具是简化版工具，通常一次只能连接到单一环境，而不是提供更广泛的数据中心级别的环境视图。例如，`DB Control` 一次只能连接到一个 Oracle
    数据库。如果您想使用 `DB Control` 来管理或监控另一个 Oracle 数据库，必须先断开与原始数据库的连接，然后才能连接到新的数据库。事实上，如果您不这样做，Oracle
    会自动为您断开连接。


    最后，不同工具之间存在一些不兼容性。例如，当您使用 `Database Configuration Assistant (DBCA)` 创建 Oracle
    数据库时，系统会询问您是否希望数据库被集中管理（通过 `EM12c`）还是本地管理（通过 `DB Control`）。这是一个二选一的决定；您不能两者都选。这种不兼容性在
    `OMR` 上达到了顶峰。当您安装 `EM12c` 时，系统会提示您指定库的位置。（安装程序不会为您创建数据库；它只是提示您指向环境中某个现有 Oracle
    数据库的位置。）如果您指向的数据库已被 `DBCA` 配置为由 `DB Control` 本地管理，安装程序实际上会报错，指出该数据库已经是本地管理的。（安装程序确实会为您提供删除
    `DB Control` 配置的命令（如果您选择这样做），但实际上不会为您执行该命令。）


    最后需要说明的是，在撰写本章时，Oracle 已宣布 `DB Control` 将在 11.2 之后的数据库版本中停止支持。尽管我们尚不清楚新产品将叫什么名字，但
    Oracle 指出：“在未来的 Oracle 数据库版本中，基本的数据库管理将通过一个简化的管理工具提供，而广泛的管理功能将通过从 Oracle Enterprise
    Manager Cloud Control 部署的最新 Oracle 数据库插件实现”（详情请参见 My Oracle Support 上的 Note 1484775.1）。


    ## 命令行工具


    除了大多数 `EM12c` 用户用于日常工作的 `GUI` 外，Oracle 还提供了两个您需要熟悉的命令行工具：


    *   `Enterprise Manager Command Line Interface (EMCLI)`：此工具主要用于可能需要重复执行的脚本操作。它是一家咨询公司常用的工具，这些公司以配置
    `EM12c` 为业务，因此需要跨不同客户重复执行相同的操作。`EMCLI` 可以安装在任何计算机上（不一定是 `OMS` 或 `OMR`），只需通过 `Cloud
    Control` 的“设置”菜单下载该工具，然后按照安装说明操作即可。然而，并非所有可以通过 `GUI` 执行的操作都能通过 `EMCLI` 完成。

    *   `Enterprise Manager Control (EMCTL)`：此实用程序用于执行各种任务，其中最重要的是启动、停止和检查 `OMS`、代理以及
    `Cloud Control` 本身的状态。它还用于保护/取消保护代理和 `OMS`，启动和停止维护窗口以及其他操作。


    ## 库用户


    就数据库用户而言，`EM12c` 安装中最重要的用户是 `SYSMAN` 用户。`SYSMAN` 用户已经存在多个版本了。它基本上是包含库的数据库模式的所有者。在许多方面，它类似于
    Oracle 数据库中的 `SYS` 用户，因此，除了在第一次创建另一个超级管理员帐户时使用外，不应再使用它（有关超级管理员帐户的更多详细信息，请参见第 4
    章）。


    除了 `SYSMAN` 帐户外，在库创建或升级期间，库中还会创建其他数据库用户。这些包括：


    *   `CLOUD_ENGINE_USER` 和 `CLOUD_SWLIB_USER` 用于执行云操作。

    *   `MGMT_VIEW` 用于生成报告。

    *   `SYSMAN_APM`、`SYSMAN_MDS` 和 `SYSMAN_OPSS` 是 Fusion Middleware 组件的元数据模式。

    *   `SYSMAN_BIP` 用于商业智能 (`BI`) Publisher 集成。

    *   `SYSMAN_RO` 是一个通用的只读用户。


    Oracle 文档中对这些帐户提供的细节不多。但可以说，这些都是特殊帐户，您不应删除它们，也不应更改它们的密码。


    ## 库视图


    有关管理员、目标、指标、维护窗口和作业的信息都存储在 Oracle 管理库的一组库视图中。尽管这些视图中的信息显然被 `Cloud Control` 控制台用来向您显示信息，但它也可以用于其他用途，主要是由在
    Enterprise Manager 产品之上构建可扩展性的程序员使用。例如，作为插件开发人员，您可能希望扩展 Enterprise Manager 以管理您自己定制开发的目标，或者确实扩展
    Oracle 开箱即用的目标类型。您可能还想编写自己的脚本来从这些视图中查询历史数据，或者构建自己的自定义报告，以便从 `SQL Developer` 或其他产品中运行。显然，关于
    Enterprise Manager 架构的章节不是深入探讨如何完成所有这些事情的细节的地方，但了解这些库视图是什么以及如何找到有关它们的更多信息是值得的。

