- fmt: "# Agent Deployment is Completed\n\nAgent deployment is completed (see [Figure\
    \ 2-44](#9781430249382_Ch02.xhtml#Fig44)). Now you can add non-host targets that\
    \ are on this server (such as Oracle Database) to the Enterprise Manager system.\n\
    \n![9781430249382_Fig02-44.jpg](images/9781430249382_Fig02-44.jpg)\n\n[Figure\
    \ 2-44](#9781430249382_Ch02.xhtml#_Fig44). Agent deployment summary\n\nAs mentioned\
    \ before, the Add Host Targets Wizard is the recommended way to deploy agents.\
    \ However, if your target hosts do not have SSH service enabled, or if you want\
    \ to delegate agent installation to system administrators, you may use other methods\
    \ such as creating an RPM package of agents, or using AgentPull or agentDeploy\
    \ scripts.\n\n## Using RPM\n\nThis section outlines the process for deploying\
    \ the agent via RPM. Follow these steps:\n\n1.  To be able to create RPM packages,\
    \ you need to create the directory `/usr/lib/oracle` on the OMS server, if it\
    \ doesn’t exist already. Log in as the ROOT user and run the following commands:\n\
    \n    ```\n    [root@cloudcontrol12 ∼]# mkdir /usr/lib/oracle\n    [root@cloudcontrol12\
    \ ∼]# chmod 777 /usr/lib/oracle\n    ```\n\n2.  Install the `rpm-build` package\
    \ on the OMS host:\n\n    ```\n    [root@cloudcontrol12 ∼]# yum install rpm-build\n\
    \    ```\n\n3.  Log in to the OMS host as the ORACLE user, and log in to the OMS\
    \ using `emcli`:\n\n    ```\n    [oracle@cloudcontrol12 ∼]$ /u01/app/Middleware/oms/bin/emcli\
    \ login -username=sysman\n    ```\n\n    ![image](images/sq.jpg) **Note**  The\
    \ user `SYSMAN` is the default Super Administrator account of Oracle Enterprise\
    \ Manager.\n\n4.  Synchronize `emcli`:\n\n    ```\n    [oracle@cloudcontrol12\
    \ ∼]$ /u01/app/Middleware/oms/bin/emcli sync\n    ```\n\n5.  List the platforms\
    \ for which the management agent software is available on the OMS host:\n\n  \
    \  ```\n    [oracle@cloudcontrol12 ∼]$ /u01/app/Middleware/oms/bin/emcli get_supported_platforms\n\
    \    Getting list of platforms ...\n    Check the logs at /u01/app/Middleware/gc_inst/em/EMGC_OMS1/sysman/emcli/setup/.emcli/agent.log\n\
    \    About to access self-update code path to retrieve the platforms list..\n\
    \    Getting Platforms list  ...\n    -----------------------------------------------\n\
    \    Version = 12.1.0.2.0\n    Platform = Linux x86-64\n    -----------------------------------------------\n\
    \    Platforms list displayed successfully.\n    ```\n\n6.  As you see, only the\
    \ Linux x64 agent is available right now. You can always download additional agents\
    \ by using the Self Update screen of Enterprise Manager.\n7.  Issue the following\
    \ command to create and download the RPM file of the management agent from the\
    \ Oracle Software Library to a directory on the OMS host:\n\n    ```\n    [oracle@cloudcontrol12\
    \ ∼]$ /u01/app/Middleware/oms/bin/emcli get_agentimage_rpm \\\n    -destination=/home/oracle\
    \ -platform=\"Linux x86-64\" -version=12.1.0.2.0\n    ...\n    Agent Image copied\
    \ successfully...\n    Creation of RPM started...\n    RPM creation successful.\n\
    \    Agent image to rpm conversion completed successfully\n    ```\n\n8.  You\
    \ can copy the RPM put in the `/home/oracle` directory on the OMS server to the\
    \ target system in order to deploy the agent. We assume that you have already\
    \ created a user for the agent on the target system. If you installed the `oracle-validated`\
    \ package on the target system, the ORACLE user and OINSTALL group are already\
    \ created.\n\n    ```\n    [oracle@cloudcontrol12 ∼]$ scp oracle-agt-12.1.0.2.0-1.0.x86_64.rpm\
    \ \\\n    oracle@target.testdomain.com:/home/oracle/\n    oracle@target.testdomain.com's\
    \ password:\n    oracle-agt-12.1.0.2.0-1.0.x86_64.rpm           59%  133MB  15.4MB/s  \
    \ 00:05 ETA\n    ```\n\n9.  Log in as ROOT on the target system and install the\
    \ RPM:\n\n    ```\n    [root@target ∼]# cd /home/oracle\n    [root@target ∼]#\
    \ rpm –i oracle-agt-12.1.0.2.0-1.0.x86_64.rpm\n    ```\n\n10. Now you need to\
    \ edit the `/usr/lib/oracle/agent/agent.properties` file according to your Enterprise\
    \ Manager installation and run `/etc/init.d/oracle-agt`:\n\n    ```\n    [root@target\
    \ ∼]# vi /usr/lib/oracle/agent/agent.properties\n    OMS_HOST=cloudcontrol12.testdomain.com\n\
    \    OMS_PORT=7799\n    AGENT_REGISTRATION_PASSWORD=<registration_password>\n\
    \    AGENT_USERNAME=oracle\n    AGENT_GROUP=oinstall\n    AGENT_PORT=3872\n  \
    \  ORACLE_HOSTNAME=target.testdomain.com\n    [root@target ∼]# /etc/init.d/oracle-agt\
    \ RESPONSE_FILE=/usr/lib/oracle/agent/agent.properties\n    ```\n\n11. Check whether\
    \ the agent is up:\n\n    ```\n    [oracle@target ∼]$ /usr/lib/oracle/agent/core/12.1.0.2.0/bin/emctl\
    \ status agent\n    Oracle Enterprise Manager Cloud Control 12c Release 2\n  \
    \  Copyright (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n    ---------------------------------------------------------------\n\
    \    Agent Version     : 12.1.0.2.0\n    OMS Version       : 12.1.0.2.0\n    Protocol\
    \ Version  : 12.1.0.1.0\n    Agent Home        : /usr/lib/oracle/agent/agent_inst\n\
    \    Agent Binaries    : /usr/lib/oracle/agent/core/12.1.0.2.0\n    Agent Process\
    \ ID  : 5323\n    Parent Process ID : 5283\n    Agent URL         : https://target.testdomain.com:3872/emd/main/\n\
    \    Repository URL    : https://cloudcontrol12.testdomain.com:4900/empbs/upload\n\
    \    Started at        : 2012-10-12 03:44:47\n    Started by user   : oracle\n\
    \    Last Reload       : (none)\n    Last successful upload                  \
    \     : 2012-10-12 03:47:06\n    Last attempted upload                       \
    \ : 2012-10-12 03:47:06\n    Total Megabytes of XML files uploaded so far : 0.01\n\
    \    Number of XML files pending upload           : 0\n    Size of XML files pending\
    \ upload(MB)         : 0\n    Available disk space on upload filesystem    : 91.52%\n\
    \    Collection Status                            : Collections enabled\n    Heartbeat\
    \ Status                             : Ok\n    Last attempted heartbeat to OMS\
    \              : 2012-10-12 03:47:00\n    Last successful heartbeat to OMS   \
