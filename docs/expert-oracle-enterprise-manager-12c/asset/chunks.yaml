    \ yum:\n\n```\n[root@repositorydb ∼]# yum install oracle-validated\n```\n\nFor\
    \ Oracle Linux 6, you need to install the oracle-rdbms-server-11gR2-preinstall\
    \ package instead of the oracle-validated package:\n\n```\n[root@repositorydb\
    \ ∼]# yum install oracle-rdbms-server-11gR2-preinstall\n```\n\nYou can also manually\
    \ download the oracle-validated package for Red Hat Enterprise Linux 5 from the\
    \ following link: [https://oss.oracle.com/el5/oracle-validated/](https://oss.oracle.com/el5/oracle-validated/).\n\
    \nAfter you install oracle-validated, you need to set the password for the ORACLE\
    \ user. Be sure that you also set up YUM and install the oracle-validated package\
    \ for the OMS server.\n\nCreating Oracle User and Groups\n\nIf you do not want\
