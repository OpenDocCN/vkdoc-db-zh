- fmt: 'Now that we''ve covered the options for installing Enterprise Manager Cloud
    Control 12c, including agent deployment, it''s time to look at what you need to
    do to maintain your EM infrastructure. As discussed in [Chapter 1](#9781430249382_Ch01.xhtml),
    Enterprise Manager is composed of three main moving parts: the `Oracle Management
    Agent`, `Oracle Management Service`, and `Oracle Management Repository`. Let''s
    examine each in turn.


    ## Oracle Management Agent


    Agent management is one area that has become much more straightforward with the
    12c release of Enterprise Manager. In previous releases, agent management had
    to be performed from the command line, through the `EMCTL` or `EMCLI` tools. Although
    in the 12c release you can still use the command line interfaces to manage your
    agents, much of the management can also be done through the `Cloud Control console`.
    This section covers the use of the console first, and then comes back to the command-line
    interfaces.


    ### Agent Management with the Console


    To access the agent management functionality from the `Cloud Control console`,
    from the `Setup` menu choose `Manage Cloud Control` ![arrow](images/arrow.jpg)
    `Agents`, as shown in [Figure 3-1](#9781430249382_Ch03.xhtml#Fig1).


    ![9781430249382_Fig03-01.jpg](images/9781430249382_Fig03-01.jpg)


    [Figure 3-1](#9781430249382_Ch03.xhtml#_Fig1). Selecting agent management in the
    Cloud Control console


    This takes you to the `Agents` page, shown in [Figure 3-2](#9781430249382_Ch03.xhtml#Fig2).
    By default, this page shows you the status of all the agents in your system, but
    you can select an option to show just those agents that are up, under blackout,
    unreachable, and so on.


    ![9781430249382_Fig03-02.jpg](images/9781430249382_Fig03-02.jpg)


    [Figure 3-2](#9781430249382_Ch03.xhtml#_Fig2). The Agents page


    ![image](images/sq.jpg) **Tip** The values of `Upgradable` and `Not Upgradable`
    are present only if you have upgraded your OMS from 12.1.0.1 to 12.1.0.2. Upgrading
    the OMS, of course, does not upgrade the agents as well. However, you can mass-upgrade
    agents from the console in EM12c by clicking `Upgradable`, selecting the agents
    to upgrade, and clicking the `Upgrade` button.


    You can also select specific agents (by holding down the Ctrl key while selecting)
    or a range of agents (by holding Shift while selecting) to perform operations
    on, such as starting, shutting down, securing, and so forth. These fairly straightforward
    operations are covered well in Oracle''s documentation for the Enterprise Manager
    product, and so are not covered further here.


    ![image](images/sq.jpg) **Tip** One trap that new users often fall into when first
    using the EM12c user interface is not clicking the correct part of the screen.
    Note that the agent names are hyperlinks, so clicking the name of an agent will
    take you to that particular agent''s home page. If you want to select the agent
    and stay on this page to perform specific operations, either click the column
    to the left of the agent name, as seen in [Figure 3-2](#9781430249382_Ch03.xhtml#Fig2),
    or click in the agent column but to the right of the hyperlink.


    ### Controlling Multiple Agents at the Same Time


    The ability to select multiple agents to perform operations on is one of the major
    enhancements from previous releases in this part of EM12c. This capability enables
    administrators to make changes to multiple agents at one time, instead of one
    by one. For example, let''s say you want to change the upload interval at which
    a group of agents uploads accumulated data files to a smaller value, because these
    agents monitor your more critical systems. All you need to do is select the agents
    you want to modify and click the `Properties` icon, as shown at the right of [Figure
    3-2](#9781430249382_Ch03.xhtml#Fig2). This starts the Create ''Agents Configuration
    Operation'' job workflow, as shown in [Figure 3-3](#9781430249382_Ch03.xhtml#Fig3).


    ![9781430249382_Fig03-03.jpg](images/9781430249382_Fig03-03.jpg)


    [Figure 3-3](#9781430249382_Ch03.xhtml#_Fig3). The first step of the Create ''Agents
    Configuration Operation'' job workflow


    Notice that none of the agents are initially selected. Therefore, you select the
    agents you want (or just click `Select All` to select all of them) and then click
    the `Parameters` tab. This brings up a long list of agent properties you can change,
    as shown in [Figure 3-4](#9781430249382_Ch03.xhtml#Fig4). Scroll down to the `UploadInterval`
    parameter and enter a value in minutes for how frequently you want the agents
    to upload. In [Figure 3-4](#9781430249382_Ch03.xhtml#Fig4), the value is set to
    upload every 5 minutes (from the default of 15 minutes).


    ![9781430249382_Fig03-04.jpg](images/9781430249382_Fig03-04.jpg)


    [Figure 3-4](#9781430249382_Ch03.xhtml#_Fig4). Changing the UploadInterval parameter


    You could schedule this to occur at a later time (for example, an allocated maintenance
    time) by using the `Schedule` tab. However, if you don''t need to schedule this
    job to run later, you can simply click `Submit`. You are then returned to the
    `Agents` page and provided with an informational message that the job has been
    submitted, along with a link to check progress of the job.


    ## Using an Agent''s Home Page


    From the `Agents` page just described, you can go to the home page for a specific
    agent, by clicking the agent name. (You can also reach an agent''s home page by
    selecting the agent from the `All Targets` page.) The OMS makes a connection to
    the agent and displays a variety of more-detailed information for that specific
    agent, including the following.


    ### Summary Region


    This provides details such as the agent''s availability and status. Of particular
    interest in this region is the list indicating which management plug-ins are deployed
    in this agent, as shown in [Figure 3-5](#9781430249382_Ch03.xhtml#Fig5). (Remember,
    agents contain plug-ins only for targets that are present on the machine, so it
    can be useful to see which plug-ins are deployed.)


    ![9781430249382_Fig03-05.jpg](images/9781430249382_Fig03-05.jpg)


    [Figure 3-5](#9781430249382_Ch03.xhtml#_Fig5). List of plug-ins installed for
    an agent


    ### Monitoring Region


    This shows details of the targets being monitored by this agent, metric issues
    for these targets, and the top collections for them.


    ### Performance and Usage Region


    This details how well the agent itself has been performing, as shown in [Figure
    3-6](#9781430249382_Ch03.xhtml#Fig6). You should be aware of several important
    items in this region:


    *   At first glance, the graphs can be confusing because the y axis seems to have
    no units of measurement. In fact, the units are there, just in the caption for
    each graph.

    *   The y axis is scaled, based on the results. That means that performance can
    look worse than it really is. For example, the upload rate in [Figure 3-6](#9781430249382_Ch03.xhtml#Fig6)
    looks bad at first glance, but it reaches a maximum of just over 0.5 KB/sec, which
    is clearly not a problem!

    *   Sometimes you need to look at two graphs to see an issue. Using that same
    upload rate graph, performance is an issue only when the upload backlog (the graph
    to the right of the upload rate) is increasing while the upload rate isn''t increasing.

    *   By looking at the `Collection Performance` graph, you can determine when an
    agent is reaching the maximum number of targets it can monitor. As you can see
    in the tip underneath the agent, when the value on the y axis approaches 100,
    the agent is reaching capacity. This is probably not something you''ll see often.
    (The agent in this case was monitoring 114 targets, yet the percentage of the
    collection interval spent in execution is averaging slightly under 0.02, which
    is a long way off 100!)


    ![9781430249382_Fig03-06.jpg](images/9781430249382_Fig03-06.jpg)


    [Figure 3-6](#9781430249382_Ch03.xhtml#_Fig6). Performance and Usage region from
    the agent home page'
