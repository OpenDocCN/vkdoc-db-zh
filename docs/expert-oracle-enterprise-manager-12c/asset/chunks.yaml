- fmt: '**Note** If you have multiple CSIs with Oracle, perhaps because you are a
    third-party support company, you can assign different CSIs to various targets,
    and then each administrator will be able to obtain support on only the systems
    they are entitled to in accordance with their contract. You set this up via the
    Support Identifier Assignment option.


    Although simple proxy authentication using challenge/response is simple to set
    up, over the years there have been a number of bugs associated with proxy configuration
    in Enterprise Manager. The product is definitely improving in this regard; however,
    you may still have problems authenticating to enterprise proxy servers that use
    NTLM to automatically authenticate users—a fairly common configuration given the
    ubiquity of Active Directory in the marketplace as an authentication repository.
    This is because NTLM proxy servers are not supported by Cloud Control. Instead,
    the official Oracle recommendation is to allow various oracle.com sites to be
    exempt from the corporate proxy configuration.


    ## Using the NTLMAPS Proxy


    The NTLM Authentication Proxy Server (`NTLMAPS`) is a proxy server—essentially
    a smart Python script and some open source NTLM libraries that redirect requests
    for Internet URIs to an upstream or parent proxy server. It adds appropriate browser
    headers if required and, crucially for `EM12c` purposes, authenticates correctly
    against the upstream proxy server with NT credentials. The project which is licensed
    under the GNU General Public License and so is cost free can be found at [http://ntlmaps.sourceforge.net/](http://ntlmaps.sourceforge.net/).


    **Caution** This section covers the setup of an alternative solution that uses
    a lightweight open source dedicated proxy. If you choose to use this option, make
    sure that you gain the consent of your network administrators.


    This means we can run our own proxy server that doesn’t require Cloud Control
    to know about Active Directory authentication and still authenticate against the
    corporate proxy with all the corporate security rules in place. To install, download
    and unzip the distribution to `/opt/ntlmaps`. If you are on RedHat or something
    similar, Python is already available as part of the standard distribution. Otherwise,
    you’ll also need to install Python. `NTLMAPS` uses a configuration file, `server.cfg`.
    You’ll need to enter values for the following:


    *   `PARENT_PROXY`: The IP address of the parent server

    *   `PARENT_PORT`: The port on which the parent listens

    *   `USER`: The configured Active Directory name

    *   `PASSWORD`: The configured AD password for the user

    *   `NT_DOMAIN`: The NT domain name


    Once this is done, start the proxy server manually for the time being by executing
    the supplied script, `python main.py`. By default, `NTLMAPS` uses port `5865`.
    This should probably be acceptable. Whichever route you take, you should now configure
    Internet access for the `OMS` server(s) using the `NTLMAPS` address as the proxy
    address in step 2 in the preceding “Configuring Proxy Server Access” section.
    Once the proxy is working OK, the next step is to configure a Linux service by
    using `chkconfig`. The script I use is an open source script available in the
    code repository for this book.


    ## Notifications


    One of the major roles for Enterprise Manager is to trigger alerts when managed
    targets encounter an event that requires attention. Classic examples of this occur
    when a web server is down or when a data store is running out of space as data
    is added. Enterprise Manager splits this task into two distinct phases: alerting
    and notification. Both areas are configurable from the Cloud Control menu bar.


    The alert phase is concerned with recording the occurrence of a particular event,
    usually driven by a certain metric. This information becomes visible on the target
    home page after processing by the management server. The fact that alerts fire
    but do not necessarily raise alarms for administrators is a common cause of confusion
    for users new to the product.


    The notification phase, by contrast, is the process of sending the details of
    the alert by some method to allow an appropriate administrator to respond to the
    alert condition. For example, a `DBA` might be paged to let her know that a database’s
    system tablespace is dangerously low on space and that she should add space to
    the tablespace urgently. Notifications traditionally take place via e-mail, but
    they can also be routed via `SNMP`, perhaps to an operational control center,
    by `PL/SQL` procedures that a `DBA` or database developer might write or by running
    an operating system command (perhaps a shell script) on the management server.


    Once you have successfully installed Enterprise Manager and while logged in using
    the `SYSMAN` account, one of your first tasks should be to add a notification
    method that can be used to notify the administrators you set up. In this example,
    you will use e-mail, because that is by far the most common method encountered
    in real installations. To start the process, choose Setup > Notifications > Notification
    Methods, as shown in [Figure 4-21](#9781430249382_Ch04.xhtml#Fig21).


    ![9781430249382_Fig04-21.jpg](images/9781430249382_Fig04-21.jpg)


    [Figure 4-21](#9781430249382_Ch04.xhtml#_Fig21). Notification methods


    The screen in [Figure 4-22](#9781430249382_Ch04.xhtml#Fig22) then displays. You
    can use this screen to set up the details of the corporate e-mail server(s), together
    with any authentication credentials that are required. The mail servers that you
    use *must* be configured to allow `SMTP` communication. You will probably need
    to ask your mail administrator which to use, because many corporate e-mail configurations
    allow only `SMTP` from specific servers, and they may require the account that
    you configure to authenticate to be a member of a specific group.


    ![9781430249382_Fig04-22.jpg](images/9781430249382_Fig04-22.jpg)


    [Figure 4-22](#9781430249382_Ch04.xhtml#_Fig22). SMTP server details


    By default, Enterprise Manager provides two e-mail templates for delivering notification
    of events. These are known as long- and short-format e-mails. You will probably
    want to customize these, especially to ensure that your e-mail client has rules
    configured to process the e-mails efficiently. To customize the e-mail format,
    you choose Customize Email Formats from the Notifications submenu (shown earlier
    in [Figure 4-21](#9781430249382_Ch04.xhtml#Fig21)). This presents you with the
    screen in [Figure 4-23](#9781430249382_Ch04.xhtml#Fig23), which defaults to showing
    the long format for metric alerts, though you can change this with the drop-downs
    at the top of the screen.


    ![9781430249382_Fig04-23.jpg](images/9781430249382_Fig04-23.jpg)


    [Figure 4-23](#9781430249382_Ch04.xhtml#_Fig23). E-mail customization'
