    ## 关于作者


    ![image](images/9781430249382_unFM-01.jpg)


    **Kellyn Pot’Vin** 是 Oracle ACE Director，也是 Enkitec 公司的高级技术顾问，负责管理 Oracle 和 SQL
    Server。她专注于环境优化、调优以及构建健壮的企业级系统。Kellyn 主要处理多 TB 级数据库，包括 Exadata，以及涉及固态硬盘解决方案的驱动性能数据库。Kellyn
    深入参与 Oracle 用户组社区活动，在全球各地的会议上发表演讲，并且是 Rocky Mountain Oracle Users Group (RMOUG)
    Training Days 会议的总监，该会议是最大的区域性会议之一。Kellyn 在 `https://dbakevlar.com` 上写博客，并深陷社交媒体。可以在
    Twitter 上通过句柄 `@DBAKevlar`、LinkedIn 和 Facebook 上找到她，她经常在那里讨论她的日常技术冒险，因为她在家工作，没有同事可以倾诉。她还领导着本地和全球的技术女性
    (WIT) 小组，指导技术领域的女性同仁。Kellyn 与她的伴侣 Tim Gorman 以及她的三个孩子 Sam、Cait 和 Josh 一起居住在科罗拉多州的威斯敏斯特。


    ![image](images/9781430249382_unFM-02.jpg)


    **Anand Akela** 是 Oracle Enterprise Manager 的高级首席产品营销总监。他专注于 Oracle 的企业云、虚拟化和基础设施管理产品。在加入
    Oracle 之前，他曾在 HP 工作，担任过各种产品营销、产品管理和工程职位，涉及系统管理、服务器、数据中心能源效率和企业软件等领域。

    Anand 是各种数据中心行业联盟的积极参与者，目前担任 The Green Grid 数据收集与分析工作组主席。The Green Grid 是一个由 IT
    公司和专业人士组成的全球联盟，致力于改善全球数据中心和企业计算生态系统的能源效率。Anand 还担任 PeersNet（一家网络服务提供商）的顾问。Anand
    拥有杜克大学富卡商学院的 MBA 学位和印度浦那大学的计算机科学学士学位。


