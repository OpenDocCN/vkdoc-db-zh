    ![9781430249382_Fig02-10.jpg](images/9781430249382_Fig02-10.jpg)


    [Figure 2-10](#9781430249382_Ch02.xhtml#_Fig10). Summary


    11.  At the end of the installation, you need to execute some configuration scripts.
    Log in as ROOT to the server in another terminal session and run the scripts.
    Then click OK to finish the installation (see [Figure 2-11](#9781430249382_Ch02.xhtml#Fig11)).


    ![9781430249382_Fig02-11.jpg](images/9781430249382_Fig02-11.jpg)


    [Figure 2-11](#9781430249382_Ch02.xhtml#_Fig11). Executing the configuration scripts


    Creating the Repository Database


    Now that you have installed the Oracle Database software, you will create the
    management repository database. Connect to the repository server, set the Oracle
    home, and run dbca:


    ```

    [oracle@repositorydb ∼]$ . oraenv

    ORACLE_SID = [oracle] ? oracle

    ORACLE_HOME = [/home/oracle] ? /u01/app/oracle/product/11.2.0/dbhome_1

    The Oracle base has been set to /u01/app/oracle

    [oracle@repositorydb ∼]$ dbca

    ```


    When you run dbca, the Database Configuration Assistant Welcome screen appears.
    Click Next to pass the screen and then complete the following steps:


    1.  For the Operations step, shown in [Figure 2-12](#9781430249382_Ch02.xhtml#Fig12),
    select Create a Database and then click Next.


    ![9781430249382_Fig02-12.jpg](images/9781430249382_Fig02-12.jpg)


    [Figure 2-12](#9781430249382_Ch02.xhtml#_Fig12). Database Configuration Assistant


    2.  For the Database Templates step, shown in [Figure 2-13](#9781430249382_Ch02.xhtml#Fig13),
    you can select General Purpose or Custom Database. We recommend that you select
    Custom Database because it will prevent the installation of some SYSMAN objects
    in the database. Otherwise, you have to remove these objects from the database
    before you can use it as the management repository database. Click Next.


    ![9781430249382_Fig02-13.jpg](images/9781430249382_Fig02-13.jpg)


    [Figure 2-13](#9781430249382_Ch02.xhtml#_Fig13). Database templates


    3.  The Database Identification step appears, as shown in [Figure 2-14](#9781430249382_Ch02.xhtml#Fig14).
    Enter the global database name, and the installer will set the SID according to
    that name. Click Next.


    ![9781430249382_Fig02-14.jpg](images/9781430249382_Fig02-14.jpg)


    [Figure 2-14](#9781430249382_Ch02.xhtml#_Fig14). Database identification


    4.  For the Management Options step, shown in [Figure 2-15](#9781430249382_Ch02.xhtml#Fig15),
    deselect Configure Enterprise Manager and then click Next.


    ![9781430249382_Fig02-15.jpg](images/9781430249382_Fig02-15.jpg)


    [Figure 2-15](#9781430249382_Ch02.xhtml#_Fig15). Management options


    5.  Enter the passwords for SYS and SYSTEM users in the Database Credentials step,
    shown in [Figure 2-16](#9781430249382_Ch02.xhtml#Fig16), and then click Next.
    Oracle recommends entering a password with a minimum of eight characters, including
    at least one uppercase letter, one lowercase letter, and one digit.


