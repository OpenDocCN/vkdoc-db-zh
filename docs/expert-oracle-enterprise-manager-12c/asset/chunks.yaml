    \ look at the cloud lifecycle in detail and see how Oracle Enterprise Manager\
    \ can help gain total control over the phases of that lifecycle.\n\n## Complete\
    \ Cloud Lifecycle Management"
  raw: 'According to NIST, “Cloud computing is a model for enabling ubiquitous, convenient,
    on-demand network access to a shared pool of configurable computing resources
    (for example, networks, servers, storage, applications, and services) that can
    be rapidly provisioned and released with minimal management effort or service
    provider interaction.”


    In this section, we’ll add some details to this general definition. First, we’ll
    review the essential characteristics of cloud computing. Then we’ll look at the
    basic cloud computing service and supported deployment models.


    Essential Characteristics


    According to the NIST, cloud computing has five essential characteristics. Let’s
    look at each in some detail:


    *   *On-demand self-service*: Cloud consumers should be able to consume the cloud
    services on demand, without requiring human interaction with the cloud service
    provider.

    *   *Broad network access*: Cloud services should be accessed over the network
    and through various commonly used interfaces (for example, the Web, mobile devices,
    software clients, and so forth).

    *   *Resource pooling*: Cloud providers pool computing resources to efficiently
    serve multiple consumers.

    *   *Rapid elasticity*: Cloud services should be elastically provisioned and released
    to meet the business demand.

    *   *Measured service*: Cloud resources should be monitored for usage and can
    later be reported, with users potentially billed for the utilized service.


    The NIST definition also lists three *service models* (software, platform, and
    infrastructure) and four *deployment models* (private, community, public, and
    hybrid) that, combined, categorize ways to deliver cloud services. These are discussed
    in the following sections.


    Service Models


    For the cloud to be a viable option for any enterprise organization, that organization
    needs to choose which service model to provide. A *service model* is an approach
    that can be used to satisfy a specific requirement. Within the cloud architecture,
    three primary service models can be used— Software as a Service (SaaS), Platform
    as a Service (PaaS), and Infrastructure as a Service (IaaS):


    *   *Software as a Service (SaaS)*: In this model, the consumer of cloud services
    uses the software application. The consumer does not manage or control any of
    the underlying infrastructures to include network, servers, application servers,
    operating systems, storage, or even individual application capabilities, with
    the possible exception of limited user-specific application configuration settings.
    SaaS examples include the Web-based e-mail services provided by Yahoo!, Google,
    and other vendors.

    *   *Platform as a Service (PaaS)*: In this model, the consumer of the cloud builds
    and operates end-user applications leveraging the software platform—including
    database, middleware, programming languages, libraries, services, and tools—offered
    by the cloud provider. The consumer does not manage or control the software platform
    or the underlying infrastructure including network, servers, operating systems,
    or storage, but has control over the deployed applications and possibly configuration
    settings for the application-hosting environment. PaaS examples include Google
    Apps, which enables customers to work from a platform while being mobile.

    *   *Infrastructure as a Service (IaaS)*: In this model, the consumer of the IaaS
    cloud has the responsibility to manage the software platform (database, middleware,
    tools, and so forth) and develop and operate the end-user applications. The consumer
    does not manage or control the underlying cloud infrastructure but has control
    over operating systems, storage, and deployed applications, and possibly limited
    control of select networking components (for example, host firewalls). Amazon
    Elastic Compute Cloud, which provides developers with servers and databases, is
    an example of IaaS.


    Deployment Models


    In addition to describing service models, NIST also lists four models for deploying
    cloud services. Let’s look at them quickly:


    *   *Public cloud*: The cloud provider builds and operates the cloud infrastructure
    for use by the general public. This infrastructure exists on the premises of the
    cloud provider, and the provider manages the access control and potential pay-per-use
    model for consumers.

    *   Example: Box and Dropbox offer a certain amount of online storage for free
    to the public, and charge for storage beyond that limit.

    *   *Private cloud*: The cloud infrastructure is provisioned for exclusive use
    of lines of business or branches within a single organization. Usually the IT
    department of the organization builds and operates the private cloud (or enterprise
    private cloud).

    *   Example: Oracle Global IT offers development and testing cloud infrastructure
    for Oracle employees worldwide. However, in some cases the cloud infrastructure
    may be owned and operated by a third-party vendor that manages the private cloud
    exclusively for a single organization.

    *   *Community cloud*: The cloud infrastructure is provisioned for exclusive use
    by a specific community of consumers from organizations that have shared goals
    and concerns.

    *   Example: Many federal and state organizations share resources through a cloud
    infrastructure.

    *   *Hybrid cloud*: Organizations may decide to deploy certain key applications
    and data in their private cloud, but other applications in a public cloud. In
    case of a disaster or heavy demand on the applications in the private cloud, organizations
    may decide to temporarily move part of their workload to the public cloud. This
    process of temporarily extending to a public cloud from a private cloud during
    peak load is called *cloud bursting*. Hybrid cloud infrastructure is a combination
    of a private and public cloud (and/or community cloud) that is connected by standard
    or proprietary technology for data and application portability.


    Enterprise Private Cloud


    The rest of this chapter focuses on enterprise private cloud infrastructures managed
    by EM12c. However, a public, community, or hybrid cloud infrastructure provider
    can also decide to use EM12c for managing their entire cloud lifecycle. For example,
    Oracle uses EM12c to manage its public Oracle Cloud.


    As mentioned earlier, the IT department of an enterprise usually becomes the cloud
    service provider in charge of the enterprise private cloud and its associated
    deployment model.


    As you can see in [Figure 5-1](#9781430249382_Ch05.xhtml#Fig1), the cloud users
    in the business units get more value when they move horizontally from IaaS to
    PaaS and then to SaaS. IaaS cloud users within the enterprise are responsible
    for databases, middleware, and development and operation of end-user applications
    on top of the cloud infrastructure offered by their IT department. If the IT department
    offers PaaS, cloud users will be responsible only for development, testing, and
    operations of their applications, while IT takes care of management and operations
    of the software platform and the underlying infrastructure. Enterprise IT departments
    will have more up-front investment in establishing a PaaS or SaaS model than an
    IaaS model.


    ![9781430249382_Fig05-01.jpg](images/9781430249382_Fig05-01.jpg)


    [Figure 5-1](#9781430249382_Ch05.xhtml#_Fig1). Cloud service models deployed in
    an enterprise private cloud


    So far, you have seen an overview of cloud computing, its key characteristics,
    and its delivery and deployment models. Although cloud computing offers great
    efficiency, flexibility, and cost savings, the benefits for an enterprise private
    cloud can be maximized only if the enterprise can manage the complete cloud lifecycle
    across the whole technology stack. Let’s look at the cloud lifecycle in detail
    and see how Oracle Enterprise Manager can help gain total control over the phases
    of that lifecycle.


    Complete Cloud Lifecycle Management'
  trans: "\n根据美国国家标准与技术研究院（NIST）的定义，“云计算是一种模型，用于实现对可配置计算资源（例如，网络、服务器、存储、应用程序和服务）共享池的泛在、便捷、按需网络访问，这些资源能够通过最少的管理工作或与服务提供商的交互而快速配置和释放。”\n\
    \n在本节中，我们将为这个总体定义补充一些细节。首先，我们将回顾云计算的基本特征。然后，我们将了解基本的云计算服务和支持的部署模型。\n\n## 基本特征\n\
    \n根据 `NIST` 的定义，云计算具有五项基本特征。让我们详细了解一下每一项：\n\n*   `按需自助服务`：云消费者应能够按需使用云服务，无需与云服务提供商进行人工交互。\n\
    *   `广泛的网络访问`：云服务应通过网络和各种常用接口（例如，Web、移动设备、软件客户端等）进行访问。\n*   `资源池化`：云提供商将计算资源汇集起来，以高效地服务多个消费者。\n\
    *   `快速弹性`：云服务应能弹性地配置和释放，以满足业务需求。\n*   `可衡量的服务`：应监控云资源的使用情况，并可进行报告，用户可能为其所使用的服务付费。\n\
    \n`NIST` 的定义还列出了三种 `服务模型`（软件、平台和基础设施）和四种 `部署模型`（私有、社区、公共和混合），这些模型结合起来对提供云服务的方式进行了分类。这些将在后续章节中讨论。\n\
    \n## 服务模型\n\n对于任何企业组织而言，要使云计算成为一个可行的选项，该组织需要选择提供哪种服务模型。`服务模型` 是一种可用于满足特定需求的方法。在云架构中，可以使用三种主要服务模型——软件即服务（`SaaS`）、平台即服务（`PaaS`）和基础设施即服务（`IaaS`）：\n\
    \n*   `软件即服务 (SaaS)`：在此模型中，云服务的消费者使用软件应用程序。消费者不管理或控制底层的任何基础设施，包括网络、服务器、应用服务器、操作系统、存储，甚至单个应用程序功能，可能仅限于有限的用户特定应用程序配置设置。`SaaS`\
    \ 的例子包括由 Yahoo!、Google 和其他供应商提供的基于 Web 的电子邮件服务。\n*   `平台即服务 (PaaS)`：在此模型中，云的消费者利用云提供商提供的软件平台（包括数据库、中间件、编程语言、库、服务和工具）来构建和操作最终用户应用程序。消费者不管理或控制软件平台或底层基础设施（包括网络、服务器、操作系统或存储），但可以控制已部署的应用程序以及可能的应用程序托管环境配置设置。`PaaS`\
    \ 的例子包括 Google Apps，它使客户能够在移动办公的同时使用一个平台进行工作。\n*   `基础设施即服务 (IaaS)`：在此模型中，`IaaS`\
    \ 云的消费者负责管理软件平台（数据库、中间件、工具等）以及开发和操作最终用户应用程序。消费者不管理或控制底层云基础设施，但可以控制操作系统、存储和已部署的应用程序，并可能对选定的网络组件（例如，主机防火墙）有有限的控制权。Amazon\
    \ Elastic Compute Cloud 为开发人员提供服务器和数据库，是 `IaaS` 的一个例子。\n\n## 部署模型\n\n除了描述服务模型外，`NIST`\
    \ 还列出了部署云服务的四种模型。让我们快速了解一下：\n\n*   `公共云`：云提供商构建和运营云基础设施，供公众使用。该基础设施位于云提供商的场所，提供商管理消费者的访问控制和潜在的按使用付费模型。\n\
    \    *   示例：Box 和 Dropbox 向公众提供一定数量的免费在线存储，并对超出该限制的存储收费。\n*   `私有云`：云基础设施为单个组织内的业务线或分支机构专属使用而配置。通常由该组织的\
    \ IT 部门构建和运营私有云（或企业私有云）。\n    *   示例：Oracle Global IT 为全球 Oracle 员工提供开发和测试云基础设施。但在某些情况下，云基础设施可能由第三方供应商拥有和运营，该供应商专门为单个组织管理私有云。\n\
    *   `社区云`：云基础设施为具有共同目标和关注点的组织中的特定消费者社区专属使用而配置。\n    *   示例：许多联邦和州组织通过云基础设施共享资源。\n\
    *   `混合云`：组织可能决定将某些关键应用程序和数据部署在其私有云中，而将其他应用程序部署在公共云中。如果私有云中的应用程序遭遇灾难或需求激增，组织可能会决定暂时将其部分工作负载迁移到公共云。在峰值负载期间从私有云临时扩展到公共云的过程称为\
    \ `云爆发`。混合云基础设施是私有云和公共云（和/或社区云）的组合，通过标准或专有技术连接以实现数据和应用程序的可移植性。\n\n## 企业私有云\n\n\
    本章的其余部分将重点介绍由 `EM12c` 管理的企业私有云基础设施。但是，公共、社区或混合云基础设施提供商也可以决定使用 `EM12c` 来管理其整个云生命周期。例如，Oracle\
    \ 使用 `EM12c` 来管理其公共的 Oracle Cloud。\n\n如前所述，企业的 IT 部门通常成为负责企业私有云及其相关部署模型的云服务提供商。\n\
    \n如 图 5-1 所示，业务部门中的云用户当他们从 `IaaS` 横向移动到 `PaaS`，然后再移动到 `SaaS` 时，会获得更多价值。企业内的 `IaaS`\
    \ 云用户负责数据库、中间件以及在其 IT 部门提供的云基础设施之上开发和操作最终用户应用程序。如果 IT 部门提供 `PaaS`，云用户将仅负责其应用程序的开发、测试和操作，而\
    \ IT 则负责软件平台及其底层基础设施的管理和操作。与 `IaaS` 模型相比，企业 IT 部门在建立 `PaaS` 或 `SaaS` 模型时将会有更多的前期投资。\n\
    \n![9781430249382_Fig05-01.jpg](img/9781430249382_Fig05-01.jpg)\n\n图 5-1. 在企业私有云中部署的云服务模型\n\
    \n到目前为止，您已经了解了云计算的概述、其关键特性以及其交付和部署模型。尽管云计算提供了极高的效率、灵活性和成本节约，但只有当企业能够跨整个技术栈管理完整的云生命周期时，企业私有云的效益才能最大化。让我们详细了解一下云生命周期，看看\
    \ Oracle Enterprise Manager 如何帮助完全控制该生命周期的各个阶段。\n\n## 完整的云生命周期管理\n"
- fmt: '# Oracle Enterprise Manager 云生命周期管理


    为了从云基础设施中获得最佳价值，对云生命周期所有阶段的各种活动进行端到端管理和自动化工作流至关重要——从规划和设置云，到最终用户自助式配置和取消配置应用程序，再到对云资源使用的计量和收费（参见[图
    5-2](#9781430249382_Ch05.xhtml#Fig2)）。


    ![9781430249382_Fig05-02.jpg](images/9781430249382_Fig05-02.jpg)


    **[图 5-2](#9781430249382_Ch05.xhtml#_Fig2). 完整的云生命周期**


    EM12c 帮助您从单一工具管理整个云生命周期。让我们更详细地看看这个生命周期的各个阶段。


    ## 规划云


    从现有 IT 基础设施迁移到云本质上是变革性的。它需要广泛规划，以考虑各种设计和操作标准，确保云基础设施的成功部署和运行。


    首先，您需要确定环境中的所有应用程序和基础设施资产。您还需要理解它们之间的关系，以便决定哪些保持原样，哪些需要更新，哪些需要淘汰。在迁移到云之前或作为迁移的一部分整合应用程序和底层基础设施，被认为是行业最佳实践。多年来，数据中心积累了过多的服务器，它们占用机架空间，消耗大量电力用于冷却，并需要系统维护（例如打补丁），其中许多服务器未被充分利用。


    EM12c 提供了自动化功能，允许 IT 部门发现现有的应用程序和基础设施资产以及它们之间的关系。这个数据中心的蓝图为云转型规划提供了基线。此外，EM12c
    提供了一个名为 `Consolidation Planner` 的工具（本章稍后将详细讨论），它可以基于存储在 `OEM` 仓库中的使用数据和未来整合平台的预计能力，模拟各种整合场景。在[图
    5-3](#9781430249382_Ch05.xhtml#Fig3) 所示的示例中，正在分析在七台服务器上运行的数据库，以整合到一个 Oracle Exadata
    四分之一机架中。


    ![9781430249382_Fig05-03.jpg](images/9781430249382_Fig05-03.jpg)


    **[图 5-3](#9781430249382_Ch05.xhtml#_Fig3). Oracle Enterprise Manager Consolidation
    Planner**


    `Consolidation Planner` 工具的建议也可以考虑技术和功能约束——例如，生产环境和测试环境不能共置。通过 `Consolidation
    Planner`，公司的 IT 部门可以识别未充分利用的服务器，并找到整合它们的方法，以尽可能多地释放资源，同时维持当前的服务水平。这种精细的场景规划可以缓解许多云转型风险。您可以确信应用程序在整合后会运行良好。本章稍后将更详细地讨论
    `Consolidation Planner`。


    在规划阶段，您还需要选择与企业的业务需求最匹配的云服务交付模型（即 IaaS、PaaS 或 SaaS）。当您的业务部门不一定拥有标准化的应用程序开发平台，而只是希望
    IT 为其多样化的应用程序和开发环境提供计算基础设施时，IaaS 可以是一个很好的起点。正如我们之前讨论的，企业可以通过向企业用户交付 PaaS 云来获得更多价值。云用户可以专注于在企业私有
    PaaS 上开发、测试和部署他们的应用程序，而将运维工作委托给 IT。企业可以在最大化组件重用、灵活性和控制的同时，受益于增强的安全性和合规性。


    ## 设置云


    在您基线化 IT 资产、决定作为云转型的一部分进行升级或淘汰的内容，并最终确定云服务交付模型后，您需要设置和配置云。这不仅需要在现有 IT 基础设施前添加一个自助服务门户，还需要设置广泛的网络访问、资源池、快速弹性和计量服务。您不仅设置虚拟化基础设施，还可以在物理基础设施中池化资源。例如，您可以在运行在
    Oracle Exadata 系统之上的 PaaS 云中进行数据库整合。


    为了适应各种云服务（DBaaS、MWaaS 或 IaaS），Oracle Enterprise Manager 支持丰富的云资源模型——从应用程序到存储基础设施中的磁盘，涵盖物理和虚拟化基础设施。您可以创建区域（zone），这是云基础设施所需的一组资源的逻辑分组。例如，MWaaS
    用户只关心中间件区域或域，而不必担心底层基础设施。您可以在使用 Oracle Enterprise Manager 的自助服务门户时，根据组织结构、区域或企业选择的任何标准来设置区域。EM12c
    支持管理程序和操作系统的裸机置备。在云设置过程中，Enterprise Manager 还可以帮助集成来自 F5 Networks、NetApp、Hitachi
    和 Fujitsu 等供应商的最佳网络和存储技术。让我们逐步了解 IaaS 的设置过程。


    您通过选择机器大小开始设置 IaaS 云。如[图 5-4](#9781430249382_Ch05.xhtml#Fig4) 所示，您也可以添加自定义机器大小以满足您的业务需求，并为您的云选择该大小。


    ![9781430249382_Fig05-04.jpg](images/9781430249382_Fig05-04.jpg)


    **[图 5-4](#9781430249382_Ch05.xhtml#_Fig4). 添加自定义机器大小**


    选择机器大小后，您可以为 IaaS 用户定义基础设施请求的设置。如[图 5-5](#9781430249382_Ch05.xhtml#Fig5) 所示，您可以指示是否可以保留云资源、资源可以请求多长时间、是否应配置管理代理等等。


    ![9781430249382_Fig05-05.jpg](images/9781430249382_Fig05-05.jpg)


    **[图 5-5](#9781430249382_Ch05.xhtml#_Fig5). 为请求定义设置**


    您还可以创建和选择用户角色，并为这些角色设置访问控制。如[图 5-6](#9781430249382_Ch05.xhtml#Fig6) 所示，您可以为角色分配配额、区域和网络配置文件。


    ![9781430249382_Fig05-06.jpg](images/9781430249382_Fig05-06.jpg)


    **[图 5-6](#9781430249382_Ch05.xhtml#_Fig6). 配置角色**


    您还可以在设置基础设施时向其中添加软件组件。最后，您可以在设置阶段为基础设施资源设置收费和计量参数，并发布基础设施云资源供云用户使用。除了此处展示的基础设施云示例外，Oracle
    Enterprise Manager 还可以帮助开箱即用地设置数据库或中间件云。


    在云设置阶段可能存在不同的管理任务和角色。云管理员可以是设置云基础设施（包括系统、数据库或作为服务提供的任何其他云资源）的人。自助服务管理员可以是业务部门或其他云租户的管理员，他们为其用户设置配额和角色。


    与云管理员相关的一些典型任务包括：置备裸机管理程序、配置存储阵列和网络、创建服务器池，以及根据功能和操作边界定义区域。他们还为云用户配置软件库的策略和访问控制。'
  raw: 'To achieve the best value from the cloud infrastructure, it is important to
    have end-to-end management and automated workflows for various activities during
    all the phases of the cloud life cycle—from planning and setting up the cloud,
    to end-user self-service provisioning and de-provisioning of applications, to
    metering and charging back for the cloud resource usage (see [Figure 5-2](#9781430249382_Ch05.xhtml#Fig2)).


    ![9781430249382_Fig05-02.jpg](images/9781430249382_Fig05-02.jpg)


    [Figure 5-2](#9781430249382_Ch05.xhtml#_Fig2). Complete cloud lifecycle


    EM12c helps you manage the entire cloud lifecycle from a single tool. Let’s look
    at the phases of this lifecycle in more detail.


    Planning the Cloud


    Moving to the cloud from your existing IT infrastructure is transformational in
    nature. It requires extensive planning to consider various design and operational
    criteria for successful deployment and operation of the cloud infrastructure.


    First, you need to determine all the applications and infrastructure assets in
    the environment. You also need to understand the relationships between them so
    you can decide what to keep as is, what to update, and what to retire. Consolidating
    your applications and underlying infrastructure before, or as part of, moving
    to the cloud is considered an industry best practice. Over the years, data centers
    have accumulated excess servers that occupy rack space, consume a lot of power
    for cooling, and require system maintenance such as patching, and many of them
    are underutilized.


    EM12c provides automated capabilities that allow IT departments to discover existing
    applications and infrastructure assets along with the relationships between them.
    This blueprint of the data center provides a baseline for cloud transformation
    planning. Additionally, EM12c offers a tool called Consolidation Planner, discussed
    in detail later in this chapter, that can simulate various consolidation scenarios
    based on usage data stored in OEM’s repository and projected capabilities of future
    consolidation platforms. In the example shown in [Figure 5-3](#9781430249382_Ch05.xhtml#Fig3),
    databases running on seven servers are being analyzed for consolidation to a quarter
    rack of Oracle Exadata.


    ![9781430249382_Fig05-03.jpg](images/9781430249382_Fig05-03.jpg)


    [Figure 5-3](#9781430249382_Ch05.xhtml#_Fig3). Oracle Enterprise Manager Consolidation
    Planner


    The advisories from the Consolidation Planner tool can also consider technical
    and functional constraints—for example, production and testing cannot be colocated.
    With Consolidation Planner, a company’s IT department could identify underutilized
    servers and find a way to consolidate them to free up as many as possible, at
    the same time maintaining current service levels. This type of elaborate scenario
    planning can mitigate many of the cloud transformation risks. You can have the
    confidence that applications will perform fine after the consolidation. Consolidation
    Planner is discussed in more detail later in this chapter.


    During the planning phase, you also need to choose the cloud service delivery
    model (that is, IaaS, PaaS, or SaaS) that aligns best with the enterprise’s business
    needs. IaaS can be a good starting point when your business units don’t necessarily
    have a standardized application development platform and are just looking to IT
    to provide a compute infrastructure for their diverse applications and development
    environment. As we discussed earlier, enterprises can get more value by delivering
    a PaaS cloud to their enterprise users. Cloud users can just focus on developing,
    testing, and deploying their applications on enterprise private PaaS, delegating
    the operations and maintenance to IT. Enterprises can benefit from enhanced security
    and compliance while maximizing component reuse, flexibility, and control.


    Setting Up the Cloud


    After you baseline the IT assets, decide what to upgrade or retire as part of
    the cloud transformation, and finalize the cloud service delivery model, you need
    to set up and configure the cloud. This requires not only adding a self-service
    portal in front of the existing IT infrastructure, but also setting up broad network
    access, resource pooling, rapid elasticity, and measured service. You not only
    set up virtualization infrastructure, but also can also pool resources in a physical
    infrastructure. For example, you can have database consolidation in a PaaS cloud
    running on the top of an Oracle Exadata system.


    To accommodate various cloud services (DBaaS, MWaaS, or IaaS), Oracle Enterprise
    Manager supports rich resource models for the cloud—right from applications to
    disks in storage infrastructure, for both physical and virtualized infrastructure.
    You can create zones that are logical groupings of a set of resources required
    for services provided by the cloud infrastructure. For example, a MWaaS user can
    worry only about middleware zones or domains and not worry about the underlying
    infrastructure. You could set up zones based on organizational structure, region,
    or whatever criteria enterprises choose when using the Self Service portal of
    Oracle Enterprise Manager. EM12c supports bare-metal provisioning of hypervisors
    and operating systems. During the cloud setup process, Enterprise Manager can
    also help integration with best-of-breed networking and storage technologies from
    vendors such as F5 Networks, NetApp, Hitachi, and Fujitsu. Let’s walk through
    the IaaS setup process.


    You start setting up the IaaS cloud by selecting the machine sizes. As shown in
    [Figure 5-4](#9781430249382_Ch05.xhtml#Fig4), you could also add a custom machine
    size to meet your business needs and select that for your cloud.


    ![9781430249382_Fig05-04.jpg](images/9781430249382_Fig05-04.jpg)


    [Figure 5-4](#9781430249382_Ch05.xhtml#_Fig4). Adding a custom machine size


    After you select the machine size, you can define the settings for infrastructure
    requests for the IaaS users. As you can see in [Figure 5-5](#9781430249382_Ch05.xhtml#Fig5),
    you can indicate whether someone can reserve the cloud resources, how long the
    resource can be requested, whether the management agent should be configured,
    and more.


    ![9781430249382_Fig05-05.jpg](images/9781430249382_Fig05-05.jpg)


    [Figure 5-5](#9781430249382_Ch05.xhtml#_Fig5). Defining settings for requests


    You can also create and select user roles and set up access control for the roles.
    As you can see in [Figure 5-6](#9781430249382_Ch05.xhtml#Fig6), you can assign
    quotas, zones, and network profiles to the roles.


    ![9781430249382_Fig05-06.jpg](images/9781430249382_Fig05-06.jpg)


    [Figure 5-6](#9781430249382_Ch05.xhtml#_Fig6). Configuring roles


    You can also add software components to the infrastructure while setting it up.
    Finally, you could set up the chargeback and metering parameters for infrastructure
    resources during the setup phase and publish the infrastructure cloud resources
    for usage by cloud users. Oracle Enterprise Manager helps set up the database
    or middleware cloud out of the box in addition to the infrastructure cloud example
    shown here.


    There can be different administration tasks and roles during the cloud setup phase.
    The cloud administrator can be someone who sets up the cloud infrastructure including
    systems, database, or any other cloud resource offered as a service. A self-service
    administrator can be the administrator at the business units or any other cloud
    tenant who sets up the quota and roles for their users.


    Some of the typical tasks associated with cloud administrators are provisioning
    bare-metal hypervisors, configuring storage arrays and the network, creating server
    pools, and defining zones based on functional and operational boundaries. They
    also configure the policies and access control of the Software Library for the
    cloud users.'
