- fmt: 'When you run an `emctl` command, the output from that command is captured
    in the `emctl.log` file, located under the `$AGENT_HOME/agent_inst/sysman/log`
    directory. (Some commands also display their output to `stdout`.) More details
    on agent log and trace files are given in the upcoming section cleverly named
    “Agent Log and Trace Files.”.


    ## The EMCLI Utility


    Before you look at agent log and trace files in more detail, though, let’s examine
    the other command-line utility for managing agents, the Enterprise Manager Command
    Line Interface utility (`EMCLI`). The `EMCLI` utility is mainly used for automating
    commands that need to be executed against a large number of targets, because scripting
    this can be much faster than selecting each target to process the operation on
    via the EM console.


    As an example, let’s say you have a group of Production databases called `ProdDB`
    that are administered by someone who is leaving the organization. If you have
    500 databases in that group, you wouldn’t want to update the `Contact` lifecycle
    properties one by one. Instead, you could do the following:


    ```

    emcli set_target_property_value -property_records="ProdDB:composite:Contact:psharman"
    -propagate_to_members

    ```


    This changes the contact details to the `psharman` user ID for all 500 databases
    in one fell swoop.


    One of the main advantages of using `EMCLI` over `EMCTL`, though, is that `EMCLI`
    has a client that can be installed on any system that can reach the `OMS`. That
    means it can be executed anywhere in your managed environment. Many Cloud Control
    administrators install `EMCLI` on their local machine, for example. `EMCLI` also
    allows you to call custom scripts such as TCL, Perl, SQL, or OS scripts.


    From an architectural perspective, there are two parts to `EMCLI`. There is the
    `EMCLI` client (the part that you install where you want to) and an `OMS` extension,
    which is automatically installed in the `OMS`. The Java-based client sends command
    requests using `emcli` verbs to the `OMS` extension, which passes them on to the
    `OMS` to action. These verbs are plug-in extensions that contain the relevant
    command and options.


    Installation of the `EM CLI` client is done by first downloading the `EMCLI` kit
    to the location where you want to install it. The kit can be downloaded from the
    EM console, by choosing `Command Line Interface` from the `Setup` menu, as shown
    in [Figure 3-10](#9781430249382_Ch03.xhtml#Fig10).


    ![9781430249382_Fig03-10.jpg](images/9781430249382_Fig03-10.jpg)


    [Figure 3-10](#9781430249382_Ch03.xhtml#_Fig10). Accessing the EM CLI kit


    Once you have downloaded and installed the `EM CLI` kit, you have access to only
    a few of the basic verbs, such as `help`, `login`, `logout`, and `setup`. To set
    up the client completely, you need to execute the command `emcli setup`. At a
    minimum, you need to pass parameters for the EM console and username that you
    want to use for logging in with `emcli` (this username is the one you normally
    log into the console with), but I find it useful sometimes to include the `-autologin`
    parameter. This parameter ensures that you are automatically logged back in if
    your session times out.


    `Caution` Use the `-autologin` parameter only if the workstation you are installing
    the client on is secured, particularly if the username you also pass in has Super
    Administrator–level access.


    As an example, here’s a command executed to complete setup on a local workstation:


    ```

    $ ./emcli setup -url=https://em12.acme.com/em -username=psharman -autologin

    ```


    Once the command completes, you will have access to all the verbs `EMCLI` recognizes.
    There are way too many to describe here, but executing the command `emcli help`
    will list them for you. It provides quite a long listing, so you may want to redirect
    the output to a file for easier perusal. You can get detailed help on any particular
    verb by passing that verb as an argument to the `help` command. For example, `emcli
    help setup` gives you more detailed help on the `setup` verb. There is also a
    complete manual on the `EMCLI` utility available in the `EM12c` documentation
    set ( [http://docs.oracle.com/cd/E24628_01/em.121/e17786/toc.htm](http://docs.oracle.com/cd/E24628_01/em.121/e17786/toc.htm)
    ).


    ## Agent Log and Trace Files


    When you install a management agent, you are prompted for an `AGENT_BASE` directory.
    This directory is similar to the `ORACLE_BASE` directory used in database installations.
    Underneath it, you will find the agent instance directory (`agent_inst`, which
    contains all the agent-related configuration files), as well as the management
    agent home. The management agent home will be `<AGENT_BASE>/core/12.1.0.2.0`.
    Obviously, the version number in the directory name reflects the version number
    for the agent, so depending on your installation, this number may differ from
    the example just given. Most of the agent log and trace files you will need are
    found somewhere under this management agent home directory. Some of the directories
    you may need to look at to find information are shown in [Table 3-2](#9781430249382_Ch03.xhtml#Tab2).
    In this table, `<AGENT_HOME>` refers to the management agent home (for example,
    `<AGENT_BASE>/core/12.1.0.2.0`), while `<AGENT_INST>` refers to the agent instance
    directory (for example, `<AGENT_BASE>/agent_inst`).


    [Table 3-2](#9781430249382_Ch03.xhtml#_Tab2). Locations of Agent Log and Trace
    Files


    | Type of Information | Location |

    | --- | --- |

    | Agent heartbeat history | `<AGENT_INST>/sysman/log/gcagent.log` |

    | Agent startup information for both agent and watchdog | `<AGENT_INST>/sysman/log/emagent.nohup`
    |

    | Agent trace files | `<AGENT_INST>/sysman/log/*.trc` |

    | Configuration assistant errors | `<AGENT_HOME>/cfgtoollogs/cfgfw/CfmLogger_<timestamp>.log`
    |

    | `emctl` command output | `<AGENT_INST>/sysman/log/emctl.log` |

    | Errors on securing agent | `<AGENT_INST>/sysman/log/secure.log` |

    | System state dumps | `<AGENT_INST>/sysman/emd/dumps/SystemDump_<number>.xml`
    |


    `Note` The watchdog referred to in [Table 3-2](#9781430249382_Ch03.xhtml#Tab2)
    is the agent watchdog. When the agent is started, it also starts an agent watchdog
    process whose role is to monitor the agent and attempt to restart it should it
    fail.


    You can control the number and size of these files by using an `emctl` command.
    By default, the agent writes only informational, warning, and critical messages
    to the trace file, but you can change the level of information written by using
    the following command:


    ```

    $ emctl set property agent -name "Logger.log.level" -value "<LEVEL>"

    ```


    where `<LEVEL>` is one of the following values—`DEBUG`, `INFO`, `WARN`, `ERROR`,
    or `FATAL`. Because this can generate large amounts of information, you can restrict
    that by setting different values for `-name`. However, it is best to do this only
    under guidance from Oracle Support, so contact them if needed.


    ## Oracle Management Service


    Let’s move on now to discuss the Oracle Management Service (`OMS`). As mentioned
    in [Chapter 1](#9781430249382_Ch01.xhtml), the `OMS` is a web-based application
    that communicates with the agents and the Oracle Management Repository to collect
    and store information about all the targets on the various agents. The `OMS` is
    also responsible for rendering the user interface for the console. Like the agent,
    the `OMS` can be controlled via both the `EM12c` console and the command-line
    utilities. Let’s start by looking at the console in more detail.


    ### OMS Management with the Console'
