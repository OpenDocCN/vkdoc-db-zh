    \  Role:                    PRIMARY\n  Intended State:          TRANSPORT-ON\n\
    \  Instance(s):\n    emrep2\n\nDatabase Status:\nSUCCESS\n\nDGMGRL> show database\
    \ emrep;\n\nDatabase - emrep\n\nRole:            PHYSICAL STANDBY\n  Intended\
    \ State:  APPLY-ON\n  Transport Lag:   0 seconds\n  Apply Lag:       0 seconds\n\
    \  Real Time Query: OFF\n  Instance(s):\n    emrep\n\nDatabase Status:\nSUCCESS\n\
    ```\n\n此处，你可以看到数据库的角色已成功更改。下一步是重新配置 OMS 以使用新的主数据库。\n\n## 5. 如果 Admin Server 尚未运行，请启动它。\n\
    \n```\nemctl start oms –admin_only\n```\n\n## 6. 使用新的主数据库存储库配置 OMS。\n\n```\n$OMS_HOME/bin/emctl\
    \ config oms -store_repos_details -repos_conndesc \"(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oem3)(PORT=1522)))\n\
    (CONNECT_DATA=(SID=emrep2)))\" -repos_user sysman\nOracle Enterprise Manager Cloud\
    \ Control 12c Release 2\nCopyright (c) 1996, 2012 Oracle Corporation.  All rights\
    \ reserved.\nEnter Repository User's Password :\n```\n\n## 7. 启动 OMS。\n\n```\n\
    emctl start oms\n```\n\n## 8. 重新定位管理存储库目标。OMS 上的管理代理会监控 OMS 和管理存储库目标。切换后，需要更新存储库目标以反映已切换过来的存储库数据库，即新的主数据库。\n\
    \n```\nemctl config emrep –agent <central_agent_name> -conn_desc <conn_desc_of_new_primary>\n\
    ```\n\n使用 Data Guard 对管理存储库进行故障转移与切换类似，区别在于使用 DGMGRL 发出的命令将是 `failover to <standby_db_name>`。\n\
    \n除了使用上述手动步骤外，你还可以利用 Data Guard 快速启动故障转移功能自动化 OMS 和管理存储库的故障转移：\n\n*   快速启动故障转移通过一个独立于主备服务器运行的\
    \ Observer 进程来判断何时需要故障转移到备用数据库。如果 Observer 在一段可配置的时间内无法联系到主站点，它将自动故障转移到备用数据库。\n\
    *   故障转移发生后，会触发一个名为 `DB_ROLE_CHANGE` 的数据库事件。\n*   `DB_ROLE_CHANGE` 事件会触发一个触发器，该触发器进而启动\
    \ Enterprise Manager 应用层。\n\n可以创建一个脚本来自动化这些步骤。使用 `<OMS_HOME>/sysman/ha` 目录中提供的示例脚本，创建一个用于配置\
    \ OMS 指向新的主数据库并启动所有管理服务的脚本。清单 13-1 是一个脚本示例，它将在备用站点启动 OMS 并重新配置 OMS 使其使用在 Data\
    \ Guard 配置中切换过来的新主管理存储库数据库。\n\n## 清单 13-1. 在备用站点启动 EM 层的示例脚本\n\n```\n#!/bin/sh\n\
    LOGFILE=\"/oms_swlib/em/failover/em_failover.log\"\nOMS_ORACLE_HOME=\"/u01/app/oracle/Middleware/oms\"\
    \nCENTRAL_AGENT=\"oem2.example.com:3872\"\nSYSMAN_PWD=\"oracle12c\"\n\n#log message\n\
    echo \"###############################\" >> $LOGFILE\ndate >> $LOGFILE\necho $OMS_ORACLE_HOME\
    \ >> $LOGFILE\nid >>  $LOGFILE 2>&1\n\n#switch all OMS to point to new primary\
    \ and startup all OMS\n$OMS_ORACLE_HOME/bin/emctl config oms -store_repos_details\
    \ -repos_conndesc \"(DESCRIPTION=(ADDRESS_LIST=(ADDRESS=(PROTOCOL=TCP)(HOST=oem1)(PORT=1521)))\n\
    (CONNECT_DATA=(SID=emrep2)))\" \\\n-repos_user sysman –repos_pwd $SYSMAN_PWD >>\
    \ $LOGFILE 2>&1\n$OMS_ORACLE_HOME/bin/emctl sync_opss_policy_store \\\n-sysman_pwd\
    \ oracle12c  >> $LOGFILE 2>&1\n$OMS_ORACLE_HOME/bin/emctl stop oms >>  $LOGFILE\
    \ 2>&1\n$OMS_ORACLE_HOME/bin/emctl start oms >>  $LOGFILE 2>&1\n\n#relocate Management\
    \ Services and Repository target\n#to be done only once in a multiple OMS setup\n\
    #allow time for OMS to be fully initialized\n$OMS_ORACLE_HOME/bin/emctl config\
    \ emrep -agent $CENTRAL_AGENT \\\n-conn_desc -sysman_pwd $SYSMAN_PWD >> $LOGFILE\
    \ 2>&1\n\n#always return 0 so that dbms scheduler job completes successfully\n\
    exit 0\n```\n\n清单 13-2 中的示例脚本创建了一个触发器，该触发器将在切换或故障转移操作期间发生 `DB_ROLE_CHANGE` 事件时被触发。此触发器随后将调用前面的脚本以启动\
    \ Enterprise Manager 层。\n\n## 清单 13-2. 数据库角色变更触发器示例"
