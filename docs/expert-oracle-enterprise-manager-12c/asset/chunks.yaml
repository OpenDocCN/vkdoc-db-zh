    \n要访问管理代理设置页面（如 图 11-52 所示），请选择 **设置** → **代理**。\n\n![9781430249382_Fig11-52.jpg](img/9781430249382_Fig11-52.jpg)\n\
    \n图 11-52. EM12c 中的管理代理\n\n选择需要包含在任务中的代理。然后单击要执行的任务。任务包括以下选项：\n\n*   阻止/取消阻止\n\
    *   启动/关闭/重新启动\n*   重新保护/保护/取消保护\n*   属性\n\n您可以单击其中一个任务按钮，然后“创建作业”页面会要求您提交 EM\
    \ 作业的标准信息（参见 图 11-53）。\n\n![9781430249382_Fig11-53.jpg](img/9781430249382_Fig11-53.jpg)\n\
    \n图 11-53. 有关代理控制作业的常规信息\n\n这是一个非常出色的功能，可协助完成需要代理关闭然后重新启动的重复性维护任务，无需您登录每个控制台单独执行任务。\n\
