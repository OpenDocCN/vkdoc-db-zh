    *   `Discovery of Specific Oracle Components`: 作业也会被安排用于通过 EM 控制台在指定的 Oracle 目标上发现
    Oracle 组件。这种自动发现通过从服务器动态提取配置和目标信息来节省时间和精力，确保任何目标的正确配置。

    *   `Log Rotation`: 如果日志、跟踪文件和 Enterprise Manager 日志变得太大，可能会难以管理。这种作业类型可以在 EM
    Jobs 界面中创建，用于管理您定期访问和监控的许多数据库日志。

    *   `OPatch Updates`: EM12c 的另一种新作业类型，自动化的 `OPatch` 更新确保您在 EM12c 环境中监控的每个目标上都安装了最新版本的
    `OPatch` 实用程序。

    *   `OS Commands`: 这种作业类型允许您将现有的 `OS` 脚本从 `cron` 调度程序或其他 `OS` 级调度程序迁移到 Enterprise
    Manager 控制台内的单一调度程序中。通过迁移到 EM Jobs 界面，在 EM 中断期间无需再通过第二个调度程序进行管理，所有操作都可以通过单一界面管理。

    *   `RMAN`: 所有的 `Recovery Manager` 作业，虽然通过 EM 控制台中的 `RMAN` 界面创建，但它们会在 Job Activity
