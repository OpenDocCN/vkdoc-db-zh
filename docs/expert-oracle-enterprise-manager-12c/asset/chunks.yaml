    Monitor 视图可快速提醒开发人员或分析师可能出现异常的情况，这些情况在 EM12c 中不太可能升级为事件，但仍可能需要管理员的协助。在开发生命周期中，这能为数据库团队成员提供另一种方式，以可视化方式监控开发和测试阶段发生的情况。


    虽然 Top Activity 和 ASH Analytics 共享 SQL ID 和用户会话的详细信息页面，但 SQL Monitor 仅与用户会话和 CPU
    使用率共享会话详细信息。对于 SQL ID，SQL Monitor 拥有自己独立的性能页面，其数据基于 EM12c 控制台执行 `DBMS_SQLTUNE.REPORT_SQL_MONITOR`
    来填充主 SQL 监控页面。


    图 9-38 展示了当 EM12c 控制台执行 `report_level=>''ALL''` 时，该报告的图形化表示。同样可以通过命令行使用该软件包来执行此报告，但
    EM12c SQL Monitor 界面能方便地以用户友好的格式填充和显示数据，方便管理员使用。


    ![9781430249382_Fig09-38.jpg](img/9781430249382_Fig09-38.jpg)


    **图 9-38** SQL Monitor 为快照中涉及的 `SQL_IDs` 生成的“受监控 SQL 执行详细信息”报告的下方窗格


    通过简单地单击左上角的“指标”按钮，可以调整视图以显示 SQL 特定的指标，如 图 9-39 所示。在调查有影响的 SQL 语句时，这些数据可能非常详细且有价值。


    ![9781430249382_Fig09-39.jpg](img/9781430249382_Fig09-39.jpg)


    **图 9-39** 与图 9-37 中 SQL Monitor 报告同一报告时间的指标使用情况，显示了以字节为单位的 CPU 和 I/O 读写请求


    图 9-39 显示了报告中 CPU 和 I/O 读写请求，而 图 9-40 则显示了 I/O 吞吐量和 PGA 使用率的结果。这些数据显示了语句的 CPU
    使用率和 CPU 等待。通过获取这些数据并交叉比对高点/低点，你可以清晰地了解读写请求如何受到 CPU 使用率和 CPU 等待的影响。


    ![9781430249382_Fig09-40.jpg](img/9781430249382_Fig09-40.jpg)


    **图 9-40** SQL Monitor 展示以字节为单位的读写 I/O 吞吐量


    通过检查 I/O 吞吐量并将其与 PGA 进行比较，你还可以精确定位排序和哈希操作可能在 PGA 内发生的时间，以及它何时可能“交换”到临时空间（导致因临时表空间读/写而产生更高的
    I/O）。


    最后一部分如 图 9-41 所示，显示了特定的临时空间使用情况。对于 DSS 和 OLAP 环境，了解临时空间使用情况非常有帮助。SQL Monitor 在
    SQL Monitor 详细报告中显示此信息。


    ![9781430249382_Fig09-41.jpg](img/9781430249382_Fig09-41.jpg)


    **图 9-41** SQL Monitor 报告中的临时空间使用情况，以图表形式显示


    使用这些特定的 SQL Monitor 图表可提供高级视图，详细展示了从 SQL 视角监控数据库活动之外的有价值使用领域。管理员可能需要查询一段时间内的任何这些领域或它们的组合，而
    SQL Monitor 始终可用，并能清晰地绘制出每个领域的近期使用情况。


    # SQL Performance


    数据库目标主页中的 SQL 子菜单具有众多选项，包括：


    *   SQL Performance Analyzer

    *   SQL Access Advisor

    *   SQL Tuning Advisor

    *   SQL Tuning Sets

    *   SQL Plan Control

    *   Optimizer Statistics


    ## SQL Performance Analyzer


    SQL Performance Analyzer 虽然可通过“性能”下拉菜单轻松访问，但它属于 EM12c Advisor Central 功能的一部分。该分析器提供了一个简单的向导来测试和分析数据库环境的变更将如何影响
    SQL 调优集。


    这使你能够在不影响用户的会话级环境中测试以下内容：


    *   版本兼容性变更

    *   参数变更

    *   优化器统计信息

    *   Exadata 模拟

    *   引导式工作流


    通过单击任何链接并完成向导，可以创建 SQL Performance Analyzer 任务。这些任务随后被安排为 EM12c 环境中的 EM 作业。你可以通过手动刷新界面视图，或者保持“查看数据”选项为其默认设置（使用
    15 秒间隔）来检查状态。


    ## SQL Access Advisor


    SQL Access Advisor 提供了一个图形界面，用于评估数据库中现有对象的效率，或推荐可能通过物理优化选项提高性能的新对象。图 9-42 显示了界面中可用的初始顾问选项。


    ![9781430249382_Fig09-42.jpg](img/9781430249382_Fig09-42.jpg)


    **图 9-42** 针对数据库目标的 SQL Access Advisor 性能选项


    SQL Access Advisor（可从“性能”下拉菜单访问，但属于 Advisor Central 功能）有两个选项。第一个选项检查当前对象，并根据系统中已有的内容提出建议。第二个选项检查历史
    SQL，以推荐可能有助于提升性能的索引和物化视图。与任何顾问一样，在实施 SQL Access Advisor 的建议之前，你必须审查并验证它们。


    ## SQL Tuning Sets


    *SQL 调优集* 是一组 SQL 语句的集合，可以通过执行模式、应用程序模块/操作或一组绑定变量、游标提取、执行次数、命令类型或优化器成本来进行绑定。


    SQL 调优集可以迁移到其他数据库，允许管理员在其他环境上执行调优测试。生产性能问题可以迁移到二级测试环境，以复制遇到的问题并测试解决场景。


    ![image](img/sq.jpg) `注意` 对于希望了解其数据库环境中使用情况和优化的管理员来说，理解 SQL 至关重要。SQL Tuning Advisor
    和 SQL Access Advisor 利用 SQL 调优集来提供优化 Oracle 环境的最佳建议。


    ## SQL Plan Control


    控制性能的另一个选项是创建和存储 SQL 计划。SQL 计划是 SQL 配置文件使用的功能之一，可以通过从数据库性能主页单击 `Performance ->
    SQL -> SQL Plan Control` 在 SQL 计划部分查看（参见 图 9-43）。


    拥有一个统一视图来管理所有计划控制的好处在于，如果某个语句发生了变化，并且需要确认计划控制是否到位，DBA 可以轻松地从面板访问和验证，而无需去搜索 SQL
    ID。


    ![9781430249382_Fig09-43.jpg](img/9781430249382_Fig09-43.jpg)


    **图 9-43** 作为 SQL 配置文件一部分创建的 SQL 计划


    ## Optimizer Statistics'
- fmt: '# Oracle数据库统计信息与EM12c管理工具


    统计信息是Oracle基于成本的优化器（CBO）的核心。随着管理员对性能和优化的知识加深，他们对统计信息的了解也必须相应增长。EM12c提供了多个图形用户界面以降低对命令行的要求，但理解统计信息如何帮助CBO做出优化选择，是任何Oracle数据库专家技能组合的关键。


    图形化的收集、恢复、锁定和管理统计信息的选项，是管理员手中的强大工具。在EM12c中，数据库目标的“性能”下拉菜单使您可以设置优化器统计信息的默认选项，并解决与CBO相关的性能问题（参见[图
    9-44](#9781430249382_Ch09.xhtml#Fig44)）。


    ![9781430249382_Fig09-44.jpg](images/9781430249382_Fig09-44.jpg)


    [图 9-44](#9781430249382_Ch09.xhtml#_Fig44). 在EM12c性能控制台中管理优化器统计信息


    每个链接都访问管理数据库统计信息的不同区域。这包括操作任务。从下方区域，您可以访问对象级和全局级统计信息，以及进行计划和自动化。


    ## Cloud Control SQL历史记录


    与其他SQL历史不同，Cloud Control SQL历史记录包含了EM12c为管理和监控数据库环境而执行的SQL。该视图不仅提供`SQL_TEXT`，还提供开始时间、持续时间和URL（参见[图
    9-45](#9781430249382_Ch09.xhtml#Fig45)）。URL非常有价值，因为它提供了足够的描述信息，告诉您是哪个EM12c功能执行了该SQL。


    ![9781430249382_Fig09-45.jpg](images/9781430249382_Fig09-45.jpg)


    [图 9-45](#9781430249382_Ch09.xhtml#_Fig45). 来自Cloud Control的关于一条SQL语句的信息，该语句由EM12c中的SQL
    Monitor发出


    如果您对性能有疑问或正在调查问题，还可以发出特定于EM12c操作的跟踪。您只需点击Cloud Control SQL历史记录界面右上角的按钮，即可启用或禁用跟踪。


    ![image](images/sq.jpg) **注意** Cloud Control SQL历史记录是一个弹出窗口，与EM12c环境中的大多数其他功能不同。要使此功能正常工作，您必须在Enterprise
    Manager中启用弹出窗口。


    ## Advisor Central


    如[图 9-46](#9781430249382_Ch09.xhtml#Fig46)所示的Advisor主页，是EM12c控制台中查看、调度和管理Oracle顾问的一站式位置。但是，您应该意识到，许多功能也可从数据库管理界面的“性能”下拉菜单中获得。


    ![9781430249382_Fig09-46.jpg](images/9781430249382_Fig09-46.jpg)


    [图 9-46](#9781430249382_Ch09.xhtml#_Fig46). Advisor Central，显示了选项卡选项和主要可用的顾问


    Advisor Central采用双选项卡设置，默认为“Advisors”页面。此页面提供运行ADDM报告以及检查撤销管理性能、段顾问、SQL顾问等的选项。


    第二个选项卡“Checkers”提供了用于数据库完整性检查的各种选项（参见[图 9-47](#9781430249382_Ch09.xhtml#Fig47)）。


    ![9781430249382_Fig09-47.jpg](images/9781430249382_Fig09-47.jpg)


    [图 9-47](#9781430249382_Ch09.xhtml#_Fig47). Advisor Central的数据库完整性检查器选项


    EM12c控制台中每个数据库目标的“性能”部分，提供了对数据库的深入洞察，以及针对其长期健康的优化选项。


    ## 紧急监控


    紧急监控使您能够监控无响应数据库的基本处理和数据库信息。这种专有机制可通过EM12c和Enterprise Manager命令行界面（`EMCLI`）使用，允许管理员诊断性能问题、进行挂起分析并终止阻塞会话。


    紧急监控需要`SYSDBA`访问权限和DB主机访问权限，以便Oracle用户能够成功实施。


    ## 实时ADDM


    对于管理员来说，一个棘手的场景是数据库挂起。决定是否快速重启数据库（从而移除导致挂起情况的障碍，但通常会丢失所有用于诊断原因的宝贵数据）的难题，促使Oracle提供了实时ADDM。


    实时ADDM提供对缓慢或挂起的数据库系统的实时分析，并诊断死锁、性能影响和资源争用（参见[表 9-3](#9781430249382_Ch09.xhtml#Tab3)）。实时ADDM功能使用`DB
    Time`作为所有性能测量的基础。它还识别已发生的任何配置更改，权衡两组指标以进行报告和比较。


    [表 9-3](#9781430249382_Ch09.xhtml#_Tab3). 可使用实时ADDM解决的不可访问监控问题


    ![Table9-3.jpg](images/Table9-3.jpg)


    由于实时ADDM只建立轻量级连接（也称为到SGA的直接连接），通过绕过SQL层并通过代理连接，无需任何额外的锁定或资源，因此它能够完成传统连接类型无法实现的连接。


    实时ADDM可以多种方式分析返回到数据库的数据，包括通过SQL层和JDBC连接。


    当性能在一天或一小时内发生变化时，可以使用实时ADDM分析发生了哪些更改，并验证新的批处理作业、工作负载或配置更改。


    实时ADDM可从任何EM12c数据库目标的“性能”下拉菜单中获得。[图 9-48](#9781430249382_Ch09.xhtml#Fig48)显示了ADDM控制台的登录对话框。


    ![9781430249382_Fig09-48.jpg](images/9781430249382_Fig09-48.jpg)


    [图 9-48](#9781430249382_Ch09.xhtml#_Fig48). 登录实时ADDM控制台需要`SYSDBA`凭据


    分析可以在单实例、RAC环境，甚至是Exadata等工程化系统上执行。


    如图9-49所示的“Top Activity”视图显示了大约1小时的数据，以及大约10分钟的先前ASH数据，因此您可以检查导致数据库挂起的问题。


    ![9781430249382_Fig09-49.jpg](images/9781430249382_Fig09-49.jpg)


    图 9-49. 通过实时ADDM的Top Activity视图


    顶部部分看起来与Top Activity非常相似，但实际上来源于ASH数据。


    要开始实时ADDM分析，您需要点击[图 9-50](#9781430249382_Ch09.xhtml#Fig50)中所示的“Start”按钮。


    ![9781430249382_Fig09-50.jpg](images/9781430249382_Fig09-50.jpg)


    [图 9-50](#9781430249382_Ch09.xhtml#_Fig50). EM12c的实时ADDM分析界面


    如果数据库处于挂起状态，将显示状态，通知数据库无法接受连接。实时ADDM将继续验证凭据，提供要使用的连接选项，并执行挂起分析。


    生成的报告显示在六个选项卡视图中，包括“Progress”选项卡、“General Findings”、“Hardware Resources”（详细说明发现的任何硬件问题）、“Activity”（提供数据库会话分析）、“Hang
    Data”（提供特定于数据库挂起原因的信息）以及“Statistics”（提供分析报告的详细信息）。


    在实时ADDM界面的右上角，可以选择将结果以HTML格式保存或通过电子邮件发送。


    ## ADDM比较报告


    管理员经常面临两个时间段内性能存在差异的情况，而实际上不应该发生这种情况。执行两个ADDM报告的因果分析功能，可作为ADDM比较报告的一部分提供。'
  raw: 'Statistics are the core of Oracle’s Cost-Based Optimizer (CBO.) As an administrator
    deepens their knowledge of performance and optimization, their knowledge of statistics
    must increase as well. EM12c offers a number of graphical user interfaces to lessen
    demands on command-line requirements, but the knowledge of how statistics help
    the CBO make optimization choices is a key to any Oracle database specialist’s
    skill set.


    Graphic options to gather, restore, lock, and manage statistics are a powerful
    tool in the hands of an administrator. The Performance drop-down menu of the database
    target in EM12c enables you to set default options for optimizer statistics, along
    with addressing performance issues with the CBO (see [Figure 9-44](#9781430249382_Ch09.xhtml#Fig44)).


    ![9781430249382_Fig09-44.jpg](images/9781430249382_Fig09-44.jpg)


    [Figure 9-44](#9781430249382_Ch09.xhtml#_Fig44). Managing optimizer statistics
    in the EM12c Performance console


    Each of the links accesses a different area for managing database statistics.
    This includes operational tasks. From a lower section, you can access object-level
    and global-level statistics, along with scheduling and automating.


    Cloud Control SQL History


    The Cloud Control SQL History, unlike history from other SQL, includes SQL executed
    by EM12c for managing and monitoring the database environment. The view provides
    not just SQL_TEXT, but the start time, the duration and the URL (see [Figure 9-45](#9781430249382_Ch09.xhtml#Fig45)).
    The URL is extremely valuable, as it is descriptive enough to inform you which
    EM12c feature was responsible for the SQL executed.


    ![9781430249382_Fig09-45.jpg](images/9781430249382_Fig09-45.jpg)


    [Figure 9-45](#9781430249382_Ch09.xhtml#_Fig45). Information regarding a SQL statement
    from the cloud control that was issued by the SQL Monitor in EM12c


    You can also issue an EM12c operation-specific trace if concerned about performance
    or investigating an issue. You can enable or disable the trace by simply clicking
    a button at the top-right side of the Cloud Control SQL History interface.


    ![image](images/sq.jpg) **Note**  Cloud Control SQL History is a pop-up, unlike
    most other features within the EM12c environment. For this feature to function
    correctly, you must enable pop-ups in Enterprise Manager.


    Advisor Central


    The Advisor home, shown in [Figure 9-46](#9781430249382_Ch09.xhtml#Fig46), is
    the one-stop location in the EM12c console for viewing, scheduling, and managing
    Oracle’s advisors. However, you should be aware that many of the features are
    also available from the Performance drop-down menu in the Database Management
    interface.


    ![9781430249382_Fig09-46.jpg](images/9781430249382_Fig09-46.jpg)


    [Figure 9-46](#9781430249382_Ch09.xhtml#_Fig46). Advisor Central, displaying the
    tab options and main advisors available


    Advisor Central has a two-tab setup, defaulting to the Advisors page. This page
    offers options to run ADDM reports and to check on undo management performance,
    segment advisors, SQL Advisors, and others.


    The second tab, Checkers, offers a wide variety of options for integrity checks
    of the database (see [Figure 9-47](#9781430249382_Ch09.xhtml#Fig47)).


    ![9781430249382_Fig09-47.jpg](images/9781430249382_Fig09-47.jpg)


    [Figure 9-47](#9781430249382_Ch09.xhtml#_Fig47). Advisor Central’s database integrity
    checker options


    The Performance section of each database target in the EM12c console offers incredible
    insight into the database, along with optimizing options for its long-term health.


    Emergency Monitoring


    Emergency Monitoring enables you to monitor basic processing and database information
    of an unresponsive database. The proprietary mechanism is available through EM12c
    and the Enterprise Manager Command Line Interface (EMCLI) and allows the administrator
    to diagnose performance issues, conduct hang analysis, and kill blocking sessions.


    Emergency Monitoring requires SYSDBA access and DB Host access for the Oracle
    user to successfully implement.


    Real-Time ADDM


    A troubling scenario for an administrator is a hung database. The conundrum of
    deciding whether to quickly bounce the database—thereby removing the obstacle
    causing the hang situation but often losing all valuable data to diagnose the
    cause—has resulted in Oracle offering Real-Time ADDM.


    Real-Time ADDM offers real-time analysis of a slow or hung database system and
    diagnoses deadlocks, performance impacts, and resource contention (see [Table
    9-3](#9781430249382_Ch09.xhtml#Tab3)). The Real-Time ADDM feature uses DB Time
    as the basis for all performance measurements. It also identifies any configuration
    changes that have occurred, weighing both sets of metrics to report and compare.


    [Table 9-3](#9781430249382_Ch09.xhtml#_Tab3). Inaccessible Monitoring Issues That
    Can Be Solved with Real-Time ADDM


    ![Table9-3.jpg](images/Table9-3.jpg)


    As Real-Time ADDM makes only a lightweight connection, also referred to as a *direct
    connection to the SGA* without requiring any additional locking or resources by
    bypassing the SQL layer and connecting through the agent, it is able to complete
    connections that would otherwise be impossible with traditional connection types.


    Real-Time ADDM can analyze data returned numerous ways to the database, including
    the SQL layer and JDBC connection.


    When performance changes in the matter of a day or an hour, Real-Time ADDM can
    be used to analyze what changes were made, and to verify new batch jobs, workloads,
    or configuration changes.


    Real-Time ADDM is available from the Performance drop-down menu from any EM12c
    database target. [Figure 9-48](#9781430249382_Ch09.xhtml#Fig48) shows the login
    dialog box for the ADDM console.


    ![9781430249382_Fig09-48.jpg](images/9781430249382_Fig09-48.jpg)


    [Figure 9-48](#9781430249382_Ch09.xhtml#_Fig48). Logging in to the Real-Time ADDM
    console requires SYSDBA credentials


    The analysis can be performed on a single instance, RAC environment, or even an
    engineered system, such as Exadata.


    The Top Activity view, shown in Figure 9-49, displays about 1 hour of data, along
    with approximately 10 minutes of previous ASH data, so you can inspect for issues
    that are the cause of a database hang.


    ![9781430249382_Fig09-49.jpg](images/9781430249382_Fig09-49.jpg)


    Figure 9-49.  Top Activity view through Real-Time ADDM


    The top section appears very similar to Top Activity, but is actually sourced
    from ASH data.


    To start the Real-Time ADDM analysis, you click the Start button, shown in [Figure
    9-50](#9781430249382_Ch09.xhtml#Fig50).


    ![9781430249382_Fig09-50.jpg](images/9781430249382_Fig09-50.jpg)


    [Figure 9-50](#9781430249382_Ch09.xhtml#_Fig50). Real-Time ADDM analysis interface
    for EM12c


    If the database is in a hung state, the status will be shown, notifying of the
    database’s inability to accept connections. Real-Time ADDM will proceed with verifying
    credentials, providing connection options to be used, and performing hang analysis.


    The report generated is displayed in six tab views, including the Progress tab,
    General Findings, Hardware Resources (detailing any hardware issues that are discovered),
    Activity (providing analysis of database sessions), Hang Data (providing information
    specific to the cause of the database hang), and Statistics (providing details
    on the analysis report).


    The option to save or e-mail the results in HTML format is available at the upper-right
    corner of the Real-Time ADDM interface.


    ADDM Comparison Report


    Often the administrator is faced with performance differences in two time periods,
    when none should occur. The ability to perform a cause-to-effect analysis for
    two ADDM reports is available as part of the ADDM comparison report.'
  trans: '# Oracle 数据库统计信息与 EM12c 管理工具


    统计信息是 Oracle 基于成本的优化器（CBO）的核心。随着管理员对性能和优化的知识加深，他们对统计信息的了解也必须相应增长。EM12c 提供了多个图形用户界面以降低对命令行的要求，但理解统计信息如何帮助
    CBO 做出优化选择，是任何 Oracle 数据库专家技能组合的关键。


    图形化的收集、恢复、锁定和管理统计信息的选项，是管理员手中的强大工具。在 EM12c 中，数据库目标的“性能”下拉菜单使您可以设置优化器统计信息的默认选项，并解决与
    CBO 相关的性能问题（参见图 9-44）。


    ![9781430249382_Fig09-44.jpg](img/9781430249382_Fig09-44.jpg)


    图 9-44. 在 EM12c 性能控制台中管理优化器统计信息


    每个链接都访问管理数据库统计信息的不同区域。这包括操作任务。从下方区域，您可以访问对象级和全局级统计信息，以及进行计划和自动化。


    ## Cloud Control SQL 历史记录


    与其他 SQL 历史不同，Cloud Control SQL 历史记录包含了 EM12c 为管理和监控数据库环境而执行的 SQL。该视图不仅提供`SQL_TEXT`，还提供开始时间、持续时间和
    URL（参见图 9-45）。URL 非常有价值，因为它提供了足够的描述信息，告诉您是哪个 EM12c 功能执行了该 SQL。


    ![9781430249382_Fig09-45.jpg](img/9781430249382_Fig09-45.jpg)


    图 9-45. 来自 Cloud Control 的关于一条 SQL 语句的信息，该语句由 EM12c 中的 SQL Monitor 发出


    如果您对性能有疑问或正在调查问题，还可以发出特定于 EM12c 操作的跟踪。您只需点击 Cloud Control SQL 历史记录界面右上角的按钮，即可启用或禁用跟踪。


    ![image](img/sq.jpg) **注意** Cloud Control SQL 历史记录是一个弹出窗口，与 EM12c 环境中的大多数其他功能不同。要使此功能正常工作，您必须在
    Enterprise Manager 中启用弹出窗口。


    ## Advisor Central


    如图 9-46 所示的 Advisor 主页，是 EM12c 控制台中查看、调度和管理 Oracle 顾问的一站式位置。但是，您应该意识到，许多功能也可从数据库管理界面的“性能”下拉菜单中获得。


    ![9781430249382_Fig09-46.jpg](img/9781430249382_Fig09-46.jpg)


    图 9-46. Advisor Central，显示了选项卡选项和主要可用的顾问


    Advisor Central 采用双选项卡设置，默认为“Advisors”页面。此页面提供运行 ADDM 报告以及检查撤销管理性能、段顾问、SQL 顾问等的选项。


    第二个选项卡“Checkers”提供了用于数据库完整性检查的各种选项（参见图 9-47）。


    ![9781430249382_Fig09-47.jpg](img/9781430249382_Fig09-47.jpg)


    图 9-47. Advisor Central 的数据库完整性检查器选项


    EM12c 控制台中每个数据库目标的“性能”部分，提供了对数据库的深入洞察，以及针对其长期健康的优化选项。


    ## 紧急监控


    紧急监控使您能够监控无响应数据库的基本处理和数据库信息。这种专有机制可通过 EM12c 和 Enterprise Manager 命令行界面（`EMCLI`）使用，允许管理员诊断性能问题、进行挂起分析并终止阻塞会话。


    紧急监控需要`SYSDBA`访问权限和 DB 主机访问权限，以便 Oracle 用户能够成功实施。


    ## 实时 ADDM


    对于管理员来说，一个棘手的场景是数据库挂起。决定是否快速重启数据库（从而移除导致挂起情况的障碍，但通常会丢失所有用于诊断原因的宝贵数据）的难题，促使 Oracle
    提供了实时 ADDM。


    实时 ADDM 提供对缓慢或挂起的数据库系统的实时分析，并诊断死锁、性能影响和资源争用（参见表 9-3）。实时 ADDM 功能使用`DB Time`作为所有性能测量的基础。它还识别已发生的任何配置更改，权衡两组指标以进行报告和比较。


    表 9-3. 可使用实时 ADDM 解决的不可访问监控问题


    ![Table9-3.jpg](img/Table9-3.jpg)


    由于实时 ADDM 只建立轻量级连接（也称为到 SGA 的直接连接），通过绕过 SQL 层并通过代理连接，无需任何额外的锁定或资源，因此它能够完成传统连接类型无法实现的连接。


    实时 ADDM 可以多种方式分析返回到数据库的数据，包括通过 SQL 层和 JDBC 连接。


    当性能在一天或一小时内发生变化时，可以使用实时 ADDM 分析发生了哪些更改，并验证新的批处理作业、工作负载或配置更改。


    实时 ADDM 可从任何 EM12c 数据库目标的“性能”下拉菜单中获得。图 9-48 显示了 ADDM 控制台的登录对话框。


    ![9781430249382_Fig09-48.jpg](img/9781430249382_Fig09-48.jpg)


    图 9-48. 登录实时 ADDM 控制台需要`SYSDBA`凭据


    分析可以在单实例、RAC 环境，甚至是 Exadata 等工程化系统上执行。


    如图 9-49 所示的“Top Activity”视图显示了大约 1 小时的数据，以及大约 10 分钟的先前 ASH 数据，因此您可以检查导致数据库挂起的问题。


    ![9781430249382_Fig09-49.jpg](img/9781430249382_Fig09-49.jpg)


    图 9-49. 通过实时 ADDM 的 Top Activity 视图


    顶部部分看起来与 Top Activity 非常相似，但实际上来源于 ASH 数据。


    要开始实时 ADDM 分析，您需要点击图 9-50 中所示的“Start”按钮。


    ![9781430249382_Fig09-50.jpg](img/9781430249382_Fig09-50.jpg)


    图 9-50. EM12c 的实时 ADDM 分析界面


    如果数据库处于挂起状态，将显示状态，通知数据库无法接受连接。实时 ADDM 将继续验证凭据，提供要使用的连接选项，并执行挂起分析。


    生成的报告显示在六个选项卡视图中，包括“Progress”选项卡、“General Findings”、“Hardware Resources”（详细说明发现的任何硬件问题）、“Activity”（提供数据库会话分析）、“Hang
    Data”（提供特定于数据库挂起原因的信息）以及“Statistics”（提供分析报告的详细信息）。


    在实时 ADDM 界面的右上角，可以选择将结果以 HTML 格式保存或通过电子邮件发送。


    ## ADDM 比较报告


    管理员经常面临两个时间段内性能存在差异的情况，而实际上不应该发生这种情况。执行两个 ADDM 报告的因果分析功能，可作为 ADDM 比较报告的一部分提供。'
- fmt: '# ADDM 比较报告


    通过选择 **Performance ![arrow](images/arrow.jpg) AWR ![arrow](images/arrow.jpg) Compare
    Period ADDM** 路径，可以为任何数据库目标获取 `ADDM` 比较报告。点击链接后，系统会要求您提交有关相关时间线开始和结束时间的信息（参见 [图
    9-51](#9781430249382_Ch09.xhtml#Fig51)）。在下方区域，您可以从下拉选项中选择一个基础周期进行比较，选项包括前一个时间段、前一天或前一周。


    ![9781430249382_Fig09-51.jpg](images/9781430249382_Fig09-51.jpg)


    [图 9-51](#9781430249382_Ch09.xhtml#_Fig51). 为比较 `ADDM` 报告选择选项


    ![image](images/sq.jpg) **Note**  `ADDM` 比较报告要求在目标上为 `EM12c` 代理用户安装 `PL/SQL` 包以执行比较报告，默认情况下未安装。此安装通过
    `EM` 作业执行，可以立即实施或安排在以后的日期和时间执行。


    在 [图 9-52](#9781430249382_Ch09.xhtml#Fig52) 的示例中，展示了选择比较 `ADDM` 报告时的选项。可以选择最新偏移量、基线或自定义的开始和结束时间。


    ![9781430249382_Fig09-52.jpg](images/9781430249382_Fig09-52.jpg)


    [图 9-52](#9781430249382_Ch09.xhtml#_Fig52). `ADDM` 比较报告活动


    在 **Below Detail for Selected 30 Minute Interval** 下，您可以定位在 **Top Activity** 图底部窗格中详细显示的部分。利用此信息，您可以单击
    **Compare Period ADDM** 来识别关注时间线中任何不寻常的特定活动（参见 [图 9-53](#9781430249382_Ch09.xhtml#Fig53)）。


    ![9781430249382_Fig09-53.jpg](images/9781430249382_Fig09-53.jpg)


    [图 9-53](#9781430249382_Ch09.xhtml#_Fig53). 在 `EM12c` 数据库目标界面中定位 `ADDM` 比较报告


    选择与 [图 9-52](#9781430249382_Ch09.xhtml#Fig52) 场景匹配的时间线以获得问题的最清晰视图至关重要。


    由于 **Top Activity** 从晚上 11:30 开始并持续 30 分钟，准确比较的适当选择是在 `ADDM` **Begin Time** 中也匹配此时间，并将
    **End Time** 设置为 30 分钟后，导致结束时间“起始分钟”为晚上 11:59。


    由于活动发生在星期六晚上，而目标是了解前一个小时发生了什么变化，我们将把它与前一个时段进行比较。


    [图 9-54](#9781430249382_Ch09.xhtml#Fig54) 显示了 **Comparison ADDM Report** 字段的最终设置。


    ![9781430249382_Fig09-54.jpg](images/9781430249382_Fig09-54.jpg)


    [图 9-54](#9781430249382_Ch09.xhtml#_Fig54). 比较时间线和基线


    单击 **Run** 执行 `ADDM` 比较报告。报告首先指示两个时间线的共性（参见 [图 9-55](#9781430249382_Ch09.xhtml#Fig55)）。


    ![9781430249382_Fig09-55.jpg](images/9781430249382_Fig09-55.jpg)


    [图 9-55](#9781430249382_Ch09.xhtml#_Fig55). 一个 `ADDM` 比较报告，比较前一小时与使用率较高的一小时


    请注意，比较的持续时间是整个 1 小时快照，即使输入的时间是半小时。如果快照间隔设置得比默认值（1 小时）更频繁，`ADDM` 比较将显示覆盖所选开始和结束时间所需的最少快照的结果。


    检查图中左侧的值时，您必须注意，显示的平均会话数不是图之间的一对一表示，而是独立于每个会话，以最好地展示比较中使用的每个时段的数据。每个时段图在其右侧也有自己的等待事件类型图例。


    每个图的底部清楚地显示了平均活动会话数，右上角的按钮可用于以 `HTML` 格式保存或通过电子邮件发送图表。


    `ADDM` 比较报告底部区域的 **Details** 窗格分为三个部分：**Configuration**、**Finding** 和 **Resource**。


    ## Configuration


    `ADDM` 比较报告的 **Configuration** 部分提供有关物理配置、参数设置和会话参数的信息，这些可能影响了所比较时段之间的差异（参见 [图
    9-56](#9781430249382_Ch09.xhtml#Fig56)）。


    ![9781430249382_Fig09-56.jpg](images/9781430249382_Fig09-56.jpg)


    [图 9-56](#9781430249382_Ch09.xhtml#_Fig56). `ADDM` 比较报告的 **Configuration** 部分，设置为显示所有配置值


    您可以只显示差异（默认）或显示所有配置值。如果需要检查所有配置值，这确实提供了对参数设置和会话值的快速审查。


    ## Finding


    **Finding** 部分展示了每个 **Performance Difference** 类型、影响百分比，然后是它为每个基础时段创建的影响百分比（参见
    [图 9-57](#9781430249382_Ch09.xhtml#Fig57)）。由于这些值在一个时段可能为正，在另一个时段可能为负，您应注意变更影响的总计，并确保清楚地理解比较时段的变更影响，以防问题是随多个时间段升级的。如果确实发生了升级，变更影响百分比可能会产生误导，应考虑在更长时间段内对环境的整体影响。


    ![9781430249382_Fig09-57.jpg](images/9781430249382_Fig09-57.jpg)


    [图 9-57](#9781430249382_Ch09.xhtml#_Fig57). `ADDM` 比较报告的发现，显示了比较两个时段之间性能的改进和下降


    对于每个 **Performance Difference**，详细信息显示在 **Details** 窗格下方。由于在 **Top Segments by
    User I/O** 中发现了性能回归，因此产生了以下发现：


    *   发现了负责显著 `User I/O` 和 `Cluster` 等待的单个数据库段。

    *   影响从 0.04 个活动会话变为 0.1 个活动会话，变化为 –5%。


    ## Resource


    **Resource** 详细报告了 `CPU`、内存、`I/O` 和互连（如果涉及 `RAC`）方面的差异。这些数据可以以图形形式表示，如 [图 9-58](#9781430249382_Ch09.xhtml#Fig58)
    所示，也可以以表格报告形式表示，如 [图 9-59](#9781430249382_Ch09.xhtml#Fig59) 所示。


    ![9781430249382_Fig09-58.jpg](images/9781430249382_Fig09-58.jpg)


    [图 9-58](#9781430249382_Ch09.xhtml#_Fig58). 比较报告中两个 `ADDM` 时间线之间内存差异详细数据的表格表示


    ![9781430249382_Fig09-59.jpg](images/9781430249382_Fig09-59.jpg)


    [图 9-59](#9781430249382_Ch09.xhtml#_Fig59). 比较报告中两个 `ADDM` 时间线之间 `I/O` 差异详细数据的图形表示


    借助这些详细数据，您可以快速评估出内存使用量跃升了 75%，并且比较中使用的两个时间线之间的数据文件单块读取延迟存在显著差异。


    与 `EM12c` 界面中的其他报告一样，可以选择保存或通过电子邮件发送 `HTML` 报告以供日后审查或保留作为历史参考。


    ## Summary


    随着自动化和优化数据库及其环境需求的增加，`Enterprise Manager 12c` 性能控制台的重要性也将随之提高。**Top Activity**
    将逐渐迁移到 **ASH Analytics**，其具有强大、透明和有效的报告功能。从一个简单高效的图形界面收集数据并提供有效的优化建议和监控的机会，为企业级数据库控制指明了明确的方向。


