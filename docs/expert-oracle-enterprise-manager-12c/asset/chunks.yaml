    如果一个作业包含多个步骤，并且您只想收集该步骤的详细诊断信息，可以通过运行以下命令生成辅助报告：


    ```bash

    ./repvfy dump –tns <oms_sid> step –id <step_id>

    ```


    ## GUID 目标诊断


    在下一个场景中，我们将利用 `EM12rep`（`EM12c` 的 `OMS` 存储库）的 `GUID` 来收集 `EM` 环境数据：


    ```bash

    ./repvfy dump -tns <oms_sid> execution

    -guid EFD92E6468B02696B602A650E085B5A9 -pwd <pwd>

    > ./rep_guid.lst

    ```


    通过运行 `GUID` 级别的命令，您可以获得关于 `EM` 作业服务健康状况的一站式诊断报告。（`GUID` 是您的目标 `GUID`，它会转储所有目标上所有作业的信息。）


    报告开始部分与作业级报告非常相似，列出了存储库和 `EM` 信息。但是，当您查看目标信息时，会注意到明显的差异，特别是当您的 `EM` 环境很大时。


    如果有任何由 `EM` 作业服务提交的后台作业遇到问题，它们会在自己的部分中被清晰地报告出来，如图 11-43 所示。


    ![9781430249382_Fig11-43.jpg](img/9781430249382_Fig11-43.jpg)


    图 11-43. 关于作业执行中错误的跟踪数据


    我目前唯一的抱怨是，对于 `EM12c` 的 `BP1` 版本，在完整环境级别运行 `EMDIAG` 时，会在作业分析摘要步骤遇到错误。您可以在图 11-44
    中看到该错误。


    ![9781430249382_Fig11-44.jpg](img/9781430249382_Fig11-44.jpg)


    图 11-44. `OMS` 诊断级 `EMDIAG` 的单一错误


    因此，如果您仍在使用 `BP1` 版本并且需要提取此级别的诊断数据，我希望您已将问题范围缩小到单个作业或目标作为报告的焦点，从而避免此错误。Release
    2 版本已修正此问题。


    ## 全局诊断


    在此示例中，我们将运行一个 9 级诊断，该诊断将针对整个 Enterprise Manager 环境运行报告，检查健康状况和其他问题：


    ```bash

    ./repvfy -tns em12rep verify -level 9 –detail

    ```


    此级别的诊断首先检查您正在使用的 `EMDIAG` 版本，以及是否有更新的版本可用。


    然后，诊断继续对 `EM` 环境执行完整的验证，如图 11-45 所示，然后登录 `SQL*Plus` 以对 `EM` 测试、`EM` 系统的安装信息以及来自
    `EM` 环境的内部作业和警报执行辅助诊断。


    ![9781430249382_Fig11-45.jpg](img/9781430249382_Fig11-45.jpg)


    图 11-45. 显示来自 `EMDIAG` 的度量标准收集问题的全局级别诊断

