    SQL Monitor 始终可用，并能清晰地绘制出每个领域的近期使用情况。


    # SQL Performance


    数据库目标主页中的 SQL 子菜单具有众多选项，包括：


    *   SQL Performance Analyzer

    *   SQL Access Advisor

    *   SQL Tuning Advisor

    *   SQL Tuning Sets

    *   SQL Plan Control

    *   Optimizer Statistics


    ## SQL Performance Analyzer


    SQL Performance Analyzer 虽然可通过“性能”下拉菜单轻松访问，但它属于 EM12c Advisor Central 功能的一部分。该分析器提供了一个简单的向导来测试和分析数据库环境的变更将如何影响
    SQL 调优集。


    这使你能够在不影响用户的会话级环境中测试以下内容：


    *   版本兼容性变更

    *   参数变更

    *   优化器统计信息

    *   Exadata 模拟

    *   引导式工作流


    通过单击任何链接并完成向导，可以创建 SQL Performance Analyzer 任务。这些任务随后被安排为 EM12c 环境中的 EM 作业。你可以通过手动刷新界面视图，或者保持“查看数据”选项为其默认设置（使用
    15 秒间隔）来检查状态。


    ## SQL Access Advisor


    SQL Access Advisor 提供了一个图形界面，用于评估数据库中现有对象的效率，或推荐可能通过物理优化选项提高性能的新对象。[Figure 9-42](#9781430249382_Ch09.xhtml#Fig42)
    显示了界面中可用的初始顾问选项。


    ![9781430249382_Fig09-42.jpg](images/9781430249382_Fig09-42.jpg)


    **图 9-42** 针对数据库目标的 SQL Access Advisor 性能选项


    SQL Access Advisor（可从“性能”下拉菜单访问，但属于 Advisor Central 功能）有两个选项。第一个选项检查当前对象，并根据系统中已有的内容提出建议。第二个选项检查历史
    SQL，以推荐可能有助于提升性能的索引和物化视图。与任何顾问一样，在实施 SQL Access Advisor 的建议之前，你必须审查并验证它们。


    ## SQL Tuning Sets


    *SQL 调优集* 是一组 SQL 语句的集合，可以通过执行模式、应用程序模块/操作或一组绑定变量、游标提取、执行次数、命令类型或优化器成本来进行绑定。


    SQL 调优集可以迁移到其他数据库，允许管理员在其他环境上执行调优测试。生产性能问题可以迁移到二级测试环境，以复制遇到的问题并测试解决场景。


    ![image](images/sq.jpg) `Note` 对于希望了解其数据库环境中使用情况和优化的管理员来说，理解 SQL 至关重要。SQL Tuning
    Advisor 和 SQL Access Advisor 利用 SQL 调优集来提供优化 Oracle 环境的最佳建议。


    ## SQL Plan Control


    控制性能的另一个选项是创建和存储 SQL 计划。SQL 计划是 SQL 配置文件使用的功能之一，可以通过从数据库性能主页单击 `Performance ->
    SQL -> SQL Plan Control` 在 SQL 计划部分查看（参见 [Figure 9-43](#9781430249382_Ch09.xhtml#Fig43)）。


    拥有一个统一视图来管理所有计划控制的好处在于，如果某个语句发生了变化，并且需要确认计划控制是否到位，DBA 可以轻松地从面板访问和验证，而无需去搜索 SQL
    ID。


    ![9781430249382_Fig09-43.jpg](images/9781430249382_Fig09-43.jpg)


    **图 9-43** 作为 SQL 配置文件一部分创建的 SQL 计划


    ## Optimizer Statistics'
  raw: '![image](images/sq.jpg) **Tip**  If there is one view that an administrator
    should consider giving view-only access to for monitoring activity in a database
    environment, the SQL Monitor is it. This view is exceptionally easy to use and
    offers incredibly valuable ­information regarding activity and performance. The
    SQL Monitor view offers quick access to alert the developer or ­analyst when something
    may be amiss that would be less likely to escalate to an incident in the EM12c,
    but may still require an administrator’s assistance. In the development lifecycle,
    this can offer members of the database team another way to visually monitor what
    is occurring during both development and testing phases.


    Whereas Top Activity and ASH Analytics share detail pages for SQL ID and user
    sessions, SQL Monitor shares session details only with user sessions and CPU usage.
    For SQL ID, the SQL Monitor has its own performance page data based on the execution
    of DBMS_SQLTUNE.REPORT_SQL_MONITOR by the EM12c console to populate the main SQL
    Monitoring page.


    [Figure 9-38](#9781430249382_Ch09.xhtml#Fig38) is a graphical representation of
    this report as report_level=>''ALL'' is executed by the EM12c console. This same
    report can be executed using the package from the command line as well, but the
    EM12c SQL Monitor interface conveniently populates and displays the data in a
    user-friendly format for the administrator.


    ![9781430249382_Fig09-38.jpg](images/9781430249382_Fig09-38.jpg)


    [Figure 9-38](#9781430249382_Ch09.xhtml#_Fig38). The lower pane of the Monitored
    SQL Executions Details report by the SQL Monitor for SQL_IDs involved in the snapshot


    The view can be adjusted to show SQL-specific metrics, as shown in [Figure 9-39](#9781430249382_Ch09.xhtml#Fig39),
    by simply clicking the Metrics button in the upper-left corner. The data can be
    incredibly detailed and valuable when investigating an impacting SQL statement.


    ![9781430249382_Fig09-39.jpg](images/9781430249382_Fig09-39.jpg)


    [Figure 9-39](#9781430249382_Ch09.xhtml#_Fig39). Metric usage from the same report
    time as the SQL Monitor report in Figure 9-37, indicating CPU and I/O read and
    write requests in bytes


    Whereas [Figure 9-39](#9781430249382_Ch09.xhtml#Fig39) shows CPU and I/O read
    and write requests from the report, [Figure 9-40](#9781430249382_Ch09.xhtml#Fig40)
    shows the results of I/O throughput and PGA usage. This data shows the CPU usage
    and waits for CPU by the statement. By taking this data and intersecting the high/low
    points, you can build a clear picture of how the read and write requests are affected
    by CPU usage and CPU waits.


    ![9781430249382_Fig09-40.jpg](images/9781430249382_Fig09-40.jpg)


    [Figure 9-40](#9781430249382_Ch09.xhtml#_Fig40). SQL Monitor demonstrating I/O
    throughput by reads and writes in bytes


    By inspecting the I/O throughput and then comparing it to the PGA, you can also
    pinpoint when sorting and hashing may occur within the PGA and when it may “swap”
    to temp, (causing higher I/O due to temp tablespace reads/writes).


    The final section, shown in [Figure 9-41](#9781430249382_Ch09.xhtml#Fig41), displays
    specific temp usage. For DSS and OLAP environments, knowing temp usage can be
    very helpful. The SQL Monitor displays this in the SQL Monitor detail report.


    ![9781430249382_Fig09-41.jpg](images/9781430249382_Fig09-41.jpg)


    [Figure 9-41](#9781430249382_Ch09.xhtml#_Fig41). Temp usage from the SQL Monitor
    report, displayed in a graph


    Using these specific SQL Monitor graphs offers high-level images detailing valuable
    usage areas outside of just monitoring database activity from the SQL perspective.
    Whereas an administrator might query over a period of time any of these areas
    or a combination of them, SQL Monitor is always available and clearly graphs out
    the recent usage for each.


    SQL Performance


    The SQL submenu within the database target home page has numerous options, including
    these:


    *   SQL Performance Analyzer

    *   SQL Access Advisor

    *   SQL Tuning Advisor

    *   SQL Tuning Sets

    *   SQL Plan Control

    *   Optimizer Statistics


    SQL Performance Analyzer


    The SQL Performance Analyzer, although easily accessible through the Performance
    drop-down, is part of the Advisor Central provision of EM12c features. The Analyzer
    provides a simple wizard to test and analyze how changes to a database environment
    will affect a SQL tuning set.


    This enables you to test the following in a session-level environment, without
    affecting users:


    *   Changes in version compatibility

    *   Parameter changes

    *   Optimizer statistics

    *   Exadata simulation

    *   Guided workflow


    SQL Performance Analyzer tasks can be created by clicking any of the links and
    working through the wizards. The tasks are then scheduled as an EM Job in the
    EM12c environment. You may check the status by manually refreshing the interface
    view or by leaving the View Data option at its default, which uses a 15-second
    interval.


    SQL Access Advisor


    The SQL Access Advisor provides a graphical interface for evaluating existing
    objects in the database for efficiency or recommending new objects that may increase
    performance through physical optimization options. [Figure 9-42](#9781430249382_Ch09.xhtml#Fig42)
    shows the initial advisor options available from the interface.


    ![9781430249382_Fig09-42.jpg](images/9781430249382_Fig09-42.jpg)


    [Figure 9-42](#9781430249382_Ch09.xhtml#_Fig42). The SQL Access Advisor performance
    options for database targets


    The SQL Access Advisor (accessible from the Performance drop-down, but part of
    the Advisor Central features) has two options. The first inspects current objects
    and makes recommendations based on what is already present in the system. The
    second option inspects historical SQL for recommendations on indexes and materialized
    views that could assist in performance gains. As with any advisor, you must review
    and verify the SQL Access Advisor recommendations before implementing them.


    SQL Tuning Sets


    A *SQL tuning set* is a collection of SQL statements, which can be bound by executing
    schema, application module/action, or a set of bind variables, cursor fetches,
    execution count, command type, or optimizer cost.


    SQL tuning sets can be migrated to other databases, allowing the administrator
    to perform tuning tests on other environments. Production performance issues can
    be migrated to a secondary stage environment to duplicate the issues experienced
    and resolution scenarios tested.


    ![image](images/sq.jpg) **Note**  Understanding the SQL is essential for an administrator
    who wants to understand usage and optimization in their database environment.
    The SQL Tuning Advisor and the SQL Access Advisor utilize SQL tuning sets to give
    the best advice on optimizing the Oracle environment.


    SQL Plan Control


    Another option for controlling performance is to create and store SQL plans. SQL
    plans are one of the features utilized by SQL profiles and can be viewed in the
    SQL Plans section by clicking Performance ![arrow](images/arrow.jpg) SQL ![arrow](images/arrow.jpg)
    SQL Plan Control from the Database performance home page (see [Figure 9-43](#9781430249382_Ch09.xhtml#Fig43)).


    The benefit of having one view for all plan control is that if a statement has
    changed and there is a question about whether plan control is in place, the DBA
    can easily access and verify from the panel instead o having to search for the
    SQL ID.


    ![9781430249382_Fig09-43.jpg](images/9781430249382_Fig09-43.jpg)


    [Figure 9-43](#9781430249382_Ch09.xhtml#_Fig43). SQL plans created as part of
    SQL profiles


