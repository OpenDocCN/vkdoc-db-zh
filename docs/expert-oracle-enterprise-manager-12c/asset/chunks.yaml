    # 补丁角色与数据库配置


    EM12c 提供了一些新的、专用于补丁操作的现成角色：`EM_PATCH_ADMINISTRATOR`、`EM_PATCH_DESIGNER` 和 `EM_PATCH_OPERATOR`。需要将这些角色授予负责补丁活动的管理员。


    要在 Oracle Enterprise Manager 中查看这些角色，请选择 Setup ![arrow](img/arrow.jpg) Security
    ![arrow](img/arrow.jpg) Roles。然后搜索关键字 `patch`。这将显示所有与补丁相关的角色（参见 图 6-53）。


    ![9781430249382_Fig06-53.jpg](img/9781430249382_Fig06-53.jpg)


    图 6-53. 位于 Security 下的补丁角色


    让我们了解一下这些为补丁定义的角色：


    *   `EM_PATCH_ADMINISTRATOR`：此角色用于在 Enterprise Manager 中为任何补丁计划创建、编辑、部署、删除和授予特权。创建后，此角色还可以将特权授予其他管理员。这是一个对
    Enterprise Manager 中任何补丁计划和模板拥有完全权限的访问角色。此角色应有限制地授予。

    *   `EM_PATCH_DESIGNER`：此角色可以创建和查看任何补丁计划。此角色通常在补丁生命周期（开发、测试和生产）中用于识别补丁。此角色通常分配给组织中的高级
    DBA。此角色能够创建补丁计划和模板，并将这些计划的特权授予 `EM_PATCH_OPERATOR`。

    *   `EM_PATCH_OPERATORS`：此角色用于部署补丁计划。此角色非常有限，因为它只能部署补丁计划。它没有创建或修改任何补丁计划或模板的权限。此角色非常适合组织中的初级
    DBA。


    这些新的补丁角色使管理员能够在部门的多个层级之间分配工作，同时确保补丁按照一致的时间表应用。


    # 配置


    *配置（Provisioning）* 是 Cloud Control 提供的生命周期中另一个重要部分。它允许我们以自动化方式配置数据库选项，例如单实例 Oracle
    数据库和 Oracle Real Application Cluster 数据库；从 Real Application Clusters、Oracle Real
    Application Clusters One 中扩展或删除节点；以及升级单实例数据库。


    ## 数据库配置概述


    首先，让我们对数据库配置有一个概览。图 6-54 以分层视图显示了解决方案。


    ![9781430249382_Fig06-54.jpg](img/9781430249382_Fig06-54.jpg)


    图 6-54. 配置的分层视图


    在继续之前，有几个特性需要理解。这些特性如下：


    *   `Designer and operator roles`：Cloud Control 为配置管理员提供设计师和操作员角色。这些明确定义的角色使您能够锁定部署过程的输入，以提供标准的部署配置。

    *   `Locking-down feature in the designer role`：配置的此特性使设计师能够锁定一组变量，例如主机目标、凭据和要在部署过程中配置的
    Oracle 主目录。这有助于标准化并最大程度地减少大规模部署中配置的错误。操作员可以部署设计师保存在过程库中的过程。

    *   `Provisioning profiles and database templates`：配置文件（Provisioning profiles）用于配置中，以确保部署的标准化并最小化错误。

    *   `Creating databases using Cloud Control`：您可以直接从 Cloud Control 控制台创建数据库。这是为了确保数据库可以从单一界面进行配置和创建。

    *   `Easy-to-navigate database provisioning wizards`：设计师和操作员可以轻松使用和导航 Cloud Control
    中的数据库配置向导。

    *   `Self Update`：自更新（Self Update）特性用于自动下载和安装配置实体的更新。

    *   `Database Provisioning console for all database provisioning activities`：数据库配置控制台是所有数据库配置活动的中心起点。控制台显示有关配置设置、配置文件、部署过程以及有关如何开始配置的信息。


    要访问数据库配置控制台，请选择 Enterprise ![arrow](img/arrow.jpg) Provisioning and Patching ![arrow](img/arrow.jpg)
    Database Provisioning。您会注意到用于裸机（Bare Metal）和中间件（Middleware）的附加配置选项；这些用于配置服务器和中间件目标。需要明确的是，本章我们关注的是数据库配置。图
    6-55 显示了数据库配置控制台的上部。


    ![9781430249382_Fig06-55.jpg](img/9781430249382_Fig06-55.jpg)


    图 6-55. 数据库配置控制台


    ## 支持的目标与部署过程


    既然您有了数据库配置的起点，那么可以配置什么？如何配置？Cloud Control 使您能够通过使用部署过程（deployment procedures）来执行数据库配置。*部署过程*
    是一系列按顺序运行以完成配置任务的预定义步骤。表 6-3 列出了 Cloud Control 中提供和用于配置数据库的过程。


    表 6-3. 用于数据库配置的部署过程


    ![Table6-3.jpg](img/Table6-3.jpg)


    使用表 6-3 中的部署过程，有多种用例。本章无法一一讨论，因此在本章剩余部分，我们将专注于单实例 Oracle 数据库的配置。


    ## 数据库配置的设置


    使用 Oracle Enterprise Manager Cloud Control 中的配置选项，您可以使用模板、安装介质、数据库实体或配置文件来配置 Oracle
    数据库、Oracle Real Application Clusters 数据库和 Oracle Real Application Clusters One
    数据库，以实现标准化部署。


    ### 创建配置文件

    '
- fmt: '# 创建Oracle数据库配置文件与安装媒体


    ## 配置文件简介


    `provision profile`（配置文件）是一个包含软件位和配置信息的实体。当从现有安装创建配置文件时，它为克隆Oracle数据库提供了灵活性。我们可以通过使用配置文件来创建数据库模板。使用配置文件能够在部署中实现标准化。配置文件通过避免错误减少了重新安排部署的需要，并提高了部署流程的效率。让我们来看看如何创建配置文件。


    ### 启动配置向导


    要创建配置文件，您需要访问配置数据库控制台，选择 **Enterprise** ![arrow](images/arrow.jpg) **Provisioning
    and Patching** ![arrow](images/arrow.jpg) **Database Provisioning**。在“Profiles”部分的顶部是一个**Create**按钮。点击此按钮（如[图6-56](#9781430249382_Ch06.xhtml#Fig56)所示）以启动“数据库配置配置文件向导”。这个四步向导将引导您完成配置文件的创建过程。


    ![9781430249382_Fig06-56.jpg](images/9781430249382_Fig06-56.jpg)


    [图 6-56](#9781430249382_Ch06.xhtml#_Fig56). 点击创建按钮


    ### 步骤1：选择参考目标


    向导从步骤1开始，要求选择一个参考目标（参见[图6-57](#9781430249382_Ch06.xhtml#Fig57)）。这是您想要用来构建配置文件的目标。点击搜索图标并选择要使用的目标。然后点击**Next**继续。


    ![9781430249382_Fig06-57.jpg](images/9781430249382_Fig06-57.jpg)


    [图 6-57](#9781430249382_Ch06.xhtml#_Fig57). 参考目标


    ### 步骤1：选择目标组件


    现在您将看到特定于目标的组件。这些组件将被包含在配置文件中（参见[图6-58](#9781430249382_Ch06.xhtml#Fig58)）。根据参考目标，您可以选择保留这些项或从配置文件中移除它们。


    ![9781430249382_Fig06-58.jpg](images/9781430249382_Fig06-58.jpg)


    [图 6-58](#9781430249382_Ch06.xhtml#_Fig58). 参考目标组件


    ### 步骤1：配置凭据


    在参考目标页面的右侧是“Credentials”（凭据）部分，如[图6-59](#9781430249382_Ch06.xhtml#Fig59)所示。您需要选择**Preferred
    Credentials**或**Named Credentials**。如果需要添加这些凭据，请使用 **Setup** ![arrow](images/arrow.jpg)
    **Security** 功能。[第4章](#9781430249382_Ch04.xhtml)涵盖了如何向安全模块添加凭据。如果一切设置完毕，点击**Next**。


    ![9781430249382_Fig06-59.jpg](images/9781430249382_Fig06-59.jpg)


    [图 6-59](#9781430249382_Ch06.xhtml#_Fig59). 凭据部分


    ### 步骤2：内容选项


    创建配置文件的第二个步骤是“Content Options”（内容选项），如[图6-60](#9781430249382_Ch06.xhtml#Fig60)所示。如果需要，此步骤将使用`RMAN`执行备份。如果数据库处于`ARCHIVELOG`模式，则可以执行热备份。否则，将进行冷备份。点击**Next**。


    ![9781430249382_Fig06-60.jpg](images/9781430249382_Fig06-60.jpg)


    [图 6-60](#9781430249382_Ch06.xhtml#_Fig60). 内容选项


    ### 步骤3：配置文件设置


    “Profile”页面（如[图6-61](#9781430249382_Ch06.xhtml#Fig61)所示）是创建配置文件的第三步。此时，您可以编辑或保留页面上的默认设置。此配置文件的存储位置也在“Software
    Library Storage”（软件库存储）部分定义。这表明我们将把此配置文件存储在软件库中以供以后使用。[图6-62](#9781430249382_Ch06.xhtml#Fig62)中未列出的是计划和工作目录窗口。这些区域可以根据需要更改。点击**Next**。


    ![9781430249382_Fig06-61.jpg](images/9781430249382_Fig06-61.jpg)


    [图 6-61](#9781430249382_Ch06.xhtml#_Fig61). 配置文件页面


    ### 步骤4：复核与提交


    最后一步是“Review”（复核）页面，如[图6-62](#9781430249382_Ch06.xhtml#Fig62)所示。与其他复核页面一样，您可以在点击**Submit**之前在此处复核您的选择。点击**Submit**以创建配置文件。


    ![9781430249382_Fig06-62.jpg](images/9781430249382_Fig06-62.jpg)


    [图 6-62](#9781430249382_Ch06.xhtml#_Fig62). 复核配置文件


    作业提交并创建后，请确保配置文件出现在数据库配置页面中。


    ![image](images/sq.jpg) **注意**  提交的配置作业将为所选数据库创建黄金镜像。


    ## 创建安装媒体


    另一种配置Oracle数据库的方法是将安装媒体上传到软件库中。然后，可以通过部署过程将安装媒体推送到目标系统。让我们看看如何创建安装媒体并将其上传到软件库。


    ### 准备安装文件


    在将安装媒体上传到软件库之前，您需要从Oracle下载媒体文件。可以从Oracle技术网络（OTN）、My Oracle Support（MOS）或Oracle的E-Delivery门户下载媒体文件。


    ![image](images/sq.jpg) **注意**  任何人都可以从Oracle技术网络下载软件。如果您有有效的客户支持标识符（CSI），您也可以从E-Delivery访问并下载。


    您需要将Oracle数据库的`zip`文件下载到您正在工作的主机上的临时目录中。这些文件位于从Oracle下载的介质的磁盘1和磁盘2上。然后按照以下步骤操作：


    1.  下载磁盘1和2的文件后，导航到保存它们的临时位置。需要使用系统上的解压缩工具解压这些文件。然后将这两个文件合并为一个压缩文件。

    2.  选择 **Enterprise** ![arrow](images/arrow.jpg) **Provisioning and Patching**
    ![arrow](images/arrow.jpg) **Software Library** 打开软件库。在软件库中，选择要为其创建数据库安装媒体的目录。

    3.  选择了存放二进制文件的目录后，您需要在此文件夹下创建一个新实体。在软件库的“Actions”菜单中，选择**Create Entity**，如[图6-63](#9781430249382_Ch06.xhtml#Fig63)所示。


    ![9781430249382_Fig06-63.jpg](images/9781430249382_Fig06-63.jpg)


    [图 6-63](#9781430249382_Ch06.xhtml#_Fig63). 在软件库中创建新实体


    4.  接下来，您需要将安装媒体作为新实体上传到软件库。此过程类似于本章前面使用的步骤，只是在选择组件时选择**Installation Media**（参见[图6-64](#9781430249382_Ch06.xhtml#Fig64)）。点击**Continue**。


    ![9781430249382_Fig06-64.jpg](images/9781430249382_Fig06-64.jpg)


    [图 6-64](#9781430249382_Ch06.xhtml#_Fig64). 创建安装媒体实体


    5.  在“Describe”（描述）页面上，安装媒体唯一需要的输入是名称。此页面上的所有其他信息都是可选的。点击**Next**。

    6.  在“Configure”（配置）页面上，您指定了安装媒体的组件，如[图6-65](#9781430249382_Ch06.xhtml#Fig65)所示。媒体上传到软件库后，这些设置无法更改。点击**Next**。


    ![9781430249382_Fig06-65.jpg](images/9781430249382_Fig06-65.jpg)


    [图 6-65](#9781430249382_Ch06.xhtml#_Fig65). 安装媒体组件的规格


    7.  接下来是“Select Files”（选择文件）页面，您将在这里选择之前为数据库二进制文件创建的那个压缩文件。默认情况下，选中了**Upload Files**（上传文件）选项。在指定的目标位置下，我们需要选择要放置`zip`文件的上传位置。点击搜索图标以打开“Select
    Upload Location”（选择上传位置）对话框，如[图6-66](#9781430249382_Ch06.xhtml#Fig66)所示。


    ![9781430249382_Fig06-66.jpg](images/9781430249382_Fig06-66.jpg)


    [图 6-66](#9781430249382_Ch06.xhtml#_Fig66). 选择上传位置'
  raw: 'A *provision profile* is an entity that contains software bits and configuration
    details. When a profile is created from an existing installation, it provides
    flexibility in cloning of an Oracle database. We can create database templates
    by using provisioning profiles. Using a provisioning profile enables standardization
    within deployments. Provisioning profiles reduce the need to reschedule deployments
    by avoiding errors and increase efficiency of deployment procedures. Let’s review
    how to create a provision profile.


    To create a provision profile, you need to access the Provision Database console
    by choosing Enterprise ![arrow](images/arrow.jpg) Provisioning and Patching ![arrow](images/arrow.jpg)
    Database Provisioning. At the top of the Profiles section is a Create button.
    Click this button, shown in [Figure 6-56](#9781430249382_Ch06.xhtml#Fig56), to
    start the Database Provisioning Profile Wizard, a four-step wizard that walks
    you through the creation of a provisioning profile.


    ![9781430249382_Fig06-56.jpg](images/9781430249382_Fig06-56.jpg)


    [Figure 6-56](#9781430249382_Ch06.xhtml#_Fig56). Clicking the Create button


    The Database Provisioning Profile Wizard starts at step 1, which asks for a reference
    target (see [Figure 6-57](#9781430249382_Ch06.xhtml#Fig57)). This is the target
    you want to use to build the provisioning profile. Click the search icon and select
    the target you want to use. Then click Next to move on.


    ![9781430249382_Fig06-57.jpg](images/9781430249382_Fig06-57.jpg)


    [Figure 6-57](#9781430249382_Ch06.xhtml#_Fig57). Reference target


    Now you are presented with components specific to the target. These components
    will be included in the provision profile (see [Figure 6-58](#9781430249382_Ch06.xhtml#Fig58)).
    Depending on the reference target, you can choose to either leave these items
    or remove them from the profile.


    ![9781430249382_Fig06-58.jpg](images/9781430249382_Fig06-58.jpg)


    [Figure 6-58](#9781430249382_Ch06.xhtml#_Fig58). Reference target components


    On the right-hand side of the Reference Target page is the Credentials section,
    shown in [Figure 6-59](#9781430249382_Ch06.xhtml#Fig59). You need to select either
    Preferred Credentials or Named Credentials. If you need to add these credentials,
    use the Setup ![arrow](images/arrow.jpg) Security function. [Chapter 4](#9781430249382_Ch04.xhtml)
    covers how to add credentials to the security modules. If everything is set, click
    Next.


    ![9781430249382_Fig06-59.jpg](images/9781430249382_Fig06-59.jpg)


    [Figure 6-59](#9781430249382_Ch06.xhtml#_Fig59). Credentials section


    The second step in creating the provision profile is Content Options, shown in
    [Figure 6-60](#9781430249382_Ch06.xhtml#Fig60). This step performs a backup using
    RMAN, if needed. If the database is in ARCHIVELOG mode, a hot backup can be performed.
    If not, a cold backup will be done. Click Next.


    ![9781430249382_Fig06-60.jpg](images/9781430249382_Fig06-60.jpg)


    [Figure 6-60](#9781430249382_Ch06.xhtml#_Fig60). Content options


    The Profile page, shown in [Figure 6-61](#9781430249382_Ch06.xhtml#Fig61), is
    the third step in creating a provision profile. At this point, you can edit or
    retain the defaults on the page. The storage location for this profile is also
    defined in the Software Library Storage section. This shows that we will be storing
    this provision profile in the Software Library for later use. Not listed in [Figure
    6-62](#9781430249382_Ch06.xhtml#Fig62) is the schedule and working directory windows.
    These areas can be changed as needed. Click Next.


    ![9781430249382_Fig06-61.jpg](images/9781430249382_Fig06-61.jpg)


    [Figure 6-61](#9781430249382_Ch06.xhtml#_Fig61). Profile page


    The final step is the Review page, shown in [Figure 6-62](#9781430249382_Ch06.xhtml#Fig62).
    As with other review pages, you can review your choices here before hitting Submit.
    Click Submit to create the profile.


    ![9781430249382_Fig06-62.jpg](images/9781430249382_Fig06-62.jpg)


    [Figure 6-62](#9781430249382_Ch06.xhtml#_Fig62). Reviewing the profile


    After the job has been submitted and created, ensure that the provisioning profile
    appears in the Database Provisioning page.


    ![image](images/sq.jpg) **Note**  The provisioning job that is submitted will
    create the gold image of the database that was selected for the profile.


    Creating Installation Media


    Another way to provision an Oracle database is to upload the installation media
    into the Software Library. The installation media can then be pushed out to target
    systems by using deployment procedures. Let’s look at how to create and upload
    installation media to the Software Library.


    Before you can upload installation media into the Software Library, you need to
    download the media from Oracle. Media files can be downloaded from the Oracle
    Technology Network (OTN), My Oracle Support (MOS), or Oracle’s E-Delivery portal.


    ![image](images/sq.jpg) **Note**  From the Oracle Technology Network, anyone can
    download the software. If you have a valid customer support identifier (CSI),
    you can access E-Delivery and download from there, as well.


    You need to pull down the zip files for the Oracle database to a temporary directory
    on the host you are working from. These files are located on disk 1 and disk 2
    of the media downloaded from Oracle. Then follow these steps:


    1.  After the files from disk 1 and 2 are downloaded, navigate to the temporary
    location where they were saved. These files need to be unzipped by using a zip
    tool that is available on the system. Then combine these two files into a single
    zipped file.

    2.  Open the Software Library by choosing Enterprise ![arrow](images/arrow.jpg)
    Provisioning and Patching ![arrow](images/arrow.jpg) Software Library. In the
    Software Library, select the directory where you want to create the installation
    media for the database.

    3.  With the directory selected for the binaries, you need to create a new entity
    under this folder. From the Actions menu in the Software Library, choose Create
    Entity, as shown in [Figure 6-63](#9781430249382_Ch06.xhtml#Fig63).


    ![9781430249382_Fig06-63.jpg](images/9781430249382_Fig06-63.jpg)


    [Figure 6-63](#9781430249382_Ch06.xhtml#_Fig63). Creating a new entity in the
    Software Library


    4.  Next you need to upload the installation media as a new entity in the Software
    Library. This process is similar to the steps used earlier in this chapter, except
    you choose Installation Media when selecting the component (see [Figure 6-64](#9781430249382_Ch06.xhtml#Fig64)).
    Click Continue.


    ![9781430249382_Fig06-64.jpg](images/9781430249382_Fig06-64.jpg)


    [Figure 6-64](#9781430249382_Ch06.xhtml#_Fig64). Creating aninstallation media
    entity


    5.  On the Describe page, the only input required for Installation Media is the
    name. All other information on this page is optional. Click Next.

    6.  On the Configure page, you indicate the components of the installation media,
    as shown in [Figure 6-65](#9781430249382_Ch06.xhtml#Fig65). These settings cannot
    be changed after the media has been uploaded to the Software Library. Click Next.


    ![9781430249382_Fig06-65.jpg](images/9781430249382_Fig06-65.jpg)


    [Figure 6-65](#9781430249382_Ch06.xhtml#_Fig65). Specifications for the installation
    media components


    7.  Next is the Select Files page, where you will select the single zip file created
    earlier for the database binaries. By default, the Upload Files option is selected.
    Under the specified destination, we need to select the upload location where we
    want to place our zip file. Click the search icon to open the Select Upload Location
    dialog box, shown in [Figure 6-66](#9781430249382_Ch06.xhtml#Fig66).


    ![9781430249382_Fig06-66.jpg](images/9781430249382_Fig06-66.jpg)


    [Figure 6-66](#9781430249382_Ch06.xhtml#_Fig66). Selecting the upload location'
  trans: '

    # 创建 Oracle 数据库配置文件与安装媒体


    ## 配置文件简介


    `provision profile`（配置文件）是一个包含软件位和配置信息的实体。当从现有安装创建配置文件时，它为克隆 Oracle 数据库提供了灵活性。我们可以通过使用配置文件来创建数据库模板。使用配置文件能够在部署中实现标准化。配置文件通过避免错误减少了重新安排部署的需要，并提高了部署流程的效率。让我们来看看如何创建配置文件。


    ### 启动配置向导


    要创建配置文件，您需要访问配置数据库控制台，选择 **Enterprise** ![arrow](img/arrow.jpg) **Provisioning
    and Patching** ![arrow](img/arrow.jpg) **Database Provisioning**。在“Profiles”部分的顶部是一个**Create**按钮。点击此按钮（如图
    6-56 所示）以启动“数据库配置配置文件向导”。这个四步向导将引导您完成配置文件的创建过程。


    ![9781430249382_Fig06-56.jpg](img/9781430249382_Fig06-56.jpg)


    图 6-56. 点击创建按钮


    ### 步骤 1：选择参考目标


    向导从步骤 1 开始，要求选择一个参考目标（参见图 6-57）。这是您想要用来构建配置文件的目标。点击搜索图标并选择要使用的目标。然后点击**Next**继续。


    ![9781430249382_Fig06-57.jpg](img/9781430249382_Fig06-57.jpg)


    图 6-57. 参考目标


    ### 步骤 1：选择目标组件


    现在您将看到特定于目标的组件。这些组件将被包含在配置文件中（参见图 6-58）。根据参考目标，您可以选择保留这些项或从配置文件中移除它们。


    ![9781430249382_Fig06-58.jpg](img/9781430249382_Fig06-58.jpg)


    图 6-58. 参考目标组件


    ### 步骤 1：配置凭据


    在参考目标页面的右侧是“Credentials”（凭据）部分，如图 6-59 所示。您需要选择**Preferred Credentials**或**Named
    Credentials**。如果需要添加这些凭据，请使用 **Setup** ![arrow](img/arrow.jpg) **Security** 功能。第
    4 章涵盖了如何向安全模块添加凭据。如果一切设置完毕，点击**Next**。


    ![9781430249382_Fig06-59.jpg](img/9781430249382_Fig06-59.jpg)


    图 6-59. 凭据部分


    ### 步骤 2：内容选项


    创建配置文件的第二个步骤是“Content Options”（内容选项），如图 6-60 所示。如果需要，此步骤将使用`RMAN`执行备份。如果数据库处于`ARCHIVELOG`模式，则可以执行热备份。否则，将进行冷备份。点击**Next**。


    ![9781430249382_Fig06-60.jpg](img/9781430249382_Fig06-60.jpg)


    图 6-60. 内容选项


    ### 步骤 3：配置文件设置


    “Profile”页面（如图 6-61 所示）是创建配置文件的第三步。此时，您可以编辑或保留页面上的默认设置。此配置文件的存储位置也在“Software Library
    Storage”（软件库存储）部分定义。这表明我们将把此配置文件存储在软件库中以供以后使用。图 6-62 中未列出的是计划和工作目录窗口。这些区域可以根据需要更改。点击**Next**。


    ![9781430249382_Fig06-61.jpg](img/9781430249382_Fig06-61.jpg)


    图 6-61. 配置文件页面


    ### 步骤 4：复核与提交


    最后一步是“Review”（复核）页面，如图 6-62 所示。与其他复核页面一样，您可以在点击**Submit**之前在此处复核您的选择。点击**Submit**以创建配置文件。


    ![9781430249382_Fig06-62.jpg](img/9781430249382_Fig06-62.jpg)


    图 6-62. 复核配置文件


    作业提交并创建后，请确保配置文件出现在数据库配置页面中。


    ![image](img/sq.jpg) **注意**  提交的配置作业将为所选数据库创建黄金镜像。


    ## 创建安装媒体


    另一种配置 Oracle 数据库的方法是将安装媒体上传到软件库中。然后，可以通过部署过程将安装媒体推送到目标系统。让我们看看如何创建安装媒体并将其上传到软件库。


    ### 准备安装文件


    在将安装媒体上传到软件库之前，您需要从 Oracle 下载媒体文件。可以从 Oracle 技术网络（OTN）、My Oracle Support（MOS）或
    Oracle 的 E-Delivery 门户下载媒体文件。


    ![image](img/sq.jpg) **注意**  任何人都可以从 Oracle 技术网络下载软件。如果您有有效的客户支持标识符（CSI），您也可以从
    E-Delivery 访问并下载。


    您需要将 Oracle 数据库的`zip`文件下载到您正在工作的主机上的临时目录中。这些文件位于从 Oracle 下载的介质的磁盘 1 和磁盘 2 上。然后按照以下步骤操作：


    1.  下载磁盘 1 和 2 的文件后，导航到保存它们的临时位置。需要使用系统上的解压缩工具解压这些文件。然后将这两个文件合并为一个压缩文件。

    2.  选择 **Enterprise** ![arrow](img/arrow.jpg) **Provisioning and Patching** ![arrow](img/arrow.jpg)
    **Software Library** 打开软件库。在软件库中，选择要为其创建数据库安装媒体的目录。

    3.  选择了存放二进制文件的目录后，您需要在此文件夹下创建一个新实体。在软件库的“Actions”菜单中，选择**Create Entity**，如图 6-63
    所示。


    ![9781430249382_Fig06-63.jpg](img/9781430249382_Fig06-63.jpg)


    图 6-63. 在软件库中创建新实体


    4.  接下来，您需要将安装媒体作为新实体上传到软件库。此过程类似于本章前面使用的步骤，只是在选择组件时选择**Installation Media**（参见图
    6-64）。点击**Continue**。


    ![9781430249382_Fig06-64.jpg](img/9781430249382_Fig06-64.jpg)


    图 6-64. 创建安装媒体实体


    5.  在“Describe”（描述）页面上，安装媒体唯一需要的输入是名称。此页面上的所有其他信息都是可选的。点击**Next**。

    6.  在“Configure”（配置）页面上，您指定了安装媒体的组件，如图 6-65 所示。媒体上传到软件库后，这些设置无法更改。点击**Next**。


    ![9781430249382_Fig06-65.jpg](img/9781430249382_Fig06-65.jpg)


    图 6-65. 安装媒体组件的规格


    7.  接下来是“Select Files”（选择文件）页面，您将在这里选择之前为数据库二进制文件创建的那个压缩文件。默认情况下，选中了**Upload Files**（上传文件）选项。在指定的目标位置下，我们需要选择要放置`zip`文件的上传位置。点击搜索图标以打开“Select
    Upload Location”（选择上传位置）对话框，如图 6-66 所示。


    ![9781430249382_Fig06-66.jpg](img/9781430249382_Fig06-66.jpg)


    图 6-66. 选择上传位置

    '
- fmt: '8.  由于我们只有一个软件库，点击 **OK**。所选位置将显示在“选择文件”页面上。然后在“指定源”部分，点击“添加”按钮并选择要上传到软件库的
    zip 文件（参见[图 6-67](#9781430249382_Ch06.xhtml#Fig67)）。点击“下一步”。


    ![9781430249382_Fig06-67.jpg](images/9781430249382_Fig06-67.jpg)


    [图 6-67](#9781430249382_Ch06.xhtml#_Fig67). “选择文件”页面


    9.  最后，在“审阅”页面上，您可以查看所有已选择的选项，然后点击“保存并上传”。这会将我们的 zip 文件上传到软件库中。上传完成后，您只需验证文件是否已上传到预期位置。


    ## 配置数据库


    到目前为止，您已经了解了如何创建配置配置文件和创建安装介质。现在，让我们看看如何使用其中一种方法来配置数据库。在此示例中，您将使用“创建安装介质”部分中创建的安装介质。请记住，`Oracle
    Enterprise Manager` 可用于通过诸如 `Database Provisioning`、`Bare Metal Provisioning`
    和 `Middleware Provisioning` 等工具来配置多种类型的目标。


    要开始配置数据库，您需要打开 `Database Provisioning` 控制台；选择 `Enterprise -> Provisioning and
    Patching -> Database Provisioning`。


    在“数据库配置”页面上，您将使用部署过程来配置数据库。因为我们配置的是单个数据库，所以选择 `Provision Oracle Database` 并点击“启动”按钮，如[图
    6-68](#9781430249382_Ch06.xhtml#Fig68)所示。此时，`Oracle` 数据库的配置向导将启动。


    ![9781430249382_Fig06-68.jpg](images/9781430249382_Fig06-68.jpg)


    [图 6-68](#9781430249382_Ch06.xhtml#_Fig68). 选择并启动 `Provision Oracle Database`
    部署过程


    当“配置数据库”向导启动时，您可以看到它与 `Oracle Enterprise Manager` 中的许多其他向导类似。此向导是一个五步流程，第一步使您能够选择要配置数据库的主机。向导步骤如下：


    ### 1. 选择主机

    在“选择主机”页面上，您可以选择使用一个配置配置文件。默认情况下，此选项设置为 `None`。因为我们使用安装介质来配置数据库，所以无需选择配置配置文件。


    “选择主机”页面上的接下来两个部分对于配置数据库非常重要。在“选择要执行的任务”部分，您需要选择平台和版本，以及是否安装 `Grid Infrastructure`
    并部署数据库软件。`Version` 下拉框提供了支持配置的所有 `Oracle` 版本（参见[图 6-69](#9781430249382_Ch06.xhtml#Fig69)）。


    ![image](images/sq.jpg) `Note`  `Oracle Enterprise Manager Cloud Control 12c Bundle
    Patch 2 Update 1` 包含对即将发布的 `Oracle` 产品的插件和支持。


    ![9781430249382_Fig06-69.jpg](images/9781430249382_Fig06-69.jpg)


    [图 6-69](#9781430249382_Ch06.xhtml#_Fig69). 选择要执行的任务


    ### 2. 选择目标主机

    在“选择目标主机”部分，您添加一个或多个主机来配置数据库软件到其上。目标主机的选择由前面的“选择要执行的任务”部分中选择的平台决定。[图 6-70](#9781430249382_Ch06.xhtml#Fig70)显示了一个选作目标的主机。所有内容选择完毕后，点击“下一步”。


    ![9781430249382_Fig06-70.jpg](images/9781430249382_Fig06-70.jpg)


    [图 6-70](#9781430249382_Ch06.xhtml#_Fig70). 目标主机的选择


    ### 3. 提供配置详细信息

    现在您进入步骤 2，必须为配置过程提供配置详细信息。在进入步骤 3 之前，需要完成并勾选每一项任务（参见[图 6-71](#9781430249382_Ch06.xhtml#Fig71)）。


    ![9781430249382_Fig06-71.jpg](images/9781430249382_Fig06-71.jpg)'
