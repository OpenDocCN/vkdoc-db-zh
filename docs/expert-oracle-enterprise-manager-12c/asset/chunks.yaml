    ## CHAPTER 4 Interacting with the EM12c Console


    by Niall Litchfield


    Oracle Enterprise Manager is a product of many capabilities, but this book focuses
    on technology management and administration. To that end, Enterprise Manager must
    make administration and management tasks simpler, more consistent, and faster
    than the task would be when just utilizing the raw capabilities of the underlying
    technology. This chapter will help you achieve this by introducing you to Enterprise
    Manager’s main user interface, the web console.


    This chapter consists, therefore, of the following components:


    *   A brief history of the limitations of previous releases

    *   An overview of how EM12c addresses those limitations

    *   A review of the menu structures that you will use to navigate the console

    *   A brief discussion of the customization facilities supplied with the product


    Along the way, you will learn how to configure Enterprise Manager to interact
    effectively with Oracle’s support portal, My Oracle Support. You will also learn
    how to configure notifications and control the use of additional cost management
    packs, and will become familiar with the console as your administration home.


    ### A Brief History of EM


    Oracle Enterprise Manager started life in July 2002 as Java-based client application
    for managing Oracle Database 9.2. With the release of Oracle Database 10g, this
    application was reimagined as a web-based management interface, largely focused
    on the database, but with the ability to manage Oracle databases that spanned
    multiple physical hosts—the g in 10g stood for *grid* and the database-centric
    management product was to become known as Enterprise Manager Grid Control. Grid
    Control provided database administration staff with three key features that were
    a significant advantage in managing clustered environments, and in managing a
    variety of databases across an enterprise. These were as follows:


    *   An administrator could manage distributed environments as one rather than
    as a collection of targets.

    *   The state of the whole Oracle database estate could be seen in a single screen.

    *   It introduced the ability to manage target types other than just the Oracle
    Database, especially to the growing Oracle Application Server market.


    These advantages significantly improved the life of an administrator compared
    with the previous fragmented, host-based management that tended to dominate the
    database world at the time. There was, of course, one other advantage that made
    Enterprise Manager Grid Control attractive to organizations running Oracle its
    implementation required (and still requires) no additional license cost.


    ![image](images/sq.jpg) **Tip**  Enterprise Manager does make easily available
    several additional cost features, either embedded in the base product or sold
    separately. You will look at how to control management access later in the chapter.
    It is important to be clear that when using, for example, the Performance pages
    discussed in [Chapter 9](#9781430249382_Ch09.xhtml), you are using a separately
    licensed feature and not the free base product. As you will see when we discuss
    management pack access, you can use the Packs for This Page link to determine
    the necessary license for any currently active page.


    As Oracle expanded its product offering through the 2000s into middleware, applications,
    and beyond, it became apparent that an enterprise-wide management tool would be
    a great advantage, and a source of additional revenue for Oracle. Each of the
    products that Oracle sold, however, tended to have both built-in management capabilities
    and internal teams that were experts in the management of their particular technology
    stack. Oracle settled on a solution by ensuring that the existing teams developed
    management functionality for their product within the Enterprise Manager product
    stack.


    As we approached the end of that decade, Oracle’s former database management product
    had become a fully fledged enterprise technology management product, allowing
    management of all Oracle products and a few third-party products via a centralized
    management console. There were, however, at least two structural problems with
    the product as it matured:


    *   Technology stack

    *   Interface


    ### Technology


    The technology stack in use for the 10.x series of Enterprise Manager was Oracle’s
    old J2EE application server platform, Oracle Internet Application Server. Oracle
    had effectively given up on this platform a couple of years previously with the
    purchase of the BEA WebLogic product line. The 11.x release of Grid Control migrated
    the existing Grid Control product to the newer WebLogic technology stack, and
    integrated the database-derived Grid Control interface with the newly developed
    Fusion Middleware Control that used Oracle’s own Application Development Framework
    (ADF). Enterprise Manager since 11g, therefore, has used the software stack shown
    in [Figure 4-1](#9781430249382_Ch04.xhtml#Fig1). This architecture is likely to
    be current for at least the next five years.


    ![9781430249382_Fig04-01.jpg](images/9781430249382_Fig04-01.jpg)


    [Figure 4-1](#9781430249382_Ch04.xhtml#_Fig1). Oracle Enterprise Manager technology
    stack'
