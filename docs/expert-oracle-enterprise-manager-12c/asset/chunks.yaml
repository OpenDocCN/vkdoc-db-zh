- fmt: "# Standby Management Server Post-Installation\n\nOne caveat of having a standby\
    \ site is the additional administrative overhead required. The standby site has\
    \ to be kept in sync with the primary site after the initial configuration. For\
    \ the repository database, `Data Guard` handles synchronization automatically.\
    \ Patches applied to the software homes on the primary also need to be applied\
    \ at the standby site. Any database scripts executed on the primary as part of\
    \ the patching process are handled by `Data Guard` and should not be executed\
    \ again on the standby site. Plug-ins deployed or updated on the primary site\
    \ are also required to be deployed and updated on the standby site. Failing to\
    \ do so will cause the `OMS` to fail to start up if a switchover is attempted.\
    \ See `Oracle Enterprise Manager Cloud Control Administrator’s Guide 13c Release\
    \ 2` for details on plug-in deployment and upgrades on the standby site.\n\nIn\
    \ addition to the preceding changes, the `SYSMAN` credentials should be kept in\
    \ sync on the primary and standby sites. If this is not done, role transitions\
    \ will fail on the standby `OMS`. To change the `SYSMAN` credentials on the primary\
    \ and standby `OMS`, follow these steps:\n\n1.  Change the `SYSMAN` password on\
    \ the primary `OMS`.\n\n    ```\n    $ emctl config oms -change_repos_pwd\n  \
    \  Oracle Enterprise Manager Cloud Control 13c Release 2\n    Copyright (c) 1996,\
    \ 2013 Oracle Corporation.  All rights reserved.\n    Enter Repository User's\
    \ Current Password :\n    Enter Repository User's New Password :\n\n    Changing\
    \ passwords in backend ...\n    Passwords changed in backend successfully.\n \
    \   Updating repository password in Credential Store...\n    Successfully updated\
    \ Repository password in Credential Store.\n    Restart all the OMSs using 'emctl\
    \ stop oms -all' and 'emctl start oms'.\n    Successfully changed repository password.\n\
    \    ```\n\n2.  Stop the `OMS`, including `Admin Server`.\n\n    ```\n    $ emctl\
    \ stop oms -all\n    Oracle Enterprise Manager Cloud Control 13c Release 2\n \
    \   Copyright (c) 1996, 2013 Oracle Corporation.  All rights reserved.\n    Stopping\
    \ WebTier...\n    WebTier Successfully Stopped\n    Stopping Oracle Management\
    \ Server...\n    Oracle Management Server Already Stopped\n    AdminServer Successfully\
    \ Stopped\n    Oracle Management Server is Down\n    ```\n\n3.  Start the `OMS`.\n\
    \n    ```\n    $ emctl start oms\n    Oracle Enterprise Manager Cloud Control\
    \ 13c Release 2\n    Copyright (c) 1996, 2013 Oracle Corporation.  All rights\
    \ reserved.\n    Starting Oracle Management Server...\n    Starting WebTier...\n\
    \    WebTier Successfully Started\n    Oracle Management Server Successfully Started\n\
    \    Oracle Management Server is Up\n    ```\n\n4.  Change the `SYSMAN` password\
    \ on the standby `OMS`.\n\n    ```\n    $ emctl config oms -change_repos_pwd -use_sys_pwd\
    \ -sys_pwd <sys_password>\n    Oracle Enterprise Manager Cloud Control 13c Release\
    \ 2\n    Copyright (c) 1996, 2013 Oracle Corporation.  All rights reserved.\n\
    \    Enter Repository User's New Password :\n\n    Changing passwords in backend\
    \ ...\n    Passwords changed in backend successfully.\n    Updating repository\
    \ password in Credential Store...\n    Successfully updated Repository password\
    \ in Credential Store.\n    Restart all the OMSs using 'emctl stop oms -all' and\
    \ 'emctl start oms'.\n    Successfully changed repository password.\n    ```\n\
    \n5.  Stop the `OMS`, including the `Admin Server`.\n\n    ```\n    $ emctl stop\
    \ oms -all\n    Oracle Enterprise Manager Cloud Control 13c Release 2\n    Copyright\
    \ (c) 1996, 2013 Oracle Corporation.  All rights reserved.\n    Stopping WebTier...\n\
    \    WebTier Successfully Stopped\n    Stopping Oracle Management Server...\n\
    \    Error occurred while trying to stop Oracle Management Server\n    AdminServer\
    \ Successfully Stopped\n    Oracle Management Server is Down\n    ```\n\n6.  Start\
    \ the `Admin Server`.\n\n    ```\n    $ emctl start oms -admin_only\n    Oracle\
    \ Enterprise Manager Cloud Control 13c Release 2\n    Copyright (c) 1996, 2013\
    \ Oracle Corporation.  All rights reserved.\n    Starting Admin Server only...\n\
    \    Admin Server Successfully Started\n    ```\n\n# Software Library\n\nThe Software\
    \ Library is used for patching, agent deployment, provisioning, and self-updating.\
    \ It should be installed on shared storage so that multiple management servers\
    \ can access it. Any of the following options can be used for shared storage:\n\
    \n*   `NFS`\n*   `OCFS2`\n*   `DBFS`\n*   `ACFS`\n\nBecause the Software Library\
    \ is so critical, it should be located on a highly available file system. This\
    \ means using a `RAID` (mirrored and striped) back-end storage system.\n\nThe\
    \ Software Library can be configured by logging into the Enterprise Manager console\
    \ and choosing `Setup` -> `Provisioning and Patching` -> `Software Library`. Choose\
    \ a location on a shared filesystem that has been mounted on the `OMS` for the\
    \ Software Library (see [Figure 13-29](#9781430249382_Ch13.xhtml#Fig29)). Multiple\
    \ locations can also be added.\n\n![9781430249382_Fig13-29.jpg](images/9781430249382_Fig13-29.jpg)\n\
    \n[Figure 13-29](#9781430249382_Ch13.xhtml#_Fig29) .  Software Library setup\n\
    \n# Backup\n\nIn a highly available Enterprise Manager Cloud Control configuration,\
    \ the three components—`OMS`, repository, and agent—are individually configured\
    \ to reduce downtime. Although we recommend that the highest level of availability\
    \ be implemented, the associated costs and required resources may be prohibitive.\
    \ Also, in any IT framework, failure of components is likely to happen over time.\
    \ As such, no high-availability architecture is complete without discussing backup\
    \ and recovery strategies.\n\nBacking up the Enterprise Manager ecosystem requires\
    \ a solution that encompasses the repository, `OMS`, and agents. Each component\
    \ is individually backed up based on its available methods. The management repository\
    \ database stores metrics and data provided by agents. It should be backed up\
    \ according to recommended backup strategies for Oracle databases using `RMAN`.\n\
    \n## Repository Backup\n\nThe first step in configuring a backup strategy for\
    \ the repository database is to ensure that it is in `ARCHIVELOG` mode. This will\
    \ allow consistent online backups to be taken and also facilitates point-in-time\
    \ recovery of the database. Hot backups should be taken regularly using recommended\
    \ backup strategies. Database high-availability features such as the `Fast Recovery\
    \ Area` and `flashback database` should also be enabled to allow for faster recovery\
    \ of the database in the event of a failure. Backups can be configured by using\
    \ the Enterprise Manager Cloud Control console. Consider using Enterprise Manager’s\
    \ `Recommended Backup Strategy` option to back up the repository database.\n\n\
    To schedule a database backup using Enterprise Manager, follow these steps:\n\n\
    1.  Go to the repository database home page and choose `Availability` -> `Backup\
    \ & Recovery` -> `Schedule Backup`.\n2.  Log in as a user with `SYSDBA` credentials.\n\
    3.  Click the `Schedule Oracle-Suggested Backup` button to create a fully automated\
    \ backup strategy based on the destination for the backups (`Disk`, `Tape`, and\
    \ so forth), as shown in [Figure 13-30](#9781430249382_Ch13.xhtml#Fig30). The\
    \ Oracle-suggested backup is based on an incrementally updated backup strategy.\
    \ It will schedule a full backup first, after which incremental backups will be\
    \ scheduled. Based on the backup, a recovery to any point in a day will be possible.\n\
    \n![9781430249382_Fig13-30.jpg](images/9781430249382_Fig13-30.jpg)\n\n[Figure\
    \ 13-30](#9781430249382_Ch13.xhtml#_Fig30) .  Scheduling an Oracle-suggested backup\n\
    \n**Note** If a disk-based backup strategy is used, Oracle recommends using the\
    \ `Fast Recovery Area` to enable faster recovery.\n\n4.  Select the destination\
    \ media for the backup, as shown in [Figure 13-31](#9781430249382_Ch13.xhtml#Fig31).\n\
    \n![9781430249382_Fig13-31.jpg](images/9781430249382_Fig13-31.jpg)\n\n[Figure\
    \ 13-31](#9781430249382_Ch13.xhtml#_Fig31) .  Scheduling a backup destination\
    \ type"
