    on Admin Server, start it (if not already up). 4\. Start the managed server through
    Node Manager. |

    | emctl status oms | Provides the status of the OMS. Use -details to get detailed
    information (including secure status and protocols used). |

    | emctl statusresync repos -name "resync name" | Lists the status of the given
    repository resynchronization operation. |

    | emctl stop oms [-all] [-force] | Stops the OMS in the following order: 1\. Stop
    the OHS. 2\. Stop the OPMN. 3\. Stop the managed server. Using -all stops the
    OMS in the following order: 1. Stop the OHS. 2\. Stop the OPMN. 3\. Stop the managed
    server. 4\. Stop the Admin Server if running. 5\. Stop the Node Manager. If either
    stop command does not shut down the relevant processes, use -force to forcefully
    stop them. |


    OMS Directories


    The OMS is installed into an Oracle middleware home, which may also contain the
    Oracle WebLogic Server (including the WebLogic Server administration console),
    an Oracle management agent for the middleware tier, the management service instance
    base directory, the Java Development Kit (JDK), and other configuration files.
    Some of these directories may be located outside the middleware home, depending
    on decisions you make at installation time. You need to be familiar with the important
    directories to configure, maintain, and troubleshoot the OMS. It’s probably easiest
    to look at this diagrammatically, so start by looking at [Figure 3-17](#9781430249382_Ch03.xhtml#Fig17),
    which shows you the default middleware home directory structure on an example
    environment.


    ![9781430249382_Fig03-17.jpg](images/9781430249382_Fig03-17.jpg)


    [Figure 3-17](#9781430249382_Ch03.xhtml#_Fig17). OMS directory structure


    [Table 3-4](#9781430249382_Ch03.xhtml#Tab4) explains what each of these directories
    is used for.


    [Table 3-4](#9781430249382_Ch03.xhtml#_Tab4). OMS Middleware Home Directories
    and Their Uses


    | Directory | Description |

    | --- | --- |

    | agent | Contains agent code and configuration files |

    | agent/agent_inst | The <AGENT_HOME> directory |

    | agent/agent_inst/bin | Contains the executable code for the agent running on
    the OMS |

    | agent/plugins | Contains configuration data for metadata plug-ins installed
    on the agent |

    | gc_inst | Default  location for OMS_INSTANCE_HOME |

    | gc_inst/em/EMGC_OMS1 | Default  location for EM_INSTANCE_HOME |

    | gc_inst/NodeManager | Contains the EM-specific NodeManager directory |

    | gc_inst/NodeManager/emnodemanager | Location where the EM-specific NodeManager
    is installed |

    | gc_inst/...servers | Default  location for the WebLogic Domain home |

    | gc_inst/...servers/EMGC_ADMINSERVER | Location of WLS Domain–related files for
    the EMGC_ADMINSERVER managed server |

    | gc_inst/...servers/EMGC_OMS1 | Location of WLS Domain–related files for the
    EMGC_OMS1 managed server |

    | gc_inst/WebTierIH1 | Middleware WebTier instance home |

    | jdk16 | Contains JDK configuration files |

    | logs | Contains Fusion Middleware files |

    | modules | Contains Fusion Middleware files |

    | oms | Contains OMS code and configuration files |

    | oms/bin | Contains the OMS binaries |

    | oms/sysman | Contains a variety of utilities such as RepManager |

    | oms/sysman/log | Contains log files related to the OMS, including component_info.log
    |

    | Oracle_BI1 [optional] | Contains the Oracle Business Intelligence Publisher
    configuration files, if BI Publisher is installed |

    | oracle_common | Contains common files used by the OMS, Oracle WebTier, and WebLogic
    Server |

    | Oracle_WT | Contains Oracle WebTier configuration files |

    | plugins | Contains configuration files for metadata plug-ins installed on the
    OMS |

    | user_projects | Contains Fusion Middleware files |

    | utils | Contains Fusion Middleware files |

    | wlserver_10.3 | Contains Fusion Middleware files |


    OMS Log and Trace Files


    There are six main log and trace files used for troubleshooting issues with the
    OMS. These are located under the OMS instance base directory (gc_inst in [Table
    3-4](#9781430249382_Ch03.xhtml#Tab4)). These files are as follows:


    *   emctl.log contains output from emctl commands.

    *   emctl.msg is generated when the OMS restarts because of critical errors.

    *   emoms.log, the log file for the console, contains information created when
    the OMS performs an action (such as starting or stopping) or generates an error.

    *   emoms.trc contains more-detailed tracing information to support troubleshooting
    errors.

    *   emoms_pbs.log contains errors or warnings for background modules such as the
    event and job systems.

    *   emoms_pbs.trc contains more-detailed tracing information to troubleshoot problems
    with background modules.'
