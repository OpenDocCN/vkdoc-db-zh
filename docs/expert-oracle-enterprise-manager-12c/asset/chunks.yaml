- fmt: 'These management packs allow you to define and extract test data that can
    be used in creating environments for testing on a variety of engineered systems
    and generic system platforms. Overall, these management packs help in defining,
    refining, and giving realistic testing results for migrations and consolidation
    efforts.


    ## Validating Application Performance


    After establishing your testing environment, you need to perform tests to validate
    that performance is acceptable compared to current production loads. Three tools
    that Oracle has developed to help with validating application performance are
    `Database Replay`, `SQL Performance Analyzer`, and `SQL Tuning Sets`. All of these
    capabilities are part of the `Real Application Testing (RAT)` suite. `RAT` is
    an option available with Oracle Database. `RAT` offers an ideal solution for validating
    production load performance in test environments.


    ### Database Replay


    The `Database Replay` feature provides the ability to capture production workloads,
    including online and batch workloads, and replay them against a test environment.
    It enables DBAs to test system changes, dependencies, and timings without the
    use of customized testing scripts. This saves both time and effort by reducing
    the time it takes to test, hence reducing overall testing cost. `EM12c` supplements
    `RAT` functionality by simplifying the process of saving and transferring the
    captured workload and performance data to the test system, setting up the test
    system, and replaying them via its central console.


    ![image](images/sq.jpg) **Note** In order to use the features of `Real Application
    Testing (RAT)`, you must purchase licenses. The only exception is `SQL Tuning
    Sets`, which can be licensed under either Oracle Tuning Pack or `RAT`.


    `EM12c` also introduced `Application Replay`, functionality similar to `Database
    Replay`, for the middle tier. `Application Replay` provides the most efficient,
    optimized, and highest-quality testing for validating application infrastructure
    changes for all Web and packaged Oracle applications.


    ### SQL Performance Analyzer and SQL Tuning Sets


    The `SQL Performance Analyzer` helps to predict and prevent SQL execution performance
    problems. It provides a detailed view of the impact of environment changes by
    running the SQL statements serially before and after the changes. It also generates
    a clear, detailed report outlining the impact on the workload due to the system
    change as well as the set of regressed SQL statements. The `Oracle Enterprise
    Manager 12c Tuning Advisor` supplements `SQL Performance Analyzer` and provides
    recommendations to optimize and tune the SQL statements for the best possible
    performance.


    `SQL Tuning Sets` are groupings of SQL statements that serve as input to `Automatic
    Database Diagnostic Monitor (ADDM)`, `SQL Tuning Advisor`, or `SQL Access Advisor`.
    They are database objects that include one or more SQL statements with their associated
    execution statistics and context. These tuning sets are used to help the DBA perform
    automatic tuning of SQL statements and they can be exported to test systems where
    they can be evaluated and improved.


    The three tools discussed in this section—`Database Replay`, `SQL Performance
    Analyzer`, and `SQL Tuning Sets`—were produced by Oracle to provide a methodological
    way for testing database loads. These tools work well individually. And together
    they provide a powerful way to monitor any environment, especially engineered
    systems.


    ## Management Phase


    After the database or application has been deployed in production, it’s important
    to ensure that the applications perform optimally and meet the service levels
    expected. The integrated view of Oracle Exadata’s hardware and software components
    in the `EM12c` console allows DBAs to navigate from the database performance page
    to the Oracle Exadata system health page. When Exadata is running correctly without
    issues, the system health button attached to the database is green. When `Oracle
    Enterprise Manager` detects an error, the system health button turns red, indicating
    a problem may be impacting the database availability.


    There can be many reasons (for example, load imbalance, `ASM`-related problems,
    cell failures, cell configuration issues, or network-related failures) that can
    impact Exadata performance. `EM12c` can help troubleshoot and diagnose those problems
    in Exadata and other engineered systems. `Automatic Database Diagnostic Monitor
    (ADDM)` and `Automatic Workload Repository (AWR)` functionalities of the database
    are key tools to performance analysis with the Exadata Database Machine.


    ### ADDM and AWR


    `ADDM` is a core part of the diagnostic infrastructure in the Oracle database.
    `ADDM` starts off with the analysis of snapshots based on key workload metrics
    taken within the database. These snapshots include critical performance information
    pertaining to the database kernel and the database workload as well as at the
    operating system level. `ADDM` runs on a regular basis, and it analyzes this information
    and makes recommendations on problems that it identifies.


    For example, when there are SQL load issues, the SQL Advisors make recommendations
    on how to tune the SQL statements. Also when there are I/O or CPU issues, `ADDM`
    gives advice on system resource optimization. And if you are running a `RAC`,
    `ADDM` analyzes your complete `RAC` infrastructure, including the interconnect,
    and offers advice on how to improve overall performance.


    `AWR` is a built-in repository, contained within the `SYSAUX` tablespace, that
    every Oracle database maintains about operational statistics. `AWR` is the foundation
    for all self-management functionality in the Oracle database. It is the primary
    source of information that keeps historical information on the Oracle database
    and how it is being used. The `AWR` repository and associated snapshots enable
    the database to make decisions that are specifically tailored for the environment
    it is operating in.


    ### ASH Analytics


    `EM12c` introduced a new tool to explore the `Active Session History (ASH)` data.
    `ASH Analytics` allows DBAs to analyze performance data across various performance
    dimensions. This ability to create filters on various dimensions really simplifies
    the identification of performance issues.


    ![image](images/sq.jpg) **Note** `Active Session History (ASH)` is a `PL/SQL`
    package that has to be installed before it can be used. More information on `ASH`
    can be found in [Chapter 9](#9781430249382_Ch09.xhtml).


    As shown in [Figure 8-17](#9781430249382_Ch08.xhtml#Fig17), the drop-down menu
    of `ASH Analytics` allows administrators to explore performance data by using
    predefined performance dimension hierarchies.


    ![9781430249382_Fig08-17.jpg](images/9781430249382_Fig08-17.jpg)


    [Figure 8-17](#9781430249382_Ch08.xhtml#_Fig17). Active Session History ( ASH
    ) Analytics


    The `ASH Analytics` feature can be used on any Oracle 11g database running on
    an Oracle Exadata Database Machine or on a non-Oracle platform. For example, by
    using the Wait event dimension, you can zero down onto Oracle Exadata specific
    wait events and resolve performance-related issues.


    ## I/O Resource Manager


    The Exadata `I/O Resource Manager (IORM)` is another key capability of Oracle
    Exadata that guarantees a database gets the minimal amount of I/O as defined in
    the resource plan at each storage server. Let’s take an example of an Exadata
    environment where multiple applications and databases are running.


    [Figure 8-18](#9781430249382_Ch08.xhtml#Fig18) shows the Exadata storage server
    grid view, where you can see that the `IORM` is not enabled and the `CRM` database
    is not getting enough I/O resources since the `DW` database is hogging a lot of
    them. The `DW` database is a legitimate database, and you can’t simply kill the
    process because it’s consuming a lot of resources. You will need to find a more
    creative way to address the problem.


    ![9781430249382_Fig08-18.jpg](images/9781430249382_Fig08-18.jpg)


    [Figure 8-18](#9781430249382_Ch08.xhtml#_Fig18). Exadata storage server grid with
    IORM not enabled'
