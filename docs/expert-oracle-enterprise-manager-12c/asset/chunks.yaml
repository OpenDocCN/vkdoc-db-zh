    You can control the number and size of these files by using an `emctl` command.
    The exact command varies depending on which file you want to control. You can
    also control which information goes into `emoms.trc`. By default, the OMS writes
    only warning and critical messages into the trace file, but you can change the
    level of information written there by using the following command:


    ```

    $ emctl set property -name "log4j.rootCategory" -value "<LEVEL>, emlogAppender,
    emtrcAppender" -module logging

    ```


    where `<LEVEL>` is one of the following values—`INFO`, `WARN`, `ERROR`, or `DEBUG`.
