- fmt: '# SQL Details Page in Oracle Enterprise Manager Cloud Control 12c


    ![image](images/sq.jpg) **Tip** If you run SQL from the EM12c console on a regular
    basis, it is best to ensure that the `Host` and `Database Preferred credentials`
    are set up to reduce issues with failed executions.


    Once executed, the following information is returned:


    ```

    OWNER        OBJECT_NAME            OBJECT_TYPE          PROGRAM_LINE#


    USER1        GET_NEW_FUNC           FUNCTION             9

    ```


    The preceding information shows the object name, the object type, and the line
    number. This data can be used to quickly identify where the problem is in the
    code.


    ## SQL Details Activity Tab


    The `SQL Details Activity` tab, shown in [Figure 9-16](#9781430249382_Ch09.xhtml#Fig16),
    offers a SQL-specific view of `Top Activity` data, eliminating all other SQL waits
    and SQL executions, other than the one `SQL ID` in question. The grayed area can
    be moved anywhere within the timeline shown to highlight waits within the SQL
    activity. As this is SQL activity vs. session activity, the sessions executing
    the SQL in the Details page are shown at the bottom, along with percentage of
    activity, the session ID (`SID`) if the session is part of a parallel process,
    the `QC SID` (including all parallel sessions for the user executing the SQL),
    the program the SQL is part of, and whether there is a plan hash value that the
    SQL is identified with.


    ![9781430249382_Fig09-16.jpg](images/9781430249382_Fig09-16.jpg)


    [Figure 9-16](#9781430249382_Ch09.xhtml#_Fig16). `Activity` tab of the `SQL Details`
    page


    You can execute an HTML version of an `AWR` or `ASH` report from this pane to
    further investigate the activity and database performance by clicking a `SQL ID`
    and entering the interface for the `SQL Details` page.


    ## SQL Statistics


    The first tab in the `SQL Details` page, `Statistics`, contains SQL statistics
    data. This view, shown in [Figure 9-17](#9781430249382_Ch09.xhtml#Fig17), gives
    active session information, breaking down the activity by waits, time, elapsed
    time (database time vs. CPU time), execution statistics, and cursor statistics.


    ![9781430249382_Fig09-17.jpg](images/9781430249382_Fig09-17.jpg)


    [Figure 9-17](#9781430249382_Ch09.xhtml#_Fig17). `Statistics` activity in the
    `SQL Details` page


    ## SQL Plan


    The `Plan` tab provides the actual explain plan for the `SQL ID` detailed, either
    in graphical or tabular format. The tabular version, shown in [Figure 9-18](#9781430249382_Ch09.xhtml#Fig18),
    offers a drop-down menu if more than one hash plan value is available for the
    SQL statement. Basic plan information is shown, such as the parsing schema, optimizer
    mode, source of the statement, and capture time.


    ![9781430249382_Fig09-18.jpg](images/9781430249382_Fig09-18.jpg)


    [Figure 9-18](#9781430249382_Ch09.xhtml#_Fig18). Tabular representation of an
    explain plan for a statement from the `SQL Details` page


    Also provided in the EM12c console version of the tabular plan are the type of
    waits by legend color in the `Optimization Cost` section. You can also see the
    rows, along with a graph line to quickly access the number of rows expected to
    be returned, and the bytes, again displayed with a visual indicator of the number
    of bytes expected. You can click any of the indicators in the `Predicate` column
    (highlighted in [Figure 9-18](#9781430249382_Ch09.xhtml#Fig18)) to view predicates
    and filters and more-detailed information on the step in question.


    The graphical version of the `Plan` tab in `SQL Details` provides a visual display
    of the explain plan (see [Figure 9-19](#9781430249382_Ch09.xhtml#Fig19)). This
    is a step-by-step path of the statement, displaying joins, loops, and group objects
    through the SQL execution.


    ![9781430249382_Fig09-19.jpg](images/9781430249382_Fig09-19.jpg)


    [Figure 9-19](#9781430249382_Ch09.xhtml#_Fig19). Graphical explain plan for a
    statement, demonstrating a merge join highlighted in the console pane


    Projections, definitive column joins, and even bloom filters are shown when highlighting
    sections of the explain plan’s graphical format. The buttons at the upper right
    in [Figure 9-19](#9781430249382_Ch09.xhtml#Fig19) enable you to change the display
    to a vertical map from horizontal, perform a rewrite, or print out the explain
    plan graphic. The zoom bar on the left, under the `Graphical` and `Tabular` radio
    buttons, enables you to zoom in and out as needed.


    ## SQL Plan Control


    The `Plan Control` tab is available for advanced features such as `SQL profiles`,
    `SQL patches`, and `SQL plan baselines`. This pane is helpful in quickly determining
    whether a baseline is locking the plan into a potential suboptimal explain plan
    version, and whether a `SQL profile` or `SQL patch` is in place controlling the
    choice the optimizer makes for the SQL detailed in the pane. As with all tabs
    in the `SQL Details` page, you can easily execute a SQL worksheet or schedule
    a `SQL Tuning Advisor` from the bottom right of the panel.


    ![image](images/sq.jpg) **Note** Because the `SQL Tuning Advisor` is so readily
    available and automated with nightly runs, `SQL profiles` are becoming database
    standards. This combination of hints, outlines, and stats, connected to a statement
    through its `SQL ID`, provides the DBA with a quick solution to nagging problems
    when complex issues exist in a process. As a `SQL profile` is connected only through
    the `SQL ID`, any change to the SQL statement stops the `SQL profile` from functioning.


    ## SQL Tuning History


    The `Tuning History` tab supports the `Plan Control` section of the `SQL Details`
    page, offering historical information regarding previous advisor tasks against
    the SQL detailed or any `ADDM` findings during the historic period in question.
    If a `SQL Tuning` task has been executed against the `SQL ID`, it will show in
    the history, and a link is available to view details on the findings, even if
    the plan was not implemented.


    ## SQL Monitoring


    The `SQL Monitoring` tab gives a micro-view of what is offered in the full `SQL
    Monitor` (covered in full detail later in this chapter). This grants a clear view
    of what SQL is being executed for the session, along with completed SQL in previous
    executions for the session involved, how long each execution elapsed, I/O requests,
    and start/finish times (see [Figure 9-20](#9781430249382_Ch09.xhtml#Fig20)).


    ![9781430249382_Fig09-20.jpg](images/9781430249382_Fig09-20.jpg)


    [Figure 9-20](#9781430249382_Ch09.xhtml#_Fig20). `SQL Monitoring` view of a data
    pump process


    Each of these tabs offers valuable information when inspecting a SQL statement
    for optimization opportunities, baseline information, explain plan stability,
    and resource usage. By utilizing this small section of the `Top Activity` page,
    the administrator can provide great insight quickly into any SQL statement captured.


    ## Top Sessions Pane


    `Top Sessions` encompasses the bottom-right pane of the `Top Activity` page by
    default. Although this section can be changed to display top information regarding
    services, modules, actions, clients, files, objects, or `PL/SQL` (see [Figure
    9-21](#9781430249382_Ch09.xhtml#Fig21)), session information is the main data
    that is found most useful by administrators.


    ![9781430249382_Fig09-21.jpg](images/9781430249382_Fig09-21.jpg)


    [Figure 9-21](#9781430249382_Ch09.xhtml#_Fig21). `Top Sessions` of the `Top Activity`
    page, along with the drop-down list of other `Top` options


    In this pane, you can not only highlight wait events that are color coded to match
    the legend in the `Top Activity` graph, but also access links to each of the `SIDs`
    and usernames. The program executing the session is also displayed prominently
    to the right, helping to quickly distinguish the session.


    As this page is distinguished by session information, clicking any `SID` opens
    the `Session Details` page.


    ## Session Details Page'
