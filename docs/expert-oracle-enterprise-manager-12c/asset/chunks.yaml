- fmt: '# Defect Diagnostics


    Oracle Enterprise Manager offers a great solution for troubleshooting problems
    and diagnosing defects anywhere within the IT stack. The Support Workbench and
    Incident Manager are key components to `EM12c` capabilities for defect diagnostics.


    The `Support Workbench` interacts with the advanced fault diagnostic infrastructure
    of the Oracle database for detecting, diagnosing, and resolving problems in the
    `Exadata Database Machine`. It offers an easy-to-use graphical interface to investigate
    reports and resolve the problems in the `Exadata` infrastructure. It helps minimize
    the time to resolve any problem by packaging diagnostic data using `IPS`, helping
    obtain a support request number, and uploading the `IPS` package to Oracle Support.
    It supports viewing and reporting of incidents with correlated packaging from
    the database, `Automatic Storage Management` (`ASM`) through to `Exadata`.


    [Figure 8-24](#9781430249382_Ch08.xhtml#Fig24) shows the `Support Workbench` for
    an `Exadata` cell. If there was an issue, you could gather all the files needed
    through this interface and report the incident to Oracle for resolution.


    ![9781430249382_Fig08-24.jpg](images/9781430249382_Fig08-24.jpg)


    [Figure 8-24](#9781430249382_Ch08.xhtml#_Fig24). Support Workbench for an Exadata
    cell


    One of the best features that `EM12c` has introduced is a centralized incident
    console called `Incident Manager`. `Incident Manager` enables the administrator
    to track, diagnose, and resolve incidents that can be an event or closely correlated
    events that represent an observed issue. [Figure 8-25](#9781430249382_Ch08.xhtml#Fig25)
    shows the main console for `Incident Manager`.


    ![9781430249382_Fig08-25.jpg](images/9781430249382_Fig08-25.jpg)


    [Figure 8-25](#9781430249382_Ch08.xhtml#_Fig25). Incident Manager console


    The goal of incident management is to enable administrators to monitor and resolve
    service disruptions as quickly and efficiently as possible. Instead of managing
    the numerous discrete events that may occur due to any service disruptions, incident
    management allows you to manage a smaller number of more meaningful incidents
    based on business priority.


    `Incident Manager` also leverages `My Oracle Support` knowledge base articles
    and documentation to accelerate the problem diagnosis and resolution. Additionally,
    `Incident Manager` now allows you to assign ownership, acknowledge an incident,
    set priority for an incident, track an incident’s status, and escalate or defer
    the incident. Using help-desk connectors, `Incident Manager` can also generate
    notifications of an incident or open a help-desk ticket.


    [Figure 8-26](#9781430249382_Ch08.xhtml#Fig26) shows the subsection where additional
    information of the incident can be viewed. The tabs within this section provide
    general information on the incident, associated events, associated `MOS` notes,
    updates that have happened to the incident, and whether any other related events
    have happened.


    ![9781430249382_Fig08-26.jpg](images/9781430249382_Fig08-26.jpg)


    [Figure 8-26](#9781430249382_Ch08.xhtml#_Fig26). Incident Manager detail subsection


    ![image](images/sq.jpg) **Note**  For the `My Oracle Support Knowledge` tab to
    function, `My Oracle Support` needs to be set up with `MOS` credentials through
    the `Setup` menu within Oracle Enterprise Manager.


    Between the `Support Workbench` and `Incident Manager`, `EM12c` has come with
    some robust and flexible options for identifying, troubleshooting, and resolving
    issues that can occur within an `Exadata Database Machine`. These diagnostic tools
    can be taken further and used with the help-desk ticketing software by extension
    with management connectors.


    # Automated Patch Management


    To minimize application downtime, it is important to make sure that all recommended
    patches are applied in a timely manner. Patching can be a complex and time-consuming
    activity. `EM12c` addresses this concern by automating the deployment of patches,
    using the `Lifecycle Management Pack`, to ensure that patches are applied to your
    `Oracle Exadata Database Machine` or any other engineered systems. The `Lifecycle
    Management Pack` automates the deployment of Oracle patches for Oracle databases
    and infrastructure components including `Grid Infrastructure` (`Clusterware`,
    `ASM`, and `Oracle RAC`).


    With the integrated interface to `My Oracle Support`, Oracle Enterprise Manager
    can analyze, recommend, and download the patches needed for your environment.
    You can then apply them to your test environment and promote them to a staging
    area, deploy them into production, and verify that they were applied correctly.


    In environments where `Oracle Real Application Clusters` are deployed, certain
    patches can be applied in a rolling fashion to each node in the cluster to eliminate
    the need for downtime to patch. `Real Application Cluster` deployment procedures
    are used to orchestrate shutdown, patching, and startup across nodes in a rolling
    manner to minimize downtime.


    # Summary


    `EM12c` offers comprehensive management capabilities of engineered systems. Although
    the applications and databases run on the engineered systems pretty similarly
    to how they do on a stand-alone system, the tighter integration of hardware and
    software brings additional administration and management capabilities. Oracle
    Enterprise Manager addresses those capabilities and provides seamless management
    from a single console that manages the complete Oracle stack throughout the IT
    lifecycle.


