  trans: '

    资料库是代理上传的监控数据的持久化存储。它存储所有监控目标的指标和配置数据。资料库丢失将导致管理服务器故障。建议启用数据库高可用性功能，例如用于数据文件存储（取决于冗余级别和后端
    RAID 配置）的实时应用集群 (`RAC`) 或 `RAC One Node`、自动存储管理 (`ASM`)，以及用于资料库的数据卫士 (`Data Guard`)。此外，如果资料库配置为
    `RAC` 数据库，则管理服务应配置为使用单客户端访问名称 (`SCAN`) 和非默认的 `RAC` 服务名。以下是一个为 `RAC` 数据库配置管理服务的示例：

    ```

    emctl config oms -store_repos_details -repos_conndesc "

    (DESCRIPTION= (ADDRESS=(PROTOCOL=TCP)

    (HOST=emrep-scan.example.com)(PORT=1521) )

    (CONNECT_DATA=(SERVER=DEDICATED) (SERVICE_NAME = emrep)))"

    -repos_user sysman

    ```


    图 13-2 展示了一个使用 `SCAN` 名称配置的、采用 `RAC` 资料库数据库的 `OMS` 示例。有关配置 `SCAN` 的更多详细信息，请参阅
    *《Oracle Clusterware 管理与部署指南 11g 第 2 版 (11.2)》*。


    ![9781430249382_Fig13-02.jpg](img/9781430249382_Fig13-02.jpg)


    图 13-2 . 使用 `RAC` 数据库配置的资料库数据库


    考虑使用 Enterprise Manager Cloud Control 12c 中的最大可用性架构¹ (`MAA`) 顾问来配置额外的 `HA` 组件，包括以下内容：

    *   启用 `ARCHIVELOG` 模式，以便可以执行数据库的一致性热备份。

    *   启用块校验和，使 Oracle 能够检测物理磁盘或存储系统导致的损坏。将 `DB_BLOCK_CHECKSUM` 参数设置为 `TYPICAL` 或
    `FULL`。

    *   适当配置重做日志文件和组的大小。优化数据库的 `I/O` 吞吐量和性能，以使日志切换不会过于频繁。使用重做日志大小调整顾问（通过设置 `FAST_START_MTTR_TARGET`
    启用）有助于确定最佳大小。

    *   使用快速恢复区² 存储重做日志和归档日志等与恢复相关的文件。然后 Oracle 可以使用建议的、利用快速恢复区的备份机制。

    *   启用闪回数据库，以便使用闪回日志实现更快的数据库恢复。

    *   使用快速启动故障恢复来控制实例恢复时间。设置初始化参数 `FAST_START_MTTR_TARGET` 以指定实例恢复应占用的秒数。

    *   启用数据库块检查，以便及早检测和防止数据及内存损坏。将 `DB_BLOCK_CHECKING` 设置为 `TRUE` 或 `FULL`。


    配置完组件后，您可以使用高可用性控制台（如 图 13-3 所示）监控每个组件的状态。


    ![9781430249382_Fig13-03.jpg](img/9781430249382_Fig13-03.jpg)


    图 13-3 . Enterprise Manager Cloud Control 12c 高可用性控制台


    ![image](img/sq.jpg) **注意** 管理资料库应配置在其自己的数据库中，以确保对资料库的操作不会影响其他应用程序，反之亦然。


    建议使用物理备用数据库，以便在主站点发生故障时提供灾难恢复。主资料库上的数据将与备用数据库保持同步。为资料库数据库配置物理备用时，请使用与主站点类似的硬件和资源，以便在发生故障切换/切换时不会出现任何性能影响。使用
    Enterprise Manager 从主数据库创建备用数据库。根据您的网络带宽和恢复目标确定要用于同步备用数据库的网络模式：

    *   `最大保护`：同步写入备用库

    *   `最大可用性`：同步写入备用库

    *   `最高性能`：异步写入备用库


    ![image](img/sq.jpg) **注意** Enterprise Manager 只能创建单实例备用数据库。您可以使用 Enterprise Manager
    中的“转换为 `RAC`”功能将单实例物理备用数据库转换为 `RAC`。


    ## 管理服务


    管理服务 (`OMS`) 通过 Enterprise Manager 控制台提供用户界面，并处理来自代理的数据。`OMS` 丢失将导致 Enterprise
    Manager 完全中断：代理上传、作业、事件和通知都将停止运行。Oracle WebLogic Node Manager 和 Oracle 进程管理器与通知服务器
    (`OPMN`) 将尝试在管理服务宕机时自动重启它。虽然这提供了一些好处，但如果主机宕机，它并不能保护 `OMS`。至少，如果可能，`OMS` 和资料库应安装在不同的主机上。多个
    `OMS` 可以部署在服务器负载均衡器之后，以提供针对单台主机故障的保护。此外，您可以选择在共享文件系统上安装 `OMS`，这将在单台主机丢失时提供被动故障转移。我们将详细探讨保护
    `OMS` 的每种选项。


    ### 级别 1 — 分离的 `OMS` 和资料库主机/无冗余


    级别 1 配置由单个 `OMS` 和资料库组成，每个都安装在其自己的主机上。此配置提供的保护最少，因为任何主机的故障都将导致 Enterprise Manager
    系统完全中断。应考虑 `OMS` 和资料库之间的距离，因为两者之间的高网络延迟会降低性能。建议除最小配置外的所有配置都采用此配置。


    图 13-4 是级别 1 高可用性配置的示意图。代理直接上传到管理服务主机，而用户通过 Enterprise Manager 控制台或命令行 `EMCLI`
    直接与物理 `OMS` 主机交互。如果管理服务或资料库数据库主机中的任何一个变得不可用，将发生完全中断，导致目标监控丢失。将每个组件保留在其自己的服务器上可以降低它们因资源开销而相互影响的可能性。例如，增加数据库参数
    `sga_max_size` 和 `sga_target` 可能会降低 `OMS` 的性能，因为这样做会减少操作系统可用的内存量。此外，它为根据业务需求扩展环境奠定了基础。


    ![9781430249382_Fig13-04.jpg](img/9781430249382_Fig13-04.jpg)


    图 13-4 . `OMS` 和资料库位于不同服务器上的级别 1 高可用性配置


    ### 级别 2 — 主动/被动 `OMS` 和数据卫士资料库


    为了减少计划内或计划外中断期间的 `OMS` 停机时间，应在配置中引入一些冗余。级别 2 配置使用共享文件系统实现管理服务的主动/被动（或冷）故障转移集群解决方案。文件系统在两个或多个主机之间共享，且一次仅在一个主机上处于活动状态。


    作为级别 2 高可用性配置的先决条件，应执行以下步骤：

    1.  `OMS` 的共享文件系统可以安装在通用集群文件系统上，包括 `NFS`、Oracle 集群文件系统 (`OCFS2`) 和 Oracle 自动存储管理集群文件系统
    (`ACFS`)。如果使用 `NFS` 作为共享存储，请确保在 `/etc/fstab`（AIX 上为 `/etc/filesystems`）中设置正确的挂载选项，以防止潜在的
    `I/O` 问题。具体来说，应设置 `rsize` 和 `wsize`。

    '
- fmt: "The following example shows an entry in the `/etc/fstab` file on a Linux server;\
    \ the NFS share is mounted on a filer named `filer1` under the `/vol1/oms_share`\
    \ directory.\n\n```\nfiler:/vol1/oms_share /u01/app/oms_share nfs rw,bg,rsize=32768,wsize=32768,hard,nointr,tcp,noac,vers=3,timeo=600\
    \ 0 0\n```\n\n2.  Install binaries for the OMS, along with the inventory, on the\
    \ shared filesystem.\n3.  Set up the virtual hostname and IP address (VIP) by\
    \ using Oracle Clusterware or third-party software and hardware. Failover is achieved\
    \ by using the virtual hostname for the OMS along with a unique IP address that\
    \ resolves to the hostname.\n4.  Configure the repository database by using a\
    \ local physical standby with Data Guard (see [Figure 13-5](#9781430249382_Ch13.xhtml#Fig5)).\n\
    \n![9781430249382_Fig13-05.jpg](images/9781430249382_Fig13-05.jpg)\n\n[Figure\
    \ 13-5](#9781430249382_Ch13.xhtml#_Fig5). Level 2 Enteprise Manager Cloud Control\
    \ 12c high-availability configuration with active/passive OMS and local standby\n\
    \nIn our example, we will use Oracle Clusterware to create and manage the virtual\
    \ hostname as well as perform failover of the application. `OCFS2` is chosen as\
    \ the shared filesystem.\n\n![image](images/sq.jpg) **Note** `OCFS v1` is not\
    \ supported as shared storage for the OMS.\n\nYou should configure the following\
    \ prerequisites on all hosts before installing the management service:\n\n1. \
    \ Ensure that the OS user ID is identical on each host where the OMS will be installed.\n\
    \n![image](images/sq.jpg) **Note** For Red Hat Enterprise Linux and Oracle Linux\
    \ operating systems, install the `oracle-validated` or `oracle-preinstall-11gr2`\
    \ package to enable consistent UIDs and GIDs.\n\n```\n[oracle@oms1 ∼]$ id -a\n\
    uid=1101(oracle) gid=1000(oinstall) groups=1000(oinstall),1021(asmdba),1032(dba)\n\
    ```\n\n2.  Set environment variables.\n    *   a. Operating System Time Zone variable,\
    \ `TZ`:[³](#9781430249382_Ch13.xhtml#Fn3)\n\n    ```\n    export TZ='America/New_York'\n\
    \    ```\n\n    *   b. The `PERL5LIB` variable should be unset to avoid being\
    \ associated with the incorrect PERL libraries.\n3.  Install Oracle Clusterware\
    \ on both servers (see the *Oracle Grid Infrastructure Installation Guide*).\n\
    4.  Install and configure `OCFS2`.\n5.  Prepare the database for use with `OMS`\
    \ (see [Chapter 2](#9781430249382_Ch02.xhtml) for more information).\n\nBefore\
    \ installing the `OMS`, a virtual hostname that maps to a unique static IP address\
    \ should be available (which means an IP address that is currently not used, in\
    \ the same subnet as the other Enterprise Manager components). A VIP is configured\
    \ on the public subnet used for accessing the server. If the server that hosts\
    \ the VIP goes down, it is relocated to an available member of the cluster by\
    \ Oracle Clusterware. Likewise, if maintenance needs to be performed on a server\
    \ hosting the VIP, it can be relocated to another server in the cluster.\n\nA\
    \ VIP can be created in the same way as any other Clusterware resource. However,\
    \ Oracle recommends that you use the `appvipcfg` utility in Oracle Clusterware\
    \ 11gR2 to create application VIPs. The VIP is created with a set of predefined\
    \ settings suitable for an application VIP, such as a placement policy and failback[⁴](#9781430249382_Ch13.xhtml#Fn4)\
    \ option. See *Oracle Clusterware Administration and Deployment Guide11gR2* documentation\
    \ for details on using `appvipcfg`.\n\nUsing the following steps, create an application\
    \ VIP for the `OMS`:\n\n1.  After installing Oracle Clusterware 11gR2, log in\
    \ as the `ROOT` user and issue the following command:\n\n    ```\n    GRID_HOME/bin/appvipcfg\
    \ create -network=1 \\\n           -ip=192.168.1.0 \\\n           -vipname=omsvip\
    \ \\\n           -user=root\n    ```\n\nAn example output of running `appvipcfg`\
    \ is as follows:\n\n```\n[root@oms1 bin]# /u01/app/11.2.0/grid/bin/appvipcfg create\
    \ -network=1 \\\n-ip=192.168.1.0 \\\n-vipname=omsvip \\\n-user=root\nProduction\
    \ Copyright 2007, 2008, Oracle.All rights reserved\n2012-10-28 03:30:29: Creating\
    \ Resource Type\n2012-10-28 03:30:29: Executing /u01/app/11.2.0/grid/bin/crsctl\
    \ add type\napp.appvip_net1.type -basetype ora.cluster_vip_net1.type -file\n/u01/app/11.2.0/grid/crs/template/appvip.type\n\
    2012-10-28 03:30:29: Executing cmd: /u01/app/11.2.0/grid/bin/crsctl add type\n\
    app.appvip_net1.type -basetype ora.cluster_vip_net1.type -file\n/u01/app/11.2.0/grid/crs/template/appvip.type\n\
    2012-10-28 03:30:37: Create the Resource\n2012-10-28 03:30:37: Executing /u01/app/11.2.0/grid/bin/crsctl\
    \ add resource\nomsvip -type app.appvip_net1.type -attr\n\"USR_ORA_VIP=192.168.1.0,START_DEPENDENCIES=hard(ora.net1.network)\n\
    pullup(ora.net1.network),STOP_DEPENDENCIES=hard(ora.net1.network),\nACL='owner:root:rwx,pgrp:root:r-x,other::r--,user:root:r-x',\n\
    HOSTING_MEMBERS=oms1.example.com,APPSVIP_FAILBACK=\"\n2012-10-28 03:30:37: Executing\
    \ cmd: /u01/app/11.2.0/grid/bin/crsctl add\nresource omsvip -type app.appvip_net1.type\
    \ -attr\n\"USR_ORA_VIP=192.168.1.0,START_DEPENDENCIES=hard(ora.net1.network)\n\
    pullup(ora.net1.network),STOP_DEPENDENCIES=hard(ora.net1.network),\nACL='owner:root:rwx,pgrp:root:r-x,other::r--,user:root:r-x',\n\
    HOSTING_MEMBERS=oms1.example.com,APPSVIP_FAILBACK=\"\n```\n\nThis creates a VIP\
    \ on network 1, which is defined as IP address `192.168.1.0`. The VIP name is\
    \ `omsvip` and it is owned by the `ROOT` user.\n\n2.  Next you need to allow the\
    \ Oracle Grid Infrastructure software owner (for example, `GRID`) to run the script\
    \ to start the VIP. As `ROOT`, execute the following:\n\n    ```\n    GRID_HOME/bin/crsctl\
    \ setperm resource omsvip -u user:grid:r-x\n    ```\n\n3.  Start the VIP as the\
    \ `GRID` user.\n\n    ```\n    GRID_HOME/bin/crsctl start resource omsvip\n  \
    \  ```\n\nFor example:\n\n```\n[grid@oms1 ∼]$ $GRID_HOME/bin/crsctl start resource\
    \ omsvip\nCRS-2672: Attempting to start 'omsvip' on 'oms1'\nCRS-2676: Start of\
    \ 'omsvip' on 'oms1' succeeded\n```\n\n4.  Check the status of the VIP.\n\n  \
    \  ```\n    GRID_HOME/bin/crsctl status resource omsvip\n    ```\n\nThe status\
    \ of the output should be similar to the following:\n\n```\nNAME=omsvip\nTYPE=app.appvip_net1.type\n\
    TARGET=ONLINE\nSTATE=ONLINE on oms1\n```\n\n5.  The virtual hostname is defined\
    \ in DNS, and should resolve to the application VIP address created using the\
    \ preceding steps. Check whether the virtual hostname and VIP are resolvable by\
    \ using `nslookup` or the `dig` command.\n\n    ```\n    $ nslookup omsvip\n \
    \   ```\n\nThis should resolve to a unique IP address of the virtual hostname\
    \ on every node in the cluster.\n\n6.  Also do a reverse lookup of the IP address.\n\
    \n    ```\n    $nslookup <virtual IP address>\n    ```\n\n7.  Verify that the\
    \ IP address returned from the `nslookup` output is running on the `OMS` host.\n\
    \n    ```\n    ifconfig –a|grep <virtual IP address>\n    ```\n\n8.  After you\
    \ have verified that the virtual hostname and VIP have been configured correctly,\
    \ you can then proceed with the `OMS` installation. The following should be performed\
    \ before starting the installer:\n    *   a. Create a new `ORACLE_HOME` for the\
    \ `OMS` on the shared storage on all nodes in the cluster:\n\n        ```\n  \
    \      $ mkdir –p /u01/app/oms_share\n        ```\n\n    *   b. Create an Oracle\
    \ inventory directory under the `ORACLE_HOME` for the `OMS` on all nodes:\n\n\
    \        ```\n        $ mkdir /u01/app/oms_share/oraInventory\n        ```\n\n\
    \    *   c. Create the inventory pointer in the `oraInventory` directory:\n\n\
    \        ```\n        $ vi oraInst.loc\n        ```\n\nThe `oraInst.loc` file\
    \ should contain the path to the inventory and the group of the software owner\
    \ for the `OMS`. For example:\n\n```\ninventory_loc=/u01/app/oracle/oms_share/oraInventory\n\
    inst_group=oinstall\n```\n\n9.  Next, you proceed with the installation by specifying\
    \ the `ORACLE_HOSTNAME` environment variable as your virtual hostname and pointing\
    \ to the shared inventory location."
