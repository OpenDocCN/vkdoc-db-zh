    \n图 11-49. 如果您不希望尝试运行作业，必须取消选中默认复选框，以在中断期间跳过作业执行\n\n做出选择时需要考虑两点：\n\n*   如果您允许作业在中断期继续运行，而目标在作业即将结束时变得不可用（此时目标代理本应向作业服务发送成功执行代码），该作业将继续显示为正在运行，并且该作业的任何后续运行都将被跳过。\n\
    *   如果您在整个中断期内停止作业运行，则作业将在该中断期内被跳过。如果作业设置为在需要操作时通知，则会为每个被跳过的计划作业发送通知。\n\n由于中断期也是作为作业（但在后台运行）发出的，因此您也可以通过查询数据库中的表来查看这些中断期。以下查询示例展示了如何首先通过连接\
