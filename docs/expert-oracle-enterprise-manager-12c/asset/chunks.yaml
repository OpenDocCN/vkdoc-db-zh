  trans: "\n# 备用管理服务器安装后注意事项\n\n拥有备用站点的一个需要注意的点是，它需要额外的管理工作量。初始配置后，必须使备用站点与主站点保持同步。对于仓库数据库，`Data\
    \ Guard` 会自动处理同步。应用于主站点软件主目录的补丁也需要在备用站点应用。作为补丁过程一部分在主站点执行的任何数据库脚本都由 `Data Guard`\
    \ 处理，不应在备用站点再次执行。在主站点部署或更新的插件也要求在备用站点进行部署和更新。如果未能这样做，在尝试切换时将导致 `OMS` 无法启动。有关在备用站点部署和升级插件的详细信息，请参阅\
    \ `Oracle Enterprise Manager Cloud Control Administrator’s Guide 13c Release 2`。\n\
    \n除了上述更改外，`SYSMAN` 凭据也应在主站点和备用站点保持同步。如果不这样做，角色转换将在备用 `OMS` 上失败。要更改主备用 `OMS` 上的\
    \ `SYSMAN` 凭据，请遵循以下步骤：\n\n1.  在主 `OMS` 上更改 `SYSMAN` 密码。\n\n    ```\n    $ emctl\
    \ config oms -change_repos_pwd\n    Oracle Enterprise Manager Cloud Control 13c\
    \ Release 2\n    Copyright (c) 1996, 2013 Oracle Corporation.  All rights reserved.\n\
    \    Enter Repository User's Current Password :\n    Enter Repository User's New\
    \ Password :\n\n    Changing passwords in backend ...\n    Passwords changed in\
    \ backend successfully.\n    Updating repository password in Credential Store...\n\
    \    Successfully updated Repository password in Credential Store.\n    Restart\
    \ all the OMSs using 'emctl stop oms -all' and 'emctl start oms'.\n    Successfully\
    \ changed repository password.\n    ```\n\n2.  停止 `OMS`，包括 `Admin Server`。\n\n\
    \    ```\n    $ emctl stop oms -all\n    Oracle Enterprise Manager Cloud Control\
    \ 13c Release 2\n    Copyright (c) 1996, 2013 Oracle Corporation.  All rights\
    \ reserved.\n    Stopping WebTier...\n    WebTier Successfully Stopped\n    Stopping\
    \ Oracle Management Server...\n    Oracle Management Server Already Stopped\n\
    \    AdminServer Successfully Stopped\n    Oracle Management Server is Down\n\
    \    ```\n\n3.  启动 `OMS`。\n\n    ```\n    $ emctl start oms\n    Oracle Enterprise\
    \ Manager Cloud Control 13c Release 2\n    Copyright (c) 1996, 2013 Oracle Corporation.\
    \  All rights reserved.\n    Starting Oracle Management Server...\n    Starting\
    \ WebTier...\n    WebTier Successfully Started\n    Oracle Management Server Successfully\
    \ Started\n    Oracle Management Server is Up\n    ```\n\n4.  在备用 `OMS` 上更改 `SYSMAN`\
    \ 密码。\n\n    ```\n    $ emctl config oms -change_repos_pwd -use_sys_pwd -sys_pwd\
    \ <sys_password>\n    Oracle Enterprise Manager Cloud Control 13c Release 2\n\
    \    Copyright (c) 1996, 2013 Oracle Corporation.  All rights reserved.\n    Enter\
    \ Repository User's New Password :\n\n    Changing passwords in backend ...\n\
    \    Passwords changed in backend successfully.\n    Updating repository password\
    \ in Credential Store...\n    Successfully updated Repository password in Credential\
    \ Store.\n    Restart all the OMSs using 'emctl stop oms -all' and 'emctl start\
    \ oms'.\n    Successfully changed repository password.\n    ```\n\n5.  停止 `OMS`，包括\
    \ `Admin Server`。\n\n    ```\n    $ emctl stop oms -all\n    Oracle Enterprise\
    \ Manager Cloud Control 13c Release 2\n    Copyright (c) 1996, 2013 Oracle Corporation.\
    \  All rights reserved.\n    Stopping WebTier...\n    WebTier Successfully Stopped\n\
    \    Stopping Oracle Management Server...\n    Error occurred while trying to\
    \ stop Oracle Management Server\n    AdminServer Successfully Stopped\n    Oracle\
    \ Management Server is Down\n    ```\n\n6.  启动 `Admin Server`。\n\n    ```\n  \
    \  $ emctl start oms -admin_only\n    Oracle Enterprise Manager Cloud Control\
    \ 13c Release 2\n    Copyright (c) 1996, 2013 Oracle Corporation.  All rights\
    \ reserved.\n    Starting Admin Server only...\n    Admin Server Successfully\
    \ Started\n    ```\n\n# 软件库\n\n软件库用于打补丁、代理部署、资源调配和自更新。应将其安装在共享存储上，以便多个管理服务器可以访问。以下任何选项都可用于共享存储：\n\
    \n*   `NFS`\n*   `OCFS2`\n*   `DBFS`\n*   `ACFS`\n\n由于软件库至关重要，因此应位于高可用性文件系统上。这意味着使用\
    \ `RAID`（镜像和条带化）后端存储系统。\n\n可以通过登录 Enterprise Manager 控制台并选择 `Setup` -> `Provisioning\
    \ and Patching` -> `Software Library` 来配置软件库。为软件库选择一个已挂载到 `OMS` 上的共享文件系统位置（参见\
    \ 图 13-29）。也可以添加多个位置。\n\n![9781430249382_Fig13-29.jpg](img/9781430249382_Fig13-29.jpg)\n\
    \n图 13-29 . 软件库设置\n\n# 备份\n\n在高可用性 Enterprise Manager Cloud Control 配置中，`OMS`、仓库和代理这三个组件都单独配置以减少停机时间。尽管我们建议实施最高级别的可用性，但相关的成本和所需资源可能令人望而却步。此外，在任何\
    \ IT 框架中，随着时间的推移，组件故障很可能会发生。因此，任何高可用性架构如果不讨论备份和恢复策略都是不完整的。\n\n备份 Enterprise Manager\
    \ 生态系统需要一个涵盖仓库、`OMS` 和代理的解决方案。每个组件都根据其可用方法单独备份。管理仓库数据库存储由代理提供的指标和数据。应使用 `RMAN`\
    \ 按照 Oracle 数据库的推荐备份策略进行备份。\n\n## 仓库备份\n\n为仓库数据库配置备份策略的第一步是确保其处于 `ARCHIVELOG`\
    \ 模式。这将允许进行一致的联机备份，并便于数据库的及时点恢复。应使用推荐的备份策略定期进行热备份。还应启用数据库高可用性功能，如 `快速恢复区` 和 `闪回数据库`，以便在发生故障时能够更快地恢复数据库。可以通过使用\
    \ Enterprise Manager Cloud Control 控制台来配置备份。考虑使用 Enterprise Manager 的 `推荐备份策略`\
    \ 选项来备份仓库数据库。\n\n要使用 Enterprise Manager 计划数据库备份，请遵循以下步骤：\n\n1.  转到仓库数据库主页并选择 `Availability`\
    \ -> `Backup & Recovery` -> `Schedule Backup`。\n2.  以具有 `SYSDBA` 凭据的用户身份登录。\n\
    3.  单击 `Schedule Oracle-Suggested Backup` 按钮，根据备份的目标位置（`磁盘`、`磁带` 等）创建完全自动化的备份策略，如\
    \ 图 13-30 所示。Oracle 建议的备份基于增量更新备份策略。它将首先安排完整备份，之后将安排增量备份。基于此备份，可以恢复到一天中的任何时间点。\n\
    \n![9781430249382_Fig13-30.jpg](img/9781430249382_Fig13-30.jpg)\n\n图 13-30 . 计划\
    \ Oracle 建议的备份\n\n**注意** 如果使用基于磁盘的备份策略，Oracle 建议使用 `快速恢复区` 以实现更快的恢复。\n\n4.  选择备份的目标介质，如\
    \ 图 13-31 所示。\n\n![9781430249382_Fig13-31.jpg](img/9781430249382_Fig13-31.jpg)\n\
    \n图 13-31 . 计划备份目标类型\n"
- fmt: "## 调度备份\n\n1.  输入备份的位置，如 [图 13-32](#9781430249382_Ch13.xhtml#Fig32) 所示。在基于磁盘的备份策略中，默认使用已配置的快速恢复区域。\n\
    \n    ![9781430249382_Fig13-32.jpg](images/9781430249382_Fig13-32.jpg)\n    [图\
    \ 13-32](#9781430249382_Ch13.xhtml#_Fig32) . 选择快速恢复区域作为基于磁盘的备份位置\n\n2.  输入循环备份的时间表，如\
    \ [图 13-33](#9781430249382_Ch13.xhtml#Fig33) 所示。\n\n    ![9781430249382_Fig13-33.jpg](images/9781430249382_Fig13-33.jpg)\n\
    \    [图 13-33](#9781430249382_Ch13.xhtml#_Fig33) . Oracle 建议的备份时间表\n\n3.  检查备份设置和生成的\
    \ `RMAN` 脚本（参见 [图 13-34](#9781430249382_Ch13.xhtml#Fig34)）。单击“提交作业”以计划备份。\n\n\
    \    ![9781430249382_Fig13-34.jpg](images/9781430249382_Fig13-34.jpg)\n    [图\
    \ 13-34](#9781430249382_Ch13.xhtml#_Fig34) . Oracle 建议的备份设置\n\n使用 Oracle Enterprise\
    \ Manager Cloud Control 计划备份作业还可以让你接收有关作业状态的通知，并查看包括运行时间和上次备份时间在内的备份信息。\n\n##\
    \ Oracle 管理服务备份\n\nOracle 管理服务负责与管理代理通信并将数据上传到管理存储库。它包括 Oracle Fusion Middleware\
    \ 主目录、OMS 主目录以及插件主目录之外的 Web 层（OHS）Oracle 主目录。应定期备份 OMS 文件系统以保存任何更改，例如补丁、更新或配置更改。使用\
    \ `exportconfig` 命令备份 OMS 实例主目录（`MW_HOME/gc_inst`），包括 WebLogic Server、Web 层和管理服务器。要创建实例和所有子组件的备份，请使用以下语法：\n\
    \n```\nemctl exportconfig oms [-sysman_pwd <sysman password>]\n     [-dir <backup\
    \ dir>]     指定存储备份文件的目录\n     [-oms_only]             指定在管理服务器主机上进行仅 OMS 的备份\n\
    \     [-keep_host]            指定如果未定义 slb 则备份主机名\n                           \
    \ （仅当将在响应此主机名的机器上执行恢复时才使用此选项）\n```\n\n以下示例将 OMS 配置备份到共享目录。将创建一个扩展名为 `.bka` 的归档文件。\n\
    \n```\n$ $OMS_HOME/bin/emctl exportconfig oms -sysman_pwd oracle12c -dir /mnt/backup\n\
    Oracle Enterprise Manager Cloud Control 12c Release 2\nCopyright (c) 1996, 2012\
    \ Oracle Corporation.  All rights reserved.\nExportConfig started...\nMachine\
    \ is Admin Server host. Performing Admin Server backup...\nExporting emoms properties...\n\
    Exporting secure properties...\nExporting configuration for pluggable modules...\n\
    Preparing archive file...\nBackup has been written to file: /mnt/backup/opf_ADMIN_20121104_224806.bka\n\
    \nThe export file contains sensitive data.\nPlease ensure that it is kept secure.\n\
    \nExportConfig completed successfully!\n```\n\n除了备份 OMS 配置外，还应执行 Oracle 清单和 `opatch\
    \ lsinventory –detail` 命令输出的备份。\n\n以下示例生成 `opatch` 清单输出并将其写入共享文件系统。\n\n```\n$OMS_HOME/OPatch/opatch\
    \ lsinventory –detail > /mnt/backups/opatch_bkup.log\n```\n\nOMS 的备份可以手动完成，也可以通过\
    \ Enterprise Manager Cloud Control 作业系统计划完成。\n\n## 管理代理备份\n\n管理代理是无状态的，因此不需要备份。相反，应为所有受监控的平台创建代理的参考金镜像。任何补丁和自定义设置都应包含在金配置中。如果管理代理丢失，应从参考金镜像安装。\n\
    \n## 恢复\n\n执行每个 Enterprise Manager Cloud Control 组件的定期备份很重要。然而，更重要的是在需要时能够成功恢复这些组件。Enterprise\
    \ Manager 的恢复可能需要恢复多个组件，包括存储库、管理服务和代理，具体取决于问题的性质。例如，在主机丢失的情况下恢复管理服务可能需要比将管理服务恢复到原始主机更多的步骤。你将在以下部分中研究这些场景。\n\
    \n## 存储库恢复\n\n如果 `OMS` 关闭，Cloud Control 控制台将不可用。要恢复存储库数据库，应使用 `RMAN` 命令行实用程序。使用\
    \ `RMAN`，你可以通过完全恢复或时间点恢复来恢复数据库（请参阅 `Oracle Database Backup and Recovery Guide`）。对于后者，你可能需要重新同步与存储库不同步的代理。要使用\
    \ `EMCTL` 重新同步代理，请使用以下语法：\n\n```\nemctl resync repos (-full|-agentlist \"agent\
    \ names\")\n[-name \"resync name\"]\n[-sysman_pwd \"sysman password\"]\n```\n\n\
    此命令应在管理存储库恢复之后且在启动 `OMS` 之前执行。\n\n在恢复存储库数据库后，使 Enterprise Manager Cloud Control\
    \ 运行所需的步骤将根据执行的是完全恢复还是不完全恢复，以及是在同一主机还是不同主机上执行恢复而有所不同。[表 13-3](#9781430249382_Ch13.xhtml#Tab3)\
    \ 总结了不同恢复场景所需的步骤。在每种情况下，都应在停止 `OMS` 后恢复存储库数据库。\n\n[表 13-3](#9781430249382_Ch13.xhtml#_Tab3).\
    \ OMS、存储库和代理的恢复场景\n\n![Table13-3](images/Table13-3.jpg)\n\n每当在不同的主机上恢复存储库数据库时，都需要重新配置\
    \ `OMS`。这将新的数据库连接描述存储在 `OMS` 中。我们使用以下命令在 `OMS` 中重新配置存储库数据库：\n\n```\nemctl config\
    \ oms -store_repos_details (-repos_host <host> -repos_port <port> -repos_sid\n\
    <sid> | -repos_conndesc <connect descriptor>) -repos_user <username> [-repos_pwd\
    \ <pwd>]\n```\n\n按照以下步骤重新配置 `OMS`：\n\n1.  停止所有 `OMS`。\n\n    ```\n    emctl stop\
    \ oms\n    ```\n\n2.  在每个 `OMS` 上重新配置存储库连接字符串。\n\n    ```\n    emctl config oms\
    \ -store_repos_details\n    ```\n\n    使用以下命令重新启动管理服务器和所有 `OMS`：\n\n    ```\n\
    \    emctl stop oms -all\n    emctl start oms\n    ```\n\n在不同的主机上恢复存储库还需要将管理存储库数据库目标重新定位到运行在新主机上的不同代理。这仅在主机上已存在代理且未由其发现任何其他数据库的情况下才可完成。使用以下语法将目标重新定位到新主机：\n\
    \n```\nemctl config repos [-sysman_pwd <sysman password>]\n      [-agent <new\
    \ agent>]    指定存储库目标的新目标代理\n      [-host <new host>]      指定存储库目标的新主机名\n     \
    \ [-oh <new oracle home>] 指定存储库目标的新 OracleHome\n      [-conn_desc [<jdbc connect\
    \ descriptor>]]\n                              如果指定了值，则使用该值更新连接描述符，\n        \
    \                      否则使用存储在 emoms.properties 中的值\n      [-ignore_timeskew]\
    \      忽略代理上的时间偏差\n```\n\n还应使用此命令更新 `OMS` 和存储库目标的监控配置："
  raw: "5.  Enter the location for the backup, as shown in [Figure 13-32](#9781430249382_Ch13.xhtml#Fig32).\
    \ In a disk-based backup strategy, the default is to use the Fast Recovery Area\
    \ if it has been configured.\n\n![9781430249382_Fig13-32.jpg](images/9781430249382_Fig13-32.jpg)\n\
    \n[Figure 13-32](#9781430249382_Ch13.xhtml#_Fig32) .  Choose the Fast Recovery\
    \ Area as the disk-based backup location\n\n6.  Enter a schedule for the recurring\
    \ backup, as shown in [Figure 13-33](#9781430249382_Ch13.xhtml#Fig33).\n\n![9781430249382_Fig13-33.jpg](images/9781430249382_Fig13-33.jpg)\n\
    \n[Figure 13-33](#9781430249382_Ch13.xhtml#_Fig33) .  Oracle-suggested backup\
    \ schedule\n\n7.  Review the Backup Settings and generated RMAN script (see [Figure\
    \ 13-34](#9781430249382_Ch13.xhtml#Fig34)). Click Submit Job to schedule the backup.\n\
    \n![9781430249382_Fig13-34.jpg](images/9781430249382_Fig13-34.jpg)\n\n[Figure\
    \ 13-34](#9781430249382_Ch13.xhtml#_Fig34) .  Oracle-suggested backup settings\n\
    \nUsing Oracle Enterprise Manager Cloud Control to schedule the backup job also\
    \ enables you to receive notifications about the job status as well as view backup\
    \ information including run times and time of last backup.\n\nOracle Management\
    \ Service Backup\n\nThe Oracle Management Service is responsible for communicating\
    \ with management agents and uploading data to the management repository. It includes\
    \ the Oracle Fusion Middleware home, the OMS home, and the Web Tier (OHS) Oracle\
    \ home in addition to plug-in homes. The OMS filesystem should be backed up periodically\
    \ to preserve any changes such as patches, updates, or configuration changes.\
    \ Use the exportconfig command to back up the OMS instance home (MW_HOME/gc_inst)\
    \ including the WebLogic Server, Web Tier, and Administration Server. To create\
    \ a backup of the instance and all subcomponents, use the following syntax:\n\n\
    ```\nemctl exportconfig oms [-sysman_pwd <sysman password>]\n     [-dir <backup\
    \ dir>]     Specify directory to store backup file\n     [-oms_only]            \
    \ Specify OMS-only backup on Admin Server host\n     [-keep_host]            Specify\
    \ to backup hostname if no slb defined\n                             (Use this\
    \ option only if recovery will be done\n                              on machine\
    \ that responds to this hostname)\n```\n\nThe following example backs up the OMS\
    \ configuration to a shared directory. An archive is created with a .bka extension.\n\
    \n```\n$ $OMS_HOME/bin/emctl exportconfig oms -sysman_pwd oracle12c -dir /mnt/backup\n\
    Oracle Enterprise Manager Cloud Control 12c Release 2\nCopyright (c) 1996, 2012\
    \ Oracle Corporation.  All rights reserved.\nExportConfig started...\nMachine\
    \ is Admin Server host. Performing Admin Server backup...\nExporting emoms properties...\n\
    Exporting secure properties...\nExporting configuration for pluggable modules...\n\
    Preparing archive file...\nBackup has been written to file: /mnt/backup/opf_ADMIN_20121104_224806.bka\n\
    \nThe export file contains sensitive data.\nPlease ensure that it is kept secure.\n\
    \nExportConfig completed successfully!\n```\n\nIn addition to backing up the OMS\
    \ configuration, a backup of the Oracle inventory and output of the opatch lsinventory\
    \ –detail command should also be performed.\n\nThe following example generates\
    \ the opatch inventory output and writes it to a shared filesystem.\n\n```\n$OMS_HOME/OPatch/opatch\
    \ lsinventory –detail > /mnt/backups/opatch_bkup.log\n```\n\nThe backup of the\
    \ OMS can either be done manually or scheduled via the Enterprise Manager Cloud\
    \ Control Job System.\n\nManagement Agent Backup\n\nThe management agents are\
    \ stateless, so no backups are necessary. Instead, a reference gold image of the\
    \ agent should be created for all platforms being monitored. Any patches and customizations\
    \ should be included in the gold configuration. In the event that a management\
    \ agent is lost, it should be installed from the reference gold image.\n\nRecovery\n\
    \nPerforming regular backups of each Enterprise Manager Cloud Control component\
    \ is important. However, of even more significance is the ability to restore the\
    \ components successfully if needed. Enterprise Manager recovery may require recovery\
    \ of several components including the repository, management service, and agents\
    \ depending on the nature of the problem. For example, recovering the management\
    \ service in a scenario where the host is lost may require additional steps compared\
    \ with restoring the management service to the original host. You will examine\
    \ these scenarios in the following sections.\n\nRepository Recovery\n\nThe Cloud\
    \ Control console will be unavailable in the event that the OMS is down. To restore\
    \ the repository database, the RMAN command-line utility should be used. With\
    \ RMAN, you can restore the database by using either a full recovery or a point-in-time\
    \ recovery (see the *Oracle Database Backup and Recovery Guide*). In the case\
    \ of the latter, you may need to resynchronize agents that are out of sync with\
    \ the repository. To resynchronize the agent by using EMCTL, use the following\
    \ syntax:\n\n```\nemctl resync repos (-full|-agentlist \"agent names\")\n[-name\
    \ \"resync name\"]\n[-sysman_pwd \"sysman password\"]\n```\n\nThis command should\
    \ be executed after the management repository has been restored and before starting\
    \ the OMS.\n\nThe steps required to make Enterprise Manager Cloud Control operational\
    \ after restoring the repository database will vary depending on whether a full\
    \ or incomplete recovery is performed as well as whether the recovery was done\
    \ on the same host or a different host. [Table 13-3](#9781430249382_Ch13.xhtml#Tab3)\
    \ summarizes the steps required for the different recovery scenarios. In each\
    \ scenario, the repository database should be recovered after stopping the OMS.\n\
    \n[Table 13-3](#9781430249382_Ch13.xhtml#_Tab3). Recovery Scenarios for OMS, Repository,\
    \ and Agent\n\n![Table13-3](images/Table13-3.jpg)\n\nOMS reconfiguration is required\
    \ whenever the repository database is recovered on a different host. This stores\
    \ the new database connection description in the OMS. We use the following command\
    \ to reconfigure the repository database in the OMS:\n\n```\nemctl config oms\
    \ -store_repos_details (-repos_host <host> -repos_port <port> -repos_sid\n<sid>\
    \ | -repos_conndesc <connect descriptor>) -repos_user <username> [-repos_pwd <pwd>]\n\
    ```\n\nFollow these steps to reconfigure the OMS:\n\n1.  Stop all the OMSs.\n\n\
    ```\n    emctl stop oms\n    ```\n\n2.  Reconfigure the repository connection\
    \ string on each of the OMSs.\n\n```\n    emctl config oms -store_repos_details\n\
    \    ```\n\n3.  Restart Admin Server and all the OMSs by using the following:\n\
    \n```\n    emctl stop oms -all\n    emctl start oms\n    ```\n\nRecovering the\
    \ repository on a different host also requires relocating the management repository\
    \ database target to a different agent running on the new host. This can be done\
    \ only if an agent already exists on the host and no other database has been discovered\
    \ by it. Use the following syntax to relocate the target to a new host:\n\n```\n\
    emctl config repos [-sysman_pwd <sysman password>]\n      [-agent <new agent>]    Specify\
    \ new destination agent for repository target\n      [-host <new host>]      Specify\
    \ new hostname for repository target\n      [-oh <new oracle home>] Specify new\
    \ OracleHome for repository target\n      [-conn_desc [<jdbc connect descriptor>]]\n\
                                  Update Connect Descriptor with value if specified,\n\
                                  else from value stored in emoms.properties\n      [-ignore_timeskew]      ignores\
    \ timeskew on agent\n```\n\nThe monitoring configuration for the OMS and repository\
    \ target should also be updated by using this command:"
