  trans: "## 4. 使用 DGMGRL 命令行工具切换到备用数据库。在切换操作的情况下，可以在主数据库或备用数据库站点执行此操作。执行切换前，请验证 Data\
    \ Guard 配置和数据库状态。以下示例说明了这些步骤。\n\n### a. 执行切换前，验证 Data Guard 配置和数据库状态：\n\n```\n\
    $ dgmgrl\nDGMGRL for Linux: Version 11.2.0.3.0 - 64bit Production\nCopyright (c)\
    \ 2000, 2009, Oracle. All rights reserved.\nWelcome to DGMGRL, type \"help\" for\
    \ information.\nDGMGRL> connect sys/<password>\nConnected.\nDGMGRL> show configuration\n\
    \nConfiguration - emrep\n\nProtection Mode: MaxPerformance\n  Databases:\n   \
    \ emrep  - Primary database\n    emrep2 - Physical standby database\n\nFast-Start\
    \ Failover: DISABLED\n\nConfiguration Status:\nSUCCESS\n\nDGMGRL> show database\
    \ emrep\n\nDatabase - emrep\n\nRole:            PRIMARY\n  Intended State:  TRANSPORT-ON\n\
    \  Instance(s):\n    emrep\n\nDatabase Status:\nSUCCESS\n\nDGMGRL> show database\
    \ emrep2\n\nDatabase - emrep2\n\nEnterprise Manager Name: emrep_sby\n  Role: \
    \                   PHYSICAL STANDBY\n  Intended State:          APPLY-ON\n  Transport\
    \ Lag:           0 seconds\n  Apply Lag:               0 seconds\n  Real Time\
    \ Query:         OFF\n  Instance(s):\n    emrep2\n\nDatabase Status:\nSUCCESS\n\
    ```\n\n### b. 发出 SWITCHOVER 命令：\n\n```\nDGMGRL> switchover to emrep2;\nPerforming\
    \ switchover NOW, please wait...\nNew primary database \"emrep2\" is opening...\n\
