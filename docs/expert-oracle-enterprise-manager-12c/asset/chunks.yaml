    \ ∼]# groupadd oinstall\n[root@repositorydb ∼]# groupadd dba\n[root@repositorydb\
    \ ∼]# useradd -g oinstall -G dba oracle\n[root@repositorydb ∼]# passwd oracle\n\
    ```\n\nAfter the last command, enter the password for the ORACLE user.\n\nSetting\
    \ Kernel Parameters\n\nThe Oracle Database 11gR2 installer can detect and fix\
    \ errors on kernel parameters, so you can run the installer and let it create\
    \ scripts to set required parameters. If you want to configure kernel parameters\
    \ without the help of the installer, make a backup of /etc/sysctl.conf and then\
    \ use any text editor to edit the file so that it includes lines similar to the\
    \ following:\n\n```\nfs.aio-max-nr = 1048576\nfs.file-max = 6815744\nkernel.shmall\
    \ = 2097152\nkernel.shmmax = 4536870912\nkernel.shmmni = 4096\nkernel.sem = 250\
    \ 32000 100 128\nnet.ipv4.ip_local_port_range = 9000 65500\nnet.core.rmem_default\
    \ = 262144\nnet.core.rmem_max = 4194304\nnet.core.wmem_default = 262144\nnet.core.wmem_max\
    \ = 1048576\n```\n\nThese are recommended values for Oracle Database. If any of\
    \ the current values are bigger than the recommended value, use the bigger value.\n\
    \n![image](images/sq.jpg) **Tip**  On 64-bit Linux systems, kernel.shmmax can\
    \ be set to a maximum of 1 byte less than the physical memory.\n\nEnter the following\
    \ command to set the current values of the kernel parameters in /etc/sysctl.conf:\n\
    \n```\n[root@repositorydb ∼]# /sbin/sysctl -p\n```\n\nCreating Required Directories\n\
    \nThe Oracle base directory must have at least 5GB of free disk space. Enter commands\
    \ to the following to create the recommended subdirectories and set the appropriate\
    \ owner, group, and permissions on them:\n\n```\n[root@repositorydb ∼]# mkdir\
    \ -p /u01/app/\n[root@repositorydb ∼]# chown -R oracle:oinstall /u01/app/\n[root@repositorydb\
    \ ∼]# chmod -R 775 /u01/app/\n```\n\nInstalling the Oracle Database Software\n\
    \nTo install the database software, you need to download the installation files,\
    \ unzip them, and then run the installer. All the steps are laid out in this section.\n\
    \nYou can download the Oracle database software from the Oracle Technology Network\
    \ (OTN). The software is available in zip files. Here’s the link for Oracle Database:"
  trans: "\n# 硬件要求与安装准备\n\n使用完全限定主机名也很重要。完全限定域名（FQDN）是服务器的完整域名。它包含主机名和域名，以明确其在 DNS\
    \ 层次结构中的确切位置。例如，`cloudcontrol12.testdomain.com`就是一个完全限定的主机名。至少应确保您的 Oracle Management\
    \ Server 拥有一个完全限定的主机名。\n\nOracle Enterprise Manager Cloud Control 12c 可以从 My Oracle\
    \ Support 为您的服务器获取最新的补丁信息，并可以为事件创建服务请求。因此，我们建议您使 Oracle Management Service 能够访问\
    \ My Oracle Support 网站。如果不希望服务器直接访问互联网，可以设置一个代理服务器，使 OMS 能够访问 My Oracle Support\
    \ 网站。\n\n# 硬件要求\n\n本节描述了安装 OMS、管理仓库和管理代理的硬件要求。\n\n## OMS 的硬件要求\n\n如表 2-1 所示，OMS\
    \ 的硬件要求取决于您拥有的目标数量以及将要部署的代理数量。\n\n表 2-1. OMS 硬件要求\n\n![table](img/Table2-1.jpg)\n\
    \n## 管理仓库的硬件要求\n\n仓库数据库的硬件要求也取决于代理和目标的数量，如表 2-2 所示。\n\n表 2-2. 管理仓库硬件要求\n\n![table](img/Table2-2.jpg)\n\
    \n## 管理代理的硬件要求\n\n每个代理部署大约需要 1GB 的可用硬盘空间。虽然管理代理不会消耗大量的 CPU 或 RAM，但我们不建议将代理部署到\
    \ RAM 少于 512MB 的系统上。\n\n![image](img/sq.jpg) **提示** 前几节中的硬件要求可能因版本而异，因此您应在 Oracle\
    \ Enterprise Manager Cloud Control 基本安装指南中检查实际要求。\n\n# 安装管理仓库\n\n在本节中，您将在名为`repositorydb.testdomain.com`的服务器上下载并安装\
    \ Oracle Database 11gR2。\n\n可以使用一个经过认证的数据库：`11.2.0.3`、`11.2.0.2`、`11.2.0.1`、`11.1.0.7`或`10.2.0.5`。如果您已经有一个用于仓库数据库的数据库服务器，可以跳到\
    \ Oracle EM12c 的安装部分。\n\n![image](img/sq.jpg) **提示** 您可以在 My Oracle Support 上找到\
    \ Enterprise Manager Cloud Control 的最新认证数据库列表：[`support.oracle.com/epmos/faces/CertifyHome`](https://support.oracle.com/epmos/faces/CertifyHome)。您可能希望使用\
    \ Oracle Real Application Clusters（RAC）数据库以实现高可用性。\n\n## 使用 Oracle-validated RPM\
    \ 包和 YUM\n\n为了在 Oracle Linux 上安装 Oracle Database 11gR2，您的系统需要满足一些先决条件。使用`oracle-validated`\
    \ RPM 包，您可以完成大部分预安装配置任务，包括创建用户和组。使用此包是在 Oracle Linux 上安装所有 Oracle 先决条件的推荐方法。您可以从\
    \ Oracle 网站下载 RPM 包，也可以使用 YUM 包管理器。Oracle 提供了一个免费的公共 YUM 服务器，即使您不从 Oracle 购买支持也可以使用。\n\
    \n要使用 Oracle 公共 YUM 服务器，您首先需要以 ROOT 身份运行以下命令，下载并复制相应的 YUM 配置文件到位：\n\n*   Oracle\
    \ Linux 4, update 6 或更新版本\n    *   `[root@repositorydb ∼]# cd /etc/yum.repos.d`\n\
    \    *   `[root@repositorydb ∼]# mv Oracle-Base.repo Oracle-Base.repo.disabled`\n\
    \    *   `[root@repositorydb ∼]# wget [`public-yum.oracle.com/public-yum-el4.repo`](http://public-yum.oracle.com/public-yum-el4.repo)`\n\
    *   Oracle Linux 5\n    *   `[root@repositorydb ∼]# cd /etc/yum.repos.d`\n   \
    \ *   `[root@repositorydb ∼]# wget [`public-yum.oracle.com/public-yum-el5.repo`](http://public-yum.oracle.com/public-yum-el5.repo)`\n\
    *   Oracle Linux 6\n    *   `[root@repositorydb ∼]# cd /etc/yum.repos.d`\n   \
    \ *   `[root@repositorydb ∼]# wget [`public-yum.oracle.com/public-yum-ol6.repo`](http://public-yum.oracle.com/public-yum-ol6.repo)`\n\
    \n在文本编辑器中打开`yum public-yum*.repo`配置文件。找到您计划从中更新的仓库的文件部分——例如`[el5_base]`——并将`enabled=0`更改为`enabled=1`。\n\
    \n保存文件并开始使用`yum`：\n```\n[root@repositorydb ∼]# yum install oracle-validated\n\
    ```\n对于 Oracle Linux 6，您需要安装`oracle-rdbms-server-11gR2-preinstall`包，而不是`oracle-validated`包：\n\
    ```\n[root@repositorydb ∼]# yum install oracle-rdbms-server-11gR2-preinstall\n\
    ```\n您也可以从以下链接手动下载适用于 Red Hat Enterprise Linux 5 的`oracle-validated`包：[`oss.oracle.com/el5/oracle-validated/`](https://oss.oracle.com/el5/oracle-validated/)。\n\
    \n安装`oracle-validated`后，您需要为`ORACLE`用户设置密码。请确保也为 OMS 服务器设置 YUM 并安装`oracle-validated`包。\n\
    \n## 创建 Oracle 用户和组\n\n如果不使用`oracle-validated`包，您可以手动创建所需的组和用户。以 ROOT 身份登录并运行以下命令：\n\
    ```\n[root@repositorydb ∼]# groupadd oinstall\n[root@repositorydb ∼]# groupadd\
    \ dba\n[root@repositorydb ∼]# useradd -g oinstall -G dba oracle\n[root@repositorydb\
    \ ∼]# passwd oracle\n```\n在最后一个命令之后，输入`ORACLE`用户的密码。\n\n## 设置内核参数\n\nOracle Database\
    \ 11gR2 安装程序可以检测并修复内核参数错误，因此您可以运行安装程序并让它创建脚本来设置所需参数。如果希望在没有安装程序帮助的情况下配置内核参数，请备份`/etc/sysctl.conf`，然后使用任何文本编辑器编辑该文件，使其包含类似以下的行：\n\
    ```\nfs.aio-max-nr = 1048576\nfs.file-max = 6815744\nkernel.shmall = 2097152\n\
    kernel.shmmax = 4536870912\nkernel.shmmni = 4096\nkernel.sem = 250 32000 100 128\n\
    net.ipv4.ip_local_port_range = 9000 65500\nnet.core.rmem_default = 262144\nnet.core.rmem_max\
    \ = 4194304\nnet.core.wmem_default = 262144\nnet.core.wmem_max = 1048576\n```\n\
    这些是 Oracle Database 的推荐值。如果任何当前值大于推荐值，请使用较大的值。\n\n![image](img/sq.jpg) **提示**\
    \ 在 64 位 Linux 系统上，`kernel.shmmax`可以设置为物理内存减去 1 字节的最大值。\n\n输入以下命令以设置`/etc/sysctl.conf`中的内核参数的当前值：\n\
    ```\n[root@repositorydb ∼]# /sbin/sysctl -p\n```\n\n## 创建所需目录\n\nOracle 基础目录必须至少有\
    \ 5GB 的可用磁盘空间。输入以下命令以创建推荐的子目录并在其上设置所有者、组和权限：\n```\n[root@repositorydb ∼]# mkdir\
    \ -p /u01/app/\n[root@repositorydb ∼]# chown -R oracle:oinstall /u01/app/\n[root@repositorydb\
    \ ∼]# chmod -R 775 /u01/app/\n```\n\n## 安装 Oracle 数据库软件\n\n要安装数据库软件，您需要下载安装文件，解压缩它们，然后运行安装程序。本节列出了所有步骤。\n\
    \n您可以从 Oracle 技术网络（OTN）下载 Oracle 数据库软件。软件以 zip 文件形式提供。以下是 Oracle Database 的链接：\n"
- fmt: "# Oracle数据库安装与配置\n\n## 安装准备\n\n访问 `www.oracle.com/technetwork/database/enterprise-edition/downloads/index.html`。\n\
    \n我们也建议从 My Oracle Support 下载并安装最新的 Oracle Database 软件补丁集。\n\n下载安装文件后，将它们复制到 ORACLE\
    \ 用户可以访问的目录，然后切换到 ORACLE 用户并解压：\n\n```\n[oracle@repositorydb ∼]$ unzip linux_11gR2_database_1of2.zip\n\
    [oracle@repositorydb ∼]$ unzip linux_11gR2_database_2of2.zip\n```\n\n解压文件后，您将看到一个名为\
    \ `database` 的新创建目录。打开此目录并运行安装程序：\n\n```\n[oracle@repositorydb ∼]$ cd database\n\
    [oracle@repositorydb ∼]$ ./runInstaller\n```\n\n## 软件安装步骤\n\n当安装程序启动时，完成以下步骤：\n\
    \n1.  第一个安装步骤是“配置安全更新”，如 [图 2-1](#9781430249382_Ch02.xhtml#Fig1) 所示。您可能不希望输入 My\
    \ Oracle Support (MOS) 凭据，因为您可以通过 Cloud Control 跟踪所有安全更新。因此，取消选中“我希望接收安全更新”选项并单击“下一步”。安装程序会警告接收关键安全更新的重要性，但可以忽略该警告。\n\
    \n    ![9781430249382_Fig02-01.jpg](images/9781430249382_Fig02-01.jpg)\n    *图\
    \ 2-1. Oracle Database 安装程序*\n\n2.  “下载软件更新”步骤出现，如 [图 2-2](#9781430249382_Ch02.xhtml#Fig2)\
    \ 所示。如果您的数据库服务器可以访问互联网，您应该输入您的 MOS 凭据以下载并应用最新的补丁。（在本例中，我们将跳过此步骤并手动应用关键补丁集更新。）选择适当的选项后，单击“下一步”。\n\
    \n    ![9781430249382_Fig02-02.jpg](images/9781430249382_Fig02-02.jpg)\n    *图\
    \ 2-2. 下载软件更新的选项*\n\n3.  对于“选择安装选项”步骤，如 [图 2-3](#9781430249382_Ch02.xhtml#Fig3)\
    \ 所示，选择“仅安装数据库软件”。然后单击“下一步”。\n\n    ![9781430249382_Fig02-03.jpg](images/9781430249382_Fig02-03.jpg)\n\
    \    *图 2-3. 安装选项*\n\n4.  在“网格安装选项”步骤中，如 [图 2-4](#9781430249382_Ch02.xhtml#Fig4)\
    \ 所示，选择“单实例数据库安装”。然后单击“下一步”。（如果您想将 OEM 存储库数据库创建为 Oracle RAC 数据库，则应选择第二个或第三个选项。）\n\
    \n    ![9781430249382_Fig02-04.jpg](images/9781430249382_Fig02-04.jpg)\n    *图\
    \ 2-4. 网格安装选项*\n\n5.  为默认语言选择英语，如 [图 2-5](#9781430249382_Ch02.xhtml#Fig5) 所示。\n\
    \n    ![9781430249382_Fig02-05.jpg](images/9781430249382_Fig02-05.jpg)\n    *图\
    \ 2-5. 语言选项*\n\n6.  现在您已准备好选择数据库版本。此服务器将仅用作 Oracle Enterprise Manager Cloud Control\
    \ 的存储库数据库，因此您无需为 Oracle Database 支付许可费用。选择“企业版”，如 [图 2-6](#9781430249382_Ch02.xhtml#Fig6)\
    \ 所示，然后单击“下一步”。\n\n    ![9781430249382_Fig02-06.jpg](images/9781430249382_Fig02-06.jpg)\n\
    \    *图 2-6. 选择数据库版本*\n\n7.  “指定安装位置”步骤出现，如 [图 2-7](#9781430249382_Ch02.xhtml#Fig7)\
    \ 所示。您已经为 Oracle Database 创建了 `/u01/app`，因此在 Oracle 基目录中输入 `/u01/app/oracle`。安装程序将根据最优灵活架构\
    \ (OFA) 确定 Oracle 主目录。异地升级一直是一个最佳实践建议，但从 Oracle Database 11.2.0.2 开始，补丁集安装默认都是异地的。因此，您可能希望在路径中输入完整版本，例如\
    \ `/u01/app/oracle/product/11.2.0.3/dbhome_1`。\n\n    ![9781430249382_Fig02-07.jpg](images/9781430249382_Fig02-07.jpg)\n\
    \    *图 2-7. 安装位置*\n\n8.  输入（或直接接受）“清单位置”并单击“下一步”，如 [图 2-8](#9781430249382_Ch02.xhtml#Fig8)\
    \ 所示。\n\n    ![9781430249382_Fig02-08.jpg](images/9781430249382_Fig02-08.jpg)\n\
    \    *图 2-8. 创建清单位置*\n\n9.  对于“特权操作系统组”步骤，如 [图 2-9](#9781430249382_Ch02.xhtml#Fig9)\
    \ 所示，接受默认设置并单击“下一步”。Oracle 将在下一步检查先决条件。如果没有发现任何错误，安装程序将前进到“概要”步骤。\n\n    ![9781430249382_Fig02-09.jpg](images/9781430249382_Fig02-09.jpg)\n\
    \    *图 2-9. 操作系统组*\n\n10. 查看“概要”屏幕，如 [图 2-10](#9781430249382_Ch02.xhtml#Fig10)\
    \ 所示。如果屏幕上的信息看起来没问题，请单击“安装”按钮。\n\n    ![9781430249382_Fig02-10.jpg](images/9781430249382_Fig02-10.jpg)\n\
    \    *图 2-10. 概要*\n\n11. 在安装结束时，您需要执行一些配置脚本。在另一个终端会话中以 ROOT 身份登录服务器并运行脚本。然后单击“确定”完成安装（参见\
    \ [图 2-11](#9781430249382_Ch02.xhtml#Fig11)）。\n\n    ![9781430249382_Fig02-11.jpg](images/9781430249382_Fig02-11.jpg)\n\
    \    *图 2-11. 执行配置脚本*\n\n## 创建存储库数据库\n\n既然您已经安装了 Oracle Database 软件，您将创建管理存储库数据库。连接到存储库服务器，设置\
    \ Oracle 主目录，然后运行 `dbca`：\n\n```\n[oracle@repositorydb ∼]$ . oraenv\nORACLE_SID\
    \ = [oracle] ? oracle\nORACLE_HOME = [/home/oracle] ? /u01/app/oracle/product/11.2.0/dbhome_1\n\
    The Oracle base has been set to /u01/app/oracle\n[oracle@repositorydb ∼]$ dbca\n\
    ```\n\n当您运行 `dbca` 时，会出现“数据库配置助手”欢迎屏幕。单击“下一步”通过屏幕，然后完成以下步骤：\n\n1.  对于“操作”步骤，如\
    \ [图 2-12](#9781430249382_Ch02.xhtml#Fig12) 所示，选择“创建数据库”，然后单击“下一步”。\n\n    ![9781430249382_Fig02-12.jpg](images/9781430249382_Fig02-12.jpg)\n\
    \    *图 2-12. 数据库配置助手*\n\n2.  对于“数据库模板”步骤，如 [图 2-13](#9781430249382_Ch02.xhtml#Fig13)\
    \ 所示，您可以选择“通用”或“自定义数据库”。我们建议您选择“自定义数据库”，因为它可以防止在数据库中安装一些 `SYSMAN` 对象。否则，您必须先从数据库中删除这些对象，然后才能将其用作管理存储库数据库。单击“下一步”。\n\
    \n    ![9781430249382_Fig02-13.jpg](images/9781430249382_Fig02-13.jpg)\n    *图\
    \ 2-13. 数据库模板*\n\n3.  “数据库标识”步骤出现，如 [图 2-14](#9781430249382_Ch02.xhtml#Fig14)\
    \ 所示。输入全局数据库名，安装程序将根据该名称设置 `SID`。单击“下一步”。\n\n    ![9781430249382_Fig02-14.jpg](images/9781430249382_Fig02-14.jpg)\n\
    \    *图 2-14. 数据库标识*\n\n4.  对于“管理选项”步骤，如 [图 2-15](#9781430249382_Ch02.xhtml#Fig15)\
    \ 所示，取消选中“配置 Enterprise Manager”，然后单击“下一步”。\n\n    ![9781430249382_Fig02-15.jpg](images/9781430249382_Fig02-15.jpg)\n\
    \    *图 2-15. 管理选项*\n\n5.  在“数据库凭据”步骤中，如 [图 2-16](#9781430249382_Ch02.xhtml#Fig16)\
    \ 所示，输入 `SYS` 和 `SYSTEM` 用户的密码，然后单击“下一步”。Oracle 建议输入一个至少包含八个字符的密码，其中包括至少一个大写字母、一个小写字母和一个数字。\n\
    \n    ![9781430249382_Fig02-16.jpg](images/9781430249382_Fig02-16.jpg)\n    *图\
    \ 2-16. 数据库凭据*"
