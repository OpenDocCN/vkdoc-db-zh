- fmt: '# 监控模板与管理组


    在管理组节点中，应为目标类型准备一个监控模板。监控模板的设计应谨慎，以在提供有效监控的同时减少无用告警。创建模板后，需对其进行审查，以确保关键组件得到监控。


    创建所有必需的模板集合后，点击“关联”选项卡，将层次结构中每个节点（从第二级，即“所有管理组”之后的一级）与一个模板集合关联。作为该节点成员的所有目标以及子组中的目标都将继承模板的指标。可以看到，节点与模板集合的这种关联极大地增强了在IT基础设施中自动执行标准的能力。审查层次结构中的每个节点，以验证其状态是否有关联有效。查找文字`Valid
    Association`，如图 7-17 所示。


    ![9781430249382_Fig07-17.jpg](images/9781430249382_Fig07-17.jpg)


    **图 7-17.** 应用于 Non-Production_TC 和 HR_TC 组的模板集合关联


    图 7-17 层次结构中的 `Non-Production_TC` 和 `HR_TC` 节点具有有效关联，而 `Marketing` 和 `Sales` 组没有有效关联。这是因为
    `Sales` 和 `Marketing` 组继承了已直接关联到 `Non-Production` 组的 `Non-Production_TC` 模板集合。没有模板集合直接关联到
    `Marketing` 或 `Sales`。而 `HR_TC` 组则已关联到其自己的模板集合。因此，它显示为“有效关联”状态。


    重要的是要理解，聚合指标是基于监控模板的组合来应用的。如果 `HR_TC` 与顶级 `Non-Production` 组有共同的指标，则较低级别的指标具有优先权。使用图
    7-18 所示的`View Aggregate Settings`选项，可以查看将应用于目标的所有指标。


    ![9781430249382_Fig07-18.jpg](images/9781430249382_Fig07-18.jpg)


    **图 7-18.** 从“管理组和模板集合”页面访问“查看聚合设置”选项


    要检查是否有目标未通过管理组和模板集合定义的监控标准进行监控，请点击“关联”选项卡左上角的“操作”下拉菜单，然后选择`Unassigned Targets
    Report`，如图 7-19 所示。随后将显示缺少一个或多个根据管理组层次结构定义的属性的目标。请记住，所有目标必须符合为管理组层次结构定义的所有成员标准。这意味着，如果您选择`LifeCycle
    Status`和`Line of Business`作为管理层次结构的目标属性，那么目标需要设置这两个属性才能加入管理组。


    ![9781430249382_Fig07-19.jpg](images/9781430249382_Fig07-19.jpg)


    **图 7-19.** 如何从管理组访问“未分配目标报告”选项


    ## 同步计划


    模板集合成功关联到管理组后，监控模板会立即应用于管理组中的目标。如果存在待处理的同步操作，则同步计划会生效。待处理的操作通常源于对属于与管理组关联的模板集合一部分的监控模板的更改。此外，如果对与管理组关联的模板集合进行了修改，则将在基于全局同步计划的下一个日期发生同步。


    通过指定开始日期、时区和频率（以天为单位）来创建全局同步计划。选择 `Setup -> Add Targets -> Administration Groups`。选择“关联”选项卡，然后点击`Synchronization
    Schedule`。建议将计划设置在非高峰时段，以最小化对系统的影响。计划间隔以天为单位指定，因此任何待处理的操作将在下一个指定的日期和时间发生。图 7-20
    是一个每天凌晨 12:01 执行的同步计划示例。


    ![image](images/sq.jpg) **注意** 即使设置了同步计划，同步也并非总是发生。它仅在有待处理的操作时发生。


    ![9781430249382_Fig07-20.jpg](images/9781430249382_Fig07-20.jpg)


    **图 7-20.** Enterprise Manager Cloud Control 12c 中的全局同步计划设置页面


    一旦同步计划创建并成功完成至少一次，您可以定期检查顶级管理组的“同步状态”区域（参见图 7-21）。该区域显示层次结构中所有目标的同步状态。


    ![9781430249382_Fig07-21.jpg](images/9781430249382_Fig07-21.jpg)


    **图 7-21.** 管理组页面中的同步状态


    在图 7-21 中，页面中间的“同步状态”框中，您可以看到针对监控模板、合规标准和云策略，处于“已同步”、“待处理”、“失败”、“已排除”和“不适用”状态的目标数量。对于处于“待处理”、“失败”或“不适用”状态的目标，请遵循表
    7-1 中的建议。


    **表 7-1.** 基于同步状态的建议操作


    | 同步状态 | 应采取的措施 |

    | :--- | :--- |

    | 待处理目标 | 确保已定义全局同步计划。“下次同步”日期的存在表明已定义计划。如果看到“不适用”，请定义一个计划。 |

    | 失败目标 | 深入分析以获取特定故障的详细信息。尽可能修复它们。然后手动重新同步，或允许下一次计划同步进行。 |

    | 不适用目标 | 目标没有关联的监控模板。深入分析以获取目标类型，并向模板集合添加监控模板。 |


    ## 事件管理建议


    监控数据库环境还意味着，如果您的任何目标遇到任何问题，您能快速被告知——理想情况下是在任何客户察觉之前。这也意味着，如果发生任何值得关注的操作（正常或异常），它们将根据需要得到处理。


    那么即将发生的问题呢？我们也需要被告知这些问题，并在它们演变成灾难之前解决它们。EM12c 以事件、 incidents（事件）、规则和规则集的形式提供了解决方案的工具。在本节中，您将看到如何有效地运用这些特性来简化和自动化监控需求。


    ### 事件、Incidents（事件）和问题'
  raw: 'There should be one monitoring template for each target type in the administration
    group node. Monitoring templates should be carefully designed so as to provide
    effective monitoring while reducing white noise.  Review the monitoring templates
    after they have been created to ensure that key components are being monitored.


    After all required template collections have been created, click the Associations
    tab to associate each node in the hierarchy with a template collection starting
    at the second level (the level after the All Administration Group). All targets
    that are members of the node as well as targets within the subgroups will inherit
    the metrics of the templates. You can see that this association of nodes with
    template collections greatly enhances the ability to automatically enforce standards
    within the IT infrastructure. Review each node in the hierarchy to verify that
    the state has a valid association. Look for the words *Valid Association*, as
    shown in [Figure 7-17](#9781430249382_Ch07.xhtml#Fig17).


    ![9781430249382_Fig07-17.jpg](images/9781430249382_Fig07-17.jpg)


    [Figure 7-17](#9781430249382_Ch07.xhtml#_Fig17). Template collection associations
    applied to the Non-Production_TC and HR_TC groups


    The Non-Production_TC and HR_TC nodes in [Figure 7-17](#9781430249382_Ch07.xhtml#Fig17)’s
    hierarchy have valid associations, while the Marketing and Sales groups have no
    valid associations. This is because the Sales and Marketing groups have inherited
    the Non-Production_TC template collection that has been directly associated with
    the Non-Production group. There is no template collection directly associated
    with Marketing, nor with Sales. The HR_TC group, however, *has been associated*
    with its own template collection. Thus, it shows the Valid Association status.


    It is important to understand that the aggregate metrics are applied based on
    the combination of monitoring templates. If HR_TC has metrics in common with the
    top-level Non-Production group, those in the lower level take precedence. Use
    the View Aggregate Settings option shown in [Figure 7-18](#9781430249382_Ch07.xhtml#Fig18)
    to see all the metrics that will be applied to the targets.


    ![9781430249382_Fig07-18.jpg](images/9781430249382_Fig07-18.jpg)


    [Figure 7-18](#9781430249382_Ch07.xhtml#_Fig18). Accessing the View Aggregate
    Settings option from the Administration Groups and Template Collections page


    Check if there are targets that are not being monitored using the standards defined
    via administration groups and template collections. Click the Actions drop-down
    menu at the top left of the Associations tab, and then choose Unassigned Targets
    Report, as shown in [Figure 7-19](#9781430249382_Ch07.xhtml#Fig19). You will then
    be shown the targets that are missing one or more properties defined according
    to the administration group hierarchy. Remember, all targets have to match all
    membership criteria defined for the administration group hierarchy. That means
    that if you choose *LifeCycle Status* and *Line of Business* as the target properties
    for the administration hierarchy, then targets require both properties to be set
    before they will join an administration group.


    ![9781430249382_Fig07-19.jpg](images/9781430249382_Fig07-19.jpg)


    [Figure 7-19](#9781430249382_Ch07.xhtml#_Fig19). How to access the Unassigned
    Targets Report option from the administration group


    Synchronization Schedule


    After template collections have been successfully associated with administration
    groups, the monitoring templates are immediately applied to the targets in the
    administration groups. If there are pending synchronization operations, the synchronization
    schedule comes into effect. Pending operations typically result from changes to
    a monitoring template that is part of a template collection associated with an
    administration group. In addition, if there are modifications to a template collection
    associated with an administration group, synchronization will occur on the next
    date based on the global synchronization schedule.


    Create a global synchronization schedule by specifying the start date, time zone,
    and frequency in days. Choose Setup ![arrow](images/arrow.jpg) Add Targets ![arrow](images/arrow.jpg)
    Administration Groups. Select the Associations tab, and then click Synchronization
    Schedule. It is recommended to set up a schedule that is outside peak hours to
    minimize any impact on the system. The schedule interval is specified in days,
    so any pending operations will occur on the next date and time specified. [Figure
    7-20](#9781430249382_Ch07.xhtml#Fig20) is an example of a synchronization schedule
    set for 12:01AM daily.


    ![image](images/sq.jpg) **Note**  Even though the synchronization schedule is
    set, synchronization does not always occur. It occurs only when there are pending
    operations.


    ![9781430249382_Fig07-20.jpg](images/9781430249382_Fig07-20.jpg)


    [Figure 7-20](#9781430249382_Ch07.xhtml#_Fig20). The Global Synchronization Schedule
    setup page in Enterprise Manager Cloud Control 12c


    Once the synchronization schedule has been created and has successfully completed
    at least once, you can periodically check the Synchronization Status region of
    the topmost administration group (see [Figure 7-21](#9781430249382_Ch07.xhtml#Fig21)).
    That region displays the synchronization status of all targets in the hierarchy.


    ![9781430249382_Fig07-21.jpg](images/9781430249382_Fig07-21.jpg)


    [Figure 7-21](#9781430249382_Ch07.xhtml#_Fig21). The Synchronization Status in
    Administration Group page


    In [Figure 7-21](#9781430249382_Ch07.xhtml#Fig21), in the Synchronization Status
    box in the middle of the page, you can see the number of targets with statuses
    of Synchronized, Pending, Failed, Excluded, and N/A for monitoring templates,
    compliance standards, and cloud policies. Follow the recommendations in [Table
    7-1](#9781430249382_Ch07.xhtml#Tab1) for targets in Pending, Failed, or N/A status.


    [Table 7-1](#9781430249382_Ch07.xhtml#_Tab1). Recommendations for Action Based
    on Synchronization Status


    | Synchronization Status | What to Do |

    | --- | --- |

    | Pending Targets | Ensure that you have a global synchronization schedule defined.
    The presence of a Next Synchronization date indicates that one is defined. If
    you see N/A instead, define a schedule. |

    | Failed Targets | Drill down to get details of the specific failures. Fix them
    where possible. Then either resync manually, or allow the next scheduled synchronization
    to take place. |

    | N/A Targets | Targets have no associated monitoring template. Drill down to
    get the target type, and add monitoring templates to the template collection.
    |


    Incident Management Recommendations


    Monitoring the database environment also means making sure that if any of your
    targets encounter any issues, you are made aware of them quickly—ideally before
    any of your clients become aware. It also means that if any operations occur that
    are of interest (normal or otherwise), that they will be addressed as needed.


    What about impending problems? We need to be made aware of these too, and resolve
    them before they become disasters. EM12c provides the tools for the solution in
    the form of events, incidents, rules, and rule sets. In this section, you will
    see how to effectively employ these features to simplify and automate the monitoring
    requirements.


    Events, Incidents, and Problems'
  trans: '

    # 监控模板与管理组


    在管理组节点中，应为目标类型准备一个监控模板。监控模板的设计应谨慎，以在提供有效监控的同时减少无用告警。创建模板后，需对其进行审查，以确保关键组件得到监控。


    创建所有必需的模板集合后，点击“关联”选项卡，将层次结构中每个节点（从第二级，即“所有管理组”之后的一级）与一个模板集合关联。作为该节点成员的所有目标以及子组中的目标都将继承模板的指标。可以看到，节点与模板集合的这种关联极大地增强了在
    IT 基础设施中自动执行标准的能力。审查层次结构中的每个节点，以验证其状态是否有关联有效。查找文字`Valid Association`，如图 7-17 所示。


    ![9781430249382_Fig07-17.jpg](img/9781430249382_Fig07-17.jpg)


    **图 7-17.** 应用于 Non-Production_TC 和 HR_TC 组的模板集合关联


    图 7-17 层次结构中的 `Non-Production_TC` 和 `HR_TC` 节点具有有效关联，而 `Marketing` 和 `Sales` 组没有有效关联。这是因为
    `Sales` 和 `Marketing` 组继承了已直接关联到 `Non-Production` 组的 `Non-Production_TC` 模板集合。没有模板集合直接关联到
    `Marketing` 或 `Sales`。而 `HR_TC` 组则已关联到其自己的模板集合。因此，它显示为“有效关联”状态。


    重要的是要理解，聚合指标是基于监控模板的组合来应用的。如果 `HR_TC` 与顶级 `Non-Production` 组有共同的指标，则较低级别的指标具有优先权。使用图
    7-18 所示的`View Aggregate Settings`选项，可以查看将应用于目标的所有指标。


    ![9781430249382_Fig07-18.jpg](img/9781430249382_Fig07-18.jpg)


    **图 7-18.** 从“管理组和模板集合”页面访问“查看聚合设置”选项


    要检查是否有目标未通过管理组和模板集合定义的监控标准进行监控，请点击“关联”选项卡左上角的“操作”下拉菜单，然后选择`Unassigned Targets
    Report`，如图 7-19 所示。随后将显示缺少一个或多个根据管理组层次结构定义的属性的目标。请记住，所有目标必须符合为管理组层次结构定义的所有成员标准。这意味着，如果您选择`LifeCycle
    Status`和`Line of Business`作为管理层次结构的目标属性，那么目标需要设置这两个属性才能加入管理组。


    ![9781430249382_Fig07-19.jpg](img/9781430249382_Fig07-19.jpg)


    **图 7-19.** 如何从管理组访问“未分配目标报告”选项


    ## 同步计划


    模板集合成功关联到管理组后，监控模板会立即应用于管理组中的目标。如果存在待处理的同步操作，则同步计划会生效。待处理的操作通常源于对属于与管理组关联的模板集合一部分的监控模板的更改。此外，如果对与管理组关联的模板集合进行了修改，则将在基于全局同步计划的下一个日期发生同步。


    通过指定开始日期、时区和频率（以天为单位）来创建全局同步计划。选择 `Setup -> Add Targets -> Administration Groups`。选择“关联”选项卡，然后点击`Synchronization
    Schedule`。建议将计划设置在非高峰时段，以最小化对系统的影响。计划间隔以天为单位指定，因此任何待处理的操作将在下一个指定的日期和时间发生。图 7-20
    是一个每天凌晨 12:01 执行的同步计划示例。


    ![image](img/sq.jpg) **注意** 即使设置了同步计划，同步也并非总是发生。它仅在有待处理的操作时发生。


    ![9781430249382_Fig07-20.jpg](img/9781430249382_Fig07-20.jpg)


    **图 7-20.** Enterprise Manager Cloud Control 12c 中的全局同步计划设置页面


    一旦同步计划创建并成功完成至少一次，您可以定期检查顶级管理组的“同步状态”区域（参见图 7-21）。该区域显示层次结构中所有目标的同步状态。


    ![9781430249382_Fig07-21.jpg](img/9781430249382_Fig07-21.jpg)


    **图 7-21.** 管理组页面中的同步状态


    在图 7-21 中，页面中间的“同步状态”框中，您可以看到针对监控模板、合规标准和云策略，处于“已同步”、“待处理”、“失败”、“已排除”和“不适用”状态的目标数量。对于处于“待处理”、“失败”或“不适用”状态的目标，请遵循表
    7-1 中的建议。


    **表 7-1.** 基于同步状态的建议操作


    | 同步状态 | 应采取的措施 |

    | :--- | :--- |

    | 待处理目标 | 确保已定义全局同步计划。“下次同步”日期的存在表明已定义计划。如果看到“不适用”，请定义一个计划。 |

    | 失败目标 | 深入分析以获取特定故障的详细信息。尽可能修复它们。然后手动重新同步，或允许下一次计划同步进行。 |

    | 不适用目标 | 目标没有关联的监控模板。深入分析以获取目标类型，并向模板集合添加监控模板。 |


    ## 事件管理建议


    监控数据库环境还意味着，如果您的任何目标遇到任何问题，您能快速被告知——理想情况下是在任何客户察觉之前。这也意味着，如果发生任何值得关注的操作（正常或异常），它们将根据需要得到处理。


    那么即将发生的问题呢？我们也需要被告知这些问题，并在它们演变成灾难之前解决它们。EM12c 以事件、 incidents（事件）、规则和规则集的形式提供了解决方案的工具。在本节中，您将看到如何有效地运用这些特性来简化和自动化监控需求。


    ### 事件、Incidents（事件）和问题

    '
- fmt: '# 事件、问题与规则


    ## 事件与问题


    一个**事件** 是 Enterprise Manager 中影响单个受监控目标的离散发生——例如，监听器宕机、文件系统已满或归档程序挂起。其他发生，如作业操作状态更改（完成、失败、停止、暂停）也属于事件的范畴。


    一个**问题** 可以被看作是一组一个或多个相关的事件。问题通常代表一次需要特定操作（包括跟踪、分配、升级和解决）的显著服务中断。将重要的发生作为单个单元进行管理是通过问题而非事件来完成的。一个主机目标可能会生成高
    CPU (%) 和内存使用率事件（参见 [图 7-22](#9781430249382_Ch07.xhtml#Fig22)）。单个事件本身可能并不表明一个问题，但一组相关的事件可能指向一个描述资源问题的问题。


    ![9781430249382_Fig07-22.jpg](images/9781430249382_Fig07-22.jpg)

    [图 7-22](#9781430249382_Ch07.xhtml#_Fig22). 多个事件的问题/事件关系


    除了事件和问题，还有**问题**的概念。问题可以被视为问题的根源或起因。它们目前表现为 Oracle 软件中的错误。问题超出了本次讨论的范围，因为它们实际上可能是任何导致服务中断或性能下降的原因。例如，如果在服务器机房地板下乱跑的啮齿动物咬断电线并导致停机，那可能就是一个问题。


    ![image](images/sq.jpg) **注意** DBA 工作的挑战之一是必须不断处理无法全部预见的问题。事实上，迄今为止新问题的出现是让 DBA
    工作充满乐趣和回报的“调味剂”之一。然而与此同时，我们又追求常规。这正是我们这一行固有的张力。


    ## 事件与问题的工作流


    有效地管理问题有助于我们实现更好的运营效率，帮助我们掌控系统的整体健康状况。使用集中式问题管理控制台使我们能够从一个位置查看、管理、诊断和解决问题。关于问题管理的完整讨论请参见
    [第 12 章](#9781430249382_Ch12.xhtml)。[图 7-23](#9781430249382_Ch07.xhtml#Fig23)
    中的图表展示了使用 EM12c 的事件和问题工作流程。


    ![9781430249382_Fig07-23.jpg](images/9781430249382_Fig07-23.jpg)

    [图 7-23](#9781430249382_Ch07.xhtml#_Fig23). 事件、问题、问题工作流


    ## 规则与规则集


    现在您已经了解了事件和问题，可以开始学习如何使用它们。**规则** 告诉我们在事件或问题满足特定条件时应执行的操作。这些操作包括发送电子邮件或寻呼、创建服务台工单、升级问题，甚至生成另一个问题。


    您还可以根据事件的严重程度指定不同的操作。例如，如果“文件系统空间使用率 (%)”规则生成一个**警告**事件，您可能希望发送电子邮件通知。然后，如果同一规则生成一个**严重**事件，您可能会发送寻呼通知，以唤醒值班的
    DBA。


    对于每种规则类型，可以执行许多其他操作。[表 7-2](#9781430249382_Ch07.xhtml#Tab2) 总结了每种规则类型及其在不同场景下的用途。


    [表 7-2](#9781430249382_Ch07.xhtml#_Tab2). 规则类型及其最佳用途

    ![Table7-2.jpg](images/Table7-2.jpg)


    ## 规则集管理


    单个规则可以组合成集以便于管理。规则集具有以下属性：

    *   **名称**：规则集的标识符。

    *   **描述**：规则集用途的简要说明。

    *   **应用于**：规则集中规则适用的对象列表。

    *   **所有者**：在 Enterprise Manager 中创建规则集的管理员。

    *   **已启用**：指示规则集是否已应用。

    *   **类型**：表示是企业规则集还是私有规则集。


    考虑规则集中规则的顺序，并将类似的规则分组在一起。考虑创建问题的规则，例如通过发送电子邮件或创建问题工单。也考虑管理问题的规则，例如升级它们。基于持续时间的规则应放在最后。


    组和系统应用作规则集的目标。如果已定义，建议使用管理组。您定义管理组层次结构将通过指定其目标属性，使规则能够自动应用于添加到管理组的新目标。


    同一组的规则应合并到一个规则集中。例如，在 [图 7-24](#9781430249382_Ch07.xhtml#Fig24) 中，PROD-GROUP 规则集应用于所有生命周期状态
    = ''生产'' 的目标。


    ![9781430249382_Fig07-24.jpg](images/9781430249382_Fig07-24.jpg)

    [图 7-24](#9781430249382_Ch07.xhtml#_Fig24). 规则集应用


    您应该，也能够，通过使用规则自动创建问题。您需要在规则集中设置基于事件创建问题的规则。这些规则应首先在规则集中定义。


    Enterprise Manager 附带了开箱即用的规则集，用于为某些重要事件（例如目标宕机或目标无法访问）创建问题。其中一个规则集名为 **Incident
    Management Ruleset for All Targets**，如 [图 7-25](#9781430249382_Ch07.xhtml#Fig25)
    所示。


    避免使用开箱即用的规则集。相反，通过在 Enterprise Manager 控制台中使用“类似创建”选项，基于这些标准规则集创建您自己的规则集。创建规则集后，您可以禁用开箱即用的规则集。


    ![9781430249382_Fig07-25.jpg](images/9781430249382_Fig07-25.jpg)

    [图 7-25](#9781430249382_Ch07.xhtml#_Fig25). 在 Enterprise Manager 控制台中看到的、名为 Incident
    Management Ruleset for All Targets 的开箱即用规则集


    ## 指标收集错误


    监控目标的用户应配置为密码不过期或不被锁定。这是因为过期或锁定的密码会导致指标收集错误。例如，默认监控数据库实例和集群数据库目标的数据库用户是 `DBSNMP`
    用户。从 Oracle Database 11g 开始，`DBSNMP` 配置文件设置为 180 天后使密码过期。因此，六个月后，您的监控能力就消失了。不要让这种情况发生。


    创建一个禁用密码过期的独立配置文件，并将该配置文件分配给监控用户。例如，您可以创建一个名为 `DBSNMP_MONITOR` 的配置文件，并将该配置文件分配给用户
    `DBSNMP`。然后确保该配置文件允许密码终身有效。


    企业安全策略有时要求更改此类帐户的密码。这样的策略可能带来不便，但这是生活中的事实。您需要按要求的时间表更改密码。然后确保更新目标监控属性，以便持续进行监控。理想情况是，您可以通过脚本或其他方式自动化密码重置，以及随之所需的监控属性更新。


    ## 总结'
  raw: 'An *event* is a discrete occurrence that affects a single monitored target
    in Enterprise Manager—for example, when a listener goes down or a filesystem fills
    up or an archiver hangs. Other occurrences such as job operation status changes
    (completed, failed, stopped, suspended) also fall under the category of events.


    An *incident* can be thought of as a set of one of more correlated events. An
    incident typically represents the occurrence of a significant disruption of service
    requiring specific actions—including tracking, assignment, escalation, and resolution.
    Management of significant occurrences as a single unit is done via incidents and
    not events. A host target may generate high CPU (%) and memory utilization events
    (see [Figure 7-22](#9781430249382_Ch07.xhtml#Fig22)). A single event occurrence
    by itself may not indicate an incident, but a collection of related events may
    point to an incident that describes a resource problem.


    ![9781430249382_Fig07-22.jpg](images/9781430249382_Fig07-22.jpg)


    [Figure 7-22](#9781430249382_Ch07.xhtml#_Fig22). Incident/event relationship for
    multiple events


    In addition to events and incidents, there is the concept of *problems*. Problems
    can be viewed as the source or root cause of incidents. They currently manifest
    themselves as errors in Oracle software. Problems are outside the scope of this
    discussion, as they can really be anything that causes an interruption or degradation
    of service. Rodents running loose under your server room floor, for example, can
    be a problem if they chew through wires and cause downtime.


    ![image](images/sq.jpg) **Note**  One of the challenges of a DBA’s job is to constantly
    deal with problems that cannot all be foreseen. Indeed, the presence of a heretofore
    new problem is part of the “spice” that makes DBA work enjoyable and rewarding.
    Yet at the same time, we strive for the routine. Such is the inherent tension
    in our line of work.


    Effectively managing incidents helps us to achieve better operational efficiency,
    helping us take control of the overall health of our system. Using a centralized
    incident management console allows us to view, manage, diagnose, and resolve incidents
    from a single location. A complete discussion of incident management is handled
    in [Chapter 12](#9781430249382_Ch12.xhtml). The diagram in [Figure 7-23](#9781430249382_Ch07.xhtml#Fig23)
    shows the workflow of events and incidents using EM12c.


    ![9781430249382_Fig07-23.jpg](images/9781430249382_Fig07-23.jpg)


    [Figure 7-23](#9781430249382_Ch07.xhtml#_Fig23). Event, incident, problem workflow


    Rules and Rule Sets


    Now that you understand events and incidents, you can begin to look at how to
    use them. *Rules* tell us the action or actions that should be performed when
    an event or incident meets certain criteria. These actions include sending an
    e-mail or page, opening a service-desk ticket, escalating the incident, or even
    generating another incident.


    You can also specify different actions to take depending on the severity of the
    event. For example, if a Filesystem Space Used (%) rule generates a *warning*
    event, you may wish to send an e-mail notification. Then, if the same rule generates
    a *critical* event, you may send a page notification, to wake up the on-call DBA.


    Many other actions can be performed for each type of rule. [Table 7-2](#9781430249382_Ch07.xhtml#Tab2)
    summarizes each type of rule, and their usages for different scenarios.


    [Table 7-2](#9781430249382_Ch07.xhtml#_Tab2). Rule Types and Their Best Uses


    ![Table7-2.jpg](images/Table7-2.jpg)


    Individual rules can be combined into sets for easier management. Rule sets possess
    the following attributes:


    *   *Name*: An identifier for the rule set

    *   *Description*: A brief statement of the rule set’s purpose

    *   *Applies To*: A list of objects to which the rules in the set apply

    *   *Owner*: The administrator in Enterprise Manager who created the rule set

    *   *Enabled*: An indicator of whether the rule set has been applied

    *   *Type*: Denotes an Enterprise or Private rule set


    Think about the order of rules within a rule set, and group similar rules together.
    Consider rules to create incidents, perhaps by sending an e-mail or creating a
    trouble ticket. Also consider rules to manage incidents, perhaps by escalating
    them. Duration-based rules should be put last.


    Groups and systems should be used as targets for rule sets. It is recommended
    to use administration groups if they have been defined. Your defining an administration
    group hierarchy will enable rules to be applied automatically to new targets as
    they are added to administration groups by specifying their target properties.


    Rules for the same group should be combined into one rule set. For example, in
    [Figure 7-24](#9781430249382_Ch07.xhtml#Fig24), the PROD-GROUP rule set is applied
    to all targets whose LifeCycle Status = ''Production''.


    ![9781430249382_Fig07-24.jpg](images/9781430249382_Fig07-24.jpg)


    [Figure 7-24](#9781430249382_Ch07.xhtml#_Fig24). Rule set application


    You can, and should, automatically create incidents by using rules. You will want
    to set up rules in your rule set that will create incidents based on events. These
    rules should be defined first in the rule set.


    Enterprise Manager comes with out-of-the-box rule sets that create incidents for
    some significant events such as target down or target unreachable. One such rule
    set is named *Incident Management Ruleset for All Targets*, shown in [Figure 7-25](#9781430249382_Ch07.xhtml#Fig25).


    Avoid using the out-of-the-box rule sets. Instead, create your own based on these
    stock rule sets by using the Create Like option in the Enterprise Manager console.
    Once you have created your rule set, you can disable the out-of-the-box rule sets.


    ![9781430249382_Fig07-25.jpg](images/9781430249382_Fig07-25.jpg)


    [Figure 7-25](#9781430249382_Ch07.xhtml#_Fig25). Out-of-the-box rule set named
    Incident Management Ruleset for All Targets, as seen in the Enterprise Manager
    console


    Metric Collection Errors


    The users monitoring a target should be configured so that their passwords do
    not expire or get locked. That’s because expired or locked passwords result in
    metric collection errors. For example, the database user configured to monitor
    the database instance and cluster database targets by default is the DBSNMP user.
    Starting in Oracle Database 11g, the DBSNMP profile settings are configured to
    expire passwords after 180 days. So after six months, your ability to monitor
    goes away. Don’t let that happen.


    Create a separate profile that disables password expiration, and assign that profile
    to the monitoring user. For example, you can create a profile named DBSNMP_MONITOR,
    and assign that profile to user DBSNMP. Then make sure the profile allows unlimited
    password lifetime.


    Enterprise security policies sometimes mandate changing passwords for such accounts.
    Such policies can be inconvenient, but they are a fact of life. You will need
    to change passwords on the required schedule. Then ensure that you update target
    monitoring properties so that they are continuously monitored. It’s ideal if you
    can script or otherwise automate password resets, and also the needed updating
    of monitoring properties that is subsequent to them.


