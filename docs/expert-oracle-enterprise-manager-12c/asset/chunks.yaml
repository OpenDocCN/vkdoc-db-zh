    The upper pane of the Top Activity page, shown in [Figure 9-10](#9781430249382_Ch09.xhtml#Fig10),
    provides a quick view of wait activity and active sessions in the database environment.
    The legend to the right indicates what each color represents on the screen, and
    a timeline is shown across the bottom.


    ![9781430249382_Fig09-10.jpg](images/9781430249382_Fig09-10.jpg)


    [Figure 9-10](#9781430249382_Ch09.xhtml#_Fig10). Top Activity graph for EM12c,
    demonstrating higher than normal I/O waits


    The legend on the right consists of links for the wait events, shown for each
    color. Clicking any of these opens the Active Sessions page for that wait event,
    as shown in [Figure 9-11](#9781430249382_Ch09.xhtml#Fig11). You can then lock
    in on a given wait event to gather more details.


    ![9781430249382_Fig09-11.jpg](images/9781430249382_Fig09-11.jpg)


    [Figure 9-11](#9781430249382_Ch09.xhtml#_Fig11). Wait events highlighted for CPU
    + CPU Wait


    By hovering over the wait event, the resource usage in the graph for that specific
    wait are highlighted. Upon clicking the CPU + CPU Wait option, for example, you
    are connected to the page displaying the detail information on all sessions experiencing
    waits for CPU + CPU Wait, as shown in [Figure 9-12](#9781430249382_Ch09.xhtml#Fig12).


    ![9781430249382_Fig09-12.jpg](images/9781430249382_Fig09-12.jpg)


    [Figure 9-12](#9781430249382_Ch09.xhtml#_Fig12). Displaying only wait information
    for SQL ID and sessions that are experiencing waits for CPU and Waiting for CPU


    The grayed area in the Top Activity graph, shown earlier in [Figure 9-10](#9781430249382_Ch09.xhtml#Fig10),
    is then detailed in the lower sections of the Top Activity page, defaulting to
    Top SQL and Top Sessions (see [Figure 9-13](#9781430249382_Ch09.xhtml#Fig13)).
    Note that each of the wait areas to the left of each SQL ID in the left panel
    and each Session ID in the right panel are color coded in green, to show that
    they are CPU wait events.


    ![9781430249382_Fig09-13.jpg](images/9781430249382_Fig09-13.jpg)


    [Figure 9-13](#9781430249382_Ch09.xhtml#_Fig13). Top SQL and Top Sessions, demonstrating
    an I/O issue in a database environment


    Top SQL Pane


    The Top SQL section is broken down by percentage of activity, SQL ID (unique identifier
    for the SQL statement), and the type of SQL performed. Note that in the example
    shown in [Figure 9-13](#9781430249382_Ch09.xhtml#Fig13), an apparent high I/O
    resource statement is being executed by two sessions. As the percentage is displayed
    against the rest of the database sessions, the overall impact of the wait events
    is clearly shown.


    At this point, you have the option to schedule a SQL Tuning Advisor or create
    a SQL tuning set from the drop-down below the Top SQL banner. Clicking any the
    SQL IDs opens the SQL Details page, which provides detailed information regarding
    the individual SQL statements.


    SQL Details Page


    The I/O issue demonstrated in SQL ID cwu5p1yyp1p40 referenced back in [Figure
    9-12](#9781430249382_Ch09.xhtml#Fig12) is actually the SQL statement behind a
    tablespace data pump job. Clicking this SQL ID in the Top SQL section opens a
    second details page that provides detailed information regarding performance,
    statistics, explain plan, tuning history, and SQL monitoring (see [Figure 9-14](#9781430249382_Ch09.xhtml#Fig14)).
    The bottom pane of the page is controlled by a series of tabs that display different
    details regarding the statement. You can inspect each tab and research the data
    displayed to provide value to the issue at hand. At the top right, you can use
    buttons to refresh, create a SQL worksheet, perform JVM Diagnostics, or create
    a SQL Details active report.


    ![9781430249382_Fig09-14.jpg](images/9781430249382_Fig09-14.jpg)


    [Figure 9-14](#9781430249382_Ch09.xhtml#_Fig14). Top Activity, Top SQL details,
    with the example of a data pump statement, identified by SQL ID


    SQL Activity


    The entry point for the SQL Details page is the SQL Activity tab. This view, offering
    the last hour’s activity of the SQL ID under investigation, along with the statement
    information and wait history, is displayed clearly in a standard graph view (refer
    ahead to [Figure 9-16](#9781430249382_Ch09.xhtml#Fig16)). The SQL shown in the
    example is for a data pump job on the SYSTEM tablespace.


    For procedural calls, it is extremely helpful to be able to tie the background
    SQL process back to its parent. To locate this from a SQL ID shown in the EM console,
    the following query can help:


    ```

    select o.owner, o.object_name, o.object_type, s.program_line#

    from v$sql s, dba_objects o

    where sql_id = ''<SQL_ID>''

    and s.program_id=o.object_id;

    ```


    The procedure or package, along with the line that the SQL call sourced from,
    will then be returned, thus quickly letting you know the source. This can be run
    from a SQL *Plus session. If you prefer to run it from the EM12c console, this
    can be accomplished by clicking Performance ![arrow](images/arrow.jpg) SQL ![arrow](images/arrow.jpg)
    Run SQL.


    The interface offers a simple option to execute a SQL statement or load a SQL
    script. Input the login to be used to execute the script (see [Figure 9-15](#9781430249382_Ch09.xhtml#Fig15)).


    ![9781430249382_Fig09-15.jpg](images/9781430249382_Fig09-15.jpg)


    [Figure 9-15](#9781430249382_Ch09.xhtml#_Fig15). The Run SQL interface inEM12c,
    which allows SQL to be executed directly from the console'
  trans: '

    如果数据库环境启用了相关服务，它们将会显示在“服务”选项卡中，如图 9-9 所示。数据会以标准网格性能图的形式展示，通过颜色和名称来标识每个服务及其资源使用情况。


    ![9781430249382_Fig09-09.jpg](img/9781430249382_Fig09-09.jpg)

    图 9-9. 服务与资源使用示例


    查看放大的图例后，可以很容易地看出 `App1_Prod_Orcl` 服务占用了环境中最多的资源。其余服务在资源使用方面非常相似，其影响规模远不能与这个应用程序服务相提并论。


    这些信息随后可用于帮助按服务隔离性能问题，从而缩小优化工作的范围。


    ![image](img/sq.jpg) **注意**  “实例”选项卡仅在访问真正应用集群（`RAC`）环境时才会显示。如果没有此功能，则没有显示该选项卡的理由，它也不会出现在性能主页上。在撰写本文时，所有可用的
    `RAC` 环境都涉及 Exadata 第 2 版，且界面中没有显示实际的实例信息。这可能是当前 Exadata 版本中的一个错误，或者此选项卡可能仅在非
    Exadata 环境中起作用。


    ## 最高活动量


    自最初发布以来，“最高活动量”页面一直是 Enterprise Manager 环境的基石。管理员可以查看显示的数据，并获得数据库等待事件的图形化表示——一个简单的数据库使用情况视图。通过易于理解的等待组颜色描述，管理员通常无需高级的性能优化知识，就能识别性能问题并锁定关注区域。


    随着 EM12c 的发布，“最高活动量”页面得到了增强，以提供更明确的性能数据、将“最高活动量”界面与性能报告（如 `ASH`、`AWR` 和顾问建议）关联的简单界面选项，以及详细的会话历史记录。


    “最高活动量”页面是性能页面视图左上角“性能”下拉菜单中的第二个选项（管理员登录数据库目标后即可使用）。自其首次出现在 Enterprise Manager
    10g 以来，该界面基本保持不变，因此即使是 `EM12c` 的新手也会发现该界面易于导航。


    “最高活动量”页面的上半窗格（如图 9-10 所示）提供了数据库环境中等待活动和活动会话的快速视图。右侧的图例说明了屏幕上每种颜色代表的含义，时间线显示在底部。


    ![9781430249382_Fig09-10.jpg](img/9781430249382_Fig09-10.jpg)

    图 9-10. `EM12c` 的最高活动量图，显示了高于正常的 I/O 等待


    右侧的图例由等待事件的链接组成，每种颜色对应一个。点击其中任何一个链接都会打开该等待事件的“活动会话”页面，如图 9-11 所示。然后，您可以锁定某个特定的等待事件以收集更多详细信息。


    ![9781430249382_Fig09-11.jpg](img/9781430249382_Fig09-11.jpg)

    图 9-11. 突出显示的 CPU + CPU 等待事件


    将鼠标悬停在等待事件上时，图中该特定等待的资源使用情况会突出显示。例如，点击“CPU + CPU 等待”选项后，您将被连接到显示所有正在经历“CPU + CPU
    等待”等待的会话详细信息的页面，如图 9-12 所示。


    ![9781430249382_Fig09-12.jpg](img/9781430249382_Fig09-12.jpg)

    图 9-12. 仅显示 `SQL ID` 和正在经历 CPU 等待及等待 CPU 的会话的等待信息


    然后，之前在图 9-10 中显示的“最高活动量”图中的灰色区域，会在“最高活动量”页面的下半部分得到详细展示，默认显示“Top SQL”和“Top Sessions”（参见图
    9-13）。请注意，左侧面板中每个 `SQL ID` 左侧和右侧面板中每个会话 ID 左侧的等待区域都以绿色编码，以表明它们是 CPU 等待事件。


    ![9781430249382_Fig09-13.jpg](img/9781430249382_Fig09-13.jpg)

    图 9-13. Top SQL 和 Top Sessions，展示了数据库环境中的 I/O 问题


    ### Top SQL 窗格


    Top SQL 部分按活动百分比、`SQL ID`（SQL 语句的唯一标识符）和执行的 SQL 类型进行细分。请注意，在图 9-13 所示的示例中，一个明显高
    I/O 资源消耗的语句正由两个会话执行。随着该百分比相对于其余数据库会话显示出来，等待事件的整体影响也清晰地展现出来。


    此时，您可以从 Top SQL 标题下方的下拉菜单中选择计划一个 `SQL 调优顾问` 或创建一个 SQL 调优集。点击任何一个 `SQL ID` 都会打开“SQL
    详细信息”页面，该页面提供有关各个 SQL 语句的详细信息。


    ### SQL 详细信息页面


    图 9-12 中引用的 `SQL ID` `cwu5p1yyp1p40` 所演示的 I/O 问题，实际上是一个表空间数据泵作业背后的 SQL 语句。在 Top
    SQL 部分点击此 `SQL ID` 会打开一个详细信息页面，该页面提供有关性能、统计信息、执行计划、调优历史记录和 SQL 监控的详细信息（参见图 9-14）。页面的下半部分由一系列选项卡控制，这些选项卡显示有关该语句的不同详细信息。您可以检查每个选项卡并研究显示的数据，以便为手头的问题提供价值。在右上角，您可以使用按钮来刷新、创建
    SQL 工作表、执行 JVM 诊断或创建 SQL 详细信息活动报告。


    ![9781430249382_Fig09-14.jpg](img/9781430249382_Fig09-14.jpg)

    图 9-14. 最高活动量、Top SQL 详细信息，以数据泵语句为例，通过 `SQL ID` 识别


    ### SQL 活动


    “SQL 详细信息”页面的入口点是“SQL 活动”选项卡。此视图清晰地以标准图表形式展示了所调查 `SQL ID` 最近一小时的活动情况，以及语句信息和等待历史记录（请参阅前面的图
    9-16）。示例中显示的 SQL 是针对 `SYSTEM` 表空间的一个数据泵作业。


    对于过程调用，能够将后台 SQL 进程追溯到其父进程是非常有帮助的。要从 EM 控制台显示的 `SQL ID` 定位到这一点，以下查询可以提供帮助：


    ```

    select o.owner, o.object_name, o.object_type, s.program_line#

    from v$sql s, dba_objects o

    where sql_id = ''<SQL_ID>''

    and s.program_id=o.object_id;

    ```


    随后将返回过程或包，以及 SQL 调用源自行号，从而让您快速了解来源。这可以从 SQL *Plus 会话中运行。如果您更愿意从 `EM12c` 控制台运行，可以通过点击
    性能 ![arrow](img/arrow.jpg) SQL ![arrow](img/arrow.jpg) 运行 SQL 来实现。


    该界面提供了一个简单的选项来执行 SQL 语句或加载 SQL 脚本。输入用于执行脚本的登录信息（参见图 9-15）。


    ![9781430249382_Fig09-15.jpg](img/9781430249382_Fig09-15.jpg)

    图 9-15. `EM12c` 中的“运行 SQL”界面，允许直接从控制台执行 SQL

