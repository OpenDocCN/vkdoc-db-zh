    \n同样地，如果`EMCLI`先前已配置，则也需要重新配置以使用 SLB：\n\n```\nemcli setup –url=https://slb.example.com/em\
    \ –username=sysman\n```\n\n**附加 OMS 安装**\n\n下一步是安装附加的管理服务。这可以通过使用“添加附加 OMS 部署过程”（推荐）或“静默模式”来完成。有关使用“静默模式”安装的详细信息，请参阅*《Oracle\
    \ Enterprise Manager Cloud Control 高级安装和配置指南》*。\n\n该部署过程简化了部署附加管理服务器以满足高可用性要求的过程。它通过向导驱动的界面收集输入，自动化准备和安装附加管理服务所需的步骤。它将根据收集的输入克隆现有的中间件主页，包括\
    \ OMS 配置。任何附加服务器也应满足安装 OMS 的相同要求。有关附加管理服务的先决条件，请参阅*《Oracle Enterprise Manager\
    \ Cloud Control 基本安装指南 12c Release 2》*的第 8 章。\n\n![image](img/sq.jpg)`注意` 任何打算用作\
    \ OMS 的新服务器都应已部署代理。部署过程不会将代理克隆到目标。\n\n请按照以下步骤安装附加 OMS：\n\n1.  从 Enterprise Manager\
    \ 控制台，选择 Enterprise ![arrow](img/arrow.jpg) Provisioning and Patching ![arrow](img/arrow.jpg)\
    \ Procedure Library，如图 13-17 所示。\n\n    ![9781430249382_Fig13-17.jpg](img/9781430249382_Fig13-17.jpg)\n\
    \    图 13-17 . 访问过程库\n\n2.  选择“Add Management Service”单选按钮，然后单击`Launch`（参见图 13-18）。如果该过程在列表中不可见，可以通过单击按过程名称对列进行排序。\n\
    \n    ![9781430249382_Fig13-18.jpg](img/9781430249382_Fig13-18.jpg)\n    图 13-18\
    \ . 添加管理服务部署过程\n\n3.  下一个屏幕，如图 13-19 所示，列出了在继续过程之前应满足的先决条件。选择与已满足的先决条件关联的所有复选框。如果有任何不满足，应先解决它们，然后再继续处理器。完成后单击`Next`。\n\
    \n    ![9781430249382_Fig13-19.jpg](img/9781430249382_Fig13-19.jpg)\n    图 13-19\
    \ . 添加 Oracle 管理服务先决条件检查\n\n4.  在“选择目标”屏幕上，选择一个将用作附加 OMS 的受管主机，如图 13-20 所示。中间件主页的路径将与第一个\
    \ OMS 上的路径相同。输入实例基本位置的路径或接受默认值。选择或输入在源和目标上拥有软件的用户的凭据（例如，`oracle`）。\n\n    ![9781430249382_Fig13-20.jpg](img/9781430249382_Fig13-20.jpg)\n\
    \    图 13-20 . 添加 OMS，选择目标\n\n5.  接下来，您将选择如何将克隆的主目录从源 OMS 主机传输到目标主机，并选择暂存位置（参见图\
    \ 13-21）。暂存位置应至少有 4GB 的可用空间。如果选择了共享文件系统（如 NFS），则不需要暂存位置。对于 FTP 和 HTTP(S)选项，操作系统临时位置（Unix\
    \ 或 Linux 中的`/tmp`或 Windows 中的`C:\\Temp`）还需要有 8GB 的可用空间。有关指定临时位置的详细信息，请参阅*《Oracle\
    \ Enterprise Manager Cloud Control 基本安装指南 12c Release 2》*的第 9 章。此外，您需要提供目标管理服务要使用的端口。它们将默认为源管理服务的端口。如果可能，我们建议在所有管理服务上保持端口相同。\n\
    \n    ![9781430249382_Fig13-21.jpg](img/9781430249382_Fig13-21.jpg)\n    图 13-21\
    \ . 添加 OMS，选项"
- fmt: "6.  The Post Creation Steps screen, shown in [Figure 13-22](#9781430249382_Ch13.xhtml#Fig22),\
    \ lists the requirements for setting up the `SLB` to include the new `OMS` host\
    \ if that has not been done. The `root.sh` script also must be executed. Optionally,\
    \ you may provide an e-mail address to receive post-installation steps.\n\n![9781430249382_Fig13-22.jpg](images/9781430249382_Fig13-22.jpg)\n\
    \n[Figure 13-22](#9781430249382_Ch13.xhtml#_Fig22) . Add OMS, Post Creation Steps\n\
    \n7.  Next you are presented with a summary screen, where you can review your\
    \ inputs (see [Figure 13-23](#9781430249382_Ch13.xhtml#Fig23)). Click `Finish`\
    \ to create the deployment procedure job. This could take a long time to run,\
    \ depending on your hardware resources. You can view the progress of each step\
    \ in the deployment procedure, as shown in [Figure 13-24](#9781430249382_Ch13.xhtml#Fig24).\n\
    \n![9781430249382_Fig13-23.jpg](images/9781430249382_Fig13-23.jpg)\n\n[Figure\
    \ 13-23](#9781430249382_Ch13.xhtml#_Fig23) . Add OMS, Review\n\n![9781430249382_Fig13-24.jpg](images/9781430249382_Fig13-24.jpg)\n\
    \n[Figure 13-24](#9781430249382_Ch13.xhtml#_Fig24) . Procedure Activity\n\nIf\
    \ any step fails, you should review it and perform the necessary corrective actions\
    \ before resuming or retrying. If you provided an e-mail address for the post-installation\
    \ steps notification, you will be provided with steps to configure the `SLB` with\
    \ the newly added `OMS` and to execute the `root.sh` script.\n\nThe following\
    \ new targets are discovered automatically in the `Enterprise Manager` console:\n\
    \n- `Oracle WebLogic Server`\n- `Oracle Web Tier`\n- `Application deployments`\n\
    - `Oracle Management Service`\n- `Oracle Management Agent`\n- `Enterprise Manager\
    \ Cloud Control` host\n\nAny other existing targets on the host should be promoted\
    \ via `Add Manual Target` or `Auto Discovery Results`.\n\nAfter the additional\
    \ management service has been configured, the next step in the high-availability\
    \ configuration is to use `Data Guard` to create a local physical standby database\
    \ for the repository. The `Oracle` `MAA` architecture recommends a `RAC` physical\
    \ standby, but a single-instance standby can be used as well. The standby database\
    \ will protect against storage, media corruption, or any incident that results\
    \ in a loss of the primary database.\n\nThe standby database can be added by using\
    \ the same procedure as described in the level 2 high-availability section of\
    \ this chapter. Using `Enterprise Manager Cloud Control`, it is not possible to\
    \ create a `RAC` standby. However, using deployment procedures, a single-instance\
    \ standby database can be converted to a `RAC` standby database.\n\n### Level\
    \ 4—MAA with Standby Site\n\nThe previously described high-availability levels\
    \ would provide protection for unplanned and planned downtime. Using an `SLB`\
    \ with multiple `Oracle Management Services` will provide service in the event\
    \ of a single `OMS` becoming unavailable. Using `Real Application Clusters` coupled\
    \ with a local `Data Guard` provides the highest levels of availability for the\
    \ repository with no downtime if a host is unavailable. If a failover or switchover\
    \ operation is performed, minimal downtime will occur. However, if a complete\
    \ site failure arises at the primary location, the entire `Enterprise Manager\
    \ Cloud Control` environment will become unavailable, leading to potential disruptions\
    \ in service for other applications that rely on the infrastructure.\n\n### Prerequisites\n\
    \nConfiguring a standby `Enterprise Manager Cloud Control` system at a separate\
    \ site provides high availability and protects against site failures. This configuration\
    \ includes multiple active/active `OMS` servers behind a `SLB` in addition to\
    \ a `RAC` primary and standby database in a `Data Guard` at both the primary site\
    \ and another off-site location. Prerequisites for standby management services\
    \ are as follows:\n\n- Configure the primary site by using `MAA` configuration,\
    \ as described previously.\n- Configure the standby site by using similar hardware\
    \ and resources to ensure that no loss of performance occurs after switching to\
    \ the standby site.\n- Shared storage used for the `Software Library` should be\
    \ replicated to the standby site. The path for the `Software Library` should also\
    \ be identical at both locations. Consider using disk-based replication or software-based\
    \ replication such as `rsync`[⁸](#9781430249382_Ch13.xhtml#Fn8) or something similar.\n\
    - A second `SLB` should also be deployed at the standby site to ensure complete\
    \ redundancy in a disaster recovery environment. Use vendor solutions that provide\
    \ `VIP` failover from primary to standby sites.\n\nAfter these prerequisites have\
    \ been met, install and configure the standby management services by using instructions\
    \ in the *`Oracle Enterprise Manager Cloud Control 12c Administrator’s Guide`*.\n\
    \n### Standby Management Server Installation\n\nTo install a standby management\
    \ server, you perform a software-only installation by using either a modified\
    \ version of the `Add Management Service` deployment procedures from the `Procedure\
    \ Library` or `Oracle Universal Installer`. The next example walks you through\
    \ the steps used in the former method.\n\nIf a firewall exists between the primary\
    \ and standby sites, it should be configured to allow communication for the `HTTP\
    \ Console`, `HTTPS Console`, `HTTP Agent Upload`, and `HTTPS Agent Upload` ports\
    \ as well as the `Admin Server` and `Node Manager` ports.\n\nThe following deployment\
    \ procedure provides a step-by-step workflow for cloning the primary `Enterprise\
    \ Manager` software including plug-ins and patches to another server:\n\n1.  Copy\
    \ the `emkey` to the management repository by running this command on the first\
    \ management service (with the `Admin Server` running):\n\n    ```\n    $ $OMS_HOME/bin/emctl\
    \ config emkey -copy_to_repos\n    Oracle Enterprise Manager Cloud Control 12c\
    \ Release 2\n    Copyright (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n\
    \    Enter Enterprise Manager Root (SYSMAN) Password :\n    The EMKey has been\
    \ copied to the Management Repository. This operation will cause the EMKey\n \
    \   to become unsecure.\n    After the required operation has been completed,\
    \ secure the EMKey by running \"emctl config\n    emkey -remove_from_repos\".\n\
    \    ```\n\n2.  Export the configuration from the first management service on\
    \ the primary site. Use a shared filesystem if possible to eliminate transferring\
    \ files remotely.\n\n    ```\n    $ $OMS_HOME/bin/emctl exportconfig oms -sysman_pwd\
    \ oracle12c -dir /u02/backup\n    Oracle Enterprise Manager Cloud Control 12c\
    \ Release 2\n    Copyright (c) 1996, 2012 Oracle Corporation.  All rights reserved.\n\
    \    ExportConfig started...\n    Machine is Admin Server host. Performing Admin\
    \ Server backup...\n    Exporting emoms properties...\n    Exporting secure properties...\n\
    \    Exporting configuration for pluggable modules...\n    Preparing archive file...\n\
    \    Backup has been written to file: /u02/backup/opf_ADMIN_20121227_131133.bka\n\
    \n    The export file contains sensitive data.\n    Please ensure that it is kept\
    \ secure.\n\n    ExportConfig completed successfully!\n    ```\n\n3.  Install\
    \ a management agent on the target standby host if one does not already exist.\n\
    4.  Perform a software-only installation of the `Enterprise Manager` software\
    \ by using the modified `Add Standby Management Service` deployment procedure.\n\
    \    a. From the menu, choose `Enterprise` -> `Provisioning and Patching`.\n \
    \   b. Choose the `Add Management Service` procedure and click `Create Like`,\
    \ as shown in [Figure 13-25](#9781430249382_Ch13.xhtml#Fig25).\n\n    ![9781430249382_Fig13-25.jpg](images/9781430249382_Fig13-25.jpg)\n\
    \    [Figure 13-25](#9781430249382_Ch13.xhtml#_Fig25) . Creating a deployment\
    \ procedure for the standby management service\n\n    c. Enter a new name for\
    \ the procedure, such as `Add Standby Management Service`. See [Figure 13-26](#9781430249382_Ch13.xhtml#Fig26)."
