    ```'
- fmt: "# EM12c作业系统管理\n\n## 作业系统优势\n*   不再需要许多曾经必需的环境变量。EM作业系统将通过EM和目标属性自动获知 `ORACLE_HOME`、目标\
    \ `ORACLE_SID` 等信息。\n*   针对多个目标提交作业变得简单，而在此之前，可能需要进行复杂的跨服务器身份验证。\n*   可以向EM中的目标组提交维护及其他作业，从而简化数据库管理。如果组被更新，作业也会随之适应组的变更。\n\
    *   作业可归属于多种类型的目标，包括主机、集群和目录。\n\nEM作业权限非常精细，允许创建者/管理员与其他管理员共享作业。这些权限包括：\n*   完全的编辑、删除或管理作业的权限。\n\
    *   查看作业结果的权限。\n\n## 管理EM12c作业\n本章前面的章节清晰地描述了EM12c作业系统和EM作业服务组件。下一步——由于与前面章节的基础知识相似，深度稍浅——是理解如何正确管理作业。\n\
    \n作业管理通过“作业活动”页面执行，并可从EM12c摘要或特定于目标的层级访问。要直接从这些选项访问该页面，请转到“数据库”选项卡并选择 `Jobs` ->\
    \ `Job Activity`。根据任务的不同，有各种可用选项；本节涵盖以下主题：\n*   查看作业结果\n*   编辑作业\n*   停止作业\n*\
    \   挂起作业\n*   复制到库\n*   删除作业\n\n### 查看作业结果\n自EM10g以来，清晰查看作业结果和访问执行日志信息的能力几乎保持不变。当管理员需要管理并接收有关EM作业问题的通知时，这些数据在今天仍然具有相关性和价值。[图11-33](#9781430249382_Ch11.xhtml#Fig33)展示了“作业活动”界面。\n\
    \n![9781430249382_Fig11-33.jpg](images/9781430249382_Fig11-33.jpg)\n\n[图11-33](#9781430249382_Ch11.xhtml#_Fig33)。从“作业活动”界面查看作业\n\
    \n例如，如果我们选择查看 `Backup_APEX_DEV.1` 作业的信息，只需在它未被选中时点击其单选按钮，然后点击其上方的“查看结果”按钮。\n\n\
    然后，作业的任何输出都会显示出来，如[图11-34](#9781430249382_Ch11.xhtml#Fig34)所示。\n\n![9781430249382_Fig11-34.jpg](images/9781430249382_Fig11-34.jpg)\n\
    \n[图11-34](#9781430249382_Ch11.xhtml#_Fig34)。EM作业日志输出\n\n### 从活动视图编辑作业\n计划运行的作业以及已执行的作业都可以进行编辑。（取决于作业类型，例如备份，可能只能进行微小的更改。）之前已执行的作业随后可以作为新作业重新提交。当您更新一个新作业并做出更改时，这些更改也会提交给该作业的任何未来计划间隔。这是一个重要的区别，因为如果作业只需要一次性更改，那么更好的选择可能是对现有作业执行一次“类似创建”并安排单次执行，以确保常规执行时间不受影响。\n\
    \n> **注意** 从“作业活动”视图编辑的任何作业都不会自动保存到库中。任何应保留在库中的永久性更改都应在“作业库”视图中保存。\n\n### 停止正在运行的作业\n\
    点击“停止”按钮将停止该作业及其所有后续运行。作业将不再有未来的调度计划。\n\n### 挂起作业\n点击“挂起”按钮是将作业“搁置”以进行维护（这将导致目标暂时不可用）的正确方法。您可以在稍后时间重新启动该作业。\n\
    \n### 复制到库\n“复制到库”选项将选定的作业复制到库中，以便以后访问、编辑、提交等。备份作业、数据泵作业和其他杂项作业无法保留在库中，如果您尝试保存它们，将会失败。这些作业可以通过EM12c的备份和恢复来保留，但目前，备份和数据泵作业没有库。\n\
    \n### 删除作业\n删除作业时，可以选择删除该作业的特定运行，或者从作业系统中删除所有作业（包括历史记录）。请确保，如果您选择删除所有作业历史记录，不会违反业务所需的任何保留策略。删除后，作业将从调度程序中移除，必须重新提交。因此，如果您删除了所有历史记录且作业信息将来还需要使用，确保作业保留在库中就很重要。\n\
    \n## 管理管理器\nEM12c第2版增加了一个名为“管理管理器”(MTM)的作业系统页面。此页面使您能够执行类似于“作业活动”、“作业库”和“作业健康状况监视器”页面上的任务，但提供了更增强、更完整的作业环境视图。\n\
    \nMTM显示以下内容：\n*   EM作业系统的标准健康状况\n*   作业状态\n*   诊断信息\n*   代理管理\n*   跟踪的上传间隔和通知\n\
    \n虽然直到EM12c第2版才可用，但“健康状况概览”页面现在结合了环境的整体负载和活动以及特定于目标的作业负载。\n\n## 故障排除EM12c作业系统\n\
    如果遇到的问题超出了由于作业语法或配置不正确（这些错误会被EM控制台界面日志文件捕获）而导致的简单作业失败，您可能需要使用企业管理器诊断工具包，也称为EMDIAG。\n\
    \n这些数据不仅有价值，而且是通过My Oracle Support提交大多数服务请求所必需的。\n\nEMDIAG基本存储库工具包随EM12c一起提供。另外两个工具包可通过My\
    \ Oracle Support下载获取。EMDIAG工具包的文档可通过MOS说明：*MOS ID#* 421053.1获取。这三个工具包如下：\n*  \
    \ `repvfy`：包含在EM12c安装中，该工具包直接从OMS存储库中提取数据。\n*   `agtvfy`：特定于Cloud Control的工具包，用于维护和诊断问题。\n\
    *   `omsvfy`：用于诊断和维护OMS数据库存储库的特定工具包。\n\n### 执行安装\n执行以下步骤安装EMDIAG。\n\n1.  首先，切换到新创建的目录（您将在其中安装EMDIAG），因此\
    \ `cd` 到EMDIAG主目录（您选择用于解压文件的新目录）：\n```\n    cd $EMDIAG_HOME/bin\n    ```\n2. \
    \ 在`bin`目录中有三个常见文件——可执行文件、支持Windows的批处理文件以及支持两者的Perl脚本：\n```\n    -rwxrwxr-- 1\
    \ oracle dba   3331 Feb 23  2012 repvfy.bat\n    -rwxrwxr-- 1 oracle dba 198800\
    \ Aug 31 18:57 repvfy.pl\n    -rwxrwxr-x 1 oracle dba   7195 Aug 31 18:57 repvfy\n\
    \    ```\n    通过执行以下命令启动安装：\n```\n    ./repvfy install -tns em12rep -pwd password\n\
    \    ```\n3.  安装开始，最后显示以下内容：\n```\n    PL/SQL procedure successfully completed.\n\
    \    COMPONENT            INFO\n    -------------------- --------------------\n\
    \    EMDIAG Version       2012.0831\n    Repository Version   12.1.0.1.0\n   \
    \ Database Version     11.2.0.3.0\n    Test Version         2012.0926\n    Repository\
    \ Type      CENTRAL\n    Verify Tests         381\n    Object Tests         157\n\
    \    Deployment           SMALL\n    8 rows selected.\n    Disconnected from Oracle\
    \ Database 11g Enterprise Edition Release 11.2.0.3.0 - 64 bit Production With\
    \ the Partitioning, OLAP, Data Mining and Real Application Testing options\n \
    \   ```\n4.  检查安装并验证版本：\n```\n    $ ./repvfy version -tns em12rep version\n  \
    \  ```\n    在提示时输入 `SYSMAN` 密码。输出结果如下："
  raw: "*   No longer will many environment variables be required as they once were.\
    \ The EM Job System will already know what the ORACLE_HOME, the ORACLE_SID (target),\
    \ and others will be through the EM and the target properties.\n*   Submitting\
    \ a job against multiple targets is easy, whereas before, complex, cross-server\
    \ authentication may have been required.\n*   Maintenance and other jobs can be\
    \ submitted against target groups in EM, allowing for ease of database management.\
    \ If the group is updated, the job will then address the changes to the group\
    \ as well.\n*   Jobs can be attributed to multiple types of targets, including\
    \ hosts, clusters, and directories.\n\nEM Job privileges are very granular, allowing\
    \ the creator/administrator to share the job with other administrators. These\
    \ privileges include the following:\n\n*   Full access to edit, delete, or manage\
    \ the job.\n*   Viewing the results of the job\n\nManaging EM12c Jobs\n\nPrevious\
    \ sections of this chapter provided clear descriptions of the EM12c Job System\
    \ and the EM Jobs Service components. The next step— although less in depth because\
    \ of the similarity in basics to other sections—is to understand how to properly\
    \ manage jobs.\n\nJob management is performed through the Job Activity page and\
    \ accessed at the EM12c summary or target-specific level. To access the page directly\
    \ from any of these options, go to the Database tab and select Jobs ![arrow](images/arrow.jpg)\
    \ Job Activity. Depending on the task at hand, various choices are available;\
    \ this section covers the following topics:\n\n*   Viewing job results\n*   Editing\n\
    *   Stopping\n*   Suspending\n*   Copying to the library\n*   Deleting\n\nViewing\
    \ Job Results\n\nHaving the ability to view job results clearly and with access\
    \ to execution log information has remained almost unchanged since EM10g. This\
    \ data still has relevance and value to today’s administrator when required to\
    \ manage and be notified of issues with an EM Job. [Figure 11-33](#9781430249382_Ch11.xhtml#Fig33)\
    \ shows the Job Activity interface.\n\n![9781430249382_Fig11-33.jpg](images/9781430249382_Fig11-33.jpg)\n\
    \n[Figure 11-33](#9781430249382_Ch11.xhtml#_Fig33). Viewing jobs from the Job\
    \ Activity interface\n\nIf we choose to view information about the Backup_APEX_DEV.1\
    \ job, for example, we can simply click its radio button if it is not already\
    \ selected and then click the View Results button just above it.\n\nAny output\
    \ from the job then displays, as shown in  [Figure 11-34](#9781430249382_Ch11.xhtml#Fig34).\n\
    \n![9781430249382_Fig11-34.jpg](images/9781430249382_Fig11-34.jpg)\n\n[Figure\
    \ 11-34](#9781430249382_Ch11.xhtml#_Fig34). EM Job log output\n\nEditing Jobs\
    \ from the Activity View\n\nJobs that are scheduled to run, as well as jobs that\
    \ have already executed, are available for editing. (Depending on the job type,\
    \ such as backups, only minor changes can be made.) Jobs that have executed previously\
    \ can then be resubmitted as new jobs. When you update a new job with changes,\
    \ they are submitted to any future intervals of the job as well. This is an important\
    \ distinction to make, because if a job needs a one-time change, then a single\
    \ Create Like of an existing job, with a single, scheduled execution, may be the\
    \ better choice to ensure that regular execution times are not impacted.\n\n![image](images/sq.jpg) **Note**  Any\
    \ edited job from the Job Activity view won’t automatically save to the library.\
    \ Any permanent changes that should be retained in the library should be saved\
    \ in the Job Library view.\n\nStopping a Running Job\n\nClicking the Stop button\
    \ stops the job and all subsequent runs of the job. No future scheduling of the\
    \ job will occur.\n\nSuspending Jobs\n\nClicking the Suspend button is the proper\
    \ way to put a job “on hold” for maintenance that will place the target out of\
    \ service. You can then restart the job at a later time.\n\nCopying to the Library\n\
    \nThe Copy to Library option copies the chosen job to the library to be accessed\
    \ later, edited, submitted, and so forth. Backup jobs, data pump jobs, and other\
    \ miscellaneous jobs cannot be retained in the library and will fail if you attempt\
    \ to save them. These jobs can be retained through backup and recovery of the\
    \ EM12c, but at this time, no library exists for the backup and data pump jobs.\n\
    \nDeleting Jobs\n\nDeleting a job offers the option to delete the specific run\
    \ of the job or to delete all jobs, including history, from the Job System. Ensure\
    \ that if you choose to remove all job history, this will not violate any retention\
    \ information required by the business. Upon deletion, the job is removed from\
    \ the scheduler and must be resubmitted. Therefore, ensuring that jobs are retained\
    \ in the library is important if you delete all history and the job information\
    \ is required for future use.\n\nManaging the Manager\n\nEM12c release 2 has an\
    \ additional Job System page titled Managing the Manager (MTM). This page enables\
    \ you to perform tasks similar to those found on the Job Activity, Job Library,\
    \ and Job Health Monitor pages, but provides a more enhanced, complete view of\
    \ the job environment.\n\nThe MTM displays the following:\n\n*   Standard health\
    \ of the EM Job System\n*   Job status\n*   Diagnostics information\n*   Agent\
    \ management\n*   Tracked upload intervals and notifications\n\nAlthough not available\
    \ until EM12c release 2, the Health Overview page now incorporates the overall\
    \ load and activity of the environment and job load (target specific).\n\nTroubleshooting\
    \ the EM12c Job System\n\nIf there is an issue beyond a simple failed job due\
    \ to incorrect syntax or configuration of a job that is trapped in the EM console\
    \ interface log files, you might need to use the Enterprise Manager Diagnostics\
    \ Kit, also known as EMDIAG.\n\nThis data is not only valuable but also required\
    \ for most service requests through My Oracle Support.\n\nThe EMDIAG basic repository\
    \ kit comes with EM12c. The other two kits are available via download through\
    \ My Oracle Support. Documentation for the EMDIAG kit is available via MOS Note:\
    \ *MOS ID#* 421053.1 The three kits are as follows:\n\n*   repvfy: Included in\
    \ the EM12c installation, this kit pulls data directly from the OMS repository.\n\
    *   agtvfy: Cloud Control–specific kit to maintain and diagnose issues.\n*   omsvfy:\
    \ Specific kit to diagnose and maintain the OMS database repository.\n\nPerforming\
    \ the Installation\n\nPerform the steps in this section to install EMDIAG.\n\n\
    1.  First, you will change to the newly created directory, where you will install\
    \ EMDIAG, so cd to the EMDIAG home (a new directory you have chosen to unzip the\
    \ files into):\n\n```\n    cd $EMDIAG_HOME/bin\n    ```\n\n2.  In the bin directory\
    \ are three common files—the executable, the batch file for windows support, and\
    \ the Perl script that supports both:\n\n```\n    -rwxrwxr-- 1 oracle dba   3331\
    \ Feb 23  2012 repvfy.bat\n    -rwxrwxr-- 1 oracle dba 198800 Aug 31 18:57 repvfy.pl\n\
    \    -rwxrwxr-x 1 oracle dba   7195 Aug 31 18:57 repvfy\n    ```\n\nInitiate the\
    \ installation by performing the following:\n\n```\n    ./repvfy install -tns\
    \ em12rep -pwd password\n    ```\n\n3.  The installation commences, and you end\
    \ with the following:\n\n```\n    PL/SQL procedure successfully completed.\n \
    \   COMPONENT            INFO\n    -------------------- --------------------\n\
    \    EMDIAG Version       2012.0831\n    Repository Version   12.1.0.1.0\n   \
    \ Database Version     11.2.0.3.0\n    Test Version         2012.0926\n    Repository\
    \ Type      CENTRAL\n    Verify Tests         381\n    Object Tests         157\n\
    \    Deployment           SMALL\n    8 rows selected.\n    Disconnected from Oracle\
    \ Database 11g Enterprise Edition Release 11.2.0.3.0 - 64 bit Production With\
    \ the Partitioning, OLAP, Data Mining and Real Application Testing options\n \
    \   ```\n\n4.  Check the installation and verify the version:\n\n```\n    $ ./repvfy\
    \ version -tns em12rep version\n    ```\n\nEnter the SYSMAN password when prompted.\
    \ The following output results:"
  trans: "\n# EM12c 作业系统管理\n\n## 作业系统优势\n*   不再需要许多曾经必需的环境变量。EM 作业系统将通过 EM 和目标属性自动获知\
    \ `ORACLE_HOME`、目标 `ORACLE_SID` 等信息。\n*   针对多个目标提交作业变得简单，而在此之前，可能需要进行复杂的跨服务器身份验证。\n\
    *   可以向 EM 中的目标组提交维护及其他作业，从而简化数据库管理。如果组被更新，作业也会随之适应组的变更。\n*   作业可归属于多种类型的目标，包括主机、集群和目录。\n\
    \nEM 作业权限非常精细，允许创建者/管理员与其他管理员共享作业。这些权限包括：\n*   完全的编辑、删除或管理作业的权限。\n*   查看作业结果的权限。\n\
    \n## 管理 EM12c 作业\n本章前面的章节清晰地描述了 EM12c 作业系统和 EM 作业服务组件。下一步——由于与前面章节的基础知识相似，深度稍浅——是理解如何正确管理作业。\n\
    \n作业管理通过“作业活动”页面执行，并可从 EM12c 摘要或特定于目标的层级访问。要直接从这些选项访问该页面，请转到“数据库”选项卡并选择 `Jobs`\
    \ -> `Job Activity`。根据任务的不同，有各种可用选项；本节涵盖以下主题：\n*   查看作业结果\n*   编辑作业\n*   停止作业\n\
    *   挂起作业\n*   复制到库\n*   删除作业\n\n### 查看作业结果\n自 EM10g 以来，清晰查看作业结果和访问执行日志信息的能力几乎保持不变。当管理员需要管理并接收有关\
    \ EM 作业问题的通知时，这些数据在今天仍然具有相关性和价值。图 11-33 展示了“作业活动”界面。\n\n![9781430249382_Fig11-33.jpg](img/9781430249382_Fig11-33.jpg)\n\
    \n图 11-33。从“作业活动”界面查看作业\n\n例如，如果我们选择查看 `Backup_APEX_DEV.1` 作业的信息，只需在它未被选中时点击其单选按钮，然后点击其上方的“查看结果”按钮。\n\
    \n然后，作业的任何输出都会显示出来，如图 11-34 所示。\n\n![9781430249382_Fig11-34.jpg](img/9781430249382_Fig11-34.jpg)\n\
    \n图 11-34。EM 作业日志输出\n\n### 从活动视图编辑作业\n计划运行的作业以及已执行的作业都可以进行编辑。（取决于作业类型，例如备份，可能只能进行微小的更改。）之前已执行的作业随后可以作为新作业重新提交。当您更新一个新作业并做出更改时，这些更改也会提交给该作业的任何未来计划间隔。这是一个重要的区别，因为如果作业只需要一次性更改，那么更好的选择可能是对现有作业执行一次“类似创建”并安排单次执行，以确保常规执行时间不受影响。\n\
    \n> **注意** 从“作业活动”视图编辑的任何作业都不会自动保存到库中。任何应保留在库中的永久性更改都应在“作业库”视图中保存。\n\n### 停止正在运行的作业\n\
    点击“停止”按钮将停止该作业及其所有后续运行。作业将不再有未来的调度计划。\n\n### 挂起作业\n点击“挂起”按钮是将作业“搁置”以进行维护（这将导致目标暂时不可用）的正确方法。您可以在稍后时间重新启动该作业。\n\
    \n### 复制到库\n“复制到库”选项将选定的作业复制到库中，以便以后访问、编辑、提交等。备份作业、数据泵作业和其他杂项作业无法保留在库中，如果您尝试保存它们，将会失败。这些作业可以通过\
    \ EM12c 的备份和恢复来保留，但目前，备份和数据泵作业没有库。\n\n### 删除作业\n删除作业时，可以选择删除该作业的特定运行，或者从作业系统中删除所有作业（包括历史记录）。请确保，如果您选择删除所有作业历史记录，不会违反业务所需的任何保留策略。删除后，作业将从调度程序中移除，必须重新提交。因此，如果您删除了所有历史记录且作业信息将来还需要使用，确保作业保留在库中就很重要。\n\
    \n## 管理管理器\nEM12c 第 2 版增加了一个名为“管理管理器”(MTM)的作业系统页面。此页面使您能够执行类似于“作业活动”、“作业库”和“作业健康状况监视器”页面上的任务，但提供了更增强、更完整的作业环境视图。\n\
    \nMTM 显示以下内容：\n*   EM 作业系统的标准健康状况\n*   作业状态\n*   诊断信息\n*   代理管理\n*   跟踪的上传间隔和通知\n\
    \n虽然直到 EM12c 第 2 版才可用，但“健康状况概览”页面现在结合了环境的整体负载和活动以及特定于目标的作业负载。\n\n## 故障排除 EM12c\
    \ 作业系统\n如果遇到的问题超出了由于作业语法或配置不正确（这些错误会被 EM 控制台界面日志文件捕获）而导致的简单作业失败，您可能需要使用企业管理器诊断工具包，也称为\
    \ EMDIAG。\n\n这些数据不仅有价值，而且是通过 My Oracle Support 提交大多数服务请求所必需的。\n\nEMDIAG 基本存储库工具包随\
    \ EM12c 一起提供。另外两个工具包可通过 My Oracle Support 下载获取。EMDIAG 工具包的文档可通过 MOS 说明：*MOS ID#*\
    \ 421053.1 获取。这三个工具包如下：\n*   `repvfy`：包含在 EM12c 安装中，该工具包直接从 OMS 存储库中提取数据。\n* \
    \  `agtvfy`：特定于 Cloud Control 的工具包，用于维护和诊断问题。\n*   `omsvfy`：用于诊断和维护 OMS 数据库存储库的特定工具包。\n\
    \n### 执行安装\n执行以下步骤安装 EMDIAG。\n\n1.  首先，切换到新创建的目录（您将在其中安装 EMDIAG），因此 `cd` 到 EMDIAG\
    \ 主目录（您选择用于解压文件的新目录）：\n```\n    cd $EMDIAG_HOME/bin\n    ```\n2.  在`bin`目录中有三个常见文件——可执行文件、支持\
    \ Windows 的批处理文件以及支持两者的 Perl 脚本：\n```\n    -rwxrwxr-- 1 oracle dba   3331 Feb\
    \ 23  2012 repvfy.bat\n    -rwxrwxr-- 1 oracle dba 198800 Aug 31 18:57 repvfy.pl\n\
    \    -rwxrwxr-x 1 oracle dba   7195 Aug 31 18:57 repvfy\n    ```\n    通过执行以下命令启动安装：\n\
    ```\n    ./repvfy install -tns em12rep -pwd password\n    ```\n3.  安装开始，最后显示以下内容：\n\
    ```\n    PL/SQL procedure successfully completed.\n    COMPONENT            INFO\n\
    \    -------------------- --------------------\n    EMDIAG Version       2012.0831\n\
    \    Repository Version   12.1.0.1.0\n    Database Version     11.2.0.3.0\n  \
    \  Test Version         2012.0926\n    Repository Type      CENTRAL\n    Verify\
    \ Tests         381\n    Object Tests         157\n    Deployment           SMALL\n\
    \    8 rows selected.\n    Disconnected from Oracle Database 11g Enterprise Edition\
    \ Release 11.2.0.3.0 - 64 bit Production With the Partitioning, OLAP, Data Mining\
    \ and Real Application Testing options\n    ```\n4.  检查安装并验证版本：\n```\n    $ ./repvfy\
    \ version -tns em12rep version\n    ```\n    在提示时输入 `SYSMAN` 密码。输出结果如下：\n"
- fmt: '# Using the EMDIAG with EM12c


    Numerous diagnostic reports can be run, depending on the arguments that are submitted.
    The `EMDIAG` kit is a full diagnostic suite that will assist the administrator
    and My Oracle Support in diagnosing issues when they arise in the `EM12c` environment.


    ## Job-Level Diagnostics


    The following query from Enterprise Manager will gather data that is required
    to then run the diagnostics for job-level reports. This example uses a backup
    job for `Apex`.


    From `SQL*Plus` as a user with select privileges to the `SYSMAN` schema, perform
    the following:


    ```sql

    select mj.job_id, mj.job_name, mjh.execution_id, mjh.step_id

    from sysman.mgmt_job mj, sysman.mgmt_job_history mjh

    where mj.job_id = ''BFC78F41009876F3E04014AC08003231''

    and mj.job_id=mjh.job_id

    and mjh.start_time > sysdate-1;

    ```


    [Figure 11-35](#9781430249382_Ch11.xhtml#Fig35) shows the output.


    ![9781430249382_Fig11-35.jpg](images/9781430249382_Fig11-35.jpg)


    [Figure 11-35](#9781430249382_Ch11.xhtml#_Fig35). Output from the preceding query


    Using the job name, we can perform some diagnostics report gathering on the job
    itself. Because of the large amount of diagnostic data that is offered, redirecting
    the output to a file is recommended.


    ```bash

    $ cd $EMDIAG_HOME/bin

    ./repvfy dump job -name BACKUP_APEX.1 –pwd w0rldw1d3 -tns em12rep > ./rep_apex_job.lst

    ```


    The output file then shows you a full report on the job, starting with the information
    about the diagnostic tool, the database, test, and repository. [Figure 11-36](#9781430249382_Ch11.xhtml#Fig36)
    shows this information. [Figure 11-37](#9781430249382_Ch11.xhtml#Fig37) shows
    some of the job parameters. [Figure 11-38](#9781430249382_Ch11.xhtml#Fig38) shows
    parameter arguments. [Figure 11-39](#9781430249382_Ch11.xhtml#Fig39) shows the
    job source and target.


    ![9781430249382_Fig11-36.jpg](images/9781430249382_Fig11-36.jpg)


    [Figure 11-36](#9781430249382_Ch11.xhtml#_Fig36). Verions and `EMDIAG` information
    about the repository


    ![9781430249382_Fig11-37.jpg](images/9781430249382_Fig11-37.jpg)


    [Figure 11-37](#9781430249382_Ch11.xhtml#_Fig37). From here, the report steps
    into information about the job’sruntime, time zone, and other details


    ![9781430249382_Fig11-38.jpg](images/9781430249382_Fig11-38.jpg)


    [Figure 11-38](#9781430249382_Ch11.xhtml#_Fig38). Parameter arguments for job
    steps in `EM12c` from the `EMDIAG` job report


    ![9781430249382_Fig11-39.jpg](images/9781430249382_Fig11-39.jpg)


    [Figure 11-39](#9781430249382_Ch11.xhtml#_Fig39). `GUID` information about the
    host running the job


    The next section then lets you know who owns the job and who has grants, along
    with what kind of grants, on the job.Because this job is simply owned and run
    by the `SYSMAN` user only, only this user shows in our example report.


    The next section of the report, shown in [Figure 11-40](#9781430249382_Ch11.xhtml#Fig40),
    presents the last ten runtimes in history, including elapsed time, retries, and
    success information about the job.


    ![9781430249382_Fig11-40.jpg](images/9781430249382_Fig11-40.jpg)


    [Figure 11-40](#9781430249382_Ch11.xhtml#_Fig40). Displaying the historical data
    regarding the job runs in the `EM` Jobs Service


    In this example, the `EMDIAG` indicates that one job isin a waiting state. The
    recent history in [Figure 11-41](#9781430249382_Ch11.xhtml#Fig41) shows that all
    jobs have been successful. However, there is one level-17 job, signifying that
    one run did have to wait because of some undisclosed issue that isn’t shown in
    the execution summary.


    ![9781430249382_Fig11-41.jpg](images/9781430249382_Fig11-41.jpg)


    [Figure 11-41](#9781430249382_Ch11.xhtml#_Fig41). Values of job run status and
    the summary counts for the historical report


    If there were any errors in the job analysis, this is saved for the last section
    of the report. Our example compiled successfully and showed no issues, and so
    the output results in what you see in [Figure 11-42](#9781430249382_Ch11.xhtml#Fig42).


    ![9781430249382_Fig11-42.jpg](images/9781430249382_Fig11-42.jpg)


    [Figure 11-42](#9781430249382_Ch11.xhtml#_Fig42). Successful completion of the
    analysis of the job, with no errors presented at the end of the report


    If a job has more than one step and you wish to gather detailed diagnostic information
    about that step only, a secondary report can be generated by running the following:


    ```bash

    ./repvfy dump –tns <oms_sid> step –id <step_id>

    ```


    ## GUID Target Diagnostics


    For our next scenario, we are going to utilize the `GUID` for our `EM12rep` (the
    `OMS` repository for the `EM12c`) and gather `EM` environment data:


    ```bash

    ./repvfy dump -tns <oms_sid> execution

    -guid EFD92E6468B02696B602A650E085B5A9 -pwd <pwd>

    > ./rep_guid.lst

    ```


    By running the `GUID`-level command you get a one-stop-shop kind of diagnostic
    report about your `EM` Jobs Service health. (`GUID` is your target `GUID` and
    dumps out information on all the jobs, from all the targets.)


    The report starts out very similarly to the job-level report, listing repository
    and `EM` information. However, you will notice a distinct difference as you get
    to target info, especially if your `EM` environment is large.


    If there are any background jobs submitted by the `EM` Jobs Service that are experiencing
    issues, they are clearly reported in their own section, as shown in [Figure 11-43](#9781430249382_Ch11.xhtml#Fig43).


    ![9781430249382_Fig11-43.jpg](images/9781430249382_Fig11-43.jpg)


    [Figure 11-43](#9781430249382_Ch11.xhtml#_Fig43). Trace data about an error in
    the job execution


    My only complaint at this time is that the `BP1` version of the `EM12c`, when
    the `EMDIAG` is run against it at a full environment level, experiences an error
    at the Job Analysis Summary step. You can see that error in [Figure 11-44](#9781430249382_Ch11.xhtml#Fig44).


    ![9781430249382_Fig11-44.jpg](images/9781430249382_Fig11-44.jpg)


    [Figure 11-44](#9781430249382_Ch11.xhtml#_Fig44). Single error from the `OMS`
    diagnostic-level `EMDIAG`


    Therefore, if you are still using a `BP1` version and need to pull this level
    of diagnostic data, I hope that you have your issue narrowed down to a single
    job or target as the focus of the report, subsequently avoiding this error. Release
    2 has corrected the problem.


    ## Global Diagnostics


    In this example, we will run a level-9 diagnostic, which will run a report against
    the whole of the Enterprise Manager environment, checking the health and other
    issues:


    ```bash

    ./repvfy -tns em12rep verify -level 9 –detail

    ```


    The first thing this level of diagnostic does is check the version of `EMDIAG`
    you are using and whether a newer version is available as an update.


    The diagnostics then proceed to perform a full verification of the `EM` environment,
    as shown in [Figure 11-45](#9781430249382_Ch11.xhtml#Fig45), before logging in
    to `SQL*Plus` to perform the secondary diagnostics on the `EM` testing, the installation
    information about the `EM` system, and internal jobs and alerts from the `EM`
    environment.


    ![9781430249382_Fig11-45.jpg](images/9781430249382_Fig11-45.jpg)


    [Figure 11-45](#9781430249382_Ch11.xhtml#_Fig45). Global-level diagnostics displaying
    metric collection issues from the `EMDIAG`'
