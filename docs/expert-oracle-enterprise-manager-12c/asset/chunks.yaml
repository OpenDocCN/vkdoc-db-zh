    The EMCLI Utility


    Before you look at agent log and trace files in more detail, though, let’s examine
    the other command-line utility for managing agents, the Enterprise Manager Command
    Line Interface utility (EMCLI). The EMCLI utility is mainly used for automating
    commands that need to be executed against a large number of targets, because scripting
    this can be much faster than selecting each target to process the operation on
    via the EM console.


    As an example, let’s say you have a group of Production databases called ProdDB
    that are administered by someone who is leaving the organization. If you have
    500 databases in that group, you wouldn’t want to update the Contact lifecycle
    properties one by one. Instead, you could do the following:


    ```

    emcli set_target_property_value -property_records="ProdDB:composite:Contact:psharman"

    -propagate_to_members

    ```


    This changes the contact details to the psharman user ID for all 500 databases
    in one fell swoop.


    One of the main advantages of using EMCLI over EMCTL, though, is that EMCLI has
    a client that can be installed on any system that can reach the OMS. That means
    it can be executed anywhere in your managed environment. Many Cloud Control administrators
    install EMCLI on their local machine, for example. EMCLI also allows you to call
    custom scripts such as TCL, Perl, SQL, or OS scripts.


    From an architectural perspective, there are two parts to EMCLI. There is the
    EMCLI client (the part that you install where you want to) and an OMS extension,
    which is automatically installed in the OMS. The Java-based client sends command
    requests using emcli verbs to the OMS extension, which passes them on to the OMS
    to action. These verbs are plug-in extensions that contain the relevant command
    and options.


    Installation of the EM CLI client is done by first downloading the EMCLI kit to
    the location where you want to install it. The kit can be downloaded from the
    EM console, by choosing Command Line Interface from the Setup menu, as shown in
    [Figure 3-10](#9781430249382_Ch03.xhtml#Fig10).


