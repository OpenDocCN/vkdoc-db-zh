    \ PENDING', 14, 'INACTIVE',\n 15, 'QUEUED', 16, 'FAILED/RETRIED', 17, 'WAITING',\
    \ 18, 'SKIPPED',status) \"Execution STATUS\"\nfrom sysman.mgmt_job mj, sysman.mgmt_job_exec_summary\
    \ mjes\nwhere mj.job_id=mjes.job_id\nand mj.job_name ='BACKUP_EM12REP_000044'\n\
    order by mjes.start_time desc;\n```\n\n此查询的输出将产生关于数据库存储库的备份作业信息。当前正在运行的作业以及历史作业信息都可以在[图11-12](#9781430249382_Ch11.xhtml#Fig12)中看到。\n\
    \n![9781430249382_Fig11-12.jpg](images/9781430249382_Fig11-12.jpg)\n\n[图11-12](#9781430249382_Ch11.xhtml#_Fig12).\
    \ 查询作业状态信息\n\n然后我们可以查询满足以下条件的过去24小时内的数据：不需要纠正操作（`is_corrective_action = 0`），状态为标准作业历史记录（`status\
    \ IN (5,4,3,18,8)`），并且有重试要求（`retried`不为空）。\n\n```sql\nSELECT mjes.job_id, mj.job_name,\
    \ mjes.retried\nFROM MGMT_JOB_EXEC_SUMMARY mjes, MGMT_JOB mj\nWHERE mjes.job_id\
    \ = mj.job_id AND mj.is_corrective_action = 0\nAND mjes.status IN (5,4,3,18,8)\n\
    AND  mjes.start_time > sysdate-1\nand mjes.retried is not null;\n```\n\n![9781430249382_Fig11-13.jpg](images/9781430249382_Fig11-13.jpg)\n\
    \n图11-13. 经历过至少一次重试的作业的结果\n\n这些基本查询提供了如何连接表以及如何从`SQL*Plus`报告EM作业系统信息的示例。这些数据随后可以帮助您进行故障排除，或者您可以使用`EMCLI`来处理问题或在EM控制台之外执行任务。\n\
    \n### 权限与责任\n\n了解谁有权创建和管理作业至关重要。作业应由个别用户拥有，并在此级别设置首选凭据，以确保对这些凭据使用的问责制。\n\n通过创建EM12c管理员登录并安全地设置它们，您可以查看谁运行了作业以及谁编辑了作业，确保创建、执行甚至删除作业的用户在Enterprise\
    \ Manager访问日志中被有效跟踪。由于用户不是存储库所有者（`SYSMAN`），这消除了在EM12c环境中默认授予该用户的广泛角色和权限可能引发的安全问题。"
  raw: '| Job Action | Description |

    | --- | --- |

    | Create | Create an OS or SQL script, along with other types of jobs. |

    | Edit | Update the existing job and change scheduled time, interval, parameters,
    and so forth. |

    | Create Like | Create a job from an existing one, with options to edit the existing
    parameters, schedule, and so forth.  (Backup jobs and certain other maintenance
    jobs may not allow the Create Like option.) |

    | Delete | Remove either a single scheduled/failed job or remove all instances
    of the job from the EM Job Activity view. (Any library copies will be retained.)
    |

    | Suspend | Place the job “on hold” until it is resumed, enabling the existing
    schedule to continue. |

    | Resume | Resume a suspended schedule for a job. Jobs must be resumed individually.
    |

    | Retry on Failure | Retry the job if it is in the allowed list of job types.
    |


    The Enterprise Manager Job Library


    The Enterprise Manager Job Library allows the repository of jobs that can be submitted
    to the EM Job scheduler. This repository contains all the jobs created by an administrator
    outside of backups and EM console processing. The library retains only what has
    been saved to it and must be kept up-to-date with changesin active jobs. An exporter
    that would create a snapshot of current jobs to the library would be beneficial,
    but unfortunately does not exist at this time. Therefore, it is important to always
    save any changed jobs, including simple execution time changes, from the Job Activity
    page to the library. If for any reason you must refer to the library to re-create
    the job, this will ensure a correct resubmission of the job to the scheduler.


    For users of earlier 10g and 11g EM jobs, there was no migration process for jobs
    to a new EM12c environment. This feature is also missing in the new EM12c version,
    but plans are in the works for Oracle to include one in an upcoming release. This
    feature should have multiple benefits, not just for migrations, but as part of
    upgrades, secondary options for backup/recovery, and replication.


    The Job Library interface, shown in [Figure 11-9](#9781430249382_Ch11.xhtml#Fig9),
    is similar to the Job Activity page and uses many similar options, including Edit
    and Access.


    ![9781430249382_Fig11-09.jpg](images/9781430249382_Fig11-09.jpg)


    [Figure 11-9](#9781430249382_Ch11.xhtml#_Fig9). An example of a production Job
    Library for the EM12c console


    EM Job Schema


    More than 70 JOB tables exist in the SYSMAN schema, but only a few are involved
    in the major components of the EM Job System and require a basic understanding.
    You can execute queries  against these tables for a more difinitive view of the
    EM Job environment. [Figure 11-10](#9781430249382_Ch11.xhtml#Fig10) shows two
    main tables, along with the relationships between objects.


    ![9781430249382_Fig11-10.jpg](images/9781430249382_Fig11-10.jpg)


    [Figure 11-10](#9781430249382_Ch11.xhtml#_Fig10). Note the columns for joining
    the most common objects in the EM Job System part of the SYSMAN schema


    The following example queries will report against job data. The MGMT_JOB table,
    which is often used in the upcoming queries, contains both the Job Library and
    the job_activity information, so this must be kept in mind when querying, as shown
    in [Figure 11-11](#9781430249382_Ch11.xhtml#Fig11). Often this data is essential
    if at any time the EM Job Activity or Job Library interface is unsuccessful at
    managing a job and the Enterprise Manager Command Line Interface (EMCLI) must
    be used.


    ```

    select  mj.job_owner, mj.job_name,

    decode(mj.is_library, 1, ''JOB_LIBRARY'', 0, ''JOB_ACTIVITY'')

    from sysman.mgmt_job mj

    order by mj.job_owner, mj_job_name;

    ```


    ![9781430249382_Fig11-11.jpg](images/9781430249382_Fig11-11.jpg)


    [Figure 11-11](#9781430249382_Ch11.xhtml#_Fig11). An example of backup job information
    for both the active jobs (submitted) and the jobs retained in the library


    The EMCLI can also be used to gather data regarding jobs in the environment. This
    utility has its own set of verbs (commands) that are invoked to query, execute,
    configure, deploy, and manage the Enterprise Manager from a command-line interface,
    often providing more-enhanced capabilities than the graphical interface of the
    EM console.


    As an example of this feature, we can query job data from the EMCLI by executing
    the following:


    ```

    emcli get_jobs


    REFRESH_MV_ORCL.MV_DEVA_PART.1                    SQLScript              416E2CE166724F53BCF3ECD798E1759B

    B16A12D945A1466C871B99E1A5226309

    2013-01-21 07:00:00  2013-01-21 07:02:22America/Chicago

    Succeeded  5    SYSJOB  oracle_database  ORCL5


    ORCL5_MFC_APP_REF.1                               SQLScript              F39C0BE9B9F74F758FFDA95392778CDF

    E088B023C23048E79768BC4FEC2888B3

    2013-01-20 06:00:00  2013-01-20 06:00:23

    America/Chicago

    Succeeded  5    SYSJOB  oracle_database  ORCL5

    ```


    The JOB_ID column is one of the most common columns to join on in this schema,
    as it identifies the job in question. In the preceding results, you can see that
    two jobs were returned that included the job name, job type, job ID, and target
    GUID, along with execution information, including times, time zone, and whether
    the job  successful.


    In the next example, MGMT_JOB_EXEC_SUMMARY is joined to the MGMT_JOB table to
    display the most recent history and verify the job status.


    ```

    select mj.job_name, mjes.start_time,  mjes.end_time,

    DECODE(mjes.status,

     1, ''SCHEDULED'', 2, ''RUNNING'', 3, ''FAILED INIT'',

     4, ''FAILED'', 5, ''SUCCEEDED'', 6, ''SUSPENDED'',

     7, ''AGENT DOWN'', 8, ''STOPPED'', 9, ''SUSPENDED/LOCK'',

     10, ''SUSPENDED/EVENT'', 11, ''SUSPENDED/BLACKOUT'',

     12, ''STOP PENDING'', 13, ''SUSPEND PENDING'', 14, ''INACTIVE'',

     15, ''QUEUED'', 16, ''FAILED/RETRIED'', 17, ''WAITING'', 18, ''SKIPPED'',status)
    "Execution STATUS"

    from sysman.mgmt_job mj, sysman.mgmt_job_exec_summary mjes

    where mj.job_id=mjes.job_id

    and mj.job_name =''BACKUP_EM12REP_000044''

    order by mjes.start_time desc;

    ```


    The output from this query will result in backup job information on the database
    repository. Both the current running job, along with the historical jobs information,
    can be seen in [Figure 11-12](#9781430249382_Ch11.xhtml#Fig12).


    ![9781430249382_Fig11-12.jpg](images/9781430249382_Fig11-12.jpg)


    [Figure 11-12](#9781430249382_Ch11.xhtml#_Fig12). Querying job status information


    We can then query the data from the last 24 hours that meets the following criteria:
    not requiring corrective action—is_corrective_action = 0, has a status of in standard
    job history—status IN (5,4,3,18,8), and has required—retried is not null.


    ```

    SELECT mjes.job_id, mj.job_name, mjes.retried

    FROM MGMT_JOB_EXEC_SUMMARY mjes, MGMT_JOB mj

    WHERE mjes.job_id = mj.job_id AND mj.is_corrective_action = 0

    AND mjes.status IN (5,4,3,18,8)

    AND  mjes.start_time > sysdate-1

    and mjes.retried is not null;

    ```


    ![9781430249382_Fig11-13.jpg](images/9781430249382_Fig11-13.jpg)


    Figure 11-13\. The results for jobs that have experienced at least one retry


    These basic queries offer examples of how to join the tables and how to report
    on the EM Job System from SQL*Plus. This data can then help you troubleshoot,
    or you can use this information at the EMCLI to address an issue or perform a
    task outside the EM console.


    Knowing who has the right to create and manage jobs is essential. Jobs should
    be owned by individual users, with preferred credentials set to this level to
    ensure accountability for the use of those credentials.


    By creating the EM12c administrator logins and setting them up securely, you can
    see who ran a job and who edited a job, ensuring that those creating, executing,
    and even deleting jobs are tracked effectively in the Enterprise Manager access
    log. As the user is not the repository owner (SYSMAN), this eliminates security
    issues that could arise by the extensive roles and grants given to this user by
    default in the EM12c environment.'
  trans: "\n# Enterprise Manager 作业管理\n\n## 作业操作说明\n\n| 操作 | 描述 |\n| --- | --- |\n\
    | 创建 | 创建一个操作系统或 SQL 脚本作业，以及其他类型的作业。 |\n| 编辑 | 更新现有作业，更改计划时间、间隔、参数等。 |\n| 类似创建\
    \ | 从现有作业创建一个新作业，可以选择编辑现有参数、计划等。（备份作业和某些其他维护作业可能不允许使用“类似创建”选项。） |\n| 删除 | 从 EM\
    \ 作业活动视图中移除单个计划/失败的作业，或移除该作业的所有实例。（任何库副本将被保留。） |\n| 挂起 | 将作业“挂起”直到恢复，使现有计划得以继续。\
    \ |\n| 恢复 | 恢复已挂起的作业计划。作业必须单独恢复。 |\n| 失败时重试 | 如果作业属于允许的作业类型列表，则重试该作业。 |\n\n##\
    \ 作业库\n\nEnterprise Manager 作业库允许提交作业到 EM 作业调度程序的存储库。此存储库包含管理员在备份和 EM 控制台处理之外创建的所有作业。该库仅保留已保存到其中的内容，并且必须与活动作业的更改保持同步。如果能有一个导出程序将当前作业的快照保存到库中，那将是非常有益的，但不幸的是目前并不存在。因此，务必将所有更改过的作业（包括简单的执行时间更改）从“作业活动”页面保存到库中。如果因任何原因必须参考库来重新创建作业，这将确保作业正确地重新提交到调度程序。\n\
    \n对于早期 10g 和 11g EM 作业的用户，没有将作业迁移到新 EM12c 环境的过程。此功能在新版 EM12c 中同样缺失，但 Oracle 计划在即将发布的版本中包含一个。此功能应具有多重好处，不仅适用于迁移，也作为升级的一部分、备份/恢复的次选方案以及复制的一部分。\n\
