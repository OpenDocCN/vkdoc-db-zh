    After you create the database, connect to it by using SQL*Plus, run the following
    commands, and then restart the database:


    ```

    ALTER SYSTEM SET pga_aggregate_target=1G SCOPE=SPFILE;

    ALTER SYSTEM SET shared_pool_size=600M SCOPE=SPFILE;

    ALTER SYSTEM SET job_queue_processes=20 SCOPE=SPFILE;

    ALTER SYSTEM SET log_buffer=10485760 SCOPE=SPFILE;

    ALTER SYSTEM SET open_cursors=300 SCOPE=SPFILE;

    ALTER SYSTEM SET processes=500 SCOPE=SPFILE;

    ALTER SYSTEM SET session_cached_cursors=200 SCOPE=SPFILE;

    EXEC dbms_auto_task_admin.disable(''auto optimizer stats collection'',null,null);

    ```


    Now that the management repository is ready, it’s time to install Oracle Enterprise
    Manager. You’ll do the rest of the operation on your second server named cloudcontrol12.testdomain.com.


    Installing Oracle Enterprise Manager 12c


    Enterprise Manager has two installation options: Simple and Advanced. When using
    advanced mode, it’s possible to select the preconfigured plug-ins, so that’s the
    mode used in this section.


    We highly recommend installing the oracle-validated package on the server that
    will host the Oracle Management Service. If you don’t install it, you will need
    to do a lot of manual configuration, including creating a user and setting kernel
    parameters. Despite using the oracle-validated or preinstall package, the Oracle
    Enterprise Manager Installation Wizard will check the prerequisites and can provide
    scripts to fix kernel parameters (and missing libraries) if it finds omissions.


    Creating the Oracle User and Groups


    If you didn’t install the oracle-validated package, you should create the ORACLE
    user manually. Log in as the ROOT user and issue the following commands:


    ```

    [root@cloudcontrol12 ∼]# groupadd oinstall

    [root@cloudcontrol12 ∼]# useradd -g oinstall oracle

    [root@cloudcontrol12 ∼]# passwd oracle

    ```


    After the last command, enter a password for the ORACLE user. As the ROOT user,
    you are allowed to choose any password, even one that doesn’t obey the password
    complexity rules. The system will warn if you do so, but will let you proceed.


    Creating Required Directories


    The Oracle base directory must have at least 5GB of free disk space. Log in as
    ROOT and enter commands similar to the following to create the recommended subdirectories
    and set the appropriate owner, group, and permissions on them:


    ```

    [root@cloudcontrol12 ∼]# mkdir -p /u01/app/

    [root@cloudcontrol12 ∼]# chown -R oracle:oinstall /u01/app/

    [root@cloudcontrol12 ∼]# chmod -R 775 /u01/app/

    ```


    Installing Oracle Enterprise Manager


    You can download the Enterprise Manager Cloud Control software from OTN. The software
    is available in zip files. Here’s the link for Oracle Enterprise Manager:


    ```

    www.oracle.com/technetwork/oem/enterprise-manager/overview/index.html

    ```


    After you download the installation files, copy them to a directory that the ORACLE
    user can access, and then switch to the ORACLE user and unzip them:


    ```

    [oracle@cloudcontrol12 ∼]$ unzip em12_linux64_disk1of2.zip -d cloudsetup

    [oracle@cloudcontrol12 ∼]$ unzip em12_linux64_disk2of2.zip -d cloudsetup

    ```


    Make sure that no environmental variable related to the database (ORACLE_HOME,
    ORACLE_SID, or ORACLE_BASE) is set prior to installation. Oracle also recommends
    to set umask to 022\. Change the directory to cloudsetup and run the installer:


    ```

    [oracle@cloudcontrol12 ∼]$ umask 022

    [oracle@cloudcontrol12 ∼]$ cd cloudsetup

    [oracle@cloudcontrol12 ∼]$ ./runInstaller

    ```


    When the Enterprise Manager installer starts, follow these steps:


    1.  For the My Oracle Support Details step, shown in [Figure 2-24](#9781430249382_Ch02.xhtml#Fig24),
    enter your credentials if you want to receive security updates. Then click Next.


