    \n[Figure 4-7](#9781430249382_Ch04.xhtml#_Fig7). Target Management menu bar\n\n\
    The following sections discuss the roles that each menu bar plays in your operation\
    \ of the Cloud Control product. Once you have established a clear understanding\
    \ of these roles, the location of any given feature should be clear, and the way\
    \ in which you interact with that feature should be consistent and effective.\n\
    \n![image](images/sq.jpg) **Note**  There are no documented names for these menu\
    \ bars in the Oracle documentation, so these terms are used throughout this chapter.\n\
    \nThe Cloud Control menu bar, located at the top-right side of the screen, is\
    \ used for managing Cloud Control itself. This menu bar contains a useful Help\
    \ menu and a short menu for personalizing system options for your administration\
    \ account. However, the primary menu is the Setup menu. You will use this menu\
    \ extensively to manage access and operation of the Enterprise Manager installation.\
    \ The Setup menu is divided into five sections, as shown in [Figure 4-8](#9781430249382_Ch04.xhtml#Fig8).\n\
    \n![9781430249382_Fig04-08.jpg](images/9781430249382_Fig04-08.jpg)\n\n[Figure\
    \ 4-8](#9781430249382_Ch04.xhtml#_Fig8). Setup menu\n\nThe Setup menu illustrates\
    \ some of the issues the application designers have had rationalizing and streamlining\
    \ the application, and we expect further work in this area as the product matures.\
    \ The menu does provide access to all of the system-wide features that you need\
    \ in order to set up and maintain the Enterprise Manager application in one location,\
    \ but there is no clear rationale for the location of some of these items. Rather\
    \ than running through the menu item by item, we will look at the uses of this\
    \ menu for the most common tasks that you will be required to carry out as an\
    \ administrator.\n\nThe administration tasks we will walk through are as follows:\n\
    \n*   Security management\n*   My Oracle Support integration\n*   Network proxy\
    \ configuration\n*   Configuration of notifications and alerts\n*   Controlling\
    \ management pack access\n\nWe do not cover incident management (see [Chapter\
    \ 12](#9781430249382_Ch12.xhtml) for that), or more-advanced features such as\
    \ product extensibility and the command-line interface. This chapter is intended\
    \ primarily to orient you to the basic layout of the console and the essential\
    \ operations you will initially perform.\n\n# Security Management\n\nStarting\
    \ with this release, Oracle has centralized a lot of the security management in\
    \ the product. To operate effectively, you will need to spend some time configuring\
    \ the credentials that you require. In particular, you will need to administer\
    \ the areas of security included in [Table 4-1](#9781430249382_Ch04.xhtml#Tab1).\n\
    \n[Table 4-1](#9781430249382_Ch04.xhtml#_Tab1). Securable Items Within Cloud Control\n\
    \n| Area | Purpose | Example |\n| --- | --- | --- |\n| Enterprise Manager administrator\
    \ | User access to EM | `SYSMAN` |\n| Enterprise Manager roles | Rights within\
    \ EM | `PUBLIC` |\n| Named credentials | Target access | `NC_DB_ORCL_SYS` |\n\
    | Preferred credentials | Target access | `NC_DB_ORCL_SYSTEM` |\n| Monitoring\
    \ credentials | Agent access to targets | `DBSNMP` |\n\nIn addition, you will\
    \ probably want to set up a privilege delegation scheme so that necessary rights\
    \ for administration are cascaded through a simple hierarchy of roles and rotation\
    \ of agent registration passwords. These items, however, are highly dependent\
    \ on the organization and security requirements of the enterprise for which you\
    \ work and so lie outside the scope of this book.\n\nThe core concept here is\
    \ that of named credentials. These preconfigured authentication credentials allow\
    \ users and administrators to access various managed targets in a secure fashion\
    \ without remembering a plethora of username/password combinations. The time you\
    \ spend setting these up will seem rather tedious, especially in a large environment,\
    \ but it is well worth it in terms of time saved in day-to-day operations and\
    \ in allowing end users appropriately privileged access without disclosing passwords.\
    \ You should set up the named credentials by using an account that is unlikely\
    \ to be removed. (For example, you could use `SYSMAN` to own all named credentials\
    \ and then grant access to named administrators.) This concept of a credential\
    \ set to which administrators have access is a big step forward in security and\
    \ will likely be welcomed by your internal security administrators. On the downside,\
    \ you are likely to end up having to walk them through this process and explain\
    \ access control, which is now more complicated than previously.\n\n![image](images/sq.jpg)\
    \ **Tip**  We strongly suggest that you implement a naming convention for credentials,\
    \ because you will have a lot of credentials to manage. One example is to use\
    \ `NC_<TARGETTYPE>_<TARGETNAME>_<USER>` to indicate the user and targets to which\
    \ the credentials apply. This works for an environment in which passwords differ\
    \ between targets, but your setup may vary.\n\nThe first security administration\
    \ task is to add administrator accounts. Once this is done, you can define and\
    \ assign roles and set up access.\n\n## Adding an Administrator\n\nThis section\
    \ outlines the process for adding a new administrator account. If you haven’t\
    \ yet created a dedicated administration account for yourself, you might want\
    \ to follow along with the following exercise.\n\nYou will need the items of information\
    \ shown in [Table 4-2](#9781430249382_Ch04.xhtml#Tab2). You may want to make a\
    \ table like this for your own use when adding administrators.\n\n[Table 4-2](#9781430249382_Ch04.xhtml#_Tab2).\
    \ New Administrator Details\n\n| Item | Purpose | Example |\n| --- | --- | ---\
    \ |\n| Username | Identify the user | `JOE_DBA` |\n| Password | For authentication\
    \ | `Welcome1` |\n| E-mail address | Mail for notifications | [joe.dba@lab.org](mailto:joe.dba@lab.org)\
    \ |\n\nFollow these steps to add a new administrator account:\n\n1.  To start\
    \ the wizard, choose Setup ![arrow](images/arrow.jpg) Security ![arrow](images/arrow.jpg)\
    \ Administrators. A screen displays, listing all the administration accounts on\
    \ the system. If this is the first administrator that you add, you’ll see the\
    \ page in [Figure 4-9](#9781430249382_Ch04.xhtml#Fig9).\n\n    ![9781430249382_Fig04-09.jpg](images/9781430249382_Fig04-09.jpg)\n\
    \n    [Figure 4-9](#9781430249382_Ch04.xhtml#_Fig9). Security Wizard\n\n2.  Click\
    \ the Create button. Then fill in the basic details about the administrator, as\
    \ shown in [Figure 4-10](#9781430249382_Ch04.xhtml#Fig10). (This is where your\
    \ table will come in handy.) Note that adding the e-mail address will automatically\
    \ create a 24×7 notification schedule. You will adjust this later.\n\n    ![9781430249382_Fig04-10.jpg](images/9781430249382_Fig04-10.jpg)\n\
    \n    [Figure 4-10](#9781430249382_Ch04.xhtml#_Fig10). Administrator details\n\
    \n3.  Click Next. Then select the Enterprise Manager roles that this administrator\
    \ will take. You will learn more about roles in the next section. For now, notice\
    \ that the range of roles is extensive and introduces role-based management for\
    \ a wide variety of administration tasks. In this example, just use the default\
    \ roles that come with the product (see [Figure 4-11](#9781430249382_Ch04.xhtml#Fig11)).\
    \ Each repository-based user that you create is actually a database account on\
    \ the repository database. You can manage profiles and resources by using the\
    \ built-in resource and profile management of the database."
  raw: '[Figure 4-5](#9781430249382_Ch04.xhtml#_Fig5). Cloud Control menu bar


    *   Navigation menu bar ([Figure 4-6](#9781430249382_Ch04.xhtml#Fig6))


    ![9781430249382_Fig04-06.jpg](images/9781430249382_Fig04-06.jpg)


    [Figure 4-6](#9781430249382_Ch04.xhtml#_Fig6). Navigation menu bar


    *   Target Management menu bar ([Figure 4-7](#9781430249382_Ch04.xhtml#Fig7))


    ![9781430249382_Fig04-07.jpg](images/9781430249382_Fig04-07.jpg)


    [Figure 4-7](#9781430249382_Ch04.xhtml#_Fig7). Target Management menu bar


    The following sections discuss the roles that each menu bar plays in your operation
    of the Cloud Control product. Once you have established a clear understanding
    of these roles, the location of any given feature should be clear, and the way
    in which you interact with that feature should be consistent and effective.


    ![image](images/sq.jpg) **Note**  There are no documented names for these menu
    bars in the Oracle documentation, so these terms are used throughout this chapter.


    Cloud Control Menu Bar


    The Cloud Control menu bar, located at the top-right side of the screen, is used
    for managing Cloud Control itself. This menu bar contains a useful Help menu and
    a short menu for personalizing system options for your administration account.
    However, the primary menu is the Setup menu. You will use this menu extensively
    to manage access and operation of the Enterprise Manager installation. The Setup
    menu is divided into five sections, as shown in [Figure 4-8](#9781430249382_Ch04.xhtml#Fig8).


    ![9781430249382_Fig04-08.jpg](images/9781430249382_Fig04-08.jpg)


    [Figure 4-8](#9781430249382_Ch04.xhtml#_Fig8). Setup menu


    The Setup menu illustrates some of the issues the application designers have had
    rationalizing and streamlining the application, and we expect further work in
    this area as the product matures. The menu does provide access to all of the system-wide
    features that you need in order to set up and maintain the Enterprise Manager
    application in one location, but there is no clear rationale for the location
    of some of these items. Rather than running through the menu item by item, we
    will look at the uses of this menu for the most common tasks that you will be
    required to carry out as an administrator.


    The administration tasks we will walk through are as follows:


    *   Security management

    *   My Oracle Support integration

    *   Network proxy configuration

    *   Configuration of notifications and alerts

    *   Controlling management pack access


    We do not cover incident management (see [Chapter 12](#9781430249382_Ch12.xhtml)
    for that), or more-advanced features such as product extensibility and the command-line
    interface. This chapter is intended primarily to orient you to the basic layout
    of the console and the essential operations you will initially perform.


    Security Management


    Starting with this release, Oracle has centralized a lot of the security management
    in the product. To operate effectively, you will need to spend some time configuring
    the credentials that you require. In particular, you will need to administer the
    areas of security included in [Table 4-1](#9781430249382_Ch04.xhtml#Tab1).


    [Table 4-1](#9781430249382_Ch04.xhtml#_Tab1). Securable Items Within Cloud Control


    | Area | Purpose | Example |

    | --- | --- | --- |

    | Enterprise Manager administrator | User access to EM | SYSMAN |

    | Enterprise Manager roles | Rights within EM | PUBLIC |

    | Named credentials | Target access | NC_DB_ORCL_SYS |

    | Preferred credentials | Target access | NC_DB_ORCL_SYSTEM |

    | Monitoring credentials | Agent access to targets | DBSNMP |


    In addition, you will probably want to set up a privilege delegation scheme so
    that necessary rights for administration are cascaded through a simple hierarchy
    of roles and rotation of agent registration passwords. These items, however, are
    highly dependent on the organization and security requirements of the enterprise
    for which you work and so lie outside the scope of this book.


    The core concept here is that of named credentials. These preconfigured authentication
    credentials allow users and administrators to access various managed targets in
    a secure fashion without remembering a plethora of username/password combinations.
    The time you spend setting these up will seem rather tedious, especially in a
    large environment, but it is well worth it in terms of time saved in day-to-day
    operations and in allowing end users appropriately privileged access without disclosing
    passwords. You should set up the named credentials by using an account that is
    unlikely to be removed. (For example, you could use SYSMAN to own all named credentials
    and then grant access to named administrators.) This concept of a credential set
    to which administrators have access is a big step forward in security and will
    likely be welcomed by your internal security administrators. On the downside,
    you are likely to end up having to walk them through this process and explain
    access control, which is now more complicated than previously.


    ![image](images/sq.jpg) **Tip**  We strongly suggest that you implement a naming
    convention for credentials, because you will have a lot of credentials to manage.
    One example is to use NC_<TARGETTYPE>_<TARGETNAME>_<USER> to indicate the user
    and targets to which the credentials apply. This works for an environment in which
    passwords differ between targets, but your setup may vary.


    The first security administration task is to add administrator accounts. Once
    this is done, you can define and assign roles and set up access.


    Adding an Administrator


    This section outlines the process for adding a new administrator account.  If
    you haven’t yet created a dedicated administration account for yourself, you might
    want to follow along with the following exercise.


    You will need the items of information shown in [Table 4-2](#9781430249382_Ch04.xhtml#Tab2).
    You may want to make a table like this for your own use when adding administrators.


    [Table 4-2](#9781430249382_Ch04.xhtml#_Tab2). New Administrator Details


    | Item | Purpose | Example |

    | --- | --- | --- |

    | Username | Identify the user | JOE_DBA |

    | Password | For authentication | Welcome1 |

    | E-mail address | Mail for notifications | [joe.dba@lab.org](mailto:joe.dba@lab.org)
    |


    Follow these steps to add a new administrator account:


    1.  To start the wizard, choose Setup ![arrow](images/arrow.jpg) Security ![arrow](images/arrow.jpg)
    Administrators. A screen displays, listing all the administration accounts on
    the system. If this is the first administrator that you add, you’ll see the page
    in [Figure 4-9](#9781430249382_Ch04.xhtml#Fig9).


    ![9781430249382_Fig04-09.jpg](images/9781430249382_Fig04-09.jpg)


    [Figure 4-9](#9781430249382_Ch04.xhtml#_Fig9). Security Wizard


    2.  Click the Create button. Then fill in the basic details about the administrator,
    as shown in [Figure 4-10](#9781430249382_Ch04.xhtml#Fig10). (This is where your
    table will come in handy.) Note that adding the e-mail address will automatically
    create a 24×7 notification schedule. You will adjust this later.


    ![9781430249382_Fig04-10.jpg](images/9781430249382_Fig04-10.jpg)


    [Figure 4-10](#9781430249382_Ch04.xhtml#_Fig10). Administrator details


    3.  Click Next. Then select the Enterprise Manager roles that this administrator
    will take. You will learn more about roles in the next section. For now, notice
    that the range of roles is extensive and introduces role-based management for
    a wide variety of administration tasks. In this example, just use the default
    roles that come with the product (see [Figure 4-11](#9781430249382_Ch04.xhtml#Fig11)).
    Each repository-based user that you create is actually a database account on the
    repository database. You can manage profiles and resources by using the built-in
    resource and profile management of the database.'
  trans: "\n# 云控制菜单栏\n\n*   导航菜单栏 (图 4-6)\n\n![9781430249382_Fig04-06.jpg](img/9781430249382_Fig04-06.jpg)\n\
    \n图 4-6. 导航菜单栏\n\n*   目标管理菜单栏 (图 4-7)\n\n![9781430249382_Fig04-07.jpg](img/9781430249382_Fig04-07.jpg)\n\
    \n图 4-7. 目标管理菜单栏\n\n以下部分将讨论每个菜单栏在您操作云控制产品时所扮演的角色。一旦您对这些角色有了清晰的理解，任何给定功能的位置应该就很明确了，而且您与该功能交互的方式也将是一致且高效的。\n\
    \n![image](img/sq.jpg) **注意** 在 Oracle 文档中没有为这些菜单栏记录官方名称，因此本章将统一使用这些术语。\n\n云控制菜单位于屏幕右上角，用于管理云控制本身。此菜单包含一个实用的“帮助”菜单和一个用于为您的管理账户个性化系统选项的简短菜单。然而，主要的菜单是“设置”菜单。您将广泛使用此菜单来管理企业管理员安装的访问和操作。“设置”菜单分为五个部分，如\
    \ 图 4-8 所示。\n\n![9781430249382_Fig04-08.jpg](img/9781430249382_Fig04-08.jpg)\n\
    \n图 4-8. 设置菜单\n\n“设置”菜单体现了应用程序设计者在合理化和精简应用程序方面所面临的一些问题，我们预计随着产品的成熟，这方面还会有进一步的工作。该菜单确实为您提供了一个集中位置来访问设置和维护企业管理员应用程序所需的所有系统范围功能，但对于某些项目的位置，却没有清晰的依据。我们将不会逐项介绍菜单，而是着眼于此菜单在您作为管理员需要执行的最常见任务中的用途。\n\
    \n我们将要完成的管理任务如下：\n\n*   安全管理\n*   我的 Oracle 支持集成\n*   网络代理配置\n*   通知和警报配置\n* \
    \  控制管理包访问\n\n我们不涵盖事件管理（详见第 12 章），也不涵盖更高级的功能，如产品可扩展性和命令行界面。本章主要旨在让您熟悉控制台的基本布局以及您最初将执行的基本操作。\n\
    \n# 安全管理\n\n从这个版本开始，Oracle 将产品中的大量安全管理集中化了。为了有效操作，您将需要花时间配置所需的凭证。特别是，您将需要管理 表\
    \ 4-1 中包含的安全领域。\n\n表 4-1. 云控制中的可保护项\n\n| 领域 | 目的 | 示例 |\n| --- | --- | --- |\n\
    | 企业管理员用户 | 用户访问 EM | `SYSMAN` |\n| 企业管理员角色 | EM 内的权限 | `PUBLIC` |\n| 命名凭证 | 目标访问\
    \ | `NC_DB_ORCL_SYS` |\n| 首选凭证 | 目标访问 | `NC_DB_ORCL_SYSTEM` |\n| 监视凭证 | 代理访问目标\
    \ | `DBSNMP` |\n\n此外，您可能希望设置一个权限委托方案，以便管理所需权限通过简单的角色层级和代理注册密码轮换进行传递。然而，这些项目高度依赖于您所服务企业的组织和安全要求，因此超出了本书的范围。\n\
    \n这里的核心概念是“命名凭证”。这些预配置的身份验证凭证允许用户和管理员以安全的方式访问各种受管目标，而无需记住大量的用户名/密码组合。设置这些凭证所花费的时间可能会显得相当繁琐，尤其是在大型环境中，但就节省日常操作时间以及允许最终用户在无需透露密码的情况下获得适当权限访问而言，这是非常值得的。您应使用一个不太可能被删除的账户来设置命名凭证。（例如，您可以使用\
    \ `SYSMAN` 来拥有所有命名凭证，然后授予命名的管理员访问权限。）这种管理员可以访问的凭证集的概念是安全方面的一大进步，很可能会受到您内部安全管理员的欢迎。不利的一面是，您最终可能需要引导他们完成此过程并解释访问控制，这现在比以前更复杂了。\n\
    \n![image](img/sq.jpg) **提示** 我们强烈建议您为凭证实施命名约定，因为您将有许多凭证需要管理。一个例子是使用 `NC_<目标类型>_<目标名称>_<用户>`\
    \ 来指示凭证适用的用户和目标。这适用于目标间密码不同的环境，但您的设置可能有所不同。\n\n第一个安全管理任务是添加管理员账户。完成此操作后，您可以定义和分配角色并设置访问权限。\n\
    \n## 添加管理员\n\n本节概述了添加新管理员账户的过程。如果您尚未为自己创建专用的管理账户，您可能希望跟随以下练习操作。\n\n您将需要 表 4-2\
    \ 中所示的信息项。在添加管理员时，您可能需要为自己制作一个类似的表格。\n\n表 4-2. 新管理员详细信息\n\n| 项目 | 目的 | 示例 |\n\
    | --- | --- | --- |\n| 用户名 | 标识用户 | `JOE_DBA` |\n| 密码 | 用于身份验证 | `Welcome1` |\n\
    | 电子邮件地址 | 接收通知的邮件 | joe.dba@lab.org |\n\n请按照以下步骤添加新的管理员账户：\n\n1.  要启动向导，请选择 设置\
    \ ![arrow](img/arrow.jpg) 安全 ![arrow](img/arrow.jpg) 管理员。将显示一个屏幕，列出系统上的所有管理账户。如果这是您添加的第一个管理员，您将看到如\
    \ 图 4-9 所示的页面。\n\n    ![9781430249382_Fig04-09.jpg](img/9781430249382_Fig04-09.jpg)\n\
    \n    图 4-9. 安全向导\n\n2.  点击“创建”按钮。然后填写管理员的基本详细信息，如 图 4-10 所示。（这时您的表格就派上用场了。）请注意，添加电子邮件地址将自动创建一个\
    \ 24×7 的通知计划。您稍后可以调整此设置。\n\n    ![9781430249382_Fig04-10.jpg](img/9781430249382_Fig04-10.jpg)\n\
    \n    图 4-10. 管理员详细信息\n\n3.  点击“下一步”。然后选择此管理员将担任的企业管理员角色。您将在下一节中了解更多关于角色的信息。现在，请注意角色的范围非常广泛，并为各种管理任务引入了基于角色的管理。在此示例中，只需使用产品附带的默认角色（参见\
    \ 图 4-11）。您创建的每个基于库的用户实际上都是库数据库上的一个数据库账户。您可以使用数据库的内置资源和配置文件管理来管理配置文件和资源。\n"
- fmt: '# 创建管理员角色与配置支持集成


    ![image](images/sq.jpg) **提示** 至少，我们建议利用数据库的密码复杂度和过期选项，以确保您的 EM 管理员帐户遵循公司策略。


    ![9781430249382_Fig04-11.jpg](images/9781430249382_Fig04-11.jpg)


    [图 4-11](#9781430249382_Ch04.xhtml#_Fig11). 添加角色


    4.  现在，单击 **Next**。您将看到如[图 4-12](#9781430249382_Ch04.xhtml#Fig12)所示的屏幕，您可以在其中为用户分配权限，包括跨整个企业的权限以及针对特定目标的权限。


    ![9781430249382_Fig04-12.jpg](images/9781430249382_Fig04-12.jpg)


    [图 4-12](#9781430249382_Ch04.xhtml#_Fig12). 目标权限分配


    5.  单击 **Next**。如[图 4-13](#9781430249382_Ch04.xhtml#Fig13)所示的配置屏幕为您呈现了管理员可以管理的各种
    Enterprise Manager 资源类型。例如，您可以确保管理员可以查看和编辑用于在企业范围内部署补丁的修补计划。


    ![9781430249382_Fig04-13.jpg](images/9781430249382_Fig04-13.jpg)


    [图 4-13](#9781430249382_Ch04.xhtml#_Fig13). 资源分配


    6.  单击 **Next**。在接下来的屏幕上，复查管理员创建信息。然后单击 **Finish**。


    ## 创建角色进行访问控制


    一旦您正确设置了管理员帐户并测试了用户自身的登录访问权限，您就应该使用 Enterprise Manager 角色来配置基于角色的访问控制。在**角色管理**主页上，您将看到内置的
    EM12c 角色以及您可以执行的各种管理操作。


    **角色**是在目标和 Enterprise Manager 功能上的一组已命名的权限集合。因此，角色可以定义，例如，管理特定目标类型所需的权限，或执行 Enterprise
    Manager 操作（如请求新的自助数据库）所需的权限。此外，角色可以包含其他角色。因此，角色设计是任何有效 Cloud Control 部署的核心部分，但将取决于您企业的具体情况。


    您将通过创建一个数据库管理员角色来逐步完成示例，该角色将拥有适合该工作角色的权限。您可以在接下来的练习中跟随操作。如您将看到的，向导按以下顺序分配权限：角色、目标、资源。


    ![image](images/sq.jpg) **提示** 通常，请尝试定义与您组织中的工作角色或任务相匹配的角色。此外，使用适当的命名约定——例如，您可以使用定义操作系统安全性的
    LDAP 目录组名称。


    要创建您的**数据库管理员**角色，请执行以下步骤：


    1.  在**角色管理**页面上，单击 **Create**。[图 4-14](#9781430249382_Ch04.xhtml#Fig14)中所示的向导出现。避免跳过添加描述的诱惑。一个有用的描述对于未来的管理员将大有帮助，该描述应说明角色中包含的权限以及其设计的业务目的。


    ![9781430249382_Fig04-14.jpg](images/9781430249382_Fig04-14.jpg)


    [图 4-14](#9781430249382_Ch04.xhtml#_Fig14). 角色创建向导 — 步骤 1


    2.  单击 **Next**。然后添加您需要的 EM12c 角色。在此示例中，您添加发现操作员角色，以及允许全面管理补丁生命周期的补丁管理员角色（参见[图
    4-15](#9781430249382_Ch04.xhtml#Fig15)）。


    ![9781430249382_Fig04-15.jpg](images/9781430249382_Fig04-15.jpg)


    [图 4-15](#9781430249382_Ch04.xhtml#_Fig15). 角色创建向导 — 步骤 2


    3.  单击 **Next**。资源管理权限分配屏幕打开。此屏幕的关键部分如[图 4-16](#9781430249382_Ch04.xhtml#Fig16)所示，位于最右侧，标记为
    **Manage Privilege Grants**。单击每个权限类别的铅笔图标并单独分配权限。在这种情况下，添加**目标发现框架**下的所有权限，以允许您的
    DBA 管理目标发现。


    ![9781430249382_Fig04-16.jpg](images/9781430249382_Fig04-16.jpg)


    [图 4-16](#9781430249382_Ch04.xhtml#_Fig16). 角色创建向导 — 步骤 3


    4.  最后，将任何现有用户添加到该角色。在此示例中，添加 `Joe_DBA`。要进行分配，请将管理员从左侧列表框移动到右侧列表框，如[图 4-17](#9781430249382_Ch04.xhtml#Fig17)所示。单击
    **Next** 以继续向导。


    ![9781430249382_Fig04-17.jpg](images/9781430249382_Fig04-17.jpg)


    [图 4-17](#9781430249382_Ch04.xhtml#_Fig17). 角色创建向导 — 步骤 4


    5.  最后，单击 **Review**，然后单击 **Finish**，您就创建了新角色。


    ![image](images/sq.jpg) **注意** Oracle 提供了 `PUBLIC` 角色，专门用于适合所有 EM 安装用户的定制。


    ## 配置支持集成


    Enterprise Manager 与 **My Oracle Support** 网站紧密集成，该网站面向所有拥有支持合同的客户开放。然而，不设置此集成的客户站点并不少见。这是一个重大错误。幸运的是，Cloud
    Control 菜单栏使所需任务变得简单明了。


    配置与 **My Oracle Support** 的集成可提供以下关键优势，使您支持 Oracle 的工作变得更加轻松：


    *   增强的事件和问题报告

    *   从 Enterprise Manager 内部访问支持知识库

    *   补丁生命周期管理


    支持集成需要设置以下内容：从 OMS 访问 **My Oracle Support** 网站的权限、代理配置以及 **My Oracle Support**
    凭证。此外，您可以通过将受管目标链接到该 CSI 的管理员帐户，有选择地将受管目标分配给不同的客户支持标识符（CSI）。


    ### 代理配置


    在大多数组织中，从公司网络访问互联网是通过使用代理服务器来控制的。该服务器旨在充当促进和控制对互联网资源访问的中介。在这种情况下，您需要访问的资源是 **My
    Oracle Support** Web 门户以及提供 Oracle 客户作为支持合同一部分可请求的服务的各种 Oracle 和第三方服务器。在本节中，您将逐步完成代理配置。如果您的组织有一个通过
    Microsoft Active Directory 域自动对用户进行身份验证的代理服务器，您可能需要阅读即将介绍的“使用 NTLMAPS 代理”部分作为解决方法。


    ### 配置代理服务器访问


    请完成以下步骤来配置代理服务器：


    1.  从 **Setup** 菜单中选择 `Proxy Settings`。出现如[图 4-18](#9781430249382_Ch04.xhtml#Fig18)所示的屏幕。


    ![9781430249382_Fig04-18.jpg](images/9781430249382_Fig04-18.jpg)


    [图 4-18](#9781430249382_Ch04.xhtml#_Fig18). 代理详细信息


    2.  输入您的代理服务器详细信息，或者输入您配置为替代方案的 NTLMAPS 代理详细信息，以及任何必要的身份验证。使用 `Test` 按钮测试对 `updates.oracle.com`
    的访问。

    3.  您可能还希望确保代理**不**用于代理到 OMS 的通信。为此，请选择页面底部的 **No Proxy** 选项，如[图 4-19](#9781430249382_Ch04.xhtml#Fig19)所示。


    ![9781430249382_Fig04-19.jpg](images/9781430249382_Fig04-19.jpg)


    [图 4-19](#9781430249382_Ch04.xhtml#_Fig19). 将代理排除在代理访问之外


    4.  最后一步是配置 MOS 凭证。这可以并且应该为 `SYSMAN` 完成，也许使用组织拥有的通用帐户（例如 `em@lab.org`）。这可以通过使用[图
    4-20](#9781430249382_Ch04.xhtml#Fig20)所示的 `Set Credentials` 菜单选项来完成。


    ![9781430249382_Fig04-20.jpg](images/9781430249382_Fig04-20.jpg)


    [图 4-20](#9781430249382_Ch04.xhtml#_Fig20). 配置 My Oracle Support 凭证'
  raw: '![image](images/sq.jpg) **Tip**  At the very least, we suggest utilizing the
    password complexity and expiration options of the database to ensure that your
    EM administrator accounts follow your corporate policies.


    ![9781430249382_Fig04-11.jpg](images/9781430249382_Fig04-11.jpg)


    [Figure 4-11](#9781430249382_Ch04.xhtml#_Fig11). Adding roles


    4.  For now, click Next. You are presented with the screen in [Figure 4-12](#9781430249382_Ch04.xhtml#Fig12),
    in which you can assign privileges for the user, both across the enterprise and
    to specific targets.


    ![9781430249382_Fig04-12.jpg](images/9781430249382_Fig04-12.jpg)


    [Figure 4-12](#9781430249382_Ch04.xhtml#_Fig12). Target privilege assignment


    5.  Click Next. The configuration screen shown in [Figure 4-13](#9781430249382_Ch04.xhtml#Fig13)presents
    you with the various Enterprise Manager Resource types that the administrator
    can manage. For example, you can ensure that the administrator can view and edit
    patching plans for deploying patches across the enterprise.


    ![9781430249382_Fig04-13.jpg](images/9781430249382_Fig04-13.jpg)


    [Figure 4-13](#9781430249382_Ch04.xhtml#_Fig13). Resource allocation


    6.  Click Next. On the following screen, review the administrator creation. Then
    click Finish.


    Creating a Role for Access Control


    Once you have your administrator accounts set up correctly and have tested login
    access for the users themselves, you should use Enterprise Manager roles to configure
    role-based access control. On the Role Management home page, you will see the
    built-in EM12c roles and the various management operations that you can carry
    out.


    A *role* is a named set of privileges, both on targets and on Enterprise Manager
    functionality. Thus, a role could define, for example, the rights necessary to
    manage a particular target type, or to perform an Enterprise Manager operation
    such as requesting a new self-service database. In addition, roles can contain
    other roles. Role design is, therefore, a core part of any effective Cloud Control
    deployment, but will be dependent on the specifics of your enterprise.


    You will walk through an example by creating a database administrator role that
    will have rights appropriate for this job role. You can follow along in the next
    exercise. As you will see, the wizard allocates privileges in the following order:
    Roles, Target, Resource.


    ![image](images/sq.jpg) **Tip**  In general, try to define roles that match job
    roles or tasks in your organization. In addition, use an appropriate naming convention—for
    example, you might use the LDAP directory group names that define your operating
    system security.


    To create your Database Administrator role, perform the following steps:


    1.  On the Role Management page, click Create. The wizard in [Figure 4-14](#9781430249382_Ch04.xhtml#Fig14)
    appears. Avoid the temptation to skip adding a description. Future administrators
    will be greatly aided by a useful description that indicates the privileges wrapped
    up in the role as well as the business purpose for which it was designed.


    ![9781430249382_Fig04-14.jpg](images/9781430249382_Fig04-14.jpg)


    [Figure 4-14](#9781430249382_Ch04.xhtml#_Fig14). Role Creation Wizard—step 1


    2.  Click Next. Then add the EM12c roles that you require. In this example, you
    add the discovery operator roles, as well as the patch administrator role that
    allows full administration of the patch lifecycle (see [Figure 4-15](#9781430249382_Ch04.xhtml#Fig15)).


    ![9781430249382_Fig04-15.jpg](images/9781430249382_Fig04-15.jpg)


    [Figure 4-15](#9781430249382_Ch04.xhtml#_Fig15). Role Creation Wizard—step 2


    3.  Click Next. The resource management right allocations screen opens. The critical
    section of this screen, shown in [Figure 4-16](#9781430249382_Ch04.xhtml#Fig16),
    is on the far right and is labeled Manage Privilege Grants. Click the pencil icon
    for each category of privilege and assign rights individually. In this case, add
    all rights under the Target Discovery Framework to allow your DBA to manage target
    discovery.


    ![9781430249382_Fig04-16.jpg](images/9781430249382_Fig04-16.jpg)


    [Figure 4-16](#9781430249382_Ch04.xhtml#_Fig16). Role Creation Wizard—step 3


    4.  Finally, you add any existing users to the role. In this case, add Joe_DBA.
    To make the assignment, move the administrators from the left-hand to the right-hand
    list box, as illustrated in [Figure 4-17](#9781430249382_Ch04.xhtml#Fig17). Click
    Next to move through the wizard.


    ![9781430249382_Fig04-17.jpg](images/9781430249382_Fig04-17.jpg)


    [Figure 4-17](#9781430249382_Ch04.xhtml#_Fig17). Role Creation Wizard—step 4


    5.  Finally, click Review and then Finish, and you have created your new role.


    ![image](images/sq.jpg) **Note**  Oracle provides the PUBLIC role specifically
    for customization suitable for all users of the EM installation.


    Configuration of Support Integration


    Enterprise Manager is closely integrated with the My Oracle Support site available
    to all customers with a support contract. It isn’t uncommon to find customer sites
    that do not set up this integration, however. This is a significant mistake. Fortunately,
    the Cloud Control menu bar makes the required tasks straightforward.


    Configuring integration with My Oracle Support offers the following key advantages
    that will make your life supporting Oracle significantly easier:


    *   Enhanced incident and problem reporting

    *   Access to the support knowledge base from within Enterprise Manager

    *   Patch lifecycle management


    Integration with support requires the following to be set up, access from the
    OMS to the My Oracle Support site, proxy configuration, and My Oracle Support
    credentials. In addition, you can optionally assign managed targets to different
    customer support identifiers (CSIs) by linking them to an administrator account
    for that CSI.


    Proxy Configuration


    In most organizations, access to the Internet from the corporate network is controlled
    by the use of a proxy server. This server is designed as an intermediary to both
    facilitate and control access to resources on the Internet. In this case, the
    resources you require access to are the My Oracle Support web portal and the various
    Oracle and third-party servers that provide services that Oracle customers can
    request as part of a support contract. In this section, you will walk through
    a proxy configuration. If your organization has a proxy server that automatically
    authenticates users via a Microsoft Active Directory domain, you will probably
    want to read the upcoming section “Using the NTLMAPS Proxy” as a workaround.


    Configuring Proxy Server Access


    Complete the following steps to configure the proxy server:


    1.  Select Proxy Settings from the Setup menu. The screen in [Figure 4-18](#9781430249382_Ch04.xhtml#Fig18)
    appears.


    ![9781430249382_Fig04-18.jpg](images/9781430249382_Fig04-18.jpg)


    [Figure 4-18](#9781430249382_Ch04.xhtml#_Fig18). Proxy details


    2.  Enter the details of your proxy server, or the NTLMAPS proxy you have configured
    as an alternative, together with any necessary authentication. Test access to
    updates.oracle.com using the Test button.

    3.  You will also likely want to ensure that Agent to OMS communication *doesn’t*
    use the proxy. To do this, choose the No Proxy option at the bottom of the page,
    as shown in [Figure 4-19](#9781430249382_Ch04.xhtml#Fig19).


    ![9781430249382_Fig04-19.jpg](images/9781430249382_Fig04-19.jpg)


    [Figure 4-19](#9781430249382_Ch04.xhtml#_Fig19). Excluding agents from proxy access


    4.  The final step is to configure MOS credentials. This can and should be done
    for SYSMAN, perhaps using a generic account owned by the organization (for example,
    [em@lab.org](mailto:em@lab.org) ). This can be done by using the Set Credentials
    menu option shown in [Figure 4-20](#9781430249382_Ch04.xhtml#Fig20).


    ![9781430249382_Fig04-20.jpg](images/9781430249382_Fig04-20.jpg)


    [Figure 4-20](#9781430249382_Ch04.xhtml#_Fig20). Configuring My Oracle Support
    credentials'
