    [Figure 3-8](#9781430249382_Ch03.xhtml#_Fig8). The Agent menu from the agent home
    page


    Using the EM Agent Browser


    The EM agent browser is another graphical user interface (GUI) that was developed
    several releases ago to access the agent while the OMS was being built. It was
    disabled by default in versions 10g and 11g, but seems to be available again in
    12c. Whether that continues to be the case remains to be seen. Nevertheless, it
    can be very useful to you if your agent is stuck in a pending state (though that
    can also be cleared via the console) or if some metrics are not being collected.


    To reach the agent browser, you use a URL of the form [https://<agent_host_name>:<agent_port_number>/emd/browser/main](https://%3Cagent_host_name%3E:%3Cagent_port_number%3E/emd/browser/main)
    (for example,  [https://em12c.acme.com:3872/emd/browser](https://em12c.acme.com:3872/emd/browser)
    ). You are then prompted for a user ID and password, either for the agent owner
    or root (in a Unix environment). That brings up a screen like that shown in [Figure
    3-9](#9781430249382_Ch03.xhtml#Fig9).


    ![9781430249382_Fig03-09.jpg](images/9781430249382_Fig03-09.jpg)


    [Figure 3-9](#9781430249382_Ch03.xhtml#_Fig9). The Agent browser


    Many of the emctl commands described in the upcoming section “The EMCTL Utility”
    are available via this browser interface as well. One of the more interesting
    ones is the command to take a system state dump for the agent, which can be particularly
    useful in debugging the status of a problematic agent. To take a system state
    dump, you simply click the link System State Dumps, as shown in [Figure 3-9](#9781430249382_Ch03.xhtml#Fig9),
    and then click Perform System Dump in the window that opens. Be aware that this
    may take some time to generate, and it also generates quite a large XML file,
    which for space reasons is not shown here.


    Agent Management with the Command Line


    Of course, all the areas you just looked at are available from the command line
    as well. Enterprise Manager has two command-line interfaces:  EMCTL and EMCLI.
    Let’s look at each in turn.


    The EMCTL Utility


    The Enterprise Manager Control utility (EMCTL) is mainly used—surprise, surprise!—for
    control of the different parts of the EM infrastructure. Because this section
    is about the management agent, discussion is restricted here to functions used
    with the agent. You’ll need to ensure that you’re using EMCTL from the agent home
    page to use these commands. Use emctl getemhome to validate this, because it can
    be easy to get confused about which emctl you are using!


    Many of the emctl commands remain unchanged from previous releases. Just for completeness,
    though, [Table 3-1](#9781430249382_Ch03.xhtml#Tab1) shows a list of the more frequently
    used emctl commands for management agents.


    [Table 3-1](#9781430249382_Ch03.xhtml#_Tab1). emctl Commands


    | Command | Description |

    | --- | --- |

    | emctl clearstate | Clears the state directory contents. Files located under
    $ORACLE_HOME/sysman/emd/state will be deleted by this command. |

    | emctl clearsudoprops | Clears the sudo properties for the agent. |

    | emctl config [agent] listtargets [<EM loc>] | Lists all targets present in targets.xml.
    |

    | emctl config agent getSupportedTZ | Shows the supported time zone based on the
    setting in the environment. |

    | emctl config agent getTZ | Shows the current time zone set in the environment.
    |

    | emctl control agent runCollection <target_name>:<target_type> <metric_name>
    | Manually runs the collections for a particular metric of a target. |

    | emctl deploy agent [-s <install-password>] [-o <omshostname:consoleSrvPort>]
    [-S] <deploy-dir> <deploy-hostname>:<port> <source-hostname> | Creates and deploys
    only the agent. |

    | emctl dumpstate agent <component> . . . | Generates dumps for the agent, allowing
    you to analyze CPU or memory issues for the agent. |

    | emctl gensudoprops | Generates the sudo properties of the agent. |

    | emctl getemhome | Prints the agent home directory. |

    | emctl getversion agent | Prints the version of the agent. |

    | emctl listplugins agent | Lists plug-ins deployed on the agent, their versions,
    and installation directories. |

    | emctl pingOMS [agent] | Pings the OMS to check whether the agent is able to
    reach the OMS, and waits for the reverse ping from the OMS so that the agent can
    say the pingOMS is successful. |

    | emctl reload agent dynamicproperties [<Target_name>:<Target_Type>]... | Recomputes
    and generates dynamic properties for a specified target and generates the dynamic
    properties for the target. |

    | emctl resetTZ agent | Resets the time zone of the agent. You need to do the
    following: 1. Stop the agent first. 2\. Run this command to change the current
    time zone to a different time zone. 3\. Restart the agent. |

    | emctl secure agent [registration password] | Secures the agent against an OMS.
    This will prompt for the registration password. |

    | emctl start agent | Starts the management agent. |

    | emctl start blackout <Blackoutname> [-nodeLevel] [<Target_name>[:<Target_Type>]]....
    [-d <Duration>] | Starts blackout on a target. |

    | emctl status agent | Shows the status of the agent. |

    | emctl status agent cpu [-depth n &#124; -full_cpu_report] | Provides CPU statistics
    (either a top-n listing using depth or full details). Requires topMetricReporter=true
    to be set in emd.properties. |

    | emctl status agent dbconnections | Shows the contents of the DBConnection Cache.
    |

    | emctl status agent jobs | Shows the status of the jobs that are currently running.
    |

    | emctl status agent mcache <target name>,<target type>,<metric> | Shows the metric
    names that have values in the metric cache. |

    | emctl status agent scheduler | Shows all scheduled, ready, or running collection
    threads. |

    | emctl status agent -secure | Shows whether the agent is running in secure mode,
    as well as the security of the OMS it is reporting to. |

    | emctl status agent target <target name>,<target type>,<metric> | Shows detailed
    status of the specific targets in the order of target name, target type. |

    | emctl status blackout [<Target_name>[:<Target_Type>]].... | Provides the status
    of the blackout of the target. |

    | emctl stop agent | Stops the management agent. |

    | emctl stop blackout <Blackoutname> | Stops the blackout that was started on
    a particular target. Only blackouts that are started by the EMCTL tool can be
    stopped using EMCTL. |

    | emctl unsecure agent | Unsecures the agent. Generally, this isn’t a recommended
    practice. |

    | emctl verifykey | Verifies the communication between the OMS and agent by sending
    pingOMS. |'
