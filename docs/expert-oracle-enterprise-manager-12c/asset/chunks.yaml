    *   *Deployments*: A new EM12c feature, this job is deployed from the EM console
    to targets for monitoring and configuration.

    *   *Discovery of Specific Oracle Components*: Jobs are also scheduled to discover
    Oracle components on designated Oracle targets through the EM console. This autodiscovery
    saves time and effort by dynamically pulling configuration and target information
    directly from the server to ensure correct configuration of any target.

    *   *Log Rotation*: Logs, trace files, and Enterprise Manager logs can become
    difficult to manage if they become too large. This job type can be created in
    the EM Jobs interface to manage many of the database logs that you access and
    monitor on a regular basis.

    *   *OPatch Updates*: Another new job type to EM12c, automated OPatch updates
    ensure that you have the latest version of the OPatch utility installed on each
    target monitored through the EM12c environment.

    *   *OS Commands*:  This job type allows you to migrate existing OS scripts from
    a cron scheduler or other OS-level scheduler and into a single scheduler within
    the Enterprise Manager console. By migrating to the EM Jobs interface, there is
    no further need to manage through a second scheduler in times of EM blackouts,
    as all can be managed through a single interface.

    *   *RMAN*:  All Recovery Manager jobs, although created through the RMAN interface
    in the EM console, will show as scheduled jobs in the Job Activity interface.
    These job types are unable to be saved to the library and have limited editing
    capabilities in the Job Activity interface.

    *   *Security*: This job type involves the security interface accessed from the
    Setup ![arrow](images/arrow.jpg) Security section in the EM console. These jobs
    include those for administrators, roles, credentials, and audit data.

    *   *SQL Scripts*: The most common job type involving EM jobs, this allows you
    to execute SQL, procedures, and any other taskthat would be performed from a SQL*Plus
    session.

    *   *Multitask Jobs*: For jobs that have multiple steps required to complete a
    process, this is a new feature in EM12c. In the past, you had to script out complex,
    multistep processes. Now, the EM12c Jobs interface makes it simple to create jobs
    with multiple steps, including those with logic requests of success on each step.


    It is simple enough to locate the common and new job types that are supported
    by the EM12c Jobs Service. The following query shows not just the job types supported,
    but also the job type ID that is used for EMCLI execution.


    ```

    select * from sysman.MGMT_JOB_TYPE_INFO

    where job_type_category=0

    and editable=1

    and agent_bound=1

    and job_type not like ''%Obsolete%''

    and job_type_default is not null;

    ```


    [Figure 11-23](#9781430249382_Ch11.xhtml#Fig23) shows the query results, with
