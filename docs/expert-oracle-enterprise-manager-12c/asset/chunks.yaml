    ## Oracle Management Service Recovery\n\n恢复OMS需要恢复软件主目录（Fusion Middleware）和实例主目录（gc_inst）。软件主目录可以从文件系统备份恢复，或使用Enterprise\
    \ Manager Cloud Control 12c安装程序在相同或不同主机上使用“仅安装软件”选项重新安装。OMS主目录必须与正在恢复的OMS主目录位置相同。\n\
    \nOMS中存在的所有插件都必须安装才能成功恢复。应以SYSMAN用户身份运行以下SQL查询：\n\n```\nSELECT epv.display_name,\
    \ epv.plugin_id, epv.version, epv.rev_version,decode(su.aru_file,\nnull, 'Media/External',\
    \ 'https://updates.oracle.com/Orion/Services/download/ '\n||aru_file||'?aru='||aru_id||chr(38)||'patch_file='||aru_file)\
    \ URL\nFROM em_plugin_version epv, em_current_deployed_plugin ecp, em_su_entities\
    \ su\nWHERE epv.plugin_type NOT IN ('BUILT_IN_TARGET_TYPE', 'INSTALL_HOME')\n\
    AND ecp.dest_type='2'\nAND epv.plugin_version_id = ecp.plugin_version_id\nAND\
    \ su.entity_id = epv.su_entity_id;\n```\n\n以下示例输出显示了插件、版本、修订版和URL。如果通过Self Update下载，URL将显示。否则，状态将显示为Media/External。\n\
    \n```\nSQL>\n\nDISPLAY_NAME                      PLUGIN_ID           VERSION \
    \     REV_VERSION   URL\n------------------------------  ------------------  -----------\
    \  ------------  ----------------\nOracle MOS (My Oracle Support)  oracle.sysman.mos\
    \   12.1.0.2.0              0  Media/External\nOracle Fusion Middleware      \
    \  oracle.sysman.emas  12.1.0.3.0              0  Media/External\nOracle Database\
    \                 oracle.sysman.db    12.1.0.2.0       20120804  Media/External\n\
    Oracle Exadata                  oracle.sysman.xa    12.1.0.3.0              0\
    \  Media/External\n```\n\n如果列出了任何其他插件，应将它们下载到单个目录中；然后将扩展名从`.zip`重命名为`.opar`。如果未从文件系统备份恢复，请使用“仅安装软件”选项安装中间件和OMS\
    \ Oracle主组件。软件重新安装或恢复后，下一步是安装其他插件（如果有）。通过指定`–PluginLocation`标志来选择下载插件的位置，执行位于`OMS_HOME/sysman/install`中的`PluginInstall.sh`脚本。在仅软件安装的情况下，之前应用的所有补丁都必须重新应用。\n\
    \n恢复软件主目录后，下一步是恢复或重新创建OMS。这通过使用`omsca`实用程序并指定由`emctl exportconfig`命令生成的备份文件路径来完成。\n\
    \n```\nomsca recover –as –ms -nostart –backup_file <exportconfig file>\n```\n\n\
    恢复OMS所需的步骤可能因是否使用SLB或配置了多个管理服务以及是否在同一主机或不同主机上恢复而异。以下步骤是在没有SLB的同一主机上恢复单个OMS所必需的。OMS实例将通过使用`emctl\
    \ exportconfig`获取的OMS配置备份进行恢复。\n\n1. 清理失败的主机。\n2. 验证软件库是否可用。\n3. 通过恢复文件系统备份或运行安装程序的“仅软件”选项来恢复软件主目录。（参见`Oracle\
    \ Enterprise Manager Cloud Control Advanced Installation and Configuration Guide\
    \ Release 2`）。\n4. 在恢复模式下执行`omsca`，并指定先前获取的备份文件位置。\n5. 如有必要，恢复代理。\n6. 启动OMS。\n\
    7. 验证OMS是否正常工作。\n\n有关其他OMS恢复场景的详细信息，请参阅`Oracle Enterprise Manager Cloud Control\
    \ 12c Administrator’s Guide`。\n\n## Management Agent Recovery\n\n管理代理的恢复需要重新安装它，最好从参考安装进行，或执行从先前备份的文件系统恢复。代理应使用现有补丁和自定义设置进行克隆。代理也应使用相同端口安装。重新安装后，应从Enterprise\
    \ Manager Cloud Control中的“代理重新同步”页面执行重新同步。\n\n![image](images/sq.jpg) `Note` 重新安装后，代理会被OMS阻止，以防止目标覆盖先前配置的数据。使用“重新同步代理”按钮重新同步并取消阻止代理。\n\
    \n在典型场景中，代理恢复通常遵循以下步骤：\n\n1. 使用Oracle Universal Installer (OUI) 清理现有代理Oracle主目录以清理库存。\n\
    2. 安装新代理或从参考安装克隆，使用相同端口和路径。也可以从先前备份恢复文件系统。\n3. 从Enterprise Manager Cloud Control代理主页执行代理重新同步。\n\
    4. 如有必要，重新配置用户定义的指标。\n5. 验证代理状态。\n\n```\nemctl status agent\nemctl upload agent\n\
    ```\n\n## Switchover and Failover\n\n当使用级别2、3或4高可用性配置时，管理服务和存储库都可以独立切换和故障转移。切换通常在计划维护期间进行，包括操作系统和软件打补丁，而故障转移通常在计划外维护期间发生，例如硬件或软件故障。\n\
    \n在级别2配置中，管理服务的切换和故障转移遵循相同的程序。如前所述，这需要将OMS虚拟主机名和VIP重新定位到另一主机，然后手动启动OMS或使用Clusterware自动化重新定位。在使用物理备用数据库用于Enterprise\
    \ Manager存储库的级别2、3或4配置中，数据库必须切换（计划）或故障转移（未计划）。在级别3高可用性中，OMS不需要任何操作，因为涉及多个管理服务。SLB将监视管理服务，检测到一个服务失败时将流量路由到可用的OMS。\n\
    \n要使用Data Guard切换管理存储库，请使用DGMRL命令行实用程序，因为Enterprise Manager控制将无法切换存储库。按照以下步骤切换管理存储库，而管理服务尚未切换：\n\
    \n1. 从Enterprise控制台，选择`Availability` ä `Data Guard Administration`。\n2. 检查Redo\
    \ Apply进程是否是最新的。验证ApplyLag状态为零，如[Figure 13-35](#9781430249382_Ch13.xhtml#Fig35)所示。\n\
    \n![9781430249382_Fig13-35.jpg](images/9781430249382_Fig13-35.jpg)\n\n[Figure\
    \ 13-35](#9781430249382_Ch13.xhtml#_Fig35) . Data Guard administration showing\
    \ ApplyLag and TransportLag status\n\n3. 通过运行以下命令停止主站点上的管理服务。如果使用多个管理服务，应在每个OMS上执行此操作。\n\
    \n```\nemctl stop oms -all\n```"
  raw: "```\nemctl config emrep [-sysman_pwd <sysman password>]\n      [-agent <new\
    \ agent>]    Specify new destination agent for emrep target\n      [-conn_desc\
    \ [<jdbc connect descriptor>]]\n                              Update Connect Descriptor\
    \ with value if specified,\n                              else from value stored\
    \ in emoms.properties\n      [-ignore_timeskew]      ignores timeskew on agent\n\
    ```\n\nAfter the database has been recovered and reconfiguration performed, the\
    \ next step would be to log in to the Enterprise Manager Cloud Control console\
    \ and verify that all operations have been restored.\n\nOracle Management Service\
    \ Recovery\n\nRecovering an OMS requires recovery of both the software homes (Fusion\
    \ Middleware) and the instance homes (gc_inst). The software homes can either\
    \ be recovered from a filesystem backup or be reinstalled using the Install Software\
    \ Only option on the same or a different host using the Enterprise Manager Cloud\
    \ Control 12c installer. The OMS home must be in the same location as the OMS\
    \ home being recovered.\n\nAll plug-ins that existed in the OMS are required to\
    \ be installed for the recovery to succeed. The following SQL query should be\
    \ run as the SYSMAN user:\n\n```\nSELECT epv.display_name, epv.plugin_id, epv.version,\
    \ epv.rev_version,decode(su.aru_file,\nnull, 'Media/External', 'https://updates.oracle.com/Orion/Services/download/\
    \ '\n||aru_file||'?aru='||aru_id||chr(38)||'patch_file='||aru_file) URL\nFROM\
    \ em_plugin_version epv, em_current_deployed_plugin ecp, em_su_entities su\nWHERE\
    \ epv.plugin_type NOT IN ('BUILT_IN_TARGET_TYPE', 'INSTALL_HOME')\nAND ecp.dest_type='2'\n\
    AND epv.plugin_version_id = ecp.plugin_version_id\nAND su.entity_id = epv.su_entity_id;\n\
    ```\n\nThe following example output shows the plug-ins, versions, revisions, and\
    \ URLs. The URL will display if downloaded via Self Update. Otherwise, the status\
    \ will be Media/External.\n\n```\nSQL>\n\nDISPLAY_NAME                    PLUGIN_ID          \
    \ VERSION      REV_VERSION   URL\n------------------------------  ------------------  -----------  ------------  ----------------\n\
    Oracle MOS (My Oracle Support)  oracle.sysman.mos   12.1.0.2.0              0  Media/External\n\
    Oracle Fusion Middleware        oracle.sysman.emas  12.1.0.3.0              0  Media/External\n\
    Oracle Database                 oracle.sysman.db    12.1.0.2.0       20120804  Media/External\n\
    Oracle Exadata                  oracle.sysman.xa    12.1.0.3.0              0  Media/External\n\
    ```\n\nIf any additional plug-ins are listed, they should be downloaded into a\
    \ single directory;  then rename the extensions from .zip to .opar. Use the Install\
    \ Software Only option to install the Middleware and OMS Oracle home components\
    \ if not restoring from a filesystem backup. After the software has been reinstalled\
    \ or restored, the next step is to install the additional plug-ins (if any). Execute\
    \ the PluginInstall.sh script located in OMS_HOME/sysman/install by specifying\
    \ the –PluginLocation flag to select the location where the downloaded plug-ins\
    \ are kept. In the case of a Software Only installation, all patches previously\
    \ applied will have to be redone.\n\nAfter restoring the software homes, the next\
    \ step would be to restore or re-create the OMS. This is done by using the omsca\
    \ utility and specifying the path of the backup generated by the emctl exportconfig\
    \ command.\n\n```\nomsca recover –as –ms -nostart –backup_file <exportconfig file>\n\
    ```\n\nThe steps required to recover the OMS may vary depending on whether an\
    \ SLB is in use or multiple management services are configured as well as whether\
    \ recovery is done on the same host or a different host. The following steps are\
    \ required for restoring a single OMS on the same host without an SLB. The OMS\
    \ instance will be recovered by using the OMS configuration backup taken by emctl\
    \ exportconfig.\n\n1.  Clean up the failed host.\n2.  Verify that the Software\
    \ Library is available.\n3.  Restore the software home by restoring a backup of\
    \ the filesystem or run the installer’s Software Only option. (See the *Oracle\
    \ Enterprise Manager Cloud Control Advanced Installation and Configuration Guide\
    \ Release 2*).\n4.  Execute omsca in recovery mode and specify the location of\
    \ the backup file taken previously.\n5.  Recover agents if necessary.\n6.  Start\
    \ the OMS.\n7.  Verify that the OMS is working.\n\nSee the *Oracle Enterprise\
    \ Manager Cloud Control 12c Administrator’s Guide* for details on other OMS recovery\
    \ scenarios.\n\nManagement Agent Recovery\n\nThe recovery of the management agent\
    \ requires reinstalling it, preferably from a reference install, or performing\
    \ a filesystem restore from a previous backup. The agent should be cloned with\
    \ the existing patches and customizations. The agent should also be installed\
    \ by using the same port. After it has been reinstalled, a resynchronization should\
    \ be performed from the Agent Resynchronization page in Enterprise Manager Cloud\
    \ Control.\n\n![image](images/sq.jpg) **Note**  The agent is blocked by the OMS\
    \ after reinstallation to prevent targets from overwriting data from previous\
    \ configurations. Use the Resynchronize Agent button to resynchronize and unblock\
    \ the agent.\n\nAgent recovery in a typical scenario usually follows these steps:\n\
    \n1.  Remove the existing agent Oracle home by using the Oracle Universal Installer\
    \ (OUI) to clean up the inventory.\n2.  Install a new agent or clone from the\
    \ reference install, using the same port and path. The filesystem can also be\
    \ restored from a previous backup.\n3.  Perform Agent Resynchronization from the\
    \ Enterprise Manager Cloud Control Agent home page.\n4.  Reconfigure user-defined\
    \ metrics if necessary.\n5.  Verify the status of the agent.\n\n```\n    emctl\
    \ status agent\n    emctl upload agent\n    ```\n\nSwitchover and Failover\n\n\
    Both the management service and repository can be switched over and failed over\
    \ independently when using level 2, 3, or 4 high-availability configurations.\
    \ Switchover is usually done during planned maintenance, including operating system\
    \ and software patching, while a failover normally occurs during unplanned maintenance\
    \ such as hardware or software failure.\n\nIn a level 2 configuration, the switchover\
    \ and failover of the management service follow the same procedure. As mentioned\
    \ earlier, this requires relocating the OMS virtual hostname and VIP to another\
    \ host and then starting the OMS manually or using Clusterware to automate the\
    \ relocation. In level 2, 3, or 4 configurations that utilize a physical standby\
    \ database for the Enterprise Manager repository, the database has to be switched\
    \ over (planned) or failed over (unplanned). The OMS does not require any action\
    \ in level 3 high availability because multiple management services are involved.\
    \ The SLB will monitor the management services and detect when one has failed\
    \ and route traffic to the available OMS.\n\nTo switch over the management repository\
    \ using Data Guard, use the DGMRL command-line utility as the Enterprise Manager\
    \ console will not be able to switch over the repository. Follow these steps to\
    \ do a switchover of the management repository with a management service that\
    \ has not been switched over:\n\n1.  From the Enterprise console, choose Availability\
    \ ä Data Guard Administration.\n2.  Check that the Redo Apply process is up-to-date.\
    \ Verify the ApplyLag status is zero as shown in [Figure 13-35](#9781430249382_Ch13.xhtml#Fig35).\n\
    \n![9781430249382_Fig13-35.jpg](images/9781430249382_Fig13-35.jpg)\n\n[Figure\
    \ 13-35](#9781430249382_Ch13.xhtml#_Fig35) .  Data Guard administration showing\
    \ ApplyLag and TransportLag status\n\n3.  Stop the management services on the\
    \ primary site by running the following command. If multiple management services\
    \ are being used, this should be done on each OMS.\n\n```\n    emctl stop oms\
    \ -all\n    ```"
