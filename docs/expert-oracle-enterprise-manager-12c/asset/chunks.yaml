  trans: '

    # 设置阈值与打包插件


    ## 定义阈值与告警信息


    默认的警告和严重阈值可以通过使用 `WARNING` 和 `CRITICAL` 属性在 `Condition` 元素中定义。就像收集计划一样，EM12c 用户可以修改这些阈值。警告和严重阈值都是可选的，如果找不到一个合理良好的默认值，通常可以不定义它们。值
    `"NotDefined"` 等同于完全没有定义值，正如 清单 10-13 中针对 `"non_nice"` 列条件所示。我倾向于直接跳过定义，以保持元数据定义的简洁，就像
    `Response` 指标的 `Status` 列没有 `WARNING` 阈值一样。


    您还可以看到，可以定义列特定的告警信息，并使用像 `%columnName%` 这样的占位符变量来包含列名、最新值以及阈值。由于百分号 (`%`) 具有特殊含义，您应使用双百分号
    (`%%`) 来在消息中包含真正的百分号。同样地，您可以定义当条件被清除时在 EM12c 中生成的自定义消息。还可以通过指定属性 `OCCURRENCES`
    来设置在触发告警之前，该条件连续发生的次数。


    只要在目标默认收集文件中指定了条件操作符，就可以在 EM12c 控制台中自定义阈值以及发生次数。但是，操作符本身无法更改。因此，请特别注意选择正确的条件操作符。


    ## 打包插件


    现在您已经了解了最小化 EM12c 插件的所有组件，还需要放置由目标类型元数据中定义的指标收集提取器所调用的操作系统脚本。我建议使用 Perl 编写操作系统脚本，并使用随
    Oracle Management Agents 安装的 Perl 版本。这是最独立于平台的方法（尽管出于简洁性考虑，Oracle 提供的示例仅在 Linux
    上工作——Perl 脚本只是调用一些操作系统实用程序来收集数据）。脚本放置在代理端暂存区的 `scripts` 目录中，并创建一个与目标类型同名的子目录。因此，在我们的示例中，`data_collector.pl`
    文件被放置在 `<stage>/agent/scripts/sample_host1` 中，其中 `sample_host1` 是目标类型。


    所有组件和脚本就位后，您现在可以打包插件归档文件了。您可以在打包之前运行插件验证，就像之前在 清单 10-7 中所做的那样。但是，插件创建过程本身包含一个验证步骤，因此不必单独运行验证。


    在部署示例插件时，我使用了脚本 `build_sample_plugin.sh`，它不过是 `empdk create_plugin` 命令的一个小包装器。部署插件的完整命令如下：


    ```

    empdk create_plugin -stage_dir <stage_dir> -out_dir <output_dir>

    ```


    两个必需参数定义了暂存目录的位置以及生成 OPAR 文件的输出目录。有关 `empdk create_plugin` 的可选参数的详细信息，请参阅 *Extensibility
    Programmer''s Reference*（第 13 章，第 13.4 节）。


    在打包插件期间，EDK 会在您的暂存区中创建额外的文件，这些文件将被打包到插件归档中。例如，它会创建在部署期间将目标类型定义导入到 OMS 中的 PL/SQL
    代码。您无需担心或维护它们；每次创建插件归档时，它们都会被重新创建。


    创建的 OPAR 文件用于将插件分发给其他用户（EM12c 管理员），无论您是为自己的组织还是为外部用户创建它，也无论它是免费插件还是商业插件。其部署过程与之前概述的示例插件部署过程相同，也在
    *Extensibility Programmer''s Reference*（第 13 章，第 13.5 和 13.6 节）中有详细描述。最终用户关于插件管理的文档可在
    *Oracle Enterprise Manager Cloud Control 12c Administrator''s Guide* 的第 22 章中找到（如果您直接向最终用户分发
    OPAR 文件，请参阅第 12.4.3.2 小节的“导入插件归档”部分）。


    对于这三个主机示例插件，所有步骤都已在前面完成，因此初始示例已经部署且目标已创建。请注意，`oracle.samples.xsh1` 插件实现了更多功能，您将在本章后面部分学习，但到目前为止您所学的内容基本上是任何带有新目标类型的插件的核心。


    ## 代理的指标浏览器


    使用代理的指标浏览器 (Metric Browser) 接口来查看代理实际收集的内容，甚至查看所收集指标的一些调试信息，通常很有用。这在故障排除时特别有用，当不清楚问题是出在代理端的指标收集环节，还是发生在上传到
    OMS 端并加载到存储库的过程中时。要为代理激活指标浏览器，请以运行代理的操作系统用户身份运行以下命令：


    ```

    emctl setproperty agent -name _enableMetricBrowser -value true

    ```


    要确定指标浏览器的 URL，请运行命令 `emctl status agent`。`Agent URL` 行将显示为 `http://host:port/emd/main/`
    格式。修改此 URL，在 `emd` 和 `main` 之间添加 `/browser/` 字符串，如下所示：`http://host:port/emd/browser/main`。如果您的代理是安全的，它可能使用
    `https` 而不是 `http`，因此在那种情况下请使用 `https` URL。


    在使用临时列和计算列时，使用指标浏览器特别有用，这些内容将在后面描述。这里还提供了一个完整的指标定义 XML 片段，其中所有属性都显式定义，甚至包括默认值——这是学习一些未文档化选项的好方法。指标浏览器让您能够访问任何目标类型，而不仅仅是您自己的目标，因此您可以查看
    Oracle 自身目标的完整（通常很复杂的）指标定义，这些定义可以为您提供关于如何创建自己指标的绝佳思路。还有其他关于指标收集的调试信息可用，但不幸的是，它尚未在任何文档中详细说明，而且到目前为止我还没有使用它的需要。


    ## 指标扩展的内部机制


    您可能已经注意到，定义目标类型指标与定义指标扩展 (Metric Extensions) 类似，只是采用 XML 格式。实际上，指标扩展功能本质上是用户界面，用于在没有创建全新插件和目标类型的负担下，向现有目标添加新指标。在幕后，指标扩展与您在目标类型元数据中看到的
    XML 指标定义是相同的。


    所有指标扩展都存储在存储库数据库的 `SYSMAN` 模式中的表 `EM_MEXT_VERSIONS` 里。`METADATA_DEFINITION` 列存储的不是别的，正是作为指标扩展定义的
    XML `Metric` 元素。相关的 `CollectionItem` 元素位于该表的 `COLLECTION_DEFINITION` 列中。


    `清单 10-14` 包含了我创建的第一个 `"Open Cursors, %"` 指标扩展的 XML 定义。这里为了可读性进行了格式化。


    `清单 10-14`. 指标扩展的 XML 表示

    '
- fmt: "```\n<Metric NAME=\"ME$open_cursors_pct\" TYPE=\"TABLE\">\n  <Display>\n \
    \   <Label NLSID=\"NLS_METRIC_oracle_databaseME$open_cursors_pct\">Open Cursors,\
    \ %</Label>\n    <Description NLSID=\"NLS_DESCRIPTION_oracle_databaseME$open_cursors_pct\"\
    >\n      Percentage of open cursors compare to open_cursors init.ora parameter.\n\
    \      Only top session value is returned.</Description>\n  </Display>\n  <TableDescriptor>\n\
    \    <ColumnDescriptor NAME=\"open_cursors_pct\" TYPE=\"NUMBER\">\n      <Display>\n\
    \        <Label NLSID=\"NLS_COLUMN_oracle_databaseME$open_cursors_pctopen_cursors_pct\"\
    >\n           Open Cursors</Label>\n        <Unit NLSID=\"mext_unit_nlsid_ME$open_cursors_pct_open_cursors_pct\"\
    >%</Unit>\n      </Display>\n      <CategoryValue CLASS=\"Default\" CATEGORY_NAME=\"\
    Capacity\">\n    </CategoryValue>\n  </ColumnDescriptor>\n</TableDescriptor>\n\
    \  <QueryDescriptor FETCHLET_ID=\"SQL\">\n    <Property NAME=\"STATEMENT\" SCOPE=\"\
    GLOBAL\" OPTIONAL=\"TRUE\">\n  SELECT ROUND (c.open_cursors / p.value * 100) open_cursors_pct\n\
    \  FROM (SELECT   sid, COUNT (*) open_cursors\n            FROM v$open_cursor\n\
    \        GROUP BY sid\n        ORDER BY 2 DESC) c,\n       v$parameter p\n  WHERE\
    \ p.name = 'open_cursors' AND ROWNUM = 1;</Property>\n    <Property NAME=\"MachineName\"\
    \ SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">MachineName</Property>\n    <Property NAME=\"\
    Port\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">Port</Property>\n    <Property NAME=\"\
    SID\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">SID</Property>\n    <Property NAME=\"\
    UserName\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">UserName</Property>\n    <Property\
    \ NAME=\"password\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">password</Property>\n\
    \    <Property NAME=\"Role\" SCOPE=\"INSTANCE\" OPTIONAL=\"TRUE\">Role</Property>\n\
    \    <CredentialRef NAME=\"SQLCreds\">\n  </CredentialRef>\n</QueryDescriptor>\n\
    </Metric>\n```\n\nIf you find it challenging to create metric definitions in XML\
    \ from scratch, you can start by creating a metric extension as a prototype and\
    \ then simply pick up the XML definition from the repository, copy it into your\
    \ target type metadata definition XML file, and modify it as needed. The raw XML\
    \ definition gives you much more flexibility.\n\n## EM12c Fetchlets\n\nEM12c comes\
    \ with more than a dozen documented fetchlets. Here is a brief summary of available\
    \ fetchlets:\n\n### OS Command fetchlets\nThis family of fetchlets lets you run\
    \ operating system commands and scripts and pass metric values as the output.\
    \ You have already looked at examples, and the three OS Command fetchlets have\
    \ the same functionality as the OS Command adapters you looked at in the “Metric\
    \ Extensions” section. The OS commands are run by an agent using the same OS user\
    \ that’s running the agent itself on the host where the agent is installed. To\
    \ ensure platform compatibility as much as possible, I recommend that you use\
    \ Perl scripts as commands and use Perl that’s distributed with the agents. The\
    \ scripts and any dependencies can be added to the plug-in and can be distributed\
    \ when a plug-in is deployed on the agents. Note that if dependencies cannot be\
    \ simply copied, and need compilation or any other configuration on the host,\
    \ then such dependencies will likely need to be preinstalled on the hosts running\
    \ agents. This complicates deployment and should be avoided. For example, if you\
    \ want to connect to a non-Oracle database from a Perl script using `DBI`, you\
    \ need to compile required `DBD` modules such as `DBD::MySQL`, which needs to\
    \ be done manually on each agent on the host before the plug-in is deployed. Thus,\
    \ using Perl native modules is preferred (such as `Net::MySQL` in this example—this\
    \ is what I use for the MySQL plug-in).\n\n### SQL fetchlet\nThis fetchlet allows\
    \ you to run a SQL statement or `PL/SQL` block against an Oracle database and\
    \ return a table of values. Multiple input parameters can be specified for both\
    \ `SQL` and `PL/SQL`. In case of a `PL/SQL` block, a single output parameter must\
    \ be defined and returned from `PL/SQL` as a `PL/SQL REF CURSOR` or as a named\
    \ type defined as an array of objects. The fetchlet’s properties define the database\
    \ connection and credentials as well as `SQL` parameters, the inline `SQL` statement\
    \ or `SQL` file to run, and the maximum number of rows to retrieve. This fetchlet\
    \ cannot be used to run `SQL` against non-Oracle databases. Some use cases for\
    \ this fetchlet include collecting application metrics from status tables in the\
    \ Oracle database or monitoring applications that are running inside the database,\
    \ such as Oracle Application Express (`APEX`) applications.\n\n### SNMP fetchlet\n\
    This fetchlet allows metric collection from `SNMP` targets. The metric based on\
    \ the `SNMP` fetchlet can collect values from multiple object identifiers (`OIDs`).\
    \ Each `OID` can refer to either a single variable or multiple instances (one\
    \ per network interface, for example). The fetchlet also supports `PINGMODE`,\
    \ a simple way of creating a Response metric returning 1 if the `SNMP` port is\
    \ responding, and 0 if a time-out occurs. This is better than generating a metric\
    \ collection error. The fetchlet supports `SNMP v1` and `v2` protocols based on\
    \ community strings as well as the more secure `v3` protocol that requires credentials\
    \ rather than a community string. Obvious use cases are for monitoring remote\
    \ network equipment or remote hosts that are not natively supported by the Oracle\
    \ agent (such as Ubuntu Linux) or that cannot have an agent installed for some\
    \ reason. Metric extensions’ `SNMP` adapter is based on this fetchlet, as you\
    \ might have guessed. However, the `SNMP` adapter configuration is so limited\
    \ that it makes it practically useless in metric extensions context.\n\n### HTTP\
    \ Data fetchlets\nThis family of fetchlets is very similar to the OS Command fetchlets\
    \ but takes output from an `HTTP GET` request by using a specified `URL` instead\
    \ of executing an OS command. The output can be a raw value or lines of values\
    \ or a delimiter-based tokenized lines of values—all the same options as for OS\
    \ Command fetchlets.\n\n### URLXML fetchlet\nThis fetchlet can process an `XML`\
    \ response retrieved from an `HTTP URL` and extract tabular data following predefined\
    \ pattern matching. It supports `HTTP GET` requests only and can also be configured\
    \ with a proxy server similar to HTTP Data fetchlets."
