    Summary


    This chapter presented the main components of an Enterprise Manager Cloud Control
    system—Oracle Management Service, Oracle Management Repository, Oracle Management
    Agent, and Software Library—that need to be configured for high availability.
    Each of these components needs to be protected by using a different method.


    Repository database high availability requires the use of database high-availability
    features including ASM, RAC, and Data Guard. Each should be configured using Oracle-recommended
    best practices where appropriate. RAC provides scalability and protects against
    the failure of a single host with seamless failover. Data Guard protects against
    host and storage failure with minimal downtime (typically less than a minute)
    during role changes. In its most highly configurable form, the repository database
    is deployed on a RAC database with a local RAC physical standby using Data Guard.
    A standby site with identical configuration is also available to provide services
    in the event of a loss of the primary site.


    The Oracle Management Service can use various techniques to enable high availability,
    each differing in cost and complexity. The simplest technique involves separating
    the OMS host from the repository host. You also looked at an active/passive, or
    cold, failover solution in which multiple hosts share a single OMS on a shared
    filesystem, with only one active at any given point in time. This uses the concept
    of a VIP to enable failover in the event of the loss of one host in the cluster.
    Manual failover is required, and some downtime occurs as the OMS is restarted
    on another host. The next level sets up multiple management services behind a
    load balancer. This enables a seamless failover solution in the event of the loss
    of a single OMS. In an MAA configuration, a standby site is configured with a
    similar configuration as the primary site. This obviously costs the most. However,
    it not only offers single-site availability but also protects against disasters.


    Management agents are made highly available by configuring reference images in
    the software library. This makes the agents easier to recover using deployment
    procedures.


    A key aspect of highly available architecture is its backup and recovery strategy.
    Each component in the Enterprise Manager Cloud Control system should follow recommended
    best practices where appropriate to ensure recoverability to meet business recovery
    point and recovery time objectives thus causing minimal disruptions to the business.


    In addition to the four levels of high availability discussed in this chapter,
    other technology solutions can provide varying levels of high availability. These
    include but are not limited to virtualization software such as Oracle VM Server,
    data replication technology including Oracle GoldenGate and Oracle Streams, and
    storage-level replication solutions. The choice of a solution hinges on business
    requirements, resources, and costs.


    [¹](#9781430249382_Ch13.xhtml#_Fn1) Maximum Availability Architecture (MAA) is
    a set of Oracle-recommended practices based on high-availability features. These
    recommendations are based on product development validations and experiences of
    customers running Oracle products.


    [²](#9781430249382_Ch13.xhtml#_Fn2) The Fast Recovery Area was previously called
    Flash Recovery Area in pre-11.2 Oracle databases.


    [³](#9781430249382_Ch13.xhtml#_Fn3) The format for the TZ environment variable
    will depend on your operating system. For more information on setting the TZ variable,
    see your operating system documentation.


    [⁴](#9781430249382_Ch13.xhtml#_Fn4) The default value of the failback is set to
    0, which means that the VIP and its dependent resources will not automatically
    fail back to the original node after it becomes available again.


    [⁵](#9781430249382_Ch13.xhtml#_Fn5) Oracle Restart is the single-instance high-availability
    feature of Oracle Database 11gR2\. It provides high availability by restarting
    database instances, services, and listeners in the event of a failure. It also
    restarts the database components on bootup of the server.


    [⁶](#9781430249382_Ch13.xhtml#_Fn6) *Protection mode* refers to the accepted potential
    data loss in event of primary database failure. The three available modes are
    Maximum Performance, Maximum Availability, and Maximum Protection.


    [⁷](#9781430249382_Ch13.xhtml#_Fn7) Oracle RAC One Node is a new option available
    with Oracle Database 11g Release 2\. Oracle RAC One Node is a single instance
    of an Oracle RAC-enabled database running on one node in a cluster.


    [⁸](#9781430249382_Ch13.xhtml#_Fn8) rsync is software that enables replication
    of files and directories from one system to another while minimizing data transfer
    through the use of deltas.


