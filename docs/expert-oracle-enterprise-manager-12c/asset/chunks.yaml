    in your situation. Click Next and then click OK to accept the warning about restarting
    the installer.


    ![9781430249382_Fig02-25.jpg](images/9781430249382_Fig02-25.jpg)


    [Figure 2-25](#9781430249382_Ch02.xhtml#_Fig25). Software updates


    3.  After the installer restarts, continue to the next step, shown in [Figure
    2-26](#9781430249382_Ch02.xhtml#Fig26). Enter a directory for Inventory Location
    and select the group you created for the ORACLE user. When you click Next, the
    installer checks the prerequisites.


    ![9781430249382_Fig02-26.jpg](images/9781430249382_Fig02-26.jpg)


    [Figure 2-26](#9781430249382_Ch02.xhtml#_Fig26). Oracle inventory


    4.  Make sure that all prerequisite checks have the status Succeeded, as shown
    in [Figure 2-27](#9781430249382_Ch02.xhtml#Fig27), and then click Next.


