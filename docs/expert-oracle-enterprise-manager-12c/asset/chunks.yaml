- fmt: 'As cloud users start sharing the cloud platform or infrastructure resources,
    you need to have accountability of the usage; otherwise, resources will be overused
    by some, while others won’t get resources when they are needed. To mitigate this,
    enterprises need to measure the resource usage and optionally charge back to the
    tenants. Though an IT organization may not actually charge its lines of business,
    usage reporting provides a transparent mechanism for budgeting resources and optimizes
    the cloud platform on an ongoing basis.


    ## Understanding Metering and Chargeback


    EM12c offers a sophisticated and flexible Metering and Chargeback mechanism whereby
    you can define models based on fixed cost, configuration (such as version, licenses),
    or utilization, or a combination of these (see [Figure 5-16](#9781430249382_Ch05.xhtml#Fig16)).
    This feature enables you to meter resources at various levels—for example, host/VM
    level, database, and middleware. It is well integrated with `LDAP` so that you
    can traverse the organizational hierarchy and generate the consumption report
    at various levels.


    ![9781430249382_Fig05-16.jpg](images/9781430249382_Fig05-16.jpg)


    [Figure 5-16](#9781430249382_Ch05.xhtml#_Fig16). EM12c Chargeback console


    The information in these reports is often useful to people who are not Enterprise
    Manager users, such as line-of-business managers or people in finance departments.
    Therefore, an out-of-the-box integration with BI Publisher is provided so that
    these reports can be shared with a variety of users. BI Publisher can generate
    these reports on a schedule and share them in a variety of formats such as `PDF`,
    `HTML`, and Microsoft Office. The resource usage data can then be fed into a billing
    tool such as Oracle Billing and Revenue Management, should any organization want
    to generate a bill for the tenants/consumers.


    Now you understand what metering and chargeback is, how it can be used, and what
    features are available. But how does an administrator set up this option and begin
    using these advanced features?


    ## Installing the Chargeback Plug-In


    To set up metering and chargeback, you must deploy a plug-in on the management
    server and then define six tasks. The plug-in deployment and defined tasks are
    discussed in this section.


    To access the plug-ins, choose `Setup` ![arrow](images/arrow.jpg) `Extensibility`
    ![arrow](images/arrow.jpg) `Plug-ins` from the right-hand side of the screen.
    This brings you to the page shown in [Figure 5-17](#9781430249382_Ch05.xhtml#Fig17),
    where all available plug-ins are listed.


    ![9781430249382_Fig05-17.jpg](images/9781430249382_Fig05-17.jpg)


    [Figure 5-17](#9781430249382_Ch05.xhtml#_Fig17). Oracle Chargeback and Capacity
    Planning plug-in availability


    To deploy the Oracle Chargeback and Capacity Planning plug-in, you need to know
    the repository `SYS` password. Provide the password and continue with the deployment
    (see [Figure 5-18](#9781430249382_Ch05.xhtml#Fig18)).


    ![9781430249382_Fig05-18.jpg](images/9781430249382_Fig05-18.jpg)


    [Figure 5-18](#9781430249382_Ch05.xhtml#_Fig18). Providing the repository `SYS`
    password for deployment


    ![image](images/sq.jpg) **Note**  If the plug-in is deployed on the management
    server, the deployment will require downtime. Ensure that you have a backup of
    the repository and configuration of the management server before deploying. You’ll
    see a message similar to the following.


    ![9781430249382_unFig05-01.jpg](images/9781430249382_unFig05-01.jpg)


    You will not be able to deploy until you select the check box confirming that
    you have made a backup of the repository and management server.


    After the deployment is complete, two new menu items are displayed on the Enterprise
    menu: `Chargeback` and `Consolidation Planner` (see [Figure 5-19](#9781430249382_Ch05.xhtml#Fig19)).
    This means the deployment of the plug-in was successful, and you can now utilize
    the functionality associated with the Chargeback plug-in. You will also notice
    that functionality for Consolidation Planner has been enabled; this feature is
    discussed later in this chapter.


    ![9781430249382_Fig05-19.jpg](images/9781430249382_Fig05-19.jpg)


    [Figure 5-19](#9781430249382_Ch05.xhtml#_Fig19). Enterprise menu options for `Chargeback`
    and `Consolidation Planner`


    ## Configuring Metering and Chargeback


    Once the Chargeback functionality is enabled within EM12c, it is time to focus
    on the six tasks required to successfully set up chargeback for your environment:


    1.  Define charge plans.

    2.  Create cost centers.

    3.  Add targets for chargeback.

    4.  Assign cost centers to targets.

    5.  Assign charge plans to targets.

    6.  Configure chargeback settings.


    The first step in this process is to define the charge plans that should be used.
    There are two types of charge plans: `universal` and `extended`. A `universal
    charge plan` uses three basic metrics to compute resource consumption: CPU, memory,
    and storage. An `extended charge plan` enhances this model by including target-specific
    metrics to determine usage rates.


    To determine the appropriate charge plan, you have to decided on a case-by-case
    basis whether the `universal charge plan` (CPU, memory, and storage) will be enough
    to meet the organization’s needs. If more than the core three metrics are needed,
    the `extended charge plan` should be applied.


    To define a charge plan, you choose `Enterprise` ![arrow](images/arrow.jpg) `Chargeback`
    to access the Charge Plans tab within the Chargeback interface. For a `universal
    charge plan`, it is easy to set the rate that is charged by highlighting and then
    editing the metric (see [Figure 5-20](#9781430249382_Ch05.xhtml#Fig20)). An `extended
    charge plan` can be created or edited immediately below the `universal charge
    plan`.


    ![9781430249382_Fig05-20.jpg](images/9781430249382_Fig05-20.jpg)


    [Figure 5-20](#9781430249382_Ch05.xhtml#_Fig20). `Universal` and `extended` charge
    plans can be edited on the same screen of the charge plan configuration interface


    The next step in configuring chargeback is to set up the cost centers for the
    organization. `Cost centers` are the vehicles used to aggregate charges. A cost
    center can be an individual, departments within the organization, or a multi-tiered
    business hierarchy that spreads the charges across an enterprise. To create a
    business hierarchy, set up cost centers and assign users to the business units.
    Additionally, a business hierarchy can be implemented by importing an organization’s
    hierarchy from an `LDAP` server.


    To add a cost center, click the Cost Centers tab and then click the Add button.
    This opens the New Cost Center dialog box, shown in [Figure 5-21](#9781430249382_Ch05.xhtml#Fig21).
    Here you can enter the name of the cost center as well as its display name and
    level. If existing cost centers are available, the new cost center can be added
    as a “member of” one of those cost centers.


    ![9781430249382_Fig05-21.jpg](images/9781430249382_Fig05-21.jpg)


    [Figure 5-21](#9781430249382_Ch05.xhtml#_Fig21). Adding a new cost center


    Once a cost center is added, it will show up under the Cost Center column on the
    Cost Centers tab. If you added sub–cost centers as members of an existing cost
    center, these can be viewed by expanding the tree view (see [Figure 5-22](#9781430249382_Ch05.xhtml#Fig22)).
    As you will notice, this can become a complex architecture of cost centers to
    manage. However, by diligently laying out your cost center, it will be easier
    to identify consumed resources and budgetary requirements down the road.


    ![9781430249382_Fig05-22.jpg](images/9781430249382_Fig05-22.jpg)


    [Figure 5-22](#9781430249382_Ch05.xhtml#_Fig22). Examples of cost centers defined'
