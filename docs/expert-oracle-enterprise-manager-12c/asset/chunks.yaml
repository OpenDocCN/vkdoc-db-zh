    这些报表按预定义类别分组。完整列表如 图 4-34 所示。要生成此列表，请选择 `全部折叠`，然后单击 `Information Publisher Reports`
    旁边的箭头。


    ![9781430249382_Fig04-34.jpg](img/9781430249382_Fig04-34.jpg)

    图 4-34. 可用报表类别


    您无法编辑预定义报表，但可以使用 `类似创建` 功能来生成自定义版本。为了说明这个原理，您将使用内置的 `Oracle Database Monthly Space
    Usage Report` 作为新的每日空间使用报表的基础。要查找该报表，请展开报表列表，使其看起来像 图 4-35。


    ![9781430249382_Fig04-35.jpg](img/9781430249382_Fig04-35.jpg)

    图 4-35. 空间使用报表自定义


    选择 `月度空间使用报表` 并单击 `类似创建`。您将看到一个类似于 图 4-36 的屏幕。您可以自定义此报表的所有可编辑属性，并且**必须**自定义报表标题。


    ![9781430249382_Fig04-36.jpg](img/9781430249382_Fig04-36.jpg)

    图 4-36. 初始报表设置


    将所有现有对 `Monthly` 的引用更新为引用您的新分析周期（在此示例中，您将使用 `Weekly`）。此外，选择 `设置时间段` 并从 31 天更改为
    7 天。完成后，报表应类似于 图 4-37。


    ![9781430249382_Fig04-37.jpg](img/9781430249382_Fig04-37.jpg)

    图 4-37. 每周空间管理报表


    接下来，暂时忽略 `元素` 选项卡，然后单击 `计划`。此选项卡允许您将报表配置为每周日运行并通过电子邮件发送到相应地址（参见 图 4-38）。这种将报表安排到管理员或管理层收件箱的做法，是将报表功能与管理库集中化的一个巨大优势。我建议您保存已发送报表的副本，并在合理的时间范围内清除，以便进行跨时间比较，从而回答诸如“去年这个时候发生了什么？”之类的问题。


    ![9781430249382_Fig04-38.jpg](img/9781430249382_Fig04-38.jpg)

    图 4-38. 每周空间报表的两年保留期


    ## 目标菜单


    `目标`菜单，顾名思义，让您能够快速按类型访问目标的摘要信息。可用的目标类型根据您选择安装的插件而有所不同。图 4-39 显示了一个示例。


    ![9781430249382_Fig04-39.jpg](img/9781430249382_Fig04-39.jpg)

    图 4-39. 目标菜单


    `所有目标`选项或键盘快捷键会将您带到一个可搜索的目标列表，该列表以各种方式组织。屏幕看起来类似于 图 4-40。


    ![9781430249382_Fig04-40.jpg](img/9781430249382_Fig04-40.jpg)

    图 4-40. `所有目标`选项


    除了按目标类型搜索外，您还可以按软件版本、目标状态、硬件平台或操作系统查看目标。如果您想查看多个相同类型或状态的目标，此屏幕速度更快；如果您正在搜索特定目标，使用`导航`栏上的标准搜索框可能会更好，可以达到相同的效果。


    菜单的下一部分涵盖`组`、`服务`和`系统`，这是将一组托管目标作为一个整体进行查看和管理的三种方式。您需要了解每种这些结构的差异和用途，以便有效利用该平台。


    `组`是目标的逻辑组织。例如，您可能将所有生产数据库归类为一个组，或某个特定数据中心中的所有主机。组的有效使用在第 7 章中介绍。现在，您只需要知道可以将逻辑相关的项目分组，然后查看有关该组的摘要信息，而不是单个目标的信息。图
    4-41 显示了默认情况下您将看到的有关组的信息（本例中是数据库实例组）。


    ![9781430249382_Fig04-41.jpg](img/9781430249382_Fig04-41.jpg)

    图 4-41. 组信息


    此时您可能会想：“太好了；我可以将构成我的重要应用程序安装的所有设备分组在一起，并将它们视为一个组。”虽然这是正确的，但真正需要的很可能是一个`系统`。系统由其提供的服务定义。正式定义如下：


    > `系统`是一组协同工作以托管您的应用程序的基础设施组件（例如，主机、数据库和应用程序服务器）。


    根据它们提供的服务，系统有几种类型。如果您导航到系统页面，您将看到几个预定义的系统，包括运行`Enterprise Manager Service`的`WebLogic`域。系统管理是一个全面的管理和配置领域，因为`Enterprise
    Manager`允许您定义相互依赖关系和组件角色等。正确定义系统的力量体现在`Enterprise Manager`为托管系统提供的根本原因分析和服务级别分析中。数据库系统的主页如图
    4-42 所示（我们使用的是`Enterprise Manager`存储库数据库系统，因此您可以将其与您的安装进行比较）。


    ![9781430249382_Fig04-42.jpg](img/9781430249382_Fig04-42.jpg)

    图 4-42. 数据库系统

    '
- fmt: '## Services 菜单


    Services 是此组中的最后一个菜单选项，也是 Enterprise Manager 服务级别管理能力的基础。一个*服务*被简单地定义为向一个或多个用户提供有用的功能。这与广泛使用的
    ITIL 定义非常相似，后者侧重于向客户交付有用的成果。如前所述，系统可以交付服务，但您也可以定义不基于系统的服务（也许您不拥有或不监控提供它们的 IT 基础设施）。Enterprise
    Manager 中可用于监控的服务类型的确切列表取决于您安装中的插件。


    下一组菜单项由您已配置监控的各种受管目标类型的首页组成。例如，您可能有主机、数据库和中间件的条目。点击这些条目中的任何一个，都会将您带到受管资产的视图，按指定类型的所有目标进行过滤。每个页面都允许您查看该特定类型的现有目标，通过发现过程添加新目标，或在目标使用寿命结束时删除旧目标。


    ![image](images/sq.jpg) **提示** 如果您的工作角色是特定类型目标的专用管理员——例如，如果您是 Fusion Middleware
    管理员——最好选择并在必要时定制一个合适的首页。


    最后，在此菜单中，您有指向正在管理的应用程序的链接。这些不是预设的目标类型，而是由您从监控组件构建起来的。此功能很复杂，并且是站点和应用程序特定的。该主题在文档集
    *Oracle® Enterprise Manager Cloud Control Getting Started with Oracle Fusion Middleware
    Management* 中有涵盖，可在此处访问：`http://docs.oracle.com/cd/E24628_01/install.121/e24215/bussapps.htm#sthref170`。


    ## 收藏夹菜单


    下一个菜单乍看之下似乎是多余的。这是收藏夹菜单，其初始外观如[图 4-43](#9781430249382_Ch04.xhtml#Fig43) 所示。因此，它复制了您已有的浏览器内收藏功能。显然，如果您也可以利用内置的浏览器功能，在此处添加
    Cloud Control 收藏夹可能不会带来巨大的价值。


    ![9781430249382_Fig04-43.jpg](images/9781430249382_Fig04-43.jpg)


    [图 4-43](#9781430249382_Ch04.xhtml#_Fig43). 收藏夹菜单


    但是，如果您配置了支持集成，并且像作者们一样已经在 My Oracle Support 界面中收集了广泛的收藏夹，您会发现这些收藏夹可以直接从 Enterprise
    Manager 收藏夹菜单中获得。[图 4-44](#9781430249382_Ch04.xhtml#Fig44) 显示了一个关联了许多 Oracle E-Business
    11.5.10 收藏夹的帐户设置。


    ![9781430249382_Fig04-44.jpg](images/9781430249382_Fig04-44.jpg)


    [图 4-44](#9781430249382_Ch04.xhtml#_Fig44). 在 EM 中显示 My Oracle Support 收藏夹


    ## 历史记录菜单


    历史记录菜单仅让您访问最近访问页面的历史记录。这在使用浏览器“后退”按钮会带您穿过任务流而不是返回到真正的上一个页面时很有帮助。除此之外，我们找不到此菜单有浏览器历史记录无法提供的用途。


    ## 搜索框


    在导航栏的右侧是一个搜索框，允许您直接从产品界面内搜索 Enterprise Manager 和 My Oracle Support (MOS)。搜索框的默认范围是“搜索目标名称”，但下拉列表使您可以将范围更改为例如
    Oracle 补丁或 My Oracle Support 知识库。举个例子，假设您不完全记得 Oracle Database 近期版本中的 `ADR retention
    policies` 是如何工作的。您推测此信息应该在 MOS 的知识库中可用。因此，您从下拉菜单中选择“搜索知识库”并输入查询，如[图 4-45](#9781430249382_Ch04.xhtml#Fig45)
    所示。


    ![9781430249382_Fig04-45.jpg](images/9781430249382_Fig04-45.jpg)


    [图 4-45](#9781430249382_Ch04.xhtml#_Fig45). 从 Cloud Control 内部搜索知识库


    假设您已配置支持访问，您将被带到查询结果。在我们的案例中，我们需要的准确文档是第一个命中项（参见[图 4-46](#9781430249382_Ch04.xhtml#Fig46)）。如有必要，您可以按照正常的
    MOS 方式修改搜索条件以缩小或扩大结果范围。


    ![9781430249382_Fig04-46.jpg](images/9781430249382_Fig04-46.jpg)


    [图 4-46](#9781430249382_Ch04.xhtml#_Fig46). Enterprise Manager 中的知识库搜索结果


    搜索下拉列表中的来源范围直接对应于 My Oracle Support Flash 界面中的可搜索来源列表。


    ## 目标管理菜单栏


    前面讨论的所有菜单项在整个 Enterprise Manager 中都可用，并为管理产品提供了一致、连贯且始终可用的导航范式。此外，每个插件，无论是 Oracle
    还是第三方提供，都负责为其提供可管理性服务的目标类型提供管理菜单栏。为了说明一般特性，我们将使用 Oracle Database 插件，因为我们假设大多数读者对数据库管理有一定了解。每个受管目标类型在其特定于目标的菜单栏上提供菜单，其中一些将与此处展示的菜单一致，而另一些将是特定于目标类型的，并暴露仅适用于该目标类型的可管理性接口。


    正如您在引言中回忆的那样，早期的 Enterprise Manager 版本具有一些不一致的界面，设计取决于各个产品组，并采用了多种范式，从数据库团队的链接列表到
    Fusion Middleware 团队采用的高度菜单驱动的方法。在此版本中，各个产品采用了 Fusion Middleware 团队开创的方法。例如，数据库目标的首页如[图
    4-47](#9781430249382_Ch04.xhtml#Fig47) 所示。


    ![9781430249382_Fig04-47.jpg](images/9781430249382_Fig04-47.jpg)


    [图 4-47](#9781430249382_Ch04.xhtml#_Fig47). 数据库首页


    Oracle 数据库的目标管理菜单栏有五个子菜单：`Oracle Database`、`Performance`、`Availability`、`Schema`
    和 `Administration`。这些在[图 4-47](#9781430249382_Ch04.xhtml#Fig47) 的顶部进行了说明。


    最左边的菜单，称为*目标类型菜单*，在整个产品中是通用的，并提供对目标各种配置项的访问。它始终标记为目标类型（`Oracle Database`、`WebLogic
    Server` 等）。任何进一步的菜单都是该目标类型插件的职责。为了说明这一点，请将数据库首页与 Enterprise Manager `WebLogic`
    管理服务器的首页进行比较，如[图 4-48](#9781430249382_Ch04.xhtml#Fig48) 所示。性能、可用性等菜单已丢失，因为底层产品以不同的方式暴露了这些功能的可管理性。但是，目标类型菜单仍然存在，这次标记为
    `WebLogic Server`。'
  raw: 'Services is the final menu option in this group and the basis of the service-level
    management capabilities of Enterprise Manager. A *service* is simply defined as
    the provision of a useful function to one or more users. This is pretty similar
    to the widely used ITIL definition, which focuses on the delivery of useful outcomes
    to customers. Systems as previously defined can deliver services, but you can
    also define services that are not based on systems (perhaps you don’t own or monitor
    the IT infrastructure that provides them). The exact list of types of services
    available for monitoring in Enterprise Manager  depends on the plug-ins in your
    installation.


    The next set of menu items simply consists of home pages for the various managed
    target types for which you have monitoring configured. For example you might have
    entries for Hosts, Databases, and Middleware. Clicking any of these entries simply
    takes you to a view of your managed estate, filtered for all targets of the specified
    type. Each page allows you to view existing targets of that specific type, add
    new ones by way of the discovery process, or remove old ones at the end of the
    target’s useful life.


    ![image](images/sq.jpg) **Tip**  If your job role is as a dedicated administrator
    for a specific type of target—for example, if you are a Fusion Middleware administrator—you
    are better off choosing and, if necessary, customizing an appropriate home page.


    Finally, in this menu you have links to applications that are under management.
    These are not supplied target types, but rather are built up by you from monitored
    components. This functionality is complex and site- and application-specific.
    The subject is covered in the documentation set *Oracle® Enterprise Manager Cloud
    Control Getting Started with Oracle Fusion Middleware Management*, available at
    [http://docs.oracle.com/cd/E24628_01/install.121/e24215/bussapps.htm#sthref170](http://docs.oracle.com/cd/E24628_01/install.121/e24215/bussapps.htm#sthref170).


    Favorites Menu


    The next menu looks at first sight redundant. This is the Favorites menu, which
    initially looks like [Figure 4-43](#9781430249382_Ch04.xhtml#Fig43). As such,
    it duplicates the in-browser favorites functionality that you already have. Clearly,
    you likely will not gain a tremendous amount of value by adding Cloud Control
    favorites here if you can also utilize the built-in browser functionality.


    ![9781430249382_Fig04-43.jpg](images/9781430249382_Fig04-43.jpg)


    [Figure 4-43](#9781430249382_Ch04.xhtml#_Fig43). Favorites menu


    If, however, you configure support integration, and like the authors have already
    collected a wide range of favorites in the My Oracle Support interface, you will
    find that these are available to you directly from the Enterprise Manager Favorites
    menu. [Figure 4-44](#9781430249382_Ch04.xhtml#Fig44) shows settings from an account
    that has many Oracle E-Business 11.5.10 favorites associated with it.


    ![9781430249382_Fig04-44.jpg](images/9781430249382_Fig04-44.jpg)


    [Figure 4-44](#9781430249382_Ch04.xhtml#_Fig44). Displaying My Oracle Support
    favorites in EM


    History Menu


    The History menu merely gives you access to a history of recently accessed pages.
    This helps when using a browser Back button would take you through a task flow
    rather than to a genuine previous page. Other than this, we can find no use for
    the menu that the browser history doesn’t give.


    Search Box


    On the right-hand side of the Navigation bar is a search box that allows you to
    search both Enterprise Manager and My Oracle Support (MOS) directly from within
    the product interface. The search box’s default scope is Search Target Name, but
    the drop-down list enables you to change the scope to, for example, Oracle patches
    or the My Oracle Support knowledge base. As an example, suppose you cannot recall
    exactly how the ADR retention policies work in recent versions of Oracle Database.
    You surmise that this information ought to be available in the knowledge base
    within MOS. You therefore select Search Knowledge Base from the drop-down menu
    and enter a query, as shown in [Figure 4-45](#9781430249382_Ch04.xhtml#Fig45).


    ![9781430249382_Fig04-45.jpg](images/9781430249382_Fig04-45.jpg)


    [Figure 4-45](#9781430249382_Ch04.xhtml#_Fig45). Searching the  knowledge base
    from within Cloud Control


    Assuming that you have configured support access, you will be taken to the results
    of your query. In our case, the exact document we want is the first hit (see [Figure
    4-46](#9781430249382_Ch04.xhtml#Fig46)). You can, if necessary, modify your search
    criteria in the normal MOS way to narrow down or expand your results.


    ![9781430249382_Fig04-46.jpg](images/9781430249382_Fig04-46.jpg)


    [Figure 4-46](#9781430249382_Ch04.xhtml#_Fig46). Knowledge base search results
    in Enterprise Manager


    The range of sources for the search drop-down corresponds directly to the list
    of searchable sources in the My Oracle Support Flash interface.


    Target Management Menu Bar


    All of the menu items discussed previously are available throughout Enterprise
    Manager and provide the consistent, coherent, and always available navigation
    paradigm for the management product. Additionally, each plug-in, whether supplied
    by Oracle or a third party, is responsible for providing management menu bars
    for the target types for which it provides manageability services. To illustrate
    the general features, we will use the Oracle Database plug-in because we assume
    most readers are somewhat familiar with database administration. Each managed
    target type provides menus on its target-specific menu bar, some of which will
    be consistent with the menus presented here, and some of which will be target-type
    specific and expose manageability interfaces appropriate to that target type alone.


    As you recall from the introduction, previous Enterprise Manager releases had
    somewhat inconsistent interfaces, with the design down to individual product groups
    and a variety of paradigms employed, from the database team’s list of links to
    the highly menu-driven approach adopted by the Fusion Middleware team. With this
    release, the individual products utilize the approach pioneered by the Fusion
    Middleware team. The home page for a database target, for example, looks like
    [Figure 4-47](#9781430249382_Ch04.xhtml#Fig47).


    ![9781430249382_Fig04-47.jpg](images/9781430249382_Fig04-47.jpg)


    [Figure 4-47](#9781430249382_Ch04.xhtml#_Fig47). Database home page


    The Target Management menu bar for an Oracle database has five submenus: Oracle
    Database, Performance, Availability, Schema, and Administration. These are illustrated
    at the top of [Figure 4-47](#9781430249382_Ch04.xhtml#Fig47).


    The leftmost menu, known as the *target type menu,* is common throughout the product
    and gives access to various configuration items for the target. It is always labeled
    for the target type (Oracle Database, WebLogic Server, and so on). Any further
    menus are the responsibility of the plug-in for that target type. To illustrate
    this, compare the Database home page with that for the Enterprise Manager WebLogic
    Administration Server, shown in [Figure 4-48](#9781430249382_Ch04.xhtml#Fig48).
    The menus for performance, availability, and so on have been lost, because the
    manageability for these features is exposed in a different way by the underlying
    product. However, the target type menu is still there, this time labeled WebLogic
    Server.'
