  trans: '

    第 8 章 `Oracle Enterprise Manager Cloud Control 12c 管理员指南`详细介绍了指标扩展的其他功能，例如管理对指标扩展的访问、使用警报选项以及导出/导入指标扩展。在那里您还可以了解如何将旧版的用户定义指标从
    Grid Control 10g 和 11g 迁移到 12c Cloud Control 中的新指标扩展。


    ## 管理插件


    指标扩展易于创建，并且与 10g 风格的用户定义指标相比，它们更易于大规模管理，并为用户提供了更大的灵活性。然而，在监控更复杂的目标和指标方面，它们仍然非常有限。


    插件的强大之处在于开发者可以创建新的目标类型。目标类型为您管理的基础设施的每个组件提供了已熟悉的托管目标概念。例如，数据库实例是一个目标，监听器也是一个目标。甚至
    Oracle 主目录在 EM12c 中也以目标形式呈现。


    如果您的应用程序作为守护程序在服务器上运行，并且您有十个指标想要收集，您可以定义十个指标扩展并全部部署，也可以在插件中定义一个新的目标类型，然后只需部署一个插件。目标还具有实例属性，可根据其部署参数配置目标。相比之下，指标扩展完全没有参数化，因此如果您的应用程序在每台服务器上的配置不同，或者您在同一台服务器上运行多个应用程序实例，则必须为每个应用程序创建一套专用的指标扩展。


    此外，插件提供的功能远不止监控扩展。它们提供全面的管理能力，使得插件开发者能够对目标实施操作，例如启动和停止应用程序、按需检索日志进行分析或启用调试模式。控制台中的目标页面也完全可自定义。有方法可以定义
    EM12c 如何自动发现新目标，并且还有许多其他功能可用，例如作业、报告、配置管理和合规标准。在本章剩余部分通过查看示例插件时，您将了解到其中一些内容。


    ## 可扩展性框架入门


    如前所述，EM12c 可扩展性框架不像 10g 和 11g 版本中那样仅仅是一个附加功能。相反，它构成了所有管理插件的基础，包括 Oracle 提供的插件，用于监控其核心产品，如数据库、中间件、应用程序和集成系统。


    可扩展性框架包含创建新的、功能齐全的目标类型所需的一切——从高级指标收集功能到自动发现、配置管理、作业支持和合规管理，以及成熟的仪表板和完全交互式的目标管理界面。


    Enterprise Manager 可扩展性文档为插件开发者提供了两份指南：


    *   `Oracle Enterprise Manager Cloud Control 可扩展性程序员指南` 是对插件概念及其如何组合在一起的简要概述。在阅读下一份指南之前通读它是很有用的。像
    `管理插件概念指南` 这样的标题会更好地反映其内容。

    *   `Oracle Enterprise Manager Cloud Control 可扩展性程序员参考手册` 是您将一直使用的文档。它的结构是指南而非简单参考，因此请将其视为
    `管理插件开发者指南`。


    本节重点介绍插件开发的实际方面以及文档中不太清晰的细节。由于可扩展性框架在 EM12c 中发生了巨大变化，并且不像其他最终用户功能那样广泛使用，因此其文档不如
    EM12c 的其他文档清晰和全面。但是，请务必始终查阅最新版本的 Oracle 文档，因为在线文档会不时静默发布改进内容。


    即使您不计划自己开发插件，本节也将帮助您理解 EM12c 的一些内部机制，因此我建议您无论如何都浏览一下。


    在深入研究细节之前，让我们先看看插件的生命周期：


    *   *设计与开发*：这是插件开发者花费大部分精力的地方。

    *   *将插件打包成 Oracle 插件存档 (OPAR) 文件*：这是一个可以轻松分发的单一包。

    *   *在 Enterprise Manager 系统上部署插件*：EM12c 管理员从 OPAR 文件导入插件并将其部署到 OMS 上，使其对最终用户可用。最终用户然后可以添加要监控和管理的新目标。


    当您完成本章中的示例时，您将看到如何在插件开发过程中迭代此周期。首先我们将介绍如何设置您的开发环境。


    ### 开发环境


    我建议您拥有一个专用的 EM12c 插件开发环境。这样更容易在故障排除期间分析日志，并完全隔离您可能遇到的问题。作为插件开发者，您的一些活动可能会对环境造成干扰，因此拥有开发环境比在共享的
    EM12c 系统上开发并冒影响其他用户的风险更安全。


    一个虚拟机 (VM) 非常适合此目的。我在笔记本电脑上的虚拟机使用两个虚拟处理器核心和 6GB 内存。单核和 3-4GB 内存也可以应付，但请确保有合理的交换空间大小，因为除了运行
    EM12c 环境本身之外，您还会使用一些 Java 工具。例如，如果内存或交换空间不足，在使用 `empdk` 命令行工具打包插件时可能会遇到奇怪的故障。


    我的开发虚拟机运行 Oracle Enterprise Linux，承载了 EM 存储库、OMS 和代理。我还在同一个虚拟机中安装并配置了可扩展性开发工具包
    (EDK)。这样，我在一个虚拟机上就拥有了完整的开发环境。值得为您的开发虚拟机保留备份，以防您对 EM12c 存储库造成任何不一致，因为您将在 SYSMAN
    模式以及一些元数据记录中创建和删除对象。


    您可能希望在工作站上进行开发，那里有您喜欢的开发工具和编辑器（我的是 vi，所以在虚拟机上已就绪）。在这种情况下，应在安装 `EDK` 之前先在其中安装 Enterprise
    Manager 命令行接口 (`EMCLI`)。有关安装 `EMCLI` 的详细说明，请参阅第 1 章或在您的 EM12c 控制台中导航到 设置 ![arrow](img/arrow.jpg)
    命令行接口。


    ### 可扩展性开发工具包


    可扩展性开发工具包 (`EDK`) 包含多个组件：

    '
- fmt: '## 工具包内容


    *   用于验证和打包插件的插件开发工具。

    *   参考文档，包含前面提到的两个可扩展性指南的 PDF 版本以及 XML 模式定义文档，其中包含所有可能的 XML 元素——比 PDF 中描述的要多得多，但大多数元素的描述要么缺失，要么非常简略，因此如果您想使用未记录的选项，需要进行大量实验。

    *   插件示例。截至 EDK 12.1.0.2 版本，提供了同一插件的多个变体：即 Host Sample 插件。这些版本在实现的功能上有所不同，变得越来越复杂和丰富。之前的
    EDK 版本只有一个示例插件，文件数量、代码量和实现的功能让初学者简直不知所措，因此真的很难将其用作示例。


    ## 安装 EDK


    安装 EDK 的最佳方式是导航到 EM12c 控制台：选择 Setup ![arrow](images/arrow.jpg) Extensibility ![arrow](images/arrow.jpg)
    Development Kit，然后按照说明操作。简而言之，您需要下载一个压缩的发行版，将其解压缩到您喜欢的文件夹中，并在设置好适当的环境后，就可以调用`empdk`工具。我通常会确保`empdk`和`emcli`都在我的路径中。当需要将
    EDK 位置作为路径的一部分时，我将称其为`<EDK>`。


    请注意，您应该只在受支持的平台之一上运行 EDK。例如，虽然大多数功能在我的 Mac OS X 上有效，但插件打包功能会挂起，因为它是一个不受支持的平台，因为
    EDK 使用 Oracle Universal Installer 来执行其部分功能。


    ![image](images/sq.jpg) **注意**  *Oracle Enterprise Manager Cloud Control Extensibility
    Programmer’s Reference* ([第 1 章](#9781430249382_Ch01.xhtml)，第 1.3 节) 提供了更详细的安装
    EDK 说明。


    ## 部署示例插件


    在继续之前，让我们打包并部署三个随 EDK 提供的示例插件——执行前一节描述的插件生命周期中的步骤 2 和步骤 3。假设您使用的是 Unix/Linux，请转到`<EDK>/samples/utl`并运行`./build_sample_plugin.sh
    oracle.samples.xsh1`。（您可能需要在此之前为脚本添加可执行权限。如果您使用的是 Windows，请查看 shell 脚本内部并修改它以在
    Windows 上运行，或者使用 Windows 记法自行调用命令。）该脚本将在您的主目录中创建 OPAR 包：`12.1.0.0.0_oracle.samples.xsh1_2000_0.opar`。为另外两个更高级的插件版本运行此脚本：`xsh2`和`xsh3`。我们将部署它们，您可以看到插件在开发过程中如何从简单演变为更复杂。现在您的主目录中有三个
    OPAR 文件。


    请注意，创建 OPAR 归档文件会在后台调用 Oracle Universal Installer，因此您需要满足其通用要求，例如有足够的可用交换空间。


    在继续之前，您需要执行一个额外的步骤：配置软件库（Software Library）。（有关更详细的软件库介绍，请参见[第 6 章](#9781430249382_Ch06.xhtml)。）这在安装
    OMS 后只需执行一次，您通常也会为修补和供应功能以及 EM12c 自更新执行此操作。一种方法是使用 EMCLI（您也可以使用 EM12c 控制台添加它）。到现在您应该已经可以让
    EMCLI 工作了，因此使用`emcli login -username=SYSMAN`登录。我也习惯将 EMCLI 与 OMS 同步，所以我运行`emcli
    sync`，但实际上并不需要每次都运行。接下来，创建软件库位置：


    ```

    emcli add_swlib_storage_location -name=swlib -path=/some/path/on/OMS/server

    ```


    如果您认为软件库位置已经配置过，只需运行`emcli list_swlib_storage_locations`进行验证。您需要至少有一个活动位置。


    现在您可以将 OPAR 文件上传到 OMS 了。如果您的 OPAR 文件位于运行 OMS 的同一服务器本地，请使用以下命令上传每个文件：


    ```

    emcli import_update -file=<绝对路径到.opar文件> -omslocal

    ```


    请注意，`emcli`实际上并不上传文件，而只是向 OMS 发送一个命令（在 EMCLI 术语中称为动词）来执行导入操作。如果 OPAR 文件不在 OMS
    本地，您可以指定主机和凭据，以便 OMS 可以从该远程主机检索文件。此示例可以在*Oracle Enterprise Manager Cloud Control
    Extensibility Programmer''s Reference*（[第 13 章](#9781430249382_Ch13.xhtml)，第 13.5.2
    节）中找到。


    ## 部署插件到 OMS


    现在是将插件部署到 OMS 的时候了。这时 OMS 会激活插件的某个版本，并使其目标类型成为其接口和 API 的组成部分，就像数据库实例目标类型一样。您可以通过使用
    EM12c 控制台来部署插件，如*Oracle Enterprise Manager Cloud Control Extensibility Programmer''s
    Reference*（[第 13 章](#9781430249382_Ch13.xhtml)，第 13.5.3 节）所示。但是，我们将在这里使用命令行，因为它更易于重复且文档记录更快。我们将再次使用
    EMCLI：


    ```

    emcli deploy_plugin_on_server -plugin=oracle.samples.xsh1

    ```


    同样部署`oracle.samples.xsh2`和`oracle.samples.xsh3`。请注意，`emcli`会在部署过程中询问 SYS 密码，而不仅仅是
    SYSMAN 密码，大概是因为插件部署需要 SYSDBA 角色。请注意，`emcli`实际上在后台发送了一个部署作业，您可以使用`emcli get_plugin_deployment_status
    -plugin_id=oracle.samples.xsh1`检查进度。


    ## 添加目标类型实例


    最后，高潮部分：添加目标类型实例！您将再次使用`emcli`，以避免在 EM12c 控制台中进行长时间导航和多次截图。对于三个目标类型中的每一个，请使用此命令：


    ```

    emcli add_target -name=''Sample Host 1'' -type=sample_host1 -host=<现有主机名> -properties="sample_host1_username:<操作系统用户>;sample_host1_password:<操作系统密码>"

    ```


    `<现有主机名>`是新插件将部署到的位置。使用您在 EM12c 控制台中为该主机目标看到的确切拼写。对于`<操作系统用户>`和`<操作系统密码>`，您可以使用
    Oracle 用户凭据（实际上，EDK 12.1.0.2.0 中提供的示例插件根本不使用它们，因为它只是以运行本地管理代理的操作系统用户身份运行命令）。为另外两个插件版本运行此命令，递增名称、类型和属性中的索引。您将获得三个示例主机目标。它们都监控同一台服务器（运行代理的本地服务器），但每个目标都提供了逐渐更多的功能。


    为了模拟主机的上/下状态，插件读取`/tmp/hostsample_status`。当文件内容为“up”时，目标被视为启动。请使用命令`echo up >
    /tmp/hostsample_status`在部署目标的主机上初始化该文件。否则，您的 Sample Host X 目标将无限期处于“状态待定”状态。


    ## 基本插件目标类型和指标


    在本节中，您将开始使用位于`<EDK>/samples/plugins/oracle.samples.xsh1`中的最简单的示例 EDK 插件。内部是`plugin_dist`目录，我将其称为暂存区或分段区域。


    ### 暂存区结构


    要使用 EDK 打包插件，其文件必须在暂存区内组织。EDK 定义了需要遵循的特定目录结构。我建议您在开发一开始就创建该目录结构。您将从图 10-8 所示的最简单的结构开始。


    ![9781430249382_Fig10-08.jpg](images/9781430249382_Fig10-08.jpg)


    [图 10-8](#9781430249382_Ch10.xhtml#_Fig8)。插件暂存区结构'
  raw: '*   Plug-in development tool used to verify and package plug-ins.

    *   Reference documentation that includes PDF versions of the two extensibility
    guides noted earlier and XML Schema Definition documentation that contains all
    possible XML elements  much more than described in the PDF but description of
    most of the elements is either missing or very brief so you would be experimenting
    a lot if you want to use undocumented options.

    *   Plug-in samples. As of EDK release 12.1.0.2, multiple variations of the same
    plug-in are provided: the Host Sample plug-in. The versions differ in the functionality
    they implement, becoming progressively more complex and feature rich. The previous
    EDK version had only one sample plug-in, and the amount of files, code, and features
    implemented was simply overwhelming for beginners, so it was really difficult
    to use it as an example.


    The best way to install the EDK is to navigate to the EM12c console: choose Setup
    ![arrow](images/arrow.jpg) Extensibility ![arrow](images/arrow.jpg) Development
    Kit, and follow the instructions. In a nutshell, you download a zipped distribution,
    uncompress it in a folder of your liking, and having set a proper environment,
    you can call the empdk utility. I usually make sure I have both empdk and emcli
    in my path. I will refer to the location of EDK as <EDK> when I need to make it
    part of the path.


    Note that you should run EDK only on one of the supported platforms. For example,
    while most of the functionality works on my Mac OS X, plug-in packaging simply
    hangs as it’s an unsupported platform because EDK uses the Oracle Universal Installer
    to perform some of its functions.


    ![image](images/sq.jpg) **Note**  The *Oracle Enterprise Manager Cloud Control
    Extensibility Programmer’s Reference* ([Chapter 1](#9781430249382_Ch01.xhtml),
    Section 1.3) has more-detailed instructions for installing the EDK.


    Sample Plug-ins Deployment


    Before we proceed, let’s package and deploy three sample plug-ins that are shipped
    with EDK—performing steps 2 and 3 of the plug-in lifecycle described in the previous
    section. Assuming you are on Unix/Linux, go to <EDK>/samples/utl and run ./build_sample_plugin.sh
    oracle.samples.xsh1\. (You might need to add executable permissions to the script
    beforehand. And if you are using Windows instead, look inside the shell script
    and modify it to run on Windows or just call the commands yourself using Windows
    notation.) This script will create the OPAR package in your home directory: 12.1.0.0.0_oracle.samples.xsh1_2000_0.opar.
    Run the script for two other versions of the plug-in, which are more advanced:
    xsh2 and xsh3\. We will deploy them, and you can see how the plug-in evolves during
    development from simple to more complex. You now have three OPAR files in your
    home directory.


    Note that creating an OPAR archive will call the Oracle Universal Installer behind
    the scenes, so you will need to comply with its generic requirements, such as
    having enough free swap space.


    Before going further, you need to perform one extra step: configuring a Software
    Library. (See [Chapter 6](#9781430249382_Ch06.xhtml) for more-detailed Software
    Library coverage.) This is done only once after you install OMS, and you normally
    do it for patching and provisioning functionality as well as for EM12c Self Update.
    One way to do it is to use EMCLI (you can also add it by using the EM12c console).
    By now you should already have EMCLI working, so log in by using emcli login -username=SYSMAN.
    I also have a habit of syncing EMCLI with the OMS, so I run emcli sync, but in
    practice it doesn’t need to run every time. Next, create the Software Library
    location:


    ```

    emcli add_swlib_storage_location -name=swlib -path=/some/path/on/OMS/server

    ```


    If you think that the Software Library location has already been configured, just
    run emcli list_swlib_storage_locations to verify. You need to have at least one
    active location.


    Now you are ready to upload the OPAR files to the OMS. If your OPAR files are
    locally on the same server where the OMS is running, upload each file by using
    the following:


    ```

    emcli import_update -file=<absolute path to .opar file> -omslocal

    ```


    Note that emcli doesn’t actually upload the file but just sends a command to OMS
    (a verb in EMCLI terminology) to perform the import action. If an OPAR file is
    not local to the OMS, you can specify the host and credentials so that OMS can
    retrieve the file from that remote host. This example can be found in the *Oracle
    Enterprise Manager Cloud Control Extensibility Programmer''s Reference* ([Chapter
    13](#9781430249382_Ch13.xhtml), Section 13.5.2).


    Now is the time to deploy the plug-in to the OMS. This is when the OMS activates
    a certain version of the plug-in and makes its target type(s) an integral part
    of its interface and API, just like the Database Instance target type, for example.
    You can deploy a plug-in by using the EM12c console, as indicated in the *Oracle
    Enterprise Manager Cloud Control Extensibility Programmer''s Reference* ([Chapter
    13](#9781430249382_Ch13.xhtml), Section 13.5.3). However, we will use the command
    line here because it’s more repeatable and quicker to document. We will use EMCLI
    again:


    ```

    emcli deploy_plugin_on_server -plugin=oracle.samples.xsh1

    ```


    Also deploy oracle.samples.xsh2 and oracle.samples.xsh3 in the same way. Note
    that emcli will ask for the SYSpassword during deployment and not just SYSMAN,
    presumably because plug-in deployment requires the SYSDBA role. Note that emcli
    actually sends a deployment job in the background, and you can check on the progress
    by using emcli get_plugin_deployment_status -plugin_id=oracle.samples.xsh1.


    And, finally, the culmination: adding the target type instances! You will use
    emcli again to avoid long navigation through the EM12c console and multiple screenshots.
    For each of the three target types, use this command:


    ```

    emcli add_target -name=''Sample Host 1'' -type=sample_host1 -host=<Existing Host
    Name>

    -properties="sample_host1_username:<OS user>;sample_host1_password:<OS pwd>"

    ```


    <Existing Host Name> is where the new plug-in will be deployed. Use the exact
    spelling that you see in the EM12c console for that host target. For <OS user>
    and <OS pwd>, you can use Oracle user credentials (in fact, the sample plug-in
    provided in EDK 12.1.0.2.0 doesn’t use them at all, as it simply runs commands
    as the OS user running the local management agent). Run this command for the two
    other plug-in versions, incrementing the index in the name, type, and properties.
    You will end up with three sample host targets. They are all monitoring the same
    server (the local server where the agent is running), but each provides incrementally
    more functionality.


    To simulate the host’s up/down state, the plug-ins read /tmp/hostsample_status.
    The target is considered up when the content of the file is “up.” Please initialize
    that file on the host where you are deploying by using the command <echo up>/tmp/hostsample_status.
    Otherwise, your Sample Host X targets will be in the Status Pending state indefinitely.


    Basic Plug-in Target Types and Metrics


    In this section, you will start working with the simplest sample EDK plug-in located
    in <EDK>/samples/plugins/oracle.samples.xsh1. Inside is the plugin_dist directory
    that I refer to as the stage or staging area.


    Stage Structure


    To package a plug-in using EDK, its files must be organized within a staging area.
    EDK defines a certain directory structure to be followed. I recommend that you
    create that directory structure right at the beginning of the development. You
    will start with the simplest possible structure shown in [Figure 10-8](#9781430249382_Ch10.xhtml#Fig8).


    ![9781430249382_Fig10-08.jpg](images/9781430249382_Fig10-08.jpg)


    [Figure 10-8](#9781430249382_Ch10.xhtml#_Fig8). Plug-in staging area structure'
  trans: '

    ## 工具包内容


    *   用于验证和打包插件的插件开发工具。

    *   参考文档，包含前面提到的两个可扩展性指南的 PDF 版本以及 XML 模式定义文档，其中包含所有可能的 XML 元素——比 PDF 中描述的要多得多，但大多数元素的描述要么缺失，要么非常简略，因此如果您想使用未记录的选项，需要进行大量实验。

    *   插件示例。截至 EDK 12.1.0.2 版本，提供了同一插件的多个变体：即 Host Sample 插件。这些版本在实现的功能上有所不同，变得越来越复杂和丰富。之前的
    EDK 版本只有一个示例插件，文件数量、代码量和实现的功能让初学者简直不知所措，因此真的很难将其用作示例。


    ## 安装 EDK


    安装 EDK 的最佳方式是导航到 EM12c 控制台：选择 Setup ![arrow](img/arrow.jpg) Extensibility ![arrow](img/arrow.jpg)
    Development Kit，然后按照说明操作。简而言之，您需要下载一个压缩的发行版，将其解压缩到您喜欢的文件夹中，并在设置好适当的环境后，就可以调用`empdk`工具。我通常会确保`empdk`和`emcli`都在我的路径中。当需要将
    EDK 位置作为路径的一部分时，我将称其为`<EDK>`。


    请注意，您应该只在受支持的平台之一上运行 EDK。例如，虽然大多数功能在我的 Mac OS X 上有效，但插件打包功能会挂起，因为它是一个不受支持的平台，因为
    EDK 使用 Oracle Universal Installer 来执行其部分功能。


    ![image](img/sq.jpg) **注意**  *Oracle Enterprise Manager Cloud Control Extensibility
    Programmer’s Reference* (第 1 章，第 1.3 节) 提供了更详细的安装 EDK 说明。


    ## 部署示例插件


    在继续之前，让我们打包并部署三个随 EDK 提供的示例插件——执行前一节描述的插件生命周期中的步骤 2 和步骤 3。假设您使用的是 Unix/Linux，请转到`<EDK>/samples/utl`并运行`./build_sample_plugin.sh
    oracle.samples.xsh1`。（您可能需要在此之前为脚本添加可执行权限。如果您使用的是 Windows，请查看 shell 脚本内部并修改它以在
    Windows 上运行，或者使用 Windows 记法自行调用命令。）该脚本将在您的主目录中创建 OPAR 包：`12.1.0.0.0_oracle.samples.xsh1_2000_0.opar`。为另外两个更高级的插件版本运行此脚本：`xsh2`和`xsh3`。我们将部署它们，您可以看到插件在开发过程中如何从简单演变为更复杂。现在您的主目录中有三个
    OPAR 文件。


    请注意，创建 OPAR 归档文件会在后台调用 Oracle Universal Installer，因此您需要满足其通用要求，例如有足够的可用交换空间。


    在继续之前，您需要执行一个额外的步骤：配置软件库（Software Library）。（有关更详细的软件库介绍，请参见第 6 章。）这在安装 OMS 后只需执行一次，您通常也会为修补和供应功能以及
    EM12c 自更新执行此操作。一种方法是使用 EMCLI（您也可以使用 EM12c 控制台添加它）。到现在您应该已经可以让 EMCLI 工作了，因此使用`emcli
    login -username=SYSMAN`登录。我也习惯将 EMCLI 与 OMS 同步，所以我运行`emcli sync`，但实际上并不需要每次都运行。接下来，创建软件库位置：


    ```

    emcli add_swlib_storage_location -name=swlib -path=/some/path/on/OMS/server

    ```


    如果您认为软件库位置已经配置过，只需运行`emcli list_swlib_storage_locations`进行验证。您需要至少有一个活动位置。


    现在您可以将 OPAR 文件上传到 OMS 了。如果您的 OPAR 文件位于运行 OMS 的同一服务器本地，请使用以下命令上传每个文件：


    ```

    emcli import_update -file=<绝对路径到.opar 文件> -omslocal

    ```


    请注意，`emcli`实际上并不上传文件，而只是向 OMS 发送一个命令（在 EMCLI 术语中称为动词）来执行导入操作。如果 OPAR 文件不在 OMS
    本地，您可以指定主机和凭据，以便 OMS 可以从该远程主机检索文件。此示例可以在*Oracle Enterprise Manager Cloud Control
    Extensibility Programmer''s Reference*（第 13 章，第 13.5.2 节）中找到。


    ## 部署插件到 OMS


    现在是将插件部署到 OMS 的时候了。这时 OMS 会激活插件的某个版本，并使其目标类型成为其接口和 API 的组成部分，就像数据库实例目标类型一样。您可以通过使用
    EM12c 控制台来部署插件，如*Oracle Enterprise Manager Cloud Control Extensibility Programmer''s
    Reference*（第 13 章，第 13.5.3 节）所示。但是，我们将在这里使用命令行，因为它更易于重复且文档记录更快。我们将再次使用 EMCLI：


    ```

    emcli deploy_plugin_on_server -plugin=oracle.samples.xsh1

    ```


    同样部署`oracle.samples.xsh2`和`oracle.samples.xsh3`。请注意，`emcli`会在部署过程中询问 SYS 密码，而不仅仅是
    SYSMAN 密码，大概是因为插件部署需要 SYSDBA 角色。请注意，`emcli`实际上在后台发送了一个部署作业，您可以使用`emcli get_plugin_deployment_status
    -plugin_id=oracle.samples.xsh1`检查进度。


    ## 添加目标类型实例


    最后，高潮部分：添加目标类型实例！您将再次使用`emcli`，以避免在 EM12c 控制台中进行长时间导航和多次截图。对于三个目标类型中的每一个，请使用此命令：


    ```

    emcli add_target -name=''Sample Host 1'' -type=sample_host1 -host=<现有主机名> -properties="sample_host1_username:<操作系统用户>;sample_host1_password:<操作系统密码>"

    ```


    `<现有主机名>`是新插件将部署到的位置。使用您在 EM12c 控制台中为该主机目标看到的确切拼写。对于`<操作系统用户>`和`<操作系统密码>`，您可以使用
    Oracle 用户凭据（实际上，EDK 12.1.0.2.0 中提供的示例插件根本不使用它们，因为它只是以运行本地管理代理的操作系统用户身份运行命令）。为另外两个插件版本运行此命令，递增名称、类型和属性中的索引。您将获得三个示例主机目标。它们都监控同一台服务器（运行代理的本地服务器），但每个目标都提供了逐渐更多的功能。


    为了模拟主机的上/下状态，插件读取`/tmp/hostsample_status`。当文件内容为“up”时，目标被视为启动。请使用命令`echo up >
    /tmp/hostsample_status`在部署目标的主机上初始化该文件。否则，您的 Sample Host X 目标将无限期处于“状态待定”状态。


    ## 基本插件目标类型和指标


    在本节中，您将开始使用位于`<EDK>/samples/plugins/oracle.samples.xsh1`中的最简单的示例 EDK 插件。内部是`plugin_dist`目录，我将其称为暂存区或分段区域。


    ### 暂存区结构


    要使用 EDK 打包插件，其文件必须在暂存区内组织。EDK 定义了需要遵循的特定目录结构。我建议您在开发一开始就创建该目录结构。您将从图 10-8 所示的最简单的结构开始。


    ![9781430249382_Fig10-08.jpg](img/9781430249382_Fig10-08.jpg)


    图 10-8。插件暂存区结构

