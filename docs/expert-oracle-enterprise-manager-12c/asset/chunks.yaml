    2000. He worked as a development and production DBA, trainer, and software developer.
    He has a strong background in Linux and Solaris systems. He''s an Oracle Certified
    Professional (OCP) for Oracle Database 10g and 11g, and has hands-on experience
    with Oracle 11g/10g/9i/8i. He is an active member of the Oracle community and
    has written and presented papers at various conferences. He''s also a founding
    member of the Turkish Oracle User Group (TROUG). He was honored with the Oracle
    ACE award in 2011. He has a blog in which he has shared his experience with Oracle
    since 2008: `www.gokhanatil.com`.


    ![image](images/9781430249382_unFM-04.jpg)


    **Bobby Curtis** is a solution architect at BIAS Corporation in Atlanta, Georgia.
    He has been a database administrator for 11 of his 17 years in the IT industry,
    with experience in Oracle, MS SQL Server, MySQL, and Sybase. Bobby specializes
    in database implementation, configuration, and data integration for enterprise-level
    databases and monitoring tools. He is a member of the Georgia Oracle Users Group
    (GOUSER), Independent Oracle User Group (IOUG), and Oracle Developer Tools User
    Group (ODTUG). Bobby is also certified in Oracle GoldenGate, Oracle Enterprise
    Manager 11, Oracle Enterprise Manager 12c, and Oracle Exadata. He now puts particular
    focus on the Oracle Database Appliance.


    ![image](images/9781430249382_unFM-05.jpg)


    Few DBAs are as well equipped as **Alex Gorbachev** to handle any kind of database
    scenario. Alex has architected and designed numerous successful database solutions
    addressing challenging business requirements. Alex is a respected figure in the
    Oracle world and a sought-after leader and speaker at Oracle conferences around
    the globe. He regularly publishes articles on the Pythian blog and runs online
    webinars. Alex is a member of the OakTable Network and an Oracle ACE Director.


    Today, Alex is working at The Pythian Group. He started at Pythian in Ottawa,
    leading a team of database experts before moving to Australia to embrace the challenges
    of setting up company business in the East Asia/Pacific region. Now he''s back
    in Ottawa as Pythian''s chief technology officer, continuing to bridge the gap
    between business and technology. The search for the perfect fit between technology,
    engineering talents, and business processes is what keeps him up at night.


    **Niall Litchfield** is a DBA of 15 years standing, with extensive experience
    running databases on various x86(64) platforms, and with a particular bias toward
    Microsoft Windows. Niall began professional life as a “bean counter” for KPMG
    and consequently is a DBA who respects auditors, mainly because they have to stand
    in unheated warehouses in the middle of winter watching other people count things,
    something he never wants to do again. His dad was a real engineer, crafting genuinely
    useful objects with fine tolerances, and that, coupled with an early experience
    in which he showed that the two competing macroeconomic theories of the time both
    explained actual behavior equally well, and that neither explained it adequately,
    rather explains his evidence-based approach to databases in general and performance
    tuning in particular.


    ![image](images/9781430249382_unFM-06.jpg)


    **Leighton Nelson** is an Oracle Certified database administrator and is a Lead
    Oracle DBA at Mercy, Saint Louis. He has over ten years of experience working
    with Oracle database products and currently spends his time working on database
    management, performance tuning, high availability, and backup and recovery. Leighton
    is an active member of the Oracle community. He often speaks at regional conferences
    across the United States, including Oracle Open World and IOUG Collaborate. He
    currently serves as the Oracle RAC SIG US Events Chairperson and IOUG Liaison.
    In addition to his speaking engagements, Leighton shares his experience with working
    with various Oracle products by blogging at `blogs.griddba.com` and by tweeting
    at his twitter handle `@leight0nn`. Leighton resides in Saint Louis, MO with his
    wife Kerrine and their four sons Casani, Brandon, Justin and Matthew.


    ![image](images/9781430249382_unFM-07.jpg)


    **Pete Sharman** is a Principal Product Manager with the Enterprise Manager product
    suite group in the Server Technologies Division at Oracle Corporation. He has
    worked with Oracle for the past 18 years in a variety of roles from Education
    to Consulting to Development, and has used Enterprise Manager since its 0.76 beta
    release. Pete is a member of the Oak Table Network, and has presented at conferences
    around the world from Oracle Open World (both in Australia and the US), RMOUG
    Training Days, the Hostsos Conference, Miracle Open World, and AUSOUG and NZOUG
    conferences. He has previously authored a book on how to pass the Oracle8i Database
    Administration exam for the Oracle Certified Professional program. He lives in
    Canberra, Australia, with his wife and three children.


