- '# 14. 总结、结论与后续步骤


  ### 总结


  恭喜！这是我们的最后一章。让我们通过总结所学内容，并查看我们工具包中的工具以及获取途径来结束。我甚至可能会告诉你如何创建数据库并加载数据！我们还将讨论如何设置用于存储代码和物理数据库文件的文件夹。


  我建议你先创建文件夹、创建数据库并加载数据，这样在阅读各章节时，你就可以跟着一起操作和练习。




  ## 我们的历程


  本书的目标是汇集一套可用于执行商业智能分析、数据挖掘和数据分析的工具。我亲切地称之为 SQL Server 工具包。


  我首先识别了自 2012 年以来 SQL Server 中可用的三类函数：

  - 聚合函数

  - 排名函数

  - 分析函数


  这些函数与 `OVER()` 子句结合使用时，被视为窗口函数，并提供了强大的功能，例如跨月、日、年等时间跨度创建滚动计算。它们甚至允许我们在一组历史数据中向后和向前遍历，以便将当前值（在某个时间点）与未来或过去的值进行比较。最后但同样重要的是，一些函数可用于执行统计分析，例如在数据集中计算标准差、方差、均值和中位数值。


  我们将这些函数应用于四个行业，以了解如何在每个行业中执行分析：

  - 销售用例

  - 财务用例

  - 发电厂设备监控和故障分析用例

  - 库存移动管理用例


  在此过程中，我意识到这些工具只是 BI 数据分析策略版图的一部分。我介绍了多种工具，如 SSIS、SSRS、SSAS、Power BI、Report Builder
  和 Microsoft Excel，以帮助我们可视化利用窗口函数的查询结果。


  这些工具使我们能够生成、查看和分析业务分析师会用来报告公司绩效的有趣模式。最后，我们研究了一些性能分析工具，例如估计查询计划，它使我们能够分析查询性能并制定改进策略。


  让我们回顾一下这些工具，并通过向您展示如何获取它们（下载、安装和配置）来总结！但首先，关于代码的说明。


  ## 关于代码


