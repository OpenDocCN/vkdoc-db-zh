  \n这是 Microsoft Excel 窗口的截图。其中有一个包含 5 列和 13 行的表格。列标题分别为：季度、月份、月末日期、平均值、累积分布。图中还有一个累积分布与平均库存数量的折线图，显示出两条上升趋势。\n\
  \n图 13-2\n累积分布，平均库存数量\n\n我稍微修改了名称并添加了一些格式，使报告看起来更专业。结果现在按月份排序。我们可以看到一个有趣的上升趋势图。如果你想查看小于特定值的实际值及其出现时间，请按平均值对数据集进行排序，然后你可以看到这些值及其出现的月份。\n\
  \n查询性能和分析时间。\n\n### 性能考虑\n\n像往常一样，让我们首先按常规方式生成基线估计查询计划。\n\n请参考图 13-3。\n\n![](img/527021_1_En_13_Fig3_HTML.png)\n\
  \n这是 SQL Server Management Studio (SSMS) 窗口的截图。它展示了一个包含 14 个组件的查询计划。这些组件是：嵌套循环成本、表假脱机、段、计算标量、排序、计算标量、流聚合、排序、计算标量、索引查找、嵌套循环、流聚合以及两个表假脱机。\n\
  \n图 13-3\n平均库存数量的累积分布查询计划\n\n我们将专注于计划的右侧。左侧的成本均为零，因此为了节省章节篇幅，我们将不讨论它们。但请务必自行审阅这些部分。此外，请务必将鼠标悬停在感兴趣的任务上以显示详细信息面板。作为开发人员或架构师，你需要成为查询性能调优方面的专家！\n\
  \n回到该计划，没有建议创建索引。因此我们有一个良好的开端。我们看到一个索引查找，成本为 12%（请记住，索引查找优于扫描）。下一个昂贵的任务是两个排序任务，合计占\
  \ 43%；除了左侧的嵌套循环任务外，其余任务成本均为零。较低的分支也有零成本的任务，两个分支在一个嵌套循环（内连接）任务处汇合。\n\n总的来说，这似乎是一个性能良好的查询。让我们看看\
  \ `IO` 和 `TIME` 统计信息。\n\n请参考图 13-4。\n\n![](img/527021_1_En_13_Fig4_HTML.jpg)\n\n\
  这是 SQL Server Management Studio (SSMS) 窗口的截图。文本显示了 IO 和 TIME 统计信息。SQL Server 解析和编译时间（CPU\
  \ 和耗时）分别为 47 毫秒和 141 毫秒。SQL Server 执行时间（CPU 和耗时）分别为 0 毫秒和 10 毫秒。两个表受影响的行数为 12。\n\
  \n图 13-4\n平均库存数量累积分布的 `IO` 和 `TIME` 统计信息\n\n解析和编译耗时 141 毫秒，执行耗时 10 毫秒。可以看出，扫描计数为\
  \ 15 次，逻辑读取为 100 次。Warehouse 表的扫描计数为 1，逻辑读取值为 3，物理读取值为 2（请记住这个模式 1-3-2；它还会再次出现）。\n\
  \n检查 Warehouse 表的行数，我们看到它包含 24,288 行。不算太大，但足以引发物理读取。\n\n如果我们修改此查询，使其没有 `WHERE` 子句，就可以在\
  \ `SSRS` 报告中使用它。当存在益处时（例如 `CTE` 返回数十万行），我们需要考虑使用我们行之有效的报告表方法结合历史数据，也就是说，使用此查询的结果预加载表，这样当分析师使用网络报告时性能会很快。可能还需要添加一些索引来覆盖主数据列，如位置、库存等。此数据一次性加载所有可用记录，随着时间的推移，只加载新增或更新的记录。\n\
  \n\n### FIRST_VALUE( ) 与 LAST_VALUE( ) 函数\n\n接下来我们要学习的是这两个窗口函数。还记得它们吗？\n\n给定一组已排序的值，`FIRST_VALUE()`\
  \ 函数将返回分区中的第一个值。因此，根据你是按升序还是降序排序，这个值会有所不同！\n\n这是数据分区中第一个位置的值，不一定是数据集中的最小值。初次接触这个函数时，这一点很容易被误解。人们可能会错误地认为“first\
  \ value（第一个值）”意味着最小值，而“last value（最后一个值）”意味着最大值。\n\n接下来，给定一组已排序的值，`LAST_VALUE()`\
  \ 函数将返回分区中的最后一个值。同样，根据你如何对分区进行排序，这个值也会如前所述那样发生变化。\n\n这两个函数都会返回作为参数传入的任何数据类型。顺便说一下，这个参数可以是整数、字符串、日期等。如果这里有点不清楚，你可以创建一个自己的表变量，包含十行或更多行数据，然后写一些查询来测试，这样就能看到这些窗口函数是如何工作的。稍加练习，窗口函数的用法和结果就会变得清晰明了。\n\
  \n**提示**\n\n在学习像这样的新函数时，总是使用小型、简单的数据集进行练习，这样函数的行为就能清晰地显现出来。此外，当你运行估计执行计划和统计数据时，这也有助于你理解查询的性能表现。没有什么比运行一个需要数小时、返回数百万行数据，最后才发现你所使用的逻辑是错误的查询更糟糕的了！\n\
  \n让我们直接来看示例。以下是我们的业务需求说明：\n\n需要一份报告，按月显示我们指定的位置“LOC1”、库存“INV1”、仓库“WH112”和产品“P010”的平均库存水平是上升还是下降。结果需要是滚动计算的。也就是说，随着月份推移，我们想要获取该年第一个月和最后一个月的值。日历年份是\
  \ 2002 年，所以我们需要在`WHERE`子句中指定它。\n\n第一个值将是 1 月份的值，并且不会改变。随着分区增长，为了考虑下一个月，新月份的平均值将成为最后一个值。我们需要在逐月滚动时计算差值。\n\
  \n基于这些业务需求，我们想出了以下方案。我们将查看查询的基础部分，因为使用的`CTE`与之前的查询相同。请参考 `代码清单 13-2`。\n\n```sql\n\
  /* CTE 此处省略 */\nSELECT AsOfYear\n,AsOfQuarter\n,CASE\nWHEN DATEPART(qq,AsOfDate)\
  \ = 1 THEN '第 1 季度'\nWHEN DATEPART(qq,AsOfDate) = 2 THEN '第 2 季度'\nWHEN DATEPART(qq,AsOfDate)\
  \ = 3 THEN '第 3 季度'\nWHEN DATEPART(qq,AsOfDate) = 4 THEN '第 4 季度'\nEND AS AsOfQtrName\n\
  ,AsOfMonth\n,CASE\nWHEN AsOfMonth = 1 THEN '一月'\nWHEN AsOfMonth = 2 THEN '二月'\n\
  WHEN AsOfMonth = 3 THEN '三月'\nWHEN AsOfMonth = 4 THEN '四月'\nWHEN AsOfMonth = 5 THEN\
  \ '五月'\nWHEN AsOfMonth = 6 THEN '六月'\nWHEN AsOfMonth = 7 THEN '七月'\nWHEN AsOfMonth\
  \ = 8 THEN '八月'\nWHEN AsOfMonth = 9 THEN '九月'\nWHEN AsOfMonth = 10 THEN '十月'\nWHEN\
  \ AsOfMonth = 11 THEN '十一月'\nWHEN AsOfMonth = 12 THEN '十二月'\nEND AS AvgMonthName\n\
  ,AsOfDate\n,LocId\n,InvId\n,WhId\n,ProdId\n,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n\
  ,FIRST_VALUE(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear\nORDER BY AsOfDate\n) AS\
  \ FirstValue\n,LAST_VALUE(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear\nORDER BY\
  \ AsOfDate\n) AS LastValue\n,LAST_VALUE(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear\n\
  ORDER BY AsOfDate\n) -   FIRST_VALUE(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear\n\
  ORDER BY AsOfDate\n) AS Change\nFROM YearlyWarehouseReport\nWHERE AsOfYear = 2002\n\
  AND ProdId = 'P101'\nAND Locid = 'LOC1'\nAND InvId = 'INV1'\nAND WhId = 'WH112'\n\
  GO\n代码清单 13-2\n滚动计算首尾值的月度平均值\n```\n\n我们使用了累计分布示例中的查询，并将 `CUME_DIST()` 函数替换为了 `FIRST_VALUE()`\
  \ 和 `LAST_VALUE()` 函数。这是一个非常简单的修改。当你在日常工作中提出解决方案时，你会希望尽可能多地重用查询和脚本，以避免重复造轮子。这些是你可以重用和修改以满足新业务需求的工具箱组件、脚本和查询的其他示例。\n\
  \n**提示**\n\n创建一个专用文件夹来存储你所有的脚本、模板和查询。这样，对于每个新的编码任务，它们都能随时可用。这些也是你工具箱的一部分！\n\n两个\
  \ `OVER()` 子句都有一个 `PARTITION BY` 子句和一个 `ORDER BY` 子句。分区是按年份设置的，而 `ORDER BY` 子句是按\
  \ `AsOfDate` 而不是 `AsOfMonth` 设置的。`AsOfDate` 恰好是该月的最后一天，所以这样也能工作。为了避免查询逻辑上的混淆，我们本应该使用\
  \ `AsOfMonth` 值，但当前写法也能达到目的。\n\n让我们看看结果。请参考 `图 13-5` 中的部分结果。\n\n![](img/527021_1_En_13_Fig5_HTML.png)\n\
  \nSQL Server Management Studio (SSMS) 窗口截图。图中显示一个包含 15 列 13 行的表格。列标题分别为：截止年份、截止季度、截止季度名称、截止月份、平均月份名称、截止日期、位置\
  \ ID、库存 ID、仓库 ID、产品 ID、月度平均值、首值、尾值和变化量。\n\n`图 13-5`\n\n月度平均库存量、首值和尾值\n\n这些是很好的结果，分析师可以用来逐月分析平均库存变化。当然，这只是针对一年的数据，但你知道我们可以移除筛选条件，使用这个查询来填充一个报告表，该表可以被\
  \ `SSRS` 报告访问，允许用户设置适合他们希望分析的模式的过滤器。或者，也许可以将其用于 Excel 电子表格中的数据透视表，或用于 `SSAS` 多维数据集的非规范化表，甚至用于\
  \ `Power BI` 计分卡。\n\n这就是性能调优如此重要的原因。为一年返回 12 行数据，与为多个地点、库存、仓库和产品返回成千上万行数据（这也容易验证）相比，差异巨大。\n\
  \n注意我们逐月计算的变化量。这些数据放在 Microsoft Excel 电子表格中会非常直观，所以我们来做一下常规的复制粘贴操作。\n\n请参考 `图 13-6`。\n\
  \n![](img/527021_1_En_13_Fig6_HTML.png)\n\nMicrosoft Excel 窗口截图。图中显示一个包含 5 列 13\
  \ 行的表格。列标题分别为：月份、平均值、首值、尾值和变化量。还有一个变化量相对于月度平均值的瀑布图，柱状图显示了波动上升的趋势，分别代表增加、减少和总量。\n\
  \n`图 13-6`\n\nExcel 首尾值分析\n\n这是另一项分析，能让业务分析师识别库存变动是上升还是下降，从而指示销售额是上升还是下降。如果库存增加而不是减少，那么销售分析师就需要与营销团队开会，了解产品为何未能售出而仍留在库存中。这涉及详细分析以找出销售额低的门店及其原因（如果你正在阅读电子书，这里的颜色会非常醒目）！\n\
  \n#### 性能考量\n\n这是我们通常的基线估计执行计划。\n请参考图 13-7。\n\n![](img/527021_1_En_13_Fig7_HTML.png)\n\
  \n`SQLSSMS` 窗口的截图。它展示了一个包含 9 个组件的基线估计执行计划。这些组件分别是窗口假脱机、段、段、计算标量、计算标量、流聚合、排序、竞争标量和索引查找。排序和索引查找的成本分别为\
  \ 77% 和 22%。\n\n**图 13-7** 首尾值基线估计性能计划\n\n看起来这是一个性能不错的查询。没有建议新的索引，并且通过索引查找（成本 22%）可以看到正在使用一个现有索引。\n\
  这反映了真实的生产环境，也就是说，随着创建的查询越来越多，会识别出新的索引需求并创建索引，这些索引随后可供未来的查询使用。因此，理论上当你创建新查询时，你不必每次都创建新索引。这至少是我们的目标。\n\
  \n> **注意**\n>\n> 请记住，索引可能会加速查询，但会减慢行插入、更新和删除操作。索引需要为这些操作进行更新，因此索引越多，你看到的性能就越慢。\n\
  \n我差点忘了，那个成本占 77% 的排序任务是需要关注的。这个值很高。设置 `PROFILE STATISTICS ON,` 后，我们看到该任务是按 `AsOfDate`\
  \ 列、一个表达式和 `AsOfMonth` 进行排序。\n结果发现该表达式是用于提取日历季度的 `DATEPART()` 函数。所以这里有一些需要优化的代码。\n\
  \n让我们用一些 `IO` 和 `TIME` 统计信息来完成分析。请参考图 13-8。\n\n![](img/527021_1_En_13_Fig8_HTML.jpg)\n\
  \n`SQLSSMS` 窗口的截图。文本展示了 `IO` 和 `TIME` 统计信息。`SQL` 服务器解析和编译时间的 `CPU` 和耗时分别为 15 和 110\
  \ 毫秒。`SQL` 服务器执行时间的 `CPU` 和耗时分别为 0 和 10 毫秒。影响了 2 个表中的 12 行。\n\n**图 13-8** `IO` 和\
  \ `TIME` 统计信息\n\n该查询在 10 毫秒内执行完毕，不到一秒（解析时间为 110 毫秒）。我们看到扫描计数值为 13，逻辑读取次数为 73，有点高。\n\
  扫描计数、逻辑读取和物理读取的模式是相同的：1-3-2。这很合理。我们使用的是同一个表。\n可能将此查询与我们之前创建的增强版日历表连接，以提取日历季度文本，而不是从日期中提取生成，可能是一个更好的解决方案，但需要考虑表\
  \ `JOIN` 的成本。此策略也将移除用于将季度和月份数值解码为其对应文本值的 `CASE` 代码块。\n\n> **提示**\n>\n> 尽可能避免使用像\
  \ `DATEPART()` 这样的函数，尤其是在 `WHERE` 子句的谓词中。这会影响性能。\n\n不甘落后，我们转到下一个函数。（是的，一个糟糕的双关语。我能想象技术审稿人翻白眼的样子！）\n\
  \n### LAG( ) 函数\n\n回顾一下 `LAG()` 函数的作用：\n此函数用于检索相对于当前行的列值（通常在时间维度内）的前一行的列值，在我们的例子中是库存移动日期。\n\
  这个查询可以帮助回答类似这样的问题：\n当前月份与上个月、上个季度或去年相比如何？\n这是 `LEAD()` 函数的对应函数，我们接下来会看到。以下是我们分析师想要的查询规范：\n\
  我们的业务分析师希望我们修改前一个查询，使其不仅显示当前平均月库存值，还要显示前一个月、前三个月和前 12 个月的平均值（对应同一个月）：\n\n*   1：回退一个月。\n\
  *   3：回退三个月（相对于当前月份的一个季度）。\n*   12：回退 12 个月（相对于当前月份的一年）。\n\n需要相同的日期对象，即明确写出季度和月份名称。并且按相同的产品、地点、库存和仓库进行筛选。报告必须跨越三年：2002、2003\
  \ 和 2004 年。\n复制粘贴我们上一个查询并稍作修改，得到如下查询。注意 `CTE` 没有复制，因为它与前一个示例中的相同。\n请参考代码清单 13-3。\n\
  \n```sql\n/* CTE 在此 */\nSELECT AsOfYear\n      ,AsOfQuarter\n      ,CASE\n     \
  \      WHEN DATEPART(qq,AsOfDate) = 1 THEN '1st Quarter'\n           WHEN DATEPART(qq,AsOfDate)\
  \ = 2 THEN '2nd Quarter'\n           WHEN DATEPART(qq,AsOfDate) = 3 THEN '3rd Quarter'\n\
  \           WHEN DATEPART(qq,AsOfDate) = 4 THEN '4th Quarter'\n       END AS AsOfQtrName\n\
  \      ,AsOfMonth\n      ,CASE\n           WHEN AsOfMonth = 1 THEN 'Jan'\n     \
  \      WHEN AsOfMonth = 2 THEN 'Feb'\n           WHEN AsOfMonth = 3 THEN 'Mar'\n\
  \           WHEN AsOfMonth = 4 THEN 'Apr'\n           WHEN AsOfMonth = 5 THEN 'May'\n\
  \           WHEN AsOfMonth = 6 THEN 'June'\n           WHEN AsOfMonth = 7 THEN 'Jul'\n\
  \           WHEN AsOfMonth = 8 THEN 'Aug'\n           WHEN AsOfMonth = 9 THEN 'Sep'\n\
  \           WHEN AsOfMonth = 10 THEN 'Oct'\n           WHEN AsOfMonth = 11 THEN\
  \ 'Nov'\n           WHEN AsOfMonth = 12 THEN 'Dec'\n       END AS AvgMonthName\n\
  \      ,AsOfDate\n      ,LocId\n      ,InvId\n      ,WhId\n      ,ProdId\n     \
  \ ,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n      ,LAG(AvgQtyOnHand,1,0) OVER (\n  \
  \         ORDER BY AsOfDate\n       ) AS PriorMonthAverage\n      ,LAG(AvgQtyOnHand,3,0)\
  \ OVER (\n           ORDER BY AsOfDate\n       ) AS PriorQuarterAverage\n      ,LAG(AvgQtyOnHand,12,0)\
  \ OVER (\n           ORDER BY AsOfDate\n       ) AS PriorYearAverage\n      ,AvgQtyOnHand\
  \ -LAG(AvgQtyOnHand,1,0)\n                    OVER (\n                         ORDER\
  \ BY AsOfDate\n                    ) AS Change\n      ,AvgQtyOnHand -LAG(AvgQtyOnHand,1,0)\n\
  \                    OVER (\n                         PARTITION BY AsOfYear\n  \
  \                       ORDER BY AsOfDate\n                    ) AS Change\nFROM\
  \ YearlyWarehouseReport – the CTE\nWHERE AsOfYear = 2002\n  AND ProdId = 'P101'\n\
  \  AND Locid = 'LOC1'\n  AND InvId = 'INV1'\n  AND WhId = 'WH112'\nGO\n```\n**代码清单\
  \ 13-3** 当前月移动与上个月、季度和年的对比\n\n我们来分析这三个 `LAG()` 函数。\n首先，没有为年份设置分区，因为我们希望结果跨越数据集中的所有年份。每个分区都有一个\
  \ `ORDER BY` 子句，引用了 `AsOfDate` 列。唯一的区别是每个 `LAG()` 函数使用不同的参数来指定我们需要回退的时间段：\n\n* \
  \  1：回退一个月。\n*   3：回退三个月（相对于当前月份的一个季度）。\n*   12：回退 12 个月（相对于当前月份的一年）。\n\n列名具有误导性，因为它们不代表实际的季度或年份，而是代表回退三个月或\
  \ 12 个月（好吧，我留给你们来想出更好的名字）。\n参数“0”表示当我们到达边界起点时，需要显示“0”而不是 `NULL` 值。也就是说，没有前一行可以满足\
  \ `LAG()` 函数所需的时间跨度。\n最后，对于当前/前一个月的组合，我们包含了一个简单的公式，通过从当前月的平均值中减去 `LAG()` 函数返回的值来计算变化。\n\
  \n#### 课后作业\n\n\n修改查询，使其还能生成当前月与上月之间的百分比变化。如果你有雄心壮志，也可以对季度和年份做同样的处理（加分项！）。提示：你可以复用生成变化值的代码并稍作修改，使其返回一个百分比。可能还需要添加逻辑来显示过去六个月的数据。这将是一份强大的报告。查看一下此查询的预估性能执行计划。\n\
  \n请参考图 13-9 中的部分结果。\n\n![](img/527021_1_En_13_Fig9_HTML.png)\n\n一张 SQL SSMS 窗口的截图，包含一个\
