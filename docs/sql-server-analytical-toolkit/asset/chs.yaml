  制作数据透视表时，可以取消注释。


  接下来，我们看到我们试图通过连接到 `Calendar` 维度表并使用内联表生成季度名称来满足需求，这是首先想到的办法，但却是错误的设计，尽管如果你喜欢让复杂代码过度复杂化解决方案的话，它看起来很巧妙！


