  \n\n### `LAG()` 与 `LEAD()`\n\n这些是在您的编程工具箱中用于分析数据时非常重要的函数。您的业务分析师所执行的活动之一，是在本质上属于历史的数据集中，进行回顾性或前瞻性的观察。当然，这些数据可能是一个包含当前和过去数据、但不包含未来数据的快照。这些函数允许您创建强大的查询和报告来实现这一目标。\n\
  \n`LAG()` 函数的功能如下：\n\n此函数用于获取当前行某一列值之前某一行的列值。例如，给定某产品本月的销售额，获取该产品上个月的销售额，或者指定某个偏移量，比如三个月前甚至一年或更久以前，这取决于您收集了多少历史数据以及您的业务用户希望看到什么。\n\
  \n`LEAD()` 函数的功能如下：\n\n此函数用于获取当前行某一列值之后某一行的列值。例如，给定某产品本月的销售额，获取该产品下个月的销售额或者指定某个偏移量，比如三个月后甚至一年后。\n\
  \n这些函数在需要分析历史销售业绩或当前业绩与过去业绩对比的销售场景中尤为方便。\n\n现在我们有了一个内存优化表，我们将用它来代替本章大部分示例中使用的`CTE`方案。性能应该会非常快！\n\
  \n请参考代码清单 3-14。\n\n```\nSELECT\nSalesYear,\nSalesQuarter,\nSalesMonth,\nStoreNo,\n\
  ProductNo,\nCustomerNo,\nCalendarDate AS SalesDate,\nSalesTotal,\nLAG(SalesTotal)\
  \ OVER (\nPARTITION BY SalesYear,CustomerNo\nORDER BY SalesMonth,CustomerNo,CalendarDate\n\
  ) AS LastMonthlySales,\nLEAD(SalesTotal) OVER (\nPARTITION BY SalesYear,CustomerNo\n\
  ORDER BY SalesMonth,CustomerNo,CalendarDate\n) AS NextMonthylSales\nFROM [SalesReports].[MemorySalesTotals]\n\
  WHERE StoreNO = 'S00005'\nAND SalesYear = 2002\nGO\n```\n\n**代码清单 3-14**\n运行中的 `LAG()`\
  \ 和 `LEAD()` 函数\n\n这一次，我们加入了商店编号和年份的过滤条件来运行查询。该查询生成了 902 行（就 SQL Server 而言，这仍然不算多行）。\n\
  \n执行时间不到一秒。请参考图 3-13 中的部分结果。\n\n![](img/527021_1_En_3_Fig13_HTML.png)\n\n第 03 章\
  \ T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了一个结果表。该表有 9 列。“上月销售额”和“下月销售额”列的部分值被高亮显示。\n\n\
  **图 3-13**\n测试脚本的查询结果\n\n我向下滚动了一点，这样当窗口框架移动到下一个分区时，您可以看到数据模式。注意红色箭头。我们可以看到 `LastMonthlySales`\
  \ 列指向了前一个月的值，而 `NextMonthlySales` 列指向了 `SalesTotal` 列中下个月的值。\n\n我们可以在第 41 行和第 42\
  \ 行看到窗口框架的动作。当下个月的销售额在分区变更时被设置为 `NULL`，第 42 行的前一个月的销售额值也是 `NULL`，因为我们正在开始一个新的分区（请记住分区与分区内窗口框架之间的区别）。\n\
  \n下载脚本并移除年份的过滤条件，这样您就能获得该商店所有年份的数据。如果您不仅需要所有年份，还需要所有商店的数据，您可能需要稍微调整一下排序顺序，以便所有内容正确对齐。\n\
  \n这就是为什么我总是建议在创建复杂的脚本或查询时，从一个小型数据集开始。当您确定它工作正确时，您可以通过移除任何过滤器来扩大范围。\n\n#### 性能考量\n\
  \n接下来，我们将看看与这些函数相关的性能问题以及一些可能的提高性能的解决方案。和往常一样，我们的第一步是按照通常的方式创建一个估计的查询计划。请确保首先运行\
  \ `DBCC` 命令来清除缓冲区。\n\n请参考图 3-14 查看估计的执行计划。\n\n![](img/527021_1_En_3_Fig14_HTML.jpg)\n\
  \n第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了查询成本信息。排序成本，1%。筛选成本，15%。表扫描成本，78%。\n\
  \n**图 3-14**\n估计执行计划\n\n此估计查询计划显示该查询需要关注。\n\n从右向左读取，我们看到一个成本为 78%的表扫描，接着是一个成本为 15%的筛选，然后是一个成本仅为\
  \ 5%的排序步骤。系统建议了一个索引，因此我们把它提取出来并为其命名。\n\n请参考代码清单 3-15 查看建议的索引。\n\n```\nALTER TABLE\
  \ [SalesReports].[MemorySalesTotals]\nADD INDEX ieSalesYearStoreNo\nNONCLUSTERED\
  \ ([SalesYear],[StoreNo])\nGO\n```\n\n**代码清单 3-15**\n估计查询计划工具建议的索引\n\n请注意，我们必须使用\
  \ `ALTER` 命令，因为内存增强表不支持 `CREATE INDEX` 命令！\n\n此索引基于销售年份和商店编号列。让我们创建它，再次运行 `DBCC`\
  \ 命令，并生成一个新的估计查询计划。\n\n请参考图 3-15 查看索引创建后的估计计划。\n\n![](img/527021_1_En_3_Fig15_HTML.jpg)\n\
  \n第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了查询成本信息。排序成本，15%。索引查找成本，36%。\n\n**图 3-15**\n\
  索引创建后的估计查询计划\n\n一个成本为 36%的索引扫描取代了原来成本为 78%的表扫描，因此我们有了一个良好的开端。筛选任务消失了，但排序步骤的成本从 5%增加到了\
  \ 51%。看来，当我们使用索引查找时，排序步骤的成本又上升了。让我们通过向左滚动来查看计划的第二部分。\n\n请参考图 3-16。\n\n![](img/527021_1_En_3_Fig16_HTML.png)\n\
  \n第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了查询成本信息。窗口假脱机成本，5%。窗口假脱机成本，5%。\n\n**图\
  \ 3-16**\n估计查询计划的左侧部分\n\n再次从右向左看，注意第一个窗口假脱机任务。它的成本是 5%，用于在分区（位于内存中）内多次引用数据。还有一些其他低成本任务，我们看到了第二个窗口假脱机任务。这也有\
  \ 5%的成本。需要记住的一点是：我们应该力争使窗口假脱机任务的成本为 0%。这意味着操作在内存中进行。如果值大于零，则假脱机活动在磁盘上进行。（更多内存会有帮助吗？）\n\
  \n索引创建后，最终的 `IO` 和 `TIME` 统计数据如下。查询运行了两次。每次都执行了 `DBCC` 命令来清除内存缓冲区（一个小提醒…）。\n\n请参考表\
  \ 3-5。\n\n**表 3-5**\n`LAG()` 和 `LEAD()` 函数的 IO 和 TIME 统计数据\n\n\n### SQL Server 性能与百分位数函数解析\n\
  \n| SQL Server 解析与编译时间 | 首次运行 | 第二次运行 |\n| --- | --- | --- |\n| CPU 时间 (毫秒) | `16`\
  \ | `0` |\n| 已用时间 (毫秒) | `76` | `39` |\n| **统计信息（工作表）** | **首次运行** | **第二次运行** |\n\
  | 扫描计数 | 0 | 0 |\n| 逻辑读取 | 0 | 0 |\n| 物理读取 | 0 | 0 |\n| 预读 | 0 | 0 |\n| **内存表**\
  \ | **首次运行** | **第二次运行** |\n| 扫描计数 | N/A | N/A |\n| 逻辑读取 | N/A | N/A |\n| 物理读取 |\
  \ N/A | N/A |\n| 预读 | N/A | N/A |\n| | N/A | N/A |\n| **SQL Server 执行时间** | **首次运行**\
  \ | **第二次运行** |\n| CPU 时间 (毫秒) | 31 | 31 |\n| 已用时间 (毫秒) | `174` | `121` |\n\n看来这个查询非常快，执行时间在毫秒的两位数级别。第二次运行的解析时间下降了，`work\
  \ table`（工作表）的统计全是零，而`memory table`（内存表）没有统计信息（这很合理，因为表在内存中）。最后看执行时间，`CPU`时间保持在\
  \ 31 毫秒不变，而`Elapsed time`（已用时间）统计从 174 毫秒下降到了 121 毫秒。\n\n## `PERCENTILE_CONT()`\
  \ 与 `PERCENTILE_DISC()`\n\n这两个函数是做什么的？\n\n`PERCENTILE_CONT()`函数基于给定的百分位数，在连续数据集上工作，返回满足该百分位数的数据集内的一个值（你需要提供一个百分位参数，如`.25`、`.5`、`.75`等）。\n\
  \n对于这个函数，值是**插值**出来的。它通常不存在于数据集中，而是被引入的。或者巧合地，如果数字排列正确，它也可能使用数据集中的某个值。\n\n到底什么是连续数据？简单地说，它是随特定时间段变化的数据，例如，某个产品在时间段内的销售额，比如一个月内的总销售额。\n\
  \n`PERCENTILE_DISC()`函数基于给定的百分位数，在离散数据集上工作，返回满足该百分位数的数据集内的一个值。对于这个函数，该值存在于数据集中；它不像`PERCENTILE_CONT()`函数那样是插值出来的。\n\
  \n那么，离散数据又是什么呢？\n\n简单地说，离散数据值是可以随时间计数的数值，例如，产品在日、月、年中的销售额。你可以将这些值相加得到总销售额。\n\n连续数据是在一段时间内测量的数据，例如，设备在\
  \ 24 小时内的锅炉温度。将每个锅炉温度相加没有意义。但将锅炉温度相加然后除以时间段以获得平均值则有意义。\n\n在我们深入分析销售数据之前，让我们先从一个简单的例子开始。\n\
  \n请参考代码清单 3-16。\n\n```sql\nDECLARE @ExampleValues TABLE (\n    TestKey VARCHAR(8)\
  \ NOT NULL,\n    TheValue SMALLINT NOT NULL\n);\nINSERT INTO @ExampleValues VALUES\n\
  ('ONE',1),('TWO',2),('THREE',3),('FOUR',4),('SIX',6),('SEVEN',7),('EIGHT',8),('NINE',9),('TEN',10),('TWELVE',12);\n\
  SELECT\n    TestKey,TheValue,\n    PERCENTILE_CONT(.5)\n        WITHIN GROUP (ORDER\
  \ BY TheValue)\n        OVER() AS PctCont, -- continuous\n    PERCENTILE_DISC(.5)\n\
  \        WITHIN GROUP (ORDER BY TheValue)\n        OVER() AS PctDisc -- discrete\n\
  FROM @ExampleValues\nGO\n-- 代码清单 3-16\n-- PERCENTILE_CONT() 和 PERCENTILE_DISC()\
  \ 函数演示\n```\n\n这是一个非常简单的例子。数据集包含十行两列：一个文本值和一个数值。\n\n`PERCENTILE_CONT()`函数被传递`.5`作为参数，以插值出一个值，该值将适合数据集中第\
  \ 50 百分位的位置。它将数据集视为值的**连续分布**。\n\n`PERCENTILE_DISC()`函数也被传递`.5`作为参数，以识别一个存在的值，该值落在数据集的第\
  \ 50 百分位位置。它将数据集视为值的**离散分布**。（你可以传递任何小于或等于 1 的值，如`.75`或`.25`）。\n\n让我们看看结果如何。请参考图\
  \ 3-17。\n\n![](img/527021_1_En_3_Fig17_HTML.jpg)\n*图 3-17*\n*百分位连续与离散结果对比*\n\n百分位连续值是插值出来的，而百分位离散值不是。请注意，值`6.5`落在`TheValue`列中值`6`和`7`之间。百分位离散值是`6`，它存在于`TheValue`列中。很简单吧！\n\
  \n有了这个强大的知识，让我们在销售数据上试试这些函数。请参考代码清单 3-17，我们将回到我们的朋友——`CTE`。\n\n```sql\nWITH StoreSalesAnalysis\
  \ (\n    SalesYear,SalesMonth,StoreNo,StoreName ,StoreTerritory,TotalSales\n)\n\
  AS (\n    SELECT YEAR(CalendarDate) AS SalesYear\n          ,MONTH(CalendarDate)\
  \ AS SalesMonth\n          ,StoreNo\n          ,StoreName\n          ,StoreTerritory\n\
  \          ,SUM(TotalSalesAmount) AS TotalSales\n    FROM APSales.SalesReports.YearlySalesReport\n\
  \    GROUP BY YEAR(CalendarDate)\n            ,MONTH(CalendarDate)\n           \
  \ ,StoreNo\n            ,StoreName\n            ,StoreTerritory\n)\nSELECT  SalesYear\n\
  \      ,SalesMonth\n      ,StoreNo\n      ,StoreName\n      ,StoreTerritory\n  \
  \    ,FORMAT(TotalSales,'C') AS TotalSales\n      ,FORMAT(PERCENTILE_CONT(.5)\n\
  \              WITHIN GROUP (ORDER BY TotalSales)\n              OVER (\n      \
  \            PARTITION BY SalesYear\n              ),'C') AS PctCont\n      ,FORMAT(PERCENTILE_DISC(.5)\n\
  \              WITHIN GROUP (ORDER BY TotalSales)\n              OVER (\n      \
  \            PARTITION BY SalesYear\n              ),'C') AS PctDisc\nFROM StoreSalesAnalysis\n\
  WHERE SalesYear IN(2010,2011)\n  AND StoreNo = 'S00004'\nGO\n-- 代码清单 3-17\n-- 百分位连续与离散分析\n\
  ```\n\n我决定将百分位数格式化为货币，这样在报告中看起来更美观。注意`OVER()`子句只能包含`PARTITION BY`子句；不允许`ORDER BY`，你稍后会明白原因。（在这里我们按`SalesYear`分区。）\n\
  \n还要注意，在`OVER()`子句正上方，我们需要包含一个`WITHIN GROUP (ORDER BY TotalSales)`指令。所以，如你所见，这些函数的语法略有不同。\n\
  \n让我们看看结果。请参考图 3-18 中的部分结果。\n\n![](img/527021_1_En_3_Fig18_HTML.jpg)\n*图 3-18*\n\
  *测试脚本的查询结果*\n\n请注意，百分位离散的结果如何出现在`TotalSales`列中。换句话说，结果不是插值出来的。而百分位连续的情况则不同；结果可能出现在`TotalSales`列中，但通常是插值出来的。值`$2,795.38`并没有作为实际值出现在`TotalSales`列中。\n\
  \n> **注意**\n> SQL Server 2022 包含了两个新函数，`APPROX_PERCENTILE_DIS()`和`APPROX_PERCENTILE_CONT()`，我们将在另一章中介绍它们。\n\
  \n让我们看看这些函数会生成什么样的估计查询计划。\n\n### 性能注意事项\n\n我们以通常的方式为菜单栏中的下拉查询选择生成了一个估计的查询计划。我们立即注意到系统建议创建一个索引。让我们来检查一下该计划。\n\
  \n请参考图 3-19 查看估计的查询计划。\n\n![](img/527021_1_En_3_Fig19_HTML.png)\n\n*图 3-19：百分位函数的估计查询计划*\n\
  \n从右向左看，我们看到一个成本为 37% 的索引查找任务，但显然这个索引并未满足所有性能要求。尽管有一个可用的索引被使用，系统还是建议了一个新索引，因此我们必须处理这个需求。\n\
  \n下一个较昂贵的任务是成本为 19% 的排序任务和成本为 10% 的嵌套循环连接任务。所有其他任务成本为零或很低，因此我们此时不讨论它们。你应该始终检查每个任务，即使是低成本的任务，以便理解查询将如何被处理。\n\
  \n表 3-6 显示了使用现有索引执行此查询时的统计信息。\n\n*表 3-6：使用现有索引的统计信息*\n\n| SQL Server Parse and Compile\
  \ Times | Existing Index | New Index |\n| --- | --- | --- |\n| CPU time (ms) | 0\
  \ | TBD |\n| Elapsed time (ms) | 98 | TBD |\n| **Statistics (Work Table)** | **Existing\
  \ Index** | **New Index** |\n| Scan count | 9 | TBD |\n| Logical reads | 171 | TBD\
  \ |\n| Physical reads | 0 | TBD |\n| Read-ahead reads | 0 | TBD |\n| **Statistics\
  \ (Work File)** | **Existing Index** | **New Index** |\n| Scan count | 0 | TBD |\n\
  | Logical reads | 0 | TBD |\n| Physical reads | 0 | TBD |\n| Read-ahead reads |\
  \ 0 | TBD |\n| **Statistics (YearlySalesReport)** | **Existing Index** | **New Index**\
  \ |\n| Scan count | 1 | TBD |\n| Logical reads | 4033 | TBD |\n| Physical reads\
  \ | 1 | TBD |\n| Read-ahead reads | 4041 | TBD |\n| **SQL Server Execution Times**\
  \ | **Existing Index** | **New Index** |\n| CPU time (ms) | 47 | TBD |\n| Elapsed\
  \ time (ms) | 1025 | TBD |\n\n从顶部开始，解析和编译的耗时是 98 毫秒。统计信息中出现了一个工作文件和一个工作表，还包括了 `YearlySalesReport`\
  \ 表。对于工作表，我们看到扫描计数为 9，逻辑读取数为 171。这些可以改进。\n\n查看工作文件，所有值都是 0，因此我们不需要担心这组统计信息。\n\n\
  现在，需要注意 `YearlySalesReport` 的统计信息。我们看到扫描计数为 1。逻辑读取数为 4,033，物理读取数为 1，最后预读数为 4,041。\n\
  \n最后，`CPU` 时间为 47 毫秒，耗时为 1025 毫秒。有点高。让我们创建建议的索引，看看是否有助于降低这些统计信息。\n\n请参考代码清单 3-18，其中显示了\
  \ SQL Server 生成的索引和注释。\n\n```sql\n/*\nMissing Index Details from chapter 03 - TSQL\
  \ code - new - 10-06-2022.sql - DESKTOP-CEBK38L\\GRUMPY2019I1.APSales (DESKTOP-CEBK38L\\\
  Angelo (52))\nThe Query Processor estimates that implementing the following index\
  \ could improve the query cost by 87.5919%.\n*/\n/*\nUSE [APSales]\nGO\nCREATE NONCLUSTERED\
  \ INDEX []\nON [SalesReports].[YearlySalesReport] ([StoreNo])\nINCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])\n\
  GO\n*/\n```\n*代码清单 3-18：建议的索引*\n\nSQL Server 告诉我们，如果我们创建这个索引（在给它命名后），将提升 87.5% 的性能。\n\
  \n好的，听起来不错，但我们拭目以待。\n\n我们将此索引命名为 `ieStoreTerritoryDateTotalSales`。经过一些复制粘贴操作来包含带名称的命令，得到了以下\
  \ DDL 查询：\n\n```sql\nCREATE NONCLUSTERED INDEX ieStoreTerritoryDateTotalSales\n\
  ON [SalesReports].[YearlySalesReport] ([StoreNo])\nINCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])\n\
  GO\n```\n\n我们执行它，然后生成一个新的估计查询计划。\n\n请参考图 3-20。\n\n![](img/527021_1_En_3_Fig20_HTML.png)\n\
  \n*图 3-20：创建索引后的估计查询计划*\n\n我们立即看到了改进。看起来新索引正在被使用。索引查找任务的成本占 51%。我们确实有一个成本为 31% 的哈希匹配聚合。排序现在占\
  \ 4% 的成本，嵌套循环连接占 2%。\n\n表 3-7 显示了使用新索引执行查询后的统计信息。\n\n*表 3-7：创建建议索引后的统计信息*\n\n| SQL\
  \ Server Parse and Compile Times | Existing Index | New Index |\n| --- | --- | ---\
  \ |\n| CPU time (ms) | 0 | 31 |\n| Elapsed time (ms) | 98 | 113 |\n| **Statistics\
  \ (Work Table)** | **Existing Index** | **New Index** |\n| Scan count | 9 | 9 |\n\
  | Logical reads | 171 | 171 |\n| Physical reads | 0 | 0 |\n| Read-ahead reads |\
  \ 0 | 0 |\n| **Statistics (Work File)** | **Existing Index** | **New Index** |\n\
  | Scan count | 0 | 0 |\n| Logical reads | 0 | 0 |\n| Physical reads | 0 | 0 |\n\
  | Read-ahead reads | 0 | 0 |\n| **Statistics (YearlySalesReport)** | **Existing\
  \ Index** | **New Index** |\n| Scan count | 1 | 1 |\n| Logical reads | 4033 | 343\
  \ |\n| Physical reads | 1 | 0 |\n| Read-ahead reads | 4041 | 332 |\n| **SQL Server\
  \ Execution Times** | **Existing Index** | **New Index** |\n| CPU time (ms) | 47\
  \ | 16 |\n| Elapsed time (ms) | 1025 | 159 |\n\n对于解析步骤，`CPU` 时间上升到 31 毫秒，耗时上升到 113\
  \ 毫秒。我们在向错误的方向前进！\n\n工作表和工作文件没有变化，但如果我们查看处理 `YearlySalesReport` 表的统计信息，我们看到：\n\n\
  *   扫描计数保持不变——没有消息就是好消息。\n*   逻辑读取数从 4,033 降到了 343——一个重大的改进。\n*   物理读取数从 1 降到了 0——我们接受这个改进。\n\
  *   预读数从 4,041 降到了 332——另一个重大改进。\n\n最后，对于 SQL 执行时间，`CPU` 时间从 47 毫秒降至 16 毫秒，耗时从 1025\
  \ 毫秒降至 159 毫秒。创建建议的索引帮助很大。\n\n那么，一个替换了 `CTE` 的反规范化报告表会有更多帮助吗？或者，内存优化表呢？\n\n### 使用报告表\n\
  \n有时，为利用窗口函数或复杂计算（或两者兼有）的查询创建一个或多个索引来提高性能是不够的。接下来要考虑的是创建一个所谓的反规范化表或报告表，该表在非工作时段加载，前提是用户可以容忍数据有\
  \ 24 小时的延迟。\n\n此步骤的关键在于理解业务分析师的需求。一些用户会需要或想要当前实时数据，而另一些用户则可以接受较旧的数据，比如当他们需要运行月末汇总或其他某种总结历史绩效的报告时。\n\
  \n作为 SQL 开发人员或架构师，你需要与业务方合作，收集业务用户期望的数据和性能报告。希望在需求收集会议之后，你会得到这样一个场景：80%的用户不需要实时数据；相反，一天前的数据或更旧的数据就足够了。另外\
  \ 20%需要实时数据的用户则需要复杂的解决方案，这可能涉及硬件、复杂的复制方案或直接查询事务表，而后者并不推荐。\n\n让我们看一下针对刚才研究的查询的一个可能解决方案，它使用了一个在非工作时段加载的报告表。查询的`CTE`部分被报告表取代。我们将预加载它，然后检查包含窗口函数的查询的性能。\n\
  \n请参阅清单 3-19，了解加载报告表和修订后查询的脚本。\n\n```sql\nDROP TABLE IF EXISTS [SalesReports].[YearlySummaryReport]\n\
  GO\nCREATE TABLE [SalesReports].YearlySummaryReport NOT NULL,\n[StoreName]     \
  \ nvarchar NOT NULL,\n[StoreTerritory] nvarchar NOT NULL,\n[TotalSales]     decimal\
  \ NULL\n) ON [AP_SALES_FG]\nGO\nINSERT INTO APSales.SalesReports.YearlySummaryReport\n\
  SELECT YEAR(CalendarDate) AS SalesYear\n,MONTH(CalendarDate) AS SalesMonth\n,StoreNo\n\
  ,StoreName\n,StoreTerritory\n,SUM(TotalSalesAmount) AS TotalSales\nFROM APSales.SalesReports.YearlySalesReport\n\
  GROUP BY YEAR(CalendarDate)\n,MONTH(CalendarDate)\n,StoreNo\n,StoreName\n,StoreTerritory\n\
  GO\nCREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]\nON [SalesReports].[YearlySummaryReport]\
  \ ([StoreNo],[SalesYear])\nINCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])\n\
  GO\n清单 3-19\n用于预加载的 YearlySummaryReport 表\n```\n\n此脚本使用为`CTE`定义的输出列，并用它们创建一个名为`YearlySummaryReport`的物理表。表创建好后，原本用于`CTE`的查询被用在`INSERT`语句中来加载该表。这一步很简单。现在，对于包含窗口函数的查询以及我们需要进行的分析，以查看在估计查询计划以及`IO`和`TIME`统计信息方面是否有改进，请参阅清单\
  \ 3-20。\n\n```sql\nDBCC dropcleanbuffers\nCHECKPOINT;\nGO\nSET STATISTICS TIME ON\n\
  GO\nSET STATISTICS IO ON\nGO\nSELECT     SalesYear\n,SalesMonth\n,StoreNo\n,StoreName\n\
  ,StoreTerritory\n,FORMAT(TotalSales,'C') AS TotalSales\n,FORMAT(PERCENTILE_CONT(.5)\n\
  WITHIN GROUP (ORDER BY TotalSales)\nOVER (\nPARTITION BY SalesYear\n),'C') AS PctCont\n\
  ,FORMAT(PERCENTILE_DISC(.5)\nWITHIN GROUP (ORDER BY TotalSales)\nOVER (\nPARTITION\
  \ BY SalesYear\n),'C') AS PctDisc\nFROM APSales.SalesReports.YearlySummaryReport\n\
  WHERE SalesYear IN(2010,2011)\nAND StoreNo = 'S00004\nGO\nSET STATISTICS TIME OFF\n\
  GO\nSET STATISTICS IO OFF\nGO\n清单 3-20\n查询报告表\n```\n\n我们之前已经介绍过这个查询，所以让我们直接进入主题，按通常的方式生成估计查询计划。我确实在新的报告表上创建了一个索引。这个索引是由估计查询计划工具建议的。请参阅清单\
  \ 3-21。\n\n```sql\nCREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]\n\
  ON [SalesReports].[YearlySummaryReport] ([StoreNo],[SalesYear])\nINCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])\n\
  GO\n清单 3-21\n用于支持报告表的索引\n```\n\n我们需要将新计划与之前的计划进行比较，以查看发生了哪些改进（如果有的话）。\n\n请参阅图 3-21，了解两种方法的估计查询计划。\n\
  \n![](img/527021_1_En_3_Fig21_HTML.png)\n\n一个第 03 章 T-SQL 代码窗口的截图。屏幕被分成 2 个子窗口。顶部屏幕有一些编程代码。底部屏幕有一条关于查询计划的消息。它比较了执行计划后的新计划与之前的计划。\n\
  \n图 3-21\n比较估计查询计划\n\n顶部的估计查询计划代表使用原始`CTE`的查询。底部的查询计划是用于查询预加载报告表的修订脚本。\n\n我们看到，报告表查询的索引查找成本为\
  \ 20%，而原始查询的索引查找成本为 51%。新查询还有一个排序步骤，其成本明显高于使用`CTE`的原始查询中的排序步骤。看来当索引查找成本下降时，排序成本就会上升。这是需要留意的一点。\n\
  \n这是改进吗？不确定，所以让我们看看`IO`和`TIME`统计信息，看看它们能告诉我们什么。\n\n请参阅表 3-8。\n\n表 3-8\n比较 IO 和 TIME\
  \ 统计信息\n\n| SQL Server 解析和编译时间 | 无报告表 | 有报告表 |\n| --- | --- | --- |\n| CPU 时间 (毫秒)\
  \ | 15 | 0 |\n| 已用时间 (毫秒) | **20** | **58** |\n| **统计信息 (工作表)** | **现有索引** | **新索引**\
  \ |\n| 扫描计数 | 9 | 9 |\n| 逻辑读取 | 171 | 171 |\n| 物理读取 | 0 | 0 |\n| 预读读取 | 0 | 0 |\n\
  | **统计信息 (工作文件)** | **现有索引** | **新索引** |\n| 扫描计数 | 0 | 不适用 |\n| 逻辑读取 | 0 | 不适用 |\n\
  | 物理读取 | 0 | 不适用 |\n| 预读读取 | 0 | 不适用 |\n| **统计信息 (YearlySalesReport) vs. YearlySummaryReport**\
  \ | **现有索引** | **新索引** |\n| 扫描计数 | **1** | **2** |\n| 逻辑读取 | **343** | **6** |\n\
  | 物理读取 | **2** | **1** |\n| 预读读取 | **345** | **8** |\n| **SQL Server 执行时间** | **现有索引**\
  \ | **新索引** |\n| CPU 时间 (毫秒) | **16** | **0** |\n| 已用时间 (毫秒) | **132** | **67**\
  \ |\n\n查看生成的统计信息，我们看到当使用名为`YearlySummaryReport`的报告表时，性能有显著提升。扫描计数从 1 增加到 2，但逻辑读取从\
  \ 343 降到了 6。物理读取在新报告表中减少了 1，最好的是，预读读取从 345 降到了 8。所以，是的，在使用窗口函数的查询中使用预加载和预计算的报告表似乎有显著的改进。想一想——从分析中消除`CTE`或加载步骤肯定会提高查询性能。\n\
  \n最后但同样重要的是，执行时间的 CPU 时间从 16 毫秒降到了 0 毫秒，已用时间从 132 毫秒降到了 67 毫秒。\n\n在进行此类分析时，最后一个建议是：始终运行多次测试，每次试验前使用`DBCC`清除缓冲区。将结果记录在电子表格中，以便后续分析和评估哪种性能改进方案效果最佳。\n\
  \n顺便说一句，隔离报告表的加载步骤并不意味着我们完全忽略对加载步骤的性能分析。如果我们每晚加载数百万行数据，那么我们需要提出一个加载策略，确保其耗时不会过长以至于侵占工作时间！\n\
  \n\n### 总结\n\n我们刚刚介绍了第二组窗口函数——分析函数。我认为，无论是在满足业务分析师需求的**分析技术**方面，还是在**性能调优**方面，我们都取得了一些有趣的发现。\n\
  \n我们利用估计的查询计划以及`IO`和`TIME`统计数据进行了常规分析，同时也审视了客户端统计数据。\n\n接着，我们引入了非规范化暂存表或报告表，以模拟一个在夜间加载数据并执行所有计算和连接的生产环境。我们对基于`CTE`的查询进行了与之前相同的性能分析。\n\
  \n最后，我们介绍了内存优化表，这些表被加载到内存中。我们发现它们可以非常快。\n\n总之，您现在知道了如何在使用`OVER()`子句的分区中使用分析函数。在下一章中，我们将研究排名函数，并尝试使用窗口帧定义来让事情变得更有趣。\n\
  \n还有一点需要说明：我们仅仅是触及了性能分析和调优技术的皮毛。本书的范围是关于窗口函数，但学习如何使用一些性能调优工具和技术是最低要求，因为它将帮助您编写快速有效的脚本和查询。\n\
  \n关于性能调优的优秀读物，请参阅 Grant Fritchey 所著的*《SQL Server 2022 查询性能调优：故障排除与优化查询性能》*（第六版，Apress）。\n\
  \n这是一本很棒的读物，在我看来，如果您认真学习性能分析、相关工具和性能改进，这是您书架上的必备书。\n\n"
- "# 4. 销售用例：排名/窗口函数\n\n这是我们处理销售数据仓库的最后一章。我们将探讨第三类函数，即窗口或排名函数。我们将采用与前面章节相同的方法，即简要解释函数，展示代码和查询结果，并通过添加索引和报告表进行一些性能分析和调优。最后，我们将提出一个称为“间隙与孤岛”的数据分析问题，其中我们使用在第\
  \ 3 章中学到的一些窗口系统函数来识别销售数据中的日期间隙和序列。\n\n## 排名/窗口函数\n\n这个类别只有四个函数，但我们将重新审视上一章的`PERCENT_RANK()`函数，因为它与其中一些函数有许多相似之处：\n\
  \n*   `RANK()`\n*   `PERCENT_RANK()`\n*   `DENSE_RANK()`\n*   `NTILE()`\n*   `ROW_NUMBER()`\n\
  \n`RANK()`函数显示数据集中每一行某列值相对于数据集中其他行值的排名。如果出现并列排名，则并列的行获得相同的排名，但下一个值在重复值之后被分配的排名等于并列数量加上当前的排名值。\n\
  \n因此，如果您有三个并列值（例如值 4）被分配排名 4，那么下一个大于 4 的值的排名将是 4 + 3（并列数量）= 7（哎呀！）。\n\n`DENSE_RANK()`函数的工作方式几乎与`RANK()`函数相同。如果出现并列排名，并列的行获得相同的排名，但下一个值在重复值之后只是被分配下一个排名数字。因此，如果并列值的排名是\
  \ 4，那么分配给下一个更高值的排名就是 5（这对我来说很合理……）。\n\n`PERCENT_RANK()`函数将排名分配为百分比。并列的行获得相同的排名百分比值。使用类似于查询、分区或表变量结果的数据集，该函数计算每个值相对于整个数据集的相对排名（以百分比形式）。您需要将结果（返回值是`float`数据类型）乘以\
  \ 100.00 或使用`FORMAT()`函数将结果转换为百分比。\n\n`ROW_NUMBER()`函数只是简单地为每一行分配下一个最大的数字，无论是否出现并列。\n\
  \n因此，如果当前行是数据集中的第四行，则分配行号 4。对于第 5 行，那么，请等待一下，数字 5 被分配，依此类推。此函数不关心包含值的列中是否存在并列。它只关心行在数据集中的位置。\n\
  \n`NTILE()`函数允许您将数据集中的一组行划分为若干个切片或桶。如果您有一个包含 12 行的数据集，并且想分配 4 个切片，那么每个切片将有 3 行。当您想评估销售人员绩效并根据销售业绩授予奖金时，此功能非常方便。（我们将看到如何操作。我们将生成多个切片来实现绩效桶，并将销售人员分配到其中。）\n\
  \n好的，我确信所有这些有点令人困惑，您正在挠头。让我们使用上一章的简单示例，稍作修改，然后查看一些简单的数据，以便我们解释每个函数的作用（`NTILE()`除外）以及它们彼此之间的相似之处（和不同之处）。\n\
  \n请参考代码清单[4-1]。\n\n```sql\nDECLARE @ExampleValues TABLE (\nTestKey VARCHAR(8) NOT\
  \ NULL,\nTheValue SMALLINT NOT NULL\n);\nINSERT INTO @ExampleValues VALUES\n('ONE',1),('TWO',2),('THREE',3),('FOUR',4),\n\
  ('FOUR',4),('SIX',6),('SEVEN',7),\n('EIGHT',8),('NINE',9),('TEN',10);\nSELECT\n\
  TestKey,\nTheValue,\nROW_NUMBER()          OVER(ORDER BY TheValue) AS RowNo,\nRANK()\
  \                OVER(ORDER BY TheValue) AS ValueRank,\nDENSE_RANK()          OVER(ORDER\
  \ BY TheValue) AS DenseRank,\nPERCENT_RANK()        OVER(ORDER BY TheValue) AS ValueRank,\n\
  FORMAT(PERCENT_RANK() OVER(ORDER BY TheValue),'P') AS ValueRankAsPct\nFROM @ExampleValues;\n\
  GO\n```\n代码清单 4-1\n排名函数实战\n\n我们声明了简单的表变量并向其中插入了十行。注意`INSERT`语句中`('FOUR',4)`的重复值。这是故意为之的，这样我们就能看到重复值如何影响每个函数的行为。\n\
  \n每个函数都与一个`OVER()`子句一起使用。我们只包含一个`ORDER BY`子句，该子句按“`TheValue`”列中的值对分区数据集进行排序。注意使用`FORMAT()`函数将`PERCENT_RANK()`函数的结果显示为百分比。让我们看看结果。\n\
  \n注意\n\n\n\n在这个示例中，由于没有包含 `PARTITION BY` 子句，分区就是整个数据集。毕竟，我们只有十行数据。\n\n请参见图 4-1。\n\
  \n![](img/527021_1_En_4_Fig1_HTML.jpg)\n\nSQL 查询 1 的截图展示了一个包含 7 列 10 行数据的表格，其中列出了排名函数，显示在选项卡下。第\
  \ 4、5、6 行被高亮显示。表格的标题分别是测试键、值、行号、值排名、密集排名、值排名以及值排名作为百分比。\n\n图 4-1\n\n实际运行中的排名函数结果\n\
  \n我们从 `ROW_NUMBER()` 函数的结果开始。共有十行数据，行号按顺序从 1 到 10。这正是函数名所暗示的。\n\n接下来是 `RANK()` 函数的结果。注意值\
  \ 4 出现的两次平局（并列）是如何处理的。因为它们相同，所以都被赋予排名 4。但是看看下一行的值发生了什么。它跳过了数字 5，被赋予了值 6。就像我们之前讨论的公式一样，它取平局的数量（2），加上当前的排名\
  \ 4，从而赋予排名 6。\n\n现在看看 `DENSE_RANK()` 函数的结果。与 `RANK()` 函数类似，平局被赋予相同的排名值，但下一行的值会被赋予下一个更高的排名，也就是\
  \ 5。\n\n最后但同样重要的是，`PERCENT_RANK()` 函数将排名分配为 0 到 1 之间的百分比值。我添加了一列，以便使用 `FORMAT()`\
  \ 函数将结果格式化为百分比。这样我们就可以比较格式，并决定哪种格式更有意义。\n\n## `NTILE()` 示例\n\n现在我们来创建一些“瓦片”（tiles）。不，不是厨房地砖，而是数据桶（我知道，这是个蹩脚的双关语）。我们将从另一个简单的示例开始，以便清楚地看到这个函数的作用。我们将使用一个表变量，其中加载了我们销售团队的十行年初至今的销售金额。\n\
  \n我们想要做的是创建三个数据桶或分组，然后根据销售人员落入哪个桶，将其作为给他们发放奖金的标准。\n\n请参考代码清单 4-2。\n\n```\nDECLARE\
  \ @SalesPersonBonusStructure TABLE (\n    SalesPersonNo VARCHAR(4) NOT NULL,\n \
  \   SalesYtd      MONEY      NOT NULL\n);\nINSERT INTO @SalesPersonBonusStructure\
  \ VALUES\n('S001',2500.00),\n('S002',2250.00),\n('S003',2000.00),\n('S004',1950.00),\n\
  ('S005',1800.00),\n('S006',1750.00),\n('S007',1700.00),\n('S008',1500.00),\n('S009',1250.00),\n\
  ('S010',1000.00);\n-- 排序方式（升序 ASC 或降序 DESC）必须谨慎选择\nSELECT SalesPersonNo\n      ,SalesYtd\n\
  \      ,NTILE(3) OVER(ORDER BY SalesYtd DESC) AS BonusBucket\n      ,CASE\n    \
  \      WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 1 THEN '奖励 $500.00 奖金'\n \
  \         WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 2 THEN '奖励 $250.00 奖金'\n\
  \          WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 3 THEN '奖励 $150.00 奖金'\n\
  \       END AS BonusAward\nFROM @SalesPersonBonusStructure\nGO\n```\n\n代码清单 4-2\n\
  \n为奖金分配绩效桶\n\n解决方案很简单。`NTILE()` 函数与 `OVER()` 子句一起使用以创建三个桶。由于数据集很小，没有 `PARTITION\
  \ BY` 子句，但我们包含了一个 `ORDER BY` 子句，以便按降序对年初至今的销售金额进行排序。\n\n接下来，一系列三个 `CASE` 语句块通过再次使用\
  \ `NTILE()` 函数来确定分配到哪个桶，从而根据销售人员所在的桶打印出他们获得的奖金金额。\n\n也许有点简单粗暴，因为我们可以使用 `CTE`（公用表表达式）来确定桶，然后编写查询只测试桶的值，而不用再次使用\
  \ `NTILE()` 函数。你可以尝试下载本章的脚本，然后使用 `CTE` 方法编写一个查询。万一你在本节的脚本中卡住了，我确实提供了解决方案。\n\n让我们看看每位销售人员获得了什么奖励。请参考图\
  \ 4-2。\n\n![](img/527021_1_En_4_Fig2_HTML.jpg)\n\n一个窗口的截图展示了一个包含 4 列 10 行的表格，描绘了销售人员获得的奖励，显示在选项卡下。表格的标题分别是销售人员编号、销售年初至今、奖金桶和奖金奖励。\n\
  \n图 4-2\n\n奖金绩效桶\n\n结果集中有十行数据，而我们只指定了三个桶，因此桶的分配是不均匀的。前两个桶各有三行，最后一个桶有四行。如果我们有 12\
  \ 行，那么每个桶将得到 4 行。无论哪种情况，这些奖金都相当寒酸。如果我们的销售人员想要更高的奖金，他们需要卖出更多！\n\n基于我们对这些函数工作原理的理解，让我们在我们的销售数据仓库上使用这些函数。我们将从\
  \ `RANK()` 和 `PERCENT_RANK()` 开始，并在本章后面重新审视 `NTILE()`。\n\n\n\n## RANK( ) 对比 PERCENT_RANK( )\n\
  \n让我们看看这两个函数如何工作，并通过对比结果来观察它们的相似之处。`PERCENT_RANK()` 属于我们在上一章介绍过的分析函数范畴，但我将它放在本章中，以便我们能将其与\
  \ `RANK()` 函数进行比较。\n\n我们将使用惯常的结构来测试这些函数。请参考 **清单 4-3**。\n\n```sql\nWITH CustomerRanking\
  \ (\nCalendarYear,CalendarMonth,CustomerFullName,TotalSales\n)\nAS\n(\nSELECT CalendarYear\n\
  ,CalendarMonth\n,CustomerFullName\n,SUM(TotalSalesAmount) AS TotalSales\nFROM SalesReports.YearlySalesReport\
  \ YSR\nJOIN DimTable.Calendar C\nON YSR.CalendarDate = C.CalendarDate\nGROUP BY\
  \ C.CalendarYear\n,C.CalendarMonth\n,CustomerFullName\n)\nSELECT\nCalendarYear\n\
  ,CalendarMonth\n,CustomerFullName\n,FORMAT(TotalSales,'C') AS TotalSales\n,RANK()\n\
  OVER (\n--            PARTITION BY CalendarYear\nORDER BY TotalSales\n) AS Rank\n\
  ,PERCENT_RANK()\nOVER (\n--            PARTITION BY CalendarYear\nORDER BY TotalSales\n\
  ) AS PctRank\nFROM CustomerRanking\nWHERE CalendarYear = 2011\nAND CalendarMonth\
  \ = 1\nORDER BY\nRANK() OVER (\nPARTITION BY CalendarYear\nORDER BY TotalSales\n\
  ) DESC\nGO\n```\n\n**清单 4-3**\nRANK 对比 PERCENT_RANK\n\n我们的 `CTE`（公用表表达式）只是组装了我们需要报告的几列，并包含了\
  \ `SUM()` 函数来按年、月和客户姓名计算总销售额。为了限制返回的行数，使用了一个 `WHERE` 子句按年份和仅一个月（2011 年 1 月）来过滤结果。\n\
  \n提醒——从小型数据集开始。先开发解决方案并进行测试。一旦你确信它能正确工作，再将解决方案应用到更大的数据集上。\n\n`RANK()` 和 `PERCENT_RANK()`\
  \ 函数都使用了一个包含 `ORDER BY` 子句的 `OVER()` 子句，以便分区内的行按 `TotalSales` 列排序。`PARTITION BY`\
  \ 子句被注释掉了，因为我们只检索了一年的数据。一旦你熟悉了其中的逻辑，可以自由地检索多行数据，并取消 `PARTITION BY` 子句的注释，这样我们就可以处理多个年份。\n\
  \n最后，这里有个有趣的地方。你可以在查询的 `ORDER BY` 子句中包含一个窗口函数（而不是 `OVER()` 子句）。我们使用了与 `RANK()` 函数相同的代码来实现这一点。省略它会得到相同的结果，但顺序相反。但至少你知道这是可行的。只要理解其中的区别就好。当\
  \ `ORDER BY` 子句在 `OVER()` 子句中时，它会对分区内的行进行排序。当 `ORDER BY` 子句在查询末尾时，它会对查询的最终结果进行排序。\n\
  \n请参考 **图 4-3** 中的部分结果。\n\n![](img/527021_1_En_4_Fig3_HTML.jpg)\n\n一个窗口截图展示了一个包含\
  \ 6 列 25 行条目的表格，条目基于百分比排名排序。表头为日历年份、日历月份、客户全名、总销售额、排名和百分比排名。\n\n**图 4-3**\nRANK\
  \ 对比 PERCENT_RANK\n\n结果按降序排列。注意第 6-7 行和第 21-22 行中重复值的行为。如前所述，将百分比排名乘以 100.00，这样你就能看到百分比形式的值，或者使用\
  \ `FORMAT()` 函数代替。这样你就可以在 Microsoft Excel 中绘制结果图，如下所示。\n\n我复制并粘贴了结果，并将百分比排名结果乘以\
  \ 100.00，因此我们得到了一个漂亮的图表，而不是小于或等于 1.0 的小数值。\n\n请参考 **图 4-4**。\n\n![](img/527021_1_En_4_Fig4_HTML.jpg)\n\
  \n一个 Excel 工作表的截图展示了一个包含 4 列 16 行的表格，以及一个关于排名对比销售额（美元）的折线图。标记为排名和百分比排名的线条呈现出轻微波动的上升趋势。\n\
  \n**图 4-4**\nRANK 对比 PERCENT_RANK 分析\n\n还不错。我们确实看到两个函数的图表结果几乎相同，并呈现出良好的上升趋势。我本应添加一条注释，说明百分比排名结果已乘以\
  \ 100.00，以便图表读者了解这一处理。\n\n数据展示在左侧以便于参考。为你的用户生成一些漂亮的图表和图形总是一个好主意，这样他们就能解读结果。一图胜千言！Microsoft\
  \ Power BI 也是一个出色的数据可视化工具。\n\n让我们看看这个查询的性能特征。\n\n**提示**\n作为 SQL 开发人员或架构师，你还需要掌握一些其他技能，比如熟练掌握\
  \ Microsoft Excel 或 Power BI，以便为你的用户和管理层生成强大的可视化效果。掌握一些 SSIS（SQL Server Integration\
  \ Services）的 ETL 技能也会很有价值。\n\n\n#### 性能考量\n\n让我们首先以常规方式生成一个估计查询计划（菜单栏 ➤ 查询 ➤ 显示估计执行计划）。你会看到一些相当有趣且令人困惑的结果。\n\
  \n请参考图 4-5。\n\n![](img/527021_1_En_4_Fig5_HTML.jpg)\n\nT SQL 代码的截图呈现了两个部分。上半部分展示了一些代码行，包含变量初始化、`order\
  \ by`子句以及`rank`函数内的`over`函数。下半部分展示了估计查询计划的流程图。\n\n图 4-5\n\n估计查询计划 – `RANK` 对比 `PERCENT_RANK`\n\
  \n我们手头有一些现成的索引，因此估计器没有建议创建新的索引，但等一下——各项任务的成本总和超过了 100%：\n\n*   表扫描：2%\n*   索引扫描：50%\n\
  *   索引查找：90%\n*   哈希匹配：26%\n\n这些值加起来是 168%。\n\n这是不可能的。成本不可能超过 100%。为什么会这样？\n\n你可能不会喜欢这个答案。\n\
  \n这是客户端软件的一个错误，有时你会得到像这样令人惊讶的结果。我建议你在 Microsoft 网站上研究一下，看看新版本的 SSMS 是否会修复这个问题。幸运的是，这种情况似乎不常发生。\n\
  \n回到查询计划，如你所见，由于上一章遗留的一些索引，它们被使用了。这正是你所希望的；你希望你的索引能被多个查询使用，而不是每当有新请求到来时都创建一个新索引。\n\
