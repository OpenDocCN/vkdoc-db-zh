  我不会逐一分析所有结果，但请注意，物理表的逻辑读取达到 22,958，预读取达到 22,722。最后，CPU 执行时间为 1111 毫秒，已用时间为 2388\
  \ 毫秒。\n\n这是一个很大的表，你能做的提高性能的唯一事情就是将表创建为分区表，将年份分布在多个物理磁盘或 SAN 上的 LUN 上。当你处理数百万行或更多数据时，这几乎是管理性能的唯一方法！当数据可以按年份拆分时，这个策略效果很好，一年一个磁盘。\n\
  \n接下来，我们通过创建和加载一个关联表来纠正设计缺陷，该表将设备与工厂和位置关联起来。我们可以将其视为一个维度表，因为它可以直接与事实表一起使用，也可以用来链接另外两个维度。请参考清单\
