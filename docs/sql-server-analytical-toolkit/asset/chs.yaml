  \ 窗口的截图。顶部屏幕显示一些程序代码。底部屏幕显示查询 1 的消息和执行计划。表扫描成本 0%，计算标量成本 0%。\n\n\n### 图 8-37：估计的查询计划\
  \ – 第 1 部分\n\n注意这里使用了聚簇索引扫描。其开销占比达到了 92%，因此大部分工作都是在这里完成的。注意 `Valve`、`Motor`、`Generator`\
  \ 和 `Turbine` 这几个表的表扫描。它们的开销都是 0%。这些都是小表，所以没有性能问题。这里有很多表扫描和排序操作，但似乎所有这些开销都是 0。让我们看看计划的下一部分。\n\
