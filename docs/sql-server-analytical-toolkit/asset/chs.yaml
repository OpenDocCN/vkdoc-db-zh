  ## 性能分析工具


  我相信这是您最喜欢的用于执行性能分析和增强的工具。我们使用此工具创建了估计执行计划，也创建了实时执行计划，这些计划向我们展示了 SQL Server 查询引擎执行查询所采取的步骤，以及任务之间传递了多少数据。


  ### 估计查询计划


  请参考图 14-16。


