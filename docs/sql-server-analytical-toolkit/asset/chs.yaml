  ### 步骤 3：设置第三个 CTE 并识别间隔的开始/结束日期


  现在我们提取日期间隔的开始和结束日期。清单 6-21 是第三个也是最后一个链式 `CTE` 的清单（`CTE3` 调用 `CTE2`，后者调用 `CTE1`）。


  ```sql

  FinalGapIslanCTE (

  CustId,Symbol,GapTradeDays,GapOrIsland,GapStart,GapEnd

  )

  AS (

  SELECT ,CustId

  ,Symbol

  ,GapTradeDays

  ,GapOrIsland

  ,MIN(TransDate)     AS GapStart

  ,MAX(NextTradeDate) AS GapEnd

  FROM GapsAndIslands

  WHERE NextTradeDate IS NOT NULL

  AND GapTradeDays > 0

  GROUP BY CustId

  ,Symbol

  ,GapTradeDays

  ,GapOrIsland

  )

  清单 6-21

  识别间隔的开始和结束日期

  ```


  这个 `CTE` 很简单。它基于一个标准查询，该查询使用 `MIN()` 和 `MAX()` 函数来提取间隔的开始和结束日期。不需要 `OVER()` 子句。我们过滤掉间隔交易天数为
  0 的行（即孤岛）以及下一个交易日为 `NULL` 的任何行，只是为了保持整洁。


