  \n图 11-31\n平均值、方差和标准差报告\n\n查看报告，我们看到分区按预期工作，并且两种标准差计算结果匹配，因此我们不仅验证了结果，还证明了如果我们取方差的平方根，就得到了标准差。\n\
  \n### 性能考虑\n\n接下来，我们将检查此查询的估计基线执行计划。\n\n请参考图 11-32。\n\n![图 11-32：基线估计查询计划](img/527021_1_En_11_Fig35_HTML.jpg)\n\
