  \n\n\n如果这还不足以证明我们需要将 `CTE` 放入报告表中！\n\n## 报告表需求与加载策略\n\n此外，让我们修订一下需求场景，使其反映出在报告发布到\
  \ `SSRS` 网站后，将有多个用户（最多 10-20 人）运行此报告。报告需要筛选器，以便用户可以选择年份。\n\n目前，该报告针对单个年份返回 1,011\
  \ 行。用户很可能希望不仅能按年份筛选，还能按工厂、地点和年份进行筛选。从长远考虑，将 `CTE` 实现为一个每月加载一次的报告表是合理的。一个额外的复杂因素可能是用户希望获取历史数据，但同时希望对当月数据进行每日加载，因此需要修订加载策略：\n\
  \n一次性加载所有之前的月份数据，然后在当月的每一天晚上仅加载当天的数据。这样，我们就可以在非高峰时段完成事实表与四个维度表之间所有那些耗费性能的 `JOIN`\
  \ 操作。\n\n让 20 个用户每天多次执行基于 `CTE` 的查询是毫无意义的。以下是我们将用于执行一次性加载的 `INSERT` 命令。\n\n## 实现报告表\n\
  \n请参考代码清单 10-4。\n\n```sql\nINSERT INTO Reports.PlantSumEquipFailures\nSELECT\nC.CalendarYear,\
  \ C.QuarterName, C.MonthName, C.CalendarMonth, P.PlantName,L.LocationName, SUM(EF.Failure)\
  \ AS SumEquipFailures\nFROM DimTable.CalendarView C\nJOIN FactTable.EquipmentFailure\
  \ EF\nON C.CalendarKey = EF.CalendarKey\nJOIN DimTable.Equipment E\nON EF.EquipmentKey\
  \ = E.EquipmentKey\nJOIN DimTable.Location L\nON L.LocationKey = EF.LocationKey\n\
  JOIN DimTable.Plant P\nON L.PlantId = P.PlantId\n-- 以下是每日加载\n-- 使用下面的 WHERE 子句获取当天的数值。\n\
  -- WHERE C.CalendarDate = CONVERT(DATE,GETDATE())\n-- 以下是单次获取所有上月数据加载\n-- 使用下面的\
  \ WHERE 子句获取上个月的所有数值。\n-- WHERE MONTH(C.CalendarDate) = DATEDIFF(mm,MONTH(CONVERT(DATE,GETDATE())))\n\
  GROUP BY\nC.CalendarYear\n,C.QuarterName\n,C.MonthName\n,C.CalendarMonth\n,P.PlantName\n\
  ,L.LocationName\nORDER BY\nC.CalendarYear\n,C.QuarterName\n,C.MonthName\n,P.PlantName\n\
  ,L.LocationName\nGO\n```\n**代码清单 10-4**\n加载报告表\n\n`INSERT` 语句很直接。它基于 `CTE`，因此我不再重复讨论，但请注意其中注释掉的\
  \ `WHERE` 子句。\n\n第一个可用于 `INSERT` 查询以获取当天的故障数据。第二个 `WHERE` 子句可用于一次性加载，以检索所有之前月份的故障数据。因此，现在在非高峰时段的查询应该会很快，因为它仅检索当天的故障数据。\n\
  \n## 查询报告表\n\n代码清单 10-5 是修订后的查询，可轻松用于不仅包含年份筛选器，还包含工厂和地点筛选器的 `SSRS` 报告。\n\n```sql\n\
  SELECT\nPlantName, LocationName, CalendarYear, QuarterName,\nMonthName, CalendarMonth,\
  \ SumEquipFailures,\nLAG(SumEquipFailures,1,0) OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\n\
  ORDER BY CalendarMonth\n) AS LastFailureSum\nFROM Reports.PlantSumEquipFailures\n\
  WHERE CalendarYear > 2008\nGO\n```\n**代码清单 10-5**\n查询报告表\n\n非常简单。让我们看看新的修订计划。\n\n\
