  它也能正确处理闰年，所以我认为我们可以为这项圆满完成的工作而祝贺自己。


  最后一点说明：当你从分析师那里收到口头或书面的业务需求时，你应该花时间编写一个简单的技术规范，包括以下三个步骤：


  步骤 1：定义初始条件。


  步骤 2：写出满足业务需求的逻辑。


  步骤 3：定义能正确生成报告的最终条件。


  那么，我所说的初始和最终条件是什么意思呢？对于我们的小脚本，它们由以下问题解答：


  我们如何处理第一行？我们是包含缺失数据还是只显示 `NULL`？


  我们如何处理最后一行？我们是包含缺失数据还是只显示 `NULL`？


  所以，换句话说，要识别出任何不包含在脚本主体逻辑中的特殊处理。


  最后但同样重要的是，测试，测试，再测试（我说过测试吗）？


  ## 本章小结


  我们在本章学到了什么？


  一方面，我们意识到我们的工具包不仅包含聚合函数、排名函数和分析函数，还包括辅助工具，如估计查询计划生成器；各种性能和运行时统计信息，如 `IO`、`TIME`
  和 `PERFORMANCE`；以及 Microsoft Excel。我们使用 Excel 来直观地解释数据结果，为我们的分析师提供完整的视图。


  我们还通过深入探究查询计划步骤，了解了查询的各个部分是如何处理的以及生成了哪些统计信息，从而扩展了我们的知识。


  最后，我们快速讨论了实时查询计划生成器，这样我们就可以看到每个任务花费了多少时间，以及任务之间传递的数据量，从而让我们对幕后处理有一个完整的了解。这有助于识别需要分析的高性能步骤。


  希望在本阶段，您能看到如何遵循结构化的性能调优方法，以及可以应用哪些工具和解决方案来解决性能问题。这些方法包括添加索引、使用报告表，以及在某些情况下为 `TEMPDB`
  升级更快的内存和固态硬盘硬件。我们没有讨论内存增强表，但这也是您可以考虑的一个工具。


  下一章将把分析窗口函数应用于我们的金融数据库，并对其进行严格测试。


  '
- "# 第 7 章 金融用例：分析函数\n\n这是处理我们金融数据库的最后一章。我们将对分析函数进行全面测试并执行通常的性能分析，但同时也会研究一些涉及查询变体的策略，例如从基于\
  \ `CTE` 的查询转到基于报告表的查询，再到使用内存增强表，以查看哪种方案能产生更好的性能。\n\n## 分析函数\n\n以防您没有阅读第 3 章，以下是本类别中我们将讨论的八个函数（按名称排序）。它们与\
  \ `OVER()` 子句一起使用，以为我们的业务分析师生成有价值的报告：\n\n*   `CUME_DIST()`\n*   `FIRST_VALUE()`\n\
  *   `LAST_VALUE()`\n*   `LAG()`\n*   `LEAD()`\n*   `PERCENT_RANK()`\n*   `PERCENTILE_CONT()`\n\
  *   `PERCENTILE_DISC()`\n\n我们将采用与前一章相同的方法。我会描述函数的功能，并给出代码和结果。接着，进行一些性能分析，以便我们查看是否需要进行任何改进。\n\
  \n正如我们在第 3 章的示例中所看到的，改进措施可以是添加索引，甚至是创建一个反规范化报告表，这样当执行使用分析窗口函数的查询时，它针对的是预加载的数据，避免了\
  \ `JOIN`、计算和复杂逻辑。您很少会收到需要对实时数据使用窗口函数的需求。如果出现了这种情况，报告表策略将对您没有帮助。\n\n\n\n### CUME_DIST(\
  \ ) 函数\n\n该函数用于计算某个值在数据集（如表、分区或加载了测试数据的表变量）中的相对位置。这里的关键词是“相对”。\n\n## 它是如何工作的？\n\n\
  首先，计算有多少个值排在它前面或与它相等（将此值称为 `C1`）。接下来，计算数据集中的值或行数（将此值称为 `C2`）。然后用 `C1` 除以 `C2`，即可得到累积分布结果。请查阅微软文档以了解所有函数的返回数据类型，因为他们的文档描述中包含大量有用信息。此处的数据类型是\
  \ `FLOAT(53)`。你可能需要使用 `FORMAT()` 函数将其转换为百分比，以便在结果报告中看起来更美观。\n\n回想一下，该函数与 `PERCENT_RANK()`\
  \ 函数类似，后者的工作方式如下：\n\n给定数据集中的一组值，该函数会计算每个单独值相对于整个数据集的排名。该函数也返回一个百分比，数据类型同样是 `FLOAT(53)`。\n\
  \n回到 `CUME_DIST()` 函数。我们将看两个例子，一个简单的，然后是一个将查询我们金融交易数据库的例子。\n\n我们的分析师希望我们创建一份报告，按年、季度、月份、客户\
  \ ID 以及投资组合编号和名称分组，显示 `Portfolio` 表中的月度和季度累积分布。当然，客户是我们的朋友客户 `C0000001`（John Smith），年份是\
  \ 2012 年。John Smith 的收入等级在 15 万到 25 万美元之间，还不错。\n\n一旦查询得到验证，就可以修改为适用于多个客户和年份。记住，先生成满足要求的小范围结果，然后（在测试后）根据需要修改数据范围。\n\
  \n## 简单示例\n\n我们先看一个简单的例子，以便了解前面的描述在小数据集上是如何工作的。请参考清单 7-1。\n\n```\nUSE TEST\nGO\n\
  DECLARE @CumDistDemo TABLE (\nCol1 VARCHAR(8),\nColValue INTEGER\n);\nINSERT INTO\
  \ @CumDistDemo VALUES\n('AAA',1),\n('BBB',2),\n('CCC',3),\n('DDD',4),\n('EEE',5),\n\
  ('FFF',6),\n('GGG',7),\n('HHH',8),\n('III',9),\n('JJJ',10)\nSELECT Col1,ColValue,\n\
  CUME_DIST() OVER(\nORDER BY ColValue\n) AS CumeDistValue,\nA.RowCountLE,\nB.TotalRows,\n\
  CONVERT(DECIMAL(10,2),A.RowCountLE)\n/ CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist\n\
  FROM @CumDistDemo CDD\nCROSS APPLY (\nSELECT COUNT(*) AS RowCountLE FROM @CumDistDemo\n\
  WHERE ColValue <= CDD.ColValue\n) A\nCROSS APPLY (\nSELECT COUNT(*) AS TotalRows\
  \ FROM @CumDistDemo\n) B\nGO\n```\n\n**清单 7-1**  \n一个简单的示例\n\n声明了一个名为 `@CumeDistDemo`\
  \ 的简单表变量，并加载了十行数据。只创建了两列。第一列名为 `Col1`，充当键列，而 `ColValue` 列存储数据。在我们的例子中，这些数据是数字 1\
  \ 到 10。非常简单。\n\n查询使用了 `CUME_DIST()` 函数和一个 `OVER( )` 子句。未包含 `PARTITION BY` 子句，但使用了\
  \ `ORDER BY` 子句，按 `ColValue` 列的升序对分区行进行排序。\n\n我们需要包含计算累积分布的公式，以便了解其工作原理并与 SQL Server\
  \ 版本进行比较。公式如下：\n\n值小于或等于当前列值的行数除以总行数。\n\n为了获取此公式的值，使用了两个 `CROSS APPLY` 运算符。第一个计算值小于或等于当前列值的行数，第二个计算数据集中的总行数。\n\
  \n这个查询可能可以优化，但就我们的目的而言，它应该足以说明 `CUME_DIST()` 函数的工作原理。\n\n`CROSS APPLY` 块中查询返回的值用于\
  \ `SELECT` 子句中的公式：\n\n```\nCONVERT(DECIMAL(10,2),A.RowCountLE)\n/ CONVERT(DECIMAL(10,2),B.TotalRows)\
  \ AS MyCumeDist\n```\n\n让我们执行查询，看看结果。请参考图 7-1。\n\n![](img/527021_1_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1**  \n计算累积分布的两种方法\n\n看起来不错且符合预期，我想！`MyCumeDist` 列包含我们创建的公式计算出的值，而名为 `CumeDistValue`\
  \ 的列包含 SQL Server 函数计算出的值。可能需要一点格式化以使它们看起来相同，但值是匹配的。\n\n## 金融示例\n\n现在看一个金融例子。我们的分析师提供了以下业务需求：\n\
  \n为 John Smith 客户 (`C0000001`) 生成一份报告，显示按月份和季度的累积分布。结果需要是针对 2012 年的，并且还需要显示年份、季度、月份、客户\
  \ ID、投资组合和月度价值。\n\n请参考清单 7-2。\n\n```\nWITH PortfolioAnalysis (\nTradeYear,TradeQtr,TradeMonth,CustId,PortfolioNo,Portfolio,MonthlyValue\n\
  )\nAS (\nSELECT Year AS TradeYear\n,DATEPART(qq,SweepDate) AS TradeQtr\n,Month \
  \                 AS TradeMonth\n,CustId\n,PortfolioNo\n,Portfolio\n,SUM(Value)\
  \             AS MonthlyValue\nFROM Financial.Portfolio\nWHERE Year > 2011\nGROUP\
  \ BY CustId\n,PortfolioNo\n,Year\n,Month\n,SweepDate\n,Portfolio\n)\nSELECT TradeYear\n\
  ,TradeQtr\n,TradeMonth\n,CustId\n,PortfolioNo\n,Portfolio\n,MonthlyValue\n,CUME_DIST()\
  \ OVER(\nPARTITION BY Portfolio\nORDER BY TradeMonth,Portfolio\n) AS CumeDistByMonth\n\
  ,CUME_DIST() OVER(\nPARTITION BY Portfolio\nORDER BY TradeQtr,Portfolio\n) AS CumeDistByMonth\n\
  FROM PortfolioAnalysis\nWHERE TradeYear = 2012\nAND CustId = 'C0000001'\nGO\n```\n\
  \n**清单 7-2**  \n月度投资组合累积分布分析\n\n使用了我们常见的 `CTE` 模板。该 `CTE` 计算投资组合的月度总和，而引用该 `CTE`\
  \ 以计算累积分布的查询使用了两个 `OVER()` 子句。该 `CTE` 返回年份大于 2011 年的结果。我们跳过了 2011 年，因为那是账户开户的时间，我们知道初始余额是\
