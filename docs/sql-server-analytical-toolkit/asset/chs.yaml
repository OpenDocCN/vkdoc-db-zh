  \ 服务器及其网站，以及 PowerBuilder 服务器及其网站。如果您立志成为一名 SQL Server 数据架构师，那么您能学习的东西是无穷无尽的。\n\n\
  #### 查看数据模型\n\n接下来，我们将查看作为报告和可视化基础的数据模型。\n\n请参阅图 12-50。\n\n![](img/527021_1_En_12_Fig50_HTML.jpg)\n\
