  \ ID、库存 ID、货位 ID、产品 ID、月平均库存数量、滚动年累计。\n\n图 13-1\n月平均库存的累积分布分析\n\n由于 `PARTITION BY`\
  \ 子句指定 `ORDER BY` 子句按月份排序，RollingYearCume 值按升序排列，我们可以清楚地看到累积分布将生成一条漂亮的上弯曲线。让我们将此结果复制到\
