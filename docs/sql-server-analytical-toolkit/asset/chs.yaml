  ,MONTH(PostDate) AS AcctMonth\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n,SUM(AcctBalance)\
  \ AS AcctBalance\nINTO FinancialReports.AccountClustered\nFROM Financial.Account\n\
  GROUP BY YEAR(PostDate)\n,MONTH(PostDate)\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n\
  GO\n```\n清单 7-6\n创建账户月度余额报告表\n\n此批处理脚本使用 `SELECT/INTO` 命令动态创建表。章节脚本代码包含了使用 `INSERT`\
  \ 命令的截断/加载表。\n\n清单 7-7 是两个索引，希望能帮助消除计划中昂贵的排序步骤。\n\n```sql\nCREATE CLUSTERED INDEX\
  \ ieYearMonthCustIdPrtfNoAcctNoAcctName\nON FinancialReports.AccountClustered (\n\
  [AcctYear],[AcctMonth],[CustId],[PrtfNo],[AcctNo],[AcctBalance]\n)\nGO\nCREATE INDEX\
  \ ieCustIdAcctYearAcctMonthAcctNameAcctName\nON FinancialReports.AccountClustered\
  \ (\n[CustId],[AcctYear],[AcctName],[AcctMonth]\n)\nGO\n```\n清单 7-7\n创建聚集和非聚集索引\n\
  \n清单 7-8 是修改后的查询，因此它访问新的报告表。结果是相同的，因此我不会显示输出截图（进行修改时务必检查——你永远不知道会发生什么）。\n\n```sql\n\
  SELECT CustId\n,AcctYear\n,AcctMonth\n,PrtfNo\n,AcctNo\n,AcctName\n,AcctBalance\n\
  ,LAG(AcctBalance) OVER (\nPARTITION BY CustId,AcctYear,AcctName\nORDER BY AcctMonth\n\
  ) AS LastMonthBalance\n,AcctBalance -\n(\nLAG(AcctBalance) OVER (\nPARTITION BY\
  \ CustId,AcctYear,AcctName\nORDER BY AcctMonth\n)\n) AS Change\nFROM FinancialReports.AccountClustered\n\
  WHERE AcctYear >= 2013\nGO\n```\n清单 7-8\n使用带有聚集和非聚集索引的账户报告表\n\n让我们比较原始查询和报告表版本的查询计划。\n\
