  \n\n#### 执行计划分析与优化\n\n一张 SSMS 窗口的截图。它展示了估计执行计划的 D 部分，包含 12 个组件。这些组件分别是：select、compute\
  \ scalar、nested loops、table spool、segment、compute scalar、compute scalar、nested loops、nested\
  \ loops、stream aggregate、table spool 和 table spool。\n\n图 7-35\n\n估计执行计划，E 部分\n\n\
  同样的模式再次出现，这次有一个最终的 table spool，其成本为 1%，以及一个最终的 nested loops join 用于合并结果（4%成本）。该\
  \ table spool 显示的成本为 1%，尽管`STATISTICS PROFILE`统计显示`IO`为 0。\n\n初步结论是，改进此计划的唯一途径是：\n\
  \n1.  获取更多内存\n2.  将`TEMPDB`放置在固态硬盘上\n3.  通过内存优化表将 Account 表加载到内存中\n\n都是不错的建议，但值得这样做吗？\n\
  \n作为最后一项，让我们生成一个实时查询计划，以便我们能看到计划最后、左侧部分所有任务之间的数据流。请参考图 7-36。\n\n![](img/527021_1_En_7_Fig37_HTML.png)\n\
  \n一张 SSMS 窗口的截图。它展示了一个包含 12 个组件的实时查询计划。这些组件分别是：select、compute scalar、nested loops、table\
  \ spool、segment、compute scalar、compute scalar、nested loops、nested loops、stream aggregate、table\
  \ spool 和 table spool。\n\n图 7-36\n\n实时查询计划\n\n在这里，我们看到了各个分支中的行数，最终计数为 49 行，这与我们在查询窗格结果中看到的一致。\n\
  \n**提示**\n\n务必将估计查询计划与实时查询计划进行比较，以确保数值和运算符的偏差不会过大。\n\n还记得方案 3 吗？让我们看看它是如何工作的。我们将创建几个内存优化表，每个表对应一年的账户余额，并看看这在性能提升方面能带来什么好处，尽管代价是增加了复杂性。\n\
  \n### 多内存优化表策略\n\n我们将创建五个内存优化表，每个表对应 2011 年到 2015 年中的一年。我们将加载它们，创建一个`VIEW`对象，通过`UNION\
  \ ALL`运算符将所有五个表关联起来，并修改之前的查询，使其通过这个新的`VIEW`访问内存优化表。让我们从创建和加载表开始。\n\n**注意**\n\n一旦内存优化表被创建并加载，即使你重启笔记本电脑，也无需重新加载它们。它们会自动加载。你只需要添加新的行。确保不要意外添加重复的行！\n\
  \n清单 7-16 是第一个表的代码。其余表的代码与此相同，只是表名中的年份部分会相应更改为剩余的年份：2012、2013、2014 和 2015。\n\n```\n\
  CREATE TABLE [FinancialReports].[AccountMonthlyBalancesMem2011]\n(\n[AcctYear] \
  \   [int] NULL,\n[AcctMonth]   [int] NULL,\n[CustId]      varchar NOT NULL,\n[PrtfNo]\
  \      varchar NOT NULL,\n[AcctNo]      varchar NOT NULL,\n[AcctName]    varchar\
  \ NOT NULL,\n[AcctBalance] decimal NOT NULL,\nINDEX [ieMonthlyAcctBalanceMemory2011]\
  \ NONCLUSTERED\n(\n[CustId],\n[AcctYear],\n[AcctMonth],\n[PrtfNo],\n[AcctNo]\n)\n\
  )WITH (MEMORY_OPTIMIZED = ON,DURABILITY = SCHEMA_ONLY)\nGO\n```\n清单 7-16\n创建五个内存优化表\n\
  \n这个表对于所有五个表都是典型的；当然，变化的只是表名。我们需要在`CREATE TABLE`命令中声明一个索引，并将内存优化参数设置为`ON`：\n\n```\n\
  WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )\n```\n\n在本章的脚本中，你会找到所有五个`CREATE\
  \ TABLE`命令的`DDL`命令。接下来，我们需要加载这些表。\n\n清单 7-17 是用于向第一个内存表（2011 年的账户余额）插入行的`TSQL DML`命令。其余的插入语句是相同的，只是我们将表名更改为要加载的年份，并将`WHERE`子句谓词更改为我们需要加载的剩余年份的数据。\n\
  \n```\nINSERT INTO [FinancialReports].[AccountMonthlyBalancesMem2011]\nSELECT YEAR(PostDate)\
  \ AS AcctYear\n,MONTH(PostDate) AS AcctMonth\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n\
  ,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance\nFROM Financial.Account\n\
  WHERE YEAR(PostDate) = 2011\nGROUP BY YEAR(PostDate)\n,MONTH(PostDate)\n,CustId\n\
  ,PrtfNo\n,AcctNo\n,AcctName\nGO\n```\n清单 7-17\n加载五个内存优化表\n\n这是一个标准的`INSERT/SELECT`命令，带有`GROUP\
  \ BY`子句，因为我们正在按年、月、客户和投资组合对账户余额进行汇总。我们的最后一步是创建`TSQL VIEW`对象。\n\n是的，这些操作会带来性能成本，但由于这是历史数据，你每年只需要加载一次。随着新年的到来，你加载一次即可。现在我们需要将所有这些表关联成一个`VIEW`对象。\n\
  \n清单 7-18 是用于创建`VIEW`的`DDL`命令，该视图通过五个使用`UNION ALL`命令相互连接的查询来连接所有表。\n\n```\nCREATE\
  \ VIEW [FinancialReports].[AccountMonthlyBalancesMemView]\nAS\nSELECT [AcctYear]\n\
  ,[AcctMonth]\n,[CustId]\n,[PrtfNo]\n,[AcctNo]\n,[AcctName]\n,[AcctBalance]\nFROM\
  \ [FinancialReports].[AccountMonthlyBalancesMem2011]\nUNION ALL\nSELECT [AcctYear]\n\
  ,[AcctMonth]\n,[CustId]\n,[PrtfNo]\n,[AcctNo]\n,[AcctName]\n,[AcctBalance]\nFROM\
  \ [FinancialReports].[AccountMonthlyBalancesMem2012]\nUNION ALL\nSELECT [AcctYear]\n\
  ,[AcctMonth]\n,[CustId]\n,[PrtfNo]\n,[AcctNo]\n,[AcctName]\n,[AcctBalance]\nFROM\
  \ [FinancialReports].[AccountMonthlyBalancesMem2013]\nUNION ALL\nSELECT [AcctYear]\n\
  ,[AcctMonth]\n,[CustId]\n,[PrtfNo]\n,[AcctNo]\n,[AcctName]\n,[AcctBalance]\nFROM\
  \ [FinancialReports].[AccountMonthlyBalancesMem2014]\nUNION ALL\nSELECT [AcctYear]\n\
  ,[AcctMonth]\n,[CustId]\n,[PrtfNo]\n,[AcctNo]\n,[AcctName]\n,[AcctBalance]\nFROM\
  \ [FinancialReports].[AccountMonthlyBalancesMem2015]\nGO\n```\n清单 7-18\n基于五个内存优化表创建视图\n\
  \n脚本很长，但它只是一系列四个`UNION ALL`命令，通过除了表名外完全相同的查询将所有五个表中的行连接在一起。\n\n**提示**\n\n与`UNION`相比，更推荐使用`UNION\
  \ ALL`，因为`UNION`会去除重复项，性能成本更高。你的数据中不应该有意外的重复或三重及更多重复！\n\n最后但同样重要的是，清单 7-19 是我们的查询，它包含了`PERCENTILE_DISC()`函数，现在该函数引用的是`VIEW`而不是一张大表。\n\
  \n```\nSELECT CustId\n,AcctYear\n,AcctMonth\n,AcctNo\n,AcctName\n,AcctBalance\n\
  ,PERCENTILE_DISC(.25)\nWITHIN GROUP (ORDER BY AcctBalance)\nOVER (\nPARTITION BY\
  \ CustId,AcctYear\n) AS [PercentDisc-25%]\n,PERCENTILE_DISC(.50)\nWITHIN GROUP (ORDER\
  \ BY AcctBalance)\nOVER (\nPARTITION BY CustId,AcctYear\n) AS [PercentDisc-50%]\n\
  ,PERCENTILE_DISC(.75)\nWITHIN GROUP (ORDER BY AcctBalance)\nOVER (\nPARTITION BY\
  \ CustId,AcctYear\n) AS [PercentDisc-75%]\n,PERCENTILE_DISC(.90)\nWITHIN GROUP (ORDER\
  \ BY AcctBalance)\nOVER (\nPARTITION BY CustId,AcctYear\n) AS [PercentDisc-90%]\n\
  FROM [FinancialReports].[AccountMonthlyBalancesMemView]\nWHERE Acctname = 'OPTION'\n\
  AND CustId = 'C0000001'\nORDER BY CustId\n,AcctYear\nGO\n```\n清单 7-19\n基于内存表视图的账户余额报告\n\
  \n无需解释代码，因为我们之前已经讨论过。所有变化的是我们现在引用的是一个`VIEW`。\n\n结果与`CTE`查询相同，因此为了节省篇幅，我将不再在此处显示另一个截图。\n\
  \n### 性能考虑\n\n我们有一个非常有趣的估计执行计划，因此请务必阅读下一部分。\n\n请参考图 7-37。\n\n![](img/527021_1_En_7_Fig38_HTML.png)\n\
  \n这是 SSMS 窗口的截图。它展示了包含 20 个组件的估计执行计划的 A 部分。这些组件包括嵌套循环、表假脱机、段、排序、串联、筛选器、表扫描、4 组筛选器和表\
  \ Seek、嵌套循环、计算标量、流聚合以及 2 个表假脱机。\n\n**图 7-37**\n\n多内存增强表策略的估计执行计划 – A 部分\n\n是的，它很有趣且更复杂。我们看到针对内存增强表的索引\
  \ Seek，但由于它们在内存中，这应该能提高性能。我们看到了熟悉的身影：成本为 0% 的表假脱机任务、成本为 41% 的排序、成本为 1% 的表假脱机，以及第一个嵌套循环内部联接。回想一下，我们学过由表假脱机操作符创建的临时表可以被重用（*共享*\
  \ 可能是更好的术语），因此我们不会有一大堆临时表占用 `TEMPDB` 上的空间。\n\n因此，这给了我们一种提高性能的策略：如果无法消除表假脱机，那么让您的\
  \ DBA 将 `TEMPDB` 放在固态硬盘上 – 这应该会有所帮助。\n\n让我们看看计划的第二部分。\n\n请参考图 7-38。\n\n![](img/527021_1_En_7_Fig39_HTML.png)\n\
  \n这是 SSMS 窗口的截图。它展示了包含 11 个组件的估计执行计划的 B 部分。这些组件包括嵌套循环、表假脱机、段、计算标量、计算标量、序列项目、段、嵌套循环、流聚合、表假脱机和表假脱机。\n\
  \n**图 7-38**\n\n多内存增强表策略的估计执行计划 – B 部分\n\n又来了，相同的模式：成本为 0% 的表假脱机任务，一个成本为 1%，以及成本为\
  \ 5% 的嵌套循环联接。计划的其余部分相同，就像使用 `CTE` 方法的情况一样，所以看起来我们所做的只是让查询在加载和引入创建及加载内存增强表的逻辑方面变得更加复杂。\n\
  \n对于具有多个 `CPU` 的服务器来说，这种策略将是理想的，这样查询引擎就可以并行执行从每个表中检索数据的逻辑。更多硬件解决方案，但实施成本也更高！\n\n\
  让我们看看完整的性能情况。那么 `IO` 和 `TIME` 统计数据呢？\n\n请参考图 7-39。\n\n![](img/527021_1_En_7_Fig40_HTML.png)\n\
  \n这是 SSMS 窗口的截图。文本展示了 2 组 IO 和 TIME 统计数据。对于 1 和 2，解析和编译时间的 CPU 和流逝时间分别为 0, 55 毫秒和\
  \ 0, 111 毫秒。对于 1 和 2，执行时间的 CPU 和流逝时间分别为 0, 52 毫秒和 0, 2 毫秒。影响了 49 行。\n\n**图 7-39**\n\
  \n多内存增强表方案的 IO 和 TIME 统计数据\n\n现在我们有些进展了。工作表统计数据没有变化，但账户余额表统计数据没有显示在内存表查询统计信息中。这是因为所有操作都在内存中执行，因此看起来是一个显著的改进，因为我们消除了一整套操作。最后，SQL\
  \ Server 的执行时间从 52 毫秒减少到 2 毫秒，这是另一个显著的改进。SQL Server 的解析和编译时间使用内存增强表方法翻了一倍。你不可能赢得所有方面。\n\
  \n因此，这个方案看起来很有希望。\n\n对于最后一项，让我们比较三种方案的 `IO` 和 `TIME` 统计数据：`CTE` 方法、报表表方法和内存增强表方法。\n\
  \n请参考图 7-40。\n\n![](img/527021_1_En_7_Fig41_HTML.png)\n\n这是 SSMS 窗口的截图。文本展示了 3 组\
  \ IO 和 TIME 统计数据。对于 1、2 和 3，解析和编译时间的 CPU 和流逝时间分别为 31, 88 毫秒、16, 74 毫秒和 0, 0 毫秒。对于\
  \ 1、2 和 3，执行时间的 CPU 和流逝时间分别为 0, 179 毫秒、0, 59 毫秒和 0, 1 毫秒。\n\n**图 7-40**\n\n比较 IO\
  \ 和 TIME 统计数据\n\n有点难看清，但让我们比较一些重要的统计数据。从左到右，我们分别看到 `CTE/QUERY` 方法、报表表方法以及最后的内存增强表方法的\
  \ `IO` 和 `TIME` 统计数据。\n\n解析和编译时间从 88 毫秒到 74 毫秒再到 0 毫秒 – 巨大的改进。\n\n工作表 `IO` 值在三种方法中都相同，只有内存增强表方法的\
  \ `IO` 值上升了，从 595 增加到 610。\n\n最后，SQL Server 的执行时间从 179 毫秒到 59 毫秒再到 1 毫秒！\n\n对我来说，这看起来是结论性的，但这些测试需要使用\
  \ `DBCC` 清除缓存并记录性能统计数据的情况下执行多次。\n\n最后，让我们快速查看 `STATISTICS PROFILE` 统计结果。\n\n请参考图\
  \ 7-41。\n\n![](img/527021_1_En_7_Fig42_HTML.png)\n\n这是 SSMS 窗口的截图。它有 2 个表格，分别有 5\
  \ 列和 6 列，以及 51 行和 61 行。列标题是估计 ID、估计 CPU、平均行大小、总子树和估计 ID、估计 CPU、平均行大小、总子树、输出。\n\n\
  **图 7-41**\n\n比较两种方案的配置文件统计数据\n\n看起来变化不大，只是 `CTE` 方法生成了 50 个步骤，而内存增强表方法生成了 60 个步骤。\n\
  \n**结论：** 就性能改进而言，内存增强表方法似乎有效，但实施和维护的复杂性增加，因为需要加载表，并且需要创建和加载新表。如前所述，如果有一个可以实施 `TEMPDB`\
  \ 的固态硬盘，那么性能应该会显著提高。此外，也推荐使用非常快且容量大的内存。\n\n总之，我们需要正确看待事物。这个分析是在个人笔记本电脑上通过运行查询和估计查询计划来执行的。当然，我们在提高性能方面能做的事情有限，但我认为我们已经看到了可用的策略以及应该查看哪些统计数据来判断哪个策略更有效。如前所述，当您在公司开发服务器上执行此工作时，您有更多的选择。我留给您一个问题：\n\
  \n创建和加载所有内存增强表以及创建视图值得吗？同样地，创建 `CTE`/查询和报表表方法也值得吗？我认为值得。您不仅可以了解一些可以考虑的策略，还可以了解查询计划中的操作符如何工作以及临时表如何被使用（和共享）来假脱机数据。\n\
  \n总结一下，这是我们讨论过的策略以及一个我们没有讨论的：\n\n1.  `CTE`/查询方法\n2.  预加载的报表表方法\n3.  单个内存增强表方法\n\
  4.  多个内存增强表方法（在单独的磁盘上创建）\n5.  **分区表（未讨论）**\n\n最后一个，分区表，是一种创建跨多个快速磁盘分布的表的方法，按标准分布，例如每个磁盘存储一年的数据。这对于拥有\
  \ SAN（存储区域网络）磁盘和多 CPU 服务器的环境非常有效。\n\n**注意**\n\n在公司生产环境中，请确保执行与将哪些表放入内存相关的分析。这些应该是查询/报告/脚本目录中\
  \ 80% 会用到的表，以便它们可以共享。内存有限且价格高昂，因此请执行分析和设计，以正确地将表放置在内存或物理存储（无论是磁盘还是 SAN）中。\n\n\n"
- "# 8. 电厂用例：聚合函数\n\n## 概要\n\n我们涵盖了大量内容。我们照例展示了分析函数的查询与结果，但我们讨论了分析性能的新技术和可能的解决方案。\n\
  \n我们重新审视了 `IO`、`TIME` 和 `STATISTIC PROFILE` 统计信息，并看到了它们背后的细节如何告诉我们很多关于查询处理方式以及查询的哪些部分与估算查询计划中的任务相关联的信息。\n\
  \n最后，我们看了一眼实时性能计划，以查看每个任务执行其逻辑所花费的时间，同时也检查了每个任务之间的行流。\n\n我们探讨了用预加载表替换查询中的 `CTE`\
  \ 块的常用策略，还实现了单个内存增强表，然后是多个内存增强表。\n\n最后，我们谈到了诸如 SAN 磁盘阵列和内存等硬件也在提高性能方面发挥作用。我们还暗示了使用分区表将数据分散在多个驱动器上以提高性能，例如为特定数据集中每一年的数据专用一个驱动器。\n\
  \n一张图将让我们了解我们需要用窗口聚合函数监控的设备。请参考图 8-1。\n\n![](img/527021_1_En_8_Fig1_HTML.jpg)\n\n\
  一张示意图，展示了一个由 4 个电厂 P00001、P00002、P00003 和 P00004 组成的发电厂。每个电厂都有锅炉房、涡轮机房、发电机房、X F\
  \ M R（变压器）和输电电力。每个电厂有 4 个阀门和 4 个电机。\n\n**图 8-1**\n\n发电厂概念示意图\n\n我们将在数据库中存储四个电厂的信息。基本上，使用诸如石油或煤炭之类的燃料来加热熔炉，进而将水煮沸直至变成蒸汽。蒸汽推动涡轮机旋转，涡轮机带动发电机旋转，发电机产生电力，最终输送到变压器以升高电压，从而可以分配到每个电厂所支持的区域。\n\
  \n每个电厂将有四个阀门、四个电机、一个锅炉、一个涡轮机和一个发电机，我们需要监控它们是否发生故障。故障统计数据将存储在一个作为雪花模式实现的小型数据仓库中。很简单，但它将给我们提供大量数据，可以通过聚合窗口函数进行分析。\n\
  \n我们将如何做到这一点？\n\n在本章中，我们将采取略有不同的方法。我们几乎在所有的示例中都将消除 `CTE` 的使用。在创建本章代码时，我确实使用了 `CTE`，但这变得重复，因此我拿走了这些代码，并将其用于填充报表表的脚本中。此外，从前面的章节中我们了解到，在处理历史数据时，预加载报表表的方法能带来更高的性能。大多数示例将采用这种方法。\n\
  \n另外，我们将专注于报表输出和结果绘图，直到本章结束前都只进行最少的性能调优讨论。最后，我们将创建一个使用了大部分聚合函数的复杂查询，看看该示例的报表是什么样子。\n\
  \n我们将尝试几种方法，看看哪种效果更好。结论可能会让你感到惊讶！\n\n## 聚合函数\n\n以下是属于此类别的聚合函数列表。我们在前面的章节中已经见过它们，但为了防止你直接跳到本章而没有阅读其他章节，我在这里列出来：\n\
  \n*   `COUNT()` 和 `SUM()`\n*   `MAX()` 和 `MIN()`\n*   `AVG()`\n*   `GROUPING()`\n\
  *   `STRING_AGG()`\n*   `STDEV()` 和 `STDEVP()`\n*   `VAR()` 和 `VARP()`\n\n我们将一起介绍其中一些函数，因为它们天然相关，例如\
  \ `MIN()` 和 `MAX()` 函数、`STDEV()` 和 `STDEVP()`，以及 `VAR()` 和 `VARP()`。我们将在某些情况下，配合\
  \ `OVER()` 子句使用它们，也会在不使用该子句的情况下使用。\n\n由于这是第一个处理名为 `APPlant` 的电厂数据库的章节，我们将看一下数据库的概念模型，以及描述实体、属性和关系的一些简单数据字典。\n\
  \n回想一下，概念数据模型是第一个与业务分析师合作创建的数据模型，目的是定义数据库的业务范围。概念模型由实体、属性和关系组成。随后，创建逻辑规范化模型，最后是物理数据库模型。这是针对事务型数据库而言的。对于数据仓库和数据集市，我们会从概念模型直接进入物理\
  \ `星型` 或 `雪花` 模式设计。\n\n在我们的案例中，我们将从概念数据模型转向高度非规范化的 `雪花` 模式数据仓库模型。我们的数据库将包含三个事实表、几个维度表和两个报表表。事实表和维度表都包括代理键以建立\
  \ `星型` 关系，而两个报表表则没有。它们是基于 `星型` 表的非规范化表，用于生成报表。存在一些类别表和类型表，这些表会将模型从 `星型` 模式转变为 `雪花`\
  \ 模式，例如 `Equipment` 维度表和 `EquipmentType` 维度表之间的关系。\n\n最后，我们将在本章末尾看到设计中存在一个错误。缺少一个重要的关联表或连接表。我们会解决这个问题，敬请期待。\n\
  \n\n## 数据模型\n\n以下是我们简单的概念模型，它将帮助您在开始创建窗口聚合查询时，基本理解所有表是如何关联在一起的。我将展示三个模型，每个对应一个主要的事实表。让我们从设备故障概念模型开始。\n\
  \n请参考图 8-2。\n\n![](img/527021_1_En_8_Fig2_HTML.png)\n\n一个电厂设备故障概念模型的框图。设备故障与设备、制造商、设备类型和位置相关联。阀门、涡轮机、电机和发电机是电厂中的设备类型。\n\
  \n图 8-2\n\n工厂概念数据模型 – 设备故障主题区域\n\n在中心，我们看到 `Equipment Failure` 实体，它将构成 `Equipment\
  \ Failure` 事实表的基础。顾名思义，该实体存储了每台设备的故障次数以及故障日期。\n\n`Equipment` 实体由记录设备 ID、序列号、设备类型和制造商标识符（以代理键的形式）的属性组成。该实体链接到\
  \ `Manufacturer` 实体以及我们将要跟踪的四种设备实体之一。\n\n阀门、涡轮机、电机和发电机是设备类型，因此我们看到这些实体与 `Equipment`\
  \ 实体之间存在类型-子类型关系。\n\n注意\n\n当我们在物理数据库中实现时，它将把我们的模型从 `STAR` 模式修改为 `SNOWFLAKE` 模式。\n\
  \n在模型的右上角，我们看到 `Plant` 实体，其中包含诸如工厂名称和标识符等基本信息。\n\n`Equipment Failure` 实体与 `Location`\
  \ 实体有关联，因此我们知道故障设备的位置。`Valve`、`Turbine`、`Motor` 和 `Generator` 实体也与 `Location` 实体有关联。\n\
  \n倒数第二个是 `Calendar` 实体，它提供设备故障的日期。\n\n最后，关于哪种模型更好，即 `STAR` 模型还是 `SNOWFLAKE` 模型，存在许多讨论和争论。对于较小的数据量，我倾向于选择\
  \ `SNOWFLAKE` 模型，因为它更具表现力，并允许您理解存储对象之间的关系。此外，当类别或类型代码需要更新时，特别是当您需要实现缓慢变化维度时，`SNOWFLAKE`\
  \ 模型允许更轻松、更准确的更新。\n\n结束语：如果实现得当，`STAR` 模式对于大数据量往往性能更好。`SNOWFLAKE` 模式更具表现力且更易于维护。请根据业务需求和实现选择最适合的模型。\n\
  \n让我们看一下将用于创建名为 `EquipmentStatusHistory` 事实表的第二个实体的数据模型。该事实表将存储历史数据，显示设备何时在线或离线以及每种状态的原因。\n\
  \n概念模型请参考图 8-3。\n\n![](img/527021_1_En_8_Fig3_HTML.png)\n\n一个电厂设备状态历史概念模型的框图。设备状态历史块与日历、设备在线状态和设备块相关联。\n\
  \n图 8-3\n\n工厂概念数据模型 – 设备状态历史主题区域\n\n这是一个简单得多的模型。它只有一个事实实体和三个维度实体。与之前的模型一样，`Equipment`\
  \ 实体用于标识正在跟踪其状态历史的设备。`Calendar` 实体提供状态分配的日期，最后一个实体 `Equipment Online Status` 具有标识设备状态的三个代码之一的属性，这些代码在表\
  \ 8-1 中标识。\n\n表 8-1\n\n设备在线状态代码\n\n| 在线状态代码 | 在线状态描述 |\n| --- | --- |\n| 0001 |\
  \ 在线 – 正常运行 |\n| 0002 | 离线 – 维护 |\n| 0003 | 离线 – 故障 |\n\n只有三个状态代码，但足够我们进行一些有趣的分析。\n\
  \n我们的最后一个模型是工厂费用主题区域。请参考图 8-4。\n\n![](img/527021_1_En_8_Fig4_HTML.png)\n\n一个工厂费用概念模型的框图。工厂费用块与日历、工厂和工厂费用类别相关联。\n\
  \n图 8-4\n\n工厂概念数据模型 – 工厂费用主题区域\n\n另一个简单的主题区域模型，只有一个“事实”实体和三个“维度”实体。我用引号标出这些名称，因为这些术语实际上只适用于物理表，但就我们的目的而言，我们理解这些实体用于帮助我们理解将用于构建数据仓库的业务模型。稍后，在数据库实现时，它们将成为事实表或维度表。\n\
  \n回到主题区域模型。这里我们希望记录随时间推移的工厂费用，因此 `Plant Expense` 实体和 `Calendar` 实体之间当然存在关联以记录费用日期。工厂费用与工厂之间的关联是显而易见的。最后，`Plant\
  \ Expense Category` 实体用于使用表 8-2 中显示的以下代码之一标识费用类型。\n\n表 8-2\n\n工厂费用代码\n\n| 费用代码 |\
  \ 费用描述 |\n| --- | --- |\n| 01 | 工资 |\n| 02 | 维修 |\n| 03 | 机械 |\n| 04 | 建筑维护 |\n\n\
  创建了三个简单模型后，让我们创建一些简单的数据字典，提供实体、其属性以及实体之间关系（这些称为业务规则）的描述。\n\n它们有点长，而且说实话，读起来很枯燥。只需看看它们，并在需要时用作参考。至少你知道在哪里可以找到它们。\n\
