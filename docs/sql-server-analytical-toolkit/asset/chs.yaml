  \ 和 `LAST_VALUE()` 的估计查询计划，第 1 部分*\n\n这只是一个估计查询计划的一半，但这种模式在所有函数调用对中都会重复，因此我们在这里应用的任何改进也可以应用于查询计划中的其他模式（我所说的模式是指操作符（任务）和连接流的组合）。\n\
