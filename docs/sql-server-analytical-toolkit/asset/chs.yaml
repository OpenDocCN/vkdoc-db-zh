  \n**图 10-31**\n\n创建数据源非常简单。在 `解决方案资源管理器` 中右键单击 `数据源` 文件夹，然后选择“新建数据源”。此时将显示此面板。单击“基于现有或新连接创建数据源”，点击“下一步”按钮，然后填写名为“模拟信息”的安全信息。换句话说，你希望工具模拟一个具有创建和修改立方体权限的系统用户\
  \ ID 和密码。\n\n## 定义数据视图\n\n请参考图 10-32。\n\n![](img/527021_1_En_10_Fig43_HTML.jpg)\n\
  \n*Plant 数据仓库 Microsoft Visual Studio 窗口截图。左侧面板包含一个图表组织器和一个表列表。右侧是解决方案资源管理器面板，其中\
  \ A P plant . d s v 被选中。它展示了一个星型架构，其中设备链接到 9 个组件。*\n\n**图 10-32**\n\n接下来，右键单击 `数据源视图`\
  \ 文件夹并选择“新建数据源视图”。在这里，你将检索定义维度表和事实表所需的所有表。大多数情况下，你将通过我们在创建数据库时包含的代理键将维度表链接到事实表。\n\
  \n请注意，Valve、Turbine、Generator 和 Motor 维度尚未链接到 Plant 维度。我在创建数据库时犯了一个错误，没有给前四个表设置代理键。我可以使用生产键\
  \ `PlantId` 来连接它们，但这样做有点不妥，尽管也能行得通。我不得不回头为这些表添加代理键，并用分配给 Plant 表的代理键填充它们。\n\n我在清单\
  \ 10-14 中使用了以下代码。\n\n```sql\nALTER TABLE [DimTable].[Generator]\nADD PlantKey INTEGER\
  \ NULL\nGO\nALTER TABLE [DimTable].[Generator]\nADD LocationKey INTEGER NULL\nGO\n\
  UPDATE [DimTable].[Generator]\nSET PlantKey = P.PlantKey\nFROM [DimTable].[Generator]\
  \ G\nJOIN [DimTable].[Plant] P\nON G.PlantId = P.PlantId\nGO\nUPDATE [DimTable].[Generator]\n\
  SET LocationKey = P.LocationKey\nFROM [DimTable].[Generator] G\nJOIN [DimTable].[Location]\
  \ P\nON G.LocationId = P.LocationId\nGO\nSELECT * FROM [DimTable].[Generator]\n\
  GO\n```\n\n*清单 10-14 向设备表添加代理键*\n\n为了节省篇幅，我只展示了 `Generator` 表的代码，因为其余三个表的代码是相同的，只是表名和列名有所不同。\n\
