  ## 股票代码分析


  让我们对一种名为美国铝业的金融工具进行一些统计分析。其股票代码是 `AA`。


  具体要求是报告 2012 年的最低低价、最高低价、最低高价和最高高价。请参考清单 5-18。


  ```sql

  SELECT QuoteYear

  ,QuoteQtr

  ,QuoteMonth

  ,QuoteWeek

  ,Ticker

  ,Company

  ,TickerDate

  ,[Low]

  ,[High]

  ,MIN([Low]) OVER(

  PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

  ORDER BY [Low]

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ) AS MinLow

  ,MAX([Low]) OVER(

  PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

  ORDER BY [Low]

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ) AS MaxLow

  ,MIN([High]) OVER(

  PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

  ORDER BY [High]

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ) AS MinHigh

  ,MAX([High]) OVER(

  PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

  ORDER BY [High]

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ) AS MaxHigh

  FROM [MasterData].[TickerPriceRangeHistoryDetail]

  WHERE Ticker = ''AA''

  AND QuoteYear = 2012

  ORDER BY Ticker

  ,QuoteYear

  ,QuoteQtr

  ,QuoteMonth

  ,QuoteWeek

  ,Company

  ,TickerDate

  GO

  ```

