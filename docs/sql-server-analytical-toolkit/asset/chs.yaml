  回到查询示例，我们看到查询 1、3 和 4 的结果相同，值为 10。使用了`DISTINCT`关键字的第二个查询生成的值是 2！


  所以要注意，如果你省略`ALL`关键字，你会得到与在`COUNT()`函数中包含它相同的结果。使用通配符星号将计算所有内容。


