  \n**小测验**\n如何开启 `IO` 和 `TIME` 统计？\n\n\n\n#### LEAD( ) 函数\n\n`LAG()` 函数的对应函数是 `LEAD()`\
  \ 函数。此函数用于获取相对于当前行的下一行数据值。例如，给定某产品本月的销售额，可以提取该产品下个月的销售额，或指定某个偏移量，比如未来三个月甚至一年的销售额（当然是历史数据；从当前无法预见未来，如果你的数据库不存在未来数据，它也同样无法预见）。\n\
  \n因此，此函数只能用于截至当前日期的历史上下文。**尚不存在未来的值！**\n\n现在来看一下业务分析师的需求：\n\n我们的分析师希望看到与上一个报告相同类型的报告，但这次他们希望看到从当前月份（时间上）到随后的下个月之间的变化。幸运的是，我们现在有了报告表，不再需要使用基于\
  \ `CTE` 的查询。\n\n请参考清单 10-6。\n\n```sql\nSELECT\nPlantName,LocationName,CalendarYear,QuarterName,MonthName\n\
  ,CalendarMonth,SumEquipFailures\n,LEAD(SumEquipFailures,1,0) OVER (\nPARTITION BY\
  \ PlantName,LocationName,CalendarYear,QuarterName\nORDER BY CalendarMonth\n) AS\
  \ NextFailureSum\nFROM [Reports].[PlantSumEquipFailures]\nWHERE CalendarYear > 2008\n\
  GO\n```\n\n清单 10-6\n\n设备故障 LEAD 查询\n\n我们所做的只是复制粘贴了上一个查询，并使用 `LEAD()` 函数替代了 `LAG()`\
  \ 函数。让我们在图 10-13 中查看结果。\n\n![](img/527021_1_En_10_Fig18_HTML.png)\n\n一个 S Q L, S\
  \ S M S 窗口的截图。它有一个包含 9 列和 1011 行的表。列标题为：工厂名称、地点名称、日历年、季度名称、月份名称、日历月份、设备故障总数和下期故障总数。最后\
  \ 5 列的第 7、8 和 9 行被框出。\n\n图 10-13\n\n当月与下月故障\n\n如图所示，此函数也运行良好。请注意，当处理新季度时，下个月的值是如何重置的，这正是我们在\
  \ `PARTITION BY` 子句中指定的那样。\n\n家庭作业\n\n使用此函数和上一个函数，添加逻辑以计算上个月故障值与当前月故障值之间的差值。同时对\
  \ `LEAD()` 函数执行相同操作。即，计算当前值与下个月值之间的差异。创建一个大型查询并进行一些性能分析。如果你遇到困难，本章脚本中包含了此作业的代码。\n\
  \n性能分析时间！\n\n### 性能注意事项\n\n让我们以通常的方式创建一个基线估计查询计划。请记住，你不能为 `LEAD()` 或 `LAG()` 函数指定\
  \ `RANGE` 或 `ROW` 窗口框架。因此，你只能相对于当前月向前看，或从当前月向后看。\n\n回到查询。`OVER()` 子句中包含了 `PARTITION\
  \ BY` 和 `ORDER BY` 子句。\n\n我想我们可以推断出哪些任务会有较高的百分比值。请参考图 10-14。\n\n![](img/527021_1_En_10_Fig19_HTML.png)\n\
  \n一个 S Q L, S S M S 窗口的截图。它展示了一个包含 9 个组件的基线估计查询计划。这些组件是：计算标量、流聚合、窗口假脱机 成本 6%、段、计算标量、序列投影、段、排序\
  \ 成本 41%、表扫描 成本 31%。\n\n图 10-14\n\nLEAD 函数查询的基线估计查询计划\n\n如果你猜到我们会看到代价高昂的排序和窗口假脱机任务，那么你是正确的。请注意，排序任务占比\
  \ 61%，窗口假脱机任务占比 6%。我们正在处理的表对于建立索引来说太小了，因此我们将通过查看 `IO` 和 `TIME` 统计信息来结束分析。\n\n请参考图\
  \ 10-15。\n\n![](img/527021_1_En_10_Fig20_HTML.png)\n\n一个 S Q L, S S M S 窗口的截图。文本显示了\
  \ I O 和 TIME 统计信息。S Q L 服务器解析和编译时间，C P U 和 已用时间 分别为 0 和 35 毫秒。S Q L 服务器执行时间，C P\
  \ U 和 已用时间 分别为 16 和 138 毫秒。影响了 1011 行，2 个表列。\n\n图 10-15\n\n`LEAD()` 函数的 IO 和 TIME\
  \ 统计信息\n\n情况不算太糟：工作表的所有值均为零，报告表的扫描计数为 1，逻辑读取为 13，物理读取为 2。\n\n我认为我们现在可以达成共识：当使用窗口函数处理历史数据时，我们应始终考虑使用某种形式的非规范化报告表作为基表，以替代任何\
  \ `CTE`。这种方法将提供良好的性能，特别是当多个用户通过报告或直接使用 SSMS 执行相同查询时。\n\n随堂测验答案\n\n如何开启 `IO` 和 `TIME`\
  \ 统计信息？\n\n执行以下命令：\n\n```sql\nSET STATISTICS IO ON\nGO\nSET STATISTICS TIME ON\n\
  GO\n```\n\n要关闭它们，只需将 `ON` 关键字替换为 `OFF`。\n\n\n### `PERCENT_RANK()` 函数\n\n接下来介绍的是\
  \ `PERCENT_RANK()` 函数。它是做什么用的呢？我们已在第 3 章讨论过，但为了方便您回顾，或者如果您没有按顺序阅读各章，这里再做一个简要说明。\n\
  \n这个函数使用查询结果、分区或表变量之类的数据集，计算每个独立值在整个数据集中（以百分比形式）的相对排名。你需要将结果（返回值为浮点数）乘以 100.00，或者使用\
  \ `FORMAT()` 函数将结果转换为百分比格式（顺便说一下，这个函数返回的是 `FLOAT(53)` 数据类型）。\n\n此外，它的行为与 `CUME_DIST()`\
  \ 函数非常相似；至少微软的文档是这么说的。\n\n你也会发现它与 `RANK()` 函数非常相似（至少在理论上是这样）。`RANK()` 函数返回值的位置，而\
  \ `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚刚讨论的 `CUME_DIST()` 函数一起使用，以便比较结果，并观察它对我们即将生成的查询计划的影响。\n\
  \n我们友好的业务分析师提供了以下规格说明：\n\n需要一份报告，显示所有工厂、所有年份按工厂、位置、年份、季度和月份划分的百分比排名和累积分布。计算应基于年份、工厂名称和位置的分组。\n\
  \n基于这些简单的规格说明，代码清单 10-7 展示了 `TSQL` 查询。\n\n```sql\nSELECT\nPlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth\n\
  ,SumEquipFailures\n,FORMAT(PERCENT_RANK() OVER (\nPARTITION BY CalendarYear,PlantName,LocationName\n\
  ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures\n),'P') AS PercentRank\n\
  ,FORMAT(CUME_DIST() OVER (\nPARTITION BY CalendarYear,PlantName,LocationName\nORDER\
  \ BY CalendarYear,PlantName,LocationName,SumEquipFailures\n),'P') AS CumeDist\n\
  FROM [Reports].[PlantSumEquipFailures]\nGO\n```\n代码清单 10-7\n百分比排名 vs. 累积分布\n\n请注意，这次没有使用\
  \ `CTE`。我们现在使用预先计算好的故障总和报告表，以简化查询并提高性能。\n\n两个函数的分区都是按年份、工厂名称和位置名称设置的。`ORDER BY`\
