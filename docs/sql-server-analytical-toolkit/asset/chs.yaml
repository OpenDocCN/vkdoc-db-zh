  \    )\n    DEFINE:([Expr1003]=SUM([APFinance].[Financial].[Portfolio].[Value])))\n\
  ```\n\n> **提示**\n>\n> 请确保只在 `GROUP BY`、`ORDER BY`、`OVER()` 和 `WHERE` 子句中包含你需要的列，以提高性能，并确保优化器不必执行额外的工作来忽略不需要的列。\n\
