  \ 和 `Report Builder`。\n\n我们将在最后三章对这些工具进行扩展，通过对一个库存控制案例研究进行一些分析来实现。我还将介绍最后一个名为 `SQL\
  \ Server Integration Services` 的工具，这是 `Microsoft SQL Server BI` 套件中的顶级 `ETL` 工具，它向您展示如何创建加载数据库和数据仓库的流程。\n\
