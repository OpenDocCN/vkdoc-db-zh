  \   第一个排序任务，成本 44%\n*   窗口假脱机任务，成本 3%\n*   第二个排序任务，成本 33%\n\n我们可以通过将鼠标悬停在节点上，让带有统计数据的弹出提示面板出现，来查看每个节点的\
