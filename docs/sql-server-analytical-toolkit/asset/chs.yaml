  \ `TEMPDB`。\n\n最后，扫描计数为 1 和物理读取为 1 是较低的值，我们不必担心。别忘了每次执行分析时运行 `DBCC` 来清除缓存，并开启和关闭统计信息，以避免得到错误的结果。在最后再开启统计信息，这样它们只针对查询收集，而不是在你运行估计执行计划时收集——换句话说，就在执行查询之前。\n\
  \n### NTILE( ) 函数再探\n\n我们在本章开头介绍过这个函数，但让我们再看一遍。这里有一个关于信用评级和付款逾期的小例子，它将客户分组，以便根据他们逾期付款的天数分配给催收代理。本章的脚本文件夹中提供了用于加载信用相关表的代码。\n\
  \n请参考清单 4-5。\n\n```\nDECLARE @NumTiles INT;\nSELECT @NumTiles = COUNT(DISTINCT [90DaysLatePaymentCount])\n\
  FROM Demographics.CustomerPaymentHistory\nWHERE [90DaysLatePaymentCount] > 0;\n\
  SELECT CreditYear\n,CreditQtr\n,CustomerNo\n,CustomerFullName\n,SUM([90DaysLatePaymentCount])\
  \ AS Total90DayDelinquent\n,NTILE(@NumTiles) OVER (\nPARTITION BY CreditYear,CreditQtr\n\
  ORDER BY CreditQtr\n) AS CreditAnaystBucket\n,CASE NTILE(@NumTiles) OVER (\nPARTITION\
  \ BY CreditYear,CreditQtr\nORDER BY CreditQtr\n)\nWHEN 1 THEN 'Assign to Collection\
  \ Analyst 1'\nWHEN 2 THEN 'Assign to Collection Analyst 2'\nWHEN 3 THEN 'Assign\
  \ to Collection Analyst 3'\nWHEN 4 THEN 'Assign to Collection Analyst 4'\nWHEN 5\
  \ THEN 'Assign to Collection Analyst 5'\nEND AS CreditAnalystAssignment\nFROM Demographics.CustomerPaymentHistory\n\
  WHERE [90DaysLatePaymentCount] > 0\nGROUP BY CreditYear\n,CreditQtr\n,CustomerNo\n\
  ,CustomerFullName\nORDER BY CreditYear\n,CreditQtr\n,SUM([90DaysLatePaymentCount])\
  \ DESC\nGO\n清单 4-5\n将信用分析师分配给逾期账户\n```\n\n我们使用了一个名为 `@NumTiles` 的变量来统计逾期 90 天的账户实例数。以下查询对其进行初始化：\n\
  \n```\nSELECT @NumTiles = COUNT(DISTINCT [90DaysLatePaymentCount])\nFROM Demographics.CustomerPaymentHistory\n\
  WHERE [90DaysLatePaymentCount] > 0;\n```\n\n主查询提取年份、季度、客户编号和客户全名，以及客户逾期的总天数。接着，`CreditAnalystBucket`\
  \ 列通过使用 `NTILE()` 函数和一个按年份与季度分区的 `OVER()` 子句，分配了客户所属的组号。分区内的行按季度和客户排序。由于我们只为一年加载了结果，因此不需要按年份分区。\n\
  \n接下来，设置一个 CASE 语句块来打印一条消息，内容为\n\n> **“Assign to Collection Analyst N”**\n\nN 是一个从\
  \ 1 到 5 的值。如果信用分析师组号值为 1，则客户账户分配给信用分析师 1；如果值为 2，则分配给信用分析师 2，以此类推。尝试通过修改此表的加载脚本来加载多年信用数据。你将需要添加一个\
  \ `PARTITION BY` 子句。\n\n让我们看看结果。请参考图 4-9。\n\n![](img/527021_1_En_4_Fig9_HTML.jpg)\n\
  \n一个窗口的截图展示了一个选项卡，其中有一个包含 8 列 25 行的信用分析师分配表。从第 15 行到第 20 行，客户编号、客户全名、90 天逾期总额和信用分析师分组列被高亮显示。\n\
  \n图 4-9\n\n90 天账户的信用分析师分配\n\n它运行良好，但可以看到存在一些重叠。一些逾期 90 天的客户被分配给信用分析师 1 或 2。因此，此策略尝试按数量而不是客户逾期\
  \ 90 天的次数来平衡分配。\n\n让我们看看 `NTILE()` 函数在性能方面的表现如何。\n\n\n#### 性能考量\n\n我们来生成一个估计执行计划，它是以常规方式创建的。（记住，有几种创建方式。）这次有两个计划，一个是加载变量的查询的计划，另一个是使用\
  \ `NTILE()` 函数的查询的计划。\n\n请参阅图 4-10。\n\n![](img/527021_1_En_4_Fig10_HTML.jpg)\n\n\
  一个窗口的截图，展示了一个选项卡，其中包含查询 1 和查询 2 的两个估计执行计划流程图，查询成本分别为 34%和 66%。\n\n图 4-10\n`NTILE()`\
  \ 示例的估计执行计划\n\n查看设置 `@NumTiles` 变量的查询的第一个执行计划，我们感觉它的开销很大。（从右向左看）我们看到表扫描任务的成本为 30%，一个非常昂贵的排序步骤成本为\
  \ 70%。其余步骤的成本为 0%，因此我们不必担心它们。\n\n虽然没有建议索引，但我想知道在排序步骤中使用的列上创建索引是否会有帮助。答案是否定的。在这种情况下，该表只有\
  \ 400 行，因此索引不会提供帮助或不会被使用。唯一的替代方案是在加载时对它进行排序，或者将表放入内存中。也就是说，将其创建为内存优化表。\n\n让我们看看第二个计划。没有建议索引，我们看到一个表扫描、两个排序任务、一些表假脱机和两个嵌套循环联接。这里无事可做。\n\
