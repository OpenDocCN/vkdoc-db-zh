  \n\n#### 性能考量\n\n让我们对这个详细的事务查询进行一些分析，因为它要从拥有大约 60 万行的 Transaction 表中检索数据。在整个体系中这不算多，但足以在笔记本电脑上运行查询时对性能构成挑战。我们来看看\
