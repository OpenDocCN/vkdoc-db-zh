  创建测试表

  ```


  `CREATE` 语句用于创建一个包含四列的简单表：一个 Row 列用于标识行号，一个 Year 列和一个 Month 列用于存储日历信息，以及一个 Amount
  列用于存储数值。


  Year 和 Month 这两个列名并不理想，因为它们是 SQL Server 中的保留字，但由于这是一个简单的测试表，我在命名规范上没有过于严格。此外，我在
  `RANGE` 示例的图中也使用了它们，所以（至少对于我们的简单示例来说）保持了一致性。


  我们希望加载两年的数据，并包含一些重复的月份，以便我们可以观察 `ROWS` 子句和 `RANGE` 子句在处理这些情况时的差异。


  这是我们的第一个查询。让我们按年和月计算一些金额总计。我们使用一个 `RANGE` 子句，它考虑当前行和其后的所有行。


  请参考代码清单 1-4 中的部分列表。


  ```

  SELECT Row,[Year],[Month],Amount,

  SUM(Amount) OVER (

  PARTITION BY [Year]

  ORDER BY [Month]

  RANGE BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

  ) AS RollingSalesTotal

  FROM #TestTable

  ORDER BY [Year],[Month] ASC

  GO

  代码清单 1-4

  RANGE，当前行，和无界后续

  ```


  请注意 Year 和 Month 列名周围的方括号。使用这些方括号将消除 SSMS 用于显示保留关键字的颜色。省略它们不会出错，但查询窗格中会使用颜色，这会让你意识到你正在使用保留关键字。别忘了删除临时表。


  在图 1-10 中是部分结果，因此你可以看到某一年的完整值范围。


  ![](img/527021_1_En_1_Fig10_HTML.jpg)


  一张 c h 0 1 over 子句 s q l 窗口的屏幕截图。它呈现了某一年的完整值范围。结果以表格形式呈现，包含五列：Row、year、month、amount
  和 rolling sales total。


  图 1-10


  在当前行和无界后续之间的 RANGE


  看起来总计值在递减，这是合理的，因为我们从窗口函数处理的当前行开始向前计算。观察第 5 行和第 6 行的熟悉重复行为，当两个月份都是 5（五月）时。两行的值都是
  90.00。


  当我们到达十二月，在第 13 行时，分区中已没有更多行可供处理，因此我们只返回总和值 10.00。这是该分区中当前也是最后一行的值。


  在第二个年份分区中，我们有两组重复行，一组是五月份，另一组是七月份。我们再次看到了 `RANGE` 子句特有的行为。


  顺便说一下，以下窗口框架子句不被支持：


  ```

  RANGE BETWEEN CURRENT ROW AND n FOLLOWING (不起作用)

  RANGE BETWEEN n PRECEDING AND CURRENT ROW (不起作用)

  RANGE BETWEEN n PRECEDING AND n FOLLOWING (不起作用)

  ```


  这些不起作用，因为 `RANGE` 子句是一个逻辑操作，因此不允许指定窗口框架中要包含的行数。如果你尝试使用这些，你会得到这个“美妙”的错误消息：


  RANGE is only supported with UNBOUNDED and CURRENT ROW window frame delimiters


  相当清楚，你不觉得吗？


  本章我们需要讨论的最后一项是，如果我们在 `OVER()` 子句中不包含窗口框架子句时的默认行为。行为会根据你是否包含 `ORDER BY` 和 `PARTITION
  BY` 子句而变化。


  ### ROWS 和 RANGE 默认行为


  到现在为止，我们已经理解了 `OVER()` 子句的语法，并且知道它可能包含以下子句：


  *   `PARTITION BY` 子句


  *   `ORDER BY` 子句


  *   `ROWS` 或 `RANGE` 子句


  *   以上皆无（空）


  前三个子句是可选的。你可以根据需要省略它们或包含一个或多个。在应用（或不应用）这些子句时，需要考虑两种场景。


  #### 场景 1


  窗口框架的默认行为取决于是否包含了 `ORDER BY` 子句。需要考虑两种配置：


  *   如果省略了 `ORDER BY` 子句和 `PARTITION BY` 子句，并且我们没有包含窗口框架子句

  *   如果省略了 `ORDER BY` 子句但包含了 `PARTITION BY` 子句，并且我们没有包含窗口框架子句


  这两种情况下的默认窗口框架行为是


  ```

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ```


  #### 场景 2


  另一方面，如果我们包含了 `ORDER BY` 子句，以下两种情况也具有默认的窗口框架行为：


  *   如果包含了 `ORDER BY` 子句但省略了 `PARTITION BY` 子句，并且我们没有包含窗口框架子句

  *   如果包含了 `ORDER BY` 子句并且也包含了 `PARTITION BY` 子句，并且我们没有包含窗口框架子句


  这两种情况下的默认窗口框架行为是


  ```

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ```


  当你开始开发使用窗口函数的查询时，请务必牢记这些默认行为。这非常重要；否则，你将得到一些意外且可能错误的结果。你的用户会不高兴的（你的简历更新了吗？）。


  表 1-3 或许能帮你记住这些默认行为。


  表 1-3


  窗口框架默认行为


  | ORDER BY | PARTITION BY | 默认框架 |

  | --- | --- | --- |

  | 否 | 否 | ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING |

  | 否 | 是 | ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING |

  | 是 | 否 | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |

  | 是 | 是 | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |


  掌握了这些新知识后，让我们通过一些更简单的例子来看看 `ROWS` 和 `RANGE` 子句。记住，你可以通过包含所需的 `ROWS` 或 `RANGE` 子句来覆盖默认行为。


  ### ROWS 和 RANGE 窗口框架示例


  让我们从 `ROWS` 子句开始。这个子句你将最常使用。在我看来，`RANGE` 子句有点不可靠，应该避免使用。




  ### 数据集


  在创建一些查询之前，我们需要先创建一个小表并加载数据，以便进行练习。我们创建的表名为 `OverExample`（补充一句，这名字挺聪明的）。它由三列组成：`OrderYear`、`OrderMonth`
  和 `SalesAmount`。虽然我们在本章开头创建了这个表，但为了方便参考，我在这里再列一次。


  请参考代码清单 1-5。


  ```sql

  CREATE TABLE OverExample(

  OrderYear   SMALLINT,

  OrderMonth  SMALLINT,

  SalesAmount DECIMAL(10,2)

  );

  INSERT INTO OverExample VALUES

  (2010,1,10000.00),

  (2010,2,10000.00),

  (2010,2,10000.00),

  --missing rows

  (2010,8,10000.00),

  (2010,8,10000.00),

  (2010,9,10000.00),

  (2010,10,10000.00),

  (2010,11,10000.00),

  (2010,12,10000.00),

  -- 2011

  (2011,1,10000.00),

  (2011,2,10000.00),

  (2011,2,10000.00),

  --missing rows

  (2011,10,10000.00),

  (2011,11,10000.00),

  (2011,12,10000.00);

  GO

  ```


  代码清单 1-5 练习表 `OverExample`


  `INSERT` 语句加载了两年的数据，这样我们就有足够的行来测试带有窗口函数和 `OVER()` 子句的查询。`SUM()` 聚合函数将用于生成一些滚动总计计算。


  请参考代码清单 1-6。


  ```sql

  SELECT OrderYear,OrderMonth,SalesAmount,

  SUM(SalesAmount) OVER (

  ) AS NPBNOB,

  SUM(SalesAmount) OVER (

  PARTITION BY OrderYear

  ) AS PBNOB,

  SUM(SalesAmount) OVER (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ) AS PBOBUPUF

  FROM OverExample;

  GO

  ```


  代码清单 1-6 场景 1


  `SUM()` 函数被使用了三次，每次的 `ORDER BY`/`PARTITION BY` 配置不同。我还使用了旨在指示 `OVER()` 子句结构的列名，这些名称表明了是否包含了
  `ORDER BY`、`PARTITION BY` 以及 `ROWS`/`RANGE` 子句。我这样做是为了让你在检查结果时，能快速回忆起使用了哪些子句。我知道，这些名字有点怪，但你可以轻松记住我们正在使用的帧子句。


  第一个 `SUM()` 函数的 `OVER()` 子句是空的（名称 `NPBNOB` = 无 `PARTITION BY`, 无 `ORDER BY`）。回想一下，这种组合的默认窗口帧行为是：


  ```sql

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ```


  第二个 `SUM()` 函数的 `OVER()` 子句包含了 `PARTITION BY` 但没有 `ORDER BY`，所以默认的窗口帧行为也是：


  ```sql

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ```


  列名为 `PBNOB`（有 `PARTITION BY`, 无 `ORDER BY`）。这次创建了两个分区，数据集中的每一年对应一个分区。


  最后但同样重要的是，第三个 `SUM()` 函数使用的 `OVER()` 子句同时包含了 `PARTITION BY` 和 `ORDER BY` 子句。它还使用了窗口帧
  `ROWS` 子句。列名是 `PBOBUPUF`（`PARTITION BY`，`ORDER BY`，`UNBOUNDED PRECEDING UNBOUNDED
  FOLLOWING`）。


  对于最后这种列配置，默认的帧行为是：


  ```sql

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ```


  看起来我们可以通过替换 `RANGE` 子句并包含 `ROWS` 子句来覆盖这种默认行为。这完全可以做到！


  让我们看看执行这个查询后的结果是什么样子。请参考图 1-11。


  ![](img/527021_1_En_1_Fig11_HTML.jpg)


  一个关于 c h 0 1 over clause s q l 窗口的截图。结果以表格形式呈现，包含 6 列，分别是订单年份、订单月份、销售额、N P B N O
  B、P B N O B 和 P B O B U P U F。


  图 1-11 场景 1 的结果


  结果很有意思。第一个 `SUM()`/`OVER()` 子句组合只是简单地显示了表中所有行的总计，正如默认窗口帧行为所强制规定的那样。


  第二和第三个 `SUM()`/`OVER()` 子句组合将数据集按年份分区，因此每年的总计显示在每一行中。它们看起来是相同的。这两种组合的窗口帧行为是相同的：


  ```sql

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ```


  这是因为第二种组合触发了默认行为，而第三种组合我们覆盖了 `RANGE` 行为，并包含了 `ROWS` 子句。这种行为是在每个年份分区内强制执行的。让我们再试一个例子。




  ### 示例 2


  这次我们来查看一些包含默认窗口框架行为与声明的 `RANGE` 行为的 `SUM()/OVER()` 子句组合。（请记住我们之前讨论过的默认窗口框架行为。）


  让我们看看这些组合产生的结果。请参考清单 1-7。


  ```sql

  SELECT OrderYear,OrderMonth,SalesAmount,

  SUM(SalesAmount) OVER (

  ORDER BY OrderYear,OrderMonth

  ) AS NPBOB,

  -- same as PBOBRangeUPCR

  SUM(SalesAmount) OVER (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  ) AS PBOB,

  SUM(SalesAmount) OVER (

  ORDER BY OrderYear,OrderMonth

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS NPBOBRangeUPCR,

  -- same as PBOB

  SUM(SalesAmount) OVER (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS PBOBRangeUPCR

  FROM OverExample;

  GO

  ```

  清单 1-7

  场景 2 – 多种默认窗口框架与 RANGE 行为


  这一次，我们在第一个 `SUM()/OVER()` 组合中添加了一个 `ORDER BY` 子句，在第二个 `SUM()/OVER()` 组合中添加了一个 `PARTITION
  BY` 和一个 `ORDER BY` 子句。第三个 `SUM()/OVER()` 组合包含一个 `ORDER BY` 子句，没有 `PARTITION BY`
  子句，但我们包含了一个 `RANGE` 窗口框架子句。第四个 `SUM()/OVER()` 组合同时包含了 `PARTITION BY` 和 `ORDER BY`
  子句，以及一个 `RANGE` 窗口框架子句。结果应该很有趣。


  请参考图 1-12。


  ![](img/527021_1_En_1_Fig12_HTML.jpg)


  一个表格有 6 列，分别是订单年份、订单月份、销售金额、N P B O B、P B O B、N P B O B range U P C R 和 P B O B
  R range U P C R。一些行在方框中突出显示。


  图 1-12

  更多默认行为与 RANGE 行为对比


  乍一看，所有结果似乎都一样！对于第一年的分区来说确实如此，但一旦我们进入第二年的分区，第一列和第三列的值持续递增，而第二列和第四列的值由于新的年份分区而被重置。


  重复月份条目的值已用方框框出。列 `NPBOB` 没有 `PARTITION BY` 子句，但它有 `ORDER BY` 子句，因此由 `RANGE BETWEEN
  UNBOUNDED PRECEDING and CURRENT ROW` 定义的默认窗口框架行为生效。再次注意，月份编号重复的行导致总计相同。2010 年的 6
  月（June）总计为 8000.00，7 月（July）和 8 月（August）也是如此。


  第二个 `SUM()/OVER()` 组合确实有 `PARTITION BY` 和 `ORDER BY` 子句，因此默认窗口框架行为是 `RANGE BETWEEN
  UNBOUNDED PRECEDING AND CURRENT ROW`。`PARTITION BY` 子句为每年定义了分区，默认框架行为导致窗口函数通过考虑当前行和先前行的值来计算，直到遇到重复的月份条目。如果这是一个累计总和，我们期望是
  7000.00 和 8000.00，但这些行的两个条目都是较高的值：8000.00。


  查询中的第三个 `SUM()/OVER()` 组合包含一个 `ORDER BY` 子句，但没有 `PARTITION BY` 子句。包含了一个窗口框架规范：`RANGE
  BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`。结果与之前的组合相同，但一旦我们进入 2011 年的分区，累计总和会持续进行，因为没有包含
  `PARTITION BY` 子句。再次注意遇到相同月份行时的行为。


  最后但同样重要的是，第四个 `SUM()/OVER()` 组合具有 `PARTITION BY`、`ORDER BY` 和 `RANGE` 窗口框架子句。此组合的行为与
  `PBOB` 列的组合完全相同。


  我们现在可以看到，在各种 `ORDER BY` 和 `PARTITION BY` 子句组合下，默认行为是如何生效的。当包含窗口框架规范时，其行为与其他列中的默认行为完全相同。在开始创建基于窗口函数的查询时，请记住这些。


  ### 示例 3


  下一个示例比较 `ROWS` 窗口框架规范与 `RANGE` 窗口框架规范。


  请参考清单 1-8。


  ```sql

  SELECT OrderYear,OrderMonth,SalesAmount,

  SUM(SalesAmount) OVER (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS POBRowsUPCR,

  SUM(SalesAmount) OVER (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS PBOBRangeUPCR

  FROM OverExample;

  GO

  ```

  清单 1-8

  ROWS 与 RANGE 比较


  两种情况下的 `SUM()` 函数具有相同的 `PARTITION BY` 和 `ORDER BY` 子句。第一个有 `ROWS BETWEEN UNBOUNDED
  PRECEDING AND CURRENT ROW` 子句，而第二个组合有 `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT
  ROW` 子句。


  你认为结果会怎样？


  请参考图 1-13。


  ![](img/527021_1_En_1_Fig13_HTML.jpg)


  一个表格有 5 列，分别是订单年份、订单月份、销售金额、P O B R rows U P C R 和 P B O B R range U P C R。一些行在方框中突出显示。


  图 1-13

  ROWS 与 RANGE，UNBOUNDED PRECEDING AND CURRENT ROW


  结果几乎相同，但使用 `RANGE` 窗口框架规范的 `SUM()/OVER()` 组合将为任何具有重复 `ORDER BY` 值的行生成相同的值。正如我们之前讨论的，这个子句在逻辑级别工作（相对于
  `ROWS` 的物理级别）；它会将所有重复值相加，并在每个重复行中发布相同的结果。




  ### 示例 4


  在下一个例子中，我们将研究两个简单的查询。唯一的区别是，第一个查询的 `ORDER BY` 子句中明确指定了列名，而第二个查询则在 `ORDER BY` 子句中使用了一个简单的
  `SELECT` 查询来代替列名。


  我们为什么要这样做？因为使用简单查询可以消除估计查询计划中可能存在的、开销较大的排序步骤。当你只有一个大型分区时，就可以使用这种技术。你需要使用的查询是一个标量查询，这意味着它只会返回一个值，因此无法处理多个分区。


  让我们先来看看带有列名的查询。


  请参考代码清单 1-9a。


  ```sql

  WITH YearQtrSales (

  SalesYear,

  SalesQtr,

  SalesMonth,

  SalesTotal

  )

  AS

  (

  SELECT

  SalesYear,

  SalesQtr,

  SalesMonth,

  SalesTotal

  FROM dbo.TestSales

  )

  SELECT

  SalesYear,

  SalesQtr,

  SalesMonth,

  SalesTotal,

  SUM(SalesTotal) OVER(

  ORDER BY SalesYear,SalesQtr,SalesMonth

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS RollMonthlySales1

  FROM YearQtrSales

  ORDER BY

  SalesYear,

  SalesQtr,

  SalesMonth

  GO

  Listing 1-9a

  ORDER BY Without Subquery

  ```


  如你所见，我们没有 `PARTITION BY` 子句，并且 `ORDER BY` 子句按三个列进行排序。这种配置将为我们提供按月累加的两年总计。换句话说，当我们在结果集中进入第二年时，总计不会重置，而是按月持续递增，直到数据集结束。


  第二个查询用一条简单的 `SELECT` 语句 `SELECT (1)` 替换了 `ORDER BY` 子句中的列名。


  请参考代码清单 1-9b。


  ```sql

  WITH YearQtrSales (

  SalesYear,

  SalesQtr,

  SalesMonth,

  SalesTotal

  )

  AS

  (

  SELECT

  SalesYear,

  SalesQtr,

  SalesMonth,

  SalesTotal

  FROM dbo.TestSales

  )

  SELECT

  SalesYear,

  SalesQtr,

  SalesMonth,

  SalesTotal,

  SUM(SalesTotal) OVER(

  ORDER BY (SELECT (1))

  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS RollMonthlySales2

  FROM YearQtrSales

  ORDER BY

  SalesYear,

  SalesQtr,

  SalesMonth

  GO

  Listing 1-9b

  ORDER BY with Subquery

  ```


  这个查询与上一个相同。让我们比较一下执行计划。


  请参考图 1-14。


  ![](img/527021_1_En_1_Fig14_HTML.png)


  一个包含“Work Sales Partition BY with subquery 2 s q l”窗口的屏幕截图。整个窗口分为“Work Sale Partition”子窗口和“s
  q l subquery 2”子窗口。每个子窗口下方都有一条消息。


  图 1-14

  比较执行计划


  从左侧的查询计划可以看出，我们有一个开销相当大的排序任务，成本为 77%。右侧的查询计划没有这个任务，因此在性能上应该更快。让我们并排查看两个查询的结果。


  请参考图 1-15。


  ![](img/527021_1_En_1_Fig15_HTML.png)


  一个包含“Work Sales Partition BY with subquery 2 s q l”窗口的屏幕截图。整个窗口分为“Work Sale Partition”子窗口和“s
  q l subquery 2”子窗口。这些子窗口并排比较了两个查询的结果。


  图 1-15

  比较结果


  结果匹配。注意，即使我们开始了一个新的年份，滚动总计仍在持续递增。当你只处理一个包含大量行的单一分区时，这种使用子查询的配置通常是很好的选择。在一个包含数十万行或更多行的查询结果集上消除排序步骤，可以提高性能。


  ### 示例 5


  我们的最后一个例子很简单，它展示了 SQL Server 2022 提供的一项新功能。截至本文撰写时，它以评估版形式提供。它允许你在一组括号内指定 `PARTITION
  BY`、`ORDER BY` 和 `RANGE/ROWS` 子句，并为其命名。这被称为命名窗口子句。


  一个简单的例子请参考代码清单 1-10。


  ```sql

  SELECT OrderYear

  ,OrderMonth

  ,SUM(SalesAmount) OVER SalesWindow AS TotalSales

  FROM dbo.OverExample

  WINDOW SalesWindow AS (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  )

  GO

  Listing 1-10

  Named Windows

  ```


  注意命名窗口代码是如何出现在查询末尾的。关键字 `WINDOW` 后面是您希望赋予该窗口的名称，然后可以在括号内添加我们本章刚刚讨论过的 `PARTITION
  BY`、`ORDER BY` 和 `RANGE/ROWS` 子句。


  `OVER()` 子句仍然出现在窗口函数之后，但它只是引用了名称。这有增值吗？我不确定，但我个人更倾向于类似这样的写法：


  ```sql

  SUM(SalesAmount) OVER WINDOW (

  PARTITION BY OrderYear

  ORDER BY OrderMonth

  RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

  ) AS ...

  ```


  至少这清楚地表明我们正在为分区创建一个窗口。但这是我的个人看法。


  另一方面，如果 `OVER()` 子句需要在多个列中使用，那么刚才讨论的 SQL Server 2022 版本就更有意义了。是的，我认为这样更好。


  让我们看看这最后一个查询的结果。


