  \n### 注意\n\n归根结底，如果你的查询在一秒钟内运行完毕，就不要动它。最终，需要处理的是那些运行时间长的查询。此外，你的用户愿意容忍多长时间？长达一分钟？将这点考虑进去。\n\
  \n## ROW_NUMBER( ) 函数\n\n让我们再次看看 `ROW_NUMBER()` 函数。在下一个示例中，我们希望为在两年时间段（2011 年、2012\
  \ 年）内两家特定商店销售的产品，按月保留一个累计总计。另外，我们只想跟踪一种产品：黑巧克力 - 中号盒装。\n\n这里使用了 `SUM()` 聚合函数，而 `ROW_NUMBER()`\
  \ 函数则以一种简单的方式使用，用于为每个月分配一个条目编号。该函数将被使用三次，以便我们能够观察在查询中使用不同的 `PARTITION BY` 和 `ORDER\
  \ BY` 子句组合时的行为。\n\n本章的最后一个示例将向你展示如何使用 `ROW_NUMBER()` 函数来解决与数据范围相关的岛屿和间隙问题。这将会很有趣且实用。估计查询计划应该也会很有趣。接下来让我们看看如何计算滚动总计。\n\
  \n请参阅清单 4-6。\n\n```sql\nWITH StoreProductAnalysis\n(TransYear,TransMonth,TransQtr,StoreNo,ProductNo,ProductsBought)\n\
  AS\n(\nSELECT\nYEAR(CalendarDate)         AS TransYear\n,MONTH(CalendarDate)   \
  \    AS TransMonth\n,DATEPART(qq,CalendarDate) AS TransQtr\n,StoreNo\n,ProductNo\n\
  ,SUM(TransactionQuantity)  AS ProductsBought\nFROM StagingTable.SalesTransaction\n\
  GROUP BY YEAR(CalendarDate)\n,MONTH(CalendarDate)\n,DATEPART(qq,CalendarDate)\n\
  ,StoreNo\n,ProductNo\n)\nSELECT\nspa.TransYear\n,spa.TransMonth\n,spa.StoreNo\n\
  ,spa.ProductNo\n,p.ProductName\n,spa.ProductsBought\n,SUM(spa.ProductsBought) OVER(\n\
  PARTITION BY spa.StoreNo,spa.TransYear\nORDER BY spa.TransMonth\n) AS RunningTotal\n\
  ,ROW_NUMBER() OVER(\nPARTITION BY spa.StoreNo,spa.TransYear\nORDER BY spa.TransMonth\n\
  ) AS EntryNoByMonth\n,ROW_NUMBER() OVER(\nPARTITION BY spa.StoreNo,spa.TransYear,TransQtr\n\
  ORDER BY spa.TransMonth\n) AS EntryNoByQtr\n,ROW_NUMBER() OVER(\nORDER BY spa.TransYear,spa.StoreNo\n\
  ) AS EntryNoByYear\nFROM StoreProductAnalysis spa\nJOIN DimTable.Product p\nON spa.ProductNo\
  \ = p.ProductNo\nWHERE spa.TransYear IN(2011,2012)\nAND spa.StoreNo IN ('S00009','S00010')\n\
  AND spa.ProductNo = 'P00000011129'\nGO\n```\n\n清单 4-6\n按月计算的滚动销售总计\n\n从 `CTE` 开始，该查询生成按年、月、商店和产品分类的交易总和。总和是按月生成的。\n\
  \n使用该 `CTE` 的查询需要按年生成按月的总和滚动总计。为此，使用了带有 `OVER()` 子句的 `SUM()` 函数，该子句包含按商店编号和交易年的分区，并包含一个按交易月的\
  \ `ORDER BY` 子句。\n\n相同的 `OVER()` 子句用于 `ROW_NUMBER()` 函数以生成条目编号。这里使用了三次，以便我们可以观察如果修改\
  \ `PARTITION BY` 子句，使其反映月份、季度和年份时，其行为会如何变化。\n\n让我们检查一下结果。请参阅图 4-11。\n\n![](img/527021_1_En_4_Fig11_HTML.png)\n\
  \n一个窗口的截图，展示了一个选项卡，其中包含一行代码和一个 9 列 27 行的表格。该表格显示了按月计算的滚动总销售额。第 12 行和第 13 行被高亮显示。\n\
  \n图 4-11\n按月计算的滚动总销售额\n\n该报表在计算按月累计总计方面效果足够好。注意新年伊始或商店变更的位置。滚动总计会重置，条目编号级别也会重置。根据\
  \ `PARTITION BY` 子句的定义方式，我们可以按月、季度或年生成行号：\n\n```sql\n,ROW_NUMBER() OVER(\nPARTITION\
  \ BY spa.StoreNo,spa.TransYear\nORDER BY spa.TransMonth\n) AS EntryNoByMonth\n,ROW_NUMBER()\
  \ OVER(\nPARTITION BY spa.StoreNo,spa.TransYear,TransQtr\nORDER BY spa.TransMonth\n\
  ) AS EntryNoByQtr\n,ROW_NUMBER() OVER(\nORDER BY spa.TransYear,spa.StoreNo\n) AS\
  \ EntryNoByYear\n```\n\n`ROW_NUMBER()` 函数的这种组合使用方式让你了解了它的工作原理。通常，你可以为整个结果集或为分区生成行号。但是，你不能包含\
  \ `ROWS` 或 `RANGE` 子句。想一想，这是有道理的。它必须在完整的分区或结果集上运行！\n\n让我们看看使用此函数时的性能影响。\n\n\n####\
  \ 性能考量\n\n这次我将展示大部分估算的查询计划；它很长。我需要将执行计划分成两个截图。我们将按照惯例从右向左开始。图 4-12 中的第一个截图显示了计划的第一（右侧）部分。\n\
  \n![](img/527021_1_En_4_Fig12_HTML.png)\n\n*一个窗口截图，上方面板显示 3 行代码的选项卡，下方面板显示查询 1 的估算索引计划流程图。流程图中有\
  \ 2 个部分被高亮显示。*\n\n**图 4-12**\n滚动月度销售分析的估算索引计划\n\n索引查找作为第一步出现，其成本占总估算执行时间的 16%。忽略低成本步骤，一个排序步骤占比\
  \ 30%。接下来，由于我们（通过 `JOIN`）将 `SalesTransaction` 表与 `Product` 表连接，出现了一个表扫描步骤，成本为 5%。由于这是个小表，不算太昂贵，因此不需要索引。一个嵌套循环连接任务将两个数据流连接起来。随后是一个成本为\
  \ 22% 的排序步骤，最后是一个成本为 1% 的窗口假脱机。\n\n我们总是需要关注假脱机任务，因为这是一个指示器，表明缓存的数据被假脱机，以便可以重复访问。根据假脱机任务的类型（表、索引、延迟、急切），会使用临时存储，然后执行时间方面可能会变得非常昂贵（将\
  \ `TEMPDB` 放在固态驱动器上会有所帮助……）。\n\n查阅 Microsoft 文档以了解哪些假脱机任务是物理的（`TEMPDB`）、逻辑的（内存缓存），或两者兼有。这里是表\
  \ 4-4，其中列出了选定的任务，并标识了它们是逻辑的、物理的还是两者兼有。\n\n**表 4-4**\n逻辑与物理计划任务\n\n| 任务 | 物理 | 逻辑\
  \ |\n| --- | --- | --- |\n| 排序 | X | X |\n| 急切假脱机 | | X |\n| 延迟假脱机 | | X |\n| 假脱机\
  \ | X | |\n| 表假脱机 | | X |\n| 窗口假脱机 | X | X |\n| 表扫描 | X | X |\n| 索引扫描 | X | X |\n\
  | 索引查找 | X | X |\n| 索引假脱机 | | X |\n\n最后，物理任务是针对物理磁盘的操作，逻辑任务是针对内存缓存的操作。从前面的表中可以看出，根据查询的不同，某些任务可以两者兼有。在分析性能时，请将此信息与\
  \ `IO` 和 `TIME` 统计信息一起牢记于心。\n\n**注意**\n对于那些想要尝试并且手头有些闲钱的读者，我见过大约 90 美元的便宜固态 USB\
  \ 驱动器。安装 SQL Server 2022，并确保在固态驱动器上创建 `TEMPDB`。我自己也考虑圣诞节买一个！\n\n### 计划的左侧\n\n让我们看看估算执行计划的左侧。请参考图\
  \ 4-13。\n\n![](img/527021_1_En_4_Fig13_HTML.png)\n\n*一个窗口截图，上方面板显示 3 行代码的选项卡，下方面板显示查询\
  \ 1 的估算执行计划左侧部分的流程图。任务窗口假脱机被高亮显示。一个箭头指向成本为 22%。*\n\n**图 4-13**\n计划的左侧\n\n这里有一个成本为\
  \ 22% 的排序步骤，作为之前截图的参考点。我们在这里看到的就是我们刚刚讨论过的窗口假脱机步骤。它出现是因为我们使用了窗口函数。1% 的成本是一个很好的低值，所以我们不需要担心它。真的不需要吗？\n\
  \n如果逻辑读数不为零，并且窗口假脱机任务大于零，那么窗口假脱机就没有使用内存。\n\n### 查询 IO 和时间统计信息\n\n我们的统计信息来了。请参考表\
  \ 4-5。\n\n**表 4-5**\n查询 IO 和时间统计信息\n\n| SQL Server 解析和编译时间 | 现有索引 |\n| --- | ---\
  \ |\n| CPU 时间 (ms) | 15 |\n| 已用时间 (ms) | 70 |\n| **统计信息 (工作表)** | **现有索引** |\n|\
  \ 扫描次数 | 52 |\n| 逻辑读取 | 289 |\n| 物理读取 | 0 |\n| 预读读取 | 0 |\n| **统计信息 (SalesTransaction)**\
  \ | **现有索引** |\n| 扫描次数 | 2 |\n| 逻辑读取 | 28 |\n| 物理读取 | 1 |\n| 预读读取 | 21 |\n| **统计信息\
  \ (Product)** | **现有索引** |\n| 扫描次数 | 1 |\n| 逻辑读取 | 1 |\n| 物理读取 | 1 |\n| 预读读取 | 0\
  \ |\n| **SQL Server 执行时间** | **现有索引** |\n| CPU 时间 (ms) | 0 |\n| 已用时间 (ms) | 44 |\n\
  \n唯一高成本的是工作表上的逻辑读取，但请记住，逻辑读取是针对内存中的缓存（即，如果你有足够的内存），所以这个值不应该引起担忧。\n\n其余值都很低，估算查询计划分析器也没有建议新索引，因此查询运行良好。回想一下我们的窗口假脱机任务。它不为零，这意味着它正在向物理磁盘上的\
  \ `TEMPDB` 执行假脱机操作。\n\n所有这些信息都很棒，但这到底意味着什么？我们如何利用这些信息来提高性能？\n\n### 索引策略\n\n经验法则是根据\
  \ `PARTITION BY` 子句中的列创建索引，然后是 `ORDER BY` 子句中的列。在之前的例子中，我们在 `PARTITION BY` 子句中有以下列：`StoreNo`,\
  \ `TransYear`, `TransQtr`。而 `ORDER BY` 子句使用了 `TransMonth` 列。\n\n好的，但我们有个难题要考考你。这些日期列都是在\
  \ `CTE` 中通过 `YEAR()`, `MONTH()`, 和 `DATEPART()` 函数生成的。它们使用了 `SalesTransaction` 表中的\
  \ `CalendarDate` 列。这些都是派生列，所以我们的索引需要基于 `StoreNo` 列和 `CalendarDate` 列。连接到日历维度表以提取这些日期部分是否会更有效？这种策略是否比使用日期函数派生它们更高效？试试看吧！\n\
  \n### 检查索引查找任务\n\n让我们看看索引查找任务在估算查询计划中做了什么。请参考图 4-14。\n\n![](img/527021_1_En_4_Fig14_HTML.png)\n\
  \n*一个窗口的截图。右上角的一个对话框与窗口重叠。它有一个标题“索引查找，非聚集”，并列出了详细信息。一些细节包括物理和逻辑操作、存储、节点 ID、谓词、对象、输出列表和查找谓词。*\n\
  \n**图 4-14**\n索引查找详细信息\n\n将鼠标指针悬停在任何任务上，会出现一个漂亮的黄色弹出面板，显示所有详细信息。这信息量很大，可能难以阅读，但让我重点标出四个部分中的两个部分所标识的列：\n\
  \n**谓词** 使用属于 `SalesTransaction` 表的 `CalendarDate` 列。\n\n**查找谓词** 使用属于 `SalesTransaction`\
  \ 表的查找键 `ProductNo` 和 `StoreNo`。\n\n所以这表明我们不仅需要查看 `OVER()` 子句的 `PARTITION BY` 和\
  \ `ORDER BY` 子句中的列，还需要查看 `WHERE` 子句中的列，特别是 `WHERE` 子句中的 `PREDICATES`。\n\n此查询中使用的索引名为\
  \ `ieProductStoreSales`。它基于列 `ProductNo` 和 `StoreNo`，而 `INCLUDE` 列是 `CalendarDate`\
  \ 和 `TransactionQuantity`。\n\n**提示**\n`INCLUDE` 列是你在 `CREATE INDEX` 命令中使用 `INCLUDE`\
  \ 关键字包含的列。名称中的前缀“ie”代表倒排条目索引。这意味着我们向用户呈现的是一个非唯一的数据访问路径。如果你看到“pk”，表示主键；“ak”表示替代键，它是主键的替代；“fk”表示外键。我认为在索引名称中包含这些前缀是良好的实践。\n\
  \n\n### 深入性能分析\n\n因此，现在我们已经将性能分析深入到更细致的层面。通过审视高成本任务背后的细节，我们可以进一步判断某个策略是否有效。\n\n\
  那么，让我们总结一下我们的性能分析和策略需要基于哪些要点：\n\n*   生成估算和实际的执行计划，并识别高成本步骤。\n*   明确哪些任务是逻辑运算符、物理运算符，或两者兼具。\n\
  *   生成`IO`和`TIME`性能统计信息。\n*   每次测试运行都执行`DBCC`，以确保内存缓存已清除。\n*   将索引列建立在`PARTITION\
  \ BY`子句（位于`OVER()`子句中）所使用的列上。\n*   将索引列建立在`ORDER BY`子句（位于`OVER()`子句中）所使用的列上。\n*\
  \   将索引列建立在`WHERE`子句（如果`CTE`中使用了的话）所使用的列上。\n*   如果使用像`YEAR()`、`MONTH()`、`DATEPART()`等函数来提取日期的年、月、季度、日部分，则将索引列建立在用于派生字段的列上。\n\
  *   通过修改现有索引使其支持多个查询，从而加以利用。\n*   作为最后的手段，考虑使用内存优化表或预加载的报表表。\n*   为`TEMPDB`配置固态硬盘会有所帮助！\n\
  \n## 反规范化策略\n\n前文提到的倒数第二步建议考虑构建暂存表或报表表，这样像由`CTE`生成的数据这类预处理数据可以加载到暂存表中一次，然后被包含窗口函数的查询使用（假设用户可以接受\
  \ 24 小时的数据或更旧的数据）。\n\n作为前述工作的一部分，分析所有查询，看看是否可以为多个查询设计一套通用的索引和暂存表。索引功能强大，但过多的索引会将表的加载和修改处理时间拖慢到危险的程度。\n\
  \n考虑构建内存优化表以获得快速性能。\n\n如果所有方法都失败了，我们需要考虑重新设计查询或表，甚至考虑硬件升级，例如增加内存、使用更多更快的 CPU 以及像固态硬盘这样的存储设备。\n\
  \n最后，测试，测试，再测试你的查询？制定一个简单的测试策略，并记录结果用于分析。\n\n### 建议\n\n一旦你熟悉了阅读估算执行计划以及`IO`和`TIME`统计信息，就可以修改用于加载数据库的脚本，尝试加载大量行（例如数百万行），观察性能受到的影响。\n\
  \n## 间隙与孤岛示例\n\n一个经典的数据挑战是“间隙与孤岛”的概念。例如，销售人员销售产品的日期是否存在间隙？或者是否存在产品持续销售的连续日期簇？最后一个例子将向你展示如何通过使用本章介绍的一些窗口函数来解决这个挑战。\n\
  \n解决方案需要几个步骤。这个谜题的关键在于找到一种方法，生成某种可以在`GROUP BY`子句中使用的类别名称，以便我们能够使用`MIN()`和`MAX()`聚合函数提取孤岛和间隙的最小开始日期和最大结束日期。\n\
  \n我们将使用`ROW_NUMBER()`函数和`LAG()`函数来识别间隙或孤岛何时开始，同时也会生成一个数字，用于构建前面提到的`GROUP BY`子句中所需的值（例如\
  \ ISLAND1, GAP1 等）。\n\n在我们的测试场景中，我们仅跟踪销售人员在 31 天内是否产生了销售额。某些销售额被设置为零，持续一天或多天（这些就是间隙）。\n\
  \n> **提示**\n>\n> 总是从一个小数据集开始。应用你的逻辑，进行测试，一旦确认其有效，再将其应用到更大的生产数据集。\n\n同样的方法也适用于销售产生的日期组（这些就是孤岛）。\n\
  \n以下是需要发生的步骤：\n\n**步骤 1：** 生成一些测试数据。为简便起见，包含一个标识行属于孤岛还是间隙的列。这些将用于创建`GROUP BY`子句中使用的分组。\n\
  \n**步骤 2：** 添加一个数值列，用于标识孤岛或间隙的起始日。这将用于识别`GROUP BY`的文本值。\n\n**步骤 3：** 添加一个包含唯一数字的列，这样对于每一组孤岛和间隙，我们可以生成类似于\
  \ ISLAND1, ISLAND2, GAP1, GAP2 等的类别名称（我们将使用`ROW_NUMBER()`函数来实现）。\n\n一旦这些类别被正确地分配到每一行，开始和结束日期就可以通过`MIN()`和`MAX()`聚合函数轻松提取。\n\
  \n让我们开始吧。首先生成一些测试数据。\n\n请参考清单 4-7a。\n\n```sql\nUSE TEST\nGO\nDROP TABLE IF EXISTS\
  \ SalesPersonLog\nGO\nCREATE TABLE SalesPersonLog (\nSalesPersonId VARCHAR(8),\n\
  SalesDate     DATE,\nSalesAmount        DECIMAL(10,2),\nIslandGapGroup VARCHAR(8)\n\
  );\nTRUNCATE TABLE SalesPersonLog\nGO\nINSERT INTO SalesPersonLog\nSELECT 'SP001'\n\
  ,[CalendarDate]\n,UPPER (\nCONVERT(INT,CRYPT_GEN_RANDOM(1)\n)) AS SalesAmount\n\
  ,'ISLAND'\nFROM APSales.[DimTable].[Calendar]\nWHERE [CalendarYear] = 2010\nAND\
  \ [CalendarMonth] = 10\nGO\n/********************/\n/* Set up some gaps */\n/********************/\n\
  UPDATE SalesPersonLog\nSET SalesAmount = 0,\nIslandGapGroup = 'GAP'\nWHERE SalesDate\
  \ BETWEEN '2010-10-5' AND '2010-10-6'\nGO\nUPDATE SalesPersonLog\nSET SalesAmount\
  \ = 0,\nIslandGapGroup = 'GAP'\nWHERE SalesDate BETWEEN '2010-10-11' AND '2010-10-16'\n\
  GO\nUPDATE SalesPersonLog\nSET SalesAmount = 0,\nIslandGapGroup = 'GAP'\nWHERE SalesDate\
  \ BETWEEN '2010-10-22' AND '2010-10-23'\nGO\n-- Just in case the random sales value\
  \ generator\n-- set sales to 0 but the update labelled it as an ISLAND\nUPDATE SalesPersonLog\n\
  SET IslandGapGroup = 'GAP'\nWHERE SalesAmount = 0\nGO\n```\n**清单 4-7a** 加载 SalesPersonLog\
  \ 表\n\n间隙和孤岛的文本字符串本可以在以下查询中生成，但我想简化事情。注意所有的 `UPDATE` 语句，它们为我们设置了测试场景。\n\n请参考清单 4-7b。\n\
  \n## 4.7 生成缺口和孤岛报告\n\n```\nSELECT SalesPersonId,GroupName,SUM(SalesAmount) AS TotalSales\n\
  ,MIN(StartDate) AS StartDate,MAX(StartDate) AS EndDate\n,CASE\nWHEN SUM(SalesAmount)\
  \ <> 0 THEN 'Working, finally!'\nELSE 'Goofing off again!'\nEND AS Reason\nFROM\
  \ (\nSELECT SalesPersonId,SalesAmount,\n,IslandGapGroup + CONVERT(VARCHAR,(SUM(IslandGapGroupId)\n\
  OVER(ORDER BY StartDate) )) AS GroupName\n,StartDate\n,PreviousSalesDate AS EndDate\n\
  FROM\n(\nSELECT ROW_NUMBER() OVER(ORDER BY SalesDate) AS RowNumber\n,SalesPersonId\n\
  ,SalesAmount\n,IslandGapGroup\n,SalesDate AS StartDate\n,LAG(SalesDate)\nOVER(ORDER\
  \ BY SalesDate) AS PreviousSalesDate\n,CASE\nWHEN LAG(SalesDate) OVER(ORDER BY SalesDate)\
  \ IS NULL\nOR\n(\nLAG(SalesAmount) OVER(ORDER BY SalesDate) <> 0\nAND SalesAmount\
  \ = 0\n) THEN ROW_NUMBER() OVER(ORDER BY SalesDate)\nWHEN (LAG(SalesAmount) OVER(ORDER\
  \ BY SalesDate) = 0\nAND SalesAmount <> 0)\nTHEN ROW_NUMBER() OVER(ORDER BY SalesDate)\n\
  ELSE 0\nEND AS IslandGapGroupId\nFROM SalesPersonLog\n) T1\n)T2\nGROUP BY SalesPersonId,GroupName\n\
  ORDER BY StartDate\nGO\n```\n\n这个查询有三个层级或三个嵌套子查询，它们像表一样协同工作以解决问题。标记为`T1`的、被用作表的内联查询，生成了如图\
  \ 4-15 所示的值。\n\n![](img/527021_1_En_4_Fig15_HTML.jpg)\n\n图 4-15 缺口和孤岛中间结果\n\n注意用于标识缺口或孤岛起始点的值是如何由\
  \ `ROW_NUMBER()` 函数生成的。这保证了它们的唯一性。让我们看看下一层级的查询。\n\n请参考图 4-16。\n\n![](img/527021_1_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16 为最终 `GROUP BY` 子句生成值\n\n在这个层级，我们生成了所有的类别值，并且我们使用了 `LAG()` 函数来设置结束日期。结果仍然是线性的、顺序的日期。我们现在需要做的就是结合\
  \ `MAX()` 和 `MIN()` 函数与一个 `GROUP BY` 子句，以便为每个缺口或孤岛提取出开始和结束日期。\n\n以下是原始查询中执行此操作的代码片段：\n\
  \n```\nSELECT SalesPersonId,GroupName,SUM(SalesAmount) AS TotalSales,\nMIN(StartDate)\
  \ AS StartDate,MAX(StartDate) AS EndDate,\nCASE\nWHEN SUM(SalesAmount) <> 0 THEN\
  \ 'Working, finally!'\nELSE 'Goofing off again!'\nEND AS Reason\nFROM ...\n```\n\
  \n让我们看看结果。请参考图 4-17。\n\n![](img/527021_1_En_4_Fig17_HTML.jpg)\n\n图 4-17 缺口和孤岛报告\n\
  \n看起来不错。一个名为 `Reason` 的列告诉我们销售日缺口的原因。这位销售员需要好好谈谈了！\n\n总之，需要设计逻辑来识别孤岛和缺口的起始日期。接下来，制定一个策略来生成可用于\
  \ `GROUP BY` 子句的值，以便对孤岛和缺口进行分类。最后，使用 `MAX()` 和 `MIN()` 函数来生成缺口和孤岛的开始和停止日期。\n\n###\
  \ 总结\n\n我们涵盖了很多内容。我们学到了什么？\n\n*   我们学习了如何将窗口或排名函数应用于我们的销售数据仓库。\n*   通过理解数据如何被缓存在内存或物理磁盘上，我们更深入地进行了性能分析。\n\
  *   我们开始基于估计计划任务的性质以及 `IO` 和 `TIME` 统计信息来分析性能并得出结论。\n*   我们简要讨论并总结了进行性能分析时需要考虑的一些步骤。\n\
  *   最后，我们研究了一个称为“缺口和孤岛”的真实世界数据问题。\n\n掌握了所有这些知识，我们将继续观察所有函数如何在财务数据库上发挥作用。\n\n"
- '# 5. 金融用例：聚合函数


  现在，我们将重点转向金融行业。与前三章一样，我们将使用可用的三类 SQL Server 函数来分析股票交易场景。我们将用一章专门介绍每一类函数。每个函数都将在查询中使用。我们将通过查看输出来检查结果，然后在大多数情况下，将输出复制到
  Microsoft Excel 电子表格中，以便生成一两个图表来可视化结果。


  我们还将更深入地进行性能调优。一个名为 `SET PROFILE STATISTICS ON` 的强大命令可用于深入了解 SQL Server 在执行查询时究竟在做什么。这将是很长的一章，所以煮好咖啡吧！


  > **提示**

  >

  > 请记住，估计的查询计划成本不是完成某个步骤所需的时间，而是查询优化器分配的一个加权值，它考虑了 IO、内存和 CPU 成本。


  ## 聚合函数


  聚合函数与 `OVER()` 子句（因此我们可以对结果集进行**分区**）结合使用，提供了一套强大的工具。回想一下，此类别包含以下函数：


  *   `COUNT()` 和 `COUNT_BIG()`

  *   `SUM()`

  *   `MAX()`

  *   `MIN()`

  *   `AVG()`

  *   `GROUPING()`

  *   `STRING_AGG()`

  *   `STDEV()` 和 `STDEVP()`

  *   `VAR()` 和 `VARP()`


  但有一点需要注意：如果将这些函数与 `OVER()` 子句一起使用，括号之间不允许使用 `DISTINCT` 作为关键字！这将产生错误：`AVG(DISTINCT
  ...) OVER(...)`。


  另外，我们将不再回顾 `COUNT_BIG()` 函数，因为它的工作方式与 `COUNT()` 函数完全相同。唯一的区别在于它返回 `BIGINT` 数据类型。


  顺便说一下，这种数据类型的范围在 **-**9,223,372,036,854,775,808 和 9,223,372,036,854,775,807 之间。与我们在示例中使用的整数数据类型相比，它需要
  8 字节的存储空间。该数据类型仅需 4 字节存储空间，其值范围在 **-**2,147,483,648 和 2,147,483,647 之间。用这些统计数据给你的朋友们留下深刻印象吧（其实并没有）。


  回到我们的聚合函数。这些函数可以成为工具集的一部分，让你能够分析金融数据，并为你的用户、分析师、财务顾问和经理建立强大的脚本和报告。将它们包含在存储过程中，就可以从
  SSRS（SQL Server Reporting Services）中调用，为财务利益相关者创建有价值的报告。


  在学习本章时要记住的一点是，金融数据的特点是每日交易量巨大，历史交易量更是庞大。根据金融机构的规模，我们谈论的是每天数亿笔交易，涉及数百万客户。因此，我们需要牢记性能分析和调优，以创建强大而快速的查询。你每年可能要处理数十亿行数据。我就曾经不得不这样！


  为了做到这一点，我们必须非常熟悉我们正在使用的数据库 **–** 其大小、表内容以及表之间的关系。


  让我们首先花些时间了解我们将要使用的数据库的数据模型。我们将使用一个简单的概念性业务模型来完成此操作。


  请参阅图 5-1。


