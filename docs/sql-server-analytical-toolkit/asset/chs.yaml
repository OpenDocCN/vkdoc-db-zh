  \ 15，类别 B 为 30，类别 C 为 45。最终总和在第 2 级为 90。\n**图 5-33**\n分组和上卷的工作原理\n\n从图表左侧的三类行开始，数据集中的每一行都有一个类别和一个值。类别是\
  \ A、B 和 C。如果我们在第 0 级汇总每个类别的值，我们会得到第 1 级的上卷值：类别 A 为 15，类别 B 为 30，类别 C 为 45。如果我们汇总这三个上卷总计，会在第\
  \ 2 级得到一个最终值 90。\n\n想象一下，如果我们要对数以万计的行进行分组和上卷总计，这种结构是多么强大而又令人困惑！\n\n回到财务场景。这是我们的业务分析师需求：\n\
  \n为客户 `C0000003`（Sherlock Carruthers）生成一份报告显示 `EURO`（欧盟货币）和 `GBP`（英镑）外币交易的总交易额。仅显示\
  \ 2012 日历年一月份的数据。\n\n结果需要按年、季度、月、交易日期和金融工具符号进行分组和上卷。\n\n清单 5-12 是基于此规格说明的最终查询。\n\
  ```sql\nSELECT YEAR(TransDate)        AS TransYear\n,DATEPART(qq,TransDate) AS TransQtr\n\
  ,MONTH(TransDate)       AS TransMonth\n,TransDate\n,Symbol\n,CustId\n,TransAmount\n\
  ,SUM(TransAmount)      AS SumOfTransAmt\n,GROUPING(TransAmount) AS TransAmtGroup\n\
  FROM Financial.[Transaction]\nWHERE Symbol IN ('EURO','GBP')\nAND CustId = 'C0000003'\n\
  AND YEAR(TransDate) = 2012\nAND MONTH(TransDate) = 1\nGROUP BY YEAR(TransDate)\n\
  ,DATEPART(qq,TransDate)\n,MONTH(TransDate)\n,TransDate\n,Symbol\n,CustId\n,TransAmount\
  \ WITH ROLLUP\nORDER BY YEAR(TransDate)\n,DATEPART(qq,TransDate)\n,MONTH(TransDate)\n\
  ,TransDate\n,Symbol\n,CustId\n,(CASE WHEN TransAmount IS NULL THEN 0 END)DESC\n\
  ,SUM(TransAmount) DESC\n,GROUPING(TransAmount) DESC\nGO\n```\n**清单 5-12**\nEURO\
  \ 和 GBP 的交易上卷\n\n`GROUPING()` 函数紧跟在 `SUM()` 函数之后。我们需要留意两个重要的编码部分。\n\n首先，我们需要在 `GROUP\
  \ BY` 子句中的 `TransAmount` 列添加 `WITH ROLLUP` 指令，以便生成上卷。\n\n其次，在 `ORDER BY` 子句中，我们需要包含条件性的\
  \ `CASE` 代码块，以便我们知道如何对 `TransAmount` 列的 `NULL` 值进行排序。注意，我们还通过一个小型的 `CASE` 块在 `ORDER\
  \ BY` 子句中包含了 `SUM()` 和 `GROUPING()` 函数，这样我们生成的报告在沿着交易金额的 `ROLLUP` 向上导航时，所有 `NULL`\
