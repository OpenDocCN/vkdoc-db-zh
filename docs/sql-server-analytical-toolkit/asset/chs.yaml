  \ 命令允许我们初始化代理键。现在我们可以完成我们的立方体了。\n\n请参考图 10-33 查看所做的更改以及用于验证一切顺利的简单查询。\n\n![](img/527021_1_En_10_Fig44_HTML.png)\n\
