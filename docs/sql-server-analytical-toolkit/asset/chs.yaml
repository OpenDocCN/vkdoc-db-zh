  \n让我们对`LEAD()`函数使用相同的逻辑。\n\n## LEAD() 函数\n\n现在让我们看看`LAG()`的对应函数，`LEAD()`函数。我们的分析师为下一个报告提供了以下业务需求：\n\
  \n修改之前的查询，使得这次报告显示当前月份的账户余额和明年同一月份的账户余额，针对所有客户。从 2013 年开始，包括之后的所有年份。结果应仅针对现金账户，并且报告需要按客户\
  \ ID、年份、月份以及账户编号和名称进行分组。\n\n请参阅清单 7-9。\n\n```sql\nSELECT CustId\n,AcctYear\n,AcctMonth\n\
  ,AcctNo\n,AcctName\n,AcctBalance\n,LEAD(AcctBalance,12,0) OVER (\nPARTITION BY CustId\n\
  ORDER BY AcctName,AcctYear,AcctMonth\n) AS NextYearBalance\nFROM MonthlyAccountBalances\n\
  WHERE AcctYear >= 2013\nAND AcctNAme = 'CASH'\nGO\n```\n清单 7-9\n月度账户余额分析，本年 vs.\
  \ 明年\n\n这次除了列名之外，我们还需要向`LEAD()`函数传递一些参数。我们还传递了值 12 作为向前查看的月份数，最后一个参数定义了当没有更多行时函数返回什么。在这种情况下，函数将返回\
  \ 0 而不是`NULL`。\n\n分区设置为客户 ID，即每个客户一个分区，分区内行按账户名、账户年份和账户月份排序。`WHERE`子句筛选器提取 2013\
  \ 年及之后的数据，并且我们只关注现金账户。\n\n**小测验**\n如果我们要查看所有账户类型，如何修改查询？`OVER()`子句需要任何更改吗？\n\n让我们看看图\
  \ 7-17 中的部分结果。\n\n![](img/527021_1_En_7_Fig18_HTML.jpg)\n\n图 7-17\n当年和次年月度账户余额分析报告\n\
  \n看起来它工作正常。第一行的次年余额指向第 13 行，即 2014 年 1 月的数据。因此我们向前看了一年。其余行的值正确地指向了下一年的值。尝试在章节脚本中下载此查询并进行修改，以便我们看到月份缩写而不是数字。同时，包含一个计算，用于显示本月余额与次年同一月份余额之间的差值。\n\
  \n**小测验答案**\n移除`WHERE`子句中的筛选谓词，并在`OVER()`子句的`PARTITION BY`子句中包含账户类型。\n\n### 性能考虑\n\
  \n图 7-18 是我们刚才讨论的查询的基线估计查询性能计划。\n\n![](img/527021_1_En_7_Fig19_HTML.png)\n\n图 7-18\n\
  LEAD() 函数查询的估计查询计划\n\n我们现在多次看到这种模式，索引查找或表扫描后跟排序任务。在这种情况下，索引查找（由`WHERE`子句引起）成本为 18%，排序成本为\
  \ 70%。突出的是窗口假脱机任务占 5%。通常我们看到 1%，但似乎此函数在此特定查询中做了大量工作。让我们收集更多统计信息。\n\n请参阅图 7-19。\n\
  \n![](img/527021_1_En_7_Fig20_HTML.png)\n\n图 7-19\nLEAD() 函数查询的 IO 和 TIME 统计信息\n\
  \n从底部开始，此查询的 SQL Server 执行时间统计如下：\n\n*   CPU 时间：15 毫秒\n*   已用时间：215 毫秒\n\n工作表的所有值均为\
  \ 0，但 Account 表具有以下统计信息：\n\n*   扫描计数：1\n*   逻辑读取：56\n*   物理读取：2\n*   预读读取：53\n\n\
  看起来有一些`IO`在进行。让我们看看`STATISTICS PROFILE`统计信息。\n\n请参阅图 7-20。\n\n![](img/527021_1_En_7_Fig21_HTML.png)\n\
  \n图 7-20\nLEAD() 函数查询的配置文件统计信息\n\n查看这些统计信息，我们看到`EstimateIO`统计信息几乎全为零，这包括窗口假脱机。窗口假脱机成本为\
  \ 5%，尽管`EstimateIO`统计信息为零。窗口假脱机成本用于以下解释分区默认`ROWS`框架子句的逻辑：\n\n```sql\n--Window Spool(ROWS\
  \ BETWEEN:([TopRowNumber1016], [BottomRowNumber1017]))\n```\n\n最后，`EstimateCPU`成本较低，`TotalSubtreeCost`值大约各为\
  \ 0.2。看起来没有太多可以改进的地方，因为索引已存在并被使用。也许我们可以通过修改逻辑来改进性能，使得账户数据可以通过内存增强表加载到内存中。\n\n\n\
  ### 内存优化策略\n\n让我们创建一个内存优化表并加载账户信息，然后针对它运行查询。我们将查看估计的查询计划以确认是否有改进。清单 7-10 是创建该表的\
  \ `SQL DDL` 命令。\n\n```sql\nCREATE TABLE [FinancialReports].[AccountMonthlyBalancesMem]\n\
  (\n[AcctYear]    [int] NULL,\n[AcctMonth]   [int] NULL,\n[CustId]      varchar NOT\
  \ NULL,\n[PrtfNo]      varchar NOT NULL,\n[AcctNo]      varchar NOT NULL,\n[AcctName]\
  \    varchar NOT NULL,\n[AcctBalance] decimal NULL,\nINDEX [ieMonthlyAcctBalanceMemory]\
  \ NONCLUSTERED\n(\n[AcctYear],\n[AcctMonth],\n[CustId],\n[PrtfNo],\n[AcctNo]\n)\n\
  )WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )\nGO\n```\n**清单 7-10 创建内存优化表**\n\
  \n该表名为 `AccountMonthlyBalancesMem`。注意我们需要包含索引声明，同时注意 `WITH` 指令包含了使此表成为内存优化表的设置。清单\
  \ 7-11 是加载该表的简单 `INSERT` 命令。\n\n```sql\nINSERT INTO [FinancialReports].[AccountMonthlyBalancesMem]\n\
  SELECT YEAR(PostDate)  AS AcctYear\n,MONTH(PostDate) AS AcctMonth\n,CustId\n,PrtfNo\n\
  ,AcctNo\n,AcctName\n,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance\nFROM\
  \ Financial.Account\nGROUP BY YEAR(PostDate)\n,MONTH(PostDate)\n,CustId\n,PrtfNo\n\
  ,AcctNo\n,AcctName\nGO\n```\n**清单 7-11 加载内存优化表**\n\n这个 `INSERT` 命令没什么特别的，那么让我们看看将要分析的查询。请参考清单\
  \ 7-12。\n\n```sql\nSELECT CustId\n,AcctYear\n,AcctMonth\n,AcctNo\n,AcctName\n,AcctBalance\n\
  ,LEAD(AcctBalance,12,0) OVER (\nPARTITION BY CustId\nORDER BY AcctName,AcctYear,AcctMonth\n\
  ) AS NextYearBalance\n,LAG(AcctBalance,12,0) OVER (\nPARTITION BY CustId\nORDER\
  \ BY AcctName,AcctYear,AcctMonth\n) AS LastYearBalance\nFROM [FinancialReports].[AccountMonthlyBalancesMem]\n\
  WHERE AcctYear >= 2013\nAND AcctNAme = 'CASH'\nGO\n```\n**清单 7-12 对内存优化表使用 LEAD()\
  \ 和 LAG()**\n\n查询和之前一样，但我们使用了内存优化表并增加了一个 `LAG()` 部分来获取去年同月的余额。回顾一下，我们按客户分区，并按账户名称、年份和月份对分区结果集进行排序。最终要求通过\
  \ `WHERE` 子句仅筛选现金账户和年份大于等于 2013 年来满足。\n\n不需要查看结果，因为除了输出中增加的 `LAG()` 函数结果外，它们与之前非内存增强表示例中的结果一致。（本章我想节省些空间）。\n\
  \n> **提示**\n> \n> 当你执行这类重大策略或代码更改时，务必针对已知的正确数据集测试结果，以确保一切按预期工作。永远不要想当然。错误可能而且将会潜入。别忘了保存旧脚本或查询的副本！\n\
  \n现在来看两者的查询计划。`**这次原始计划是指没有索引的那个，而不是图 7-18 所示的那个。**` 我在这次测试中删除了物理表上的索引。请参考图 7-21。\n\
  \n![](img/527021_1_En_7_Fig22_HTML.jpg)\n\n**图 7-21 对比估计的查询计划**\n\n从右向左看，我们看到表扫描的成本从\
  \ 47% 下降到了 28%；在内存表版本中添加了一个成本为 6% 的筛选任务（有点奇怪）；排序的成本从 48% 上升到了 60%，这似乎是我们尝试过的所有“增强”策略的标准情况。窗口假脱机任务——有两个——保持不变。\n\
  \n似乎没有显著的改进。内存表有一个默认索引，但在计划中并未使用。让我们看看 `IO` 和 `TIME` 统计数据。\n\n请参考图 7-22。\n\n![](img/527021_1_En_7_Fig23_HTML.png)\n\
  \n**图 7-22 对比 IO 和 TIME 统计数据**\n\n这就是我们看到改进的地方。非内存增强版本的扫描计数为 1，逻辑读取为 13，`AccountMonthlyBalances`\
  \ 表的物理读取计数为 5。内存增强版本没有此表的统计数据，因为它在内存中。工作表的统计数据均为零，因此这些数据显示出了显著的改进。\n\n内存增强版本中的 `TIME`\
  \ 统计数据有所下降。请注意，SQL Server 执行时间从 56 毫秒下降到内存增强版本的 2 毫秒，所以我认为这个策略值得投入开发时间。\n\n> **注意**\n\
  > \n> 这些示例是在一台具有 16 GB 内存和第七代 Intel Core i7 CPU 的笔记本电脑上运行的。在具有多个 CPU 的大型服务器上运行，并且有多个查询针对内存增强表启动时，性能改进将非常显著。\n\
  \n### PERCENT_RANK( ) 函数\n\n接下来介绍的是 `PERCENT_RANK()` 函数。它的作用是什么？我们在第 3 章中已经介绍过，但为了方便您复习或如果您没有按顺序阅读各章，在此再做一次回顾。\n\
  \n该函数针对类似查询结果、分区或表变量的数据集，计算每个值相对于整个数据集的相对排名（以百分比形式表示）。您需要将结果（返回值是浮点数）乘以 100.00，或者使用\
  \ `FORMAT()` 函数将结果转换为百分比（该函数也返回 `FLOAT(53)` 数据类型）。\n\n此外，它的行为与 `CUME_DIST()` 函数非常相似；至少微软文档是这么说的。\n\
  \n您也会发现它在理论上与 `RANK()` 函数非常相似。`RANK()` 函数返回值的位次，而 `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚才讨论的\
  \ `CUME_DIST()` 函数一起使用，以便比较结果，并看看它对我们即将生成的查询计划有什么影响。\n\n我们的分析师为接下来的报告提交了一个简单的业务需求。我们需要创建一个查询，按客户\
  \ ID、年份、账号和名称以及月份显示账户余额的百分比排名、密集排名和排名值。结果需要针对 2013 年及以后的年份。\n\n幸运的是，我们已经加载了内存增强的账户余额表。让我们快速看一下能满足此请求的查询。\n\
  \n请参考清单 7-13。\n\n```sql\nSELECT CustId\n,AcctYear\n,[AcctMonth]\n,AcctNo\n,AcctName\n\
  ,AcctBalance\n,PERCENT_RANK() OVER (\nPARTITION BY CustId,AcctYear,AcctMonth\nORDER\
  \ BY AcctBalance DESC\n) AS PercentRank\n,DENSE_RANK() OVER (\nPARTITION BY CustId,AcctYear,AcctMonth\n\
  ORDER BY AcctBalance DESC\n) AS DenseRank\n,RANK() OVER (\nPARTITION BY CustId,AcctYear,AcctMonth\n\
  ORDER BY AcctBalance DESC\n) AS Rank\nFROM [FinancialReports].[AccountMonthlyBalancesMem]\n\
  WHERE AcctYear >= 2013\nGO\n```\n清单 7-13\n客户年度账户余额月度排名\n\n该查询让 `PERCENT_RANK()`\
  \ 函数发挥了作用，但我们也包含了 `DENSE_RANK()` 和 `RANK()` 函数，以便比较结果。在所有情况下，`OVER()` 子句都使用了 `PARTITION\
  \ BY` 子句，该子句按客户 ID、账户年份和月份创建分区。分区结果按 `AcctBalance` 列排序。让我们看看结果。\n\n请参考图 7-23。\n\n\
  ![](img/527021_1_En_7_Fig24_HTML.jpg)\n\n图 7-23\n客户账户排名分析\n\n我们可以看到，现金账户在 2013 年\
  \ 1 月排名第一，权益账户排名第二，但差距不大。其余账户显示负余额。这意味着什么？也许他们都套现了，利润都在现金账户里。\n\n二月份显示所有账户头寸都是正的，除了商品和外汇（FX）账户。\n\
  \n这些是有趣的模式，我们的分析师需要研究并理解它们，以便根据发现提出投资建议，或者分析问题出在哪里。\n\n让我们将注意力转向一些性能调优和策略。\n\n###\
  \ 性能考虑\n\n图 7-24 是查询计划的初步估计版本。该计划相当大，并且有一个模式重复了两次，对应于查询中的每个窗口函数。\n\n![](img/527021_1_En_7_Fig25_HTML.jpg)\n\
  \n图 7-24\n排名分析报告的估计查询计划\n\n注意缺少窗口假脱机任务。请记住，我们在查询中使用了内存增强表，因此 11% 成本的表扫描无需担心。还有一个\
  \ 49% 成本的排序任务，有点高。接下来，我们看到三个表假脱机，两个成本为 0%，一个成本为 4%。随后是一个成本为 29% 的嵌套循环（内连接）任务，用于合并数据流。\n\
  \n接下来是段、序列项目和计算标量任务，该模式针对第二个窗口函数重复。请运行此计划并查看这些任务的作用。还可以在 `PROFILE` 统计信息的 `StmtText`\
  \ 列中获取更多解释。\n\n接下来让我们看看 `IO` 和 `TIME` 统计信息。请参考图 7-25。\n\n![](img/527021_1_En_7_Fig26_HTML.jpg)\n\
  \n图 7-25\n排名分析的 IO 和 TIME 统计信息（内存增强表）\n\n由于这是内存增强表，因此没有 `AccountMonthlyBalancesMem`\
  \ 表的统计信息，只有工作表的统计信息。\n\n基于我们查看的计划和统计信息，我们可以在所有示例中采用此策略。让我们继续下一组函数。\n\n### PERCENTILE_CONT( )\
  \ 和 PERCENTILE_DISC( )\n\n这两个函数是做什么的？嗯，回想一下，它们处理连续和离散的数据集。\n\n回想一下什么是连续数据。它是在特定时间段内变化的数据，例如随时间变化的销售金额，比如特定产品在\
  \ 12 个月内的总销售额。连续数据是在一段时间内测量的数据，比如设备在 24 小时内的锅炉温度。\n\n将每个锅炉温度相加得到总和没有意义。将锅炉温度相加然后除以时间段以获得平均值是有意义的。\n\
  \n那么，什么是离散数据呢？\n\n离散数据值是可以随时间计数的数字，例如投资账户余额在几天、几个月和几年内的变化。您可以将这些值相加得到总计和平均值，并识别账户余额随时间变化的趋势。\n\
  \n总之，`PERCENTILE_CONT()` 函数基于所需的百分位数在连续数据集上工作，以返回满足该百分位数的数据集内的一个值（您需要提供一个百分位数作为参数，如\
  \ .25、.50、.75 等）。\n\n对于此函数，该值是内插的。它通常不存在，所以是引入的。或者，如果数字正确对齐，它可能巧合地使用数据集中的某个值。\n\n\
  `PERCENTILE_DISC()` 函数基于所需的百分位数在离散数据集上工作，以返回满足该百分位数的数据集内的一个值。对于此函数，该值存在于数据集中；不像\
  \ `PERCENTILE_CONT()` 函数那样是内插的（两个函数都返回 `FLOAT(53)` 数据类型的值）。\n\n\n#### PERCENTILE_CONT()\n\
  \n在我们深入分析财务数据之前，先从一个简单的例子开始。我们的分析师为下一个报告提交了以下业务需求：\n\n创建一个报表，按客户、年份、月份、账号和名称显示期权（一种衍生品工具）账户余额，以及\
  \ 25%、50%、75% 和 90% 的连续百分位数。最初我们将只显示客户 C0000001，但此报表稍后将用于多个客户。查询需要灵活，以便满足所有这些要求。最后，查询的运行时间必须少于一秒钟（我们的第一个性能要求）！\n\
  \n请参考清单 7-14 了解解决方案。\n\n```sql\nSELECT CustId\n,AcctYear\n,AcctMonth\n,AcctNo\n\
  ,AcctName\n,AcctBalance\n,PERCENTILE_CONT(.25)\nWITHIN GROUP (ORDER BY AcctBalance)\n\
  OVER (\nPARTITION BY CustId,AcctYear\n) AS [PercentCont-25%]\n,PERCENTILE_CONT(.50)\n\
  WITHIN GROUP (ORDER BY AcctBalance)\nOVER (\nPARTITION BY CustId,AcctYear\n) AS\
  \ [PercentCont-50%]\n,PERCENTILE_CONT(.75)\nWITHIN GROUP (ORDER BY AcctBalance)\n\
  OVER (\nPARTITION BY CustId,AcctYear\n) AS [PercentCont-75%]\n,PERCENTILE_CONT(.90)\n\
  WITHIN GROUP (ORDER BY AcctBalance)\nOVER (\nPARTITION BY CustId,AcctYear\n) AS\
  \ [PercentCont-90%]\nFROM [FinancialReports].[AccountMonthlyBalancesMem]\nWHERE\
  \ Acctname = 'OPTION'\nAND CustId = 'C0000001'\nGO\n```\n\n清单 7-14 客户连续百分位数查询\n\n\
  请注意，此查询与我们通常包含 `OVER()` 子句的查询略有不同。该函数在 `SELECT` 子句中包含了四次，但每个所需百分位数的值作为参数传入。另请注意，我们正在使用内存增强表，因此这应该很快！\n\
  \n在 `OVER()` 子句出现之前，我们需要包含一个 `WITHIN GROUP (ORDER BY ...)` 子句。请注意，`ORDER BY` 子句并未包含在\
  \ `OVER()` 子句中。我们看到的只有 `PARTITION BY` 子句，它在四种情况下都设置了按客户标识符和账户年份的分区。看起来在每种情况下，分区都将按\
  \ `AcctBalance` 列排序以便处理。\n\n后面是一个简单的 `WHERE` 子句，用于筛选期权账户和客户 C0000001 的结果。此查询可以重新调整用途以显示多个客户和多个账户的结果，因此你可能需要修改\
  \ `OVER()` 子句。\n\n> 注意\n>\n> 像往常一样，我们从小的数据集开始，以确保查询正确工作，之后再扩大范围。\n\n请参考图 7-26 中的部分结果。\n\
  \n![](img/527021_1_En_7_Fig27_HTML.png)\n\n图 7-26 各种百分位数的连续百分位数报表\n\n此报表中什么引人注目？百分位数的值是插值的。注意箭头指向两个最接近的值，例如，19338.62\
  \ 介于 15783.80 和 19733.60 之间。值 19338.62 并不存在于实际的列值中。\n\n请记住，这是该函数的行为。\n\n但这并非普遍规律。可能存在某些数据模式，使得连续百分位数值与列值匹配。大多数情况下不会发生这种情况。再看一下\
  \ $100,000.00 的结果。列值和百分位数值是相等的。这是因为此分区中只有一行。因此，这是一个例外于该函数通常行为的场景。\n\n在我看来，这个报表确实让我们很好地了解了值的分布情况。\n\
  \n### 性能考虑\n\n让我们以通常的方式生成一个估计的查询计划。我们只检查右侧部分，因为执行模式重复了四次，对应于 `SELECT` 子句中每次 `PERCENTILE_CONT()`\
  \ 函数调用（对应每个百分比参数）。在初始索引查找以设置数据之后，实际上还有第五个重复模式。这些包括一个排序步骤和一些常见的表假脱机任务。\n\n请参考图 7-27。\n\
  \n![](img/527021_1_En_7_Fig28_HTML.png)\n\n图 7-27 连续百分位数报表的估计查询计划\n\n现有索引满足了查询要求，因此我们看到一个索引查找，其成本为\
  \ 20%。有用于 `WHERE` 子句的筛选器和成本为 43% 的昂贵排序。在下方的两个分支中，我们看到两个表假脱机，它们为嵌套循环连接生成数据流，所有成本均为\
  \ 0%。\n\n第二个嵌套循环连接以 6% 的成本合并了顶部和底部的流。正如我之前所说，剩余的计划部分类似并重复自身，只是没有索引查找和排序任务。\n\n接下来，让我们看看\
  \ `TIME` 和 `IO` 统计信息。请参考图 7-28。\n\n![](img/527021_1_En_7_Fig29_HTML.png)\n\n图 7-28\
  \ IO 和 TIME 统计信息\n\n如图所示，我们只有关于工作表的统计信息，包括 15 次扫描计数和 595 次逻辑读取。内存增强表的处理没有产生任何统计信息。最后，SQL\
  \ Server 的执行时间是 176 毫秒。\n\n请参考图 7-29 了解部分 `STATISTICS PROFILE` 统计信息。\n\n![](img/527021_1_En_7_Fig30_HTML.png)\n\
  \n图 7-29 连续百分位数查询的配置文件统计信息\n\n你可能注意到了，对于内存增强表，我们看到 `EstimateIO` 统计信息为 0 或非常低，但 `EstimateCPU`\
  \ 统计信息较高。这是一个部分输出，因为总共有 55 个步骤，但除了一个步骤外，所有 IO 都为零！`EstimateCPU` 和 `TotalSubtreeCost`\
  \ 因步骤而异，其中 `WHERE` 子句和嵌套循环连接的值最高。\n\n就性能分析计划而言，我认为这个计划非常有趣，并展示了内存增强表的能力。\n\n> 问题\n\
  >\n> 更高的 `EstimateCPU` 统计信息是否意味着在利用内存增强表时需要强大的 CPU？这是值得考虑的一点。\n\n\n\n## PERCENTILE_DISC\
  \ 函数\n\n以下是我们的百分位离散值示例。请记住，返回的值将是所分析列中实际存在的值，它们不是插值计算得出的。我们的分析师为下一份报告提交了以下业务需求：\n\
  \n通过修改之前的查询，创建一份报告，按客户、年份、月份、账号和名称显示期权账户余额，以及 25%、50%、75%和 90%百分位的离散百分位值。再次说明，这份报告是为我们的客户朋友\
  \ C0000001 准备的，但该报告稍后将用于多个客户。查询需要灵活，以便满足所有这些要求。最后，查询需要像之前的查询一样，在一秒内运行完成。\n\n这很棒。我们可以复制之前的示例并进行修改，因此我们使用了\
  \ `CTE` 而不是内存增强表。这让我们有机会比较估算的查询计划和 `STATISTICS PROFILE` 统计信息。\n\n进行一些复制粘贴操作，使用之前示例中的\
  \ `CTE`，我们就得到了满足需求的查询。\n\n提示\n\n编写代码时，请始终着眼于可重用性。\n\n请参阅清单 7-15。\n\n```sql\nWITH\
  \ MonthlyAccountBalances (\nAcctYear,AcctMonth,CustId, PrtfNo, AcctNo, AcctName,\
  \ AcctBalance\n)\nAS\n(\nSELECT YEAR(PostDate)  AS AcctYear\n,MONTH(PostDate) AS\
  \ AcctMonth\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n,SUM(AcctBalance)\nFROM Financial.Account\n\
  GROUP BY YEAR(PostDate)\n,MONTH(PostDate)\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n\
  )\nSELECT CustId\n,AcctYear\n,AcctMonth\n,AcctNo\n,AcctName\n,AcctBalance\n,PERCENTILE_DISC(.25)\n\
  WITHIN GROUP (ORDER BY AcctBalance)\nOVER (\nPARTITION BY CustId,AcctYear\n) AS\
  \ [PercentDisc-25%]\n,PERCENTILE_DISC(.50)\nWITHIN GROUP (ORDER BY AcctBalance)\n\
  OVER (\nPARTITION BY CustId,AcctYear\n) AS [PercentDisc-50%]\n,PERCENTILE_DISC(.75)\n\
  WITHIN GROUP (ORDER BY AcctBalance)\nOVER (\nPARTITION BY CustId,AcctYear\n) AS\
  \ [PercentDisc-75%]\n,PERCENTILE_DISC(.90)\nWITHIN GROUP (ORDER BY AcctBalance)\n\
  OVER (\nPARTITION BY CustId,AcctYear\n) AS [PercentDisc-90%]\nFROM FinancialReports.AccountMonthlyBalances\n\
  WHERE Acctname = 'OPTION'\nAND CustId = 'C0000001'\nORDER BY CustId\n,AcctYear\n\
  GO\n```\n\n#### 清单 7-15\n使用 CTE 方案的百分位离散值\n\n如图所示，我们希望为客户及所有年份生成账户余额分布的 25%、50%、75%和\
  \ 90%百分位的离散百分位值。再次请注意该函数特有的 `WITHIN GROUP` 子句。唯一使用此子句的其他函数是我们刚刚研究的 `PERCENTILE_CONT()`\
  \ 函数（不确定微软为何如此实现这些函数，但他们一定有充分的理由）。\n\n最后，我在查询末尾添加了一个 `ORDER BY` 子句，以便输出能按客户和年份整齐排序。这并非多余，因为\
  \ `WITHIN GROUP` 子句中的 `ORDER BY` 子句是按账户余额排序的。让我们查看结果，并请记住这些值不是插值计算得出的——它们实际存在！\n\
  \n请参阅图 7-30 中的部分结果。\n\n![](img/527021_1_En_7_Fig31_HTML.png)\n\n#### 图 7-30\n账户余额的百分位离散分析\n\
