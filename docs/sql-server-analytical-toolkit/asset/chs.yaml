  \n让我们来看看。\n\n#### 性能考量\n\n让我们以常规方式生成基线估计执行计划，可以通过菜单栏中的查询选择或估计执行计划图标，你喜欢哪种方法都可以。\n\
  \n请参考图 7-14。\n\n![](img/527021_1_En_7_Fig15_HTML.png)\n\n一个 S S M S 窗口的截图。它展示了一个包含\
  \ 9 个组件的基线估计执行计划。组件是窗口假脱机、段、计算标量、序列项目、段、流聚合、排序、计算标量和表扫描。\n\n图 7-14\n\n`LAG()` 查询的基线估计执行计划\n\
  \n从右向左读，我们有一个良好的开端。我们看到一个索引扫描占 11% 的成本，但接着我们看到一个昂贵的排序操作占 84% 的成本。两者之间的计算标量任务用于从\
  \ `PostDate` 列中提取年份和月份。排序任务用于 `CTE` 中的 `GROUP BY` 子句。\n\n让我们尝试报告表方法。我使用 `CTE` 查询在一个名为\
  \ `FinancialReports.` 的新模式中创建了一个报告表。另外，我们将创建两个索引：一个是聚集索引，一个是非聚集索引。\n\n请参考清单 7-6。\n\
