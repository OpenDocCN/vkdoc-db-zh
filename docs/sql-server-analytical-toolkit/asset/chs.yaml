  \n如你所见，所有的描述性信息都已可用，我们可以在许多报表查询和场景中使用这个`TSQL 视图`。\n\n关于`SSIS`的最后一点说明：之前我提到过可以添加错误捕获。清单\
  \ 11-2 是一个简单的表定义和一个简单的`INSERT`命令，用于捕获`SQL Server`的系统级错误代码和消息。\n\n```sql\nCREATE\
  \ TABLE [dbo].ErrorLog NULL,\n[ErrorLine]       [int] NULL,\n[ErrorMsg]        nvarchar\
  \ NULL,\n[ErrorDate]       [datetime]\n)\nGO\nINSERT INTO [dbo].[ErrorLog]\nSELECT\n\
  ERROR_NUMBER()          AS [ERROR_NO]\n,ERROR_SEVERITY()        AS [ERROR_SEVERITY]\n\
  ,ERROR_STATE()           AS [ERROR_STATE]\n,ERROR_PROCEDURE()       AS [ERROR_PROC]\n\
  ,ERROR_LINE()            AS [ERROR_LINE]\n,ERROR_MESSAGE()         AS [ERROR_MSG]\n\
  ,GETDATE()               AS [ERROR_DATE];\nGO\n```\n**清单 11-2** 错误捕获工具包\n\n如你所见，当出现问题时，该表可以存储错误号、严重性以及其他常见的系统错误信息。这些错误代码和消息存储在系统参数中，可以在前面的`INSERT/SELECT`命令中使用，将它们加载到我们的日志表中。我们可以将`INSERT`命令放在一个或多个`执行\
  \ SQL 任务`中，并将所有流程从正常任务重定向到错误任务（在出错时），如图 11-15 所示。\n\n![](img/527021_1_En_11_Fig15_HTML.png)\n\
  \n一张截图展示了两个对话框。前面的对话框标题为`输入 SQL 查询`，后面的标题为`执行 SQL 任务编辑器`。\n\n**图 11-15** 添加的 SSIS\
  \ 错误捕获\n\n这样，如果某个环节出错，我们就能获得所有的错误代码、错误消息、问题代码的行号以及错误发生的日期。\n\n我们现在可以转到聚合函数分析了，但我想你已经掌握了足够的`SSIS`知识，可以创建包含任务来执行简单`ETL`处理的简单包了！\n\
  \n## 聚合函数\n\n我们将再次简要回顾一下聚合窗口函数。你应该对它们很熟悉，因为在之前的所有三个业务场景中我们都涵盖过。这次我们将它们应用到我们的库存控制场景中，以便了解业务分析师如何监控库存水平，并捕获诸如库存不足或无库存等事件，从而能够采取纠正措施——或者可能是高库存水平，这表明某个产品滞销！\n\
  \n以下是我们将在本章讨论的窗口聚合函数：\n\n*   `COUNT()`: 支持窗口框架规范\n*   `SUM()`: 支持窗口框架规范\n*   `MAX()`:\
  \ 支持窗口框架规范\n*   `MIN()`: 支持窗口框架规范\n*   `AVG()`: 支持窗口框架规范\n*   `STDEV()`: 支持窗口框架规范\n\
  *   `VAR()`: 支持窗口框架规范\n\n如你所见，它们都支持`ROWS`和`RANGE`窗口框架规范。\n\n我们的第一个分析将前五个函数合并在一个查询中，因为我们已经涵盖并熟悉了它们的工作原理。换句话说，我们不会为每个函数单独设置一个查询。\n\
  \n\n\n### COUNT()、SUM()、MAX()、MIN() 和 AVG() 函数\n\n我们之前见过这些函数，它们的名称暗示了其功能，因此这里不再逐一描述。现在，让我们看看业务分析师提供的第一组业务需求：\n\
  \n业务分析师希望我们创建一个库存移动概况报告，该报告需展示库存水平小于 50 个单位的产品的数量、最小值和最大值，以及总量和平均值。此外，数据范围需涵盖所有年份，且位置为“LOC1”、库存为“INV1”、产品为“P033”。\n\
  \n所有结果都需要按月滚动计算，但 `SUM()` 结果除外，它只需计算当前月份的总计加上上个月的结转总计。\n\n解决方案请参考代码清单 11-3。\n\n\
  ```sql\nWITH InventoryMovement (\nLocId, InvId, WhId, ProdId, AsOfYear, AsOfMonth,\
  \ AsOfDate, InvOut, InvIn, Change, QtyOnHand\n)\nAS(\nSELECT LocId\n,InvId\n,WhId\n\
  ,ProdId\n,AsOfYear\n,AsOfMonth\n,AsOfDate\n,InvOut\n,InvIn\n,(InvIn - InvOut) AS\
  \ Change\n,(InvIn - InvOut) + LAG(QtyOnHand,1,0) OVER (\nPARTITION BY LocId,InvId,WhId,ProdId\n\
  ORDER BY [AsOfDate]\n)AS QtyOnHand -- 05/31/2022\nFROM APInventory.Product.WarehouseMonthly\n\
  )\nSELECT LocId\n,InvId\n,WhId\n,ProdId\n,AsOfYear\n,AsOfMonth\n,AsOfDate\n,InvOut\n\
  ,InvIn\n,Change\n,QtyOnHand\n,COUNT(*) OVER (\nPARTITION BY AsOfYear,LocId,InvId,WhId,ProdId\n\
  ORDER BY LocId,InvId,WhId,AsOfMonth\nROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW\n) AS WarehouseLT50\n,MIN(QtyOnHand) OVER (\nPARTITION BY AsOfYear,LocId,InvId,WhId,ProdId\n\
  ORDER BY LocId,InvId,WhId,AsOfMonth\nROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW\n) AS MinMonthlyQty\n,MAX(QtyOnHand) OVER (\nPARTITION BY AsOfYear,LocId,InvId,WhId,ProdId\n\
  ORDER BY LocId,InvId,WhId,AsOfMonth\nROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW\n) AS MaxMonthlyQty\n,SUM(QtyOnHand) OVER (\nPARTITION BY AsOfYear,LocId,InvId,WhId,ProdId\n\
  ORDER BY LocId,InvId,WhId,AsOfMonth\n--ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW\nROWS BETWEEN 1 PRECEDING AND CURRENT ROW\n) AS Rolling2MonthlyQty\n,AVG(QtyOnHand)\
  \ OVER (\nPARTITION BY AsOfYear,LocId,InvId,WhId,ProdId\nORDER BY LocId,InvId,WhId,AsOfMonth\n\
  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n) AS AvgMonthlyQty\nFROM InventoryMovement\n\
  WHERE QtyOnHand <= 50\nAND LocId = 'LOC1'\nAND InvId = 'INV1'\nAND ProdId ='P033'\n\
  ORDER BY LocId\n,InvId\n,WhId\n,ProdId\n,AsOfYear\n,AsOfMonth\nGO\n```\n代码清单 11-3\n\
  库存水平概况报告\n\n如代码所示，我们按年份设置分区，因为我们并没有将结果过滤为仅一年。\n\n我为所有聚合函数都包含了 `ROWS` 窗口框架子句，以生成滚动月份的效果：\n\
  \n```sql\nROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n```\n\n对于 `SUM()` 聚合函数，我使用了以下窗口框架子句，以便月度总和能结转上月的总计：\n\
  \n```sql\nROWS BETWEEN 1 PRECEDING AND CURRENT ROW\n```\n\n回想一下，这意味着聚合函数将作用于当前行和所有之前的行，从而为\
  \ `COUNT()`、`MAX()`、`MIN()` 和 `AVG()` 函数产生“滚动”效果。如前所述，`SUM()` 函数“滚动”两个月。\n\n`ORDER\
  \ BY` 子句按库存 ID 和月份对分区进行排序。如果想包含不止一年的数据，我们需要在这里和 `PARTITION BY` 子句中包含年份。\n\n现在来看\
  \ `WHERE` 子句。由于我们正在过滤一个库存位置的结果，我们其实不需要特别指出库存 ID。可以尝试运行此查询，生成一个估计的查询计划，然后从 `OVER()`\
  \ 子句中移除库存 ID，再生成第二个估计的查询计划。看看它们是否发生了变化。\n\n最后，我们看到了 `WHERE` 子句，如果想将所有位置、库存和仓库都包含在结果中，可以轻松地更改它。可以创建一个\
  \ SQL Server Reporting Services（`SSRS`）报告，为这些维度提供筛选器，以便业务分析师可以选择他们想要的数据。\n\n部分结果请参考图\
