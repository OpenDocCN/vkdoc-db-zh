  ## 窗口函数


  以下是我们在每个业务场景中回顾的函数。


  请参阅表 14-1。


  表 14-1


  按类别划分的函数


  | 聚合 | 排名 | 分析 |

  | --- | --- | --- |

  | `COUNT()` | `RANK()` | `CUME_DIST()` |

  | `COUNT_BIG()` | `DENSE_RANK()` | `FIRST_VALUE()` |

  | `SUM()` | `NTILE()` | `LAST_VALUE()` |

  | `MAX()` | `ROW_NUMBER()` | `LAG()` |

  | `MIN()` |   | `LEAD()` |

  | `GROUPING()` |   | `PERCENT_RANK()` |

  | `STRING_AGG()` |   | `PERCENTILE_CONT()` |

  | `STDEV()` |   | `PERCENTILE_DISC()` |

  | `STDEVP()` |   |   |

  | `VAR()` |   |   |

  | `VARP()` |   |   |


  这些函数与 `OVER()` 子句结合使用，使我们能够创建强大的查询，例如创建移动滚动总计和平均值。正如你所看到的，你还可以进行一些非常有趣的统计分析。


  你将依赖这些查询来解决复杂的业务问题。你可以预料到在面试中会讨论这些，所以请确保你对它们了如指掌！关键在于 `OVER()` 子句。确保你理解 `PARTITION
  BY` 子句的作用、`ORDER BY` 子句的作用，以及窗口帧规范（`ROWS` 和 `RANGE`）的作用。同时理解当你有同时使用 `PARTITION BY`
  和 `ORDER BY` 子句的 `OVER()` 子句，或仅使用其中之一，甚至是空的 `OVER()` 子句时，窗口帧规范的默认行为。确保你对数据集中的分区是什么有扎实的理解。如果这一点有点模糊，请务必回顾第
  1 章，该章对此有详细解释。


  如果你需要复习这些函数，挑选一章并查看它们。确保你尝试这些脚本，修改它们，破坏它们，并增强它们。这就是学习的方式。


  最后，查看 Microsoft 关于这些函数的文档，以深入了解它们的工作原理。记住，这些是你的工具，所以请确保你知道它们能做什么、不能做什么以及如何使用它们！


  注意


  SQL Server 2022 为 `OVER()` 子句提供了替代语法。我在本书的前几章中简要介绍了这一点。还有一些新的窗口函数，例如：


  `APPROX_PERCENTILE_CONT()`

  `APPROX_PERCENTILE_DISC()`


  绝对值得花时间通过参考 Microsoft SQL Server 2022 网站来查看 Microsoft SQL Server 2022 中可用的新功能。




