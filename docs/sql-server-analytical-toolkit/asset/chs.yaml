  \n**图 5-44e**\n\n### 窗口假脱机的性能剖析统计信息\n\n回顾我们之前的讨论，窗口假脱机任务用于将需要重复处理的行加载到内存或临时存储中。在我们的案例中，这是由\
  \ `OVER()` 子句生成的，具体来说是默认的 `RANGE` 子句。\n\n这是用来计算总和与标准差值的。如果我们查看查询，`OVER()` 子句中的 `ORDER\
  \ BY` 子句按投资组合和月份排序。请查看图 5-44f 中窗口假脱机的性能剖析统计信息详情。\n\n![](img/527021_1_En_5_Fig51_HTML.jpg)\n\
