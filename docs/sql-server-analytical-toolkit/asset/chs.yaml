  \ 9 列。月度销售总额、销售总额首值和销售总额末值列被突出显示。\n\n图 3-10\n\n测试脚本的查询结果\n\n结果显示了两年的数据。注意第一行的首值和末值。它们是相等的，因为窗口框架只包含一行。当我们移动到第二行时，首值保持不变，但末值现在反映的是二月份的月度销售总额。\n\
  \n随着窗口框架变大，末值会进行调整以反映分区中的最后一个月。我还包含了一个公式，用于计算首末总销售额之间的变化，以及一条小消息，显示销售额是增长、下降还是完全没有变化。\n\
