  \n**图 5-44f**\n\n### 窗口假脱机性能剖析统计信息详情\n\n当 `OVER()` 子句中包含 `PARTITION BY` 和 `ORDER\
  \ BY` 子句时，窗口假脱机显示了默认行为：\n\n```\nRANGE BETWEEN:([UNBOUNDED,[[APFinance].[Financial].[Portfolio].[Month]])\n\
  ```\n\n等等。我之前说过 `ORDER BY` 子句是按投资组合和月份排序的。嗯，由于 `WHERE` 子句筛选出的行只涉及一个投资组合，即 `现金 -\
  \ 财务投资组合`，那么这个列就不需要了。我再次从查询中移除了 `WHERE` 子句，这次性能剖析统计信息中的参数值是\n\n```\n|--Window Spool(RANGE\
  \ BETWEEN:(UNBOUNDED, [\n    [APFinance].[Financial].[Portfolio].[CustId],\n   \
  \ [APFinance].[Financial].[Portfolio].[Year],\n    [APFinance].[Financial].[Portfolio].[Portfolio],\n\
  \    [APFinance].[Financial].[Portfolio].[Month]\n    ])\n)\n```\n\n现在这告诉我们，需要谨慎设置分区定义。仅通过筛选现金投资组合，我不需要包含按投资组合分区的\
  \ `PARTITION BY` 子句，并且 `ORDER BY` 子句应该只引用 `TradeMonth` 列。\n\n由于你可能希望此查询能在多个客户、投资组合和年份上运行，那么你需要在分区定义中包含客户、投资组合和年份列。请确保你理解想要处理的内容；否则，你可能会添加不必要的代码，从而拖慢性能。\n\
  \n以下是你可能想尝试的写法：\n\n```\n,STDEV(MonthlyValue) OVER(\n    PARTITION BY CustId, TradeYear,Portfolio\n\
  \    ORDER BY CustId, TradeYear,Portfolio,TradeMonth\n) AS RollingMonthlyStdev\n\
  ```\n\n最后，我们查看查询计划中最后一个排序任务。请参阅图 5-44g。\n\n![](img/527021_1_En_5_Fig52_HTML.png)\n\
  \n`c h 0 5 aggregate queries s q l` 的一个截图。屏幕上半部分展示了一些编程代码。下半部分展示了消息和执行计划。一个弹出面板显示了排序的性能剖析统计信息。\n\
  \n**图 5-44g**\n\n### 查询计划中的最终排序任务\n\n这个最后的任务按以下列对数据流进行排序，并对应于分区中出现的 `ORDER BY` 子句。因为只有一个投资组合，所以未包含投资组合列：\n\
  \n```\n--Sort(\n    ORDER BY:([Expr1004] ASC,\n        [APFinance].[Financial].[Portfolio].[Month]\
  \ ASC\n    )\n)\n```\n\n如果我修改查询中的 `WHERE` 子句，以便筛选两年、两个客户和两个投资组合，如下所示\n\n```\nFROM\
  \ PortfolioAnalysis\nWHERE TradeYear IN(2012,2013)\nAND CustId IN('C0000001','C00000012')\n\
  AND Portfolio IN (\n    'CASH - FINANCIAL PORTFOLIO',\n    'EQUITY - FINANCIAL PORTFOLIO'\n\
  )\nORDER BY CustId,Portfolio,TradeYear,TradeQtr,TradeMonth\nGO\n```\n\n`PROFILE`\
  \ 统计信息 `StmtText` 列中的排序字符串会被修改以表示新的列：\n\n```\n--Sort(\n    ORDER BY:(\n        [APFinance].[Financial].[Portfolio].[CustId]\
  \ ASC,\n        [APFinance].[Financial].[Portfolio].[Portfolio] ASC,\n        [APFinance].[Financial].[Portfolio].[Year]\
  \ ASC,\n        [Expr1004] ASC,\n        [APFinance].[Financial].[Portfolio].[Month]\
  \ ASC)\n)\n```\n\n让我们总结一下这个函数的分析。我们将分析推进了几步，但可以看到，我们能够获得关于正在发生什么的有价值洞察。另外请注意两个重要因素：\n\
  \n*   图形化的估计查询计划是从右向左读的（我们已经知道这一点）。\n\n*   `PROFILE` 统计信息是从上往下读的，因此性能剖析统计信息中的最后一行语句对应于估计查询计划中最右侧的任务。\n\
  \n*   估计查询计划和 `PROFILE` 统计信息之间的节点 ID 不对应。例如，在 `PROFILE` 统计信息输出中，索引寻道的 `NodeId` 是\
  \ 12，但在估计查询计划提示中，它的节点 ID 是 10！\n\n这如图 5-44h 所示。\n\n![](img/527021_1_En_5_Fig53_HTML.png)\n\
  \n`c h 0 5 aggregate queries s q l` 的一个截图。屏幕上半部分展示了一些编程代码。下半部分展示了消息和执行计划。一个弹出面板显示了索引寻道的性能剖析统计信息。\n\
  \n**图 5-44h**\n\n### 如何解读 `PROFILE` 统计信息与估计查询计划的对比\n\n可以看到，从上到下阅读 `PROFILE` 统计信息对应于从左到右阅读估计查询计划中的任务（如果这还不够令人困惑的话）。\n\
  \n那么，所有这些分析带给了我们什么？\n\n\n\n"
- '# SQL Server 性能调优与方差函数


  SQL Server 在估算查询计划并推荐正确的索引方面表现相当不错。但如果性能仍然是个问题，我们就需要深入这些细节，并决定采取其他措施，比如创建反规范化报表表或重写查询。我们甚至不会涉及增加内存或使用更快磁盘等硬件考量。这是一个性能调优主题，其内容足以成为一整本关于性能调优的书。


  实践并熟悉每个任务的作用，以及它如何对应于 `PROFILE` 统计中的条目，这样你就能确定可能需要采取哪些额外步骤来提高性能。


  本章还有最后一个聚合函数需要讨论。


  ### VAR( ) 和 VARP( ) 函数


  回想第 2 章，`VAR()` 和 `VARP()` 函数用于为数据样本中的一组值生成方差。与 `STDEV()/STDEVP()` 示例中使用的数据集相关的相同讨论，同样适用于
  `VAR()` 和 `VARP()` 函数相对于数据总体的情况：


  `VAR()` 函数在无法知道或获得完整数据集时，对数据的部分集合进行计算，而 `STDEVP()` 函数在已知整个数据总体时对其进行计算。


  对于我们开发人员来说，一个更简单的解释是：


  非正式地说，如果你取每个值与均值（平均值）的所有差值，对结果进行平方，然后将所有结果相加，最后除以数据样本的数量，你就得到了方差。


  对于我们的场景，假设我们有一些数据，预测了我们某个投资组合在特定年份的股票业绩目标。我们想看看实际收益与预测的接近或偏离程度。它回答了以下问题：


  - 我们是否**未达到**我们的目标投资目标？

  - 我们是否**达到了**我们的目标投资目标？

  - 我们是否**超过了**我们的目标投资目标？


  这些函数生成的数据可以用于统计报告和 Microsoft Excel 图表中，以回答这些问题。


  其语法与其他函数相同：


  ```

  VAR(ALL|DISTINCT ) 和 VARP(ALL|DISTINCT )

  ```


  但需要注意的一点是：如果你将它们与 `OVER()` 子句一起使用，则不允许使用 `DISTINCT`！


  请参考清单 5-17。


  ```

  DECLARE @TradeYearStdev TABLE (

  TradeYear            SMALLINT      NOT NULL,

  TradeQuarter         SMALLINT      NOT NULL,

  TradeMonth           SMALLINT      NOT NULL,

  CustId               VARCHAR(32)   NOT NULL,

  PortfolioNo          VARCHAR(32)   NOT NULL,

  Portfolio            VARCHAR(64)   NOT NULL,

  MonthlyValue         DECIMAL(10,2) NOT NULL

  );

  INSERT INTO @TradeYearStdev VALUES

  (''2012'',''1'',''1'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''13862.80''),

  (''2012'',''1'',''2'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''14629.50''),

  (''2012'',''1'',''3'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''15568.90''),

  (''2012'',''2'',''4'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''17004.80''),

  (''2012'',''2'',''5'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''18064.90''),

  (''2012'',''2'',''6'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''18500.30''),

  (''2012'',''3'',''7'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''17515.00''),

  (''2012'',''3'',''8'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''16779.50''),

  (''2012'',''3'',''9'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''15576.00''),

  (''2012'',''4'',''10'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''15941.60''),

  (''2012'',''4'',''11'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''14208.80''),

  (''2012'',''4'',''12'',''C0000001'',''P01C1'',''COMMODITY - FINANCIAL PORTFOLIO'',''13804.30'');

  SELECT TradeYear

  ,TradeQuarter

  ,TradeMonth

  ,CustId

  ,PortfolioNo

  ,Portfolio

  ,MonthlyValue

  -- 当有 3 行数值时生成值

  ,CASE

  WHEN TradeMonth % 3 = 0 THEN

  VAR(MonthlyValue) OVER(

  PARTITION BY TradeQuarter

  ORDER BY TradeMonth

  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

  )

  ELSE 0

  END AS PortfolioquarterlyVar

  ,CASE

  WHEN TradeMonth % 3 = 0 THEN

  VARP(MonthlyValue) OVER(

  PARTITION BY TradeQuarter

  ORDER BY TradeMonth

  ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

  )

  ELSE 0

  END AS PortfolioquarterlyVarp

  FROM @TradeYearStdev

  ORDER BY CustId

  ,TradeYear

  ,TradeMonth

  ,PortfolioNo

  GO

  ```

