  \ BI` 未命名文件窗口的截图。它展示了一个星型模式，包含设备类型、日历、位置和连接到设备故障度量的设备故障。右侧面板是包含 3 个选项的属性、包含 11 个组件和搜索框的字段。\n\
  \n**图 10-29**\n\n**`Power BI` 展示 `APPlant` `STAR` 模式**\n\n在本书的最后三章，当我们将窗口函数应用于库存数据库业务模型时，我们将详细探讨\
  \ `Power BI`。现在，让我们看看使用 `SSAS` 创建多维数据集的主要步骤。\n\n涉及几个步骤：\n\n*   创建数据源。\n*   创建数据源视图。\n\
  *   定义维度。\n*   定义数据集。\n*   定义维度用法（针对每个维度）。\n*   构建并部署数据集。\n*   浏览数据集。\n*   使用数据集创建数据透视表。\n\
  \n创建数据源基本上是确定 `SSAS` 服务器并提供凭据，以便用户和开发人员能够连接到数据集（或创建一个）。\n\n数据源视图本质上是将用于创建和填充视图的表的\
  \ `STAR` 或 `SNOWFLAKE` 模式，因此这是一个必要的组件。使用 `SSAS` 可以创建两种模型：一种是表格模型，另一种是多维模型。当你首次在笔记本电脑、工作站或服务器上安装\
  \ `SSAS` 时，需要定义模型类型。我们将专注于多维模型。\n\n一旦定义了数据源和数据源视图，你就需要确定将用作维度的表以及将用于填充数据集中度量的事实表。\n\
  \n这些任务完成后，你需要将维度链接到数据集；这被称为定义维度用法。\n\n所有这些任务完成后，你需要构建数据集并将其部署到你环境中安装的 `SSAS` 服务器实例（如果你有足够的内存、`CPU`\
  \ 和磁盘空间，可以同时安装表格和多维实例）。现在，你可以浏览数据集或使用 Microsoft `Excel` 或 `Power BI` 连接到它。\n\n请参考\
