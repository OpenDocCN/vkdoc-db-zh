  \n一位优秀的分析师会问为什么会发生这种情况。我确信我们的客户约翰·史密斯想知道！是时候进行绩效分析了。\n\n\n\n#### 性能考量\n\n这次，在我们的性能分析中，我们将深入探讨\
  \ `PROFILE` 统计数据，并将其与图形化估计查询计划中出现的任务进行比较。这可能会有点深入细节，但值得付出努力，因为您将掌握大量信息，这些信息将协助您进行性能分析工作。请记住，您需要在执行查询前执行以下命令来生成\
  \ profile 统计数据（别忘了关闭它）：\n\n```\nSET STATISTICS PROFILE ON\nGO\n```\n\n> 注意\n> \n\
  > 在本次讨论中，请参考图 5-44a 到图 5-44h。\n\n像往常一样，我们首先以通常的方式生成一个估计查询计划。首先，我们检查那些具有高成本的节点。记住，在估计执行计划中，我们从右向左开始。\n\
