  \ 8,784 行数据。请注意每个百分位值是如何被插值计算出来的。箭头标出了它们如果存在时应处的位置。例如，对于第 25 个百分位，值 924.425 落在 762.2\
  \ 和 978.5 这两个值之间。这意味着在分区中，有 25% 的值小于或等于这个不存在的值。\n\n对于其他例子，只需跟随箭头指示即可。最后，提醒一下，这个查询不允许你指定\
