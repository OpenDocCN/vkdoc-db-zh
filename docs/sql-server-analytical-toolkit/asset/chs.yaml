  \ `DBCC` 以清除缓存。\n\n### PERCENTILE_CONT( ) 函数\n\n以下是该函数的描述。如果你在之前的章节中读过并了解其工作原理，可以跳过本节讨论。如果需要复习，请继续阅读！\n\
  \n我们将首先讨论 `PERCENTILE_CONT()` 函数，这个函数是做什么的？\n\n如果你阅读过第 3、7 和 10 章，你会记得它处理的是连续的数据集合。回想一下什么是连续数据。\n\
  \n连续数据是在一段时间内测量的数据，例如设备在 24 小时内的锅炉温度，或一段时间内设备故障的次数，就我们的例子而言，是一段时间内的库存移动。将每个锅炉温度相加以得出总和是没有意义的。将锅炉温度相加然后除以时间段以求得平均值则是有意义的。最后，将库存入库移动的值相加也没有意义，因为\
  \ 99% 的情况下发生的是出库移动，因此月度总和除非没有库存出库，否则不能表明库存中有多少库存。将所有入库库存移动相加然后减去所有出库库存移动则是可行的，因为它会得出剩余库存量。所以所有这些都可能变得非常棘手。\n\
  \n`因此我们可以说，连续数据可以通过使用诸如平均值等公式来衡量。`\n\n这对于每日的现有库存是适用的。我们可以将一个月内每天的库存数量相加，然后生成月度平均值。\n\
  \n总之，`PERCENTILE_CONT()` 函数基于所需的百分位数，在连续的数据集合上运行，以返回满足该百分位数的数据集内的一个值（你需要提供一个百分位数作为参数，如\
  \ .25、.50、.75 等）。使用此函数时，该值是插值的，意味着它通常不存在于数据集中。或者，如果数字恰好对齐，它也可能巧合地使用数据集中的某个值。这种情况是可能发生的。\n\
  \n以下是此查询的业务需求：\n\n我们的业务分析师总是盯着同一个产品、位置、库存和仓库。这次，他们希望我们生成 2002 年全年的第 25、50 和 75 个百分位数作为起点。照例，季度名称和月份名称需要完整拼写，并且需要包含月份数字，以便在将数据复制到\
  \ Microsoft Excel 电子表格时，如果需要可以按月份数字排序。库存数量需要表示月底最后一天库存中剩余的数量。因此，这些值是通过将每个月内每天的所有入库库存移动减去所有出库库存移动来计算，以得出月底最后一天的总数量。\n\
  \n以下是我们得出的结果。请参考清单 13-7。\n\n\n\n```\n/********************************/\n/* 生成插值计算值\
  \               */\n/********************************/\nSELECT AsOfYear\n,DATEPART(qq,AsOfDate)\
  \ AS AsOfQuarter\n,CASE\nWHEN DATEPART(qq,AsOfDate) = 1 THEN '第 1 季度'\nWHEN DATEPART(qq,AsOfDate)\
  \ = 2 THEN '第 2 季度'\nWHEN DATEPART(qq,AsOfDate) = 3 THEN '第 3 季度'\nWHEN DATEPART(qq,AsOfDate)\
  \ = 4 THEN '第 4 季度'\nEND AS AsOfQtrName\n,AsOfMonth\n,CASE\nWHEN AsOfMonth = 1 THEN\
  \ '1 月'\nWHEN AsOfMonth = 2 THEN '2 月'\nWHEN AsOfMonth = 3 THEN '3 月'\nWHEN AsOfMonth\
  \ = 4 THEN '4 月'\nWHEN AsOfMonth = 5 THEN '5 月'\nWHEN AsOfMonth = 6 THEN '6 月'\n\
  WHEN AsOfMonth = 7 THEN '7 月'\nWHEN AsOfMonth = 8 THEN '8 月'\nWHEN AsOfMonth = 9\
  \ THEN '9 月'\nWHEN AsOfMonth = 10 THEN '10 月'\nWHEN AsOfMonth = 11 THEN '11 月'\n\
  WHEN AsOfMonth = 12 THEN '12 月'\nEND AS AvgMonthName\n,AsOfDate – 月末日期\n,LocId\n\
  ,InvId\n,WhId\n,ProdId\n,QtyOnHand\n,PERCENTILE_CONT(.25) WITHIN GROUP (ORDER BY\
  \ QtyOnHand)\nOVER (\nPARTITION BY AsOfYear\n) AS [%Continuous .25]\n,PERCENTILE_CONT(.5)\
  \ WITHIN GROUP (ORDER BY QtyOnHand)\nOVER (\nPARTITION BY AsOfYear\n) AS [%Continuous\
  \ .5]\n,PERCENTILE_CONT(.75) WITHIN GROUP (ORDER BY QtyOnHand)\nOVER (\nPARTITION\
  \ BY AsOfYear\n) AS [%Continuous .75]\nFROM Product.WHERE AsOfYear = 2002\nAND ProdId\
  \ = 'P101'\nAND Locid = 'LOC1'\nAND InvId = 'INV1'\nAND WhId = 'WH112'\nGO\n清单 13-7\n\
  库存数量的百分位连续函数分析\n```\n\n这次没有使用 `CTE`。回想一下，`QtyOnHand` 是月末当天所有库存入库量减去所有库存出库量的总和。请注意这个函数的格式略有不同。在定义\
  \ `OVER()` 子句之前，我们需要包含一个 `WITHIN GROUP` 子句。同时注意 `OVER()` 子句中没有 `ORDER BY` 子句，因为它已在\
  \ `WITHIN GROUP` 子句中指定了。子句真多！\n\n最后，请注意我们需要将百分位数值作为窗口函数的参数传入。\n\n让我们看看结果。请参考图 13-29\
