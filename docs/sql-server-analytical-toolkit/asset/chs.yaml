  \n以下是第 2 章中对此函数的定义。同样，如果你对其工作方式感到熟悉，请跳过它，直接转到示例查询的业务规范。\n\n如果你阅读了第 1 章，然后因为对库存管理或其他相关学科感兴趣而直接跳到这里，请阅读此部分。\n\
  \n`VAR()` 函数用于生成数据样本中一组值的方差。关于数据集使用的相同讨论适用于 `VAR()` 函数相对于数据总体的情况。\n\n当整个数据集未知或不可用时，`VAR()`\
  \ 函数在数据的部分集合上工作。\n\n因此，如果你的数据集由十行组成，这些不以字母 `P` 结尾的函数将查看 N - 1 或 10 - 1 = 9 行。\n\n\
  好了，现在我们已经解释清楚了，方差到底是什么意思呢？\n\n对于我们开发人员和非统计学家来说，这里有一个简单的解释：\n\n> `非正式地说，如果你取每个值与均值（平均值）的所有差值，对结果进行平方，然后将所有结果相加，最后除以数据样本的数量，你就得到了方差。`\n\
  \n提示\n\n如果你取方差的平方根，你得到的是标准差，所以它们之间存在某种关系！\n\n它回答了以下问题：\n\n*   我们是否错过了目标？\n*   我们是否达到了目标？\n\
  *   我们是否超过了目标？\n\n以下是下一个查询的业务需求：\n\n业务分析师希望采用我们之前为标准差开发的查询，并对其进行调整，以便我们可以计算方差、标准差和平均值。此外，他们希望看到以两种方式计算的标准差，第一种是使用\
  \ `STDEV()` 函数，第二种方法是通过取方差的平方根来用作验证。\n\n以下是我们在清单 11-9 中编写的代码。\n\n```sql\nWITH YearlyWarehouseReport\
  \ (\nAsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId\n,WhId,ProdId,AvgQtyOnHand\n\
  )\nAS\n(\nSELECT AsOfYear\n,DATEPART(qq,AsOfDate) AS AsOfQuarter\n,AsOfMonth\n,AsOfDate\n\
  ,LocId\n,InvId\n,WhId\n,ProdId\n,AVG(QtyOnHand) AS AvgQtyOnHand\nFROM Product.Warehouse\n\
  GROUP BY AsOfYear\n,DATEPART(qq,AsOfDate)\n,AsOfMonth\n,AsOfDate\n,LocId\n,InvId\n\
  ,WhId\n,ProdId\n)\nSELECT AsOfYear\n,AsOfQuarter\n,AsOfMonth\n,AsOfDate\n,LocId\n\
  ,InvId\n,WhId\n,ProdId\n,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n,AVG(AvgQtyOnHand)\
  \ OVER (\nPARTITION BY AsOfYear,WhId\nORDER BY AsOfYear\n) AS YearlyAvg\n,VAR(AvgQtyOnHand)\
  \ OVER (\nPARTITION BY AsOfYear,WhId\nORDER BY AsOfYear\n) AS YearlyVar\n,STDEV(AvgQtyOnHand)\
  \ OVER (\nPARTITION BY AsOfYear,WhId\nORDER BY AsOfYear\n) AS YearlySTDEV\n/* just\
  \ to prove that the square root of the variance */\n/* is the standard deviation\
  \ */\n,SQRT(\nVAR(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear,WhId\nORDER BY AsOfYear\n\
  )\n) AS MyYearlyStdev\nFROM YearlyWarehouseReport\nWHERE AsOfYear = 2003\nAND LocId\
  \ = 'LOC1'\nAND InvId = 'INV1'\nAND ProdId ='P033'\nGO\n```\n清单 11-9\n平均值、方差和标准差报告\n\
  \n我们又回到了通常基于 `CTE` 的查询。对于所有三个函数，我们设置了一个 `OVER()` 子句，其中包含 `PARTITION BY` 和 `ORDER\
  \ BY` 子句。分区按年份和仓库 ID 设置；`ORDER BY` 子句按年份设置。\n\n我们再次从一个小数据集开始，并使用 `WHERE` 子句，因此我们只获得年份\
  \ “2003”、位置 “LOC1”、库存 “INV1” 和产品 “P033” 的结果（一旦数据得到验证，可以移除这些条件）。\n\n然后，该查询可用于包含筛选器的\
  \ Reporting Services (`SSRS`) 报表，以便分析师可以以他们想要的任何方式对报表进行切片和切块。\n\n请参考图 11-31 中的部分结果。\n\
