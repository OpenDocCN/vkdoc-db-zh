  \n## 剩下需要查看的只有 `TIME` 和 `IO` 统计信息\n\n这将告诉我们报表表是否再次拯救了我们。\n\n请参考图 10-28。\n\n![](img/527021_1_En_10_Fig39_HTML.png)\n\
