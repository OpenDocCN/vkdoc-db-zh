  索引查找节点的 profile 统计数据\n\n这个索引查找是由 `WHERE` 子句谓词引起的。如果您查看节点中的列，它们与 `WHERE` 子句谓词中的列相匹配。这被称为覆盖索引，正如我们之前所说，索引查找通常比索引扫描更受青睐。\n\
