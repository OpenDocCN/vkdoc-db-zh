  美国铝业股票代码分析


  我们想建立一个按年、季、月、周和股票代码的分区。对于最低成交价，我们按 `Low` 列对分区进行排序；对于最高成交价，我们按 `High` 列对分区进行排序。


  一个窗口框架由以下定义：


  ```sql

  ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

  ```


  这个逻辑不仅能让我们看到每日的低点和高点，还能看到每周的最小值和最大值。


