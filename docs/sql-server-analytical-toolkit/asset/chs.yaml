  \ SQL 任务编辑器”。\n\n#### 图 11-34\n\n## 用于创建聚集索引的执行 SQL 任务\n\n这与我们正在讨论的包中所有执行 SQL 任务的模式相同。此处我们正在`InventoryHistory`表上创建聚集索引。再次注意，表名是完全限定的。如果您使用的查询涉及不同数据库中的对象，这一点很重要。在执行\
