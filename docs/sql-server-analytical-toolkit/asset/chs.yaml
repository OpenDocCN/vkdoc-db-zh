  \ Server 执行时间 | 现有索引 |\n| CPU 时间 (ms) | 62 |\n| 已用时间 (ms) | 58 |\n\n工作文件和工作表的统计信息都很好。逻辑读取看起来很高，但考虑到逻辑读取通常是针对内存缓存，所以这个值很可能无需担心。有一次物理读取，这意味着\
