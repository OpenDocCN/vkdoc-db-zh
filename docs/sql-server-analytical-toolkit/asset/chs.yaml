  \ 9 个组件。它们是窗口假脱机、段、段、排序、嵌套循环、表扫描、哈希匹配、计算标量和索引查找。排序、表扫描、哈希匹配和索引查找的成本分别为 10%、4%、52%\
  \ 和 33%。\n图 `2-24` 创建索引后的查询计划\n\n我们看到一大堆步骤，但至少现在 `SalesTransaction` 表上有一个索引查找操作。此任务占用了总执行时间的\
  \ 33%。有一个成本为 1% 的小型计算标量任务，以及一个成本为 52% 的哈希匹配。最后，有一个成本为 10%（占总执行时间）的排序任务。\n\n还有一个成本为\
  \ 0% 的窗口假脱机任务，这很重要。此任务与 `OVER()` 子句以及 `ROWS` 和 `RANGE` 子句相关，因为它将所需的行加载到内存中，以便可以根据需要随时检索。如果我们没有足够的内存，那么这些行就需要存储在临时存储中，这可能会大大降低速度。这是一个你应该始终留意并查看其成本的任务！\n\
  \n和往常一样，为了简单起见，我忽略了成本为 0% 的任务（窗口假脱机除外），但你自己应该去查阅 Microsoft 文档，了解它们的作用。\n\n这很重要。记住窗口假脱机的作用：\n\
  > 此任务与 `OVER()` 子句以及 `ROWS` 和 `RANGE` 子句相关，因为它将所需的行加载到内存中，以便可以根据需要随时检索。如果我们没有足够的内存，那么这些行就需要存储在临时存储中，这可能会大大降低速度。这是一个你应该始终留意并查看其成本的任务！\n\
  \n看起来索引查找消除了第一个昂贵的表扫描，但也引入了几个新的步骤。\n\n让我们比较一下创建索引前后的 `IO` 统计信息，看看有什么改进。\n\n请参考表\
  \ `2-6`。\n\n表 `2-6` IO 统计信息对比，创建索引前后\n\n\n\n### SQL Server 解析与编译时间\n\n| SQL Server\
  \ 解析与编译时间 | 无索引 | 有索引 |\n| --- | --- | --- |\n| CPU 时间 (ms) | **31** | **0** |\n\
  | 已用时间 (ms) | **290** | **49** |\n| **统计信息 (工作表)** | **无索引** | **有索引** |\n| 扫描计数\
  \ | **39** | **39** |\n| 逻辑读取 | **217** | **217** |\n| 物理读取 | 0 | 0 |\n| 预读读取 |\
  \ 0 | 0 |\n| **统计信息 (工作文件)** | **无索引** | **有索引** |\n| 扫描计数 | 0 | 0 |\n| 逻辑读取 | 0\
  \ | 0 |\n| 物理读取 | 0 | 0 |\n| 预读读取 | 0 | 0 |\n| **统计信息 (SalesTransaction)** | **无索引**\
  \ | **有索引** |\n| 扫描计数 | **5** | **1** |\n| 逻辑读取 | **17244** | **42** |\n| 物理读取 |\
  \ 0 | 1 |\n| 预读读取 | 17230 | 10 |\n| **统计信息 (Customer)** | **无索引** | **有索引** |\n\
  | 扫描计数 | **1** | **1** |\n| 逻辑读取 | **648** | **18** |\n| 物理读取 | 1 | 1 |\n| 预读读取\
  \ | 0 | 0 |\n| **SQL Server 执行时间** | **无索引** | **有索引** |\n| CPU 时间 (ms) | 156 |\
  \ 0 |\n| 已用时间 (ms) | 1210 | 105 |\n\n通过查看 `统计信息`，似乎有了显著的改善。我们关心的是改善的程度有多大。新的 `WINDOW`\
  \ 特性是否导致执行成本更高、更快，还是保持不变？\n\n`工作表` 和 `工作文件` 的 `统计信息` 保持不变，而 `SalesTransaction` 表的\
  \ `统计信息` 则有了显著改善。我们的 `逻辑读取` 从 `17,244` 次下降到 `42` 次，`预读读取` 从 `17,230` 次下降到 `10` 次。这非常好！\n\
  \n`Customer` 表的 `逻辑读取` 从 `648` 次下降到 `18` 次，我们的 `CPU` 时间从 `156` ms 下降到 `0` ms。最后，`已用执行时间`\
  \ 从 `1210` ms 下降到 `105` ms。\n\n总而言之，好消息是新的 `WINDOW` 特性并不会降低性能。查询计划的改善程度与先前的 `OVER()`\
  \ 子句语法类似。\n\n看起来好处在于，我们可以将 `OVER()` 子句的逻辑集中在一个地方定义，并从多个列调用，如果窗口框架规范相同，这就消除了重复输入。\n\
  \n还不止如此。你可以定义多个 `窗口`，甚至可以让一个 `窗口` 引用另一个 `窗口` 定义，如代码清单 2-13 中的部分代码所示。\n\n```sql\n\
  SELECT\ncpa.PurchaseYear,\ncpa.PurchaseMonth,\nc.CustomerNo,\nc.CustomerFullName,\n\
  cpa.TotalSalesAmount,\nAVG(cpa.TotalSalesAmount) OVER AvgSalesWindow AS AvgTotalSales,\n\
  STDEV(cpa.TotalSalesAmount) OVER StdevSalesWindow AS StdevTotalSales,\nSUM(cpa.TotalSalesAmount)\
  \ OVER SumSalesWindow AS SumTotalSales\nFROM CustomerPurchaseAnalysis cpa\nJOIN\
  \ DimTable.Customer c\nON cpa.CustomerNo = c.CustomerNo\nWHERE cpa.CustomerNo =\
  \ 'C00000008'\nWINDOW\nStdevSalesWindow AS (AvgSalesWindow),\nAvgSalesWindow AS\
  \ (\nPARTITION BY cpa.PurchaseYear\nORDER BY cpa.PurchaseYear ASC,cpa.PurchaseMonth\
  \ ASC\n),\nSumSalesWindow AS (\n);\nGO\n```\n\n清单 2-13 定义多个窗口\n\n一个有趣的特性。让我们来结束本章。你可以随时回头复习那些你可能还模糊不清的部分。\n\
  \n### 总结\n\n我们达成目标了吗？\n\n我们介绍了 `APSales` 数据仓库，并研究了这个数据库的概念模型。\n\n我们还通过引入一些简单的 `数据字典`，熟悉了表、列以及表之间的关系。\n\
  \n我们通过创建使用 `OVER()` 子句为查询生成的 `数据集` 定义 `窗口框架` 的例子，涵盖了 `聚合函数类别` 中的 `窗口函数`。\n\n一个重要的目标是，我们需要理解与使用\
  \ `窗口函数` 和 `OVER()` 子句的查询相关的 `性能分析` 和 `调优`。这通过生成和研究 `查询计划` 与 `IO 统计信息` 得以实现。这些信息被用于得出如何提升性能的结论。\n\
  \n我们还确定了 `窗口假脱机统计信息` 是一个需要监控的重要数值。请确保你理解它的含义。\n\n最后但同样重要的是，我们初步了解了 `SQL Server 2022`\
  \ 中新的 `WINDOW` 特性，它在代码可读性和实现方面展现出很大的潜力。我们的快速分析表明，它并没有降低性能，但也没有比旧语法提升性能，不过还需要使用更大数据集进行进一步测试。\n\
  \n顺便说一句，如果你还没有下载本章的示例脚本，现在正是好时机，可以练习一下刚刚学到的知识。\n\n在下一章中，我们将介绍 `分析函数`，这是一套在数据分析和报表中非常强大的工具。我们还将开始在讨论的查询中添加\
  \ `ROWS` 和 `RANGE` 子句，这些子句会覆盖我们不指定 `窗口框架` 时的默认行为。\n\n"
- "# 3. 销售用例：分析函数\n\n既然我们已经创建并熟悉了销售数据仓库，并创建了使用聚合 `窗口函数` 的查询，我们可以进入下一步，学习并创建使用 `SQL\
  \ Server` 提供的 `分析函数` 的查询。\n\n在上一章中，我们涉及了查询的 `性能调优`。在本章中，我们将采用相同的方法，但会关注其他 `性能工具`，例如\
  \ `客户端统计信息`，以更全面地了解查询运行情况。\n\n我们将大量使用 `执行统计信息`，也就是说，我们比较创建推荐 `索引` 之前和之后的 `统计信息`，看看它们是否提升了性能。\n\
  \n最后，我们将研究建立 `预加载报表表` 和 `内存优化表`，看看它们是否能带来更高的查询性能。\n\n我们正在研究的函数是计算密集型的，因此我们希望确保编写出高效、准确且执行快速的查询和脚本。`查询调优`、`索引创建`\
  \ 和 `性能分析` 都是向你的业务分析师交付有用且可操作数据的过程的一部分。\n\n## 分析函数\n\n以下是按名称排序的此类别中的八个函数。它们可以与查询中的\
  \ `OVER()` 子句一起使用，为我们的业务分析师生成有价值的报表：\n\n*   `CUME_DIST()`\n*   `FIRST_VALUE()`\n\
  *   `LAST_VALUE()`\n*   `LAG()`\n*   `LEAD()`\n*   `PERCENT_RANK()`\n*   `PERCENTILE_CONT()`\n\
  *   `PERCENTILE_DISC()`\n\n我们将采用与前一章相同的方法。我会描述函数的功能，并展示代码和结果。接着，进行一些 `性能分析`，以便我们了解需要进行哪些改进（如果有的话）。\n\
  \n正如我们在第 2 章的例子中所看到的，改进措施可以包括添加 `索引`，甚至创建一个 `反规范化报表表`，这样当执行使用 `分析窗口函数` 的查询时，它直接针对\
  \ `预加载的数据` 操作，避免了连接、计算和复杂逻辑。\n\n\n\n## CUME_DIST() 函数\n\n此函数用于计算某个值在数据集（如表、分区或加载了测试数据的表变量）中的相对位置。\n\
  \n### 它是如何工作的？\n\n首先，计算有多少个值排在它之前或与之相等（将此值称为 C1）。接着，计算数据集中的值或行数（称为 C2）。然后，用 C1 除以\
  \ C2，从而得出累积分布结果。返回的值是浮点数据类型，因此你需要使用 `FORMAT()` 函数将其转换为百分比。\n\n顺便一提，这个函数与 `PERCENT_RANK()`\
  \ 函数类似，后者的工作原理如下：给定数据集中的一组值，此函数计算每个单独值相对于整个数据集的排名。该函数也返回一个百分比。\n\n回到 `CUME_DIST()`\
  \ 函数。我们将看两个例子，一个简单的，另一个则会查询我们的销售数据仓库。\n\n### 一个简单示例\n\n让我们先看一个简单的例子，以便了解前面的描述在一个小数据集上如何运作。请参考清单\
  \ 3-1a。\n\n```sql\nUSE TEST\nGO\nDECLARE @CumDistDemo TABLE (\nCol1 VARCHAR(8),\n\
  ColValue INTEGER\n);\nINSERT INTO @CumDistDemo VALUES\n('AAA',1),\n('BBB',2),\n\
  ('CCC',3),\n('DDD',4),\n('EEE',5),\n('FFF',6),\n('GGG',7),\n('HHH',8),\n('III',9),\n\
  ('JJJ',10)\nSELECT Col1,ColValue,\nCUME_DIST() OVER(\nORDER BY ColValue\n) AS CumeDistValue,\n\
  A.RowCountLE,\nB.TotalRows,\nCONVERT(DECIMAL(10,2),A.RowCountLE)\n/ CONVERT(DECIMAL(10,2),B.TotalRows)\
  \ AS MyCumeDist\nFROM @CumDistDemo CDD\nCROSS APPLY (\nSELECT COUNT(*) AS RowCountLE\
  \ FROM @CumDistDemo\nWHERE ColValue <= CDD.ColValue\n) A\nCROSS APPLY (\nSELECT\
  \ COUNT(*) AS TotalRows FROM @CumDistDemo\n) B\nGO\n```\n\n清单 3-1a: 一个简单示例\n\n声明了一个名为\
  \ `@CumDistDemo` 的简单表变量，并加载了十行数据。只创建了两列。第一列名为 `Col1`，充当键列，而 `ColValue` 列保存数据。在我们的例子中，这些数据是数字\
  \ 1-10。非常简单。\n\n该查询使用了 `CUME_DIST()` 函数和一个 `OVER()` 子句。没有包含 `PARTITION BY` 子句，但使用了\
  \ `ORDER BY` 子句来按 `ColValue` 列升序对分区行进行排序。\n\n我们需要包含计算累积分布的公式，以便了解其工作原理并与 SQL Server\
  \ 的版本进行比较。公式如下：\n\n行数（其值小于或等于当前列值）除以总行数。\n\n为了获得该公式的值，使用了两个 `CROSS APPLY` 运算符。第一个计算值小于或等于当前列值的行数，第二个计算数据集中的总行数。\n\
  \n这个查询可能可以优化，但就我们的目的而言，它应该能说明 `CUME_DIST()` 函数是如何工作的。\n\n`CROSS APPLY` 块中查询返回的值被用在\
  \ `SELECT` 子句的公式中：\n\n```sql\nCONVERT(DECIMAL(10,2),A.RowCountLE)\n/ CONVERT(DECIMAL(10,2),B.TotalRows)\
  \ AS MyCumeDist\n```\n\n让我们执行查询，看看结果。请参考图 3-1。\n\n![](img/527021_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1: 计算累积分布的两种方式\n\n我认为，看起来不错且符合预期！`MyCumeDist` 列包含我们创建的公式计算出的值，而名为 `CumeDistValue`\
  \ 的列包含 SQL Server 函数计算出的值。可能需要一点格式化使它们看起来一致，但数值是匹配的。\n\n### 查询销售数据\n\n现在我们理解了这个函数的工作原理，让我们创建一个针对我们销售数据的查询。我们将使用前一章中用过的策略。即，我们将使用一个\
  \ `CTE`（公用表表达式）来准备数据，然后在我们访问该 `CTE` 的查询中使用正在学习的函数。\n\n请参考清单 3-1b。\n\n```sql\nWITH\
  \ CustSales (\nSalesYear,SalesQuarter,SalesMonth,CustomerNo,StoreNo,CalendarDate,SalesTotal\n\
  )\nAS\n(\nSELECT YEAR(CalendarDate)        AS SalesYear\n,DATEPART(qq,CalendarDate)\
  \ AS SalesQuarter\n,MONTH(CalendarDate)       AS SalesMonth\n,ST.CustomerNo,\nST.StoreNo,\n\
  ST.CalendarDate,\nSUM(ST.UnitRetailPrice * ST.TransactionQuantity) AS SalesTotal\n\
  FROM StagingTable.SalesTransaction ST\nGROUP BY ST.CustomerNo\n,ST.StoreNo\n,ST.CalendarDate\n\
  ,ST.UnitRetailPrice\n,ST.TransactionQuantity\n)\nSELECT SalesYear\n,SalesQuarter\n\
  ,SalesMonth\n,CustomerNo\n,SUM(SalesTotal) AS MonthlySalesTotal\n,CUME_DIST() OVER\
  \ (\nPARTITION BY SalesYear\nORDER BY SUM(SalesTotal)\n) AS CumeDist\nFROM CustSales\n\
  WHERE SalesYear IN(2010,2011)\nAND CustomerNo = 'C00000001'\nGROUP BY SalesYear\n\
  ,SalesQuarter\n,SalesMonth\n,CustomerNo\nGO\n```\n\n清单 3-1b: 实战中的 `CUME_DIST()`\
  \ 函数\n\n我们设置了惯用的 `CTE`，以便从 `SalesTransaction` 表中提取事务数据，这样我们可以提取出具体的日期对象：年、季度和月。销售总额也通过将\
  \ `UnitRetailPrice` 乘以 `TransactionQuantity` 列的结果相加来计算。（我必须承认这不够高效。我本可以使用 `TotalSalesAmount`\
  \ 列来避免这个公式。算了。）\n\n`CUME_DIST()` 函数使用了一个包含 `PARTITION BY` 子句和 `ORDER BY` 子句的 `OVER()`\
  \ 子句。在 `SalesYear` 列上设置了一个分区，并且分区的行集按 `SalesTotal` 列排序。\n\n结果需要再次汇总，因为我们排除了商店编号，并且只想按年、季度、月和客户查看总计。包含了一个\
  \ `WHERE` 子句来过滤结果，只显示一个客户和两个年份的数据。我这样做是为了保持结果集较小，但你可以移除它们以查看结果。\n\n请参考图 3-2 中的结果。\n\
  \n![](img/527021_1_En_3_Fig2_HTML.jpg)\n\n图 3-2: 测试脚本的查询结果\n\n结果按 `OVER()` 子句中的\
  \ `SalesTotal` 列排序，以便查看销售总额和累积分布结果的升序值，这样你就能看到公式是如何应用的。按销售额升序排序能很好地对齐数据。\n\n尝试按销售年份、季度和月对结果进行排序，这是业务分析师通常希望看到的方式。\n\
  \n\n#### 性能考量\n\n让我们以通常的方式生成一个估计的查询执行计划。结果很长，因此我们只查看显示的右半部分，因为这里展示了任务最有趣的统计数据。计划中的其他任务或步骤成本大多为\
  \ 0%，为了节省空间，我们忽略它们。\n\n请参考图 3-3。\n\n![](img/527021_1_En_3_Fig3_HTML.png)\n\n图 3-3：脚本的估计查询计划\n\
  \n哎呀！看看这三个排序步骤。至少有一个索引查找，并且估计性能工具没有建议其他索引。\n\n索引查找任务占总执行计划成本的 25%，其旁边的排序步骤成本为 28%。可以看到第二个排序步骤占\
  \ 25%，因此这个查询似乎进行了大量排序。第三个排序步骤的成本是 17%！\n\n这表明我们可以通过将 `CTE` 生成的初始数据暂存到某种报表或临时表中，并构建索引来辅助主查询的执行，从而提高性能。一个很大的好处是，你每天加载一次这个表，并且假设用户满足于\
  \ 24 小时的数据刷新，那么当用户执行带有窗口函数的主查询时，加载过程的处理开销就不会包含在内。\n\n顺便说一句，如果你将鼠标悬停在每个排序步骤上，你会看到以下列被排序：\n\
  \n*   第一个排序步骤：店铺和日历日期\n*   第二个排序步骤：按客户排序\n*   第三个排序步骤：再次按客户排序\n\n现在我们在反推查询计划估计器了。请自行尝试，根据前面的信息创建一两个索引来支持所需的排序。看看排序步骤是否被消除或至少减少。请记住，你在表上创建的索引越多，加载或编辑表行时的性能就会越慢。\n\
  \n我在清单中包含了一个基于 `CTE` 逻辑的脚本，它将数据暂存到一个表中。还创建了一个索引来支持排序（该索引由估计查询计划工具建议）。结果是索引查找的成本略低，但排序仍然存在且略高。\n\
  \n改进体现在查询统计信息中。在第一个查询中，访问销售事务表时，逻辑读取数为 23，但使用临时表后减少到 10。第一个查询中的物理读取数为 1，而访问临时表的查询中则为\
  \ 0。\n\n这个策略似乎有效。再次强调，在看我的例子之前，请自己尝试一下。\n\n请参考表 3-1 查看一些统计数据。\n\n**表 3-1：执行统计 –\
  \ 无临时表 vs 有临时表**\n\n| SQL Server 解析和编译时间 | 无临时表 | 有临时表 |\n| :--- | :--- | :--- |\n\
  | CPU 时间 (毫秒) | 0 | 0 |\n| 已用时间 (毫秒) | **77** | **6** |\n| **统计信息 (工作表)** | **现有索引**\
  \ | **新索引** |\n| 扫描计数 | 26 | 26 |\n| 逻辑读取 | **198** | **196** |\n| 物理读取 | 0 | |\n\
  | 预读 | 0 | |\n| **统计信息 (SalesTransaction)** | **现有索引** | **新索引** |\n| 扫描计数 | **1**\
  \ | **2** |\n| 逻辑读取 | **23** | **10** |\n| 物理读取 | **0** | **1** |\n| 预读 | **0**\
  \ | **3** |\n| **SQL Server 执行时间** | **现有索引** | **新索引** |\n| CPU 时间 (毫秒) | 0 | 0\
  \ |\n| 已用时间 (毫秒) | 35 | 2 |\n\n我重新运行了原始查询和访问临时表的查询。原始查询（包含 `CUME_DIST()` 函数）除了现在访问临时表而不是\
  \ `CTE` 外，没有做任何更改。另外，还创建了一些新索引。\n\n原始查询中的 `CTE` 被修改为只加载一次临时表。假设在真实的生产环境中，它会在非高峰时段每晚运行。\n\
  \n如你所见，第一组的已用时间从 77 毫秒减少到 6 毫秒。这是个好的开始。扫描计数保持不变，工作表的逻辑读取数略有下降（198 vs 196）。\n\n查看\
  \ `SalesTransaction` 表的统计信息，扫描计数从 1 增加到 2，而逻辑读取数下降到 10。这也很好！\n\n现在我们来看物理读取和预读；它们分别从\
  \ 0 增加到 1 和 3。这就不太好了。最后，两种情况下的 CPU 时间都是零，但已用时间从 35 毫秒下降到 2 毫秒，所以这里有重大改进。\n\n最后几点说明：当你进行此分析时，由于硬件配置不同，你会得到不同的结果。你需要多次运行这些测试，以全面了解哪些有效、哪些无效。别忘了运行\
  \ `DBCC`，以便总是从干净的缓冲区开始。如果在每次运行测试前不执行此命令，会给你误导性的结果！\n\n> **注意**\n> 顺便说一下，`DBCC` 代表数据库一致性检查。这是一个非常强大且有用的工具。我建议你查阅\
  \ Microsoft SQL Server 关于它的文档。\n\n让我们查看第一个查询和使用临时表的查询的客户端统计信息。客户端统计信息按钮可以在带有绿色复选框的按钮右侧的菜单栏中找到。单击它可以打开或关闭它。\n\
  \n请参考图 3-4。\n\n![](img/527021_1_En_3_Fig4_HTML.jpg)\n\n图 3-4：查询的客户端统计信息\n\n这很有趣。顶部的报告是第一个查询的。我只显示了客户端处理时间、总执行时间和等待服务器回复的时间。它们分别是\
  \ 25、126 和 101。\n\n第二个客户端统计信息报告显示客户端处理时间为 11（很好），但看看总执行时间为 5028，等待服务器回复的时间为 5017。这些指标显著上升了。\n\
  \n因此，从我们的讨论中可以得出几点要点。第一，你拥有一套由一些有价值的工具生成的统计信息和计划，在执行查询设计和调优时应该使用它们。\n\n第二，你需要多次运行测试以获得结果的“平均”视图。创建索引似乎是个好主意，但大多数时候，它们给出的结果与查询估计执行计划工具建议的索引相同或更差。如果你忘记运行\
  \ `DBCC` 命令来清除缓冲区，你会得到误导性的结果，让你误以为性能在提升。\n\n最后，在处理少于 20 万行的小数据集时进行测试不会显示出太大差异。你需要看看当处理数百万行或更多时，一切是如何运作的！（查看销售数据仓库的加载脚本，看看是否可以通过修改我的加载脚本，在正在使用的事实表中加载\
  \ 500 万到 1000 万行。请确保你做了备份。）\n\n我们工具箱中的下一个函数是 `PERCENT_RANK()` 函数。\n\n### PERCENT_RANK()\
  \ 函数\n\n接下来要介绍的是 `PERCENT_RANK()` 函数。它的作用是什么？\n\n这个函数使用来自查询、分区或表变量的数据集，计算每个值相对于整个数据集（以百分比形式）的相对排名。你需要将结果（返回值为浮点数）乘以\
  \ 100.00，或者使用 `FORMAT()` 函数将结果转换为百分比格式。\n\n此外，它的行为与 `CUME_DIST()` 函数非常相似；至少微软文档是这么说的。我们在本章开头讨论过这个函数，如果你忘记了，可以回头再看一下它的作用。\n\
  \n你还会发现它在理论上也与 `RANK()` 函数非常相似。`RANK()` 函数返回值的位置，而 `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚才讨论的\
  \ `CUME_DIST()` 函数一起使用，以便比较结果，并看看它对即将生成的查询计划有什么影响。\n\n但首先，让我们像之前那样，再看一个简单的例子，以便清晰地看到简单数据集生成的结果。\n\
  \n我还会根据以下公式提供一个自定义的百分比排名计算版本：\n`(当前行值 - 1) / (数据集总行数 - 1)`\n\n很简单！我们将使用与 `CUME_DIST()`\
  \ 函数相同的表变量数据。\n\n对于我们自定义的代码，我们需要模拟 `RANK()` 函数，该函数将在下一章介绍。为了将我们的自定义代码结果与 SQL Server\
  \ 函数结果进行比较，我也在 `SELECT` 子句中包含了 `RANK()` 函数。\n\n请参考清单 3-2。\n\n```sql\nDECLARE @CumeDistDemo\
  \ TABLE (\nCol1     VARCHAR(8),\nColValue DECIMAL(10,2)\n);\nINSERT INTO @CumeDistDemo\
  \ VALUES\n('AAA',1.0),\n('BBB',2.0),\n('CCC',3.0),\n('DDD',4.0),\n('EEE',5.0),\n\
  ('FFF',6.0),\n('GGG',7.0),\n('HHH',8.0),\n('III',9.0),\n('JJJ',10.0)\nSELECT Col1,ColValue,A.RowCountLTE\
  \ AS MyRank,\nRANK() OVER(\nORDER BY ColValue\n) AS SQLRank,\nPERCENT_RANK() OVER(\n\
  ORDER BY ColValue\n) AS PCTRank,\n/* current value rank - 1 /data sample total row\
  \ count - 1 */\n(RANK() OVER(\nORDER BY ColValue\n) - 1.0) / CONVERT(DECIMAL(10,2),(\n\
  SELECT COUNT(*) AS SampleRowCount\nFROM @CumeDistDemo) - 1.0\n) AS MyPctRank\nFROM\
  \ @CumeDistDemo CDD\nCROSS APPLY (\nSELECT COUNT(*) AS RowCountLTE FROM @CumeDistDemo\n\
  WHERE ColValue <= CDD.ColValue\n) A\nGO\n```\n清单 3-2 一个简单的百分比排名示例\n\n注意，我重新利用了 `@CumeDistDemo`\
  \ 表变量（懒得重命名！）。\n\n和之前一样，数据值从 1.0 到 10.0 依次递增。这使得将值与排名结果关联起来变得容易。`FROM` 子句中使用了一个\
  \ `CROSS APPLY` 块，以便计算数据集中小于或等于当前行的总行数：\n```sql\nCROSS APPLY (\nSELECT COUNT(*)\
  \ AS RowCountLTE\nFROM @CumeDistDemo WHERE ColValue <= CDD.ColValue\n) A\n```\n\n\
  应用简单公式，以下代码计算出百分比排名：\n```sql\n(RANK() OVER(\nORDER BY ColValue\n) - 1.0) / CONVERT(DECIMAL(10,2),(SELECT\
  \ COUNT(*) AS SampleRowCount FROM @CumeDistDemo) - 1.0) AS MyPctRank\n```\n\n注意，我们正在使用\
  \ `RANK()` 函数来计算排名分配（我们将在下一章讨论它）。如果我们对被排名的数据（即 `ColValue` 列）进行升序排序，作为一个技巧，我们也可以使用\
  \ `ROW_NUMBER()` 函数，如下所示（我们也将在下一章讨论这个）：\n```sql\nROW_NUMBER() OVER(\nORDER BY ColValue\n\
  ) AS RowNumberAsRank,\n```\n\n最后一种替代方法是直接使用列 `RowCountLTE` 作为排名：\n```sql\n/* current\
  \ value rank - 1 /sample total row count - 1 */\nFORMAT(\n(RowCountLTE - 1.0) /\n\
  CONVERT(DECIMAL(10,2),(\nSELECT COUNT(*) AS SampleRowCount\nFROM @CumeDistDemo\n\
  ) - 1.0),'P'\n) AS MyPctRank\n```\n\n尝试修改代码，使用所有版本的百分比排名，以便验证结果是否相同以及公式是否有效。在查看附加脚本之前，请先自己尝试一下。\n\
  \n让我们看看结果。请参考图 3-5。\n\n![计算与 SQL Server 函数的 SQL 窗口对比截图。顶部屏幕有一些编程代码。底部屏幕有一个结果表。表中有\
  \ 6 列：Col 1、Col Value、My Rank、SQL Rank、PCT Rank 和 My Pct Rank。](img/527021_1_En_3_Fig5_HTML.jpg)\n\
  图 3-5 使用 SQL Server 函数和自定义脚本计算百分比排名\n\n以下是排序后的结果。两个百分比排名结果匹配，使用 SQL Server 函数和自定义函数计算的排名结果也匹配。如果你愿意，可以使用\
  \ `FORMAT()` 函数将结果转换为百分比，例如：\n```sql\nFORMAT(\nPERCENT_RANK() OVER(\nORDER BY ColValue\n\
  ),'P'\n) AS PCTRank,\n```\n\n只需用括号包裹 `PERCENT_RANK()` 代码块，使用 `FORMAT()` 函数，并在最后一个括号前包含\
  \ `'P'` 参数。非常容易使用。\n\n> **提示**\n> 在我看来，基于公式创建自己的函数版本是理解函数作用的好方法。\n\n让我们在我们的销售数据仓库上试试这个函数。\n\
  \n请参考清单 3-3。\n\n```sql\nWITH CustSales (\nSalesYear,SalesQuarter,SalesMonth,CustomerNo,\n\
  StoreNo,CalendarDate,SalesTotal\n)\nAS\n(\nSELECT YEAR(CalendarDate)        AS SalesYear\n\
  ,DATEPART(qq,CalendarDate) AS SalesQuarter\n,MONTH(CalendarDate)       AS SalesMonth\n\
  ,ST.CustomerNo\n,ST.StoreNo\n,ST.CalendarDate\n,SUM(ST.TotalSalesAmount) AS SalesTotal\n\
  FROM StagingTable.SalesTransaction ST\nGROUP BY ST.CustomerNo\n,ST.StoreNo\n,ST.CalendarDate\n\
  )\nSELECT SalesYear\n,SalesQuarter\n,SalesMonth\n,CustomerNo\n,SUM(SalesTotal) AS\
  \ MonthlySalesTotal\n,CUME_DIST() OVER (\nPARTITION BY SalesYear\nORDER BY SUM(SalesTotal)\n\
  ) AS CumeDist\n,PERCENT_RANK() OVER (\nPARTITION BY SalesYear\nORDER BY SUM(SalesTotal)\n\
  ) AS PctRank\nFROM CustSales\nWHERE SalesYear IN(2010,2011)\nAND CustomerNo = 'C00000001'\n\
  GROUP BY SalesYear\n,SalesQuarter\n,SalesMonth\n,CustomerNo\nGO\n```\n清单 3-3 实际应用中的\
  \ `PERCENT_RANK()` 函数\n\n我认为我们不需要再回顾 `CTE` 了，除了强调我们正在按商店汇总销售额。我们可以使用为之前示例创建的暂存表，但让我们再次使用\
  \ `CTE`。另外，我在 `SELECT` 子句中包含了 `CUME_DIST()` 函数，以便我们可以比较两个函数之间的结果。\n\n`OVER()` 子句使用了相同的\
  \ `ORDER BY` 和 `PARTITION BY` 子句。我们希望按年、季度、月和客户汇总值。我们没有使用商店编号列，因此需要跨年、季度、月和客户编号列应用\
  \ `SUM()` 函数。这意味着我们需要使用 `GROUP BY` 子句。\n\n我们再次使用 `WHERE` 子句来过滤 2010 年和 2011 年，并针对单个客户（“C0000001”），以保持结果集较小。一旦你熟悉了查询的工作原理，请随时下载脚本并修改\
  \ `WHERE` 子句，以便加载更多年份（确保你的笔记本电脑或台式机性能足够）。\n\n让我们看看结果。请参考图 3-6 中的部分结果。\n\n![第 03\
  \ 章 T S Q L 代码窗口的截图。顶部屏幕有一些编程代码。底部屏幕有一个结果表。表中有 7 列：Sales Year、Sales Quarter、Customer\
  \ Number、Monthly Sales Total、Cume Dist 和 Pct Rank。](img/527021_1_En_3_Fig6_HTML.png)\n\
  图 3-6 测试脚本的查询结果\n\n我对查询做了一些更改，消除了 `WHERE` 子句过滤器，并包含了一个 `ORDER BY` 子句。这个更改导致查询执行后返回了\
  \ 16,380 行数据。\n\n最后，在示例脚本中还有一个额外的查询，它使用了自定义的百分比排名逻辑，并通过我们讨论的公式与 SQL Server 函数进行了比较。\n\
  \n性能仍然保持在一秒以下。接下来，我们来看看估计查询计划和统计信息是什么样子的。\n\n#### 性能考量\n\n让我们运行一个估计查询计划并执行查询，以便生成\
  \ `IO` 和 `TIME` 统计信息。同样，系统没有建议新的索引，因此我们之前创建的索引似乎正在被使用。\n\n请参考图 3-7 的估计查询计划。\n\n\
  ![](img/527021_1_En_3_Fig7_HTML.png)\n\n这是第 03 章 T SQL 代码窗口的屏幕截图。上半部分显示了一些程序代码。下半部分显示了查询成本的消息。排序成本，15%。排序成本，47%。索引查找成本，17%。\n\
  \n图 3-7\n\n估计执行计划结果\n\n从右向左看，我们遇到一个成本为 17% 的索引查找操作和一个成本为 47% 的排序任务。唯一另一个成本较高的步骤是另一个成本为\
  \ 15% 的排序任务。其余任务的成本要么很低，要么为零，因此我们忽略它们。通常，在实际生产环境中，你至少需要了解它们，但主要关注成本较高的步骤，以确定是否可以消除它们或至少降低成本。\n\
  \n有时，基于维度列创建索引可能会有所帮助。检查排序步骤，看看是否需要基于排序步骤中引用的列创建索引。\n\n目前看来我们能做的似乎不多，那么让我们看看性能统计信息能告诉我们什么。\n\
  \n请参考表 3-2。\n\n表 3-2\n\n性能分析\n\n| SQL Server 解析和编译时间 | 现有索引 | 新索引 |\n| --- | ---\
  \ | --- |\n| CPU 时间 (毫秒) | 0 |   |\n| 已用时间 (毫秒) | 37 |   |\n| **统计信息 (工作表)** | **现有索引**\
  \ | **新索引** |\n| 扫描计数 | 26 |   |\n| 逻辑读取 | 196 |   |\n| 物理读取 | 0 |   |\n| 预读 | 0\
  \ |   |\n| **统计信息 (SalesTransaction)** | **现有索引** | **新索引** |\n| 扫描计数 | 1 |   |\n\
  | 逻辑读取 | 17 |   |\n| 物理读取 | 1 |   |\n| 预读 | 14 |   |\n| **SQL Server 执行时间** | **现有索引**\
  \ | **新索引** |\n| CPU 时间 (毫秒) | 0 |   |\n| 已用时间 (毫秒) | 30 |   |\n\n工作表的扫描计数步骤较高，为\
  \ 26。工作表和 `SalesTransaction` 表的逻辑读取统计信息似乎也偏高，分别为 196 和 17。最后，`SalesTransaction`\
  \ 表的预读为 14。看起来可能需要一些改进。接下来我们看看客户端统计信息。\n\n请参考图 3-8。\n\n![](img/527021_1_En_3_Fig8_HTML.jpg)\n\
  \n这是第 03 章 T SQL 代码窗口的屏幕截图。上半部分显示了一些程序代码。下半部分显示了一个结果表、消息和客户端统计信息。客户端处理时间、总执行时间和等待服务器回复时间这几列被高亮显示。\n\
  \n图 3-8\n\n客户端统计信息分析\n\n我们只看底部的时间统计信息。其他的也很重要，但这些告诉我们一些需要了解的性能数据。客户端处理时间为 11，总执行时间略高，为\
  \ 103，等待服务器回复时间为 92。\n\n有时仅仅创建索引是不够的。其他解决方案可能包括修改查询、利用临时表或报表表，甚至创建内存优化表。最后一种选择是，如果你有足够的内存，它会将所有表行加载到内存中。我们接下来将讨论这一点。\n\
  \n### 高性能策略\n\n在本节中，我们将创建一个内存优化表并用基础数据加载它（这替代了先前查询中的 `CTE` 查询）。此策略假设该表每天晚上加载一次，用户在第二天查询内存优化表。\n\
  \n此策略也替代了我们之前讨论的暂存表或报表表的策略，因为我们假设存在于内存中的表比存在于物理磁盘上的表能提供更快的性能。当然，如果内存用尽，SQL Server\
  \ 将不得不访问物理磁盘上的数据。这就是为什么创建内存优化表的步骤包括创建一个专用文件组和一个物理文件（或两个）。\n\n以下是创建内存优化表需要采取的步骤。\n\
  \n步骤 1：检查兼容级别。\n\n首先，确保你的计算机或笔记本电脑支持内存优化表，通过运行清单 3-4 中的简单查询来检查 SQL Server 的兼容级别。\n\
  \n```sql\nSELECT d.compatibility_level\nFROM sys.databases as d\nWHERE d.name =\
  \ Db_Name();\nGO\n```\n\n清单 3-4\n检查兼容级别\n\n你应处于 130 级或更高版本。如果是，我们需要设置一个系统参数。如果不是，仍然阅读本节，以便了解其内容！\n\
  \n步骤 2：将参数 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT` 设置为 `ON`。\n\n请参见清单 3-5。\n\n```sql\n\
  ALTER DATABASE [APSAles]\nSET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;\nGO\n```\n\
  \n清单 3-5\n设置内存优化提升到快照\n\n步骤 3：接下来，通过运行以下命令添加一个用于内存优化数据的专用文件组。\n\n请参见清单 3-6。\n\n\
  ```sql\nALTER DATABASE APSales\nADD FILEGROUP APSalesMemOptimized CONTAINS MEMORY_OPTIMIZED_DATA;\n\
  GO\n```\n\n清单 3-6\n为内存优化数据添加文件组\n\n注意，需要包含一个指令，指定该文件组将包含内存优化数据。\n\n步骤 4：为内存优化表创建专用文件。\n\
  \n接下来，我们以常规方式向该文件组添加一个文件。请参见清单 3-7。\n\n```sql\nALTER DATABASE APSales\nADD FILE\
  \ (\nname='APSalesMemoOptData',\nfilename=N'D:\\APRESS_DATABASES\\AP_SALES\\MEMORYOPT\\\
  AP_SALES_MEMOPT.mdf'\n)\nTO FILEGROUP APSAlesMemOptimized\nGO\n```\n\n清单 3-7\n向文件组添加文件\n\
  \n步骤 5：创建内存优化表。\n\n接下来，我们以常规方式创建一个表，但需要添加一些代码来定义它为内存优化表。请参见清单 3-8。\n\n```sql\nCREATE\
  \ TABLE [SalesReports].MemorySalesTotals   NOT NULL,\n[StoreNo]      nvarchar  \
  \ NULL,\n[CalendarDate] [date]           NOT NULL,\n[SalesTotal]   decimal NULL\n\
  )\nWITH (\nMEMORY_OPTIMIZED = ON,\nDURABILITY = SCHEMA_AND_DATA\n);\nGO\n```\n\n\
  清单 3-8\n创建内存优化表\n\n我们需要确保定义一个主键，并在 `CREATE TABLE` 命令末尾设置两个参数：\n\n```sql\nMEMORY_OPTIMIZED\
  \ = ON,\nDURABILITY = SCHEMA_AND_DATA\n```\n\n步骤 6：检查是否创建成功。\n\n接下来，我们需要查询两个系统表，以确保该表已注册为内存优化表。请参见清单\
  \ 3-9。\n\n```sql\nSELECT g.name, g.type_desc, f.physical_name\nFROM sys.filegroups\
  \ g JOIN sys.database_files f ON g.data_space_id = f.data_space_id\nWHERE g.type\
  \ = 'FX' AND f.type = 2\nGO\n```\n\n清单 3-9\n检查文件组和数据库文件表\n\n`sys.filegroups` 和 `sys.database_files`\
  \ 表有很多有趣的列，我建议你查看一下。为了节省篇幅，在我们的简短讨论中，我只列出基本的列。\n\n\n## 步骤 7：加载内存优化表\n\n现在是加载表的时候了。请参阅清单\
  \ 3-10。\n\n```sql\nINSERT INTO [SalesReports].[MemorySalesTotals]\nSELECT YEAR(CalendarDate)\
  \        AS SalesYear\n,DATEPART(qq,CalendarDate) AS SalesQuarter\n,MONTH(CalendarDate)\
  \       AS SalesMonth\n,ST.CustomerNo\n,ST.StoreNo\n,ST.CalendarDate\n,SUM(ST.UnitRetailPrice\
  \ * ST.TransactionQuantity) AS SalesTotal\nFROM StagingTable.SalesTransaction ST\n\
  GROUP BY ST.CustomerNo\n,ST.StoreNo\n,ST.CalendarDate\n,ST.UnitRetailPrice\n,ST.TransactionQuantity\n\
  GO\nListing 3-10\n加载内存优化表\n```\n\n请记住，这是我们之前讨论过的例子中用于 `CTE` 的查询。现在我们已经准备好进行性能分析了。\n\
  \n## 步骤 8：检查估计查询计划\n\n在运行查询之前，我们需要按照常规方式检查估计查询计划。看看是否建议了索引。如果是，则创建索引并重新运行查询计划估计工具。创建索引后，设置参数以显示性能统计信息。\n\
  \n## 步骤 9：运行查询\n\n使用 `DBCC` 清除缓冲区，确保设置了 `IO` 和 `TIME` 统计信息，然后运行查询。\n\n请参阅清单 3-11。\n\
  \n```sql\nDBCC dropcleanbuffers;\nCHECKPOINT;\nGO\nSET STATISTICS IO ON\nGO\nSET\
  \ STATISTICS TIME ON\nGO\nSELECT SalesYear\n,SalesQuarter\n,SalesMonth\n,CustomerNo\n\
  ,SUM(SalesTotal) AS MonthlySalesTotal\n,CUME_DIST() OVER (\nPARTITION BY SalesYear\n\
  ORDER BY SUM(SalesTotal)\n) AS CumeDist\n,PERCENT_RANK() OVER (\nPARTITION BY SalesYear\n\
  ORDER BY SUM(SalesTotal)\n) AS PctRank\nFROM [SalesReports].[MemorySalesTotals]\n\
  WHERE SalesYear IN(2010,2011)\nAND CustomerNo = 'C00000001'\nGROUP BY SalesYear\n\
  ,SalesQuarter\n,SalesMonth\n,CustomerNo\nGO\nListing 3-11\n查询内存优化表\n```\n\n务必通过运行\
  \ `DBCC` 命令来清除缓冲区。接下来，运行两个命令以开启 `IO` 和 `TIME` 统计信息，然后运行查询。\n\n## 步骤 10：创建建议的索引\n\
  \n这是建议索引的代码。我把它放在这里，但你应该在查看第一个估计查询计划之后运行它。想想看，还是应该先运行查询再创建索引，这样你才能记录性能统计信息。\n\n\
  请参阅清单 3-12。\n\n```sql\nALTER TABLE SalesReports.MemorySalesTotals\nADD INDEX ieCustNoSaleYearMemTable\n\
  NONCLUSTERED (CustomerNo,SalesYear)\nGO\nListing 3-12\n创建建议的索引\n```\n\n## 步骤 11：创建第二个估计查询计划\n\
  \n索引创建后，创建第二个估计查询计划。也许你可以在两个水平放置的查询窗格中完成。顶部窗格包含没有建议索引的查询计划，底部窗格包含创建建议索引后的查询计划，这样你就可以比较两者了。\n\
  \n## 步骤 12：重新运行查询并确保所有统计信息已开启\n\n在检查估计查询计划和运行带有统计信息的查询时，请确保使用 `DBCC` 清除缓冲区。\n\n\
  我运行了两次估计查询计划。第一次是为了查看估计器建议了什么索引。第二次是在我创建了建议的索引之后。\n\n请参考图 3-9 查看索引创建后的估计查询计划。\n\n\
