  \ 1%），一个用于收集数据流的并行任务（成本 14%），以及一个嵌套循环联接（成本 3%）。\n\n当然，系统建议了一个索引，这将成本降低了 89.97%。让我们创建这个索引，看看是否有帮助。\n\
  \n请参考代码清单 11-5。\n\n```\nCREATE NONCLUSTERED INDEX ieWhIdProdIdMovementDate\nON APInventory.Product.InventoryTransaction\
  \ (WhId,ProdId)\nINCLUDE (Increment,Decrement,MovementDate,InvId,LocId)\nGO\n代码清单\
  \ 11-5\n建议的索引\n```\n\n请注意，索引键只有两列，即 `WhId` 和 `ProdId` 列，但我们需要在 `INCLUDE` 子句中包含其他列，如\
  \ `Increment`、`Decrement`、`MovementDate`、`InvId` 和 `LocId` 列。\n\n创建索引并重新运行估计查询计划后，我们生成了修订后的估计查询计划。请参考图\
  \ 11-21。\n\n![](img/527021_1_En_11_Fig23_HTML.png)\n\n一张截图。窗口主页面显示了执行计划。箭头指向嵌套循环、表假脱机、段、计算标量和索引查找。\n\
  \n图 11-21 修订后的估计查询计划\n\n我们可以看到改进之处。表扫描和并行任务消失了，现在出现了一个成本为 32% 的索引查找。我们看到了一个表假脱机以及成本为\
  \ 48% 的嵌套循环联接。再次证明，估计查询分析器给出了一个很好的建议。\n\n### 课后作业\n\n尝试将索引创建为聚集索引，看看是否有显著改进。创建索引并查看估计查询计划以及\
  \ `IO` 和 `TIME` 统计信息。\n\n`STAR` 查询时间（或者我应该说 `SNOWFLAKE` 查询时间）？\n\n### 数据仓库查询\n\n\
  让我们看看查询 `SNOWFLAKE` 数据仓库数据库是否会与事务数据库的查询计划和统计信息相比，产生有趣的性能特性。\n\n这个查询被称为 `STAR` 查询。这是因为它使用了采用\
  \ `STAR` 数据模型设计的数据仓库的维度表和事实表。是的，它在 `SNOWFLAKE` 模式上也适用。我猜如果你包括一些连接到维度表的支线表（如 `PRODUCT\
  \ TYPE`），你可以称它为 `SNOWFLAKE` 查询。\n\n**注意**：术语 *支线表* 指的是连接到另一个维度表的维度表，例如，产品类型到产品子类型再到产品。如果你不熟悉数据仓库模型，请上网查找描述设计数据仓库所使用的不同模型和方法组合的文章。例如，可以看看\
  \ Kimball 与 Inmon 采取的方法有何不同。\n\n我们将采用刚刚讨论的查询规格，并稍作修改，以便报告库存水平的总和与平均值。\n\n请参考代码清单\
  \ 11-6。\n\n```\nSELECT C.CalendarYear\n,C.CalendarMonth\n,C.CalendarDate AS AsOfDate\n\
  ,L.LocId\n,L.LocName\n,I.InvId\n,W.WhId\n,P.ProdId\n,P.ProdName\n,QtyOnHand\n,SUM(IH.QtyOnHand)\
  \ OVER (\nORDER BY C.CalendarMonth\nROWS BETWEEN 1 PRECEDING AND CURRENT ROW\n)\
  \ AS RollingSum\n,AVG(SUM(CONVERT(DECIMAL(10,2),IH.QtyOnHand))) OVER (\nORDER BY\
  \ C.CalendarMonth\nROWS BETWEEN 1 PRECEDING AND CURRENT ROW\n) AS RollingAvgOnHand\n\
  FROM ApInventoryWarehouse.Fact.InventoryHistory IH\nJOIN Dimension.Calendar C\n\
  ON IH.CalendarKey = C.CalendarKey\nJOIN Dimension.Location L\nON IH.LocKey = L.LocKey\n\
  JOIN Dimension.Warehouse W\nON IH.WhKey = W.WhKey\nJOIN Dimension.Inventory I\n\
  ON IH.InvKey = I.InvKey\nJOIN Dimension.Product P\nON IH.ProdKey = P.ProdKey\nJOIN\
  \ Dimension.ProductType PT\nON P.ProductTypeKey = PT.ProductTypeKey\nWHERE C.CalendarYear\
  \ = 2010\n-- 原为：AND C.[CalendarDate] = AsOfDate – 每月最后一天\n-- 已更改为如下，因为 Warehouse\
  \ 表现在包含每月的所有日期\n-- 之前的版本只包含每月的最后一天\nAND C.[CalendarDate] = EOMONTH(CONVERT(VARCHAR,YEAR(C.[CalendarDate])),(MONTH(C.[CalendarDate])\
  \ - 1))\nAND L.LocId = 'LOC1'\nAND I.InvId = 'INV1'\nAND W.WhId = 'WH111'\nAND P.ProdName\
  \ LIKE 'French Type 1 Locomotive %'\nAND P.ProdId = 'P101'\nGROUP BY C.CalendarYear\n\
  ,C.CalendarMonth\n,C.CalendarDate\n,L.LocId\n,L.LocName\n,I.InvId\n,W.WhId\n,P.ProdId\n\
  ,P.ProdName\n,QtyOnHand\nGO\n代码清单 11-6\nSNOWFLAKE 查询示例\n```\n\n我们立刻注意到需要一个 `GROUP\
  \ BY` 子句。但是看看所有这些 `JOIN` 谓词！\n\n#### 随堂测验\n\n为什么我们称这是一个 `SNOWFLAKE` 查询？\n\n`SUM()`\
  \ 和 `AVG()` 函数都使用了包含 `ORDER BY` 子句但没有 `PARTITION BY` 子句的 `OVER()` 子句。其中包含了一个窗口帧子句：\n\
  \n```\nROWS BETWEEN 1 PRECEDING AND CURRENT ROW\n```\n\n这仅考虑分区中正在处理的当前行和前一行。\n\n\
  你还记得如果我们不包含窗口帧规范，默认的窗口帧行为是什么吗？\n\n这是对我们在第 1 章讨论过的表格的复习，该表格明确了在 `ORDER BY` 和 `PARTITION\
  \ BY` 子句的不同组合下 `OVER()` 子句的默认行为。请参考表 11-3。\n\n表 11-3 默认的 ROWS 和 RANGE 行为\n\n```\n\
  | ORDER BY | PARTITION BY | 默认帧 |\n| --- | --- | --- |\n| 否 | 否 | ROWS BETWEEN UNBOUNDED\
  \ PRECEDING AND UNBOUNDED FOLLOWING |\n| 否 | 是 | ROWS BETWEEN UNBOUNDED PRECEDING\
  \ AND UNBOUNDED FOLLOWING |\n| 是 | 否 | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT\
  \ ROW |\n| 是 | 是 | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |\n```\n\n\
  小小的复习总是有益的。反正也能省去翻回第 1 章的麻烦。\n\n让我们看看估计查询计划是什么样子。\n\n\n\n#### 性能考量\n\n考虑到我们拥有所有这些连接，可以预期会得到一个有趣的估计查询计划。\n\
  \n让我们通过“查询”菜单选项下的选择，以常规方式生成该计划。\n\n由于计划内容较长，我需要将其分成两部分。\n\n请参考图 11-22a。\n\n![](img/527021_1_En_11_Fig24_HTML.png)\n\
  \n一个 SQL 工作区的截图。窗口主页面显示了执行计划。箭头指向聚集索引开销 6%、嵌套循环开销 41%和索引查找开销 41%。\n\n图 11-22a\n\n\
  估计查询计划 部分 A\n\n这是计划的第一部分。如果行数很少，这类查询将对维度表进行一系列全表扫描，因此即使你创建了索引，也可能不会被使用！\n\n我们在事实表上确实进行了一次索引查找，这是件好事（查找优于扫描）。看起来我们有一个可用的索引，它满足了\
  \ `OVER()` 子句中的列和 `WHERE` 子句谓词列的要求，因此没有建议创建新索引。\n\n所有数据流通过哈希匹配连接（开销 3%）进行连接。我们有一个开销为\
  \ 41%的嵌套循环连接任务，它连接了来自 `Product`、`ProductType` 和 `InventoryHistory` 表的数据流。现在让我们看看查询计划的第二部分。\n\
  \n请参考图 11-22b。\n\n![](img/527021_1_En_11_Fig25_SQL.png)\n\n一个 SQL 工作区的截图。窗口主页面从左到右显示了执行计划的步骤。它依次读取了选择、计算标量、流聚合、窗口假脱机、段、计算标量、流聚合和排序操作符。\n\
  \n图 11-22b\n\n估计查询计划 部分 B\n\n这部分无需担心。所有开销都为零，所以让我们查看一下 `TIME` 和 `IO` 统计信息。\n\n请参考图\
  \ 11-23。\n\n![](img/527021_1_En_11_Fig26_HTML.png)\n\n一个 SQL 工作区的截图。主页面上半部分是 SQL\
  \ 查询代码，下半部分标题为“消息”。箭头指向逻辑读取 42 和 263，预读 0 和 259，经过时间等于 204 毫秒。\n\n图 11-23\n\nIO\
  \ 和 TIME 统计信息\n\n让我们讨论一下数值较高的统计信息。我们的 `Calendar` 维度表产生了大约 42 次逻辑读取和 40 次预读，因此这是需要重点关注以进行性能优化的领域。我们可以将其放置在高速存储或固态硬盘上，或者使用内存优化表。\n\
  \n工作表的所有值都为 0，所以我们不必担心这个。\n\n最后，事实表 `InventoryHistory` 的扫描计数为 1，逻辑读取 263 次，物理读取\
  \ 2 次，预读 259 次。这是可以预料的，因为该表有 736,320 行，相当大（至少对于笔记本电脑而言）。\n\n**提示与家庭作业**\n\n由于数据具有历史性质，我们应该像之前示例中所做的那样，将结果放入一个报表表中。这样，我们只在非高峰时段加载该表时承担一次性能影响。请自行尝试并进行必要的分析。\n\
  \n### `STDEV()` 函数\n\n统计学时间到了！\n\n提醒一下，回顾一下我们在第[2]章中对标准差的定义（如果你对此工作原理感到熟悉，请跳过此部分，直接转到示例查询的业务规范）。如果你需要复习或者这对你是新知识，请继续阅读：\n\
  \n`STDEV()` 函数计算一组值的统计标准差，当整个总体**未知**或不可用时。\n\n但这意味着什么？\n\n这意味着数据集中的数字与其算术**平均值**（这是“平均”的另一种说法）有多接近或多远。在我们的上下文中，平均或**平均值**是所讨论的所有数据值的总和除以数据值的数量。还有其他类型的**平均值**，如几何平均数、调和平均数和加权**平均数**，我将在附录\
  \ B 中简要介绍。\n\n回想一下标准差是如何计算的。\n\n以下是计算标准差的算法，如果你有冒险精神，可以用 TSQL 自己实现：\n\n*   计算所有值的平均值（**平均值**）并将其存储在变量中。你可以使用\
  \ `AVG()` 函数。\n*   循环遍历值集合。对于数据集中的每个值\n    *   减去计算出的平均值。\n*   对结果求平方。\n*   取所有上述结果的总和，并将该值除以数据元素的数量减\
  \ 1。（此步骤计算方差；如果要计算整个总体的方差，则不要减 1。）\n*   现在对方差取平方根，那就是你的标准差。\n\n或者你也可以直接使用 `STDEV()`\
  \ 函数！还有一个 `STDEVP()` 函数。唯一的区别是 `STDEV()` 处理的是数据总体的一部分。这适用于整个数据集未知的情况。`STDEVP()`\
  \ 函数处理整个数据集，即整个数据总体。\n\n再次说明语法：\n\n```sql\nSELECT STDEV( ALL | DISTINCT ) AS [Column\
  \ Alias]\nFROM [Table Name]\nGO\n```\n\n你需要提供一个包含要使用数据的列名。你可以选择性地提供 `ALL` 或 `DISTINCT`\
  \ 关键字。如果你省略它们，与其他函数一样，默认行为将是 `ALL`。使用 `DISTINCT` 关键字将忽略列中的重复值（请确保这是你想要做的）。\n\n以下是业务分析师提供给我们的下一份报告的业务需求：\n\
  \n需要一份报告，显示库存现有数量的平均值和标准差。结果需要针对年份“2003”、位置“LOC1”、库存“INV1”和产品“P033”。报告数据需要用于在 Microsoft\
  \ Excel 电子表格中创建正态分布图。\n\n以下是我们为满足规范要求而编写的代码。\n\n请参考代码清单 11-7。\n\n```sql\nWITH YearlyWarehouseReport\
  \ (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,\n    ProdId,AvgQtyOnHand\n\
  )\nAS\n(\n    SELECT AsOfYear\n          ,DATEPART(qq,AsOfDate) AS AsOfQuarter\n\
  \          ,AsOfMonth\n          ,AsOfDate\n          ,LocId\n          ,InvId\n\
  \          ,WhId\n          ,ProdId\n          ,AVG(QtyOnHand) AS AvgQtyOnHand\n\
  \    FROM Product.Warehouse\n    GROUP BY AsOfYear\n            ,DATEPART(qq,AsOfDate)\n\
  \            ,AsOfMonth\n            ,AsOfDate\n            ,LocId\n           \
  \ ,InvId\n            ,WhId\n            ,ProdId\n)\nSELECT AsOfYear\n      ,AsOfQuarter\n\
  \      ,AsOfMonth\n      ,AsOfDate\n      ,LocId\n      ,InvId\n      ,WhId\n  \
  \    ,ProdId\n      ,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n      ,AVG(AvgQtyOnHand)\
  \ OVER (\n            PARTITION BY AsOfYear,WhId\n            ORDER BY AsOfYear\n\
  \        ) AS YearlyAvg\n      ,STDEV(AvgQtyOnHand) OVER (\n            PARTITION\
  \ BY AsOfYear,WhId\n            ORDER BY AsOfYear\n        ) AS YearlyStdev\nFROM\
  \ YearlyWarehouseReport\nWHERE AsOfYear = 2003\n  AND LocId = 'LOC1'\n  AND InvId\
  \ = 'INV1'\n  AND ProdId ='P033'\nGO\n```\n代码清单 11-7\n库存数量平均值与标准差报告\n\n\n\n`OVER()`\
  \ 子句的分区依据是年份和仓库 ID，尽管年份并非必需，因为我们只筛选 2003 年的结果。业务分析师希望使用此代码包含更多年份，因此我们保留此列以便后续修改查询。此外，我们希望平均值和标准差是针对整年的，因为我们将在\
  \ Microsoft Excel 电子表格中使用这些数据来生成正态分布曲线。请注意，我们将获得两个仓库的结果。每个库存对应两个仓库。每个地点对应一个库存。\n\
