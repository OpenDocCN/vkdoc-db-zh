  \ 表有一个表扫描（0% 成本），以及我们的老朋友——哈希匹配内连接任务（成本 10% – 使用哈希来连接表行流）。可以看到一个建议的索引，因此让我们用下面的批处理命令来创建它。我们确保给它起个好名字。\n\
