  \ BI Desktop 窗口主页的截图。它显示了 SQL Server Analysis Server 数据库面板。可以输入服务器名称和数据库名称。“确定”按钮被高亮显示。\n\
  \n图 12-49\n\n定义连接并指定数据库\n\n在此面板中，我们需要指定服务器（这是我笔记本电脑上的一个 `SSAS` 实例）以及我们在第 11 章中之前创建的库存数据仓库数据集。我们点击“实时连接”单选按钮，然后点击“确定”按钮以进入下一步。\n\
