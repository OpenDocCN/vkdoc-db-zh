  \ GeneratorKey AS EquipmentKey,PlantId,LocationId,EquipmentId,\nGeneratorId AS UnitId,GeneratorName\
  \ AS UnitName\nFROM DimTable.Generator\nGO\nListing 8-27\n创建并加载关联维度\n```\n\n该脚本包含用于创建表的\
  \ `DDL` 命令以及加载该表所需的 `INSERT/SELECT` 语句。`SELECT` 语句只是四个通过 `UNION` 操作符连接的查询，用于加载将设备\
