  \n**图 5-44d**\n\n### 如果移除 `WHERE` 子句后的排序提示\n\n注意现在排序中包含的额外列。\n\n接下来是流聚合步骤。我没有生成此步骤的截图，但它用于通过\
  \ `CTE` 查询中的 `SUM()` 函数来生成总和：\n\n```\n--Stream Aggregate(\n    GROUP BY:([APFinance].[Financial].[Portfolio].[Month],\n\
