  估计查询计划显示了一个昂贵的表扫描\n\n我们现在知道，在大表上看到表扫描就意味着麻烦。我们还看到估算器建议了一个索引，所以这是我们采取的第一个补救措施。如果我们创建这个索引，`SQL\
  \ Server` 告诉我们将会看到 93.72% 的性能提升。\n\n我们将建议的索引复制粘贴到我们的脚本中，给它起个名字，然后执行 DDL 命令来创建索引。祈祷成功吧！\n\
