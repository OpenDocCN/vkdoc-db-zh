- "# 11. 库存用例：聚合函数\n\n这将是一个有趣的章节。我们不仅要在库存管理场景中实践窗口聚合函数，还将学习如何使用 Microsoft 的顶级 `ETL`\
  \ 工具（称为 `SSIS`）来创建一个流程，从我们将用于创建查询的库存数据库加载到库存数据仓库。\n\n我们将创建针对 `APInventory` 数据库和\
  \ `APInventoryWarehouse` 数据仓库的查询，以便比较结果和性能。通常的性能分析讨论将被包括在内，并且您还会有一些建议的课后作业。\n\n\
  最后，用于创建和加载这两个数据库的脚本，连同查询脚本，都包含在本章在 Apress 网站上的文件夹中。让我们通过一些简单的业务概念模型来看看这些数据库是什么样子的。\n\
  \n## 库存数据库\n\n让我们通过描述示例中将使用的数据库来开始本章。以下是我们高层次的业务概念模型，它标识了库存数据库的业务实体。\n\n请参考图 11-1。\n\
  \n![](img/527021_1_En_11_Fig1_HTML.png)\n\n图 11-1. 库存数据库概念模型\n\n主要的业务对象是 `Inventory`\
  \ 表，它存储与产品进出库存相关的信息。`Inventory Movement` 业务对象标识了任何产品在任何日期的现有数量。`Product` 对象存储有关所销售产品的典型信息，`Product\
  \ Type` 对象标识产品类型。最后，我们有常见的 `Country`、`Location` 和 `Calendar` 业务对象。\n\n前面的模型用简单的动词短语标识了对象之间的关系。表\
  \ 11-1 是各个实体的高层描述。\n\n表 11-1. 库存数据库表\n\n| 实体 | 描述 |\n| --- | --- |\n| `Calendar`\
  \ | 包含用于交易事件和库存移动的日历日期。 |\n| `Country` | 标识 ISO 两位和三位国家代码及国家名称。 |\n| `Location`\
  \ | 标识库存和仓库的位置。一个位置有一个或多个库存。库存有一个或多个仓库。 |\n| `Product` | 标识库存中可用的产品。 |\n| `Product\
  \ Type` | 标识产品类型，例如 HO 电力机车。 |\n| `Inventory` | 标识与此库存关联的仓库中可用的高级别单位。 |\n| `Inventory\
  \ Movement History` | 标识产品进出仓库的日期以及相关的产品。 |\n| `Inventory Sales Report` | 与库存移动相关的销售报告。\
  \ |\n| `Inventory Transaction` | 标识产品从仓库的每日进出移动。 |\n| `Warehouse` | 与库存中产品相关的详细信息，包括当前水平和再订购数量。\
  \ |\n\n这个简单的数据字典标识了概念模型中的业务实体以及每个表的描述。出于篇幅考虑，我将不包含详细的属性数据字典，因为数据库表中的列名清楚地标识了所存储的业务数据。\n\
  \n\n## 库存数据仓库\n\n接下来，我们将查看第二个数据库，这是一个实现为 `SNOWFLAKE`（雪花）模式的数据仓库。此数据仓库是从 `APInventory`\
  \ 数据库加载的。本章将包含一节，介绍如何使用 SQL Server Integration Services（`SSIS`）来加载这个简单的数据仓库。\n\n\
  图 11-2 是我们示例数据仓库的简化 `SNOWFLAKE` 模式。\n\n![](img/527021_1_En_11_Fig2_HTML.jpg)\n\n\
  一个框图展示了一个概念模型。一个标题为\"库存历史\"的方框位于中央，并与其父项相连。父项描绘了日历、地点、仓库和产品。产品的父项是产品类型，地点的父项是国家。\n\
  \n图 11-2\n\n库存数据仓库概念模型\n\n此模型中的核心业务对象是 `库存历史` 对象，它将作为数据仓库中事实表的基础。与 `APInventory`\
  \ 数据库中库存出入相关的存储历史数据将存储在此对象中。\n\n围绕 `库存历史` 业务对象的是用于在数据仓库中创建维度的各种实体。这些实体基本上与我们在 `APInventory`\
  \ 数据库中讨论的相同，其动词短语清晰地阐述了历史 `库存历史` 对象与未来维度表之间的业务关系。例如，产品类型标识产品的类型，比如蒸汽机车类型。\n\n以下是数据仓库模型相关的物理表名、分配的模式和主键信息。\n\
  \n请参考表 11-2。\n\n表 11-2\n\n库存数据仓库表\n\n| 表 | 类型 | 主键 |\n| --- | --- | --- |\n| Calendar\
  \ | 维度表 | CalendarKey |\n| Country | 维度表 | CountryKey |\n| Inventory | 维度表 | InvKey\
  \ |\n| Location | 维度表 | LocKey |\n| Product | 维度表 | ProdKey |\n| Product Type |\
  \ 维度表 | ProdTypeKey |\n| Warehouse | 维度表 | WhKey |\n| Inventory History | 事实表 |\
  \ CalendarKey, LocKey, WhKey, ProdKey, ProdTypeKey |\n\n从技术上讲，`Warehouse` 表应该包含\
  \ `Location` 和 `Inventory` 的主代理键，但为了简化模型和加载脚本，我在这里做了一点设计上的捷径。\n\n接下来，我将为你的工具箱介绍一个新工具。这个工具叫做\
  \ `SSIS`（SQL Server Integration Services），它是 Microsoft 的顶级 `ETL`（提取、转换、加载）工具。我们将使用这个工具从事务性库存数据库中加载我们的数据仓库。\n\
  \n创建这两个数据库的所有代码都可以在 Apress 网站本书的章节文件夹中找到。\n\n## 加载库存数据仓库\n\n`SSIS` 代表 SQL Server\
  \ Integration Services，它是一个图形化工具，允许用户为任何数据集成过程创建称为控制流和数据流的过程流。控制流定义了为提取、转换和加载数据而需要执行任务的步骤和顺序，而数据流则允许数据架构师指定数据的流向和低级别的转换任务。根据数据分发的需求，流程可以是顺序的，也可以包含多个分支。\n\
  \n`SSIS` 创建称为包的应用程序。在每个包内，有一系列定义并执行处理数据的低级别步骤的任务。因此，我们可以说 `SSIS` 由控制流和数据流、包以及任务组成。一个\
  \ `SSIS` 项目可以包含一个或多个包，这些包可以相互调用以定义非常复杂的数据集成和转换流程。\n\n工具箱提供了所有可能需要的任务，解决方案资源管理器面板允许定义所需的数据源和连接。让我们来探索一下这个工具的主要功能。\n\
  \n请参考图 11-3。\n\n![](img/527021_1_En_11_Fig3_HTML.jpg)\n\n一个窗口的截图，顶部是菜单栏，左侧是工具箱列表，右侧是解决方案资源管理器。中间区域显示了标题为\
  \ `package.dtsx` 的页面。\n\n图 11-3\n\n创建项目\n\n这并非一个详尽的 `SSIS` 教程。其目的是让你对这个工具有足够的熟悉度，以便能够创建简单的加载流程并自行探索该工具。有许多优秀的书籍和课程可以帮助你提升到更高的技能水平。\n\
  \nGUI（图形用户界面）由四个主要面板组成：\n\n*   **SSIS 工具箱**：包含你流程中需要的所有低级别任务，例如 FTP 任务。\n*   **设计区域**：包含用于创建控制流和数据流的\
  \ GUI，用于标识 `ETL` 包中使用的参数，以及事件处理程序和包资源管理器。\n*   **解决方案资源管理器**：在这里你可以标识项目参数、连接管理器、你将需要的\
  \ `SSIS` 包、包部件以及用于存放杂项组件的文件夹，还有链接的 Azure 资源。\n*   **连接管理器**：标识到数据库、其他服务器甚至 `SSAS`（SQL\
  \ Server Analysis Services）服务器的连接。\n\n右键单击解决方案资源管理器中的文件夹将弹出菜单，用于添加新组件，例如连接。\n\n\
  现在让我们开始创建我们的包（我们的项目将只有一个包）。第一个任务是创建连接管理器。\n\n请参考图 11-4。\n\n![](img/527021_1_En_11_Fig4_HTML.jpg)\n\
  \n一个窗口的截图，顶部是菜单栏，左侧是工具箱列表，右侧是解决方案资源管理器。中间区域描绘了一个标题为 `添加 SSIS 连接管理器` 的对话框。\n\n图 11-4\n\
  \n添加连接管理器\n\n右键单击 `连接管理器` 文件夹，会弹出一个对话框，允许你查看并选择所需的连接管理器。就我们的目的而言，我们需要第一个名为 `ADO`（Active\
  \ X Data Objects）的选项，因此我们选择它并单击 `添加` 按钮。请注意列表框，其中包含许多数据源，如 Hadoop 和 Excel。\n\n接下来，我们需要定义安全信息。请参考图\
  \ 11-5。\n\n![](img/527021_1_En_11_Fig5_HTML.jpg)\n\n一个窗口的截图，顶部是菜单栏，左侧是工具箱列表，右侧是解决方案资源管理器。中间区域描绘了标题为\
  \ `连接管理器` 的对话框。底部的消息框显示 `测试连接成功`。\n\n图 11-5\n\n配置连接管理器\n\n### 创建并执行 SSIS 包\n\n在此步骤中，我们需要选择要连接的服务器、身份验证信息以及要连接的数据库。在本例中，我们需要连接`APInventory`数据库。我们还希望测试连接以确保所有信息都被正确识别。如图所示，测试连接成功。现在我们已准备好创建控制流。\n\
