  \n是时候看些统计数据了。\n\n\n\n### STDEV() 与 STDEVP() 函数\n\n`STDEV()` 函数在整体**总体**数据未知或不可用时，计算一组值的统计标准差。\n\
  \n`STDEVP()` 函数则在已知数据集的整个**总体**时，计算其统计标准差。\n\n但这具体意味着什么呢？\n\n它的含义是衡量数据集中各数字与算术 `MEAN`（即平均值的另一种说法）的接近或偏离程度。在我们的上下文中，平均值或\
  \ `MEAN` 是指所有相关数据值的总和除以数据值的个数。\n\n还有其他类型的 `MEAN`，如几何平均数、调和平均数或加权 `MEAN`，我将在附录 B\
  \ 中简要介绍。\n\n那么，标准差是如何计算的呢？\n\n您可以使用以下算法，通过 T-SQL 计算标准差：\n\n*   计算所有相关值的平均值 (`MEAN`)\
  \ 并将其存储在一个变量中。\n*   对于数据集中的每个值\n    *   减去计算出的平均值。\n    *   将结果平方。\n*   将所有结果求和，然后将该值除以数据元素个数减\
  \ 1。（此步骤计算方差；若要计算整个总体的方差，则无需减 1。）\n*   现在对方差取平方根，即得到标准差。\n\n当然，您也可以直接使用 `STDEV()`\
  \ 函数！如前所述，还有一个 `STDEVP()` 函数。如前所述，两者的唯一区别在于 `STDEV()` 作用于数据的**部分总体**。这适用于整个数据集未知的情况。而\
  \ `STDEVP()` 函数则作用于代表**整个总体**的数据集。\n\n其语法如下：\n\n```sql\nSELECT STDEV( ALL | DISTINCT\
  \ ) AS [Column Alias]\nFROM [Table Name]\nGO\n```\n\n您需要提供一个包含所需数据的列名。您可以选择性地指定\
  \ `ALL` 或 `DISTINCT` 关键字。如果省略这些关键字，与其他函数一样，默认行为将采用 `ALL`。使用 `DISTINCT` 关键字将忽略列中的重复值。\n\
  \n让我们看一个使用此窗口函数的 T-SQL 查询示例。我们希望按年份、客户、商店编号和产品编号计算标准差及平均值。\n\n通常，我们从一个公共表表达式 (CTE)\
  \ 开始，进行一些预处理并返回我们的数据集。\n\n请参考清单 2-8。\n\n```sql\nWITH CustomerPurchaseAnalysis\n\
  (PurchaseYear,PurchaseMonth,StoreNo,ProductNo,CustomerNo,TotalSalesAmount)\nAS\n\
  (\nSELECT\nYEAR(CalendarDate)  AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
  StoreNo,\nProductNo,\nCustomerNo,\nSUM(TransactionQuantity * UnitRetailPrice) AS\
  \ TotalSalesAmount\nFROM StagingTable.SalesTransaction\nGROUP BY YEAR(CalendarDate),MONTH(CalendarDate),ProductNo,CustomerNo,StoreNo\n\
  )\nSELECT\ncpa.PurchaseYear,\ncpa.PurchaseMonth,\ncpa.StoreNo,\ncpa.ProductNo,\n\
  c.CustomerNo,\nCONVERT(DECIMAL(10,2),cpa.TotalSalesAmount) AS TotalSalesAmount,\n\
  AVG(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(\n--PARTITION BY cpa.PurchaseYear,c.CustomerNo\n\
  ORDER BY cpa.PurchaseYear,c.CustomerNo\n) AS AvgPurchaseCount,\nSTDEV(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS StdevTotalSales,\nSTDEVP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS StdevpTotalSales,\nSTDEV(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\n) AS StdevTotalSales,\nSTDEVP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\n) AS StdevpYearTotalSales\nFROM CustomerPurchaseAnalysis cpa\nJOIN DimTable.Customer\
  \ c\nON cpa.CustomerNo = c.CustomerNo\nWHERE cpa.CustomerNo = 'C00000008'\nAND PurchaseYear\
  \ = 2011\nAND ProductNo = 'P00000038114';\nGO\n```\n\n清单 2-8：标准差销售分析\n\n该 CTE 从日期中提取年份和月份部分。我们还通过将交易数量乘以单位零售价来计算总销售额。\n\
  \n我们计算了整个年份的平均值，因为我们希望在 Excel 电子表格中使用该值来计算和绘制正态分布的钟形曲线。我们很快会看到它。\n\n接下来，使用 `STDEV()`\
  \ 和 `STDEVP()` 函数计算标准差值。我们以两种不同的方式执行计算。第一对在 `OVER()` 子句中使用了 `ORDER BY` 子句，以便获得滚动的月度结果。第二对没有使用\
  \ `PARTITION BY` 或 `ORDER BY` 子句，因此默认的框架行为生效：处理结果时，包括相对于当前行的所有先前和后续行。\n\n让我们在图 2-17\
  \ 中查看结果。\n\n![](img/527021_1_En_2_Fig17_HTML.png)\n\n图 2-17：计算标准差\n\n简短明了。结果针对一个客户，一年按月份展示。注意第一列标准差结果\
  \ `StdevTotalSales1` 中的 `NULL` 值。这是因为它是分区中的第一个值，无法为单个值计算标准差，因此结果为 `NULL`。而 `STDEVP()`\
  \ 函数则没有问题，它直接返回 0。对于剩余月份，滚动标准差是逐月计算的。\n\n如果您不喜欢 `NULL`，只需使用一个 `CASE` 语块来检测返回的值并用零替换即可！\n\
  \n列 `StdevTotalSales2` 使用了 `STDEVP()`，可以看到其值略低，因为使用了数据集的整个总体。\n\n最后，列 `StdevTotalSales3`\
  \ 和 `StdevTotalSales4` 计算了整个年份的标准差。我们将在 Excel 电子表格中使用 `STDEV()` 的年度结果来生成正态分布值，并基于每个正态分布值生成一个名为钟形曲线的图表。\n\
  \n现在让我们查看图 2-18 中的图表。\n\n![](img/527021_1_En_2_Fig18_HTML.png)\n\n图 2-18：标准差钟形曲线\n\
  \n这里展示的是一系列小的钟形曲线。例如，注意第 2-4 个月和第 4-6 个月之间的曲线。在这种情况下，每条曲线由三个值生成：一个低值，然后一个高值，再回到一个低值。为第\
  \ 2-4 个月生成的曲线值为 0.068514、0.759391 和 0.194656。这些都是钟形曲线的理想值。\n\n为了生成每个月的正态分布，使用了 Excel\
  \ 的 `NORM.DIST` 函数。该函数使用这些参数：数值、平均值 (`MEAN`) 以及我们查询生成的标准差。然后，我们为这些值插入一个建议的图表。\n\n\
  \n\n### STDEV：性能调优注意事项\n\n让我们进行一些性能分析。通过高亮显示我们刚才讨论的查询，并使用常用方法之一生成查询计划，我们会看到一个似乎已经使用了索引的计划。\n\
