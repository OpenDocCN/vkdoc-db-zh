  \n## 七百万行查询：性能调优\n\n让我们再看一个查询。我们一直在中小型表上编写查询。这让我们得以学习和解读估计的查询计划及各种统计数据。让我们尝试一个超过七百万行的表，看看查询计划是什么样的！创建和加载此表的代码位于本章的文件夹中，文件名为\n\
  \n> “ch08 – load large equipment status history.sql”\n\n在创建此查询时，我发现 `APPlant` 数据库中存在一个设计缺陷。我并非有意为之，但我利用它化弊为利。\n\
  \n我是什么意思？\n\n我发现这是一个机会，可以讨论有时你收到的查询需求，除非你找到迂回的方式来连接所有需要的表，否则无法满足。在你进行迂回的试错过程中，你意识到数据库设计存在缺陷。某些东西缺失了。你让查询得以运行，但在性能方面表现不佳，并且你必须检查是否引入了诸如重复项之类的数据异常。\n\
  \n具体来说，我发现我的设计无法直接将 `Equipment` 表链接到 `Location` 表。数据库的设计方式是，需要将 `Equipment` 表链接到\
  \ `Valve`、`Motor`、`Turbine` 或 `Generator` 表之一，然后才能将它们链接到 `Location` 表。修复方案稍后揭晓。\n\
  \n让我们先看看变通方法。\n\n这是采用变通方法的查询初稿。该查询基于一个 `CTE`，因此我将讨论分为两部分。\n\n`CTE` 块请参阅清单 8-24。\n\
  \n```sql\nWITH EquipStatusCTE (\n    StatusYear,StatusMonth,EquipmentId,EquipAbbrev,\n\
  \    EquipOnlineStatusCode,EquipOnLineStatusDesc,StatusCount\n)\nAS (\n    SELECT\
  \ YEAR(ESBH.CalendarDate) AS StatusYear\n          ,MONTH(ESBH.CalendarDate) AS\
  \ StatusMonth\n          ,ESBH.EquipmentId\n          ,E.EquipAbbrev\n         \
  \ ,ESBH.EquipOnLineStatusCode\n          ,EOLSC.EquipOnLineStatusDesc\n        \
  \  ,COUNT(*) AS StatusCount\n    FROM Reports.EquipmentDailyStatusHistoryByHour\
  \ ESBH\n    JOIN DimTable.Equipment E\n        ON ESBH.EquipmentId = E.EquipmentId\n\
  \    JOIN DimTable.EquipOnlineStatusCode EOLSC\n        ON ESBH.EquipOnLineStatusCode\
  \ = EOLSC.EquipOnlineStatusCode\n    GROUP BY YEAR(ESBH.CalendarDate)\n        \
  \    ,MONTH(ESBH.CalendarDate)\n            ,ESBH.EquipmentId\n            ,E.EquipAbbrev\n\
  \            ,ESBH.EquipOnLineStatusCode\n            ,EOLSC.EquipOnLineStatusDesc\n\
  )\n```\n\n清单 8-24\n七百万行窗口聚合查询\n\n如我们所见，我们将两个维度表连接到一个名为 `Reports.EquipmentDailyStatusHistoryByHour`\
  \ 的非规范化报告表。我们想要统计的是用于识别设备是在线还是因维护或故障而离线的状态码数量。包含了一些标准的报告列，如年份、月份、设备 ID、缩写（设备类型）、状态码和描述。\n\
  \n由于我们使用的是不带 `OVER()` 子句的 `COUNT()` 函数，因此需要包含一个 `GROUP BY` 子句。这会增加处理时间。\n\n接下来是查询部分。这里是通过一系列嵌套在构成内联表的查询中的\
  \ `UNION` 查询块，来解决获取设备位置的变通方法。\n\n请参阅清单 8-25。\n\n```sql\nSELECT ES.StatusYear AS\
  \ ReportYear\n      ,ES.StatusMonth AS Reportmonth\n      ,EP.LocationId\n     \
  \ ,ES.EquipmentId\n      ,StatusCount\n      ,SUM(StatusCount) OVER(\n         \
  \  PARTITION BY ES.EquipmentId,ES.StatusYear\n           ORDER BY ES.EquipmentId,ES.StatusYear,ES.StatusMonth\n\
  \       ) AS SumStatusEvent\n      ,ES.EquipOnlineStatusCode\n      ,ES.EquipOnLineStatusDesc\n\
  \      ,EP.PlantId\n      ,L.LocationId\n      ,P.PlantName\n      ,P.PlantDescription\n\
  \      ,ES.EquipAbbrev\n      ,EP.UnitId\n      ,EP.UnitName\n      ,E.SerialNo\n\
  FROM EquipStatusCTE ES\nINNER JOIN DimTable.Equipment E\n    ON ES.EquipmentId =\
  \ E.EquipmentId\nINNER JOIN (\n    SELECT PlantId,LocationId,EquipmentId,MotorId\
  \ AS UnitId,\n           MotorName AS UnitName\n    FROM DimTable.Motor\n    UNION\n\
  \    SELECT PlantId,LocationId,EquipmentId,ValveId AS UnitId,\n           'Valve\
  \ - ' + ValveName AS UnitName\n    FROM DimTable.Valve\n    UNION\n    SELECT PlantId,LocationId,EquipmentId,TurbineId\
  \ AS UnitId,\n           TurbineName AS UnitName\n    FROM DimTable.Turbine\n  \
  \  UNION\n    SELECT PlantId,LocationId,EquipmentId,\n           GeneratorId AS\
  \ UnitId,GeneratorName AS UnitName\n    FROM DimTable.Generator\n) EP\n    ON ES.EquipmentId\
  \ = EP.EquipmentId\nINNER JOIN DimTable.Plant P\n    ON EP.PlantId = P.PlantId\n\
  INNER JOIN DimTable.Location L\n    ON EP.PlantId = L.PlantId\n   AND EP.LocationId\
  \ = L.LocationId\nWHERE ES.StatusYear = 2002\n  AND ES.EquipOnlineStatusCode = '0001'\n\
  GO\n```\n\n清单 8-25\n设备状态码总计汇总查询\n\n是的，它很混乱！\n\n首先，我们使用带 `OVER()` 子句的 `SUM()` 聚合函数来设置滚动计算。分区由设备\
  \ ID 和状态定义。`ORDER BY` 子句定义了按设备 ID、状态年份和状态月份列进行处理的逻辑顺序（可以这么说，`ORDER BY` 子句按实现所需结果所需的顺序对行进行排序）。\n\
  \n现在说说变通方法。在 `FROM` 子句中，我通过三个 `UNION` 块检索所需列，定义了一个内联表，以将设备链接到正确的工厂和位置。这些查询从 `Motor`、`Valve`、`Turbine`\
  \ 和 `Generator` 表中检索所需的列。\n\n结果被赋予别名 `EP`，在 `FROM` 子句中用于通过 `EquipmentId` 列将其他表连接到此内联表。虽然不美观，但它有效。但速度如何？\n\
  \n这就是设计缺陷。应该有一个关联表或维度表来存储这些数据，这样就不必在每次运行此查询时都重新组装。我们很快就会修复它。\n\n让我们看看此查询的结果。部分结果请参见图\
  \ 8-36。\n\n![](img/527021_1_En_8_Fig36_HTML.png)\n\nch08 queries V 2 dot sql 窗口的截图。顶部屏幕显示一些程序代码。底部屏幕呈现结果表。该表有\
  \ 9 列。报告年份、报告月份、位置 I D、状态计数和状态事件总和列被高亮显示。\n\n图 8-36\n按月滚动的设备状态摘要\n\n看起来滚动汇总在工作。快速检查显示滚动汇总有效：前两个月的故障数分别是\
  \ 607 + 578 = 1185。当设备 ID 变更时，一月份的故障数会重置，滚动过程重新开始。\n\n重要的列放在前面，因此你可以看到年份和月份信息、位置和设备\
  \ ID，然后是计数和滚动摘要，详细列紧随其后。\n\n此查询耗时两秒运行。考虑到我们是在笔记本电脑上对一张超过七百万行的表进行查询，表现不错。\n\n让我们看看基线查询计划；它会很大。请参考下面的三张图，以便我们理解估计的执行计划和流程。\n\
