  \n### 数据仓库查询\n\n让我们看看查询 `SNOWFLAKE` 数据库是否会与事务性数据库的查询计划和统计信息相比，产生有趣的性能特征。我想您现在已经知道，该查询将使用多个\
  \ `JOIN` 子句，这将形成一个有趣的估计查询计划。\n\n业务规范大致相同，只是没有 `WHERE` 子句。我们计算数量总和的标准差和平均值。\n\n请参考清单\
  \ 11-8。\n\n```sql\nSELECT C.CalendarYear\n,C.CalendarMonth\n,C.CalendarDate\n,L.LocId\n\
  ,L.LocName\n,I.InvId\n,W.WhId\n,P.ProdId\n,P.ProdName\n,SUM(QtyOnHand) As QtyOnHandSum\n\
  ,AVG(CONVERT(DECIMAL(10,2),IH.QtyOnHand)) OVER (\nPARTITION BY C.CalendarYear\n\
  ORDER BY C.CalendarMonth\n) AS RollingAvg\n,STDEV(SUM(IH.QtyOnHand)) OVER (\nPARTITION\
  \ BY C.CalendarYear\nORDER BY C.CalendarMonth\n) AS RollingStdev\nFROM Fact.InventoryHistory\
  \ IH\nJOIN Dimension.Calendar C\nON IH.CalendarKey = C.CalendarKey\nJOIN Dimension.Location\
  \ L\nON IH.LocKey = L.LocKey\nJOIN Dimension.Warehouse W\nON IH.WhKey = W.WhKey\n\
  JOIN Dimension.Inventory I\nON IH.InvKey = I.InvKey\nJOIN Dimension.Product P\n\
  ON IH.ProdKey = P.ProdKey\nJOIN Dimension.ProductType PT\nON P.ProductTypeKey =\
  \ PT.ProductTypeKey\nWHERE L.LocId = 'LOC1'\nAND I.InvId = 'INV1'\nAND W.WhId =\
  \ 'WH112'\nAND P.ProdName LIKE 'French Type 1 Locomotive%'\nAND P.ProdId = 'P101'\n\
  AND C.CalendarYear = 2002\nGROUP BY C.CalendarYear\n,C.CalendarMonth\n,C.CalendarDate\n\
  ,L.LocId\n,L.LocName\n,I.InvId\n,W.WhId\n,P.ProdId\n,P.ProdName\n,QtyOnHand\nGO\n\
  ```\n\n清单 11-8\n另一个 SNOWFLAKE 查询示例\n\n如图所示，使用了 `LIKE` 谓词，这会在性能上带来代价。我们看到了所有的 `JOIN`\
