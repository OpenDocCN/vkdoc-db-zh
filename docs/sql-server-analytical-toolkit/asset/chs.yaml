  \n## 实际应用：计算滚动平均值\n\n我们的业务分析师需要一个查询来生成一份报告显示客户账户的滚动三天平均值。和往常一样，我们选择客户“C0000001”（John\
  \ Smith）。如果你查看 `Customer` 表，你会发现 Smith 先生的年薪是 250,000 美元。不错！\n\n该查询需要显示现金账户的结果，并且仅限于\
  \ 2012 年的第一个月。我们希望有能力显示其他年份，因此我们需要包含注释掉的代码，以便根据分析师的请求启用（你可以自己完成这部分）。\n\n请参考清单 5-11。\n\
  \n```\nSELECT YEAR(PostDate)  AS AcctYear\n,MONTH(PostDate) AS AcctMonth\n,PostDate\n\
  ,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n,AcctTypeCode\n,AcctBalance\n,AVG(AcctBalance)\
  \ OVER(\nPARTITION BY MONTH(PostDate)\n/* 取消注释以报告超过 1 年的数据 */\n--PARTITION BY YEAR(PostDate),MONTH(PostDate)\n\
  ORDER BY PostDate\nROWS BETWEEN 2 PRECEDING AND CURRENT ROW\n) AS [3 DayRollingAcctAvg]\n\
  FROM APFinance.Financial.Account\nWHERE YEAR(PostDate) = 2012\n/*******************************************/\n\
  /* 取消注释以报告超过 1 年的数据 */\n/*******************************************/\n--WHERE YEAR(PostDate)\
  \ IN(2012,2013)\nAND CustId = 'C0000001'\nAND AcctName = 'CASH'\nAND MONTH(PostDate)\
  \ = 1\nORDER BY YEAR(PostDate)\n,MONTH(PostDate)\n,PostDate\n,CustId\n,AcctName\n\
  ,AcctNo\nGO\nListing 5-11\n滚动三天平均值\n```\n\n顺便说一句，这里没有使用 `CTE`。`AVG()` 函数与 `OVER()`\
  \ 子句一起使用，该子句按月份对数据集进行分区，并按过账日期对分区结果集进行排序。包含了 `ROWS` 子句来创建一个窗口框架，该框架在处理结果时包括前两行和当前行。\n\
  \n请记住，这只是针对现金账户。比较现金账户平均值与股票账户平均值会很有趣，例如，看看 Smith 先生是赚钱了还是亏钱了。是否有大量现金从账户流出用于购买股票？股票上涨了吗，然后它们被卖出获利，从而现金存款被存回现金账户？\n\
  \n你可以通过修改查询以包含股票账户来做到这一点。\n\n让我们查看图 5-28 中的结果，然后我们可以绘制它们。\n\n![图片描述](img/527021_1_En_5_Fig30_HTML.jpg)\n\
