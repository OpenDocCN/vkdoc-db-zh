  \ 7-4。\n\n![](img/527021_1_En_7_Fig4_HTML.png)\n\n一张 S S M S 窗口的截图。它展示了累积分布基线查询计划的第\
  \ 2 部分，包含 14 个组件。这些组件是：窗口假脱机、2 个分段、嵌套循环、表假脱机、分段、排序、计算标量、流聚合、窗口假脱机、嵌套循环、流聚合和 2 个表假脱机。\n\
  \n**图 7-4**\n累积分布基线查询计划 – 第 2 部分\n\n注意计划右侧的窗口假脱机任务。它的成本为 1%，这意味着假脱机操作是在磁盘而非内存中执行的。这个窗口假脱机任务与第一个累积分布函数调用相关联。\n\
  \n这里有一个框出的区域，它与我们讨论的第一个区域相同。它后面也跟着一个窗口假脱机任务。看起来我们有三个需要留意的低成本任务：成本为 1%的表假脱机、成本为 4%的内部联接嵌套循环，以及成本为\
  \ 1%的窗口假脱机任务。\n\n我尝试了报表表方法，即使用 `CTE` 中的查询来填充一个报表表，然后针对该报表表执行基础查询。就查询计划而言，改进是微乎其微的（代码包含在本章的脚本中）。\n\
  \n使用报表表方法时，`TIME` 和 `IO` 统计数据显示出边际改善，因此我在此附上屏幕截图。请参阅图 7-5。\n\n![](img/527021_1_En_7_Fig5_HTML.png)\n\
  \n一张 S S M S 窗口的截图。文本展示了 2 组 I O 和 TIME 统计数据。解析和编译时间（CPU 和已用时间）对于 1 和 2 分别为 15、56\
  \ 毫秒和 0、0 毫秒。执行时间（CPU 和已用时间）对于 1 和 2 分别为 16、58 毫秒和 0、40 毫秒。影响了 72 行。\n\n**图 7-5**\n\
  比较 IO 和 TIME 统计信息\n\nSQL Server 执行时间和预读读取量有适度改善。由于这是历史数据，报表表方法可能比 `CTE` 方法更高效，特别是当多个用户运行相同的查询时，例如从允许分析人员通过报告中的下拉列表选择不同年份的\
  \ SQL Server Reporting Services (SSRS) 报告中运行。\n\n报表表策略也有成本，因为它必须定期加载以更新数据，保持其时效性。这可以每天或每周执行，通常是在夜间通过计划的加载过程完成，这样就不会影响用户。\n\
  \n最后但同样重要的是，我修改了原始的 `CTE` 查询，使其不使用 `CTE`，而是直接针对 Portfolio 表，并在两次调用累积分布函数之前立即计算 `SUM()`。结果几乎与\
  \ `CTE` 版本匹配，并且 SQL Server 执行时间略低于 `CTE` 版本，230 毫秒（`CTE`）对 171 毫秒（非 `CTE`）。就 `STATISTICS\
  \ PROFILE` 值而言，非 `CTE` 版本的步骤更少（72 步对 32 步），但总的来说，除了执行时间稍快之外，性能是一样的。所以，也许对于这类查询，`CTE`\
  \ 块不是首选？如果我们需要查询数百万行数据，那么可能根本不会考虑 `CTE`。\n\n始终要考虑查询将如何被使用和运行，例如，是在多个用户的网页报告中运行，还是由一个用户单独运行。另外，不要仅仅因为你认为某个功能（如\
  \ `CTE`）很巧妙，并且使用它会给你的经理留下深刻印象，就去使用它。最简单、最快、当然也是最准确的解决方案才是最好的解决方案。同时也要考虑维护这些查询的人力成本。\n\
  \n\n\n#### FIRST_VALUE() 与 LAST_VALUE() 函数\n\n那么，这一对相关函数能为我们做什么呢？如果您没有阅读过第 3 章，或者需要复习一下，请阅读接下来的讨论；否则，可以直接跳转到示例部分。\n\
  \n函数名称给了我们一些提示。它们回答了以下问题：\n\n在分区内，谁排第一，谁排最后？\n\n给定一组已排序的值，`FIRST_VALUE()` 函数将返回分区内第一个值。\n\
  \n给定一组已排序的值，`LAST_VALUE()` 函数将返回分区内最后一个值。\n\n这两个函数都返回作为参数传入的任何数据类型；可能是整数，也可能是字符串，等等。非常简单。让我们直接深入示例。\n\
  \n以下是我们的业务需求说明：\n\n这次，分析师要求我们关注所有客户账户。我们需要创建一个报告，该报告将返回由年份和客户 ID 定义、并按月份排序的分区内最后一个和第一个账户值。分析师希望看到包含当前月份以及所有未来月份的数据集（分区）中的这些值，同时也希望看到包含当前月份以及所有过去月份的数据集中的这些值。换句话说，即向前看和向后看（提示：需要定义一个窗口框架）。\n\
  \n最后，报告将仅限于现金账户。\n\n请参考清单 7-3。\n\n```sql\nWITH MonthlyAccountBalances (\nAcctYear,AcctMonth,CustId,\
  \ PrtfNo, AcctNo, AcctName, AcctBalance\n)\nAS\n(\nSELECT YEAR(PostDate)  AS AcctYear\n\
  ,MONTH(PostDate) AS AcctMonth\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n,SUM(AcctBalance)\n\
  FROM Financial.Account\nGROUP BY YEAR(PostDate)\n,MONTH(PostDate)\n,CustId\n,PrtfNo\n\
  ,AcctNo\n,AcctName\n)\nSELECT CustId\n,AcctYear\n,AcctMonth\n,AcctNo\n,AcctName\n\
  ,AcctBalance\n,FIRST_VALUE(AcctBalance) OVER (\nPARTITION BY AcctYear,CustId\nORDER\
  \ BY AcctMonth\nROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING\n) AS FirstValueBalance\n\
  ,LAST_VALUE(AcctBalance) OVER (\nPARTITION BY AcctYear,CustId\nORDER BY AcctMonth\n\
  ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING\n) AS LastValueBalanceCRUF\n,FIRST_VALUE(AcctBalance)\
  \ OVER (\nPARTITION BY AcctYear,CustId\nORDER BY AcctMonth\nROWS BETWEEN UNBOUNDED\
  \ PRECEDING AND CURRENT ROW\n) AS FirstValueBalanceUPCR\n,LAST_VALUE(AcctBalance)\
  \ OVER (\nPARTITION BY AcctYear,CustId\nORDER BY AcctMonth\nROWS BETWEEN UNBOUNDED\
  \ PRECEDING AND CURRENT ROW\n) AS LastValueBalanceUPCR\nFROM MonthlyAccountBalances\n\
  WHERE AcctYear >= 2013\nAND AcctNAme = 'CASH'\nORDER BY CustId\n,AcctYear\n,AcctName\n\
  ,AcctMonth\nGO\n```\n\n清单 7-3\n按年份和客户、并按月份排序的首个与末个账户余额\n\n这个 `CTE` 看起来与我们前一个示例中讨论的类似，但这次它引用的是\
  \ Account 表，其粒度比 Portfolio 表更低。\n\n有趣的是，我们包含了两组具有不同 `ROWS` 框架子句的 `FIRST_VALUE()OVER()`\
  \ 和 `LAST_VALUE()OVER()` 子句。\n\n第一组使用以下 `ROWS` 窗口框架定义，以在分区内基于当前行和其后的所有行（向前看）来定义窗口框架：\n\
  \n```\nROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING\n```\n\n第二组使用以下 `ROWS` 窗口框架定义，以处理当前行及其之前的所有行（向后看）来定义窗口框架：\n\
  \n```\nROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n```\n\n请记住，窗口框架是相对于分区内在行间移动处理时正在处理的当前行而言的。如果这个概念有点模糊，请复习第\
  \ 1 章中的相关内容，然后尝试使用十个值、一个表变量和这些函数进行一个简单的示例，以便在简单数据集上观察它们的工作原理。查看第 1 章中关于此主题的图表；它们会让这个概念变得清晰。\n\
  \n查询已执行。这个查询运行了四秒钟！迫不及待地想查看估计的执行计划。请参考图 7-6 中的部分结果。\n\n![](img/527021_1_En_7_Fig6_HTML.png)\n\
  \n一张 S S M S 窗口的截图。其中有一个包含 11 列和 26 行的表格。列标题分别是客户 I D、账户年份、账户月份、账户名称、账户余额、首值余额、末值余额\
  \ C R U F、首值余额 U P C R 和末值余额 U P C R。\n\n图 7-6\n在定义的分区内，首行与末行\n\n从第一组首末余额中可以看出，首值是当前行中的值，而末值始终指向分区中的最后一个值，`$34,138.00`。在这里我们向前看。\n\
  \n在第二组首末余额中，首值始终指向分区中的第一个值，而末值始终是窗口框架当前行中的值。在这里我们向后看。\n\n我猜想这很有价值，因为我们可以看到相对于余额，我们起始于何处、当前位于何处以及将走向何方。这个方案告诉你，随着时间推移（按月），账户是在增值还是在贬值。\n\
  \n最好检查一下估计的查询计划，因为我们看到这个查询运行了四秒钟。\n\n\n\n#### 性能考量\n\n我们需要将估计的查询计划分成两部分。从右向左看，大约在屏幕中间，我们在图\
