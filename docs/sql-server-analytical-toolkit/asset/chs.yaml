  \ 6 的信息似乎是最好的，可能是因为索引的原因。\n\n这些信息加上我们刚刚检查的工具的输出，将使你能够诊断和识别性能瓶颈。确保你用一些简单的查询练习一下，看看是否能解释返回的统计信息。\n\
  \n顺便说一句，我不想暗示性能调优是轻而易举的事。这是一门难以掌握的学科，需要多年的实践才能达到专家水平。我只是触及了这个非常有趣且重要的活动的表面。\n\n\
  这一节很长，正如前面所说，旨在向你介绍这些工具并查看它们的输出。信息量很大，所以如果你还不明白所有统计信息的含义，请不要担心。现阶段重要的是你知道在哪里可以找到它们，并能在一些查询上尝试它们。随着本章的进行，我们将深入探讨重要的查询计划步骤告诉了我们什么，以及如何利用这些信息来创建索引以提供更好的性能。\n\
  \n我们将对几个查询进行此操作，但第 14 章将专门讨论性能调优。我将包含我们在其他章节中开发的查询的查询计划示例，以便你能了解与窗口函数相关的性能问题以及如何解决它们。\n\
  \n我们准备好开始编写一些代码了！\n\n## 聚合函数\n\n以下是我们将在本章中讨论的窗口聚合函数：\n\n*   `COUNT()` 和 `COUNT_BIG()`\n\
  *   `SUM()`\n*   `MAX()`\n*   `MIN()`\n*   `AVG()`\n*   `GROUPING()`\n*   `STRING_AGG()`\n\
  *   `STDEV()`\n*   `STDEVP()`\n*   `VAR()`\n*   `VARP()`\n\n我们将采取的方法是：为每个函数展示代码、进行讨论、显示执行时的结果，并检查结果。我们甚至可能生成一些`Excel`图表来更好地分析结果。\n\
  \n对于`GROUPING()`和`STDEV()`函数，我们将按照前面讨论的步骤生成`IO`和`TIME`统计信息以及估计的查询执行计划。通常，查询计划也会建议一个要创建的推荐索引。如果建议了索引，我们将复制模板并通过给它一个名称来修改它，然后创建它。\n\
  \n一旦索引创建完毕，我们重新生成统计信息和查询计划，并将新的统计信息集与之前的统计信息集进行比较，以查看通过创建新索引获得了哪些性能改进。\n\n有时创建索引没有帮助，甚至可能损害性能，更不用说你创建的索引越多，在需要删除、更新或插入行时性能下降就越严重。\n\
  \n### `COUNT( )`, `MAX( )`, `MIN( )`, `AVG( )` 和 `SUM( )` 函数\n\n让我们开始研究那些你将在查询和报告中频繁使用的核心函数。下面是一个查询示例，它报告了交易次数、交易的最大和最小数量，以及特定产品的购买总数量。\n\
  \n我们希望创建一个按年、月、商店和产品分类的交叉表报告，以给出销售业绩概况。请不要将交易次数与售出商品数量混淆。单次交易可能包含 10 件商品，或者 1 件，也可能是\
  \ 20 件或更多。请注意这其中的区别。\n\n最后，我们希望将结果限制为单个商店、产品和年份，以便进行分析。请参考代码清单 2-2 中的查询。\n\n```sql\n\
  SELECT YEAR(CalendarDate) AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
  StoreNo,\nProductNo,\nProductName,\nCOUNT(*) AS NumTransactions,\nMIN(TransactionQuantity)\
  \ AS MinQuantity,\nMAX(TransactionQuantity) AS MaxQuantity,\nAVG(TransactionQuantity)\
  \ AS AvgQuantity,\nSUM(TransactionQuantity) AS SumQuantity\nFROM SalesReports.YearlySalesReport\n\
  WHERE StoreNo = 'S00001'\nAND ProductNo = 'P0000001112'\nAND YEAR(CalendarDate)\
  \ = 2010\nGROUP BY YEAR(CalendarDate),\nMONTH(CalendarDate),\nStoreNo,\nProductNo,\n\
  ProductName\nORDER BY YEAR(CalendarDate),\nMONTH(CalendarDate),\nStoreNo,\nProductNo,\n\
  ProductName\nGO\n```\n代码清单 2-2：基础销售概况报告\n\n这里没有使用任何花哨的语法，没有 `OVER()` 子句，没有 `CTE`，仅仅是一个从\
  \ `YearlySalesReport` 表中检索行的 `SELECT` 子句。我们包含了 `COUNT()`, `MIN()`, `MAX()`, `AVG()`\
  \ 和 `SUM()` 函数，并将 `TransactionQuantity` 列作为参数传递。\n\n`WHERE` 子句对结果进行筛选，因此我们只获取商店\
  \ `S00001`、产品 `P0000001112` 和日历年 `2010` 的行。\n\n当你使用聚合函数时，必须包含 `GROUP BY` 子句，而我们利用\
  \ `ORDER BY` 子句对结果进行排序。请参考图 2-9 中的部分结果。\n\n![](img/527021_1_En_2_Fig9_HTML.png)\n\
  \n这是一个 SSMS 窗口的截图。它呈现了一个包含 10 列和 13 行的表格。列标题分别是购买年份、购买月份、商店编号、产品编号、产品名称、交易次数、最小数量、最大数量、平均数量和总数量。\n\
  \n图 2-9：销售概况报告\n\n看起来二月份是一个销售淡季，这有点奇怪，毕竟有情人节假期。你本会以为销量会上升。\n\n### 使用 `OVER( )`\n\
  \n让我们基于之前的查询，增加一些窗口功能。这个解决方案分为两部分。首先，我们需要创建一个名为 `ProductPurchaseAnalysis` 的 `CTE`（公用表表达式），它执行一些日期操作，并包含了\
  \ `COUNT()` 函数，用于按年、月、商店编号和产品编号生成交易次数。\n\n解决方案的第二部分是创建一个查询，引用该 `CTE` 并使用所有基本的聚合函数，但这次我们将包含一个\
  \ `OVER()` 子句，以便在分区中创建并排序行以进行处理。让我们来检查一下代码。\n\n请参考代码清单 2-3。\n\n```sql\nWITH ProductPurchaseAnalysis\
  \ (\nPurchaseYear,PurchaseMonth,CalendarDate,StoreNo,CustomerFullName,ProductNo,ItemsPurchased,NumTransactions\n\
  )\nAS (\nSELECT YEAR(CalendarDate) AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
  CalendarDate,\nStoreNo,\nCustomerFullName,\nProductNo,\nTransactionQuantity AS ItemsPurchased,\n\
  COUNT(*)            AS NumTransactions\nFROM SalesReports.YearlySalesReport\nGROUP\
  \ BY YEAR(CalendarDate) ,\nMONTH(CalendarDate),\nCalendarDate,\nStoreNo,\nCustomerFullName,\n\
  ProductNo,\nProductName,\nTransactionQuantity\n)\n```\n代码清单 2-3：第一部分，`CTE`\n\n非常直接。从日历日期中提取出日历年份和月份，并包含在\
  \ `SELECT` 子句中。商店编号、客户全名和产品编号也被包含进来。最后，包含了交易数量（即购买了多少件商品），并且我们按照 `GROUP BY` 子句定义的每个组来统计交易次数。\n\
  \n现在来看这个批处理的第二部分，即引用 `CTE` 的查询。这个查询将为我们提供每个产品按年、月、客户和商店分类的交易次数和购买数量的概况。\n\n请参考代码清单\
  \ 2-4。\n\n```sql\nSELECT PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,\nCustomerFullName,ProductNo,NumTransactions,\n\
  SUM(NumTransactions) OVER (\nPARTITION BY PurchaseYear,CustomerFullName\nORDER BY\
  \ CustomerFullName,PurchaseMonth\n) AS SumTransactions,ItemsPurchased,\nSUM(ItemsPurchased)\
  \ OVER (\nPARTITION BY PurchaseYear,CustomerFullName\nORDER BY CustomerFullName,PurchaseMonth\n\
  ) AS TotalItems,\nAVG(CONVERT(DECIMAL(10,2),ItemsPurchased)) OVER (\nPARTITION BY\
  \ PurchaseYear,CustomerFullName\nORDER BY CustomerFullName,PurchaseMonth\n) AS AvgPurchases,\n\
  MIN(ItemsPurchased) OVER (\nPARTITION BY PurchaseYear,CustomerFullName\nORDER BY\
  \ CustomerFullName,PurchaseMonth\n) AS MinPurchases,\nMAX(ItemsPurchased) OVER (\n\
  PARTITION BY PurchaseYear,CustomerFullName\nORDER BY CustomerFullName,PurchaseMonth\n\
  ) AS MaxPurchases\nFROM ProductPurchaseAnalysis\nWHERE StoreNo = 'S00001'\nAND ProductNo\
  \ = 'P0000001112'\nAND PurchaseYear = 2010\nAND PurchaseMonth = 1\nAND ItemsPurchased\
  \ > 0\nGROUP BY PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,\nCustomerFullName,ProductNo,NumTransactions,ItemsPurchased\n\
  ORDER BY CustomerFullName,PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,\nProductNo,ItemsPurchased\n\
  GO\n```\n代码清单 2-4：第二部分 – 使用窗口函数\n\n注意，我添加了一个筛选条件，仅报告 `2010` 年一月份的结果。这样做是为了保持结果集较小，以便调试和分析查询。一旦它能正确运行，你可以移除这些筛选条件以获取所有月份（当你下载代码时）。你也可以移除\
  \ `PurchaseYear` 筛选条件以获取更多年份的数据。如果你想要所有商店和客户的信息，可以修改查询，将结果插入到一个报告表中，然后你就可以编写查询来查看任何你想要的客户、商店和产品的组合了。\n\
  \n让我们继续浏览剩余的代码。\n\n每个 `OVER()` 子句中都包含了一个 `ORDER BY` 子句和一个 `PARTITION BY` 子句。数据集结果按\
  \ `PurchaseYear` 和 `CustomerFullName` 列进行分区。分区内的行按 `CustomerFullName` 和 `PurchaseMonth`\
  \ 排序。\n\n\n## 查询结果分析与分组函数\n\n如前所述，查询中包含一个 `WHERE` 子句，用于按商店 “S00001”、产品 “P0000001112”、购买年份\
  \ 2010 年以及 1 月份进行过滤。我还过滤掉了任何 `ItemsPurchased` 值为零的记录。（它们不知何故在测试数据的表加载过程中混了进来。这个数字是随机生成的，所以零值会混进来！）\n\
  \n让我们看看结果。请参考图 2-10。\n\n![](img/527021_1_En_2_Fig10_HTML.png)\n\nSSMS 窗口的截图。它展示了一个包含\
  \ 13 列和 21 行的表格。列标题为：购买年份、月份、日历日期、商店编号、客户名称、产品编号、交易次数与总和、已购商品、总商品数、平均购买量、最小和最大购买量。\n\
  \n图 2-10\n\n交易数量与已购商品概况\n\n让我们重点关注 Bill Brown 的购买记录。有四个日期发生了购买。假设每天一次购买，这总共就是四笔交易，显示在\
  \ `SumTransactions` 列中。\n\n接下来，如果我们查看 `ItemsPurchased` 列，我们会看到与 Bill 购买商品的四天相对应的四个值。在\
  \ 1 月 28 日和 29 日，他每天购买了一件商品。在 1 月 30 日，他购买了两件，在 1 月 31 日购买了三件。如果我们将它们全部相加，得到总购买量为七件，这反映在\
  \ `TotalItems` 列中。\n\n注意，如果未包含窗口框架子句，`PARTITION BY` 和 `ORDER BY` 子句的默认行为。总计出现在结果的每一行中。这意味着在计算当前行的每个总计值时，会包含相对于当前正在处理的行之前和之后的所有行。\n\
  \n这同样适用于平均值的计算。最后，注意最小值和最大值。它们可以清楚地在 `ItemsPurchased` 列中看到。Bill 的最小购买量是一件商品，而他的最大购买量是三件商品。\n\
  \n这种处理模式对于由分区定义的每一组行都会重复。\n\n### GROUPING() 函数\n\n`GROUPING()` 函数允许您为数据类别定义的层级中的每个级别创建汇总值（例如\
  \ Excel 数据透视表中的汇总）。一图胜千言，它阐明了此函数的结果。请参考图 2-11。\n\n![](img/527021_1_En_2_Fig11_HTML.png)\n\
  \n一个图表展示了 3 个层级：0、1 和 2。层级 0 有三行类别 A、B、C，其值分别为 5、10、15。层级 1 有三个类别 A、B、C，其总和分别为 15、30、45。层级\
  \ 2 有类别 NULL，其总和为 90。\n\n图 2-11\n\n数据组内汇总的概念模型\n\n从图表左侧的三行类别开始，数据集中的每一行都有一个类别和一个值。类别是\
  \ A、B 和 C。如果我们在层级 0 上对每个类别的值进行汇总，我们会在层级 1 得到类别 A 的汇总值 15，类别 B 的汇总值 30，类别 C 的汇总值\
  \ 45。如果我们对这三个汇总总计进行汇总，我们会在层级 2 得到最终值 90。\n\n这看起来很容易，但想象一下，如果您必须对组层级中的五个或更多级别进行数据汇总，复杂性会有多大。例如，我们可以按年份、月份、产品类别、产品子类别和产品进行汇总。让我们再加上客户，这样我们就能看到按客户统计的总计！这可能使输出难以阅读和分析，因此请确保提供满足用户要求的最少必要信息。\n\
  \n有了这些知识，让我们编写一个查询，为我们的销售数据创建汇总，并尝试在 `ORDER BY` 子句中使用一个巧妙的技巧，使结果易于浏览。\n\n请参考代码清单\
  \ 2-5。\n\n```sql\nWITH StoreProductSalesAnalysis\n(TransYear,TransQuarter,TransMonth,TransDate,StoreNo,ProductNo,MonthlySales)\n\
  AS\n(\nSELECT\nYEAR(CalendarDate)        AS TransYear,\nDATEPART(qq,CalendarDate)\
  \ AS TransQuarter,\nMONTH(CalendarDate)       AS TransMonth,\nCalendarDate     \
  \         AS TransDate,\nStoreNo,\nProductNo,\nSUM(TotalSalesAmount)     AS MonthlySales\n\
  FROM FactTable.YearlySalesReport\nGROUP BY\nCalendarDate,\nStoreNo,\nProductNo\n\
  )\nSELECT TransYear,\nTransQuarter,\nTransMonth,\nStoreNo,\nProductNo,\nMonthlySales,\n\
  SUM(MonthlySales)      AS SumMonthlySales,\nGROUPING(MonthlySales) AS RollupFlag\n\
  FROM StoreProductSalesAnalysis\nWHERE TransYear = 2011\nAND ProductNo = 'P0000001103'\n\
  AND StoreNo = 'S00001'\nGROUP BY TransYear,\nTransQuarter,\nTransMonth,\nStoreNo,\n\
  ProductNo,\nMonthlySales WITH ROLLUP\nORDER BY TransYear,\nTransQuarter,\nTransMonth,\n\
  StoreNo,\nProductNo,\n(\nCASE\nWHEN MonthlySales IS NULL THEN 0\nEND\n) DESC,\n\
  GROUPING(MonthlySales) DESC\nGO\n```\n\n代码清单 2-5\n\n生成汇总报告\n\n我们使用了与之前示例相同的 CTE，但这个查询有一些复杂性。我们使用\
  \ `SUM()` 函数来生成每月销售额的汇总，并使用 `GROUPING()` 函数来创建 `GROUP BY` 子句中包含的列的汇总。`GROUPING()`\
  \ 函数紧跟在 `SELECT` 子句中的最后一列之后。\n\n我们为什么要做这一切？\n\n具体来说，我们希望按年份、季度、月份、商店编号和产品编号对销售汇总进行汇总。这些代表了我们汇总层级中的各个级别。\n\
  \n我们需要在 `ORDER BY` 子句中包含一些巧妙的代码，以便显示效果看起来有点像我们刚刚讨论的图表。每次我们汇总一个级别时，许多 `NULL` 会出现在那些不再适用于当前层级的行中（因为汇总了上一级别的值）。如果没有对结果进行正确的排序，将很难理解。\n\
  \n我们需要做的是在 `ProductNo` 列之后的 `ORDER BY` 子句中引入一个 `CASE` 语句，该语句将告诉查询如果 `MonthlySales`\
  \ 列是 `NULL` 时该如何处理：\n\n```sql\nProductNo,\n(\nCASE\nWHEN MonthlySales IS NULL THEN\
  \ 0\nEND\n) DESC,\n```\n\n\n\n如果值为 `NULL`，则使用 0 并按降序排序。注意末尾的 `GROUPING()` 函数。对于这些值，也按降序排序。对于\
  \ `ORDER BY` 子句中的所有其他列，按升序排序。（提醒：如果未包含 `ASC` 关键字，则默认为升序排序。）\n\n让我们执行查询并查看结果。\n请参考图\
