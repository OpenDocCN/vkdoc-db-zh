  \n### VAR() 和 VARP() 函数\n\n`VAR()` 和 `VARP()` 函数用于计算数据样本中一组值的方差。与 `STDEV()/STDEVP()`\
  \ 示例中使用的数据集相关的相同讨论，也适用于 `VAR()` 和 `VARP()` 函数相对于数据总体的情况。\n\n当整个数据集未知或不可用时，`VAR()`\
  \ 函数在数据的部分集合上工作；而当整个数据集总体已知时，`VARP()` 函数在整体数据集总体上工作。\n\n因此，如果你的数据集包含十行，函数名以 P 结尾的在处理值时将包含全部十行；不以字母\
  \ P 结尾的则会查看 N – 1 行（即 10 – 1 = 9 行）。\n\n那么，*方差* 到底是什么意思呢？\n\n通俗地说，如果你取每个值与平均值的所有差值，将结果平方，然后将所有结果相加，最后除以数据样本的数量，你就得到了方差。\n\
  \n对于我们的场景，假设我们有一些数据预测了我们某一产品在特定年份的销售额。当产品的销售数据最终生成后，我们希望看到销售数字与预测值有多接近或多远。它回答了以下问题：\n\
  \n*   我们是否未达到目标？\n*   我们是否达到了目标？\n*   我们是否超出了目标？\n\n顺便提一下，这个统计公式也在附录 B 中讨论。我们将编写\
  \ TSQL 代码来复制 `STDEV()` 和 `VAR()` 函数。让我们看看它们是否能得到相同的结果！\n\n让我们查看在清单 2-10 中使用这些函数的查询。\n\
  \n```sql\nWITH CustomerPurchaseAnalysis\n(PurchaseYear,PurchaseMonth,StoreNo,ProductNo,CustomerNo,TotalSalesAmount)\n\
  AS\n(\nSELECT\nYEAR(CalendarDate)  AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
  StoreNo,\nProductNo,\nCustomerNo,\nSUM(TransactionQuantity * UnitRetailPrice) AS\
  \ TotalSalesAmount\nFROM StagingTable.SalesTransaction\nGROUP BY YEAR(CalendarDate),MONTH(CalendarDate),\n\
  ProductNo,CustomerNo,StoreNo\n)\nSELECT\ncpa.PurchaseYear,\ncpa.PurchaseMonth,\n\
  cpa.StoreNo,\ncpa.ProductNo,\nc.CustomerNo,\nc.CustomerFullName,\nCONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)\
  \ AS TotalSalesAmount,\nAVG(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(\n\
  ORDER BY cpa.PurchaseMonth) AS AvgPurchaseCount,\nVAR(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS VarTotalSales,\nVARP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS VarpTotalSales,\nVAR(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\n) AS VarTotalSales,\nVARP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
  \ OVER(\n) AS VarpYearTotalSales\nFROM CustomerPurchaseAnalysis cpa\nJOIN DimTable.Customer\
  \ c\nON cpa.CustomerNo = c.CustomerNo\nWHERE cpa.CustomerNo = 'C00000008'\nAND PurchaseYear\
  \ = 2011\nAND ProductNo = 'P00000038114';\nGO\n```\n清单 2-10\n计算销售方差\n\n基本上，我复制粘贴了标准差查询，并将\
  \ `STDEV()` 函数替换为 `VAR()` 函数。使用了常见的 CTE。我还注释掉了 Product 和 Customer 列，因为从 `WHERE`\
  \ 子句可以看出，它们只针对一个客户和一个产品。我这样做是因为结果列太多，显示效果不好。\n\n当你测试这些查询时，请随意取消注释它们，并获取多个客户的结果。同时显示客户和产品信息。\n\
  \n让我们在图 2-21 中查看结果。\n\n![](img/527021_1_En_2_Fig21_HTML.png)\n\n图 2-21\n比较样本方差与总体方差\n\
  \n平均值和前两个方差列是按月滚动的值，如每个月的不同值所示。这些只包含 `ORDER BY` 子句，因此默认的窗口帧行为是：\n\n```sql\nRANGE\
  \ BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n```\n\n最后两列既未指定 `PARTITION BY` 也未指定\
  \ `ORDER BY` 子句，因此默认行为是：\n\n```sql\nROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED\
  \ FOLLOWING\n```\n\n如果你还没有这样做，请下载本章的代码并尝试这些示例。对于此示例，请取消客户和产品相关列的注释。当你熟悉代码后，也尝试查询多年的数据，然后是多个客户和产品的数据。最后，尝试调整\
  \ `RANGE` 和 `ROWS` 子句，看看它们如何影响窗口帧行为。\n\n关于报告生成的一点建议：你不希望生成一份数据过多以至于无法阅读的报告。你可以创建一个\
  \ SSRS（SQL Server Reporting Services）可以使用的查询，其中包含所有客户、产品和年的数据。你需要做的只是在 SSRS 报告中添加一些过滤器，这样用户就可以从下拉列表中选择他们想要查看的过滤器组合。\n\
  \n\n\n## SQL Server 2022：命名窗口示例\n\n让我们通过创建一个使用 `AVG()` 函数与 `OVER()` 子句的查询，来探索 SQL\
  \ Server 2022 中的新 `WINDOW` 功能。我们将按常规方式收集 `IO` 和 `TIME` 统计信息，并生成查询计划，以观察此新功能对性能的影响。\n\
  \n如果查询计划建议创建索引（由于没有任何索引，它通常会建议），我们将创建该索引，然后再次运行查询，并查看新的查询计划和统计信息。\n\n注意：我是在 SQL\
  \ Server 2022 的评估版上运行此示例的。欢迎下载安装。同时，也请研究一下此版本的其他新功能。跟进最新版本的变化非常重要。\n\n请参考清单 `2-11`\
  \ 查看查询代码。\n\n```\nWITH CustomerPurchaseAnalysis\n(PurchaseYear,PurchaseMonth,CustomerNo,TotalSalesAmount)\n\
  AS\n(\nSELECT\nYEAR(CalendarDate)  AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
  CustomerNo,\nSUM(TransactionQuantity * UnitRetailPrice) AS TotalSalesAmount\nFROM\
  \ StagingTable.SalesTransaction\nGROUP BY YEAR(CalendarDate),MONTH(CalendarDate),CustomerNo\n\
  )\nSELECT\ncpa.PurchaseYear,\ncpa.PurchaseMonth,\nc.CustomerNo,\nc.CustomerFullName,\n\
  cpa.TotalSalesAmount,\nAVG(cpa.TotalSalesAmount) OVER (SalesWindow) AS AvgTotalSales\n\
  FROM CustomerPurchaseAnalysis cpa\nINNER JOIN StagingTable.Customer c ON cpa.CustomerNo\
  \ = c.CustomerNo\nWINDOW SalesWindow AS (\nPARTITION BY cpa.PurchaseYear\nORDER\
  \ BY cpa.PurchaseYear ASC, cpa.PurchaseMonth ASC\n)\nORDER BY cpa.PurchaseYear,\
  \ cpa.PurchaseMonth, c.CustomerNo\n```\n清单 2-11\n按年、月和客户计算平均值\n\n![](img/527021_1_En_2_Figa_HTML.png)\n\
  一段 A C T E 代码。第一行读作：A V G 开括号 c p a 点 total sales amount 关括号 OVER sales window as\
  \ a v g total sales。第六行读作：WINDOW sales window as，括号内为语句。一个箭头从第六行指向第一行。\n\n和往常一样，我们使用\
  \ `CTE` 代码结构来搭建查询。当然，`CTE` 语法没有变化。我们想要做的是按年、月和客户计算总销售额。我们在 `CTE` 中使用了 `SUM()` 函数，因此需要包含一个\
  \ `GROUP BY` 子句。\n\n该查询引用了 `CTE` 并计算所有总和值的平均值。这次，`OVER()` 子句只是引用了一个定义了 `PARTITION`\
  \ 和 `ORDER BY` 子句的块的名称。这个块名为 `SalesWindow`，在查询末尾声明。\n\n新的 `WINDOW` 命令后跟名称 `SalesWindow`，然后在括号内声明\
  \ `PARTITION BY` 和 `ORDER BY` 子句：\n\n```\nWINDOW SalesWindow AS (\nPARTITION BY\
  \ cpa.PurchaseYear\nORDER BY cpa.PurchaseYear ASC,cpa.PurchaseMonth ASC\n)\n```\n\
  \n执行查询后，我们得到如图 `2-22` 所示的结果。\n\n![](img/527021_1_En_2_Fig22_HTML.png)\nS Q L S S\
  \ M S 窗口的截图。它展示了一个包含 7 列和 28 行的表格。列标题为购买年份、购买月份、客户编号、客户全名、总销售额和平均总销售额。每行包含不同的值。\n\
  图 `2-22` 查询结果\n\n此查询生成了 36 行。足够大以评估结果。这里没有意外，按预期工作。\n\n滚动平均值似乎有效。让我们生成一个查询计划，看看是否有任何索引建议，或者更重要的是，此新功能是否在查询计划中生成了更多或更少的步骤。\n\
