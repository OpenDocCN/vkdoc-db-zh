  #### 随堂测验


  成本（cost）意味着什么？它是指一个步骤执行所需的时间，还是基于 IO、内存使用和 CPU 成本的加权人工值？



  '
- "# AVG() 函数\n\n## 函数概述\n\n`AVG()` 函数计算表中某列所代表数据集的平均值。\n\n其语法如下：\n\n```\nAVG(ALL|DISTINCT\
  \ *) or AVG(ALL|DISTINCT column_name)\n```\n\n## 示例说明\n\n按照惯例，我们通过一个简单的示例来看看在函数调用中包含\
  \ `ALL` 或 `DISTINCT` 关键字对结果产生的影响。\n\n请参考清单 5-10。\n\n```\nUSE TEST\nGO\n-- 简单示例\n\
  DECLARE @AVGMaxExample TABLE (\nValueType VARCHAR(32),\nExampleValue SMALLINT\n\
  );\nINSERT INTO @AVGMaxExample VALUES\n('Type 1',20),\n('Type 1',20),\n('Type 1',30),\n\
  ('Type 2',40),\n('Type 2',60),\n('Type 3',60);\nSELECT AVG(ExampleValue)       \
  \             AS AVGExampleValue\nFROM @AVGMaxExample;\nSELECT AVG(ALL ExampleValue)\
  \                AS AVGExampleValueALL\nFROM @AVGMaxExample;\nSELECT AVG(DISTINCT\
  \ ExampleValue)           AS AVGExampleValueDISTINCT\nFROM @AVGMaxExample;\nSELECT\
  \ ValueType,AVG(ExampleValue)          AS AVGExampleValue\nFROM @AVGMaxExample\n\
  GROUP BY ValueType;\nSELECT ValueType,AVG(ALL ExampleValue)      AS AVGExampleValueALL\n\
  FROM @AVGMaxExample\nGROUP BY ValueType;\nSELECT ValueType,AVG(DISTINCT ExampleValue)\
  \ AS AVGExampleValueDISTINCT\nFROM @AVGMaxExample\nGROUP BY ValueType;\nGO\nListing\
  \ 5-10\n测试查询\n```\n\n使用一个加载了六行数据的表变量，我们想查看按类型计算的平均值结果。用简单的数据来理解这一点很关键，因为如果你不确定为重复数据与不同数据生成的结果，那么在查询数十万或数百万行时，你将在结果中产生严重的错误。这可能会变得非常严重！\n\
