  ## 数据间隙与岛屿问题


  这最后一组脚本解决了经典的“间隙与岛屿”问题。回想一下，在我们的场景中，间隙是指一系列连续日期中缺失的日期，而岛屿则是客户为特定金融工具执行交易的连续日期集群。


  这应该很有趣，因为需要采取很多步骤，我们将看到数据在每一步是如何转换的，直到生成最终报告。


  我们将从 `LIBOR`（伦敦银行同业拆借利率）金融工具的交易日间隙开始。该脚本将分为五个步骤：第一步是加载测试数据，其余四步用于创建链式 `CTE` 以及生成所需报告的最终查询。用于识别岛屿的脚本将有四个步骤：三步用于创建链式
  `CTE`，一步用于生成报告。


  **注意**


  我所说的链式 `CTE`，是指 `CTE` 查询前一个 `CTE`，直到最后一步，该查询引用链或序列中的最后一个 `CTE`。


  我们的业务分析师希望我们创建一个查询，用于识别客户 C0000005 的交易日期中的间隙和岛屿（我们暂且放过客户 C0000001）。如前所述，我们将只关注 `LIBOR`
  利率，并且只针对 2012 年。报告应包括间隙和岛屿的开始和停止日期，以及一列列出每种数据模式类别对应的日期。


