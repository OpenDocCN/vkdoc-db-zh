  \ x 的控制流页面。该页面描绘了添加任务的块流程图。\n\n## 完成的 SSIS 包\n\n剩下的就是运行任务以查看其是否配置正确。此时无需运行整个包，但进行最终测试以查看是否一切执行成功是一个好主意。\n\
