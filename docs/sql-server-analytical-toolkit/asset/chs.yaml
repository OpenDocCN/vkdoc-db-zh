  GO\n```\n**清单 10-10**\n针对大表查询的建议索引\n\n估计查询计划生成器指出，创建此索引将使成本降低 48.25%。让我们看看。\n\n\
  `CREATE INDEX` 命令运行了 11 秒！这是因为我们的表里有 250 万行数据。让我们看看新的估计执行计划是什么样子。\n\n我将把计划分成两部分。\n\
