  \ 函数。\n\n\n\n## PERCENTILE_DISC() 函数\n\n这里是我们关于离散百分位的示例。`PERCENTILE_DISC()` 函数在基于指定百分位的一组离散数据上进行计算，并返回数据集中满足该百分位要求的值。\n\
  \n还记得离散数据吗？\n\n离散数据的值是那些可以随时间计数的数字。同样需要记住的是，使用此函数时，返回的值是存在于数据集中的；它不像 `PERCENTILE_CONT()`\
  \ 函数那样进行插值计算。\n\n我们的分析师为下一份报告提交了以下业务需求：\n\n这次我们需要计算按月份汇总的设备故障总和的离散百分位值。也就是说，我们每月累加故障次数，然后生成第\
  \ 25、50 和 75 个百分位的离散值。结果需要按工厂名称、工厂内位置、年份、季度和月份分组。\n\n结果需要针对 2008 年。这次我们将回归使用我们可靠的基于\
  \ `CTE` 的查询。\n\n请参考代码清单 10-11。\n\n```sql\nWITH FailedEquipmentCount\n(\nCalendarYear,\
  \ QuarterName, [MonthName], CalendarMonth, PlantName, LocationName, SumEquipFailures\n\
  )\nAS (\nSELECT\nC.CalendarYear\n,C.QuarterName\n,C.[MonthName]\n,C.CalendarMonth\n\
  ,P.PlantName\n,L.LocationName\n,SUM(EF.Failure) AS SumEquipFailures\nFROM DimTable.CalendarView\
  \ C\nJOIN FactTable.EquipmentFailure EF\nON C.CalendarKey = EF.CalendarKey\nJOIN\
  \ DimTable.Equipment E\nON EF.EquipmentKey = E.EquipmentKey\nJOIN DimTable.Location\
  \ L\nON L.LocationKey = EF.LocationKey\nJOIN DimTable.Plant P\nON L.PlantId = P.PlantId\n\
  GROUP BY\nC.CalendarYear\n,C.QuarterName\n,C.[MonthName]\n,C.CalendarMonth\n,P.PlantName\n\
  ,L.LocationName\n)\nSELECT\nPlantName,LocationName,CalendarYear,QuarterName,[MonthName]\n\
  ,CalendarMonth,SumEquipFailures\n-- 来自列表的实际值\n,PERCENTILE_DISC(.25) WITHIN GROUP\
  \ (ORDER BY SumEquipFailures)\nOVER (\nPARTITION BY PlantName,LocationName,CalendarYear\n\
  ) AS [PercentDisc .25]\n,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY SumEquipFailures)\n\
  OVER (\nPARTITION BY PlantName,LocationName,CalendarYear\n) AS [PercentDisc .5]\n\
  ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY SumEquipFailures)\nOVER (\nPARTITION\
  \ BY PlantName,LocationName,CalendarYear\n) AS [PercentDisc .75]\nFROM FailedEquipmentCount\n\
  WHERE CalendarYear = 2008\nGO\n```\n\n代码清单 10-11\n按月设备故障的离散百分位分析\n\n再次注意，我们同时使用了事实表和维度表，因此可以看到多个\
  \ `JOIN` 子句。对于每一个百分位计算，分区是按工厂、位置和年份设置的。`ORDER BY` 子句在对 `PERCENTILE_DISC()` 函数的三次调用中都引用了\
  \ `SumEquipFailures` 列（记住，这次返回的值应该存在于数据集中）。\n\n请参考图 10-24 中的部分结果。\n\n![](img/527021_1_En_10_Fig32_HTML.png)\n\
  \n图 10-24\n工厂设备故障的离散百分位分析\n\n这是一张 SQL Server Management Studio (SSMS) 窗口的截图，其中显示了一个包含\
  \ 11 列、72 行的表格。列标题为：工厂名称、位置名称、日历年、季度名称、月份名称、日历月、设备故障总和、以及第 0.25、0.50 和 0.75 个百分位。第\
  \ 1 到 3 行和第 5 到 10 行的故障数据被高亮显示。\n\n是的，返回的值确实存在，并且我们看到有一些重复值（ties），这完全正常，因为不同设备在同一月份的故障总数有可能相同。可能是不同的设备，但它们的故障数可以相同也可以不同。\n\
  \n### 性能考虑\n\n让我们看看在性能方面，离散百分位函数与连续百分位函数的工作方式有何异同。我们来生成通常的基线估计查询计划，并将其分解成几部分，因为它会是一个大计划。\n\
