  \n就是这样。您现在可以将 `SSIS` 添加到您的 SQL Server BI 工具包中的工具之一了。让我们来总结本章内容。\n\n> **提示**\n> 我鼓励您下载最新的\
  \ Visual Studio 社区版并添加 `SSIS` 和数据工具/组件。在撰写本文时，它应该是 Visual Studio 2022 社区版。\n> 学习基础知识，构建一些东西，破坏它，然后修复它。这就是学习的方式！\n\
  \n### 总结\n\n这是我们关于库存管理的三章系列中的第一章。我们查看了一些简单的业务数据模型，以便熟悉我们在查询中使用的数据库。\n\n我们还继续学习了\
  \ `SSIS`，这是 Microsoft 用于创建 ETL（提取、转换和加载）过程的旗舰 ETL 工具，用于将数据从一个源提取、转换并加载到另一个源。我们使用此工具从存储与模型火车相关产品库存水平的事务数据库中提取库存移动数据，并将事务数据加载到数据仓库中以便进行分析。\n\
  \n我们完成了通常的查询创建，这些查询使用了聚合窗口函数，并使用估计的查询计划工具以及 SQL Server 提供的各种性能统计设置进行了分析。\n\n最后，我们增强了我们的\
  \ SSIS 进程：调用一个包不仅要加载表，还要创建索引并处理 SSAS 多维数据集。\n\n下一章见，我们将针对库存数据库研究排名窗口函数。\n\n\n"
- "# 第 12 章 库存用例：排名函数\n\n欢迎来到本书的倒数第三章。希望您享受这段学习旅程。本次我们将针对库存数据库和库存数据仓库，运用四种排名窗口函数。我们将执行常规的结果分析并进行一些性能分析，但同时也会逐步指导您如何使用\
  \ Microsoft Report Builder 创建网页报告，并将其发布到由 `SSRS`（SQL Server Reporting Services）——微软首屈一指的报告架构——实现的网站上。\n\
  \n不仅如此，我们还将逐步创建一个简单的 Power BI 报告和仪表板，它们将提供一些相当出色的图表和报告。我们会将这些内容发布到运行在您笔记本电脑或工作站上的个人\
  \ `SSRS` 服务器网站和 Power BI 服务器网站。\n\n最后，本章将包含大量插图，因为我深信通过图表、曲线图和屏幕截图进行学习，效果甚至优于阅读文字（嗯，几乎如此）。一图胜千言！而且在您尝试这些工具时，图表也更易于理解。\n\
  \n至于窗口函数，我们将遵循惯常的流程：定义业务规范、创建并运行查询、分析数据，然后生成估计的查询计划以及 `IO` 和 `TIME` 统计信息，以分析查询性能。\n\
  \n毕竟，我们遵循的是一种“食谱式”的方法来学习窗口函数，所以我们就按照刚才描述的步骤来操作。顺便说一句，本章有九份代码清单，但有 59 张插图和一张图表。我们要学习的内容很多。\n\
  \n## 排名函数\n\n以下是此类中的四个函数：\n\n*   `RANK()`: `不`支持 `ROWS` 和 `RANGE` 规范\n*   `DENSE_RANK()`:\
  \ `不`支持 `ROWS` 和 `RANGE` 规范\n*   `NTILE()`: `不`支持 `ROWS` 和 `RANGE` 规范\n*   `ROW_NUMBER()`:\
  \ `不`支持 `ROWS` 和 `RANGE` 规范\n\n前两个用于对分区中的结果进行排名，第三个允许您对查询返回的数据定义数据桶。`NTILE()` 函数在分类方案中效果很好。\n\
  \n最后一个函数 `ROW_NUMBER()` 是我们的主力函数，用于在整个数据集或数据集内的分区中生成行号。不过，我们将把它用于不同的目的。该函数可用于通过一些巧妙的逻辑生成随机数据。\n\
  \n这些函数都不支持 `ROW` 和 `RANGE` 窗口框架规范，如果您理解了这些函数的作用，就会觉得这很合理。\n\n我们将从对排名函数进行常规分析开始。也就是说，我们查看友好的业务分析师提交的业务规范，创建支持需求的脚本，并运行脚本以查看结果。接下来，我们像之前那样生成估计的查询计划，以便分析并在可能的情况下改进查询的性能。当然，我们还将查看\
  \ `IO`、`TIME` 和 `PERFORMANCE STATISTICS`，以更深入地探究执行步骤和成本。\n\n让我们从讨论 `RANK()` 函数开始，我们将把它应用于我们的库存数据。\n\
  \n### RANK( ) 函数\n\n回想一下，`RANK()` 函数根据被排名的值，返回当前行之前的行数加上当前行。让我们看看业务分析师的规范是什么：\n\n\
  分析师希望看到一些关于库存出库移动的统计数据。\n\n具体来说，报告需要为产品 \"P209\"、仓库 \"WH111\"、库存 \"INV1\" 和库位 \"\
  LOC1\" 的移动分配一个排名。报告需要明确显示日历季度和月份名称，而不是仅仅显示数字。\n\n最初此报告需要针对 2010 年，但像往常一样，一旦报告没有错误，就需要能够轻松修改以支持多年、多产品等，甚至用于\
  \ `SSRS` 报告或 Power BI 计分卡。\n\n顺便说一句，对于任何模型火车爱好者来说，产品 \"P209\" 是一款“瑞士制 1 型客运车厢”。\n\
  \n以下是基于 `CTE` 的查询，它将满足此要求。\n\n请参考清单 12-1。\n\n```\nWITH MonthlyInventoryMovement\
  \ (\nMovementYear,MovementQuarter,MovQtrName,MovementMonth,MovMonthName\n,InvId,LocId,WhId,ProdId,MonthlyDecrementMovement\n\
  )\nAS\n(\nSELECT YEAR(MovementDate) AS MovementYear\n,DATEPART(qq,MovementDate)\
  \ AS MovementQuarter\n,CASE\nWHEN DATEPART(qq,MovementDate) = 1 THEN '1st Quarter'\n\
  WHEN DATEPART(qq,MovementDate) = 2 THEN '2nd Quarter'\nWHEN DATEPART(qq,MovementDate)\
  \ = 3 THEN '3rd Quarter'\nWHEN DATEPART(qq,MovementDate) = 4 THEN '4th Quarter'\n\
  END AS MovQtrName\n,MONTH(MovementDate) AS MovementMonth\n,CASE\nWHEN MONTH(MovementDate)\
  \  = 1 THEN 'Jan'\nWHEN MONTH(MovementDate)  = 2 THEN 'Feb'\nWHEN MONTH(MovementDate)\
  \  = 3 THEN 'Mar'\nWHEN MONTH(MovementDate)  = 4 THEN 'Apr'\nWHEN MONTH(MovementDate)\
  \  = 5 THEN 'May'\nWHEN MONTH(MovementDate)  = 6 THEN 'June'\nWHEN MONTH(MovementDate)\
  \  = 7 THEN 'Jul'\nWHEN MONTH(MovementDate)  = 8 THEN 'Aug'\nWHEN MONTH(MovementDate)\
  \  = 9 THEN 'Sep'\nWHEN MONTH(MovementDate)  = 10 THEN 'Oct'\nWHEN MONTH(MovementDate)\
  \  = 11 THEN 'Nov'\nWHEN MONTH(MovementDate)  = 12 THEN 'Dec'\nEND AS MovMonthName\n\
  ,InvId,LocId,WhId,ProdId\n,SUM(Decrement) AS MonthlyDecrementMovement\nFROM Product.InventoryTransaction\n\
  GROUP BY YEAR(MovementDate)\n,DATEPART(qq,MovementDate)\n,MONTH(MovementDate)\n\
  ,InvId\n,LocId\n,WhId\n,ProdId\n)\nSELECT MovementYear\n,MovementQuarter\n,MovQtrName\n\
  ,MovementMonth\n,MovMonthName\n,LocId\n,InvId\n,WhId\n,ProdId\n,MonthlyDecrementMovement\n\
  ,RANK() OVER (\nPARTITION BY MovementYear\nORDER BY MonthlyDecrementMovement DESC\n\
  ) AS DecRank\nFROM MonthlyInventoryMovement\nWHERE MovementYear = 2010\nAND LocId\
  \ = 'LOC1'\nAND InvId = 'INV1'\nAND WhId = 'WH111'\nAND ProdId = 'P209'\nGO\n```\n\
  清单 12-1\n为瑞士客运车厢模型排名库存出库移动\n\n我们首先注意到的是 `SELECT` 子句中的两个大型 `CASE` 语句。正如业务需求中强调的，业务分析师希望看到明确写出的季度和月份名称，因此我们需要此逻辑来解码这些数据部分的数值。我们的日历表相当简单，一个明确的改进性能的方法是添加季度和月份的文本版本，这样我们就可以通过避免在\
  \ `SELECT` 子句中使用 `CASE` 块来提高性能。\n\n**作业**\n\n使用两条 `ALTER` 和一条 `UPDATE` 命令，添加列以支持日历季度和日历月份的文本版本。在\
  \ `APInventory.MasterData.Calendar` 表和 `APInventory.Dimension.Calendar` 维度表中实现此修改。\n\
  \n接下来，让我们检查一下 `OVER()` 子句。我们看到一个引用了 `MovementYear` 列的 `PARTITION BY` 子句和一个引用了 `MonthlyDecrementMovement`\
  \ 列的 `ORDER BY` 子句。值按降序排序。\n\n\n请记住，我们不需要在`PARTITION BY`子句中引用年份列，因为我们有一个`WHERE`子句，它仅过滤\
  \ 2010 年的结果。我们的分析师希望看到所有年份的数据，因此当提出此请求时，这将派上用场。目前保留它似乎不影响性能。你可以自己尝试一下，运行一个带有该列的基线估计查询计划，然后再运行一个不带该列的计划。别忘了为每次测试运行`DBCC`命令。\n\
