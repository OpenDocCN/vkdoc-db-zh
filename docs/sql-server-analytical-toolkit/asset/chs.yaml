  \n### 查询数据仓库\n\n现在，让我们用一个类似的查询（称为 `SNOWFLAKE` 查询）来查询我们库存数据仓库中的事实表。\n\n小测验\n\n为什么这被称为\
  \ `SNOWFLAKE` 查询？答案稍后揭晓。\n\n此查询的业务需求与之前相同，因此我将不再赘述。\n\n基于我们之前的讨论，我实施了`Calendar`维度表的更改，使其包含支持季度和月份名称的文本列。这应该会提高速度。\n\
  \n该查询仍然基于`CTE`，并且因为它针对`SNOWFLAKE`模式执行，所以包含许多表连接。代码清单相当长，但我建议你通读一遍，以理解所有逻辑和要点。\n\n\
  请参见代码清单 12-3。\n\n```sql\nWITH WarehouseCTE (\nInvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName\n\
  ,InventoryId,WarehouseId,WarehouseId,ProductId,ProductName\n,ProductType,ProdTypeName,MonthlyQtyOnHand\n\
  )\nAS ( -- 返回 24,192 行\nSELECT C.CalendarYear        AS InvYear\n,C.CalendarMonth\
  \     AS InvMonthNo\n,C.CalendarTxtMonth  AS InvMonthMonthName\n,L.LocId       \
  \      AS LocationId\n,L.LocName           AS LocationName\n,I.InvId           \
  \  AS InventoryId\n,W.WhId              AS WarehouseId\n,W.WhName            AS\
  \ WarehouseName\n,P.ProdId            AS ProductId\n,P.ProdName          AS ProductName\n\
  ,P.ProdType          AS ProductType\n,PT.ProdTypeName     AS ProdTypeName\n,SUM(IH.[QtyOnHand])\
  \ AS MonthlyQtyOnHand\nFROM [Fact].[InventoryHistory] IH -- WITH (INDEX(ieInvHistCalendar))\n\
  JOIN [Dimension].[Location] L\nON IH.LocKey = L.LocKey\nJOIN [Dimension].[Calendar]\
  \ C\nON IH.CalendarKey = C.CalendarKey\nJOIN [Dimension].[Warehouse] W\nON IH.WhKey\
  \ = W.WhKey\nJOIN [Dimension].[Inventory] I\nON IH.[InvKey] = I.InvKey\nJOIN [Dimension].[Product]\
  \ P\nON IH.ProdKey = P.ProdKey\nJOIN [Dimension].[ProductType] PT\nON P.ProductTypeKey\
  \ = PT.ProductTypeKey\nGROUP BY C.CalendarYear\n,C.CalendarMonth\n,C.CalendarTxtMonth\n\
  ,L.LocId\n,L.LocName\n,I.InvId\n,W.WhId\n,W.WhName\n,P.ProdId\n,P.ProdName\n,P.ProdType\n\
  ,PT.ProdTypeName\n)\nSELECT InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName\n\
  ,InventoryId,WarehouseId, ProductType,ProductId,ProdTypeName\n,MonthlyQtyOnHand\n\
  ,RANK() OVER (\nORDER BY MonthlyQtyOnHand DESC\n) QtyOnHandRank\nFROM WarehouseCTE\n\
  WHERE InvYear= 2010\nAND LocationId = 'LOC1'\nAND InventoryId = 'INV1'\nAND WarehouseId\
  \ = 'WH111'\nAND ProductId = 'P041'\nGO\n```\n\n代码清单 12-3\n\n用于排名报告的 SNOWFLAKE 查询\n\
  \n此查询包含所有要素：一个`CTE`、以`SNOWFLAKE`查询形式进行的多个连接，以及一个`WHERE`子句。\n\n请注意，在此版本的查询中，我删除了`PARTITION\
  \ BY`子句，因为`WHERE`子句过滤器将结果限制为单一年份、地点、库存、仓库和产品。唯一需要的是包含引用此库存位置月度数量总和的`ORDER BY`子句。让我们查看结果。\n\
  \n请参见图 12-6 中的部分结果。\n\n![](img/527021_1_En_12_Fig6_HTML.png)\n\nch 12 排名查询 sql 窗口截图。它以表格形式呈现结果，包含\
  \ 12 列：库存年份、月份数字、月份名称、地点 I D、地点名称、库存 I D、仓库 I D、产品类型、产品 I D、名称、月度在库数量和在库数量排名。\n\n\
  图 12-6\n\nSNOWFLAKE 查询结果\n\n看起来成功了。它在不到一秒的时间内返回了 12 行。此表有 736,320 行，所以我认为到目前为止，我们应该对其性能印象深刻。让我们查看此查询的基线估计查询计划。\n\
  \n请参见图 12-7。\n\n![](img/527021_1_En_12_Fig7_HTML.png)\n\nch 12 排名查询 sql 窗口截图。它展示了查询成本的执行计划。箭头指向哈希匹配成本\
  \ 1%、表扫描成本 2%、嵌套循环成本 47% 和索引查找成本 47%。\n\n图 12-7\n\n\n\n### 基线估计查询计划\n\n## 查询计划分析概述\n\
  \n从右下角的分支开始，我们看到对事实表进行了索引查找，这是一个良好的开端。在`Product`维度表和`Product Type`外挂维度表之间存在一个高成本的嵌套循环连接操作，但这些表的行数很小，所以这不是问题。我们可以考虑对`Product`表进行反规范化，将产品类型列加入其中以消除此连接。这是值得考虑的一点。\n\
  \n### 注意\n\n将外挂表与主维度表合并会消除连接，但另一方面会使维度表变大，这意味着在查询处理时，内存页面中能容纳的行数更少。因此，总是需要权衡取舍。是选择更少的连接操作，还是更大的表？\n\
  \n我曾认为为`Calendar`维度表添加索引并使用表提示可能会改善查询计划，但事实并非如此。如果该索引是聚集索引，它可能会有帮助。\n\n其他所有的哈希连接成本都为零，因此我们不再关注它们。\n\
  \n我们的`Calendar`维度表进行了 2%的表扫描。能否通过在代理键上创建聚集索引来改进？\n\n查看以下代码：\n\n```sql\nCREATE UNIQUE\
  \ CLUSTERED INDEX ieCalendarKey\nON [Dimension].Calendar\nGO\n```\n\n让我们创建这个聚集索引，然后查看修改后的估计执行计划。\n\
  \n请参考图 12-8。\n\n![](img/527021_1_En_12_Fig8_HTML.png)\n\nA screenshot of c h 12\
  \ ranking query s q l window. It presents the execution plan for query cost. An\
  \ arrow points to clustered index cost 2%. Other costs are hash match, table scan,\
  \ Nested loops, and index seek costs.\n\n图 12-8\n使用聚集`Calendar`索引的修改后估计执行计划\n\n\
  我很高兴地说这奏效了。由于使用了聚集索引，因此不需要表提示。\n\n我们看到在`Calendar`表上进行了聚集索引扫描。该维度有 7,670 行，因此对于这个大小的表，我们可以得出结论：在代理键上创建聚集索引，它很可能就会被使用！\n\
  \n### 小测验答案\n\n为什么这被称为`SNOWFLAKE`查询？\n\n**答案**\n\n因为它连接了维度表和外挂表，使得模型看起来像`SNOWFLAKE`。如果数据库是作为`STAR`模式实现的，那么针对它的查询就是`STAR`查询。有道理吧？\n\
  \n为了帮助你巩固知识，以下是另一个小测验，以免你忘记性能分析和调优的基础知识。\n\n### 另一个小测验\n\n为什么每次执行性能分析和查询调优时都需要运行`DBCC`命令？\n\
  \n## `DENSE_RANK()` 函数\n\n回顾第 4 章，`DENSE_RANK()`函数的工作方式与`RANK()`函数几乎相同。在出现并列的情况下，并列的排名值相同，但重复值之后的下一个值会被简单地分配下一个排名数字。因此，如果并列的密集排名是\
  \ 4，那么下一个更高值的排名就是 5。我认为这很合理。\n\n`RANK()`函数的结果则不然。如果你有五个并列值为 6，并列的当前排名是 4，那么下一个排名是\
  \ 9（5 个并列值 + 当前排名值 4 = 9）。这确实有点奇怪。\n\n我们之前见过这个函数，但让我们再应用一次，这次用于我们的库存业务场景。以下是业务需求说明：\n\
  \n基本上，业务分析师喜欢我们之前给他们的报告。这次他们想创建相同的报告，但添加`DENSE_RANK()`函数，以便查看每个函数如何处理并列情况。\n\n这是一个很容易满足的需求，我们只需复制粘贴之前的查询并添加新的排名窗口函数即可。`TSQL`强调代码重用！为什么要重新发明轮子？\n\
  \n以下是我们得出的结果。\n\n请参考清单 12-4。\n\n```sql\nWITH MonthlyInventoryMovement (\nMovementYear,MovementQuarter,MovementMonth,InvId,LocId,WhId\n\
  ,ProdId,MonthlyDecrementMovement\n)\nAS\n(\nSELECT YEAR(MovementDate)        AS\
  \ MovementYear\n,DATEPART(qq,MovementDate) AS MovementQuarter\n,MONTH(MovementDate)\
  \       AS MovementMonth\n,InvId\n,LocId\n,WhId\n,ProdId\n,SUM(Decrement) AS MonthlyDecrementMovement\n\
  FROM Product.InventoryTransaction\nGROUP BY YEAR(MovementDate)\n,DATEPART(qq,MovementDate)\n\
  ,MONTH(MovementDate)\n,InvId\n,LocId\n,WhId\n,ProdId\n)\nSELECT MovementYear\n,MovementQuarter\n\
  ,MovementMonth\n,LocId\n,InvId\n,WhId\n,ProdId\n,MonthlyDecrementMovement\n,RANK()\
  \ OVER (\nPARTITION BY MovementYear\nORDER BY MonthlyDecrementMovement DESC\n) AS\
  \ DecRank\n,DENSE_RANK() OVER (\nPARTITION BY MovementYear\nORDER BY MonthlyDecrementMovement\
  \ DESC\n) AS DecDEnseRank\nFROM MonthlyInventoryMovement\nWHERE MovementYear = 2010\n\
  AND LocId = 'LOC1'\nAND InvId = 'INV1'\nAND WhId = 'WH111'\nAND ProdId = 'P209'\n\
  GO\n```\n\n清单 12-4\n比较 `RANK()` 与 `DENSE_RANK()` 的排名结果\n\n这里没什么需要详细解释的，我们已经看过这个查询了。分区是按移动年份设置的，`ORDER\
  \ BY`子句按月递减总和降序排列。当此查询用于填充报告表时，可以移除`WHERE`子句，配合过滤器让业务用户可以选择要使用的值。\n\n### 注意\n\n\
  在我看来，我使用的编码风格——将每个列单独列在一行——使查询易于理解。这只是我的观点。我知道这样会占用更多空间，尤其是在这样一本书里！\n\n回到我们的讨论。我们感兴趣的是看到在库存业务场景中如何处理并列情况。让我们看看结果。\n\
  \n请参考图 12-9 中的部分结果。\n\n![](img/527021_1_En_12_Fig9_HTML.png)\n\nA screenshot of\
  \ c h 12 ranking query s q l window. It presents the results in a table that has\
  \ 10 columns for movement year, Movement quarter, Movement month, Location I d,\
  \ Inventory I d, Warehouse I d, product I d, monthly decrement movement, Decrement\
  \ rank, and Decrement Dence rank.\n\n图 12-9\n`RANK()` 与 `DENSE_RANK()` 对比\n\n递减值的并列情况出现在二月(2)、五月(5)和十二月(12)。在我看来（我之前也说过），`DENSE_RANK()`的值更有意义，因为并列值具有相同的排名值。因此我们可以说，在二月、五月和十二月，产品“P209”的库存减少了\
  \ 63 个单位。\n\n在`RANK()`函数的情况下跳过两个排名值会让人困惑。我们为什么要使用这个？\n\n我在互联网上研究为何应该使用此函数以及在何种情况下使用时，没有找到使用它的理由。如果你知道，请给我发邮件！\n\
  \n让我们继续讨论此函数的性能分析和调优。\n\n\n\n#### 性能考量\n\n图 12-10 是我们估算的基线查询计划。\n\n![](img/527021_1_En_12_Fig10_HTML.png)\n\
  \n一张 `c h 12 ranking query s q l` 窗口的截图。它显示了查询成本的执行计划信息。箭头指向成本为 50% 的 `hash match`、成本为\
  \ 5% 的 `compute scalar` 以及成本为 36% 的 `index seek`。其他成本包括 `sort` 成本、`segment` 成本和\
  \ `compute scalar` 成本。\n\n图 12-10\n\n估算的基线查询计划\n\n看来我们建立的索引开始见效了。`index seek` 的成本是\
  \ 36%。接下来是成本为 5% 的 `compute scalar` 和成本为 50% 的 `hash match` 连接任务。最后，`sort` 任务的成本是\
  \ 9%。\n\n我认为我们需要查看 `STATISTICS PROFILE` 的值，以确切了解这三个任务中发生了什么。让我们列出这些任务中使用的表达式，以便知道要查看什么：\n\
  \n*   `Compute Scalar:` Expr 1003, Expr 1004, Expr 1005\n*   `Hash Match:` Expr\
  \ 1004, Expr 1005\n*   `Sort:` Expr 1004, Expr 1005, Expr 1006\n\n那么这些表达式中使用了什么逻辑？\n\
  \n请参阅图 12-11。\n\n![](img/527021_1_En_12_Fig11_HTML.png)\n\n一张 `c h 12 ranking query\
  \ s q l` 窗口的截图。它显示了 `static profile` 值的结果信息，以及一段 6 行的代码。两个箭头分别指向 `compute scalar`、`Expression\
  \ 1003` 和 `Expression 1004`。`Hash match` 被高亮显示。\n\n图 12-11\n\n`RANK()` 与 `DENSE_RANK()`\
  \ 查询的统计配置文件\n\n这组统计信息深入揭示了查询的处理细节以及问题点可能所在。如果我们查看 `statement text` 列，就能明白具体情况。\n\
  \n图中未显示 `Expr1003`，但其值如下：\n\n*   `Expr1003`=`datepart(year,[APInventory].[Product].[InventoryTransaction].[MovementDate])`,\n\
  \n以下是表达式 `Expr1004` 和 `Expr1005`：\n\n*   `Expr1004`=`datepart(quarter,[APInventory].[Product].[InventoryTransaction].[MovementDate])`\n\
  *   `Expr1005`=`datepart(month,[APInventory].[Product].[InventoryTransaction].[MovementDate])`\n\
  \n这告诉我们，`DATEPART()` 函数调用是导致 `hash match` 任务成本高昂的原因。我们可以通过使用 `Calendar` 表来检索这些值以解决这个问题，尽管这会带来对\
  \ `Calendar` 表进行 `JOIN` 操作的成本（我们创建的聚集索引会有所帮助）。\n\n这是在 `sort` 任务和 `compute scalar`\
  \ 任务中使用的 `Expr1006`：\n\n*   `Expr1006`=`CASE WHEN [Expr1013]=(0) THEN NULL ELSE\
  \ [Expr1014] END))`\n\n看起来这是一个 `CASE` 代码块？显然，提取这些日期部分正在推高这些任务的成本。等等。我们需要看看 `Expr1013`\
  \ 和 `Expr1014`。我们真的深入到细节中了：\n\n*   `Expr1013`=`COUNT_BIG([APInventory].[Product].[InventoryTransaction].[Decrement])`\n\
  *   `Expr1014`=`SUM([APInventory].[Product].[InventoryTransaction].[Decrement])`\n\
  \n看起来最后这两个步骤用于计算 `CTE` 的 `SELECT` 子句中减量的总和以及计数，以便计算排名。\n\n所以这是一次很好的性能分析过程。我们从估算的查询计划开始，然后转到\
  \ `STATISTICS PROFILE` 统计信息。\n\n但这一切告诉了我们什么？\n\n它告诉我们，性能损耗集中在提取年、季、月部分以及 `CTE` 中的\
  \ `SUM()` 函数上。显然，推荐的解决方案是用 `INSERT/SELECT` 语句替换 `CTE` 逻辑，该语句加载一个报表表，这样我们就可以在非高峰时段每天一次隔离这些性能成本！此外，使用增强的\
  \ `Calendar` 表，这样每次加载报表表时就无需提取日期部分了。\n\n### 作业\n\n基于这些新知识，使用 `CTE` 中的查询来创建一个报表表。然后修改基础查询，使其引用报表表而非\
  \ `CTE`，并进行常规的性能调优分析。确保在加载报表表的逻辑中 `JOIN` 到 `Calendar` 表以获取日期部分。看看这是否比使用 `DATEPART()`\
  \ 函数更高效！别忘了在 `Calendar` 表上创建聚集索引。\n\n### 另一个突击测验答案\n\n以下是突击测验的答案。\n\n为什么每次进行性能分析和查询调优时都需要运行\
  \ `DBCC` 命令？\n\n答案\n\n因为我们希望清除可能包含旧查询计划的内存缓存。如果不这样做，你的查询可能会引用已在内存中的对象，你的性能分析结果将受到影响。务必从一张白板开始。\n\
  \n\n\n### NTILE() 函数\n\n还记得这个函数的定义吗？`NTILE()` 函数允许你将数据集中的一行行数据划分为若干个数据块或桶（我更喜欢这个说法）。如果你有一个包含\
  \ 12 行的数据集，并且希望分配四个数据块，那么每个数据块将包含三行。如果你有一个包含 13 行的数据集，并希望分成四个数据块，那么最后一个数据块将比其他块拥有更多的行。这无法控制。\n\
  \n无论如何，当你想要创建数据桶以分析库存水平，从而对需要优先重新订购的产品进行分类和排序时，这个函数就派上用场了。\n\n**注意**\n\n如果你的行数是奇数，比如\
  \ 15 行，并且你决定创建四个数据块，你会得到分别包含四行、四行、四行和三个行的数据块。因此，无法控制什么数据进入哪个数据块；它只是进行划分。\n\n让我们查看一下我们友好的业务分析师提交的业务需求：\n\
  \n我们的业务分析师希望建立一个分类方案，以便在库存需要按优先级补货时收到警报。该报告需要打印出以下消息，同时包含年份、月份、地点、库存、仓库以及当然还有剩余产品：\n\
  \n*   桶 1：优先订购 高优先级警报\n*   桶 2：优先订购 次高优先级警报\n*   桶 3：优先订购 第三优先级警报\n*   桶 4：优先订购\
  \ 第四中等优先级警报\n*   桶 5：优先订购 第五低优先级警报\n\n分析师希望首先为年份 \"2005\"、地点 \"LOC1\"、库存 \"INV1\"\
  \ 和仓库 \"WH111\" 生成一份报告。需要包含所有产品（为了节省空间，我没有使用实际名称，但用户很可能希望看到名称，而不仅仅是代码）。\n\n以下是我们为满足此需求设计的方案。请参考清单\
  \ 12-5。\n\n```sql\nWITH InventoryReOrderAlert (\nInventoryYear,InventoryMonth,LocId,InvId,WhId,ProdId,ItemsRemaining\n\
  )\nAS\n(\nSELECT YEAR(MovementDate)  AS InventoryYear\n,MONTH(MovementDate) AS InventoryMonth\n\
  ,IT.LocId\n,IT.InvId\n,IT.WhId\n,IT.ProdId\n,SUM(IT.Increment - IT.Decrement) AS\
  \ ItemsRemaining\nFROM APInventory.Product.InventoryTransaction IT\nGROUP BY YEAR(MovementDate)\n\
  ,MONTH(MovementDate)\n,IT.LocId\n,IT.InvId\n,IT.WhId\n,IT.ProdId\n)\nSELECT\nInventoryYear\n\
  ,InventoryMonth\n,LocId\n,InvId\n,WhId\n,ProdId\n,ItemsRemaining\n,CASE\nWHEN NTILE(5)\
  \ OVER(\nORDER BY ItemsRemaining ASC\n) = 1 THEN 'Order First High Priority Alert'\n\
  WHEN NTILE(5) OVER(\nORDER BY ItemsRemaining ASC\n) = 2 THEN 'Order Second High\
  \ Priority Alert'\nWHEN NTILE(5) OVER(\nORDER BY ItemsRemaining ASC\n) = 3 THEN\
  \ 'Order Third High Priority Alert'\nWHEN NTILE(5) OVER(\nORDER BY ItemsRemaining\
  \ ASC\n) = 4 THEN 'Order Fourth, Medium Priority Alert'\nWHEN NTILE(5) OVER(\nORDER\
  \ BY ItemsRemaining ASC\n) = 5 THEN 'Order Fifth Low Priority Alert'\nEND AS AlertMessage\n\
  FROM InventoryReOrderAlert\nWHERE InventoryYear = 2005\nAND Locid = 'LOC1'\nAND\
  \ InvId = 'INV1'\nAND WhId = 'WH111'\nORDER BY InventoryMonth\nGO\n```\n清单 12-5\
  \ 设置重新订购优先级警报\n\n我们再次使用了 `CTE` 方法，并且基于我们之前的分析，我们知道在对此查询执行调优分析时会有什么预期。与之前的查询一样，我们使用\
  \ `WHERE` 子句来过滤结果，以便我们可以在少量数据上进行分析和调试（如果需要）。\n\n我们的重点是 `SELECT` 语句中的 `CASE` 块：\n\
  \n```sql\n,CASE\nWHEN NTILE(5) OVER(\nORDER BY ItemsRemaining ASC\n) = 1 THEN 'Order\
  \ First High Priority Alert'\nWHEN NTILE(5) OVER(\nORDER BY ItemsRemaining ASC\n\
  ) = 2 THEN 'Order Second High Priority Alert'\nWHEN NTILE(5) OVER(\nORDER BY ItemsRemaining\
  \ ASC\n) = 3 THEN 'Order Third High Priority Alert'\nWHEN NTILE(5) OVER(\nORDER\
  \ BY ItemsRemaining ASC\n) = 4 THEN 'Order Fourth, Medium Priority Alert'\nWHEN\
  \ NTILE(5) OVER(\nORDER BY ItemsRemaining ASC\n) = 5 THEN 'Order Fifth Low Priority\
  \ Alert'\nEND AS AlertMessage\n```\n\n哇，这个 `CASE` 块调用了五次 `NTILE()` 函数。就预估的查询性能计划而言，这应该会很有趣。\n\
  \n让我们先确保查询有效并查看结果。然后我们可以进行性能分析和调优。\n\n请参考图 12-12。\n\n![一张第 12 章排名查询 SQL 窗口的截图。它以一个\
  \ 8 列的表格形式呈现结果，包括库存年份、库存月份、地点 ID、库存 ID、仓库 ID、产品 ID、剩余物品和警报消息。剩余物品中前三个负 13 的值被高亮显示。](img/527021_1_En_12_Fig12_HTML.jpg)\n\
  图 12-12 分配重新订购优先级\n\n看起来它起作用了。我们看到有三个产品，P113、P037 和 P033，剩余物品数为 -13。这意味着有 13 个订单因为库存无货而延期交付。所以逻辑是有效的，而我们的仓库经理正在抓狂！这可不妙。\n\
  \n让我们看看这个查询的表现如何。\n\n\n#### 性能考量\n\n让我们从生成基线执行计划开始。\n\n请参阅图 12-13。\n\n![](img/527021_1_En_12_Fig13_HTML.png)\n\
  \n一个 ch 12 排名查询 SQL 窗口的截图。它展示了查询成本执行计划的信息。箭头指向排序成本 2%、哈希匹配成本 12%、计算标量成本 9%以及索引查找成本\
  \ 75%。\n\n图 12-13\n\nNTILE 报告的基线估计执行计划\n\n没有被识别为缺失的索引，所以我们有了一个良好的开端。从计划的右上角开始，我们看到一个成本为\
  \ 75%的索引查找，接着是成本为 9%的计算标量和成本为 12%的哈希匹配。接下来是成本为 2%的排序（为了讨论方便，我忽略了成本为 0%的任务）。\n\n\
  我们下分支的成本都是 0%。令人惊讶的是，合并两个分支的嵌套循环连接任务成本也是 0%。在最左侧，我们看到一个成本为 2%的排序任务。\n\n#### 注意\n\
  \n合并连接优于嵌套循环连接。对于嵌套循环连接任务，对于外部表中的每一行，都需要扫描内部表中的所有行。合并连接将它们排列好，这样你就不必扫描所有行来搜索匹配项！这就是为什么你需要索引来帮助查找和扫描。\n\
  \n#### 结论\n\n这是一个性能良好的查询，所以我们保持原样。但好奇心战胜了我。让我们将`CTE`逻辑放入一个`INSERT/SELECT`查询中，以便加载一个报告表。代码清单\
  \ 12-6 是用于该表的`CREATE DDL`语句，后面是加载它的代码。\n\n```sql\nUSE APInventory\nGO\nDROP SCHEMA\
  \ IF EXISTS Reports\nGO\nCREATE SCHEMA Reports\nGO\nDROP TABLE IF EXISTS Reports.InventoryReOrderAlert\n\
  GO\nCREATE TABLE Reports.InventoryReOrderAlert(\nInventoryYear int  NULL,\nInventoryMonth\
  \ int NULL,\nLocId varchar(4)   NOT NULL,\nInvId varchar(4)   NOT NULL,\nWhId varchar(5)\
  \    NOT NULL,\nProdId varchar(4)  NOT NULL,\nItemsRemaining     int NULL\n) ON\
  \ AP_INVENTORY_FG\nGO\nINSERT INTO Reports.InventoryReOrderAlert\nSELECT YEAR(MovementDate)\
  \ AS InventoryYear\n,MONTH(MovementDate) AS InventoryMonth\n,IT.LocId\n,IT.InvId\n\
  ,IT.WhId\n,IT.ProdId\n,SUM(IT.Increment - IT.Decrement) AS ItemsRemaining\nFROM\
  \ APInventory.Product.InventoryTransaction IT\nGROUP BY YEAR(MovementDate)\n,MONTH(MovementDate)\n\
  ,IT.LocId\n,IT.InvId\n,IT.WhId\n,IT.ProdId\nORDER BY YEAR(MovementDate)\n,MONTH(MovementDate)\n\
  ,IT.LocId\n,IT.InvId\n,IT.WhId\n,IT.ProdId\nGO\n```\n代码清单 12-6\n用报告表替代 CTE 逻辑\n\n\
  我使用了与`CTE`相同的名称来命名该表。注意我将它分配给了`Reports`架构。加载此表的代码就是之前作为`INSERT/SELECT`命令一部分的`CTE`查询。你以前见过这些。\n\
  \n基础查询没有改变，因为我使用了`CTE`的名称作为新表的名称，所以让我们深入探讨修订后的估计查询计划。\n\n请参阅图 12-14。\n\n![](img/527021_1_En_12_Fig14_HTML.png)\n\
  \n一个 ch 12 排名查询 SQL 窗口的截图。它展示了查询成本执行计划的信息。箭头指向嵌套循环成本 2%、排序成本 24%和表扫描成本 66%。\n\n\
  图 12-14\n\n显示需要索引的基线估计查询计划\n\n正如运气所使然，我们需要创建一个索引来支持此策略，因为我们看到一个成本为 66%的表扫描和一个成本昂贵的\
  \ 24%排序步骤。让我们构建代码清单 12-7 中所示的建议索引。\n\n```sql\nCREATE NONCLUSTERED INDEX ieYearLocIdInvIdWhIdInventoryMonthProdIdItemsRemaining\n\
  ON Reports.InventoryReOrderAlert (InventoryYear,LocId,InvId,WhId)\nINCLUDE (InventoryMonth,ProdId,ItemsRemaining)\n\
  GO\n```\n代码清单 12-7\n为建议的索引创建 DDL\n\n索引名称很长，我知道，但它具有描述性。\n\n`SQL Server`在建议索引的消息中指出，如果我们构建此索引，查询成本将提高\
  \ 78.2161%。不错。\n\n让我们创建它并重新生成估计的查询计划。\n\n请参阅图 12-15。\n\n![](img/527021_1_En_12_Fig15_HTML.png)\n\
  \n一个 ch 12 排名查询 SQL 窗口的截图。它展示了查询成本执行计划的信息。箭头指向排序成本 40%、嵌套循环成本 7%、排序成本 40%和索引查找成本\
  \ 11%。\n\n图 12-15\n\n修订后的估计执行计划\n\n表扫描被索引查找所取代，但当然，正如我们之前多次看到的那样，排序操作增加了，嵌套循环连接任务的成本也增加了。不妨看看`IO`和`TIME`统计信息。\n\
  \n请参阅图 12-16。\n\n![](img/527021_1_En_12_Fig16_HTML.png)\n\n一个 ch 12 排名查询 SQL 窗口的截图。一个子窗口显示了\
  \ 13 行程序代码。下部屏幕显示了执行计划信息，箭头指向逻辑读取 296、扫描计数 1、逻辑读取 3、物理读取 2 和已用时间 82 毫秒。\n\n图 12-16\n\
  \n修改后查询的 IO 和 TIME 统计信息\n\n这些看起来是很好的统计数据。首先，查询在 1 秒内运行完成，耗时 82 毫秒。非常快。工作表的扫描计数为\
  \ 3，逻辑读取为 296。新的报告表扫描计数为 1，逻辑读取为 3，物理读取为 2。\n\n我认为我们可以再次声明，当数据是历史数据时，我们的报告表策略是一个很好的选择。让我们看看最后一个函数，我们的朋友`ROW_NUMBER()`函数。\n\
  \n#### ROW_NUMBER() 函数\n\n最后但同样重要的是 `ROW_NUMBER()` 函数。作为提醒，我包含了其描述。如果你按顺序阅读了其他章节并且理解了这个函数的工作原理，则无需阅读下一段。可以跳过它。\n\
  \n如果你还记得，这个函数正如其名所示。给定数据结果集中的一组行，它将为数据集（或分区）中的每一行分配一个顺序编号。\n\n根据你设置 `OVER()` 子句以及\
  \ `PARTITION BY` 和 `ORDER BY` 子句的方式，它将为结果集中的每个分区分配行号。也就是说，每次移动到下一个分区时，行号从 1 开始顺序递增，直到分区的最后一行。\n\
  \n这次我们将使用 `ROW_NUMBER()` 函数来帮助生成一些随机数量，以便用于测试目的。在之前的章节中，我们曾使用这个函数来帮助处理“孤岛与间隙”数据现象！\n\
  \n最后，日历季度和月份需要拼写出来，而不仅仅是数值，因此需要一个 `CASE` 代码块。\n\n下一个脚本的业务需求如下：\n\n这个需求有点改变节奏。分析师不想要实际结果，而是希望我们生成一些随机的库存移动数据，以便他们可以创建一些\
  \ Microsoft Excel 的原型图表。他们对于年份为“2002”、产品为“P101”、位置为“LOC1”、库存为“INV1”和仓库为“WH112”的数据感到满意。\n\
  \n这是一个很棒的规格说明，因为它允许我们使用 `ROW_NUMBER()` 函数生成随机数据，而不仅仅是为结果集或分区生成行号。这是一个有价值的机制，但我们之前已经见过这方面的例子了。\n\
  \n无论如何，这是我们为满足此需求而设计的方案。请参考清单 12-8。\n\n```sql\nWITH InventoryMovement (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,ProdId,InvOut,InvIn\n\
  )\nAS\n(\n    SELECT AsOfYear\n        ,CASE\n            WHEN DATEPART(qq,AsOfDate)\
  \  = 1 THEN 'Qtr 1'\n            WHEN DATEPART(qq,AsOfDate)  = 2 THEN 'Qtr 2'\n\
  \            WHEN DATEPART(qq,AsOfDate)  = 3 THEN 'Qtr 3'\n            WHEN DATEPART(qq,AsOfDate)\
  \  = 4 THEN 'Qtr 4'\n         END AS AsOfQuarter\n        ,CASE\n            WHEN\
  \ MONTH(AsOfDate)  = 1 THEN 'Jan'\n            WHEN MONTH(AsOfDate)  = 2 THEN 'Feb'\n\
  \            WHEN MONTH(AsOfDate)  = 3 THEN 'Mar'\n            WHEN MONTH(AsOfDate)\
  \  = 4 THEN 'Apr'\n            WHEN MONTH(AsOfDate)  = 5 THEN 'May'\n          \
  \  WHEN MONTH(AsOfDate)  = 6 THEN 'June'\n            WHEN MONTH(AsOfDate)  = 7\
  \ THEN 'Jul'\n            WHEN MONTH(AsOfDate)  = 8 THEN 'Aug'\n            WHEN\
  \ MONTH(AsOfDate)  = 9 THEN 'Sep'\n            WHEN MONTH(AsOfDate)  = 10 THEN 'Oct'\n\
  \            WHEN MONTH(AsOfDate)  = 11 THEN 'Nov'\n            WHEN MONTH(AsOfDate)\
  \  = 12 THEN 'Dec'\n         END AS AsOfMonth\n        ,AsOfDate\n        ,LocId\n\
  \        ,InvId\n        ,WhId\n        ,ProdId\n        ,ROUND(CEILING(RAND(ROW_NUMBER()\
  \ OVER (\n            PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)\n            ORDER\
  \ BY AsOfDate\n        ))\n        * 85 *\n        RAND(ROW_NUMBER() OVER (\n  \
  \          PARTITION BY AsOfYear\n            ORDER BY AsOfDate\n        ) * 1900\n\
  \        )),1) AS InvOut\n        ,ROUND(CEILING(RAND(ROW_NUMBER() OVER (\n    \
  \        PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)\n            ORDER BY AsOfDate\n\
  \        ))\n        * 100 *\n        RAND(ROW_NUMBER() OVER (\n            PARTITION\
  \ BY AsOfYear\n            ORDER BY AsOfDate\n        ) * 100000\n        )),1)\
  \ AS InvIn\n    FROM Product.Warehouse\n    WHERE AsOfYear = 2002\n        AND ProdId\
  \ = 'P101'\n        AND Locid = 'LOC1'\n        AND InvId = 'INV1'\n        AND\
  \ WhId = 'WH112'\n    GROUP BY AsOfYear\n        ,DATEPART(qq,AsOfDate)\n      \
  \  ,AsOfMonth\n        ,AsOfDate\n        ,LocId\n        ,InvId\n        ,WhId\n\
  \        ,ProdId\n)\nSELECT AsOfYear\n    ,AsOfQuarter\n    ,AsOfMonth\n    ,AsOfDate\n\
  \    ,LocId\n    ,InvId\n    ,WhId\n    ,ProdId\n    ,InvOut\n    ,InvIn\n    ,InvIn\
  \ - InvOut AS QtyOnHand\nFROM InventoryMovement\nORDER BY AsOfYear\n    ,AsOfQuarter\n\
  \    ,AsOfMonth\n    ,AsOfDate\n    ,LocId\n    ,InvId\n    ,WhId\n    ,ProdId\n\
  GO\n```\n**清单 12-8**\n使用 ROW_NUMBER() 生成随机值\n\n我不会逐步讲解代码，因为我们之前已经见过这种结构，但我们可以重点关注生成随机库存出库值\
  \ (`InvOut`) 的代码：\n\n```sql\n,ROUND(CEILING(\n    RAND(ROW_NUMBER() OVER (\n   \
  \     PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)\n        ORDER BY AsOfDate\n \
  \   )\n    )\n    * 85 *\n    RAND(ROW_NUMBER() OVER (\n        PARTITION BY AsOfYear\n\
  \        ORDER BY AsOfDate\n    ) * 1900\n    )\n),1\n) AS InvOut\n```\n\n从内向外分析，`ROW_NUMBER()`\
  \ 函数使用了一个 `OVER()` 子句，该子句按 `AsOfYear` 列和使用 `DATEPART()` 函数从 `AsOfDate` 派生的季度进行分区。`ORDER\
  \ BY` 子句按 `AsOfDate` 对分区结果集进行排序。生成的值用作 `RAND()` 函数的种子，生成的值乘以 85。\n\n接下来，我们将刚刚生成的值乘以使用相同逻辑生成的另一个值，只是第二个\
  \ `OVER()` 子句中的 `PARTITION BY` 仅由 `AsOfYear` 定义。这个值再次被 `RAND()` 函数用作种子值，结果乘以 1900。\n\
  \n最后，通过使用 `CEILING()` 函数获取下一个最高值来调整新值，然后我们使用 `ROUND()` 函数对最终值进行四舍五入，以确保不包含小数部分。\n\
  \n此逻辑也用于为 `InvIn` 列生成随机值。\n\n请参考图 12-17 中的部分结果。\n\n![images/527021_1_En_12_Chapter/527021_1_En_12_Fig17_HTML.jpg](img/527021_1_En_12_Fig17_HTML.jpg)\n\
  \n**图 12-17**\n使用 ROW_NUMBER 函数生成随机值\n\n正如我们所见，随机值看起来是合理的。归根结底，这只是一堆操作数字以达到预期结果的逻辑。我只想给出一个\
  \ `ROW_NUMBER()` 函数用于除在分区内生成行号之外其他目的的例子。\n\n### 性能考虑\n\n让我们通过生成此查询的基线计划来最后看一下估计的查询计划。\n\
  \n请参考图 12-18。\n\n![images/527021_1_En_12_Chapter/527021_1_En_12_Fig18_HTML.png](img/527021_1_En_12_Fig18_HTML.png)\n\
  \n**图 12-18**\n随机值生成查询的基线估计查询计划\n\n我们将只快速检查这个查询，因为它通常不会出现在生产环境中，但当你需要生成带有随机值的测试数据时，它可能会在开发环境中使用。换句话说，除非查询运行数小时，否则性能并不是那么重要。\n\
  \n从计划的右侧开始，我们看到一个索引扫描，成本为 5%，一个排序成本为 19%，第二个排序成本为 19%，还有另外两个排序任务成本各为 19%。最左侧还有一个未显示的第五个排序任务，成本同样为\
  \ 19%。\n\n因此我们可以推断，这种类型的查询需要多次对中间结果进行排序。像往常一样，我忽略了零成本任务，尽管在进行分析时，你应该注意它们，尤其是那些你不知道其作用的！\n\
  \n这只是生成随机数据的一种方法，当你研究本书中用于加载数据库的脚本时，你会看到其他使用 SQL Server 函数生成随机数据的技术。\n\n\n## 创建\
  \ SSRS 报告\n\n我们现在将使用 Report Builder 创建一份报告，并将其发布到 `SSRS` 网站。该报告需要满足我们的分析师提交的以下要求：\n\
  \n这是一份详细报告，列出了所有日历年和月份的全部产品库存情况；必须包含所有位置、库存和仓库。需要显示月份的名称而非数字（是的，又一个代价高昂的 `CASE`\
  \ 代码块）。\n\n此报告将由多位用户使用，因此需要包含一组筛选器，让业务用户能够选择他们想查看的年份、月份和其他维度——并且可以任意组合！\n\n换句话说，需要所有数据，并且这必须是一份动态报告，以支持所有可能的筛选组合。\n\
  \n性能是关键。我们的业务用户想要一切。他们要求很高。不能指望用户等待超过 30 秒（或更短）让报告显示结果。\n\n我们需要将此报告建立在一个基于以下查询的\
  \ `VIEW` 上。请参考清单 12-9。\n\n```sql\nCREATE VIEW MonthlyInventoryRanks\nAS\nWITH WarehouseCTE\
  \ (\nInvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName\n,InventoryId,WarehouseId,WarehouseName,ProductId,ProductName\n\
  ,ProductType,ProdTypeName,MonthlyQtyOnHand\n)\nAS ( -- 返回 24,192 行\nSELECT YEAR(C.[CalendarDate])\
  \  AS InvYear\n,MONTH(C.[CalendarDate]) AS InvMonthNo\n,CASE\nWHEN MONTH(C.[CalendarDate])\
  \  = 1 THEN 'Jan'\nWHEN MONTH(C.[CalendarDate])  = 2 THEN 'Feb'\nWHEN MONTH(C.[CalendarDate])\
  \  = 3 THEN 'Mar'\nWHEN MONTH(C.[CalendarDate])  = 4 THEN 'Apr'\nWHEN MONTH(C.[CalendarDate])\
  \  = 5 THEN 'May'\nWHEN MONTH(C.[CalendarDate])  = 6 THEN 'June'\nWHEN MONTH(C.[CalendarDate])\
  \  = 7 THEN 'Jul'\nWHEN MONTH(C.[CalendarDate])  = 8 THEN 'Aug'\nWHEN MONTH(C.[CalendarDate])\
  \  = 9 THEN 'Sep'\nWHEN MONTH(C.[CalendarDate])  = 10 THEN 'Oct'\nWHEN MONTH(C.[CalendarDate])\
  \  = 11 THEN 'Nov'\nWHEN MONTH(C.[CalendarDate])  = 12 THEN 'Dec'\nEND AS InvMonthMonthName\n\
  ,L.LocId             AS LocationId\n,L.LocName           AS LocationName\n,I.InvId\
  \             AS InventoryId\n,W.WhId              AS WarehouseId\n,W.WhName   \
  \         AS WarehouseName\n,P.ProdId                 AS ProductId\n,P.ProdName\
  \          AS ProductName\n,P.ProdType          AS ProductType\n,PT.ProdTypeName\
  \     AS ProdTypeName\n,SUM(IH.[QtyOnHand]) AS MonthlyQtyOnHand\nFROM [Fact].[InventoryHistory]\
  \ IH -- WITH (INDEX(ieInvHistCalendar))\nJOIN [Dimension].[Location] L\nON IH.LocKey\
  \ = L.LocKey\nJOIN [Dimension].[Calendar] C\nON IH.CalendarKey = C.CalendarKey\n\
  JOIN [Dimension].[Warehouse] W\nON IH.WhKey = W.WhKey\nJOIN [Dimension].[Inventory]\
  \ I\nON IH.[InvKey] = I.InvKey\nJOIN [Dimension].[Product] P\nON IH.ProdKey = P.ProdKey\n\
  JOIN [Dimension].[ProductType] PT\nON P.ProductTypeKey = PT.ProductTypeKey\nGROUP\
  \ BY YEAR(C.[CalendarDate])\n,MONTH(C.[CalendarDate])\n,L.LocId\n,L.LocName\n,I.InvId\n\
  ,W.WhId\n,W.WhName\n,P.ProdId\n,P.ProdName\n,P.ProdType\n,PT.ProdTypeName\n)\nSELECT\
  \ InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName\n,InventoryId,WarehouseId,WarehouseName,ProductType,ProductId\n\
  ,ProductName\n,MonthlyQtyOnHand\n,RANK() OVER (\nPARTITION BY InvYear,InvMonthNo,InvMonthName,LocationId\n\
  ,InventoryId,WarehouseId\nORDER BY MonthlyQtyOnHand DESC\n) QtyOnHandRank\nFROM\
  \ WarehouseCTE\nGO\n```\n\n### 清单 12-9: 用于支持库存排名的 TSQL 视图\n\n代码很多，但值得花时间去审阅和理解它，特别是如果你刚接触\
  \ TSQL 编码的话。\n\n注意 `PARTITION BY` 子句中指定的分区粒度。我们指定了年份、月份（编号和名称）、位置、库存和仓库（我们没有分区到产品级别；你可以自己试试，并且修改视图使其使用\
  \ `DENSE_RANK()` 函数）。\n\n最后，包含了一个 `ORDER BY` 子句，用于按 `MonthlyQtyOnHand` 降序对分区值的处理进行排序。\n\
  \n如果性能缓慢，我们需要使用 `SCHEMA` 绑定重新创建报告，这意味着 `VIEW` 将实际填充物理数据并存在于磁盘上。这将使任何引用该视图的查询都变得快速！\n\
  \n这是我们讨论过多次、用来替代 `CTE` 的报告表选项之外的另一个选择。只需按照以下代码片段修改 `VIEW DDL` 命令：\n\n```sql\nCREATE\
  \ OR ALTER VIEW Reports.MonthlyInventoryRanks\n-- 使用下面语句来实现一个物化的、绑定架构的视图\nWITH SCHEMABINDING\n\
  AS\n```\n\n### Report Builder 教程\n\n现在，是时候简要介绍一下 Report Builder 的教程了，我们将使用它来构建并发布一份基于\
  \ Web 的报告到 `SSRS`。\n\n\n\n### 报表生成器迷你教程\n\n让我们来看看你 BI 工具箱中的新工具之一，名为报表生成器。正如本书前面提到的，该工具允许你基于\
  \ SQL Server 数据库创建报表，并将其发布到`SSRS`（Microsoft 的旗舰级 Web 报表架构）。\n\n本节将以迷你教程的形式进行，我们将介绍创建报表并将其发布到`SSRS`所需的步骤。它将为你提供将简单报表创建并发布到`SSRS`所需的基本步骤。本教程并非旨在涵盖所有功能，因为那需要一整本书的篇幅，而非一章中的一个章节。希望它能启发你尝试这个工具，并学习如何使用其所有功能。\n\
  \n顺便说一句，会有很多截图！\n\n如果你没有报表生成器，只需用你喜欢的浏览器搜索它，然后从 Microsoft 网站下载。它是免费的！安装并启动后，你将看到如`图\
