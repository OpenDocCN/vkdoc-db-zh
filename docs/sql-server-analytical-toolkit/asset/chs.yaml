  \ 50%、百分位离散 75%、百分位离散 80%。\n\n如图所示，结果没有进行插值计算。每个百分位值都可以追溯到一个实际的账户余额值。例如，看最后一个箭头，值\
  \ 19733.60 可以在“账户余额”列中找到。请注意此行为与前一示例中百分位连续计算行为的区别。\n\n让我们看看针对此查询的一些性能分析。\n\n###\
