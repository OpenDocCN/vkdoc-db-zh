  \ `SQL Server Analysis Services` 中，创建并加载多维数据集，并在那里执行多维分析。\n\n### 性能考虑\n\n这个函数似乎很消耗性能。我们现在有几种分析性能的工具，从创建估计和实际查询计划，到分析诸如\
  \ `IO`、`TIME` 和 `STATISTICS PROFILE` 之类的统计信息。我们的过程是查看估计计划，然后更深入地研究正在分析的查询的性能统计信息，以便全面了解情况，并确定是否可以添加任何索引或报表表来提高性能。\n\
  \n随堂测验答案\n\n为了消除任何可能扭曲性能统计信息的先前查询计划。\n\n像往常一样，我们首先以常规方式生成一个估计查询计划。这可能是你开始分析性能时应该总是采取的第一步。\n\
  \n请参阅图 `5-36`。\n\n![](img/527021_1_En_5_Fig38_HTML.png)\n\n`c h 0 5 aggregate queries\
