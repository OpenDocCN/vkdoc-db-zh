  确定间隔和岛屿的开始与结束日期

  ```


  如前所述，我们现在可以使用`MIN()`和`MAX()`函数了，因为我们有唯一的字符串名称来帮助识别每组岛屿或间隔行。幸运的是，日期都是连续的，所以这个方案适用于此场景。根据你处理的数据，你可能需要设计另一个方案来生成这些唯一的间隔和岛屿字符串标识符。这些数据位于`GapOrIsland`列中，该列出现在`GROUP
  BY`子句中。


  同时请注意这个未被注释的小查询。它用于在`CTE`链的每一步检查结果，以确保一切按预期工作。一旦你在自己的环境中测试完此脚本的所有部分，就可以注释掉该查询。让我们看看结果。


