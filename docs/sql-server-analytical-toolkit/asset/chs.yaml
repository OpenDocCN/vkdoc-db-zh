  2000 行。如果我们真的想提高性能，可以将其设为内存优化表。把东西放进内存里，一切都更快了，对吧？


  我们还看到一个成本为 37%的排序任务，一个成本为 1%的表假脱机，以及两个嵌套循环连接（成本分别为 0%和 4%），我们在计划中从右向左导航。


