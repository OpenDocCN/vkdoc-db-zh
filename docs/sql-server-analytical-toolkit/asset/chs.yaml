- '# 客户交易分析：SQL CTE 与滚动计算


  我们的业务用户希望对客户 C0000001，John Smith 先生（还记得他吗？）进行一项分析。具体来说，是分析 2012 年金融工具 AA（即 Alcoa
  公司）的买入交易。感兴趣的账号是 A02C1，这是一个股票账户。最后，这需要是一个四天滚动计数，因此我们需要为 `OVER()` 子句指定一个 `ROWS()`
  框架。数据可以有 24 小时的延迟（提示：我们可以在夜间加载它）。


  > **注意**

  >

  > Microsoft SQL Server 将 `CTE` 定义为包含三个部分：`CTE` **表达式**、`CTE` **查询**和**外部查询**。`CTE`
  表达式跟随 `WITH` 关键字并为 `CTE` 命名；其后是 `CTE` 返回的列列表。`CTE` 查询是括号之间的查询；它跟随在 `AS ()` 块之后。最后，外部查询是处理由
  `CTE` 返回的行的查询。


  此解决方案将使用 `COUNT()` 和 `SUM()` 函数来满足业务需求。它采用我称之为我们惯用的 `CTE` 内外层查询格式，但让我们先看看用于 `CTE`
  的查询。


  请参考 **清单 5-2a**。


  ```sql

  SELECT YEAR(T.TransDate)          AS TransYear

  ,DATEPART(qq,(T.TransDate)) AS TransQtr

  ,MONTH(T.TransDate)         AS TransMonth

  ,DATEPART(ww,T.TransDate)   AS TransWeek

  ,T.TransDate

  ,C.CustId

  ,C.CustFname

  ,C.CustLname

  ,T.AcctNo

  ,T.BuySell

  ,T.Symbol

  ,COUNT(*) AS DailyCount

  FROM [Financial].[Transaction] T

  JOIN [MasterData].[Customer] C

  ON T.CustId = C.CustId

  GROUP BY YEAR(T.TransDate)

  ,DATEPART(qq,(T.TransDate))

  ,MONTH(T.TransDate)

  ,T.TransDate

  ,T.BuySell

  ,T.Symbol

  ,C.CustId

  ,C.CustFname

  ,C.CustLname

  ,AcctNo

  ORDER BY C.CustId

  ,YEAR(T.TransDate)

  ,DATEPART(qq,(T.TransDate))

  ,MONTH(T.TransDate)

  ,T.TransDate

  ,T.BuySell

  ,T.Symbol

  ,C.CustFname

  ,C.CustLname

  ,AcctNo

  GO

  ```

  **清单 5-2a**

  客户分析 CTE 查询


  这是一个直接明了的查询。注意 `COUNT()` 函数及其支持属性，以及因为使用了聚合函数而必需的 `GROUP BY` 子句。我包含了 `ORDER BY`
  子句，以便我们能更好地了解数据的样子。当用作 `CTE` 查询时，这需要被注释掉。如果不这样做，将会收到错误信息。


  由于这是一个用于历史分析的查询，我们可能考虑使用它来加载报表表，以提高性能并消除 `CTE`。该查询返回 444,144 行，并且是时间快照，因此只需加载一次。值得考虑。


  回到我们的讨论。请参考 **图 5-3** 中的部分结果。


  ![客户分析 CTE 结果](img/527021_1_En_5_Fig3_HTML.png)


  **图 5-3**

  客户分析 CTE 结果


  有两个项目值得我们关注。注意，`COUNT()` 函数返回的所有值都是 1。这是因为客户每天每种工具只交易一次。我就是这样加载测试数据的。尝试修改加载此表的代码，使一个客户在某天对一种或多种工具有多笔交易。试着混合一下，有两到三笔买入交易和一、两或三笔卖出交易。完全有理由假设客户会在同一天对同一工具执行多次买入或卖出交易。一个警告：`Transaction`
  表会变得很大！


  > **注意**

  >

  > 金融行业将股票、合约、产品等称为金融工具。如果你希望在这个领域工作，有很多有趣的术语需要学习。


  现在让我们看看查询的剩余部分。


  请参考 **清单 5-2b**。


  ```sql

  SELECT TransYear

  ,TransQtr

  ,TransMonth

  ,TransWeek

  ,TransDate

  ,CustId

  ,CustFName + '' '' + CustLname AS [Customer Name]

  ,AcctNo

  ,BuySell

  ,Symbol

  ,DailyCount

  ,SUM(DailyCount) OVER (

  PARTITION BY TransQtr

  ORDER BY TransQtr,TransMonth,TransDate

  ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

  )AS RollingTransCount

  FROM CustomerTransactions

  WHERE CustId  = ''C0000001''

  AND TransYear = 2012

  AND BuySell   = ''B''

  AND Symbol    = ''AA''

  AND AcctNo    = ''A02C1''

  ORDER BY TransYear

  ,TransQtr

  ,TransMonth

  ,TransDate

  ,CustId

  ,BuySell

  ,Symbol

  GO

  ```

