  \n我在本章的脚本中包含了这项家庭作业的代码。首先自己尝试一下，如果遇到困难再查看代码。此修订版的估计查询计划与之前截然不同，而且更简短。\n\n\n### 总结\n\
  \n希望您觉得本章内容有趣。我们在一个工厂工程数据仓库场景中全面实践了聚合函数。在此过程中，我们进行了一些详细且有趣的性能分析，不仅发现了改进查询以提升性能的机会，还发现了数据库中的一个设计缺陷。\n\
