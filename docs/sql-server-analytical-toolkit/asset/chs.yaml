  \n图 13-24\n`IO`和`TIME`统计信息\n\n这次活动很多。本章中的其他查询都相当简单。\n\n我不会深入这些统计信息的细节，但会关注`InventoryHistory`表的逻辑读取和预读读取。这是意料之中的。同时请记住，当你在自己的计算平台上运行这些查询并进行分析时，根据硬件的不同，数值也会有所不同。\n\
  \n`星型`和`雪花型`查询严重依赖于已建立索引的事实表和维度表。经验法则是为维度表中的每个代理键创建一个索引，并为事实表中的所有代理键组合创建一个大的复合索引。这假设维度表包含大量行。如果一个表大约只有不到\
  \ 1,000 行，那么索引将不会被使用，只会占用空间。\n\n**注意**\n\n为了让你能更自如地使用窗口函数以及掌握性能技术，我特意在本书中保持了查询的简单和简洁。我们刚刚介绍的这个特定查询是真实业务场景中的典型代表，因为它包含了许多活动部件。此外，拥有数亿行的表是常见的；两百万行根本不算什么。\n\
  \n\n\n### PERCENT_RANK() 函数\n\n接下来要介绍的是 `PERCENT_RANK()` 函数。\n\n还记得它的作用吗？\n\n我们已经在第\
  \ 3、7 和 10 章中讨论过，但万一你需要回顾，或者没有按顺序阅读各章，这里提供一个简要复习（如果你已经在之前的章节读过，可以直接跳到这里，转到业务规范部分）。\n\
  \n使用诸如查询结果、分区或表变量这样的数据集，该函数会计算每个值相对于整个数据集的相对排名（以百分比形式）。你需要将结果（返回的值是一个介于 0.0 和 1.0\
  \ 之间的浮点值）乘以 100.00，或者使用 `FORMAT()` 函数将结果转换为百分比格式（顺便说一句，此函数返回的数据类型是 `FLOAT(53)`）。\n\
  \n回顾一下，它的功能与 `CUME_DIST()` 和 `RANK()` 函数非常相似。\n\n`RANK()` 函数返回值的位置，而 `PERCENT_RANK()`\
  \ 返回的是一个百分比值。\n\n## 业务规范\n\n我们友好的业务分析师提供了以下规范：\n\n需要一份报告，显示 2002 年产品“P101”库存数量的百分比排名。换句话说，哪个月库存量最高，哪个月最低？这是为了进一步评估有多少库存没有流动。报告需要参照位置“LOC1”、库存“INV1”和仓库“WH112”。照例，季度和月份名称需要拼写完整。结果需要复制到\
  \ Microsoft Excel 电子表格中，以便创建帕累托图，实现可视化分析。\n\n注意：帕累托图是一种包含柱状图和折线图的图表，由意大利经济学家维尔弗雷多·帕累托发明。\n\
  \n## 查询\n\n以下是满足这些要求的查询。我们回到使用 `APInventory` 数据库，而不是库存数据仓库数据库。\n\n请参考清单 13-6。\n\n\
  ```sql\nSELECT AsOfYear\n,DATEPART(qq,AsOfDate) AS AsOfQuarter\n,CASE\nWHEN DATEPART(qq,AsOfDate)\
  \ = 1 THEN '1st Quarter'\nWHEN DATEPART(qq,AsOfDate) = 2 THEN '2nd Quarter'\nWHEN\
  \ DATEPART(qq,AsOfDate) = 3 THEN '3rd Quarter'\nWHEN DATEPART(qq,AsOfDate) = 4 THEN\
  \ '4th Quarter'\nEND AS AsOfQtrName\n,AsOfMonth\n,CASE\nWHEN AsOfMonth = 1 THEN\
  \ 'Jan'\nWHEN AsOfMonth = 2 THEN 'Feb'\nWHEN AsOfMonth = 3 THEN 'Mar'\nWHEN AsOfMonth\
  \ = 4 THEN 'Apr'\nWHEN AsOfMonth = 5 THEN 'May'\nWHEN AsOfMonth = 6 THEN 'June'\n\
  WHEN AsOfMonth = 7 THEN 'Jul'\nWHEN AsOfMonth = 8 THEN 'Aug'\nWHEN AsOfMonth = 9\
  \ THEN 'Sep'\nWHEN AsOfMonth = 10 THEN 'Oct'\nWHEN AsOfMonth = 11 THEN 'Nov'\nWHEN\
  \ AsOfMonth = 12 THEN 'Dec'\nEND AS AvgMonthName\n,EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate)\
  \ - 1))\n,LocId\n,InvId\n,WhId\n,ProdId\n,SUM([InvIn] - [InvOut]) + 50 AS QtyOnHand\n\
  ,FORMAT(PERCENT_RANK() OVER (\nPARTITION BY AsOfYear\nORDER BY SUM([InvIn] - [InvOut])\
  \ + 50\n),'P') AS PercentRank\nFROM Product.Warehouse\nWHERE AsOfYear = 2002\nAND\
  \ ProdId = 'P101'\nAND Locid = 'LOC1'\nAND InvId = 'INV1'\nAND WhId = 'WH112'\n\
  GROUP BY AsOfYear,\nDATEPART(qq,AsOfDate),\nAsOfMonth,\nEOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate)\
  \ - 1)),\nLocid,\nInvId,\nWhId,\nProdId\nORDER BY AsOfYear,\nAsOfMonth,\nLocid,\n\
  InvId,\nWhId,\nProdId\nGO\n```\n\n清单 13-6: 2002 年产品 P101 的百分比排名查询\n\n## 结果\n\n我们已经了解了\
  \ `WHERE` 子句和 `CASE` 代码块，因此除了需要说明 `OVER()` 子句和 `WHERE` 子句中的列需要索引覆盖外，无需额外注释。`CASE`\
  \ 代码块效果良好，但万一遇到性能问题，可以考虑连接到增强的 Calendar 表。\n\n该函数使用了一个包含 `PARTITION BY` 和 `ORDER\
  \ BY` 子句的 `OVER()` 子句。分区按年份划分，指定函数如何应用于分区的排序依据是库存数量值。请注意，这里并不需要 `CTE` 代码块。\n\n最后，使用了\
  \ `FORMAT()` 函数将结果显示为百分比，以追求美观（让报告看起来更漂亮）。\n\n请参考图 13-25 中的部分结果。\n\n![](img/527021_1_En_13_Fig25_HTML.png)\n\
