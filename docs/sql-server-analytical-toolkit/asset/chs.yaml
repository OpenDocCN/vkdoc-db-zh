  \n根据上一章的代码示例，尝试修改这个表，用加载报告或内存增强表的脚本替换 `CTE`，然后自行尝试进行此分析。\n\n## `RANK()` 对比 `DENSE_RANK()`\n\
  \n让我们再次看一下 `RANK()` 函数，但现在我们将它与 `DENSE_RANK()` 函数进行比较。\n\n作为提醒，省去你翻回本章开头的麻烦，`DENSE_RANK()`\
  \ 函数的工作方式与 `RANK()` 函数几乎相同。在出现并列时，相同的值获得相同的排名，但重复值之后的下一个值只是被简单地赋予下一个排名数字。\n\n请参考代码清单\
  \ 4-4。\n\n```sql\nWITH CustomerRanking (\nCalendarYear,CalendarMonth,CustomerFullName,TotalSales\n\
  )\nAS\n(\nSELECT YEAR(CalendarDate)\n,MONTH(CalendarDate)\n,CustomerFullName\n--\
  \ add one duplicate value on the fly\n,CASE\nWHEN CustomerFullName = 'Jim OConnel'\
  \ THEN 17018.75\nELSE SUM(TotalSalesAmount)\nEND AS TotalSales\nFROM SalesReports.YearlySalesReport\n\
  GROUP BY YEAR(CalendarDate)\n,MONTH(CalendarDate)\n,CustomerFullName\n)\nSELECT\n\
  CalendarYear\n,CalendarMonth\n,CustomerFullName\n,FORMAT(TotalSales,'C') AS TotalSales\n\
  ,RANK()\nOVER (\nORDER BY TotalSales\n) AS Rank\n,DENSE_RANK()\nOVER (\nORDER BY\
  \ TotalSales\n) AS DenseRank\nFROM CustomerRanking\nWHERE CalendarYear = 2011\n\
  AND CalendarMonth = 1\nORDER BY\nDENSE_RANK() OVER (\nPARTITION BY CalendarYear\n\
  ORDER BY TotalSales\n) DESC\nGO\n```\n\n代码清单 4-4\n\n`RANK` 对比 `DENSE_RANK`\n\n我在\
  \ `CTE` 中包含了一个 `CASE` 语句，以硬编码方式添加了一个重复值，这样我们就能看到效果。这只是一个在原型设计时使用的技巧。如果数据是测试数据，你总是可以引入重复值。千万不要碰生产数据。如果你这么做了，我希望你的简历已经更新好了！\n\
  \n基本上，这与之前的查询如出一辙，但我包含了 `DENSE_RANK()` 函数，以便我们可以比较结果。我们确实说过这些函数是相似的。数值结果加上 Microsoft\
  \ Excel 中的图表将验证这一说法。\n\n再次，为了保持结果集较小，查询使用了 `WHERE` 子句过滤器，仅提取 2011 年 1 月的数据。让我们看看查询结果。\n\
