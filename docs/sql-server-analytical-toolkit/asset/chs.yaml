  \ 50%，compute scalar 成本从 1%变为 5%。箭头还指向了 82%的 table scan 成本和 36%的 index seek 成本。\n\
  \n**图 12-4** 比较前后的估计执行计划\n\n此截图比较了前后的估计执行计划。熟悉的模式，对吧？一个索引查找(index seek)任务取代了表扫描(table\
  \ scan)，但哈希匹配(hash match)和排序(sort)的成本都上升了。\n\n总是有得有失。\n\n此外，排序步骤从 0%上升到 9%，因此这个步骤和哈希匹配应该成为任何进一步性能调整的重点。我之前说过，我再说一遍：确保`TEMPDB`实现在非常快的驱动器上，而不是磁性磁盘驱动器上。\n\
