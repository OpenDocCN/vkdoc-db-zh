  \ ID、产品 ID、库存数量、以及百分位连续值。\n\n图 13-29\n月度库存数量的百分位连续分析\n\n报告很宽，所以我们只看到了第 25 个百分位数值。注意结果是插值计算得出的。它并非实际存在，而是介于\
