  GO\n-- 清单 7-4\n-- 建议的估计查询计划索引\n```\n\n这是一个基于账户名称列的非聚集索引，但根据查询计划工具的建议，我们包含了客户 ID、投资组合编号、账户编号、账户余额和过账日期列。注意那些讨厌的方括号。由于\
  \ SQL Server 生成了这段 `T-SQL` 代码，所以包含了它们。你可能想删除它们，但这值得吗？\n\n假设你有一个包含数千行代码的大型脚本，并且你对方括号进行了全局替换。如果你使用的表名和列名中包含空格，会发生什么？如果你进行全局替换以删除方括号，你的脚本将会出错。没错，会出错！\n\
