  \n点击菜单栏左侧的 `获取数据` 选项，会生成一个我们可以连接的常见数据源列表。在我们的情况下，我们对 Analysis Services 感兴趣，因此让我们点击它，以便定义连接和数据库（在我们的例子中是一个\
