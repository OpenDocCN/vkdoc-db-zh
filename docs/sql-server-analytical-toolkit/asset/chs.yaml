  \ 以及 table scan 82%。箭头指向了 hash match 和 table scan 的成本。\n\n**图 12-3** 基线估计执行计划\n\n\
  我们看到系统建议了一个索引，因此我们需要创建它。从右向左看，我们看到一个成本为 82%的表扫描(table scan)，一个成本为 1%的计算标量(compute\
  \ scalar)，以及一个成本为 16%的哈希匹配连接(hash match join)任务。最后，有一个成本为 1%的并行化（收集流）(parallelism\
  \ (gather stream))任务，所有其他成本均为 0%。显然需要一些改进，因此让我们创建推荐的索引。\n\n请参考代码清单 12-2。\n\n```sql\n\
  CREATE NONCLUSTERED INDEX ieInvIdLocIdWhIdProdIdDecDate\nON Product.InventoryTransaction\
  \ (InvId,LocId,WhId,ProdId)\nINCLUDE (Decrement,MovementDate)\nGO\nUPDATE STATISTICS\
  \ Product.InventoryTransaction\nGO\n```\n\n**代码清单 12-2** 库存事务表的建议索引\n\n如果我们将建议索引中的列与查询的`WHERE`子句和`OVER()`子句中的列进行比较，我们会发现这些列都被覆盖了（这称为覆盖索引）。\n\
  \n`InvId`、`LocId`、`WhId`和`ProdId`列出现在`WHERE`子句中，因此需要包含在索引中。该索引还有一个`INCLUDE`谓词，指定了`Decrement`和`MovementDate`列，它们覆盖了`PARTITION\
  \ BY`和`ORDER BY`子句中提到的列。\n\n所以，我们覆盖全面了！双关语，抱歉。\n\n因此，基于前几章示例的经验，我们可以得出结论：对于此类基于窗口的查询，经验法则是确保我们有一个基于`OVER()`子句中列以及出现在`WHERE`子句中的任何列的索引。\n\
