    Running an estimated query plan on the `CTE` query, we get the following plan
    in Figure [5-5c](#527021_1_En_5_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig7_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Select cost, 0%. Window spool cost, 1%. Sort cost, 19%.


    Figure 5-5c


    CTE estimated query plan


    The estimated query plan did suggest an index to improve performance by 25.8%;
    not a lot, but still it would help when loading the report table overnight. If
    we minimize load times, other queries that need to load at night will have some
    room. Notice the Customer table scan costs 0%. Also notice that the index task
