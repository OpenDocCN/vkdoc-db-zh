- fmt: '### Example 4


    In this next example, we will look at two simple queries. The only difference
    is that the first query includes an `ORDER BY` clause that calls out column names,
    while the second query uses a simple `SELECT` query instead of the column names
    in the `ORDER BY` clause.


    Why do we do this? Because using a simple query will eliminate a possibly expensive
    sort step in the estimated query plan. This technique is used when you have only
    one large partition. The query you need to use is a scalar query, which means
    it will only return one value, so you cannot process multiple partitions.


    Let’s check out the query with the column names first.


    Please refer to Listing [1-9a](#527021_1_En_1_Chapter.xhtml#PC33).


    ```sql

    WITH YearQtrSales (

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    )

    AS

    (

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    FROM dbo.TestSales

    )

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal,

    SUM(SalesTotal) OVER(

    ORDER BY SalesYear,SalesQtr,SalesMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollMonthlySales1

    FROM YearQtrSales

    ORDER BY

    SalesYear,

    SalesQtr,

    SalesMonth

    GO

    Listing 1-9a

    ORDER BY Without Subquery

    ```


    As can be seen, we have no `PARTITION BY` clause and an `ORDER BY` clause that
    sorts by three columns. This configuration will give us rolling totals by month
    for both years. In other words, when we get to the second year in the result set,
    the totals do not reset but keep on incrementing by month till the end of the
    data set.


    The second query replaces the column names in the `ORDER BY` clause with a simple
    `SELECT` statement: `SELECT (1)`.


    Please refer to Listing [1-9b](#527021_1_En_1_Chapter.xhtml#PC34).


    ```sql

    WITH YearQtrSales (

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    )

    AS

    (

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    FROM dbo.TestSales

    )

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal,

    SUM(SalesTotal) OVER(

    ORDER BY (SELECT (1))

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollMonthlySales2

    FROM YearQtrSales

    ORDER BY

    SalesYear,

    SalesQtr,

    SalesMonth

    GO

    Listing 1-9b

    ORDER BY with Subquery

    ```


    This is the same query as the previous one. Let’s compare execution plans.


    Please refer to Figure [1-14](#527021_1_En_1_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig14_HTML.png)


    A screenshot of a Work Sales Partition BY with subquery 2 s q l window. The whole
    window is divided into the Work Sale Partition subwindow and the s q l subquery
    2 subwindow. There is a message below each subwindow.


    Figure 1-14

    Comparing execution plans


    As can be seen in the left-hand query plan, we have a pretty expensive sort task
    with a cost of 77%. The query plan on the right does not have this task, so it
    should be faster in terms of performance. Let’s check out the results for both
    queries, side by side.


    Please refer to Figure [1-15](#527021_1_En_1_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig15_HTML.png)


    A screenshot of a Work Sales Partition BY with subquery 2 s q l window. The whole
    window is divided into the Work Sale Partition subwindow and the s q l subquery
    2 subwindow. These subwindows compare the results for both queries, side by side.


    Figure 1-15

    Comparing results


    Results match. Notice how the rolling totals keep incrementing even when we start
    a new year. This type of configuration where we use a subquery is usually good
    when you only deal with one single partition with a large volume of rows. Eliminating
    a sort step on a query result set of a couple of hundred of thousand or more rows
    can increase performance.


    ### Example 5


    Our last example is a simple one that illustrates a new feature available with
    SQL Server 2022. As of this writing, it is available as an evaluation release.
    It allows you to specify the `PARTITION BY`, `ORDER BY`, and `RANGE/ROWS` clauses
    within a set of parentheses and give it a name. It’s called the named window clause.


    Please refer to Listing [1-10](#527021_1_En_1_Chapter.xhtml#PC35) for a simple
    example.


    ```sql

    SELECT OrderYear

    ,OrderMonth

    ,SUM(SalesAmount) OVER SalesWindow AS TotalSales

    FROM dbo.OverExample

    WINDOW SalesWindow AS (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    )

    GO

    Listing 1-10

    Named Windows

    ```


    Notice how the named window code appears at the end of the query. The keyword
    `WINDOW` is followed by the name you wish to give this window, and then you can
    add the `PARTITION BY`, `ORDER BY`, and `RANGE/ROWS` clauses between the parentheses
    as we just discussed in this chapter.


    The `OVER()` clause still appears after the window function, but it simply refers
    to the name. Is this value added? I do not know but I would have preferred something
    like


    ```sql

    SUM(SalesAmount) OVER WINDOW (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS ...

    ```


    At least it is clear that we are creating a window into the partition. But that’s
    me.


    On the other hand, if the `OVER()` clause is to be used in multiple columns, then
    the SQL Server 2022 version just discussed makes more sense. Yes, I think this
    is better.


    Let’s look at the results for this last query.


    Please refer to Figure [1-16](#527021_1_En_1_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig16_HTML.jpg)


    A table has 3 columns for order year, order month, and total sales. The order
    year is 2010.


    Figure 1-16

    Named WINDOW SQL Server 2022 enhancement


    No surprises here. Works just like the prior examples. Same behavior when duplicate
    `ORDER BY` column values exist. Go to the Microsoft SQL Server website to download
    the latest version. Make sure to check out what’s new in this version.


    ## Summary


    We’ve covered the window functions we will use in this book. More importantly,
    we discussed the `OVER()` clause and how to set up partitions and window frames
    to control how the window functions are applied to the data sets, partitions,
    and window frames.


    We discussed how window frames have default behavior depending on the combination
    of `PARTITION BY` and `ORDER BY` clauses within the `OVER()` clauses.


    We also looked at some basic diagrams to illustrate how window frames affect the
    window function processing flow and under what conditions default window frames
    kick in.


    Next, we briefly discussed how you can use subqueries with the `PARTITION BY`
    and `OVER()` clauses. This is of value as using subqueries eliminates a sort step
    and can make the overall query perform faster. This was demonstrated by looking
    at query plans for queries that used subqueries and queries that did not. Some
    tricks were tested to see how you can retrieve multiple values but package them
    as a single value with the `STRING_AGG()` function which we will discuss in future
    chapters.


    Lastly, we looked at some simple examples to put our knowledge to work and briefly
    discussed a new SQL Server 2022 feature called named windows.


    If you are unfamiliar with how window functions such as `RANK()` or other functions
    work, now is a good time to check out Appendix A, which gives you a brief description
    on what these functions do. These will be used many times in the remaining chapters
    in the book.'
