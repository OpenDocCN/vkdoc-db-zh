    学习和创建 Power BI 仪表盘、记分卡和报告需要一整本书的篇幅。但正如您所见，这是添加到您工具包中的一个非常强大的工具。我将在最后三章介绍如何创建一两个简单的记分卡，以便您掌握一些使用
    `Power BI` 的基本技能。


    Apress 出版社有一本关于此主题的好书，名为 `Beginning Microsoft Power BI: A Practical Guide to Self-Service
    Analytics`（第三版），作者是 Dan Clark。


    您可能想看看这本书。


    ## 总结


    本章我们涵盖了很多内容。希望您喜欢并觉得有用。我们照例研究了 `SQL Server` 自带的分析函数，但这次我们将它们应用到了发电厂场景中，以了解如何进行分析来识别构成发电厂的关键设备的故障率。


    我们还对编写的查询进行了性能分析，并进一步练习了本书至此所学的性能分析工具。


    最后，我们通过引入两个新工具来扩展您的工具包，即 `Analysis Services` 和 `Report Builder`。


    我们将在最后三章对这些工具进行扩展，通过对一个库存控制案例研究进行一些分析来实现。我还将介绍最后一个名为 `SQL Server Integration Services`
    的工具，这是 `Microsoft SQL Server BI` 套件中的顶级 `ETL` 工具，它向您展示如何创建加载数据库和数据仓库的流程。


    让我们在第 11 章再见，在那里我们将再次研究用于跟踪库存的聚合窗口函数。


    # 11. 库存用例：聚合函数


    这将是一个有趣的章节。我们不仅要在库存管理场景中实践窗口聚合函数，还将学习如何使用 Microsoft 的顶级 `ETL` 工具（称为 `SSIS`）来创建一个流程，从我们将用于创建查询的库存数据库加载到库存数据仓库。


    我们将创建针对 `APInventory` 数据库和 `APInventoryWarehouse` 数据仓库的查询，以便比较结果和性能。通常的性能分析讨论将被包括在内，并且您还会有一些建议的课后作业。


    最后，用于创建和加载这两个数据库的脚本，连同查询脚本，都包含在本章在 Apress 网站上的文件夹中。让我们通过一些简单的业务概念模型来看看这些数据库是什么样子的。


    ## 库存数据库


    让我们通过描述示例中将使用的数据库来开始本章。以下是我们高层次的业务概念模型，它标识了库存数据库的业务实体。


    请参考图 11-1。


    ![](img/527021_1_En_11_Fig1_HTML.png)


    图 11-1. 库存数据库概念模型


    主要的业务对象是 `Inventory` 表，它存储与产品进出库存相关的信息。`Inventory Movement` 业务对象标识了任何产品在任何日期的现有数量。`Product`
    对象存储有关所销售产品的典型信息，`Product Type` 对象标识产品类型。最后，我们有常见的 `Country`、`Location` 和 `Calendar`
    业务对象。


    前面的模型用简单的动词短语标识了对象之间的关系。表 11-1 是各个实体的高层描述。


    表 11-1. 库存数据库表


    | 实体 | 描述 |

    | --- | --- |

    | `Calendar` | 包含用于交易事件和库存移动的日历日期。 |

    | `Country` | 标识 ISO 两位和三位国家代码及国家名称。 |

    | `Location` | 标识库存和仓库的位置。一个位置有一个或多个库存。库存有一个或多个仓库。 |

    | `Product` | 标识库存中可用的产品。 |

    | `Product Type` | 标识产品类型，例如 HO 电力机车。 |

    | `Inventory` | 标识与此库存关联的仓库中可用的高级别单位。 |

    | `Inventory Movement History` | 标识产品进出仓库的日期以及相关的产品。 |

    | `Inventory Sales Report` | 与库存移动相关的销售报告。 |

    | `Inventory Transaction` | 标识产品从仓库的每日进出移动。 |

    | `Warehouse` | 与库存中产品相关的详细信息，包括当前水平和再订购数量。 |


    这个简单的数据字典标识了概念模型中的业务实体以及每个表的描述。出于篇幅考虑，我将不包含详细的属性数据字典，因为数据库表中的列名清楚地标识了所存储的业务数据。

