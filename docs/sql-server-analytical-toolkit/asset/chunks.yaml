    prior month, quarter, and year sums in prior years view.


    图 13-45


    库存数量 – 往年视图


    该报告已发布到我笔记本电脑上的个人 `SSRS` 网站，就像在真实的生产环境中一样。真棒！


    这个初始视图显示了顶层的年份数据。如箭头所示，“前一年”列指向了 **Monthly Sum Qty On Hand** 列中的正确值。我想让报告中的字段名更详细一些，以便清楚地表明它们是什么。


