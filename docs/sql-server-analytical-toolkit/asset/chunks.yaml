- fmt: 'The default condition is to generate a string with the value “GAP” plus the
    absolute value of subtracting the row number from the next trade date. We want
    only positive numbers, so we do not see a dash (–) symbol separating the two parts
    of the text that is used to name the grouping of rows.


    Let’s execute the query that uses the two chained `CTE`s.


    Please refer to Figure [6-51](#527021_1_En_6_Chapter.xhtml#Fig51).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig51_HTML.png)


    A screenshot of S Q L application titled Final Island Code Example. It represents
    a list with 20 rows and 8 columns with data on the transaction date, next trade
    date, gap trade days, gap or island, customer i d, symbol, transaction amount,
    and transaction type code.


    Figure 6-51


    Naming unique groups of gaps and islands


    Looks like it worked. As can be seen, each of the groups of rows has a unique
    value for the `GapOrIsland` column. This is what we will use in our `GROUP BY`
    clause when we extract the smallest and largest trade dates in each group of rows.
    That’s what we do next by adding a third `CTE` to help us out with the `MIN()`
    and `MAX()` functions.


    If we take the transaction date and gap trade days columns and pop them in an
    Excel spreadsheet, we can get a good visual of the gaps and islands. Please refer
    to Figure [6-52](#527021_1_En_6_Chapter.xhtml#Fig52).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig52_HTML.png)


    A screenshot of an Excel sheet. It represents a list with 2 columns for data and
    days on the left. On the right, there is a line graph of days versus dates plots
    a line with sharp spikes. In between January 6 and 7, 2012, the line reaches its
    highest peak of 4


    Figure 6-52


    Gaps and islands chart


    Sometimes a good chart or visual will make sense of the raw data! The peaks of
    course are the gaps, and all the zero values are the islands.


    ### Step 3: Identify Island Start/Stop Dates


    This last `CTE` is rather simple. We basically use it to extract the start and
    end dates of each island and gap row set. Please refer to Listing [6-25](#527021_1_En_6_Chapter.xhtml#PC33).


    ```

    FinalGapIslandCTE (

    CustId,Symbol,GapTradeDays,GapOrIsland,GapIslandStart,GapIslandEnd

    )

    AS (

    SELECT CustId

    ,Symbol

    ,GapTradeDays

    ,GapOrIsland

    ,MIN(TransDate) AS GapIslandStart

    ,MAX(NextTradeDate) AS GapIslandEnd

    FROM GapsAndIslands

    GROUP BY CustId

    ,Symbol

    ,GapTradeDays

    ,GapOrIsland

    )

    --uncomment below to test CTE

    SELECT * FROM FinalGapIslandCTE

    ORDER BY CustId,GapIslandStart

    GO

    Listing 6-25

    Identifying Start and End Dates for Gaps and Islands

    ```


    As stated earlier, we can now use the `MIN()` and `MAX()` functions because we
    have unique string names that help us identify each set of island or gap rows.
    Luckily for us the dates are all sequential, so this scheme works for this scenario.
    Depending on the data you will work with, you will have to come up with another
    scheme to generate those unique gap and island string identifiers. This data is
    in the `GapOrIsland` column, which appears in the `GROUP BY` clause.


    Also notice the uncommented small query. This is used to check out the results
    at each step of the `CTE` chain so you can make sure things are working as expected.
    You can comment out the query once you tested all the parts of this script on
    your own. Let’s see the results.


    Please refer to Figure [6-53](#527021_1_En_6_Chapter.xhtml#Fig53).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig53_HTML.png)


    A screenshot of S Q L application titled Final Island Code Example. It represents
    a program and a list with 6 columns with data on the customer i d, symbol, gap
    trade days, gap or island, gap island start date, and gap island end date.


    Figure 6-53


    Gaps and islands report with start and end dates


    This also works. We are almost finished. Notice the highlighted last row, which
    shows the island name and start and end dates. This is the last row of the data
    set as there are no more test trades after December 31, 2012, although the logic
    in the script adds a day to the start end date and uses it as the gap or island
    end date. We could have left it alone and displayed a `NULL` value, but I think
    this is neater.


    All that is left is to write the master query that also includes all the dates
    in the islands or gaps in a comma-separated string. As mentioned before, this
    violates `1NF` (first normal form) design rules, but in this case, I think it
    is appropriate.'
