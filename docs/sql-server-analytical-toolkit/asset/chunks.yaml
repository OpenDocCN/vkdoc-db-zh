    ### 示例 4


    在下一个例子中，我们将研究两个简单的查询。唯一的区别是，第一个查询的 `ORDER BY` 子句中明确指定了列名，而第二个查询则在 `ORDER BY` 子句中使用了一个简单的
    `SELECT` 查询来代替列名。


    我们为什么要这样做？因为使用简单查询可以消除估计查询计划中可能存在的、开销较大的排序步骤。当你只有一个大型分区时，就可以使用这种技术。你需要使用的查询是一个标量查询，这意味着它只会返回一个值，因此无法处理多个分区。


    让我们先来看看带有列名的查询。


    请参考代码清单 1-9a。


    ```sql

    WITH YearQtrSales (

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    )

    AS

    (

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    FROM dbo.TestSales

    )

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal,

    SUM(SalesTotal) OVER(

    ORDER BY SalesYear,SalesQtr,SalesMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollMonthlySales1

    FROM YearQtrSales

    ORDER BY

    SalesYear,

    SalesQtr,

    SalesMonth

    GO

    Listing 1-9a

    ORDER BY Without Subquery

    ```


    如你所见，我们没有 `PARTITION BY` 子句，并且 `ORDER BY` 子句按三个列进行排序。这种配置将为我们提供按月累加的两年总计。换句话说，当我们在结果集中进入第二年时，总计不会重置，而是按月持续递增，直到数据集结束。


    第二个查询用一条简单的 `SELECT` 语句 `SELECT (1)` 替换了 `ORDER BY` 子句中的列名。


    请参考代码清单 1-9b。


    ```sql

    WITH YearQtrSales (

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    )

    AS

    (

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal

    FROM dbo.TestSales

    )

    SELECT

    SalesYear,

    SalesQtr,

    SalesMonth,

    SalesTotal,

    SUM(SalesTotal) OVER(

    ORDER BY (SELECT (1))

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollMonthlySales2

    FROM YearQtrSales

    ORDER BY

    SalesYear,

    SalesQtr,

    SalesMonth

    GO

    Listing 1-9b

    ORDER BY with Subquery

    ```


    这个查询与上一个相同。让我们比较一下执行计划。


    请参考图 1-14。


    ![](img/527021_1_En_1_Fig14_HTML.png)


    一个包含“Work Sales Partition BY with subquery 2 s q l”窗口的屏幕截图。整个窗口分为“Work Sale Partition”子窗口和“s
    q l subquery 2”子窗口。每个子窗口下方都有一条消息。


    图 1-14

    比较执行计划


    从左侧的查询计划可以看出，我们有一个开销相当大的排序任务，成本为 77%。右侧的查询计划没有这个任务，因此在性能上应该更快。让我们并排查看两个查询的结果。


    请参考图 1-15。


    ![](img/527021_1_En_1_Fig15_HTML.png)


    一个包含“Work Sales Partition BY with subquery 2 s q l”窗口的屏幕截图。整个窗口分为“Work Sale Partition”子窗口和“s
    q l subquery 2”子窗口。这些子窗口并排比较了两个查询的结果。


    图 1-15

    比较结果


    结果匹配。注意，即使我们开始了一个新的年份，滚动总计仍在持续递增。当你只处理一个包含大量行的单一分区时，这种使用子查询的配置通常是很好的选择。在一个包含数十万行或更多行的查询结果集上消除排序步骤，可以提高性能。


    ### 示例 5


    我们的最后一个例子很简单，它展示了 SQL Server 2022 提供的一项新功能。截至本文撰写时，它以评估版形式提供。它允许你在一组括号内指定 `PARTITION
    BY`、`ORDER BY` 和 `RANGE/ROWS` 子句，并为其命名。这被称为命名窗口子句。


    一个简单的例子请参考代码清单 1-10。


    ```sql

    SELECT OrderYear

    ,OrderMonth

    ,SUM(SalesAmount) OVER SalesWindow AS TotalSales

    FROM dbo.OverExample

    WINDOW SalesWindow AS (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    )

    GO

    Listing 1-10

    Named Windows

    ```


    注意命名窗口代码是如何出现在查询末尾的。关键字 `WINDOW` 后面是您希望赋予该窗口的名称，然后可以在括号内添加我们本章刚刚讨论过的 `PARTITION
    BY`、`ORDER BY` 和 `RANGE/ROWS` 子句。


    `OVER()` 子句仍然出现在窗口函数之后，但它只是引用了名称。这有增值吗？我不确定，但我个人更倾向于类似这样的写法：


    ```sql

    SUM(SalesAmount) OVER WINDOW (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS ...

    ```


    至少这清楚地表明我们正在为分区创建一个窗口。但这是我的个人看法。


    另一方面，如果 `OVER()` 子句需要在多个列中使用，那么刚才讨论的 SQL Server 2022 版本就更有意义了。是的，我认为这样更好。


    让我们看看这最后一个查询的结果。


    请参考图 1-16。


    ![](img/527021_1_En_1_Fig16_HTML.jpg)


    一个包含 3 列的表格，分别是订单年份、订单月份和总销售额。订单年份是 2010 年。


    图 1-16

    SQL Server 2022 的增强功能：命名窗口 (Named WINDOW)


    这里没有意外。工作方式与之前的例子相同。当存在重复的 `ORDER BY` 列值时，行为也相同。请访问 Microsoft SQL Server 网站下载最新版本。务必查看此版本的新功能。


    ## 总结


    我们已经介绍了本书中将使用的窗口函数。更重要的是，我们讨论了 `OVER()` 子句，以及如何设置分区和窗口帧来控制窗口函数如何应用于数据集、分区和窗口帧。


    我们讨论了窗口帧的默认行为如何取决于 `OVER()` 子句内 `PARTITION BY` 和 `ORDER BY` 子句的组合。


    我们还看了一些基本的图表，来说明窗口帧如何影响窗口函数处理流程，以及在什么条件下会使用默认窗口帧。


    接下来，我们简要讨论了如何在 `PARTITION BY` 和 `OVER()` 子句中使用子查询。这很有价值，因为使用子查询可以消除排序步骤，并可能使整个查询执行得更快。通过查看使用子查询和未使用子查询的查询的执行计划，我们演示了这一点。还测试了一些技巧，以了解如何检索多个值但将它们打包为单个值，这使用了我们将在后续章节中讨论的
    `STRING_AGG()` 函数。


    最后，我们看了一些简单的例子来应用所学知识，并简要讨论了 SQL Server 2022 的一个新功能，称为命名窗口。


    如果您不熟悉 `RANK()` 或其他窗口函数的工作原理，现在是查阅附录 A 的好时机，该附录简要描述了这些函数的作用。在本书的剩余章节中，这些函数将被多次使用。

    '
- fmt: '# 2. Sales DW Use Case: Aggregate Functions


    Our main goal in this chapter is to learn and apply the category of window functions
    called aggregate functions. We start off by describing the sales data warehouse
    (DW) called `APSales` that we will use.


    A simple business conceptual model is presented together with some simple data
    dictionaries to help us understand the business contents of the database.


    We include discussions on performance tuning and then proceed to take each window
    function for a test drive. We conclude the chapter with a brief discussion on
    the new SQL Server 2022 feature called `WINDOW`, which is used to define the `OVER()`
    clause for the window functions.


    Note


    The DDL used to create this small data warehouse is found on the Google website
    for this book together with scripts to create all tables and views and to load
    the tables with test data. The code is easy to use. Each step is labeled, and
    where necessary comments help clarify what each step does.


    Let’s spend a little time understanding what our small sales data warehouse is
    all about.


    ## Sales Data Warehouse


    The `APSales` data warehouse stores transaction and historical information for
    a fictitious company that bakes and sells all sorts of cakes, pies, tarts, and
    chocolates with a traditional European style.


    The company has 100 customers, and we want to track and analyze their purchase
    patterns over several years’ worth of data. The company sells 60 products that
    fall under several categories like cakes, pies, tarts, croissants, and chocolates.


    Customers purchase their favorite confection at one of 16 stores situated throughout
    the United States.


    Lastly, a staging table is used to simulate purchases by each customer of a few
    years. Your first assignment is to create the database and tables, load them,
    and write some simple queries to see the actual data you will analyze.


    Figure [2-1](#527021_1_En_2_Chapter.xhtml#Fig1) is a snapshot of SSMS Object Explorer
    that shows the database and the tables. Once you create the database and all table
    objects, your own Object Explorer panel should look something like this.


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig1_HTML.jpg)


    A screenshot of the S S M S window. The left panel presents the Object Explorer
    with multiple files and folders. It presents A P Plant, A P sales, folders of
    database diagrams, and tables. The tables folder has 4 more folders and 13 files
    of graph tables. The right panel has a code and statistics.


    Figure 2-1


    Data warehouse tables


    Notice the tables in the `SalesReports` and `StagingTable` schemas. The tables
    assigned to the `SalesReports` schema represent denormalized views generated by
    querying the Sales fact table with a star query that joins all dimensions to the
    fact table so that we can present business analysts with some data that uses all
    the names, codes, etc.


    The tables assigned to the `StagingTable` schema are used by TSQL batch scripts
    that generate some random transaction data so we can then load it into the Sales
    fact table. Let’s check out a simple business conceptual model to understand how
    all this ties together.


    ## Sales Data Warehouse Conceptual Model


    The following is a simple conceptual business data model that identifies the main
    business objects of the sales data warehouse. The target database is a basic star
    schema model in that it has one fact table and several dimension tables (you can
    have multiple fact tables of course).


    A couple of denormalized report tables are also included to facilitate running
    complex queries.


    These tables are called `SalesStarReport` and `YearlySalesReport` and are assigned
    to the `SalesReports` schema. These are used to tie in the fact and dimension
    tables and replace the surrogate keys with the actual dimension table columns.
    They are preloaded each night so that they are available to users the following
    day. Preloading the tables provides performance benefits by allowing calculations
    on data to be performed prior to inserting into the table; simpler queries will
    run faster.


    For those not familiar with data warehouses or data marts, columns assigned the
    role of surrogate keys are used to establish the associations between dimension
    and fact tables. These are numerical columns as they are faster to use in joins
    than alphanumeric columns.


    Viewed in a diagram, using your imagination, they resemble a star and are therefore
    called star schemas.


    The following model is intended to just show the basic business objects and the
    relationships. It is not a full physical data warehouse model. By the way, I assume
    you know what a fact table is and what a dimension is.


    Note


    There are many sources on the Web that describe what a data warehouse or data
    mart is. Here is a link that might be helpful if you are not familiar with this
    architecture:


    [`www.snowflake.com/data-cloud-glossary/data-warehousing/`](http://www.snowflake.com/data-cloud-glossary/data-warehousing/)


    Another good resource is [`www.kimballgroup.com/`](http://www.kimballgroup.com/).


    Each dimension table has a surrogate key that plays the role of primary key. All
    these surrogate keys appear in the fact table as foreign keys. Technically, all
    the foreign keys in the fact table can be used as the primary key for the fact
    table. The fact table also contains columns that represent data you can count,
    in other words numerical data. In special cases a fact table can contain other
    types of columns, but this is a topic for another book. (Look up factless fact
    tables and junk dimensions.)


    Please refer to Figure [2-2](#527021_1_En_2_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig2_HTML.png)


    A block diagram of the A P Sales Conceptual Model. Sales are linked to the calendar,
    country, customer, store, and product. Product is followed by identification of
    product subcategory and product categories. A sales transaction goes to sales.


    Figure 2-2


    The APSales conceptual business model


    This is called a conceptual business model as it is intended to clearly identify
    the main business data objects to nontechnical users (our friends, the business
    analysts, and managers). These types of models are used during the initial phases
    of the database design.


    Data modelers, business analysts, and other stakeholders are gathered to identify
    the main data objects that will be in the database or data warehouse. At this
    stage of the design process, only basic metadata is identified, like entity names
    and their relationships between each other.


    Subsequent sessions evolve the conceptual model in a physical denormalized star
    or snowflake schema design where all the surrogate keys, columns, and other objects
    are identified.


    I present this simple model so that you can have a basic understanding of what
    the database that will implement the data warehouse looks like.


    Next, we need to create a series of simple documents called data dictionaries
    that further describe the metadata.'
