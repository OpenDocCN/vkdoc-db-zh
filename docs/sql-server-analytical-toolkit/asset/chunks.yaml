  trans: '

    ## COUNT( ) 函数


    让我们从 `COUNT()` 聚合函数开始。我们将首先检查原本会用在查询的 `CTE`（公共表表达式）部分的 `TSQL` 查询。我们将使用它来向一个报表表插入行，以替代
    `CTE`，从而模拟一个每天或每周加载一次的报表表，因为我们关注的是分析历史数据的查询。


    我们将使用的查询被称为 `STAR`（星型）查询，因为它将多个维度表连接到一个事实表。我们假设可以使用它来加载将用于多个查询的报表表。


    这是概念模型有用的另一个原因；它们向我们展示了如何为查询编写 `JOIN` 子句。


    **小测验**


    历史上，包含事实表并链接维度表的查询被称为 `STAR` 查询。那么，一个引用了维度和支杆维度（outrigger dimensions）的查询是 `SNOWFLAKE`（雪花）查询吗？


    请参阅代码清单 8-1a。


    ```sql

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,COUNT(Failure) AS FailureEvents

    ,SUM(Failure) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    代码清单 8-1a

    重新利用的 CTE 组件


    此查询用于创建一个 `INSERT` 命令，以填充一个名为 `Reports.EquipmentFailureStatistics` 的表。


    我将它放在 `Reports` 模式中，因为它并不是真正的事实表，而是一个报表暂存表。


    `SELECT` 子句包含两个聚合函数：用于预先计算故障事件数量的 `COUNT()` 函数，以及用于累加故障次数的 `SUM()` 函数。这些是基本的聚合函数用法；没有使用
    `OVER()` 子句。


    使用 `GROUP BY` 子句按年、月、工厂名称、位置名称和设备 ID 对数据进行分组。


    最后，请注意 `JOIN` 子句；这里有四个，因此 `FROM` 子句中使用了五个维度表。唯一的事实表是 `EquipmentFailure` 表，它只有
    5,906 行，所以需要处理的行数并不多。


    让我们在图 8-5 中查看结果。


    ![](img/527021_1_En_8_Fig5_HTML.png)


    ch08 查询 V 2 .sql 窗口的截图。顶部屏幕显示了一些程序代码。底部屏幕有一个包含实时查询统计信息的表格。该表有 9 列。最后 2 列显示了故障事件和设备故障总和。


    图 8-5


    加载设备故障统计报表表


    生成的行数不多，只有 2,021 行。不过，这确实生成了一个有趣的实时执行计划。幸运的是，在真实的生产环境中，它会在非高峰时段每天加载一次，以免影响业务用户针对数据运行报表。让我们以通常的方式创建一个估计查询计划。


    基线估计查询计划请参考图 8-6。


    ![](img/527021_1_En_8_Fig6_HTML.png)


    ch08 查询 V 2 .sql 窗口的截图。顶部屏幕显示了一些程序代码。底部屏幕显示了查询 1 的消息和执行计划。排序（Sort）成本为 30%，聚集索引（clustered
    index）成本为 5%。


    图 8-6


    `STAR` 查询的实时查询计划


    有很多表扫描，但由于涉及的表行数较少，我们无需担心。我们确实看到了聚集索引扫描，这是预料之中的，因为我们希望将所有行加载到报表表中。


    在每个需要合并数据流的阶段都使用了哈希匹配连接（Hash match joins），最后显示了一个成本为 30% 的排序（sort）。此排序是由查询中最终的
    `ORDER BY` 子句引起的。需要包含此子句，因为它需要正确排序日期部分（年、季、月等）。我尝试了不带此子句的查询，结果二月的日期出现在了一月之前，所以不妨此时承受这个性能开销。这使生成的报表更易于理解。


    我们将在 `INSERT` 语句中使用此查询来加载我们的报表表。请参阅代码清单 8-1b。


    ```sql

    INSERT INTO Reports.EquipmentFailureStatistics

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,CONVERT(INTEGER,COUNT(Failure)) AS CountFailureEvents

    ,CONVERT(INTEGER,SUM(Failure)) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    代码清单 8-1b

    插入报表表


    此查询生成了 2,021 行。


    让我们针对此报表表运行我们的第一个聚合函数查询。我们的分析师提交了以下需求：


    我们需要一些关于东区工厂，特别是锅炉房的信息。报告应按月列出该工厂位置故障事件的总次数。每个事件可能涉及特定设备的一个或多个故障。例如，如果在 2002 年
    1 月 5 日和 2002 年 1 月 7 日分别发生了一次故障事件，则计为两个事件。


    如果在 2002 年 1 月 5 日，某个特定阀门发生了三次故障，则故障总和为 3；这计为一个事件。如果在 2002 年 1 月 7 日，同一阀门又发生了四次故障，那么该阀门在该日期的故障总和为
    7（3 + 4）。这计为另一个事件。因此，我们现在报告了两个事件，总故障次数为七次。


    我们还需要报告随着时间推移，事件次数和故障总和的滚动月度总计。报告需要按年、季、月、工厂和位置进行分组。


    再次请注意事件次数与故障总和之间的区别。正如我所说，一个事件可以在任何特定日期，涉及与其关联的设备发生一次、两次或更多次故障。


    最后，在任何日期都可能有多台设备发生故障，因此我们也包括这些计数（作为月度计数和滚动月度计数）。


    我们在报告中不按设备 ID 进行区分。


    让我们看看满足此报告的代码。


    请参阅代码清单 8-2。


    ```sql

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CountFailureEvents

    ,SUM(CountFailureEvents) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS SumCountFailureEvents

    ,SumEquipmentFailure

    ,SUM(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS SumEquipFailureFailureEvents

    ,COUNT(CountFailureEvents) AS CountFailureEvents

    ,COUNT(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS CountEquipFailureFailureEvents

    FROM Reports.EquipmentFailureStatistics

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GROUP BY

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,CountFailureEvents

    ,SumEquipmentFailure

    GO

    ```

    代码清单 8-2

    报表查询，按季度滚动的故障统计

    '
- fmt: '## 聚合函数与滚动统计


    `SUM()` 聚合函数和 `COUNT()` 函数在查询中出现了两次。所有四种情况都使用了带有 `PARTITION BY` 子句和 `ORDER BY`
    子句的 `OVER()` 子句。分区由工厂名称、地点、年份和季度创建。分区按日历月份排序。包含 `CountFailureEvents` 和 `SumEquipmentFailure`
    列是为了展示滚动总计和滚动和是如何得出的。让我们看看结果。


    请参阅图 [8-7](#527021_1_En_8_Chapter.xhtml#PC1)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig7_HTML.png)


    图 8-7：报告查询结果


    检查框中的结果清楚地显示了滚动值相加正确。`COUNT()` 函数的结果在每个季度内重复。这个查询有点令人困惑，因为我们试图区分事件计数和故障总和，所以我选择让名称更具描述性。


    在这种情况下，通过查看原始的计数和总和来验证结果是很好的做法。清单 [8-3](#527021_1_En_8_Chapter.xhtml#PC4) 是一个可以实现此目的的查询。


    ```sql

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,Failure AS FailureEvent

    ,COUNT(Failure) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,Failure

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    GO

    ```


    清单 8-3：验证计数和总和


    我修改了用于向 `Reports.EquipmentFailureStatistics` 表插入行的查询，并添加了日历日期和设备，以使其达到最低粒度。图 [8-8](#527021_1_En_8_Chapter.xhtml#Fig8)
    是两个查询结果并排的部分比较，显示了计数和总和是如何累加的。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig8_HTML.png)


    图 8-8：计数和故障总和的验证报告


    如图所示，一月份的故障总数为 8 (4 + 1 + 3)，这与原始报告中 `SumEquipmentFailure` 报告列下的值一致。如果你执行加法运算，二月和三月的情况也是如此。


    事件数量对应于日期，每天一个事件，因为我们没有将粒度降低到一天中的小时。因此，计数每天始终为一，而按季度的总和将是天数的总和。


    希望这个例子展示了计数和求和值与事件之间的语义差异。


    ### AVG( ) 函数


    接下来，我们使用 `AVG()` 函数，为东厂的熔炉房设备生成一些平均值。以下是分析师提交的业务需求：


    需要一份报告，显示按月、按季和按年的滚动平均值。报告应显示东厂熔炉房的结果。结果应按工厂、地点、年份、季度和月份分组。平均值应为月度设备故障率。


    在此报告中，我们不关心单个设备的故障率。最后，报告应参考 2002 和 2003 年（我们的最低粒度级别是按月）。


    看来我们需要使用 `AVG()` 函数三次，并为每个函数定义不同的分区。清单 [8-4](#527021_1_En_8_Chapter.xhtml#PC5)
    是满足此请求的查询。


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear

    ORDER BY CalendarYear,CalendarMonth

    ) AS RollingAvgMon

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear,QuarterName

    ORDER BY CalendarYear

    ) AS RollingAvgQtr

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear

    ORDER BY CalendarYear

    ) AS RollingAvgYear

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND Plantname = ''East Plant''

    AND LocationName = ''Furnace Room''

    GO

    ```


    清单 8-4：按滚动月、季、年统计的工厂故障


    是的，三个 `OVER()` 子句中的每一个都有三个不同的 `PARTITION` 和 `ORDER BY` 子句。


    对于滚动月度故障，分区定义为日历年，并按年份和月份排序。


    对于滚动季度故障，分区定义为日历年和季度，并按年份和季度排序。


    最后，对于滚动年度故障，分区定义为日历年，并按日历年排序（注意不需要月份列）。这与第一个分区定义给出了完全不同的结果。


    尝试组合不同的条件看看结果。确保将结果复制并粘贴到 Excel 电子表格中进行验证。结果是否符合你的预期？


    请参阅图 [8-9](#527021_1_En_8_Chapter.xhtml#Fig9) 中的部分结果。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig9_HTML.png)


    图 8-9：按月、季、年统计的滚动设备故障


    图 [8-10](#527021_1_En_8_Chapter.xhtml#Fig10) 是使用 Microsoft Excel 创建的图表，显示了三个滚动平均值和故障率。趋势似乎是下降的；故障越少越好！


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig10_HTML.png)


    图 8-10：月度、季度和年度滚动平均值


    可视化是让你对结果有一个整体概览的良好起点。查询生成的数值数据是详细的信息来源，你可以用它来进行更深入的分析。


    让我们继续分析，通过查看月度层面的最小和最大故障来构建故障事件画像，从而建立我们的故障报告。顺便说一句，这些数据可以用于一系列的 SSRS（SQL Server
    Reporting Services）Web 报告或 Power BI 仪表板中。这些都是值得考虑学习的工具！'
  raw: 'The `SUM()` aggregate function and the `COUNT()` function appear twice in
    the query. All four cases use an `OVER()` clause with a `PARTITION BY` clause
    and an `ORDER BY` clause. The partition is created by plant name, location, year,
    and quarter in each case. The partition is ordered by the calendar month. The
    columns `CountFailureEvents` and `SumEquipmentFailure` are included so you can
    see how the rolling totals and sums are derived. Let’s see the results.


    Please refer to Figure [8-7](#527021_1_En_8_Chapter.xhtml#PC1).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig7_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql desktop window. The top screen has
    some programming codes. The bottom screen presents the result table. The table
    has 7 columns. Count failure event, sum count failure event, and sum equipment
    failure columns are highlighted.


    Figure 8-7


    Report query results


    Checking out the results in the boxes clearly shows the rolling values add up
    correctly. The `COUNT()` function results repeat themselves for each quarter.
    The query is a bit confusing, as we are trying to differentiate the count of events
    vs. sum of failures, so I chose to make the names more descriptive.


    In cases like this, it is good to validate the results by looking at the individual
    raw counts and sums. Listing [8-3](#527021_1_En_8_Chapter.xhtml#PC4) is a query
    that will accomplish this.


    ```

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,Failure AS FailureEvent

    ,COUNT(Failure) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,Failure

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    GO

    Listing 8-3

    Validate Counts and Sums

    ```


    I modified the query used to insert rows into the `Reports.EquipmentFailureStatistics`
    table and added the calendar date and also equipment to get it to the lowest granularity.
    Figure [8-8](#527021_1_En_8_Chapter.xhtml#Fig8) is a partial comparison of both
    query results side by side that shows how the counts and sums added up.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig8_HTML.png)


    A screenshot of the S Q L Querry 3 dot s q l desktop window. 2 top screens have
    some programming codes. The bottom screens compare the query results side by side
    after that the counts and sums are added up.


    Figure 8-8


    Validation report for counts and sum of failures


    As can be seen, the total number of failures for January is 8 (4 + 1 + 3), and
    this lines up to the original report value under the `SumEquipmentFailure` report
    column. Same can be said for February and March if you perform the additions.


    The number of events corresponds to the dates, one event per day, as we did not
    lower the granularity to the hour in the day. So the count will always be one
    per day, and the sum by quarter will be the sum of the days.


    Hopefully this example shows the semantic difference between counting and summing
    up values and events.


    ### AVG( ) Function


    Next, we generate some averages for the East Plant, for equipment in the furnace
    room, with the `AVG()` function. Here are our business requirements submitted
    by our analyst:


    A report is needed that shows rolling averages by month, quarter, and year. The
    report should show the results for the furnace room in the East Plant. Results
    should be grouped by plant, location, year, quarter, and month. The averages should
    be for monthly equipment failure rates.


    We are not interested in the failure rate for individual equipment in this report.
    Lastly, the report should refer to the years 2002 and 2003 (our lowest level of
    granularity is by month).


    Looks like we need to use the `AVG()` function three times and define different
    partitions for each. Listing [8-4](#527021_1_En_8_Chapter.xhtml#PC5) is the query
    that will satisfy this request.


    ```

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear

    ORDER BY CalendarYear,CalendarMonth

    ) AS RollingAvgMon

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear,QuarterName

    ORDER BY CalendarYear

    ) AS RollingAvgQtr

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear

    ORDER BY CalendarYear

    ) AS RollingAvgYear

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND Plantname = ''East Plant''

    AND LocationName = ''Furnace Room''

    GO

    Listing 8-4

    Plant Failures by Rolling Month, Quarter, and Year

    ```


    Yes, each of the three `OVER()` clauses has three different `PARTITION` and `ORDER
    BY` clauses.


    For rolling monthly failures, the partition is defined for the calendar year and
    ordered by the year and month.


    For rolling quarterly failures, the partition is defined for the calendar year
    and quarter and ordered by the year and quarter.


    Lastly, for rolling yearly failures, the partition is defined for the calendar
    year and ordered by the calendar year (notice the month column is not required).
    This gives totally different results than the first partition definition.


    Try playing around with the combinations to see the results. Make sure to copy
    and paste the results in an Excel spreadsheet and validate them. Are the results
    what you expected?


    Please refer to the partial results in Figure [8-9](#527021_1_En_8_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig9_HTML.png)


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 10 columns.
    Downwards arrows indicate the data of the rolling average month, quarter, and
    year columns.


    Figure 8-9


    Rolling equipment failures by month, quarter, and year


    Figure [8-10](#527021_1_En_8_Chapter.xhtml#Fig10) is a graph created with Microsoft
    Excel showing the three rolling averages and the failure rates. Seems like the
    trend is going down; the fewer failures, the better!


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig10_HTML.png)


    A screenshot of a Microsoft Excel. It presents 2 tables with 6 columns for the
    quarter, month, failures, average by month, quarter, and year. the right panel
    has a line graph of East Plant 2002 failure statistics.


    Figure 8-10


    Monthly, quarterly, and yearly rolling averages


    A visual is a good starting point to give you an overall view of the results.
    The numerical data generated by the query is a good, detailed source of information
    that you can use to dive deeper into the analysis.


    Let’s continue our analysis and build up our failure reports by looking at the
    smallest and largest failures at the monthly level to start building a profile
    of failure events. This data by the way could be used in a series of SSRS (SQL
    Server Reporting Services) web reports or Power BI dashboards. More tools to consider
    learning!'
