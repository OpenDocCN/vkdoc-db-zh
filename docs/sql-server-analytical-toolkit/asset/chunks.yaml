    2 arrows indicate to select the create dataset option and click on the next button.


    Figure 12-20


    Create a data set


    Here you have a choice of selecting an existing data set or creating a new one.
    We will click the “Create a dataset” radio button and click the Next button. Another
    panel is presented.


    Please refer to Figure [12-21](#527021_1_En_12_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig21_HTML.png)


    A screenshot of a pop panel of New Table or Matrix. The header reads, Choose a
    connection to a data source, with a box below for data source connections. An
    arrow indicates to click on the new button.


    Figure 12-21


    Create a new data source


    Before we create a data set, we need a connection to a data source that will provide
    the data we need. The data source provides data for the data set.


    Click the “New” button. Another panel is presented.


    Please refer to Figure [12-22](#527021_1_En_12_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig22_HTML.png)


    A screenshot of a pop panel of Data source properties. 4 arrows indicates to select
