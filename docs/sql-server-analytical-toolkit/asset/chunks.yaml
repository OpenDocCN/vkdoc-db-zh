- fmt: '## Example 1


    We will start by creating a small test temporary table for our analysis.


    The following listing shows the test table `CREATE TABLE` DDL (data declaration
    language) statement created as a temporary table and one `INSERT` statement to
    load all the rows we wish to process.


    Please refer to the partial listing in Listing [1-3](#527021_1_En_1_Chapter.xhtml#PC18).


    ```

    CREATE TABLE #TestTable (

    Row SMALLINT,

    [Year]SMALLINT,

    [Month]SMALLINT,

    Amount DECIMAL(10,2)

    );

    INSERT INTO #TestTable VALUES

    -- 2010

    (1,2010,1,10),

    (2,2010,2,10),

    (3,2010,3,10),

    (4,2010,4,10),

    (5,2010,5,10),

    (6,2010,5,10),

    (7,2010,6,10),

    (8,2010,7,10),

    (9,2010,8,10),

    (10,2010,9,10),

    (11,2010,10,10),

    (12,2010,11,10),

    (13,2010,12,10),

    -- 2011

    (14,2011,1,10),

    (15,2011,2,10),

    (16,2011,3,10),

    (17,2011,4,10),

    (18,2011,5,10),

    (19,2011,5,10),

    (20,2011,6,10),

    (21,2011,7,10),

    (22,2011,7,10),

    (23,2011,7,10),

    (24,2011,8,10),

    (25,2011,9,10),

    (26,2011,10,10),

    (27,2011,11,10),

    (28,2011,12,10);

    Listing 1-3

    Creating the Test Table

    ```


    The `CREATE` statement is used to create a simple table with four columns: a Row
    column to identify the row numbers, a Year column and a Month column for the calendar
    information, and an Amount column to store a numerical value.


    The column names Year and Month are not good names as they are reserved words
    in SQL Server, but since this is a simple test table, I did not get too rigorous
    with naming standards. Also, I used them in the figures for the `RANGE` examples,
    so we are consistent (at least for our simple examples).


    We wish to load two years’ worth of data with some duplicate months so we can
    see the difference between how the `ROWS` clause and the `RANGE` clause treat
    these situations.


    Here is our first query. Let’s calculate some amount totals by year and month.
    We go forward with a `RANGE` clause that considers the current row and all following
    rows.


    Please refer to the partial listing in Listing [1-4](#527021_1_En_1_Chapter.xhtml#PC19).


    ```

    SELECT Row,[Year],[Month],Amount,

    SUM(Amount) OVER (

    PARTITION BY [Year]

    ORDER BY [Month]

    RANGE BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS RollingSalesTotal

    FROM #TestTable

    ORDER BY [Year],[Month] ASC

    GO

    Listing 1-4

    RANGE, Current Row, and Unbounded Following

    ```


    Notice the square brackets around the Year and Month column names. Using these
    will eliminate the colors SSMS uses to display reserved keywords. Leaving them
    out won’t hurt, but the colors will be used in the query pane, which makes you
    aware you are using reserved keywords. Don’t forget to drop the temporary table.


    In Figure [1-10](#527021_1_En_1_Chapter.xhtml#Fig10) are the partial results so
    you can see the entire range of values for one year.


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig10_HTML.jpg)


    A screenshot of the c h 0 1 over clause s q l window. It presents the entire range
    of values for one year. The results are presented in a table that has five columns
    for Row, year, month, amount, and rolling sales total.


    Figure 1-10


    RANGE between current row and unbounded following


    Looks like the totals are decreasing, which makes sense as we are going forward
    from the current row being processed by the window function. Look at the familiar
    duplicate behavior in rows 5 and 6 when both months are 5 (May). Both rows have
    the same value of 90.00.


    When we get to December, in row 13, we have no more rows to process in the partition,
    so we only return the value 10.00 for the sum. This is the value for the current
    and last row in the partition.


    In the second year partition, we have two clusters of duplicate rows, one for
    the month of May and one for the month of July. Again, we see the behavior that
    is characteristic of the `RANGE` clause.


    By the way, the following window frame clauses are not supported:


    ```

    RANGE BETWEEN CURRENT ROW AND n FOLLOWING (will not work)

    RANGE BETWEEN n PRECEDING AND CURRENT ROW (will not work)

    RANGE BETWEEN n PRECEDING AND n FOLLOWING (will not work)

    ```


    These do not work, as the `RANGE` clause is a logical operation, so specifying
    a number for the rows to include in the window frame is not allowed. If you try
    to use these, you will get this wonderful error message:


    RANGE is only supported with UNBOUNDED and CURRENT ROW window frame delimiters


    Pretty clear, don’t you think?


    The last item we need to discuss in this chapter is the default behavior if we
    do not include window frame clauses in our `OVER()` clause. The behavior changes
    depending on how you include or not include the `ORDER BY` and `PARTITION BY`
    clauses.


    ### ROWS and RANGE Default Behavior


    By now we understand the syntax of the `OVER()` clause, and we know that it could
    include the following clauses:


    *   `PARTITION BY` clause


    *   `ORDER BY` clause


    *   `ROWS` or `RANGE` clause


    *   None of these (empty)


    The first three clauses are optional. You can leave them out or include one or
    more as required. There are two scenarios to consider when applying (or not) these
    clauses.


    #### Scenario 1


    The default behavior of the window frames is dependent on whether the `ORDER BY`
    clause is included or not. There are two configurations to consider:


    If the `ORDER BY` clause and the `PARTITION BY` clause are omitted and we do not
    include the window frame clause


    If the `ORDER BY` clause is omitted but the `PARTITION BY` clause is included
    and we do not include the window frame clause


    The default window frame behavior for both these cases is


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    #### Scenario 2


    On the other hand, if we include an `ORDER BY` clause, the following two conditions
    also have a default window frame behavior:


    If the `ORDER BY` clause is included but the `PARTITION BY` clause is omitted
    and we do not include the window frame clause


    If the `ORDER BY` clause is included and the `PARTITION BY` clause is included
    and we do not include the window frame clause


    The default window frame behavior for both these cases is


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    Make sure you keep these default behaviors in mind as you start to develop queries
    that use the window functions. This is very important; otherwise, you will get
    some unexpected and possibly erroneous results. Your users will not be happy (is
    your resume up to date?).


    Table [1-3](#527021_1_En_1_Chapter.xhtml#Tab3) might help you remember these default
    behaviors.


    Table 1-3


    Window Frame Default Behaviors


    | ORDER BY | PARTITION BY | DEFAULT FRAME |

    | --- | --- | --- |

    | No | No | ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING |

    | No | Yes | ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING |

    | Yes | No | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |

    | Yes | Yes | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |


    With this new knowledge under our belts, let’s check out the `ROWS` and `RANGE`
    clauses with some more simple examples. Remember you can override default behavior
    by including the `ROWS` or `RANGE` clause you need.


    ### ROWS and RANGE Window Frame Examples


    Let’s start off with the `ROWS` clause. This clause you will use most of the time.
    The `RANGE` clause is a bit dodgy in my opinion and should be avoided.'
