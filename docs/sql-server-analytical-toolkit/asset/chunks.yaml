    Looking through the `statistics`, there seems to be significant improvement. What
    we are looking for is how significant the improvements are. Does the new `WINDOW`
    feature cause execution to be more expensive, faster, or the same?


    `Statistics` for the `work table` and the `work file` remained the same, while
    `statistics` for the `SalesTransaction` table have improved significantly. Our
    `logical reads` went from `17,244` to `42` and `read-ahead reads` went down from
    `17,230` to `10`. This is great!


    `Customer` table `logical reads` went from `648` to `18`, and our `CPU` time went
    from `156` to `0` ms. Lastly, `elapsed execution time` went from `1210` to `105`
    ms.


    In conclusion, the good news is that the new `WINDOW` feature does not decrease
    performance. Improvements in the query plans are similar to the prior `OVER()`
    clause syntax.


    Seems like the benefit is that we can place the `OVER()` clause logic in one place
    and call it from multiple columns, eliminating redundant typing if the window
    frame specifications are the same.


    There’s more. You can define more than one `window` and even have a `window` reference
    another `window` definition as illustrated by the partial code in Listing [2-13](#527021_1_En_2_Chapter.xhtml#PC23).


    ```sql

    SELECT

    cpa.PurchaseYear,

    cpa.PurchaseMonth,

    c.CustomerNo,

    c.CustomerFullName,

    cpa.TotalSalesAmount,

    AVG(cpa.TotalSalesAmount) OVER AvgSalesWindow AS AvgTotalSales,

    STDEV(cpa.TotalSalesAmount) OVER StdevSalesWindow AS StdevTotalSales,

    SUM(cpa.TotalSalesAmount) OVER SumSalesWindow AS SumTotalSales

    FROM CustomerPurchaseAnalysis cpa

    JOIN DimTable.Customer c

    ON cpa.CustomerNo = c.CustomerNo

    WHERE cpa.CustomerNo = ''C00000008''

    WINDOW

    StdevSalesWindow AS (AvgSalesWindow),

    AvgSalesWindow AS (

    PARTITION BY cpa.PurchaseYear

    ORDER BY cpa.PurchaseYear ASC,cpa.PurchaseMonth ASC

    ),

    SumSalesWindow AS (

    );

    GO

    ```


