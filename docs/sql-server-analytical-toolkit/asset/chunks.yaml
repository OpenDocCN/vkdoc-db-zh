    Please refer to the partial results in Figure [7-30](#527021_1_En_7_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig31_HTML.png)


    A screenshot of the S S M S window. It has a table of 11 columns and 50 rows.
    The column headers are customer I D, account year, account month, account number,
    account name, account balance, percentile discrete 25%, percentile discrete 50%,
    percentile discrete 75%, and percentile discrete 80%.


    Figure 7-30


    Percentile discrete analysis for account balances


    As can be seen the results are **not interpolated**. Each of the percentile values
    can be traced back to an actual account balance value. For example, looking at
    the last arrow, the value 19733.60 can be found in the Account Balance column.
    Notice the difference between this behavior and the behavior of the percentile
    continuous calculation in the prior example.


    Let’s see some performance analysis against this query.


    ### Performance Considerations


    As usual, let’s run an estimated query plan to establish a performance baseline.
    The plan is a long one, so it will be broken up into several screenshots. The
    following is the first part starting at the right-hand side. We will take inventory
    of each section of the plan and then see if we can make some observations and
    conclusions. Starting at the right-hand sign, we see the following steps in Figure
    [7-31](#527021_1_En_7_Chapter.xhtml#Fig32).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig32_HTML.png)


    A screenshot of the S S M S window. It presents part A of the estimated execution
    plan with 12 components. The components are sequence project, segment, nested
    loops, table spool, segment, sort, table scan, nested loops, compute scalar, stream
    aggregate, table spool, and table spool.


    Figure 7-31


    Estimated execution plan, part A


    This looks familiar. Notice that there are no index recommendations although all
    we see are one table scan against the `AccountMonthlyBalances CTE`, one sort at
    a cost of 36%, and two table spools and a nested loops join albeit with a zero
    cost. The last table spool displays 1% cost (recall table spools temporarily store
    data in `TEMPDB` for retrieval by other tasks).


    Next, we see another nested loops join operation at a cost of 4%. Let’s look at
    the next section of the plan and see if this pattern repeats itself.


    Please refer to Figure [7-32](#527021_1_En_7_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig33_HTML.png)


    A screenshot of the S S M S window. It presents part B of the estimated execution
    plan with 11 components. The components are compute scalar, nested loops, table
    spool, segment, compute scalar, compute scalar, sequence project, nested loops,
    stream aggregate, table spool, and table spool.


    Figure 7-32


    Estimated execution plan, part B


    Looks like we pretty much have the same pattern as the first part of the plan
    we just discussed except there are no sort tasks or table scans. Can anyone guess
    what the other sections will look like? Let’s see.


    Please refer to Figure [7-33](#527021_1_En_7_Chapter.xhtml#Fig34).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig34_HTML.png)


    A screenshot of the S S M S window. It presents part C of the estimated execution
    plan with 14 components. The components are 2 compute scalar, nested loops, table
    spool, segment, 2 compute scalar, nested loops, stream aggregate, 2 table spool,
    stream aggregate, and 2 table spool.


    Figure 7-33


    Estimated execution plan, part C


    Yep, same pattern: table spool tasks, some compute scalar tasks, and a nested
    loops join operation at 4%. If you have not guessed by now, the pattern will repeat
    itself four times, one for each `PERCENTILE_DISC()` function call. My initial
    assumption is that these patterns can only be improved with fast memory and disk
    or memory-enhanced tables. Let’s see the next section.


    Please refer to Figure [7-34](#527021_1_En_7_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig35_HTML.png)


    A screenshot of the S S M S window. It presents part D of the estimated execution
    plan with 14 components. The components are segment, 2 compute scalar, nested
    loops, table spool, segment, compute scalar, nested loops, stream aggregate, 2
    table spool, stream aggregate, and 2 table spool.


    Figure 7-34


    Estimated execution plan, part D


    Same pattern here also: the table spools and nested loops joins are the predominant
    tasks. I checked the `PROFILE STATISTICS,` and almost all the table spools have
    zero `IO`, so looks like spooling is performed in memory. Also, if you look at
    the hints for each task, you will see that the cluster of table spools in each
    section has the same node ID, so it looks like there is reuse of the spooled data
    in the temporary tables. This seems very efficient.


    Let’s look at the last part of the plan. Please refer to Figure [7-35](#527021_1_En_7_Chapter.xhtml#Fig36).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig36_HTML.png)'
