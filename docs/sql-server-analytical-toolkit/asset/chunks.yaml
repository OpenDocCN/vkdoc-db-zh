  trans: '

    ### 性能考量


    这次我将展示大部分估算的查询计划；它很长。我需要将执行计划分成两个截图。我们将按照惯例从右向左开始。图 4-12 中的第一个截图显示了计划的第一（右侧）部分。


    ![](img/527021_1_En_4_Fig12_HTML.png)


    *一个窗口截图，上方面板显示 3 行代码的选项卡，下方面板显示查询 1 的估算索引计划流程图。流程图中有 2 个部分被高亮显示。*


    **图 4-12**

    滚动月度销售分析的估算索引计划


    索引查找作为第一步出现，其成本占总估算执行时间的 16%。忽略低成本步骤，一个排序步骤占比 30%。接下来，由于我们（通过 `JOIN`）将 `SalesTransaction`
    表与 `Product` 表连接，出现了一个表扫描步骤，成本为 5%。由于这是个小表，不算太昂贵，因此不需要索引。一个嵌套循环连接任务将两个数据流连接起来。随后是一个成本为
    22% 的排序步骤，最后是一个成本为 1% 的窗口假脱机。


    我们总是需要关注假脱机任务，因为这是一个指示器，表明缓存的数据被假脱机，以便可以重复访问。根据假脱机任务的类型（表、索引、延迟、急切），会使用临时存储，然后执行时间方面可能会变得非常昂贵（将
    `TEMPDB` 放在固态驱动器上会有所帮助……）。


    查阅 Microsoft 文档以了解哪些假脱机任务是物理的（`TEMPDB`）、逻辑的（内存缓存），或两者兼有。这里是表 4-4，其中列出了选定的任务，并标识了它们是逻辑的、物理的还是两者兼有。


    **表 4-4**

    逻辑与物理计划任务


    | 任务 | 物理 | 逻辑 |

    | --- | --- | --- |

    | 排序 | X | X |

    | 急切假脱机 | | X |

    | 延迟假脱机 | | X |

    | 假脱机 | X | |

    | 表假脱机 | | X |

    | 窗口假脱机 | X | X |

    | 表扫描 | X | X |

    | 索引扫描 | X | X |

    | 索引查找 | X | X |

    | 索引假脱机 | | X |


    最后，物理任务是针对物理磁盘的操作，逻辑任务是针对内存缓存的操作。从前面的表中可以看出，根据查询的不同，某些任务可以两者兼有。在分析性能时，请将此信息与 `IO`
    和 `TIME` 统计信息一起牢记于心。


    **注意**

    对于那些想要尝试并且手头有些闲钱的读者，我见过大约 90 美元的便宜固态 USB 驱动器。安装 SQL Server 2022，并确保在固态驱动器上创建 `TEMPDB`。我自己也考虑圣诞节买一个！


    ### 计划的左侧


    让我们看看估算执行计划的左侧。请参考图 4-13。


    ![](img/527021_1_En_4_Fig13_HTML.png)


    *一个窗口截图，上方面板显示 3 行代码的选项卡，下方面板显示查询 1 的估算执行计划左侧部分的流程图。任务窗口假脱机被高亮显示。一个箭头指向成本为 22%。*


    **图 4-13**

    计划的左侧


    这里有一个成本为 22% 的排序步骤，作为之前截图的参考点。我们在这里看到的就是我们刚刚讨论过的窗口假脱机步骤。它出现是因为我们使用了窗口函数。1% 的成本是一个很好的低值，所以我们不需要担心它。真的不需要吗？


    如果逻辑读数不为零，并且窗口假脱机任务大于零，那么窗口假脱机就没有使用内存。


    ### 查询 IO 和时间统计信息


    我们的统计信息来了。请参考表 4-5。


    **表 4-5**

    查询 IO 和时间统计信息


    | SQL Server 解析和编译时间 | 现有索引 |

    | --- | --- |

    | CPU 时间 (ms) | 15 |

    | 已用时间 (ms) | 70 |

    | **统计信息 (工作表)** | **现有索引** |

    | 扫描次数 | 52 |

    | 逻辑读取 | 289 |

    | 物理读取 | 0 |

    | 预读读取 | 0 |

    | **统计信息 (SalesTransaction)** | **现有索引** |

    | 扫描次数 | 2 |

    | 逻辑读取 | 28 |

    | 物理读取 | 1 |

    | 预读读取 | 21 |

    | **统计信息 (Product)** | **现有索引** |

    | 扫描次数 | 1 |

    | 逻辑读取 | 1 |

    | 物理读取 | 1 |

    | 预读读取 | 0 |

    | **SQL Server 执行时间** | **现有索引** |

    | CPU 时间 (ms) | 0 |

    | 已用时间 (ms) | 44 |


    唯一高成本的是工作表上的逻辑读取，但请记住，逻辑读取是针对内存中的缓存（即，如果你有足够的内存），所以这个值不应该引起担忧。


    其余值都很低，估算查询计划分析器也没有建议新索引，因此查询运行良好。回想一下我们的窗口假脱机任务。它不为零，这意味着它正在向物理磁盘上的 `TEMPDB`
    执行假脱机操作。


    所有这些信息都很棒，但这到底意味着什么？我们如何利用这些信息来提高性能？


    ### 索引策略


    经验法则是根据 `PARTITION BY` 子句中的列创建索引，然后是 `ORDER BY` 子句中的列。在之前的例子中，我们在 `PARTITION BY`
    子句中有以下列：`StoreNo`, `TransYear`, `TransQtr`。而 `ORDER BY` 子句使用了 `TransMonth` 列。


    好的，但我们有个难题要考考你。这些日期列都是在 `CTE` 中通过 `YEAR()`, `MONTH()`, 和 `DATEPART()` 函数生成的。它们使用了
    `SalesTransaction` 表中的 `CalendarDate` 列。这些都是派生列，所以我们的索引需要基于 `StoreNo` 列和 `CalendarDate`
    列。连接到日历维度表以提取这些日期部分是否会更有效？这种策略是否比使用日期函数派生它们更高效？试试看吧！


    ### 检查索引查找任务


    让我们看看索引查找任务在估算查询计划中做了什么。请参考图 4-14。


    ![](img/527021_1_En_4_Fig14_HTML.png)


    *一个窗口的截图。右上角的一个对话框与窗口重叠。它有一个标题“索引查找，非聚集”，并列出了详细信息。一些细节包括物理和逻辑操作、存储、节点 ID、谓词、对象、输出列表和查找谓词。*


    **图 4-14**

    索引查找详细信息


    将鼠标指针悬停在任何任务上，会出现一个漂亮的黄色弹出面板，显示所有详细信息。这信息量很大，可能难以阅读，但让我重点标出四个部分中的两个部分所标识的列：


    **谓词** 使用属于 `SalesTransaction` 表的 `CalendarDate` 列。


    **查找谓词** 使用属于 `SalesTransaction` 表的查找键 `ProductNo` 和 `StoreNo`。


    所以这表明我们不仅需要查看 `OVER()` 子句的 `PARTITION BY` 和 `ORDER BY` 子句中的列，还需要查看 `WHERE` 子句中的列，特别是
    `WHERE` 子句中的 `PREDICATES`。


    此查询中使用的索引名为 `ieProductStoreSales`。它基于列 `ProductNo` 和 `StoreNo`，而 `INCLUDE` 列是
    `CalendarDate` 和 `TransactionQuantity`。


    **提示**

    `INCLUDE` 列是你在 `CREATE INDEX` 命令中使用 `INCLUDE` 关键字包含的列。名称中的前缀“ie”代表倒排条目索引。这意味着我们向用户呈现的是一个非唯一的数据访问路径。如果你看到“pk”，表示主键；“ak”表示替代键，它是主键的替代；“fk”表示外键。我认为在索引名称中包含这些前缀是良好的实践。

    '
- fmt: '# 深入性能分析


    因此，现在我们已经将性能分析深入到更细致的层面。通过审视高成本任务背后的细节，我们可以进一步判断某个策略是否有效。


    那么，让我们总结一下我们的性能分析和策略需要基于哪些要点：


    *   生成估算和实际的执行计划，并识别高成本步骤。

    *   明确哪些任务是逻辑运算符、物理运算符，或两者兼具。

    *   生成`IO`和`TIME`性能统计信息。

    *   每次测试运行都执行`DBCC`，以确保内存缓存已清除。

    *   将索引列建立在`PARTITION BY`子句（位于`OVER()`子句中）所使用的列上。

    *   将索引列建立在`ORDER BY`子句（位于`OVER()`子句中）所使用的列上。

    *   将索引列建立在`WHERE`子句（如果`CTE`中使用了的话）所使用的列上。

    *   如果使用像`YEAR()`、`MONTH()`、`DATEPART()`等函数来提取日期的年、月、季度、日部分，则将索引列建立在用于派生字段的列上。

    *   通过修改现有索引使其支持多个查询，从而加以利用。

    *   作为最后的手段，考虑使用内存优化表或预加载的报表表。

    *   为`TEMPDB`配置固态硬盘会有所帮助！


    ## 反规范化策略


    前文提到的倒数第二步建议考虑构建暂存表或报表表，这样像由`CTE`生成的数据这类预处理数据可以加载到暂存表中一次，然后被包含窗口函数的查询使用（假设用户可以接受24小时的数据或更旧的数据）。


    作为前述工作的一部分，分析所有查询，看看是否可以为多个查询设计一套通用的索引和暂存表。索引功能强大，但过多的索引会将表的加载和修改处理时间拖慢到危险的程度。


    考虑构建内存优化表以获得快速性能。


    如果所有方法都失败了，我们需要考虑重新设计查询或表，甚至考虑硬件升级，例如增加内存、使用更多更快的CPU以及像固态硬盘这样的存储设备。


    最后，测试，测试，再测试你的查询？制定一个简单的测试策略，并记录结果用于分析。


    ### 建议


    一旦你熟悉了阅读估算执行计划以及`IO`和`TIME`统计信息，就可以修改用于加载数据库的脚本，尝试加载大量行（例如数百万行），观察性能受到的影响。


    ## 间隙与孤岛示例


    一个经典的数据挑战是“间隙与孤岛”的概念。例如，销售人员销售产品的日期是否存在间隙？或者是否存在产品持续销售的连续日期簇？最后一个例子将向你展示如何通过使用本章介绍的一些窗口函数来解决这个挑战。


    解决方案需要几个步骤。这个谜题的关键在于找到一种方法，生成某种可以在`GROUP BY`子句中使用的类别名称，以便我们能够使用`MIN()`和`MAX()`聚合函数提取孤岛和间隙的最小开始日期和最大结束日期。


    我们将使用`ROW_NUMBER()`函数和`LAG()`函数来识别间隙或孤岛何时开始，同时也会生成一个数字，用于构建前面提到的`GROUP BY`子句中所需的值（例如
    ISLAND1, GAP1 等）。


    在我们的测试场景中，我们仅跟踪销售人员在31天内是否产生了销售额。某些销售额被设置为零，持续一天或多天（这些就是间隙）。


    > **提示**

    >

    > 总是从一个小数据集开始。应用你的逻辑，进行测试，一旦确认其有效，再将其应用到更大的生产数据集。


    同样的方法也适用于销售产生的日期组（这些就是孤岛）。


    以下是需要发生的步骤：


    **步骤 1：** 生成一些测试数据。为简便起见，包含一个标识行属于孤岛还是间隙的列。这些将用于创建`GROUP BY`子句中使用的分组。


    **步骤 2：** 添加一个数值列，用于标识孤岛或间隙的起始日。这将用于识别`GROUP BY`的文本值。


    **步骤 3：** 添加一个包含唯一数字的列，这样对于每一组孤岛和间隙，我们可以生成类似于 ISLAND1, ISLAND2, GAP1, GAP2 等的类别名称（我们将使用`ROW_NUMBER()`函数来实现）。


    一旦这些类别被正确地分配到每一行，开始和结束日期就可以通过`MIN()`和`MAX()`聚合函数轻松提取。


    让我们开始吧。首先生成一些测试数据。


    请参考清单 4-7a。


    ```sql

    USE TEST

    GO

    DROP TABLE IF EXISTS SalesPersonLog

    GO

    CREATE TABLE SalesPersonLog (

    SalesPersonId VARCHAR(8),

    SalesDate     DATE,

    SalesAmount        DECIMAL(10,2),

    IslandGapGroup VARCHAR(8)

    );

    TRUNCATE TABLE SalesPersonLog

    GO

    INSERT INTO SalesPersonLog

    SELECT ''SP001''

    ,[CalendarDate]

    ,UPPER (

    CONVERT(INT,CRYPT_GEN_RANDOM(1)

    )) AS SalesAmount

    ,''ISLAND''

    FROM APSales.[DimTable].[Calendar]

    WHERE [CalendarYear] = 2010

    AND [CalendarMonth] = 10

    GO

    /********************/

    /* Set up some gaps */

    /********************/

    UPDATE SalesPersonLog

    SET SalesAmount = 0,

    IslandGapGroup = ''GAP''

    WHERE SalesDate BETWEEN ''2010-10-5'' AND ''2010-10-6''

    GO

    UPDATE SalesPersonLog

    SET SalesAmount = 0,

    IslandGapGroup = ''GAP''

    WHERE SalesDate BETWEEN ''2010-10-11'' AND ''2010-10-16''

    GO

    UPDATE SalesPersonLog

    SET SalesAmount = 0,

    IslandGapGroup = ''GAP''

    WHERE SalesDate BETWEEN ''2010-10-22'' AND ''2010-10-23''

    GO

    -- Just in case the random sales value generator

    -- set sales to 0 but the update labelled it as an ISLAND

    UPDATE SalesPersonLog

    SET IslandGapGroup = ''GAP''

    WHERE SalesAmount = 0

    GO

    ```

    **清单 4-7a** 加载 SalesPersonLog 表


    间隙和孤岛的文本字符串本可以在以下查询中生成，但我想简化事情。注意所有的 `UPDATE` 语句，它们为我们设置了测试场景。


    请参考清单 4-7b。'
  raw: 'So now we have taken our performance analysis to a lower level. By looking
    at the details behind the high-cost tasks, we can further see if a strategy is
    working or not.


    So let’s summarize what we need to base our performance analysis and strategy
    on:


    *   Generate estimated and actual query plans and identify high-cost steps.


    *   Be aware of which tasks are logical or physical operators or both.


    *   Generate `IO` and `TIME` performance statistics.


    *   Always run `DBCC` for each test run to make sure memory cache is clear.


    *   Base index columns on the columns used in the `PARTITION BY` clause (in the
    `OVER()` clause).


    *   Base index columns on the columns used in the `ORDER BY` clause (in the `OVER()`clause).


    *   Base index columns on the columns used in the `WHERE` clause (if one is used
    in the `CTE`).


    *   Base index columns on columns used in derived fields if we use functions like
    `YEAR()`, `MONTH()`, `DATEPART()`, etc. to pull out the year, month, quarter,
    and day parts of a date.


    *   Leverage prior indexes by modifying them so they support multiple queries.


    *   As a last resort, consider memory-enhanced tables or report tables that are
    preloaded.


    *   Solid-state drives for `TEMPDB` will help!


    **Denormalization Strategies**


    The preceding second-to-last step said to consider building staging or reporting
    tables so preprocessing data like data generated by a `CTE` can be loaded once
    in a staging table and used by the queries containing the window functions (assuming
    users can work with 24-hour data or older).


    As part of the preceding effort, perform an analysis of all your queries to see
    if you can design a common index set and staging table for multiple queries. Indexes
    are powerful, but too many will slow down the table load and modification processing
    time to a dangerous level.


    Consider building memory-optimized tables for fast performance.


    If all else fails, we need to consider query or table redesign or even consider
    hardware upgrades like more memory or more and faster CPUs and storage, like solid-state
    disk.


    Finally, test, test, and did I say test your queries? Come up with a simple test
    strategy and document results for analysis.


    Suggestion


    Once you are comfortable reading estimated execution plans and `IO` and `TIME`
    statistics, modify the load scripts that were used to load the databases and try
    loading a large number of rows, like millions of rows, and see how the performance
    is impacted.


    ## Islands and Gaps Example


    A classic data challenge is the concept of gaps and islands. For example, do we
    have gaps in the days that sales staff sell products? Or are there clusters of
    days that a product is selling consistently? This last example shows you how to
    solve this challenge by using some of the window functions we covered in this
    chapter.


    The solution requires a few steps. The trick to this puzzle is to find out a way
    to generate some sort of category name we can use in a `GROUP BY` clause so we
    can extract the minimum start dates and maximum end dates of the islands and gaps
    using the `MIN()` and `MAX()` aggregate functions.


    We will use the `ROW_NUMBER()` function and the `LAG()` function to identify when
    a gap or island starts but to also generate a number that will be used in the
    value that will be used in the `GROUP BY` clause mentioned earlier (like ISLAND1,
    GAP1, etc.).


    In our test scenario, we are tracking whether a salesperson generated sales over
    a 31-day period only. Some sales amounts are set to zero for one or more days,
    so these gaps in days can be one day, two days, or more (these are the gaps).


    Tip


    Always start with a small data set. Apply your logic, test it, and, once you are
    satisfied it works, apply it to your larger production data set.


    The same can be said for the groups of days that sales were generated (these are
    the islands).


    Here are some steps that need to occur:


    Step 1: Generate some test data. For simplicity include a column that identifies
    rows as islands or gaps. These will be used to create the groups used in the `GROUP
    BY` clause.


    Step 2: Add a numerical column to identify the start days of islands or gaps.
    This will be used to identify the GROUP BY text value.


    Step 3: Add a column that will contain a unique number, so for each set of islands
    and gaps, we can generate category names for the `GROUP BY` clause that look something
    like this: ISLAND1, ISLAND2, GAP1, GAP2, etc. (we will use the `ROW_NUMBER()`
    function for this).


    Once these categories have been correctly assigned to each row, the start and
    stop days are easily pulled out with the `MIN()` and `MAX()` aggregate functions.


    Here we go. Let’s start by generating some test data.


    Please refer to Listing [4-7a](#527021_1_En_4_Chapter.xhtml#PC9).


    ```

    USE TEST

    GO

    DROP TABLE IF EXISTS SalesPersonLog

    GO

    CREATE TABLE SalesPersonLog (

    SalesPersonId VARCHAR(8),

    SalesDate     DATE,

    SalesAmount        DECIMAL(10,2),

    IslandGapGroup VARCHAR(8)

    );

    TRUNCATE TABLE SalesPersonLog

    GO

    INSERT INTO SalesPersonLog

    SELECT ''SP001''

    ,[CalendarDate]

    ,UPPER (

    CONVERT(INT,CRYPT_GEN_RANDOM(1)

    )) AS SalesAmount

    ,''ISLAND''

    FROM APSales.[DimTable].[Calendar]

    WHERE [CalendarYear] = 2010

    AND [CalendarMonth] = 10

    GO

    /********************/

    /* Set up some gaps */

    /********************/

    UPDATE SalesPersonLog

    SET SalesAmount = 0,

    IslandGapGroup = ''GAP''

    WHERE SalesDate BETWEEN ''2010-10-5'' AND ''2010-10-6''

    GO

    UPDATE SalesPersonLog

    SET SalesAmount = 0,

    IslandGapGroup = ''GAP''

    WHERE SalesDate BETWEEN ''2010-10-11'' AND ''2010-10-16''

    GO

    UPDATE SalesPersonLog

    SET SalesAmount = 0,

    IslandGapGroup = ''GAP''

    WHERE SalesDate BETWEEN ''2010-10-22'' AND ''2010-10-23''

    GO

    -- Just in case the random sales value generator

    -- set sales to 0 but the update labelled it as an ISLAND

    UPDATE SalesPersonLog

    SET IslandGapGroup = ''GAP''

    WHERE SalesAmount = 0

    GO

    Listing 4-7a

    Loading the SalesPersonLog

    ```


    The gap and island text strings could have been generated in the following query,
    but I wanted to simplify things. Notice all the update statements. These set up
    the test scenario for us.


    Please refer to Listing [4-7b](#527021_1_En_4_Chapter.xhtml#PC10).'
