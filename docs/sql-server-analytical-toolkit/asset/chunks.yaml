    如前所述，`OVER()` 子句允许你在查询生成的数据集中创建分区和窗口。它允许你将数据集划分为称为分区的部分。窗口允许你控制窗口函数的应用方式，即它们将操作哪些数据。


    可以创建更小的窗口，称为窗口帧，使用 `ROWS` 和 `RANGE` 帧子句，在 `PARTITION BY` 子句定义的大窗口内进一步划分。这些窗口根据
    `OVER()` 子句中包含的 `ROWS` 和 `RANGE` 帧规范所定义的边界而增长或移动（随着行的处理）。你还可以通过 `ORDER BY` 子句指定行的排序方式，以便窗口函数处理它们。


    这种能力允许你创建诸如三个月滚动平均值、年初至今、季末至今和月末至今总计等查询。我们将在本书中讨论的每个函数都可以以这种方式利用 `OVER()` 子句。


    这就是为什么它们被称为窗口函数！


    ## OVER( ) 子句和窗口函数的历史


    以下是窗口函数的简要历史：


    *   不带 `ORDER BY` 子句支持的聚合/排名窗口函数于 2005 年引入。

    *   七年后，支持 `ORDER BY` 子句的聚合函数于 2012 年引入。

    *   对窗口帧的支持（我们稍后将讨论）也在 2012 年引入。

    *   排名函数和一些窗口功能于 2015 年引入。

    *   批处理模式窗口聚合运算符于 2016 年引入。

    *   `STRING_AGG` 函数于 2017 年引入。

    *   命名 `WINDOW` 功能在 SQL Server 2022 中引入。


    多年来，窗口函数的能力不断增长，提供了一套丰富而强大的工具来分析和解决复杂的数据分析问题。


    ## 窗口函数


    可以与 `OVER()` 子句一起使用的窗口函数（这是本书的重点）被分为三类，列于表 1-1 中。


    表 1-1


    聚合、分析和排名函数


    | 聚合函数 | 分析函数 | 排名函数 |

    | --- | --- | --- |

    | ``COUNT( )`` | ``CUME_DIST( )`` | ``RANK( )`` |

    | ``COUNT_BIG( )`` | ``FIRST_VALUE( )`` | ``DENSE_RANK( )`` |

    | ``SUM( )`` | ``LAST_VALUE( )`` | ``NTILE( )`` |

    | ``MAX( )`` | ``LAG( )`` | ``ROW_NUMBER( )`` |

    | ``MIN( )`` | ``LEAD( )`` |   |

    | ``AVG( )`` | ``PERCENT_RANK( )`` |   |

    | ``GROUPING( )`` | ``PERCENTILE_CONT( )`` |   |

    | ``STRING_AGG( )`` | ``PERCENTILE_DISC( )`` |   |

    | ``STDEV( )`` |   |   |

    | ``STDEVP( )`` |   |   |

    | ``VAR( )`` |   |   |

    | ``VARP( )`` |   |   |


    后续的每一章都将为本书范围内的四个行业特定数据库创建并讨论这些类别的查询。如果你对前面列出的每个函数不熟悉或需要复习如何在查询中使用它们，请参阅附录 A 了解语法和描述。

    '
- fmt: '## The OVER() Clause


    The `OVER()` clause appears right after the window function in the `SELECT` clause.
    Our first example in Listing 1-1 uses the `SUM()` function to aggregate sales
    amounts by year and month.


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER(

    PARTITION BY OrderYear

    ORDER BY OrderMonth ASC

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AmountTotal

    FROM OverExample

    ORDER BY OrderYear,OrderMonth

    GO

    -- Listing 1-1

    -- SUM() Function with the OVER() Clause

    ```


    Between a set of parentheses after the `OVER` keyword, three other clauses can
    be included such as `PARTITION BY`, `ORDER BY`, and `ROWS` or `RANGE` clauses
    (to define the window frame that presents the rows to the function for processing).


    Even if you have an `ORDER BY` clause in the `OVER()` clause, you can also include
    the usual `ORDER BY` clause at the end of the query to sort the final processed
    result set in any order you feel is appropriate to the business requirements the
    query solves.


    ## Syntax


    The following are three basic syntax templates that can be used with the window
    functions. Reading these syntax templates is easy. Just keep in mind keywords
    between square brackets mean they are optional. The following is the first syntax
    template available for the `OVER()` clause:


    **Syntax 1**


    ```sql

    OVER (

    [PARTITION BY ...]

    [ORDER BY ...]

    [ROWS/RANGE ...]

    )

    ```


    Most of the window functions use this first syntax, and it is composed of three
    main clauses, the `PARTITION BY` clause, the `ORDER BY` clause, and a `ROWS` or
    `RANGE` specification. You can include one or more of these clauses or none. These
    combinations will affect how the partition is defined. For example, if you do
    not include a `PARTITION BY` clause, the entire data set is considered a one large
    partition. The expression is usually one or more columns, but in the case of the
    `PARTITION BY` and `ORDER BY` clauses, it could also be a subquery (refer to Appendix
    A).


    `Window Function` is one of the functions identified in Table 1-1.


    This first syntax is pretty much the same for all functions except for the `PERCENTILE_DISC()`
    and `PERCENTILE_CONT()` functions that use a slight variation:


    **Syntax 2**


    ```sql

    PERCENTILE_DISC (numeric_literal) WITHIN GROUP (

    ORDER BY expression [ASC | DESC]

    )  OVER ([PARTITION BY ...])

    ```


    These functions are used to calculate the percentile discrete and percentile continuous
    values in a data set column. The `numeric_literal` can be a value like `.25`,
    `.50`, or `.75` that is used to specify the percentile you wish to calculate.
    Notice that the `ORDER BY` clause is inserted between the parentheses of the `WITHIN
    GROUP` command and the `OVER()` clause just includes the `PARTITION BY` clause.


    Don’t worry about what this does for now. Examples will be given that make the
    behavior of this code clear. For now, just understand that there are three basic
    syntax templates to be aware of.


    In our chapter examples, the expression will usually be a column or columns separated
    by commas although you can use other data objects like queries. Please refer to
    the Microsoft SQL Server documentation to check out the detailed syntax specification
    or Appendix A.


    Lastly, our third syntax template applies to SQL Server 2022 (release 16.x). The
    window capability has been enhanced that allows you to specify window options
    in a named window that appears at the end of the query:


    **Syntax 3**


    ```sql

    WINDOW <window_name> AS (

    [PARTITION BY ...]

    [ORDER BY ...]

    [ROWS/RANGE ...]

    )

    ```


    As of this writing, SQL Server 2022 is available for evaluation only. In Listing
    1-2 is an example TSQL query that uses this new feature.


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER SalesWindow AS SQPRangeUPCR

    FROM OverExample

    WINDOW SalesWindow AS (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    );

    GO

    -- Listing 1-2

    -- SQL Server 2022 Named Window Feature

    ```


    The name of the window is `SalesWindow`, and it is used right after the `OVER`
    operator instead of the `PARTITION BY`, `ORDER BY`, and `RANGE` clauses as used
    in the first syntax template we discussed.


    Probably a good feature in case you have multiple window functions in your `SELECT`
    clause that need to use this partition and window frame configuration. This would
    avoid repeating the partition code in each column of the `SELECT` clause.


    The `PARTITION BY`, `ORDER BY`, and `RANGE` clauses are declared at the end of
    the query between parentheses after the `WINDOW` keyword instead of right after
    the `OVER` keyword.


    If you want to play around with this, download and install the 2022 evaluation
    license and try it out on the example code available with the book or on your
    own queries. The setup and download are fast and simple. Make sure you get the
    latest version of SSMS. These are available on Microsoft’s download website.


    ## Partitions and Frames


    Finally, we get to discuss what a partition looks like and what frames or window
    frames are.


    Basically, a query will generate a data result set, which you can carve up into
    sections called partitions by including the `PARTITION BY` clause inside the `OVER()`
    clause. For each partition you can further define smaller windows to fine-tune
    how the window functions will be applied.


    A picture is worth a thousand words, so let’s look at one now. Please refer to
    Figure 1-1.


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig1_HTML.png)

    *A table has 3 columns for Key, type, and value. The rows are partitioned into
    type A and type B. The window frame is defined by the prior and following rows
    of row 3.*

    *Figure 1-1: A simple data set with three partitions and an example frame*


    Here we have a simple data set composed of eight rows. There are three example
    partitions in this data set. One can include all eight rows of the data set; the
    other two include rows identified by the `TYPE` column. There are only two type
    values, type `A` and type `B`, so each of these partitions will have four rows.
    By the way, you cannot include multiple `PARTITION BY` clauses in an `OVER()`
    clause.


    You can define only one partition per `OVER()` clause although you can have more
    than one column in the `SELECT` clause of the query that uses a partition. You
    can specify different column combinations to define the partitions.


    Where the power of this architecture comes in is that we can create smaller window
    frames against the partition by using the `ROWS` or `RANGE` operator. These will
    allow you to specify how many rows before and/or after the current row being processed
    will be used by the window function.


    In our preceding example snapshot, the current row is row 3, and the window frame
    is defined so it includes only the prior row, the current row, and the next row
    relative to the current row. If we apply the `SUM()` function to this window frame
    and add all the values, we get the result 60 (15 + 20 + 25). (Remember this is
    within the first partition, which contains only four rows.)


    If processing continues on the next row, row 4, only rows 3 and 4 are available
    to the `SUM()` function, and the result is 45 (20 + 25). I neglected to mention
    that if we start at row 1, then only rows 1 and 2 are available to the `SUM()`
    function because there is no prior row. The function returns the value 25 (10
    + 15).


    How do we control this type of processing? All we need to do is add a `ROWS` or
    `RANGE` specification to the query if required. We could also include an `ORDER
    BY` clause to specify how to order the rows within the partition so that the window
    function is applied as needed. For example, generate rolling totals by month,
    starting of course at month 1 (January) and ending at month 12 (December).


    Sounds easy, but we need to be aware of a few scenarios around default processing
    when we leave the `ORDER BY` clause and/or the `PARTITION BY` clause out. We will
    discuss these shortly.'
