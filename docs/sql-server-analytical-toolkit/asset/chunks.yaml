  trans: '

    ### 性能考量


    这个查询与其他查询略有不同，因为我们使用了两个 `CASE` 语句块，并使用 `IN()` 子句为希望包含在结果中的年份指定了一些筛选器。让我们创建基线估计查询计划，看看是否有任何异常。


    请参考图 9-29。


    ![](img/527021_1_En_9_Fig29_HTML.png)


    一张截图，上半部分显示代码，下半部分显示执行计划。箭头分别指向成本为 12% 和 37% 的排序操作、成本为 2% 的筛选操作、成本为 24% 的嵌套循环操作、成本为
    3% 的表假脱机操作，以及成本为 17% 的表扫描操作。


    图 9-29

    基线估计查询计划


    从计划的右侧开始向左看，我们看到一个成本为 17% 的表扫描。由于这是一个小表，大约 2000 行，我们无需担心。接下来，我们看到三个表假脱机操作，两个成本为
    0%，一个成本为 3%。几个嵌套循环连接合并了来自分行的数据行。第一个成本为 0%，但第二个相当高，达到了 24%。其余流程包括一个筛选任务（针对年份）和一个成本为
    12% 的排序步骤。


    由于我们处理的数据量不大，我认为可以保持现状。让我们看一下 `IO` 和 `TIME` 统计信息，然后是 `STATISTICS PROFILE`，以便我们对性能步骤有一个完整的了解。


    请参考图 9-30。


    ![](img/527021_1_En_9_Fig30_HTML.png)


    一张 SQL 工作区域的截图。窗口上半部分显示代码，下半部分显示消息。箭头指示扫描计数等于 3，逻辑读取等于 4177 和 22。


    图 9-30

    IO 和 TIME 统计信息


    查看这些统计信息，我们看到工作表非常活跃，扫描计数为 3，逻辑读取为 4177。报告表有一个扫描计数和 22 次逻辑读取。最后，SQL Server 执行
    elapsed time 为 305 毫秒，因此在 1 秒内返回了 306 行。


    接下来是 `STATISTICS PROFILE` 的结果。


    请参考图 9-31。


    ![](img/527021_1_En_9_Fig31_HTML.png)


    一张 SQL 工作区域的截图。窗口上半部分显示不同故障的代码，下半部分显示表格。内嵌区域描绘了当行数等于 288、执行次数等于 1 时，以及当行数和执行次数都等于
    0 时的条目。


    图 9-31

    性能分析统计报告


    除了两个 `EstimateCPU` 值外，其他值都很低。前两个是针对 `CASE` 语句块的，值为 2.88E-05。然后我们有一个针对分段任务的值 4.042E-05，该任务包括了
    `GROUP BY` 逻辑处理。


    总之，这个查询包含一些有趣的步骤，但需要处理的行数很低，因此无需进行性能调优。


    ## 总结


    本章到此结束。我们涵盖了常用的排名函数应用，并使用了前几章的技术和工具进行了性能分析。我们还能够利用一些报告中的数据创建有趣的图形和数据透视表。希望您觉得这个发电厂的场景有趣，并会尝试这些代码示例。


    最后一点建议：如果您是或立志成为一名监督多个开发人员的数据架构师，您需要关注报告表的泛滥。您不希望出现重复，也不希望错过代码和表共享的机会！


    良好的同行评审会议将确保团队对每个独立开发工作中可用的内容保持一致和最新。您不需要重复发明轮子，并不断添加越来越多的报告表和索引。


    这也适用于内存增强表；在耗尽内存之前，您只能创建有限的数量！


    # 10. 发电厂用例：分析函数


    ## 分析函数


    在本章中，我们将为工具箱添加几个新工具。我们将快速了解 `Report Builder` 以及 `Analysis Services` 的多维数据集。


    `Report Builder` 允许您连接到数据库，并通过 `SQL Server Reporting Services` 创建复杂的 Web 报告。这样，您的业务分析师可以直接访问网站并检查他们所需的报告。


    `Analysis Services` 是一个强大的平台，是 `SQL Server` BI 堆栈的一部分，允许您基于数据仓库（例如我们一直在使用的 `APPlant`
    数据仓库）中存储的数据构建多维数据集。


    在了解 `Report Builder` 和 `SSAS` 数据集之前，让我们先像往常一样，将属于此类别的窗口函数应用于我们的数据仓库进行分析。


    提醒一下，以下是按名称排序的八个分析函数类别的函数。回想一下，它们可以与 `OVER()` 子句一起在查询中使用，为我们的业务分析师生成有价值的报告。


    如果您已经阅读了第 3 章和/或第 7 章，您应该对它们很熟悉。如果没有，请花时间阅读它们的功能：


    *   `CUME_DIST()`：`不` 支持窗口框架规范

    *   `FIRST_VALUE()` 和 `LAST_VALUE()`：`支持` 窗口框架规范

    *   `LAG()` 和 `LEAD()`：`不` 支持窗口框架规范

    *   `PERCENT_RANK()`：`不` 支持窗口框架规范

    *   `PERCENTILE_CONT()`：`不` 支持窗口框架规范

    *   `PERCENTILE_DISC()`：`不` 支持窗口框架规范


    我们将采用与前一章相同的方法。`FIRST_VALUE()` 和 `LAST_VALUE()` 函数将一起讨论。


    我将描述函数的功能，回顾业务分析师提供的规格说明，然后展示代码和结果，希望这些能满足业务需求。如果您已经在第 3 章和第 7 章阅读过这些描述（到现在您已经了解这些函数的工作原理，只是应用在一个新的业务场景中），可以随时跳过。


    接下来，将进行我们通常的性能分析，以便我们了解需要进行哪些改进（如果有的话）。我们现在有几种可以尝试的性能增强技巧，以防我们原来的查询太慢：


    *   添加索引。

    *   添加非规范化的报告表。

    *   将支持表创建为内存增强表。

    *   修改查询。


    正如我们在前几章所看到的，通常可以通过添加索引甚至创建非规范化的报告表来实现改进，这样当执行使用分析窗口函数的查询时，它针对的是预加载的数据，避免了连接、计算和复杂的逻辑。如果所有其他方法都失败，可以尝试将查询中的支持表设为内存增强表。


    最后一点说明：在这组分析函数中，您只能为 `FIRST_VALUE()` 和 `LAST_VALUE()` 函数指定 `ROWS` 和 `RANGE` 窗口框架规范。其他函数不支持窗口框架规范。本章后面会有一个小测验，所以别忘了。

