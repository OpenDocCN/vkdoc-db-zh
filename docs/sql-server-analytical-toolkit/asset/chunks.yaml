    of Save as a report. Includes look in field to navigate to the desired folder,
    new inventory rankings dot r d l is selected. Save and cancel buttons are at the
    bottom.


    Figure 12-31


    Saving the report


    Navigate to the desired folder, give the report a good name, and click the “Save”
    button.


    Next, we take the report for a test drive. Click the “Run” button on the upper
    left-hand side of the menu bar, and we should see a sample of the report.


    Please refer to Figure [12-32](#527021_1_En_12_Chapter.xhtml#Fig32).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig32_HTML.png)


    A screenshot of Microsoft Report builder window with run tab selected. An arrow
    indicates to click the design button on the left top corner and L O C 1 button
    on the top row. It presents a report in a table that has columns for Inventory
    year, inventory total month, and 8, Total columns.


    Figure 12-32


    Report layout, sample of the report


    Everything looks good! Clicking any of the buttons next to the dimensions, like
    “LOC1,” will allow you to drill down into the report. Totals are automatically
    recalculated to match the level in the hierarchy you are drilling down to.


    Please refer to Figure [12-33](#527021_1_En_12_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig33_HTML.png)


    A screenshot of the Microsoft Report builder with run tab selected. An arrow indicates
    to click the design button on the left top corner. It presents a report in a table
    that has columns for Inventory year, inventory month, P 033, P 037, P 041, P 045,
    P 101, P 105, P 109, and P 113.


    Figure 12-33


    Drill down to products


    Nice drill-down. Talk about data mining. Once you are happy looking at it, you
    can go back to the Design panel. Click the Design button and you are back to the
    Design panel.


    Now we need to connect to the local `SSRS` server so we can publish the report.


    Note


    Download `SSRS` from the Microsoft site. The installer is called SQLServerReportingServices.exe!
    Run it and then you need to configure it with the SSRS configuration manager.
    We will see how to do this in Chapter [14](#527021_1_En_14_Chapter.xhtml) when
    we wrap up the book.


