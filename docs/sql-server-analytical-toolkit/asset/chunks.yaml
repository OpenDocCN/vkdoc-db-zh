    请参考图 9-6。


    ![SQL 窗口截图，顶部有一个菜单栏。主屏幕显示了行标签、报告年份的总和以及报告月份的总和。右侧显示了数据透视表字段。](img/527021_1_En_9_Fig6_HTML.png)


    图 9-6 详细的工厂在线状态数据透视表


    这种方式灵活且强大得多，因为我们可以对结果进行切片和切块，也可以限制某些参数，如工厂、位置和设备。


    > **注意**

    >

    > 如果你的公司不使用`SSAS`来创建多维数据集，那么微软`Excel`的数据透视表是一个很好的替代品。


    自己尝试这种方法，并修改查询以使其返回所有年份、所有工厂和所有位置的数据。还有所有设备！现在我们看到，我们的工具包不仅包括窗口函数，还包括微软`Excel`，这样我们就可以生成图表和数据透视表。


    让我们看看这个查询的性能如何。'
- fmt: '# Performance Considerations


    Here is our baseline estimated query execution plan.


    Please refer to Figure [9-7](#527021_1_En_9_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig7_HTML.png)


    A screenshot of the `SQL` window. The upper half of the main page depicts the
    codes, and the lower half depicts the execution plan.


    Figure 9-7: Large table estimated query plan


    We see an index seek on the large report table at a cost of 26%, but look at all
    those hash match joins to merge rows from the dimension tables and all the table
    scans on the dimension tables. One nested loops task at 1% follows and then a
    sort with a cost of 12%.


    ## Pop Quiz


    When we say cost of a task, what does it really mean? Percentage of time the task
    took to execute? Answer to follow later.


    Let’s check out the `IO` and `TIME` statistics for this query.


    Please refer to Figure [9-8](#527021_1_En_9_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig8_HTML.png)


    A screenshot presents the codes in the upper half of the main screen, and the
    lower half depicts the messages. The arrows point towards physical reads, and
    the page server reads as 0.


    Figure 9-8: IO and TIME statistics for the large table query


    The report table has high values for scan count (40) and logical reads (126),
    with physical reads of 3. The dimension tables all have scan counts, logical reads,
    and physical reads of 1. The work file all have 0 values for these parameters.


    As stated earlier, this is a historical report, so clearly, to improve performance,
    we want to stage most of the data with a one-time load of all historical data.
    As each month rolls by, we only need to perform a monthly load to catch up on
    the data. We could do weekly loads also if the users need data to be updated weekly
    or even daily.


    ## Pop Quiz Answer


    When we say cost of a task, what does it really mean? Percentage of time the task
    took to execute? No, this is a blended value as to how much `CPU`, memory, and
    `IO` are used plus some other parameters.


    Let’s modify our strategy so we extract the code to load all the data onto yet
    another report table.


    Please refer to Listing [9-3](#527021_1_En_9_Chapter.xhtml#PC3).


    ```

    INSERT INTO Reports.EquipmentMonthlyOnLineStatus

    SELECT ES.StatusYear AS ReportYear

    ,ES.StatusMonth AS Reportmonth

    ,CASE

    WHEN ES.StatusMonth = 1 THEN ''Jan''

    WHEN ES.StatusMonth = 2 THEN ''Feb''

    WHEN ES.StatusMonth = 3 THEN ''Mar''

    WHEN ES.StatusMonth = 4 THEN ''Apr''

    WHEN ES.StatusMonth = 5 THEN ''May''

    WHEN ES.StatusMonth = 6 THEN ''Jun''

    WHEN ES.StatusMonth = 7 THEN ''Jul''

    WHEN ES.StatusMonth = 8 THEN ''Aug''

    WHEN ES.StatusMonth = 9 THEN ''Sep''

    WHEN ES.StatusMonth = 10 THEN ''Oct''

    WHEN ES.StatusMonth = 11 THEN ''Nov''

    WHEN ES.StatusMonth = 12 THEN ''Dec''

    END AS MonthName

    ,EP.LocationId

    ,L.LocationName

    ,ES.EquipmentId

    ,StatusCount

    ,ES.EquipOnlineStatusCode

    ,ES.EquipOnLineStatusDesc

    ,EP.PlantId

    ,P.PlantName

    ,P.PlantDescription

    ,ES.EquipAbbrev

    ,EP.UnitId

    ,EP.UnitName

    ,E.SerialNo

    -- Created table with:

    -- INTO  Reports.EquipmentMonthlyOnLineStatus

    FROM Reports.EquipmentRollingMonthlyHourTotals ES -- 30,240 rows plus

    INNER JOIN DimTable.Equipment E

    ON ES.EquipmentId = E.EquipmentId

    INNER JOIN [DimTable].[PlantEquipLocation] EP

    ON ES.EquipmentId = EP.EquipmentId

    INNER JOIN DimTable.Plant P

    ON EP.PlantId = P.PlantId

    INNER JOIN DimTable.Location L

    ON EP.PlantId = L.PlantId

    AND EP.LocationId = L.LocationId

    ORDER BY ES.StatusYear

    ,ES.StatusMonth

    ,EP.LocationId

    ,ES.EquipmentId

    ,ES.EquipOnlineStatusCode

    ,EP.PlantId

    GO

    ```


    Listing 9-3: One-Time Load of the Report Table


    There’s that big `CASE` block. Also, notice all the `JOIN` predicates in the `FROM`
    clause. You can cheat and create the table by first using the `INTO` right before
    the `FROM` clause. Comment it out after the table is created and use the usual
    `INSERT/SELECT` to load it. Always check the data types of the columns to make
    sure they are consistent with the data types of the columns that were retrieved
    from the tables used in the query.


    This strategy allows us to use the `ORDER BY` clause to sort the data in a manner
    that will help the queries we will execute against it.


    After this table is created and loaded, we would load it once a month, so a script
    that adds the month filter in the where clause would need to be created. This
    can be placed in a `SQL Agent` scheduled job so the table can be loaded incrementally,
    a month, week, or even day at a time.


    ## Reminder


    `SQL Agent` is the job execution process. You can use this to schedule execution
    of queries, scripts, external programs, and `SSIS ETL` packages.


    For this strategy create a small table that logs the last date the table was loaded.
    This way, the query script can use the last date as a filter condition and request
    rows that are one day more than the last date stored. Remember to add the new
    load date so it works correctly the next time you run the query.


    Let’s look at the new and improved query.


    Please refer to Listing [9-4](#527021_1_En_9_Chapter.xhtml#PC4).


    ```

    SELECT ReportYear

    ,Reportmonth

    ,MonthName

    ,LocationId

    ,LocationName

    ,EquipmentId

    ,StatusCount

    ,RANK() OVER(

    PARTITION BY EquipmentId,ReportYear

    ORDER BY LocationId,EquipmentId ASC,ReportYear ASC,

    StatusCount DESC

    ) AS NoFailureRank

    ,EquipOnlineStatusCode

    ,EquipOnLineStatusDesc

    ,PlantId

    ,PlantName

    ,PlantDescription

    ,EquipAbbrev

    ,UnitId

    ,UnitName

    ,SerialNo

    FROM Reports.EquipmentMonthlyOnLineStatus -- 30,240 rows plus

    WHERE ReportYear = 2002

    AND EquipOnlineStatusCode = ''0001''

    AND EquipmentId = ''P1L1VLV1''

    ORDER BY ReportYear

    ,Reportmonth

    ,LocationId

    ,EquipmentId

    ,EquipOnlineStatusCode

    ,PlantId

    GO

    ```


    Listing 9-4: The New and Improved Query


    No surprises. It is the same query with the `RANK()` function, but this time it
    uses our new and improved table. We can expect to get improved performance. Or
    can we?


    We will narrow down the results to one piece of equipment.


    Please refer to the partial results in Figure [9-9](#527021_1_En_9_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig9_HTML.png)


    A screenshot of the window. It presents two tables in the upper and the lower
    half of the screen, respectively. The upper table inboxes the details for January
    and November. The arrows in the lower table indicate 10 as the failure risk in
    the January and November months.


    Figure 9-9: Comparing query reports


    Keep in mind that I added a filter to report on only one piece of equipment. As
    you can see, the results match, but the first report is sorted by rank, whereas
    the second report is sorted by month. It all depends on how the analyst wants
    the results sorted.'
