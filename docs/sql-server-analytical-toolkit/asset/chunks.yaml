  trans: '# 示例 1


    首先，我们建立一个包含虚构股票的数据集，并为它们分配 A+、A、B+、B 和 JUNK! 的评级。


    请参考清单 6-12a。


    ```sql

    DECLARE @TickerRating TABLE

    (

    Ticker VARCHAR(8) NOT NULL,

    Rating VARCHAR(8) NOT NULL

    );

    INSERT INTO @TickerRating VALUES

    (''AAA'',''A+''),

    (''AAB'',''A+''),

    (''AAC'',''A+''),

    (''AAD'',''A+''),

    (''BBB'',''A''),

    (''BBC'',''A''),

    (''BBD'',''A''),

    (''BBE'',''A''),

    (''CCC'',''B+''),

    (''CCD'',''B+''),

    (''CCE'',''B+''),

    (''CCE'',''B+''),

    (''DDD'',''B''),

    (''DDE'',''B''),

    (''DDF'',''B''),

    (''DDG'',''B''),

    (''ZZZ'',''JUNK''),

    (''ZZA'',''JUNK''),

    (''ZZB'',''JUNK''),

    (''ZZB'',''JUNK'');

    -- 清单 6-12a

    -- 设置股票代码数据

    ```


    和往常一样，我们使用一个名为 `@TickerRating` 的表变量，并为每个类别插入四只股票（或者你喜欢的股票代码）。我们为每只股票分配评级，并将这些行加载到表变量中。接下来，我们创建一个查询来分配分组编号，以便进行评估。请参考清单
    6-12b。


    ```sql

    DECLARE @RatingBuckets INT;

    SELECT @RatingBuckets = COUNT(DISTINCT Rating)

    FROM @TickerRating;

    SELECT Ticker

    ,Rating

    ,CASE

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 1

    THEN ''强烈推荐''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 2

    THEN ''推荐''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 3

    THEN ''值得一试''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 4

    THEN ''你感觉幸运吗？''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 5

    THEN ''快跑！''

    END AS AnalystRecommends

    FROM @TickerRating;

    GO

    -- 清单 6-12b

    -- 生成推荐分组

    ```


    这次，我们通过计算不同的评级类别数量来生成用于定义分组的数字。在我们的例子中，需要设置五个分组。接下来，我们创建一个包含 `CASE` 语句块的查询，这样我们就可以解码分组编号并根据其值生成消息，例如，第一分组表示为
    1 意味着该组中的股票是“强烈推荐”。概念非常简单，但它说明了我们可以使用分组来对事物进行分类。


    让我们在图 6-28 中查看结果。


    ![一个标题为“排名金融查询”的 S Q L 应用程序屏幕截图。左侧代表对象资源管理器的滚动条。右侧页面有一个程序和包含 20 行的股票代码、评级和分析师推荐列表。](img/527021_1_En_6_Fig28_HTML.jpg)


    **图 6-28**

    金融顾问投资建议


    如你所见，这些建议非常专业且精妙。我最喜欢的建议是针对评级 B 和 JUNK 的。


    # 性能考虑


    虽然这是一个非常小的表格，但它有几个步骤，所以我认为看看它的预估性能计划会很有趣。请参考图 6-29。


    ![一个标题为“排名金融查询”的 S Q L 应用程序屏幕截图。它代表一个程序。查询 1、2 和 3 的执行计划下有不同的值。](img/527021_1_En_6_Fig29_HTML.png)


    **图 6-29**

    `NTILE` 查询的预估执行计划


    我们实际上有三个计划，第一个用于设置表变量并向其中插入行。请注意，此查询的成本占三查询批处理脚本的 26%。


    第二个计划用于根据评级类别数量计算分组数的查询。此查询的成本为 37%。


    最后但同样重要的是包含 `CASE` 语句块的查询，用于根据股票的分组编号生成建议。步骤很多，此查询的成本占整个批处理的 37%。


    所以，如果我们把三个成本加起来，26% + 37% + 37%，应该得到 100%，这正是我们得到的结果。


    由于表格非常小，我们不会费心进行性能调整，但看看所有的步骤：表扫描、表假脱机、嵌套连接等。如果我们的表有数千行或更多，性能可能会成为问题。'
- fmt: '#### Example 2


    Next, we want to set up some buckets with `NTILE()` and then rank the values within
    the buckets with the `RANK()` function. We will work with the `Transaction` table,
    which has about 651,934 rows.


    **Recommendation**

    Once you are comfortable with this and other functions, try loading the `Transaction`
    table two or three times so as to simulate two or more trades a day. The volume
    will increase to about two million rows. Load the `Account` and `Portfolio` tables
    based on the new rows to see how performance is affected when you run the queries
    we just discussed.


    This is another simple example that uses both the `NTILE()` and `RANK()` functions.
    These two functions process the data in different ways: one categorizes the data,
    and the other ranks it. We will see if the estimated query plan is complicated.


    Please refer to Listing [6-13](#527021_1_En_6_Chapter.xhtml#PC14).


    ```sql

    ;WITH SymbolCTE (TransYear,Symbol,SumTransactions,InvestmentBucket)

    AS

    (

    SELECT YEAR([TransDate])  AS TransYear

    ,[Symbol]

    ,SUM([TransAmount]) AS SumTransactions

    ,NTILE(9) OVER (

    PARTITION BY YEAR([TransDate])

    ORDER BY SUM([TransAmount]) DESC

    ) AS InvestmentBucket

    FROM [APFinance].[Financial].[Transaction]

    GROUP BY YEAR([TransDate]),Symbol

    )

    SELECT TransYear

    ,Symbol

    ,SumTransactions

    ,InvestmentBucket

    ,RANK() OVER(

    PARTITION BY TransYear,InvestmentBucket

    ORDER BY InvestmentBucket,SumTransactions DESC

    ) AS InvestmentRank

    FROM SymbolCTE

    GO

    ```


    *Listing 6-13*

    *Rank Values Within Buckets*


    We are only interested in `BUY` transactions, so we set up a `WHERE` clause to
    filter out any transaction that is not a “`BUY`” transaction. The `CTE` sums up
    the transaction amounts, so the `CTE` needs a `GROUP BY` clause because we did
    not include an `OVER()` clause. The `NTILE()` function does use an `OVER()` clause
    with both a `PARTITION BY` and an `ORDER BY` clause. The partition is set up by
    year, and the result set in the partition is sorted by the total transaction amount.


    Please refer to Figure [6-30](#527021_1_En_6_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig30_HTML.jpg)

    *A screenshot of SQL application titled Ranking Financial Quarries. It represents
    a program with a list of 29 rows and 5 columns. It column headers are trans year,
    symbol, sum transactions, investment bucket, and investment rank. The highlighted
    values of the rows are 1 to 4, 9 to 12, and 25 to 28.*

    *Figure 6-30*

    *2012 ticker bucket ratings*


    Looks like we have nine buckets and four ticker symbols assigned to each bucket.
    No ties, so we do not see the peculiar rank pattern that this function produces.
    The financial instruments are rated 1 to 4 in each bucket. This could be valuable
    information when planning an investment portfolio.


    **Homework**

    As a small exercise, use the logic in the first example so you can rate the ticker
    symbols based on the rank within the partition. Hint: You need to use a `CASE`
    block.


    I think this result set will make for some interesting graphs, so let’s copy and
    paste the results into an Excel spreadsheet and generate some graphs.


    Please refer to Figure [6-31](#527021_1_En_6_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig31_HTML.png)

    *A screenshot of an Excel sheet. It presents 4 different bar graphs of amount
    versus ticker symbol for buckets 1, 2, 3, and 4 of 2012. All the graphs depict
    a downward trend, while in buckets 1 and 2, there is a downward line for total
    amount and series 1.*

    *Figure 6-31*

    *Ticker bucket ratings for 2012*


    This time we generated four smaller graphs, one for each bucket, but visually
    we can see the rank positions and the trend lines. Including the values also helps
    with understanding the information. Looking at the bucket 3 graph, which is the
    top-ranking instrument? Which is the lowest? There’s almost a tie for the lowest,
    but this visual representation will help the analyst decide on what to invest
    in for their client’s portfolio.


    **Thoughts and ideas**

    At this stage we can see how the SQL Server functions we have been studying are
    the first-line tools we use to generate analytical data from raw data. Our tools
    range from the reports generated via queries to graphs and pivot tables generated
    by the query results with Microsoft Excel. An extra tool is to use the analytical
    data generated with the functions to populate scorecards and dashboards created
    with Microsoft Power BI. I suggest you become familiar with both Excel and Power
    BI.'
  raw: '#### Example 2


    Next, we want to set up some buckets with `NTILE()` and then rank the values within
    the buckets with the `RANK()` function. We will work with the Transaction table,
    which has about 651,934 rows.


    Recommendation


    Once you are comfortable with this and other functions, try loading the Transaction
    table two or three times so as to simulate two or more trades a day. The volume
    will increase to about two million rows. Load the Account and Portfolio tables
    based on the new rows to see how performance is affected when you run the queries
    we just discussed.


    This is another simple example that uses both the `NTILE()` and `RANK()` functions.
    These two functions process the data in different ways: one categorizes the data,
    and the other ranks it. We will see if the estimated query plan is complicated.


    Please refer to Listing [6-13](#527021_1_En_6_Chapter.xhtml#PC14).


    ```

    ;WITH SymbolCTE (TransYear,Symbol,SumTransactions,InvestmentBucket)

    AS

    (

    SELECT YEAR([TransDate])  AS TransYear

    ,[Symbol]

    ,SUM([TransAmount]) AS SumTransactions

    ,NTILE(9) OVER (

    PARTITION BY YEAR([TransDate])

    ORDER BY SUM([TransAmount]) DESC

    ) AS InvestmentBucket

    FROM [APFinance].[Financial].[Transaction]

    GROUP BY YEAR([TransDate]),Symbol

    )

    SELECT TransYear

    ,Symbol

    ,SumTransactions

    ,InvestmentBucket

    ,RANK() OVER(

    PARTITION BY TransYear,InvestmentBucket

    ORDER BY InvestmentBucket,SumTransactions DESC

    ) AS InvestmentRank

    FROM SymbolCTE

    GO

    Listing 6-13

    Rank Values Within Buckets

    ```


    We are only interested in **BUY** transactions, so we set up a `WHERE` clause
    to filter out any transaction that is not a “**BUY**” transaction. The `CTE` sums
    up the transaction amounts, so the `CTE` needs a `GROUP BY` clause because we
    did not include an `OVER()` clause. The `NTILE()` function does use an `OVER()`
    clause with both a `PARTITION BY` and an `ORDER BY` clause. The partition is set
    up by year, and the result set in the partition is sorted by the total transaction
    amount.


    Please refer to Figure [6-30](#527021_1_En_6_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig30_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program with a list of 29 rows and 5 columns. It column headers are trans year,
    symbol, sum transactions, investment bucket, and investment rank. The highlighted
    values of the rows are 1 to 4, 9 to 12, and 25 to 28.


    Figure 6-30


    2012 ticker bucket ratings


    Looks like we have nine buckets and four ticker symbols assigned to each bucket.
    No ties, so we do not see the peculiar rank pattern that this function produces.
    The financial instruments are rated 1 to 4 in each bucket. This could be valuable
    information when planning an investment portfolio.


    Homework


    As a small exercise, use the logic in the first example so you can rate the ticker
    symbols based on the rank within the partition. Hint: You need to use a `CASE`
    block.


    I think this result set will make for some interesting graphs, so let’s copy and
    paste the results into an Excel spreadsheet and generate some graphs.


    Please refer to Figure [6-31](#527021_1_En_6_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig31_HTML.png)


    A screenshot of an Excel sheet. It presents 4 different bar graphs of amount versus
    ticker symbol for buckets 1, 2, 3, and 4 of 2012\. All the graphs depict a downward
    trend, while in buckets 1 and 2, there is a downward line for total amount and
    series 1.


    Figure 6-31


    Ticker bucket ratings for 2012


    This time we generated four smaller graphs, one for each bucket, but visually
    we can see the rank positions and the trend lines. Including the values also helps
    with understanding the information. Looking at the bucket 3 graph, which is the
    top-ranking instrument? Which is the lowest? There’s almost a tie for the lowest,
    but this visual representation will help the analyst decide on what to invest
    in for their client’s portfolio.


    Thoughts and ideas


    At this stage we can see how the SQL Server functions we have been studying are
    the first-line tools we use to generate analytical data from raw data. Our tools
    range from the reports generated via queries to graphs and pivot tables generated
    by the query results with Microsoft Excel. An extra tool is to use the analytical
    data generated with the functions to populate scorecards and dashboards created
    with Microsoft Power BI. I suggest you become familiar with both Excel and Power
    BI.'
  trans: '#### 示例 2


    接下来，我们想使用 `NTILE()` 创建一些分组，然后使用 `RANK()` 函数在分组内对数值进行排名。我们将使用 `Transaction` 表，该表大约有
    651,934 行数据。


    **建议**

    一旦你熟悉了此函数及其他函数，尝试将 `Transaction` 表加载两到三次，以模拟一天两笔或更多交易。数据量将增加到大约两百万行。根据新的行数加载 `Account`
    和 `Portfolio` 表，以观察在运行我们刚刚讨论的查询时，性能会受到怎样的影响。


    这是另一个同时使用 `NTILE()` 和 `RANK()` 函数的简单示例。这两个函数以不同的方式处理数据：一个对数据进行分类，另一个对其进行排名。我们将看看估计的查询计划是否复杂。


    请参考代码清单 6-13。


    ```sql

    ;WITH SymbolCTE (TransYear,Symbol,SumTransactions,InvestmentBucket)

    AS

    (

    SELECT YEAR([TransDate])  AS TransYear

    ,[Symbol]

    ,SUM([TransAmount]) AS SumTransactions

    ,NTILE(9) OVER (

    PARTITION BY YEAR([TransDate])

    ORDER BY SUM([TransAmount]) DESC

    ) AS InvestmentBucket

    FROM [APFinance].[Financial].[Transaction]

    GROUP BY YEAR([TransDate]),Symbol

    )

    SELECT TransYear

    ,Symbol

    ,SumTransactions

    ,InvestmentBucket

    ,RANK() OVER(

    PARTITION BY TransYear,InvestmentBucket

    ORDER BY InvestmentBucket,SumTransactions DESC

    ) AS InvestmentRank

    FROM SymbolCTE

    GO

    ```


    *代码清单 6-13*

    *在分组内对数值进行排名*


    我们只对 `BUY`（买入）交易感兴趣，因此设置了一个 `WHERE` 子句来过滤掉所有非“`BUY`”的交易。`CTE`（公用表表达式）汇总了交易金额，因此需要
    `GROUP BY` 子句，因为我们没有包含 `OVER()` 子句。`NTILE()` 函数确实使用了带有 `PARTITION BY` 和 `ORDER
    BY` 子句的 `OVER()` 子句。分区按年份设置，分区内结果集按总交易金额排序。


    请参考图 6-30。


    ![](img/527021_1_En_6_Fig30_HTML.jpg)

    *这是一张标题为“排名金融查询”的 SQL 应用程序截图。它显示了一个包含 29 行 5 列的程序列表。列标题分别是交易年份、代码、总交易额、投资分组和投资排名。高亮显示的行是第
    1 到 4 行、第 9 到 12 行以及第 25 到 28 行。*

    *图 6-30*

    *2012 年股票代码分组评级*


    看起来我们有九个分组，每个分组分配了四个股票代码。没有并列情况，因此我们没有看到此函数产生的特殊排名模式。金融工具在每个分组内被评为 1 到 4 级。在规划投资组合时，这可能是有价值的信息。


    **练习**

    作为一个小练习，使用第一个示例中的逻辑，以便根据分组内的排名对股票代码进行评级。提示：你需要使用一个 `CASE` 代码块。


    我认为这个结果集可以生成一些有趣的图表，所以让我们将结果复制粘贴到 Excel 电子表格中，并生成一些图表。


    请参考图 6-31。


    ![](img/527021_1_En_6_Fig31_HTML.png)

    *这是一张 Excel 工作表的截图。它展示了 2012 年第 1、2、3 和 4 分组的，金额与股票代码关系的 4 个不同条形图。所有图表都描绘了下降趋势，而在第
    1 和第 2 分组中，总金额和序列 1 的线条呈下降趋势。*

    *图 6-31*

    *2012 年股票代码分组评级*


    这次我们生成了四个较小的图表，每个分组一个，但通过视觉我们可以看到排名位置和趋势线。包含数值也有助于理解信息。看一下第 3 分组的图表，哪个是排名最高的工具？哪个是最低的？最低的几乎并列，但这种可视化表示将帮助分析师决定为其客户的投资组合投资什么。


    **思考与想法**

    在这个阶段，我们可以看到，我们一直在研究的 SQL Server 函数是我们用于从原始数据生成分析数据的第一线工具。我们的工具范围包括通过查询生成的报告，到使用
    Microsoft Excel 根据查询结果生成的图表和数据透视表。另一个工具是使用函数生成的分析数据来填充使用 Microsoft Power BI 创建的计分卡和仪表板。我建议你熟悉
    Excel 和 Power BI。'
- fmt: '### Performance Considerations


    让我们来看一个同时包含`RANK()`和`NTILE()`函数的查询，其估算查询计划是什么样子的。请参考图[6-32](#527021_1_En_6_Chapter.xhtml#Fig32)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig32_HTML.png)


    图6-32


    `NTILE()` 和 `RANK()` 的估算查询计划


    和往常一样，我们从右向左看。我们看到一个成本为56%的索引查找，接着是一个成本为1%的计算标量步骤，最后是一个成本为43%的哈希匹配聚合任务。让我们通过将鼠标悬停在每个任务上，来详细查看这三个任务。


    请参考图[6-33](#527021_1_En_6_Chapter.xhtml#Fig33)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig33_HTML.jpg)


    图6-33


    详细的任务信息


    从索引扫描开始，我们看到顶部和底部的对象分别是`Transaction`表（顶部对象）和索引`ieTransDateSymbolTransAmount`（底部对象）。接下来，计算标量任务输出了表达式`Expr1003`。


    这是什么？以下是从分析统计信息中检索到的表达式：


    ```

    [Expr1003]=datepart(year,[APFinance].[Financial].[Transaction].[TransDate])))

    ```


    谜底揭晓了。它是`DATEPART()`函数的结果，用于提取年份。


    最后，回想一下哈希匹配任务的作用：它们将索引扫描中顶部对象的行与底部对象的行进行匹配，并通过构建哈希表来匹配它们。我鼓励你检查查询计划中这些节点的细节，因为它们清楚地说明了正在发生的事情，特别是对于你以前没见过的任务。了解它们的作用可以帮助你提出性能改进措施，比如修改查询或创建暂存表或临时表。


    打印出此步骤的语句文本，会产生以下逻辑：


    ```

    --Hash Match(Aggregate,

    HASH:(

    [Expr1003],

    [APFinance].[Financial].[Transaction].[Symbol]

    ),

    RESIDUAL:[

    Expr1003] = [Expr1003] AND

    [APFinance].[Financial].[Transaction].[Symbol]

    = [APFinance].[Financial].[Transaction].[Symbol])

    DEFINE:(

    [Expr1004]=SUM([APFinance].[Financial].[Transaction].[TransAmount]))

    )

    --Compute Scalar(DEFINE:

    [Expr1003]=datepart(year,[APFinance].[Financial].[Transaction].[TransDate])))

    ```


    我同意，这有点晦涩。


    这确定了执行`SUM()`值运算和提取年份日期部分的两个表达式。


    回顾查询计划，注意当我们使用索引扫描时线条的宽度，以及当流程从右向左移动时它们如何变细。这个特性可以帮助我们识别高容量任务和性能改进的机会。始终要注意这些。


    最后但同样重要的是三个窗口聚合任务。虽然它们的成本占比是0%，但值得一提的是，这些任务与两个使用`OVER()`子句的排名函数相关。如果我们查看分析统计信息中的这一步，会发现`EstimateIO`值为0，因此这个处理是在内存中执行的。这正是我们希望看到的！


    这些是分析统计信息的`StmtText`列中复制出来的、对应这些任务的语句：


    ```

    --Window Aggregate(

    DEFINE:(

    [Expr1006]=rank),

    PARTITION COLUMNS:([Expr1003], [Expr1005]),

    ORDER BY:([Expr1003], [Expr1005]),

    ROWS BETWEEN:(UNBOUNDED, CURRENT ROW)

    )

    --Window Aggregate(

    DEFINE:(

    [Expr1005]=ntile),

    PARTITION COLUMNS:([Expr1003]),

    ROWS BETWEEN:(UNBOUNDED, CURRENT ROW)

    --Window Aggregate(

    DEFINE:(

    [AggResult1009]=Count(*)),

    PARTITION COLUMNS:([Expr1003]),

    ORDER BY:([Expr1003]),

    RANGE BETWEEN:(UNBOUNDED, UNBOUNDED)

    )

    ```


    现在我们可以将查询计划步骤与实际的查询组件关联起来。但是`COUNT(*)`步骤是从哪里来的呢？查询中并没有包含它。看起来它必须计算行数，以便在下一步中定义和处理数据块（tiles）。


    既然我们刚刚引用了它，不妨也查看一下此脚本的`PROFILE`统计信息。


    请参考图[6-34](#527021_1_En_6_Chapter.xhtml#Fig34)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig34_HTML.jpg)


    图6-34


    `NTILE()` 和 `RANK()` 的 PROFILE 统计信息


    总的子树成本看起来很高。一个可能的解决方案是，你猜对了，用一张每日加载一次的报表表替换`CTE`。这应该能显著改善情况。注意，九个步骤中有六个的`EstimateIO`值为0，因此处理是在内存中进行的（你拥有的内存越快越好）。


    本章的脚本中提供了报表表方法的代码，所以你可以自己尝试一下。我很快会比较两种场景下的统计信息。


    让我们看看其他统计信息。以下是两种方法的`IO`和`TIME`统计信息。


    请参考图[6-35](#527021_1_En_6_Chapter.xhtml#Fig35)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig35_HTML.png)


    图6-35


    比较 IO 和 TIME 统计信息


    这里我们查看由`CTE`和报表表方法生成的统计信息。


    查看两种方法的逻辑读取和预读读取，我们发现报表表方法有显著的改进。逻辑读取从1227次下降到1次，预读读取从1228次下降到0次。因此，如果业务需求允许数据可以有24小时的延迟，你可以将计算密集型数据加载到报表表中，然后运行从预加载的报表表中生成结果的查询。


    顺便说一句，当我使用报表表运行新查询的估算查询计划时，昂贵的哈希匹配聚合任务被消除了。简单有效的策略！


    **注意**


    为节省篇幅，我没有展示报表表策略的代码，但它包含在本章可供下载的代码中。试用它，检查它，弄坏它，然后改进它！这就是学习的方式。'
  raw: '#### Performance Considerations


    Let’s see what an estimated query plan looks like for a query that contains both
    a `RANK()` and an `NTILE()` function. Please refer to Figure [6-32](#527021_1_En_6_Chapter.xhtml#Fig32).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig32_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program and query 1, which includes select cost, 3 window aggregate cost, sort
    cost, Hash match cost, compute scaler cost, and index scan cost. The hash match
    and index scan costs are 43 % and 56%, respectively.


    Figure 6-32


    NTILE() and RANK() estimated query plan


    As usual we start from right to left. We see an index seek at a cost of 56% followed
    by a compute scalar step at 1% and a hash match aggregate task at 43%. Let’s take
    a detailed view of these three tasks by placing the mouse pointer over each one.


    Please refer to Figure [6-33](#527021_1_En_6_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig33_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and 9 steps of select, 3 window aggregates, sort, hash match, compute
    scaler cost, and index seek costs. At the top, detailed data on Hash match, compute
    scaler, and index seek are represented.


    Figure 6-33


    Detailed task information


    Starting with the index scan, we see that the top and bottom objects are the `Transaction`
    table (top object) and the index `ieTransDateSymbolTransAmount` (bottom object).
    Next, the compute scalar task outputs expression Expr1003.


    What is this? The following is the expression retrieved from the profile statistics:


    ```

    [Expr1003]=datepart(year,[APFinance].[Financial].[Transaction].[TransDate])))

    ```


    Mystery solved. It is the results of the `DATEPART()` function, which is used
    to extract the year.


    Finally, recall what the hash match tasks do; they match the rows from the top
    object in the index scan to the bottom object in the index scan and match them
    by building a hash table. I encourage you to examine the details for these nodes
    in a query plan as they clearly identify what is going on, especially for tasks
    you have not seen before. Knowing what they do can help you come up with performance
    improvement actions like modifying a query or creating staging or temporary tables.


    Printing out the statement text for this step produces the following logic:


    ```

    --Hash Match(Aggregate,

    HASH:(

    [Expr1003],

    [APFinance].[Financial].[Transaction].[Symbol]

    ),

    RESIDUAL:[

    Expr1003] = [Expr1003] AND

    [APFinance].[Financial].[Transaction].[Symbol]

    = [APFinance].[Financial].[Transaction].[Symbol])

    DEFINE:(

    [Expr1004]=SUM([APFinance].[Financial].[Transaction].[TransAmount]))

    )

    --Compute Scalar(DEFINE:

    [Expr1003]=datepart(year,[APFinance].[Financial].[Transaction].[TransDate])))

    ```


    A little cryptic, I agree.


    This identifies the two expressions that perform the `SUM()` values and pull out
    the year date part.


    Looking back at the query plan, notice the width of the lines as we use the index
    scan and then how they get thinner as the flow goes from right to left. This feature
    can help us identify high-volume tasks and opportunities for performance improvement.
    Always be aware of these.


    Last but not least are the three window aggregate tasks. Although they chime in
    at 0% cost, it is worth mentioning that these are the tasks associated with the
    two ranking functions that use the `OVER()` clause. If we look at this step in
    the profile statistics, we see that the `EstimateIO` value is 0, so this processing
    is performed in memory. That’s what we want to see!


    These are the statements for these tasks when copied from the profile statistics
    column `StmtText`:


    ```

    --Window Aggregate(

    DEFINE:(

    [Expr1006]=rank),

    PARTITION COLUMNS:([Expr1003], [Expr1005]),

    ORDER BY:([Expr1003], [Expr1005]),

    ROWS BETWEEN:(UNBOUNDED, CURRENT ROW)

    )

    --Window Aggregate(

    DEFINE:(

    [Expr1005]=ntile),

    PARTITION COLUMNS:([Expr1003]),

    ROWS BETWEEN:(UNBOUNDED, CURRENT ROW)

    --Window Aggregate(

    DEFINE:(

    [AggResult1009]=Count(*)),

    PARTITION COLUMNS:([Expr1003]),

    ORDER BY:([Expr1003]),

    RANGE BETWEEN:(UNBOUNDED, UNBOUNDED)

    )

    ```


    Now we can associate query plan steps to the actual query components. But where
    does the `COUNT(*)` step come in? This was not included in the query. Looks like
    it had to count the rows so the tiles could be defined and processed in the next
    step.


    Might as well check out the `PROFILE` statistics for this script as we just referenced
    it.


    Please refer to Figure [6-34](#527021_1_En_6_Chapter.xhtml#Fig34).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig34_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program with a list that includes trans year, symbol, sum transactions, investment
    bucket, and investment rank. Estimated values for Rows, I O, C P U, average row
    size, and total subtree cost are highlighted with a box.


    Figure 6-34


    PROFILE statistics for NTILE() and RANK()


    The total subtree costs seem high. One possible solution is to, you guessed it,
    replace the `CTE` with a reporting table, which is loaded once a day. This should
    improve things considerably. Notice that six out of nine steps have `EstimateIO`
    values of 0, so processing is using memory (the faster memory you have, the better).


    You have code for a reporting table approach in the script for this chapter so
    you can try it on your own. I will compare the statistics between both scenarios
    shortly.


    Let’s take a peek at the other statistics. The following are the `IO` and `TIME`
    statistics for both approaches.


    Please refer to Figure [6-35](#527021_1_En_6_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig35_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    the program to find I O and time statistics in both tabs, top and bottom.


    Figure 6-35


    Comparing IO and TIME statistics


    Here we look at the statistics generated by the `CTE` and report table approaches.


    Looking at the logical reads and read-ahead reads for both approaches, we see
    a drastic improvement with the reporting table approach. Logical reads went down
    from 1227 to 1, and read-ahead reads went from 1228 to 0\. So, if the business
    requirements allow for data that can be 24 hours old, you can load the computationally
    intensive data in a report table and then run the query that generates the results
    from the preloaded report table.


    By the way, the expensive hash match aggregate task was eliminated when I ran
    an estimated query plan on the new query that uses the report table. Simple strategy
    that works!


    Note


    To save space I did not show the code for the report table strategy, but it is
    included in the code for this chapter, which you can download. Try it out, check
    it out, break it, and then improve it! That’s how you learn.'
  trans: '### 性能考量


    让我们来看一个同时包含`RANK()`和`NTILE()`函数的查询，其估算查询计划是什么样子的。请参考图 6-32。


    ![](img/527021_1_En_6_Fig32_HTML.png)


    图 6-32


    `NTILE()` 和 `RANK()` 的估算查询计划


    和往常一样，我们从右向左看。我们看到一个成本为 56%的索引查找，接着是一个成本为 1%的计算标量步骤，最后是一个成本为 43%的哈希匹配聚合任务。让我们通过将鼠标悬停在每个任务上，来详细查看这三个任务。


    请参考图 6-33。


    ![](img/527021_1_En_6_Fig33_HTML.jpg)


    图 6-33


    详细的任务信息


    从索引扫描开始，我们看到顶部和底部的对象分别是`Transaction`表（顶部对象）和索引`ieTransDateSymbolTransAmount`（底部对象）。接下来，计算标量任务输出了表达式`Expr1003`。


    这是什么？以下是从分析统计信息中检索到的表达式：


    ```

    [Expr1003]=datepart(year,[APFinance].[Financial].[Transaction].[TransDate])))

    ```


    谜底揭晓了。它是`DATEPART()`函数的结果，用于提取年份。


    最后，回想一下哈希匹配任务的作用：它们将索引扫描中顶部对象的行与底部对象的行进行匹配，并通过构建哈希表来匹配它们。我鼓励你检查查询计划中这些节点的细节，因为它们清楚地说明了正在发生的事情，特别是对于你以前没见过的任务。了解它们的作用可以帮助你提出性能改进措施，比如修改查询或创建暂存表或临时表。


    打印出此步骤的语句文本，会产生以下逻辑：


    ```

    --Hash Match(Aggregate,

    HASH:(

    [Expr1003],

    [APFinance].[Financial].[Transaction].[Symbol]

    ),

    RESIDUAL:[

    Expr1003] = [Expr1003] AND

    [APFinance].[Financial].[Transaction].[Symbol]

    = [APFinance].[Financial].[Transaction].[Symbol])

    DEFINE:(

    [Expr1004]=SUM([APFinance].[Financial].[Transaction].[TransAmount]))

    )

    --Compute Scalar(DEFINE:

    [Expr1003]=datepart(year,[APFinance].[Financial].[Transaction].[TransDate])))

    ```


    我同意，这有点晦涩。


    这确定了执行`SUM()`值运算和提取年份日期部分的两个表达式。


    回顾查询计划，注意当我们使用索引扫描时线条的宽度，以及当流程从右向左移动时它们如何变细。这个特性可以帮助我们识别高容量任务和性能改进的机会。始终要注意这些。


    最后但同样重要的是三个窗口聚合任务。虽然它们的成本占比是 0%，但值得一提的是，这些任务与两个使用`OVER()`子句的排名函数相关。如果我们查看分析统计信息中的这一步，会发现`EstimateIO`值为
    0，因此这个处理是在内存中执行的。这正是我们希望看到的！


    这些是分析统计信息的`StmtText`列中复制出来的、对应这些任务的语句：


    ```

    --Window Aggregate(

    DEFINE:(

    [Expr1006]=rank),

    PARTITION COLUMNS:([Expr1003], [Expr1005]),

    ORDER BY:([Expr1003], [Expr1005]),

    ROWS BETWEEN:(UNBOUNDED, CURRENT ROW)

    )

    --Window Aggregate(

    DEFINE:(

    [Expr1005]=ntile),

    PARTITION COLUMNS:([Expr1003]),

    ROWS BETWEEN:(UNBOUNDED, CURRENT ROW)

    --Window Aggregate(

    DEFINE:(

    [AggResult1009]=Count(*)),

    PARTITION COLUMNS:([Expr1003]),

    ORDER BY:([Expr1003]),

    RANGE BETWEEN:(UNBOUNDED, UNBOUNDED)

    )

    ```


    现在我们可以将查询计划步骤与实际的查询组件关联起来。但是`COUNT(*)`步骤是从哪里来的呢？查询中并没有包含它。看起来它必须计算行数，以便在下一步中定义和处理数据块（tiles）。


    既然我们刚刚引用了它，不妨也查看一下此脚本的`PROFILE`统计信息。


    请参考图 6-34。


    ![](img/527021_1_En_6_Fig34_HTML.jpg)


    图 6-34


    `NTILE()` 和 `RANK()` 的 PROFILE 统计信息


    总的子树成本看起来很高。一个可能的解决方案是，你猜对了，用一张每日加载一次的报表表替换`CTE`。这应该能显著改善情况。注意，九个步骤中有六个的`EstimateIO`值为
    0，因此处理是在内存中进行的（你拥有的内存越快越好）。


    本章的脚本中提供了报表表方法的代码，所以你可以自己尝试一下。我很快会比较两种场景下的统计信息。


    让我们看看其他统计信息。以下是两种方法的`IO`和`TIME`统计信息。


    请参考图 6-35。


    ![](img/527021_1_En_6_Fig35_HTML.png)


    图 6-35


    比较 IO 和 TIME 统计信息


    这里我们查看由`CTE`和报表表方法生成的统计信息。


    查看两种方法的逻辑读取和预读读取，我们发现报表表方法有显著的改进。逻辑读取从 1227 次下降到 1 次，预读读取从 1228 次下降到 0 次。因此，如果业务需求允许数据可以有
    24 小时的延迟，你可以将计算密集型数据加载到报表表中，然后运行从预加载的报表表中生成结果的查询。


    顺便说一句，当我使用报表表运行新查询的估算查询计划时，昂贵的哈希匹配聚合任务被消除了。简单有效的策略！


    **注意**


    为节省篇幅，我没有展示报表表策略的代码，但它包含在本章可供下载的代码中。试用它，检查它，弄坏它，然后改进它！这就是学习的方式。'
- fmt: '### ROW_NUMBER( ) Function


    This function, if you recall, does just what the name implies. Given a set of
    rows in the data result set, it will assign a sequential number to each row in
    the data set (or partition).

    Depending on how you set up the `OVER()` clause and the `PARTITION BY` and `ORDER
    BY` clauses, it will assign row numbers to each partition in the result set. That
    is, each time you move to the next partition, the row number starts at 1 and goes
    on sequentially until the last row in the partition.

    Lastly, this function behaves like some of the other functions we discussed, like
    the `RANK()` function. Let’s compare these two functions now.

    The business requirements for this next script are as follows:

    For each customer and for each set of portfolios for the customer for all years,
    rank the performance of the portfolio accounts in the customer portfolio. Include
    the row numbers for each set of results.

    Please refer to Listing [6-14](#527021_1_En_6_Chapter.xhtml#PC18).


    ```sql

    WITH PortfolioAnalysis (

    TradeYear,CustId,PortfolioNo,PortfolioAccountType,Portfolio,YearlyValue

    )

    AS (

    SELECT Year AS TradeYear

    ,CustId

    ,PortfolioNo

    ,PortfolioAccountTypeCode

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    FROM Financial.Portfolio

    WHERE Year > 2011

    GROUP BY CustId,Year,PortfolioNo,PortfolioAccountTypeCode,Portfolio

    )

    SELECT TradeYear

    ,CustId

    ,PortfolioNo

    ,PortfolioAccountType

    ,Portfolio

    ,YearlyValue

    ,RANK() OVER(

    PARTITION BY CustId,TradeYear

    ORDER BY CustId,TradeYear,YearlyValue DESC

    ) AS PortfolioRankByYear

    ,ROW_NUMBER() OVER(

    PARTITION BY CustId,TradeYear

    ORDER BY CustId,TradeYear,YearlyValue DESC

    ) AS PortfolioRowNumByYear

    FROM PortfolioAnalysis

    GO

    ```

    Listing 6-14

    Assign Row Numbers and Rank to Each Partition


    The `CTE` strategy is used again so we can generate the transaction sum values
    and then let the outer query perform the ranking and row assignment. Both the
    `RANK()` and `ROW_NUMBER()` functions use the same partition definition and sort
    order. The partitions are defined by `CustId` and `TradeYear`, and the partition
    result set rows are sorted by `CustId`, `TradeYear`, and the `YearlyValue`.

    Please refer to the partial results in Figure [6-36](#527021_1_En_6_Chapter.xhtml#Fig36).

    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig36_HTML.png)

    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and a list with 24 rows and 8 columns, which are trade year, customer
    i d, portfolio number and account type, portfolio, yearly value, portfolio rank
    by year, and portfolio row number by year.

    Figure 6-36

    Portfolio analysis report

    Works as expected. The cash portfolio seems to always be the top-performer. Does
    this mean the customers are always depositing extra cash to cover the trades,
    or are they selling stocks and making a profit?

    The script that loads the transaction does deposit extra cash just to make sure
    our customers do not run out!

    One last graph before we do some performance analysis. Please refer to Figure
    [6-37](#527021_1_En_6_Chapter.xhtml#Fig37).

    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig37_HTML.jpg)

    A screenshot of an Excel sheet titled c h 06. It plots 2 bar graphs of value versus
    portfolio and year. On top, it plots bars for express increase, decrease, and
    total values. At the bottom, the bar for the year 2015 holds the highest value
    of $412724.00.

    Figure 6-37

    Cash portfolio analysis – two views

    For customer `C0000001` (our old friend, whom we always pick), we see the portfolio
    value across all four years and for all portfolios. These represent the sum of
    all buy and all sell transactions plus deposits (credits) and withdrawals (debits)
    for cash accounts. This is an example of how you can track performance across
    all portfolios but also for each portfolio across all years.

    The last graph tells us a lot of cash went out in 2013 and 2014 but it was gained
    back in 2015 and surpassed the 2012 value by about $200,000. The trend line goes
    up, so I guess that’s a good thing!


    #### Performance Considerations

    As is our usual routine, let’s generate our first estimated execution plan for
    this query. Remember it has steps for the `RANK()` and the `ROW_NUMBER()` function,
    so the results should not be too different from our prior query.

    Please refer to Figure [6-38](#527021_1_En_6_Chapter.xhtml#Fig38).

    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig38_HTML.jpg)

    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and query 1, which include select cost, sequence project cost, 2 segment
    costs, sort cost, hash match cost, and Index scan cost. Hash match cost and Index
    scan cost are 52% and 45%, respectively.

    Figure 6-38

    First estimated query plan

    No surprises here, but we have an index scan, which is more costly than an index
    seek. This one chimes in at 45% cost. And there is our old friend, the expensive
    `Hash Match Aggregate` step at 52% cost. The `Sort` step at 3% is not expensive.
    Let’s generate the execution plan again but this time with live statistics.

    Please refer to Figure [6-39](#527021_1_En_6_Chapter.xhtml#Fig39).

    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig39_HTML.png)

    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and query 1, which include select, sequence project cost, segment 120
    of 600, sort 120 of 600, hash match 120 of 600, and index scan 43830 of 43830.

    Figure 6-39

    Estimated query plan live statistics

    Clicking the icon in the menu bar with the little green checkmark will generate
    the live statistics. By the way, it is a good idea to run both the estimated and
    the live statistics.

    Usually, they should not be too far apart, but if they are, some analysis and
    query tuning are warranted to find out the reason, like more or fewer steps between
    the plans. Notice that we see the row counts as the flow of data proceeds from
    right to left. The index scan retrieves 43,830 rows, and as processing begins,
    the row set is reduced to 120, which is the count for each of the remaining steps.

    ***Wait a minute. What’s up with the index scan showing 100% and the others showing
    20%?***

    These are actually time progress indicators and not costs. If a query ran long
    enough, you could see the progress indicators increment for each step until the
    processing was finished. Let’s see an example. Please refer to Listing [6-15](#527021_1_En_6_Chapter.xhtml#PC19).


    ```sql

    SELECT TransYear,

    N.Symbol,

    SumTransactions,

    InvestmentBucket,

    RANK() OVER(

    PARTITION BY TransYear,InvestmentBucket

    ORDER BY InvestmentBucket,SumTransactions DESC

    ) AS InvestmentRank

    FROM NtileSymbolBuckets N

    CROSS JOIN [MasterData].[Calendar]

    CROSS JOIN [Financial].[TickerSymbols]

    GO

    ```

    Listing 6-15

    Query Example to Generate Dynamic Statistics


    The query itself is meaningless. It just performs a three-table `CROSS JOIN` to
    generate a lot of rows and make the query run a long time. If you execute it,
    you can actually see the row number and time spent counters change as the query
    runs. This is another tool that lets you see tasks that take a long time to run
    and volumes of data so you can see if you can improve the query to minimize these
    intensive tasks. Check out the following output in Figure [6-40](#527021_1_En_6_Chapter.xhtml#Fig40).

    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig40_HTML.png)

    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and gives the estimated query program. It gives 12 types of cost values.

    Figure 6-40

    Live query plan statistics

    We can see the time spent in seconds, like the `Sort` step at the right-hand top
    of the plan that shows 10.515 seconds, and it is only 8% completed. We see the
    row counts also, so this output has a lot of valuable information to help you
    with your performance tuning.'
