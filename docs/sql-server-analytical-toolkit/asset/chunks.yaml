    server to use. An arrow indicates the connect button at the bottom left corner.


    Figure 12-34


    Connect to the server to publish the report


    Now we are ready to publish the report. On the lower left-hand side is the Connect
    button that we will use to connect to our web server. Click the “Connect” button
    and supply the name of the `SSRS` server installed on your laptop, desktop, or
    actual development server that your company gave you access to.


    Pick a server from the drop-down list and press the “Connect” button. Now we are
    ready to publish the report parts and report.


    Please refer to Figure [12-35](#527021_1_En_12_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig35_HTML.png)


    A screenshot of the Microsoft Report builder window. It presents the Pop panel
    of the recent document. An arrow indicates the Publish Report Parts folder under
    the Home option of the main menu. A list of recent documents are on the right.


    Figure 12-35


    Publish the report


    Switch to the first tab, the “File” tab, and click “Publish Report Parts.” Another
    panel appears that lets you select how you want to publish the report.


    Please refer to Figure [12-36](#527021_1_En_12_Chapter.xhtml#Fig36).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig36_HTML.png)


    A screenshot of the home page of Microsoft Report builder. It presents the Pop
    panel of the Publish Report Parts. An arrow indicates the option of Review and
    Modify report parts before publishing.


    Figure 12-36


    Review parts before publishing, part 1'
