  raw: '### STRING_AGG( ) Function


    Here’s the function used to aggregate text strings again. Let’s look at a simple
    example that shows how to create message packets related to ticker price that
    could be used to communicate the information between trading platforms.


    Here is the syntax:


    ```

    STRING_AGG(,)

    ```


    By cleverly creating a text string that combines labels, messages, and data from
    a table, we can create data packets that can be used by an application for tracking
    ticker symbol prices by days and hours.


    In this case, the analyst requirement is to assemble the ticker symbol, company
    name, trade date, hour, and price. This information is needed by traders as they
    execute buy and sell transactions. Some sort of packet start/stop token needs
    to be added at each end of the packet so the data stream can be processed at the
    receiving end.


    Please refer to Listing [5-14](#527021_1_En_5_Chapter.xhtml#PC27).


    ```

    SELECT STRING_AGG(''msg start->ticker:'' + Ticker

    + '',company:'' + Company

    + '',trade date:'' + convert(VARCHAR, TickerDate)

    + '',hour:'' + convert(VARCHAR, QuoteHour)

    + '',price:'' + convert(VARCHAR, Quote) + ''<-msg stop'', ''!'') + CHAR(10)

    FROM MasterData.TickerHistory

    WHERE TickerDate = ''2015-01-01''

    GO

    Listing 5-14

    Assemble 24-Hour Ticker Prices

    ```


    This is just a simple example, and you need to use your imagination a bit, but
    it illustrates the applicability of even this function in a financial trading
    scenario.


    Please refer to the results in Figure [5-40](#527021_1_En_5_Chapter.xhtml#Fig42).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig42_HTML.png)


    A screenshot of c h 05 aggregate queries s q l. The top screen presents some programming
    codes. The bottom screen presents the results and messages.


    Figure 5-40


    Twenty-four-hour ticker prices for symbol GOITGUY


    The results are one long string with embedded cursor/return characters. I copied
    the results into a query pane and placed some comments around so you can see the
    results.


    We will not look at any performance analysis as this will basically be one large
    table scan. Since we have a `WHERE` clause that filters by date, we can easily
    come to the conclusion an index would be needed on that column.


    If the table stores thousands of ticker symbols for periods that span decades,
    then a clustered index on symbol and trade date would be required.


    ### STDEV( ) and STDEVP( ) Functions


    Recall from Chapter [2](#527021_1_En_2_Chapter.xhtml) that the `STDEV()` function
    calculates the statistical standard deviation of a set of values when the entire
    population is not known or available.


    Also recall that the `STDEVP()` function calculates the statistical standard deviation
    when the entire population of the data set is known. Simple to remember; it has
    a capital “P” at the end of the name.


    What this means is how close or how far apart the numbers are in the data set
    from the arithmetic **MEAN** (which is another word for average). In our context
    the average or **MEAN** is the sum of all data values in question divided by the
    number of data values. There are other types of **MEAN** like geometric, harmonic,
    and weighted **MEAN**, which are discussed in Appendix B.


    The syntax is just like the other functions we covered so far:


    ```

    STDEV(ALL|DISTINCT ) and STDEVP(ALL|DISTINCT )

    ```


    The fun begins when you start using an `OVER()` clause to generate results. We
    will look at two examples, one with our test data that exists in the `APFinance`
    database and one where the data is also test data but it is a small example with
    only 12 rows so we can see how to interpret the information and create an interesting
    graph called a bell curve.


    We will also graph our financial data results, but because of the wild fluctuations
    in financial transactions, we will see a rather interesting and weird graph!


    Here is the business specification our analyst gave us:


    Create a report that will show monthly trade totals and the standard deviations
    both for partial data and full data set availability (hint: `STDEVP`). Results
    should be for, you guessed it, customer C0000001, John Smith, and for the 2012
    calendar trading year. Show the year, quarter, and month. The report needs to
    identify the customer portfolio. I am only interested in the commodity portfolio
    at this time, but the query you build can be expanded to report on other portfolios.
    Lastly, generate a Microsoft Excel spreadsheet graph from the results.


    After studying the requirements, Listing [5-15](#527021_1_En_5_Chapter.xhtml#PC29)
    is the code we came up with.


    ```

    WITH PortfolioAnalysis (

    TradeYear,TradeQtr,TradeMonth,CustId,PortfolioNo,Portfolio,MonthlyValue

    )

    AS (

    SELECT Year                           AS TradeYear

    ,DATEPART(qq,SweepDate)         AS TradeQtr

    ,Month                          AS TradeMonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value)                          AS MonthlyValue

    FROM Financial.Portfolio

    WHERE Year > 2011

    GROUP BY CustId

    ,PortfolioNo

    ,Year

    ,Month

    ,SweepDate

    ,Portfolio

    )

    SELECT TradeYear

    ,TradeQtr

    ,TradeMonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,MonthlyValue

    ,SUM(MonthlyValue) OVER(

    PARTITION BY Portfolio

    ORDER BY Portfolio,TradeMonth

    ) AS RollingMonthlyValue

    ,STDEV(MonthlyValue) OVER(

    PARTITION BY Portfolio

    ORDER BY Portfolio,TradeMonth

    ) AS RollingMonthlyStdev

    ,STDEVP(MonthlyValue) OVER(

    PARTITION BY Portfolio

    ORDER BY Portfolio,TradeMonth

    ) AS RollingMonthlyStdevp

    FROM PortfolioAnalysis

    WHERE TradeYear = 2012

    AND CustId = ''C0000001''

    AND Portfolio = ''CASH - FINANCIAL PORTFOLIO''

    ORDER BY CustId,Portfolio,TradeYear,TradeQtr,TradeMonth

    GO

    Listing 5-15

    Portfolio Standard Deviation Analysis

    ```


    We are back to using our old friend, the `CTE`. The year, quarter, and month parts
    of the date are pulled out together with the customer and portfolio information.
    The value is summed up by year, month, and sweep date.


    Note that results are for the cash portfolio, so technically, you do not need
    to call out the portfolio in the `PARTITION BY` clause. Download the script, try
    commenting it out, and then add it back in. Also add another portfolio name in
    the `WHERE` clause predicate. That’s when the `PARTITION BY` portfolio kicks in.
    Let’s see the report generated by this query.


    Please refer to the results in Figure [5-41](#527021_1_En_5_Chapter.xhtml#Fig43).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig43_HTML.jpg)'
  trans: '

    ### STRING_AGG() 函数


    这里再次用到用于聚合文本字符串的函数。让我们看一个简单的示例，它展示了如何创建与股票代码价格相关的信息包，这些信息包可用于在交易平台之间通信信息。


    语法如下：


    ```

    STRING_AGG(,)

    ```


    通过巧妙地创建一个结合了标签、消息和表中数据的文本字符串，我们可以创建可被应用程序用于按天和小时跟踪股票代码价格的数据包。


    在此案例中，分析师的需求是组装股票代码、公司名称、交易日期、小时和价格。交易员在执行买卖交易时需要这些信息。需要在数据包的两端添加某种包开始/停止令牌，以便在接收端处理数据流。


    请参考下面的列表。


    ```

    SELECT STRING_AGG(''msg start->ticker:'' + Ticker

    + '',company:'' + Company

    + '',trade date:'' + convert(VARCHAR, TickerDate)

    + '',hour:'' + convert(VARCHAR, QuoteHour)

    + '',price:'' + convert(VARCHAR, Quote) + ''<-msg stop'', ''!'') + CHAR(10)

    FROM MasterData.TickerHistory

    WHERE TickerDate = ''2015-01-01''

    GO

    ```


    **清单 5-14** 组装 24 小时股票代码价格


    这只是一个简单的例子，需要你发挥一点想象力，但它说明了即使在金融交易场景中，这个函数也具有适用性。


    请参考下图的结果。


    ![](img/527021_1_En_5_Fig42_HTML.png)


    一张 c h 05 聚合查询 s q l 的截图。上半屏显示一些编程代码。下半屏显示结果和消息。


    **图 5-40** 符号 GOITGUY 的二十四小时股票代码价格


    结果是一个长字符串，内嵌了回车/换行符。我将结果复制到查询窗格中，并在周围添加了一些注释，以便你能看到结果。


    我们不会进行任何性能分析，因为这基本上是一次大型表扫描。由于我们有一个按日期过滤的 `WHERE` 子句，我们可以很容易得出结论：该列需要索引。


    如果该表存储了数千个跨越数十年的股票代码符号，那么就需要在符号和交易日期上建立聚集索引。


    ### STDEV() 和 STDEVP() 函数


    回想一下第 2 章，`STDEV()` 函数在整体数据未知或不可用时，计算一组值的统计标准差。


    再回想一下，`STDEVP()` 函数在数据集的整体数据已知时，计算统计标准差。这很容易记住；它的名称末尾有一个大写的“P”。


    这意味着数据集中的数字与算术 `MEAN`（平均值的另一种说法）的接近或远离程度。在我们的上下文中，平均值或 `MEAN` 是所讨论的所有数据值之和除以数据值的数量。还有其他类型的
    `MEAN`，如几何平均值、调和平均值和加权 `MEAN`，这些在附录 B 中讨论。


    语法与我们目前介绍的其他函数类似：


    ```

    STDEV(ALL|DISTINCT ) and STDEVP(ALL|DISTINCT )

    ```


    当你开始使用 `OVER()` 子句生成结果时，乐趣就开始了。我们将看两个例子，一个使用 `APFinance` 数据库中的测试数据，另一个虽然也是测试数据但只有
    12 行，这样我们可以了解如何解释信息并创建一个有趣的图表，称为钟形曲线。


    我们也将图表化我们的财务数据结果，但由于财务交易的剧烈波动，我们将看到一个相当有趣且怪异的图！


    以下是分析师给我们的业务需求：


    创建一个报告，显示月度交易总额以及部分数据和完整数据集可用时的标准差（提示：使用 `STDEVP`）。结果将针对，你猜对了，客户 C0000001，John
    Smith，以及 2012 日历交易年。显示年份、季度和月份。报告需要标识客户投资组合。我目前只对商品投资组合感兴趣，但你构建的查询可以扩展到报告其他投资组合。最后，根据结果生成
    Microsoft Excel 电子表格图表。


    研究需求后，下面的列表是我们编写的代码。


    ```

    WITH PortfolioAnalysis (

    TradeYear,TradeQtr,TradeMonth,CustId,PortfolioNo,Portfolio,MonthlyValue

    )

    AS (

    SELECT Year                           AS TradeYear

    ,DATEPART(qq,SweepDate)         AS TradeQtr

    ,Month                          AS TradeMonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value)                          AS MonthlyValue

    FROM Financial.Portfolio

    WHERE Year > 2011

    GROUP BY CustId

    ,PortfolioNo

    ,Year

    ,Month

    ,SweepDate

    ,Portfolio

    )

    SELECT TradeYear

    ,TradeQtr

    ,TradeMonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,MonthlyValue

    ,SUM(MonthlyValue) OVER(

    PARTITION BY Portfolio

    ORDER BY Portfolio,TradeMonth

    ) AS RollingMonthlyValue

    ,STDEV(MonthlyValue) OVER(

    PARTITION BY Portfolio

    ORDER BY Portfolio,TradeMonth

    ) AS RollingMonthlyStdev

    ,STDEVP(MonthlyValue) OVER(

    PARTITION BY Portfolio

    ORDER BY Portfolio,TradeMonth

    ) AS RollingMonthlyStdevp

    FROM PortfolioAnalysis

    WHERE TradeYear = 2012

    AND CustId = ''C0000001''

    AND Portfolio = ''CASH - FINANCIAL PORTFOLIO''

    ORDER BY CustId,Portfolio,TradeYear,TradeQtr,TradeMonth

    GO

    ```


    **清单 5-15** 投资组合标准差分析


    我们又回到了使用我们的老朋友 `CTE`。日期中的年份、季度和月份部分与客户和投资组合信息一起被提取出来。价值按年份、月份和结算日期进行汇总。


    请注意，结果是针对现金投资组合的，因此从技术上讲，你不需要在 `PARTITION BY` 子句中指明投资组合。下载脚本，尝试将其注释掉，然后再加回来。另外在
    `WHERE` 子句谓词中添加另一个投资组合名称。那时 `PARTITION BY` portfolio 就会起作用。让我们看看这个查询生成的报告。


    请参考下图的结果。


    ![](img/527021_1_En_5_Fig43_HTML.jpg)

