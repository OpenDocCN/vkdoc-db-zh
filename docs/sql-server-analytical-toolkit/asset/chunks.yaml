    As the window frames get larger, the last value is adjusted to reflect the last
    month in the partitions. I also included a formula that calculates the change
    between the first and last total sales values and a little message that shows
    you if sales increased or decreased or if no change occurred at all.


    This might make a pretty good report for our analysts if we include all years.
    A tool like SQL Server Reporting Services can use this query and include a drop-down
