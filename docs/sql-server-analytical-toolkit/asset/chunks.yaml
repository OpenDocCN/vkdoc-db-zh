    clause was included. After all, we only have ten rows.


    Please refer to Figure [4-1](#527021_1_En_4_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig1_HTML.jpg)


    A screenshot of S Q L Query 1 presents a table of 7 columns and 10 rows with ranking
    functions under a tab. Rows 4, 5, and 6 are highlighted. The headers of the table
    are the test key, the value, row number, value rank, dense rank, value rank, and
    value rank as p c t.


    Figure 4-1


    Ranking functions in action results


    Let’s start with the `ROW_NUMBER()` function results. There are ten rows, and
    the row numbers are 1–10 in sequential order. It does just what the name implies.


    Next are the RANK() function results. Notice what happens with the two ties represented
    by the value 4\. Each is assigned the rank 4 because they are the same. But look
    at what happens to the next row value. It skips the number 5 and is assigned a
    value of 6\. Just like the formula we discussed earlier, it takes the number of
    ties (2) and adds it to the current rank 4 to assign a rank of 6.


    Now look at the `DENSE_RANK()` function results. Just like the RANK() function,
    ties are assigned the same rank value, but the next row value is assigned the
    next higher rank, which is 5.


    Last but not least, the `PERCENT_RANK()` function assigns a rank as a percentage
    between 0 and 1\. I added a column so as to use the `FORMAT()` function to format
    the results as a percentage. This way we can compare the formats and decide which
    one makes sense to use.


    **NTILE() Example**


    Let’s create some tiles. No, not kitchen floor tiles but tiles that are buckets
    of data (I know, bad pun). We will start off with another simple example so we
    can clearly see what this function does. We will use a table variable loaded with
    ten rows of year-to-date sales amounts for our sales team.


    What we want to do is create three tiles or buckets of data so we can use them
    as criteria to award bonuses to the sales team members according to the tile they
    fall into.


    Please refer to Listing [4-2](#527021_1_En_4_Chapter.xhtml#PC2).


    ```

    DECLARE @SalesPersonBonusStructure TABLE (

    SalesPersonNo VARCHAR(4) NOT NULL,

    SalesYtd      MONEY      NOT NULL

    );

    INSERT INTO @SalesPersonBonusStructure VALUES

    (''S001'',2500.00),

    (''S002'',2250.00),

    (''S003'',2000.00),

    (''S004'',1950.00),

    (''S005'',1800.00),

    (''S006'',1750.00),

    (''S007'',1700.00),

    (''S008'',1500.00),

    (''S009'',1250.00),

    (''S010'',1000.00);

    -- Care must be taken how you sort (ASC or DESC)

    SELECT SalesPersonNo

    ,SalesYtd

    ,NTILE(3) OVER(ORDER BY SalesYtd DESC) AS BonusBucket

    ,CASE

    WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 1

    THEN ''Award $500.00 Bonus''

    WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 2

    THEN ''Award $250.00 Bonus''

    WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 3

    THEN ''Award $150.00 Bonus''

    END AS BonusAward

    FROM @SalesPersonBonusStructure

    GO

    Listing 4-2

    Assigning Performance Buckets for Bonuses

    ```


    The solution is simple. The `NTILE()` function is used with an `OVER()` clause
    to create the three tiles. There is no `PARTITION BY` clause due to the small
    data set, but we include an `ORDER BY` clause so we can sort the year-to-date
    sales amounts in descending order.


    Next, a series of three `CASE` blocks determine the tile assignment by using the
    `NTILE()` function again so as to print out a message of the amount the salesperson
    is awarded based on the tile they are in.


    Maybe a little brute force as we could have used a `CTE` to determine the bucket
    and then write the query so it just tests the tile value instead of using the
    `NTILE()` function again. See if you can download the script for this chapter
    and code a query using the `CTE` approach. I did provide the solution just in
    case you get stuck in the script for this section.


    Let’s see what kind of awards each salesperson received. Please refer to Figure
    [4-2](#527021_1_En_4_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig2_HTML.jpg)


    A screenshot of a window presents a table of 4 columns and 10 rows under a tab
    depicting the awards received by salespersons. The headers of the table are salesperson
    number, sales Y t d, bonus bucket, and bonus award.


    Figure 4-2


    Bonus performance buckets


    There are ten rows in the result set, and we specified only three buckets, so
    the bucket assignment is uneven. The first two buckets get three rows each, and
    the last bucket gets four rows. If we had 12 rows, then each bucket would get
    4 rows. Either case these are rather cheesy bonuses. Our sales staff needs to
    sell more if they want larger bonuses!


    Armed with our understanding of how these functions work, let’s use the functions
    against our sales data warehouse. We will start with `RANK()` and `PERCENT_RANK()`
    and revisit `NTILE()` later in the chapter.'
  trans: "\n在这个示例中，由于没有包含 `PARTITION BY` 子句，分区就是整个数据集。毕竟，我们只有十行数据。\n\n请参见图 4-1。\n\n\
    ![](img/527021_1_En_4_Fig1_HTML.jpg)\n\nSQL 查询 1 的截图展示了一个包含 7 列 10 行数据的表格，其中列出了排名函数，显示在选项卡下。第\
    \ 4、5、6 行被高亮显示。表格的标题分别是测试键、值、行号、值排名、密集排名、值排名以及值排名作为百分比。\n\n图 4-1\n\n实际运行中的排名函数结果\n\
    \n我们从 `ROW_NUMBER()` 函数的结果开始。共有十行数据，行号按顺序从 1 到 10。这正是函数名所暗示的。\n\n接下来是 `RANK()`\
    \ 函数的结果。注意值 4 出现的两次平局（并列）是如何处理的。因为它们相同，所以都被赋予排名 4。但是看看下一行的值发生了什么。它跳过了数字 5，被赋予了值\
    \ 6。就像我们之前讨论的公式一样，它取平局的数量（2），加上当前的排名 4，从而赋予排名 6。\n\n现在看看 `DENSE_RANK()` 函数的结果。与\
    \ `RANK()` 函数类似，平局被赋予相同的排名值，但下一行的值会被赋予下一个更高的排名，也就是 5。\n\n最后但同样重要的是，`PERCENT_RANK()`\
    \ 函数将排名分配为 0 到 1 之间的百分比值。我添加了一列，以便使用 `FORMAT()` 函数将结果格式化为百分比。这样我们就可以比较格式，并决定哪种格式更有意义。\n\
    \n## `NTILE()` 示例\n\n现在我们来创建一些“瓦片”（tiles）。不，不是厨房地砖，而是数据桶（我知道，这是个蹩脚的双关语）。我们将从另一个简单的示例开始，以便清楚地看到这个函数的作用。我们将使用一个表变量，其中加载了我们销售团队的十行年初至今的销售金额。\n\
    \n我们想要做的是创建三个数据桶或分组，然后根据销售人员落入哪个桶，将其作为给他们发放奖金的标准。\n\n请参考代码清单 4-2。\n\n```\nDECLARE\
    \ @SalesPersonBonusStructure TABLE (\n    SalesPersonNo VARCHAR(4) NOT NULL,\n\
    \    SalesYtd      MONEY      NOT NULL\n);\nINSERT INTO @SalesPersonBonusStructure\
    \ VALUES\n('S001',2500.00),\n('S002',2250.00),\n('S003',2000.00),\n('S004',1950.00),\n\
    ('S005',1800.00),\n('S006',1750.00),\n('S007',1700.00),\n('S008',1500.00),\n('S009',1250.00),\n\
    ('S010',1000.00);\n-- 排序方式（升序 ASC 或降序 DESC）必须谨慎选择\nSELECT SalesPersonNo\n    \
    \  ,SalesYtd\n      ,NTILE(3) OVER(ORDER BY SalesYtd DESC) AS BonusBucket\n  \
    \    ,CASE\n          WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 1 THEN '奖励\
    \ $500.00 奖金'\n          WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 2 THEN\
    \ '奖励 $250.00 奖金'\n          WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 3\
    \ THEN '奖励 $150.00 奖金'\n       END AS BonusAward\nFROM @SalesPersonBonusStructure\n\
    GO\n```\n\n代码清单 4-2\n\n为奖金分配绩效桶\n\n解决方案很简单。`NTILE()` 函数与 `OVER()` 子句一起使用以创建三个桶。由于数据集很小，没有\
    \ `PARTITION BY` 子句，但我们包含了一个 `ORDER BY` 子句，以便按降序对年初至今的销售金额进行排序。\n\n接下来，一系列三个 `CASE`\
    \ 语句块通过再次使用 `NTILE()` 函数来确定分配到哪个桶，从而根据销售人员所在的桶打印出他们获得的奖金金额。\n\n也许有点简单粗暴，因为我们可以使用\
    \ `CTE`（公用表表达式）来确定桶，然后编写查询只测试桶的值，而不用再次使用 `NTILE()` 函数。你可以尝试下载本章的脚本，然后使用 `CTE`\
    \ 方法编写一个查询。万一你在本节的脚本中卡住了，我确实提供了解决方案。\n\n让我们看看每位销售人员获得了什么奖励。请参考图 4-2。\n\n![](img/527021_1_En_4_Fig2_HTML.jpg)\n\
    \n一个窗口的截图展示了一个包含 4 列 10 行的表格，描绘了销售人员获得的奖励，显示在选项卡下。表格的标题分别是销售人员编号、销售年初至今、奖金桶和奖金奖励。\n\
    \n图 4-2\n\n奖金绩效桶\n\n结果集中有十行数据，而我们只指定了三个桶，因此桶的分配是不均匀的。前两个桶各有三行，最后一个桶有四行。如果我们有 12\
    \ 行，那么每个桶将得到 4 行。无论哪种情况，这些奖金都相当寒酸。如果我们的销售人员想要更高的奖金，他们需要卖出更多！\n\n基于我们对这些函数工作原理的理解，让我们在我们的销售数据仓库上使用这些函数。我们将从\
    \ `RANK()` 和 `PERCENT_RANK()` 开始，并在本章后面重新审视 `NTILE()`。\n"
- fmt: '## RANK( ) vs. PERCENT_RANK( )


    Let’s see how these two functions work and compare the results to see any similarities.
    The `PERCENT_RANK()` falls under the analytical function category, which we covered
    in the last chapter, but I include it in this chapter so we can compare it to
    the `RANK()` function.


    We will use our usual structure to put these functions through their paces. Please
    refer to Listing [4-3](#527021_1_En_4_Chapter.xhtml#PC3).


    ```sql

    WITH CustomerRanking (

    CalendarYear,CalendarMonth,CustomerFullName,TotalSales

    )

    AS

    (

    SELECT CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,SUM(TotalSalesAmount) AS TotalSales

    FROM SalesReports.YearlySalesReport YSR

    JOIN DimTable.Calendar C

    ON YSR.CalendarDate = C.CalendarDate

    GROUP BY C.CalendarYear

    ,C.CalendarMonth

    ,CustomerFullName

    )

    SELECT

    CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,RANK()

    OVER (

    --            PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) AS Rank

    ,PERCENT_RANK()

    OVER (

    --            PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) AS PctRank

    FROM CustomerRanking

    WHERE CalendarYear = 2011

    AND CalendarMonth = 1

    ORDER BY

    RANK() OVER (

    PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) DESC

    GO

    ```


    **Listing 4-3**

    Rank vs. Percent Rank


    Our `CTE` simply assembles some columns we will need to report on and also includes
    the `SUM()` function to calculate total sales by year, month, and customer name.
    To limit the number of rows returned, a `WHERE` clause is used to filter the results
    by year and for one month only (2011, January).


    Reminder – start with small data sets. Develop the solution and test it. Once
    you are satisfied it works correctly, apply the solution to larger data sets.


    Both the `RANK()` and `PERCENT_RANK()` functions use an `OVER()` clause that includes
    an `ORDER BY` clause so the partition rows are sorted by the `TotalSales` column.
    The `PARTITION BY` clause is commented out as we are only retrieving one-year
    worth of data. Once you are comfortable with the logic, feel free to retrieve
    multiple rows and uncomment the `PARTITION BY` clause so we can process multiple
    years.


    Lastly, here is something interesting. You can include a window function in the
    query `ORDER BY` clause (as opposed to the `OVER()` clause). We do so with the
    same code used for the `RANK()` function. Leaving it out will give you the same
    results but in reverse order. But at least you know it can be done. Just understand
    the differences. When the `ORDER BY` clause is in the `OVER()` clause, it sorts
    the rows in the partition. When the `ORDER BY` clause is at the end of the query,
    it sorts the final results of the query.


    Please refer to the partial results in Figure [4-3](#527021_1_En_4_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig3_HTML.jpg)


    A screenshot of a window presents a table of 6 columns and 25 rows of entries
    sorted based on the percent rank. The table headers are calendar year, calendar
    month, customer full name, total sales, rank, and p c t rank.


    **Figure 4-3**

    Rank vs. percent rank


    Results are in descending order. Notice the behavior of the duplicates in rows
    6 and 7 and rows 21 and 22. As mentioned earlier, multiply percent rank by 100.00
    so you see values as percentages or use the `FORMAT()` function instead. This
    way you can graph the results in Microsoft Excel as shown in the following.


    I copied and pasted the results and multiplied the percent rank results by 100.00,
    so we see a nice graph instead of small values less than or equal to 1.0.


    Please refer to Figure [4-4](#527021_1_En_4_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig4_HTML.jpg)


    A screenshot of an Excel worksheet presents a table of 4 columns and 16 rows and
    a line graph of rank versus sales in dollars. The lines labeled rank and P c t
    rank follow an increasing trend with slight fluctuations.


    **Figure 4-4**

    Rank vs. percent rank analysis


    Not too bad. We do see the graph results are almost the same for both functions
    with a nice upward trend. I should have included a comment stating that the percent
    rank results were multiplied by 100.00 to make readers of the graph aware of the
    manipulation.


    The data is displayed to the left for easy reference. It is always a good idea
    to generate some nice graphs and charts with Microsoft Excel for your users so
    they can interpret the results. A picture is worth a thousand words! Microsoft
    Power BI is also a great tool for visualizing data.


    Let’s see the performance characteristics for this query.


    **Tip**

    As a SQL developer or architect, you want to also master some other skills, like
    having a good working knowledge of Microsoft Excel or Power BI so you can generate
    powerful visuals for your users and management. Some ETL skills with SSIS (SQL
    Server Integration Services) would also be valuable.'
