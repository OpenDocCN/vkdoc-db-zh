  trans: '

    ## 步骤 7：加载内存优化表


    现在是加载表的时候了。请参阅清单 3-10。


    ```sql

    INSERT INTO [SalesReports].[MemorySalesTotals]

    SELECT YEAR(CalendarDate)        AS SalesYear

    ,DATEPART(qq,CalendarDate) AS SalesQuarter

    ,MONTH(CalendarDate)       AS SalesMonth

    ,ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,SUM(ST.UnitRetailPrice * ST.TransactionQuantity) AS SalesTotal

    FROM StagingTable.SalesTransaction ST

    GROUP BY ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,ST.UnitRetailPrice

    ,ST.TransactionQuantity

    GO

    Listing 3-10

    加载内存优化表

    ```


    请记住，这是我们之前讨论过的例子中用于 `CTE` 的查询。现在我们已经准备好进行性能分析了。


    ## 步骤 8：检查估计查询计划


    在运行查询之前，我们需要按照常规方式检查估计查询计划。看看是否建议了索引。如果是，则创建索引并重新运行查询计划估计工具。创建索引后，设置参数以显示性能统计信息。


    ## 步骤 9：运行查询


    使用 `DBCC` 清除缓冲区，确保设置了 `IO` 和 `TIME` 统计信息，然后运行查询。


    请参阅清单 3-11。


    ```sql

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,CUME_DIST() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS CumeDist

    ,PERCENT_RANK() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS PctRank

    FROM [SalesReports].[MemorySalesTotals]

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    Listing 3-11

    查询内存优化表

    ```


    务必通过运行 `DBCC` 命令来清除缓冲区。接下来，运行两个命令以开启 `IO` 和 `TIME` 统计信息，然后运行查询。


    ## 步骤 10：创建建议的索引


    这是建议索引的代码。我把它放在这里，但你应该在查看第一个估计查询计划之后运行它。想想看，还是应该先运行查询再创建索引，这样你才能记录性能统计信息。


    请参阅清单 3-12。


    ```sql

    ALTER TABLE SalesReports.MemorySalesTotals

    ADD INDEX ieCustNoSaleYearMemTable

    NONCLUSTERED (CustomerNo,SalesYear)

    GO

    Listing 3-12

    创建建议的索引

    ```


    ## 步骤 11：创建第二个估计查询计划


    索引创建后，创建第二个估计查询计划。也许你可以在两个水平放置的查询窗格中完成。顶部窗格包含没有建议索引的查询计划，底部窗格包含创建建议索引后的查询计划，这样你就可以比较两者了。


    ## 步骤 12：重新运行查询并确保所有统计信息已开启


    在检查估计查询计划和运行带有统计信息的查询时，请确保使用 `DBCC` 清除缓冲区。


    我运行了两次估计查询计划。第一次是为了查看估计器建议了什么索引。第二次是在我创建了建议的索引之后。


    请参考图 3-9 查看索引创建后的估计查询计划。


    ![](img/527021_1_En_3_Fig9_HTML.png)


    第 0 章 3 T S Q L 代码窗口的屏幕截图。顶部屏幕有一些程序代码。底部屏幕显示查询成本的消息。排序成本，28%。排序成本，43%。索引查找成本，23%。


    图 3-9

    估计查询计划


    从右向左阅读查询计划，我们注意到一个成本为 23% 的索引查找操作。接下来是一个成本为 43% 的排序步骤。忽略成本为零或最小的任务，我们看到另一个成本为
    28% 的排序步骤。还有一个成本为 3% 的嵌套循环联接。未显示的是嵌套循环联接左侧的更多任务，但它们的成本都为零。


    请自行下载代码并查看计划和统计信息。学习如何进行这项性能分析活动是值得的。


    让我们通过比较为 `CTE` 版本查询和利用内存优化表的查询生成的统计信息来总结。


    请参考表 3-3 查看 `CTE` 与内存优化表统计信息分析。


    表 3-3

    比较 CTE 与内存优化表统计信息


    | SQL Server 解析和编译时间 | 使用 CTE | 内存优化表 |

    | --- | --- | --- |

    | CPU 时间 (毫秒) | **46** | **0** |

    | 已用时间 (毫秒) | **83** | **0** |

    | **统计信息 (工作表)** | **使用 CTE** | **内存优化表** |

    | 扫描次数 | 26 | 26 |

    | 逻辑读取 | 196 | 198 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **统计信息 (SalesTransaction 和 MemorySalesTotals)** | **使用 CTE** | **内存优化表** |

    | 扫描次数 | 1 | N/A |

    | 逻辑读取 | **23** | N/A |

    | 物理读取 | 1 | N/A |

    | 预读读取 | 20 | N/A |

    | **SQL Server 执行时间** | **使用 CTE** | **内存优化表** |

    | CPU 时间 (毫秒) | **0** | **0** |

    | 已用时间 (毫秒) | **34** | **0** |


    这很有趣。对于内存优化表策略，我们只有工作表的统计信息——没有 `MemorySalesTotal` 表的统计信息，该表现在已加载到内存中。


    我们看到在解析和编译时间以及执行时间的 CPU 时间和已用时间这两组统计信息上都有显著改进。使用内存优化表时，它们都为零。最后，工作表的统计信息结果大致相同。


    看起来内存优化表产生了显著的性能提升。


    最后一点说明：在进行此类分析时，最好将统计信息存储在电子表格中，以便分析和比较。运行多次测试以：


    *   生成查询计划。

    *   生成 `IO` 和 `TIME` 统计信息。

    *   生成客户端统计信息。


    还有另一点说明：如前所述，有时你需要超越索引创建，考虑其他修改，例如报告和内存增强表（甚至查询本身）。


    最后的手段是让管理层用更多和/或更快的内存、快速磁盘或 SAN 解决方案来升级你的服务器。（为 `TEMPDB` 配备一个不错的固态硬盘也会有帮助！）


    让我们继续前进，学习接下来的两个分析函数。

    '
- fmt: '# LAST_VALUE() and FIRST_VALUE()


    So what do this related pair of functions do for us? The names give us a hint.


    Given a set of sorted values, the `FIRST_VALUE()` function will return the first
    value.


    Given a set of sorted values, the `LAST_VALUE()` function will return the last
    value.


    Pretty simple, let’s dive right into an example. This time we eliminated the `CTE`
    and utilized the memory-enhanced table we created earlier.


    Please refer to Listing [3-13](#527021_1_En_3_Chapter.xhtml#PC21).


    ```sql

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) AS SalesTotalFirstValue

    ,LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) AS SalesTotalLastValue

    ,FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) -

    LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) AS Change

    ,CASE

    WHEN (

    FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) - -

    LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    )

    ) > 0 THEN ''Sales Increase''

    WHEN (

    FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) -

    LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    )

    ) < 0 THEN ''Sales Decrease''

    ELSE ''No change''

    END AS [Sales Performance]

    FROM SaleReports.MemorySalesTotals

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    ```


    Listing 3-13

    The `FIRST_VALUE()` and `LAST_VALUE()` Functions in Action


    The usual `OVER()` structure for these functions is used. A `PARTITION BY` clause
    sets up partitions by sales year. An `ORDER BY` clause sorts the partition rows
    by the `SalesMonth` column.


    We sum a second time as we want the results by customer only as the memory-enhanced
    table rows are summed by store and customer plus the usual year, quarter, and
    month columns.


    Please refer to the partial results in Figure [3-10](#527021_1_En_3_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig10_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a results table and client statistics. The table
    has 9 columns. The Monthly Sales Total, Sales Total First Value, and Sales Total
    Last Value columns are highlighted.


    Figure 3-10


    Query results for the test script


    Results are returned for two years. Notice the first and last values for the first
    row. They are equal as the window frame consists of only one row. When we move
    to the second row, the first value remains the same, but the second value now
    reflects the monthly sales total for February.


    As the window frames get larger, the last value is adjusted to reflect the last
    month in the partitions. I also included a formula that calculates the change
    between the first and last total sales values and a little message that shows
    you if sales increased or decreased or if no change occurred at all.


    This might make a pretty good report for our analysts if we include all years.
    A tool like SQL Server Reporting Services can use this query and include a drop-down
    list so analysts can select one, two, or more years.


    # Performance Considerations


    Let’s generate an estimated query plan in the usual manner and see if the memory-optimized
    table plus the index created to support it yields positive results.


    Please refer to Figure [3-11](#527021_1_En_3_Chapter.xhtml#Fig11).


