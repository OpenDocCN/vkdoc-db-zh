    清单 2-13 定义多个窗口


    一个有趣的特性。让我们来结束本章。你可以随时回头复习那些你可能还模糊不清的部分。


    # 总结


    我们达成目标了吗？


    我们介绍了 `APSales` 数据仓库，并研究了这个数据库的概念模型。


    我们还通过引入一些简单的 `数据字典`，熟悉了表、列以及表之间的关系。


    我们通过创建使用 `OVER()` 子句为查询生成的 `数据集` 定义 `窗口框架` 的例子，涵盖了 `聚合函数类别` 中的 `窗口函数`。


    一个重要的目标是，我们需要理解与使用 `窗口函数` 和 `OVER()` 子句的查询相关的 `性能分析` 和 `调优`。这通过生成和研究 `查询计划` 与
    `IO 统计信息` 得以实现。这些信息被用于得出如何提升性能的结论。


    我们还确定了 `窗口假脱机统计信息` 是一个需要监控的重要数值。请确保你理解它的含义。


    最后但同样重要的是，我们初步了解了 `SQL Server 2022` 中新的 `WINDOW` 特性，它在代码可读性和实现方面展现出很大的潜力。我们的快速分析表明，它并没有降低性能，但也没有比旧语法提升性能，不过还需要使用更大数据集进行进一步测试。


    顺便说一句，如果你还没有下载本章的示例脚本，现在正是好时机，可以练习一下刚刚学到的知识。


    在下一章中，我们将介绍 `分析函数`，这是一套在数据分析和报表中非常强大的工具。我们还将开始在讨论的查询中添加 `ROWS` 和 `RANGE` 子句，这些子句会覆盖我们不指定
    `窗口框架` 时的默认行为。


    # 3. 销售用例：分析函数


    既然我们已经创建并熟悉了销售数据仓库，并创建了使用聚合 `窗口函数` 的查询，我们可以进入下一步，学习并创建使用 `SQL Server` 提供的 `分析函数`
    的查询。


    在上一章中，我们涉及了查询的 `性能调优`。在本章中，我们将采用相同的方法，但会关注其他 `性能工具`，例如 `客户端统计信息`，以更全面地了解查询运行情况。


    我们将大量使用 `执行统计信息`，也就是说，我们比较创建推荐 `索引` 之前和之后的 `统计信息`，看看它们是否提升了性能。


    最后，我们将研究建立 `预加载报表表` 和 `内存优化表`，看看它们是否能带来更高的查询性能。


    我们正在研究的函数是计算密集型的，因此我们希望确保编写出高效、准确且执行快速的查询和脚本。`查询调优`、`索引创建` 和 `性能分析` 都是向你的业务分析师交付有用且可操作数据的过程的一部分。


    ## 分析函数


    以下是按名称排序的此类别中的八个函数。它们可以与查询中的 `OVER()` 子句一起使用，为我们的业务分析师生成有价值的报表：


    *   `CUME_DIST()`

    *   `FIRST_VALUE()`

    *   `LAST_VALUE()`

    *   `LAG()`

    *   `LEAD()`

    *   `PERCENT_RANK()`

    *   `PERCENTILE_CONT()`

    *   `PERCENTILE_DISC()`


    我们将采用与前一章相同的方法。我会描述函数的功能，并展示代码和结果。接着，进行一些 `性能分析`，以便我们了解需要进行哪些改进（如果有的话）。


    正如我们在第 2 章的例子中所看到的，改进措施可以包括添加 `索引`，甚至创建一个 `反规范化报表表`，这样当执行使用 `分析窗口函数` 的查询时，它直接针对
    `预加载的数据` 操作，避免了连接、计算和复杂逻辑。

    '
- fmt: '## CUME_DIST( ) Function


    This function calculates the relative position of a value within a data set like
    a table, partition, or table variable loaded with test data.


    ### How does it work?


    First, calculate how many values come before it or are equal to it (call this
    value C1). Next, calculate the number of values or rows in the data set (call
    this C2). C1 is then divided by C2 to deliver the cumulative distribution result.
    The values returned are a float data type, so you need to use the `FORMAT()` function
    to convert it to a percentage.


    By the way, this function is similar to the `PERCENT_RANK()` function, which works
    as follows: Given a set of values in a data set, this function calculates the
    rank of each individual value relative to the entire data set. This function also
    returns a percentage.


    Back to the `CUME_DIST()` function. We will look at two examples, an easy one
    and then one that will query our sales data warehouse.


    ### A Simple Example


    Let’s look at a simple example first so we can see how the prior description works
    on a small data set. Please refer to Listing 3-1a.


    ```sql

    USE TEST

    GO

    DECLARE @CumDistDemo TABLE (

    Col1 VARCHAR(8),

    ColValue INTEGER

    );

    INSERT INTO @CumDistDemo VALUES

    (''AAA'',1),

    (''BBB'',2),

    (''CCC'',3),

    (''DDD'',4),

    (''EEE'',5),

    (''FFF'',6),

    (''GGG'',7),

    (''HHH'',8),

    (''III'',9),

    (''JJJ'',10)

    SELECT Col1,ColValue,

    CUME_DIST() OVER(

    ORDER BY ColValue

    ) AS CumeDistValue,

    A.RowCountLE,

    B.TotalRows,

    CONVERT(DECIMAL(10,2),A.RowCountLE)

    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist

    FROM @CumDistDemo CDD

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLE FROM @CumDistDemo

    WHERE ColValue <= CDD.ColValue

    ) A

    CROSS APPLY (

    SELECT COUNT(*) AS TotalRows FROM @CumDistDemo

    ) B

    GO

    ```


    Listing 3-1a: A Simple Example


    A simple table variable called `@CumDistDemo` is declared and loaded with ten
    rows of data. Only two columns are created. The first is called `Col1` and acts
    as a key column, while the `ColValue` column holds the data. In our case these
    are the numbers 1–10. Really simple.


    The query utilizes the `CUME_DIST()` function and an `OVER( )` clause. No `PARTITION
    BY` clause is included, but the `ORDER BY` clause is used to order the partition
    rows by the `ColValue` column in ascending order.


    We need to include the formula for calculating cumulative distribution so we can
    see how it works and compare it to the SQL Server version. Here is the formula:


    Count of rows with values less than or equal to the current column value divided
    by the total number of rows.


    To get the values for this formula, two `CROSS APPLY` operators are used. The
    first one calculates the number of rows with values less than or equal to the
    current column value, and the second calculates the total number of rows in the
    data set.


    This query can probably be optimized, but for our purposes, it should illustrate
    how the `CUME_DIST()` function works.


    The values returned by the queries in the `CROSS APPLY` block are used in the
    formula in the `SELECT` clause:


    ```sql

    CONVERT(DECIMAL(10,2),A.RowCountLE)

    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist

    ```


    Let’s execute the query and see what we get. Please refer to Figure 3-1.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig1_HTML.jpg)


    Figure 3-1: Two ways of calculating cumulative distribution


    Looks good and predictable, I think! The `MyCumeDist` column has the values calculated
    by the formula we created, and the column called `CumeDistValue` contains the
    values the SQL Server function calculated. Maybe a little formatting is needed
    so they look the same, but the values match.


    ### Querying Sales Data


    Now that we understand how this function works, let’s create a query that goes
    against our sales data. We will use the strategy we used in the prior chapter.
    That is, we will use a `CTE` to set up the data, and then the functions we are
    learning are in the query that accesses the `CTE`.


    Please refer to Listing 3-1b.


    ```sql

    WITH CustSales (

    SalesYear,SalesQuarter,SalesMonth,CustomerNo,StoreNo,CalendarDate,SalesTotal

    )

    AS

    (

    SELECT YEAR(CalendarDate)        AS SalesYear

    ,DATEPART(qq,CalendarDate) AS SalesQuarter

    ,MONTH(CalendarDate)       AS SalesMonth

    ,ST.CustomerNo,

    ST.StoreNo,

    ST.CalendarDate,

    SUM(ST.UnitRetailPrice * ST.TransactionQuantity) AS SalesTotal

    FROM StagingTable.SalesTransaction ST

    GROUP BY ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,ST.UnitRetailPrice

    ,ST.TransactionQuantity

    )

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,CUME_DIST() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS CumeDist

    FROM CustSales

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    ```


    Listing 3-1b: The `CUME_DIST()` Function in Action


    Our usual `CTE` is set up to pull transaction data from the `SalesTransaction`
    table so we can pull out the individual date objects: year, quarter, and month.
    The sales total is also calculated by summing the results of multiplying the `UnitRetailPrice`
    by the `TransactionQuantity` column. (Not efficient I have to admit. I could have
    used the `TotalSalesAmount` column and avoided the formula. Oh well.)


    The `CUME_DIST()` function uses an `OVER()` clause that includes a `PARTITION
    BY` clause and an `ORDER BY` clause. A partition is set up over the `SalesYear`
    column, and the row set of the partition is sorted by the `SalesTotal` column.


    Results are summed up again because we eliminated the store number and only want
    to see totals by year, quarter, month, and customer. A `WHERE` clause is included
    to filter out the results for only one customer and for only two years. I did
    this to keep the result set small, but you can remove them to see what you get.


    Please refer to the results in Figure 3-2.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig2_HTML.jpg)


    Figure 3-2: Query results for the test script


    The results were sorted by the `SalesTotal` column in the `OVER()` clause in order
    to see the ascending values of the sales totals and cumulative distribution results
    so you can see how the formula was applied. Sorting by the sales amounts in ascending
    order lines things up nicely.


    Try out the example by sorting results by sales year, quarter, and month, which
    is what a business analyst would normally want to see.'
