    ## 性能考虑


    此脚本的估计查询计划很大，因此我将其拆分为两个屏幕截图。我们不会像讨论前面的例子那样进行严格的分析，但对于一个大型脚本，了解它的样子将会很有趣。


    请参见图 6-47。


    ![](img/527021_1_En_6_Fig47_HTML.png)


    一张标题为“排名财务查询”的 SQL 应用程序截图。它表示一个程序，有 8 列，分别显示流聚合成本、窗口假脱机成本、2 段成本、计算标量成本、序列投影成本、排序成本和索引查找成本。排序成本为
    7%。索引查找成本为 2%。


    图 6-47：估计查询计划的第一部分（右侧）


    从右向左看，我们看到一个低成本的索引查找，占比 2%。这非常高效。接下来是一个排序步骤，占比 7%，以及一个窗口假脱机，占比 1%（表示假脱机到存储而非内存）。还有一些成本为
    0% 的任务，但我们像往常一样忽略它们。


    这并不是说当您进行自己的分析时也应该忽略它们。分析每一步，不仅是高成本的步骤，还包括那些您不理解其作用的步骤。查阅 Microsoft 文档了解这些步骤的含义，然后确定它们产生的影响（如果有的话）。这样可以扩展您与性能调优相关的知识库。


    让我们看一下估计查询计划的第二部分。请参见图 6-48。


    ![](img/527021_1_En_6_Fig48_HTML.png)


    一张标题为“排名财务查询”的 SQL 应用程序截图。它表示一个程序和查询 1，显示了嵌套循环成本、排序成本、流聚合成本、索引假脱机成本和表扫描成本的不同值。


    图 6-48：估计查询计划的第二部分（左侧）


    这里有更多的活动。在第一层，我们看到一个排序步骤成本为 7%，接着是第二个排序步骤成本为 3%。而且，是的，还有一个排序步骤成本再次为 3%。


    在下面的分支中，我们看到一个小的表扫描成本为 1%，一个索引假脱机成本为 63%，以及一个流聚合成本为 12%。


    回想一下，索引假脱机意味着搜索值被存储到临时存储中，以便在查询处理分区时可以多次访问。


    这个任务为一个流聚合任务（成本 12%）提供数据，并最终为嵌套循环连接任务提供数据。这种类型的连接就是导致索引假脱机的原因。任何类型的假脱机到存储的操作都可能很昂贵，我们应该始终检查是否可以改进它。作为最后的手段，将
    `TEMPDB` 实施在固态硬盘上，以使假脱机更快！


    不妨打开 `PROFILE STATISTICS` 设置，看看大型脚本的统计信息是什么样的。请参见图 6-49。


    ![](img/527021_1_En_6_Fig49_HTML.png)


    一张标题为“排名财务查询”的 SQL 应用程序截图。它表示一个包含 25 行 12 列的列表。估算行数列被突出显示。


    图 6-49：查询配置文件统计信息


    估算的 `IO` 统计信息 (`EstimateIO`) 很低，大部分估算的 `CPU` 统计信息 (`EstimateCPU`) 也很低。第一个 `CPU`
    统计信息很高，为 5.419，这是第一个 `CTE` 的。结果的第 7 行也有一个较高的 `CPU` 统计信息 (`EstimateCPU`)，恰好对应一个
    `CASE` 块。还有两个剩余的段步骤，其 `CPU` (`EstimateCPU`) 值为 3.8。


    最后，看看每个步骤返回的估计行数 (`EstimateRows`)。在这里，我们了解了在计划中处理数据时，每个步骤之间那些粗细不同的线条发生了什么（就行数而言）。有趣的是，随着计划中每个步骤处理数据，行数从低到高，然后再回到低。


    家庭作业


    看看您是否能更快地分析这个查询，并通过修改查询或添加您认为有帮助的索引来提高性能。


    在深入修改我们最后也是最终的报告以识别岛屿并在同一报告中包含间隔之前，是时候喝杯咖啡了。


    ## 接下来是岛屿


    本章的最后一个目标是增强我们的间隔报告以包含岛屿。回想一下，岛屿是按顺序出现的数据集群，就像我们连续多天发生的交易一样。


    回想一下，连续交易十天或以上、停止三到四天然后又开始交易的客户，就是中间有一个间隔的岛屿的例子。


    我们将采取的方法类似于我们处理间隔报告时所遵循的方法，但生成将在 `GROUP BY` 子句中使用的唯一岛屿文本字符串将是一个挑战。


    原因是 `ROW_NUMBER()` 函数将为岛屿中的每一行返回一个唯一值，它本身不能用于生成字符串。我们必须想出一个技巧，涉及一行所在月份中的日期及其与行号值之间的差异。'
- fmt: '### Step 1: Create the First CTE Using `LAG()` and `LEAD()`


    The first `CTE` in the `CTE` chain is like the one we used for the gap report
    script except for a couple of minor additions, which I will explain. Please refer
    to Listing `6-23`.


    ```

    WITH TradeGapsCTE(

    TransDate,NextTradeDate,GapTradeDays,CustId,Symbol,

    TransAmount,TransTypeCode

    )

    AS

    (

    SELECT

    FT.[TransDate] AS TradeDate

    ,LEAD(FT.[TransDate]) OVER(ORDER BY FT.[TransDate]) AS NextTradeDate

    ,CASE

    WHEN LEAD(FT.[TransDate])

    OVER(ORDER BY FT.[TransDate]) = FT.TransDate

    THEN 0

    ELSE DATEDIFF(dd,FT.[TransDate],LEAD(FT.[TransDate])

    OVER(ORDER BY FT.[TransDate])) - 1

    END AS GapTradeDays

    ,FT.CustId

    ,FT.Symbol

    ,FT.TransAmount

    ,FT.TransTypeCode

    FROM Financial.CustomerBuyTransaction FT

    WHERE CustId = ''C0000005''

    AND Symbol = ''LIBOR OIS''

    AND YEAR(FT.TransDate) = 2012

    --ORDER BY FT.TransDate

    )

    -- uncomment below to test CTE

    SELECT * FROM TradeGapsCTE

    ORDER BY 1

    Listing 6-23

    Create Island CTE1

    ```


    The only difference between this first `CTE` and the first `CTE` in the prior
    gap example is the code in bold and italic font. The logical tests for the condition
    when the transaction date is equal to the next transaction date. If it does, it
    sets the gap trade number to `0`; otherwise, it takes the difference between these
    two dates and subtracts `1` from the difference to identify the number of gap
    days.


    Makes sense in that under the condition of sequential trade days, there are `0`
    gaps. Let’s just execute this `CTE` with a small query that shows the values generated.


    Please refer to Figure `6-50`.


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig50_HTML.png)


    A screenshot of S Q L application. It represents a list with `22` rows and `7`
    columns with data on the transaction date, next trade date, gap trade days, customer
    i d, symbol, transaction amount, and transaction type code. Rows `1` to `5` and
    `13` are highlighted with a box.


    Figure `6-50`

    Island CTE1 report


    Looks good. The gaps appear with the same values as the prior report. The members
    of the island groups appear sequentially though. We want to pull out the start
    and end days of these islands. We need to assign each island group a unique text
    string to identify the group of rows belonging to an island.


    ### Step 2: Create the Second CTE That Labels Islands and Gaps


    Our second `CTE` in the chained `CTE` sequence will start to label each row with
    its membership in either a gap or island. There are a few conditions we need to
    check for with `CASE` blocks, so the code will be interesting if not complex.


    Please refer to Listing `6-24`.


    ```

    GapsAndIslands(

    TransDate,NextTradeDate,GapTradeDays,GapOrIsland,

    CustId,Symbol,TransAmount,TransTypeCode

    )

    AS (

    SELECT TG.TransDate

    ,CASE

    WHEN TG.NextTradeDate IS NULL THEN DATEADD(dd,1,TG.TransDate)

    ELSE TG.NextTradeDate

    END AS NextTradeDate

    ,CASE

    WHEN TG.GapTradeDays IS NULL THEN 0

    ELSE TG.GapTradeDays

    END AS GapTradeDays

    ,CASE

    WHEN DATEDIFF(dd,TransDate,NextTradeDate) = 0

    THEN ''ISLAND'' + CONVERT(VARCHAR,ABS((DAY(TG.NextTradeDate) - ROW_NUMBER()OVER
    (ORDER BY YEAR(TG.TransDate)))))

    WHEN DATEDIFF(dd,TransDate,NextTradeDate) = 1

    THEN ''ISLAND'' + CONVERT(VARCHAR,ABS((DAY(TG.NextTradeDate) - ROW_NUMBER()OVER(ORDER
    BY YEAR(TG.TransDate)))))

    WHEN NextTradeDate IS NULL

    THEN ''ISLAND'' + CONVERT(VARCHAR,(ROW_NUMBER()

    OVER(ORDER BY YEAR(TG.TransDate))))

    ELSE ''GAP'' + CONVERT(VARCHAR,ABS(DAY(TG.NextTradeDate) - ROW_NUMBER()OVER(ORDER
    BY YEAR(TG.TransDate))))

    END AS GapOrIsland

    ,TG.CustId

    ,TG.Symbol

    ,TG.TransAmount

    ,TG.TransTypeCode

    FROM TradeGapsCTE TG

    )

    -- uncomment below to test CTE

    --SELECT TransDate,NextTradeDate,GapTradeDays,GapOrIsland,

    --CustId,Symbol,TransAmount,TransTypeCode

    --FROM GapsAndIslands

    --ORDER BY 1

    --GO

    Listing 6-24

    Create the Second CTE, Labeling Islands and Gaps

    ```


    There are three `CASE` blocks. The first block tests for the condition when the
    next trade is `NULL`. This happens when there is no more data in the result set.
    If it is, it adds one day to the current trade date and reports it as the next
    trade day. Otherwise, it returns the valid next trade date:


    ```

    ,CASE

    WHEN TG.NextTradeDate IS NULL THEN DATEADD(dd,1,TG.TransDate)

    ELSE TG.NextTradeDate

    END AS NextTradeDate

    ```


    The next `CASE` block tests for the condition that the number of gap or island
    days is `NULL`. If this is the case, it simply returns a value of `0` instead
    of `NULL`. Otherwise, the value for the number of days in the island or gap is
    returned:


    ```

    ,CASE

    WHEN TG.GapTradeDays IS NULL THEN 0

    ELSE TG.GapTradeDays

    END AS GapTradeDays

    ```


    The third `CASE` block is where we generate the island or gap group identifier
    string, like `ISLAND10` or `GAP 15`:


    ```

    ,CASE

    WHEN DATEDIFF(dd,TransDate,NextTradeDate) = 0

    THEN ''ISLAND'' + CONVERT(VARCHAR,(DAY(TG.NextTradeDate)

    - ROW_NUMBER() OVER (ORDER BY YEAR(TG.TransDate))))

    WHEN DATEDIFF(dd,TransDate,NextTradeDate) = 1

    THEN ''ISLAND'' +  CONVERT(VARCHAR,(DAY(TG.NextTradeDate)

    - ROW_NUMBER() OVER (ORDER BY YEAR(TG.TransDate))))

    WHEN NextTradeDate IS NULL

    THEN ''ISLAND'' + CONVERT(VARCHAR,(ROW_NUMBER()

    OVER (ORDER BY YEAR(TG.TransDate))))

    ELSE ''GAP'' + CONVERT(VARCHAR,ABS(DAY(TG.NextTradeDate)

    - ROW_NUMBER() OVER (ORDER BY YEAR(TG.TransDate))))

    END AS GapOrIsland

    ```


    This is a bit complex, three conditions to test and one default condition.


    The first condition checks the number of days between the transaction date and
    the next trade date. If the value is zero, we generate the text string for the
    island by concatenating the text `ISLAND` with the numerical value of subtracting
    the row number from the day part of the next trade date.


    The second condition also checks the number of days between the transaction date
    and the next trade date. If the value is `1`, we generate the text string for
    the island by concatenating the text `ISLAND` with the numerical value of subtracting
    the row number from the day part of the next trade date.


    The third condition checks whether the next trade date is `NULL`. If the value
    is `NULL`, we generate the text string for the island by concatenating the text
    `ISLAND` with the numerical value of the row number only.'
