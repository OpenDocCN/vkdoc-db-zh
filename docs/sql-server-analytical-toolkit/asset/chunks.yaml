- fmt: '### PERCENTILE_DISC( ) Function


    Here is our percentile discrete example. The `PERCENTILE_DISC()` function works
    on a discrete set of data based on a required percentile so as to return a value
    within the data set that satisfies the percentile.


    Remember discrete data?


    Discrete data values are numbers that have values that you can count over time,
    like investment account deposits over days, months, and years. We can say that
    in a year one made 1,000 deposits and 700 withdrawals. Adding monthly account
    balances to get a yearly balance will not work. As the monthly balances go up
    and down, it would not be a true representation of how much the account earned
    in a year. What counts is how much money is left in the account on December 31.
    Adding the starting account balance to all deposits in a year minus all deposits
    that year makes sense.


    You can add these up to get a grand total like total deposits or withdrawals in
    a year and identify trends in account balances over time (average deposits or
    average withdrawals).


    As another example, summing up the inventory in each warehouse for a location
    almost makes sense. If a location has two warehouses, you can calculate the sum
    of total inventory on hand at any given point, total movements in and out for
    each day, week, month, and so on. Again, total inventory in a year makes no sense;
    average inventory level values for a year do.


    Recall the questions you can ask yourself to differentiate between discrete and
    continuous data:


    *   Can I count it (over periods of time)?

    *   Can I add it up?

    *   Can I use it in calculations, like averages?


    Worth repeating:


    Continuous data can be measured by using functions like `AVG()`, `SUM()`, etc.

    Discrete data can be counted by using functions like `COUNT()`.


    Back to business. Here are the business specifications for this query supplied
    by our business analyst:


    Our `PERCENTILE_CONT()` report was such a big hit with the business analyst that
    they asked us to modify the report so it shows the percentile discrete percentages
    for the same location, inventory, warehouse, and product. This one is easy, a
    quick copy-and-paste and changing of the names of the functions. Yes, laziness
    made us reuse the `CASE` blocks for the quarter and month data parts.


    Lastly, remember that the quantities on hand need to represent what is left in
    inventory on the last day of the month. Therefore, the values are calculated by
    summing up all inventory movements in minus inventory movements out each day of
    the month, to arrive at the total quantity on the last day of the month.


    Please refer to Listing 13-8.


    ```sql

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,QtyOnHand

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete.25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .75]

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    ```


    Listing 13-8: Percentile Discrete Query for Inventory on Hand


    Same logic and structure of the prior example, so let’s see the results. Remember
    the difference between this function and the `PERCENTILE_CONT()` function results?


    Please refer to the partial results in Figure 13-37.


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig37_HTML.png)


    A screenshot of the S Q L S S M S window with a table of 15 columns and 13 rows.
    The column headers are as of year, as of quarter, as of quarter name, as of month,
    average month name, as of date, loc I D, inv I D, w h I D, product I D, quantity
    on hand, and percent discrete 0.25, 0.5, and 0.75.


    Figure 13-37: Percentile discrete query results for inventory on hand


    This time the three percentile values point to actual values and not interpolated
    values. This query checks out so it can be modified for all years, locations,
    inventories, warehouse, and products. Notice quantities on hand represent the
    values reported on the last day of the month, not the sum of values each day of
    the month. This is what makes the data discrete vs. continuous.


    #### Homework


    Using this query, modify it so the values returned cover all years, months, locations,
    inventories, warehouses, and products. Use a `WHERE` clause filter to first check
    for the same product and warehouse of the prior query. Once you are sure you modified
    the `PARTITION BY` clause correctly, remove the `WHERE` clause. You will need
    an `ORDER BY` query for the entire result set. This query, transformed into a
    `VIEW`, would make an ideal candidate for an `SSRS` report built with the Report
    Builder tool (or a denormalized report table).


    Performance tuning time.'
