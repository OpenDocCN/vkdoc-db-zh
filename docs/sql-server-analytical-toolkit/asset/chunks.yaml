    codes. The bottom screen has a message for query cost. Window Spool Cost, 1%.
    Sort Cost, 63%. Index Seek Cost, 35%.


    Figure 3-11


    Estimated query plan using a memory-optimized table


    Looks good. Reading the steps right to left, we see an index seek at a cost of
    35%, a sort at a cost of 63%, and then a stream aggregate step at 1%. Ignoring
    the 0% cost steps, we have a window spool task at 1%. The rest of the steps not
    shown are all zeroes, so we can ignore them for the purpose of our discussion.
    (In a real production environment, look at all tasks!)


    Side comment: I added an index based on the following command:


    ```sql

    ALTER TABLE [SalesReports].[MemorySalesTotals]

    ADD INDEX ieSalesYearQuarterMonth(SalesYear,SalesQuarter,SalesMonth)

    GO

    ```


    I also added an `ORDER BY` clause that sorted rows by the year, quarter, and month
    columns. I generated another estimated query plan, and the first step, the index
    seek task, went down to 25% from 35% and the sort step went down to 46% from 63%.


    So sometimes you need to create other indexes not suggested by the query plan
    estimator.


    Now we check our `IO` and `TIME` statistics that were generated when the query
    was run.


