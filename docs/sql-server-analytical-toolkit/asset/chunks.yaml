- fmt: 'If this is not enough evidence that we need to put the `CTE` in a report table!


    ## 报告表需求与加载策略


    Furthermore, let’s revise our requirement scenario so it reflects that multiple
    users, up to 10–20, will run this report after it is published to a `SSRS` website.
    The report will need filters so the users can pick the year.


    Right now, the report returns 1,011 rows for a single year. Most likely the users
    will want to filter out not only the year but the plant, location, and year. Thinking
    ahead and implementing the `CTE` as a report table that is loaded once a month
    makes sense. An added wrinkle might be that users want the historical data, but
    they want daily loads for the current month, so the loading strategy needs to
    be revised:


    Load all prior months one time, and then for each day in the current month, load
    only the current day’s data at night. This way we offload all those performance-intensive
    joins between the fact table and the four dimension tables at off hours.


    Having 20 users execute a `CTE`-based query several times a day makes no sense.
    Here is the `INSERT` command we will use to perform a one-time load.


    ## 实现报告表


    Please refer to Listing [10-4](#527021_1_En_10_Chapter.xhtml#PC8).


    ```sql

    INSERT INTO Reports.PlantSumEquipFailures

    SELECT

    C.CalendarYear, C.QuarterName, C.MonthName, C.CalendarMonth, P.PlantName,L.LocationName,
    SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    -- Here is the daily load

    -- use the WHERE clause below to get the current day''s values.

    -- WHERE C.CalendarDate = CONVERT(DATE,GETDATE())

    -- Here is the one time get all prior months load

    -- use the WHERE clause below to get the the all values for the last month.

    -- WHERE MONTH(C.CalendarDate) = DATEDIFF(mm,MONTH(CONVERT(DATE,GETDATE())))

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    **Listing 10-4**

    Loading the Report Table


    The `INSERT` statement is straightforward. It is based on the `CTE` so I will
    not discuss it again, but notice the commented-out `WHERE` clauses.


    The first one can be used with the `INSERT` query to get the current day’s failures.
    The second `WHERE` clause can be used for the one-time load to retrieve failures
    for all the prior months. So now the off-hour query should be fast as it only
    retrieves the current day’s failures.


    ## 查询报告表


    Listing [10-5](#527021_1_En_10_Chapter.xhtml#PC9) is the revised query that can
    be easily used by an `SSRS` report that has filters for not only the year but
    the plant and location.


    ```sql

    SELECT

    PlantName, LocationName, CalendarYear, QuarterName,

    MonthName, CalendarMonth, SumEquipFailures,

    LAG(SumEquipFailures,1,0) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS LastFailureSum

    FROM Reports.PlantSumEquipFailures

    WHERE CalendarYear > 2008

    GO

    ```

    **Listing 10-5**

    Querying the Report Table


    Very simple. Let’s see the new revised plan.


    ## 性能分析：查询计划对比


    Please refer to Figure [10-12a](#527021_1_En_10_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig15_HTML.png)


    A screenshot of `SQL`, `SSMS` window. It presents part 1 of the original and new
    query plans with 12 and 9 components. 11 components of the original query plan
    are outlined. Costs of stream aggregate, window spool, sort, and table scan are
    1%, 6%, 61%, and 31% in the new query plan.


    **Figure 10-12a**

    Original vs. new query plan – part 1


    The new estimated execution plan has fewer steps and no hash match joins although
    the sort step and window spool step went up considerably as can be seen in the
    last section of the plan. Maybe this is better or not!


    Please refer to Figure [10-12b](#527021_1_En_10_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig16_HTML.png)


    A screenshot of the `SQL`, `SSMS` window. It presents part 2 of the original and
    new query plans with 9 components. Costs of stream aggregate and window spool
    are 1% and 2% in the original plan. Costs of stream aggregate, window spool, sort,
    and table scan are 1%, 6%, 61%, and 31% in the new plan.


    **Figure 10-12b**

    Original vs. new query plan – part 2


    The sort step increased to 41% and the window spool increased from 2% to 6%. What
    do the `IO` and `TIME` statistics look like?


    ## 性能分析：IO与时间统计


    Please refer to Figure [10-12c](#527021_1_En_10_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig17_HTML.png)


    A screenshot of the `SQL`, `SSMS` window. The text presents 2 `IO` and `TIME`
    statistics. Parse and compile times for `CPU` and elapsed are 15, 28, and 0, 65
    milliseconds in the first and second. Execution times for `CPU` and elapsed are
    0 and 170 milliseconds in the second. 1011 rows are affected.


    **Figure 10-12c**

    IO and TIME statistics comparison


    A picture is worth a thousand words. Less statistics and only one work table in
    the new query vs. a work table and work file in the old query.


    Logical reads went from 24 in the old query to 13 in the new query. Physical reads
    went up though, from 1 to 3, but read-ahead reads went down from 29 to 0.


    Now looking at all these statistics gets a little tedious, but you need to learn
    and practice this discipline as it will be put to good use when you are creating
    production-level queries in your work environment.


    **Pop Quiz**

    How do you turn on `IO` and `TIME` statistics?'
