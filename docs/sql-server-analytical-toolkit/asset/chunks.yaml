    to 2015\. We will load them, create a `VIEW` object that ties all five together
    via `UNION ALL` operators, and modify the prior query so it goes against the memory-enhanced
    tables via the new `VIEW`. Let’s start by creating and loading the tables.


    Note


    Once memory-enhanced tables are created and loaded, you do not need to reload
    them if you reboot your laptop. They are loaded automatically. You only need to
    add new rows. Make sure you do not accidentally add duplicate rows!


    Listing [7-16](#527021_1_En_7_Chapter.xhtml#PC22) is the code for the first one.
    The code for the remaining tables is the same except each year part of the table
    name changes to reflect the remaining years, 2012, 2013, 2014, and 2015.


    ```

    CREATE TABLE [FinancialReports].[AccountMonthlyBalancesMem2011]

    (

    [AcctYear]    [int] NULL,

    [AcctMonth]   [int] NULL,

    [CustId]      [varchar](8) NOT NULL,

    [PrtfNo]      [varchar](8) NOT NULL,

    [AcctNo]      [varchar](64) NOT NULL,

    [AcctName]    [varchar](24) NOT NULL,

    [AcctBalance] [decimal](10, 2) NOT NULL,

    INDEX [ieMonthlyAcctBalanceMemory2011] NONCLUSTERED

    (

    [CustId],

    [AcctYear],

    [AcctMonth],

    [PrtfNo],

    [AcctNo]

    )

    )WITH (MEMORY_OPTIMIZED = ON,DURABILITY = SCHEMA_ONLY)

    GO

    Listing 7-16

    Create Five Memory-Enhanced Tables

    ```


    This table is typical for all five tables; all that changes is the name of course.
    We need to declare an index within the `CREATE TABLE` command and set the memory-optimized
    parameters to `ON`:


    ```

    WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )

    ```


    In the script for this chapter, you will find the `DDL` command for all five `CREATE
    TABLE` commands. Next, we need to load the tables.


    Listing [7-17](#527021_1_En_7_Chapter.xhtml#PC24) is the `TSQL DML` command to
    insert rows into the first memory table for account balances in 2011\. The remaining
    insert statements are identical except that we change the name of the table to
    reflect the year we are loading and the `WHERE` clause predicate to reflect the
    remaining years’ worth of data we need to load.


    ```

    INSERT INTO [FinancialReports].[AccountMonthlyBalancesMem2011]

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance

    FROM Financial.Account

    WHERE YEAR(PostDate) = 2011

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    GO

    Listing 7-17

    Load the Five Memory-Enhanced Tables

    ```


    This is a standard `INSERT/SELECT` command with a `GROUP BY` clause as we are
    summing up the account balances by year, month, customer, and portfolio. Our last
    step is to create the `TSQL VIEW` object.


    Yes, these incur costs as far as performance, but since this is historical data,
    you only need to load them once per year. As new years roll by, you load them
    once. Now we need to tie all these tables together into one `VIEW` object.


    Listing [7-18](#527021_1_En_7_Chapter.xhtml#PC25) is the `DDL` command to create
    a `VIEW` that connects all the tables via five queries inter-connected with `UNION
    ALL` commands.


    ```

    CREATE VIEW [FinancialReports].[AccountMonthlyBalancesMemView]

    AS

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2011]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2012]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2013]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2014]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2015]

    GO

    Listing 7-18

    Create the View Based on the Five Memory-Enhanced Tables

    ```


    Large script, but it is just a series of four `UNION ALL` commands that tie the
    rows from all five tables together via identical queries except for the table
    names.


    Tip


    `UNION ALL` is preferred vs. `UNION`, which removes duplicates and costs more
    in terms of performance. Your data should not have unexpected duplicates or triplicates
    or more!


    Last but not least, Listing [7-19](#527021_1_En_7_Chapter.xhtml#PC26) is our query
    that includes the `PERCENTILE_DISC()` function that now references the `VIEW`
    instead of one large table.


    ```

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_DISC(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-25%]

    ,PERCENTILE_DISC(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-50%]

    ,PERCENTILE_DISC(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-75%]

    ,PERCENTILE_DISC(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-90%]

    FROM [FinancialReports].[AccountMonthlyBalancesMemView]

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    ORDER BY CustId

    ,AcctYear

    GO

    Listing 7-19

    Account Balance Report from a Memory Table–Based View

    ```


    No need to explain the code as we discussed it earlier. All that changes is that
    we are referencing a `VIEW`.


    The results are the same as the `CTE` query, so in the interest of space, I will
    not display another screenshot here.'
  trans: '# 执行计划分析与优化


    一张 SSMS 窗口的截图。它展示了估计执行计划的 D 部分，包含 12 个组件。这些组件分别是：select、compute scalar、nested
    loops、table spool、segment、compute scalar、compute scalar、nested loops、nested loops、stream
    aggregate、table spool 和 table spool。


    图 7-35


    估计执行计划，E 部分


    同样的模式再次出现，这次有一个最终的 table spool，其成本为 1%，以及一个最终的 nested loops join 用于合并结果（4%成本）。该
    table spool 显示的成本为 1%，尽管`STATISTICS PROFILE`统计显示`IO`为 0。


    初步结论是，改进此计划的唯一途径是：


    1.  获取更多内存

    2.  将`TEMPDB`放置在固态硬盘上

    3.  通过内存优化表将 Account 表加载到内存中


    都是不错的建议，但值得这样做吗？


    作为最后一项，让我们生成一个实时查询计划，以便我们能看到计划最后、左侧部分所有任务之间的数据流。请参考图 7-36。


    ![](img/527021_1_En_7_Fig37_HTML.png)


    一张 SSMS 窗口的截图。它展示了一个包含 12 个组件的实时查询计划。这些组件分别是：select、compute scalar、nested loops、table
    spool、segment、compute scalar、compute scalar、nested loops、nested loops、stream aggregate、table
    spool 和 table spool。


    图 7-36


    实时查询计划


    在这里，我们看到了各个分支中的行数，最终计数为 49 行，这与我们在查询窗格结果中看到的一致。


    **提示**


    务必将估计查询计划与实时查询计划进行比较，以确保数值和运算符的偏差不会过大。


    还记得方案 3 吗？让我们看看它是如何工作的。我们将创建几个内存优化表，每个表对应一年的账户余额，并看看这在性能提升方面能带来什么好处，尽管代价是增加了复杂性。


    ### 多内存优化表策略


    我们将创建五个内存优化表，每个表对应 2011 年到 2015 年中的一年。我们将加载它们，创建一个`VIEW`对象，通过`UNION ALL`运算符将所有五个表关联起来，并修改之前的查询，使其通过这个新的`VIEW`访问内存优化表。让我们从创建和加载表开始。


    **注意**


    一旦内存优化表被创建并加载，即使你重启笔记本电脑，也无需重新加载它们。它们会自动加载。你只需要添加新的行。确保不要意外添加重复的行！


    清单 7-16 是第一个表的代码。其余表的代码与此相同，只是表名中的年份部分会相应更改为剩余的年份：2012、2013、2014 和 2015。


    ```

    CREATE TABLE [FinancialReports].[AccountMonthlyBalancesMem2011]

    (

    [AcctYear]    [int] NULL,

    [AcctMonth]   [int] NULL,

    [CustId]      varchar NOT NULL,

    [PrtfNo]      varchar NOT NULL,

    [AcctNo]      varchar NOT NULL,

    [AcctName]    varchar NOT NULL,

    [AcctBalance] decimal NOT NULL,

    INDEX [ieMonthlyAcctBalanceMemory2011] NONCLUSTERED

    (

    [CustId],

    [AcctYear],

    [AcctMonth],

    [PrtfNo],

    [AcctNo]

    )

    )WITH (MEMORY_OPTIMIZED = ON,DURABILITY = SCHEMA_ONLY)

    GO

    ```

    清单 7-16

    创建五个内存优化表


    这个表对于所有五个表都是典型的；当然，变化的只是表名。我们需要在`CREATE TABLE`命令中声明一个索引，并将内存优化参数设置为`ON`：


    ```

    WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )

    ```


    在本章的脚本中，你会找到所有五个`CREATE TABLE`命令的`DDL`命令。接下来，我们需要加载这些表。


    清单 7-17 是用于向第一个内存表（2011 年的账户余额）插入行的`TSQL DML`命令。其余的插入语句是相同的，只是我们将表名更改为要加载的年份，并将`WHERE`子句谓词更改为我们需要加载的剩余年份的数据。


    ```

    INSERT INTO [FinancialReports].[AccountMonthlyBalancesMem2011]

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance

    FROM Financial.Account

    WHERE YEAR(PostDate) = 2011

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    GO

    ```

    清单 7-17

    加载五个内存优化表


    这是一个标准的`INSERT/SELECT`命令，带有`GROUP BY`子句，因为我们正在按年、月、客户和投资组合对账户余额进行汇总。我们的最后一步是创建`TSQL
    VIEW`对象。


    是的，这些操作会带来性能成本，但由于这是历史数据，你每年只需要加载一次。随着新年的到来，你加载一次即可。现在我们需要将所有这些表关联成一个`VIEW`对象。


    清单 7-18 是用于创建`VIEW`的`DDL`命令，该视图通过五个使用`UNION ALL`命令相互连接的查询来连接所有表。


    ```

    CREATE VIEW [FinancialReports].[AccountMonthlyBalancesMemView]

    AS

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2011]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2012]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2013]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2014]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2015]

    GO

    ```

    清单 7-18

    基于五个内存优化表创建视图


    脚本很长，但它只是一系列四个`UNION ALL`命令，通过除了表名外完全相同的查询将所有五个表中的行连接在一起。


    **提示**


    与`UNION`相比，更推荐使用`UNION ALL`，因为`UNION`会去除重复项，性能成本更高。你的数据中不应该有意外的重复或三重及更多重复！


    最后但同样重要的是，清单 7-19 是我们的查询，它包含了`PERCENTILE_DISC()`函数，现在该函数引用的是`VIEW`而不是一张大表。


    ```

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_DISC(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-25%]

    ,PERCENTILE_DISC(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-50%]

    ,PERCENTILE_DISC(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-75%]

    ,PERCENTILE_DISC(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-90%]

    FROM [FinancialReports].[AccountMonthlyBalancesMemView]

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    ORDER BY CustId

    ,AcctYear

    GO

    ```

    清单 7-19

    基于内存表视图的账户余额报告


    无需解释代码，因为我们之前已经讨论过。所有变化的是我们现在引用的是一个`VIEW`。


    结果与`CTE`查询相同，因此为了节省篇幅，我将不再在此处显示另一个截图。'
- fmt: '# Performance Considerations


    我们有一个非常有趣的估计执行计划，因此请务必阅读下一部分。


    请参考图 [7-37](#527021_1_En_7_Chapter.xhtml#Fig38)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig38_HTML.png)


    这是 SSMS 窗口的截图。它展示了包含 20 个组件的估计执行计划的 A 部分。这些组件包括嵌套循环、表假脱机、段、排序、串联、筛选器、表扫描、4 组筛选器和表
    Seek、嵌套循环、计算标量、流聚合以及 2 个表假脱机。


    **图 7-37**


    多内存增强表策略的估计执行计划 – A 部分


    是的，它很有趣且更复杂。我们看到针对内存增强表的索引 Seek，但由于它们在内存中，这应该能提高性能。我们看到了熟悉的身影：成本为 0% 的表假脱机任务、成本为
    41% 的排序、成本为 1% 的表假脱机，以及第一个嵌套循环内部联接。回想一下，我们学过由表假脱机操作符创建的临时表可以被重用（*共享* 可能是更好的术语），因此我们不会有一大堆临时表占用
    `TEMPDB` 上的空间。


    因此，这给了我们一种提高性能的策略：如果无法消除表假脱机，那么让您的 DBA 将 `TEMPDB` 放在固态硬盘上 – 这应该会有所帮助。


    让我们看看计划的第二部分。


    请参考图 [7-38](#527021_1_En_7_Chapter.xhtml#Fig39)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig39_HTML.png)


    这是 SSMS 窗口的截图。它展示了包含 11 个组件的估计执行计划的 B 部分。这些组件包括嵌套循环、表假脱机、段、计算标量、计算标量、序列项目、段、嵌套循环、流聚合、表假脱机和表假脱机。


    **图 7-38**


    多内存增强表策略的估计执行计划 – B 部分


    又来了，相同的模式：成本为 0% 的表假脱机任务，一个成本为 1%，以及成本为 5% 的嵌套循环联接。计划的其余部分相同，就像使用 `CTE` 方法的情况一样，所以看起来我们所做的只是让查询在加载和引入创建及加载内存增强表的逻辑方面变得更加复杂。


    对于具有多个 `CPU` 的服务器来说，这种策略将是理想的，这样查询引擎就可以并行执行从每个表中检索数据的逻辑。更多硬件解决方案，但实施成本也更高！


    让我们看看完整的性能情况。那么 `IO` 和 `TIME` 统计数据呢？


    请参考图 [7-39](#527021_1_En_7_Chapter.xhtml#Fig40)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig40_HTML.png)


    这是 SSMS 窗口的截图。文本展示了 2 组 IO 和 TIME 统计数据。对于 1 和 2，解析和编译时间的 CPU 和流逝时间分别为 0, 55 毫秒和
    0, 111 毫秒。对于 1 和 2，执行时间的 CPU 和流逝时间分别为 0, 52 毫秒和 0, 2 毫秒。影响了 49 行。


    **图 7-39**


    多内存增强表方案的 IO 和 TIME 统计数据


    现在我们有些进展了。工作表统计数据没有变化，但账户余额表统计数据没有显示在内存表查询统计信息中。这是因为所有操作都在内存中执行，因此看起来是一个显著的改进，因为我们消除了一整套操作。最后，SQL
    Server 的执行时间从 52 毫秒减少到 2 毫秒，这是另一个显著的改进。SQL Server 的解析和编译时间使用内存增强表方法翻了一倍。你不可能赢得所有方面。


    因此，这个方案看起来很有希望。


    对于最后一项，让我们比较三种方案的 `IO` 和 `TIME` 统计数据：`CTE` 方法、报表表方法和内存增强表方法。


    请参考图 [7-40](#527021_1_En_7_Chapter.xhtml#Fig41)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig41_HTML.png)


    这是 SSMS 窗口的截图。文本展示了 3 组 IO 和 TIME 统计数据。对于 1、2 和 3，解析和编译时间的 CPU 和流逝时间分别为 31, 88
    毫秒、16, 74 毫秒和 0, 0 毫秒。对于 1、2 和 3，执行时间的 CPU 和流逝时间分别为 0, 179 毫秒、0, 59 毫秒和 0, 1 毫秒。


    **图 7-40**


    比较 IO 和 TIME 统计数据


    有点难看清，但让我们比较一些重要的统计数据。从左到右，我们分别看到 `CTE/QUERY` 方法、报表表方法以及最后的内存增强表方法的 `IO` 和 `TIME`
    统计数据。


    解析和编译时间从 88 毫秒到 74 毫秒再到 0 毫秒 – 巨大的改进。


    工作表 `IO` 值在三种方法中都相同，只有内存增强表方法的 `IO` 值上升了，从 595 增加到 610。


    最后，SQL Server 的执行时间从 179 毫秒到 59 毫秒再到 1 毫秒！


    对我来说，这看起来是结论性的，但这些测试需要使用 `DBCC` 清除缓存并记录性能统计数据的情况下执行多次。


    最后，让我们快速查看 `STATISTICS PROFILE` 统计结果。


    请参考图 [7-41](#527021_1_En_7_Chapter.xhtml#Fig42)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig42_HTML.png)


    这是 SSMS 窗口的截图。它有 2 个表格，分别有 5 列和 6 列，以及 51 行和 61 行。列标题是估计 ID、估计 CPU、平均行大小、总子树和估计
    ID、估计 CPU、平均行大小、总子树、输出。


    **图 7-41**


    比较两种方案的配置文件统计数据


    看起来变化不大，只是 `CTE` 方法生成了 50 个步骤，而内存增强表方法生成了 60 个步骤。


    **结论：** 就性能改进而言，内存增强表方法似乎有效，但实施和维护的复杂性增加，因为需要加载表，并且需要创建和加载新表。如前所述，如果有一个可以实施 `TEMPDB`
    的固态硬盘，那么性能应该会显著提高。此外，也推荐使用非常快且容量大的内存。


    总之，我们需要正确看待事物。这个分析是在个人笔记本电脑上通过运行查询和估计查询计划来执行的。当然，我们在提高性能方面能做的事情有限，但我认为我们已经看到了可用的策略以及应该查看哪些统计数据来判断哪个策略更有效。如前所述，当您在公司开发服务器上执行此工作时，您有更多的选择。我留给您一个问题：


    创建和加载所有内存增强表以及创建视图值得吗？同样地，创建 `CTE`/查询和报表表方法也值得吗？我认为值得。您不仅可以了解一些可以考虑的策略，还可以了解查询计划中的操作符如何工作以及临时表如何被使用（和共享）来假脱机数据。


    总结一下，这是我们讨论过的策略以及一个我们没有讨论的：


    1.  `CTE`/查询方法

    2.  预加载的报表表方法

    3.  单个内存增强表方法

    4.  多个内存增强表方法（在单独的磁盘上创建）

    5.  **分区表（未讨论）**


    最后一个，分区表，是一种创建跨多个快速磁盘分布的表的方法，按标准分布，例如每个磁盘存储一年的数据。这对于拥有 SAN（存储区域网络）磁盘和多 CPU 服务器的环境非常有效。


    **注意**


    在公司生产环境中，请确保执行与将哪些表放入内存相关的分析。这些应该是查询/报告/脚本目录中 80% 会用到的表，以便它们可以共享。内存有限且价格高昂，因此请执行分析和设计，以正确地将表放置在内存或物理存储（无论是磁盘还是
    SAN）中。'
  raw: '### Performance Considerations


    We have a very interesting, estimated execution plan, so make sure you read this
    next section.


    Please refer to Figure [7-37](#527021_1_En_7_Chapter.xhtml#Fig38).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig38_HTML.png)


    A screenshot of the S S M S window. It presents part A of an estimated execution
    plan with 20 components. The components are nested loops, table spool, segment,
    sort, concatenation, filter, table scan, 4 sets of filter and table seek, nested
    loops, compute scalar, stream aggregate, and 2 table spool.


    Figure 7-37


    Estimated execution plan for the multi-memory-enhanced-table strategy – part A


    Yes, it is interesting and more complex. We see index seeks against the memory-enhanced
    tables, but as they are in memory, this should improve performance. We see our
    old friends, the table spool tasks at 0% cost, the sort at 41% cost, the 1% cost
    table spool, and the first nested loops inner join. Recall we learned that the
    temporary tables created by the table spool operator can be reused (*shared* might
    be a better term) so we do not have a whole bunch of temporary tables taking up
    space on `TEMPDB`.


    So this gives us one strategy to improve performance: if you cannot eliminate
    the table spools, then have your dba place `TEMPDB` on a solid-state drive – this
    should help.


    Let’s look at the second part of the plan.


    Please refer to Figure [7-38](#527021_1_En_7_Chapter.xhtml#Fig39).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig39_HTML.png)


    A screenshot of the S S M S window. It presents part B of an estimated execution
    plan with 11 components. The components are nested loops, table spool, segment,
    compute scalar, compute scalar, sequence project, segment, nested loops, stream
    aggregate, table spool, and table spool.


    Figure 7-38


    Estimated execution plan for the multi-memory-enhanced-table strategy – part B


    Here we go again, same pattern: table spool tasks at 0%, one at 1%, and the nested
    loops join at 5%. The remaining sections of the plan are the same, just as was
    the case with the `CTE` approach, so it looks like all we did was make the query
    more complex to load and introduce some logic to create and load memory-enhanced
    tables.


    This strategy would be ideal for a server with multiple `CPU`s so that the query
    engine can execute the logic that retrieves data from each table in parallel.
    More hardware solutions, but more money to implement them!


    Let’s get the complete performance picture. What about `IO` and `TIME` statistics?


    Please refer to Figure [7-39](#527021_1_En_7_Chapter.xhtml#Fig40).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig40_HTML.png)


    A screenshot of the S S M S window. The text presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 0, 55, and 0, 111 milliseconds
    for 1 and 2\. Execution times for C P U and elapsed are 0, 52, and 0, 2 milliseconds
    for 1 and 2\. 49 rows are affected.


    Figure 7-39


    Multiple-memory-enhanced-table scheme IO and TIME statistics


    Now we are getting somewhere. The work table statistics did not change, but the
    account balances table statistics are not displayed in the memory table query
    statistics. That’s because everything is performed in memory, so it looks like
    a significant improvement as we eliminated a whole set of operations. Lastly,
    the SQL Server execution times went from 52 ms to 2 ms, so another significant
    improvement. SQL Server parse and compile times doubled with the memory-enhanced
    table approach. You can’t win them all.


    So this scheme looks promising.


    For one last item, let’s compare the `IO` and `TIME` statistics across the three
    schemes, `CTE` approach, report table approach, and memory-enhanced table approach.


    Please refer to Figure [7-40](#527021_1_En_7_Chapter.xhtml#Fig41).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig41_HTML.png)


    A screenshot of the S S M S window. The text presents 3 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 31, 88, and 16, 74, and 0, 0
    milliseconds for 1, 2, and 3\. Execution times for C P U and elapsed are 0, 179,
    and 0, 59, and 0, 1 milliseconds for 1, 2, and 3.


    Figure 7-40


    Comparing IO and TIME statistics


    A little hard to see, but let’s compare some vital statistics. Reading from left
    to right, we see the `IO` and `TIME` statistics for the `CTE/QUERY` approach,
    the report table approach, and finally the memory-enhanced table approach.


    Parse and compile times went from 88 ms to 74 ms to 0 ms – big improvement.


    Work table `IO` values were the same for all three except for the memory-enhanced
    tables where the `IO` went up, from 595 to 610.


    Lastly, the SQL Server execution times went from 179 ms to 59 ms to 1 ms!


    Looks conclusive to me, but these tests need to be performed several times, using
    `DBCC` to clear cache and noting the performance statistics also.


    Finally, let’s quickly look at `STATISTICS PROFILE` statistics results.


    Please refer to Figure [7-41](#527021_1_En_7_Chapter.xhtml#Fig42).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig42_HTML.png)


    A screenshot of the S S M S window. It has 2 tables of 5 and 6 columns and 51
    and 61 rows. The column headers are estimated I D, estimate C P U, average row
    size, total subtree, and estimated I D, estimate C P U, average row size, total
    subtree, and output.


    Figure 7-41


    Comparing profile statistics between the two schemes


    Does not look like much of a change except that the `CTE` approach generated 50
    steps, while the memory-enhanced table approach generated 60 steps.


    Verdict: The memory-enhanced table approach seems to work as far as performance
    improvement but with added complexity to implement and maintain as tables need
    loading and new tables need to be created and loaded. As stated earlier, if one
    has a solid-state drive where they can implement `TEMPDB,` then performance should
    significantly improve even more. Additionally, very fast memory, and lots of it,
    is also recommended.


    In conclusion, we need to keep things in perspective. This analysis was performed
    by running queries and estimated query plans on a personal laptop. Certainly we
    are limited in what we can do to increase performance, but I think we have seen
    what strategies are available to us and what statistics to look at to see which
    one worked better. As stated earlier, when you perform this work on a company
    development server, you have more options available to you. I leave you with a
    question:


    Was it worth the effort of creating and loading all the memory-enhanced tables
    and creating the view? Also creating the `CTE`/query and report table approaches?
    I think so. You got to not only see some strategies you can consider, but you
    also learned how the operators in the query plans do and how temporary tables
    are used (and shared) to spool data.


    Wrapping it up here are the strategies we discussed and one we did not:


    1.  `CTE`/query approach


    2.  Preloaded report table approach


    3.  Single memory-enhanced table approach


    4.  Several-memory-enhanced-table approach (created on separate disks)


    5.  **Partitioned tables (not discussed)**


    The last one, partitioned tables, are a way of creating a table that is spread
    across multiple fast disks by criteria, like each disk stores one year’s worth
    of data. This works very well for environments that have SAN (Storage Area Network)
    disks and servers with multiple CPUs.


    Note


    In a company production environment, make sure you perform analysis related to
    which tables you place in memory. These should be tables used by 80% of the query/report/script
    catalog so they can be shared. Memory is limited and comes at a high price tag,
    so perform the analysis and design to correctly place tables in either memory
    or physical storage whether it be disk or SAN.'
  trans: '# 性能考虑


    我们有一个非常有趣的估计执行计划，因此请务必阅读下一部分。


    请参考图 7-37。


    ![](img/527021_1_En_7_Fig38_HTML.png)


    这是 SSMS 窗口的截图。它展示了包含 20 个组件的估计执行计划的 A 部分。这些组件包括嵌套循环、表假脱机、段、排序、串联、筛选器、表扫描、4 组筛选器和表
    Seek、嵌套循环、计算标量、流聚合以及 2 个表假脱机。


    **图 7-37**


    多内存增强表策略的估计执行计划 – A 部分


    是的，它很有趣且更复杂。我们看到针对内存增强表的索引 Seek，但由于它们在内存中，这应该能提高性能。我们看到了熟悉的身影：成本为 0% 的表假脱机任务、成本为
    41% 的排序、成本为 1% 的表假脱机，以及第一个嵌套循环内部联接。回想一下，我们学过由表假脱机操作符创建的临时表可以被重用（*共享* 可能是更好的术语），因此我们不会有一大堆临时表占用
    `TEMPDB` 上的空间。


    因此，这给了我们一种提高性能的策略：如果无法消除表假脱机，那么让您的 DBA 将 `TEMPDB` 放在固态硬盘上 – 这应该会有所帮助。


    让我们看看计划的第二部分。


    请参考图 7-38。


    ![](img/527021_1_En_7_Fig39_HTML.png)


    这是 SSMS 窗口的截图。它展示了包含 11 个组件的估计执行计划的 B 部分。这些组件包括嵌套循环、表假脱机、段、计算标量、计算标量、序列项目、段、嵌套循环、流聚合、表假脱机和表假脱机。


    **图 7-38**


    多内存增强表策略的估计执行计划 – B 部分


    又来了，相同的模式：成本为 0% 的表假脱机任务，一个成本为 1%，以及成本为 5% 的嵌套循环联接。计划的其余部分相同，就像使用 `CTE` 方法的情况一样，所以看起来我们所做的只是让查询在加载和引入创建及加载内存增强表的逻辑方面变得更加复杂。


    对于具有多个 `CPU` 的服务器来说，这种策略将是理想的，这样查询引擎就可以并行执行从每个表中检索数据的逻辑。更多硬件解决方案，但实施成本也更高！


    让我们看看完整的性能情况。那么 `IO` 和 `TIME` 统计数据呢？


    请参考图 7-39。


    ![](img/527021_1_En_7_Fig40_HTML.png)


    这是 SSMS 窗口的截图。文本展示了 2 组 IO 和 TIME 统计数据。对于 1 和 2，解析和编译时间的 CPU 和流逝时间分别为 0, 55 毫秒和
    0, 111 毫秒。对于 1 和 2，执行时间的 CPU 和流逝时间分别为 0, 52 毫秒和 0, 2 毫秒。影响了 49 行。


    **图 7-39**


    多内存增强表方案的 IO 和 TIME 统计数据


    现在我们有些进展了。工作表统计数据没有变化，但账户余额表统计数据没有显示在内存表查询统计信息中。这是因为所有操作都在内存中执行，因此看起来是一个显著的改进，因为我们消除了一整套操作。最后，SQL
    Server 的执行时间从 52 毫秒减少到 2 毫秒，这是另一个显著的改进。SQL Server 的解析和编译时间使用内存增强表方法翻了一倍。你不可能赢得所有方面。


    因此，这个方案看起来很有希望。


    对于最后一项，让我们比较三种方案的 `IO` 和 `TIME` 统计数据：`CTE` 方法、报表表方法和内存增强表方法。


    请参考图 7-40。


    ![](img/527021_1_En_7_Fig41_HTML.png)


    这是 SSMS 窗口的截图。文本展示了 3 组 IO 和 TIME 统计数据。对于 1、2 和 3，解析和编译时间的 CPU 和流逝时间分别为 31, 88
    毫秒、16, 74 毫秒和 0, 0 毫秒。对于 1、2 和 3，执行时间的 CPU 和流逝时间分别为 0, 179 毫秒、0, 59 毫秒和 0, 1 毫秒。


    **图 7-40**


    比较 IO 和 TIME 统计数据


    有点难看清，但让我们比较一些重要的统计数据。从左到右，我们分别看到 `CTE/QUERY` 方法、报表表方法以及最后的内存增强表方法的 `IO` 和 `TIME`
    统计数据。


    解析和编译时间从 88 毫秒到 74 毫秒再到 0 毫秒 – 巨大的改进。


    工作表 `IO` 值在三种方法中都相同，只有内存增强表方法的 `IO` 值上升了，从 595 增加到 610。


    最后，SQL Server 的执行时间从 179 毫秒到 59 毫秒再到 1 毫秒！


    对我来说，这看起来是结论性的，但这些测试需要使用 `DBCC` 清除缓存并记录性能统计数据的情况下执行多次。


    最后，让我们快速查看 `STATISTICS PROFILE` 统计结果。


    请参考图 7-41。


    ![](img/527021_1_En_7_Fig42_HTML.png)


    这是 SSMS 窗口的截图。它有 2 个表格，分别有 5 列和 6 列，以及 51 行和 61 行。列标题是估计 ID、估计 CPU、平均行大小、总子树和估计
    ID、估计 CPU、平均行大小、总子树、输出。


    **图 7-41**


    比较两种方案的配置文件统计数据


    看起来变化不大，只是 `CTE` 方法生成了 50 个步骤，而内存增强表方法生成了 60 个步骤。


    **结论：** 就性能改进而言，内存增强表方法似乎有效，但实施和维护的复杂性增加，因为需要加载表，并且需要创建和加载新表。如前所述，如果有一个可以实施 `TEMPDB`
    的固态硬盘，那么性能应该会显著提高。此外，也推荐使用非常快且容量大的内存。


    总之，我们需要正确看待事物。这个分析是在个人笔记本电脑上通过运行查询和估计查询计划来执行的。当然，我们在提高性能方面能做的事情有限，但我认为我们已经看到了可用的策略以及应该查看哪些统计数据来判断哪个策略更有效。如前所述，当您在公司开发服务器上执行此工作时，您有更多的选择。我留给您一个问题：


    创建和加载所有内存增强表以及创建视图值得吗？同样地，创建 `CTE`/查询和报表表方法也值得吗？我认为值得。您不仅可以了解一些可以考虑的策略，还可以了解查询计划中的操作符如何工作以及临时表如何被使用（和共享）来假脱机数据。


    总结一下，这是我们讨论过的策略以及一个我们没有讨论的：


    1.  `CTE`/查询方法

    2.  预加载的报表表方法

    3.  单个内存增强表方法

    4.  多个内存增强表方法（在单独的磁盘上创建）

    5.  **分区表（未讨论）**


    最后一个，分区表，是一种创建跨多个快速磁盘分布的表的方法，按标准分布，例如每个磁盘存储一年的数据。这对于拥有 SAN（存储区域网络）磁盘和多 CPU 服务器的环境非常有效。


    **注意**


    在公司生产环境中，请确保执行与将哪些表放入内存相关的分析。这些应该是查询/报告/脚本目录中 80% 会用到的表，以便它们可以共享。内存有限且价格高昂，因此请执行分析和设计，以正确地将表放置在内存或物理存储（无论是磁盘还是
    SAN）中。'
- fmt: '# 8. Plant Use Case: Aggregate Functions


    ## Summary


    We covered a lot of ground. We did our usual exercise of presenting queries and
    results for the analytical functions, but we discussed new techniques for analyzing
    performance and possible solutions.


    We revisited `IO`， `TIME`， and `STATISTIC PROFILE` statistics and saw how the
    details behind them tell us a lot about how the query is processed and what parts
    of the query are linked to the tasks in the estimated query plan.


    Lastly, we took one look at real-time performance plans to see how long each task
    took to execute its logic but also to examine the flow of rows between each task.


    We looked at the usual strategy of replacing the `CTE` block of a query with a
    preloaded table but also implemented single memory-enhanced tables and then multiple
    memory-enhanced tables.


    Lastly, we touched upon how hardware such as SAN disk arrays and memory also plays
    a part in improving performance. We also hinted at using partitioned tables to
    spread data across multiple drives to increase performance, like dedicating a
    drive for each year in a particular set of data.


    A picture will give us an idea of the equipment we need to monitor with our window
    aggregate functions. Please refer to Figure 8-1.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig1_HTML.jpg)


    A diagram power plant consists 4 plants P00001, P00002, P00003, and P00004. Each
    plant has boiler rooms, turbine rooms, generator rooms, X F M R, and Transmission
    power. Each plant has 4 valves and 4 motors.


    **Figure 8-1**


    Conceptual diagram of a power plant


    We will store information for four power plants in our database. Basically, some
    fuel such as oil or coal is used to heat a furnace, which in turn boils water
    until it turns to steam. The steam spins a turbine, which spins a generator, which
    produces electricity, which is finally transferred to a transformer that steps
    up the voltage so it can be distributed to the regions each plant supports.


    Each power plant will have four valves, four motors, one boiler, one turbine,
    and one generator, which we need to monitor for failures. Failure statistics will
    be stored in a small data warehouse implemented as a snowflake schema. Simple,
    but it will give us a lot of data to analyze via the aggregate window functions.


    How will we do this?


    In this chapter we will take a slightly different approach. We will eliminate
    the use of a `CTE` in almost all the examples. As I was creating the code for
    this chapter, I did use a `CTE`， which was getting repetitive, so I took the code
    and used it for a script that populates a report table. Plus, from prior chapters
    we learned that the preloaded report table approach yields greater performance
    when dealing with historical data. This approach will be used by most examples.


    Also, we will concentrate on report output and graphing the results with minimal
    discussions on performance tuning until the end of the chapter. At the end, we
    will create a complex query that uses most of the aggregate functions and see
    what the report looks like for the example.


    We will try a couple of approaches and see which one works better. You might be
    surprised by the conclusion!


    ## Aggregate Functions


    Here is our list of the aggregate functions under this category. We have seen
    them in prior chapters, but I list them just in case you jumped directly to this
    chapter before reading the other chapters:


    *   `COUNT()` and `SUM()`

    *   `MAX()` and `MIN()`

    *   `AVG()`

    *   `GROUPING()`

    *   `STRING_AGG()`

    *   `STDEV()` and `STDEVP()`

    *   `VAR()` and `VARP()`


    Some of the functions we will cover together as they are naturally associated,
    like the `MIN()` and `MAX()` functions, `STDEV()` and `STDEVP()`， and `VAR()`
    and `VARP()`。 We will use them with the `OVER()` clause, and also without, under
    certain circumstances.


    Since this is the first chapter dealing with the power plant database called `APPlant`，
    we will take a look at a conceptual model of the database and also a few simple
    data dictionaries that describe the entities, attributes, and relationships.


    Recall that a conceptual data model is the first data model that is created with
    cooperation of business analysts so as to define the business scope of the database.
    The conceptual model consists of entities, attributes, and relationships. Following
    the conceptual model, a logical normalized model is created and finally a physical
    database model. This would be for transactional databases. For data warehouses
    and data marts, we would go from the conceptual right to the physical `STAR` or
    `SNOWFLAKE` schema design.


    In our case, we will go from the conceptual data model to a `SNOWFLAKE` schema
    data warehouse model, which is highly denormalized. Our database will contain
    three fact tables, several dimension tables, and two report tables. The fact and
    dimension tables all include surrogate keys to establish the `STAR` relationships,
    while the two report tables do not. They are denormalized tables based on the
    `STAR` tables and are used to generate reports. A few category and type tables
    exist, which will turn the model from a `STAR` schema into a `SNOWFLAKE` schema,
    for example, the relationship between the `Equipment` dimension and the `EquipmentType`
    dimension.


    Lastly, we will see toward the end of the chapter that there is a mistake in the
    design. An important link or association table is missing. We will address this,
    so stay tuned.'
