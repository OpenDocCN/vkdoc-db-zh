    FROM @TradeYearStdev

    ORDER BY CustId

    ,TradeYear

    ,TradeMonth

    ,PortfolioNo

    GO

    Listing 5-16

    Setting Up the Example - Part 1

    ```


    As I mentioned, the data (`MonthlyValue`) is staged so it will produce a nice
    bell curve for the normal distribution. I set up the test data by loading it into
    a table variable with some hard-coded `INSERT` statements.


    Notice the `OVER()` clause for both the `AVG()` and `STDEVP()` functions. I want
    to generate a single value for each so we can generate a graph for 12 months’
    worth of sample data. That means each normal distribution uses the same average
    and standard deviation values. All that changes is the monthly value. Here is
    the Excel formula: `=NORM.DIST(C8,$I$3,$I$4,TRUE)`.


    Cell BC8 represents the `MonthlyValue` for January, the $I$3 reference is for
    the average for the entire year data sample, and the $I$4 cell reference is for
    the `STDEVP()` value for the entire year.


    Note


    The dollar ($) sign in front of the row and column coordinates for the cell reference
    indicates that the reference never changes as you use it for the other months.
    The cell reference for the total amounts does change to reflect each new row.


    Let’s see what this bell curve looks like. Please refer to the graphed normal
    distribution results in Figure [5-43](#527021_1_En_5_Chapter.xhtml#Fig45).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig45_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 5 columns
    for trade month, monthly value, portfolio average portfolio s t d e v p, and normal
    distribution. The right screen presents the line graphs of the 12-month normal
    distribution.


    Figure 5-43


    Twelve-month normal distribution curve


    Looks more like the Alps in Italy, but this is a more recognizable bell curve
    generated by the data. This is of course staged data, but it looks like investments
    made went up until the middle of the year and then went down each month after
    till the end of the year.


    A good analyst will ask why this is happening. I am certain our customer John
    Smith wants to know! Performance analysis time.'
  trans: "\nc h 0 5 聚合查询 s q l 的截图。屏幕上半部分展示了一些编程代码。屏幕下半部分展示了一个有 9 列的结果表。列 `trade month`、`monthly\
    \ value` 和 `rolling monthly s t d e v` 的一些值在框中高亮显示。\n\n## 图 5-41\n\n## 投资组合标准差分析\n\
    \n观察前三个月，我们看到了 `monthly value`、`rolling total value` 以及两个标准差值。结果随着每个月的滚动而更新。请注意，第一组标准差值分别是\
    \ `NULL` 和 0 (`STDEV()` 和 `STDEVP()`)。\n\n至少 `STDEVP()` 给了我们一个零！\n\n尝试修改 `WHERE`\
    \ 子句如下：\n\n```sql\nWHERE TradeYear IN(2012,2013)\nAND CustId = 'C0000001'\nAND\
    \ Portfolio IN (\n    'CASH - FINANCIAL PORTFOLIO',\n    'EQUITY - FINANCIAL PORTFOLIO'\n\
    )\n```\n\n这次第一行的值有了实际金额。有意思。更多数据会这样吗？\n\n让我们将原始结果复制粘贴到 Microsoft Excel 中，并生成如图\
    \ 5-42 所示的图表。\n\n![](img/527021_1_En_5_Fig44_HTML.png)\n\n一张 Microsoft Excel 电子表格的截图。左侧表格有\
    \ 7 列。右侧屏幕展示了第一季度正态分布、第二季度正态分布、第三季度正态分布和第四季度正态分布的折线图。\n\n## 图 5-42\n\n## 季度正态分布曲线\n\
    \n要为标准差值生成图表，你需要计算正态分布。我发挥了一点创意，生成了四张图表，每季度一张。我使用每个季度最后一个月的平均值和标准差值进行正态分布计算，即第\
    \ 3、6、9 和 12 个月的数值。\n\n第一张第一季度的图表看起来像一个倒置的钟形曲线——其余的图表则不那么像。本电子表格可在本章代码存放的网站上获取。下载该电子表格，分析其工作原理，然后创建你自己的查询，例如生成六个月间隔或整年的钟形曲线。\n\
    \n清单 5-16 是另一个使用一些预置数据生成更传统正态分布钟形曲线的示例。\n\n```sql\nDECLARE @TradeYearStdev TABLE\
    \ (\n    TradeYear            SMALLINT      NOT NULL,\n    TradeQuarter      \
    \   SMALLINT      NOT NULL,\n    TradeMonth           SMALLINT      NOT NULL,\n\
    \    CustId               VARCHAR(32)   NOT NULL,\n    PortfolioNo          VARCHAR(32)\
    \   NOT NULL,\n    Portfolio            VARCHAR(64)   NOT NULL,\n    MonthlyValue\
    \         DECIMAL(10,2) NOT NULL\n);\nINSERT INTO @TradeYearStdev VALUES\n('2012','1','1','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','13862.80'),\n('2012','1','2','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','14629.50'),\n('2012','1','3','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','15568.90'),\n('2012','2','4','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','17004.80'),\n('2012','2','5','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','18064.90'),\n('2012','2','6','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','18500.30'),\n('2012','3','7','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','17515.00'),\n('2012','3','8','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','16779.50'),\n('2012','3','9','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','15576.00'),\n('2012','4','10','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','15941.60'),\n('2012','4','11','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','14208.80'),\n('2012','4','12','C0000001','P01C1','COMMODITY\
    \ - FINANCIAL PORTFOLIO','13804.30');\nSELECT TradeYear\n      ,TradeQuarter\n\
    \      ,TradeMonth\n      ,CustId\n      ,PortfolioNo\n      ,Portfolio\n    \
    \  ,MonthlyValue\n      ,AVG(MonthlyValue) OVER(\n      ) AS PortfolioAvg\n  \
    \    ,STDEVP(MonthlyValue) OVER(\n      ) AS PortfolioStdevp\nFROM @TradeYearStdev\n\
    ORDER BY CustId\n        ,TradeYear\n        ,TradeMonth\n        ,PortfolioNo\n\
    GO\n-- 清单 5-16\n-- 设置示例 - 第 1 部分\n```\n\n正如我提到的，数据 (`MonthlyValue`) 是预置的，因此它会为正态分布生成一个漂亮的钟形曲线。我通过使用一些硬编码的\
    \ `INSERT` 语句将数据加载到表变量中来设置测试数据。\n\n注意 `AVG()` 和 `STDEVP()` 函数的 `OVER()` 子句。我想要为每个函数生成一个单一值，这样我们就可以为\
    \ 12 个月的样本数据生成一个图表。这意味着每个正态分布都使用相同的平均值和标准差值。唯一变化的是月度值。这是 Excel 公式：`=NORM.DIST(C8,$I$3,$I$4,TRUE)`。\n\
    \n单元格 `BC8` 代表一月份的 `MonthlyValue`，`$I$3` 引用代表整个年度数据样本的平均值，`$I$4` 单元格引用代表整个年度的\
    \ `STDEVP()` 值。\n\n注意\n\n单元格引用中行和列坐标前面的美元符号 ($) 表示，当你将其用于其他月份时，该引用永远不会改变。总金额的单元格引用会改变以反映每个新行。\n\
    \n让我们看看这个钟形曲线是什么样子。请参阅图 5-43 中绘制的正态分布结果。\n\n![](img/527021_1_En_5_Fig45_HTML.png)\n\
    \n一张 Microsoft Excel 电子表格的截图。左侧表格有 5 列，分别是 `trade month`、`monthly value`、`portfolio\
    \ average`、`portfolio s t d e v p` 和 `normal distribution`。右侧屏幕展示了 12 个月正态分布的折线图。\n\
    \n## 图 5-43\n\n## 十二个月正态分布曲线\n\n看起来更像意大利的阿尔卑斯山，但这是由数据生成的、更易识别的钟形曲线。这当然是预置的数据，但看起来投资在年中之前呈上升趋势，之后每个月都下降，直到年底。\n\
    \n一位优秀的分析师会问为什么会发生这种情况。我确信我们的客户约翰·史密斯想知道！是时候进行绩效分析了。\n"
- fmt: '### Performance Considerations


    This time, in our performance analysis, we will take a deep dive into the `PROFILE`
    statistics and compare them with the tasks that appear in the graphical estimated
    query plan. This could get a bit into the weeds, but it is worth the effort as
    you will have a lot of information at hand that will assist you in your performance
    analysis efforts. Remember, profile statistics are generated when you execute
    the following command before you execute your query (don’t forget to turn them
    off):


    ```

    SET STATISTICS PROFILE ON

    GO

    ```


    Note


    For this discussion, refer to Figures [5-44a](#527021_1_En_5_Chapter.xhtml#Fig46)
    through [5-44h](#527021_1_En_5_Chapter.xhtml#Fig53).


    As usual, let’s start off by generating an estimated query plan in the usual manner.
    First, we examine the nodes that have high costs. Remember, we start right to
    left in the estimated execution plan.


    Please refer to Figure [5-44a](#527021_1_En_5_Chapter.xhtml#Fig46).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig46_HTML.png)


    Figure 5-44a

    Estimated execution plan for the standard deviation query


    Not shown in the interest of space is one sort task at the far left of the plan
    with a cost of 33%, but we will discuss it later.


    There are four high-cost tasks:

    *   An index seek, cost 19%

    *   First sort task, cost 44%

    *   Window spool task, cost 3%

    *   Second sort task, cost 33%


    We can look at the `PROFILE` statistics for each node by placing the mouse over
    the node and allowing a pop-up tip panel to appear with the statistics.


    Please refer to Figure [5-44b](#527021_1_En_5_Chapter.xhtml#Fig47).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig47_HTML.png)


    Figure 5-44b

    Index seek node profile statistics


    This index seek is a result of the `WHERE` clause predicate. If you look at the
    columns in the node, they match the columns in the `WHERE` clause predicate. This
    is called a covering index, and as we said earlier, an index seek is generally
    preferred to an index scan.


    As a validation, if we look at the `PROFILE` statistics output column called statement
    text, we see


    ```

    --Index Seek(OBJECT:(

    [APFinance].[Financial].[Portfolio].

    [ieMonthPortfolioNoPortfolioValueSweepDate]),

    SEEK:(

    [APFinance].[Financial].[Portfolio].[Year]=(2012)

    AND [APFinance].[Financial].[Portfolio].[CustId]=''C0000001''

    ),

    WHERE:([APFinance].[Financial].[Portfolio].[Portfolio]

    =''CASH - FINANCIAL PORTFOLIO'')

    ORDERED FORWARD

    )

    ```


    A little cryptic to read, but we can clearly see the `WHERE` clause driving the
    index seek.


    Next, let’s check out the expensive 44% sort.


    Please refer to Figure [5-44c](#527021_1_En_5_Chapter.xhtml#Fig48).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig48_HTML.png)


    Figure 5-44c

    Sort step profile statistics


    Looking at the profile statistics output, it tells us the sort is by month, portfolio
    number, and sweep date:


    ```

    --Sort(ORDER BY:(

    [APFinance].[Financial].[Portfolio].[Month] ASC,

    [APFinance].[Financial].[Portfolio].[PortfolioNo] ASC,

    [APFinance].[Financial].[Portfolio].[SweepDate] ASC

    )

    )

    ```


    This sort is for the output of the index seek.


    If I remove the `WHERE` clause completely, this is what the sort parameters look
    like. Please refer to Figure [5-44d](#527021_1_En_5_Chapter.xhtml#Fig49).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig49_HTML.png)'
