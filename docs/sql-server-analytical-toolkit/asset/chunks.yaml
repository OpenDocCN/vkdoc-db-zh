    command to load them into our log table. We can place the `INSERT` command in
    one or more `Execute SQL Tasks` and redirect all flow from the normal tasks to
    the error task (in case of errors) as shown in the Figure [11-15](#527021_1_En_11_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig15_HTML.png)


