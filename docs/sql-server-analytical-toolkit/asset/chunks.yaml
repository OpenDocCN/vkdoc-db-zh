- fmt: "## Analytical Functions\n\n以下是你现在应该已经熟悉的窗口分析函数，除非你直接从第[1](#527021_1_En_1_Chapter.xhtml)章跳到本章，因为你的职业重点是库存管理：\n\
    \n*   `CUME_DIST()`: 不支持窗口帧\n*   `FIRST_VALUE()`: **支持窗口帧**\n*   `LAST_VALUE()`:\
    \ **支持窗口帧**\n*   `LAG()`: 不支持窗口帧\n*   `LEAD()`: 不支持窗口帧\n*   `PERCENT_RANK()`:\
    \ 不支持窗口帧\n*   `PERCENTILE_CONT()`: 不支持窗口帧\n*   `PERCENTILE_DISC()`: 不支持窗口帧\n\n\
    正如我们所看到的，只有两个函数支持窗口帧规范。其余的不支持窗口帧。当你根据本章的描述理解了这些函数的工作原理后，这是合理的。\n\n我认为这些函数在库存分析中很重要，特别是\
    \ `LAG()` 和 `LEAD()` 函数，它们可以用来深入获取历史库存移动数据。\n\n最后，我们将执行通常的性能分析，包括基线估计查询计划和 `IO`\
    \ 与 `TIME` 统计信息。我们还将做一些新的事情；我们将收集所有分析函数的 `IO` 和 `TIME` 统计信息，并将其绘制成图表以检查相似性以及消耗大量资源的函数。\n\
    \n**提示**\n\n我建议你对本书中讨论的另一类函数也执行这最后一项活动，以便真正理解它们如何影响你的环境。这将使你大致了解何时可以使用普通的 `CTE`\
    \ 块，或依赖报告表甚至内存增强表的一些反规范化。\n\n### CUME_DIST( ) 函数\n\n回顾第[7](#527021_1_En_7_Chapter.xhtml)章和第[10](#527021_1_En_10_Chapter.xhtml)章，该函数计算一个值在数据集（如表、分区或加载了测试数据的表变量）中的相对位置。它计算一个随机值（如故障率）小于或等于特定设备故障率的概率。它是累积的，因为在计算特定值的唯一值时，它会考虑所有值。\n\
    \n如果你对此有点不确定，请回到第[7](#527021_1_En_7_Chapter.xhtml)章或附录A，复习该函数的工作原理和应用方式。\n\n让我们开始吧。以下是我们业务分析师朋友提供的业务规范：\n\
    \n需要创建一个仓库报告，显示“2002”年、产品“P101”、地点“LOC1”、库存“INV1”和仓库“WH112”的累积分布值。（为了节省空间，我没有使用这些名称。如果你好奇，请查看这些的主数据表。）\n\
    \n换句话说，对于一年中的每个月，平均值小于或等于当前月的百分比是多少？如果当前月份是“八月”，并且平均库存数量是“46”，那么其他值中小于或等于此值的百分比是多少？\n\
    \n详细的日历信息，如年、季度和月份，需要出现在报告中。日历季度和月份需要拼写出来，数字月份值需要包含在内，以便可以在我们用于生成结果图表的Microsoft\
    \ Excel电子表格中用于排序。\n\n这些要求有很多细节。希望到目前为止你已经习惯于接收书面要求并将其转化为一些 `TSQL` 代码。这是工作环境中的典型情况。有时你会得到非常模糊的要求。有时你会在电话中收到语音留言，给你口头要求。这些总是很有趣。\n\
    \n以下是我们想出的方案。请参考清单 [13-1](#527021_1_En_13_Chapter.xhtml#PC1)。\n\n```sql\nWITH\
    \ YearlyWarehouseReport (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId\n\
    \    ,InvId,WhId,ProdId,AvgQtyOnHand\n)\nAS\n(\n    SELECT AsOfYear\n        ,DATEPART(qq,AsOfDate)\
    \ AS AsOfQuarter\n        ,AsOfMonth\n        ,AsOfDate\n        ,LocId\n    \
    \    ,InvId\n        ,WhId\n        ,ProdId\n        ,AVG(QtyOnHand) AS AvgQtyOnHand\n\
    \    FROM Product.Warehouse\n    GROUP BY AsOfYear\n        ,DATEPART(qq,AsOfDate)\n\
    \        ,AsOfMonth\n        ,AsOfDate\n        ,LocId\n        ,InvId\n     \
    \   ,WhId\n        ,ProdId\n)\nSELECT AsOfYear\n    ,AsOfQuarter\n    ,CASE\n\
    \        WHEN DATEPART(qq,AsOfDate) = 1 THEN '1st Quarter'\n        WHEN DATEPART(qq,AsOfDate)\
    \ = 2 THEN '2nd Quarter'\n        WHEN DATEPART(qq,AsOfDate) = 3 THEN '3rd Quarter'\n\
    \        WHEN DATEPART(qq,AsOfDate) = 4 THEN '4th Quarter'\n    END AS AsOfQtrName\n\
    \    ,AsOfMonth\n    ,CASE\n        WHEN AsOfMonth = 1 THEN 'Jan'\n        WHEN\
    \ AsOfMonth = 2 THEN 'Feb'\n        WHEN AsOfMonth = 3 THEN 'Mar'\n        WHEN\
    \ AsOfMonth = 4 THEN 'Apr'\n        WHEN AsOfMonth = 5 THEN 'May'\n        WHEN\
    \ AsOfMonth = 6 THEN 'June'\n        WHEN AsOfMonth = 7 THEN 'Jul'\n        WHEN\
    \ AsOfMonth = 8 THEN 'Aug'\n        WHEN AsOfMonth = 9 THEN 'Sep'\n        WHEN\
    \ AsOfMonth = 10 THEN 'Oct'\n        WHEN AsOfMonth = 11 THEN 'Nov'\n        WHEN\
    \ AsOfMonth = 12 THEN 'Dec'\n    END AS AvgMonthName\n    ,AsOfDate\n    ,LocId\n\
    \    ,InvId\n    ,WhId\n    ,ProdId\n    ,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n\
    \    ,CUME_DIST() OVER (\n        PARTITION BY AsOfYear\n        ORDER BY AsOfMonth\
    \ ASC\n    ) AS RollingYearCume\nFROM YearlyWarehouseReport\nWHERE AsOfYear =\
    \ 2002\n    AND ProdId = 'P101'\n    AND Locid = 'LOC1'\n    AND InvId = 'INV1'\n\
    \    AND WhId = 'WH112'\nGO\n```\n**清单 13-1**\n月平均值的累积分布\n\n为了满足日历日期部分的要求，需要两个\
    \ `CASE` 块来将数字季度和月份值解码为各自的文本值（1 = January 且 1 = 1st Quarter 等）。"
  raw: '## Analytical Functions


    The following are the window analytical functions that should be familiar to you
    by now unless you jumped directly to this chapter from Chapter [1](#527021_1_En_1_Chapter.xhtml)
    because your career focus is inventory management:


    *   CUME_DIST(): Does not support window frames


    *   FIRST_VALUE(): **Supports window frames**


    *   LAST_VALUE(): **Supports window frames**


    *   LAG(): Does not support window frames


    *   LEAD(): Does not support window frames


    *   PERCENT_RANK(): Does not support window frames


    *   PERCENTILE_CONT(): Does not support window frames


    *   PERCENTILE_DISC(): Does not support window frames


    As we can see, only two functions support window frame specifications. The rest
    do not support window frames. When you understand how these functions work based
    on the descriptions in this chapter, it makes sense.


    I think these functions are important in inventory analysis, particularly the
    `LAG()` and `LEAD()` functions that can be used to really get into historical
    inventory movement data.


    Lastly, we will perform our usual performance analysis with baseline estimated
    query plans and `IO` and `TIME` statistics. We will also do something new; we
    will collect all `IO` and `TIME` statistics across the analytical functions and
    graph them to check for similarities and also functions that consume a lot of
    resources.


    Tip


    I recommend you perform this last activity with the other category of functions
    we discussed in the book in order to really understand how they affect your environment.
    This will give you some indication as to when you can use plain old `CTE` blocks
    or rely on some denormalization with report tables or even memory-enhanced tables.


    ### CUME_DIST( ) Function


    Recall from Chapters [7](#527021_1_En_7_Chapter.xhtml) and [10](#527021_1_En_10_Chapter.xhtml)
    that this function calculates the relative position of a value within a data set
    like a table, partition, or table variable loaded with test data. It calculates
    the probability that a random value, like a failure rate, is less than or equal
    to a particular failure rate for a piece of equipment. It is cumulative because
    it takes all values into account when calculating the distinct value for a specific
    value.


    If you are a bit unsure of this, go back to Chapter [7](#527021_1_En_7_Chapter.xhtml)
    or Appendix A and review how this function works and how it is applied.


    Let’s get started. Here are the business specifications supplied by our business
    analyst friend:


    A warehouse report needs to be created showing the cumulative distribution values
    for the year “2002,” product “P101,” location “LOC1,” inventory “INV1,” and warehouse
    “WH112.” (I did not use the names to save space. If you are curious, check out
    the master data tables for these.)


    In other words, for each month of the year, what is the percentage of average
    values for each month that are less than or equal to the current month? If the
    current month is “August” and the average value of the quantity on hand is “46,”
    what percentage of the other values are less than or equal to this value?


    Detailed calendar information such as year, quarter, and month needs to appear
    in the report. The calendar quarters and months need to be spelled out, and the
    numerical month values need to be included so they can be used to sort results
    in a Microsoft Excel spreadsheet that we will use to generate a graph for the
    results.


    These requirements have a lot of detail. Hopefully by now you are getting used
    to receiving written requirements and translating them into some `TSQL` code.
    This is typical in a work environment. Sometimes you will get requirements that
    are very fuzzy. Sometimes you will be left a message on your phone giving you
    verbal requirements. These are always fun.


    Here is what we came up with. Please refer to Listing [13-1](#527021_1_En_13_Chapter.xhtml#PC1).


    ```

    WITH YearlyWarehouseReport (

    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId

    ,InvId,WhId,ProdId,AvgQtyOnHand

    )

    AS

    (

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AVG(QtyOnHand) AS AvgQtyOnHand

    FROM Product.Warehouse

    GROUP BY AsOfYear

    ,DATEPART(qq,AsOfDate)

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    )

    SELECT AsOfYear

    ,AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AvgQtyOnHand AS MonthlyAvgQtyOnHand

    ,CUME_DIST() OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfMonth ASC

    ) AS RollingYearCume

    FROM YearlyWarehouseReport

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    Listing 13-1

    Cumulative Distribution for Monthly Averages

    ```


    In order to satisfy the calendar date part requirements, two `CASE` blocks are
    needed to decode the numerical quarter and month values into their respective
    text values (1 = January and 1 = 1st Quarter and so on).'
  trans: "## 分析函数\n\n以下是你现在应该已经熟悉的窗口分析函数，除非你直接从第 1 章跳到本章，因为你的职业重点是库存管理：\n\n*   `CUME_DIST()`:\
    \ 不支持窗口帧\n*   `FIRST_VALUE()`: **支持窗口帧**\n*   `LAST_VALUE()`: **支持窗口帧**\n*   `LAG()`:\
    \ 不支持窗口帧\n*   `LEAD()`: 不支持窗口帧\n*   `PERCENT_RANK()`: 不支持窗口帧\n*   `PERCENTILE_CONT()`:\
    \ 不支持窗口帧\n*   `PERCENTILE_DISC()`: 不支持窗口帧\n\n正如我们所看到的，只有两个函数支持窗口帧规范。其余的不支持窗口帧。当你根据本章的描述理解了这些函数的工作原理后，这是合理的。\n\
    \n我认为这些函数在库存分析中很重要，特别是 `LAG()` 和 `LEAD()` 函数，它们可以用来深入获取历史库存移动数据。\n\n最后，我们将执行通常的性能分析，包括基线估计查询计划和\
    \ `IO` 与 `TIME` 统计信息。我们还将做一些新的事情；我们将收集所有分析函数的 `IO` 和 `TIME` 统计信息，并将其绘制成图表以检查相似性以及消耗大量资源的函数。\n\
    \n**提示**\n\n我建议你对本书中讨论的另一类函数也执行这最后一项活动，以便真正理解它们如何影响你的环境。这将使你大致了解何时可以使用普通的 `CTE`\
    \ 块，或依赖报告表甚至内存增强表的一些反规范化。\n\n### CUME_DIST( ) 函数\n\n回顾第 7 章和第 10 章，该函数计算一个值在数据集（如表、分区或加载了测试数据的表变量）中的相对位置。它计算一个随机值（如故障率）小于或等于特定设备故障率的概率。它是累积的，因为在计算特定值的唯一值时，它会考虑所有值。\n\
    \n如果你对此有点不确定，请回到第 7 章或附录 A，复习该函数的工作原理和应用方式。\n\n让我们开始吧。以下是我们业务分析师朋友提供的业务规范：\n\n\
    需要创建一个仓库报告，显示“2002”年、产品“P101”、地点“LOC1”、库存“INV1”和仓库“WH112”的累积分布值。（为了节省空间，我没有使用这些名称。如果你好奇，请查看这些的主数据表。）\n\
    \n换句话说，对于一年中的每个月，平均值小于或等于当前月的百分比是多少？如果当前月份是“八月”，并且平均库存数量是“46”，那么其他值中小于或等于此值的百分比是多少？\n\
    \n详细的日历信息，如年、季度和月份，需要出现在报告中。日历季度和月份需要拼写出来，数字月份值需要包含在内，以便可以在我们用于生成结果图表的 Microsoft\
    \ Excel 电子表格中用于排序。\n\n这些要求有很多细节。希望到目前为止你已经习惯于接收书面要求并将其转化为一些 `TSQL` 代码。这是工作环境中的典型情况。有时你会得到非常模糊的要求。有时你会在电话中收到语音留言，给你口头要求。这些总是很有趣。\n\
    \n以下是我们想出的方案。请参考清单 13-1。\n\n```sql\nWITH YearlyWarehouseReport (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId\n\
    \    ,InvId,WhId,ProdId,AvgQtyOnHand\n)\nAS\n(\n    SELECT AsOfYear\n        ,DATEPART(qq,AsOfDate)\
    \ AS AsOfQuarter\n        ,AsOfMonth\n        ,AsOfDate\n        ,LocId\n    \
    \    ,InvId\n        ,WhId\n        ,ProdId\n        ,AVG(QtyOnHand) AS AvgQtyOnHand\n\
    \    FROM Product.Warehouse\n    GROUP BY AsOfYear\n        ,DATEPART(qq,AsOfDate)\n\
    \        ,AsOfMonth\n        ,AsOfDate\n        ,LocId\n        ,InvId\n     \
    \   ,WhId\n        ,ProdId\n)\nSELECT AsOfYear\n    ,AsOfQuarter\n    ,CASE\n\
    \        WHEN DATEPART(qq,AsOfDate) = 1 THEN '1st Quarter'\n        WHEN DATEPART(qq,AsOfDate)\
    \ = 2 THEN '2nd Quarter'\n        WHEN DATEPART(qq,AsOfDate) = 3 THEN '3rd Quarter'\n\
    \        WHEN DATEPART(qq,AsOfDate) = 4 THEN '4th Quarter'\n    END AS AsOfQtrName\n\
    \    ,AsOfMonth\n    ,CASE\n        WHEN AsOfMonth = 1 THEN 'Jan'\n        WHEN\
    \ AsOfMonth = 2 THEN 'Feb'\n        WHEN AsOfMonth = 3 THEN 'Mar'\n        WHEN\
    \ AsOfMonth = 4 THEN 'Apr'\n        WHEN AsOfMonth = 5 THEN 'May'\n        WHEN\
    \ AsOfMonth = 6 THEN 'June'\n        WHEN AsOfMonth = 7 THEN 'Jul'\n        WHEN\
    \ AsOfMonth = 8 THEN 'Aug'\n        WHEN AsOfMonth = 9 THEN 'Sep'\n        WHEN\
    \ AsOfMonth = 10 THEN 'Oct'\n        WHEN AsOfMonth = 11 THEN 'Nov'\n        WHEN\
    \ AsOfMonth = 12 THEN 'Dec'\n    END AS AvgMonthName\n    ,AsOfDate\n    ,LocId\n\
    \    ,InvId\n    ,WhId\n    ,ProdId\n    ,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n\
    \    ,CUME_DIST() OVER (\n        PARTITION BY AsOfYear\n        ORDER BY AsOfMonth\
    \ ASC\n    ) AS RollingYearCume\nFROM YearlyWarehouseReport\nWHERE AsOfYear =\
    \ 2002\n    AND ProdId = 'P101'\n    AND Locid = 'LOC1'\n    AND InvId = 'INV1'\n\
    \    AND WhId = 'WH112'\nGO\n```\n**清单 13-1**\n月平均值的累积分布\n\n为了满足日历日期部分的要求，需要两个\
    \ `CASE` 块来将数字季度和月份值解码为各自的文本值（1 = January 且 1 = 1st Quarter 等）。"
- fmt: 'The `OVER()` clause includes a `PARTITION BY` clause that sets up a partition
    for the year. This is not really required right now as we are filtering for the
    year “2002” in the `WHERE` clause, but if we include more years, we want to leave
    it in. This does not seem to affect performance by the way. Try running estimated
    query plans with and without the year in the `PARTITION BY` clause.


    Lastly, an `ORDER BY` clause is included that orders the partition by AsOfMonth
    column. Let’s see the results and then create a graph with Microsoft Excel.


    ## Homework


    Modify the query so it retrieves the calendar quarter and month from the new enhanced
    Calendar table. Also, modify the query so results are calculated for all years.
    Practice graphing each result set in a Microsoft Excel so as to create a profile
    of cumulative distribution values across the years. Run our usual estimated query
    plan and `IO` and `TIME` statistics analysis to see if the modified query performs
    better or worse now that it includes a `JOIN` to the Calendar table. Lastly, run
    the plan and `IO/TIME` statistics to get an average. Make sure you execute `DBCC`
    prior to each run.


    Please refer to the partial results in Figure [13-1](#527021_1_En_13_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig1_HTML.png)


    A screenshot of the S Q L S S M S window. It has a table of 13 columns and 13
    rows. The column headers are as of year, as of quarter, as of quarter name, as
    of month, average month name, as of date, loc I D, inv I D, W h I D, product I
    D, monthly average quantity on hand, and rolling year cumulative.


    Figure 13-1

    Cumulative distribution analysis for monthly averages


    The RollingYearCume values are sorted in ascending order as the `PARTITION BY`
    clause specified that the ORDER BY clause sorted by month, we can clearly see
    the cumulative distribution will generate a nice upward curving graph. Let’s copy
    this result into a Microsoft Excel spreadsheet.


    Please refer to Figure [13-2](#527021_1_En_13_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig2_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 13 rows.
    The column headers are quarter, month, E O M date, average, and cumulative distribution.
    It also has a line graph of cumulative distribution versus average quantity on
    hand with 2 ascending trends.


    Figure 13-2

    Cumulative distribution, average quantity on hand


    I modified the names a bit and added some formatting to make the report look professional.
    The results are now sorted by month. We can see an interesting upward-trending
