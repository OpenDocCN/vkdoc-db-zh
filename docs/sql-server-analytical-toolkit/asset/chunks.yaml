    `SQL Server Management Studio` (`SSMS`) 窗口的截图。文本展示了 `IO` 和 `TIME` 统计数据。在旧计划和新计划中，`CPU`
    和已用时间的解析与编译时间分别为 0, 0 毫秒和 0, 44 毫秒。新计划中，`CPU` 和已用时间的执行时间分别为 0 和 77 毫秒。影响了 72 行。


    **图 10-28**


    **比较 IO 和 TIME 统计数据**


    我们可以看到，统计数据大大减少了，因为所有维度表的表连接都被消除了，因为它们现在被放入了 `INSERT` 语句中，该语句每天会在非高峰时段运行一次。


    工作表的扫描次数和逻辑读取次数保持不变。预读读取从 29 降到了 0。最后，新的报表表显示逻辑读取从 24 降到了 13，但物理读取增加了 1。不过，最终
    `SQL Server` 执行的已用时间从 98 毫秒降到了 30 毫秒。


    所以，看起来这个方法再次奏效了。


    **提醒**


    在进行这类比较两种方法的测试时，请记住在每个会话中始终运行 `DBCC` 来清除缓冲区，以获得准确的结果。运行查询并比较三到四次以取平均值，确保没有异常情况。


    正如你可能想到的，我们现在有几个报表表了，所以在使用这种方法时，看看能否合并类似的表，以减少报表表的数量。随着表的激增，情况可能会很快变得复杂。我们希望物理数据库架构尽可能简单紧凑。


    我们将转换思路，看看一种用于分析的新方法。现在，我们将了解另一个可以添加到你的数据分析工具箱中的工具。`SQL Server Analysis Services`
    (`SSAS`) 是一个强大的平台，用于基于数百万行数据创建多维数据集！


    ## SQL Server Analysis Services


    我们现在将介绍称为多维数据集 (`cubes`) 的多维结构，以便我们能够对数据进行切片 (`slicing`) 和切块 (`dicing`)，并沿着我们维度定义的各种层级结构进行上钻
    (`drill up`) 和下钻 (`drill down`)。


    切片和切块指的是通过在查看数据集时引入和移除维度列来改变视角的能力，就像我们使用数据透视表所做的那样。


    导航层级结构指的是按不同的聚合级别（如按年、季度、月、周、日，以及反向）查看数据的能力。


    正如我之前所述，这些类似于数据透视表，只是它们可以处理数百万行数据，这对于 Excel 电子表格来说是个挑战。额外的好消息是，Excel 电子表格可以连接到多维数据集并基于它们创建数据透视表（处理的行数可能是个问题，因为有其限制）。


    最后，如果你知道如何使用 `Power BI`，你可以将 `Power BI` 连接到 `SSAS` 多维数据集，以创建一些令人印象深刻的计分卡、仪表板和报告，所以你的工具箱真的在不断进化！


    这里是一个小预览！请参考 **图 10-29**。


    ![](img/527021_1_En_10_Fig40_HTML.png)


    `Power BI` 未命名文件窗口的截图。它展示了一个星型模式，包含设备类型、日历、位置和连接到设备故障度量的设备故障。右侧面板是包含 3 个选项的属性、包含
    11 个组件和搜索框的字段。


    **图 10-29**


    **`Power BI` 展示 `APPlant` `STAR` 模式**


    在本书的最后三章，当我们将窗口函数应用于库存数据库业务模型时，我们将详细探讨 `Power BI`。现在，让我们看看使用 `SSAS` 创建多维数据集的主要步骤。


    涉及几个步骤：


    *   创建数据源。

    *   创建数据源视图。

    *   定义维度。

    *   定义数据集。

    *   定义维度用法（针对每个维度）。

    *   构建并部署数据集。

    *   浏览数据集。

    *   使用数据集创建数据透视表。


    创建数据源基本上是确定 `SSAS` 服务器并提供凭据，以便用户和开发人员能够连接到数据集（或创建一个）。


    数据源视图本质上是将用于创建和填充视图的表的 `STAR` 或 `SNOWFLAKE` 模式，因此这是一个必要的组件。使用 `SSAS` 可以创建两种模型：一种是表格模型，另一种是多维模型。当你首次在笔记本电脑、工作站或服务器上安装
    `SSAS` 时，需要定义模型类型。我们将专注于多维模型。


    一旦定义了数据源和数据源视图，你就需要确定将用作维度的表以及将用于填充数据集中度量的事实表。


    这些任务完成后，你需要将维度链接到数据集；这被称为定义维度用法。


    所有这些任务完成后，你需要构建数据集并将其部署到你环境中安装的 `SSAS` 服务器实例（如果你有足够的内存、`CPU` 和磁盘空间，可以同时安装表格和多维实例）。现在，你可以浏览数据集或使用
    Microsoft `Excel` 或 `Power BI` 连接到它。


    请参考 **图 10-30**。


    ![](img/527021_1_En_10_Fig41_HTML.png)


    `Power BI` 仪表板的截图。它展示了一个故障与工厂 `ID` 的折线图，有 16 条下降的曲线。还有一个包含 7 列 14 行的表格。右侧面板是包含
    2 个选项的筛选器、可视化效果，以及包含组件和子组件及搜索框的字段。


    **图 10-30**


    **一个简单的 `Power BI` 仪表板**

