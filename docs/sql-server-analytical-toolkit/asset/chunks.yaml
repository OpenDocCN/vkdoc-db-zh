    ## 性能考虑


    让我们按照常规方式创建基线估计查询计划。正如我所说，这个查询访问的表有超过 250 万行数据，那么让我们看看计划中是否有任何重大意外！


    请参考图 10-21a。


    ![](img/527021_1_En_10_Fig27_HTML.png)

    SQL SSMS 窗口的截图。它展示了一个包含 13 个组件的基线估计查询计划。这些组件是序列投射、段、嵌套循环 2%、表假脱机、段、排序 8%、并行 ism、表扫描
    74%、嵌套循环、计算标量、流聚合和 2 个表假脱机。

    **图 10-21a**

    基线估计查询计划


    我们立刻可以看出缺少了一个索引，所以我们稍后会创建它。我们在那个拥有 250 万行的表上有一个代价为 74%的表扫描，所以这是非常昂贵的。紧随其后的是一个代价为
    8%的并行 ism 重分区任务和一个代价为 8%的排序任务。


    较低级别的分支任务代价均为 0%，因此我们不予讨论。我们确实看到一个代价为 2%的嵌套循环联接任务，它连接了这两个（数据流）分支。我们需要针对那个昂贵的表扫描做些什么。


    接下来是三个重复部分中的一个，对应于 `PERCENTILE_CONT()` 函数的每次调用。由于它们都相同，我将简要讨论第一个。


    请参考图 10-21b。


    ![](img/527021_1_En_10_Fig28_HTML.png)

    SQL SSMS 窗口的截图。它展示了一个包含 13 个组件的计划部分。这些组件是嵌套循环 2%、表假脱机、段、计算标量、计算标量、计算标量、序列投射、段、嵌套循环
    2%、嵌套循环、流聚合、2 个表假脱机。

    **图 10-21b**

    第一个 PERCENTILE_CONT 函数调用的计划部分


    右侧的第一个嵌套循环联接就是我们刚才讨论的部分左侧看到的那个。它在这里作为参考框架。我们所有其他任务的代价都是 0%，我们在左侧看到另一个代价为 2%的嵌套循环联接。让我们立即创建建议的索引，看看是否有任何改进。


    请参考清单 10-10。


    ```sql

    CREATE NONCLUSTERED INDEX [iePlantBoilerLocationDateHour]

    ON [EquipStatistics].[BoilerTemperatureHistory] ([PlantId],[BoilerName])

    INCLUDE ([LocationId],[LocationName],[CalendarDate],[Hour],[BoilerTemperature])

    GO

    ```

    **清单 10-10**

    针对大表查询的建议索引


    估计查询计划生成器指出，创建此索引将使成本降低 48.25%。让我们看看。


    `CREATE INDEX` 命令运行了 11 秒！这是因为我们的表里有 250 万行数据。让我们看看新的估计执行计划是什么样子。


    我将把计划分成两部分。


    请参考图 10-22a，它比较了旧计划（上）和新计划（下）。


    ![](img/527021_1_En_10_Fig29_HTML.png)

    SQL SSMS 窗口的截图。它展示了原始和新的估计索引计划的第 1 部分，包含 14 个组件。在原始和新计划中，嵌套循环、排序和并行 ism 的成本分别为
    2%、8%、8%和 6%、32%、7%。在新计划中，段和索引查找的成本分别为 1%和 19%。

    **图 10-22a**

    旧 vs. 新的估计索引计划


    基于前面的截图，让我们列出新旧值，看看效果如何。从右到左：


    *   旧的估计查询性能计划显示表扫描（成本 74%） vs. 新计划的索引查找（19%）– `重大改进`。


    *   旧的并行 ism 任务从 8%降到了 7%– `一般般`。


    *   排序从 8%上升到了 32%。这不好，但我们看到引入索引时会发生这种情况– `非常失望`。


    *   段任务从 0%上升到 1%– `无需担心`。


    *   嵌套循环联接从 2%上升到 6%，但我们知道由于索引这会发生。我们以前见过这种模式– `令人失望`。


    让我们看看窗口函数的下一个计划部分。


    请参考图 10-22b。


    ![](img/527021_1_En_10_Fig30_HTML.png)

    SQL SSMS 窗口的截图。它展示了原始和新的估计索引计划的第 1 部分，包含 13 个组件。在原始和新计划中，嵌套循环和段的成本分别为 2%、0%和 6%、1%。最后一列中
    2%和 6%的嵌套循环被高亮显示。

    **图 10-22b**

    计划部分 2，旧 vs. 新


    我用方框标出了嵌套循环联接任务，作为我们刚刚讨论的第一个部分的参考点。唯一发生变化的两个任务是段和最右侧的嵌套循环联接。两者都上升了。段任务从 0%上升到
    1%，嵌套循环联接从 2%上升到 6%。由于这里没有获得任何改进，我们必须运行两者的 `IO` 和 `TIME` 统计信息来看看它们能告诉我们什么。


    请参考图 10-23。


    ![](img/527021_1_En_10_Fig31_HTML.png)

    SQL SSMS 窗口的截图。文本展示了 2 个 IO 和 TIME 统计信息。在原始和新计划中，解析和编译时间的 CPU 和经过时间分别为 16、59 和
    14、14 毫秒。执行时间的 CPU 和经过时间分别为 672、2281 和 265、767 毫秒。

    **图 10-23**

    IO 和 时间统计信息，旧 vs. 新


    这里我们看到了一些真正的改进。所有关键的统计数字都下降了。首先，SQL Server 执行时间从 2281 毫秒下降到 767 毫秒。逻辑读取从 25,837
    下降到 1,743。这真是巨大的提升！最后，预读从 25,844 下降到 1,653。


    根据我们的分析，考虑到我们正在处理一个 250 万行的表，这个索引是一个很好的改进。


    让我们来看看这个函数的近亲，`PERCENTILE_DISC()` 函数。

