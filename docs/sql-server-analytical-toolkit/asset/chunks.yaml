  trans: '

    # MIN() 和 MAX() 函数


    快速回顾一下，`MIN()` 和 `MAX()` 函数分别返回一列中的最小值和最大值。


    其语法与我们讨论过的其他聚合函数相同：


    ```sql

    MIN(ALL|DISTINCT *) or MIN(ALL|DISTINCT )

    ```


    和


    ```sql

    MAX(ALL|DISTINCT *) or MAX(ALL|DISTINCT )

    ```


    当我们将这些函数与 `OVER()` 子句结合使用时，它们的功能会更强大。值得重申的是，如果与 `OVER()` 子句一起使用，则不能使用 `DISTINCT`。


    ## 简单示例


    让我们从一个简单的示例开始，为以前没有见过或使用过这些函数的读者复习一下。请参考 **代码清单 5-7**。


    ```sql

    DECLARE @MinMaxExample TABLE (

    ExampleValue SMALLINT

    );

    INSERT INTO @MinMaxExample VALUES(20),(20),(30),(40),(60),(60);

    SELECT MIN(ExampleValue)   AS MinExampleValue

    ,COUNT(ExampleValue) AS MinCount

    FROM @MinMaxExample;

    SELECT MIN(ALL ExampleValue)    AS MinExampleValueALL

    ,COUNT( ALL ExampleValue) AS MinCountALL

    FROM @MinMaxExample;

    SELECT MIN(DISTINCT ExampleValue)  AS MinExampleValueDISTINCT

    ,COUNT(DISTINCT ExampleValue) AS MinCountDISTINCT

    FROM @MinMaxExample;

    SELECT MAX(ExampleValue)   AS MaxExampleValue

    ,COUNT(ExampleValue) AS MAXCount

    FROM @MinMaxExample;

    SELECT MAX(ALL ExampleValue)    AS MaxExampleValueALL

    ,COUNT( ALL ExampleValue) AS MAXCountALL

    FROM @MinMaxExample;

    SELECT MAX(DISTINCT ExampleValue)    AS MaxExampleValueDISTINCT

    ,COUNT( DISTINCT ExampleValue) AS MAXCountDISTINCT

    FROM @MinMaxExample;

    GO

    ```


    **代码清单 5-7**

    简单示例中的 `MIN()` 和 `MAX()`


    我包含了使用 `ALL` 或 `DISTINCT` 关键字的所有变体，结果如 **图 5-18** 所示。


    ![](img/527021_1_En_5_Fig20_HTML.jpg)


    一张 SQL 查询窗口的截图。它展示了 6 个查询的最小示例值。两个箭头指示最小不同值计数为 4，最大不同值计数为 4。


    **图 5-18**

    `MIN()` 和 `MAX()`， `ALL`， `DISTINCT`


    虽然你可以在 `MIN()` 和 `MAX()` 函数中使用 `ALL` 或 `DISTINCT`，但输出结果都是一样的。毕竟，无论存在多少重复值，最小值就是最小值，最大值就是最大值！


    ## 金融数据库示例


    现在让我们把注意力转向我们的金融数据库示例，看看这个查询的业务需求是什么。


    对于客户 C000001，John Smith 先生，我们想查看 2012 年每个月中现金账户价值的每日最小值和最大值。查询需要这样编写：如果我们希望查看其他年份，可以包含一个注释掉的
    `WHERE` 子句，以便我们可以来回切换。我们预期我们的业务分析师会希望在分析中包含其他年份。


    请参考 **代码清单 5-8**。


    ```sql

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,MIN(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* 要报告超过 1 年的数据 */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ) AS MonthlyAcctMin

    ,MAX(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* 要报告超过 1 年的数据 */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ) AS MonthlyAcctMax

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /* 要报告超过 1 年的数据 */

    --WHERE YEAR(PostDate) IN(2012,2013)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    ```


    **代码清单 5-8**

    使用 `MIN()` 和 `MAX()` 分析客户 C000001 的现金情况


    由于我们最初只查看 2012 年，我们的 `MIN()` 和 `MAX()` 函数的 `OVER()` 子句都有一个 `PARTITION BY` 子句，该子句使用过账日期的月份部分（每一天都是一个过账日期）。两个
    `ORDER BY` 子句都按 `PostDate` 排序。


    如前所述，如果你想查看超过一年的结果，请取消注释按年份和月份分区的 `PARTITION BY` 子句。我们不需要按月份和过账日期对分区进行排序，因为仅按过账日期排序就足以保持正确的顺序。


    最后，`WHERE` 子句筛选出客户 `C0000001` 和现金账户的结果。关于报告多年数据的情况同样适用。如果你想生成多年报告，请使用注释掉的 `WHERE`
    子句。


    为了看到一些有趣的结果，比如三天滚动最小值和最大值余额，只需将 `OVER()` 子句替换为以下代码片段：


    ```sql

    ,MIN(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS MonthlyAcctMin

    ,MAX(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS MonthlyAcctMax

    ```


    这里我们使用 `ROWS` 框架定义来定义三天的窗口框架。请注意，前两行加上当前行加起来构成了一个包含三行的窗口框架。这你应该知道！


    ## 查询结果


    让我们看看原始查询的结果。请参考 **图 5-19** 中的部分结果。


    ![](img/527021_1_En_5_Fig21_HTML.png)


    一张 ch05 聚合查询 sql 的截图。上面面板展示了一些程序代码。下面面板展示了结果表。三个箭头指示了账户余额、月度账户最小值和月度账户最大值列的一些值。


    **图 5-19**

    滚动每日最小和最大现金余额


    可以看出，我们开始时具有相同的最小和最大余额。每当出现新的最小或最大余额时，这些值会相应地更新。当我们将这些值用于 Microsoft Excel 电子表格时，会产生一个有趣的图表。


    请参考 **图 5-20** 中的部分结果。


    ![](img/527021_1_En_5_Fig22_HTML.png)


    一张 Microsoft Excel 电子表格的截图。左侧的表格有 4 列：过账日期、余额、最小值、最大值。在右侧屏幕上，余额与日期的折线图绘制了最小和最大余额的变化曲线。


    **图 5-20**

    最小和最大现金账户分析


    好消息是现金余额呈上升趋势。但我们看到的是最小和最大余额的波动，这表明存在一些大量的交易活动。请记住，客户使用此账户为其他工具（如外汇和股权交易）的买卖交易提供资金。

    '
- fmt: '### Performance Considerations


    Using the `MIN()` and `MAX()` functions with partitions could also be performance
    intensive. Let’s run through our usual analysis to see how we can evaluate and
    improve performance for this query.


    Please refer to Figure [5-21](#527021_1_En_5_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig23_HTML.jpg)


    A screenshot of `c h 0 5 aggregate queries s q l`. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Three arrows indicate the window spool cost 1%, sort cost 21%, and table
    scan cost 65%.


    Figure 5-21

    Estimated query plan for the `MIN/MAX` query


    Right away we see a table scan task with a cost of 65% and a missing index message.
    A sort follows at 21%, with a window spool at 1%, which indicates we are using
    physical storage vs. memory. Let’s look at part 2 of the estimated query plan
    in Figure [5-22](#527021_1_En_5_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig24_HTML.jpg)


    A screenshot of `c h 0 5 aggregate queries s q l`. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Two arrows indicate the sort spool cost 10% and the window spool cost 1%.


    Figure 5-22

    Estimated query plan part 2


    We see a second window spool at 1%. Two window spool tasks make sense as we are
    using the `MIN()` and `MAX()` functions, so each function generates a spool task.
    Finally, we have a sort task at 10%. Remember that I am not discussing the 0%
    tasks because for the scope of performance tuning discussions in this chapter,
    we only want to address the more costly tasks. A good performance tuning approach
    though is to look at high-cost tasks first and then tasks that you do not know
    what they are doing. What you don’t know can hurt you a whole lot!


    Also make sure you look at any tasks that have a warning icon. Let’s examine the
    suggested index and then create it using the suggested name.


    Please refer to Listing [5-9](#527021_1_En_5_Chapter.xhtml#PC18).


    ```

    /*

    Missing Index Details from ch05 - aggregate queries.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APFinance
    (DESKTOP-CEBK38L\Angelo (54))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 62.5426%.

    */

    /*

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Account] ([CustId],[AcctName])

    INCLUDE ([PrtfNo],[AcctNo],[AcctTypeCode],[AcctBalance],[PostDate])

    GO

    */

    Listing 5-9

    Suggested Index

    ```


    The query estimator says creating this index can improve performance by 62.54%.
    Sounds good!


    Let’s build it. We will call this index `iePrtfNoAcctNoAcctTypeCodeAcctBalancePostDate`.


    Yes, I know the index name is long, but for the purpose of this book, I decided
    to create index names that contain the names of the columns for easy identification.
    This way, as you learn the topic, you can quickly identify what the index is for.
    So as you progress you can rename the indexes to shorter but still descriptive
    names. Your company has or should have some good naming standards for database
    objects.


    The preceding code is copied to our script for this chapter with the suggested
    name, and the index is created. We also execute the usual `DBCC` command to clear
    the memory plan cache and generate a new query plan. Let’s see how we do. Please
    refer to Figure [5-23](#527021_1_En_5_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig25_HTML.jpg)


    A screenshot of `c h 0 5 aggregate queries s q l`. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Three arrows indicate window spool cost 4%, sort cost 37%, and Index seek
    cost 14%.


    Figure 5-23

    Post–index creation estimated query plan


    The table scan has been replaced by an index seek with a cost of 14%. So far,
    so good!


    We now see an expensive sort task at 37% and a window spool at 4%. These went
    up. Not so good. Let’s look at the left-hand side of the estimated query plan
    to see if things improved there.


    Please refer to Figure [5-24](#527021_1_En_5_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig26_HTML.png)


    A screenshot of `c h 0 5 aggregate queries s q l`. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Two arrows indicate sort cost 37% and window spool cost 4%.


    Figure 5-24

    Left-hand side of the query plan


    We find the same issue here; the window spool went up to 4%, and the last sort
    task went up to 37%. So we need to ask the question: Did the index help or make
    things worse? To answer this question, we need to look at the statistics that
    are generated when we execute the following command:


    ```

    SET STATISTICS PROFILE OFF

    GO

    ```


    We need to do this pre-index creation and post-index creation to see if the `IO`
    and other statistics went up or down. Please refer to Figure [5-25](#527021_1_En_5_Chapter.xhtml#Fig27)
    for the results.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig27_HTML.png)


    A screenshot of `c h 0 5 aggregate queries s q l`. The screen has 2 panels that
    compare the pre-index creation and post-index creation statistics of the total
    subtree.


    Figure 5-25

    Pre- and post-index `PROFILE` statistics


    This takes a bit of work to set up. First, you need to execute the `DBCC` command
    in a query pane for executing the query before the index is created. Set the profile
    statistics on and execute the query.


    Open a second query pane and copy and paste the `DBCC`, `SET PROFILE ON`, and
    query plus the code to create the index. Follow these steps:


    *   Step 1: Create the index.


    *   Step 2: Execute the `SET PROFILE ON` command.


    *   Step 3: Execute the `DBCC` command.


    *   Step 4: Execute the query.


    Make sure the query pane windows are side by side, vertically. As can be seen,
    the only improvement seems to be in the subtree costs. There is a minimal improvement
    in the estimated CPU statistic but not much.


    Let’s compare the `IO` and `TIME` statistics pre-index and post-index creation
    to see what they tell us. Please refer to Figure [5-26](#527021_1_En_5_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig28_HTML.png)


    A screenshot of `c h 0 5 aggregate queries s q l`. The screen has 2 panels that
    compare the `I O` and `TIME` statistics pre-index and post-index creation. The
    logical reads decreased from 372 to 16 and the reads-ahead read decreased from
    375 to 0, after execution.


    Figure 5-26

    `IO` and `TIME` statistics analysis


    What does this set of statistics tell us?


    We can see that the scan count and logical reads for the work table remained the
    same.


    We can see that the scan count for the `Account` table remained the same, but
    the logical reads went down from 372 to 16 and the read-ahead reads went from
    375 to 0.


    So, you can see, all our performance analysis tools are necessary so we can really
    see if an index helped or not. In this case it helped somewhat, and the creation
    of the index is justified. You do need to consider whether creating an index that
    helps performance improvement by 50% or less is justified. Will the index cause
    performance to degrade when a table is loaded? Does 50% increase mean the query
    that ran four seconds now runs in two? Take all these factors into consideration.
    If your users are happy with four-second wait times for the query to run, leave
    it alone. Don’t fix what’s not broken.


    Next, we quickly look at the `AVG()` function. We will not perform the rigorous
    performance analysis that we did in this section. I leave that up to you as an
    exercise as now you have seen several examples of the tools and techniques you
    need to use to measure performance.


    ### Pop Quiz


    What does cost mean? Is it the time a step takes to execute or a weighted artificial
    value based on IO, memory usage, and CPU cost?'
