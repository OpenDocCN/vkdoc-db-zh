    You will not like the answer.


    This is a bug with the client-side software, and occasionally you will get surprising
    results like this. I recommend you research this on the Microsoft website to see
    if newer versions of SSMS will clear this up. Fortunately, it looks like it does
    not happen often.


    Back to the query plan, as you can see some indexes were lying around from the
    prior chapter, so they were used. This is what you want; you want your indexes
    to be used by multiple queries and to not have to create a new index every time
    a new request comes in.


    Let’s examine the `IO` and `TIME` statistics generated by this query.


    Please refer to Table [4-1](#527021_1_En_4_Chapter.xhtml#Tab1).


    Table 4-1


    Query IO and Time Statistics


    | SQL Server Parse and Compile Times | Existing Indexes |

    | --- | --- |

    | CPU time (ms) | 0 |

    | Elapsed time (ms) | 127 |

    | **Statistics (Work Table 1)** | **Existing Indexes** |

    | Scan count | 0 |

    | Logical reads | 0 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **Statistics (Work Table 2)** | **Existing Indexes** |

    | Scan count | 0 |

    | Logical reads | 0 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **Statistics (YearlySalesReport)** | **Existing Indexes** |

    | Scan count | 1 |

    | Logical reads | **1384** |

    | Physical reads | 1 |

    | Read-ahead reads | **1401** |

    | **Statistics (Calendar)** | **Existing Indexes** |

    | Scan count | 1 |

    | Logical reads | 48 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **SQL Server Execution Times** | **Existing Indexes** |

    | CPU time (ms) | 125 |

    | Elapsed time (ms) | 334 |


    Seems like we have issues with logical reads and read-ahead reads. These exist
    on the `CTE` side with the `YearlySalesReport` table. Logical reads might not
    be an issue though as they are performed in memory (i.e., if you have enough!).
    Stay tuned. We need to look at `IO` and `TIME` statistics to see if issues exist
    related to logical reads.


    The query in the `CTE` might be a candidate for a denormalized report or staging
    table or, better yet, memory-enhanced table. The indexes helped, but there is
    just so much you can do by creating indexes. The more indexes you add, the more
    performance will degenerate when you are loading, modifying, or deleting rows
    in this table.


    Based on the code examples from the last chapter, see if you can modify this table
    by replacing the `CTE` with a script that loads a report or memory-enhanced table
    and then try this analysis on your own.


    ### RANK( ) vs. DENSE_RANK( )


    Let’s look at the `RANK()` function again, but now we will compare it to the `DENSE_RANK()`
    function.


    As a reminder, so you do not have to flip back to the start of the chapter, the
    `DENSE_RANK()` function works almost the same as the `RANK()` function. In case
    of ties, the rank is the same for the ties, but the next value after the duplicate
    values simply is assigned the next rank number.


    Please refer to Listing [4-4](#527021_1_En_4_Chapter.xhtml#PC4).


    ```

    WITH CustomerRanking (

    CalendarYear,CalendarMonth,CustomerFullName,TotalSales

    )

    AS

    (

    SELECT YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,CustomerFullName

    -- add one duplicate value on the fly

    ,CASE

    WHEN CustomerFullName = ''Jim OConnel'' THEN 17018.75

    ELSE SUM(TotalSalesAmount)

    END AS TotalSales

    FROM SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,CustomerFullName

    )

    SELECT

    CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,RANK()

    OVER (

    ORDER BY TotalSales

    ) AS Rank

    ,DENSE_RANK()

    OVER (

    ORDER BY TotalSales

    ) AS DenseRank

    FROM CustomerRanking

    WHERE CalendarYear = 2011

    AND CalendarMonth = 1

    ORDER BY

    DENSE_RANK() OVER (

    PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) DESC

    GO

    Listing 4-4

    Rank vs. Dense Rank

    ```


    I included a `CASE` statement in the `CTE` to hard-code a duplicate value, so
    we see the results. This is just a trick to use when prototyping. You can always
    introduce the duplicate in your data if it is test data. Never mess with production
    data. If you do, I hope your resume is up to date!


    Basically, this is a carbon copy of the prior query, but I included the `DENSE_RANK()`
    function so we can compare results. We did say that these functions are similar.
    The numerical results together with the chart in Microsoft Excel will verify this
    statement.


    Once again, to keep the result set small, the query uses a `WHERE` clause filter
    to pull data only for one year, 2011, and for the month of January. Let’s see
    the query results.


    Please refer to Figure [4-6](#527021_1_En_4_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig6_HTML.jpg)


    A screenshot of a window presents a tab with a table of 6 columns and 24 rows.
    The columns of total sales, rank, and dense rank of rows 49 to 54, 63, and 64
    are highlighted.


    Figure 4-6


    Rank vs. dense rank analysis


    What we want to look at here is how the results differ between these functions
    if duplicate values are present. Starting from the bottom with rows 63 and 64,
    both sales totals are $99.00, so this is where the fun begins. Both get a rank
    and dense rank of 2, but look at what happens when we move to row 62\. The `DENSE_RANK()`
    value starts at the next value 3, while the RANK() value skips a number and goes
    to 4\. Value 3 is ignored.


    When we look at rows 54 and 53, we have another set of duplicates, and the pattern
    repeats itself. Which function to use depends on how you want to treat duplicate
    values.


    One last point: Notice with `DENSE_RANK()` there are no gaps in the rankings.


    Here is our chart generated with Microsoft Excel. Please refer to Figure [4-7](#527021_1_En_4_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig7_HTML.png)


    A screenshot of an Excel worksheet presents a table of 4 columns and 17 rows for
    rank versus dense rank and a line graph of rank versus sales. The lines labeled
    rank and dense rank follow an increasing trend with slight fluctuations.


    Figure 4-7


    Graphing rank vs. dense rank


    Sure enough, the results are similar once again. A complete set of data and graphs
    like these for your users will guarantee productive analysis and decision making.


    Generating these graphs is easy by the way. Copy and paste the results to a spreadsheet.
    Tighten up the data and then highlight it so you can generate the graph. Click
    “Insert” in the menu bar and then select “Recommended Charts.” Pick a chart, and
    you’re done except for some formatting to make it look professional.'
  trans: '## 性能考量


    让我们首先以常规方式生成一个估计查询计划（菜单栏 ➤ 查询 ➤ 显示估计执行计划）。你会看到一些相当有趣且令人困惑的结果。


    请参考图 4-5。


    ![](img/527021_1_En_4_Fig5_HTML.jpg)


    T SQL 代码的截图呈现了两个部分。上半部分展示了一些代码行，包含变量初始化、`order by`子句以及`rank`函数内的`over`函数。下半部分展示了估计查询计划的流程图。


    图 4-5


    估计查询计划 – `RANK` 对比 `PERCENT_RANK`


    我们手头有一些现成的索引，因此估计器没有建议创建新的索引，但等一下——各项任务的成本总和超过了 100%：


    *   表扫描：2%

    *   索引扫描：50%

    *   索引查找：90%

    *   哈希匹配：26%


    这些值加起来是 168%。


    这是不可能的。成本不可能超过 100%。为什么会这样？


    你可能不会喜欢这个答案。


    这是客户端软件的一个错误，有时你会得到像这样令人惊讶的结果。我建议你在 Microsoft 网站上研究一下，看看新版本的 SSMS 是否会修复这个问题。幸运的是，这种情况似乎不常发生。


    回到查询计划，如你所见，由于上一章遗留的一些索引，它们被使用了。这正是你所希望的；你希望你的索引能被多个查询使用，而不是每当有新请求到来时都创建一个新索引。


    让我们检查一下此查询生成的 `IO` 和 `TIME` 统计信息。


    请参考表 4-1。


    表 4-1


    查询 IO 和时间统计


    | SQL Server 解析和编译时间 | 现有索引 |

    | --- | --- |

    | CPU 时间 (毫秒) | 0 |

    | 已用时间 (毫秒) | 127 |

    | **统计信息 (工作表 1)** | **现有索引** |

    | 扫描计数 | 0 |

    | 逻辑读取 | 0 |

    | 物理读取 | 0 |

    | 预读读取 | 0 |

    | **统计信息 (工作表 2)** | **现有索引** |

    | 扫描计数 | 0 |

    | 逻辑读取 | 0 |

    | 物理读取 | 0 |

    | 预读读取 | 0 |

    | **统计信息 (YearlySalesReport)** | **现有索引** |

    | 扫描计数 | 1 |

    | 逻辑读取 | `1384` |

    | 物理读取 | 1 |

    | 预读读取 | `1401` |

    | **统计信息 (Calendar)** | **现有索引** |

    | 扫描计数 | 1 |

    | 逻辑读取 | 48 |

    | 物理读取 | 0 |

    | 预读读取 | 0 |

    | **SQL Server 执行时间** | **现有索引** |

    | CPU 时间 (毫秒) | 125 |

    | 已用时间 (毫秒) | 334 |


    看来我们在逻辑读取和预读读取方面存在问题。这些问题存在于 `CTE` 端的 `YearlySalesReport` 表上。不过逻辑读取可能不是问题，因为它们是在内存中执行的（也就是说，如果你的内存足够的话！）。敬请关注。我们需要查看
    `IO` 和 `TIME` 统计信息，以确定是否存在与逻辑读取相关的问题。


    `CTE` 中的查询可能适合作为非规范化报告或暂存表的候选方案，或者更好的是，作为内存增强表的候选方案。索引有帮助，但仅靠创建索引能做的终究有限。你添加的索引越多，当你在这个表中加载、修改或删除行时，性能下降就越严重。


    根据上一章的代码示例，尝试修改这个表，用加载报告或内存增强表的脚本替换 `CTE`，然后自行尝试进行此分析。


    ## `RANK()` 对比 `DENSE_RANK()`


    让我们再次看一下 `RANK()` 函数，但现在我们将它与 `DENSE_RANK()` 函数进行比较。


    作为提醒，省去你翻回本章开头的麻烦，`DENSE_RANK()` 函数的工作方式与 `RANK()` 函数几乎相同。在出现并列时，相同的值获得相同的排名，但重复值之后的下一个值只是被简单地赋予下一个排名数字。


    请参考代码清单 4-4。


    ```sql

    WITH CustomerRanking (

    CalendarYear,CalendarMonth,CustomerFullName,TotalSales

    )

    AS

    (

    SELECT YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,CustomerFullName

    -- add one duplicate value on the fly

    ,CASE

    WHEN CustomerFullName = ''Jim OConnel'' THEN 17018.75

    ELSE SUM(TotalSalesAmount)

    END AS TotalSales

    FROM SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,CustomerFullName

    )

    SELECT

    CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,RANK()

    OVER (

    ORDER BY TotalSales

    ) AS Rank

    ,DENSE_RANK()

    OVER (

    ORDER BY TotalSales

    ) AS DenseRank

    FROM CustomerRanking

    WHERE CalendarYear = 2011

    AND CalendarMonth = 1

    ORDER BY

    DENSE_RANK() OVER (

    PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) DESC

    GO

    ```


    代码清单 4-4


    `RANK` 对比 `DENSE_RANK`


    我在 `CTE` 中包含了一个 `CASE` 语句，以硬编码方式添加了一个重复值，这样我们就能看到效果。这只是一个在原型设计时使用的技巧。如果数据是测试数据，你总是可以引入重复值。千万不要碰生产数据。如果你这么做了，我希望你的简历已经更新好了！


    基本上，这与之前的查询如出一辙，但我包含了 `DENSE_RANK()` 函数，以便我们可以比较结果。我们确实说过这些函数是相似的。数值结果加上 Microsoft
    Excel 中的图表将验证这一说法。


    再次，为了保持结果集较小，查询使用了 `WHERE` 子句过滤器，仅提取 2011 年 1 月的数据。让我们看看查询结果。


    请参考图 4-6。


    ![](img/527021_1_En_4_Fig6_HTML.jpg)


    一个窗口的截图显示了一个标签页，其中包含一个 6 列 24 行的表格。第 49 至 54 行、第 63 行和第 64 行的总销售额、排名和密集排名列被高亮显示。


    图 4-6


    `RANK` 对比 `DENSE_RANK` 分析


    我们这里想看的是，如果存在重复值，这些函数的结果有何不同。从底部的第 63 行和第 64 行开始，两个销售总额都是 $99.00，所以有趣的地方开始了。两者都获得了排名和密集排名
    2，但看看当我们转到第 62 行时发生了什么。`DENSE_RANK()` 的值从下一个数值 3 开始，而 `RANK()` 的值跳过了一个数字，变成了 4。数值
    3 被忽略了。


    当我们看第 54 行和第 53 行时，我们遇到了另一组重复值，模式重复出现。使用哪个函数取决于你如何处理重复值。


    最后一点：请注意使用 `DENSE_RANK()` 时，排名中没有间隙。


    这是我们使用 Microsoft Excel 生成的图表。请参考图 4-7。


    ![](img/527021_1_En_4_Fig7_HTML.png)


    一个 Excel 工作表的截图显示了一个 4 列 17 行的表格，用于对比 `RANK` 和 `DENSE_RANK`，以及一个 `RANK` 对比销售额的折线图。标记为
    `rank` 和 `dense rank` 的线条呈现略有波动的上升趋势。


    图 4-7


    绘制 `RANK` 对比 `DENSE_RANK` 图


    果然，结果再次相似。为你的用户提供完整的数据集和类似这样的图表，将保证有效的分析和决策。


    顺便说一句，生成这些图表很容易。将结果复制并粘贴到电子表格中。整理一下数据，然后选中它以便生成图表。点击菜单栏中的“插入”，然后选择“推荐图表”。挑选一种图表，除了进行一些格式调整使其看起来更专业之外，就完成了。'
- fmt: '### Performance Considerations


    I think there will be no surprises here due to all the indexes we created in prior
    chapters. Let’s create an estimated query plan in the usual manner (click “Query”
    in the menu bar and then click “Display Estimated Execution Plan” in case you
    forgot).


    Please refer to Figure [4-8](#527021_1_En_4_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig8_HTML.jpg)


    A screenshot presents a flow diagram of the estimated execution plan. It flows
    as sort, compute scalar, compute scalar, hash match, computer scalar, and index
    scan. The last 3 steps are highlighted.


    Figure 4-8


    Estimated execution plan for rank vs. dense rank


    Once again, an existing index results in an index scan task with a cost of 82%.
    If we add up all the costs, we get 82% + 1% + 15% = 98%. Not shown to the left
    are two sort tasks at 1% each, so the total cost adds up to 100% here. No bug
    to contend with this time. Let’s look at `IO` and `TIME` statistics next.


    Please refer to Table [4-2](#527021_1_En_4_Chapter.xhtml#Tab2).


    Table 4-2


    Query IO and Time Statistics


    | SQL Server Parse and Compile Times | Existing Index |

    | --- | --- |

    | CPU time (ms) | 4 |

    | Elapsed time (ms) | 4 |

    | Statistics (Work File) | Existing Index |

    | Scan count | 0 |

    | Logical reads | 0 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | Statistics (Work Table) | Existing Index |

    | Scan count | 0 |

    | Logical read | 0 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | Statistics (YearlySalesReport) | Existing Index |

    | Scan count | 1 |

    | Logical reads | 1384 |

    | Physical reads | 1 |

    | Read-ahead reads | 1401 |

    | SQL Server Execution Times | Existing Index |

    | CPU time (ms) | 62 |

    | Elapsed time (ms) | 58 |


    Statistics on the work file and the work table are all good. Logical reads seem
    high, but consider that logical reads usually go against memory cache so most
    likely this value is nothing to worry about. There is one physical read, which
    means SQL Server had to go to the physical disk to retrieve the pages it required.
    The read-ahead read statistic indicates how many pages anticipated were required
    and loaded into memory (recall that if you have a lot of memory, this is usually
    not a problem). Just be on the lookout for table spool tasks, which means `TEMPDB`
    is used.


    Lastly, the scan count of 1 and the physical read of 1 are low values that we
    shouldn’t worry about. Don’t forget to run `DBCC` to clear cache and to set statistics
    on and off each time you perform some analysis, so you do not get incorrect results.
    Turn statistics on at the end, so they are only collected for the query and not
    for when you run an estimated execution plan – in other words, right before you
    execute the query.


    ### NTILE( ) Function Revisited


    We covered this function in the beginning of this chapter, but let’s take another
    look. Here is a little credit rating and payment delinquency example that places
    customers into buckets so they can be assigned to collection agents based on how
    many days they are delinquent in their payments. Code is provided in the script
    folder for this chapter to load the credit-related tables.


    Please refer to Listing [4-5](#527021_1_En_4_Chapter.xhtml#PC5).


    ```

    DECLARE @NumTiles INT;

    SELECT @NumTiles = COUNT(DISTINCT [90DaysLatePaymentCount])

    FROM Demographics.CustomerPaymentHistory

    WHERE [90DaysLatePaymentCount] > 0;

    SELECT CreditYear

    ,CreditQtr

    ,CustomerNo

    ,CustomerFullName

    ,SUM([90DaysLatePaymentCount]) AS Total90DayDelinquent

    ,NTILE(@NumTiles) OVER (

    PARTITION BY CreditYear,CreditQtr

    ORDER BY CreditQtr

    ) AS CreditAnaystBucket

    ,CASE NTILE(@NumTiles) OVER (

    PARTITION BY CreditYear,CreditQtr

    ORDER BY CreditQtr

    )

    WHEN 1 THEN ''Assign to Collection Analyst 1''

    WHEN 2 THEN ''Assign to Collection Analyst 2''

    WHEN 3 THEN ''Assign to Collection Analyst 3''

    WHEN 4 THEN ''Assign to Collection Analyst 4''

    WHEN 5 THEN ''Assign to Collection Analyst 5''

    END AS CreditAnalystAssignment

    FROM Demographics.CustomerPaymentHistory

    WHERE [90DaysLatePaymentCount] > 0

    GROUP BY CreditYear

    ,CreditQtr

    ,CustomerNo

    ,CustomerFullName

    ORDER BY CreditYear

    ,CreditQtr

    ,SUM([90DaysLatePaymentCount]) DESC

    GO

    Listing 4-5

    Assigning Credit Analysts to Delinquent Accounts

    ```


    We make use of a variable called `@NumTiles` to count the number of instances
    of the account being delinquent 90 days. The following query initializes it:


    ```

    SELECT @NumTiles = COUNT(DISTINCT [90DaysLatePaymentCount])

    FROM Demographics.CustomerPaymentHistory

    WHERE [90DaysLatePaymentCount] > 0;

    ```


    The main query pulls out the year, quarter, customer number, and customer full
    name together with the total days the customer is delinquent. Next, the `CreditAnalystBucket`
    column is assigned the bucket number the customer falls in by using the `NTILE()`
    function and an `OVER()` clause that is partitioned by year and quarter. The partition
    rows are sorted by quarter and customer. As we have results loaded for only one
    year, we do not need to partition by year.


    Next, a case block is set up to print a message that states


    > **“Assign to Collection Analyst N”**


    N is a value from 1 to 5\. If the credit analyst bucket value is 1, the customer
    account is assigned to credit analyst 1; if the value is 2, the customer account
    is assigned to credit analyst 2; and so on. Try to load multiple years’ worth
    of credit data by modifying the load script for this table. You will need to add
    a `PARTITION BY` clause.


    Let’s see the results. Please refer to Figure [4-9](#527021_1_En_4_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig9_HTML.jpg)


    A screenshot of a window presents a tab with a table of 8 columns and 25 rows
    for credit analyst assignments. The columns of customer number, customer full
    name, total 90-day delinquent, and credit analysis bucket are highlighted from
    rows 15 to 20.


    Figure 4-9


    Credit analyst assignments for 90-day accounts


    It works well, but as can be seen there are some overlaps. Some customers that
    are 90 days late are assigned to either credit analyst 1 or 2\. So this strategy
    tries to balance out the assignments by volume as opposed to the number of times
    a customer was 90 days late.


    Let’s see how the `NTILE()` function works as far as performance is concerned.'
