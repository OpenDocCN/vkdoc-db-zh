    WHEN [AcctBalance] BETWEEN 1001 AND 2000 THEN [AcctBalance] * 1.20

    WHEN [AcctBalance] BETWEEN 2001 AND 3000 THEN [AcctBalance] * 1.15

    WHEN [AcctBalance] BETWEEN 3001 AND 4000 THEN [AcctBalance] * 1.10

