  trans: '

    ## SQL Server


    这是你所需的第一件也是最重要的组件工具。SQL Server 提供了数据库引擎，使你能够创建数据库、创建并加载表，当然还能运行我们刚刚讨论的所有窗口函数。


    请参阅图 14-4。


    ![](img/527021_1_En_14_Fig4_HTML.jpg)


    一幅图展示了 SQL Server 在万英尺高空下的 10 个组件。这些组件是数据库引擎、复制、调度器、高可用性、备份恢复、管理工具、安全、分布式事务协调器、系统数据库和用户数据库。


    图 14-4


    SQL Server 概览（误差一两英尺）


    从一个非常高的层面来看，SQL Server 包括用于存储数据库及所有相关对象的数据库引擎，外加查询引擎、解析器和数据库文件管理进程。


    注意


    数据库由文件组成：用于存储数据的文件、用于存储系统数据库数据的文件、用于 `TEMPDB` 的文件以及用于事务日志的文件。所有这些文件都可以分组到称为文件组的桶中。如果你需要复习如何创建数据库及其结构，请查看我关于创建数据库的免费播客，网址是：


    [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com)


    回到 SQL Server。它包含一个调度器，用于调度查询、脚本和外部程序，以便它们在需要的时间执行。你甚至可以调度 SSIS 包。


    它包含一个备份/恢复进程，以便在数据损坏或处理错误的情况下备份和恢复数据库。


    复制组件允许你在分布式架构中跨服务器复制数据库，高可用性组件确保 SQL Server 始终处于运行状态。


    我们学到的工具可以利用分布式数据，所以请确保你理解此功能的工作原理。SSIS 可以连接分布式架构中的所有数据库，以便将它们加载到称为 ODS（操作数据存储）的集中式数据库中。


    还有一个分布式事务协调器（DTC），它允许你创建跨多个数据库的事务。此组件确保所有跨多个服务器的分布式事务要么成功（提交），要么在出现问题时回滚（回滚），从而使数据库保持稳定和一致的状态。


    最后，我们看到管理工具，其中包括我们使用过的估计查询计划生成器。我们大量依赖它来分析使用窗口函数的查询性能。


    ## SSMS


    一旦我们下载并安装了 SQL Server，我们就需要一个工具来帮助我们管理数据库及相关对象，如表、索引、视图和查询脚本。SQL Server Management
    Studio 是首选工具。我们在整个旅程中都使用了它，所以你现在应该非常熟悉它了。我们只是触及了其众多功能和能力的皮毛。


    请参阅图 14-5。


    ![](img/527021_1_En_14_Fig5_HTML.png)


    SSMS 窗口的截图。左侧面板显示了对象资源管理器，其中包含多个文件和文件夹。第一个文件被选中。右侧面板有一段用于在表中输入详细信息的代码和一个包含 13
    列和 13 行的表。最后一列显示了滚动年度累计值。


    图 14-5


    SQL Server Management Studio


    这里我们看到了熟悉的对象资源管理器、查询窗格和结果窗格窗口。未显示解决方案资源管理器，但你可以轻松修改 SSMS 的外观。


    在安装 SQL Server 2019 或 2022 后，你将需要此工具。此工具不仅可以让你运行来自每一章的脚本，还可以运行创建每一章中使用的数据库并加载表的脚本。SSMS
    还拥有大量你将严重依赖的管理工具。这是第二优先级！确保从 Microsoft 下载网站下载安装程序，并在设置 SQL Server 后立即安装它。


    如果你想获得关于如何使用 SSMS 的简要教程，请查看我的免费播客，网址是 [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com)。请参阅图
    14-6。


    ![](img/527021_1_En_14_Fig6_HTML.png)


    Chrome 浏览器窗口的截图。一个标签页打开了 T-SQL 播客网站。菜单栏中选中了 T-SQL 播客选项。标题写着：以暴躁的方式学习 SQL Server
    BI 技术栈！左侧显示一个 YouTube 视频，右侧显示详细信息。


    图 14-6


    Grumpy Old IT Guy 视频培训播客


    顺便说一句，所有播客都是免费的，无需注册，但欢迎发表评论。如果你对如何改进内容有想法，请告诉我。


    不过，使用 SSMS 的最佳方法是亲自尝试它。四处探索并尝试各种功能。很快，你就会在所有的编程任务中依赖这个工具。


    稍后我将向你展示在哪里下载以及如何安装 SSMS。


    ## 窗口函数


    以下是我们在每个业务场景中回顾的函数。


    请参阅表 14-1。


    表 14-1


    按类别划分的函数


    | 聚合 | 排名 | 分析 |

    | --- | --- | --- |

    | `COUNT()` | `RANK()` | `CUME_DIST()` |

    | `COUNT_BIG()` | `DENSE_RANK()` | `FIRST_VALUE()` |

    | `SUM()` | `NTILE()` | `LAST_VALUE()` |

    | `MAX()` | `ROW_NUMBER()` | `LAG()` |

    | `MIN()` |   | `LEAD()` |

    | `GROUPING()` |   | `PERCENT_RANK()` |

    | `STRING_AGG()` |   | `PERCENTILE_CONT()` |

    | `STDEV()` |   | `PERCENTILE_DISC()` |

    | `STDEVP()` |   |   |

    | `VAR()` |   |   |

    | `VARP()` |   |   |


    这些函数与 `OVER()` 子句结合使用，使我们能够创建强大的查询，例如创建移动滚动总计和平均值。正如你所看到的，你还可以进行一些非常有趣的统计分析。


    你将依赖这些查询来解决复杂的业务问题。你可以预料到在面试中会讨论这些，所以请确保你对它们了如指掌！关键在于 `OVER()` 子句。确保你理解 `PARTITION
    BY` 子句的作用、`ORDER BY` 子句的作用，以及窗口帧规范（`ROWS` 和 `RANGE`）的作用。同时理解当你有同时使用 `PARTITION
    BY` 和 `ORDER BY` 子句的 `OVER()` 子句，或仅使用其中之一，甚至是空的 `OVER()` 子句时，窗口帧规范的默认行为。确保你对数据集中的分区是什么有扎实的理解。如果这一点有点模糊，请务必回顾第
    1 章，该章对此有详细解释。


    如果你需要复习这些函数，挑选一章并查看它们。确保你尝试这些脚本，修改它们，破坏它们，并增强它们。这就是学习的方式。


    最后，查看 Microsoft 关于这些函数的文档，以深入了解它们的工作原理。记住，这些是你的工具，所以请确保你知道它们能做什么、不能做什么以及如何使用它们！


    注意


    SQL Server 2022 为 `OVER()` 子句提供了替代语法。我在本书的前几章中简要介绍了这一点。还有一些新的窗口函数，例如：


    `APPROX_PERCENTILE_CONT()`

    `APPROX_PERCENTILE_DISC()`


    绝对值得花时间通过参考 Microsoft SQL Server 2022 网站来查看 Microsoft SQL Server 2022 中可用的新功能。

    '
- fmt: '## The Visual Studio Community License


    Visual Studio Community is the free license available to developers for creating
    all types of applications in the Microsoft development architecture, from C# applications
    to SSIS packages. This tool is a companion to SSMS, and you will be using it to
    create SSAS cubes and SSIS ETL packages.


    Please refer to Figure [14-7](#527021_1_En_14_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig7_HTML.png)


    A screenshot of the Microsoft Visual Studio window. An arrow points to the Extensions
    option at the top bar. A pop-up dialog box of Manage Extensions has 5 options
    in the left panel. It presents 6 options among which S Q L Server Integration
    Services and Microsoft Reporting Services Projects.


    Figure 14-7


    Visual Studio, picking project templates


    I will show you how to download this tool shortly, but let’s focus on the `EXTENSIONS`
    selection in the menu bar. This is what you will use to download and install `SSIS`,
    `SSAS`, and `SSRS` project support within Visual Studio Community. Just click
    `EXTENSIONS` and then scroll through the list to pick and choose what you want
    and need. The list is extensive!


    Warning: This will take time to download and install. Again, this will install
    project templates so you can develop applications with these tools like `SSIS`
    and `SSAS` projects. You can create C#, Python, and other types of applications
    also.


    You install the `SSAS`, `SSIS`, and `SSRS` servers when you install SQL Server.
    As you navigate through the screens, you will be given a chance to pick and choose
    the components you need and configure them by specifying what security credentials
    to use and where to place critical folders and files.


    ### SSAS Projects


    Remember these? This is what we used to create multidimensional cubes that allow
    users to slice and dice data and to also navigate up and down through the various
    levels and aggregations of data. Please refer to Figure [14-8](#527021_1_En_14_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig8_HTML.png)


    A screenshot of the S S A S window. The left panel has measures and dimensions.
    The Solutions Explorer panel has A P Plant dot cube selected. The Data Source
    View has a star scheme with equipment linked to the generator, turbine, valve,
    motor, and equipment failure with equipment type and location.


    Figure 14-8


    SSAS OLAP model


    Here is the cube structure panel that shows you the structure of the `SSAS` cube
    we created in the chapters dealing with the power plant use case. Cubes created
    with Visual Studio `SSAS` project templates are created and loaded on the `SSAS`
    server instance and can be accessed by Microsoft Excel spreadsheets and Power
    BI dashboards. You can even create SQL-like queries using a query language called
    `MDX`. This is another language you might want to learn.


    ### SSIS Projects


    Visual Studio is used to create solutions with one or more projects that contain
    packages to load databases, create cubes, and any other type of data integration
    processes. We can say `SSIS` is what moves the data and SQL Server is what provides
    the data.


    Solutions created with `SSIS` can be deployed to SQL Server so they can be run
    on a schedule defined by you, the DBA, or the system administrator, with the SQL
    Server scheduling tool called `SQL Agent`.


    Please refer to Figure [14-9](#527021_1_En_14_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig9_HTML.png)


    A screenshot of the S S I S window. Package dot d t s x file is open. It presents
    a flow diagram. The first step is the Load calendar followed by load country,
    load product, load product type load warehouse, load inventory, load location,
    and load inventory history. Below is the output.


    Figure 14-9


    Typical SSIS package


    This shows the successful run of a package we created in the inventory use case
    chapters. This package retrieves data from the `APInventory` database and loads
    it to the `APInventoryWarehouse` data warehouse. This is a very important tool
    that you will need to install, learn, and master on your journey to becoming an
    expert SQL Server developer or data integration architect.


    ## Power BI Web Scorecards, Dashboards, and Reports


    Power BI is the tool we used to create some simple reports and scorecards. We
    only touched the surface of the capabilities of this tool. Power BI connects to
    various data sources including SQL Server databases and `SSAS` multidimensional
    cubes that are created with Visual Studio Community (2019 or 2022; get both –
    it can’t hurt).


    Please refer to Figure [14-10](#527021_1_En_14_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig10_HTML.jpg)


    A screenshot of the Power B I untitled file window. The left panel has a table
    of 9 columns and 28 rows. The column headers are Calendar year, month, date, location
    name, I n v I D, W h I D, Product type and name, and quantity. The right panel
    has filters, visualizations, and fields.


    Figure 14-10


    Power BI design panel


    This screenshot shows you the design panel where you can define data sources,
    retrieve data, and convert it to a number of sophisticated visualizations like
    pie charts, line charts, and bar charts. This tool can be obtained free of cost
    for evaluation. We will see how to obtain it shortly.


    ## Microsoft Excel Spreadsheets


    Next is our old friend, the Microsoft Excel spreadsheet. We used this to pull
    in data from our various business use case databases in order to create some interesting
    reports and visualizations. We also created some powerful pivot tables that allowed
    us to slice and dice through the data and navigate the various hierarchies defined
    by the data models for each database.


    Please refer to Figure [14-11](#527021_1_En_14_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig11_HTML.png)


    A screenshot of the M S Excel window. It has 2 tables of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has 2 line graphs of counts versus functions with different trends
    for scan count, logical reads, and physical reads.


    Figure 14-11


    Microsoft Excel visualizations


    This is just an example of one of the visualizations we created and discussed
    in our inventory chapters. This tool is the first-line tool you would use (or
    your business analyst) to prepare reports and graphs from the data in the database.


    If you are not versed in spreadsheet creation, download and install the tool.
    It comes at a reasonable price, as it is not free, but well worth the cost so
    you can add it to your skill set.


    Note


    Excel also has its own `MDX`-like programming language called `DAX`. `DAX` stands
    for Data Analysis Expressions. You can use `DAX` with `SSAS`, Power BI, and Excel
    pivot tables.


    ## SSAS Server


    The `SSAS` server instance is installed as a part of the overall SQL Server Developer
    installation. You can manage and manipulate the cubes created with Visual Studio
    Community through SSMS. Two types of servers can be installed, either a multidimensional
    server or tabular (relational) server. When installing SQL Server, install both
    of these.


    Please refer to Figure [14-12](#527021_1_En_14_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig12_HTML.jpg)


    A screenshot of the S S M S window. The left panel presents the Object Explorer
    with multiple files and folders. The right panel presents a list of countries.


    Figure 14-12


    SSAS instance viewed from SSMS


    Here we see the AP Inventory Warehouse cube and the various folders for data sources,
    data source views, cube measure groups, and dimensions. The right-hand-side panel
    shows the country names available in the Country dimension. You can use the query
    pane to create `MDX` queries.'
