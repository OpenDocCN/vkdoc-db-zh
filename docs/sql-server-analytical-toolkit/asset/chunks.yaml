    A screenshot of the S Q L, S S M S window. The text presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 0, 73, and 0, 5 milliseconds
    in the original and revised. Execution times for C P U and elapsed are 125, 159,
    and 0, 172 milliseconds in original and revised.


    Figure 10-19


    Original and revised IO and TIME statistics


    Clearly the logical reads went down dramatically. The elapsed SQL Server execution
    time went up by 11 seconds though. So what does all this tell us? Do we really
    need all the years?


    Let’s ask our analyst to make sure. Porting this query with the `WHERE` clause
    to a web report created with Report Builder that includes filters for the plant,
    location, and year will deliver a faster-performing report. We can also give the
    user the option to include or not include all years, plants, and locations. This
    way, you can give your analyst what they want and give them options as to how
    much data will be generated in the report.


    Pop Quiz


    Which analytical window functions do not support window frame specifications (`ROWS`
    and `RANGE`)? Answer in Appendix A or the beginning of this chapter. Maybe the
    question is which two functions support this specification?


    It’s time for the percentile continuous and discrete functions.


    ### PERCENTILE_CONT Function


    We will discuss the `PERCENTILE_CONT()` function first, and what does this function
    do?


    Well, if you read Chapter [7](#527021_1_En_7_Chapter.xhtml), you will recall that
    it work on a continuous set of data.


    Recall what continuous data is. Continuous data is data measured over a period
    of time, like boiler temperatures in equipment over a 24-hour period or equipment
    failures over a period of time.


    Example: Summing up each boiler temperature to arrive at a total makes no sense.
    Summing up the boiler temperatures and then dividing them by the time period to
    get an average does. **So we can say continuous data can be measured by using
    formulas like average and so on.**


    In conclusion, the `PERCENTILE_CONT()` function works on a continuous set of data
    based on a required percentile so as to return a value within the data set that
    satisfies the percentile (you need to supply a percentile as a parameter, like
    .25, .50, .75, etc.).


    With this function the value is interpolated. It usually does not exist, so it
    is interpolated. Or by coincidence it could use one of the values in the data
    set if the numbers line up correctly.


    Here come the business requirements for this query:


    We are interested in the daily temperature profile for “Boiler 2” in plant “PP000002”
    for the year 2004\. The report needs to show the percentile continuous values
    for 25%, 50%, and 75%.


    Simple specification, but this will be interesting as the table has over 2.5 million
    rows. Please refer to Listing [10-9](#527021_1_En_10_Chapter.xhtml#PC13).


    ```

    SELECT PlantId

    ,LocationId

    ,LocationName

    ,BoilerName

    ,CalendarDate

    ,Hour

    ,BoilerTemperature

    ,PERCENTILE_CONT(.25) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .25]

    ,PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .5]

    ,PERCENTILE_CONT(.75) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .75]

    FROM EquipStatistics.BoilerTemperatureHistory

    WHERE PlantId = ''PP000002''

    AND YEAR(CalendarDate) = 2004

    AND BoilerName = ''Boiler 2''

    GO

    Listing 10-9

    Percentile Continuous Analysis for Monthly Failures

    ```


    The report is simple enough. The `PERCENTILE_CONT()` function is used three times,
    once for each desired percentile. The data is continuous as we are profiling it
    over time, specifically days and hours of the day. Let’s see the results.


    Please refer to the partial results in Figure [10-20](#527021_1_En_10_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig26_HTML.png)


    A screenshot of the S Q L, S S M S window. It has a table of 11 columns and 8784
    rows. The column headers are Plant I D, Location I D, location name, boiler name,
    calendar date, hour, boiler temperature, percentile continuous 0.25, percentile
    continuous 0.50, and percentile continuous 0.75.


    Figure 10-20


    Percentile continuous boiler temperature


    The query ran very fast. It ran under one second, and 8,784 rows were returned.
    Notice how each of the percentiles is interpolated. The arrows show the slot where
    they should appear if they existed. For example, for the 25th percentile, the
    value 924.425 falls between the values 762.2 and 978.5\. This means 25% of the
    values in the partition are less than or equal to this nonexistent value.


    Just follow the arrows for the other examples. Lastly, as a reminder, this query
    does not allow you to specify the `ROWS` or `RANGE` window frame specifications.
    No use trying it out as you will get a syntax error message:


    ```

    Msg 10752, Level 15, State 1, Line 52

    The function ''PERCENTILE_CONT'' may not have a window frame.

    ```


    Okay, how does this query perform on 2.5 million rows?'
  trans: '

    # 随堂测验


    哪些分析窗口函数不支持窗口框架规范（`ROWS` 和 `RANGE`）？请在附录 A 或本章开头寻找答案。或许这个问题是在问哪两个函数支持此规范？


    现在是百分位连续函数和离散函数的时间了。


    ### PERCENTILE_CONT 函数


    我们将首先讨论 `PERCENTILE_CONT()` 函数，这个函数是做什么的呢？


    如果你读过第 7 章，你会记得它作用于一组连续的数据。


    回想一下什么是连续数据。连续数据是在一段时间内测量的数据，例如 24 小时内设备的锅炉温度，或一段时间内的设备故障次数。


    举例来说：将每个锅炉温度相加得到一个总数是没有意义的。将锅炉温度相加然后除以时间段以获得平均值则是有意义的。因此我们可以说，连续数据可以通过使用诸如平均值等公式进行测量。


    总之，`PERCENTILE_CONT()` 函数基于一个指定的百分位数，在连续数据集上进行计算，以返回数据集中满足该百分位的一个值（你需要提供一个百分位参数，如
    .25、.50、.75 等）。


    使用此函数时，该值是经过插值计算的。它通常并不实际存在，因此需要进行插值。或者，碰巧如果数字排列正确，它也可能使用数据集中的某个现有值。


    以下是此查询的业务需求：


    我们需要了解 2004 年工厂“PP000002”中“2 号锅炉”的每日温度分布情况。报告需要显示 25%、50%和 75%的百分位连续值。


    需求描述简单，但由于表中有超过 250 万行数据，这将会很有趣。请参考代码清单 10-9。


    ```sql

    SELECT PlantId

    ,LocationId

    ,LocationName

    ,BoilerName

    ,CalendarDate

    ,Hour

    ,BoilerTemperature

    ,PERCENTILE_CONT(.25) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .25]

    ,PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .5]

    ,PERCENTILE_CONT(.75) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .75]

    FROM EquipStatistics.BoilerTemperatureHistory

    WHERE PlantId = ''PP000002''

    AND YEAR(CalendarDate) = 2004

    AND BoilerName = ''Boiler 2''

    GO

    ```


    代码清单 10-9：月度故障的百分位连续分析


    报告足够简单。`PERCENTILE_CONT()` 函数被使用了三次，每个所需的百分位一次。数据是连续的，因为我们是按时间（具体是天和小时）对其进行剖析。让我们看看结果。


    请参考图 10-20 中的部分结果。


    ![图 10-20：百分位连续锅炉温度](img/527021_1_En_10_Fig26_HTML.png)


    一张 SQL Server Management Studio 窗口的截图。其中有一个包含 11 列和 8784 行的表格。列标题分别是：Plant I D、Location
    I D、位置名称、锅炉名称、日历日期、小时、锅炉温度、百分位连续 0.25、百分位连续 0.50 和百分位连续 0.75。


    查询运行非常快。它在一秒钟内完成，返回了 8,784 行数据。请注意每个百分位值是如何被插值计算出来的。箭头标出了它们如果存在时应处的位置。例如，对于第 25
    个百分位，值 924.425 落在 762.2 和 978.5 这两个值之间。这意味着在分区中，有 25% 的值小于或等于这个不存在的值。


    对于其他例子，只需跟随箭头指示即可。最后，提醒一下，这个查询不允许你指定 `ROWS` 或 `RANGE` 窗口框架规范。尝试也没有用，因为你会收到语法错误消息：


    ```sql

    Msg 10752, Level 15, State 1, Line 52

    The function ''PERCENTILE_CONT'' may not have a window frame.

    ```


    那么，这个查询在 250 万行数据上的表现如何呢？

    '
- fmt: '## Performance Considerations


    Let''s create our baseline estimated query plan in the usual manner. As I said,
    this query is hitting a table with over 2.5 million rows, so let''s see if there
    are any significant surprises in the plan!


    Please refer to Figure [10-21a](#527021_1_En_10_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig27_HTML.png)

    A screenshot of the S Q L, S S M S window. It presents a baseline estimated query
    plan with 13 components. The components are sequence project, segment, nested
    loops 2%, table spool, segment, sort 8%, parallelism, table scan 74%, nested loops,
    compute scalar, stream aggregate, and 2 table spools.

    **Figure 10-21a**

    Baseline estimated query plan


    Right away we can see that an index is missing, so we will create it in a little
    bit. We have a table scan on the 2.5-million-row table at a cost of 74%, so that''s
    very expensive. It is followed by a parallelism repartition task at 8% and a sort
    at 8%.


    The lower-level branch tasks all cost 0%, so we will not discuss them. We do see
    a nested loops join task chiming in at 2% that joins these two branches (data
    flow branches). We need to do something about that expensive table scan.


    Next is one of three sections that are repeated for each call of the `PERCENTILE_CONT()`
    function. As they are all the same, I will briefly just discuss the first one.


    Please refer to Figure [10-21b](#527021_1_En_10_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig28_HTML.png)

    A screenshot of the S Q L, S S M S window. It presents a plan section with 13
    components. The components are nested loops 2%, table spool, segment, compute
    scalar, compute scalar, compute scalar, sequence project, segment, nested loops
    2%, nested loops, stream aggregate, 2 table spools.

    **Figure 10-21b**

    Plan section for the first PERCENTILE_CONT function call


    The first nested loops join at the right is the one we saw on the left side of
    the section we just discussed. It is here as a frame of reference. All our other
    tasks are 0% cost, and we see another nested loops join on the left hand side
    with a cost of 2%. Let''s create the suggested index right away so we can see
    if there is any improvement.


    Please refer to Listing [10-10](#527021_1_En_10_Chapter.xhtml#PC15).


    ```sql

    CREATE NONCLUSTERED INDEX [iePlantBoilerLocationDateHour]

    ON [EquipStatistics].[BoilerTemperatureHistory] ([PlantId],[BoilerName])

    INCLUDE ([LocationId],[LocationName],[CalendarDate],[Hour],[BoilerTemperature])

    GO

    ```

    **Listing 10-10**

    Suggested Index for the Large Table Query


    The estimated query plan generator states that creating this index will improve
    cost by 48.25%. Let''s see.


    The `CREATE INDEX` command took 11 seconds to run! That''s because we have 2.5
    million rows in this table. Let''s see what the new estimated execution plan looks
    like.


    I will break up the plan into two parts.


    Please refer to Figure [10-22a](#527021_1_En_10_Chapter.xhtml#Fig29), which compares
    the old plan (on top) and the new plan (on the bottom).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig29_HTML.png)

    A screenshot of the S Q L, S S M S window. It presents part 1 of original and
    new estimated index plans with 14 components. Costs of nested loops, sort, and
    parallelism are 2%, 8%, and 8%, and 6%, 32%, and 7% in original and new plans.
    Costs of segment and index seek in the new plan are 1% and 19%.

    **Figure 10-22a**

    Old vs. new estimated index plan


    Based on the preceding screenshot, let''s list the old and new values and see
    how we did. Starting from right to left


    *   The old estimated query performance plan showed a table scan (74% cost) vs.
    the new plan''s index seek (19%) – `major improvement`.


    *   The old parallelism task went down from 8% to 7% – `meh`.


    *   The sort went up from 8% to 32%. Not good, but we see this happens when we
    introduce an index – `major disappointment`.


    *   The segment tasks went up from 0% to 1% – `no worries`.


    *   The nested loops joins went from 2% to 6%, but we knew this would happen because
    of the index. We saw this pattern before – `disappointing`.


    Let''s look at the next plan section for the window function.


    Please refer to Figure [10-22b](#527021_1_En_10_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig30_HTML.png)

    A screenshot of the S Q L, S S M S window. It presents part 1 of the original
    and new estimated index plans with 13 components. Costs of nested loops and segments
    are 2% and 0% in the original and 6% and 1% in the new plan. Costs of nested loops
    with 2% and 6% in the last column is highlighted.

    **Figure 10-22b**

    Plan section 2, old vs. new


    I put a box around the nested loops join tasks as a point of reference for the
    first section that we just discussed. The only two tasks that changed are the
    segment and far-right nested loops join. Both went up. The segment task went up
    from 0% to 1%, and the nested loops join went up from 2% to 6%. We will have to
    run the `IO` and `TIME` statistics for both to see what they tell us as no improvement
    was gained here.


    Please refer to Figure [10-23](#527021_1_En_10_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig31_HTML.png)

    A screenshot of the S Q L, S S M S window. The text presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 16, 59, and 14, 14 milliseconds
    in the original and new plans. Execution times for C P U and elapsed are 672,
    2281, and 265, 767 milliseconds in original and new.

    **Figure 10-23**

    IO and Time statistics, old vs. new


    Here is where we see some real improvements. All the critical statistics went
    down. First, SQL Server execution time went down from 2281 ms to 767 ms. Logical
    reads went down from 25,837 to 1,743. This is really big! Finally, read-ahead
    reads went down from 25,844 to 1,653.


    Based on our analysis, the index was a good improvement, considering we are working
    with the 2.5-million-row table.


    Let''s check out the cousin of this function, the `PERCENTILE_DISC()` function.'
