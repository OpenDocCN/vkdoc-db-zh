    requirements.


    As of this writing, the URL is


    [`https://learn.microsoft.com/en-us/power-bi/report-server/install-report-server`](https://learn.microsoft.com/en-us/power-bi/report-server/install-report-server)


    Once you install it, the configuration steps look a lot like SSRS.


    Last but not least is Microsoft Excel, but if you do not have it already, you
    need to pay!


    ### Microsoft Excel


    This is not free but worth the price! Go to the following website or perform a
    search with your favorite browser. Purchase only from Microsoft to be safe.


    Please refer to Figure [14-29](#527021_1_En_14_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig29_HTML.png)


    A screenshot of the Chrome window. It has a tab that opens the Buy Microsoft Excel
    site. It presents the logo the Microsoft Excel on the screen with details of the
    subscription. The cost is $159.99\. Below is the Buy Now button. The bottom panel
    best value scheme to get Excel with Microsoft 365.


    Figure 14-29


    Microsoft Excel subscription


    Check out which option works for you pricing- and feature-wise.


    As of this writing, the URL is


    [`www.microsoft.com/en-us/download/details.aspx?id=53613/`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D53613/)


    That’s it. Now you know where to get all the tools. If you started off like me
    when I was learning all these tools, there was a lot of trial and error and poking
    about, but that is how you learn. Just make sure it is on your own personal environment
    and not on a production server!


    ### SSMS


    I almost forgot SSMS. Simply navigate to the following link to download the installer.


    Please refer to Figure [14-30](#527021_1_En_14_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig30_HTML.png)


    A screenshot of the Chrome window. It has a tab that opens the Download S S M
    S site. The left panel presents version S Q L Server 2022, and 14 options among
    which download S S M S is selected. The right panel presents details of the software
    to which it is applied and a download link.


    Figure 14-30


    Download SSMS


    As of this writing, the URL is


    [`https://learn.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms%253Fview%253Dsql-server-ver16)


    Once the installer downloads, run the executable and follow the guided steps to
    install it on your development computer.


    ## Next Steps


    Practice with each of the scripts. Take your time. Download all the tools and,
    if necessary, research online for tutorials. Most are free, but there are plenty
    of sites that will offer robust video courses for a fair subscription price. If
    you are really new to TSQL and need some instruction or a refresher on writing
    queries, creating tables, etc., please check out my website at [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com)
    for free podcasts on TSQL programming.


    ## Thank You!


    Thank you for buying and reading this book. Also thank you for your patience.
    Please feel free to contact me via abobak@grumpyolditguy.com with questions, comments,
    and suggestions for improving this book in the next edition.


    Till the next time …'
