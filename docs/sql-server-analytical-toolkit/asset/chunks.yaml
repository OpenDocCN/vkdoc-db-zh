- fmt: '### Step 4: Create the Final Report


    This is the last step of the script. This script is a bit complex in that it also
    includes two `CASE` blocks to correctly calculate the number of days in the gaps
    and islands and also to create the string that displays all the dates in the gaps
    and islands but as one value.


    Please refer to Listing [6-26](#527021_1_En_6_Chapter.xhtml#PC34).


    ```sql

    SELECT CustId

    ,Symbol

    ,CASE

    WHEN GapOrIsland LIKE ''ISLAND%'' THEN DATEDIFF(dd,GapIslandStart,GapIslandEnd)
    + 1

    ELSE GapTradeDays

    END AS TradeDays,

    ,GapOrIsland

    ,GapIslandStart AS GapOrIslandStart

    ,GapIslandEnd AS GapOrIslandEnd,

    ,CASE

    WHEN GapOrIsland LIKE ''GAP%'' THEN

    (

    SELECT STRING_AGG(CalendarDate,'','')

    FROM [MasterData].[Calendar]

    WHERE CalendarDate BETWEEN DATEADD(dd,1,GapIslandStart)

    AND DATEADD(dd,-1,GapIslandEnd)

    )

    ELSE (

    SELECT STRING_AGG(CalendarDate,'','')

    FROM [MasterData].[Calendar]

    WHERE CalendarDate BETWEEN GapIslandStart AND GapIslandEnd

    )

    END AS GapOrIslandTradeDays

    FROM FinalGapIslandCTE

    ORDER BY CustId,Symbol,GapIslandStart

    GO

    ```


    Listing 6-26

    The Final Gaps and Islands Report


    The first `CASE` block checks for the string "`ISLAND%`" in the `GapOrIsland`
    column for each row. If it finds it, it generates the difference between the start
    and end dates using the `DATEDIFF()` function and adds 1 to the start date and
    subtracts 1 from the stop date.


    If the value is not "`ISLAND%`", then it just accepts the current results in the
    `TradeDays` column. Please recall the percent (`%`) character means that some
    sort of numerical value is there, but right now for this conditional test, we
    do not care what it is.


    The second `CASE` block contains the logic for generating the comma-separated
    list of dates in the islands or gaps. Remember that for islands we want to include
    the start and end dates but for gaps we only want the date or dates in between.


    The first test looks for the string "`GAP%`". If this value is found, a sub-query
    pulls out the dates between the start and end dates, which have, respectively,
    been incremented and decremented by 1 day, so the query will pull out any dates
    between these modified dates from the Calendar table:


    ```sql

    SELECT STRING_AGG(CalendarDate,'','')

    FROM [MasterData].[Calendar]

    WHERE CalendarDate BETWEEN DATEADD(dd,1,GapIslandStart)

    AND DATEADD(dd,-1,GapIslandEnd)

    ```


    The trusty `BETWEEN` predicate is used for this job! This could be an expensive
    strategy as we have a nested `SELECT` query and the `Calendar` table it queries
    has 1,461 rows.


    Finally, the second and last test is actually the default condition. It pulls
    out the list of dates with the same query, but this time there is no need to use
    the `DATEADD()` function:


    ```sql

    SELECT STRING_AGG(CalendarDate,'','')

    FROM [MasterData].[Calendar]

    WHERE CalendarDate BETWEEN GapIslandStart AND GapIslandEnd

    ```


    The data is sorted by an `ORDER BY` clause, and we are finished. Let’s see the
    results. Hope it worked. Please refer to Figure [6-54](#527021_1_En_6_Chapter.xhtml#Fig54).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig54_HTML.png)


    A screenshot of SQL application titled SQL query 1. It represents a program and
    a list with 7 columns with data on the customer id, symbol, trade days, gap or
    island, gap or island start date, gap or island end date, and gap or island trade
    days.


    Figure 6-54

    Final islands and gaps report


    Looks good!


    Notice that this time the start and stop dates are included for the islands. That
    is what we want as they are dates where trading occurred. Once again, for gaps,
    we do not include the start and stop dates in the long string that contains all
    the dates separated by commas.


    It also works correctly with leap years, so I think we can congratulate ourselves
    for a job well done.


    One final comment: When you receive a verbal or written business requirement from
    an analyst, you should take time out to write a simple technical specification
    that includes the following three steps:


    Step 1: Define the initial condition.


    Step 2: Write out the logic that will fulfill the business requirement.


    Step 3: Define the final condition or conditions that will generate the report
    correctly.


    Now what do I mean by initial and final conditions? For our little script, they
    are answered by the following:


    How do we process the first row? Do we include missing data or just display `NULL`?


    How do we process the last row? Do we include missing data or just display `NULL`?


    So, in other words, identify any special treatment for processing that is not
    included in the main logic of the script.


    Last but not least, test, test, and did I say test?


    # Summary


    What did we learn in this chapter?


    For one thing we realized our toolkit consists not only of the aggregate, ranking,
    and analytical functions but also of supporting tools like the estimated query
    plan generator; the various performance and runtime statistics like `IO`, `TIME`,
    and `PERFORMANCE`; and Microsoft Excel. We use Excel to visually interpret the
    data results to give our analyst a complete view of the results.


    We also expanded our knowledge by doing a deep dive into the query plan steps
    and understanding how the sections of a query are processed and what statistics
    are generated.


    Lastly, we did a quick discussion of the live query plan generator so we could
    see how much time is spent on each task and what volume of rows are passed between
    tasks in order to give us a complete picture of the processing behind the scenes.
    This helps identify high-performance steps that need to be analyzed.


    Hopefully, at this stage of the book, you see how you can follow a structured
    approach to performance tuning and which tools and also solutions you can apply
    to fix performance problems. These include adding indexes, using report tables,
    and in some cases upgrading hardware for faster memory and solid-state disks for
    `TEMPDB`. We did not discuss memory-enhanced tables, but this is also a tool you
    can consider.


    The next chapter puts analytical window functions through their paces against
    our financial database.


    # 7. Finance Use Case: Analytical Functions


    This is the last chapter dealing with our financial database. We will put the
    analytical functions through their paces and perform the usual performance analysis,
    but we will also take a look at a few strategies that involve variations of the
    queries, like from `CTE`- to reporting table–based queries to using memory-enhanced
    tables to see which scheme yields better performance.


    ## Analytical Functions


    Just in case you did not read Chapter [3](#527021_1_En_3_Chapter.xhtml), the following
    are the eight functions for this category that we will discuss (they are sorted
    by name). They are used with the `OVER()` clause to generate valuable reports
    for our business analysts:


    *   `CUME_DIST()`

    *   `FIRST_VALUE()`

    *   `LAST_VALUE()`

    *   `LAG()`

    *   `LEAD()`

    *   `PERCENT_RANK()`

    *   `PERCENTILE_CONT()`

    *   `PERCENTILE_DISC()`


    The same approach as the prior chapter will be taken. I describe what the function
    does and present the code and the results. Next, some performance analysis is
    performed so we can see what improvements, if any, are required.


    As we saw in the examples in Chapter [3](#527021_1_En_3_Chapter.xhtml), improvements
    can be adding indexes or even creating a denormalized report table so that when
    the query using the analytical window functions is executed, it goes against preloaded
    data avoiding `JOIN`s, calculations, and complex logic. Rarely will you be delivered
    requirements that need window functions with real-time data. If these come up,
    the reporting table strategy will do you no good.'
