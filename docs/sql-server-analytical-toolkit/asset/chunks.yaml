    \ month’s average value.\n\n#### Homework"
  raw: '### Performance Considerations


    Here comes our usual baseline estimated execution plan.


    Please refer to Figure [13-7](#527021_1_En_13_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig7_HTML.png)


    A screenshot of the S Q L S S M S window. It presents a baseline estimated execution
    plan with 9 components. The components are window spool, segment, segment, compute
    scalar, compute scalar, stream aggregate, sort, compete scalar, and index seek.
    Sort and index seek have costs of 77% and 22%.


    Figure 13-7


    First and last value baseline estimated performance plan


    Seems like a well-performing query. An index was not suggested, and we see by
    the index seek (22% cost) that an existing index is being used.


    This is representative of real production environments, that is, as more and more
    queries are being created, new index requirements are identified and indexes created,
    which can then be used by future queries. So, in theory as you create new queries,
    you do not have to create new indexes each and every time. That’s the goal anyway.


    Note


    Remember that indexes may speed up a query, but they will slow down row insert,
    update, and delete operations. Indexes need to be updated for these operations,
    so the more indexes you have, the slower performance you will see.


    I almost forgot the 77%-cost sort task is something to look at. The value is high.
    Setting `PROFILE STATISTICS ON,` we see that the task is sorting by the columns
    `AsOfDate`, an expression, and `AsOfMonth`.


    Turns out the expression is the `DATEPART()` function used to pull out the calendar
    quarter. So here is some code that needs to be optimized.


    Let’s complete the analysis with some `IO` and `TIME` statistics. Please refer
    to Figure [13-8](#527021_1_En_13_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig8_HTML.jpg)


    A screenshot of the S Q L S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 15 and 110
    milliseconds. The S Q L server execution times for C P U and elapsed are 0 and
    10 milliseconds. 12 rows of 2 tables are affected.


    Figure 13-8


    IO and TIME statistics


    The query executes in 10 ms, under a second (parse time is 110 ms). We see the
    scan count value is at 13 and the logical reads at 73, a bit high.


    There’s the same pattern for scan counts, logical reads, and physical reads: 1-3-2\.
    Makes sense. We are using the same table.


    Possibly joining this query with the enhanced Calendar table we created earlier
    to pull out the calendar quarter text, instead of generating it by pulling it
    out of the date, might be a better solution, but the cost of a table `JOIN` needs
    to be considered. This strategy would also remove the `CASE` blocks used to decode
    the quarter and month numerical values to their corresponding text values.


    Tip


    Avoid using functions like `DATEPART()` wherever possible, especially in `WHERE`
    clause predicates. This will affect performance.


    Not one to lag behind, we move to our next function. (Yes, bad pun. I can see
    the technical reviewer rolling her eyes!)


    ### LAG( ) Function


    Recall what the `LAG()` function does:


    This function is used to retrieve the previous value of a column relative to the
    current row column value (usually within a time dimension), in our case inventory
    movement dates.


    This query can help answer questions like


    How does the current month compare to the prior month or prior quarter or prior
    year?


    This is a counterpart of the `LEAD()` function, which we will look at next. Here
    are the specifications for the query our analyst wants:


    Our business analyst wants us to modify the prior query so that it shows the current
    average monthly inventory values but also the prior one-month, prior three-month,
    and prior 12-month averages (for the same month):


    *   1: Go back one month.


    *   3: Go back three months (one quarter relative to the current month).


    *   12: Go back 12 months (one year relative to the current month).


    The same date objects are required, that is, spell out the quarter and month names.
    And also filter by the same product, location, inventory, and warehouse. The report
    has to span three years: 2002, 2003, and 2004.


    Copying and pasting our last query and making a few modifications delivers the
    following query. Note the `CTE` is not copied, as it is the same one as the prior
    example.


    Please refer to Listing [13-3](#527021_1_En_13_Chapter.xhtml#PC3).


    ```

    /* CTE goes here */

    SELECT AsOfYear

    ,AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AvgQtyOnHand AS MonthlyAvgQtyOnHand

    ,LAG(AvgQtyOnHand,1,0) OVER (

    ORDER BY AsOfDate

    ) AS PriorMonthAverage

    ,LAG(AvgQtyOnHand,3,0) OVER (

    ORDER BY AsOfDate

    ) AS PriorQuarterAverage

    ,LAG(AvgQtyOnHand,12,0) OVER (

    ORDER BY AsOfDate

    ) AS PriorYearAverage

    ,AvgQtyOnHand -LAG(AvgQtyOnHand,1,0)

    OVER (

    ORDER BY AsOfDate

    ) AS Change

    ,AvgQtyOnHand -LAG(AvgQtyOnHand,1,0)

    OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) AS Change

    FROM YearlyWarehouseReport – the CTE

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    Listing 13-3

    Current Month Movements vs. Last Month, Quarter, and Year

    ```


    Let’s analyze the three `LAG()` functions.


    Firstly, there is no partition set up for the year as we want the results to span
    all the years in the data set. Each partition has an `ORDER BY` clause that refers
    to the `AsOfDate` column. The only difference is that each `LAG()` function uses
    a different parameter to specify the time period we need to go back to:


    *   1: Go back one month.


    *   3: Go back three months (one quarter relative to the current month).


    *   12: Go back 12 months (one year relative to the current month).


    The column names are misleading as they do not represent actual quarters or years
    but represent going back three or 12 months (oh well, I leave it up to you to
    come up with better names).


    The “0” value parameter indicates that we need to display “0” instead of a `NULL`
    value when we reach the beginning of a boundary. That is, no prior rows exist
    to satisfy the span of time required by the `LAG()` function.


    Lastly, for the current/prior month combination, we include a simple formula to
    calculate the change by subtracting the value returned by the `LAG()` function
    from the current month’s average value.


    Homework'
  trans: "### 性能考量\n\n这是我们通常的基线估计执行计划。\n请参考图 13-7。\n\n![](img/527021_1_En_13_Fig7_HTML.png)\n\
    \n`SQLSSMS` 窗口的截图。它展示了一个包含 9 个组件的基线估计执行计划。这些组件分别是窗口假脱机、段、段、计算标量、计算标量、流聚合、排序、竞争标量和索引查找。排序和索引查找的成本分别为\
    \ 77% 和 22%。\n\n**图 13-7** 首尾值基线估计性能计划\n\n看起来这是一个性能不错的查询。没有建议新的索引，并且通过索引查找（成本\
    \ 22%）可以看到正在使用一个现有索引。\n这反映了真实的生产环境，也就是说，随着创建的查询越来越多，会识别出新的索引需求并创建索引，这些索引随后可供未来的查询使用。因此，理论上当你创建新查询时，你不必每次都创建新索引。这至少是我们的目标。\n\
    \n> **注意**\n>\n> 请记住，索引可能会加速查询，但会减慢行插入、更新和删除操作。索引需要为这些操作进行更新，因此索引越多，你看到的性能就越慢。\n\
    \n我差点忘了，那个成本占 77% 的排序任务是需要关注的。这个值很高。设置 `PROFILE STATISTICS ON,` 后，我们看到该任务是按 `AsOfDate`\
    \ 列、一个表达式和 `AsOfMonth` 进行排序。\n结果发现该表达式是用于提取日历季度的 `DATEPART()` 函数。所以这里有一些需要优化的代码。\n\
    \n让我们用一些 `IO` 和 `TIME` 统计信息来完成分析。请参考图 13-8。\n\n![](img/527021_1_En_13_Fig8_HTML.jpg)\n\
    \n`SQLSSMS` 窗口的截图。文本展示了 `IO` 和 `TIME` 统计信息。`SQL` 服务器解析和编译时间的 `CPU` 和耗时分别为 15 和\
    \ 110 毫秒。`SQL` 服务器执行时间的 `CPU` 和耗时分别为 0 和 10 毫秒。影响了 2 个表中的 12 行。\n\n**图 13-8**\
    \ `IO` 和 `TIME` 统计信息\n\n该查询在 10 毫秒内执行完毕，不到一秒（解析时间为 110 毫秒）。我们看到扫描计数值为 13，逻辑读取次数为\
    \ 73，有点高。\n扫描计数、逻辑读取和物理读取的模式是相同的：1-3-2。这很合理。我们使用的是同一个表。\n可能将此查询与我们之前创建的增强版日历表连接，以提取日历季度文本，而不是从日期中提取生成，可能是一个更好的解决方案，但需要考虑表\
    \ `JOIN` 的成本。此策略也将移除用于将季度和月份数值解码为其对应文本值的 `CASE` 代码块。\n\n> **提示**\n>\n> 尽可能避免使用像\
    \ `DATEPART()` 这样的函数，尤其是在 `WHERE` 子句的谓词中。这会影响性能。\n\n不甘落后，我们转到下一个函数。（是的，一个糟糕的双关语。我能想象技术审稿人翻白眼的样子！）\n\
    \n### LAG( ) 函数\n\n回顾一下 `LAG()` 函数的作用：\n此函数用于检索相对于当前行的列值（通常在时间维度内）的前一行的列值，在我们的例子中是库存移动日期。\n\
    这个查询可以帮助回答类似这样的问题：\n当前月份与上个月、上个季度或去年相比如何？\n这是 `LEAD()` 函数的对应函数，我们接下来会看到。以下是我们分析师想要的查询规范：\n\
    我们的业务分析师希望我们修改前一个查询，使其不仅显示当前平均月库存值，还要显示前一个月、前三个月和前 12 个月的平均值（对应同一个月）：\n\n*   1：回退一个月。\n\
    *   3：回退三个月（相对于当前月份的一个季度）。\n*   12：回退 12 个月（相对于当前月份的一年）。\n\n需要相同的日期对象，即明确写出季度和月份名称。并且按相同的产品、地点、库存和仓库进行筛选。报告必须跨越三年：2002、2003\
    \ 和 2004 年。\n复制粘贴我们上一个查询并稍作修改，得到如下查询。注意 `CTE` 没有复制，因为它与前一个示例中的相同。\n请参考代码清单 13-3。\n\
    \n```sql\n/* CTE 在此 */\nSELECT AsOfYear\n      ,AsOfQuarter\n      ,CASE\n   \
    \        WHEN DATEPART(qq,AsOfDate) = 1 THEN '1st Quarter'\n           WHEN DATEPART(qq,AsOfDate)\
    \ = 2 THEN '2nd Quarter'\n           WHEN DATEPART(qq,AsOfDate) = 3 THEN '3rd\
    \ Quarter'\n           WHEN DATEPART(qq,AsOfDate) = 4 THEN '4th Quarter'\n   \
    \    END AS AsOfQtrName\n      ,AsOfMonth\n      ,CASE\n           WHEN AsOfMonth\
    \ = 1 THEN 'Jan'\n           WHEN AsOfMonth = 2 THEN 'Feb'\n           WHEN AsOfMonth\
    \ = 3 THEN 'Mar'\n           WHEN AsOfMonth = 4 THEN 'Apr'\n           WHEN AsOfMonth\
    \ = 5 THEN 'May'\n           WHEN AsOfMonth = 6 THEN 'June'\n           WHEN AsOfMonth\
    \ = 7 THEN 'Jul'\n           WHEN AsOfMonth = 8 THEN 'Aug'\n           WHEN AsOfMonth\
    \ = 9 THEN 'Sep'\n           WHEN AsOfMonth = 10 THEN 'Oct'\n           WHEN AsOfMonth\
    \ = 11 THEN 'Nov'\n           WHEN AsOfMonth = 12 THEN 'Dec'\n       END AS AvgMonthName\n\
    \      ,AsOfDate\n      ,LocId\n      ,InvId\n      ,WhId\n      ,ProdId\n   \
    \   ,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n      ,LAG(AvgQtyOnHand,1,0) OVER (\n\
    \           ORDER BY AsOfDate\n       ) AS PriorMonthAverage\n      ,LAG(AvgQtyOnHand,3,0)\
    \ OVER (\n           ORDER BY AsOfDate\n       ) AS PriorQuarterAverage\n    \
    \  ,LAG(AvgQtyOnHand,12,0) OVER (\n           ORDER BY AsOfDate\n       ) AS PriorYearAverage\n\
    \      ,AvgQtyOnHand -LAG(AvgQtyOnHand,1,0)\n                    OVER (\n    \
    \                     ORDER BY AsOfDate\n                    ) AS Change\n   \
    \   ,AvgQtyOnHand -LAG(AvgQtyOnHand,1,0)\n                    OVER (\n       \
    \                  PARTITION BY AsOfYear\n                         ORDER BY AsOfDate\n\
    \                    ) AS Change\nFROM YearlyWarehouseReport – the CTE\nWHERE\
    \ AsOfYear = 2002\n  AND ProdId = 'P101'\n  AND Locid = 'LOC1'\n  AND InvId =\
    \ 'INV1'\n  AND WhId = 'WH112'\nGO\n```\n**代码清单 13-3** 当前月移动与上个月、季度和年的对比\n\n我们来分析这三个\
    \ `LAG()` 函数。\n首先，没有为年份设置分区，因为我们希望结果跨越数据集中的所有年份。每个分区都有一个 `ORDER BY` 子句，引用了 `AsOfDate`\
    \ 列。唯一的区别是每个 `LAG()` 函数使用不同的参数来指定我们需要回退的时间段：\n\n*   1：回退一个月。\n*   3：回退三个月（相对于当前月份的一个季度）。\n\
    *   12：回退 12 个月（相对于当前月份的一年）。\n\n列名具有误导性，因为它们不代表实际的季度或年份，而是代表回退三个月或 12 个月（好吧，我留给你们来想出更好的名字）。\n\
    参数“0”表示当我们到达边界起点时，需要显示“0”而不是 `NULL` 值。也就是说，没有前一行可以满足 `LAG()` 函数所需的时间跨度。\n最后，对于当前/前一个月的组合，我们包含了一个简单的公式，通过从当前月的平均值中减去\
    \ `LAG()` 函数返回的值来计算变化。\n\n#### 课后作业"
- fmt: 'Modify the query so it also generates the percent change between the current
    month and last month. If you are ambitious, do the same for a quarter and year
    (extra points!). Hint: You can reuse the code that generated the change value
    and modify it, so it returns a percentage. Might also want to add logic to display
    six months back. This would be a powerful report. Check out the estimated performance
    query plan for this.


    Please refer to the partial results in Figure [13-9](#527021_1_En_13_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig9_HTML.png)


    A screenshot of the S Q L S S M S window with a table of 16 columns and 37 rows.
    The column headers are as of year, as of quarter, as of quarter name, as of month,
    average month name, as of date, loc I D, Inv I D, W h I D, prod I D, monthly average,
    prior month, quarter, and year averages, change.


    Figure 13-9


    This month vs. last month, quarter, and year averages


    The arrows indicate that the lag effect is working. Notice all the zero values
    that indicate no prior rows exist to satisfy the earlier time references.


    This is a good report as it allows the analyst to look at historical inventory
    movements and compare them to the current movements. If past movements were indicative
    of sales, that is, lots of movements out of inventory, what conditions were prevalent
    vs. this month’s lower movements? Graphing these is a good visualization of inventory
    movements.


    Based on my comment, let’s generate two types of graphs in a Microsoft Excel spreadsheet
    with this report.


