  trans: '### `ROW_NUMBER( )` 函数


    最后但同样重要的是 `ROW_NUMBER()` 函数。让我们看看我们的业务分析师提出的需求规格是什么样的：


    我们的分析师希望看到一份报告，列出工厂、地点、年份、季度和月份，并按它们所属的“桶”进行排序，例如“严重故障”桶。当然，每个月的设备故障数量也需要出现在报告中。


    由于每个桶包含一个或多个月份的数据，分析师希望看到报告事件的编号——不是月份编号，而是桶内的序列号或槽位号，如果你愿意这么称呼的话。


    最后，报告需要覆盖三年：2008、2009 和 2010 年。


    我们将在分区定义中使用一个小技巧。以下是我们想出的方案。


    请参考清单 9-10。


    ```sql

    WITH FailedEquipmentCount

    AS (

    SELECT PlantName, LocationName, CalendarYear, QuarterName, [MonthName],

    CalendarMonth, SumEquipmentFailure,

    NTILE(5)  OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipmentFailure

    ) AS MonthBucket

    FROM [Reports].[EquipmentFailureStatistics]

    )

    SELECT PlantName,LocationName,CalendarYear,QuarterName,[MonthName]

    ,CASE

    WHEN MonthBucket = 5 AND SumEquipmentFailure  0

    THEN ''严重故障''

    WHEN MonthBucket = 4 AND SumEquipmentFailure  0

    THEN ''关键故障''

    WHEN MonthBucket = 3 AND SumEquipmentFailure  0

    THEN ''中等故障''

    WHEN MonthBucket = 2 AND SumEquipmentFailure  0

    THEN ''需调查故障''

    WHEN MonthBucket = 1  AND SumEquipmentFailure  0

    THEN ''维护故障''

    WHEN MonthBucket = 1  AND SumEquipmentFailure = 0

    THEN ''无问题需报告''

    ELSE ''无警报''

    END AS StatusBucket

    ,ROW_NUMBER()  OVER (

    PARTITION BY (

    CASE

    WHEN MonthBucket = 5 AND SumEquipmentFailure  0

    THEN ''严重故障''

    WHEN MonthBucket = 4 AND SumEquipmentFailure  0

    THEN ''关键故障''

    WHEN MonthBucket = 3 AND SumEquipmentFailure  0

    THEN ''中等故障''

    WHEN MonthBucket = 2 AND SumEquipmentFailure  0

    THEN ''需调查故障''

    WHEN MonthBucket = 1  AND SumEquipmentFailure  0

    THEN ''维护故障''

    WHEN MonthBucket = 1  AND SumEquipmentFailure = 0

    THEN ''无问题需报告''

    ELSE ''无警报''

    END

    )

    ORDER BY SumEquipmentFailure

    ) AS BucketEventNumber

    ,SumEquipmentFailure AS EquipmentFailures

    FROM FailedEquipmentCount

    WHERE CalendarYear IN (2008,2009,2010)

    GO

    ```


    清单 9-10

    包含桶槽位号的故障事件桶


    技巧在于在 `PARTITION BY` 子句中使用了 `CASE` 语句块，而非列名。这展示了指定分区的多种方式之一。这是一个值得牢记的巧妙小技巧。


    请参考图 9-26 中的部分结果。


    ![](img/527021_1_En_9_Fig26_HTML.png)


    截图顶部显示代码，底部显示表格。表格的列名依次为：工厂名称、地点名称、日历年份、季度名称、月份名称、状态桶、桶事件编号和设备故障数。其中十二月和十一月的条目被高亮显示。


    图 9-26

    包含桶槽位号的故障事件桶报告


    好的，它有效。可能不是一个非常有价值的报告，但我想展示指定 `PARTITION BY` 子句的一种变体。


    另一方面，这些结果可以用来创建一个漂亮的数据透视表。让我们将结果复制粘贴到 Microsoft Excel 电子表格中，并创建数据透视表。


    请参考图 9-27 中的部分结果。


    ![](img/527021_1_En_9_Fig27_HTML.jpg)


    Excel 工作表的截图。窗口顶部显示菜单栏，随后是工具栏。主页面左侧显示行标签和故障总和，右侧显示数据透视表。


    图 9-27

    故障事件桶数据透视表


    通过将列名拖放到“筛选器”、“列”、“行”或“值”列表框中，你可以对数据进行强大的切片和切块操作，并在总计的层次结构中上下穿梭。筛选器非常方便，因为你可以一次专注于部分数据。这里我们查看的是
    2008 年、北厂和锅炉房位置的结果。


    你还可以用相同的数据创建数据透视图。


    请参考图 9-28 中的部分结果。


    ![](img/527021_1_En_9_Fig28_HTML.jpg)


    Excel 工作表的截图。窗口顶部显示菜单栏，随后是工具栏。主页面左侧显示行标签和故障总和，右侧显示柱形图。柱形图展示了锅炉房、熔炉房和发电机房的故障值。


    图 9-28

    故障事件桶数据透视图


    报告输出、数据透视表和数据透视图提供了一套强大的工具，用于进行分析并理解我们这个小型电厂场景中正在发生的情况。我强烈建议你运行这些查询，将结果复制到 Microsoft
    Excel，并生成图表和数据透视表。这是一套强大的工具，将提升你的职业生涯，帮助你创建强大的报告，并帮助你解决性能问题。'
- fmt: '### Performance Considerations


    This query was slightly different from the other queries in that we used two `CASE`
    blocks and used the `IN()` clause to specify some filters for the years we wanted
    to include in the results. Let’s create our baseline estimated query plan to see
    if there is anything out of the ordinary.


    Please refer to Figure [9-29](#527021_1_En_9_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig29_HTML.png)


    A screenshot presents the codes in the upper half of the window and the execution
    plan in the lower of the window. The arrows point towards sort cost at 12 percent
    and 37 percent, filter cost at 2 percent, nested loops at 24 percent, and table
    spool at 3 percent, and table scan at 17 percent.


    Figure 9-29


    Baseline estimated query plan


    Starting from the right side to the left side in the plan, we see one table scan
    at a cost of 17%. Since this is a small table, about 2,000 rows, we should not
    be concerned. Next, we see three table spools, two with costs of 0% and one with
    a cost of 3%. A couple of nested loops joins merge the rows from the branches.
    The first one is at a cost of 0%, but the second one is fairly high, chiming in
    at 24%. The rest of the flow includes a filter task (for the years) and a sort
    step at 12%.


    Since we are not dealing with large volumes of data, I think we can let things
    stand. Let’s look at the `IO` and `TIME` statistics followed by the `STATISTICS
    PROFILE` so we have a complete picture of the performance steps.


    Please refer to Figure [9-30](#527021_1_En_9_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig30_HTML.png)


    A screenshot of the s q l work area. The upper half of the window represents the
    codes, and the lower half of the window represents the messages. The arrows indicate
    that the scan count is equal to 3 and the logical read is equal to 4177 and 22.


    Figure 9-30


    IO and TIME statistics


    Looking at these statistics, we see the work table is getting a lot of action,
    a scan count of 3 and logical reads at 4,177. The report table has a scan count
    of 1 and 22 logical reads. Lastly, the SQL Server execution elapsed time is 305
    ms, so under 1 s to return 306 rows.


    Next are the `STATISTICS PROFILE` results.


    Please refer to Figure [9-31](#527021_1_En_9_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig31_HTML.png)


    A screenshot of the s q l work area. The upper half of the window presents the
    codes for different failures, and the lower half of the window represents the
    table. The inboxed region depicts the entries when the row equals 288, execute
    equals 1, and when the row and execute equals 0.


    Figure 9-31


    Profile statistics report


    Pretty low values except for two `EstimateCPU` values. The first two are for the
    `CASE` blocks at 2.88E-05. Then we have a value of 4.042E-05 for a segment task,
    which includes the `GROUP BY` logic processing.


    In conclusion, this was a query that had a few interesting steps, but the row
    count that needed to be processed was low, so there is no need for performance
    tuning.


    ## Summary


    This wraps up the chapter. We covered our usual application of the ranking functions
    and did our performance analysis using the techniques and tools from prior chapters.
    We also were able to leverage the data in some reports to create some interesting
    graphs and also pivot tables. I hope you found the power plant scenario interesting
    and will try out the code examples.


    One final word: If you are or aspire to become a data architect that oversees
    multiple developers, you need to keep track of the proliferation of report tables.
    You do not want duplicates and missed opportunities for code and table sharing!


    Good peer review sessions will ensure the team is aligned and up to date as to
    what is available to use in each of the individual development efforts. You do
    not need to reinvent the wheel and keep adding more and more report tables and
    indexes.


    This applies to memory-enhanced tables; there are just so many you can create
    before you run out of memory!


    # 10. Plant Use Case: Analytical Functions


    ## Analytical Functions


    We are going to add a couple of new tools to our toolkit in this chapter. We will
    take a quick look at `Report Builder` and also `Analysis Services`’ multidimensional
    cubes.


    `Report Builder` allows you to connect to your databases and create sophisticated
    web reports via `SQL Server Reporting Services`. This way, your business analysts
    can go right to a website and examine the reports they need.


    `Analysis Services` is a powerful platform that is a part of the `SQL Server`
    BI stack and allows you to build multidimensional cubes based on data stored in
    a data warehouse, like the `APPlant` data warehouse we have been working with.


    Let’s continue with our usual analysis by applying the window functions belonging
    to this category against our data warehouse before we look at `Report Builder`
    and `SSAS` cubes.


    As a reminder, the following are the eight functions for the analytical function
    category sorted by name. Recall that they can be used in queries together with
    the `OVER()` clause to generate valuable reports for our business analysts.


    They should be familiar to you, if you already read Chapter [3](#527021_1_En_3_Chapter.xhtml)
    and/or 7. If not, take the time to read what they do:


    *   `CUME_DIST()`: `Does not` support the window frame specifications


    *   `FIRST_VALUE()` and `LAST_VALUE()`: `Do` support the window frame specifications


    *   `LAG()` and `LEAD()`: `Do not` support the window frame specifications


    *   `PERCENT_RANK()`: `Does not` support the window frame specifications


    *   `PERCENTILE_CONT()`: `Does not` support the window frame specifications


    *   `PERCENTILE_DISC()`: `Does not` support the window frame specifications


    The same approach as the prior chapter will be taken. The `FIRST_VALUE()` and
    `LAST_VALUE()` functions will be discussed together.


    I describe what the function does, review the specifications supplied by our business
    analyst, and then present the code and the results that hopefully satisfy the
    business requirements. Feel free to bypass the descriptions if you already read
    them in Chapters [3](#527021_1_En_3_Chapter.xhtml) and [7](#527021_1_En_7_Chapter.xhtml)
    (by now you know how the functions work, but the application is to a new business
    scenario).


    Next, our usual performance analysis is performed so we can see what improvements,
    if any, are required. We now have several performance-enhancing tricks we can
    try out in case our original queries are too slow:


    *   Add indexes.


    *   Add denormalized report tables.


    *   Create the supporting table as a memory-enhanced table.


    *   Modify the query.


    As we saw in the prior chapters, improvements can usually be achieved by adding
    indexes or even creating a denormalized report table so that when the query using
    the analytical window functions is executed, it goes against preloaded data avoiding
    joins, calculations, and complex logic. When all else fails, try making the supporting
    table in a query a memory-enhanced table.


    One last comment: In this group of analytical functions, you can only specify
    the `ROWS` and `RANGE` window frame specifications for the `FIRST_VALUE()` and
    `LAST_VALUE()` functions. The other functions do not support the window frame
    specifications. There will be a pop quiz later in the chapter, so don’t forget.'
