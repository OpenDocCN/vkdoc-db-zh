  trans: '### CUME_DIST() 函数


    回顾第 7 章，此函数用于计算一个值在诸如表、分区或加载了测试数据的表变量等数据集中的相对位置。它计算一个随机值（如故障率）小于或等于某设备特定故障率的概率。它是累积的，因为在计算特定值的分布时，它会考虑所有值。


    如果你对此仍不太确定，请返回第 7 章或附录 A，复习此函数的工作原理和应用方式。


    以下是我们业务分析师朋友提供的业务需求说明：


    我们的分析师希望我们计算东厂故障总数的累积分布，特别是针对 2002 年锅炉房的情况。报告需要按计算出的累积分布值升序排序。


    此外，报告中需要包含工厂名称、位置、年份、日历季度和月份名称。


    最后，使用结果在 Microsoft Excel 中绘制折线图，以显示按月变化的故障趋势，同时包含相应的累积分布值。


    **注意**


    绘制累积分布值的图表没有意义，因为它们会线性上升或下降，但以条形图或折线图等形式展示故障数据则有意义。


    这是一个相当简单的查询，让我们来看一下。请参考代码清单 10-1。


    ```sql

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, MonthName, CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName, LocationName, CalendarYear, QuarterName,

    MonthName, CalendarMonth

    ,SumEquipFailures

    ,FORMAT(CUME_DIST() OVER (

    ORDER BY SumEquipFailures

    ),''P'') AS CumeDist

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2002

    AND LocationName = ''Boiler Room''

    AND PlantName = ''East Plant''

    GO

    ```


    **代码清单 10-1**

    故障累积分布报告


    注意，我使用了 `FORMAT()` 函数，因此结果以百分比形式打印，而不是介于 0 和 1 之间的值（这样对我而言也更直观）。`OVER()` 子句仅包含一个
    `ORDER BY` 子句，该子句按升序排列设备故障总数。


    **随堂测验**


    你还记得当 `OVER()` 子句仅包含 `ORDER BY` 子句时，`PARTITION BY` 的默认行为是什么吗？此函数是否允许在 `OVER()`
    子句中使用窗口规范？答案在本节末尾。


    如果你想包含更多的电厂、位置和年份，请按如下方式修改 `OVER()` 子句：


    ```sql

    ,FORMAT(CUME_DIST() OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth,SumEquipFailures

    ),''P'') AS CumeDist

    ```


    请确保移除 `WHERE` 子句以获取所有结果。


    图 10-1 展示了两个查询的部分结果。


    ![](img/527021_1_En_10_Fig1_HTML.jpg)


    SQL Server Management Studio (SSMS) 窗口截图。它包含两个表，各有 9 列，行数分别为 12 和 1517。列标题为：工厂名称、位置名称、日历年份、季度名称、月份名称、日历月份、设备故障总和、累积分布。累积分布被突出显示。


    **图 10-1**

    故障累积分布报告


    我在红色框中高亮显示了两个查询的第一年结果，以便你可以看到修改后的分区工作正常。


    那么，你该如何解读这些结果呢？


    查看 2002 年 3 月的值，即东厂锅炉房，我们可以将该值解释为：分区中 91.67% 的值将小于或等于 13 次故障。就这么简单！


    接下来，让我们创建我们的分析师要求的 Microsoft Excel 电子表格。请参考图 10-2。


    ![](img/527021_1_En_10_Fig2_HTML.png)


    Microsoft Excel 窗口主页截图。它包含一个 5 列 12 行的表格。列标题为：季度、月份、月份编号、故障数、累积分布。它还有一个双 Y 轴的条形-折线组合图，展示了故障数和累积分布值随月份的波动趋势。


    **图 10-2**

    2002 年东厂锅炉房故障趋势


    经过一些格式调整后，我们得到了一份漂亮的报告，其中包含一个显示 2002 年 12 个月故障率的表格。图表显示，随着年份的推进，故障呈下降趋势，其中 4 月份的故障数最高。累积分布值打印在每个月故障数的旁边，这在解释图表时非常有用。


    为了生成此报告，我需要按月份编号对数据表进行排序。如果你不想看到这些数字，只想看到月份名称，可以隐藏该列。


    为了让你体验一下名为 Report Builder 的 Web 报告工具（Microsoft 免费提供），图 10-3 是我们刚刚用查询生成的数据（省略了
    `WHERE` 子句，以便我们可以在报告中筛选位置），它在一个简单的 Report Builder 报告中，并使用了筛选器来显示南厂的情况。


    ![](img/527021_1_En_10_Fig3_HTML.png)


    SQL Report Builder 窗口截图，已选择“运行”选项。它呈现了 2002 年南厂发电机房按 4 个季度划分的累积分布故障数据。显示了从一月到十二月所有月份的值。


    **图 10-3**

    Report Builder 报告


    这是该工具创建的报告预览。在下一章中，我将更详细地介绍如何实际创建报告并将其发布到 SSRS（SQL Server Reporting Services）网站。现在，只需知道这是可以添加到你工具包中的另一个重要工具。


    以下是我将报告发布到笔记本电脑上的 Microsoft Reporting Services 网站后的样子。注意，我们筛选了北厂的位置。请参考图 10-4。


    ![](img/527021_1_En_10_Fig4_HTML.jpg)


    SQL Server Reporting Services 窗口截图。它呈现了 2002 年北厂熔炉房按 4 个季度划分的累积分布故障数据。显示了从一月到十二月所有月份的值。


    **图 10-4**

    发布在 Reporting Services 上的报告


    Reporting Services，昵称 SSRS，是一个完整的 Web 服务器平台，允许你将复杂的报告和仪表板创建并发布到网站上。这是一个强大的工具，可以让业务用户和分析师快速访问他们所需的报告。


    好消息是，你可以将其安装在你的笔记本电脑或工作站上，以便对你的报告进行原型设计！


    回到示例报告，注意它有三个下拉列表框，因此你可以查看任何工厂、任何位置和任何年份的报告。更多内容将在后面介绍！'
- fmt: '### Performance Considerations


    Let''s create our usual baseline estimated query plan to see how well this query
    runs (or not).


    This is split into three parts as it is a large, estimated query plan. Please
    refer to Figure [10-5a](#527021_1_En_10_Chapter.xhtml#Fig5) for the first part.


    ![Figure 10-5a: Plant failure cumulative distribution query plan, first part](images/527021_1_En_10_Chapter/527021_1_En_10_Fig5_HTML.png)


    A screenshot of SQL, SSMS window. It presents part 1 of the estimated query plan
    with 11 components. The components are sort, hash match, table scan, hash match,
    compute scalar, table scan, hash match, hash match, clustered index, table scan,
    and table scan. 6 arrows point to 4 types of costs.


    This looks like a very busy plan. Reading from right to left and starting at the
    bottom, we see two table scans for the `Plant` and `Location` tables, each with
    a cost of 2%. These could be candidates for memory-enhanced tables or maybe some
    denormalization by creating a `Plantlocation` table that combines the two tables.


    Next is a clustered index scan against the equipment failure report table followed
    by two hash match tasks with costs of 22% and 14%.


    Moving up to the middle branch, we see a table scan against the `Calendar` table
    with a cost of 14% and a small compute scalar task at 2% flowing into the hash
    match tasks that combine these two streams. The last task in this portion of the
    plan is a sort task with a cost of 7%.


    So we see a lot of activity and opportunities for performance improvement. Maybe
    take the time to download the script and examine the query plan as we discuss
    it. Make sure you place the mouse pointer over each task to see the pop-up panel
    that gives you details related to what each task does.


    Let''s move to the middle part of the estimated query plan. Please refer to Figure
    [10-5b](#527021_1_En_10_Chapter.xhtml#Fig6).


    ![Figure 10-5b: Middle section of the estimated query plan](images/527021_1_En_10_Chapter/527021_1_En_10_Fig6_HTML.png)


    A screenshot of SQL, SSMS window presents part 2 of estimated query plan with
    12 components such as segment, segment, nested loops, table spool, segment, sort
    cost 6%, stream aggregate, sort cost 7%, nested loops, stream aggregate, table
    spool, and table spool.


    There''s the sort task at 7% cost as a frame of reference with the prior section
    we just discussed.


    Lots of tasks but all at zero cost except for a second sort step, which costs
    6%. Notice the thickness of the lines as the data flows move along right to left.
    This indicates how much data is passing through. The thinner the line, the smaller
    the number of rows.


    Typically, the lines will get thinner as you go, but when branches merge, they
    could get thicker as more rows pass through.


    Last but not least is the remaining part of the estimated execution plan. Please
    refer to Figure [10-5c](#527021_1_En_10_Chapter.xhtml#Fig7).


    ![Figure 10-5c: Remaining section of the estimated query plan](images/527021_1_En_10_Chapter/527021_1_En_10_Fig7_HTML.png)


    A screenshot of SQL, SSMS window presents part 3 of estimated query plan with
    14 components of select, 2 compute scalar, stream aggregate, window spool, segment,
    segment, nested loops, table spool, segment, sort, nested loops, stream aggregate,
    and table spool. An arrow points to sort cost 6%.


    Notice the sort task with the 6% cost as a frame of reference from the prior section
    we just examined. This portion of the plan is also busy, but all the costs are
    0%, so we will leave well enough alone. Just notice the `window spool` task at
    0%. Usually, 0% cost means the `window spool` is performed in memory, so that''s
    a good thing.


    This task is required so the data being processed can be referenced multiple times.


    ### IO and TIME Statistics Analysis


    Let''s look at the `IO` and `TIME` statistics next to get a better sense of what
    is going on performance-wise.


    Please refer to Figure [10-6](#527021_1_En_10_Chapter.xhtml#Fig8).


    ![Figure 10-6: Cumulative distribution failures – IO and TIME statistics](images/527021_1_En_10_Chapter/527021_1_En_10_Fig8_HTML.png)


    A screenshot of the SQL, SSMS window. The text presents IO and TIME statistics.
    The SQL server parse and compile times for CPU and elapsed are 0 and 0 milliseconds.
    The SQL server execution times for CPU and elapsed are 0 and 129 milliseconds.
    12 rows of, 7 table columns are affected.


    First things first, SQL Server execution elapsed time is 129 ms, under 1 s, so
    we are okay here. We do see a scan count of 16 and 102 logical reads for the work
    table. The work file has zero values, so we will not worry about this set of statistics.


    The `EquipmentFailure` table has 24 logical reads, 1 physical read- and 29 read
    ahead reads, so clearly something is going on here.


    All the dimension tables except for the `Calendar` table have low values. The
    `Calendar` dimension table has 24 logical reads and 24 read-ahead reads.


    ### Conclusion and Recommendations


    So what is our conclusion? I would recommend you try to load the `Calendar` table
    into memory by recreating it as a memory-enhanced table and also replace the `CTE`
    with a report table as the results are historical, so we want to minimize the
    impact of generating this base data.


    Also try to create a denormalized table that combines plant and location information
    and create the table as a memory-enhanced table.


    ### Pop Quiz Answer


    Here is the answer to the pop quiz:


    The default behavior for an `OVER()` clause without a `PARTITION BY` clause is


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    But, for the `CUME_DIST()` function, you cannot insert a window frame specification
    in the `OVER()` clause. This was a trick question.


    ### Homework


    Here is some homework:


    Attempt the preceding recommendation on your own. Make sure you create memory-enhanced
    tables with different names, like `CalendarMEM`. Also, run some extensive query
    plan and `IO/TIME` statistics analysis between both methods to see if the results
    match. Remember to drop the memory-enhanced tables when you are finished with
    them.'
