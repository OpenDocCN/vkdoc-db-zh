- fmt: '### COUNT()、SUM()、MAX()、MIN() 和 AVG() 函数


    我们之前见过这些函数，它们的名称暗示了其功能，因此这里不再逐一描述。现在，让我们看看业务分析师提供的第一组业务需求：


    业务分析师希望我们创建一个库存移动概况报告，该报告需展示库存水平小于 50 个单位的产品的数量、最小值和最大值，以及总量和平均值。此外，数据范围需涵盖所有年份，且位置为“LOC1”、库存为“INV1”、产品为“P033”。


    所有结果都需要按月滚动计算，但 `SUM()` 结果除外，它只需计算当前月份的总计加上上个月的结转总计。


    解决方案请参考代码清单 [11-3](#527021_1_En_11_Chapter.xhtml#PC3)。


    ```sql

    WITH InventoryMovement (

    LocId, InvId, WhId, ProdId, AsOfYear, AsOfMonth, AsOfDate, InvOut, InvIn, Change,
    QtyOnHand

    )

    AS(

    SELECT LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    ,AsOfDate

    ,InvOut

    ,InvIn

    ,(InvIn - InvOut) AS Change

    ,(InvIn - InvOut) + LAG(QtyOnHand,1,0) OVER (

    PARTITION BY LocId,InvId,WhId,ProdId

    ORDER BY [AsOfDate]

    )AS QtyOnHand -- 05/31/2022

    FROM APInventory.Product.WarehouseMonthly

    )

    SELECT LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    ,AsOfDate

    ,InvOut

    ,InvIn

    ,Change

    ,QtyOnHand

    ,COUNT(*) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS WarehouseLT50

    ,MIN(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS MinMonthlyQty

    ,MAX(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS MaxMonthlyQty

    ,SUM(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    --ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ) AS Rolling2MonthlyQty

    ,AVG(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AvgMonthlyQty

    FROM InventoryMovement

    WHERE QtyOnHand <= 50

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND ProdId =''P033''

    ORDER BY LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    GO

    ```

    代码清单 11-3

    库存水平概况报告


    如代码所示，我们按年份设置分区，因为我们并没有将结果过滤为仅一年。


    我为所有聚合函数都包含了 `ROWS` 窗口框架子句，以生成滚动月份的效果：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    对于 `SUM()` 聚合函数，我使用了以下窗口框架子句，以便月度总和能结转上月的总计：


    ```sql

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ```


    回想一下，这意味着聚合函数将作用于当前行和所有之前的行，从而为 `COUNT()`、`MAX()`、`MIN()` 和 `AVG()` 函数产生“滚动”效果。如前所述，`SUM()`
    函数“滚动”两个月。


    `ORDER BY` 子句按库存 ID 和月份对分区进行排序。如果想包含不止一年的数据，我们需要在这里和 `PARTITION BY` 子句中包含年份。


    现在来看 `WHERE` 子句。由于我们正在过滤一个库存位置的结果，我们其实不需要特别指出库存 ID。可以尝试运行此查询，生成一个估计的查询计划，然后从 `OVER()`
    子句中移除库存 ID，再生成第二个估计的查询计划。看看它们是否发生了变化。


    最后，我们看到了 `WHERE` 子句，如果想将所有位置、库存和仓库都包含在结果中，可以轻松地更改它。可以创建一个 SQL Server Reporting
    Services（`SSRS`）报告，为这些维度提供筛选器，以便业务分析师可以选择他们想要的数据。


    部分结果请参考图 [11-16](#527021_1_En_11_Chapter.xhtml#Fig16)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig16_HTML.png)


    主页面上的一个窗口截图代表一个表格。表格的列描绘了库存的详细信息。一个箭头指向一个名为“滚动到月度数量”的列。


    图 11-16


    库存水平概况报告


    看起来不错。所有的滚动月份值都加总无误。由于这是一个按月滚动的过程，而我们只查看一种产品，因此库存中少于或等于 50 件的仓库物品会随着月份推移逐月增加。当前月份和上个月的库存数量总和是递增加总的，所以符合要求。


    检查几行数据并进行简单的数学计算是一种有效的验证方式。你甚至可以将结果复制粘贴到 Microsoft Excel 电子表格中进行验证。最大和最小水平看起来也是正确的。


    请记住，我们开始时是正的库存水平，因此增量和减量的总和并不一定反映库存数量。换句话说，库存数量是在原始水平的基础上，加上进入库存的物品数量，再减去离开库存的物品数量后剩下的部分。'
  raw: '### COUNT( ), SUM( ), MAX( ), MIN( ), and AVG( ) Functions


    We saw these before and the names imply what they do, so I will not include a
    description of each function at this time. Let’s check out our first set of business
    specifications supplied by our business analyst:


    Our business analyst wants us to create an inventory movement profile report,
    that is, a report that shows the count, minimum, and maximum of quantities plus
    the totals and averages for product inventory levels less than 50 units. Additionally,
    the information has to be for all years, for location “LOC1,” for inventory “INV1”,
    and for product “P033”.


    All results need to be rolling results by month with the exception of the `SUM()`
    results, which only need to take into account the current month total plus the
    carry-over total from last month.


    Please refer to Listing [11-3](#527021_1_En_11_Chapter.xhtml#PC3) for our solution.


    ```

    WITH InventoryMovement (

    LocId, InvId, WhId, ProdId, AsOfYear, AsOfMonth, AsOfDate, InvOut, InvIn, Change,
    QtyOnHand

    )

    AS(

    SELECT LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    ,AsOfDate

    ,InvOut

    ,InvIn

    ,(InvIn - InvOut) AS Change

    ,(InvIn - InvOut) + LAG(QtyOnHand,1,0) OVER (

    PARTITION BY LocId,InvId,WhId,ProdId

    ORDER BY [AsOfDate]

    )AS QtyOnHand -- 05/31/2022

    FROM APInventory.Product.WarehouseMonthly

    )

    SELECT LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    ,AsOfDate

    ,InvOut

    ,InvIn

    ,Change

    ,QtyOnHand

    ,COUNT(*) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS WarehouseLT50

    ,MIN(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS MinMonthlyQty

    ,MAX(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS MaxMonthlyQty

    ,SUM(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    --ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ) AS Rolling2MonthlyQty

    ,AVG(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AvgMonthlyQty

    FROM InventoryMovement

    WHERE QtyOnHand <= 50

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND ProdId =''P033''

    ORDER BY LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    GO

    Listing 11-3

    Inventory Level Profile Report

    ```


    As can be seen, we are setting up partitions by year as we are not filtering the
    results for one year only.


    I did include a `ROWS` window frame clause for all aggregate functions to generate
    the rolling month effect:


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    For the `SUM()` aggregate function, I used the following window frame clause so
    the monthly sum carries over the prior monthly total:


    ```

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ```


    Recall this means that the aggregate function will work on the current row and
    all previous rows to produce the “rolling” effect for the `COUNT()`, `MAX()`,
    `MIN()``,` and `AVG()` functions. As mentioned earlier the `SUM()` function “rolls”
    for two months.


    The `ORDER BY` clause orders the partition by inventory ID and month. If we want
    to include more than one year, we will have to include the year here and in the
    `PARTITION BY` clause.


    Now for the `WHERE` clause. As we are filtering results for one inventory location,
    we do not really need to call out the inventory ID. Try this query out by running
    it as is, generating an estimated query plan, and then take out the inventory
    ID from the `OVER()` clause and generate a second estimated query plan. See if
    they change or if they are the same.


    Lastly, we see the `WHERE` clause that can easily be changed if we want to include
    all locations, inventories, and warehouses in the result. A SQL Server Reporting
    Services (`SSRS`) report can be created that provides filters for these dimensions
    so the business analyst can pick and choose what they want.


    Please refer to the partial results in Figure [11-16](#527021_1_En_11_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig16_HTML.png)


    A screenshot of the window represents a table on the main page. The columns of
    the table depict the details of the inventories. An arrow points toward a column
    titled Rolling to monthly quantity.


    Figure 11-16


    Inventory level profile report


    Looks good. The rolling month values all add up. Since it is a monthly rolling
    process, warehouse items less than or equal to 50 on hand increase by one as the
    months proceed as we are only looking at one product. The sum of quantities on
    hand adds up incrementally for the current month and prior month, so that works.


    Check out a few rows and do the math as a simple form of validation. You can even
    copy and paste the results in a Microsoft Excel spreadsheet and perform the validation
    there. The max and min levels also look correct.


    Keep in mind that we started off with positive inventory levels, so the sum of
    increments and decrements does not necessarily reflect the quantity on hand. In
    other words, quantity on hand is what is left after you add the original levels
    to the number of items coming into inventory and subtract the number of items
    going out.'
  trans: '

    ### COUNT()、SUM()、MAX()、MIN() 和 AVG() 函数


    我们之前见过这些函数，它们的名称暗示了其功能，因此这里不再逐一描述。现在，让我们看看业务分析师提供的第一组业务需求：


    业务分析师希望我们创建一个库存移动概况报告，该报告需展示库存水平小于 50 个单位的产品的数量、最小值和最大值，以及总量和平均值。此外，数据范围需涵盖所有年份，且位置为“LOC1”、库存为“INV1”、产品为“P033”。


    所有结果都需要按月滚动计算，但 `SUM()` 结果除外，它只需计算当前月份的总计加上上个月的结转总计。


    解决方案请参考代码清单 11-3。


    ```sql

    WITH InventoryMovement (

    LocId, InvId, WhId, ProdId, AsOfYear, AsOfMonth, AsOfDate, InvOut, InvIn, Change,
    QtyOnHand

    )

    AS(

    SELECT LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    ,AsOfDate

    ,InvOut

    ,InvIn

    ,(InvIn - InvOut) AS Change

    ,(InvIn - InvOut) + LAG(QtyOnHand,1,0) OVER (

    PARTITION BY LocId,InvId,WhId,ProdId

    ORDER BY [AsOfDate]

    )AS QtyOnHand -- 05/31/2022

    FROM APInventory.Product.WarehouseMonthly

    )

    SELECT LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    ,AsOfDate

    ,InvOut

    ,InvIn

    ,Change

    ,QtyOnHand

    ,COUNT(*) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS WarehouseLT50

    ,MIN(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS MinMonthlyQty

    ,MAX(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS MaxMonthlyQty

    ,SUM(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    --ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ) AS Rolling2MonthlyQty

    ,AVG(QtyOnHand) OVER (

    PARTITION BY AsOfYear,LocId,InvId,WhId,ProdId

    ORDER BY LocId,InvId,WhId,AsOfMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AvgMonthlyQty

    FROM InventoryMovement

    WHERE QtyOnHand <= 50

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND ProdId =''P033''

    ORDER BY LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AsOfYear

    ,AsOfMonth

    GO

    ```

    代码清单 11-3

    库存水平概况报告


    如代码所示，我们按年份设置分区，因为我们并没有将结果过滤为仅一年。


    我为所有聚合函数都包含了 `ROWS` 窗口框架子句，以生成滚动月份的效果：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    对于 `SUM()` 聚合函数，我使用了以下窗口框架子句，以便月度总和能结转上月的总计：


    ```sql

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ```


    回想一下，这意味着聚合函数将作用于当前行和所有之前的行，从而为 `COUNT()`、`MAX()`、`MIN()` 和 `AVG()` 函数产生“滚动”效果。如前所述，`SUM()`
    函数“滚动”两个月。


    `ORDER BY` 子句按库存 ID 和月份对分区进行排序。如果想包含不止一年的数据，我们需要在这里和 `PARTITION BY` 子句中包含年份。


    现在来看 `WHERE` 子句。由于我们正在过滤一个库存位置的结果，我们其实不需要特别指出库存 ID。可以尝试运行此查询，生成一个估计的查询计划，然后从 `OVER()`
    子句中移除库存 ID，再生成第二个估计的查询计划。看看它们是否发生了变化。


    最后，我们看到了 `WHERE` 子句，如果想将所有位置、库存和仓库都包含在结果中，可以轻松地更改它。可以创建一个 SQL Server Reporting
    Services（`SSRS`）报告，为这些维度提供筛选器，以便业务分析师可以选择他们想要的数据。


    部分结果请参考图 11-16。


    ![](img/527021_1_En_11_Fig16_HTML.png)


    主页面上的一个窗口截图代表一个表格。表格的列描绘了库存的详细信息。一个箭头指向一个名为“滚动到月度数量”的列。


    图 11-16


    库存水平概况报告


    看起来不错。所有的滚动月份值都加总无误。由于这是一个按月滚动的过程，而我们只查看一种产品，因此库存中少于或等于 50 件的仓库物品会随着月份推移逐月增加。当前月份和上个月的库存数量总和是递增加总的，所以符合要求。


    检查几行数据并进行简单的数学计算是一种有效的验证方式。你甚至可以将结果复制粘贴到 Microsoft Excel 电子表格中进行验证。最大和最小水平看起来也是正确的。


    请记住，我们开始时是正的库存水平，因此增量和减量的总和并不一定反映库存数量。换句话说，库存数量是在原始水平的基础上，加上进入库存的物品数量，再减去离开库存的物品数量后剩下的部分。

