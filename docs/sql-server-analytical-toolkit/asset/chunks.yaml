- fmt: '## Performance Considerations


    Let’s generate an estimated execution plan, which is created in the usual manner.
    (Remember, there are a few ways to create it.) This time there are two plans,
    one for the query that loads the variable and then one for the query that uses
    the `NTILE()` function.


    Please refer to Figure [4-10](#527021_1_En_4_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig10_HTML.jpg)


    A screenshot of a window presents a tab with 2 flow diagrams of estimated execution
    plans for queries 1 and 2 with query costs at 34% and 66%.


    Figure 4-10

    Estimated execution plans for the NTILE() example


    Looking at the first execution plan for the query that sets the `@NumTiles` variable,
    we get the sense that it is expensive. We see (going right to left) the table
    scan task at a cost of 30% and a very expensive sort step at 70%. The rest of
    the steps cost 0%, so we will not worry about them.


    An index was not suggested, but I wonder if an index created on the column used
    in the sort step would help. The answer is no. In this case the table has only
    400 rows, so indexes would not help or be used. The only alternative is to sort
    it when it is loaded or pop the table into memory. That is, create it as a memory-optimized
    table.


    Let’s look at the second plan. No indexes were suggested, and we see a table scan,
    two sort tasks and some table spools, and two nested loops joins. Nothing to do
    here.


    As I stated earlier, the table has only 400 rows, so let’s leave well enough alone.
    Might as well look at some statistics though for the sake of a complete analysis
    exercise.


    Please refer to Table [4-3](#527021_1_En_4_Chapter.xhtml#Tab3).


    Table 4-3

    Query IO and Time Statistics


    | SQL Server Parse and Compile Times | First Query | Second Query |

    | --- | --- | --- |

    | CPU time (ms) | 0 | 16 |

    | Elapsed time (ms) | 43 | 41 |

    | `Statistics (Work table)` | `First Query` | `Second Query` |

    | Scan count | 0 | 3 |

    | Logical reads | 0 | 657 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | `Statistics (CustomerPaymentHistory)` | `First Query` | `Second Query` |

    | Scan count | 1 | 1 |

    | Logical reads | 5 | 5 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | `SQL Server Execution Times` | `First Query` | `Second Query` |

    | CPU time (ms) | 16 | 0 |

    | Elapsed time (ms) | 41 | 78 |


    Also, nothing to worry about here. The second query has 657 logical reads, which
    means it went to memory cache to retrieve data it needed 657 times, but that’s
    not a significant value.


    As I stated earlier, when you have a query that works on a small volume of data
    and the query executes under one second, move on to more troublesome queries (choose
    your battles).


    ### Note


    At the end of the day, if your query ran under one second, leave it alone. Ultimately,
    it is long-running queries that need to be addressed. Also, what are your users
    willing to tolerate? Times up to one minute? Take this into account.


    ## ROW_NUMBER( ) Function


    Let’s look at the `ROW_NUMBER()` function again. In this next example, we want
    to keep a running total by month for products that were sold during a two-year
    time (2011, 2012) period for two specific stores. Also, we want to track one product
    only: dark chocolates – medium-size box.


    The `SUM()` aggregate function is used, and the `ROW_NUMBER()` function is used
    in a trivial manner to assign an entry number for each month. This function will
    be used three times so we can see the behavior when we use different `PARTITION
    BY` and `ORDER BY` clause combinations in the query.


    Our last example in this chapter will show you how to use the `ROW_NUMBER()` function
    to solve the islands and gaps problem related to data ranges. This will be interesting
    and practical. Estimated query plans should be interesting also. Let’s see how
    to calculate rolling totals next.


    Please refer to Listing [4-6](#527021_1_En_4_Chapter.xhtml#PC7).


    ```sql

    WITH StoreProductAnalysis

    (TransYear,TransMonth,TransQtr,StoreNo,ProductNo,ProductsBought)

    AS

    (

    SELECT

    YEAR(CalendarDate)         AS TransYear

    ,MONTH(CalendarDate)       AS TransMonth

    ,DATEPART(qq,CalendarDate) AS TransQtr

    ,StoreNo

    ,ProductNo

    ,SUM(TransactionQuantity)  AS ProductsBought

    FROM StagingTable.SalesTransaction

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,DATEPART(qq,CalendarDate)

    ,StoreNo

    ,ProductNo

    )

    SELECT

    spa.TransYear

    ,spa.TransMonth

    ,spa.StoreNo

    ,spa.ProductNo

    ,p.ProductName

    ,spa.ProductsBought

    ,SUM(spa.ProductsBought) OVER(

    PARTITION BY spa.StoreNo,spa.TransYear

    ORDER BY spa.TransMonth

    ) AS RunningTotal

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear

    ORDER BY spa.TransMonth

    ) AS EntryNoByMonth

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear,TransQtr

    ORDER BY spa.TransMonth

    ) AS EntryNoByQtr

    ,ROW_NUMBER() OVER(

    ORDER BY spa.TransYear,spa.StoreNo

    ) AS EntryNoByYear

    FROM StoreProductAnalysis spa

    JOIN DimTable.Product p

    ON spa.ProductNo = p.ProductNo

    WHERE spa.TransYear IN(2011,2012)

    AND spa.StoreNo IN (''S00009'',''S00010'')

    AND spa.ProductNo = ''P00000011129''

    GO

    ```


    Listing 4-6

    Rolling Sales Total by Month


    Starting with the `CTE`, the query generates the sum of transactions by year,
    month, store, and product. The sum is generated for each month.


    The query that uses the `CTE` needs to generate a rolling total of the sums by
    month per year. For this purpose the `SUM()` function is used with an `OVER()`
    clause that contains a partition by store number and transaction year and includes
    an `ORDER BY` clause by transaction month.


    The same `OVER()` clause is used for the `ROW_NUMBER()` function to generate the
    entry numbers. This is used three times so we can see how the behavior is if we
    modify the `PARTITION BY` clause, so it reflects months, quarters, and years.


    Let’s check the results. Please refer to Figure [4-11](#527021_1_En_4_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig11_HTML.png)


    A screenshot of a window presents a tab with a line of code and a table of 9 columns
    and 27 rows. The table indicates the monthwise rolling total sales. Rows 12 and
    13 are highlighted.


    Figure 4-11

    Rolling total sales by month


    The report works well enough in that it calculates running totals by month. Notice
    where the new year starts or the store changes. The rolling total is reset, and
    so are the entry number levels. We can generate row numbers by month or quarter
    or year depending on how the `PARTITION BY` clause is defined:


    ```sql

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear

    ORDER BY spa.TransMonth

    ) AS EntryNoByMonth

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear,TransQtr

    ORDER BY spa.TransMonth

    ) AS EntryNoByQtr

    ,ROW_NUMBER() OVER(

    ORDER BY spa.TransYear,spa.StoreNo

    ) AS EntryNoByYear

    ```


    This combination of uses of the `ROW_NUMBER()` function gives you an indication
    of how it works. Generally, you can generate row numbers for the entire result
    set or for the partitions. You cannot include a `ROWS` or `RANGE` clause though.
    Makes sense if you think about it. It must work on the entire partition or result
    set!


    Let’s see the performance impact when this function is used.'
