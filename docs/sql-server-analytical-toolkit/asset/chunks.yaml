    回到我们的讨论。我们感兴趣的是看到在库存业务场景中如何处理并列情况。让我们看看结果。


    请参考图 12-9 中的部分结果。


    ![](img/527021_1_En_12_Fig9_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the results in
    a table that has 10 columns for movement year, Movement quarter, Movement month,
    Location I d, Inventory I d, Warehouse I d, product I d, monthly decrement movement,
    Decrement rank, and Decrement Dence rank.


    图 12-9

    `RANK()` 与 `DENSE_RANK()` 对比


    递减值的并列情况出现在二月(2)、五月(5)和十二月(12)。在我看来（我之前也说过），`DENSE_RANK()`的值更有意义，因为并列值具有相同的排名值。因此我们可以说，在二月、五月和十二月，产品“P209”的库存减少了
    63 个单位。


    在`RANK()`函数的情况下跳过两个排名值会让人困惑。我们为什么要使用这个？


    我在互联网上研究为何应该使用此函数以及在何种情况下使用时，没有找到使用它的理由。如果你知道，请给我发邮件！


    让我们继续讨论此函数的性能分析和调优。

