- fmt: "### Performance Considerations\n\nLet’s perform some analysis on the detailed\
    \ transaction query as it retrieves data from the Transaction table, which has\
    \ around 600,000 rows. Not a lot in the scheme of things but enough to challenge\
    \ performance when you are running the query on a laptop. Let’s see the estimated\
    \ query execution plan generated by SSMS.\n\nPlease refer to Figure [6-16](#527021_1_En_6_Chapter.xhtml#Fig16).\n\
    \n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig16_HTML.jpg)\n\nFigure 6-16\
    \  \nEstimated query plan – first attempt\n\nWe can see an expensive table scan\
    \ for the Transaction table (89% cost), a table scan for the Portfolio table (0%\
    \ cost), and our old friend, the hash match inner join task (cost 10% – use hashing\
    \ to join table row streams). A suggested index can be seen, so let’s create it\
    \ with the following batch command. We make sure to give it a good name.\n\nPlease\
    \ refer to Listing [6-7](#527021_1_En_6_Chapter.xhtml#PC7).\n\n```sql\nCREATE\
    \ NONCLUSTERED INDEX [iePortfolioAnalysisC0000001]\nON [Financial].[Transaction]\
    \ ([CustId])\nINCLUDE (\n[TransDate],[Symbol],[Price],[Quantity],[TransAmount],\n\
    [PortfolioNo],[AcctNo],[BuySell]\n)\nGO\n```\n\nListing 6-7  \nEstimated query\
    \ plan suggested index\n\nThe suggested index is based on the customer identifier\
    \ column called `CustId`, but it also includes a whole list of columns that appear\
    \ in the query. Let’s create the index and run another estimated execution plan.\
    \ Running update statistics and our `DBCC` command would not hurt after we create\
    \ the index.\n\nPlease refer to Figure [6-17](#527021_1_En_6_Chapter.xhtml#Fig17).\n\
    \n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig17_HTML.jpg)\n\nFigure 6-17\
    \  \nSecond estimated query plan\n\nWe see an improvement with the index seek\
    \ against the Transaction table. This incurs a cost of 65%. The table scan on\
    \ the Portfolio table is still 0%, so this is good. The hash match task cost went\
    \ up to 30%. Some improvement can be seen.\n\n**Suggestion**  \nIf you have the\
    \ cash, consider buying a nice solid-state drive so you can create your query-intensive\
    \ tables and indexes on it or TEMPDB. Should set you back around $200, but it\
    \ would be a valuable learning aid to see how hardware also needs to be taken\
    \ into consideration when designing databases and reporting solutions.\n\nLet’s\
    \ compare profile statistics for both approaches, without the index and with the\
    \ index.\n\nPlease refer to Figure [6-18](#527021_1_En_6_Chapter.xhtml#Fig18).\n\
    \n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig18_HTML.png)\n\nFigure 6-18\
    \  \nComparing profile statistics\n\nOnce again, SQL Server has suggested a good\
    \ index. Notice the `EstimateIO`, `EstimateCPU`, and `TotalSubtreeCost` have gone\
    \ down considerably. Also notice we eliminated a step with the index solution.\
    \ At this stage we can agree that running the estimated query plan tool by itself\
    \ is okay but not enough to give us enough information to analyze performance.\
    \ We also need to examine `IO`, `TIME`, and `PERFORMANCE` statistics.\n\n**Note**\
    \  \nSorry but another note. When analyzing performance on a server scenario as\
    \ opposed to a laptop or workstation setup, you need to take into account network\
    \ performance. Your server could execute the query fast enough, but if your network\
    \ is slow, it could give you misleading impressions regarding the quality of the\
    \ query or script you just created. Hey, just blame the network administrators.\
    \ Only kidding …\n\n### DENSE_RANK() Function\n\nNext function. Recall from Chapter\
    \ [4](#527021_1_En_4_Chapter.xhtml) that the `DENSE_RANK()` function works almost\
    \ the same as the `RANK()` function. In case of ties, the dense rank is the same\
    \ for the ties, but the next value after the duplicate values is simply assigned\
    \ the next rank number. So, if the dense rank for the ties is 4, the next rank\
    \ assigned to the next higher value is 5.\n\nNot so for the `RANK()` function\
    \ results. If you have five tie values of 6 and the current rank for the ties\
    \ is 4, then the next rank is 9 (the 5 tie values + the current rank value 4 =\
    \ 9). Strange indeed.\n\n#### Example 1\n\nRecall the behavior of `RANK()` vs.\
    \ `DENSE_RANK()` when we look at the results of this query that will analyze portfolio\
    \ performance rankings.\n\nPlease refer to Listing [6-8](#527021_1_En_6_Chapter.xhtml#PC8).\n\
    \n```sql\nWITH PortfolioAnalysis (\nTradeYear,CustId,PortfolioNo,Portfolio,YearlyValue\n\
    )\nAS (\nSELECT [Year] AS TradeYear\n,CustId\n,PortfolioNo\n,Portfolio\n-- introduce\
    \ artificial duplicate value\n-- to see how rank vs dense_rank behave\n,CASE\n\
    WHEN Portfolio = 'CASH - FINANCIAL PORTFOLIO'\nAND [Year] = 2012 THEN 33894.20\n\
    ELSE SUM(Value)\nEND AS YearlyValue\nFROM Financial.Portfolio\nWHERE Year > 2011\n\
    GROUP BY CustId,Year,PortfolioNo\n,Portfolio\n)\nSELECT TradeYear,\n,CustId\n\
    ,PortfolioNo\n,Portfolio\n,YearlyValue\n,RANK() OVER(\nORDER BY YearlyValue DESC\n\
    ) AS PortfolioRank\n,DENSE_RANK() OVER(\nORDER BY YearlyValue DESC\n) AS PortfolioDenseRank\n\
    FROM PortfolioAnalysis\nWHERE Portfolio = 'CASH - FINANCIAL PORTFOLIO'\nGO\n```\n\
    \nListing 6-8  \nPortfolio Analysis with Dense Rank\n\nWe will use the `CTE` query\
    \ construct and include a `CASE` statement block so we can introduce some artificial\
    \ duplicates so we can put the `RANK()` and `DENSE_RANK()` functions through their\
    \ paces (this way we can compare results).\n\nWhen the portfolio is the cash portfolio\
    \ and the year equals 2012, then we just hard-code the value $33,894.20 to generate\
    \ some duplicates, triplicates, etc.\n\nThe `RANK()` and `DENSE_RANK()` functions\
    \ include an `ORDER BY` clause that sorts the partition results by the `YearlyValue`\
    \ transaction totals. The results should be interesting.\n\nPlease refer to the\
    \ partial results in Figure [6-19](#527021_1_En_6_Chapter.xhtml#Fig19).\n\n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig19_HTML.jpg)\n\
    \nFigure 6-19  \nRANK() vs. DENSE_RANK() against portfolio performance\n\nThere\
    \ it is. We have a large six-way tie across all customer portfolios for 2012 and\
    \ one customer in 2013. The `DENSE_RANK()` function simply increases the rank\
    \ to 5 for the next non-tie value, but the `RANK()` function adds the tie number\
    \ count value of 6 to the rank of 4 to deliver the next ranking of 10. Then it\
    \ proceeds along its merry way.\n\nMy personal opinion is that this is confusing.\
    \ The `DENSE_RANK()` function gives more intuitive results, but that’s just me."
  raw: '#### Performance Considerations


    Let’s perform some analysis on the detailed transaction query as it retrieves
    data from the Transaction table, which has around 600,000 rows. Not a lot in the
    scheme of things but enough to challenge performance when you are running the
    query on a laptop. Let’s see the estimated query execution plan generated by SSMS.


    Please refer to Figure [6-16](#527021_1_En_6_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig16_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a list of cases from January to October. On the bottom tab, there is a program
    for get query 1, which includes select, hash match, table scan, compute scalar,
    and table scan costs.


    Figure 6-16


    Estimated query plan – first attempt


    We can see an expensive table scan for the Transaction table (89% cost), a table
    scan for the Portfolio table (0% cost), and our old friend, the hash match inner
    join task (cost 10% – use hashing to join table row streams). A suggested index
    can be seen, so let’s create it with the following batch command. We make sure
    to give it a good name.


    Please refer to Listing [6-7](#527021_1_En_6_Chapter.xhtml#PC7).


    ```

    CREATE NONCLUSTERED INDEX [iePortfolioAnalysisC0000001]

    ON [Financial].[Transaction] ([CustId])

    INCLUDE (

    [TransDate],[Symbol],[Price],[Quantity],[TransAmount],

    [PortfolioNo],[AcctNo],[BuySell]

    )

    GO

    Listing 6-7

    Estimated query plan suggested index

    ```


    The suggested index is based on the customer identifier column called `CustId``,`
    but it also includes a whole list of columns that appear in the query. Let’s create
    the index and run another estimated execution plan. Running update statistics
    and our DBCC command would not hurt after we create the index.


    Please refer to Figure [6-17](#527021_1_En_6_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig17_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program on the tab at the top. It also represents another program in the bottom
    tab to get query 1\. It includes select, hash match, table scan, compute scalar,
    and table scan index scan costs.


    Figure 6-17


    Second estimated query plan


    We see an improvement with the index seek against the Transaction table. This
    incurs a cost of 65%. The table scan on the Portfolio table is still 0%, so this
    is good. The hash match task cost went up to 30%. Some improvement can be seen.


    Suggestion


    If you have the cash, consider buying a nice solid-state drive so you can create
    your query-intensive tables and indexes on it or TEMPDB. Should set you back around
    $200, but it would be a valuable learning aid to see how hardware also needs to
    be taken into consideration when designing databases and reporting solutions.


    Let’s compare profile statistics for both approaches, without the index and with
    the index.


    Please refer to Figure [6-18](#527021_1_En_6_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig18_HTML.png)


    A screenshot of S Q L application. It represents a program and a list of estimated
    rows, I O, C P U, average row size, and total subtree cost on the left side. It
    has another program and a list of 5 columns with the same points on the right
    side.


    Figure 6-18


    Comparing profile statistics


    Once again, SQL Server has suggested a good index. Notice the `EstimateIO`, `EstimateCPU`,
    and `TotalSubtreeCost` have gone down considerably. Also notice we eliminated
    a step with the index solution. At this stage we can agree that running the estimated
    query plan tool by itself is okay but not enough to give us enough information
    to analyze performance. We also need to examine `IO`, `TIME`, and `PERFORMANCE`
    statistics.


    Note


    Sorry but another note. When analyzing performance on a server scenario as opposed
    to a laptop or workstation setup, you need to take into account network performance.
    Your server could execute the query fast enough, but if your network is slow,
    it could give you misleading impressions regarding the quality of the query or
    script you just created. Hey, just blame the network administrators. Only kidding
    …


    ### DENSE_RANK( ) Function


    Next function. Recall from Chapter [4](#527021_1_En_4_Chapter.xhtml) that the
    `DENSE_RANK()` function works almost the same as the `RANK()` function. In case
    of ties, the dense rank is the same for the ties, but the next value after the
    duplicate values is simply assigned the next rank number. So, if the dense rank
    for the ties is 4, the next rank assigned to the next higher value is 5.


    Not so for the `RANK()` function results. If you have five tie values of 6 and
    the current rank for the ties is 4, then the next rank is 9 (the 5 tie values
    + the current rank value 4 = 9). Strange indeed.


    #### Example 1


    Recall the behavior of `RANK()` vs. `DENSE_RANK()` when we look at the results
    of this query that will analyze portfolio performance rankings.


    Please refer to Listing [6-8](#527021_1_En_6_Chapter.xhtml#PC8).


    ```

    WITH PortfolioAnalysis (

    TradeYear,CustId,PortfolioNo,Portfolio,YearlyValue

    )

    AS (

    SELECT [Year] AS TradeYear

    ,CustId

    ,PortfolioNo

    ,Portfolio

    -- introduce artificial duplicate value

    -- to see how rank vs dense_rank behave

    ,CASE

    WHEN Portfolio = ''CASH - FINANCIAL PORTFOLIO''

    AND [Year] = 2012 THEN 33894.20

    ELSE SUM(Value)

    END AS YearlyValue

    FROM Financial.Portfolio

    WHERE Year > 2011

    GROUP BY CustId,Year,PortfolioNo

    ,Portfolio

    )

    SELECT TradeYear,

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,YearlyValue

    ,RANK() OVER(

    ORDER BY YearlyValue DESC

    ) AS PortfolioRank

    ,DENSE_RANK() OVER(

    ORDER BY YearlyValue DESC

    ) AS PortfolioDenseRank

    FROM PortfolioAnalysis

    WHERE Portfolio = ''CASH - FINANCIAL PORTFOLIO''

    GO

    Listing 6-8

    Portfolio Analysis with Dense Rank

    ```


    We will use the `CTE` query construct and include a `CASE` statement block so
    we can introduce some artificial duplicates so we can put the `RANK()` and `DENSE_RANK()`
    functions through their paces (this way we can compare results).


    When the portfolio is the cash portfolio and the year equals 2012, then we just
    hard-code the value $33,894.20 to generate some duplicates, triplicates, etc.


    The `RANK()` and `DENSE_RANK()` functions include an `ORDER BY` clause that sorts
    the partition results by the `YearlyValue` transaction totals. The results should
    be interesting.


    Please refer to the partial results in Figure [6-19](#527021_1_En_6_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig19_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and a list with 18 rows and 7 columns. The columns are trade year, customer
    i d, portfolio number, portfolio, yearly value, portfolio rank, and portfolio
    dense rank.


    Figure 6-19


    RANK() vs. DENSE_RANK() against portfolio performance


    There it is. We have a large six-way tie across all customer portfolios for 2012
    and one customer in 2013\. The `DENSE_RANK()` function simply increases the rank
    to 5 for the next non-tie value, but the `RANK()` function adds the tie number
    count value of 6 to the rank of 4 to deliver the next ranking of 10\. Then it
    proceeds along its merry way.


    My personal opinion is that this is confusing. The `DENSE_RANK()` function gives
    more intuitive results, but that’s just me.'
  trans: "### 性能考量\n\n让我们对这个详细的事务查询进行一些分析，因为它要从拥有大约 60 万行的 Transaction 表中检索数据。在整个体系中这不算多，但足以在笔记本电脑上运行查询时对性能构成挑战。我们来看看\
    \ SSMS 生成的估计查询执行计划。\n\n请参阅图 6-16。\n\n![](img/527021_1_En_6_Fig16_HTML.jpg)\n\n\
    图 6-16  \n估计查询计划 – 首次尝试\n\n我们可以看到对 Transaction 表有一个开销巨大的表扫描（89% 成本），对 Portfolio\
    \ 表有一个表扫描（0% 成本），以及我们的老朋友——哈希匹配内连接任务（成本 10% – 使用哈希来连接表行流）。可以看到一个建议的索引，因此让我们用下面的批处理命令来创建它。我们确保给它起个好名字。\n\
    \n请参阅清单 6-7。\n\n```sql\nCREATE NONCLUSTERED INDEX [iePortfolioAnalysisC0000001]\n\
    ON [Financial].[Transaction] ([CustId])\nINCLUDE (\n[TransDate],[Symbol],[Price],[Quantity],[TransAmount],\n\
    [PortfolioNo],[AcctNo],[BuySell]\n)\nGO\n```\n\n清单 6-7  \n估计查询计划建议的索引\n\n建议的索引基于名为\
    \ `CustId` 的客户标识符列，但它还包含了查询中出现的完整列列表。让我们创建该索引并运行另一个估计执行计划。在创建索引后，运行更新统计信息和我们的\
    \ `DBCC` 命令不会有坏处。\n\n请参阅图 6-17。\n\n![](img/527021_1_En_6_Fig17_HTML.jpg)\n\n图\
    \ 6-17  \n第二次估计查询计划\n\n我们看到对 Transaction 表的索引查找带来了改进。这产生了 65% 的成本。Portfolio 表上的表扫描仍然是\
    \ 0%，所以这很好。哈希匹配任务的成本上升到了 30%。可以看出有一些改进。\n\n**建议**  \n如果你有预算，考虑购买一块优质的固态硬盘，这样你可以把查询密集型表和索引或\
    \ TEMPDB 放在上面。大概需要花费 200 美元左右，但它将是一个宝贵的学习辅助工具，让你看到在设计数据库和报告解决方案时也需要考虑硬件因素。\n\n\
    让我们比较一下两种方法（无索引和有索引）的分析统计信息。\n\n请参阅图 6-18。\n\n![](img/527021_1_En_6_Fig18_HTML.png)\n\
    \n图 6-18  \n比较分析统计信息\n\nSQL Server 再次建议了一个好索引。注意 `EstimateIO`、`EstimateCPU` 和\
    \ `TotalSubtreeCost` 已经大幅下降。另请注意，使用索引方案我们消除了一个步骤。在这个阶段，我们可以同意，单独运行估计查询计划工具是可以的，但不足以给我们提供足够的信息来分析性能。我们还需要检查\
    \ `IO`、`TIME` 和 `PERFORMANCE` 统计信息。\n\n**注意**  \n抱歉，又是一个注意点。当在服务器场景（相对于笔记本电脑或工作站设置）分析性能时，你需要考虑网络性能。你的服务器可能足够快地执行查询，但如果你的网络很慢，它可能会让你对你刚创建的查询或脚本的质量产生误解。嘿，就怪网络管理员吧。开个玩笑……\n\
    \n### DENSE_RANK() 函数\n\n下一个函数。回顾第 4 章，`DENSE_RANK()` 函数的工作方式几乎与 `RANK()` 函数相同。在出现并列的情况下，密集排名对并列的值是相同的，但重复值之后的下一个值会被简单地分配下一个排名数字。所以，如果并列的密集排名是\
    \ 4，那么分配给下一个较高值的下一个排名就是 5。\n\n`RANK()` 函数的结果则不是这样。如果你有五个并列值为 6，且并列的当前排名是 4，那么下一个排名是\
    \ 9（5 个并列值 + 当前排名值 4 = 9）。确实很奇怪。\n\n#### 示例 1\n\n当我们查看这个将分析投资组合性能排名的查询结果时，回顾一下\
    \ `RANK()` 与 `DENSE_RANK()` 的行为。\n\n请参阅清单 6-8。\n\n```sql\nWITH PortfolioAnalysis\
    \ (\nTradeYear,CustId,PortfolioNo,Portfolio,YearlyValue\n)\nAS (\nSELECT [Year]\
    \ AS TradeYear\n,CustId\n,PortfolioNo\n,Portfolio\n-- 引入人为的重复值\n-- 以观察 rank 和\
    \ dense_rank 的行为\n,CASE\nWHEN Portfolio = 'CASH - FINANCIAL PORTFOLIO'\nAND [Year]\
    \ = 2012 THEN 33894.20\nELSE SUM(Value)\nEND AS YearlyValue\nFROM Financial.Portfolio\n\
    WHERE Year > 2011\nGROUP BY CustId,Year,PortfolioNo\n,Portfolio\n)\nSELECT TradeYear,\n\
    ,CustId\n,PortfolioNo\n,Portfolio\n,YearlyValue\n,RANK() OVER(\nORDER BY YearlyValue\
    \ DESC\n) AS PortfolioRank\n,DENSE_RANK() OVER(\nORDER BY YearlyValue DESC\n)\
    \ AS PortfolioDenseRank\nFROM PortfolioAnalysis\nWHERE Portfolio = 'CASH - FINANCIAL\
    \ PORTFOLIO'\nGO\n```\n\n清单 6-8  \n使用密集排名的投资组合分析\n\n我们将使用 `CTE` 查询结构并包含一个 `CASE`\
    \ 语句块，以便引入一些人为的重复值，从而让 `RANK()` 和 `DENSE_RANK()` 函数充分发挥作用（这样我们就可以比较结果）。\n\n当投资组合是现金投资组合且年份等于\
    \ 2012 年时，我们就硬编码值 $33,894.20 来生成一些重复值、三重值等。\n\n`RANK()` 和 `DENSE_RANK()` 函数包含一个\
    \ `ORDER BY` 子句，该子句按 `YearlyValue` 事务总计对分区结果进行排序。结果应该很有趣。\n\n请参阅图 6-19 中的部分结果。\n\
    \n![](img/527021_1_En_6_Fig19_HTML.jpg)\n\n图 6-19  \n针对投资组合性能的 RANK() 与 DENSE_RANK()\
    \ 对比\n\n就是这样。2012 年所有客户投资组合中有一个庞大的六路并列，2013 年有一个客户并列。`DENSE_RANK()` 函数只是将下一个非并列值的排名增加到\
    \ 5，但 `RANK()` 函数将并列计数值 6 加到排名 4 上，得到下一个排名 10。然后它继续愉快地进行下去。\n\n我个人认为这很令人困惑。`DENSE_RANK()`\
    \ 函数给出了更直观的结果，但这只是我的看法。"
- fmt: '## Performance Considerations


    让我们来看看这个查询的性能如何。以下是该查询的第一个估计查询计划，将为我们后续的性能调优工作提供基准。


    请参考图[6-20](#527021_1_En_6_Chapter.xhtml#Fig20)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig20_HTML.png)


    一个名为“Ranking Financial Quarries”的`SQL`应用程序截图。它展示了一个获取执行计划的程序和查询1，其中包含选择、序列投影、段、排序、计算标量、哈希匹配和索引查找成本。


    图 6-20


    第一个估计查询计划


    尽管使用了索引查找（比索引扫描更好），但系统建议创建一个新索引。我们看到在索引查找之后，哈希匹配占20%的成本，另一个需要注意的任务是排序，占2%。让我们提取建议索引的代码，并为其命名以便创建。


    请参考清单[6-9](#527021_1_En_6_Chapter.xhtml#PC9)。


    ```sql

    /*

    Missing Index Details from ch06 - Ranking Financial Queries.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APFinance
    (DESKTOP-CEBK38L\Angelo (70))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 69.9728%.

    */

    /*

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Portfolio] ([Portfolio],[Year])

    INCLUDE ([CustId],[PortfolioNo],[Value])

    GO

    */

    DROP INDEX IF EXISTS [ieCustIdPortfolioNoValue]

    ON [Financial].[Portfolio]

    GO

    CREATE NONCLUSTERED INDEX [ieCustIdPortfolioNoValue]

    ON [Financial].[Portfolio] ([Portfolio],[Year])

    INCLUDE ([CustId],[PortfolioNo],[Value])

    GO

    ```

    清单 6-9


    建议索引


    该索引基于`portfolio`和`year`列，并包含了客户ID、投资组合编号和交易总价值。提醒一下，我包含了`DROP`命令，以便你在尝试和练习代码时，可以根据需要删除并重新创建它。


    让我们创建索引并生成一个新的估计执行计划。


    请参考图[6-21](#527021_1_En_6_Chapter.xhtml#Fig21)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig21_HTML.png)


    一个名为“Ranking Financial Quarries”的`SQL`应用程序截图。它展示了一个获取执行计划的程序和查询1，其中包含选择、序列投影、段、排序、计算标量、哈希匹配和索引查找成本。


    图 6-21


    索引创建后的估计执行计划


    让我们看一下两个计划中各项成本在优化前后的数值对比。


    请参考表[6-2](#527021_1_En_6_Chapter.xhtml#Tab2)。


    表 6-2


    成本比较


    | 步骤 | 优化前 | 优化后 |

    | --- | --- | --- |

    | SELECT | 0% | 0% |

    | 序列投影 | 0% | 0% |

    | 段 | 0% | 0% |

    | 段 | 0% | 0% |

    | 排序 | 2% | 8% |

    | 计算标量 | 0% | 0% |

    | 哈希匹配 | 20% | 52% |

    | 索引查找 | 77% | 40% |


    索引查找的成本从77%下降到了40%，但当然哈希匹配的成本从20%上升到了52%，排序步骤的成本也从2%上升到了8%。这与我们在其他查询中创建建议索引时的经验相似。


    我尝试将`WHERE`子句谓词移到调用查询中，并从`CTE`中移除它，但这没有帮助。我生成了一个看起来与原始计划相同的执行计划。唯一的替代方案是将`CTE`生成的数据暂存到临时表或报表表中，然后查询该表，以避免`CTE`处理的成本。


    提醒


    请记住，交易价值是随机生成的，因此当你尝试这些脚本时，你会得到与本书中图示不同的结果。


    让我们尝试另一个例子。


    ## Example 2


    在下一个例子中，让我们考虑计算股票价格的波动幅度，即一年内股票的最低价格与最高价格之间的差值，作为衡量其表现的一个指标。因此，如果这个值很大，就意味着该股票是高表现者，值得投资。如果这个值为负，那么它就是低表现者！


    你会怎么做？是抛售它，还是抱着它迟早会涨的希望继续持有？不要像我之前说的那样做：高买低卖。


    请参考清单[6-10](#527021_1_En_6_Chapter.xhtml#PC10)。


    ```sql

    SELECT TOP 20 [QuoteYear]

    ,[Ticker]

    ,[Company]

    ,MIN([Low])               AS MinLow

    ,MAX([High])              AS MaxHigh

    ,MAX([High]) - MIN([Low]) AS MaxSpread

    ,RANK() OVER(

    ORDER BY MAX([High]) DESC

    ) AS PerformanceRank

    ,DENSE_RANK() OVER(

    ORDER BY MAX([High]) DESC

    ) AS PerformanceDenseRank

    FROM [APFinance].[MasterData].[TickerPriceRangeHistoryDetail]

    WHERE [QuoteYear] = 2015

    GROUP BY[QuoteYear]

    ,[Ticker]

    ,[Company]

    GO

    ```

    清单 6-10


    表现最佳的前20只股票代码


    这是一个稍微有趣的查询。它报告了按年（仅2015年）划分的股票代码的最低和最高报价。它还通过再次使用`MIN()`和`MAX()`函数来计算最低值和最高值之间的差值。这可能是低效的，我们应该考虑重写此查询，使用报表表而不是`CTE`。


    让我们在图[6-22](#527021_1_En_6_Chapter.xhtml#Fig22)中查看结果。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig22_HTML.png)


    一个名为“Ranking Financial Quarries”的`SQL`应用程序截图。它展示了一个程序和一个包含18行8列的列表。列标题分别是报价年份、股票代码、公司、最低价、最高价、最大价差、表现排名和表现密集排名。


    图 6-22


    2015年股票最低价、最高价和价差


    如图所示，我们有几个并列排名的情况，跳过排名值与直接进入下一个值的行为都有体现。尽管如此，我们还是能大致了解这些股票的表现。


    提醒


    所有股票及其他金融工具的价值、交易等均为模拟数据，不反映这些工具在历史上及当前的实际表现。另外，是的，不要以我的投资策略为基础，因为我总是高买低卖。


    是时候进行一些性能分析了。'
  raw: '#### Performance Considerations


    Let’s check out how this query performs. The following is the first estimated
    query plan for this query that will give us a baseline for our performance tuning
    efforts.


    Please refer to Figure [6-20](#527021_1_En_6_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig20_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program to get an execution plan and query 1, which includes select, sequence
    project, segment, sort, compute scalar, hash match, and index seek costs.


    Figure 6-20


    First estimated query plan


    Despite an index seek (better than an index scan), a new index is suggested. We
    see a hash match at 20% cost right after the index seek, and the only other task
    to be aware of is the sort at 2%. Let’s extract the code for the suggested index
    and come up with a name for it so we can create it.


    Please refer to Listing [6-9](#527021_1_En_6_Chapter.xhtml#PC9).


    ```

    /*

    Missing Index Details from ch06 - Ranking Financial Queries.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APFinance
    (DESKTOP-CEBK38L\Angelo (70))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 69.9728%.

    */

    /*

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Portfolio] ([Portfolio],[Year])

    INCLUDE ([CustId],[PortfolioNo],[Value])

    GO

    */

    DROP INDEX IF EXISTS [ieCustIdPortfolioNoValue]

    ON [Financial].[Portfolio]

    GO

    CREATE NONCLUSTERED INDEX [ieCustIdPortfolioNoValue]

    ON [Financial].[Portfolio] ([Portfolio],[Year])

    INCLUDE ([CustId],[PortfolioNo],[Value])

    GO

    Listing 6-9

    Suggested Index

    ```


    The index is based on the portfolio and year columns, and we include the customer
    ID, portfolio number, and transaction total value. Reminder, I include the `DROP`
    command so that when you are trying the code out and practicing, you can drop
    it and recreate it as necessary.


    Let’s create the index and generate a new estimated execution plan.


    Please refer to Figure [6-21](#527021_1_En_6_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig21_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program to get an execution plan and query 1, which includes select, sequence
    project, segment, sort, compute scalar, hash match, and index seek costs.


    Figure 6-21


    Estimated execution plan after index creation


    Let’s take a look at the before and after values of the costs between both plans.


    Please refer to Table [6-2](#527021_1_En_6_Chapter.xhtml#Tab2).


    Table 6-2


    Comparing Costs


    | Step | Before | After |

    | --- | --- | --- |

    | SELECT | 0% | 0% |

    | Sequence projection | 0% | 0% |

    | Segment | 0% | 0% |

    | Segment | 0% | 0% |

    | Sort | 2% | 8% |

    | Compute scalar | 0% | 0% |

    | Hash match | 20% | 52% |

    | Index seek | 77% | 40% |


    The index seek went down from 77% to 40%, but of course the hash match went up
    to 52% from 20% and so did the sort step, from 2% to 8%. This was our experience
    with other queries when we created a suggested index.


    I tried moving the `WHERE` clause predicate to the calling query and removed it
    from the `CTE`, but it did not help. I generated a plan that looked the same as
    the original. The only alternative is to stage the `CTE`-generated data in a temporary
    or report table and then query that so that we do not incur the cost of the `CTE`
    processing.


    Reminder


    Remember that the transaction values are generated randomly, so when you try these
    scripts, you will get different results from the figures in this book.


    Let’s try another example.


    #### Example 2


    For our next example, let’s consider to calculate the spread of stock prices,
    that is, the value between the minimum price the stock had in a year and the maximum
    value in a year as a measure of performance. So, if the value is large, that means
    the stock is a high-performer and worth investing in. If the value is negative,
    then it is a low-performer!


    What do you do? Dump it or go along for the ride hoping it increases sooner or
    later? Don’t do like I said earlier what I do: buy high and sell low.


    Please refer to Listing [6-10](#527021_1_En_6_Chapter.xhtml#PC10).


    ```

    SELECT TOP 20 [QuoteYear]

    ,[Ticker]

    ,[Company]

    ,MIN([Low])               AS MinLow

    ,MAX([High])              AS MaxHigh

    ,MAX([High]) - MIN([Low]) AS MaxSpread

    ,RANK() OVER(

    ORDER BY MAX([High]) DESC

    ) AS PerformanceRank

    ,DENSE_RANK() OVER(

    ORDER BY MAX([High]) DESC

    ) AS PerformanceDenseRank

    FROM [APFinance].[MasterData].[TickerPriceRangeHistoryDetail]

    WHERE [QuoteYear] = 2015

    GROUP BY[QuoteYear]

    ,[Ticker]

    ,[Company]

    GO

    Listing 6-10

    Top 20 Performing Ticker Symbols

    ```


    This is a slightly interesting query. It reports the minimum and maximum price
    quotes for the ticker symbols by year (2015 only). It also calculates the spread
    between the minimum and maximum values by using the `MIN()` and `MAX()` functions
    a second time. This is probably inefficient, and we should consider rewriting
    this query so it uses a report table instead of the `CTE`.


    Let’s see the results in Figure [6-22](#527021_1_En_6_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig22_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program and a list with 18 rows and 8 columns. Column headers are quote year,
    ticker, company, min low, max high, max spread, performance rank, and performance
    dense rank.


    Figure 6-22


    Ticker low, high, and spread for 2015


    As can be seen, we have a couple of ties, and the same behavior is displayed as
    far as skipping ranking values vs. just going to the next value. Still, we get
    a sense of how the stocks perform.


    Reminder


    All stock and other instrument values, transactions, etc. are simulated and do
    not reflect the actual performance of these instruments, both historically and
    at present time. And, yes, do not base your investing strategy on mine because
    I always buy high and sell low.


    Time for some performance analysis.'
  trans: '## 性能考量


    让我们来看看这个查询的性能如何。以下是该查询的第一个估计查询计划，将为我们后续的性能调优工作提供基准。


    请参考图 6-20。


    ![](img/527021_1_En_6_Fig20_HTML.png)


    一个名为“Ranking Financial Quarries”的`SQL`应用程序截图。它展示了一个获取执行计划的程序和查询 1，其中包含选择、序列投影、段、排序、计算标量、哈希匹配和索引查找成本。


    图 6-20


    第一个估计查询计划


    尽管使用了索引查找（比索引扫描更好），但系统建议创建一个新索引。我们看到在索引查找之后，哈希匹配占 20%的成本，另一个需要注意的任务是排序，占 2%。让我们提取建议索引的代码，并为其命名以便创建。


    请参考清单 6-9。


    ```sql

    /*

    Missing Index Details from ch06 - Ranking Financial Queries.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APFinance
    (DESKTOP-CEBK38L\Angelo (70))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 69.9728%.

    */

    /*

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Portfolio] ([Portfolio],[Year])

    INCLUDE ([CustId],[PortfolioNo],[Value])

    GO

    */

    DROP INDEX IF EXISTS [ieCustIdPortfolioNoValue]

    ON [Financial].[Portfolio]

    GO

    CREATE NONCLUSTERED INDEX [ieCustIdPortfolioNoValue]

    ON [Financial].[Portfolio] ([Portfolio],[Year])

    INCLUDE ([CustId],[PortfolioNo],[Value])

    GO

    ```

    清单 6-9


    建议索引


    该索引基于`portfolio`和`year`列，并包含了客户 ID、投资组合编号和交易总价值。提醒一下，我包含了`DROP`命令，以便你在尝试和练习代码时，可以根据需要删除并重新创建它。


    让我们创建索引并生成一个新的估计执行计划。


    请参考图 6-21。


    ![](img/527021_1_En_6_Fig21_HTML.png)


    一个名为“Ranking Financial Quarries”的`SQL`应用程序截图。它展示了一个获取执行计划的程序和查询 1，其中包含选择、序列投影、段、排序、计算标量、哈希匹配和索引查找成本。


    图 6-21


    索引创建后的估计执行计划


    让我们看一下两个计划中各项成本在优化前后的数值对比。


    请参考表 6-2。


    表 6-2


    成本比较


    | 步骤 | 优化前 | 优化后 |

    | --- | --- | --- |

    | SELECT | 0% | 0% |

    | 序列投影 | 0% | 0% |

    | 段 | 0% | 0% |

    | 段 | 0% | 0% |

    | 排序 | 2% | 8% |

    | 计算标量 | 0% | 0% |

    | 哈希匹配 | 20% | 52% |

    | 索引查找 | 77% | 40% |


    索引查找的成本从 77%下降到了 40%，但当然哈希匹配的成本从 20%上升到了 52%，排序步骤的成本也从 2%上升到了 8%。这与我们在其他查询中创建建议索引时的经验相似。


    我尝试将`WHERE`子句谓词移到调用查询中，并从`CTE`中移除它，但这没有帮助。我生成了一个看起来与原始计划相同的执行计划。唯一的替代方案是将`CTE`生成的数据暂存到临时表或报表表中，然后查询该表，以避免`CTE`处理的成本。


    **提醒**


    请记住，交易价值是随机生成的，因此当你尝试这些脚本时，你会得到与本书中图示不同的结果。


    让我们尝试另一个例子。


    ## 示例 2


    在下一个例子中，让我们考虑计算股票价格的波动幅度，即一年内股票的最低价格与最高价格之间的差值，作为衡量其表现的一个指标。因此，如果这个值很大，就意味着该股票是高表现者，值得投资。如果这个值为负，那么它就是低表现者！


    你会怎么做？是抛售它，还是抱着它迟早会涨的希望继续持有？不要像我之前说的那样做：高买低卖。


    请参考清单 6-10。


    ```sql

    SELECT TOP 20 [QuoteYear]

    ,[Ticker]

    ,[Company]

    ,MIN([Low])               AS MinLow

    ,MAX([High])              AS MaxHigh

    ,MAX([High]) - MIN([Low]) AS MaxSpread

    ,RANK() OVER(

    ORDER BY MAX([High]) DESC

    ) AS PerformanceRank

    ,DENSE_RANK() OVER(

    ORDER BY MAX([High]) DESC

    ) AS PerformanceDenseRank

    FROM [APFinance].[MasterData].[TickerPriceRangeHistoryDetail]

    WHERE [QuoteYear] = 2015

    GROUP BY[QuoteYear]

    ,[Ticker]

    ,[Company]

    GO

    ```

    清单 6-10


    表现最佳的前 20 只股票代码


    这是一个稍微有趣的查询。它报告了按年（仅 2015 年）划分的股票代码的最低和最高报价。它还通过再次使用`MIN()`和`MAX()`函数来计算最低值和最高值之间的差值。这可能是低效的，我们应该考虑重写此查询，使用报表表而不是`CTE`。


    让我们在图 6-22 中查看结果。


    ![](img/527021_1_En_6_Fig22_HTML.png)


    一个名为“Ranking Financial Quarries”的`SQL`应用程序截图。它展示了一个程序和一个包含 18 行 8 列的列表。列标题分别是报价年份、股票代码、公司、最低价、最高价、最大价差、表现排名和表现密集排名。


    图 6-22


    2015 年股票最低价、最高价和价差


    如图所示，我们有几个并列排名的情况，跳过排名值与直接进入下一个值的行为都有体现。尽管如此，我们还是能大致了解这些股票的表现。


    **提醒**


    所有股票及其他金融工具的价值、交易等均为模拟数据，不反映这些工具在历史上及当前的实际表现。另外，是的，不要以我的投资策略为基础，因为我总是高买低卖。


    是时候进行一些性能分析了。'
- fmt: '## Performance Considerations


    Let’s run our baseline estimated execution plan. When you do this on your own,
    take the time to check out each of the help hint panels by placing the mouse pointer
    over each task. Record what parameters are confusing to you so you can look them
    up on the Microsoft documentation website. Now is the time to increase your knowledge
    of these important tasks and statistics.


    Note

    You will never be able to memorize them all; just understand the most common ones
    like index seek and scan.


    Please refer to Figure [6-23](#527021_1_En_6_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig23_HTML.png)

    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program to get query 1. It includes select, compute scalar, top, sequence project,
    segment, sort, hash match, and table scan costs. Sort cost 4%, hash match cost
    33%, and table scan cost 63% highlighted with 3 arrows.


    Figure 6-23

    Estimated query plan for the ticker analysis query


    There’s an expensive table scan cost of 63% against a table that has 54,057 rows,
    so an index is suggested. Next, we see a hash match aggregate at 33% followed
    by a sort at 4%. Let’s see what the suggested index looks like before we consider
    replacing the `CTE` with a report table.


    Please refer to Listing [6-11](#527021_1_En_6_Chapter.xhtml#PC11).


    ```sql

    DROP INDEX IF EXISTS eTickerCompanyLowHigh

    ON [MasterData].[TickerPriceRangeHistoryDetail]

    GO

    CREATE NONCLUSTERED INDEX [eTickerCompanyLowHigh]

    ON [MasterData].[TickerPriceRangeHistoryDetail] ([QuoteYear])

    INCLUDE ([Ticker],[Company],[Low],[High])

    GO

    ```

    Listing 6-11

    Suggested Index


    As a force of habit, I always include the `DROP INDEX` command in case I need
    to experiment and rebuild the index. Let’s build the index and generate another
    estimated query plan.


    Please refer to Figure [6-24](#527021_1_En_6_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig24_HTML.png)

    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program to get a query 1. It includes select, compute scalar, top, sequence
    project, 2 segments, sort, hash match, and index seek. It raises a question, What
    do these do? pointing an arrow to the sequence project.


    Figure 6-24

    Revised query plan for the ticker analysis query


    As usual, an index seek replaced the table scan. As usual, the hash match and
    sort went up.


    Please refer to Table [6-3](#527021_1_En_6_Chapter.xhtml#Tab3).


    Table 6-3

    Before and After Index Costs


    | Before |   |   | After |   |   |

    | --- | --- | --- | --- | --- | --- |

    | **Index Seek** | **Hash Match** | **Sort** | **Index Seek** | **Hash Match**
    | **Sort** |

    | 63% | 33% | 4% | 28% | 63% | 9% |


    We are seeing the usual pattern here. There are just so many indexes and report
    tables one can build. The trick is when you gather user specification reports
    to identify common requirements and create report tables to satisfy most of them,
    so you only end up with between two and five tables. Otherwise, things will get
    hard to manage, and loading will be a nightmare due to all the indexes that need
    to be updated.


    Back to the plan. What does the sequence project task do? Additionally, you might
    be asking yourself, “What steps process the `MIN()`, `MAX()`, `RANK()`, and `DENSE_RANK()`
    functions?”


    These questions can be answered by setting the `PROFILE STATISTICS` parameter
    on and rerunning the query. Let’s see the results.


    Please refer to Figure [6-25](#527021_1_En_6_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig25_HTML.png)

    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program and a list 3 columns of logical O P, argument, and defined values. It
    gives arguments for computer scalers and segments. Defined values are NULL for
    segments and sort.


    Figure 6-25

    Profile statistics report


    The first order of business is to identify what those **ExprXXXX** expressions
    mean:

    - Expr1003: `MIN()` function

    - Expr1004: `MAX()` function

    - Expr1005: `RANK()` function (in compute scalar tasks)

    - Expr1006: `DENSE_RANK()` function (in compute scalar tasks)

    - Exper1007: Expr1004 – Expr1003


    Next, let’s answer the question: ***What is the sequence project task used for?***

    The answer is that it is used to include columns that participated in calculations,
    in this case the two rank functions.

    So this is a step you cannot eliminate by performance tuning unless maybe if we
    rewrite the query so it uses the old report table query scheme. In other words,
    precalculate the values in these columns.


    First, we need to compare the before and after `PROFILE STATISTICS` to see if
    the new index helped. Please refer to Figure [6-26](#527021_1_En_6_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig26_HTML.png)

    A screenshot of S Q L application. It represents a program to compare lists of
    14 columns in both tabs, top and bottom. A highlighted box depicts a comparison
    between both tabs of the values of total subtree costs. Both tabs have 9 rows.


    Figure 6-26

    Comparing profile statistics


    Looks like both pre- and post-index scenarios generated the same number of steps,
    and the only category of values that showed improvements were the total subtree
    costs highlighted in the figure that went down by more than 50%. At this stage
    we might ask the question: Was it worth another index?


    Next, we need to complete the performance analysis profile by looking at the `IO`
    and `TIME` statistics. Please refer to Figure [6-27](#527021_1_En_6_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig27_HTML.jpg)

    A screenshot of S S Q L application titled Ranking Financial Quarries. It represents
    the program to find I O and time statistics. It points the elapsed times of 2
    strategies, such as 39, 129, 0, and 17 milliseconds.


    Figure 6-27

    Comparing IO and TIME statistics between both strategies


    Yes, I know, you love the nice big red arrows! All kidding aside, we see important
    statistics values went down once the index was created. And this is to be expected
    most of the time. The logical reads before and after are 608 and 123, so this
    is impressive. Physical reads are 0 in both cases, and the scan count is 1 in
    both cases. Looks like memory was utilized to process both query approaches.


    `CPU` and elapsed time are a mixed bag. `CPU` time went up, but elapsed time went
    down.

    Conclusion: We will keep the index! Next topic: We create some tiles to store
    financial information.


    ### NTILE( ) Function


    Remember the definition of this function? The `NTILE()` function allows you to
    divide a set of rows in a data set into tiles or buckets (I like this term better).
    If you have a data set of 12 rows and you want to assign 4 tiles, each tile will
    have 3 rows. This function comes in handy when you want to create sets of data
    like when you need to evaluate salesperson performance and grant them bonuses
    based on sales performance.


    Since we are discussing finance, another example is setting up bucket categories
    for how stocks perform in a portfolio: best-performing in the first bucket, slightly
    worst-performing stocks in the next bucket, and so on. This way you can rate them
    and base investment strategies according to which bucket a stock falls into.


    Note

    If you have an odd number of rows, like 15, and you decide to create 4 tiles,
    you will get tiles with 4 rows, 4 rows, 4 rows, and 3 rows. So there is no way
    to control what goes into a tile; it just divides them up.


    For our first example, we will start off easily. We create tiles so we can use
    them to categorize whether an investment is good, bad, or junk! I am breaking
    up the listing into two parts, so it is easy to explain.'
