    # Introduction


    Welcome to my book, *SQL Server Analytical Toolkit*.


    ## What’s this book about?


    This is a book on applying Microsoft SQL Server aggregate, analytical, and ranking
    functions across various industries for the purpose of statistical, reporting,
    analytical, and historical performance analysis using a series of built-in SQL
    Server functions affectionately known as the window functions!


    No, not window functions like the ones used in the C# or other Microsoft Windows
    application programming. They are called window functions because they implement
    windows into the data set generated by a query. These windows allow you to control
    where the functions are applied in the data by creating partitions in the query
    data set.


    ## What’s a partition?


    “What’s a partition?” you might ask. This is a key concept you need to understand
    to get the most out of this book. Suppose you have a data set that has six rows
    for product category A and six rows for product category B. Each row has a column
    that stores sales values that you wish to analyze. The data set can be divided
    into two sections, one for each product category. These are the partitions that
    the window functions use. You can analyze each partition by applying the window
    functions (more on this in Chapter [1](#527021_1_En_1_Chapter.xhtml)).


    We will see that the window in each partition can be further divided into smaller
    windows. The mechanism of a window frame allows you to control which rows in the
    partition are submitted to the window function relative to the current row being
    processed. For example, apply a function like the `SUM()` function to the current
    row being processed and any prior rows in the partition to calculate running totals
    by month. Move to the next row in the partition and it behaves the same.


    The book focuses on applying these functions across four key industries: sales,
    finance, engineering, and inventory control. I did this so that readers in these
    industries can find something they are familiar with in their day-to-day job activities.
    Even if you are not working across these industries, you can still benefit by
    learning the window functions and seeing how they are applied.


    Maybe you want to interview for a developer role in the finance sector? Or maybe
    you work in engineering or telecommunications or you are a manufacturer of retail
    products. This book will help you acquire some valuable skills that will help
    you pass the job interview.


    Although you could perform these functions with tools like Power BI, performing
    these functions at the SQL level precalculates results and improves performance
    so that reporting tools use precalculated data.


    By the way, there are many books out there on SQL Server and window (or windowing)
    functions. What’s so different about this book?'
