  raw: '### LAST_VALUE( ) and FIRST_VALUE( )


    So what do this related pair of functions do for us? The names give us a hint.


    Given a set of sorted values, the `FIRST_VALUE()` function will return the first
    value.


    Given a set of sorted values, the `LAST_VALUE()` function will return the last
    value.


    Pretty simple, let’s dive right into an example. This time we eliminated the `CTE`
    and utilized the memory-enhanced table we created earlier.


    Please refer to Listing [3-13](#527021_1_En_3_Chapter.xhtml#PC21).


    ```

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) AS SalesTotalFirstValue

    ,LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) AS SalesTotalLastValue

    ,FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) -

    LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) AS Change

    ,CASE

    WHEN (

    FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) - -

    LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    )

    ) > 0 THEN ''Sales Increase''

    WHEN (

    FIRST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    ) -

    LAST_VALUE(SUM(SalesTotal)) OVER (

    PARTITION BY SalesYear

    ORDER BY SalesMonth

    )

    ) < 0 THEN ''Sales Decrease''

    ELSE ''No change''

    END AS [Sales Performance]

    FROM SaleReports.MemorySalesTotals

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    Listing 3-13

    The FIRST_VALUE() and LAST_VALUE() Functions in Action

    ```


    The usual `OVER()` structure for these functions is used. A `PARTITION BY` clause
    sets up partitions by sales year. An `ORDER BY` clause sorts the partition rows
