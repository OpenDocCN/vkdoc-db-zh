- fmt: '# PERCENT_RANK() Function


    Next on deck is the `PERCENT_RANK()` function.


    Recall what it does?


    We covered this in Chapters [3](#527021_1_En_3_Chapter.xhtml), [7](#527021_1_En_7_Chapter.xhtml),
    and [10](#527021_1_En_10_Chapter.xhtml), but in case you need a reminder or are
    not reading the chapters in sequential order, here is a review (feel free to skip
    this part and go to the business specifications if you already read this in prior
    chapters).


    Using a data set like results from a query, a partition, or a table variable,
    this function calculates the relative rank of each individual value relative to
    the entire data set (as a percentage). You need to multiply the results (the value
    returned is a float value between 0.0 and 1.0) by 100.00 or use the `FORMAT()`
    function to convert the results to a percentage format (this function returns
    a `FLOAT(53)` data type by the way).


    Recall that it works a lot like the `CUME_DIST()` and `RANK()` functions.


    The `RANK()` function returns the position of the value, while `PERCENT_RANK()`
    returns a percentage value.


    ## Business Specifications


    Our friendly business analyst supplies the following specifications:


    A report is needed that will show the percentage rank for quantity on hand for
    product “P101” for the year 2002. In other words, which month had the highest
    inventory on hand, and which month had the lowest? This is required to further
    assess how much inventory is not moving. The report needs to refer to location
    “LOC1,” inventory “INV1,” and warehouse “WH112.” As usual, the quarter and month
    names need to be spelled out. The results need to be copied to a Microsoft Excel
    spreadsheet so a Pareto chart can be created to enable visualization for analysis.


    Note: A Pareto chart is a chart that includes both bars and lines and was invented
    by Vilfredo Pareto, an Italian economist.


    ## Query


    Here is the query that addresses these requirements. We are back to using the
    `APInventory` database instead of the inventory data warehouse database.


    Please refer to Listing [13-6](#527021_1_En_13_Chapter.xhtml#PC7).


    ```sql

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate) - 1))

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,SUM([InvIn] - [InvOut]) + 50 AS QtyOnHand

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY AsOfYear

    ORDER BY SUM([InvIn] - [InvOut]) + 50

    ),''P'') AS PercentRank

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GROUP BY AsOfYear,

    DATEPART(qq,AsOfDate),

    AsOfMonth,

    EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate) - 1)),

    Locid,

    InvId,

    WhId,

    ProdId

    ORDER BY AsOfYear,

    AsOfMonth,

    Locid,

    InvId,

    WhId,

    ProdId

    GO

    ```


    Listing 13-6: Percent Rank for Product P101 for 2002


    ## Results


    We have seen the `WHERE` clause and of course the `CASE` blocks, so we do not
    need to comment on these except to say we need index coverage for the columns
    in the `OVER()` clause and `WHERE` clause. The `CASE` block works well, but a
    join to the enhanced Calendar table should be considered in case there are performance
    problems.


    The function uses an `OVER()` clause with both a `PARTITION BY` and an `ORDER
    BY` clause. The partition is by year, and the sort that specifies how the function
    will be applied to the partition is by the quantity on hand value. Notice that
    a `CTE` block was not required.


    Lastly, the `FORMAT()` function was used to display the results as a percentage
    for esthetics (makes the report look pretty).


    Please refer to the partial results in Figure [13-25](#527021_1_En_13_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig25_HTML.png)


    Figure 13-25: Monthly percent rank for quantity on hand. A screenshot of the SQLSSMS
    window with a table of 13 columns and 13 rows. The column headers are as of year,
    as of quarter, as of quarter name, as of month, average month name, no column
    name, location ID, inventory ID, warehouse ID, product ID, quantity on hand, and
    percent rank.


    The report generates 12 rows, one for each month of 2002. This report can be expanded
    to include all years so a thorough historical analysis can be made to see how
    the product sold throughout the years. We can easily see the low and high percentages
    and all values in between. Looks like July had the highest value for quantity
    on hand, so that means sales for this product in July were low. It would be interesting
    to combine this report with the `LAG()` function in order to compare how the product
    moved in prior years (as luck would have it, we have data from 2002 onward, so
    no 2001 data except for December).


    Let’s copy the results into our Microsoft Excel spreadsheet so we can create a
    Pareto chart.


    Please refer to Figure [13-26](#527021_1_En_13_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig26_HTML.png)


    Figure 13-26: Percentage rank Pareto chart. A screenshot of the MS Excel window.
    It has a table of 4 columns and 13 rows. The column headers are quarter, month,
    quantity, and percent rank. It also has a dual y-axis Pareto chart of average
    quantity and percent rank versus month. Bars have a decreasing trend. The line
    has an increasing trend.


    I think this is an interesting chart. Notice the bars decrease and the line increases.
    This shows the high to low inventory on hand amounts together with the percentages.
    The line is related to the % rank values. Blocks represent the monthly quantities.
    The data table shows the months are sorted as we expect, but the Pareto chart
    reorders them, so the bars decrease as we proceed from left to right.


    ## Homework


    Modify the query so it generates results for all years and use the `LAG()` function
    to display last month’s, last quarter’s, and last year’s results for each of the
    current months. Perform our usual performance analysis to see how the query performs.
    Practice your Microsoft Excel skills and generate a graph for each year.'
  raw: '### PERCENT_RANK( ) Function


    Next on deck is the `PERCENT_RANK()` function.


    Recall what it does?


    We covered this in Chapters [3](#527021_1_En_3_Chapter.xhtml), [7](#527021_1_En_7_Chapter.xhtml),
    and [10](#527021_1_En_10_Chapter.xhtml), but in case you need a reminder or are
    not reading the chapters in sequential order, here is a review (feel free to skip
    this part and go to the business specifications if you already read this in prior
    chapters).


    Using a data set like results from a query, a partition, or a table variable,
    this function calculates the relative rank of each individual value relative to
    the entire data set (as a percentage). You need to multiply the results (the value
    returned is a float value between 0.0 and 1.0) by 100.00 or use the `FORMAT()`
    function to convert the results to a percentage format (this function returns
    a `FLOAT(53)` data type by the way).


    Recall that it works a lot like the `CUME_DIST()` and `RANK()` functions.


    The `RANK()` function returns the position of the value, while `PERCENT_RANK()`
    returns a percentage value.


    Our friendly business analyst supplies the following specifications:


    A report is needed that will show the percentage rank for quantity on hand for
    product “P101” for the year 2002\. In other words, which month had the highest
    inventory on hand, and which month had the lowest? This is required to further
    assess how much inventory is not moving. The report needs to refer to location
    “LOC1,” inventory “INV1,” and warehouse “WH112.” As usual, the quarter and month
    names need to be spelled out. The results need to be copied to a Microsoft Excel
    spreadsheet so a Pareto chart can be created to enable visualization for analysis.


    Note


    A Pareto chart is a chart that includes both bars and lines and was invented by
    Vilfredo Pareto, an Italian economist.


    Here is the query that addresses these requirements. We are back to using the
    `APInventory` database instead of the inventory data warehouse database.


    Please refer to Listing [13-6](#527021_1_En_13_Chapter.xhtml#PC7).


    ```

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate) - 1))

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,SUM([InvIn] - [InvOut]) + 50 AS QtyOnHand

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY AsOfYear

    ORDER BY SUM([InvIn] - [InvOut]) + 50

    ),''P'') AS PercentRank

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GROUP BY AsOfYear,

    DATEPART(qq,AsOfDate),

    AsOfMonth,

    EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate) - 1)),

    Locid,

    InvId,

    WhId,

    ProdId

    ORDER BY AsOfYear,

    AsOfMonth,

    Locid,

    InvId,

    WhId,

    ProdId

    GO

    Listing 13-6

    Percent Rank for Product P101 for 2002

    ```


    We have seen the `WHERE` clause and of course the `CASE` blocks, so we do not
    need to comment on these except to say we need index coverage for the columns
    in the `OVER()` clause and `WHERE` clause. The `CASE` block works, well but a
    join to the enhanced Calendar table should be considered in case there are performance
    problems.


    The function uses an `OVER()` clause with both a `PARTITION BY` and an `ORDER
    BY` clause. The partition is by year, and the sort that specifies how the function
    will be applied to the partition is by the quantity on hand value. Notice that
    a `CTE` block was not required.


    Lastly, the `FORMAT()` function was used to display the results as a percentage
    for esthetics (makes the report look pretty).


    Please refer to the partial results in Figure [13-25](#527021_1_En_13_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig25_HTML.png)


    A screenshot of the S Q L S S M S window with a table of 13 columns and 13 rows.
    The column headers are as of year, as of quarter, as of quarter name, as of month,
    average month name, no column name, location I D, inventory I D, warehouse I D,
    product I D, quantity on hand, and percent rank.


    Figure 13-25


    Monthly percent rank for quantity on hand


    The report generates 12 rows, one for each month of 2002\. This report can be
    expanded to include all years so a thorough historical analysis can be made to
    see how the product sold throughout the years. We can easily see the low and high
    percentages and all values in between. Looks like July had the highest value for
    quantity on hand, so that means sales for this product in July were low. It would
    be interesting to combine this report with the `LAG()` function in order to compare
    how the product moved in prior years (as luck would have it, we have data from
    2002 onward, so no 2001 data except for December).


    Let’s copy the results into our Microsoft Excel spreadsheet so we can create a
    Pareto chart.


    Please refer to Figure [13-26](#527021_1_En_13_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig26_HTML.png)


    A screenshot of the M S Excel window. It has a table of 4 columns and 13 rows.
    The column headers are quarter, month, quantity, and percent rank. It also has
    a dual y-axis Pareto chart of average quantity and percent rank versus month.
    Bras have a decreasing trend. The line has an increasing trend.


    Figure 13-26


    Percentage rank Pareto chart


    I think this is an interesting chart. Notice the bars decrease and the line increases.
    This shows the high to low inventory on hand amounts together with the percentages.
    The line is related to the % rank values. Blocks represent the monthly quantities.
    The data table shows the months are sorted as we expect, but the Pareto chart
    reorders them, so the bars decrease as we proceed from left to right.


    Homework


    Modify the query so it generates results for all years and use the `LAG()` function
    to display last month’s, last quarter’s, and last year’s results for each of the
    current months. Perform our usual performance analysis to see how the query performs.
    Practice your Microsoft Excel skills and generate a graph for each year.'
  trans: '

    # PERCENT_RANK() 函数


    接下来要介绍的是 `PERCENT_RANK()` 函数。


    还记得它的作用吗？


    我们已经在第 3、7 和 10 章中讨论过，但万一你需要回顾，或者没有按顺序阅读各章，这里提供一个简要复习（如果你已经在之前的章节读过，可以直接跳到这里，转到业务规范部分）。


    使用诸如查询结果、分区或表变量这样的数据集，该函数会计算每个值相对于整个数据集的相对排名（以百分比形式）。你需要将结果（返回的值是一个介于 0.0 和 1.0
    之间的浮点值）乘以 100.00，或者使用 `FORMAT()` 函数将结果转换为百分比格式（顺便说一句，此函数返回的数据类型是 `FLOAT(53)`）。


    回顾一下，它的功能与 `CUME_DIST()` 和 `RANK()` 函数非常相似。


    `RANK()` 函数返回值的位置，而 `PERCENT_RANK()` 返回的是一个百分比值。


    ## 业务规范


    我们友好的业务分析师提供了以下规范：


    需要一份报告，显示 2002 年产品“P101”库存数量的百分比排名。换句话说，哪个月库存量最高，哪个月最低？这是为了进一步评估有多少库存没有流动。报告需要参照位置“LOC1”、库存“INV1”和仓库“WH112”。照例，季度和月份名称需要拼写完整。结果需要复制到
    Microsoft Excel 电子表格中，以便创建帕累托图，实现可视化分析。


    注意：帕累托图是一种包含柱状图和折线图的图表，由意大利经济学家维尔弗雷多·帕累托发明。


    ## 查询


    以下是满足这些要求的查询。我们回到使用 `APInventory` 数据库，而不是库存数据仓库数据库。


    请参考清单 13-6。


    ```sql

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate) - 1))

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,SUM([InvIn] - [InvOut]) + 50 AS QtyOnHand

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY AsOfYear

    ORDER BY SUM([InvIn] - [InvOut]) + 50

    ),''P'') AS PercentRank

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GROUP BY AsOfYear,

    DATEPART(qq,AsOfDate),

    AsOfMonth,

    EOMONTH(CONVERT(VARCHAR,YEAR(AsOfDate)),(MONTH(AsOfDate) - 1)),

    Locid,

    InvId,

    WhId,

    ProdId

    ORDER BY AsOfYear,

    AsOfMonth,

    Locid,

    InvId,

    WhId,

    ProdId

    GO

    ```


    清单 13-6: 2002 年产品 P101 的百分比排名查询


    ## 结果


    我们已经了解了 `WHERE` 子句和 `CASE` 代码块，因此除了需要说明 `OVER()` 子句和 `WHERE` 子句中的列需要索引覆盖外，无需额外注释。`CASE`
    代码块效果良好，但万一遇到性能问题，可以考虑连接到增强的 Calendar 表。


    该函数使用了一个包含 `PARTITION BY` 和 `ORDER BY` 子句的 `OVER()` 子句。分区按年份划分，指定函数如何应用于分区的排序依据是库存数量值。请注意，这里并不需要
    `CTE` 代码块。


    最后，使用了 `FORMAT()` 函数将结果显示为百分比，以追求美观（让报告看起来更漂亮）。


    请参考图 13-25 中的部分结果。


    ![](img/527021_1_En_13_Fig25_HTML.png)


    图 13-25: 库存数量的月度百分比排名。SQLSSMS 窗口的屏幕截图，包含一个 13 列 13 行的表格。列标题为：所属年份、所属季度、所属季度名称、所属月份、月份名称、无列名、位置
    ID、库存 ID、仓库 ID、产品 ID、库存数量、百分比排名。


    该报告生成 12 行数据，对应 2002 年的每个月。可以扩展此报告以包含所有年份，从而进行全面的历史分析，观察该产品历年的销售情况。我们可以轻松地看到最高和最低的百分比以及其间的所有值。看起来七月的库存数量值最高，这意味着该产品在七月的销量较低。结合
    `LAG()` 函数来比较该产品在往年（幸运的是，我们有 2002 年以来的数据，所以除了 2001 年 12 月外没有 2001 年的数据）的销售情况会很有趣。


    让我们将结果复制到 Microsoft Excel 电子表格中，以便创建帕累托图。


    请参考图 13-26。


    ![](img/527021_1_En_13_Fig26_HTML.png)


    图 13-26: 百分比排名帕累托图。MS Excel 窗口的屏幕截图。它包含一个 4 列 13 行的表格。列标题为：季度、月份、数量、百分比排名。图表还有一个双
    Y 轴的帕累托图，显示了平均数量和百分比排名随月份的变化。柱状图呈下降趋势。折线图呈上升趋势。


    我认为这是一个有趣的图表。注意柱状图下降而折线图上升。这显示了从高到低的库存量及其对应的百分比。折线图与百分比排名值相关。柱状图代表月度数量。数据表显示月份按我们预期的顺序排列，但帕累托图重新排序了它们，使得柱状图从左到右递减。


    ## 作业


    修改查询，使其生成所有年份的结果，并使用 `LAG()` 函数显示每个当前月份的上月、上季度和去年的结果。进行我们通常的性能分析，以查看查询的表现如何。练习你的
    Microsoft Excel 技能，为每一年生成一张图表。

    '
- fmt: '### Performance Considerations


    Here comes our estimated query plan analysis. The pattern of the branches should
    be very different as we are now using the inventory transaction database, and
    we will not see all the joins we saw when we were creating `STAR` and `SNOWFLAKE`
    queries. Also, the `Warehouse` table has only about 25,000 rows, big difference
    from the data warehouse fact table with almost one million rows. Please refer
    to Figure [13-27](#527021_1_En_13_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig27_HTML.png)


    A screenshot of the `SQLSSMS` window. It presents an estimated query execution
    plan with 13 components. The components are nested loops, table spool, segment,
    compute scalar, sort, stream aggregate, sort, compute scalar, clustered index,
    nested loops, stream aggregate, table spool, and table spool.


    **Figure 13-27**

    Estimated query execution plan


    As usual, let’s concentrate on the high-cost tasks. Right to left we see a clustered
    index seek with a cost of 62%, so all the indexes we created throughout our examples
    are paying off. A new index was not suggested, so it looks like we are on the
    right path.


    Here come the `IO` and `TIME` statistics. Please refer to Figure [13-28](#527021_1_En_13_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig28_HTML.png)


    A screenshot of the `SQLSSMS` window. The text presents `IO` and `TIME` statistics.
    The `SQL server parse and compile times` for `CPU` and `elapsed` are 0 and 0 milliseconds.
    The `SQL server execution times` for `CPU` and `elapsed` are 0 and 137 milliseconds.
    12 rows of 2 tables are affected.


    **Figure 13-28**

    `IO` and `TIME` statistics for percent rank calculation


    These are not too bad, but the `SQL Server` execution time is high, compared with
    the other times we have been experiencing. It comes in at 137 ms. The parse time
    is low at 0 ms.


    The work table shows 3 scans and 32 logical reads, while the `Warehouse` table
    has a scan count value of 1, 142 logical reads, and 3 physical reads.


    Our conclusion is that this function takes up more resources than the other window
    functions we have been using in this chapter, so it needs special attention. Keep
    in mind we also did some reformatting of the results by using the `FORMAT()` function.
    This makes the report look pretty, but do we really need it? Depends on your business
    analyst!


    **Homework**

    Modify the query so that it does not use the `FORMAT()` function. Also modify
    the query so it does not use the text date parts, just the numbers. Perform our
    usual query plan and `IO/TIME` statistics analysis to see if there is any significant
    improvement. Don’t forget to run `DBCC` before each run in order to clear cache.


    ### PERCENTILE_CONT( ) Function


    Here comes the description of the function. If you read about it in prior chapters
    and are comfortable with how it works, feel free to skip this discussion. If you
    need a refresher, please read on!


    We will discuss the `PERCENTILE_CONT()` function first, and what does this function
    do?


    Well, if you read Chapters [3](#527021_1_En_3_Chapter.xhtml), [7](#527021_1_En_7_Chapter.xhtml),
    and [10](#527021_1_En_10_Chapter.xhtml), you will recall that it works on continuous
    sets of data. Recall what continuous data is.


    Continuous data is data measured over a period of time, like boiler temperatures
    in equipment over a 24-hour period or equipment failures over a period of time,
    in our case inventory movement over a period of time. Summing up each boiler temperature
    to arrive at a total makes no sense. Summing up the boiler temperatures and then
    dividing them by the time period to get an average does. Lastly, summing up the
    values of inventory in movements makes no sense as 99% of the time out movements
    occur, so a total monthly sum will not indicate how much inventory there is in
    stock unless no inventory was removed from stock. Adding up all inventory in movements
    and then subtracting all the out inventory movements works as it would result
    in how much inventory is left. So all this can become very tricky.


    `So we can say continuous data can be measured by using formulas like average
    and so on.`


    This works for inventory on hand each day. We can add up all the quantities on
    hand for each day of the month and then generate the average per month.


    In conclusion, the `PERCENTILE_CONT()` function works on a continuous set of data
    based on a required percentile so as to return a value within the data set that
    satisfies the percentile (you need to supply a percentile as a parameter, like
    .25, .50, .75, etc.). With this function the value is interpolated, meaning it
    usually does not exist. Or by coincidence it could use one of the values in the
    data set if the numbers line up correctly. It can happen.


    Here come the business requirements for this query:


    Our business analyst keeps picking on the same product, location, inventory, and
    warehouse. This time, they would like us to generate the 25th, 50th, and 75th
    continuous percentiles across the year 2002 as a starting point. As usual, the
    quarter and month names need to be spelled out, and the month number needs to
    be included so when the data is copied to a Microsoft Excel spreadsheet, it can
    be sorted by month number if necessary. The quantities on hand need to represent
    what is left in inventory on the last day of the month. Therefore, the values
    are calculated by summing up all inventory movements in minus inventory movements
    out each day of the month, to arrive at the total quantity on the last day of
    the month.


    Here is what we came up with. Please refer to Listing [13-7](#527021_1_En_13_Chapter.xhtml#PC8).'
