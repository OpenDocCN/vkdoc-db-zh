    **图 13-48** 库存数量 – 上月仓库视图


    观察第一季度的三月份，我们可以看到仓库“WH111”的 `上月汇总` 值正确地指向了二月份在 `月库存数量汇总` 列中的对应数值。


    让我们深入分析其中一个仓库，以便在产品级别查看结果。请参考 图 13-49。


    ![](img/527021_1_En_13_Fig49_HTML.png)


    一张包含 11 列、13 行表格的 `SQL SRS` 窗口截图。列标题为 `Inv year`、`Inv quarter name`、`Inv month
    name`、`location I D`、`warehouse I D`、`product type`、`product I D`、`monthly sum
    quantity on hand`，以及 `prior month`、`quarter` 和 `year sums in prior product view`。


    **图 13-49** 库存数量 – 上月产品视图


    此报表也显示了正确的上月数值，但这次是在产品级别。如果不是因为月份名称排序错误，这份报表本应获得最高分！


    我修复了这份报表，接下来的截图显示了月份按正确顺序排序。请参考 图 13-50。


    ![](img/527021_1_En_13_Fig50_HTML.png)


    一张包含 11 列、13 行表格的 `SQL SRS` 窗口截图。列标题为 `inv year`、`inv quarter name`、`inv month
    name`、`location I D`、`warehouse I D`、`product type`、`product I D`、`monthly sum
    quantity on hand`，以及 `prior month`、`quarter` 和 `year sums in fixed sort order`。


    **图 13-50** 修复后的排序顺序


    这样就好多了。只需要单击月份名称列的属性，并将排序顺序更改为按月份数字排序，而不是按月份名称排序。从视觉上看，你将看到月份名称按正确顺序显示。这可以在 `报表生成器`
    中完成，甚至可以直接在网站上编辑报表。


    让我们看看如何实现这一点。请参考 图 13-51。


    ![](img/527021_1_En_13_Fig51_HTML.png)


    一张 `SQL Server Reporting Services` 主页的截图。它展示了两个名为“库存排名”和“报表部件”的文件夹以及 6 个分页报表。一个名为
    `Prior Inventory Quantities` 的对话框包含 8 个选项。一个箭头指向 `在报表生成器中编辑`。


    **图 13-51** 修复月份排序顺序，第 1 部分


    我们要修复名为 `PriorInventoryQuantities` 的报表。单击报表名称右上角的三个点以显示包含多个选项的菜单。单击 “`在报表生成器中编辑`”。如果
    `报表生成器` 已安装在你的计算机上，它将会启动。


    **注意**


    如果你的报表位于实际服务器上，则需要在服务器上安装 `报表生成器`。


    一旦它在设计模式下加载了此报表，我们只需更改此列的排序参数。这非常容易操作。请参考 图 13-52。


    ![](img/527021_1_En_13_Fig52_HTML.png)


    一张 `SQL Server Reporting Services` 主页的截图。它显示了 `Microsoft 报表生成器` 中的 `Prior Inventory
    Quantities` 文件。一个名为“组属性”的弹出对话框左面板有 7 个选项，其中选择了 `排序`。右面板有排序选项。


    **图 13-52** 修复月份排序顺序，第 2 部分


    在底部的 `行组` 部分，找到有问题的列。单击其右侧的向下箭头，然后选择 `组属性`。这将显示如上图所示的对话框，只需单击 `排序依据` 列表框并向下滚动到要排序的列。


    一旦选定，单击 `确定` 按钮并退出 `报表生成器`。你将看到一个黄色的 `更新报表部件` 消息，说明报表已在服务器上更新。请确保也在本地保存了它！你肯定不想在笔记本电脑上重新发布本地报表并覆盖掉所做的更改。


    就是这么简单。接下来是你的课后作业，完成后我们将结束本章。


    ## 作业


    使用 `报表生成器`，利用 `APInventory` 数据库或 `APInventoryWarehouse` 数据仓库创建你想要的任何类型的报表。如果你没有在计算机或服务器上安装
    `SSRS`，则无需发布它。


    如果你尚未下载 `报表生成器`，只需进行网络搜索，下载并安装即可。使用标准的 Microsoft 安装程序即可完成，只需几个步骤。最后一章将向你展示在哪里可以找到并下载本书中使用的所有工具。


    ## 总结


    我们成功了。我们的旅程已到达终点。在本章中，我们最后一次将分析函数应用于库存管理场景。我们使用了两个数据库：一个名为 `APInventory` 的库存事务数据库和一个名为
    `APInventoryWarehouse` 的数据仓库。


    我们根据业务分析师的规格说明执行了常见的脚本创建，并查看了结果。在某些情况下，我们利用查询的输出创建了有趣的 `Microsoft Excel` 可视化图表。


    最后，我们执行了惯常的性能分析和增强，并学习了在 `Microsoft Excel` 电子表格中分析性能统计信息的技术。


    我们以一个示例结束了本章，该示例演示了使用 `报表生成器` 创建的 `SSRS` 网络报表的深入分析功能。我们甚至看到了如何在报表发布后纠正其中的错误。我多希望可以说我是故意的，但我确实犯了这个错误！


    正如俗话所说，如果生活给了你柠檬，那就做成柠檬汁吧。


    在最后一章，我们将对冒险历程中所涵盖的内容进行简要总结，并结束全部内容。我还将向你展示在哪里可以获取：


    *   `SQL Server Developer`（免费开发者许可证）

    *   `Visual Studio Community`（免费开发者许可证）

    *   `SQL Server Data Tools (SSMS)`（通过 `Visual Studio Installer` 安装）

    *   `SSAS` 服务器和 `Visual Studio` 项目支持

    *   `SSIS` 服务器和 `Visual Studio` 项目支持

    *   来自 Microsoft 网站的 `SSMS` 下载安装程序（用于管理 `SQL Server` 和 `SSAS`）

    *   `报表生成器`（免费开发者许可证）

    *   `Microsoft Excel` – 这个需要付费，但物有所值


    `SQL Server Data Tools`、`SSRS`、`SSAS` 和 `SSIS` 安装程序是从 `Visual Studio Community
    Installer` 下载的。如果你没有 `SQL Server` 的免费开发者许可证，请确保先下载并安装它，因为它不仅会安装 `SQL Server` 实例，还会安装
    `SSAS`、`SSIS` 和 `SSRS` 服务器。


    # 14. 总结、结论与后续步骤


    ## 总结


    恭喜！这是我们的最后一章。让我们通过总结所学内容，并查看我们工具包中的工具以及获取途径来结束。我甚至可能会告诉你如何创建数据库并加载数据！我们还将讨论如何设置用于存储代码和物理数据库文件的文件夹。


    我建议你先创建文件夹、创建数据库并加载数据，这样在阅读各章节时，你就可以跟着一起操作和练习。

