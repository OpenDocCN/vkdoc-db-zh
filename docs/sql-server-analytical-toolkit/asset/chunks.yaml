    CustId               VARCHAR(32)   NOT NULL,

    PortfolioNo          VARCHAR(32)   NOT NULL,

    Portfolio            VARCHAR(64)   NOT NULL,

    MonthlyValue         DECIMAL(10,2) NOT NULL

    );

