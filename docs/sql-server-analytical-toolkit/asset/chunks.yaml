    略微增加到 3，而预读取从 38,135 次下降到 71 次。


    Customer 表的统计信息在创建索引前后均保持不变。（这是合理的，因为索引是在另一张表上创建的。）


    总结一下 SQL Server 的执行时间：CPU 时间从 485 毫秒减少到 0 毫秒，经过的执行时间从 2926 毫秒减少到 48 毫秒。


    看来我们确实需要处理大量的数据行，才能看到索引如何提高或在某些情况下降低性能。


    最后一点说明，随着你持续对查询进行分析，生成的统计信息会每次都有所不同，因此请确保使用 `DBCC` 命令清除所有内存缓冲区。


    此外，请将 `DBCC` 和 `SET STATISTICS ON` 步骤与查询分开执行；否则，如果你将它们一起运行，你将得到这两个小步骤和被评估查询的统计信息。这可能会令人困惑。


    ### VAR() 和 VARP() 函数


    `VAR()` 和 `VARP()` 函数用于生成数据样本中一组值的方差。与 `STDEV()/STDEVP()` 示例中使用的数据集相关的相同讨论，也适用于
    `VAR()` 和 `VARP()` 函数相对于数据总体的情况。


    当整个数据集未知或不可用时，`VAR()` 函数在数据的部分集合上工作；而当整个数据集总体已知时，`VARP()` 函数在整体数据集总体上工作。


    因此，如果你的数据集包含十行，函数名以 P 结尾的在处理值时将包含全部十行；不以字母 P 结尾的则会查看 N – 1 行（即 10 – 1 = 9 行）。


    那么，*方差* 到底是什么意思呢？


    通俗地说，如果你取每个值与平均值的所有差值，将结果平方，然后将所有结果相加，最后除以数据样本的数量，你就得到了方差。


    对于我们的场景，假设我们有一些数据预测了我们某一产品在特定年份的销售额。当产品的销售数据最终生成后，我们希望看到销售数字与预测值有多接近或多远。它回答了以下问题：


    *   我们是否未达到目标？

    *   我们是否达到了目标？

    *   我们是否超出了目标？


    顺便提一下，这个统计公式也在附录 B 中讨论。我们将编写 TSQL 代码来复制 `STDEV()` 和 `VAR()` 函数。让我们看看它们是否能得到相同的结果！


    让我们查看在清单 [2-10](#527021_1_En_2_Chapter.xhtml#PC17) 中使用这些函数的查询。


    ```sql

    WITH CustomerPurchaseAnalysis

    (PurchaseYear,PurchaseMonth,StoreNo,ProductNo,CustomerNo,TotalSalesAmount)

    AS

    (

    SELECT

    YEAR(CalendarDate)  AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    StoreNo,

    ProductNo,

    CustomerNo,

    SUM(TransactionQuantity * UnitRetailPrice) AS TotalSalesAmount

    FROM StagingTable.SalesTransaction

    GROUP BY YEAR(CalendarDate),MONTH(CalendarDate),

    ProductNo,CustomerNo,StoreNo

    )

    SELECT

    cpa.PurchaseYear,

    cpa.PurchaseMonth,

    cpa.StoreNo,

    cpa.ProductNo,

    c.CustomerNo,

    c.CustomerFullName,

    CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount) AS TotalSalesAmount,

    AVG(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ORDER BY cpa.PurchaseMonth) AS AvgPurchaseCount,

    VAR(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ORDER BY cpa.PurchaseMonth

    ) AS VarTotalSales,

    VARP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ORDER BY cpa.PurchaseMonth

    ) AS VarpTotalSales,

    VAR(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ) AS VarTotalSales,

    VARP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ) AS VarpYearTotalSales

    FROM CustomerPurchaseAnalysis cpa

    JOIN DimTable.Customer c

    ON cpa.CustomerNo = c.CustomerNo

    WHERE cpa.CustomerNo = ''C00000008''

    AND PurchaseYear = 2011

    AND ProductNo = ''P00000038114'';

    GO

    ```

    清单 2-10

    计算销售方差


    基本上，我复制粘贴了标准差查询，并将 `STDEV()` 函数替换为 `VAR()` 函数。使用了常见的 CTE。我还注释掉了 Product 和 Customer
    列，因为从 `WHERE` 子句可以看出，它们只针对一个客户和一个产品。我这样做是因为结果列太多，显示效果不好。


    当你测试这些查询时，请随意取消注释它们，并获取多个客户的结果。同时显示客户和产品信息。


    让我们在图 [2-21](#527021_1_En_2_Chapter.xhtml#Fig21) 中查看结果。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig21_HTML.png)


    图 2-21

    比较样本方差与总体方差


    平均值和前两个方差列是按月滚动的值，如每个月的不同值所示。这些只包含 `ORDER BY` 子句，因此默认的窗口帧行为是：


    ```sql

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    最后两列既未指定 `PARTITION BY` 也未指定 `ORDER BY` 子句，因此默认行为是：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    如果你还没有这样做，请下载本章的代码并尝试这些示例。对于此示例，请取消客户和产品相关列的注释。当你熟悉代码后，也尝试查询多年的数据，然后是多个客户和产品的数据。最后，尝试调整
    `RANGE` 和 `ROWS` 子句，看看它们如何影响窗口帧行为。


    关于报告生成的一点建议：你不希望生成一份数据过多以至于无法阅读的报告。你可以创建一个 SSRS（SQL Server Reporting Services）可以使用的查询，其中包含所有客户、产品和年的数据。你需要做的只是在
    SSRS 报告中添加一些过滤器，这样用户就可以从下拉列表中选择他们想要查看的过滤器组合。'
  raw: 'Now we really have some interesting statistics. For the SQL Server parse and
    compile time step, CPU and elapsed time statistics went down from 32 and 62, respectively,
    to 0.


    Statistics for the work table remained the same.


    For the `SalesTransaction` we really see significant improvement in the logical
    read category, from 41,840 reads before the index was created to 76\. Physical
    reads went up a bit from 0 to 3, while read-ahead reads went down from 38,135
    to 71.


    Statistics for the Customer table remained the same, both before the index was
    created and after the index was created. (This makes sense as the index was created
    on a different table.)


    Wrapping it up with the SQL Server execution times, the CPU time went from 485
    ms to 0 ms, and the elapsed execution time went from 2926 ms to 48 ms.


    Looks like we really need a significant amount of data rows to work with to see
    how indexes improve or in some case decrease performance.


    One last comment, the statistics generated will vary from time to time as you
    keep performing analysis on your queries, so make sure you use the DBCC command
    to clear all memory buffers.


    Also, run the `DBCC` and `SET STATISTICS ON` steps separately from the query;
    otherwise, if you run them together, you will get statistics for both these little
    steps and the query being evaluated. This could be confusing.


    ### VAR( ) and VARP( ) Functions


    The `VAR`() and `VARP()` functions are used to generate the variance for a set
    of values in a data sample. The same discussion related to the data sets used
    in the `STDEV()/STDEVP()` examples applies to the `VAR()` and `VARP()` functions
    relative to population of the data.


    The `VAR()` function works on a partial set of the data when the entire data set
    is not known or available, while the `VARP()` function works on the whole data
    set population when it is known.


    So, if your data set consists of ten rows, these function names ending with P
    will include all ten rows when processing the values; the ones not ending in the
    letter P will look at N – 1 or 10 – 1 = 9 rows.


    Okay, so what does *variance* mean anyway?


    Informally, if you take all the differences of each value from the mean (average)
    and square the results and then add all the results and finally divide them by
    the number of data samples, you get the variance.


    For our scenario, let’s say we had some data that forecasted sales amounts for
    one of our products during any particular year. When sales data was finally generated
    for the product, we wanted to see how close or far the sales figures were from
    the forecast. It answers the questions:


    *   Did we miss our targets?


    *   Did we meet our targets?


    *   Did we exceed our targets?


    This statistical formula is also discussed in Appendix B by the way. We will develop
    TSQL code to duplicate the `STDEV()` and `VAR()` functions. Let’s see if they
    get the same results!


    Let’s check out our query that uses these functions in Listing [2-10](#527021_1_En_2_Chapter.xhtml#PC17).


    ```

    WITH CustomerPurchaseAnalysis

    (PurchaseYear,PurchaseMonth,StoreNo,ProductNo,CustomerNo,TotalSalesAmount)

    AS

    (

    SELECT

    YEAR(CalendarDate)  AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    StoreNo,

    ProductNo,

    CustomerNo,

    SUM(TransactionQuantity * UnitRetailPrice) AS TotalSalesAmount

    FROM StagingTable.SalesTransaction

    GROUP BY YEAR(CalendarDate),MONTH(CalendarDate),

    ProductNo,CustomerNo,StoreNo

    )

    SELECT

    cpa.PurchaseYear,

    cpa.PurchaseMonth,

    cpa.StoreNo,

    cpa.ProductNo,

    c.CustomerNo,

    c.CustomerFullName,

    CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount) AS TotalSalesAmount,

    AVG(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ORDER BY cpa.PurchaseMonth) AS AvgPurchaseCount,

    VAR(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ORDER BY cpa.PurchaseMonth

    ) AS VarTotalSales,

    VARP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ORDER BY cpa.PurchaseMonth

    ) AS VarpTotalSales,

    VAR(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ) AS VarTotalSales,

    VARP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(

    ) AS VarpYearTotalSales

    FROM CustomerPurchaseAnalysis cpa

    JOIN DimTable.Customer c

    ON cpa.CustomerNo = c.CustomerNo

    WHERE cpa.CustomerNo = ''C00000008''

    AND PurchaseYear = 2011

    AND ProductNo = ''P00000038114'';

    GO

    Listing 2-10

    Calculating Sales Variance

    ```


    Basically I did a copy and paste of the standard deviation query and just replaced
    the `STDEV()` functions with the `VAR()` functions. The usual CTE is used. I also
    commented out the Product and Customer columns as they are for one customer and
    one product as can be identified in the `WHERE` clause. I did this as the results
    had too many columns and they did not display well.


    When you test out these queries, please feel free to uncomment them and get results
    for more than one customer. Also display the customers and product.


    Let’s see the results in Figure [2-21](#527021_1_En_2_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig21_HTML.png)


    A screenshot of the S Q L S S M S window. It represents a table of 10 columns
    and 13 rows. The column headers are purchase year, purchase month, store number,
    total sales amount, average purchase count, Var total sales, Varp total sales,
    Var year total sales, and Varp year total sales.


    Figure 2-21


    Comparing variance vs. variance for the whole population


    The average and the first two variance columns are rolling monthly values as can
    be seen by the different values for each month. These only have an `ORDER BY`
    clause, so the default window frame behavior is


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    The last two columns do not specify either a `PARTITION BY` or an `ORDER BY` clause,
    so the default behavior is


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    If you have not done so already, download the code for this chapter and try these
    examples out. For this example, uncomment the customer- and product-related columns.
    When you are comfortable with the code, also try out the query for multiple years
    and then multiple customers and products. Lastly, try playing around with the
    `RANGE` and `ROWS` clauses to see how they affect window frame behavior.


    One comment on report generation: What you do not want to do is generate a report
    that has so much data that it cannot be read. You can create a query that SSRS
    (SQL Server Reporting Services) can use that includes data for all customers,
    products, and years. All you need to do is add some filters in the SSRS report
    so the user can pick and choose what combinations of the filters they want to
    view from a drop-down list.'
