    Estimated baseline execution plan, part 1


    Once again, no index is suggested, so we are off to a good start. Sometimes, you
    will see a plan that uses a table index, but another index is also suggested.
    We see the index seek task at 22% and the expensive sort task at 61% cost. We
    saw this pattern earlier, and we know who the culprit is. It’s the `DATEPART()`
    function, and we know what to do to improve performance. Sometimes performance
    improvement involves rewriting the query. Or sometimes rewriting the query will
    make things worse!


