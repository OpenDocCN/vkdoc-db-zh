    The script includes the `DDL` command to create the table and the `INSERT/SELECT`
    statement required to load the table. The `SELECT` statement is simply the four
    queries connected by the `UNION` operator to load the necessary columns required
    to link the equipment ID to the plant and location.


    So opportunities to solve design problems or enhance a database design surface
    when writing queries to satisfy business analyst or other user requirements. Always
    look for better, more efficient, and simpler ways to achieve a goal.


    Complex, hard-to-read code may impress your managers and friends, but simple code
    that does the job will make your users happy. After all, that’s what it is all
    about. Okay, I will get off my soapbox.


    As a homework assignment, modify the query we just discussed and replace the `UNION`
    code block with the name of this table in the `FROM` clause. Rerun the estimated
    query plan and `IO` and `TIME` statistics to see what improvements, if any, in
    performance are realized with this design enhancement.


    Also, pull out the `CTE` code and use it to build a report table. Run the query
    with the aggregate function against the report table. Any performance improvements?


    What do the estimated query plan and `TIME/IO` statistics show?


    I included the code for this homework assignment in the script for this chapter.
    Try it out on your own first and look at the code if you get stuck. The estimated
    query plan for this revision is drastically different and shorter.'
