    让我们创建索引，看看查询计划是否有所改善。请参考图 7-9a。


    ![](img/527021_1_En_7_Fig9_HTML.png)


    *图 7-9a：修订后的估计查询计划，前半部分*


    和往常一样，索引被使用了，但排序成本上升了。我们的老朋友 `Window Spool` 仍然保持 2% 的成本。让我们看看查询计划的后半部分。

