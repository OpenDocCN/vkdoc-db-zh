    *图 14-21*

    *Visual Studio 社区版*


    截至撰写本文时，网址是：


    `https://visualstudio.microsoft.com/vs/community/`


    下载并安装它。这需要一些时间。让安装过程开始，并确保手边有杯咖啡。你的耐心将得到一个强大开发环境的回报。


    ### SQL Server 数据工具


    这可以作为一个工作负载通过 Visual Studio Installer 下载。


    当你安装 Visual Studio 社区版许可证时，安装程序会出现在你的 Windows 菜单中。


    请参考图 14-22。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig22_HTML.png](img/527021_1_En_14_Fig22_HTML.png)

    *图 14-22*

    *安装“数据存储和处理”工作负载*


    运行 Visual Studio Installer 工具并选择你想要的特性。


    ### SQL Server SSAS 项目支持


    你可能也希望包含此功能，以便能够使用 Visual Studio 社区版创建 SQL Server 项目。


    请参考图 14-23。


