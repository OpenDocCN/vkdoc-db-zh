- fmt: '## Performance Considerations


    Let’s run our baseline execution plan in the usual manner. Our last plan has a
    linear configuration. I think you know this plan will have a multi-branch configuration
    with many joins.


    Please refer to Figure [11-29](#527021_1_En_11_Chapter.xhtml#Fig32).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig32_HTML.png)


    A screenshot of the window. The main page represents the execution plan. The arrows
    point towards a hash match cost of 1 percent, table scan cost of 1 percent, nested
    loops cost 47 percent, and index seek cost of 48 percent.


    Figure 11-29

    Baseline estimated execution plan


    Sure enough, we have a lopsided tree configuration. All the way at the bottom
    right-hand side, we see an index seek with a cost of 48%, a nested loops join
    task with a cost of 47%, and, last but not least at the top, a table scan on the
    `Calendar` table with a cost of 1% and a hash match join with a cost of 1%.


    Not a bad plan considering the size and complexity of the query and tables. Let’s
    look at the `IO` and `TIME` statistics for this complex query.


    Please refer to Figure [11-30](#527021_1_En_11_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig33_HTML.png)


    A screenshot of the window. The upper half of the main page depicts the S Q L
    query code and the lower half of the page is titled messages. The arrows point
    towards logical reads 27 and logical reads 1039.


    Figure 11-30

    Estimated IO and TIME statistics


    I highlighted the higher values only. Our friend the `Calendar` table has the
    usual 27 logical reads and 27 read-ahead reads, while our work table has 13 scans
    and 1,359 reads.


    Looking at the `InventoryHistory` table, we see only 1 scan and 1,039 logical
    reads, 2 physical reads, and 1,040 read-ahead reads. Recall this table has 2,945,280
    rows, so the results are pretty good performance-wise.


    Based on these statistics and also past statistics, since our `Calendar` table
    is small, I would place this in a memory-enhanced table.


    Homework


    Replace the `LIKE` predicate with an “=” predicate using the full correct name
    of the product. Create a new estimated query plan together with `IO` and `TIME`
    statistics to see if there are any improvements. Don’t forget to run the `DBCC`
    command.


    More statistics coming right up!


    ## VAR( ) Function


    Here is the definition from Chapter [2](#527021_1_En_2_Chapter.xhtml) for this
    function. Again, skip it if you are comfortable with how it works and go to the
    business specifications for the example query.


    Read it if you read Chapter [1](#527021_1_En_1_Chapter.xhtml) and then jumped
    directly here because your interest is inventory management or some other related
    discipline.


    The `VAR()` function is used to generate the variance for a set of values in a
    data sample. The same discussion related to the data set used in the `STDEV()`
    example applies to the `VAR()` function relative to population of the data.


    The `VAR()` function works on a partial set of the data when the entire data set
    is not known or available.


    So, if your data set consists of ten rows, these functions not ending in the letter
    `P` will look at N – 1 or 10 – 1 = 9 rows.


    Okay, now that we got that out of the way, what does variance mean anyway?


    For us developers and non-statisticians, here’s a simple explanation:


    > `Informally, if you take all the differences of each value from the mean (average)
    and square the results and then add all the results and finally divide them by
    the number of data samples, you get the variance.`


    Reminder


    If you take the square root of the variance, you get the standard deviation, so
    there is some sort of relationship going on!


    It answers the following questions:


    *   Did we miss our targets?

    *   Did we meet our targets?

    *   Did we exceed our targets?


    Here are the business requirements for this next query:


    The business analyst wants to use the prior query we developed for the standard
    deviation and adopt it so we can calculate the variance, the standard deviation,
    and the average. Also, they want to see the standard deviation calculated in two
    ways, the first by the `STDEV()` function and the second method to be used as
    validation, by taking the square root of the variance.


    Here is the code we came up with in Listing [11-9](#527021_1_En_11_Chapter.xhtml#PC14).


    ```sql

    WITH YearlyWarehouseReport (

    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId

    ,WhId,ProdId,AvgQtyOnHand

    )

    AS

    (

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AVG(QtyOnHand) AS AvgQtyOnHand

    FROM Product.Warehouse

    GROUP BY AsOfYear

    ,DATEPART(qq,AsOfDate)

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    )

    SELECT AsOfYear

    ,AsOfQuarter

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AvgQtyOnHand AS MonthlyAvgQtyOnHand

    ,AVG(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear,WhId

    ORDER BY AsOfYear

    ) AS YearlyAvg

    ,VAR(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear,WhId

    ORDER BY AsOfYear

    ) AS YearlyVar

    ,STDEV(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear,WhId

    ORDER BY AsOfYear

    ) AS YearlySTDEV

    /* just to prove that the square root of the variance */

    /* is the standard deviation */

    ,SQRT(

    VAR(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear,WhId

    ORDER BY AsOfYear

    )

    ) AS MyYearlyStdev

    FROM YearlyWarehouseReport

    WHERE AsOfYear = 2003

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND ProdId =''P033''

    GO

    ```

    Listing 11-9

    Average, Variance, and Standard Deviation Report


    We are back to our usual `CTE`-based query. For all three functions, we set up
    an `OVER()` clause that includes a `PARTITION BY` and an `ORDER BY` clause. The
    partitions are set up by year and warehouse ID; the `ORDER BY` clause is set up
    by year.


    Once again, we start off with a small data set and use a `WHERE` clause, so we
    only get results for the year “2003”, location “LOC1”, inventory “INV1”, and product
    “P033” (these can be removed once the data is validated).


    The query can then be used for a Reporting Services (`SSRS`) report that includes
    filters so the analyst can slice and dice the report any way they want.


    Please refer to the partial results in Figure [11-31](#527021_1_En_11_Chapter.xhtml#Fig34).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig34_HTML.png)


    A screenshot of the window. The upper half of the main page presents the S Q L
    codes and the lower half of the page represents the result in the form of a table.


    Figure 11-31

    Average, variance, and standard deviation report


    Looking at the report, we see the partitions worked as expected and that the two
    standard deviation calculations matched, so we not only validated the results
    but proved that if we take the square root of the variance, we get the standard
    deviation.'
