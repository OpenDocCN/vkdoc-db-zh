    ## 股票代码分析


    让我们对一种名为美国铝业的金融工具进行一些统计分析。其股票代码是 `AA`。


    具体要求是报告 2012 年的最低低价、最高低价、最低高价和最高高价。请参考清单 5-18。


    ```sql

    SELECT QuoteYear

    ,QuoteQtr

    ,QuoteMonth

    ,QuoteWeek

    ,Ticker

    ,Company

    ,TickerDate

    ,[Low]

    ,[High]

    ,MIN([Low]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [Low]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MinLow

    ,MAX([Low]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [Low]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MaxLow

    ,MIN([High]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [High]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MinHigh

    ,MAX([High]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [High]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MaxHigh

    FROM [MasterData].[TickerPriceRangeHistoryDetail]

    WHERE Ticker = ''AA''

    AND QuoteYear = 2012

    ORDER BY Ticker

    ,QuoteYear

    ,QuoteQtr

    ,QuoteMonth

    ,QuoteWeek

    ,Company

    ,TickerDate

    GO

    ```

    清单 5-18

    美国铝业股票代码分析


    我们想建立一个按年、季、月、周和股票代码的分区。对于最低成交价，我们按 `Low` 列对分区进行排序；对于最高成交价，我们按 `High` 列对分区进行排序。


    一个窗口框架由以下定义：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    这个逻辑不仅能让我们看到每日的低点和高点，还能看到每周的最小值和最大值。


    将结果复制并粘贴到 Microsoft Excel 电子表格中，会得到一张非常有趣的图表。请参考图 5-47。


