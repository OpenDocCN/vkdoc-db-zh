  trans: '### 性能考量


    让我们运行通常的基线估计查询计划，看看此查询在性能方面的表现。请参考图 11-17。


    ![](img/527021_1_En_11_Fig17_HTML.png)


    一张截图。主页显示一个执行计划。箭头指向名为“排序成本 42%”、“窗口聚合成本 1%”、“排序成本 15%”、“索引查找成本 10%”和“聚集索引成本 13%”的阶段。


    图 11-17

    库存移动概况基线估计查询计划


    我们不会在此花太多时间，但看起来我们的索引覆盖范围还不够。我们看到在 `Warehouse` 表上有一个成本为 13% 的聚集索引查找，以及另外两个在 `Warehouse`
    表上、成本分别为 10% 和 1% 的索引查找。这是因为我们使用了一个名为 `WarehouseMonthly` 的 `VIEW`（视图），该视图基于 `Warehouse`
    表。


    我们还看到我们仍然需要创建以下索引：


    ```

    CREATE NONCLUSTERED INDEX ieInvOutInvInAsOfYearAsOfMonth

    ON [Product].[Warehouse] ([LocId],[InvId],[ProdId])

    INCLUDE ([InvOut],[InvIn],[AsOfYear],[AsOfMonth])

    GO

    ```


    最后，我们看到两个排序任务，成本分别为 15% 和 42%。所有其他任务的成本都很低。以下是此查询的 `IO` 和 `TIME` 统计信息。


    请参考图 11-18。


    ![](img/527021_1_En_11_Fig18_HTML.png)


    一张截图。主页标题为“消息”。箭头指向“经过时间等于 216 ms 和 2260 ms”、“逻辑读取 3652”、“物理读取 6”和“预读 3772”。


    图 11-18

    IO 和 TIME 统计信息


    临时表的值全为零，因此我们忽略这些。但对于 `Warehouse` 表，我们看到扫描计数为 10，逻辑读取为 3,652，物理读取为 6，预读为 3,772。查询执行时间为
    2260 毫秒。这确实是一个繁忙的查询。


    让我们创建推荐的索引，看看能获得哪些改进（如果有的话）。


    修订后的估计查询计划请参考图 11-18a。


    ![](img/527021_1_En_11_Fig19_HTML.png)


    一张截图。页面上半部分描绘了 SQL 代码，下半部分描绘了执行计划。箭头指向名为“排序成本 15%”、“索引查找成本 1%”和“索引查找成本 12%”的阶段。


    图 11-18a

    修订后的估计查询计划


    看起来好一些了。第一个索引查找任务的成本降低了；其他任务基本差不多，所以新索引带来了一些适度的改进。我们来看一下 `IO` 和 `TIME` 统计信息。


    新的 `IO` 和 `TIME` 统计信息请参考图 11-18b。


    ![](img/527021_1_En_11_Fig20_HTML.png)


    一张 SQL 工作区域的截图。主页面的上半部分描绘了库存订单详情的 SQL 代码。页面下半部分的标题是“消息”，箭头指向“扫描计数 10”、“物理读取 4”、“预读
    395”和“经过时间等于 511 ms”。


    图 11-18b

    修订后的估计查询计划 IO 和 TIME 统计信息


    这里的情况看起来好多了。`Warehouse` 表的计数大幅下降，执行时间也减少了。所以看起来推荐的索引见效了。


    让我们快速再看一下 `AVG()` 函数。


    ### AVG( ) 函数


    顾名思义，这个函数用于计算平均值，不过您应该已经知道了。让我们看看我们的业务分析师提供的业务需求说明：


    这次，我们的分析师想要查看库存移动值（特别是库存入库和库存出库）的滚动平均值。滚动平均值按年计算，而不是按月。


    清单 11-4 是该查询的代码。未显示的是 `CTE`，因为它与前一个查询中的 `CTE` 相同。


    ```

    SELECT MovementDate

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    ,Increment

    ,Decrement

    ,AVG(CONVERT(DECIMAL(10,5),Increment)) OVER (

    ORDER BY MovementDate

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MonthlyAvgIncr

    ,AVG(CONVERT(DECIMAL(10,5),Decrement)) OVER (

    ORDER BY MovementDate

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MonthlyAvgDecr

    FROM APInventory.Product.InventoryTransaction

    WHERE ProdId = ''P033''

    AND YEAR(MovementDate) = 2010

    AND MONTH(MovementDate) = 5

    AND WhId = ''WH112''

    GO

    ```


    清单 11-4

    库存移动入库和出库的年度滚动平均值


    这里使用了 `ROWS` 窗口框架规范来定义处理的范围。在此查询中，我们将范围定义为按年。对于当前行，我们（或者应该说 SQL Server）会考虑分区内所有在它之前的行和所有在它之后的行。


    请注意，我们根据业务分析师的要求筛选了 2010 年，但一旦我们测试通过，就可以修改为更多年份、月份以及所有位置、库存、仓库和产品。这将使其成为一个使用 Report
    Builder 创建的 `SSRS` 报告的良好候选。


    请参考图 11-19 中的部分结果以及一个漂亮的图表。


    ![](img/527021_1_En_11_Fig21_HTML.png)


    一张窗口截图，左侧代表 Excel 表格，右侧是一个多线图。各列标题为“日期”、“增量”、“减量”、“平均增长”和“平均减少”。一个移动量随日期变化的多线图描绘了波动趋势。


    图 11-19

    库存移动分析折线图和报告


    我们可以看到库存移动存在很多上下波动。这可以解释为有大量的销售发生。但业务分析师需要确认，库存出库移动不会导致许多延期交货的情况。这意味着客户需要等待他们订购的商品，可能导致客户不满意，并进而可能造成客户流失。'
- fmt: '### Performance Considerations


    Next, we need to analyze performance as usual, so let’s generate our baseline
    estimated query plan to see if this query needs some work or some indexes to support
    it for optimal performance.


    Please refer to Figure [11-20](#527021_1_En_11_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig22_HTML.png)


    A screenshot presents an execution plan on the main page of the window. The arrows
    point toward nested loops, parallelism, and table scans.


    Figure 11-20 Baseline estimated execution plan


    Not too complex, but this plan has three branches. We see an expensive table scan
    starting at the top right coming in at 83% cost followed by a compute scalar (cost
    1%), a parallelism task to gather streams of data (14% cost), and a nested loops
    join at 3%.


    And of course, an index is suggested that impacts the cost by 89.97%. Let’s create
    the index and see if this helps.


    Please refer to Listing [11-5](#527021_1_En_11_Chapter.xhtml#PC8).


    ```

    CREATE NONCLUSTERED INDEX ieWhIdProdIdMovementDate

    ON APInventory.Product.InventoryTransaction (WhId,ProdId)

    INCLUDE (Increment,Decrement,MovementDate,InvId,LocId)

    GO

    Listing 11-5

    Suggested Index

    ```


    Notice only two columns, the `WhId` and `ProdId` columns, but we need to include
    the other columns such as the `Increment`, `Decrement`, `MovementDate`, `InvId`,
    and `LocId` columns in the `INCLUDE` clause.


    After creating the index and rerunning the estimated query plan, we generate the
    revised estimated query plan. Please refer to Figure [11-21](#527021_1_En_11_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig23_HTML.png)


    A screenshot. The main page of the window displays the execution plan. The arrows
    point towards nested loops, table spool, segment, compute scalar, and index seek.


    Figure 11-21 The revised estimated query plan


    We can see the improvement. The table scan and parallelism task went away, and
    now an index seek appears with a cost of 32%. We see a table spool and of course
    the nested loops join with a cost of 48%. Once again, the estimated query analyzer
    came up with a good suggestion.


    ### Homework


    Try creating the index as a clustered index to see if there are significant improvements.
    Create the index and check out the estimated query plan and the `IO` and `TIME`
    statistics.


    `STAR` query time (or should I say `SNOWFLAKE` query time)?


    ### Data Warehouse Query


    Let’s see if querying a `SNOWFLAKE` data warehouse database will yield interesting
    performance characteristics compared with the query plans and statistics of the
    transactional database.


    The query is called a `STAR` query. This is because it uses the dimensions and
    fact table of a data warehouse that is designed using a `STAR` data model. Yes,
    it will work on a `SNOWFLAKE` schema also. I guess if you include some of the
    outrigger tables (like `PRODUCT TYPE`) connected to a dimension, you can call
    it a `SNOWFLAKE` query.


    **Note**: The term *outrigger table* refers to a dimension table linked to another
    dimension table, for example, Product Type to Product Subtype to Product. If you
    are unfamiliar with data warehouse models, check the Internet for articles that
    describe the different combinations of models and approaches used to design a
    data warehouse. For example, see the approaches Kimball takes vs. Inmon.


    We will take the specifications of the query we just discussed and modify them
    a bit, so we report on the sums and averages of the inventory levels.


    Please refer to Listing [11-6](#527021_1_En_11_Chapter.xhtml#PC9).


    ```

    SELECT C.CalendarYear

    ,C.CalendarMonth

    ,C.CalendarDate AS AsOfDate

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,P.ProdId

    ,P.ProdName

    ,QtyOnHand

    ,SUM(IH.QtyOnHand) OVER (

    ORDER BY C.CalendarMonth

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ) AS RollingSum

    ,AVG(SUM(CONVERT(DECIMAL(10,2),IH.QtyOnHand))) OVER (

    ORDER BY C.CalendarMonth

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ) AS RollingAvgOnHand

    FROM ApInventoryWarehouse.Fact.InventoryHistory IH

    JOIN Dimension.Calendar C

    ON IH.CalendarKey = C.CalendarKey

    JOIN Dimension.Location L

    ON IH.LocKey = L.LocKey

    JOIN Dimension.Warehouse W

    ON IH.WhKey = W.WhKey

    JOIN Dimension.Inventory I

    ON IH.InvKey = I.InvKey

    JOIN Dimension.Product P

    ON IH.ProdKey = P.ProdKey

    JOIN Dimension.ProductType PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    WHERE C.CalendarYear = 2010

    -- Was: AND C.[CalendarDate] = AsOfDate – last day of the month

    -- changed to below as Warehouse table now contains all days of the month

    -- prior version contained only the last day of the month

    AND C.[CalendarDate] = EOMONTH(CONVERT(VARCHAR,YEAR(C.[CalendarDate])),(MONTH(C.[CalendarDate])
    - 1))

    AND L.LocId = ''LOC1''

    AND I.InvId = ''INV1''

    AND W.WhId = ''WH111''

    AND P.ProdName LIKE ''French Type 1 Locomotive %''

    AND P.ProdId = ''P101''

    GROUP BY C.CalendarYear

    ,C.CalendarMonth

    ,C.CalendarDate

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,P.ProdId

    ,P.ProdName

    ,QtyOnHand

    GO

    Listing 11-6

    Example SNOWFLAKE Query

    ```


    Right away we notice we need a `GROUP BY` clause. But look at all of those `JOIN`
    predicates!


    ### Pop Quiz


    Why are we calling this a `SNOWFLAKE` query?


    Both the `SUM()` and `AVG()` functions utilize an `OVER()` clause that contains
    an `ORDER BY` clause but no `PARTITION BY` clause. A window frame clause is included:


    ```

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ```


    This only considers the current row and prior row being processed in the partition.


    Do you remember what the default window frame behavior is if we do not include
    a window frame specification?


    Here is a refresher from the table we discussed in Chapter [1](#527021_1_En_1_Chapter.xhtml)
    that identifies the default behavior of the `OVER()` clause under different combinations
    of `ORDER BY` and `PARTITION BY` clauses. Please refer to Table [11-3](#527021_1_En_11_Chapter.xhtml#Tab3).


    Table 11-3 Default ROWS and RANGE Behavior


    ```

    | ORDER BY | PARTITION BY | Default Frame |

    | --- | --- | --- |

    | No | No | ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING |

    | No | Yes | ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING |

    | Yes | No | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |

    | Yes | Yes | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW |

    ```


    A little review never hurts. Saves flipping back to Chapter 1 anyway.


    Let’s see what the estimated query plan looks like.'
