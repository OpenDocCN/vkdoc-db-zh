- fmt: '## Step 4: Generate the Report


    Our next and final step is to enhance the report by including the gap days in
    a comma-delimited string that appears in the report. Yes, this violates a normal
    form (repeating groups, `1NF`), but we are denormalizing the data pattern for
    the value it brings to the report.


    We will bring in the `STRING_AGG()` function to the rescue and include it in an
    embedded query in the `SELECT` clause (how will this affect performance?). This
    last query completes the chained `CTEs` (the query references `CTE3`, which queries
    `CTE2`, which queries `CTE1`).


    Please refer to Listing [6-22](#527021_1_En_6_Chapter.xhtml#PC27).


    ```

    SELECT CustId

    ,Symbol

    ,GapTradeDays

    ,GapStart

    ,GapEnd

    (

    SELECT STRING_AGG(CalendarDate,'','')

    FROM [MasterData].[Calendar]

    WHERE CalendarDate BETWEEN DATEADD(dd,1,GapStart)

    AND DATEADD(dd,-1,GapEnd)

    ) AS GapInTradeDays

    FROM FinalGapIslanCTE

    ORDER BY CustId

    ,Symbol

    ,GapStart

    GO

    Listing 6-22

    Assemble the Report

    ```


    The inline query that appears in the `SELECT` clause is a bit tricky in that it
    needs to skip the start and stop dates of the gap by using the `DATEADD()` function
    in the `BETWEEN` predicate. We add one day to the gap start day and deduct one
    day from the gap stop date. Remember that trades did occur on the start and stop
    dates, so they are not included in the gap days.


    These days are retrieved from the Calendar table and fed to the `STRING_AGG()`
    function so it can create a comma-delimited list for us. Very powerful! Let’s
    see the results.


    Please refer to Figure [6-46](#527021_1_En_6_Chapter.xhtml#Fig46).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig46_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a list with 26 rows and 6 columns with data on customer i d, symbol, gap trade
    days, gap start, gap end, and the gap in trade dates.


    Figure 6-46: Final gap report


    Looks good. Reminder, for the first gap (and all other gaps), notice we do not
    include the first and last days in the `GapInTradeDays` column as trades occurred
    on these days. It is the day (or days) in the middle where trades did not occur.


    Looking at row 18, trades occurred on June 13, 2012, and June 18, 2012, but no
    trades occurred between these two dates, and that is correctly displayed in the
    date list in the `GapInTradeDays` column. It correctly lists four dates as identified
    in the `GapTradeDays` column.


    That was easy. Let’s check out the estimated query plan for this large script
    that contains three chained `CTE`s and a query.


    ## Performance Considerations


    The estimated query plan for this script is large, so I split it up into two screenshots.
    We will not perform a rigorous analysis as we did with the previous examples we
    discussed, but it will be of interest to see what it looks like for a large script.


    Please refer to Figure [6-47](#527021_1_En_6_Chapter.xhtml#Fig47).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig47_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program and has 8 columns to give stream aggregate cost, window spool cost,
    2 segment cost, compute scalar cost, sequence project cost, sort cost, and Index
    seek cost. The sort cost is 7%. The index seek cost is 2%.


    Figure 6-47: First part of the estimated query plan (right side)


    Starting from right to left, we see a low-cost index seek at 2%. This is very
    efficient. Next is a sort step at 7% and a window spool at 1% (indicates spooling
    to storage and not memory). There are also a number of tasks with 0% costs, but
    we will ignore them as usual.


    This is not to say that when you perform your own analysis you should also ignore
    them. Analyze each step, not only the high-cost steps but also steps you do not
    understand what they do. Look up in the Microsoft documentation what these steps
    mean and then determine what impact, if any, they have. This way you expand your
    knowledge base related to performance tuning.


    Let’s take a peek at the second half of the estimated query plan. Please refer
    to Figure [6-48](#527021_1_En_6_Chapter.xhtml#Fig48).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig48_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program and query 1, which gives different values for nested loop cost, sort
    cost, stream aggregate cost, index spool cost, and table scan cost.


    Figure 6-48: Second part of the estimated query plan (left side)


    There is a lot more action going on here. At the first level we see a sort step
    at 7% cost followed by a second sort step at 3% cost. And, yes, one more sort
    step at 3% again.


    In the lower branch, we see a small table scan at 1% cost, an index spool at 63%,
    and a stream aggregate at 12%.


    Recall that the index spool means that search values get stored to temporary storage
    so they can be accessed more than once while the query is processing a partition.


    This task feeds a stream aggregate task (12% cost) and finally the nested loops
    join task. This type of join is what causes the index spool. Any type of spooling
    to storage can be expensive and is something we should always examine to see if
    we can improve it. As a last resort, implement `TEMPDB` on a solid-state disk
    so spooling is fast!


    Might as well set the `PROFILE STATISTICS` setting on and see what they look like
    for a large script. Please refer to Figure [6-49](#527021_1_En_6_Chapter.xhtml#Fig49).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig49_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a list with 25 rows and 12 columns. The column for estimate rows is highlighted.


    Figure 6-49: Query profile statistics


    The estimated `IO` statistics (`EstimateIO`) are low, and so are the estimated
    `CPU` statistics (`EstimateCPU`), for the most part. The very first `CPU` statistic
    is high at 5.419, which is for the first `CTE`. Row 7 of the results also has
    a high `CPU` statistic (`EstimateCPU`), which happens to be for a `CASE` block.
    There are two remaining segment steps with `CPU` (`EstimateCPU`) values at 3.8.


    Lastly, look at the estimated number of rows (`EstimateRows`) returned by each
    step. Here we see what is going on in those lines of various thickness between
    each step (as far as row volume). Interesting how the rows go from low to high
    and back to low as each step in the plan processes the data.


    Homework


    See if you can analyze this query faster and improve performance by modifying
    the query or adding indexes you feel might help.


    Time for a cup of coffee before we dive into modifying our last and final report
    so we can identify islands and also include gaps in the same report.


    ## Islands Next


    Our last objective for this chapter is to enhance our gap report to include islands.
    Recall islands are clusters of data that appear in sequence, like our trades that
    occur multiple days in a row.


    Recall that customers that trade every day for ten or more days, stop for three
    or four days, and then start trading again are an example of islands with a gap
    in between.


    The approach we take will be like the one we followed for the gap report, but
    generating the unique island text strings that will be used in the `GROUP BY`
    clause will be a bit of a challenge.


    The reason for this is that the `ROW_NUMBER()` function will return a unique value
    for each row in the island and it cannot be used by itself to generate the string.
    We will have to come up with a trick that involves the day of the month of a row
    and the difference between it and the row number value.'
