  trans: '

    # LAG( ) 函数


    我们进度落后了，所以接下来来看看下一个函数——`LAG()` 函数（糟糕的双关语！）。


    回顾一下 `LAG()` 函数的作用：


    该函数用于获取当前行某列值的前一个值（通常在时间维度内）。例如，给定工厂设备（如电机）本月的故障值，获取同一设备 ID 上个月的故障值，或者指定某个偏移量（如三个月前、甚至一年前或更久，这取决于收集了多少历史数据以及你的业务分析师想看什么）。


    用这个逻辑来计算差值。故障是上升还是下降了？这是监控设备故障迹象的关键测量指标！也许制造商需要一次严厉的谈话了？


    以下是我们分析师想要的查询的规格说明：


    需要一个查询来报告滞后一个月的故障率，以便将故障与当月的故障率进行比较。该报告需要包含年份、季度、月份的日历值，以及工厂名称和位置。每个月的值应该是该月所有故障的总和。因此，该报告本质上是历史性的。


    请参考代码清单 10-3。


    ```

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, MonthName, CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName, LocationName, CalendarYear, QuarterName, MonthName, CalendarMonth,
    SumEquipFailures,

    LAG(SumEquipFailures,1,0) OVER (

    PARTITION BY PlantName, LocationName, CalendarYear, QuarterName

    ORDER BY CalendarMonth

    ) AS LastFailureSum

    FROM FailedEquipmentCount

    WHERE CalendarYear > 2008

    GO

    ```


    ## 代码清单 10-3

    上月设备故障情况


    这个 `CTE` 查询包含一个五表联接 (`JOIN`)，加上 `SUM()` 函数和必不可少的 `GROUP BY` 子句。你知道这可能会导致性能问题。


    `OVER()` 子句包含一个 `PARTITION BY` 子句和一个 `ORDER BY` 子句。这意味着窗口帧的默认行为是


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```

    真的是这样吗？


    实际上，`LAG()` 和 `LEAD()` 函数也不能有窗口帧定义。这是个容易掉进去的陷阱！所以当你使用这个函数或 `LEAD()` 函数时，忘记窗口帧定义吧。如果你想想这些函数是如何工作的，这就说得通了。它们要么向前看，要么向后看，仅此而已！


    回到查询。分区是按工厂名称、位置名称、年份和季度设置的。分区按月份（数值）排序。


    最后，注意 `LAG()` 函数使用的参数；故障值被包含在内，1 表示回退一个月（第二个参数），0（第三个参数）表示用 0 替换任何 `NULL` 值。尝试更改要跳过的月份数，以感受该函数的工作原理。


    请参考图 10-9 中的部分结果。


    ![](img/527021_1_En_10_Fig11_HTML.jpg)


    ## 图 10-9

    设备故障的月度滞后报告


    S Q L S S M S 窗口的截图。它有一个包含 9 列和 1011 行的表格。列标题是工厂名称、位置名称、日历年度、季度名称、月份名称、日历月份、设备故障总和以及上次故障总和。有
    3 个箭头指向设备故障总和的值。


    注意零值。这些标记了分区的开始，因此之前的行（月份）被忽略。不过一切都对齐了。


    如果我们添加一个计算，用当前月份的故障值减去滞后值，我们就可以看到故障率的变化。试试这段代码片段：


    ```

    ,SumEquipFailures –

    LAG(SumEquipFailures,1,0) OVER

    (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS FailureChange

    ```


    这是一个很好的指标，可以判断故障是上升还是下降。

    '
- fmt: '### Performance Considerations


    Let’s create our baseline estimated query performance plan in the usual manner.
    I split up the estimated execution plan into two parts so we can see all the steps
    this time.


    Please refer to Figure [10-10a](#527021_1_En_10_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig12_HTML.jpg)


    A screenshot of the S Q L, S S M S window. It presents part 1 of the estimated
    query performance plan with 10 components. The components are hash match, compute
    scalar, table scan, hash match, table scan, hash match, hash match, clustered
    index, table scan, and table scan.


    **Figure 10-10a**

    Estimated query performance plan for LAG – part 1


    Starting at the top right-hand side, we see the familiar table scan on the Calendar
    dimension with a cost of 7%. We see a clustered index scan (a seek is better)
    with a cost of 6%, but we are retrieving all the rows in the `CTE`, so it cannot
    be helped.


    Next, we see four hash match join operations with costs of 4%, 12%,12%, and 32%.
    Lots of processing here! Let’s check out the left section of the plan.


    Please refer to Figure [10-10b](#527021_1_En_10_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig13_HTML.png)


    A screenshot of the S Q L, S S M S window. It presents part 2 of the estimated
    query performance plan with 10 components. The components are select, compute
    scalar, stream aggregate, window spool, segment, compute scalar, sequence project,
    segment, stream aggregate, and sort.


    **Figure 10-10b**

    Estimated query performance plan for LAG – part 2


    Starting from the right side, we see a sort step at 20% and a stream aggregate
    step at 1%. Let’s ignore the 0% tasks, and there is our window spool at 2% cost
    followed by a stream aggregate task with a cost of 1%. Remember that the window
    spool at 2% indicates spooling is performed in physical storage. The only performance
    improvement enhancement is to see if `TEMPDB` can be placed on a solid-state drive.


    So a lot of steps but are they all necessary?


    Recall that the specifications stated that the report is a monthly historical
    report, so the `CTE` approach is probably not the best approach. I tried to modify
    the query so that the `SUM()` function appears in the base query and not the `CTE`
    query with the following code:


    ```

    SUM(EquipFailures) AS SumEquipFailures,

    LAG(SUM(EquipFailures),1,0) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS LastFailureSum

    ```


    Although it shows it is possible to insert an aggregate function inside the `LAG()`
    function, it did not result in any improvements as far as the estimated query
    plan was concerned. I also removed the `GROUP BY` clause and included it in the
    base query. This code is available in the script in case you want to try it out.


    But let’s look at the `IO` and `TIME` statistics before we come to any conclusions.


    Please refer to Figure [10-11](#527021_1_En_10_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig14_HTML.png)


    A screenshot of S Q L, S S M S window, with view tab, presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 86 milliseconds.
    S Q L server execution times for C P U and elapsed are 46 and 201 milliseconds.
    1011 rows of 7 table columns are affected.


    **Figure 10-11**

    IO and TIME statistics for the LAG() report


    We are seeing a trend here. Imagine you are the manager that is responsible for
    all the developers that are creating these reports and you keep seeing the same
    values over and over because of course the same `CTE` is being used for the analysis.
    The same `CTE` block sums up failures, but different analytical window functions
    are used in the various queries.


    The `EquipmentFailure` report table has a scan count of 1, logical reads of 24,
    physical reads of 1, and read-ahead reads of 29\. Notice the boxed section showing
    scan count and logical read values of 1 and our old friend the Calendar table
    showing 24 logical reads.'
