- fmt: 'Please refer to Figure [7-9b](#527021_1_En_7_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig10_HTML.png)


    A screenshot of the S S M S window. It presents part 2 of the revised estimated
    query plan with 8 components. The components are stream aggregate, window spool,
    segment, sequence project, segment, sort, compute scalar, and stream aggregate.


    **Figure 7-9b**

    Revised query plan, second half


    Same pattern in this section: a sort at 26% and a window spool at 2%.


    **Reminder**

    As this is a book on applying the window functions and not an exhaustive book
    on query plans and performance tuning, the tasks with 0% cost are not discussed.
    Again, in your real world, do not ignore them but understand what is going on.


    We need to generate some more statistics to better understand what is going on
    as far as performance. Please refer to Figure [7-10](#527021_1_En_7_Chapter.xhtml#Fig11)
    for `IO` and `TIME` statistics.


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig11_HTML.png)


    A screenshot of the S Q L S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 134 milliseconds.
    The S Q L server execution times for C P U and elapsed are 62 and 225 milliseconds.
    and 180 rows are affected.


    **Figure 7-10**

    IO and TIME statistics


    How about `STATISTICS PROFILE` statistics? These usually have a lot to say related
    to steps, costs of each step, and `IO` and `CPU` utilization. You can also take
    a deep dive and understand which logic is related to the tasks by looking at the
    `StmtText` (statement text) column. Please refer to Figure [7-11](#527021_1_En_7_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig12_HTML.png)


    A screenshot of the S S M S window. It has a table of 12 columns and 20 rows.
    The column headers are statement text, statement I D, node I D, physical O P,
    logical O P, argument, defined values, estimated rows, estimated I O, and estimated
    C P U. Rows 2, 9, and 17 are outlined.


    **Figure 7-11**

    Profile statistics for repeating execution patterns


    This is a good set of statistics in that it contains a lot of information. Clearly,
    the sort steps are doing most of the `IO` although the values are not high. The
    last step, the index seek step, has the highest `IO` coming in at 0.04238\. Right
    now, the query runs under one second. The Account table has 43,860 rows. What
    would the `IO` be for these sort steps if we had 100,000 or 1,000,000 accounts
    (as in large international banks)? These `IO` statistics could become a problem.


    This final step started me thinking. I had a final `ORDER BY` clause in the query,
    which ended up being redundant. I removed it, checked the results, and reran the
    query to generate the `PROFILE STATISTICS`. One expensive sort was removed, so
    that’s an improvement. One less step means less time executing the query.


    **Pop Quiz**

    How do you generate `PROFILE` statistics? The answer will appear at the end of
    this section.


    Lastly, comparing the `IO` and `TIME` statistics after I removed the last `ORDER
    BY` clause yielded the following results:


    **Before**

    **SQL Server Parse and Compile Times**

    CPU time: 0 ms

    Elapsed time: 134 ms


    **IO Statistics**

    Scan count: 1

    Logical reads: 56

    Physical reads: 2

    Read-ahead reads: 53


    **SQL Server Execution Times**

    CPU time: 62 ms

    Elapsed time: 225 ms


    **After**

    **SQL Server Parse and Compile Times**

    CPU time: 16 ms

    Elapsed time: 21 ms


    **IO Statistics**

    Scan count: 1

    Logical reads: 56

    Physical reads: 0

    Read-ahead reads: 0


    **SQL Server Execution Times**

    CPU time: 31 ms

    Elapsed time: 128 ms


    There’s noticeable improvement in `IO`, and execution time was cut down by 50%
    after the redundant `ORDER BY` clause was removed.


    One more lesson learned: Review your code, and make sure you do not have redundant
    or unnecessary logic. Usually, in working environments, a good peer review session
    will help identify little glitches that you cannot see but that a pair of external
    eyes can help you find.


    It is always uncomfortable to have your code reviewed and critiqued, but it is
    part of the game.


    **Pop Quiz Answer**

    By executing the `SET STATISTICS PROFILE ON` command.


    ## LAG() and LEAD() Functions


    This pair of functions are very important tools to include in your programming
    toolkit to analyze data. One of the activities your business analysts perform
    is to look back in time or forward in time within a set of historical data. Of
    course, the data could be a snapshot that includes current and past data but no
    future data (does not exist yet depending on the point of view).


    These functions allow you to create powerful queries and reports to do exactly
    that.


    Recall what the `LAG()` function does:

    This function is used to retrieve the previous value of a column relative to the
    current row column value (usually within a time dimension). For example, given
    this month’s sales amounts for a product, pull last month’s sales amounts for
    the same product or specify some offset, like three months ago or even a year
    or more depending on how much historical data you have collected and what your
    business users want to see. Use this logic to calculate the difference. Did sales
    go up or down? Critical measurement to monitor and improve sales performance,
    not to mention awarding bonuses!


    Here’s what the `LEAD()` function does:

    This function is used to retrieve the next value relative to the current row column.
    For example, given this month’s sales amounts for a product, pull next month’s
    sales amounts for the same product or specify some offset, like three months in
    the future or even a year in the future (historical data of course; one cannot
    see into the future from the present, and neither can your database if the data
    does not exist).


    One exception, though, is if you have future projections for sales data. Makes
    for interesting analysis for the sales team.


    **Reminder**

    Both functions return the data type of the value used as an argument.'
