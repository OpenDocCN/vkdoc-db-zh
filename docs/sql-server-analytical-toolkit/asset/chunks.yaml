  trans: '

    # 性能考量


    这是我们的基线估计查询执行计划。


    请参考图 9-7。


    ![](img/527021_1_En_9_Fig7_HTML.png)


    `SQL`窗口的截图。主页面上半部分显示代码，下半部分显示执行计划。


    图 9-7：大表估计查询计划


    我们看到对大报告表进行了索引查找，成本为 26%，但看看那些用于合并维度表行的哈希匹配联接，以及所有对维度表进行的表扫描。接着是一个成本为 1%的嵌套循环任务，然后是一个成本为
    12%的排序操作。


    ## 随堂小测


    当我们说任务成本时，它实际意味着什么？是任务执行所花费时间的百分比吗？答案稍后揭晓。


    让我们查看此查询的`IO`和`TIME`统计信息。


    请参考图 9-8。


    ![](img/527021_1_En_9_Fig8_HTML.png)


    截图显示主屏幕上半部分为代码，下半部分显示消息。箭头指向物理读取，页面服务器读取为 0。


    图 9-8：大表查询的 IO 和 TIME 统计信息


    报告表的扫描计数（40）和逻辑读取（126）值较高，物理读取为 3。维度表的扫描计数、逻辑读取和物理读取均为 1。工作文件的所有这些参数均为 0。


    如前所述，这是一份历史报告，因此很明显，为了提高性能，我们希望通过一次性加载所有历史数据来暂存大部分数据。随着时间逐月过去，我们只需要执行月度加载以更新数据。如果用户需要每周甚至每日更新数据，我们也可以进行每周加载。


    ## 随堂小测答案


    当我们说任务成本时，它实际意味着什么？是任务执行所花费时间的百分比吗？不，这是一个综合值，表示使用了多少`CPU`、内存和`IO`以及其他一些参数。


    让我们调整策略，将加载所有数据的代码提取到另一个报告表中。


    请参考清单 9-3。


    ```

    INSERT INTO Reports.EquipmentMonthlyOnLineStatus

    SELECT ES.StatusYear AS ReportYear

    ,ES.StatusMonth AS Reportmonth

    ,CASE

    WHEN ES.StatusMonth = 1 THEN ''Jan''

    WHEN ES.StatusMonth = 2 THEN ''Feb''

    WHEN ES.StatusMonth = 3 THEN ''Mar''

    WHEN ES.StatusMonth = 4 THEN ''Apr''

    WHEN ES.StatusMonth = 5 THEN ''May''

    WHEN ES.StatusMonth = 6 THEN ''Jun''

    WHEN ES.StatusMonth = 7 THEN ''Jul''

    WHEN ES.StatusMonth = 8 THEN ''Aug''

    WHEN ES.StatusMonth = 9 THEN ''Sep''

    WHEN ES.StatusMonth = 10 THEN ''Oct''

    WHEN ES.StatusMonth = 11 THEN ''Nov''

    WHEN ES.StatusMonth = 12 THEN ''Dec''

    END AS MonthName

    ,EP.LocationId

    ,L.LocationName

    ,ES.EquipmentId

    ,StatusCount

    ,ES.EquipOnlineStatusCode

    ,ES.EquipOnLineStatusDesc

    ,EP.PlantId

    ,P.PlantName

    ,P.PlantDescription

    ,ES.EquipAbbrev

    ,EP.UnitId

    ,EP.UnitName

    ,E.SerialNo

    -- 创建表使用：

    -- INTO  Reports.EquipmentMonthlyOnLineStatus

    FROM Reports.EquipmentRollingMonthlyHourTotals ES -- 30,240 行以上

    INNER JOIN DimTable.Equipment E

    ON ES.EquipmentId = E.EquipmentId

    INNER JOIN [DimTable].[PlantEquipLocation] EP

    ON ES.EquipmentId = EP.EquipmentId

    INNER JOIN DimTable.Plant P

    ON EP.PlantId = P.PlantId

    INNER JOIN DimTable.Location L

    ON EP.PlantId = L.PlantId

    AND EP.LocationId = L.LocationId

    ORDER BY ES.StatusYear

    ,ES.StatusMonth

    ,EP.LocationId

    ,ES.EquipmentId

    ,ES.EquipOnlineStatusCode

    ,EP.PlantId

    GO

    ```


    清单 9-3：报告表的一次性加载


    这里有那个大的`CASE`代码块。另外，请注意`FROM`子句中的所有`JOIN`谓词。你可以取巧，先在`FROM`子句前使用`INTO`来创建表。创建表后将其注释掉，并使用常规的`INSERT/SELECT`来加载数据。务必检查列的数据类型，确保它们与从查询中使用的表中检索的列的数据类型一致。


    此策略允许我们使用`ORDER BY`子句对数据进行排序，排序方式将有助于我们将要对其执行的查询。


    创建并加载此表后，我们将每月加载一次，因此需要创建一个在`where`子句中添加月份过滤器的脚本。这可以放在`SQL Agent`计划作业中，以便可以增量加载表，一次一个月、一周甚至一天。


    ## 提醒


    `SQL Agent`是作业执行进程。你可以使用它来安排查询、脚本、外部程序和`SSIS ETL`包的执行。


    对于此策略，创建一个记录表上次加载日期的小表。这样，查询脚本可以使用上次日期作为过滤条件，并请求比上次存储的日期多一天的行。请记住添加新的加载日期，以便下次运行查询时能够正确工作。


    让我们看看新的改进后的查询。


    请参考清单 9-4。


    ```

    SELECT ReportYear

    ,Reportmonth

    ,MonthName

    ,LocationId

    ,LocationName

    ,EquipmentId

    ,StatusCount

    ,RANK() OVER(

    PARTITION BY EquipmentId,ReportYear

    ORDER BY LocationId,EquipmentId ASC,ReportYear ASC,

    StatusCount DESC

    ) AS NoFailureRank

    ,EquipOnlineStatusCode

    ,EquipOnLineStatusDesc

    ,PlantId

    ,PlantName

    ,PlantDescription

    ,EquipAbbrev

    ,UnitId

    ,UnitName

    ,SerialNo

    FROM Reports.EquipmentMonthlyOnLineStatus -- 30,240 行以上

    WHERE ReportYear = 2002

    AND EquipOnlineStatusCode = ''0001''

    AND EquipmentId = ''P1L1VLV1''

    ORDER BY ReportYear

    ,Reportmonth

    ,LocationId

    ,EquipmentId

    ,EquipOnlineStatusCode

    ,PlantId

    GO

    ```


    清单 9-4：新的改进后的查询


    并不意外。这是同一个带有`RANK()`函数的查询，但这次它使用的是我们新的改进后的表。我们可以预期性能会有所提升。或者真的如此吗？


    我们将结果缩小到一台设备。


    请参考图 9-9 中的部分结果。


    ![](img/527021_1_En_9_Fig9_HTML.png)


    窗口的截图。屏幕上半部分和下半部分各显示一个表格。上方的表格框选了 1 月和 11 月的详细信息。下方表格中的箭头指向 1 月和 11 月，故障风险为 10。


    图 9-9：比较查询报告


    请记住，我添加了一个过滤器，只报告一台设备。如你所见，结果相符，但第一个报告按排名排序，而第二个报告按月份排序。这完全取决于分析师希望结果如何排序。

    '
- fmt: '## 性能考虑


    让我们创建一个基线估计查询计划，以便了解存在的性能条件。


    请参阅图 [9-10](#527021_1_En_9_Chapter.xhtml#Fig10)。


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig10_HTML.jpg)


    SQL 工作区的截图。上半部分描绘了代码，下半部分描绘了执行计划。箭头指向排序成本分别为 2% 和 7%，以及表扫描成本为 91%。


    图 9-10


    估计的基线查询计划


    一个表扫描，加上两个排序和一个建议的索引。表扫描的成本占 91%，所以我们应该关注这一点！


    让我们创建索引吧！有益无害！


    请参阅清单 [9-5](#527021_1_En_9_Chapter.xhtml#PC5)。


    ```

    /*

    Missing Index Details from SQLQuery2.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APPlant
    (DESKTOP-CEBK38L\Angelo (54))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 91.7476%.

    */

    CREATE NONCLUSTERED INDEX ieEquipmentMonthlyOnLineStatus

    ON Reports.EquipmentMonthlyOnLineStatus (ReportYear,EquipmentId,EquipOnlineStatusCode)

    INCLUDE (

    Reportmonth,MonthName,LocationId,LocationName,StatusCount,

    EquipOnLineStatusDesc,PlantId,PlantName,PlantDescription,

    EquipAbbrev,UnitId,UnitName,SerialNo

    )

    GO

    ```


    清单 9-5


    推荐的索引


    估计查询计划分析器指出性能将提升 91.7476%，因此让我们创建它并运行另一个估计查询计划。


    请参阅图 [9-11](#527021_1_En_9_Chapter.xhtml#Fig11)。


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig11_HTML.jpg)


    SQL 工作区的截图。上半部分描绘了代码，下半部分描绘了执行计划。箭头指示索引查找的成本百分比分别为 44% 和 12%。


    图 9-11


    使用索引更新的执行计划


    索引被使用了（成本为 13%）。这是个好消息，但我们有两个排序，每个成本为 44%。让我们看看 `IO` 和 `TIME` 统计信息。


    请参阅图 [9-12](#527021_1_En_9_Chapter.xhtml#Fig12)。


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig12_HTML.jpg)


    SQL 工作区的截图。窗口上半部分代表代码，下半部分代表消息。箭头指向已用时间等于 82 ms，扫描计数等于 1，逻辑读取等于 3，物理读取等于 2。


    图 9-12


    改进的查询 IO 和 TIME 统计信息


    还不错：在新报告表上，扫描计数为 1，逻辑读取为 3，物理读取为 2。工作表上的所有统计信息均为零，SQL Server 执行已用时间为 16 ms。


    回顾这个查询，我们看到使用了 `ORDER BY` 子句。这是必要的吗？我获取了查询，注释掉 `ORDER BY` 子句，并排比较了估计的执行计划，这就是我得到的结果。


    请参阅图 [9-13](#527021_1_En_9_Chapter.xhtml#Fig13)。


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig13_HTML.png)


    SQL 工作区的截图。窗口顶部是菜单栏，左侧是对象资源管理器。主屏幕描绘了执行计划和代码。


    图 9-13


    比较有和没有 ORDER BY 子句的估计执行计划


    一个排序步骤被消除了，但索引查找上升到 22%，剩余的排序步骤上升到 78%。这样更好吗？让我们看看 `TIME` 和 `IO` 统计信息告诉我们什么。


    请参阅图 [9-14](#527021_1_En_9_Chapter.xhtml#Fig14)。


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig14_HTML.png)


    SQL 工作区的截图。窗口顶部是菜单栏，左侧是对象资源管理器。主屏幕描绘了代码和消息。箭头指向已用时间。


    图 9-14


    比较有和没有 ORDER BY 子句的 IO 和 TIME 统计信息


    在没有 `ORDER BY` 子句的查询中，解析和编译时间有所改善，而执行时间有所增加。这个测试需要运行两到三次，每次运行 `DBCC` 命令以清除每个会话中的缓存，才能做出某种决定。你可以自己尝试一下，但归根结底，如果这是一个真实的生产场景，取决于分析员希望如何对报告进行排序。


    正如我们在其他章节中看到的，有时最简单的解决方案就是最好的。


    我这是什么意思呢？


    与其创建几个索引并进行广泛的测试，不如直接拆分查询，将基础数据放入一个报告表中（如果数据具有历史性质），然后修改报告查询以从新表中访问数据。


    当然，看看估计查询分析器对新表的索引有什么建议。通常至少需要一到两轮比较估计查询计划以及 `IO` 和 `TIME` 统计信息。此外，如果你需要深入研究，可以查看将
    `STATISTICS PROFILE` 设置为 `ON` 的结果。


    最后，如果我们理解了分析员或业务用户的需求，我们就可以设计一个高性能的解决方案。确保你提出很多问题。即使你是通过电子邮件收到的需求说明，也请立即回复一封电子邮件，附上你的问题，这样你就能掌握所有的要求和期望。'
  raw: '### Performance Considerations


    You know the drill. Let’s create a baseline estimated query plan so we can see
    what performance conditions exist.


    Please refer to Figure [9-10](#527021_1_En_9_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig10_HTML.jpg)


    A screenshot of the S Q L work area. The upper portion depicts the codes, and
    the lower portion depicts the execution plan. The arrows point towards the sort
    cost of 2 and 7 percent and the 91 percent cost of the table scan.


    Figure 9-10


    Estimated baseline query plan


    A table scan plus two sorts and a suggested index. The table scan chimes in at
    a cost of 91%, so that is something we should look at!


    Let’s create the index. Couldn’t hurt!


    Please refer to Listing [9-5](#527021_1_En_9_Chapter.xhtml#PC5).


    ```

    /*

    Missing Index Details from SQLQuery2.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APPlant
    (DESKTOP-CEBK38L\Angelo (54))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 91.7476%.

    */

    CREATE NONCLUSTERED INDEX ieEquipmentMonthlyOnLineStatus

    ON Reports.EquipmentMonthlyOnLineStatus (ReportYear,EquipmentId,EquipOnlineStatusCode)

    INCLUDE (

    Reportmonth,MonthName,LocationId,LocationName,StatusCount,

    EquipOnLineStatusDesc,PlantId,PlantName,PlantDescription,

    EquipAbbrev,UnitId,UnitName,SerialNo

    )

    GO

    Listing 9-5

    Recommended Index

    ```


    The estimated query plan analyzer states the performance will improve by 91.7476%,
    so let’s create it and run another estimated query plan.


    Please refer to Figure [9-11](#527021_1_En_9_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig11_HTML.jpg)


    A screenshot of the s q l work area. The upper portion depicts the codes, and
    the lower portion depicts the execution plan. The arrows indicate the cost percent
    of 44 percent and 12 percent cost for the index seek.


    Figure 9-11


    Updated execution plan with the index


    So the index was used (cost of 13%). This is good news, but we have two sorts
    each with a cost of 44%. Let’s look at the `IO` and `TIME` statistics.


    Please refer to Figure [9-12](#527021_1_En_9_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig12_HTML.jpg)


    A screenshot of the s q l work area. The upper half of the window represents the
    codes and the lower half of the window represents the messages. The arrows point
    towards the elapsed time equal to 82 m s, scan count equal to 1, logical reads
    equal to 3, and physical reads equal to 2.


    Figure 9-12


    Improved query IO and TIME statistics


    Not too bad: a scan count of 1, logical reads of 3, and physical reads of 2 on
    the new report table. All the statistics on the work table are zero, and the SQL
    Server execution elapsed time is 16 ms.


    Looking back at the query, we see we used an `ORDER BY` clause. Is it necessary?
    I took the query, commented out the `ORDER BY` clause, and compared the estimated
    execution plans side by side, and this is what I got.


    Please refer to Figure [9-13](#527021_1_En_9_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig13_HTML.png)


    A screenshot of the s q l work area. The window represents the menu bar at the
    top and the object explorer on the left side. The main screen depicts the execution
    plan and the codes.


    Figure 9-13


    Comparing estimated execution plans with and without the ORDER BY clause


    A sort step was eliminated, but the index seek went up to 22% and the remaining
    sort step went up to 78%. Is this better? Let’s see what the `TIME` and `IO` statistics
    tell us.


    Please refer to Figure [9-14](#527021_1_En_9_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig14_HTML.png)


    A screenshot of the s q l work area. The window represents the menu bar at the
    top and the object explorer on the left side. The main screen depicts the codes
    and the messages. The arrows point towards the elapsed time.


    Figure 9-14


    Comparing IO and TIME statistics with and without the ORDER BY clause


    Some improvement in the parse and compile times, and execution times went up in
    the query without the `ORDER BY` clause. This test needs to be run two or three
    times, each time running the `DBCC` command to clear the cache in each session
    to make some sort of decision. You can try it out yourself, but what it comes
    down to, if this was a real production scenario, is how the analyst wants the
    report sorted.


    As we saw in other chapters, sometimes the easiest solution is the best.


    What do I mean by this?


    Instead of creating a few indexes and doing extensive testing, just split up the
    query and pop the base data in a report table (if the data is historical in nature)
    and then modify the report query to access data from the new table.


    Of course, see what the estimated query analyzer suggests as far as an index with
    the new table. At least one or two rounds of comparing estimated query plans plus
    `IO` and `TIME` statistics are usually warranted. Also, check out the results
    of setting `STATISTICS PROFILE` to `ON` if you need to dig deeper.


    Lastly, if we understand the analyst’s or business user’s requirements, we can
    craft a high-performance solution. Make sure you ask a lot of questions. Even
    if you get the specs via email, pop an email right back with the questions so
    you have all the requirements and expectations on hand.'
