    *图 14-23*

    *下载 SSAS 项目支持*


    请注意，有很多“东西”可选，因此你可能需要滚动相当长的距离才能找到所需内容。请准备好留出几个小时来下载和安装本书中讨论的所有项目模板。


    ### SQL Server SSIS 项目支持


    向下滚动获取 SSIS 项目模板。


    请参考图 14-24。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig24_HTML.png](img/527021_1_En_14_Fig24_HTML.png)

    *图 14-24*

    *使用 Visual Studio 获取 SSIS*


    只需选择它并滚动到下一个项目，即……


    ### SQL Server SSRS 项目支持


    和其他的一样，选择它并单击下载。


    请参考图 14-25。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig25_HTML.png](img/527021_1_En_14_Fig25_HTML.png)

    *图 14-25*

    *使用 Visual Studio 获取 SSRS*


    这不太难，对吧？接下来，我们需要我们的报告开发工具。


    ### 报表生成器


    用你喜欢的网页浏览器搜索，你会找到这个网页。


    请参考图 14-26。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig26_HTML.png](img/527021_1_En_14_Fig26_HTML.png)

