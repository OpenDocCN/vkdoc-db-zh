- fmt: '### `PERCENT_RANK()` Function


    Next on deck is the `PERCENT_RANK()` function. What does it do? We covered this
    in Chapter [3](#527021_1_En_3_Chapter.xhtml), but in case you need a reminder
    or are not reading the chapters in sequential order, here is a review.


    Using a data set like results from a query, partition, or table variable, this
    function calculates the relative rank of each individual value relative to the
    entire data set (as a percentage). You need to multiply the results (the value
    returned is a float) by 100.00 or use the `FORMAT()` function to convert the results
    to a percentage format (this function returns a `FLOAT(53)` data type by the way).


    Also, it works a lot like the `CUME_DIST()` function; at least that’s what the
    Microsoft documentation says.


    You will also see that it works a lot like the `RANK()` function (in theory anyway).
    The `RANK()` function returns the position of the value, while `PERCENT_RANK()`
    returns a percentage value. We will use this function together with the `CUME_DIST()`
    function just discussed so we can compare the results and also see what effect
    it will have on the query plan we will generate shortly.


    Our friendly business analyst supplies the following specifications:


    A report is needed that shows percentage rank and cumulative distribution by plant,
    location, year, quarter, and month for all plants and all years. Values should
    be calculated based on groupings of year, plant name, and location.


    Based on these simple specifications, in Listing [10-7](#527021_1_En_10_Chapter.xhtml#PC11)
    is the `TSQL` query.


    ```sql

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth

    ,SumEquipFailures

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS PercentRank

    ,FORMAT(CUME_DIST() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS CumeDist

    FROM [Reports].[PlantSumEquipFailures]

    GO

    ```

    Listing 10-7

    Percent Rank vs. Cumulative Distribution


    Notice that there is no `CTE` used this time. We are now using the precalculated
    report table for the sum of failures in order to simplify the query and increase
    performance.


    The partition is being set up by the year, plant name, and location name for both
    functions. The `ORDER BY` clause is declared using the year, plant name, and location
    name and the equipment failure sum values. Let’s see how the returned values of
    the window functions compare.


    Please refer to the partial results in Figure [10-16](#527021_1_En_10_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig21_HTML.png)


    A screenshot of the S Q L, S S M S window. It has a table of 10 columns and 1517
    rows. The column headers are Plant name, location name, calendar year, quarter
    name, month name, calendar month, sum equipment failures, percent rank, and cumulative
    distribution. 12 rows of last 2 columns are outlined.


    Figure 10-16

    Percent rank and cumulative distribution for equipment failures


    The results for both functions are similar but not by much. The partitions are
    set up correctly, and we see the results for the month by plant, location, and
    year. Looks like we had the most failures in April and no failures at all for
    February and August for 2002 for the boiler room.


    Let’s see the estimated performance plan for this query.


    ### Performance Considerations


    Let’s create our baseline estimated execution plan so we can perform some analysis.
    We need to break up the plan into two parts again as it is rather large.


    Please refer to Figure [10-17a](#527021_1_En_10_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig22_HTML.png)


    A screenshot of the S Q L, S S M S window. It presents part 1 of the baseline
    estimated query plan with 13 components. The components are sequence project,
    segment, segment, nested loops, table spool, segment, sort, table scan, nested
    loops, compute scalar, stream aggregate, and 2 table spools.


    Figure 10-17a

    Baseline estimated query plan, part 1


    First, I need to say the report table has only 1,517 rows so it is not big, but
    it will be interesting to see how the estimated performance plan breaks it up
    into tasks. Second, the query ran in less than one second, so why bother? Practice
    makes perfect, that’s why!


    We can see a lot of activity. The table scan comes in at 16% followed by a sort
    (42% cost), segment (4% cost), and table spool (4% cost) before it is merged with
    the bottom branch with a nested loops join at 28%. Seems that in our performance
    analysis travels, the sorts and joins always seem to have the higher costs. We
    are using small tables, but if the tables had large volumes of rows, we would
    need to consider indexes on the dimension surrogate keys.


    Let’s see the second half of the plan.


    Please refer to Figure [10-17b](#527021_1_En_10_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig23_HTML.png)


    A screenshot of the S Q L, S S M S window. It presents part 2 of the baseline
    estimated query plan with 9 components. The components are select, compute scalar,
    compute scalar, stream aggregate cost 1%, window spool cost 4%, segment, segment,
    segment, sequence project, and segment.


    Figure 10-17b

    Baseline estimated query plan, part 2


    Moving from right to left, we see a window spool at 4% cost and a stream aggregate
    at 1% cost.


    We are returning a lot of rows, so we see a lot of window spool action. Remember
    that window spool tasks with higher-than-zero percentages mean the spooling is
    performed on a physical disk. So this table could be a candidate for a memory-enhanced
    table.


    I tried to add a clustered index based on the columns in the `PARTITION BY` clause
    and the `ORDER BY` clause, but the improvement was minimal, so I will not even
    bother to show the results. I do include the code for the index in the script
    for this chapter.


    Let’s turn our attention to the fact that this query has 1,517 rows. What happens
    when you add a `WHERE` clause to filter out only one year? Will our analyst allow
    a modification, so we can filter out rows based on the year, plant, and location?
    Let’s modify the query and try it out.


    Please refer to listing [10-8](#527021_1_En_10_Chapter.xhtml#PC12).


    ```sql

