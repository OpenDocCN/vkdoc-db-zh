    `OVER()` 子句包含一个 `PARTITION BY` 子句，该子句按年份设置分区。目前这并非必需，因为我们已经在 `WHERE` 子句中筛选了年份“2002”，但如果我们包含更多年份，就需要保留它。顺便说一句，这似乎不影响性能。尝试运行包含和不包含年份在
    `PARTITION BY` 子句中的估计查询计划。


    最后，包含一个 `ORDER BY` 子句，该子句按 AsOfMonth 列对分区进行排序。让我们查看结果，然后使用 Microsoft Excel 创建图表。


    ## 作业


    修改查询，使其从新的增强型日历表中检索日历季度和月份。同时，修改查询，使结果针对所有年份进行计算。练习在 Microsoft Excel 中将每个结果集绘制成图，以创建跨年累积分布值的分析图。运行我们常规的估计查询计划以及
    `IO` 和 `TIME` 统计信息分析，看看修改后的查询在包含了到日历表的 `JOIN` 后，性能是变好了还是变差了。最后，运行计划和 `IO/TIME`
    统计信息以获取平均值。请确保在每次运行前执行 `DBCC`。


    请参考图 13-1 中的部分结果。


    ![](img/527021_1_En_13_Fig1_HTML.png)


    这是 SQL Server Management Studio (SSMS) 窗口的截图。其中有一个包含 13 列和 13 行的表格。列标题分别为：截至年份、截至季度、季度名称、截至月份、月份名称、截至日期、仓库
    ID、库存 ID、货位 ID、产品 ID、月平均库存数量、滚动年累计。


    图 13-1

    月平均库存的累积分布分析


    由于 `PARTITION BY` 子句指定 `ORDER BY` 子句按月份排序，RollingYearCume 值按升序排列，我们可以清楚地看到累积分布将生成一条漂亮的上弯曲线。让我们将此结果复制到
    Microsoft Excel 电子表格中。


    请参考图 13-2。


    ![](img/527021_1_En_13_Fig2_HTML.png)


    这是 Microsoft Excel 窗口的截图。其中有一个包含 5 列和 13 行的表格。列标题分别为：季度、月份、月末日期、平均值、累积分布。图中还有一个累积分布与平均库存数量的折线图，显示出两条上升趋势。


