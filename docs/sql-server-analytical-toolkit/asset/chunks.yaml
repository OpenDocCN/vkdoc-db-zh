    Please refer to Figure [5-5b](#527021_1_En_5_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig6_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Sort cost, 19%. Stream aggregate cost, 2%. Sort cost, 50%. Table scan cost,
    5%. Index seek cost, 14%.


    Figure 5-5b


