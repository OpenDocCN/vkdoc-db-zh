- fmt: '## Summary


    Hopefully you found this chapter interesting. We put the aggregate functions through
    their paces in a plant engineering data warehouse scenario. Along the way we performed
    some detailed and interesting performance analysis and not only found opportunities
    to improve the queries so as to achieve better performance but also discovered
    a design flaw in the database.


    No, I did not do this on purpose. I actually made a design mistake, but it was
    a good opportunity to demonstrate that these things occur in a real development
    environment and that it provides opportunities to not only fix but improve a design.


    Lastly, we created some other design artifacts in the form of data dictionaries,
    which helped us understand what is in the database so that when we create queries,
    we understand the semantics of the data and relationships between tables.


    On to Chapter [9](#527021_1_En_9_Chapter.xhtml)!


    # 9. Plant Use Case: Ranking Functions


    In this chapter, we use the ranking window functions to perform some analysis
    on the power plant database. There are only four functions, but we will check
    out performance as usual and also create a few Microsoft Excel pivot tables and
    graphs to take our analysis a step further.


    Our query performance analysis will utilize most of the tools we used in our prior
    chapters and will also show an example that leads us down the wrong path, which
    we will correct.


    Sometimes, when you are coding without proper design considerations, you might
    pick an approach that you feel makes sense only to discover that there was a simpler
    way of solving the coding requirement if only you would have thought it out.


    Sometimes the easiest solutions are the best!


    ## Ranking Functions


    Here are the four functions. Hopefully this is not the first time you have seen
    them as we have covered them in prior chapters. If you need a refresher on this
    topic, check out Appendix A where each function is described in detail:


    * `RANK()`

    * `DENSE_RANK()`

    * `NTILE()`

    * `ROW_NUMBER()`


    The first two functions are similar in that they are used to rank results, the
    difference being that they treat duplicate values and subsequent rankings differently.
    Take this into consideration when you are trying to solve a problem that requires
    ranking results.


    ### RANK( ) Function


    Recall that the `RANK()` function returns the number of rows before the current
    row plus the current row based on the value being ranked. Let’s see what the business
    analysts’ specifications are:


    A report is needed to rank the number of equipment failures by plant, location,
    year, quarter, and month. They need to be in descending order for the year 2008.
    The report query needs to be easily modified so it can include more years in the
    results.


    Simple query, so we will start by taking the `CTE` approach.


    Please refer to Listing [9-1](#527021_1_En_9_Chapter.xhtml#PC1).


    ```

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName,[MonthName], CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,[MonthName]

    ,SumEquipFailures

    RANK() OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipFailures DESC

    ) AS FailureRank

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2008

    GO

    Listing 9-1

    Ranking Sums of Equipment Failures

    ```


    The `CTE` logic is a little complex. A `STAR` query approach is used, and five
    dimension tables need to be linked via four `JOIN` predicates. Notice that the
    surrogate keys are used and that we join to the `CalendarView VIEW` instead of
    the Calendar dimension so we can pull out some names for the date object.


    Note


    Performing joins on surrogate keys is faster than performing joins on production
    keys that have an alphanumeric data type. Integer joins are faster.


    The `SUM()` aggregate function is used to total up the failures, and we include
    the mandatory `GROUP BY` clause.


    Looking at the `OVER()` clause, a partition is set up by plant name and location
    name. The year is not included in the partition definition as our `WHERE` clause
    filters out results for 2008 only. To include more years in the results, don’t
    forget to add the year in the `PARTITION BY` clause.


    Lastly, notice the `ORDER BY` clause sorts results in `DESC` (descending) order.
    That is, it specifies to process results in the partition by the `SumEquipFailures`
    column in descending order.


    Let’s see what the results look like.


    Please refer to the partial results in Figure [9-1](#527021_1_En_9_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig1_HTML.png)


    A screenshot presents a table. The column headers are plant name, location name,
    calendar year, quarter name, month name, sum equip failure, and failure rank.
    The arrows point towards the failure rank 11 in October and September and 20 in
    March 2008.


    Figure 9-1


    Failure rank by year and location


    Looking at the boiler room results, it seems October was the top-ranking month
    as far as failures go, so this needs to be investigated. Our analyst needs to
    see which piece or pieces of equipment suffered the most failures.


    For the furnace room, looks like we have a tie. September and April were the worst
    months for equipment failure in the furnace room.


    Let’s chart the results for a visual that will help us see the rankings for 2008.


    Please refer to Figure [9-2](#527021_1_En_9_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig2_HTML.png)


    A screenshot presents a table and a line graph. The column headers are quarter,
    month, failure, and rank. The line graph of failure versus month presents the
    trends for failures, rank, and linear failures.


    Figure 9-2


    Monthly failures for 2008


    This seems to be a nice graph as it clearly shows the rankings by month and also
    the failures. Our analyst will be happy.


    How about performance? Let’s see how this query does by performing our usual analysis
    with the tools available in our toolbox.'
