- fmt: '## SQL Server 2022: Named Window Example


    Let’s check out the new `WINDOW` feature in SQL Server 2022 by creating a query
    that uses the `AVG()` function with the `OVER()` clause. We will gather the `IO`
    and `TIME` statistics plus generate a query plan in the usual manner to see how
    this new feature affects performance.


    If the query plan suggests an index, which it will as there are none, we will
    create the index and then run the query again and look at the new plan and statistics.


    Note: I ran this on an evaluation copy of SQL Server 2022. Feel free to download
    and install it. Also do some research on the other new features of this version.
    Very important to keep up with the changes of the latest editions.


    Please refer to Listing `2-11` for the query code.


    ```

    WITH CustomerPurchaseAnalysis

    (PurchaseYear,PurchaseMonth,CustomerNo,TotalSalesAmount)

    AS

    (

    SELECT

    YEAR(CalendarDate)  AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    CustomerNo,

    SUM(TransactionQuantity * UnitRetailPrice) AS TotalSalesAmount

    FROM StagingTable.SalesTransaction

    GROUP BY YEAR(CalendarDate),MONTH(CalendarDate),CustomerNo

    )

    SELECT

    cpa.PurchaseYear,

    cpa.PurchaseMonth,

    c.CustomerNo,

    c.CustomerFullName,

    cpa.TotalSalesAmount,

    Listing 2-11

    Average by Year, Month, and Customer

    ```


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Figa_HTML.png)

    An A C T E code. The first line reads, A V G open parenthesis c p a dot total
    sales amount close parenthesis OVER sales window as a v g total sales. The sixth
    line reads, WINDOW sales window as, with statements in parentheses. An arrow goes
    from the sixth line to the first line.


    As usual we use our `CTE` code structure to set things up. No changes to the CTE
    syntax of course. What we want to do is calculate the total sales amount by year,
    month, and customer. We use the `SUM()` function in the `CTE` so we need to include
    a `GROUP BY` clause.


    The query refers to the `CTE` and calculates the average of all the sums. This
    time the `OVER()` clause simply refers to a name of the block that defines the
    `PARTITION` and `ORDER BY` clauses. This is called `SalesWindow` and is declared
    at the end of the query.


    The new `WINDOW` command is used followed by the name `SalesWindow`, and then
    between parentheses the `PARTITION BY` and `ORDER BY` clauses are declared:


    ```

    WINDOW SalesWindow AS (

    PARTITION BY cpa.PurchaseYear

    ORDER BY cpa.PurchaseYear ASC,cpa.PurchaseMonth ASC

    )

    ```


    Executing the query, we are presented with the results in Figure `2-22`.


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig22_HTML.png)

    A screenshot of the S Q L S S M S window. It presents a table of 7 columns and
    28 rows. The column headers are purchase year, purchase month, customer number,
    customer full name, total sales amount, and average total sales. Each row includes
    different values.


    `Figure 2-22` Query results


    This query generated 36 rows. Large enough to evaluate the results. No surprises
    here. Works as expected.


    The rolling averages seem to work. Let’s generate a query plan and see if there
    are any suggestions for indexes or more importantly if this new feature generated
    more steps or less steps in the query plan.


    Please refer to Figure `2-23`.


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig23_HTML.png)

    A screenshot of the S Q L S S M S window. It presents the pre-index query plan
    with 8 components. These are nested loops, stream aggregate, sort, parallelism,
    hash match, compute scalar, table scan, and table scan. The costs of hash match
    and table scan are 1% and 98%. Others have zero costs.


    `Figure 2-23` Pre-index query plan


    As expected, since there are no indexes, we see a nice expensive table scan with
    a cost of 98% of the total execution time. We also see a hash match task with
    a small cost of 1%. There is a suggestion for an index. Right-click it and extract
    the index to a new query window in the usual manner.


    Please refer to Listing `2-12` for what we get.


    ```

    /*

    Missing Index Details from SQLQuery2.sql - DESKTOP-CEBK38L.APSales (DESKTOP-CEBK38L\Angelo
    (66))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 99.0667%

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [StagingTable].[SalesTransaction] ([CustomerNo])

    INCLUDE ([CalendarDate],[TransactionQuantity],[UnitRetailPrice])

    GO

    */

    DROP INDEX IF EXISTS [CustomerNoieDateQuantityRetailPrice]

    ON [StagingTable].[SalesTransaction]

    GO

    CREATE NONCLUSTERED INDEX [CustomerNoieDateQuantityRetailPrice]

    ON [StagingTable].[SalesTransaction] ([CustomerNo])

    INCLUDE ([CalendarDate],[TransactionQuantity],[UnitRetailPrice])

    GO

    Listing 2-12

    Suggested Index

    ```


    A little copy-and-paste action so we can give the index a name. I left the square
    brackets alone as they were generated by SQL Server (and I am too lazy to remove
    them). Let’s create the index and rerun statistics and generate a new query plan.


    Please refer to Figure `2-24`.


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig24_HTML.png)

    A screenshot of S Q L S S M S window. It presents the post-index query plan with
    9 components. These are window spool, segment, segment, sort, nested loops, table
    scan, hash match, compute scalar, and index seek. The costs of sort, table scan,
    hash match, and index seek are 10%, 4%, 52%, and 33%.


    `Figure 2-24` Post-index query plan


    We see a bunch of steps, but at least there is an index seek now on the `SalesTransaction`
    table. This task costs 33% of the total execution time. There’s a small compute
    scalar task at 1% and a hash match at a cost of 52%. Finally, there’s a sort task
    that costs 10% (of the total execution time).


    There is also a window spool task with a cost of 0%, which is important. This
    task is associated with the `OVER()` clause and `ROWS` and `RANGE` clauses as
    it loads the required rows in memory so they can be retrieved as often as required.
    If we do not have enough memory, then the rows need to be stored in temporary
    storage, which could slow things down considerably. This task is one you should
    always look out for and see what the cost is!


    As usual I am ignoring the tasks with 0% cost (except for the window spool) to
    keep things simple, but on your own, look them up in the Microsoft documentation
    so you know what they do.


    This is important. Remember what the window spool does:

    > This task is associated with the `OVER()` clause and `ROWS` and `RANGE` clauses
    as it loads the required rows in memory so they can be retrieved as often as required.
    If we do not have enough memory, then the rows need to be stored in temporary
    storage, which could slow things down considerably. This task is one you should
    always look out for and see what the cost is!


    Seems like the index seek eliminated the first expensive table scan, but several
    new steps are introduced.


    Let’s compare the `IO` statistics pre- and post-index creation to see what improvements
    there are.


    Please refer to Table `2-6`.


    `Table 2-6` IO Statistics Comparison, Before and After Index'
