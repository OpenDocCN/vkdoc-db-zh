    ### Figure 11-34


    ## Execute SQL Task for creating a clustered index


    This is typical of all the Execute SQL Tasks in the package we are discussing.
    Here we are creating a clustered index on the `InventoryHistory` table. Again,
    notice the table names are fully qualified. This is important if the query you
    are using refers to objects in different databases. You can only use one connection
    in Execute SQL Tasks, so qualify every table, index, etc.


    All the other Execute SQL Tasks are similar to this except for the different indexes
    being created.


    ### Figure 11-35


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left side, and a solution explorer on the right side. The middle region depicts
    the control flow page of the package dot d t s x. The page exhibits a block flow
    diagram of the tasks.


    ## Enhanced SSIS package


    This is what we want to end up with as far as adding all the Execute steps for
    building all the indexes we discussed.


    Lastly, we also want to add a task to build and redeploy an existing `SSAS` multidimensional
    cube. Let’s discuss how this is accomplished.


    We need to add a task for processing the multidimensional cube we built in one
    of our chapters.


    We drag it from the Common task area in the `SSIS` Toolbox and place it at the
    end of the control flow all the way on the lower right-hand side of the Design
    area.


    Please refer to Figure 11-36.


    ### Figure 11-36


    A screenshot of the window depicts the control flow page for package dot d t s
    x. The toolbox on the left highlights the analysis service process and connects
    through a dashed arrow to the block titled load inventory cube of the block diagram
    on the main page.


    ## Adding an SSAS task


    Now we need to configure it. The first step is to create and establish a connection
    to the `SSAS` server. Double-clicking the task presents the connection dialog
    box.


    Please refer to Figure 11-37.


    ### Figure 11-37


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts a dialog
    box titled Connection Manager. A small dialog box at the bottom reads that the
    test connection succeeded.


    ## Defining connection to an SSAS server


    A name for the `SSAS` server is filled out, in this case “localhost,” although
    a better name would have been nicer, like Inventory Cube Server. Next, we add
    the actual physical name of the `SSAS` in the Location text box. Lastly, we supply
    username and password credentials and test the connection. Looks familiar, doesn’t
    it? Same concept as when we defined a connection to SQL Server and a database.


    Next, we need to identify the properties and objects we need to process. Click
    `Processing Settings`, and the following panel is presented.


    Please refer to Figure 11-38.


    ### Figure 11-38


    A screenshot of the window titled analysis services processing task editor. The
    main page displays the processing setting options that display the object list
    and batch setting summary.


    ## Identifying objects to process


    Add or remove any objects (fact tables and dimensions). Also place your mouse
    over any process option list box to change the settings.


    Click the OK button. This should complete the configuration, and the task is added
    at the end of the control flow as shown in Figure 11-39.


    ### Figure 11-39


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the control
    flow page of package dot d t s x. The page depicts a block flow diagram to add
    the task.


    ## The completed SSIS package


    All that is left is to run the task to see if it was configured correctly. No
    need to run all of the package at this time, but it is a good idea to do a final
    test to see that everything executes successfully.


    Right-click the Load Inventory Cube task and select `Execute` and watch the steps
    progress. Figure 11-40 is the process running. You cannot see the spinning circle,
    but you will see it when you try this on your own.


    ### Figure 11-40


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the control
    flow page of package dot d t s x. The block flow diagram depicts a spinning wheel
    beside the analysis service processing task.


    ## Running the completed SSIS package


    If everything ran without error, you would see a green checkmark on the task indicating
    success as can be seen in Figure 11-41.


    ### Figure 11-41


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the control
    flow page of package dot d t s x. The block flow diagram depicts a check box beside
    the analysis service processing task.


    ## The new SSAS task ran to completion


    This is what you want to see; any red `X` marks indicate something is wrong, so
    you need to address them. In this simple package, it is either an incorrect connection
