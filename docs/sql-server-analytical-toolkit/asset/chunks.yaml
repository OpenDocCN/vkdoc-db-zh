  trans: '

    这次我采用了多图表方法，即为每个年度-季度组合绘制一条钟形曲线。这种方法有些古怪，因为我们得到了倒置的钟形曲线和一个相对正常的（姑且这么说）钟形曲线。


    **注意**


    我们将在附录 B 中讨论如何在 Microsoft Excel 电子表格中生成正态分布、平均值、标准差和钟形曲线。


    可以看到的是 2002 年每个季度的图表。由于 Excel 中的正态分布函数(`NORM.DIST`)需要使用`MEAN`（平均值）和由 SQL Server
    查询生成的标准差，我必须为每个季度计算平均值。


    尝试自己生成这些图表，但我会将电子表格包含在本章代码所在的文件夹中。提醒一下，除了你的`TSQL`技能外，这是一项很有用的技能。


    让我们按年份尝试这个分析。请参考代码清单 8-15。


    这是最后一个示例，我们将根据 2002 年和 2003 年这两年的年度标准差来生成正态分布。


    ```

    SELECT PlantName AS Plant

    ,LocationName AS Location

    ,CalendarYear AS [Year]

    ,QuarterName  AS [Quarter]

    ,MonthName    AS Month

    ,SumEquipmentFailure As TotalFailures

    ,STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarYear

    ) AS RollingStdev

    ,STDEVP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarYear

    ) AS RollingStdevp

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    代码清单 8-15

    年度标准差

    ```


    注意`SELECT`子句中部分列别名使用了方括号。所使用的别名在 SQL Server 中是保留字，因此使用方括号可以消除彩色的警告提示。即使使用关键字也不会造成损害，但这是一种避免看到那些颜色标记的方法。


    一个微小的改动：`PARTITION BY`子句被修改为不包含季度名称，而`ORDER BY`子句被修改为只包含年份。之前的理由同样适用；因为我们只筛选了一个工厂和一个位置，我们实际上不需要在`PARTITION
    BY`子句中包含它们。


    **作业**


    一旦你熟悉了该查询的工作原理，就修改它以适用于多年份和多位置。这是开发和测试可用于 Microsoft SSRS（SQL Server Reporting
    Services）报告的查询的好方法。


    以下是我们将复制并粘贴到 Microsoft Excel 电子表格中的结果。请参考图 8-23。


    ![](img/527021_1_En_8_Fig23_HTML.jpg)


    SQL 查询窗口`1.sql`的屏幕截图。它展示了一个结果表。该表有 8 列，分别是工厂、位置、年份、季度、月份、总故障数、滚动标准差和滚动总体标准差。


    图 8-23

    东厂锅炉房的年度故障标准差


    好吧，这些数字不错，但正如我们常说的，一图胜千言，或者在我们这里，一图胜千个数字。每一年所有月份都有其各自的标准差值。换句话说，每个月份的标准差值是相同的。


    稍微进行一些复制粘贴操作，再加上一些富有创意的格式调整到 Microsoft Excel 电子表格中，就得到了图 8-24 所示的报告，其中包含了这两年的正态分布图表。


    ![](img/527021_1_En_8_Fig24_HTML.png)


    Microsoft Excel 工作表的屏幕截图。左侧屏幕有 2 个表格。每个表格有 4 列：季度、月份、故障数和 NDIST。右侧屏幕是 2002 年和
    2003 年正态分布的折线图。


    图 8-24

    设备故障的正态分布钟形曲线


    好一些了，但仍然是古怪的钟形曲线。如果我们吹毛求疵的话，每一组都是一系列钟形曲线。换句话说，不是为整年生成一条曲线，你可以为日历年的每个季度生成钟形曲线。


    接下来将进行更多的统计分析，这次使用方差函数。


    **随堂测验答案**


    为什么`STDEVP()`函数生成的值总是更小？因为它们有更多的数据可供处理。


    ## `VAR()` 和 `VARP()` 函数


    以下是第二章中对这些函数的定义。如果你已经熟悉它们的工作原理，可以跳过，直接去看示例查询的业务规范。


    如果你阅读了第一章然后直接跳到这里是因为你的兴趣在于工程、电厂管理或其他相关领域，请阅读这些定义。


    `VAR()` 和 `VARP()` 函数用于生成数据样本中一组值的方差。与`STDEV()`和`STDEVP()`示例中关于数据集使用的讨论同样适用于`VAR()`和`VARP()`函数相对于数据总体的情况。


    `VAR()`函数在整体数据集未知或不可用时，对部分数据集进行处理；而`VARP()`函数在整体数据集已知时，对整个数据集总体进行处理。


    因此，如果你的数据集包含十行数据，函数名以`P`结尾的会在处理值时包含所有十行；不以字母`P`结尾的则会查看 N - 1 行，即 10 - 1 = 9 行。


    好了，现在解释清楚了，那么方差到底是什么意思呢？


    对于我们开发者和非统计学家来说，这里有一个简单的解释：


    非正式地说，如果你取每个值与平均值（均值）的所有差值，对结果求平方，然后将所有结果相加，最后除以数据样本的数量，你就得到了方差。


    **提醒**


    如果你对求方差的平方根，就得到了标准差，所以它们之间存在某种关联！


    对于我们的工程场景，假设我们有一些数据，预测了我们某个工厂设备（比如一台电机）在特定年份的在线天数目标。当电机的设备状态历史最终生成后，我们想看看实际的在线天数与预测值是接近还是偏离。它回答了以下问题：


    * 我们是否未达到在线事件目标？

    * 我们是否达到了在线事件目标？

    * 我们是否超过了在线事件目标（例如无停机时间）？


    顺便说一下，这个统计公式也在附录 B 中讨论。


    接下来的例子将展示`VAR()`和`VARP()`函数如何与三种不同的`PARTITION BY`子句结合使用。

    '
- fmt: '### Example 1: Rolling Variance


    Here come the requirements for our first variance report:


    Create a rolling variance report for plant location equipment failures. Set up
    a report by plant, location, quarter, and month. Rolling variance should include
    any previous row and the current row in the generation of the variance value as
    results change from month to month.


    A simple report, we use one of the queries from the standard deviation examples,
    modify it a bit, and add a `ROWS` clause in the `PARTITION BY` clause.


    Please refer to Listing [8-16](#527021_1_En_8_Chapter.xhtml#PC19) for the new
    query.


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollingVar

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollingVarp

    FROM [Reports].[EquipmentFailureStatistics]

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    ```


    Listing 8-16

    Rolling Variance by Plant, Location, Year, and Month


    As can be seen we added the `ROWS` clause and kept the `WHERE` clause to limit
    the results for the boiler room in the East Plant. This query can be modified
    to include all plants and locations if we want to pop the results into a Microsoft
    Excel pivot table.


    Please refer to the partial results in Figure [8-25](#527021_1_En_8_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig25_HTML.png)


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 9 columns. The
    columns of the month name, sum equipment failure, rolling variance, and rolling
    variance p are highlighted.


    Figure 8-25

    Rolling variance for plant location failures


    The box defines a partition for five rows that include values for January, February,
    March, April, and May. The current row for processing is row 5 for this frame.
    The first `VAR()` value is `NULL`, and the remaining values are not `NULL` until
    a new year is encountered. I copied the 24 rows into Microsoft Excel and was able
    to duplicate the results with Excel functions. If you do this, remember that `VAR($G$1,G5)`
    is not the same as `VAR($G$1:G5)`. You need to use the semicolon in order to define
    an ever-increasing range that includes all prior rows:


    ```

    VAR($G$1:G5)

    VAR($G$1:G6)

    VAR($G$1:G7)

    ```


    And so on. The comma version will only include two rows each time. Wrong! I forgot
    this and it drove me nuts. Could not figure out why the SQL code generated different
    values than Microsoft Excel. Easy trap to fall into.


    By the way, try this code snippet in the preceding query, and you will see that
    if we take the square root of the variance, we do indeed get the standard deviation:


    ```sql

    ,SQRT(

    VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    )

    ) AS MyRollingStdev

    ,STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollingStdev

    ```


    Next example.


    ### Example 2: Variance by Quarter


    Here come the requirements for our second variance report:


    Create a variance report by quarter for plant location equipment failures. Set
    up a report by plant, location, quarter, and month. The variance should include
    any previous row and any following row within the partition.


    We just copy and paste the prior query and make some minor adjustments.


    Please refer to Listing [8-17](#527021_1_En_8_Chapter.xhtml#PC22).


    ```sql

    SELECT PlantName           AS Plant

    ,LocationName        AS Location

    ,CalendarYear        AS Year

    ,QuarterName         AS Quarter

    ,MonthName           AS Month

    ,SumEquipmentFailure AS EquipFailure

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY PlantName,LocationName,CalendarYear

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS VarByQtr

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY PlantName,LocationName,CalendarYear

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS VarpByQtr

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    ```


    Listing 8-17

    Variance Report by Quarter for Plant and Location


    Notice the `PARTITION BY` clause. The partition is defined by plant, location,
    year, and quarter. The partition is sorted by plant name, location name, and year
    for processing.


    Again, there is the `WHERE` clause that limits the result set to two years and
    to one plant and one location within the plant. I did this to keep the result
    set small, but once you practice, you can remove these. Right now, as the query
    stands, we do not need the plant name and location name in the `PARTITION BY`
    and `ORDER BY` clauses as we previously discussed because of the `WHERE` clause.


    Please refer to Figure [8-26](#527021_1_En_8_Chapter.xhtml#Fig26) for the results.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig26_HTML.jpg)


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 8 columns. The
    columns of the quarter, month, equipment failure, variance by quarter, and variance
    p by quarter, are highlighted.


    Figure 8-26

    Variance for plant location failures by quarter


    As can be seen, each quarter gets its own variance result. This was also validated
    in Microsoft Excel.


    Last but not least, let’s build up our variance statistical profile report set
    by calculating variance by year.'
  raw: '### Example 1: Rolling Variance


