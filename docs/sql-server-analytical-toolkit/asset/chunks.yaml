    `工作表` 和 `工作文件` 的 `统计信息` 保持不变，而 `SalesTransaction` 表的 `统计信息` 则有了显著改善。我们的 `逻辑读取`
    从 `17,244` 次下降到 `42` 次，`预读读取` 从 `17,230` 次下降到 `10` 次。这非常好！


