  trans: '

    是的，这篇内容很长，但它提供的信息量足以让你理解每个属性的用途。


    **注意**


    有两点需要说明。一是**外翻表**（可参考 Kimball 的《`The Data Warehouse Toolkit: The Definitive Guide
    to Dimensional Modeling`》），它是指与维度表相关联的表，例如，如果你有一个产品表，那么产品子类和产品类就可以被视为外翻表，或者说是
    `SNOWFLAKE` 模式中的雪花表。其次，从技术上讲，由于这些是业务型数据字典，你看不到任何代理键的提及，但我做了一些变通。主要是通过查询系统表来生成列清单，以便我能将它们放入文档表中。


    还有一点：将会有一些报表表，它们是**非规范化**的，并且没有代理键。它们用于暂存数据，以提高我们聚合窗口查询的性能。它们是：


    *   `Reports.EquipFailureManufacturer`

    *   `Reports.EquipmentDailyStatusHistoryByHour`

    *   `Reports.EquipmentFailureStatistics`

    *   `Reports.EquipmentFailureStatisticsMem`

    *   `Reports.EquipmentRollingMonthlyHourTotals`

    *   `Reports.EquipmentStatusHistoryByHour`

    *   `Reports.TempSensorLog`


    请注意这些表。如你所见，它们将被分配到 `Reports` 模式下。


    最后，接下来是三个数据字典，用于描述三个主题域中每个事实表与维度表之间的关系。让我们从设备故障事实表模型开始。


    ## 实体关系数据字典：设备故障主题域


    表 8-5 展示了将设备故障主题域中的事实与维度关联起来的业务规则。


    表 8-5


    实体关系数据字典 – 设备故障


    | `父实体` | 关系 | `子实体` |

    | --- | --- | --- |

    | `日历` | 标识故障日期于 | `设备故障` |

    | `位置` | 标识设备位置于 | `设备故障` |

    | `设备` | 与...关联 | `设备故障` |

    | `设备类型` | 标识设备类型于 | `设备故障` |

    | `阀门` | 可以是/是一种 | `设备` |

    | `涡轮机` | 可以是/是一种 | `设备` |

    | `电机` | 可以是/是一种 | `设备` |

    | `发电机` | 可以是/是一种 | `设备` |

    | `工厂` | 是...的位置 | `阀门` |

    | `工厂` | 是...的位置 | `涡轮机` |

    | `工厂` | 是...的位置 | `电机` |

    | `工厂` | 是...的位置 | `发电机` |

    | `位置` | 标识...的位置 | `阀门` |

    | `位置` | 标识...的位置 | `涡轮机` |

    | `位置` | 标识...的位置 | `电机` |

    | `位置` | 标识...的位置 | `发电机` |

    | `制造商` | 是...的供应商 | `设备` |

    | `设备类型` | 标识...的类型 | `设备` |


    这些将实体对象链接起来的规则，通常是在数据建模师或数据架构建模师与各业务利益相关者之间的会议中推导出来的。它们是推导在创建数据库时分配到物理表中的主键和外键的关键。


    通常会有两个动词短语形式的规则：一个是从父实体到子实体的动词短语，另一个是从子实体到父实体的动词短语，例如：


    *   一个阀门位于一个工厂中。

    *   一个工厂是一个阀门的位置。


    这对于主/细结构也是如此，例如：


    *   一台设备可以是一个发电机。

    *   一个发电机是一台设备的实例。


    我没有深入进行数据字典的严格实现，而是旨在为你提供足够的业务对象间业务规则的描述，以理解链接它们的关系。


    ## 实体关系数据字典：设备状态历史


    接下来，我们检查将设备状态历史主题域中的事实与维度关联起来的业务规则。


    请参阅表 8-6。


    表 8-6


    实体关系数据字典 – 设备状态历史


    | `父实体` | 关系 | `子实体` |

    | --- | --- | --- |

    | `日历` | 标识状态历史的状态日期于 | `设备状态历史` |

    | `设备` | 标识状态历史中的设备于 | `设备状态历史` |

    | `设备在线状态` | 标识设备在线状态代码（在线、维护或离线）于 | `设备状态历史` |


    这些简单的关系提供了连接两个业务对象的业务规则的简要解释。理解这些是关键，因为在查询中创建 `JOIN` 子句时将会用到它们。这些规则当然存在于概念模型中，但也适用于我们的物理数据仓库，并将用于实现物理主代理键和外键。


    **注意**


    我没有提及实体之间的**基数**，例如，零、一或多行到零、一或多行。例如，设备在线状态代码在 `设备状态历史` 实体中出现零、一或多行。这样做是为了节省一些空间。你可以通过编写一些表之间的查询来推断出基数。


    ## 实体关系数据字典：工厂费用


    接下来，让我们检查 `工厂费用` 事实表与工厂费用主题域中维度表之间的关系。


    请参阅表 8-7。


    表 8-7


    实体关系数据字典 – 工厂费用


    | `父实体` | 关系 | `子实体` |

    | --- | --- | --- |

    | `日历` | 标识费用日期于 | `工厂费用` |

    | `工厂` | 费用标识于 | `工厂费用` |

    | `工厂费用类别` | 标识工厂的费用类别于 | `工厂费用` |


    概念数据模型和数据字典中包含的信息非常重要，因为它不仅能帮助你理解数据库表中有什么，还能帮助你理解列的含义，特别是在编写脚本和查询时，尤其是需要连接表的时候。


    **注意**


    更详尽的实体/关系模型会列出每个实体的属性。同样，这会占用大量篇幅，所以我没有包含它们。你应该尝试使用像 PowerPoint 这样的工具来创建这些模型，因为这是另一项宝贵的技能和工具。


    还应该包含第四个数据字典，用于显示每个实体中的主键和外键，但你可以从物理数据库表中识别它们。它们是用于实现关系的代理键，例如，`EquipmentId` 将连接任何事实表到
    `设备` 维度。你可以通过查看表列来识别这些键。


    最后，这些是最简单的、使用 `SNOWFLAKE` 模式方法的数据仓库设计模型。目的是为你提供足够多的表用于查询，不仅是书中的那些，也包括你自己练习时。学习如何设计星型和雪花型模式将需要一整本书的篇幅。

    '
- fmt: '## COUNT( ) Function


    Let''s start with the `COUNT()` aggregate function. We will start off by examining
    the `TSQL` query that would have been used in the `CTE` part of the query. We
    will use it to insert rows into a report table that will replace the `CTE` in
    order to simulate a report table that is loaded once a day or week as we are interested
    in queries that analyze historical data.


    The query we will use is called a `STAR` query because it joins several dimension
    tables to a fact table. We are assuming we can use it to load the report table
    that will be used for several queries.


    This is another reason the conceptual models are useful; they show us how to code
    the `JOIN` clauses for our queries.


    Pop Quiz


    Historically, queries that included fact tables and linked dimension tables were
    called `STAR` queries. Is a query that references dimensions and outrigger dimensions
    a `SNOWFLAKE` query?


    Please refer to Listing [8-1a](#527021_1_En_8_Chapter.xhtml#PC1).


    ```sql

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,COUNT(Failure) AS FailureEvents

    ,SUM(Failure) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    Listing 8-1a

    The Repurposed CTE Component


    This query is used to create an `INSERT` command to populate a table called `Reports.EquipmentFailureStatistics`.


    I placed it in the `Reports` schema because it''s not really a fact table but
    a report staging table.


    The `SELECT` clause includes two aggregate functions, the `COUNT()` function that
    is used to pre-count the failure events and the `SUM()` function to add up the
    failures. These are plain vanilla aggregate function usage; no `OVER()` clause
    is used.


    A `GROUP BY` clause is used to group data by year, month, plant name, location
    name, and equipment ID.


    Lastly, notice the `JOIN` clauses; there are four of these, so five dimension
    tables are used in the `FROM` clause. The single fact table is the `EquipmentFailure`
    table, which has only 5,906 rows, so not a lot of rows to process.


    Let''s see the results in Figure [8-5](#527021_1_En_8_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig5_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen has live query statistics in a table. The table has 9
    columns. The last 2 columns present the Failure events and the sum of equipment
    failures.


    Figure 8-5


    Loading the equipment failure statistics report table


    Not many rows were generated, only 2,021 rows. This did generate an interesting
    live execution plan though. Fortunately, in a real production environment, it
    would be loaded once a day, at off hours, so as not to affect business users running
    reports against the data. Let''s create an estimated query plan in the usual manner.


    Please refer to Figure [8-6](#527021_1_En_8_Chapter.xhtml#Fig7) for the baseline
    estimated query plan.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig6_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen has a message and execution plan for query 1. Sort costs
    30%, and clustered index costs 5%.


    Figure 8-6


    Live query plan for a `STAR` query


    Lots of table scans, but as the tables involved have small numbers of rows, we
    do not need to worry about them. We do see a clustered index scan, which is to
    be expected because we want to load all the rows into the report table.


    Hash match joins are being used at each stage where the data flows need to be
    merged, and finally a sort at a cost of 30% is shown. This sort was incurred by
    the final `ORDER BY` clause in the query. This needed to be included because it
    is required to sort the date parts (year, quarter, month, etc.) correctly. I tried
    the query without it, and February dates appeared before January dates, so might
    as well take the performance hit at this time. Makes the resulting report easier
    to understand.


    We will use this query in an `INSERT` statement to load our report table. Please
    refer to Listing [8-1b](#527021_1_En_8_Chapter.xhtml#PC2).


    ```sql

    INSERT INTO Reports.EquipmentFailureStatistics

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,CONVERT(INTEGER,COUNT(Failure)) AS CountFailureEvents

    ,CONVERT(INTEGER,SUM(Failure)) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    Listing 8-1b

    Insert into the Report Table


    This query generated 2,021 rows.


    Let''s try our first aggregate function query against this report table. The following
    specifications were submitted by our analyst:


    We need some information concerning the East Plant, specifically the boiler room.
    The report should list the total count of failure events for the plant location
    by month. Each event can have one or more failures for the specific piece of equipment.
    For example, if a failure event occurred on January 5, 2002, and January 7, 2002,
    these would count as two events.


    If on January 5, 2002, there occurred three failures for a particular valve, the
    sum of the failures would be 3; this counts as one event. If on January 7, 2002,
    there occurred another four failures for the same valve, then the total sum of
    failures for that valve would be 7 (3 + 4) on that date. This counts as another
    event. So now we have reported on two events with a total sum of seven failures.


    We also need to report the rolling monthly totals of the count of events and of
    the sum of failures as the months roll by. The report needs to be grouped by year,
    quarter, month, plant, and location.


    Again, please note the distinction between the count of events vs. the sum of
    failures. As I said, an event can have one, two, or more failures for the piece
    of equipment associated with that event on any specific date.


    Lastly, more than one piece of equipment can fail on any date, so we include those
    counts (as monthly counts and rolling monthly counts) also.


    We are not distinguishing by equipment ID in the report.


    Let''s see the code that will satisfy this report.


    Please refer to Listing [8-2](#527021_1_En_8_Chapter.xhtml#PC3).


    ```sql

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CountFailureEvents

    ,SUM(CountFailureEvents) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS SumCountFailureEvents

    ,SumEquipmentFailure

    ,SUM(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS SumEquipFailureFailureEvents

    ,COUNT(CountFailureEvents) AS CountFailureEvents

    ,COUNT(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS CountEquipFailureFailureEvents

    FROM Reports.EquipmentFailureStatistics

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GROUP BY

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,CountFailureEvents

    ,SumEquipmentFailure

    GO

    ```

    Listing 8-2

    The Report Query, Rolling Failures by Quarter'
