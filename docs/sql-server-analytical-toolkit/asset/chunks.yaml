    **图 5-39**


    比较创建索引前后的 IO 和 TIME 统计信息


    性能难题的最后一部分是比较查询中使用的工作表和数据库表的扫描计数、逻辑读取和预读读取。从这些统计值可以看出，一切都在索引创建后下降了。逻辑读取和预读读取的数值以千为单位下降。这正是你想看到的。


