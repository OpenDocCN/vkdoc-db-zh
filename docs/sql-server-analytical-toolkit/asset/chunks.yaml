    接下来我们讨论交易。交易涉及前面提到的金融工具（不是你演奏的乐器），并且每个客户每天可能有一笔或多笔交易。最后，`Calendar`实体为`Transaction`实体中的每个日期标识数据对象，即不仅包括日期，还包括该日期的年、月、季度和周部分。


