  trans: '

    ## CUME_DIST() 函数


    此函数用于计算某个值在数据集（如表、分区或加载了测试数据的表变量）中的相对位置。


    ### 它是如何工作的？


    首先，计算有多少个值排在它之前或与之相等（将此值称为 C1）。接着，计算数据集中的值或行数（称为 C2）。然后，用 C1 除以 C2，从而得出累积分布结果。返回的值是浮点数据类型，因此你需要使用
    `FORMAT()` 函数将其转换为百分比。


    顺便一提，这个函数与 `PERCENT_RANK()` 函数类似，后者的工作原理如下：给定数据集中的一组值，此函数计算每个单独值相对于整个数据集的排名。该函数也返回一个百分比。


    回到 `CUME_DIST()` 函数。我们将看两个例子，一个简单的，另一个则会查询我们的销售数据仓库。


    ### 一个简单示例


    让我们先看一个简单的例子，以便了解前面的描述在一个小数据集上如何运作。请参考清单 3-1a。


    ```sql

    USE TEST

    GO

    DECLARE @CumDistDemo TABLE (

    Col1 VARCHAR(8),

    ColValue INTEGER

    );

    INSERT INTO @CumDistDemo VALUES

    (''AAA'',1),

    (''BBB'',2),

    (''CCC'',3),

    (''DDD'',4),

    (''EEE'',5),

    (''FFF'',6),

    (''GGG'',7),

    (''HHH'',8),

    (''III'',9),

    (''JJJ'',10)

    SELECT Col1,ColValue,

    CUME_DIST() OVER(

    ORDER BY ColValue

    ) AS CumeDistValue,

    A.RowCountLE,

    B.TotalRows,

    CONVERT(DECIMAL(10,2),A.RowCountLE)

    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist

    FROM @CumDistDemo CDD

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLE FROM @CumDistDemo

    WHERE ColValue <= CDD.ColValue

    ) A

    CROSS APPLY (

    SELECT COUNT(*) AS TotalRows FROM @CumDistDemo

    ) B

    GO

    ```


    清单 3-1a: 一个简单示例


    声明了一个名为 `@CumDistDemo` 的简单表变量，并加载了十行数据。只创建了两列。第一列名为 `Col1`，充当键列，而 `ColValue` 列保存数据。在我们的例子中，这些数据是数字
    1-10。非常简单。


    该查询使用了 `CUME_DIST()` 函数和一个 `OVER()` 子句。没有包含 `PARTITION BY` 子句，但使用了 `ORDER BY`
    子句来按 `ColValue` 列升序对分区行进行排序。


    我们需要包含计算累积分布的公式，以便了解其工作原理并与 SQL Server 的版本进行比较。公式如下：


    行数（其值小于或等于当前列值）除以总行数。


    为了获得该公式的值，使用了两个 `CROSS APPLY` 运算符。第一个计算值小于或等于当前列值的行数，第二个计算数据集中的总行数。


    这个查询可能可以优化，但就我们的目的而言，它应该能说明 `CUME_DIST()` 函数是如何工作的。


    `CROSS APPLY` 块中查询返回的值被用在 `SELECT` 子句的公式中：


    ```sql

    CONVERT(DECIMAL(10,2),A.RowCountLE)

    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist

    ```


    让我们执行查询，看看结果。请参考图 3-1。


    ![](img/527021_1_En_3_Fig1_HTML.jpg)


    图 3-1: 计算累积分布的两种方式


    我认为，看起来不错且符合预期！`MyCumeDist` 列包含我们创建的公式计算出的值，而名为 `CumeDistValue` 的列包含 SQL Server
    函数计算出的值。可能需要一点格式化使它们看起来一致，但数值是匹配的。


    ### 查询销售数据


    现在我们理解了这个函数的工作原理，让我们创建一个针对我们销售数据的查询。我们将使用前一章中用过的策略。即，我们将使用一个 `CTE`（公用表表达式）来准备数据，然后在我们访问该
    `CTE` 的查询中使用正在学习的函数。


    请参考清单 3-1b。


    ```sql

    WITH CustSales (

    SalesYear,SalesQuarter,SalesMonth,CustomerNo,StoreNo,CalendarDate,SalesTotal

    )

    AS

    (

    SELECT YEAR(CalendarDate)        AS SalesYear

    ,DATEPART(qq,CalendarDate) AS SalesQuarter

    ,MONTH(CalendarDate)       AS SalesMonth

    ,ST.CustomerNo,

    ST.StoreNo,

    ST.CalendarDate,

    SUM(ST.UnitRetailPrice * ST.TransactionQuantity) AS SalesTotal

    FROM StagingTable.SalesTransaction ST

    GROUP BY ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,ST.UnitRetailPrice

    ,ST.TransactionQuantity

    )

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,CUME_DIST() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS CumeDist

    FROM CustSales

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    ```


    清单 3-1b: 实战中的 `CUME_DIST()` 函数


    我们设置了惯用的 `CTE`，以便从 `SalesTransaction` 表中提取事务数据，这样我们可以提取出具体的日期对象：年、季度和月。销售总额也通过将
    `UnitRetailPrice` 乘以 `TransactionQuantity` 列的结果相加来计算。（我必须承认这不够高效。我本可以使用 `TotalSalesAmount`
    列来避免这个公式。算了。）


    `CUME_DIST()` 函数使用了一个包含 `PARTITION BY` 子句和 `ORDER BY` 子句的 `OVER()` 子句。在 `SalesYear`
    列上设置了一个分区，并且分区的行集按 `SalesTotal` 列排序。


    结果需要再次汇总，因为我们排除了商店编号，并且只想按年、季度、月和客户查看总计。包含了一个 `WHERE` 子句来过滤结果，只显示一个客户和两个年份的数据。我这样做是为了保持结果集较小，但你可以移除它们以查看结果。


    请参考图 3-2 中的结果。


    ![](img/527021_1_En_3_Fig2_HTML.jpg)


    图 3-2: 测试脚本的查询结果


    结果按 `OVER()` 子句中的 `SalesTotal` 列排序，以便查看销售总额和累积分布结果的升序值，这样你就能看到公式是如何应用的。按销售额升序排序能很好地对齐数据。


    尝试按销售年份、季度和月对结果进行排序，这是业务分析师通常希望看到的方式。

    '
- fmt: '## 性能考量


    让我们以通常的方式生成一个估计的查询执行计划。结果很长，因此我们只查看显示的右半部分，因为这里展示了任务最有趣的统计数据。计划中的其他任务或步骤成本大多为0%，为了节省空间，我们忽略它们。


    请参考图 [3-3](#527021_1_En_3_Chapter.xhtml#Fig3)。


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig3_HTML.png)


    图 3-3：脚本的估计查询计划


    哎呀！看看这三个排序步骤。至少有一个索引查找，并且估计性能工具没有建议其他索引。


    索引查找任务占总执行计划成本的25%，其旁边的排序步骤成本为28%。可以看到第二个排序步骤占25%，因此这个查询似乎进行了大量排序。第三个排序步骤的成本是17%！


    这表明我们可以通过将 `CTE` 生成的初始数据暂存到某种报表或临时表中，并构建索引来辅助主查询的执行，从而提高性能。一个很大的好处是，你每天加载一次这个表，并且假设用户满足于24小时的数据刷新，那么当用户执行带有窗口函数的主查询时，加载过程的处理开销就不会包含在内。


    顺便说一句，如果你将鼠标悬停在每个排序步骤上，你会看到以下列被排序：


    *   第一个排序步骤：店铺和日历日期

    *   第二个排序步骤：按客户排序

    *   第三个排序步骤：再次按客户排序


    现在我们在反推查询计划估计器了。请自行尝试，根据前面的信息创建一两个索引来支持所需的排序。看看排序步骤是否被消除或至少减少。请记住，你在表上创建的索引越多，加载或编辑表行时的性能就会越慢。


    我在清单中包含了一个基于 `CTE` 逻辑的脚本，它将数据暂存到一个表中。还创建了一个索引来支持排序（该索引由估计查询计划工具建议）。结果是索引查找的成本略低，但排序仍然存在且略高。


    改进体现在查询统计信息中。在第一个查询中，访问销售事务表时，逻辑读取数为23，但使用临时表后减少到10。第一个查询中的物理读取数为1，而访问临时表的查询中则为0。


    这个策略似乎有效。再次强调，在看我的例子之前，请自己尝试一下。


    请参考表 [3-1](#527021_1_En_3_Chapter.xhtml#Tab1) 查看一些统计数据。


    **表 3-1：执行统计 – 无临时表 vs 有临时表**


    | SQL Server 解析和编译时间 | 无临时表 | 有临时表 |

    | :--- | :--- | :--- |

    | CPU 时间 (毫秒) | 0 | 0 |

    | 已用时间 (毫秒) | **77** | **6** |

    | **统计信息 (工作表)** | **现有索引** | **新索引** |

    | 扫描计数 | 26 | 26 |

    | 逻辑读取 | **198** | **196** |

    | 物理读取 | 0 | |

    | 预读 | 0 | |

    | **统计信息 (SalesTransaction)** | **现有索引** | **新索引** |

    | 扫描计数 | **1** | **2** |

    | 逻辑读取 | **23** | **10** |

    | 物理读取 | **0** | **1** |

    | 预读 | **0** | **3** |

    | **SQL Server 执行时间** | **现有索引** | **新索引** |

    | CPU 时间 (毫秒) | 0 | 0 |

    | 已用时间 (毫秒) | 35 | 2 |


    我重新运行了原始查询和访问临时表的查询。原始查询（包含 `CUME_DIST()` 函数）除了现在访问临时表而不是 `CTE` 外，没有做任何更改。另外，还创建了一些新索引。


    原始查询中的 `CTE` 被修改为只加载一次临时表。假设在真实的生产环境中，它会在非高峰时段每晚运行。


    如你所见，第一组的已用时间从77毫秒减少到6毫秒。这是个好的开始。扫描计数保持不变，工作表的逻辑读取数略有下降（198 vs 196）。


    查看 `SalesTransaction` 表的统计信息，扫描计数从1增加到2，而逻辑读取数下降到10。这也很好！


    现在我们来看物理读取和预读；它们分别从0增加到1和3。这就不太好了。最后，两种情况下的CPU时间都是零，但已用时间从35毫秒下降到2毫秒，所以这里有重大改进。


    最后几点说明：当你进行此分析时，由于硬件配置不同，你会得到不同的结果。你需要多次运行这些测试，以全面了解哪些有效、哪些无效。别忘了运行 `DBCC`，以便总是从干净的缓冲区开始。如果在每次运行测试前不执行此命令，会给你误导性的结果！


    > **注意**

    > 顺便说一下，`DBCC` 代表数据库一致性检查。这是一个非常强大且有用的工具。我建议你查阅 Microsoft SQL Server 关于它的文档。


    让我们查看第一个查询和使用临时表的查询的客户端统计信息。客户端统计信息按钮可以在带有绿色复选框的按钮右侧的菜单栏中找到。单击它可以打开或关闭它。


    请参考图 [3-4](#527021_1_En_3_Chapter.xhtml#Fig4)。


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig4_HTML.jpg)


    图 3-4：查询的客户端统计信息


    这很有趣。顶部的报告是第一个查询的。我只显示了客户端处理时间、总执行时间和等待服务器回复的时间。它们分别是25、126和101。


    第二个客户端统计信息报告显示客户端处理时间为11（很好），但看看总执行时间为5028，等待服务器回复的时间为5017。这些指标显著上升了。


    因此，从我们的讨论中可以得出几点要点。第一，你拥有一套由一些有价值的工具生成的统计信息和计划，在执行查询设计和调优时应该使用它们。


    第二，你需要多次运行测试以获得结果的“平均”视图。创建索引似乎是个好主意，但大多数时候，它们给出的结果与查询估计执行计划工具建议的索引相同或更差。如果你忘记运行
    `DBCC` 命令来清除缓冲区，你会得到误导性的结果，让你误以为性能在提升。


    最后，在处理少于20万行的小数据集时进行测试不会显示出太大差异。你需要看看当处理数百万行或更多时，一切是如何运作的！（查看销售数据仓库的加载脚本，看看是否可以通过修改我的加载脚本，在正在使用的事实表中加载500万到1000万行。请确保你做了备份。）


    我们工具箱中的下一个函数是 `PERCENT_RANK()` 函数。'
  raw: '### Performance Considerations


    Let’s generate an estimated query execution plan in the usual manner. The results
    are long, so we only look at the right half of the display as this is where the
    most interesting statistics for the tasks are displayed. The other tasks or steps
    in the plan are mostly 0% cost, so we ignore them in the interest of space constraints.


    Please refer to Figure [3-3](#527021_1_En_3_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig3_HTML.png)


    A screenshot of the chapter 0 3 S Q L code window. The top screen has some programming
    codes. The bottom screen has messages for query cost. Sort cost, 17%. Sort cost,
    25%. Sort cost, 28%. Index seek cost, 25%.


    Figure 3-3


    Estimated query plan for the script


    Yikes! Look at the three sort steps. At least there is an index seek, and no other
    indexes were suggested by the estimated performance tool.


    The index seek task costs 25% of the total execution plan, and the sort step next
    to it costs 28%. A second sort step at 25% can be seen, so a lot of sorting seems
    to occur with this query. A third sort step costs 17%!


    This is an indication that we could improve performance by staging the initial
    data generated by the `CTE` in some sort of report or staging table and building
    indexes to assist when the main query is executed. A large benefit would be that
    you load this table once a day, and assuming that users are happy with 24-hour
    data refresh, the processing of the loading is not included when the users execute
    the main query that has the window function.


    By the way, if you position your mouse over each sort step, you will see that
    the following columns are sorted:


    *   First sort step: Store and calendar date


    *   Second sort step: Sort by customer


    *   Third sort step: Sort by customer again


    Now we are second-guessing the query plan estimator. On your own, experiment by
    creating one or two indexes to support the required sorting based on the preceding
    information. See if the sort steps are eliminated or at least reduced. Keep in
    mind that the more indexes you create on a table, the slower performance will
    be when loading or editing the table rows.


    I have included a script based on the `CTE` logic in the listing that stages the
    data in a table. An index is also created to support the sorting (the index is
    suggested by the estimated query plan tool). The results are that the index seek
    costs a little less, but the sorting still exists and is a bit higher.


    Where the improvement appears is in the query statistics. In the first query,
    when accessing the sales transaction table, the logical reads are 23, but this
    is reduced to 10 when using the staging table. The physical reads in the first
    query are 1, while they are 0 in the query accessing the staging table.


    This strategy seems to work. Once again, try it on your own before looking at
    my example.


    Please refer to Table [3-1](#527021_1_En_3_Chapter.xhtml#Tab1) for some statistics.


    Table 3-1


    Execution Statistics – No Staging Table vs. Staging Table


    | SQL Server Parse and Compile Times | No Staging Table | Staging Table |

    | --- | --- | --- |

    | CPU time (ms) | 0 | 0 |

    | Elapsed time (ms) | **77** | **6** |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 26 | 26 |

    | Logical reads | **198** | **196** |

    | Physical reads | 0 |   |

    | Read-ahead reads | 0 |   |

    | **Statistics (SalesTransaction)** | **Existing Index** | **New Index** |

    | Scan count | **1** | **2** |

    | Logical reads | **23** | **10** |

    | Physical reads | **0** | **1** |

    | Read-ahead reads | **0** | **3** |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 0 | 0 |

    | Elapsed time (ms) | 35 | 2 |


    I reran the original query and the query that accesses the staging table. No changes
    were made to the original query (that contains the `CUME_DIST()` function) except
    that it now accesses the staging table instead of the `CTE`. Also, some new indexes
    were created.


    The `CTE` in the original query was modified so it loads the staging table once.
    Assume in a real production environment it would be run nightly at off hours.


    As can be seen, the first set of elapsed time went from 77 to 6 ms. Good start.
    The scan count remained the same and the logical reads went down a bit (198 vs.
    196) for the work table.


    Looking at the `SalesTransaction` table statistics, the scan count went from 1
    to 2, while the logical reads went down to 10\. This is also good!


    Now we get to physical reads and read-ahead reads; they went from 0 to 1 and 3,
    respectively. Not so good. Lastly, CPU time was zero in both cases, but it went
    from 35 to 2 ms for elapsed time, so some major improvement here.


    Some final comments: When you perform this analysis, you will get different results
    due to your hardware configuration. You need to run these tests several times
    to get a complete picture of what works and does not work. Do not forget to run
    `DBCC` so you always start off with clean buffers. Not executing this command
    before your run each test will give you misleading results!


    Note


    By the way, `DBCC` stands for database consistency check. A very powerful and
    useful tool. I suggest you research the Microsoft SQL Server documentation on
    this.


    Let’s check out the client statistics for the first query and the query that uses
    the staging table. The client statistics button can be found in the menu bar to
    the right of the button with the little green checkbox. Click it to turn it on
    or off.


    Please refer to Figure [3-4](#527021_1_En_3_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig4_HTML.jpg)


    A screenshot of the chapter 0 3 S Q L code window. The top screen has some programming
    codes and results, messages, and client statistics. The bottom screen has results,
    messages, and client statistics. It compares the time statistics for trial 1 and
    the average.


    Figure 3-4


    Client statistics for the queries


    This is interesting. The top report is for the first query. I am only showing
    client processing time, total execution time, and wait time on server replies.
    They are respectively 25, 126, and 101.


    The second client statistics report shows client processing time at 11 (good),
    but check out the total execution time at 5028 and wait time on server replies
    at 5017\. These went up significantly.


    So there are a few takeaways from our discussion. The first is you have a set
    of statistics and plans generated by some valuable tools that you should use when
    performing query design and tuning.


    Second, you need to run the tests several times to get an “average” view of the
    results. Creating indexes seems to be a good idea, but most of the time, they
    will give you the same results as or worse results than the indexes suggested
    by the query estimated execution plan tool. If you forget to run the `DBCC` command
    to clear the buffers, you will get misleading results that make you think performance
    is improving.


    Lastly, working on small sets of data like less than 200,000 rows will not show
    much difference when you are running tests. You need to see how everything works
    when dealing with millions of rows or more! (Look over the load scripts for the
    sales data warehouse and see if you can load 5–10 million rows in the fact tables
    we are using by modifying my load script. Make sure you make a backup.)


    Our next function in our bag of tricks is the `PERCENT_RANK()` function.'
