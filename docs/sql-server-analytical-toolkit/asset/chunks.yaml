    ### 性能考量


    在分区上使用`MIN()`和`MAX()`函数也可能对性能造成压力。让我们进行常规分析，看看如何评估并改进此查询的性能。


    请参考图 5-21。


    ![](img/527021_1_En_5_Fig23_HTML.jpg)


    `c h 0 5 aggregate queries s q l`的截图。屏幕上半部分显示了一些编程代码。下半部分显示了消息和执行计划。三个箭头分别指示窗口假脱机成本
    1%、排序成本 21% 和表扫描成本 65%。


    图 5-21

    `MIN/MAX`查询的估计查询计划


    我们立刻看到一个成本为 65%的表扫描任务和一个缺失索引消息。接着是一个成本为 21%的排序操作，以及一个成本为 1%的窗口假脱机，这表明我们正在使用物理存储而非内存。让我们看看图
    5-22 中估计查询计划的第 2 部分。


    ![](img/527021_1_En_5_Fig24_HTML.jpg)


    `c h 0 5 aggregate queries s q l`的截图。屏幕上半部分显示了一些编程代码。下半部分显示了消息和执行计划。两个箭头分别指示排序假脱机成本
    10% 和窗口假脱机成本 1%。


    图 5-22

    估计查询计划第 2 部分


    我们看到第二个窗口假脱机，成本为 1%。两个窗口假脱机任务是合理的，因为我们使用了`MIN()`和`MAX()`函数，所以每个函数生成一个假脱机任务。最后，我们有一个成本为
    10%的排序任务。请记住，我不讨论成本为 0%的任务，因为本章关于性能调优讨论的范围，我们只想处理成本更高的任务。不过，一个好的性能调优方法是先查看高成本任务，然后是那些你不知道其作用的未知任务。你不知道的东西可能会对你造成很大损害！


    同时，请确保检查任何带有警告图标的任务。让我们检查建议的索引，然后使用建议的名称创建它。


    请参考清单 5-9。


    ```

    /*

    Missing Index Details from ch05 - aggregate queries.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APFinance
    (DESKTOP-CEBK38L\Angelo (54))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 62.5426%.

    */

    /*

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Account] ([CustId],[AcctName])

    INCLUDE ([PrtfNo],[AcctNo],[AcctTypeCode],[AcctBalance],[PostDate])

    GO

    */

    清单 5-9

    建议的索引

    ```


    查询优化器称创建此索引可以将性能提升 62.54%。听起来不错！


    让我们来构建它。我们将此索引命名为`iePrtfNoAcctNoAcctTypeCodeAcctBalancePostDate`。


    是的，我知道索引名很长，但本书的目的是，我决定创建包含列名的索引名称以便于识别。这样，在学习过程中，你可以快速识别索引的用途。随着你的进展，你可以将索引重命名为更短但仍具描述性的名称。你的公司已经或应该有一些良好的数据库对象命名标准。


    前面的代码被复制到本章的脚本中，并使用了建议的名称，索引被创建。我们还执行了常规的`DBCC`命令来清除内存计划缓存并生成新的查询计划。让我们看看效果如何。请参考图
    5-23。


    ![](img/527021_1_En_5_Fig25_HTML.jpg)


    `c h 0 5 aggregate queries s q l`的截图。屏幕上半部分显示了一些编程代码。下半部分显示了消息和执行计划。三个箭头分别指示窗口假脱机成本
    4%、排序成本 37% 和索引查找成本 14%。


    图 5-23

    创建索引后的估计查询计划


    表扫描已被一个成本为 14%的索引查找所取代。到目前为止，一切顺利！


    我们现在看到一个昂贵的排序任务，成本为 37%，以及一个窗口假脱机，成本为 4%。这些成本上升了。情况不太好。让我们看看估计查询计划的左侧，看看那边是否有改善。


    请参考图 5-24。


    ![](img/527021_1_En_5_Fig26_HTML.png)


    `c h 0 5 aggregate queries s q l`的截图。屏幕上半部分显示了一些编程代码。下半部分显示了消息和执行计划。两个箭头分别指示排序成本
    37% 和窗口假脱机成本 4%。


    图 5-24

    查询计划的左侧


    我们在这里发现了同样的问题；窗口假脱机成本上升到了 4%，最后一个排序任务上升到了 37%。所以我们需要提出疑问：索引是帮助了还是让事情变得更糟了？为了回答这个问题，我们需要查看执行以下命令时生成的统计数据：


    ```

    SET STATISTICS PROFILE OFF

    GO

    ```


    我们需要在创建索引前后都进行此操作，以查看`IO`和其他统计数据是上升了还是下降了。结果请参考图 5-25。


    ![](img/527021_1_En_5_Fig27_HTML.png)


    `c h 0 5 aggregate queries s q l`的截图。屏幕有两个面板，比较了创建索引前后的总体子树成本统计数据。


    图 5-25

    创建索引前后的`PROFILE`统计数据


    这需要一些准备工作。首先，你需要在创建索引之前，在一个查询窗格中执行用于执行查询的`DBCC`命令。设置配置文件统计信息为开启状态并执行查询。


    打开第二个查询窗格，复制并粘贴`DBCC`、`SET PROFILE ON`和查询以及创建索引的代码。请遵循以下步骤：


    *   步骤 1：创建索引。

    *   步骤 2：执行`SET PROFILE ON`命令。

    *   步骤 3：执行`DBCC`命令。

    *   步骤 4：执行查询。


    确保查询窗格窗口垂直并排显示。可以看出，唯一的改善似乎是在子树成本上。估计的 CPU 统计数据有微小改善，但不多。


    让我们比较创建索引前后的`IO`和`TIME`统计数据，看看它们告诉了我们什么。请参考图 5-26。


    ![](img/527021_1_En_5_Fig28_HTML.png)


    `c h 0 5 aggregate queries s q l`的截图。屏幕有两个面板，比较了创建索引前后的`I O`和`TIME`统计数据。执行后，逻辑读取次数从
    372 降至 16，预读读取次数从 375 降至 0。


    图 5-26

    `IO`和`TIME`统计数据对比分析


    这组统计数据告诉了我们什么？


    我们可以看到，工作表的扫描计数和逻辑读取次数保持不变。


    我们可以看到，`Account`表的扫描计数保持不变，但逻辑读取次数从 372 下降到了 16，预读读取次数从 375 下降到了 0。


    所以，你可以看到，我们所有的性能分析工具都是必要的，这样我们才能真正看到一个索引是否有帮助。在这种情况下，它有一定帮助，创建索引是合理的。你确实需要考虑，创建一个只提升
    50%或更少性能的索引是否合理。当表被加载时，索引是否会导致性能下降？50%的提升是否意味着原来运行 4 秒的查询现在只需要 2 秒？将所有因素考虑在内。如果你的用户对
    4 秒的查询等待时间感到满意，那就不要动它。不要修没坏的东西。


    接下来，我们快速看一下`AVG()`函数。我们将不会像本节那样进行严格的性能分析。我将其留给你作为练习，因为现在你已经看到了几个使用所需工具和技巧来测量性能的例子。


    ### 随堂测验


    成本（cost）意味着什么？它是指一个步骤执行所需的时间，还是基于 IO、内存使用和 CPU 成本的加权人工值？

    '
- fmt: '# AVG( ) Function


    ## 函数概述


    `AVG()`函数计算表中某列所代表数据集的平均值。


    其语法如下：


    ```

    AVG(ALL|DISTINCT *) or AVG(ALL|DISTINCT column_name)

    ```


    ## 示例说明


    按照惯例，我们通过一个简单的示例来看看在函数调用中包含`ALL`或`DISTINCT`关键字对结果产生的影响。


    请参考清单 [5-10](#527021_1_En_5_Chapter.xhtml#PC21)。


    ```

    USE TEST

    GO

    -- easy example

    DECLARE @AVGMaxExample TABLE (

    ValueType VARCHAR(32),

    ExampleValue SMALLINT

    );

    INSERT INTO @AVGMaxExample VALUES

    (''Type 1'',20),

    (''Type 1'',20),

    (''Type 1'',30),

    (''Type 2'',40),

    (''Type 2'',60),

    (''Type 3'',60);

    SELECT AVG(ExampleValue)                    AS AVGExampleValue

    FROM @AVGMaxExample;

    SELECT AVG(ALL ExampleValue)                AS AVGExampleValueALL

    FROM @AVGMaxExample;

    SELECT AVG(DISTINCT ExampleValue)           AS AVGExampleValueDISTINCT

    FROM @AVGMaxExample;

    SELECT ValueType,AVG(ExampleValue)          AS AVGExampleValue

    FROM @AVGMaxExample

    GROUP BY ValueType;

    SELECT ValueType,AVG(ALL ExampleValue)      AS AVGExampleValueALL

    FROM @AVGMaxExample

    GROUP BY ValueType;

    SELECT ValueType,AVG(DISTINCT ExampleValue) AS AVGExampleValueDISTINCT

    FROM @AVGMaxExample

    GROUP BY ValueType;

    GO

    Listing 5-10

    Test Query

    ```


    使用一个加载了六行数据的表变量，我们想查看按类型计算的平均值结果。用简单的数据来理解这一点很关键，因为如果你不确定为重复数据与不同数据生成的结果，那么在查询数十万或数百万行时，你将在结果中产生严重的错误。这可能会变得非常严重！


    例如，计算一天中每小时的平均交易次数，包含重复值与仅包含不同值会产生不同的结果。你需要包含所有交易，即使是重复的，以获得准确的平均值（例如，上午10点有两笔交易，下午1点又有两笔交易，当天总共四笔交易）！


    让我们看看这个简单查询的结果。请参考图 [5-27](#527021_1_En_5_Chapter.xhtml#Fig29)。


    ![图片描述](images/527021_1_En_5_Chapter/527021_1_En_5_Fig29_HTML.jpg)

    图 5-27

    在计算平均值时测试 ALL 与 DISTINCT


    从顶部开始，在`AVG()`函数中使用`ALL`或什么都不用，结果为38。使用`DISTINCT`得到的结果是37。当我们引入`ValueType`列时，我们看到了类似的行为。


    掌握了这些知识后，让我们尝试对我们的财务数据运行一个查询。


    ## 实际应用：计算滚动平均值


    我们的业务分析师需要一个查询来生成一份报告显示客户账户的滚动三天平均值。和往常一样，我们选择客户“C0000001”（John Smith）。如果你查看`Customer`表，你会发现Smith先生的年薪是250,000美元。不错！


    该查询需要显示现金账户的结果，并且仅限于2012年的第一个月。我们希望有能力显示其他年份，因此我们需要包含注释掉的代码，以便根据分析师的请求启用（你可以自己完成这部分）。


    请参考清单 [5-11](#527021_1_En_5_Chapter.xhtml#PC22)。


    ```

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,AVG(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* uncomment to report on more than 1 year */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS [3 DayRollingAcctAvg]

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /*******************************************/

    /* Uncomment to report on more than 1 year */

    /*******************************************/

    --WHERE YEAR(PostDate) IN(2012,2013)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    AND MONTH(PostDate) = 1

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    Listing 5-11

    Rolling Three-Day Averages

    ```


    顺便说一句，这里没有使用`CTE`。`AVG()`函数与`OVER()`子句一起使用，该子句按月份对数据集进行分区，并按过账日期对分区结果集进行排序。包含了`ROWS`子句来创建一个窗口框架，该框架在处理结果时包括前两行和当前行。


    请记住，这只是针对现金账户。比较现金账户平均值与股票账户平均值会很有趣，例如，看看Smith先生是赚钱了还是亏钱了。是否有大量现金从账户流出用于购买股票？股票上涨了吗，然后它们被卖出获利，从而现金存款被存回现金账户？


    你可以通过修改查询以包含股票账户来做到这一点。


    让我们查看图 [5-28](#527021_1_En_5_Chapter.xhtml#Fig30) 中的结果，然后我们可以绘制它们。


    ![图片描述](images/527021_1_En_5_Chapter/527021_1_En_5_Fig30_HTML.jpg)

    图 5-28

    滚动三天现金账户平均值


    输出按天排序，因此你可以看到平均值是如何按日计算的。请注意，有很多负的账户余额，这可能意味着存在大量不稳定的交易。在实际的交易场景中，会有检查机制来防止在资金账户余额为负的情况下进行交易，或者可能采取某种机制，以便在出现短缺时可以从其他账户转移资金以备不时之需。


    一图胜千言，所以让我们将这些数据复制到Excel中并生成一个漂亮的图表。


    请参考图 [5-29](#527021_1_En_5_Chapter.xhtml#Fig31) 中的Excel图表。


    ![图片描述](images/527021_1_En_5_Chapter/527021_1_En_5_Fig31_HTML.png)

    图 5-29

    现金账户的滚动三天平均值


    账户余额和平均值总体呈上升趋势，但有很多上下波动。虚线线性余额线用于显示趋势，所以它至少是指向上的。


    我们正在逐一研究这些函数，但有价值的报告会给出账户绩效的概况。我的意思是，在一份报告中使用我们讨论过的所有函数，这样分析师可以看到账户的所有绩效方面。


    通过重新利用之前查询的代码并为现金账户或其他账户类型（如股票或外汇）创建一个概况报告，你可以自己尝试一下。


    最后一点：使用Excel在SQL Server函数生成的值旁边生成三天滚动平均值，以验证结果。始终验证查询生成的数据。'
  raw: '### AVG( ) Function


    The `AVG()` function calculates the average of a data set represented by a column
    in a table.


    Here is the syntax:


    ```

    AVG(ALL|DISTINCT *) or AVG(ALL|DISTINCT )

    ```


    As usual, let’s look at a simple example so you can see the effect on the results
    that occur when you include the `ALL` or `DISTINCT` keyword in the function call.


    Please refer to Listing [5-10](#527021_1_En_5_Chapter.xhtml#PC21).


    ```

    USE TEST

    GO

    -- easy example

    DECLARE @AVGMaxExample TABLE (

    ValueType VARCHAR(32),

    ExampleValue SMALLINT

    );

    INSERT INTO @AVGMaxExample VALUES

    (''Type 1'',20),

    (''Type 1'',20),

    (''Type 1'',30),

    (''Type 2'',40),

    (''Type 2'',60),

    (''Type 3'',60);

    SELECT AVG(ExampleValue)                    AS AVGExampleValue

    FROM @AVGMaxExample;

    SELECT AVG(ALL ExampleValue)                AS AVGExampleValueALL

    FROM @AVGMaxExample;

    SELECT AVG(DISTINCT ExampleValue)           AS AVGExampleValueDISTINCT

    FROM @AVGMaxExample;

    SELECT ValueType,AVG(ExampleValue)          AS AVGExampleValue

    FROM @AVGMaxExample

    GROUP BY ValueType;

    SELECT ValueType,AVG(ALL ExampleValue)      AS AVGExampleValueALL

    FROM @AVGMaxExample

    GROUP BY ValueType;

    SELECT ValueType,AVG(DISTINCT ExampleValue) AS AVGExampleValueDISTINCT

    FROM @AVGMaxExample

    GROUP BY ValueType;

    GO

    Listing 5-10

    Test Query

    ```


    Using a table variable loaded with six rows of data, we want to see the results
    of averages by type. This is key to understand with simple data because if you
    are unsure of the results generated for duplicate data vs. distinct data, you
    will create serious errors in your results when querying hundreds of thousands
    or millions of rows. This could get serious!


    For example, calculating the average number of trades per hour in a day and including
    duplicates will generate different values than if you only include distinct values.
    You want to include all trades, even duplicates, to get an accurate average (like
    two trades at 10 AM and two more trades at 1 PM, total of four trades that day)!


    Let’s see the results of our simple query. Please refer to Figure [5-27](#527021_1_En_5_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig29_HTML.jpg)


    A screenshot of c h 0 5 aggregate window. The view option of the main menu is
    highlighted. The result and message panels present the average example value and
    average example value DISTINCT.


    Figure 5-27


    Testing ALL vs. DISTINCT when calculating averages


    Starting from the top, using `ALL` or nothing at all in the `AVG()` function yields
    a result of 38\. Using `DISTINCT` yields a result of 37\. When we introduce the
    `ValueType` column, we see similar behavior.


    Armed with this knowledge, let’s try a query against our financial data.


    Our business analyst needs a query that will generate a report that shows rolling
    three-day averages for the customer account. As usual we pick customer “C0000001”
    (John Smith). If you look at the Customer table, you see Mr. Smith earns $250,000
    a year. Nice!


    The query needs to show results for the cash account and for only the first month
    of the year 2012\. We want the capability of showing other years, so we need to
    include commented-out code that we can enable as per the analyst’s request (you
    can do this on your own).


    Please refer to Listing [5-11](#527021_1_En_5_Chapter.xhtml#PC22).


    ```

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,AVG(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* uncomment to report on more than 1 year */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS [3 DayRollingAcctAvg]

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /*******************************************/

    /* Uncomment to report on more than 1 year */

    /*******************************************/

    --WHERE YEAR(PostDate) IN(2012,2013)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    AND MONTH(PostDate) = 1

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    Listing 5-11

    Rolling Three-Day Averages

    ```


    No `CTE` is used by the way. The `AVG()` function is used with an `OVER()` clause
    that partitions the data set by month and orders the partition result set by posting
    date. The `ROWS` clause is included to create a window frame that includes the
    prior two rows and the current row as the results are processed.


    Remember this is for the cash account only. It would be interesting to compare
    the cash account averages vs. the equity account averages, for example, to see
    if Mr. Smith made or lost money. Did a lot of cash go out of the account to buy
    equities? Did the equities go up, and were they then sold at a profit so that
    cash deposits were made back to the cash account?


    You can do this by modifying the query to include equity accounts.


    Let’s check out the results in Figure [5-28](#527021_1_En_5_Chapter.xhtml#Fig30),
    and then we can graph them.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig30_HTML.jpg)


    A screenshot of the c h 0 5 aggregate queries dot s q l window. The upper screen
    presents some programming codes. The lower screen presents the results table which
    has 10 columns. The values of the column Account Balance are highlighted in the
    box.


    Figure 5-28


    Rolling three-day cash account averages


    The output is sorted by day so you can see how the averages are calculated on
    a daily basis. Notice that there are a lot of negative account balances, so this
    might imply a lot of volatile trading. In actual trading scenarios, checks are
    in place to prevent a trade in case funding account balances are negative, or
    maybe some sort of mechanism is put in place where funds can be moved from other
    accounts to cover the short falls just in case.


    A picture is worth a thousand words, so let’s copy this data to Excel and generate
    a nice graph.


    Please refer to the Excel graph in Figure [5-29](#527021_1_En_5_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig31_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 3 columns
    for post date, balance, and 3-day rolling account average. On the right screen,
    a line graph plots the running daily average versus daily balance.


    Figure 5-29


    Rolling three-day averages for the cash account


    Account balances and averages are generally trending upward, but there are a lot
    of up and down swings. The dotted linear balance line is used to show trends,
    so at least it is pointing up.


    We are looking at these functions on a one-by-one basis, but valuable reports
    would give a profile of account performance. By this I mean use all the functions
    we discussed in a single report so the analyst can see all performance aspects
    of the account.


    Try this on your own by repurposing the code from prior queries and creating a
    profile report for either the cash account or other account types like equity
    or FX (foreign exchange).


    One last comment: Use Excel to generate the three-day rolling averages next to
    the values generated by the SQL Server functions to validate the results. Always
    validate data generated by your queries.'
  trans: '# AVG() 函数


    ## 函数概述


    `AVG()` 函数计算表中某列所代表数据集的平均值。


    其语法如下：


    ```

    AVG(ALL|DISTINCT *) or AVG(ALL|DISTINCT column_name)

    ```


    ## 示例说明


    按照惯例，我们通过一个简单的示例来看看在函数调用中包含 `ALL` 或 `DISTINCT` 关键字对结果产生的影响。


    请参考清单 5-10。


    ```

    USE TEST

    GO

    -- 简单示例

    DECLARE @AVGMaxExample TABLE (

    ValueType VARCHAR(32),

    ExampleValue SMALLINT

    );

    INSERT INTO @AVGMaxExample VALUES

    (''Type 1'',20),

    (''Type 1'',20),

    (''Type 1'',30),

    (''Type 2'',40),

    (''Type 2'',60),

    (''Type 3'',60);

    SELECT AVG(ExampleValue)                    AS AVGExampleValue

    FROM @AVGMaxExample;

    SELECT AVG(ALL ExampleValue)                AS AVGExampleValueALL

    FROM @AVGMaxExample;

    SELECT AVG(DISTINCT ExampleValue)           AS AVGExampleValueDISTINCT

    FROM @AVGMaxExample;

    SELECT ValueType,AVG(ExampleValue)          AS AVGExampleValue

    FROM @AVGMaxExample

    GROUP BY ValueType;

    SELECT ValueType,AVG(ALL ExampleValue)      AS AVGExampleValueALL

    FROM @AVGMaxExample

    GROUP BY ValueType;

    SELECT ValueType,AVG(DISTINCT ExampleValue) AS AVGExampleValueDISTINCT

    FROM @AVGMaxExample

    GROUP BY ValueType;

    GO

    Listing 5-10

    测试查询

    ```


    使用一个加载了六行数据的表变量，我们想查看按类型计算的平均值结果。用简单的数据来理解这一点很关键，因为如果你不确定为重复数据与不同数据生成的结果，那么在查询数十万或数百万行时，你将在结果中产生严重的错误。这可能会变得非常严重！


    例如，计算一天中每小时的平均交易次数，包含重复值与仅包含不同值会产生不同的结果。你需要包含所有交易，即使是重复的，以获得准确的平均值（例如，上午 10 点有两笔交易，下午
    1 点又有两笔交易，当天总共四笔交易）！


    让我们看看这个简单查询的结果。请参考图 5-27。


    ![图片描述](img/527021_1_En_5_Fig29_HTML.jpg)

    图 5-27

    在计算平均值时测试 ALL 与 DISTINCT


    从顶部开始，在 `AVG()` 函数中使用 `ALL` 或什么都不用，结果为 38。使用 `DISTINCT` 得到的结果是 37。当我们引入 `ValueType`
    列时，我们看到了类似的行为。


    掌握了这些知识后，让我们尝试对我们的财务数据运行一个查询。


    ## 实际应用：计算滚动平均值


    我们的业务分析师需要一个查询来生成一份报告显示客户账户的滚动三天平均值。和往常一样，我们选择客户“C0000001”（John Smith）。如果你查看 `Customer`
    表，你会发现 Smith 先生的年薪是 250,000 美元。不错！


    该查询需要显示现金账户的结果，并且仅限于 2012 年的第一个月。我们希望有能力显示其他年份，因此我们需要包含注释掉的代码，以便根据分析师的请求启用（你可以自己完成这部分）。


    请参考清单 5-11。


    ```

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,AVG(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* 取消注释以报告超过 1 年的数据 */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS [3 DayRollingAcctAvg]

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /*******************************************/

    /* 取消注释以报告超过 1 年的数据 */

    /*******************************************/

    --WHERE YEAR(PostDate) IN(2012,2013)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    AND MONTH(PostDate) = 1

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    Listing 5-11

    滚动三天平均值

    ```


    顺便说一句，这里没有使用 `CTE`。`AVG()` 函数与 `OVER()` 子句一起使用，该子句按月份对数据集进行分区，并按过账日期对分区结果集进行排序。包含了
    `ROWS` 子句来创建一个窗口框架，该框架在处理结果时包括前两行和当前行。


    请记住，这只是针对现金账户。比较现金账户平均值与股票账户平均值会很有趣，例如，看看 Smith 先生是赚钱了还是亏钱了。是否有大量现金从账户流出用于购买股票？股票上涨了吗，然后它们被卖出获利，从而现金存款被存回现金账户？


    你可以通过修改查询以包含股票账户来做到这一点。


    让我们查看图 5-28 中的结果，然后我们可以绘制它们。


    ![图片描述](img/527021_1_En_5_Fig30_HTML.jpg)

    图 5-28

    滚动三天现金账户平均值


    输出按天排序，因此你可以看到平均值是如何按日计算的。请注意，有很多负的账户余额，这可能意味着存在大量不稳定的交易。在实际的交易场景中，会有检查机制来防止在资金账户余额为负的情况下进行交易，或者可能采取某种机制，以便在出现短缺时可以从其他账户转移资金以备不时之需。


    一图胜千言，所以让我们将这些数据复制到 Excel 中并生成一个漂亮的图表。


    请参考图 5-29 中的 Excel 图表。


    ![图片描述](img/527021_1_En_5_Fig31_HTML.png)

    图 5-29

    现金账户的滚动三天平均值


    账户余额和平均值总体呈上升趋势，但有很多上下波动。虚线线性余额线用于显示趋势，所以它至少是指向上的。


    我们正在逐一研究这些函数，但有价值的报告会给出账户绩效的概况。我的意思是，在一份报告中使用我们讨论过的所有函数，这样分析师可以看到账户的所有绩效方面。


    通过重新利用之前查询的代码并为现金账户或其他账户类型（如股票或外汇）创建一个概况报告，你可以自己尝试一下。


    最后一点：使用 Excel 在 SQL Server 函数生成的值旁边生成三天滚动平均值，以验证结果。始终验证查询生成的数据。'
- fmt: '### Performance Considerations


    Does the `AVG()` function use more or less resources than the other aggregate
    functions we discussed? I copied the query we just discussed and changed the `AVG()`
    function to the `SUM()` function. I then generated an estimated query plan for
    each, and they were the same. Same steps, costs, etc. I also tried the `STDEV()`
    function vs. the `AVG()` function, and the results were the same.


    #### Pop Quiz Answer

    Costs are derived from weighted calculation that measures CPU, IO, and memory
    usage costs.


    A deeper analysis is called for to answer this question.


    Let’s perform our usual analysis with the query plan estimator, this time paying
    attention to the `ROWS` clause in the `OVER()` clause.


    Please refer to Figure [5-30](#527021_1_En_5_Chapter.xhtml#Fig32).

    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig32_HTML.jpg)

    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Window spool cost, 4%. Sort cost, 38%. Index seek cost, 20%.

    **Figure 5-30**

    Estimated query plan for the three-day rolling averages (part A)


    An existing index is used (20% cost), then followed by a sort step (38%), and
    there is our window spool at a cost 4%. This means spool activity is performed
    on physical storage. Let’s look at the left-hand side of the estimated query plan.
    Please refer to Figure [5-31](#527021_1_En_5_Chapter.xhtml#Fig33).

    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig33_HTML.jpg)

    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Sort cost, 36%. Window spool cost, 4%.

    **Figure 5-31**

    Estimated query plan for the three-day rolling averages (part B)


    There’s the same window spool task as a point of reference between the two screenshots.
    The sort at the left-hand side costs 36% and is the last highest task as far as
    cost is concerned.


    Let’s change the `ROWS` clause so we get a four-day rolling average instead of
    a three-day rolling average with the following modification:

    ```sql

    ,AVG(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    ```


    Running another estimated query plan after we execute the `DBCC` function (to
    clear the plan cache), the following plan in Figure [5-32](#527021_1_En_5_Chapter.xhtml#Fig34)
    is generated.


    #### Pop Quiz

    Why do we use `DBCC` to clear the plan cache?


    Changing the `ROWS` clause to generate a four-day rolling average calculation
    increased the window spool. Please refer to Figure [5-32](#527021_1_En_5_Chapter.xhtml#Fig34).

    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig34_HTML.png)

    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. An arrow indicates window spool cost, 4%.

    **Figure 5-32**

    Estimated query performance plan for the four-day rolling average query


    The index seek went down to 19% cost, the sort went down to 35%, and the window
    spool task is 5%. Seems that if we increase the number value for preceding rows
    in the `ROWS` clause, the window spool cost goes up. Sadly, this is not true all
    of the time. I changed the values to 4, 5, and 8, and the window spool cost went
    back down to three. Interesting.


    I modified the query so we had three calls to the `AVG()` function with the preceding
    row values set to 3, 4, and 5, and the window spool costs were 3%, 3%, and 4%,
    respectively. So my initial assumption did not hold.


    The sort costs went down a bit though. Try this analysis on your own to see what
    results you get.


    Let’s do some multidimensional analysis next by rolling up totals.


    ### GROUPING Function


    Recall from Chapter [2](#527021_1_En_2_Chapter.xhtml) that the `GROUPING()` function
    can be compared to a Microsoft Excel spreadsheet pivot table but implemented with
    `TSQL`. The results are powerful but confusing to view and complicated to analyze.
    Pivot tables are three dimensional; the function results are two dimensional.


    We will create a query and look at the results. We will then modify the query
    so it only generates raw data, and we will copy it to a Microsoft Excel spreadsheet
    so we can create a pivot table. We will compare the two results to see if we get
    the same values.


    As a refresher, recall from Chapter [2](#527021_1_En_2_Chapter.xhtml) how grouping
    works. Please refer to Figure [5-33](#527021_1_En_5_Chapter.xhtml#Fig35).

    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig35_HTML.jpg)

    A diagram has 3 tables at level 0, 3 tables at level 1, and one table at level
    2. Each table has 2 columns for category and value or sum. The categories are
    A, B, and C. The rollups are 15 for category A, 30 for category B, and 45 for
    category C. The final sum is 90 at level 2.

    **Figure 5-33**

    How grouping and rollups work


    Starting with the three categories of rows to the left of the diagram, each row
    in the data set has a category and a value. The categories are A, B, and C. If
    we summarize the values for each category at level 0, we get rollups of 15 for
    category A, 30 for category B, and 45 for category C positioned at level 1. If
    we summarize these three rollup totals, we get a final value of 90 at level 2.


    Imagine how powerful but confusing this structure is if we are grouping and rolling
    up totals for tens of thousands of rows!


    Back to finance. Here is our business analyst requirement:


    Generate a report for another customer `C0000003` (Sherlock Carruthers) that shows
    transaction totals for `EURO` (European Union Currency) and `GBP` (Great Britain
    Pound Sterling) foreign currency trades. Show only for the month of January for
    the 2012 calendar year.


    The results need to be grouped and rolled up by year, quarter, month, transaction
    date, and financial instrument symbol.


    Listing [5-12](#527021_1_En_5_Chapter.xhtml#PC24) is the resulting query based
    on this specification.

    ```sql

    SELECT YEAR(TransDate)        AS TransYear

    ,DATEPART(qq,TransDate) AS TransQtr

    ,MONTH(TransDate)       AS TransMonth

    ,TransDate

    ,Symbol

    ,CustId

    ,TransAmount

    ,SUM(TransAmount)      AS SumOfTransAmt

    ,GROUPING(TransAmount) AS TransAmtGroup

    FROM Financial.[Transaction]

    WHERE Symbol IN (''EURO'',''GBP'')

    AND CustId = ''C0000003''

    AND YEAR(TransDate) = 2012

    AND MONTH(TransDate) = 1

    GROUP BY YEAR(TransDate)

    ,DATEPART(qq,TransDate)

    ,MONTH(TransDate)

    ,TransDate

    ,Symbol

    ,CustId

    ,TransAmount WITH ROLLUP

    ORDER BY YEAR(TransDate)

    ,DATEPART(qq,TransDate)

    ,MONTH(TransDate)

    ,TransDate

    ,Symbol

    ,CustId

    ,(CASE WHEN TransAmount IS NULL THEN 0 END)DESC

    ,SUM(TransAmount) DESC

    ,GROUPING(TransAmount) DESC

    GO

    ```

    **Listing 5-12**

    Transaction Rollups for EURO and GBP


    The `GROUPING()` function appears right after the `SUM()` function. There are
    two important coding sections we need to be aware of.


    First, we need to add the `WITH ROLLUP` directive to the `TransAmount` column
    in the `GROUP BY` clause so we can generate the rollups.


    Second, in the `ORDER BY` clause, we need to include the conditional `CASE` code
    block, so we know how to sort `NULL` values for the `TransAmount` column. Notice
    we also include the `SUM()` and `GROUPING()` functions in the `ORDER BY` clause
    using a small `CASE` block so we generate a report that lines up all `NULL` values
    correctly as you navigate up the `ROLLUP` of the transaction amounts.


    Please refer to the partial results in Figure [5-34](#527021_1_En_5_Chapter.xhtml#Fig36).

    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig36_HTML.jpg)'
