    概念模型请参考图 8-3。


    ![](img/527021_1_En_8_Fig3_HTML.png)


    一个电厂设备状态历史概念模型的框图。设备状态历史块与日历、设备在线状态和设备块相关联。


    图 8-3


    工厂概念数据模型 – 设备状态历史主题区域


    这是一个简单得多的模型。它只有一个事实实体和三个维度实体。与之前的模型一样，`Equipment` 实体用于标识正在跟踪其状态历史的设备。`Calendar`
    实体提供状态分配的日期，最后一个实体 `Equipment Online Status` 具有标识设备状态的三个代码之一的属性，这些代码在表 8-1 中标识。


    表 8-1


    设备在线状态代码


    | 在线状态代码 | 在线状态描述 |

    | --- | --- |

    | 0001 | 在线 – 正常运行 |

    | 0002 | 离线 – 维护 |

    | 0003 | 离线 – 故障 |


    只有三个状态代码，但足够我们进行一些有趣的分析。


    我们的最后一个模型是工厂费用主题区域。请参考图 8-4。


    ![](img/527021_1_En_8_Fig4_HTML.png)


    一个工厂费用概念模型的框图。工厂费用块与日历、工厂和工厂费用类别相关联。


    图 8-4


    工厂概念数据模型 – 工厂费用主题区域


    另一个简单的主题区域模型，只有一个“事实”实体和三个“维度”实体。我用引号标出这些名称，因为这些术语实际上只适用于物理表，但就我们的目的而言，我们理解这些实体用于帮助我们理解将用于构建数据仓库的业务模型。稍后，在数据库实现时，它们将成为事实表或维度表。


    回到主题区域模型。这里我们希望记录随时间推移的工厂费用，因此 `Plant Expense` 实体和 `Calendar` 实体之间当然存在关联以记录费用日期。工厂费用与工厂之间的关联是显而易见的。最后，`Plant
    Expense Category` 实体用于使用表 8-2 中显示的以下代码之一标识费用类型。


    表 8-2


    工厂费用代码


    | 费用代码 | 费用描述 |

    | --- | --- |

    | 01 | 工资 |

    | 02 | 维修 |

    | 03 | 机械 |

    | 04 | 建筑维护 |


    创建了三个简单模型后，让我们创建一些简单的数据字典，提供实体、其属性以及实体之间关系（这些称为业务规则）的描述。


    它们有点长，而且说实话，读起来很枯燥。只需看看它们，并在需要时用作参考。至少你知道在哪里可以找到它们。


    ## 数据字典'
- fmt: '### Entity Data Dictionary


    Our first data dictionary is used to describe the purpose of each business entity.
    These are the business objects that define the purpose of the database.


    Please refer to Table [8-3](#527021_1_En_8_Chapter.xhtml#Tab3).


    `Table 8-3`


    | Entity Name | Description |

    | --- | --- |

    | Calendar | Basic calendar for date reporting. |

    | EquipFailureManufacturer | Associates failed equipment with the manufacturer.
    |

    | Equipment | The equipment in the plant, in our scenario either a valve, motor,
    or turbine. |

    | EquipmentFailure | Fact table containing historical equipment failure rates.
    |

    | EquipmentFailureStatistics | Denormalized report table containing production
    keys and failure history. |

    | EquipmentStatusHistory | Fact table containing history of equipment online or
    offline status. How often was equipment online and offline? |

    | EquipmentType | Identifies the type of equipment. |

    | EquipOnlineStatusCode | Identifies status codes of equipment operation: 0001
    – online normal operation, 0002 – offline for maintenance, 0003 – offline due
    to failure. |

    | Generator | Dimension table storing attributes of a generator, like voltage.
    |

    | Location | Dimension table storing attributes of a location. |

    | Manufacturer | The manufacturer for a particular piece of equipment. |

    | Motor | Dimension table storing attributes of a motor such as current and voltage.
    |

    | Plant | The power plant that contains the equipment we are monitoring and measuring.
    |

    | PlantBudget | Budget allocated to a plant. |

    | PlantExpense | Expenses incurred by a power plant. |

    | PlantExpenseCategory | Identifies categories of expenses: 01 – employee salaries;
    02 – equipment and plant repairs; 03 – capital expenses associated with machinery,
    like new motors; 04 – plant building maintenance. |

    | TempSensorLog | Report table containing temperature history of equipment. Also
    identifies the hour where a temperature was not recorded. |

    | Turbine | Dimension table storing attributes of a turbine such as rpm. |

    | Valve | Dimension table storing attributes of a valve. |


    Next is the entity attribute data dictionary, a long list, but it is worth becoming
    familiar with the attributes that will be used to create the table columns. You
    do not need to read this table one row at a time; just skim through it. You can
    refer back to it, if you do not know what a column in the tables you are using
    in a query means. Consider it a reference table. I could have put it in an appendix,
    but I think it is more useful here. Saves jumping back and forth between the chapter
    and the appendix.


    ### Entity Attribute Data Dictionary


    This data dictionary should also contain a column to at least identify the primary
    and foreign keys and other keys (PK, primary key; FK, foreign key; IE, inversion
    entry key; AK, alternate key), but in the interest of space, I omitted the column.
    I did highlight the proposed surrogate keys by using italics and bold font. These
    are unique keys that can be used as primary keys when the database is implemented.


    This basic information should be enough to guide you when you create the `JOIN`
    clauses in your queries.


    The descriptions are brief but should provide a basic understanding of the business
    attributes that will become the physical columns in our data warehouse tables.
    Please refer to Table [8-4](#527021_1_En_8_Chapter.xhtml#Tab4).


    `Table 8-4`


    Entity Attribute Data Dictionary'
