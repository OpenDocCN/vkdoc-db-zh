  trans: '

    表 2-1 是一个简单的表格，展示了将成为事实表和维度表的各个实体之间的关联。你需要理解这些关联，以便构建将这些表连接起来的查询。


    ## 表 2-1：事实-维度关联


    | 维度 | 业务规则 | 事实/维度表 | 基数 |

    | --- | --- | --- | --- |

    | 国家 | 标识 | 销售 | 一对零、一对多或多对多 |

    | 门店 | 完成 | 销售 | 一对零、一对多或多对多 |

    | 客户 | 是 | 销售 | 一对零、一对多或多对多 |

    | 产品 | 是 | 销售 | 一对零、一对多或多对多 |

    | 产品类别 | 产品的类别分类 | 产品 | 一对零、一对多或多对多 |

    | 产品子类别 | 的子类别分类 | 产品类别 | 一对一，多对一 |

    | 日历 | 标识 | 销售 | 一对零、一对多或多对多 |


    通常，这类表格出现在包含构成数据库的各种数据对象信息的数据字典中。观察前表中的关联，我们还想强调连接这些关联的业务规则。


    一个国家在 `Sales` 事实表中标识零个、一个或多个行的位置。一个事实表行需要包含国家代码，但也可能存在 `Country` 表中的行在 `Sales`
    表中没有相关行的情况。在你将构建的数据库中，尽管 `Country` 维度包含了大部分 ISO 标准国家代码的信息，但只有美国的销售交易记录。


    注意


    数据仓库是一种特殊类型的表。在本章中，我将这两个术语互换使用。


    一个门店可以是 `Sales` 事实表中零个、一个或多个记录的主体。可能存在一个尚未售出任何产品的新门店，因此在 `Sales` 事实表中没有记录。


    同样的规则适用于客户。一个客户可以在 `Sales` 表中出现零次、一次或多次。可能存在一个尚未购买任何东西的新客户，因此该客户会出现在 `Customer`
    维度中，但不会出现在 `Sales` 事实表中。


    一个产品可以在 `Sales` 事实表中出现零次、一次或多次销售记录。可能存在一个尚未售出的产品出现在 `Product` 表中的情况。


    一个产品类别可以指一个或多个产品子类别，每个产品类别可以指一个或多个产品。可能存在由于各种原因（例如尚未生产出来）尚未分配给产品的产品类别和产品子类别。（例如，我们计划销售冰淇淋但尚未生产出来。）


    最后但同样重要的是，这是一个描述表本身的基本数据字典，尽管其名称已经相当一目了然。请参考表 2-2。


    ## 表 2-2：表定义数据字典


    | 表名 | 描述 |

    | --- | --- |

    | Calendar | 用于时间报告的基本日历日期对象（例如日期、季度、月份和年份对象）。 |

    | Country | 包含世界上大多数国家的 ISO 双字符和三字符代码，例如 US 或 USA。 |

    | Customer | 基本客户表，用于存储客户的姓名和标识符。 |

    | Product | 基本产品表，存储产品的名称和描述。 |

    | Product Category | 产品的高级类别代码和描述：巧克力、蛋糕、馅饼、羊角面包和果塔饼干。 |

    | Product Subcategory | 进一步细分产品类别。例如，巧克力可以细分为黑巧克力-小、黑巧克力-中和黑巧克力-大。 |

    | Store | 包含 16 家门店的基本信息：门店编号、名称和区域。对销售业绩分析很有用。 |

    | Sales | 存储客户多年的所有销售交易记录。谁在何时何地买了什么！ |


    请记住，这只是我们将要使用的基本数据仓库的一套基本设计规范。在介绍数据仓库和星型模式的最基本概念时，我做了很大的简化。你还需要描述主键、外键和代理键的数据字典，以及描述事实表和维度表中各列及其数据类型的数据字典。


    总而言之，我们的目标是拥有一个简单的数据仓库，我们可以在学习本书讨论的所有窗口函数功能时加载并使用它。希望本节能让你对将使用本书 Google 网站上的脚本构建的数据仓库有一个基本的了解。

    '
- fmt: '## A Word About Performance Tuning


    Key to creating queries and batch scripts that utilize the window functions (and
    the `OVER()` clause) is performance. We want to create queries that are not only
    accurate but fast. No user will be happy with a query that runs more than one
    minute.


    You will need to develop some skills in performance tuning, which entails using
    tools provided by SQL Server and how to create indexes based on the feedback these
    tools give you when you analyze the queries you are designing.


    There are several tools available with SQL Server and tools available from different
    vendors. We will concentrate on the following SQL Server tools:


    *   Query plans

    *   Setting `STATISTICS IO ON/OFF`

    *   Setting `STATISTICS TIME ON/OFF`

    *   Client statistics

    *   Creating indexes (suggested or your own)

    *   Lots of curiosity and patience


    There are also table denormalization, partitioned tables, physical table file
    placement, and hardware upgrades, but we will not cover these.


    ### So what are query plans?


    Visually, query plans are a graphical image that shows the steps SQL Server will
    take to execute a query. It shows you the flow and the cost of each task in terms
    of execution time. This tool can be accessed via the menu bar by clicking `Query`
    and then scrolling down to `Display Estimated Execution Plan`.


    Please refer to Figure [2-3](#527021_1_En_2_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig3_HTML.png)


    A screenshot of the S S M S window. The Query option in the menu bar is selected.
    It opens a drop-down menu with 18 options, among which the Display Estimated Execution
    Plan is highlighted.


    Figure 2-3


    The Query drop-down menu


    You can also include the execution plan, live query statistics, and client statistics
    by selecting the options called out in the box in the preceding figure.


    Another way of accessing these tools is by clicking one or more of the buttons
    in the menu bar that are called out in Figure [2-4](#527021_1_En_2_Chapter.xhtml#Fig4)
    by the boxes.


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig4_HTML.png)


    A screenshot of the S S M S window. It presents a code and a table of 8 columns
    and 17 rows. The column headers are no column name, trial 6, trial 5, trial 4,
    trial 3, trial 2, trial 1, and average. It presents details of client execution
    time, network statistics, and time statistics.


    Figure 2-4


    Query performance tools


    The first button will turn on the `Display Estimated Execution Plan` tool. Referring
    to the next three buttons called out by the boxes in the preceding figure, you
    can also generate query plans by clicking the `Include Actual Query Plan` button
    or generate IO statistics by clicking the `Include Live Query Statistics` button.
    Lastly, you can include client statistics by clicking the last button called `Include
    Client Statistics`. Using your mouse, move the cursor over each button to generate
    a message that shows you what the button does.


    Let’s look at an example query plan. Please refer to Figure [2-5](#527021_1_En_2_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig5_HTML.png)


    A screenshot of the S S M S window. It presents a code and an estimated query
    plan with 6 components. The components are select, compute scalar, stream aggregate,
    sort, compute scalar, and table scan. Costs of sort and table scan are 6% and
    94%.


    Figure 2-5


    Estimated query plan


    The query plan is read from right to left. It contains icons called tasks (or
    operations or plain old steps) that perform specific functions like sort data
    or merge data or use indexes. Associated with each task is a cost estimate displayed
    as a percentage of the total time spent to execute a query.


    For example, looking at the first task on the right-hand side of the plan in the
    preceding figure, we see a table scan that has a cost of 94%. This tells us immediately
    that we have a problem. This task is taking up most of the execution time.


    These types of tasks are the ones that we need to address with some sort of strategy,
    like adding an index or rewriting the query.


    Note


    Sometimes, due to large volumes, all that can be done is to run the query overnight,
    so it loads a denormalized report table. Why do we want to do this? Because this
    will give the appearance of fast performance to any user accessing the denormalized
    table. Joins, calculations, and other complex logic are eliminated when processing
    the user report. The user is querying a preloaded and calculated table!


    Lastly, make sure to run these queries within a reporting tool, like `SSRS`, so
    you can add filters to limit what the user sees. (Create indexes based on how
    the users filter the query.) No one wants to scroll through millions of rows of
    data.


    We also see a step that sorts the data, and it has a cost of 6% of the total execution
    time. Notice that 94% + 6% = 100%. Usually when you add up all the estimated costs,
    they will add up to 100%.


    Next, we set `IO` and `TIME` statistics on with the following commands:


    ```

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```


    By the way, at the end of the analysis, turn off statistics by replacing the keyword
    `ON` with `OFF`:


    ```

    SET STATISTICS IO OFF

    GO

    SET STATISTICS TIME OFF

    GO

    ```


    Using these commands and executing the query, we are presented with some important
    performance statistics:


    ```

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 15 ms, elapsed time = 70 ms.

    (46 rows affected)

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, page server
    reads 0, read-ahead reads 0, page server read-ahead reads 0, lob logical reads
    0, lob physical reads 0, lob page server reads 0, lob read-ahead reads 0, lob
    page server read-ahead reads 0.

    Table ''SalesTransaction''. Scan count 1, logical reads 718, physical reads 0,
    page server reads 0, read-ahead reads 718, page server read-ahead reads 0, lob
    logical reads 0, lob physical reads 0, lob page server reads 0, lob read-ahead
    reads 0, lob page server read-ahead reads 0.

    (6 rows affected)

    ```


    Some of the interesting values we want to pay attention to are scan counts, logical
    and physical reads, and whether a work table is used. Notice the logical read
    count of 718. This needs to go down. Logical reads are performed in memory if
    you have enough memory available or else on hard disk, which really slows things
    down. Aim for single-digit read counts.


    The goal right now is to make you aware of these tools and what the output looks
    like. We will examine what they mean as we develop our TSQL queries that use the
    window functions and the `OVER()` clause. For now, just know where to find them,
    how to turn them on, and how to look at the results when you run the query.


    Tip


    You might want to look up the preceding counters in the Microsoft documentation
    to begin understanding what they mean. Yes, there are quite a few, but understanding
    them will pay dividends: [`https://learn.microsoft.com/en-us/sql/relational-databases/showplan-logical-and-physical-operators-reference?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/relational-databases/showplan-logical-and-physical-operators-reference?view=sql-server-ver16).


    The preceding URL is fairly long to type. Just use your favorite search engine
    and search for “Showplan Logical and Physical Operators Reference.”


    Finally, the `Display Estimated Execution Plan` tool will also suggest a missing
    index that is needed to improve query performance. Let’s look at an example. Please
    refer to Listing [2-1](#527021_1_En_2_Chapter.xhtml#PC4).'
