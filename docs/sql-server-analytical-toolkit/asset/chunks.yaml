    is, we look at the business specifications submitted by our friendly business
    analyst, create a script to support the requirements, and run the script to check
    out the results. Next, we generate estimated query plans as we have been doing
    in order to analyze and, if possible, improve the performance of the queries.
    Of course, we will also checkout `IO`, `TIME`, and `PERFORMANCE STATISTICS` to
    further dive deeper into the execution steps and costs.


    Let’s start by discussing the `RANK()` function that we will apply our inventory
    data to.


    ### RANK( ) Function


    Recall that the `RANK()` function returns the number of rows before the current
    row plus the current row based on the value being ranked. Let’s see what the business
    analyst’s specifications are:


    The analyst wants to see some statistical data on the movement out of inventory.


    Specifically, the report needs to assign a rank of movements for product “P209”
    in warehouse “WH111,” inventory “INV1,” and location “LOC1.” The report needs
    to spell out the calendar quarter and month names as opposed to just displaying
    numbers.


    Initially this report needs to be for the year 2010, but as usual, once the report
    is bug-free, it needs to be easily modified to support multiple years, products,
    etc. and even used for `SSRS` reports or Power BI scorecards.


    By the way product “P209” is a “Swiss type 1 passenger car” for any model train
    buffs out there.


    Here is the `CTE`-based query that will address this requirement.


    Please refer to Listing [12-1](#527021_1_En_12_Chapter.xhtml#PC1).


    ```

    WITH MonthlyInventoryMovement (

    MovementYear,MovementQuarter,MovQtrName,MovementMonth,MovMonthName

    ,InvId,LocId,WhId,ProdId,MonthlyDecrementMovement

    )

    AS

    (

    SELECT YEAR(MovementDate) AS MovementYear

    ,DATEPART(qq,MovementDate) AS MovementQuarter

    ,CASE

    WHEN DATEPART(qq,MovementDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,MovementDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,MovementDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,MovementDate) = 4 THEN ''4th Quarter''

    END AS MovQtrName

    ,MONTH(MovementDate) AS MovementMonth

    ,CASE

    WHEN MONTH(MovementDate)  = 1 THEN ''Jan''

    WHEN MONTH(MovementDate)  = 2 THEN ''Feb''

    WHEN MONTH(MovementDate)  = 3 THEN ''Mar''

    WHEN MONTH(MovementDate)  = 4 THEN ''Apr''

    WHEN MONTH(MovementDate)  = 5 THEN ''May''

    WHEN MONTH(MovementDate)  = 6 THEN ''June''

    WHEN MONTH(MovementDate)  = 7 THEN ''Jul''

    WHEN MONTH(MovementDate)  = 8 THEN ''Aug''

    WHEN MONTH(MovementDate)  = 9 THEN ''Sep''

    WHEN MONTH(MovementDate)  = 10 THEN ''Oct''

    WHEN MONTH(MovementDate)  = 11 THEN ''Nov''

    WHEN MONTH(MovementDate)  = 12 THEN ''Dec''

    END AS MovMonthName

    ,InvId,LocId,WhId,ProdId

    ,SUM(Decrement) AS MonthlyDecrementMovement

    FROM Product.InventoryTransaction

    GROUP BY YEAR(MovementDate)

    ,DATEPART(qq,MovementDate)

    ,MONTH(MovementDate)

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    )

    SELECT MovementYear

    ,MovementQuarter

    ,MovQtrName

    ,MovementMonth

    ,MovMonthName

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,MonthlyDecrementMovement

    ,RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecRank

    FROM MonthlyInventoryMovement

    WHERE MovementYear = 2010

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    AND ProdId = ''P209''

    GO

    Listing 12-1

    Ranking Inventory Movement Out for Swiss Passenger Car Models

    ```


    The first thing we notice is the two large `CASE` statements in the `SELECT` clause.
    As highlighted in the business requirements, the business analyst wants to see
    the names of the quarters and months spelled out, so we need this logic to decode
    the numerical values for these data parts. Our Calendar table is fairly simple,
    so a definite performance improvement would be to add the text versions of quarters
    and months so we could improve performance by avoiding `CASE` blocks in the `SELECT`
    clause.


    Homework


    Using two `ALTER` and one `UPDATE` commands, add columns to support the text version
    of calendar quarters and calendar months. Implement this modification in the `APInventory.MasterData.Calendar`
    table and the `APInventory.Dimension.Calendar` dimension table.


    Next, let’s check out the `OVER()` clause. We see a `PARTITION BY` clause that
    references the `MovementYear` column and an `ORDER BY` clause that references
    the `MonthlyDecrementMovement` column. The values are sorted in descending order.'
  trans: '# 第 12 章 库存用例：排名函数


    欢迎来到本书的倒数第三章。希望您享受这段学习旅程。本次我们将针对库存数据库和库存数据仓库，运用四种排名窗口函数。我们将执行常规的结果分析并进行一些性能分析，但同时也会逐步指导您如何使用
    Microsoft Report Builder 创建网页报告，并将其发布到由 `SSRS`（SQL Server Reporting Services）——微软首屈一指的报告架构——实现的网站上。


    不仅如此，我们还将逐步创建一个简单的 Power BI 报告和仪表板，它们将提供一些相当出色的图表和报告。我们会将这些内容发布到运行在您笔记本电脑或工作站上的个人
    `SSRS` 服务器网站和 Power BI 服务器网站。


    最后，本章将包含大量插图，因为我深信通过图表、曲线图和屏幕截图进行学习，效果甚至优于阅读文字（嗯，几乎如此）。一图胜千言！而且在您尝试这些工具时，图表也更易于理解。


    至于窗口函数，我们将遵循惯常的流程：定义业务规范、创建并运行查询、分析数据，然后生成估计的查询计划以及 `IO` 和 `TIME` 统计信息，以分析查询性能。


    毕竟，我们遵循的是一种“食谱式”的方法来学习窗口函数，所以我们就按照刚才描述的步骤来操作。顺便说一句，本章有九份代码清单，但有 59 张插图和一张图表。我们要学习的内容很多。


    ## 排名函数


    以下是此类中的四个函数：


    *   `RANK()`: `不`支持 `ROWS` 和 `RANGE` 规范

    *   `DENSE_RANK()`: `不`支持 `ROWS` 和 `RANGE` 规范

    *   `NTILE()`: `不`支持 `ROWS` 和 `RANGE` 规范

    *   `ROW_NUMBER()`: `不`支持 `ROWS` 和 `RANGE` 规范


    前两个用于对分区中的结果进行排名，第三个允许您对查询返回的数据定义数据桶。`NTILE()` 函数在分类方案中效果很好。


    最后一个函数 `ROW_NUMBER()` 是我们的主力函数，用于在整个数据集或数据集内的分区中生成行号。不过，我们将把它用于不同的目的。该函数可用于通过一些巧妙的逻辑生成随机数据。


    这些函数都不支持 `ROW` 和 `RANGE` 窗口框架规范，如果您理解了这些函数的作用，就会觉得这很合理。


    我们将从对排名函数进行常规分析开始。也就是说，我们查看友好的业务分析师提交的业务规范，创建支持需求的脚本，并运行脚本以查看结果。接下来，我们像之前那样生成估计的查询计划，以便分析并在可能的情况下改进查询的性能。当然，我们还将查看
    `IO`、`TIME` 和 `PERFORMANCE STATISTICS`，以更深入地探究执行步骤和成本。


    让我们从讨论 `RANK()` 函数开始，我们将把它应用于我们的库存数据。


    ### RANK( ) 函数


    回想一下，`RANK()` 函数根据被排名的值，返回当前行之前的行数加上当前行。让我们看看业务分析师的规范是什么：


    分析师希望看到一些关于库存出库移动的统计数据。


    具体来说，报告需要为产品 "P209"、仓库 "WH111"、库存 "INV1" 和库位 "LOC1" 的移动分配一个排名。报告需要明确显示日历季度和月份名称，而不是仅仅显示数字。


    最初此报告需要针对 2010 年，但像往常一样，一旦报告没有错误，就需要能够轻松修改以支持多年、多产品等，甚至用于 `SSRS` 报告或 Power BI
    计分卡。


    顺便说一句，对于任何模型火车爱好者来说，产品 "P209" 是一款“瑞士制 1 型客运车厢”。


    以下是基于 `CTE` 的查询，它将满足此要求。


    请参考清单 12-1。


    ```

    WITH MonthlyInventoryMovement (

    MovementYear,MovementQuarter,MovQtrName,MovementMonth,MovMonthName

    ,InvId,LocId,WhId,ProdId,MonthlyDecrementMovement

    )

    AS

    (

    SELECT YEAR(MovementDate) AS MovementYear

    ,DATEPART(qq,MovementDate) AS MovementQuarter

    ,CASE

    WHEN DATEPART(qq,MovementDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,MovementDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,MovementDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,MovementDate) = 4 THEN ''4th Quarter''

    END AS MovQtrName

    ,MONTH(MovementDate) AS MovementMonth

    ,CASE

    WHEN MONTH(MovementDate)  = 1 THEN ''Jan''

    WHEN MONTH(MovementDate)  = 2 THEN ''Feb''

    WHEN MONTH(MovementDate)  = 3 THEN ''Mar''

    WHEN MONTH(MovementDate)  = 4 THEN ''Apr''

    WHEN MONTH(MovementDate)  = 5 THEN ''May''

    WHEN MONTH(MovementDate)  = 6 THEN ''June''

    WHEN MONTH(MovementDate)  = 7 THEN ''Jul''

    WHEN MONTH(MovementDate)  = 8 THEN ''Aug''

    WHEN MONTH(MovementDate)  = 9 THEN ''Sep''

    WHEN MONTH(MovementDate)  = 10 THEN ''Oct''

    WHEN MONTH(MovementDate)  = 11 THEN ''Nov''

    WHEN MONTH(MovementDate)  = 12 THEN ''Dec''

    END AS MovMonthName

    ,InvId,LocId,WhId,ProdId

    ,SUM(Decrement) AS MonthlyDecrementMovement

    FROM Product.InventoryTransaction

    GROUP BY YEAR(MovementDate)

    ,DATEPART(qq,MovementDate)

    ,MONTH(MovementDate)

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    )

    SELECT MovementYear

    ,MovementQuarter

    ,MovQtrName

    ,MovementMonth

    ,MovMonthName

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,MonthlyDecrementMovement

    ,RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecRank

    FROM MonthlyInventoryMovement

    WHERE MovementYear = 2010

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    AND ProdId = ''P209''

    GO

    ```

    清单 12-1

    为瑞士客运车厢模型排名库存出库移动


    我们首先注意到的是 `SELECT` 子句中的两个大型 `CASE` 语句。正如业务需求中强调的，业务分析师希望看到明确写出的季度和月份名称，因此我们需要此逻辑来解码这些数据部分的数值。我们的日历表相当简单，一个明确的改进性能的方法是添加季度和月份的文本版本，这样我们就可以通过避免在
    `SELECT` 子句中使用 `CASE` 块来提高性能。


    **作业**


    使用两条 `ALTER` 和一条 `UPDATE` 命令，添加列以支持日历季度和日历月份的文本版本。在 `APInventory.MasterData.Calendar`
    表和 `APInventory.Dimension.Calendar` 维度表中实现此修改。


    接下来，让我们检查一下 `OVER()` 子句。我们看到一个引用了 `MovementYear` 列的 `PARTITION BY` 子句和一个引用了 `MonthlyDecrementMovement`
    列的 `ORDER BY` 子句。值按降序排序。'
- fmt: 'Remember that we do not need to refer to the year column in the `PARTITION
    BY` clause as we have a `WHERE` clause that filters results for the year 2010
    only. Our analyst will want to see data for all years, so this will come in handy
    when this request is made. Having it there now does not seem to affect performance.
    Try it on your own, and run a baseline estimated query plan with the column and
    then without the column. Don’t forget to run the `DBCC` command for each test.


    Once all the years are available (if we take out the filter in the `WHERE` clause),
    this query would generate results that would make it an ideal candidate for an
    `SSRS` report created with Report Builder. All the columns that were in the `WHERE`
    clause would be used for report filters.


    Let’s check out the results. Please refer to the partial results in Figure [12-1](#527021_1_En_12_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig1_HTML.png)


    A screenshot of c h 12 ranking query s q l window. A subwindow presents a 6-line
    code. A table presents the results with 12 rows and 12 columns. The columns for
    movement month, Movement month name, and Decrement rank are highlighted in the
    boxes.


    **Figure 12-1** Inventory movement out rank report


    Looking at the report, we see that June had the highest number of items moving
    out of inventory, which translates into sales, so this is a good thing. July has
    the lowest rank for items moving out. This would translate into diminishing sales.
    As a follow-up, the analyst would see how many items came back into inventory
    to make sure the inventory manager is not over-ordering items.


    Let’s copy the results into a Microsoft Excel spreadsheet and create a line chart
    to see the rank and inventory movement trend. Data reports and graphs are optimal
    tools to analyze data.


    Please refer to Figure [12-2](#527021_1_En_12_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig2_HTML.png)


    A screenshot of a home page of Microsoft Excel spreadsheet. The auto-save button
    is off. It presents a table that has columns for Quarter, month, month abbreviation,
    Out, and Rank. A line graph of inventory versus month has horizontally fluctuating
    trends for out and rank, and a linear out line.


    **Figure 12-2** Inventory movement out rank report chart


    Looking at the graph, we see some swings, but the trend line (dashed line) is
    moving up, so sales are decent. We would not want to see the movement of products
    going out trending down, which would indicate that the products are staying in
    inventory. This graph will most likely be in grayscale or black and white in the
    book, but if you are viewing this as an eBook, the colors are a helpful aid in
    analyzing the data.


    Let’s see how this query performs.


    ### Performance Considerations


    Let’s run our usual baseline execution plan and see if any indexes are needed.
    We will also look at some `IO` and `TIME` statistics to really understand how
    the query performs. Remember when you try this on your own to also generate a
    live query plan so you can compare the costs between the estimated plan and the
    live plan. Any major differences indicate a problem possibly caused by stale table
    statistics.


    ### Pop Quiz


    How do you update table statistics?


    Please refer to Figure [12-3](#527021_1_En_12_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig3_HTML.png)


    A screenshot of c h 12 ranking query s q l window. A subwindow has 2-line code
    for query cost. Query 1 lists the following cost %. Compute scalar 0, stream aggregate
    0, Sort 0, Parallelism 1, Hash match 16, compute scalar 1, and table scan 82%.
    Arrows point to hash match and table scan costs.


    **Figure 12-3** Baseline estimated execution plan


    We see that an index is suggested so we will need to create it. Starting from
    right to left, we see a table scan with a cost of 82%, a compute scalar with a
    cost of 1%, and a hash match join task with a cost of 16%. Finally, there’s a
    parallelism (gather stream) task with a cost of 1%, and all other costs are 0%.
    Clearly some improvement is needed so let’s create the recommended index.


    Please refer to Listing [12-2](#527021_1_En_12_Chapter.xhtml#PC2).


    ```sql

    CREATE NONCLUSTERED INDEX ieInvIdLocIdWhIdProdIdDecDate

    ON Product.InventoryTransaction (InvId,LocId,WhId,ProdId)

    INCLUDE (Decrement,MovementDate)

    GO

    UPDATE STATISTICS Product.InventoryTransaction

    GO

    ```


    **Listing 12-2** Suggested Index for the Inventory Transaction Table


    If we compare the columns in the suggested index with the columns in the query’s
    `WHERE` clause and `OVER()` clause, we see that the columns are covered (this
    is called a covering index).


    The `InvId`, `LocId`, `WhId,` and `ProdId` columns appear in the `WHERE` clause,
    so they need to be included in the index. The index also has an `INCLUDE` predicate,
    which calls out the `Decrement` and `MovementDate` columns, which cover the columns
    mentioned in the `PARTITION BY` and `ORDER BY` clauses.


    So we are covered! Pun intended, sorry.


    We can conclude then, based on experience from the prior chapter examples, that
    with these types of window-based queries, the rule of thumb is to make sure we
    have an index based on columns in the `OVER()` clause and any columns appearing
    in the `WHERE` clause.


    Let’s create the index and check out the new estimated query plan.


    Please refer to Figure [12-4](#527021_1_En_12_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig4_HTML.png)


    A screenshot of c h 12 ranking query s q l window. 2 subwindows compare the estimated
    query plan. The Sort cost changes from 0 to 9%, Hash mash costs from 16 to 50%,
    and compute scalar costs from 1 to 5%. Arrows also point to table scan cost of
    82% and index seek cost of 36%.


    **Figure 12-4** Comparing before and after estimated execution plans


    This screenshot compares the before and after estimated execution plans. Familiar
    pattern, anyone? An index seek task replaced the table scan, but the cost of both
    the hash match and sort went up.


    Always a trade-off.


    Also, the sort step went from 0% to 9%, so this step and the hash match should
    be the focus of any further performance tuning. I said it before and I will say
    it again: make sure `TEMPDB` is implemented on a very fast drive or else a magnetic
    disk drive.


    ### Side Comment


    We are looking at performance tuning from the query and covering index point of
    view. But performance tuning involves tuning vertical hardware scaling and horizontal
    hardware scaling. Vertical scaling means we look at our server hardware and see
    if we need more fast disks, more CPUs, or more memory. Horizontal scaling means
    adding more servers for parallel processing (expensive).'
