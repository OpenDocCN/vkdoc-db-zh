- fmt: "# CUME_DIST( ) Function\n\nThis function calculates the relative position\
    \ of a value within a data set like a table, partition, or table variable loaded\
    \ with test data. The keyword here is relative.\n\n## How does it work?\n\nFirst,\
    \ calculate how many values come before it or are equal to it (call this value\
    \ `C1`). Next, calculate the number of values or rows in the data set (call this\
    \ `C2`). `C1` is then divided by `C2` to deliver the cumulative distribution result.\
    \ Check the Microsoft documentation for the return data types of all the functions\
    \ as there is a lot of good information from the descriptions in their documentation.\
    \ In this case the data type is `FLOAT(53)`. You may want to use the `FORMAT()`\
    \ function to convert it to a percentage so it looks good in the resulting report.\n\
    \nRecall that this function is similar to the `PERCENT_RANK()` function, which\
    \ works as follows:\n\nGiven a set of values in a data set, this function calculates\
    \ the rank of each individual value relative to the entire data set. This function\
    \ also returns a percentage, and the data type is also `FLOAT(53)`.\n\nBack to\
    \ the `CUME_DIST()` function. We will look at two examples, an easy one and then\
    \ one that will query our finance transactional database.\n\nOur analyst wants\
    \ us to create a report that will display the cumulative distribution by month\
    \ and quarter in the `Portfolio` table grouped by year, quarter, month, customer\
    \ ID, and of course portfolio number and name. The customer of course is our friend\
    \ customer `C0000001` (John Smith), and the year is 2012. John Smith’s income\
    \ bracket is between $150K and $250K, not bad.\n\nOnce the query is validated,\
    \ it can be modified for more than one customer and year. Remember, generate small\
    \ results that satisfy the requirements and then modify the data scope if required\
    \ (after testing).\n\n## Simple Example\n\nLet’s look at a simple example first\
    \ so we can see how the prior description works on a small data set. Please refer\
    \ to Listing 7-1.\n\n```\nUSE TEST\nGO\nDECLARE @CumDistDemo TABLE (\nCol1 VARCHAR(8),\n\
    ColValue INTEGER\n);\nINSERT INTO @CumDistDemo VALUES\n('AAA',1),\n('BBB',2),\n\
    ('CCC',3),\n('DDD',4),\n('EEE',5),\n('FFF',6),\n('GGG',7),\n('HHH',8),\n('III',9),\n\
    ('JJJ',10)\nSELECT Col1,ColValue,\nCUME_DIST() OVER(\nORDER BY ColValue\n) AS\
    \ CumeDistValue,\nA.RowCountLE,\nB.TotalRows,\nCONVERT(DECIMAL(10,2),A.RowCountLE)\n\
    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist\nFROM @CumDistDemo CDD\nCROSS\
    \ APPLY (\nSELECT COUNT(*) AS RowCountLE FROM @CumDistDemo\nWHERE ColValue <=\
    \ CDD.ColValue\n) A\nCROSS APPLY (\nSELECT COUNT(*) AS TotalRows FROM @CumDistDemo\n\
    ) B\nGO\n```\n\n**Listing 7-1**  \nA Simple Example\n\nA simple table variable\
    \ called `@CumeDistDemo` is declared and loaded with ten rows of data. Only two\
    \ columns are created. The first is called `Col1` and acts as a key column, while\
    \ the `ColValue` column holds the data. In our case these are the numbers 1–10.\
    \ Really simple.\n\nThe query utilizes the `CUME_DIST()` function and an `OVER(\
    \ )` clause. No `PARTITION BY` clause is included, but the `ORDER BY` clause is\
    \ used to order the partition rows by the `ColValue` column in ascending order.\n\
    \nWe need to include the formula for calculating cumulative distribution so we\
    \ can see how it works and compare it to the SQL Server version. Here is the formula:\n\
    \nCount of rows with values less than or equal to the current column value divided\
    \ by the total number of rows.\n\nTo get the values for this formula, two `CROSS\
    \ APPLY` operators are used. The first one calculates the number of rows with\
    \ values less than or equal to the current column value, and the second calculates\
    \ the total number of rows in the data set.\n\nThis query can probably be optimized,\
    \ but for our purposes it should illustrate how the `CUME_DIST()` function works.\n\
    \nThe values returned by the queries in the `CROSS APPLY` block are used in the\
    \ formula in the `SELECT` clause:\n\n```\nCONVERT(DECIMAL(10,2),A.RowCountLE)\n\
    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist\n```\n\nLet’s execute the query\
    \ and see what we get. Please refer to Figure 7-1.\n\n![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig1_HTML.jpg)\n\
    \n**Figure 7-1**  \nTwo ways of calculating cumulative distribution\n\nLooks good\
    \ and predictable, I think! The `MyCumeDist` column has the values calculated\
    \ by the formula we created, and the column called `CumeDistValue` contains the\
    \ values the SQL Server function calculated. Maybe a little formatting is needed\
    \ so they look the same, but the values match.\n\n## Financial Example\n\nNow\
    \ for a financial example. Our analyst supplies the following business requirements:\n\
    \nFor customer John Smith (`C0000001`), generate a report that shows the cumulative\
    \ distribution by month and quarter. Results need to be for the year 2012, and\
    \ the year, quarter, month, customer ID, portfolio, and monthly values also need\
    \ to be displayed.\n\nPlease refer to Listing 7-2.\n\n```\nWITH PortfolioAnalysis\
    \ (\nTradeYear,TradeQtr,TradeMonth,CustId,PortfolioNo,Portfolio,MonthlyValue\n\
    )\nAS (\nSELECT Year AS TradeYear\n,DATEPART(qq,SweepDate) AS TradeQtr\n,Month\
    \                  AS TradeMonth\n,CustId\n,PortfolioNo\n,Portfolio\n,SUM(Value)\
    \             AS MonthlyValue\nFROM Financial.Portfolio\nWHERE Year > 2011\nGROUP\
    \ BY CustId\n,PortfolioNo\n,Year\n,Month\n,SweepDate\n,Portfolio\n)\nSELECT TradeYear\n\
    ,TradeQtr\n,TradeMonth\n,CustId\n,PortfolioNo\n,Portfolio\n,MonthlyValue\n,CUME_DIST()\
    \ OVER(\nPARTITION BY Portfolio\nORDER BY TradeMonth,Portfolio\n) AS CumeDistByMonth\n\
    ,CUME_DIST() OVER(\nPARTITION BY Portfolio\nORDER BY TradeQtr,Portfolio\n) AS\
    \ CumeDistByMonth\nFROM PortfolioAnalysis\nWHERE TradeYear = 2012\nAND CustId\
    \ = 'C0000001'\nGO\n```\n\n**Listing 7-2**  \nMonthly Portfolio Cumulative Distribution\
    \ Analysis\n\nOur usual `CTE` template is used. The `CTE` calculates the monthly\
    \ sum of the portfolios, and the query that references the `CTE` in order to calculate\
    \ the cumulative distribution uses two `OVER()` clauses. The `CTE` returns results\
    \ for years greater than 2011. We skip 2011 because this is when the account was\
    \ opened, and we know the initial balance was $100,000 (all the accounts were\
    \ initialized with this value).\n\nLooking at the base query, the first `OVER()`\
    \ clause contains a `PARTITION BY` clause that sets up partitions by month and\
    \ portfolio name. The partition result set is sorted by trade month and portfolio\
    \ name by an `ORDER BY` clause.\n\nThe second `OVER()` clause also contains a\
    \ `PARTITION BY` clause, but this time the partition is set up by quarter and\
    \ portfolio name. Additionally, the partition result set is sorted by trade quarter\
    \ and portfolio name in the `ORDER BY` clause.\n\nIf you include multiple years,\
    \ you can include an `OVER()` clause to calculate cumulative distributions by\
    \ year. Good exercise for you to try out. Just add the following code to the `SELECT`\
    \ clause:\n\n```\n,CUME_DIST() OVER(\nPARTITION BY Portfolio\nORDER BY TradeYear,Portfolio\n\
    ) AS CumeDistByMonth\n```\n\nDon’t forget to modify the `WHERE` clause so it does\
    \ not have a predicate that filters for one year only. This will give you a larger\
    \ result, but it presents a more complete analysis as far as cumulative distribution\
    \ goes.\n\nNo final query `ORDER BY` clause is required. Let’s check out the results\
    \ in Figure 7-2.\n\n![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig2_HTML.png)\n\
    \n**Figure 7-2**  \nPortfolio cumulative distribution analysis for customer C0000001"
  raw: '### CUME_DIST( ) Function


    This function calculates the relative position of a value within a data set like
    a table, partition, or table variable loaded with test data. The keyword here
    is relative.


    How does it work?


    First, calculate how many values come before it or are equal to it (call this
    value **C1**). Next, calculate the number of values or rows in the data set (call
    this **C2**). **C1** is then divided by **C2** to deliver the cumulative distribution
    result. Check the Microsoft documentation for the return data types of all the
    functions as there is a lot of good information from the descriptions in their
    documentation. In this case the data type is `FLOAT(53)`. You may want to use
    the `FORMAT()` function to convert it to a percentage so it looks good in the
    resulting report.


    Recall that this function is similar to the `PERCENT_RANK()` function, which works
    as follows:


    Given a set of values in a data set, this function calculates the rank of each
    individual value relative to the entire data set. This function also returns a
    percentage, and the data type is also `FLOAT(53)`.


    Back to the `CUME_DIST()` function. We will look at two examples, an easy one
    and then one that will query our finance transactional database.


    Our analyst wants us to create a report that will display the cumulative distribution
    by month and quarter in the Portfolio table grouped by year, quarter, month, customer
    ID, and of course portfolio number and name. The customer of course is our friend
    customer C0000001 (John Smith), and the year is 2012\. John Smith’s income bracket
    is between $150K and $250K, not bad.


    Once the query is validated, it can be modified for more than one customer and
    year. Remember, generate small results that satisfy the requirements and then
    modify the data scope if required (after testing).


    Let’s look at a simple example first so we can see how the prior description works
    on a small data set. Please refer to Listing [7-1](#527021_1_En_7_Chapter.xhtml#PC1).


    ```

    USE TEST

    GO

    DECLARE @CumDistDemo TABLE (

    Col1 VARCHAR(8),

    ColValue INTEGER

    );

    INSERT INTO @CumDistDemo VALUES

    (''AAA'',1),

    (''BBB'',2),

    (''CCC'',3),

    (''DDD'',4),

    (''EEE'',5),

    (''FFF'',6),

    (''GGG'',7),

    (''HHH'',8),

    (''III'',9),

    (''JJJ'',10)

    SELECT Col1,ColValue,

    CUME_DIST() OVER(

    ORDER BY ColValue

    ) AS CumeDistValue,

    A.RowCountLE,

    B.TotalRows,

    CONVERT(DECIMAL(10,2),A.RowCountLE)

    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist

    FROM @CumDistDemo CDD

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLE FROM @CumDistDemo

    WHERE ColValue <= CDD.ColValue

    ) A

    CROSS APPLY (

    SELECT COUNT(*) AS TotalRows FROM @CumDistDemo

    ) B

    GO

    Listing 7-1

    A Simple Example

    ```


    A simple table variable called `@CumeDistDemo` is declared and loaded with ten
    rows of data. Only two columns are created. The first is called `Col1` and acts
    as a key column, while the `ColValue` column holds the data. In our case these
    are the numbers 1–10\. Really simple.


    The query utilizes the `CUME_DIST()` function and an `OVER( )` clause. No `PARTITION
    BY` clause is included, but the `ORDER BY` clause is used to order the partition
    rows by the `ColValue` column in ascending order.


    We need to include the formula for calculating cumulative distribution so we can
    see how it works and compare it to the SQL Server version. Here is the formula:


    Count of rows with values less than or equal to the current column value divided
    by the total number of rows


    To get the values for this formula, two `CROSS APPLY` operators are used. The
    first one calculates the number of rows with values less than or equal to the
    current column value, and the second calculates the total number of rows in the
    data set.


    This query can probably be optimized, but for our purposes it should illustrate
    how the `CUME_DIST()` function works.


    The values returned by the queries in the `CROSS APPLY` block are used in the
    formula in the SELECT clause:


    ```

    CONVERT(DECIMAL(10,2),A.RowCountLE)

    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist

    ```


    Let’s execute the query and see what we get. Please refer to Figure [7-1](#527021_1_En_7_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig1_HTML.jpg)


    A screenshot of the S S M S window. It has a table of 7 columns and 11 rows. The
    column headers are Col 1, Col Value, Cumulative Distribution Value, Row Count
    L E, Total Rows, and My cumulative distribution. Row 5 is outlined.


    Figure 7-1


    Two ways of calculating cumulative distribution


    Looks good and predictable, I think! The `MyCumeDist` column has the values calculated
    by the formula we created, and the column called `CumeDistValue` contains the
    values the SQL Server function calculated. Maybe a little formatting is needed
    so they look the same, but the values match.


    Now for a financial example. Our analyst supplies the following business requirements:


    For customer John Smith (C0000001), generate a report that shows the cumulative
    distribution by month and quarter. Results need to be for the year 2012, and the
    year, quarter, month, customer ID, portfolio, and monthly values also need to
    be displayed.


    Please refer to Listing [7-2](#527021_1_En_7_Chapter.xhtml#PC3).


    ```

    WITH PortfolioAnalysis (

    TradeYear,TradeQtr,TradeMonth,CustId,PortfolioNo,Portfolio,MonthlyValue

    )

    AS (

    SELECT Year AS TradeYear

    ,DATEPART(qq,SweepDate) AS TradeQtr

    ,Month                  AS TradeMonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value)             AS MonthlyValue

    FROM Financial.Portfolio

    WHERE Year > 2011

    GROUP BY CustId

    ,PortfolioNo

    ,Year

    ,Month

    ,SweepDate

    ,Portfolio

    )

    SELECT TradeYear

    ,TradeQtr

    ,TradeMonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,MonthlyValue

    ,CUME_DIST() OVER(

    PARTITION BY Portfolio

    ORDER BY TradeMonth,Portfolio

    ) AS CumeDistByMonth

    ,CUME_DIST() OVER(

    PARTITION BY Portfolio

    ORDER BY TradeQtr,Portfolio

    ) AS CumeDistByMonth

    FROM PortfolioAnalysis

    WHERE TradeYear = 2012

    AND CustId = ''C0000001''

    GO

    Listing 7-2

    Monthly Portfolio Cumulative Distribution Analysis

    ```


    Our usual `CTE` template is used. The `CTE` calculates the monthly sum of the
    portfolios, and the query that references the `CTE` in order to calculate the
    cumulative distribution uses two `OVER()` clauses. The `CTE` returns results for
    years greater than 2011\. We skip 2011 because this is when the account was opened,
    and we know the initial balance was $100,000 (all the accounts were initialized
    with this value).


    Looking at the base query, the first `OVER()` clause contains a `PARTITION BY`
    clause that sets up partitions by month and portfolio name. The partition result
    set is sorted by trade month and portfolio name by an `ORDER BY` clause.


    The second `OVER()` clause also contains a `PARTITION BY` clause, but this time
    the partition is set up by quarter and portfolio name. Additionally, the partition
    result set is sorted by trade quarter and portfolio name in the `ORDER BY` clause.


    If you include multiple years, you can include an `OVER()` clause to calculate
    cumulative distributions by year. Good exercise for you to try out. Just add the
    following code to the `SELECT` clause:


    ```

    ,CUME_DIST() OVER(

    PARTITION BY Portfolio

    ORDER BY TradeYear,Portfolio

    ) AS CumeDistByMonth

    ```


    Don’t forget to modify the `WHERE` clause so it does not have a predicate that
    filters for one year only. This will give you a larger result, but it presents
    a more complete analysis as far as cumulative distribution goes.


    No final query `ORDER BY` clause is required. Let’s check out the results in Figure
    [7-2](#527021_1_En_7_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig2_HTML.png)


    A screenshot of the S S M S window. It has a table of 10 columns and 73 rows.
    The column headers are trade year, trade quarter, trade month, customer I D, portfolio
    number, portfolio, monthly value, cumulative distribution by month, and cumulative
    distribution by month.


    Figure 7-2


    Portfolio cumulative distribution analysis for customer C0000001'
  trans: "\n# CUME_DIST( ) 函数\n\n该函数用于计算某个值在数据集（如表、分区或加载了测试数据的表变量）中的相对位置。这里的关键词是“相对”。\n\
    \n## 它是如何工作的？\n\n首先，计算有多少个值排在它前面或与它相等（将此值称为 `C1`）。接下来，计算数据集中的值或行数（将此值称为 `C2`）。然后用\
    \ `C1` 除以 `C2`，即可得到累积分布结果。请查阅微软文档以了解所有函数的返回数据类型，因为他们的文档描述中包含大量有用信息。此处的数据类型是 `FLOAT(53)`。你可能需要使用\
    \ `FORMAT()` 函数将其转换为百分比，以便在结果报告中看起来更美观。\n\n回想一下，该函数与 `PERCENT_RANK()` 函数类似，后者的工作方式如下：\n\
    \n给定数据集中的一组值，该函数会计算每个单独值相对于整个数据集的排名。该函数也返回一个百分比，数据类型同样是 `FLOAT(53)`。\n\n回到 `CUME_DIST()`\
    \ 函数。我们将看两个例子，一个简单的，然后是一个将查询我们金融交易数据库的例子。\n\n我们的分析师希望我们创建一份报告，按年、季度、月份、客户 ID 以及投资组合编号和名称分组，显示\
    \ `Portfolio` 表中的月度和季度累积分布。当然，客户是我们的朋友客户 `C0000001`（John Smith），年份是 2012 年。John\
    \ Smith 的收入等级在 15 万到 25 万美元之间，还不错。\n\n一旦查询得到验证，就可以修改为适用于多个客户和年份。记住，先生成满足要求的小范围结果，然后（在测试后）根据需要修改数据范围。\n\
    \n## 简单示例\n\n我们先看一个简单的例子，以便了解前面的描述在小数据集上是如何工作的。请参考清单 7-1。\n\n```\nUSE TEST\nGO\n\
    DECLARE @CumDistDemo TABLE (\nCol1 VARCHAR(8),\nColValue INTEGER\n);\nINSERT INTO\
    \ @CumDistDemo VALUES\n('AAA',1),\n('BBB',2),\n('CCC',3),\n('DDD',4),\n('EEE',5),\n\
    ('FFF',6),\n('GGG',7),\n('HHH',8),\n('III',9),\n('JJJ',10)\nSELECT Col1,ColValue,\n\
    CUME_DIST() OVER(\nORDER BY ColValue\n) AS CumeDistValue,\nA.RowCountLE,\nB.TotalRows,\n\
    CONVERT(DECIMAL(10,2),A.RowCountLE)\n/ CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist\n\
    FROM @CumDistDemo CDD\nCROSS APPLY (\nSELECT COUNT(*) AS RowCountLE FROM @CumDistDemo\n\
    WHERE ColValue <= CDD.ColValue\n) A\nCROSS APPLY (\nSELECT COUNT(*) AS TotalRows\
    \ FROM @CumDistDemo\n) B\nGO\n```\n\n**清单 7-1**  \n一个简单的示例\n\n声明了一个名为 `@CumeDistDemo`\
    \ 的简单表变量，并加载了十行数据。只创建了两列。第一列名为 `Col1`，充当键列，而 `ColValue` 列存储数据。在我们的例子中，这些数据是数字\
    \ 1 到 10。非常简单。\n\n查询使用了 `CUME_DIST()` 函数和一个 `OVER( )` 子句。未包含 `PARTITION BY` 子句，但使用了\
    \ `ORDER BY` 子句，按 `ColValue` 列的升序对分区行进行排序。\n\n我们需要包含计算累积分布的公式，以便了解其工作原理并与 SQL\
    \ Server 版本进行比较。公式如下：\n\n值小于或等于当前列值的行数除以总行数。\n\n为了获取此公式的值，使用了两个 `CROSS APPLY`\
    \ 运算符。第一个计算值小于或等于当前列值的行数，第二个计算数据集中的总行数。\n\n这个查询可能可以优化，但就我们的目的而言，它应该足以说明 `CUME_DIST()`\
    \ 函数的工作原理。\n\n`CROSS APPLY` 块中查询返回的值用于 `SELECT` 子句中的公式：\n\n```\nCONVERT(DECIMAL(10,2),A.RowCountLE)\n\
    / CONVERT(DECIMAL(10,2),B.TotalRows) AS MyCumeDist\n```\n\n让我们执行查询，看看结果。请参考图 7-1。\n\
    \n![](img/527021_1_En_7_Fig1_HTML.jpg)\n\n**图 7-1**  \n计算累积分布的两种方法\n\n看起来不错且符合预期，我想！`MyCumeDist`\
    \ 列包含我们创建的公式计算出的值，而名为 `CumeDistValue` 的列包含 SQL Server 函数计算出的值。可能需要一点格式化以使它们看起来相同，但值是匹配的。\n\
    \n## 金融示例\n\n现在看一个金融例子。我们的分析师提供了以下业务需求：\n\n为 John Smith 客户 (`C0000001`) 生成一份报告，显示按月份和季度的累积分布。结果需要是针对\
    \ 2012 年的，并且还需要显示年份、季度、月份、客户 ID、投资组合和月度价值。\n\n请参考清单 7-2。\n\n```\nWITH PortfolioAnalysis\
    \ (\nTradeYear,TradeQtr,TradeMonth,CustId,PortfolioNo,Portfolio,MonthlyValue\n\
    )\nAS (\nSELECT Year AS TradeYear\n,DATEPART(qq,SweepDate) AS TradeQtr\n,Month\
    \                  AS TradeMonth\n,CustId\n,PortfolioNo\n,Portfolio\n,SUM(Value)\
    \             AS MonthlyValue\nFROM Financial.Portfolio\nWHERE Year > 2011\nGROUP\
    \ BY CustId\n,PortfolioNo\n,Year\n,Month\n,SweepDate\n,Portfolio\n)\nSELECT TradeYear\n\
    ,TradeQtr\n,TradeMonth\n,CustId\n,PortfolioNo\n,Portfolio\n,MonthlyValue\n,CUME_DIST()\
    \ OVER(\nPARTITION BY Portfolio\nORDER BY TradeMonth,Portfolio\n) AS CumeDistByMonth\n\
    ,CUME_DIST() OVER(\nPARTITION BY Portfolio\nORDER BY TradeQtr,Portfolio\n) AS\
    \ CumeDistByMonth\nFROM PortfolioAnalysis\nWHERE TradeYear = 2012\nAND CustId\
    \ = 'C0000001'\nGO\n```\n\n**清单 7-2**  \n月度投资组合累积分布分析\n\n使用了我们常见的 `CTE` 模板。该 `CTE`\
    \ 计算投资组合的月度总和，而引用该 `CTE` 以计算累积分布的查询使用了两个 `OVER()` 子句。该 `CTE` 返回年份大于 2011 年的结果。我们跳过了\
    \ 2011 年，因为那是账户开户的时间，我们知道初始余额是 10 万美元（所有账户都以此金额初始化）。\n\n查看基础查询，第一个 `OVER()` 子句包含一个\
    \ `PARTITION BY` 子句，该子句按月份和投资组合名称设置分区。分区结果集由 `ORDER BY` 子句按交易月份和投资组合名称排序。\n\n\
    第二个 `OVER()` 子句也包含一个 `PARTITION BY` 子句，但这次分区是按季度和投资组合名称设置的。此外，分区结果集在 `ORDER BY`\
    \ 子句中按交易季度和投资组合名称排序。\n\n如果你包含多年的数据，可以添加一个 `OVER()` 子句来按年计算累积分布。这是一个很好的练习。只需将以下代码添加到\
    \ `SELECT` 子句中：\n\n```\n,CUME_DIST() OVER(\nPARTITION BY Portfolio\nORDER BY TradeYear,Portfolio\n\
    ) AS CumeDistByMonth\n```\n\n别忘了修改 `WHERE` 子句，使其不包含仅过滤一年的谓词。这将给你一个更大的结果集，但就累积分布而言，它提供了更完整的分析。\n\
    \n最终查询不需要 `ORDER BY` 子句。让我们查看图 7-2 中的结果。\n\n![](img/527021_1_En_7_Fig2_HTML.png)\n\
    \n**图 7-2**  \n客户 C0000001 的投资组合累积分布分析\n"
- fmt: 'As can be seen, we get cumulative distributions by month and quarter across
    portfolios. Very interesting query. The pattern repeats itself for each portfolio.


    ## Performance Considerations


    How does this query perform? Let’s run our usual estimated query plan to establish
    a baseline for our analysis, after which we will analyze it and see if we can
    improve performance by adding an index or creating a report table in place of
    the `CTE`.


    Please refer to Figure [7-3](#527021_1_En_7_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig3_HTML.png)


    A screenshot of the S S M S window. It presents part 1 of the cumulative distribution
    baseline query plan with 14 components. These are window spool, 2 segment, nested
    loops, table spool, segment, compute scalar, stream aggregate, sort, table spool,
    nested loops, stream aggregate, and 2 table spools.


    **Figure 7-3**

    Cumulative distribution baseline query plan – part 1


    This is the right-hand side of the estimated query plan. Notice the table scan;
    no index is required as this is a small table, around 1,470 rows. The table scan
    has a cost of 33% and is followed by a sort step with a cost of 28%. (Note the
    ID of the table scan by placing the mouse over the icon and viewing the ID. Most
    of the time, the table scan is used for other tasks, the temporary table in `TEMPDB`
    that is created, that is.)


    The area boxed in red is for the first cumulative distribution function. It will
    be repeated in the next section of the query plan for the second cumulative distribution
    function call. It contains some zero-cost tasks and some table spool tasks that
    make the data available in temporary physical storage so that calculations can
    be applied. Two of these spool tasks chime in at 0% cost, while the last one comes
    in at 1% cost. Two nested loops join tasks complete this section, one at 0% and
    one at 4%. So far, nothing to be concerned about.


    Let’s look at the second section. Please refer to Figure [7-4](#527021_1_En_7_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig4_HTML.png)


    A screenshot of the S S M S window. It presents part 2 of the cumulative distribution
    baseline query plan with 14 components. These are window spool, 2 segment, nested
    loops, table spool, segment, sort, compute scalar, stream aggregate, window spool,
    nested loops, stream aggregate, and 2 table spools.


    **Figure 7-4**

    Cumulative distribution baseline query plan – part 2


    Notice the window spool task at the right hand side of the plan. This comes in
    at a cost of 1%, so spooling action is performed on disk as opposed to memory.
    This window spool task is associated with the first call to the cumulative distribution
    function.


    There’s the boxed area, and it is the same as the first area we discussed. It
    also is followed by a window spool task. Looks like we have three tasks with low
    cost that we should be aware of, the table spool at 1%, the nested loops for the
    inner join at 4%, and finally the window spool task at 1%.


    I tried the reporting table approach where the query in the `CTE` was used to
    populate a report table and the base query was executed against the reporting
    table. The improvements were marginal as far as the query plan was concerned (the
    code is included in the script for this chapter).


    The `TIME` and `IO` statistics showed marginal improvements with the report table
    approach, so I include a screen print here. Please refer to Figure [7-5](#527021_1_En_7_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig5_HTML.png)


    A screenshot of the S S M S window. The text presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 15, 56, and 0, 0 milliseconds
    for 1 and 2. Execution times for C P U and elapsed are 16, 58, and 0, 40 milliseconds
    for 1 and 2. 72 rows are affected.


    **Figure 7-5**

    Comparing IO and TIME statistics


    There’s modest improvement in SQL Server execution time and read-ahead reads.
    Since this is historical data, the report table approach is probably more efficient
    than the `CTE` approach, especially if multiple users run the same query, like
    from a SQL Server Reporting Services (SSRS) report that allows analysts to select
    different years via a drop-down list in the report.


    There is a cost to the report table strategy as it must be periodically loaded
    to update the data to keep it current. This could be performed daily or weekly
    and is usually performed overnight by a scheduled load process so users are not
    affected.


    Last but not least, I modified the original `CTE` query so it does not use a `CTE`
    but goes directly against the Portfolio table and calculates the `SUM()` right
    before the two calls to the cumulative distribution functions. Results almost
    matched the `CTE` version, and SQL Server execution time was slightly less than
    the `CTE` version, 230 ms (`CTE`) vs. 171 ms (non-`CTE`). There were fewer steps
    in the non-`CTE` version (72 steps vs. 32 steps) as far as `STATISTICS PROFILE`
    values, but all in all, performance was the same except for the slightly faster
    execution time. So maybe `CTE` blocks are not the first line choice for these
    types of queries? If we need to query millions of rows, then the `CTE` might not
    be considered at all.


    Always consider how the query will be used and run, like in a web report by multiple
    users as opposed to one user running the query alone. Also, do not use a feature
    like a `CTE` just because you feel it is slick and impresses your manager if you
    use it. The simplest, fastest, and of course accurate solution is the best solution.
    Also consider the labor cost of maintaining these queries.'
