  trans: '

    ### 数据集


    在创建一些查询之前，我们需要先创建一个小表并加载数据，以便进行练习。我们创建的表名为 `OverExample`（补充一句，这名字挺聪明的）。它由三列组成：`OrderYear`、`OrderMonth`
    和 `SalesAmount`。虽然我们在本章开头创建了这个表，但为了方便参考，我在这里再列一次。


    请参考代码清单 1-5。


    ```sql

    CREATE TABLE OverExample(

    OrderYear   SMALLINT,

    OrderMonth  SMALLINT,

    SalesAmount DECIMAL(10,2)

    );

    INSERT INTO OverExample VALUES

    (2010,1,10000.00),

    (2010,2,10000.00),

    (2010,2,10000.00),

    --missing rows

    (2010,8,10000.00),

    (2010,8,10000.00),

    (2010,9,10000.00),

    (2010,10,10000.00),

    (2010,11,10000.00),

    (2010,12,10000.00),

    -- 2011

    (2011,1,10000.00),

    (2011,2,10000.00),

    (2011,2,10000.00),

    --missing rows

    (2011,10,10000.00),

    (2011,11,10000.00),

    (2011,12,10000.00);

    GO

    ```


    代码清单 1-5 练习表 `OverExample`


    `INSERT` 语句加载了两年的数据，这样我们就有足够的行来测试带有窗口函数和 `OVER()` 子句的查询。`SUM()` 聚合函数将用于生成一些滚动总计计算。


    请参考代码清单 1-6。


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER (

    ) AS NPBNOB,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ) AS PBNOB,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS PBOBUPUF

    FROM OverExample;

    GO

    ```


    代码清单 1-6 场景 1


    `SUM()` 函数被使用了三次，每次的 `ORDER BY`/`PARTITION BY` 配置不同。我还使用了旨在指示 `OVER()` 子句结构的列名，这些名称表明了是否包含了
    `ORDER BY`、`PARTITION BY` 以及 `ROWS`/`RANGE` 子句。我这样做是为了让你在检查结果时，能快速回忆起使用了哪些子句。我知道，这些名字有点怪，但你可以轻松记住我们正在使用的帧子句。


    第一个 `SUM()` 函数的 `OVER()` 子句是空的（名称 `NPBNOB` = 无 `PARTITION BY`, 无 `ORDER BY`）。回想一下，这种组合的默认窗口帧行为是：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    第二个 `SUM()` 函数的 `OVER()` 子句包含了 `PARTITION BY` 但没有 `ORDER BY`，所以默认的窗口帧行为也是：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    列名为 `PBNOB`（有 `PARTITION BY`, 无 `ORDER BY`）。这次创建了两个分区，数据集中的每一年对应一个分区。


    最后但同样重要的是，第三个 `SUM()` 函数使用的 `OVER()` 子句同时包含了 `PARTITION BY` 和 `ORDER BY` 子句。它还使用了窗口帧
    `ROWS` 子句。列名是 `PBOBUPUF`（`PARTITION BY`，`ORDER BY`，`UNBOUNDED PRECEDING UNBOUNDED
    FOLLOWING`）。


    对于最后这种列配置，默认的帧行为是：


    ```sql

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    看起来我们可以通过替换 `RANGE` 子句并包含 `ROWS` 子句来覆盖这种默认行为。这完全可以做到！


    让我们看看执行这个查询后的结果是什么样子。请参考图 1-11。


    ![](img/527021_1_En_1_Fig11_HTML.jpg)


    一个关于 c h 0 1 over clause s q l 窗口的截图。结果以表格形式呈现，包含 6 列，分别是订单年份、订单月份、销售额、N P B N
    O B、P B N O B 和 P B O B U P U F。


    图 1-11 场景 1 的结果


    结果很有意思。第一个 `SUM()`/`OVER()` 子句组合只是简单地显示了表中所有行的总计，正如默认窗口帧行为所强制规定的那样。


    第二和第三个 `SUM()`/`OVER()` 子句组合将数据集按年份分区，因此每年的总计显示在每一行中。它们看起来是相同的。这两种组合的窗口帧行为是相同的：


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    这是因为第二种组合触发了默认行为，而第三种组合我们覆盖了 `RANGE` 行为，并包含了 `ROWS` 子句。这种行为是在每个年份分区内强制执行的。让我们再试一个例子。

    '
- fmt: '### Example 2


    This time we check out some combinations of the `SUM()/OVER()` clause that include
    default window frame behaviors vs. declared `RANGE` behaviors. (Keep in mind the
    default window frame behaviors we discussed earlier.)


    Let’s see the results these combinations deliver. Please refer to Listing 1-7.


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER (

    ORDER BY OrderYear,OrderMonth

    ) AS NPBOB,

    -- same as PBOBRangeUPCR

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    ) AS PBOB,

    SUM(SalesAmount) OVER (

    ORDER BY OrderYear,OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS NPBOBRangeUPCR,

    -- same as PBOB

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS PBOBRangeUPCR

    FROM OverExample;

    GO

    ```

    Listing 1-7

    Scenario 2 – Various Default Window Frame vs. RANGE Behaviors


    This time we added an `ORDER BY` clause to the first `SUM()/OVER()` combination
    and a `PARTITION BY` and an `ORDER BY` clause in the second `SUM()/OVER()` combination.
    The third `SUM()/OVER()` combination included an `ORDER BY` clause and no `PARTITION
    BY` clause, but we included a `RANGE` window frame clause. The fourth `SUM()/OVER()`
    combination included both a `PARTITION BY` and an `ORDER BY` clause plus a `RANGE`
    window frame clause. Results should be interesting.


    Please refer to Figure 1-12.


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig12_HTML.jpg)


    A table has 6 columns for order year, order month, sales amount, N P B O B, P
    B O B, N P B O B range U P C R, and P B O B R range U P C R. Some rows are highlighted
    in the boxes.


    Figure 1-12

    More default vs. RANGE behaviors


    At first glance, all the results seem to be the same! This is true for the first
    year’s partition, but once we get to the second year’s partition, values for the
    first and third columns keep incrementing, while values for the second and fourth
    columns are reset due to the new year partition.


    Values for duplicate month entries have been framed with boxes. Column `NPBOB`
    has no `PARTITION BY` clause, but it has an `ORDER BY` clause, so the default
    window frame behavior defined by `RANGE BETWEEN UNBOUNDED PRECEDING and CURRENT
    ROW` kicks in. Once again notice how the rows with the duplicate month numbers
    result in the totals being the same. Month 6 (June) for 2010 has totals of 8000.00,
    the same for months 7 (July) and 8 (August).


    The second `SUM()/OVER()` combination does have a `PARTITION BY` and an `ORDER
    BY` clause, so the default window frame behavior is `RANGE BETWEEN UNBOUNDED PRECEDING
    AND CURRENT ROW`. The `PARTITION BY` clause defines the partitions for each year,
    and the default frame behavior causes the window function to calculate values
    by considering the current row and prior row values until duplicate month entries
    are encountered. If this is a running total, we would expect 7000.00 and 8000.00,
    but both entries for these rows have the higher value: 8000.00.


    The third `SUM()/OVER()` combination in the query includes an `ORDER BY` clause
    but no `PARTITION BY` clause. A window frame specification is included: `RANGE
    BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`. The results are the same as the
    prior combination, but once we get to the partition for year 2011, the rolling
    sum just keeps going as a `PARTITION BY` clause was not included. Once again,
    notice the behavior when rows with the same month are encountered.


    Last but not least, the fourth `SUM()/OVER()` combination has a `PARTITION BY`,
    an `ORDER BY`, and a `RANGE` window frame clause. This combination behaves just
    like the combination for the `PBOB` column.


    We can now see how the default behaviors kick in for the various combinations
    of the `ORDER BY` and `PARTITION BY` clauses. When a window frame specification
    is included, it behaves just like the default behavior in the other columns. Keep
    these in mind when you start creating window function–based queries.


    ### Example 3


    The next example compares the `ROWS` window frame specifications vs. the `RANGE`
    window frame specification.


    Please refer to Listing 1-8.


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS POBRowsUPCR,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS PBOBRangeUPCR

    FROM OverExample;

    GO

    ```

    Listing 1-8

    ROWS vs. RANGE Comparison


    The `SUM()` function in both cases has identical `PARTITION BY` and `ORDER BY`
    clauses. The first has a `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` clause,
    while the second combination has a `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT
    ROW` clause.


    What do you think the results will be?


    Please refer to Figure 1-13.


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig13_HTML.jpg)


    A table has 5 columns for order year, order month, sales amount, P O B R rows
    U P C R, and P B O B R range U P C R. Some rows are highlighted in the boxes.


    Figure 1-13

    ROWS vs. RANGE, UNBOUNDED PRECEDING AND CURRENT ROW


    The results are almost the same, but the `SUM()/OVER()` combination that uses
    the `RANGE` window frame specification will generate the same values for any rows
    having duplicate `ORDER BY` values. As we discussed earlier, this clause works
    at a logical level (vs. physical for `ROWS`); it will add up all the duplicate
    values and post the same results in each duplicate row.'
