    # 引言


    欢迎阅读我的书，*SQL Server 分析工具集*。


    ## 本书内容


    这是一本关于如何在各行业中应用 Microsoft SQL Server 聚合、分析和排名函数的书，旨在使用一系列内置的 SQL Server 函数——亲切地称为窗口函数！——进行统计、报表、分析和历史性能分析。


    不，不是像 C# 或其他 Microsoft Windows 应用程序编程中使用的那种窗口。它们被称为窗口函数，是因为它们在查询生成的数据集上实现了“窗口”。这些窗口通过在查询数据集中创建分区，来控制函数应用于数据的位置。


    ## 什么是分区？


    你可能会问：“什么是分区？”这是一个关键概念，理解它才能最大限度地从本书获益。假设你有一个数据集，其中产品类别 A 有六行，产品类别 B 有六行。每一行都包含一个你希望分析的销售额的列。该数据集可以划分为两个部分，每个产品类别一个。这些就是窗口函数所使用的分区。你可以通过应用窗口函数来分析每个分区（更多内容见第
    1 章）。


    我们将看到，每个分区中的窗口可以进一步划分为更小的窗口。窗口帧机制使你能够控制分区中哪些行被提交给窗口函数，相对于当前正在处理的行。例如，将像 `SUM()`
    这样的函数应用于当前正在处理的行以及分区中的所有先行行，以按月计算累计总额。移动到分区中的下一行，其行为相同。


    本书重点介绍如何在四个关键行业应用这些函数：销售、金融、工程和库存控制。我这样做是为了让这些行业的读者可以在日常工作中找到熟悉的内容。即使你不在这四个行业工作，你仍然可以通过学习窗口函数及其应用方式而获益。


    也许你想面试金融领域的开发职位？或者你从事工程、电信行业，或是零售产品的制造商。本书将帮助你获得一些宝贵的技能，助你通过工作面试。


    虽然你可以使用像 Power BI 这样的工具来执行这些函数，但在 SQL 层面执行这些函数可以预先计算结果并提高性能，从而让报表工具使用预先计算好的数据。


    顺便说一句，市面上有很多关于 SQL Server 和窗口（或窗口化）函数的书。这本书有什么不同？

    '
- fmt: '## Approach


    This book takes a cookbook approach. Not only are you shown how to use the functions,
    but you are shown how to apply them across sales, finance, inventory control,
    and engineering scenarios.


    These functions are grouped into three categories, so for each industry use case
    we look at, we will dedicate a chapter to each function category:


    *   Aggregate functions

    *   Analytical functions

    *   Ranking functions


    For each function, a query is created and explained. Next, the results are examined
    and analyzed.


    Where applicable the results are used to generate some interesting graphs with
    Microsoft Excel spreadsheets, like creating normal distribution charts for sales
    data.


    Appendix A contains descriptions and syntax for these functions in case you are
    not familiar with them, so feel free to examine them before diving into the book.


    Key to mastering the concepts in this book is understanding what the `OVER()`
    clause does. Chapter [1](#527021_1_En_1_Chapter.xhtml) starts off by defining
    what the `OVER()` clause is and how it is used with the window functions.


    Several diagrams clearly explain what data sets, partitions, and window frames
    are and how they are key to using the window functions.


    Each of the industries we identified earlier has three dedicated chapters, one
    for each of the window function categories. Each chapter provides a specification
    for the query to be written, the code to satisfy the specification, and then one
    or more figures to show the results.


    The book is unique in that it goes beyond just showing how each function works;
    it presents use case scenarios related to statistical analysis, data analysis,
    and BI (BI stands for business intelligence by the way).


    The book also makes available all code examples including code to create and load
    each of the four databases via the publisher’s Google website.


    Lastly, just enough theory is included to introduce you to statistical analysis
    in case you are not familiar with terms like standard deviation, mean, normal
    distribution, and variance. These are important as they will supply you with valuable
    skills to support your business users and enhance your skills portfolio. Hey,
    a little business theory can’t hurt!


    Appendix B has a brief primer on statistics, so make sure to check it out in case
    these topics are new to you. It discusses standard deviation, variance, normal
    distribution, other statistical calculations, and bell curves.


    Back to the window functions. These functions generate a lot of numerical data.
    It’s great to generate numbers with decimal points but even more interesting to
    graph them and understand what they mean. A picture is worth a thousand words.
    Seeing a graph that shows sales decreasing month by month is certainly worth looking
    at and should raise alarms!


    You can also use the Excel spreadsheets to verify your results by using the spreadsheets’
    built-in functions to make sure they match the results of your queries. Always
    test your data against a set of results known to be correct (you might just learn
    a little bit about Microsoft Excel too!). The spreadsheets used in this book will
    also be available on the publisher’s Google website.


    The book includes tips and discussions that will take you through the process
    of learning the SQL Server aggregate, ranking, and analytical functions. These
    are delivered in a step-by-step approach so you can easily master the concepts.
    Data results are analyzed so that you can understand what the function does and
    how the windows are used to analyze the data work.


    ## Expectations


    Now that you know what you are in for, what do I expect from you?


    Not much really, at a high level.


    I expect you to be an intermediate to advanced SQL Server developer or data architect
    who needs to learn how to use window functions. You can write medium-complexity
    queries that use joins, understand what a `CTE` (common table expression) is,
    and be able to create and load database tables.


    You could also be a tech-savvy business analyst who needs to apply sophisticated
    data analysis for your business users or clients.


    Lastly, you could be a technology manager who wants to understand what your development
    team does in their roles as developers. All will benefit from this book.


    In conclusion, you need


    *   A keen interest in learning data analysis skills

    *   A basic knowledge of relational database technology and SQL skills

    *   A basic understanding of mathematical calculations like calculating the average
    of values and performing basic arithmetic operations like addition, subtraction,
    division, and multiplication

    *   Lastly, a working knowledge of `SQL Server Management Studio (SSMS)`, the
    tool we will use to create and execute the queries


    In case you do not know how to use `SSMS`, there are many excellent YouTube videos
    and sites that can show you how to use this tool in a short amount of time.


    You can also check out my podcast “GRUMPY PODCAST 01 NAVIGATING SSMS” at [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com)
    under the TSQL Podcasts menu selection in the menu bar.


    ## What’s in It for You?


    You, my dear reader, will learn how to use the Microsoft SQL Server analytical,
    aggregate, and ranking functions. These are valuable skills that will enhance
    your capability to develop solutions for your company role and the business users
    you support or will support.


    ## What Else Do You Get?


    There are tons of code examples that you can access and play around with to become
    familiar with the workings of the window functions. Practice makes perfect. Break
    the code, modify it, and experiment. This is the best way to learn.


    Note


    You can download the code from the publisher’s Google website at [`https://github.com/Apress/SQL-Server-Analytical-Toolkit`](https://github.com/Apress/SQL-Server-Analytical-Toolkit).'
