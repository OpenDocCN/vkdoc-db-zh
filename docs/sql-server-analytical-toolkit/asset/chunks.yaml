  trans: '

    ## OVER() 子句


    `OVER()` 子句紧跟在 `SELECT` 子句中的窗口函数之后出现。我们在清单 1-1 中的第一个示例使用了 `SUM()` 函数，按年份和月份汇总销售额。


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER(

    PARTITION BY OrderYear

    ORDER BY OrderMonth ASC

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS AmountTotal

    FROM OverExample

    ORDER BY OrderYear,OrderMonth

    GO

    -- 清单 1-1

    -- 使用 OVER() 子句的 SUM() 函数

    ```


    在 `OVER` 关键字后的括号内，可以包含另外三个子句，例如 `PARTITION BY`、`ORDER BY` 以及 `ROWS` 或 `RANGE`
    子句（用于定义向函数呈现待处理行的窗口框架）。


    即使你在 `OVER()` 子句中包含了 `ORDER BY` 子句，你仍然可以在查询的末尾加入常规的 `ORDER BY` 子句，以按照查询所解决业务需求的任何适当顺序对最终处理后的结果集进行排序。


    ## 语法


    以下是三种可与窗口函数一起使用的基本语法模板。阅读这些语法模板很简单。只需记住，方括号之间的关键字表示它们是可选的。以下是可用于 `OVER()` 子句的第一个语法模板：


    **语法 1**


    ```sql

    OVER (

    [PARTITION BY ...]

    [ORDER BY ...]

    [ROWS/RANGE ...]

    )

    ```


    大多数窗口函数使用这第一个语法，它由三个主要子句组成：`PARTITION BY` 子句、`ORDER BY` 子句以及一个 `ROWS` 或 `RANGE`
    规范。你可以包含这些子句中的一个或多个，或者一个都不包含。这些组合将影响分区的定义方式。例如，如果你不包含 `PARTITION BY` 子句，则整个数据集被视为一个大的分区。表达式通常是一个或多个列，但在
    `PARTITION BY` 和 `ORDER BY` 子句的情况下，它也可以是一个子查询（请参阅附录 A）。


    `窗口函数` 是表 1-1 中标识的函数之一。


    这第一个语法对于除 `PERCENTILE_DISC()` 和 `PERCENTILE_CONT()` 函数之外的所有函数几乎相同，后者使用一个略有变化的语法：


    **语法 2**


    ```sql

    PERCENTILE_DISC (numeric_literal) WITHIN GROUP (

    ORDER BY expression [ASC | DESC]

    )  OVER ([PARTITION BY ...])

    ```


    这些函数用于计算数据集列中的百分位离散值和百分位连续值。`numeric_literal` 可以是像 `.25`、`.50` 或 `.75` 这样的值，用于指定你希望计算的百分位。请注意，`ORDER
    BY` 子句被插入在 `WITHIN GROUP` 命令的括号之间，而 `OVER()` 子句仅包含 `PARTITION BY` 子句。


    暂时不必担心它的具体作用。后续会提供示例来阐明此代码的行为。现在，只需了解需要掌握三种基本语法模板即可。


    在我们的章节示例中，表达式通常是一个或多个以逗号分隔的列，尽管你也可以使用其他数据对象，如查询。请参阅 Microsoft SQL Server 文档以查看详细的语法规范或附录
    A。


    最后，我们的第三个语法模板适用于 SQL Server 2022（版本 16.x）。窗口功能得到了增强，允许你在一个命名窗口中指定窗口选项，该窗口出现在查询的末尾：


    **语法 3**


    ```sql

    WINDOW <window_name> AS (

    [PARTITION BY ...]

    [ORDER BY ...]

    [ROWS/RANGE ...]

    )

    ```


    截至本文撰写时，SQL Server 2022 仅可用于评估。清单 1-2 是一个使用此新功能的 TSQL 查询示例。


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER SalesWindow AS SQPRangeUPCR

    FROM OverExample

    WINDOW SalesWindow AS (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    );

    GO

    -- 清单 1-2

    -- SQL Server 2022 命名窗口功能

    ```


    窗口的名称是 `SalesWindow`，它直接在 `OVER` 操作符之后使用，而不是像我们讨论的第一个语法模板那样使用 `PARTITION BY`、`ORDER
    BY` 和 `RANGE` 子句。


    如果你的 `SELECT` 子句中有多个窗口函数需要使用此分区和窗口框架配置，这可能是个不错的功能。这将避免在 `SELECT` 子句的每一列中重复编写分区代码。


    `PARTITION BY`、`ORDER BY` 和 `RANGE` 子句在查询末尾的 `WINDOW` 关键字后的括号内声明，而不是紧跟在 `OVER`
    关键字之后。


    如果你想尝试一下，可以下载并安装 2022 评估版许可证，并在本书提供的示例代码或你自己的查询上试用。安装和下载快速而简单。请确保获取最新版本的 SSMS。这些可在
    Microsoft 的下载网站上找到。


    ## 分区与框架


    最后，我们开始讨论分区是什么样子，以及框架或窗口框架是什么。


    基本上，查询将生成一个数据结果集，你可以通过在 `OVER()` 子句中包含 `PARTITION BY` 子句将其划分为称为分区的部分。对于每个分区，你可以进一步定义更小的窗口，以微调窗口函数的应用方式。


    一图胜千言，所以现在让我们看一张图。请参考图 1-1。


    ![](img/527021_1_En_1_Fig1_HTML.png)

    *一张表有 3 列：键、类型和值。行被划分为类型 A 和类型 B 两个分区。窗口框架由第 3 行的前一行和后一行定义。*

    *图 1-1：一个包含三个分区和一个示例框架的简单数据集*


    这里我们有一个由八行组成的简单数据集。此数据集中有三个示例分区。一个可以包含数据集的所有八行；另外两个包含由 `TYPE` 列标识的行。只有两种类型值，类型
    `A` 和类型 `B`，因此每个分区将有四行。顺便提一下，你不能在一个 `OVER()` 子句中包含多个 `PARTITION BY` 子句。


    每个 `OVER()` 子句只能定义一个分区，尽管你可以在使用分区的查询的 `SELECT` 子句中拥有多个列。你可以指定不同的列组合来定义分区。


    这种架构的强大之处在于，我们可以通过使用 `ROWS` 或 `RANGE` 操作符在分区内创建更小的窗口框架。这些操作符允许你指定在处理当前行之前和/或之后将有多少行被窗口函数使用。


    在我们前面的示例快照中，当前行是第 3 行，窗口框架被定义为仅包括相对于当前行的前一行、当前行和下一行。如果我们将 `SUM()` 函数应用于此窗口框架并求和所有值，我们得到结果
    60（15 + 20 + 25）。（记住这是在仅包含四行的第一个分区内。）


    如果继续处理下一行，即第 4 行，则 `SUM()` 函数只能使用第 3 行和第 4 行，结果为 45（20 + 25）。我忘了提到，如果我们从第 1 行开始，那么
    `SUM()` 函数只能使用第 1 行和第 2 行，因为没有前一行。该函数返回值 25（10 + 15）。


    我们如何控制这种类型的处理？我们需要做的就是在需要时向查询添加 `ROWS` 或 `RANGE` 规范。我们还可以包含一个 `ORDER BY` 子句来指定如何在分区内对行进行排序，以便按需应用窗口函数。例如，生成按月的滚动总计，当然从第
    1 个月（一月）开始，到第 12 个月（十二月）结束。


    听起来很容易，但我们需要了解当我们省略 `ORDER BY` 子句和/或 `PARTITION BY` 子句时，关于默认处理的几种情况。我们很快就会讨论这些。

