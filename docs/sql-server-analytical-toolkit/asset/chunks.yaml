    # PERCENTILE_CONT()


    在我们深入分析财务数据之前，先从一个简单的例子开始。我们的分析师为下一个报告提交了以下业务需求：


    创建一个报表，按客户、年份、月份、账号和名称显示期权（一种衍生品工具）账户余额，以及 25%、50%、75% 和 90% 的连续百分位数。最初我们将只显示客户
    C0000001，但此报表稍后将用于多个客户。查询需要灵活，以便满足所有这些要求。最后，查询的运行时间必须少于一秒钟（我们的第一个性能要求）！


    请参考清单 7-14 了解解决方案。


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_CONT(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-25%]

    ,PERCENTILE_CONT(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-50%]

    ,PERCENTILE_CONT(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-75%]

    ,PERCENTILE_CONT(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-90%]

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    GO

    ```


    清单 7-14 客户连续百分位数查询


    请注意，此查询与我们通常包含 `OVER()` 子句的查询略有不同。该函数在 `SELECT` 子句中包含了四次，但每个所需百分位数的值作为参数传入。另请注意，我们正在使用内存增强表，因此这应该很快！


    在 `OVER()` 子句出现之前，我们需要包含一个 `WITHIN GROUP (ORDER BY ...)` 子句。请注意，`ORDER BY` 子句并未包含在
    `OVER()` 子句中。我们看到的只有 `PARTITION BY` 子句，它在四种情况下都设置了按客户标识符和账户年份的分区。看起来在每种情况下，分区都将按
    `AcctBalance` 列排序以便处理。


    后面是一个简单的 `WHERE` 子句，用于筛选期权账户和客户 C0000001 的结果。此查询可以重新调整用途以显示多个客户和多个账户的结果，因此你可能需要修改
    `OVER()` 子句。


    > 注意

    >

    > 像往常一样，我们从小的数据集开始，以确保查询正确工作，之后再扩大范围。


    请参考图 7-26 中的部分结果。


    ![](img/527021_1_En_7_Fig27_HTML.png)


    图 7-26 各种百分位数的连续百分位数报表


    此报表中什么引人注目？百分位数的值是插值的。注意箭头指向两个最接近的值，例如，19338.62 介于 15783.80 和 19733.60 之间。值 19338.62
    并不存在于实际的列值中。


    请记住，这是该函数的行为。


    但这并非普遍规律。可能存在某些数据模式，使得连续百分位数值与列值匹配。大多数情况下不会发生这种情况。再看一下 $100,000.00 的结果。列值和百分位数值是相等的。这是因为此分区中只有一行。因此，这是一个例外于该函数通常行为的场景。


    在我看来，这个报表确实让我们很好地了解了值的分布情况。


    # 性能考虑


    让我们以通常的方式生成一个估计的查询计划。我们只检查右侧部分，因为执行模式重复了四次，对应于 `SELECT` 子句中每次 `PERCENTILE_CONT()`
    函数调用（对应每个百分比参数）。在初始索引查找以设置数据之后，实际上还有第五个重复模式。这些包括一个排序步骤和一些常见的表假脱机任务。


    请参考图 7-27。


    ![](img/527021_1_En_7_Fig28_HTML.png)


    图 7-27 连续百分位数报表的估计查询计划


    现有索引满足了查询要求，因此我们看到一个索引查找，其成本为 20%。有用于 `WHERE` 子句的筛选器和成本为 43% 的昂贵排序。在下方的两个分支中，我们看到两个表假脱机，它们为嵌套循环连接生成数据流，所有成本均为
    0%。


    第二个嵌套循环连接以 6% 的成本合并了顶部和底部的流。正如我之前所说，剩余的计划部分类似并重复自身，只是没有索引查找和排序任务。


    接下来，让我们看看 `TIME` 和 `IO` 统计信息。请参考图 7-28。


    ![](img/527021_1_En_7_Fig29_HTML.png)


    图 7-28 IO 和 TIME 统计信息


    如图所示，我们只有关于工作表的统计信息，包括 15 次扫描计数和 595 次逻辑读取。内存增强表的处理没有产生任何统计信息。最后，SQL Server 的执行时间是
    176 毫秒。


    请参考图 7-29 了解部分 `STATISTICS PROFILE` 统计信息。


    ![](img/527021_1_En_7_Fig30_HTML.png)


    图 7-29 连续百分位数查询的配置文件统计信息


    你可能注意到了，对于内存增强表，我们看到 `EstimateIO` 统计信息为 0 或非常低，但 `EstimateCPU` 统计信息较高。这是一个部分输出，因为总共有
    55 个步骤，但除了一个步骤外，所有 IO 都为零！`EstimateCPU` 和 `TotalSubtreeCost` 因步骤而异，其中 `WHERE`
    子句和嵌套循环连接的值最高。


    就性能分析计划而言，我认为这个计划非常有趣，并展示了内存增强表的能力。


    > 问题

    >

    > 更高的 `EstimateCPU` 统计信息是否意味着在利用内存增强表时需要强大的 CPU？这是值得考虑的一点。

