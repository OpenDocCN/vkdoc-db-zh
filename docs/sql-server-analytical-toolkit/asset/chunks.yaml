  trans: '### 示例 1：滚动方差


    我们第一个方差报告的需求如下：


    为工厂位置的设备故障创建一个滚动方差报告。按工厂、位置、季度和月份建立报告。滚动方差在生成方差值时，应包含任意前序行和当前行，因为结果会逐月变化。


    这是一个简单的报告，我们使用标准差示例中的一个查询，稍作修改，并在 `PARTITION BY` 子句中添加一个 `ROWS` 子句。


    请参考清单 8-16 以查看新查询。


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollingVar

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollingVarp

    FROM [Reports].[EquipmentFailureStatistics]

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    ```


    清单 8-16

    按工厂、位置、年份和月份计算的滚动方差


    可以看到，我们添加了 `ROWS` 子句，并保留了 `WHERE` 子句来将结果限制在东工厂的锅炉房。如果我们希望将结果输出到 Microsoft Excel
    数据透视表，可以修改此查询以包含所有工厂和位置。


    请参考图 8-25 中的部分结果。


    ![](img/527021_1_En_8_Fig25_HTML.png)


    ch08_queries_V2.sql 窗口截图。上方屏幕显示部分编程代码。下方屏幕展示结果表格。表格有 9 列。其中月份名称、设备故障总和、滚动方差和滚动方差
    P 列被高亮显示。


    图 8-25

    工厂位置故障的滚动方差


    该框定义了一个包含一月、二月、三月、四月和五月值的五行分区。对于此框架，当前处理行为第 5 行。第一个 `VAR()` 值为 `NULL`，在遇到新年前，其余值均不为
    `NULL`。我将这 24 行复制到 Microsoft Excel 中，并能够使用 Excel 函数复现结果。如果你也这样做，请记住 `VAR($G$1,G5)`
    与 `VAR($G$1:G5)` 是不同的。你需要使用分号来定义一个包含所有前序行的、不断增长的范围：


    ```

    VAR($G$1:G5)

    VAR($G$1:G6)

    VAR($G$1:G7)

    ```


    以此类推。使用逗号版本每次只会包含两行。错了！我忘了这点，这让我抓狂。搞不懂为什么 SQL 代码生成的值与 Microsoft Excel 的不同。这是个容易掉进去的陷阱。


    顺便提一下，在前面的查询中尝试这段代码片段，你会发现如果对方差取平方根，我们确实得到了标准差：


    ```sql

    ,SQRT(

    VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    )

    ) AS MyRollingStdev

    ,STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS RollingStdev

    ```


    下一个示例。


    ### 示例 2：按季度计算的方差


    我们第二个方差报告的需求如下：


    为工厂位置的设备故障创建一个按季度计算的方差报告。按工厂、位置、季度和月份建立报告。方差应包含分区内任意前序行和任意后序行。


    我们只需复制粘贴前一个查询并做一些小的调整。


    请参考清单 8-17。


    ```sql

    SELECT PlantName           AS Plant

    ,LocationName        AS Location

    ,CalendarYear        AS Year

    ,QuarterName         AS Quarter

    ,MonthName           AS Month

    ,SumEquipmentFailure AS EquipFailure

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY PlantName,LocationName,CalendarYear

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS VarByQtr

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY PlantName,LocationName,CalendarYear

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS VarpByQtr

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    ```


    清单 8-17

    按工厂和位置计算的季度方差报告


    注意 `PARTITION BY` 子句。分区由工厂、位置、年份和季度定义。分区按工厂名称、位置名称和年份排序以便处理。


    同样，有一个 `WHERE` 子句将结果集限制为两年以及该工厂内的一个工厂和一个位置。我这样做是为了保持结果集较小，但一旦你练习熟练后，就可以移除这些限制。目前，根据查询的现状，由于
    `WHERE` 子句的存在，我们不需要在 `PARTITION BY` 和 `ORDER BY` 子句中包含工厂名称和位置名称，正如我们之前讨论的那样。


    结果请参考图 8-26。


    ![](img/527021_1_En_8_Fig26_HTML.jpg)


    ch08_queries_V2.sql 窗口截图。上方屏幕显示部分编程代码。下方屏幕展示结果表格。表格有 8 列。其中季度、月份、设备故障、按季度方差和按季度方差
    P 列被高亮显示。


    图 8-26

    工厂位置故障按季度计算的方差


    如你所见，每个季度都有自己的方差结果。这也通过 Microsoft Excel 进行了验证。


    最后但同样重要的是，让我们通过计算按年份的方差来构建我们的方差统计配置报告集。'
- fmt: '### Example 3: Variance by Year


    Here’s a short requirements specification from our friendly analyst:

    Create a variance report by year for plant location equipment failures. Set up
    a report by plant, location, quarter, and month. The variance should include any
    previous row and any following row within the partition.


    Pop Quiz


    Does the last sentence of the specification give us a clue that we should use
    the `ROWS` clause in our query, or will the default behavior of the `OVER()` clause
    we implement satisfy the requirement?


    Once again we just copy and paste the prior query and make some minor adjustments
    to the `OVER()` clause.


    Please refer to Listing [8-18](#527021_1_En_8_Chapter.xhtml#PC23).


    ```sql

    SELECT PlantName    AS Plant

    ,LocationName AS Location

    ,CalendarYear AS [Year]

    ,QuarterName  AS [Quarter]

    ,MonthName    AS Month

    ,SumEquipmentFailure As TotalFailures

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarYear

    ) AS VarByYear

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarYear

    ) AS VarpByYear

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    ```


    **Listing 8-18** Rolling Variance by Year


    This time we omit the `ROWS` clause and set up a partition by plant name, location,
    and year. The partition is ordered by the year. With this query we have a nice
    time profile of the variance of failures, namely, the rolling monthly variances,
    the variances by quarter, and finally the variances by year. Let’s look at the
    results in Figure [8-27](#527021_1_En_8_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig27_HTML.jpg)

    *A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 8 columns. The
    columns of the month, total failure, variance by year, and variance by year, are
    highlighted.*


    **Figure 8-27** Plant location equipment failure variance by year


    Each year has a single variance value for all months. Notice that the `VARP()`
    function generated a smaller variance in each year. That’s because it took into
    account the entire population of the data set.


    Pop Quiz Answer


    Does the last sentence of the specification give us a clue that we should use
    the `ROWS` clause in our query, or will the default behavior of the `OVER()` clause
    we implement satisfy the requirement? No, looks like the default behavior satisfies
    the requirement. When you include a `PARTITION BY` clause and an `ORDER BY` clause,
    you include all prior rows and following rows relative to the current row being
    processed.


    ## Performance Considerations


    Let’s close out this chapter with a little performance tuning. We will use the
    statistical aggregate functions and the average function in one query to see the
    complexity of the estimated query plan that we will generate.

    Recall we are going to use a report table that replaced the `CTE`, so performance
    should be acceptable even without indexes. This table has only 2,021 rows, so
    it is very small and could very well be implemented as a memory-enhanced table.

    Before we try the memory-optimized table approach, let’s proceed and see if indexes
    help or hinder our performance goals. We will even try a clustered index.

    The requirement is to create a query that can be used to provide a statistical
    profile of plant failures. The `AVG()`, `STDEV()` and `STDEVP()`, and `VAR()`
    and `VARP()` functions will be used. We want rolling values by plant, location,
    calendar year, and month.

    Let’s examine the query.

    Please refer to Listing [8-19](#527021_1_En_8_Chapter.xhtml#PC24).


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,AVG(CONVERT(DECIMAL(10,2),SumEquipmentFailure)) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingAvg

    ,STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingStdev

    ,STDEVP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingStdevp

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingVar

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingVarp

    FROM [Reports].[EquipmentFailureStatistics]

    GO

    ```


    **Listing 8-19** Plant Failure Statistical Profile


    The partitions are set up the same way for all the `OVER()` clauses. The partitions
    are all using an `ORDER BY` clause that sorts the partition by the `CalendarMonth`
    column. The `ORDER BY` clause is used to define the order in which the window
    functions will be applied to the partition. Let’s check the results before looking
    at the query plan.

    Please refer to Figure [8-28](#527021_1_En_8_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig28_HTML.png)

    *A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 9 columns for
    name, month, calendar month, sum equipment failure, rolling average, rolling Stdev,
    rolling variance, and rolling variance P.*


    **Figure 8-28** Equipment failure profile


    Works as expected, rolling value results across the rows. Notice the `NULL` results
    when we are processing the first row of each partition. Also notice the zero values
    when the functions are processing the entire data set or, in other words, the
    entire data set is known.

    You can override the `NULL` results by using a `CASE` block to display 0 instead
    of `NULL` if you want to. This is shown in the following code snippet:


    ```sql

    CASE WHEN STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) IS NULL THEN 0

    ELSE

    STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    )

    END AS RollingStdev

    ```


    A little busy but it does the trick. Here comes the estimated query plan.

    Please refer to Figure [8-29](#527021_1_En_8_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig29_HTML.png)

    *A screenshot of the ch08 queries V 2 dot sql window. The top screen has some
    programming codes. The bottom screen has a message and execution plan for query
    1. window spool cost 7%, sort cost 63%, and table scan cost 28%.*


    **Figure 8-29** Baseline estimated query plan


    We see a table scan, an expensive sort at 63% cost, and a hefty window spool task
    at 7% cost.

    I created this index to see if the window spool cost would go down:'
