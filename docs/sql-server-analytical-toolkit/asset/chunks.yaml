- fmt: '### Overall Performance Considerations


    我们可以使用 Microsoft Excel 电子表格和图表来分析 `IO` 和 `TIME` 统计数据，以了解窗口函数之间的相对性能表现。通过将所有统计数据收集到一个表格中并绘制图表，我们可以看到
    `PERCENT_RANK()` 函数相比其他函数消耗了大量的 `CPU` 和总执行时间。


    我们将对 Warehouse 表和 work 表都进行此分析。图 [13-42](#527021_1_En_13_Chapter.xhtml#Fig42)
    展示了 Warehouse 表统计数据的可视化结果。


