- fmt: '# 12. Inventory Use Case: Ranking Functions


    Welcome to the third to last chapter of the book. I hope you are enjoying the
    journey. This time we launch the four ranking window functions against our inventory
    database and the inventory data warehouse. We will perform the usual analysis
    of the results and do some performance analysis, but we will also go through the
    steps to create a web report with Microsoft Report Builder and publish it to a
    website implemented with `SSRS` (SQL Server Reporting Services), Microsoft’s premiere
    reporting architecture.


    But there is more. We will also go through the steps of creating a simple Power
    BI report and dashboard that will deliver some pretty neat charts and reports.
    We will publish these to a personal `SSRS` server website and a Power BI server
    website that runs on your laptop or workstation.


    Lastly, this chapter will include a large number of figures as I feel that one
    can learn from diagrams, charts, and screen prints even better than reading text
    (well, almost). A picture is worth a thousand words! Easy to follow, too, as you
    are trying these tools out.


    As far as the window functions are concerned, we will proceed in the usual manner
    and define the business specifications, create and run the query, analyze the
    data, and then generate estimated query plans and `IO` and `TIME` statistics in
    order to analyze query performance.


    After all, we are following a cookbook approach to learn the window functions,
    so we follow the recipe just described. By the way there are nine code listings
    but 59 figures and one diagram. We have a lot of material to cover.


    ## Ranking Functions


    Here are our four functions in this category:


    *   `RANK()`: `Does not` support `ROWS` and `RANGE` specifications

    *   `DENSE_RANK()`: `Does not` support `ROWS` and `RANGE` specifications

    *   `NTILE()`: `Does not` support `ROWS` and `RANGE` specifications

    *   `ROW_NUMBER()`: `Does not` support `ROWS` and `RANGE` specifications


    The first two are used to rank results in partitions, and the third lets you define
    buckets in the data returned by a query. The `NTILE()` function works well in
    categorization schemes.


    The last function, `ROW_NUMBER()`, is our workhorse function used to generate
    row numbers within the entire data set or partitions within the data set. We will
    use it for a different purpose though. This function can be used to generate random
    data with some tricky logic.


    None of these functions support the `ROW` and `RANGE` frame specifications, and
    if you understand what these functions do, it makes sense.


    We will start off by performing our usual analysis of our ranking functions. That
    is, we look at the business specifications submitted by our friendly business
    analyst, create a script to support the requirements, and run the script to check
    out the results. Next, we generate estimated query plans as we have been doing
    in order to analyze and, if possible, improve the performance of the queries.
    Of course, we will also checkout `IO`, `TIME`, and `PERFORMANCE STATISTICS` to
    further dive deeper into the execution steps and costs.


    Let’s start by discussing the `RANK()` function that we will apply our inventory
    data to.


    ### RANK( ) Function


    Recall that the `RANK()` function returns the number of rows before the current
    row plus the current row based on the value being ranked. Let’s see what the business
    analyst’s specifications are:


    The analyst wants to see some statistical data on the movement out of inventory.


    Specifically, the report needs to assign a rank of movements for product “P209”
    in warehouse “WH111,” inventory “INV1,” and location “LOC1.” The report needs
    to spell out the calendar quarter and month names as opposed to just displaying
    numbers.


    Initially this report needs to be for the year 2010, but as usual, once the report
    is bug-free, it needs to be easily modified to support multiple years, products,
    etc. and even used for `SSRS` reports or Power BI scorecards.


    By the way product “P209” is a “Swiss type 1 passenger car” for any model train
    buffs out there.


    Here is the `CTE`-based query that will address this requirement.


    Please refer to Listing [12-1](#527021_1_En_12_Chapter.xhtml#PC1).


    ```

    WITH MonthlyInventoryMovement (

    MovementYear,MovementQuarter,MovQtrName,MovementMonth,MovMonthName

    ,InvId,LocId,WhId,ProdId,MonthlyDecrementMovement

    )

    AS

    (

    SELECT YEAR(MovementDate) AS MovementYear

    ,DATEPART(qq,MovementDate) AS MovementQuarter

    ,CASE

    WHEN DATEPART(qq,MovementDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,MovementDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,MovementDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,MovementDate) = 4 THEN ''4th Quarter''

    END AS MovQtrName

    ,MONTH(MovementDate) AS MovementMonth

    ,CASE

    WHEN MONTH(MovementDate)  = 1 THEN ''Jan''

    WHEN MONTH(MovementDate)  = 2 THEN ''Feb''

    WHEN MONTH(MovementDate)  = 3 THEN ''Mar''

    WHEN MONTH(MovementDate)  = 4 THEN ''Apr''

    WHEN MONTH(MovementDate)  = 5 THEN ''May''

    WHEN MONTH(MovementDate)  = 6 THEN ''June''

    WHEN MONTH(MovementDate)  = 7 THEN ''Jul''

    WHEN MONTH(MovementDate)  = 8 THEN ''Aug''

    WHEN MONTH(MovementDate)  = 9 THEN ''Sep''

    WHEN MONTH(MovementDate)  = 10 THEN ''Oct''

    WHEN MONTH(MovementDate)  = 11 THEN ''Nov''

    WHEN MONTH(MovementDate)  = 12 THEN ''Dec''

    END AS MovMonthName

    ,InvId,LocId,WhId,ProdId

    ,SUM(Decrement) AS MonthlyDecrementMovement

    FROM Product.InventoryTransaction

    GROUP BY YEAR(MovementDate)

    ,DATEPART(qq,MovementDate)

    ,MONTH(MovementDate)

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    )

    SELECT MovementYear

    ,MovementQuarter

    ,MovQtrName

    ,MovementMonth

    ,MovMonthName

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,MonthlyDecrementMovement

    ,RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecRank

    FROM MonthlyInventoryMovement

    WHERE MovementYear = 2010

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    AND ProdId = ''P209''

    GO

    ```

    Listing 12-1

    Ranking Inventory Movement Out for Swiss Passenger Car Models


    The first thing we notice is the two large `CASE` statements in the `SELECT` clause.
    As highlighted in the business requirements, the business analyst wants to see
    the names of the quarters and months spelled out, so we need this logic to decode
    the numerical values for these data parts. Our Calendar table is fairly simple,
    so a definite performance improvement would be to add the text versions of quarters
    and months so we could improve performance by avoiding `CASE` blocks in the `SELECT`
    clause.


    **Homework**


    Using two `ALTER` and one `UPDATE` commands, add columns to support the text version
    of calendar quarters and calendar months. Implement this modification in the `APInventory.MasterData.Calendar`
    table and the `APInventory.Dimension.Calendar` dimension table.


    Next, let’s check out the `OVER()` clause. We see a `PARTITION BY` clause that
    references the `MovementYear` column and an `ORDER BY` clause that references
    the `MonthlyDecrementMovement` column. The values are sorted in descending order.'
