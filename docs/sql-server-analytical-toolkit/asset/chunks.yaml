- fmt: 'Provide a name (no spaces please or special characters) for the data set,
    click the Build button, and a dialog box appears that lets you pick a server from
    a list and select how to log onto the server. In this case we want to use Windows
    Authentication instead of SQL Server authentication. Lastly, we select the database
    we want to connect to and test the connection.


    ## 测试连接

    Always test. Remember, there is always time to do things over but never time to
    do things right!


    Click the OK button and the connection creation tasks are complete, and we are
    back to the original panel.


    Please refer to Figure [12-23](#527021_1_En_12_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig23_HTML.jpg)

    A screenshot of a pop panel of Data source properties. It has the name as inventory,
    selects M S S Q L server as the connection type, has a connection string, and
    selects the option of use a connection embedded in my report. O k button at the
    bottom is highlighted.

    **Figure 12-23: Completed data source properties**


    ## 确认连接

    Everything looks good so click the OK button again. You can test the connection
    here also in case you selected an existing connection instead of creating a new
    one.


    Another panel is presented, which shows the new data source connection.


    Please refer to Figure [12-24](#527021_1_En_12_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig24_HTML.png)

    A screenshot of a Pop panel of the New Table or Matrix. Inventory is selected
    as the data source connection. The arrows indicate the test connection button
    and the next button.

    **Figure 12-24: Choose the new connection**


    There’s the name and you get another chance to test it. This is in case you are
    creating a report from an existing connection, so you can select it here and test
    it. Click the “Next” button, and yes, another panel appears for the next step.
    Maybe a bit confusing as there are different paths to these steps depending on
    whether you created a new connection or used an existing one.


    ## 设计查询

    For the next step, please refer to Figure [12-25](#527021_1_En_12_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig25_HTML.png)

    A screenshot of a Pop panel of the New Table or Matrix. The header reads, design
    a query. It lists the folders in the database view panel. 3 arrows indicate the
    Inventory Reorder Alert folder, selected fields option with aggregate, and next
    button.

    **Figure 12-25: Design a query**


    Finally, we get to create the report. Expand the Reports folder and then the Tables
    folder, and in this case, we only have one table called `InventoryReOrderAlert`.
    This table has 24,192 rows, not too big and not too small.


    Expand this node to see all the columns. Select all the columns by clicking in
    the checkbox to the left of each name. The Selected fields panel will display
    all the columns you selected.


    Please refer to Figure [12-26](#527021_1_En_12_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig26_HTML.png)

    A screenshot of a Pop panel of the New Table or Matrix. The header reads, design
    a query. It lists the folders in the database view panel. The inventory year option
    is highlighted in selected fields.

    **Figure 12-26: Selected fields**


    ### 关于筛选器的提示

    We could define filters at this time, but we want to create a drill-down report
    that uses all the data, so we will not use this part of the panel. Click the Next
    button to where you will lay out the report.


    If you decided to use filters, you would also need to create small data sets,
    one per column used in the filters (in the form of `SELECT DISTINCT` `FROM` `ORDER
    BY` <column name="">).


    **Tip:** Give your data sets clear simple names like `ProductId` instead of dataset1,
    dataset2, etc. You know what I mean.


    Then you would need to create parameters that link to the data set in order to
    get the values and finally map the filters in the `WHERE` clause of the query
    in the main data set to these parameters.


    ## 布局报表

    Next, we need to lay out our report.


    Please refer to Figure [12-27](#527021_1_En_12_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig27_HTML.png)

    A screenshot of a Pop panel of the New Table or Matrix. It explains how to arrange
    the fields to group data in rows, columns, or both, and choose a value to display.

    **Figure 12-27: Arrange fields**


    This type of report is composed of row groups, column groups, and values. For
    the row groups, we want to drill down by year and month, so drag the `InventoryYear`
    and `InventoryMonth` columns to this area.


    For the column groups, we want to include the `LocId`, `InvId`, `WhId`, and `ProdId`,
    so drag these columns into this area.


    Lastly, in the Values panel, drag the `ItemsRemaining` column in this area. If
    you click the down arrow on the right-hand side, you get a choice of which function
    you want to apply to this measure (a column you can perform calculations on).
    Notice some of our old friends like the aggregate and analytical functions.


    Lastly, the values appear at intersections of the objects identified in the row
    groups and column groups. We will see what this looks like next.


    Click the Next button for the next step.


    ### 选择布局

    Please refer to Figure [12-28](#527021_1_En_12_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig28_HTML.png)

    A screenshot of a Pop panel of the New Table or Matrix. It explains how to choose
    the layout to show subtotal and grand total. Arrows point to the selected, blocked
    subtotal below, option, and Next button at the bottom. A preview table has 7 columns
    and 7 rows.

    **Figure 12-28: Choose a layout**


    Here we get a chance to specify the general layout for the report. If you check
    “Show subtotals and grand totals,” you can specify one of the following layouts:

    *   Blocked, subtotal below

    *   Blocked, subtotal above (like the `GROUPING` function we discussed earlier
    in the book chapters)

    *   Stepped, subtotal above


    We check Show subtotals and grand totals, and we want a blocked, subtotal below
    format. You can see it in the preceding figure.


    Once you are satisfied with the results, click the Next button for a preview.


    ## 预览报表

    Please refer to Figure [12-29](#527021_1_En_12_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig29_HTML.png)

    A screenshot of a Pop panel of the New Table or Matrix. It presents a preview
    table of the report item with 7 rows and 7 columns. An arrow points to the finish
    button at the bottom.

    **Figure 12-29: Preview of the report**


    You get to see the layout once more. In case you need to change something, you
    can click the Back button to go back a step. We are happy with the layout, so
    click the Finish button.


    ## 运行报表

    Now we are ready to test the report. Please refer to Figure [12-30](#527021_1_En_12_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig30_HTML.png)

    A screenshot of the home page Microsoft Report builder. An arrow points to Run
    button. Build in fields, Parameters, Images, Data Sources, and Dataset folder
    are in the Report Data panel on the left. Right includes a parameters section,
    and the layout of a table with row and column groups sections.

    **Figure 12-30: Report layout – run the report**


    The report layout is displayed. You could make more modifications like adding
    parameters to allow business users to further filter the results, like picking
    one or more products or warehouses. You could add indicators like ones typically
    found in scorecards or dashboards. I like the little car gauges that show if a
    value is increasing or decreasing, but I digress.


    ## 保存报表

    Now would be a good time to save the report to a folder by the way. I always forget
    this, and when the parts are published to SSRS, I need to go back and save the
    report to a folder with a good name so I can then upload it to the SSRS website
    folder (frustrating).


    Click “Save as” and the following panel is presented.


    Please refer to Figure [12-31](#527021_1_En_12_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig31_HTML.png)'
