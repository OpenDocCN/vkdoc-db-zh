  raw: 'The SQL Server estimated query plan is pretty good at recommending the correct
    index to use. But if performance is still an issue, we need to dive into these
    details and determine other actions to take, like denormalized reporting tables
    or rewriting the query. We won’t even get into hardware considerations like more
    memory or faster disks. This is a performance tuning topic that can be part of
    a whole book on performance tuning.


    Practice and get familiar with what each task does and how it corresponds to the
    entries in the `PROFILE` statistics so you can determine what additional steps
    you might need to take to improve performance.


    There’s one more aggregate function to discuss in this chapter.


    ### VAR( ) and VARP( ) Functions


    Recall from Chapter [2](#527021_1_En_2_Chapter.xhtml) that the `VAR`() and `VARP()`
    functions are used to generate the variance for a set of values in a data sample.
    The same discussion related to the data sets used in the `STDEV()/STDEVP()` examples
    applies to the `VAR()` and `VARP()` functions relative to population of the data:


    The `VAR()` function works on a partial set of the data when the entire data set
    is not known or available, while the `STDEVP()` function works on the whole data
    set population when it is known.


    For us developers here’s a simpler explanation:


    Informally, if you take all the differences of each value from the mean (average)
    and square the results and then add all the results and finally divide them by
    the number of data samples, you get the variance.


    For our scenario, let’s say we had some data that forecasted stock performance
    targets for one of our portfolios during a particular year. We want to see how
    close or far the gains were to or from the forecast. It answers the following
    questions:


    *   Did we **miss** our target investment goals?


    *   Did we **meet** our target investment goals?


    *   Did we **exceed** our target investment goals?


    Data generated by these functions can be used in statistical reports and Microsoft
    Excel graphs to answer these questions.


    The syntax is the same as the other functions:


    ```

    VAR(ALL|DISTINCT ) and VARP(ALL|DISTINCT )

    ```


    But one thing to be aware of: If you use these with the `OVER()` clause, `DISTINCT`
    is not allowed!


    Please refer to Listing [5-17](#527021_1_En_5_Chapter.xhtml#PC45).


    ```

    DECLARE @TradeYearStdev TABLE (

    TradeYear            SMALLINT      NOT NULL,

    TradeQuarter         SMALLINT      NOT NULL,

