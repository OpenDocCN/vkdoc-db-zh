- fmt: "## PERCENT_RANK() 函数\n\n接下来介绍的是 `PERCENT_RANK()` 函数。它的作用是什么？\n\n这个函数使用来自查询、分区或表变量的数据集，计算每个值相对于整个数据集（以百分比形式）的相对排名。你需要将结果（返回值为浮点数）乘以\
    \ 100.00 或使用 `FORMAT()` 函数将结果转换为百分比。\n\n此外，它的行为与 `CUME_DIST()` 函数非常相似；至少微软文档是这么说明的。我们在本章开头讨论过这个函数，如果你忘记了，可以回头再看一下它的作用。\n\
    \n你还会发现它在理论上也与 `RANK()` 函数非常相似。`RANK()` 函数返回值的位置，而 `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚才讨论的\
    \ `CUME_DIST()` 函数一起使用，以便比较结果，并看看它对即将生成的查询计划有什么影响。\n\n但首先，让我们像之前讨论那样，再看一个简单的例子，以便清晰地看到简单数据集生成的结果。\n\
    \n我还会根据以下公式提供一个自定义的百分比排名计算版本：\n`(当前行值 - 1) / (数据集总行数 - 1)`\n\n很简单！我们将使用与 `CUME_DIST()`\
    \ 函数相同的表变量数据。\n\n对于我们自定义的代码，我们需要模拟 `RANK()` 函数，该函数将在下一章介绍。为了将我们的自定义代码结果与 SQL Server\
    \ 函数结果进行比较，我也在 `SELECT` 子句中包含了 `RANK()` 函数。\n\n请参考清单 [3-2](#527021_1_En_3_Chapter.xhtml#PC4)。\n\
    \n```sql\nDECLARE @CumeDistDemo TABLE (\nCol1     VARCHAR(8),\nColValue DECIMAL(10,2)\n\
    );\nINSERT INTO @CumeDistDemo VALUES\n('AAA',1.0),\n('BBB',2.0),\n('CCC',3.0),\n\
    ('DDD',4.0),\n('EEE',5.0),\n('FFF',6.0),\n('GGG',7.0),\n('HHH',8.0),\n('III',9.0),\n\
    ('JJJ',10.0)\nSELECT Col1,ColValue,A.RowCountLTE AS MyRank,\nRANK() OVER(\nORDER\
    \ BY ColValue\n) AS SQLRank,\nPERCENT_RANK() OVER(\nORDER BY ColValue\n) AS PCTRank,\n\
    /* current value rank - 1 /data sample total row count - 1 */\n(RANK() OVER(\n\
    ORDER BY ColValue\n) - 1.0) / CONVERT(DECIMAL(10,2),(\nSELECT COUNT(*) AS SampleRowCount\n\
    FROM @CumeDistDemo) - 1.0\n) AS MyPctRank\nFROM @CumeDistDemo CDD\nCROSS APPLY\
    \ (\nSELECT COUNT(*) AS RowCountLTE FROM @CumeDistDemo\nWHERE ColValue <= CDD.ColValue\n\
    ) A\nGO\n```\n清单 3-2 一个简单的百分比排名示例\n\n注意，我重新利用了 `@CumeDistDemo` 表变量（懒得重命名！）。\n\n\
    和之前一样，数据值从 1.0 到 10.0 依次递增。这使得将值与排名结果关联起来变得容易。`FROM` 子句中使用了一个 `CROSS APPLY` 块，以便计算数据集中小于或等于当前行的总行数：\n\
    ```sql\nCROSS APPLY (\nSELECT COUNT(*) AS RowCountLTE\nFROM @CumeDistDemo WHERE\
    \ ColValue <= CDD.ColValue\n) A\n```\n\n应用简单公式，以下代码计算出百分比排名：\n```sql\n(RANK()\
    \ OVER(\nORDER BY ColValue\n) - 1.0) / CONVERT(DECIMAL(10,2),(SELECT COUNT(*)\
    \ AS SampleRowCount FROM @CumeDistDemo) - 1.0) AS MyPctRank\n```\n\n注意，我们正在使用\
    \ `RANK()` 函数来计算排名分配（我们将在下一章讨论它）。如果我们对被排名的数据（即 `ColValue` 列）进行升序排序，作为一个技巧，我们也可以使用\
    \ `ROW_NUMBER()` 函数，如下所示（我们也将在下一章讨论这个）：\n```sql\nROW_NUMBER() OVER(\nORDER BY\
    \ ColValue\n) AS RowNumberAsRank,\n```\n\n最后一种替代方法是直接使用列 `RowCountLTE` 作为排名：\n\
    ```sql\n/* current value rank - 1 /sample total row count - 1 */\nFORMAT(\n(RowCountLTE\
    \ - 1.0) /\nCONVERT(DECIMAL(10,2),(\nSELECT COUNT(*) AS SampleRowCount\nFROM @CumeDistDemo\n\
    ) - 1.0),'P'\n) AS MyPctRank\n```\n\n尝试修改代码，使用所有版本的百分比排名，以便验证结果是否相同以及公式是否有效。在查看附加脚本之前，请先自己尝试一下。\n\
    \n让我们看看结果。请参考图 [3-5](#527021_1_En_3_Chapter.xhtml#Fig5)。\n\n![计算与 SQL Server 函数的\
    \ SQL 窗口对比截图。顶部屏幕有一些编程代码。底部屏幕有一个结果表。表中有6列：Col 1、Col Value、My Rank、SQL Rank、PCT\
    \ Rank 和 My Pct Rank。](images/527021_1_En_3_Chapter/527021_1_En_3_Fig5_HTML.jpg)\n\
    图 3-5 使用 SQL Server 函数和自定义脚本计算百分比排名\n\n以下是排序后的结果。两个百分比排名结果匹配，使用 SQL Server 函数和自定义函数计算的排名结果也匹配。如果你愿意，可以使用\
    \ `FORMAT()` 函数将结果转换为百分比，例如：\n```sql\nFORMAT(\nPERCENT_RANK() OVER(\nORDER BY\
    \ ColValue\n),'P'\n) AS PCTRank,\n```\n\n只需用括号包裹 `PERCENT_RANK()` 代码块，使用 `FORMAT()`\
    \ 函数，并在最后一个括号前包含 `'P'` 参数。非常容易使用。\n\n> **提示**  \n> 在我看来，基于公式创建自己的函数版本是理解函数作用的好方法。\n\
    \n让我们在我们的销售数据仓库上试试这个函数。\n\n请参考清单 [3-3](#527021_1_En_3_Chapter.xhtml#PC10)。\n\n\
    ```sql\nWITH CustSales (\nSalesYear,SalesQuarter,SalesMonth,CustomerNo,\nStoreNo,CalendarDate,SalesTotal\n\
    )\nAS\n(\nSELECT YEAR(CalendarDate)        AS SalesYear\n,DATEPART(qq,CalendarDate)\
    \ AS SalesQuarter\n,MONTH(CalendarDate)       AS SalesMonth\n,ST.CustomerNo\n\
    ,ST.StoreNo\n,ST.CalendarDate\n,SUM(ST.TotalSalesAmount) AS SalesTotal\nFROM StagingTable.SalesTransaction\
    \ ST\nGROUP BY ST.CustomerNo\n,ST.StoreNo\n,ST.CalendarDate\n)\nSELECT SalesYear\n\
    ,SalesQuarter\n,SalesMonth\n,CustomerNo\n,SUM(SalesTotal) AS MonthlySalesTotal\n\
    ,CUME_DIST() OVER (\nPARTITION BY SalesYear\nORDER BY SUM(SalesTotal)\n) AS CumeDist\n\
    ,PERCENT_RANK() OVER (\nPARTITION BY SalesYear\nORDER BY SUM(SalesTotal)\n) AS\
    \ PctRank\nFROM CustSales\nWHERE SalesYear IN(2010,2011)\nAND CustomerNo = 'C00000001'\n\
    GROUP BY SalesYear\n,SalesQuarter\n,SalesMonth\n,CustomerNo\nGO\n```\n清单 3-3 实际应用中的\
    \ `PERCENT_RANK()` 函数\n\n我认为我们不需要再回顾 `CTE` 了，除了强调我们正在按商店汇总销售额。我们可以使用为之前示例创建的暂存表，但让我们再次使用\
    \ `CTE`。另外，我在 `SELECT` 子句中包含了 `CUME_DIST()` 函数，以便我们可以比较两个函数之间的结果。\n\n`OVER()`\
    \ 子句使用了相同的 `ORDER BY` 和 `PARTITION BY` 子句。我们希望按年、季度、月和客户汇总值。我们没有使用商店编号列，因此需要跨年、季度、月和客户编号列应用\
    \ `SUM()` 函数。这意味着我们需要使用 `GROUP BY` 子句。\n\n我们再次使用 `WHERE` 子句来过滤 2010 年和 2011 年，并针对单个客户（“C0000001”），以保持结果集较小。一旦你熟悉了查询的工作原理，请随时下载脚本并修改\
    \ `WHERE` 子句，以便加载更多年份（确保你的笔记本电脑或台式机性能足够）。\n\n让我们看看结果。请参考图 [3-6](#527021_1_En_3_Chapter.xhtml#Fig6)\
    \ 中的部分结果。\n\n![第 03 章 T S Q L 代码窗口的截图。顶部屏幕有一些编程代码。底部屏幕有一个结果表。表中有7列：Sales Year、Sales\
    \ Quarter、Customer Number、Monthly Sales Total、Cume Dist 和 Pct Rank。](images/527021_1_En_3_Chapter/527021_1_En_3_Fig6_HTML.png)\n\
    图 3-6 测试脚本的查询结果\n\n我对查询做了一些更改，消除了 `WHERE` 子句过滤器，并包含了一个 `ORDER BY` 子句。这个更改导致查询执行后返回了\
    \ 16,380 行数据。"
  raw: '### PERCENT_RANK( ) Function


    Next on deck is the `PERCENT_RANK()` function. What does it do?


    Using a data set like results from a query, partition, or table variable, this
    function calculates the relative rank of each individual value relative to the
    entire data set (as a percentage). You need to multiply the results (the value
    returned is a float) by 100.00 or use the `FORMAT()` function to convert the results
    to a percentage.


    Also, it works a lot like the `CUME_DIST()` function; at least that’s what the
    Microsoft documentation says. We discussed this function at the beginning of the
    chapter, so go back and take a look at what it does if you forgot.


    You will also see that it works a lot like the `RANK()` function (in theory anyway).
    The `RANK()` function returns the position of the value, while `PERCENT_RANK()`
    returns a percentage value. We will use this function together with the `CUME_DIST()`
    function just discussed so we can compare the results and also see what effect
    it will have on the query plan we will generate shortly.


    But first let’s examine another simple example, like the prior discussion, so
    we can clearly see the results generated from a simple data set.


    I will also include a homegrown version of the percent rank calculation based
    on the following formula:


    (current row column value - 1) / (total row count of the data set - 1)


    Simple! We will use the same table variable data as the `CUME_DIST()` function.


    For our homegrown code, we need to simulate the `RANK()` function, which will
    be introduced in the next chapter. I also include the `RANK()` function in the
    `SELECT` clause so we can compare its results with our custom code.


    Please refer to Listing [3-2](#527021_1_En_3_Chapter.xhtml#PC4).


    ```

    DECLARE @CumeDistDemo TABLE (

    Col1     VARCHAR(8),

    ColValue DECIMAL(10,2)

    );

    INSERT INTO @CumeDistDemo VALUES

    (''AAA'',1.0),

    (''BBB'',2.0),

    (''CCC'',3.0),

    (''DDD'',4.0),

    (''EEE'',5.0),

    (''FFF'',6.0),

    (''GGG'',7.0),

    (''HHH'',8.0),

    (''III'',9.0),

    (''JJJ'',10.0)

    SELECT Col1,ColValue,A.RowCountLTE AS MyRank,

    RANK() OVER(

    ORDER BY ColValue

    ) AS SQLRank,

    PERCENT_RANK() OVER(

    ORDER BY ColValue

    ) AS PCTRank,

    /* current value rank - 1 /data sample total row count - 1 */

    (RANK() OVER(

    ORDER BY ColValue

    ) - 1.0) / CONVERT(DECIMAL(10,2),(

    SELECT COUNT(*) AS SampleRowCount

    FROM @CumeDistDemo) - 1.0

    ) AS MyPctRank

    FROM @CumeDistDemo CDD

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLTE FROM @CumeDistDemo

    WHERE ColValue <= CDD.ColValue

    ) A

    GO

    Listing 3-2

    A Simple Percent Rank Example

    ```


    Notice I repurposed the @CumeDistDemo table variable (too lazy to rename it!).


    As before, the data values are incremented from 1.0 to 10.0 sequentially. This
    will make it easy to correlate the values to the rank results. A single `CROSS
    APPLY` block is used in the `FROM` clause so we can calculate the total row count
    of the data set less than or equal to the current row:


    ```

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLTE

    FROM @CumeDistDemo WHERE ColValue <= CDD.ColValue

    ) A

    ```


    Applying the simple formula, the following code delivers the percent rank:


    ```

    (RANK() OVER(

    ORDER BY ColValue

    ) - 1.0) / CONVERT(DECIMAL(10,2),(SELECT COUNT(*) AS SampleRowCount FROM @CumeDistDemo)
    - 1.0) AS MyPctRank

    ```


    Notice that we are using the `RANK()` function to calculate the ranking assignments
    (we will discuss it in the next chapter). If we sort the data being ranked, namely,
    the `ColValue` column in ascending order, as a trick, we could also use the `ROW_NUMBER()`
    function as shown in the following (we will also discuss this in the next chapter):


    ```

    ROW_NUMBER() OVER(

    ORDER BY ColValue

    ) AS RowNumberAsRank,

    ```


    One final alternative is to just use the column `RowCountLTE` as the rank:


    ```

    /* current value rank - 1 /sample total row count - 1 */

    FORMAT(

    (RowCountLTE - 1.0) /

    CONVERT(DECIMAL(10,2),(

    SELECT COUNT(*) AS SampleRowCount

    FROM @CumeDistDemo

    ) - 1.0),''P''

    ) AS MyPctRank

    ```


    Try to modify the code by using all versions of percentile rank so you can verify
    the results are the same and the formula works. Try it on your own before looking
    at the bonus script.


    Let’s look at the results. Please refer to Figure [3-5](#527021_1_En_3_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig5_HTML.jpg)


    A screenshot of the calculation versus S Q L server function dot s q l window.
    The top screen has some programming codes. The bottom screen has a results table.
    The table has 6 columns for Col 1, Col Value, My Rank, S Q L Rank, P C T Rank,
    and My P c t Rank.


    Figure 3-5


    Calculating percent rank with the SQL Server function and homegrown script


    Here are the sorted results. Both percent rank results match, and so do both the
    rank calculations used with the SQL Server function and the homegrown function.
    You can use the `FORMAT()` function to convert the results to percentages if you
    like, for example:


    ```

    FORMAT(

    PERCENT_RANK() OVER(

    ORDER BY ColValue

    ),''P''

    ) AS PCTRank,

    ```


    Just wrap the `PERCENT_RANK()` code block with parentheses, use the `FORMAT()`
    function, and include the `''P''` parameter before the last parenthesis. Very
    easy to use.


    Tip


    In my opinion, creating your own version of a function based on the formula is
    a great way to understand what the function does.


    Let’s try this function out on our sales data warehouse.


    Please refer to Listing [3-3](#527021_1_En_3_Chapter.xhtml#PC10).


    ```

    WITH CustSales (

    SalesYear,SalesQuarter,SalesMonth,CustomerNo,

    StoreNo,CalendarDate,SalesTotal

    )

    AS

    (

    SELECT YEAR(CalendarDate)        AS SalesYear

    ,DATEPART(qq,CalendarDate) AS SalesQuarter

    ,MONTH(CalendarDate)       AS SalesMonth

    ,ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,SUM(ST.TotalSalesAmount) AS SalesTotal

    FROM StagingTable.SalesTransaction ST

    GROUP BY ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    )

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,CUME_DIST() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS CumeDist

    ,PERCENT_RANK() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS PctRank

    FROM CustSales

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    Listing 3-3

    The PERCENT_RANK() Function in Action

    ```


    I do not think we need to go over the `CTE` again except to highlight that we
    are summing up sales by store. We could use the staging table we created for the
    prior example, but let’s work with the `CTE` again. Also, I included the `CUME_DIST()`
    function in the `SELECT` clause so we can compare the results between the two
    functions.


    The `OVER()` clause uses the same `ORDER BY` and `PARTITION BY` clauses. We want
    to sum up values by year, quarter, month, and customer. We are not using the store
    number column, so we need to apply the `SUM()` function across the year, quarter,
    month, and customer number columns. This means we need to use a `GROUP BY` clause.


    Once again, we use a `WHERE` clause to filter by years 2010 and 2011 and for a
    single customer (“C0000001”) in order to keep the result set small. Feel free
    to download the script and modify the `WHERE` clause once you are comfortable
    with how the query works so you load more years (make sure your laptop or desktop
    is powerful).


    Let’s check out the results. Please refer to the partial results in Figure [3-6](#527021_1_En_3_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig6_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a results table. The table has 7 columns for Sales
    Year, Sales Quarter, Customer Number, Monthly Sales Total, Cume Dist, and P c
    t Rank.


    Figure 3-6


    Query results for the test script


    I changed the query a bit by eliminating the `WHERE` clause filter and including
    an `ORDER BY` clause. This change resulted in 16,380 rows being returned once
    the query was executed.'
  trans: '## PERCENT_RANK() 函数


    接下来要介绍的是 `PERCENT_RANK()` 函数。它的作用是什么？


    这个函数使用来自查询、分区或表变量的数据集，计算每个值相对于整个数据集（以百分比形式）的相对排名。你需要将结果（返回值为浮点数）乘以 100.00，或者使用
    `FORMAT()` 函数将结果转换为百分比格式。


    此外，它的行为与 `CUME_DIST()` 函数非常相似；至少微软文档是这么说的。我们在本章开头讨论过这个函数，如果你忘记了，可以回头再看一下它的作用。


    你还会发现它在理论上也与 `RANK()` 函数非常相似。`RANK()` 函数返回值的位置，而 `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚才讨论的
    `CUME_DIST()` 函数一起使用，以便比较结果，并看看它对即将生成的查询计划有什么影响。


    但首先，让我们像之前那样，再看一个简单的例子，以便清晰地看到简单数据集生成的结果。


    我还会根据以下公式提供一个自定义的百分比排名计算版本：

    `(当前行值 - 1) / (数据集总行数 - 1)`


    很简单！我们将使用与 `CUME_DIST()` 函数相同的表变量数据。


    对于我们自定义的代码，我们需要模拟 `RANK()` 函数，该函数将在下一章介绍。为了将我们的自定义代码结果与 SQL Server 函数结果进行比较，我也在
    `SELECT` 子句中包含了 `RANK()` 函数。


    请参考清单 3-2。


    ```sql

    DECLARE @CumeDistDemo TABLE (

    Col1     VARCHAR(8),

    ColValue DECIMAL(10,2)

    );

    INSERT INTO @CumeDistDemo VALUES

    (''AAA'',1.0),

    (''BBB'',2.0),

    (''CCC'',3.0),

    (''DDD'',4.0),

    (''EEE'',5.0),

    (''FFF'',6.0),

    (''GGG'',7.0),

    (''HHH'',8.0),

    (''III'',9.0),

    (''JJJ'',10.0)

    SELECT Col1,ColValue,A.RowCountLTE AS MyRank,

    RANK() OVER(

    ORDER BY ColValue

    ) AS SQLRank,

    PERCENT_RANK() OVER(

    ORDER BY ColValue

    ) AS PCTRank,

    /* current value rank - 1 /data sample total row count - 1 */

    (RANK() OVER(

    ORDER BY ColValue

    ) - 1.0) / CONVERT(DECIMAL(10,2),(

    SELECT COUNT(*) AS SampleRowCount

    FROM @CumeDistDemo) - 1.0

    ) AS MyPctRank

    FROM @CumeDistDemo CDD

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLTE FROM @CumeDistDemo

    WHERE ColValue <= CDD.ColValue

    ) A

    GO

    ```

    清单 3-2 一个简单的百分比排名示例


    注意，我重新利用了 `@CumeDistDemo` 表变量（懒得重命名！）。


    和之前一样，数据值从 1.0 到 10.0 依次递增。这使得将值与排名结果关联起来变得容易。`FROM` 子句中使用了一个 `CROSS APPLY` 块，以便计算数据集中小于或等于当前行的总行数：

    ```sql

    CROSS APPLY (

    SELECT COUNT(*) AS RowCountLTE

    FROM @CumeDistDemo WHERE ColValue <= CDD.ColValue

    ) A

    ```


    应用简单公式，以下代码计算出百分比排名：

    ```sql

    (RANK() OVER(

    ORDER BY ColValue

    ) - 1.0) / CONVERT(DECIMAL(10,2),(SELECT COUNT(*) AS SampleRowCount FROM @CumeDistDemo)
    - 1.0) AS MyPctRank

    ```


    注意，我们正在使用 `RANK()` 函数来计算排名分配（我们将在下一章讨论它）。如果我们对被排名的数据（即 `ColValue` 列）进行升序排序，作为一个技巧，我们也可以使用
    `ROW_NUMBER()` 函数，如下所示（我们也将在下一章讨论这个）：

    ```sql

    ROW_NUMBER() OVER(

    ORDER BY ColValue

    ) AS RowNumberAsRank,

    ```


    最后一种替代方法是直接使用列 `RowCountLTE` 作为排名：

    ```sql

    /* current value rank - 1 /sample total row count - 1 */

    FORMAT(

    (RowCountLTE - 1.0) /

    CONVERT(DECIMAL(10,2),(

    SELECT COUNT(*) AS SampleRowCount

    FROM @CumeDistDemo

    ) - 1.0),''P''

    ) AS MyPctRank

    ```


    尝试修改代码，使用所有版本的百分比排名，以便验证结果是否相同以及公式是否有效。在查看附加脚本之前，请先自己尝试一下。


    让我们看看结果。请参考图 3-5。


    ![计算与 SQL Server 函数的 SQL 窗口对比截图。顶部屏幕有一些编程代码。底部屏幕有一个结果表。表中有 6 列：Col 1、Col Value、My
    Rank、SQL Rank、PCT Rank 和 My Pct Rank。](img/527021_1_En_3_Fig5_HTML.jpg)

    图 3-5 使用 SQL Server 函数和自定义脚本计算百分比排名


    以下是排序后的结果。两个百分比排名结果匹配，使用 SQL Server 函数和自定义函数计算的排名结果也匹配。如果你愿意，可以使用 `FORMAT()` 函数将结果转换为百分比，例如：

    ```sql

    FORMAT(

    PERCENT_RANK() OVER(

    ORDER BY ColValue

    ),''P''

    ) AS PCTRank,

    ```


    只需用括号包裹 `PERCENT_RANK()` 代码块，使用 `FORMAT()` 函数，并在最后一个括号前包含 `''P''` 参数。非常容易使用。


    > **提示**

    > 在我看来，基于公式创建自己的函数版本是理解函数作用的好方法。


    让我们在我们的销售数据仓库上试试这个函数。


    请参考清单 3-3。


    ```sql

    WITH CustSales (

    SalesYear,SalesQuarter,SalesMonth,CustomerNo,

    StoreNo,CalendarDate,SalesTotal

    )

    AS

    (

    SELECT YEAR(CalendarDate)        AS SalesYear

    ,DATEPART(qq,CalendarDate) AS SalesQuarter

    ,MONTH(CalendarDate)       AS SalesMonth

    ,ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,SUM(ST.TotalSalesAmount) AS SalesTotal

    FROM StagingTable.SalesTransaction ST

    GROUP BY ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    )

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,CUME_DIST() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS CumeDist

    ,PERCENT_RANK() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS PctRank

    FROM CustSales

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    ```

    清单 3-3 实际应用中的 `PERCENT_RANK()` 函数


    我认为我们不需要再回顾 `CTE` 了，除了强调我们正在按商店汇总销售额。我们可以使用为之前示例创建的暂存表，但让我们再次使用 `CTE`。另外，我在 `SELECT`
    子句中包含了 `CUME_DIST()` 函数，以便我们可以比较两个函数之间的结果。


    `OVER()` 子句使用了相同的 `ORDER BY` 和 `PARTITION BY` 子句。我们希望按年、季度、月和客户汇总值。我们没有使用商店编号列，因此需要跨年、季度、月和客户编号列应用
    `SUM()` 函数。这意味着我们需要使用 `GROUP BY` 子句。


    我们再次使用 `WHERE` 子句来过滤 2010 年和 2011 年，并针对单个客户（“C0000001”），以保持结果集较小。一旦你熟悉了查询的工作原理，请随时下载脚本并修改
    `WHERE` 子句，以便加载更多年份（确保你的笔记本电脑或台式机性能足够）。


    让我们看看结果。请参考图 3-6 中的部分结果。


    ![第 03 章 T S Q L 代码窗口的截图。顶部屏幕有一些编程代码。底部屏幕有一个结果表。表中有 7 列：Sales Year、Sales Quarter、Customer
    Number、Monthly Sales Total、Cume Dist 和 Pct Rank。](img/527021_1_En_3_Fig6_HTML.png)

    图 3-6 测试脚本的查询结果


    我对查询做了一些更改，消除了 `WHERE` 子句过滤器，并包含了一个 `ORDER BY` 子句。这个更改导致查询执行后返回了 16,380 行数据。'
- fmt: 'Lastly, there is a bonus query after this example in the script that uses
    the homegrown version of the percent rank logic and compares it to the SQL Server
    function using the formula we discussed.


    The performance was still under one second. Let’s see what the estimated query
    plan and statistics look like next.


    ### Performance Considerations


    Let’s run an estimated query plan and execute the query so it generates `IO` and
    `TIME` statistics. Once again, no new index was suggested, so the index we created
    earlier seems to be utilized.


    Please refer to Figure 3-7 for the estimated query plan.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig7_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Sort Cost, 15%. Sort Cost,
    47%. Index Seek Cost, 17%.


    Figure 3-7


    Estimated execution plan results


    Working from right to left, we encounter an index seek at a cost of 17% and a
    sort task at a cost of 47%. The only other expensive step is a second sort task
    at 15%. The remaining tasks are either low value or zero, so we ignore them. Usually,
    in a real production environment, you want to at least be aware of them but mainly
    focus on the expensive steps to determine if you eliminate them or at least reduce
    the cost.


    Sometimes creating indexes based on the columns of the dimensions might help.
    Check out the sort steps and see if an index based on the columns referenced in
    the sort steps is needed.


    There does not seem much we can do for now, so let’s look at the performance statistics
    to see what they tell us.


    Please refer to Table 3-2.


    Table 3-2


    Performance Analysis


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 |   |

    | Elapsed time (ms) | 37 |   |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 26 |   |

    | Logical reads | 196 |   |

    | Physical reads | 0 |   |

    | Read-ahead reads | 0 |   |

    | **Statistics (SalesTransaction)** | **Existing Index** | **New Index** |

    | Scan count | 1 |   |

    | Logical reads | 17 |   |

    | Physical reads | 1 |   |

    | Read-ahead reads | 14 |   |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 0 |   |

    | Elapsed time (ms) | 30 |   |


    The scan count step was high on the work table at 26. The logical read statistic
    also seems a bit high for both the work table and the `SalesTransaction` table,
    at 196 and 17, respectively. Lastly, the `SalesTransaction` table has a read-ahead
    at 14. Looks like some improvement might be called for. Let’s look at the client
    statistics next.


    Please refer to Figure 3-8.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig8_HTML.jpg)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a results table, messages, and client statistics.
    The columns of client processing time, total execution time, and wait time on
    server replies are highlighted.


    Figure 3-8


    Client statistics analysis


    Let’s just look at the time statistics at the bottom. The others are important
    also, but these tell us some performance stats we need to know. Client processing
    time was 11, total execution time was a bit high at 103, and wait time on server
    replies was at 92.


    Sometimes creating indexes is not enough. Other solutions could include modifying
    the query, utilizing temporary or report tables, or even creating memory-optimized
    tables. This last option loads all table rows to memory if you have enough, that
    is. We will discuss this next.


    ### High-Performance Strategy


    In this section we create a memory-optimized table and load it with the base data
    (this replaces the `CTE` query in the prior query). This strategy assumes that
    the table is loaded nightly once a day and the users query the memory-optimized
    table the next day.


    This strategy also replaces the strategy of the staging or report table we discussed
    earlier as we are assuming tables that exist in memory will give faster performance
    than tables that exist on physical disk. Granted, if one runs out of memory, SQL
    Server will have to access data on physical disk anyway. That is why the steps
    to create a memory-optimized table include creating a dedicated file group and
    a physical file (or two).


    The following are the steps to take to create a memory-optimized table.


    Step 1: Check the compatibility level.


    First things first. Make sure your computer or laptop supports a memory-optimized
    table by checking the compatibility level of SQL Server by running the simple
    query in Listing 3-4.


    ```sql

    SELECT d.compatibility_level

    FROM sys.databases as d

    WHERE d.name = Db_Name();

    GO

    ```


    Listing 3-4

    Check the Compatibility Level


    You should be at level 130 or greater. If you are, we need to set a system parameter.
    If not, read this section anyway so you know what it is all about!


    Step 2: Set parameter `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT` to `ON`.


    Please see Listing 3-5.


    ```sql

    ALTER DATABASE [APSAles]

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;

    GO

    ```


    Listing 3-5

    Set Memory Optimized Elevate to Snapshot


    Step 3: Next, add a dedicated file group for memory-optimized data by running
    the following command.


    Please see Listing 3-6.


    ```sql

    ALTER DATABASE APSales

    ADD FILEGROUP APSalesMemOptimized CONTAINS MEMORY_OPTIMIZED_DATA;

    GO

    ```


    Listing 3-6

    Add a File Group for Memory-Optimized Data


    Notice that a directive needs to be included that specifies the file group will
    contain memory-optimized data.


    Step 4: Create a dedicated file for memory-optimized tables.


    Next, we add a file to the file group in the usual manner. Please see Listing
    3-7.


    ```sql

    ALTER DATABASE APSales

    ADD FILE (

    name=''APSalesMemoOptData'',

    filename=N''D:\APRESS_DATABASES\AP_SALES\MEMORYOPT\AP_SALES_MEMOPT.mdf''

    )

    TO FILEGROUP APSAlesMemOptimized

    GO

    ```


    Listing 3-7

    Add a File to the File Group


    Step 5: Create the memory-optimized table.


    Next, we create a table in the usual manner but need to add a bit of code that
    defines it as a memory-optimized table. Please see Listing 3-8.


    ```sql

    CREATE TABLE [SalesReports].[MemorySalesTotals](

    [SalesTotalKey] INTEGER NOT NULL IDENTITY PRIMARY KEY NONCLUSTERED,

    [SalesYear]    [int] NOT NULL,

    [SalesQuarter] [int] NOT NULL,

    [SalesMonth]   [int] NOT NULL,

    [CustomerNo]   [nvarchar](32)   NOT NULL,

    [StoreNo]      [nvarchar](32)   NULL,

    [CalendarDate] [date]           NOT NULL,

    [SalesTotal]   [decimal](21, 2) NULL

    )

    WITH (

    MEMORY_OPTIMIZED = ON,

    DURABILITY = SCHEMA_AND_DATA

    );

    GO

    ```


    Listing 3-8

    Create a Memory-Optimized Table


    We need to make sure to identify a primary key and set two parameters at the end
    of the `CREATE TABLE` command:


    ```sql

    MEMORY_OPTIMIZED = ON,

    DURABILITY = SCHEMA_AND_DATA

    ```


    Step 6: Check that it was created.


    Next, we need to query two system tables to make sure the table is registered
    as a memory-optimized table. Please see Listing 3-9.


    ```sql

    SELECT g.name, g.type_desc, f.physical_name

    FROM sys.filegroups g JOIN sys.database_files f ON g.data_space_id = f.data_space_id

    WHERE g.type = ''FX'' AND f.type = 2

    GO

    ```


    Listing 3-9

    Check the Filegroups and Database_files Tables


    The `sys.filegroups` and `sys.database_files` tables have a lot of interesting
    columns, and I suggest you check them out. For our little discussion, I will only
    list the basic columns to save space.'
