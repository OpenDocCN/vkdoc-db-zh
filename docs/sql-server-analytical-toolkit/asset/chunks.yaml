    这正是我们将要尝试的。请参阅代码清单 6-3。


    ```sql

    TRUNCATE TABLE Financial.DailyPortfolioAnalysis

    GO

    INSERT INTO Financial.DailyPortfolioAnalysis

    SELECT Year AS TradeYear

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    FROM Financial.Portfolio

    GROUP BY CustId,Year,PortfolioNo

    ,Portfolio

    ORDER BY Portfolio ASC,Year ASC, SUM(Value) DESC

    GO

    SELECT TradeYear,

    CustId,

    PortfolioNo,

    Portfolio,

    YearlyValue,

    RANK() OVER(

    PARTITION BY Portfolio,TradeYear

    ORDER BY YearlyValue DESC

    ) AS PortfolioRankByYear

    FROM Financial.DailyPortfolioAnalysis

    WHERE TradeYear > 2011

    GO

    ```


    **代码清单 6-3** 加载投资组合扫描表


    假设 `INSERT` 命令每天运行一次，那么分析师只需要对加载的报告表执行查询。我们看到该查询本质上是历史性的，因此每次运行查询时重新生成整个历史数据集是没有意义的。


    如果我们现在为每个版本的查询运行估计的查询计划，我们会看到以下结果。请参阅图 6-7。


    ![](img/527021_1_En_6_Fig7_HTML.png)


    一个名为“金融查询排名”的 SQL 应用程序的截图。在顶部和底部的两个选项卡中，都有一个表格用于查找选择、序列项目、2 个段、排序、哈希匹配和索引的查询成本。哈希匹配成本为
    52%。75% 和 25% 的成本分别用于排序和表扫描。


    **图 6-7** 查询计划对比


    注意，昂贵的表哈希匹配任务消失了。我们确实看到了一个成本为 25% 的表扫描任务，但这是一个小表，只有 120 行，因此不需要索引。排序很昂贵，占 75%，但看看表扫描和排序步骤之间的连线。它们非常细，如果你点击它们，你会看到有
    120 行被传递进行排序。


    > **注意**

    > 运行实时查询性能计划将显示任务之间传递的行数以及每个任务完成所需的时间。在查询运行时，按下带绿色对勾的按钮将生成实时计划。


    在第一个版本的估计执行计划中，索引扫描向哈希匹配任务传递了 43,830 行，而该任务向排序任务传递了 600 行。看起来这个策略奏效了！


    让我们比较一下 `IO` 和 `TIME` 统计信息。请参阅图 6-8。


    ![](img/527021_1_En_6_Fig8_HTML.png)'
- fmt: "A screenshot of `SQL` application. It represents the program to find `IO`\
    \ and time statistics. It also represents elapsed times such as 84, 145, 45, and\
    \ 27 milliseconds.\n\n**Figure 6-8**  \n`IO` and `TIME` statistics\n\nLet’s start\
    \ by comparing parse and execution times:\n\nFor `SQL Server` parse and compile\
    \ times, the `CTE` query had 84 ms elapsed time vs. 45 ms for the report table\
    \ strategy.\n\nFor `SQL Server` execution times, the `CTE` query had 145 ms elapsed\
    \ time vs. 27 ms for the report table strategy.\n\nLet’s look at the `IO` statistics.\
    \ Please refer to Table 6-1.\n\n**Table 6-1**  \nComparing `IO` Statistics\n\n\
    | Step | CTE Query | Report Query |\n| --- | --- | --- |\n| Scan count | 1 | 1\
    \ |\n| Logical reads | 418 | 2 |\n| Physical reads | 3 | 1 |\n| Read-ahead reads\
    \ | 428 | 0 |\n\nThe results speak for themselves. Significant improvement for\
    \ all statistics. What about profile statistics?\n\nPlease refer to Figure 6-9.\n\
    \n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig9_HTML.png)\n\nA screenshot\
    \ of `SQL` application. It represents a program with a table with 7 rows and 6\
    \ rows at the top and bottom. It compares defined values, estimated rows of `IO`,\
    \ `CPU`, average row size, and total subtree cost of both tables.\n\n**Figure\
    \ 6-9**  \nComparing profile statistics\n\nThe profile statistics also speak for\
    \ themselves. First, look at the number of rows passed between each step of the\
    \ plans. The improved performance strategy has to work with fewer rows. If we\
    \ examine the `EstimateIO`, `EstimateCPU`, and `TotalSubTreeCost`, we see significant\
    \ improvements in the report table strategy. What are the takeaways?\n\nThe first\
    \ takeaway is that understanding business requirements is important not only in\
    \ delivering the report the analyst wants, but it may also provide hints on how\
    \ we can improve performance. In our case we ended up creating the report table,\
    \ which is loaded once a day, and making our base report query more efficient\
    \ and faster.\n\nWho would have thought?\n\nOne last point: Make sure the query\
    \ results are equal. Might be a problem if a solution is faster but the results\
    \ are wrong! Please refer to Figure 6-10.\n\n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig10_HTML.png)\n\
    \nA screenshot of `SQL` application. It represents programs and compares query\
    \ results on both tabs, left and right. It compares the first 5 rows of each table\
    \ with the column headers portfolio, yearly value, and portfolio rank by year.\n\
    \n**Figure 6-10**  \nComparing query results\n\nLooks good! But look at the time\
    \ parameter on the lower right-hand side. Our new and improved strategy took four\
    \ seconds to run. When we see this, we should run the tests a couple of times\
    \ and make sure we execute the `DBCC` command each time we run the queries – once\
    \ per query. If the original query seems to run faster, then maybe we should drop\
    \ the new and improved strategy!\n\nLet’s turn our attention back to analyzing\
    \ portfolios!\n\n#### Example 2\n\nThis time we look at the `FX` (foreign exchange)\
    \ portfolio positions. We will look at the year 2012 and monthly positions for\
    \ customer `C0000001` again.\n\nPlease refer to Listing 6-4.\n\n```sql\nSELECT\
    \ Year       AS TradeYear\n,Month      AS Trademonth\n,CustId\n,PortfolioNo\n\
    ,Portfolio\n,SUM(Value) AS YearlyValue\nFROM Financial.Portfolio\nWHERE Portfolio\
    \ = 'FX - FINANCIAL PORTFOLIO'\nAND CustId = 'C0000001'\nAND Year = 2012\nGROUP\
    \ BY CustId,Year,Month,PortfolioNo\n,Portfolio\nORDER BY Month\nGO\n```\n**Listing\
    \ 6-4**  \n`FX` Account Deep-Dive Analysis\n\nThis is a straightforward query.\
    \ The `SUM()` aggregate function is used to report the monthly positions. We want\
    \ to see how things stand. Is the portfolio performing well, or is it losing money?\
    \ Let’s see the results.\n\nPlease refer to Figure 6-11.\n\n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig11_HTML.jpg)\n\
    \nA screenshot of `SQL` application titled Ranking Financial Quarries. It presents\
    \ a program and a list with 12 rows and 6 columns. The column headers are trade\
    \ year, trade month, customer i d, portfolio number, portfolio, and yearly value.\n\
    \n**Figure 6-11**  \nMonthly `FX` positions for 2012\n\nSeems like a very volatile\
    \ trading pattern. Lots of buys and sells. A graph will give us a better visual\
    \ indicator of what is going on. Please refer to Figure 6-12.\n\n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig12_HTML.png)\n\
    \nA screenshot of an Excel sheet. It presents a list with 3 columns, month, value,\
    \ and rank of 12 months on the left. On the right, there is a bar graph of balance\
    \ versus month of monthly cash balances.\n\n**Figure 6-12**  \n2012 monthly `FX`\
    \ positions and trends\n\nLooking at this graph, we see there are more decreases\
    \ than increases. This means the customer is selling off foreign currency. Is\
    \ this because there are profits to be made or the instrument is performing so\
    \ badly the customer is selling off?\n\nWe need to compare performance across\
    \ all portfolios to get an idea of what is going on. Sometimes trading strategies\
    \ involve selling one instrument to purchase another. Let’s put all this data\
    \ into a `Microsoft Excel` pivot table so we can really do some analysis.\n\n\
    Please refer to the query in Listing 6-5.\n\n```sql\nSELECT [Year] AS TradeYear\n\
    ,CASE\nWHEN [Month] = 1 THEN 'Jan'\nWHEN [Month] = 2 THEN 'Feb'\nWHEN [Month]\
    \ = 3 THEN 'Mar'\nWHEN [Month] = 4 THEN 'Apr'\nWHEN [Month] = 5 THEN 'May'\nWHEN\
    \ [Month] = 6 THEN 'Jun'\nWHEN [Month] = 7 THEN 'Jul'\nWHEN [Month] = 8 THEN 'Aug'\n\
    WHEN [Month] = 9 THEN 'Sep'\nWHEN [Month] = 10 THEN 'Oct'\nWHEN [Month] = 11 THEN\
    \ 'Nov'\nWHEN [Month] = 12 THEN 'Dec'\nEND AS Trademonth\n,CustId\n,PortfolioNo\n\
    ,Portfolio\n,SUM(Value) AS [MonthTotal]\nFROM Financial.Portfolio\nWHERE CustId\
    \ = 'C0000001'\nAND Year = 2012\nGROUP BY Year,Month,Custid,PortfolioNo,Portfolio\n\
    ORDER BY Custid,Year,Month,PortfolioNo,Portfolio\nGO\n```\n**Listing 6-5**  \n\
    2012 Portfolio Value Pivot Table Query\n\nLet’s run the query and copy and paste\
    \ the results to a `Microsoft Excel` spreadsheet and create a pivot table. This\
    \ way we can perform some slicing and dicing to look at the various trading patterns.\
    \ Please refer to Figure 6-13.\n\n![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig13_HTML.png)\n\
    \nA screenshot of an Excel sheet. It presents a horizontal bar graph for the sum\
    \ of balance by portfolio. On the right, there are pivot chart fields, that include\
    \ checked month, portfolio, and balance options.\n\n**Figure 6-13**  \n2012 portfolio\
    \ value pivot table"
  raw: 'A screenshot of S Q L application. It represents the program to find I O and
    time statistics. It also represents elapsed times such as 84, 145, 45, and 27
    milliseconds.


    Figure 6-8


    IO and TIME statistics


    Let’s start by comparing parse and execution times:


    For SQL Server parse and compile times, the `CTE` query had 84 ms elapsed time
    vs. 45 ms for the report table strategy.


    For SQL Server execution times, the `CTE` query had 145 ms elapsed time vs. 27
    ms for the report table strategy.


    Let’s look at the `IO` statistics. Please refer to Table [6-1](#527021_1_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Comparing IO Statistics


    | Step | CTE Query | Report Query |

    | --- | --- | --- |

    | Scan count | 1 | 1 |

    | Logical reads | 418 | 2 |

    | Physical reads | 3 | 1 |

    | Read-ahead reads | 428 | 0 |


    The results speak for themselves. Significant improvement for all statistics.
    What about profile statistics?


    Please refer to Figure [6-9](#527021_1_En_6_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig9_HTML.png)


    A screenshot of S Q L application. It represents a program with a table with 7
    rows and 6 rows at the top and bottom. It compares defined values, estimated rows
    of I O, C P U, average row size, and total subtree cost of both tables.


    Figure 6-9


    Comparing profile statistics


    The profile statistics also speak for themselves. First, look at the number of
    rows passed between each step of the plans. The improved performance strategy
    has to work with fewer rows. If we examine the `EstimateIO`, `EstimateCPU`, and
    `TotalSubTreeCost`, we see significant improvements in the report table strategy.
    What are the takeaways?


    The first takeaway is that understanding business requirements is important not
    only in delivering the report the analyst wants, but it may also provide hints
    on how we can improve performance. In our case we ended up creating the report
    table, which is loaded once a day, and making our base report query more efficient
    and faster.


    Who would have thought?


    One last point: Make sure the query results are equal. Might be a problem if a
    solution is faster but the results are wrong! Please refer to Figure [6-10](#527021_1_En_6_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig10_HTML.png)


    A screenshot of S Q L application. It represents programs and compares query results
    on both tabs, left and right. It compares the first 5 rows of each table with
    the column headers portfolio, yearly value, and portfolio rank by year.


    Figure 6-10


    Comparing query results


    Looks good! But look at the time parameter on the lower right-hand side. Our new
    and improved strategy took four seconds to run. When we see this, we should run
    the tests a couple of times and make sure we execute the `DBCC` command each time
    we run the queries – once per query. If the original query seems to run faster,
    then maybe we should drop the new and improved strategy!


    Let’s turn our attention back to analyzing portfolios!


    #### Example 2


    This time we look at the FX (foreign exchange) portfolio positions. We will look
    at the year 2012 and monthly positions for customer C0000001 again.


    Please refer to Listing [6-4](#527021_1_En_6_Chapter.xhtml#PC4).


    ```

    SELECT Year       AS TradeYear

    ,Month      AS Trademonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    FROM Financial.Portfolio

    WHERE Portfolio = ''FX - FINANCIAL PORTFOLIO''

    AND CustId = ''C0000001''

    AND Year = 2012

    GROUP BY CustId,Year,Month,PortfolioNo

    ,Portfolio

    ORDER BY Month

    GO

    Listing 6-4

    FX Account Deep-Dive Analysis

    ```


    This is a straightforward query. The `SUM()` aggregate function is used to report
    the monthly positions. We want to see how things stand. Is the portfolio performing
    well, or is it losing money? Let’s see the results.


    Please refer to Figure [6-11](#527021_1_En_6_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig11_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and a list with 12 rows and 6 columns. The column headers are trade
    year, trade month, customer i d, portfolio number, portfolio, and yearly value.


    Figure 6-11


    Monthly FX positions for 2012


    Seems like a very volatile trading pattern. Lots of buys and sells. A graph will
    give us a better visual indicator of what is going on. Please refer to Figure
    [6-12](#527021_1_En_6_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig12_HTML.png)


    A screenshot of an Excel sheet. It presents a list with 3 columns, month, value,
    and rank of 12 months on the left. On the right, there is a bar graph of balance
    versus month of monthly cash balances.


    Figure 6-12


    2012 monthly FX positions and trends


    Looking at this graph, we see there are more decreases than increases. This means
    the customer is selling off foreign currency. Is this because there are profits
    to be made or the instrument is performing so badly the customer is selling off?


    We need to compare performance across all portfolios to get an idea of what is
    going on. Sometimes trading strategies involve selling one instrument to purchase
    another. Let’s put all this data into a Microsoft Excel pivot table so we can
    really do some analysis.


    Please refer to the query in Listing [6-5](#527021_1_En_6_Chapter.xhtml#PC5).


    ```

    SELECT [Year] AS TradeYear

    ,CASE

    WHEN [Month] = 1 THEN ''Jan''

    WHEN [Month] = 2 THEN ''Feb''

    WHEN [Month] = 3 THEN ''Mar''

    WHEN [Month] = 4 THEN ''Apr''

    WHEN [Month] = 5 THEN ''May''

    WHEN [Month] = 6 THEN ''Jun''

    WHEN [Month] = 7 THEN ''Jul''

    WHEN [Month] = 8 THEN ''Aug''

    WHEN [Month] = 9 THEN ''Sep''

    WHEN [Month] = 10 THEN ''Oct''

    WHEN [Month] = 11 THEN ''Nov''

    WHEN [Month] = 12 THEN ''Dec''

    END AS Trademonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS [MonthTotal]

    FROM Financial.Portfolio

    WHERE CustId = ''C0000001''

    AND Year = 2012

    GROUP BY Year,Month,Custid,PortfolioNo,Portfolio

    ORDER BY Custid,Year,Month,PortfolioNo,Portfolio

    GO

    Listing 6-5

    2012 Portfolio Value Pivot Table Query

    ```


    Let’s run the query and copy and paste the results to a Microsoft Excel spreadsheet
    and create a pivot table. This way we can perform some slicing and dicing to look
    at the various trading patterns. Please refer to Figure [6-13](#527021_1_En_6_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig13_HTML.png)


    A screenshot of an Excel sheet. It presents a horizontal bar graph for the sum
    of balance by portfolio. On the right, there are pivot chart fields, that include
    checked month, portfolio, and balance options.


    Figure 6-13


    2012 portfolio value pivot table'
  trans: "\n一张 `SQL` 应用程序的截图。它展示了一个用于查找 `IO` 和时间统计信息的程序。它还展示了诸如 84、145、45 和 27 毫秒等耗时。\n\
    \n**图 6-8**  \n`IO` 和 `TIME` 统计信息\n\n让我们从比较解析和执行时间开始：\n\n对于 `SQL Server` 的解析和编译时间，`CTE`\
    \ 查询的耗时为 84 毫秒，而报告表策略为 45 毫秒。\n\n对于 `SQL Server` 的执行时间，`CTE` 查询的耗时为 145 毫秒，而报告表策略为\
    \ 27 毫秒。\n\n接下来看看 `IO` 统计信息。请参考表 6-1。\n\n**表 6-1**  \n`IO` 统计信息比较\n\n| 步骤 | CTE\
    \ 查询 | 报告查询 |\n| --- | --- | --- |\n| 扫描计数 | 1 | 1 |\n| 逻辑读取 | 418 | 2 |\n| 物理读取\
    \ | 3 | 1 |\n| 预读读取 | 428 | 0 |\n\n结果不言自明。所有统计指标均有显著改善。那么概况统计信息呢？\n\n请参考图 6-9。\n\
    \n![](img/527021_1_En_6_Fig9_HTML.png)\n\n一张 `SQL` 应用程序的截图。它展示了一个程序，其中有一个表格，顶部有\
    \ 7 行，底部有 6 行。它比较了两张表的定义值、`IO` 的估计行数、`CPU`、平均行大小以及子树总成本。\n\n**图 6-9**  \n概况统计信息比较\n\
    \n概况统计信息同样说明了问题。首先，查看计划各步骤之间传递的行数。改进后的性能策略需要处理的行数更少。如果我们检查 `EstimateIO`、`EstimateCPU`\
    \ 和 `TotalSubTreeCost`，会发现报告表策略有显著的改进。关键要点是什么？\n\n第一个要点是，理解业务需求不仅对于交付分析师想要的报告很重要，它还可能为我们如何改进性能提供线索。在我们的案例中，我们最终创建了报告表（每天加载一次），并使我们的基础报告查询更高效、更快速。\n\
    \n谁能想到呢？\n\n最后一点：确保查询结果是相等的。如果一个解决方案更快但结果错误，那可能就有问题了！请参考图 6-10。\n\n![](img/527021_1_En_6_Fig10_HTML.png)\n\
    \n一张 `SQL` 应用程序的截图。它展示了程序，并在左右两个选项卡上比较查询结果。它将每个表的前 5 行与列标题（portfolio, yearly value,\
    \ and portfolio rank by year）进行比较。\n\n**图 6-10**  \n查询结果比较\n\n看起来不错！但请看右下角的时间参数。我们新的改进策略运行花了四秒钟。看到这个，我们应该运行几次测试，并确保每次运行查询时都执行\
    \ `DBCC` 命令——每个查询执行一次。如果原始查询似乎运行得更快，那么我们也许应该放弃新的改进策略！\n\n让我们把注意力转回到分析投资组合上！\n\n\
    #### 示例 2\n\n这次我们来看 `FX`（外汇）投资组合头寸。我们将再次查看客户 `C0000001` 在 2012 年的月度头寸。\n\n请参考代码清单\
    \ 6-4。\n\n```sql\nSELECT Year       AS TradeYear\n,Month      AS Trademonth\n\
    ,CustId\n,PortfolioNo\n,Portfolio\n,SUM(Value) AS YearlyValue\nFROM Financial.Portfolio\n\
    WHERE Portfolio = 'FX - FINANCIAL PORTFOLIO'\nAND CustId = 'C0000001'\nAND Year\
    \ = 2012\nGROUP BY CustId,Year,Month,PortfolioNo\n,Portfolio\nORDER BY Month\n\
    GO\n```\n**代码清单 6-4**  \n`FX` 账户深入分析\n\n这是一个直接的查询。`SUM()` 聚合函数用于报告月度头寸。我们想了解当前状况。投资组合表现良好还是正在亏损？让我们看看结果。\n\
    \n请参考图 6-11。\n\n![](img/527021_1_En_6_Fig11_HTML.jpg)\n\n一张题为“金融查询排名”的 `SQL` 应用程序截图。它展示了一个程序和一个包含\
    \ 12 行 6 列的列表。列标题分别是交易年份、交易月份、客户 ID、投资组合编号、投资组合和年度价值。\n\n**图 6-11**  \n2012 年月度\
    \ `FX` 头寸\n\n看起来交易模式波动很大。有很多买入和卖出。图表将为我们提供一个更好的视觉指示器来了解情况。请参考图 6-12。\n\n![](img/527021_1_En_6_Fig12_HTML.png)\n\
    \n一张 Excel 表格的截图。左侧是一个包含 3 列（月份、价值和排名）和 12 个月的列表。右侧是一个按月份显示月度现金余额的余额条形图。\n\n**图\
    \ 6-12**  \n2012 年月度 `FX` 头寸及趋势\n\n查看此图表，我们发现下降次数多于上升次数。这意味着客户正在抛售外币。这是因为他们有利可图，还是因为该金融工具表现太差，客户正在抛售？\n\
    \n我们需要比较所有投资组合的表现，以了解情况。有时交易策略涉及卖出一种金融工具以购买另一种。让我们将这些数据全部放入一个 `Microsoft Excel`\
    \ 数据透视表中，以便我们进行一些真正的分析。\n\n请参考代码清单 6-5 中的查询。\n\n```sql\nSELECT [Year] AS TradeYear\n\
    ,CASE\nWHEN [Month] = 1 THEN 'Jan'\nWHEN [Month] = 2 THEN 'Feb'\nWHEN [Month]\
    \ = 3 THEN 'Mar'\nWHEN [Month] = 4 THEN 'Apr'\nWHEN [Month] = 5 THEN 'May'\nWHEN\
    \ [Month] = 6 THEN 'Jun'\nWHEN [Month] = 7 THEN 'Jul'\nWHEN [Month] = 8 THEN 'Aug'\n\
    WHEN [Month] = 9 THEN 'Sep'\nWHEN [Month] = 10 THEN 'Oct'\nWHEN [Month] = 11 THEN\
    \ 'Nov'\nWHEN [Month] = 12 THEN 'Dec'\nEND AS Trademonth\n,CustId\n,PortfolioNo\n\
    ,Portfolio\n,SUM(Value) AS [MonthTotal]\nFROM Financial.Portfolio\nWHERE CustId\
    \ = 'C0000001'\nAND Year = 2012\nGROUP BY Year,Month,Custid,PortfolioNo,Portfolio\n\
    ORDER BY Custid,Year,Month,PortfolioNo,Portfolio\nGO\n```\n**代码清单 6-5**  \n2012\
    \ 年投资组合价值数据透视表查询\n\n让我们运行查询，并将结果复制粘贴到 `Microsoft Excel` 电子表格中，然后创建一个数据透视表。这样我们就可以进行一些切片和切块操作，以查看各种交易模式。请参考图\
    \ 6-13。\n\n![](img/527021_1_En_6_Fig13_HTML.png)\n\n一张 Excel 表格的截图。它展示了按投资组合的余额总和的水平条形图。右侧是数据透视图字段，包括已勾选的月份、投资组合和余额选项。\n\
    \n**图 6-13**  \n2012 年投资组合价值数据透视表\n"
- fmt: 'We now can perform a deep dive into the transaction details to see what is
    going on, on a daily basis. This usually gets us to the root cause of any questionable
    trading patterns that lead to losses. Keep in mind that what we are looking at
    is the totals of buy and sell transactions by month, not the rolling totals as
    the months go by. These would give us a true picture of portfolio performance
    and what is left in the portfolio each month after all the trades have been summed
    up. Let’s check out the query. Try to download the code prior to each chapter
    and follow along.


    Please refer to `Listing 6-6`.


    ```sql

    SELECT MONTH(T.[TransDate]) AS TransMonth

    ,CASE

    WHEN MONTH(T.[TransDate]) = 1 THEN ''Jan''

    WHEN MONTH(T.[TransDate]) = 2 THEN ''Feb''

    WHEN MONTH(T.[TransDate]) = 3 THEN ''Mar''

    WHEN MONTH(T.[TransDate]) = 4 THEN ''Apr''

    WHEN MONTH(T.[TransDate]) = 5 THEN ''May''

    WHEN MONTH(T.[TransDate]) = 6 THEN ''Jun''

    WHEN MONTH(T.[TransDate]) = 7 THEN ''Jul''

    WHEN MONTH(T.[TransDate]) = 8 THEN ''Aug''

    WHEN MONTH(T.[TransDate]) = 9 THEN ''Sep''

    WHEN MONTH(T.[TransDate]) = 10 THEN ''Oct''

    WHEN MONTH(T.[TransDate]) = 11 THEN ''Nov''

    WHEN MONTH(T.[TransDate]) = 12 THEN ''Dec''

    END AS Trademonth

    ,T.[TransDate]

    ,T.[Symbol]

    ,T.[Price]

    ,T.[Quantity]

    ,T.[TransAmount]

    ,T.[CustId]

    ,T.[PortfolioNo]

    ,PAT.PortfolioAccountTypeCode

    ,PAT.PortfolioAccountTypeName

    ,T.[AcctNo]

    ,T.[BuySell]

    FROM [APFinance].[Financial].[Transaction] T

    JOIN [MasterData].[PortfolioAccountType] PAT

    ON T.PortfolioAccountTypeCode = PAT.PortfolioAccountTypeCode

    WHERE YEAR(T.TransDate) = 2012

    AND T.CustId = ''C0000001''

    GO

    ```


    **Listing 6-6** Detailed Transaction Analysis


    This query gives us a detailed view of the transaction level for all instruments
    and buy/sell categories. A `CASE` block prints out the month abbreviations for
    a more meaningful report. We use the Portfolio Account Type table (alias = `PAT`)
    and pull out the unique portfolio code and name for the client.


    ### Let’s look at some of the transaction details.

    Please refer to `Figure 6-14`.


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig14_HTML.png)

    *A screenshot of S Q L application titled Ranking Financial Quarries. It presents
    a program and a list with 11 rows and 22 columns. The column headers are such
    as trans month, trade month, trans date, symbol, price, and quantity. An arrow
    points to 99035 rows.*


    **Figure 6-14** Transaction details for customer `C0000001`


    This gives us a lot of information like transaction dates, price and quantity
    of each trade, the symbol, and whether the transaction was a buy, sell, deposit,
    or withdrawal (in case of cash accounts like checking, savings, or money market
    accounts). This level of detail allows the analyst to understand trading patterns
    at a daily level.


    ### Let’s generate another pivot table with Microsoft Excel, this time at the
    transaction level.

    Please refer to `Figure 6-15`.


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig15_HTML.png)

    *A screenshot of an Excel sheet. It represents 3 rows of symbol, portfolio number,
    and a portfolio account type code, with a table at the bottom. This table has
    2 columns, row levels, and the sum of the transaction amount. On the right, there
    is a pivottable Fields along with different options.*


    **Figure 6-15** Transaction detail pivot table


    The prior report was valuable because it gave us a lot of detail, but to be honest,
    it was hard to navigate through all the data. Taking the results and generating
    a pivot table with Microsoft Excel allows the analyst to slice and dice the data
    and switch around portfolios, ticker symbols, months, and even customers.


    Here we see values not only for the month of January plus also values at the lowest
    granularity, the day level, for the ticker symbol `GPOR` (Gulfport Energy) and
    the totals for buy and sell transaction amounts. Imagine if we had multiple trades
    a day!


    > **Note**

    > For a quick reminder, the trade amounts are all randomly generated and do not
    in any way represent actual historical value for our instruments. Also, I kept
    the trades at one a day to keep things simple. Once you are comfortable with the
    techniques and how the function works, you can load more trades into the `Transaction`
    table to see what effect larger volumes of data have on query performance. Also
    make sure you update the `Account` and `Portfolio` tables after each load.


    Hopefully, these last few sections have demonstrated how to perform analysis by
    using the various ranking and aggregate functions. The power is to drill down
    one or more levels to get a picture of the trading patterns that generated the
    results. This will tell us the conditions that generated the profits and losses
    so we can refine our trading strategy. Our tools are not only the ranking functions
    but also the performance tools and Microsoft Excel.


    Beyond the scope of this book is loading our data into Power BI. We could create
    some impressive scorecards and dashboards with that tool!'
