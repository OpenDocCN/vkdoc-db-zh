    ## Aggregate Functions


    We will take a brief look at the aggregate window functions one more time. They
    should be familiar to you as we covered them in all the prior three business scenarios.
    This time we apply them to our inventory control scenario so we can see how a
    business analyst would monitor inventory levels and trap events like low or no
    product inventory so that corrective measures can be taken – or maybe high inventory
    levels, which indicate a product is not selling!


    The following are the window aggregate functions we will discuss in this chapter:


    * `COUNT()`: Window frame specifications support

    * `SUM()`: Window frame specifications support

    * `MAX()`: Window frame specifications support

    * `MIN()`: Window frame specifications support

    * `AVG()`: Window frame specifications support

    * `STDEV()`: Window frame specifications support

    * `VAR()`: Window frame specifications support


    As you can see, they all support the `ROWS` and `RANGE` window frame specifications.


    Our first analysis combines the first five functions in one query as we covered
    these and are familiar with how they work. In other words, we will not dedicate
    a single query to each.'
