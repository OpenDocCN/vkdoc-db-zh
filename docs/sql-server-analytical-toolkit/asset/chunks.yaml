- fmt: '# 图10-38 我们的维度表和事实表


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图，显示了“生成”选项卡。一个箭头指向“维度用法”选项卡。右侧是“解决方案资源管理器”面板，其中
    `A P Plant.dot.cube` 已被选中。数据源视图显示了一个星型架构，其中“设备”表链接到7个组件表。


    看起来不错。在构建和部署我们的立方体到 `SSAS` 服务器实例之前，我们还有一个任务需要完成。我们需要通过使用原始表中的代理键将维度链接到立方体。这被称为维度用法定义，我们所需要做的就是导航到图中箭头指示的“维度用法”选项卡。这会呈现另一个设计面板，让我们可以完成这些任务。


    请参阅图[10-39](#527021_1_En_10_Chapter.xhtml#Fig50)。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig50_HTML.png)


    # 图10-39 定义维度用法


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图。它显示了9个维度和6个度量值组。“日历键”在度量值组中被选中。右侧是“解决方案资源管理器”面板，其中
    `A P Plant.dot.cube` 已被选中。


    在每个维度和度量值组（即事实表）的交汇处，都有一个下拉列表框，让你可以识别将链接这两种表的键。如图所示，我们正在使用所有的代理键。例如，我们通过 `Calendar
    Key` 将 `Calendar` 维度链接到 `Equipment Failure` 度量值组。


    这是一个简单的任务，但它说明了良好命名标准的重要性。对于出现在多个表中的列，始终使用相同的名称，这样它们的用途（例如将维度链接到事实表）就一目了然。苹果对苹果，对吧？


    我们完成了。如果我们正确地完成了每项任务，我们需要做的就是构建和部署立方体。


    请参阅图[10-40](#527021_1_En_10_Chapter.xhtml#Fig51)。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig51_HTML.png)


    # 图10-40 生成并部署解决方案


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图。它显示了9个维度和6个度量值组。“日历键”在度量值组中被选中。“解决方案资源管理器”面板中
    `A P Plant.dot.cube` 已被选中。工具栏中选择了“生成解决方案”选项。


    在“生成”菜单选项卡下，我们看到了用于构建和部署立方体的选项。首先，你需要构建立方体，然后部署立方体。你会看到大量消息在面板上闪过，希望你不会看到任何表明出现问题的红色消息。


    如果一切顺利，你就可以浏览立方体了。


    请参阅图[10-41](#527021_1_En_10_Chapter.xhtml#Fig52)。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig52_HTML.png)


    # 图10-41 浏览立方体


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图。左侧面板显示元数据和度量值组。中间有2张表。表1有5列和1行。表2有8列和15行。“解决方案资源管理器”面板中
    `Plant Data` 选项被选中。


    导航到最后一个选项卡，即“浏览”选项卡，你将看到此设计面板。将所需的属性拖放到维度和度量值组中。根据需要，也可以拖放层次结构属性。你可能需要在操作过程中刷新面板，但这就是最终结果。


    我们甚至可以用一种叫做 `MDX` 的语言创建查询。点击菜单栏中的“设计”按钮，查看我们刚刚创建的报表所生成的 `MDX` 查询。将其复制并粘贴到 `MDX`
    查询面板和 `SSMS` 查询面板中并执行（`MDX` 代表多维表达式）。


    以下是结果。请参阅图[10-42](#527021_1_En_10_Chapter.xhtml#Fig53)。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig53_HTML.png)


    # 图10-42 Visual Studio 生成的 MDX 查询


    一张 SQL Server Management Studio (SSMS) 窗口的截图。“对象资源管理器”左侧面板有多个文件和文件夹。中间面板有 `Cube
    A P plant`、元数据和度量值组。右侧面板有一段代码和一个包含7列20行的表格。最后一列的标题是 `Failure`。


    一句话提醒：`MDX` 是一门复杂且难学的语言，但它可能是你 `SQL` Server 工具箱中一个有价值的工具。关于 `MDX` 有很多优秀的资源，所以请上网搜索或在
    Amazon 上查找 Apress 关于此主题的书籍！


    总之，对于开发人员进行测试来说，浏览器是一个不错的工具，但它并不是为我们最终用户准备的。你肯定不希望在业务分析师的桌面上安装一份包含我们刚刚使用的所有工具的开发环境
    Visual Studio。


    幸运的是，我们可以使用我们的老朋友 Microsoft Excel 电子表格应用程序来连接到立方体，拉取一些数据，并像创建数据透视表和图表那样进行切片和切块。让我们来看一下。


    **注意**


    Analysis Services 有自己的类 SQL 语言版本，称为 `MDX`，它允许你在 `SSMS` 中查询立方体，就像你使用 `TSQL` 编写查询一样——这是另一个你可能想加入工具箱的语言。


    你所需要做的就是通过导航到“数据”选项卡并从第一个名为“获取数据”的菜单中选择连接来定义到立方体服务器的连接。


    点击它以生成如下所示的面板。


    请参阅图[10-43](#527021_1_En_10_Chapter.xhtml#Fig54)。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig54_HTML.png)


    # 图10-43 将 Microsoft Excel 连接到 Analysis Services


    一张 Microsoft Excel 窗口的截图。工具栏中选择了“获取数据”选项，并显示一个菜单，其中选择了“来自数据库”。这又打开了另一个菜单，其中选择了“来自
    Analysis Services”。右侧面板显示“查询和连接”。


    从出现的下拉菜单中，只需点击“来自数据库”，然后点击“来自 Analysis Services”，进行必要的选择。将出现一个面板。只需输入服务器名称和安全凭据（确保你使用创建立方体时所使用的模拟凭据），你的连接就定义好了。


    还会出现两个面板，让你选择立方体以及将连接信息保存在文件中。


    最后，你会看到一个小面板，让你指定在 Excel 中放置导入数据的位置，以及数据透视表的创建位置。


    你现在可以拖放所需的列和值来创建数据透视表，如图[10-44](#527021_1_En_10_Chapter.xhtml#Fig55)所示。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig55_HTML.png)


    # 图10-44 基于立方体的 Microsoft Excel 数据透视表


    一张 Microsoft Excel 窗口的截图。它显示了一个包含3列和4个主行的表格，每个主行有5个子行。列标题为“行标签”、“故障”和“设备故障计数”。右侧面板显示“数据透视表字段”，包含用于选择字段、筛选器、列、行和值的选项。


    看起来很熟悉，不是吗？你可以根据需要添加筛选器和更改组合，以便在你定义的层次结构中向上钻取和向下钻取。


    最后，只是为了再次激起你的兴趣，我将向你展示一个通过将 `Power BI` 连接到我们刚刚创建的立方体而创建的 `Power BI` 报表和仪表板。


    请参阅图[10-45](#527021_1_En_10_Chapter.xhtml#Fig56)。


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig56_HTML.png)


    # 图10-45 电厂故障的 Power BI 仪表板


    一张 Power BI 仪表板的截图。它显示了“故障”与“工厂ID”关系的折线图，有16条下降的曲线。还有一个包含7列12行的表格。右侧面板是筛选器（有2个选项）、可视化效果、字段（包含组件和子组件）以及一个搜索框。'
  raw: 'A screenshot of Plant data warehouse Microsoft Visual Studio window with build
    tab. An arrow points to dimensions usage tab. On the right is the Solution Explorer
    panel with the A P Plant dot cube selected. Data Source View has a star schema
    with equipment linked to 7 components.


    Figure 10-38


    Our dimensions and fact table


    Looks pretty good. We have one more task to complete before we build and deploy
    our cube to the `SSAS` server instance. We need to link the dimensions to the
    cube by using the surrogate keys in the original tables. This is called dimension
    usage definitions, and all we need to do is to navigate to the Dimension Usage
    tab indicated by the arrow in the figure. Another design panel is presented that
    allows us to complete these tasks.


    Please refer to Figure [10-39](#527021_1_En_10_Chapter.xhtml#Fig50).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig50_HTML.png)


    A screenshot of Plant data warehouse Microsoft Visual Studio window. It presents
    9 dimensions and 6 measure groups. The calendar key is selected in measure groups.
    On the right is the Solution Explorer panel with the A P Plant dot cube selected.


    Figure 10-39


    Define the dimension usage


    At the intersection of each dimension and the measure group (the fact table) is
    a drop-down list box that lets you identify the key that will link the two types
    of tables. As can be seen, we are using all the surrogate keys. For example, we
    link the `Calendar` dimension to the `Equipment Failure` measure group via the
    `Calendar Key`.


    This is a simple task, but it illustrates the use of good naming standards. Always
    use the same names for columns that appear in multiple tables, so it is obvious
    what they are and what they are used for, like linking a dimension to a fact table.
    Apples to apples, right?


    We are finished. If we completed each task correctly, all we need to do is build
    and deploy the cube.


    Please refer to Figure [10-40](#527021_1_En_10_Chapter.xhtml#Fig51).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig51_HTML.png)


    A screenshot of Plant data warehouse Microsoft Visual Studio window. It presents
    9 dimensions and 6 measure groups. The calendar key is selected in measure groups.
    The Solution Explorer panel has the A P Plant dot cube selected. Build option
    is selected in the toolbar with selected Build solution.


    Figure 10-40


    Build and deploy the solution


    Underneath the BUILD menu tab, we see the selections for building and deploying
    the cube. First, you need to build the cube and next deploy the cube. You will
    see a lot of messages flash across the panel, and hopefully you will not see any
    red messages that indicate something went wrong.


    If all went well, you are ready to browse the cube.


    Please refer to Figure [10-41](#527021_1_En_10_Chapter.xhtml#Fig52).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig52_HTML.png)


    A screenshot of Plant data warehouse Microsoft Visual Studio window. It presents
    metadata, and measure groups in the left panel. 2 tables are in the middle. Table
    1 has 5 columns and 1 row. Table 2 has 8 columns and 15 rows. The Solution Explorer
    panel has the Plant Data option selected.


    Figure 10-41


    Browse the cube


    Navigate to the last tab, the Browse tab, and you are presented with this design
    panel. Drag and drop the desired attributes in the dimension and measure group.
    Also drag and drop the hierarchy attributes as needed. You may need to refresh
    the panel as you go, but this is the final result.


    We can even create queries in a language called `MDX`. Click the Design button
    in the menu bar and view the `MDX` query that was generated from the report we
    just created. Copy and paste it to an `MDX` query panel and `SSMS` query panel
    and execute it (`MDX` stands for Multidimensional Expressions).


    Here are the results. Please refer to Figure [10-42](#527021_1_En_10_Chapter.xhtml#Fig53).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig53_HTML.png)


    A screenshot of the S Q L, S S M S window. The left panel of Object Explorer has
    multiple files and folders. The middle panel has Cube A P plant, metadata, and
    measure groups. The right panel has a code and a table of 7 columns and 20 rows.
    The last column header is Failure.


    Figure 10-42


    MDX query generated by Visual Studio


    One word of caution: `MDX` is a complicated and hard-to-learn language, but it
    could be a valuable tool in your `SQL` Server toolkit. Many good resources exist
    on `MDX`, so search the Web or Apress books on this topic on Amazon!


    In conclusion, the browser is a nice tool as far as testing for us developers,
    but it is not a tool for our users. You really do not want to install a copy of
    Visual Studio, the development environment that contains all the tools we just
    used, on a business analyst’s desk.


    Fortunately, we can use our old friend, the Microsoft Excel spreadsheet application,
    to connect to the cube, pull in some data, and perform slicing and dicing just
    like when we created pivot tables and graphs. Let’s take a look.


    Note


    Analysis Services has its own version of a SQL-like language called `MDX` that
    allows you to query cubes in `SSMS` just like when you write queries with `TSQL`
    – another language you might want to add to your toolkit.


    All you need to do is define a connection to the cube server by navigating to
    the Data tab and selecting a connection from the first menu selection called Get
    Data.


    Click it to generate the panel shown in the following.


    Please refer to Figure [10-43](#527021_1_En_10_Chapter.xhtml#Fig54).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig54_HTML.png)


    A screenshot of the M S Excel window. The Get data option is selected in the toolbar
    and gives a menu in which, From Database is selected. It opens another menu in
    which From Analysis Services is selected. The right panel presents Queries and
    Connections.


    Figure 10-43


    Connecting Microsoft Excel to Analysis Services


    From the drop-down menu that appears, just make the necessary selections by clicking
    “From Database” and then “From Analysis Services.” A panel will appear. Just enter
    the server’s name and the security credentials (make sure you use the impersonation
    credentials you used when creating the cube), and your connection is defined.


    Two more panels appear that will let you select the cube and also save the connection
    information in a file.


    You are finally presented with a small panel that will let you specify where in
    Excel you want to place the imported data and also where the pivot table will
    be created.


    You can now drag and drop the desired columns and values to create the pivot tables
    as shown in Figure [10-44](#527021_1_En_10_Chapter.xhtml#Fig55).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig55_HTML.png)


    A screenshot of the M S Excel window. It presents a table of 3 columns and 4 main
    rows with 5 sub rows each. The column headers are Row labels, Failure, and Equipment
    Failure Count. The right panel presents Pivot Table Fields with an option to choose
    fields, filters, columns, rows, and values.


    Figure 10-44


    Microsoft Excel pivot table based on the cube


    Looks familiar, doesn’t it? You can add filters and change the combinations as
    required so as to drill up and down the hierarchies you defined.


    Lastly, just to whet your appetite again, I will show you a `Power BI` report
    and dashboard created by connecting `Power BI` to the cube we just created.


    Please refer to Figure [10-45](#527021_1_En_10_Chapter.xhtml#Fig56).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig56_HTML.png)


    A screenshot of the Power B I dashboard. It presents a line graph of failure versus
    plant I D with 16 descending curves. It also has a table of 7 columns and 12 rows.
    On the right panel are filters with 2 options, visualizations, and fields with
    components and subcomponents and a search box.


    Figure 10-45


    Power BI dashboard for power plant failures'
  trans: '# 图 10-38 我们的维度表和事实表


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图，显示了“生成”选项卡。一个箭头指向“维度用法”选项卡。右侧是“解决方案资源管理器”面板，其中
    `A P Plant.dot.cube` 已被选中。数据源视图显示了一个星型架构，其中“设备”表链接到 7 个组件表。


    看起来不错。在构建和部署我们的立方体到 `SSAS` 服务器实例之前，我们还有一个任务需要完成。我们需要通过使用原始表中的代理键将维度链接到立方体。这被称为维度用法定义，我们所需要做的就是导航到图中箭头指示的“维度用法”选项卡。这会呈现另一个设计面板，让我们可以完成这些任务。


    请参阅图 10-39。


    ![](img/527021_1_En_10_Fig50_HTML.png)


    # 图 10-39 定义维度用法


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图。它显示了 9 个维度和 6 个度量值组。“日历键”在度量值组中被选中。右侧是“解决方案资源管理器”面板，其中
    `A P Plant.dot.cube` 已被选中。


    在每个维度和度量值组（即事实表）的交汇处，都有一个下拉列表框，让你可以识别将链接这两种表的键。如图所示，我们正在使用所有的代理键。例如，我们通过 `Calendar
    Key` 将 `Calendar` 维度链接到 `Equipment Failure` 度量值组。


    这是一个简单的任务，但它说明了良好命名标准的重要性。对于出现在多个表中的列，始终使用相同的名称，这样它们的用途（例如将维度链接到事实表）就一目了然。苹果对苹果，对吧？


    我们完成了。如果我们正确地完成了每项任务，我们需要做的就是构建和部署立方体。


    请参阅图 10-40。


    ![](img/527021_1_En_10_Fig51_HTML.png)


    # 图 10-40 生成并部署解决方案


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图。它显示了 9 个维度和 6 个度量值组。“日历键”在度量值组中被选中。“解决方案资源管理器”面板中
    `A P Plant.dot.cube` 已被选中。工具栏中选择了“生成解决方案”选项。


    在“生成”菜单选项卡下，我们看到了用于构建和部署立方体的选项。首先，你需要构建立方体，然后部署立方体。你会看到大量消息在面板上闪过，希望你不会看到任何表明出现问题的红色消息。


    如果一切顺利，你就可以浏览立方体了。


    请参阅图 10-41。


    ![](img/527021_1_En_10_Fig52_HTML.png)


    # 图 10-41 浏览立方体


    一张植物数据仓库 Microsoft Visual Studio 窗口的截图。左侧面板显示元数据和度量值组。中间有 2 张表。表 1 有 5 列和 1 行。表
    2 有 8 列和 15 行。“解决方案资源管理器”面板中 `Plant Data` 选项被选中。


    导航到最后一个选项卡，即“浏览”选项卡，你将看到此设计面板。将所需的属性拖放到维度和度量值组中。根据需要，也可以拖放层次结构属性。你可能需要在操作过程中刷新面板，但这就是最终结果。


    我们甚至可以用一种叫做 `MDX` 的语言创建查询。点击菜单栏中的“设计”按钮，查看我们刚刚创建的报表所生成的 `MDX` 查询。将其复制并粘贴到 `MDX`
    查询面板和 `SSMS` 查询面板中并执行（`MDX` 代表多维表达式）。


    以下是结果。请参阅图 10-42。


    ![](img/527021_1_En_10_Fig53_HTML.png)


    # 图 10-42 Visual Studio 生成的 MDX 查询


    一张 SQL Server Management Studio (SSMS) 窗口的截图。“对象资源管理器”左侧面板有多个文件和文件夹。中间面板有 `Cube
    A P plant`、元数据和度量值组。右侧面板有一段代码和一个包含 7 列 20 行的表格。最后一列的标题是 `Failure`。


    一句话提醒：`MDX` 是一门复杂且难学的语言，但它可能是你 `SQL` Server 工具箱中一个有价值的工具。关于 `MDX` 有很多优秀的资源，所以请上网搜索或在
    Amazon 上查找 Apress 关于此主题的书籍！


    总之，对于开发人员进行测试来说，浏览器是一个不错的工具，但它并不是为我们最终用户准备的。你肯定不希望在业务分析师的桌面上安装一份包含我们刚刚使用的所有工具的开发环境
    Visual Studio。


    幸运的是，我们可以使用我们的老朋友 Microsoft Excel 电子表格应用程序来连接到立方体，拉取一些数据，并像创建数据透视表和图表那样进行切片和切块。让我们来看一下。


    **注意**


    Analysis Services 有自己的类 SQL 语言版本，称为 `MDX`，它允许你在 `SSMS` 中查询立方体，就像你使用 `TSQL` 编写查询一样——这是另一个你可能想加入工具箱的语言。


    你所需要做的就是通过导航到“数据”选项卡并从第一个名为“获取数据”的菜单中选择连接来定义到立方体服务器的连接。


    点击它以生成如下所示的面板。


    请参阅图 10-43。


    ![](img/527021_1_En_10_Fig54_HTML.png)


    # 图 10-43 将 Microsoft Excel 连接到 Analysis Services


    一张 Microsoft Excel 窗口的截图。工具栏中选择了“获取数据”选项，并显示一个菜单，其中选择了“来自数据库”。这又打开了另一个菜单，其中选择了“来自
    Analysis Services”。右侧面板显示“查询和连接”。


    从出现的下拉菜单中，只需点击“来自数据库”，然后点击“来自 Analysis Services”，进行必要的选择。将出现一个面板。只需输入服务器名称和安全凭据（确保你使用创建立方体时所使用的模拟凭据），你的连接就定义好了。


    还会出现两个面板，让你选择立方体以及将连接信息保存在文件中。


    最后，你会看到一个小面板，让你指定在 Excel 中放置导入数据的位置，以及数据透视表的创建位置。


    你现在可以拖放所需的列和值来创建数据透视表，如图 10-44 所示。


    ![](img/527021_1_En_10_Fig55_HTML.png)


    # 图 10-44 基于立方体的 Microsoft Excel 数据透视表


    一张 Microsoft Excel 窗口的截图。它显示了一个包含 3 列和 4 个主行的表格，每个主行有 5 个子行。列标题为“行标签”、“故障”和“设备故障计数”。右侧面板显示“数据透视表字段”，包含用于选择字段、筛选器、列、行和值的选项。


    看起来很熟悉，不是吗？你可以根据需要添加筛选器和更改组合，以便在你定义的层次结构中向上钻取和向下钻取。


    最后，只是为了再次激起你的兴趣，我将向你展示一个通过将 `Power BI` 连接到我们刚刚创建的立方体而创建的 `Power BI` 报表和仪表板。


    请参阅图 10-45。


    ![](img/527021_1_En_10_Fig56_HTML.png)


    # 图 10-45 电厂故障的 Power BI 仪表板


    一张 Power BI 仪表板的截图。它显示了“故障”与“工厂 ID”关系的折线图，有 16 条下降的曲线。还有一个包含 7 列 12 行的表格。右侧面板是筛选器（有
    2 个选项）、可视化效果、字段（包含组件和子组件）以及一个搜索框。'
- fmt: 'Learning and creating Power BI dashboards, scorecards, and reports would take
    an entire book. But as you can see, this is a very powerful tool to add to your
    toolkit. I will cover how to create a simple scorecard or two in the last three
    chapters so that you have some basic skills on how to use `Power BI`.


    The Apress publisher has a good book on this topic called `Beginning Microsoft
    Power BI: A Practical Guide to Self-Service Analytics`, third edition, by Dan
    Clark.


    You might want to check this out.


    ## Summary


    We covered a lot of ground in this chapter. I hope you enjoyed it and found it
    useful. We performed our usual study of the analytical functions that come with
    `SQL Server`, but this time we applied them to our power plant scenario in order
    to see the type of analysis one would perform to identify failure rates for critical
    equipment that is part of a power plant.


    We also conducted our performance analysis on the queries we wrote and got more
    practice with the performance analysis tools we learned through the book so far.


    Lastly, we took things a bit further by introducing two new tools for your toolkit,
    namely, `Analysis Services` and `Report Builder`.


    We will expand on these tools in the last three chapters when we perform some
    analysis on an inventory control case study. I will introduce a last tool called
    `SQL Server Integration Services`, which is the premier `ETL` tool that is a part
    of the `Microsoft SQL Server BI` stack that shows you how to create process flows
    that load databases and data warehouses.


    See you in Chapter [11](#527021_1_En_11_Chapter.xhtml) where we take another look
    at aggregate window functions to track inventory.


    # 11. Inventory Use Case: Aggregate Functions


    This will be an interesting chapter. Not only will we be taking the window aggregate
    functions through their paces in an inventory management scenario but we will
    also learn how to use Microsoft’s premier `ETL` tool called `SSIS` to create a
    process that loads an inventory data warehouse from the inventory database that
    is used in the queries we will create.


    We will create queries that go against the `APInventory` database and also the
    `APInventoryWarehouse` data warehouse so we can compare results and performance.
    The usual performance analysis discussions will be included, and also you will
    have a few suggested homework assignments.


    Lastly, the scripts for creating and loading both databases are included in the
    folder for this chapter on the Apress website together with the query scripts.
    Let’s check out what the databases look like with some simple business conceptual
    models.


    ## The Inventory Database


    Let’s begin this chapter by describing the database we will use in our examples.
    The following is our high-level business conceptual model that identifies the
    business entities for the inventory database.


    Please refer to Figure [11-1](#527021_1_En_11_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig1_HTML.png)


    Figure 11-1. The inventory database conceptual model


    The main business object is the `Inventory` table, which stores information related
    to products moving in and out of inventory. The `Inventory Movement` business
    object identifies the quantity on hand of any product over any date. The `Product`
    object stores typical information about the products being sold, and the `Product
    Type` object identifies the type of product. Lastly, we have the usual `Country`,
    `Location`, and `Calendar` business objects.


    The preceding model identifies the relationships between objects with simple verb
    phrases. In Table [11-1](#527021_1_En_11_Chapter.xhtml#Tab1) are the high-level
    descriptions of each entity.


    Table 11-1. The Inventory Database Tables


    | Entity | Description |

    | --- | --- |

    | `Calendar` | Contains calendar dates used in transaction events and inventory
    movement. |

    | `Country` | Identifies ISO two- and three-character country codes and country
    names. |

    | `Location` | Identifies location of inventory and warehouses. A location has
    one or more inventories. Inventories have one or more warehouses. |

    | `Product` | Identifies products available in inventory. |

    | `Product Type` | Identifies the type of a product, like HO Electric Locomotives.
    |

    | `Inventory` | Identifies high-level units available in the warehouses associated
    with this inventory. |

    | `Inventory Movement History` | Identifies the date of inventory in and out of
    the warehouses together with the associated product. |

    | `Inventory Sales Report` | Sales report related to inventory movements. |

    | `Inventory Transaction` | Identifies the daily in and out movement of products
    from the warehouses. |

    | `Warehouse` | Detailed information related to the products in inventory, the
    current levels, and the reorder amounts. |


    This simple data dictionary identifies the business entities in the conceptual
    model together with the descriptions of each table. I will not include a detailed
    attribute data dictionary in the interest of space as the column names in the
    database tables clearly identify what the business data being stored is.'
