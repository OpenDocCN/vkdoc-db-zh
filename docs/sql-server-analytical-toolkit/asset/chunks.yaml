  trans: '

    ### FIRST_VALUE() 与 LAST_VALUE() 函数


    那么，这一对相关函数能为我们做什么呢？如果您没有阅读过第 3 章，或者需要复习一下，请阅读接下来的讨论；否则，可以直接跳转到示例部分。


    函数名称给了我们一些提示。它们回答了以下问题：


    在分区内，谁排第一，谁排最后？


    给定一组已排序的值，`FIRST_VALUE()` 函数将返回分区内第一个值。


    给定一组已排序的值，`LAST_VALUE()` 函数将返回分区内最后一个值。


    这两个函数都返回作为参数传入的任何数据类型；可能是整数，也可能是字符串，等等。非常简单。让我们直接深入示例。


    以下是我们的业务需求说明：


    这次，分析师要求我们关注所有客户账户。我们需要创建一个报告，该报告将返回由年份和客户 ID 定义、并按月份排序的分区内最后一个和第一个账户值。分析师希望看到包含当前月份以及所有未来月份的数据集（分区）中的这些值，同时也希望看到包含当前月份以及所有过去月份的数据集中的这些值。换句话说，即向前看和向后看（提示：需要定义一个窗口框架）。


    最后，报告将仅限于现金账户。


    请参考清单 7-3。


    ```sql

    WITH MonthlyAccountBalances (

    AcctYear,AcctMonth,CustId, PrtfNo, AcctNo, AcctName, AcctBalance

    )

    AS

    (

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,SUM(AcctBalance)

    FROM Financial.Account

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    )

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,FIRST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS FirstValueBalance

    ,LAST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS LastValueBalanceCRUF

    ,FIRST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS FirstValueBalanceUPCR

    ,LAST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS LastValueBalanceUPCR

    FROM MonthlyAccountBalances

    WHERE AcctYear >= 2013

    AND AcctNAme = ''CASH''

    ORDER BY CustId

    ,AcctYear

    ,AcctName

    ,AcctMonth

    GO

    ```


    清单 7-3

    按年份和客户、并按月份排序的首个与末个账户余额


    这个 `CTE` 看起来与我们前一个示例中讨论的类似，但这次它引用的是 Account 表，其粒度比 Portfolio 表更低。


    有趣的是，我们包含了两组具有不同 `ROWS` 框架子句的 `FIRST_VALUE()OVER()` 和 `LAST_VALUE()OVER()` 子句。


    第一组使用以下 `ROWS` 窗口框架定义，以在分区内基于当前行和其后的所有行（向前看）来定义窗口框架：


    ```

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ```


    第二组使用以下 `ROWS` 窗口框架定义，以处理当前行及其之前的所有行（向后看）来定义窗口框架：


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    请记住，窗口框架是相对于分区内在行间移动处理时正在处理的当前行而言的。如果这个概念有点模糊，请复习第 1 章中的相关内容，然后尝试使用十个值、一个表变量和这些函数进行一个简单的示例，以便在简单数据集上观察它们的工作原理。查看第
    1 章中关于此主题的图表；它们会让这个概念变得清晰。


    查询已执行。这个查询运行了四秒钟！迫不及待地想查看估计的执行计划。请参考图 7-6 中的部分结果。


    ![](img/527021_1_En_7_Fig6_HTML.png)


    一张 S S M S 窗口的截图。其中有一个包含 11 列和 26 行的表格。列标题分别是客户 I D、账户年份、账户月份、账户名称、账户余额、首值余额、末值余额
    C R U F、首值余额 U P C R 和末值余额 U P C R。


    图 7-6

    在定义的分区内，首行与末行


    从第一组首末余额中可以看出，首值是当前行中的值，而末值始终指向分区中的最后一个值，`$34,138.00`。在这里我们向前看。


    在第二组首末余额中，首值始终指向分区中的第一个值，而末值始终是窗口框架当前行中的值。在这里我们向后看。


    我猜想这很有价值，因为我们可以看到相对于余额，我们起始于何处、当前位于何处以及将走向何方。这个方案告诉你，随着时间推移（按月），账户是在增值还是在贬值。


    最好检查一下估计的查询计划，因为我们看到这个查询运行了四秒钟。

    '
- fmt: '### Performance Considerations


    我们需要将估计的查询计划分成两部分。从右向左看，大约在屏幕中间，我们在图 [7-7](#527021_1_En_7_Chapter.xhtml#Fig7)
    中看到以下任务。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig7_HTML.jpg)


    *图 7-7：`FIRST_VALUE()` 和 `LAST_VALUE()` 的估计查询计划，第 1 部分*


    这只是一个估计查询计划的一半，但这种模式在所有函数调用对中都会重复，因此我们在这里应用的任何改进也可以应用于查询计划中的其他模式（我所说的模式是指操作符（任务）和连接流的组合）。


    请参考图 [7-8](#527021_1_En_7_Chapter.xhtml#Fig8)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig8_HTML.png)


    *图 7-8：`FIRST_VALUE()` 和 `LAST_VALUE()` 的估计查询计划，第 2 部分*


    可以看到，`Compute Scalar`、`Sort`、`Segment`、`Sequence Project`、`Segment` 和 `Window
    Spool` 任务的相同模式在重复。成本大致相同，但排序步骤的成本略有不同。估计查询计划器告诉我们，建议的索引将提高 31.7286% 的性能。我接受这个改进！


    让我们复制并粘贴索引模板，给它起个名字，然后执行命令来构建索引。


    清单 [7-4](#527021_1_En_7_Chapter.xhtml#PC8) 是建议索引的完整代码。


    ```sql

    CREATE NONCLUSTERED INDEX [ieAcctPrtBalancePostDate]

    ON [Financial].[Account] ([AcctName])

    INCLUDE ([CustId],[PrtfNo],[AcctNo],[AcctBalance],[PostDate])

    GO

    -- 清单 7-4

    -- 建议的估计查询计划索引

    ```


    这是一个基于账户名称列的非聚集索引，但根据查询计划工具的建议，我们包含了客户 ID、投资组合编号、账户编号、账户余额和过账日期列。注意那些讨厌的方括号。由于
    SQL Server 生成了这段 `T-SQL` 代码，所以包含了它们。你可能想删除它们，但这值得吗？


    假设你有一个包含数千行代码的大型脚本，并且你对方括号进行了全局替换。如果你使用的表名和列名中包含空格，会发生什么？如果你进行全局替换以删除方括号，你的脚本将会出错。没错，会出错！


    > **注意**

    > 编程命名标准在现实应用中是很好的，但有人可能过于严格，大部分时间会花在输入漂亮的代码上，而不是构思良好有效的解决方案上。如果你的部门有预算，可以使用工具来“美化”代码。嗯，不管怎样，这是我的拙见。


    让我们创建索引，看看查询计划是否有所改善。请参考图 [7-9a](#527021_1_En_7_Chapter.xhtml#Fig9)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig9_HTML.png)


    *图 7-9a：修订后的估计查询计划，前半部分*


    和往常一样，索引被使用了，但排序成本上升了。我们的老朋友 `Window Spool` 仍然保持 2% 的成本。让我们看看查询计划的后半部分。'
  raw: '### Performance Considerations


    We need to split the estimated query plan into two parts. Starting right to left,
    about the middle of the screen, we see the following tasks in Figure [7-7](#527021_1_En_7_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig7_HTML.jpg)


    A screenshot of the S S M S window. It presents part 1 of the estimated query
    plan with 8 components. The components are window spool, segment, sequence project,
    segment, stream aggregate, sort, compute scalar, and index scan. The costs of
    window spool, sort, and index scan are 2%, 26%, and 32%.


    Figure 7-7


    Estimated query plan for FIRST_VALUE() and LAST_VALUE(), part 1


    Right away, we see we need to create an index as the estimated query plan tool
    suggested an index. We do see an existing index with a cost of 32%, but apparently,
    we need another one. We see a sort task at 26% cost and a window spool task at
    2%.


    This is only half of the estimated query plan, but the pattern repeats itself
    for all pairs of function calls, so any improvements we apply here can be applied
    to the other patterns in the query plan (by patterns I mean the combination of
    operators (tasks) and connecting flows).


    Please refer to Figure [7-8](#527021_1_En_7_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig8_HTML.png)


    A screenshot of the S S M S window. It presents part 2 of the estimated query
    plan with 11 components. The components are sort, compute scalar, stream aggregate,
    window spool, segment, sequence project, segment, sort, compute scalar, stream
    aggregate, and window spool.


    Figure 7-8


    Estimated query plan for FIRST_VALUE() and LAST_VALUE(), part 2


    As can be seen, the same pattern of compute scalar, sort, segment, sequence project,
    segment, and window spool tasks repeats itself. Costs are about the same but with
    the sort steps showing slightly different costs. The estimated query planner tells
    us the suggested index will improve performance by 31.7286%. I’ll take it!


    Let’s copy and paste the index template, give it a name, and execute the command
    to build the index.


    Listing [7-4](#527021_1_En_7_Chapter.xhtml#PC8) is the completed code for the
    suggested index.


    ```

    CREATE NONCLUSTERED INDEX [ieAcctPrtBalancePostDate]

    ON [Financial].[Account] ([AcctName])

    INCLUDE ([CustId],[PrtfNo],[AcctNo],[AcctBalance],[PostDate])

    GO

    Listing 7-4

    Suggested Estimated Query Plan Index

    ```


    This is a non-clustered index based on the account name column, but we include
    the customer ID, portfolio number, account number, account balance, and postdate
    columns as suggested by the query plan tool. Notice those pesky square brackets.
    Since SQL Server generated this `TSQL` code, it included them. You might want
    to remove them, but is it worth it?


    Suppose you have a large script with thousands of lines of code, and you do a
    global replace of the square brackets. What happens if some of the names you used
    for tables and columns have spaces in them? If you do the global replace of the
    square brackets to remove them, your script will blow up. That’s right, blow up!


    Note


    Programming naming standards are great when applied realistically, but one can
    go overboard and most of the time will be spent typing pretty code instead of
    coming up with good working solutions. Tools are available to “pretty up” the
    code if your department has the cash for them. Well, that’s my two cents anyway.


    Let’s create the index and see if the query plan improves. Please refer to Figure
    [7-9a](#527021_1_En_7_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig9_HTML.png)


    A screenshot of the S S M S window. It presents part 1 of the revised estimated
    query plan with 8 components. The components are window spool, segment, sequence
    project, segment, stream aggregate, sort, compute scalar, and index seek.


    Figure 7-9a


    Revised estimated query plan, first half


    As usual, the index was used but the sort went up. Our friend, the window spool,
    remained at 2% cost. Let’s look at the second half of the query plan.'
