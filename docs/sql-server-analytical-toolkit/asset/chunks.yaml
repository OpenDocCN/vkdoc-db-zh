- fmt: '# NTILE Function


    Next, we want to create some online classification buckets.


    Our business analyst wants us to develop a query that will rate plants according
    to the status of equipment. Specifically, include the following categories in
    the report:


    *   Severe Failures

    *   Critical Failures

    *   Moderate Failures

    *   Investigate Failures

    *   Maintenance Failures

    *   No Issues to Report


    That is, place the failure statistics into buckets that represent the preceding
    categories. The report should include the plant name, location name, calendar
    year, quarter, month, and total sum of equipment failures by month.


    ## 实现步骤


    The following is the first attempt, which uses a two chained `CTE` approach. I
    split up the code into three sections as it is fairly long. Let’s start off with
    the first `CTE`.


    > **Note**

    >

    > Recall that by chained `CTE`s I mean that a lower `CTE` refers to the `CTE`
    above it and so on (`CTE n` – `1` refers to `CTE n`).


    Please refer to Listing [9-8a](#527021_1_En_9_Chapter.xhtml#PC8).


    ```sql

    WITH FailedEquipmentCount

    (

    CalendarYear,QuarterName,[MonthName],CalendarMonth,PlantName,LocationName,SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    ```

    Listing 9-8a

    First CTE – Summing Logic


    The first `CTE` retrieves the desired dimension columns and uses the `SUM()` function
    to add up the failures by month. Notice the inclusion of the mandatory `GROUP
    BY` clause. Also note that we need to `JOIN` five tables, one fact table and four
    dimension tables.


    > **Reminder**

    >

    > Remember, if you need to link up N tables with `JOIN` clauses, you need N –
    1 joins. So if you need to link five tables, you need four `JOIN` clauses in your
    query.


    Next, we create another `CTE` that contains the `NTILE()` function and refer it
    to the first `CTE` we discussed earlier.


    Please refer to Listing [9-8b](#527021_1_En_9_Chapter.xhtml#PC9).


    ```sql

    FailureBucket (

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName],CalendarMonth,SumEquipFailures,MonthBucket)

    AS (

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName],

    CalendarMonth,SumEquipFailures,

    NTILE(5)  OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipFailures

    ) AS MonthBucket

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2008

    )

    ```

    Listing 9-8b

    `NTILE()` Bucket CTE


    We need to create five buckets, so the `NTILE()` function is used, and we specify
    a partition based on the plant name and location name columns. The partition is
    sorted by the values in the `SumEquipFailures` column.


    Last but not least is the query to generate the report.


    Please refer to Listing [9-8c](#527021_1_En_9_Chapter.xhtml#PC10).


    ```sql

    SELECT PlantName,LocationName,CalendarYear,QuarterName,[MonthName],SumEquipFailures,

    CASE

    WHEN MonthBucket = 5 AND SumEquipFailures  0 THEN ''Severe Failures''

    WHEN MonthBucket = 4 AND SumEquipFailures  0 THEN ''Critical Failures''

    WHEN MonthBucket = 3 AND SumEquipFailures  0 THEN ''Moderate Failures''

    WHEN MonthBucket = 2 AND SumEquipFailures  0 THEN ''Investigate Failures''

    WHEN MonthBucket = 1 AND SumEquipFailures  0 THEN ''Maintenance Failures''

    WHEN MonthBucket = 1 AND SumEquipFailures = 0

    THEN ''No issues to report''

    ELSE ''No Alerts''

    END AS AlertMessage

    FROM FailureBucket

    GO

    ```

    Listing 9-8c

    Categorize the Failure Buckets


    To the rescue is our old friend, the `CASE` block. We simply print out the categories
    that are based on the tile number. A simple solution but a little bit complex
    because we needed to use two chained `CTE` blocks. Let’s look at the results before
    we analyze performance.


    ## 结果展示


    Please refer to the partial results in Figure [9-21](#527021_1_En_9_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig21_HTML.png)

    A screenshot of the s q l work area. The main window represents the codes and
    the table. The columns of the table are labeled plant name, location name, calendar
    year, month name, quarter name, sum equip failures, and alert messages.

    Figure 9-21

    Equipment failure bucket report


    The report looks good and shows the failures by buckets and plant, location, and
    calendar year. If we take out the `WHERE` clause and run the report for all years,
    we generate 1,517 rows. These could be copied and pasted into a Microsoft Excel
    pivot table so we could do some fancy slicing and dicing to really understand
    the results.


    And that is exactly what we are going to do. Please refer to Figure [9-22](#527021_1_En_9_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig22_HTML.jpg)

    A screenshot of the Excel sheet. The window depicts the menu bar, followed by
    the toolbar at the top. The main page depicts the row labels and the sum of failures
    on the left side and the pivot table on the right side.

    Figure 9-22

    Failure category bucket pivot table


    This is a very useful technique and tool to add to your toolkit as it will allow
    your business users and analysts the capability of viewing results similar to
    a multidimensional cube. The filter area highlighted in the figure lets you select
    the plant, year, and location so you can drill down into the data.


    You can even modify the original query to give you failure numbers by equipment
    so you can drill up and down the grouping hierarchy just like we did with the
    `GROUPING` clause!


    > **Homework**

    >

    > Try creating a pivot graph to complete this pivot table.'
