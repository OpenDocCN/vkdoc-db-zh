- fmt: '## Aggregate Functions


    聚合函数与 `OVER()` 子句（因此我们可以对结果集进行分区）结合使用，提供了一套强大的工具。回想一下，此类别包含以下函数：


    *   `COUNT()` 和 `COUNT_BIG()`

    *   `SUM()`

    *   `MAX()`

    *   `MIN()`

    *   `AVG()`

    *   `GROUPING()`

    *   `STRING_AGG()`

    *   `STDEV()` 和 `STDEVP()`

    *   `VAR()` 和 `VARP()`


    但有一点需要注意：如果将这些函数与 `OVER()` 子句一起使用，括号之间不允许使用 `DISTINCT` 作为关键字！这将产生错误：`AVG(DISTINCT
    ...) OVER(...)`。


    另外，我们将不再回顾 `COUNT_BIG()` 函数，因为它的工作方式与 `COUNT()` 函数完全相同。唯一的区别在于它返回 `BIGINT` 数据类型。


    顺便说一下，这种数据类型的范围在 **-**9,223,372,036,854,775,808 和 9,223,372,036,854,775,807 之间。与我们在示例中使用的整数数据类型相比，它需要
    8 字节的存储空间。该数据类型仅需 4 字节存储空间，其值范围在 **-**2,147,483,648 和 2,147,483,647 之间。用这些统计数据给你的朋友们留下深刻印象吧（其实并没有）。


    回到我们的聚合函数。这些函数可以成为工具集的一部分，让你能够分析金融数据，并为你的用户、分析师、财务顾问和经理建立强大的脚本和报告。将它们包含在存储过程中，就可以从
    SSRS（SQL Server Reporting Services）中调用，为财务利益相关者创建有价值的报告。


    在学习本章时要记住的一点是，金融数据的特点是每日交易量巨大，历史交易量更是庞大。根据金融机构的规模，我们谈论的是每天数亿笔交易，涉及数百万客户。因此，我们需要牢记性能分析和调优，以创建强大而快速的查询。你每年可能要处理数十亿行数据。我就曾经不得不这样！


    为了做到这一点，我们必须非常熟悉我们正在使用的数据库 **–** 其大小、表内容以及表之间的关系。


    让我们首先花些时间了解我们将要使用的数据库的数据模型。我们将使用一个简单的概念性业务模型来完成此操作。


    请参阅图 [5-1](#527021_1_En_5_Chapter.xhtml#Fig1)。


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig1_HTML.png)


    一个框图展示了 A P 财务概念模型。账户通过其类型来识别：现金账户、权益账户、商品账户、外汇账户、期权账户和掉期账户。


    图 5-1


    金融数据库物理数据模型


    这被称为概念模型，因为它仅从业务角度识别了高级别的实体和关系。非技术分析师和管理层可以理解此图。他们在数据库的设计阶段将提供宝贵的意见。


    让我们逐步了解这些实体以及它们之间的关系。


    客户拥有一个投资组合，该投资组合由多个账户组成。账户通过其类型来识别。账户可以是以下类型之一：


    *   现金账户

    *   权益账户

    *   商品账户

    *   外汇（FX）账户

    *   期权账户（一种衍生品）

    *   掉期账户（另一种衍生品）


    这些账户类型中的每一个都持有由其股票代码标识的金融工具的头寸（余额），例如代表国际商业机器公司的 IBM。


    最后，每天发生一笔或多笔交易，并更新账户的头寸（余额）。交易通过其类型和类别来识别。类型可以是我们刚才讨论的账户类型之一。在我们的场景中，类别要么是买入交易，要么是卖出交易。（为简单起见，我没有显示类别实体，因为它只有两个值。）


    最后，`Calendar` 实体标识交易中的交易日期。


    接下来，我们需要一组称为数据字典的文档，用于描述模型中的关键组件，在我们的例子中是实体及其之间的关系。


    表 [5-1](#527021_1_En_5_Chapter.xhtml#Tab1) 是一个简单的数据字典，描述了数据库中的每个表。


    表 5-1


    金融数据库表数据字典


    | 表名 | 描述 |

    | --- | --- |

    | `Account` | 用于跟踪客户账户中的交易余额。链接到 `Portfolio`。 |

    | `Account Versus Target` | 该实体用于跟踪账户实际余额与目标余额，以查看账户是否达标或未达标。 |

    | `Account Type` | 标识账户类型：权益、现金、外汇（FX）、商品或衍生品。 |

    | `Transaction` | 存储所有客户和交易类型的每日买卖交易。 |

    | `Transaction Type` | 标识交易类型：权益、现金、外汇（FX）、商品或衍生品。 |

    | `Transaction Account Type` | 将账户类型链接到交易类型。例如，TT00001（现金交易）链接到账户类型 AT00001，即现金余额账户。
    |

    | `Portfolio` | 记录以下投资组合类型的月度头寸：<br>FX - FINANCIAL PORTFOLIO<br>EQUITY - FINANCIAL
    PORTFOLIO<br>COMMODITY - FINANCIAL PORTFOLIO<br>OPTION - FINANCIAL PORTFOLIO<br>SWAP
    - FINANCIAL PORTFOLIO<br>CASH - FINANCIAL PORTFOLIO |

    | `Calendar` | 用于时间报告的基本日历日期对象（如日期、季度、月份和年份对象）。 |

    | `Country` | 包含世界上大多数国家的 ISO 双字符和三字符代码，例如 US 或 USA。 |

    | `Customer` | 用于存储客户名称和标识符的基本客户表。 |

    | `Customer Ticker Symbols` | 用于标识客户交易的股票代码。 |

    | `Ticker Symbols` | 标识金融交易工具股票代码的名称，例如代表美国铝业公司的 AA，以及代表 I/R（利率）掉期 10 年期的 SWAADY10.RT。
    |

    | `Ticker Price Range History` | 按日期存储 37 个示例股票代码的历史低点、高点和价差。例如：<br>股票代码： BSBR<br>公司：
    Banco Santander Brasil<br>股票代码日期： 2015-03-19<br>低点： 123.10<br>高点： 139.90<br>价差：
    16.80 |

    | `Ticker History` | 仅存储一个虚构股票代码 (GOITGUY) 的交易历史。用于示例。 |


    接下来，表 [5-2](#527021_1_En_5_Chapter.xhtml#Tab2) 是一个简单的数据字典，描述了数据库中表之间的关系。


    表 5-2


    金融表关系字典


    | 父表 | 业务规则 | 子表 | 基数 |

    | --- | --- | --- | --- |

    | `Customer` | 拥有 | `Portfolio` | 一对零、一或多 |

    | `Portfolio` | 由...组成 | `Account` | 一对零、一或多 |

    | `Account Type` | 标识...的类型 | `Account` | 一对零、一或多 |

    | `Account` | 可能是 | `Cash Account` | 一，零对一 |

    |   | 可能是 | `Equity Account` | 一，零对一 |

    |   | 可能是 | `Commodity Account` | 一，零对一 |

    |   | 可能是 | `FX Account` | 一，零对一 |

    |   | 可能是 | `Option Account` | 一，零对一 |

    |   | 可能是 | `Swap Account` | 一，零对一 |

    | `Account` | 指向一个 | `Instrument` | 一对零、一或多 |

    | `Instrument` | 由...标识 | `Ticker Symbol` | 一对一 |

    | `Transaction` | 更新 | `Account` | 零、一、多对一 |

    | `Transaction Type` | 标识...的类型 | `Transaction` | 一对零、一或多 |

    | `Calendar` | 标识...的日期 | `Transaction` | 一对零、一或多 |'
  raw: '## Aggregate Functions


    Aggregate functions coupled with the `OVER()` clause (so we can partition result
    sets) deliver a powerful set of tools. Recall that this category includes the
    following functions:


    *   COUNT() and COUNT_BIG()


    *   SUM()


    *   MAX()


    *   MIN()


    *   AVG()


    *   GROUPING()


    *   STRING_AGG()


    *   STDEV() and STDEVP()


    *   VAR() and VARP()


    But one thing to be aware of: If you use these with the `OVER()` clause, `DISTINCT`
    is not allowed as a keyword between parentheses! This will generate an error:
    `AVG(DISTINCT ...) OVER(...)`.


    Additionally, we will not review the `COUNT_BIG()` function again as it works
    just like the `COUNT()` function. The only difference is that it returns a `BIGINT`
    data type.


    By the way, the range for this data type is between **–**9,223,372,036,854,775,808
    and 9,223,372,036,854,775,807\. It requires 8 bytes of storage compared with the
    integer data type we have been using in our examples. This data type takes only
    4 bytes of storage, and the range of values is between **–**2,147,483,648 and
    2,147,483,647\. Impress your friends with these statistics (not).


    Back to our aggregate functions. These functions can be part of a toolkit that
    lets you analyze financial data and set up powerful scripts and reports for your
    users, analysts, financial advisors, and managers. Include them in stored procedures,
    and they can be called from SSRS (SQL Server Reporting Services) to create valuable
    reports for financial stakeholders.


    One thing to keep in mind as you go through this chapter is that financial data
    is characterized by large volumes of daily trade transactions and even larger
    volumes of historical trades. We are talking about hundreds of millions of trades
    a day for millions of customers depending on how large the financial institution
    is. For this reason, we need to keep performance analysis and tuning in mind so
    as to create powerful and fast queries. You might deal with billions of rows a
    year. I had to!


    In order to do this, we must be very familiar with the database we are working
    with **–** the size, the table contents, and the relationships between tables.


    Let’s start by taking some time to understand the data model of the database we
    will be working with. We will do this with a simple conceptual business model.


    Please refer to Figure [5-1](#527021_1_En_5_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig1_HTML.png)


    A block diagram presents the A P finance conceptual model. The accounts are identified
    by their type, cash account, equity account, commodity account, foreign exchange
    account, option account, and swap account.


    Figure 5-1


    Financial database physical data model


    This is called a conceptual model because it only identifies the high-level entities
    and relationships from a business perspective. This diagram can be understood
    by nontechnical analysts and management. They will have great input during the
    design phase of a database.


    Let’s walk through the entities and the relationships between them.


    A customer owns a portfolio, which is made up of accounts. Accounts are identified
    by their types. An account can be one of the following:


    *   Cash account


    *   Equity account


    *   Commodity account


    *   FX (foreign exchange) account


    *   Option account (a type of derivative)


    *   Swap account (another type of derivative)


    Each of these account types holds positions (balances) for financial instruments
    identified by their ticker symbol, like IBM for International Business Machines.


    Finally, one or more transactions occur daily and update the positions (balances)
    of the accounts. A transaction is identified by its type and category. The type
    can be one of the types we just discussed for accounts. The category in our scenario
    is either a buy or sell transaction. (For the sake of simplicity, I do not show
    a Category entity as it will have only two values.)


    Finally, the Calendar entity identifies the transaction date in a transaction.


    Next, we need a set of documents called data dictionaries that describe the key
    components in the model, in our case the entities and relationships between them.


    Table [5-1](#527021_1_En_5_Chapter.xhtml#Tab1) is a simple data dictionary describing
    each of the tables in the database.


    Table 5-1


    Financial Database Table Data Dictionary


    | Table Name | Description |

    | --- | --- |

    | Account | Used to track trading balances in a customer’s account. Links to Portfolio.
    |

    | Account Versus Target | This entity is used to track account actual balances
    vs. target balances to see if an account performed or underperformed. |

    | Account Type | Identifies the account type: equity, cash, FX (foreign exchange),
    commodity, or derivative. |

    | Transaction | Stores daily buy and sell transactions for all customers and transaction
    types. |

    | Transaction Type | Identifies transaction type: equity, cash, FX (foreign exchange),
    commodity, or derivative. |

    | Transaction Account Type | Links account types to transaction types. For example,
    TT00001 (cash transaction) links to account type AT00001, which is a cash balance
    account. |

    | Portfolio | Records monthly positions for the following portfolio types:FX -
    FINANCIAL PORTFOLIOEQUITY - FINANCIAL PORTFOLIOCOMMODITY - FINANCIAL PORTFOLIOOPTION
    - FINANCIAL PORTFOLIOSWAP - FINANCIAL PORTFOLIOCASH - FINANCIAL PORTFOLIO |

    | Calendar | Basic calendar date objects used for time reporting (like date, quarter,
    month, and year objects). |

    | Country | Contains ISO two- and three-character codes for most of the world’s
    countries, for example, US or USA. |

    | Customer | Basic customer table used to store names of the customers and identifiers.
    |

    | Customer Ticker Symbols | Used to identify the ticker symbols a customer trades
    in. |

    | Ticker Symbols | Identifies name of a financial trading instrument ticker, for
    example, AA for Alcoa and SWAADY10.RT for I/R (interest rate) Swap 10-Year. |

    | Ticker Price Range History | Stores historical lows, highs, and spreads for
    37 sample ticker symbols by date. For example:Ticker BSBRCompany: Banco Santander
    BrasilTicker Date: 2015-03-19Low: 123.10High: 139.90Spread: 16.80 |

    | Ticker History | Stores history of trades for one fictitious ticker symbol only
    (GOITGUY). Used for an example. |


    Next, Table [5-2](#527021_1_En_5_Chapter.xhtml#Tab2) is a simple data dictionary
    describing each of the relationships between the tables in the database.


    Table 5-2


    Financial Table Data Dictionary


    | Parent Table | Business Rule | Child Table | Cardinality |

    | --- | --- | --- | --- |

    | Customer | Owns a | Portfolio | One to zero, one, or many |

    | Portfolio | Is made up of | Account | One to zero, one, or many |

    | Account Type | Identifies type of | Account | One to zero, one, or many |

    | Account | May be a | Cash Account | One, zero to one |

    |   | May be a | Equity Account | One, zero to one |

    |   | May be a | Commodity Account | One, zero to one |

    |   | May be a | FX Account | One, zero to one |

    |   | May be a | Option Account | One, zero to one |

    |   | May be a | Swap Account | One, zero to one |

    | Account | Refers to an | Instrument | One to zero, one, or many |

    | Instrument | Is identified by | Ticker Symbol | One to One |

    | Transaction | Updates | Account | Zero, one, many to one |

    | Transaction Type | Identifies type of | Transaction | One to zero, one, or many
    |

    | Calendar | Identifies date of | Transaction | One to zero, one, or many |'
  trans: '## 聚合函数


    聚合函数与 `OVER()` 子句（因此我们可以对结果集进行**分区**）结合使用，提供了一套强大的工具。回想一下，此类别包含以下函数：


    *   `COUNT()` 和 `COUNT_BIG()`

    *   `SUM()`

    *   `MAX()`

    *   `MIN()`

    *   `AVG()`

    *   `GROUPING()`

    *   `STRING_AGG()`

    *   `STDEV()` 和 `STDEVP()`

    *   `VAR()` 和 `VARP()`


    但有一点需要注意：如果将这些函数与 `OVER()` 子句一起使用，括号之间不允许使用 `DISTINCT` 作为关键字！这将产生错误：`AVG(DISTINCT
    ...) OVER(...)`。


    另外，我们将不再回顾 `COUNT_BIG()` 函数，因为它的工作方式与 `COUNT()` 函数完全相同。唯一的区别在于它返回 `BIGINT` 数据类型。


    顺便说一下，这种数据类型的范围在 **-**9,223,372,036,854,775,808 和 9,223,372,036,854,775,807 之间。与我们在示例中使用的整数数据类型相比，它需要
    8 字节的存储空间。该数据类型仅需 4 字节存储空间，其值范围在 **-**2,147,483,648 和 2,147,483,647 之间。用这些统计数据给你的朋友们留下深刻印象吧（其实并没有）。


    回到我们的聚合函数。这些函数可以成为工具集的一部分，让你能够分析金融数据，并为你的用户、分析师、财务顾问和经理建立强大的脚本和报告。将它们包含在存储过程中，就可以从
    SSRS（SQL Server Reporting Services）中调用，为财务利益相关者创建有价值的报告。


    在学习本章时要记住的一点是，金融数据的特点是每日交易量巨大，历史交易量更是庞大。根据金融机构的规模，我们谈论的是每天数亿笔交易，涉及数百万客户。因此，我们需要牢记性能分析和调优，以创建强大而快速的查询。你每年可能要处理数十亿行数据。我就曾经不得不这样！


    为了做到这一点，我们必须非常熟悉我们正在使用的数据库 **–** 其大小、表内容以及表之间的关系。


