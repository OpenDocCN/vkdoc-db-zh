  trans: '## LAG( ) 函数


    让我们首先从 `LAG()` 函数开始。我们的分析师为我们发送了以下报告规范：


    我希望在同一份报告中看到本月和上月的账户余额。结果需要按年份、月份、客户标识符、投资组合编号以及账户编号和名称进行分组。结果需要针对大于或等于 2013 年的数据。最后，我希望看到本月数值与上月数值之间的差异，以便观察余额是增加了还是减少了。


    我们使用与之前示例相同的 `CTE`，因此我不会在清单中重复它。这可能是将 `CTE` 转换为报告表（假设每月加载一次）的一个好候选方案。我们拭目以待。请参考清单
    7-5。


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    ) AS LastMonthBalance

    ,AcctBalance -

    (

    LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    )

    ) AS Change

    FROM MonthlyAccountBalances

    WHERE AcctYear >= 2013

    GO

    ```

    清单 7-5

    使用 `LAG()` 计算上月余额


    `LAG()` 函数使用一个 `OVER()` 子句，该子句包含一个 `PARTITION BY` 子句和一个 `ORDER BY` 子句。分区由客户、年份和账户名称定义。分区的结果集按账户月份升序排序。还有一个
    `WHERE` 子句，它按年份大于或等于 2013 来筛选结果。


    请参考图 7-12 中的部分结果。


    ![](img/527021_1_En_7_Fig13_HTML.jpg)


    一个 S S M S 窗口的截图。其中有一个包含 10 列和 181 行的表格。列标题是客户 I D、账户年份、账户月份、投资组合编号、账户编号、账户余额、上月余额和变化。两个箭头指向第
    1 行和第 2 行的账户余额。


    图 7-12


    用于当月和上月分析的账户余额


    报告运行正确。我们看到了当月和上月的余额以及余额之间的差异。让我们将这些结果（仅针对现金账户和 2013 年的数据）放入 Microsoft Excel 电子表格图表中。


    请参考图 7-13 中的 Excel 图表截图。


    ![](img/527021_1_En_7_Fig14_HTML.png)


    一个 M S Excel 窗口的截图。其中有一个包含 4 列和 13 行的表格。列标题是月份、余额、上月和变化。它有一个余额与月份关系的折线图，有 3 条波动的水平线分别代表余额、上月和变化。上月的曲线最初呈上升趋势。


    图 7-13


    用于当月和上月分析的账户余额图表


    直观地看，我们可以看到这个账户在最初跃升后，每月保持在约 $35,000 的水平。余额似乎有轻微的上升趋势，每月的变化大约在 -$5000 到 +$5000
    之间。


    最后一个事项，为了查看跨所有年份的滚动值，请使用以下代码片段修改 `OVER()` 子句：


    ```sql

    ,LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctName

    ORDER BY CustId,AcctYear,AcctMonth,AcctName

    ) AS LastMonthBalance

    ,AcctBalance -

    (

    LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctName

    ORDER BY CustId,AcctYear,AcctMonth,AcctName

    )

    ) AS Change

    ```


    你需要对 `PARTITION BY` 和 `ORDER BY` 子句进行细微的修改。


    这里出现了一个问题：


    参考前面的代码片段，计算当前账户余额与上月账户余额之间差异的方式是否高效，还是会对性能产生负面影响？


    让我们来看看。


    ## 性能考量


    让我们以常规方式生成基线估计执行计划，可以通过菜单栏中的查询选择或估计执行计划图标，你喜欢哪种方法都可以。


    请参考图 7-14。


    ![](img/527021_1_En_7_Fig15_HTML.png)


    一个 S S M S 窗口的截图。它展示了一个包含 9 个组件的基线估计执行计划。组件是窗口假脱机、段、计算标量、序列项目、段、流聚合、排序、计算标量和表扫描。


    图 7-14


    `LAG()` 查询的基线估计执行计划


    从右向左读，我们有一个良好的开端。我们看到一个索引扫描占 11% 的成本，但接着我们看到一个昂贵的排序操作占 84% 的成本。两者之间的计算标量任务用于从
    `PostDate` 列中提取年份和月份。排序任务用于 `CTE` 中的 `GROUP BY` 子句。


    让我们尝试报告表方法。我使用 `CTE` 查询在一个名为 `FinancialReports.` 的新模式中创建了一个报告表。另外，我们将创建两个索引：一个是聚集索引，一个是非聚集索引。


    请参考清单 7-6。


    ```sql

    CREATE SCHEMA FinancialReports

    GO

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,SUM(AcctBalance) AS AcctBalance

    INTO FinancialReports.AccountClustered

    FROM Financial.Account

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    GO

    ```

    清单 7-6

    创建账户月度余额报告表


    此批处理脚本使用 `SELECT/INTO` 命令动态创建表。章节脚本代码包含了使用 `INSERT` 命令的截断/加载表。


    清单 7-7 是两个索引，希望能帮助消除计划中昂贵的排序步骤。


    ```sql

    CREATE CLUSTERED INDEX ieYearMonthCustIdPrtfNoAcctNoAcctName

    ON FinancialReports.AccountClustered (

    [AcctYear],[AcctMonth],[CustId],[PrtfNo],[AcctNo],[AcctBalance]

    )

    GO

    CREATE INDEX ieCustIdAcctYearAcctMonthAcctNameAcctName

    ON FinancialReports.AccountClustered (

    [CustId],[AcctYear],[AcctName],[AcctMonth]

    )

    GO

    ```

    清单 7-7

    创建聚集和非聚集索引


    清单 7-8 是修改后的查询，因此它访问新的报告表。结果是相同的，因此我不会显示输出截图（进行修改时务必检查——你永远不知道会发生什么）。


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    ) AS LastMonthBalance

    ,AcctBalance -

    (

    LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    )

    ) AS Change

    FROM FinancialReports.AccountClustered

    WHERE AcctYear >= 2013

    GO

    ```

    清单 7-8

    使用带有聚集和非聚集索引的账户报告表


    让我们比较原始查询和报告表版本的查询计划。


    请参考图 7-15。


    ![](img/527021_1_En_7_Fig16_HTML.png)


    一个 S S M S 窗口的截图。它展示了 C T E 查询和报告表查询计划，分别有 13 个和 10 个组件。计算标量、流聚合、窗口假脱机、序列项目和段的成本对于
    C T E 和报告表查询分别是 0%、1%、3%、0%、0% 和 1%、4%、15%、4%、1%。


    图 7-15


    CTE 查询 vs. 报告表查询计划


    在原始估计查询计划中的计算标量 (0%)、排序 (84%) 和流聚合 (1%) 任务，在带有新报告表的新计划中被消除了。步骤更少是好事！'
- fmt: '# 性能计划分析与比较


    在新计划中，索引扫描从11%上升到75%，段任务从0%上升到1%，序列项目从0%上升到4%，计算标量从0%上升到1%，窗口假脱机从3%上升到15%。最后，流聚合从1%上升到4%，最后一个计算标量从0%上升到1%。


    虽然任务被消除了，但改进看起来并不乐观。


    让我们比较两个版本查询的`IO`和`TIME`统计信息。


    请参阅图[7-16](#527021_1_En_7_Chapter.xhtml#Fig17)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig17_HTML.png)


    图 7-16

    比较IO和TIME统计信息


    我用箭头标记了我们应该关注的统计信息：


    *   SQL Server解析和编译时间从49毫秒增加到167毫秒。

    *   SQL Server执行时间从322毫秒减少到200毫秒。


    以下是高价值统计信息：


    *   Account表的逻辑读取从328次减少到14次。

    *   Account表的物理读取从3次减少到1次。

    *   Account表的预读读取从324次减少到19次。


    总的来说，这些统计信息确实显示了性能的改进，即使查询计划有些不确定。


    让我们对`LEAD()`函数使用相同的逻辑。


    ## LEAD() 函数


    现在让我们看看`LAG()`的对应函数，`LEAD()`函数。我们的分析师为下一个报告提供了以下业务需求：


    修改之前的查询，使得这次报告显示当前月份的账户余额和明年同一月份的账户余额，针对所有客户。从2013年开始，包括之后的所有年份。结果应仅针对现金账户，并且报告需要按客户ID、年份、月份以及账户编号和名称进行分组。


    请参阅清单[7-9](#527021_1_En_7_Chapter.xhtml#PC14)。


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LEAD(AcctBalance,12,0) OVER (

    PARTITION BY CustId

    ORDER BY AcctName,AcctYear,AcctMonth

    ) AS NextYearBalance

    FROM MonthlyAccountBalances

    WHERE AcctYear >= 2013

    AND AcctNAme = ''CASH''

    GO

    ```

    清单 7-9

    月度账户余额分析，本年 vs. 明年


    这次除了列名之外，我们还需要向`LEAD()`函数传递一些参数。我们还传递了值12作为向前查看的月份数，最后一个参数定义了当没有更多行时函数返回什么。在这种情况下，函数将返回0而不是`NULL`。


    分区设置为客户ID，即每个客户一个分区，分区内行按账户名、账户年份和账户月份排序。`WHERE`子句筛选器提取2013年及之后的数据，并且我们只关注现金账户。


    **小测验**

    如果我们要查看所有账户类型，如何修改查询？`OVER()`子句需要任何更改吗？


    让我们看看图[7-17](#527021_1_En_7_Chapter.xhtml#Fig18)中的部分结果。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig18_HTML.jpg)


    图 7-17

    当年和次年月度账户余额分析报告


    看起来它工作正常。第一行的次年余额指向第13行，即2014年1月的数据。因此我们向前看了一年。其余行的值正确地指向了下一年的值。尝试在章节脚本中下载此查询并进行修改，以便我们看到月份缩写而不是数字。同时，包含一个计算，用于显示本月余额与次年同一月份余额之间的差值。


    **小测验答案**

    移除`WHERE`子句中的筛选谓词，并在`OVER()`子句的`PARTITION BY`子句中包含账户类型。


    ## 性能考虑


    图[7-18](#527021_1_En_7_Chapter.xhtml#Fig19)是我们刚才讨论的查询的基线估计查询性能计划。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig19_HTML.png)


    图 7-18

    LEAD() 函数查询的估计查询计划


    我们现在多次看到这种模式，索引查找或表扫描后跟排序任务。在这种情况下，索引查找（由`WHERE`子句引起）成本为18%，排序成本为70%。突出的是窗口假脱机任务占5%。通常我们看到1%，但似乎此函数在此特定查询中做了大量工作。让我们收集更多统计信息。


    请参阅图[7-19](#527021_1_En_7_Chapter.xhtml#Fig20)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig20_HTML.png)


    图 7-19

    LEAD() 函数查询的IO和TIME统计信息


    从底部开始，此查询的SQL Server执行时间统计如下：


    *   CPU时间：15毫秒

    *   已用时间：215毫秒


    工作表的所有值均为0，但Account表具有以下统计信息：


    *   扫描计数：1

    *   逻辑读取：56

    *   物理读取：2

    *   预读读取：53


    看起来有一些`IO`在进行。让我们看看`STATISTICS PROFILE`统计信息。


    请参阅图[7-20](#527021_1_En_7_Chapter.xhtml#Fig21)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig21_HTML.png)


    图 7-20

    LEAD() 函数查询的配置文件统计信息


    查看这些统计信息，我们看到`EstimateIO`统计信息几乎全为零，这包括窗口假脱机。窗口假脱机成本为5%，尽管`EstimateIO`统计信息为零。窗口假脱机成本用于以下解释分区默认`ROWS`框架子句的逻辑：


    ```sql

    --Window Spool(ROWS BETWEEN:([TopRowNumber1016], [BottomRowNumber1017]))

    ```


    最后，`EstimateCPU`成本较低，`TotalSubtreeCost`值大约各为0.2。看起来没有太多可以改进的地方，因为索引已存在并被使用。也许我们可以通过修改逻辑来改进性能，使得账户数据可以通过内存增强表加载到内存中。'
  raw: 'In the new plan though, the index scan went up to 75% from 11%, the segment
    task went up to 1% from 0%, the sequence project went up to 4% from 0%, the compute
    scalar went up to 1% from 0%, and the window spool went up to 15% from 3%. Lastly,
    the stream aggregate went up to 4% from 1%, and the last compute scalar went up
    to 1% from 0%.


    Although tasks were eliminated, the improvement does not look promising.


    Let’s compare the `IO` and `TIME` statistics between both versions of the query.


    Please refer to Figure [7-16](#527021_1_En_7_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig17_HTML.png)


    A screenshot of the S S M S window. The text presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 16, 49, and 0, 167 milliseconds
    for 1 and 2\. Execution times for C P U and elapsed are 156, 322, and 0, 200 milliseconds
    for 1 and 2\. 1080 rows are affected.


    Figure 7-16


    Comparing IO and TIME statistics


    I marked the statistics we should pay attention to with arrows:


    *   SQL Server parse and compile times went up from 49 ms to 167 ms.


    *   SQL Server execution times went down from 322 ms to 200 ms.


    The following are the high-value statistics:


    *   Account table logical reads went from 328 to 14.


    *   Account table physical reads went from 3 to 1.


    *   Account table read-ahead reads went from 324 to 19.


    Over all these statistics do show an improvement in performance even though the
    query plans were a bit inconclusive.


    Let’s use the same logic with the `LEAD()` function.


    ### LEAD( ) Function


    Let’s now look at `LAG()`’s counterpart, the `LEAD()` function. Our analyst has
    supplied the following business requirements for this next report:


    Modify the prior query so that this time the report shows the current month’s
    account balance and the next year’s account balance for the same month for all
    customers. Start at year 2013 and include all years after that. The results should
    be for the cash account only, and the report needs to be grouped by customer ID,
    year, month, and account number and name.


    Please refer to Listing [7-9](#527021_1_En_7_Chapter.xhtml#PC14).


    ```

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LEAD(AcctBalance,12,0) OVER (

    PARTITION BY CustId

    ORDER BY AcctName,AcctYear,AcctMonth

    ) AS NextYearBalance

    FROM MonthlyAccountBalances

    WHERE AcctYear >= 2013

    AND AcctNAme = ''CASH''

    GO

    Listing 7-9

    Monthly Account Balance Analysis, Current Year vs. Next Year

    ```


    This time we need to pass some parameters to the `LEAD()` function besides the
    column name. We also pass the value 12 as the number of months to look forward,
    and the last parameter defines what the function returns when there are no more
    rows. In this case the function will return 0 instead of `NULL`.


    The partition is set to customer ID, that is, we will have one partition per customer,
    and the rows in the partition are sorted by account name, account year, and account
    month. The `WHERE` clause filter pulls rows for years 2013 onward, and we are
    only interested in the cash account.


    Pop Quiz


    How do we modify the query if we want to see all the account types? Any changes
    required in the `OVER()` clause?


    Let’s look at the partial results in Figure [7-17](#527021_1_En_7_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig18_HTML.jpg)


    A screenshot of the S S M S window. It has a table of 8 columns and 181 rows.
    The column headers are customer I D, account year, account month, account number,
    account name, account balance, and new year balance. 2 arrows point towards account
    balance, and new year balance columns.


    Figure 7-17


    Current and next year’s monthly account balance analysis report


    Looks like it works. The next year’s balance for the first row points to row 13,
    which is for January 2014\. So we looked forward a year. The remaining row values
    point to the next year’s values correctly. Try to download this query in the chapter
    script and modify it so we see the month abbreviations instead of numbers. Also
    include a calculation for the difference between this month’s balance and next
    year’s balance for the same month.


    Pop Quiz Answer


    Remove the filter predicate in the `WHERE` clause and include the account type
    in the `PARTITION BY` clause in the `OVER()` clause.


    Performance tuning time.


    ### Performance Considerations


    Figure [7-18](#527021_1_En_7_Chapter.xhtml#Fig19) is our baseline estimated query
    performance plan for the query we just discussed.


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig19_HTML.png)


    A screenshot of the S S M S window. It presents an estimated execution plan with
    9 components. The components are window spool, segment, compute scalar, sequence
    project, segment, stream aggregate, sort, compute scalar, and index seek.


    Figure 7-18


    Estimated query plan for the LEAD() function query


    We have seen this pattern many times now, the index seek or table scan followed
    by a sort task. In this case the index seek (caused by the `WHERE` clause) is
    at 18% cost, and the sort comes in at 70%. What stands out is the window spool
    task at 5%. Usually, we see 1%, but seems like this function does a lot of work
    in this particular query. Let’s collect some more statistics.


    Please refer to Figure [7-19](#527021_1_En_7_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig20_HTML.png)


    A screenshot of the S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 0 milliseconds.
    The S Q L server execution times for C P U and elapsed are 15 and 215 milliseconds.
    180 and 12 rows are affected.


    Figure 7-19


    IO and TIME statistics for the LEAD() function query


    Starting at the bottom, this query has the following statistics for SQL Server
    execution times:


    *   CPU time: 15 ms


    *   Elapsed time: 215 ms


    There are all 0 values for the work table, but the Account table has the following
    statistics:


    *   Scan count: 1


    *   Logical reads: 56


    *   Physical reads: 2


    *   Read-ahead reads: 53


    Looks like some `IO` is going on. Let’s look at the `STATISTICS PROFILE` statistics.


    Please refer to Figure [7-20](#527021_1_En_7_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig21_HTML.png)


    A screenshot of the S S M S window. It has a table of 13 columns and 13 rows.
    The column headers are logical O p, argument, defined values, estimate rows, estimate
    I O, estimate C P U, average row size, total subtree cost, output list, warnings,
    type, and parallel.


    Figure 7-20


    Profile statistics for the LEAD() function query


    Looking at these statistics, we see almost all zero values for the `EstimateIO`
    statistics, which include the window spool. The window spool cost is 5% although
    the `EstimateIO` statistic is zero. The window spool cost is for the following
    logic that explains the default `ROWS` frame clause for the partition:


    ```

    --Window Spool(ROWS BETWEEN:([TopRowNumber1016], [BottomRowNumber1017]))

    ```


    Finally, the `EstimateCPU` costs are low, and the `TotalSubtreeCost` values are
    approximately .2 each. Looks like there is not much that can be done as an index
    was available and used. Maybe we can improve performance by modifying the logic
    so that the account data can be loaded in memory via a memory-enhanced table.'
