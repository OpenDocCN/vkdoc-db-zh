- fmt: '### DENSE_RANK( ) Function


    Our business analyst wants to compare rankings, using the `RANK()` function and
    the `DENSE_RANK()` function. Also, the month needs to be spelled out instead of
    just a number. Lastly, we want to generate a report for the year 2002 and for
    valve `P1L1VLV 1` in plant 1, location 1. Seems like it has been giving the engineers
    a bit of trouble.


    The query, once tested, needs to be expanded to include all years, plants, and
    locations so we can pop the results onto a Microsoft Excel pivot table (which
    you will do as a homework exercise, surprise!).


    Decoding the equipment ID tells us the valve is in plant 1, the North Plant, and
    location 1, the boiler room. We are interested in all status descriptions.


    We want to use the prior new report table, and we want to spell out the quarter
    name. Sadly our little `Calendar` table does not have the quarters spelled out,
    so we need to compensate with an inline table, which we will find out is the wrong
    direction to take.


    #### Homework


    Using the DDL code for this chapter, see if you can modify the `Calendar` dimension
    so it uses more verbose names for quarters and months instead of just numbers.


    Sometimes, when designing a query, one makes assumptions as to the logic just
    to later find out there is a simpler solution! We will see that this is the case
    shortly!


    Please refer to Listing 9-6.


    ```sql

    SELECT

    EMOLS.PlantName

    ,EMOLS.LocationName

    ,EMOLS.ReportYear

    ,MSC.CalendarQuarter AS ReportQuarter

    ,EMOLS.[MonthName] AS ReportMonth

    ,EMOLS.StatusCount

    ,EMOLS.EquipOnlineStatusCode

    ,EMOLS.EquipOnLineStatusDesc

    -- skips next value in sequence in case of ties

    ,RANK()  OVER (

    PARTITION BY EMOLS.PlantName,EMOLS.LocationName --,EMOLS.ReportYear,

    EMOLS.EquipOnlineStatusCode

    ORDER BY EMOLS.StatusCount DESC

    ) AS FailureRank

    -- preserves sequence even with ties

    ,DENSE_RANK()  OVER (

    PARTITION BY EMOLS.PlantName,EMOLS.LocationName --,EMOLS.ReportYear,

    EMOLS.EquipOnlineStatusCode

    ORDER BY EMOLS.StatusCount DESC

    ) AS FailureDenseRank

    FROM Reports.EquipmentMonthlyOnLineStatus EMOLS

    INNER JOIN (

    SELECT DISTINCT [CalendarYear]

    ,[CalendarQuarter]

    ,CASE

    WHEN CalendarMonth = 1 THEN ''Jan''

    WHEN CalendarMonth = 2 THEN ''Feb''

    WHEN CalendarMonth = 3 THEN ''Mar''

    WHEN CalendarMonth = 4 THEN ''Apr''

    WHEN CalendarMonth = 5 THEN ''May''

    WHEN CalendarMonth = 6 THEN ''Jun''

    WHEN CalendarMonth = 7 THEN ''Jul''

    WHEN CalendarMonth = 8 THEN ''Aug''

    WHEN CalendarMonth = 9 THEN ''Sep''

    WHEN CalendarMonth = 10 THEN ''Oct''

    WHEN CalendarMonth = 11 THEN ''Nov''

    WHEN CalendarMonth = 12 THEN ''Dec''

    END AS CalendarMonthName

    FROM [DimTable].[Calendar]

    ) AS MSC

    ON (

    EMOLS.ReportYear = MSC.CalendarYear

    AND EMOLS.MonthName = MSC.CalendarMonthName

    )

    WHERE EMOLS.ReportYear = 2002

    AND EMOLS.EquipmentId = ''P1L1VLV1''

    GO

    ```


    Listing 9-6

    `RANK()` vs. `DENSE_RANK()` Report


    First things first, notice I commented out the year column in both `PARTITION
    BY` clauses. Remember, this report will be expanded to include all years, so it
    can be uncommented when you try it out and load the data into Microsoft Excel
    for the pivot table.


    Next, we see that we are trying to satisfy the requirement by joining to the `Calendar`
    dimension and generating the quarter names via an inline table, the first thing
    that came to mind but the wrong design although it looks slick if you like complex
    code that overcomplicates the solution!


    Finally, for both the `RANK()` and `DENSE_RANK()` functions, both the `PARTITION
    BY` and `ORDER BY` clauses are the same. The partition is created by plant name,
    location name, report year, and equipment online status code. The partition is
    ordered by the status count value in descending order.


    #### Pop Quiz


    Why is the inline table a bad solution?


    Let’s see the results in Figure 9-15.


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig15_HTML.png)


    Figure 9-15

    Results using the inline table


    A screenshot of the s q l work area. The upper half of the window represents the
    codes. The lower half represents the table. The inboxed region depicts the failure
    risk and failure density for the first 12 entries.


    Results look correct. October 2002 was the best month in terms of the times equipment
    was online. February was the worst month. Notice the familiar pattern between
    the `RANK()` and `DENSE_RANK()` functions when duplicates occur. Let’s see the
    performance landscape for this query.


    Let’s look at a simple graph to see the trends in the three categories of equipment
    online/offline status. Please refer to Figure 9-16.


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig16_HTML.png)


    Figure 9-16

    Online trends


    A screenshot of the Excel sheet. The window represents the menu bar at the top.
    The main screen represents the status on the left side and a multi-line graph
    for offline fault, offline maintenance, and online values from January to December.


    The good news is that this plant seems to have a good record of online equipment.
    Offline for maintenance seems a bit high but not too bad, and offline status for
    faults is around an average of 50.


    **提示：**

    I had to do a bit of formatting after I copied and pasted the results from the
    SQL Server SSMS query plane to Excel, so when you write your queries, think ahead
    as to how you will use the results, so you minimize the formatting and renaming
    of columns in the spreadsheet.


    The first time I ran this query, it took five seconds. Running it a second time,
    it ran in under one second, so this is a good example where the data was cached
    and you need to use `DBCC` to clear cache each time you run `IO` and `TIME` statistics
    to evaluate performance. If you do not run `DBCC`, you will get misleading statistics!'
