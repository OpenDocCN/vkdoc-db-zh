  trans: '

    ### `LAG()` 与 `LEAD()`


    这些是在您的编程工具箱中用于分析数据时非常重要的函数。您的业务分析师所执行的活动之一，是在本质上属于历史的数据集中，进行回顾性或前瞻性的观察。当然，这些数据可能是一个包含当前和过去数据、但不包含未来数据的快照。这些函数允许您创建强大的查询和报告来实现这一目标。


    `LAG()` 函数的功能如下：


    此函数用于获取当前行某一列值之前某一行的列值。例如，给定某产品本月的销售额，获取该产品上个月的销售额，或者指定某个偏移量，比如三个月前甚至一年或更久以前，这取决于您收集了多少历史数据以及您的业务用户希望看到什么。


    `LEAD()` 函数的功能如下：


    此函数用于获取当前行某一列值之后某一行的列值。例如，给定某产品本月的销售额，获取该产品下个月的销售额或者指定某个偏移量，比如三个月后甚至一年后。


    这些函数在需要分析历史销售业绩或当前业绩与过去业绩对比的销售场景中尤为方便。


    现在我们有了一个内存优化表，我们将用它来代替本章大部分示例中使用的`CTE`方案。性能应该会非常快！


    请参考代码清单 3-14。


    ```

    SELECT

    SalesYear,

    SalesQuarter,

    SalesMonth,

    StoreNo,

    ProductNo,

    CustomerNo,

    CalendarDate AS SalesDate,

    SalesTotal,

    LAG(SalesTotal) OVER (

    PARTITION BY SalesYear,CustomerNo

    ORDER BY SalesMonth,CustomerNo,CalendarDate

    ) AS LastMonthlySales,

    LEAD(SalesTotal) OVER (

    PARTITION BY SalesYear,CustomerNo

    ORDER BY SalesMonth,CustomerNo,CalendarDate

    ) AS NextMonthylSales

    FROM [SalesReports].[MemorySalesTotals]

    WHERE StoreNO = ''S00005''

    AND SalesYear = 2002

    GO

    ```


    **代码清单 3-14**

    运行中的 `LAG()` 和 `LEAD()` 函数


    这一次，我们加入了商店编号和年份的过滤条件来运行查询。该查询生成了 902 行（就 SQL Server 而言，这仍然不算多行）。


    执行时间不到一秒。请参考图 3-13 中的部分结果。


    ![](img/527021_1_En_3_Fig13_HTML.png)


    第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了一个结果表。该表有 9 列。“上月销售额”和“下月销售额”列的部分值被高亮显示。


    **图 3-13**

    测试脚本的查询结果


    我向下滚动了一点，这样当窗口框架移动到下一个分区时，您可以看到数据模式。注意红色箭头。我们可以看到 `LastMonthlySales` 列指向了前一个月的值，而
    `NextMonthlySales` 列指向了 `SalesTotal` 列中下个月的值。


    我们可以在第 41 行和第 42 行看到窗口框架的动作。当下个月的销售额在分区变更时被设置为 `NULL`，第 42 行的前一个月的销售额值也是 `NULL`，因为我们正在开始一个新的分区（请记住分区与分区内窗口框架之间的区别）。


    下载脚本并移除年份的过滤条件，这样您就能获得该商店所有年份的数据。如果您不仅需要所有年份，还需要所有商店的数据，您可能需要稍微调整一下排序顺序，以便所有内容正确对齐。


    这就是为什么我总是建议在创建复杂的脚本或查询时，从一个小型数据集开始。当您确定它工作正确时，您可以通过移除任何过滤器来扩大范围。


    ### 性能考量


    接下来，我们将看看与这些函数相关的性能问题以及一些可能的提高性能的解决方案。和往常一样，我们的第一步是按照通常的方式创建一个估计的查询计划。请确保首先运行
    `DBCC` 命令来清除缓冲区。


    请参考图 3-14 查看估计的执行计划。


    ![](img/527021_1_En_3_Fig14_HTML.jpg)


    第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了查询成本信息。排序成本，1%。筛选成本，15%。表扫描成本，78%。


    **图 3-14**

    估计执行计划


    此估计查询计划显示该查询需要关注。


    从右向左读取，我们看到一个成本为 78%的表扫描，接着是一个成本为 15%的筛选，然后是一个成本仅为 5%的排序步骤。系统建议了一个索引，因此我们把它提取出来并为其命名。


    请参考代码清单 3-15 查看建议的索引。


    ```

    ALTER TABLE [SalesReports].[MemorySalesTotals]

    ADD INDEX ieSalesYearStoreNo

    NONCLUSTERED ([SalesYear],[StoreNo])

    GO

    ```


    **代码清单 3-15**

    估计查询计划工具建议的索引


    请注意，我们必须使用 `ALTER` 命令，因为内存增强表不支持 `CREATE INDEX` 命令！


    此索引基于销售年份和商店编号列。让我们创建它，再次运行 `DBCC` 命令，并生成一个新的估计查询计划。


    请参考图 3-15 查看索引创建后的估计计划。


    ![](img/527021_1_En_3_Fig15_HTML.jpg)


    第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了查询成本信息。排序成本，15%。索引查找成本，36%。


    **图 3-15**

    索引创建后的估计查询计划


    一个成本为 36%的索引扫描取代了原来成本为 78%的表扫描，因此我们有了一个良好的开端。筛选任务消失了，但排序步骤的成本从 5%增加到了 51%。看来，当我们使用索引查找时，排序步骤的成本又上升了。让我们通过向左滚动来查看计划的第二部分。


    请参考图 3-16。


    ![](img/527021_1_En_3_Fig16_HTML.png)


    第 03 章 T-SQL 代码窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕显示了查询成本信息。窗口假脱机成本，5%。窗口假脱机成本，5%。


    **图 3-16**

    估计查询计划的左侧部分


    再次从右向左看，注意第一个窗口假脱机任务。它的成本是 5%，用于在分区（位于内存中）内多次引用数据。还有一些其他低成本任务，我们看到了第二个窗口假脱机任务。这也有
    5%的成本。需要记住的一点是：我们应该力争使窗口假脱机任务的成本为 0%。这意味着操作在内存中进行。如果值大于零，则假脱机活动在磁盘上进行。（更多内存会有帮助吗？）


    索引创建后，最终的 `IO` 和 `TIME` 统计数据如下。查询运行了两次。每次都执行了 `DBCC` 命令来清除内存缓冲区（一个小提醒…）。


    请参考表 3-5。


    **表 3-5**

    `LAG()` 和 `LEAD()` 函数的 IO 和 TIME 统计数据

    '
- fmt: "# SQL Server 性能与百分位数函数解析\n\n| SQL Server Parse and Compile Times | First Run\
    \ | Second Run |\n| --- | --- | --- |\n| CPU time (ms) | `16` | `0` |\n| Elapsed\
    \ time (ms) | `76` | `39` |\n| **Statistics (Work Table)** | **First Run** | **Second\
    \ Run** |\n| Scan count | 0 | 0 |\n| Logical reads | 0 | 0 |\n| Physical reads\
    \ | 0 | 0 |\n| Read-ahead reads | 0 | 0 |\n| **Memory Table** | **First Run**\
    \ | **Second Run** |\n| Scan count | N/A | N/A |\n| Logical reads | N/A | N/A\
    \ |\n| Physical reads | N/A | N/A |\n| Read-ahead reads | N/A | N/A |\n| | N/A\
    \ | N/A |\n| **SQL Server Execution Times** | **First Run** | **Second Run** |\n\
    | CPU time (ms) | 31 | 31 |\n| Elapsed time (ms) | `174` | `121` |\n\n看来这个查询非常快，执行时间在毫秒的两位数级别。第二次运行的解析时间下降了，`work\
    \ table`的统计全是零，而`memory table`没有统计信息（这很合理，因为表在内存中）。最后看执行时间，`CPU`时间保持在31毫秒不变，而`Elapsed\
    \ time`统计从174毫秒下降到了121毫秒。\n\n## `PERCENTILE_CONT()` 与 `PERCENTILE_DISC()`\n\n\
    这两个函数是做什么的？\n\n`PERCENTILE_CONT()`函数基于给定的百分位数，在连续数据集上工作，返回满足该百分位数的数据集内的一个值（你需要提供一个百分位参数，如`.25`、`.5`、`.75`等）。\n\
    \n对于这个函数，值是**插值**出来的。它通常不存在于数据集中，而是被引入的。或者巧合地，如果数字排列正确，它也可能使用数据集中的某个值。\n\n到底什么是连续数据？简单地说，它是随特定时间段变化的数据，例如，某个产品在时间段内的销售额，比如一个月内的总销售额。\n\
    \n`PERCENTILE_DISC()`函数基于给定的百分位数，在离散数据集上工作，返回满足该百分位数的数据集内的一个值。对于这个函数，该值存在于数据集中；它不像`PERCENTILE_CONT()`函数那样是插值出来的。\n\
    \n那么，离散数据又是什么呢？\n\n简单地说，离散数据值是可以随时间计数的数值，例如，产品在日、月、年中的销售额。你可以将这些值相加得到总销售额。\n\n\
    连续数据是在一段时间内测量的数据，例如，设备在24小时内的锅炉温度。将每个锅炉温度相加没有意义。但将锅炉温度相加然后除以时间段以获得平均值则有意义。\n\n\
    在我们深入分析销售数据之前，让我们先从一个简单的例子开始。\n\n请参考代码清单 [3-16](#527021_1_En_3_Chapter.xhtml#PC25)。\n\
    \n```sql\nDECLARE @ExampleValues TABLE (\n    TestKey VARCHAR(8) NOT NULL,\n \
    \   TheValue SMALLINT NOT NULL\n);\nINSERT INTO @ExampleValues VALUES\n('ONE',1),('TWO',2),('THREE',3),('FOUR',4),('SIX',6),('SEVEN',7),('EIGHT',8),('NINE',9),('TEN',10),('TWELVE',12);\n\
    SELECT\n    TestKey,TheValue,\n    PERCENTILE_CONT(.5)\n        WITHIN GROUP (ORDER\
    \ BY TheValue)\n        OVER() AS PctCont, -- continuous\n    PERCENTILE_DISC(.5)\n\
    \        WITHIN GROUP (ORDER BY TheValue)\n        OVER() AS PctDisc -- discrete\n\
    FROM @ExampleValues\nGO\n-- 代码清单 3-16\n-- PERCENTILE_CONT() 和 PERCENTILE_DISC()\
    \ 函数演示\n```\n\n这是一个非常简单的例子。数据集包含十行两列：一个文本值和一个数值。\n\n`PERCENTILE_CONT()`函数被传递`.5`作为参数，以插值出一个值，该值将适合数据集中第50百分位的位置。它将数据集视为值的**连续分布**。\n\
    \n`PERCENTILE_DISC()`函数也被传递`.5`作为参数，以识别一个存在的值，该值落在数据集的第50百分位位置。它将数据集视为值的**离散分布**。（你可以传递任何小于或等于1的值，如`.75`或`.25`）。\n\
    \n让我们看看结果如何。请参考图 [3-17](#527021_1_En_3_Chapter.xhtml#Fig17)。\n\n![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig17_HTML.jpg)\n\
    *图 3-17*\n*百分位连续与离散结果对比*\n\n百分位连续值是插值出来的，而百分位离散值不是。请注意，值`6.5`落在`TheValue`列中值`6`和`7`之间。百分位离散值是`6`，它存在于`TheValue`列中。很简单吧！\n\
    \n有了这个强大的知识，让我们在销售数据上试试这些函数。请参考代码清单 [3-17](#527021_1_En_3_Chapter.xhtml#PC6)，我们将回到我们的朋友——`CTE`。\n\
    \n```sql\nWITH StoreSalesAnalysis (\n    SalesYear,SalesMonth,StoreNo,StoreName\
    \ ,StoreTerritory,TotalSales\n)\nAS (\n    SELECT YEAR(CalendarDate) AS SalesYear\n\
    \          ,MONTH(CalendarDate) AS SalesMonth\n          ,StoreNo\n          ,StoreName\n\
    \          ,StoreTerritory\n          ,SUM(TotalSalesAmount) AS TotalSales\n \
    \   FROM APSales.SalesReports.YearlySalesReport\n    GROUP BY YEAR(CalendarDate)\n\
    \            ,MONTH(CalendarDate)\n            ,StoreNo\n            ,StoreName\n\
    \            ,StoreTerritory\n)\nSELECT  SalesYear\n      ,SalesMonth\n      ,StoreNo\n\
    \      ,StoreName\n      ,StoreTerritory\n      ,FORMAT(TotalSales,'C') AS TotalSales\n\
    \      ,FORMAT(PERCENTILE_CONT(.5)\n              WITHIN GROUP (ORDER BY TotalSales)\n\
    \              OVER (\n                  PARTITION BY SalesYear\n            \
    \  ),'C') AS PctCont\n      ,FORMAT(PERCENTILE_DISC(.5)\n              WITHIN\
    \ GROUP (ORDER BY TotalSales)\n              OVER (\n                  PARTITION\
    \ BY SalesYear\n              ),'C') AS PctDisc\nFROM StoreSalesAnalysis\nWHERE\
    \ SalesYear IN(2010,2011)\n  AND StoreNo = 'S00004'\nGO\n-- 代码清单 3-17\n-- 百分位连续与离散分析\n\
    ```\n\n我决定将百分位数格式化为货币，这样在报告中看起来更美观。注意`OVER()`子句只能包含`PARTITION BY`子句；不允许`ORDER\
    \ BY`，你稍后会明白原因。（在这里我们按`SalesYear`分区。）\n\n还要注意，在`OVER()`子句正上方，我们需要包含一个`WITHIN GROUP\
    \ (ORDER BY TotalSales)`指令。所以，如你所见，这些函数的语法略有不同。\n\n让我们看看结果。请参考图 [3-18](#527021_1_En_3_Chapter.xhtml#Fig18)\
    \ 中的部分结果。\n\n![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig18_HTML.jpg)\n\
    *图 3-18*\n*测试脚本的查询结果*\n\n请注意，百分位离散的结果如何出现在`TotalSales`列中。换句话说，结果不是插值出来的。而百分位连续的情况则不同；结果可能出现在`TotalSales`列中，但通常是插值出来的。值`$2,795.38`并没有作为实际值出现在`TotalSales`列中。\n\
    \n> **注意**\n> SQL Server 2022 包含了两个新函数，`APPROX_PERCENTILE_DIS()`和`APPROX_PERCENTILE_CONT()`，我们将在另一章中介绍它们。\n\
    \n让我们看看这些函数会生成什么样的估计查询计划。"
  raw: '| SQL Server Parse and Compile Times | First Run | Second Run |

    | --- | --- | --- |

    | CPU time (ms) | **16** | **0** |

    | Elapsed time (ms) | **76** | **39** |

    | **Statistics (Work Table)** | **First Run** | **Second Run** |

    | Scan count | 0 | 0 |

    | Logical reads | 0 | 0 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Memory Table** | **First Run** | **Second Run** |

    | Scan count | N/A | N/A |

    | Logical reads | N/A | N/A |

    | Physical reads | N/A | N/A |

    | Read-ahead reads | N/A | N/A |

    |   | N/A | N/A |

    | **SQL Server Execution Times** | **First Run** | **Second Run** |

    | CPU time (ms) | 31 | 31 |

    | Elapsed time (ms) | **174** | **121** |


    Seems like this query is very fast. Double-digit times in milliseconds. Parse
    time went down in the second run, there are all zeros for the work table, and
    there are no statistics for the memory table (makes sense as the table is in memory).
    Finally for the execution times, the `CPU` time remained the same at 31 ms, and
    the elapsed time statistic went down from 174 ms to 121 ms.


    ### PERCENTILE_CONT( ) and PERCENTILE_DISC( )


    What do these two functions do?


    The `PERCENTILE_CONT()` function works on a continuous set of data based on a
    required percentile so as to return a value within the data set that satisfies
    the percentile (you need to supply a percentile as a parameter, like .25, .5,
    .75, etc.).


    With this function the value is interpolated. It usually does not exist, so it
    is introduced. Or by coincidence it could use one of the values in the data set
    if the numbers line up correctly.


    What is continuous data anyway? Simply put, it is data that changes over specific
    periods of time, like sales amounts of time periods over time, for example, total
    sales in a one-month period for a specific product.


    The `PERCENTILE_DISC()` function works on a discrete set of data based on a required
    percentile so as to return a value within the data set that satisfies the percentile.
    With this function the value exists in the data set; it is not interpolated like
    in the `PERCENTILE_CONT()` function.


    What is discrete data anyway?


    Simply put, discrete data values are numbers that have values that you can count
    over time, like sales amounts for a product over days, months, and years. You
    can add these up to get a grand total sales amount.


    Continuous data is data measured over a period of time, like boiler temperatures
    in equipment over a 24-hour period. Summing up each boiler temperature makes no
    sense. Summing up the boiler temperatures and then dividing them by the time period
    to get an average does.


    Let’s start off with a simple example before we dive into some analysis of our
    sales data.


    Please refer to Listing [3-16](#527021_1_En_3_Chapter.xhtml#PC25).


    ```

    DECLARE @ExampleValues TABLE (

    TestKey VARCHAR(8) NOT NULL,

    TheValue SMALLINT NOT NULL

    );

    INSERT INTO @ExampleValues VALUES

    (''ONE'',1),(''TWO'',2),(''THREE'',3),(''FOUR'',4),(''SIX'',6),(''SEVEN'',7),(''EIGHT'',8),(''NINE'',9),(''TEN'',10),(''TWELVE'',12);

    SELECT

    TestKey,TheValue,

    PERCENTILE_CONT(.5)

    WITHIN GROUP (ORDER BY TheValue)

    OVER() AS PctCont, -- continuous

    PERCENTILE_DISC(.5)

    WITHIN GROUP (ORDER BY TheValue)

    OVER() AS PctDisc -- discrete

    FROM @ExampleValues

    GO

    Listing 3-16

    The PERCENTILE_CONT() and PERCENTILE()_DISC Functions in Action

    ```


    A very simple example. The data set consists of ten rows with two columns, a text
    value and a numerical value.


    The `PERCENTILE_CONT()` function is passed .5 as a parameter to interpolate a
    value that will fit into the 50th percentile position in the data set. It treats
    the data set as a continuous distribution of values.


    The `PERCENTILE_DISC()` function is also passed .5 as a parameter to identify
    an existing value that falls into the 50th percentile position in the data set.
    It treats the data set as a discrete distribution of values. (You can pass any
    value less than or equal to 1, like .75 or .25).


    Let’s see what the results are. Please refer to Figure [3-17](#527021_1_En_3_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig17_HTML.jpg)


    A screenshot of an S Q L Quick Launch window. The content panel is on the left
    side. The result table is on the right side. The table has 4 columns for Test
    Key, The Value, P c t Cont, and P c t Disc.


    Figure 3-17


    Percentile continuous vs. discrete results


    The percentile continuous value is interpolated, while the percentile discrete
    is not. Notice that the 6.5 value falls between the values 6 and 7 in the `TheValue`
    column. The percentile discrete value is 6, and it exists in the `TheValue` column.
    Walk in the park!


    With this powerful knowledge, let’s try these functions out on our sales data.
    Please refer to Listing [3-17](#527021_1_En_3_Chapter.xhtml#PC26), and we will
    go back to our friend, the `CTE`.


    ```

    WITH StoreSalesAnalysis (

    SalesYear,SalesMonth,StoreNo,StoreName ,StoreTerritory,TotalSales

    )

    AS (

    SELECT YEAR(CalendarDate) AS SalesYear

    ,MONTH(CalendarDate) AS SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,SUM(TotalSalesAmount) AS TotalSales

    FROM APSales.SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    SELECT  SalesYear

    ,SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,FORMAT(PERCENTILE_CONT(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctCont

    ,FORMAT(PERCENTILE_DISC(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctDisc

    FROM StoreSalesAnalysis

    WHERE SalesYear IN(2010,2011)

    AND StoreNo = ''S00004''

    GO

    Listing 3-17

    Percentile Continuous and Discrete Analysis

    ```


    I decided to format the percentiles to currency, so they look nice in the reports.
    Notice that the `OVER()` clause can only contain the `PARTITION BY` clause; no
    `ORDER BY` is allowed, and you will see why. (In this case we partition by `SalesYear`.)


    Also notice right above the `OVER()` clause we need to include a `WITHIN GROUP
    (ORDER BY TotalSales)` directive. So, as you can see, the syntax for these functions
    is slightly different.


    Let’s check out the results. Please refer to the partial results in Figure [3-18](#527021_1_En_3_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig18_HTML.jpg)


    A screenshot of the chapter 0 3 T S Q L code window. It presents the Result table.
    The table has 8 columns for Sales Year, Sales Month, Store No, Store Name, Store
    Territory, Total Sales, P c t Cont, and P c T Disc. An arrow indicates a total
    sale value of 2761 dollars.


    Figure 3-18


    Query results for the test script


    Notice how the results for percentile discreet appear in the TotalSales column.
    In other words, the results are not interpolated. This is not the case for percentile
    continuous; the results may appear in the TotalSales column, but usually they
    are interpolated. The value $2,795.38 does not appear as an actual value in the
    TotalSales column.


    Note


    SQL Server 2022 includes two new functions, `APPROX_PERCENTILE_DIS()` and `APPROC_PERCENTILE_CONT()`,
    which we will cover in another chapter.


    Let’s see what kind of estimated query plan these functions generate.'
  trans: "# SQL Server 性能与百分位数函数解析\n\n| SQL Server 解析与编译时间 | 首次运行 | 第二次运行 |\n| ---\
    \ | --- | --- |\n| CPU 时间 (毫秒) | `16` | `0` |\n| 已用时间 (毫秒) | `76` | `39` |\n|\
    \ **统计信息（工作表）** | **首次运行** | **第二次运行** |\n| 扫描计数 | 0 | 0 |\n| 逻辑读取 | 0 | 0 |\n\
    | 物理读取 | 0 | 0 |\n| 预读 | 0 | 0 |\n| **内存表** | **首次运行** | **第二次运行** |\n| 扫描计数 |\
    \ N/A | N/A |\n| 逻辑读取 | N/A | N/A |\n| 物理读取 | N/A | N/A |\n| 预读 | N/A | N/A |\n\
    | | N/A | N/A |\n| **SQL Server 执行时间** | **首次运行** | **第二次运行** |\n| CPU 时间 (毫秒)\
    \ | 31 | 31 |\n| 已用时间 (毫秒) | `174` | `121` |\n\n看来这个查询非常快，执行时间在毫秒的两位数级别。第二次运行的解析时间下降了，`work\
    \ table`（工作表）的统计全是零，而`memory table`（内存表）没有统计信息（这很合理，因为表在内存中）。最后看执行时间，`CPU`时间保持在\
    \ 31 毫秒不变，而`Elapsed time`（已用时间）统计从 174 毫秒下降到了 121 毫秒。\n\n## `PERCENTILE_CONT()`\
    \ 与 `PERCENTILE_DISC()`\n\n这两个函数是做什么的？\n\n`PERCENTILE_CONT()`函数基于给定的百分位数，在连续数据集上工作，返回满足该百分位数的数据集内的一个值（你需要提供一个百分位参数，如`.25`、`.5`、`.75`等）。\n\
    \n对于这个函数，值是**插值**出来的。它通常不存在于数据集中，而是被引入的。或者巧合地，如果数字排列正确，它也可能使用数据集中的某个值。\n\n到底什么是连续数据？简单地说，它是随特定时间段变化的数据，例如，某个产品在时间段内的销售额，比如一个月内的总销售额。\n\
    \n`PERCENTILE_DISC()`函数基于给定的百分位数，在离散数据集上工作，返回满足该百分位数的数据集内的一个值。对于这个函数，该值存在于数据集中；它不像`PERCENTILE_CONT()`函数那样是插值出来的。\n\
    \n那么，离散数据又是什么呢？\n\n简单地说，离散数据值是可以随时间计数的数值，例如，产品在日、月、年中的销售额。你可以将这些值相加得到总销售额。\n\n\
    连续数据是在一段时间内测量的数据，例如，设备在 24 小时内的锅炉温度。将每个锅炉温度相加没有意义。但将锅炉温度相加然后除以时间段以获得平均值则有意义。\n\
    \n在我们深入分析销售数据之前，让我们先从一个简单的例子开始。\n\n请参考代码清单 3-16。\n\n```sql\nDECLARE @ExampleValues\
    \ TABLE (\n    TestKey VARCHAR(8) NOT NULL,\n    TheValue SMALLINT NOT NULL\n\
    );\nINSERT INTO @ExampleValues VALUES\n('ONE',1),('TWO',2),('THREE',3),('FOUR',4),('SIX',6),('SEVEN',7),('EIGHT',8),('NINE',9),('TEN',10),('TWELVE',12);\n\
    SELECT\n    TestKey,TheValue,\n    PERCENTILE_CONT(.5)\n        WITHIN GROUP (ORDER\
    \ BY TheValue)\n        OVER() AS PctCont, -- continuous\n    PERCENTILE_DISC(.5)\n\
    \        WITHIN GROUP (ORDER BY TheValue)\n        OVER() AS PctDisc -- discrete\n\
    FROM @ExampleValues\nGO\n-- 代码清单 3-16\n-- PERCENTILE_CONT() 和 PERCENTILE_DISC()\
    \ 函数演示\n```\n\n这是一个非常简单的例子。数据集包含十行两列：一个文本值和一个数值。\n\n`PERCENTILE_CONT()`函数被传递`.5`作为参数，以插值出一个值，该值将适合数据集中第\
    \ 50 百分位的位置。它将数据集视为值的**连续分布**。\n\n`PERCENTILE_DISC()`函数也被传递`.5`作为参数，以识别一个存在的值，该值落在数据集的第\
    \ 50 百分位位置。它将数据集视为值的**离散分布**。（你可以传递任何小于或等于 1 的值，如`.75`或`.25`）。\n\n让我们看看结果如何。请参考图\
    \ 3-17。\n\n![](img/527021_1_En_3_Fig17_HTML.jpg)\n*图 3-17*\n*百分位连续与离散结果对比*\n\n\
    百分位连续值是插值出来的，而百分位离散值不是。请注意，值`6.5`落在`TheValue`列中值`6`和`7`之间。百分位离散值是`6`，它存在于`TheValue`列中。很简单吧！\n\
    \n有了这个强大的知识，让我们在销售数据上试试这些函数。请参考代码清单 3-17，我们将回到我们的朋友——`CTE`。\n\n```sql\nWITH StoreSalesAnalysis\
    \ (\n    SalesYear,SalesMonth,StoreNo,StoreName ,StoreTerritory,TotalSales\n)\n\
    AS (\n    SELECT YEAR(CalendarDate) AS SalesYear\n          ,MONTH(CalendarDate)\
    \ AS SalesMonth\n          ,StoreNo\n          ,StoreName\n          ,StoreTerritory\n\
    \          ,SUM(TotalSalesAmount) AS TotalSales\n    FROM APSales.SalesReports.YearlySalesReport\n\
    \    GROUP BY YEAR(CalendarDate)\n            ,MONTH(CalendarDate)\n         \
    \   ,StoreNo\n            ,StoreName\n            ,StoreTerritory\n)\nSELECT \
    \ SalesYear\n      ,SalesMonth\n      ,StoreNo\n      ,StoreName\n      ,StoreTerritory\n\
    \      ,FORMAT(TotalSales,'C') AS TotalSales\n      ,FORMAT(PERCENTILE_CONT(.5)\n\
    \              WITHIN GROUP (ORDER BY TotalSales)\n              OVER (\n    \
    \              PARTITION BY SalesYear\n              ),'C') AS PctCont\n     \
    \ ,FORMAT(PERCENTILE_DISC(.5)\n              WITHIN GROUP (ORDER BY TotalSales)\n\
    \              OVER (\n                  PARTITION BY SalesYear\n            \
    \  ),'C') AS PctDisc\nFROM StoreSalesAnalysis\nWHERE SalesYear IN(2010,2011)\n\
    \  AND StoreNo = 'S00004'\nGO\n-- 代码清单 3-17\n-- 百分位连续与离散分析\n```\n\n我决定将百分位数格式化为货币，这样在报告中看起来更美观。注意`OVER()`子句只能包含`PARTITION\
    \ BY`子句；不允许`ORDER BY`，你稍后会明白原因。（在这里我们按`SalesYear`分区。）\n\n还要注意，在`OVER()`子句正上方，我们需要包含一个`WITHIN\
    \ GROUP (ORDER BY TotalSales)`指令。所以，如你所见，这些函数的语法略有不同。\n\n让我们看看结果。请参考图 3-18 中的部分结果。\n\
    \n![](img/527021_1_En_3_Fig18_HTML.jpg)\n*图 3-18*\n*测试脚本的查询结果*\n\n请注意，百分位离散的结果如何出现在`TotalSales`列中。换句话说，结果不是插值出来的。而百分位连续的情况则不同；结果可能出现在`TotalSales`列中，但通常是插值出来的。值`$2,795.38`并没有作为实际值出现在`TotalSales`列中。\n\
    \n> **注意**\n> SQL Server 2022 包含了两个新函数，`APPROX_PERCENTILE_DIS()`和`APPROX_PERCENTILE_CONT()`，我们将在另一章中介绍它们。\n\
    \n让我们看看这些函数会生成什么样的估计查询计划。"
- fmt: '# Performance Considerations


    我们以通常的方式为菜单栏中的下拉查询选择生成了一个估计的查询计划。我们立即注意到建议了一个索引。让我们检查一下该计划。


    请参考图 [3-19](#527021_1_En_3_Chapter.xhtml#Fig19) 查看估计的查询计划。


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig19_HTML.png)


    *图 3-19：百分位函数的估计查询计划*


    从右向左看，我们看到一个成本为 37% 的索引查找任务，但显然这个索引并未满足所有性能要求。尽管有一个可用的索引被使用，系统还是建议了一个新索引，因此我们必须处理这个需求。


    下一个较昂贵的任务是成本为 19% 的排序任务和成本为 10% 的嵌套循环连接任务。所有其他任务成本为零或很低，因此我们此时不讨论它们。你应该始终检查每个任务，即使是低成本的任务，以便理解查询将如何被处理。


    表 [3-6](#527021_1_En_3_Chapter.xhtml#Tab6) 显示了使用现有索引执行此查询时的统计信息。


    *表 3-6：使用现有索引的统计信息*


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | TBD |

    | Elapsed time (ms) | 98 | TBD |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | TBD |

    | Logical reads | 171 | TBD |

    | Physical reads | 0 | TBD |

    | Read-ahead reads | 0 | TBD |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | TBD |

    | Logical reads | 0 | TBD |

    | Physical reads | 0 | TBD |

    | Read-ahead reads | 0 | TBD |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | TBD |

    | Logical reads | 4033 | TBD |

    | Physical reads | 1 | TBD |

    | Read-ahead reads | 4041 | TBD |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 47 | TBD |

    | Elapsed time (ms) | 1025 | TBD |


    从顶部开始，解析和编译的耗时是 98 毫秒。统计信息中出现了一个工作文件和一个工作表，还包括了 `YearlySalesReport` 表。对于工作表，我们看到扫描计数为
    9，逻辑读取数为 171。这些可以改进。


    查看工作文件，所有值都是 0，因此我们不需要担心这组统计信息。


    现在，需要注意 `YearlySalesReport` 的统计信息。我们看到扫描计数为 1。逻辑读取数为 4,033，物理读取数为 1，最后预读数为 4,041。


    最后，`CPU` 时间为 47 毫秒，耗时为 1025 毫秒。有点高。让我们创建建议的索引，看看是否有助于降低这些统计信息。


    请参考代码清单 [3-18](#527021_1_En_3_Chapter.xhtml#PC27)，其中显示了 SQL Server 生成的索引和注释。


    ```sql

    /*

    Missing Index Details from chapter 03 - TSQL code - new - 10-06-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (52))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 87.5919%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [SalesReports].[YearlySalesReport] ([StoreNo])

    INCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])

    GO

    */

    ```

    *代码清单 3-18：建议的索引*


    SQL Server 告诉我们，如果我们创建这个索引（在给它命名后），将提升 87.5% 的性能。


    好的，听起来不错，但我们拭目以待。


    我们将此索引命名为 `ieStoreTerritoryDateTotalSales`。经过一些复制粘贴操作来包含带名称的命令，得到了以下 DDL 查询：


    ```sql

    CREATE NONCLUSTERED INDEX ieStoreTerritoryDateTotalSales

    ON [SalesReports].[YearlySalesReport] ([StoreNo])

    INCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])

    GO

    ```


    我们执行它，然后生成一个新的估计查询计划。


    请参考图 [3-20](#527021_1_En_3_Chapter.xhtml#Fig20)。


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig20_HTML.png)


    *图 3-20：创建索引后的估计查询计划*


    我们立即看到了改进。看起来新索引正在被使用。索引查找任务的成本占 51%。我们确实有一个成本为 31% 的哈希匹配聚合。排序现在占 4% 的成本，嵌套循环连接占
    2%。


    表 [3-7](#527021_1_En_3_Chapter.xhtml#Tab7) 显示了使用新索引执行查询后的统计信息。


    *表 3-7：创建建议索引后的统计信息*


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | 31 |

    | Elapsed time (ms) | 98 | 113 |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | 9 |

    | Logical reads | 171 | 171 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | 0 |

    | Logical reads | 0 | 0 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | 1 |

    | Logical reads | 4033 | 343 |

    | Physical reads | 1 | 0 |

    | Read-ahead reads | 4041 | 332 |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 47 | 16 |

    | Elapsed time (ms) | 1025 | 159 |


    对于解析步骤，`CPU` 时间上升到 31 毫秒，耗时上升到 113 毫秒。我们在向错误的方向前进！


    工作表和工作文件没有变化，但如果我们查看处理 `YearlySalesReport` 表的统计信息，我们看到：


    *   扫描计数保持不变——没有消息就是好消息。

    *   逻辑读取数从 4,033 降到了 343——一个重大的改进。

    *   物理读取数从 1 降到了 0——我们接受这个改进。

    *   预读数从 4,041 降到了 332——另一个重大改进。


    最后，对于 SQL 执行时间，`CPU` 时间从 47 毫秒降至 16 毫秒，耗时从 1025 毫秒降至 159 毫秒。创建建议的索引帮助很大。


    那么，一个替换了 `CTE` 的反规范化报告表会有更多帮助吗？或者，内存优化表呢？'
  raw: '### Performance Considerations


    We generate an estimated query plan in the usual manner for the drop-down query
    selection in the menu bar. Right away we notice that an index is suggested. Let’s
    examine the plan.


    Please refer to Figure [3-19](#527021_1_En_3_Chapter.xhtml#Fig19) for the estimated
    query plan.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig19_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Nested Loop Cost, 10%.
    Sort Cost, 19%. Index Seek Cost, 37%.


    Figure 3-19


    Estimated query plan for percentile functions


    Reading from right to left, we see an index seek task at a cost of 37%, but apparently
    this index does not fulfill all performance requirements. Despite having an index
    lying around that was used, a new index was suggested, so we will have to address
    this requirement.


    The next expensive tasks are a sort task at a cost of 19% and a nested loops join
    task at a cost of 10%. All other tasks have zero or low costs, so we will not
    discuss them at this time. You should always examine each task, even the low-cost
    ones, so you understand how the query will be processed.


    In Table [3-6](#527021_1_En_3_Chapter.xhtml#Tab6) are the statistics when this
    query is executed with the existing index.


    Table 3-6


    Statistics with the Existing Index


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | TBD |

    | Elapsed time (ms) | 98 | TBD |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | TBD |

    | Logical reads | 171 | TBD |

    | Physical reads | 0 | TBD |

    | Read-ahead reads | 0 | TBD |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | TBD |

    | Logical reads | **0** | TBD |

    | Physical reads | 0 | TBD |

    | Read-ahead reads | 0 | TBD |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | TBD |

    | Logical reads | 4033 | TBD |

    | Physical reads | 1 | TBD |

    | Read-ahead reads | 4041 | TBD |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 47 | TBD |

    | Elapsed time (ms) | 1025 | TBD |


    Starting at the top, the elapsed time for parse and compile is 98 ms. A work file
    and a work table appear in the statistics, and the `YearlySalesReport` table is
    also included. For the work table, we see a scan count of 9 and 171 logical reads.
    These can be improved.


    Looking at the work file, all values are 0, so we do not need to worry about this
    set of statistics.


    Now the statistics for the `YearlySalesReport` need to be paid attention to. We
    see a scan count of 1\. Logical reads come in at 4,033, physical reads at 1, and
    finally read-ahead reads at 4,041.


    Lastly `CPU` time is 47 ms and elapsed time is 1025 ms. A bit high. Let’s create
    the suggested index and see if it helps lower these statistics.


    Please refer to Listing [3-18](#527021_1_En_3_Chapter.xhtml#PC27) that shows the
    SQL Server–generated index and comment.


    ```

    /*

    Missing Index Details from chapter 03 - TSQL code - new - 10-06-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (52))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 87.5919%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [SalesReports].[YearlySalesReport] ([StoreNo])

    INCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])

    GO

    */

    Listing 3-18

    Suggested Index

    ```


    SQL Server tells us that if we create this index, after we give it a name, it
    will improve performance by 87.5%.


    Okay, sounds good, but we will see.


    Let’s call this index `ieStoreTerritoryDateTotalSales`. A little copy-and-paste
    action to include the command with the name results in the following DDL query:


    ```

    CREATE NONCLUSTERED INDEX ieStoreTerritoryDateTotalSales

    ON [SalesReports].[YearlySalesReport] ([StoreNo])

    INCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])

    GO

    ```


    We execute it and then generate a new estimated query plan.


    Please refer to Figure [3-20](#527021_1_En_3_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig20_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Nested Loop Cost, 2%. Sort
    Cost, 4%. Hash Match Cost, 31%. Index Seek Cost, 51%.


    Figure 3-20


    Estimated query plan after the index was created


    Right off the bat, we see an improvement. Looks like the new index is being used.
    The index seek tasks chimes in at 51% cost. We do have a hash match aggregate
    at a cost of 31%. The sort is now at 4% cost and the nested loops join is at 2%.


    In Table [3-7](#527021_1_En_3_Chapter.xhtml#Tab7) are the statistics once the
    query is executed with the new index.


    Table 3-7


    Statistics After the Suggested Index Was Created


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | 31 |

    | Elapsed time (ms) | 98 | 113 |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | 9 |

    | Logical reads | 171 | 171 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | 0 |

    | Logical reads | 0 | 0 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | 1 |

    | Logical reads | **4033** | **343** |

    | Physical reads | 1 | 0 |

    | Read-ahead reads | **4041** | **332** |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | **47** | **16** |

    | Elapsed time (ms) | **1025** | **159** |


    For the parse step, the CPU time went up to 31 ms, and the elapsed time went up
    to 113 ms. We are going in the wrong direction!


    No change for the work table and work file, but if we look at statistics for processing
    the `YearlySalesReport` table, we see that


    *   The scan count remained the same – no news is good news.


    *   Logical reads went from 4,033 to 343 – a major improvement.


    *   Physical reads went from 1 to 0 – we will take it.


    *   Read-ahead reads went from 4,041 to 332 – another major improvement.


    Finally, for the SQL execution times, the `CPU` time went from 47 to 16 ms, and
    the elapsed time went from 1025 to 159 ms. Creating the suggested index helped
    a lot.


    Will a denormalized report table that replaces the `CTE` help even more? Or what
    about a memory-optimized table?'
  trans: '# 性能注意事项


    我们以通常的方式为菜单栏中的下拉查询选择生成了一个估计的查询计划。我们立即注意到系统建议创建一个索引。让我们来检查一下该计划。


    请参考图 3-19 查看估计的查询计划。


    ![](img/527021_1_En_3_Fig19_HTML.png)


    *图 3-19：百分位函数的估计查询计划*


    从右向左看，我们看到一个成本为 37% 的索引查找任务，但显然这个索引并未满足所有性能要求。尽管有一个可用的索引被使用，系统还是建议了一个新索引，因此我们必须处理这个需求。


    下一个较昂贵的任务是成本为 19% 的排序任务和成本为 10% 的嵌套循环连接任务。所有其他任务成本为零或很低，因此我们此时不讨论它们。你应该始终检查每个任务，即使是低成本的任务，以便理解查询将如何被处理。


    表 3-6 显示了使用现有索引执行此查询时的统计信息。


    *表 3-6：使用现有索引的统计信息*


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | TBD |

    | Elapsed time (ms) | 98 | TBD |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | TBD |

    | Logical reads | 171 | TBD |

    | Physical reads | 0 | TBD |

    | Read-ahead reads | 0 | TBD |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | TBD |

    | Logical reads | 0 | TBD |

    | Physical reads | 0 | TBD |

    | Read-ahead reads | 0 | TBD |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | TBD |

    | Logical reads | 4033 | TBD |

    | Physical reads | 1 | TBD |

    | Read-ahead reads | 4041 | TBD |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 47 | TBD |

    | Elapsed time (ms) | 1025 | TBD |


    从顶部开始，解析和编译的耗时是 98 毫秒。统计信息中出现了一个工作文件和一个工作表，还包括了 `YearlySalesReport` 表。对于工作表，我们看到扫描计数为
    9，逻辑读取数为 171。这些可以改进。


    查看工作文件，所有值都是 0，因此我们不需要担心这组统计信息。


    现在，需要注意 `YearlySalesReport` 的统计信息。我们看到扫描计数为 1。逻辑读取数为 4,033，物理读取数为 1，最后预读数为 4,041。


    最后，`CPU` 时间为 47 毫秒，耗时为 1025 毫秒。有点高。让我们创建建议的索引，看看是否有助于降低这些统计信息。


    请参考代码清单 3-18，其中显示了 SQL Server 生成的索引和注释。


    ```sql

    /*

    Missing Index Details from chapter 03 - TSQL code - new - 10-06-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (52))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 87.5919%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [SalesReports].[YearlySalesReport] ([StoreNo])

    INCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])

    GO

    */

    ```

    *代码清单 3-18：建议的索引*


    SQL Server 告诉我们，如果我们创建这个索引（在给它命名后），将提升 87.5% 的性能。


    好的，听起来不错，但我们拭目以待。


    我们将此索引命名为 `ieStoreTerritoryDateTotalSales`。经过一些复制粘贴操作来包含带名称的命令，得到了以下 DDL 查询：


    ```sql

    CREATE NONCLUSTERED INDEX ieStoreTerritoryDateTotalSales

    ON [SalesReports].[YearlySalesReport] ([StoreNo])

    INCLUDE ([StoreName],[StoreTerritory],[CalendarDate],[TotalSalesAmount])

    GO

    ```


    我们执行它，然后生成一个新的估计查询计划。


    请参考图 3-20。


    ![](img/527021_1_En_3_Fig20_HTML.png)


    *图 3-20：创建索引后的估计查询计划*


    我们立即看到了改进。看起来新索引正在被使用。索引查找任务的成本占 51%。我们确实有一个成本为 31% 的哈希匹配聚合。排序现在占 4% 的成本，嵌套循环连接占
    2%。


    表 3-7 显示了使用新索引执行查询后的统计信息。


    *表 3-7：创建建议索引后的统计信息*


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | 31 |

    | Elapsed time (ms) | 98 | 113 |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | 9 |

    | Logical reads | 171 | 171 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | 0 |

    | Logical reads | 0 | 0 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | 1 |

    | Logical reads | 4033 | 343 |

    | Physical reads | 1 | 0 |

    | Read-ahead reads | 4041 | 332 |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 47 | 16 |

    | Elapsed time (ms) | 1025 | 159 |


    对于解析步骤，`CPU` 时间上升到 31 毫秒，耗时上升到 113 毫秒。我们在向错误的方向前进！


    工作表和工作文件没有变化，但如果我们查看处理 `YearlySalesReport` 表的统计信息，我们看到：


    *   扫描计数保持不变——没有消息就是好消息。

    *   逻辑读取数从 4,033 降到了 343——一个重大的改进。

    *   物理读取数从 1 降到了 0——我们接受这个改进。

    *   预读数从 4,041 降到了 332——另一个重大改进。


    最后，对于 SQL 执行时间，`CPU` 时间从 47 毫秒降至 16 毫秒，耗时从 1025 毫秒降至 159 毫秒。创建建议的索引帮助很大。


    那么，一个替换了 `CTE` 的反规范化报告表会有更多帮助吗？或者，内存优化表呢？'
- fmt: '### Using a Report Table


    Sometimes creating one or more indexes to improve performance for queries that
    utilize window functions or complex calculations or both is just not enough. The
    next step to consider is creating what is called a denormalized table or a report
    table that is loaded at off hours, assuming the users can tolerate data that is
    24 hours old.


    Key to this step is understanding business analyst requirements. Some users will
    want or need current, live data, while other users can accept aged data, like
    when they need to run month-end totals or some other type of report that summarizes
    past performance.


    As a SQL developer or architect, you need to work with your business counterpart
    and collect the data and performance reports the business users expect. Hopefully,
    after your requirements gathering sessions, you will arrive at the scenario where
    80% of users do not need live data; instead, day-old data or older is sufficient.
    The other 20% of the users that need live data require complex solutions that
    might involve hardware, complex replication schemes, or querying transaction tables
    directly, which is not recommended.


    Let’s take a look at a possible solution for the query we just examined that uses
    a report table that is loaded off hours. The `CTE` portion of the query is replaced
    with the report table. We will preload it and then check out performance on the
    query that contains our window functions.


    Please refer to Listing 3-19 for the script to load the report table and the revised
    query.


    ```sql

    DROP TABLE IF EXISTS [SalesReports].[YearlySummaryReport]

    GO

    CREATE TABLE [SalesReports].[YearlySummaryReport](

    [SalesYear]      [int] NULL,

    [SalesMonth]     [int] NULL,

    [StoreNo]        [nvarchar](32) NOT NULL,

    [StoreName]      [nvarchar](64) NOT NULL,

    [StoreTerritory] [nvarchar](64) NOT NULL,

    [TotalSales]     [decimal](10, 2) NULL

    ) ON [AP_SALES_FG]

    GO

    INSERT INTO APSales.SalesReports.YearlySummaryReport

    SELECT YEAR(CalendarDate) AS SalesYear

    ,MONTH(CalendarDate) AS SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,SUM(TotalSalesAmount) AS TotalSales

    FROM APSales.SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    GO

    CREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]

    ON [SalesReports].[YearlySummaryReport] ([StoreNo],[SalesYear])

    INCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])

    GO

    Listing 3-19

    YearlySummaryReport Table for Preloading

    ```


    This script uses the output columns defined for the `CTE` and uses them to create
    a physical table called `YearlySummaryReport`. Once the table is created, the
    query that was originally used for the `CTE` is used in an `INSERT` statement
    to load the table. This step was easy. Now for the query that contains the window
    functions and the analysis we need to perform to see if we have an improvement
    on the estimated query plan and the `IO` and `TIME` statistics, please refer to
    Listing 3-20.


    ```sql

    DBCC dropcleanbuffers

    CHECKPOINT;

    GO

    SET STATISTICS TIME ON

    GO

    SET STATISTICS IO ON

    GO

    SELECT     SalesYear

    ,SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,FORMAT(PERCENTILE_CONT(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctCont

    ,FORMAT(PERCENTILE_DISC(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctDisc

    FROM APSales.SalesReports.YearlySummaryReport

    WHERE SalesYear IN(2010,2011)

    AND StoreNo = ''S00004

    GO

    SET STATISTICS TIME OFF

    GO

    SET STATISTICS IO OFF

    GO

    Listing 3-20

    Querying the Report Table

    ```


    We have covered this query earlier, so let’s get right to it and generate the
    estimated query plan in the usual manner. I did create an index on the new report
    table. This index was suggested by the estimated query plan tool. Please refer
    to the Listing 3-21.


    ```sql

    CREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]

    ON [SalesReports].[YearlySummaryReport] ([StoreNo],[SalesYear])

    INCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])

    GO

    Listing 3-21

    Index to Support the Report Table

    ```


    We need to compare the new plan with the prior plan to see what improvements,
    if any, have occurred.


    Please refer to Figure 3-21 for the estimated query plans for both approaches.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig21_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The screen is divided into
    2 sub-windows. The top screen has some programming codes. The bottom screen has
    a message for query plans. It compares the new plan with the prior plan, after
    execution of the plan.


    Figure 3-21

    Comparing estimated query plans


    The top estimated query plan represents the original query with the `CTE`. The
    bottom query plan is for the revised script that queries the reporting table that
    was preloaded.


    What we see is that the index seek for the reporting table query is at a cost
    of 20% compared with the index seek of 51% for the original query. The new query
    also has a sort step significantly higher than the sort step in the original query
    that uses the `CTE`. Seems like when index seek cost goes down, sort cost goes
    up. Something to keep an eye out for.


    Is this an improvement? Not sure, so let’s look at the `IO` and `TIME` statistics
    to see what they tell us.


    Please refer to Table 3-8.


    Table 3-8

    Comparing IO and TIME Statistics


    | SQL Server Parse and Compile Times | No Report Table | Report Table |

    | --- | --- | --- |

    | CPU time (ms) | 15 | 0 |

    | Elapsed time (ms) | **20** | **58** |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | 9 |

    | Logical reads | 171 | 171 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | NA |

    | Logical reads | 0 | NA |

    | Physical reads | 0 | NA |

    | Read-ahead reads | 0 | NA |

    | **Statistics (YearlySalesReport) vs. YearlySummaryReport** | **Existing Index**
    | **New Index** |

    | Scan count | **1** | **2** |

    | Logical reads | **343** | **6** |

    | Physical reads | **2** | **1** |

    | Read-ahead reads | **345** | **8** |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | **16** | **0** |

    | Elapsed time (ms) | **132** | **67** |


    Looking at the statistics that were generated, we see significant improvements
    when we use the reporting table called `YearlySummaryReport`. The scan count went
    up from 1 to 2, but the logical reads went from 343 to 6. Physical reads decreased
    by 1 in the new reporting table, and best of all, read-ahead reads went down from
    345 to 8. So, yes, there seems to be a significant improvement when using preloaded
    and precalculated reporting tables in queries that use window functions. Come
    to think of it – eliminating the `CTE` or load step from the analysis definitely
    will improve performance of the query.


    Last but not least, CPU time for execution times went down from 16 to 0 ms, and
    elapsed time went from 132 to 67 ms.


    One last comment when performing this type of analysis: Always run several tests,
    clearing the buffers with `DBCC` for each trial. Record the results in a spreadsheet
    for later analysis and evaluation as to which performance improvement modification
    works best.


    By the way, isolating the loading of a report table does not mean we completely
    ignore performance analysis on the load steps. If we are loading millions of rows
    nightly, then we need to come up with a load strategy that will not take so long
    it creeps into work hours!'
