  trans: '

    如图所示，我们得到了按月份和季度划分的投资组合累积分布。这是一个非常有趣的查询。该模式在每个投资组合中都会重复出现。


    ## 性能考量


    这个查询的性能如何？让我们运行通常的估计查询计划，为我们的分析建立一个基线，之后我们将对其进行分析，并看看是否可以通过添加索引或用报表表替换 `CTE` 来提高性能。


    请参阅图 7-3。


    ![](img/527021_1_En_7_Fig3_HTML.png)


    一张 S S M S 窗口的截图。它展示了累积分布基线查询计划的第 1 部分，包含 14 个组件。这些组件是：窗口假脱机、2 个分段、嵌套循环、表假脱机、分段、计算标量、流聚合、排序、表假脱机、嵌套循环、流聚合和
    2 个表假脱机。


    **图 7-3**

    累积分布基线查询计划 – 第 1 部分


    这是估计查询计划的右侧。注意这里的表扫描；由于表很小（大约 1,470 行），所以不需要索引。表扫描的成本为 33%，随后是一个成本为 28%的排序步骤。（通过将鼠标悬停在图标上并查看
    ID，可以记下表扫描的 ID。大多数情况下，表扫描用于其他任务，比如创建在 `TEMPDB` 中的临时表。）


    红色框出的区域对应于第一个累积分布函数。它将在查询计划的下一部分中为第二个累积分布函数调用重复出现。它包含一些零成本任务和一些表假脱机任务，这些任务使数据在临时物理存储中可用，以便应用计算。其中两个假脱机任务成本为
    0%，而最后一个成本为 1%。两个嵌套循环联接任务完成了这部分，一个成本 0%，一个成本 4%。到目前为止，没什么可担心的。


    让我们看看第二部分。请参阅图 7-4。


    ![](img/527021_1_En_7_Fig4_HTML.png)


    一张 S S M S 窗口的截图。它展示了累积分布基线查询计划的第 2 部分，包含 14 个组件。这些组件是：窗口假脱机、2 个分段、嵌套循环、表假脱机、分段、排序、计算标量、流聚合、窗口假脱机、嵌套循环、流聚合和
    2 个表假脱机。


    **图 7-4**

    累积分布基线查询计划 – 第 2 部分


    注意计划右侧的窗口假脱机任务。它的成本为 1%，这意味着假脱机操作是在磁盘而非内存中执行的。这个窗口假脱机任务与第一个累积分布函数调用相关联。


    这里有一个框出的区域，它与我们讨论的第一个区域相同。它后面也跟着一个窗口假脱机任务。看起来我们有三个需要留意的低成本任务：成本为 1%的表假脱机、成本为 4%的内部联接嵌套循环，以及成本为
    1%的窗口假脱机任务。


    我尝试了报表表方法，即使用 `CTE` 中的查询来填充一个报表表，然后针对该报表表执行基础查询。就查询计划而言，改进是微乎其微的（代码包含在本章的脚本中）。


    使用报表表方法时，`TIME` 和 `IO` 统计数据显示出边际改善，因此我在此附上屏幕截图。请参阅图 7-5。


    ![](img/527021_1_En_7_Fig5_HTML.png)


    一张 S S M S 窗口的截图。文本展示了 2 组 I O 和 TIME 统计数据。解析和编译时间（CPU 和已用时间）对于 1 和 2 分别为 15、56
    毫秒和 0、0 毫秒。执行时间（CPU 和已用时间）对于 1 和 2 分别为 16、58 毫秒和 0、40 毫秒。影响了 72 行。


    **图 7-5**

    比较 IO 和 TIME 统计信息


    SQL Server 执行时间和预读读取量有适度改善。由于这是历史数据，报表表方法可能比 `CTE` 方法更高效，特别是当多个用户运行相同的查询时，例如从允许分析人员通过报告中的下拉列表选择不同年份的
    SQL Server Reporting Services (SSRS) 报告中运行。


    报表表策略也有成本，因为它必须定期加载以更新数据，保持其时效性。这可以每天或每周执行，通常是在夜间通过计划的加载过程完成，这样就不会影响用户。


    最后但同样重要的是，我修改了原始的 `CTE` 查询，使其不使用 `CTE`，而是直接针对 Portfolio 表，并在两次调用累积分布函数之前立即计算 `SUM()`。结果几乎与
    `CTE` 版本匹配，并且 SQL Server 执行时间略低于 `CTE` 版本，230 毫秒（`CTE`）对 171 毫秒（非 `CTE`）。就 `STATISTICS
    PROFILE` 值而言，非 `CTE` 版本的步骤更少（72 步对 32 步），但总的来说，除了执行时间稍快之外，性能是一样的。所以，也许对于这类查询，`CTE`
    块不是首选？如果我们需要查询数百万行数据，那么可能根本不会考虑 `CTE`。


    始终要考虑查询将如何被使用和运行，例如，是在多个用户的网页报告中运行，还是由一个用户单独运行。另外，不要仅仅因为你认为某个功能（如 `CTE`）很巧妙，并且使用它会给你的经理留下深刻印象，就去使用它。最简单、最快、当然也是最准确的解决方案才是最好的解决方案。同时也要考虑维护这些查询的人力成本。

    '
- fmt: '### FIRST_VALUE() and LAST_VALUE() Functions


    So what do this related pair of functions do for us? If you did not read Chapter
    [3](#527021_1_En_3_Chapter.xhtml) or need a refresher, please read this next discussion;
    otherwise, feel free to skip ahead to the example.


    The names give us a hint. They answer the following question:


    Who comes first and who comes last in the partition?


    Given a set of sorted values, the `FIRST_VALUE()` function will return the first
    value in the partition.


    Given a set of sorted values, the `LAST_VALUE()` function will return the last
    value in the partition.


    Both functions return whatever data type was used as an argument; it could be
    an integer, could be a string, etc. Pretty simple. Let’s dive right into the example.


    Here is our business specification:


    This time the analyst asks us to turn our attention to all customer accounts.
    We are asked to create a report that will return the last and first account values
    in a partition defined by year and customer ID and sorted by month. The analyst
    wants to see these values for data sets (partitions) that include the current
    month and also all future months and also the current month and all past months.
    In other words, look forward and look back (hint: need to define a window frame).


    Lastly, the report will be for cash accounts only.


    Please refer to Listing [7-3](#527021_1_En_7_Chapter.xhtml#PC5).


    ```sql

    WITH MonthlyAccountBalances (

    AcctYear,AcctMonth,CustId, PrtfNo, AcctNo, AcctName, AcctBalance

    )

    AS

    (

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,SUM(AcctBalance)

    FROM Financial.Account

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    )

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,FIRST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS FirstValueBalance

    ,LAST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ) AS LastValueBalanceCRUF

    ,FIRST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS FirstValueBalanceUPCR

    ,LAST_VALUE(AcctBalance) OVER (

    PARTITION BY AcctYear,CustId

    ORDER BY AcctMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS LastValueBalanceUPCR

    FROM MonthlyAccountBalances

    WHERE AcctYear >= 2013

    AND AcctNAme = ''CASH''

    ORDER BY CustId

    ,AcctYear

    ,AcctName

    ,AcctMonth

    GO

    ```


    Listing 7-3

    First and Last Account Balances by Year and Customer, Sorted by Month


    The `CTE` looks like the one we discussed in the prior example, but this time
    it references the Account table, which is at a lower granularity than the Portfolio
    table.


    What is interesting is that we include two sets of `FIRST_VALUE()OVER()` and `LAST_VALUE()OVER()`
    clauses with different `ROWS` frame clauses.


    The first set uses the following `ROWS` window frame definition in order to define
    the window frame within the partition by the current row and all rows following
    (look ahead):


    ```

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ```


    The second set uses the following `ROWS` window frame definition in order to define
    the window frame that processes the current row and all preceding rows (look back):


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    Remember, the window frame is relative to the current row being processed as processing
    moves from row to row within the partition. If this is a bit fuzzy, review the
    topic in Chapter [1](#527021_1_En_1_Chapter.xhtml) and then try out a simple example
    using ten values, a table variable, and the functions so you can see them work
    on a simple data set. Check out the diagrams in Chapter [1](#527021_1_En_1_Chapter.xhtml)
    on this topic; they will make the concept clear.


    The query was executed. This one took four seconds to run! Can’t wait to see the
    estimated execution plan. Please refer to the partial results in Figure [7-6](#527021_1_En_7_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig6_HTML.png)


    A screenshot of the S S M S window. It has a table of 11 columns and 26 rows.
    The column headers are customer I D, account year, account month, account name,
    account balance, first value balance, last value balance C R U F, first value
    balance U P C R, and last value balance U P C R.


    Figure 7-6


    First and last rows within a defined partition


    As can be seen in the first set of first and last balances, the first value is
    the value in the current row, while the last value always points to the last value
    in the partition, `$34,138.00`. Here we look forward.


    In the second set of first and last balances, the first value always points to
    the first value in the partition, while the last value is always the value in
    the current row of the window frame. Here we look backward.


    I guess this is of value as we can see where we started off, where we are at,
    and where we are going relative to the balances. This scheme tells you if the
    account is increasing in value or decreasing in value as the months go by.


    Better check the estimated query plan as we saw this query took four seconds to
    run.'
