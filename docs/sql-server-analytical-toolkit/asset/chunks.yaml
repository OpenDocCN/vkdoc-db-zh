  trans: '

    ## 创建 SSRS 报告


    我们现在将使用 Report Builder 创建一份报告，并将其发布到 `SSRS` 网站。该报告需要满足我们的分析师提交的以下要求：


    这是一份详细报告，列出了所有日历年和月份的全部产品库存情况；必须包含所有位置、库存和仓库。需要显示月份的名称而非数字（是的，又一个代价高昂的 `CASE`
    代码块）。


    此报告将由多位用户使用，因此需要包含一组筛选器，让业务用户能够选择他们想查看的年份、月份和其他维度——并且可以任意组合！


    换句话说，需要所有数据，并且这必须是一份动态报告，以支持所有可能的筛选组合。


    性能是关键。我们的业务用户想要一切。他们要求很高。不能指望用户等待超过 30 秒（或更短）让报告显示结果。


    我们需要将此报告建立在一个基于以下查询的 `VIEW` 上。请参考清单 12-9。


    ```sql

    CREATE VIEW MonthlyInventoryRanks

    AS

    WITH WarehouseCTE (

    InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName

    ,InventoryId,WarehouseId,WarehouseName,ProductId,ProductName

    ,ProductType,ProdTypeName,MonthlyQtyOnHand

    )

    AS ( -- 返回 24,192 行

    SELECT YEAR(C.[CalendarDate])  AS InvYear

    ,MONTH(C.[CalendarDate]) AS InvMonthNo

    ,CASE

    WHEN MONTH(C.[CalendarDate])  = 1 THEN ''Jan''

    WHEN MONTH(C.[CalendarDate])  = 2 THEN ''Feb''

    WHEN MONTH(C.[CalendarDate])  = 3 THEN ''Mar''

    WHEN MONTH(C.[CalendarDate])  = 4 THEN ''Apr''

    WHEN MONTH(C.[CalendarDate])  = 5 THEN ''May''

    WHEN MONTH(C.[CalendarDate])  = 6 THEN ''June''

    WHEN MONTH(C.[CalendarDate])  = 7 THEN ''Jul''

    WHEN MONTH(C.[CalendarDate])  = 8 THEN ''Aug''

    WHEN MONTH(C.[CalendarDate])  = 9 THEN ''Sep''

    WHEN MONTH(C.[CalendarDate])  = 10 THEN ''Oct''

    WHEN MONTH(C.[CalendarDate])  = 11 THEN ''Nov''

    WHEN MONTH(C.[CalendarDate])  = 12 THEN ''Dec''

    END AS InvMonthMonthName

    ,L.LocId             AS LocationId

    ,L.LocName           AS LocationName

    ,I.InvId             AS InventoryId

    ,W.WhId              AS WarehouseId

    ,W.WhName            AS WarehouseName

    ,P.ProdId                 AS ProductId

    ,P.ProdName          AS ProductName

    ,P.ProdType          AS ProductType

    ,PT.ProdTypeName     AS ProdTypeName

    ,SUM(IH.[QtyOnHand]) AS MonthlyQtyOnHand

    FROM [Fact].[InventoryHistory] IH -- WITH (INDEX(ieInvHistCalendar))

    JOIN [Dimension].[Location] L

    ON IH.LocKey = L.LocKey

    JOIN [Dimension].[Calendar] C

    ON IH.CalendarKey = C.CalendarKey

    JOIN [Dimension].[Warehouse] W

    ON IH.WhKey = W.WhKey

    JOIN [Dimension].[Inventory] I

    ON IH.[InvKey] = I.InvKey

    JOIN [Dimension].[Product] P

    ON IH.ProdKey = P.ProdKey

    JOIN [Dimension].[ProductType] PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    GROUP BY YEAR(C.[CalendarDate])

    ,MONTH(C.[CalendarDate])

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,W.WhName

    ,P.ProdId

    ,P.ProdName

    ,P.ProdType

    ,PT.ProdTypeName

    )

    SELECT InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName

    ,InventoryId,WarehouseId,WarehouseName,ProductType,ProductId

    ,ProductName

    ,MonthlyQtyOnHand

    ,RANK() OVER (

    PARTITION BY InvYear,InvMonthNo,InvMonthName,LocationId

    ,InventoryId,WarehouseId

    ORDER BY MonthlyQtyOnHand DESC

    ) QtyOnHandRank

    FROM WarehouseCTE

    GO

    ```


    ### 清单 12-9: 用于支持库存排名的 TSQL 视图


    代码很多，但值得花时间去审阅和理解它，特别是如果你刚接触 TSQL 编码的话。


    注意 `PARTITION BY` 子句中指定的分区粒度。我们指定了年份、月份（编号和名称）、位置、库存和仓库（我们没有分区到产品级别；你可以自己试试，并且修改视图使其使用
    `DENSE_RANK()` 函数）。


    最后，包含了一个 `ORDER BY` 子句，用于按 `MonthlyQtyOnHand` 降序对分区值的处理进行排序。


    如果性能缓慢，我们需要使用 `SCHEMA` 绑定重新创建报告，这意味着 `VIEW` 将实际填充物理数据并存在于磁盘上。这将使任何引用该视图的查询都变得快速！


    这是我们讨论过多次、用来替代 `CTE` 的报告表选项之外的另一个选择。只需按照以下代码片段修改 `VIEW DDL` 命令：


    ```sql

    CREATE OR ALTER VIEW Reports.MonthlyInventoryRanks

    -- 使用下面语句来实现一个物化的、绑定架构的视图

    WITH SCHEMABINDING

    AS

    ```


    ### Report Builder 教程


    现在，是时候简要介绍一下 Report Builder 的教程了，我们将使用它来构建并发布一份基于 Web 的报告到 `SSRS`。

    '
- fmt: '### Report Builder Mini Tutorial


    Let’s take a look at one of the new tools in your BI toolkit called Report Builder.
    As mentioned earlier in the book, this tool allows you to create reports based
    on your SQL Server databases and publish them to `SSRS`, Microsoft’s premier web
    reporting architecture.


    This section will take the form of a mini tutorial where we look at the steps
    required to create and publish the report to `SSRS`. It will provide you with
    the basic steps you need to take to create and publish a simple report to `SSRS`.
    It is not meant to cover all the features as this would take an entire book and
    not a section in a chapter. Hopefully, it will inspire you to try the tool and
    learn how to use it with all its features.


    By the way, expect a lot of screenshots!


    If you do not have Report Builder, simply search for it with your favorite browser
    and download it from the Microsoft site. It is free! Once you install it, start
    it up, and you are greeted with the following screen in `Figure 12-19`.


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig19_HTML.png)


    `Figure 12-19` Starting up Report Builder


    A screenshot of a getting started page presents the steps to create a report from
    a wizard or from a blank report. On the left screen, there are 4 icons of new
    report, New dataset, Open, and Recent.


    You are greeted with a pop-up panel that lets you choose the type of report or
    component you want to create. The following are the choices:


    *   `New Report` (create)

    *   `New Dataset` (create)

    *   `Open` (a saved report)

    *   `Recent` (open a recent report)


    You can also create a report using guided wizards. Clicking `New Report` displays
    all the wizards available to guide you through the report creation process.


    The choices are


    *   `Table or Matrix Wizard`

    *   `Chart Wizard`

    *   `Map Wizard`

    *   `Blank Report`


    We will select a new report for our example and use the `Table or Matrix Wizard`.
    This will give you access to the report wizards.


    The first panel you are presented with allows you to create or use an existing
    data set. A data set is an object that will contain data from the database you
    can use in the report.


    Tip


    If you are new to Report Builder, I recommend you use the wizards as they are
    easy to use and will give you a sense of what is involved in web-based report
    creation within a SQL Server architecture.


    Please refer to `Figure 12-20`.


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig20_HTML.png)


    `Figure 12-20` Create a data set


    A screenshot of a pop panel of New Table or Matrix. Includes a large box with
    an option above to choose an existing dataset in this report or a shared dataset.
    2 arrows indicate to select the create dataset option and click on the next button.


    Here you have a choice of selecting an existing data set or creating a new one.
    We will click the `“Create a dataset”` radio button and click the `Next` button.
    Another panel is presented.


    Please refer to `Figure 12-21`.


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig21_HTML.png)


    `Figure 12-21` Create a new data source


    A screenshot of a pop panel of New Table or Matrix. The header reads, Choose a
    connection to a data source, with a box below for data source connections. An
    arrow indicates to click on the new button.


    Before we create a data set, we need a connection to a data source that will provide
    the data we need. The data source provides data for the data set.


    Click the `“New”` button. Another panel is presented.


    Please refer to `Figure 12-22`.


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig22_HTML.png)


    `Figure 12-22` Data source properties


    A screenshot of a pop panel of Data source properties. 4 arrows indicates to select
    the server name field, use Windows authentication, select or enter a database
    name, and click on the test connection button.'
