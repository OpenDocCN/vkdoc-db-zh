- fmt: '# A screenshot of SQL SSMS window presents part 4 of estimated query plan
    with 16 components


    The components are segment, 2 compute scalar, nested loops 3%, table spool, segment,
    2 compute scalar, nested loops 3%, stream aggregate, 2 table spool, nested loops,
    stream aggregate, 2 table spools.


    ## Figure 10-25d

    ## Estimated baseline query plan, part 4


    We can see the patterns start to repeat themselves. Notice that as branches merge,
    the number of rows after the nested loops joins goes up. Makes sense, right?


    ### I am not showing the last section as it includes the nested loops join and
    all other tasks are 0% cost.


    ## We can now expect that the estimated query plan patterns when we use a function
    multiple times will usually be the same


    This assumption may or may not help you with any performance improvement. The
    good news is that if you try out a fix that improves one section, it most likely
    improves the others.


    ## Last but not least, let’s generate the `IO` and `TIME` statistics


    Please refer to Figure [10-26](#527021_1_En_10_Chapter.xhtml#Fig37).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig37_HTML.png)


    A screenshot of the SQL SSMS window. The text presents IO and TIME statistics.
    The SQL server parse and compile times for CPU and elapsed are 16 and 95 milliseconds.
    The SQL server execution times for CPU and elapsed are 0 and 95 milliseconds.
    72 rows of 7 table columns are affected.


    ## Figure 10-26

    ## IO and time statistics


    As can be seen, all the dimensions involved in the query have low values except
    for the Calendar dimension, which has logical reads at 24, physical reads at 1,
    and read-ahead reads at 24. All other values are either 0 or 1 except for the
    work table, which has scan count at 12 and logical reads at 676.


    Lastly, the `EquipmentFailure` table has scan count of 1, logical reads of 24,
    physical read of 1, and read-ahead reads of 29.


    SQL Server elapsed execution time is 85 ms. Not too bad.


    ## Note


    This window function does not support `ROWS` or `RANGE` window frame specifications
    in the `OVER()` clause, so this will not be an option to try to increase performance.


    ## Here comes a tip and some homework. First the tip:


    ## Tip


    Each time you generate a plan, do place the mouse over some of the lines so you
    can see the estimated number of rows flowing between tasks. This can help identify
    bottlenecks sometimes. If too many rows are going through, maybe you need to redefine
    the `WHERE` clause filters or add some new predicates.


    ## And here is the homework I promised:


    ## Homework


    Using the `SELECT` query that makes up the `VIEW`, create a new Calendar dimension
    called `CalendarEnhanced`. Use this new table in the queries we just discussed
    and run some estimated query plans. If indexes are suggested, create them and
    see what improvements in performance are achieved. The solution is in the script
    for this chapter.


    ## Let’s try our report table approach


    ### Our Usual Report Table Solution


    We are going to create a report table called `EquipFailPctCountDisc` so we can
    preload it, pay the penalties for all the `JOIN` clauses once, and assume the
    table is loaded off hours once a day.


    The following is the `INSERT` statement to load the table.


    Please refer to Listing [10-12](#527021_1_En_10_Chapter.xhtml#PC17).


    ```sql

    INSERT INTO Reports.EquipFailPctContDisc

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    Listing 10-12

    Loading the Report Table


    Now our query performance should improve. We use the query in the `CTE` block
    in an `INSERT` command to load a new report table. We will use this for the percentile
    query.


    Listing [10-13](#527021_1_En_10_Chapter.xhtml#PC18) is the modified query that
    accesses the new table.


    ```sql

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName

    ,[MonthName],CalendarMonth,SumEquipFailures

    -- actual value from list

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .75]

    FROM Reports.EquipFailPctContDisc

    WHERE CalendarYear = 2008

    GO

    ```

    Listing 10-13

    Modified Percentile Query


    I will not walk through it again as we discussed it earlier, so let us see what
    the estimated performance plan is for this revised strategy and query. One comment
    I would like to make is related to my naming standards. I tried to opt for descriptive
    column names in the query, so it is clear what the semantic value is. I am sure
    you can come up with better names.


    ## Let’s compare the right-hand side of the old and new estimated query plans


    Please refer to Figure [10-27](#527021_1_En_10_Chapter.xhtml#Fig38).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig38_HTML.png)


    A screenshot of the SQL SSMS window. It presents section 1 of the old and new
    plans with 8 and 10 components. Costs of 2 hash match, table scan, hash match,
    and clustered index are 8%, 1%, 17%, and 8% in the old plan. Costs of nested loops,
    sort, and table scan are 4%, 39%, and 42% in the new.


    ## Figure 10-27

    ## Comparing the first section of the old and new plans


    I am only showing the rightmost-hand side of the estimated query plans as this
    is where all the `JOINS` were. As can be seen in the new plan, the `JOINS` are
    gone, but we see a table scan at 42%.


    This replaces the clustered index seek on the fact table. We also see a new sort
    at 39% and a nested loops join task at 4% cost in the new estimated query plan.


    Of course, we do not have a clustered index created on the new table yet, but
    it only contains 1,517 rows, which is what the `CTE` returned in the old query.
    Also, the estimated query plan tool did not suggest an index, so we will leave
    it as is.


    ## All that is left to look at are the `TIME` and `IO` statistics


    This will tell us if the report table comes to our rescue again.


    Please refer to Figure [10-28](#527021_1_En_10_Chapter.xhtml#Fig39).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig39_HTML.png)'
