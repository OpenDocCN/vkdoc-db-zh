- fmt: "# FIRST_VALUE() and LAST_VALUE() Functions\n\nHere are our next window functions.\
    \ Remember these?\n\nGiven a set of sorted values, the `FIRST_VALUE()` function\
    \ will return the first value in the partition. So, depending on whether you sort\
    \ it in ascending order or descending order, the value will change! This is the\
    \ value of the first position of the data partition, not the smallest value in\
    \ the data set.\n\nGiven a set of sorted values, the `LAST_VALUE()` function will\
    \ return the last value in the partition. Depending on how you sort the partition,\
    \ the value will also be different as discussed earlier.\n\nBoth functions return\
    \ whatever data type was used as an argument by the way; it could be an integer,\
    \ it could be a string, etc. If this is a little unclear, create your own table\
    \ variable with ten or more rows and write some queries against it so you can\
    \ see how these window functions behave. Practicing a little will make the usage\
    \ and results of the window functions clear.\n\nLet’s dive right into the example.\
    \ Here is our business specification:\n\nOur analyst wants to see the first and\
    \ last values for each group of failures by year, location, and month. This has\
    \ to include all calendar years and plants, so the result will be fairly large.\
    \ The month names need to be spelled out, and so do the quarter names.\n\nLooking\
    \ at this specification, we realize we need to use the `Calendar VIEW`, which\
    \ has the `CASE` blocks for quarter and month names – this could be expensive.\
    \ Let’s check out the query.\n\nPlease refer to Listing [10-2](#527021_1_En_10_Chapter.xhtml#PC3).\n\
    \n```sql\nWITH FailedEquipmentCount\n(\nCalendarYear, QuarterName, MonthName,\
    \ CalendarMonth, PlantName, LocationName, SumEquipFailures\n)\nAS (\nSELECT\n\
    \    C.CalendarYear\n    ,C.QuarterName\n    ,C.MonthName\n    ,C.CalendarMonth\n\
    \    ,P.PlantName\n    ,L.LocationName\n    ,SUM(EF.Failure) AS SumEquipFailures\n\
    FROM DimTable.CalendarView C\nJOIN FactTable.EquipmentFailure EF\n    ON C.CalendarKey\
    \ = EF.CalendarKey\nJOIN DimTable.Equipment E\n    ON EF.EquipmentKey = E.EquipmentKey\n\
    JOIN DimTable.Location L\n    ON L.LocationKey = EF.LocationKey\nJOIN DimTable.Plant\
    \ P\n    ON L.PlantId = P.PlantId\nGROUP BY\n    C.CalendarYear\n    ,C.QuarterName\n\
    \    ,C.MonthName\n    ,C.CalendarMonth\n    ,P.PlantName\n    ,L.LocationName\n\
    )\nSELECT PlantName, LocationName, CalendarYear, QuarterName, MonthName,   CalendarMonth,\
    \ SumEquipFailures\n    ,FIRST_VALUE(SumEquipFailures) OVER (\n        PARTITION\
    \ BY PlantName,LocationName,CalendarYear,QuarterName\n        ORDER BY CalendarMonth\n\
    \    ) AS FirstValue\n    ,LAST_VALUE(SumEquipFailures) OVER (\n        PARTITION\
    \ BY PlantName,LocationName,CalendarYear,QuarterName\n        ORDER BY CalendarMonth\n\
    \    ) AS LastValue\nFROM FailedEquipmentCount\nGO\n```\n\nListing 10-2 First\
    \ and Last Values for Failures by Plant, Location, and Year\n\nWe are already\
    \ starting to see a trend taking shape here. Our first query and this query seem\
    \ to be using the same `CTE` block, so we might definitely want to consider using\
    \ a common report table based on the `CTE` instead of reinventing the `CTE` each\
    \ time we need it. This is a simple but effective performance strategy and also\
    \ simplifies the coding required for all our solutions.\n\nAs far as the logic\
    \ for the `OVER()` clause, we see that a partition is set up by plant, location,\
    \ year, and quarter for both the `FIRST_VALUE()` and `LAST_VALUE()` functions.\
    \ The same is true for the `ORDER BY` clause used in both functions. The rows\
    \ in the partition are sorted by month.\n\nLet’s see the results generated by\
    \ this query. Please refer to the partial results in Figure [10-7](#527021_1_En_10_Chapter.xhtml#Fig9).\n\
    \n![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig9_HTML.png)\n\nA screenshot\
    \ of the S Q L, S S M S window. It has a table of 10 columns and 1517 rows. The\
    \ column headers are Plant name, location name, calendar year, quarter name, month\
    \ name, calendar month, sum equipment failures, first value, and last value. The\
    \ top part of the last 6 columns is outlined.\n\nFigure 10-7 First and last failure\
    \ values by quarter\n\nAs can be seen, everything lines up nicely. Notice that\
    \ for the first row for each quarter partition, the first and last values are\
    \ the same. As we move to the second month in the quarter, the values change,\
    \ and the same is true for the third month. Going into the next quarter, the first\
    \ and last values are reset and are the same. This report gives us a nice indication\
    \ of the failure spreads, from smallest to largest on a calendar quarter basis.\n\
    \n## Performance Considerations\n\nLet’s create our baseline estimated query plan\
    \ to see what the damage is.\n\nPlease refer to Figure [10-8](#527021_1_En_10_Chapter.xhtml#Fig10).\n\
    \n![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig10_HTML.png)\n\nA screenshot\
    \ of the S Q L, S S M S window, with project tab selected. It presents a baseline\
    \ query plan with 12 components. The components are stream aggregate, sort, hash\
    \ match, table scan, hash match, table scan, hash match, table scan, hash match,\
    \ clustered index, compute scalar, and table scan.\n\nFigure 10-8 Baseline estimated\
    \ query plan for first and last values\n\nLooking at the high-value costs, we\
    \ see a clustered index scan at 4% (not bad, but a seek would have been better),\
    \ a whole bunch of hash match joins with costs ranging from 26% to 9%, and three\
    \ table scans at 1%. Finally, at the top left, we see an expensive sort chiming\
    \ in at 29% and not seen in the plan a window spool at 2% (appears on the left\
    \ side of the plan).\n\nSo as not to waste time, I tried a test whereby I denormalized\
    \ by combining the Plant and Location tables and substituting the new table in\
    \ the query, but the results were actually a little worse, so let’s forget about\
    \ that strategy. You can try it on your own though if you want.\n\nI think all\
    \ we could do to improve performance is to replace the `CTE` block with a report\
    \ table as previously discussed."
  raw: '### FIRST_VALUE( ) and LAST_VALUE( ) Functions


    Here are our next window functions. Remember these?


    Given a set of sorted values, the `FIRST_VALUE()` function will return the first
    value in the partition. So, depending on whether you sort it in ascending order
    or descending order, the value will change! This is the value of the first position
    of the data partition, not the smallest value in the data set.


    Given a set of sorted values, the `LAST_VALUE()` function will return the last
    value in the partition. Depending on how you sort the partition, the value will
    also be different as discussed earlier.


    Both functions return whatever data type was used as an argument by the way; it
    could be an integer, it could be a string, etc. If this is a little unclear, create
    your own table variable with ten or more rows and write some queries against it
    so you can see how these window functions behave. Practicing a little will make
    the usage and results of the window functions clear.


    Let’s dive right into the example. Here is our business specification:


    Our analyst wants to see the first and last values for each group of failures
    by year, location, and month. This has to include all calendar years and plants,
    so the result will be fairly large. The month names need to be spelled out, and
    so do the quarter names.


    Looking at this specification, we realize we need to use the `Calendar VIEW`,
    which has the `CASE` blocks for quarter and month names – this could be expensive.
    Let’s check out the query.


    Please refer to Listing [10-2](#527021_1_En_10_Chapter.xhtml#PC3).


    ```

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, MonthName, CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT PlantName, LocationName, CalendarYear, QuarterName, MonthName,   CalendarMonth,
    SumEquipFailures

    ,FIRST_VALUE(SumEquipFailures) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS FirstValue

    ,LAST_VALUE(SumEquipFailures) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS LastValue

    FROM FailedEquipmentCount

    GO

    Listing 10-2

    First and Last Values for Failures by Plant, Location, and Year

    ```


    We are already starting to see a trend taking shape here. Our first query and
    this query seem to be using the same `CTE` block, so we might definitely want
    to consider using a common report table based on the `CTE` instead of reinventing
    the `CTE` each time we need it. This is a simple but effective performance strategy
    and also simplifies the coding required for all our solutions.


    As far as the logic for the `OVER()` clause, we see that a partition is set up
    by plant, location, year, and quarter for both the `FIRST_VALUE()` and `LAST_VALUE()`
    functions. The same is true for the `ORDER BY` clause used in both functions.
    The rows in the partition are sorted by month.


    Let’s see the results generated by this query. Please refer to the partial results
    in Figure [10-7](#527021_1_En_10_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig9_HTML.png)


    A screenshot of the S Q L, S S M S window. It has a table of 10 columns and 1517
    rows. The column headers are Plant name, location name, calendar year, quarter
    name, month name, calendar month, sum equipment failures, first value, and last
    value. The top part of the last 6 columns is outlined.


    Figure 10-7


    First and last failure values by quarter


    As can be seen, everything lines up nicely. Notice that for the first row for
    each quarter partition, the first and last values are the same. As we move to
    the second month in the quarter, the values change, and the same is true for the
    third month. Going into the next quarter, the first and last values are reset
    and are the same. This report gives us a nice indication of the failure spreads,
    from smallest to largest on a calendar quarter basis.


    ### Performance Considerations


    Let’s create our baseline estimated query plan to see what the damage is.


    Please refer to Figure [10-8](#527021_1_En_10_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig10_HTML.png)


    A screenshot of the S Q L, S S M S window, with project tab selected. It presents
    a baseline query plan with 12 components. The components are stream aggregate,
    sort, hash match, table scan, hash match, table scan, hash match, table scan,
    hash match, clustered index, compute scalar, and table scan.


    Figure 10-8


    Baseline estimated query plan for first and last values


    Looking at the high-value costs, we see a clustered index scan at 4% (not bad,
    but a seek would have been better), a whole bunch of hash match joins with costs
    ranging from 26% to 9%, and three table scans at 1%. Finally, at the top left,
    we see an expensive sort chiming in at 29% and not seen in the plan a window spool
    at 2% (appears on the left side of the plan).


    So as not to waste time, I tried a test whereby I denormalized by combining the
    Plant and Location tables and substituting the new table in the query, but the
    results were actually a little worse, so let’s forget about that strategy. You
    can try it on your own though if you want.


    I think all we could do to improve performance is to replace the `CTE` block with
    a report table as previously discussed.'
  trans: "\n# FIRST_VALUE() 与 LAST_VALUE() 函数\n\n接下来我们介绍这两个窗口函数。还记得它们吗？\n\n在给定一组已排序的值后，`FIRST_VALUE()`\
    \ 函数将返回分区中的第一个值。因此，根据你按升序还是降序排序，该值会有所不同！这是数据分区中**第一个位置**的值，而不是数据集中的最小值。\n\n在给定一组已排序的值后，`LAST_VALUE()`\
    \ 函数将返回分区中的最后一个值。与之前讨论的一样，根据你对分区的排序方式，该值也会不同。\n\n顺便说一下，这两个函数返回的数据类型与作为参数传入的类型相同；它可以是整数、字符串等。如果这里有点不清楚，你可以创建一个包含十行或更多行的自定义表变量，并针对它编写一些查询，这样你就能看到这些窗口函数的行为。稍微练习一下，窗口函数的用法和结果就会变得清晰。\n\
    \n让我们直接看例子。这是我们的业务需求：\n\n我们的分析师希望查看按年份、地点和月份分组的每组故障的第一个和最后一个值。这必须包含所有日历年和工厂，因此结果集会相当大。月份名称和季度名称需要完整拼写出来。\n\
    \n查看这个需求后，我们意识到需要使用 `Calendar VIEW`，它包含用于季度和月份名称的 `CASE` 语句块——这可能会带来性能开销。让我们看看查询语句。\n\
    \n请参考清单 10-2。\n\n```sql\nWITH FailedEquipmentCount\n(\nCalendarYear, QuarterName,\
    \ MonthName, CalendarMonth, PlantName, LocationName, SumEquipFailures\n)\nAS (\n\
    SELECT\n    C.CalendarYear\n    ,C.QuarterName\n    ,C.MonthName\n    ,C.CalendarMonth\n\
    \    ,P.PlantName\n    ,L.LocationName\n    ,SUM(EF.Failure) AS SumEquipFailures\n\
    FROM DimTable.CalendarView C\nJOIN FactTable.EquipmentFailure EF\n    ON C.CalendarKey\
    \ = EF.CalendarKey\nJOIN DimTable.Equipment E\n    ON EF.EquipmentKey = E.EquipmentKey\n\
    JOIN DimTable.Location L\n    ON L.LocationKey = EF.LocationKey\nJOIN DimTable.Plant\
    \ P\n    ON L.PlantId = P.PlantId\nGROUP BY\n    C.CalendarYear\n    ,C.QuarterName\n\
    \    ,C.MonthName\n    ,C.CalendarMonth\n    ,P.PlantName\n    ,L.LocationName\n\
    )\nSELECT PlantName, LocationName, CalendarYear, QuarterName, MonthName,   CalendarMonth,\
    \ SumEquipFailures\n    ,FIRST_VALUE(SumEquipFailures) OVER (\n        PARTITION\
    \ BY PlantName,LocationName,CalendarYear,QuarterName\n        ORDER BY CalendarMonth\n\
    \    ) AS FirstValue\n    ,LAST_VALUE(SumEquipFailures) OVER (\n        PARTITION\
    \ BY PlantName,LocationName,CalendarYear,QuarterName\n        ORDER BY CalendarMonth\n\
    \    ) AS LastValue\nFROM FailedEquipmentCount\nGO\n```\n\n清单 10-2 按工厂、地点和年份显示故障的第一个和最后一个值\n\
    \n我们已经开始看到一种趋势正在形成。我们的第一个查询和这个查询似乎使用了相同的 `CTE` 块，因此我们肯定应该考虑基于该 `CTE` 使用一个通用的报告表，而不是每次需要时都重新创建\
    \ `CTE`。这是一个简单但有效的性能策略，同时也简化了我们所有解决方案所需的编码。\n\n关于 `OVER()` 子句的逻辑，我们看到为 `FIRST_VALUE()`\
    \ 和 `LAST_VALUE()` 函数都设置了按工厂、地点、年份和季度的分区。两个函数中使用的 `ORDER BY` 子句也是如此。分区中的行按月份排序。\n\
    \n让我们看看这个查询生成的结果。请参考图 10-7 中的部分结果。\n\n![](img/527021_1_En_10_Fig9_HTML.png)\n\n\
    一张 SQL Server Management Studio (SSMS) 窗口的截图。其中有一个包含 10 列和 1517 行的表格。列标题分别是：工厂名称、地点名称、日历年、季度名称、月份名称、日历月份、设备故障总和、第一个值和最后一个值。最后\
    \ 6 列的顶部部分被框出。\n\n图 10-7 按季度显示的第一个和最后一个故障值\n\n如图所示，一切都排列得很好。请注意，对于每个季度分区的第一行，第一个值和最后一个值是相同的。当我们移动到季度中的第二个月时，值会发生变化，第三个月也是如此。进入下一个季度时，第一个值和最后一个值会重置并且再次相同。这个报告很好地显示了故障按日历季度从小到大的分布情况。\n\
    \n## 性能考量\n\n让我们创建基线估计查询计划，看看其开销如何。\n\n请参考图 10-8。\n\n![](img/527021_1_En_10_Fig10_HTML.png)\n\
    \n一张 SQL Server Management Studio (SSMS) 窗口的截图，选择了执行计划选项卡。它展示了一个包含 12 个组件的基线查询计划。这些组件分别是：流聚合、排序、哈希匹配、表扫描、哈希匹配、表扫描、哈希匹配、表扫描、哈希匹配、聚集索引、计算标量和表扫描。\n\
    \n图 10-8 第一个和最后一个值的基线估计查询计划\n\n查看高成本操作，我们看到一个聚集索引扫描占 4%（不算太糟，但查找操作会更好），一堆哈希匹配联接的成本从\
    \ 26% 到 9% 不等，以及三个表扫描各占 1%。最后，在左上角，我们看到一个昂贵的排序操作占 29%，以及一个在计划左侧出现的窗口假脱机操作占 2%（在计划左侧显示）。\n\
    \n为了避免浪费时间，我尝试了一个测试，即通过组合 Plant 和 Location 表进行反规范化，并在查询中用新表替代，但结果实际上更差一些，所以我们就放弃这个策略吧。不过如果你愿意，可以自己试试。\n\
    \n我认为我们能做的改进性能的事情，就是像之前讨论的那样，用报告表替换 `CTE` 块。\n"
- fmt: '# LAG( ) Function


    We are lagging behind, so let’s look at the next function, the `LAG()` function
    (bad pun!).


    Recall what the `LAG()` function does:


    This function is used to retrieve the previous value of a column relative to the
    current row column value (usually within a time dimension). For example, given
    this month’s failure value for plant equipment, like a motor, pull last month’s
    failure value for the same equipment ID or specify some offset, like three months
    ago or even a year or more depending on how much historical data has been collected
    and what your business analyst wants to see.


    Use this logic to calculate the difference. Did failures go up or down? Critical
    measurement to monitor to spot failing equipment! Maybe the manufacturer needs
    a stern talking too?


    Here are the specifications for the query our analyst wants:


    A query is needed that reports failure rates one month behind so the failure can
    be compared to the current month’s failure rate. The report needs to specify the
    year, quarter, and month calendar values together with the plant name and location.
    Each month’s value should be a total of all failures for the month. So the report
    is historical in nature.


    Please refer to Listing [10-3](#527021_1_En_10_Chapter.xhtml#PC4).


    ```

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, MonthName, CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName, LocationName, CalendarYear, QuarterName, MonthName, CalendarMonth,
    SumEquipFailures,

    LAG(SumEquipFailures,1,0) OVER (

    PARTITION BY PlantName, LocationName, CalendarYear, QuarterName

    ORDER BY CalendarMonth

    ) AS LastFailureSum

    FROM FailedEquipmentCount

    WHERE CalendarYear > 2008

    GO

    ```


    ## Listing 10-3

    Last Month’s Equipment Failures


    The `CTE` query has a five-way table `JOIN` plus the `SUM()` function and the
    obligatory `GROUP BY` clause. You know this could cause performance problems.


    The `OVER()` clause has a `PARTITION BY` clause and an `ORDER BY` clause. This
    means the default behavior for the frame is


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    Or does it?


    Turns out the `LAG()` and `LEAD()` functions also cannot have a window frame.
    Easy trap to fall into! So when you use this or the `LEAD()` function, forget
    about window frame definitions. It makes sense if you think about how the functions
    work. They either look forward or backward and that’s it!


    Back to the query. The partition is set up by plant name, location name, year,
    and quarter. The partition is sorted by the month (numeric value).


    Lastly, notice the parameters used with the `LAG()` function; the failure value
    is included, 1 indicates go back one month (second parameter), and 0 (third parameter)
    means replace any `NULL` values with 0. Try changing the value of the number of
    months to skip to get a feel for how the function works.


    Please refer to the partial results in Figure [10-9](#527021_1_En_10_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig11_HTML.jpg)


    ## Figure 10-9

    Monthly lag report for equipment failures


    A screenshot of the S Q L, S S M S window. It has a table of 9 columns and 1011
    rows. The column headers are Plant name, location name, calendar year, quarter
    name, month name, calendar month, sum equipment failures, and last failure sum.
    3 arrows point to sum equipment failure values.


    Notice the zero values. These mark the beginning of the partitions, so the prior
    rows (months) are ignored. Everything lines up though.


    If we add a calculation that subtracts the lag value from the current month’s
    failure value, we could see the change in the failure rates. Try out this code
    snippet:


    ```

    ,SumEquipFailures –

    LAG(SumEquipFailures,1,0) OVER

    (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS FailureChange

    ```


    Good indicator to see if failures are going up or down.'
