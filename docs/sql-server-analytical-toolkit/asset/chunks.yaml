    # Summary


    Did we meet our objectives?


    We introduced the `APSales` data warehouse and studied the conceptual model for
    this database.


    We also became familiar with the tables, columns, and relationships between the
    tables by introducing some simple `data dictionaries`.


    We’ve covered the `window functions` in the `aggregate function category` by creating
    examples that used the `OVER()` clause to define `window frames` for the `data
    sets` generated by the queries.


    One important objective was that we needed to understand `performance analysis`
    and `tuning` associated with queries that use the `window functions` and `OVER()`
    clauses. This was accomplished by generating and studying `query plans` and `IO
    statistics`. This information was used to arrive at conclusions on how to improve
    performance.


    We also identified the `window spool statistics` as an important value to monitor.
    Make sure you understand what this means.


    Last but not least, we took a peek at the new `WINDOW` feature in `SQL Server
    2022` that shows a lot of promise in the areas of code readability and implementation.
    Our quick analysis showed that it did not degrade performance but also it did
    not improve performance over the old syntax, but further testing needs to be done
    with larger `data sets`.


    By the way, now is a good time, if you have not done so already, to download the
    example script for this chapter and practice what you just learned.


    In our next chapter, we cover the `analytical functions`, which are a very powerful
    set of tools used in data analysis and reporting. We will also start adding `ROWS`
    and `RANGE` clauses to the queries we discuss that override the default behavior
    of `window frames` when we do not specify them.


    # 3. Sales Use Case: Analytical Functions


    Now that we have created and familiarized ourselves with the sales data warehouse
    and created queries that use aggregate `window functions`, we can move to our
    next step, learning and creating queries using the `analytical functions` available
    with `SQL Server`.


    In the last chapter, we touched upon `performance tuning` the queries. We will
    use the same approach in this chapter, but we will look at other `performance
    tools` such as `client statistics` to give us a more complete picture of how the
    queries run.


    We will make heavy use of `execution statistics`, that is, we compare `statistics`
    before recommended `indexes` are created and after, to see if they improve performance
    or not.


    Lastly, we will look at setting up `preloaded reporting tables` and `memory-optimized
    tables` to see if they can yield higher query performance.


    The functions we are studying are processing intensive, so we want to make sure
    we write efficient, accurate, and fast-executing queries and scripts. `Query tuning`,
    `index creation`, and `performance analysis` are all part of the process for delivering
    useful and actionable data to your business analysts.


    ## Analytical Functions


    The following are the eight functions for this category sorted by name. They can
    be used in queries together with the `OVER()` clause to generate valuable reports
    for our business analysts:


    *   `CUME_DIST()`

    *   `FIRST_VALUE()`

    *   `LAST_VALUE()`

    *   `LAG()`

    *   `LEAD()`

    *   `PERCENT_RANK()`

    *   `PERCENTILE_CONT()`

    *   `PERCENTILE_DISC()`


    The same approach as the prior chapter will be taken. I describe what the function
    does and present the code and the results. Next, some `performance analysis` is
    performed so we can see what improvements, if any, are required.


    As we saw in the examples in Chapter [2](#527021_1_En_2_Chapter.xhtml), improvements
    can be adding `indexes` or even creating a `denormalized report table` so that
    when the query using the `analytical window functions` is executed, it goes against
    `preloaded data` avoiding joins, calculations, and complex logic.'
