    statistics value was


    ```

    |--Window Spool(RANGE BETWEEN:(UNBOUNDED, [

    [APFinance].[Financial].[Portfolio].[CustId],

    [APFinance].[Financial].[Portfolio].[Year],

    [APFinance].[Financial].[Portfolio].[Portfolio],

    [APFinance].[Financial].[Portfolio].[Month]

    ])

    )

    ```


    Now this tells us that we need to be careful how we set up our partition definition.
    By only filtering on the cash portfolio, I did not need to include the `PARTITION
    BY` portfolio clause, and the `ORDER BY` clause should have referenced the `TradeMonth`
    column only.


    Since you might want to try this query so that it works on multiple customers,
    portfolios, and years, then you need the customer, portfolio, and year columns
    in the partition definitions. Make sure you understand what you want to process;
    else, you might add unnecessary code that will slow down performance.


    Here is what you might want to try:


    ```

    ,STDEV(MonthlyValue) OVER(

    PARTITION BY CustId, TradeYear,Portfolio

    ORDER BY CustId, TradeYear,Portfolio,TradeMonth

    ) AS RollingMonthlyStdev

    ```


    Finally, we look at the last sort task in the query plan. Please refer to Figure
    [5-44g](#527021_1_En_5_Chapter.xhtml#Fig52).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig52_HTML.png)


