  raw: '### LAG( ) and LEAD( )


    These are very important functions to include in your programming toolkit to analyze
    data. One of the activities your business analysts perform is to look back in
    time or forward in time within a set of data that is historical in nature. Of
    course, the data could be a snapshot that includes current and past data but no
    future data. These functions allow you to create powerful queries and reports
    to do exactly that.


    Here’s what the `LAG()` function does:


    This function is used to retrieve the previous value of a column relative to the
    current row column value. For example, given this month’s sales amounts for a
    product, pull last month’s sales amounts for the same product or specify some
    offset, like three months ago or even a year or more depending on how much historical
    data you have collected and what your business users want to see.


    Here’s what the `LEAD()` function does:


    This function is used to retrieve the next value relative to the current row column.
    For example, given this month’s sales amounts for a product, pull next month’s
    sales amounts for the same product or specify some offset, like three months in
    the future or even a year in the future.


    These functions come particularly handy in a sales scenario where you need to
    analyze historical sales performance or current performance against past performance.


    Now that we have a memory-optimized table, we will use it instead of the `CTE`
    scheme we used for most of the examples in this chapter. Performance should be
    very fast!


    Please refer to Listing [3-14](#527021_1_En_3_Chapter.xhtml#PC23).


    ```

    SELECT

    SalesYear,

    SalesQuarter,

    SalesMonth,

    StoreNo,

    ProductNo,

    CustomerNo,

    CalendarDate AS SalesDate,

    SalesTotal,

    LAG(SalesTotal) OVER (

    PARTITION BY SalesYear,CustomerNo

    ORDER BY SalesMonth,CustomerNo,CalendarDate

    ) AS LastMonthlySales,

    LEAD(SalesTotal) OVER (

    PARTITION BY SalesYear,CustomerNo

    ORDER BY SalesMonth,CustomerNo,CalendarDate

    ) AS NextMonthylSales

    FROM [SalesReports].[MemorySalesTotals]

    WHERE StoreNO = ''S00005''

    AND SalesYear = 2002

    GO

    Listing 3-14

    The LAG() and LEAD() Functions in Action

    ```


    This time we let the query rip with filters for the store number and year. The
    query generated 902 rows (still not a lot of rows as far as SQL Server is concerned).


    The time to execute was less than one second. Please refer to the partial results
    in Figure [3-13](#527021_1_En_3_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig13_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a results table. The table has 9 columns. Some values
    of the Last Monthly Sales and Next Monthly Sales columns are highlighted.


    Figure 3-13


    Query results for the test script


    I scrolled down a bit so you can see the data patterns when the window frame moves
    to the next partition. Notice the red arrows. We can see that the `LastMonthlySales`
    column points to the prior month’s value and that the `NextMonthlySales` column
    points to next month’s value in the `SalesTotal` column.


    We can see the window frame action in rows 41 and 42\. The next month’s sales
    amount is set to `NULL` when the partition changes, and the prior month’s sales
    value in row 42 is also `NULL` as we are starting a new partition (keep in mind
    the difference between a partition and a window frame within a partition).


    Download the script and remove the filter predicate for the year so you get all
    years for this store. If you want not only the years but all the stores, you might
    need to fiddle a bit with the sort orders, so everything lines up correctly.


    That’s why I always recommend starting with a small data set when creating a complex
    script or query. When you are sure it works correctly, you can expand the scope
    by removing any filters.


    ### Performance Considerations


    Next, we see what kind of performance issues are related to these functions and
    some possible solutions to improve performance. As usual our first step is to
    create an estimated query plan in the usual manner. Make sure you run the `DBCC`
    command to clear buffers first.


    Please refer to Figure [3-14](#527021_1_En_3_Chapter.xhtml#Fig14) for the estimated
    execution plan.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig14_HTML.jpg)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Sort Cost, 1%. Filter Cost,
    15%. Table Scan Cost, 78%.


    Figure 3-14


    Estimated execution plan


    This estimated query plan shows that the query needs attention.


    Reading from right to left, we see a table scan at a cost of 78% followed by a
    filter at a cost of 15% and a sort step at a small cost of 5%. An index was suggested,
    so let’s pull it out and give it a name.


    Please refer to Listing [3-15](#527021_1_En_3_Chapter.xhtml#PC24) for the suggested
    index.


    ```

    ALTER TABLE [SalesReports].[MemorySalesTotals]

    ADD INDEX ieSalesYearStoreNo

    NONCLUSTERED ([SalesYear],[StoreNo])

    GO

    Listing 3-15

    Estimate Query Plan Tool Suggested Index

    ```


    Notice we must use the `ALTER` command as memory-enhanced tables do not support
    the `CREATE INDEX` command!


    This index is based on the sales year and store number columns. Let’s create it,
    run the `DBCC` command again, and generate a new estimated query plan.


    Please refer to Figure [3-15](#527021_1_En_3_Chapter.xhtml#Fig15) for the estimated
    plan after the index was created.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig15_HTML.jpg)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Sort Cost, 15%. Index Seek
    Cost, 36%.


    Figure 3-15


    Estimated query plan after the index was created


    An index scan at a cost of 36% replaces the table scan that had a cost of 78%,
    so we are off to a good start. The filter task is gone, but the sort step increased
    from 5% to 51%. Once again it seems when we use an index seek, the sort step cost
    goes up. Let’s look at the second part of the plan by scrolling to the left.


    Please refer to Figure [3-16](#527021_1_En_3_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig16_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Window Spool Cost, 5%.
    Window Spool Cost, 5%.


    Figure 3-16


    The left-hand side of the estimated query plan


    Working from right to left again, notice the first window spool task. This has
    a cost of 5% and is used to reference data in the partition (which is in memory)
    multiple times. There are some other low-cost tasks, and we see a second window
    spool task. This also costs 5%. One thing to keep in mind: We should aim for 0%
    for window spool tasks. This means the action is in memory. If the value is greater
    than zero, then the spool activity is on disk. (Will more memory help?)


    Here are the final `IO` and `TIME` statistics once the index is created. The query
    was run two times. Each time the DBCC command was executed to clear the memory
    buffers (a little reminder …).


