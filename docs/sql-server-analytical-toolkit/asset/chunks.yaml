- fmt: '# FIRST_VALUE( ) and LAST_VALUE( ) Functions


    Here are our next window functions. Remember these?


    Given a set of sorted values, the `FIRST_VALUE()` function will return the first
    value in the partition. So, depending on whether you sort it in ascending order
    or descending order, the value will change!


    This is the value of the first position in the data partition, not necessarily
    the smallest value in the data set. This is easy to misunderstand when you are
    first becoming familiar with this function. One could misinterpret the first value
    meaning smallest and last value meaning largest.


    Next, given a set of sorted values, the `LAST_VALUE()` function will return the
    last value in the partition. Again, depending on how you sort the partition, this
    will also be different as discussed earlier.


    Both functions return whatever data type was used as an argument. By the way,
    it could be an integer, a string, a date, etc. If this is a little unclear, create
    your own table variable with ten or more rows and write some queries against it
    so you can see how these window functions behave. Practicing a little will make
    the usage and results of the window functions clear.


    **Reminder**


    When learning new functions like these, always practice with small simple data
    sets so the function behavior clearly stands out. Also, it will help you understand
    how the query performs when you run the estimated execution plans and the statistics.
    Nothing like running a query that takes hours to run and returns millions of rows
    only to find out the logic you used was wrong!


    Let’s dive right into the example. Here is our business specification:


    A report is needed that shows on a month-by-month basis if the average inventory
    on hand for our favorite location “LOC1,” inventory “INV1,” warehouse “WH112,”
    and product “P010” is going up or down. The results have to be on a rolling basis.
    That is, we want the first and last values for the year as the months go by. The
    calendar year is 2002, so we will need it in the `WHERE` clause.


    The first value will be the value for January and does not change. As the partition
    grows, in order to consider the next month, the average for the new month will
    be the last value. We need to calculate the difference as we roll month by month.


    Based on these business requirements, this is what we came up with. We will look
    at the base portion of the query as the `CTE` used is the same as the prior query.
    Please refer to `Listing 13-2`.


    ```

    /* CTE goes here */

    SELECT AsOfYear

    ,AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,AvgQtyOnHand AS MonthlyAvgQtyOnHand

    ,FIRST_VALUE(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) AS FirstValue

    ,LAST_VALUE(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) AS LastValue

    ,LAST_VALUE(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) -   FIRST_VALUE(AvgQtyOnHand) OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) AS Change

    FROM YearlyWarehouseReport

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    Listing 13-2

    Rolling First and Last Value Monthly Averages

    ```


    We used the query used for the cumulative distribution example and replaced the
    `CUME_DIST()` function with the `FIRST_VALUE()` and `LAST_VALUE()` functions.
    Very easy modification. As you come up with solutions in your day-to-day work
    activities, you want to reuse queries and scripts as much as possible in order
    to avoid reinventing the wheel. These are other toolkit components, scripts, and
    queries you can reuse and modify to satisfy new business requirements.


    **Tip**


    Create a dedicated folder so you can store all your scripts, templates, and queries.
    This way they are readily available for each new coding assignment. These are
    part of your toolkit too!


    Both `OVER()` clauses have a `PARTITION BY` clause and an `ORDER BY` clause. The
    partition is set up by year, and the `ORDER BY` clause is set up by `AsOfDate`
    instead of `AsOfMonth`. The `AsOfDate` happens to be the last day of the month,
    so it works out. We should have used the `AsOfMonth` value instead in order to
    avoid confusion with the query logic, but it works.


    Let’s see the results. Please refer to the partial results in `Figure 13-5`.


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig5_HTML.png)


    A screenshot of the S Q L S S M S window. It has a table of 15 columns and 13
    rows. The column headers are as of year, as of quarter, as of quarter name, as
    of month, average month name, as of date, loc I D, Inv I D, W h I D, product I
    D, monthly average, first value, last value, and change.


    `Figure 13-5`


    Average monthly quantity, first and last values


    These are good results that an analyst can use to analyze average inventory movement
    on a month-by-month basis. Granted, this is for only one year, but you know we
    can remove the filters and use this query to populate a report table that is accessed
    by an `SSRS` report that allows users to set up filters that suit the patterns
    they wish to analyze. Or maybe use it for a pivot table in an Excel spreadsheet
    or a denormalized table for an `SSAS` multidimensional cube or even a `Power BI`
    scorecard.


    That’s why performance tuning is important. Returning 12 rows of data for one
    year is much different than returning thousands of rows for multiple locations,
    inventories, warehouses, and products (easy to validate too).


    Note the change as we go month by month. This data will look impressive in a Microsoft
    Excel spreadsheet, so let’s do our usual copy-and-paste routine.


    Please refer to `Figure 13-6`.


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig6_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 13 rows.
    The column headers are month, average first value, last value, and change. It
    also has a waterfall chart of change versus the monthly average with a fluctuating
    ascending trend of bars for increase, decrease, and total.


    `Figure 13-6`


    Excel first and last value analysis


    This is another analysis that allows the business analyst to identify if inventory
    movements are going up or down, which indicates if sales are going up or down.
    If inventory is going up and not down, then the sales analyst needs to have a
    meeting with the marketing team to understand why products are not selling and
    products remain in inventory. This involves a detailed analysis to see the offending
    stores that have low sales and why (if you are viewing this via an eBook, the
    colors really stand out)!'
