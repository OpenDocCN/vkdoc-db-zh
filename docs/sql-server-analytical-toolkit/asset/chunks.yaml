    ### 性能考量


    下面是我们估算的查询计划分析。分支模式将与之前大不相同，因为我们现在使用的是库存事务数据库，不会再看到创建 `STAR` 和 `SNOWFLAKE` 查询时出现的那些连接操作。此外，`Warehouse`
    表只有大约 25,000 行，与数据仓库中近一百万行的事实表相比差异巨大。请参考图 13-27。


    ![](img/527021_1_En_13_Fig27_HTML.png)


    `SQLSSMS` 窗口的截图。它展示了一个包含 13 个组件的估算查询执行计划。这些组件分别是：嵌套循环、表假脱机、段、计算标量、排序、流聚合、排序、计算标量、聚集索引、嵌套循环、流聚合、表假脱机和表假脱机。


    **图 13-27**

    估算的查询执行计划


    照例，我们关注高成本任务。从右向左看，我们发现一个成本为 62% 的聚集索引查找，这表明我们在各示例中创建的所有索引都产生了回报。没有建议新的索引，因此看来我们走在正确的道路上。


    下面是 `IO` 和 `TIME` 统计数据。请参考图 13-28。


    ![](img/527021_1_En_13_Fig28_HTML.png)


    `SQLSSMS` 窗口的截图。文本展示了 `IO` 和 `TIME` 统计数据。`SQL server parse and compile times`（SQL
    Server 解析和编译时间）的 `CPU` 和 `elapsed`（已用时间）分别为 0 毫秒和 0 毫秒。`SQL server execution times`（SQL
    Server 执行时间）的 `CPU` 和 `elapsed` 分别为 0 毫秒和 137 毫秒。两个表共影响 12 行数据。


    **图 13-28**

    用于百分位排名计算的 `IO` 和 `TIME` 统计数据


    这些结果不算太差，但与我们之前经历的其他时间相比，`SQL Server` 的执行时间偏高，达到了 137 毫秒。解析时间则很低，为 0 毫秒。


    工作表显示了 3 次扫描和 32 次逻辑读取，而 `Warehouse` 表的扫描计数为 1，逻辑读取为 1,142 次，物理读取为 3 次。


    我们的结论是，这个函数比本章中使用过的其他窗口函数占用更多资源，因此需要特别注意。请记住，我们还使用 `FORMAT()` 函数对结果进行了一些格式化。这使得报表看起来美观，但我们真的需要它吗？这取决于你的业务分析师！


    **课后作业**

    修改查询，使其不使用 `FORMAT()` 函数。同时修改查询，使其不使用文本日期部分，只使用数字。执行我们常规的查询计划以及 `IO/TIME` 统计分析，看看是否有显著改善。别忘了在每次运行前执行
    `DBCC` 以清除缓存。


    ### PERCENTILE_CONT( ) 函数


    以下是该函数的描述。如果你在之前的章节中读过并了解其工作原理，可以跳过本节讨论。如果需要复习，请继续阅读！


    我们将首先讨论 `PERCENTILE_CONT()` 函数，这个函数是做什么的？


    如果你阅读过第 3、7 和 10 章，你会记得它处理的是连续的数据集合。回想一下什么是连续数据。


    连续数据是在一段时间内测量的数据，例如设备在 24 小时内的锅炉温度，或一段时间内设备故障的次数，就我们的例子而言，是一段时间内的库存移动。将每个锅炉温度相加以得出总和是没有意义的。将锅炉温度相加然后除以时间段以求得平均值则是有意义的。最后，将库存入库移动的值相加也没有意义，因为
    99% 的情况下发生的是出库移动，因此月度总和除非没有库存出库，否则不能表明库存中有多少库存。将所有入库库存移动相加然后减去所有出库库存移动则是可行的，因为它会得出剩余库存量。所以所有这些都可能变得非常棘手。


    `因此我们可以说，连续数据可以通过使用诸如平均值等公式来衡量。`


    这对于每日的现有库存是适用的。我们可以将一个月内每天的库存数量相加，然后生成月度平均值。


    总之，`PERCENTILE_CONT()` 函数基于所需的百分位数，在连续的数据集合上运行，以返回满足该百分位数的数据集内的一个值（你需要提供一个百分位数作为参数，如
    .25、.50、.75 等）。使用此函数时，该值是插值的，意味着它通常不存在于数据集中。或者，如果数字恰好对齐，它也可能巧合地使用数据集中的某个值。这种情况是可能发生的。


    以下是此查询的业务需求：


    我们的业务分析师总是盯着同一个产品、位置、库存和仓库。这次，他们希望我们生成 2002 年全年的第 25、50 和 75 个百分位数作为起点。照例，季度名称和月份名称需要完整拼写，并且需要包含月份数字，以便在将数据复制到
    Microsoft Excel 电子表格时，如果需要可以按月份数字排序。库存数量需要表示月底最后一天库存中剩余的数量。因此，这些值是通过将每个月内每天的所有入库库存移动减去所有出库库存移动来计算，以得出月底最后一天的总数量。


    以下是我们得出的结果。请参考清单 13-7。

    '
- fmt: '```

    /********************************/

    /* Generates interpolated value */

    /********************************/

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate – last day of the month

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,QtyOnHand

    ,PERCENTILE_CONT(.25) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Continuous .25]

    ,PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Continuous .5]

    ,PERCENTILE_CONT(.75) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Continuous .75]

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    Listing 13-7

    Percentile Continuous for Quantity on Hand

    ```


    No `CTE` this time. Recall that `QtyOnHand` is the sum of all inventory movements
    in minus all inventory movements out for the last day of the month. Recall that
    the format for this function is slightly different. We need to include a `WITHIN
    GROUP` clause prior to defining the `OVER()` clause. Also notice that there is
    no `ORDER BY` clause in the `OVER()` clause as this is specified in the `WITHIN
    GROUP` clause. So many clauses!


    Lastly, notice that we need to pass the percentile values as a parameter for the
    window function.


    Let’s see the results. Please refer to the results in Figure [13-29](#527021_1_En_13_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig29_HTML.png)


    A screenshot of the S Q L S S M S window with a table of 13 columns and 13 rows.
    The column headers are as of year, as of quarter, as of quarter name, as of month,
    average month name, as of date, location I D, inventory I D, warehouse I D, product
    I D, quantity on hand, and percent continuous.


    Figure 13-29


    Percentile continuous analysis for monthly quantities on hand


    The report is wide, so we only see the 25th percentile values. Notice that the
    result is interpolated. It does not exist, but it falls back somewhere between
    42 and 44 quantity on hand values. Also 43.5 is a bit incorrect as you cannot
    have fractional quantities on hand. Might want to use the `CEILING()` or `FLOOR()`
    function to tidy it up. This percentile together with the other percentiles that
    are not seen gives the analyst a good sense of the spread of the quantities on
    hand for this year.


    Let’s use our usual Microsoft Excel spreadsheet and create a visual representation
    of these results. Please refer to the partial results in Figure [13-30](#527021_1_En_13_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig30_HTML.png)


    A screenshot of the M S Excel window. It has a table of 4 columns and 13 rows.
    The column headers are quantity, 25% P C, 50% P C, and 75% P C. It also has a
    line graph of quantity versus month with a fluctuating curve for quantity and
    3 linearly ascending lines for 25%, 50%, and 75% P C.


    Figure 13-30


    Percentile continuous analysis graph for monthly quantities on hand


    The results are sorted by month on the x axis, and we can see the swings in the
    inventory quantities. Seems like the months of March, July, and December are when
    inventory was high.


    The months of February, April, May, and September show lower inventory values.
    Our analyst needs to compare these values vs. sales figures to determine sales
    performance.


    Notice the three horizontal lines that represent the 25th, 50th, and 75th percentiles
    continuous values. This is a good visualization of the query reports. It packs
    a lot of valuable information.'
