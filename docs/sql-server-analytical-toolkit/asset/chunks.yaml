  trans: '最后，在示例脚本中还有一个额外的查询，它使用了自定义的百分比排名逻辑，并通过我们讨论的公式与 SQL Server 函数进行了比较。


    性能仍然保持在一秒以下。接下来，我们来看看估计查询计划和统计信息是什么样子的。


    ### 性能考量


    让我们运行一个估计查询计划并执行查询，以便生成 `IO` 和 `TIME` 统计信息。同样，系统没有建议新的索引，因此我们之前创建的索引似乎正在被使用。


    请参考图 3-7 的估计查询计划。


    ![](img/527021_1_En_3_Fig7_HTML.png)


    这是第 03 章 T SQL 代码窗口的屏幕截图。上半部分显示了一些程序代码。下半部分显示了查询成本的消息。排序成本，15%。排序成本，47%。索引查找成本，17%。


    图 3-7


    估计执行计划结果


    从右向左看，我们遇到一个成本为 17% 的索引查找操作和一个成本为 47% 的排序任务。唯一另一个成本较高的步骤是另一个成本为 15% 的排序任务。其余任务的成本要么很低，要么为零，因此我们忽略它们。通常，在实际生产环境中，你至少需要了解它们，但主要关注成本较高的步骤，以确定是否可以消除它们或至少降低成本。


    有时，基于维度列创建索引可能会有所帮助。检查排序步骤，看看是否需要基于排序步骤中引用的列创建索引。


    目前看来我们能做的似乎不多，那么让我们看看性能统计信息能告诉我们什么。


    请参考表 3-2。


    表 3-2


    性能分析


    | SQL Server 解析和编译时间 | 现有索引 | 新索引 |

    | --- | --- | --- |

    | CPU 时间 (毫秒) | 0 |   |

    | 已用时间 (毫秒) | 37 |   |

    | **统计信息 (工作表)** | **现有索引** | **新索引** |

    | 扫描计数 | 26 |   |

    | 逻辑读取 | 196 |   |

    | 物理读取 | 0 |   |

    | 预读 | 0 |   |

    | **统计信息 (SalesTransaction)** | **现有索引** | **新索引** |

    | 扫描计数 | 1 |   |

    | 逻辑读取 | 17 |   |

    | 物理读取 | 1 |   |

    | 预读 | 14 |   |

    | **SQL Server 执行时间** | **现有索引** | **新索引** |

    | CPU 时间 (毫秒) | 0 |   |

    | 已用时间 (毫秒) | 30 |   |


    工作表的扫描计数步骤较高，为 26。工作表和 `SalesTransaction` 表的逻辑读取统计信息似乎也偏高，分别为 196 和 17。最后，`SalesTransaction`
    表的预读为 14。看起来可能需要一些改进。接下来我们看看客户端统计信息。


    请参考图 3-8。


    ![](img/527021_1_En_3_Fig8_HTML.jpg)


    这是第 03 章 T SQL 代码窗口的屏幕截图。上半部分显示了一些程序代码。下半部分显示了一个结果表、消息和客户端统计信息。客户端处理时间、总执行时间和等待服务器回复时间这几列被高亮显示。


    图 3-8


    客户端统计信息分析


    我们只看底部的时间统计信息。其他的也很重要，但这些告诉我们一些需要了解的性能数据。客户端处理时间为 11，总执行时间略高，为 103，等待服务器回复时间为
    92。


    有时仅仅创建索引是不够的。其他解决方案可能包括修改查询、利用临时表或报表表，甚至创建内存优化表。最后一种选择是，如果你有足够的内存，它会将所有表行加载到内存中。我们接下来将讨论这一点。


    ### 高性能策略


    在本节中，我们将创建一个内存优化表并用基础数据加载它（这替代了先前查询中的 `CTE` 查询）。此策略假设该表每天晚上加载一次，用户在第二天查询内存优化表。


    此策略也替代了我们之前讨论的暂存表或报表表的策略，因为我们假设存在于内存中的表比存在于物理磁盘上的表能提供更快的性能。当然，如果内存用尽，SQL Server
    将不得不访问物理磁盘上的数据。这就是为什么创建内存优化表的步骤包括创建一个专用文件组和一个物理文件（或两个）。


    以下是创建内存优化表需要采取的步骤。


    步骤 1：检查兼容级别。


    首先，确保你的计算机或笔记本电脑支持内存优化表，通过运行清单 3-4 中的简单查询来检查 SQL Server 的兼容级别。


    ```sql

    SELECT d.compatibility_level

    FROM sys.databases as d

    WHERE d.name = Db_Name();

    GO

    ```


    清单 3-4

    检查兼容级别


    你应处于 130 级或更高版本。如果是，我们需要设置一个系统参数。如果不是，仍然阅读本节，以便了解其内容！


    步骤 2：将参数 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT` 设置为 `ON`。


    请参见清单 3-5。


    ```sql

    ALTER DATABASE [APSAles]

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON;

    GO

    ```


    清单 3-5

    设置内存优化提升到快照


    步骤 3：接下来，通过运行以下命令添加一个用于内存优化数据的专用文件组。


    请参见清单 3-6。


    ```sql

    ALTER DATABASE APSales

    ADD FILEGROUP APSalesMemOptimized CONTAINS MEMORY_OPTIMIZED_DATA;

    GO

    ```


    清单 3-6

    为内存优化数据添加文件组


    注意，需要包含一个指令，指定该文件组将包含内存优化数据。


    步骤 4：为内存优化表创建专用文件。


    接下来，我们以常规方式向该文件组添加一个文件。请参见清单 3-7。


    ```sql

    ALTER DATABASE APSales

    ADD FILE (

    name=''APSalesMemoOptData'',

    filename=N''D:\APRESS_DATABASES\AP_SALES\MEMORYOPT\AP_SALES_MEMOPT.mdf''

    )

    TO FILEGROUP APSAlesMemOptimized

    GO

    ```


    清单 3-7

    向文件组添加文件


    步骤 5：创建内存优化表。


    接下来，我们以常规方式创建一个表，但需要添加一些代码来定义它为内存优化表。请参见清单 3-8。


    ```sql

    CREATE TABLE [SalesReports].MemorySalesTotals   NOT NULL,

    [StoreNo]      nvarchar   NULL,

    [CalendarDate] [date]           NOT NULL,

    [SalesTotal]   decimal NULL

    )

    WITH (

    MEMORY_OPTIMIZED = ON,

    DURABILITY = SCHEMA_AND_DATA

    );

    GO

    ```


    清单 3-8

    创建内存优化表


    我们需要确保定义一个主键，并在 `CREATE TABLE` 命令末尾设置两个参数：


    ```sql

    MEMORY_OPTIMIZED = ON,

    DURABILITY = SCHEMA_AND_DATA

    ```


    步骤 6：检查是否创建成功。


    接下来，我们需要查询两个系统表，以确保该表已注册为内存优化表。请参见清单 3-9。


    ```sql

    SELECT g.name, g.type_desc, f.physical_name

    FROM sys.filegroups g JOIN sys.database_files f ON g.data_space_id = f.data_space_id

    WHERE g.type = ''FX'' AND f.type = 2

    GO

    ```


    清单 3-9

    检查文件组和数据库文件表


    `sys.filegroups` 和 `sys.database_files` 表有很多有趣的列，我建议你查看一下。为了节省篇幅，在我们的简短讨论中，我只列出基本的列。'
- fmt: '## Step 7: Load the Memory-Optimized Table


    Now it’s time to load the table. Please see Listing [3-10](#527021_1_En_3_Chapter.xhtml#PC18).


    ```sql

    INSERT INTO [SalesReports].[MemorySalesTotals]

    SELECT YEAR(CalendarDate)        AS SalesYear

    ,DATEPART(qq,CalendarDate) AS SalesQuarter

    ,MONTH(CalendarDate)       AS SalesMonth

    ,ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,SUM(ST.UnitRetailPrice * ST.TransactionQuantity) AS SalesTotal

    FROM StagingTable.SalesTransaction ST

    GROUP BY ST.CustomerNo

    ,ST.StoreNo

    ,ST.CalendarDate

    ,ST.UnitRetailPrice

    ,ST.TransactionQuantity

    GO

    Listing 3-10

    Load the Memory-Optimized Table

    ```


    Remember, this was the query used in the `CTE` from the prior example we discussed.
    Now we are ready for our performance analysis.


    ## Step 8: Check the estimated query plan


    Before we run the query, we need to check the estimated query plan in the usual
    manner. See if an index is suggested. If it is, create the index and rerun the
    query plan estimator tool. Once the index is created, set the parameters to display
    performance statistics.


    ## Step 9: Run the query


    Clear buffers with `DBCC`, make sure `IO` and `TIME` statistics are set, and run
    the query.


    Please see Listing [3-11](#527021_1_En_3_Chapter.xhtml#PC19).


    ```sql

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    SELECT SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    ,SUM(SalesTotal) AS MonthlySalesTotal

    ,CUME_DIST() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS CumeDist

    ,PERCENT_RANK() OVER (

    PARTITION BY SalesYear

    ORDER BY SUM(SalesTotal)

    ) AS PctRank

    FROM [SalesReports].[MemorySalesTotals]

    WHERE SalesYear IN(2010,2011)

    AND CustomerNo = ''C00000001''

    GROUP BY SalesYear

    ,SalesQuarter

    ,SalesMonth

    ,CustomerNo

    GO

    Listing 3-11

    Query the Memory-Optimized Table

    ```


    Always clear the buffers by running the `DBCC` command. Next, run the two commands
    to set the `IO` and `TIME` statistics on and then run the query.


    ## Step 10: Create the suggested index


    Here is the code for the suggested index. I placed it here, but you should run
    it after you check out the first estimated query plan. Come to think of it, running
    the query prior to creating the index so you can record the performance statistics.


    Please see Listing [3-12](#527021_1_En_3_Chapter.xhtml#PC20).


    ```sql

    ALTER TABLE SalesReports.MemorySalesTotals

    ADD INDEX ieCustNoSaleYearMemTable

    NONCLUSTERED (CustomerNo,SalesYear)

    GO

    Listing 3-12

    Create the Suggested Index

    ```


    ## Step 11: Create a Second Estimated Query Plan


    After the index is created, create a second estimated query plan. Maybe you can
    do this in two horizontally placed query panes. The top one would contain the
    query plan without the suggested index, and the bottom one would contain the query
    plan after the suggested index is created so that you can compare the two.


    ## Step 12: Rerun the query and make sure all statistics are turned on


    Make sure you clear buffers with `DBCC` when checking estimated query plans and
    running queries with statistics on.


    I ran the estimated query plan twice. The first time was to see what index the
    estimator suggested. The second time was after I created the suggested index.


    Please refer to Figure [3-9](#527021_1_En_3_Chapter.xhtml#Fig9) for the estimated
    query plan after the index was created.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig9_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The top screen has some programming
    codes. The bottom screen has a message for query cost. Sort Cost, 28%. Sort Cost,
    43%. Index Seek Cost, 23%.


    Figure 3-9

    The estimated query plan


    Reading the query plan right to left, we notice an index seek at a cost of 23%.
    Following it is a sort step at 43%. Ignoring the tasks with zero or minimal costs,
    we see a second sort step at 28%. There is a nested loops join at 3%. Not shown
    are more tasks to the left of the nested loops join, but they are all zero.


    Download the code yourself and check out the plans and statistics. It is worthwhile
    learning how to do this performance analysis activity.


    Let’s wrap things up by comparing statistics generated for the `CTE` version of
    the query and the query that utilizes a memory-optimized table.


    Please refer to Table [3-3](#527021_1_En_3_Chapter.xhtml#Tab3) for the `CTE` vs.
    memory-optimized table statistics analysis.


    Table 3-3

    Comparing CTE vs. Memory-Optimized Table Statistics


    | SQL Server Parse and Compile Times | Using a CTE | Memory-Optimized Table |

    | --- | --- | --- |

    | CPU time (ms) | **46** | **0** |

    | Elapsed time (ms) | **83** | **0** |

    | **Statistics (Work Table)** | **Using a CTE** | **Memory-Optimized Table** |

    | Scan count | 26 | 26 |

    | Logical reads | 196 | 198 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (SalesTransaction) and MemorySalesTotals** | **Using a CTE** |
    **Memory-Optimized Table** |

    | Scan count | 1 | N/A |

    | Logical reads | **23** | N/A |

    | Physical reads | 1 | N/A |

    | Read-ahead reads | 20 | N/A |

    | **SQL Server Execution Times** | **Using a CTE** | **Memory-Optimized Table**
    |

    | CPU time (ms) | **0** | **0** |

    | Elapsed time (ms) | **34** | **0** |


    This is interesting. For the memory-optimized table strategy, we only have statistics
    for the work table – no statistics for the `MemorySalesTotal` table, which is
    now loaded in memory.


    We see significant improvement in both sets of CPU time and elapsed time for parse
    and compile times and for execution times. With the memory-optimized table, they
    are all zero. Lastly, for the work table the results are about the same.


    Looks like the memory-optimized table yields significant performance results.


    One last comment: While performing this type of analysis, it might be a good idea
    to store statistics in a spreadsheet so you can analyze and compare. Run several
    tests that


    * Generate query plans.

    * Generate `IO` and `TIME` statistics.

    * Generate client statistics.


    And another last comment: As stated earlier, sometimes you need to go beyond index
    creation and look at other modifications like report and memory-enhanced tables
    (or even the query itself).


    The last resort is getting management to upgrade your servers with more and/or
    faster memory and fast disks or SAN solutions. (A nice solid-state drive for `TEMPDB`
    would also help!)


    Let’s forge ahead with our next two analytical functions.'
