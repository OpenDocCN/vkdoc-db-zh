- fmt: '## Power BI Desktop


    我们即将完成这部分的介绍。


    请参考图[14-27](#527021_1_En_14_Chapter.xhtml#Fig27)获取`Power BI Desktop`。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig27_HTML.png)


    Chrome窗口的截图。其中一个标签页打开了“下载Microsoft Power BI”网站。它有5个选项：Microsoft Power BI Desktop、Microsoft
    Power BI Mobile、Microsoft on-premises data gateway、On-premises reporting with
    Power BI Report Server和Microsoft Power BI Report Builder。


    图 14-27 获取`Power BI Desktop`


    我们对`Power BI Desktop`和使用`Power BI`进行本地报告感兴趣。


    截至本文撰写时，网址是：


    [`https://powerbi.microsoft.com/en-us/downloads/`](https://powerbi.microsoft.com/en-us/downloads/)


    照常，点击链接，下载安装程序，运行它，并按照简单的说明操作。


    顺便说一下，这个网站似乎同时提供了`Power BI Desktop`和`Power BI`服务器。


    ## Power BI Server


    最好在你的个人学习或开发环境上运行一个个人`Power BI`服务器，所以也要获取这个组件。


    请参考图[14-28](#527021_1_En_14_Chapter.xhtml#Fig28)。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig28_HTML.png)


    Chrome窗口的截图。其中一个标签页打开了“安装Power BI Report Server”网站。左侧面板有多个选项。右侧面板有选择要安装的版本、许可证和条款与条件的选项。免费版本被选中，有效期为180天。


    图 14-28 获取`Power BI`服务器


    确保你下载的是免费的开发者版本，并且始终阅读许可证要求。


    截至本文撰写时，网址是：


    [`https://learn.microsoft.com/en-us/power-bi/report-server/install-report-server`](https://learn.microsoft.com/en-us/power-bi/report-server/install-report-server)


    安装后，配置步骤看起来很像`SSRS`。


    最后但同样重要的是`Microsoft Excel`，但如果你还没有，就需要付费购买！


    ## Microsoft Excel


    这不是免费的，但物有所值！访问以下网站或用你喜欢的浏览器进行搜索。为了安全起见，只从`Microsoft`购买。


    请参考图[14-29](#527021_1_En_14_Chapter.xhtml#Fig29)。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig29_HTML.png)


    Chrome窗口的截图。其中一个标签页打开了“购买Microsoft Excel”网站。它展示了屏幕上的`Microsoft Excel`标志和订阅详情。费用是$159.99。下方是“立即购买”按钮。底部面板展示了通过`Microsoft
    365`获取`Excel`的最佳价值方案。


    图 14-29 `Microsoft Excel`订阅


    查看哪种选项在价格和功能方面适合你。


    截至本文撰写时，网址是：


    [`www.microsoft.com/en-us/download/details.aspx?id=53613/`](http://www.microsoft.com/en-us/download/details.aspx%3Fid%3D53613/)


    就是这样。现在你知道从哪里获取所有工具了。如果你像我在学习所有这些工具时那样开始，会经历很多试错和摸索，但这正是学习的方式。只要确保是在你自己的个人环境上，而不是在生产服务器上！


    ## SSMS


    我差点忘了`SSMS`。只需导航到以下链接下载安装程序。


    请参考图[14-30](#527021_1_En_14_Chapter.xhtml#Fig30)。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig30_HTML.png)


    Chrome窗口的截图。其中一个标签页打开了“下载SSMS”网站。左侧面板显示了版本`SQL Server 2022`，以及14个选项，其中“下载SSMS”被选中。右侧面板显示了软件适用的详细信息和下载链接。


    图 14-30 下载`SSMS`


    截至本文撰写时，网址是：


    [`https://learn.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms%3Fview%3Dsql-server-ver16)


    安装程序下载后，运行可执行文件并按照指导步骤在你的开发计算机上安装它。


    ## 后续步骤


    练习每一个脚本。慢慢来。下载所有工具，如果需要，在线搜索教程。大多数是免费的，但也有许多网站会以合理的订阅价格提供强大的视频课程。如果你对`TSQL`真的很陌生，需要一些指导或复习如何编写查询、创建表等，请访问我的网站[`www.grumpyolditguy.com`](http://www.grumpyolditguy.com)获取关于`TSQL`编程的免费播客。


    ## 感谢！


    感谢您购买并阅读本书。同时也感谢您的耐心。如有问题、评论或改进本书的建议，请随时通过 abobak@grumpyolditguy.com 与我联系，以便在下一版中改进。


    下次见……'
