    ```sql

    CREATE TABLE [dbo].[ErrorLog](

    [ErrorNo]         [int] NULL,

    [ErrorSeverity]   [int] NULL,

    [ErrorState]      [int] NULL,

    [ErrorProc]       [nvarchar](128) NULL,

    [ErrorLine]       [int] NULL,

