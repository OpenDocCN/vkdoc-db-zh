    some programming codes. The bottom half screen presents the messages and execution
    plan. A pop-up panel displays sort profile statistics.


    Figure 5-44g


    Final sort task in the query plan


    This last task orders the data stream by the following columns and corresponds
    to the `ORDER BY` clause that appears in the partition. The portfolio is not included
    as we have only one portfolio:


    ```

    --Sort(

    ORDER BY:([Expr1004] ASC,

    [APFinance].[Financial].[Portfolio].[Month] ASC

    )

    )

    ```


    If I modify the `WHERE` clause in the query so I filter for two years, two customers,
    and two portfolios as follows


    ```

    FROM PortfolioAnalysis

    WHERE TradeYear IN(2012,2013)

    AND CustId IN(''C0000001'',''C00000012'')

    AND Portfolio IN (

    ''CASH - FINANCIAL PORTFOLIO'',

    ''EQUITY - FINANCIAL PORTFOLIO''

