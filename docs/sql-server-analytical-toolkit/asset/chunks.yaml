    look. Here is a little credit rating and payment delinquency example that places
    customers into buckets so they can be assigned to collection agents based on how
    many days they are delinquent in their payments. Code is provided in the script
    folder for this chapter to load the credit-related tables.


    Please refer to Listing [4-5](#527021_1_En_4_Chapter.xhtml#PC5).


    ```

    DECLARE @NumTiles INT;

    SELECT @NumTiles = COUNT(DISTINCT [90DaysLatePaymentCount])

    FROM Demographics.CustomerPaymentHistory

    WHERE [90DaysLatePaymentCount] > 0;

    SELECT CreditYear

    ,CreditQtr

    ,CustomerNo

    ,CustomerFullName

    ,SUM([90DaysLatePaymentCount]) AS Total90DayDelinquent

    ,NTILE(@NumTiles) OVER (

    PARTITION BY CreditYear,CreditQtr

    ORDER BY CreditQtr

    ) AS CreditAnaystBucket

    ,CASE NTILE(@NumTiles) OVER (

    PARTITION BY CreditYear,CreditQtr

    ORDER BY CreditQtr

    )

    WHEN 1 THEN ''Assign to Collection Analyst 1''

    WHEN 2 THEN ''Assign to Collection Analyst 2''

    WHEN 3 THEN ''Assign to Collection Analyst 3''

    WHEN 4 THEN ''Assign to Collection Analyst 4''

    WHEN 5 THEN ''Assign to Collection Analyst 5''

    END AS CreditAnalystAssignment

    FROM Demographics.CustomerPaymentHistory

    WHERE [90DaysLatePaymentCount] > 0

    GROUP BY CreditYear

    ,CreditQtr

    ,CustomerNo

    ,CustomerFullName

    ORDER BY CreditYear

    ,CreditQtr

    ,SUM([90DaysLatePaymentCount]) DESC

    GO

    Listing 4-5

    Assigning Credit Analysts to Delinquent Accounts

    ```


    We make use of a variable called `@NumTiles` to count the number of instances
    of the account being delinquent 90 days. The following query initializes it:


    ```

    SELECT @NumTiles = COUNT(DISTINCT [90DaysLatePaymentCount])

    FROM Demographics.CustomerPaymentHistory

    WHERE [90DaysLatePaymentCount] > 0;

    ```


    The main query pulls out the year, quarter, customer number, and customer full
    name together with the total days the customer is delinquent. Next, the `CreditAnalystBucket`
    column is assigned the bucket number the customer falls in by using the `NTILE()`
    function and an `OVER()` clause that is partitioned by year and quarter. The partition
    rows are sorted by quarter and customer. As we have results loaded for only one
    year, we do not need to partition by year.


    Next, a case block is set up to print a message that states


    > **“Assign to Collection Analyst N”**


    N is a value from 1 to 5\. If the credit analyst bucket value is 1, the customer
    account is assigned to credit analyst 1; if the value is 2, the customer account
    is assigned to credit analyst 2; and so on. Try to load multiple years’ worth
    of credit data by modifying the load script for this table. You will need to add
    a `PARTITION BY` clause.


    Let’s see the results. Please refer to Figure [4-9](#527021_1_En_4_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig9_HTML.jpg)


    A screenshot of a window presents a tab with a table of 8 columns and 25 rows
    for credit analyst assignments. The columns of customer number, customer full
    name, total 90-day delinquent, and credit analysis bucket are highlighted from
    rows 15 to 20.


    Figure 4-9


    Credit analyst assignments for 90-day accounts


    It works well, but as can be seen there are some overlaps. Some customers that
    are 90 days late are assigned to either credit analyst 1 or 2\. So this strategy
    tries to balance out the assignments by volume as opposed to the number of times
    a customer was 90 days late.


    Let’s see how the `NTILE()` function works as far as performance is concerned.'
