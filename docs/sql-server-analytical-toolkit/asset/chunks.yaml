- fmt: '### LEAD( ) Function


    `LEAD()` 函数是 `LAG()` 函数的对应函数。此函数用于检索相对于当前行列的下一个值（对于日期对象，指历史数据集中的未来日期）。


    以下是我们的业务需求：


    我们的分析师希望得到与“回顾过去”报告完全相同的报告，但这次我们需要“展望未来”。


    我们将采用不同的方法，使用查询的 `CTE` 部分来创建一个 `VIEW`。有一个选项可以创建所谓的 schema-bound `VIEW`，它实际上将查询结果存储在物理存储上。


    以下是创建 `TSQL VIEW` 的 `DDL` 命令。


    请参考 [列表 13-4](#527021_1_En_13_Chapter.xhtml#PC4)。


    ```

    CREATE OR ALTER VIEW [Reports].[MonthlySumInventory]

    -- use below to implement a materialized view

    -- WITH SCHEMABINDING

    AS

    WITH WarehouseCTE (

    InvYear,InvQuarterName,InvMonthNo,InvMonthName,LocationId

    ,LocationName,InventoryId,WarehouseId,WarehouseName,ProductId

    ,ProductName,ProductType,ProdTypeName,MonthlySumQtyOnHand

    )

    AS (

    SELECT YEAR(C.[CalendarDate])  AS InvYear

    ,CASE

    WHEN DATEPART(qq,C.[CalendarDate]) = 1 THEN ''Qtr 1''

    WHEN DATEPART(qq,C.[CalendarDate]) = 2 THEN ''Qtr 2''

    WHEN DATEPART(qq,C.[CalendarDate]) = 3 THEN ''Qtr 3''

    WHEN DATEPART(qq,C.[CalendarDate]) = 4 THEN ''Qtr 4''

    END AS AsOfQtrName

    ,MONTH(C.[CalendarDate]) AS InvQuarterName

    ,CASE

    WHEN MONTH(C.[CalendarDate])  = 1 THEN ''Jan''

    WHEN MONTH(C.[CalendarDate])  = 2 THEN ''Feb''

    WHEN MONTH(C.[CalendarDate])  = 3 THEN ''Mar''

    WHEN MONTH(C.[CalendarDate])  = 4 THEN ''Apr''

    WHEN MONTH(C.[CalendarDate])  = 5 THEN ''May''

    WHEN MONTH(C.[CalendarDate])  = 6 THEN ''June''

    WHEN MONTH(C.[CalendarDate])  = 7 THEN ''Jul''

    WHEN MONTH(C.[CalendarDate])  = 8 THEN ''Aug''

    WHEN MONTH(C.[CalendarDate])  = 9 THEN ''Sep''

    WHEN MONTH(C.[CalendarDate])  = 10 THEN ''Oct''

    WHEN MONTH(C.[CalendarDate])  = 11 THEN ''Nov''

    WHEN MONTH(C.[CalendarDate])  = 12 THEN ''Dec''

    END AS InvMonthMonthName

    ,L.LocId             AS LocationId

    ,L.LocName           AS LocationName

    ,I.InvId             AS InventoryId

    ,W.WhId              AS WarehouseId

    ,W.WhName            AS WarehouseName

    ,P.ProdId            AS ProductId

    ,P.ProdName          AS ProductName

    ,P.ProdType          AS ProductType

    ,PT.ProdTypeName     AS ProdTypeName

    ,SUM(IH.[QtyOnHand]) AS MonthlySumQtyOnHand

    FROM [Fact].[InventoryHistory] IH

    JOIN [Dimension].[Location] L

    ON IH.LocKey = L.LocKey

    JOIN [Dimension].[Calendar] C

    ON IH.CalendarKey = C.CalendarKey

    JOIN [Dimension].[Warehouse] W

    ON IH.WhKey = W.WhKey

    JOIN [Dimension].[Inventory] I

    ON IH.[InvKey] = I.InvKey

    JOIN [Dimension].[Product] P

    ON IH.ProdKey = P.ProdKey

    JOIN [Dimension].[ProductType] PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    GROUP BY YEAR(C.[CalendarDate])

    ,MONTH(C.[CalendarDate])

    ,DATEPART(qq,C.[CalendarDate])

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,W.WhName

    ,P.ProdId

    ,P.ProdName

    ,P.ProdType

    ,PT.ProdTypeName

    )

    SELECT InvYear,InvQuarterName,InvMonthNo,InvMonthName,LocationId

    ,LocationName,InventoryId,WarehouseId,WarehouseName,ProductType

    ,ProductId,ProductName,MonthlySumQtyOnHand

    FROM WarehouseCTE

    GO

    ```


    #### 列表 13-4：替代 CTE 的视图


    正如我们之前所见，无需过多解释。它演示了如何使用 `CTE` 来创建 `TSQL VIEW` 对象。以下代码被注释掉了：


    ```

    -- use below to implement a materialized view

    --WITH SCHEMABINDING

    ```


    我们将运行没有 schema binding 的示例，但作为练习，您应该重建启用了 schema binding 的 `VIEW` 对象，并查看估计的性能计划是什么样的。同时，检查
    schema-bound `VIEW` 的 `IO` 和 `TIME` 统计信息。


    以下是对新 `VIEW` 的引用查询。


    请参考 [列表 13-5](#527021_1_En_13_Chapter.xhtml#PC6)。


    ```

    SELECT [InvYear]

    ,InvQuarterName

    ,InvMonthNo

    ,[InvMonthName]

    ,[LocationId]

    ,[LocationName]

    ,[InventoryId]

    ,[WarehouseId]

    ,[ProductType]

    ,[ProductId]

    ,MonthlySumQtyOnHand

    ,LEAD(MonthlySumQtyOnHand,1,0) OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS NextMonthSum

    ,LEAD(MonthlyAvgQtyOnHand,3,0) OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS Skip3MonthSum

    ,LEAD(MonthlyAvgQtyOnHand,12,0) OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS Skip12MonthSum

    ,MonthlySumQtyOnHand - LEAD(MonthlySumQtyOnHand,1,0)

    OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS Change

    FROM [Reports].[MonthlySumInventory]

    GO

    ```


    #### 列表 13-5：使用表视图的 LEAD 示例


    这与 `LAG()` 示例的逻辑完全相同，只是我们用 `LEAD()` 替换了 `LAG()`。代码的可重用性再次提高了开发人员的工作效率。我还为 `LEAD()`
    函数使用了更好的列名。


    请参考图 [13-16](#527021_1_En_13_Chapter.xhtml#Fig16) 中的部分结果。


    ![SQL SSMS 窗口截图，包含一个有 16 列 25 行的表格。列标题为 inv year, inv quarter name, inv month
    number, Inv month name, location I D and name, inv I D, W h I D, product type,
    product I D, monthly sum, next month sum, skip 3 and 12 months sum and change。](images/527021_1_En_13_Chapter/527021_1_En_13_Fig16_HTML.png)


    #### 图 13-16：使用 LEAD 函数的当前与下月、下季度和下一年比较


    报告有效。箭头指向下个月、三个月后和 12 个月后的正确值。框选区域代表下一年，因此逻辑跨越了年份边界，这正是我们想要的。


    这是一份很好的报告，允许分析师评估多年的库存变动。唯一的问题是数据仅对过去和当前日历日期有效。目前还没有未来数据！


    让我们看看这些结果在图表中的样子。


    请参考图 [13-17](#527021_1_En_13_Chapter.xhtml#Fig17)。


    ![MS Excel 窗口截图。左侧，2 个 7 列 13 行的表格。列标题为 year, month, quantity, next month, skip
    3, skip 12, change。右侧，2 个瀑布图显示了未来库存随月份的变化趋势，呈现波动上升的增加、减少和总量趋势。](images/527021_1_En_13_Chapter/527021_1_En_13_Fig17_HTML.png)


    #### 图 13-17：下月、下季度和下一年的库存变动


    这与为 `LAG()` 函数分析生成的图表类型相同，但它确实显示了相对于一组年份的未来变动。'
  raw: '### LEAD( ) Function


    The counterpart of the `LAG()` function is the `LEAD()` function. This function
    is used to retrieve the next value relative to the current row column (in case
    of date objects, future dates within a historical set of data).


    Here are our business specifications:


    Our analyst wants the same exact report as the “looking back in time” report,
    but this time we need to “look ahead.”


    We will take a different approach and use the `CTE` portion of the query to create
    a `VIEW`. An option is available to create what is called a schema-bound `VIEW`
    that actually stores the results of the query on physical storage.


    Here is the `DDL` command for creating the `TSQL VIEW`.


    Please refer to Listing [13-4](#527021_1_En_13_Chapter.xhtml#PC4).


    ```

    CREATE OR ALTER VIEW [Reports].[MonthlySumInventory]

    -- use below to implement a materialized view

    -- WITH SCHEMABINDING

    AS

    WITH WarehouseCTE (

    InvYear,InvQuarterName,InvMonthNo,InvMonthName,LocationId

    ,LocationName,InventoryId,WarehouseId,WarehouseName,ProductId

    ,ProductName,ProductType,ProdTypeName,MonthlySumQtyOnHand

    )

    AS (

    SELECT YEAR(C.[CalendarDate])  AS InvYear

    ,CASE

    WHEN DATEPART(qq,C.[CalendarDate]) = 1 THEN ''Qtr 1''

    WHEN DATEPART(qq,C.[CalendarDate]) = 2 THEN ''Qtr 2''

    WHEN DATEPART(qq,C.[CalendarDate]) = 3 THEN ''Qtr 3''

    WHEN DATEPART(qq,C.[CalendarDate]) = 4 THEN ''Qtr 4''

    END AS AsOfQtrName

    ,MONTH(C.[CalendarDate]) AS InvQuarterName

    ,CASE

    WHEN MONTH(C.[CalendarDate])  = 1 THEN ''Jan''

    WHEN MONTH(C.[CalendarDate])  = 2 THEN ''Feb''

    WHEN MONTH(C.[CalendarDate])  = 3 THEN ''Mar''

    WHEN MONTH(C.[CalendarDate])  = 4 THEN ''Apr''

    WHEN MONTH(C.[CalendarDate])  = 5 THEN ''May''

    WHEN MONTH(C.[CalendarDate])  = 6 THEN ''June''

    WHEN MONTH(C.[CalendarDate])  = 7 THEN ''Jul''

    WHEN MONTH(C.[CalendarDate])  = 8 THEN ''Aug''

    WHEN MONTH(C.[CalendarDate])  = 9 THEN ''Sep''

    WHEN MONTH(C.[CalendarDate])  = 10 THEN ''Oct''

    WHEN MONTH(C.[CalendarDate])  = 11 THEN ''Nov''

    WHEN MONTH(C.[CalendarDate])  = 12 THEN ''Dec''

    END AS InvMonthMonthName

    ,L.LocId             AS LocationId

    ,L.LocName           AS LocationName

    ,I.InvId             AS InventoryId

    ,W.WhId              AS WarehouseId

    ,W.WhName            AS WarehouseName

    ,P.ProdId            AS ProductId

    ,P.ProdName          AS ProductName

    ,P.ProdType          AS ProductType

    ,PT.ProdTypeName     AS ProdTypeName

    ,SUM(IH.[QtyOnHand]) AS MonthlySumQtyOnHand

    FROM [Fact].[InventoryHistory] IH

    JOIN [Dimension].[Location] L

    ON IH.LocKey = L.LocKey

    JOIN [Dimension].[Calendar] C

    ON IH.CalendarKey = C.CalendarKey

    JOIN [Dimension].[Warehouse] W

    ON IH.WhKey = W.WhKey

    JOIN [Dimension].[Inventory] I

    ON IH.[InvKey] = I.InvKey

    JOIN [Dimension].[Product] P

    ON IH.ProdKey = P.ProdKey

    JOIN [Dimension].[ProductType] PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    GROUP BY YEAR(C.[CalendarDate])

    ,MONTH(C.[CalendarDate])

    ,DATEPART(qq,C.[CalendarDate])

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,W.WhName

    ,P.ProdId

    ,P.ProdName

    ,P.ProdType

    ,PT.ProdTypeName

    )

    SELECT InvYear,InvQuarterName,InvMonthNo,InvMonthName,LocationId

    ,LocationName,InventoryId,WarehouseId,WarehouseName,ProductType

    ,ProductId,ProductName,MonthlySumQtyOnHand

    FROM WarehouseCTE

    GO

    Listing 13-4

    VIEW Replacing the CTE

    ```


    Nothing much to explain as we saw the query before. It demonstrates you can use
    the `CTE` to create a `TSQL VIEW` object. The following code is commented out:


    ```

    -- use below to implement a materialized view

    --WITH SCHEMABINDING

    ```


    We will run the example without the schema binding, but as homework you should
    recreate the `VIEW` object with schema binding enabled and see what the estimated
    performance plan looks like. Also check the `IO` and `TIME` statistics with the
    schema-bound `VIEW`.


    The following is the query that references the new `VIEW`.


    Please refer to Listing [13-5](#527021_1_En_13_Chapter.xhtml#PC6).


    ```

    SELECT [InvYear]

    ,InvQuarterName

    ,InvMonthNo

    ,[InvMonthName]

    ,[LocationId]

    ,[LocationName]

    ,[InventoryId]

    ,[WarehouseId]

    ,[ProductType]

    ,[ProductId]

    ,MonthlySumQtyOnHand

    ,LEAD(MonthlySumQtyOnHand,1,0) OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS NextMonthSum

    ,LEAD(MonthlyAvgQtyOnHand,3,0) OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS Skip3MonthSum

    ,LEAD(MonthlyAvgQtyOnHand,12,0) OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS Skip12MonthSum

    ,MonthlySumQtyOnHand - LEAD(MonthlySumQtyOnHand,1,0)

    OVER (

    PARTITION BY [LocationId],[InventoryId],[WarehouseId],[ProductId]

    ORDER BY InvYear,InvMonthNo,[LocationId],[InventoryId]

    ,[WarehouseId],[ProductId]

    ) AS Change

    FROM [Reports].[MonthlySumInventory]

    GO

    Listing 13-5

    LEAD Example That Uses the Table VIEW

    ```


    This is the same exact logic as the `LAG()` example except we replaced `LAG()`
    with `LEAD().` Once again reusability of code leads to efficient developer time.
    I also used better column names for the `LEAD()` function.


    Please refer to the partial results in Figure [13-16](#527021_1_En_13_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig16_HTML.png)


    A screenshot of the S Q L S S M S window with a table of 16 columns and 25 rows.
    The column headers are inv year, inv quarter name, inv month number, Inv month
    name, location I D and name, inv I D, W h I D, product type, product I D, monthly
    sum, next month sum, skip 3 and 12 months sum and change.


    Figure 13-16


    Current vs. next month, quarter, and year with the LEAD function


    The report works. Arrows point to the correct future-month, three-month-forward,
    and 12-month-forward values. The boxed area represents the next year, so the logic
    crosses year boundaries, which is what we want.


    This is a good report that allows analysts to evaluate inventory movement over
    the years. The only issue is that the data is only good for the past and the current
    calendar date. No future data exists yet!


    Let’s see what these results look like in a graph.


    Please refer to Figure [13-17](#527021_1_En_13_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig17_HTML.png)


    A screenshot of the M S Excel window. Left, 2 tables of 7 columns and 13 rows.
    The column headers are year, month, quantity, next month, skip 3, skip 12, change.
    Right, 2 waterfall charts of future inventory movement versus month have a fluctuating
    ascending trend of increase, decrease, and total.


    Figure 13-17


    Next month, quarter, and year inventory movements


    This is the same type of graph as the one generated for the `LAG()` function analysis,
    but it does show future movements relative to a set of years.'
