- fmt: '# Baseline estimated query plan


    ## 查询计划分析概述


    从右下角的分支开始，我们看到对事实表进行了索引seek，这是一个良好的开端。在`Product`维度表和`Product Type`外挂维度表之间存在一个高成本的嵌套循环连接操作，但这些表的行数很小，所以这不是问题。我们可以考虑对`Product`表进行反规范化，将产品类型列加入其中以消除此连接。这是值得考虑的一点。


    ### 注意


    将外挂表与主维度表合并会消除连接，但另一方面会使维度表变大，这意味着在查询处理时，内存页面中能容纳的行数更少。因此，总是需要权衡取舍。是选择更少的连接操作，还是更大的表？


    我曾认为为`Calendar`维度表添加索引并使用表提示可能会改善查询计划，但事实并非如此。如果该索引是聚集索引，它可能会有帮助。


    其他所有的哈希连接成本都为零，因此我们不再关注它们。


    我们的`Calendar`维度表进行了2%的表扫描。能否通过在代理键上创建聚集索引来改进？


    查看以下代码：


    ```sql

    CREATE UNIQUE CLUSTERED INDEX ieCalendarKey

    ON [Dimension].[Calendar](CalendarKey)

    GO

    ```


    让我们创建这个聚集索引，然后查看修改后的估计执行计划。


    请参考图[12-8](#527021_1_En_12_Chapter.xhtml#Fig8)。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig8_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the execution plan
    for query cost. An arrow points to clustered index cost 2%. Other costs are hash
    match, table scan, Nested loops, and index seek costs.


    图 12-8

    使用聚集`Calendar`索引的修改后估计执行计划


    我很高兴地说这奏效了。由于使用了聚集索引，因此不需要表提示。


    我们看到在`Calendar`表上进行了聚集索引扫描。该维度有7,670行，因此对于这个大小的表，我们可以得出结论：在代理键上创建聚集索引，它很可能就会被使用！


    ### 小测验答案


    为什么这被称为`SNOWFLAKE`查询？


    **答案**


    因为它连接了维度表和外挂表，使得模型看起来像`SNOWFLAKE`。如果数据库是作为`STAR`模式实现的，那么针对它的查询就是`STAR`查询。有道理吧？


    为了帮助你巩固知识，以下是另一个小测验，以免你忘记性能分析和调优的基础知识。


    ### 另一个小测验


    为什么每次执行性能分析和查询调优时都需要运行`DBCC`命令？


    ## `DENSE_RANK()` 函数


    回顾第[4](#527021_1_En_4_Chapter.xhtml)章，`DENSE_RANK()`函数的工作方式与`RANK()`函数几乎相同。在出现并列的情况下，并列的排名值相同，但重复值之后的下一个值会被简单地分配下一个排名数字。因此，如果并列的密集排名是4，那么下一个更高值的排名就是5。我认为这很合理。


    `RANK()`函数的结果则不然。如果你有五个并列值为6，并列的当前排名是4，那么下一个排名是9（5个并列值 + 当前排名值4 = 9）。这确实有点奇怪。


    我们之前见过这个函数，但让我们再应用一次，这次用于我们的库存业务场景。以下是业务需求说明：


    基本上，业务分析师喜欢我们之前给他们的报告。这次他们想创建相同的报告，但添加`DENSE_RANK()`函数，以便查看每个函数如何处理并列情况。


    这是一个很容易满足的需求，我们只需复制粘贴之前的查询并添加新的排名窗口函数即可。`TSQL`强调代码重用！为什么要重新发明轮子？


    以下是我们得出的结果。


    请参考清单[12-4](#527021_1_En_12_Chapter.xhtml#PC5)。


    ```sql

    WITH MonthlyInventoryMovement (

    MovementYear,MovementQuarter,MovementMonth,InvId,LocId,WhId

    ,ProdId,MonthlyDecrementMovement

    )

    AS

    (

    SELECT YEAR(MovementDate)        AS MovementYear

    ,DATEPART(qq,MovementDate) AS MovementQuarter

    ,MONTH(MovementDate)       AS MovementMonth

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    ,SUM(Decrement) AS MonthlyDecrementMovement

    FROM Product.InventoryTransaction

    GROUP BY YEAR(MovementDate)

    ,DATEPART(qq,MovementDate)

    ,MONTH(MovementDate)

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    )

    SELECT MovementYear

    ,MovementQuarter

    ,MovementMonth

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,MonthlyDecrementMovement

    ,RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecRank

    ,DENSE_RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecDEnseRank

    FROM MonthlyInventoryMovement

    WHERE MovementYear = 2010

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    AND ProdId = ''P209''

    GO

    ```


    清单 12-4

    比较 `RANK()` 与 `DENSE_RANK()` 的排名结果


    这里没什么需要详细解释的，我们已经看过这个查询了。分区是按移动年份设置的，`ORDER BY`子句按月递减总和降序排列。当此查询用于填充报告表时，可以移除`WHERE`子句，配合过滤器让业务用户可以选择要使用的值。


    ### 注意


    在我看来，我使用的编码风格——将每个列单独列在一行——使查询易于理解。这只是我的观点。我知道这样会占用更多空间，尤其是在这样一本书里！


    回到我们的讨论。我们感兴趣的是看到在库存业务场景中如何处理并列情况。让我们看看结果。


    请参考图[12-9](#527021_1_En_12_Chapter.xhtml#Fig9)中的部分结果。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig9_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the results in
    a table that has 10 columns for movement year, Movement quarter, Movement month,
    Location I d, Inventory I d, Warehouse I d, product I d, monthly decrement movement,
    Decrement rank, and Decrement Dence rank.


    图 12-9

    `RANK()` 与 `DENSE_RANK()` 对比


    递减值的并列情况出现在二月(2)、五月(5)和十二月(12)。在我看来（我之前也说过），`DENSE_RANK()`的值更有意义，因为并列值具有相同的排名值。因此我们可以说，在二月、五月和十二月，产品“P209”的库存减少了63个单位。


    在`RANK()`函数的情况下跳过两个排名值会让人困惑。我们为什么要使用这个？


    我在互联网上研究为何应该使用此函数以及在何种情况下使用时，没有找到使用它的理由。如果你知道，请给我发邮件！


    让我们继续讨论此函数的性能分析和调优。'
  raw: 'Baseline estimated query plan


    Look at all those joins!


    Starting from the lower-right bottom branch, we see an index seek on the fact
    table, so we are off to a good start. There is a high-cost nested loops join task
    between the `Product` dimension and the `Product Type` outrigger dimension, but
    these tables are small in terms of row count, so this is not an issue. We could
    consider denormalizing the Product table and adding the product type columns in
    order to eliminate this join. Something to consider.


    Note


    Combining the outrigger table with the main dimension will eliminate joins but
    on the other hand will make the dimension table larger, which means fewer rows
    can be fitted in a memory page when the query is processed. So there are always
    trade-offs one needs to consider. Fewer join operations or larger tables?


    I thought that adding an index to the `Calendar` dimension table and adding a
    table hint might improve the query plan, but it was not the case. If the index
    is a clustered index, it would help.


    The other hash joins all have zero cost so we will not concern ourselves with
    them.


    Our friend the `Calendar` dimension clocks in with a 2% table scan. Can this be
    improved with a clustered index on the surrogate key?


    Check out the following code:


    ```

    CREATE UNIQUE CLUSTERED INDEX ieCalendarKey

    ON [Dimension].[Calendar](CalendarKey)

    GO

    ```


    Let’s create this clustered index and look at a revised estimated execution plan.


    Please refer to Figure [12-8](#527021_1_En_12_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig8_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the execution plan
    for query cost. An arrow points to clustered index cost 2%. Other costs are hash
    match, table scan, Nested loops, and index seek costs.


    Figure 12-8


    Revised estimated execution plan with a clustered Calendar index


    I am happy to say this worked. A table hint was not needed because the clustered
    index was used.


    We see a clustered index scan on the Calendar table. This dimension has 7,670
    rows, so we can come up with a conclusion for a table of this size. That is, create
    a clustered index on the surrogate key, and most likely it will be used!


    Pop Quiz Answer


    Why is this called a `SNOWFLAKE` query?


    Answer


    Because it joins the dimension and outrigger tables that makes the model look
    like a `SNOWFLAKE`. If a database is implemented as a `STAR` schema, then the
    query against it would be a `STAR` query. Makes sense?


    For your consideration, the following pop quiz is so you do not forget if performance
    analysis and tuning are all new to you.


    Another Pop Quiz


    Why do we need to run the `DBCC` command each time we perform performance analysis
    and query tuning?


    ### DENSE_RANK( ) Function


    Recall from Chapter [4](#527021_1_En_4_Chapter.xhtml) that the `DENSE_RANK()`
    function works almost the same as the `RANK()` function. In case of ties, the
    dense rank value is the same for the ties, but the next value after the duplicate
    values is simply assigned the next rank number. So, if the dense rank for the
    ties is 4, the next rank assigned to the next higher value is 5\. Makes sense
    to me.


    Not so for the `RANK()` function results. If you have five tie values of 6 and
    the current rank for the ties is 4, then the next rank is 9 (the 5 tie values
    + the current rank value 4 = 9). Strange indeed.


    We have seen this function before, but let’s apply it once more time, this time
    to our inventory business scenario. Here are the business specifications:


    Basically, the business analyst likes the prior report we gave them. This time
    they want to create the same report but add the `DENSE_RANK()` function in order
    to see how ties are treated by each function.


    This is an easy requirement to fill as we just copy and paste the prior query
    and add the new ranking window function. `TSQL` is all about code reusability!
    Why reinvent the wheel?


    Here is what we came up with.


    Please refer to Listing [12-4](#527021_1_En_12_Chapter.xhtml#PC5).


    ```

    WITH MonthlyInventoryMovement (

    MovementYear,MovementQuarter,MovementMonth,InvId,LocId,WhId

    ,ProdId,MonthlyDecrementMovement

    )

    AS

    (

    SELECT YEAR(MovementDate)        AS MovementYear

    ,DATEPART(qq,MovementDate) AS MovementQuarter

    ,MONTH(MovementDate)       AS MovementMonth

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    ,SUM(Decrement) AS MonthlyDecrementMovement

    FROM Product.InventoryTransaction

    GROUP BY YEAR(MovementDate)

    ,DATEPART(qq,MovementDate)

    ,MONTH(MovementDate)

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    )

    SELECT MovementYear

    ,MovementQuarter

    ,MovementMonth

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,MonthlyDecrementMovement

    ,RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecRank

    ,DENSE_RANK() OVER (

    PARTITION BY MovementYear

    ORDER BY MonthlyDecrementMovement DESC

    ) AS DecDEnseRank

    FROM MonthlyInventoryMovement

    WHERE MovementYear = 2010

    AND LocId = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    AND ProdId = ''P209''

    GO

    Listing 12-4

    Comparing Ranking Between RANK() and DENSE_RANK()

    ```


    Nothing to go over as we have seen the query. The partition is set up for the
    movement year, and the `ORDER BY` clause orders the monthly decrement sums in
    descending order. The `WHERE` clause can be removed when this query is used to
    fill up a report table with filters that allow business users the capability of
    selecting what values to use.


    Note


    In my opinion, the coding style I used to list each column on a single line makes
    the query easy to understand. That’s just my opinion. I know it takes up more
    space, especially in a book like this!


    Back to our discussion. What we are interested in seeing is how the ties are handled
    in an inventory business scenario. Let’s look at the results.


    Please refer to the partial results in Figure [12-9](#527021_1_En_12_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig9_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the results in
    a table that has 10 columns for movement year, Movement quarter, Movement month,
    Location I d, Inventory I d, Warehouse I d, product I d, monthly decrement movement,
    Decrement rank, and Decrement Dence rank.


    Figure 12-9


    Rank vs. dense rank


    The ties in the decrement values occur for the months of February (2), May (5),
    and December (12). In my opinion, and I stated this before, the `DENSE_RANK()`
    values make more sense as the tie values have, well, the same rank value. So we
    can state that for the months of February, May, and December, inventory decreased
    by 63 units for product “P209.”


    Skipping two rank values in the case of the `RANK()` function is confusing. Why
    do we want to use this?


    I have not seen a reason to use this when I researched the Internet as to why
    this function should be used and under what circumstances. If you know, please
    send me an email!


    Let’s move on to performance analysis and tuning for this function.'
