- fmt: '# SQL 查询分析：2012 年客户月度投资组合表现


    ```sql

    SELECT Year AS TradeYear

    ,CASE

    WHEN [Month] = 1 THEN ''Jan''

    WHEN [Month] = 2 THEN ''Feb''

    WHEN [Month] = 3 THEN ''Mar''

    WHEN [Month] = 4 THEN ''Apr''

    WHEN [Month] = 5 THEN ''May''

    WHEN [Month] = 6 THEN ''Jun''

    WHEN [Month] = 7 THEN ''Jul''

    WHEN [Month] = 8 THEN ''Aug''

    WHEN [Month] = 9 THEN ''Sep''

    WHEN [Month] = 10 THEN ''Oct''

    WHEN [Month] = 11 THEN ''Nov''

    WHEN [Month] = 12 THEN ''Dec''

    END AS Trademonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    ,RANK() OVER(

    ORDER BY SUM(Value) DESC

    ) AS PortfolioRankByMonth

    FROM Financial.Portfolio

    WHERE Portfolio = ''FX - FINANCIAL PORTFOLIO''

    AND CustId = ''C0000001''

    AND Year = 2012

    GROUP BY CustId,Year,Month,PortfolioNo

    ,Portfolio

    ORDER BY SUM(Value) DESC

    GO

    ```


    **Listing 6-2** Customer C0000001 2012 Monthly Balance


    这是一个直接的查询，没有使用 `CTE`，它使用 `case` 代码块来显示月份缩写而不是数字。`SUM()` 函数没有使用 `OVER()` 子句，因为我们希望看到直接的总计数，而不是按月的滚动总计。`RANK()`
    函数用于为每个月分配一个排名，以查看表现最好和最差的月份。


    最后，包含了强制的 `GROUP BY` 子句，我们根据投资组合总计数按降序对结果进行排序。


    注意刚刚提到的 `ORDER BY` 子句。我们真的需要它吗？我注释掉了这一行，重新执行了查询，并得到了相同的结果。结论：我们不需要它。这样的步骤可能会影响性能，因此请务必在查询计划中理解发生了什么。将它们并排运行在两个水平查询窗格中，以确保没有额外的步骤。


    在这个特定的例子中，我做了分析，两个查询（一个有额外的 `ORDER BY`，一个没有）的查询计划和配置文件统计信息是相同的，因此性能没有受到影响。


    我做了一个小改动，将 `OVER()` 子句中的排序顺序改为升序，并保留了将数据集按降序排序的查询 `ORDER BY` 子句，而第一个查询则没有包含最后的
    `ORDER BY` 子句。正是在这里，性能出现了轻微下降，正如结果性能统计信息所示。请参阅图 [6-3](#527021_1_En_6_Chapter.xhtml#Fig3)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig3_HTML.png)


    A screenshot of a S Q L application. It presents a program to get a financial
    portfolio and a list of estimated rows, Null values, and total subtree costs.


    **Figure 6-3** Comparing performance statistics


    看起来性能下降并不显著，但如果你的表有数百万行，这可能就成为问题了。注意那些小细节。它们可能对你造成很大的伤害！


    让我们回到查询，看看结果是什么样的。请参阅图 [6-4](#527021_1_En_6_Chapter.xhtml#Fig4)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig4_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a list of 12 trade years, trade month, customer i d, portfolio number, portfolio,
    yearly value, and portfolio rank by month. Portfolio ranks 1 and 12 are marked
    with 2 arrows.


    **Figure 6-4** Customer C0000001 2012 monthly balance report


    我们看到二月份的结果最好，但数值似乎波动很大，三月份的值最低。让我们获取这些数据并生成我们通常的图表。


    请参阅图 [6-5](#527021_1_En_6_Chapter.xhtml#Fig5)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig5_HTML.png)


    A screenshot of an Excel sheet. It represents a list with 2 columns, trade month
    and yearly value on the left. It also represents a bar graph of value versus month
    for F X portfolio analysis in 2012 on the right.


    **Figure 6-5** Customer C0000001 2012 monthly balance chart


    这次结果按月份升序排列，我们看到一个明显的下降趋势。这需要调查一下。这个投资组合中有大量的买卖操作。这是恐慌性抛售还是获利了结？


    ## 性能考量


    让我们回到第一个查询，使用估计的查询执行计划进行一些性能分析。


    请参阅图 [6-6](#527021_1_En_6_Chapter.xhtml#Fig6)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig6_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program to find the customer i d, portfolio number with a table that includes
    select, sequence project, 2 segments, sort, hash match, and index scan costs.
    Sort, hash match, and index scan costs are highlighted.


    **Figure 6-6** Estimated query plan for the first query


    从右向左阅读，我们看到一个昂贵的索引扫描和随后的哈希匹配聚合任务，后者同样昂贵，成本为 52%。索引被扫描，输出进入哈希表，以便与来自 `Portfolio`
    表本身的行进行匹配。这些行也被放入哈希桶中，匹配的行被传递给排序任务。


    > **注意**

    > 将鼠标指针悬停在此任务和其他任务上以显示提示面板，其中包括该任务的简短说明。对于你不了解其作用的任务，请这样做！


    为了改进此查询的性能，我们至少需要消除哈希匹配任务。回想一下，数据可以是 24 小时前的，因此一个可能的解决方案是用使用相同查询加载的表替换 `CTE`。


    这正是我们将要尝试的。请参阅代码清单 [6-3](#527021_1_En_6_Chapter.xhtml#PC3)。


    ```sql

    TRUNCATE TABLE Financial.DailyPortfolioAnalysis

    GO

    INSERT INTO Financial.DailyPortfolioAnalysis

    SELECT Year AS TradeYear

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    FROM Financial.Portfolio

    GROUP BY CustId,Year,PortfolioNo

    ,Portfolio

    ORDER BY Portfolio ASC,Year ASC, SUM(Value) DESC

    GO

    SELECT TradeYear,

    CustId,

    PortfolioNo,

    Portfolio,

    YearlyValue,

    RANK() OVER(

    PARTITION BY Portfolio,TradeYear

    ORDER BY YearlyValue DESC

    ) AS PortfolioRankByYear

    FROM Financial.DailyPortfolioAnalysis

    WHERE TradeYear > 2011

    GO

    ```


    **Listing 6-3** Loading the Portfolio Sweep Table


    假设 `INSERT` 命令每天运行一次，那么分析师只需要对加载的报告表执行查询。我们看到该查询本质上是历史性的，因此每次运行查询时重新生成整个历史数据集是没有意义的。


    如果我们现在为每个版本的查询运行估计的查询计划，我们会看到以下结果。请参阅图 [6-7](#527021_1_En_6_Chapter.xhtml#Fig7)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig7_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. In both tabs,
    top and bottom, there is a table to find query costs for select, sequence project,
    2 segments, sort, hash match, and index scan. The hash match cost is 52%. 75%
    and 25% of the costs are for sort and table scan costs.


    **Figure 6-7** Comparing query plans


    注意，昂贵的表哈希匹配任务消失了。我们确实看到了一个成本为 25% 的表扫描任务，但这是一个小表，只有 120 行，因此不需要索引。排序很昂贵，占 75%，但看看表扫描和排序步骤之间的连线。它们非常细，如果你点击它们，你会看到有
    120 行被传递进行排序。


    > **注意**

    > 运行实时查询性能计划将显示任务之间传递的行数以及每个任务完成所需的时间。在查询运行时，按下带绿色对勾的按钮将生成实时计划。


    在第一个版本的估计执行计划中，索引扫描向哈希匹配任务传递了 43,830 行，而该任务向排序任务传递了 600 行。看起来这个策略奏效了！


    让我们比较一下 `IO` 和 `TIME` 统计信息。请参阅图 [6-8](#527021_1_En_6_Chapter.xhtml#Fig8)。


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig8_HTML.png)'
  raw: '```

    SELECT Year AS TradeYear

    ,CASE

    WHEN [Month] = 1 THEN ''Jan''

    WHEN [Month] = 2 THEN ''Feb''

    WHEN [Month] = 3 THEN ''Mar''

    WHEN [Month] = 4 THEN ''Apr''

    WHEN [Month] = 5 THEN ''May''

    WHEN [Month] = 6 THEN ''Jun''

    WHEN [Month] = 7 THEN ''Jul''

    WHEN [Month] = 8 THEN ''Aug''

    WHEN [Month] = 9 THEN ''Sep''

    WHEN [Month] = 10 THEN ''Oct''

    WHEN [Month] = 11 THEN ''Nov''

    WHEN [Month] = 12 THEN ''Dec''

    END AS Trademonth

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    ,RANK() OVER(

    ORDER BY SUM(Value) DESC

    ) AS PortfolioRankByMonth

    FROM Financial.Portfolio

    WHERE Portfolio = ''FX - FINANCIAL PORTFOLIO''

    AND CustId = ''C0000001''

    AND Year = 2012

    GROUP BY CustId,Year,Month,PortfolioNo

    ,Portfolio

    ORDER BY SUM(Value) DESC

    GO

    Listing 6-2

    Customer C0000001 2012 Monthly Balance

    ```


    This is a straightforward query, without a `CTE`, that uses a case block to display
    the month abbreviations instead of just numbers. The `SUM()` function is used
    without an `OVER()` clause because we want to see the straight totals, not rolling
    totals by month. The `RANK()` function is used to assign a rank to each month
    to see what the best- and worst-performing months were.


    Lastly, the mandatory `GROUP BY` clause is included, and we sort the results by
    the portfolio total in descending order.


    Notice the `ORDER BY` clause just mentioned. Do we really need it? I commented
    out the line, re-executed the query, and got the same results. Conclusion: We
    do not need it. Steps like this could affect performance, so make sure you understand
    in the query plan what is going on. Run them side by side, in two horizontal query
    panes, to make sure there are no extra steps.


    In this particular example, I did the analysis, and the query plan and profile
    statistics were the same for both queries, one with the extra `ORDER BY` and one
    without, so performance was not affected.


    I made a slight alteration, and I changed the sort order in the `OVER()` clause
    to ascending and kept the query `ORDER BY` clause that sorted the data set in
    descending order, while the first query did not include the last `ORDER BY` clause.
    Here is where there was a slight degradation of performance as can be seen in
    the resulting performance statistics. Please refer to Figure [6-3](#527021_1_En_6_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig3_HTML.png)


    A screenshot of a S Q L application. It presents a program to get a financial
    portfolio and a list of estimated rows, Null values, and total subtree costs.


    Figure 6-3


    Comparing performance statistics


    Does not seem like a substantial degradation in performance, but if your tables
    have millions of rows, this could be an issue. Look out for the small stuff. It
    can hurt you a lot!


    Let’s get back to the query and see what the results look like. Please refer to
    Figure [6-4](#527021_1_En_6_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig4_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a list of 12 trade years, trade month, customer i d, portfolio number, portfolio,
    yearly value, and portfolio rank by month. Portfolio ranks 1 and 12 are marked
    with 2 arrows.


    Figure 6-4


    Customer C0000001 2012 monthly balance report


    We see that February results were the best, but values seemed to jump around a
    lot with March having the lowest value. Let’s take the data and generate our usual
    graph.


    Please refer to Figure [6-5](#527021_1_En_6_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig5_HTML.png)


    A screenshot of an Excel sheet. It represents a list with 2 columns, trade month
    and yearly value on the left. It also represents a bar graph of value versus month
    for F X portfolio analysis in 2012 on the right.


    Figure 6-5


    Customer C0000001 2012 monthly balance chart


    This time the results are sorted by month in ascending order, and we see a nice
    downward spiral. This needs to be investigated. Lots of buying and selling in
    this portfolio. Are these panic sell-offs or sell-offs to cash in on profits?


    #### Performance Considerations


    Let’s get back to our first query and do some performance analysis with the estimated
    query execution plan.


    Please refer to Figure [6-6](#527021_1_En_6_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig6_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program to find the customer i d, portfolio number with a table that includes
    select, sequence project, 2 segments, sort, hash match, and index scan costs.
    Sort, hash match, and index scan costs are highlighted.


    Figure 6-6


    Estimated query plan for the first query


    Reading from right to left, we see an expensive index scan and a subsequent hash
    match aggregate task, which is also expensive with a cost of 52%. The index is
    scanned, and the output goes into a hash table so it can be matched to rows from
    the Portfolio table itself. These rows are also placed into a hash bucket, and
    the matching rows are passed on to the sort task.


    Note


    Place your mouse pointer over this and other tasks to display a hint panel that
    includes a short explanation of the task. Do this for tasks you do not know what
    they do!


    To improve the performance of this query, we would need to at least eliminate
    the hash match task. Recall that the data can be 24 hours old, so a possible solution
    could be to replace the `CTE` with a table that is loaded using the same query.


    This is exactly what we will try out. Please refer to Listing [6-3](#527021_1_En_6_Chapter.xhtml#PC3).


    ```

    TRUNCATE TABLE Financial.DailyPortfolioAnalysis

    GO

    INSERT INTO Financial.DailyPortfolioAnalysis

    SELECT Year AS TradeYear

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    FROM Financial.Portfolio

    GROUP BY CustId,Year,PortfolioNo

    ,Portfolio

    ORDER BY Portfolio ASC,Year ASC, SUM(Value) DESC

    GO

    SELECT TradeYear,

    CustId,

    PortfolioNo,

    Portfolio,

    YearlyValue,

    RANK() OVER(

    PARTITION BY Portfolio,TradeYear

    ORDER BY YearlyValue DESC

    ) AS PortfolioRankByYear

    FROM Financial.DailyPortfolioAnalysis

    WHERE TradeYear > 2011

    GO

    Listing 6-3

    Loading the Portfolio Sweep Table

    ```


    Assume the `INSERT` command runs once a day, so the analyst only needs to execute
    the query against the loaded report table. We see that the query is historical
    in nature, so it does not make sense regenerating the entire historical data set
    each time the query is run.


    If we now run the estimated query plans for each version of the query, we see
    the following results. Please refer to Figure [6-7](#527021_1_En_6_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig7_HTML.png)


    A screenshot of S Q L application titled Ranking Financial Quarries. In both tabs,
    top and bottom, there is a table to find query costs for select, sequence project,
    2 segments, sort, hash match, and index scan. The hash match cost is 52%. 75%
    and 25% of the costs are for sort and table scan costs.


    Figure 6-7


    Comparing query plans


    Notice the expensive table hash match task is gone. We do see a table scan task
    with a cost of 25%, but this is a small table, only 120 rows, so an index is not
    required. The sort is expensive at 75%, but look at the lines between the table
    scan and sort step. They are very thin, and if you click them, you will see that
    120 rows were passed to be sorted.


    Note


    Running a live query performance plan will display the rows that were passed between
    tasks and the time each task took to complete. Pressing the button with the green
    checkmark will generate the live plan while the query is running.


    With the first version of the estimated execution plan, the index scan passed
    43,830 rows to the hash match task, and this task passed 600 rows to the sort
    task. Looks like this strategy worked!


    Let’s compare `IO` and `TIME` statistics. Please refer to Figure [6-8](#527021_1_En_6_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig8_HTML.png)'
