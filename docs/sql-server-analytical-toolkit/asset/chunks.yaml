- fmt: '## The Inventory Data Warehouse


    Next, we look at a second database, which is a data warehouse implemented as a
    `SNOWFLAKE` schema. This data warehouse is loaded from the `APInventory` database.
    This chapter will include a section on how to use SQL Server Integration Services
    (`SSIS`) to load this simple data warehouse.


    Figure [11-2](#527021_1_En_11_Chapter.xhtml#Fig2) is the simplified `SNOWFLAKE`
    schema for our example data warehouse.


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig2_HTML.jpg)


    A block diagram presents a conceptual model. A block titled inventory history
    is in the middle and connected to their parent entries. The parent entries depict
    the calendar, location, warehouse, and product. The parent entry of the product
    is product type, and the location is country.


    Figure 11-2


    The inventory data warehouse conceptual model


    The central business object in this model is the `Inventory History` object, which
    will be the basis for the fact table in the data warehouse. Historical data related
    to inventory movement in and out of the `APInventory` database will be stored
    in this object.


    Surrounding the `Inventory History` business object are the various entities that
    will be used to create the dimensions in the data warehouse. These are basically
    the same as those we discussed in the `APInventory` database, and the verb phrases
    clearly discuss the business relationships between the historical `Inventory History`
    object and the future dimension tables. For example, a product type identifies
    the type of a product, like a steam locomotive type.


    The following are the physical table names, the assigned schema, and primary key
    information related to the data warehouse model.


    Please refer to Table [11-2](#527021_1_En_11_Chapter.xhtml#Tab2).


    Table 11-2


    The Inventory Data Warehouse Tables


    | Table | Type | Primary Key |

    | --- | --- | --- |

    | Calendar | Dimension | CalendarKey |

    | Country | Dimension | CountryKey |

    | Inventory | Dimension | InvKey |

    | Location | Dimension | LocKey |

    | Product | Dimension | ProdKey |

    | Product Type | Dimension | ProdTypeKey |

    | Warehouse | Dimension | WhKey |

    | Inventory History | Fact | CalendarKey, LocKey, WhKey, ProdKey, ProdTypeKey
    |


    Technically, the `Warehouse` table should include the primary surrogate keys for
    `Location` and `Inventory`, but I took a bit of a design shortcut to simplify
    the model and load scripts.


    Next, I will introduce a new tool for your toolkit. This tool is called `SSIS`
    (SQL Server Integration Services), which is Microsoft’s premier `ETL` tool. We
    will use this tool to load our data warehouse from the transactional inventory
    database.


    All code to create the two databases is available in the chapter folder on the
    Apress website for this book.


    ## Loading the Inventory Data Warehouse


    `SSIS`, which stands for SQL Server Integration Services, is a graphical tool
    that allows one to create process flows called control flows and data flows for
    any data integration process. The control flows identify the steps and order that
    tasks need to be executed in order to extract, transform, and load data, while
    the data flows allow the data architect to specify the flow of data and the low-level
    transformation tasks. The flow could be sequential or have many branches depending
    on how the data needs to be distributed.


    `SSIS` creates applications called packages. Within each package are a series
    of low-level tasks that define and execute the low-level steps to process the
    data. We can say, then, that `SSIS` is composed of control and data flows, packages,
    and tasks. An `SSIS` project can have one or more packages, which can call each
    other to define very complex data integration and transformation processes.


    A toolbox is available with all the tasks one might need, and also a Solution
    Explorer panel allows one to define the data sources and connections one needs.
    Let’s explore the main facilities available with this tool.


    Please refer to Figure [11-3](#527021_1_En_11_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig3_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the page
    titled `package.dtsx`.


    Figure 11-3


    Creating the project


    This is not meant to be an exhaustive tutorial on `SSIS`. The intent is to give
    you just enough familiarity with the tool so you can create simple load processes
    and explore the tool on your own. Many excellent books and courses are available
    to take you to the next skill level.


    The GUI is composed of four main panels:


    *   **SSIS Toolbox**: Contains all low-level tasks that you need in your flows,
    like FTP tasks.

    *   **Design area**: This contains the GUI used to create control flows and data
    flows and identify parameters used in `ETL` packages and also event handlers and
    a package explorer.

    *   **Solution Explorer**: This is where you identify project parameters, connection
    managers, `SSIS` packages you will need, package parts and folders for miscellaneous
    components, and linked Azure resources.

    *   **Connection Managers**: This identifies connections to databases, other servers,
    and even the `SSAS` (SQL Server Analysis Services) server.


    Right-clicking the folder in the Solution Explorer will present menus to add new
    components like connections.


    Let’s start creating our package (our project will have only one package). The
    first task is to create a connection manager.


    Please refer to Figure [11-4](#527021_1_En_11_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig4_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts a dialog
    box titled `Add SSIS connection manager`.


    Figure 11-4


    Adding the connection manager


    Right-click the `Connection Managers` folder, and you are presented with a pop-up
    dialog box that allows you to view and select the connection manager you require.
    For our purposes we need the first one called `ADO` (Active X Data Objects), so
    we select that one and click the `Add` button. Notice the list box, many data
    sources like Hadoop and Excel.


    Next, we need to define security information. Please refer to Figure [11-5](#527021_1_En_11_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig5_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the dialog
    box titled `Connection Manager`. A message box at the bottom reads `test connection
    succeeded`.


    Figure 11-5


    Configuring the connection manager'
