    PlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth

    ,SumEquipFailures

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS PercentRank

    ,FORMAT(CUME_DIST() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS CumeDist

    FROM [Reports].[PlantSumEquipFailures]

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    AND CalendarYear = 2002

    GO

    ```

    Listing 10-8

    Adding a WHERE clause


    As you can see, the query is hard-coded, so it filters the results for plant “East
    Plant,” the boiler room, and the year 2002\. The analyst wants all the years,
    plants, and locations, but let’s see the performance plan after this modification.


    Please refer to Figure [10-18](#527021_1_En_10_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig24_HTML.png)'
