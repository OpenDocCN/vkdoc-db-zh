- fmt: '### Performance Considerations


    我们将再次生成通常的预估查询执行计划并查看结果。我们还将查看`IO`和`TIME`统计信息，然后修改查询，使其通过与`Calendar`表的`JOIN`来检索文本季度和月份名称，以替换`CASE`块。之后，我们将比较两个版本查询的分析结果。


    ### Pop Quiz


    使用 SSMS 生成预估查询计划有哪些不同的方式？


    请参考图 [13-38](#527021_1_En_13_Chapter.xhtml#Fig38)。


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig38_HTML.jpg)


    > 一个 SQL Server Management Studio (SSMS) 窗口的截图。它展示了右侧的预估查询执行计划，包含 11 个组件：Segment、Nested
    Loops、Table Spool、Segment、Sort、Index Seek、Nested Loops、Compute Scalar、Stream Aggregate、Table
    Spool 和 Table Spool。

    >

    > **图 13-38**

    > 预估查询计划 – 右侧部分


    我们将只查看计划的第一部分，因为剩余部分具有与我们分析`PERCENTILE_CONT`查询时看到的相同的重复模式。


    相同的场景被生成：一个在`Warehouse`表上的索引查找任务，成本为 21%；一个昂贵的排序任务，成本为 73%。除嵌套循环联接任务成本为 1% 外，所有其他任务成本均为
    0%。这是我们预期的。让我们运行`IO`和`TIME`统计信息，之后将修改查询，使其在查询中通过`JOIN`子句利用`Calendar`表。


    请参考图 [13-39](#527021_1_En_13_Chapter.xhtml#Fig39)。


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig39_HTML.jpg)


    > 一个 SQL Server Management Studio (SSMS) 窗口的截图。文本展示了 I/O 和 TIME 统计信息。SQL Server
    解析和编译时间，CPU 和已用时间分别为 0 和 114 毫秒。SQL Server 执行时间，CPU 和已用时间分别为 0 和 16 毫秒。影响了 2 个表的
    12 行。

    >

    > **图 13-39**

    > IO 和 TIME 统计信息


    `IO`和`TIME`统计信息与`PERCENTILE_CONT()`相同，除了解析编译时间和 SQL Server 执行时间略有改善。注意`Warehouse`表上的物理读取（2）。注意临时工作表上的扫描计数（12）和逻辑读取（116）。


    > **注意**

    > 在您的笔记本电脑、工作站甚至开发服务器上运行此类分析时，请确保没有后台维护进程运行，因为这些进程可能会减慢性能并扭曲结果。


    让我们按照清单 [13-9](#527021_1_En_13_Chapter.xhtml#PC10) 修改查询，使其现在包含与`Calendar`表的`JOIN`。


    ```sql

    CREATE UNIQUE CLUSTERED INDEX pkCalendar

    ON MasterData.Calendar (CalendarYear,CalendarDate)

    GO

    UPDATE STATISTICS MasterData.Calendar

    GO

    SELECT AsOfYear

    ,C.CalendarQtr

    ,C.CalendarTxtQuarter AS AsOfQtrName

    ,C.CalendarTxtMonth AS AvgMonthName

    ,C.CalendarDate AS AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,QtyOnHand

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete.25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .75]

    FROM MasterData.Calendar C

    JOIN Product.Warehouse W

    ON W.AsOfDate = C.CalendarDate

    WHERE C.CalendarYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    ```


    **清单 13-9**

    增强的查询，至少我们希望如此！


    我们需要做的第一件事是在`Calendar`表上基于年份和日历日期创建一个唯一的聚集索引。接下来，我们更新了表统计信息，以确保查询优化器拥有关于该表的最新、最准确的信息。


    现在将注意力转向修改后的查询，注意`JOIN`谓词的顺序；内表是`Warehouse`表，外表是`Calendar`表。


    现在让我们比较预估的查询计划。请参考图 [13-40](#527021_1_En_13_Chapter.xhtml#Fig40)。


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig40_HTML.png)


    > 一个 SQL Server Management Studio (SSMS) 窗口的截图。它展示了 2 个预估查询执行计划，包含 13 个组件。两个计划中
    Nested Loops 的成本均为 1%。计划 1 中 Sort 和 Index Seek 的成本分别为 73% 和 21%。计划 2 中 Sort、Merge
    Join 和 2 个 Clustered Index 的成本分别为 26%、15%、10% 和 14%。

    >

    > **图 13-40**

    > 比较预估查询计划


    新计划看起来好了一些。聚集索引查找成本从 21% 下降到 14%，排序任务成本从 73% 下降到 32%。


    到目前为止，一切顺利。


    我们看到了与`Calendar`表`JOIN`相关的新任务。我们看到一个成本为 10% 的聚集索引查找，后跟一个成本为 15% 的合并联接任务，以及一个成本为
    26% 的新排序。


    看起来`Warehouse`表的任务有所改进，但我们添加了一些新任务来处理我们需要的日历日期文本部分。记住，我们这样做是为了消除`CASE`块。


    这样更好吗？让我们比较一下`IO`和`TIME`统计信息。


    请参考图 [13-41](#527021_1_En_13_Chapter.xhtml#Fig41)。


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig41_HTML.png)


    > 一个 SQL Server Management Studio (SSMS) 窗口的截图。它展示了 2 组 I/O 和 TIME 统计信息。解析和编译时间，CPU
    和已用时间分别为 31, 99 和 16, 48 毫秒（对应 1 和 2）。执行时间，CPU 和已用时间分别为 0, 17 和 0, 39 毫秒（对应 1
    和 2）。影响了 2 个和 3 个表的 12 行。

    >

    > **图 13-41**

    > 比较`IO`和`TIME`统计信息


    令人惊讶！


    看起来我们的方案并没有产生我们所希望的积极改进。SQL Server 执行时间从 17 毫秒增加到 39 毫秒，增加了一倍多。临时工作表统计信息保持不变。


    对于`Warehouse`表，我们看到扫描计数值为 1，逻辑读取为 8（这个值上升了），1 次物理读取（这个值下降了），以及 5 次预读读取。


    最后，我们有了一组新的`Calendar`表统计信息：1 次扫描，4 次逻辑读取，1 次物理读取，以及 2 次预读读取。


    结论：我们的增强并未实现显著的改进。如果我们将`Calendar`表通过使其成为内存增强表来置于内存中，这个策略将会奏效。否则，我们应该保留此查询原样。


    有时候事情不会按预期发展，但为了学习和了解什么会奏效、什么不会奏效，值得一试。


    让我们通过整体查看所有查询的统计信息来结束我们最后的性能分析与改进讨论。


    ### Pop Quiz Answer


    使用 SSMS 生成预估查询计划有哪些不同的方式？


    通过查询选择弹出菜单或通过顶部菜单栏中的图标。'
  raw: '### Performance Considerations


    We are going to generate our usual estimated query performance plan one more time
    and look at the results. We will also look at the `IO` and `TIME` statistics and
    then modify the query, so it uses the Calendar table with a `JOIN` to retrieve
    the text quarter and month names replacing the `CASE` blocks. We will then compare
    the analysis results between both versions of the query.


    Pop Quiz


    What are the different ways you can generate an estimated query plan using SSMS?


    Please refer to Figure [13-38](#527021_1_En_13_Chapter.xhtml#Fig38).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig38_HTML.jpg)


    A screenshot of the S Q L S S M S window. It presents the right-hand side estimated
    query execution plan with 11 components. The components are segment, nested loops,
    table spool, segment, sort, index seek, nested loops, compute scalar, stream aggregate,
    table spool, and table spool.


    Figure 13-38


    Estimated query plan – right-hand side


    We will only look at the first section of the plan as the remaining sections have
    the same repeating patterns that we saw when we analyzed the `PERCENTILE_CONT`
    query.


    The same scenario was generated, an index seek task on the `Warehouse` table with
    a cost of 21% and an expensive sort task with a cost of 73%. All other tasks are
    with 0% cost except the nested loops join task that came in with a 1% cost. We
    expected this. Let’s run our `IO` and `TIME` statistics, after which we will modify
    the query, so it utilizes the Calendar table via a `JOIN` clause in the query.


    Please refer to Figure [13-39](#527021_1_En_13_Chapter.xhtml#Fig39).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig39_HTML.jpg)


    A screenshot of the S Q L S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 114 milliseconds.
    The S Q L server execution times for C P U and elapsed are 0 and 16 milliseconds.
    12 rows of 2 tables are affected.


    Figure 13-39


    IO and TIME statistics


    Same `IO` and `TIME` statistics as `PERCENTILE_CONT()` except parse and compile
    time and SQL Server execution times were slightly improved. Notice the physical
    reads on the Warehouse table (2). Notice the scan count (12) and logical reads
    (116) on the work table.


    Note


    When running this type of analysis on your laptop or workstation or even a development
    server, make sure that there are no background maintenance processes running as
    these could slow performance and skew results.


    Let’s modify the query as per Listing [13-9](#527021_1_En_13_Chapter.xhtml#PC10)
    so it now includes the `JOIN` to the Calendar table.


    ```

    CREATE UNIQUE CLUSTERED INDEX pkCalendar

    ON MasterData.Calendar (CalendarYear,CalendarDate)

    GO

    UPDATE STATISTICS MasterData.Calendar

    GO

    SELECT AsOfYear

    ,C.CalendarQtr

    ,C.CalendarTxtQuarter AS AsOfQtrName

    ,C.CalendarTxtMonth AS AvgMonthName

    ,C.CalendarDate AS AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,QtyOnHand

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete.25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .75]

    FROM MasterData.Calendar C

    JOIN Product.Warehouse W

    ON W.AsOfDate = C.CalendarDate

    WHERE C.CalendarYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    Listing 13-9

    Enhanced Query, at Least We Hope!

    ```


    The first task that we needed to do was create a unique clustered index on the
    Calendar table based on the year and calendar date. Next, we updated the table
    statistics to make sure the query optimizer has the latest and greatest information
    on the table.


    Turning our attention to the modified query, notice the `JOIN` predicate order;
    the inner table is the Warehouse table, and the outer table is the Calendar table.


    Now let’s compare the estimated query plans. Please refer to Figure [13-40](#527021_1_En_13_Chapter.xhtml#Fig40).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig40_HTML.png)


    A screenshot of the S Q L S S M S window. It presents 2 estimated query execution
    plans with 13 components. Nested loops cost is 1% in both. Sort and index seek
    costs are 73% and 21% in plan 1\. Sort, merge join, and 2 clustered index costs
    are 26%, 15%, 10%, and 14% in plan 2.


    Figure 13-40


    Comparing estimated query plans


    The new plan looks a little better. The clustered index seek cost went down from
    21% to 14%, and the sort task went down from 73% to 32%.


    So far, so good.


    We see the new tasks related to the Calendar table `JOIN`. We see a clustered
    index seek with a cost of 10% followed by a merge join task with a cost of 15%
    and a new sort with a cost of 26%.


    Seems like the Warehouse table tasks improved, but we added a few new tasks to
    process the calendar date text parts we need. Remember we did this to eliminate
    the `CASE` blocks.


    Is this better? Let’s compare the `IO` and `TIME` statistics.


    Please refer to Figure [13-41](#527021_1_En_13_Chapter.xhtml#Fig41).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig41_HTML.png)


    A screenshot of the S Q L S S M S window. It presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 31, 99 and 16, 48 milliseconds
    for 1 and 2\. Execution times for C P U and elapsed are 0, 17, and 0, 39 milliseconds
    for 1 and 2\. 12 rows of 2 and 3 tables are affected.


    Figure 13-41


    Comparing `IO` and `TIME` statistics


    Surprise!


    Looks like our scheme did not produce the positive improvements we had hoped for.
    SQL Server execution time went up from 17 ms to 39 ms, a little more than double.
    The work table statistics remained the same.


    For the `Warehouse` table, we see a scan count value of 1, logical reads of 8
    (this went up), 1 physical read (this went down), and 5 read-ahead reads.


    Lastly, we have a new set of statistics for the Calendar table with 1 scan, 4
    logical reads, 1 physical read, and 2 read-ahead reads.


    Conclusion: Our enhancements did not realize significant improvements. This strategy
    will work if we place the Calendar table in memory by making it a memory-enhanced
    table. Otherwise, we should leave this query as is.


    Sometimes things do not work out as expected, but it is worth a try in order to
    learn and see what will work and what will not work.


    Let’s wrap up our last performance analysis and improvement discussion with an
    overall look at statistics across all queries.


    Pop Quiz Answer


    What are the different ways you can generate an estimated query plan using SSMS?


    Via the Query selection pop-up menu or via the icons in the top menu bar.'
