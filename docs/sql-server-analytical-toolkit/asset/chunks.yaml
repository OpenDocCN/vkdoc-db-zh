- fmt: '### CUME_DIST() Function


    Recall from Chapter [7](#527021_1_En_7_Chapter.xhtml) that this function calculates
    the relative position of a value within a data set like a table, partition, or
    table variable loaded with test data. It calculates the probability that a random
    value, like a failure rate, is less than or equal to a particular failure rate
    for a piece of equipment. It is cumulative because it takes all values into account
    when calculating the distinct value for a specific value.


    If you are a bit unsure of this, go back to Chapter [7](#527021_1_En_7_Chapter.xhtml)
    or Appendix A and review how this function works and how it is applied.


    Here are the business specifications supplied by our business analyst friend:


    Our analyst wants us to calculate the cumulative distribution of the sum of failures
    across the East Plant, specifically for the boiler room for the year 2002. The
    report needs to be sorted in ascending order of the calculated cumulative distribution
    values.


    Additionally, the plant name, location, year, calendar quarter, and month name
    need to be included in the report.


    Lastly, use the results to prepare a line chart in Microsoft Excel that shows
    the failure trends by month but also includes the corresponding cumulative distribution
    values.


    **Note**


    Graphing the cumulative distribution values makes no sense as they will go linearly
    up or down, but showing the failures in let’s say a bar or line chart does.


    This is a fairly simple query to write, so let’s take a look. Please refer to
    Listing [10-1](#527021_1_En_10_Chapter.xhtml#PC1).


    ```sql

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, MonthName, CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName, LocationName, CalendarYear, QuarterName,

    MonthName, CalendarMonth

    ,SumEquipFailures

    ,FORMAT(CUME_DIST() OVER (

    ORDER BY SumEquipFailures

    ),''P'') AS CumeDist

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2002

    AND LocationName = ''Boiler Room''

    AND PlantName = ''East Plant''

    GO

    ```


    **Listing 10-1**

    Cumulative Distribution Report for Failures


    Notice that I used the `FORMAT()` function so the results are printed as percentages
    instead of values between 0 and 1 (makes more sense to me anyway). The `OVER()`
    clause just contains an `ORDER BY` clause that arranges the equipment failure
    totals in ascending order.


    **Pop Quiz**


    Do you remember what the default `PARTITION BY` behavior is for an `OVER()` clause
    that only has an `ORDER BY` clause? Does this function allow window specifications
    in the `OVER()` clause? Answer at the end of the section.


    If you want to include more power plants, locations, and years, modify the `OVER()`
    clause as follows:


    ```sql

    ,FORMAT(CUME_DIST() OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth,SumEquipFailures

    ),''P'') AS CumeDist

    ```


    Make sure you remove the `WHERE` clause to get all results.


    In Figure [10-1](#527021_1_En_10_Chapter.xhtml#Fig1) are the partial results for
    both queries.


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig1_HTML.jpg)


    A screenshot of the S Q L, S S M S window. It has 2 tables of 9 columns and 12
    and 1517 rows. The column headers are Plant name, location name, calendar year,
    quarter name, month name, calendar month, sum equipment failures, and cumulative
    distribution. Cumulative distribution is outlined.


    **Figure 10-1**

    Cumulative distribution reports for failures


    I highlighted in a red box the first year results for both queries so you can
    see that the modified partition works correctly.


    So how would you interpret these results?


    Looking at the value for March 2002, the East Plant boiler room, we would interpret
    the value as meaning 91.67% of the values in the partition will be less than or
    equal to 13 failures. It is as simple as that!


    Let’s create the Microsoft Excel spreadsheet requested by our analyst next. Please
    refer to Figure [10-2](#527021_1_En_10_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig2_HTML.png)


    A screenshot of the home page of M S Excel window. It has a table of 5 columns
    and 12 rows. The column headers are quarter, month, month number, failures, and
    cumulative distribution. It also has dual y-axis bar-line graph of failures and
    cumulative distribution versus month with fluctuating trends.


    **Figure 10-2**

    Failure trends for the East Plant boiler room for 2002


    After a little bit of formatting, we have a nice report with a table that shows
    the failure rates for the 12 months in 2002. The graph shows that failures are
    trending down as the year progresses with April having the highest number of failures.
    The cumulative distribution values are printed for each month next to the failure
    numbers, so this comes in handy when interpreting the graph.


    To generate this report, I needed to sort the data table by month number. If you
    do not want to see these numbers, just the month names, you could hide the column.


    Just to give you a taste of a web reporting tool called Report Builder (that Microsoft
    makes available for free), Figure [10-3](#527021_1_En_10_Chapter.xhtml#Fig3) is
    the data we just generated with the query (minus the `WHERE` clause so we can
    filter locations in the report) in a simple Report Builder report using a filter
    so we see the South Plant.


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig3_HTML.png)


    A screenshot of the S Q L Report Builder window with run option selected. It presents
    cumulative distribution failures for the South Plant generator room in the year
    2002 in 4 quarters. It presents the values for all the months from January to
    December.


    **Figure 10-3**

    Report Builder report


    This is a preview of the report that was created by the tool. I will go into more
    detail in the next chapter on how to actually create the report and publish it
    to a SSRS (SQL Server Reporting Services) website. For now, just be aware this
    is another important tool to add to your toolkit.


    Here is what the report looks like after it was published to a Microsoft Reporting
    Services website on my laptop. Notice we filter the location for North Plant.
    Please refer to Figure [10-4](#527021_1_En_10_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig4_HTML.jpg)


    A screenshot of S Q L Server Reporting Services window. It presents cumulative
    distribution failures for the North Plant furnace room in the year 2002 in 4 quarters.
    It presents the values for all the months from January to December.


    **Figure 10-4**

    Published report on Reporting Services


    Reporting Services affectionately known as SSRS is a complete web server platform
    that allows you to create and publish sophisticated reports and dashboards to
    a website. This is a powerful facility that allows business users and analysts
    quick access to the reports they ask for.


    The good news is that you can install it on your laptop or workstation so you
    can prototype your reports!


    Back to the sample report, notice that it has three drop-down list boxes so you
    can view the report for any plant, location, and year. More on this later!'
