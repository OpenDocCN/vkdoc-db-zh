    Makes sense if you think about it. It must work on the entire partition or result
    set!


    Let’s see the performance impact when this function is used.'
  trans: '## 性能考量


    我们来生成一个估计执行计划，它是以常规方式创建的。（记住，有几种创建方式。）这次有两个计划，一个是加载变量的查询的计划，另一个是使用 `NTILE()` 函数的查询的计划。


    请参阅图 4-10。


    ![](img/527021_1_En_4_Fig10_HTML.jpg)


    一个窗口的截图，展示了一个选项卡，其中包含查询 1 和查询 2 的两个估计执行计划流程图，查询成本分别为 34%和 66%。


    图 4-10

    `NTILE()` 示例的估计执行计划


    查看设置 `@NumTiles` 变量的查询的第一个执行计划，我们感觉它的开销很大。（从右向左看）我们看到表扫描任务的成本为 30%，一个非常昂贵的排序步骤成本为
    70%。其余步骤的成本为 0%，因此我们不必担心它们。


    虽然没有建议索引，但我想知道在排序步骤中使用的列上创建索引是否会有帮助。答案是否定的。在这种情况下，该表只有 400 行，因此索引不会提供帮助或不会被使用。唯一的替代方案是在加载时对它进行排序，或者将表放入内存中。也就是说，将其创建为内存优化表。


    让我们看看第二个计划。没有建议索引，我们看到一个表扫描、两个排序任务、一些表假脱机和两个嵌套循环联接。这里无事可做。


    正如我之前所说，该表只有 400 行，所以我们就别折腾了。不过为了进行完整的分析练习，不妨看看一些统计数据。


    请参阅表 4-3。


    表 4-3

    查询 IO 和时间统计信息


    | SQL Server 解析和编译时间 | 第一个查询 | 第二个查询 |

    | --- | --- | --- |

    | CPU 时间 (ms) | 0 | 16 |

    | 已用时间 (ms) | 43 | 41 |

    | `统计信息 (临时表)` | `第一个查询` | `第二个查询` |

    | 扫描计数 | 0 | 3 |

    | 逻辑读取 | 0 | 657 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | `统计信息 (CustomerPaymentHistory)` | `第一个查询` | `第二个查询` |

    | 扫描计数 | 1 | 1 |

    | 逻辑读取 | 5 | 5 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | `SQL Server 执行时间` | `第一个查询` | `第二个查询` |

    | CPU 时间 (ms) | 16 | 0 |

    | 已用时间 (ms) | 41 | 78 |


    同样，这里无需担心。第二个查询有 657 次逻辑读取，这意味着它需要 657 次访问内存缓存来检索所需数据，但这并不是一个显著的数值。


    正如我之前所说，当你的查询处理的数据量很小且执行时间在一秒钟以内时，就转向处理更棘手的查询吧（挑硬柿子捏）。


    ### 注意


    归根结底，如果你的查询在一秒钟内运行完毕，就不要动它。最终，需要处理的是那些运行时间长的查询。此外，你的用户愿意容忍多长时间？长达一分钟？将这点考虑进去。


    ## ROW_NUMBER( ) 函数


    让我们再次看看 `ROW_NUMBER()` 函数。在下一个示例中，我们希望为在两年时间段（2011 年、2012 年）内两家特定商店销售的产品，按月保留一个累计总计。另外，我们只想跟踪一种产品：黑巧克力
    - 中号盒装。


    这里使用了 `SUM()` 聚合函数，而 `ROW_NUMBER()` 函数则以一种简单的方式使用，用于为每个月分配一个条目编号。该函数将被使用三次，以便我们能够观察在查询中使用不同的
    `PARTITION BY` 和 `ORDER BY` 子句组合时的行为。


    本章的最后一个示例将向你展示如何使用 `ROW_NUMBER()` 函数来解决与数据范围相关的岛屿和间隙问题。这将会很有趣且实用。估计查询计划应该也会很有趣。接下来让我们看看如何计算滚动总计。


    请参阅清单 4-6。


    ```sql

    WITH StoreProductAnalysis

    (TransYear,TransMonth,TransQtr,StoreNo,ProductNo,ProductsBought)

    AS

    (

    SELECT

    YEAR(CalendarDate)         AS TransYear

    ,MONTH(CalendarDate)       AS TransMonth

    ,DATEPART(qq,CalendarDate) AS TransQtr

    ,StoreNo

    ,ProductNo

    ,SUM(TransactionQuantity)  AS ProductsBought

    FROM StagingTable.SalesTransaction

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,DATEPART(qq,CalendarDate)

    ,StoreNo

    ,ProductNo

    )

    SELECT

    spa.TransYear

    ,spa.TransMonth

    ,spa.StoreNo

    ,spa.ProductNo

    ,p.ProductName

    ,spa.ProductsBought

    ,SUM(spa.ProductsBought) OVER(

    PARTITION BY spa.StoreNo,spa.TransYear

    ORDER BY spa.TransMonth

    ) AS RunningTotal

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear

    ORDER BY spa.TransMonth

    ) AS EntryNoByMonth

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear,TransQtr

    ORDER BY spa.TransMonth

    ) AS EntryNoByQtr

    ,ROW_NUMBER() OVER(

    ORDER BY spa.TransYear,spa.StoreNo

    ) AS EntryNoByYear

    FROM StoreProductAnalysis spa

    JOIN DimTable.Product p

    ON spa.ProductNo = p.ProductNo

    WHERE spa.TransYear IN(2011,2012)

    AND spa.StoreNo IN (''S00009'',''S00010'')

    AND spa.ProductNo = ''P00000011129''

    GO

    ```


    清单 4-6

    按月计算的滚动销售总计


    从 `CTE` 开始，该查询生成按年、月、商店和产品分类的交易总和。总和是按月生成的。


    使用该 `CTE` 的查询需要按年生成按月的总和滚动总计。为此，使用了带有 `OVER()` 子句的 `SUM()` 函数，该子句包含按商店编号和交易年的分区，并包含一个按交易月的
    `ORDER BY` 子句。


    相同的 `OVER()` 子句用于 `ROW_NUMBER()` 函数以生成条目编号。这里使用了三次，以便我们可以观察如果修改 `PARTITION BY`
    子句，使其反映月份、季度和年份时，其行为会如何变化。


    让我们检查一下结果。请参阅图 4-11。


    ![](img/527021_1_En_4_Fig11_HTML.png)


    一个窗口的截图，展示了一个选项卡，其中包含一行代码和一个 9 列 27 行的表格。该表格显示了按月计算的滚动总销售额。第 12 行和第 13 行被高亮显示。


    图 4-11

    按月计算的滚动总销售额


    该报表在计算按月累计总计方面效果足够好。注意新年伊始或商店变更的位置。滚动总计会重置，条目编号级别也会重置。根据 `PARTITION BY` 子句的定义方式，我们可以按月、季度或年生成行号：


    ```sql

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear

    ORDER BY spa.TransMonth

    ) AS EntryNoByMonth

    ,ROW_NUMBER() OVER(

    PARTITION BY spa.StoreNo,spa.TransYear,TransQtr

    ORDER BY spa.TransMonth

    ) AS EntryNoByQtr

    ,ROW_NUMBER() OVER(

    ORDER BY spa.TransYear,spa.StoreNo

    ) AS EntryNoByYear

    ```


    `ROW_NUMBER()` 函数的这种组合使用方式让你了解了它的工作原理。通常，你可以为整个结果集或为分区生成行号。但是，你不能包含 `ROWS` 或 `RANGE`
    子句。想一想，这是有道理的。它必须在完整的分区或结果集上运行！


    让我们看看使用此函数时的性能影响。'
- fmt: '### Performance Considerations


    This time I will show most of the estimated query plan; it is a long one. I need
    to split the execution plan into two screenshots. We will start from right to
    left as usual. The first screenshot in Figure 4-12 shows the first (right-hand
    side) half of the plan.


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig12_HTML.png)


    *A screenshot of a window presents a tab with 3 lines of code in the upper panel
    and a flow diagram of the estimated index plan for query 1 in the lower panel.
    2 sections of the flow diagram are highlighted.*


    **Figure 4-12**

    Estimated index plan for rolling monthly sales analysis


    An index seek appears as the first step with a cost of 16% of the total estimated
    execution time. Ignoring the low-cost steps, a sort step clocks in at 30%. Next,
    since we are linking (with a `JOIN`) the `SalesTransaction` table to the `Product`
    table, a table scan step appears at a cost of 5%. Not too expensive as this is
    a small table, so no index is needed. A nested loops join task joins both streams
    of data. Following is a sort step at 22% and finally a window spool at 1%.


    We always want to pay attention to spool tasks as this is an indicator that cached
    data is spooled so it can be repeatedly accessed. Depending on the type of spool
    tasks (table, index, lazy, eager), temporary storage is used, and then things
    could get really expensive in terms of execution time (having `TEMPDB` on a solid-state
    drive helps …).


    Research Microsoft documentation to see which spool tasks are physical (`TEMPDB`),
    logical (memory cache), or both. Here is Table 4-4 with selected tasks that identifies
    if they are logical or physical or both.


    **Table 4-4**

    Logical and Physical Plan Tasks


    | Task | Physical | logical |

    | --- | --- | --- |

    | Sort | X | X |

    | Eager spool | | X |

    | Lazy spool | | X |

    | Spool | X | |

    | Table spool | | X |

    | Window spool | X | X |

    | Table scan | X | X |

    | Index scan | X | X |

    | Index seek | X | X |

    | Index spool | | X |


    Lastly, physical tasks are tasks that go against physical disk, and logical tasks
    are tasks that go against memory cache. As can be seen in the preceding table,
    some tasks can be both depending on the query. Keep this information in mind together
    with the `IO` and `TIME` statistics when you are analyzing performance.


    **Note**

    I have seen inexpensive solid-state USB drives at around $90 for those of you
    that want to experiment and have some cash lying around. Install SQL Server 2022
    and make sure `TEMPDB` is created on the solid-state drive. Thinking of getting
    one myself for Christmas!


    ### Left-Hand Side of the Plan


    Let’s look at the left-hand side of the estimated execution plan. Please refer
    to Figure 4-13.


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig13_HTML.png)


    *A screenshot of a window presents a tab with 3 lines of code in the upper panel
    and a flow diagram of the left-hand side of the estimated execution plan of query
    1 in the lower panel. The task window spool is highlighted. An arrow points to
    the cost at 22%.*


    **Figure 4-13**

    Left-hand side of the plan


    There’s the sort step that costs 22% as a point of reference from the prior screenshot.
    All we see here is the window spool step we just discussed. This appears because
    we are using window functions. A 1% cost is a nice low value, so we do not need
    to worry about it. Or do we?


    If logical reads are not zero and the window spool tasks are greater than zero,
    then the window spool is not using memory.


    ### Query IO and Time Statistics


    Here come our statistics. Please refer to Table 4-5.


    **Table 4-5**

    Query IO and Time Statistics


    | SQL Server Parse and Compile Times | Existing Index |

    | --- | --- |

    | CPU time (ms) | 15 |

    | Elapsed time (ms) | 70 |

    | **Statistics (Work Table)** | **Existing Index** |

    | Scan count | 52 |

    | Logical reads | 289 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **Statistics (SalesTransaction)** | **Existing Index** |

    | Scan count | 2 |

    | Logical reads | 28 |

    | Physical reads | 1 |

    | Read-ahead reads | 21 |

    | **Statistics (Product)** | **Existing Index** |

    | Scan count | 1 |

    | Logical reads | 1 |

    | Physical reads | 1 |

    | Read-ahead reads | 0 |

    | **SQL Server Execution Times** | **Existing Index** |

    | CPU time (ms) | 0 |

    | Elapsed time (ms) | 44 |


    The only high cost is the logical reads on the work table, but remember, logical
    reads go against cache in memory (i.e., if you have enough), so this is not a
    value that should cause concern.


    The rest of the values are low, and the estimated query plan analyzer did not
    suggest a new index, so the query works well. Recall our window spool task. It
    is not zero, so that means it is performing spooling to `TEMPDB` on physical disk.


    All this information is great, but what does it all mean? How can we use this
    information to improve performance?


    ### Indexing Strategy


    The rule of thumb is to create indexes based on the columns in the `PARTITION
    BY` clause and then the `ORDER BY` clause. In this prior example, we had the following
    columns in the `PARTITION BY` clause: `StoreNo`, `TransYear`, `TransQtr`. And
    the `ORDER BY` clause used the `TransMonth` column.


    Okay, but we have a poser for you. The date columns were all generated in the
    `CTE` by using the `YEAR()`, `MONTH()`, and `DATEPART()` functions. These used
    the `CalendarDate` column from the `SalesTransaction` table. These are all derived
    columns, so our index would need to be based on the `StoreNo` column and the `CalendarDate`
    column. Would a `JOIN` to the Calendar dimension table be more effective so we
    can pull out these date parts? Would this strategy be more efficient than deriving
    them with the date functions? Try it out!


    ### Examining the Index Seek Task


    Let’s see what our index seek task is doing in the estimated query plan. Please
    refer to Figure 4-14.


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig14_HTML.png)


    *A screenshot of a window. A dialog box in the right corner overlaps the window.
    It has a header, index seek, non-clustered with details listed. Some of the details
    include physical and logical operation, storage, node I D, predicate, object,
    output list, and seek predicates.*


    **Figure 4-14**

    Index seek details


    By placing the mouse pointer over any task, a nice yellow pop-up panel appears
    with all the details. This is a lot of information and might be hard to read,
    but let me highlight the columns identified in two of the four sections:


    **Predicate** uses column `CalendarDate` belonging to the `SalesTransaction` table.


    **Seek Predicates** uses seek keys `ProductNo` and `StoreNo` belonging to the
    `SalesTransaction` table.


    So this indicates that we need to look at not only the columns in the `PARTITION
    BY` and `ORDER BY` clauses of the `OVER()` clause but also the columns in the
    `WHERE` clause, specifically in the `WHERE` clause `PREDICATES`.


    The index used in this query is called `ieProductStoreSales`. It is based on the
    columns `ProductNo` and `StoreNo`, and the `INCLUDE` columns are `CalendarDate`
    and `TransactionQuantity`.


    **Reminder**

    `INCLUDE` columns are columns you include in the `CREATE INDEX` command by using
    the `INCLUDE` keyword. The prefix “ie” in the name stands for inversion entry
    index. This means that we are presenting the user with a non-unique access path
    to the data. If you see “pk,” it means primary key; “ak” means alternate key,
    which is an alternate to the primary key; and “fk” stands for foreign key. I think
    it is good practice to include these prefixes in the index name.'
