    \ we move to our next function. (Yes, bad pun. I can see the technical reviewer\
    \ rolling her eyes!)\n\n### LAG( ) Function\n\nRecall what the `LAG()` function\
    \ does:\nThis function is used to retrieve the previous value of a column relative\
    \ to the current row column value (usually within a time dimension), in our case\
    \ inventory movement dates.\nThis query can help answer questions like\nHow does\
    \ the current month compare to the prior month or prior quarter or prior year?\n\
    This is a counterpart of the `LEAD()` function, which we will look at next. Here\
