- fmt: '# Performance Considerations


    The following is our estimated query plan. It is divided into five parts (with
    some overlap for points of reference). We will see that the patterns will repeat
    themselves for each instance of the `PERCENTILE_CONT()` function in the `SELECT`
    clause. We will discuss the first one and briefly glance at the remaining sections
    of the estimated execution plan.


    **Note**


    If you keep using these functions, you will start to know what to expect as far
    as query plans and `IO` and `TIME` statistics and what to do in order to enhance
    performance. That’s my opinion anyway.


    Starting from the right side to the left side, we examine the first section.


    Please refer to Figure [13-31](#527021_1_En_13_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig31_HTML.png)


    A screenshot of the S Q L S S M S window. It presents part 1 of the baseline estimated
    query execution plan with 12 components. The components are sequence project,
    segment, nested loops, table spool, segment, sort, index seek, nested loops, compute
    scalar, stream aggregate, table spool, and table spool.


    **Figure 13-31**


    Baseline estimated query plan – part 1


    This is a familiar pattern. We see three branches merging via a nested loops join
    (cost 1%). The index seek task all the way to the right side of the plan comes
    in at 21% followed by an expensive sort. The remaining tasks are all at 0% cost.
    Let’s move to the second part of the plan.


    ## Baseline estimated query plan – part 2


    Please refer to Figure [13-32](#527021_1_En_13_Chapter.xhtml#Fig32) for the next
    section.


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig32_HTML.png)


    A screenshot of the S Q L S S M S window. It presents part 2 of the baseline estimated
    query execution plan with 11 components. The components are nested loops, table
    spool, segment, 3 compute scalar, sequence project, nested loops, stream aggregate,
    table spool, and table spool.


    **Figure 13-32**


    Baseline estimated query plan – part 2


    Once again, three branches merge (the data flows) into one via the nested loops
    join (1% cost). All the tasks are 0%, which leads us to believe that performance-intensive
    processing was accomplished in the prior section and that all the data we need
    is in memory.


    ## Baseline estimated query plan – part 3


    Let’s see if this is true. Please refer to Figure [13-33](#527021_1_En_13_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig33_HTML.png)


    A screenshot of the S Q L S S M S window. It presents part 3 of the baseline estimated
    query execution plan with 11 components. The components are nested loops, table
    spool, segment, 3 compute scalar, nested loops, nested loops, stream aggregate,
    table spool, and table spool.


    **Figure 13-33**


    Baseline estimated query plan – part 3


    Same pattern. Looks like my prior assumption is correct. All the tasks have 0
    costs. Remember, these patterns are basically for each execution of the `PERCENTILE_CONT()`
    function, but might as well show them all.


    ## Baseline estimated query plan – part 4


    Next section. Please refer to Figure [13-34](#527021_1_En_13_Chapter.xhtml#Fig34).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig34_HTML.png)


    A screenshot of the S Q L S S M S window. It presents part 4 of the baseline estimated
    query execution plan with 11 components. The components are nested loops, table
    spool, segment, 3 compute scalar, nested loops, nested loops, stream aggregate,
    table spool, and table spool.


    **Figure 13-34**


    Baseline estimated query plan – part 4


    More of the same. I think we can assume that picking an optimization strategy
    like replacing the `CASE` block with an extra `JOIN` to the Calendar table (so
    we can retrieve the date parts from the enhanced Calendar table) might help, maybe.
    We will see!


    Subsequent executions of the base query, like from an `SSRS` report by multiple
    users, will deliver adequate if not great performance.


    ## Baseline estimated query plan – part 5


    Please refer to Figure [13-35](#527021_1_En_13_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig35_HTML.png)


    A screenshot of the S Q L S S M S window. It presents part 5 of the baseline estimated
    query execution plan with 12 components. The components are select, 2 compute
    scalar, nested loops, table spool, segment, compute scalar, compute scalar, nested
    loops, stream aggregate, table spool, and table spool.


    **Figure 13-35**


    Baseline estimated query plan – part 5


    Last but not least, one final nested loops join task at a cost of 0% (we are not
    worrying about the 0% costs).


    **Tip**


    To get a feel of the data flow volumes between tasks, run a live execution plan.
    Click the icon in the menu bar below and to the right of the icon that has a small
    scissor and then run the query.


    Conclusion: All the performance tuning needs to be concentrated on the very first
    right-hand section of the plan we looked at first.


    Here are some choices:


    *   Modify the query so it uses the Calendar table.

    *   Possibly place the Calendar table in memory. That is, make it a memory-optimized
    table.

    *   Some might even go as far as packing the text month and quarter names into
    the Warehouse table.


    ## IO and TIME statistics


    Let’s take a look at the `IO` and `TIME` statistics.


    Please refer to Figure [13-36](#527021_1_En_13_Chapter.xhtml#Fig36).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig36_HTML.png)


    A screenshot of the S Q L S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 15 and 92 milliseconds.
    The S Q L server execution times for C P U and elapsed are 0 and 18 milliseconds.
    12 rows of 2 tables are affected.


    **Figure 13-36**


    `IO` and `TIME` statistics for `PERCENTILE_CONT`


    SQL Server execution time came in at 18 ms. The work table has 12 scans and 116
    logical reads. The Warehouse table also has 1 scan, 3 logical reads, and 2 physical
    reads.


    Recall this recommendation for performance tuning: At a minimum, create indexes
    that cover the columns referenced in the `OVER()` clause, specifically in the
    `PARTITION BY` clause and the `ORDER BY` clause. Also include columns referenced
    in the `WHERE` clause. Your index can then cover these columns.


    **Note**


    By the way, calculating `PERCENTILE_CONT(.50)` generates the median value. Use
    this in a query with the `AVERAGE()` function, which generates the MEAN value,
    and compare them. TSQL does not have a MEDIAN function, but you can create your
    own.


    **Tip**


    Look up the `MERGE` command, which can be used when loading data. It allows you
    to `INSERT`, `UPDATE`, or `DELETE` new or modified rows. This avoids loading large
    tables over and over again, which would defeat the purpose of performance tuning.
    Try adding this to the `INSERT/SELECT` command that loads the report table. Add
    a few hundred rows to the table you are retrieving rows from and see how the modified
    `INSERT/SELECT` works when you include the `MERGE` command.'
