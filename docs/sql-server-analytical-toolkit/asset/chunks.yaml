  trans: '

    ## PERCENTILE_DISC() 函数


    这里是我们关于离散百分位的示例。`PERCENTILE_DISC()` 函数在基于指定百分位的一组离散数据上进行计算，并返回数据集中满足该百分位要求的值。


    还记得离散数据吗？


    离散数据的值是那些可以随时间计数的数字。同样需要记住的是，使用此函数时，返回的值是存在于数据集中的；它不像 `PERCENTILE_CONT()` 函数那样进行插值计算。


    我们的分析师为下一份报告提交了以下业务需求：


    这次我们需要计算按月份汇总的设备故障总和的离散百分位值。也就是说，我们每月累加故障次数，然后生成第 25、50 和 75 个百分位的离散值。结果需要按工厂名称、工厂内位置、年份、季度和月份分组。


    结果需要针对 2008 年。这次我们将回归使用我们可靠的基于 `CTE` 的查询。


    请参考代码清单 10-11。


    ```sql

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, [MonthName], CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName]

    ,CalendarMonth,SumEquipFailures

    -- 来自列表的实际值

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .75]

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2008

    GO

    ```


    代码清单 10-11

    按月设备故障的离散百分位分析


    再次注意，我们同时使用了事实表和维度表，因此可以看到多个 `JOIN` 子句。对于每一个百分位计算，分区是按工厂、位置和年份设置的。`ORDER BY` 子句在对
    `PERCENTILE_DISC()` 函数的三次调用中都引用了 `SumEquipFailures` 列（记住，这次返回的值应该存在于数据集中）。


    请参考图 10-24 中的部分结果。


    ![](img/527021_1_En_10_Fig32_HTML.png)


    图 10-24

    工厂设备故障的离散百分位分析


    这是一张 SQL Server Management Studio (SSMS) 窗口的截图，其中显示了一个包含 11 列、72 行的表格。列标题为：工厂名称、位置名称、日历年、季度名称、月份名称、日历月、设备故障总和、以及第
    0.25、0.50 和 0.75 个百分位。第 1 到 3 行和第 5 到 10 行的故障数据被高亮显示。


    是的，返回的值确实存在，并且我们看到有一些重复值（ties），这完全正常，因为不同设备在同一月份的故障总数有可能相同。可能是不同的设备，但它们的故障数可以相同也可以不同。


    ### 性能考虑


    让我们看看在性能方面，离散百分位函数与连续百分位函数的工作方式有何异同。我们来生成通常的基线估计查询计划，并将其分解成几部分，因为它会是一个大计划。


    请参考图 10-25a。


    ![](img/527021_1_En_10_Fig33_HTML.png)


    图 10-25a

    基线估计查询计划，第 1 部分


    这是 SQL Server Management Studio (SSMS) 窗口的截图。它展示了基线估计查询计划的第 1 部分，包含 11 个组件。组件包括：排序、哈希匹配
    (9%)、表扫描、哈希匹配、表扫描、哈希匹配 (8%)、表扫描、哈希匹配 (17%)、计算标量、聚集索引扫描 (8%) 和表扫描 (10%)。


    那个成本为 10% 的表扫描任务看起来很熟悉，那些成本为 1% 的维度表表扫描也是如此。有件事我忘了提，我们使用了一个名为 `CalendarView` 的视图
    (`VIEW`) 来获取日期信息。


    这点需要审视一下。我们使用这个 `VIEW` 是因为它包含月份、季度等的文本名称。本质上，一个 `VIEW` 等价于执行一个查询，在这个例子中是 `VIEW`
    所基于的基础查询。使用这种做法成本有点高，因此我们希望用一个更详细、包含所有文本值的日历维度表来替换这个 `VIEW`。我们还希望在新的日历表上创建一两个索引（这将是本节末尾的作业，请思考一下）。


    右下角的聚集索引扫描成本为 8%。沿着下部分支向上看，我们看到哈希匹配联接的成本分别为 17%、8% 和 8%，最后的哈希匹配联接成本为 9%。


    最后，我们看到左侧有一个成本为 10% 的排序任务，以及一个成本为 0% 的表假脱机（延迟假脱机）任务。我认为，对于这种模式的性能规划，最终结论是要么将行数为
    100 或更少的小维度表放入内存优化表中，要么将其放在非常高速的固态硬盘上。至少，`TEMPDB` 应该始终放在固态硬盘上。


    现有的维度表太小，无法从索引中获益，正如我们所看到的，查询计划工具也没有推荐任何索引。让我们导航到计划左侧，查看下一部分。


    请参考图 10-25b。


