  trans: '

    # 清单 8-8：检查设备状态


    ```sql

    SELECT CV.CalendarDate

    ,E.EquipmentId

    ,E.EquipAbbrev

    ,EOLSC.EquipOnlineStatusCode

    ,EOLSC.EquipOnlineStatusDesc

    FROM APPlant.FactTable.EquipmentStatusHistory ESH

    JOIN DimTable.Equipment E

    ON ESH.EquipmentKey = E.EquipmentKey

    JOIN DimTable.EquipOnlineStatusCode EOLSC

    ON ESH.EquipOnlineStatusKey = EOLSC.EquipOnlineStatusKey

    JOIN DimTable.CalendarView CV

    ON ESH.CalendarKey = CV.CalendarKey

    WHERE E.EquipmentId = ''P3L4MOT1''

    AND CV.CalendarDate IN(''2002-04-02'',''2002-04-11'',''2002-04-30'')

    GO

    ```


    这个查询用于检查我们需要查看的三个日期上分配的状态代码。查询中有三个 `JOIN` 操作符，这意味着需要连接四张表。关键表名为 `EquipmentStatusHistory`（设备状态历史表），它包含日期和状态代码。此表与
    `EquipOnlineStatusCode`（设备在线状态代码表）连接以检索代码的描述。

    我们添加了一个 `WHERE` 子句来筛选所需的设备 ID 和日期。让我们查看结果。


    请参考图 8-14。


    ![](img/527021_1_En_8_Fig14_HTML.jpg)


    ### 图 8-14：按日显示的设备故障状态


    一张 ch08 queries V 2 dot sql 窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕展示了结果表。该表包含 5 列：日历日期、设备 ID、设备缩写、设备在线状态代码和设备状态描述。


    哇，快看！结果中的状态全是“在线 - 正常运行”。

    这带来了一个问题。看起来在这三天里，这台电机都处于在线状态。幸运的是，我们还有按小时统计的那些日期的状态历史表（更低层级的粒度）。也许在这些日期的某些小时里发生过其他事件。

    让我们执行清单 8-9 中的查询，分别针对这三天。


    # 清单 8-9：按小时统计的设备故障


    ```sql

    SELECT ESBH.StatusDate

    ,ESBH.EquipmentId

    ,E.EquipAbbrev

    ,M.MotorName

    ,M.Rpm

    ,M.Voltage

    ,ESBH.StatusHour

    ,ESBH.EquipOnlineStatusCode

    ,EOLSC.EquipOnlineStatusDesc

    FROM Reports.EquipmentStatusHistoryByHour ESBH

    JOIN DimTable.Equipment E

    ON ESBH.EquipmentId = E.EquipmentId

    JOIN DimTable.Motor M

    ON E.EquipmentId = M.EquipmentId

    JOIN DimTable.EquipOnlineStatusCode EOLSC

    ON ESBH.EquipOnlineStatusCode = EOLSC.EquipOnlineStatusCode

    WHERE ESBH.EquipmentId = ''P3L4MOT1''

    AND StatusDate = ''2002-04-02''

    GO

    ```


    这个查询引用了名为 `Reports.EquipmentStatusHistoryByHour`（按小时设备状态历史报告表）的报告表，该表包含 24 小时期间内按小时统计的设备状态。为了获取与设备、设备状态代码和描述相关的一些详细信息，需要在多个表之间进行大量连接。

    没什么花哨的，只是使用连接和筛选器的老式 `TSQL` 代码。没有聚合窗口函数和 `OVER()` 子句。

    执行此查询会生成我们正在检查的第一个日期的结果。


    请参考图 8-15。


    ![](img/527021_1_En_8_Fig15_HTML.png)


    ### 图 8-15：2002 年 4 月 2 日的设备故障


    一张 ch08 queries V 2 dot sql 窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕展示了结果表。该表包含 9 列。“设备在线状态描述”列的某些值被高亮显示。


    这是 2002 年 4 月 2 日 24 小时的结果。是的，确实，我们有三次故障。这与我们之前查询的结果相符。还要注意，故障开始发生时，在 12 点和 13
    点有一个维护时段。工作人员试图让电机上线，但失败了。

    在 15 点和 16 点进行了更多维护，然后在 18 点正常运行一小时后又发生了一次故障。20 点再次发生故障，随后在 21 点进行了一个小时的维护。之后电机运行正常，所以看起来他们在三次维护后终于解决了问题（如果我们有数据能显示分配给这些故障事件的维护人员姓名，那就很有意思了），直到
    4 月 11 日为止。让我们看看那天发生了什么。

    修改 `WHERE` 子句以筛选 2002 年 4 月 11 日后执行此查询，得到图 8-16 中的结果。


    ![](img/527021_1_En_8_Fig16_HTML.png)


    ### 图 8-16：2002 年 4 月 11 日的设备故障


    一张 ch08 queries V 2 dot sql 窗口的截图。顶部屏幕显示了一些编程代码。底部屏幕展示了结果表。该表包含 9 列。“设备在线状态描述”列的某些值被高亮显示。


    这次我们看到了四次故障。前两次发生在 7 点和 8 点。随后在 9 点进行了一个小时的维护尝试修复，然后在 10 点有一个小时的正常运行。11 点和 12
    点又发生了两次故障，13 点又进行了一个小时的维护，看起来他们在那里终于解决了问题。

    所以看起来需要与供应商开个会，了解一下为什么在这些日期维护进行得不顺利（同时也需要和维护团队沟通）。

    我们为什么要经历所有这些查询？

    我试图说明使用带有 `OVER()` 子句的聚合函数如何帮助发现有趣的模式和异常，这些可能暗示着问题。在这个案例中，我们识别出某些日期的许多故障，并使用更低粒度的查询深入分析故障，直到发现供应商的维护团队是问题所在。

    是的，我确实设定了这个场景，但目标是识别用于识别问题并找出根本原因的方法和工具！

    最后一个提示：用于插入分阶段每小时状态的 `TSQL` 批处理代码可以在本章脚本的开头找到，以防你尚未执行它。


    **注意**

    有时，你的分析工具就是老式的、较低层级的查询，用于深入到最低的粒度级别。聚合函数只是你工具包中的一部分工具。关键在于识别模式和异常，并执行一些深入分析以发现根本原因。

    '
- fmt: '# GROUPING()函数


    接下来，让我们通过`GROUPING()`函数创建一些汇总。虽然不如Excel数据透视表那样美观易读，但如果你热衷于挑战，它也是可用的工具！


    与往常一样，我们需要从业务需求规范开始。我们的分析师提供了以下需求：


    > 我需要一份报告显示所有级别的故障汇总，即按设备、工厂、位置、年份、季度和月份。最初这只是针对2002年的数据，但查询的编写方式应便于修改为包含所有年份或仅一个产品。报告需要排序，使所有`NULL`值都浮到顶部，以便汇总易于阅读；否则，它们会分散在整个报告中，导致无法辨识汇总内容。

    >

    > 此外，请创建一个能够提供底层数据的查询，并将查询结果复制粘贴到带有数据透视表的Microsoft Excel电子表格中，以便验证结果。


    哇，这次有两个规范：一个用于报告，一个用于测试和验证查询报告的电子表格。清单8-10是我们提供给分析师的代码。


    ```

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,EquipmentId

    ,SumEquipmentFailure

    ,SUM(SumEquipmentFailure) AS FailedEquipmentRollup

    ,GROUPING(SumEquipmentFailure) AS GroupingLevels

    FROM [Reports].[EquipmentFailureStatistics]

    WHERE CalendarYear = 2002

    GROUP BY

    PlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth,

    EquipmentId,SumEquipmentFailure WITH ROLLUP

    ORDER BY PlantName,LocationName,CalendarYear,QuarterName,

    CalendarMonth,EquipmentId ASC,

    (

    CASE

    WHEN SumEquipmentFailure IS NULL THEN 0

    END

    ) DESC,

    GROUPING(SumEquipmentFailure) DESC

    GO

    ```

    清单 8-10

    设备故障汇总


    `SUM()`聚合函数与`SELECT`子句中的`GROUPING()`函数一起使用。`GROUP BY`子句在末尾声明了`WITH ROLLUP`，以便在所有必需的级别生成小计。最后，`ORDER
    BY`子句包含一个`CASE`块，用于测试`SumEquipmentFailure`列的值。如果它是`NULL`，则将其替换为0，并按`CASE`块生成的结果值降序排列。这确实是个不错的技巧。


    结果将告诉我们这个技巧是否奏效。请参考图8-17中的部分结果。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig17_HTML.png)


    图 8-17


    带汇总的故障总计


    它汇总了吗？如果你看那些波浪线，我们可以看到以下结果：22 = 8 + 2 + 12！所以它确实有效。但这很难阅读和理解。想象一下如果我们需要报告多于一个设备的情况，我们可能会很快迷失。


    我取刚刚讨论的查询，移除了`SUM()`和`GROUPING()`函数；同时移除了`GROUP BY`子句和`ORDER BY`子句中的`CASE`块，以得到一个生成原始数据的查询。


    我将查询结果复制粘贴到Microsoft Excel电子表格中，然后创建了一个数据透视表。这可以在图8-18中看到。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig18_HTML.png)


    图 8-18


    设备故障汇总数据透视表报告


    这就好多了。你可以拖放需要的列来生成汇总，并可以折叠或展开各个级别。我认为这个选项比`GROUPING()`函数要好用得多，但至少你有两个工具可用于生成汇总：T-SQL和Excel。


    > **注意**

    > 对于非常大的数据量，你可以将它们加载到SSAS多维数据集，并通过Excel或连接到使用SSAS创建的多维数据集的第三方Web工具来执行多维数据分析。


    为这个电子表格生成底层结果的代码位于本章的T-SQL脚本中，在`GROUPING()`函数示例之后。请参考清单8-11。


    ```

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,EquipmentId

    ,SumEquipmentFailure

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear = 2002

    ORDER BY PlantName,LocationName,CalendarYear,QuarterName,

    CalendarMonth,EquipmentId ASC

    GO

    ```

    清单 8-11

    用于Microsoft Excel的数据透视表查询


    接下来，我们将聚合一些字符串来生成工厂信息流。'
  raw: '### GROUPING( ) Function


    Next, let’s create some rollups via the `GROUPING()` function. Not as pretty and
    easy to read as Excel pivot tables, but it is available to you if you are a glutton
    for punishment!


    As usual, we need to start off with a business requirements specification. Our
    friendly analyst supplies the following requirements:


    I need a report showing summary rollups for failures at all levels, that is, by
    equipment, plant, location, year, quarter, and month. Initially this is for the
    year 2002 only, but the query should be written in such a manner as to be easily
    modified to include all years or just one product. The report needs to sort so
    that all `NULL` values float to the top, so the rollups are easy to read; otherwise,
    they are all over the report, and figuring out what the rollups are becomes impossible.


    Additionally, create a query that will deliver the low-level data and copy and
    paste the results of the query in a Microsoft Excel spreadsheet with a pivot table
    so the results can be validated.


    Wow, two specifications this time: one for the report and one for a spreadsheet
    to test and validate the query report. Listing [8-10](#527021_1_En_8_Chapter.xhtml#PC11)
    is the code we delivered to the analyst.


    ```

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,EquipmentId

    ,SumEquipmentFailure

    ,SUM(SumEquipmentFailure) AS FailedEquipmentRollup

    ,GROUPING(SumEquipmentFailure) AS GroupingLevels

    FROM [Reports].[EquipmentFailureStatistics]

    WHERE CalendarYear = 2002

    GROUP BY

    PlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth,

    EquipmentId,SumEquipmentFailure WITH ROLLUP

    ORDER BY PlantName,LocationName,CalendarYear,QuarterName,

    CalendarMonth,EquipmentId ASC,

    (

    CASE

    WHEN SumEquipmentFailure IS NULL THEN 0

    END

    ) DESC,

    GROUPING(SumEquipmentFailure) DESC

    GO

    Listing 8-10

    Equipment Failure Summary Rollups

    ```


    The `SUM()` aggregate function is used together with the `GROUPING()` function
    in the `SELECT` clause. The `GROUP BY` clause declares `WITH ROLLUP` at the end
    so we can generate subtotals at all the required levels. Lastly, the `ORDER BY`
    clause has a `CASE` block that tests the value of the `SumEquipmentFailure` column.
    If it is `NULL`, it replaces it with 0 and sorts the resulting values generated
    by the `CASE` block in descending order. Pretty nice trick if I say so myself.


    The results will tell us if the trick worked. Please refer to the partial results
    in Figure [8-17](#527021_1_En_8_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig17_HTML.png)


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 10 columns.
    Some values of the Failed Equipment roll-up column are highlighted.


    Figure 8-17


    Failure totals with rollups


    Does it roll up? If you look at the squiggly lines, we can see the following result:
    22 = 8 + 2+ 12! So it does work. But this is hard to read and understand. Imagine
    if we had more than one equipment to report on. We can get lost quickly.


    I took the query we just discussed and removed the `SUM()` and `GROUPING()` functions;
    plus I removed the `GROUP BY` clause and the `CASE` block in the `ORDER BY` clause
    in order to have a query that would generate the raw data.


    I copied and pasted the results of the query into a Microsoft Excel spreadsheet
    and then created a pivot table. This can be seen in Figure [8-18](#527021_1_En_8_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig18_HTML.png)


    A screenshot of a Microsoft Excel. The left panel presents a table that has 3
    columns for row labels, the sum of year, and the sum of failures. The right screen
    has a pivot table fields panel.


    Figure 8-18


    Equipment failure summary pivot table report


    This is a lot better. You can drag and drop the columns you need to generate the
    rollups and can collapse or expand the levels. I think this option works a lot
    better than the `GROUPING()` function, but at least you have two tools you can
    use to generate rollups, TSQL and Excel.


    Note


    For very large volumes of data, you can load them into SSAS cubes and perform
    multidimensional data by connecting to the cubes with Excel or third-party web
    tools that connect to multidimensional cubes created with SSAS (SQL Server Analysis
    Services).


    The code that generated the low-level results for this spreadsheet is in the TSQL
    script for this chapter after the `GROUPING()` function example. Please refer
    to Listing [8-11](#527021_1_En_8_Chapter.xhtml#PC12).


    ```

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,EquipmentId

    ,SumEquipmentFailure

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear = 2002

    ORDER BY PlantName,LocationName,CalendarYear,QuarterName,

    CalendarMonth,EquipmentId ASC

    GO

    Listing 8-11

    Pivot Table Query for Microsoft Excel

    ```


    Next, we aggregate some strings to generate plant information streams.'
