- fmt: '# 6. Finance Use Case: Ranking Functions


    ## Even More Statistical Variance


    Let’s try one more example. Let’s go back and look at some ticker symbol performance.
    Let’s use a couple of aggregate functions to take a snapshot of the `GOITGUY`
    ticker symbol again. This time we want to look at the price swings over a 24-hour
    period for January 5, 2015, and generate the total average, the standard deviation
    for the entire population of the data, and also the variance for the entire population
    of the data (assume the stock trades 24 by 7 around the world).


    Please refer to Listing [5-21](#527021_1_En_5_Chapter.xhtml#PC50).


    ```sql

    SELECT [Ticker]

    ,[Company]

    ,[TickerDate]

    ,[QuoteHour]

    ,[Quote]

    ,AVG(Quote) OVER(

    ) AS AvgQuote

    ,STDEVP(Quote) OVER(

    ) AS TickerSTDEVP

    ,VARP(Quote) OVER(

    ) AS TickerVARP

    FROM [APFinance].[MasterData].[TickerHistory]

    WHERE TickerDate = ''2015-01-05''

    GO

    Listing 5-21

    More Nice Bell Curves

    ```


    Very simple query this time. Since we are only looking at 24 hours’ worth of data,
    the `OVER()` clause for all functions is empty, no `PARTITION BY` or `ORDER BY`
    clauses.


    Pop Quiz


    What is the default window frame behavior when no `PARTITION BY` or `ORDER BY`
    clause is used in the `OVER()` clause?


    Executing the query produces the output in Figure [5-50](#527021_1_En_5_Chapter.xhtml#Fig59),
    which we use to populate an Excel spreadsheet so we can create our usual masterpiece
    graphs!


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig59_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. It presents 2 line graphs of strike
    price versus hour. The left graph presents the varying quote and linear quote.
    The right graph presents the varying `N DIST` and linear `N DIST`.


    Figure 5-50


    More nice bell curves


    Very nice. We have two graphs. One shows the 24-hour price swings of the stock,
    which is trending up for that day, so that is a good thing. The other shows the
    bell curve or should I say bell curves created by using the normal distribution
    values for the 24-hour prices.


    We can see that sometimes we need to use our aggregate window functions and sometimes
    we use plain queries. Together we can generate valuable reports and queries that
    show us the performance of a financial portfolio and also individual stocks or
    other types of financial instruments.


    These reports and graphs provide the financial advisor with the tools they need
    to not only analyze past historical performance but to also forecast future performance.
    All that is missing from our discussion are the events that occurred during the
    ups and downs of stock prices, like did companies introduce a new product to market
    or did companies have issues with some of their products or was the economy facing
    an upturn or downturn. If current news and indicators tell us these events are
    about to occur again, we can take a good guess as to whether to sell, buy, or
    stay put!


    Lots of factors to managing a financial portfolio, but with the right tools, decisions
    can be made to avoid severe loss and maybe make a couple of dollars!


    Sadly, my strategy always seems to be buy high and sell low!


    ## Summary


    We accomplished a lot in this chapter. We went through the aggregate window functions
    as we did in Chapter [2](#527021_1_En_2_Chapter.xhtml) but this time with financial
    data. We also took a more detailed look at performance analysis and introduced
    some new tools like the `SET PERFORMANCE ON` command that generates detailed information
    on the steps the estimated query plan takes to produce the desired report.


    Lastly, we generated several different graphs with Microsoft Excel that used the
    data generated by our queries and gave us some interesting visual information
    and patterns that gave us insight to the performance of accounts, portfolios,
    ticker symbols, and also financial transactions.


    Next, we apply this methodology to the ranking window functions.


    ## Ranking Functions


    Ranking functions, when applied to financial data, can produce interesting and
    valuable information for analysts or portfolio managers. This information is used
    to predict future trading patterns based on historical patterns. A properly managed
    portfolio based on solid analytical data and analysis will generate profits (hopefully).


    This chapter will cover the application of the functions in this category to several
    interesting examples ranging from transaction to account, portfolio, and ticker
    performance analysis. Excel graphs will be generated, and we will dive deeper
    into performance tuning by using several of the performance tuning tools available
    with SQL Server.


    ### Ranking Functions


    The following are the four functions that belong to the ranking function category:


    *   `RANK()`

    *   `DENSE_RANK()`

    *   `NTILE()`

    *   `ROW_NUMBER()`


    We first saw these functions in Chapter [4](#527021_1_En_4_Chapter.xhtml) when
    we applied them to a sales scenario. This time we apply them to a financial database
    called `APFinance`. The approach we take will be similar to other chapters, but
    we will dive deeper into performance tuning by introducing new tools like the
    `SET PERFORMANCE STATISTIC ON` setting that generates vital statistics related
    to each step of the execution plan. Additionally we will compare estimated query
    performance plans to actual query performance plans that show real-time timing
    and row movement statistics.


    We will also generate some interesting graphs with Microsoft Excel that use the
    data generated by our scripts and queries. These, coupled with the SQL reports,
    will give us valuable insight into the trading patterns we have simulated for
    our five clients. This is called data visualization.


    The chapter concludes with some interesting applications of the `ROW_NUMBER()`
    function and other functions we covered to solve the traditional gaps and islands
    problems that appear in many analysis projects.


    ### RANK( ) Function


    Recall from Chapter [4](#527021_1_En_4_Chapter.xhtml) that the `RANK()` function
    shows the rank of the value in each row column of a data set relative to the other
    row values in the data set. In case of ties, the rank is the same for the ties,
    but the next value after the duplicate values skips the next rank and a number
    equal to the number of ties plus the current rank value is assigned. We will demonstrate
    this behavior in our first example.'
  raw: '### Even More Statistical Variance


    Let’s try one more example. Let’s go back and look at some ticker symbol performance.
    Let’s use a couple of aggregate functions to take a snapshot of the GOITGUY ticker
    symbol again. This time we want to look at the price swings over a 24-hour period
    for January 5, 2015, and generate the total average, the standard deviation for
    the entire population of the data, and also the variance for the entire population
    of the data (assume the stock trades 24 by 7 around the world).


    Please refer to Listing [5-21](#527021_1_En_5_Chapter.xhtml#PC50).


    ```

    SELECT [Ticker]

    ,[Company]

    ,[TickerDate]

    ,[QuoteHour]

    ,[Quote]

    ,AVG(Quote) OVER(

    ) AS AvgQuote

    ,STDEVP(Quote) OVER(

    ) AS TickerSTDEVP

    ,VARP(Quote) OVER(

    ) AS TickerVARP

    FROM [APFinance].[MasterData].[TickerHistory]

    WHERE TickerDate = ''2015-01-05''

    GO

    Listing 5-21

    More Nice Bell Curves

    ```


    Very simple query this time. Since we are only looking at 24 hours’ worth of data,
    the `OVER()` clause for all functions is empty, no `PARTITION BY` or `ORDER BY`
    clauses.


    Pop Quiz


    What is the default window frame behavior when no `PARTITION BY` or `ORDER BY`
    clause is used in the `OVER()` clause?


    Executing the query produces the output in Figure [5-50](#527021_1_En_5_Chapter.xhtml#Fig59),
    which we use to populate an Excel spreadsheet so we can create our usual masterpiece
    graphs!


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig59_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. It presents 2 line graphs of strike
    price versus hour. The left graph presents the varying quote and linear quote.
    The right graph presents the varying N D I S T and linear N D I S T.


    Figure 5-50


    More nice bell curves


    Very nice. We have two graphs. One shows the 24-hour price swings of the stock,
    which is trending up for that day, so that is a good thing. The other shows the
    bell curve or should I say bell curves created by using the normal distribution
    values for the 24-hour prices.


    We can see that sometimes we need to use our aggregate window functions and sometimes
    we use plain queries. Together we can generate valuable reports and queries that
    show us the performance of a financial portfolio and also individual stocks or
    other types of financial instruments.


    These reports and graphs provide the financial advisor with the tools they need
    to not only analyze past historical performance but to also forecast future performance.
    All that is missing from our discussion are the events that occurred during the
    ups and downs of stock prices, like did companies introduce a new product to market
    or did companies have issues with some of their products or was the economy facing
    an upturn or downturn. If current news and indicators tell us these events are
    about to occur again, we can take a good guess as to whether to sell, buy, or
    stay put!


    Lots of factors to managing a financial portfolio, but with the right tools, decisions
    can be made to avoid severe loss and maybe make a couple of dollars!


    Sadly, my strategy always seems to be buy high and sell low!


    ## Summary


    We accomplished a lot in this chapter. We went through the aggregate window functions
    as we did in Chapter [2](#527021_1_En_2_Chapter.xhtml) but this time with financial
    data. We also took a more detailed look at performance analysis and introduced
    some new tools like the `SET PERFORMANCE ON` command that generates detailed information
    on the steps the estimated query plan takes to produce the desired report.


    Lastly, we generated several different graphs with Microsoft Excel that used the
    data generated by our queries and gave us some interesting visual information
    and patterns that gave us insight to the performance of accounts, portfolios,
    ticker symbols, and also financial transactions.


    Next, we apply this methodology to the ranking window functions.


    # 6. Finance Use Case: Ranking Functions


    Ranking functions, when applied to financial data, can produce interesting and
    valuable information for analysts or portfolio managers. This information is used
    to predict future trading patterns based on historical patterns. A properly managed
    portfolio based on solid analytical data and analysis will generate profits (hopefully).


    This chapter will cover the application of the functions in this category to several
    interesting examples ranging from transaction to account, portfolio, and ticker
    performance analysis. Excel graphs will be generated, and we will dive deeper
    into performance tuning by using several of the performance tuning tools available
    with SQL Server.


    ## Ranking Functions


    The following are the four functions that belong to the ranking function category:


    *   RANK()


    *   DENSE_RANK()


    *   NTILE()


    *   ROW_NUMBER()


    We first saw these functions in Chapter [4](#527021_1_En_4_Chapter.xhtml) when
    we applied them to a sales scenario. This time we apply them to a financial database
    called `APFinance`. The approach we take will be similar to other chapters, but
    we will dive deeper into performance tuning by introducing new tools like the
    `SET PERFORMANCE STATISTIC ON` setting that generates vital statistics related
    to each step of the execution plan. Additionally we will compare estimated query
    performance plans to actual query performance plans that show real-time timing
    and row movement statistics.


    We will also generate some interesting graphs with Microsoft Excel that use the
    data generated by our scripts and queries. These, coupled with the SQL reports,
    will give us valuable insight into the trading patterns we have simulated for
    our five clients. This is called data visualization.


    The chapter concludes with some interesting applications of the `ROW_NUMBER()`
    function and other functions we covered to solve the traditional gaps and islands
    problems that appear in many analysis projects.


    ### RANK( ) Function


    Recall from Chapter [4](#527021_1_En_4_Chapter.xhtml) that the `RANK()` function
    shows the rank of the value in each row column of a data set relative to the other
    row values in the data set. In case of ties, the rank is the same for the ties,
    but the next value after the duplicate values skips the next rank and a number
    equal to the number of ties plus the current rank value is assigned. We will demonstrate
    this behavior in our first example.'
  trans: '

    # 6. 金融用例：排名函数


    ## 更多的统计方差


    让我们再尝试一个例子。我们回头看看一些股票代码的表现。让我们再用几个聚合函数来获取 `GOITGUY` 股票代码的快照。这次我们想看看 2015 年 1 月
    5 日 24 小时内的价格波动，并生成总体平均值、整个数据总体的标准差以及整个数据总体的方差（假设该股票在全球范围内 7 天 24 小时交易）。


    请参见清单 5-21。


    ```sql

    SELECT [Ticker]

    ,[Company]

    ,[TickerDate]

    ,[QuoteHour]

    ,[Quote]

    ,AVG(Quote) OVER(

    ) AS AvgQuote

    ,STDEVP(Quote) OVER(

    ) AS TickerSTDEVP

    ,VARP(Quote) OVER(

    ) AS TickerVARP

    FROM [APFinance].[MasterData].[TickerHistory]

    WHERE TickerDate = ''2015-01-05''

    GO

    清单 5-21

    更多漂亮的钟形曲线

    ```


    这次查询非常简单。由于我们只查看 24 小时的数据，所有函数的 `OVER()` 子句都是空的，没有 `PARTITION BY` 或 `ORDER BY`
    子句。


    小测验


    当 `OVER()` 子句中未使用 `PARTITION BY` 或 `ORDER BY` 子句时，默认的窗口框架行为是什么？


    执行查询产生图 5-50 中的输出，我们用它来填充 Excel 电子表格，以便创建我们惯用的杰作图表！


    ![](img/527021_1_En_5_Fig59_HTML.png)


    Microsoft Excel 电子表格的截图。它展示了两幅行权价与小时的关系图。左图展示了变动报价和线性报价。右图展示了变动的 `N DIST` 和线性的
    `N DIST`。


    图 5-50


    更多漂亮的钟形曲线


    非常好。我们有两张图。一张显示了该股票 24 小时的价格波动，该日呈上升趋势，这是好事。另一张显示了钟形曲线，或者我应该说，使用 24 小时价格的正态分布值创建的钟形曲线。


    我们可以看到，有时我们需要使用聚合窗口函数，有时则使用普通查询。结合起来，我们可以生成有价值的报告和查询，展示金融投资组合以及个股或其他类型金融工具的表现。


    这些报告和图表为金融顾问提供了他们所需的工具，不仅可以分析过去的历史表现，还可以预测未来的走势。我们的讨论中唯一缺失的是股价涨跌期间发生的事件，比如公司是否向市场推出了新产品，或者公司的某些产品是否出了问题，或者经济是面临上行还是下行。如果当前新闻和指标告诉我们这些事件即将再次发生，我们就可以很好地猜测是卖出、买入还是按兵不动！


    管理金融投资组合需要考虑很多因素，但有了合适的工具，就可以做出决策以避免严重损失，甚至可能赚上几块钱！


    遗憾的是，我的策略似乎总是高买低卖！


    ## 总结


    我们在本章中完成了许多工作。我们像在第 2 章中一样，探讨了聚合窗口函数，但这次是使用金融数据。我们还更详细地研究了性能分析，并引入了一些新工具，例如 `SET
    PERFORMANCE ON` 命令，该命令会生成关于估算查询计划生成所需报告所采取步骤的详细信息。


    最后，我们使用 Microsoft Excel 生成了多张不同的图表，这些图表利用了我们的查询产生的数据，为我们提供了一些有趣的视觉信息和模式，使我们深入了解账户、投资组合、股票代码以及金融交易的表现。


    接下来，我们将此方法应用于排名窗口函数。


    ## 排名函数


    排名函数应用于金融数据时，可以为分析师或投资组合经理产生有趣且有价值的信息。这些信息用于基于历史模式预测未来的交易模式。一个基于扎实分析数据和分析的、妥善管理的投资组合将（希望如此）产生利润。


    本章将涵盖此类函数在几个有趣示例中的应用，范围涵盖从交易到账户、投资组合和股票代码的表现分析。我们将生成 Excel 图表，并通过使用 SQL Server
    提供的几种性能调优工具，更深入地研究性能调优。


    ### 排名函数


    以下是属于排名函数类别的四个函数：


    *   `RANK()`

    *   `DENSE_RANK()`

    *   `NTILE()`

    *   `ROW_NUMBER()`


    我们第一次看到这些函数是在第 4 章，当时我们将它们应用于销售场景。这次我们将它们应用于一个名为 `APFinance` 的金融数据库。我们采用的方法将与其他章节类似，但我们将通过引入新工具（如
    `SET PERFORMANCE STATISTIC ON` 设置）来更深入地研究性能调优，该设置会生成与执行计划的每个步骤相关的重要统计信息。此外，我们还将比较估算查询性能计划与实际查询性能计划，后者显示实时计时和行移动统计信息。


    我们还将使用 Microsoft Excel 生成一些有趣的图表，这些图表利用了我们的脚本和查询生成的数据。这些图表与 SQL 报告相结合，将使我们深入了解为五个客户模拟的交易模式。这被称为数据可视化。


    本章最后介绍 `ROW_NUMBER()` 函数和我们涵盖的其他函数的一些有趣应用，以解决许多分析项目中出现的传统的间隙与孤岛问题。


    ### RANK( ) 函数


    回想第 4 章，`RANK()` 函数显示数据集中每行列中的值相对于数据集中其他行值的排名。如果出现并列，则并列值的排名相同，但重复值之后的下一个值会跳过下一个排名，并分配一个等于并列数量加上当前排名值的数字。我们将在第一个示例中演示这种行为。

    '
- fmt: '#### Example 1


    Our first objective is to rank portfolio performance for our clients. Our business
    analyst has supplied a business specification for our report. It needs to show
    the total value of customer portfolios by trade year, customer identifier, portfolio
    number, and portfolio name. These results need to be ranked by year for each customer.
    The data can be 24 hours old as the only time updates occur is at night when the
    accounts are swept. This fact alone should guide us in how we structure the solutions
    (hint: `CTE` or reporting table approach).


    This report will give the analyst some insight as to how each customer is performing
    relative to the other customers.


    Please refer to Listing [6-1](#527021_1_En_6_Chapter.xhtml#PC1).


    ```

    WITH PortfolioAnalysis (

    TradeYear,CustId,PortfolioNo,Portfolio,YearlyValue

    )

    AS (

    SELECT Year AS TradeYear

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,SUM(Value) AS YearlyValue

    FROM Financial.Portfolio

    WHERE Year > 2011

    GROUP BY CustId,Year,PortfolioNo

    ,Portfolio

    )

    SELECT TradeYear

    ,CustId

    ,PortfolioNo

    ,Portfolio

    ,YearlyValue

    ,RANK() OVER(

    PARTITION BY Portfolio,TradeYear

    ORDER BY YearlyValue DESC

    ) AS PortfolioRankByYear

    FROM PortfolioAnalysis

    GO

    ```


    Listing 6-1

    Ranking Customer Cash Portfolio


    The `CTE` is used to generate results that include the total value of the portfolio
    by year, customer ID, portfolio number, and the name of the portfolio.


    The query that accesses the `CTE` uses the `RANK()` function, which is partitioned
    by portfolio number and trade year to generate the rankings.


    Please refer to the partial results in Figure [6-1](#527021_1_En_6_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig1_HTML.jpg)


    A screenshot of an application''s window titled ranking financial quarries. It
    has a task bar at the top. It has a panel for object explorer on the left. Right,
    it includes a list for trade year, customer i d, portfolio number, portfolio,
    yearly value, and portfolio rank by year.


    Figure 6-1

    Customer cash portfolio performance ranking


    For 2012, the top cash portfolio belongs to customer C0000002 and has a value
    of $64,913.40\. This seems good, but our analyst would like to dig deep and understand
    why it is so high.


    Did the customer sell off a lot of instruments?


    Did the customer make frequent deposits into the cash accounts like checking or
    money market?


    How about customer C0000005 that shows a –$84,651.50 balance and is ranked at
    the bottom of the list? Is this a result of bad trades? Our analyst would use
    this report as a starting point to study the trading patterns for these customers
    to understand what is going on.


    What would help is also a nice graph based on this data to aid in the analysis.
    And here it is in Figure [6-2](#527021_1_En_6_Chapter.xhtml#Fig2)!


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig2_HTML.png)


    A screenshot of an Excel sheet. It represents 2 columns of yearly value and portfolio
    rank by year, along with a downward trending line graph of 2012 cash portfolio
    value. The value of the portfolio is highest and lowest for P 0 1 C 1 and P 0
    C 5, respectively.


    Figure 6-2

    Customer cash portfolio performance graph


    There is definitely a downward trend, but not only customer C0000005 but customer
    C0000003 seems to be in trouble. Adding a trend line also shows which direction
    portfolio values are going and can be used to grab the immediate attention of
    the analyst.


    Let’s turn our attention to customer C0000001 and look at their FX (foreign exchange)
    portfolio. Their cash portfolio seems on solid ground. Let’s see how they are
    doing with their foreign currency portfolio.


    Simple business specification: Our analyst requested a report that shows portfolio
    totals by year, month and then the rank of each month within the year for FX balances.
    Of course, they want an Excel graph, so we will create one for them. Lastly, months
    should be spelled out with three-character abbreviations and not numbers.


    Please refer to Listing [6-2](#527021_1_En_6_Chapter.xhtml#PC2).'
