- fmt: '### Data Set


    Prior to creating some queries, we need to create a small table and load it so
    we can practice. The table we create is called `OverExample` (clever name, I might
    add). It is made up of three columns: `OrderYear`, `OrderMonth`, and `SalesAmount`.
    Now we created this table in the beginning of the chapter, but I include it here
    for easy reference.


    Please refer to the partial listing in Listing [1-5](#527021_1_En_1_Chapter.xhtml#PC23).


    ```sql

    CREATE TABLE OverExample(

    OrderYear   SMALLINT,

    OrderMonth  SMALLINT,

    SalesAmount DECIMAL(10,2)

    );

    INSERT INTO OverExample VALUES

    (2010,1,10000.00),

    (2010,2,10000.00),

    (2010,2,10000.00),

    --missing rows

    (2010,8,10000.00),

    (2010,8,10000.00),

    (2010,9,10000.00),

    (2010,10,10000.00),

    (2010,11,10000.00),

    (2010,12,10000.00),

    -- 2011

    (2011,1,10000.00),

    (2011,2,10000.00),

    (2011,2,10000.00),

    --missing rows

    (2011,10,10000.00),

    (2011,11,10000.00),

    (2011,12,10000.00);

    GO

    ```


    Listing 1-5 Practice Table `OverExample`


    The `INSERT` statements load two years’ worth of data so we have enough rows to
    test out queries with the window functions and the `OVER()` clause. The `SUM()`
    aggregate function will be used to generate some rolling total calculations.


    Please refer to Listing [1-6](#527021_1_En_1_Chapter.xhtml#PC24).


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER (

    ) AS NPBNOB,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ) AS PBNOB,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS PBOBUPUF

    FROM OverExample;

    GO

    ```


    Listing 1-6 Scenario 1


    The `SUM()` function is used three times with different `ORDER BY`/`PARTITION
    BY` configurations. I also used column names that are meant to indicate the structure
    of the `OVER()` clause in terms of whether the `ORDER BY`, `PARTITION BY`, and
    `ROWS`/`RANGE` clauses are included. I did this so when you examine the results,
    you can quickly remember what clauses were used. I know, weird names, but you
    can easily remember the frame clauses we are using.


    The first `SUM()` function has an empty `OVER()` clause (the name `NPBNOB` = No
    `PARTITION BY`, No `ORDER BY`). Recall that the default window frame behavior
    for this combination is


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    The second `SUM()` function has an `OVER()` clause that includes a `PARTITION
    BY` but no `ORDER BY`, so the default window frame behavior is also


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    The column name is `PBNOB` (`PARTITION BY`, No `ORDER BY`). This time two partitions
    are created, one for each year in the data set.


    Last but not least, the third `SUM()` function uses an `OVER()` clause that has
    both a `PARTITION BY` and an `ORDER BY` clause. It also uses a window frame `ROWS`
    clause. The column name is `PBOBUPUF` (`PARTITION BY`, `ORDER BY`, `UNBOUNDED
    PRECEDING UNBOUNDED FOLLOWING`).


    The default frame behavior for this last column configuration is


    ```sql

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    Looks like we can override this behavior by replacing the `RANGE` clause and including
    a `ROWS` clause. It can be done!


    Let’s see what the results look like when we execute this query. Please refer
    to Figure [1-11](#527021_1_En_1_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig11_HTML.jpg)


    A screenshot of the c h 0 1 over clause s q l window. The results are presented
    in a table that has 6 columns for order year, order month, sales amount, N P B
    N O B, P B N O B, and P B O B U P U F.


    Figure 1-11 Scenario 1 results


    Interesting results. The first `SUM()`/`OVER()` clause combination simply displays
    the grand total for all the rows in the table, just as the default window frame
    behavior enforces.


    The second and third `SUM()`/`OVER()` clause combinations partition the data set
    by year, so the grand totals by year are displayed in each row. They appear to
    be identical. The window frame behavior is the same for both combinations:


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    That’s because for the second combination, the default behavior kicked in and
    for the third combination, we overrode the `RANGE` behavior and included the `ROWS`
    clause. This behavior is enforced within each year partition. Let’s try another
    example.'
