    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS PBOBRangeUPCR

    FROM OverExample;

    GO

    Listing 1-8

    ROWS vs. RANGE Comparison

    ```


    The `SUM()` function in both cases has identical `PARTITION BY` and `ORDER BY`
    clauses. The first has a `ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` clause,
    while the second combination has a `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT
    ROW` clause.


    What do you think the results will be?


    Please refer to Figure [1-13](#527021_1_En_1_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig13_HTML.jpg)


    A table has 5 columns for order year, order month, sales amount, P O B R rows
    U P C R, and P B O B R range U P C R. Some rows are highlighted in the boxes.


    Figure 1-13


    ROWS vs. RANGE, UNBOUNDED PRECEDING AND CURRENT ROW


    The results are almost the same, but the `SUM()/OVER()` combination that uses
    the `RANGE` window frame specification will generate the same values for any rows
    having duplicate `ORDER BY` values. As we discussed earlier, this clause works
    at a logical level (vs. physical for `ROWS`); it will add up all the duplicate
    values and post the same results in each duplicate row.'
  trans: '

    ### 示例 2


    这次我们来查看一些包含默认窗口框架行为与声明的 `RANGE` 行为的 `SUM()/OVER()` 子句组合。（请记住我们之前讨论过的默认窗口框架行为。）


    让我们看看这些组合产生的结果。请参考清单 1-7。


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER (

    ORDER BY OrderYear,OrderMonth

    ) AS NPBOB,

    -- same as PBOBRangeUPCR

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    ) AS PBOB,

    SUM(SalesAmount) OVER (

    ORDER BY OrderYear,OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS NPBOBRangeUPCR,

    -- same as PBOB

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS PBOBRangeUPCR

    FROM OverExample;

    GO

    ```

    清单 1-7

    场景 2 – 多种默认窗口框架与 RANGE 行为


    这一次，我们在第一个 `SUM()/OVER()` 组合中添加了一个 `ORDER BY` 子句，在第二个 `SUM()/OVER()` 组合中添加了一个
    `PARTITION BY` 和一个 `ORDER BY` 子句。第三个 `SUM()/OVER()` 组合包含一个 `ORDER BY` 子句，没有 `PARTITION
    BY` 子句，但我们包含了一个 `RANGE` 窗口框架子句。第四个 `SUM()/OVER()` 组合同时包含了 `PARTITION BY` 和 `ORDER
    BY` 子句，以及一个 `RANGE` 窗口框架子句。结果应该很有趣。


    请参考图 1-12。


    ![](img/527021_1_En_1_Fig12_HTML.jpg)


    一个表格有 6 列，分别是订单年份、订单月份、销售金额、N P B O B、P B O B、N P B O B range U P C R 和 P B O
    B R range U P C R。一些行在方框中突出显示。


    图 1-12

    更多默认行为与 RANGE 行为对比


    乍一看，所有结果似乎都一样！对于第一年的分区来说确实如此，但一旦我们进入第二年的分区，第一列和第三列的值持续递增，而第二列和第四列的值由于新的年份分区而被重置。


    重复月份条目的值已用方框框出。列 `NPBOB` 没有 `PARTITION BY` 子句，但它有 `ORDER BY` 子句，因此由 `RANGE BETWEEN
    UNBOUNDED PRECEDING and CURRENT ROW` 定义的默认窗口框架行为生效。再次注意，月份编号重复的行导致总计相同。2010 年的
    6 月（June）总计为 8000.00，7 月（July）和 8 月（August）也是如此。


    第二个 `SUM()/OVER()` 组合确实有 `PARTITION BY` 和 `ORDER BY` 子句，因此默认窗口框架行为是 `RANGE BETWEEN
    UNBOUNDED PRECEDING AND CURRENT ROW`。`PARTITION BY` 子句为每年定义了分区，默认框架行为导致窗口函数通过考虑当前行和先前行的值来计算，直到遇到重复的月份条目。如果这是一个累计总和，我们期望是
    7000.00 和 8000.00，但这些行的两个条目都是较高的值：8000.00。


    查询中的第三个 `SUM()/OVER()` 组合包含一个 `ORDER BY` 子句，但没有 `PARTITION BY` 子句。包含了一个窗口框架规范：`RANGE
    BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`。结果与之前的组合相同，但一旦我们进入 2011 年的分区，累计总和会持续进行，因为没有包含
    `PARTITION BY` 子句。再次注意遇到相同月份行时的行为。


    最后但同样重要的是，第四个 `SUM()/OVER()` 组合具有 `PARTITION BY`、`ORDER BY` 和 `RANGE` 窗口框架子句。此组合的行为与
    `PBOB` 列的组合完全相同。


    我们现在可以看到，在各种 `ORDER BY` 和 `PARTITION BY` 子句组合下，默认行为是如何生效的。当包含窗口框架规范时，其行为与其他列中的默认行为完全相同。在开始创建基于窗口函数的查询时，请记住这些。


    ### 示例 3


    下一个示例比较 `ROWS` 窗口框架规范与 `RANGE` 窗口框架规范。


    请参考清单 1-8。


    ```sql

    SELECT OrderYear,OrderMonth,SalesAmount,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS POBRowsUPCR,

    SUM(SalesAmount) OVER (

    PARTITION BY OrderYear

    ORDER BY OrderMonth

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ) AS PBOBRangeUPCR

    FROM OverExample;

    GO

    ```

    清单 1-8

    ROWS 与 RANGE 比较


    两种情况下的 `SUM()` 函数具有相同的 `PARTITION BY` 和 `ORDER BY` 子句。第一个有 `ROWS BETWEEN UNBOUNDED
    PRECEDING AND CURRENT ROW` 子句，而第二个组合有 `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT
    ROW` 子句。


    你认为结果会怎样？


    请参考图 1-13。


    ![](img/527021_1_En_1_Fig13_HTML.jpg)


    一个表格有 5 列，分别是订单年份、订单月份、销售金额、P O B R rows U P C R 和 P B O B R range U P C R。一些行在方框中突出显示。


    图 1-13

    ROWS 与 RANGE，UNBOUNDED PRECEDING AND CURRENT ROW


    结果几乎相同，但使用 `RANGE` 窗口框架规范的 `SUM()/OVER()` 组合将为任何具有重复 `ORDER BY` 值的行生成相同的值。正如我们之前讨论的，这个子句在逻辑级别工作（相对于
    `ROWS` 的物理级别）；它会将所有重复值相加，并在每个重复行中发布相同的结果。

