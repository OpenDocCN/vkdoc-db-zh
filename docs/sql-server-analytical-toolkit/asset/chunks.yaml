- fmt: "### STDEV() and STDEVP() Functions\n\nThe `STDEV()` function calculates the\
    \ statistical standard deviation of a set of values when the entire population\
    \ is not known or available.\n\nThe `STDEVP()` function calculates the statistical\
    \ standard deviation when the entire population of the data set is known.\n\n\
    But what does this mean?\n\nWhat this means is how close or how far apart the\
    \ numbers are in the data set from the arithmetic `MEAN` (which is another word\
    \ for average). In our context the average or `MEAN` is the sum of all data values\
    \ in question divided by the number of data values.\n\nThere are other types of\
    \ `MEAN` like geometric, harmonic, or weighted `MEAN`, which I will briefly cover\
    \ in Appendix B.\n\nSo how is the standard deviation calculated?\n\nYou could\
    \ use the following algorithm to calculate the standard deviation with TSQL:\n\
    \n*   Calculate the average (`MEAN`) of all values in question and store it in\
    \ a variable.\n*   For each value in the data set\n    *   Subtract the calculated\
    \ average.\n    *   Square the result.\n*   Take the sum of all the results and\
    \ divide the value by the number of data elements minus 1. (This step calculates\
    \ the variance; to calculate for the entire population, do not subtract 1.)\n\
    *   Now take the square root of the variance, and that’s your standard deviation.\n\
    \nOr you could just use the `STDEV()` function! There is a `STDEVP()` function\
    \ as mentioned earlier. As stated earlier, the only difference is that `STDEV()`\
    \ works on part of the population of the data. This is when the entire data set\
    \ is not known. The `STDEVP()` function works on the data set that represents\
    \ the entire population.\n\nHere is the syntax:\n\n```sql\nSELECT STDEV( ALL |\
    \ DISTINCT ) AS [Column Alias]\nFROM [Table Name]\nGO\n```\n\nYou need to supply\
    \ a column name that contains the data you want to use. You can optionally supply\
    \ the `ALL` or `DISTINCT` keyword if you wish. If you leave these out, just like\
    \ the other functions, the behavior will default to `ALL`. Using the `DISTINCT`\
    \ keyword will ignore duplicate values in the column.\n\nLet’s look at a TSQL\
    \ query that uses this window function. We want to calculate the standard deviation\
    \ plus the average by year, customer, store number, and product number.\n\nAs\
    \ usual we start off with a CTE to do some preprocessing and return our data set.\n\
    \nPlease refer to Listing 2-8.\n\n```sql\nWITH CustomerPurchaseAnalysis\n(PurchaseYear,PurchaseMonth,StoreNo,ProductNo,CustomerNo,TotalSalesAmount)\n\
    AS\n(\nSELECT\nYEAR(CalendarDate)  AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
    StoreNo,\nProductNo,\nCustomerNo,\nSUM(TransactionQuantity * UnitRetailPrice)\
    \ AS TotalSalesAmount\nFROM StagingTable.SalesTransaction\nGROUP BY YEAR(CalendarDate),MONTH(CalendarDate),ProductNo,CustomerNo,StoreNo\n\
    )\nSELECT\ncpa.PurchaseYear,\ncpa.PurchaseMonth,\ncpa.StoreNo,\ncpa.ProductNo,\n\
    c.CustomerNo,\nCONVERT(DECIMAL(10,2),cpa.TotalSalesAmount) AS TotalSalesAmount,\n\
    AVG(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(\n--PARTITION BY cpa.PurchaseYear,c.CustomerNo\n\
    ORDER BY cpa.PurchaseYear,c.CustomerNo\n) AS AvgPurchaseCount,\nSTDEV(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS StdevTotalSales,\nSTDEVP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS StdevpTotalSales,\nSTDEV(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\n) AS StdevTotalSales,\nSTDEVP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\n) AS StdevpYearTotalSales\nFROM CustomerPurchaseAnalysis cpa\nJOIN DimTable.Customer\
    \ c\nON cpa.CustomerNo = c.CustomerNo\nWHERE cpa.CustomerNo = 'C00000008'\nAND\
    \ PurchaseYear = 2011\nAND ProductNo = 'P00000038114';\nGO\n```\n\nListing 2-8:\
    \ Standard Deviation Sales Analysis\n\nThe CTE pulls out the year and month parts\
    \ from the date. We also calculate the total sales amount by multiplying the transaction\
    \ quantity by the unit retail price.\n\nThe average is calculated for the entire\
    \ year as we wish to use that value in an Excel spreadsheet to calculate and graph\
    \ the normal distribution bell curve. We will see it shortly.\n\nNext, the standard\
    \ deviation values are calculated by using the `STDEV()` and `STDEVP()` functions.\
    \ We perform the calculations two different ways. The first pair uses an `ORDER\
    \ BY` clause in the `OVER()` clause so that we get rolling monthly results. The\
    \ second pair does not use a `PARTITION BY` or `ORDER BY` clause, so the default\
    \ frame behavior kicks in: to process results, including all prior and following\
    \ rows relative to the current row.\n\nLet’s see the results in Figure 2-17.\n\
    \n![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig17_HTML.png)\n\nFigure 2-17:\
    \ Calculating standard deviation\n\nShort and sweet. Results for one customer,\
    \ one year by month. Notice the `NULL` value for the first standard deviation\
    \ results in column `StdevTotalSales1`. This happens because it is the first value\
    \ in the partition, and it cannot calculate the standard deviation for one value,\
    \ so `NULL` is the result. The `STDEVP()` function though is happy. It simply\
    \ returns 0. For the remaining months, the rolling standard deviation is calculated\
    \ month by month.\n\nIf you do not like the `NULL`, just use a `CASE` block that\
    \ tests the value returned and substitute it with a zero!\n\nColumn `StdevTotalSales2`\
    \ uses `STDEVP()`, and the values as can be seen are a bit lower since the entire\
    \ population of the data set is used.\n\nFinally, columns `StdevTotalSales3` and\
    \ `StdevTotalSales4` calculate the standard deviation for the entire year. We\
    \ will use the `STDEV()` year result in our Excel spreadsheet to generate normal\
    \ distribution values and generate a graph called a bell curve based on each normal\
    \ distribution value.\n\nLet’s check out the graph now in Figure 2-18.\n\n![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig18_HTML.png)\n\
    \nFigure 2-18: Standard deviation bell curve(s)\n\nWhat we have here are a series\
    \ of small bell curves. For example, notice the curves between months 2 and 4\
    \ and 4 and 6. In this case each curve is generated from three values, a low one,\
    \ then a high one, and back to a low value. The curve generated for months 2–4\
    \ has values 0.068514, 0.759391, and 0.194656. These are great values for the\
    \ bell curve.\n\nTo generate the normal distribution for each month, the Excel\
    \ `NORM.DIST` function was used. This function uses these parameters: the value,\
    \ the average (`MEAN`), and the standard deviation generated by our query. We\
    \ then insert a suggested graph for these values."
