- fmt: '### Performance Considerations


    Here comes our baseline estimated query plan.


    Please refer to Figure [13-18](#527021_1_En_13_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig18_HTML.png)


    A screenshot of the `SQLSSMS` window. It presents part 1 of the baseline estimated
    execution plan with 15 components. The components are 3 sets of table scan and
    hash match, compute scalar, adaptive join, clustered index, hash match, table
    scan, index scan, table scan, filter, and index seek.


    Figure 13-18


    Baseline estimated execution plan – part 1


    We are in data warehouse load, so look at all the different types of join tasks.
    We have a hash match, an adaptive join, and a series of hash match tasks all at
    0% cost. Look at the clustered index scan on the Calendar table (0% cost) and
    also the index seek task on the `InventoryHistory` fact table (12% cost).


    **Tip**


    Whenever you come across a task in an estimated query plan that you do not know
    what it does, look it up in the Microsoft documentation. Over time you will understand
    what all the tasks do.


    So far, we are looking good. Let’s scroll to the left and examine the next section
    of the plan.


    Please refer to Figure [13-19](#527021_1_En_13_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig19_HTML.png)


    A screenshot of the `SQLSSMS` window. It presents part 2 of the baseline estimated
    execution plan with 9 components. The components are segment, compute scalar,
    sort cost 55%, parallelism cost 7%, compute scalar, hash match cost 10%, hash
    match, table scan, and hash match.


    Figure 13-19


    Baseline estimated execution plan – part 2


    Here we get into a bit of trouble with the hash match task (cost 10%), the parallelism
    task (7%), and a pretty expensive sort task (55%). The sort tasks involve expressions
    used to pull out the date parts. We saw this in prior examples that this will
    kick up the costs when sorting.


    Again, we see that we might want to add a `JOIN` to the Calendar dimension so
    that we do not have to use the `DATEPART()` function repeatedly. This should get
    the sort down and eliminate the `CASE` blocks (but it adds new costs due to the
    `JOIN` and also more IO). This change would be performed on the `TSQL VIEW` we
    are using.


    Let’s move to the left again to see more of the estimated execution plan.


    Please refer to Figure [13-20](#527021_1_En_13_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig20_HTML.png)


    A screenshot of the `SQLSSMS` window. It presents part 3 of the baseline estimated
    execution plan with 8 components. The components are segment, compute scalar,
    stream aggregate, window spool cost 1%, segment, compute scalar, sequence project,
    and segment.


    Figure 13-20


    Baseline estimated execution plan – part 3


    Of course, the window spool task had to make an appearance, but it came in with
