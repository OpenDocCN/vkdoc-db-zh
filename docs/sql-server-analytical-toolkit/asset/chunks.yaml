    ```


    We are going to first declare a table variable to store some monthly portfolio
    positions. We include the trade year, quarter, and month and also the customer
    ID, portfolio number and name, and monthly account positions.


    The table variable is loaded with 12 rows, one for each month, and I purposely
    assigned amounts that increase each month until the middle of the year and then
    after that start going down.


    The query that generates the variance report based on this value is interesting.
    It uses `CASE` blocks to generate the variances for only the last month in each
    quarter. The modulo operator is used to test the value for the numerical month
    to see if it is divisible by 3\. This way we report variances for the months of
    March, June, September, and December.


    Next, in the `OVER()` clause, a partition is defined using the `TradeQuarter`
    column, and the partition is ordered by the `TradeMonth` column.


    Finally, the entire query results are sorted by customer ID, trade year, trade
