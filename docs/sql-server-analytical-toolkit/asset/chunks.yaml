- fmt: "### Memory-Optimized Strategy\n\n让我们创建一个内存优化表并加载账户信息，然后针对它运行我们的查询。我们将查看估计的查询计划以确认是否有改进。清单\
    \ [7-10](#527021_1_En_7_Chapter.xhtml#PC16) 是创建该表的 `SQL DDL` 命令。\n\n```sql\nCREATE\
    \ TABLE [FinancialReports].[AccountMonthlyBalancesMem]\n(\n[AcctYear]    [int]\
    \ NULL,\n[AcctMonth]   [int] NULL,\n[CustId]      [varchar](8) NOT NULL,\n[PrtfNo]\
    \      [varchar](8) NOT NULL,\n[AcctNo]      [varchar](64) NOT NULL,\n[AcctName]\
    \    [varchar](24) NOT NULL,\n[AcctBalance] [decimal](10, 2) NULL,\nINDEX [ieMonthlyAcctBalanceMemory]\
    \ NONCLUSTERED\n(\n[AcctYear],\n[AcctMonth],\n[CustId],\n[PrtfNo],\n[AcctNo]\n\
    )\n)WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )\nGO\n```\n**清单 7-10\
    \ 创建内存优化表**\n\n该表名为 `AccountMonthlyBalancesMem`。注意我们需要包含索引声明，同时注意 `WITH` 指令包含了使此表成为内存优化表的设置。清单\
    \ [7-11](#527021_1_En_7_Chapter.xhtml#PC17) 是加载该表的简单 `INSERT` 命令。\n\n```sql\n\
    INSERT INTO [FinancialReports].[AccountMonthlyBalancesMem]\nSELECT YEAR(PostDate)\
    \  AS AcctYear\n,MONTH(PostDate) AS AcctMonth\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n\
    ,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance\nFROM Financial.Account\n\
    GROUP BY YEAR(PostDate)\n,MONTH(PostDate)\n,CustId\n,PrtfNo\n,AcctNo\n,AcctName\n\
    GO\n```\n**清单 7-11 加载内存优化表**\n\n这个 `INSERT` 命令没什么特别的，那么让我们看看将要分析的查询。请参考清单 [7-12](#527021_1_En_7_Chapter.xhtml#PC18)。\n\
    \n```sql\nSELECT CustId\n,AcctYear\n,AcctMonth\n,AcctNo\n,AcctName\n,AcctBalance\n\
    ,LEAD(AcctBalance,12,0) OVER (\nPARTITION BY CustId\nORDER BY AcctName,AcctYear,AcctMonth\n\
    ) AS NextYearBalance\n,LAG(AcctBalance,12,0) OVER (\nPARTITION BY CustId\nORDER\
    \ BY AcctName,AcctYear,AcctMonth\n) AS LastYearBalance\nFROM [FinancialReports].[AccountMonthlyBalancesMem]\n\
    WHERE AcctYear >= 2013\nAND AcctNAme = 'CASH'\nGO\n```\n**清单 7-12 对内存优化表使用 LEAD()\
    \ 和 LAG()**\n\n查询和之前一样，但我们使用了内存优化表并增加了一个 `LAG()` 部分来获取去年同月的余额。回顾一下，我们按客户分区，并按账户名称、年份和月份对分区结果集进行排序。最终要求通过\
    \ `WHERE` 子句仅筛选现金账户和年份大于等于2013年来满足。\n\n不需要查看结果，因为除了输出中增加的 `LAG()` 函数结果外，它们与之前非内存增强表示例中的结果一致。（本章我想节省些空间）。\n\
    \n> **提示**\n> \n> 当你执行这类重大策略或代码更改时，务必针对已知的正确数据集测试结果，以确保一切按预期工作。永远不要想当然。错误可能而且将会潜入。别忘了保存旧脚本或查询的副本！\n\
    \n现在来看两者的查询计划。`**这次原始计划是指没有索引的那个，而不是图 7-18 所示的那个。**` 我在这次测试中删除了物理表上的索引。请参考图 [7-21](#527021_1_En_7_Chapter.xhtml#Fig22)。\n\
    \n![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig22_HTML.jpg)\n\n**图 7-21 对比估计的查询计划**\n\
    \n从右向左看，我们看到表扫描的成本从 47% 下降到了 28%；在内存表版本中添加了一个成本为 6% 的筛选任务（有点奇怪）；排序的成本从 48% 上升到了\
    \ 60%，这似乎是我们尝试过的所有“增强”策略的标准情况。窗口假脱机任务——有两个——保持不变。\n\n似乎没有显著的改进。内存表有一个默认索引，但在计划中并未使用。让我们看看\
    \ `IO` 和 `TIME` 统计数据。\n\n请参考图 [7-22](#527021_1_En_7_Chapter.xhtml#Fig23)。\n\n\
    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig23_HTML.png)\n\n**图 7-22 对比\
    \ IO 和 TIME 统计数据**\n\n这就是我们看到改进的地方。非内存增强版本的扫描计数为 1，逻辑读取为 13，`AccountMonthlyBalances`\
    \ 表的物理读取计数为 5。内存增强版本没有此表的统计数据，因为它在内存中。工作表的统计数据均为零，因此这些数据显示出了显著的改进。\n\n内存增强版本中的\
    \ `TIME` 统计数据有所下降。请注意，SQL Server 执行时间从 56 毫秒下降到内存增强版本的 2 毫秒，所以我认为这个策略值得投入开发时间。\n\
    \n> **注意**\n> \n> 这些示例是在一台具有 16 GB 内存和第七代 Intel Core i7 CPU 的笔记本电脑上运行的。在具有多个 CPU\
    \ 的大型服务器上运行，并且有多个查询针对内存增强表启动时，性能改进将非常显著。"
  raw: '### Memory-Optimized Strategy


    Let’s create a memory-optimized table and load the account information and run
    our query against it. We will check out the estimated query plan to see if there
    is improvement. Listing [7-10](#527021_1_En_7_Chapter.xhtml#PC16) is the `SQL
    DDL` command to create the table.


    ```

    CREATE TABLE [FinancialReports].[AccountMonthlyBalancesMem]

    (

    [AcctYear]    [int] NULL,

    [AcctMonth]   [int] NULL,

    [CustId]      [varchar](8) NOT NULL,

    [PrtfNo]      [varchar](8) NOT NULL,

    [AcctNo]      [varchar](64) NOT NULL,

    [AcctName]    [varchar](24) NOT NULL,

    [AcctBalance] [decimal](10, 2) NULL,

    INDEX [ieMonthlyAcctBalanceMemory] NONCLUSTERED

    (

    [AcctYear],

    [AcctMonth],

    [CustId],

    [PrtfNo],

    [AcctNo]

    )

    )WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )

    GO

    Listing 7-10

    Create a Memory-Optimized Table

    ```


    The table is called `AccountMonthlyBalancesMem`. Notice that we need to include
    the index declaration, and also notice the `WITH` directive that contains the
    settings to make this a memory-optimized table. Listing [7-11](#527021_1_En_7_Chapter.xhtml#PC17)
    is the simple `INSERT` command to load the table.


    ```

    INSERT INTO [FinancialReports].[AccountMonthlyBalancesMem]

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance

    FROM Financial.Account

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    GO

    Listing 7-11

    Load the Memory-Optimized Table

    ```


    Nothing out of the ordinary with this `INSERT` command, so let’s check out the
    query we will analyze. Please refer to Listing [7-12](#527021_1_En_7_Chapter.xhtml#PC18).


    ```

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LEAD(AcctBalance,12,0) OVER (

    PARTITION BY CustId

    ORDER BY AcctName,AcctYear,AcctMonth

    ) AS NextYearBalance

    ,LAG(AcctBalance,12,0) OVER (

    PARTITION BY CustId

    ORDER BY AcctName,AcctYear,AcctMonth

    ) AS LastYearBalance

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE AcctYear >= 2013

    AND AcctNAme = ''CASH''

    GO

    Listing 7-12

    Using LEAD() and LAG() Against a Memory-Optimized Table

    ```


    Same query as before, but we use the memory-optimized table and added a LAG()
    section for the last year’s balance for the same month. Recall that we partition
    by customer and sort the partition result set by account name, year, and month.
    Final requirements are satisfied by the `WHERE` clause filter by cash accounts
    only and for years equal to or greater than 2013.


    No need to look at the results as we saw them in the prior non-memory-enhanced
    table example as they match except for the added LAG() function results in the
    output. (I want to save some space in this chapter).


    Alert


    Whenever you are performing these kinds of major strategy or code changes, always
    test results against a known set of correct data to make sure things are working
    as expected. Never take things for granted. Bugs can and will creep in. Don’t
    forget to save a copy of the old script or query!


    Let’s look at the query plans for both. **This time the original plan is the one
    that has no indexes, not the one shown in Figure** [**7-18**](#527021_1_En_7_Chapter.xhtml#Fig18).
    I dropped the index on the physical table for this test. Please refer to Figure
    [7-21](#527021_1_En_7_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig22_HTML.jpg)


    A screenshot of the S S M S window. It presents 2 query plans with 7 and 8 components.
    The costs of compute scalar, window spool, sort, and table scan are 2%, 48%, and
    47%, and 2%, 60%, and 28% for plans 1 and 2. The cost of filter in plan 2 is 6%.


    Figure 7-21


    Comparing estimated query plans


    Reading right to left, we see that table scan went down from 47% cost to 28% cost,
    a filter task with a cost of 6% was added in the memory table version (a little
    strange), and the sort went up from 48% cost to 60% cost, which seems to be standard
    with all the “enhanced” strategies we tried. The window spool tasks – there were
    two of them – stayed the same.


    Does not seem to be a significant improvement. The memory tables has a default
    index but it was not used in the plan. Let’s see the `IO` and `TIME` statistics.


    Please refer to Figure [7-22](#527021_1_En_7_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig23_HTML.png)


    A screenshot of the S S M S window. The text presents 2 I O and TIME statistics.
    Parse and compile times for C P U and elapsed are 15, 35, and 0, 0 milliseconds
    for 1 and 2\. Execution times for C P U and elapsed are 0, 56, and 0, 2 milliseconds
    for 1 and 2\. 180 rows are affected.


    Figure 7-22


    Comparing IO and TIME statistics


    Here is where we see the improvement. The non-memory-enhanced version had a scan
    count of 1, logical reads of 13, and physical read counts of 5 for the `AccountMonthlyBalances`
    table. The memory-enhanced version did not have statistics on this table because
    it is in memory. The work table statistics were all zero, so there is significant
    improvement shown with these statistics.


    The `TIME` statistics went down in the memory-enhanced version. Notice that SQL
    Server execution time went from 56 ms to 2 ms in the memory-enhanced version,
    so I would say this strategy was worth the development time.


    Note


    These examples were run on a laptop with 16 GB of memory and seventh-generation
    Intel Core i7 CPU. Performance improvement would be significant when running on
    large servers with multiple CPUs and having multiple queries launched against
    a memory-enhanced table.'
