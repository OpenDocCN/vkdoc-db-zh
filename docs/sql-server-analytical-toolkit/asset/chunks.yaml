- fmt: '# 客户交易分析：SQL CTE与滚动计算


    我们的业务用户希望对客户 C0000001，John Smith 先生（还记得他吗？）进行一项分析。具体来说，是分析 2012 年金融工具 AA（即 Alcoa
    公司）的买入交易。感兴趣的账号是 A02C1，这是一个股票账户。最后，这需要是一个四天滚动计数，因此我们需要为 `OVER()` 子句指定一个 `ROWS()`
    框架。数据可以有 24 小时的延迟（提示：我们可以在夜间加载它）。


    > **注意**

    >

    > Microsoft SQL Server 将 `CTE` 定义为包含三个部分：`CTE` **表达式**、`CTE` **查询**和**外部查询**。`CTE`
    表达式跟随 `WITH` 关键字并为 `CTE` 命名；其后是 `CTE` 返回的列列表。`CTE` 查询是括号之间的查询；它跟随在 `AS ()` 块之后。最后，外部查询是处理由
    `CTE` 返回的行的查询。


    此解决方案将使用 `COUNT()` 和 `SUM()` 函数来满足业务需求。它采用我称之为我们惯用的 `CTE` 内外层查询格式，但让我们先看看用于 `CTE`
    的查询。


    请参考 **Listing 5-2a**。


    ```sql

    SELECT YEAR(T.TransDate)          AS TransYear

    ,DATEPART(qq,(T.TransDate)) AS TransQtr

    ,MONTH(T.TransDate)         AS TransMonth

    ,DATEPART(ww,T.TransDate)   AS TransWeek

    ,T.TransDate

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,T.AcctNo

    ,T.BuySell

    ,T.Symbol

    ,COUNT(*) AS DailyCount

    FROM [Financial].[Transaction] T

    JOIN [MasterData].[Customer] C

    ON T.CustId = C.CustId

    GROUP BY YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    ORDER BY C.CustId

    ,YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    GO

    ```

    **Listing 5-2a**

    客户分析 CTE 查询


    这是一个直接明了的查询。注意 `COUNT()` 函数及其支持属性，以及因为使用了聚合函数而必需的 `GROUP BY` 子句。我包含了 `ORDER BY`
    子句，以便我们能更好地了解数据的样子。当用作 `CTE` 查询时，这需要被注释掉。如果不这样做，将会收到错误信息。


    由于这是一个用于历史分析的查询，我们可能考虑使用它来加载报表表，以提高性能并消除 `CTE`。该查询返回 444,144 行，并且是时间快照，因此只需加载一次。值得考虑。


    回到我们的讨论。请参考 **Figure 5-3** 中的部分结果。


    ![客户分析 CTE 结果](images/527021_1_En_5_Chapter/527021_1_En_5_Fig3_HTML.png)


    **Figure 5-3**

    客户分析 CTE 结果


    有两个项目值得我们关注。注意，`COUNT()` 函数返回的所有值都是 1。这是因为客户每天每种工具只交易一次。我就是这样加载测试数据的。尝试修改加载此表的代码，使一个客户在某天对一种或多种工具有多笔交易。试着混合一下，有两到三笔买入交易和一、两或三笔卖出交易。完全有理由假设客户会在同一天对同一工具执行多次买入或卖出交易。一个警告：`Transaction`
    表会变得很大！


    > **注意**

    >

    > 金融行业将股票、合约、产品等称为金融工具。如果你希望在这个领域工作，有很多有趣的术语需要学习。


    现在让我们看看查询的剩余部分。


    请参考 **Listing 5-2b**。


    ```sql

    SELECT TransYear

    ,TransQtr

    ,TransMonth

    ,TransWeek

    ,TransDate

    ,CustId

    ,CustFName + '' '' + CustLname AS [Customer Name]

    ,AcctNo

    ,BuySell

    ,Symbol

    ,DailyCount

    ,SUM(DailyCount) OVER (

    PARTITION BY TransQtr

    ORDER BY TransQtr,TransMonth,TransDate

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    )AS RollingTransCount

    FROM CustomerTransactions

    WHERE CustId  = ''C0000001''

    AND TransYear = 2012

    AND BuySell   = ''B''

    AND Symbol    = ''AA''

    AND AcctNo    = ''A02C1''

    ORDER BY TransYear

    ,TransQtr

    ,TransMonth

    ,TransDate

    ,CustId

    ,BuySell

    ,Symbol

    GO

    ```

    **Listing 5-2b**

    客户分析外部查询


    让我们从分析 `OVER()` 子句开始。它包括一个 `PARTITION BY` 和一个 `ORDER BY` 子句以及一个 `ROWS` 子句。我们按日历季度分区，并对分区结果按季度、月份和交易日期排序。`ROWS`
    子句设置了四天滚动求和（前 3 天 + 当天 = 4 天）。


    注意我悄悄加入了 `SUM()` 函数，这将在下一节介绍。我们希望将 `CTE` 查询返回的所有交易计数相加。让我们看看结果如何。


    请参考 **Figure 5-4** 中的部分结果。


    ![交易计数四天滚动总计](images/527021_1_En_5_Chapter/527021_1_En_5_Fig4_HTML.png)


    **Figure 5-4**

    交易计数四天滚动总计


    前四行看起来不错，滚动计数总和每天增加一。第 4 天之后，它们就都一样了。每天只有一笔买入交易，所以我们得到的最后四天的总和始终是 4。在现实世界中，这可能是一个值得研究的有趣模式：客户只执行一笔交易的日子与执行多笔交易的日子。


    正如我们讨论过的，这是预期之中的，因为客户每天只进行一笔交易。尝试修改此查询，以便同时考虑买入和卖出交易。同时为选定的客户和工具加载更多交易，使结果更有趣一些。'
  raw: 'Our business user wishes to perform an analysis on customer C0000001, Mr.
    John Smith. (Remember him?) Specifically, it’s an analysis on buy trades for the
    year 2012, for the financial instrument AA, which is the company Alcoa. The account
    number of interest is A02C1, which is an equity (stock) account. Lastly, this
    needs to be a four-day rolling count, so we need to specify a `ROWS()` frame for
    our `OVER()` clause. The data can be 24 hours old (hint: we can load it overnight).


    Note


    Microsoft SQL Server defines a `CTE` as having three parts: the `CTE` **expression**,
    the `CTE` **query**, and the **outer query**. The `CTE` expression follows the
    `WITH` keyword and names the `CTE`; this is followed by the column list that the
    `CTE` returns. The `CTE` query is the query between the parentheses; it follows
    the `AS ()` block. And finally the outer query is the query that processes the
    rows returned by the `CTE`.


    This solution will use both the `COUNT()` and `SUM()` functions to meet the business
    requirements. It is in what I call our usual `CTE` inner and outer query format,
    but let’s look at the query used for the `CTE` first.


    Please refer to Listing [5-2a](#527021_1_En_5_Chapter.xhtml#PC3).


    ```

    SELECT YEAR(T.TransDate)          AS TransYear

    ,DATEPART(qq,(T.TransDate)) AS TransQtr

    ,MONTH(T.TransDate)         AS TransMonth

    ,DATEPART(ww,T.TransDate)   AS TransWeek

    ,T.TransDate

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,T.AcctNo

    ,T.BuySell

    ,T.Symbol

    ,COUNT(*) AS DailyCount

    FROM [Financial].[Transaction] T

    JOIN [MasterData].[Customer] C

    ON T.CustId = C.CustId

    GROUP BY YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    ORDER BY C.CustId

    ,YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    GO

    Listing 5-2a

    Customer Analysis CTE Query

    ```


    This is a straightforward query. Notice the `COUNT()` function and the supporting
    attributes together with a mandatory `GROUP BY` clause because we are using an
    aggregate function. I included the `ORDER BY` clause so we can get a better idea
    of what the data looks like. This needs to be commented out when used as the `CTE`
    query. If you do not, you will get an error message.


    Since this is a query used in historical analysis, we might want to consider using
    it to load a report table in order to improve the performance and eliminate the
    `CTE`. The query returns 444,144 rows and is a snapshot in time, so it only needs
    to be loaded once. Something to consider.


    Back to our discussion. Please refer to the partial results in Figure [5-3](#527021_1_En_5_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig3_HTML.png)


    A screenshot of S Q L query 2 dot s q l desktop. The top half screen presents
    some programming. The C O U T function is used in the codes. A table of results
    has 11 columns. The daily count column is highlighted in a box. An arrow indicates
    444144 rows.


    Figure 5-3


    Customer analysis CTE results


    There are two items to focus our attention on. Notice that all the values returned
    by the `COUNT()` function are 1\. That’s because the customer trades in each instrument
    only once a day. That’s how I loaded the test data. Try modifying the code that
    loads this table so that a customer has more than one trade in a day for one or
    more instruments. Try to mix it up so there are two or three buy transactions
    and one, two, or three sell transactions. It is perfectly reasonable to assume
    a customer will perform multiple buy or sell transactions a day on the same instrument.
    One warning: The Transaction table will get big!


    Note


    The financial industry refers to stocks, contracts, products, etc. as financial
    instruments. Lots of interesting jargon to learn if you want to work in this sector.


    Now let’s look at the remaining part of the query.


    Please refer to Listing [5-2b](#527021_1_En_5_Chapter.xhtml#PC4).


    ```

    SELECT TransYear

    ,TransQtr

    ,TransMonth

    ,TransWeek

    ,TransDate

    ,CustId

    ,CustFName + '' '' + CustLname AS [Customer Name]

    ,AcctNo

    ,BuySell

    ,Symbol

    ,DailyCount

    ,SUM(DailyCount) OVER (

    PARTITION BY TransQtr

    ORDER BY TransQtr,TransMonth,TransDate

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    )AS RollingTransCount

    FROM CustomerTransactions

    WHERE CustId  = ''C0000001''

    AND TransYear = 2012

    AND BuySell   = ''B''

    AND Symbol    = ''AA''

    AND AcctNo    = ''A02C1''

    ORDER BY TransYear

    ,TransQtr

    ,TransMonth

    ,TransDate

    ,CustId

    ,BuySell

    ,Symbol

    GO

    Listing 5-2b

    Customer Analysis Outer Query

    ```


    Let’s start by analyzing the `OVER()` clause. It includes a `PARTITION BY` and
    an `ORDER BY` clause together with a `ROWS` clause. We partition by calendar quarter
    and order the partition results by quarter, month, and transaction date. The `ROWS`
    clause sets up the four-day rolling sum (3 prior days + current day = 4 days).


    Notice I sneaked in the `SUM()` function, which will be covered in the next section.
    We want to add up all the transaction counts returned by the `CTE` query. Let’s
    see what the results look like.


    Please refer to the partial results in Figure [5-4](#527021_1_En_5_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig4_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the results table. The
    daily count and rolling transaction count columns are highlighted.


    Figure 5-4


    Transaction count four-day rolling totals


    The first four rows look good as the rolling count sums increase by one each day.
    Past day 4 though, they are all the same. Each day has only one buy transaction,
    so we keep getting the value 4 as the total for the last four days. In a real-world
    scenario, this could be an interesting pattern to look for: days a customer executes
    only one trade vs. days a customer executes multiple trades.


    This was expected as we discussed how the customer only places a trade a day.
    Try modifying this query so we take into account both buy and sell trades. Also
    load some more transactions for select customers and instruments so the results
    are a little more interesting.'
  trans: '# 客户交易分析：SQL CTE 与滚动计算


    我们的业务用户希望对客户 C0000001，John Smith 先生（还记得他吗？）进行一项分析。具体来说，是分析 2012 年金融工具 AA（即 Alcoa
    公司）的买入交易。感兴趣的账号是 A02C1，这是一个股票账户。最后，这需要是一个四天滚动计数，因此我们需要为 `OVER()` 子句指定一个 `ROWS()`
    框架。数据可以有 24 小时的延迟（提示：我们可以在夜间加载它）。


    > **注意**

    >

    > Microsoft SQL Server 将 `CTE` 定义为包含三个部分：`CTE` **表达式**、`CTE` **查询**和**外部查询**。`CTE`
    表达式跟随 `WITH` 关键字并为 `CTE` 命名；其后是 `CTE` 返回的列列表。`CTE` 查询是括号之间的查询；它跟随在 `AS ()` 块之后。最后，外部查询是处理由
    `CTE` 返回的行的查询。


    此解决方案将使用 `COUNT()` 和 `SUM()` 函数来满足业务需求。它采用我称之为我们惯用的 `CTE` 内外层查询格式，但让我们先看看用于 `CTE`
    的查询。


    请参考 **清单 5-2a**。


    ```sql

    SELECT YEAR(T.TransDate)          AS TransYear

    ,DATEPART(qq,(T.TransDate)) AS TransQtr

    ,MONTH(T.TransDate)         AS TransMonth

    ,DATEPART(ww,T.TransDate)   AS TransWeek

    ,T.TransDate

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,T.AcctNo

    ,T.BuySell

    ,T.Symbol

    ,COUNT(*) AS DailyCount

    FROM [Financial].[Transaction] T

    JOIN [MasterData].[Customer] C

    ON T.CustId = C.CustId

    GROUP BY YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    ORDER BY C.CustId

    ,YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    GO

    ```

    **清单 5-2a**

    客户分析 CTE 查询


    这是一个直接明了的查询。注意 `COUNT()` 函数及其支持属性，以及因为使用了聚合函数而必需的 `GROUP BY` 子句。我包含了 `ORDER BY`
    子句，以便我们能更好地了解数据的样子。当用作 `CTE` 查询时，这需要被注释掉。如果不这样做，将会收到错误信息。


    由于这是一个用于历史分析的查询，我们可能考虑使用它来加载报表表，以提高性能并消除 `CTE`。该查询返回 444,144 行，并且是时间快照，因此只需加载一次。值得考虑。


    回到我们的讨论。请参考 **图 5-3** 中的部分结果。


    ![客户分析 CTE 结果](img/527021_1_En_5_Fig3_HTML.png)


    **图 5-3**

    客户分析 CTE 结果


    有两个项目值得我们关注。注意，`COUNT()` 函数返回的所有值都是 1。这是因为客户每天每种工具只交易一次。我就是这样加载测试数据的。尝试修改加载此表的代码，使一个客户在某天对一种或多种工具有多笔交易。试着混合一下，有两到三笔买入交易和一、两或三笔卖出交易。完全有理由假设客户会在同一天对同一工具执行多次买入或卖出交易。一个警告：`Transaction`
    表会变得很大！


    > **注意**

    >

    > 金融行业将股票、合约、产品等称为金融工具。如果你希望在这个领域工作，有很多有趣的术语需要学习。


    现在让我们看看查询的剩余部分。


    请参考 **清单 5-2b**。


    ```sql

    SELECT TransYear

    ,TransQtr

    ,TransMonth

    ,TransWeek

    ,TransDate

    ,CustId

    ,CustFName + '' '' + CustLname AS [Customer Name]

    ,AcctNo

    ,BuySell

    ,Symbol

    ,DailyCount

    ,SUM(DailyCount) OVER (

    PARTITION BY TransQtr

    ORDER BY TransQtr,TransMonth,TransDate

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    )AS RollingTransCount

    FROM CustomerTransactions

    WHERE CustId  = ''C0000001''

    AND TransYear = 2012

    AND BuySell   = ''B''

    AND Symbol    = ''AA''

    AND AcctNo    = ''A02C1''

    ORDER BY TransYear

    ,TransQtr

    ,TransMonth

    ,TransDate

    ,CustId

    ,BuySell

    ,Symbol

    GO

    ```

    **清单 5-2b**

    客户分析外部查询


    让我们从分析 `OVER()` 子句开始。它包括一个 `PARTITION BY` 和一个 `ORDER BY` 子句以及一个 `ROWS` 子句。我们按日历季度分区，并对分区结果按季度、月份和交易日期排序。`ROWS`
    子句设置了四天滚动求和（前 3 天 + 当天 = 4 天）。


    注意我悄悄加入了 `SUM()` 函数，这将在下一节介绍。我们希望将 `CTE` 查询返回的所有交易计数相加。让我们看看结果如何。


    请参考 **图 5-4** 中的部分结果。


    ![交易计数四天滚动总计](img/527021_1_En_5_Fig4_HTML.png)


    **图 5-4**

    交易计数四天滚动总计


    前四行看起来不错，滚动计数总和每天增加一。第 4 天之后，它们就都一样了。每天只有一笔买入交易，所以我们得到的最后四天的总和始终是 4。在现实世界中，这可能是一个值得研究的有趣模式：客户只执行一笔交易的日子与执行多笔交易的日子。


    正如我们讨论过的，这是预期之中的，因为客户每天只进行一笔交易。尝试修改此查询，以便同时考虑买入和卖出交易。同时为选定的客户和工具加载更多交易，使结果更有趣一些。'
- fmt: '## Performance Considerations


    Next, let''s do some performance analysis with the tools we learned so far. Keep
    in mind what the results are if you decide to load multiple trades each day. The
    `Transaction` table will get very large fast, and your performance will deteriorate.


    The approach we will take is to look at the original `CTE`-based query first.
    Then we will pull out the `CTE` query part and check out the query plan for it.
    We want to use the `CTE` query to load a report table so that the query with the
    `OVER()` clause runs against a preloaded table instead of using the `CTE` (one
    would assume that this will run faster). If any index is suggested, we will build
    it, use the query to load the table, and then create an estimated query plan on
    the original query that has been modified to use the report table instead of the
    `CTE`.


    Let''s look at the original estimated query plan. Please refer to Figure 5-5a.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig5_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Sort cost, 19%. Stream aggregate cost, 2%. Sort cost, 50%. Table scan cost,
    5%. Index seek cost, 14%.


    Figure 5-5a


    Original query, first part


    Lots of expensive tasks. Starting from right to left, we see a table scan on the
    `Customer` table at 5%. No worries as the table has only five customers, so there
    is not much we need to do with it. Indexes will not help as SQL Server loads the
    small table into memory.


    We do see an index seek at a cost of 14%.


    Index seeks are good. The seek means that the required row is retrieved via a
    structure called a `b-tree` (binary tree). Index scans are not desirable because
    each row in a table needs to be checked one at a time, in sequential order, until
    the desired row is found. Keep on the lookout for these.


    Another aspect of query plans to keep in mind as you progress in your performance
    analysis activities.


    Remember: "`Index` seek good, `index` scan bad," most of the time anyway.


    Next, we see an expensive sort at 50% cost and finally another sort at 19%. But
    wait. This is only half the plan. Let''s see what the second half at the left-hand
    side contains.


    Please refer to Figure 5-5b.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig6_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Sort cost, 19%. Stream aggregate cost, 2%. Sort cost, 50%. Table scan cost,
    5%. Index seek cost, 14%.


    Figure 5-5b


    Original query, second part


    There''s the sort we just discussed at 19% as a placeholder so we know where we
    are relative to the whole plan. The only other task to consider is the window
    spool due to the `ROWS` clause. This is only 1%, but it does indicate that the
    spooling is performed against physical storage vs. in memory.


    We now have a performance baseline. We want to consider the `CTE` query for use
    to load a report table. Remember the data can be up to 24 hours old.


    Running an estimated query plan on the `CTE` query, we get the following plan
    in Figure 5-5c.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig7_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Select cost, 0%. Window spool cost, 1%. Sort cost, 19%.


    Figure 5-5c


    `CTE` estimated query plan


    The estimated query plan did suggest an index to improve performance by 25.8%;
    not a lot, but still it would help when loading the report table overnight. If
    we minimize load times, other queries that need to load at night will have some
    room. Notice the `Customer` table scan costs 0%. Also notice that the index task
    is a scan and not a seek. This costs 29%. That is why the index was suggested
    by the query plan estimator tool. We would like to see an index seek.


    Listing 5-3 is the index `DDL` command that was suggested.


    ```

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Transaction] ([CustId])

    INCLUDE ([TransDate],[Symbol],[AcctNo],[BuySell])

    GO

    ```


    Listing 5-3

    Suggested Index


    The name for the index I came up with is


    ```

    ieTransDateSymbolAcctNoBuySell

    ```


    Copying this name in the preceding code and then executing the command creates
    the index. Let''s run a second estimated query plan and see what improvements
    there are.


    Please refer to Figure 5-6 for the new estimated query plan.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig8_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Select cost, 0%. Parallelism cost, 27%. Hash match cost, 42%. Index seek
    cost, 27%. Index scan cost, 29%.


    Figure 5-6


    Revised estimated query plan


    This is interesting. The index scan is still there, but we now have an index seek
    operation. Both are based on the same index. An adaptive join follows at 0% cost
    with a hash match at 42% cost. Finally, all the streams from the tasks are gathered
    for the final row output.


    Running this query to load the report table took ten seconds for 444,144 rows.
    Seems like a lot of time. Listing 5-4 is the `INSERT` command using the table
    we just discussed.


    ```

    TRUNCATE TABLE Report.CustomerC0000001Analysis

    GO

    INSERT INTO Report.CustomerC0000001Analysis

    SELECT YEAR(T.TransDate)          AS TransYear

    ,DATEPART(qq,(T.TransDate)) AS TransQtr

    ,MONTH(T.TransDate)         AS TransMonth

    ,DATEPART(ww,T.TransDate)   AS TransWeek

    ,T.TransDate

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,T.AcctNo

    ,T.BuySell

    ,T.Symbol

    ,COUNT(*) AS DailyCount

    FROM [Financial].[Transaction] T

    JOIN [MasterData].[Customer] C

    ON T.CustId = C.CustId

    GROUP BY YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    GO

    ```


    Listing 5-4

    Loading the Customer Analysis Table


    This took 15 seconds to run. This took even longer than when we tested the preceding
    query. We might want to consider a `memory-optimized table` for the customer data
    as we are dealing with a small number of rows. (I include code in the script for
    this chapter to create the memory-optimized table, so try it out.)


    Let''s run our original query and modify it so it uses the report table. Figure
    5-7 is the revised estimated execution plan when we use the preloaded report table
    instead of the `CTE`.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig9_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Three arrows indicate the window spool cost 8%, sort cost 64%, and Index
    seek cost 25%.


    Figure 5-7


    Revised query estimated execution plan


    This seems to be a more streamlined plan. We are seeing an index seek at a cost
    of 25% but an expensive sort at 64%, and check out the window spool! This comes
    in at 8%, which means we are using physical storage. We need to dive deeper into
    this strategy and look at the `profile statistics`. We should look at the `IO`
    and `TIME` statistics also, but in the interest of space, we will look at the
    `PROFILE` statistics only.'
  raw: '### Performance Considerations


