    A screenshot of the M S Excel window. It has a table of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has a line graph of counts versus functions with 3 horizontal lines
    for scan count, logical reads, and physical reads.


    图 13-42


    Warehouse 表的查询组合 IO 统计数据


    这很有意思。针对 Warehouse 表的所有窗口函数的扫描计数、逻辑读取值和物理读取值都相同。那么我们能说所有这些函数的行为表现完全一致吗？


    嗯，是的，因为我们大多数时候使用了相同的 `WHERE` 子句，所以这是我们需要考虑的一个因素。


    让我们看看 work 表的可视化结果。


    请参考图 [13-43](#527021_1_En_13_Chapter.xhtml#Fig43)。


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig43_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has a line graph of counts versus functions with 2 inverted bell
    curves and a horizontal line.


    图 13-43


    work 表的查询组合 IO 统计数据


    这个更有意思。看起来 `CUME_DIST()`、`PERCENTILE_CONT()` 和 `PERCENTILE_DISC()` 函数产生了最高的逻辑读取，而
    `LAG()` 和 `LEAD()` 函数产生的最低。其他函数则介于两者之间。


    就扫描计数而言，我们可以陈述相同的模式，有趣的是所有的物理读取都是零。


    最后但同样重要的是，让我们看看所有函数的 CPU 和总耗时统计信息。


    请参考图 [13-44](#527021_1_En_13_Chapter.xhtml#Fig44)。


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig44_HTML.png)


    A screenshot of the M S Excel window. It has a table of 3 columns and 8 rows.
    The column headers are function, C P U, and elapsed. It also has a line graph
    of milliseconds versus functions with 2 almost horizontal curves for C P U and
    elapsed with a peak at 172 and 376 percent rank.


    图 13-44


    查询组合 CPU 和总耗时统计信息


    可视化图表中又一组有趣的统计数据。看起来 `PERCENT_RANK()` 函数使用了最多的 `CPU` 资源并且执行时间最长。其余函数则相当稳定。


    结论：通过生成图表来比较这些窗口函数的资源使用情况，是找出消耗资源最多的函数的好方法。这正是你开始性能调优的地方。换句话说，基于此分析来确定你需要优先调优哪些查询。


    让我们通过查看几个 `SSRS` 报告来结束本章，以展示其钻取功能。这更像是一个展示与讲解的讨论，我们不会像之前那样详细介绍创建报告所需的步骤。


    ## Report Builder Examples


    在其他章节中，我们讨论了如何修改我们创建和分析的简单查询，以返回更多数据（基本上是移除 `WHERE` 子句并调整 `PARTITION BY` 子句），这样它们就可以用作一些复杂的
    SSRS 网络报告的基础。


    `WHERE` 子句中的列随后将在 Report Builder 中用作过滤器。这是一个强大的概念，为业务分析师在查看和分析所需数据方面提供了极大的灵活性。


    在本节中，我们将查看我创建的一个报告，该报告引用了本章讨论的一个 `VIEW`。这个 `VIEW` 叫做 `Reports.MonthlySumInventoryShort`。我们将在一个报告中使用它，该报告允许我们按年、季度、月以及地点、库存、仓库和产品进行钻取，以及你能想到的任何组合。


    我不会展示如何构建它，正如我们在前面章节中看到的，但我们将专注于报告的导航功能。


    请参考图 [13-45](#527021_1_En_13_Chapter.xhtml#Fig45)。


