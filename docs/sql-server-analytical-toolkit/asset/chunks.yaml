- fmt: 'A screenshot of the `SQL SRS` window with a table of 11 columns and 13 rows.
    The column headers are `inv year`, `inv quarter name`, `inv month name`, `location
    I D`, `warehouse I D`, `product type`, `product I D`, `monthly sum quantity on
    hand`, and `prior month`, `quarter`, and `year sums in the prior warehouse view`.


    **Figure 13-48** Quantity on hand – prior warehouse view


    Looking at March for the first quarter, we can see that the `Prior Month Sum`
    value for warehouse “WH111” correctly points to the corresponding value in February
    in the `Monthly Sum Qty On Hand` column.


    Let’s drill down on one of the warehouses in order to see the results at a product
    level. Please refer to [Figure 13-49](#527021_1_En_13_Chapter.xhtml#Fig49).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig49_HTML.png)


    A screenshot of the `SQL SRS` window with a table of 11 columns and 13 rows. The
    column headers are `Inv year`, `Inv quarter name`, `Inv month name`, `location
    I D`, `warehouse I D`, `product type`, `product I D`, `monthly sum quantity on
    hand`, and `prior month`, `quarter`, and `year sums in prior product view`.


    **Figure 13-49** Quantity on hand – prior product view


    This report also shows the correct prior month values but this time at a product
    level. If it wasn’t for the month names being sorted incorrectly, this report
    would merit top marks!


    I fixed the report, and the next screenshot shows the months sorted in correct
    order. Please refer to [Figure 13-50](#527021_1_En_13_Chapter.xhtml#Fig50).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig50_HTML.png)


    A screenshot of the `SQL SRS` window with a table of 11 columns and 13 rows. The
    column headers are `inv year`, `inv quarter name`, `inv month name`, `location
    I D`, `warehouse I D`, `product type`, `product I D`, `monthly sum quantity on
    hand`, and `prior month`, `quarter`, and `year sums in fixed sort order`.


    **Figure 13-50** Fixed sort order


    This is a lot better. All that had to be done was click the properties for the
    month name column and change the sort order, so it sorts by month number as opposed
    to month name. Visually, you will see the month names in correct order. This is
    done in `Report Builder`, or you can even edit the report on the website.


    Let’s see how this is accomplished. Please refer to [Figure 13-51](#527021_1_En_13_Chapter.xhtml#Fig51).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig51_HTML.png)


    A screenshot of the `SQL Server Reporting Services` Homepage. It presents 2 folders
    of inventory rankings and reports parts and 6 paginated reports. A dialog box
    of `Prior Inventory Quantities` has 8 options. An arrow points to `edit in the
    report builder`.


    **Figure 13-51** Fixing the month sort order, part 1


    We want to fix the report called `PriorInventoryQuantities`. Click the three dots
    on the upper right-hand side of the report name to display a menu with several
    choices. Click “`Edit in Report Builder`.” This will bring up `Report Builder`
    if it is already installed on your computer.


    **Note**


    If your reports are on an actual server, you need to install `Report Builder`
    on the server.


    Once it loads in design mode for this report, we simply need to change the sort
    parameter for this column. This is very easy to do. Please refer to [Figure 13-52](#527021_1_En_13_Chapter.xhtml#Fig52).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig52_HTML.png)


    A screenshot of the `SQL Server Reporting Services` Homepage. It presents a file
    of `Prior Inventory Quantities` in `Microsoft Report Builder`. A pop-up dialog
    box of group properties has 7 options in the left panel, among which `sorting`
    is selected. The right panel has sorting options.


    **Figure 13-52** Fixing the month sort order, part 2


    In the `Row Groups` section at the bottom, find the offending column. Click the
    down arrow toward the right side and select `Group Properties`. This displays
    the dialog box shown in the preceding figure and simply click the `Sort by` list
    box and scroll down to the column you want to sort on.


    Once you selected it, click the `OK` button and back out of `Report Builder`.
    You will see a yellow `Update Report Parts` message stating the report was updated
    on the server. Make sure you save it locally too! You do not want to republish
    a local report on your laptop and wipe out the changes.


    That is all that there is to it. Here comes your homework assignment, after which
    we will wrap up the chapter.


    ## Homework


    Using `Report Builder`, create any type of report you wish using either the `APInventory`
    database or `APInventoryWarehouse` data warehouse. You do not need to publish
    it, if you did not install `SSRS` on your computer or server.


    If you have not already downloaded `Report Builder`, simply perform a web search,
    and download and install it. This is accomplished with the usual Microsoft installer
    program, and there are only a few steps involved. The last chapter will show you
    where to find and download all the tools we used in this book.


    ## Summary


    We made it. We are at the end of our journey. In this chapter, we applied the
    analytical functions one last time to our inventory management scenario. We worked
    with two databases, an inventory transaction database called `APInventory` and
    a data warehouse called `APInventoryWarehouse`.


    We performed our usual script creation based on business analyst specifications
    and viewed the results. In some cases we used the output of the queries to create
    interesting `Microsoft Excel` visualizations.


    Lastly, we performed our usual performance analysis and enhancements and learned
    techniques for analyzing performance statistics in `Microsoft Excel` spreadsheets.


    We wrapped up the chapter with an example demonstrating the drill-down capabilities
    of `SSRS` web reports created with `Report Builder`. We even saw how to correct
    a mistake in the report after it was published. I wish I could say I did this
    on purpose, but I actually made the mistake!


    As the saying goes, if life gives you lemons, make lemonade.


    In the next and last chapter, we wrap things up with a brief summary of what we
    covered in our adventure. I also show you where to get:


    *   `SQL Server Developer` (free developer license)

    *   `Visual Studio Community` (free developer license)

    *   `SQL Server Data Tools (SSMS)` (installed via `Visual Studio Installer`)

    *   `SSAS` server and `Visual Studio` project support

    *   `SSIS` server and `Visual Studio` project support

    *   `SSMS` download installer from the Microsoft site (manage `SQL Server` and
    `SSAS`)

    *   `Report Builder` (free developer license)

    *   `Microsoft Excel` – you need to pay for this, but it is worth it


    `SQL Server Data Tools`, `SSRS`, `SSAS`, and `SSIS` installers are downloaded
    from `Visual Studio Community Installer`. If you do not have a free developer
    license for `SQL Server`, make sure you download it and install it first as it
    will install not only `SQL Server` instances but also `SSAS`, `SSIS`, and `SSRS`
    servers.


    # 14. Summary, Conclusions, and Next Steps


    ## Summary


    Congratulations! This is our last chapter. Let’s wrap things up by summarizing
    what we learned and also looking at the tools in our toolkit and where to get
    them. I might even tell you how to create the databases and load them too! We
    will also discuss how to set up the folders for storing code and also the physical
    database files.


    I recommend you create the folders, create the database, and load them first so
    as you read through the chapters, you can follow along and practice.'
