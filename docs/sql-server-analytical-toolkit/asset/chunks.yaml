- fmt: '# 查询优化案例分析


    ## 估算查询计划


    我们在 SSMS 的水平查询计划窗口中为两个查询生成了估算查询计划。这便于我们比较两个计划。


    请参考图 [8-32](#527021_1_En_8_Chapter.xhtml#Fig32)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig32_HTML.png)


    图 8-32：比较估算查询计划


    第一个计划中的表扫描在内存优化表的计划中变成了索引扫描。排序步骤消失了，但请注意窗口假脱机任务。它的成本从7%上升到了31%。流聚合任务上升了1%。


    在做出判断之前，让我们先看看两个计划的成本统计。请参考表 [8-8](#527021_1_En_8_Chapter.xhtml#Tab8)。


    表 8-8：比较估算查询计划步骤成本


    | 非内存优化 |   | 内存优化 |   |   |

    | :--- | :--- | :--- | :--- | :--- |

    | `Step` | `Cost` | `Step` | `Cost` | `Comment` |

    | Table scan | 29% | Index scan | 85% | 用索引扫描替换了表扫描 |

    | Sort | 62% | N/A | N/A | 已消除 |

    | Compute scalar | 0% | Compute scalar | 0% | 无变化 |

    | Segment | 0% | Segment | 0% | 无变化 |

    | Segment | 0% | Segment | 0% | 无变化 |

    | Window spool | 7% | Window spool | 11% | 上升 |

    | Stream aggregate | 2% | Stream aggregate | 3% | 上升 |

    | Compute scalar | 0% | Compute scalar | 0% | 无变化 |

    | Compute scalar | 0% | Compute scalar | 0% | 无变化 |

    | SELECT | 0% | SELECT | 0% | 无变化 |


    付出了大量工作，改进却不大。事实上，从性能提升的角度看，我们似乎还有点倒退。窗口假脱机成本上升了3%，流聚合步骤的成本上升了1%。虽然排序步骤被消除了，但我们有了一个索引扫描。


    让我们看看两个查询的 `IO` 和 `TIME` 统计数据。请参考图 [8-33](#527021_1_En_8_Chapter.xhtml#Fig33)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig33_HTML.png)


    图 8-33：比较两种策略的 IO 和 TIME 统计


    > **提示：** 此类分析应执行多次，每次使用 `DBCC` 清除内存缓存，以确保结果一致。


    结论是：做了这么多工作，提升却不大，因此这个场景也不是内存优化表的合适候选。


    最后一个要讨论的问题是：我们最初的查询返回了所有行，这通常不是个好主意。没有人能分析结果集中的数千行。理想的策略是编写使用 `WHERE` 子句过滤器的查询，以减少结果数量并让索引充分发挥作用。


    我们回去找分析师，并获得了通过过滤数据来缩小数据范围的批准。我们说服了分析师，承诺通过 SSRS 报告访问查询，该报告允许他们通过网页报告页面中的下拉列表框选择年份、工厂和位置。


    我通过添加以下 `WHERE` 子句修改了查询：


    ```sql

    WHERE CalendarYear = 2003

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GO

    ```


    看看估算查询计划发生了什么变化；顶部的计划是原始估算查询计划。请参考图 [8-34](#527021_1_En_8_Chapter.xhtml#Fig34)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig34_HTML.png)


    图 8-34：引入 WHERE 子句后比较查询计划


    以下是我们的分析：


    - 表扫描成本从29%上升到60%。

    - 排序步骤成本从62%下降到39%。

    - 窗口假脱机步骤成本从7%下降到0%。

    - 流聚合成本从2%下降到0%。


    所以，看起来像添加 `WHERE` 子句这样简单的查询更改，比所有索引和内存优化表带来了更多的性能提升！


    总之，当业务分析师向你提供业务需求时，多提问和协商总没有坏处。也许你可以建议改进，比如添加过滤器等，这会使查询结果更易于使用并提高性能。务必询问报告的使用方式和使用者。


    在开始漫长的编码和测试之旅（例如在小表上创建索引，更糟糕的是创建内存优化表）之前，请先这样做。毕竟，内存是有限的资源。如果你用内存优化表堵塞它，最终会耗尽！


    最后但同样重要的是 `IO` 和 `TIME` 统计数据。你会喜欢这些的；原始查询统计信息位于截图的顶部。请参考图 [8-35](#527021_1_En_8_Chapter.xhtml#Fig35)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig35_HTML.png)


    图 8-35：比较 IO 和 TIME 统计


    看起来这些统计数据也有所改善。让我们来看一下。


    请参考表 [8-9](#527021_1_En_8_Chapter.xhtml#Tab9)。


    表 8-9：IO 和时间统计数据并排对比


    |   | 原始 | 使用 WHERE |

    | :--- | :--- | :--- |

    | `Statistics` | `IO` | `IO` |

    | Work Table |   |   |

    | Scan count | 1648 | 13 |

    | Logical reads | 11119 | 73 |

    | Read-ahead reads | 0 | 0 |

    | EquipFailureTbl |   |   |

    | Scan count | 1 | 1 |

    | Logical reads | 22 | 22 |

    | Read-ahead reads | 22 | 22 |

    |   | `TIME` | `TIME` |

    | Parse CPU | 16 ms | 0 ms |

    | Parse elapsed | 85 ms | 66 ms |

    | Exec CPU | 62 ms | 15 ms |

    | Exec elapsed | 285 ms | 28 ms |


    结果非常有趣。`EquipmentFailureStatistics` 报告表的 `IO` 统计数据在两个查询中保持不变。但当我们查看两个查询的工作表统计数据时，存在显著差异：


    - 在带有 `WHERE` 子句的查询版本中，扫描计数从1,648次降到了13次。

    - 在带有 `WHERE` 子句的查询中，逻辑读取次数从11,119次降到了73次。

    - 两个版本的查询中，预读次数都保持为0。


    最后，让我们看看两个查询的 `CPU` 和用时：


    - 在带有 `WHERE` 子句的查询中，解析 `CPU` 时间从16毫秒降到了0毫秒。

    - 在带有 `WHERE` 子句的查询中，解析用时从85毫秒降到了66毫秒。

    - 在带有 `WHERE` 子句的查询中，执行 `CPU` 时间从62毫秒降到了15毫秒。

    - 在带有 `WHERE` 子句的查询中，执行用时从285毫秒降到了28毫秒。


    看起来添加 `WHERE` 子句显著提升了性能。这是合理的，因为我们处理的结果集更小了。


    修改查询是我们在性能分析会议中需要考虑的另一种技术。没有 `WHERE` 子句的那个表扫描真的有必要吗？'
  raw: '#### Estimated Query Plan


    We generate an estimated query plan for both queries in horizontal query plane
    windows in SSMS. This makes it easy to compare both plans.


    Please refer to Figure [8-32](#527021_1_En_8_Chapter.xhtml#Fig32).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig32_HTML.png)


    A screenshot of the S Q L Querry 4 dot sql window. 2 subwindows compare the query
    plans. Top. Window spool cost 7%, sort cost 62%, and table scan cost 29%. Bottom.
    Stream aggregate cost 3%, window spool cost 11%, and index scan cost 85%.


    Figure 8-32


    Comparing estimated query plans


    The table scan in the first plan becomes an index scan in the plan for the memory-optimized
    table. The sort step disappeared, but look at the window spool task. It went up
    from 7% to 31%. The stream aggregate task went up by 1%.


    Let’s look at the cost statistics for both plans before we pass judgement. Please
    refer to Table [8-8](#527021_1_En_8_Chapter.xhtml#Tab8).


    Table 8-8


    Comparing Estimated Query Plan Step Costs


    | Non-memory |   | Memory |   |   |

    | --- | --- | --- | --- | --- |

    | **Step** | **Cost** | **Step** | **Cost** | **Comment** |

    | Table scan | 29% | Index scan | 85% | Replaced table scan with index scan |

    | Sort | 62% | N/A | N/A | Eliminated |

    | Compute scalar | 0% | Compute scalar | 0% | No change |

    | Segment | 0% | Segment | 0% | No change |

    | Segment | 0% | Segment | 0% | No change |

    | **Window spool** | **7%** | **Window spool** | **11%** | **Went up** |

    | **Stream aggregate** | **2%** | **Stream aggregate** | **3%** | **Went up**
    |

    | Compute scalar | 0% | Compute scalar | 0% | No change |

    | Compute scalar | 0% | Compute scalar | 0% | No change |

    | SELECT | 0% | SELECT | 0% | No change |


    Not much improvement for a lot of work. As a matter of fact, it looks like we
    went a little backward in terms of performance improvement. The window spool cost
    went up by 3%, and the stream aggregate step went up 1% in terms of cost. The
    sort step was eliminated though, but we have an index scan.


    Let’s look at the `IO` and `TIME` statistics for both queries. Please refer to
    Figure [8-33](#527021_1_En_8_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig33_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen compares the T I M E statistics. The C P U run time decreased
    from 62 to 47 milliseconds.


    Figure 8-33


    Comparing IO and TIME statistics for both strategies


    The table statistics disappeared in the memory-optimized query, so this is a positive
    step since the table is in memory. The work table statistics are identical for
    both queries. SQL Server execution time went up a bit in the memory-optimized
    table, so more bad news.


    Tip


    This type of analysis should be performed multiple times, each time using DBCC
    to clear memory cache to make sure the results are consistent.


    The verdict is in: all this work and not a lot of improvement, so this scenario
    was not a candidate for memory-optimized tables either.


    One last item to discuss: Our original query returned all the rows, which is usually
    not a good idea. No one can possibly analyze thousands of rows in a result set.
    The ideal strategy is to write queries that use `WHERE` clause filters to reduce
    the results and give the indexes a good workout.


    We went back to the analyst, and we received approval to narrow the data scope
    by filtering the data. We convinced the analyst by promising to access the query
    from an SSRS report that allowed them to choose the year, plant, and location
    via drop-down list boxes in the web report page.


    I modified the query by adding the following `WHERE` clause:


    ```

    WHERE CalendarYear = 2003

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GO

    ```


    Look at what happened as far as the estimated query plans; the top plan is the
    original estimated query plan. Please refer to Figure [8-34](#527021_1_En_8_Chapter.xhtml#Fig34).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig34_HTML.png)


    A screenshot of the S Q L Querry 4 dot sql window. 2 subwindows compare the query
    plans. Top. Window spool cost 7%, sort cost 62%, and table scan cost 29%. Bottom.
    Stream aggregate cost 0%, window spool cost 0%, sort cost 39%, and index scan
    cost 60%.


    Figure 8-34


    Comparing query plans where a WHERE clause is introduced


    Here is our analysis:


    *   The table scan went up from 29% to 60%.


    *   The sort step went down from 62% to 39%.


    *   The window spool step went down from 7% to 0%.


    *   The stream aggregate went down from 2% to 0%.


    So it looks like a simple query change like adding a `WHERE` clause delivered
    more performance improvement than all the indexes and memory-optimized tables!


    In conclusion, when a business analyst supplies you with a business requirement,
    it does not hurt to ask questions and negotiate. Maybe you can suggest improvements
    like filters and so on that will make the query results easier to use and improve
    performance. Make sure you ask how the report is used and by whom.


    Do this before you embark on a lengthy coding and testing journey such as creating
    indexes on small tables and, worse yet, creating memory-optimized tables. After
    all, memory is a limited resource. You will run out eventually if you clog it
    up with a memory-optimized table!


    Last but not least are the `IO` and `TIME` statistics. You will like these; the
    original query statistics are at the top of the screenshot.


    Please refer to Figure [8-35](#527021_1_En_8_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig35_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen compares the I O and TIME statistics. The scan count
    decreased from 1648 to 13, and logical reads decreased from 11119 to 73.


    Figure 8-35


    Comparing IO and TIME statistics


    Looks like these statistics improved also. Let’s take a look.


    Please refer to Table [8-9](#527021_1_En_8_Chapter.xhtml#Tab9).


    Table 8-9


    IO and Time Statistics Side by Side


    |   | Original | With WHERE |

    | --- | --- | --- |

    | **Statistics** | **IO** | **IO** |

    | **Work Table** |   |   |

    | Scan count | 1648 | 13 |

    | Logical reads | 11119 | 73 |

    | Read-ahead reads | 0 | 0 |

    | **EquipFailureTbl** |   |   |

    | Scan count | 1 | 1 |

    | Logical reads | 22 | 22 |

    | Read-ahead reads | 22 | 22 |

    |   | **TIME** | **TIME** |

    | Parse CPU | 16 ms | 0 ms |

    | Parse elapsed | 85 ms | 66 ms |

    | Exec CPU | 62 ms | 15 ms |

    | Exec elapsed | 285 ms | 28 ms |


    Very interesting results. The `IO` statistics for the `EquipmentFailureStatistics`
    report table remained the same in both queries. But there is a considerable difference
    when we look at the work table statistics for both queries:


    *   Scan count went from 1,648 to 13 in the `WHERE` clause version of the query.


    *   Logical reads went down from 11,119 to 73 in the `WHERE` clause query.


    *   Read-ahead reads stayed at 0 for both versions of the query.


    Lastly, let’s look at `CPU` and elapsed times for both queries:


    Parse `CPU` time went from 16 ms to 0 ms in the `WHERE` clause query.


    Parse elapsed time went from 85 ms to 66 ms in the `WHERE` clause query.


    Execution `CPU` time went from 62 ms to 15 ms in the `WHERE` clause query.


    Execution elapsed time went from 285 ms to 28 ms in the `WHERE` clause query.


    Looks like adding the `WHERE` clause significantly improved performance. This
    makes sense as we are working with smaller result sets.


    Modifying the query is another technique we need to consider during our performance
    analysis sessions. Is that table scan without a `WHERE` clause really needed?'
  trans: '# 查询优化案例分析


    ## 估算查询计划


    我们在 SSMS 的水平查询计划窗口中为两个查询生成了估算查询计划。这便于我们比较两个计划。


    请参考图 8-32。


    ![](img/527021_1_En_8_Fig32_HTML.png)


    图 8-32：比较估算查询计划


    第一个计划中的表扫描在内存优化表的计划中变成了索引扫描。排序步骤消失了，但请注意窗口假脱机任务。它的成本从 7%上升到了 31%。流聚合任务上升了 1%。


    在做出判断之前，让我们先看看两个计划的成本统计。请参考表 8-8。


    表 8-8：比较估算查询计划步骤成本


    | 非内存优化 |   | 内存优化 |   |   |

    | :--- | :--- | :--- | :--- | :--- |

    | `步骤` | `成本` | `步骤` | `成本` | `注释` |

    | 表扫描 | 29% | 索引扫描 | 85% | 用索引扫描替换了表扫描 |

    | 排序 | 62% | 不适用 | 不适用 | 已消除 |

    | 计算标量 | 0% | 计算标量 | 0% | 无变化 |

    | 分段 | 0% | 分段 | 0% | 无变化 |

    | 分段 | 0% | 分段 | 0% | 无变化 |

    | 窗口假脱机 | 7% | 窗口假脱机 | 11% | 上升 |

    | 流聚合 | 2% | 流聚合 | 3% | 上升 |

    | 计算标量 | 0% | 计算标量 | 0% | 无变化 |

    | 计算标量 | 0% | 计算标量 | 0% | 无变化 |

    | SELECT | 0% | SELECT | 0% | 无变化 |


    付出了大量工作，改进却不大。事实上，从性能提升的角度看，我们似乎还有点倒退。窗口假脱机成本上升了 3%，流聚合步骤的成本上升了 1%。虽然排序步骤被消除了，但我们有了一个索引扫描。


    让我们看看两个查询的 `IO` 和 `TIME` 统计数据。请参考图 8-33。


    ![](img/527021_1_En_8_Fig33_HTML.png)


    图 8-33：比较两种策略的 IO 和 TIME 统计


    > **提示：** 此类分析应执行多次，每次使用 `DBCC` 清除内存缓存，以确保结果一致。


    结论是：做了这么多工作，提升却不大，因此这个场景也不是内存优化表的合适候选。


    最后一个要讨论的问题是：我们最初的查询返回了所有行，这通常不是个好主意。没有人能分析结果集中的数千行。理想的策略是编写使用 `WHERE` 子句过滤器的查询，以减少结果数量并让索引充分发挥作用。


    我们回去找分析师，并获得了通过过滤数据来缩小数据范围的批准。我们说服了分析师，承诺通过 SSRS 报告访问查询，该报告允许他们通过网页报告页面中的下拉列表框选择年份、工厂和位置。


    我通过添加以下 `WHERE` 子句修改了查询：


    ```sql

    WHERE CalendarYear = 2003

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GO

    ```


    看看估算查询计划发生了什么变化；顶部的计划是原始估算查询计划。请参考图 8-34。


    ![](img/527021_1_En_8_Fig34_HTML.png)


    图 8-34：引入 WHERE 子句后比较查询计划


    以下是我们的分析：


    - 表扫描成本从 29%上升到 60%。

    - 排序步骤成本从 62%下降到 39%。

    - 窗口假脱机步骤成本从 7%下降到 0%。

    - 流聚合成本从 2%下降到 0%。


    所以，看起来像添加 `WHERE` 子句这样简单的查询更改，比所有索引和内存优化表带来了更多的性能提升！


    总之，当业务分析师向你提供业务需求时，多提问和协商总没有坏处。也许你可以建议改进，比如添加过滤器等，这会使查询结果更易于使用并提高性能。务必询问报告的使用方式和使用者。


    在开始漫长的编码和测试之旅（例如在小表上创建索引，更糟糕的是创建内存优化表）之前，请先这样做。毕竟，内存是有限的资源。如果你用内存优化表堵塞它，最终会耗尽！


    最后但同样重要的是 `IO` 和 `TIME` 统计数据。你会喜欢这些的；原始查询统计信息位于截图的顶部。请参考图 8-35。


    ![](img/527021_1_En_8_Fig35_HTML.png)


    图 8-35：比较 IO 和 TIME 统计


    看起来这些统计数据也有所改善。让我们来看一下。


    请参考表 8-9。


    表 8-9：IO 和时间统计数据并排对比


    |   | 原始 | 使用 WHERE |

    | :--- | :--- | :--- |

    | `统计项` | `IO` | `IO` |

    | 工作表 |   |   |

    | 扫描计数 | 1648 | 13 |

    | 逻辑读取 | 11119 | 73 |

    | 预读 | 0 | 0 |

    | 设备故障表 |   |   |

    | 扫描计数 | 1 | 1 |

    | 逻辑读取 | 22 | 22 |

    | 预读 | 22 | 22 |

    |   | `时间` | `时间` |

    | 解析 CPU | 16 ms | 0 ms |

    | 解析耗时 | 85 ms | 66 ms |

    | 执行 CPU | 62 ms | 15 ms |

    | 执行耗时 | 285 ms | 28 ms |


    结果非常有趣。`EquipmentFailureStatistics` 报告表的 `IO` 统计数据在两个查询中保持不变。但当我们查看两个查询的工作表统计数据时，存在显著差异：


    - 在带有 `WHERE` 子句的查询版本中，扫描计数从 1,648 次降到了 13 次。

    - 在带有 `WHERE` 子句的查询中，逻辑读取次数从 11,119 次降到了 73 次。

    - 两个版本的查询中，预读次数都保持为 0。


    最后，让我们看看两个查询的 `CPU` 和用时：


    - 在带有 `WHERE` 子句的查询中，解析 `CPU` 时间从 16 毫秒降到了 0 毫秒。

    - 在带有 `WHERE` 子句的查询中，解析用时从 85 毫秒降到了 66 毫秒。

    - 在带有 `WHERE` 子句的查询中，执行 `CPU` 时间从 62 毫秒降到了 15 毫秒。

    - 在带有 `WHERE` 子句的查询中，执行用时从 285 毫秒降到了 28 毫秒。


    看起来添加 `WHERE` 子句显著提升了性能。这是合理的，因为我们处理的结果集更小了。


    修改查询是我们在性能分析会议中需要考虑的另一种技术。没有 `WHERE` 子句的那个表扫描真的有必要吗？'
- fmt: "## Seven-Million-Row Query: Performance Tuning\n\nLet’s look at one more query.\
    \ We have been writing queries all along on small- to medium-size tables. This\
    \ allowed us to learn and interpret estimated query plans and the various statistics.\
    \ Let’s try a table with seven-million-plus rows to see what the query plan looks\
    \ like! The code to create and load this table is available in the folder for\
    \ this chapter, and the file is called\n\n> “ch08 – load large equipment status\
    \ history.sql”\n\nNow while creating this query, I found a design flaw in the\
    \ `APPlant` database. I did not do it on purpose, but I used it to make lemonade\
    \ out of lemons.\n\nWhat do I mean?\n\nI found an opportunity to discuss how sometimes\
    \ you are given requirements for a query that cannot be satisfied unless you find\
    \ roundabout ways to join all the tables you need. As you pursue the roundabout\
    \ trials and errors, you realize that the database design is flawed. Something\
    \ is missing. You get the query to work, but it performs badly in terms of performance,\
    \ and you have to check you did not introduce data anomalies like duplicates.\n\
    \nSpecifically, I found that my design had no way to directly link the `Equipment`\
    \ table to the `Location` table. The way the database is designed, one needs to\
    \ link the `Equipment` table to either the `Valve`, `Motor`, `Turbine`, or `Generator`\
    \ table, so you can link these to the `Location` table. Stay tuned for the fix.\n\
    \nLet’s look at workarounds first.\n\nHere is the first cut of the query with\
    \ the workaround. The query is based on a `CTE`, so I split the discussion into\
    \ two parts.\n\nPlease refer to Listing [8-24](#527021_1_En_8_Chapter.xhtml#PC34)\
    \ for the `CTE` block.\n\n```sql\nWITH EquipStatusCTE (\n    StatusYear,StatusMonth,EquipmentId,EquipAbbrev,\n\
    \    EquipOnlineStatusCode,EquipOnLineStatusDesc,StatusCount\n)\nAS (\n    SELECT\
    \ YEAR(ESBH.CalendarDate) AS StatusYear\n          ,MONTH(ESBH.CalendarDate) AS\
    \ StatusMonth\n          ,ESBH.EquipmentId\n          ,E.EquipAbbrev\n       \
    \   ,ESBH.EquipOnLineStatusCode\n          ,EOLSC.EquipOnLineStatusDesc\n    \
    \      ,COUNT(*) AS StatusCount\n    FROM Reports.EquipmentDailyStatusHistoryByHour\
    \ ESBH\n    JOIN DimTable.Equipment E\n        ON ESBH.EquipmentId = E.EquipmentId\n\
    \    JOIN DimTable.EquipOnlineStatusCode EOLSC\n        ON ESBH.EquipOnLineStatusCode\
    \ = EOLSC.EquipOnlineStatusCode\n    GROUP BY YEAR(ESBH.CalendarDate)\n      \
    \      ,MONTH(ESBH.CalendarDate)\n            ,ESBH.EquipmentId\n            ,E.EquipAbbrev\n\
    \            ,ESBH.EquipOnLineStatusCode\n            ,EOLSC.EquipOnLineStatusDesc\n\
    )\n```\n\nListing 8-24\nSeven-Million-Row Window Aggregate Query\n\nAs can be\
    \ seen we are joining two dimension tables to a denormalized report table called\
    \ `Reports.EquipmentDailyStatusHistoryByHour`. The number of the status codes\
    \ that identify whether a piece of equipment is either online or offline due to\
    \ maintenance or faults is what we want to count. Some standard reporting columns\
    \ are included like the year, month, equipment ID, abbreviation (type of equipment),\
    \ status code, and description.\n\nSince we are using the `COUNT()` function without\
    \ an `OVER()` clause, we need to include a `GROUP BY` clause. This will add to\
    \ the processing time.\n\nHere comes the query part. This is where the workaround\
    \ to retrieve equipment locations is solved by a series of `UNION` query blocks\
    \ nested in a query that makes up an inline table.\n\nPlease refer to Listing\
    \ [8-25](#527021_1_En_8_Chapter.xhtml#PC35).\n\n```sql\nSELECT ES.StatusYear AS\
    \ ReportYear\n      ,ES.StatusMonth AS Reportmonth\n      ,EP.LocationId\n   \
    \   ,ES.EquipmentId\n      ,StatusCount\n      ,SUM(StatusCount) OVER(\n     \
    \      PARTITION BY ES.EquipmentId,ES.StatusYear\n           ORDER BY ES.EquipmentId,ES.StatusYear,ES.StatusMonth\n\
    \       ) AS SumStatusEvent\n      ,ES.EquipOnlineStatusCode\n      ,ES.EquipOnLineStatusDesc\n\
    \      ,EP.PlantId\n      ,L.LocationId\n      ,P.PlantName\n      ,P.PlantDescription\n\
    \      ,ES.EquipAbbrev\n      ,EP.UnitId\n      ,EP.UnitName\n      ,E.SerialNo\n\
    FROM EquipStatusCTE ES\nINNER JOIN DimTable.Equipment E\n    ON ES.EquipmentId\
    \ = E.EquipmentId\nINNER JOIN (\n    SELECT PlantId,LocationId,EquipmentId,MotorId\
    \ AS UnitId,\n           MotorName AS UnitName\n    FROM DimTable.Motor\n    UNION\n\
    \    SELECT PlantId,LocationId,EquipmentId,ValveId AS UnitId,\n           'Valve\
    \ - ' + ValveName AS UnitName\n    FROM DimTable.Valve\n    UNION\n    SELECT\
    \ PlantId,LocationId,EquipmentId,TurbineId AS UnitId,\n           TurbineName\
    \ AS UnitName\n    FROM DimTable.Turbine\n    UNION\n    SELECT PlantId,LocationId,EquipmentId,\n\
    \           GeneratorId AS UnitId,GeneratorName AS UnitName\n    FROM DimTable.Generator\n\
    ) EP\n    ON ES.EquipmentId = EP.EquipmentId\nINNER JOIN DimTable.Plant P\n  \
    \  ON EP.PlantId = P.PlantId\nINNER JOIN DimTable.Location L\n    ON EP.PlantId\
    \ = L.PlantId\n   AND EP.LocationId = L.LocationId\nWHERE ES.StatusYear = 2002\n\
    \  AND ES.EquipOnlineStatusCode = '0001'\nGO\n```\n\nListing 8-25\nEquipment Status\
    \ Code Totals Rollup Query\n\nYes, it's messy!\n\nFirst of all, we use the `SUM()`\
    \ aggregate function with an `OVER()` clause to set up the rolling calculations.\
    \ The partition is defined by equipment ID and status. The `ORDER BY` clause defines\
    \ the logical order for processing by the equipment ID, status year, and status\
    \ month columns (let’s just say the `ORDER BY` clause sorts the rows in the order\
    \ that is required for processing to achieve the desired results).\n\nNow for\
    \ the workaround. In the `FROM` clause, I defined an inline table by retrieving\
    \ the columns required to link a piece of equipment to the correct plant and location\
    \ by a series of three `UNION` blocks. The queries retrieve the required columns\
    \ from the `Motor`, `Valve`, `Turbine`, and `Generator` tables.\n\nThe results\
    \ are given an alias of `EP,` which is used in the `FROM` clause to join the other\
    \ tables to this inline table via the `EquipmentId` column. Not pretty but it\
    \ works. But how fast?\n\nThis is the design flaw. There should be an association\
    \ table or dimension table to store this data, so it does not have to be assembled\
    \ each time this query is run. We will fix this shortly.\n\nLet’s look at the\
    \ results of this query. Please refer to Figure [8-36](#527021_1_En_8_Chapter.xhtml#Fig36)\
    \ for the partial results.\n\n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig36_HTML.png)\n\
    \nA screenshot of ch08 queries V 2 dot sql window. The top screen has some programming\
    \ codes. The bottom screen presents the result table. The table has 9 columns.\
    \ The columns of report year, report month, location I D, status count, and sum\
    \ status event are highlighted.\n\nFigure 8-36\nRolling equipment status summaries\
    \ by month\n\nLooks like the rolling sums are working. A quick check shows the\
    \ rolling summaries work: 607 + 578 = 1185 for the first two months’ flow. When\
    \ the equipment ID changes, the failures are reset for January, and the rolling\
    \ process begins again.\n\nThe important columns are up front, so you can see\
    \ the year and month information, the location, and the equipment ID, followed\
    \ by the counts and rolling summaries, and the detail columns come next.\n\nThis\
    \ query took two seconds to run. Not bad considering we are going against a seven-million-row-plus\
    \ table on a laptop.\n\nLet’s look at the baseline query plan; it will be a large\
    \ one. Please refer to the following three figures so we can understand what is\
    \ going on in terms of the estimated execution plan and flow.\n\nPlease refer\
    \ to Figure [8-37](#527021_1_En_8_Chapter.xhtml#Fig37).\n\n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig37_HTML.png)\n\
    \nA screenshot of the ch08 queries V 2 dot sql window. The top screen has some\
    \ programming codes. The bottom screen has a message and execution plan for query\
    \ 1. Table scan cost 0%, and compute scalar cost 0%."
  raw: '## Seven-Million-Row Query: Performance Tuning


    Let’s look at one more query. We have been writing queries all along on small-
    to medium-size tables. This allowed us to learn and interpret estimated query
    plans and the various statistics. Let’s try a table with seven-million-plus rows
    to see what the query plan looks like! The code to create and load this table
    is available in the folder for this chapter, and the file is called


    > “ch08 – load large equipment status history.sql”


    Now while creating this query, I found a design flaw in the `APPlant` database.
    I did not do it on purpose, but I used it to make lemonade out of lemons.


    What do I mean?


    I found an opportunity to discuss how sometimes you are given requirements for
    a query that cannot be satisfied unless you find roundabout ways to join all the
    tables you need. As you pursue the roundabout trials and errors, you realize that
    the database design is flawed. Something is missing. You get the query to work,
    but it performs badly in terms of performance, and you have to check you did not
    introduce data anomalies like duplicates.


    Specifically, I found that my design had no way to directly link the Equipment
    table to the Location table. The way the database is designed, one needs to link
    the Equipment table to either the Valve, Motor, Turbine, or Generator table, so
    you can link these to the Location table. Stay tuned for the fix.


    Let’s look at workarounds first.


    Here is the first cut of the query with the workaround. The query is based on
    a `CTE`, so I split the discussion into two parts.


    Please refer to Listing [8-24](#527021_1_En_8_Chapter.xhtml#PC34) for the `CTE`
    block.


    ```

    WITH EquipStatusCTE (

    StatusYear,StatusMonth,EquipmentId,EquipAbbrev,

    EquipOnlineStatusCode,EquipOnLineStatusDesc,StatusCount

    )

    AS (

    SELECT YEAR(ESBH.CalendarDate) AS StatusYear

    ,MONTH(ESBH.CalendarDate) AS StatusMonth

    ,ESBH.EquipmentId

    ,E.EquipAbbrev

    ,ESBH.EquipOnLineStatusCode

    ,EOLSC.EquipOnLineStatusDesc

    ,COUNT(*) AS StatusCount

    FROM Reports.EquipmentDailyStatusHistoryByHour ESBH

    JOIN DimTable.Equipment E

    ON ESBH.EquipmentId = E.EquipmentId

    JOIN DimTable.EquipOnlineStatusCode EOLSC

    ON ESBH.EquipOnlineStatusCode = EOLSC.EquipOnlineStatusCode

    GROUP BY YEAR(ESBH.CalendarDate)

    ,MONTH(ESBH.CalendarDate)

    ,ESBH.EquipmentId

    ,E.EquipAbbrev

    ,ESBH.EquipOnLineStatusCode

    ,EOLSC.EquipOnLineStatusDesc

    )

    Listing 8-24

    Seven-Million-Row Window Aggregate Query

    ```


    As can be seen we are joining two dimension tables to a denormalized report table
    called `Reports.EquipmentDailyStatusHistoryByHour`. The number of the status codes
    that identify whether a piece of equipment is either online or offline due to
    maintenance or faults is what we want to count. Some standard reporting columns
    are included like the year, month, equipment ID, abbreviation (type of equipment),
    status code, and description.


    Since we are using the `COUNT()` function without an `OVER()` clause, we need
    to include a `GROUP BY` clause. This will add to the processing time.


    Here comes the query part. This is where the workaround to retrieve equipment
    locations is solved by a series of `UNION` query blocks nested in a query that
    makes up an inline table.


    Please refer to Listing [8-25](#527021_1_En_8_Chapter.xhtml#PC35).


    ```

    SELECT ES.StatusYear AS ReportYear

    ,ES.StatusMonth AS Reportmonth

    ,EP.LocationId

    ,ES.EquipmentId

    ,StatusCount

    ,SUM(StatusCount) OVER(

    PARTITION BY ES.EquipmentId,ES.StatusYear

    ORDER BY ES.EquipmentId,ES.StatusYear,ES.StatusMonth

    ) AS SumStatusEvent

    ,ES.EquipOnlineStatusCode

    ,ES.EquipOnLineStatusDesc

    ,EP.PlantId

    ,L.LocationId

    ,P.PlantName

    ,P.PlantDescription

    ,ES.EquipAbbrev

    ,EP.UnitId

    ,EP.UnitName

    ,E.SerialNo

    FROM EquipStatusCTE ES

    INNER JOIN DimTable.Equipment E

    ON ES.EquipmentId = E.EquipmentId

    INNER JOIN (

    SELECT PlantId,LocationId,EquipmentId,MotorId AS UnitId,

    MotorName AS UnitName

    FROM DimTable.Motor

    UNION

    SELECT PlantId,LocationId,EquipmentId,ValveId AS UnitId,

    ''Valve - '' + ValveName AS UnitName

    FROM DimTable.Valve

    UNION

    SELECT PlantId,LocationId,EquipmentId,TurbineId AS UnitId,

    TurbineName AS UnitName

    FROM DimTable.Turbine

    UNION

    SELECT PlantId,LocationId,EquipmentId,

    GeneratorId AS UnitId,GeneratorName AS UnitName

    FROM DimTable.Generator

    ) EP

    ON ES.EquipmentId = EP.EquipmentId

    INNER JOIN DimTable.Plant P

    ON EP.PlantId = P.PlantId

    INNER JOIN DimTable.Location L

    ON EP.PlantId = L.PlantId

    AND EP.LocationId = L.LocationId

    WHERE ES.StatusYear = 2002

    AND ES.EquipOnlineStatusCode = ''0001''

    GO

    Listing 8-25

    Equipment Status Code Totals Rollup Query

    ```


    Yes, it''s messy!


    First of all, we use the `SUM()` aggregate function with an `OVER()` clause to
    set up the rolling calculations. The partition is defined by equipment ID and
    status. The `ORDER BY` clause defines the logical order for processing by the
    equipment ID, status year, and status month columns (let’s just say the `ORDER
    BY` clause sorts the rows in the order that is required for processing to achieve
    the desired results).


    Now for the workaround. In the `FROM` clause, I defined an inline table by retrieving
    the columns required to link a piece of equipment to the correct plant and location
    by a series of three `UNION` blocks. The queries retrieve the required columns
    from the Motor, Valve, Turbine, and Generator tables.


    The results are given an alias of `EP,` which is used in the `FROM` clause to
    join the other tables to this inline table via the `EquipmentId` column. Not pretty
    but it works. But how fast?


    This is the design flaw. There should be an association table or dimension table
    to store this data, so it does not have to be assembled each time this query is
    run. We will fix this shortly.


    Let’s look at the results of this query. Please refer to Figure [8-36](#527021_1_En_8_Chapter.xhtml#Fig36)
    for the partial results.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig36_HTML.png)


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 9 columns. The
    columns of report year, report month, location I D, status count, and sum status
    event are highlighted.


    Figure 8-36


    Rolling equipment status summaries by month


    Looks like the rolling sums are working. A quick check shows the rolling summaries
    work: 607 + 578 = 1185 for the first two months’ flow. When the equipment ID changes,
    the failures are reset for January, and the rolling process begins again.


    The important columns are up front, so you can see the year and month information,
    the location, and the equipment ID, followed by the counts and rolling summaries,
    and the detail columns come next.


    This query took two seconds to run. Not bad considering we are going against a
    seven-million-row-plus table on a laptop.


    Let’s look at the baseline query plan; it will be a large one. Please refer to
    the following three figures so we can understand what is going on in terms of
    the estimated execution plan and flow.


    Please refer to Figure [8-37](#527021_1_En_8_Chapter.xhtml#Fig37).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig37_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen has a message and execution plan for query 1\. Table
    scan cost 0%, and compute scalar cost 0%.'
  trans: "## 七百万行查询：性能调优\n\n让我们再看一个查询。我们一直在中小型表上编写查询。这让我们得以学习和解读估计的查询计划及各种统计数据。让我们尝试一个超过七百万行的表，看看查询计划是什么样的！创建和加载此表的代码位于本章的文件夹中，文件名为\n\
    \n> “ch08 – load large equipment status history.sql”\n\n在创建此查询时，我发现 `APPlant`\
    \ 数据库中存在一个设计缺陷。我并非有意为之，但我利用它化弊为利。\n\n我是什么意思？\n\n我发现这是一个机会，可以讨论有时你收到的查询需求，除非你找到迂回的方式来连接所有需要的表，否则无法满足。在你进行迂回的试错过程中，你意识到数据库设计存在缺陷。某些东西缺失了。你让查询得以运行，但在性能方面表现不佳，并且你必须检查是否引入了诸如重复项之类的数据异常。\n\
    \n具体来说，我发现我的设计无法直接将 `Equipment` 表链接到 `Location` 表。数据库的设计方式是，需要将 `Equipment` 表链接到\
    \ `Valve`、`Motor`、`Turbine` 或 `Generator` 表之一，然后才能将它们链接到 `Location` 表。修复方案稍后揭晓。\n\
    \n让我们先看看变通方法。\n\n这是采用变通方法的查询初稿。该查询基于一个 `CTE`，因此我将讨论分为两部分。\n\n`CTE` 块请参阅清单 8-24。\n\
    \n```sql\nWITH EquipStatusCTE (\n    StatusYear,StatusMonth,EquipmentId,EquipAbbrev,\n\
    \    EquipOnlineStatusCode,EquipOnLineStatusDesc,StatusCount\n)\nAS (\n    SELECT\
    \ YEAR(ESBH.CalendarDate) AS StatusYear\n          ,MONTH(ESBH.CalendarDate) AS\
    \ StatusMonth\n          ,ESBH.EquipmentId\n          ,E.EquipAbbrev\n       \
    \   ,ESBH.EquipOnLineStatusCode\n          ,EOLSC.EquipOnLineStatusDesc\n    \
    \      ,COUNT(*) AS StatusCount\n    FROM Reports.EquipmentDailyStatusHistoryByHour\
    \ ESBH\n    JOIN DimTable.Equipment E\n        ON ESBH.EquipmentId = E.EquipmentId\n\
    \    JOIN DimTable.EquipOnlineStatusCode EOLSC\n        ON ESBH.EquipOnLineStatusCode\
    \ = EOLSC.EquipOnlineStatusCode\n    GROUP BY YEAR(ESBH.CalendarDate)\n      \
    \      ,MONTH(ESBH.CalendarDate)\n            ,ESBH.EquipmentId\n            ,E.EquipAbbrev\n\
    \            ,ESBH.EquipOnLineStatusCode\n            ,EOLSC.EquipOnLineStatusDesc\n\
    )\n```\n\n清单 8-24\n七百万行窗口聚合查询\n\n如我们所见，我们将两个维度表连接到一个名为 `Reports.EquipmentDailyStatusHistoryByHour`\
    \ 的非规范化报告表。我们想要统计的是用于识别设备是在线还是因维护或故障而离线的状态码数量。包含了一些标准的报告列，如年份、月份、设备 ID、缩写（设备类型）、状态码和描述。\n\
    \n由于我们使用的是不带 `OVER()` 子句的 `COUNT()` 函数，因此需要包含一个 `GROUP BY` 子句。这会增加处理时间。\n\n接下来是查询部分。这里是通过一系列嵌套在构成内联表的查询中的\
    \ `UNION` 查询块，来解决获取设备位置的变通方法。\n\n请参阅清单 8-25。\n\n```sql\nSELECT ES.StatusYear AS\
    \ ReportYear\n      ,ES.StatusMonth AS Reportmonth\n      ,EP.LocationId\n   \
    \   ,ES.EquipmentId\n      ,StatusCount\n      ,SUM(StatusCount) OVER(\n     \
    \      PARTITION BY ES.EquipmentId,ES.StatusYear\n           ORDER BY ES.EquipmentId,ES.StatusYear,ES.StatusMonth\n\
    \       ) AS SumStatusEvent\n      ,ES.EquipOnlineStatusCode\n      ,ES.EquipOnLineStatusDesc\n\
    \      ,EP.PlantId\n      ,L.LocationId\n      ,P.PlantName\n      ,P.PlantDescription\n\
    \      ,ES.EquipAbbrev\n      ,EP.UnitId\n      ,EP.UnitName\n      ,E.SerialNo\n\
    FROM EquipStatusCTE ES\nINNER JOIN DimTable.Equipment E\n    ON ES.EquipmentId\
    \ = E.EquipmentId\nINNER JOIN (\n    SELECT PlantId,LocationId,EquipmentId,MotorId\
    \ AS UnitId,\n           MotorName AS UnitName\n    FROM DimTable.Motor\n    UNION\n\
    \    SELECT PlantId,LocationId,EquipmentId,ValveId AS UnitId,\n           'Valve\
    \ - ' + ValveName AS UnitName\n    FROM DimTable.Valve\n    UNION\n    SELECT\
    \ PlantId,LocationId,EquipmentId,TurbineId AS UnitId,\n           TurbineName\
    \ AS UnitName\n    FROM DimTable.Turbine\n    UNION\n    SELECT PlantId,LocationId,EquipmentId,\n\
    \           GeneratorId AS UnitId,GeneratorName AS UnitName\n    FROM DimTable.Generator\n\
    ) EP\n    ON ES.EquipmentId = EP.EquipmentId\nINNER JOIN DimTable.Plant P\n  \
    \  ON EP.PlantId = P.PlantId\nINNER JOIN DimTable.Location L\n    ON EP.PlantId\
    \ = L.PlantId\n   AND EP.LocationId = L.LocationId\nWHERE ES.StatusYear = 2002\n\
    \  AND ES.EquipOnlineStatusCode = '0001'\nGO\n```\n\n清单 8-25\n设备状态码总计汇总查询\n\n\
    是的，它很混乱！\n\n首先，我们使用带 `OVER()` 子句的 `SUM()` 聚合函数来设置滚动计算。分区由设备 ID 和状态定义。`ORDER BY`\
    \ 子句定义了按设备 ID、状态年份和状态月份列进行处理的逻辑顺序（可以这么说，`ORDER BY` 子句按实现所需结果所需的顺序对行进行排序）。\n\n\
    现在说说变通方法。在 `FROM` 子句中，我通过三个 `UNION` 块检索所需列，定义了一个内联表，以将设备链接到正确的工厂和位置。这些查询从 `Motor`、`Valve`、`Turbine`\
    \ 和 `Generator` 表中检索所需的列。\n\n结果被赋予别名 `EP`，在 `FROM` 子句中用于通过 `EquipmentId` 列将其他表连接到此内联表。虽然不美观，但它有效。但速度如何？\n\
    \n这就是设计缺陷。应该有一个关联表或维度表来存储这些数据，这样就不必在每次运行此查询时都重新组装。我们很快就会修复它。\n\n让我们看看此查询的结果。部分结果请参见图\
    \ 8-36。\n\n![](img/527021_1_En_8_Fig36_HTML.png)\n\nch08 queries V 2 dot sql 窗口的截图。顶部屏幕显示一些程序代码。底部屏幕呈现结果表。该表有\
    \ 9 列。报告年份、报告月份、位置 I D、状态计数和状态事件总和列被高亮显示。\n\n图 8-36\n按月滚动的设备状态摘要\n\n看起来滚动汇总在工作。快速检查显示滚动汇总有效：前两个月的故障数分别是\
    \ 607 + 578 = 1185。当设备 ID 变更时，一月份的故障数会重置，滚动过程重新开始。\n\n重要的列放在前面，因此你可以看到年份和月份信息、位置和设备\
    \ ID，然后是计数和滚动摘要，详细列紧随其后。\n\n此查询耗时两秒运行。考虑到我们是在笔记本电脑上对一张超过七百万行的表进行查询，表现不错。\n\n让我们看看基线查询计划；它会很大。请参考下面的三张图，以便我们理解估计的执行计划和流程。\n\
    \n请参阅图 8-37。\n\n![](img/527021_1_En_8_Fig37_HTML.png)\n\nch08 queries V 2 dot\
    \ sql 窗口的截图。顶部屏幕显示一些程序代码。底部屏幕显示查询 1 的消息和执行计划。表扫描成本 0%，计算标量成本 0%。"
- fmt: '# Figure 8-37: Estimated query plan – part 1


    Notice the clustered index scan is being used. This comes at a cost of 92%, so
    most of the work is performed here. Notice the table scans for the `Valve`, `Motor`,
    `Generator`, and `Turbine` tables. These are all 0% cost. These are small tables
    so there is no performance issue. There are a lot of table scans and also sorts,
    but it seems that all these costs are 0. Let’s look at the next section of the
    plan.


    Please refer to Figure [8-38](#527021_1_En_8_Chapter.xhtml#Fig38).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig38_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The screen has a message
    and execution plan for query 1. Compute scalar, parallelism, stream aggregate,
    window spool, segment, sort, merge join, hash match, concatenation, and all cost
    0%.


    # Figure 8-38: Estimated baseline execution plan, part 2


    By the way, I call it a baseline execution plan because it is the first plan we
    generate and analyze so we can come up with some enhancements to increase performance.
    Then we generate another estimated execution plan to see if our enhancements worked.


    By now we pretty much know what the tasks are, and they are all 0% cost although
    the flow looks very complex with multiple branches with sorts, nested loops joins,
    parallelism, and other tasks.


    There are different tasks to merge the flow like hash match joins, concatenation,
    and merge joins.


    Let’s look at the last section of the plan. Please refer to Figure [8-39](#527021_1_En_8_Chapter.xhtml#Fig39).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig39_HTML.png)


    A screenshot of the c h 08 queries V 2 dot s q l window. The screen has a message
    and execution plan for query 1. Select, compute scalar, parallelism, stream aggregate,
    window spool, segment, sort, merge join, and all cost 0%.


    # Figure 8-39: Estimated query plan, part 3


    The last section of the plan is a single stream and branch. Dare we say that the
    leftmost section is the trunk and as it flows to the right we encounter the branches?
    Just like an inverted tree structure.


    Back to reality, I almost forgot that the estimated execution plan is suggesting
    an index. Although we did use the clustered index, it did not do the job. Let’s
    see what the index looks like in Listing [8-26](#527021_1_En_8_Chapter.xhtml#PC36).


    ```

    /*

    Missing Index Details from SQLQuery7.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APPlant
    (DESKTOP-CEBK38L\Angelo (54))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 88.1301%.

    */

    DROP INDEX IF EXISTS ieEquipOnlineStatusCode

    ON Reports.EquipmentDailyStatusHistoryByHour

    GO

    CREATE NONCLUSTERED INDEX ieEquipOnlineStatusCode

    ON Reports.EquipmentDailyStatusHistoryByHour(EquipOnlineStatusCode)

    GO

    Listing 8-26

    Suggested Index

    ```


    If we create this index, it claims execution will be improved by 86.27%. Sounds
    good. Let’s give it a try.


    We copy and paste the suggested index template, give it a name, and execute it.
    (I added the `DROP INDEX` code in case you are experimenting with query plans
    and need to create, drop, and recreate the index.) Now we generate a second estimated
    query plan.


    Please refer to Figure [8-40](#527021_1_En_8_Chapter.xhtml#Fig40).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig40_HTML.png)


    A screenshot of the c0h08 queries V 2 dot sql window. The top screen has some
    programming codes. The bottom screen has a message and execution plan for query
    1. The filter, table scan, and compute scalar, all cost 0%, and index seek costs
    90%.


    # Figure 8-40: Updated estimated query plan


    Notice the clustered index scan has been replaced by an index seek task on the
    new index. A seek is better than a scan, remember? We still have those four table
    scans on the `Valve`, `Motor`, `Turbine`, and `Generator` tables though (by the
    way, the query took two seconds to run).


    An interesting set of `IO` and `TIME` statistics are generated by this query.
    Please refer to Figure [8-41](#527021_1_En_8_Chapter.xhtml#Fig41).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig41_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents some data. logical reads 22938, read-ahead reads
    22722, C P U time 1111 milliseconds, and elapsed time 2388 milliseconds.


    # Figure 8-41: IO and TIME statistics


    I will not go through all the results, but notice the logical reads on the physical
    table coming in at 22,958 and read-ahead reads coming in at 22,722. Lastly, CPU
    execution time is 1111 ms and elapsed time is 2388 ms.


    This is a large table, and the only thing you could do to increase performance
    is to create the table as a partitioned table where the years are spread out across
    multiple physical disks or LUNS on a SAN. This is about the only way to manage
    performance when you are dealing with millions of rows or more of data! This strategy
    works well when data can be split by years, one disk per year.


    Next, we correct the design flaw by creating and loading an association table
    that links equipment to plant and location. We can consider this as a dimension
    table as it can be used directly on its own with fact tables or it can be used
    to link two other dimensions together. Please refer to Listing [8-27](#527021_1_En_8_Chapter.xhtml#PC37).


    ```

    DROP TABLE IF EXISTS [DimTable].[PlantEquipLocation]

    GO

    CREATE TABLE [DimTable].[PlantEquipLocation](

    [EquipmentKey] [int] NOT NULL,

    [PlantId]     [varchar](8) NOT NULL,

    [LocationId]  [varchar](8) NOT NULL,

    [EquipmentId] [varchar](8) NOT NULL,

    [UnitId]      [varchar](8) NOT NULL,

    [UnitName]    [varchar](136) NOT NULL

    ) ON [AP_PLANT_FG]

    GO

    TRUNCATE TABLE DIMTable.PlantEquipLocation

    GO

    INSERT INTO DIMTable.PlantEquipLocation

    SELECT MotorKey AS EquipmentKey,PlantId,LocationId,EquipmentId,

    MotorId AS UnitId,MotorName AS UnitName

    FROM DimTable.Motor

    UNION

    SELECT ValveKey AS EquipmentKey,PlantId,LocationId,EquipmentId,

    ValveId AS UnitId,''Valve - '' + ValveName AS UnitName

    FROM DimTable.Valve

    UNION

    SELECT TurbineKey AS EquipmentKey,PlantId,LocationId,EquipmentId,

    TurbineId AS UnitId,TurbineName AS UnitName

    FROM DimTable.Turbine

    UNION

    SELECT GeneratorKey AS EquipmentKey,PlantId,LocationId,EquipmentId,

    GeneratorId AS UnitId,GeneratorName AS UnitName

    FROM DimTable.Generator

    GO

    Listing 8-27

    Create and Load the Association Dimension

    ```


    The script includes the `DDL` command to create the table and the `INSERT/SELECT`
    statement required to load the table. The `SELECT` statement is simply the four
    queries connected by the `UNION` operator to load the necessary columns required
    to link the equipment ID to the plant and location.


    So opportunities to solve design problems or enhance a database design surface
    when writing queries to satisfy business analyst or other user requirements. Always
    look for better, more efficient, and simpler ways to achieve a goal.


    Complex, hard-to-read code may impress your managers and friends, but simple code
    that does the job will make your users happy. After all, that’s what it is all
    about. Okay, I will get off my soapbox.


    As a homework assignment, modify the query we just discussed and replace the `UNION`
    code block with the name of this table in the `FROM` clause. Rerun the estimated
    query plan and `IO` and `TIME` statistics to see what improvements, if any, in
    performance are realized with this design enhancement.


    Also, pull out the `CTE` code and use it to build a report table. Run the query
    with the aggregate function against the report table. Any performance improvements?


    What do the estimated query plan and `TIME/IO` statistics show?


    I included the code for this homework assignment in the script for this chapter.
    Try it out on your own first and look at the code if you get stuck. The estimated
    query plan for this revision is drastically different and shorter.'
