    Each year has a single variance value for all months. Notice that the `VARP()`
    function generated a smaller variance in each year. That’s because it took into
    account the entire population of the data set.


    Pop Quiz Answer


    Does the last sentence of the specification give us a clue that we should use
    the `ROW`S clause in our query, or will the default behavior of the `OVER()` clause
    we implement satisfy the requirement? No, looks like the default behavior satisfies
    the requirement. When you include a `PARTITION BY` clause and an `ORDER BY` clause,
    you include all prior rows and following rows relative to the current row being
    processed.


    ## Performance Considerations


    Let’s close out this chapter with a little performance tuning. We will use the
    statistical aggregate functions and the average function in one query to see the
    complexity of the estimated query plan that we will generate.


    Recall we are going to use a report table that replaced the `CTE`, so performance
    should be acceptable even without indexes. This table has only 2,021 rows, so
    it is very small and could very well be implemented as a memory-enhanced table.


    Before we try the memory-optimized table approach, let’s proceed and see if indexes
    help or hinder our performance goals. We will even try a clustered index.


    The requirement is to create a query that can be used to provide a statistical
    profile of plant failures. The `AVG()`, `STDEV()` and `STDEVP(),` and `VAR()`
    and `VARP()` functions will be used. We want rolling values by plant, location,
    calendar year, and month.


    Let’s examine the query.


    Please refer to Listing [8-19](#527021_1_En_8_Chapter.xhtml#PC24).


    ```

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,AVG(CONVERT(DECIMAL(10,2),SumEquipmentFailure)) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingAvg

    ,STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingStdev

    ,STDEVP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingStdevp

    ,VAR(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingVar

    ,VARP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) AS RollingVarp

    FROM [Reports].[EquipmentFailureStatistics]

    GO

    Listing 8-19

    Plant Failure Statistical Profile

    ```


    The partitions are set up the same way for all the `OVER()` clauses. The partitions
    are all using an `ORDER BY` clause that sorts the partition by the `CalendarMonth`
    column. The `ORDER BY` clause is used to define the order in which the window
    functions will be applied to the partition. Let’s check the results before looking
    at the query plan.


    Please refer to Figure [8-28](#527021_1_En_8_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig28_HTML.png)


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 9 columns for
    name, month, calendar month, sum equipment failure, rolling average, rolling Stdev,
    rolling variance, and rolling variance P.


    Figure 8-28


    Equipment failure profile


    Works as expected, rolling value results across the rows. Notice the `NULL` results
    when we are processing the first row of each partition. Also notice the zero values
    when the functions are processing the entire data set or, in other words, the
    entire data set is known.


    You can override the `NULL` results by using a `CASE` block to display 0 instead
    of `NULL` if you want to. This is shown in the following code snippet:


    ```

    CASE WHEN STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    ) IS NULL THEN 0

    ELSE

    STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarMonth

    )

    END AS RollingStdev

    ```


    A little busy but it does the trick. Here comes the estimated query plan.


    Please refer to Figure [8-29](#527021_1_En_8_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig29_HTML.png)


    A screenshot of the ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen has a message and execution plan for query 1\. window
    spool cost 7%, sort cost 63%, and table scan cost 28%.


    Figure 8-29


    Baseline estimated query plan


    We see a table scan, an expensive sort at 63% cost, and a hefty window spool task
    at 7% cost.


