    \ 1。（此步骤计算方差；如果要计算整个总体的方差，则不要减 1。）\n*   现在对方差取平方根，那就是你的标准差。\n\n或者你也可以直接使用 `STDEV()`\
    \ 函数！还有一个 `STDEVP()` 函数。唯一的区别是 `STDEV()` 处理的是数据总体的一部分。这适用于整个数据集未知的情况。`STDEVP()`\
    \ 函数处理整个数据集，即整个数据总体。\n\n再次说明语法：\n\n```sql\nSELECT STDEV( ALL | DISTINCT ) AS [Column\
    \ Alias]\nFROM [Table Name]\nGO\n```\n\n你需要提供一个包含要使用数据的列名。你可以选择性地提供 `ALL` 或 `DISTINCT`\
    \ 关键字。如果你省略它们，与其他函数一样，默认行为将是 `ALL`。使用 `DISTINCT` 关键字将忽略列中的重复值（请确保这是你想要做的）。\n\n\
    以下是业务分析师提供给我们的下一份报告的业务需求：\n\n需要一份报告，显示库存现有数量的平均值和标准差。结果需要针对年份“2003”、位置“LOC1”、库存“INV1”和产品“P033”。报告数据需要用于在\
    \ Microsoft Excel 电子表格中创建正态分布图。\n\n以下是我们为满足规范要求而编写的代码。\n\n请参考代码清单 11-7。\n\n```sql\n\
    WITH YearlyWarehouseReport (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,\n\
    \    ProdId,AvgQtyOnHand\n)\nAS\n(\n    SELECT AsOfYear\n          ,DATEPART(qq,AsOfDate)\
    \ AS AsOfQuarter\n          ,AsOfMonth\n          ,AsOfDate\n          ,LocId\n\
    \          ,InvId\n          ,WhId\n          ,ProdId\n          ,AVG(QtyOnHand)\
    \ AS AvgQtyOnHand\n    FROM Product.Warehouse\n    GROUP BY AsOfYear\n       \
    \     ,DATEPART(qq,AsOfDate)\n            ,AsOfMonth\n            ,AsOfDate\n\
    \            ,LocId\n            ,InvId\n            ,WhId\n            ,ProdId\n\
    )\nSELECT AsOfYear\n      ,AsOfQuarter\n      ,AsOfMonth\n      ,AsOfDate\n  \
    \    ,LocId\n      ,InvId\n      ,WhId\n      ,ProdId\n      ,AvgQtyOnHand AS\
    \ MonthlyAvgQtyOnHand\n      ,AVG(AvgQtyOnHand) OVER (\n            PARTITION\
    \ BY AsOfYear,WhId\n            ORDER BY AsOfYear\n        ) AS YearlyAvg\n  \
    \    ,STDEV(AvgQtyOnHand) OVER (\n            PARTITION BY AsOfYear,WhId\n   \
    \         ORDER BY AsOfYear\n        ) AS YearlyStdev\nFROM YearlyWarehouseReport\n\
    WHERE AsOfYear = 2003\n  AND LocId = 'LOC1'\n  AND InvId = 'INV1'\n  AND ProdId\
    \ ='P033'\nGO\n```\n代码清单 11-7\n库存数量平均值与标准差报告\n"
