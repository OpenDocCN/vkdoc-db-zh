- fmt: '最后，处理在分区的第8行结束。`SUM()`函数使用的行是第6、7和8行。`SUM()`函数返回120（35 + 40 + 45）。没有更多的分区，因此处理结束。


    如果我们想指定当前行前后的多行怎么办？下一个子句可以实现这一点。这是本章中的一个例子，但让我们再回顾一下并做一个更改：


    ```

    ROWS BETWEEN n PRECEDING AND n FOLLOWING

    ```


    在这种情况下，我们希望包括当前行、前一行和后面的两行。如果分区中有更多行，我们完全可以指定前面两行和后面三行，或者在分区的行数范围内的任何组合。


    请参考图 [1-6](#527021_1_En_1_Chapter.xhtml#Fig6)。


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig6_HTML.png)


    一个表格有3列，分别是Key、type和value。行被分区为type A和type B。窗口框架由第1、2、3和4行定义。`SUM`函数应用于第2行。


    **图 1-6**


    **在 n = 1 前一行和 n = 2 后两行之间的行**


    以下是此场景的`ROWS`子句：


    ```

    ROWS BETWEEN 1 PRECEDING AND 2 FOLLOWING

    ```


    从分区的第1行开始，`SUM()`函数只能使用第1、2和3行，因为在第1行之前分区中没有行。`SUM()`函数计算的结果是45（10 + 15 + 20）。


    移动到下一行，分区的第2行，`SUM()`函数可以使用第1、2（当前行）、3和4行。`SUM()`函数计算的结果是70（10 + 15 + 20 + 25）。


    接下来，当前行是第3行。这个窗口框架使用第2、3和第4行，因此`SUM()`函数将计算总和为60（15 + 20 + 25）。


    最后，移动到第4行（分区的最后一行），`SUM()`函数只能使用第3和4行，因为分区中没有更多可用的后续行。结果是45（20 + 25）。


    在下一个分区中的处理以相同的方式继续，忽略前一个分区中的所有行。


    我们已经检查了`ROWS`子句的大多数配置。接下来，我们看看由`RANGE`子句定义的窗口框架，它在逻辑级别上工作。它考虑的是值而不是物理行位置。重复的`ORDER
    BY`值会产生奇怪的行为。


    ### RANGE 框架定义


    我们讨论了`ROWS`子句如何在物理级别上工作，它使用相对于其所属行位置的值。`RANGE`子句在逻辑级别上操作。它考虑的是列的值，而不是分区内的物理行位置。它显示出一种奇怪（在我看来）的行为。如果它在行排序列中遇到重复值，它会将它们全部相加，并在所有具有重复`ORDER
    BY`列的行中显示总计。任何像移动总计这样的值都会失效！（请原谅这个双关语。）


    一个例子说明了这种情况。


    假设你有一个包含五列的小表：Row、Year、Month、Amount和Running Total。该表加载了每年12行，比如2010年和2011年，再加上一个重复的月份行，总共13行。每一行代表一年中的某个月份，但对于三月份，为第一年插入了两行（这就是为什么我们有13行而不是12行）。换句话说，对于同一个月存在一个额外的金额值，导致月份编号重复。


    `RANGE`子句将使用所有具有重复当前月份值的行来应用窗口函数（除了`RANGE`子句中指定的任何其他行）。


    查看部分表格，表 [1-2](#527021_1_En_1_Chapter.xhtml#Tab2)。


    **表 1-2**


    **部分 RANGE 运行总计**


    | Row | Year | Month | Amount | Running Total |

    | --- | --- | --- | --- | --- |

    | 1 | 2010 | 1 | 100.00 | 100.00 |

    | 2 | 2010 | 2 | 100.00 | 200.00 |

    | 3 | 2010 | 3 | 200.00 | 600.00 |

    | 4 | 2010 | 3 | 200.00 | 600.00 |


    当我们到达第3行（两个重复月份中的第一个）时，窗口函数（本例中是`SUM()`）将包括所有之前的行，并将第3行和接下来的第4行的值相加，生成总计值600.00。这会在第3行和第4行都显示。奇怪！人们可能期望第3行的运行总计值为400.00。


    我们再试一个。如果我们应用以下`RANGE`子句来计算运行总计


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    或


    ```

    RANGE UNBOUNDED PRECEDING

    ```


    我们会得到有趣的结果。查看图 [1-7](#527021_1_En_1_Chapter.xhtml#Fig7) 中的部分结果。


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig7_HTML.png)


    一个表格有5列，分别是row、year、month、amount和rolling sum。第5行和第6行被突出显示。`SUM`函数按照第5行中的分区方案应用。


    **图 1-7**


    **按年份和月份的销售额**


    直到我们到达月份值为5（五月）的重复行之前，一切都按预期工作。此分区的窗口框架包括第1-4行和当前第5行，但我们在第6行也有一个重复的月份值，它计算出滚动总计值60。该值在第5行和第6行都显示。聚合操作继续用于其余的月份（未显示）。


    让我们以相反的方向处理行。这是我们的下一个`RANGE`子句：


    ```

    RANGE BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    RANGE UNBOUNDED FOLLOWING (将不起作用)

    ```


    顺便说一下，第二个`RANGE`子句不受支持，但我把它包括进来，以便你知道它不会工作并会产生错误。请参考图 [1-8](#527021_1_En_1_Chapter.xhtml#Fig8)。


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig8_HTML.png)


    一个表格有5列，分别是row、year、month、amount和rolling sum。第5行和第6行被突出显示。`SUM`函数按照第5行中的分区方案应用。


    **图 1-8**


    **RANGE 从当前行到无界后续**


    第5行和第6行代表五月份的两个销售额。由于这些被认为是重复的，第5行显示滚动值90，第6行也显示90，而不是如果你不了解此窗口框架声明的行为时所期望的80。


    请注意，滚动总和值随着行处理从第1行开始向前推进而减少。我们从130开始，以10结束——反向的移动总计。


    把它们放在一起，下面是一个概念视图，说明在使用以下`ROWS`子句时，随着行的处理，窗口框架是如何生成的：


    ```

    ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING

    ```


    这是本章中的一个例子。只考虑type A行的分区。请参考图 [1-9](#527021_1_En_1_Chapter.xhtml#Fig9)。


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig9_HTML.png)


    一个表格有4列，分别是key、type、value和sum。行被分区为type A和type B。


    **图 1-9**


    **窗口框架和已处理的行**


    两个分区都显示出来，这样你就可以看到当它到达下一个分区时框架是如何重置的。


    生成的窗口框架，随着逐行处理，显示了在分区内为窗口函数处理所包含的值。第一个窗口和最后一个窗口只有两行要处理，但第二个和第三个都有三行要处理，即前一行、当前行和下一行。相同的模式在第二个分区中重复。


    让我们通过查看基于我们刚刚检查的图形的简单查询，来检验我们的知识。'
  raw: 'Finally, processing gets and ends at row 8 of the partition. The rows used
    by the `SUM()` function are rows 6, 7, and 8\. The `SUM()` function() returns
    120 (35 + 40 + 45). There are no more partitions so the processing ends.


    What if we want to specify several rows before and after the current row? The
    next clause does the trick. This was one of the example in the chapter, but let’s
    review it again and make one change:


    ```

    ROWS BETWEEN n PRECEDING AND n FOLLOWING

    ```


    In this case we want to include the current row, the prior row, and two following
    rows. We could well specify two rows preceding and three rows following or any
    combination within the number of rows in the partition if we had more rows in
    the partition.


    Please refer to Figure [1-6](#527021_1_En_1_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig6_HTML.png)


    A table has 3 columns for Key, type, and value. The rows are partitioned into
    type A and type B. The window frame is defined by rows 1, 2, 3, and 4\. The SUM
    function is applied to row 2.


    Figure 1-6


    Rows between n = 1 preceding and n = 2 following


    Here is the `ROWS` clause for this scenario:


    ```

    ROWS BETWEEN 1 PRECEDING AND 2 FOLLOWING

    ```


    Starting at row 1 of the partition, the `SUM()` function can only use rows 1,
    2, and 3 as there are no rows in the partition prior to row 1\. The result calculated
    by the `SUM()` function is 45 (10 + 15 + 20).


    Moving to the next row, row 2 of the partition, the `SUM()` function can use rows
    1, 2 (the current row), 3, and 4\. The result calculated by the `SUM()` function
    is 70 (10 + 15 + 20 + 25).


    Next, the current row is row 3\. This window frame uses row 2, 3, and only 4 so
    the `SUM()` function will calculate a total sum of 60 (15 + 20 + 25).


    Finally, moving to row 4 (last row of the partition), the `SUM()` function can
    only use rows 3 and 4 as there are no more available rows following in the partition.
    The result is 45 (20 + 25).


    Processing at the next partition continues in the same fashion, ignoring all rows
    from the prior partition.


    We have pretty much examined most of the configurations for the `ROWS` clause.
    Next, we look at window frames defined by the `RANGE` clause, which works at a
    logical level. It considers values instead of physical row position. Duplicate
    `ORDER BY` values will yield a strange behavior.


    ## RANGE Frame Definition


    We discussed how the `ROWS` clause works at the physical level by using values
    relative to the row positions they belong to. The `RANGE` clause operates at the
    logical level. It considers the values of the column instead of physical row position
    within the partition. It displays a strange (in my opinion) behavior. If it encounters
    duplicate values in the row sort column, it will add them all up and display the
    total in all rows with the duplicate `ORDER BY` column. Any values like moving
    totals will go out the window! (Pardon the pun.)


    An example illustrates this scenario.


    Suppose you have a small table with five columns: Row, Year, Month, Amount, and
    Running Total. The table is loaded with 12 rows for each year, let’s say 2010
    and 2011, plus a duplicate month row giving us a total of 13 rows. Each row represents
    a month in the year, but for the month of March, two rows are inserted for the
    first year (that’s why we have 13 rows and not 12 rows). In other words, an extra
    amount value exists for the same month, resulting in duplicate month numbers.


    The `RANGE` clause will use all the rows with duplicate current month values to
    apply the window function to (in addition to any other rows specified in the `RANGE`
    clause).


    Check out the partial table, Table [1-2](#527021_1_En_1_Chapter.xhtml#Tab2).


    Table 1-2


    Partial RANGE Running Totals


    | Row | Year | Month | Amount | Running Total |

    | --- | --- | --- | --- | --- |

    | 1 | 2010 | 1 | 100.00 | 100.00 |

    | 2 | 2010 | 2 | 100.00 | 200.00 |

    | **3** | **2010** | **3** | **200.00** | **600.00** |

    | **4** | **2010** | **3** | **200.00** | **600.00** |


    When we get to row 3, the first of two duplicate months, the window function (`SUM()`
    in this case) will include all prior rows and add the values in row 3 and the
    next row 4 to generate a total value of 600.00\. This is displayed for both rows
    3 and 4\. Weird! One would expect a running total value of 400.00 for row 3.


    Let’s try another one. If we apply the following RANGE clause to calculate running
    totals


    ```

    RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ```


    or


    ```

    RANGE UNBOUNDED PRECEDING

    ```


    we get interesting results. Check out the partial results in Figure [1-7](#527021_1_En_1_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig7_HTML.png)


    A table has 5 columns for row, year, month, amount, and rolling sum. Rows 5 and
    6 are highlighted. The SUM function is applied using the partition scheme in row
    5.


    Figure 1-7


    Sales by year and month


    Everything works as expected until we get to the duplicate rows with a value of
    5 (May) for the month. The window frame for this partition includes rows 1–4 and
    the current row 5, but we also have a duplicate month value in row 6, which calculates
    the rolling total value 60\. This value is displayed in both rows 5 and 6\. Aggregations
    continue for the rest of the months (not shown).


    Let’s process rows in the opposite direction. Here is our next `RANGE` clause:


    ```

    RANGE BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    RANGE UNBOUNDED FOLLOWING (will not work)

    ```


    By the way, the second `RANGE` clause is not supported, but I included it so you
    are aware that it will not work and generate an error. Please refer to Figure
    [1-8](#527021_1_En_1_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig8_HTML.png)


    A table has 5 columns for row, year, month, amount, and rolling sum. Rows 5 and
    6 are highlighted. The SUM function is applied using the partition scheme in row
    5.


    Figure 1-8


    RANGE between current row and unbounded following


    Rows 5 and 6 represent two sales figures for the month of May. Since these are
    considered duplicates, row 5 displays a rolling value of 90 and row 6 also shows
    90 instead of 80 as one would expect if they did not understand the behavior of
    this window frame declaration.


    Notice, by the way, how the rolling sum values decrease as the row processing
    advances from row 1 onward. We started with 130 and ended with 10 – moving totals
    in reverse.


    Putting it all together, here is a conceptual view that illustrates the generation
    of window frames as rows are processed when the following `ROWS` clause is used:


    ```

    ROWS BETWEEN 1 PRECEDING AND 1 FOLLOWING

    ```


    This was one of the example in the chapter. Only the partition for type A rows
    is considered. Please refer to Figure [1-9](#527021_1_En_1_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig9_HTML.png)


    A table has 4 columns for key, type, value, and sum. The Rows are partitioned
    into type A and type B.


    Figure 1-9


    Window frame and processed rows


    Both partitions are shown so you can see how the frame resets when it gets to
    the next partition.


    The generated window frames, as processing goes row by row, show which values
    are included for the window function to process within the partition. The first
    window and last window only have two rows to process, but the second and third
    both have three rows to process, the prior, current, and next rows. The same pattern
    repeats itself for the second partition.


    Let’s put our knowledge to the test by looking at a simple query based on the
    figures we just examined.'
