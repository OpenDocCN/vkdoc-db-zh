  raw: '### Performance Considerations


    Next, we examine the estimated baseline execution plan for this query.


    Please refer to Figure [11-32](#527021_1_En_11_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig35_HTML.jpg)


    A screenshot of the window. The main page represents the execution plan. The arrows
    point towards the sort cost and the index seek.


    Figure 11-32


    Baseline estimated query plan


    We have a covering index, so we see an index seek with a cost of 22%. And as expected
    the usual expensive sort chimes in at 77%. An index was not recommended by the
    estimated query execution plan, so this query is ready for production.


    As was the case with prior queries, a solid-state drive would mitigate the expensive
    sorts. I encourage you to try creating your own indexes to see if they can get
    the sort down, but 99% of the time, the estimated query plan tool gets it right,
    so to increase performance you need to consider physical improvements like faster
    disk or memory-enhanced tables.


    Last but not least, we might as well check the `TIME` and `IO` statistics.


    Please refer to Figure [11-33](#527021_1_En_11_Chapter.xhtml#Fig36).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig36_HTML.jpg)


    A screenshot of the window. The upper half of the main page represents the S Q
    L query code and the lower half is titled message. The arrows point towards the
    scan count 4, logical reads 6, logical reads 3, physical reads 2, and elapsed
    time 124 m s.


    Figure 11-33


    IO and TIME statistics


    Our SQL Server execution time is 124 ms. The work table has the highest statistics
    with 4 scans and 61 logical reads. This was due to the high sort task.


    The Warehouse table has a scan count value of 1, 3 logical reads, and 2 physical
    reads. So this looks like a well-performing query.


    Let’s now turn our attention to another tool, SSIS, which is the premier ETL tool
    that is a part of the Microsoft SQL Server BI stack. SSIS stands for SQL Server
    Integration Services.


    Note


    Throughout the book we have taken the `CTE` portion of a query and sometimes created
    a report table. Consider that in real production environments, this would be a
    good solution because the report table could be accessed by many different types
    of queries or `SSRS` reports. Each of these queries and reports could simultaneously
    be executed by multiple users. So, if the data is historical and can be at least
    one day old, eliminate the `CTE` and go with a heavily indexed report table.


    ## Enhancing the SSIS Package


    In this last section of the chapter, we will enhance our `SSIS` package by adding
    tasks to create indexes and a task to load the `SSAS` multidimensional cube we
    will be using in the next two chapters. Listing [11-10](#527021_1_En_11_Chapter.xhtml#PC15)
    is the `TSQL` script that contains the code to create the required indexes.


    Each `CREATE` statement will go in a dedicated Execute SQL Task in the SSIS package.


    ```

    /*******************/

    /* CLUSTERED INDEX */

    /*******************/

    DROP INDEX IF EXISTS pkInventoryHistory

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE UNIQUE CLUSTERED INDEX pkInventoryHistory

    ON APInventoryWarehouse.Fact.InventoryHistory (LocKey,InvKey,WhKey,ProdKey,CalendarKey)

    GO

    /***********************/

    /* NON CLUSTERED INDEX */

    /***********************/

    DROP INDEX IF EXISTS ieProdProdTypeQty

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieProdProdTypeQty

    ON APInventoryWarehouse.Fact.InventoryHistory (ProdKey)

    INCLUDE (ProductTypeKey,QtyOnHand)

    GO

    /****************/

    /* Calendar Key */

    /****************/

    DROP INDEX IF EXISTS ieInvHistCalendar

    ON APInventoryWarehouse. Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieInvHistCalendar

    ON APInventoryWarehouse. Fact.InventoryHistory (CalendarKey)

    GO

    /****************/

    /* Location Key */

    /****************/

    DROP INDEX IF EXISTS ieInvHistLocKey

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieInvHistLocKey

    ON APInventoryWarehouse.Fact.InventoryHistory (LocKey)

    GO

    /*****************/

    /* Inventory Key */

    /*****************/

    DROP INDEX IF EXISTS ieInvHistInvKey

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieInvHistInvKey

    ON APInventoryWarehouse.Fact.InventoryHistory (InvKey)

    GO

    /*****************/

    /* Warehouse Key */

    /*****************/

    DROP INDEX IF EXISTS ieInvHistWHKey

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieInvHistWHKey

    ON APInventoryWarehouse.Fact.InventoryHistory (WHKey)

    GO

    /***************/

    /* Product Key */

    /***************/

    DROP INDEX IF EXISTS ieInvHistProdKey

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieInvHistProdKey

    ON APInventoryWarehouse.Fact.InventoryHistory (ProdKey)

    GO

    /********************/

    /* Product Type Key */

    /********************/

    DROP INDEX IF EXISTS ieInvHistProdTypeKey

    ON APInventoryWarehouse.Fact.InventoryHistory

    GO

    CREATE NONCLUSTERED INDEX ieInvHistProdTypeKey

    ON APInventoryWarehouse.Fact.InventoryHistory (ProductTypeKey)

    GO

    UPDATE STATISTICS Fact.InventoryHistory

    GO

    Listing 11-10

    TSQL Script for SSIS Execute TSQL Tasks

    ```


    As you can see, these are standard commands for creating indexes. We will copy
    and paste each individual `CREATE INDEX` command into its own Execute SQL Task.
    We could include all in one Execute SQL Task, but it is best to break them up,
    so in case there is an error, it will be easy to isolate and correct.


    I included a `DROP INDEX` command in case the index already exists so it can be
    rebuilt. Also, the last command is an `UPDATE STATISTICS` command to make sure
    the statistics on the `InventoryHistory` table are up to date after all the indexes
    have been created. An example of table statistics is how many rows are loaded
    in the table, so make sure to keep these up to date.


    Tip


    It is always good policy to update statistics when you create or rebuild indexes;
    `INSERT`, `UPDATE`, or `DELETE` rows; or `TRUNCATE` tables.


    We will not discuss the tasks for creating each individual index because the steps
    are identical to the ones we discussed, which were used to insert rows from the
    transactional inventory database to the inventory warehouse. These are identical
    except instead of `INSERT` commands, we are using `CREATE INDEX` commands just
    discussed.


    For example, refer to Figure [11-34](#527021_1_En_11_Chapter.xhtml#Fig37).


