    presents `IO` and `TIME` statistics. Parse and compile times for `CPU` and elapsed
    are 0, 0, and 0, 44 milliseconds in the old and new plans. Execution times for
    `CPU` and elapsed are 0 and 77 milliseconds in the new. 72 rows are affected.


    **Figure 10-28**


    **Comparing IO and TIME statistics**


    We can see that there are a lot less statistics because all the table joins were
    eliminated for the dimension tables as they are now in the `INSERT` statement
    that would run once a day at off hours.


    The work table scan count and logical reads remained the same. The read-ahead
    reads went down from 29 to 0. Lastly, the new report table shows logical reads
    went down from 24 to 13 but physical reads went up by 1. Lastly though, the `SQL
    Server` execution elapsed time went down from 98 ms to 30 ms.


    So, it looks like this approach worked again.


    **Reminder**


    When running these types of tests that compare two approaches, remember to always
    run `DBCC` to clear buffers in each session so you get accurate results. Run the
    queries and compare three or four times to get an average to make sure there were
    no anomalies.


    As you might be thinking, we have a few report tables now, so when using this
    approach, see if you can merge similar tables so as to reduce the number of report
    tables. Things could get complicated very fast with the proliferation of the tables.
    We want our physical database architecture to be as simple and compact as possible.


    We are going to change gears and look at a new approach for our analysis. We are
    now going to look at another tool you can add to your toolkit for analyzing data.
    `SQL Server Analysis Services` (`SSAS`) is a powerful platform for creating multidimensional
    cubes based on millions of rows of data!


    ## SQL Server Analysis Services


    We are now going to introduce multidimensional structures called cubes so we can
    perform slicing and dicing of data and also drill up and down the various hierarchies
    defined by our dimensions.


    Slicing and dicing refers to the ability to change perspectives by introducing
    and removing dimension columns as we view the cube, just like we did with pivot
    tables.


    Navigating hierarchies refers to the ability to view data by different levels
    of aggregations, like by year, quarter, month, week, and day and then in reverse.


    As I stated earlier, these are similar to pivot tables except they can process
    millions of rows, which would challenge an Excel spreadsheet. The additional good
    news is that the Excel spreadsheets can connect to cubes and create pivot tables
    based on them (the number of rows processed might be an issue as there are limits).


    Lastly, if you know how to use `Power BI`, you can connect `Power BI` to `SSAS`
    multidimensional cubes in order to create some impressive scorecards, dashboards,
    and reports, so your toolbox is really evolving!


    Here is a little taste! Please refer to **Figure 10-29**.


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig40_HTML.png)


    A screenshot of the `Power BI` untitled file window. It presents a star schema
    with equipment type, calendar, location, and equipment failure connected to equipment
    failure measures. On the right panel are properties with 3 options and fields
    with 11 components and a search box.


    **Figure 10-29**


    **`Power BI` showing the `APPlant` `STAR` schema**


    In the last three chapters of the book, when we apply our window functions to
    an inventory database business model, we will take a detailed look at `Power BI`.
    For now, let’s see the main steps involved in creating a multidimensional cube
    with `SSAS`.


    There are several steps involved:


    *   Create a data source.

    *   Create a data view.

    *   Define dimensions.

    *   Define the cube.

    *   Define the dimension usage (per dimension).

    *   Build and deploy the cube.

    *   Browse the cube.

    *   Create a pivot table with the cube.


    Creating a data source is basically identifying the `SSAS` server and supplying
    credentials to enable users and developers to connect to the cube (or create one).


    The data source view is basically a `STAR` or `SNOWFLAKE` schema of the tables
    that will be used to create and populate the view, so this is a necessary component.
    There are two models that you can create with `SSAS`; one is the tabular model
    and the other is the multidimensional model. You define the type when you first
    install `SSAS` on your laptop, workstation, or server. We will concentrate on
    the multidimensional model.


    Once you have the source and data view defined, you need to identify the tables
    you will use as dimensions and the fact table you will use to populate the measures
    in the cube.


    Once these tasks are completed you need to link the dimensions to the cube; this
    is called defining the dimension usage.


    Once all these tasks are completed, you need to build the cube and deploy the
    cube to the `SSAS` server instance installed on your environment (you can have
    both tabular and multidimensional instances installed if you have enough memory,
    `CPU`, and disk space). Now you can browse the cube or connect to it with Microsoft
    `Excel` or `Power BI`.


    Please refer to **Figure 10-30**.


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig41_HTML.png)


    A screenshot of the `Power BI` dashboard. It presents a line graph of failure
    versus plant `ID` with 16 descending curves. It also has a table of 7 columns
    and 14 rows. On the right panel are filters with 2 options, visualizations, and
    fields with components and subcomponents and a search box.


    **Figure 10-30**


    **A simple `Power BI` dashboard**'
