    ### Data Warehouse Query


    Let’s see if querying a `SNOWFLAKE` database will yield interesting performance
    characteristics compared with the query plans and statistics of the transactional
    database. I think you know by now that the query will use a number of `JOIN` clauses,
    and this will make for an interesting estimated query plan.


    The business specifications are mostly the same except there is no `WHERE` clause.
    We calculate the standard deviation and average of the sum of quantities.


    Please refer to Listing [11-8](#527021_1_En_11_Chapter.xhtml#PC13).


    ```sql

    SELECT C.CalendarYear

    ,C.CalendarMonth

    ,C.CalendarDate

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,P.ProdId

    ,P.ProdName

    ,SUM(QtyOnHand) As QtyOnHandSum

    ,AVG(CONVERT(DECIMAL(10,2),IH.QtyOnHand)) OVER (

    PARTITION BY C.CalendarYear

    ORDER BY C.CalendarMonth

    ) AS RollingAvg

    ,STDEV(SUM(IH.QtyOnHand)) OVER (

    PARTITION BY C.CalendarYear

    ORDER BY C.CalendarMonth

    ) AS RollingStdev

    FROM Fact.InventoryHistory IH

    JOIN Dimension.Calendar C

    ON IH.CalendarKey = C.CalendarKey

    JOIN Dimension.Location L

    ON IH.LocKey = L.LocKey

    JOIN Dimension.Warehouse W

    ON IH.WhKey = W.WhKey

    JOIN Dimension.Inventory I

    ON IH.InvKey = I.InvKey

    JOIN Dimension.Product P

    ON IH.ProdKey = P.ProdKey

    JOIN Dimension.ProductType PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    WHERE L.LocId = ''LOC1''

    AND I.InvId = ''INV1''

    AND W.WhId = ''WH112''

    AND P.ProdName LIKE ''French Type 1 Locomotive%''

    AND P.ProdId = ''P101''

    AND C.CalendarYear = 2002

    GROUP BY C.CalendarYear

    ,C.CalendarMonth

    ,C.CalendarDate

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,P.ProdId

    ,P.ProdName

    ,QtyOnHand

    GO

    ```


    Listing 11-8

    Another Example SNOWFLAKE Query


    As can be seen, a `LIKE` predicate is used, which will cost us performance-wise.
    We see all the `JOIN` clauses as we need data from six dimension tables. The specifications
    for the `STDEV()` function and `OVER()` clause call for a partition defined by
    year and an `ORDER BY` clause sorted by calendar month. We also need a mandatory
    `GROUP BY` clause and pass the window functions the `SUM(QtyOnHand)` to generate
    the results. We also had to convert the quantity on hand to calculate the average
    to a `DECIMAL` data type as it is so small we get fractional parts.


    Let’s check out the results.


    Please refer to Figure [11-28](#527021_1_En_11_Chapter.xhtml#Fig31).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig31_HTML.png)


    A screenshot of the S Q L work area. The main page is titled Messages and depicts
    a table. The columns are titled calendar year, calendar month, calendar date,
    location I D, inventory I D, product I D, product name, quantity on hand sum,
    rolling average, and rolling standard deviation.


    Figure 11-28


    Rolling monthly standard deviations


    The results look good. As the standard deviation and average were calculated over
    the year, this will allow us to generate some interesting bell curves if we copy
    and paste the results into a Microsoft Excel spreadsheet. Consider this a homework
    assignment and try it on your own.


    Homework


    Try modifying the `SUM()` function that calculates two month’s rolling totals.


    I know you have been waiting to see the query plan, so here it is.'
