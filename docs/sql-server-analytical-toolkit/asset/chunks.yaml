- fmt: '## ROWS Frame Definition


    The `ROWS` clause operates on the physical set of rows belonging to the partition.
    Because the `ROWS` clause operates on the rows in the partition, it is considered
    a physical operation.


    The `ORDER BY` clause allows you to specify the logical order of the rows in the
    partition so the window function can evaluate them. For example, if you have sales
    data by year and month, you would set the logical order of the rows in the partition
    by month so that the `SUM()` function can generate rolling year-to-date totals
    for each month. You can specify optional ascending and descending sort orders
    by using the keywords `ASC` and `DESC`.


    The `ROWS` clause allows you to define the window frame into the partition. There
    are several variations of the `ROWS` clause that we need to be aware of.


    ### Defining the Frame: From the Start to the Current Row


    The following are two variations that generate the same window frame:


    ```

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ROWS UNBOUNDED PRECEDING

    ```


    This clause tells the function to operate on the current row and all rows preceding
    the current row if there are any in the partition. A simple diagram in Figure
    [1-2](#527021_1_En_1_Chapter.xhtml#Fig2) makes it all clear.


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig2_HTML.png)

    *Figure 1-2: Include the current row and all preceding rows*


    If we start at row 1, since there are no prior rows in the partition before this
    row, the `SUM()` function returns the value 10.


    Moving on to row 2, the `SUM()` function will include the only available prior
    row (row 1), so the result is 25 (10 + 15).


    Next (shown in the preceding figure), the current row to be processed is row 3.
    The `SUM()` function will evaluate row 3 plus rows 1 and 2 in order to generate
    the total. The result is 45 (10 + 15 + 20).


    Lastly, moving to row 4, the function will include the current row and all prior
    rows in its calculation and return 70 (10 + 15 + 20 + 25). Processing now concludes
    for this partition.


    Moving to partition B, the processing repeats itself, and only rows from partition
    B are included. All rows in partition A are ignored.


    ### Defining the Frame: From the Current Row to the End


    Our next `ROWS` clause takes us in the opposite direction:


    ```

    ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING

    ROWS UNBOUNDED FOLLOWING (will not work, not supported)

    ```


    The first clause is legal but the second is not. It is not supported. One would
    think that if there is a `ROWS UNBOUNDED PRECEDING`, there should be a `ROWS UNBOUNDED
    FOLLOWING`, but it is not supported at this time. Go figure!


    As stated earlier, this clause takes us in the opposite direction than the prior
    scenario we just discussed. It will allow the aggregate or other window functions
    to include the current row and all succeeding rows until all rows in the partition
    are exhausted. Our next diagram in Figure [1-3](#527021_1_En_1_Chapter.xhtml#Fig3)
    shows us how this works.


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig3_HTML.png)

    *Figure 1-3: Process the current row and all succeeding rows*


    Remember rows are processed one by one in the partition.


    If processing starts at row 1, then all four values are included to calculate
    a sum of 70 (10 + 15 + 20 +25).


    Next, if the current row being processed is row 2 as in the preceding example,
    then the `SUM()` function will include rows 2–4 to generate the total value. It
    will generate a result of 60 (15 + 20 + 25).


    Moving on to row 3, it will only include rows 3 and 4 and generate a total value
    of 45 (20 + 25).


    Once processing gets to row 4, only the current row is used as there are no more
    rows available in the partition. The `SUM()` function calculates a total of 25.


    When processing resumes at the next partition, the entire scenario is repeated.


    ### Limiting the Frame: Fixed Number of Following Rows


    What if we do not want to include all prior or following rows but only a few before
    or after? The next window frame clause will accomplish the trick for limiting
    the number of following rows:


    ```

    ROWS BETWEEN CURRENT ROW AND n FOLLOWING

    ```


    Including this clause in the `OVER()` clause will allow us to control the number
    of rows to include relative to the current row, that is, how many rows after the
    current row are going to be used from the available partition rows. Let’s examine
    another simple example where we want to include only one row following the current
    row in the calculation.


    Please refer to Figure [1-4](#527021_1_En_1_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig4_HTML.png)

    *Figure 1-4: Current row and one row following*


    Here is the window frame clause to include in the `OVER()` clause:


    ```

    ROWS BETWEEN CURRENT ROW AND 1 FOLLOWING

    ```


    Processing starts at row 1. I think by now you understand that only rows 1 and
    2 are used and the result is 25 (10 + 15).


    Next, in the preceding example, row 2 is the current row. If only the next row
    is included, then the `SUM()` function will return a total of 35 (15 + 20).


    Moving to row 3 (the next current row), the `SUM()` function will return 45 as
    the sum (20 + 25).


    Finally, when processing gets to the last row in the partition, then only row
    4 is used and the `SUM()` function returns 25.


    When processing continues to the next partition, the sequence repeats itself ignoring
    the values from the prior partition.


    We can now see how this process creates windows into the partition that change
    as the rows are processed one by one by the window function. Remember, the order
    in which the rows are processed is controlled by the `ORDER BY` clause used in
    the `OVER()` clause.


    ### Limiting the Frame: Fixed Number of Preceding Rows


    The next example takes us in the opposite direction. We want to include the current
    row and the prior two rows (if there are any) in the calculation.


    The window frame clause is:


    ```

    ROWS BETWEEN n PRECEDING AND CURRENT ROW

    ```


    The letter *n* represents an unsigned integer value specifying the number of rows.
    The following example uses 2 as the number of rows.


    Please refer to Figure [1-5](#527021_1_En_1_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_1_Chapter/527021_1_En_1_Fig5_HTML.png)

    *Figure 1-5: Include two prior rows and the current row*


    The window frame for this scenario is:


    ```

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ```


    Starting at row 1 (the current row), the `SUM()` function will only use row 1
    as there are no prior rows. The value returned by the window function is 10.


    Moving to row 2, there is only one prior row so the `SUM()` function returns 25
    (10 + 15).


    Next, the current row is row 3, so the `SUM()` function uses the two prior rows
    and returns a value of 45 (10 + 15 +20).


    In the preceding figure, the current row being processed is row 4 and the preceding
    two rows are included; the `SUM()` function when applied will return a total value
    of 60 (15 + 20 + 25).


    Since all rows of the first partition have been processed, we move to partition
    B, and this time only row 5 is used as there are no prior rows. We are at the
    beginning of the partition. The `SUM()` function returns a total value of 30.


    Processing continues at row 6, so the `SUM()` function processes rows 5 and 6
    (the current and prior rows). The total value calculated is 65 (30 + 35).


    Next, the current row is 7 so the window function will include rows 5, 6, and
    7. The `SUM()` function returns 105 (30 + 35 + 40).'
