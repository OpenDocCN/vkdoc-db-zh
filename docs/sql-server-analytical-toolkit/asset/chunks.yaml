  trans: '

    ## 性能考量


    让我们运行基线估算执行计划。当你自己操作时，请花时间将鼠标指针悬停在每个任务上，查看各个帮助提示面板。记录下哪些参数让你感到困惑，这样你就可以在 Microsoft
    文档网站上查找它们。现在正是提升你对这些重要任务和统计信息认知的好时机。


    注意

    你永远无法记住所有内容；只需理解最常见的几种，例如索引查找和索引扫描。


    请参考图 6-23。


    ![](img/527021_1_En_6_Fig23_HTML.png)

    一个标题为“排名财务查询”的 SQL 应用程序截图。它展示了一个获取查询 1 的程序。它包括了选择、计算标量、Top、序列项目、段、排序、哈希匹配和表扫描的成本。排序成本
    4%，哈希匹配成本 33%，表扫描成本 63%，并用 3 个箭头高亮标出。


    图 6-23

    股票代码分析查询的估算查询计划


    针对一个有 54,057 行的表，存在一个高达 63% 的昂贵表扫描成本，因此建议创建一个索引。接下来，我们看到一个占 33% 的哈希匹配聚合，随后是一个占
    4% 的排序。在我们考虑用报告表替换 `CTE` 之前，让我们先看看建议的索引是什么样子。


    请参考清单 6-11。


    ```sql

    DROP INDEX IF EXISTS eTickerCompanyLowHigh

    ON [MasterData].[TickerPriceRangeHistoryDetail]

    GO

    CREATE NONCLUSTERED INDEX [eTickerCompanyLowHigh]

    ON [MasterData].[TickerPriceRangeHistoryDetail] ([QuoteYear])

    INCLUDE ([Ticker],[Company],[Low],[High])

    GO

    ```

    清单 6-11

    建议的索引


    出于习惯，我总是包含 `DROP INDEX` 命令，以防我需要实验并重建索引。让我们构建索引并生成另一个估算查询计划。


    请参考图 6-24。


    ![](img/527021_1_En_6_Fig24_HTML.png)

    一个标题为“排名财务查询”的 SQL 应用程序截图。它表示一个获取查询 1 的程序。它包括选择、计算标量、Top、序列项目、2 个段、排序、哈希匹配和索引查找。它提出了一个问题：“这些是做什么的？”，一个箭头指向序列项目。


    图 6-24

    股票代码分析查询修订后的查询计划


    像往常一样，索引查找取代了表扫描。像往常一样，哈希匹配和排序的百分比上升了。


    请参考表 6-3。


    表 6-3

    索引前后的成本对比


    | 之前 |   |   | 之后 |   |   |

    | --- | --- | --- | --- | --- | --- |

    | **索引查找** | **哈希匹配** | **排序** | **索引查找** | **哈希匹配** | **排序** |

    | 63% | 33% | 4% | 28% | 63% | 9% |


    我们在这里看到了常见的模式。一个人能构建的索引和报告表数量是有限的。诀窍在于，当你收集用户规格报告时，识别共同的需求，并创建报告表来满足其中的大部分，这样你最终只会拥有二到五张表。否则，事情会变得难以管理，并且由于所有需要更新的索引，数据加载将是一场噩梦。


    回到这个计划。序列项目任务是做什么的？另外，你可能会问自己：“哪些步骤处理了 `MIN()`、`MAX()`、`RANK()` 和 `DENSE_RANK()`
    函数？”


    这些问题可以通过设置 `PROFILE STATISTICS` 参数并重新运行查询来回答。让我们看看结果。


    请参考图 6-25。


    ![](img/527021_1_En_6_Fig25_HTML.png)

    一个标题为“排名财务查询”的 SQL 应用程序截图。它表示一个程序和一个包含三列逻辑操作、参数和定义值的列表。它为计算标量和段提供了参数。定义值对于段和排序是
    NULL。


    图 6-25

    配置文件统计报告


    首要任务是识别那些 **ExprXXXX** 表达式的含义：

    - Expr1003：`MIN()` 函数

    - Expr1004：`MAX()` 函数

    - Expr1005：`RANK()` 函数（在计算标量任务中）

    - Expr1006：`DENSE_RANK()` 函数（在计算标量任务中）

    - Exper1007：Expr1004 – Expr1003


    接下来，让我们回答这个问题：***序列项目任务是用来做什么的？***

    答案是，它用于包含参与计算的列，在本例中是两个排名函数。

    因此，这是一个你无法通过性能调优消除的步骤，除非我们重写查询，使其使用旧的报告表查询方案。换句话说，就是预先计算这些列中的值。


    首先，我们需要比较 `PROFILE STATISTICS` 前后的情况，看看新索引是否有所帮助。请参考图 6-26。


    ![](img/527021_1_En_6_Fig26_HTML.png)

    一个 SQL 应用程序截图。它表示一个比较上下两个选项卡中 14 列列表的程序。一个高亮框描绘了两个选项卡中总子树成本值的比较。两个选项卡各有 9 行。


    图 6-26

    比较配置文件统计信息


    看起来索引前后的场景生成了相同数量的步骤，唯一显示改善的类别是图中高亮的总子树成本，下降了 50% 以上。在这个阶段，我们可能会问：再创建一个索引值得吗？


    接下来，我们需要通过查看 `IO` 和 `TIME` 统计信息来完成性能分析配置文件。请参考图 6-27。


    ![](img/527021_1_En_6_Fig27_HTML.jpg)

    一个标题为“排名财务查询”的 SQL 应用程序截图。它表示查找 IO 和时间统计信息的程序。它指出了两种策略的已用时间，例如 39、129、0 和 17 毫秒。


    图 6-27

    比较两种策略的 IO 和 TIME 统计信息


    是的，我知道，你喜欢那些漂亮的大红箭头！言归正传，我们看到重要的统计值在索引创建后下降了。而这在大多数情况下是预料之中的。前后的逻辑读取分别是 608 和
    123，所以这是令人印象深刻的。物理读取在两种情况下都是 0，扫描计数在两种情况下都是 1。看起来两种查询方法都利用了内存来处理。


    `CPU` 时间和已用时间则好坏参半。`CPU` 时间上升了，但已用时间下降了。

    结论：我们将保留这个索引！下一个主题：我们创建一些数据块来存储财务信息。


    ### NTILE( ) 函数


    还记得这个函数的定义吗？`NTILE()` 函数允许你将数据集中的一行集合划分成数据块或桶（我更喜欢这个术语）。如果你有一个包含 12 行的数据集，并且你想分配
    4 个数据块，那么每个数据块将包含 3 行。当你想要创建数据集时，比如需要评估销售人员表现并根据销售业绩授予奖金时，这个函数就派上用场了。


    既然我们在讨论财务，另一个例子是为投资组合中的股票表现设置桶类别：表现最好的股票在第一个桶中，表现稍差的股票在下一个桶中，依此类推。这样你就可以对它们进行评级，并根据股票落入哪个桶来制定投资策略。


    注意

    如果你有奇数行，比如 15 行，并且你决定创建 4 个数据块，你将得到包含 4 行、4 行、4 行和 3 行的数据块。所以无法控制什么进入哪个数据块；它只是进行划分。


    对于我们的第一个例子，我们将从简单的开始。我们创建数据块，以便用它们来分类一项投资是好、坏还是垃圾！我将清单分成两部分，以便于解释。

    '
- fmt: '# Example 1


    First, we set up a data set consisting of some fictitious stocks and assign them
    ratings of A+, A, B+, B, and JUNK!


    Please refer to Listing [6-12a](#527021_1_En_6_Chapter.xhtml#PC12).


    ```sql

    DECLARE @TickerRating TABLE

    (

    Ticker VARCHAR(8) NOT NULL,

    Rating VARCHAR(8) NOT NULL

    );

    INSERT INTO @TickerRating VALUES

    (''AAA'',''A+''),

    (''AAB'',''A+''),

    (''AAC'',''A+''),

    (''AAD'',''A+''),

    (''BBB'',''A''),

    (''BBC'',''A''),

    (''BBD'',''A''),

    (''BBE'',''A''),

    (''CCC'',''B+''),

    (''CCD'',''B+''),

    (''CCE'',''B+''),

    (''CCE'',''B+''),

    (''DDD'',''B''),

    (''DDE'',''B''),

    (''DDF'',''B''),

    (''DDG'',''B''),

    (''ZZZ'',''JUNK''),

    (''ZZA'',''JUNK''),

    (''ZZB'',''JUNK''),

    (''ZZB'',''JUNK'');

    -- Listing 6-12a

    -- Set Up Ticker Data

    ```


    As usual, let’s use a table variable called `@TickerRating` and insert four stocks
    (or ticker symbols if you like) for each category. We assign ratings to each one
    and load the rows into the table variable. Next, we create a query that will assign
    bucket numbers so we can evaluate them. Please refer to Listing [6-12b](#527021_1_En_6_Chapter.xhtml#PC13).


    ```sql

    DECLARE @RatingBuckets INT;

    SELECT @RatingBuckets = COUNT(DISTINCT Rating)

    FROM @TickerRating;

    SELECT Ticker

    ,Rating

    ,CASE

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 1

    THEN ''Highly Recommend''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 2

    THEN ''Recommend''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 3

    THEN ''Worth a shot''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 4

    THEN ''Are you feeling lucky?''

    WHEN NTILE(@RatingBuckets) OVER (ORDER BY Ticker) = 5

    THEN ''Run away!''

    END AS AnalystRecommends

    FROM @TickerRating;

    GO

    -- Listing 6-12b

    -- Generate Recommendation Tiles

    ```


    This time we generate the number we will use to define the tiles by counting the
    distinct rating categories. In our case we will need to set up five tiles. Next,
    we create a query that contains a `CASE` block so we can decode the tile number
    and generate a message based on the value, for example, 1 for the first tile means
    that stocks in this bucket are “Highly Recommended.” Very simple concept, but
    it illustrates we can use tiles to categorize things.


    Let’s see the results in Figure [6-28](#527021_1_En_6_Chapter.xhtml#Fig28).


    ![A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a scroll bar for the object explorer on the left. It has a program and a list
    of ticker, rating, and analyst recommends on the right side of the page with 20
    rows.](images/527021_1_En_6_Chapter/527021_1_En_6_Fig28_HTML.jpg)


    **Figure 6-28**

    Financial adviser investment recommendation


    As can be seen, the recommendations are very professional and sophisticated. My
    favorite recommendations are for ratings B and JUNK.


    # Performance Considerations


    Although this is a very small table, it has several steps, so I thought it would
    be interesting to see what its estimated performance plan looks like. Please refer
    to Figure [6-29](#527021_1_En_6_Chapter.xhtml#Fig29).


    ![A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program. It has different values under the execution plan for queries 1, 2,
    and 3.](images/527021_1_En_6_Chapter/527021_1_En_6_Fig29_HTML.png)


    **Figure 6-29**

    `NTILE` query estimated execution plan


    We actually have three plans, the first for setting up and inserting rows into
    the table variable. Notice the cost for this query is 26% relative to the three-query
    batch script.


    The second plan is for the query that calculates the number of tiles based on
    how many rating categories there are. The cost for this query is 37%.


    Last but not least is the query that has the `CASE` block used to generate a recommendation
    based on the tile number of the stock. Lots of steps, and the cost for this query
    is 37% relative to the entire batch.


    So, if we add up all three costs, 26% + 37% + 37%, we should get 100%, which is
    what we get.


    Since the table is so small, we will not bother doing some performance tuning,
    but look at all the steps: table scan, table spooling, nested joins, etc. If our
    table had thousands or more rows, performance might become an issue.'
