- fmt: '## PERCENTILE_DISC( ) Function


    Here is our percentile discrete example. The `PERCENTILE_DISC()` function works
    on a discrete set of data based on a required percentile so as to return a value
    within the data set that satisfies the percentile.


    Remember discrete data?


    Discrete data values are numbers that have values that you can count over time.
    Also recall with this function the value exists in the data set; it is not interpolated
    like in the `PERCENTILE_CONT()` function.


    Our analyst submits the following business requirements for this next report:


    This time we need to calculate the percentile discrete values for the sum of failures
    by month. That is, each month we add up the failures and then generate the 25th,
    50th, and 75th discrete percentiles. Results need to be by plant name, location
    in the plant, year, quarter, and month.


    Results need to be for the year 2008\. We will revert back to our reliable `CTE-`
    based query this time.


    Please refer to Listing [10-11](#527021_1_En_10_Chapter.xhtml#PC16).


    ```sql

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName, [MonthName], CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName]

    ,CalendarMonth,SumEquipFailures

    -- actual value form list

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY SumEquipFailures)

    OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ) AS [PercentDisc .75]

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2008

    GO

    ```


    Listing 10-11

    Percentile Discrete Analysis for Monthly Equipment Failures


    Notice once again we are using the fact table and also dimension tables, so we
    see a number of `JOIN` clauses. The partition is set up by plant, location, and
    year for each of the percentile calculations. The `ORDER BY` clause references
    the `SumEquipFailures` column in each of the three calls to the `PERCENTILE_DISC()`
    function (remember, the returned values should exist this time).


    Please refer to the partial results in Figure [10-24](#527021_1_En_10_Chapter.xhtml#Fig32).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig32_HTML.png)


    Figure 10-24

    Percentile discrete analysis for plant equipment failures


    A screenshot of S Q L, S S M S window has a 11 column, 72 rows table. Column headers
    are Plant name, Location name, calendar year, quarter name, month name, calendar
    month, sum equipment failures, and percentile continuous 0.25, 0.50, and 0.75\.
    Rows 1 to 3 and 5 to 10 in failures are highlighted.


    Yes, the values returned exist, and we see we have some ties, perfectly normal
    as it is possible to have the same numbers of total monthly failures for equipment.
    It could be different equipment, but they can be the same or different.


    ### Performance Considerations


    Let’s see how different or the same the discrete percentile function works vs.
    the continuous percentile function in terms of performance. Let’s generate our
    usual baseline estimated query plan and break it up into parts as it will be a
    large one.


    Please refer to Figure [10-25a](#527021_1_En_10_Chapter.xhtml#Fig33).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig33_HTML.png)


    Figure 10-25a

    Estimated baseline query plan, part 1


    A screenshot of the S Q L, S S M S window. It presents part 1 of the baseline
    estimated query plan with 11 components. The components are sort, hash match 9%,
    table scan, hash match, table scan, hash match 8%, table scan, hash match 17%,
    compute scalar, clustered index 8%, and table scan 10%.


    The table scan task with the 10% cost looks familiar, and so do the 1% table scans
    of the dimension tables. One thing I failed to mention is that we are using a
    `VIEW` for the date information called `CalendarView`.


    This is something to examine. We are using this `VIEW` as it contains the text
    names of months, quarters, etc. Basically, a `VIEW` translates to executing a
    query, in this case the underlying query that the `VIEW` is based on. This is
    a bit costly to use, so we would like to replace this `VIEW` with a more detailed
    Calendar dimension that contains all the text values. We would also want to create
    an index or two on the new Calendar table (this will be a homework assignment
    at the end of the section, so think about it).


    The lower right-hand clustered index scan has a cost of 8%. Working up the lower
    branch, we see the hash match joins with respective costs of 17%, 8%, and 8% with
    a final hash match join with a cost of 9%.


    Lastly, we see a sort task to the left at 10% plus a table spool (lazy spool)
    task at a 0% cost. I think that the final conclusion for performance planning
    for this type of pattern is to either place the smaller dimensions with 100 or
    fewer rows in memory-optimized tables or else on very-high-speed solid-state drives.
    At least, `TEMPDB` should always be on a solid-state drive.


    The existing dimension tables are too small to benefit from indexes, and as can
    be seen, none were recommended by the query plan tool. Let’s look at the next
    section of the plan as we navigate to the left-hand side.


    Please refer to Figure [10-25b](#527021_1_En_10_Chapter.xhtml#Fig34).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig34_HTML.png)


    Figure 10-25b

    Estimated baseline query plan, part 2


    A screenshot of S Q L, S S M S window presents part 2 of estimated query plan
    with 14 components. The components are compute scalar, sequence project, segment,
    nested loops 3%, table spool, segment, sort 7%, stream aggregate, sort 10%, nested
    loops, compute scalar, stream aggregate, 2 table spool.


    There’s the sort task from the last screenshot as a point of reference. I will
    just call out the non-zero-cost tasks. A sort appears (7% cost), followed by a
    nested loops join task to merge the flow of the branches (3%). Let’s move to the
    next section.


    Please refer to Figure [10-25c](#527021_1_En_10_Chapter.xhtml#Fig35).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig35_HTML.png)


    Figure 10-25c

    Estimated baseline query plan, part 3


    A screenshot of S Q L, S S M S window. It presents part 3 of the estimated query
    plan with 17 components. The components are table spool, segment, 2 compute scalar,
    nested loops 3%, table spool, segment, 2 compute scalar, and 2 sets of nested
    loops, stream aggregate, table spool, and table spool.


    Nothing is going on here except for the nested loops join with a cost of 3%. Notice
    the thickness of the lines indicating how many rows are passing through.


    Let’s move to the next section of the plan. Please refer to Figure [10-25d](#527021_1_En_10_Chapter.xhtml#Fig36).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig36_HTML.png)'
