    All that is left is to publish the report to a Power BI server.


    Please refer to Figure [12-56](#527021_1_En_12_Chapter.xhtml#Fig56).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig56_HTML.png)


    A screenshot of the home page of Power B I Desktop window. It presents a positive-negative
    Bar graph. The 3 arrows indicate to click on the publish button in the menu bar
    on top, My workspace as the destination in the publish to power B I pop-up, and
    to click on the select button.


    Figure 12-56


    Publishing your report and graphs


    Publishing the report is simple and is similar to what we did earlier to publish
    a report to SSRS. Simply click the “Publish” button located on the right side
    of the menu bar, and a pop-up panel appears labeled “Publish to Power BI.”


    Reminder


    Don’t forget to save the Power BI report you just created to an easy-to-remember
    folder with a name that reflects the report content! You know the drill. Go to
    the “File” selection, select “Save as,” etc.


    You will see the available destination. In this case there is only one called
    “My workspace” in my development environment.


    Click it to select it, and then click the “Select” button. You will see a message
    stating that it is being published. Once finished, bring up your browser and enter
    the URL for your Power BI portal.


    Please refer to Figure [12-57](#527021_1_En_12_Chapter.xhtml#Fig57).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig57_HTML.png)


    A screenshot presents the Home Page of the Power B I Report Server, with browse
    tab selected. It presents the 2 Power B I reports, C 10 Plant Example, and C H
    11 to 13 Power B I slides. An arrow points to the upload arrow on the top right
    of the menu bar.


    Figure 12-57


    Report and graphs on the server


    Once you have published the Power BI report, you will see it in the “Browse” tab.
    Uploading the report is the same as when you uploaded the `SSRS` report to the
    `SSRS` portal. Click the upload arrow that appears on the top right of the menu
    bar and navigate to the folder that has your new Power BI report. Click it and
    you should see the report as shown in the following.


    Please refer to Figure [12-58](#527021_1_En_12_Chapter.xhtml#Fig58).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig58_HTML.png)


    A screenshot of the Home Page of the Power B I Report Server. It presents the
    pie chart with 4 sectors of, C H 11 to 13 Power B I slides.


    Figure 12-58


    Uploading your report and graphs


    There it is. Our pie chart is looking good, not too shabby.


    This is probably not too impressive in black and white, but if you are reading
    this book in electronic format, you will see the colors.


    There you have it. We covered some basic steps, created a simple three-page report
    or dashboard if you prefer, and published it to a personal Power BI server on
    your laptop, desktop, or development environment.


    In our last chapter, Chapter [14](#527021_1_En_14_Chapter.xhtml), I will include
    a section on how to download and install `SSRS` and Power BI and how to configure
    each. Mostly, you will just keep the default settings. All you need to fill out
    is to pick a SQL Server instance where a dedicated database for `SSRS` and Power
    BI can be created.


    ## Summary


    This was our third to last chapter. I hope you found it interesting. We applied
    the ranking window functions to our inventory database and inventory data warehouse
    to put these functions through their paces. We performed the usual performance
    analysis. Additionally, we created an `SSRS` report using Report Builder and published
    it on an `SSRS` website.


    Lastly, we created a simple Power BI report and dashboard so we could learn how
    to use this powerful tool and added it to our SQL Server BI toolbox.


    Our next and last chapter applies the analytical window functions to our inventory
    data. This should be interesting, so take a break, grab a cup of coffee, and see
    you in the next chapter.


    One more comment: Your SQL Server BI toolkit now consists of the aggregate, ranking,
    and analytical functions; Visual Studio Community Edition and the `SSAS` and `SSRS`
    components needed to create reports, cubes, and ETL projects; and Power BI and
    the SSIS, SSAS, SSRS, and Power BI servers. I almost forgot Microsoft Excel that
    you can use to create reports with graphs and pivot tables.


    Please refer to Figure [12-59](#527021_1_En_12_Chapter.xhtml#Fig59).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig59_HTML.jpg)


    A flow diagram of S Q L Server B I toolkit development architecture. It mainly
    consists of the visual studio community, web-based reporting tools, S Q L server
    S S A S multidimensional and tabular models, web reporting server, S Q L servers
    2019 and 2022, and window functions.


    Figure 12-59


    Your SQL Server BI toolkit


    What can I say, a very impressive array of development tools for your BI project
    and career skills portfolio. These tools and skills are a must for anyone to be
    a SQL Server data architect or analyst or developer.


    I will tell you how to obtain, install, and configure all these components in
    our last chapter, Chapter [14](#527021_1_En_14_Chapter.xhtml).


    # 13. Inventory Use Case: Analytical Functions


    Congratulations! You made it to the last chapter dealing with window functions.
    We do have one more chapter, Chapter [14](#527021_1_En_14_Chapter.xhtml), which
    is a summary chapter that includes a review of the tools we used and also where
    to obtain them.'
  trans: '

    # 13. 库存用例：分析函数


    恭喜！你已经学到了关于窗口函数的最后一章。我们确实还有最后一章，即第 14 章，这是一个总结章节，包括对我们所使用工具的回顾，以及如何获取它们。


    ## 总结


    这是我们的倒数第三章。我希望你觉得它有趣。我们将排名窗口函数应用于我们的库存数据库和库存数据仓库，以充分测试这些函数的性能。我们执行了常规的性能分析。此外，我们还使用报表生成器创建了一个`SSRS`报表，并将其发布到了`SSRS`网站上。


    最后，我们创建了一个简单的 Power BI 报表和仪表板，以便我们学习如何使用这个强大的工具，并将其添加到我们的 SQL Server BI 工具箱中。


    我们下一章，也是最后一章，将把分析窗口函数应用于我们的库存数据。这应该会很有趣，所以休息一下，泡杯咖啡，我们下一章再见。


    还有一句话：你的 SQL Server BI 工具包现在包括了聚合函数、排名函数和分析函数；用于创建报表、多维数据集和 ETL 项目的 Visual Studio
    Community 版本及`SSAS`和`SSRS`组件；以及 Power BI 和 SSIS、SSAS、SSRS 及 Power BI 服务器。我差点忘了还有
    Microsoft Excel，你可以用它来创建带有图表和数据透视表的报表。


    请参考图 12-59。


    ![](img/527021_1_En_12_Fig59_HTML.jpg)


    一个 SQL Server BI 工具包开发架构的流程图。它主要由 Visual Studio 社区版、基于 Web 的报表工具、SQL Server SSAS
    多维和表格模型、Web 报表服务器、SQL Server 2019 和 2022 以及窗口函数组成。


    **图 12-59** 你的 SQL Server BI 工具包


    我该说什么呢，这套用于 BI 项目和职业技能组合的开发工具非常令人印象深刻。对于任何想要成为 SQL Server 数据架构师、分析师或开发者的人来说，这些工具和技能都是必须掌握的。


    我将在我们的最后一章，即第 14 章中，告诉你如何获取、安装和配置所有这些组件。


    ## Power BI 操作与发布


    这一步非常简单。在页面 1 上，右键单击数据报表，从下拉菜单中选择“复制”。打开第二个页面，将数据报表粘贴到设计区域。接下来，点击一个可视化图表类型，将其拖放到数据报表上。你的数据报表现在就转换成了你选择的视觉图表。


    至少就创建基本报表和图表而言，就是这么简单。这个工具非常强大，允许你创建筛选器、向下钻取等功能。学习这个工具可能需要一整本书，但有了这些基本说明，你就可以开始了。网上也有大量很棒的付费课程，但获取知识总是有代价的。


    接下来，我们看看如何向下钻取报表内容。


    请参考图 12-54。


    ![](img/527021_1_En_12_Fig54_HTML.jpg)


    一张 Power BI Desktop 窗口主页的截图。它以正负条形图的形式呈现了一个数据报表。箭头指向筛选类型中的“2010”以及筛选器下的一个产品名称。字段面板高亮显示了图中使用的参数。


    **图 12-54** 定义筛选器


    我确实提到了向下钻取的功能和特性。默认情况下，如果你查看基本筛选面板，你可以点击或取消勾选你想要查看的数据字段。这里我们筛选了“2010”和“2011”年份，以及一个单一产品“德国
    1 型机车”。只需勾选相应的复选框，可视化图表就会改变以表示更小的数据范围（这被称为切片和切块）。


    让我们再看一个你可以创建的可视化图表，这次是用饼图。


    请参考图 12-55。


    ![](img/527021_1_En_12_Fig55_HTML.jpg)


    一张 Power BI Desktop 窗口主页的截图。它以一个有 4 个扇区的饼图形式呈现了一个数据报表。在筛选器下的年份筛选类型中，“全选”选项被勾选。字段面板高亮显示了图中使用的参数。


    **图 12-55** 饼图，2007 年库存数量


    只需将一个饼图图标从可视化部分拖放到一个新页面上的数据报表副本上，数据就变成了上图所示的饼图。你的报表现在有三页，包括一个老式的行列报表和两个图表。所有这些只需几个步骤就完成了。


    剩下的就是将报表发布到 Power BI 服务器。


    请参考图 12-56。


    ![](img/527021_1_En_12_Fig56_HTML.png)


    一张 Power BI Desktop 窗口主页的截图。它呈现了一个正负条形图。三个箭头分别指向顶部菜单栏中的发布按钮、“发布到 Power BI”弹出窗口中的目标位置“我的工作区”，以及点击“选择”按钮。


    **图 12-56** 发布你的报表和图表


    发布报表很简单，类似于我们之前将报表发布到 SSRS 的操作。只需点击菜单栏右侧的“发布”按钮，就会出现一个标记为“发布到 Power BI”的弹出面板。


    **提醒**


    别忘了将刚刚创建的 Power BI 报表保存到一个容易记住的文件夹中，并取一个能反映报表内容的名字！你懂的。转到“文件”选项，选择“另存为”等。


    你会看到可用的目标位置。在我的开发环境中，这里只有一个叫做“我的工作区”。


    点击它进行选择，然后点击“选择”按钮。你会看到一条消息，提示正在发布。完成后，打开浏览器并输入你的 Power BI 门户 URL。


    请参考图 12-57。


    ![](img/527021_1_En_12_Fig57_HTML.png)


    一张截图展示了 Power BI 报表服务器的主页，选择了“浏览”选项卡。它展示了 2 个 Power BI 报表：“C10 工厂示例”和“CH11 至 13
    Power BI 幻灯片”。一个箭头指向菜单栏右上角的上传箭头。


    **图 12-57** 服务器上的报表和图表


    一旦你发布了 Power BI 报表，你会在“浏览”选项卡中看到它。上传报表与将`SSRS`报表上传到`SSRS`门户的操作相同。点击菜单栏右上角出现的上传箭头，导航到包含你新的
    Power BI 报表的文件夹。点击它，你应该能看到报表，如下所示。


    请参考图 12-58。


    ![](img/527021_1_En_12_Fig58_HTML.png)


    一张 Power BI 报表服务器主页的截图。它呈现了一个有 4 个扇区的饼图，“CH11 至 13 Power BI 幻灯片”。


    **图 12-58** 上传你的报表和图表


    就是这样。我们的饼图看起来不错，不算寒酸。


    以黑白方式呈现可能不太令人印象深刻，但如果你是以电子书格式阅读本书，你会看到彩色的。


    就是这样了。我们介绍了一些基本步骤，创建了一个简单的三页报表（如果你愿意，也可以称之为仪表板），并将其发布到了你笔记本电脑、台式机或开发环境上的个人 Power
    BI 服务器上。


    在我们的最后一章，即第 14 章，我将包含一节关于如何下载和安装`SSRS`及 Power BI，以及如何配置每个组件的内容。大多数情况下，你只需保持默认设置即可。你唯一需要填写的是选择一个
    SQL Server 实例，以便为`SSRS`和 Power BI 创建专用的数据库。

