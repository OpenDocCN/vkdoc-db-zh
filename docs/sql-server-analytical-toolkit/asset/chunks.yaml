  trans: '### 性能考量


    需要提醒的是，出于本书的目的和篇幅限制，我们仅检查和分析查询计划中成本大于零的任务。例如，如果一个窗口假脱机任务（通常出现在 `OVER()` 子句中的 `ROWS`
    或 `RANGE` 子句）的值为 0%，这意味着它发生在内存中，因此我们无需担心。如果其值大于零，我们便会在分析中考虑它，因为它很可能正在使用物理存储。


    现在，让我们开始查看初始的查询计划。我们的 `Account` 表有 43,860 行。会推荐创建索引吗？


    请参考图 5-12。


    ![](img/527021_1_En_5_Fig14_HTML.png)


    一张 c h 0 5 聚合查询 s q l 的截图。上半屏显示了一些编程代码。下半屏显示了消息和执行计划。三个箭头分别指示窗口排序成本 8%、排序成本 21%
    和表扫描成本 73%。


    图 5-12


    估计的执行计划建议创建索引


    是的，建议创建索引。我们立刻就能看到对 `Account` 表的一次表扫描，成本为 73%。其次是排序（21%）和窗口假脱机任务（0%）（在内存中执行）。在左侧还出现了另一个排序任务（5%）。


    显然，我们需要接受建议并创建所推荐的索引。清单 5-6 是我提供了一个详细名称后创建的索引。


    ```

    CREATE NONCLUSTERED INDEX [iePrtNoAcctNoTypeBalPostDate]

    ON [Financial].[Account] ([CustId],[AcctName])

    INCLUDE ([PrtfNo],[AcctNo],[AcctTypeCode],[AcctBalance],[PostDate])

    GO

    清单 5-6

    建议的索引

    ```


    创建索引后，我们生成并检查新的执行计划。


    请参考图 5-13。


    ![](img/527021_1_En_5_Fig15_HTML.png)


    一张 c h 0 5 聚合查询 s q l 的截图。上半屏有一些编程代码。下半屏显示了消息和执行计划。四个箭头分别指示窗口排序成本 36%、窗口假脱机成本
    3%、排序成本 39% 和索引查找成本 20%。


    图 5-13


    修订后的执行计划


    情况有所改善。我们看到索引查找占 20%，排序任务占 39%，但是看看窗口假脱机任务。它现在成本是 3%，这意味着数据被写到了磁盘，所以这并不算改进。最后，在查询计划的末尾，左侧还有一个最终排序任务，占
    39%。


    让我们查看一下性能分析统计数据：


    ```

    SET STATISTICS PROFILE ON

    GO

    ```


    图 5-14 是创建索引前后性能分析统计数据的对比。


    ![](img/527021_1_En_5_Fig16_HTML.png)


    一张 c h 0 5 聚合查询 s q l 的截图。屏幕有 2 个面板，对比了创建索引前后的性能分析统计数据。


    图 5-14


    有索引和无索引时的性能分析统计数据


    我们可以看到，无论有无索引，两种情况下的步骤数量是相同的。我们关注两组统计数据中的 `EstimateIO`、`EstimateCPU` 和 `TotalSubtreeCost`，可以看到有索引的版本略有改善，但幅度不大。让我们创建一些图表来展示这些信息。


    请参考图 5-15。


    ![](img/527021_1_En_5_Fig17_HTML.jpg)


    一张 Microsoft Excel 电子表格的截图。上半部分屏幕显示了一条估计 CPU 的折线图。下半部分屏幕，一张表格对比了有索引和无索引情况下的估计
    CPU 统计数据集。


    图 5-15


    估计的 CPU 性能统计数据


    我们清楚地看到，直到最后几步之前，CPU 统计数据都是相同的，之后有索引的曲线下降，而无索引的曲线上升。因此，这是我们用来判断创建的索引是否有价值的另一个指标。


    请参考图 5-16。


    ![](img/527021_1_En_5_Fig18_HTML.jpg)


    一张 Microsoft Excel 电子表格的截图。上半部分屏幕显示了一条估计 IO 的折线图。下半部分屏幕，一张表格对比了有索引和无索引情况下的估计 IO
    统计数据集。


    图 5-16


    估计的 IO 统计数据


    `IO` 统计数据的情况也类似。有了索引，`IO` 下降；没有索引，`IO` 上升。我们希望保持较低的 CPU 利用率和 IO。最后，让我们看看子树成本。


    请参考图 5-17。


    ![](img/527021_1_En_5_Fig19_HTML.jpg)


    一张 Microsoft Excel 电子表格的截图。上半部分屏幕显示了一条总子树成本的折线图。下半部分屏幕，一张表格对比了有索引和无索引情况下的总子树成本统计数据集。


    图 5-17


    总子树成本


    有索引时，子树成本统计数据也显著下降。至此，我们已经查看了几个性能统计数据类别和工具，我们可以使用它们来分析、评估和改进那些使用带有 `OVER()` 子句的聚合函数来处理数据分区的查询的性能。


    所有这些分析证明，SQL Server 查询估计工具通常是正确的！


    你现在拥有一些非常重要的查询性能工具，可用于你的性能分析活动：


    *   显示估计的执行计划

    *   包含实时查询统计信息

    *   包含客户端统计信息

    *   `SET STATISTICS IO ON/OFF` 设置

    *   `SET STATISTICS TIME ON/OFF` 设置

    *   `SET STATISTICS PROFILE ON/OFF` 设置


    接下来，我们将看看通常在分析报告中一起出现的两个函数。'
- fmt: '# MIN() and MAX() Functions


    A quick review, the `MIN()` and `MAX()` functions return the smallest and the
    largest value, respectively, in a column.


    Here is the syntax, the same as the other aggregate functions we discussed:


    ```sql

    MIN(ALL|DISTINCT *) or MIN(ALL|DISTINCT )

    ```


    and


    ```sql

    MAX(ALL|DISTINCT *) or MAX(ALL|DISTINCT )

    ```


    The power of these functions is enhanced when we combine them with the `OVER()`
    clause. Worth repeating, you cannot use `DISTINCT` if you use these functions
    with the `OVER()` clause.


    ## Simple Example


    Let’s start with a simple example as a refresher for those of you who have not
    seen or used these before. Please refer to Listing 5-7.


    ```sql

    DECLARE @MinMaxExample TABLE (

    ExampleValue SMALLINT

    );

    INSERT INTO @MinMaxExample VALUES(20),(20),(30),(40),(60),(60);

    SELECT MIN(ExampleValue)   AS MinExampleValue

    ,COUNT(ExampleValue) AS MinCount

    FROM @MinMaxExample;

    SELECT MIN(ALL ExampleValue)    AS MinExampleValueALL

    ,COUNT( ALL ExampleValue) AS MinCountALL

    FROM @MinMaxExample;

    SELECT MIN(DISTINCT ExampleValue)  AS MinExampleValueDISTINCT

    ,COUNT(DISTINCT ExampleValue) AS MinCountDISTINCT

    FROM @MinMaxExample;

    SELECT MAX(ExampleValue)   AS MaxExampleValue

    ,COUNT(ExampleValue) AS MAXCount

    FROM @MinMaxExample;

    SELECT MAX(ALL ExampleValue)    AS MaxExampleValueALL

    ,COUNT( ALL ExampleValue) AS MAXCountALL

    FROM @MinMaxExample;

    SELECT MAX(DISTINCT ExampleValue)    AS MaxExampleValueDISTINCT

    ,COUNT( DISTINCT ExampleValue) AS MAXCountDISTINCT

    FROM @MinMaxExample;

    GO

    ```


    **Listing 5-7**

    `MIN()` and `MAX()` in a Simple Example


    I included all variations of using the `ALL` or `DISTINCT` keyword, and the results
    are in Figure 5-18.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig20_HTML.jpg)


    A screenshot of the S Q L query window. It presents the minimum example values
    for 6 queries. Two arrows indicate that the minimum count distinct is 4 and the
    maximum count distinct is 4.


    **Figure 5-18**

    `MIN()` and `MAX()`, `ALL`, `DISTINCT`


    Although you can use either `ALL` or `DISTINCT` with the `MIN()` and `MAX()` functions,
    the outputs are all the same. After all, minimum is minimum and maximum is maximum
    no matter how many duplicate values are present!


    ## Financial Database Example


    Let’s turn our attention to our financial database example and see what the business
    specification for this query is.


    For customer C000001, Mr. John Smith, we want to see the daily minimum and maximum
    cash account values for every month in 2012. The query needs to be written so
    that if we wish to see other years, we include a commented-out `WHERE` clause
    so we can switch back and forth. We are anticipating our business analyst will
    want other years in the analysis.


    Please refer to Listing 5-8.


    ```sql

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,MIN(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* To report on more than 1 year */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ) AS MonthlyAcctMin

    ,MAX(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    /* To report on more than 1 year */

    --PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ) AS MonthlyAcctMax

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /* To report on more than 1 year */

    --WHERE YEAR(PostDate) IN(2012,2013)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    ```


    **Listing 5-8**

    Cash Analysis for Customer C000001 Using `MIN()` and `MAX()`


    Since we are initially only looking at year 2012, our `OVER()` clause for both
    the `MIN()` and `MAX()` functions has a `PARTITION BY` clause that uses the month
    part of the postdate (each day is a postdate). Both `ORDER BY` clauses sort by
    `PostDate`.


    As mentioned earlier, if you want to see results for more than one year, uncomment
    the `PARTITION BY` clauses that partition by year and month. We do not need to
    sort the partition by month and postdate as postdate alone will keep things in
    their correct order.


    Lastly, the `WHERE` clause filters out results for the customer `C0000001` and
    the cash account. The same applies as far as reporting for multiple years. Use
    the commented out `WHERE` clause if you want to generate a report for multiple
    years.


    To see some interesting results, like three-day rolling minimum and maximum balances,
    just replace the `OVER()` clauses with this code snippet:


    ```sql

    ,MIN(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS MonthlyAcctMin

    ,MAX(AcctBalance) OVER(

    PARTITION BY MONTH(PostDate)

    ORDER BY PostDate

    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW

    ) AS MonthlyAcctMax

    ```


    Here we use the `ROWS` frame definition to define the three-day window frames.
    Notice two rows preceding plus the current row add up to a window frame that has
    three rows. But you knew that!


    ## Query Results


    Let’s see the results from the original query. Please refer to the partial results
    in Figure 5-19.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig21_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The upper panel presents some
    programming codes. The lower panel presents the result table. Three arrows indicate
    some values of columns of account balance, monthly account minimum, and monthly
    account maximum.


    **Figure 5-19**

    Rolling daily minimum and maximum cash balances


    As can be seen, we start off with the same minimum and maximum balances. Each
    time a new minimum or maximum balance appears, the values are updated accordingly.
    These values result in an interesting graph when we use them in a Microsoft Excel
    spreadsheet.


    Please refer to the partial results in Figure 5-20.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig22_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 4 columns
    for post date, balance, minimum, and maximum. On the right screen, a line graph
    of balance versus date plots varying curves of minimum and maximum balances.


    **Figure 5-20**

    Minimum and maximum cash account analysis


    The good news is that the cash balances are trending up. What we see though are
    fluctuations in the minimum and maximum balances, which indicate some heavy trading
    activity. Remember, the customer uses this account to fund buy and sell trades
    against other instruments like FX and equity transactions.'
