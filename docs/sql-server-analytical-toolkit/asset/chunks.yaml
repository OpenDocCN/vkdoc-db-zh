    ```

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,QtyOnHand

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete.25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .75]

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    Listing 13-8

    Percentile Discrete Query for Inventory on Hand

    ```


    Same logic and structure of the prior example, so let’s see the results. Remember
    the difference between this function and the `PERCENTILE_CONT()` function results?


    Please refer to the partial results in Figure [13-37](#527021_1_En_13_Chapter.xhtml#Fig37).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig37_HTML.png)


    A screenshot of the S Q L S S M S window with a table of 15 columns and 13 rows.
    The column headers are as of year, as of quarter, as of quarter name, as of month,
    average month name, as of date, loc I D, inv I D, w h I D, product I D, quantity
    on hand, and percent discrete 0.25, 0.5, and 0.75.


    Figure 13-37


    Percentile discrete query results for inventory on hand


    This time the three percentile values point to actual values and not interpolated
    values. This query checks out so it can be modified for all years, locations,
    inventories, warehouse, and products. Notice quantities on hand represent the
    values reported on the last day of the month, not the sum of values each day of
    the month. This is what makes the data discrete vs. continuous.


    Homework


    Using this query, modify it so the values returned cover all years, months, locations,
    inventories, warehouses, and products. Use a `WHERE` clause filter to first check
    for the same product and warehouse of the prior query. Once you are sure you modified
    the `PARTITION BY` clause correctly, remove the `WHERE` clause. You will need
    an `ORDER BY` query for the entire result set. This query, transformed into a
    `VIEW`, would make an ideal candidate for an `SSRS` report built with the Report
    Builder tool (or a denormalized report table).


    Performance tuning time.'
  trans: '

    ### `PERCENTILE_DISC()` 函数


    这里是我们关于百分位数离散化的示例。`PERCENTILE_DISC()` 函数基于一个指定的百分位数，在**离散**数据集上进行操作，以返回数据集中满足该百分位数的一个值。


    还记得离散数据吗？


    离散数据值是你能随时间计数的数值，例如投资账户在每天、每月、每年的存入和取出。我们可以说，一年内某人进行了 1000 笔存款和 700 笔取款。将每月的账户余额相加来得到年度余额是行不通的。由于月度余额有涨有跌，这不能真实反映账户在一年内的实际收益。关键在于
    12 月 31 日账户里还剩多少钱。将初始账户余额加上一年的所有存款，再减去该年的所有取款，这才是有意义的。


    你可以将这些数值相加以获得总计，比如一年的总存款或总取款额，并识别账户余额随时间变化的趋势（平均存款或平均取款额）。


    再举一例，将某个地点的每个仓库的库存量相加几乎是有意义的。如果一个地点有两个仓库，你可以计算任意时间点的总库存量、每天/每周/每月的总进出库量等等。同样，一年的总库存量是没有意义的；一年的平均库存水平值则是有意义的。


    回顾一下你可以问自己以区分离散数据和连续数据的问题：


    *   我能计数它吗（随时间段）？

    *   我能把它加起来吗？

    *   我能用它进行计算（如平均值）吗？


    值得重申：


    连续数据可以通过 `AVG()`、`SUM()` 等函数进行测量。

    离散数据可以通过 `COUNT()` 等函数进行计数。


    回到正题。以下是我们的业务分析师为此查询提供的业务规范：


    我们的 `PERCENTILE_CONT()` 报告在业务分析师中大受欢迎，因此他们要求我们修改报告，以显示相同地点、库存、仓库和产品的百分位数离散百分比。这个很简单，快速复制粘贴并更改函数名称即可。是的，惰性让我们复用了处理季度和月度数据部分的
    `CASE` 代码块。


    最后，请记住，库存量需要代表月底最后一天库存中剩余的数量。因此，这些值是通过将每月中每天的库存入库量减去出库量进行累加，最终得到月末最后一天的总数量来计算的。


    请参见代码清单 13-8。


    ```sql

    SELECT AsOfYear

    ,DATEPART(qq,AsOfDate) AS AsOfQuarter

    ,CASE

    WHEN DATEPART(qq,AsOfDate) = 1 THEN ''1st Quarter''

    WHEN DATEPART(qq,AsOfDate) = 2 THEN ''2nd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 3 THEN ''3rd Quarter''

    WHEN DATEPART(qq,AsOfDate) = 4 THEN ''4th Quarter''

    END AS AsOfQtrName

    ,AsOfMonth

    ,CASE

    WHEN AsOfMonth = 1 THEN ''Jan''

    WHEN AsOfMonth = 2 THEN ''Feb''

    WHEN AsOfMonth = 3 THEN ''Mar''

    WHEN AsOfMonth = 4 THEN ''Apr''

    WHEN AsOfMonth = 5 THEN ''May''

    WHEN AsOfMonth = 6 THEN ''June''

    WHEN AsOfMonth = 7 THEN ''Jul''

    WHEN AsOfMonth = 8 THEN ''Aug''

    WHEN AsOfMonth = 9 THEN ''Sep''

    WHEN AsOfMonth = 10 THEN ''Oct''

    WHEN AsOfMonth = 11 THEN ''Nov''

    WHEN AsOfMonth = 12 THEN ''Dec''

    END AS AvgMonthName

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,QtyOnHand

    ,PERCENTILE_DISC(.25) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete.25]

    ,PERCENTILE_DISC(.5) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .5]

    ,PERCENTILE_DISC(.75) WITHIN GROUP (ORDER BY QtyOnHand)

    OVER (

    PARTITION BY AsOfYear

    ) AS [%Discrete .75]

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GO

    ```


    代码清单 13-8: 用于查询库存量的百分位数离散化查询


    逻辑和结构与之前的示例相同，所以我们来看一下结果。还记得这个函数与 `PERCENTILE_CONT()` 函数结果之间的区别吗？


    请参见图 13-37 中的部分结果。


    ![](img/527021_1_En_13_Fig37_HTML.png)


    一个 SQL Server Management Studio (SSMS) 窗口的截图，显示了一个包含 15 列和 13 行的表格。列标题分别是：截至年份、截至季度、季度名称、截至月份、月份名称、截至日期、地点
    ID、库存 ID、仓库 ID、产品 ID、库存量，以及离散百分位数 0.25、0.5 和 0.75。


    图 13-37: 库存量的百分位数离散化查询结果


    这次，三个百分位数值指向的是实际值，而非插值。此查询经验证无误，因此可以修改用于所有年份、地点、库存、仓库和产品。请注意，库存量代表的是月末最后一天报告的数值，而不是当月每天数值的总和。这正是离散数据与连续数据的区别所在。


    #### 练习


    使用此查询，将其修改为返回的值涵盖所有年份、月份、地点、库存、仓库和产品。先使用 `WHERE` 子句筛选条件来检查与上一个查询相同的产品和仓库。一旦确认你正确修改了
    `PARTITION BY` 子句，再移除 `WHERE` 子句。你将需要为整个结果集提供一个 `ORDER BY` 子句。这个查询转换为 `VIEW`（视图）后，将是使用
    Report Builder 工具（或一个非规范化报告表）构建的 `SSRS` 报告的理想候选。


    性能调优时间到了。

