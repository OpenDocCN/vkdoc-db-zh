  trans: '

    为数据集提供一个名称（请不要使用空格或特殊字符），点击“构建”按钮，会出现一个对话框，让你从列表中选择一个服务器并选择登录服务器的方式。在这里，我们希望使用
    **Windows 身份验证**，而不是 **SQL Server 身份验证**。最后，选择我们想要连接到的数据库并测试连接。


    ## 测试连接

    务必进行测试。记住，事情永远有时间重做，但永远没有时间从头做对！


    点击“确定”按钮，连接创建任务就完成了，我们将返回到原始面板。


    请参见图 12-23。


    ![](img/527021_1_En_12_Fig23_HTML.jpg)

    数据源属性弹出面板的截图。名称设为 inventory，连接类型选择 M S S Q L server，有一个连接字符串，并选择了“使用嵌入在我报表中的连接”选项。底部的“确定”按钮高亮显示。

    **图 12-23：已完成的数据源属性**


    ## 确认连接

    一切看起来都很好，所以再次点击“确定”按钮。如果您选择的是现有连接而不是新建一个，也可以在这里测试连接。


    这时会显示另一个面板，展示新的数据源连接。


    请参见图 12-24。


    ![](img/527021_1_En_12_Fig24_HTML.png)

    “新建表或矩阵”弹出面板的截图。Inventory 被选作数据源连接。箭头指示了测试连接按钮和下一步按钮。

    **图 12-24：选择新连接**


    这里有名称，并且您还有另一次机会测试它。这是为了如果您要从现有连接创建报表，您可以在这里选择并测试它。点击“下一步”按钮，是的，又一个面板出现，用于下一步操作。这可能会有些令人困惑，因为根据您是创建了新连接还是使用了现有连接，这些步骤的路径会有所不同。


    ## 设计查询

    对于下一步，请参见图 12-25。


    ![](img/527021_1_En_12_Fig25_HTML.png)

    “新建表或矩阵”弹出面板的截图。标题为：设计查询。它列出了数据库视图面板中的文件夹。三个箭头分别指向：Inventory Reorder Alert 文件夹、带有聚合函数的“选定字段”选项和“下一步”按钮。

    **图 12-25：设计查询**


    最后，我们开始创建报表。展开 Reports 文件夹，然后展开 Tables 文件夹，在本例中，我们只有一个名为 `InventoryReOrderAlert`
    的表。该表有 24,192 行，不大不小。


    展开此节点以查看所有列。通过勾选每个名称左侧的复选框来选择所有列。“选定字段”面板将显示您选择的所有列。


    请参见图 12-26。


    ![](img/527021_1_En_12_Fig26_HTML.png)

    “新建表或矩阵”弹出面板的截图。标题为：设计查询。它列出了数据库视图面板中的文件夹。“Inventory year”选项在“选定字段”中高亮显示。

    **图 12-26：选定的字段**


    ### 关于筛选器的提示

    此时我们可以定义筛选器，但我们想创建一个使用所有数据的向下钻取报表，因此我们将不使用面板的这部分。点击“下一步”按钮，进入布局报表的步骤。


    如果您决定使用筛选器，您还需要创建小型数据集，每个用于筛选器的列一个（形式为 `SELECT DISTINCT` `FROM` `ORDER BY` <列名>）。


    **提示：** 给您的数据集起清晰简单的名称，比如 `ProductId`，而不是 dataset1, dataset2 等。您明白我的意思。


    然后，您需要创建链接到数据集的参数以获取值，最后将主数据集查询的 `WHERE` 子句中的筛选器映射到这些参数。


    ## 布局报表

    接下来，我们需要布局我们的报表。


    请参见图 12-27。


    ![](img/527021_1_En_12_Fig27_HTML.png)

    “新建表或矩阵”弹出面板的截图。它解释了如何安排字段以按行、列或两者对数据进行分组，并选择一个值来显示。

    **图 12-27：排列字段**


    这种类型的报表由行组、列组和值组成。对于行组，我们希望按年和月向下钻取，因此将 `InventoryYear` 和 `InventoryMonth` 列拖到此区域。


    对于列组，我们希望包含 `LocId`、`InvId`、`WhId` 和 `ProdId`，因此将这些列拖到此区域。


    最后，在“值”面板中，将 `ItemsRemaining` 列拖到此区域。如果您点击右侧的下拉箭头，您可以选择希望对此度量（您可以对其执行计算的列）应用的函数。注意我们的一些老朋友，比如聚合函数和分析函数。


    最后，值会出现在行组和列组标识的对象的交点处。我们接下来看看这是什么样子。


    点击“下一步”按钮进行下一步。


    ### 选择布局

    请参见图 12-28。


    ![](img/527021_1_En_12_Fig28_HTML.png)

    “新建表或矩阵”弹出面板的截图。它解释了如何选择布局来显示小计和总计。箭头指向选中的“分块，小计在下方”选项和底部的“下一步”按钮。预览表有 7 列 7 行。

    **图 12-28：选择布局**


    在这里，我们有机会指定报表的常规布局。如果您勾选“显示小计和总计”，您可以指定以下布局之一：

    *   分块，小计在下方

    *   分块，小计在上方（类似于本书前面章节讨论过的 `GROUPING` 函数）

    *   阶梯状，小计在上方


    我们勾选了“显示小计和总计”，并且我们想要“分块，小计在下方”格式。您可以在上图中看到它。


    对结果满意后，点击“下一步”按钮进行预览。


    ## 预览报表

    请参见图 12-29。


    ![](img/527021_1_En_12_Fig29_HTML.png)

    “新建表或矩阵”弹出面板的截图。它展示了报表项的预览表，有 7 行 7 列。一个箭头指向底部的“完成”按钮。

    **图 12-29：报表预览**


    您会再次看到布局。如果您需要更改某些内容，可以点击“返回”按钮回到上一步。我们对布局很满意，所以点击“完成”按钮。


    ## 运行报表

    现在我们准备好测试报表了。请参见图 12-30。


    ![](img/527021_1_En_12_Fig30_HTML.png)

    Microsoft Report Builder 主页的截图。一个箭头指向“运行”按钮。“内置字段”、“参数”、“图像”、“数据源”和“数据集”文件夹位于左侧的“报表数据”面板中。右侧包括一个参数部分，以及一个包含行组和列组部分的表格布局。

    **图 12-30：报表布局 – 运行报表**


    报表布局已显示。您可以进行更多修改，例如添加参数以允许业务用户进一步筛选结果，比如选择一种或多种产品或仓库。您可以添加通常在记分卡或仪表板中找到的指示符。我喜欢那些显示数值是增加还是减少的小型汽车仪表，但我离题了。


    ## 保存报表

    顺便说一句，现在是将报表保存到文件夹的好时机。我总是忘记这一点，当各个部分发布到 SSRS 后，我需要返回并将报表以一个好的名称保存到文件夹中，然后才能将其上传到
    SSRS 网站文件夹（这很令人沮丧）。


    点击“另存为”，会出现以下面板。


    请参见图 12-31。


    ![](img/527021_1_En_12_Fig31_HTML.png)

    '
- fmt: '# 保存和发布报告


    ## 保存报告


    Microsoft Report Builder 主页的屏幕截图。它呈现了一个“另存为报告”的弹出面板，包括用于导航到所需文件夹的“查找范围”字段，“new
    inventory rankings.rdl”已被选中。底部是“保存”和“取消”按钮。


    **图 12-31**


    导航到所需文件夹，为报告取一个好的名称，然后单击“保存”按钮。


    ## 测试报告


    接下来，我们对报告进行试运行。单击菜单栏左上角的“运行”按钮，我们应该会看到报告的样本。


    请参阅图 [12-32](#527021_1_En_12_Chapter.xhtml#Fig32)。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig32_HTML.png)


    Microsoft Report Builder 窗口的屏幕截图，已选择“运行”选项卡。一个箭头指示单击左上角的“设计”按钮和顶部一排的“LOC1”按钮。它呈现了一个表格形式的报告，包含“Inventory
    year”、“inventory total month”和“Total”列。


    **图 12-32**


    报告布局，报告样本


    一切看起来都很好！单击维度旁边的任何按钮，例如“LOC1”，将允许你向下钻取报告。总计会自动重新计算，以匹配你向下钻取到的层次结构级别。


    请参阅图 [12-33](#527021_1_En_12_Chapter.xhtml#Fig33)。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig33_HTML.png)


    Microsoft Report Builder 的屏幕截图，已选择“运行”选项卡。一个箭头指示单击左上角的“设计”按钮。它呈现了一个表格形式的报告，包含“Inventory
    year”、“inventory month”、“P 033”、“P 037”、“P 041”、“P 045”、“P 101”、“P 105”、“P 109”和“P
    113”列。


    **图 12-33**


    向下钻取到产品


    漂亮的向下钻取。这才是真正的数据挖掘。一旦你满意地查看了报告，可以返回到设计面板。单击“设计”按钮，你就回到了设计面板。


    ## 连接到 SSRS 服务器


    现在我们需要连接到本地的 `SSRS` 服务器，以便发布报告。


    > **注意**

    > 从 Microsoft 罽站下载 `SSRS`。安装程序名为 `SQLServerReportingServices.exe`！运行它，然后你需要使用
    SSRS 配置管理器进行配置。在本书第 [14](#527021_1_En_14_Chapter.xhtml) 章结束时，我们将了解如何执行此操作。


    请参阅图 [12-34](#527021_1_En_12_Chapter.xhtml#Fig34)。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig34_HTML.png)


    Microsoft Report Builder 主页的屏幕截图。它呈现了“连接到报告服务器”的弹出面板。一个箭头指示输入或选择要使用的报告服务器。另一个箭头指示左下角的“连接”按钮。


    **图 12-34**


    连接到服务器以发布报告


    ## 发布报告


    现在我们准备好发布了。左下角是“连接”按钮，我们将使用它连接到我们的 Web 服务器。单击“连接”按钮，并提供你笔记本电脑、台式机上安装的 `SSRS` 服务器名称，或者你的公司给你访问权限的实际开发服务器名称。


    从下拉列表中选择一个服务器，然后按“连接”按钮。现在我们准备好发布报告部件和报告了。


    请参阅图 [12-35](#527021_1_En_12_Chapter.xhtml#Fig35)。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig35_HTML.png)


    Microsoft Report Builder 窗口的屏幕截图。它呈现了“最近文档”弹出面板。一个箭头指示主菜单“主页”选项下的“发布报告部件”文件夹。右侧列出了最近的文档。


    **图 12-35**


    发布报告


    切换到第一个选项卡，即“文件”选项卡，然后单击“发布报告部件”。会出现另一个面板，让你选择如何发布报告。


    请参阅图 [12-36](#527021_1_En_12_Chapter.xhtml#Fig36)。


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig36_HTML.png)


    Microsoft Report Builder 主页的屏幕截图。它呈现了“发布报告部件”的弹出面板。一个箭头指示“在发布前检查并修改报告部件”的选项。


    **图 12-36**


    发布前检查部件，第 1 部分'
