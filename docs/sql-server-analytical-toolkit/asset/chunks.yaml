  trans: '

    ### 性能考量


    让我们按照通常的方式创建我们的基线估计查询性能计划。我将估计的执行计划分成了两部分，以便这次能看到所有步骤。


    请参考图 10-10a。


    ![](img/527021_1_En_10_Fig12_HTML.jpg)


    一个 SQL Server Management Studio (SSMS) 窗口的截图。它展示了估计查询性能计划的第 1 部分，包含 10 个组件。这些组件是哈希匹配、计算标量、表扫描、哈希匹配、表扫描、哈希匹配、哈希匹配、聚集索引扫描、表扫描和表扫描。


    **图 10-10a**

    LAG 函数的估计查询性能计划 – 第 1 部分


    从右上方开始，我们看到熟悉的对 Calendar 维度表的表扫描，其成本为 7%。我们看到一个聚集索引扫描（索引查找更好），成本为 6%，但由于我们需要检索
    `CTE` 中的所有行，所以无法避免。


    接下来，我们看到四个哈希匹配连接操作，成本分别为 4%、12%、12%和 32%。这里有很多处理！让我们检查计划的左侧部分。


    请参考图 10-10b。


    ![](img/527021_1_En_10_Fig13_HTML.png)


    一个 SQL Server Management Studio (SSMS) 窗口的截图。它展示了估计查询性能计划的第 2 部分，包含 10 个组件。这些组件是选择、计算标量、流聚合、窗口假脱机、段、计算标量、序列投影、段、流聚合和排序。


    **图 10-10b**

    LAG 函数的估计查询性能计划 – 第 2 部分


    从右侧开始，我们看到一个成本为 20%的排序步骤和一个成本为 1%的流聚合步骤。让我们忽略成本为 0%的任务，然后是我们成本为 2%的窗口假脱机，后面跟着一个成本为
    1%的流聚合任务。请记住，2%的窗口假脱机表示假脱机操作是在物理存储中执行的。唯一的性能改进增强点是检查 `TEMPDB` 是否可以放置在固态硬盘上。


    所以，步骤很多，但它们都是必要的吗？


    回想一下，规范说明报告是月度历史报告，因此 `CTE` 方法可能不是最佳方法。我尝试修改查询，使 `SUM()` 函数出现在基础查询中，而不是 `CTE`
    查询中，使用以下代码：


    ```

    SUM(EquipFailures) AS SumEquipFailures,

    LAG(SUM(EquipFailures),1,0) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS LastFailureSum

    ```


    尽管这表明可以将聚合函数插入到 `LAG()` 函数内，但就估计查询计划而言，它并没有带来任何改进。我还移除了 `GROUP BY` 子句并将其包含在基础查询中。如果你想要尝试一下，可以在脚本中找到这段代码。


    但在我们下结论之前，让我们先看看 `IO` 和 `TIME` 统计信息。


    请参考图 10-11。


    ![](img/527021_1_En_10_Fig14_SQL.png)


    一个 SQL Server Management Studio (SSMS) 窗口的截图，在视图选项卡下，展示了 IO 和 TIME 统计信息。SQL Server
    的解析和编译时间，CPU 和已用时间分别为 0 和 86 毫秒。SQL Server 的执行时间，CPU 和已用时间分别为 46 和 201 毫秒。影响了
    1011 行，7 个表列。


    **图 10-11**

    LAG() 报告的 IO 和 TIME 统计信息


    我们在这里看到了一个趋势。想象一下，你是负责所有开发这些报告的开发人员的经理，你不断看到相同的数值，因为当然，相同的 `CTE` 块被用于分析。同一个 `CTE`
    块汇总故障，但在各种查询中使用了不同的分析窗口函数。


    `EquipmentFailure` 报告表的扫描计数为 1，逻辑读取为 24，物理读取为 1，预读读取为 29。注意方框部分显示扫描计数和逻辑读取值为 1，以及我们的老朋友
    Calendar 表显示 24 次逻辑读取。

