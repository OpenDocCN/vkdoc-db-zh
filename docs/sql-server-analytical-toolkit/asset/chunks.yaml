    by the query plan estimator tool. We would like to see an index seek.


    Listing [5-3](#527021_1_En_5_Chapter.xhtml#PC5) is the index `DDL` command that
    was suggested.


    ```

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Transaction] ([CustId])

    INCLUDE ([TransDate],[Symbol],[AcctNo],[BuySell])

    GO

    Listing 5-3

    Suggested Index

    ```


    The name for the index I came up with is


    ```

    ieTransDateSymbolAcctNoBuySell

    ```


    Copying this name in the preceding code and then executing the command creates
    the index. Let’s run a second estimated query plan and see what improvements there
    are.


    Please refer to Figure [5-6](#527021_1_En_5_Chapter.xhtml#Fig8) for the new estimated
    query plan.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig8_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Select cost, 0%. Parallelism cost, 27%. Hash match cost, 42%. Index seek
    cost, 27%. Index scan cost, 29%.


    Figure 5-6


    Revised estimated query plan


    This is interesting. The index scan is still there, but we now have an index seek
    operation. Both are based on the same index. An adaptive join follows at 0% cost
    with a hash match at 42% cost. Finally, all the streams from the tasks are gathered
    for the final row output.


    Running this query to load the report table took ten seconds for 444,144 rows.
    Seems like a lot of time. Listing [5-4](#527021_1_En_5_Chapter.xhtml#PC7) is the
    `INSERT` command using the table we just discussed.


    ```

    TRUNCATE TABLE Report.CustomerC0000001Analysis

    GO

    INSERT INTO Report.CustomerC0000001Analysis

    SELECT YEAR(T.TransDate)          AS TransYear

    ,DATEPART(qq,(T.TransDate)) AS TransQtr

    ,MONTH(T.TransDate)         AS TransMonth

    ,DATEPART(ww,T.TransDate)   AS TransWeek

    ,T.TransDate

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,T.AcctNo

    ,T.BuySell

    ,T.Symbol

    ,COUNT(*) AS DailyCount

    FROM [Financial].[Transaction] T

    JOIN [MasterData].[Customer] C

    ON T.CustId = C.CustId

    GROUP BY YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    GO

    Listing 5-4

    Loading the Customer Analysis Table

    ```


    This took 15 seconds to run. This took even longer than when we tested the preceding
    query. We might want to consider a memory-optimized table for the customer data
    as we are dealing with a small number of rows. (I include code in the script for
    this chapter to create the memory-optimized table, so try it out.)


    Let’s run our original query and modify it so it uses the report table. Figure
    [5-7](#527021_1_En_5_Chapter.xhtml#Fig9) is the revised estimated execution plan
    when we use the preloaded report table instead of the `CTE`.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig9_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Three arrows indicate the window spool cost 8%, sort cost 64%, and Index
    seek cost 25%.


    Figure 5-7


    Revised query estimated execution plan


    This seems to be a more streamlined plan. We are seeing an index seek at a cost
    of 25% but an expensive sort at 64%, and check out the window spool! This comes
    in at 8%, which means we are using physical storage. We need to dive deeper into
    this strategy and look at the profile statistics. We should look at the `IO` and
    `TIME` statistics also, but in the interest of space, we will look at the `PROFILE`
    statistics only.'
  trans: '## 性能考量


    接下来，让我们用目前学到的工具做一些性能分析。请记住，如果你决定每天加载多笔交易，结果会怎样。`Transaction` 表会迅速变得非常庞大，从而导致性能下降。


    我们将采用的方法是先查看原始的基于 `CTE` 的查询。然后，我们会提取出 `CTE` 查询部分并检查其查询计划。我们希望利用 `CTE` 查询来加载一个报表表，这样带有
    `OVER()` 子句的查询就能在预加载的表上运行，而不是使用 `CTE`（可以推测这样运行速度会更快）。如果建议了任何索引，我们会构建它，使用查询来加载表，然后修改原始查询，使其使用报表表而非
    `CTE`，并对其生成预估查询计划。


    让我们先看看原始的预估查询计划。请参见图 5-5a。


    ![](img/527021_1_En_5_Fig5_HTML.png)


    c h 0 5 聚合查询 s q l 的屏幕截图。屏幕上半部分显示一些编程代码。下半部分显示消息和执行计划。排序成本，19%。流聚合成本，2%。排序成本，50%。表扫描成本，5%。索引查找成本，14%。


    图 5-5a


    原始查询，第一部分


    有很多成本高昂的任务。从右往左看，我们看到 `Customer` 表上的表扫描占了 5%。无需担心，因为该表只有五个客户，所以我们不需要对它做太多处理。索引不会有帮助，因为
    SQL Server 会将小表加载到内存中。


    我们确实看到了一个成本为 14% 的索引查找操作。


    索引查找是好的。查找意味着所需的行是通过一种称为 `b-tree`（二叉树）的结构检索的。索引扫描则不理想，因为它需要按顺序逐行检查表中的每一行，直到找到所需的行。在性能分析活动中，要持续关注这些情况。


    请记住：“`Index` seek good, `index` scan bad”（索引查找好，索引扫描坏），大多数时候都是如此。


    接下来，我们看到一个成本为 50% 的昂贵排序操作，最后还有一个成本为 19% 的排序操作。等等。这只是查询计划的一半。让我们看看左边另一半包含什么。


    请参见图 5-5b。


    ![](img/527021_1_En_5_Fig6_HTML.png)


    c h 0 5 聚合查询 s q l 的屏幕截图。屏幕上半部分显示一些编程代码。下半部分显示消息和执行计划。排序成本，19%。流聚合成本，2%。排序成本，50%。表扫描成本，5%。索引查找成本，14%。


    图 5-5b


    原始查询，第二部分


    这里是我们刚才讨论的那个作为占位符的成本为 19% 的排序操作，以便我们知道在整体查询计划中的位置。另一个需要考虑的任务是由于 `ROWS` 子句导致的窗口假脱机。这仅占
    1%，但它确实表明假脱机操作是针对物理存储执行的，而不是在内存中。


    现在我们有了一个性能基准。我们希望考虑使用 `CTE` 查询来加载一个报表表。记住，数据最多可以有 24 小时的延迟。


    在 `CTE` 查询上运行预估查询计划后，我们得到了图 5-5c 中的计划。


    ![](img/527021_1_En_5_Fig7_HTML.png)


    c h 0 5 聚合查询 s q l 的屏幕截图。屏幕上半部分显示一些编程代码。下半部分显示消息和执行计划。选择成本，0%。窗口假脱机成本，1%。排序成本，19%。


    图 5-5c


    `CTE` 预估查询计划


    预估查询计划确实建议了一个索引，可将性能提升 25.8%；提升幅度不算很大，但在夜间加载报表表时仍然会有帮助。如果我们能最小化加载时间，其他需要在夜间加载的查询就会有一些空间。注意，`Customer`
    表扫描的成本为 0%。另请注意，索引任务是一个扫描操作而不是查找操作。这占了 29% 的成本。这就是为什么查询计划估算工具建议了该索引。我们希望看到一个索引查找操作。


    清单 5-3 是建议的索引 `DDL` 命令。


    ```

    USE [APFinance]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [Financial].[Transaction] ([CustId])

    INCLUDE ([TransDate],[Symbol],[AcctNo],[BuySell])

    GO

    ```


    清单 5-3

    建议的索引


    我想出的索引名称是


    ```

    ieTransDateSymbolAcctNoBuySell

    ```


    将此名称复制到上面的代码中，然后执行命令即可创建索引。让我们运行第二个预估查询计划，看看有什么改进。


    请参见图 5-6 获取新的预估查询计划。


    ![](img/527021_1_En_5_Fig8_HTML.png)


    c h 0 5 聚合查询 s q l 的屏幕截图。屏幕上半部分显示一些编程代码。下半部分显示消息和执行计划。选择成本，0%。并行成本，27%。哈希匹配成本，42%。索引查找成本，27%。索引扫描成本，29%。


    图 5-6

    修订后的预估查询计划


    这很有趣。索引扫描仍然存在，但现在我们有了一个索引查找操作。两者都基于同一个索引。随后是一个成本为 0% 的自适应联接，接着是一个成本为 42% 的哈希匹配。最后，来自所有任务的流被汇集起来以生成最终的行输出。


    运行此查询来加载报表表耗时十秒，处理了 444,144 行。看起来时间很长。清单 5-4 是使用我们刚才讨论的表的 `INSERT` 命令。


    ```

    TRUNCATE TABLE Report.CustomerC0000001Analysis

    GO

    INSERT INTO Report.CustomerC0000001Analysis

    SELECT YEAR(T.TransDate)          AS TransYear

    ,DATEPART(qq,(T.TransDate)) AS TransQtr

    ,MONTH(T.TransDate)         AS TransMonth

    ,DATEPART(ww,T.TransDate)   AS TransWeek

    ,T.TransDate

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,T.AcctNo

    ,T.BuySell

    ,T.Symbol

    ,COUNT(*) AS DailyCount

    FROM [Financial].[Transaction] T

    JOIN [MasterData].[Customer] C

    ON T.CustId = C.CustId

    GROUP BY YEAR(T.TransDate)

    ,DATEPART(qq,(T.TransDate))

    ,MONTH(T.TransDate)

    ,T.TransDate

    ,T.BuySell

    ,T.Symbol

    ,C.CustId

    ,C.CustFname

    ,C.CustLname

    ,AcctNo

    GO

    ```


    清单 5-4

    加载客户分析表


    这个操作运行了 15 秒。甚至比我们测试前一个查询的时间还要长。我们可能需要考虑为使用客户数据创建一个 `内存优化表`，因为我们处理的行数较少。（我在本章的脚本中包含了创建内存优化表的代码，你可以试试看。）


    现在运行我们原始的查询并修改它，使其使用报表表。图 5-7 是当我们使用预加载的报表表代替 `CTE` 时，修订后的预估执行计划。


    ![](img/527021_1_En_5_Fig9_HTML.png)


    c h 0 5 聚合查询 s q l 的屏幕截图。屏幕上半部分显示一些编程代码。下半部分显示消息和执行计划。三个箭头分别指向窗口假脱机成本 8%，排序成本
    64%，以及索引查找成本 25%。


    图 5-7

    修订后查询的预估执行计划


    这看起来是一个更精简的计划。我们看到了一个成本为 25% 的索引查找，但也有一个成本高达 64% 的排序操作，还有那个窗口假脱机！它占了 8%，这意味着我们正在使用物理存储。我们需要更深入地研究这个策略并查看
    `profile statistics`（配置文件统计信息）。我们也应该看看 `IO` 和 `TIME` 统计信息，但限于篇幅，我们只查看 `PROFILE`
    统计信息。'
- fmt: 'Let’s examine the `PROFILE` statistics before and after the index was created.
    Make sure you execute the following commands before executing the query:


    ```

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    SET STATISTICS PROFILE ON

    GO

    ```


    Let’s execute the query and check out the `PROFILE` statistics. Please refer to
    Figure [5-8](#527021_1_En_5_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig10_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The screen divided into panels,
    presents result tables that compare the statistics of estimate C P U, average
    row size, and total subtree cost, before and after the execution of the plan.


    Figure 5-8


    Comparing partial performance statistics


    First of all, let’s look at the steps required to process this query. We have
    19 steps using the `CTE` vs. 11 steps with the report table strategy. The `EstimateIO`
    statistic is a little bit less with the reporting table that was preloaded. But
    of course, we have fewer steps. `EstimateCPU` is lower with the original `CTE`-based
    query, but `TotalSubTreeCost` is less in the second report table–based query.


    I would say we have an improvement as we have fewer steps with the second option.
    Also, the second query ran in zero seconds vs. two seconds with the first query.


    Please refer to Figure [5-9](#527021_1_En_5_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig11_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The screen divided into panels,
    presents result tables that compare the subtree statistics before and after the
    query execution. Two arrows indicate that the first query runs in 2 seconds and
    the second query runs in 0 seconds.


    Figure 5-9


    Comparing subtree cost statistics


    Clearly, the `CTE` approach generated 19 steps, and the report table approach
    generated 11 steps.


    In conclusion, after a rather exhausting performance analysis session, we see
    that creating a report table to preload data that originally was generated by
    a CTE yields performance enhancements. The suggested index did not hurt either.


    One other conclusion: Setting the performance statistics on will yield valuable
    performance analysis data. Another tool to use!


    ## SUM( ) Function


    This time our analysis focuses on customer accounts. Accounts are used to summarize
    the positions of the trades daily and also monthly so we can issue reports to
    the customer.


    Here is the syntax:


    ```

    SUM(ALL|DISTINCT *) or SUM(ALL|DISTINCT )

    ```


    I will not show any simple examples for this as I think by now you get the idea
    of when to use the `ALL` vs. `DISTINCT` keyword.


    Let’s examine the business specifications our analysts submitted.


    Once again, we need some analysis for the same customer, customer C0000001 (John
    Smith), for the cash account. This time we want to generate rolling daily balance
    totals for the month of January for the year 2012\. We need the capability to
    also generate a report for all three years, 2012, 2013, and 2014, for the same
    month. At a future date, we would like to compare performance for the current
    date vs. the same date in the prior year (this will involve the `LAG()` function).


    Last but not least, the report needs to be sorted by year, month, posting date,
    customer, account name, and number. The output of the report needs to be copied
    and pasted into a Microsoft Excel spreadsheet in order to generate a graph for
    analysis.


    A big thank you to our business analysts for this easy-to-follow specification.
    Always make sure to get written vs. verbal specifications; otherwise, the user
    will tell you got it wrong and will give you more verbal specifications and add-on
    requirements.


    This report has many possibilities and can be repurposed for other account types
    like equity and FX. Let’s review it.


    Please refer to Listing [5-5](#527021_1_En_5_Chapter.xhtml#PC10).


    ```

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate)  AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,SUM(AcctBalance) OVER(

    PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ) AS RollingDailyBalance

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /* Uncomment the line below, to report on more than 1 year,

    and comment out the line above*/

    --WHERE YEAR(PostDate) IN(2012,2013,2014)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    AND MONTH(PostDate) = 1

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    ```


    Listing 5-5


    Cash Account Totals Summary Analysis


    This is a basic report that does not use a `CTE`. The `SELECT` clause uses the
    `YEAR()` and `MONTH()` functions, which might prove costly. The `SUM()` function
    is used with an `OVER()` clause to generate the rolling daily balances. We partition
    by year and month although technically you do not need the year column, but it
    is there in case you want to expand the scope of the data processed over multiple
    years (by changing the `WHERE` clause).


    The `WHERE` clause implements the specification requirements as far as filtering
    the output, and finally an `ORDER BY` clause sorts the report for the user presentation.
    Let’s see what it looks like.


    Please refer to the partial results in Figure [5-10](#527021_1_En_5_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig12_HTML.jpg)


    A screenshot of c h 0 5 aggregate queries s q l. The upper panel presents some
    programming codes. The lower panel presents the result table. The account balance
    column and rolling daily balance column are highlighted in a box.


    Figure 5-10


    Cash account totals summary report


    Always do some data verification so that no surprises pop up. In this case check
    the rolling totals. Adding the account balances for the first two days, $483.10
    + $2147.40, we do indeed get $2630.50\. Since this is a small report, there are
    only 31 rows. Pop the results in a spreadsheet and validate the rolling totals.


    Now we copy and paste the results in another Excel spreadsheet and create a nice
    line graph to see how the account is performing.


    Please refer to the partial results in Figure [5-11](#527021_1_En_5_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig13_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 3 columns
    for post date, balance, and rolling balance. On the right screen, a line graph
    of balance versus date depicts varying curves of balance, rolling balance, and
    linear balance.


    Figure 5-11


    Cash account summary graph


    Pasting the results to an Excel spreadsheet can give us a good visual perspective
    on financial performance – in this case, cash account positions, which involve
    deposits, withdrawals, and also money market fund positions.


    Here we see a volatile line chart for balances, but the trend is up, so I guess
    that’s good. The dotted line is a trend line, so it looks like it is steadily
    going up. Remember also that the cash accounts are used to fund buy trades. When
    instruments are sold, the profit goes back into the cash account.


    The rolling balances are trending up also, so this is an indicator that the other
    financial investments are profitable.


    In conclusion, data generated by our window functions in a query is important
    and valuable, but adding a graph will provide extra insights that might not stand
    out in raw numbers!'
