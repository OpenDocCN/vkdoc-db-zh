    2、5、8、11、14 和 18 行用方框突出显示。

    图 6-45

    带有开始和结束日期的间隔


    这正是我们想看到的：所有间隔都有唯一的代码。我高亮显示了值大于一的间隔，这样我们可以抽查开始和结束日期是否合理。看第 18 行，`GAP139`，2012
    年 6 月 13 日和 2012 年 6 月 18 日之间确实有四天（2012 年 6 月 14、15、16 和 17 日）。如果我们能以某种方式将这些日期列在这两个日期旁边的逗号分隔字符串中，岂不是很好？


    这正是我们将在最后一步要做的！

