- fmt: 'Yes, this was a long one, but it provides minimal information that lets you
    understand what each attribute is used for.


    Note


    There are two items to mention. An outrigger table (see Kimball’s `The Data Warehouse
    Toolkit: The Definitive Guide to Dimensional Modeling`) is a table linked to a
    dimension table, for example, if you have a product table, then a product subcategory
    and product category are considered outriggers or the snowflake tables in a `SNOWFLAKE`
    schema. Second, technically, since these are business-type data dictionaries,
    you would not see any surrogate keys mentioned, but I took some liberties. Mainly,
    I generated the list of columns by querying system tables to generate the list
    of columns so I could put them in a document table.


    One more item: There will be several report tables that are denormalized and do
    not have surrogate keys. They are used to stage data to increase performance for
    our aggregate window queries. They are


    *   `Reports.EquipFailureManufacturer`

    *   `Reports.EquipmentDailyStatusHistoryByHour`

    *   `Reports.EquipmentFailureStatistics`

    *   `Reports.EquipmentFailureStatisticsMem`

    *   `Reports.EquipmentRollingMonthlyHourTotals`

    *   `Reports.EquipmentStatusHistoryByHour`

    *   `Reports.TempSensorLog`


    Watch out for these. As can be seen they will be assigned to the `Reports` schema.


    Lastly, three data dictionaries follow to describe the relationships between each
    of the fact tables and the dimension tables in the three subject areas. Let’s
    start off with the equipment failure fact table model.


    ## Entity Relationship Data Dictionary: Equipment Failure Subject Area


    In Table [8-5](#527021_1_En_8_Chapter.xhtml#Tab5) are the business rules that
    link the facts and dimensions for the equipment failure subject area.


    Table 8-5


    Entity Relationship Data Dictionary – Equipment Failure


    | `Parent Entity` | Relationship | `Child Entity` |

    | --- | --- | --- |

    | `Calendar` | Identifies failure date in | `Equipment Failure` |

    | `Location` | Identifies equipment location in | `Equipment Failure` |

    | `Equipment` | Is associated with | `Equipment Failure` |

    | `Equipment Type` | Identifies equipment type in | `Equipment Failure` |

    | `Valve` | Can be/Is a type of | `Equipment` |

    | `Turbine` | Can be/Is a type of | `Equipment` |

    | `Motor` | Can be/Is a type of | `Equipment` |

    | `Generator` | Can be/Is a type of | `Equipment` |

    | `Plant` | Is location for | `Valve` |

    | `Plant` | Is location for | `Turbine` |

    | `Plant` | Is location for | `Motor` |

    | `Plant` | Is location for | `Generator` |

    | `Location` | Identifies location of a | `Valve` |

    | `Location` | Identifies location of a | `Turbine` |

    | `Location` | Identifies location of a | `Motor` |

    | `Location` | Identifies location of a | `Generator` |

    | `Manufacturer` | Is supplier of | `Equipment` |

    | `Equipment Type` | Identifies type of | `Equipment` |


    These rules that link the entity objects together are usually derived through
    sessions between the data modeler or data architecture modeler and various business
    stakeholders. They are key to deriving the primary to foreign keys that will be
    assigned in the physical tables when the database is created.


    Usually there will be two rules implemented as verb phrases: one verb phrase from
    the parent entity to the child entity and one verb phrase from the child entity
    to the parent entity, for example:


    *   A valve is in a plant.

    *   A plant is the location of a valve.


    This is also true for master/detail structures like the following:


    *   A piece of equipment can be a generator.

    *   A generator is an example of a piece of equipment.


    I did not go into a rigorous implementation of the data dictionaries but aimed
    to give you just enough description of the business rules between business objects
    to understand the relationships that link them together.


    ## Entity Relationship Data Dictionary: Equipment Status History


    Next, we examine the business rules that link the facts and dimensions for the
    equipment status history subject area.


    Please refer to Table [8-6](#527021_1_En_8_Chapter.xhtml#Tab6).


    Table 8-6


    Entity Relationship Data Dictionary – Equipment Status History


    | `Parent Entity` | Relationship | `Child Entity` |

    | --- | --- | --- |

    | `Calendar` | Identifies status date for the status history in | `Equipment Status
    History` |

    | `Equipment` | Identifies equipment in the status history in | `Equipment Status
    History` |

    | `Equipment Online Status` | Identifies equipment online status code (on, maintenance,
    or offline) in | `Equipment Status History` |


    These simple relationships provide a minimal explanation of the business rules
    that link two business objects. These are key to understand as you will use them
    when you create the `JOIN` clauses in your queries. These of course are in the
    conceptual model but apply to our physical data warehouse also and will be used
    to implement the physical primary surrogate and foreign keys.


    Note


    I did not mention the cardinalities between the entities, for example, zero, one,
    or more to zero, one, or more rows. For example, equipment online status codes
    appear zero, one, or more times in the `Equipment Status History` entity. This
    was done to save some space. You can figure out the cardinalities by writing some
    queries between tables.


    ## Entity Relationship Data Dictionary: Plant Expense


    Next let’s examine the relationships between the `Plant Expense` fact table and
    the dimension tables in the plant expense subject area.


    Please refer to Table [8-7](#527021_1_En_8_Chapter.xhtml#Tab7).


    Table 8-7


    Entity Relationship Data Dictionary – Plant Expense


    | `Parent Entity` | Relationship | `Child Entity` |

    | --- | --- | --- |

    | `Calendar` | Identifies expense date in | `Plant Expense` |

    | `Plant` | Expenses identified in | `Plant Expense` |

    | `Plant Expense Category` | Identifies expense category for a plant in | `Plant
    Expense` |


    The information contained in the conceptual data models and data dictionaries
    is very important as it will assist you in understanding not only what is in the
    database tables but what the columns mean for when you create your scripts and
    queries, particularly when you need to join tables together.


    Note


    More extensive entity/relationship models would list the attributes in each entity.
    Again, this would take a lot of space, so I did not include them. You should try
    to use a tool like PowerPoint to create these models as this is another valuable
    skill and tool to have under your belt.


    A fourth data dictionary that shows the primary and foreign keys in each entity
    should be included, but you can identify them from the physical database tables.
    They are the surrogate keys used to implement the relationships, for example,
    `EquipmentId` will link any fact table to the `Equipment` dimension. You can identify
    these keys by looking at the table columns.


    Lastly, these are models of the simplest data warehouse design using a `SNOWFLAKE`
    schema approach. The intent is to give you enough tables to use in queries, not
    only the ones in the book but also on your own when you practice. Learning how
    to design star and snowflake schemas would take an entire book'
