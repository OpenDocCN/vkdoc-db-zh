    [APFinance].[Financial].[Portfolio].[Portfolio],

    [APFinance].[Financial].[Portfolio].[Month],

    [APFinance].[Financial].[Portfolio].[CustId],

    [APFinance].[Financial].[Portfolio].[PortfolioNo],

    [APFinance].[Financial].[Portfolio].[Year],

    [APFinance].[Financial].[Portfolio].[SweepDate]

    )

    DEFINE:([Expr1003]=SUM([APFinance].[Financial].[Portfolio].[Value])))

    ```


    Tip


    Make sure you include only the columns you need in the `GROUP BY`, `ORDER BY`,
    `OVER()`, and `WHERE` clauses to improve performance and to make sure the optimizer
    does not have to do extra work to ignore columns that are not needed.


    Next on deck is the window spool task at 3% generated by the default `RANGE` clause.


    Please refer to Figure [5-44e](#527021_1_En_5_Chapter.xhtml#Fig50).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig50_HTML.png)


