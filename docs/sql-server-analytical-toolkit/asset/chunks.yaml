- fmt: '### `ROW_NUMBER( )` Function


    Last but not least, the `ROW_NUMBER()` function. Let’s see what our business analysts’
    specifications look like:


    Our analysts would like to see a report that lists the plants, locations, years,
    quarters, and months ordered by the bucket they fall into, like the “Critical
    Failures” bucket. Of course, the number of equipment failures for each month needs
    to appear in the report.


    As each bucket has one or more months to report on, the analysts would like to
    see the number of the reporting event, not the month number but the sequence number
    or slot number, if you like, of the bucket.


    Lastly, the report needs to cover three years: 2008, 2009, and 2010.


    We will use a little trick for this in the definitions of the partitions. Here
    is what we came up with.


    Please refer to Listing [9-10](#527021_1_En_9_Chapter.xhtml#PC12).


    ```sql

    WITH FailedEquipmentCount

    AS (

    SELECT PlantName, LocationName, CalendarYear, QuarterName, [MonthName],

    CalendarMonth, SumEquipmentFailure,

    NTILE(5)  OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipmentFailure

    ) AS MonthBucket

    FROM [Reports].[EquipmentFailureStatistics]

    )

    SELECT PlantName,LocationName,CalendarYear,QuarterName,[MonthName]

    ,CASE

    WHEN MonthBucket = 5 AND SumEquipmentFailure  0

    THEN ''Severe Failures''

    WHEN MonthBucket = 4 AND SumEquipmentFailure  0

    THEN ''Critical Failures''

    WHEN MonthBucket = 3 AND SumEquipmentFailure  0

    THEN ''Moderate Failures''

    WHEN MonthBucket = 2 AND SumEquipmentFailure  0

    THEN ''Investigate Failures''

    WHEN MonthBucket = 1  AND SumEquipmentFailure  0

    THEN ''Maintenance Failures''

    WHEN MonthBucket = 1  AND SumEquipmentFailure = 0

    THEN ''No issues to report''

    ELSE ''No Alerts''

    END AS StatusBucket

    ,ROW_NUMBER()  OVER (

    PARTITION BY (

    CASE

    WHEN MonthBucket = 5 AND SumEquipmentFailure  0

    THEN ''Severe Failures''

    WHEN MonthBucket = 4 AND SumEquipmentFailure  0

    THEN ''Critical Failures''

    WHEN MonthBucket = 3 AND SumEquipmentFailure  0

    THEN ''Moderate Failures''

    WHEN MonthBucket = 2 AND SumEquipmentFailure  0

    THEN ''Investigate Failures''

    WHEN MonthBucket = 1  AND SumEquipmentFailure  0

    THEN ''Maintenance Failures''

    WHEN MonthBucket = 1  AND SumEquipmentFailure = 0

    THEN ''No issues to report''

    ELSE ''No Alerts''

    END

    )

    ORDER BY SumEquipmentFailure

    ) AS BucketEventNumber

    ,SumEquipmentFailure AS EquipmentFailures

    FROM FailedEquipmentCount

    WHERE CalendarYear IN (2008,2009,2010)

    GO

    ```


    Listing 9-10

    Failure Event Buckets with Bucket Slot Number


    The trick is that a `CASE` block was used instead of the column name in the `PARTITION
    BY` clause. This illustrates one of the many ways you can specify partitions.
    A neat little trick to place in your back pocket.


    Please refer to the partial results in Figure [9-26](#527021_1_En_9_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig26_HTML.png)


    A screenshot presents the codes at the top and a table at the bottom. The columns
    of the table read plan name, location name, calendar year, quarter name, month
    name, status bucket, bucket even number, and equipment failures. It highlights
    the entries for December and November.


    Figure 9-26


    Failure event bucket report with bucket slot number


    Okay, it works. Probably not a very valuable report, but I wanted to illustrate
    a variation of specifying the `PARTITION BY` clause.


    On the other hand, the results can be used to create a nice pivot table. Let’s
    copy and paste the results into a Microsoft Excel spreadsheet and create the pivot
    table.


    Please refer to the partial results in Figure [9-27](#527021_1_En_9_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig27_HTML.jpg)


    A screenshot of the Excel sheet. The window depicts the menu bar, followed by
    the tool bar at the top. The main page depicts the row labels and the sum of failures
    on the left side and the pivot table on the right side.


    Figure 9-27


    Failure event bucket pivot table


    By dragging and dropping column names into the Filters, Columns, Rows, or Values
    list box, you can perform some powerful slicing and dicing of the data and traverse
    up and down the hierarchies of totals. The filters are very handy as you can focus
    on parts of the data at a time. Here we are looking at results for the year 2008,
    the North Plant, and the boiler room location.


    You can also create a pivot graph with the same data.


    Please refer to the partial results in Figure [9-28](#527021_1_En_9_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig28_HTML.png)


    A screenshot of the Excel sheet. The window depicts the menu bar, followed by
    the tool bar at the top. The main page depicts the row labels and sum of failures
    on the left side and a bar chart on the right side. The bar chart presents the
    failure values of the boiler, furnace, and generator rooms.


    Figure 9-28


    Failure event bucket pivot graph


    The report output and the pivot table and pivot graph deliver a powerful set of
    tools to perform analysis and understand what is going on in our little power
    plant scenario. I definitely recommend that you run these queries, copy the results
    to Microsoft Excel, and generate the graphs and pivot tables. This is a powerful
    set of tools that will enhance your career, help you create powerful reports,
    and also help you solve performance issues.'
