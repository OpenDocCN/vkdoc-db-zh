    \ standard deviation is calculated month by month.\n\nIf you do not like the `NULL`,\
    \ just use a `CASE` block that tests the value returned and substitute it with\
    \ a zero!\n\nColumn `StdevTotalSales2` uses `STDEVP()`, and the values as can\
    \ be seen are a bit lower since the entire population of the data set is used.\n\
    \nFinally, columns `StdevTotalSales3` and `StdevTotalSales4` calculate the standard\
    \ deviation for the entire year. We will use the `STDEV()` year result in our\
    \ Excel spreadsheet to generate normal distribution values and generate a graph\
    \ called a bell curve based on each normal distribution value.\n\nLet’s check\
    \ out the graph now in Figure [2-18](#527021_1_En_2_Chapter.xhtml#Fig18).\n\n\
    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig18_HTML.png)\n\nA screenshot\
    \ of the M S Excel window. It has a table of 3 columns and 13 rows. The column\
    \ headers are month, total sales, and NORM. It also has a line graph of the normal\
    \ distribution versus months with an irregular sine wave curve. The first peak\
    \ is outlined.\n\nFigure 2-18\n\nStandard deviation bell curve(s)\n\nWhat we have\
    \ here are a series of small bell curves. For example, notice the curves between\
    \ months 2 and 4 and 4 and 6\\. In this case each curve is generated from three\
    \ values, a low one, then a high one, and back to a low value. The curve generated\
    \ for months 2–4 has values 0.068514, 0.759391, and 0.194656\\. These are great\
    \ values for the bell curve.\n\nTo generate the normal distribution for each month,\
    \ the Excel `NORM.DIST` function was used. This function uses these parameters:\
    \ the value, the average (MEAN), and the standard deviation generated by our query.\
    \ We then insert a suggested graph for these values."
  trans: "\n### STDEV() 与 STDEVP() 函数\n\n`STDEV()` 函数在整体**总体**数据未知或不可用时，计算一组值的统计标准差。\n\
    \n`STDEVP()` 函数则在已知数据集的整个**总体**时，计算其统计标准差。\n\n但这具体意味着什么呢？\n\n它的含义是衡量数据集中各数字与算术\
    \ `MEAN`（即平均值的另一种说法）的接近或偏离程度。在我们的上下文中，平均值或 `MEAN` 是指所有相关数据值的总和除以数据值的个数。\n\n还有其他类型的\
    \ `MEAN`，如几何平均数、调和平均数或加权 `MEAN`，我将在附录 B 中简要介绍。\n\n那么，标准差是如何计算的呢？\n\n您可以使用以下算法，通过\
    \ T-SQL 计算标准差：\n\n*   计算所有相关值的平均值 (`MEAN`) 并将其存储在一个变量中。\n*   对于数据集中的每个值\n    *\
    \   减去计算出的平均值。\n    *   将结果平方。\n*   将所有结果求和，然后将该值除以数据元素个数减 1。（此步骤计算方差；若要计算整个总体的方差，则无需减\
    \ 1。）\n*   现在对方差取平方根，即得到标准差。\n\n当然，您也可以直接使用 `STDEV()` 函数！如前所述，还有一个 `STDEVP()`\
    \ 函数。如前所述，两者的唯一区别在于 `STDEV()` 作用于数据的**部分总体**。这适用于整个数据集未知的情况。而 `STDEVP()` 函数则作用于代表**整个总体**的数据集。\n\
    \n其语法如下：\n\n```sql\nSELECT STDEV( ALL | DISTINCT ) AS [Column Alias]\nFROM [Table\
    \ Name]\nGO\n```\n\n您需要提供一个包含所需数据的列名。您可以选择性地指定 `ALL` 或 `DISTINCT` 关键字。如果省略这些关键字，与其他函数一样，默认行为将采用\
    \ `ALL`。使用 `DISTINCT` 关键字将忽略列中的重复值。\n\n让我们看一个使用此窗口函数的 T-SQL 查询示例。我们希望按年份、客户、商店编号和产品编号计算标准差及平均值。\n\
    \n通常，我们从一个公共表表达式 (CTE) 开始，进行一些预处理并返回我们的数据集。\n\n请参考清单 2-8。\n\n```sql\nWITH CustomerPurchaseAnalysis\n\
    (PurchaseYear,PurchaseMonth,StoreNo,ProductNo,CustomerNo,TotalSalesAmount)\nAS\n\
    (\nSELECT\nYEAR(CalendarDate)  AS PurchaseYear,\nMONTH(CalendarDate) AS PurchaseMonth,\n\
    StoreNo,\nProductNo,\nCustomerNo,\nSUM(TransactionQuantity * UnitRetailPrice)\
    \ AS TotalSalesAmount\nFROM StagingTable.SalesTransaction\nGROUP BY YEAR(CalendarDate),MONTH(CalendarDate),ProductNo,CustomerNo,StoreNo\n\
    )\nSELECT\ncpa.PurchaseYear,\ncpa.PurchaseMonth,\ncpa.StoreNo,\ncpa.ProductNo,\n\
    c.CustomerNo,\nCONVERT(DECIMAL(10,2),cpa.TotalSalesAmount) AS TotalSalesAmount,\n\
    AVG(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount)) OVER(\n--PARTITION BY cpa.PurchaseYear,c.CustomerNo\n\
    ORDER BY cpa.PurchaseYear,c.CustomerNo\n) AS AvgPurchaseCount,\nSTDEV(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS StdevTotalSales,\nSTDEVP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\nORDER BY cpa.PurchaseMonth\n) AS StdevpTotalSales,\nSTDEV(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\n) AS StdevTotalSales,\nSTDEVP(CONVERT(DECIMAL(10,2),cpa.TotalSalesAmount))\
    \ OVER(\n) AS StdevpYearTotalSales\nFROM CustomerPurchaseAnalysis cpa\nJOIN DimTable.Customer\
    \ c\nON cpa.CustomerNo = c.CustomerNo\nWHERE cpa.CustomerNo = 'C00000008'\nAND\
    \ PurchaseYear = 2011\nAND ProductNo = 'P00000038114';\nGO\n```\n\n清单 2-8：标准差销售分析\n\
    \n该 CTE 从日期中提取年份和月份部分。我们还通过将交易数量乘以单位零售价来计算总销售额。\n\n我们计算了整个年份的平均值，因为我们希望在 Excel\
    \ 电子表格中使用该值来计算和绘制正态分布的钟形曲线。我们很快会看到它。\n\n接下来，使用 `STDEV()` 和 `STDEVP()` 函数计算标准差值。我们以两种不同的方式执行计算。第一对在\
    \ `OVER()` 子句中使用了 `ORDER BY` 子句，以便获得滚动的月度结果。第二对没有使用 `PARTITION BY` 或 `ORDER BY`\
    \ 子句，因此默认的框架行为生效：处理结果时，包括相对于当前行的所有先前和后续行。\n\n让我们在图 2-17 中查看结果。\n\n![](img/527021_1_En_2_Fig17_HTML.png)\n\
    \n图 2-17：计算标准差\n\n简短明了。结果针对一个客户，一年按月份展示。注意第一列标准差结果 `StdevTotalSales1` 中的 `NULL`\
    \ 值。这是因为它是分区中的第一个值，无法为单个值计算标准差，因此结果为 `NULL`。而 `STDEVP()` 函数则没有问题，它直接返回 0。对于剩余月份，滚动标准差是逐月计算的。\n\
    \n如果您不喜欢 `NULL`，只需使用一个 `CASE` 语块来检测返回的值并用零替换即可！\n\n列 `StdevTotalSales2` 使用了 `STDEVP()`，可以看到其值略低，因为使用了数据集的整个总体。\n\
    \n最后，列 `StdevTotalSales3` 和 `StdevTotalSales4` 计算了整个年份的标准差。我们将在 Excel 电子表格中使用\
    \ `STDEV()` 的年度结果来生成正态分布值，并基于每个正态分布值生成一个名为钟形曲线的图表。\n\n现在让我们查看图 2-18 中的图表。\n\n\
    ![](img/527021_1_En_2_Fig18_HTML.png)\n\n图 2-18：标准差钟形曲线\n\n这里展示的是一系列小的钟形曲线。例如，注意第\
    \ 2-4 个月和第 4-6 个月之间的曲线。在这种情况下，每条曲线由三个值生成：一个低值，然后一个高值，再回到一个低值。为第 2-4 个月生成的曲线值为\
    \ 0.068514、0.759391 和 0.194656。这些都是钟形曲线的理想值。\n\n为了生成每个月的正态分布，使用了 Excel 的 `NORM.DIST`\
    \ 函数。该函数使用这些参数：数值、平均值 (`MEAN`) 以及我们查询生成的标准差。然后，我们为这些值插入一个建议的图表。\n"
- fmt: '### STDEV：性能调优注意事项


    让我们进行一些性能分析。通过高亮显示我们刚才讨论的查询，并使用常用方法之一生成查询计划，我们会看到一个似乎已经使用了索引的计划。


    请参考图 [2-19](#527021_1_En_2_Chapter.xhtml#Fig19)。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig19_HTML.jpg)


    图 2-19

    首次分析查询计划


    从右向左看，我们看到一个成本为 4% 的索引查找（index seek）和一个估计成本为 80% 的 RID（行 ID）查找任务。这似乎是大部分工作发生的地方。


    忽略成本为 0% 的任务，我们看到 `Customer` 表上的表扫描（table scan）成本为 7%，排序（sort）步骤成本为 7%。最后，我们看到一个成本为
    1% 的嵌套循环内部连接（nested loops inner join）步骤。


    这是一个部分截图。我忽略了成本为零的步骤，以便我们能够专注于高成本步骤（在你的查询中，请将所有步骤考虑在内）。


    注意，这里生成了一个建议索引。将鼠标指针悬停在索引上（它会以绿色字体显示），然后右键单击该索引。当弹出菜单出现时，单击“缺失索引详细信息”以在新的查询窗口中生成
    TSQL 代码。将出现清单 [2-9](#527021_1_En_2_Chapter.xhtml#PC16) 中的以下代码。


    ```

    /*

    Missing Index Details from chapter 02 - TSQL code - 09-13-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (65))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 80.174%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [StagingTable].[SalesTransaction] ([CustomerNo],[ProductNo])

    INCLUDE ([StoreNo],[CalendarDate],[TransactionQuantity],[UnitRetailPrice])

    GO

    */

    /* Copy code from above and paste and supply name */

    DROP INDEX IF EXISTS [CustNoProdNoStoreNoDateQtyPrice]

    ON [StagingTable].[SalesTransaction]

    GO

    CREATE NONCLUSTERED INDEX [CustNoProdNoStoreNoDateQtyPrice]

    ON [StagingTable].[SalesTransaction] ([CustomerNo],[ProductNo])

    INCLUDE ([StoreNo],[CalendarDate],[TransactionQuantity],[UnitRetailPrice])

    GO

    ```

    清单 2-9

    估计查询计划 – 建议的索引


    我需要做的只是复制并粘贴建议的索引模板，并为索引提供一个名称。我在名称中使用了与索引相关的所有列，以便清楚地表明该索引覆盖的内容。


    在真实的生产环境中，你可能只会给它一个较短的名称，但由于我们处于学习模式，我决定在名称方面稍显冗长。我还添加了一个 `DROP INDEX` 命令，以便当你开始自行分析此查询时可以使用。


    让我们创建索引，生成一个新的查询计划，然后执行查询，以便使用 `SET STATISTICS` 命令生成一些统计信息。


    请参考图 [2-20](#527021_1_En_2_Chapter.xhtml#Fig20) 获取新计划。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig20_HTML.png)


    图 2-20

    修订后的查询计划


    有了一些明显的改进。从查询计划的右侧向左看，我们现在看到在 `SalesTransaction` 表上的索引查找成本为 12%。接下来是一个相当昂贵的排序步骤，成本为
    40%。`Customer` 表使用表扫描，成本为 38%，这无法避免，因为我们没有为该表创建索引。这个表只有 100 行，所以索引很可能不会被使用，但你可以自行创建一个并进行实验，看看是否有任何好处。


    正中间是一个成本为 7% 的嵌套循环内部连接，不算太昂贵。还有一个成本为 2% 的最终嵌套循环内部连接。对于我们的讨论，我们将忽略成本为 0% 的任务。


    那么，这算是一种改进吗？看起来是的，因为有了索引查找。不过，`IO` 和 `TIME` 统计信息将给我们更清晰的图景，所以让我们来看看它们。


    请参考表 [2-4](#527021_1_En_2_Chapter.xhtml#Tab4)。


    表 2-4

    比较 IO 统计信息


    | SQL Server 解析和编译时间 | 现有索引 | 新索引 |

    | --- | --- | --- |

    | CPU 时间（毫秒） | 0 | 31 |

    | 已用时间（毫秒） | 11 | 79 |

    | **统计信息（工作表）** | **现有索引** | **新索引** |

    | 扫描计数 | 18 | 18 |

    | 逻辑读取 | 133 | 133 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **统计信息（SalesTransaction）** | **现有索引** | **新索引** |

    | 扫描计数 | 1 | 1 |

    | 逻辑读取 | **43** | **5** |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **统计信息（Customer）** | **现有索引** | **新索引** |

    | 扫描计数 | 1 | 1 |

    | 逻辑读取 | 216 | 216 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **SQL Server 执行时间** | **现有索引** | **新索引** |

    | CPU 时间（毫秒） | 16 | 0 |

    | 已用时间（毫秒） | 4 | 30 |


    该表显示了创建索引前后的统计信息。


    我认为结果很有趣。从 SQL Server 解析和编译时间开始，新索引的时间统计信息实际上增加了，而不是减少了。


    工作表的统计信息保持不变，而 `SalesTransaction` 表的统计信息显著下降。逻辑读取从 43 次减少到 5 次，这非常好。物理读取和预读读取保持为
    0。


    最后，在处理结束时，对于 SQL Server 执行时间，CPU 时间从 16 毫秒降为零，这是一个显著的改进，而用时从 4 毫秒增加到了 30 毫秒。


    总之，添加索引减少了逻辑读取，但解析和执行的用时增加了。


    `SalesTransaction` 表大约有 24,886 行，这不算多。如果我们有几百万行，才会注意到实际性能的改进或变化。


    表 [2-5](#527021_1_En_2_Chapter.xhtml#Tab5) 显示了在我通过删除加载脚本中的任何 `WHERE` 子句过滤器加载了大约
    175 万行数据后的前后统计信息。（此脚本可在出版商的 Google 站点上的本章加载脚本中找到。）


    表 2-5

    比较 200 万行数据上的统计信息


    | SQL Server 解析和编译时间 | 现有索引 | 新索引 |

    | --- | --- | --- |

    | CPU 时间（毫秒） | **32** | **0** |

    | 已用时间（毫秒） | **62** | **0** |

    | **统计信息（工作表）** | **现有索引** | **新索引** |

    | 扫描计数 | 18 | 18 |

    | 逻辑读取 | 133 | 134 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **统计信息（SalesTransaction）** | **现有索引** | **新索引** |

    | 扫描计数 | **5** | **1** |

    | 逻辑读取 | **41840** | **76** |

    | 物理读取 | 0 | 3 |

    | 预读读取 | **38135** | **71** |

    | **统计信息（Customer）** | **现有索引** | **新索引** |

    | 扫描计数 | 1 | 1 |

    | 逻辑读取 | 18 | 18 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **SQL Server 执行时间** | **现有索引** | **新索引** |

    | CPU 时间（毫秒） | 485 | 0 |

    | 已用时间（毫秒） | **2926** | **48** |'
  raw: '### STDEV: Performance Tuning Considerations


    Let’s do some performance analysis. By highlighting the query we just discussed
    and generating a query plan in one of the usual methods, we are presented with
    a plan that appears to already use an index.


    Please refer to Figure [2-19](#527021_1_En_2_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig19_HTML.jpg)


    A screenshot of the S Q L S S M S window. It presents the first analysis query
    plan with 12 components. The components are nested loops, stream aggregate, sort,
    table scan, compute scalar, nested loops, index seek, R I D lookup, compute scalar,
    stream aggregate, table spool, and table spool.


    Figure 2-19


    First analysis query plan


    Starting from right to left, we see an index seek with a cost of 4% and a RID
    (row ID) lookup task with an estimated cost of 80%. This is where most of the
    work seems to be happening.


    Ignoring the tasks with 0% cost, we see a table scan on the Customer table with
    a cost of 7% and a sort step with a cost of 7%. Finally, we see a nested loops
    inner join step with a cost of 1%.


    This is a partial screenshot. I ignored the steps with zero cost so we can concentrate
    on the high-cost steps (in your queries, take all steps into account).


    Notice that a suggested index was generated. Hold the mouse pointer over the index
    (it will be in green font) and right-click the index. When the pop-up menu appears,
    click “Missing Index Details” to generate the TSQL code in a new query window.
    The following code in Listing [2-9](#527021_1_En_2_Chapter.xhtml#PC16) is presented.


    ```

    /*

    Missing Index Details from chapter 02 - TSQL code - 09-13-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (65))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 80.174%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [StagingTable].[SalesTransaction] ([CustomerNo],[ProductNo])

    INCLUDE ([StoreNo],[CalendarDate],[TransactionQuantity],[UnitRetailPrice])

    GO

    */

    /* Copy code from above and paste and supply name */

    DROP INDEX IF EXISTS [CustNoProdNoStoreNoDateQtyPrice]

    ON [StagingTable].[SalesTransaction]

    GO

    CREATE NONCLUSTERED INDEX [CustNoProdNoStoreNoDateQtyPrice]

    ON [StagingTable].[SalesTransaction] ([CustomerNo],[ProductNo])

    INCLUDE ([StoreNo],[CalendarDate],[TransactionQuantity],[UnitRetailPrice])

    GO

    Listing 2-9

    Estimated Query Plan – Suggested Index

    ```


    All I needed to do was copy and paste the suggested index template and supply
    a name for the index. I used all the columns related to the index in the name,
    so it is clear what the index covers.


    In a real production environment, you would most likely just give it a shorter
    name, but as we are in learning mode, I decided to be a bit verbose as far as
    the names are concerned. I also added a `DROP INDEX` command so that it is available
    to you when you start analyzing this query on your own.


    Let’s create the index, generate a new query plan, and then execute the query
    so we generate some statistics with the `SET STATISTICS` commands.


    Please refer to Figure [2-20](#527021_1_En_2_Chapter.xhtml#Fig20) for the new
    plan.


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig20_HTML.png)


    A screenshot of the S Q L S S M S window. It presents the revised query plan with
    15 components. These are segment, nested loops, table spool, segment, nested loops,
    stream aggregate, sort, compute scalar, index seek, table scan, nested loops,
    compute scalar, stream aggregate, and 2 table spools.


    Figure 2-20


    Revised query plan


    Some definite improvements. Starting from right to left in the query plan, we
    now see an index seek on the `SalesTransaction` table at a cost of 12%. A fairly
    expensive sort step at 40% appears next. The Customer table uses a table scan
    at a cost of 38%, which cannot be helped because we did not create an index for
    this table. This table has only 100 rows, so an index would most likely not be
    used, but on your own, you can create one and experiment to see if there are any
    benefits.


    Right in the middle, there is a nested loops inner join at 7% cost. Not too expensive.
    There is also a final nested loops inner join at 2%. For our discussion we will
    ignore the tasks at 0% cost.


    So is this an improvement? Looks like it because of the index seek. The `IO` and
    `TIME` statistics will give us a clearer picture though, so let’s look at them.


    Please refer to Table [2-4](#527021_1_En_2_Chapter.xhtml#Tab4).


    Table 2-4


    Comparing IO Statistics


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 0 | 31 |

    | Elapsed time (ms) | 11 | 79 |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 18 | 18 |

    | Logical reads | 133 | 133 |

    | Physical Reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (SalesTransaction)** | **Existing Index** | **New Index** |

    | Scan count | 1 | 1 |

    | Logical reads | **43** | **5** |

    | Physical Reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (Customer)** | **Existing Index** | **New Index** |

    | Scan count | 1 | 1 |

    | Logical reads | 216 | 216 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | 16 | 0 |

    | Elapsed time (ms) | 4 | 30 |


    This table shows statistics before and after the index was created.


    Some interesting results, I think. Starting with SQL Server parse and compile
    times, time statistics actually went up with the new index, not down.


    Statistics for the work table remained the same, while statistics for the `SalesTransaction`
    table went down significantly. Logical reads went from 43 to 5, which is very
    good. Physical reads and read-ahead reads remained at 0.


    Finally, at the end of processing, for SQL Server execution times, CPU time went
    from 16 to zero, so that’s a significant improvement, while elapsed time increased
    from 4 to 30 ms.


    In conclusion, adding the index reduced logical reads, but elapsed time for parsing
    and execution increased.


    The `SalesTransaction` table has about 24,886 rows, which is not a lot. Real performance
    improvements or changes would be noticeable if we had a couple of million rows.


