    这是一张 SQL Server Management Studio (SSMS) 窗口的截图，展示了估计查询计划的第 2 部分，包含 14 个组件。组件包括：计算标量、序列投影、段、嵌套循环
    (3%)、表假脱机、段、排序 (7%)、流聚合、排序 (10%)、嵌套循环、计算标量、流聚合、2 个表假脱机。


    图中有个来自上一张截图的排序任务作为参考点。我只指出那些非零成本的任务。出现了一个排序（成本 7%），接着是一个用于合并分支流的嵌套循环联接任务（成本 3%）。让我们继续看下一部分。


    请参考图 10-25c。


    ![](img/527021_1_En_10_Fig35_HTML.png)


