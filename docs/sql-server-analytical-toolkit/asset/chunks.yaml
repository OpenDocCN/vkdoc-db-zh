- fmt: '## 业务概念模型


    这个业务概念模型旨在传达一个客户持有一个或多个投资组合。一个投资组合由账户组成，账户包括现金、股票、商品（黄金、白银等）、外汇（外汇交易）、期权和衍生品。我本可以创建一个名为衍生品的子类型，并将掉期、期权和奇异衍生品（如掉期期权）作为子类型出现，但我想保持模型的简单性。你可以尝试一下。研究一下这些金融工具是什么。如果你受到启发并且你是金融专家，你可以修改数据模型和数据库。


    接下来我们讨论交易。交易涉及前面提到的金融工具（不是你演奏的乐器），并且每个客户每天可能有的一笔或多笔交易。最后，`Calendar`实体为`Transaction`实体中的每个日期标识数据对象，即不仅包括日期，还包括该日期的年、月、季度和周部分。


    我没有为主键和外键属性包含数据字典，但你可以通过下载本章用于创建数据库和表以及填充表的代码，在物理表本身中识别这些。`Customer`实体主键属性的一个例子是“客户号码”。这可以用来唯一标识一个客户。当它出现在另一个实体（如`Transaction`实体）中时，它充当外键。此属性用于将两个实体链接在一起。


    > **注意**

    >

    > 用于创建`APFinance`财务数据库的`DDL`命令可以在本书本章的Google网站上找到，同时提供了创建所有表和视图的脚本以及加载测试数据的脚本。代码易于使用。每个步骤都有标签，必要时还有注释帮助澄清每个步骤的作用。（图形示例中使用的电子表格也可用。）

    >

    > 确保你复习我们刚刚讨论的模型和数据字典，以便你能够舒适地理解我们将要讨论的查询，特别是当我们在查询中引用和连接多个表时。


    如果你不是按顺序阅读章节，我将再次简要描述每个函数的作用。我总是觉得翻回20、30页或更多页来复习一个对我来说是新概念的东西有点麻烦。如果你对这些还不熟悉，一点复习也无妨。如果你知道它们的作用，直接跳过描述即可。


    ## COUNT( ) 和 SUM( ) 函数


    `COUNT()`函数允许你计算数据值在行的一列中出现的次数。我还将包括`SUM()`函数，它对列中的数据值求和。这两者都将在我们的示例中使用，看看如何将其应用于我们的金融银行业务场景。


    语法很简单：


    ```sql

    COUNT(*) or COUNT(ALL|DISTINCT )

    SUM() or SUM(ALL|DISTINCT )

    ```


    回到`COUNT()`函数。使用通配符符号“*”来计算满足查询要求的所有行；我的意思是，如果查询包含或不包含`GROUP BY`子句。如果你指定了一个列，你可以选择包含关键字`ALL`或`DISTINCT`，或者完全省略它。


    例如，假设一个表中有十行，该表包含一个名为`ProductType`的列。对于表中的六行，该列包含“Type A”，对于四行，该列的值为“Type B”。如果我们计算类型的数量，我们得到2。如果我们计算第一个类型中的值的数量，我们得到六。如果我们计算第二个类型中的值的数量，我们得到四。如果我们不考虑类型计算所有值，我们得到十。小菜一碟！


    让我们看看在一些简单的查询中使用函数的语法变体后的结果。


    请参考代码清单[5-1](#527021_1_En_5_Chapter.xhtml#PC2)。


    ```sql

    DECLARE @CountExample TABLE (

    ProductType VARCHAR(64)

    );

    INSERT INTO @CountExample VALUES

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type B''),

    (''Type B''),

    (''Type B''),

    (''Type B'');

    SELECT COUNT(*) FROM @CountExample;

    SELECT COUNT(DISTINCT ProductType) FROM @CountExample;

    SELECT COUNT(ALL ProductType) FROM @CountExample;

    SELECT COUNT(ProductType) FROM @CountExample;

    GO

    -- 代码清单 5-1

    -- COUNT() 函数的各种形式

    ```


    例子很简单。但有一些你需要意识到的细微差别。


    例如，使用`DISTINCT`只会计算不同的值，这可能取决于业务用户给你的业务规范，是你想要的或者不是你想要的。


    确保你计算的是你认为想要计算的东西。例如，如果你一天内有2、2、5、7、7和2笔交易（在不同时间，针对相同或不同的金融工具），你想要计算它们全部，而不仅仅是不同的值。这里我们有六个交易事件，总计25笔交易，所以要注意其中的区别。


    让我们执行这些简单的查询并检查结果。请参考图[5-2](#527021_1_En_5_Chapter.xhtml#Fig2)。


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig2_HTML.jpg)


    > 图 5-2

    >

    > 使用 `ALL` 与 `DISTINCT`


    回到查询示例，我们看到查询1、3和4的结果相同，值为10。使用了`DISTINCT`关键字的第二个查询生成的值是2！


    所以要注意，如果你省略`ALL`关键字，你会得到与在`COUNT()`函数中包含它相同的结果。使用通配符星号将计算所有内容。


    在使用所有聚合函数和其他函数时请记住这一点，因为这种语法在所有函数中都是通用的。


    如果在此阶段你有点困惑，为什么不下载代码并尝试一下。稍微修改一下查询，直到你感到得心应手。


    让我们在一个更复杂的查询中尝试这个函数，使用我们的财务数据。让我们从第一个示例的简单业务规范开始。'
  raw: 'This business conceptual model is meant to convey that a customer holds one
    or more portfolios. A portfolio is made up of accounts that include cash, equity,
    commodities (gold, silver, etc.), FX (foreign currency exchange), options, and
    derivatives. I could have created a subtype called derivatives and have all the
    swap, option, and exotic derivatives like swaptions appear as subtypes, but I
    want to keep the model simple. You can try it out. Research what these instruments
    are. You can modify the data model and database if you are inspired to do so and
    if you are an expert financial type.


    Let’s discuss transactions next. Transactions deal with the instruments (not the
    ones you play) mentioned earlier, and there can be one or more transactions a
    day per customer. Lastly, the Calendar entity identifies the data objects for
    each date in the Transaction entity, that is, not only dates for days but the
    year, month, quarter, and week parts of a date.


    I did not include a data dictionary for the primary and foreign key attributes,
    but you can identify these in the physical tables themselves by downloading the
    code for this chapter used to create the database and tables and also populate
    the tables. An example of a primary key attribute for a Customer entity is “Customer
    Number.” This can be used to uniquely identify a customer. It acts as a foreign
    key when it appears in another entity like the Transaction entity. This attribute
    is used to link both entities together.


    Note


    The `DDL` commands used to create the `APFinance` financial database can be found
    on the Google website dedicated to this book for this chapter together with scripts
    to create all tables and views and scripts to load the tables with test data.
    The code is easy to use. Each step is labeled, and where necessary comments help
    clarify what each step does. (Spreadsheets used in the graph examples are available
    also.)


    Make sure you review the model and data dictionaries we just discussed so that
    you are comfortable understanding the queries we will discuss, especially when
    we refer to and join multiple tables in a query.


    In case you are not reading the chapters sequentially, I will include a brief
    description of what each function does again. I always find it a bit cumbersome
    to flip back 20, 30, or more pages to review a concept that is new to me. If you
    are new to these, a little review will not hurt. If you know what they do, just
    skip the descriptions.


    ### COUNT( ) and SUM( ) Functions


    The COUNT() function allows you to count the number of times a data value appears
    in a row column. I include the SUM() function, which adds up data values in a
    column. Both of these will be used in our example to see how that can be applied
    to our financial banking scenario.


    The syntax is easy:


    ```

    COUNT(*) or COUNT(ALL|DISTINCT )

    SUM() or SUM(ALL|DISTINCT )

    ```


    Back to the `COUNT()` function. Use the wildcard character symbol “*” to count
    all rows that satisfy the query requirements; by this I mean if the query includes
    or does not include a `GROUP BY` clause. If you call out a column, you can optionally
    include the keyword `ALL` or `DISTINCT` or leave it out entirely.


    For example, assume you have ten rows in a table and the table includes a column
    called `ProductType`. For six of the rows in the table, the column contains “Type
    A,” and for four of the rows, the value for the column is “Type B.” If we count
    the number of types, we get 2\. If we count the number of values in the first
    type, we get six. If we count the number of values in the second type, we get
    four. If we count all values regardless of type, we get ten. Walk in the park!


    Let’s see the results if we use the syntax variations of the function in some
    simple queries.


    Please refer to Listing [5-1](#527021_1_En_5_Chapter.xhtml#PC2).


    ```

    DECLARE @CountExample TABLE (

    ProductType VARCHAR(64)

    );

    INSERT INTO @CountExample VALUES

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type A''),

    (''Type B''),

    (''Type B''),

    (''Type B''),

    (''Type B'');

    SELECT COUNT(*) FROM @CountExample;

    SELECT COUNT(DISTINCT ProductType) FROM @CountExample;

    SELECT COUNT(ALL ProductType) FROM @CountExample;

    SELECT COUNT(ProductType) FROM @CountExample;

    GO

    Listing 5-1

    COUNT() Function in All Its Flavors

    ```


    The example is simple. But there are subtle variations you need to be aware of.


    Using `DISTINCT`, for example, will only count distinct values, and this might
    be what you want or not what you want depending on the business specification
    given to you by your business users.


    Make sure you count what you think you want to count. For example, if you have
    2, 2, 5, 7, 7, and 2 trades in a day (at different times for the same or different
    instruments), you want to count them all, not just the distinct values. Here we
    have six trade events that add up to 25 trades, so be aware of the difference.


    Let’s execute the simple queries and check out the results. Please refer to Figure
    [5-2](#527021_1_En_5_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig2_HTML.jpg)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the results for queries
    1, 3, and 4\. An arrow indicates the number of column name 2.


    Figure 5-2


    Using ALL vs. DISTINCT


    Back to the query example, we see results for queries 1, 3, and 4 are the same,
    the value of 10\. The second query that uses the `DISTINCT` keyword generates
    a value of 2!


    So be aware that if you leave out the `ALL` keyword, you will get the same result
    as when you include it in the `COUNT()` function. Using the wildcard character,
    the asterisk will count everything.


    Keep this in mind when you use all the aggregate and other functions as this syntax
    is common to all of them.


    If at this stage you are a little bit confused, why not download the code and
    try it out. Modify the query a bit until you feel comfortable.


    Let’s try this function out in a more complex query with our financial data. Let’s
    start with a simple business specification for our first example.'
