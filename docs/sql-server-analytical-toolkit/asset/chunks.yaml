- fmt: '## Our Journey


    本书的目标是汇集一套可用于执行商业智能分析、数据挖掘和数据分析的工具。我亲切地称之为 SQL Server 工具包。


    我首先识别了自 2012 年以来 SQL Server 中可用的三类函数：

    - 聚合函数

    - 排名函数

    - 分析函数


    这些函数与 `OVER()` 子句结合使用时，被视为窗口函数，并提供了强大的功能，例如跨月、日、年等时间跨度创建滚动计算。它们甚至允许我们在一组历史数据中向后和向前遍历，以便将当前值（在某个时间点）与未来或过去的值进行比较。最后但同样重要的是，一些函数可用于执行统计分析，例如在数据集中计算标准差、方差、均值和中位数值。


    我们将这些函数应用于四个行业，以了解如何在每个行业中执行分析：

    - 销售用例

    - 财务用例

    - 发电厂设备监控和故障分析用例

    - 库存移动管理用例


    在此过程中，我意识到这些工具只是 BI 数据分析策略版图的一部分。我介绍了多种工具，如 SSIS、SSRS、SSAS、Power BI、Report Builder
    和 Microsoft Excel，以帮助我们可视化利用窗口函数的查询结果。


    这些工具使我们能够生成、查看和分析业务分析师会用来报告公司绩效的有趣模式。最后，我们研究了一些性能分析工具，例如估计查询计划，它使我们能够分析查询性能并制定改进策略。


    让我们回顾一下这些工具，并通过向您展示如何获取它们（下载、安装和配置）来总结！但首先，关于代码的说明。


    ## About the Code


    代码可以在本书出版商的网站上找到。每个业务用例都有三个专用文件夹，每个函数类别一个。在业务场景中作为第一章的每个章节文件夹都有三个子文件夹，分别用于创建数据库和表（`CREATE
    DATABASE` 文件夹）、加载表（`LOAD DATABASE` 文件夹）以及每章涵盖的查询（`CHAPTER QUERIES` 文件夹）。业务场景中剩余的两章只有查询文件夹。下载代码后，请确保在您的
    PC 或笔记本电脑上为每章创建这些文件夹，以便轻松找到 TSQL 代码脚本。


    如图 [14-1](#527021_1_En_14_Chapter.xhtml#Fig1) 所示。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig1_HTML.jpg)


    图 14-1 代码的文件夹结构


    现在您知道在哪里下载代码以及将其放置在您设备上的哪个位置了。创建一个 `BACKUP` 文件夹是个好主意，这样您可以在修改脚本之前保存它们，以防万一搞砸了！相信我，备份文件夹多次救了我。


    ## About the Database Folders


    我为每个数据库设置了一个文件夹，每个数据库有三个子文件夹，如图 [14-2](#527021_1_En_14_Chapter.xhtml#Fig2) 所示。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig2_HTML.jpg)


    图 14-2 数据库的文件夹结构


    我在 D 盘上创建了 `APRESS_DATABASES` 文件夹。我建议您使用与我相同的结构，当然，如果您只有一个驱动器（C 盘），您可以在那里设置文件夹。您需要修改创建数据库的
    DDL 脚本，使其引用您在计算机上设置的文件夹结构。


    如果您有 D 盘，请按照所示设置文件夹以节省一些工作。这将节省您的时间。另外，请保持数据库中使用的相同文件组名称。


    ## Data Used in the Examples


    请记住，示例中生成的数据是随机生成的。我尽了最大努力去除了重复项和无意义的组合。在汇总账户余额和手头库存数量的章节中，我也非常自由地进行了处理，以便演示函数的行为。


    例如，在财务数据库示例中：

    - 假设月度值是月底扣除所有贷项和借项后账户中剩余的金额。这适用于与账户和投资组合相关的表。

    - 假设滚动月度值将当月（扣除所有借项和贷项后）的值与上个月的值相加，以表示当月的总价值。


    在某些情况下，我应用了以下 `ROWS` 窗口规范来处理两个月的滚动场景：


    ```

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ```


    例如，在现实生活中，一个账户在 1 月可能有 100 美元，在 2 月有 50 美元。如果您认为总额是 150 美元，但如果 1 月或 2 月发生了借项，那就错了。如果没有发生借项，那么
    150 美元就是总额，因为它包括了从 1 月结转到账户的现金。因此，有几个因素在起作用，比如账户的借项和贷项。


    这是另一种情况。如果 2 月从账户中借记了 50 美元，并且没有向账户存入任何款项，那么剩下的就只有 50 美元（当月至今）。


    同样的处理方式也适用于投资组合余额（在财务数据库章节）以及处理库存移动的三章。与财务场景一样，库存需要考虑进出库的流动，以实际报告月度库存总额。


    代码有详细的注释，所以一切应该都很清楚。目标是理解窗口函数的工作原理，而不是模拟真实世界的业务场景或现实的数据模式。


    如果您最终理解了滚动总额的工作原理，您就领先一步了。


    ## The Toolkit


    我们在第 [12](#527021_1_En_12_Chapter.xhtml) 章预览了这个图表，但我认为值得再看一次，因为它向您展示了我们讨论过的所有工具，同时也间接地展示了您掌握这些技能后将拥有的所有能力！


    除 Microsoft Excel 外，所有工具都是免费的。您需要订阅 Excel，但它物有所值。至于 SSAS、SSIS 和 SSRS，这些是在您下载并安装最新社区版的
    Visual Studio 后可以添加的增强组件。我们将在最后一章讨论如何操作。


    请参阅图 [14-3](#527021_1_En_14_Chapter.xhtml#Fig3)。


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig3_HTML.png)


    图 14-3 SQL Server BI 工具包


    如图所示，有很多工具，我认为我们现在对它们的功能和应用方法有了基本的了解。你能相信你已经学会了如何使用所有这些工具吗？'
  raw: '## Our Journey


    The goal of this book was to assemble a set of tools that can be used to perform
    business intelligence analysis, data mining, and data analysis. I affectionately
    called it the SQL Server toolkit.


    I started by identifying three categories of functions available in SQL Server
    since 2012:


    *   Aggregate functions


    *   Ranking functions


    *   Analytical functions


    These, when used with the `OVER()` clause, are considered window functions and
    deliver a powerful capability like creating rolling calculations across time spans
    such as months, days, and years. They even allow us to traverse backward and forward
    in a set of historical data in order to compare current values (at a point in
    time) with future or prior values. Last but not least, a few functions are available
    to perform statistical analysis like standard deviation, variance, and calculating
    the MEAN and MEDIAN values within a data set.


    We applied these functions across four industries so as to get a sense of how
    one would perform analysis in each:


    *   Sales use case


    *   Financial use case


    *   Power plant equipment monitoring and failure analysis use case


    *   Inventory movement management use case


    Along the way I realized that these tools were only part of the BI data analysis
    strategy landscape. I introduced multiple tools like SSIS, SSRS, SSAS, Power BI,
    Report Builder, and Microsoft Excel to help us visualize the results of queries
    that utilized the window functions.


    These tools allowed us to generate, view, and analyze interesting patterns that
    a business analyst would use to report on performance for their company. Lastly,
    we took a look at some performance analysis tools such as estimated query plans
    that allowed us to analyze query performance and come up with strategies to improve
    performance.


    Let’s review the tools and wrap things up by showing you how to get them (download,
    install, and configure)!


    But first, a word about the code.


    ## About the Code


    The code can be found on the publisher’s website for this book. Each business
    use case has three folders dedicated to it, one per function category. Each chapter
    folder that is the first chapter in the business scenarios has three subfolders
    for creating the database and tables (CREATE DATABASE folder), loading the tables
    (LOAD DATABASE folder), and the queries covered in each chapter (CHAPTER QUERIES
    folder). The remaining two chapters in the business scenarios have folders for
    queries only. When you download the code, make sure to create these folders for
    each chapter on your PC or laptop so you can easily find the TSQL code scripts.


    Shown in Figure [14-1](#527021_1_En_14_Chapter.xhtml#Fig1) is what they look like.


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig1_HTML.jpg)


    A screenshot of the T S Q L CODE. The menu bar has 4 options among which the File
    option is selected. It presents a table of 4 columns and 5 rows. The column headers
    are Name, Date Modified, Type, and Size. The folders are backup, chapter queries,
    create database, and load database.


    Figure 14-1


    Folder structure for the code


    Now you know where to download the code and where to place it on your device.
    Creating a BACKUP folder is a good idea so you can save scripts before you modify
    them just in case you mess things up! Believe me, backup folders have saved me
    time and again.


    ## About the Database Folders


    I set up my databases with a folder for each database, and each database has three
    subfolders as illustrated in Figure [14-2](#527021_1_En_14_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig2_HTML.jpg)


    A screenshot of the A P Inventory window. The menu bar has 4 options among which
    the File option is selected. It presents a table of 4 columns and 5 rows. The
    column headers are Name, Date Modified, Type, and Size. The folders are Data,
    Logs, and Primary. Data is selected.


    Figure 14-2


    Folder structure for databases


    I created the APRESS_DATABASES folder on my D drive. I recommend you use the same
    structure I used except, of course, if you have only one drive (drive C:), you
    can set up the folders there. You need to modify the DDL scripts that create the
    databases, so they refer to the folder structure you set up on your computer.


    If you have a D: drive, save yourself some work and set up the folders as shown.
    This will save you time. Also, keep the same file group names used in the databases.


    ## Data Used in the Examples


    Keep in mind that the data generated for the examples was randomly generated data.
    I did the best I could to eliminate duplicates and combinations that made no sense.
    I also took great liberty in chapters that summed up account balances and inventory
    quantities on hand, so they demonstrated the behavior of the functions.


    For example, in the financial database examples


    *   Assume the monthly value is what is left in the account at the end of the
    month after all credits and debits. This applies to account- and portfolio-related
    tables.


    *   Assume the rolling monthly value adds current month’s (after all the debits
    and credits) value and last month’s value so as to represent the total value of
    the current month.


    In some cases, I applied the following `ROWS` frame specification to process the
    two-rolling-month scenario:


    ```

    ROWS BETWEEN 1 PRECEDING AND CURRENT ROW

    ```


    For example, in real life an account may have $100 in January and $50 in February.
    If you think the total is $150, you’re wrong if debits occurred in January or
    February. If no debits occurred, then $150 is the total because it includes the
    cash in the account carried over from January. So a few factors come into play,
    like debits and credits to an account.


    Here is another scenario. If $50 was debited from the account in February and
    no credits were made to the account, all that is left over is $50 (current month
    to date).


    The same liberties apply to portfolio balances (in the financial database chapters)
    and also to the three chapters dealing with inventory movement. Inventory, like
    the financial scenario, needs to consider inventory moving in and out to realistically
    report the monthly inventory totals.


    The code is liberally commented so all should be clear. The goal is to understand
    how the window functions work and not simulate a real-world business scenario
    or realistic data patterns.


    If you end up understanding how rolling totals work, you are ahead of the game.


    ## The Toolkit


    We previewed this diagram in Chapter [12](#527021_1_En_12_Chapter.xhtml), but
    I think it is worth seeing it one more time as it shows you all the tools we discussed
    and also indirectly shows all the skills you will have once you master these!


    All the tools are free except for Microsoft Excel. You need a subscription for
    this, but it is worth the money. As far as SSAS, SSIS, and SSRS, these are enhancements
    you can add on once you download and install the latest community edition of Visual
    Studio. We will discuss how in this last chapter.


    Please refer to Figure [14-3](#527021_1_En_14_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig3_HTML.png)


    A block diagram of S Q L Server B I Toolkit. It has performance tools, visual
    studio community, window functions, and web-based reporting tools. S Q L Servers
    2019 and 2022 go to S S I S followed by multi-dimensional and tabular models and
    web reporting servers. Microsoft Excel goes to models.


    Figure 14-3


    The SQL Server BI toolkit


    As the figure shows, there are a lot of tools, and I think we now have a fundamental
    knowledge of what they do and how to apply them. Can you believe you learned how
    to use all of these?'
