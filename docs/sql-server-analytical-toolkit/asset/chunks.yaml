  trans: '## 方法


    本书采用烹饪手册式的方法。不仅向你展示如何使用这些函数，还教你如何将它们应用于销售、财务、库存控制和工程场景中。


    这些函数被分为三类，因此，对于我们审视的每一个行业用例，我们将为每个函数类别分配一章：


    *   聚合函数

    *   分析函数

    *   排名函数


    对于每个函数，都会创建并解释一个查询。接下来，会审查和分析结果。


    在适用的情况下，结果会用于在 Microsoft Excel 电子表格中生成一些有趣的图表，例如为销售数据创建正态分布图。


    附录 A 包含了这些函数的描述和语法，以防你不熟悉它们，所以在深入阅读本书前可以随意查阅。


    掌握本书概念的关键在于理解 `OVER()` 子句的作用。第 1 章首先定义了 `OVER()` 子句是什么，以及它如何与窗口函数一起使用。


    几张图表清晰地解释了数据集、分区和窗口框架是什么，以及它们如何是使用窗口函数的关键。


    我们之前确定的每个行业都有三个专门的章节，分别对应一种窗口函数类别。每个章节都提供了要编写的查询的规范、满足该规范的代码，然后是一个或多个展示结果的图表。


    本书的独特之处在于，它不仅仅展示每个函数的工作原理；还提供了与统计分析、数据分析和 BI（顺便说一下，BI 代表商业智能）相关的用例场景。


    本书还提供了所有代码示例，包括通过出版商的 Google 网站创建和加载四个数据库的代码。


    最后，书中包含了足够的理论知识，为你介绍统计分析，以防你不熟悉标准差、均值、正态分布和方差等术语。这些知识很重要，因为它们将为你提供宝贵的技能，以支持你的业务用户并增强你的技能组合。嘿，一点商业理论总没坏处！


    附录 B 有一篇简短的统计学入门，所以如果你对这些主题不熟悉，请务必查看一下。它讨论了标准差、方差、正态分布、其他统计计算以及钟形曲线。


    回到窗口函数。这些函数生成大量数值数据。生成带小数点的数字固然好，但更有趣的是将其可视化成图表并理解其含义。一图胜千言。看到一张显示销售额逐月下降的图表绝对值得一看，并且应该敲响警钟！


    你还可以使用 Excel 电子表格，通过其内置函数来验证你的结果，确保它们与你的查询结果一致。始终用一组已知正确的结果来测试你的数据（你可能还会顺便学到一点
    Microsoft Excel 的知识！）。本书中使用的电子表格也将在出版商的 Google 网站上提供。


    本书包含提示和讨论，引导你完成学习 SQL Server 聚合、排名和分析函数的过程。这些内容采用循序渐进的方式呈现，以便你能轻松掌握概念。数据结果经过分析，以便你理解函数的功能以及窗口如何用于分析数据工作。


    ## 期望


    现在你已经知道本书的内容了，那么我对你的期望是什么？


    其实不多，从高层次来说。


    我期望你是一名中级到高级的 SQL Server 开发人员或数据架构师，需要学习如何使用窗口函数。你应该能够编写使用连接的中等复杂度查询，理解什么是 `CTE`（公用表表达式），并能够创建和加载数据库表。


    你也可能是一位精通技术的业务分析师，需要为你的业务用户或客户应用复杂的数据分析。


    最后，你也可能是一位技术经理，希望了解你的开发团队作为开发人员在其角色中所做的事情。所有人都能从本书中受益。


    总之，你需要具备：


    *   对学习数据分析技能的浓厚兴趣

    *   对关系数据库技术和 SQL 技能的基础知识

    *   对数学计算的基本理解，例如计算值的平均值，以及执行基本的算术运算，如加、减、除、乘

    *   最后，对 `SQL Server Management Studio (SSMS)`（我们将用于创建和执行查询的工具）有实用性的了解


    如果你不知道如何使用 `SSMS`，有很多优秀的 YouTube 视频和网站可以在短时间内教你如何使用这个工具。


    你还可以在 [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com) 网站菜单栏的 TSQL Podcasts
    菜单下，查看我的播客“GRUMPY PODCAST 01 NAVIGATING SSMS”。


    ## 你能从中获得什么？


    亲爱的读者，你将学习如何使用 Microsoft SQL Server 的分析、聚合和排名函数。这些是宝贵的技能，将增强你为公司职位以及你正在或将要支持的业务用户开发解决方案的能力。


    ## 你还能得到什么？


    有大量的代码示例可供你访问和试用，以熟悉窗口函数的工作原理。熟能生巧。拆解代码、修改它并进行实验。这是最好的学习方法。


    注意

    你可以从出版商的 Google 网站 [`https://github.com/Apress/SQL-Server-Analytical-Toolkit`](https://github.com/Apress/SQL-Server-Analytical-Toolkit)
    下载代码。'
