  trans: '### `COUNT( )`, `MAX( )`, `MIN( )`, `AVG( )` 和 `SUM( )` 函数


    让我们开始研究那些你将在查询和报告中频繁使用的核心函数。下面是一个查询示例，它报告了交易次数、交易的最大和最小数量，以及特定产品的购买总数量。


    我们希望创建一个按年、月、商店和产品分类的交叉表报告，以给出销售业绩概况。请不要将交易次数与售出商品数量混淆。单次交易可能包含 10 件商品，或者 1 件，也可能是
    20 件或更多。请注意这其中的区别。


    最后，我们希望将结果限制为单个商店、产品和年份，以便进行分析。请参考代码清单 2-2 中的查询。


    ```sql

    SELECT YEAR(CalendarDate) AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    StoreNo,

    ProductNo,

    ProductName,

    COUNT(*) AS NumTransactions,

    MIN(TransactionQuantity) AS MinQuantity,

    MAX(TransactionQuantity) AS MaxQuantity,

    AVG(TransactionQuantity) AS AvgQuantity,

    SUM(TransactionQuantity) AS SumQuantity

    FROM SalesReports.YearlySalesReport

    WHERE StoreNo = ''S00001''

    AND ProductNo = ''P0000001112''

    AND YEAR(CalendarDate) = 2010

    GROUP BY YEAR(CalendarDate),

    MONTH(CalendarDate),

    StoreNo,

    ProductNo,

    ProductName

    ORDER BY YEAR(CalendarDate),

    MONTH(CalendarDate),

    StoreNo,

    ProductNo,

    ProductName

    GO

    ```

    代码清单 2-2：基础销售概况报告


    这里没有使用任何花哨的语法，没有 `OVER()` 子句，没有 `CTE`，仅仅是一个从 `YearlySalesReport` 表中检索行的 `SELECT`
    子句。我们包含了 `COUNT()`, `MIN()`, `MAX()`, `AVG()` 和 `SUM()` 函数，并将 `TransactionQuantity`
    列作为参数传递。


    `WHERE` 子句对结果进行筛选，因此我们只获取商店 `S00001`、产品 `P0000001112` 和日历年 `2010` 的行。


    当你使用聚合函数时，必须包含 `GROUP BY` 子句，而我们利用 `ORDER BY` 子句对结果进行排序。请参考图 2-9 中的部分结果。


    ![](img/527021_1_En_2_Fig9_HTML.png)


    这是一个 SSMS 窗口的截图。它呈现了一个包含 10 列和 13 行的表格。列标题分别是购买年份、购买月份、商店编号、产品编号、产品名称、交易次数、最小数量、最大数量、平均数量和总数量。


    图 2-9：销售概况报告


    看起来二月份是一个销售淡季，这有点奇怪，毕竟有情人节假期。你本会以为销量会上升。


    ### 使用 `OVER( )`


    让我们基于之前的查询，增加一些窗口功能。这个解决方案分为两部分。首先，我们需要创建一个名为 `ProductPurchaseAnalysis` 的 `CTE`（公用表表达式），它执行一些日期操作，并包含了
    `COUNT()` 函数，用于按年、月、商店编号和产品编号生成交易次数。


    解决方案的第二部分是创建一个查询，引用该 `CTE` 并使用所有基本的聚合函数，但这次我们将包含一个 `OVER()` 子句，以便在分区中创建并排序行以进行处理。让我们来检查一下代码。


    请参考代码清单 2-3。


    ```sql

    WITH ProductPurchaseAnalysis (

    PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,CustomerFullName,ProductNo,ItemsPurchased,NumTransactions

    )

    AS (

    SELECT YEAR(CalendarDate) AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    CalendarDate,

    StoreNo,

    CustomerFullName,

    ProductNo,

    TransactionQuantity AS ItemsPurchased,

    COUNT(*)            AS NumTransactions

    FROM SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate) ,

    MONTH(CalendarDate),

    CalendarDate,

    StoreNo,

    CustomerFullName,

    ProductNo,

    ProductName,

    TransactionQuantity

    )

    ```

    代码清单 2-3：第一部分，`CTE`


    非常直接。从日历日期中提取出日历年份和月份，并包含在 `SELECT` 子句中。商店编号、客户全名和产品编号也被包含进来。最后，包含了交易数量（即购买了多少件商品），并且我们按照
    `GROUP BY` 子句定义的每个组来统计交易次数。


    现在来看这个批处理的第二部分，即引用 `CTE` 的查询。这个查询将为我们提供每个产品按年、月、客户和商店分类的交易次数和购买数量的概况。


    请参考代码清单 2-4。


    ```sql

    SELECT PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,

    CustomerFullName,ProductNo,NumTransactions,

    SUM(NumTransactions) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS SumTransactions,ItemsPurchased,

    SUM(ItemsPurchased) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS TotalItems,

    AVG(CONVERT(DECIMAL(10,2),ItemsPurchased)) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS AvgPurchases,

    MIN(ItemsPurchased) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS MinPurchases,

    MAX(ItemsPurchased) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS MaxPurchases

    FROM ProductPurchaseAnalysis

    WHERE StoreNo = ''S00001''

    AND ProductNo = ''P0000001112''

    AND PurchaseYear = 2010

    AND PurchaseMonth = 1

    AND ItemsPurchased > 0

    GROUP BY PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,

    CustomerFullName,ProductNo,NumTransactions,ItemsPurchased

    ORDER BY CustomerFullName,PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,

    ProductNo,ItemsPurchased

    GO

    ```

    代码清单 2-4：第二部分 – 使用窗口函数


    注意，我添加了一个筛选条件，仅报告 `2010` 年一月份的结果。这样做是为了保持结果集较小，以便调试和分析查询。一旦它能正确运行，你可以移除这些筛选条件以获取所有月份（当你下载代码时）。你也可以移除
    `PurchaseYear` 筛选条件以获取更多年份的数据。如果你想要所有商店和客户的信息，可以修改查询，将结果插入到一个报告表中，然后你就可以编写查询来查看任何你想要的客户、商店和产品的组合了。


    让我们继续浏览剩余的代码。


    每个 `OVER()` 子句中都包含了一个 `ORDER BY` 子句和一个 `PARTITION BY` 子句。数据集结果按 `PurchaseYear`
    和 `CustomerFullName` 列进行分区。分区内的行按 `CustomerFullName` 和 `PurchaseMonth` 排序。'
- fmt: '## 查询结果分析与分组函数


    如前所述，查询中包含一个 `WHERE` 子句，用于按商店 “S00001”、产品 “P0000001112”、购买年份 2010 年以及 1 月份进行过滤。我还过滤掉了任何
    `ItemsPurchased` 值为零的记录。（它们不知何故在测试数据的表加载过程中混了进来。这个数字是随机生成的，所以零值会混进来！）


    让我们看看结果。请参考图 [2-10](#527021_1_En_2_Chapter.xhtml#Fig10)。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig10_HTML.png)


    SSMS 窗口的截图。它展示了一个包含 13 列和 21 行的表格。列标题为：购买年份、月份、日历日期、商店编号、客户名称、产品编号、交易次数与总和、已购商品、总商品数、平均购买量、最小和最大购买量。


    图 2-10


    交易数量与已购商品概况


    让我们重点关注 Bill Brown 的购买记录。有四个日期发生了购买。假设每天一次购买，这总共就是四笔交易，显示在 `SumTransactions` 列中。


    接下来，如果我们查看 `ItemsPurchased` 列，我们会看到与 Bill 购买商品的四天相对应的四个值。在 1 月 28 日和 29 日，他每天购买了一件商品。在
    1 月 30 日，他购买了两件，在 1 月 31 日购买了三件。如果我们将它们全部相加，得到总购买量为七件，这反映在 `TotalItems` 列中。


    注意，如果未包含窗口框架子句，`PARTITION BY` 和 `ORDER BY` 子句的默认行为。总计出现在结果的每一行中。这意味着在计算当前行的每个总计值时，会包含相对于当前正在处理的行之前和之后的所有行。


    这同样适用于平均值的计算。最后，注意最小值和最大值。它们可以清楚地在 `ItemsPurchased` 列中看到。Bill 的最小购买量是一件商品，而他的最大购买量是三件商品。


    这种处理模式对于由分区定义的每一组行都会重复。


    ### GROUPING() 函数


    `GROUPING()` 函数允许您为数据类别定义的层级中的每个级别创建汇总值（例如 Excel 数据透视表中的汇总）。一图胜千言，它阐明了此函数的结果。请参考图
    [2-11](#527021_1_En_2_Chapter.xhtml#Fig11)。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig11_HTML.png)


    一个图表展示了 3 个层级：0、1 和 2。层级 0 有三行类别 A、B、C，其值分别为 5、10、15。层级 1 有三个类别 A、B、C，其总和分别为 15、30、45。层级
    2 有类别 NULL，其总和为 90。


    图 2-11


    数据组内汇总的概念模型


    从图表左侧的三行类别开始，数据集中的每一行都有一个类别和一个值。类别是 A、B 和 C。如果我们在层级 0 上对每个类别的值进行汇总，我们会在层级 1 得到类别
    A 的汇总值 15，类别 B 的汇总值 30，类别 C 的汇总值 45。如果我们对这三个汇总总计进行汇总，我们会在层级 2 得到最终值 90。


    这看起来很容易，但想象一下，如果您必须对组层级中的五个或更多级别进行数据汇总，复杂性会有多大。例如，我们可以按年份、月份、产品类别、产品子类别和产品进行汇总。让我们再加上客户，这样我们就能看到按客户统计的总计！这可能使输出难以阅读和分析，因此请确保提供满足用户要求的最少必要信息。


    有了这些知识，让我们编写一个查询，为我们的销售数据创建汇总，并尝试在 `ORDER BY` 子句中使用一个巧妙的技巧，使结果易于浏览。


    请参考代码清单 [2-5](#527021_1_En_2_Chapter.xhtml#PC8)。


    ```sql

    WITH StoreProductSalesAnalysis

    (TransYear,TransQuarter,TransMonth,TransDate,StoreNo,ProductNo,MonthlySales)

    AS

    (

    SELECT

    YEAR(CalendarDate)        AS TransYear,

    DATEPART(qq,CalendarDate) AS TransQuarter,

    MONTH(CalendarDate)       AS TransMonth,

    CalendarDate              AS TransDate,

    StoreNo,

    ProductNo,

    SUM(TotalSalesAmount)     AS MonthlySales

    FROM FactTable.YearlySalesReport

    GROUP BY

    CalendarDate,

    StoreNo,

    ProductNo

    )

    SELECT TransYear,

    TransQuarter,

    TransMonth,

    StoreNo,

    ProductNo,

    MonthlySales,

    SUM(MonthlySales)      AS SumMonthlySales,

    GROUPING(MonthlySales) AS RollupFlag

    FROM StoreProductSalesAnalysis

    WHERE TransYear = 2011

    AND ProductNo = ''P0000001103''

    AND StoreNo = ''S00001''

    GROUP BY TransYear,

    TransQuarter,

    TransMonth,

    StoreNo,

    ProductNo,

    MonthlySales WITH ROLLUP

    ORDER BY TransYear,

    TransQuarter,

    TransMonth,

    StoreNo,

    ProductNo,

    (

    CASE

    WHEN MonthlySales IS NULL THEN 0

    END

    ) DESC,

    GROUPING(MonthlySales) DESC

    GO

    ```


    代码清单 2-5


    生成汇总报告


    我们使用了与之前示例相同的 CTE，但这个查询有一些复杂性。我们使用 `SUM()` 函数来生成每月销售额的汇总，并使用 `GROUPING()` 函数来创建
    `GROUP BY` 子句中包含的列的汇总。`GROUPING()` 函数紧跟在 `SELECT` 子句中的最后一列之后。


    我们为什么要做这一切？


    具体来说，我们希望按年份、季度、月份、商店编号和产品编号对销售汇总进行汇总。这些代表了我们汇总层级中的各个级别。


    我们需要在 `ORDER BY` 子句中包含一些巧妙的代码，以便显示效果看起来有点像我们刚刚讨论的图表。每次我们汇总一个级别时，许多 `NULL` 会出现在那些不再适用于当前层级的行中（因为汇总了上一级别的值）。如果没有对结果进行正确的排序，将很难理解。


    我们需要做的是在 `ProductNo` 列之后的 `ORDER BY` 子句中引入一个 `CASE` 语句，该语句将告诉查询如果 `MonthlySales`
    列是 `NULL` 时该如何处理：


    ```sql

    ProductNo,

    (

    CASE

    WHEN MonthlySales IS NULL THEN 0

    END

    ) DESC,

    ```'
  raw: 'As mentioned earlier, a `WHERE` clause is included to filter results by store
    “S00001,” product “P0000001112,” and purchase year 2010 and for the month of January.
    I also filter out any `ItemsPurchased` values equal to zero. (They somehow sneaked
    in during the table load process of the test data. This number is randomly generated,
    so zero values will sneak in!)


    Let’s see the results. Please refer to the Figure [2-10](#527021_1_En_2_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig10_HTML.png)


    A screenshot of the S S M S window. It presents a table of 13 columns and 21 rows.
    The column headers are purchase year, and month, calendar date, store number,
    customer name, product number, Num and Sum transactions, items purchased, total
    items, average purchases, minimum and maximum purchases.


    Figure 2-10


    Transaction quantities and items purchased profile


    Let’s focus on purchases made by Bill Brown. There are four dates on which purchases
    were made. Assuming one purchase per day, this comes to a total of four transactions,
    which appear in the `SumTransactions` column.


    Next, if we look at the `ItemsPurchased` column, we see the four values corresponding
    to each of the four days Bill made purchases. On January 28 and 29, he made one
    purchase each day. On January 30 he made two purchases, and on January 31 he made
    three purchases. If we add them all up, we get a total of seven purchases, which
    is reflected in the `TotalItems` column.


    Notice the default behavior of the `PARTITION BY` and `ORDER BY` clauses if no
    window frame clause is included. The totals appear in each row of the result.
    This means include any previous and following rows (relative to the current row
    being processed) as each total value for the current row is calculated.


    The same applies to the average calculation. Lastly, notice the minimum and maximum
    values. They can be clearly seen in the `ItemsPurchased` column. The minimum purchase
    Bill made was one item, and the largest purchase he made was three items.


    This processing pattern repeats itself for each set of rows defined by the partition.


    ### GROUPING( ) Function


    The GROUPING() function allows you to create rollup values like sums for each
    level of a hierarchy defined by categories of data (think of rollups in Excel
    pivot tables). A picture is worth a thousand words and clarifies the results of
    this function. Please refer to the Figure [2-11](#527021_1_En_2_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig11_HTML.png)


    A diagram presents 3 levels, 0, 1, and 2\. Level 0 has 3 rows of categories, A,
    B, and C with values 5, 10, and 15\. Level 1 has 3 categories, A, B, and C with
    sums of 15, 30, and 45\. Level 2 has category NULL with a sum of 90.


    Figure 2-11


    Conceptual model of rollups within groups of data


    Starting with the three categories of rows to the left of the diagram, each row
    in the data set has a category and a value. The categories are A, B, and C. If
    we summarize the values for each category at level 0, we get rollups of 15 for
    category A, 30 for category B, and 45 for category C at level 1\. If we summarize
    these three rollup totals, we get a final value of 90 at level 2.


    This looks easy, but imagine the complexity if you must summarize data over five
    or more levels in the group hierarchy. For example, we can summarize by year,
    month, product category, product subcategory, and product. Let''s throw in customer
    too so we can see totals by customer! This could make the output difficult to
    read and analyze, so make sure you provide the minimum required information that
    satisfies user requirements.


    Armed with this knowledge, let’s write a query that will create rollups for our
    sales data and try to use a clever trick in the `ORDER BY` clause to make the
    results easy to navigate.


    Please refer to Listing [2-5](#527021_1_En_2_Chapter.xhtml#PC8).


    ```

    WITH StoreProductSalesAnalysis

    (TransYear,TransQuarter,TransMonth,TransDate,StoreNo,ProductNo,MonthlySales)

    AS

    (

    SELECT

    YEAR(CalendarDate)        AS TransYear,

    DATEPART(qq,CalendarDate) AS TransQuarter,

    MONTH(CalendarDate)       AS TransMonth,

    CalendarDate              AS TransDate,

    StoreNo,

    ProductNo,

    SUM(TotalSalesAmount)     AS MonthlySales

    FROM FactTable.YearlySalesReport

    GROUP BY

    CalendarDate,

    StoreNo,

    ProductNo

    )

    SELECT TransYear,

    TransQuarter,

    TransMonth,

    StoreNo,

    ProductNo,

    MonthlySales,

    SUM(MonthlySales)      AS SumMonthlySales,

    GROUPING(MonthlySales) AS RollupFlag

    FROM StoreProductSalesAnalysis

    WHERE TransYear = 2011

    AND ProductNo = ''P0000001103''

    AND StoreNo = ''S00001''

    GROUP BY TransYear,

    TransQuarter,

    TransMonth,

    StoreNo,

    ProductNo,

    MonthlySales WITH ROLLUP

    ORDER BY TransYear,

    TransQuarter,

    TransMonth,

    StoreNo,

    ProductNo,

    (

    CASE

    WHEN MonthlySales IS NULL THEN 0

    END

    ) DESC,

    GROUPING(MonthlySales) DESC

    GO

    Listing 2-5

    Generating a Rollup Report

    ```


    We use the same CTE as the prior example, but the query has some complexity to
    it. We use the `SUM()` function to generate summaries for monthly sales and the
    `GROUPING()` function to create rollups by the columns included in the `GROUP
    BY` clause. The `GROUPING()` function appears right after the last column in the
    `SELECT` clause.


    Why are we doing all this?


    Specifically, we want to roll up sales summaries by year, quarter, month, store
    number, and product number. These represent the levels in our rollup hierarchy.


    We need to include some clever code in the `ORDER BY` clause so that the display
    looks a little bit like the diagram we just discussed. Each time we roll up a
    level, a lot of `NULLS` appear in the rows for the values that no longer apply
    to the level in the hierarchy because we summarized the prior level’s values.
    If you do not sort the results correctly, it will be impossible to understand.


    What we need to do is introduce a `CASE` statement in the `ORDER BY` clause right
    after the `ProductNo` column that will tell the query what to do with the MonthlySales
    column if it is `NULL`:


    ```

    ProductNo,

    (

    CASE

    WHEN MonthlySales IS NULL THEN 0

    END

    ) DESC,

    ```'
