- fmt: '### PERCENT_RANK( ) Function


    接下来是`PERCENT_RANK()`函数。它是做什么的？我们在第[3](#527021_1_En_3_Chapter.xhtml)章中已经介绍过，但以防您需要复习或没有按顺序阅读各章，这里再回顾一下。


    使用类似查询结果、分区或表变量的数据集，此函数计算每个值相对于整个数据集的相对排名（以百分比形式）。您需要将结果（返回值是浮点数）乘以100.00，或者使用`FORMAT()`函数将结果转换为百分比（此函数也返回`FLOAT(53)`数据类型）。


    此外，它的行为与`CUME_DIST()`函数非常相似；至少微软文档是这么说的。


    您也会发现它在理论上与`RANK()`函数非常相似。`RANK()`函数返回值的位次，而`PERCENT_RANK()`返回一个百分比值。我们将把这个函数与刚才讨论的`CUME_DIST()`函数一起使用，以便比较结果，并看看它对我们即将生成的查询计划有什么影响。


    我们的分析师为接下来的报告提交了一个简单的业务需求。我们需要创建一个查询，按客户ID、年份、账号和名称以及月份显示账户余额的百分比排名、密集排名和排名值。结果需要针对2013年及以后的年份。


    幸运的是，我们已经加载了内存增强的账户余额表。让我们快速看一下能满足此请求的查询。


    请参考清单[7-13](#527021_1_En_7_Chapter.xhtml#PC19)。


    ```sql

    SELECT CustId

    ,AcctYear

    ,[AcctMonth]

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENT_RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS PercentRank

    ,DENSE_RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS DenseRank

    ,RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS Rank

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE AcctYear >= 2013

    GO

    ```

    清单 7-13

    客户年度账户余额月度排名


    该查询让`PERCENT_RANK()`函数发挥了作用，但我们也包含了`DENSE_RANK()`和`RANK()`函数，以便比较结果。在所有情况下，`OVER()`子句都使用了`PARTITION
    BY`子句，该子句按客户ID、账户年份和月份创建分区。分区结果按`AcctBalance`列排序。让我们看看结果。


    请参考图[7-23](#527021_1_En_7_Chapter.xhtml#Fig24)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig24_HTML.jpg)


    图 7-23

    客户账户排名分析


    我们可以看到，现金账户在2013年1月排名第一，权益账户排名第二，但差距不大。其余账户显示负余额。这意味着什么？也许他们都套现了，利润都在现金账户里。


    二月份显示所有账户头寸都是正的，除了商品和外汇（FX）账户。


    这些是有趣的模式，我们的分析师需要研究并理解它们，以便根据发现提出投资建议，或者分析问题出在哪里。


    让我们将注意力转向一些性能调优和策略。


    ### 性能考虑


    图[7-24](#527021_1_En_7_Chapter.xhtml#Fig25)是查询计划的初步估计版本。该计划相当大，并且有一个模式重复了两次，对应于查询中的每个窗口函数。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig25_HTML.jpg)


    图 7-24

    排名分析报告的估计查询计划


    注意缺少窗口假脱机任务。请记住，我们在查询中使用了内存增强表，因此11%成本的表扫描无需担心。还有一个49%成本的排序任务，有点高。接下来，我们看到三个表假脱机，两个成本为0%，一个成本为4%。随后是一个成本为29%的嵌套循环（内连接）任务，用于合并数据流。


    接下来是段、序列项目和计算标量任务，该模式针对第二个窗口函数重复。请运行此计划并查看这些任务的作用。还可以在`PROFILE`统计信息的`StmtText`列中获取更多解释。


    接下来让我们看看`IO`和`TIME`统计信息。请参考图[7-25](#527021_1_En_7_Chapter.xhtml#Fig26)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig26_HTML.jpg)


    图 7-25

    排名分析的IO和TIME统计信息（内存增强表）


    由于这是内存增强表，因此没有`AccountMonthlyBalancesMem`表的统计信息，只有工作表的统计信息。


    基于我们查看的计划和统计信息，我们可以在所有示例中采用此策略。让我们继续下一组函数。


    ### PERCENTILE_CONT( ) 和 PERCENTILE_DISC( )


    这两个函数是做什么的？嗯，回想一下，它们处理连续和离散的数据集。


    回想一下什么是连续数据。它是在特定时间段内变化的数据，例如随时间变化的销售金额，比如特定产品在12个月内的总销售额。连续数据是在一段时间内测量的数据，比如设备在24小时内的锅炉温度。


    将每个锅炉温度相加得到总和没有意义。将锅炉温度相加然后除以时间段以获得平均值是有意义的。


    那么，什么是离散数据呢？


    离散数据值是可以随时间计数的数字，例如投资账户余额在几天、几个月和几年内的变化。您可以将这些值相加得到总计和平均值，并识别账户余额随时间变化的趋势。


    总之，`PERCENTILE_CONT()`函数基于所需的百分位数在连续数据集上工作，以返回满足该百分位数的数据集内的一个值（您需要提供一个百分位数作为参数，如.25、.50、.75等）。


    对于此函数，该值是内插的。它通常不存在，所以是引入的。或者，如果数字正确对齐，它可能巧合地使用数据集中的某个值。


    `PERCENTILE_DISC()`函数基于所需的百分位数在离散数据集上工作，以返回满足该百分位数的数据集内的一个值。对于此函数，该值存在于数据集中；不像`PERCENTILE_CONT()`函数那样是内插的（两个函数都返回`FLOAT(53)`数据类型的值）。'
  raw: '### PERCENT_RANK( ) Function


    Next on deck is the `PERCENT_RANK()` function. What does it do? We covered this
    in Chapter [3](#527021_1_En_3_Chapter.xhtml), but in case you need a reminder
    or are not reading the chapters in sequential order, here is a review.


    Using a data set like results from a query, partition, or table variable, this
    function calculates the relative rank of each individual value relative to the
    entire data set (as a percentage). You need to multiply the results (the value
    returned is a float) by 100.00 or use the `FORMAT()` function to convert the results
    to a percentage (this function also returns a `FLOAT(53)` data type).


    Also, it works a lot like the `CUME_DIST()` function; at least that’s what the
    Microsoft documentation says.


    You will also see that it works a lot like the `RANK()` function (in theory anyway).
    The `RANK()` function returns the position of the value, while `PERCENT_RANK()`
    returns a percentage value. We will use this function together with the `CUME_DIST()`
    function just discussed so we can compare the results and also see what effect
    it will have on the query plan we will generate shortly.


    Our analyst has submitted a simple business requirement for this next report.
    We need to create a query that shows the percent rank, dense rank, and rank values
    for account balances by customer ID, year, account number and name, and month.
    Results need to be for years greater than or equal to 2013.


    Luckily for us, we have the memory-enhanced account balance table loaded. Let’s
    take a quick look at the query that will satisfy this request.


    Please refer to Listing [7-13](#527021_1_En_7_Chapter.xhtml#PC19).


    ```

    SELECT CustId

    ,AcctYear

    ,[AcctMonth]

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENT_RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS PercentRank

    ,DENSE_RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS DenseRank

    ,RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS Rank

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE AcctYear >= 2013

    GO

    Listing 7-13

    Customer Yearly Account Balance Monthly Ranking

    ```


    The query puts the `PERCENT_RANK()` function through its paces, but we also include
    the `DENSE_RANK()` and `RANK()` functions so we can compare results. The `OVER()`
    clause in all cases uses a `PARTITION BY` clause that creates partitions by customer
    ID, account year, and month. Partition results are sorted by the `AcctBalance`
    column. Let’s see the results.


    Please refer to Figure [7-23](#527021_1_En_7_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig24_HTML.jpg)


    A screenshot of the S S M S window. It has a table of 10 columns and 1081 rows.
    The column headers are customer I D, account year, account month, account number,
    account name, account balance, percent rank, dense rank, and rank. The last 7
    columns are outlined.


    Figure 7-23


    Customer account rank analysis


    We can see that the cash account is top for January 2013 with the equity account
    at number 2, but not by much. The rest of the accounts show negative balances.
    What does this mean? Maybe they all cashed out and the profits are in the cash
    account.


    February shows all positive account positions except for commodity and FX (foreign
    exchange) accounts.


    These are interesting patterns that our analyst needs to study and understand
    for them to make investment suggestions based on the findings or analyze why things
    went wrong.


    Let’s turn our attention to some performance tuning and strategies.


    ### Performance Considerations


    Figure [7-24](#527021_1_En_7_Chapter.xhtml#Fig25) is the first cut of the estimated
    query plan. The plan is fairly large and has a pattern that repeats itself twice,
    one for each window function in the query.


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig25_HTML.jpg)


    A screenshot of the S S M S window. It presents an estimated query plan with 11
    components. The components are segment, nested loops, table spool, segment, sort,
    filter, table scan, nested loops, stream aggregate, table spool, and table spool.


    Figure 7-24


    Estimated query plan for the rank analysis report


    Notice the absence of window spool tasks. Remember that we are using a memory-enhanced
    table in the query, so the table scan is of no concern at 11% cost. There is also
    a sort task at 49%, which is a bit high. Next, we see three table spools, two
    at 0% cost and one at 4% cost. These are followed by a nested loops (inner join)
    task at a cost of 29% that merges the data streams.


    Next are segment, sequence project, and compute scalar tasks, and the pattern
    repeats itself for the second window function. Do run this plan and see what these
    tasks do. Also get more explanation in the `StmtText` column in the `PROFILE`
    statistics.


    Let’s look at `IO` and `TIME` statistics next. Please refer to Figure [7-25](#527021_1_En_7_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig26_HTML.jpg)


    A screenshot of the S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 38 milliseconds.
    The S Q L server execution times for C P U and elapsed are 15 and 90 milliseconds.
    1080 are affected.


    Figure 7-25


    IO and TIME statistics for rank analysis (memory-enhanced table)


    As this is a memory-enhanced table, there are no statistics for the `AccountMonthlyBalancesMem`
    table, only for the work table.


    Based on the plan and statistics we looked at, we can take advantage of this strategy
    for all our examples. Let’s move on to the next set of functions.


    ### PERCENTILE_CONT( ) and PERCENTILE_DISC( )


    What do these two functions do? Well, recall that they work on continuous and
    discrete sets of data.


    Recall what continuous data is. It is data that changes over specific periods
    of time, like sales amounts of time periods over time, for example, total sales
    in a 12-month period for a specific product. Continuous data is data measured
    over a period of time, like boiler temperatures in equipment over a 24-hour period.


    Summing up each boiler temperature to arrive at a total makes no sense. Summing
    up the boiler temperatures and then dividing them by the time period to get an
    average does.


    What is discrete data anyway?


    Discrete data values are numbers that have values that you can count over time,
    like investment account balances over days, months, and years. You can add these
    up to get a grand total and average and identify trends in account balances over
    time.


    In conclusion, the `PERCENTILE_CONT()` function works on a continuous set of data
    based on a required percentile so as to return a value within the data set that
    satisfies the percentile (you need to supply a percentile as a parameter, like
    .25, .50, .75, etc.).


    With this function the value is interpolated. It usually does not exist, so it
    is introduced. Or by coincidence it could use one of the values in the data set
    if the numbers line up correctly.


    The `PERCENTILE_DISC()` function works on a discrete set of data based on a required
    percentile so as to return a value within the data set that satisfies the percentile.
    With this function the value exists in the data set; it is not interpolated like
    in the `PERCENTILE_CONT()` function (both functions return a `FLOAT(53)` data
    type value).'
  trans: '### PERCENT_RANK( ) 函数


    接下来介绍的是 `PERCENT_RANK()` 函数。它的作用是什么？我们在第 3 章中已经介绍过，但为了方便您复习或如果您没有按顺序阅读各章，在此再做一次回顾。


    该函数针对类似查询结果、分区或表变量的数据集，计算每个值相对于整个数据集的相对排名（以百分比形式表示）。您需要将结果（返回值是浮点数）乘以 100.00，或者使用
    `FORMAT()` 函数将结果转换为百分比（该函数也返回 `FLOAT(53)` 数据类型）。


    此外，它的行为与 `CUME_DIST()` 函数非常相似；至少微软文档是这么说的。


    您也会发现它在理论上与 `RANK()` 函数非常相似。`RANK()` 函数返回值的位次，而 `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚才讨论的
    `CUME_DIST()` 函数一起使用，以便比较结果，并看看它对我们即将生成的查询计划有什么影响。


    我们的分析师为接下来的报告提交了一个简单的业务需求。我们需要创建一个查询，按客户 ID、年份、账号和名称以及月份显示账户余额的百分比排名、密集排名和排名值。结果需要针对
    2013 年及以后的年份。


    幸运的是，我们已经加载了内存增强的账户余额表。让我们快速看一下能满足此请求的查询。


    请参考清单 7-13。


    ```sql

    SELECT CustId

    ,AcctYear

    ,[AcctMonth]

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENT_RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS PercentRank

    ,DENSE_RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS DenseRank

    ,RANK() OVER (

    PARTITION BY CustId,AcctYear,AcctMonth

    ORDER BY AcctBalance DESC

    ) AS Rank

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE AcctYear >= 2013

    GO

    ```

    清单 7-13

    客户年度账户余额月度排名


    该查询让 `PERCENT_RANK()` 函数发挥了作用，但我们也包含了 `DENSE_RANK()` 和 `RANK()` 函数，以便比较结果。在所有情况下，`OVER()`
    子句都使用了 `PARTITION BY` 子句，该子句按客户 ID、账户年份和月份创建分区。分区结果按 `AcctBalance` 列排序。让我们看看结果。


    请参考图 7-23。


    ![](img/527021_1_En_7_Fig24_HTML.jpg)


    图 7-23

    客户账户排名分析


    我们可以看到，现金账户在 2013 年 1 月排名第一，权益账户排名第二，但差距不大。其余账户显示负余额。这意味着什么？也许他们都套现了，利润都在现金账户里。


    二月份显示所有账户头寸都是正的，除了商品和外汇（FX）账户。


    这些是有趣的模式，我们的分析师需要研究并理解它们，以便根据发现提出投资建议，或者分析问题出在哪里。


    让我们将注意力转向一些性能调优和策略。


    ### 性能考虑


    图 7-24 是查询计划的初步估计版本。该计划相当大，并且有一个模式重复了两次，对应于查询中的每个窗口函数。


    ![](img/527021_1_En_7_Fig25_HTML.jpg)


    图 7-24

    排名分析报告的估计查询计划


    注意缺少窗口假脱机任务。请记住，我们在查询中使用了内存增强表，因此 11% 成本的表扫描无需担心。还有一个 49% 成本的排序任务，有点高。接下来，我们看到三个表假脱机，两个成本为
    0%，一个成本为 4%。随后是一个成本为 29% 的嵌套循环（内连接）任务，用于合并数据流。


    接下来是段、序列项目和计算标量任务，该模式针对第二个窗口函数重复。请运行此计划并查看这些任务的作用。还可以在 `PROFILE` 统计信息的 `StmtText`
    列中获取更多解释。


    接下来让我们看看 `IO` 和 `TIME` 统计信息。请参考图 7-25。


    ![](img/527021_1_En_7_Fig26_HTML.jpg)


    图 7-25

    排名分析的 IO 和 TIME 统计信息（内存增强表）


    由于这是内存增强表，因此没有 `AccountMonthlyBalancesMem` 表的统计信息，只有工作表的统计信息。


    基于我们查看的计划和统计信息，我们可以在所有示例中采用此策略。让我们继续下一组函数。


    ### PERCENTILE_CONT( ) 和 PERCENTILE_DISC( )


    这两个函数是做什么的？嗯，回想一下，它们处理连续和离散的数据集。


    回想一下什么是连续数据。它是在特定时间段内变化的数据，例如随时间变化的销售金额，比如特定产品在 12 个月内的总销售额。连续数据是在一段时间内测量的数据，比如设备在
    24 小时内的锅炉温度。


    将每个锅炉温度相加得到总和没有意义。将锅炉温度相加然后除以时间段以获得平均值是有意义的。


    那么，什么是离散数据呢？


    离散数据值是可以随时间计数的数字，例如投资账户余额在几天、几个月和几年内的变化。您可以将这些值相加得到总计和平均值，并识别账户余额随时间变化的趋势。


    总之，`PERCENTILE_CONT()` 函数基于所需的百分位数在连续数据集上工作，以返回满足该百分位数的数据集内的一个值（您需要提供一个百分位数作为参数，如
    .25、.50、.75 等）。


    对于此函数，该值是内插的。它通常不存在，所以是引入的。或者，如果数字正确对齐，它可能巧合地使用数据集中的某个值。


    `PERCENTILE_DISC()` 函数基于所需的百分位数在离散数据集上工作，以返回满足该百分位数的数据集内的一个值。对于此函数，该值存在于数据集中；不像
    `PERCENTILE_CONT()` 函数那样是内插的（两个函数都返回 `FLOAT(53)` 数据类型的值）。'
- fmt: '# PERCENTILE_CONT()


    在我们深入分析财务数据之前，先从一个简单的例子开始。我们的分析师为下一个报告提交了以下业务需求：


    创建一个报表，按客户、年份、月份、账号和名称显示期权（一种衍生品工具）账户余额，以及 25%、50%、75% 和 90% 的连续百分位数。最初我们将只显示客户
    C0000001，但此报表稍后将用于多个客户。查询需要灵活，以便满足所有这些要求。最后，查询的运行时间必须少于一秒钟（我们的第一个性能要求）！


    请参考清单 [7-14](#527021_1_En_7_Chapter.xhtml#PC20) 了解解决方案。


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_CONT(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-25%]

    ,PERCENTILE_CONT(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-50%]

    ,PERCENTILE_CONT(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-75%]

    ,PERCENTILE_CONT(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-90%]

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    GO

    ```


    清单 7-14 客户连续百分位数查询


    请注意，此查询与我们通常包含 `OVER()` 子句的查询略有不同。该函数在 `SELECT` 子句中包含了四次，但每个所需百分位数的值作为参数传入。另请注意，我们正在使用内存增强表，因此这应该很快！


    在 `OVER()` 子句出现之前，我们需要包含一个 `WITHIN GROUP (ORDER BY ...)` 子句。请注意，`ORDER BY` 子句并未包含在
    `OVER()` 子句中。我们看到的只有 `PARTITION BY` 子句，它在四种情况下都设置了按客户标识符和账户年份的分区。看起来在每种情况下，分区都将按
    `AcctBalance` 列排序以便处理。


    后面是一个简单的 `WHERE` 子句，用于筛选期权账户和客户 C0000001 的结果。此查询可以重新调整用途以显示多个客户和多个账户的结果，因此你可能需要修改
    `OVER()` 子句。


    > 注意

    >

    > 像往常一样，我们从小的数据集开始，以确保查询正确工作，之后再扩大范围。


    请参考图 [7-26](#527021_1_En_7_Chapter.xhtml#Fig27) 中的部分结果。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig27_HTML.png)


    图 7-26 各种百分位数的连续百分位数报表


    此报表中什么引人注目？百分位数的值是插值的。注意箭头指向两个最接近的值，例如，19338.62 介于 15783.80 和 19733.60 之间。值 19338.62
    并不存在于实际的列值中。


    请记住，这是该函数的行为。


    但这并非普遍规律。可能存在某些数据模式，使得连续百分位数值与列值匹配。大多数情况下不会发生这种情况。再看一下 $100,000.00 的结果。列值和百分位数值是相等的。这是因为此分区中只有一行。因此，这是一个例外于该函数通常行为的场景。


    在我看来，这个报表确实让我们很好地了解了值的分布情况。


    # 性能考虑


    让我们以通常的方式生成一个估计的查询计划。我们只检查右侧部分，因为执行模式重复了四次，对应于 `SELECT` 子句中每次 `PERCENTILE_CONT()`
    函数调用（对应每个百分比参数）。在初始索引查找以设置数据之后，实际上还有第五个重复模式。这些包括一个排序步骤和一些常见的表假脱机任务。


    请参考图 [7-27](#527021_1_En_7_Chapter.xhtml#Fig28)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig28_HTML.png)


    图 7-27 连续百分位数报表的估计查询计划


    现有索引满足了查询要求，因此我们看到一个索引查找，其成本为 20%。有用于 `WHERE` 子句的筛选器和成本为 43% 的昂贵排序。在下方的两个分支中，我们看到两个表假脱机，它们为嵌套循环连接生成数据流，所有成本均为
    0%。


    第二个嵌套循环连接以 6% 的成本合并了顶部和底部的流。正如我之前所说，剩余的计划部分类似并重复自身，只是没有索引查找和排序任务。


    接下来，让我们看看 `TIME` 和 `IO` 统计信息。请参考图 [7-28](#527021_1_En_7_Chapter.xhtml#Fig29)。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig29_HTML.png)


    图 7-28 IO 和 TIME 统计信息


    如图所示，我们只有关于工作表的统计信息，包括 15 次扫描计数和 595 次逻辑读取。内存增强表的处理没有产生任何统计信息。最后，SQL Server 的执行时间是
    176 毫秒。


    请参考图 [7-29](#527021_1_En_7_Chapter.xhtml#Fig30) 了解部分 `STATISTICS PROFILE` 统计信息。


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig30_HTML.png)


    图 7-29 连续百分位数查询的配置文件统计信息


    你可能注意到了，对于内存增强表，我们看到 `EstimateIO` 统计信息为 0 或非常低，但 `EstimateCPU` 统计信息较高。这是一个部分输出，因为总共有
    55 个步骤，但除了一个步骤外，所有 IO 都为零！`EstimateCPU` 和 `TotalSubtreeCost` 因步骤而异，其中 `WHERE`
    子句和嵌套循环连接的值最高。


    就性能分析计划而言，我认为这个计划非常有趣，并展示了内存增强表的能力。


    > 问题

    >

    > 更高的 `EstimateCPU` 统计信息是否意味着在利用内存增强表时需要强大的 CPU？这是值得考虑的一点。'
  raw: '### PERCENTILE_CONT( )


    Let’s start off with a simple example before we dive into some analysis of our
    financial data. Our analyst submits the following business requirements for this
    next report:


    Create a report that shows option (a type of derivative instrument) account balances
    by customer, year, month, account number and name, and continuous percentiles
    for 25%, 50%, 75%, and 90% percentiles. Initially we will show only our friend
    customer C0000001, but the report will be used later on for more than one customer.
    The query needs to be flexible so we can meet all these requirements. Lastly,
    the query needs to run in less than one second (our first performance requirement)!


    Please refer to Listing [7-14](#527021_1_En_7_Chapter.xhtml#PC20) for the solution.


    ```

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_CONT(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-25%]

    ,PERCENTILE_CONT(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-50%]

    ,PERCENTILE_CONT(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-75%]

    ,PERCENTILE_CONT(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentCont-90%]

    FROM [FinancialReports].[AccountMonthlyBalancesMem]

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    GO

    Listing 7-14

    Customer Continuous Percentiles Query

    ```


    Notice that this query looks slightly different from our usual queries that include
    an `OVER()` clause. The function is included four times in the `SELECT` clause,
    but the values for each desired percentile are passed as parameters. Notice also
    we are using the memory-enhanced table, so this should be fast!


    Prior to the appearance of the `OVER()` clause, we need to include a `WITHIN GROUP
    (ORDER BY ...)` clause. Notice that the `ORDER BY` clause is not included in the
    `OVER()` clause. All we see is the `PARTITION BY` clause that sets up a partition
    by customer identifier and account year in each of the four cases. Looks like
    the partition will be sorted by the `AcctBalance` column for processing in each
    case.


    A simple `WHERE` clause follows that filters the results for the option account
    and for customer C0000001. This query can be repurposed to show results for more
    than one customer and more than one account, so you might need to modify the `OVER()`
    clause.


    Note


    As usual we start off with a small data set to make sure our query works correctly,
    after which we can increase the scope.


    Please refer to the partial results in Figure [7-26](#527021_1_En_7_Chapter.xhtml#Fig27).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig27_HTML.png)


    A screenshot of the S S M S window. It has a table of 11 columns and 50 rows.
    The column headers are customer I D, account year, account month, account number,
    account name, account balance, percentile continuous 25%, percentile continuous
    50%, percentile continuous 75%, percentile continuous 90%.


    Figure 7-26


    Percentile continuous for various percentiles report


    What stands out in this report? The percentile values are interpolated. Notice
    that the arrows point to the two closest values, for example, 19338.62 falls between
    15783.80 and 19733.60\. The value 19338.62 does not exist in the actual column
    values.


    Remember that this is the behavior of the function.


    This is not the rule though. There can be data patterns that will result in the
    percentile continuous values matching the column values. Most of the time this
    does not happen. Look at the results again for the value $100,000.00\. The column
    value and percentile values are equal. That’s because there is only one row in
    this partition. So this is a scenario that is an exception to the way that the
    function behaves.


    In my opinion, this report does give us a good idea of the spread of values.


    ### Performance Considerations


    Let’s generate an estimated query plan in the usual manner. We will examine the
    right portion only as the execution pattern repeats itself four times, once for
    each `PERCENTILE_CONT()` function call in the SELECT clause (for each percentage
    parameter). There is actually a fifth repeating pattern right after the initial
    index seek to set up the data. These include a sort step and a few of the usual
    table spool tasks.


    Please refer to Figure [7-27](#527021_1_En_7_Chapter.xhtml#Fig28).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig28_HTML.png)


    A screenshot of the S S M S window. It presents an estimated query plan with 13
    components. The components are sequence project, segment, nested loops, table
    spool, segment, sort, filter, index seek, nested loops, compute scalar, stream
    aggregate, table spool, and table spool.


    Figure 7-27


    Estimated query plan for the percentile continuous report


    An existing index satisfies the query requirement, so we see an index seek with
    a cost of 20%. There is the filter for the `WHERE` clause and the expensive sort
    at 43%. In the lower two branches, we see two table spools that generate data
    flows for the nested loops join, all with a cost of 0%.


    A second nested loops join merges the top and bottom flows at a cost of 6%. As
    I said earlier, the remaining plan sections are similar and repeat themselves
    except there is no index seek and no sort task.


    Next, let’s look at the `TIME` and `IO` statistics. Please refer to Figure [7-28](#527021_1_En_7_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig29_HTML.png)


    A screenshot of the S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 89 milliseconds.
    The S Q L server execution times for C P U and elapsed are 15 and 176 milliseconds.
    49 are affected.


    Figure 7-28


    IO and TIME statistics


    As can be seen, we only have statistics for the work table that include a scan
    count of 15 and logical reads of 595\. The processing of the memory-enhanced table
    did not produce any statistics. Lastly, the SQL Server elapsed execution time
    is 176 ms.


    Please refer to Figure [7-29](#527021_1_En_7_Chapter.xhtml#Fig30) for partial
    `STATISTICS PROFILE` statistics.


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig30_HTML.png)


    A screenshot of the S S M S window. It has a table of 12 columns and 56 rows.
    The column headers are physical O p, logical O p, argument, defined values, estimate
    rows, estimate I O, estimated C P U, average row size, total subtree cost, output
    list, warnings. Estimate I O column is outlined.


    Figure 7-29


    Profile statistics for the percentile continuous query


    I do not know if you noticed it, but with memory-enhanced tables, we see 0 or
    very low `EstimateIO` statistics but higher `EstimateCPU` statistics. This is
    a partial output as there are 55 steps in total, but all the IO is zero except
    for one step! The `EstimateCPU` and `TotalSubtreeCost` vary per step, the highest
    for the `WHERE` clause and for the nested loops joins.


    As far as performance analysis plans are concerned, I think this one is very interesting
    and illustrates the power of memory-enhanced tables.


    Question


    Do the higher `EstimateCPU` statistics imply you will need powerful CPUs when
    taking advantage of memory-enhanced tables? Something to consider.'
