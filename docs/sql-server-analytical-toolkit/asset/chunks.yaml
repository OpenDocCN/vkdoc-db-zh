  trans: '

    ## Visual Studio Community 许可证


    Visual Studio Community 是 Microsoft 开发架构中提供给开发者的免费许可证，可用于创建从 C# 应用程序到 SSIS 包等各种类型的应用程序。该工具是
    SSMS 的配套工具，您将用它来创建 SSAS 多维数据集和 SSIS ETL 包。


    请参阅图 14-7。


    ![](img/527021_1_En_14_Fig7_HTML.png)


    一张 Microsoft Visual Studio 窗口的截图。一个箭头指向顶部栏中的“扩展”选项。“管理扩展”弹出对话框在左面板中有 5 个选项。它展示了
    6 个选项，其中包括“SQL Server Integration Services”和“Microsoft Reporting Services Projects”。


    图 14-7


    Visual Studio，选择项目模板


    我很快会向您展示如何下载此工具，但首先让我们关注菜单栏中的 `EXTENSIONS` 选择。您将使用它来下载和安装 Visual Studio Community
    中的 `SSIS`、`SSAS` 和 `SSRS` 项目支持。只需点击 `EXTENSIONS`，然后滚动列表以挑选您需要的内容。该列表非常广泛！


    警告：这将需要时间进行下载和安装。再次说明，这将安装项目模板，以便您可以使用这些工具（如 `SSIS` 和 `SSAS` 项目）开发应用程序。您也可以创建
    C#、Python 和其他类型的应用程序。


    您在安装 SQL Server 时会安装 `SSAS`、`SSIS` 和 `SSRS` 服务器。在浏览安装界面时，您将有机会选择所需的组件，并通过指定要使用的安全凭据以及放置关键文件夹和文件的位置来配置它们。


    ### SSAS 项目


    还记得这些吗？这是我们用来创建多维数据集的东西，它允许用户对数据进行切片和切块，并在数据的各个级别和聚合中上下导航。请参阅图 14-8。


    ![](img/527021_1_En_14_Fig8_HTML.png)


    一张 SSAS 窗口的截图。左面板包含度量值和维度。“解决方案资源管理器”面板选中了“A P Plant.cube”。“数据源视图”有一个星型模式，其中“equipment”链接到“generator”、“turbine”、“valve”、“motor”和“equipment
    failure”，并带有“equipment type”和“location”。


    图 14-8


    SSAS OLAP 模型


    这里是多维数据集结构面板，向您展示了我们在处理电厂用例章节中创建的 `SSAS` 多维数据集的结构。使用 Visual Studio `SSAS` 项目模板创建的多维数据集会在
    `SSAS` 服务器实例上创建和加载，并可以通过 Microsoft Excel 电子表格和 Power BI 仪表板访问。您甚至可以使用一种称为 `MDX`
    的查询语言来创建类似 SQL 的查询。这是另一种您可能想要学习的语言。


    ### SSIS 项目


    Visual Studio 用于创建包含一个或多个项目的解决方案，这些项目包含用于加载数据库、创建多维数据集以及任何其他类型的数据集成过程的包。我们可以说
    `SSIS` 是移动数据的工具，而 SQL Server 是提供数据的工具。


    使用 `SSIS` 创建的解决方案可以部署到 SQL Server，以便按照您（DBA）或系统管理员使用称为 `SQL Agent` 的 SQL Server
    调度工具定义的计划运行。


    请参阅图 14-9。


    ![](img/527021_1_En_14_Fig9_HTML.png)


    一张 SSIS 窗口的截图。包文件 “Package.dtsx” 已打开。它展示了一个流程图。第一步是“加载日历”，接着是“加载国家”、“加载产品”、“加载产品类型”、“加载仓库”、“加载库存”、“加载位置”和“加载库存历史记录”。下方是输出结果。


    图 14-9


    典型的 SSIS 包


    这显示了我们在库存用例章节中创建的一个包的成功运行。此包从 `APInventory` 数据库检索数据，并将其加载到 `APInventoryWarehouse`
    数据仓库中。这是一个非常重要的工具，您需要安装、学习并掌握它，才能成为 SQL Server 专家开发人员或数据集成架构师。


    ## Power BI Web 记分卡、仪表板和报表


    Power BI 是我们用来创建一些简单报表和记分卡的工具。我们只触及了该工具功能的表面。Power BI 可以连接到各种数据源，包括 SQL Server
    数据库和使用 Visual Studio Community（2019 或 2022；建议都安装，有备无患）创建的 `SSAS` 多维数据集。


    请参阅图 14-10。


    ![](img/527021_1_En_14_Fig10_HTML.jpg)


    一张 Power BI 未命名文件窗口的截图。左面板有一个包含 9 列和 28 行的表格。列标题是“日历年”、“月”、“日”、“位置名称”、“I n v I
    D”、“W h I D”、“产品类型和名称”以及“数量”。右面板包含“筛选器”、“可视化效果”和“字段”。


    图 14-10


    Power BI 设计面板


    此截图向您展示了设计面板，您可以在其中定义数据源、检索数据，并将其转换为多种复杂的可视化效果，如饼图、折线图和条形图。此工具可以免费获取以供评估。我们稍后将看到如何获取它。


    ## Microsoft Excel 电子表格


    接下来是我们的老朋友，Microsoft Excel 电子表格。我们使用它来从各种业务用例数据库中提取数据，以创建一些有趣的报表和可视化效果。我们还创建了一些强大的数据透视表，使我们能够对数据进行切片和切块，并浏览每个数据库数据模型定义的各个层次结构。


    请参阅图 14-11。


    ![](img/527021_1_En_14_Fig11_HTML.png)


    一张 MS Excel 窗口的截图。它有两个表格，各有 5 列和 8 行。列标题是“函数”、“表”、“扫描计数”、“逻辑读取”和“物理读取”。它还有两个折线图，显示了“扫描计数”、“逻辑读取”和“物理读取”针对不同函数的趋势线。


    图 14-11


    Microsoft Excel 可视化效果


    这只是我们在库存章节中创建和讨论的可视化效果的一个示例。这是您（或您的业务分析师）用来从数据库中的数据准备报表和图表的一线工具。


    如果您不熟悉电子表格的创建，请下载并安装该工具。它的价格合理，虽然不是免费的，但非常值得投资，您可以将其添加到您的技能集中。


    注意


    Excel 也有自己类似 `MDX` 的编程语言，称为 `DAX`。`DAX` 代表数据分析表达式。您可以将 `DAX` 与 `SSAS`、Power BI
    和 Excel 数据透视表一起使用。


    ## SSAS 服务器


    `SSAS` 服务器实例是作为整个 SQL Server Developer 安装的一部分安装的。您可以通过 SSMS 管理和操作使用 Visual Studio
    Community 创建的多维数据集。可以安装两种类型的服务器：多维服务器或表格（关系）服务器。安装 SQL Server 时，请同时安装这两种类型。


    请参阅图 14-12。


    ![](img/527021_1_En_14_Fig12_HTML.jpg)


    一张 SSMS 窗口的截图。左面板显示了包含多个文件和文件夹的“对象资源管理器”。右面板显示了一个国家列表。


    图 14-12


    从 SSMS 查看的 SSAS 实例


    在这里，我们看到 AP 库存仓库多维数据集以及用于数据源、数据源视图、多维数据集度量值组和维度的各种文件夹。右侧面板显示了“国家”维度中可用的国家/地区名称。您可以使用查询窗格创建
    `MDX` 查询。

    '
- fmt: '## SSRS Server and Website


    SSRS was installed when you installed SQL Server Developer Edition. Now you need
    to download a separate installer to install the latest edition of SSRS. Once installed
    SSRS allows you to deliver web-based reports to your users like the one in Figure
    [14-13](#527021_1_En_14_Chapter.xhtml#Fig13), which is one of the sample reports
    we created.


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig13_HTML.jpg)

    A screenshot of the SSRS window. It presents a table of 11 columns and 15 rows.
    The column headers are Inv year, Inv quarter name, Inv month name, location ID,
    Warehouse ID, product type, Product ID, monthly sum quantity on hand, prior month
    sum, prior quarter sum, and prior year sum.

    Figure 14-13

    SSRS report


    Once you download and install the SSRS project template components via the `EXTENSION`
    menu selection in Visual Studio Community, you need to download, install, and
    configure the SSRS server before you publish a report. You can download the SSRS
    installer from the Microsoft download site:

    `www.microsoft.com/en-us/download/details.aspx?id=100122`


    Run the executable and follow the guided install steps. At the end you can launch
    the configuration tool. This tool will also be added to your Windows desktop so
    you can go back and fine-tune it any time. Please refer to Figure [14-14](#527021_1_En_14_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig14_HTML.png)

    A screenshot of the Report Server Configuration Manager window. The connect panel
    on the left has 11 options among which Web Service URL is selected. The right
    panel presents Web Service URL. It has input boxes for the Virtual directory,
    IP address, TCP ports, HTTPS certificate, and port.

    Figure 14-14

    Configuring SSRS


    Configuring SSRS is straightforward. For the most part, you accept all the default
    parameters. As can be seen in the screenshot, the left-hand side contains a panel
    with various selections. We see the Web Server URL panel selected, and it shows
    you the default parameters.


    The only one where you need to do some work is the Database selection where you
    define the database that will store report server and report configuration data
    and report data. Mostly, you need to just supply some names, click “OK,” and watch
    it run as it builds the databases.


    Check out some websites that discuss installing and configuring SSRS in case you
    are a bit nervous about setting it up. It is easy. Obviously, perform this setup
    first before you create reports.


    ## Report Builder


    We used this tool in a few chapters to create some simple reports. The process
    was easy. Choosing the wizard guides you, and before you know it, you have a report
    that pulls data from your database. Please refer to Figure [14-15](#527021_1_En_14_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig15_HTML.jpg)

    A screenshot of the Report Builder window. The left panel presents Report data
    with 5 folders and the right panel presents parameters. A pop-up dialog box of
    Group Properties has 7 options on the left among which sorting is selected. The
    right panel presents change sorting options.

    Figure 14-15

    Report Builder design panel


    We only touched the surface of this report design. You can create reports with
    graphs and scorecards that contain visualization like gauges that display critical
    pieces of information and also reports that can drill down to any number of levels
    of detail. This tool is also free, so there are no excuses in downloading it,
    installing it, and learning how to use it.


    Start with the wizard first, and before you know it, you will be creating reports
    from scratch with filters, graphs, and drill-downs.


    ## Performance Analysis Tools


    I am sure this was your favorite tool to perform performance analysis and enhancements.
    We used this tool to create estimated execution plans but also real-time execution
    plans that showed us the steps the SQL Server query engine took to execute a query
    and also how much data was passed between tasks.


    ### Estimated Query Plans


    Please refer to Figure [14-16](#527021_1_En_14_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig16_HTML.png)

    A screenshot of the SSMS window. It presents an estimated query plan with 10 components.
    Compute scalar is selected and it opens a pop-up dialog box. It presents details
    of 12 elements such as physical and logical operations, estimated execution mode,
    and operator cost. Below is the output list.

    Figure 14-16

    Typical estimated query plan


    The visual is great, and by placing your mouse over any task, you can see the
    details involved. This tool coupled with `IO`, `TIME`, and `PROFILE` statistics
    was powerful that allowed us to evaluate performance and come up with some tuning
    strategies.


    Its cousin, live query plans, takes performance analysis a step further.


    ### Live Query Plans


    Please refer to Figure [14-17](#527021_1_En_14_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig17_HTML.png)

    A screenshot of the SSMS window. It presents a live query plan with 11 components.
    The components are nested loops, table spool, segment, compute scalar, compute
    scalar, stream aggregate, sort, nested loops, stream aggregate, table spool, and
    table spool.

    Figure 14-17

    Live query plan


    This is similar to the estimated query plan tool, but we get to see the actual
    number of rows that is passed around between each task. If the data volume is
    large enough and if the query takes minutes to run, you can see the values change
    dynamically.


    Make sure that the estimated costs displayed in both plans are close; otherwise,
    some serious issues might exist and investigation is required.


    ### DBCC


    We used this simple but important tool to clear memory cache that queries use
    to store data and plans. Each time you need to perform some performance analysis,
    run this first so the cache is cleared and you get an accurate set of statistics.
    Please refer to Listing [14-1](#527021_1_En_14_Chapter.xhtml#PC2).


    ```

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    ```

    Listing 14-1

    Running DBCC


    If you do not run this tool, data and plan information are stored in memory so
    that subsequent runs of the query you are analyzing will return incorrect results
    as far as `IO` and `TIME` statistics because the query is taking advantage of
    data and query information in memory.


    ### IO and TIME Statistics


    We relied on this set of statistics many times in our performance tuning sessions.
    They tell us how many operations, like disk scan and physical reads, occur and
    also how long a query takes to parse and run.


    Note

    The parse step is when the query engine makes sure that the syntax is correct
    and also knows where the data location is that needs to be retrieved. Objects
    called parse trees are also created. This is what the estimated query plan tool
    displays when we look at the plans. Please refer to Listing [14-2](#527021_1_En_14_Chapter.xhtml#PC3).


    ```

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```

    Listing 14-2

    Setting IO and TIME Statistics On


    Run these to set the statistics on after you run `DBCC` and then execute the query.
    Change `ON` to `OFF` when you are finished and want to stop displaying statistics.
    Please refer to Figure [14-18](#527021_1_En_14_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig18_HTML.png)

    A screenshot of the SSMS window. It presents the Object Explorer in the left panel.
    The right panel has a code and IO and TIME statistics. Parse and compile times
    for CPU and elapsed are 8 and 8 milliseconds. Execution times for CPU and elapsed
    are 0 and 0 milliseconds. 12 rows are affected.

    Figure 14-18

    IO and TIME statistics


    I know you remember these. Wouldn’t it be nice if all queries ran in 0 ms?'
