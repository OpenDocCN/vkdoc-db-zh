- fmt: '### Performance Considerations


    Let’s run our usual baseline estimated query plan to see how this query behaves
    performance-wise. Please refer to Figure [11-17](#527021_1_En_11_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig17_HTML.png)


    A screenshot. The main page displays an execution plan. The arrows point towards
    the stages titled sort cost 42 percent, window aggregate cost 1 percent, sort
    cost 15 percent, index seek cost 10 percent, and clustered index cost 13 percent.


    Figure 11-17

    Inventory movement profile baseline estimated query plan


    We will not spend a lot of time on this, but it looks like our index coverage
    is not quite there. We see a clustered index seek on the `Warehouse` table at
    a cost of 13% and another two index seeks on the `Warehouse` table with costs
    of 10% and 1%. This is because we are using a `VIEW` called `WarehouseMonthly`,
    which is based on the `Warehouse` table.


    We also see we still have to create the following index:


    ```

    CREATE NONCLUSTERED INDEX ieInvOutInvInAsOfYearAsOfMonth

    ON [Product].[Warehouse] ([LocId],[InvId],[ProdId])

    INCLUDE ([InvOut],[InvIn],[AsOfYear],[AsOfMonth])

    GO

    ```


    Lastly, we see two sort tasks with costs of 15% and 42%. All other task costs
    are low. The following are the `IO` and `TIME` statistics for this query.


    Please refer to Figure [11-18](#527021_1_En_11_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig18_HTML.png)


    A screenshot. The main page is titled Messages. The arrows point towards elapsed
    time equal to 216 m s and 2260 m s, logical reads 3652, physical reads 6, and
    read-ahead reads 3772.


    Figure 11-18

    IO and TIME statistics


    The work table values are all zero so we will ignore these. For the `Warehouse`
    table though, we see a scan count of 10, logical reads of 3,652, physical reads
    of 6, and read-ahead reads of 3,772. The query execution time came in at 2260
    ms. This is a busy query indeed.


    Let’s create the recommended index and see what improvements, if any, are gained.


    Please refer to Figure [11-18a](#527021_1_En_11_Chapter.xhtml#Fig19) for the revised
    estimated query plan.


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig19_HTML.png)


    A screenshot. The upper half of the page depicts the S Q L codes and the lower
    half depicts the execution plan. The arrows point towards the stages titled sort
    cost 15 percent, index seek cost 1 percent, and index seek cost 12 percent.


    Figure 11-18a

    Revised estimated query plan


    This looks a little better. The first index seek task went down; the other tasks
    are more all less the same, so some modest improvement with the new index. Let’s
    check out the `IO` and `TIME` statistics.


    Please refer to Figure [11-18b](#527021_1_En_11_Chapter.xhtml#Fig20) for the new
    `IO` and `TIME` statistics.


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig20_HTML.png)


    A screenshot of the S Q L work area. The upper half of the main page depicts the
    S Q L code for the order details of the inventory. The lower half of the page
    is titled messages, and the arrows point towards scan count 10, physical reads
    4, read-ahead reads 395, and elapsed time equal to 511 m s.


    Figure 11-18b

    Revised estimated query plan IO and TIME statistics


    Things look a lot better here. The `Warehouse` table counts went down considerably,
    and so did the execution time. So it seems the recommended index paid off.


    Let’s take a quick look at the `AVG()` function again.


    ### AVG( ) Function


    As the name implies, this function is used to calculate averages, but you knew
    that. Let’s check out our business specifications supplied by our friendly business
    analyst:


    This time our analyst wants to see rolling averages for the inventory movement
    values, specifically inventory in and inventory out. The rolling averages are
    by year instead of month.


    Listing [11-4](#527021_1_En_11_Chapter.xhtml#PC7) is the code for the query. Not
    shown is the `CTE` because it is the same as the `CTE` in the prior query.


    ```

    SELECT MovementDate

    ,InvId

    ,LocId

    ,WhId

    ,ProdId

    ,Increment

    ,Decrement

    ,AVG(CONVERT(DECIMAL(10,5),Increment)) OVER (

    ORDER BY MovementDate

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MonthlyAvgIncr

    ,AVG(CONVERT(DECIMAL(10,5),Decrement)) OVER (

    ORDER BY MovementDate

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MonthlyAvgDecr

    FROM APInventory.Product.InventoryTransaction

    WHERE ProdId = ''P033''

    AND YEAR(MovementDate) = 2010

    AND MONTH(MovementDate) = 5

    AND WhId = ''WH112''

    GO

    ```


    Listing 11-4

    Rolling Yearly Averages for Inventory Movement In and Out


    A `ROWS` window frame specification is used in order to define the range for processing.
    In this query we define the range over the year. For each current row, we (or
    should we say SQL Server) consider all preceding rows and all succeeding rows
    within the partition.


    Note we are filtering for the year 2010 as per the business analyst requirements,
    but once we test this, it can be modified for more years, months, and all locations,
    inventories, warehouses, and products. This would make it a good candidate for
    an `SSRS` report created with Report Builder.


    Please refer to the partial results in Figure [11-19](#527021_1_En_11_Chapter.xhtml#Fig21)
    together with a nice graph.


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig21_HTML.png)


    A screenshot of the window represents an Excel sheet on the left and a multi-line
    graph on the right. The columns are titled date, increment, decrement, average
    increase, and average decrease. A multiline graph of movement versus date depicts
    the fluctuating trend.


    Figure 11-19

    Inventory movement analysis line chart and report


    We can see a lot of swings, both up and down, in the inventory movement. This
    can be interpreted as there are a lot of sales. The business analyst needs to
    determine though that the inventory out movement does not result in many instances
    of backorders. This would mean a customer needs to wait for the item they ordered,
    which could lead to unhappy customers, which in turn could lead to lost customers.'
