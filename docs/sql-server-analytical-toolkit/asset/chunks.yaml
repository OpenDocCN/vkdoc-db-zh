    Please refer to Figure [12-20](#527021_1_En_12_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig20_HTML.png)


    A screenshot of a pop panel of New Table or Matrix. Includes a large box with
