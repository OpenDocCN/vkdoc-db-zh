- fmt: '## Reviewing and Publishing Report Parts


    We want to review the report parts as we need to rename them to make sure there
    are no duplicate names used by other reports. These names are basically the `Tablix`
    object and the data sets. If you do not change these, when you create more than
    one report, you will keep on getting publishing errors. Just use good new names
    each time and you will avoid headaches.


    Click the last selection “Review and modify report parts before publishing.”


    Please refer to Figure [12-37](#527021_1_En_12_Chapter.xhtml#Fig37).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig37_HTML.png)

    A screenshot of the home page of Microsoft Report builder. It presents the Pop
    panel of the Publish Report Parts. 2 arrows point to the selected report part
    entry of inventory level tablix, and the dataset of new inventory level report.
    An arrow indicates the publish button at the bottom right corner.

    Figure 12-37

    Review parts before publishing, part 2


    I changed the default `Tablix1` name to `InventoryLevelTablix`. I am sure this
    is a new unique name. The data set name is grayed out so you cannot change it.
    I made sure I gave it a good name during the definition step we discussed earlier.


    This looks pretty good, so cross your fingers and press the `Publish` button.
    If you received a “Published successfully” message, you’re ready to view the report.


    Please refer to Figure [12-38](#527021_1_En_12_Chapter.xhtml#Fig38).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig38_HTML.png)

    A screenshot of the home page of Microsoft Report builder. It presents a Pop panel
    of Publish Report Parts. It allows to edit the title and description before publishing.
    The results present, 0 report parts failed to publish,1 published successfully.

    Figure 12-38

    Success


    We did receive a “Published successfully” message. Let’s go to our `SSRS` website
    and check things out.


    Please refer to Figure [12-39](#527021_1_En_12_Chapter.xhtml#Fig39).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig39_HTML.png)

    A screenshot of the Pop panel of the Report Server Configuration Manager. 2 arrows
    indicate to specify the server name and select a report server instance. The connect
    button at the bottom is highlighted.

    Figure 12-39

    View the report


    I always forget the report server URL.


    If you go to the `Report Server Configuration Manager` tool, you can connect to
    the server and then view the URL for the web report portal as shown in Figure
    [12-40](#527021_1_En_12_Chapter.xhtml#Fig40).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig40_HTML.png)

    A screenshot of the Pop panel of the Report Server Configuration Manager. An arrow
    indicates to configure a U R L to access the web portal. An advanced button allows
    to define multiple U R Ls.

    Figure 12-40

    Access the web portal


    Just click the URL to navigate to the web page. You will see the following page
    in your browser.


    Please refer to Figure [12-41](#527021_1_En_12_Chapter.xhtml#Fig41).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig41_HTML.png)

    A screenshot of a web page presents the home page of S Q L Server Reporting Services.
    An arrow indicates the Inventory level tablix under the 7 resources of report
    parts.

    Figure 12-41

    Report parts loaded


    We see the report parts are all there for this and other reports. If we navigate
    to the `Browse` tab, we will also see the reports. In our case we need to upload
    them. Click the `Upload` button in the menu bar.


    But before we do this, go back to the Report Builder designer, and save your report
    if you forgot to do it or changed parts. If you save the report like we did earlier,
    we are good to go. If not, check out the following screenshot.


    Please refer to Figure [12-42](#527021_1_En_12_Chapter.xhtml#Fig42).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig42_HTML.png)

    A screenshot of the home page of Microsoft Report builder. It presents the steps
    to save the report. An arrow indicates to enter the report name as New Inventory
    Ranking.

    Figure 12-42

    Save the Report Builder report before uploading


    Click the `File` tab and click `Save as`. Pick a good unique name in the dialog
    box and click `Save`. Make sure you place it in a dedicated folder so that you
    can remember the name!


    I actually forgot to do this when I generated the images in this section, so I
    had to perform this action here, so might as well review it again. Now you will
    never forget.


    Now we can upload the report.


    Please refer to Figure [12-43](#527021_1_En_12_Chapter.xhtml#Fig43).


