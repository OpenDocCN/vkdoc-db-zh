- fmt: '### LEAD( ) Function


    The counterpart of the `LAG()` function is the `LEAD()` function. This function
    is used to retrieve the next value relative to the current row column. For example,
    given this month’s sales amounts for a product, pull next month’s sales amounts
    for the same product or specify some offset, like three months in the future or
    even a year in the future (historical data of course; one cannot see into the
    future from the present, and neither can your database if the data does not exist).


    So this function can only be used in a historical context up to the current date.
    No future values exist yet!


    Here comes the business analyst requirements:


    Our analyst wants to see the same type of report as the prior report, but this
    time they want to see the change from the current month (in time) to the next
    month that follows. Luckily for us we now have the report table and do not need
    to use a `CTE`-based query.


    Please refer to Listing [10-6](#527021_1_En_10_Chapter.xhtml#PC10).


    ```sql

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,MonthName

    ,CalendarMonth,SumEquipFailures

    ,LEAD(SumEquipFailures,1,0) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS NextFailureSum

    FROM [Reports].[PlantSumEquipFailures]

    WHERE CalendarYear > 2008

    GO

    ```


    Listing 10-6


    Equipment Failure LEAD Query


    All we did was copy and paste the prior query, and instead of using the `LAG()`
    function, we used the `LEAD()` function. Let’s check out the results in Figure
    [10-13](#527021_1_En_10_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig18_HTML.png)


    A screenshot of the S Q L, S S M S window. It has a table of 9 columns and 1011
    rows. The column headers are Plant name, location name, calendar year, quarter
    name, month name, calendar month, sum equipment failures, and next failure sum.
    Rows 7, 8, and 9 of the last 5 columns are outlined.


    Figure 10-13


    Current month’s and next month’s failures


    As can be seen, this function also works well. Notice how the values for the next
    month are reset when a new quarter is processed, just how we specified it in the
    `PARTITION BY` clause.


    Homework


    Using this function and the prior function, add logic to calculate the difference
    between the prior month’s failure value and the current month’s failure value.
    Also do the same for the `LEAD()` function. That is, calculate the difference
    between the current value and next month’s value. Create one large query and do
    some performance analysis. The code for this homework is included in the script
    for this chapter in case you get stuck.


    Performance analysis time!


    ### Performance Considerations


    Let’s create a baseline estimated query plan in the usual manner. Keep in mind
    that you cannot specify `RANGE` or `ROW` window frames for the `LEAD()` or `LAG()`
    function. So either you look ahead relative to the current month or look back
    from the current month.


    Back to the query. Both a `PARTITION BY` and an `ORDER BY` clause are included
    in the `OVER()` clause.


    I think we can deduce what tasks will have high percentage values. Please refer
    to Figure [10-14](#527021_1_En_10_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig19_HTML.png)


    A screenshot of the S Q L, S S M S window. It presents a baseline estimated query
    plan with 9 components. The components are compute scalar, stream aggregate, window
    spool cost 6%, segment, compute scalar, sequence project, segment, sort with cost
    41%, and table scan cost 31%.


    Figure 10-14


    Baseline estimated query plan for the LEAD function query


    If you guessed that we would see expensive sort and window spool tasks, you are
    correct. Notice the sort task chimes in at 61% and the window spool task chimes
    in at 6%. The table we are working with is too small for an index, so we will
    wrap things up by looking at the `IO` and `TIME` statistics.


    Please refer to Figure [10-15](#527021_1_En_10_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig20_HTML.png)


    A screenshot of the S Q L, S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 0 and 35 milliseconds.
    S Q L server execution times for C P U and elapsed are 16 and 138 milliseconds.
    1011 rows of 2 table columns are affected.


    Figure 10-15


    IO and TIME statistics for the `LEAD()` function


    These are not too bad: all zero values for the work table and 1 scan count, 13
    logical reads, and 2 physical reads for the report table.


    I think that we can now agree that when working with historical data with the
    window functions, we should always consider some sort of denormalized report table
    as the base table replacing any `CTE`. This approach will deliver good performance,
    especially when multiple users execute the same query via a report or directly
    with SSMS.


    Pop Quiz Answer


    How do you turn on `IO` and `TIME` statistics?


    Execute the following commands:


    ```sql

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```


    To turn them off, just use the `OFF` keyword instead of `ON`.'
