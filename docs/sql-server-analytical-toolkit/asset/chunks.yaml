    \ AsOfYear\n        ORDER BY AsOfDate\n    ) * 1900\n    )\n),1\n) AS InvOut\n\
    ```\n\n从内向外分析，`ROW_NUMBER()` 函数使用了一个 `OVER()` 子句，该子句按 `AsOfYear` 列和使用 `DATEPART()`\
    \ 函数从 `AsOfDate` 派生的季度进行分区。`ORDER BY` 子句按 `AsOfDate` 对分区结果集进行排序。生成的值用作 `RAND()`\
    \ 函数的种子，生成的值乘以 85。\n\n接下来，我们将刚刚生成的值乘以使用相同逻辑生成的另一个值，只是第二个 `OVER()` 子句中的 `PARTITION\
    \ BY` 仅由 `AsOfYear` 定义。这个值再次被 `RAND()` 函数用作种子值，结果乘以 1900。\n\n最后，通过使用 `CEILING()`\
    \ 函数获取下一个最高值来调整新值，然后我们使用 `ROUND()` 函数对最终值进行四舍五入，以确保不包含小数部分。\n\n此逻辑也用于为 `InvIn`\
    \ 列生成随机值。\n\n请参考图 12-17 中的部分结果。\n\n![images/527021_1_En_12_Chapter/527021_1_En_12_Fig17_HTML.jpg](img/527021_1_En_12_Fig17_HTML.jpg)\n\
    \n**图 12-17**\n使用 ROW_NUMBER 函数生成随机值\n\n正如我们所见，随机值看起来是合理的。归根结底，这只是一堆操作数字以达到预期结果的逻辑。我只想给出一个\
    \ `ROW_NUMBER()` 函数用于除在分区内生成行号之外其他目的的例子。\n\n## 性能考虑\n\n让我们通过生成此查询的基线计划来最后看一下估计的查询计划。\n\
    \n请参考图 12-18。\n\n![images/527021_1_En_12_Chapter/527021_1_En_12_Fig18_HTML.png](img/527021_1_En_12_Fig18_HTML.png)\n\
    \n**图 12-18**\n随机值生成查询的基线估计查询计划\n\n我们将只快速检查这个查询，因为它通常不会出现在生产环境中，但当你需要生成带有随机值的测试数据时，它可能会在开发环境中使用。换句话说，除非查询运行数小时，否则性能并不是那么重要。\n\
    \n从计划的右侧开始，我们看到一个索引扫描，成本为 5%，一个排序成本为 19%，第二个排序成本为 19%，还有另外两个排序任务成本各为 19%。最左侧还有一个未显示的第五个排序任务，成本同样为\
    \ 19%。\n\n因此我们可以推断，这种类型的查询需要多次对中间结果进行排序。像往常一样，我忽略了零成本任务，尽管在进行分析时，你应该注意它们，尤其是那些你不知道其作用的！\n\
    \n这只是生成随机数据的一种方法，当你研究本书中用于加载数据库的脚本时，你会看到其他使用 SQL Server 函数生成随机数据的技术。"
- fmt: '## Create an SSRS Report


    We are now going to create a report using Report Builder and publish it on the
    `SSRS` website. This report needs to satisfy the following requirements submitted
    by our analyst:


    This is a detailed report that lists all product inventory on hand for all calendar
    years and months; all locations, inventories, and warehouses need to be included.
    The names of the months need to be displayed instead of the numbers (yes, another
    expensive `CASE` code block).


    This report will be used by multiple users, so a set of filters needs to be included
    that will allow business users the ability to select which years, months, and
    other dimensions they want to view – in any combination!


    In other words, all the data is needed, and this needs to be a dynamic report
    to support all the possible combinations of filtering choices.


    Performance is key. Our business users want everything. They are very demanding.
    Users cannot be expected to wait more than 30 seconds (or less) for the report
    to display results.


    We need to base this report on a `VIEW` based on the following query. Please refer
    to Listing [12-9](#527021_1_En_12_Chapter.xhtml#PC12).


    ```sql

    CREATE VIEW MonthlyInventoryRanks

    AS

    WITH WarehouseCTE (

    InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName

    ,InventoryId,WarehouseId,WarehouseName,ProductId,ProductName

    ,ProductType,ProdTypeName,MonthlyQtyOnHand

    )

    AS ( -- returns 24,192 rows

    SELECT YEAR(C.[CalendarDate])  AS InvYear

    ,MONTH(C.[CalendarDate]) AS InvMonthNo

    ,CASE

    WHEN MONTH(C.[CalendarDate])  = 1 THEN ''Jan''

    WHEN MONTH(C.[CalendarDate])  = 2 THEN ''Feb''

    WHEN MONTH(C.[CalendarDate])  = 3 THEN ''Mar''

    WHEN MONTH(C.[CalendarDate])  = 4 THEN ''Apr''

    WHEN MONTH(C.[CalendarDate])  = 5 THEN ''May''

    WHEN MONTH(C.[CalendarDate])  = 6 THEN ''June''

    WHEN MONTH(C.[CalendarDate])  = 7 THEN ''Jul''

    WHEN MONTH(C.[CalendarDate])  = 8 THEN ''Aug''

    WHEN MONTH(C.[CalendarDate])  = 9 THEN ''Sep''

    WHEN MONTH(C.[CalendarDate])  = 10 THEN ''Oct''

    WHEN MONTH(C.[CalendarDate])  = 11 THEN ''Nov''

    WHEN MONTH(C.[CalendarDate])  = 12 THEN ''Dec''

    END AS InvMonthMonthName

    ,L.LocId             AS LocationId

    ,L.LocName           AS LocationName

    ,I.InvId             AS InventoryId

    ,W.WhId              AS WarehouseId

    ,W.WhName            AS WarehouseName

    ,P.ProdId                 AS ProductId

    ,P.ProdName          AS ProductName

    ,P.ProdType          AS ProductType

    ,PT.ProdTypeName     AS ProdTypeName

    ,SUM(IH.[QtyOnHand]) AS MonthlyQtyOnHand

    FROM [Fact].[InventoryHistory] IH -- WITH (INDEX(ieInvHistCalendar))

    JOIN [Dimension].[Location] L

    ON IH.LocKey = L.LocKey

    JOIN [Dimension].[Calendar] C

    ON IH.CalendarKey = C.CalendarKey

    JOIN [Dimension].[Warehouse] W

    ON IH.WhKey = W.WhKey

    JOIN [Dimension].[Inventory] I

    ON IH.[InvKey] = I.InvKey

    JOIN [Dimension].[Product] P

    ON IH.ProdKey = P.ProdKey

    JOIN [Dimension].[ProductType] PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    GROUP BY YEAR(C.[CalendarDate])

    ,MONTH(C.[CalendarDate])

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,W.WhName

    ,P.ProdId

    ,P.ProdName

    ,P.ProdType

    ,PT.ProdTypeName

    )

    SELECT InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName

    ,InventoryId,WarehouseId,WarehouseName,ProductType,ProductId

    ,ProductName

    ,MonthlyQtyOnHand

    ,RANK() OVER (

    PARTITION BY InvYear,InvMonthNo,InvMonthName,LocationId

    ,InventoryId,WarehouseId

    ORDER BY MonthlyQtyOnHand DESC

    ) QtyOnHandRank

    FROM WarehouseCTE

    GO

    ```


    ### Listing 12-9: TSQL VIEW to Support Inventory Ranking


    Lots of code, but it is worth the time and effort to review it and understand
    it, especially if you are new to TSQL coding.


    Notice the granularity of the partition specified in the `PARTITION BY` clause.
    We specify the year, month (number and year), location, inventory, and warehouse
    (we are not partitioning down to the product; try it on your own, and also modify
    the view so it uses the `DENSE_RANK()` function).


    Lastly, an `ORDER BY` clause is included to sort the processing of the partition
    values by `MonthlyQtyOnHand` in descending order.


    If performance is slow, we need to recreate the report with `SCHEMA` binding,
    which means the `VIEW` will actually be populated with physical data and exist
    on disk. This will make any query that references the view fast!


    This is another option to use vs. the report table option we discussed many times
    to replace the `CTE`. Just modify the `VIEW DDL` command as per the following
    code snippet:


    ```sql

    CREATE OR ALTER VIEW Reports.MonthlyInventoryRanks

    -- use below to implement a materialized, schema bound view

    WITH SCHEMABINDING

    AS

    ```


    ### Report Builder Tutorial


    Now it’s time for a brief tutorial on Report Builder that we will use to build
    and publish a web-based report to `SSRS`.'
