    | **统计信息 (工作表)** | **无索引** | **有索引** |

    | 扫描计数 | **39** | **39** |

    | 逻辑读取 | **217** | **217** |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

