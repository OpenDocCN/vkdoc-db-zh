    A screenshot of the S S M S window. It presents part D of the estimated execution
    plan with 12 components. The components are select, compute scalar, nested loops,
    table spool, segment, compute scalar, compute scalar, nested loops, nested loops,
    stream aggregate, table spool, and table spool.


    Figure 7-35


    Estimated execution plan, part E


    Same pattern again, with one final table spool, this time at a cost of 1%, and
    one final nested loops join to merge results (4% cost). The table spool shows
    a cost of 1% although the `STATISTICS PROFILE` statistics show 0 `IO`.


    Initial conclusions are that the only way to improve this plan is by


    1.  Getting more memory

    2.  Placing `TEMPDB` on a solid-state drive

    3.  Loading the Account table into memory via a memory-enhanced table


    All good suggestions, but is it worth it?


    For one last item, let’s generate a live query plan so we can see the flow of
    data between all the tasks for the last, left-hand side of the plan. Please refer
    to Figure [7-36](#527021_1_En_7_Chapter.xhtml#Fig37).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig37_HTML.png)


    A screenshot of the S S M S window. It presents a live query plan with 12 components.
    The components are select, compute scalar, nested loops, table spool, segment,
    compute scalar, compute scalar, nested loops, nested loops, stream aggregate,
    table spool, and table spool.


    Figure 7-36


    Live query plan


    Here we see the number of rows in the various branches with the final count of
    49 rows, which is what we saw in the results of the query pane.


    Tip


    Always compare estimated query plans against live query plans to make sure values
    and operators are not too far off.


    Recall scheme 3? Let’s see how it works. We will create several memory-enhanced
    tables, one for each year of account balances, and see what that buys us in terms
    of performance improvement, albeit at the cost of increased complexity.


    ### Multi-memory-enhanced-table Strategy


    We will create five memory-enhanced tables, one for each of the years from 2011
    to 2015. We will load them, create a `VIEW` object that ties all five together
    via `UNION ALL` operators, and modify the prior query so it goes against the memory-enhanced
    tables via the new `VIEW`. Let’s start by creating and loading the tables.


    Note


    Once memory-enhanced tables are created and loaded, you do not need to reload
    them if you reboot your laptop. They are loaded automatically. You only need to
    add new rows. Make sure you do not accidentally add duplicate rows!


    Listing [7-16](#527021_1_En_7_Chapter.xhtml#PC22) is the code for the first one.
    The code for the remaining tables is the same except each year part of the table
    name changes to reflect the remaining years, 2012, 2013, 2014, and 2015.


    ```

    CREATE TABLE [FinancialReports].[AccountMonthlyBalancesMem2011]

    (

    [AcctYear]    [int] NULL,

    [AcctMonth]   [int] NULL,

    [CustId]      [varchar](8) NOT NULL,

    [PrtfNo]      [varchar](8) NOT NULL,

    [AcctNo]      [varchar](64) NOT NULL,

    [AcctName]    [varchar](24) NOT NULL,

    [AcctBalance] [decimal](10, 2) NOT NULL,

    INDEX [ieMonthlyAcctBalanceMemory2011] NONCLUSTERED

    (

    [CustId],

    [AcctYear],

    [AcctMonth],

    [PrtfNo],

    [AcctNo]

    )

    )WITH (MEMORY_OPTIMIZED = ON,DURABILITY = SCHEMA_ONLY)

    GO

    ```

    Listing 7-16

    Create Five Memory-Enhanced Tables


    This table is typical for all five tables; all that changes is the name of course.
    We need to declare an index within the `CREATE TABLE` command and set the memory-optimized
    parameters to `ON`:


    ```

    WITH ( MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )

    ```


    In the script for this chapter, you will find the `DDL` command for all five `CREATE
    TABLE` commands. Next, we need to load the tables.


    Listing [7-17](#527021_1_En_7_Chapter.xhtml#PC24) is the `TSQL DML` command to
    insert rows into the first memory table for account balances in 2011. The remaining
    insert statements are identical except that we change the name of the table to
    reflect the year we are loading and the `WHERE` clause predicate to reflect the
    remaining years’ worth of data we need to load.


    ```

    INSERT INTO [FinancialReports].[AccountMonthlyBalancesMem2011]

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,CONVERT(DECIMAL(10,2),SUM(AcctBalance)) AS AcctBalance

    FROM Financial.Account

    WHERE YEAR(PostDate) = 2011

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    GO

    ```

    Listing 7-17

    Load the Five Memory-Enhanced Tables


    This is a standard `INSERT/SELECT` command with a `GROUP BY` clause as we are
    summing up the account balances by year, month, customer, and portfolio. Our last
    step is to create the `TSQL VIEW` object.


    Yes, these incur costs as far as performance, but since this is historical data,
    you only need to load them once per year. As new years roll by, you load them
    once. Now we need to tie all these tables together into one `VIEW` object.


    Listing [7-18](#527021_1_En_7_Chapter.xhtml#PC25) is the `DDL` command to create
    a `VIEW` that connects all the tables via five queries inter-connected with `UNION
    ALL` commands.


    ```

    CREATE VIEW [FinancialReports].[AccountMonthlyBalancesMemView]

    AS

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2011]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2012]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2013]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2014]

    UNION ALL

    SELECT [AcctYear]

    ,[AcctMonth]

    ,[CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctBalance]

    FROM [FinancialReports].[AccountMonthlyBalancesMem2015]

    GO

    ```

    Listing 7-18

    Create the View Based on the Five Memory-Enhanced Tables


    Large script, but it is just a series of four `UNION ALL` commands that tie the
    rows from all five tables together via identical queries except for the table
    names.


    Tip


    `UNION ALL` is preferred vs. `UNION`, which removes duplicates and costs more
    in terms of performance. Your data should not have unexpected duplicates or triplicates
    or more!


    Last but not least, Listing [7-19](#527021_1_En_7_Chapter.xhtml#PC26) is our query
    that includes the `PERCENTILE_DISC()` function that now references the `VIEW`
    instead of one large table.


    ```

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_DISC(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-25%]

    ,PERCENTILE_DISC(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-50%]

    ,PERCENTILE_DISC(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-75%]

    ,PERCENTILE_DISC(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-90%]

    FROM [FinancialReports].[AccountMonthlyBalancesMemView]

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    ORDER BY CustId

    ,AcctYear

    GO

    ```

    Listing 7-19

    Account Balance Report from a Memory Table–Based View


    No need to explain the code as we discussed it earlier. All that changes is that
    we are referencing a `VIEW`.


    The results are the same as the `CTE` query, so in the interest of space, I will
    not display another screenshot here.'
