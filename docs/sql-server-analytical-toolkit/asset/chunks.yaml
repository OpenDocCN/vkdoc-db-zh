- fmt: '### Performance Considerations


    Figure [12-10](#527021_1_En_12_Chapter.xhtml#Fig10) is our baseline estimated
    query plan.


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig10_HTML.png)


    A screenshot of `c h 12 ranking query s q l` window. It presents the message of
    the execution plan for query cost. Arrows point to `hash match` cost 50%, `compute
    scalar` cost 5%, and the `index seek` cost 36%. Other costs include `sort` cost,
    `segment` costs, and `compute scalar` cost.


    Figure 12-10


    Estimated baseline query plan


    Seems like the indexes we built are paying off. The `index seek` comes in at a
    cost of 36%. Next are a `compute scalar` with a cost of 5% and a `hash match`
    join task with a cost of 50%. Lastly, a `sort` task is at 9%.


    I think we need to look at the `STATISTICS PROFILE` values to see what exactly
    is going on in these three tasks. Let’s list the expression used in these tasks
    so we know what to look at:


    *   `Compute Scalar:` Expr 1003, Expr 1004, Expr 1005

    *   `Hash Match:` Expr 1004, Expr 1005

    *   `Sort:` Expr 1004, Expr 1005, Expr 1006


    So what logic is used in these expressions?


    Please refer to Figure [12-11](#527021_1_En_12_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig11_HTML.png)


    A screenshot of `c h 12 ranking query s q l` window. It presents the message of
    the results of the `static profile` values, and a 6-line code. Two arrows point
    to the `compute scalar`, `Expression 1003`, and `Expression 1004`. `Hash match`
    is highlighted.


    Figure 12-11


    Statistics profile for the `RANK()` vs. `DENSE_RANK()` Query


    This set of statistics really gets into the detail of how the query is processed
    and where the problem spots might be. If we look at the `statement text` column,
    we can see what is going on.


    Not shown in the figure is `Expr1003` but here are the values:


    *   `Expr1003`=`datepart(year,[APInventory].[Product].[InventoryTransaction].[MovementDate])`,


    Here are expressions `Expr1004` and `Expr1005`:


    *   `Expr1004`=`datepart(quarter,[APInventory].[Product].[InventoryTransaction].[MovementDate])`

    *   `Expr1005`=`datepart(month,[APInventory].[Product].[InventoryTransaction].[MovementDate])`


    This tells us that the `DATEPART()` function calls are contributing to the high
    cost for the `hash match` task. We can resolve this by using the `Calendar` table
    to retrieve these values although we will incur the cost of a `JOIN` on the `Calendar`
    table (the clustered index we created will help).


    Here is `Expr1006` used in the `sort` task and `compute scalar` task:


    *   `Expr1006`=`CASE WHEN [Expr1013]=(0) THEN NULL ELSE [Expr1014] END))`


    Looks like this is for a `CASE` code block? Clearly, pulling out those date parts
    is cranking up costs in these tasks. But wait. We need to take a look at `Expr1013`
    and `Expr1014`. We are really getting into the weeds here:


    *   `Expr1013`=`COUNT_BIG([APInventory].[Product].[InventoryTransaction].[Decrement])`

    *   `Expr1014`=`SUM([APInventory].[Product].[InventoryTransaction].[Decrement])`


    Looks like these last two steps are used to calculate the sum of decrements in
    the `SELECT` clause of the `CTE` and also the count so the rank can be calculated.


    So this was a good performance analysis session. We started off with the estimated
    query plan, and then we moved on to the `STATISTICS PROFILE` statistics.


    But what does all this tell us?


    It tells us the performance hits are centered around the extraction of the year,
    quarter, and month parts and also the `SUM()` function in the `CTE`. Clearly the
    recommended solution is to replace the `CTE` logic with an `INSERT/SELECT` statement
    that loads a reporting table so we can isolate these performance costs once a
    day at off hours! Additionally, use the enhanced `Calendar` table so pulling out
    the date parts is not required each time the report table is loaded.


    ### Homework


    Based on this new knowledge, use the query in the `CTE` to create a report table.
    Then modify the base query so it refers to the report table vs. the `CTE` and
    perform the usual performance tuning analysis. Make sure you `JOIN` to the `Calendar`
    table to get the date parts in the logic that loads the report table. See if it
    is more efficient than using the `DATEPART()` function! Don’t forget to create
    the clustered index on the `Calendar` table.


    ### Another Pop Quiz Answer


    Here is the answer to the pop quiz.


    Why do we need to run the `DBCC` command each time we perform performance analysis
    and query tuning?


    Answer


    Because we want to clear memory cache that might contain old query plans. If you
    do not, your query might refer to objects already in memory, and your performance
    analysis results will be compromised. Always start with a clean slate.'
