    # MIN() 和 MAX() 函数


    ## 为什么我们需要建立故障概况？


    显然，我们想知道哪些设备发生了故障、故障发生在何处以及发生的频率。我们需要确定设备故障是由于维护不当或环境条件造成的，还是设备本身存在缺陷，或者是在特定区域或应用中安装了错误的设备。或者可能兼而有之！


    例如，该设备额定是否能在特定工厂地点的温度下运行？


    我们还想知道某台设备（如电机或阀门）是否发生了故障，是否进行了维修，几周或几个月后是否再次发生故障。我们需要了解原因。工厂的维护程序和员工也起着作用。设备是否在一天内多次故障？是否尝试了多次修复？


    我们希望获得最好的设备；我们力求正确的设备安装以及尽可能少的故障。我们还希望有一个可靠的管理计划，配备知识丰富的技术人员，能够快速解决问题。我们希望回答以下问题：


    *   故障发生的频率如何？

    *   尝试修复问题的次数有多少？

    *   问题是反复出现的吗？

    *   是否是单一供应商提供了有故障的设备？

    *   故障的根本原因是什么？


    这就是为什么一套好的报告和图表（能为我们提供故障统计和事件概况）将帮助我们实现这些目标，并解答与设备故障相关的问题。目的是识别然后减少甚至完全防止设备故障。


    我们的下一个报告将处理特定时间段内设备的最大和最小故障。以下是我们的分析师为此概况报告提供的业务需求：


    请提供一份报告，显示东厂锅炉房发生的滚动月度最小和最大故障率。让我们为此地点保留报告，因为我们希望首先查看高级别数值，然后深入研究到设备级别。


    有关最大和最小故障统计信息，请参阅清单 8-5。


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,SumEquipmentFailure

    ,MIN(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS RollingMin

    ,MAX(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS RollingMax

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND Plantname = ''East Plant''

    AND LocationName = ''Boiler Room''

    GO

    ```

    清单 8-5：滚动月度工厂最大和最小故障


    这是一个简单的查询，对 `MIN()` 和 `MAX()` 函数使用了相同的 `OVER()` 子句。分区按工厂名称、地点名称、年份和季度设置。`ORDER
    BY` 子句按年份和月份排序。`WHERE` 子句筛选包括 2002 年和 2003 年，当然还有东厂的锅炉房。让我们在图 8-11 中查看结果。


    ![](img/527021_1_En_8_Fig11_HTML.jpg)

    图 8-11：东厂滚动月度设备故障


    我们可以看到滚动月度计算正在生效，但我们也看到该地点有很多故障。是一台设备还是多台设备？


    让我们运行清单 8-6 中的查询来缩小范围。


    ```sql

    SELECT EF.PlantName

    ,EF.LocationName

    ,EF.CalendarYear

    ,EF.QuarterName

    ,EF.MonthName

    ,EF.SumEquipmentFailure

    ,EF.EquipmentId

    ,E.EquipAbbrev

    ,MIN(EF.SumEquipmentFailure) OVER (

    PARTITION BY EF.PlantName,EF.LocationName,

    EF.CalendarYear,EF.QuarterName

    ORDER BY EF.CalendarMonth

    ) AS RollingMin

    ,MAX(EF.SumEquipmentFailure) OVER (

    PARTITION BY EF.PlantName,EF.LocationName,

    EF.CalendarYear,EF.QuarterName

    ORDER BY EF.CalendarMonth

    ) AS RollingMax

    FROM Reports.EquipmentFailureStatistics EF

    JOIN [DimTable].[Equipment] E

    ON EF.EquipmentId = E.EquipmentId

    WHERE EF.CalendarYear IN(2002,2003)

    AND EF.Plantname = ''East Plant''

    AND EF.LocationName = ''Furnace Room''

    GO

    ```

    清单 8-6：东厂锅炉房的设备故障


    `MIN()` 和 `MAX()` 函数与定义分区的 `OVER()` 子句一起使用，分区按工厂名称、地点名称、日历年份和季度划分。分区按日历月份排序。


    使用 `WHERE` 子句仅包含两年、东厂和锅炉房的数据。


    查询结果请参阅图 8-12。


    ![](img/527021_1_En_8_Fig12_HTML.png)

    图 8-12：设备故障列表


    看起来设备 `P3L4MOT1` 是故障设备。这是一个电机，是个大问题。从名字可以看出，它位于 3 号工厂 4 号地点，电机名称是 `MOT1`。这些是每月不可接受的故障次数。我们需要查看这些故障发生在哪些天。


    让我们创建另一个查询，这次是设备和日期级别的粒度。请参阅清单 8-7。


    ```sql

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarDate

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,E.EquipAbbrev

    ,M.ManufacturerName

    ,Failure AS FailureEvent

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN [DimTable].[Manufacturer] M

    ON E.ManufacturerKey = M.ManufacturerKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    WHERE P.PlantName = ''East Plant''

    AND L.LocationName = ''Furnace Room''

    AND C.CalendarYear = ''2002''

    AND C.MonthName = ''April''

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    清单 8-7：按日期列出的设备故障


    此查询是从我们用于加载故障报告表的原始查询修改而来的。添加了日期和设备 ID 字段，以达到最低的粒度级别。如果我们记录每 24 小时时段中的小时数，可能会让事情变得更有趣。


    在真实应用中，分析师会检查此级别的所有月份，但让我们将调查限制在 2002 年 4 月，以便确保我们的逻辑有效。


    执行此查询产生图 8-13 中的报告。


    ![](img/527021_1_En_8_Fig13_HTML.png)

    图 8-13：`P3L4MOT1` 设备按日期列出的故障


    我们现在看到，电机设备标识符 `P3L4MOT1` 在 4 月 2 日故障了三次，在 4 月 11 日故障了四次。该电机由 CITY ENGINEERING
    INDUSTRIAL MOTOR 公司制造。现在我们有进展了。我们现在需要确定电机在这些日期故障的原因。如果你还没猜到，这意味着需要另一个查询。请参阅清单
    8-8。

    '
- fmt: '# Listing 8-8: Check Equipment Status


    ```sql

    SELECT CV.CalendarDate

    ,E.EquipmentId

    ,E.EquipAbbrev

    ,EOLSC.EquipOnlineStatusCode

    ,EOLSC.EquipOnlineStatusDesc

    FROM APPlant.FactTable.EquipmentStatusHistory ESH

    JOIN DimTable.Equipment E

    ON ESH.EquipmentKey = E.EquipmentKey

    JOIN DimTable.EquipOnlineStatusCode EOLSC

    ON ESH.EquipOnlineStatusKey = EOLSC.EquipOnlineStatusKey

    JOIN DimTable.CalendarView CV

    ON ESH.CalendarKey = CV.CalendarKey

    WHERE E.EquipmentId = ''P3L4MOT1''

    AND CV.CalendarDate IN(''2002-04-02'',''2002-04-11'',''2002-04-30'')

    GO

    ```


    This query checks for the status codes assigned on each of the three dates we
    need to look at. There are three `JOIN` operators, which means four tables need
    to be joined. The key table is called `EquipmentStatusHistory` that contains the
    dates and status codes. This table is joined to the `EquipOnlineStatusCode` table
    to retrieve the descriptions of the codes.

    We add a `WHERE` clause to filter for the desired equipment ID and dates. Let''s
    look at the results.


    Please refer to Figure [8-14](#527021_1_En_8_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig14_HTML.jpg)


    ### Figure 8-14: Equipment failure status by day


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 5 columns for
    calendar date, the equipment I D, equipment abbreviation, equipment online status
    code, and equipment status description.


    Wow, look at that! All “online – normal operation” status in the results.

    This poses a problem. Looks like the motor was online for those three days. Fortunately,
    we also have a status history table by hour for those days (a lower level of granularity).
    Maybe we had some other events on one or more of the hours on those dates.

    Let’s execute the following query in Listing [8-9](#527021_1_En_8_Chapter.xhtml#PC10)
    for each of the three days.


    # Listing 8-9: Equipment Failure by Hour


    ```sql

    SELECT ESBH.StatusDate

    ,ESBH.EquipmentId

    ,E.EquipAbbrev

    ,M.MotorName

    ,M.Rpm

    ,M.Voltage

    ,ESBH.StatusHour

    ,ESBH.EquipOnlineStatusCode

    ,EOLSC.EquipOnlineStatusDesc

    FROM Reports.EquipmentStatusHistoryByHour ESBH

    JOIN DimTable.Equipment E

    ON ESBH.EquipmentId = E.EquipmentId

    JOIN DimTable.Motor M

    ON E.EquipmentId = M.EquipmentId

    JOIN DimTable.EquipOnlineStatusCode EOLSC

    ON ESBH.EquipOnlineStatusCode = EOLSC.EquipOnlineStatusCode

    WHERE ESBH.EquipmentId = ''P3L4MOT1''

    AND StatusDate = ''2002-04-02''

    GO

    ```


    This query references the report table called `Reports.EquipmentStatusHistoryByHour`
    that contains equipment status by hour over 24-hour periods. Lots of joins between
    various tables to get some detailed information related to equipment and equipment
    status codes and descriptions.

    Nothing fancy, just plain old `TSQL` coding with joins and filters. No aggregate
    window functions and `OVER()` clauses.

    Executing this query yields the results for the first date we are examining.


    Please refer to Figure [8-15](#527021_1_En_8_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig15_HTML.png)


    ### Figure 8-15: Equipment failure for April 2, 2002


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 9 columns. Some
    values of the equipment online status description column are highlighted.


    Here are the 24-hour results for April 2, 2002. Yes, indeed, we do have three
    faults. That matches our results from the prior query. Notice also that the faults
    started to occur when there was a maintenance period for hours 12 and 13. The
    crew tried to get the motor online and it failed.

    Some more maintenance occurred at hours 15 and 16, and another fault occurred
    at hour 18 after one hour of normal operation. Another fault occurred in hour
    20 followed by one hour of maintenance at hour 21. After that the motor operated
    normally, so it looks like they got the issue finally fixed after three maintenance
    sessions (it would be interesting if we had data to show the names of the maintenance
    crew that were assigned to these failure events), until April 11, that is. Let’s
    see what happened on that date.

    Executing this query after we modify the `WHERE` clause, so it filters for April
    11, 2002, yields the following results in Figure [8-16](#527021_1_En_8_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig16_HTML.png)


    ### Figure 8-16: Equipment failure for April 11, 2002


    A screenshot of ch08 queries V 2 dot sql window. The top screen has some programming
    codes. The bottom screen presents the result table. The table has 9 columns. Some
    values of the equipment online status description column are highlighted.


    This time we see the four faults. The first two occurred in hours 7 and 8. One
    hour of maintenance to attempt to fix it in hour 9 followed, and then there was
    one hour of normal operation in hour 10. Two more faults occurred in hours 11
    and 12, and there was another hour of maintenance in hour 13 where it looks like
    they finally got the issue fixed.

    So it looks like a meeting with the vendor is in order so as to find out why the
    maintenance did not go smoothly on these dates (also with the maintenance crew).

    Why did we go through all these queries?

    I was trying to illustrate how using the aggregate functions with the `OVER()`
    clauses can help find interesting patterns and anomalies that could suggest problems.
    In this case we identified a lot of failures on certain dates and used lower-level-granularity
    queries to drill down into the failures until we discovered that a vendor''s maintenance
    crew was the issue.

    Yes, I did set up the scenario, but the goals were to identify the methodology
    and tools used to identify issues and find out the root cause!

    One last comment: The `TSQL` batch code to insert the staged hourly status can
    be found at the beginning of the script for this chapter in case you did not execute
    it.


    **Note**

    Sometimes your analysis tools are plain old lower-level queries to get down to
    the lowest level of granularity. The aggregate functions are just part of the
    tools in your toolkit. The trick is to identify patterns and anomalies and perform
    some drill-down to discover the root cause.'
