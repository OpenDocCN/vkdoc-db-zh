    ## The Data Gaps and Islands Problem


    This last set of scripts addresses the classic gaps and islands problem. Recall
    that gaps in our scenario are missing dates in a sequence of sequential dates,
    while islands are clusters of sequential dates that the customer executed trades
    for a particular instrument.


    This should be interesting as there are a lot of steps to take and we will see
    how the data is transformed in each step until we generate the final report.


    We will start off with gaps in trading days for the `LIBOR` (London Interbank
    Offered Rate) financial instrument. The script will be divided into five steps,
    the first being to load the test data and the remaining four to create the chained
    `CTEs` and the final query that generates the desired report. The script for identifying
    islands will have four steps, three to create the chained `CTEs` and one for the
    report.


    **Note**


    By chained `CTE`s I mean that the `CTE` queries the prior `CTE` until the last
    step where the query references the last `CTE` in the chain or sequence.


    Our business analyst wants us to create a query that will identify the gaps and
    islands in trading dates for customer C0000005 (we give customer C0000001 a break).
    As mentioned earlier we will only concentrate on the `LIBOR` interest rate and
    for the year 2012\. The report should include the start and stop dates of the
    gaps and islands but also a column that lists the dates for each category of data
    patterns.


    Figure 6-41 is a sneak peek of the results for the solution.


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig41_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It has a
    list with 35 rows and 7 columns with data on customer i d, symbol, trade days,
    gap or island, gap or island start, gap or island end, and gap or island trade
    days.


    **Figure 6-41**

    Final gaps and islands report


    Notice the boxed area in the screenshot. We can see that the start and end dates
    of the island are followed by the list of dates that make up the island. These
    include the start and stop dates. The gap range identified by the arrows does
    not include the start and stop dates, only the dates in between. Lastly, we see
    the string that identifies the date pattern as either a gap or island. The numbers
    at the end make this code unique as we will see. We have a big job ahead of us.


    Let’s start by creating the table that will store our test data.


    Please refer to Listing 6-16.


    ```sql

    CREATE TABLE Financial.CustomerBuyTransaction(

    TransDate            date           NOT NULL,

    CustId               varchar(8)     NOT NULL,

    Symbol               varchar(64)    NOT NULL,

    TradeNo              smallint       NOT NULL,

    TransAmount          decimal(10,2)  NOT NULL,

    TransTypeCode        varchar(8)     NOT NULL

    ) ON AP_FINANCE_FG

    GO

    ```


    **Listing 6-16**

    Set Up Data, Gaps, and Islands


    All the column names are self-explanatory. Technically, the primary key is made
    up of the `TransDate`, `CustId`, `Symbol`, and `TradeNo` columns. We need the
    `TradeNo` column in case a customer places multiple trades on a single day for
    the same instrument.


    Please refer to Listing 6-17.


    ```sql

    INSERT INTO Financial.CustomerBuyTransaction

    SELECT

    CAL.[CalendarDate]

    ,FT.CustId

    ,FT.Symbol

    ,ROW_NUMBER() OVER (

    PARTITION BY CAL.[CalendarDate],FT.CustId,FT.Symbol,

    FT.TransAmount,FT.TransTypeCode

    ORDER BY CAL.[CalendarDate],FT.CustId,FT.Symbol,

    FT.TransAmount,FT.TransTypeCode

    ) AS TradeNo

    ,FT.TransAmount

    ,FT.TransTypeCode

    FROM [MasterData].[Calendar] CAL

    JOIN [Financial].[Transaction] FT

    ON CAL.[CalendarDate] = FT.TransDate

    WHERE [BuySell] = ''B''

    ORDER BY CAL.[CalendarDate],FT.CustId,FT.Symbol

    GO

    INSERT INTO Financial.CustomerBuyTransaction

    VALUES(''2012-01-01'',''C0000001'',''AA'',2,312.40,''TT00002'')

    GO

    ```


    **Listing 6-17**

    Load Trades for the Customer


    This is a standard `INSERT/SELECT` command used to load the table. What is interesting
    is that we use the `ROW_NUMBER()` function with an `OVER()` clause to generate
    a trade sequence number so we can compensate for the event of multiple trades
    being placed by the same customer on the same date for the same instrument.


    The data we need to create this test data set comes from the `Calendar` and `Transaction`
    tables in our database. The second `INSERT` command simply inserts a second trade
    for January 1, 2012, for customer C0000001 and for instrument AA (Alcoa), so we
    have two trades in one day.


    Let’s see what the data we just inserted looks like by executing the following
    query:


    ```sql

    SELECT *

    FROM [Financial].[CustomerBuyTransaction]

    ORDER BY 1,2,3

    GO

    ```


    The results are shown in Figure 6-42.


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig42_HTML.jpg)


    A screenshot of S Q L application titled Ranking Financial Quarries. It represents
    a program and a list with 16 rows and 7 columns of transaction date, customer
    i d, symbol, trade number, transaction amount, and transaction type code. Rows
    1, 2, 12, and 13 are highlighted with a box.


    **Figure 6-42**

    Test data and instance of multiple trades in a day


    Looks like the `ROW_NUMBER()` function did its job. The first two rows show the
    multiple trades in the same day scenario. So do rows 12 and 13\. I basically went
    through this to ensure we had a viable primary key for the table, but it will
    be interesting to see how it affects our gaps and islands logic.


    Next, we need to create some artificial gaps for our little exercise.


    Please refer to Listing 6-18.


    ```sql

    DELETE FROM Financial.CustomerBuyTransaction

    WHERE [TransDate] IN(

    SELECT [TransDate]

    FROM [Financial].[CustomerBuyTransaction]

    WHERE YEAR([TransDate]) = 2012

    AND DAY(TransDate) IN (1,14,15,16,28)

    UNION ALL

    SELECT [TransDate]

    FROM [Financial].[CustomerBuyTransaction]

    WHERE YEAR([TransDate]) = 2013

    AND DAY(TransDate) IN (5,17,22,23,24)

    UNION ALL

    SELECT [TransDate]

    FROM [Financial].[CustomerBuyTransaction]

    WHERE YEAR([TransDate]) = 2014

    AND DAY(TransDate) IN (9,19,25,26,27,28)

    UNION ALL

    SELECT [TransDate]

    FROM [Financial].[CustomerBuyTransaction]

    WHERE YEAR([TransDate]) = 2015

    AND DAY(TransDate) IN (2,8,11,17,23,24,25,26)

    )

    GO

    -- need to insert these back in

    INSERT INTO Financial.CustomerBuyTransaction

    VALUES(''2012-01-01'',''C0000001'',''AA'',2,312.40,''TT00002'')

    GO

    INSERT INTO Financial.CustomerBuyTransaction

    VALUES(''2012-01-01'',''C0000001'',''LIBOR OIS'',2,2000.40,''TT00005'')

    GO

    ```


    **Listing 6-18**

    Create Gaps in Trade Activity


    The `DELETE` command to remove some random dates is basically a series of `UNION
    ALL` commands that select the `TransDate` value for days listed in the `IN()`
    operator. This list is returned to the `DELETE` command, and the rows are gone.


    Yes, I need to reinsert the multiple trades for the two days as we discussed as
    we loaded the table for the first time. This is optional; you do not need to do
    it if you do not want to.


    Let’s begin to build our solution to the gaps problem by creating our first `CTE`.'
