- fmt: '## Data Model


    以下是我们简单的概念模型，它将帮助您在开始创建窗口聚合查询时，基本理解所有表是如何关联在一起的。我将展示三个模型，每个对应一个主要的事实表。让我们从设备故障概念模型开始。


    请参考图 [8-2](#527021_1_En_8_Chapter.xhtml#Fig2)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig2_HTML.png)


    一个电厂设备故障概念模型的框图。设备故障与设备、制造商、设备类型和位置相关联。阀门、涡轮机、电机和发电机是电厂中的设备类型。


    图 8-2


    工厂概念数据模型 – 设备故障主题区域


    在中心，我们看到 `Equipment Failure` 实体，它将构成 `Equipment Failure` 事实表的基础。顾名思义，该实体存储了每台设备的故障次数以及故障日期。


    `Equipment` 实体由记录设备ID、序列号、设备类型和制造商标识符（以代理键的形式）的属性组成。该实体链接到 `Manufacturer` 实体以及我们将要跟踪的四种设备实体之一。


    阀门、涡轮机、电机和发电机是设备类型，因此我们看到这些实体与 `Equipment` 实体之间存在类型-子类型关系。


    注意


    当我们在物理数据库中实现时，它将把我们的模型从 `STAR` 模式修改为 `SNOWFLAKE` 模式。


    在模型的右上角，我们看到 `Plant` 实体，其中包含诸如工厂名称和标识符等基本信息。


    `Equipment Failure` 实体与 `Location` 实体有关联，因此我们知道故障设备的位置。`Valve`、`Turbine`、`Motor`
    和 `Generator` 实体也与 `Location` 实体有关联。


    倒数第二个是 `Calendar` 实体，它提供设备故障的日期。


    最后，关于哪种模型更好，即 `STAR` 模型还是 `SNOWFLAKE` 模型，存在许多讨论和争论。对于较小的数据量，我倾向于选择 `SNOWFLAKE`
    模型，因为它更具表现力，并允许您理解存储对象之间的关系。此外，当类别或类型代码需要更新时，特别是当您需要实现缓慢变化维度时，`SNOWFLAKE` 模型允许更轻松、更准确的更新。


    结束语：如果实现得当，`STAR` 模式对于大数据量往往性能更好。`SNOWFLAKE` 模式更具表现力且更易于维护。请根据业务需求和实现选择最适合的模型。


    让我们看一下将用于创建名为 `EquipmentStatusHistory` 事实表的第二个实体的数据模型。该事实表将存储历史数据，显示设备何时在线或离线以及每种状态的原因。


    概念模型请参考图 [8-3](#527021_1_En_8_Chapter.xhtml#Fig3)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig3_HTML.png)


    一个电厂设备状态历史概念模型的框图。设备状态历史块与日历、设备在线状态和设备块相关联。


    图 8-3


    工厂概念数据模型 – 设备状态历史主题区域


    这是一个简单得多的模型。它只有一个事实实体和三个维度实体。与之前的模型一样，`Equipment` 实体用于标识正在跟踪其状态历史的设备。`Calendar`
    实体提供状态分配的日期，最后一个实体 `Equipment Online Status` 具有标识设备状态的三个代码之一的属性，这些代码在表 [8-1](#527021_1_En_8_Chapter.xhtml#Tab1)
    中标识。


    表 8-1


    设备在线状态代码


    | 在线状态代码 | 在线状态描述 |

    | --- | --- |

    | 0001 | 在线 – 正常运行 |

    | 0002 | 离线 – 维护 |

    | 0003 | 离线 – 故障 |


    只有三个状态代码，但足够我们进行一些有趣的分析。


    我们的最后一个模型是工厂费用主题区域。请参考图 [8-4](#527021_1_En_8_Chapter.xhtml#Fig4)。


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig4_HTML.png)


    一个工厂费用概念模型的框图。工厂费用块与日历、工厂和工厂费用类别相关联。


    图 8-4


    工厂概念数据模型 – 工厂费用主题区域


    另一个简单的主题区域模型，只有一个“事实”实体和三个“维度”实体。我用引号标出这些名称，因为这些术语实际上只适用于物理表，但就我们的目的而言，我们理解这些实体用于帮助我们理解将用于构建数据仓库的业务模型。稍后，在数据库实现时，它们将成为事实表或维度表。


    回到主题区域模型。这里我们希望记录随时间推移的工厂费用，因此 `Plant Expense` 实体和 `Calendar` 实体之间当然存在关联以记录费用日期。工厂费用与工厂之间的关联是显而易见的。最后，`Plant
    Expense Category` 实体用于使用表 [8-2](#527021_1_En_8_Chapter.xhtml#Tab2) 中显示的以下代码之一标识费用类型。


    表 8-2


    工厂费用代码


    | 费用代码 | 费用描述 |

    | --- | --- |

    | 01 | 工资 |

    | 02 | 维修 |

    | 03 | 机械 |

    | 04 | 建筑维护 |


    创建了三个简单模型后，让我们创建一些简单的数据字典，提供实体、其属性以及实体之间关系（这些称为业务规则）的描述。


    它们有点长，而且说实话，读起来很枯燥。只需看看它们，并在需要时用作参考。至少你知道在哪里可以找到它们。


    ## 数据字典'
  raw: '## Data Model


    The following is our simple conceptual model that will give you a basic understanding
    of how all the tables tie together once we start creating our window aggregate
    queries. I will present three models, one for each of the principal fact tables.
    Let’s start with the equipment failure conceptual model.


    Please refer to Figure [8-2](#527021_1_En_8_Chapter.xhtml#Fig2).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig2_HTML.png)


    A block diagram of equipment failure conceptual model of a power plant. The equipment
    failure is linked to equipment, manufacture, equipment type, and location. Valves,
    turbines, motors, and generators are types of equipment in a plant.


    Figure 8-2


    Plant conceptual data model – equipment failure subject area


    In the center we see the Equipment Failure entity, which will form the basis of
    the Equipment Failure fact table. This entity as the name implies stores the number
    of failures of each piece of equipment together with the date of the failure.


    The Equipment entity is composed of attributes that record the equipment ID, serial
    number, the type of equipment, and the manufacturer identifier (in the form of
    a surrogate key). This entity links to the Manufacturer entity and to one of the
    four entities that make up the equipment we are going to track.


    Valves, turbines, motors, and generators are types of equipment, so we see the
    type-subtype relationship between these entities and the Equipment entity.


    Note


    When we implement this in the physical database, it will modify our model from
    a `STAR` schema to a `SNOWFLAKE` schema.


    On the upper right-hand side of the model, we see the Plant entity, which contains
    basic information like the plant name and identifier.


    The Equipment Failure entity has an association with the Location entity, so we
    know the location of the failed piece of equipment. The Valve, Turbine, Motor,
    and Generator entities also have an association with the Location entity.


    Second to last is the Calendar entity, which provides dates for the equipment
    failures.


    Lastly, there are many discussions and debates along the line of which model is
    better, the `STAR` or `SNOWFLAKE` model. I tend to go for the `SNOWFLAKE` model
    for smaller data volumes as it is more expressive and allows you to understand
    the relationships between the objects being stored. Also, `SNOWFLAKE` models allow
    for easier and more accurate updates in case a category or type codes need to
    be updated, especially when you need to implement slowly changing dimensions.


    Closing comment: The `STAR` schema tends to perform better for large volumes of
    data if implemented correctly. The `SNOWFLAKE` schema is more expressive and easier
    to maintain. Choose the model that best fits the business requirements and implementation.


    Let’s look at the data model for the second entity that will be used to create
    a fact table called `EquipmentStatusHistory`. This fact table will store historical
    data that shows when a piece of equipment was online or offline together with
    the reasons for each status.


    Please refer to Figure [8-3](#527021_1_En_8_Chapter.xhtml#Fig3) for the conceptual
    model.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig3_HTML.png)


    A block diagram of equipment status history conceptual model of a power plant.
    The equipment status history block is linked with blocks of calendar, equipment
    online status, and equipment.


    Figure 8-3


    Plant conceptual data model – equipment status history subject area


    This is a much simpler model. It has only one fact entity and the three dimension
    entities. The Equipment entity, as was the case in the prior model, is used to
    identify the piece of equipment whose status history is being tracked. The Calendar
    entity provides the date for the status assignment, and the last entity, the Equipment
    Online Status entity, has attributes that identify one of three codes that identify
    the status of the piece of equipment, which are identified in Table [8-1](#527021_1_En_8_Chapter.xhtml#Tab1).


    Table 8-1


    Equipment Online Status Codes


    | Online Status Code | Online Status Description |

    | --- | --- |

    | 0001 | Online – normal operation |

    | 0002 | Offline – maintenance |

    | 0003 | Offline – fault |


    Only three status codes but enough data for us to perform some interesting analysis.


    Our last model is the plant expense subject area. Please refer to Figure [8-4](#527021_1_En_8_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig4_HTML.png)


    A block diagram of plant conceptual model of expenses. The plant expenses block
    is linked with the calendar, plant, and plant expense category.


    Figure 8-4


    Plant conceptual data model – plant expense subject area


    Another simple subject area model with only one “fact” entity and three “dimension”
    entities. I called out these names in quotes because the terms really only apply
    to physical tables, but for our purposes we understand that the entities are used
    to give us an understanding of the business model that will be used to build the
    data warehouse. Later, when the database is implemented, they will become either
    fact tables or dimension tables.


    Back to the subject area model. Here we wish to record plant expenses over time,
    so of course there is an association between the Plant Expense entity and the
    Calendar entity to record the expense date. The association between plant expenses
    and plant is obvious. Lastly, the Plant Expense Category entity is used to identify
    the type of expense using one of the following codes shown in Table [8-2](#527021_1_En_8_Chapter.xhtml#Tab2).


    Table 8-2


    Plant Expense Codes


    | Expense Code | Expense Description |

    | --- | --- |

    | 01 | Salary |

    | 02 | Repairs |

    | 03 | Machinery |

    | 04 | Building maintenance |


    Having created three simple models, let’s create some simple data dictionaries
    that provide descriptions of the entities, their attributes, and the relationships
    between the entities (these are called business rules).


    They are a bit long and, to be truthful, boring to read. Just take a look at them
    and use them for reference as needed. At least you know where to find them.


    ## Data Dictionaries'
