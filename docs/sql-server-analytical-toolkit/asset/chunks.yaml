- fmt: '## Ticker Analysis


    Let’s perform some statistical analysis on one financial instrument called Alcoa.
    The ticker symbol is `AA`.


    The specification is to report the minimum low, the maximum low, the minimum high,
    and the maximum high for the year 2012. Please refer to Listing [5-18](#527021_1_En_5_Chapter.xhtml#PC46).


    ```sql

    SELECT QuoteYear

    ,QuoteQtr

    ,QuoteMonth

    ,QuoteWeek

    ,Ticker

    ,Company

    ,TickerDate

    ,[Low]

    ,[High]

    ,MIN([Low]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [Low]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MinLow

    ,MAX([Low]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [Low]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MaxLow

    ,MIN([High]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [High]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MinHigh

    ,MAX([High]) OVER(

    PARTITION BY QuoteYear,QuoteQtr,QuoteMonth,[QuoteWeek],[Ticker]

    ORDER BY [High]

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ) AS MaxHigh

    FROM [MasterData].[TickerPriceRangeHistoryDetail]

    WHERE Ticker = ''AA''

    AND QuoteYear = 2012

    ORDER BY Ticker

    ,QuoteYear

    ,QuoteQtr

    ,QuoteMonth

    ,QuoteWeek

    ,Company

    ,TickerDate

    GO

    ```

    Listing 5-18

    Alcoa Ticker Symbol Analysis


    We want to set up a partition by year, quarter, month, week, and ticker symbol.
    For the low strike price, we order the partition by the `Low` column, and for
    the high strike price, we order the partition by the `High` column.


    A window frame is defined by


    ```sql

    ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING

    ```


    This logic will allow us to see the lows and highs for each day but also the minimums
    and maximums for each week.


    Copying and pasting the results into a Microsoft Excel spreadsheet yields a very
    interesting graph. Please refer to Figure [5-47](#527021_1_En_5_Chapter.xhtml#Fig56).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig56_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 4 columns
    for date, low, high, and spread. On the right screen, a line graph presents the
    Alcoa price history for 2013.


    Figure 5-47

    Alcoa low, high, and spread analysis for 2012


    The spread line at the bottom also shows the volatility of the prices for this
    financial instrument. By the way, I made up all these prices, so they do not represent
    actual performance for Alcoa.


    ### More Non-statistical Variance


    What if we want to see the distance between two specific points of values, like
    if we want to compare current account balances vs. target account performance
    balances? Did we meet our targets or fall short? Nothing like a visual to point
    out this information. The following examples will not use the `VAR()` and `VARP()`,
    which calculate statistical variance. We want to use the results to graph the
    distance between each pair of actual vs. projected values the old-fashioned way.


    This technique together with the use of the `VAR()` and `VARP()` functions from
    earlier examples will deliver to the business analyst a powerful set of reports
    and graphs to measure portfolio and account performance.


    First, we need to set up the test. We will create a table called `AccountVersusTarget`
    and populate it with some test actual vs. forecast balances (also made up).


    Please refer to Listing [5-19](#527021_1_En_5_Chapter.xhtml#PC48).


    ```sql

    TRUNCATE TABLE [Financial].[AccountVersusTarget]

    GO

    INSERT INTO [Financial].[AccountVersusTarget]

    SELECT [CustId]

    ,[PrtfNo]

    ,[AcctNo]

    ,[AcctName]

    ,[AcctTypeCode]

    ,[AcctBalance]

    ,[PostDate]

    ,CASE

    WHEN [AcctBalance] < 0 THEN (ABS([AcctBalance]) * 1.05)

    WHEN [AcctBalance] BETWEEN 500 AND 1000 THEN [AcctBalance] * 1.25

    WHEN [AcctBalance] BETWEEN 1001 AND 2000 THEN [AcctBalance] * 1.20

    WHEN [AcctBalance] BETWEEN 2001 AND 3000 THEN [AcctBalance] * 1.15

    WHEN [AcctBalance] BETWEEN 3001 AND 4000 THEN [AcctBalance] * 1.10

