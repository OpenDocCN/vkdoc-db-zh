- fmt: '### Performance Considerations


    Time for our performance analysis session for this query. As usual, let’s first
    create a baseline estimated `execution plan`.


    Please refer to Figure [9-17](#527021_1_En_9_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig17_HTML.png)


    A screenshot depicts the `execution plan`. The arrows point towards the sort cost
    equal to 16 percent, nested loop cost equal to 16 percent, sort cost equal to
    19 percent, table scan equal to 34 percent, and index seek cost equal to 16 percent.


    Figure 9-17: `RANK()` vs. `DENSE_RANK()` estimated `execution plan`


    We have an index seek on the `report` table with a cost of 16%, but the `JOIN`
    clause to the `Calendar` dimension is causing problems.


    We see a table scan with a cost of 34% and a sort task with a cost of 19%.


    Both streams are merged with a nested loops (`inner join`) task at a cost of 10%
    followed by a sort task with a cost of 16%. That inline table was not a good solution
    from a performance perspective. This is where I went wrong!


    Let’s see what the `IO` and `TIME` statistics tell us.


    Please refer to Figure [9-18](#527021_1_En_9_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig18_HTML.png)


    A screenshot of the `sql` work area. The upper half of the window presents the
    codes to display the month name respective to the calendar entry. The lower half
    depicts the messages. The arrow points towards the logical reads 0 and 24, physical
    reads 0, and read-ahead reads 24.


    Figure 9-18: `RANK()` vs. `DENSE_RANK()` `IO` and `TIME` statistics


    What we can see is that for the work table, all values are 0 so we will not worry
    about them.


    For our `report` table, the `EquipmentMonthlyOnLineStatus` table, we see a scan
    count of 12; logical reads chime in at 48 and physical reads at 1.


    Lastly, the `Calendar` dimension table incurs 1 scan count, 24 logical reads,
    and 24 read-ahead reads. This is one performance issue we might want to address.


    Why not use the `CASE` block in the `SELECT` clause of the query instead of the
    inline table? The `JOIN` to the `Calendar` dimension makes no sense. Bad coding!
    Let’s see a better solution.


    Please refer to Listing [9-7](#527021_1_En_9_Chapter.xhtml#PC7).


    ```sql

    SELECT

    EMOLS.PlantName

    ,EMOLS.LocationName

    ,EMOLS.ReportYear

    ,CASE

    WHEN EMOLS.[MonthName] = ''Jan'' THEN ''Qtr 1''

    WHEN EMOLS.[MonthName] = ''Feb'' THEN ''Qtr 1''

    WHEN EMOLS.[MonthName] = ''Mar'' THEN ''Qtr 1''

    WHEN EMOLS.[MonthName] = ''Apr'' THEN ''Qtr 2''

    WHEN EMOLS.[MonthName] = ''May'' THEN ''Qtr 2''

    WHEN EMOLS.[MonthName] = ''Jun'' THEN ''Qtr 2''

    WHEN EMOLS.[MonthName] = ''Jul'' THEN ''Qtr 3''

    WHEN EMOLS.[MonthName] = ''Aug'' THEN ''Qtr 3''

    WHEN EMOLS.[MonthName] = ''Sep'' THEN ''Qtr 3''

    WHEN EMOLS.[MonthName] = ''Oct'' THEN ''Qtr 4''

    WHEN EMOLS.[MonthName] = ''Nov'' THEN ''Qtr 4''

    WHEN EMOLS.[MonthName] = ''Dec'' THEN ''Qtr 4''

    END AS CalendarMonthName

    ,EMOLS.[MonthName] AS ReportMonth

    ,EMOLS.StatusCount

    ,EMOLS.EquipOnlineStatusCode

    ,EMOLS.EquipOnLineStatusDesc

    -- skips next value in sequence in case of ties

    ,RANK()  OVER (

    PARTITION BY EMOLS.PlantName,EMOLS.LocationName,EMOLS.ReportYear,

    EMOLS.EquipOnlineStatusCode

    ORDER BY StatusCount DESC

    ) AS FailureRank

    -- preserves sequence even with ties

    ,DENSE_RANK()  OVER (

    PARTITION BY EMOLS.PlantName,EMOLS.LocationName,EMOLS.ReportYear,

    EMOLS.EquipOnlineStatusCode

    ORDER BY EMOLS.StatusCount DESC

    ) AS FailureDenseRank

    FROM Reports.EquipmentMonthlyOnLineStatus EMOLS

    WHERE EMOLS.ReportYear = 2002

    AND EMOLS.EquipmentId = ''P1L1VLV1''

    GO

    ```


    Listing 9-7: A Better Solution


    We modified the query by taking out the inline table, which eliminated the `JOIN`
    operation. The `CASE` block was added so we can determine the quarter based on
    the month we are in. Let’s run a new estimated query plan and compare it with
    the old one generated by the original query.


    Please refer to Figure [9-19](#527021_1_En_9_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig19_HTML.png)


    A screenshot of 2 execution plans. The main screen depicts the two execution plans.
    The arrows indicate the cost and compare them between the old and the new query.


    Figure 9-19: Comparing query plans


    The new scheme shows significant improvement and simplification of the query plan.
    The `Calendar` dimension branch of the execution tree is gone. Our index seek,
    though, went up from 16% to 22%, and the first sort step went way up from 19%
    to 78%. The last sort step was eliminated. We need to compare `IO` and `TIME`
    statistics between both strategies.


    Please refer to Figure [9-20](#527021_1_En_9_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig20_HTML.png)


    A screenshot of 2 messages. The main window is divided into two smaller windows
    titled messages. The arrow indicates the elapsed times, logical reads, physical
    reads, and read-ahead reads.


    Figure 9-20: Comparing `IO` and `TIME` statistics between both strategies


    Let’s compare the statistics:


    `SQL Server parse and compile times` went from 95 ms (old query) to 153 ms (worse).


    `SQL Server execution times` went from 47 ms (old query) down to 21 ms (good improvement).


    On the `report` table, the scan count went from 12 (old query) to 1 (good improvement).


    On the `report` table, the logical reads went from 48 (old query) to 4 (good improvement).


    On the `report` table, the read-ahead reads went from 24 (old query) to 8 (good
    improvement).


    So it looks like the new strategy works better for us, in terms of performance,
    than the old query with the inline table.


    Not only was the original code a bad design but we were able to bypass the issue
    that the `Calendar` dimension only has numbers for the months and quarters, no
    names. This dimension should be enhanced to include these names.


    Looks like a `CASE` statement is better than a `JOIN` against an inline table
    that retrieves data from the `Calendar` dimension table'
