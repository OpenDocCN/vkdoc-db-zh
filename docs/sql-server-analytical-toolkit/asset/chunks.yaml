    ### Performance Considerations


    This will be a large plan as we are using the `LAG()` function four times, three
    times to generate the prior month, quarter, and year values plus once in a calculation
    to show the differences between this month and last month.


    I will leave it up to you to modify the query, so it shows the quarterly deltas
    and yearly deltas also and percent delta for each span of dates. Queries that
    perform calculations in the `SELECT` clause are very performance intensive, so
    check out the estimated query plans and `IO` and `TIME` statistics.


