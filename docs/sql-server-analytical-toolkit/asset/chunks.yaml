- fmt: '## LAG( ) Function


    Let’s start with the `LAG()` function first. Our analyst sends us the following
    specifications for a report:


    I would like to see this month’s and last month’s account balances in the same
    report. The results need to be grouped by year, month, customer identifier, portfolio
    number, and account number and name. Results need to be for the years greater
    than or equal to 2013. Lastly, I would like to see the difference between the
    current month’s and last month’s values in order to see if balances increased
    or decreased.


    We are using the same `CTE` as the prior example so I will not repeat it in the
    listing. This could be a good candidate for converting the `CTE` to a report table
    loaded, let’s say, once a month. We will see. Please refer to Listing [7-5](#527021_1_En_7_Chapter.xhtml#PC9).


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    ) AS LastMonthBalance

    ,AcctBalance -

    (

    LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    )

    ) AS Change

    FROM MonthlyAccountBalances

    WHERE AcctYear >= 2013

    GO

    ```

    Listing 7-5

    Using `LAG()` to Calculate Last Month’s Balances


    The `LAG()` function uses an `OVER()` clause that contains a `PARTITION BY` clause
    and an `ORDER BY` clause. Partitions are defined by customer, year, and account
    name. The result set of the partition is sorted by account month in ascending
    order. There’s the `WHERE` clause that filters the results by year greater than
    or equal to 2013.


    Please refer to the partial results in Figure [7-12](#527021_1_En_7_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig13_HTML.jpg)


    A screenshot of the S S M S window. It has a table of 10 columns and 181 rows.
    The column headers are customer I D, account year, account month, portfolio number,
    account number, account balance, last month balance, and change. 2 arrows point
    to account balances of rows 1 and 2.


    Figure 7-12


    Account balances for current-month and last-month analysis


    The report works correctly. We see the current and prior month’s balances and
    the difference between the balances. Let’s place these results, for cash accounts
    only and for the year 2013, into a Microsoft Excel spreadsheet chart.


    Please refer to the Excel chart screenshot in Figure [7-13](#527021_1_En_7_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig14_HTML.png)


    A screenshot of the M S Excel window. It has a table of 4 columns and 13 rows.
    The column headers are month, balance, prior month, and change. It has a line
    graph of balance versus month with 3 fluctuating horizontal lines for balance,
    prior month, and change. The prior month curve rises initially.


    Figure 7-13


    Account balances for current-month and last-month analysis chart


    Visually we can see that this account remained constant at around $35,000 each
    month after an initial jump. There seems to be a slight trend upward in the balances,
    and the changes each month were between minus $5000 and plus $5000 (approximately).


    For one last item, to see the values as rolling values across all years, modify
    the `OVER()` clause with the following code snippet:


    ```sql

    ,LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctName

    ORDER BY CustId,AcctYear,AcctMonth,AcctName

    ) AS LastMonthBalance

    ,AcctBalance -

    (

    LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctName

    ORDER BY CustId,AcctYear,AcctMonth,AcctName

    )

    ) AS Change

    ```


    There are slight modifications to the `PARTITION BY` and `ORDER BY` clauses you
    need to make.


    Here comes a question:


    Referring to the preceding code snippet, is the way that the account balance difference
    between the current account balance and the last month’s account balance is calculated
    efficient, or will it negatively affect performance?


    Let’s see.


    ## Performance Considerations


    Let’s generate the baseline estimated execution plan in the usual manner, from
    the query selection in the menu bar or the estimated execution plan icon, whichever
    method you like.


    Please refer to Figure [7-14](#527021_1_En_7_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig15_HTML.png)


    A screenshot of the S S M S window. It presents a baseline estimated execution
    plan with 9 components. The components are window spool, segment, compute scalar,
    sequence project, segment, stream aggregate, sort, compute scalar, and table scan.


    Figure 7-14


    Baseline estimated execution plan for the `LAG()` query


    Reading right to left, we are off to a good start. We see an index scan at 11%
    cost, but then we see an expensive sort at 84%. The compute scalar task between
    the two is for pulling out the year and month from the `PostDate` column. The
    sorting task is for the `GROUP BY` clause in the `CTE`.


    Let’s try the reporting table approach. I used the `CTE` query to create a reporting
    table in a new schema called `FinancialReports.` Also, we will create two indexes:
    one is a clustered index, and one is a non-clustered index.


    Please refer to Listing [7-6](#527021_1_En_7_Chapter.xhtml#PC11).


    ```sql

    CREATE SCHEMA FinancialReports

    GO

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,SUM(AcctBalance) AS AcctBalance

    INTO FinancialReports.AccountClustered

    FROM Financial.Account

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    GO

    ```

    Listing 7-6

    Creating the Account Monthly Balances Report Table


    This batch script uses the `SELECT/INTO` command to create the table on the fly.
    The chapter script code includes the truncate/load table with the `INSERT` command.


    Listing [7-7](#527021_1_En_7_Chapter.xhtml#PC12) is the two indexes that will
    hopefully help eliminate the expensive sort step in the plan.


    ```sql

    CREATE CLUSTERED INDEX ieYearMonthCustIdPrtfNoAcctNoAcctName

    ON FinancialReports.AccountClustered (

    [AcctYear],[AcctMonth],[CustId],[PrtfNo],[AcctNo],[AcctBalance]

    )

    GO

    CREATE INDEX ieCustIdAcctYearAcctMonthAcctNameAcctName

    ON FinancialReports.AccountClustered (

    [CustId],[AcctYear],[AcctName],[AcctMonth]

    )

    GO

    ```

    Listing 7-7

    Creating the Clustered and Non-clustered Indexes


    Listing [7-8](#527021_1_En_7_Chapter.xhtml#PC13) is the modified query so it accesses
    the new report table. Results are the same, so I will not show the output screenshot
    (always check when you do modifications – you never know).


    ```sql

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    ) AS LastMonthBalance

    ,AcctBalance -

    (

    LAG(AcctBalance) OVER (

    PARTITION BY CustId,AcctYear,AcctName

    ORDER BY AcctMonth

    )

    ) AS Change

    FROM FinancialReports.AccountClustered

    WHERE AcctYear >= 2013

    GO

    ```

    Listing 7-8

    Using the Account Report Table with Clustered and Non-clustered Indexes


    Let’s compare the query plans for the original query and the report table version.


    Please refer to Figure [7-15](#527021_1_En_7_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_7_Chapter/527021_1_En_7_Fig16_HTML.png)


    A screenshot of the S S M S window. It presents C T E query and report table query
    plans with 13 and 10 components. The costs of compute scalar, stream aggregate,
    window spool, sequence project, and segment are 0%, 1%, 3%, 0%, and 0%, and 1%,
    4%, 15%, 4%, and 1% for C T E and report table query.


    Figure 7-15


    CTE query vs. report table query plans


    The compute scalar (0%), sort (84%), and stream aggregate (1%) tasks in the top
    original estimated query plan were eliminated in the new plan with the new report
    table. Having fewer steps is good!'
