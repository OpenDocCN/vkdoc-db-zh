    ## SSRS 服务器与网站


    安装 SQL Server 开发人员版时，SSRS 也随之安装。现在，您需要下载一个单独的安装程序来安装最新版本的 SSRS。安装后，SSRS 允许您向用户交付基于
    Web 的报告，例如图 14-13 中的示例，这是我们创建的样本报告之一。


    ![](img/527021_1_En_14_Fig13_HTML.jpg)

    一个 SSRS 窗口的截图。它展示了一个包含 11 列和 15 行的表格。列标题为：Inv year、Inv quarter name、Inv month
    name、location ID、Warehouse ID、product type、Product ID、monthly sum quantity on
    hand、prior month sum、prior quarter sum 和 prior year sum。

    图 14-13

    SSRS 报告


    一旦您通过 Visual Studio Community 中的 `EXTENSION` 菜单选择下载并安装了 SSRS 项目模板组件后，您需要在发布报告之前下载、安装并配置
    SSRS 服务器。您可以从 Microsoft 下载站点下载 SSRS 安装程序：

    `www.microsoft.com/en-us/download/details.aspx?id=100122`


    运行可执行文件并按照引导安装步骤操作。最后，您可以启动配置工具。此工具也会添加到您的 Windows 桌面，因此您可以随时返回进行微调。请参考图 14-14。


    ![](img/527021_1_En_14_Fig14_HTML.png)

    一个 Report Server Configuration Manager 窗口的截图。左侧的连接面板有 11 个选项，其中选中了 Web Service
    URL。右侧面板显示 Web Service URL。它包含虚拟目录、IP 地址、TCP 端口、HTTPS 证书和端口的输入框。

    图 14-14

    配置 SSRS


    配置 SSRS 很直接。大部分情况下，您只需接受所有默认参数。如截图所示，左侧包含一个带有各种选项的面板。我们看到选中了 Web Server URL 面板，它向您显示了默认参数。


    唯一需要您做一些工作的是数据库选择，您需要在其中定义将用于存储报告服务器和报告配置数据以及报告数据的数据库。大多数情况下，您只需提供一些名称，单击“确定”，然后看着它运行并构建数据库。


    如果您对设置感到有点紧张，请查阅一些讨论安装和配置 SSRS 的网站。这很容易。显然，在创建报告之前，请先执行此设置。


    ## 报告生成器


    我们在几个章节中使用此工具创建了一些简单的报告。过程很简单。选择向导会指导您，不知不觉中，您就得到了一份从数据库中提取数据的报告。请参考图 14-15。


    ![](img/527021_1_En_14_Fig15_HTML.jpg)

    一个 Report Builder 窗口的截图。左侧面板显示包含 5 个文件夹的报告数据，右侧面板显示参数。一个 Group Properties 弹出对话框左侧有
    7 个选项，其中选中了 sorting。右侧面板显示更改排序选项。

    图 14-15

    报告生成器设计面板


    我们只触及了这个报告设计的皮毛。您可以创建包含图表和记分卡的报告，其中包含像显示关键信息的仪表这样的可视化元素，也可以创建可以向下钻取到任意多级详细信息的报告。这个工具也是免费的，所以没有理由不下载、安装并学习如何使用它。


    从向导开始，不知不觉中，您就能从头开始创建带有过滤器、图表和向下钻取功能的报告。


    ## 性能分析工具


    我相信这是您最喜欢的用于执行性能分析和增强的工具。我们使用此工具创建了估计执行计划，也创建了实时执行计划，这些计划向我们展示了 SQL Server 查询引擎执行查询所采取的步骤，以及任务之间传递了多少数据。


    ### 估计查询计划


    请参考图 14-16。


    ![](img/527021_1_En_14_Fig16_HTML.png)

    一个 SSMS 窗口的截图。它展示了一个包含 10 个组件的估计查询计划。选中了 Compute scalar，它打开一个弹出对话框。它展示了 12 个元素的详细信息，例如物理和逻辑操作、估计执行模式和运算符成本。下方是输出列表。

    图 14-16

    典型的估计查询计划


    这个可视化效果很棒，通过将鼠标悬停在任何任务上，您都可以看到涉及的详细信息。此工具与 `IO`、`TIME` 和 `PROFILE` 统计信息结合使用非常强大，使我们能够评估性能并制定一些调优策略。


    它的“兄弟”——实时查询计划，将性能分析更进一步。


    ### 实时查询计划


    请参考图 14-17。


    ![](img/527021_1_En_14_Fig17_HTML.png)

    一个 SSMS 窗口的截图。它展示了一个包含 11 个组件的实时查询计划。这些组件是 nested loops、table spool、segment、compute
    scalar、compute scalar、stream aggregate、sort、nested loops、stream aggregate、table
    spool 和 table spool。

    图 14-17

    实时查询计划


    这与估计查询计划工具类似，但我们可以看到在每个任务之间传递的实际行数。如果数据量足够大，并且查询需要运行几分钟，您可以看到这些值动态变化。


    请确保两个计划中显示的估计成本接近；否则，可能存在严重问题，需要调查。


    ### DBCC


    我们使用这个简单但重要的工具来清除查询用于存储数据和计划的内存缓存。每次需要进行性能分析时，请先运行此命令，以便清除缓存并获得准确的一组统计信息。请参考代码清单
    14-1。


    ```

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    ```

    代码清单 14-1

    运行 DBCC


    如果不运行此工具，数据和计划信息将存储在内存中，因此您正在分析的查询的后续运行将返回不正确的结果（就 `IO` 和 `TIME` 统计信息而言），因为该查询利用了内存中的数据和查询信息。


    ### IO 和 TIME 统计信息


    在我们的性能调优会话中，我们多次依赖这组统计信息。它们告诉我们发生了多少操作，例如磁盘扫描和物理读取，以及查询解析和运行所需的时间。


    注意

    解析步骤是查询引擎确保语法正确并知道需要检索的数据位置所在的时候。还会创建称为解析树的对象。这就是当我们查看计划时估计查询计划工具所显示的内容。请参考代码清单
    14-2。


    ```

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```

    代码清单 14-2

    开启 IO 和 TIME 统计信息


    在运行 `DBCC` 后运行这些命令以开启统计信息，然后执行查询。当您完成并希望停止显示统计信息时，将 `ON` 更改为 `OFF`。请参考图 14-18。


    ![](img/527021_1_En_14_Fig18_HTML.png)

    一个 SSMS 窗口的截图。左侧面板展示了对象资源管理器。右侧面板有代码以及 IO 和 TIME 统计信息。CPU 和已用时间的解析与编译时间均为 8 毫秒。CPU
    和已用时间的执行时间均为 0 毫秒。影响了 12 行。

    图 14-18

    IO 和 TIME 统计信息


    我知道您记得这些。如果所有查询都在 0 毫秒内运行，那不是很好吗？

    '
- fmt: '### STATISTICS PROFILE


    有时你需要深入了解查询计划任务中发生了什么。这组统计信息提供的信息类似于 `IO` 和 `TIME` 统计，但它还会显示生成这些统计信息的代码段。


    开启这些统计信息很简单。


    请参考清单 [14-3](#527021_1_En_14_Chapter.xhtml#PC4)。


    ```sql

    SET STATISTICS PROFILE ON

    GO

    SET STATISTICS PROFILE OFF

    GO

    ```

    *清单 14-3*

    *设置 STATISTICS PROFILE ON*


    你可以在设置其他统计信息之后将这些设置为 `ON`，或者单独运行它们。确保在会话结束时将它们全部关闭 `OFF`，因为它们也会消耗资源。


    请参考图 [14-19](#527021_1_En_14_Chapter.xhtml#Fig19)。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig19_HTML.png](images/527021_1_En_14_Chapter/527021_1_En_14_Fig19_HTML.png)

    *图 14-19*

    *STATISTICS PROFILE 报告*


    回忆一下这些信息有多详细。以下是显示窗口假脱机任务中发生了什么的语句文本：


    ```sql

    --Window Spool(

    RANGE BETWEEN:(UNBOUNDED, [[APInventory].[Product].[Warehouse].[AsOfMonth]]

    )

    )

    ```


    好了，我们的回顾到此结束。那么，我们如何获得所有这些好用的工具呢？


    ## 如何获取工具


    你可以通过网页搜索找到这些工具中的大部分，搜索结果会指向正确的 Microsoft 网页。请仅从 Microsoft 获取这些免费工具，并阅读许可要求！


    ### SQL Server Developer


    截至撰写本文时，你可以从这里获取最新版 SQL Server（如 SQL Server 2022）的开发者许可证。


    请参考图 [14-20](#527021_1_En_14_Chapter.xhtml#Fig20)。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig20_HTML.png](images/527021_1_En_14_Chapter/527021_1_En_14_Fig20_HTML.png)

    *图 14-20*

    *下载 SQL Server Developer Edition*


    确保你下载的是开发者许可证。


    截至撰写本文时，网址是：


    `www.microsoft.com/en-us/sql-server/sql-server-downloads`


    SQL Server 2019 也可用，还有一个称为 SQL Server Express 的轻量版。


    我建议你下载 SQL Server 2022，因为它有许多新特性以及新的窗口函数，例如 `APPROX_PERCENTILE_CONT()` 和 `APPROX_PERCENTILE_DISC()`。


    ### Visual Studio Community


    你需要先下载并安装这个，然后才能安装包含 SSMS 以及 SSAS、SSRS 和 SSIS 项目模板支持的数据工具。


    请参考图 [14-21](#527021_1_En_14_Chapter.xhtml#Fig21)。


    ![images/527021_1_En_14_Chapter/527021_1_En_14_Fig21_HTML.png](images/527021_1_En_14_Chapter/527021_1_En_14_Fig21_HTML.png)

    *图 14-21*

    *Visual Studio Community*


    截至撰写本文时，网址是：


    `https://visualstudio.microsoft.com/vs/community/`


    下载并安装它。这需要一些时间。让安装过程开始，并确保手边有杯咖啡。你的耐心将得到一个强大开发环境的回报。


    ### SQL Server Data Tools


    这可以作为一个工作负载通过 Visual Studio Installer 下载。


    当你安装 Visual Studio Community 许可证时，安装程序会出现在你的 Windows 菜单中。


    请参考图 [14-22](#527021_1_En_14_Chapter.xhtml#Fig22)。


