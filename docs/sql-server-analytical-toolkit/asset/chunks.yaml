    Let’s make sure the query works and check out the results. Then we can look at
    performance analysis and tuning.


    Please refer to Figure [12-12](#527021_1_En_12_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig12_HTML.jpg)


    A screenshot of c h 12 ranking query s q l window. It presents the results in
    an 8-column table for inventory year, inventory month, location I d, Inventory
    I d, warehouse I D, Product I d, Items remaining, and alert messages. The first
    3 values of negative 13 in items remaining is highlighted.


    Figure 12-12


    Assigning reorder priorities


    Looks like it works. We see three products, P113, P037, and P033, that have –13
    items remaining. That means that 13 orders are back-ordered because of no stock
    in inventory. So the logic works, and our warehouse manager is pulling out their
    hair! Not a good thing.


    Let’s see how this query behaves.'
  trans: '

    ### NTILE() 函数


    还记得这个函数的定义吗？`NTILE()` 函数允许你将数据集中的一行行数据划分为若干个数据块或桶（我更喜欢这个说法）。如果你有一个包含 12 行的数据集，并且希望分配四个数据块，那么每个数据块将包含三行。如果你有一个包含
    13 行的数据集，并希望分成四个数据块，那么最后一个数据块将比其他块拥有更多的行。这无法控制。


    无论如何，当你想要创建数据桶以分析库存水平，从而对需要优先重新订购的产品进行分类和排序时，这个函数就派上用场了。


    **注意**


    如果你的行数是奇数，比如 15 行，并且你决定创建四个数据块，你会得到分别包含四行、四行、四行和三个行的数据块。因此，无法控制什么数据进入哪个数据块；它只是进行划分。


    让我们查看一下我们友好的业务分析师提交的业务需求：


    我们的业务分析师希望建立一个分类方案，以便在库存需要按优先级补货时收到警报。该报告需要打印出以下消息，同时包含年份、月份、地点、库存、仓库以及当然还有剩余产品：


    *   桶 1：优先订购 高优先级警报

    *   桶 2：优先订购 次高优先级警报

    *   桶 3：优先订购 第三优先级警报

    *   桶 4：优先订购 第四中等优先级警报

    *   桶 5：优先订购 第五低优先级警报


    分析师希望首先为年份 "2005"、地点 "LOC1"、库存 "INV1" 和仓库 "WH111" 生成一份报告。需要包含所有产品（为了节省空间，我没有使用实际名称，但用户很可能希望看到名称，而不仅仅是代码）。


    以下是我们为满足此需求设计的方案。请参考清单 12-5。


    ```sql

    WITH InventoryReOrderAlert (

    InventoryYear,InventoryMonth,LocId,InvId,WhId,ProdId,ItemsRemaining

    )

    AS

    (

    SELECT YEAR(MovementDate)  AS InventoryYear

    ,MONTH(MovementDate) AS InventoryMonth

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    ,SUM(IT.Increment - IT.Decrement) AS ItemsRemaining

    FROM APInventory.Product.InventoryTransaction IT

    GROUP BY YEAR(MovementDate)

    ,MONTH(MovementDate)

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    )

    SELECT

    InventoryYear

    ,InventoryMonth

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,ItemsRemaining

    ,CASE

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 1 THEN ''Order First High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 2 THEN ''Order Second High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 3 THEN ''Order Third High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 4 THEN ''Order Fourth, Medium Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 5 THEN ''Order Fifth Low Priority Alert''

    END AS AlertMessage

    FROM InventoryReOrderAlert

    WHERE InventoryYear = 2005

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    ORDER BY InventoryMonth

    GO

    ```

    清单 12-5 设置重新订购优先级警报


    我们再次使用了 `CTE` 方法，并且基于我们之前的分析，我们知道在对此查询执行调优分析时会有什么预期。与之前的查询一样，我们使用 `WHERE` 子句来过滤结果，以便我们可以在少量数据上进行分析和调试（如果需要）。


    我们的重点是 `SELECT` 语句中的 `CASE` 块：


    ```sql

    ,CASE

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 1 THEN ''Order First High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 2 THEN ''Order Second High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 3 THEN ''Order Third High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 4 THEN ''Order Fourth, Medium Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 5 THEN ''Order Fifth Low Priority Alert''

    END AS AlertMessage

    ```


    哇，这个 `CASE` 块调用了五次 `NTILE()` 函数。就预估的查询性能计划而言，这应该会很有趣。


    让我们先确保查询有效并查看结果。然后我们可以进行性能分析和调优。


    请参考图 12-12。


    ![一张第 12 章排名查询 SQL 窗口的截图。它以一个 8 列的表格形式呈现结果，包括库存年份、库存月份、地点 ID、库存 ID、仓库 ID、产品 ID、剩余物品和警报消息。剩余物品中前三个负
    13 的值被高亮显示。](img/527021_1_En_12_Fig12_HTML.jpg)

    图 12-12 分配重新订购优先级


    看起来它起作用了。我们看到有三个产品，P113、P037 和 P033，剩余物品数为 -13。这意味着有 13 个订单因为库存无货而延期交付。所以逻辑是有效的，而我们的仓库经理正在抓狂！这可不妙。


    让我们看看这个查询的表现如何。

    '
- fmt: '### Performance Considerations


    Let’s begin by generating our baseline execution plan.


    Please refer to Figure [12-13](#527021_1_En_12_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig13_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the message of
    the execution plan for query cost. Arrows point to sort cost 2%, hash match cost
    12%, compute scalar cost 9%, and the index seek cost 75%.


    Figure 12-13


    Baseline estimated execution plan for the NTILE report


    No indexes were identified as missing, so we are off to a good start. Starting
    at the upper right-hand side in the plan, we see an index seek at 75% cost followed
    by a compute scalar at 9% and a hash match at 12%. Next is a sort at 2% cost (I
    am ignoring 0% cost tasks for our discussion).


    Our lower-branch costs are all 0%. Amazingly enough the nested loops join task
    that merges both branches is also 0%. All the way at the left-hand side we see
    a sort task at 2%.


    #### Note


    Merge joins are better than nested loops joins. With a nested loops join task,
    for each row in the outer table, all rows in the inner table need to be scanned.
    Merge joins line them up so you do not have to scan all rows to search for matches!
    That’s why you need indexes to help the seeks and scans.


    #### Conclusion


    This is a well-performing query so let’s leave it alone. But curiosity got the
    better of me. Let’s pop the `CTE` logic into an `INSERT/SELECT` query so we can
    load a report table. Listing [12-6](#527021_1_En_12_Chapter.xhtml#PC8) is the
    `CREATE DDL` statement for the table followed by the code to load it.


    ```sql

    USE APInventory

    GO

    DROP SCHEMA IF EXISTS Reports

    GO

    CREATE SCHEMA Reports

    GO

    DROP TABLE IF EXISTS Reports.InventoryReOrderAlert

    GO

    CREATE TABLE Reports.InventoryReOrderAlert(

    InventoryYear int  NULL,

    InventoryMonth int NULL,

    LocId varchar(4)   NOT NULL,

    InvId varchar(4)   NOT NULL,

    WhId varchar(5)    NOT NULL,

    ProdId varchar(4)  NOT NULL,

    ItemsRemaining     int NULL

    ) ON AP_INVENTORY_FG

    GO

    INSERT INTO Reports.InventoryReOrderAlert

    SELECT YEAR(MovementDate) AS InventoryYear

    ,MONTH(MovementDate) AS InventoryMonth

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    ,SUM(IT.Increment - IT.Decrement) AS ItemsRemaining

    FROM APInventory.Product.InventoryTransaction IT

    GROUP BY YEAR(MovementDate)

    ,MONTH(MovementDate)

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    ORDER BY YEAR(MovementDate)

    ,MONTH(MovementDate)

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    GO

    ```

    Listing 12-6

    Report Table Replacing the CTE Logic


    I used the same name for the table as the name for the `CTE`. Notice I assigned
    it to the `Reports` schema. The code to load this table is just the `CTE` query
    that is now a part of an `INSERT/SELECT` command. You have seen these before.


    The base query does not change as I used the name of the `CTE` as the name of
    the new table, so let’s dive into the revised estimated query plan.


    Please refer to Figure [12-14](#527021_1_En_12_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig14_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the message of
    the execution plan for query cost. Arrows point to nested loops cost 2%, Sort
    cost 24%, and table scan cost 66%.


    Figure 12-14


    Baseline estimated query plan showing an index is needed


    As luck would have it, we need to create an index to support this strategy as
    we see a table scan with a cost of 66% and an expensive sort step at 24%. Let’s
    build the suggested index shown in Listing [12-7](#527021_1_En_12_Chapter.xhtml#PC9).


    ```sql

    CREATE NONCLUSTERED INDEX ieYearLocIdInvIdWhIdInventoryMonthProdIdItemsRemaining

    ON Reports.InventoryReOrderAlert (InventoryYear,LocId,InvId,WhId)

    INCLUDE (InventoryMonth,ProdId,ItemsRemaining)

    GO

    ```

    Listing 12-7

    Create DDL for the Suggested Index


    Long index name, I know, but it is descriptive.


    `SQL Server` states in the suggested index message that if we build this index
    the query cost will improve by 78.2161%. Not bad.


    Let’s create it and regenerate the estimated query plan.


    Please refer to Figure [12-15](#527021_1_En_12_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig15_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the message of
    the execution plan for query cost. Arrows point to sort cost 40%, nested loops
    cost 7%, Sort cost 40%, and index seek cost 11%.


    Figure 12-15


    Revised estimated execution plan


    The table scan was replaced by the index seek, but of course as we have seen many
    times before, the sorts went up and so did the nested loops join tasks. Might
    as well look at the `IO` and `TIME` statistics.


    Please refer to Figure [12-16](#527021_1_En_12_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig16_HTML.png)


    A screenshot of c h 12 ranking query s q l window. A sub-window presents 13 lines
    of programming code. The lower screen presents the message of the execution plan,
    and arrows point to logical reads 296, scan count 1, logical reads 3, physical
    reads 2, and elapsed time 82 milliseconds.


    Figure 12-16


    IO and TIME statistics for the modified query


    These look like good statistics. First of all, the query ran under 1 s at 82 ms.
    Very fast. The work table has a value of 3 for the scan count and 296 logical
    reads. The new report table also has a scan count of 1, 3 logical reads, and 2
    physical reads.


    I think we can state again that our report table strategy is a good way to go
    when data is historical. Let’s check out our last function, our friend the `ROW_NUMBER()`
    function.'
