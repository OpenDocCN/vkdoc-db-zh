    `SUM()` 聚合函数和 `COUNT()` 函数在查询中出现了两次。所有四种情况都使用了带有 `PARTITION BY` 子句和 `ORDER BY`
    子句的 `OVER()` 子句。分区由工厂名称、地点、年份和季度创建。分区按日历月份排序。包含 `CountFailureEvents` 和 `SumEquipmentFailure`
    列是为了展示滚动总计和滚动和是如何得出的。让我们看看结果。


    请参阅图 8-7。


    ![](img/527021_1_En_8_Fig7_HTML.png)


    图 8-7：报告查询结果


    检查框中的结果清楚地显示了滚动值相加正确。`COUNT()` 函数的结果在每个季度内重复。这个查询有点令人困惑，因为我们试图区分事件计数和故障总和，所以我选择让名称更具描述性。


    在这种情况下，通过查看原始的计数和总和来验证结果是很好的做法。清单 8-3 是一个可以实现此目的的查询。


    ```sql

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,Failure AS FailureEvent

    ,COUNT(Failure) AS SumEquipmentFailure

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.MonthName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,Failure

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    GO

    ```


    清单 8-3：验证计数和总和


    我修改了用于向 `Reports.EquipmentFailureStatistics` 表插入行的查询，并添加了日历日期和设备，以使其达到最低粒度。图 8-8
    是两个查询结果并排的部分比较，显示了计数和总和是如何累加的。


    ![](img/527021_1_En_8_Fig8_HTML.png)


    图 8-8：计数和故障总和的验证报告


    如图所示，一月份的故障总数为 8 (4 + 1 + 3)，这与原始报告中 `SumEquipmentFailure` 报告列下的值一致。如果你执行加法运算，二月和三月的情况也是如此。


    事件数量对应于日期，每天一个事件，因为我们没有将粒度降低到一天中的小时。因此，计数每天始终为一，而按季度的总和将是天数的总和。


    希望这个例子展示了计数和求和值与事件之间的语义差异。


    ### AVG( ) 函数


    接下来，我们使用 `AVG()` 函数，为东厂的熔炉房设备生成一些平均值。以下是分析师提交的业务需求：


    需要一份报告，显示按月、按季和按年的滚动平均值。报告应显示东厂熔炉房的结果。结果应按工厂、地点、年份、季度和月份分组。平均值应为月度设备故障率。


    在此报告中，我们不关心单个设备的故障率。最后，报告应参考 2002 和 2003 年（我们的最低粒度级别是按月）。


    看来我们需要使用 `AVG()` 函数三次，并为每个函数定义不同的分区。清单 8-4 是满足此请求的查询。


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,CalendarMonth

    ,SumEquipmentFailure

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear

    ORDER BY CalendarYear,CalendarMonth

    ) AS RollingAvgMon

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear,QuarterName

    ORDER BY CalendarYear

    ) AS RollingAvgQtr

    ,AVG(CONVERT(DECIMAL(10,2),[SumEquipmentFailure])) OVER (

    PARTITION BY CalendarYear

    ORDER BY CalendarYear

    ) AS RollingAvgYear

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND Plantname = ''East Plant''

    AND LocationName = ''Furnace Room''

    GO

    ```


    清单 8-4：按滚动月、季、年统计的工厂故障


    是的，三个 `OVER()` 子句中的每一个都有三个不同的 `PARTITION` 和 `ORDER BY` 子句。


    对于滚动月度故障，分区定义为日历年，并按年份和月份排序。


    对于滚动季度故障，分区定义为日历年和季度，并按年份和季度排序。


    最后，对于滚动年度故障，分区定义为日历年，并按日历年排序（注意不需要月份列）。这与第一个分区定义给出了完全不同的结果。


    尝试组合不同的条件看看结果。确保将结果复制并粘贴到 Excel 电子表格中进行验证。结果是否符合你的预期？


    请参阅图 8-9 中的部分结果。


    ![](img/527021_1_En_8_Fig9_HTML.png)


    图 8-9：按月、季、年统计的滚动设备故障


    图 8-10 是使用 Microsoft Excel 创建的图表，显示了三个滚动平均值和故障率。趋势似乎是下降的；故障越少越好！


    ![](img/527021_1_En_8_Fig10_HTML.png)


    图 8-10：月度、季度和年度滚动平均值


    可视化是让你对结果有一个整体概览的良好起点。查询生成的数值数据是详细的信息来源，你可以用它来进行更深入的分析。


    让我们继续分析，通过查看月度层面的最小和最大故障来构建故障事件画像，从而建立我们的故障报告。顺便说一句，这些数据可以用于一系列的 SSRS（SQL Server
    Reporting Services）Web 报告或 Power BI 仪表板中。这些都是值得考虑学习的工具！'
- fmt: '# MIN() and MAX() Functions


    ## Why do we want to build a profile of failures?


    Obviously, we want to know what equipment is failing, where it is failing, and
    how often. We want to determine if a piece of equipment is failing due to improper
    maintenance or environmental conditions, if the equipment is faulty, or if the
    wrong equipment was placed in a specific area or application. Or maybe all these!


    For example, is the equipment rated to operate in the temperatures of a specific
    plant location?


    We also want to know if a piece of equipment failed, like a motor or valve, and
    if it was fixed and after a few weeks or months it failed again. We want to know
    why. Plant maintenance procedures and staff also come into play. Did the equipment
    fail multiple times in a day? Were there multiple attempts to fix it?


    We want to get the best equipment; we want to aim for correct equipment installation
    and also the least number possible of failures. We also want a solid management
    program with knowledgeable technicians that can fix issues quickly. We want to
    answer these questions:


    *   How often did failures occur?

    *   How many attempts were made to fix the issue?

    *   Is the issue recurring?

    *   Is a single vendor providing faulty equipment?

    *   What is the root cause of the failures?


    This is why a good set of reports and graphs that give us a profile of failure
    statistics and events will help us achieve these goals and answers to the questions
    related to equipment failure. The aim is to identify and then reduce or even prevent
    entirely equipment failure.


    Our next report will deal with maximum and minimum failures for equipment for
    a specific time period. Here are the business requirements our analyst supplied
    for this profile report:


    Please provide a report that shows the rolling monthly minimum and maximum failure
    rates occurring in the furnace room for the East Plant. Let’s keep the report
    for this location as we want to see the high-level values first and then drill
    down to the equipment level.


    Please refer to Listing 8-5 for maximum and minimum failure statistics.


    ```sql

    SELECT PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,MonthName

    ,SumEquipmentFailure

    ,MIN(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS RollingMin

    ,MAX(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear,QuarterName

    ORDER BY CalendarMonth

    ) AS RollingMax

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND Plantname = ''East Plant''

    AND LocationName = ''Boiler Room''

    GO

    ```

    Listing 8-5: Rolling Monthly Maximum and Minimum Plant Failures


    This is a simple query that uses the same `OVER()` clause for both the `MIN()`
    and the `MAX()` function. The partition is set up by plant name, location name,
    year, and quarter. The `ORDER BY` clause is by year and month. The `WHERE` clause
    filters include the years 2002 and 2003 and of course the furnace room for the
    East Plant. Let’s see the results in Figure 8-11.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig11_HTML.jpg)

    Figure 8-11: Rolling monthly equipment failures for the East Plant


    We can see that the monthly rolling calculation is working, but we can see we
    have a lot of failures at this location. Is it one piece of equipment or more
    than one?


    Let’s run the following query in Listing 8-6 to narrow things down.


    ```sql

    SELECT EF.PlantName

    ,EF.LocationName

    ,EF.CalendarYear

    ,EF.QuarterName

    ,EF.MonthName

    ,EF.SumEquipmentFailure

    ,EF.EquipmentId

    ,E.EquipAbbrev

    ,MIN(EF.SumEquipmentFailure) OVER (

    PARTITION BY EF.PlantName,EF.LocationName,

    EF.CalendarYear,EF.QuarterName

    ORDER BY EF.CalendarMonth

    ) AS RollingMin

    ,MAX(EF.SumEquipmentFailure) OVER (

    PARTITION BY EF.PlantName,EF.LocationName,

    EF.CalendarYear,EF.QuarterName

    ORDER BY EF.CalendarMonth

    ) AS RollingMax

    FROM Reports.EquipmentFailureStatistics EF

    JOIN [DimTable].[Equipment] E

    ON EF.EquipmentId = E.EquipmentId

    WHERE EF.CalendarYear IN(2002,2003)

    AND EF.Plantname = ''East Plant''

    AND EF.LocationName = ''Furnace Room''

    GO

    ```

    Listing 8-6: Equipment Failure for the Furnace Room, East Plant


    The `MIN()` and `MAX()` functions are used with `OVER()` clauses that define partitions
    by plant name, location name, calendar year, and quarter. Partitions are ordered
    by calendar month.


    A `WHERE` clause is used to include data only for two years, for the East Plant
    and the furnace room.


    Please refer to Figure 8-12 for query results.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig12_HTML.png)

    Figure 8-12: Equipment failure listing


    Looks like equipment `P3L4MOT1` is the failing equipment. This is a motor and
    is a significant problem. As can be seen by the name, it is located in plant 3
    and location 4, and the name of the motor is `MOT1`. These are unacceptable numbers
    of failures each month. We need to see what days these failures occur on.


    Let’s create another query, this time at the equipment and date level of granularity.
    Please refer to Listing 8-7.


    ```sql

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarDate

    ,C.MonthName

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,E.EquipmentId

    ,E.EquipAbbrev

    ,M.ManufacturerName

    ,Failure AS FailureEvent

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN [DimTable].[Manufacturer] M

    ON E.ManufacturerKey = M.ManufacturerKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    WHERE P.PlantName = ''East Plant''

    AND L.LocationName = ''Furnace Room''

    AND C.CalendarYear = ''2002''

    AND C.MonthName = ''April''

    ORDER BY

    C.CalendarYear

    ,C.QuarterName

    ,C.CalendarMonth

    ,C.CalendarDate

    ,P.PlantName

    ,L.LocationName

    GO

    ```

    Listing 8-7: Equipment Failure by Date


    This query was modified from the original query we used to load the failure report
    table. The date and equipment ID fields were added to arrive at the lowest level
    of granularity. We could have made things even more interesting by recording the
    hours for each 24-hour-day period.


    In a real application, the analyst would examine all months at this level, but
    let’s limit our investigation to the month of April for the year 2002 so we can
    make sure our logic works.


    Executing this query yields the following report in Figure 8-13.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig13_HTML.png)

    Figure 8-13: `P3L4MOT1` equipment failure by date


    We now see that the motor equipment identifier `P3L4MOT1` failed on April 2 three
    times and April 11 four times. This motor was manufactured by the CITY ENGINEERING
    INDUSTRIAL MOTOR company. Now we are getting somewhere. We now need to determine
    why the motor failed on these dates. If you have not guessed already, this means
    another query. Please refer to Listing 8-8.'
