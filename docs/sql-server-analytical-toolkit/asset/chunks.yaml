    关于作者 关于技术审校者


    # 1. 分区、窗口帧与 OVER( ) 子句


    本章的目标是描述 `OVER()` 子句，其关于如何创建分区和窗口帧的各种配置，以及如何在分区中对数据进行排序，以便窗口函数可以对值进行操作。（`OVER()`
    子句与分区和窗口帧的结合，赋予了窗口函数强大的能力。）


    我们将介绍窗口帧以及它们是如何定义的，以呈现一组由窗口函数处理的分区行。


    我们将通过几个图表来说明这些概念，然后展示几个示例，说明分区和窗口帧如何使用窗口函数在真实数据集上以各种方式工作。我们将讨论 `ROWS` 和 `RANGE`
    子句，以及它们如何在分区中操作数据。


    我们还将看一个案例，其中我们在 `ORDER BY` 子句中使用子查询而不是列，以消除查询计划中昂贵的排序步骤。


    最后提供一个简短的示例，展示 SQL Server 2022 中新的命名窗口功能。


    ## 什么是分区和窗口帧？


    一个 `TSQL` 查询将生成一个初始的数据结果集。该结果集可以被划分为称为分区的部分，例如，按特定年份为每组行设置一个分区。窗口帧就像分区中一个更小的窗口，由某些行边界或范围定义，例如，当前正在处理的行之前及包括当前行的所有行，或分区内当前行之后及包括当前行的所有行。整个数据集本身也可以作为一个分区，并且可以定义一个使用该单一分区内所有行的窗口。这完全取决于你如何包含和定义
    `PARTITION BY`、`ORDER BY` 和 `ROWS/RANGE` 窗口帧子句。


    这些条件可以通过 `OVER()` 子句来指定。让我们看看这是如何工作的。


    ## 什么是 OVER( ) 子句？


    如前所述，`OVER()` 子句允许你在查询生成的数据集中创建分区和窗口。它允许你将数据集划分为称为分区的部分。窗口允许你控制窗口函数的应用方式，即它们将操作哪些数据。


    可以创建更小的窗口，称为窗口帧，使用 `ROWS` 和 `RANGE` 帧子句，在 `PARTITION BY` 子句定义的大窗口内进一步划分。这些窗口根据
    `OVER()` 子句中包含的 `ROWS` 和 `RANGE` 帧规范所定义的边界而增长或移动（随着行的处理）。你还可以通过 `ORDER BY` 子句指定行的排序方式，以便窗口函数处理它们。


    这种能力允许你创建诸如三个月滚动平均值、年初至今、季末至今和月末至今总计等查询。我们将在本书中讨论的每个函数都可以以这种方式利用 `OVER()` 子句。


    这就是为什么它们被称为窗口函数！


    ## OVER( ) 子句和窗口函数的历史


    以下是窗口函数的简要历史：


    *   不带 `ORDER BY` 子句支持的聚合/排名窗口函数于 2005 年引入。

    *   七年后，支持 `ORDER BY` 子句的聚合函数于 2012 年引入。

    *   对窗口帧的支持（我们稍后将讨论）也在 2012 年引入。

    *   排名函数和一些窗口功能于 2015 年引入。

    *   批处理模式窗口聚合运算符于 2016 年引入。

    *   `STRING_AGG` 函数于 2017 年引入。

    *   命名 `WINDOW` 功能在 SQL Server 2022 中引入。


    多年来，窗口函数的能力不断增长，提供了一套丰富而强大的工具来分析和解决复杂的数据分析问题。


    ## 窗口函数


    可以与 `OVER()` 子句一起使用的窗口函数（这是本书的重点）被分为三类，列于表 [1-1](#527021_1_En_1_Chapter.xhtml#Tab1)
    中。


    表 1-1


    聚合、分析和排名函数


    | 聚合函数 | 分析函数 | 排名函数 |

    | --- | --- | --- |

    | ``COUNT( )`` | ``CUME_DIST( )`` | ``RANK( )`` |

    | ``COUNT_BIG( )`` | ``FIRST_VALUE( )`` | ``DENSE_RANK( )`` |

    | ``SUM( )`` | ``LAST_VALUE( )`` | ``NTILE( )`` |

    | ``MAX( )`` | ``LAG( )`` | ``ROW_NUMBER( )`` |

    | ``MIN( )`` | ``LEAD( )`` |   |

    | ``AVG( )`` | ``PERCENT_RANK( )`` |   |

    | ``GROUPING( )`` | ``PERCENTILE_CONT( )`` |   |

    | ``STRING_AGG( )`` | ``PERCENTILE_DISC( )`` |   |

    | ``STDEV( )`` |   |   |

    | ``STDEVP( )`` |   |   |

    | ``VAR( )`` |   |   |

    | ``VARP( )`` |   |   |


    后续的每一章都将为本书范围内的四个行业特定数据库创建并讨论这些类别的查询。如果你对前面列出的每个函数不熟悉或需要复习如何在查询中使用它们，请参阅附录 A 了解语法和描述。'
  raw: '## One Final Note


    Besides the queries discussed in the chapters, DDL (data declaration language)
    code is included to create the four practice databases and load the tables in
    each. These scripts clearly identify the steps and the sequence you need to take
    to create and load all the data objects (some will generate millions of rows).


    Once you create the databases and load the tables, you can practice by executing
    the supplied queries as you read along in each of the chapters. You can also practice
    performance tuning by creating indexes and examining the query plans that can
    be generated with SSMS.


    Lastly, I will also touch upon performance tuning a bit to ensure that the queries
    you create run fast and efficient. The functions you will learn are resource intensive,
    so we need to write queries that will not tie down server resources, like CPU,
    memory, and disk! (Or have your users pull their hair when a query runs for hours
    or days….)


    As added value, you will be shown how to apply good coding standards to improve
    code legibility. Code that is easy to read is easy to maintain, fix, and modify.
    We want to be good teammates in case your code is handed to another developer
    once you are promoted (or get a better job!). For these reasons, we will use the
    coding standards suggested by Microsoft Corporation for SQL Server.


    These are easy to learn and adopt. All TSQL commands and keywords are in uppercase,
    and data objects referenced are named with one or more words that describe the
    data object. The first letter of the word that makes up the data object name is
    in uppercase, and the remaining letters are lowercase, for example, **DeptId**
    for department identifier.


    A sample query that follows this coding standard is


    ```

    SELECT DeptId, MgrId, MgrLastName

    FROM Department

    GO

    ```


    Very simple and easy to read. It is clear by the names used that the query retrieves
    departmental information, specifically the department identifier, the manager
    identifier, and the manager’s last name. Notice the name of the table. There is
    no doubt as to what the table contains.


    That’s it! Let’s begin our journey into window functions.


    About the Author About the Technical Reviewer


    # 1. Partitions, Frames, and the OVER( ) Clause


    The goal of this chapter is to describe the OVER() clause, its various configurations
    in terms of how partitions and window frames are created, and how data is sorted
    in the partition so that the window function can operate on the values. (The `OVER()`
    clause together with partitions and window frames is what gives power to the window
    functions.)


    We will cover window frames and how they are defined to present a set of partition
    rows that are processed by the window functions.


    Several diagrams illustrate the concepts, and then several examples are shown
    to illustrate the various ways partitions and window frames work on real data
    sets using window functions. We will discuss `ROWS` and `RANGE` clauses and how
    they operate on data in the partition.


    We will also look at a case where we use subqueries in the `ORDER BY` clause instead
    of columns so as to eliminate expensive sort steps in a query plan.


    A final short example is presented to show the new named window feature in SQL
    Server 2022.


    ## What Are Partitions and Window Frames?


    A TSQL query will generate an initial data result set. The result set can be divided
    into sections called partitions, like a partition for each set of rows by specific
    years. The window frame is like a smaller window into the partition defined by
    some row boundaries or ranges, for example, rows prior to and including the current
    row being processed or all rows after and including the current row within the
    partition. The entire data set can also be a partition by itself, and a window
    can be defined that uses all rows in the single partition. It all depends on how
    you include and define the `PARTITION BY`, `ORDER BY`, and `ROWS/RANGE` window
    frame clauses.


    These conditions can be specified with the `OVER()` clause. Let’s see how this
    works.


    ## What Is an OVER( ) Clause?


    As stated earlier, the `OVER()` clause allows you to create partitions and windows
    into a data set generated by a query. It allows you to divide the data set into
    sections called partitions. The windows allow you to control how the window functions
    are applied in terms of the data they will operate on.


    Smaller windows called window frames can be created to further carve up the larger
    window defined by the `PARTITION BY` clause using `ROWS` and `RANGE` frame clauses.
    These windows grow or move (as rows are processed) based on the boundaries defined
    by `ROWS` and `RANGE` frame specifications included in the `OVER()` clause. You
    can also specify how the rows are sorted via an `ORDER BY` clause so that the
    window function can process them.


    This capability allows you to create queries such as three-month rolling averages
    and year-to-date, quarter-to-date, and month-to-date totals. Each of the functions
    we discuss in this book can utilize the `OVER()` clause in this manner.


    This is why they are called window functions!


    ## History of the OVER( ) Clause and Window Functions


    The following is a brief history of the window functions:


    *   Aggregate/ranking window functions without the `ORDER BY` clause support were
    introduced in 2005.


    *   Seven years later, aggregate functions with support for the `ORDER BY` clause
    were introduced in 2012.


    *   Support for window frames (which we will discuss shortly) was also introduced
    in 2012.


    *   Ranking functions and some window capability were introduced in 2015.


    *   The batch-mode window aggregate operator was introduced in 2016.


    *   `The STRING_AGG` function was introduced in 2017.


    *   The named `WINDOW` capability was introduced in SQL Server 2022.


    The capability of the window functions has grown over the years and delivers a
    rich and powerful set of tools to analyze and solve complex data analysis problems.


    ## The Window Functions


    The window functions (which are the focus of this book) that can be used with
    the `OVER()` clause are assigned to three categories and are listed in Table [1-1](#527021_1_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    Aggregate, Analytical, and Ranking Functions


    | Aggregate Functions | Analytical Functions | Ranking Functions |

    | --- | --- | --- |

    | COUNT( ) | CUME_DIST( ) | RANK( ) |

    | COUNT_BIG( ) | FIRST_VALUE( ) | DENSE_RANK( ) |

    | SUM( ) | LAST_VALUE( ) | NTILE( ) |

    | MAX( ) | LAG( ) | ROW_NUMBER( ) |

    | MIN( ) | LEAD( ) |   |

    | AVG( ) | PERCENT_RANK( ) |   |

    | GROUPING( ) | PERCENTILE_CONT( ) |   |

    | STRING_AGG( ) | PERCENTILE_DISC( ) |   |

    | STDEV( ) |   |   |

    | STDEVP( ) |   |   |

    | VAR( ) |   |   |

    | VARP( ) |   |   |


    Each of the subsequent chapters will create and discuss queries for these categories
    for four industry-specific databases that are in scope for this book. Please refer
    to Appendix A for syntax and descriptions of what each of the preceding functions
    does if you are unfamiliar with them or need a refresher on how to use them in
    a query.'
