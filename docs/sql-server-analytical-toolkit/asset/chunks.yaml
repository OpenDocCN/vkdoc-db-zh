    FROM YearlyWarehouseReport – the CTE\nWHERE AsOfYear = 2002\n  AND ProdId = 'P101'\n\
    \  AND Locid = 'LOC1'\n  AND InvId = 'INV1'\n  AND WhId = 'WH112'\nGO\n```\n**Listing\
    \ 13-3** Current Month Movements vs. Last Month, Quarter, and Year\n\nLet’s analyze\
