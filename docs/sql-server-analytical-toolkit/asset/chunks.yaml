    add up the EURO entries, we end up with a positive €2439.20\. If we add up –£98.20
    (converted to €98.20) + €2439.20, we get €2341.


    Let’s assume that GBP and EURO are at a one-to-one exchange rate for this example.
    Otherwise, values must be converted to US dollars or one or the other currency
    we are adding. Otherwise, the additions do not make sense.


    Please refer to the Excel pivot table in Figure `5-35`.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig37_HTML.jpg)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 2 columns
    for row labels and the sum of the transaction amount. The right panel has Pivot
    Table Fields.


    **Figure 5-35**


    Currency pivot table for EURO and GBP


    Looks good! Values match. Notice at the top for January 1, adding the EURO and
    GBP values assuming a one-to-one exchange rate yields the final total of €2341.


    If you get inspired, make some modifications to the transaction table so foreign
    currency values are converted to USD with some make-believe conversion rates so
    you can enhance the reporting.


    Back to our coding example. What does this tell us about the value of the `GROUPING()`
    function? It does work, but it needs some sorting tricks in the query to get the
    output to look like comprehensible rollups. In my opinion, copying and pasting
    the raw data to a Microsoft Excel spreadsheet pivot table will yield more impressive
    visuals. You can also create pivot charts to accompany your pivot table.


    Last but not least, you can also load the raw data into `SQL Server Analysis Services`,
    creating and loading a multidimensional cube and performing the multidimensional
    analysis there.


    ### Performance Considerations


    This function seems to be performance intensive. We have several tools now for
    analyzing performance, from creating estimated and actual query plans to analyzing
    statistics such as `IO`, `TIME`, and `STATISTICS PROFILE`. Our process is to look
    at the estimated plan and then dive deeper into the performance statistics of
    the query being analyzed in order to have a complete picture of what is going
    on and if there are any indexes or reporting tables we can add to improve performance.


    Pop Quiz Answer


    To remove any prior query plans that could skew performance statistics.


    Let’s start, as usual, by generating an estimated query plan in the usual manner.
    This is probably the first step you should always take when starting to analyze
    performance.


    Please refer to Figure `5-36`.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig38_HTML.png)


    A screenshot of `c h 0 5 aggregate queries s q l`. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. An arrow indicates the table scan cost, 87%.


    **Figure 5-36**


    The estimated query plan shows an expensive table scan


    We now know that when we see a table scan on a large table, it means trouble.
    We also see that the estimator has suggested an index, so this is our first remedial
    course of action to take. If we create the index, `SQL Server` tells us that we
    will see an improvement of 93.72%


    We copy and paste the suggested index into our script, give it a name, and execute
    the DDL command to create the index. Keep your fingers crossed!


    Please refer to Listing `5-13`.


    ```

    CREATE NONCLUSTERED INDEX [ieTranSymCustBuySell]

    ON [Financial].[Transaction] ([Symbol],[CustId],[BuySell])

    INCLUDE ([TransDate],[TransAmount])

    GO

