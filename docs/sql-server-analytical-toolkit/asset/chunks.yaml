  trans: '### `PERCENT_RANK()` 函数


    接下来介绍的是 `PERCENT_RANK()` 函数。它是做什么用的呢？我们已在第 3 章讨论过，但为了方便您回顾，或者如果您没有按顺序阅读各章，这里再做一个简要说明。


    这个函数使用查询结果、分区或表变量之类的数据集，计算每个独立值在整个数据集中（以百分比形式）的相对排名。你需要将结果（返回值为浮点数）乘以 100.00，或者使用
    `FORMAT()` 函数将结果转换为百分比格式（顺便说一下，这个函数返回的是 `FLOAT(53)` 数据类型）。


    此外，它的行为与 `CUME_DIST()` 函数非常相似；至少微软的文档是这么说的。


    你也会发现它与 `RANK()` 函数非常相似（至少在理论上是这样）。`RANK()` 函数返回值的位置，而 `PERCENT_RANK()` 返回一个百分比值。我们将把这个函数与刚刚讨论的
    `CUME_DIST()` 函数一起使用，以便比较结果，并观察它对我们即将生成的查询计划的影响。


    我们友好的业务分析师提供了以下规格说明：


    需要一份报告，显示所有工厂、所有年份按工厂、位置、年份、季度和月份划分的百分比排名和累积分布。计算应基于年份、工厂名称和位置的分组。


    基于这些简单的规格说明，代码清单 10-7 展示了 `TSQL` 查询。


    ```sql

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth

    ,SumEquipFailures

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS PercentRank

    ,FORMAT(CUME_DIST() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS CumeDist

    FROM [Reports].[PlantSumEquipFailures]

    GO

    ```

    代码清单 10-7

    百分比排名 vs. 累积分布


    请注意，这次没有使用 `CTE`。我们现在使用预先计算好的故障总和报告表，以简化查询并提高性能。


    两个函数的分区都是按年份、工厂名称和位置名称设置的。`ORDER BY` 子句使用了年份、工厂名称、位置名称以及设备故障总和值进行声明。让我们看看窗口函数返回的值是如何比较的。


    请参考图 10-16 中的部分结果。


    ![](img/527021_1_En_10_Fig21_HTML.png)


    一张 SQL Server Management Studio (SSMS) 窗口的截图。显示一个包含 10 列和 1517 行的表格。列标题为：工厂名称、位置名称、日历年、季度名称、月份名称、日历月份、设备故障总和、百分比排名和累积分布。最后两列的
    12 行被框出。


    图 10-16

    设备故障的百分比排名和累积分布


    两个函数的结果相似，但差异不大。分区设置正确，我们可以看到按工厂、位置和年份划分的月度结果。看起来在 2002 年，锅炉房在四月份的故障最多，而二月和八月则完全没有故障。


    让我们看看这个查询的估计执行计划。


    ### 性能考量


    让我们创建基线估计执行计划，以便进行一些分析。我们需要再次将计划分成两部分，因为它相当大。


    请参考图 10-17a。


    ![](img/527021_1_En_10_Fig22_HTML.png)


    一张 SQL Server Management Studio (SSMS) 窗口的截图。展示了基线估计查询计划的第 1 部分，包含 13 个组件。组件包括：序列投射、段、段、嵌套循环、表假脱机、段、排序、表扫描、嵌套循环、计算标量、流聚合以及
    2 个表假脱机。


    图 10-17a

    基线估计查询计划，第 1 部分


    首先，我需要说明报告表只有 1,517 行，所以并不大，但看看估计性能计划如何将其分解为多个任务会很有意思。其次，查询运行时间不到一秒，所以何必费事呢？因为熟能生巧，这就是原因！


    我们可以看到很多活动。表扫描占比 16%，其次是排序（42% 成本）、段（4% 成本）和表假脱机（4% 成本），然后与底部通过嵌套循环连接（28% 成本）的分支合并。在我们的性能分析之旅中，排序和连接似乎总是成本较高。虽然我们使用的是小表，但如果表的数据量很大，我们就需要考虑在维度代理键上建立索引。


    让我们看看计划的后半部分。


    请参考图 10-17b。


    ![](img/527021_1_En_10_Fig23_SQL.png)


    一张 SQL Server Management Studio (SSMS) 窗口的截图。展示了基线估计查询计划的第 2 部分，包含 9 个组件。组件包括：选择、计算标量、计算标量、流聚合（成本
    1%）、窗口假脱机（成本 4%）、段、段、段、序列投射和段。


    图 10-17b

    基线估计查询计划，第 2 部分


    从右向左看，我们看到一个窗口假脱机（4% 成本）和一个流聚合（1% 成本）。


    我们返回了很多行，所以我们看到了很多窗口假脱机操作。请记住，窗口假脱机任务的百分比高于零意味着假脱机操作是在物理磁盘上执行的。因此，这个表可以考虑作为内存增强表的候选。


    我尝试基于 `PARTITION BY` 子句和 `ORDER BY` 子句中的列添加聚集索引，但改进微乎其微，所以我甚至懒得展示结果。不过，我确实在本章的脚本中包含了索引代码。


    让我们把注意力转到这个查询有 1,517 行这个事实上。当你添加一个 `WHERE` 子句来只过滤一年时，会发生什么？我们的分析师会允许修改，以便我们根据年份、工厂和位置来过滤行吗？让我们修改查询并尝试一下。


    请参考代码清单 10-8。


    ```sql

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,MonthName,CalendarMonth

    ,SumEquipFailures

    ,FORMAT(PERCENT_RANK() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS PercentRank

    ,FORMAT(CUME_DIST() OVER (

    PARTITION BY CalendarYear,PlantName,LocationName

    ORDER BY CalendarYear,PlantName,LocationName,SumEquipFailures

    ),''P'') AS CumeDist

    FROM [Reports].[PlantSumEquipFailures]

    WHERE PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    AND CalendarYear = 2002

    GO

    ```

    代码清单 10-8

    添加 WHERE 子句


    如你所见，查询是硬编码的，因此它过滤出工厂为 "East Plant"、锅炉房、年份为 2002 的结果。分析师想要所有年份、工厂和位置的数据，但让我们看看这次修改后的性能计划。


    请参考图 10-18。


    ![](img/527021_1_En_10_Fig24_HTML.png)'
- fmt: '# Pop Quiz


    Which analytical window functions do not support window frame specifications (`ROWS`
    and `RANGE`)? Answer in Appendix A or the beginning of this chapter. Maybe the
    question is which two functions support this specification?


    It’s time for the percentile continuous and discrete functions.


    ### PERCENTILE_CONT Function


    We will discuss the `PERCENTILE_CONT()` function first, and what does this function
    do?


    Well, if you read Chapter 7, you will recall that it work on a continuous set
    of data.


    Recall what continuous data is. Continuous data is data measured over a period
    of time, like boiler temperatures in equipment over a 24-hour period or equipment
    failures over a period of time.


    Example: Summing up each boiler temperature to arrive at a total makes no sense.
    Summing up the boiler temperatures and then dividing them by the time period to
    get an average does. So we can say continuous data can be measured by using formulas
    like average and so on.


    In conclusion, the `PERCENTILE_CONT()` function works on a continuous set of data
    based on a required percentile so as to return a value within the data set that
    satisfies the percentile (you need to supply a percentile as a parameter, like
    .25, .50, .75, etc.).


    With this function the value is interpolated. It usually does not exist, so it
    is interpolated. Or by coincidence it could use one of the values in the data
    set if the numbers line up correctly.


    Here come the business requirements for this query:


    We are interested in the daily temperature profile for “Boiler 2” in plant “PP000002”
    for the year 2004. The report needs to show the percentile continuous values for
    25%, 50%, and 75%.


    Simple specification, but this will be interesting as the table has over 2.5 million
    rows. Please refer to Listing 10-9.


    ```sql

    SELECT PlantId

    ,LocationId

    ,LocationName

    ,BoilerName

    ,CalendarDate

    ,Hour

    ,BoilerTemperature

    ,PERCENTILE_CONT(.25) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .25]

    ,PERCENTILE_CONT(.5) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .5]

    ,PERCENTILE_CONT(.75) WITHIN GROUP (ORDER BY BoilerTemperature)

    OVER (

    PARTITION BY CalendarDate

    ) AS [PercentCont .75]

    FROM EquipStatistics.BoilerTemperatureHistory

    WHERE PlantId = ''PP000002''

    AND YEAR(CalendarDate) = 2004

    AND BoilerName = ''Boiler 2''

    GO

    ```


    Listing 10-9: Percentile Continuous Analysis for Monthly Failures


    The report is simple enough. The `PERCENTILE_CONT()` function is used three times,
    once for each desired percentile. The data is continuous as we are profiling it
    over time, specifically days and hours of the day. Let’s see the results.


    Please refer to the partial results in Figure 10-20.


    ![Figure 10-20: Percentile continuous boiler temperature](images/527021_1_En_10_Chapter/527021_1_En_10_Fig26_HTML.png)


    A screenshot of the S Q L, S S M S window. It has a table of 11 columns and 8784
    rows. The column headers are Plant I D, Location I D, location name, boiler name,
    calendar date, hour, boiler temperature, percentile continuous 0.25, percentile
    continuous 0.50, and percentile continuous 0.75.


    The query ran very fast. It ran under one second, and 8,784 rows were returned.
    Notice how each of the percentiles is interpolated. The arrows show the slot where
    they should appear if they existed. For example, for the 25th percentile, the
    value 924.425 falls between the values 762.2 and 978.5. This means 25% of the
    values in the partition are less than or equal to this nonexistent value.


    Just follow the arrows for the other examples. Lastly, as a reminder, this query
    does not allow you to specify the `ROWS` or `RANGE` window frame specifications.
    No use trying it out as you will get a syntax error message:


    ```sql

    Msg 10752, Level 15, State 1, Line 52

    The function ''PERCENTILE_CONT'' may not have a window frame.

    ```


    Okay, how does this query perform on 2.5 million rows?'
