  trans: '

    ## RANK( ) 对比 PERCENT_RANK( )


    让我们看看这两个函数如何工作，并通过对比结果来观察它们的相似之处。`PERCENT_RANK()` 属于我们在上一章介绍过的分析函数范畴，但我将它放在本章中，以便我们能将其与
    `RANK()` 函数进行比较。


    我们将使用惯常的结构来测试这些函数。请参考 **清单 4-3**。


    ```sql

    WITH CustomerRanking (

    CalendarYear,CalendarMonth,CustomerFullName,TotalSales

    )

    AS

    (

    SELECT CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,SUM(TotalSalesAmount) AS TotalSales

    FROM SalesReports.YearlySalesReport YSR

    JOIN DimTable.Calendar C

    ON YSR.CalendarDate = C.CalendarDate

    GROUP BY C.CalendarYear

    ,C.CalendarMonth

    ,CustomerFullName

    )

    SELECT

    CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,RANK()

    OVER (

    --            PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) AS Rank

    ,PERCENT_RANK()

    OVER (

    --            PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) AS PctRank

    FROM CustomerRanking

    WHERE CalendarYear = 2011

    AND CalendarMonth = 1

    ORDER BY

    RANK() OVER (

    PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) DESC

    GO

    ```


    **清单 4-3**

    RANK 对比 PERCENT_RANK


    我们的 `CTE`（公用表表达式）只是组装了我们需要报告的几列，并包含了 `SUM()` 函数来按年、月和客户姓名计算总销售额。为了限制返回的行数，使用了一个
    `WHERE` 子句按年份和仅一个月（2011 年 1 月）来过滤结果。


    提醒——从小型数据集开始。先开发解决方案并进行测试。一旦你确信它能正确工作，再将解决方案应用到更大的数据集上。


    `RANK()` 和 `PERCENT_RANK()` 函数都使用了一个包含 `ORDER BY` 子句的 `OVER()` 子句，以便分区内的行按 `TotalSales`
    列排序。`PARTITION BY` 子句被注释掉了，因为我们只检索了一年的数据。一旦你熟悉了其中的逻辑，可以自由地检索多行数据，并取消 `PARTITION
    BY` 子句的注释，这样我们就可以处理多个年份。


    最后，这里有个有趣的地方。你可以在查询的 `ORDER BY` 子句中包含一个窗口函数（而不是 `OVER()` 子句）。我们使用了与 `RANK()` 函数相同的代码来实现这一点。省略它会得到相同的结果，但顺序相反。但至少你知道这是可行的。只要理解其中的区别就好。当
    `ORDER BY` 子句在 `OVER()` 子句中时，它会对分区内的行进行排序。当 `ORDER BY` 子句在查询末尾时，它会对查询的最终结果进行排序。


    请参考 **图 4-3** 中的部分结果。


    ![](img/527021_1_En_4_Fig3_HTML.jpg)


    一个窗口截图展示了一个包含 6 列 25 行条目的表格，条目基于百分比排名排序。表头为日历年份、日历月份、客户全名、总销售额、排名和百分比排名。


    **图 4-3**

    RANK 对比 PERCENT_RANK


    结果按降序排列。注意第 6-7 行和第 21-22 行中重复值的行为。如前所述，将百分比排名乘以 100.00，这样你就能看到百分比形式的值，或者使用 `FORMAT()`
    函数代替。这样你就可以在 Microsoft Excel 中绘制结果图，如下所示。


    我复制并粘贴了结果，并将百分比排名结果乘以 100.00，因此我们得到了一个漂亮的图表，而不是小于或等于 1.0 的小数值。


    请参考 **图 4-4**。


    ![](img/527021_1_En_4_Fig4_HTML.jpg)


    一个 Excel 工作表的截图展示了一个包含 4 列 16 行的表格，以及一个关于排名对比销售额（美元）的折线图。标记为排名和百分比排名的线条呈现出轻微波动的上升趋势。


    **图 4-4**

    RANK 对比 PERCENT_RANK 分析


    还不错。我们确实看到两个函数的图表结果几乎相同，并呈现出良好的上升趋势。我本应添加一条注释，说明百分比排名结果已乘以 100.00，以便图表读者了解这一处理。


    数据展示在左侧以便于参考。为你的用户生成一些漂亮的图表和图形总是一个好主意，这样他们就能解读结果。一图胜千言！Microsoft Power BI 也是一个出色的数据可视化工具。


    让我们看看这个查询的性能特征。


    **提示**

    作为 SQL 开发人员或架构师，你还需要掌握一些其他技能，比如熟练掌握 Microsoft Excel 或 Power BI，以便为你的用户和管理层生成强大的可视化效果。掌握一些
    SSIS（SQL Server Integration Services）的 ETL 技能也会很有价值。

    '
- fmt: '## Performance Considerations


    Let’s start off by generating an estimated query plan in the usual manner (menu
    bar ➤ Query ➤ Display Estimated Execution Plan). You will see some rather interesting
    and puzzling results.


    Please refer to Figure [4-5](#527021_1_En_4_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig5_HTML.jpg)


    A screenshot of the T S Q L code presents 2 parts. The top portion presents a
    part of lines of code with variable initializations and order by clause and over
    function within the rank function. The bottom portion presents a flow diagram
    of the estimated query plan.


    Figure 4-5


    Estimated query plan – rank vs. percent rank


    We had some indexes lying around, so the estimator did not suggest any, but wait
    a minute – the tasks add up to more than 100%:


    *   Table scan: 2%

    *   Index scan: 50%

    *   Index seek: 90%

    *   Hash match: 26%


    These values add up to 168%.


    This is not possible. Costs cannot be over 100%. Why is this?


    You will not like the answer.


    This is a bug with the client-side software, and occasionally you will get surprising
    results like this. I recommend you research this on the Microsoft website to see
    if newer versions of SSMS will clear this up. Fortunately, it looks like it does
    not happen often.


    Back to the query plan, as you can see some indexes were lying around from the
    prior chapter, so they were used. This is what you want; you want your indexes
    to be used by multiple queries and to not have to create a new index every time
    a new request comes in.


    Let’s examine the `IO` and `TIME` statistics generated by this query.


    Please refer to Table [4-1](#527021_1_En_4_Chapter.xhtml#Tab1).


    Table 4-1


    Query IO and Time Statistics


    | SQL Server Parse and Compile Times | Existing Indexes |

    | --- | --- |

    | CPU time (ms) | 0 |

    | Elapsed time (ms) | 127 |

    | **Statistics (Work Table 1)** | **Existing Indexes** |

    | Scan count | 0 |

    | Logical reads | 0 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **Statistics (Work Table 2)** | **Existing Indexes** |

    | Scan count | 0 |

    | Logical reads | 0 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **Statistics (YearlySalesReport)** | **Existing Indexes** |

    | Scan count | 1 |

    | Logical reads | `1384` |

    | Physical reads | 1 |

    | Read-ahead reads | `1401` |

    | **Statistics (Calendar)** | **Existing Indexes** |

    | Scan count | 1 |

    | Logical reads | 48 |

    | Physical reads | 0 |

    | Read-ahead reads | 0 |

    | **SQL Server Execution Times** | **Existing Indexes** |

    | CPU time (ms) | 125 |

    | Elapsed time (ms) | 334 |


    Seems like we have issues with logical reads and read-ahead reads. These exist
    on the `CTE` side with the `YearlySalesReport` table. Logical reads might not
    be an issue though as they are performed in memory (i.e., if you have enough!).
    Stay tuned. We need to look at `IO` and `TIME` statistics to see if issues exist
    related to logical reads.


    The query in the `CTE` might be a candidate for a denormalized report or staging
    table or, better yet, memory-enhanced table. The indexes helped, but there is
    just so much you can do by creating indexes. The more indexes you add, the more
    performance will degenerate when you are loading, modifying, or deleting rows
    in this table.


    Based on the code examples from the last chapter, see if you can modify this table
    by replacing the `CTE` with a script that loads a report or memory-enhanced table
    and then try this analysis on your own.


    ## RANK( ) vs. DENSE_RANK( )


    Let’s look at the `RANK()` function again, but now we will compare it to the `DENSE_RANK()`
    function.


    As a reminder, so you do not have to flip back to the start of the chapter, the
    `DENSE_RANK()` function works almost the same as the `RANK()` function. In case
    of ties, the rank is the same for the ties, but the next value after the duplicate
    values simply is assigned the next rank number.


    Please refer to Listing [4-4](#527021_1_En_4_Chapter.xhtml#PC4).


    ```sql

    WITH CustomerRanking (

    CalendarYear,CalendarMonth,CustomerFullName,TotalSales

    )

    AS

    (

    SELECT YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,CustomerFullName

    -- add one duplicate value on the fly

    ,CASE

    WHEN CustomerFullName = ''Jim OConnel'' THEN 17018.75

    ELSE SUM(TotalSalesAmount)

    END AS TotalSales

    FROM SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,CustomerFullName

    )

    SELECT

    CalendarYear

    ,CalendarMonth

    ,CustomerFullName

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,RANK()

    OVER (

    ORDER BY TotalSales

    ) AS Rank

    ,DENSE_RANK()

    OVER (

    ORDER BY TotalSales

    ) AS DenseRank

    FROM CustomerRanking

    WHERE CalendarYear = 2011

    AND CalendarMonth = 1

    ORDER BY

    DENSE_RANK() OVER (

    PARTITION BY CalendarYear

    ORDER BY TotalSales

    ) DESC

    GO

    ```


    Listing 4-4


    Rank vs. Dense Rank


    I included a `CASE` statement in the `CTE` to hard-code a duplicate value, so
    we see the results. This is just a trick to use when prototyping. You can always
    introduce the duplicate in your data if it is test data. Never mess with production
    data. If you do, I hope your resume is up to date!


    Basically, this is a carbon copy of the prior query, but I included the `DENSE_RANK()`
    function so we can compare results. We did say that these functions are similar.
    The numerical results together with the chart in Microsoft Excel will verify this
    statement.


    Once again, to keep the result set small, the query uses a `WHERE` clause filter
    to pull data only for one year, 2011, and for the month of January. Let’s see
    the query results.


    Please refer to Figure [4-6](#527021_1_En_4_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig6_HTML.jpg)


    A screenshot of a window presents a tab with a table of 6 columns and 24 rows.
    The columns of total sales, rank, and dense rank of rows 49 to 54, 63, and 64
    are highlighted.


    Figure 4-6


    Rank vs. dense rank analysis


    What we want to look at here is how the results differ between these functions
    if duplicate values are present. Starting from the bottom with rows 63 and 64,
    both sales totals are $99.00, so this is where the fun begins. Both get a rank
    and dense rank of 2, but look at what happens when we move to row 62. The `DENSE_RANK()`
    value starts at the next value 3, while the RANK() value skips a number and goes
    to 4. Value 3 is ignored.


    When we look at rows 54 and 53, we have another set of duplicates, and the pattern
    repeats itself. Which function to use depends on how you want to treat duplicate
    values.


    One last point: Notice with `DENSE_RANK()` there are no gaps in the rankings.


    Here is our chart generated with Microsoft Excel. Please refer to Figure [4-7](#527021_1_En_4_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig7_HTML.png)


    A screenshot of an Excel worksheet presents a table of 4 columns and 17 rows for
    rank versus dense rank and a line graph of rank versus sales. The lines labeled
    rank and dense rank follow an increasing trend with slight fluctuations.


    Figure 4-7


    Graphing rank vs. dense rank


    Sure enough, the results are similar once again. A complete set of data and graphs
    like these for your users will guarantee productive analysis and decision making.


    Generating these graphs is easy by the way. Copy and paste the results to a spreadsheet.
    Tighten up the data and then highlight it so you can generate the graph. Click
    “Insert” in the menu bar and then select “Recommended Charts.” Pick a chart, and
    you’re done except for some formatting to make it look professional.'
