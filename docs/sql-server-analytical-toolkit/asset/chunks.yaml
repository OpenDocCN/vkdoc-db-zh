    ### Performance Considerations


    This time we will look at the baseline plan only, and I leave it up to you to
    try any enhancements like replacing the `CTE` portion of the query with a reporting
    table like we did in prior chapters.


    Here is our baseline estimated query performance plan in Figure [11-26](#527021_1_En_11_Chapter.xhtml#Fig29).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig29_HTML.png)


    A screenshot presents the execution plan. The arrows point towards the sort cost
    equals 17 percent and index seek cost equals 22 percent.


    Figure 11-26


    Baseline estimated execution plan


    Looks like a straightforward linear plan with most of the activity on the Warehouse
    table. We have an index seek task with a cost of 22% and a pretty expensive sort
    at 77%. All the other tasks chime in at 0% cost. Let’s look at the `IO` and `TIME`
    performance statistics.


    Please refer to Figure [11-27](#527021_1_En_11_Chapter.xhtml#Fig30).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig30_HTML.jpg)


    A screenshot of the window. The upper half of the page depicts the S Q L codes.
    The lower half of the page is titled Messages. The arrows point towards a scan
    count 4 and 1, logical reads 61 and 3, and elapsed time equal to 222 m s.


    Figure 11-27


    IO and TIME performance statistics


    The query took 222 ms to run, under 1 s. Most of the activity is with the work
    table. We can see a scan count value of 4 and 61 logical reads. The Warehouse
    table has a scan count of 1 plus logical reads of 3. All other values are zero.


