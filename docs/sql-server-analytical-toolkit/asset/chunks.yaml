    ```


    例如，在现实生活中，一个账户在 1 月可能有 100 美元，在 2 月有 50 美元。如果您认为总额是 150 美元，但如果 1 月或 2 月发生了借项，那就错了。如果没有发生借项，那么
    150 美元就是总额，因为它包括了从 1 月结转到账户的现金。因此，有几个因素在起作用，比如账户的借项和贷项。


    这是另一种情况。如果 2 月从账户中借记了 50 美元，并且没有向账户存入任何款项，那么剩下的就只有 50 美元（当月至今）。


    同样的处理方式也适用于投资组合余额（在财务数据库章节）以及处理库存移动的三章。与财务场景一样，库存需要考虑进出库的流动，以实际报告月度库存总额。


    代码有详细的注释，所以一切应该都很清楚。目标是理解窗口函数的工作原理，而不是模拟真实世界的业务场景或现实的数据模式。


    如果您最终理解了滚动总额的工作原理，您就领先一步了。


    ## 工具包


    我们在第 12 章预览了这个图表，但我认为值得再看一次，因为它向您展示了我们讨论过的所有工具，同时也间接地展示了您掌握这些技能后将拥有的所有能力！


    除 Microsoft Excel 外，所有工具都是免费的。您需要订阅 Excel，但它物有所值。至于 SSAS、SSIS 和 SSRS，这些是在您下载并安装最新社区版的
    Visual Studio 后可以添加的增强组件。我们将在最后一章讨论如何操作。


    请参阅图 14-3。


    ![](img/527021_1_En_14_Fig3_HTML.png)


    图 14-3 SQL Server BI 工具包


    如图所示，有很多工具，我认为我们现在对它们的功能和应用方法有了基本的了解。你能相信你已经学会了如何使用所有这些工具吗？

    '
- fmt: '## SQL Server


    This is the first and most important component tool you need. SQL Server delivers
    the database engine that allows you to create databases, create and load tables,
    and of course run all the window functions we just discussed.


    Please refer to Figure [14-4](#527021_1_En_14_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig4_HTML.jpg)


    A diagram presents 10 components of SQL Server at 10,000 feet. The components
    are database engine, replication, scheduler, high availability, backup recovery,
    management tools, security, distributed transaction coordinator, system databases,
    and user databases.


    Figure 14-4


    SQL Server at 10,000 feet (give or take a foot or two)


    At a very high level, SQL Server includes the database engine used for storing
    the database and all related objects plus the query engine, parser, and database
    file management processes.


    Note


    Databases are composed of files: files for storing data, files for storing data
    for the system databases, files for `TEMPDB`, and files for the transaction logs.
    All these files can be grouped into buckets called file groups. If you need a
    refresher on how to create databases and how they are structured, check out my
    free podcast on creating databases at


    [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com)


    Back to SQL Server. A scheduler is included to schedule queries, scripts, and
    external programs so they execute at the required time. You can even schedule
    SSIS packages.


    A backup/recovery process is included to back up and restore databases in cases
    of data corruption or processing errors.


    The replication component allows you to replicate databases across servers in
    a distributed architecture, and the high availability component ensures SQL Server
    is always up and running.


    The tools we learned can take advantage of distributed data, so make sure you
    understand how this feature works. SSIS can connect all databases in a distributed
    architecture so as to load them into a centralized database called an ODS (Operational
    Data Store).


    There is also a Distributed Transaction Coordinator (DTC) that allows you to create
    transactions that span multiple databases. This component ensures all distributed
    transactions across multiple servers succeed (commit) or are rolled back (rollback)
    in case of issues so that databases are maintained in a stable and consistent
    state.


    Lastly, we see the management tools, which include the estimated query plan generator
    we used. We relied on this heavily to analyze the performance of our queries that
    used window functions.


    ## SSMS


    Once we downloaded and installed SQL Server, we needed a tool to help us manage
    the database and related objects like tables, indexes, views, and query scripts.
    SQL Server Management Studio is the tool of choice. We used it throughout our
    journey, so you should be very familiar with it by now. We only touched the surface
    of its many features and capabilities.


    Please refer to Figure [14-5](#527021_1_En_14_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig5_HTML.png)


    A screenshot of the SSMS window. The left panel presents Object Explorer with
    multiple files and folders. The first file is selected. The right panel has a
    code to enter details in a table and a table of 13 columns and 13 rows. The last
    column presents the rolling year cumulative.


    Figure 14-5


    SQL Server Management Studio


    Here we see the familiar Object Explorer, query pane, and results pane windows.
    Not seen is the Solution Explorer, but you can easily modify the way SSMS looks.


    You will need this tool after you install SQL Server 2019 or 2022. This tool will
    not only let you run the scripts that come from each chapter but also the scripts
    that create the database used in each chapter and also load the tables. SSMS also
    has a host of management tools that you will rely on heavily. This is priority
    number 2! Make sure you download the installer from the Microsoft download site
    and install this right after you set up SQL Server.


    If you would like a brief tutorial on how to use SSMS, check out my free podcast
    at [`www.grumpyolditguy.com`](http://www.grumpyolditguy.com). Please refer to
    Figure [14-6](#527021_1_En_14_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig6_HTML.png)


    A screenshot of the Chrome window. A tab opens the T-SQL podcasts site. T-SQL
    podcasts option is selected in the menu bar. The header reads, Learning the SQL
    Server BI stack the Grumpy Way! It presents a YouTube video on the left side and
    the details on the right side.


    Figure 14-6


    Grumpy Old IT Guy video training podcasts


    By the way, all podcasts are free, with no registration, but comments are always
    welcome. If you have ideas on how to improve the content, please let me know.


    The best way to use SSMS though is by experimenting with it. Poke around and try
    the features. In no time, you will rely on this tool for all your programming
    tasks.


    Shortly I will show you where to download and how to install SSMS.


    ## The Window Functions


    Here are the functions we reviewed in each business case scenario.


    Please refer to Table [14-1](#527021_1_En_14_Chapter.xhtml#Tab1).


    Table 14-1


    Functions by Category


    | Aggregate | Ranking | Analytical |

    | --- | --- | --- |

    | `COUNT()` | `RANK()` | `CUME_DIST()` |

    | `COUNT_BIG()` | `DENSE_RANK()` | `FIRST_VALUE()` |

    | `SUM()` | `NTILE()` | `LAST_VALUE()` |

    | `MAX()` | `ROW_NUMBER()` | `LAG()` |

    | `MIN()` |   | `LEAD()` |

    | `GROUPING()` |   | `PERCENT_RANK()` |

    | `STRING_AGG()` |   | `PERCENTILE_CONT()` |

    | `STDEV()` |   | `PERCENTILE_DISC()` |

    | `STDEVP()` |   |   |

    | `VAR()` |   |   |

    | `VARP()` |   |   |


    These functions, used with `OVER()` clauses, gave us the ability to create powerful
    queries, like creating moving rolling totals and averages. As you saw, you can
    also perform some very interesting statistical analysis.


    You will rely on these queries to solve complex business problems. You can count
    on these being discussed in an interview, so make sure you know them inside out!
    Key is the `OVER()` clause. Make sure you understand what a `PARTITION BY` clause
    does, what an `ORDER BY` clause does, and also what the window frame specifications
    (`ROWS` and `RANGE`) do. Also understand the default behavior as far as window
    frame specifications when you have `OVER()` clauses that use both a `PARTITION
    BY` and an `ORDER BY` clause or only one of them or even empty `OVER()` clauses.
    Make sure you have a solid understanding of what a partition within a data set
    is. If this is a bit fuzzy, make sure you go back to Chapter [1](#527021_1_En_1_Chapter.xhtml),
    which explains all.


    If you need to review these functions, pick a chapter, and check them out. Make
    sure you try out the scripts, modify them, break them, and enhance them. That’s
    how one learns.


    Lastly, check out the Microsoft documentation on these functions to get really
    into the details of how they work. Remember, these are your tools, so make sure
    you know what they do and don’t do and how to use them!


    Note


    SQL Server 2022 comes with an alternate syntax for the `OVER()` clause. I briefly
    covered this in the first few chapters of the book. There are also new window
    functions such as


    `APPROX_PERCENTILE_CONT()`


    `APPROX_PERCENTILE_DISC()`


    Definitely worth the time to check out the new features available in Microsoft
    SQL Server 2022 by referring to the Microsoft SQL Server 2022 website.'
