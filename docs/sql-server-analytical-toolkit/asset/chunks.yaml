  trans: '## 总结


    希望您觉得本章内容有趣。我们在一个工厂工程数据仓库场景中全面实践了聚合函数。在此过程中，我们进行了一些详细且有趣的性能分析，不仅发现了改进查询以提升性能的机会，还发现了数据库中的一个设计缺陷。


    不，我并非故意为之。我确实犯了一个设计错误，但这恰好是一个很好的机会，可以展示在真实开发环境中此类事情确实会发生，并且它不仅提供了修复设计的机会，更是改进设计的契机。


    最后，我们还创建了其他一些设计产物，例如数据字典，它们帮助我们理解数据库中的内容，从而在创建查询时，我们能理解数据的语义以及表之间的关系。


    接下来看第 9 章！


    # 9. 工厂用例：排名函数


    在本章中，我们将使用排名窗口函数对电厂数据库进行一些分析。虽然只有四个函数，但我们会像往常一样检查性能，并创建一些 Microsoft Excel 数据透视表和图表，将我们的分析提升到更高层次。


    我们的查询性能分析将利用之前章节中使用的大部分工具，并将展示一个导致我们走上错误道路的示例，我们会对其进行修正。


    有时，当您在没有适当设计考虑的情况下进行编码时，可能会选择一种您认为合理的方法，结果却发现，如果当时能仔细思考，本有一种更简单的解决方案来满足编码需求。


    有时，最简单的解决方案就是最好的！


    ## 排名函数


    以下是这四个函数。希望这不是您第一次见到它们，因为我们在之前的章节中已经介绍过。如果您需要复习该主题，请查看附录 A，其中详细描述了每个函数：


    * `RANK()`

    * `DENSE_RANK()`

    * `NTILE()`

    * `ROW_NUMBER()`


    前两个函数类似，它们都用于对结果进行排名，不同之处在于它们对重复值和后续排名的处理方式不同。当您试图解决需要对结果进行排名的问题时，请考虑这一点。


    ### RANK( ) 函数


    回顾一下，`RANK()` 函数根据要排名的值，返回当前行之前的行数加上当前行。让我们看看业务分析师的需求是什么：


    需要一份报告，按工厂、地点、年份、季度和月份对设备故障数量进行排名。报告需要按降序排列，且仅针对 2008 年。报告查询需要易于修改，以便将来能在结果中包含更多年份。


    这是一个简单的查询，因此我们将从使用 `CTE` 方法开始。


    请参见清单 9-1。


    ```

    WITH FailedEquipmentCount

    (

    CalendarYear, QuarterName,[MonthName], CalendarMonth, PlantName, LocationName,
    SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    SELECT

    PlantName

    ,LocationName

    ,CalendarYear

    ,QuarterName

    ,[MonthName]

    ,SumEquipFailures

    RANK() OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipFailures DESC

    ) AS FailureRank

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2008

    GO

    清单 9-1

    对设备故障总数进行排名

    ```


    `CTE` 逻辑有点复杂。这里使用了 `星型（STAR）` 查询方法，需要通过四个 `JOIN` 谓词连接五个维度表。注意这里使用了代理键，并且我们连接到
    `CalendarView` 视图而不是日历维度表，以便可以提取日期对象的一些名称。


    注意


    在代理键上执行连接比在具有字母数字数据类型的生产键上执行连接更快。整数连接更快。


    使用了 `SUM()` 聚合函数来汇总故障总数，并且包含了必需的 `GROUP BY` 子句。


    查看 `OVER()` 子句，通过工厂名称和地点名称设置了分区。年份未包含在分区定义中，因为我们的 `WHERE` 子句仅筛选出 2008 年的结果。要在结果中包含更多年份，请不要忘记在
    `PARTITION BY` 子句中添加年份。


    最后，注意 `ORDER BY` 子句将结果按 `DESC`（降序）排序。也就是说，它指定在分区内按 `SumEquipFailures` 列降序处理结果。


    让我们看看结果是什么样子。


    请参见图 9-1 中的部分结果。


    ![](img/527021_1_En_9_Fig1_HTML.png)


    一张截图展示了一个表格。列标题为：工厂名称、地点名称、日历年、季度名称、月份名称、设备故障总和、故障排名。箭头指向 2008 年 10 月、9 月的故障排名
    11 和 3 月的 20。


    图 9-1


    按年份和地点划分的故障排名


    查看锅炉房的结果，就故障而言，10 月似乎是排名第一的月份，因此需要对此进行调查。我们的分析师需要查看是哪台或哪些设备故障最多。


    对于锅炉房，看起来有并列情况。9 月和 4 月是锅炉房设备故障最严重的月份。


    让我们将结果制成图表，以直观地展示 2008 年的排名情况。


    请参见图 9-2。


    ![](img/527021_1_En_9_Fig2_HTML.png)


    一张截图展示了一个表格和一个折线图。列标题为：季度、月份、故障、排名。故障与月份的折线图展示了故障、排名和线性故障的趋势。


    图 9-2


    2008 年月度故障情况


    这似乎是一个不错的图表，因为它清楚地显示了按月份的排名以及故障数量。我们的分析师会满意的。


    性能如何？让我们通过使用工具箱中可用的工具进行常规分析，来看看这个查询的表现如何。'
- fmt: '### Performance Considerations


    我们按照常规方式生成了基线估计的查询性能计划。这个计划很大。


    请参考图 [9-3](#527021_1_En_9_Chapter.xhtml#Fig3)。


    ![执行计划页面截图，箭头显示了排序的8%和12%成本，哈希匹配的11%、10%和21%成本，聚集索引的10%成本，以及表扫描的11%成本](images/527021_1_En_9_Chapter/527021_1_En_9_Fig3_HTML.png)


    图 9-3 基线估计的查询计划


    我们首先能看到的是没有建议使用索引。我们看到一个成本为10%的聚集索引扫描，以及五个表扫描，每个表扫描的成本为1%，除了`Calendar`表上的表扫描成本为11%。


    看起来所有的行流都是通过一系列成本从21%到10%不等的哈希匹配连接在一起的。随后是一个成本为12%的排序任务，接着是成本为0%的流聚合任务，然后是一个成本为8%的排序步骤。计划中其余的任务成本均为0%。


    由于这是一个处理历史数据的查询，我们可以得出结论，我们可以用在几个示例中使用的报告表策略替换`CTE`部分。


    让我们看一下`IO`和`TIME`统计信息。


    请参考图 [9-4](#527021_1_En_9_Chapter.xhtml#Fig4)。


    ![截图显示了屏幕上部的代码。下部显示了消息。方框内描绘了扫描计数、逻辑读取和物理读取。](images/527021_1_En_9_Chapter/527021_1_En_9_Fig4_HTML.jpg)


    图 9-4 IO 和 TIME 统计信息


    物理表上的扫描计数值为1，而`EquipmentFailure`事实表和`Calendar`维度表上的逻辑读取值为24。`STAR`查询中使用的其余维度表的逻辑读取值为1，除`Calendar`维度外，所有事实表和维度表的物理读取值均为1。


    SQL执行的经过时间为98毫秒。


    让我们看一个访问包含超过30,000行的表的查询，看看我们能得到什么样的性能。这个查询与之前的查询类似，但我们在`SELECT`子句中添加了更多列以生成更详细的报告。


    我们将仅过滤出2002年和设备状态码为“0001”的行，以限制报告的大小。


    请参考代码清单 [9-2](#527021_1_En_9_Chapter.xhtml#PC2)。


    ```sql

    SELECT ES.StatusYear AS ReportYear

    ,ES.StatusMonth AS Reportmonth

    ,CASE

    WHEN ES.StatusMonth = 1 THEN ''Jan''

    WHEN ES.StatusMonth = 2 THEN ''Feb''

    WHEN ES.StatusMonth = 3 THEN ''Mar''

    WHEN ES.StatusMonth = 4 THEN ''Apr''

    WHEN ES.StatusMonth = 5 THEN ''May''

    WHEN ES.StatusMonth = 6 THEN ''Jun''

    WHEN ES.StatusMonth = 7 THEN ''Jul''

    WHEN ES.StatusMonth = 8 THEN ''Aug''

    WHEN ES.StatusMonth = 9 THEN ''Sep''

    WHEN ES.StatusMonth = 10 THEN ''Oct''

    WHEN ES.StatusMonth = 11 THEN ''Nov''

    WHEN ES.StatusMonth = 12 THEN ''Dec''

    END AS MonthName

    ,EP.LocationId

    ,L.LocationName

    ,ES.EquipmentId

    ,StatusCount

    ,RANK() OVER(

    PARTITION BY ES.EquipmentId --,ES.StatusYear

    ORDER BY ES.EquipmentId ASC,ES.StatusYear ASC,StatusCount DESC

    ) AS NoFailureRank

    ,ES.EquipOnlineStatusCode

    ,ES.EquipOnLineStatusDesc

    ,EP.PlantId

    ,P.PlantName

    ,P.PlantDescription

    ,ES.EquipAbbrev

    ,EP.UnitId

    ,EP.UnitName

    ,E.SerialNo

    FROM Reports.EquipmentRollingMonthlyHourTotals ES -- 30,000 rows plus

    INNER JOIN DimTable.Equipment E

    ON ES.EquipmentId = E.EquipmentId

    INNER JOIN [DimTable].[PlantEquipLocation] EP

    ON ES.EquipmentId = EP.EquipmentId

    INNER JOIN DimTable.Plant P

    ON EP.PlantId = P.PlantId

    INNER JOIN DimTable.Location L

    ON EP.PlantId = L.PlantId

    AND EP.LocationId = L.LocationId

    WHERE ES.StatusYear = 2002

    AND ES.EquipOnlineStatusCode = ''0001''

    GO

    ```


    代码清单 9-2 在大表上执行排名


    我们看到包含了一个`CASE`代码块来生成月份名称，并且我们将大的报告表连接到了四个维度表。为了限制报告的大小，我们只想查看在线状态码为“0001”的设备的排名。这代表“在线
    – 正常运行”。


    我们也想查看2002日历年的数据，所以注意`OVER()`子句中的`PARTITION BY`子句里的年份列被注释掉了。如果你想要更多年份，只需将其注释掉并修改`WHERE`子句的过滤条件即可。


    让我们看看结果。


    请参考图 [9-5](#527021_1_En_9_Chapter.xhtml#Fig5)。


    ![一张表格的截图。方框内包含了前12列条目，标题为扫描计数和故障排名编号。](images/527021_1_En_9_Chapter/527021_1_En_9_Fig5_HTML.jpg)


    图 9-5 2002年故障排名


    如图所示，对于工厂`PL00001`（即北厂）锅炉房的设备而言，2002年10月是设备在线的最佳月份。所讨论的设备是阀门`P1L1VLV1`。这是一个很大的报告，因此它是数据透视表的理想候选，你可以使用过滤器来缩小分析设备的范围并改变它！


    请参考图 [9-6](#527021_1_En_9_Chapter.xhtml#Fig6)。


    ![SQL窗口截图，顶部有一个菜单栏。主屏幕显示了行标签、报告年份的总和以及报告月份的总和。右侧显示了数据透视表字段。](images/527021_1_En_9_Chapter/527021_1_En_9_Fig6_HTML.png)


    图 9-6 详细的工厂在线状态数据透视表


    这种方式灵活且强大得多，因为我们可以对结果进行切片和切块，也可以限制某些参数，如工厂、位置和设备。


    > **注意**

    >

    > 如果你的公司不使用`SSAS`来创建多维数据集，那么微软`Excel`的数据透视表是一个很好的替代品。


    自己尝试这种方法，并修改查询以使其返回所有年份、所有工厂和所有位置的数据。还有所有设备！现在我们看到，我们的工具包不仅包括窗口函数，还包括微软`Excel`，这样我们就可以生成图表和数据透视表。


    让我们看看这个查询的性能如何。'
  raw: '### Performance Considerations


    We generate our baseline estimated query performance plan in the usual manner.
    It is a big one.


    Please refer to Figure [9-3](#527021_1_En_9_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig3_HTML.png)


    A screenshot presents the execution plan page. The arrows indicate the cost percent
    of 8 and 12 percent for sort, 11, 10, and 21 percent for the hash match, 10 percent
    for clustered index, and 11 percent for table scan


    Figure 9-3


    Baseline estimated query plan


    The first thing we can see is that no index was suggested. We see a clustered
    index scan with a cost of 10% plus five table scans, each with a cost of 1% except
    for the table scan on the `Calendar` table, which chimes in at a cost of 11%.


    Seems like all the streams of rows are joined via a series of hash match joins
    at costs ranging from 21% to 10%. A sort task follows with a cost of 12% followed
    by a stream aggregate task at 0% cost and then a sort step at 8%. The rest of
    the tasks in the plan are at 0% cost.


    Since this is a query that works on historical data, we can conclude that we can
    replace the `CTE` portion with the report table strategy we have been using in
    several of our examples.


    Let’s take a peek at the `IO` and `TIME` statistics.


    Please refer to Figure [9-4](#527021_1_En_9_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig4_HTML.jpg)


    A screenshot presents the codes in the upper portion of the screen. The lower
    portion presents the messages. The inboxed region depicts the scan count, logical
    reads, and physical reads.


    Figure 9-4


    IO and TIME statistics


    The scan counts on physical tables have a value of 1, while the logical reads
    on the `EquipmentFailure` fact table and the `Calendar` dimension have values
    of 24\. The remaining dimension tables used in the `STAR` query have logical read
    values of 1, and all fact and dimension tables except for the Calendar dimension
    have physical reads of 1.


    Elapsed time for the SQL execution time is 98 ms.


    Let’s look at a query that accesses a table with over 30,000 rows and see what
    type of performance we get. This query is similar to the prior query, but we add
    more columns in the `SELECT` clause to produce a more detailed report.


    We will filter out rows for the year 2002 and equipment status code “0001” only
    to limit the size of the report.


    Please refer to Listing [9-2](#527021_1_En_9_Chapter.xhtml#PC2).


    ```

    SELECT ES.StatusYear AS ReportYear

    ,ES.StatusMonth AS Reportmonth

    ,CASE

    WHEN ES.StatusMonth = 1 THEN ''Jan''

    WHEN ES.StatusMonth = 2 THEN ''Feb''

    WHEN ES.StatusMonth = 3 THEN ''Mar''

    WHEN ES.StatusMonth = 4 THEN ''Apr''

    WHEN ES.StatusMonth = 5 THEN ''May''

    WHEN ES.StatusMonth = 6 THEN ''Jun''

    WHEN ES.StatusMonth = 7 THEN ''Jul''

    WHEN ES.StatusMonth = 8 THEN ''Aug''

    WHEN ES.StatusMonth = 9 THEN ''Sep''

    WHEN ES.StatusMonth = 10 THEN ''Oct''

    WHEN ES.StatusMonth = 11 THEN ''Nov''

    WHEN ES.StatusMonth = 12 THEN ''Dec''

    END AS MonthName

    ,EP.LocationId

    ,L.LocationName

    ,ES.EquipmentId

    ,StatusCount

    ,RANK() OVER(

    PARTITION BY ES.EquipmentId --,ES.StatusYear

    ORDER BY ES.EquipmentId ASC,ES.StatusYear ASC,StatusCount DESC

    ) AS NoFailureRank

    ,ES.EquipOnlineStatusCode

    ,ES.EquipOnLineStatusDesc

    ,EP.PlantId

    ,P.PlantName

    ,P.PlantDescription

    ,ES.EquipAbbrev

    ,EP.UnitId

    ,EP.UnitName

    ,E.SerialNo

    FROM Reports.EquipmentRollingMonthlyHourTotals ES -- 30,000 rows plus

    INNER JOIN DimTable.Equipment E

    ON ES.EquipmentId = E.EquipmentId

    INNER JOIN [DimTable].[PlantEquipLocation] EP

    ON ES.EquipmentId = EP.EquipmentId

    INNER JOIN DimTable.Plant P

    ON EP.PlantId = P.PlantId

    INNER JOIN DimTable.Location L

    ON EP.PlantId = L.PlantId

    AND EP.LocationId = L.LocationId

    WHERE ES.StatusYear = 2002

    AND ES.EquipOnlineStatusCode = ''0001''

    GO

    Listing 9-2

    Perform Ranking on a Large Table

    ```


    We see a `CASE` block has been included in order to generate the month names,
    and we are joining the large report table to four dimension tables. To limit the
    size of the report, we only want to see rankings for equipment that has an online
    status code of “0001.” This stands for “online – normal operation.”


    We also want to see data for the calendar year 2002, so notice that the year column
    was commented out in the `OVER()` clause `PARTITION BY` clause. If you want more
    years, just comment it out and modify the `WHERE` clause filter.


    Let’s see the results.


    Please refer to Figure [9-5](#527021_1_En_9_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig5_HTML.jpg)


    A screenshot presents a table. It inboxes the first 12 column entries titled start
    count and number of failure rank.


    Figure 9-5


    Ranking failures for 2002


    As can be seen, October 2002 was the best month for the equipment being online
    for the boiler room in plant `PL00001,` which is the North Plant. The equipment
    in question is valve `P1L1VLV1`. This is a large report, so it is an ideal candidate
    for a pivot table so you can narrow down the scope of equipment being analyzed
    and change it by using filters!


    Please refer to Figure [9-6](#527021_1_En_9_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig6_HTML.png)


    A screenshot of the S Q L window presents a menu bar at the top. The main screen
    presents the row labels, the sum of the report year, and the sum of the report
    month. On the right, it presents the pivot table fields.


    Figure 9-6


    Detailed plant online status pivot table


    This is a lot more flexible and powerful as we can slice and dice the results
    and also limit certain parameters like plant, location, and equipment.


    Note


    If your company does not use SSAS (SQL Server Analysis Services) to create multidimensional
    cubes, Microsoft Excel pivot tables are a good substitute.


    Try this approach on your own and modify the query so that it returns data for
    all years, plants, and locations. All equipment also! Now we see that our toolkit
    includes not only the window functions but also Microsoft Excel so we can produce
    graphs and pivot tables.


    Let’s see how this query performs.'
