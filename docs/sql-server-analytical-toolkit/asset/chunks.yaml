  trans: "\n### 性能考量\n\n这次，在我们的性能分析中，我们将深入探讨 `PROFILE` 统计数据，并将其与图形化估计查询计划中出现的任务进行比较。这可能会有点深入细节，但值得付出努力，因为您将掌握大量信息，这些信息将协助您进行性能分析工作。请记住，您需要在执行查询前执行以下命令来生成\
    \ profile 统计数据（别忘了关闭它）：\n\n```\nSET STATISTICS PROFILE ON\nGO\n```\n\n> 注意\n>\
    \ \n> 在本次讨论中，请参考图 5-44a 到图 5-44h。\n\n像往常一样，我们首先以通常的方式生成一个估计查询计划。首先，我们检查那些具有高成本的节点。记住，在估计执行计划中，我们从右向左开始。\n\
    \n请参考图 5-44a。\n\n![](img/527021_1_En_5_Fig46_HTML.png)\n\n图 5-44a\n标准差查询的估计执行计划\n\
    \n因篇幅所限未显示的是计划最左侧的一个排序任务，其成本为 33%，但我们稍后会讨论它。\n\n有四个高成本任务：\n*   一个索引查找，成本 19%\n\
    *   第一个排序任务，成本 44%\n*   窗口假脱机任务，成本 3%\n*   第二个排序任务，成本 33%\n\n我们可以通过将鼠标悬停在节点上，让带有统计数据的弹出提示面板出现，来查看每个节点的\
    \ `PROFILE` 统计数据。\n\n请参考图 5-44b。\n\n![](img/527021_1_En_5_Fig47_HTML.png)\n\n\
    图 5-44b\n索引查找节点的 profile 统计数据\n\n这个索引查找是由 `WHERE` 子句谓词引起的。如果您查看节点中的列，它们与 `WHERE`\
    \ 子句谓词中的列相匹配。这被称为覆盖索引，正如我们之前所说，索引查找通常比索引扫描更受青睐。\n\n作为验证，如果我们查看名为 statement text\
    \ 的 `PROFILE` 统计数据输出列，我们看到\n\n```\n--Index Seek(OBJECT:(\n[APFinance].[Financial].[Portfolio].\n\
    [ieMonthPortfolioNoPortfolioValueSweepDate]),\nSEEK:(\n[APFinance].[Financial].[Portfolio].[Year]=(2012)\n\
    AND [APFinance].[Financial].[Portfolio].[CustId]='C0000001'\n),\nWHERE:([APFinance].[Financial].[Portfolio].[Portfolio]\n\
    ='CASH - FINANCIAL PORTFOLIO')\nORDERED FORWARD\n)\n```\n\n读起来有点晦涩，但我们可以清楚地看到驱动索引查找的\
    \ `WHERE` 子句。\n\n接下来，让我们看看那个昂贵的 44% 排序。\n\n请参考图 5-44c。\n\n![](img/527021_1_En_5_Fig48_HTML.png)\n\
    \n图 5-44c\n排序步骤的 profile 统计数据\n\n查看 profile 统计数据输出，它告诉我们排序是按月份、投资组合编号和清算日期进行的：\n\
    \n```\n--Sort(ORDER BY:(\n[APFinance].[Financial].[Portfolio].[Month] ASC,\n[APFinance].[Financial].[Portfolio].[PortfolioNo]\
    \ ASC,\n[APFinance].[Financial].[Portfolio].[SweepDate] ASC\n)\n)\n```\n\n此排序是索引查找的输出。\n\
    \n如果我完全移除 `WHERE` 子句，排序参数看起来会是这样。请参考图 5-44d。\n\n![](img/527021_1_En_5_Fig49_HTML.png)\n"
- fmt: "A screenshot of `c h 0 5 aggregate queries s q l`. The top half screen presents\
    \ some programming codes. The bottom half screen presents the messages and execution\
    \ plan. A pop-up panel presents sort profile statistics. The output list is highlighted\
    \ in a box.\n\n**Figure 5-44d**\n\n### Sort tip if the `WHERE` clause is removed\n\
    \nNotice the extra columns that are now included in the sort.\n\nNext is the stream\
    \ aggregate step. I did not generate a screenshot of this step, but it is used\
    \ to generate sums via the `SUM()` function in the `CTE` query:\n\n```\n--Stream\
    \ Aggregate(\n    GROUP BY:([APFinance].[Financial].[Portfolio].[Month],\n   \
    \     [APFinance].[Financial].[Portfolio].[PortfolioNo],\n        [APFinance].[Financial].[Portfolio].[SweepDate])\n\
    \    DEFINE:([Expr1003]=SUM([APFinance].[Financial].[Portfolio].[Value]),\n  \
    \      [APFinance].[Financial].[Portfolio].[CustId]\n        =ANY([APFinance].[Financial].[Portfolio].[CustId]),\n\
    \        [APFinance].[Financial].[Portfolio].[Year]=\n        ANY([APFinance].[Financial].[Portfolio].[Year]),\n\
    \        [APFinance].[Financial].[Portfolio].[Portfolio]\n        =ANY([APFinance].[Financial].[Portfolio].[Portfolio])\n\
    \    )\n)\n```\n\nEven though the `CTE` `GROUP BY` includes the following columns\n\
    \n```\nGROUP BY CustId,PortfolioNo,Year,Month,SweepDate,Portfolio\n```\n\nit only\
    \ sorts by month, portfolio, and sort date because we are filtering by year and\
    \ customer in the `WHERE` clause.\n\nSame as before, if I remove the `GROUP BY`\
    \ clause in the `CTE`, this step is modified to include the missing columns:\n\
    \n```\n|--Stream Aggregate(\n    GROUP BY:(\n        [APFinance].[Financial].[Portfolio].[Portfolio],\n\
    \        [APFinance].[Financial].[Portfolio].[Month],\n        [APFinance].[Financial].[Portfolio].[CustId],\n\
    \        [APFinance].[Financial].[Portfolio].[PortfolioNo],\n        [APFinance].[Financial].[Portfolio].[Year],\n\
    \        [APFinance].[Financial].[Portfolio].[SweepDate]\n    )\n    DEFINE:([Expr1003]=SUM([APFinance].[Financial].[Portfolio].[Value])))\n\
    ```\n\n> **Tip**\n>\n> Make sure you include only the columns you need in the\
    \ `GROUP BY`, `ORDER BY`, `OVER()`, and `WHERE` clauses to improve performance\
    \ and to make sure the optimizer does not have to do extra work to ignore columns\
    \ that are not needed.\n\nNext on deck is the window spool task at 3% generated\
    \ by the default `RANGE` clause.\n\nPlease refer to Figure [5-44e](#527021_1_En_5_Chapter.xhtml#Fig50).\n\
    \n![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig50_HTML.png)\n\nA screenshot\
    \ of `c h 0 5 aggregate queries s q l`. The top half screen presents some programming\
    \ codes. The bottom half screen presents the messages and execution plan. A pop-up\
    \ panel presents window spool profile statistics.\n\n**Figure 5-44e**\n\n### Profile\
    \ statistics for window spool\n\nRecall from our discussions that the window spool\
    \ task is used to load rows into memory or temporary storage that need to be processed\
    \ repeatedly. In our case, this is generated by the `OVER()` clause, specifically\
    \ the default `RANGE` clause.\n\nThis is used to calculate the sum and standard\
    \ deviation values. If we look at the query, the `ORDER BY` clause in the `OVER()`\
    \ clause sorts by portfolio and month. Look at the profile statistics details\
    \ for the window spool in Figure [5-44f](#527021_1_En_5_Chapter.xhtml#Fig51).\n\
    \n![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig51_HTML.jpg)\n\nA screenshot\
    \ of `c h 0 5 aggregate queries s q l`. The top half screen presents some programming\
