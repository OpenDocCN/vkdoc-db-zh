    If it works, don''t fix it. Do not create clustered indexes or other types of
    indexes if they are not used.


    ### Memory-Optimized Table Approach


    Well, our first two attempts to improve performance did not yield impressive results.
    So now we try the memory-optimized table approach. Recall the main steps:


    *   Create a file group for the memory-optimized table.


    *   Create one or more files and assign them to the file group.


    *   Create the table with the directives to make it a memory-optimized table.


    *   Load the memory-optimized table.


    *   Reference the table in your queries.


    I suggest you keep a template script for the first four steps so you can quickly
    create the objects you need for a new memory-optimized table.


    Tip


    Create a folder with templates you might need to create scripts, database objects,
    and not to mention system table queries to retrieve metadata about database objects,
    like listing the columns in a table. Include templates for creating stored procedures,
    functions, and triggers.


    Let’s look at the code.


    #### Create a File and File Group


    Let’s start with creating the file group we need. Please refer to Listing [8-20](#527021_1_En_8_Chapter.xhtml#PC28).


    ```

    /************************************************/

    /* CREATE FILE GROUP FOR MEMORY OPTIMIZED TABLE */

    /************************************************/

    ALTER DATABASE [APPlant]

    ADD FILEGROUP AP_PLANT_MEM_FG

    CONTAINS MEMORY_OPTIMIZED_DATA

    GO

    Listing 8-20

    Step 1: Create the File Group for the Memory-Optimized Table

    ```


    The only difference between this `ALTER` command and other `ALTER` commands used
    to create memory-optimized tables is that we add the directive `CONTAINS MEMORY_OPTIMIZED_DATA`.


    The next step is to add one file to the file group. Please refer to Listing [8-21](#527021_1_En_8_Chapter.xhtml#PC29).


    ```

    /*****************************************************/

    /* ADD FILE TO FILE GROUP FOR MEMORY OPTIMIZED TABLE */

    /*****************************************************/

    ALTER DATABASE [APPlant]

    ADD FILE

    (

    NAME = AP_PLANT_MEME_DATA,

    FILENAME = ''D:\APRESS_DATABASES\AP_PLANT\MEM_DATA\AP_PLANT_MEM_DATA.NDF''

    )

    TO FILEGROUP AP_PLANT_MEM_FG

    GO

    Listing 8-21

    Step 2: Add a File to the File Group for the Memory-Optimized Table

    ```


    This is a standard `ALTER DATABASE` command for adding a file, but notice that
    there are no size parameters. This is a characteristic of files associated with
    memory-optimized tables.


    Two points:


    Question: Why are we creating physical files if the table is in memory.


    Answer: We need physical space in case we run out of memory and need somewhere
    to park the data when the server is shut off.


    Make sure the `FILENAME` identifier points to a drive on your own laptop or workstation.


    Question: If we need a physical file stored on disk, what should we use?


    Answer: If management can afford the price tag or if you can, use a solid-state
    drive for these types of files.


    Next step.


    #### Create the Memory-Optimized Table


    Now that we have created the file group and one file, we need to create the actual
    memory-optimized table. Please refer to Listing [8-22](#527021_1_En_8_Chapter.xhtml#PC30).


    ```

    CREATE TABLE Reports.EquipmentFailureStatisticsMem(

    CalendarYear               SMALLINT        NOT NULL,

    QuarterName                VARCHAR(11)     NOT NULL,

    MonthName                  VARCHAR(9)      NOT NULL,

    CalendarMonth              SMALLINT        NOT NULL,

    PlantName                  VARCHAR(64)     NOT NULL,

    LocationName               VARCHAR(128)    NOT NULL,

    EquipmentId                VARCHAR(8)      NOT NULL,

    CountFailureEvents         INT             NOT NULL,

    SumEquipmentFailure        INT             NOT NULL

    INDEX [ieEquipFailStatMem]       NONCLUSTERED

    (

    PlantName     ASC,

    LocationName  ASC,

    CalendarYear  ASC,

    CalendarMonth ASC,

    EquipmentId   ASC

    )

    )WITH (MEMORY_OPTIMIZED = ON , DURABILITY = SCHEMA_ONLY )

    GO

    Listing 8-22

    Step 3: Create the Memory-Optimized Table

    ```


    The command starts off like any other normal `CREATE TABLE` command, but we need
    to specify a non-clustered index and add the directive to make this a memory-optimized
    table.


    #### Load the Memory-Optimized Table


    Now that we have created the file group, one file attached to the file group,
    and the memory-optimized table itself, we need to load the actual memory-optimized
    table.


    Please refer to Listing [8-23](#527021_1_En_8_Chapter.xhtml#PC31).


    ```

    /***********************************/

    /* LOAD THE MEMORY OPTIMIZED TABLE */

    /***********************************/

    TRUNCATE TABLE Reports.EquipmentFailureStatisticsMem

    GO

    INSERT INTO Reports.EquipmentFailureStatisticsMem

    SELECT * FROM Reports.EquipmentFailureStatistics

    GO

    Listing 8-23

    Step 4: Load the Memory-Optimized Table

    ```


    Standard `INSERT` command from a query that retrieves rows from the original table
    to the new memory-optimized table. Use this coding style just for development;
    remember `SELECT *` is frowned upon.


    Lastly, I will not show the code for the query as it is the same query we discussed
    in the beginning of the section; all we did was change the name of the table in
    the `FROM` clause to


    ```

    Reports.EquipmentFailureStatisticsMem

    ```'
