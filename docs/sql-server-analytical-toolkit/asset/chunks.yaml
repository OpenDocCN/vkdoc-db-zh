    ![](img/527021_1_En_10_Fig17_HTML.png)


    一个 `SQL` `SSMS` 窗口的截图。文本展示了 2 组 `IO` 和 `TIME` 统计数据。在第一次和第二次中，解析和编译时间的 `CPU` 和已用时间分别为
    15、28 毫秒和 0、65 毫秒。第二次执行时间的 `CPU` 和已用时间分别为 0 和 170 毫秒。影响了 1011 行。


