  trans: '## 库存数据仓库


    接下来，我们将查看第二个数据库，这是一个实现为 `SNOWFLAKE`（雪花）模式的数据仓库。此数据仓库是从 `APInventory` 数据库加载的。本章将包含一节，介绍如何使用
    SQL Server Integration Services（`SSIS`）来加载这个简单的数据仓库。


    图 11-2 是我们示例数据仓库的简化 `SNOWFLAKE` 模式。


    ![](img/527021_1_En_11_Fig2_HTML.jpg)


    一个框图展示了一个概念模型。一个标题为"库存历史"的方框位于中央，并与其父项相连。父项描绘了日历、地点、仓库和产品。产品的父项是产品类型，地点的父项是国家。


    图 11-2


    库存数据仓库概念模型


    此模型中的核心业务对象是 `库存历史` 对象，它将作为数据仓库中事实表的基础。与 `APInventory` 数据库中库存出入相关的存储历史数据将存储在此对象中。


    围绕 `库存历史` 业务对象的是用于在数据仓库中创建维度的各种实体。这些实体基本上与我们在 `APInventory` 数据库中讨论的相同，其动词短语清晰地阐述了历史
    `库存历史` 对象与未来维度表之间的业务关系。例如，产品类型标识产品的类型，比如蒸汽机车类型。


    以下是数据仓库模型相关的物理表名、分配的模式和主键信息。


    请参考表 11-2。


    表 11-2


    库存数据仓库表


    | 表 | 类型 | 主键 |

    | --- | --- | --- |

    | Calendar | 维度表 | CalendarKey |

    | Country | 维度表 | CountryKey |

    | Inventory | 维度表 | InvKey |

    | Location | 维度表 | LocKey |

    | Product | 维度表 | ProdKey |

    | Product Type | 维度表 | ProdTypeKey |

    | Warehouse | 维度表 | WhKey |

    | Inventory History | 事实表 | CalendarKey, LocKey, WhKey, ProdKey, ProdTypeKey |


    从技术上讲，`Warehouse` 表应该包含 `Location` 和 `Inventory` 的主代理键，但为了简化模型和加载脚本，我在这里做了一点设计上的捷径。


    接下来，我将为你的工具箱介绍一个新工具。这个工具叫做 `SSIS`（SQL Server Integration Services），它是 Microsoft
    的顶级 `ETL`（提取、转换、加载）工具。我们将使用这个工具从事务性库存数据库中加载我们的数据仓库。


    创建这两个数据库的所有代码都可以在 Apress 网站本书的章节文件夹中找到。


    ## 加载库存数据仓库


    `SSIS` 代表 SQL Server Integration Services，它是一个图形化工具，允许用户为任何数据集成过程创建称为控制流和数据流的过程流。控制流定义了为提取、转换和加载数据而需要执行任务的步骤和顺序，而数据流则允许数据架构师指定数据的流向和低级别的转换任务。根据数据分发的需求，流程可以是顺序的，也可以包含多个分支。


    `SSIS` 创建称为包的应用程序。在每个包内，有一系列定义并执行处理数据的低级别步骤的任务。因此，我们可以说 `SSIS` 由控制流和数据流、包以及任务组成。一个
    `SSIS` 项目可以包含一个或多个包，这些包可以相互调用以定义非常复杂的数据集成和转换流程。


    工具箱提供了所有可能需要的任务，解决方案资源管理器面板允许定义所需的数据源和连接。让我们来探索一下这个工具的主要功能。


    请参考图 11-3。


    ![](img/527021_1_En_11_Fig3_HTML.jpg)


    一个窗口的截图，顶部是菜单栏，左侧是工具箱列表，右侧是解决方案资源管理器。中间区域显示了标题为 `package.dtsx` 的页面。


    图 11-3


    创建项目


    这并非一个详尽的 `SSIS` 教程。其目的是让你对这个工具有足够的熟悉度，以便能够创建简单的加载流程并自行探索该工具。有许多优秀的书籍和课程可以帮助你提升到更高的技能水平。


    GUI（图形用户界面）由四个主要面板组成：


    *   **SSIS 工具箱**：包含你流程中需要的所有低级别任务，例如 FTP 任务。

    *   **设计区域**：包含用于创建控制流和数据流的 GUI，用于标识 `ETL` 包中使用的参数，以及事件处理程序和包资源管理器。

    *   **解决方案资源管理器**：在这里你可以标识项目参数、连接管理器、你将需要的 `SSIS` 包、包部件以及用于存放杂项组件的文件夹，还有链接的 Azure
    资源。

    *   **连接管理器**：标识到数据库、其他服务器甚至 `SSAS`（SQL Server Analysis Services）服务器的连接。


    右键单击解决方案资源管理器中的文件夹将弹出菜单，用于添加新组件，例如连接。


    现在让我们开始创建我们的包（我们的项目将只有一个包）。第一个任务是创建连接管理器。


    请参考图 11-4。


    ![](img/527021_1_En_11_Fig4_HTML.jpg)


    一个窗口的截图，顶部是菜单栏，左侧是工具箱列表，右侧是解决方案资源管理器。中间区域描绘了一个标题为 `添加 SSIS 连接管理器` 的对话框。


    图 11-4


    添加连接管理器


    右键单击 `连接管理器` 文件夹，会弹出一个对话框，允许你查看并选择所需的连接管理器。就我们的目的而言，我们需要第一个名为 `ADO`（Active X Data
    Objects）的选项，因此我们选择它并单击 `添加` 按钮。请注意列表框，其中包含许多数据源，如 Hadoop 和 Excel。


    接下来，我们需要定义安全信息。请参考图 11-5。


    ![](img/527021_1_En_11_Fig5_HTML.jpg)


    一个窗口的截图，顶部是菜单栏，左侧是工具箱列表，右侧是解决方案资源管理器。中间区域描绘了标题为 `连接管理器` 的对话框。底部的消息框显示 `测试连接成功`。


    图 11-5


    配置连接管理器'
- fmt: '# 创建并执行SSIS包


    在此步骤中，我们选择要连接的服务器、身份验证信息以及要连接的数据库。在本例中，我们需要`APInventory`数据库。我们还希望测试连接以确保所有信息都被正确识别。如图所示，测试连接成功。现在我们已准备好创建控制流。


    请参考图[11-6](#527021_1_En_11_Chapter.xhtml#Fig6)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig6_HTML.jpg)


    窗口截图显示顶部有菜单栏，左侧有工具箱列表，右侧有解决方案资源管理器。中间区域描绘了一个标题为`package.dtsx`的页面，并显示一条消息：“Execute
    SQL Task”。


    **图 11-6**

    添加SQL任务


    我们将创建的简单包将是一系列通过控制流连接（在“控制流”选项卡中完成）连接起来的任务。每个任务将执行一个简单的`TSQL INSERT`命令，该命令从`APInventory`数据库中的一个表中提取数据，并将其加载到`APInventoryWarehouse`数据仓库中的对应表中。


    我将引导您完成完成第一个步骤所需的步骤。所有其他步骤都是相同的，只是`TSQL INSERT`命令会根据我们使用的表对进行更改。


    首先，将“Execute SQL Task”从`SSIS`工具箱拖放到设计区域。


    接下来，我们需要在刚刚添加的新任务中建立到数据库的连接。


    请参考图[11-7](#527021_1_En_11_Chapter.xhtml#Fig7)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig7_HTML.jpg)


    窗口截图显示顶部有菜单栏，左侧有工具箱列表，右侧有解决方案资源管理器。中间区域描绘了一个标题为“Configure OLE DB Connection Manager”的对话框。


    **图 11-7**

    在SQL任务中添加连接


    双击该任务，会弹出一个名为“Execute SQL Task Editor”的对话框。在显示“SQL Statement”的地方，点击“Connection”文本框右侧的小向下箭头按钮，然后选择“New
    connection”。


    此时会出现“Connection Manager”面板，您需要填写我们将要使用的SQL服务器名称以及身份验证（用户ID和密码）方法。最后选择要连接的数据库，别忘了测试连接。如果您已经创建了连接，只需选择现有连接而不是选择“New
    connection”即可。


    单击“确定”按钮，我们继续下一步。


    请参考图[11-8](#527021_1_En_11_Chapter.xhtml#Fig8)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig8_HTML.jpg)


    窗口截图显示顶部有菜单栏，左侧有工具箱列表，右侧有解决方案资源管理器。中间区域描绘了一个标题为“Enter SQL Query”的对话框。


    **图 11-8**

    向SQL任务添加TSQL INSERT查询


    现在我们需要将以下小型TSQL脚本添加到任务中。


    请参考清单[11-1](#527021_1_En_11_Chapter.xhtml#PC1)。


    ```

    TRUNCATE TABLE APInventoryWarehouse.Dimension.Calendar

    GO

    INSERT INTO APInventoryWarehouse.Dimension.Calendar

    SELECT CalendarYear,CalendarQtr,CalendarMonth,CalendarDate

    FROM APInventory.MasterData.Calendar

    GO

    -- Listing 11-1

    -- Load the Calendar Dimension

    ```


    如您所见，它包含两个命令：一个用于截断`Calendar`表，另一个是`INSERT/SELECT`组合，从`APInventory`事务数据库中的`Calendar`表中提取数据，并将其加载到`APInventoryWarehouse`数据仓库中的`Calendar`维度表。


    建议使用完全限定的表名，即`<database>.<schema>.<table name>`，这样您就不会遇到问题！


    接下来，我们拖放所需的剩余“Execute SQL Tasks”并连接它们。


    请参考图[11-9](#527021_1_En_11_Chapter.xhtml#Fig9)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig9_HTML.jpg)


    窗口截图显示顶部有菜单栏，左侧有工具箱列表，右侧有解决方案资源管理器。中间区域描绘了`package.dtsx`的控制流页面。它显示了一个块流程图，代表一个圆圈，每个任务旁边都有一个叉号。


    **图 11-9**

    添加其他Execute SQL Tasks


    注意所有带有`X`标签的小红圈，表示错误。这是因为我们尚未添加连接和查询信息。运行包时，您不希望看到这些错误标记。


    每次将新的“Execute SQL Task”拖放到设计窗格时，您都会看到一个指向下方的小绿色箭头。这是您需要单击并拖动以附加到控制流序列中下一个任务以建立路径的箭头。如果它是序列中的最后一个任务，则无需将绿色箭头附加到任何内容；您可以直接忽略它。


    您还可以拖放另一个“Execute SQL Task”，并将其命名为类似“Log Error”的名称。在其中，您可以放置一些`TSQL`逻辑来捕获SQL Server错误代码和消息，并将它们插入日志表。您需要单击原始的SQL任务，使小绿色箭头出现，然后将其附加到日志错误任务。


    最后，右键单击新的绿色箭头，并在弹出菜单中单击“Failure”。这将把箭头颜色变为红色。通过这种流程，如果发生错误，流程将被重定向到此任务，错误详细信息将被加载到日志表中，您可以选择继续执行下一个任务或完全停止执行。


    以下是我加载所有任务、建立连接并插入查询后完成的包。


    请参考图[11-10](#527021_1_En_11_Chapter.xhtml#Fig10)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig10_HTML.jpg)


    窗口截图显示顶部有菜单栏，左侧有工具箱列表，右侧有解决方案资源管理器。中间区域描绘了`package.dtsx`的控制流页面。该页面包含一个表示已建立连接的块流程图。


    **图 11-10**

    完成包的创建


    这相当简单，正如他们所说，“a walk in the park”！剩下的就是通过单击菜单栏中间、“ANALYZE”选项下方标有“Start”的绿色箭头来运行该包。


    包运行后，我们应该在每个任务旁边看到绿色箭头。


    请参考图[11-11](#527021_1_En_11_Chapter.xhtml#Fig11)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig11_HTML.jpg)


    截图描绘了`package.dtsx`的控制流页面。该页面显示了一个块流程图，其中除了“load inventory history”任务旁边显示一个带叉的圆圈外，每个任务旁边都有一个复选框。


    **图 11-11**

    测试包


    很不幸，最后一步失败了。结果发现有一个语法错误。我检查了代码，发现我没有完全限定目标表名，因此该步骤失败了。回想一下，我们在第一步中创建的连接是到事务数据库的。除非脚本中的表名包含了数据库名称，否则任务不知道目标表。因此，请记住在所有任务中完全限定所有表名！


    纠正语法错误后，我们重新运行脚本以确保所有内容都已正确加载。这并非必要，因为您可以通过右键单击任务并选择“Execute Task”来单独执行每个任务。


    请参考图[11-12](#527021_1_En_11_Chapter.xhtml#Fig12)。


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig12_HTML.jpg)


    截图描绘了`package.dtsx`的控制流页面。该页面显示了一个块流程图，其中每个任务旁边都有一个复选框。流程从“load calendar”开始，依次是“load
    country”、“product”、“product type”、“warehouse”、“inventory”、“location”和“inventory
    history”。


    **图 11-12**

    第二次测试运行 – 成功'
  raw: 'In this next panel, we select the server we wish to connect to, the authentication
    information, and the database we wish to connect to. In our case we want the `APInventory`
    database. We also want to test the connection to make sure everything was identified
    correctly. As can be seen, the test connection succeeded. We are now ready to
    create our control flow.


    Please refer to Figure [11-6](#527021_1_En_11_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig6_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the page
    titled package dot d t s x and displays a message that reads Execute S Q L task.


    Figure 11-6


    Adding a SQL task


    The simple package we will create will be a series of tasks connected by control
    flow connections (we do this in the Control Flow tab). Each of these tasks will
    execute a simple `TSQL INSERT` command that pulls data from a table in the `APInventory`
    database and loads it into the corresponding table in the `APInventoryWarehouse`
    data warehouse.


    I will walk through the steps required to complete the first step. All other steps
    are identical except that the `TSQL INSERT` command changes to reflect the table
    pairs we are using.


    We begin by dragging and dropping Execute SQL Task from the `SSIS` Toolbox to
    the Design area.


    Next, we need to establish the connection to a database in the new task we just
    added.


    Please refer to Figure [11-7](#527021_1_En_11_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig7_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the dialog
    box titled Configure O L E D B connection manager.


    Figure 11-7


    Adding the connection in the SQL task


    Double-click the task, and a pop-up dialog box called the Execute SQL Task Editor
    appears. Where it says “SQL Statement,” click the small down arrow button to the
    right of the Connection text box and select “New connection.”


    The Connection Manager panel appears, and you need to fill out the SQL server
    name we will use and the authentication (user ID and password) method. Lastly
    select the database to connect to, and don’t forget to test the connection. If
    you already created a connection, you can simply select the existing connection
    instead of selecting “New connection,” and you''re good to go.


    Click the OK button and we proceed to the next step.


    Please refer to Figure [11-8](#527021_1_En_11_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig8_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the dialog
    box titled Enter S Q L query.


    Figure 11-8


    Adding the TSQL INSERT query to the SQL task


    Now we need to add the following small TSQL script to the task.


    Please refer to Listing [11-1](#527021_1_En_11_Chapter.xhtml#PC1).


    ```

    TRUNCATE TABLE APInventoryWarehouse.Dimension.Calendar

    GO

    INSERT INTO APInventoryWarehouse.Dimension.Calendar

    SELECT CalendarYear,CalendarQtr,CalendarMonth,CalendarDate

    FROM APInventory.MasterData.Calendar

    GO

    Listing 11-1

    Load the Calendar Dimension

    ```


    As you can see, it has two commands, one to truncate the `Calendar` table and
    the other the `INSERT/SELECT` combo that pulls data from the `Calendar` table
    in the `APInventory` transaction database and loads it to the `Calendar` dimension
    table in the `APInventoryWarehouse` data warehouse.


    It is recommended to use the fully qualified table name, that is, <database>.<schema>.<table
    name>, so you do not run into issues!


    Next, we drag and drop the remaining Execute SQL Tasks we need and connect them.


    Please refer to Figure [11-9](#527021_1_En_11_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig9_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts a control
    flow page of the package dot d t s x. It displays a block flow diagram that represents
    a circle with a cross beside each task.


    Figure 11-9


    Add other Execute SQL Tasks


    Notice all the small red circles with the X labels indicating an error. That’s
    because we have not added the connection and query information yet. You do not
    want to see these when you run the package as they indicate an error.


    Each time you drop a new Execute SQL Task into the Design pane, you will see a
    small down-pointing green arrow. This is the arrow that you click and drag and
    attach to the next task in the control flow sequence so as to establish the path.
    If it is the last task in the sequence, you do not have to attach the green arrow
    to anything; you can just ignore it.


    You can also drag and drop another Execute SQL Task and call it something like
    Log Error. Inside you would place some `TSQL` logic that traps SQL Server error
    codes and messages and inserts them into a log table. You would click the original
    SQL task so that the little green arrow appears, and you would attach it to the
    log error task.


    Lastly, you would right-click the new green arrow and click “Failure” in the pop-up
    menu. This will turn the arrow color to red. With this flow, if an error occurs,
    the flow is redirected to this task, the error details are loaded into a log table,
    and you have the choice of continuing to the next tasks or stopping execution
    entirely.


    The following is the completed package after I loaded all the tasks and established
    the connections and inserted the queries.


    Please refer to Figure [11-10](#527021_1_En_11_Chapter.xhtml#Fig10).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig10_HTML.jpg)


    A screenshot of the window presents a Menubar at the top, a toolbox list on the
    left, and a solution explorer on the right. The middle region depicts the control
    flow page of package dot d t s x. The page comprises a block flow diagram that
    represents the established connections.


    Figure 11-10


    Completing the package


    This was fairly easy, “a walk in the park” as they say! All that is left to do
    is run the package by clicking the green arrow labeled “Start” in the middle of
    the menu bar, right below the ANALYZE selection.


    The package runs and we should see all green arrows next to each task.


    Please refer to Figure [11-11](#527021_1_En_11_Chapter.xhtml#Fig11).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig11_HTML.jpg)


    A screenshot depicts the control flow page of package dot d t s x. The page displays
    a block flow diagram that represents the checkbox beside each task except load
    inventory history, which displays a circle with a cross.


    Figure 11-11


    Testing the package


    As luck would have it, the last step bombed. Turns out there is a syntax error.
    I examined the code and found out I did not fully qualify the target table name,
    so the step failed. Recall that the connection we created in the first step was
    to the transaction database. The tasks do not know the target unless the database
    name is included in the table name in the script. So remember to fully qualify
    all table names in all the tasks!


    Correcting the syntax error, we rerun the script to make sure everything is loaded
    correctly. This is not necessary as you can execute each task individually by
    right-clicking the task and selecting “Execute Task.”


    Please refer to Figure [11-12](#527021_1_En_11_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig12_HTML.jpg)


    A screenshot depicts the control flow page of package dot d t s x. The page displays
    a block flow diagram that represents the checkbox beside each task. The flow begins
    with the load calendar, followed by load country, product, product type, warehouse,
    inventory, location, and inventory history.


    Figure 11-12


    The second test run – success'
