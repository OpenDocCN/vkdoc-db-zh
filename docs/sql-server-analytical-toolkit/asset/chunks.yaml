    # 8. Plant Use Case: Aggregate Functions


    This is the first of three chapters that will use a power plant business use case
    scenario. A picture will give us an idea of the equipment we need to monitor with
    our window aggregate functions. Please refer to Figure [8-1](#527021_1_En_8_Chapter.xhtml#Fig1).


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig1_HTML.jpg)


    A diagram power plant consists 4 plants P00001, P00002, P00003, and P00004\. Each
    plant has boiler rooms, turbine rooms, generator rooms, X F M R, and Transmission
    power. Each plant has 4 valves and 4 motors.


    Figure 8-1


    Conceptual diagram of a power plant


    We will store information for four power plants in our database. Basically, some
    fuel such as oil or coal is used to heat a furnace, which in turn boils water
    until it turns to steam. The steam spins a turbine, which spins a generator, which
    produces electricity, which is finally transferred to a transformer that steps
    up the voltage so it can be distributed to the regions each plant supports.


    Each power plant will have four valves, four motors, one boiler, one turbine,
    and one generator, which we need to monitor for failures. Failure statistics will
    be stored in a small data warehouse implemented as a snowflake schema. Simple,
    but it will give us a lot of data to analyze via the aggregate window functions.


    How will we do this?


    In this chapter we will take a slightly different approach. We will eliminate
    the use of a `CTE` in almost all the examples. As I was creating the code for
    this chapter, I did use a `CTE`, which was getting repetitive, so I took the code
    and used it for a script that populates a report table. Plus, from prior chapters
    we learned that the preloaded report table approach yields greater performance
    when dealing with historical data. This approach will be used by most examples.


    Also, we will concentrate on report output and graphing the results with minimal
    discussions on performance tuning until the end of the chapter. At the end, we
    will create a complex query that uses most of the aggregate functions and see
    what the report looks like for the example.


    We will try a couple of approaches and see which one works better. You might be
    surprised by the conclusion!


    ## Aggregate Functions


    Here is our list of the aggregate functions under this category. We have seen
    them in prior chapters, but I list them just in case you jumped directly to this
    chapter before reading the other chapters:


    *   COUNT() and SUM()


    *   MAX() and MIN()


    *   AVG()


    *   GROUPING()


    *   STRING_AGG()


    *   STDEV() and STDEVP()


    *   VAR() and VARP()


    Some of the functions we will cover together as they are naturally associated,
    like the `MIN()` and `MAX()` functions, `STDEV()` and `STDEVP()`, and `VAR()`
    and `VARP().` We will use them with the `OVER()` clause, and also without, under
    certain circumstances.


    Since this is the first chapter dealing with the power plant database called `APPlant`,
    we will take a look at a conceptual model of the database and also a few simple
    data dictionaries that describe the entities, attributes, and relationships.


    Recall that a conceptual data model is the first data model that is created with
    cooperation of business analysts so as to define the business scope of the database.
    The conceptual model consists of entities, attributes, and relationships. Following
    the conceptual model, a logical normalized model is created and finally a physical
    database model. This would be for transactional databases. For data warehouses
    and data marts, we would go from the conceptual right to the physical `STAR` or
    `SNOWFLAKE` schema design.


    In our case, we will go from the conceptual data model to a `SNOWFLAKE` schema
    data warehouse model, which is highly denormalized. Our database will contain
    three fact tables, several dimension tables, and two report tables. The fact and
    dimension tables all include surrogate keys to establish the `STAR` relationships,
    while the two report tables do not. They are denormalized tables based on the
    `STAR` tables and are used to generate reports. A few category and type tables
    exist, which will turn the model from a `STAR` schema into a `SNOWFLAKE` schema,
    for example, the relationship between the `Equipment` dimension and the `EquipmentType`
    dimension.


    Lastly, we will see toward the end of the chapter that there is a mistake in the
    design. An important link or association table is missing. We will address this,
    so stay tuned.'
