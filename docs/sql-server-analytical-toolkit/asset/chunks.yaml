    ch 12 排名查询 sql 窗口截图。它以表格形式呈现结果，包含 12 列：库存年份、月份数字、月份名称、地点 I D、地点名称、库存 I D、仓库 I
    D、产品类型、产品 I D、名称、月度在库数量和在库数量排名。


    图 12-6


    SNOWFLAKE 查询结果


    看起来成功了。它在不到一秒的时间内返回了 12 行。此表有 736,320 行，所以我认为到目前为止，我们应该对其性能印象深刻。让我们查看此查询的基线估计查询计划。


