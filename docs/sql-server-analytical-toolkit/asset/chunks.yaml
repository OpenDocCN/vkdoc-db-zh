  trans: '

    ### 性能考量


    图 12-10 是我们估算的基线查询计划。


    ![](img/527021_1_En_12_Fig10_HTML.png)


    一张 `c h 12 ranking query s q l` 窗口的截图。它显示了查询成本的执行计划信息。箭头指向成本为 50% 的 `hash match`、成本为
    5% 的 `compute scalar` 以及成本为 36% 的 `index seek`。其他成本包括 `sort` 成本、`segment` 成本和
    `compute scalar` 成本。


    图 12-10


    估算的基线查询计划


    看来我们建立的索引开始见效了。`index seek` 的成本是 36%。接下来是成本为 5% 的 `compute scalar` 和成本为 50% 的
    `hash match` 连接任务。最后，`sort` 任务的成本是 9%。


    我认为我们需要查看 `STATISTICS PROFILE` 的值，以确切了解这三个任务中发生了什么。让我们列出这些任务中使用的表达式，以便知道要查看什么：


    *   `Compute Scalar:` Expr 1003, Expr 1004, Expr 1005

    *   `Hash Match:` Expr 1004, Expr 1005

    *   `Sort:` Expr 1004, Expr 1005, Expr 1006


    那么这些表达式中使用了什么逻辑？


    请参阅图 12-11。


    ![](img/527021_1_En_12_Fig11_HTML.png)


    一张 `c h 12 ranking query s q l` 窗口的截图。它显示了 `static profile` 值的结果信息，以及一段 6 行的代码。两个箭头分别指向
    `compute scalar`、`Expression 1003` 和 `Expression 1004`。`Hash match` 被高亮显示。


    图 12-11


    `RANK()` 与 `DENSE_RANK()` 查询的统计配置文件


    这组统计信息深入揭示了查询的处理细节以及问题点可能所在。如果我们查看 `statement text` 列，就能明白具体情况。


    图中未显示 `Expr1003`，但其值如下：


    *   `Expr1003`=`datepart(year,[APInventory].[Product].[InventoryTransaction].[MovementDate])`,


    以下是表达式 `Expr1004` 和 `Expr1005`：


    *   `Expr1004`=`datepart(quarter,[APInventory].[Product].[InventoryTransaction].[MovementDate])`

    *   `Expr1005`=`datepart(month,[APInventory].[Product].[InventoryTransaction].[MovementDate])`


    这告诉我们，`DATEPART()` 函数调用是导致 `hash match` 任务成本高昂的原因。我们可以通过使用 `Calendar` 表来检索这些值以解决这个问题，尽管这会带来对
    `Calendar` 表进行 `JOIN` 操作的成本（我们创建的聚集索引会有所帮助）。


    这是在 `sort` 任务和 `compute scalar` 任务中使用的 `Expr1006`：


    *   `Expr1006`=`CASE WHEN [Expr1013]=(0) THEN NULL ELSE [Expr1014] END))`


    看起来这是一个 `CASE` 代码块？显然，提取这些日期部分正在推高这些任务的成本。等等。我们需要看看 `Expr1013` 和 `Expr1014`。我们真的深入到细节中了：


    *   `Expr1013`=`COUNT_BIG([APInventory].[Product].[InventoryTransaction].[Decrement])`

    *   `Expr1014`=`SUM([APInventory].[Product].[InventoryTransaction].[Decrement])`


    看起来最后这两个步骤用于计算 `CTE` 的 `SELECT` 子句中减量的总和以及计数，以便计算排名。


    所以这是一次很好的性能分析过程。我们从估算的查询计划开始，然后转到 `STATISTICS PROFILE` 统计信息。


    但这一切告诉了我们什么？


    它告诉我们，性能损耗集中在提取年、季、月部分以及 `CTE` 中的 `SUM()` 函数上。显然，推荐的解决方案是用 `INSERT/SELECT` 语句替换
    `CTE` 逻辑，该语句加载一个报表表，这样我们就可以在非高峰时段每天一次隔离这些性能成本！此外，使用增强的 `Calendar` 表，这样每次加载报表表时就无需提取日期部分了。


    ### 作业


    基于这些新知识，使用 `CTE` 中的查询来创建一个报表表。然后修改基础查询，使其引用报表表而非 `CTE`，并进行常规的性能调优分析。确保在加载报表表的逻辑中
    `JOIN` 到 `Calendar` 表以获取日期部分。看看这是否比使用 `DATEPART()` 函数更高效！别忘了在 `Calendar` 表上创建聚集索引。


    ### 另一个突击测验答案


    以下是突击测验的答案。


    为什么每次进行性能分析和查询调优时都需要运行 `DBCC` 命令？


    答案


    因为我们希望清除可能包含旧查询计划的内存缓存。如果不这样做，你的查询可能会引用已在内存中的对象，你的性能分析结果将受到影响。务必从一张白板开始。

    '
- fmt: '### NTILE() Function


    Remember the definition of this function? The `NTILE()` function allows you to
    divide a set of rows in a data set into tiles or buckets (I like this term better).
    If you have a data set of 12 rows and you want to assign four tiles, each tile
    will have three rows. If you have a data set with 13 rows and want four tiles,
    the last tile will have more rows than the others. No way to control this.


    Anyway, this function comes in handy when you want to create buckets of data to
    analyze inventory levels so as to categorize and prioritize what product needs
    to be reordered first.


    **Note**


    If you have an odd number of rows, like 15, and you decide to create four tiles,
    you will get tiles with four rows, four rows, four rows, and three rows. So there
    is no way to control what goes into a tile; it just divides them up.


    Let’s check out the business requirements submitted by our friendly business analyst:


    Our business analyst wants to set up a classification scheme so that they can
    be alerted as to what products need to be refilled in inventory on a priority
    basis. The report needs to print out the following messages together with the
    year, month, location, inventory, warehouse, and of course products remaining:


    *   Bucket 1: Order First High Priority Alert

    *   Bucket 2: Order Second High Priority Alert

    *   Bucket 3: Order Third High Priority Alert

    *   Bucket 4: Order Fourth Medium Priority Alert

    *   Bucket 5: Order Fifth Low Priority Alert


    The analyst wants to start off by generating a report for year "2005," location
    "LOC1," inventory "INV1," and warehouse "WH111." All products need to be included
    (I did not use the actual names in order to save space, but a user most likely
    will want to see names, not just codes).


    Here is what we came up with to address this requirement. Please refer to Listing
    12-5.


    ```sql

    WITH InventoryReOrderAlert (

    InventoryYear,InventoryMonth,LocId,InvId,WhId,ProdId,ItemsRemaining

    )

    AS

    (

    SELECT YEAR(MovementDate)  AS InventoryYear

    ,MONTH(MovementDate) AS InventoryMonth

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    ,SUM(IT.Increment - IT.Decrement) AS ItemsRemaining

    FROM APInventory.Product.InventoryTransaction IT

    GROUP BY YEAR(MovementDate)

    ,MONTH(MovementDate)

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    )

    SELECT

    InventoryYear

    ,InventoryMonth

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,ItemsRemaining

    ,CASE

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 1 THEN ''Order First High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 2 THEN ''Order Second High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 3 THEN ''Order Third High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 4 THEN ''Order Fourth, Medium Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 5 THEN ''Order Fifth Low Priority Alert''

    END AS AlertMessage

    FROM InventoryReOrderAlert

    WHERE InventoryYear = 2005

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH111''

    ORDER BY InventoryMonth

    GO

    ```

    Listing 12-5 Setting Reorder Priority Alerts


    We use a `CTE` approach again, and based on our prior analysis, we know what to
    expect when we perform our tuning analysis on this query. As in prior queries,
    we are using a `WHERE` clause to filter the results so that we can analyze and
    debug (if necessary) on a small set of data.


    Our focus is on the `CASE` block in the `SELECT` statement:


    ```sql

    ,CASE

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 1 THEN ''Order First High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 2 THEN ''Order Second High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 3 THEN ''Order Third High Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 4 THEN ''Order Fourth, Medium Priority Alert''

    WHEN NTILE(5) OVER(

    ORDER BY ItemsRemaining ASC

    ) = 5 THEN ''Order Fifth Low Priority Alert''

    END AS AlertMessage

    ```


    Wow, the `CASE` block calls the `NTILE()` function five times. This should be
    interesting as far as the estimated query performance plan is concerned.


    Let’s make sure the query works and check out the results. Then we can look at
    performance analysis and tuning.


    Please refer to Figure 12-12.


    ![A screenshot of ch 12 ranking query sql window. It presents the results in an
    8-column table for inventory year, inventory month, location I d, Inventory I
    d, warehouse I D, Product I d, Items remaining, and alert messages. The first
    3 values of negative 13 in items remaining is highlighted.](images/527021_1_En_12_Chapter/527021_1_En_12_Fig12_HTML.jpg)

    Figure 12-12 Assigning reorder priorities


    Looks like it works. We see three products, P113, P037, and P033, that have –13
    items remaining. That means that 13 orders are back-ordered because of no stock
    in inventory. So the logic works, and our warehouse manager is pulling out their
    hair! Not a good thing.


    Let’s see how this query behaves.'
