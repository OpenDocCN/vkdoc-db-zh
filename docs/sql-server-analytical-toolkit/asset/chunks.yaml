  trans: '### 性能考量


    让我们从生成基线执行计划开始。


    请参阅图 12-13。


    ![](img/527021_1_En_12_Fig13_HTML.png)


    一个 ch 12 排名查询 SQL 窗口的截图。它展示了查询成本执行计划的信息。箭头指向排序成本 2%、哈希匹配成本 12%、计算标量成本 9%以及索引查找成本
    75%。


    图 12-13


    NTILE 报告的基线估计执行计划


    没有被识别为缺失的索引，所以我们有了一个良好的开端。从计划的右上角开始，我们看到一个成本为 75%的索引查找，接着是成本为 9%的计算标量和成本为 12%的哈希匹配。接下来是成本为
    2%的排序（为了讨论方便，我忽略了成本为 0%的任务）。


    我们下分支的成本都是 0%。令人惊讶的是，合并两个分支的嵌套循环连接任务成本也是 0%。在最左侧，我们看到一个成本为 2%的排序任务。


    #### 注意


    合并连接优于嵌套循环连接。对于嵌套循环连接任务，对于外部表中的每一行，都需要扫描内部表中的所有行。合并连接将它们排列好，这样你就不必扫描所有行来搜索匹配项！这就是为什么你需要索引来帮助查找和扫描。


    #### 结论


    这是一个性能良好的查询，所以我们保持原样。但好奇心战胜了我。让我们将`CTE`逻辑放入一个`INSERT/SELECT`查询中，以便加载一个报告表。代码清单
    12-6 是用于该表的`CREATE DDL`语句，后面是加载它的代码。


    ```sql

    USE APInventory

    GO

    DROP SCHEMA IF EXISTS Reports

    GO

    CREATE SCHEMA Reports

    GO

    DROP TABLE IF EXISTS Reports.InventoryReOrderAlert

    GO

    CREATE TABLE Reports.InventoryReOrderAlert(

    InventoryYear int  NULL,

    InventoryMonth int NULL,

    LocId varchar(4)   NOT NULL,

    InvId varchar(4)   NOT NULL,

    WhId varchar(5)    NOT NULL,

    ProdId varchar(4)  NOT NULL,

    ItemsRemaining     int NULL

    ) ON AP_INVENTORY_FG

    GO

    INSERT INTO Reports.InventoryReOrderAlert

    SELECT YEAR(MovementDate) AS InventoryYear

    ,MONTH(MovementDate) AS InventoryMonth

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    ,SUM(IT.Increment - IT.Decrement) AS ItemsRemaining

    FROM APInventory.Product.InventoryTransaction IT

    GROUP BY YEAR(MovementDate)

    ,MONTH(MovementDate)

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    ORDER BY YEAR(MovementDate)

    ,MONTH(MovementDate)

    ,IT.LocId

    ,IT.InvId

    ,IT.WhId

    ,IT.ProdId

    GO

    ```

    代码清单 12-6

    用报告表替代 CTE 逻辑


    我使用了与`CTE`相同的名称来命名该表。注意我将它分配给了`Reports`架构。加载此表的代码就是之前作为`INSERT/SELECT`命令一部分的`CTE`查询。你以前见过这些。


    基础查询没有改变，因为我使用了`CTE`的名称作为新表的名称，所以让我们深入探讨修订后的估计查询计划。


    请参阅图 12-14。


    ![](img/527021_1_En_12_Fig14_HTML.png)


    一个 ch 12 排名查询 SQL 窗口的截图。它展示了查询成本执行计划的信息。箭头指向嵌套循环成本 2%、排序成本 24%和表扫描成本 66%。


    图 12-14


    显示需要索引的基线估计查询计划


    正如运气所使然，我们需要创建一个索引来支持此策略，因为我们看到一个成本为 66%的表扫描和一个成本昂贵的 24%排序步骤。让我们构建代码清单 12-7 中所示的建议索引。


    ```sql

    CREATE NONCLUSTERED INDEX ieYearLocIdInvIdWhIdInventoryMonthProdIdItemsRemaining

    ON Reports.InventoryReOrderAlert (InventoryYear,LocId,InvId,WhId)

    INCLUDE (InventoryMonth,ProdId,ItemsRemaining)

    GO

    ```

    代码清单 12-7

    为建议的索引创建 DDL


    索引名称很长，我知道，但它具有描述性。


    `SQL Server`在建议索引的消息中指出，如果我们构建此索引，查询成本将提高 78.2161%。不错。


    让我们创建它并重新生成估计的查询计划。


    请参阅图 12-15。


    ![](img/527021_1_En_12_Fig15_HTML.png)


    一个 ch 12 排名查询 SQL 窗口的截图。它展示了查询成本执行计划的信息。箭头指向排序成本 40%、嵌套循环成本 7%、排序成本 40%和索引查找成本
    11%。


    图 12-15


    修订后的估计执行计划


    表扫描被索引查找所取代，但当然，正如我们之前多次看到的那样，排序操作增加了，嵌套循环连接任务的成本也增加了。不妨看看`IO`和`TIME`统计信息。


    请参阅图 12-16。


    ![](img/527021_1_En_12_Fig16_HTML.png)


    一个 ch 12 排名查询 SQL 窗口的截图。一个子窗口显示了 13 行程序代码。下部屏幕显示了执行计划信息，箭头指向逻辑读取 296、扫描计数 1、逻辑读取
    3、物理读取 2 和已用时间 82 毫秒。


    图 12-16


    修改后查询的 IO 和 TIME 统计信息


    这些看起来是很好的统计数据。首先，查询在 1 秒内运行完成，耗时 82 毫秒。非常快。工作表的扫描计数为 3，逻辑读取为 296。新的报告表扫描计数为 1，逻辑读取为
    3，物理读取为 2。


    我认为我们可以再次声明，当数据是历史数据时，我们的报告表策略是一个很好的选择。让我们看看最后一个函数，我们的朋友`ROW_NUMBER()`函数。'
- fmt: "# ROW_NUMBER() 函数\n\n最后但同样重要的是 `ROW_NUMBER()` 函数。作为提醒，我包含了其描述。如果你按顺序阅读了其他章节并且理解了这个函数的工作原理，则无需阅读下一段。可以跳过它。\n\
    \n如果你还记得，这个函数正如其名所示。给定数据结果集中的一组行，它将为数据集（或分区）中的每一行分配一个顺序编号。\n\n根据你设置 `OVER()` 子句以及\
    \ `PARTITION BY` 和 `ORDER BY` 子句的方式，它将为结果集中的每个分区分配行号。也就是说，每次移动到下一个分区时，行号从 1 开始顺序递增，直到分区的最后一行。\n\
    \n这次我们将使用 `ROW_NUMBER()` 函数来帮助生成一些随机数量，以便用于测试目的。在之前的章节中，我们曾使用这个函数来帮助处理“孤岛与间隙”数据现象！\n\
    \n最后，日历季度和月份需要拼写出来，而不仅仅是数值，因此需要一个 `CASE` 代码块。\n\n下一个脚本的业务需求如下：\n\n这个需求有点改变节奏。分析师不想要实际结果，而是希望我们生成一些随机的库存移动数据，以便他们可以创建一些\
    \ Microsoft Excel 的原型图表。他们对于年份为“2002”、产品为“P101”、位置为“LOC1”、库存为“INV1”和仓库为“WH112”的数据感到满意。\n\
    \n这是一个很棒的规格说明，因为它允许我们使用 `ROW_NUMBER()` 函数生成随机数据，而不仅仅是为结果集或分区生成行号。这是一个有价值的机制，但我们之前已经见过这方面的例子了。\n\
    \n无论如何，这是我们为满足此需求而设计的方案。请参考清单 [12-8](#527021_1_En_12_Chapter.xhtml#PC10)。\n\n\
    ```sql\nWITH InventoryMovement (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,ProdId,InvOut,InvIn\n\
    )\nAS\n(\n    SELECT AsOfYear\n        ,CASE\n            WHEN DATEPART(qq,AsOfDate)\
    \  = 1 THEN 'Qtr 1'\n            WHEN DATEPART(qq,AsOfDate)  = 2 THEN 'Qtr 2'\n\
    \            WHEN DATEPART(qq,AsOfDate)  = 3 THEN 'Qtr 3'\n            WHEN DATEPART(qq,AsOfDate)\
    \  = 4 THEN 'Qtr 4'\n         END AS AsOfQuarter\n        ,CASE\n            WHEN\
    \ MONTH(AsOfDate)  = 1 THEN 'Jan'\n            WHEN MONTH(AsOfDate)  = 2 THEN\
    \ 'Feb'\n            WHEN MONTH(AsOfDate)  = 3 THEN 'Mar'\n            WHEN MONTH(AsOfDate)\
    \  = 4 THEN 'Apr'\n            WHEN MONTH(AsOfDate)  = 5 THEN 'May'\n        \
    \    WHEN MONTH(AsOfDate)  = 6 THEN 'June'\n            WHEN MONTH(AsOfDate) \
    \ = 7 THEN 'Jul'\n            WHEN MONTH(AsOfDate)  = 8 THEN 'Aug'\n         \
    \   WHEN MONTH(AsOfDate)  = 9 THEN 'Sep'\n            WHEN MONTH(AsOfDate)  =\
    \ 10 THEN 'Oct'\n            WHEN MONTH(AsOfDate)  = 11 THEN 'Nov'\n         \
    \   WHEN MONTH(AsOfDate)  = 12 THEN 'Dec'\n         END AS AsOfMonth\n       \
    \ ,AsOfDate\n        ,LocId\n        ,InvId\n        ,WhId\n        ,ProdId\n\
    \        ,ROUND(CEILING(RAND(ROW_NUMBER() OVER (\n            PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)\n\
    \            ORDER BY AsOfDate\n        ))\n        * 85 *\n        RAND(ROW_NUMBER()\
    \ OVER (\n            PARTITION BY AsOfYear\n            ORDER BY AsOfDate\n \
    \       ) * 1900\n        )),1) AS InvOut\n        ,ROUND(CEILING(RAND(ROW_NUMBER()\
    \ OVER (\n            PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)\n          \
    \  ORDER BY AsOfDate\n        ))\n        * 100 *\n        RAND(ROW_NUMBER() OVER\
    \ (\n            PARTITION BY AsOfYear\n            ORDER BY AsOfDate\n      \
    \  ) * 100000\n        )),1) AS InvIn\n    FROM Product.Warehouse\n    WHERE AsOfYear\
    \ = 2002\n        AND ProdId = 'P101'\n        AND Locid = 'LOC1'\n        AND\
    \ InvId = 'INV1'\n        AND WhId = 'WH112'\n    GROUP BY AsOfYear\n        ,DATEPART(qq,AsOfDate)\n\
    \        ,AsOfMonth\n        ,AsOfDate\n        ,LocId\n        ,InvId\n     \
    \   ,WhId\n        ,ProdId\n)\nSELECT AsOfYear\n    ,AsOfQuarter\n    ,AsOfMonth\n\
    \    ,AsOfDate\n    ,LocId\n    ,InvId\n    ,WhId\n    ,ProdId\n    ,InvOut\n\
    \    ,InvIn\n    ,InvIn - InvOut AS QtyOnHand\nFROM InventoryMovement\nORDER BY\
    \ AsOfYear\n    ,AsOfQuarter\n    ,AsOfMonth\n    ,AsOfDate\n    ,LocId\n    ,InvId\n\
    \    ,WhId\n    ,ProdId\nGO\n```\n**清单 12-8**\n使用 ROW_NUMBER() 生成随机值\n\n我不会逐步讲解代码，因为我们之前已经见过这种结构，但我们可以重点关注生成随机库存出库值\
    \ (`InvOut`) 的代码：\n\n```sql\n,ROUND(CEILING(\n    RAND(ROW_NUMBER() OVER (\n \
    \       PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)\n        ORDER BY AsOfDate\n\
    \    )\n    )\n    * 85 *\n    RAND(ROW_NUMBER() OVER (\n        PARTITION BY\
    \ AsOfYear\n        ORDER BY AsOfDate\n    ) * 1900\n    )\n),1\n) AS InvOut\n\
    ```\n\n从内向外分析，`ROW_NUMBER()` 函数使用了一个 `OVER()` 子句，该子句按 `AsOfYear` 列和使用 `DATEPART()`\
    \ 函数从 `AsOfDate` 派生的季度进行分区。`ORDER BY` 子句按 `AsOfDate` 对分区结果集进行排序。生成的值用作 `RAND()`\
    \ 函数的种子，生成的值乘以 85。\n\n接下来，我们将刚刚生成的值乘以使用相同逻辑生成的另一个值，只是第二个 `OVER()` 子句中的 `PARTITION\
    \ BY` 仅由 `AsOfYear` 定义。这个值再次被 `RAND()` 函数用作种子值，结果乘以 1900。\n\n最后，通过使用 `CEILING()`\
    \ 函数获取下一个最高值来调整新值，然后我们使用 `ROUND()` 函数对最终值进行四舍五入，以确保不包含小数部分。\n\n此逻辑也用于为 `InvIn`\
    \ 列生成随机值。\n\n请参考图 [12-17](#527021_1_En_12_Chapter.xhtml#Fig17) 中的部分结果。\n\n![images/527021_1_En_12_Chapter/527021_1_En_12_Fig17_HTML.jpg](images/527021_1_En_12_Chapter/527021_1_En_12_Fig17_HTML.jpg)\n\
    \n**图 12-17**\n使用 ROW_NUMBER 函数生成随机值\n\n正如我们所见，随机值看起来是合理的。归根结底，这只是一堆操作数字以达到预期结果的逻辑。我只想给出一个\
    \ `ROW_NUMBER()` 函数用于除在分区内生成行号之外其他目的的例子。\n\n## 性能考虑\n\n让我们通过生成此查询的基线计划来最后看一下估计的查询计划。\n\
    \n请参考图 [12-18](#527021_1_En_12_Chapter.xhtml#Fig18)。\n\n![images/527021_1_En_12_Chapter/527021_1_En_12_Fig18_HTML.png](images/527021_1_En_12_Chapter/527021_1_En_12_Fig18_HTML.png)\n\
    \n**图 12-18**\n随机值生成查询的基线估计查询计划\n\n我们将只快速检查这个查询，因为它通常不会出现在生产环境中，但当你需要生成带有随机值的测试数据时，它可能会在开发环境中使用。换句话说，除非查询运行数小时，否则性能并不是那么重要。\n\
    \n从计划的右侧开始，我们看到一个索引扫描，成本为 5%，一个排序成本为 19%，第二个排序成本为 19%，还有另外两个排序任务成本各为 19%。最左侧还有一个未显示的第五个排序任务，成本同样为\
    \ 19%。\n\n因此我们可以推断，这种类型的查询需要多次对中间结果进行排序。像往常一样，我忽略了零成本任务，尽管在进行分析时，你应该注意它们，尤其是那些你不知道其作用的！\n\
    \n这只是生成随机数据的一种方法，当你研究本书中用于加载数据库的脚本时，你会看到其他使用 SQL Server 函数生成随机数据的技术。"
  raw: '### ROW_NUMBER( ) Function


    Last but not least is the `ROW_NUMBER()` function. As a reminder, I include the
    description. If you read the other chapters in sequence and you understand how
    this function works, you do not need to read the next paragraph. Skip it if you
    like.


    This function, if you recall, does just what the name implies. Given a set of
    rows in the data result set, it will assign a sequential number to each row in
    the data set (or partition).


    Depending on how you set up the `OVER()` clause and the `PARTITION BY` and `ORDER
    BY` clauses, it will assign row numbers to each partition in the result set. That
    is, each time you move to the next partition, the row number starts at 1 and goes
    on sequentially until the last row in the partition.


    This time we will use the `ROW_NUMBER()` function to help us generate some random
    quantities so we can use them for testing purposes. In prior chapters we used
    this function to help us with the islands and gaps data phenomena!


    Lastly, the calendar quarters and months need to be spelled instead of just numerical
    values, so a `CASE` block will be needed.


    The business requirements for this next script are as follows:


    This requirement is a bit of a change of pace. The analyst does not want actual
    results but wants us to generate some random inventory movements so that they
    can create some prototype Microsoft Excel graphs and charts. They are happy with
    data for the year “2002,” product “P101,” location “LOC1,” inventory “INV1,” and
    warehouse “WH112.”


    This is a great specification as it allows us to use the `ROW_NUMBER()` function
    to generate random data instead of just generating row numbers for a result set
    or partition. Valuable mechanism, but we have seen examples of this before.


    Anyway, here is what we came up with to fulfill this requirement. Please refer
    to Listing [12-8](#527021_1_En_12_Chapter.xhtml#PC10).


    ```

    WITH InventoryMovement (

    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,ProdId,InvOut,InvIn

    )

    AS

    (

    SELECT AsOfYear

    ,CASE

    WHEN DATEPART(qq,AsOfDate)  = 1 THEN ''Qtr 1''

    WHEN DATEPART(qq,AsOfDate)  = 2 THEN ''Qtr 2''

    WHEN DATEPART(qq,AsOfDate)  = 3 THEN ''Qtr 3''

    WHEN DATEPART(qq,AsOfDate)  = 4 THEN ''Qtr 4''

    END AS AsOfQuarter

    ,CASE

    WHEN MONTH(AsOfDate)  = 1 THEN ''Jan''

    WHEN MONTH(AsOfDate)  = 2 THEN ''Feb''

    WHEN MONTH(AsOfDate)  = 3 THEN ''Mar''

    WHEN MONTH(AsOfDate)  = 4 THEN ''Apr''

    WHEN MONTH(AsOfDate)  = 5 THEN ''May''

    WHEN MONTH(AsOfDate)  = 6 THEN ''June''

    WHEN MONTH(AsOfDate)  = 7 THEN ''Jul''

    WHEN MONTH(AsOfDate)  = 8 THEN ''Aug''

    WHEN MONTH(AsOfDate)  = 9 THEN ''Sep''

    WHEN MONTH(AsOfDate)  = 10 THEN ''Oct''

    WHEN MONTH(AsOfDate)  = 11 THEN ''Nov''

    WHEN MONTH(AsOfDate)  = 12 THEN ''Dec''

    END AS AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,ROUND(CEILING(RAND(ROW_NUMBER() OVER (

    PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)

    ORDER BY AsOfDate

    ))

    * 85 *

    RAND(ROW_NUMBER() OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) * 1900

    )),1) AS InvOut

    ,ROUND(CEILING(RAND(ROW_NUMBER() OVER (

    PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)

    ORDER BY AsOfDate

    ))

    * 100 *

    RAND(ROW_NUMBER() OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) * 100000

    )),1) AS InvIn

    FROM Product.Warehouse

    WHERE AsOfYear = 2002

    AND ProdId = ''P101''

    AND Locid = ''LOC1''

    AND InvId = ''INV1''

    AND WhId = ''WH112''

    GROUP BY AsOfYear

    ,DATEPART(qq,AsOfDate)

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    )

    SELECT AsOfYear

    ,AsOfQuarter

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    ,InvOut

    ,InvIn

    ,InvIn - InvOut AS QtyOnHand

    FROM InventoryMovement

    ORDER BY AsOfYear

    ,AsOfQuarter

    ,AsOfMonth

    ,AsOfDate

    ,LocId

    ,InvId

    ,WhId

    ,ProdId

    GO

    Listing 12-8

    Generating Random Values Using ROW_NUMBER()

    ```


    I will not go over the code as we have seen this structure before, but we can
    focus on the code that generates the inventory out random value. (`InvOut`):


    ```

    ,ROUND(CEILING(

    RAND(ROW_NUMBER() OVER (

    PARTITION BY AsOfYear,DATEPART(qq,AsOfDate)

    ORDER BY AsOfDate

    )

    )

    * 85 *

    RAND(ROW_NUMBER() OVER (

    PARTITION BY AsOfYear

    ORDER BY AsOfDate

    ) * 1900

    )

    ),1

    ) AS InvOut

    ```


    Working our way from the inside out, the `ROW_NUMBER()` function uses an `OVER()`
    clause that is partitioned by the `AsOfYear` column and the quarter derived from
    `AsOfDate` using the `DATEPART()` function. The `ORDER BY` clause orders the partition
    result set by `AsOfDate`. The value generated is used as a seed for the `RAND()`
    function, and the value generated is multiplied by 85.


    Next, we multiply the value just generated by the same logic except the `PARTITION
    BY` in the second `OVER()` clause is defined by the `AsOfYear` only. This value
    is used again by the `RAND()` function as the seed value, and the result is multiplied
    by 1900.


    The last new value is adjusted by using the `CEILING()` function to get the next
    highest value, and then we wrap it up by using the `ROUND()` function to round
    the final value so no fractional part is included.


    This logic is also used to generate a random value for the `InvIn` column.


    Please refer to the partial results in Figure [12-17](#527021_1_En_12_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig17_HTML.jpg)


    A screenshot of c h 12 ranking query s q l window. It presents the results in
    a table that has 11 columns, As of year, As of quarter, as of month, as of date,
    Location I d, inventory I d, Warehouse I d, Product I d, Inventory out, Inventory
    In, and quantity on hand. A 3-line code is on top.


    Figure 12-17


    Generating random values with the ROW_NUMBER function


    As we can see, the random values seem reasonable. At the end of the day, this
    is just a bunch of logic to manipulate numbers to achieve the desired results.
    I just want to give an example of the `ROW_NUMBER()` function. that is used for
    other purposes besides generating row numbers inside a partition.


    ### Performance Considerations


    Let’s take a final peek at estimated query plans by generating the baseline plan
    for this query.


    Please refer to Figure [12-18](#527021_1_En_12_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig18_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the message of
    the execution plan for query cost. Arrows point to 4 sort costs of 19%, and index
    seek cost 5%.


    Figure 12-18


    Baseline estimated query plan for the random value generation query


    We will just. take a quick examination of this query as it is one not typically
    found in a production environment, but it might be used in a development environment
    when you need some test data generated with random values. In other words, performance
    is not that important unless the query runs for hours.


    Starting right to the left side in the plan, we see an index scan with a cost
    of 5%, a sort with a cost of 19%, a second sort with a cost of 19%, and yet two
    more sort tasks with costs of 19%. Not seen is a fifth sort task all the way to
    the left with the same cost of 19%.


    So we can deduce that this type of query will need to sort the interim results
    many times. As usual I ignored the zero-cost tasks although when you perform your
    analysis, you should be aware of them, especially tasks that you do not know what
    they do!


    This is just one way of generating random data, and when you study the scripts
    for loading the databases used in this book, you will see other techniques that
    use SQL Server functions for generating random data..'
