    Next on deck is the `PERCENT_RANK()` function. What does it do? We covered this
    in Chapter [3](#527021_1_En_3_Chapter.xhtml), but in case you need a reminder
    or are not reading the chapters in sequential order, here is a review.


    Using a data set like results from a query, partition, or table variable, this
    function calculates the relative rank of each individual value relative to the
    entire data set (as a percentage). You need to multiply the results (the value
    returned is a float) by 100.00 or use the `FORMAT()` function to convert the results
    to a percentage format (this function returns a `FLOAT(53)` data type by the way).


    Also, it works a lot like the `CUME_DIST()` function; at least that’s what the
    Microsoft documentation says.


    You will also see that it works a lot like the `RANK()` function (in theory anyway).
    The `RANK()` function returns the position of the value, while `PERCENT_RANK()`
    returns a percentage value. We will use this function together with the `CUME_DIST()`
    function just discussed so we can compare the results and also see what effect
    it will have on the query plan we will generate shortly.


    Our friendly business analyst supplies the following specifications:


    A report is needed that shows percentage rank and cumulative distribution by plant,
    location, year, quarter, and month for all plants and all years. Values should
    be calculated based on groupings of year, plant name, and location.


