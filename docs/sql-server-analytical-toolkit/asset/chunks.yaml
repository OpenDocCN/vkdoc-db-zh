    The `WHERE` clause implements the specification requirements as far as filtering
    the output, and finally an `ORDER BY` clause sorts the report for the user presentation.
    Let’s see what it looks like.


    Please refer to the partial results in Figure [5-10](#527021_1_En_5_Chapter.xhtml#Fig12).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig12_HTML.jpg)


    A screenshot of c h 0 5 aggregate queries s q l. The upper panel presents some
    programming codes. The lower panel presents the result table. The account balance
    column and rolling daily balance column are highlighted in a box.


    Figure 5-10


    Cash account totals summary report


    Always do some data verification so that no surprises pop up. In this case check
    the rolling totals. Adding the account balances for the first two days, $483.10
    + $2147.40, we do indeed get $2630.50\. Since this is a small report, there are
    only 31 rows. Pop the results in a spreadsheet and validate the rolling totals.


    Now we copy and paste the results in another Excel spreadsheet and create a nice
    line graph to see how the account is performing.


    Please refer to the partial results in Figure [5-11](#527021_1_En_5_Chapter.xhtml#Fig13).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig13_HTML.png)


    A screenshot of a Microsoft Excel spreadsheet. A table on the left has 3 columns
    for post date, balance, and rolling balance. On the right screen, a line graph
    of balance versus date depicts varying curves of balance, rolling balance, and
    linear balance.


    Figure 5-11


    Cash account summary graph


    Pasting the results to an Excel spreadsheet can give us a good visual perspective
    on financial performance – in this case, cash account positions, which involve
    deposits, withdrawals, and also money market fund positions.


    Here we see a volatile line chart for balances, but the trend is up, so I guess
    that’s good. The dotted line is a trend line, so it looks like it is steadily
    going up. Remember also that the cash accounts are used to fund buy trades. When
    instruments are sold, the profit goes back into the cash account.


    The rolling balances are trending up also, so this is an indicator that the other
    financial investments are profitable.


    In conclusion, data generated by our window functions in a query is important
    and valuable, but adding a graph will provide extra insights that might not stand
    out in raw numbers!'
  trans: '

    让我们先检查在创建索引前后的 `PROFILE` 统计信息。请确保在执行查询前先运行以下命令：


    ```

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    SET STATISTICS PROFILE ON

    GO

    ```


    现在，让我们执行查询并查看 `PROFILE` 统计信息。请参考图 5-8。


    ![](img/527021_1_En_5_Fig10_HTML.png)


    这是一张 CH 0 5 聚合查询 SQL 的截图。屏幕被分割为多个面板，展示了在执行计划前后，用于比较预估 CPU、平均行大小和子树总成本统计信息的结果表格。


    图 5-8


    对比部分性能统计数据


    首先，让我们看看处理此查询所需的步骤。使用 `CTE` 时我们有 19 个步骤，而使用报表表策略只有 11 个步骤。对于预加载的报表表，`EstimateIO`
    统计数据略低一些。当然，我们的步骤更少了。原始的基于 `CTE` 的查询 `EstimateCPU` 更低，但第二个基于报表表的查询 `TotalSubTreeCost`
    更小。


    我认为我们有了改进，因为第二个选项的步骤更少。此外，第二个查询运行时间为零秒，而第一个查询为两秒。


    请参考图 5-9。


    ![](img/527021_1_En_5_Fig11_HTML.png)


    这是一张 CH 0 5 聚合查询 SQL 的截图。屏幕被分割为多个面板，展示了查询执行前后子树统计信息的对比表格。两个箭头指示第一个查询运行了 2 秒，第二个查询运行了
    0 秒。


    图 5-9


    对比子树成本统计数据


    很明显，`CTE` 方法生成了 19 个步骤，而报表表方法只生成了 11 个步骤。


    总之，经过一番详尽的性能分析，我们发现创建一个报表表来预加载原本由 CTE 生成的数据可以带来性能提升。建议的索引也没有带来损害。


    另一个结论是：开启性能统计将产生宝贵的性能分析数据。这又是一个可用的工具！


    ## SUM( ) 函数


    这次我们的分析侧重于客户账户。账户用于每日和每月汇总交易头寸，以便向客户出具报告。


    其语法如下：


    ```

    SUM(ALL|DISTINCT *) 或 SUM(ALL|DISTINCT )

    ```


    我不会展示简单的例子，因为我想到现在你已经明白了何时使用 `ALL` 与 `DISTINCT` 关键字。


    让我们来看看分析师提交的业务需求。


    同样，我们需要为同一客户，客户 C0000001（John Smith）的现金账户进行一些分析。这次我们想为 2012 年 1 月生成滚动的每日余额总计。我们还需要能够为同一个月的
    2012、2013 和 2014 这三年生成报告。在未来，我们希望能够比较当前日期与上一年同一日期的性能（这将涉及 `LAG()` 函数）。


    最后但同样重要的是，报告需要按年份、月份、过账日期、客户、账户名称和账户编号排序。报告的输出需要复制粘贴到 Microsoft Excel 电子表格中，以便生成分析图表。


    非常感谢我们的业务分析师提供了这份易于遵循的需求规格。务必确保获取书面而非口头的需求规格；否则，用户会告诉你搞错了，并给你更多的口头需求和额外要求。


    这份报告有很多可能性，可以重新用于其他账户类型，如股票和外汇。让我们来审视一下。


    请参考代码清单 5-5。


    ```

    SELECT YEAR(PostDate) AS AcctYear

    ,MONTH(PostDate)  AS AcctMonth

    ,PostDate

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,AcctTypeCode

    ,AcctBalance

    ,SUM(AcctBalance) OVER(

    PARTITION BY YEAR(PostDate),MONTH(PostDate)

    ORDER BY PostDate

    ) AS RollingDailyBalance

    FROM APFinance.Financial.Account

    WHERE YEAR(PostDate) = 2012

    /* 取消下面这行的注释以报告超过 1 年的数据，

    并注释掉上面那行 */

    --WHERE YEAR(PostDate) IN(2012,2013,2014)

    AND CustId = ''C0000001''

    AND AcctName = ''CASH''

    AND MONTH(PostDate) = 1

    ORDER BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,PostDate

    ,CustId

    ,AcctName

    ,AcctNo

    GO

    ```


    代码清单 5-5


    现金账户总计汇总分析


    这是一份基础报告，没有使用 `CTE`。`SELECT` 子句使用了 `YEAR()` 和 `MONTH()` 函数，这可能会带来较高的成本。`SUM()`
    函数与 `OVER()` 子句一起使用以生成滚动日余额。我们按年份和月份进行分区，尽管从技术上讲你不需要年份列，但如果想处理多年数据（通过更改 `WHERE`
    子句），它在那里以备扩展。


    `WHERE` 子句实现了过滤输出的业务需求，最后 `ORDER BY` 子句为用户展示对报告进行排序。让我们看看它是什么样子。


    请参考图 5-10 中的部分结果。


    ![](img/527021_1_En_5_Fig12_HTML.jpg)


    这是一张 CH 0 5 聚合查询 SQL 的截图。上面板展示了一些程序代码。下面板展示了结果表。账户余额列和滚动日余额列被方框高亮显示。


    图 5-10


    现金账户总计汇总报告


    务必进行一些数据验证，以免出现意外。在这个案例中检查滚动总计。将前两天的账户余额相加，$483.10 + $2147.40，我们确实得到了 $2630.50。由于这是一份小报告，只有
    31 行。将结果放入电子表格并验证滚动总计。


    现在，我们将结果复制粘贴到另一个 Excel 电子表格中，并创建一个漂亮的折线图来查看账户的表现。


    请参考图 5-11 中的部分结果。


    ![](img/527021_1_En_5_Fig13_HTML.png)


    这是一张 Microsoft Excel 电子表格的截图。左侧有一个表格，包含 3 列：过账日期、余额和滚动余额。屏幕右侧，一张余额随时间变化的折线图描绘了余额、滚动余额和线性余额的不同曲线。


    图 5-11


    现金账户汇总图表


    将结果粘贴到 Excel 电子表格中可以为我们提供一个良好的财务绩效可视化视角——在这个案例中是现金账户头寸，涉及存款、取款以及货币市场基金头寸。


    在这里，我们看到余额的折线图波动较大，但趋势是上升的，所以我认为这是好的。虚线是趋势线，所以看起来它在稳步上升。还要记住，现金账户用于为买入交易提供资金。当卖出金融工具时，利润会回到现金账户。


    滚动余额也呈上升趋势，这表明其他金融投资是盈利的。


    总之，查询中通过窗口函数生成的数据是重要且有价值的，但添加图表可以提供原始数字中可能不突出的额外洞察！

    '
- fmt: '### Performance Considerations


    As a reminder, for the purposes and space constraints of this book, we only check
    out and analyze query plan tasks with costs greater than zero. For example, if
    a window spool task (which usually appears for `ROWS` or `RANGE` frame clauses
    in an `OVER()` clause) has a value of 0%, it means it is occurring in memory,
    so we will not worry about it. If it is greater than zero, we consider it in the
    analysis as it is most likely using physical storage.


    Let’s start and look at the initial query plan. Our `Account` table has 43,860
    rows. Will an index be recommended?


    Please refer to Figure [5-12](#527021_1_En_5_Chapter.xhtml#Fig14).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig14_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the messages and execution
    plan. Three arrows indicate the window sort cost 8%, sort cost 21%, and table
    scan cost 73%.


    Figure 5-12


    The estimated execution plan suggests an index


    Yes, an index is recommended. Right away we see a table scan on the `Account`
    table with a cost of 73%. This is followed by a sort at 21% and a window spool
    task at 0% (performed in memory). Another sort task at 5% appears on the left-hand
    side.


    Clearly, we need to accept the recommendation and create the suggested index.
    Listing [5-6](#527021_1_En_5_Chapter.xhtml#PC11) is the index after I supplied
    a verbose name.


    ```

    CREATE NONCLUSTERED INDEX [iePrtNoAcctNoTypeBalPostDate]

    ON [Financial].[Account] ([CustId],[AcctName])

    INCLUDE ([PrtfNo],[AcctNo],[AcctTypeCode],[AcctBalance],[PostDate])

    GO

    Listing 5-6

    Suggested Index

    ```


    Creating the index, we generate and check out the new execution plan.


    Please refer to Figure [5-13](#527021_1_En_5_Chapter.xhtml#Fig15).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig15_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen has some
    programming codes. The bottom half screen presents the messages and execution
    plan. Four arrows indicate the window sort cost 36%, window spool cost 3%, sort
    cost 39%, and Index seek cost 20%.


    Figure 5-13


    Revised execution plan


    Things have improved. We see an index seek at 20% and a sort task at 39%, but
    look at the window spool task. It now costs 3%, which means data went to disk,
    so this is not an improvement. Finally, we have a final sort task at 39% at the
    end of the query plan on the left-hand side.


    Let’s check out the profile statistics:


    ```

    SET STATISTICS PROFILE ON

    GO

    ```


    Figure [5-14](#527021_1_En_5_Chapter.xhtml#Fig16) is a comparison of the profile
    statistics before and after the creation of the index.


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig16_HTML.png)


    A screenshot of c h 0 5 aggregate queries s q l. The screen has 2 panels that
    compare the profile statistics before and after the creation of the index.


    Figure 5-14


    Profile statistics with and without index


    We can see that both scenarios, without index and with index, have the same number
    of steps. We focus on the `EstimateIO`, `EstimateCPU`, and `TotalSubtreeCost`
    in both sets of statistics and see a slight improvement with the index version
    but not a significant amount. Let’s set up some graphs that show us this information.


    Please refer to Figure [5-15](#527021_1_En_5_Chapter.xhtml#Fig17).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig17_HTML.jpg)


    A screenshot of a Microsoft Excel spreadsheet. The top screen has a line graph
    of estimated C P U. On the bottom screen, a table compares the set of statistics
    of estimated C P U with and without Index.


    Figure 5-15


    Estimated CPU performance statistics


    Clearly, we see CPU statistics are the same until the last steps where they go
    down with the index but go up without the index. So this is another indicator
    we can use to see if indexes we create are valuable or not.


    Please refer to Figure [5-16](#527021_1_En_5_Chapter.xhtml#Fig18).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig18_HTML.jpg)


    A screenshot of a Microsoft Excel spreadsheet. The top screen has a line graph
    of estimated I O. On the bottom screen, a table compares the set of statistics
    of estimate I O with and without the Index.


    Figure 5-16


    Estimated IO statistics


    The same can be said for `IO` statistics. With the index `IO` goes down; without
    the index `IO` goes up. We want to keep CPU utilization and IO down. Lastly, let’s
    look at subtree costs.


    Please refer to Figure [5-17](#527021_1_En_5_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig19_HTML.jpg)


    A screenshot of a Microsoft Excel spreadsheet. The top screen has a line graph
    of the total subtree cost. On the bottom screen, a table compares the set of statistics
    of the total subtree cost with and without the Index.


    Figure 5-17


    Total subtree costs


    The subtree cost statistics are also considerably down with the index. So now
    we have looked at several performance statistics categories and tools we can use
    to analyze, evaluate, and improve the performance of queries that use the aggregate
    functions with the `OVER()` clauses to process data partitions.


    All this analysis proves that the SQL Server Query Estimation Tool is usually
    correct!


    You now have some very important query performance tools available for your performance
    analysis activities:


    *   Display Estimated Execution Plan


    *   Include Live Query Statistics


    *   Include Client Statistics


    *   The `SET STATISTICS IO ON/OFF` setting


    *   The `SET STATISTICS TIME ON/OFF` setting


    *   The `SET STATISTICS PROFILE ON/OFF` setting


    Next, we look at two functions that usually appear together in analytical reports.'
