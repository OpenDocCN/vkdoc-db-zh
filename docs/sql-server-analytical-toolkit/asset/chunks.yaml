    wanted to show this now so you can get inspired to learn how to use SSAS! The
    dashboard is a combination of a report plus some sort of visual graph or chart.
    Notice all the visuals that are available on the right side of the tool. More
    on this in the last three chapters!


    ## Create a Data Source


    Let’s start off by learning how to create a data source.


    Please refer to Figure [10-31](#527021_1_En_10_Chapter.xhtml#Fig42).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig42_HTML.png)


    *A screenshot of Plant data warehouse Microsoft Visual Studio window. Cube structure
    is selected. It presents measures, dimensions, and data source view. The Solutions
    Explorer dialog box has the Data sources option selected. A dialog box of Data
    Source Wizard has create a data option selected.*


    **Figure 10-31**


    Creating a data source is very simple. Right-click the `Data Sources` folder in
    the `Solution Explorer` and select "New data source." This panel is displayed.
    Click the "Create a data source based on an existing or new connection," click
    the "Next" button, and fill out the security information called "Impersonation
    information." In other words, you want the tool to impersonate a system user ID
    and password that has the rights to create and modify a cube.


    ## Define the Data View


    Please refer to Figure [10-32](#527021_1_En_10_Chapter.xhtml#Fig43).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig43_HTML.jpg)


    *A screenshot of Plant data warehouse Microsoft Visual Studio window. The left
    panel has a diagram organizer and a list of tables. On the right is the Solution
    Explorer panel with A P plant dot d s v selected. It presents a star schema with
    equipment linked to 9 components.*


    **Figure 10-32**


    Next, right-click the `Data Source Views` folder and select "New data source view."
    This is where you retrieve all the tables you will need to define dimensions and
    fact tables. Mostly, you will link the dimension tables to the fact tables via
    the surrogate keys that were included when we created the database.


    Notice that the Valve, Turbine, Generator, and Motor dimensions are not yet connected
    to the Plant dimension. I made a mistake in the creation of the database in that
    I did not give these first four tables surrogate keys. I could use the production
    key, `PlantId`, to connect them, but that would be a bit dodgy although it would
    work. I had to go back and add surrogate keys to the tables and populate them
    with the surrogate key assigned to the Plant table.


    I used the following code in Listing [10-14](#527021_1_En_10_Chapter.xhtml#PC19).


    ```sql

    ALTER TABLE [DimTable].[Generator]

    ADD PlantKey INTEGER NULL

    GO

    ALTER TABLE [DimTable].[Generator]

    ADD LocationKey INTEGER NULL

    GO

    UPDATE [DimTable].[Generator]

    SET PlantKey = P.PlantKey

    FROM [DimTable].[Generator] G

    JOIN [DimTable].[Plant] P

    ON G.PlantId = P.PlantId

    GO

    UPDATE [DimTable].[Generator]

    SET LocationKey = P.LocationKey

    FROM [DimTable].[Generator] G

    JOIN [DimTable].[Location] P

    ON G.LocationId = P.LocationId

    GO

    SELECT * FROM [DimTable].[Generator]

    GO

    ```


    *Listing 10-14 Adding Surrogate Keys to the Equipment Tables*


    In the interest of space, I am only showing you the code for the `Generator` table
    as the code for the remaining three tables is the same except the names of the
    tables and columns changed.


    I actually made this design mistake when I created the sample database. This is
    what happens when you rush, but there is usually a solution whereby you can fix
    your mistakes. The `ALTER` command lets us add the columns we need, and the `UPDATE`
    command lets us initialize the surrogate keys. Now we can complete our cube.


    Please refer to Figure [10-33](#527021_1_En_10_Chapter.xhtml#Fig44) for the changes
    and simple query used to verify that all went well.


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig44_HTML.png)


    *A screenshot of the S Q L, S S M S window. The left panel of Object Explorer
    has plant key and location key columns outlined. The right panel has a code and
    a table of 10 columns and 5 rows. The columns with headers, Plant key, and Location
    key are outlined.*


    **Figure 10-33**


    Our plant and location surrogate keys are initialized. This will make for a more
    correct `SNOWFLAKE` schema design and also increase performance when these tables
    are used in a query (joining numbers vs. alphanumeric values is always faster).


    ## Creating a New Dimension


    Back to the steps for creating a cube. Please refer to Figure [10-34](#527021_1_En_10_Chapter.xhtml#Fig45).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig45_HTML.png)


    *A screenshot of Plant data warehouse Microsoft Visual Studio window. The left
    panel has a diagram organizer and a list of tables. On the right is the Solution
    Explorer panel with the Dimensions option selected. It presents a star schema
    with equipment linked to 9 components.*


    **Figure 10-34**


    Right-click the `Dimensions` folder and select `New Dimension`. The following
    panel in Figure [10-35](#527021_1_En_10_Chapter.xhtml#Fig46) is presented.


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig46_HTML.png)


    *A screenshot of Plant data warehouse Microsoft Visual Studio window. A P Plant
    dot d s v is selected. It presents a diagram organizer and a list of tables. Solutions
    Explorer dialog box has the Dimensions option selected. A dialog box of Dimensions
    Wizard has use an existing table option selected.*


    **Figure 10-35**


    The panel presented is called the `Dimension Wizard`, and you simply fill out
    or select the requested information and click the `Next` button until you are
    finished. In this case we are using an existing table to create the dimension
    tables.


    ## Define Dimensions and Hierarchies


    Once we are finished, we need to perform some final steps like identifying hierarchies
    in the dimensions. Please refer to Figure [10-36](#527021_1_En_10_Chapter.xhtml#Fig47).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig47_HTML.jpg)


    *A screenshot of Plant data warehouse Microsoft Visual Studio window. Calendar
    dot dim is selected. It presents Attributes, Hierarchies, and Data Source View.
    The Solutions Explorer dialog box has the Calendar dot dim option selected. The
    Data Source View has a Calendar box with 6 attributes.*


    **Figure 10-36**


    This is a simple task, but you need to fully understand your data model. Simply
    drag the necessary attributes from the `Attributes` panel and drop them in the
    `Hierarchy` section in the correct order. In this case it is pretty simple: the
    Calendar hierarchy is defined as Calendar Year ➤ Calendar Quarter ➤ Calendar Month
    ➤ Calendar Date. Simple.


    ## Creating the Cube


    Next, we need to create a cube by identifying the fact table that contains the
    measures (stuff we can count or measure, like equipment failures) and link it
    to the dimensions.


    If you have not already guessed, you create a new cube by right-clicking with
    your mouse the `Cubes` folder and selecting `New Cube`. You are presented with
    the panel shown in the Figure [10-37](#527021_1_En_10_Chapter.xhtml#Fig48).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig48_HTML.png)


    *A screenshot of Plant data warehouse Microsoft Visual Studio window. A P Plant
    dot d s v is selected. It presents a diagram organizer and a list of tables. The
    Solutions Explorer dialog box has the Cubes option selected. A dialog box of Cube
    Wizard has the use existing table option selected.*


    **Figure 10-37**


    This is pretty much the same drill as when we created the dimensions for our multidimensional
    model. A wizard is presented, and you just follow the steps by clicking the appropriate
    buttons or filling out a few text boxes.


    When you are finished, you are presented with the following model in Figure [10-38](#527021_1_En_10_Chapter.xhtml#Fig49).


    ![](images/527021_1_En_10_Chapter/527021_1_En_10_Fig49_HTML.png)'
