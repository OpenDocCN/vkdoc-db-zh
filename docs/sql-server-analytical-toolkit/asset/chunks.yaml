    time. Notice that 94% + 6% = 100%. Usually when you add up all the estimated costs,
    they will add up to 100%.


    Next, we set `IO` and `TIME` statistics on with the following commands:


    ```

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```


    By the way, at the end of the analysis, turn off statistics by replacing the keyword
    ON with OFF:


    ```

    SET STATISTICS IO OFF

    GO

    SET STATISTICS TIME OFF

    GO

    ```


    Using these commands and executing the query, we are presented with some important
    performance statistics:


    ```

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 15 ms, elapsed time = 70 ms.

    (46 rows affected)

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, page server
    reads 0, read-ahead reads 0, page server read-ahead reads 0, lob logical reads
    0, lob physical reads 0, lob page server reads 0, lob read-ahead reads 0, lob
    page server read-ahead reads 0.

    Table ''SalesTransaction''. Scan count 1, logical reads 718, physical reads 0,
    page server reads 0, read-ahead reads 718, page server read-ahead reads 0, lob
    logical reads 0, lob physical reads 0, lob page server reads 0, lob read-ahead
    reads 0, lob page server read-ahead reads 0.

    (6 rows affected)

    ```


    Some of the interesting values we want to pay attention to are scan counts, logical
    and physical reads, and whether a work table is used. Notice the logical read
    count of 718\. This needs to go down. Logical reads are performed in memory if
    you have enough memory available or else on hard disk, which really slows things
    down. Aim for single-digit read counts.


    The goal right now is to make you aware of these tools and what the output looks
    like. We will examine what they mean as we develop our TSQL queries that use the
    window functions and the `OVER()` clause. For now, just know where to find them,
    how to turn them on, and how to look at the results when you run the query.


    Tip


    You might want to look up the preceding counters in the Microsoft documentation
    to begin understanding what they mean. Yes, there are quite a few, but understanding
    them will pay dividends: [`https://learn.microsoft.com/en-us/sql/relational-databases/showplan-logical-and-physical-operators-reference?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/relational-databases/showplan-logical-and-physical-operators-reference%253Fview%253Dsql-server-ver16).


    The preceding URL is fairly long to type. Just use your favorite search engine
    and search for “Showplan Logical and Physical Operators Reference.”


    Finally, the **Display Estimated Execution Plan** tool will also suggest a missing
    index that is needed to improve query performance. Let’s look at an example. Please
    refer to Listing [2-1](#527021_1_En_2_Chapter.xhtml#PC4).'
  trans: '

    ## 关于性能调优的几点说明


    创建利用窗口函数（以及 `OVER()` 子句）的查询和批处理脚本时，关键在于性能。我们希望创建的查询不仅准确，而且速度快。没有用户会满意一个运行超过一分钟的查询。


    你将需要培养一些性能调优的技能，这包括使用 SQL Server 提供的工具，以及如何根据分析所设计查询时这些工具给出的反馈来创建索引。


    SQL Server 提供了多种工具，同时不同厂商也提供了各种工具。我们将重点关注以下 SQL Server 工具：


    *   查询计划

    *   设置 `STATISTICS IO ON/OFF`

    *   设置 `STATISTICS TIME ON/OFF`

    *   客户端统计信息

    *   创建索引（建议的或自行创建的）

    *   大量的好奇心和耐心


    此外，还有表反规范化、分区表、物理表文件放置以及硬件升级等方法，但我们不在此讨论。


    ### 那么，什么是查询计划？


    直观上看，查询计划是一个图形化的图像，显示 SQL Server 执行查询将采取的步骤。它向你展示了每个任务的流程以及以执行时间衡量的开销。可以通过菜单栏访问此工具：点击
    `Query`，然后向下滚动到 `Display Estimated Execution Plan`。


    请参考图 2-3。


    ![](img/527021_1_En_2_Fig3_HTML.png)


    一个 SSMS 窗口的截图。菜单栏中的 Query 选项被选中。它打开一个包含 18 个选项的下拉菜单，其中高亮显示了 Display Estimated
    Execution Plan。


    图 2-3


    查询下拉菜单


    你还可以通过选择前面图中方框标出的选项，来包含执行计划、实时查询统计信息和客户端统计信息。


    访问这些工具的另一种方式是点击前面图 2-4 中方框标出的菜单栏中的一个或多个按钮。


    ![](img/527021_1_En_2_Fig4_HTML.png)


    一个 SSMS 窗口的截图。它展示了一段代码和一个包含 8 列 17 行的表格。列标题为：无列名、trial 6、trial 5、trial 4、trial
    3、trial 2、trial 1 和 average。它展示了客户端执行时间、网络统计和时间统计的详细信息。


    图 2-4


    查询性能工具


    第一个按钮将打开 `Display Estimated Execution Plan` 工具。参考前面图中方框标出的接下来的三个按钮，你也可以点击 `Include
    Actual Query Plan` 按钮生成查询计划，或点击 `Include Live Query Statistics` 按钮生成 IO 统计信息。最后，你可以点击最后一个名为
    `Include Client Statistics` 的按钮来包含客户端统计信息。将鼠标悬停在每个按钮上，会显示一个说明该按钮功能的消息。


    让我们看一个查询计划示例。请参考图 2-5。


    ![](img/527021_1_En_2_Fig5_HTML.png)


    一个 SSMS 窗口的截图。它展示了一段代码和一个包含 6 个组件的估算查询计划。这些组件是：select、compute scalar、stream aggregate、sort、compute
    scalar 和 table scan。sort 和 table scan 的开销分别为 6% 和 94%。


    图 2-5


    估算查询计划


    查询计划是从右向左读取的。它包含称为任务（或操作，或简称步骤）的图标，这些任务执行特定功能，如排序数据、合并数据或使用索引。每个任务都关联一个开销估算，显示为执行查询所花费总时间的百分比。


    例如，查看前面图中计划右侧的第一个任务，我们看到一个表扫描（table scan），其开销为 94%。这立即告诉我们存在问题。这个任务占用了大部分的执行时间。


    这类任务就是我们需要用某种策略来解决的，比如添加索引或重写查询。


    注意


    有时，由于数据量巨大，唯一能做的就是在夜间运行查询，以便加载到一个反规范化的报表表中。我们为什么想这样做？因为这将为任何访问反规范化表的用户提供快速的性能表象。在处理用户报表时，连接、计算和其他复杂逻辑都被消除了。用户查询的是一个预加载并计算好的表！


    最后，确保在报表工具（如 `SSRS`）中运行这些查询，这样你可以添加筛选器来限制用户看到的内容。（根据用户如何筛选查询来创建索引。）没有人愿意滚动浏览数百万行数据。


    我们还看到一个对数据进行排序的步骤，它占用了总执行时间的 6%。注意，94% + 6% = 100%。通常，当你把所有估算开销相加时，它们会加起来等于 100%。


    接下来，我们用以下命令开启 `IO` 和 `TIME` 统计信息：


    ```

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```


    顺便提一下，在分析结束时，将关键字 `ON` 替换为 `OFF` 以关闭统计信息：


    ```

    SET STATISTICS IO OFF

    GO

    SET STATISTICS TIME OFF

    GO

    ```


    使用这些命令并执行查询后，我们会得到一些重要的性能统计信息：


    ```

    SQL Server parse and compile time:

    CPU time = 0 ms, elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server Execution Times:

    CPU time = 0 ms,  elapsed time = 0 ms.

    SQL Server parse and compile time:

    CPU time = 15 ms, elapsed time = 70 ms.

    (46 rows affected)

    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, page server
    reads 0, read-ahead reads 0, page server read-ahead reads 0, lob logical reads
    0, lob physical reads 0, lob page server reads 0, lob read-ahead reads 0, lob
    page server read-ahead reads 0.

    Table ''SalesTransaction''. Scan count 1, logical reads 718, physical reads 0,
    page server reads 0, read-ahead reads 718, page server read-ahead reads 0, lob
    logical reads 0, lob physical reads 0, lob page server reads 0, lob read-ahead
    reads 0, lob page server read-ahead reads 0.

    (6 rows affected)

    ```


    我们想关注的一些有趣值是扫描计数、逻辑读和物理读，以及是否使用了工作表。注意逻辑读计数为 718。这需要降低。如果你有足够的内存可用，逻辑读在内存中执行，否则在硬盘上执行，这会大大降低速度。目标应是个位数的读计数。


    当前的目标是让你了解这些工具以及输出是什么样子。在开发使用窗口函数和 `OVER()` 子句的 TSQL 查询时，我们将研究它们的含义。现在，只需知道在哪里可以找到它们，如何开启它们，以及运行查询时如何查看结果。


    提示


    你可能需要查阅前面提到的计数器在 Microsoft 文档中的说明，以开始理解它们的含义。是的，有很多，但理解它们会物有所值：[`https://learn.microsoft.com/en-us/sql/relational-databases/showplan-logical-and-physical-operators-reference?view=sql-server-ver16`](https://learn.microsoft.com/en-us/sql/relational-databases/showplan-logical-and-physical-operators-reference?view=sql-server-ver16)。


    上面的 URL 输入起来相当长。只需使用你最喜欢的搜索引擎搜索 “Showplan Logical and Physical Operators Reference”。


    最后，`Display Estimated Execution Plan` 工具还会建议一个为提高查询性能而需要的缺失索引。让我们看一个例子。请参考清单 2-1。

    '
- fmt: '# 查询优化与性能分析


    ```sql

    /*

    Missing Index Details from chapter 02 - TSQL code - 09-08-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (63))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 96.4491%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [StagingTable].[SalesTransaction] ([ProductNo])

    INCLUDE ([CustomerNo],[StoreNo],[CalendarDate])

    GO

    */

    Listing 2-1

    Suggested Index by Query Plan Tool

    ```


    生成了很多有用的注释和索引模板。注意那些方括号。当`SSMS`为你生成代码时，它们总是被包含在内，可能只是为了防止你在数据库表和列中使用了带空格或特殊字符的名称！


    生成的语句告诉我们，它需要一个基于`StagingTable` schema下名为`SalesTransaction`的表的非聚集索引。需要包含的列是`ProductNo`列，以及`INCLUDE`关键字后出现的`CustomerNo`、`StoreNo`和`CalendarDate`列。


    如果我们创建这个索引并重新运行“**Display Estimated Execution Plan**”工具，应该会看到一些改进。


    请参见图 [2-6](#527021_1_En_2_Chapter.xhtml#Fig6)。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig6_HTML.png)


    一个`SSMS`窗口的截图。它展示了一段代码和一个包含6个组件的修订后估计查询计划。这些组件是 select、compute scalar、stream aggregate、sort、compute
    scalar 和 index seek。stream aggregate、sort 和 index seek 的成本分别为1%、69% 和 29%。


    **图 2-6** 修订后的估计查询计划


    成功！表扫描步骤已被成本为29%的索引查找步骤取代。排序步骤仍然存在，成本增加到69%。这是更好还是更糟呢？


    让我们在打开统计信息设置的情况下执行查询，看看结果如何。


    请参见图 [2-7](#527021_1_En_2_Chapter.xhtml#Fig7)。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig7_HTML.png)


    一个`SSMS`窗口的截图。文本展示了`IO`和`TIME`统计信息。对于`CPU`和已用时间，`SQL Server`的解析和编译时间分别为4毫秒和4毫秒。`SQL
    Server`的执行时间分别为0毫秒和0毫秒。影响了46行，共2个表列。


    **图 2-7** 统计信息`IO`报告


    哇！之前的逻辑读次数718次现已减少到8次。之前的`CPU`时间是15毫秒，现在减少到4毫秒。显著的改进。回想一下，逻辑读表示必须读取内存缓存的次数。如果内存不足，则必须读取物理磁盘。


    当表很大而你的磁盘速度又慢时，这将非常昂贵！企业生产环境通常在固态硬盘上实现`TEMPDB`以提高性能。


    我差点忘了客户端统计信息。这是当你点击该选项时生成的报告。请参见图 [2-8](#527021_1_En_2_Chapter.xhtml#Fig8)。


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig8_HTML.png)


    一个`SSMS`窗口的截图。它展示了一段代码和一个包含8列17行的表格。列标题为“no column name”、“trial 6”、“trial 5”、“trial
    4”、“trial 3”、“trial 2”、“trial 1”和“average”。它展示了客户端执行时间、网络统计信息和时间统计信息的详细信息。


    **图 2-8** 客户端统计信息


    这份报告中的统计信息非常全面。注意所有的试验。这意味着查询运行了六次，我们获得了每次试验运行的客户端执行时间。还有统计信息的平均执行时间。另一组重要信息是总执行时间和等待服务器回复的时间。试验6的信息似乎是最好的，可能是因为索引的原因。


    这些信息加上我们刚刚检查的工具的输出，将使你能够诊断和识别性能瓶颈。确保你用一些简单的查询练习一下，看看是否能解释返回的统计信息。


    顺便说一句，我不想暗示性能调优是轻而易举的事。这是一门难以掌握的学科，需要多年的实践才能达到专家水平。我只是触及了这个非常有趣且重要的活动的表面。


    这一节很长，正如前面所说，旨在向你介绍这些工具并查看它们的输出。信息量很大，所以如果你还不明白所有统计信息的含义，请不要担心。现阶段重要的是你知道在哪里可以找到它们，并能在一些查询上尝试它们。随着本章的进行，我们将深入探讨重要的查询计划步骤告诉了我们什么，以及如何利用这些信息来创建索引以提供更好的性能。


    我们将对几个查询进行此操作，但第 [14](#527021_1_En_14_Chapter.xhtml) 章将专门讨论性能调优。我将包含我们在其他章节中开发的查询的查询计划示例，以便你能了解与窗口函数相关的性能问题以及如何解决它们。


    我们准备好开始编写一些代码了！


    ## 聚合函数


    以下是我们将在本章中讨论的窗口聚合函数：


    *   `COUNT()` 和 `COUNT_BIG()`

    *   `SUM()`

    *   `MAX()`

    *   `MIN()`

    *   `AVG()`

    *   `GROUPING()`

    *   `STRING_AGG()`

    *   `STDEV()`

    *   `STDEVP()`

    *   `VAR()`

    *   `VARP()`


    我们将采取的方法是：为每个函数展示代码、进行讨论、显示执行时的结果，并检查结果。我们甚至可能生成一些`Excel`图表来更好地分析结果。


    对于`GROUPING()`和`STDEV()`函数，我们将按照前面讨论的步骤生成`IO`和`TIME`统计信息以及估计的查询执行计划。通常，查询计划也会建议一个要创建的推荐索引。如果建议了索引，我们将复制模板并通过给它一个名称来修改它，然后创建它。


    一旦索引创建完毕，我们重新生成统计信息和查询计划，并将新的统计信息集与之前的统计信息集进行比较，以查看通过创建新索引获得了哪些性能改进。


    有时创建索引没有帮助，甚至可能损害性能，更不用说你创建的索引越多，在需要删除、更新或插入行时性能下降就越严重。'
  raw: '```

    /*

    Missing Index Details from chapter 02 - TSQL code - 09-08-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (63))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 96.4491%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [StagingTable].[SalesTransaction] ([ProductNo])

    INCLUDE ([CustomerNo],[StoreNo],[CalendarDate])

    GO

    */

    Listing 2-1

    Suggested Index by Query Plan Tool

    ```


    Lots of nice comments and a template for the index are generated. Notice the square
    brackets by the way. When SSMS generates the code for you, these are always included,
    probably just in case you used names with spaces or weird characters in your database
    table and columns!


    The statement generated tells us a non-clustered index is needed and it is based
    on the table called `SalesTransaction` assigned to the `StagingTable` schema.
    The columns to include are the `ProductNo` column and the `CustomerNo`, `StoreNo`,
    and `CalendarDate` columns that appear after the `INCLUDE` keyword.


    If we create this index and rerun the **Display Estimated Execution Plan** tool,
    we should see some improvements.


    Please refer to Figure [2-6](#527021_1_En_2_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig6_HTML.png)


    A screenshot of the S S M S window. It presents a code and a revised estimated
    query plan with 6 components. The components are select, compute scalar, stream
    aggregate, sort, compute scalar, and index seek. The costs of stream aggregate,
    sort, and index seek are 1%, 69%, and 29%, respectively.


    Figure 2-6


    Revised estimated query plan


    Success! The table scan step has been replaced with an index seek step at a cost
    of 29%. The sort step is still there with an increased cost of 69%. Is this better
    or worse?


    Let’s execute the query with the statistics settings turned on and see what we
    get.


    Please refer to Figure [2-7](#527021_1_En_2_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig7_HTML.png)


    A screenshot of the S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 4 and 4 milliseconds,
    respectively. The S Q L server execution times for C P U and elapsed are 0 and
    0 milliseconds, respectively. 46 rows of 2 table columns are affected.


    Figure 2-7


    Statistics IO report


    Wow! The prior logical read count of 718 is now reduced to 8\. CPU time before
    was 15 ms, and now it is reduced to 4 ms. Dramatic improvement. Recall that logical
    reads indicate how many times the memory cache must be read. If enough memory
    is not available, then physical disk must be read.


    This will be expensive when the tables are large and your disk is slow! Corporate
    production environments usually implement `TEMPDB` on a solid-state drive for
    increased performance.


    I almost forgot client statistics. Here is the report that is generated when you
    click this selection. Please refer to Figure [2-8](#527021_1_En_2_Chapter.xhtml#Fig8).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig8_HTML.png)


    A screenshot of the S S M S window. It presents a code and a table of 8 columns
    and 17 rows. The column headers are no column name, trial 6, trial 5, trial 4,
    trial 3, trial 2, trial 1, and average. It presents details of client execution
    time, network statistics, and time statistics.


    Figure 2-8


    Client statistics


    A very comprehensive set of statistics in this report. Notice all the trials.
    What this means is that the query was run six times and we obtained client execution
    times for each trial run. There is also average execution time for the statistics.
    Another important set of information is the total execution time and wait time
    on server replies. Trial 6 information seems to be the best, possibly because
    of the index.


    This together with the output of the tools we just examined will allow you to
    diagnose and identify performance bottlenecks. Make sure you practice a bit with
    some simple queries and see if you can interpret the statistics that are returned.


    By the way, I do not want to imply that performance tuning is a walk in the park.
    This is a difficult discipline to master and takes years of practice to achieve
    expert level. I am just touching the surface of this very interesting and important
    activity.


    This section was long, and as stated earlier, it was meant to introduce you to
    the tools and look at the output. Lots of information, so do not worry if you
    don’t understand what all the statistics mean yet. What’s important at this stage
    is that you know where to find them and to try them out on some queries. As we
    proceed with the chapter, we will do a deep dive into what the important query
    plan steps tell us and how to use the information to create indexes to deliver
    better performance.


    We will do this for a few queries, but Chapter [14](#527021_1_En_14_Chapter.xhtml)
    will be dedicated to performance tuning. I will include examples of query plans
    for the queries we will develop in the other chapters so you can get a feeling
    of performance issues related to window functions and how to solve them.


    We are ready to start writing some code!


    ## Aggregate Functions


    The following are the window aggregate functions we will discuss in this chapter:


    *   COUNT() and COUNT_BIG()


    *   SUM()


    *   MAX()


    *   MIN()


    *   AVG()


    *   GROUPING()


    *   STRING_AGG()


    *   STDEV()


    *   STDEVP()


    *   VAR()


    *   VARP()


    The approach we will take is to present the code for each function, discuss it,
    display the results when it is executed, and review the results. We might even
    generate a few graphs with Excel to better analyze the results.


    For the `GROUPING()` and `STDEV()` functions, we generate `IO` and `TIME` statistics
    and an estimated query execution plan by following the steps discussed earlier.
    Usually, the query plan will also suggest a recommended index to create. If an
    index is suggested, we will copy the template and modify it by giving it a name
    and create it.


    Once the index is created, we regenerate statistics and the query plan and compare
    the new set to the prior set of statistics to see what improvements in performance
    have been gained by creating the new index.


    Sometimes creating indexes does not help and can even hurt performance, not to
    mention that the more indexes you create, the more performance decreases when
    you need to delete, update, or insert rows.'
  trans: '# 查询优化与性能分析


    ```sql

    /*

    Missing Index Details from chapter 02 - TSQL code - 09-08-2022.sql - DESKTOP-CEBK38L\GRUMPY2019I1.APSales
    (DESKTOP-CEBK38L\Angelo (63))

    The Query Processor estimates that implementing the following index could improve
    the query cost by 96.4491%.

    */

    /*

    USE [APSales]

    GO

    CREATE NONCLUSTERED INDEX []

    ON [StagingTable].[SalesTransaction] ([ProductNo])

    INCLUDE ([CustomerNo],[StoreNo],[CalendarDate])

    GO

    */

    Listing 2-1

    Suggested Index by Query Plan Tool

    ```


    生成了许多有用的注释和索引模板。注意那些方括号。当`SSMS`为你生成代码时，它们总是被包含在内，可能只是为了防止你在数据库表和列中使用了带空格或特殊字符的名称！


    生成的语句告诉我们，它需要一个基于`StagingTable` schema 下名为`SalesTransaction`的表的非聚集索引。需要包含的列是`ProductNo`列，以及`INCLUDE`关键字后出现的`CustomerNo`、`StoreNo`和`CalendarDate`列。


    如果我们创建这个索引并重新运行“**显示估计执行计划**”工具，应该会看到一些改进。


    请参见图 2-6。


    ![](img/527021_1_En_2_Fig6_HTML.png)


    一个`SSMS`窗口的截图。它展示了一段代码和一个包含 6 个组件的修订后估计查询计划。这些组件是 select、compute scalar、stream
    aggregate、sort、compute scalar 和 index seek。stream aggregate、sort 和 index seek
    的成本分别为 1%、69% 和 29%。


    **图 2-6** 修订后的估计查询计划


    成功！表扫描步骤已被成本为 29%的索引查找步骤取代。排序步骤仍然存在，成本增加到 69%。这是更好还是更糟呢？


    让我们在打开统计信息设置的情况下执行查询，看看结果如何。


    请参见图 2-7。


    ![](img/527021_1_En_2_Fig7_HTML.png)


    一个`SSMS`窗口的截图。文本展示了`IO`和`TIME`统计信息。对于`CPU`和已用时间，`SQL Server`的解析和编译时间分别为 4 毫秒和
    4 毫秒。`SQL Server`的执行时间分别为 0 毫秒和 0 毫秒。影响了 46 行，共 2 个表列。


    **图 2-7** 统计信息`IO`报告


    哇！之前的逻辑读次数 718 次现已减少到 8 次。之前的`CPU`时间是 15 毫秒，现在减少到 4 毫秒。显著的改进。回想一下，逻辑读表示必须读取内存缓存的次数。如果内存不足，则必须读取物理磁盘。


    当表很大而你的磁盘速度又慢时，这将非常昂贵！企业生产环境通常在固态硬盘上实现`TEMPDB`以提高性能。


    我差点忘了客户端统计信息。这是当你点击该选项时生成的报告。请参见图 2-8。


    ![](img/527021_1_En_2_Fig8_HTML.png)


    一个`SSMS`窗口的截图。它展示了一段代码和一个包含 8 列 17 行的表格。列标题为“no column name”、“trial 6”、“trial
    5”、“trial 4”、“trial 3”、“trial 2”、“trial 1”和“average”。它展示了客户端执行时间、网络统计信息和时间统计信息的详细信息。


    **图 2-8** 客户端统计信息


    这份报告中的统计信息非常全面。注意所有的试验。这意味着查询运行了六次，我们获得了每次试验运行的客户端执行时间。还有统计信息的平均执行时间。另一组重要信息是总执行时间和等待服务器回复的时间。试验
    6 的信息似乎是最好的，可能是因为索引的原因。


    这些信息加上我们刚刚检查的工具的输出，将使你能够诊断和识别性能瓶颈。确保你用一些简单的查询练习一下，看看是否能解释返回的统计信息。


    顺便说一句，我不想暗示性能调优是轻而易举的事。这是一门难以掌握的学科，需要多年的实践才能达到专家水平。我只是触及了这个非常有趣且重要的活动的表面。


    这一节很长，正如前面所说，旨在向你介绍这些工具并查看它们的输出。信息量很大，所以如果你还不明白所有统计信息的含义，请不要担心。现阶段重要的是你知道在哪里可以找到它们，并能在一些查询上尝试它们。随着本章的进行，我们将深入探讨重要的查询计划步骤告诉了我们什么，以及如何利用这些信息来创建索引以提供更好的性能。


    我们将对几个查询进行此操作，但第 14 章将专门讨论性能调优。我将包含我们在其他章节中开发的查询的查询计划示例，以便你能了解与窗口函数相关的性能问题以及如何解决它们。


    我们准备好开始编写一些代码了！


    ## 聚合函数


    以下是我们将在本章中讨论的窗口聚合函数：


    *   `COUNT()` 和 `COUNT_BIG()`

    *   `SUM()`

    *   `MAX()`

    *   `MIN()`

    *   `AVG()`

    *   `GROUPING()`

    *   `STRING_AGG()`

    *   `STDEV()`

    *   `STDEVP()`

    *   `VAR()`

    *   `VARP()`


    我们将采取的方法是：为每个函数展示代码、进行讨论、显示执行时的结果，并检查结果。我们甚至可能生成一些`Excel`图表来更好地分析结果。


    对于`GROUPING()`和`STDEV()`函数，我们将按照前面讨论的步骤生成`IO`和`TIME`统计信息以及估计的查询执行计划。通常，查询计划也会建议一个要创建的推荐索引。如果建议了索引，我们将复制模板并通过给它一个名称来修改它，然后创建它。


    一旦索引创建完毕，我们重新生成统计信息和查询计划，并将新的统计信息集与之前的统计信息集进行比较，以查看通过创建新索引获得了哪些性能改进。


    有时创建索引没有帮助，甚至可能损害性能，更不用说你创建的索引越多，在需要删除、更新或插入行时性能下降就越严重。'
- fmt: '### `COUNT( )`, `MAX( )`, `MIN( )`, `AVG( )`, and `SUM( )` Functions


    Let’s start examining the workhorse functions you will use frequently in your
    queries and reports. The following is a query that reports the count of transactions,
    the largest number and smallest number of transactions, and the total quantities
    of a particular product purchased.


    We want to create a crosstab report by year, month, store, and of course product
    to give us a sales performance profile. Let’s not confuse transaction counts vs.
    quantities of items sold. A single transaction could have 10 products or 1 or
    maybe 20 or more. Note the difference.


    Lastly, we want to limit the results by a single store, product, and year so we
    can analyze the results. Please refer to Listing [2-2](#527021_1_En_2_Chapter.xhtml#PC5)
    for the query.


    ```sql

    SELECT YEAR(CalendarDate) AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    StoreNo,

    ProductNo,

    ProductName,

    COUNT(*) AS NumTransactions,

    MIN(TransactionQuantity) AS MinQuantity,

    MAX(TransactionQuantity) AS MaxQuantity,

    AVG(TransactionQuantity) AS AvgQuantity,

    SUM(TransactionQuantity) AS SumQuantity

    FROM SalesReports.YearlySalesReport

    WHERE StoreNo = ''S00001''

    AND ProductNo = ''P0000001112''

    AND YEAR(CalendarDate) = 2010

    GROUP BY YEAR(CalendarDate),

    MONTH(CalendarDate),

    StoreNo,

    ProductNo,

    ProductName

    ORDER BY YEAR(CalendarDate),

    MONTH(CalendarDate),

    StoreNo,

    ProductNo,

    ProductName

    GO

    ```

    Listing 2-2: Basic Sales Profile Report


    Nothing fancy, no `OVER()` clause, no `CTE`, just a `SELECT` clause that retrieves
    rows from the `YearlySalesReport` table. We include the `COUNT()`, `MIN()`, `MAX()`,
    `AVG()`, and `SUM()` functions and pass the `TransactionQuantity` column as a
    parameter.


    A `WHERE` clause filters the results, so we only get rows for store `S00001`,
    product `P0000001112`, and calendar year `2010`.


    The mandatory `GROUP BY` clause is included when you use aggregate functions,
    and we utilize an `ORDER BY` clause to sort the results. Please refer to the partial
    results in Figure [2-9](#527021_1_En_2_Chapter.xhtml#Fig9).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig9_HTML.png)


    A screenshot of the S S M S window. It presents a table of 10 columns and 13 rows.
    The column headers are purchase year, purchase month, store number, product number,
    product name, name transactions, minimum quantity, maximum quantity, average quantity,
    and sum quantity.


    Figure 2-9: Sales profile report


    Seems like February was a slow month, which is strange as you have the Valentine’s
    Day holiday. You would think sales would be up.


    ### With `OVER( )`


    Let’s use the prior query and add some window capabilities. There are two parts
    to this query. First, we need to create a `CTE` (common table expression) called
    `ProductPurchaseAnalysis` that performs a little date manipulation and also includes
    the `COUNT()` function to generate the count of transactions by year, month, store
    number, and product number.


    The second part to the solution is to create a query that references the `CTE`
    and uses all the basic aggregate functions, but this time we will include an `OVER()`
    clause to create and order rows for processing in the partitions. Let’s examine
    the code.


    Please refer to Listing [2-3](#527021_1_En_2_Chapter.xhtml#PC6).


    ```sql

    WITH ProductPurchaseAnalysis (

    PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,CustomerFullName,ProductNo,ItemsPurchased,NumTransactions

    )

    AS (

    SELECT YEAR(CalendarDate) AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    CalendarDate,

    StoreNo,

    CustomerFullName,

    ProductNo,

    TransactionQuantity AS ItemsPurchased,

    COUNT(*)            AS NumTransactions

    FROM SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate) ,

    MONTH(CalendarDate),

    CalendarDate,

    StoreNo,

    CustomerFullName,

    ProductNo,

    ProductName,

    TransactionQuantity

    )

    ```

    Listing 2-3: Part 1, the `CTE`


    Pretty straightforward. The calendar year and month are pulled out from the calendar
    date, which is included in the `SELECT` clause. The store number, customer’s full
    name, and product number are also included. Lastly, the transaction quantity,
    meaning how many items were purchased, is included, and we count the number of
    transactions within each group as defined by the `GROUP BY` clause.


    Now for the second part of this batch, the query that references the `CTE`. This
    query will give us a profile of the number of transactions and quantities purchased
    for each product by year, month, customer, and store.


    Please refer to Listing [2-4](#527021_1_En_2_Chapter.xhtml#PC7).


    ```sql

    SELECT PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,

    CustomerFullName,ProductNo,NumTransactions,

    SUM(NumTransactions) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS SumTransactions,ItemsPurchased,

    SUM(ItemsPurchased) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS TotalItems,

    AVG(CONVERT(DECIMAL(10,2),ItemsPurchased)) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS AvgPurchases,

    MIN(ItemsPurchased) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS MinPurchases,

    MAX(ItemsPurchased) OVER (

    PARTITION BY PurchaseYear,CustomerFullName

    ORDER BY CustomerFullName,PurchaseMonth

    ) AS MaxPurchases

    FROM ProductPurchaseAnalysis

    WHERE StoreNo = ''S00001''

    AND ProductNo = ''P0000001112''

    AND PurchaseYear = 2010

    AND PurchaseMonth = 1

    AND ItemsPurchased > 0

    GROUP BY PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,

    CustomerFullName,ProductNo,NumTransactions,ItemsPurchased

    ORDER BY CustomerFullName,PurchaseYear,PurchaseMonth,CalendarDate,StoreNo,

    ProductNo,ItemsPurchased

    GO

    ```

    Listing 2-4: Part 2 – Using Window Functions


    Notice I included a filter to only report results for January of `2010`. This
    was done in order to keep the result sets small so we can debug and analyze the
    query. Once it works correctly, you can remove these filters to get all months
    (when you download the code). You can also remove the `PurchaseYear` filter predicate
    to get more years. If you want this information for all stores and customers,
    you can modify the query so it inserts the results in a report table and then
    you can write queries to view any combination of customers, stores, and products
    that you wish.


    Let’s walk through the rest of the code.


    An `ORDER BY` clause and a `PARTITION BY` clause are included in each `OVER()`
    clause. The data set results are partitioned by the `PurchaseYear` and `CustomerFullName`
    columns. The partition rows are sorted by `CustomerFullName` and `PurchaseMonth`.'
