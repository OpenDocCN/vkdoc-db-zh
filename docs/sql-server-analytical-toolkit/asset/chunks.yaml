    An arrow indicates the New Inventory ranking file of size 90 k b in data D drive,
    in the pop-up panel under browse, Open.

    Figure 12-43

    Upload the report


    Click the new file you saved and click the `Open` button. You will get a message
    that tells you it is loading followed by a loading complete message. The report
    should appear in the browser as per the following screenshot.


    Please refer to Figure [12-44](#527021_1_En_12_Chapter.xhtml#Fig44).


