    ## PERCENTILE_DISC 函数


    以下是我们的百分位离散值示例。请记住，返回的值将是所分析列中实际存在的值，它们不是插值计算得出的。我们的分析师为下一份报告提交了以下业务需求：


    通过修改之前的查询，创建一份报告，按客户、年份、月份、账号和名称显示期权账户余额，以及 25%、50%、75%和 90%百分位的离散百分位值。再次说明，这份报告是为我们的客户朋友
    C0000001 准备的，但该报告稍后将用于多个客户。查询需要灵活，以便满足所有这些要求。最后，查询需要像之前的查询一样，在一秒内运行完成。


    这很棒。我们可以复制之前的示例并进行修改，因此我们使用了 `CTE` 而不是内存增强表。这让我们有机会比较估算的查询计划和 `STATISTICS PROFILE`
    统计信息。


    进行一些复制粘贴操作，使用之前示例中的 `CTE`，我们就得到了满足需求的查询。


    提示


    编写代码时，请始终着眼于可重用性。


    请参阅清单 7-15。


    ```sql

    WITH MonthlyAccountBalances (

    AcctYear,AcctMonth,CustId, PrtfNo, AcctNo, AcctName, AcctBalance

    )

    AS

    (

    SELECT YEAR(PostDate)  AS AcctYear

    ,MONTH(PostDate) AS AcctMonth

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    ,SUM(AcctBalance)

    FROM Financial.Account

    GROUP BY YEAR(PostDate)

    ,MONTH(PostDate)

    ,CustId

    ,PrtfNo

    ,AcctNo

    ,AcctName

    )

    SELECT CustId

    ,AcctYear

    ,AcctMonth

    ,AcctNo

    ,AcctName

    ,AcctBalance

    ,PERCENTILE_DISC(.25)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-25%]

    ,PERCENTILE_DISC(.50)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-50%]

    ,PERCENTILE_DISC(.75)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-75%]

    ,PERCENTILE_DISC(.90)

    WITHIN GROUP (ORDER BY AcctBalance)

    OVER (

    PARTITION BY CustId,AcctYear

    ) AS [PercentDisc-90%]

    FROM FinancialReports.AccountMonthlyBalances

    WHERE Acctname = ''OPTION''

    AND CustId = ''C0000001''

    ORDER BY CustId

    ,AcctYear

    GO

    ```


    #### 清单 7-15

    使用 CTE 方案的百分位离散值


    如图所示，我们希望为客户及所有年份生成账户余额分布的 25%、50%、75%和 90%百分位的离散百分位值。再次请注意该函数特有的 `WITHIN GROUP`
    子句。唯一使用此子句的其他函数是我们刚刚研究的 `PERCENTILE_CONT()` 函数（不确定微软为何如此实现这些函数，但他们一定有充分的理由）。


    最后，我在查询末尾添加了一个 `ORDER BY` 子句，以便输出能按客户和年份整齐排序。这并非多余，因为 `WITHIN GROUP` 子句中的 `ORDER
    BY` 子句是按账户余额排序的。让我们查看结果，并请记住这些值不是插值计算得出的——它们实际存在！


    请参阅图 7-30 中的部分结果。


    ![](img/527021_1_En_7_Fig31_HTML.png)


    #### 图 7-30

    账户余额的百分位离散分析


    一个 SSMS 窗口的截图。它显示了一个包含 11 列和 50 行的表格。列标题为：客户 ID、账户年份、账户月份、账号、账户名称、账户余额、百分位离散 25%、百分位离散
    50%、百分位离散 75%、百分位离散 80%。


    如图所示，结果没有进行插值计算。每个百分位值都可以追溯到一个实际的账户余额值。例如，看最后一个箭头，值 19733.60 可以在“账户余额”列中找到。请注意此行为与前一示例中百分位连续计算行为的区别。


    让我们看看针对此查询的一些性能分析。


    ## 性能考虑


    和往常一样，让我们运行一个估算查询计划以建立性能基线。该计划很长，因此将分为几个截图显示。以下是右侧开始的第一部分。我们将盘点计划的每个部分，然后看看是否能得出一些观察结果和结论。从右侧开始，我们在图
    7-31 中看到以下步骤。


    ![](img/527021_1_En_7_Fig32_HTML.png)


    #### 图 7-31

    估算执行计划，A 部分


    一个 SSMS 窗口的截图。它显示了估算执行计划的 A 部分，包含 12 个组件。组件依次为：序列投影、段、嵌套循环、表假脱机、段、排序、表扫描、嵌套循环、计算标量、流聚合、表假脱机、表假脱机。


    这看起来很熟悉。注意，虽然我们只看到一个针对 `AccountMonthlyBalances CTE` 的表扫描、一个成本为 36%的排序操作、两个表假脱机和一个嵌套循环连接（尽管成本为零），但没有索引建议。最后一个表假脱机显示成本为
    1%（回想一下，表假脱机将数据临时存储在 `TEMPDB` 中供其他任务检索）。


    接下来，我们看到另一个成本为 4%的嵌套循环连接操作。让我们看看计划的下一部分，看看这种模式是否重复出现。


    请参阅图 7-32。


    ![](img/527021_1_En_7_Fig33_HTML.png)


    #### 图 7-32

    估算执行计划，B 部分


    一个 SSMS 窗口的截图。它显示了估算执行计划的 B 部分，包含 11 个组件。组件依次为：计算标量、嵌套循环、表假脱机、段、计算标量、计算标量、序列投影、嵌套循环、流聚合、表假脱机、表假脱机。


    看起来与我们刚刚讨论的计划第一部分基本相同的模式，只是没有排序任务或表扫描。有人能猜出其他部分会是什么样子吗？我们来看。


    请参阅图 7-33。


    ![](img/527021_1_En_7_Fig34_HTML.png)


    #### 图 7-33

    估算执行计划，C 部分


    一个 SSMS 窗口的截图。它显示了估算执行计划的 C 部分，包含 14 个组件。组件依次为：2 个计算标量、嵌套循环、表假脱机、段、2 个计算标量、嵌套循环、流聚合、2
    个表假脱机、流聚合、2 个表假脱机。


    是的，相同的模式：表假脱机任务、一些计算标量任务和一个成本为 4%的嵌套循环连接操作。如果你现在还没猜到的话，这种模式将重复四次，每个 `PERCENTILE_DISC()`
    函数调用一次。我最初的假设是，这些模式只能通过快速的内存和磁盘或内存增强表来改进。让我们看看下一部分。


    请参阅图 7-34。


    ![](img/527021_1_En_7_Fig35_HTML.png)


    #### 图 7-34

    估算执行计划，D 部分


    一个 SSMS 窗口的截图。它显示了估算执行计划的 D 部分，包含 14 个组件。组件依次为：段、2 个计算标量、嵌套循环、表假脱机、段、计算标量、嵌套循环、流聚合、2
    个表假脱机、流聚合、2 个表假脱机。


    这里也是相同的模式：表假脱机和嵌套循环连接是主要任务。我检查了 `PROFILE STATISTICS`，几乎所有的表假脱机 `IO` 都为零，所以看起来假脱机是在内存中执行的。此外，如果你查看每个任务的提示，你会看到每个部分中的表假脱机簇具有相同的节点
    ID，因此看起来临时表中假脱机的数据是可重用的。这似乎非常高效。


    让我们看看计划的最后一部分。请参阅图 7-35。


    ![](img/527021_1_En_7_Fig36_HTML.png)

