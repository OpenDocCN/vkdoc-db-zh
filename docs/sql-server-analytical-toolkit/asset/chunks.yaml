    | **SQL Server Execution Times** | **First Run** | **Second Run** |

    | CPU Time (ms) | 0 | 0 |

    | elapsed time (ms) | **1** | **0** |


    I ran the query twice. The first result had `CPU` and elapsed time values of 15
