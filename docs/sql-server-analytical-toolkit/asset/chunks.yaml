    continuous percentiles across the year 2002 as a starting point. As usual, the
    quarter and month names need to be spelled out, and the month number needs to
    be included so when the data is copied to a Microsoft Excel spreadsheet, it can
    be sorted by month number if necessary.


    The quantities on hand need to represent what is left in inventory on the last
    day of the month. Therefore, the values are calculated by summing up all inventory
    movements in minus inventory movements out each day of the month, to arrive at
    the total quantity on the last day of the month.


    Here is what we came up with. Please refer to Listing [13-7](#527021_1_En_13_Chapter.xhtml#PC8).'
