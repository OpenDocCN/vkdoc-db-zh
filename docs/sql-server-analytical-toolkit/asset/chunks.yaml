    Query performance and analysis time.


    ### Performance Considerations


    As usual, let’s start by generating a baseline estimated query plan in the usual
    manner.


    Please refer to Figure [13-3](#527021_1_En_13_Chapter.xhtml#Fig3).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig3_HTML.png)


    A screenshot of the S Q L S S M S window. It presents a query plan with 14 components.
    The components are nested loops cost, table spool, segment, compute scalar, sort,
    compute scaler, stream aggregate, sort, compute scalar, index seek, nested loops,
    stream aggregate, and 2 table spools.


    Figure 13-3

    Query plan for cumulative distribution, average quantity on hand


    We will concentrate on the right-hand side of the plan. The left-hand side costs
    are all zero, so we will not discuss them in order to save some chapter space.
    Always review these on your own though. Also, make sure to place your mouse on
    the interesting tasks in order to display the details panel. As a developer or
    architect, you need to become an expert in query performance tuning!


    Back to the plan, no indexes were suggested. So we are off to a good start. We
    see an index seek with a cost of 12% (remember, an index seek is better than a
    scan). The next expensive tasks are the two sort tasks chiming in at 43%; the
    remaining tasks are all zero costs except for the nested loops task on the left
    side. The lower branch also has zero-cost tasks, and both branches meet at a nested
    loops (inner join) task.


    All in all, it seems like a well-performing query. Let’s look at the `IO` and
    `TIME` statistics.


    Please refer to Figure [13-4](#527021_1_En_13_Chapter.xhtml#Fig4).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig4_HTML.jpg)


    A screenshot of the S Q L S S M S window. The text presents I O and TIME statistics.
    The S Q L server parse and compile times for C P U and elapsed are 47 and 141
    milliseconds. The S Q L server execution times for C P U and elapsed are 0 and
    10 milliseconds. 12 rows of 2 tables are affected.


    Figure 13-4

    `IO` and `TIME` statistics for cumulative distribution, average quantity on hand


    The parse and compile time took 141 ms and the elapsed execution time took 10
    ms. As can be seen, there is a scan count of 15 scans and 100 logical reads. The
    Warehouse table has a scan count of 1, a logical read value of 3, and a physical
    read value of 2 (remember this pattern, 1-3-2; it will pop up again).


    Checking the row count of the Warehouse table, we see that it contains 24,288
    rows. Not too large but still enough to warrant the physical reads.


    If we modify this query so that there is no `WHERE` clause, we can use it in an
    `SSRS` report. We need to consider using our tried-and-true report table approach
    with historical data whenever there is a benefit (like the `CTE` returns a couple
    of hundreds of thousands of rows), that is, preload the table with results from
    this query so that performance is fast when analysts use the web reports. Might
    want to add a few indexes to cover the master data columns like location and inventory
    and the others. This data is loaded once with all available records and, as the
    days go by, only the new or updated records.'
