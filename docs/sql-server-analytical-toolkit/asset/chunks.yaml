  trans: '# NTILE 函数


    接下来，我们希望创建一些在线分类分桶。


    我们的业务分析师希望我们开发一个查询，根据设备状态对工厂进行评级。具体来说，报告中需包含以下类别：


    *   严重故障

    *   关键故障

    *   中等故障

    *   调查故障

    *   维护故障

    *   无问题报告


    也就是说，将故障统计数据放入代表前述类别的分桶中。报告应包括工厂名称、地点名称、日历年、季度、月份以及按月统计的设备故障总数。


    ## 实现步骤


    以下是首次尝试，采用了一种链式 `CTE` 方法。由于代码相当长，我将其分为三个部分。让我们从第一个 `CTE` 开始。


    > **注意**

    >

    > 请记住，所谓链式 `CTE`，是指一个较低的 `CTE` 引用其上方的 `CTE`，依此类推（`CTE n-1` 引用 `CTE n`）。


    请参见代码清单 9-8a。


    ```sql

    WITH FailedEquipmentCount

    (

    CalendarYear,QuarterName,[MonthName],CalendarMonth,PlantName,LocationName,SumEquipFailures

    )

    AS (

    SELECT

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    ,SUM(EF.Failure) AS SumEquipFailures

    FROM DimTable.CalendarView C

    JOIN FactTable.EquipmentFailure EF

    ON C.CalendarKey = EF.CalendarKey

    JOIN DimTable.Equipment E

    ON EF.EquipmentKey = E.EquipmentKey

    JOIN DimTable.Location L

    ON L.LocationKey = EF.LocationKey

    JOIN DimTable.Plant P

    ON L.PlantId = P.PlantId

    GROUP BY

    C.CalendarYear

    ,C.QuarterName

    ,C.[MonthName]

    ,C.CalendarMonth

    ,P.PlantName

    ,L.LocationName

    )

    ```

    代码清单 9-8a

    第一个 CTE – 求和逻辑


    第一个 `CTE` 检索所需的维度列，并使用 `SUM()` 函数按月对故障进行求和。注意其中包含了必需的 `GROUP BY` 子句。另外请注意，我们需要
    `JOIN` 五张表：一张事实表和四张维度表。


    > **提醒**

    >

    > 记住，如果需要用 `JOIN` 子句连接 N 张表，你需要 N-1 个连接。因此，如果要连接五张表，你的查询中需要四个 `JOIN` 子句。


    接下来，我们创建另一个包含 `NTILE()` 函数的 `CTE`，并让它引用我们之前讨论的第一个 `CTE`。


    请参见代码清单 9-8b。


    ```sql

    FailureBucket (

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName],CalendarMonth,SumEquipFailures,MonthBucket)

    AS (

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName],

    CalendarMonth,SumEquipFailures,

    NTILE(5)  OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipFailures

    ) AS MonthBucket

    FROM FailedEquipmentCount

    WHERE CalendarYear = 2008

    )

    ```

    代码清单 9-8b

    `NTILE()` 分桶 CTE


    我们需要创建五个分桶，因此使用了 `NTILE()` 函数，并基于工厂名称和地点名称列指定了分区。该分区根据 `SumEquipFailures` 列中的值进行排序。


    最后但同样重要的是生成报告的查询。


    请参见代码清单 9-8c。


    ```sql

    SELECT PlantName,LocationName,CalendarYear,QuarterName,[MonthName],SumEquipFailures,

    CASE

    WHEN MonthBucket = 5 AND SumEquipFailures  0 THEN ''Severe Failures''

    WHEN MonthBucket = 4 AND SumEquipFailures  0 THEN ''Critical Failures''

    WHEN MonthBucket = 3 AND SumEquipFailures  0 THEN ''Moderate Failures''

    WHEN MonthBucket = 2 AND SumEquipFailures  0 THEN ''Investigate Failures''

    WHEN MonthBucket = 1 AND SumEquipFailures  0 THEN ''Maintenance Failures''

    WHEN MonthBucket = 1 AND SumEquipFailures = 0

    THEN ''No issues to report''

    ELSE ''No Alerts''

    END AS AlertMessage

    FROM FailureBucket

    GO

    ```

    代码清单 9-8c

    对故障分桶进行分类


    是我们的老朋友 `CASE` 语句块来救场了。我们只是简单地打印出基于分桶编号的类别。这是一个简单的解决方案，但稍微有点复杂，因为我们使用了两个链式的 `CTE`
    块。在分析性能之前，我们先来看看结果。


    ## 结果展示


    请参见图 9-21 中的部分结果。


    ![](img/527021_1_En_9_Fig21_HTML.png)

    SQL 工作区的截图。主窗口包含代码和表格。表格的列标签为：工厂名称、地点名称、日历年、月份名称、季度名称、设备故障总和以及警报消息。

    图 9-21

    设备故障分桶报告


    报告显示效果良好，按分桶、工厂、地点和日历年展示了故障情况。如果我们移除 `WHERE` 子句并运行所有年份的报告，将生成 1,517 行数据。这些数据可以复制粘贴到
    Microsoft Excel 的数据透视表中，以便我们进行一些花哨的切片和切块操作，从而真正理解结果。


    而这正是我们接下来要做的。请参见图 9-22。


    ![](img/527021_1_En_9_Fig22_HTML.jpg)

    Excel 工作表的截图。窗口顶部显示了菜单栏和工具栏。主页面左侧显示了行标签和故障总和，右侧是数据透视表。

    图 9-22

    故障类别分桶数据透视表


    这是一个非常有用的技巧和工具，可以添加到你的工具箱中，因为它将使你的业务用户和分析师能够以类似于多维数据集的方式查看结果。图中高亮的筛选区域让你可以选择工厂、年份和地点，以便深入钻取数据。


    你甚至可以修改原始查询，以按设备显示故障数量，这样你就可以像使用 `GROUPING` 子句那样，在分组层次结构中向上或向下钻取！


    > **作业**

    >

    > 尝试创建一个数据透视图来完成这个数据透视表。'
- fmt: '# Performance Considerations


    ## Baseline Estimated Query Plan


    So how did this query perform? Here is our baseline estimated query plan.


    Please refer to Figure [9-23](#527021_1_En_9_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig23_HTML.png)


    A screenshot presents the execution plan. The arrows point towards the nested
    loop cost equal to 4 percent, sort cost equal to 8 and 12 percent, hash match
    cost equal to 10, 20, and 19 percent, and clustered index cost equal to 10 percent.


    **Figure 9-23** Baseline estimated execution plan


    Lots of branches and table scans because of the joins to the dimension tables.
    The clustered index on the fact table helps and the cost is only 10%. There are
    four hash match joins (20%, 9%, 10%, and 10%) to merge the rightmost branches,
    a sort at 12%, another sort at 8%, and a final nested loops join at a cost of
    4%.


    Table spools are at 0%. Clearly our first objective is to simplify the query so
    the estimated query plan becomes less complex.


    ## Improved Query with Report Table


    Now we use one of our existing report tables we created earlier. Listing [9-9](#527021_1_En_9_Chapter.xhtml#PC11)
    is the modified query.


    ```sql

    WITH FailedEquipmentCount

    AS (

    SELECT

    PlantName,LocationName,CalendarYear,QuarterName,[MonthName]

    ,CalendarMonth,SumEquipmentFailure,

    NTILE(5)  OVER (

    PARTITION BY PlantName,LocationName

    ORDER BY SumEquipmentFailure

    ) AS MonthBucket

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear = 2008

    )

    SELECT

    PlantName, LocationName, CalendarYear, QuarterName, [MonthName], SumEquipmentFailure,

    CASE

    WHEN MonthBucket = 5 AND SumEquipmentFailure  0

    THEN ''Severe Failures''

    WHEN MonthBucket = 4 AND SumEquipmentFailure  0

    THEN ''Critical Failures''

    WHEN MonthBucket = 3 AND SumEquipmentFailure  0

    THEN ''Moderate Failures''

    WHEN MonthBucket = 2 AND SumEquipmentFailure  0

    THEN ''Investigate Failures''

    WHEN MonthBucket = 1 AND SumEquipmentFailure  0

    THEN ''Maintenance Failures''

    WHEN MonthBucket = 1 AND SumEquipmentFailure = 0

    THEN ''No issues to report''

    ELSE ''No Alerts''

    END AS AlertMessage

    FROM FailedEquipmentCount

    GO

    ```


    **Listing 9-9** Improved Query


    Using one of the existing report tables (`Reports.EquipmentFailureStatistics`)
    eliminates the first `CTE`. Let’s see the revised estimated execution plan.


    Please refer to Figure [9-24](#527021_1_En_9_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig24_HTML.png)


    A screenshot represents an execution plan. The arrows point towards the nested
    loop cost equal to 4 percent, sort cost equal to 37 percent, and table scan equal
    to 58 percent.


    **Figure 9-24** Revised estimated query plan


    We can see the query plan was simplified. The clustered index seek was eliminated
    because we no longer use the table. What appears now is a table scan at a cost
    of 58% on the report table. Is this better? This is better as the report table
    is all set up with the data we need and it has only about 2,000 rows. If we really
    wanted to increase performance, we could make this a memory-optimized table. Everything
    is faster when you pop it in memory, right?


    We also see a sort task with a cost of 37%, a table spool at 1%, and two nested
    loops joins with costs of 0% and 4% as we navigate right to left on the plan.


    I guess this is better because there are fewer branches and steps. Let’s look
    at the `IO` and `TIME` statistics.


    Please refer to Figure [9-25](#527021_1_En_9_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_9_Chapter/527021_1_En_9_Fig25_HTML.png)


    A screenshot compares the two messages. The arrows point toward the elapsed times,
    logical reads, and read-ahead reads.


    **Figure 9-25** Comparing IO and TIME statistics


    The new table in the improved, simpler query had 22 logical reads vs. 24 logical
    reads with the original `EquipmentFailure` table. Modest improvement but we will
    take it. Also, execution went down from 148 ms to 35 ms.


    ## Conclusion


    **Conclusion:** Think before you code. Also prototype.


    Keep track of the report tables you create so you can reuse them for different
    queries! Sometimes you might come up with two report tables that are almost the
    same but differ because they need one or two more columns. Merge the table so
    you only have one table that can be used for multiple queries.


    Lastly, always compare results when you improve a query. Make sure that the new
    improved query results are exactly the same as the old query. Improvements are
    great, but if the results do not match, they are meaningless.


    Oh yes, the report tables solve a lot of problems, but they take time to load.
    Too many report tables, even if they are loaded at off-hours, can become a problem
    as the load window gets tighter and tighter.'
