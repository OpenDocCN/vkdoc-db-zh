  trans: '

    # 2. 销售数据仓库用例：聚合函数


    本章我们的主要目标是学习并应用一类称为聚合函数的窗口函数。我们将从描述将要使用的名为 `APSales` 的销售数据仓库开始。


    文中呈现了一个简单的业务概念模型以及一些简单的数据字典，以帮助我们理解数据库的业务内容。


    我们包含了关于性能调优的讨论，然后对每个窗口函数进行实际演练。最后，我们将简要讨论 SQL Server 2022 的一个新功能 `WINDOW`，它用于为窗口函数定义
    `OVER()` 子句。


    注意


    用于创建这个小型数据仓库的 DDL 以及用于创建所有表和视图、为表加载测试数据的脚本，可以在本书的 Google 网站上找到。代码易于使用。每个步骤都有标签，并且在必要时注释有助于澄清每个步骤的作用。


    让我们花点时间了解一下我们的小型销售数据仓库是关于什么的。


    ## 销售数据仓库


    `APSales` 数据仓库存储了一家虚构公司的交易和历史信息，该公司以传统欧式风格烘焙和销售各种蛋糕、馅饼、挞和巧克力。


    该公司有 100 名客户，我们想要跟踪和分析他们跨越数年数据的购买模式。公司销售 60 种产品，这些产品属于蛋糕、馅饼、挞、牛角包和巧克力等多个类别。


    客户在遍布美国的 16 家商店之一购买他们喜爱的甜点。


    最后，使用一个暂存表来模拟每位客户过去几年的购买情况。你的第一个任务是创建数据库和表，加载数据，并编写一些简单的查询来查看你将要分析的实际数据。


    图 2-1 是 SSMS 对象资源管理器的截图，显示了数据库和表。一旦你创建了数据库和所有表对象，你自己的对象资源管理器面板应该看起来像这样。


    ![](img/527021_1_En_2_Fig1_HTML.jpg)


    一张 S S M S 窗口的截图。左侧面板展示了对象资源管理器，包含多个文件和文件夹。它显示了 A P Plant、A P sales、数据库关系图文件夹和表。表文件夹有另外
    4 个文件夹和 13 个关系图表文件。右侧面板有一段代码和统计信息。


    图 2-1


    数据仓库表


    请注意 `SalesReports` 和 `StagingTable` 架构中的表。分配给 `SalesReports` 架构的表代表通过星型查询查询销售事实表生成的非规范化视图，该星型查询将所有维度连接到事实表，以便我们可以向业务分析师提供一些使用所有名称、代码等的数据。


    分配给 `StagingTable` 架构的表被 TSQL 批处理脚本使用，这些脚本生成一些随机的交易数据，以便我们可以将其加载到销售事实表中。让我们看一个简单的业务概念模型，以了解这一切是如何联系在一起的。


    ## 销售数据仓库概念模型


    以下是一个简单的业务概念数据模型，它标识了销售数据仓库的主要业务对象。目标数据库是一个基本的星型模式模型，因为它有一个事实表和几个维度表（当然，你可以有多个事实表）。


    还包括几个非规范化的报告表，以便于运行复杂查询。


    这些表称为 `SalesStarReport` 和 `YearlySalesReport`，并被分配到 `SalesReports` 架构。这些表用于关联事实表和维度表，并用实际的维度表列替换代理键。它们每天晚上都会预加载，以便用户在第二天可以使用。预加载表提供了性能优势，因为它允许在数据插入表之前执行计算；更简单的查询将运行得更快。


    对于那些不熟悉数据仓库或数据集市的人来说，被赋予代理键角色的列用于建立维度表和事实表之间的关联。这些是数值列，因为它们在连接中比字母数字列使用得更快。


    在图中查看，发挥你的想象力，它们类似一颗星，因此被称为星型模式。


    以下模型仅旨在显示基本业务对象及其关系。它不是一个完整的物理数据仓库模型。顺便说一句，我假设你知道什么是事实表以及什么是维度。


    注意


    网上有很多资源描述什么是数据仓库或数据集市。如果你不熟悉这种架构，这里有一个链接可能有帮助：


    [`www.snowflake.com/data-cloud-glossary/data-warehousing/`](http://www.snowflake.com/data-cloud-glossary/data-warehousing/)


    另一个很好的资源是 [`www.kimballgroup.com/`](http://www.kimballgroup.com/)。


    每个维度表都有一个扮演主键角色的代理键。所有这些代理键都作为外键出现在事实表中。从技术上讲，事实表中的所有外键都可以用作事实表的主键。事实表还包含代表你可以计数的数据的列，换句话说，是数值数据。在特殊情况下，事实表可以包含其他类型的列，但这是另一本书的主题。（请查阅无事实事实表和垃圾维度。）


    请参考图 2-2。


    ![](img/527021_1_En_2_Fig2_HTML.png)


    A P 销售概念模型的方块图。销售与日历、国家、客户、商店和产品相关联。产品之后是产品子类别和产品类别的识别。一笔销售交易流向销售。


    图 2-2


    APSales 概念业务模型


    这被称为概念业务模型，因为它旨在向非技术用户（我们的朋友，业务分析师和经理们）清晰地标识主要的业务数据对象。这类模型用于数据库设计的初始阶段。


    数据建模师、业务分析师和其他利益相关者聚集在一起，识别将包含在数据库或数据仓库中的主要数据对象。在设计过程的这个阶段，只识别基本的元数据，比如实体名称及其相互关系。


    后续的会议将概念模型演变为物理非规范化星型或雪花模式设计，其中所有代理键、列和其他对象都被识别出来。


    我呈现这个简单的模型，以便你能对将要实现数据仓库的数据库有一个基本的了解。


    接下来，我们需要创建一系列称为数据字典的简单文档，以进一步描述元数据。

    '
- fmt: 'Table [2-1](#527021_1_En_2_Chapter.xhtml#Tab1) is a simple table that shows
    the associations between the entities that will become the fact table and the
    dimension tables. You need to understand these so you can build queries that join
    the tables together.


    ## Table 2-1: Fact-Dimension Associations


    | Dimension | Business Rule | Fact/Dimension Table | Cardinality |

    | --- | --- | --- | --- |

    | Country | Identifies location for | Sales | One to zero, one, or many |

    | Store | Fulfills sales for | Sales | One to zero, one, or many |

    | Customer | Is the subject of | Sales | One to zero, one, or many |

    | Product | Is subject of | Sales | One to zero, one, or many |

    | Product Category | Category classification of a product | Product | One to zero,
    one, to many |

    | Product Subcategory | Subcategory classification for | Product Category | One
    to one, many to one |

    | Calendar | Identifies sales date of | Sales | One to zero, one to many |


    Typically, these types of tables appear in data dictionaries that contain information
    about the various data objects that make up a database. Looking at the associations
    in the preceding table, we also want to highlight the business rules that link
    these together.


    A country identifies a location in zero, one, or more rows in the `Sales` fact
    table. A fact table row needs to contain a country code, but it is possible to
    have rows in the `Country` table that have no related row in the `Sales` table.
    In the database you will build, there are only sales transactions for the United
    States although the `Country` dimension contains most of the country information
    for all the ISO standard country codes.


    Note


    A data warehouse is a specialized type of table. In this chapter I use the terms
    interchangeably.


    A store can be the subject of zero, one, or more records in the `Sales` fact table.
    It is possible to have a new store that has not sold any products yet, so there
    are no records in the `Sales` fact table.


    The same rule applies for a customer. A customer can appear in zero, one, or more
    records in the `Sales` table. It is possible to have a new customer that has not
    bought anything yet, so the customer will appear in the `Customer` dimension but
    not in the `Sales` fact table.


    A product can appear in zero, one, or more sales records in the `Sales` fact table.
    It is possible to have a product not yet sold appear in the `Product` table.


    A product category can refer to one or more product subcategories, and each product
    category can refer to one or more products. It is possible to have product categories
    and product subcategories that have not been assigned to a product yet for various
    reasons, like it has not been manufactured yet. (For example, we plan to sell
    ice creams but have not manufactured them yet.)


    Last but not least is a simple data dictionary that describes the tables themselves
    although the names are fairly self-explanatory. Please refer to Table [2-2](#527021_1_En_2_Chapter.xhtml#Tab2).


    ## Table 2-2: Table Definition Data Dictionary


    | Table Name | Description |

    | --- | --- |

    | Calendar | Basic calendar date objects used for time reporting (like date, quarter,
    month, and year objects). |

    | Country | Contains ISO two- and three-character codes for most of the world’s
    countries, for example, US or USA. |

    | Customer | Basic customer table used to store names of the customers and identifiers.
    |

    | Product | Basic product table that stores names and descriptions of products.
    |

    | Product Category | High-level category codes and description for products: chocolates,
    cakes, pies, croissants, and tarts. |

    | Product Subcategory | Further breaks down a product category. For example, chocolates
    can be broken down into dark chocolates – small, dark chocolates – medium, and
    dark chocolates – large. |

    | Store | Contains basic information for 16 stores: the store number, name, and
    territory. Useful for sales performance analysis. |

    | Sales | Stores all sales transactions by customers over multiple years. Who
    bought what, when, and where! |


    Keep in mind that this is just a basic set of design specifications for the simple
    data warehouse we will be using. I took great liberties in just presenting the
    most basic concepts of data warehouse and star schema. You would also need data
    dictionaries that describe the primary and foreign keys and surrogate keys and
    also data dictionaries that describe each of the columns and their data types
    in the fact and dimension tables.


    To summarize, our goal is to have a simple data warehouse we can load and use
    as we study the capabilities of all the window functions that are discussed in
    this book. Hopefully this section gave you a basic understanding of the data warehouse
    you will build with the script that can be found on the Google website for this
    book.'
