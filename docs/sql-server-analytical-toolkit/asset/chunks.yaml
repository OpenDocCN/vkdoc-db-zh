    ## Summary


    We covered a lot of ground. What did we learn?


    *   We learned how to apply the window or ranking functions to our sales data
    warehouse.


    *   We took a deeper dive into performance analysis by understanding how data
    is either cached in memory or on physical disk.


    *   We started to analyze and come up with conclusions on performance based on
    the nature of estimated plan tasks and `IO` and `TIME` statistics.


    *   We had a brief discussion about and summarized some steps to consider when
    doing performance analysis.


    *   Lastly, we looked at a real-world data problem called gaps and islands.


    Armed with all this knowledge, we continue to see how all our functions work against
    a financial database.


    # 5. Finance Use Case: Aggregate Functions


    We now turn our focus to the financial industry. As was the case with the past
    three chapters, we will use the three categories of SQL Server functions available
    to us to analyze a stock trading scenario. We will dedicate one chapter to each
    category of functions. Each function will be used in a query. We will examine
    the results by looking at the output and, then in most cases, copying the output
    to a Microsoft Excel spreadsheet so we can generate a graph or two to visualize
    the results.


    We will also get deeper into performance tuning. A powerful command called `SET
    PROFILE STATISTICS ON` can be used to get valuable insight into exactly what SQL
    Server is doing when executing a query. This will be a long chapter, so brew a
    lot of coffee!


    Tip


    Keep in mind that estimated query plan costs are not the time it takes to complete
    a step, but a weighted value assigned by the query optimizer that takes into account
    IO, memory, and CPU costs.'
