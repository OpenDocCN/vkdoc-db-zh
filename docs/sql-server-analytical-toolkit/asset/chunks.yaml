- fmt: "### Performance Considerations\n\n我们可以预期会有一个有趣的估计查询计划，因为我们拥有所有这些连接。\n\n让我们通过使用“查询”菜单选项下的选择，以通常的方式生成计划。\n\
    \n我需要将其分成两个部分，因为它很大。\n\n请参考图 [11-22a](#527021_1_En_11_Chapter.xhtml#Fig24)。\n\n\
    ![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig24_HTML.png)\n\n一个SQL工作区的截图。窗口的主页面显示了执行计划。箭头指向聚集索引开销6%、嵌套循环开销41%和索引查找开销41%。\n\
    \n图 11-22a\n\n估计查询计划部分 A\n\n这是计划的第一部分。如果行数很少，这类查询将对维度进行一系列表扫描，因此即使你创建了索引，也不会被使用！\n\
    \n我们在事实表上确实有一个索引查找，这是件好事（查找优于扫描）。看起来我们有一个可用的索引，它满足了 `OVER()` 子句的列和 `WHERE` 子句谓词列，因此没有建议创建索引。\n\
    \n所有流都通过哈希匹配连接（3% 的开销）进行连接。我们有一个嵌套循环连接任务，开销为 41%，它连接了来自 `Product`、`ProductType`\
    \ 和 `InventoryHistory` 表的流。让我们看看查询计划的第二部分。\n\n请参考图 [11-22b](#527021_1_En_11_Chapter.xhtml#Fig25)。\n\
    \n![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig25_SQL.png)\n\n一个SQL工作区的截图。窗口的主页面从左到右显示了执行计划的步骤。它读取选择、计算标量、流聚合、窗口假脱机、段、计算标量、流聚合和排序。\n\
    \n图 11-22b\n\n估计查询计划部分 B\n\n这里无需担心。所有开销都为零，所以让我们查看一下 `TIME` 和 `IO` 统计信息。\n\n请参考图\
    \ [11-23](#527021_1_En_11_Chapter.xhtml#Fig26)。\n\n![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig26_HTML.png)\n\
    \n一个SQL工作区的截图。主页面的上半部分表示SQL查询代码，下半部分标题为消息。箭头指向逻辑读取42和263，预读0和259，经过时间等于204毫秒。\n\
    \n图 11-23\n\nIO 和 TIME 统计信息\n\n让我们讨论一下数值较高的统计信息。我们的 `Calendar` 维度产生了大约42次逻辑读取和40次预读，因此这是需要重点关注以进行性能改进的领域。我们可以将其放置在高速或固态硬盘上，或使用内存增强表。\n\
    \n工作表的所有值都为0，所以我们不必担心这个。\n\n最后，事实表 `InventoryHistory` 的扫描计数为1，逻辑读取263次，物理读取2次，预读259次。这是可以预料的，因为该表有736,320行，相当大（至少对于笔记本电脑而言）。\n\
    \n**提示与家庭作业**\n\n由于数据具有历史性质，我们应该将结果放入一个报表表中，就像我们在之前的示例中所做的那样。这样，我们只在非高峰时段加载表时承担一次性能影响。请自行尝试并进行必要的分析。\n\
    \n### `STDEV()` 函数\n\n统计时间到了！\n\n提醒一下，回想一下我们从第 [2] 章中对标准差的定义（如果你对此工作原理感到舒适，请跳过此部分，直接转到示例查询的业务规范）。如果你需要复习或者这对你是新的，请继续阅读：\n\
    \n`STDEV()` 函数计算一组值的统计标准差，当整个总体**未知**或不可用时。\n\n但这意味着什么？\n\n这意味着数据集中的数字算术**平均值**（这是“平均”的另一种说法）有多接近或多远。在我们的上下文中，平均或**平均值**是所讨论的所有数据值的总和除以数据值的数量。还有其他类型的**平均值**，如几何平均、调和平均和加权**平均**，我将在附录\
    \ B 中简要介绍。\n\n回想一下标准差是如何计算的。\n\n以下是计算标准差的算法，如果你有冒险精神，可以用 TSQL 自己实现：\n\n*   计算所有值的平均值（**平均值**）并将其存储在变量中。你可以使用\
    \ `AVG()` 函数。\n*   循环遍历值集合。对于数据集中的每个值\n    *   减去计算出的平均值。\n*   对结果求平方。\n*   取所有前述结果的总和，并将该值除以数据元素的数量减\
    \ 1。（此步骤计算方差；要计算整个总体，请不要减 1。）\n*   现在对方差取平方根，那就是你的标准差。\n\n或者你也可以直接使用 `STDEV()`\
    \ 函数！还有一个 `STDEVP()` 函数。唯一的区别是 `STDEV()` 处理数据总体的一部分。这适用于整个数据集未知的情况。`STDEVP()`\
    \ 函数处理整个数据集，这就是整个数据总体的含义。\n\n再次说明语法：\n\n```sql\nSELECT STDEV( ALL | DISTINCT )\
    \ AS [Column Alias]\nFROM [Table Name]\nGO\n```\n\n你需要提供一个包含要使用的数据的列名。你可以选择性地提供\
    \ `ALL` 或 `DISTINCT` 关键字。如果你省略它们，与其他函数一样，默认行为将是 `ALL`。使用 `DISTINCT` 关键字将忽略列中的重复值（确保这是你想要做的）。\n\
    \n以下是业务分析师提供给我们的下一份报告的业务需求：\n\n需要一份报告，显示库存现有数量的平均值和标准差。结果需要针对年份“2003”、位置“LOC1”、库存“INV1”和产品“PO33”。报告数据需要用于在\
    \ Microsoft Excel 电子表格中创建正态分布图。\n\n以下是我们为满足规范要求而编写的代码。\n\n请参考代码清单 [11-7](#527021_1_En_11_Chapter.xhtml#PC12)。\n\
    \n```sql\nWITH YearlyWarehouseReport (\n    AsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,\n\
    \    ProdId,AvgQtyOnHand\n)\nAS\n(\n    SELECT AsOfYear\n          ,DATEPART(qq,AsOfDate)\
    \ AS AsOfQuarter\n          ,AsOfMonth\n          ,AsOfDate\n          ,LocId\n\
    \          ,InvId\n          ,WhId\n          ,ProdId\n          ,AVG(QtyOnHand)\
    \ AS AvgQtyOnHand\n    FROM Product.Warehouse\n    GROUP BY AsOfYear\n       \
    \     ,DATEPART(qq,AsOfDate)\n            ,AsOfMonth\n            ,AsOfDate\n\
    \            ,LocId\n            ,InvId\n            ,WhId\n            ,ProdId\n\
    )\nSELECT AsOfYear\n      ,AsOfQuarter\n      ,AsOfMonth\n      ,AsOfDate\n  \
    \    ,LocId\n      ,InvId\n      ,WhId\n      ,ProdId\n      ,AvgQtyOnHand AS\
    \ MonthlyAvgQtyOnHand\n      ,AVG(AvgQtyOnHand) OVER (\n            PARTITION\
    \ BY AsOfYear,WhId\n            ORDER BY AsOfYear\n        ) AS YearlyAvg\n  \
    \    ,STDEV(AvgQtyOnHand) OVER (\n            PARTITION BY AsOfYear,WhId\n   \
    \         ORDER BY AsOfYear\n        ) AS YearlyStdev\nFROM YearlyWarehouseReport\n\
    WHERE AsOfYear = 2003\n  AND LocId = 'LOC1'\n  AND InvId = 'INV1'\n  AND ProdId\
    \ ='P033'\nGO\n```\n代码清单 11-7\n库存数量平均值与标准差报告"
  raw: "### Performance Considerations\n\nWe can expect an interesting, estimated\
    \ query plan as we have all those joins.\n\nLet’s generate our plan in the usual\
    \ manner by using the selection under the Query menu option.\n\nI need to split\
    \ it into two sections as it is a large one.\n\nPlease refer to Figure [11-22a](#527021_1_En_11_Chapter.xhtml#Fig24).\n\
    \n![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig24_HTML.png)\n\nA screenshot\
    \ of the S Q L work area. The main page of the window displays the execution plan.\
    \ The arrows point towards a clustered index cost of 6 percent, nested loop cost\
    \ of 41 percent, and index seek cost of 41 percent.\n\nFigure 11-22a\n\nEstimated\
    \ query plan part A\n\nHere is the first section of the plan. These types of queries\
    \ will have a series of table scans on the dimensions if the row count is small,\
    \ so an index would not be used, even if you created one!\n\nWe do have an index\
    \ seek on the fact table, which is a good thing (seek better than a scan). Looks\
    \ like we had a usable index lying around that satisfied the `OVER()` clause columns\
    \ and also the `WHERE` clause predicate columns, so an index was not suggested.\n\
    \nAll the streams are joined by a hash match join (3% cost). We do have a nested\
    \ loops join task with a cost of 41% that joins the streams from the `Product`,\
    \ `ProductType`, and `InventoryHistory` tables. Let’s look at the second part\
    \ of the query plan.\n\nPlease refer to Figure [11-22b](#527021_1_En_11_Chapter.xhtml#Fig25).\n\
    \n![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig25_HTML.png)\n\nA screenshot\
    \ of the S Q L work area. The main page of the window displays the steps of the\
    \ execution plan from left to right. It reads select, compute scalar, stream aggregate,\
    \ window spool, segment, compute scalar, stream aggregate, and sort.\n\nFigure\
    \ 11-22b\n\nEstimated query plan part B\n\nNothing to worry about here. All zero\
    \ costs, so let’s check out the `TIME` and `IO` statistics.\n\nPlease refer to\
    \ Figure [11-23](#527021_1_En_11_Chapter.xhtml#Fig26).\n\n![](images/527021_1_En_11_Chapter/527021_1_En_11_Fig26_HTML.png)\n\
    \nA screenshot of the S Q L work area. The upper half of the main page represents\
    \ the S Q L query code, and the lower half is titled messages. The arrows point\
    \ towards logical reads 42 and 263, reads ahead reads 0 and 259, and elapsed time\
    \ equal to 204 m s.\n\nFigure 11-23\n\nIO and TIME statistics\n\nLet’s just discuss\
    \ the higher-value statistics. Our Calendar dimension generated around 42 logical\
    \ reads and 40 read-ahead reads, so this is an area to focus on for performance\
    \ improvement. We can place it on a high-speed or solid-state disk or a memory-enhanced\
    \ table.\n\nThe work table has all 0 values so we will not worry about this.\n\
    \nLastly, the fact table `InventoryHistory` has a scan count of 1 and 263 logical\
    \ reads, 2 physical reads, and 259 read-ahead reads. This is to be expected as\
    \ the table has 736,320 rows, so it is rather large (at least for a laptop).\n\
    \nTip and Homework\n\nSince the data is historical in nature, we should put the\
    \ results in a report table like we did in prior examples. This way we take the\
    \ performance hit only once when the table is loaded at off hours. Try it on your\
    \ own and perform the necessary analysis.\n\n### STDEV( ) Function\n\nStatistics\
    \ time!\n\nAs a reminder, recall our definition for standard deviation from Chapter\
    \ [2](#527021_1_En_2_Chapter.xhtml) (skip this if you are comfortable with how\
    \ this works and go right to the business specification for the example query).\
    \ If you need a refresher or this is new to you, continue reading:\n\nThe `STDEV()`\
    \ function calculates the statistical standard deviation of a set of values when\
    \ the entire population **is not known** or available.\n\nBut what does this mean?\n\
    \nWhat this means is how close or how far apart the numbers are in the data set\
    \ from the arithmetic **MEAN** (which is another word for average). In our context\
    \ the average or **MEAN** is the sum of all data values in question divided by\
    \ the number of data values. There are other types of **MEAN** like geometric,\
    \ harmonic, and weighted **MEAN**, which I will briefly cover in Appendix B.\n\
    \nRecall how the standard deviation is calculated.\n\nHere is the algorithm to\
    \ calculate the standard deviation, which you can implement on your own with TSQL\
    \ if you are adventurous:\n\n*   Calculate the average (**MEAN**) of all values\
    \ in question and store it in a variable. You can use the `AVG()` function.\n\n\
    *   Loop around the value set. For each value in the data set\n    *   Subtract\
    \ the calculated average.\n\n*   Square the result.\n\n*   Take the sum of all\
    \ the preceding results and divide the value by the number of data elements minus\
    \ 1\\. (This step calculates the variance; to calculate for the entire population,\
    \ do not subtract 1.)\n\n*   Now take the square root of the variance, and that’s\
    \ your standard deviation.\n\nOr you could just use the `STDEV()` function! There\
    \ is a `STDEVP()` function. The only difference is that `STDEV()` works on part\
    \ of the population of the data. This is when the entire data set is not known.\
    \ The `STDEVP()` function works on the entire data set, and this is what is meant\
    \ by the entire population of data.\n\nOnce again here is the syntax:\n\n```\n\
    SELECT STDEV( ALL | DISTINCT ) AS [Column Alias]\nFROM [Table Name]\nGO\n```\n\
    \nYou need to supply a column name that contains the data you want to use. You\
    \ can optionally supply the `ALL` or `DISTINCT` keyword if you wish. If you leave\
    \ these out, just like the other functions, the behavior will default to `ALL`.\
    \ Using the `DISTINCT` keyword will ignore duplicate values in the column (make\
    \ sure this is what you want to do).\n\nHere come the business requirements for\
    \ this next report supplied to us by our business analyst:\n\nA report is needed\
    \ that displays the average and standard deviation for inventory quantity on hand.\
    \ Results need to be for the year “2003”, location “LOC1”, inventory “INV1”, and\
    \ product “PO33”. The report data needs to be used to create a normal distribution\
    \ graph in a Microsoft Excel spreadsheet.\n\nHere is the code we came up with\
    \ to deliver the specification requirements.\n\nPlease refer to Listing [11-7](#527021_1_En_11_Chapter.xhtml#PC12).\n\
    \n```\nWITH YearlyWarehouseReport (\nAsOfYear,AsOfQuarter,AsOfMonth,AsOfDate,LocId,InvId,WhId,\n\
    ProdId,AvgQtyOnHand\n)\nAS\n(\nSELECT AsOfYear\n,DATEPART(qq,AsOfDate) AS AsOfQuarter\n\
    ,AsOfMonth\n,AsOfDate\n,LocId\n,InvId\n,WhId\n,ProdId\n,AVG(QtyOnHand) AS AvgQtyOnHand\n\
    FROM Product.Warehouse\nGROUP BY AsOfYear\n,DATEPART(qq,AsOfDate)\n,AsOfMonth\n\
    ,AsOfDate\n,LocId\n,InvId\n,WhId\n,ProdId\n)\nSELECT AsOfYear\n,AsOfQuarter\n\
    ,AsOfMonth\n,AsOfDate\n,LocId\n,InvId\n,WhId\n,ProdId\n,AvgQtyOnHand AS MonthlyAvgQtyOnHand\n\
    ,AVG(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear,WhId\nORDER BY AsOfYear\n) AS\
    \ YearlyAvg\n,STDEV(AvgQtyOnHand) OVER (\nPARTITION BY AsOfYear,WhId\nORDER BY\
    \ AsOfYear\n) AS YearlyStdev\nFROM YearlyWarehouseReport\nWHERE AsOfYear = 2003\n\
    AND LocId = 'LOC1'\nAND InvId = 'INV1'\nAND ProdId ='P033'\nGO\nListing 11-7\n\
    Average and Standard Deviation Report for Inventory Quantities\n```"
