- fmt: 'Let’s rerun the query, but before we do, we need to clear the memory buffers
    and generate some `IO` statistics by executing the following commands:


    ```

    DBCC dropcleanbuffers;

    CHECKPOINT;

    GO

    -- turn set statistics io/time on

    SET STATISTICS IO ON

    GO

    SET STATISTICS TIME ON

    GO

    ```


    The `DBCC` command will make sure the memory buffers are cleared out, so we start
    with a clean slate. If you do not perform this step, older query plans will be
    in memory cache, and you will get erroneous results.


    The next two commands will generate our `IO` and timing statistics. Let’s see
    what results we get when we execute the query.


    Please refer to Table [2-3](#527021_1_En_2_Chapter.xhtml#Tab3).


    Table 2-3


    Comparing Statistics Between Plans


    | SQL Server Parse and Compile Times | Existing Index | New Index |

    | --- | --- | --- |

    | CPU time (ms) | 15 | 16 |

    | Elapsed time (ms) | **4492** | **89** |

    | **Statistics (YearlySalesReport)** | **Existing Index** | **New Index** |

    | Scan count | 1 | 1 |

    | Logical reads | **260** | **10** |

    | Physical reads | 1 | 1 |

    | Read-ahead reads | **51** | **7** |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | **83** | **74** |

    | Elapsed time (ms) | 0 | 0 |


    Checking out the statistics, we see CPU time went up by 1 ms (millisecond), but
    elapsed time went down from 4492 ms to 89 ms. Scan count remained the same, but
    logical reads dropped to 10 from 260. This is good.


    Physical reads remained the same at 1, and read-ahead reads dropped from 51 to
    7. Finally, SQL Server execution CPU time dropped from 83 ms to 74 ms. Overall,
    it looks like this new index improved performance.


    This was a quick example of the steps that you can take to analyze performance.
    As stated earlier, Chapter [14](#527021_1_En_14_Chapter.xhtml) will entirely be
    dedicated to performance tuning on selected queries we covered. Let’s look at
    our next function, the `STRING_AGG()` function, to tie some strings together (pun
    intended!).


    ### STRING_AGG Function


    What does this do?


    This function allows you to aggregate strings, just as the name implies. This
    comes in handy when you need to list items of interest, like when you want to
    show all stops in a flight itinerary or, in our case, items purchased on a specific
    date. Another interesting example is if you need to list stops in a logistics
    scenario, like all the stops a truck will make when delivering the chocolate candies
    and cakes sold by the stores in our examples.


    This function is easy to use. You need to supply the name of the column and a
    delimiter, which is usually a comma.


    Let’s take a look at a simple example that shows what items customer `C00000008`
    purchased. We want results by year and month.


    Please refer to Listing [2-7](#527021_1_En_2_Chapter.xhtml#PC12).


    ```

    WITH CustomerPurchaseAnalysis(PurchaseYear,PurchaseMonth,CustomerNo,ProductNo,PurchaseCount)

    AS

    (

    SELECT DISTINCT

    YEAR(CalendarDate)  AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    CustomerNo,

    ProductNo,

    COUNT(*) AS PurchaseCount

    FROM StagingTable.SalesTransaction

    GROUP BY YEAR(CalendarDate),

    MONTH(CalendarDate),

    CustomerNo,

    ProductNo

    )

    SELECT

    PurchaseYear,

    PurchaseMonth,

    CustomerNo,

    STRING_AGG(ProductNo,'','') AS ItemsPurchased,

    COUNT(PurchaseCount)      AS PurchaseCount

    FROM CustomerPurchaseAnalysis

    WHERE CustomerNo = ''C00000008''

    GROUP BY

    PurchaseYear,

    PurchaseMonth,

    CustomerNo

    ORDER BY CustomerNo,

    PurchaseYear,

    PurchaseMonth

    GO

    Listing 2-7

    Product Report Using STRING_AGG()

    ```


    Notice how the `STRING_AGG()` function is used. The `ProductNo` column is passed
    together with a comma as the delimiter. A CTE is used so we can pull out the year
    and month from the `CalendarDate` column and count the number of purchases.


    In this example, the count value will always be the value 1 in the CTE, so we
    need to count the occurrences to get the total number value of the purchases.
    The resulting purchase count and the aggregate product numbers should match up,
    as far as the number of items purchased.


    Tip


    Always test the query in the CTE to make sure it works as expected!


    Let’s take a look at the results in Figure [2-16](#527021_1_En_2_Chapter.xhtml#Fig16).


    ![](images/527021_1_En_2_Chapter/527021_1_En_2_Fig16_HTML.jpg)


    A screenshot of the S S M S window. It presents a table of 6 columns and 22 rows.
    The column headers are serial number, purchase year, purchase month, customer
    number, items purchased, and purchase count. Each row includes different values.


    Figure 2-16


    Purchased product list report


    This looks correct. The `ItemsPurchased` column lists four items, and the `PurchaseCount`
    column has a value of 4. It seems this customer always buys the same items each
    month and the same quantity. When you like something, stick with it. What can
    I say?


    You can validate the results by modifying the CTE query, so it filters by the
    customer:


    ```

    SELECT DISTINCT

    YEAR(CalendarDate)  AS PurchaseYear,

    MONTH(CalendarDate) AS PurchaseMonth,

    CalendarDate,

    CustomerNo,

    ProductNo,

    COUNT(*) AS PurchaseCount

    FROM StagingTable.SalesTransaction

    WHERE CustomerNo = ''C00000008''

    GROUP BY YEAR(CalendarDate),

    MONTH(CalendarDate),

    CalendarDate,

    CustomerNo,

    ProductNo

    ORDER BY

    YEAR(CalendarDate),

