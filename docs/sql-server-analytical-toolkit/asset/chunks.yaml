    some programming codes. The bottom half screen presents the messages and execution
    plan. A pop-up panel presents window spool profile statistics.


    Figure 5-44e


    Profile statistics for window spool


    Recall from our discussions that the window spool task is used to load rows into
    memory or temporary storage that need to be processed repeatedly. In our case,
    this is generated by the `OVER()` clause, specifically the default RANGE clause.


    This is used to calculate the sum and standard deviation values. If we look at
    the query, the `ORDER BY` clause in the `OVER()` clause sorts by portfolio and
    month. Look at the profile statistics details for the window spool in Figure [5-44f](#527021_1_En_5_Chapter.xhtml#Fig51).


    ![](images/527021_1_En_5_Chapter/527021_1_En_5_Fig51_HTML.jpg)


    A screenshot of c h 0 5 aggregate queries s q l. The top half screen presents
    some programming codes. The bottom half screen presents the results and messages
    table. A row of window spool profile statistics is highlighted.


    Figure 5-44f


    Window spool profile statistics details


    The window spool displays the default behavior when a `PARTITION BY` and a `ORDER
    BY` clause are included in the `OVER()` clause:


    ```

    RANGE BETWEEN:([UNBOUNDED,[[APFinance].[Financial].[Portfolio].[Month]])

    ```


    Wait a minute. I stated earlier that the `ORDER BY` clause was sorted by portfolio
    and month. Well, since the `WHERE` clause is filtering out rows for only one portfolio,
    the CASH - FINANCIAL PORTFOLIO, then this column is not needed. Once again, I
