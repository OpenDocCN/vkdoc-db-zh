- fmt: "# 使用STDEV()和STDEVP()函数计算标准差\n\n### STDEV( ) and STDEVP( ) Functions\n\n作为提醒，请回忆我们在第2章中对标准差的定义（如果你对这部分很熟悉，可以直接跳到示例的业务规范）。如果你需要复习或者这是新知识，请继续阅读：\n\
    \n`STDEV()`函数在未知或无法获取整个总体时，计算一组值的统计标准差。\n\n`STDEVP()`函数在整个数据总体已知时，计算统计标准差。\n\n\
    但这到底是什么意思呢？\n\n它的含义是数据集中的数字与**算术平均值**（`MEAN`，即平均值的另一种说法）的接近或分散程度。在我们的上下文中，平均值`MEAN`是所讨论的所有数据值的总和除以数据值的数量。还有其他类型的`MEAN`，如几何平均值、调和平均值和加权`MEAN`，我将在附录B中简要介绍。\n\
    \n回顾一下标准差是如何计算的。\n\n以下是如何计算标准差的算法，如果你有兴趣，可以用T-SQL自行实现：\n\n```\n*   计算所有值的平均值（`MEAN`）并将其存储在变量中。你可以使用`AVG()`函数。\n\
    *   遍历值集合。对于数据集中的每个值\n    *   减去计算出的平均值。\n*   对结果求平方。\n*   取所有前述结果的和，并将该值除以数据元素的数量减1。（此步骤计算方差；若要计算整个总体，则不减1。）\n\
    *   现在取方差的平方根，这就是你的标准差。\n```\n\n或者，你也可以直接使用`STDEV()`函数！如前所述，还有一个`STDEVP()`函数。如前所述，唯一的区别是`STDEV()`处理的是数据总体的一部分。这适用于整个数据集未知的情况。`STDEVP()`函数处理整个数据集，这就是数据总体的含义。\n\
    \n再次说明其语法：\n\n```sql\nSELECT STDEV( ALL | DISTINCT ) AS [Column Alias]\nFROM [Table\
    \ Name]\nGO\n```\n\n你需要提供一个包含要使用数据的列名。你可以选择性地提供`ALL`或`DISTINCT`关键字。如果你省略它们，与其他函数一样，默认行为将是`ALL`。使用`DISTINCT`关键字将忽略列中的重复值（请确保这是你想要的操作）。\n\
    \n接下来是我们业务分析师提供的下一个报告的业务需求：\n\n需要一份设备故障的季度滚动标准差报告。目前，我们关注的是东电厂锅炉房内的设备。这是一份汇总报告，因此不需要单个设备故障数据，只需要总数，因此可以使用`EquipmentFailureStatistics`表中的信息。\n\
    \n回想一下，`EquipmentFailureStatistics`表替代了我们最初使用的`CTE`查询方法。该表是每晚预加载的。事实证明，这种方法提高了性能，因为每次运行查询时我们都不必重新生成总数。\n\
    \n清单8-14是满足分析师业务需求的T-SQL脚本。\n\n```sql\nSELECT PlantName    AS Plant\n,LocationName\
    \ AS Location\n,CalendarYear AS [Year]\n,QuarterName  AS [Quarter]\n,MonthName\
    \           AS [Month]\n,SumEquipmentFailure AS EquipFailure\n,STDEV(SumEquipmentFailure)\
    \ OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\nORDER\
    \ BY PlantName,LocationName,CalendarYear\n) AS StDevQtr\n,STDEVP(SumEquipmentFailure)\
    \ OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\nORDER\
    \ BY PlantName,LocationName,CalendarYear\n) AS StDevpQtr\nFROM Reports.EquipmentFailureStatistics\n\
    WHERE CalendarYear IN(2002,2003)\nAND PlantName = 'East Plant'\nAND LocationName\
    \ = 'Boiler Room'\nORDER BY PlantName,LocationName,CalendarYear,CalendarMonth\n\
    GO\n```\n清单 8-14\n季度滚动设备故障标准差\n\n这是一个容易满足的需求。`STDEV()`函数使用一个`OVER()`子句，该子句定义了按工厂名称、位置名称、年份和季度的分区。该分区按工厂名称、位置名称和日历年排序。\n\
    \n`STDEVP()`函数也被包含在内，它使用了与`STDEV()`函数相同的`OVER()`子句。\n\n如果你开始熟悉这些概念，可能会问：既然我们有`WHERE`子句筛选一个工厂和一个位置，为什么还要在分区中包含工厂名称和位置名称？\n\
    \n确实如此。我们不需要在`PARTITION BY`子句中包含工厂名称和位置名称。我修改了查询以排除它们，并得到了相同的结果。我也得到了相同的估计执行计划，如图8-20所示。\n\
    \n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig20_HTML.png)\n图 8-20\n比较执行计划\n\
    \n如图所示，两个查询具有相同的估计执行计划。`IO`和`TIME`统计信息对于两者也是相同的，所以没有问题。良好的编码实践要求使用最少的代码来获得期望且正确的结果。这个查询可以用于多个工厂和多个位置，所以如果你有完整的`PARTITION\
    \ BY`子句，可以直接使用。否则，如果这个查询只用于一个工厂和一个位置，请注释掉它并使用更小的版本。\n\n我修改了查询以使用所有工厂和位置，对估计查询计划的改变很小；增加了一个窗口假脱机步骤，成本为1%。因此，在创建脚本和查询时，请考虑所有这些因素。\n\
    \n回到查询，请参考图8-21中的部分结果。\n\n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig21_HTML.jpg)\n\
    图 8-21\n按工厂、位置和年份划分的季度滚动故障\n\n注意`STDEV()`和`STDEVP()`结果之间的细微差别。\n\n**小测验**\n\n\
    为什么`STDEVP()`函数生成的值总是更小？\n\n我们将使用标准差结果来生成钟形曲线。钟形曲线是由称为正态分布的值生成的，这些值源自标准差、平均值和数据集中的每个单独值。\n\
    \n让我们看看这些数据在Microsoft Excel电子表格中生成的图形。请参考图8-22。\n\n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig22_HTML.png)\n\
    图 8-22\n锅炉房设备故障按季度划分的标准差"
  raw: "### STDEV( ) and STDEVP( ) Functions\n\nAs a reminder, recall our definition\
    \ for standard deviation from Chapter [2](#527021_1_En_2_Chapter.xhtml) (skip\
    \ this if you are comfortable with how this works and go right to the business\
    \ specification for the example query). If you need a refresher or this is new\
    \ to you, continue reading:\n\nThe STDEV() function calculates the statistical\
    \ standard deviation of a set of values when the entire population is not known\
    \ or available.\n\nThe STDEVP() function calculates the statistical standard deviation\
    \ when the entire population of the data set is known.\n\nBut what does this mean?\n\
    \nWhat this means is how close or how far apart the numbers are in the data set\
    \ from the arithmetic **MEAN** (which is another word for average). In our context\
    \ the average or **MEAN** is the sum of all data values in question divided by\
    \ the number of data values. There are other types of **MEAN** like geometric,\
    \ harmonic, and weighted **MEAN**, which I will briefly cover in Appendix B.\n\
    \nRecall how the standard deviation is calculated.\n\nHere is the algorithm to\
    \ calculate the standard deviation, which you can implement on your own with TSQL\
    \ if you are adventurous:\n\n*   Calculate the average (**MEAN**) of all values\
    \ in question and store it in a variable. You can use the `AVG()` function.\n\n\
    *   Loop around the value set. For each value in the data set\n    *   Subtract\
    \ the calculated average.\n\n*   Square the result.\n\n*   Take the sum of all\
    \ the preceding results and divide the value by the number of data elements minus\
    \ 1\\. (This step calculates the variance; to calculate for the entire population,\
    \ do not subtract 1.)\n\n*   Now take the square root of the variance, and that’s\
    \ your standard deviation.\n\nOr you could just use the `STDEV()` function! There\
    \ is a `STDEVP()` function as mentioned earlier. As stated earlier, the only difference\
    \ is that `STDEV()` works on part of the population of the data. This is when\
    \ the entire data set is not known. The `STDEVP()` function works on the entire\
    \ data set, and this is what is meant by the entire population of data.\n\nOnce\
    \ again here is the syntax:\n\n```\nSELECT STDEV( ALL | DISTINCT ) AS [Column\
    \ Alias]\nFROM [Table Name]\nGO\n```\n\nYou need to supply a column name that\
    \ contains the data you want to use. You can optionally supply the `ALL` or `DISTINCT`\
    \ keyword if you wish. If you leave these out, just like the other functions,\
    \ the behavior will default to `ALL`. Using the `DISTINCT` keyword will ignore\
    \ duplicate values in the column (make sure this is what you want to do).\n\n\
    Here come the business requirements for this next report supplied to us by our\
    \ business analyst:\n\nA quarterly rolling standard deviation report for equipment\
    \ failures is required. Right now, we are interested in equipment located in the\
    \ boiler room of the east power plant. This is a summary report, so individual\
    \ equipment failures are not required, just totals so the information in the `EquipmentFailureStatistics`\
    \ table can be used.\n\nRecall that the `EquipmentFailureStatistics` table takes\
    \ the place of the original `CTE` query approach we were using. This is preloaded\
    \ nightly. This approach proved to increase performance as we do not have to generate\
    \ totals each time the query is run.\n\nListing [8-14](#527021_1_En_8_Chapter.xhtml#PC17)\
    \ is the `TSQL` script that satisfies the business requirements from the analyst.\n\
    \n```\nSELECT PlantName    AS Plant\n,LocationName AS Location\n,CalendarYear\
    \ AS [Year]\n,QuarterName  AS [Quarter]\n,MonthName           AS [Month]\n,SumEquipmentFailure\
    \ AS EquipFailure\n,STDEV(SumEquipmentFailure) OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\n\
    ORDER BY PlantName,LocationName,CalendarYear\n) AS StDevQtr\n,STDEVP(SumEquipmentFailure)\
    \ OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\nORDER\
    \ BY PlantName,LocationName,CalendarYear\n) AS StDevpQtr\nFROM Reports.EquipmentFailureStatistics\n\
    WHERE CalendarYear IN(2002,2003)\nAND PlantName = 'East Plant'\nAND LocationName\
    \ = 'Boiler Room'\nORDER BY PlantName,LocationName,CalendarYear,CalendarMonth\n\
    GO\nListing 8-14\nQuarterly Rolling Equipment Failure Standard Deviations\n```\n\
    \nThis is an easy requirement to fulfill. The `STDEV()` function uses an `OVER()`\
    \ clause that defines a partition by plant name, location name, year, and quarter.\
    \ The partition is sorted by plant name, location name, and calendar year.\n\n\
    The `STDEVP()` function was also included, and it uses the same `OVER()` clause\
    \ as the `STDEV()` function.\n\nIf you are getting used to these concepts, you\
    \ might be asking why include the plant name and location name if we have a `WHERE`\
    \ clause that filters for one plant and one location only.\n\nThat’s true. We\
    \ do not need the plant name and location name in the `PARTITION BY` clause. I\
    \ modified the query to exclude them and got the same results. I also got the\
    \ same estimated execution plan as shown in the Figure [8-20](#527021_1_En_8_Chapter.xhtml#Fig20).\n\
    \n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig20_HTML.png)\n\nA screenshot\
    \ of ch08 queries V 2 dot sql window. The screen is divided into 2 sub-windows\
    \ that compare the results. The plant name and location names are not needed in\
    \ the P A R T I T I O N by clause.\n\nFigure 8-20\n\nComparing execution plans\n\
    \nAs can be seen, there’s the same estimated execution plan for both queries.\
    \ The `IO` and `TIME` statistics were the same for both, so no harm done. Good\
    \ coding practice dictates to use the least amount of code to get the desired\
    \ and correct results. This query can be used for more than one plant and more\
    \ than one location, so if you have the full `PARTITION BY` clause, you can use\
    \ it as is. Otherwise, comment it out and use the smaller one if all you will\
    \ ever use this query on is one plant and location.\n\nI modified the query so\
    \ all plants and locations were used, and the change to the estimated query plan\
    \ was minor; a window spool step was added at a cost of 1%. So keep all these\
    \ items in consideration when creating your scripts and queries.\n\nBack to the\
    \ query, please refer to the partial results in Figure [8-21](#527021_1_En_8_Chapter.xhtml#Fig21).\n\
    \n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig21_HTML.jpg)\n\nA screenshot\
    \ of the S Q L query 1 dot sql window. It presents a result table. The table has\
    \ 8 columns for plant, location, year, quarter, month, equipment failure, and\
    \ St Dev quarter.\n\nFigure 8-21\n\nRolling quarterly failures by plant, location,\
    \ and year\n\nNotice the slight difference between `STDEV()` and `STDEVP()` results.\n\
    \nPop Quiz\n\nWhy are values generated by the `STDEVP()` function always smaller?\n\
    \nWe will use the standard deviation results to generate a bell curve. The bell\
    \ curve is generated by values called normal distributions, which are derived\
    \ from the standard deviation, mean, and each individual value in the data set.\n\
    \nLet’s see what graphs this data generates in a Microsoft Excel spreadsheet.\
    \ Please refer to Figure [8-22](#527021_1_En_8_Chapter.xhtml#Fig22).\n\n![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig22_HTML.png)\n\
    \nA screenshot of a Microsoft Excel sheet. The left screen has 4 tables. Each\
    \ table has 4 columns for the quarter, month, equipment failure, and N D I S T.\
    \ The right screen has the line graphs of the first, second, third, and fourth\
    \ quarter normal distribution failures in 2002.\n\nFigure 8-22\n\nStandard deviation\
    \ by quarter for boiler room equipment failure"
  trans: "\n# 使用 STDEV()和 STDEVP()函数计算标准差\n\n### STDEV( ) 和 STDEVP( ) 函数\n\n作为提醒，请回忆我们在第\
    \ 2 章中对标准差的定义（如果你对这部分很熟悉，可以直接跳到示例的业务规范）。如果你需要复习或者这是新知识，请继续阅读：\n\n`STDEV()`函数在未知或无法获取整个总体时，计算一组值的统计标准差。\n\
    \n`STDEVP()`函数在整个数据总体已知时，计算统计标准差。\n\n但这到底是什么意思呢？\n\n它的含义是数据集中的数字与**算术平均值**（`MEAN`，即平均值的另一种说法）的接近或分散程度。在我们的上下文中，平均值`MEAN`是所讨论的所有数据值的总和除以数据值的数量。还有其他类型的`MEAN`，如几何平均值、调和平均值和加权`MEAN`，我将在附录\
    \ B 中简要介绍。\n\n回顾一下标准差是如何计算的。\n\n以下是如何计算标准差的算法，如果你有兴趣，可以用 T-SQL 自行实现：\n\n```\n\
    *   计算所有值的平均值（`MEAN`）并将其存储在变量中。你可以使用`AVG()`函数。\n*   遍历值集合。对于数据集中的每个值\n    *  \
    \ 减去计算出的平均值。\n*   对结果求平方。\n*   取所有前述结果的和，并将该值除以数据元素的数量减 1。（此步骤计算方差；若要计算整个总体，则不减\
    \ 1。）\n*   现在取方差的平方根，这就是你的标准差。\n```\n\n或者，你也可以直接使用`STDEV()`函数！如前所述，还有一个`STDEVP()`函数。如前所述，唯一的区别是`STDEV()`处理的是数据总体的一部分。这适用于整个数据集未知的情况。`STDEVP()`函数处理整个数据集，这就是数据总体的含义。\n\
    \n再次说明其语法：\n\n```sql\nSELECT STDEV( ALL | DISTINCT ) AS [Column Alias]\nFROM [Table\
    \ Name]\nGO\n```\n\n你需要提供一个包含要使用数据的列名。你可以选择性地提供`ALL`或`DISTINCT`关键字。如果你省略它们，与其他函数一样，默认行为将是`ALL`。使用`DISTINCT`关键字将忽略列中的重复值（请确保这是你想要的操作）。\n\
    \n接下来是我们业务分析师提供的下一个报告的业务需求：\n\n需要一份设备故障的季度滚动标准差报告。目前，我们关注的是东电厂锅炉房内的设备。这是一份汇总报告，因此不需要单个设备故障数据，只需要总数，因此可以使用`EquipmentFailureStatistics`表中的信息。\n\
    \n回想一下，`EquipmentFailureStatistics`表替代了我们最初使用的`CTE`查询方法。该表是每晚预加载的。事实证明，这种方法提高了性能，因为每次运行查询时我们都不必重新生成总数。\n\
    \n清单 8-14 是满足分析师业务需求的 T-SQL 脚本。\n\n```sql\nSELECT PlantName    AS Plant\n,LocationName\
    \ AS Location\n,CalendarYear AS [Year]\n,QuarterName  AS [Quarter]\n,MonthName\
    \           AS [Month]\n,SumEquipmentFailure AS EquipFailure\n,STDEV(SumEquipmentFailure)\
    \ OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\nORDER\
    \ BY PlantName,LocationName,CalendarYear\n) AS StDevQtr\n,STDEVP(SumEquipmentFailure)\
    \ OVER (\nPARTITION BY PlantName,LocationName,CalendarYear,QuarterName\nORDER\
    \ BY PlantName,LocationName,CalendarYear\n) AS StDevpQtr\nFROM Reports.EquipmentFailureStatistics\n\
    WHERE CalendarYear IN(2002,2003)\nAND PlantName = 'East Plant'\nAND LocationName\
    \ = 'Boiler Room'\nORDER BY PlantName,LocationName,CalendarYear,CalendarMonth\n\
    GO\n```\n清单 8-14\n季度滚动设备故障标准差\n\n这是一个容易满足的需求。`STDEV()`函数使用一个`OVER()`子句，该子句定义了按工厂名称、位置名称、年份和季度的分区。该分区按工厂名称、位置名称和日历年排序。\n\
    \n`STDEVP()`函数也被包含在内，它使用了与`STDEV()`函数相同的`OVER()`子句。\n\n如果你开始熟悉这些概念，可能会问：既然我们有`WHERE`子句筛选一个工厂和一个位置，为什么还要在分区中包含工厂名称和位置名称？\n\
    \n确实如此。我们不需要在`PARTITION BY`子句中包含工厂名称和位置名称。我修改了查询以排除它们，并得到了相同的结果。我也得到了相同的估计执行计划，如图\
    \ 8-20 所示。\n\n![](img/527021_1_En_8_Fig20_HTML.png)\n图 8-20\n比较执行计划\n\n如图所示，两个查询具有相同的估计执行计划。`IO`和`TIME`统计信息对于两者也是相同的，所以没有问题。良好的编码实践要求使用最少的代码来获得期望且正确的结果。这个查询可以用于多个工厂和多个位置，所以如果你有完整的`PARTITION\
    \ BY`子句，可以直接使用。否则，如果这个查询只用于一个工厂和一个位置，请注释掉它并使用更小的版本。\n\n我修改了查询以使用所有工厂和位置，对估计查询计划的改变很小；增加了一个窗口假脱机步骤，成本为\
    \ 1%。因此，在创建脚本和查询时，请考虑所有这些因素。\n\n回到查询，请参考图 8-21 中的部分结果。\n\n![](img/527021_1_En_8_Fig21_HTML.jpg)\n\
    图 8-21\n按工厂、位置和年份划分的季度滚动故障\n\n注意`STDEV()`和`STDEVP()`结果之间的细微差别。\n\n**小测验**\n\n\
    为什么`STDEVP()`函数生成的值总是更小？\n\n我们将使用标准差结果来生成钟形曲线。钟形曲线是由称为正态分布的值生成的，这些值源自标准差、平均值和数据集中的每个单独值。\n\
    \n让我们看看这些数据在 Microsoft Excel 电子表格中生成的图形。请参考图 8-22。\n\n![](img/527021_1_En_8_Fig22_HTML.png)\n\
    图 8-22\n锅炉房设备故障按季度划分的标准差\n"
- fmt: 'This time I used the multi-graph approach, that is, one bell curve graph for
    each year-quarter combination. A bit wonky, as we have inverted bell curves and
    one regular (sort of) bell curve.


    Note


    We will discuss the steps to take in the Microsoft Excel spreadsheet to generate
    normal distributions, mean values, standard deviations, and bell curves in Appendix
    B.


    What can be seen is a graph for each quarter for 2002. I had to generate the average
    for the quarters as the normal distribution function (`NORM.DIST`) in Excel. This
    function uses the value, the `MEAN` (average), and the standard deviation generated
    by the SQL Server query.


    Try to generate these graphs by yourself, but I will include the spreadsheet in
    the folder that contains the code for this chapter. Reminder, this is a good skill
    to have besides your `TSQL` skills.


    Let’s try this analysis by year. Please refer to Listing 8-15.


    Here is one final example where we will generate the normal distributions from
    the yearly standard deviations for two years, 2002 and 2003.


    ```

    SELECT PlantName AS Plant

    ,LocationName AS Location

    ,CalendarYear AS [Year]

    ,QuarterName  AS [Quarter]

    ,MonthName    AS Month

    ,SumEquipmentFailure As TotalFailures

    ,STDEV(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarYear

    ) AS RollingStdev

    ,STDEVP(SumEquipmentFailure) OVER (

    PARTITION BY PlantName,LocationName,CalendarYear

    ORDER BY CalendarYear

    ) AS RollingStdevp

    FROM Reports.EquipmentFailureStatistics

    WHERE CalendarYear IN(2002,2003)

    AND PlantName = ''East Plant''

    AND LocationName = ''Boiler Room''

    ORDER BY PlantName,LocationName,CalendarYear,CalendarMonth

    GO

    Listing 8-15

    Yearly Standard Deviation

    ```


    Notice the square brackets in some of the column aliases in the `SELECT` clause.
    The aliases used are reserved words in SQL Server, so using the brackets eliminates
    the colored warnings. No harm is done if you use the keywords, but this is one
    way around looking at all those colors.


    One minor change: The `PARTITION BY` clause was modified so it does not include
    the quarter name, and the `ORDER BY` clause was modified so it only includes the
    year. The same argument as before applies; since we are filtering for one plant
    and location only, we really do not need these in the `PARTITION BY` clause.


    Assignment


    Once you are comfortable with how the query works, modify it for more than one
    year and location. This is a good way to develop and test queries that can be
    used in Microsoft SSRS (SQL Server Reporting Services) reports.


    Here are the results we will copy and paste into a Microsoft Excel spreadsheet.
    Please refer to Figure 8-23.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig23_HTML.jpg)


    A screenshot of the S Q L query 1 dot sql window. It presents a result table.
    The table has 8 columns for plant, location, year, quarter, month, total failures,
    rolling Stdev, and rolling Stdevp.


    Figure 8-23


    Yearly failure standard deviation for the East Plant, boiler room


    Okay, nice numbers, but as we always say, a picture is worth a thousand words,
    or in our case a thousand numbers. Each year has its own standard deviation value
    for all months. In other words, each month has the same standard deviation value.


    A little copy and paste action plus some creative formatting into a Microsoft
    Excel spreadsheet yields the following report in Figure 8-24 that includes the
    normal distribution graphs for both years.


    ![](images/527021_1_En_8_Chapter/527021_1_En_8_Fig24_HTML.png)


    A screenshot of a Microsoft Excel sheet. The left screen has 2 tables. Each table
    has 4 columns for quarter, month, failure, and N D I S T. The right screen has
    the line graphs of the normal distribution in 2002 and 2003.


    Figure 8-24


    Normal distribution bell curve for equipment failures


    Better but still a wonky bell curve. Each is a set of bell curves if we want to
    get picky. In other words, instead of the entire year, you can generate bell curves
    for each quarter in the calendar year.


    More statistical analysis, this time with the variance functions, is on deck.


    Pop Quiz Answer


    Why are values generated by the `STDEVP()` function always smaller? Because they
    have more data to work with.


    ## VAR( ) and VARP( ) Functions


    Here are the definitions from Chapter 2 for these functions. Again, skip them
    if you are comfortable with how they work and go to the business specifications
    for the example query.


    Read them if you read Chapter 1 and then jumped directly here because your interest
    is engineering or power plant management or some other related discipline.


    The `VAR()` and `VARP()` functions are used to generate the variance for a set
    of values in a data sample. The same discussion related to the data sets used
    in the `STDEV()` and `STDEVP()` examples applies to the `VAR()` and `VARP()` functions
    relative to the population of the data.


    The `VAR()` function works on a partial set of the data when the entire data set
    is not known or available, while the `VARP()` function works on the whole data
    set population when it is known.


    So, if your data set consists of ten rows, the function names ending with `P`
    will include all ten rows when processing the values; the ones not ending in the
    letter `P` will look at N – 1 or 10 – 1 = 9 rows.


    Okay, now that we got that out of the way, what does variance mean anyway?


    For us developers and non-statisticians, here’s a simple explanation:


    Informally, if you take all the differences of each value from the mean (average)
    and square the results and then add all the results and finally divide them by
    the number of data samples, you get the variance.


    Reminder


    If you take the square root of the variance, you get the standard deviation, so
    there is some sort of relationship going on!


    For our engineering scenario, let’s say we had some data that forecasted equipment
    online day targets for one of our pieces of plant equipment (like a motor) during
    any particular year. When equipment status history is finally generated for the
    motor, we want to see how close or far the online days were to or from the forecast.
    It answers the following questions:


    * Did we miss the online event targets?

    * Did we meet our online event targets?

    * Did we exceed our online event targets (like no downtime)?


    This statistical formula is also discussed in Appendix B by the way.


    The next examples will show how the `VAR()` and `VARP()` functions can be used
    with three different `PARTITION BY` clauses.'
