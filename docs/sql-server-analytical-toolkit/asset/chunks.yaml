- fmt: 'Back to our analysis. A last suggestion is to get rid of the `CASE` blocks
    by enhancing the Calendar table to include the text versions of the quarter and
    month data parts. If you did the homework I suggested earlier, modify this query
    so it just uses the new calendar date part columns and see what sort of improvement
    is realized.


    Let’s look at the `IO` and `TIME` statistics next.


    Please refer to Figure [12-5](#527021_1_En_12_Chapter.xhtml#Fig5).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig5_HTML.png)


    A screenshot of c h 12 ranking query s q l window. 2 subwindows compare the I
    O and TIME statistics before and after query execution such as elapsed time under
    server parse and compile time, and execution time, scan count, logical reads,
    and physical reads.


    Figure 12-5


    Comparing IO and TIME statistics


    As expected, performance statistics improved. SQL Server parse and compile times
    went down. SQL Server execution time went down from 612 ms to 18 ms. Good improvement.
    Focusing on the `InventoryTransaction` table, scan count went down from 5 to 1,
    logical reads went down from 4,281 to 50, but physical reads went up from 0 to
    1.


    Overall major improvements. Based on this analysis, the suggested improvements
    are to try out the Calendar table changes and to also replace the `CTE` logic
    with a preloaded report table. Try this out on your own, perform the analysis,
    and see if performance improves or not. The added twist is that you will have
    to modify the `CTE` query so it joins the `Calendar` table so you can use the
    new columns. Will this be better? Will you need a new index on the Calendar table?


    Let’s turn our attention to the inventory data warehouse and try out the same
    query but this time in the form of a `SNOWFLAKE` query.


    Pop Quiz Answer


    How do you update table statistics? By running the command


    ```

    UPDATE STATISTICS <table name>

    ```


    Make sure to do this often, especially after many `INSERT`, `UPDATE`, and `DELETE`
    queries. You might even want to add it to a SQL Agent task that runs periodically
    and updates all the statistics for all the tables in your database.


    ### Querying the Data Warehouse


    Let’s now query the fact table in our inventory data warehouse with a similar
    query called a `SNOWFLAKE` query.


    Pop Quiz


    Why is this called a `SNOWFLAKE` query? Answer coming up shortly.


    The business requirements for this query are the same as the prior query, so I
    will not elaborate further on these.


    Based on our prior discussion, I implemented the change to the `Calendar` dimension
    table, so it includes text columns to support quarter and month names. This should
    speed things up.


    The query is still `CTE` based, and because it is executed against a `SNOWFLAKE`
    schema, it contains many table joins. The listing is fairly long, but I suggest
    you walk through it to understand all the logic and fine points.


    Please refer to Listing [12-3](#527021_1_En_12_Chapter.xhtml#PC3).


    ```sql

    WITH WarehouseCTE (

    InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName

    ,InventoryId,WarehouseId,WarehouseId,ProductId,ProductName

    ,ProductType,ProdTypeName,MonthlyQtyOnHand

    )

    AS ( -- returns 24,192 rows

    SELECT C.CalendarYear        AS InvYear

    ,C.CalendarMonth     AS InvMonthNo

    ,C.CalendarTxtMonth  AS InvMonthMonthName

    ,L.LocId             AS LocationId

    ,L.LocName           AS LocationName

    ,I.InvId             AS InventoryId

    ,W.WhId              AS WarehouseId

    ,W.WhName            AS WarehouseName

    ,P.ProdId            AS ProductId

    ,P.ProdName          AS ProductName

    ,P.ProdType          AS ProductType

    ,PT.ProdTypeName     AS ProdTypeName

    ,SUM(IH.[QtyOnHand]) AS MonthlyQtyOnHand

    FROM [Fact].[InventoryHistory] IH -- WITH (INDEX(ieInvHistCalendar))

    JOIN [Dimension].[Location] L

    ON IH.LocKey = L.LocKey

    JOIN [Dimension].[Calendar] C

    ON IH.CalendarKey = C.CalendarKey

    JOIN [Dimension].[Warehouse] W

    ON IH.WhKey = W.WhKey

    JOIN [Dimension].[Inventory] I

    ON IH.[InvKey] = I.InvKey

    JOIN [Dimension].[Product] P

    ON IH.ProdKey = P.ProdKey

    JOIN [Dimension].[ProductType] PT

    ON P.ProductTypeKey = PT.ProductTypeKey

    GROUP BY C.CalendarYear

    ,C.CalendarMonth

    ,C.CalendarTxtMonth

    ,L.LocId

    ,L.LocName

    ,I.InvId

    ,W.WhId

    ,W.WhName

    ,P.ProdId

    ,P.ProdName

    ,P.ProdType

    ,PT.ProdTypeName

    )

    SELECT InvYear,InvMonthNo,InvMonthMonthName,LocationId,LocationName

    ,InventoryId,WarehouseId, ProductType,ProductId,ProdTypeName

    ,MonthlyQtyOnHand

    ,RANK() OVER (

    ORDER BY MonthlyQtyOnHand DESC

    ) QtyOnHandRank

    FROM WarehouseCTE

    WHERE InvYear= 2010

    AND LocationId = ''LOC1''

    AND InventoryId = ''INV1''

    AND WarehouseId = ''WH111''

    AND ProductId = ''P041''

    GO

    ```


    Listing 12-3


    SNOWFLAKE Query for Ranking Report


    This query has it all: a `CTE`, multiple joins in the form of a `SNOWFLAKE` query,
    and a `WHERE` clause.


    Notice that I removed the `PARTITION BY` clause for this version of the query
    as the `WHERE` clause filter limits the results to a single year, location, inventory,
    warehouse, and product. All that is required is to include the `ORDER BY` clause
    that refers to the monthly sum of quantity on hand for this inventory location.
    Let’s check out the results.


    Please refer to the partial results in Figure [12-6](#527021_1_En_12_Chapter.xhtml#Fig6).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig6_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the results in
    a table that has 12 columns for Inventory year, Month number, Month name, Location
    I D, location name, Inventory I D, warehouse I D, Product type, Product I D, Name,
    monthly quantity on hand, and quantity on hand rank.


    Figure 12-6


    SNOWFLAKE query results


    Looks like it worked. It returned 12 rows in under one second. This table has
    736,320 rows, so I think we can be impressed with the performance so far. Let’s
    check out our baseline estimated query plan for this query.


    Please refer to Figure [12-7](#527021_1_En_12_Chapter.xhtml#Fig7).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig7_HTML.png)


    A screenshot of c h 12 ranking query s q l window. It presents the execution plan
    for query cost. Arrows point to hash match cost 1%, table scan cost 2%, nested
    loops cost 47%, and Index seek cost 47%.


    Figure 12-7'
