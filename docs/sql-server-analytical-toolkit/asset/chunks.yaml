    处理在第 6 行继续，因此 `SUM()` 函数处理第 5 和第 6 行（当前行和前置行）。计算的总值是 65（30 + 35）。


    接下来，当前行是第 7 行，因此窗口函数将包括第 5、6 和 7 行。`SUM()` 函数返回 105（30 + 35 + 40）。

