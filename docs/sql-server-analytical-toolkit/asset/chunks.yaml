- fmt: '### Create a Power BI Report


    In this last section, we will go over a brief tutorial that will show you how
    to create and publish a report and chart that contains inventory information.
    The tools we will use are the Power BI free development environment and the free
    Power BI server for development purposes. These tools can be obtained from the
    respective Microsoft website and are easy to install. Chapter [14](#527021_1_En_14_Chapter.xhtml)
    will show you how to download and install these.


    Let’s begin with a guided tour of the facilities available to create sophisticated
    reports, scorecards, and dashboards.


    Please refer to Figure [12-47](#527021_1_En_12_Chapter.xhtml#Fig47).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig47_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. Arrows point to 3 icons
    on the left, the Visualization panel on the right which contains icons for different
    charts and graphs, and a drill through section below. The middle panel is the
    design panel to add data to the report.


    Figure 12-47


    #### Economy guided tour


    Upon starting Power BI from your desktop, you are presented with this screen.
    Highlighted are the main tool components we will use. Starting at the left, we
    see a panel that contains a tool to create a report, view data and views, and
    create or modify a model based on the data source you will connect to. This model
    looks much like a `STAR` or `SNOWFLAKE` schema like the ones we generated when
    we created an `SSAS` multidimensional cube.


    The middle panel will be your design panel where you create your report, dashboard,
    or scorecard. Your project can actually have any combination of these or all of
    these as you can create multiple pages, each with a unique or related report or
    visualization.


    On the right side, you see a `Visualization` panel that contains icons for all
    the different charts and graphs you can create. Lastly, the filter section allows
    you to identify columns in the data that you will use to drill up and down into
    the report or graph data. As you drill down, the chart values will change to correspond
    to the different levels and aggregations related to the data aggregation hierarchy.


    Okay, how do we build this?


    The first step is to define a data source for your graphs and reports. Sounds
    familiar, like when we create `SSAS` cubes or `SSIS` ETL packages or Report Builder
    reports?


    #### Define a Data Source


    Please refer to Figure [12-48](#527021_1_En_12_Chapter.xhtml#Fig48).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig48_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. A list of the common
    data sources is produced by clicking the Get Data option in the menu bar on top.


    Figure 12-48


    Common available data sources


    Clicking the `Get data` selection in the menu bar, on the left-hand side, will
    produce a list of common data sources we can connect to. In our case we are interested
    in Analysis Services, so let’s click it so we can define a connection and database
    (in our case an `SSAS` instance and cube).


    Please refer to Figure [12-49](#527021_1_En_12_Chapter.xhtml#Fig49).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig49_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It presents the S Q
    L Server Analysis Server database panel. It allows to enter the server name and
    database name. The O K button is highlighted.


    Figure 12-49


    Define the connection and identify the database


    In this panel we need to identify the server, which is an instance of `SSAS` on
    my laptop, and the Inventory Data Warehouse cube we created earlier in Chapter
    [11](#527021_1_En_11_Chapter.xhtml). We click the “Connect live” radio button
    and click the OK button to proceed to the next step.


    **Comment**


    I think that it is amazing that you can create a development environment on your
    laptop or desktop that includes the database server, `SSAS` server, `SSIS` server,
    `SSRS` server and website, and PowerBuilder server and website. There is no limit
    to what you can learn if you aspire to be a SQL Server data architect.


    #### View the Data Model


    Next, we check out the data model that will be the foundation of our report and
    visualization.


    Please refer to Figure [12-50](#527021_1_En_12_Chapter.xhtml#Fig50).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig50_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. The hierarchical properties
    structure on the right panel, is presented as a simple STAR schema in the center
    with blocks such as location, inventory, inventory history, and product type,
    by clicking on the Data Model icon on the left.


    Figure 12-50


    The multidimensional model


    Having connected to the `SSAS` instance and the desired cube, we can click the
    data model icon on the left-hand side of the screen to view the multidimensional
    model of the cube, which looks like a simple `STAR` schema. Recall that this looks
    like the model we created in Visual Studio when we created our multidimensional
    cube on `SSAS`.


    The model looks good so there is nothing for us to do here. We can start creating
    our report.


    #### Create Reports


    Please refer to Figure [12-51](#527021_1_En_12_Chapter.xhtml#Fig51).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig51_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It explains how to
    create multiple reports and graphs over multiple pages in a project by clicking
    on the Bar graph icon on the left.


    Figure 12-51


    All set up and ready to go


    Yes, we are ready to go!


    We need to start adding data columns to our design area so we can start creating
    our report and graph. Notice that the tab is called Page 1. You can create multiple
    reports and graphs over multiple tabs in your project. These can be published
    to the Power BI server. In our last chapter, I will include a brief discussion
    on how to download and install the developer edition of the Power BI server.


    **Tip**


    It has been stated by experts in the design of data visualizations that the human
    mind can only digest around ten chunks of information. Spread out your visualizations
    in multiple pages so users can easily jump from one to the other. Don’t try to
    cram everything on one page. I have seen this too many times in real life, and
    the results are visualizations that take hours to load and then leave users scratching
    their heads. The colors might be nice, but that’s about it as far as usefulness.


    Back to our report design. Let’s start adding columns to create the basic report.


    Please refer to Figure [12-52](#527021_1_En_12_Chapter.xhtml#Fig52).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig52_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It presents a simple
    data report in the form of a table that has 9 columns. The field hierarchy panel
    on the right screen is highlighted in a box.


    Figure 12-52


    Creating a simple data report


    Once connected, all the dimensions and fact tables together with the columns are
    available on the right-hand side in the Fields panel. Our goal at this design
    stage is to create a simple data dump report that has all the key dimension keys
    (not the surrogate keys) and the quantity-on-hand counts down to the product identifier
    level together with the location, inventory, and warehouse information. At this
    stage we do not want users looking at surrogate keys. They are meaningless to
    them.


    #### Create a Chart


    Now we are ready to create a chart based on one of the many icons available in
    the `Visualization` section of Power BI. Let’s take a look at an example and explain
    how it was created.


    Please refer to Figure [12-53](#527021_1_En_12_Chapter.xhtml#Fig53).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig53_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It presents a data
    report in the form of a positive-negative Bar graph. The field panel on the right
    highlights the parameters used in the graph.


    Figure 12-53


    Create a visual chart'
  raw: '### Create a Power BI Report


    In this last section, we will go over a brief tutorial that will show you how
    to create and publish a report and chart that contains inventory information.
    The tools we will use are the Power BI free development environment and the free
    Power BI server for development purposes. These tools can be obtained from the
    respective Microsoft website and are easy to install. Chapter [14](#527021_1_En_14_Chapter.xhtml)
    will show you how to download and install these.


    Let’s begin with a guided tour of the facilities available to create sophisticated
    reports, scorecards, and dashboards.


    Please refer to Figure [12-47](#527021_1_En_12_Chapter.xhtml#Fig47).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig47_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. Arrows point to 3 icons
    on the left, the Visualization panel on the right which contains icons for different
    charts and graphs, and a drill through section below. The middle panel is the
    design panel to add data to the report.


    Figure 12-47


    Economy guided tour


    Upon starting Power BI from your desktop, you are presented with this screen.
    Highlighted are the main tool components we will use. Starting at the left, we
    see a panel that contains a tool to create a report, view data and views, and
    create or modify a model based on the data source you will connect to. This model
    looks much like a `STAR` or `SNOWFLAKE` schema like the ones we generated when
    we created an `SSAS` multidimensional cube.


    The middle panel will be your design panel where you create your report, dashboard,
    or scorecard. Your project can actually have any combination of these or all of
    these as you can create multiple pages, each with a unique or related report or
    visualization.


    On the right side, you see a **Visualization** panel that contains icons for all
    the different charts and graphs you can create. Lastly, the filter section allows
    you to identify columns in the data that you will use to drill up and down into
    the report or graph data. As you drill down, the chart values will change to correspond
    to the different levels and aggregations related to the data aggregation hierarchy.


    Okay, how do we build this?


    The first step is to define a data source for your graphs and reports. Sounds
    familiar, like when we create `SSAS` cubes or `SSIS` ETL packages or Report Builder
    reports?


    Please refer to Figure [12-48](#527021_1_En_12_Chapter.xhtml#Fig48).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig48_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. A list of the common
    data sources is produced by clicking the Get Data option in the menu bar on top.


    Figure 12-48


    Common available data sources


    Clicking the “**Get data**” selection in the menu bar, on the left-hand side,
    will produce a list of common data sources we can connect to. In our case we are
    interested in Analysis Services, so let’s click it so we can define a connection
    and database (in our case an `SSAS` instance and cube).


    Please refer to Figure [12-49](#527021_1_En_12_Chapter.xhtml#Fig49).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig49_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It presents the S Q
    L Server Analysis Server database panel. It allows to enter the server name and
    database name. The O K button is highlighted.


    Figure 12-49


    Define the connection and identify the database


    In this panel we need to identify the server, which is an instance of `SSAS` on
    my laptop, and the Inventory Data Warehouse cube we created earlier in Chapter
    [11](#527021_1_En_11_Chapter.xhtml). We click the “Connect live” radio button
    and click the OK button to proceed to the next step.


    Comment


    I think that it is amazing that you can create a development environment on your
    laptop or desktop that includes the database server, `SSAS` server, `SSIS` server,
    `SSRS` server and website, and PowerBuilder server and website. There is no limit
    to what you can learn if you aspire to be a SQL Server data architect.


    Next, we check out the data model that will be the foundation of our report and
    visualization.


    Please refer to Figure [12-50](#527021_1_En_12_Chapter.xhtml#Fig50).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig50_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. The hierarchical properties
    structure on the right panel, is presented as a simple STAR schema in the center
    with blocks such as location, inventory, inventory history, and product type,
    by clicking on the Data Model icon on the left.


    Figure 12-50


    The multidimensional model


    Having connected to the `SSAS` instance and the desired cube, we can click the
    data model icon on the left-hand side of the screen to view the multidimensional
    model of the cube, which looks like a simple `STAR` schema. Recall that this looks
    like the model we created in Visual Studio when we created our multidimensional
    cube on `SSAS`.


    The model looks good so there is nothing for us to do here. We can start creating
    our report.


    Please refer to Figure [12-51](#527021_1_En_12_Chapter.xhtml#Fig51).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig51_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It explains how to
    create multiple reports and graphs over multiple pages in a project by clicking
    on the Bar graph icon on the left.


    Figure 12-51


    All set up and ready to go


    Yes, we are ready to go!


    We need to start adding data columns to our design area so we can start creating
    our report and graph. Notice that the tab is called Page 1\. You can create multiple
    reports and graphs over multiple tabs in your project. These can be published
    to the Power BI server. In our last chapter, I will include a brief discussion
    on how to download and install the developer edition of the Power BI server.


    Tip


    It has been stated by experts in the design of data visualizations that the human
    mind can only digest around ten chunks of information. Spread out your visualizations
    in multiple pages so users can easily jump from one to the other. Don’t try to
    cram everything on one page. I have seen this too many times in real life, and
    the results are visualizations that take hours to load and then leave users scratching
    their heads. The colors might be nice, but that’s about it as far as usefulness.


    Back to our report design. Let’s start adding columns to create the basic report.


    Please refer to Figure [12-52](#527021_1_En_12_Chapter.xhtml#Fig52).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig52_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It presents a simple
    data report in the form of a table that has 9 columns. The field hierarchy panel
    on the right screen is highlighted in a box.


    Figure 12-52


    Creating a simple data report


    Once connected, all the dimensions and fact tables together with the columns are
    available on the right-hand side in the Fields panel. Our goal at this design
    stage is to create a simple data dump report that has all the key dimension keys
    (not the surrogate keys) and the quantity-on-hand counts down to the product identifier
    level together with the location, inventory, and warehouse information. At this
    stage we do not want users looking at surrogate keys. They are meaningless to
    them.


    Now we are ready to create a chart based on one of the many icons available in
    the **Visualization** section of Power BI. Let’s take a look at an example and
    explain how it was created.


    Please refer to Figure [12-53](#527021_1_En_12_Chapter.xhtml#Fig53).


    ![](images/527021_1_En_12_Chapter/527021_1_En_12_Fig53_HTML.jpg)


    A screenshot of the home page of Power B I Desktop window. It presents a data
    report in the form of a positive-negative Bar graph. The field panel on the right
    highlights the parameters used in the graph.


    Figure 12-53


    Create a visual chart'
  trans: '

    ### 创建 Power BI 报告


    在本节，我们将通过一个简要教程，展示如何创建并发布一份包含库存信息的报告与图表。我们将使用的工具是 Power BI 免费开发环境，以及用于开发目的的免费
    Power BI 服务器。这些工具可以从 Microsoft 相应网站获取，且易于安装。关于如何下载和安装这些工具，将在第 14 章中说明。


    让我们开始导览，了解如何利用这些功能来创建复杂的报告、计分卡和仪表板。


    请参阅图 12-47。


    ![](img/527021_1_En_12_Fig47_HTML.jpg)


    Power BI Desktop 窗口主页的截图。箭头指向左侧的三个图标，右侧的可视化面板（包含各种图表和图形的图标），以及下方的一个向下钻取部分。中间面板是用于向报告添加数据的设计面板。


    图 12-47


    #### 导览概览


    从桌面启动 Power BI 后，您将看到此屏幕。图中突出显示了我们将要使用的主要工具组件。从左侧开始，我们看到一个面板，其中包含用于创建报告、查看数据和视图，以及根据您将连接的数据源创建或修改模型的工具。该模型看起来很像我们在创建
    `SSAS` 多维数据集时生成的 `星型` 或 `雪花` 模式。


    中间面板将是您的设计面板，您在此创建报告、仪表板或计分卡。您的项目实际上可以包含这些内容的任意组合或全部，因为您可以创建多个页面，每个页面都有一个独特或相关的报告或可视化内容。


    在右侧，您会看到一个 `可视化` 面板，其中包含您可以创建的所有不同图表和图形的图标。最后，筛选器部分允许您识别数据中的列，这些列将用于在报告或图形数据中向上和向下钻取。当您向下钻取时，图表值将相应地改变，以对应数据聚合层次结构中的不同级别和聚合。


    好了，我们如何构建这个呢？


    第一步是为您的图表和报告定义数据源。听起来很熟悉，就像我们创建 `SSAS` 数据集、`SSIS` ETL 包或 Report Builder 报告时那样？


    #### 定义数据源


    请参阅图 12-48。


    ![](img/527021_1_En_12_Fig48_HTML.jpg)


    Power BI Desktop 窗口主页的截图。通过点击顶部菜单栏中的“获取数据”选项，列出了常见的数据源。


    图 12-48


    常见可用数据源


    点击菜单栏左侧的 `获取数据` 选项，会生成一个我们可以连接的常见数据源列表。在我们的情况下，我们对 Analysis Services 感兴趣，因此让我们点击它，以便定义连接和数据库（在我们的例子中是一个
    `SSAS` 实例和数据集）。


    请参阅图 12-49。


    ![](img/527021_1_En_12_Fig49_HTML.jpg)


    Power BI Desktop 窗口主页的截图。它显示了 SQL Server Analysis Server 数据库面板。可以输入服务器名称和数据库名称。“确定”按钮被高亮显示。


    图 12-49


    定义连接并指定数据库


    在此面板中，我们需要指定服务器（这是我笔记本电脑上的一个 `SSAS` 实例）以及我们在第 11 章中之前创建的库存数据仓库数据集。我们点击“实时连接”单选按钮，然后点击“确定”按钮以进入下一步。


    **注释**


    我认为这很神奇：您可以在笔记本电脑或台式机上创建一个开发环境，其中包含数据库服务器、`SSAS` 服务器、`SSIS` 服务器、`SSRS` 服务器及其网站，以及
    PowerBuilder 服务器及其网站。如果您立志成为一名 SQL Server 数据架构师，那么您能学习的东西是无穷无尽的。


    #### 查看数据模型


    接下来，我们将查看作为报告和可视化基础的数据模型。


    请参阅图 12-50。


    ![](img/527021_1_En_12_Fig50_HTML.jpg)


    Power BI Desktop 窗口主页的截图。右侧的层次属性结构，通过点击左侧的数据模型图标，在中心以简单的星型模式呈现，包含诸如位置、库存、库存历史和产品类型等块。


    图 12-50


    多维模型


    连接到 `SSAS` 实例和所需的数据集后，我们可以点击屏幕左侧的数据模型图标来查看该数据集的多维模型，该模型看起来像一个简单的 `星型` 模式。回想一下，这看起来像我们在
    Visual Studio 中基于 `SSAS` 创建多维数据集时所创建的模型。


    模型看起来很好，因此我们在这里无需做什么。我们可以开始创建报告了。


    #### 创建报告


    请参阅图 12-51。


    ![](img/527021_1_En_12_Fig51_HTML.jpg)


    Power BI Desktop 窗口主页的截图。它通过点击左侧的条形图图标，解释了如何在项目中的多个页面上创建多个报告和图表。


    图 12-51


    一切就绪，准备开始


    是的，我们准备好了！


    我们需要开始将数据列添加到我们的设计区域，以便可以开始创建报告和图表。请注意，此选项卡名为“第 1 页”。您可以在项目中的多个选项卡上创建多个报告和图表。这些可以发布到
    Power BI 服务器。在最后一章中，我将简要讨论如何下载和安装 Power BI 服务器的开发人员版。


    **提示**


    数据可视化设计领域的专家指出，人脑只能处理大约十个信息块。将您的可视化内容分散到多个页面中，以便用户可以轻松地在它们之间跳转。不要试图把所有东西都塞到一个页面上。我在现实生活中见过太多这样的情况，结果就是那些需要加载数小时、然后让用户挠头的可视化效果。颜色可能不错，但就实用性而言，也就仅此而已了。


    回到我们的报告设计。让我们开始添加列以创建基本报告。


    请参阅图 12-52。


    ![](img/527021_1_En_12_Fig52_HTML.jpg)


    Power BI Desktop 窗口主页的截图。它以表格形式呈现了一个简单的数据报告，该表格有 9 列。右侧屏幕上的字段层次结构面板用方框高亮显示。


    图 12-52


    创建简单的数据报告


    连接后，所有维度表和事实表及其列都会在右侧的“字段”面板中可用。我们在此设计阶段的目标是创建一个简单的数据转储报告，其中包含所有关键维度键（不是代理键）、直到产品标识符级别的现有库存数量，以及位置、库存和仓库信息。在这个阶段，我们不希望用户查看代理键。这些对他们来说毫无意义。


    #### 创建图表


    现在，我们准备基于 Power BI `可视化` 部分中众多图标之一来创建图表。让我们看一个例子并解释它是如何创建的。


    请参阅图 12-53。


    ![](img/527021_1_En_12_Fig53_HTML.jpg)


    Power BI Desktop 窗口主页的截图。它以正负条形图的形式呈现数据报告。右侧的字段面板高亮显示了图中使用的参数。


    图 12-53


    创建可视化图表

