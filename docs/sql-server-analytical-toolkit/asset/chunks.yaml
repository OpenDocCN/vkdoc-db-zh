- fmt: '### Step 1: Create the First CTE


    This first `CTE` pulls out rows from our test table for the `LIBOR` instrument,
    for the year 2012, and for customer C0000005.


    Please refer to Listing [6-19](#527021_1_En_6_Chapter.xhtml#PC24).


    ```sql

    WITH TradeGapsCTE(

    TransDate,NextTradeDate,GapTradeDays,

    CustId,Symbol,TransAmount,TransTypeCode

    )

    AS

    (

    SELECT

    FT.[TransDate] AS TradeDate

    ,LEAD(FT.[TransDate]) OVER(

    ORDER BY FT.[TransDate]

    ) AS NextTradeDate

    ,CASE

    WHEN (DATEDIFF(dd,FT.[TransDate],LEAD(FT.[TransDate])

    OVER(ORDER BY FT.[TransDate])) - 1) = -1

    THEN 0

    ELSE (DATEDIFF(dd,FT.[TransDate],LEAD(FT.[TransDate])

    OVER(ORDER BY FT.[TransDate])) - 1)

    END AS GapTradeDays

    ,FT.CustId

    ,FT.Symbol

    ,FT.TransAmount

    ,FT.TransTypeCode

    FROM Financial.CustomerBuyTransaction FT

    WHERE CustId = ''C0000005''

    AND Symbol = ''LIBOR OIS''

    AND YEAR(FT.TransDate) = 2012

    ),

    Listing 6-19

    Create the First CTE

    ```


    The first step is to retrieve the next trade date relative to the current trade
    date, so the `LEAD()` function is used. Inside the `OVER()` clause, an `ORDER
    BY` clause is used to sort the partition data set by the `TransDate` column.


    The second step is to calculate the number of days between the two dates by subtracting
    the results of the same `LEAD()` function just discussed from the current trade
    date. We subtract the value 1 from the results because if one trade date follows
    the other, there are technically 0 gaps between the two dates.


    Notice the use of the `CASE` block to determine if the number of days is –1. This
    occurs when you subtract the same day from itself and also deduct a 1 from it
    as can be seen in the formula that was used. This logic traps this value and simply
    reports it as 0. Yes, I admit this is a workaround.


    Note

    When we build the gap logic, we need to identify the number of days in the gap
    as the days between the start of the gap and end of the gap only. The start and
    end days are days on which trades occur, so we do not want to include them.


    Let’s see the data rows that the query in the first `CTE` produced.


    Please refer to Figure [6-43](#527021_1_En_6_Chapter.xhtml#Fig43).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig43_HTML.jpg)

    A screenshot of S Q L application. It represents a program with a list of 21 rows
    and 8 columns with data on trade date, next trade date, gap trade days, customer
    i d, symbol, transaction amount, and transaction type code.

    Figure 6-43

    First CTE, gaps and islands identified


    Notice our two trades for January 1. The gap is 0 days, so that is correct. Notice
    rows 7 and 13 in the result set. The gap in trade days was also calculated correctly.
    There is one day between January 6, 2012, and January 8, 2012 (January 7, 2012).
    Also, there are three days between January 13, 2012, and January 17, 2012 (January
    14, 15, and 16, 2012).


    So far, the logic seems to work. On to step 2 where we define our second `CTE`.


    ### Step 2: Set Up the Second CTE to Label Gaps


    Now that we have our baseline data set, we need to label the gaps with a unique
    text string so we can use it in the `GROUP BY` clause that will allow us to identify
    the start and stop dates of the gap while leaving out the days in between.


    This next section of the code chains the first `CTE` to the second `CTE` to further
    set up the data.


    Here is where we are so far: `CTE2` queries `CTE1`. Let’s look at the code.


    Please refer to Listing [6-20](#527021_1_En_6_Chapter.xhtml#PC25).


    ```sql

    GapsAndIslands(

    TransDate,NextTradeDate,GapTradeDays,

    GapOrIsland,CustId,Symbol,TransAmount,TransTypeCode

    )

    AS (

    SELECT TG.TransDate

    ,TG.NextTradeDate

    ,TG.GapTradeDays

    ,CASE

    WHEN TG.GapTradeDays = 0 THEN ''ISLAND''

    ELSE ''GAP'' + CONVERT(VARCHAR,

    ROW_NUMBER() OVER (ORDER BY YEAR(TG.TransDate)))

    END AS GapOrIsland

    ,TG.CustId

    ,TG.Symbol

    ,TG.TransAmount

    ,TG.TransTypeCode

    FROM TradeGapsCTE TG

    ),

    Listing 6-20

    Label the Gaps

    ```


    Here comes the `ROW_NUMBER()` function in the `CASE` block back to the rescue.
    Notice how it is used to create a unique “GAP” identifier string by appending
    the numerical value to the end of the string. Also notice that no `PARTITION BY`
    or `ORDER BY` clause is used or needed.


    Pop Quiz

    What is the default behavior of the partition window frame when the `ORDER BY`
    and `PARTITION BY` clauses are not included?


    The “ISLAND” string identifiers are all the same across all the islands. We will
    address how to make these unique for each island in the second example, but I
    promise you that it will be a little bit trickier than what we just used for the
    GAP identifier strings. Let’s check out our interim results.


    Please refer to Figure [6-44](#527021_1_En_6_Chapter.xhtml#Fig44).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig44_HTML.jpg)

    A screenshot of S Q L application. It represents a list with 20 rows and 8 columns
    with data on transaction date, next trade date, gap trade days, gap or island
    customer i d, symbol, and transaction amount.

    Figure 6-44

    Gaps and islands identified


    All the gaps and islands are labeled correctly (need to work on the ISLAND string
    later).


    We can see how the value returned by the `ROW_NUMBER()` function is attached to
    the string “GAP” to produce a unique identifier. This is meaningless for the analyst
    reading the report but a very valuable mechanism for the `GROUP BY` clause that
    will finalize the report.


    ### Step 3: Set Up the Third CTE and Identify Start/Stop Dates of Gaps


    Now we get to pull out the start and stop dates for the date gaps. Listing [6-21](#527021_1_En_6_Chapter.xhtml#PC26)
    is the listing for the third and last chained `CTE` (`CTE3` calls `CTE2`, which
    calls `CTE1`).


    ```sql

    FinalGapIslanCTE (

    CustId,Symbol,GapTradeDays,GapOrIsland,GapStart,GapEnd

    )

    AS (

    SELECT ,CustId

    ,Symbol

    ,GapTradeDays

    ,GapOrIsland

    ,MIN(TransDate)     AS GapStart

    ,MAX(NextTradeDate) AS GapEnd

    FROM GapsAndIslands

    WHERE NextTradeDate IS NOT NULL

    AND GapTradeDays > 0

    GROUP BY CustId

    ,Symbol

    ,GapTradeDays

    ,GapOrIsland

    )

    Listing 6-21

    Identify Gap Start and Stop Dates

    ```


    This `CTE` is simple. It is based on a standard query that uses the `MIN()` and
    `MAX()` functions to pull out the gap start and stop dates. An `OVER()` clause
    is not required. We filter out gap trade days of 0 (the islands) and any row where
    the next trade date is `NULL`, just to keep things tidy.


    Notice the mandatory `GROUP BY` clause. Let’s see the results of this step.


    Please refer to Figure [6-45](#527021_1_En_6_Chapter.xhtml#Fig45).


    ![](images/527021_1_En_6_Chapter/527021_1_En_6_Fig45_HTML.jpg)

    A screenshot of S Q L application. It represents a list with 21 rows and 6 columns
    with data on customer i d, symbol, gap trade days, gap or island, gap start dates,
    and gap end dates. Rows 2, 5, 8, 11, 14, and 18 are highlighted with a box.

    Figure 6-45

    Gaps with start and stop dates


    This is what we want to see: all the gaps have unique codes. I highlighted the
    gaps with values greater than one so we can spot-check if the start and stop dates
    make sense. Looking at row 18, `GAP139`, there are indeed four days between June
    13, 2012, and June 18, 2012 (June 14, 15, 16, and 17, 2012). Wouldn’t it be nice
    if we could somehow list them in a comma-delimited string next to these two dates?


    That’s just what we will do in the last step!'
