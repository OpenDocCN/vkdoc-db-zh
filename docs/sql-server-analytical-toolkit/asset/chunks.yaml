  raw: '### STATISTICS PROFILE


    Sometimes you really need to get into the weeds to understand what is going on
    in the tasks of a query plan. This set of statistics gives you similar information
    as `IO` and `TIME` statistics, but it also shows you the code sections that are
    generating the statistics.


    Setting these statistics on is simple.


    Please refer to Listing [14-3](#527021_1_En_14_Chapter.xhtml#PC4).


    ```

    SET STATISTICS PROFILE ON

    GO

    SET STATISTICS PROFILE OFF

    GO

    Listing 14-3

    Setting STATISTICS PROFILE ON

    ```


    Set these to `ON` after you set the other statistics or even run them on their
    own. Make sure you turn them all `OFF` when finished in a session as these also
    eat up resources.


    Please refer to Figure [14-19](#527021_1_En_14_Chapter.xhtml#Fig19).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig19_HTML.png)


    A screenshot of the S S M S window. It presents the Object Explorer in the left
    panel. The right panel has a code and a table of 4 columns and 21 rows. The column
    headers are Rows, Executes, and statement text. An arrow points to the statement
    texts.


    Figure 14-19


    STATISTICS PROFILE report


    Recall how detailed this information is. The following is the statement text that
    shows what goes on in a window spool task:


    ```

    --Window Spool(

    RANGE BETWEEN:(UNBOUNDED, [[APInventory].[Product].[Warehouse].[AsOfMonth]]

    )

    )

    ```


    Okay, this completes our review. So how do we get all these nice tools?


    ## Where to Get the Tools


    You can find most of these tools by performing a web search that will point you
    to the correct Microsoft web page. Obtain these free tools from Microsoft only
    and read the licensing requirements!


    ### SQL Server Developer


    As of this writing, here is where you can obtain the developer license for the
    latest edition of SQL Server, like SQL Server 2022.


    Please refer to Figure [14-20](#527021_1_En_14_Chapter.xhtml#Fig20).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig20_HTML.png)


    A screenshot of the Chrome window. It has a tab that opens the S Q L Server Downloads.
    The screen has 3 tabs at the top, Get Started, Get Started, and Download Now.
    The text below reads, or download a free specialized edition. Two options are
    Developer and Express. An arrow points to the Developer.


    Figure 14-20


    Download SQL Server Developer Edition


    Make sure you download the developer license.


    As of this writing, the URL is


    [`www.microsoft.com/en-us/sql-server/sql-server-downloads`](http://www.microsoft.com/en-us/sql-server/sql-server-downloads)


    SQL Server 2019 is also available, with a SQL Server Lite edition called SQL Server
    Express.


    I would recommend you download SQL Server 2022 as it has many new features and
    also new window functions like `APPROX_PERCENTILE_CONT()` and `APPROX_PERCENTILE_DISC()`.


    ### Visual Studio Community


    You need to download and install this first so you can install data tools that
    include SSMS and also SSAS, SSRS, and SSIS project template support.


    Please refer to Figure [14-21](#527021_1_En_14_Chapter.xhtml#Fig21).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig21_HTML.png)


    A screenshot of the Chrome window. It has a tab that opens the Visual Studio 2022
    Community. The screen has a cover photo of a woman with headphones working on
    a laptop. The header reads, Visual Studio Community. Below is a download tab.
    Another text reads, Everything you need all in one place.


    Figure 14-21


    Visual Studio Community


    As of this writing, the URL is


    [`https://visualstudio.microsoft.com/vs/community/`](https://visualstudio.microsoft.com/vs/community/)


    Download this and install it. It will take some time. Get the process going and
    make sure you have a cup of coffee available. Your patience will be rewarded with
    a powerful development environment.


    ### SQL Server Data Tools


    This is available as a workload that you can download with Visual Studio Installer.


    The installer is available on your Windows menu when you install the Visual Studio
    Community license.


    Please refer to Figure [14-22](#527021_1_En_14_Chapter.xhtml#Fig22).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig22_HTML.png)


    A screenshot of the Visual Studio Installer opens a pop-up dialog box of Modifying
    Visual Studio Community 2019\. It presents 2 options for Gaming and 6 options
    for other toolsets among which 3 are selected. The right panel has Installation
    details. An arrow points to Data storage and processing.


    Figure 14-22


    Install the Data storage and processing workload


    Run the Visual Studio Installer tool and pick the features you want.


    ### SQL Server SSAS Project Support


    You might want to include this feature also so you can create SQL Server projects
    with Visual Studio Community Edition.


    Please refer to Figure [14-23](#527021_1_En_14_Chapter.xhtml#Fig23).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig23_HTML.png)


    A screenshot of the Microsoft Visual Studio window. An arrow points to the Extensions
    option at the top bar. A pop-up dialog box of Manage Extensions has 5 options
    in the left panel. It presents 7 options among which Microsoft Analysis Services
    Projects is selected.


    Figure 14-23


    Download SSAS project support


    Be aware there is a lot of “stuff” to pick, so you might have to scroll quite
    a bit to find what you need. Be prepared to set aside a couple of hours to download
    and install all the project templates we discussed in this book.


    ### SQL Server SSIS Project Support


    Scroll down to get the SSIS project template.


    Please refer to Figure [14-24](#527021_1_En_14_Chapter.xhtml#Fig24).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig24_HTML.png)


    A screenshot of the Microsoft Visual Studio window. An arrow points to the Extensions
    option at the top bar. A pop-up dialog box of Manage Extensions has 9 options
    in the left panel. It presents 6 options among which S Q L Server Investigation
    Services Projects is selected.


    Figure 14-24


    Getting SSIS using Visual Studio


    Just select it and scroll to the next item, which is …


    ### SQL Server SSRS Project Support


    Just like the rest, select it and click to download.


    Please refer to Figure [14-25](#527021_1_En_14_Chapter.xhtml#Fig25).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig25_HTML.png)


    A screenshot of the Microsoft Visual Studio window. A pop-up dialog box of Manage
    Extensions has 5 options in the left panel. It presents 6 options among which
    S Q L Server Investigation Services Projects and Microsoft Reporting Services
    Projects are selected.


    Figure 14-25


    Getting SSRS using Visual Studio


    That wasn’t too hard, was it? Next, we need our report development tool.


    ### Report Builder


    Perform a search with your favorite web browser and you will find this web page.


    Please refer to Figure [14-26](#527021_1_En_14_Chapter.xhtml#Fig26).


    ![](images/527021_1_En_14_Chapter/527021_1_En_14_Fig26_HTML.png)


    A screenshot of the Chrome window. It has a tab that opens the Download Microsoft
    Report Builder site. It has a dropdown box to select the language and a download
    button. Below are 4 options, details, system requirements, install instructions,
    and additional information.


    Figure 14-26


    How to get Report Builder


    Perform a search with your favorite browser or else check out the following URL.
    As of this writing, the URL is


    [`www.microsoft.com/en-us/download/details.aspx?id=53613`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D53613)


    Just click Download for the installer and then follow the steps. Mostly these
    are default selections, so accept them. Just click the Next button on each screen.


    Three more items to download and install. Next is Power BI Desktop.'
