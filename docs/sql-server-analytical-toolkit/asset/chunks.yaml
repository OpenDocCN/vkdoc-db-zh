    \ clause was included. After all, we only have ten rows.\n\nPlease refer to Figure\
    \ [4-1](#527021_1_En_4_Chapter.xhtml#Fig1).\n\n![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig1_HTML.jpg)\n\
    \nA screenshot of S Q L Query 1 presents a table of 7 columns and 10 rows with\
    \ ranking functions under a tab. Rows 4, 5, and 6 are highlighted. The headers\
    \ of the table are the test key, the value, row number, value rank, dense rank,\
    \ value rank, and value rank as p c t.\n\nFigure 4-1\n\nRanking functions in action\
    \ results\n\nLet’s start with the `ROW_NUMBER()` function results. There are ten\
    \ rows, and the row numbers are 1–10 in sequential order. It does just what the\
    \ name implies.\n\nNext are the `RANK()` function results. Notice what happens\
    \ with the two ties represented by the value 4. Each is assigned the rank 4 because\
    \ they are the same. But look at what happens to the next row value. It skips\
    \ the number 5 and is assigned a value of 6. Just like the formula we discussed\
    \ earlier, it takes the number of ties (2) and adds it to the current rank 4 to\
    \ assign a rank of 6.\n\nNow look at the `DENSE_RANK()` function results. Just\
    \ like the `RANK()` function, ties are assigned the same rank value, but the next\
    \ row value is assigned the next higher rank, which is 5.\n\nLast but not least,\
    \ the `PERCENT_RANK()` function assigns a rank as a percentage between 0 and 1.\
    \ I added a column so as to use the `FORMAT()` function to format the results\
    \ as a percentage. This way we can compare the formats and decide which one makes\
    \ sense to use.\n\n## `NTILE()` Example\n\nLet’s create some tiles. No, not kitchen\
    \ floor tiles but tiles that are buckets of data (I know, bad pun). We will start\
    \ off with another simple example so we can clearly see what this function does.\
    \ We will use a table variable loaded with ten rows of year-to-date sales amounts\
    \ for our sales team.\n\nWhat we want to do is create three tiles or buckets of\
    \ data so we can use them as criteria to award bonuses to the sales team members\
    \ according to the tile they fall into.\n\nPlease refer to Listing [4-2](#527021_1_En_4_Chapter.xhtml#PC2).\n\
    \n```\nDECLARE @SalesPersonBonusStructure TABLE (\n    SalesPersonNo VARCHAR(4)\
    \ NOT NULL,\n    SalesYtd      MONEY      NOT NULL\n);\nINSERT INTO @SalesPersonBonusStructure\
    \ VALUES\n('S001',2500.00),\n('S002',2250.00),\n('S003',2000.00),\n('S004',1950.00),\n\
    ('S005',1800.00),\n('S006',1750.00),\n('S007',1700.00),\n('S008',1500.00),\n('S009',1250.00),\n\
    ('S010',1000.00);\n-- Care must be taken how you sort (ASC or DESC)\nSELECT SalesPersonNo\n\
    \      ,SalesYtd\n      ,NTILE(3) OVER(ORDER BY SalesYtd DESC) AS BonusBucket\n\
    \      ,CASE\n          WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC)) = 1 THEN\
    \ 'Award $500.00 Bonus'\n          WHEN (NTILE(3) OVER(ORDER BY SalesYtd DESC))\
    \ = 2 THEN 'Award $250.00 Bonus'\n          WHEN (NTILE(3) OVER(ORDER BY SalesYtd\
    \ DESC)) = 3 THEN 'Award $150.00 Bonus'\n       END AS BonusAward\nFROM @SalesPersonBonusStructure\n\
    GO\n```\n\nListing 4-2\n\nAssigning Performance Buckets for Bonuses\n\nThe solution\
    \ is simple. The `NTILE()` function is used with an `OVER()` clause to create\
    \ the three tiles. There is no `PARTITION BY` clause due to the small data set,\
    \ but we include an `ORDER BY` clause so we can sort the year-to-date sales amounts\
    \ in descending order.\n\nNext, a series of three `CASE` blocks determine the\
    \ tile assignment by using the `NTILE()` function again so as to print out a message\
    \ of the amount the salesperson is awarded based on the tile they are in.\n\n\
    Maybe a little brute force as we could have used a `CTE` to determine the bucket\
    \ and then write the query so it just tests the tile value instead of using the\
    \ `NTILE()` function again. See if you can download the script for this chapter\
    \ and code a query using the `CTE` approach. I did provide the solution just in\
    \ case you get stuck in the script for this section.\n\nLet’s see what kind of\
    \ awards each salesperson received. Please refer to Figure [4-2](#527021_1_En_4_Chapter.xhtml#Fig2).\n\
    \n![](images/527021_1_En_4_Chapter/527021_1_En_4_Fig2_HTML.jpg)\n\nA screenshot\
    \ of a window presents a table of 4 columns and 10 rows under a tab depicting\
    \ the awards received by salespersons. The headers of the table are salesperson\
    \ number, sales Y t d, bonus bucket, and bonus award.\n\nFigure 4-2\n\nBonus performance\
    \ buckets\n\nThere are ten rows in the result set, and we specified only three\
    \ buckets, so the bucket assignment is uneven. The first two buckets get three\
    \ rows each, and the last bucket gets four rows. If we had 12 rows, then each\
    \ bucket would get 4 rows. Either case these are rather cheesy bonuses. Our sales\
    \ staff needs to sell more if they want larger bonuses!\n\nArmed with our understanding\
    \ of how these functions work, let’s use the functions against our sales data\
    \ warehouse. We will start with `RANK()` and `PERCENT_RANK()` and revisit `NTILE()`\
    \ later in the chapter."
