    点击菜单栏上带有绿色小勾的图标将生成实时统计信息。顺便说一句，同时运行估计计划和实时统计信息是个好主意。

    通常，它们应该相差不远，但如果相差较大，则需要进行一些分析和查询调整，以找出原因，比如计划之间的步骤增减。请注意，随着数据从右向左流动，我们看到了行计数。索引扫描检索到
