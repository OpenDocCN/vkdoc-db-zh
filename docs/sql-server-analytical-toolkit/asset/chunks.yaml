  raw: '### Overall Performance Considerations


    We can use Microsoft Excel spreadsheets and graphs to profile `IO` and `TIME`
    statistics to get a sense of how window functions perform related to each other.
    By collecting all the statistics in a table and graphing them, we can see that
    the `PERCENT_RANK()` function ate up a lot of `CPU` and elapsed execution time
    compared with the other functions.


    We will do this for both the Warehouse table and the work table. Figure [13-42](#527021_1_En_13_Chapter.xhtml#Fig42)
    is the visualization for the statistics of the Warehouse table.


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig42_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has a line graph of counts versus functions with 3 horizontal lines
    for scan count, logical reads, and physical reads.


    Figure 13-42


    Query portfolio IO statistics for the Warehouse table


    This is interesting. The scan counts, logical read values, and physical read values
    for all the window functions against the Warehouse table are all the same. Can
    we say then that all these functions behave consistently the same?


    Well, yes, because most of the time we used the same `WHERE` clause, so this is
    a factor we can take into consideration.


    Let’s look at the work table visualization.


    Please refer to Figure [13-43](#527021_1_En_13_Chapter.xhtml#Fig43).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig43_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has a line graph of counts versus functions with 2 inverted bell
    curves and a horizontal line.


    Figure 13-43


    Query portfolio IO statistics for the work table


    This is a lot more interesting. Looks like the `CUME_DIST()`, `PERCENTILE_CONT()`,
    and `PERCENTILE_DISC()` functions generate the highest logical reads, while the
    `LAG()` and `LEAD()` functions generate the lowest. The other functions are somewhat
    in between.


    As far as scan counts, we can state the same patterns, and what is interesting
    is all the physical reads are zero.


    Last but not least, let’s look at the CPU and elapsed time statistics across all
    the functions.


    Please refer to Figure [13-44](#527021_1_En_13_Chapter.xhtml#Fig44).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig44_HTML.png)


    A screenshot of the M S Excel window. It has a table of 3 columns and 8 rows.
    The column headers are function, C P U, and elapsed. It also has a line graph
    of milliseconds versus functions with 2 almost horizontal curves for C P U and
    elapsed with a peak at 172 and 376 percent rank.


    Figure 13-44


    Query portfolio CPU and elapsed time statistics


    Another interesting set of statistics in a visualization. Looks like the `PERCENT_RANK()`
    function was using the most `CPU` resources and took the longest to execute. The
    rest of the functions were pretty stable.


    Conclusion: Generating charts and graphs comparing the resources these window
    functions use is a good way of isolating the ones that eat up most resources.
    This is where you would begin performance tuning. In other words, prioritize which
    queries you need to tune based on this analysis.


    Let’s wrap up the chapter by looking at a few more `SSRS` reports to demonstrate
    the drill-down capabilities. This is more of a show-and-tell discussion, and we
    will not go through the steps required to create the report as we did this earlier.


    ## Report Builder Examples


    In other chapters, we discussed how the simple queries we created and analyzed
    could be modified to return more data (basically removing the `WHERE` clause and
    tweaking the `PARTITION BY` clause) so they could be utilized as a basis for some
    sophisticated SSRS web report.


    The `WHERE` clause columns would then be used as filters in Report Builder. This
    is a powerful concept that allows business analysts great flexibility in what
    data they wish to view and analyze.


    In this section we will take a look at one of the reports I created that references
    a `VIEW` we discussed in this chapter. This `VIEW` is called `Reports.MonthlySumInventoryShort`.
    We will use this in a report that will allow us to drill down by years, quarters,
    and months and also by location, inventory, warehouse, and product and any combination
    you can think of.


    I will not show you how to build it, as we saw in prior chapters, but we will
    concentrate on the report navigation features.


    Please refer to Figure [13-45](#527021_1_En_13_Chapter.xhtml#Fig45).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig45_HTML.png)


    A screenshot of the S Q L S R S window with a table of 11 columns and 13 rows.
    The column headers are inv year, inv quarter name, inv month name, location I
    D, warehouse I D, product type, product I D, monthly sum quantity on hand, and
    prior month, quarter, and year sums in prior years view.


    Figure 13-45


    Quantity on hand – prior years’ view


    The report was published to my personal `SSRS` website on my laptop, just like
    in a real production environment. Amazing!


    This first view shows the top-level year data. As can be seen by the arrows, the
    prior year column points to the correct value in the **Monthly Sum Qty On Hand**
    column. I wanted to make the field names in the report a bit verbose, so they
    clearly indicate what they are.


    If we click one of the plus sign buttons next to the **Inv Year** column, we drill
    down to the next level, inventory movements by year and quarter.


    Please refer to Figure [13-46](#527021_1_En_13_Chapter.xhtml#Fig46).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig46_HTML.png)


    A screenshot of the S Q L S R S window with a table of 11 columns and 13 rows.
    The column headers are inv year, inv quarter name, inv month name, location I
    D, warehouse I D, product type, product I D, monthly sum quantity on hand, and
    prior month, quarter, and year sums in prior quarter view.


    Figure 13-46


    Quantity on hand – prior quarter view


    Success! Drilling down in 2003 displays the four quarters for that year, and once
    again the values in the Prior Quarter Sum column point to the correct inventory
    totals in the **Monthly Sum Qty On Hand**.


    Let’s drill down to the month level.


    Please refer to Figure [13-47](#527021_1_En_13_Chapter.xhtml#Fig47).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig47_HTML.png)


    A screenshot of the S Q L S R S window with a table of 11 columns and 13 rows.
    The column headers are inv year, inv quarter name, inv month name, location I
    D, warehouse I D, product type, product I D, monthly sum quantity on hand, and
    prior month, quarter, and year sums in the prior month view.


    Figure 13-47


    Quantity on hand – prior month view


    Drill-down works well enough, but notice that the months were sorted by name,
    so the order is clunky. We can always go back, add the numerical month, and republish
    or just fix the sort order on the column that displays the text values for the
    month. Yes, for this column you can specify that the values are sorted by the
    numerical month column, thus overriding the sort on the text values.


    Before we do that let’s drill down on one of the months to see details at a warehouse
    level.


    Please refer to Figure [13-48](#527021_1_En_13_Chapter.xhtml#Fig48).


    ![](images/527021_1_En_13_Chapter/527021_1_En_13_Fig48_HTML.png)'
  trans: '

    ### 整体性能考量


    我们可以使用 Microsoft Excel 电子表格和图表来分析 `IO` 和 `TIME` 统计数据，以了解窗口函数之间的相对性能表现。通过将所有统计数据收集到一个表格中并绘制图表，我们可以看到
    `PERCENT_RANK()` 函数相比其他函数消耗了大量的 `CPU` 和总执行时间。


    我们将对 Warehouse 表和 work 表都进行此分析。图 13-42 展示了 Warehouse 表统计数据的可视化结果。


    ![](img/527021_1_En_13_Fig42_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has a line graph of counts versus functions with 3 horizontal lines
    for scan count, logical reads, and physical reads.


    图 13-42


    Warehouse 表的查询组合 IO 统计数据


    这很有意思。针对 Warehouse 表的所有窗口函数的扫描计数、逻辑读取值和物理读取值都相同。那么我们能说所有这些函数的行为表现完全一致吗？


    嗯，是的，因为我们大多数时候使用了相同的 `WHERE` 子句，所以这是我们需要考虑的一个因素。


    让我们看看 work 表的可视化结果。


    请参考图 13-43。


    ![](img/527021_1_En_13_Fig43_HTML.png)


    A screenshot of the M S Excel window. It has a table of 5 columns and 8 rows.
    The column headers are function, table, scan count, logical reads, and physical
    reads. It also has a line graph of counts versus functions with 2 inverted bell
    curves and a horizontal line.


    图 13-43


    work 表的查询组合 IO 统计数据


    这个更有意思。看起来 `CUME_DIST()`、`PERCENTILE_CONT()` 和 `PERCENTILE_DISC()` 函数产生了最高的逻辑读取，而
    `LAG()` 和 `LEAD()` 函数产生的最低。其他函数则介于两者之间。


    就扫描计数而言，我们可以陈述相同的模式，有趣的是所有的物理读取都是零。


    最后但同样重要的是，让我们看看所有函数的 CPU 和总耗时统计信息。


    请参考图 13-44。


    ![](img/527021_1_En_13_Fig44_HTML.png)


    A screenshot of the M S Excel window. It has a table of 3 columns and 8 rows.
    The column headers are function, C P U, and elapsed. It also has a line graph
    of milliseconds versus functions with 2 almost horizontal curves for C P U and
    elapsed with a peak at 172 and 376 percent rank.


    图 13-44


    查询组合 CPU 和总耗时统计信息


    可视化图表中又一组有趣的统计数据。看起来 `PERCENT_RANK()` 函数使用了最多的 `CPU` 资源并且执行时间最长。其余函数则相当稳定。


    结论：通过生成图表来比较这些窗口函数的资源使用情况，是找出消耗资源最多的函数的好方法。这正是你开始性能调优的地方。换句话说，基于此分析来确定你需要优先调优哪些查询。


    让我们通过查看几个 `SSRS` 报告来结束本章，以展示其钻取功能。这更像是一个展示与讲解的讨论，我们不会像之前那样详细介绍创建报告所需的步骤。


    ## Report Builder 示例


    在其他章节中，我们讨论了如何修改我们创建和分析的简单查询，以返回更多数据（基本上是移除 `WHERE` 子句并调整 `PARTITION BY` 子句），这样它们就可以用作一些复杂的
    SSRS 网络报告的基础。


    `WHERE` 子句中的列随后将在 Report Builder 中用作过滤器。这是一个强大的概念，为业务分析师在查看和分析所需数据方面提供了极大的灵活性。


    在本节中，我们将查看我创建的一个报告，该报告引用了本章讨论的一个 `VIEW`。这个 `VIEW` 叫做 `Reports.MonthlySumInventoryShort`。我们将在一个报告中使用它，该报告允许我们按年、季度、月以及地点、库存、仓库和产品进行钻取，以及你能想到的任何组合。


    我不会展示如何构建它，正如我们在前面章节中看到的，但我们将专注于报告的导航功能。


    请参考图 13-45。


    ![](img/527021_1_En_13_Fig45_HTML.png)


    A screenshot of the S Q L S R S window with a table of 11 columns and 13 rows.
    The column headers are inv year, inv quarter name, inv month name, location I
    D, warehouse I D, product type, product I D, monthly sum quantity on hand, and
    prior month, quarter, and year sums in prior years view.


    图 13-45


    库存数量 – 往年视图


    该报告已发布到我笔记本电脑上的个人 `SSRS` 网站，就像在真实的生产环境中一样。真棒！


    这个初始视图显示了顶层的年份数据。如箭头所示，“前一年”列指向了 **Monthly Sum Qty On Hand** 列中的正确值。我想让报告中的字段名更详细一些，以便清楚地表明它们是什么。


    如果我们点击 **Inv Year** 列旁边的加号按钮之一，我们将钻取到下一级别，即按年和季度的库存移动。


    请参考图 13-46。


    ![](img/527021_1_En_13_Fig46_HTML.png)


    A screenshot of the S Q L S R S window with a table of 11 columns and 13 rows.
    The column headers are inv year, inv quarter name, inv month name, location I
    D, warehouse I D, product type, product I D, monthly sum quantity on hand, and
    prior month, quarter, and year sums in prior quarter view.


    图 13-46


    库存数量 – 上季度视图


    成功！在 2003 年钻取显示该年的四个季度，并且“前一季度汇总”列中的值再次指向了 **Monthly Sum Qty On Hand** 中正确的库存总计。


    让我们钻取到月份级别。


    请参考图 13-47。


    ![](img/527021_1_En_13_Fig47_HTML.png)


    A screenshot of the S Q L S R S window with a table of 11 columns and 13 rows.
    The column headers are inv year, inv quarter name, inv month name, location I
    D, warehouse I D, product type, product I D, monthly sum quantity on hand, and
    prior month, quarter, and year sums in the prior month view.


    图 13-47


    库存数量 – 上月视图


    钻取功能工作得很好，但请注意月份是按名称排序的，所以顺序有些混乱。我们总是可以回去，添加数字月份并重新发布，或者只修复显示月份文本值的列的排序顺序。是的，对于此列，你可以指定值按数字月份列排序，从而覆盖文本值上的排序。


    在我们执行此操作之前，让我们在某个月份上钻取，以查看仓库级别的详细信息。


    请参考图 13-48。


    ![](img/527021_1_En_13_Fig48_HTML.png)

