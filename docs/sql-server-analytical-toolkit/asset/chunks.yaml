    GO

    SELECT     SalesYear

    ,SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,FORMAT(PERCENTILE_CONT(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctCont

    ,FORMAT(PERCENTILE_DISC(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctDisc

    FROM APSales.SalesReports.YearlySummaryReport

    WHERE SalesYear IN(2010,2011)

    AND StoreNo = ''S00004

    GO

    SET STATISTICS TIME OFF

    GO

    SET STATISTICS IO OFF

    GO

    Listing 3-20

    Querying the Report Table

    ```


    We have covered this query earlier, so let’s get right to it and generate the
    estimated query plan in the usual manner. I did create an index on the new report
    table. This index was suggested by the estimated query plan tool. Please refer
    to the Listing [3-21](#527021_1_En_3_Chapter.xhtml#PC31).


    ```

    CREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]

    ON [SalesReports].[YearlySummaryReport] ([StoreNo],[SalesYear])

    INCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])

    GO

    Listing 3-21

    Index to Support the Report Table

    ```


    We need to compare the new plan with the prior plan to see what improvements,
    if any, have occurred.


    Please refer to Figure [3-21](#527021_1_En_3_Chapter.xhtml#Fig21) for the estimated
    query plans for both approaches.


    ![](images/527021_1_En_3_Chapter/527021_1_En_3_Fig21_HTML.png)


    A screenshot of the chapter 0 3 T S Q L code window. The screen is divided into
    2 sub-windows. The top screen has some programming codes. The bottom screen has
    a message for query plans. It compares the new plan with the prior plan, after
    execution of the plan.


    Figure 3-21


    Comparing estimated query plans


    The top estimated query plan represents the original query with the `CTE`. The
    bottom query plan is for the revised script that queries the reporting table that
    was preloaded.


    What we see is that the index seek for the reporting table query is at a cost
    of 20% compared with the index seek of 51% for the original query. The new query
    also has a sort step significantly higher than the sort step in the original query
    that uses the `CTE`. Seems like when index seek cost goes down, sort cost goes
    up. Something to keep an eye out for.


    Is this an improvement? Not sure, so let’s look at the `IO` and `TIME` statistics
    to see what they tell us.


    Please refer to Table [3-8](#527021_1_En_3_Chapter.xhtml#Tab8).


    Table 3-8


    Comparing IO and TIME Statistics


    | SQL Server Parse and Compile Times | No Report Table | Report Table |

    | --- | --- | --- |

    | CPU time (ms) | 15 | 0 |

    | Elapsed time (ms) | **20** | **58** |

    | **Statistics (Work Table)** | **Existing Index** | **New Index** |

    | Scan count | 9 | 9 |

    | Logical reads | 171 | 171 |

    | Physical reads | 0 | 0 |

    | Read-ahead reads | 0 | 0 |

    | **Statistics (Work File)** | **Existing Index** | **New Index** |

    | Scan count | 0 | NA |

    | Logical reads | 0 | NA |

    | Physical reads | 0 | NA |

    | Read-ahead reads | 0 | NA |

    | **Statistics (YearlySalesReport) vs. YearlySummaryReport** | **Existing Index**
    | **New Index** |

    | Scan count | **1** | **2** |

    | Logical reads | **343** | **6** |

    | Physical reads | **2** | **1** |

    | Read-ahead reads | **345** | **8** |

    | **SQL Server Execution Times** | **Existing Index** | **New Index** |

    | CPU time (ms) | **16** | **0** |

    | Elapsed time (ms) | **132** | **67** |


    Looking at the statistics that were generated, we see significant improvements
    when we use the reporting table called `YearlySummaryReport`. The scan count went
    up from 1 to 2, but the logical reads went from 343 to 6\. Physical reads decreased
    by 1 in the new reporting table, and best of all, read-ahead reads went down from
    345 to 8\. So, yes, there seems to be a significant improvement when using preloaded
    and precalculated reporting tables in queries that use window functions. Come
    to think of it – eliminating the `CTE` or load step from the analysis definitely
    will improve performance of the query.


    Last but not least, CPU time for execution times went down from 16 to 0 ms, and
    elapsed time went from 132 to 67 ms.


    One last comment when performing this type of analysis: Always run several tests,
    clearing the buffers with `DBCC` for each trial. Record the results in a spreadsheet
    for later analysis and evaluation as to which performance improvement modification
    works best.


    By the way, isolating the loading of a report table does not mean we completely
    ignore performance analysis on the load steps. If we are loading millions of rows
    nightly, then we need to come up with a load strategy that will not take so long
    it creeps into work hours!'
  trans: '### 使用报告表


    有时，为利用窗口函数或复杂计算（或两者兼有）的查询创建一个或多个索引来提高性能是不够的。接下来要考虑的是创建一个所谓的反规范化表或报告表，该表在非工作时段加载，前提是用户可以容忍数据有
    24 小时的延迟。


    此步骤的关键在于理解业务分析师的需求。一些用户会需要或想要当前实时数据，而另一些用户则可以接受较旧的数据，比如当他们需要运行月末汇总或其他某种总结历史绩效的报告时。


    作为 SQL 开发人员或架构师，你需要与业务方合作，收集业务用户期望的数据和性能报告。希望在需求收集会议之后，你会得到这样一个场景：80%的用户不需要实时数据；相反，一天前的数据或更旧的数据就足够了。另外
    20%需要实时数据的用户则需要复杂的解决方案，这可能涉及硬件、复杂的复制方案或直接查询事务表，而后者并不推荐。


    让我们看一下针对刚才研究的查询的一个可能解决方案，它使用了一个在非工作时段加载的报告表。查询的`CTE`部分被报告表取代。我们将预加载它，然后检查包含窗口函数的查询的性能。


    请参阅清单 3-19，了解加载报告表和修订后查询的脚本。


    ```sql

    DROP TABLE IF EXISTS [SalesReports].[YearlySummaryReport]

    GO

    CREATE TABLE [SalesReports].YearlySummaryReport NOT NULL,

    [StoreName]      nvarchar NOT NULL,

    [StoreTerritory] nvarchar NOT NULL,

    [TotalSales]     decimal NULL

    ) ON [AP_SALES_FG]

    GO

    INSERT INTO APSales.SalesReports.YearlySummaryReport

    SELECT YEAR(CalendarDate) AS SalesYear

    ,MONTH(CalendarDate) AS SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,SUM(TotalSalesAmount) AS TotalSales

    FROM APSales.SalesReports.YearlySalesReport

    GROUP BY YEAR(CalendarDate)

    ,MONTH(CalendarDate)

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    GO

    CREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]

    ON [SalesReports].[YearlySummaryReport] ([StoreNo],[SalesYear])

    INCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])

    GO

    清单 3-19

    用于预加载的 YearlySummaryReport 表

    ```


    此脚本使用为`CTE`定义的输出列，并用它们创建一个名为`YearlySummaryReport`的物理表。表创建好后，原本用于`CTE`的查询被用在`INSERT`语句中来加载该表。这一步很简单。现在，对于包含窗口函数的查询以及我们需要进行的分析，以查看在估计查询计划以及`IO`和`TIME`统计信息方面是否有改进，请参阅清单
    3-20。


    ```sql

    DBCC dropcleanbuffers

    CHECKPOINT;

    GO

    SET STATISTICS TIME ON

    GO

    SET STATISTICS IO ON

    GO

    SELECT     SalesYear

    ,SalesMonth

    ,StoreNo

    ,StoreName

    ,StoreTerritory

    ,FORMAT(TotalSales,''C'') AS TotalSales

    ,FORMAT(PERCENTILE_CONT(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctCont

    ,FORMAT(PERCENTILE_DISC(.5)

    WITHIN GROUP (ORDER BY TotalSales)

    OVER (

    PARTITION BY SalesYear

    ),''C'') AS PctDisc

    FROM APSales.SalesReports.YearlySummaryReport

    WHERE SalesYear IN(2010,2011)

    AND StoreNo = ''S00004

    GO

    SET STATISTICS TIME OFF

    GO

    SET STATISTICS IO OFF

    GO

    清单 3-20

    查询报告表

    ```


    我们之前已经介绍过这个查询，所以让我们直接进入主题，按通常的方式生成估计查询计划。我确实在新的报告表上创建了一个索引。这个索引是由估计查询计划工具建议的。请参阅清单
    3-21。


    ```sql

    CREATE NONCLUSTERED INDEX [ieYearlySalesStoreTerritorySummary]

    ON [SalesReports].[YearlySummaryReport] ([StoreNo],[SalesYear])

    INCLUDE ([SalesMonth],[StoreName],[StoreTerritory],[TotalSales])

    GO

    清单 3-21

    用于支持报告表的索引

    ```


    我们需要将新计划与之前的计划进行比较，以查看发生了哪些改进（如果有的话）。


    请参阅图 3-21，了解两种方法的估计查询计划。


    ![](img/527021_1_En_3_Fig21_HTML.png)


    一个第 03 章 T-SQL 代码窗口的截图。屏幕被分成 2 个子窗口。顶部屏幕有一些编程代码。底部屏幕有一条关于查询计划的消息。它比较了执行计划后的新计划与之前的计划。


    图 3-21

    比较估计查询计划


    顶部的估计查询计划代表使用原始`CTE`的查询。底部的查询计划是用于查询预加载报告表的修订脚本。


    我们看到，报告表查询的索引查找成本为 20%，而原始查询的索引查找成本为 51%。新查询还有一个排序步骤，其成本明显高于使用`CTE`的原始查询中的排序步骤。看来当索引查找成本下降时，排序成本就会上升。这是需要留意的一点。


    这是改进吗？不确定，所以让我们看看`IO`和`TIME`统计信息，看看它们能告诉我们什么。


    请参阅表 3-8。


    表 3-8

    比较 IO 和 TIME 统计信息


    | SQL Server 解析和编译时间 | 无报告表 | 有报告表 |

    | --- | --- | --- |

    | CPU 时间 (毫秒) | 15 | 0 |

    | 已用时间 (毫秒) | **20** | **58** |

    | **统计信息 (工作表)** | **现有索引** | **新索引** |

    | 扫描计数 | 9 | 9 |

    | 逻辑读取 | 171 | 171 |

    | 物理读取 | 0 | 0 |

    | 预读读取 | 0 | 0 |

    | **统计信息 (工作文件)** | **现有索引** | **新索引** |

    | 扫描计数 | 0 | 不适用 |

    | 逻辑读取 | 0 | 不适用 |

    | 物理读取 | 0 | 不适用 |

    | 预读读取 | 0 | 不适用 |

    | **统计信息 (YearlySalesReport) vs. YearlySummaryReport** | **现有索引** | **新索引** |

    | 扫描计数 | **1** | **2** |

    | 逻辑读取 | **343** | **6** |

    | 物理读取 | **2** | **1** |

    | 预读读取 | **345** | **8** |

    | **SQL Server 执行时间** | **现有索引** | **新索引** |

    | CPU 时间 (毫秒) | **16** | **0** |

    | 已用时间 (毫秒) | **132** | **67** |


    查看生成的统计信息，我们看到当使用名为`YearlySummaryReport`的报告表时，性能有显著提升。扫描计数从 1 增加到 2，但逻辑读取从 343
    降到了 6。物理读取在新报告表中减少了 1，最好的是，预读读取从 345 降到了 8。所以，是的，在使用窗口函数的查询中使用预加载和预计算的报告表似乎有显著的改进。想一想——从分析中消除`CTE`或加载步骤肯定会提高查询性能。


    最后但同样重要的是，执行时间的 CPU 时间从 16 毫秒降到了 0 毫秒，已用时间从 132 毫秒降到了 67 毫秒。


    在进行此类分析时，最后一个建议是：始终运行多次测试，每次试验前使用`DBCC`清除缓冲区。将结果记录在电子表格中，以便后续分析和评估哪种性能改进方案效果最佳。


    顺便说一句，隔离报告表的加载步骤并不意味着我们完全忽略对加载步骤的性能分析。如果我们每晚加载数百万行数据，那么我们需要提出一个加载策略，确保其耗时不会过长以至于侵占工作时间！'
- fmt: '# Summary


    我们刚刚介绍了第二组窗口函数——分析函数。我认为不仅在用于满足业务分析师需求的分析技术方面，而且在性能调优方面，都做出了一些有趣的发现。


    我们使用估计的查询计划以及`IO`和`TIME`统计数据进行了常规分析，同时也查看了客户端统计数据。


    接着，我们引入了非规范化暂存表或报告表，以模拟一个在夜间加载数据并执行所有计算和连接的生产环境。我们对基于`CTE`的查询进行了与之前相同的性能分析。


    最后，我们介绍了内存优化表，这些表被加载到内存中。我们发现它们可以非常快。


    总之，您现在知道如何在使用`OVER()`子句的分区中使用分析函数了。在下一章中，我们将研究排名函数，并尝试使用窗口帧定义来使事情变得有趣。


    还有一点说明：我们只是触及了性能分析和调优技术的皮毛。本书的范围是关于窗口函数，但学习如何使用一些性能调优工具和技术是最低要求，因为它将帮助您编写快速有效的脚本和查询。


    关于性能调优的优秀读物，请参阅Grant Fritchey所著的*SQL Server 2022 Query Performance Tuning: Troubleshoot
    and Optimize Query Performance*（第六版，Apress）。


    这是一本很棒的读物，在我看来，如果您认真学习性能分析、相关工具和性能改进，这是您书架上的必备书。


    # 4. 销售用例：排名/窗口函数


    这是我们处理销售数据仓库的最后一章。我们将探讨第三类函数，即窗口或排名函数。我们将采用与前面章节相同的方法，即简要解释函数，展示代码和查询结果，并通过添加索引和报告表进行一些性能分析和调优。最后，我们将提出一个称为“间隙与孤岛”的数据分析问题，其中我们使用在第3章中学到的一些窗口系统函数来识别销售数据中的日期间隙和序列。


    ## 排名/窗口函数


    这个类别只有四个函数，但我们将重新审视上一章的`PERCENT_RANK()`函数，因为它与其中一些函数有许多相似之处：


    *   `RANK()`

    *   `PERCENT_RANK()`

    *   `DENSE_RANK()`

    *   `NTILE()`

    *   `ROW_NUMBER()`


    `RANK()`函数显示数据集中每一行某列值相对于数据集中其他行值的排名。如果出现并列排名，则并列的行获得相同的排名，但下一个值在重复值之后被分配的排名等于并列数量加上当前的排名值。


    因此，如果您有三个并列值（例如值4）被分配排名4，那么下一个大于4的值的排名将是4 + 3（并列数量）= 7（哎呀！）。


    `DENSE_RANK()`函数的工作方式几乎与`RANK()`函数相同。如果出现并列排名，并列的行获得相同的排名，但下一个值在重复值之后只是被分配下一个排名数字。因此，如果并列值的排名是4，那么分配给下一个更高值的排名就是5（这对我来说很合理……）。


    `PERCENT_RANK()`函数将排名分配为百分比。并列的行获得相同的排名百分比值。使用类似于查询、分区或表变量结果的数据集，该函数计算每个值相对于整个数据集的相对排名（以百分比形式）。您需要将结果（返回值是`float`数据类型）乘以100.00或使用`FORMAT()`函数将结果转换为百分比。


    `ROW_NUMBER()`函数只是简单地为每一行分配下一个最大的数字，无论是否出现并列。


    因此，如果当前行是数据集中的第四行，则分配行号4。对于第5行，那么，请等待一下，数字5被分配，依此类推。此函数不关心包含值的列中是否存在并列。它只关心行在数据集中的位置。


    `NTILE()`函数允许您将数据集中的一组行划分为若干个切片或桶。如果您有一个包含12行的数据集，并且想分配4个切片，那么每个切片将有3行。当您想评估销售人员绩效并根据销售业绩授予奖金时，此功能非常方便。（我们将看到如何操作。我们将生成多个切片来实现绩效桶，并将销售人员分配到其中。）


    好的，我确信所有这些有点令人困惑，您正在挠头。让我们使用上一章的简单示例，稍作修改，然后查看一些简单的数据，以便我们解释每个函数的作用（`NTILE()`除外）以及它们彼此之间的相似之处（和不同之处）。


    请参考代码清单[4-1]。


    ```sql

    DECLARE @ExampleValues TABLE (

    TestKey VARCHAR(8) NOT NULL,

    TheValue SMALLINT NOT NULL

    );

    INSERT INTO @ExampleValues VALUES

    (''ONE'',1),(''TWO'',2),(''THREE'',3),(''FOUR'',4),

    (''FOUR'',4),(''SIX'',6),(''SEVEN'',7),

    (''EIGHT'',8),(''NINE'',9),(''TEN'',10);

    SELECT

    TestKey,

    TheValue,

    ROW_NUMBER()          OVER(ORDER BY TheValue) AS RowNo,

    RANK()                OVER(ORDER BY TheValue) AS ValueRank,

    DENSE_RANK()          OVER(ORDER BY TheValue) AS DenseRank,

    PERCENT_RANK()        OVER(ORDER BY TheValue) AS ValueRank,

    FORMAT(PERCENT_RANK() OVER(ORDER BY TheValue),''P'') AS ValueRankAsPct

    FROM @ExampleValues;

    GO

    ```

    代码清单 4-1

    排名函数实战


    我们声明了简单的表变量并向其中插入了十行。注意`INSERT`语句中`(''FOUR'',4)`的重复值。这是故意为之的，这样我们就能看到重复值如何影响每个函数的行为。


    每个函数都与一个`OVER()`子句一起使用。我们只包含一个`ORDER BY`子句，该子句按“`TheValue`”列中的值对分区数据集进行排序。注意使用`FORMAT()`函数将`PERCENT_RANK()`函数的结果显示为百分比。让我们看看结果。


    注意'
  raw: '## Summary


    We just covered our second set of window functions, analytical functions. I think
    some interesting discoveries were made not only in analytical techniques to use
    to make our business analysts happy but also in performance tuning.


    We did the usual analysis with the estimated query plans and `IO` and `TIME` statistics,
    and we also looked at client statistics.


    Next, we introduced denormalized staging or reporting tables in order to simulate
    a production environment that loads data overnight so as to perform all calculations
    and joins. We performed the same performance analysis as we did for the `CTE`-based
    queries.


    Finally, we introduced memory-optimized tables, which are loaded into memory.
    We discovered that these could be very fast.


    In conclusion, you now know how to use the analytical functions within partitions
    that use the `OVER()` clause. In the next chapter, we will take a look at the
    ranking functions and play around with window frame definitions to make things
    interesting.


    One more comment: We are only touching on performance analysis and tuning techniques.
    The scope of this book is on the window functions, but a bare minimum of learning
    how to use some of the performance tuning tools and techniques is warranted as
    it will help you write fast and effective scripts and queries.


    For a great read on performance tuning, please refer to *SQL Server 2022 Query
    Performance Tuning: Troubleshoot and Optimize Query Performance* (sixth edition,
    Apress) by Grant Fritchey.


    A great read and in my opinion a must in your library if you are serious about
    learning performance analysis, associated tools, and performance improvement.


    # 4. Sales Use Case: Ranking/Window Functions


    This is our last chapter dealing with the sales data warehouse. We will look at
    the third category of functions called window or ranking functions. We will take
    the same approach as prior chapters, that is, provide a brief explanation of the
    function, present the code and the query results, and do some performance analysis
    and tuning by adding indexes and report tables. Lastly, we will present a data
    analysis problem called gaps and islands where we use some of the window system
    functions we studied in Chapter [3](#527021_1_En_3_Chapter.xhtml) to identify
    gaps and sequences in dates for sales data.


    ## Ranking/Window Functions


    There are only four functions in this category, but we will revisit the `PERCENT_RANK()`
    function from the last chapter as it has a lot of similarities with some of these
    functions:


    *   RANK()


    *   PERCENT_RANK()


    *   DENSE_RANK()


    *   NTILE()


    *   ROW_NUMBER()


    The `RANK()` function shows the rank of the value in each row column of a data
    set relative to the other row values in the data set. In case of ties, the rank
    is the same for the ties, but the next value after the duplicate values is assigned
    a rank equal to the number of ties plus the current rank value.


    So, if you have a three-way tie for a value like 4 and it is assigned a rank of
    4, the next rank for a value greater than 4 will be 4 + 3 (the number of ties)
    = 7 (yikes!).


    The `DENSE_RANK()` function works almost the same as the `RANK()` function. In
    case of ties, the rank is the same for the ties, but the next value after the
    duplicate values simply is assigned the next rank number. So, if the rank for
    the ties is 4, the next rank assigned to the next higher value is 5 (makes sense
    to me …).


    The `PERCENT_RANK()` function assigns a ranking as a percentage. Ties get the
    same rank percentage values. Using a data set like results from a query, partition,
    or table variable, this function calculates the relative rank of each individual
    value relative to the entire data set (as a percentage). You need to multiply
    the results (the value returned is a float data type) by 100.00 or use the `FORMAT()`
    function to convert the results to a percentage.


    The `ROW_NUMBER()` function simply assigns the next highest number to the row
    regardless of ties.


    So, if the current row is the fourth row in the data set, the row number 4 will
    be assigned. For row number 5, then, wait for it, the number 5 is assigned and
    so on. This function does not care if there are ties in the column that contains
    values. It only cares about the position of the row within the data set.


    The `NTILE()` function allows you to divide a set of rows in a data set into tiles
    or buckets. If you have a data set of 12 rows and you want to assign 4 tiles,
    each tile will have 3 rows. This function comes in handy when you want to evaluate
    salesperson performance and grant them bonuses based on sales performance. (We
    will see how to do this. We will generate several tiles to implement performance
    buckets and assign a salesperson to them.)


    Okay, I am sure that all this was a bit confusing, and you are scratching your
    head. Let’s use the simple example from the prior chapter, modify it a bit, and
    then look at some simple data so we can explain what each function does (except
    for `NTILE()`) and how they are alike to (and differ from) each other.


    Please refer to Listing [4-1](#527021_1_En_4_Chapter.xhtml#PC1).


    ```

    DECLARE @ExampleValues TABLE (

    TestKey VARCHAR(8) NOT NULL,

    TheValue SMALLINT NOT NULL

    );

    INSERT INTO @ExampleValues VALUES

    (''ONE'',1),(''TWO'',2),(''THREE'',3),(''FOUR'',4),

    (''FOUR'',4),(''SIX'',6),(''SEVEN'',7),

    (''EIGHT'',8),(''NINE'',9),(''TEN'',10);

    SELECT

    TestKey,

    TheValue,

    ROW_NUMBER()          OVER(ORDER BY TheValue) AS RowNo,

    RANK()                OVER(ORDER BY TheValue) AS ValueRank,

    DENSE_RANK()          OVER(ORDER BY TheValue) AS DenseRank,

    PERCENT_RANK()        OVER(ORDER BY TheValue) AS ValueRank,

    FORMAT(PERCENT_RANK() OVER(ORDER BY TheValue),''P'') AS ValueRankAsPct

    FROM @ExampleValues;

    GO

    Listing 4-1

    Ranking Functions in Action

    ```


    We declare our simple table variable and insert ten rows into it. Notice the duplicate
    values of `(''FOUR'',4)` in the `INSERT` statement. This was done on purpose,
    so we will see how duplicate values affect the behavior of each function.


    Each function is used with an `OVER()`clause. We include only an `ORDER BY` clause
    that sorts the partition data set by the values in the “`TheValue`” column. Notice
    the use of the `FORMAT()` function to display the results of the `PERCENT_RANK()`
    function as a percentage. Let’s see the results.


    Note'
  trans: '

    # 总结


    我们刚刚介绍了第二组窗口函数——分析函数。我认为，无论是在满足业务分析师需求的**分析技术**方面，还是在**性能调优**方面，我们都取得了一些有趣的发现。


    我们利用估计的查询计划以及`IO`和`TIME`统计数据进行了常规分析，同时也审视了客户端统计数据。


    接着，我们引入了非规范化暂存表或报告表，以模拟一个在夜间加载数据并执行所有计算和连接的生产环境。我们对基于`CTE`的查询进行了与之前相同的性能分析。


    最后，我们介绍了内存优化表，这些表被加载到内存中。我们发现它们可以非常快。


    总之，您现在知道了如何在使用`OVER()`子句的分区中使用分析函数。在下一章中，我们将研究排名函数，并尝试使用窗口帧定义来让事情变得更有趣。


    还有一点需要说明：我们仅仅是触及了性能分析和调优技术的皮毛。本书的范围是关于窗口函数，但学习如何使用一些性能调优工具和技术是最低要求，因为它将帮助您编写快速有效的脚本和查询。


    关于性能调优的优秀读物，请参阅 Grant Fritchey 所著的*《SQL Server 2022 查询性能调优：故障排除与优化查询性能》*（第六版，Apress）。


    这是一本很棒的读物，在我看来，如果您认真学习性能分析、相关工具和性能改进，这是您书架上的必备书。


    # 4. 销售用例：排名/窗口函数


    这是我们处理销售数据仓库的最后一章。我们将探讨第三类函数，即窗口或排名函数。我们将采用与前面章节相同的方法，即简要解释函数，展示代码和查询结果，并通过添加索引和报告表进行一些性能分析和调优。最后，我们将提出一个称为“间隙与孤岛”的数据分析问题，其中我们使用在第
    3 章中学到的一些窗口系统函数来识别销售数据中的日期间隙和序列。


    ## 排名/窗口函数


    这个类别只有四个函数，但我们将重新审视上一章的`PERCENT_RANK()`函数，因为它与其中一些函数有许多相似之处：


    *   `RANK()`

    *   `PERCENT_RANK()`

    *   `DENSE_RANK()`

    *   `NTILE()`

    *   `ROW_NUMBER()`


    `RANK()`函数显示数据集中每一行某列值相对于数据集中其他行值的排名。如果出现并列排名，则并列的行获得相同的排名，但下一个值在重复值之后被分配的排名等于并列数量加上当前的排名值。


    因此，如果您有三个并列值（例如值 4）被分配排名 4，那么下一个大于 4 的值的排名将是 4 + 3（并列数量）= 7（哎呀！）。


    `DENSE_RANK()`函数的工作方式几乎与`RANK()`函数相同。如果出现并列排名，并列的行获得相同的排名，但下一个值在重复值之后只是被分配下一个排名数字。因此，如果并列值的排名是
    4，那么分配给下一个更高值的排名就是 5（这对我来说很合理……）。


    `PERCENT_RANK()`函数将排名分配为百分比。并列的行获得相同的排名百分比值。使用类似于查询、分区或表变量结果的数据集，该函数计算每个值相对于整个数据集的相对排名（以百分比形式）。您需要将结果（返回值是`float`数据类型）乘以
    100.00 或使用`FORMAT()`函数将结果转换为百分比。


    `ROW_NUMBER()`函数只是简单地为每一行分配下一个最大的数字，无论是否出现并列。


    因此，如果当前行是数据集中的第四行，则分配行号 4。对于第 5 行，那么，请等待一下，数字 5 被分配，依此类推。此函数不关心包含值的列中是否存在并列。它只关心行在数据集中的位置。


    `NTILE()`函数允许您将数据集中的一组行划分为若干个切片或桶。如果您有一个包含 12 行的数据集，并且想分配 4 个切片，那么每个切片将有 3 行。当您想评估销售人员绩效并根据销售业绩授予奖金时，此功能非常方便。（我们将看到如何操作。我们将生成多个切片来实现绩效桶，并将销售人员分配到其中。）


    好的，我确信所有这些有点令人困惑，您正在挠头。让我们使用上一章的简单示例，稍作修改，然后查看一些简单的数据，以便我们解释每个函数的作用（`NTILE()`除外）以及它们彼此之间的相似之处（和不同之处）。


    请参考代码清单[4-1]。


    ```sql

    DECLARE @ExampleValues TABLE (

    TestKey VARCHAR(8) NOT NULL,

    TheValue SMALLINT NOT NULL

    );

    INSERT INTO @ExampleValues VALUES

    (''ONE'',1),(''TWO'',2),(''THREE'',3),(''FOUR'',4),

    (''FOUR'',4),(''SIX'',6),(''SEVEN'',7),

    (''EIGHT'',8),(''NINE'',9),(''TEN'',10);

    SELECT

    TestKey,

    TheValue,

    ROW_NUMBER()          OVER(ORDER BY TheValue) AS RowNo,

    RANK()                OVER(ORDER BY TheValue) AS ValueRank,

    DENSE_RANK()          OVER(ORDER BY TheValue) AS DenseRank,

    PERCENT_RANK()        OVER(ORDER BY TheValue) AS ValueRank,

    FORMAT(PERCENT_RANK() OVER(ORDER BY TheValue),''P'') AS ValueRankAsPct

    FROM @ExampleValues;

    GO

    ```

    代码清单 4-1

    排名函数实战


    我们声明了简单的表变量并向其中插入了十行。注意`INSERT`语句中`(''FOUR'',4)`的重复值。这是故意为之的，这样我们就能看到重复值如何影响每个函数的行为。


    每个函数都与一个`OVER()`子句一起使用。我们只包含一个`ORDER BY`子句，该子句按“`TheValue`”列中的值对分区数据集进行排序。注意使用`FORMAT()`函数将`PERCENT_RANK()`函数的结果显示为百分比。让我们看看结果。


