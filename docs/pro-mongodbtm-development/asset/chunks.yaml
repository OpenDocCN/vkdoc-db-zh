    \ 中使用 `db.catalog.drop()` 命令删除 `catalog` 集合。要运行 `DeleteDBDocument` 应用程序，请在 Package\
    \ Explorer 中右键单击 `DeleteDBDocument.java` 文件，然后选择运行方式 ![image](img/image00406.jpeg)\
    \ Java 应用程序，如 图 1-18 所示。\n\n![9781484215999_Fig01-18.jpg](img/image00423.jpeg)\n\
    \n图 1-18. 运行 DeleteDBDocument.java 应用程序\n\n`DeleteDBDocument.java` 应用程序的输出如 图\
