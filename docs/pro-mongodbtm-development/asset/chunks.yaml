    \n[Figure 3-11](#part0009.xhtml#_Fig11). Output from the addDocument.php Script\n\
    \nAs we did not provide a `_id` key for the documents added, a unique `MongoId`\
    \ is created automatically for the documents added. The `_id` key or `MongoId`\
    \ must be unique. Next, we shall demonstrate that the `_id` or `MongoId` must\
    \ be unique.\n\nUsing a `try`-`catch` statement create and add a document using\
    \ the `insert()` method. Invoke the `insert` method on the same document twice.\n\
    \n```\n$status=$collection->insert($doc);\n$status=$collection->insert($doc);\n\
    ```\n\nThe `addDocumentException.php` script is listed:\n\n```\n<?php\ntry\n{\n\
    $connection = new MongoClient();\n\n$collection=$connection->local->catalog;\n\
    $doc = array(\n    \"name\" => \"MongoDB\",\n    \"type\" => \"database\",\n    \"\
    count\" => 1,\n    \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\"\
    \ => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David\
    \ A. Kelly')\n);\n$status=$collection->insert($doc);\nvar_dump($status);\nprint\
    \ '<br/>';\n\n$status=$collection->insert($doc);\n}catch ( MongoConnectionException\
    \ $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException\
    \ $e) {\n echo '<p>w option is set and the write has failed</p>';\n    exit();\n\
    \n}\n?>\n```"
  trans: "\n在浏览器中运行脚本 `collection.php`，URL 为 `http://localhost:8000/collection.php`。输出结果如图\
    \ 3-8 所示。\n\n![9781484215999_Fig03-08.jpg](img/image00485.jpeg)\n\n图 3-8. collection.php\
    \ 脚本的输出\n\n## 删除集合\n\n`MongoCollection::drop()` 方法用于删除一个集合，没有任何参数。\n\n在 `C:\\\
    php` 目录下创建一个 PHP 脚本 `dropCollection.php`。在 `try`-`catch` 语句中创建一个 `MongoCollection`\
    \ 实例。调用 `drop()` 方法来删除集合。\n\n```\n$collection->drop();\n```\n\n`dropCollection.php`\
    \ 脚本如下：\n\n```php\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    $collection->drop();\necho '<p>集合已删除</p>';\n}catch (MongoConnectionException $e)\n\
    {\n    echo '<p>无法连接到 mongodb</p>';\n    exit(); \n} \n?>\n```\n\n在浏览器中运行此 PHP\
    \ 脚本，URL 为 `http://localhost:8000/dropCollection.php`，如图 3-9 所示。\n\n![9781484215999_Fig03-09.jpg](img/image00486.jpeg)\n\
    \n图 3-9. 删除一个集合\n\n`catalog` 集合已被删除，如图 3-10 所示，在运行 `dropCollection.php` 脚本前后执行\
    \ `show collections` 方法的结果所示。\n\n![9781484215999_Fig03-10.jpg](img/image00487.jpeg)\n\
    \n图 3-10. 删除集合前后的集合列表\n\n## 使用文档\n\n在接下来的小节中，我们将讨论使用 PHP MongoDB 驱动在 MongoDB 服务器中添加、查询、更新和删除文档。\n\
    \n### 添加文档\n\n`MongoCollection::insert` 方法用于向 MongoDB 添加单个文档。`insert()` 方法接受参数。\n\
    \n```\nMongoCollection::insert ( array|object $document [, array $options = array()\
    \ ] )\n```\n\n第一个参数是一个数组或对象，如果该参数未提供 `_id` 键，则会创建一个新的 `MongoId` 实例并分配给它。`insert`\
    \ 方法支持以下选项，列于表 3-5 中。\n\n表 3-5. 插入方法中的选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `j`\
    \ | 在启用日志记录时使用。日志记录是将写入操作先应用到内存和磁盘上的日志中，然后再应用到磁盘数据文件的过程。如果设置为 true，则必须收到确认写入。写入操作将被阻塞，直到它同步到磁盘上的日志。默认值为\
    \ false。会覆盖 `w` 设置为 '0' 的情况。 |\n| `fsync` | 如果启用日志记录，`fsync` 与 `j` 类似。如果未启用日志记录，写入操作将被阻塞，直到它与磁盘上的数据文件同步，并且必须收到确认插入，覆盖\
    \ `w` 设置为 '0' 的情况。 |\n| `socketTimeoutMS` | 指定套接字通信的时间限制，如果服务器在此时间段内未响应，则抛出 `MongoCursorTimeoutException`\
    \ 异常。MongoClient 的默认值为 30,000 毫秒。 |\n| `w` | 写入关注，默认值为 1。 |\n| `wTimeoutMS` |\
    \ 当 w >1 时，指定确认的时间限制（以毫秒为单位）。如果在时限内未满足写入关注，则抛出 MongoCursorException 异常。`MongoClient`\
    \ 的默认值为 10,000。 |\n\n1.  在 `C:\\php` 目录下创建一个 PHP 脚本 `addDocument.php`。在 `try`-`catch`\
    \ 语句中创建一个 `MongoClient` 实例（表示一个连接），并在 `local` 数据库中为 `catalog` 集合创建一个 `MongoCollection`\
    \ 实例。\n\n    ```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  创建一个要添加文档的数组。\n\n    ```php\n    $doc = array(\n        \"name\"\
    \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
    \        \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" =>\
    \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David\
    \ A. Kelly')\n    );\n    ```\n\n3.  使用 `insert()` 方法将文档添加到 `MongoDB` 集合。\n\n\
    \    ```php\n    $status=$collection->insert($doc);\n    var_dump($status);\n\
    \    ```\n\n4.  为 `MongoConnectionException` 和 `MongoCursorException` 添加 catch\
    \ 块。\n5.  类似地向集合添加另一个文档。`addDocument.php` 脚本如下所示。\n\n    ```php\n    <?php\n \
    \   try\n    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    $doc = array(\n        \"name\" => \"MongoDB\",\n        \"type\" => \"database\"\
    ,\n        \"count\" => 1,\n        \"info\" => (object)array(\"catalogId\" =>\
    \ 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly')\n    );\n    $status=$collection->insert($doc);\n\
    \    var_dump($status);\n    print '<br/>';\n    $doc = array(\n        \"name\"\
    \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
    \        \"info\" => (object)array(\"catalogId\" => 'catalog2', \"journal\" =>\
    \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Quintessential and Collaborative',\"author\" =>\
    \ 'Tom Haunert')\n    );\n    $status=$collection->insert($doc);\n    var_dump($status);\n\
    \    }catch ( MongoConnectionException $e )\n    {\n        echo '<p>无法连接到 mongodb</p>';\n\
    \        exit();\n    }catch(MongoCursorException $e) {\n     echo '<p>w 选项已设置，写入失败</p>';\n\
    \        exit();\n    }\n    ?>\n    ```\n\n6.  在浏览器中运行此 PHP 脚本，URL 为 `http://localhost:8000/addDocument.php`。输出结果如图\
    \ 3-11 所示。如 `insert()` 方法返回的状态消息数组所示，`err` 键为 `NULL`，表示没有错误，`errmsg` 也为 NULL。而\
    \ `ok` 键为 1，表示所有数据库操作已成功完成。`n` 键表示受影响的文档数，对于插入操作为 0。对于更新、upsert 或删除操作，如果文档已被更新、upsert\
    \ 或删除，则 `n` 将为正数。\n\n![9781484215999_Fig03-11.jpg](img/image00488.jpeg)\n\n图 3-11.\
    \ addDocument.php 脚本的输出\n\n由于我们没有为添加的文档提供 `_id` 键，系统会自动为添加的文档创建一个唯一的 `MongoId`。`_id`\
    \ 键或 `MongoId` 必须是唯一的。接下来，我们将演示 `_id` 或 `MongoId` 必须是唯一的。\n\n使用 `try`-`catch`\
    \ 语句创建并使用 `insert()` 方法添加文档。对同一文档调用两次 `insert` 方法。\n\n```php\n$status=$collection->insert($doc);\n\
    $status=$collection->insert($doc);\n```\n\n`addDocumentException.php` 脚本如下：\n\n\
    ```php\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    $doc = array(\n    \"name\" => \"MongoDB\",\n    \"type\" => \"database\",\n \
    \   \"count\" => 1,\n    \"info\" => (object)array(\"catalogId\" => 'catalog1',\
    \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
    \ => 'November December 2013',\"title\" => 'Engineering as a Service',\"author\"\
    \ => 'David A. Kelly')\n);\n$status=$collection->insert($doc);\nvar_dump($status);\n\
    print '<br/>';\n$status=$collection->insert($doc);\n}catch ( MongoConnectionException\
    \ $e )\n{\n    echo '<p>无法连接到 mongodb</p>';\n    exit();\n}catch(MongoCursorException\
    \ $e) {\n echo '<p>w 选项已设置，写入失败</p>';\n    exit();\n}\n?>\n```\n"
- fmt: "# 使用MongoDB PHP库操作文档\n\n## 捕获重复插入异常\n\n当在浏览器中运行`addDocumentException.php`脚本时（URL为`http://localhost:8000/addDocumentException.php`），由于尝试添加重复的文档，会抛出`MongoCursorException`异常。该异常被捕获并输出错误信息，如[图3-12](#part0009.xhtml#Fig12)所示。\n\
    \n![9781484215999_Fig03-12.jpg](Images/image00489.jpeg)\n\n**[图3-12](#part0009.xhtml#_Fig12).\
    \ `addDocumentException.php`脚本的输出**\n\n## 添加多个文档\n\n在上一节中，我们使用两次单独的`insert()`方法调用添加了两个文档。`insert()`方法调用也可以使用`while`、`do`-`while`或`for`循环来完成。\n\
    \n1.  在文档根目录`C:\\php`中创建一个PHP脚本`addMultipleDocuments.php`。在`try`-`catch`语句中，像之前一样为集合创建一个`MongoCollection`实例。\n\
    \n    ```\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  在一个`for`循环中，使用循环初始化器中的变量`$i`作为文档的`catalogId`字段值，向集合添加文档。\n\n \
    \   ```\n    for ($i = 1; $i <= 5; $i++)\n    {\n        $status=$collection->insert(array(\"\
    catalogId\" =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" =>\
    \ 'Oracle Publishing', \"edition\" => 'November December 2013'));\n    var_dump($status);\n\
    \    print '<br/>';\n    }\n    ```\n\n完整的`addMultipleDocuments.php`脚本如下：\n\n\
    ```\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    for ($i = 1; $i <= 5; $i++)\n{\n    $status=$collection->insert(array(\"catalogId\"\
    \ =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013'));\nvar_dump($status);\nprint '<br/>';\n\
    }\n}catch (MongoConnectionException $e)\n{\n    echo '<p>Couldn\\'t connect to\
    \ mongodb</p>';\n    exit();\n}catch(MongoCursorException $e) {\n echo '<p>w option\
    \ is set and the write has failed</p>';\n    exit();\n}\n?>\n```\n\n3.  在浏览器中运行`addMultipleDocuments.php`脚本，URL为`http://localhost:8000/addMultipleDocuments.php`，以向MongoDB集合添加多个文档。每添加一个文档，都会输出一条状态信息，如[图3-13](#part0009.xhtml#Fig13)所示。\n\
    \n![9781484215999_Fig03-13.jpg](Images/image00490.jpeg)\n\n**[图3-13](#part0009.xhtml#_Fig13).\
    \ `addMultipleDocuments.php`脚本的输出**\n\n## 批量添加文档\n\n`MongoCollection::batchInsert()`方法可用于向集合批量添加文档。该方法的语法与`insert`方法相同。\n\
    \n```\nMongoCollection::batchInsert ( array $document [, array $options = array()\
    \ ] )\n```\n\n与`insert()`方法的区别在于，其第一个参数是数组的数组或对象，而`insert`方法中是数组或对象。`batchInsert()`方法返回一个关联数组，而`insert`方法返回数组或`boolean`值。该方法支持一个额外的选项`continueOnError`，默认值为false。如果设置为true，当其中一个文档插入失败时，批量插入会失败。要批量添加的文档数组中的每个文档都必须有一个唯一的`_id`。\n\
    \n1.  在`C:\\php`目录中创建一个PHP脚本`addDocumentBatch.php`。像之前一样创建一个`MongoCollection`实例。\n\
    \n    ```\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  创建一个用于存放文档数组的数组。\n\n    ```\n    $batch=array();\n    ```\n\n\
    3.  创建一个文档数组，并将其添加到`$batch`数组中。\n\n    ```\n    $doc1 = array(\n        \"name\"\
    \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
    \        \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" =>\
    \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David\
    \ A. Kelly')\n    );\n\n    $batch[]=$doc1;\n    ```\n\n4.  同样地，将另一个文档添加到批量数组中。`$doc2`在`addDocumentBatch.php`脚本列表中声明。\n\
    \n    ```\n    $batch[]=$doc2;\n    ```\n\n5.  使用`$batch`数组作为参数调用`batchInsert`方法。\n\
    \n    ```\n    $status=$collection->batchInsert($batch);\n    var_dump($status);\n\
    \    ```\n\n6.  由于没有为要添加的文档提供`_id`字段，`MongoId`实例会被自动添加。随后，可以使用`foreach`循环输出添加的`_id`字段值。\n\
    \n    ```\n    foreach ($batch as $doc) {\n    print 'Document _id: ';\n     \
    \ echo $doc['_id'].\"\\n\";\n    print '<br/>';\n    }\n    ```\n\n完整的`addDocumentBatch.php`脚本如下：\n\
    \n```\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    $batch=array();\n$doc1 = array(\n    \"name\" => \"MongoDB\",\n    \"type\" =>\
    \ \"database\",\n    \"count\" => 1,\n    \"info\" => (object)array(\"catalogId\"\
    \ => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly')\n);\n\n$batch[]=$doc1;\n\n$doc2 = array(\n    \"\
    name\" => \"MongoDB\",\n    \"type\" => \"database\",\n    \"count\" => 1,\n \
    \   \"info\" => (object)array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle\
    \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December\
    \ 2013',\"title\" => 'Quintessential and Collaborative',\"author\" => 'Tom Haunert')\n\
    );\n\n$batch[]=$doc2;\n$status=$collection->batchInsert($batch);\nvar_dump($status);\n\
    print '<br/>';\nforeach ($batch as $doc) {\nprint 'Document _id: ';\n  echo $doc['_id'].\"\
    \\n\";\nprint '<br/>';\n}\n\n}catch ( MongoConnectionException $e )\n{\n    echo\
    \ '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException\
    \ $e) {\n echo '<p>w option is set and the write has failed</p>';\n    exit();\n\
    \n}\n?>\n```\n\n7.  在浏览器中运行PHP脚本`addDocumentBatch.php`，URL为`http://localhost:8000/addDocumentBatch.php`。如[图3-14](#part0009.xhtml#Fig14)的输出所示，两个具有唯一id的文档被添加到了MongoDB的`catalog`集合中。\n\
    \n![9781484215999_Fig03-14.jpg](Images/image00491.jpeg)\n\n**[图3-14](#part0009.xhtml#_Fig14).\
    \ `addDocumentBatch.php`脚本的输出**\n\n8.  随后，在Mongo shell中调用`local`数据库中`catalog`集合的`find()`方法，以输出添加的文档。\n\
    \n    ```\n    >use local\n    >db.catalog.find()\n    ```\n\n如[图3-15](#part0009.xhtml#Fig15)所示，列出了添加的两个文档。\n\
    \n![9781484215999_Fig03-15.jpg](Images/image00492.jpeg)\n\n**[图3-15](#part0009.xhtml#_Fig15).\
    \ 在Mongo Shell中列出批量添加的文档**\n\n请不要删除`local`数据库中的`catalog`集合，因为下一节将使用批量添加的文本来演示如何查找文档。\n\
    \n## 查找单个文档\n\n`MongoCollection::findOne()`方法用于从集合中查找单个文档。`findOne()`方法返回一个由文档字段组成的数组。该方法接受一个`$query`参数、一个`$fields`参数（指定返回文档中要包含的字段）以及选项参数。即使未在`$fields`中指定，`_id`字段也会被返回。\n\
    \n```\nMongoCollection::findOne ([ array $query = array() [, array $fields = array()\
    \ [, array $options = array() ]]] )\n```"
  raw: "When the `addDocumentException.php` script is run in a browser (URL `http://localhost:8000/addDocumentException.php`)\
    \ the `MongoCursorException` exception is thrown as the same document is being\
    \ tried to be added twice. The exception is caught and an error message is output\
    \ as shown in [Figure 3-12](#part0009.xhtml#Fig12).\n\n![9781484215999_Fig03-12.jpg](Images/image00489.jpeg)\n\
    \n[Figure 3-12](#part0009.xhtml#_Fig12). Output from the addDocumentException.php\
    \ Script\n\nAdding Multiple Documents\n\nIn the preceding section we added two\
    \ documents using two separate invocations of the `insert()` method. The `insert()`\
    \ method invocations may also be made using a `while`, `do`-`while`, or `for`\
    \ loop.\n\n1.  Create a PHP script `addMultiple``Documents.php` in the document\
    \ root directory `C:\\php`. In a `try`-`catch` statement create an instance of\
    \ `MongoCollection` for a collection as before.\n\n```\n    $connection = new\
    \ MongoClient();\n    $collection=$connection->local->catalog;\n    ```\n\n2.\
    \  In a `for` loop add documents to the collection using the variable `$i` from\
    \ the `for` loop initializer in the `catalogId` field for the documents.\n\n```\n\
    \    for ($i = 1; $i <= 5; $i++)\n    {\n        $status=$collection->insert(array(\"\
    catalogId\" =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" =>\
    \ 'Oracle Publishing', \"edition\" => 'November December 2013'));\n    var_dump($status);\n\
    \    print '<br/>';\n    }\n    ```\n\nThe `addMultipleDocuments.php` script is\
    \ listed:\n\n```\n    <?php\n    try\n    {\n    $connection = new MongoClient();\n\
    \    $collection=$connection->local->catalog;\n    for ($i = 1; $i <= 5; $i++)\n\
    \    {\n        $status=$collection->insert(array(\"catalogId\" =>'catalog'.$i,\
    \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
    \ => 'November December 2013'));\n    var_dump($status);\n    print '<br/>';\n\
    \    }\n    }catch (MongoConnectionException $e)\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo '<p>w option is set and the write has failed</p>';\n        exit();\n\
    \    }\n    ?>\n    ```\n\n3.  Run the `addMultipleDocuments.php` script in a\
    \ browser with URL `http://localhost:8000/addMultipleDocuments.php` to add multiple\
    \ documents to the MongoDB collection. A status message gets output for each document\
    \ added as shown in [Figure 3-13](#part0009.xhtml#Fig13).\n\n![9781484215999_Fig03-13.jpg](Images/image00490.jpeg)\n\
    \n[Figure 3-13](#part0009.xhtml#_Fig13). Output from the addMultipleDocuments.php\
    \ Script\n\nAdding a Batch of Documents\n\nThe `MongoCollection::batchInsert()`\
    \ method may be used to add a batch of documents to a collection. The method syntax\
    \ is the same as the `insert` method.\n\n```\nMongoCollection::batchInsert ( array\
    \ $document [, array $options = array() ] )\n```\n\nThe difference from the `insert()`\
    \ method is that the first parameter `a` is of type array of arrays or objects\
    \ instead of array or object in the insert method. The `batchInsert()` method\
    \ returns an associative array instead of the array or `boolean` for the `insert`\
    \ method. The method supports one additional option, the `continueOnError` option,\
    \ which defaults to false. If set to true the bulk insert fails if insert for\
    \ one of the documents fails. Each of the documents in the array of documents\
    \ to be added in a batch must have a unique `_id`.\n\n1.  Create a PHP script\
    \ `addDocumentBatch.php` in the `C:\\php` directory. Create a `MongoCollection`\
    \ instance as before.\n\n```\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  Create an array to which the document arrays are to be added.\n\
    \n```\n    $batch=array();\n    ```\n\n3.  Create a document array and add the\
    \ array to the `$batch` array.\n\n```\n    $doc1 = array(\n        \"name\" =>\
    \ \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n \
    \       \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" =>\
    \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David\
    \ A. Kelly')\n    );\n\n$batch[]=$doc1;\n    ```\n\n4.  Similarly add another\
    \ document to the batch array. The `$doc2` is declared in the `addDocumentBatch.php`\
    \ script listing.\n\n```\n    $batch[]=$doc2;\n    ```\n\n5.  Invoke the `batchInsert`\
    \ method with the `$batch` array as arg.\n\n```\n    $status=$collection->batchInsert($batch);\n\
    \    var_dump($status);\n    ```\n\n6.  As the `_id` fields for the documents\
    \ to be added are not provided the `MongoId` instances are added automatically.\
    \ Subsequently the `_id` field values added may be output in a `foreach` loop.\n\
    \n```\n    foreach ($batch as $doc) {\n    print 'Document _id: ';\n      echo\
    \ $doc['_id'].\"\\n\";\n    print '<br/>';\n    }\n    ```\n\nThe `addDocumentBatch.php`\
    \ script is listed.\n\n```\n    <?php\n    try\n    {\n    $connection = new MongoClient();\n\
    \    $collection=$connection->local->catalog;\n    $batch=array();\n    $doc1\
    \ = array(\n        \"name\" => \"MongoDB\",\n        \"type\" => \"database\"\
    ,\n        \"count\" => 1,\n        \"info\" => (object)array(\"catalogId\" =>\
    \ 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly')\n    );\n\n$batch[]=$doc1;\n\n$doc2 = array(\n \
    \       \"name\" => \"MongoDB\",\n        \"type\" => \"database\",\n        \"\
    count\" => 1,\n        \"info\" => (object)array(\"catalogId\" => 'catalog2',\
    \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
    \ => 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert')\n    );\n\n$batch[]=$doc2;\n    $status=$collection->batchInsert($batch);\n\
    \    var_dump($status);\n    print '<br/>';\n    foreach ($batch as $doc) {\n\
    \    print 'Document _id: ';\n      echo $doc['_id'].\"\\n\";\n    print '<br/>';\n\
    \    }\n\n}catch ( MongoConnectionException $e )\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo '<p>w option is set and the write has failed</p>';\n        exit();\n\
    \n}\n    ?>\n    ```\n\n7.  Run the PHP script `addDocumentBatch.php` in the browser\
    \ with URL `http://localhost:8000/addDocumentBatch.php`. As indicated by the output\
    \ in [Figure 3-14](#part0009.xhtml#Fig14), two documents with unique ids get added\
    \ to MongoDB collection `catalog`.\n\n![9781484215999_Fig03-14.jpg](Images/image00491.jpeg)\n\
    \n[Figure 3-14](#part0009.xhtml#_Fig14). Output from the addDocumentBatch.php\
    \ Script\n\n8.  Subsequently invoke the `find()` method for the `catalog` collection\
    \ in local database in the Mongo shell to output the documents added.\n\n```\n\
    \    >use local\n    >db.catalog.find()\n    ```\n\nThe two documents added get\
    \ listed as shown in [Figure 3-15](#part0009.xhtml#Fig15).\n\n![9781484215999_Fig03-15.jpg](Images/image00492.jpeg)\n\
    \n[Figure 3-15](#part0009.xhtml#_Fig15). Listing Documents Added in a Batch in\
    \ Mongo Shell\n\nDo not delete the `catalog` collection in the local database\
    \ as the documents added in a batch shall be used to demonstrate finding a document\
    \ in the next section.\n\nFinding a Single Document\n\nThe `MongoCollection::findOne()`\
    \ method is used to find a single document from a collection. The `findOne()`\
    \ method returns an array consisting of the fields of the document. The method\
    \ takes as parameters a `$query`, and the `$fields` to include in the document\
    \ returned, and options. The `_id` field is returned even if not specified in\
    \ `$fields`.\n\n```\nMongoCollection::findOne ([ array $query = array() [, array\
    \ $fields = array() [, array $options = array() ]]] )\n```"
  trans: "# 使用 MongoDB PHP 库操作文档\n\n## 捕获重复插入异常\n\n当在浏览器中运行`addDocumentException.php`脚本时（URL\
    \ 为`http://localhost:8000/addDocumentException.php`），由于尝试添加重复的文档，会抛出`MongoCursorException`异常。该异常被捕获并输出错误信息，如图\
    \ 3-12 所示。\n\n![9781484215999_Fig03-12.jpg](img/image00489.jpeg)\n\n**图 3-12.\
    \ `addDocumentException.php`脚本的输出**\n\n## 添加多个文档\n\n在上一节中，我们使用两次单独的`insert()`方法调用添加了两个文档。`insert()`方法调用也可以使用`while`、`do`-`while`或`for`循环来完成。\n\
    \n1.  在文档根目录`C:\\php`中创建一个 PHP 脚本`addMultipleDocuments.php`。在`try`-`catch`语句中，像之前一样为集合创建一个`MongoCollection`实例。\n\
    \n    ```\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  在一个`for`循环中，使用循环初始化器中的变量`$i`作为文档的`catalogId`字段值，向集合添加文档。\n\n \
    \   ```\n    for ($i = 1; $i <= 5; $i++)\n    {\n        $status=$collection->insert(array(\"\
    catalogId\" =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" =>\
    \ 'Oracle Publishing', \"edition\" => 'November December 2013'));\n    var_dump($status);\n\
    \    print '<br/>';\n    }\n    ```\n\n完整的`addMultipleDocuments.php`脚本如下：\n\n\
    ```\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    for ($i = 1; $i <= 5; $i++)\n{\n    $status=$collection->insert(array(\"catalogId\"\
    \ =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013'));\nvar_dump($status);\nprint '<br/>';\n\
    }\n}catch (MongoConnectionException $e)\n{\n    echo '<p>Couldn\\'t connect to\
    \ mongodb</p>';\n    exit();\n}catch(MongoCursorException $e) {\n echo '<p>w option\
    \ is set and the write has failed</p>';\n    exit();\n}\n?>\n```\n\n3.  在浏览器中运行`addMultipleDocuments.php`脚本，URL\
    \ 为`http://localhost:8000/addMultipleDocuments.php`，以向 MongoDB 集合添加多个文档。每添加一个文档，都会输出一条状态信息，如图\
    \ 3-13 所示。\n\n![9781484215999_Fig03-13.jpg](img/image00490.jpeg)\n\n**图 3-13.\
    \ `addMultipleDocuments.php`脚本的输出**\n\n## 批量添加文档\n\n`MongoCollection::batchInsert()`方法可用于向集合批量添加文档。该方法的语法与`insert`方法相同。\n\
    \n```\nMongoCollection::batchInsert ( array $document [, array $options = array()\
    \ ] )\n```\n\n与`insert()`方法的区别在于，其第一个参数是数组的数组或对象，而`insert`方法中是数组或对象。`batchInsert()`方法返回一个关联数组，而`insert`方法返回数组或`boolean`值。该方法支持一个额外的选项`continueOnError`，默认值为\
    \ false。如果设置为 true，当其中一个文档插入失败时，批量插入会失败。要批量添加的文档数组中的每个文档都必须有一个唯一的`_id`。\n\n1.\
    \  在`C:\\php`目录中创建一个 PHP 脚本`addDocumentBatch.php`。像之前一样创建一个`MongoCollection`实例。\n\
    \n    ```\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  创建一个用于存放文档数组的数组。\n\n    ```\n    $batch=array();\n    ```\n\n\
    3.  创建一个文档数组，并将其添加到`$batch`数组中。\n\n    ```\n    $doc1 = array(\n        \"name\"\
    \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
    \        \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" =>\
    \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David\
    \ A. Kelly')\n    );\n\n    $batch[]=$doc1;\n    ```\n\n4.  同样地，将另一个文档添加到批量数组中。`$doc2`在`addDocumentBatch.php`脚本列表中声明。\n\
    \n    ```\n    $batch[]=$doc2;\n    ```\n\n5.  使用`$batch`数组作为参数调用`batchInsert`方法。\n\
    \n    ```\n    $status=$collection->batchInsert($batch);\n    var_dump($status);\n\
    \    ```\n\n6.  由于没有为要添加的文档提供`_id`字段，`MongoId`实例会被自动添加。随后，可以使用`foreach`循环输出添加的`_id`字段值。\n\
    \n    ```\n    foreach ($batch as $doc) {\n    print 'Document _id: ';\n     \
    \ echo $doc['_id'].\"\\n\";\n    print '<br/>';\n    }\n    ```\n\n完整的`addDocumentBatch.php`脚本如下：\n\
    \n```\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    $batch=array();\n$doc1 = array(\n    \"name\" => \"MongoDB\",\n    \"type\" =>\
    \ \"database\",\n    \"count\" => 1,\n    \"info\" => (object)array(\"catalogId\"\
    \ => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly')\n);\n\n$batch[]=$doc1;\n\n$doc2 = array(\n    \"\
    name\" => \"MongoDB\",\n    \"type\" => \"database\",\n    \"count\" => 1,\n \
    \   \"info\" => (object)array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle\
    \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December\
    \ 2013',\"title\" => 'Quintessential and Collaborative',\"author\" => 'Tom Haunert')\n\
    );\n\n$batch[]=$doc2;\n$status=$collection->batchInsert($batch);\nvar_dump($status);\n\
    print '<br/>';\nforeach ($batch as $doc) {\nprint 'Document _id: ';\n  echo $doc['_id'].\"\
    \\n\";\nprint '<br/>';\n}\n\n}catch ( MongoConnectionException $e )\n{\n    echo\
    \ '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException\
    \ $e) {\n echo '<p>w option is set and the write has failed</p>';\n    exit();\n\
    \n}\n?>\n```\n\n7.  在浏览器中运行 PHP 脚本`addDocumentBatch.php`，URL 为`http://localhost:8000/addDocumentBatch.php`。如图\
    \ 3-14 的输出所示，两个具有唯一 id 的文档被添加到了 MongoDB 的`catalog`集合中。\n\n![9781484215999_Fig03-14.jpg](img/image00491.jpeg)\n\
    \n**图 3-14. `addDocumentBatch.php`脚本的输出**\n\n8.  随后，在 Mongo shell 中调用`local`数据库中`catalog`集合的`find()`方法，以输出添加的文档。\n\
    \n    ```\n    >use local\n    >db.catalog.find()\n    ```\n\n如图 3-15 所示，列出了添加的两个文档。\n\
    \n![9781484215999_Fig03-15.jpg](img/image00492.jpeg)\n\n**图 3-15. 在 Mongo Shell\
    \ 中列出批量添加的文档**\n\n请不要删除`local`数据库中的`catalog`集合，因为下一节将使用批量添加的文本来演示如何查找文档。\n\n##\
    \ 查找单个文档\n\n`MongoCollection::findOne()`方法用于从集合中查找单个文档。`findOne()`方法返回一个由文档字段组成的数组。该方法接受一个`$query`参数、一个`$fields`参数（指定返回文档中要包含的字段）以及选项参数。即使未在`$fields`中指定，`_id`字段也会被返回。\n\
    \n```\nMongoCollection::findOne ([ array $query = array() [, array $fields = array()\
    \ [, array $options = array() ]]] )\n```"
- fmt: "# 使用 `findOne()` 和 `find()` 查找文档\n\n`findOne()` 方法用于查找单个文档。所有参数都是可选的，如果未指定任何参数，则返回集合中的第一个文档。只支持一个选项\
    \ `maxTimeMS`，它是处理该方法的累计时间限制（毫秒），不包括空闲时间。如果方法未在指定时间内完成，则抛出 `MongoExecutionTimeoutException`。如果未与\
    \ MongoDB 服务器建立连接，则抛出 `MongoConnectionException`。\n\n## 使用 `findOne()` 查找单个文档\n\
    \n1.  在 `C:\\php` 目录中创建一个 PHP 脚本 `findDocument.php`。在 `try`-`catch` 语句中，创建一个 `MongoClient`\
    \ 实例，并使用该连接为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n\
    \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  在 `MongoCollection` 实例上调用 `findOne()` 方法以查找单个文档。找到的第一个文档将被返回，对于不同的用户可能不同。\n\
    \n    ```\n    $document = $collection->findOne();\n    var_dump($document);\n\
    \    ```\n\n3.  可以通过指定传递给 `findOne()` 方法的数组中的 `_id` 字段来查找特定文档。`_id` 字段值使用 `MongoId`\
    \ 类构造函数构建。`_id` 字段值对于不同的用户会有所不同。\n\n    ```\n    $document = $collection->findOne(array('_id'\
    \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\n    var_dump($document);\n\
    \    ```\n\n`findDocument.php` 脚本如下：\n\n```\n<?php\ntry\n{\n$connection = new\
    \ MongoClient();\n$collection=$connection->local->catalog;\n\n$document = $collection->findOne();\n\
    var_dump($document);\nprint '<br/>';\n$document = $collection->findOne(array('_id'\
    \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\nvar_dump($document);\nprint\
    \ '<br/>';\n\n}catch ( MongoConnectionException $e )\n{\n    echo '<p>Couldn\\\
    't connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException $e) {\n\
    \ echo '<p>w option is set and the write has failed</p>';\n    exit();\n}\n?>\n\
    ```\n\n4.  在浏览器中使用 URL `http://localhost:8000/findDocument.php` 运行 PHP 脚本。浏览器中会显示两个文档，如\
    \ [Figure 3-16](#part0009.xhtml#Fig16) 所示。\n\n![9781484215999_Fig03-16.jpg](Images/image00493.jpeg)\n\
    \n[Figure 3-16](#part0009.xhtml#_Fig16). Finding a Single Document with findOne()\n\
    \n同样，不要删除 `local` 数据库中的 `catalog` 集合，因为将在下一节中使用批量添加的文档来演示查找文档。\n\n## 查找所有文档\n\n\
    `MongoCollection::find()` 方法用于查找匹配指定查询的所有文档。该方法语法接受两个参数 `$query` 和 `$fields`，均为数组类型且均为可选。`_id`\
    \ 字段总是会被返回。如果未指定查询，则返回所有文档。`find()` 方法返回一个游标，由 `MongoCursor` 实例表示，该游标位于数据库查询的结果集之上。\n\
    \n```\nMongoCursor MongoCollection::find ([ array $query = array() [, array $fields\
    \ = array() ]] )\n```\n\n1.  在 `C:\\php` 目录中创建一个 PHP 脚本 `findAllDocuments.php`。在\
    \ `try`-`catch` 语句中创建一个 `MongoClient` 实例，它表示与 MongoDB 服务器的连接。为 `local` 数据库中的 `catalog`\
    \ 集合创建一个 `MongoCollection` 实例。\n\n    ```\n    $connection = new MongoClient();\
    \ \n    $collection=$connection->local->catalog;\n    ```\n\n2.  在 `MongoCollection`\
    \ 实例上调用 `find()` 方法，并使用 `iterator_to_array` 方法将返回的游标转换为数组。\n\n    ```\n    $cursor\
    \ = $collection->find();\n    var_dump(iterator_to_array($cursor));\n    ```\n\
    \n3.  也可以使用 `foreach` 循环来遍历数据库查询的结果集。例如，输出 `_id` 和 `catalogId` 字段值，如下所示。\n\n \
    \   ```\n    foreach ($cursor as $doc) {\n         var_dump($doc[\"_id\"]);\n\
    \    print '<br/>';\n    var_dump($doc[\"info\"][\"catalogId\"]);\n    }\n   \
    \ ```\n\n`findAllDocuments.php` 脚本如下：\n\n```\n<?php\ntry\n{\n$connection = new\
    \ MongoClient();\n$collection=$connection->local->catalog;\nprint 'Number of Documents:\
    \ ';\nvar_dump($collection->count());\nprint '<br/>';\n\n$cursor = $collection->find();\n\
    var_dump(iterator_to_array($cursor));\nprint '<br/>';\nforeach ($cursor as $doc)\
    \ {\n     var_dump($doc[\"_id\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"\
    catalogId\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"journal\"]);\nprint\
    \ '<br/>';\nvar_dump($doc[\"info\"][\"publisher\"]);\nprint '<br/>';\nvar_dump($doc[\"\
    info\"][\"edition\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"title\"]);\n\
    print '<br/>';\nvar_dump($doc[\"info\"][\"author\"]);\nprint '<br/>';\n}\n}catch\
    \ ( MongoConnectionException $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n\
    \    exit();\n}catch(MongoCursorException $e) {\n echo '<p>w option is set and\
    \ the write has failed</p>';\n    exit();\n\n}\n?>\n```\n\n4.  在浏览器中使用 URL `http://localhost:8000/findAllDocuments.php`\
    \ 运行 PHP 脚本。`local` 数据库中 `catalog` 集合的所有文档都将显示出来。每个文档的字段值也会显示，如 [Figure 3-17](#part0009.xhtml#Fig17)\
    \ 所示。\n\n![9781484215999_Fig03-17.jpg](Images/image00494.jpeg)\n\n[Figure 3-17](#part0009.xhtml#_Fig17).\
    \ Finding All Documents with find()\n\n## 查找字段和文档的子集\n\n`find()` 方法接受两个数组类型的参数\
    \ `$query` 和 `$fields`，两者都是可选的。为了从文档子集中选择字段子集，可以指定两者的参数值。\n\n1.  首先，使用以下脚本 `addDocumentSet.php`\
    \ 在 `C:\\php` 目录中添加一个文档集合。\n\n    ```\n    <?php\n    try\n    {\n    $connection\
    \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    $doc\
    \ = array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Engineering as a\n    Service',\"author\" => 'David A. Kelly');\n    $status=$collection->insert($doc);\n\
    \    var_dump($status);\n    print '<br/>';\n    $doc = array(\"catalogId\" =>\
    \ 'catalog2', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert');\n    $status=$collection->insert($doc);\n    var_dump($status);\n\
    \    }catch ( MongoConnectionException $e )\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo '<p>w option is set and the write has failed</p>';\n      \
    \  exit();\n\n}\n     ?>\n    ```\n\n2.  将脚本复制到 `C:\\php` 目录，并使用 URL `http://localhost:8000/addDocumentSet.php`\
    \ 运行。\n3.  创建另一个 PHP 脚本 `findDocumentSet.php`，放在 `C:\\php` 目录中，用于查找字段和文档的子集。\n\
    4.  像之前一样，为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n\
    \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n5.  指定要查找文档的 key=>value 对数组。例如，选择所有 `catalogId` 为 `catalog1` 的文档。\n\
    \n    ```\n    $query = array('catalogId'=>'catalog1');\n    ```\n\n6.  指定要从找到的文档中选择的字段数组。例如，选择\
    \ `title` 和 `author` 字段。\n\n    ```\n    $fields = array('title' => true, 'author'\
    \ => true);\n    ```\n\n7.  使用 `$query` 和 `$fields` 参数调用 `find()` 方法，以获得结果集上的游标。\n\
    \n    ```\n    $cursor = $collection->find($query, $fields);\n    ```\n\n8.  使用\
    \ `while` 循环遍历结果以输出返回的文档字段。`MongoCursor` 中的 `hasNext()` 方法将光标移动到下一个文档，`getNext()`\
    \ 方法获取下一个文档。"
  raw: "All parameters are optional and if none are specified the first document from\
    \ the collection is returned. Only one option is supported, `maxTimeMS`, which\
    \ is the cumulative time limit in ms for processing the method not including the\
    \ idle time. If the method does not complete in specified time a `MongoExecutionTimeoutException`\
    \ is thrown. The `MongoConnectionException` is thrown if a connection with the\
    \ MongoDB server is not established.\n\n1.  Create a PHP script `findDocument.php`\
    \ in the `C:\\php` directory. In a `try`-`catch` statement, create a `MongoClient`\
    \ instance and using the connection create a `MongoCollection` instance for the\
    \ `catalog` collection in the `local` database.\n\n```\n    $connection = new\
    \ MongoClient();\n    $collection=$connection->local->catalog;\n    ```\n\n2.\
    \  Invoke the `findOne()` method on the `MongoCollection` instance to find a single\
    \ document. The first document found is returned and could be different for different\
    \ users.\n\n```\n    $document = $collection->findOne();\n    var_dump($document);\n\
    \    ```\n\n3.  A specific document may be found by specifying the `_id` field\
    \ in the array supplied to the `findOne()` method. The `_id` field value is constructed\
    \ using the `MongoId` class constructor. The `_id` field value would be different\
    \ for different users.\n\n```\n    $document = $collection->findOne(array('_id'\
    \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\n    var_dump($document);\n\
    \    ```\n\nThe PHP script `findDocument.php` is listed:\n\n```\n    <?php\n \
    \   try\n    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \n$document = $collection->findOne();\n    var_dump($document);\n    print '<br/>';\n\
    \    $document = $collection->findOne(array('_id' => new MongoId(\"55bcf87a098c6ec80b00002a\"\
    )));\n    var_dump($document);\n    print '<br/>';\n\n}catch ( MongoConnectionException\
    \ $e )\n    {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n\
    \    }catch(MongoCursorException $e) {\n     echo '<p>w option is set and the\
    \ write has failed</p>';\n        exit();\n    }\n    ?>\n    ```\n\n4.  Run the\
    \ PHP script in a browser with the URL `http://localhost:8000/findDocument.php`.\
    \ Two documents get displayed in the browser as shown in [Figure 3-16](#part0009.xhtml#Fig16).\n\
    \n![9781484215999_Fig03-16.jpg](Images/image00493.jpeg)\n\n[Figure 3-16](#part0009.xhtml#_Fig16).\
    \ Finding a Single Document with findOne()\n\nAgain, do not delete the `catalog`\
    \ collection in the local database as the documents added in batches shall be\
    \ used to demonstrate finding documents in the next section.\n\nFinding All Documents\n\
    \nThe `MongoCollection::find()` method is used to find all documents that match\
    \ a specified query. The method syntax takes two parameters, `$query` and `$fields`,\
    \ both of type array and both optional. The `_id` field is always returned. If\
    \ a query is not specified all documents are returned. The `find()` method returns\
    \ a cursor, represented by a `MongoCursor` instance, over the result set of the\
    \ database query.\n\n```\nMongoCursor MongoCollection::find ([ array $query = array()\
    \ [, array $fields = array() ]] )\n```\n\n1.  Create a PHP script `findAllDocuments.php`\
    \ in the `C:\\php` directory. In a `try`-`catch` statement create a `MongoClient`\
    \ instance, which represents a connection with the MongoDB server. Create a `MongoCollection`\
    \ instance for the `catalog` collection in the `local` database.\n\n```\n    $connection\
    \ = new MongoClient(); \n    $collection=$connection->local->catalog;\n    ```\n\
    \n2.  Invoke the `find()` method on the `MongoCollection` instance and use the\
    \ `iterator_to_array` method to convert the cursor returned to an array.\n\n```\n\
    \    $cursor = $collection->find();\n    var_dump(iterator_to_array($cursor));\n\
    \    ```\n\n3.  The `foreach` loop may also be used to iterate over the result\
    \ set of the database query. For example the `_id` and `catalogId` field values\
    \ are output as follows.\n\n```\n    foreach ($cursor as $doc) {\n         var_dump($doc[\"\
    _id\"]);\n    print '<br/>';\n    var_dump($doc[\"info\"][\"catalogId\"]);\n \
    \   }\n    ```\n\nThe `findAllDocuments.php` script is listed:\n\n```\n    <?php\n\
    \    try\n    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    print 'Number of Documents: ';\n    var_dump($collection->count());\n   \
    \ print '<br/>';\n\n$cursor = $collection->find();\n    var_dump(iterator_to_array($cursor));\n\
    \    print '<br/>';\n    foreach ($cursor as $doc) {\n         var_dump($doc[\"\
    _id\"]);\n    print '<br/>';\n    var_dump($doc[\"info\"][\"catalogId\"]);\n \
    \   print '<br/>';\n    var_dump($doc[\"info\"][\"journal\"]);\n    print '<br/>';\n\
    \    var_dump($doc[\"info\"][\"publisher\"]);\n    print '<br/>';\n    var_dump($doc[\"\
    info\"][\"edition\"]);\n    print '<br/>';\n    var_dump($doc[\"info\"][\"title\"\
    ]);\n    print '<br/>';\n    var_dump($doc[\"info\"][\"author\"]);\n    print\
    \ '<br/>';\n    }\n    }catch ( MongoConnectionException $e )\n    {\n        echo\
    \ '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo '<p>w option is set and the write has failed</p>';\n        exit();\n\
    \n}\n    ?>\n    ```\n\n4.  Run the PHP script in a browser with the URL `http://localhost:8000/findAllDocuments.php`.\
    \ All the documents in the `catalog` collection in the `local` database get displayed.\
    \ The field values for each of the documents also get displayed as shown in [Figure\
    \ 3-17](#part0009.xhtml#Fig17).\n\n![9781484215999_Fig03-17.jpg](Images/image00494.jpeg)\n\
    \n[Figure 3-17](#part0009.xhtml#_Fig17). Finding All Documents with find()\n\n\
    Finding a Subset of Fields and Documents\n\nThe `find()` method takes two parameters\
    \ of type array, `$query` and `$fields`, both of which are optional. To select\
    \ a subset of fields from a subset of documents parameter values for both may\
    \ be specified.\n\n1.  First, add a document set using the following script, `addDocumentSet.php`\
    \ in the `C:\\php` directory.\n\n```\n    <?php\n    try\n    {\n    $connection\
    \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    $doc\
    \ = array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Engineering as a\n    Service',\"author\" => 'David A. Kelly');\n    $status=$collection->insert($doc);\n\
    \    var_dump($status);\n    print '<br/>';\n    $doc = array(\"catalogId\" =>\
    \ 'catalog2', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert');\n    $status=$collection->insert($doc);\n    var_dump($status);\n\
    \    }catch ( MongoConnectionException $e )\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo '<p>w option is set and the write has failed</p>';\n        exit();\n\
    \n}\n     ?>\n    ```\n\n2.  Copy the script to the `C:\\php` directory and run\
    \ with URL `http://localhost:8000/addDocumentSet.php`.\n3.  Create another PHP\
    \ script, `findDocumentSet.php`, in the `C:\\php` directory to find a subset of\
    \ fields and documents.\n4.  Create a `MongoCollection` instance for `catalog`\
    \ collection in the `local` database as before.\n\n```\n    $connection = new\
    \ MongoClient();\n    $collection=$connection->local->catalog;\n    ```\n\n5.\
    \  Specify the array of key=>value pairs for which documents are to be found.\
    \ As an example select all documents with `catalogId` as `catalog1`.\n\n```\n\
    \    $query = array('catalogId'=>'catalog1');\n    ```\n\n6.  Specify an array\
    \ of fields to select from the document/s found. As an example select the `title`\
    \ and `author` fields.\n\n```\n    $fields = array('title' => true, 'author' =>\
    \ true);\n    ```\n\n7.  Invoke the `find()` method using the `$query` and `$fields`\
    \ args to get a cursor over the result set.\n\n```\n    $cursor = $collection->find($query,\
    \ $fields);\n    ```\n\n8.  Using a `while` loop iterate over the result to output\
    \ the document fields returned. The `hasNext()` method in `MongoCursor` moves\
    \ the cursor to the next document and the `getNext()` method gets the next document."
  trans: "\n# 使用 `findOne()` 和 `find()` 查找文档\n\n`findOne()` 方法用于查找单个文档。所有参数都是可选的，如果未指定任何参数，则返回集合中的第一个文档。只支持一个选项\
    \ `maxTimeMS`，它是处理该方法的累计时间限制（毫秒），不包括空闲时间。如果方法未在指定时间内完成，则抛出 `MongoExecutionTimeoutException`。如果未与\
    \ MongoDB 服务器建立连接，则抛出 `MongoConnectionException`。\n\n## 使用 `findOne()` 查找单个文档\n\
    \n1.  在 `C:\\php` 目录中创建一个 PHP 脚本 `findDocument.php`。在 `try`-`catch` 语句中，创建一个 `MongoClient`\
    \ 实例，并使用该连接为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n\
    \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  在 `MongoCollection` 实例上调用 `findOne()` 方法以查找单个文档。找到的第一个文档将被返回，对于不同的用户可能不同。\n\
    \n    ```\n    $document = $collection->findOne();\n    var_dump($document);\n\
    \    ```\n\n3.  可以通过指定传递给 `findOne()` 方法的数组中的 `_id` 字段来查找特定文档。`_id` 字段值使用 `MongoId`\
    \ 类构造函数构建。`_id` 字段值对于不同的用户会有所不同。\n\n    ```\n    $document = $collection->findOne(array('_id'\
    \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\n    var_dump($document);\n\
    \    ```\n\n`findDocument.php` 脚本如下：\n\n```\n<?php\ntry\n{\n$connection = new\
    \ MongoClient();\n$collection=$connection->local->catalog;\n\n$document = $collection->findOne();\n\
    var_dump($document);\nprint '<br/>';\n$document = $collection->findOne(array('_id'\
    \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\nvar_dump($document);\nprint\
    \ '<br/>';\n\n}catch ( MongoConnectionException $e )\n{\n    echo '<p>Couldn\\\
    't connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException $e) {\n\
    \ echo '<p>w option is set and the write has failed</p>';\n    exit();\n}\n?>\n\
    ```\n\n4.  在浏览器中使用 URL `http://localhost:8000/findDocument.php` 运行 PHP 脚本。浏览器中会显示两个文档，如\
    \ 图 3-16 所示。\n\n![9781484215999_Fig03-16.jpg](img/image00493.jpeg)\n\n图 3-16.\
    \ 使用 findOne() 查找单个文档\n\n同样，不要删除 `local` 数据库中的 `catalog` 集合，因为将在下一节中使用批量添加的文档来演示查找文档。\n\
    \n## 查找所有文档\n\n`MongoCollection::find()` 方法用于查找匹配指定查询的所有文档。该方法语法接受两个参数 `$query`\
    \ 和 `$fields`，均为数组类型且均为可选。`_id` 字段总是会被返回。如果未指定查询，则返回所有文档。`find()` 方法返回一个游标，由 `MongoCursor`\
    \ 实例表示，该游标位于数据库查询的结果集之上。\n\n```\nMongoCursor MongoCollection::find ([ array $query\
    \ = array() [, array $fields = array() ]] )\n```\n\n1.  在 `C:\\php` 目录中创建一个 PHP\
    \ 脚本 `findAllDocuments.php`。在 `try`-`catch` 语句中创建一个 `MongoClient` 实例，它表示与 MongoDB\
    \ 服务器的连接。为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n \
    \   $connection = new MongoClient(); \n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  在 `MongoCollection` 实例上调用 `find()` 方法，并使用 `iterator_to_array`\
    \ 方法将返回的游标转换为数组。\n\n    ```\n    $cursor = $collection->find();\n    var_dump(iterator_to_array($cursor));\n\
    \    ```\n\n3.  也可以使用 `foreach` 循环来遍历数据库查询的结果集。例如，输出 `_id` 和 `catalogId` 字段值，如下所示。\n\
    \n    ```\n    foreach ($cursor as $doc) {\n         var_dump($doc[\"_id\"]);\n\
    \    print '<br/>';\n    var_dump($doc[\"info\"][\"catalogId\"]);\n    }\n   \
    \ ```\n\n`findAllDocuments.php` 脚本如下：\n\n```\n<?php\ntry\n{\n$connection = new\
    \ MongoClient();\n$collection=$connection->local->catalog;\nprint 'Number of Documents:\
    \ ';\nvar_dump($collection->count());\nprint '<br/>';\n\n$cursor = $collection->find();\n\
    var_dump(iterator_to_array($cursor));\nprint '<br/>';\nforeach ($cursor as $doc)\
    \ {\n     var_dump($doc[\"_id\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"\
    catalogId\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"journal\"]);\nprint\
    \ '<br/>';\nvar_dump($doc[\"info\"][\"publisher\"]);\nprint '<br/>';\nvar_dump($doc[\"\
    info\"][\"edition\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"title\"]);\n\
    print '<br/>';\nvar_dump($doc[\"info\"][\"author\"]);\nprint '<br/>';\n}\n}catch\
    \ ( MongoConnectionException $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n\
    \    exit();\n}catch(MongoCursorException $e) {\n echo '<p>w option is set and\
    \ the write has failed</p>';\n    exit();\n\n}\n?>\n```\n\n4.  在浏览器中使用 URL `http://localhost:8000/findAllDocuments.php`\
    \ 运行 PHP 脚本。`local` 数据库中 `catalog` 集合的所有文档都将显示出来。每个文档的字段值也会显示，如 图 3-17 所示。\n\n\
    ![9781484215999_Fig03-17.jpg](img/image00494.jpeg)\n\n图 3-17. 使用 find() 查找所有文档\n\
    \n## 查找字段和文档的子集\n\n`find()` 方法接受两个数组类型的参数 `$query` 和 `$fields`，两者都是可选的。为了从文档子集中选择字段子集，可以指定两者的参数值。\n\
    \n1.  首先，使用以下脚本 `addDocumentSet.php` 在 `C:\\php` 目录中添加一个文档集合。\n\n    ```\n   \
    \ <?php\n    try\n    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    $doc = array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle Magazine',\
    \ \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December 2013',\"\
    title\" => 'Engineering as a\n    Service',\"author\" => 'David A. Kelly');\n\
    \    $status=$collection->insert($doc);\n    var_dump($status);\n    print '<br/>';\n\
    \    $doc = array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle Magazine',\
    \ \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December 2013',\"\
    title\" => 'Quintessential and Collaborative',\"author\" => 'Tom Haunert');\n\
    \    $status=$collection->insert($doc);\n    var_dump($status);\n    }catch (\
    \ MongoConnectionException $e )\n    {\n        echo '<p>Couldn\\'t connect to\
    \ mongodb</p>';\n        exit();\n    }catch(MongoCursorException $e) {\n    \
    \ echo '<p>w option is set and the write has failed</p>';\n        exit();\n\n\
    }\n     ?>\n    ```\n\n2.  将脚本复制到 `C:\\php` 目录，并使用 URL `http://localhost:8000/addDocumentSet.php`\
    \ 运行。\n3.  创建另一个 PHP 脚本 `findDocumentSet.php`，放在 `C:\\php` 目录中，用于查找字段和文档的子集。\n\
    4.  像之前一样，为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n\
    \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n5.  指定要查找文档的 key=>value 对数组。例如，选择所有 `catalogId` 为 `catalog1` 的文档。\n\
    \n    ```\n    $query = array('catalogId'=>'catalog1');\n    ```\n\n6.  指定要从找到的文档中选择的字段数组。例如，选择\
    \ `title` 和 `author` 字段。\n\n    ```\n    $fields = array('title' => true, 'author'\
    \ => true);\n    ```\n\n7.  使用 `$query` 和 `$fields` 参数调用 `find()` 方法，以获得结果集上的游标。\n\
    \n    ```\n    $cursor = $collection->find($query, $fields);\n    ```\n\n8.  使用\
    \ `while` 循环遍历结果以输出返回的文档字段。`MongoCursor` 中的 `hasNext()` 方法将光标移动到下一个文档，`getNext()`\
    \ 方法获取下一个文档。\n"
- fmt: "# 使用 MongoDB 查询与更新文档\n\n## 查询文档集合\n\n以下 PHP 代码演示了如何使用游标遍历查询结果：\n\n```php\n\
    \    while ($cursor->hasNext())\n    {\n        var_dump($cursor->getNext());\n\
    \    }\n    ?>\n```\n\n`findDocumentSet.php` 脚本如下：\n\n```php\n    <?php\n    try\n\
    \    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    $query = array('catalogId'=>'catalog1');\n    $fields = array('title' =>\
    \ true, 'author' => true);\n    $cursor = $collection->find($query, $fields);\n\
    \    while ($cursor->hasNext())\n    {\n        var_dump($cursor->getNext());\n\
    \    }\n    }catch (MongoConnectionException $e)\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo $e;\n        exit();\n    }\n    ?>\n```\n\n9.  在浏览器中运行 `findDocumentSet.php`\
    \ 脚本，URL 为 `http://localhost:8000/findDocumentSet.php`，将输出从选定文档中选择的字段，如 [Figure\
    \ 3-18](#part0009.xhtml#Fig18) 所示。\n\n![9781484215999_Fig03-18.jpg](Images/image00495.jpeg)\n\
    \n[Figure 3-18](#part0009.xhtml#_Fig18). 为文档子集查找字段子集\n\n10. 要选择所有文档，请按如下方式指定查询：\n\
    \n```php\n    $query = array();\n```\n\n当在浏览器中运行 `findDocumentSet.php` 脚本以选择所有文档时，将选择所有文档的选定字段，如\
    \ [Figure 3-19](#part0009.xhtml#Fig19) 所示。\n\n![9781484215999_Fig03-19.jpg](Images/image00496.jpeg)\n\
    \n[Figure 3-19](#part0009.xhtml#_Fig19). 为所有文档查找字段子集\n\n## 更新文档\n\n`MongoCollection::update()`\
    \ 方法用于根据指定条件更新一个或多个文档。如果设置了 `w` 选项，该方法返回一个状态数组，否则返回一个布尔值。该方法的语法接受 `$criteria`、`$new_object`\
    \ 和 `$options` 参数，均为数组类型。\n\n```\nMongoCollection::update ( array $criteria ,\
    \ array $new_object [, array $options = array() ] )\n```\n\n方法参数在 [Table 3-6](#part0009.xhtml#Tab6)\
    \ 中讨论。\n\n[Table 3-6](#part0009.xhtml#_Tab6). Update 方法的参数\n\n| Parameter | Description\
    \ |\n| --- | --- |\n| `$criteria` | 要更新的文档的查询条件。 |\n| `$new_object` | 如果新对象包含\
    \ key=>value 对，则为替换文档。或者，如果新对象包含更新操作符，则为要更新的特定字段。 |\n| `$options` | 主要选项是 `upsert`、`w.`\
    \ 和 `multiple`。如果 `upsert` 选项设置为 true，则在没有文档匹配条件时添加新文档。`upsert` 的默认值为 false。`w`\
    \ 的默认值为 1。如果 `multiple` 选项设置为 true，则更新多个文档。`multiple` 的默认值为 false。 |\n\n接下来，我们将更新一些文档。\n\
    \n1.  首先，我们需要添加要更新的文档。运行 `addDocumentBatch.php` 脚本，URL 为 `http://localhost:8000/addDocumentBatch.php`，如\
    \ [Figure 3-20](#part0009.xhtml#Fig20) 所示，向 `local` 数据库中的 `catalog` 集合添加两个文档。文档\
    \ `_id` 被输出。我们将使用这些 `_id` 值来更新文档。不同用户的 `_id` 值会不同。\n\n![9781484215999_Fig03-20.jpg](Images/image00497.jpeg)\n\
    \n[Figure 3-20](#part0009.xhtml#_Fig20). 添加一批文档\n\n2.  在 `C:\\php` 目录中创建 PHP 脚本\
    \ `updateDocument.php`。在 `try`-`catch` 语句中，使用 `MongoClient` 实例创建与 MongoDB 的连接。为\
    \ `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n```php\n    $connection\
    \ = new MongoClient();\n    $collection=$connection->local->catalog;\n```\n\n\
    3.  通过将数组中的 `_id` 字段设置为从 `53f3d425098c6e2410000065`（这是使用 `addDocumentBatch.php`\
    \ 添加到 `catalog` 集合的其中一个文档的 `_id`）构造的 `MongoId` 实例，来指定要更新文档的 `$criteria`。不同用户的\
    \ `_id` 值会不同。\n\n```php\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000043\
    \ \"));\n```\n\n4.  使用 key=>value 对为替换文档指定 `$new_object`。添加一个新字段 “updated” 并设置为\
    \ “true。”\n\n```php\n    $new_object = array(\"catalogId\" => 'catalog1', \"journal\"\
    \ => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"\
    title\" => 'Engineering As a Service',\"author\" => 'Kelly, David A.', \"updated\"\
    =>true);\n```\n\n5.  使用 `$criteria` 和 `$new_object` 调用 `update()` 方法，并使用一个 `upsert`\
    \ 设置为 `false` 的选项数组。\n\n```php\n    $status=$collection->update($criteria,$new_object,\
    \ array(\"upsert\" => false));\n    var_dump($status);\n```\n\n6.  类似地，更新另一个文档。\n\
    \n```php\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000044\"\
    ));\n    $new_object = array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle\
    \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"\
    title\" => 'Quintessential and Collaborative',\"author\" => 'Haunert, Tom', \"\
    updated\"=>true);\n    $status=$collection->update($criteria,$new_object, array(\"\
    upsert\" => false));\n    var_dump($status);\n```\n\n我们在前面的文档更新中将 `upsert` 选项设置为\
    \ false。接下来，我们将使用 `upsert` 选项设置为 true 来调用 `update` 方法。\n\n为了演示如果未找到符合 `$criteria`\
    \ 的文档，`upsert` 会添加新文档，请指定一个在数据库中不存在的 `_id` 的 `$criteria`。与 `updateDocument.php`\
    \ 脚本中一样，不同的用户可以使用相同的 `_id` 值。"
