    2013"); //DBObject          * dbObject = new BasicDBObject("_id", catalog1.getId());
    BasicQuery          * query = new BasicQuery(dbObject); // WriteResult result
    =          * ops.remove(query,Catalog.class); WriteResult result =          *
    ops.remove(query, "catalog"); System.out.println(result);          */          /*List<Catalog>
    list = ops.findAll(Catalog.class);         Iterator<Catalog> iter = list.iterator();
            while (iter.hasNext()) {             catalog = iter.next();             System.out.println("Journal
    : " + catalog.getJournal());             System.out.println("Publisher : " + catalog.getPublisher());
                System.out.println("Edition : " + catalog.getEdition());             System.out.println("Title
    : " + catalog.getTitle());             System.out.println("Author : " + catalog.getAuthor());
            }*/      }  } ```    Using Spring Data with MongoDB    Spring Data repositories
    are an abstraction that implement a data access layer over the underlying datastore.
    Spring Data repositories reduce the boilerplate code required to access a datastore.
    Spring Data repositories may be used with MongoDB data store.    To enable the
    Spring Data repositories infrastructure for MongoDB annotate the `JavaConfig`
    class with `@EnableMongoRepositories`. Annotate the `JavaConfig` class `SpringMongoApplicationConfig`
    class with `@EnableMongoRepositories("com.mongo.repositories")`. The `com.mongo.repositories`
    is the package to search for repositories. Specify the packages to scan for annotated
    components using the `@ComponentScan` annotation with the `basePackageClasses`
    element set to the service class `CatalogService.class`, which we shall develop
    later in this section. The package of each class specified in `basePackageClasses`
    is scanned. The modified class declaration for the `SpringMongoApplicationConfig`
    class is as follows.    ``` @Configuration @EnableMongoRepositories("com.mongo.repositories")
    @ComponentScan(basePackageClasses = {CatalogService.class}) public class SpringMongoApplicationConfig
    extends AbstractMongoConfiguration {  } ```    The central repository marker interface
    is `org.springframework.data.repository.Repository`, and it provides CRUD access
    on top of the entities. The entity class `Catalog` is defined earlier in the chapter.
    The generic interface for CRUD operations on a repository is `org.springframework.data.repository.CrudRepository`.
    The MongoDB server specific repository interface is `org.springframework.data.mongodb.repository`.
    `MongoRepository<T,ID extends Serializable>`, which extends the `CrudRepository`
    interface. The interface is parameterized over the domain type, which would be
    `Catalog` for the example, and ID type, which is `String` in the example. The
    ID extends the `java.io.Serializable` interface to be able to serialize the ID
    in the MongoDB server. Create an interface, `CatalogRepository`, which extends
    the parameterized type `MongoRepository<Catalog, String>`.


    The `CatalogRepository` represents the MongoDB specific repository interface to
    store entities of type `Catalog` and with Id of type `String` in MongoDB server.    ```
    package com.mongo.repositories; import org.springframework.data.mongodb.repository.MongoRepository;  import
    com.mongo.model.Catalog;  public interface CatalogRepository extends MongoRepository<Catalog,
    String> {  } ```    Create a service class `CatalogService` in which to access
    the repository instance from the context as follows.    ``` ApplicationContext
    context = new AnnotationConfigApplicationContext( SpringMongoApplicationConfig.class);
        CatalogRepository repository = context.getBean(CatalogRepository.class); ```    Subsequently,
    perform CRUD operations on the MongoDB document store using the `CatalogRepository`
    instance, which is declared as a class variable. Add the following ([Table 10-17](#part0016.xhtml#Tab17))
    methods to the `CatalogService` class for the CRUD operations. The methods names
    are same or similar to the `MongoRepository` methods’ names.    [Table 10-17](#part0016.xhtml#_Tab17).
    Methods in the CatalogService Class     | Method | Description | | --- | --- |
    | `count()` | Counts the number of documents in the repository. | | `findAll()`
    | Finds all the documents in the repository. | | `save()` | Saves a document to
    the repository. | | `saveBatch()` | Saves a batch of documents to the repository.
    | | `findOne(String id)` | Finds a single document in the repository. | | `deleteAll()`
    | Deletes all the documents in the repository. | | `deleteById()` | Deletes a
    document by Id. |    Add method invocations for each of the methods in the `main`
    method. To run the `CatalogService class` right-click on the `CatalogService.java`
    application in the Package Explorer and select Run As ![image](Images/image00406.jpeg)
    Java Application as shown in [Figure 10-22](#part0016.xhtml#Fig22).    ![9781484215999_Fig10-22.jpg](Images/image00683.jpeg)    [Figure
    10-22](#part0016.xhtml#_Fig22). Running CatalogService Application    We shall
    invoke each method separately and comment out the other methods when the `CatalogService.java`
    application is run.    Getting Document Count    The `MongoRepository<T,ID extends
    Serializable>` interface, which extends the `CrudRepository``<T,ID>` interface
    and provides CRUD operation methods. The `MongoRepository` interface also includes
    a `count()` method, which returns the number of entities stored in a collection.
    To be able to count entities, first create some entities using the `MongoOperations`
    instance as discussed earlier in the chapter. Run the `App` application to invoke
    the `addDocumentBatch()` method to add some documents. Invoke the `count()` method
    using the `CatalogRepository` instance and output the long value returned.    ```
    public static void count() {         System.out.println("Number of documents:
    " + repository.count());      } ```    The output in the Eclipse Console in [Figure
    10-23](#part0016.xhtml#Fig23) shows that the number of document entities stored
    is 2.    ![9781484215999_Fig10-23.jpg](Images/image00684.jpeg)    [Figure 10-23](#part0016.xhtml#_Fig23).
    Outputting Document Count    Finding Entities from Repository    The `MongoRepository`
    interface provides the following ([Table 10-18](#part0016.xhtml#Tab18)) methods
    for finding documents from repository.    [Table 10-18](#part0016.xhtml#_Tab18).
    MongoRepository Methods for Finding Documents     | Method | Description | | ---
    | --- | | `T` findOne(`ID` `id)` | Returns the entity instance for the specified
    ID. | | `Iterable``<`T> findAll() | Returns all entities of the entity type specified
    in the repository. | | `Iterable``<`T> findAll(`Iterable``<`ID> ids) | Returns
    all entities of an entity type for the given IDs. | | `findAll(Sort sort)` | Returns
    all entities sorted by the given options.'
