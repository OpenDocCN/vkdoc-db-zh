    `Technologies` ![image](Images/image00406.jpeg) `Hive`，如[图 12-27](#part0018.xhtml#Fig27)所示。


    ![9781484215999_Fig12-27.jpg](Images/image00734.jpeg)

    [图 12-27](#part0018.xhtml#_Fig27). 选择 `Logical Architecture` ![image](Images/image00406.jpeg)
    `Technologies` ![image](Images/image00406.jpeg) `Hive`


