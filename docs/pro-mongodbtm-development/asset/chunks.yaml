    \   });\n    ```\n\n    `db.js` 脚本如下所示。\n\n    ```\n    MongoClient = require('mongodb').MongoClient;\n\
    \    Db = require('mongodb').Db;\n      var mongoclient = new MongoClient();\n\
    \     mongoclient.connect(\"mongodb://localhost:27017/local\", function(error,\
    \ db) {\n         if (error)\n             console.log(error);\n         else\n\
    \             console.log('Connected with MongoDB');\n    db.listCollections().toArray(function(err,\
    \ items) {\n            console.log(items);\n            db.close();\n       \
    \   });\n    });\n    ```\n6.  打开一个新的终端/窗口并导航到 `C:\\Program Files\\nodejs`。使用以下命令运行\
    \ `db.js` 脚本。\n\n    ```\n    >node db.js\n    ```\n\n本地数据库中不同的集合及其选项会被列出，如图 5-12\
    \ 所示。\n\n![9781484215999_Fig05-12.jpg](img/image00559.jpeg)\n\n图 5-12. 列出本地数据库中的集合\n\
    \n`Db()` 类构造函数创建新的数据库实例，但不会创建新的数据库，我们接下来将演示这一点。\n\n1.  使用相同的脚本 `db.js`，注释掉调用 `mongoclient.connect()`\
    \ 方法的代码段。为 `Server` 类添加一个 `require` 语句。\n\n    ```\n    Server = require('mongodb').Server;\n\
    \    ```\n2.  使用类构造函数 `new Db(databaseName, topology, options)` 创建新的 `Db` 实例，数据库名为\
    \ `'mongo'`，拓扑结构使用 `Server` 类创建，主机为 `localhost`，端口为 27017。\n\n    ```\n    var\
    \ db = new Db('mongo', new Server('localhost', 27017));\n    ```\n3.  使用 `open(callback)`\
    \ 方法打开与数据库的连接。`open()` 方法的回调类型是 `openCallback(error, db)`。如果产生错误则记录。如果打开成功，使用返回的\
    \ `Db` 实例输出集合列表。\n\n    ```\n    db.\n```\n"
