    \ |\n| `updateMulti(Query query, Update update, String collectionName)` | 使用给定的更新文档，更新在给定集合中使用给定查询找到的所有文档。\
    \ |\n\n接下来，我们将在 `App` 类的 `updateMulti()` 方法中更新 `catalog` 集合中的多个文档。\n\n1.  在 Mongo\
    \ shell 中使用 `db.catalog.drop()` 方法删除 `catalog` 集合。\n2.  使用 `createCatalogInstances()`\
    \ 方法创建新文档，并使用 `save()` 方法保存文档。\n3.  为查询文档创建 `BasicQuery` 对象。查询文档选择 `edition` 字段为\
