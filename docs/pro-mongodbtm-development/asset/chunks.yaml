    In the next chapter we shall use Spring Data with MongoDB.    CHAPTER 10    ![image](Images/image00404.jpeg)    Using
    Spring Data with MongoDB    Spring Data is designed for new data access technologies
    such as non-relational databases. MongoDB is a non-relational NoSQL database with
    benefits such as scalability, flexibility, and high performance. The Spring Data
    MongoDB project adds Spring Data functionality to the MongoDB server. This chapter
    explains how to use the Spring Data MongoDB project to access MongoDB and perform
    CRUD operations on the database in Eclipse. We shall use Maven as the build automation
    tool. The chapter includes the following topics:    *   Setting up the environment
    *   Creating a Maven project *   Installing Spring Data MongoDB *   Configuring
    JavaConfig *   Creating a model *   Using Spring Data with MongoDB with Template
    *   Using Spring Data repositories with MongoDB    Setting Up the Environment    We
    need to download and install the following software for this chapter.    *   Eclipse
    IDE for Java EE Developers. Download from `www.eclipse.org/downloads`. Eclipse
    4.4 Luna used in this chapter. *   MongoDB 3.0.5 (or later version) binary distribution
    from `www.mongodb.org/downloads`. *   Java SE 7 from `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`.    Double-click
    on the MongoDB binary distribution to install MongoDB. Add the `bin` directory
    (`C:\Program Files\MongoDB\Server\3.0\bin`) of the MongoDB installation to the
    `PATH` environment. Create a directory `C:\data\db` for the MongoDB data if not
    already created for an earlier chapter.    Start the MongoDB server with the following
    command.    ``` >mongod ```    Creating a Maven Project    First, we need to create
    a Maven project in Eclipse.    1.  Select File ![image](Images/image00406.jpeg)
    New ![image](Images/image00406.jpeg) Other. 2.  In the New window, select the
