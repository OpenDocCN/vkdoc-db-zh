    ![9781484215999_Fig02-06.jpg](Images/image00430.jpeg)


    [Figure 2-6](#part0008.xhtml#_Fig6). Using the db.createCollection() Helper Method


    If the preceding command is to be run subsequent to the `db.runCommand` to create
    the `mongo` collection, the collection must be deleted using the `db.mongo.drop()`
    command to avoid the “collection already exists” error message, which is shown
    in [Figure 2-7](#part0008.xhtml#Fig7). (See “Dropping a Collection” later in this
    chapter.)'
