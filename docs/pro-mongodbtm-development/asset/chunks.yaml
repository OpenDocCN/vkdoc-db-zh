    12-45](#part0018.xhtml#_Fig45). Selecting View Data                    The empty
    datastore table gets displayed as shown in [Figure 12-46](#part0018.xhtml#Fig46).                    ![9781484215999_Fig12-46.jpg](Images/image00753.jpeg)                    [Figure
    12-46](#part0018.xhtml#_Fig46). The Empty Datastore Table           10.  Next,
    add a model for Oracle Database. Select New Model in Designer ![image](Images/image00406.jpeg)
    Models as shown in [Figure 12-47](#part0018.xhtml#Fig47).          ![9781484215999_Fig12-47.jpg](Images/image00754.jpeg)                    [Figure
    12-47](#part0018.xhtml#_Fig47). Adding New Model for Oracle Database           11.  In
    Model Definition specify Name and select Technology as Oracle as shown in [Figure
    12-48](#part0018.xhtml#Fig48). Select Logical Schema as the `OracleDB` schema
    created earlier. Select Action Group as `<Generic Action>`. Click on Save.                    ![9781484215999_Fig12-48.jpg](Images/image00755.jpeg)                    [Figure
    12-48](#part0018.xhtml#_Fig48). Configuring Model Definition for Oracle Database                    A
    model for Oracle Database gets added as shown in [Figure 12-49](#part0018.xhtml#Fig49).                    ![9781484215999_Fig12-49.jpg](Images/image00756.jpeg)                    [Figure
    12-49](#part0018.xhtml#_Fig49). Model OracleDB           12.  Next, we shall reverse
    engineer the datastore from Oracle Database.     1.  Select the Reverse Engineer
    tab and select Standard.     2.  Select Context as Global and select Types of
    objects to reverse engineer as Table.     3.  Specify Mask as `WLSLOG`, which
    is the Oracle Database table to which MongoDB data is to be loaded.     4.  Also
    specify Characters to remove from Table Alias as `WLSLOG`.     5.  Click on Reverse
    Engineer as shown in [Figure 12-50](#part0018.xhtml#Fig50).          ![9781484215999_Fig12-50.jpg](Images/image00757.jpeg)                    [Figure
    12-50](#part0018.xhtml#_Fig50). Selecting Reverse Engineer           13.  Click
    on Yes in the Confirmation dialog as shown in [Figure 12-51](#part0018.xhtml#Fig51).                    ![9781484215999_Fig12-51.jpg](Images/image00758.jpeg)                    [Figure
    12-51](#part0018.xhtml#_Fig51). Confirmation Dialog for Reverse Engineering                    The
    Reverse engineering of the `WLSLOG` table starts as shown in [Figure 12-52](#part0018.xhtml#Fig52).                    ![9781484215999_Fig12-52.jpg](Images/image00759.jpeg)                    [Figure
    12-52](#part0018.xhtml#_Fig52). Reverse Engineering                    The `WLSLOG`
    database table gets reverse engineered as a `WLSLOG` datastore. The columns for
    the datastore are also reverse engineered as shown in [Figure 12-53](#part0018.xhtml#Fig53).                    ![9781484215999_Fig12-53.jpg](Images/image00760.jpeg)                    [Figure
    12-53](#part0018.xhtml#_Fig53). Reverse-Engineered Columns           14.  Initially
    the datastore is empty. Right-click on the `WLSLOG` datastore and select View
    Data as shown in [Figure 12-54](#part0018.xhtml#Fig54).    ![9781484215999_Fig12-54.jpg](Images/image00761.jpeg)    [Figure
    12-54](#part0018.xhtml#_Fig54). Selecting View Data for Oracle Database Model    An
    empty table gets displayed for the datastore with just the column headers as shown
    in [Figure 12-55](#part0018.xhtml#Fig55).    ![9781484215999_Fig12-55.jpg](Images/image00762.jpeg)    [Figure
    12-55](#part0018.xhtml#_Fig55). Empty Data Table    Creating the Integration Project    An
    integration project is required for integrating data from a source datastore to
    a target datastore. Next we shall create an integration project, add an integration
    interface, and run the integration interface.    1.  Select Designer ![image](Images/image00406.jpeg)
    Projects and select New Project to create a new project as shown in [Figure 12-56](#part0018.xhtml#Fig56).          ![9781484215999_Fig12-56.


    jpg](Images/image00763.jpeg)                    [Figure 12-56](#part0018.xhtml#_Fig56).
    Selecting Projects ![image](Images/image00406.jpeg) New Project           2.  In
    the Project Definition specify a Name and click on Save as shown in [Figure 12-57](#part0018.xhtml#Fig57).                    ![9781484215999_Fig12-57.jpg](Images/image00764.jpeg)                    [Figure
    12-57](#part0018.xhtml#_Fig57). Configuring an Integration Project                    An
    integration project gets added to Projects as shown in [Figure 12-58](#part0018.xhtml#Fig58).                    ![9781484215999_Fig12-58.jpg](Images/image00765.jpeg)                    [Figure
    12-58](#part0018.xhtml#_Fig58). New Integration Project                    We
    shall be using the File-Hive to Oracle integration knowledge module for integrating
    the Hive table data to Oracle Database. We need to add the IKM File-Hive to Oracle
    knowledge module to the project.           3.  Right-click on Knowledge Modules
    ![image](Images/image00406.jpeg) Integration and select Import Knowledge Modules
    as shown in [Figure 12-59](#part0018.xhtml#Fig59).          ![9781484215999_Fig12-59.jpg](Images/image00766.jpeg)                    [Figure
    12-59](#part0018.xhtml#_Fig59). Selecting Knowledge Modules ![image](Images/image00406.jpeg)
    Integration ![image](Images/image00406.jpeg) Import Knowledge Modules           4.  Select
    the IKM File-Hive to Oracle knowledge module in Import Knowledge Modules as shown
    in [Figure 12-60](#part0018.xhtml#Fig60). With IKM File-Hive to Oracle knowledge,
    module source could be a file or Hive and its target is Oracle Database. Click
    on OK.          ![9781484215999_Fig12-60.jpg](Images/image00767.jpeg)                    [Figure
    12-60](#part0018.xhtml#_Fig60). Selecting the IKM File-Hive to Oracle Knowledge
    Module           5.  Click on Close in the Import Report. The IKM File-Hive to
    Oracle knowledge module gets added to the Integration Knowledge Modules as shown
    in [Figure 12-61](#part0018.xhtml#Fig61).          ![9781484215999_Fig12-61.jpg](Images/image00768.jpeg)                    [Figure
    12-61](#part0018.xhtml#_Fig61). Knowledge Module IKM File-Hive to Oracle              Creating
    the Integration Interface    An integration interface defines the mapping of the
    source datastores to the target datastores including the flow of data and the
    knowledge module used in the integration.    1.  Right-click on First Folder ![image](Images/image00406.jpeg)
    Interfaces within the integration project and select New Interface as shown in
    Figure [12-62](#part0018.xhtml#Fig62).          ![9781484215999_Fig12-62.jpg](Images/image00769.jpeg)                    [Figure
    12-62](#part0018.xhtml#_Fig62). Selecting Interfaces ![image](Images/image00406.jpeg)
    New Interface           2.  In the Interface Definition specify a Name and select
    Optimization Context as Global as shown in [Figure 12-63](#part0018.xhtml#Fig63).          ![9781484215999_Fig12-63.jpg](Images/image00770.jpeg)                    [Figure
    12-63](#part0018.xhtml#_Fig63). Configuring an Interface           3.  Select
    the Mapping tab. Select the `MongoDB` (`wlslog`) datastore from the `MongoDB`
    model and drag and drop the datastore in the region for source datastores as shown
    in [Figure 12-64](#part0018.xhtml#Fig64).          ![9781484215999_Fig12-64.jpg](Images/image00771.jpeg)                    [Figure
    12-64](#part0018.xhtml#_Fig64). Adding the MongoDB Datastore to the Mapping           4.  The
    `MongoDB` datastore gets added to the source datastores. Similarly select the
    `WLSLOG` datastore for Oracle Database model `OracleDB` and drag and drop the
    datastore in the region for the target datastore as shown in [Figure 12-65](#part0018.xhtml#Fig65).          ![9781484215999_Fig12-65.jpg](Images/image00772.jpeg)                    [Figure
    12-65](#part0018.xhtml#_Fig65). Adding the Oracle Database Datastore to the Mapping           5.'
  trans: "\n## 继续配置 Oracle 数据库模型\n\n![9781484215999_Fig12-45.jpg](img/image00752.jpeg)\n\
    图 12-45. 选择查看数据\n\n空的数据库表将显示如 图 12-46 所示。\n\n![9781484215999_Fig12-46.jpg](img/image00753.jpeg)\n\
    图 12-46. 空的数据库表\n\n10. 接下来，为 Oracle 数据库添加一个模型。在设计器 ![image](img/image00406.jpeg)\
    \ 模型 中选择 `新建模型`，如 图 12-47 所示。\n\n![9781484215999_Fig12-47.jpg](img/image00754.jpeg)\n\
    图 12-47. 为 Oracle 数据库添加新模型\n\n11. 在 `模型定义` 中指定 `名称` 并选择 `技术` 为 `Oracle`，如 图 12-48\
    \ 所示。选择 `逻辑模式` 为之前创建的 `OracleDB` 模式。选择 `操作组` 为 `<通用操作>`。点击 `保存`。\n\n![9781484215999_Fig12-48.jpg](img/image00755.jpeg)\n\
    图 12-48. 配置 Oracle 数据库的模型定义\n\nOracle 数据库的模型将被添加，如 图 12-49 所示。\n\n![9781484215999_Fig12-49.jpg](img/image00756.jpeg)\n\
    图 12-49. OracleDB 模型\n\n12. 接下来，我们将从 Oracle 数据库逆向工程生成数据存储。\n    1. 选择 `逆向工程` 选项卡并选择\
    \ `标准`。\n    2. 选择 `上下文` 为 `全局`，并选择要逆向工程的对象类型为 `表`。\n    3. 指定 `掩码` 为 `WLSLOG`，这是要将\
    \ MongoDB 数据加载到的 Oracle 数据库表。\n    4. 同时指定 `从表别名中移除的字符` 为 `WLSLOG`。\n    5. 点击\
    \ `逆向工程`，如 图 12-50 所示。\n\n![9781484215999_Fig12-50.jpg](img/image00757.jpeg)\n\
    图 12-50. 选择逆向工程\n\n13. 在确认对话框中点击 `是`，如 图 12-51 所示。\n\n![9781484215999_Fig12-51.jpg](img/image00758.jpeg)\n\
    图 12-51. 逆向工程的确认对话框\n\n`WLSLOG` 表的逆向工程开始，如 图 12-52 所示。\n\n![9781484215999_Fig12-52.jpg](img/image00759.jpeg)\n\
    图 12-52. 逆向工程进行中\n\n`WLSLOG` 数据库表被逆向工程为一个 `WLSLOG` 数据存储。该数据存储的列也被逆向工程生成，如 图 12-53\
    \ 所示。\n\n![9781484215999_Fig12-53.jpg](img/image00760.jpeg)\n图 12-53. 逆向工程生成的列\n\
    \n14. 最初，数据存储是空的。右键单击 `WLSLOG` 数据存储并选择 `查看数据`，如 图 12-54 所示。\n\n![9781484215999_Fig12-54.jpg](img/image00761.jpeg)\n\
    图 12-54. 为 Oracle 数据库模型选择查看数据\n\n将显示一个仅包含列头的空表，如 图 12-55 所示。\n\n![9781484215999_Fig12-55.jpg](img/image00762.jpeg)\n\
    图 12-55. 空数据表\n\n# 创建集成项目\n\n集成项目用于将数据从源数据存储整合到目标数据存储。接下来我们将创建一个集成项目，添加一个集成接口，并运行该集成接口。\n\
    \n1. 选择设计器 ![image](img/image00406.jpeg) `项目`，然后选择 `新建项目` 来创建一个新项目，如 图 12-56 所示。\n\
    \n![9781484215999_Fig12-56.jpg](img/image00763.jpeg)\n图 12-56. 选择项目 ![image](img/image00406.jpeg)\
    \ 新建项目\n\n2. 在 `项目定义` 中指定一个 `名称` 并点击 `保存`，如 图 12-57 所示。\n\n![9781484215999_Fig12-57.jpg](img/image00764.jpeg)\n\
    图 12-57. 配置集成项目\n\n一个集成项目将被添加到 `项目` 中，如 图 12-58 所示。\n\n![9781484215999_Fig12-58.jpg](img/image00765.jpeg)\n\
    图 12-58. 新的集成项目\n\n我们将使用 `IKM File-Hive to Oracle` 集成知识模块来将 Hive 表数据整合到 Oracle\
    \ 数据库。我们需要将 `IKM File-Hive to Oracle` 知识模块添加到项目中。\n\n3. 右键单击 `知识模块` ![image](img/image00406.jpeg)\
    \ `集成`，并选择 `导入知识模块`，如 图 12-59 所示。\n\n![9781484215999_Fig12-59.jpg](img/image00766.jpeg)\n\
    图 12-59. 选择知识模块 ![image](img/image00406.jpeg) 集成 ![image](img/image00406.jpeg)\
    \ 导入知识模块\n\n4. 在 `导入知识模块` 中选择 `IKM File-Hive to Oracle` 知识模块，如 图 12-60 所示。使用 `IKM\
    \ File-Hive to Oracle` 知识模块，源可以是文件或 Hive，目标是 Oracle 数据库。点击 `确定`。\n\n![9781484215999_Fig12-60.jpg](img/image00767.jpeg)\n\
    图 12-60. 选择 IKM File-Hive to Oracle 知识模块\n\n5. 在导入报告中点击 `关闭`。`IKM File-Hive to\
    \ Oracle` 知识模块将被添加到集成知识模块中，如 图 12-61 所示。\n\n![9781484215999_Fig12-61.jpg](img/image00768.jpeg)\n\
    图 12-61. 知识模块 IKM File-Hive to Oracle\n\n# 创建集成接口\n\n集成接口定义了从源数据存储到目标数据存储的映射，包括数据流和集成中使用的知识模块。\n\
    \n1. 右键单击集成项目中的 `First Folder` ![image](img/image00406.jpeg) `接口`，并选择 `新建接口`，如\
    \ 图 12-62 所示。\n\n![9781484215999_Fig12-62.jpg](img/image00769.jpeg)\n图 12-62.\
    \ 选择接口 ![image](img/image00406.jpeg) 新建接口\n\n2. 在 `接口定义` 中指定一个 `名称` 并选择 `优化上下文`\
    \ 为 `全局`，如 图 12-63 所示。\n\n![9781484215999_Fig12-63.jpg](img/image00770.jpeg)\n\
    图 12-63. 配置接口\n\n3. 选择 `映射` 选项卡。从 `MongoDB` 模型中选择 `MongoDB` (`wlslog`) 数据存储，并将其拖放到源数据存储区域，如\
    \ 图 12-64 所示。\n\n![9781484215999_Fig12-64.jpg](img/image00771.jpeg)\n图 12-64.\
    \ 将 MongoDB 数据存储添加到映射\n\n4. `MongoDB` 数据存储被添加到源数据存储。同样地，为 Oracle 数据库模型 `OracleDB`\
    \ 选择 `WLSLOG` 数据存储，并将其拖放到目标数据存储区域，如 图 12-65 所示。\n\n![9781484215999_Fig12-65.jpg](img/image00772.jpeg)\n\
    图 12-65. 将 Oracle 数据库数据存储添加到映射\n"
- fmt: '# Automap 与数据存储配置


    在 Automap 对话框中单击“是”以执行自动映射，如 [Figure 12-66](#part0018.xhtml#Fig66) 所示。


    ![9781484215999_Fig12-66.jpg](Images/image00773.jpeg)

    [Figure 12-66](#part0018.xhtml#_Fig66). Automap Dialog


    源数据存储和目标数据存储在集成接口的映射中被定义，并且数据存储图被添加，如 [Figure 12-67](#part0018.xhtml#Fig67) 所示。


    ![9781484215999_Fig12-67.jpg](Images/image00774.jpeg)

    [Figure 12-67](#part0018.xhtml#_Fig67). Source and Target Datastores


    ## 配置目标数据存储与流


    6.  选择“Quick-Edit”选项卡，并在目标数据存储 `WLSLOG` 的“Execute On”列中选择“Staging Area”，如 [Figure
    12-68](#part0018.xhtml#Fig68) 所示。


    ![9781484215999_Fig12-68.jpg](Images/image00775.jpeg)

    [Figure 12-68](#part0018.xhtml#_Fig68). Configuring Target Datastore WLSLOG


    7.  选择“Flow”选项卡。流程图描述了数据从源数据存储到目标数据存储的流动。默认的流程图将暂存区放在目标数据库中。但是，暂存区应位于源数据库中，如 [Figure
    12-69](#part0018.xhtml#Fig69) 所示。


    ![9781484215999_Fig12-69.jpg](Images/image00776.jpeg)

    [Figure 12-69](#part0018.xhtml#_Fig69). Default Flow Diagram


    8.  选择“Overview”选项卡，然后选择“Staging Area Different From Target”。即使该复选框已被选中，也请先取消选择，然后再次选中。选择暂存区为
    `Hive:MongoDB`，如 [Figure 12-70](#part0018.xhtml#Fig70) 所示。


    ![9781484215999_Fig12-70.jpg](Images/image00777.jpeg)

    [Figure 12-70](#part0018.xhtml#_Fig70). Configuring Staging Area


    流程图被更新，以指示数据从源数据库中的暂存区流向目标数据库，如 [Figure 12-71](#part0018.xhtml#Fig71) 所示。IKM 选择器应选为
    `IKM File-Hive to Oracle`。


    ![9781484215999_Fig12-71.jpg](Images/image00778.jpeg)

    [Figure 12-71](#part0018.xhtml#_Fig71). Configured Flow Diagram


    9.  单击“Save”以保存集成接口，如 [Figure 12-72](#part0018.xhtml#Fig72) 所示。


    ![9781484215999_Fig12-72.jpg](Images/image00779.jpeg)

    [Figure 12-72](#part0018.xhtml#_Fig72). Saving Interface


    一个集成接口被添加，如 [Figure 12-73](#part0018.xhtml#Fig73) 所示。


    ![9781484215999_Fig12-73.jpg](Images/image00780.jpeg)

    [Figure 12-73](#part0018.xhtml#_Fig73). New Integration Interface


    # 运行接口


    在本节中，我们将运行集成接口，以将数据从 MongoDB 集成到 Oracle 数据库。


    1.  右键单击集成接口节点，然后选择“Execute”，如 [Figure 12-74](#part0018.xhtml#Fig74) 所示。


    ![9781484215999_Fig12-74.jpg](Images/image00781.jpeg)

    [Figure 12-74](#part0018.xhtml#_Fig74). Running the Interface


    2.  在“Execution”中选择“OK”，如 [Figure 12-75](#part0018.xhtml#Fig75) 所示。


    ![9781484215999_Fig12-75.jpg](Images/image00782.jpeg)

    [Figure 12-75](#part0018.xhtml#_Fig75). Configuring the Interface Run


    3.  会显示一个“Session started”对话框。单击“OK”，如 [Figure 12-76](#part0018.xhtml#Fig76) 所示。


    ![9781484215999_Fig12-76.jpg](Images/image00783.jpeg)

    [Figure 12-76](#part0018.xhtml#_Fig76). Information Dialog for Integration Session
    Started


    三个 MapReduce 作业运行以将 Hive 表数据集成到 Oracle 数据库中，如 [Figure 12-77](#part0018.xhtml#Fig77)
    所示。


    ![9781484215999_Fig12-77.jpg](Images/image00784.jpeg)

    [Figure 12-77](#part0018.xhtml#_Fig77). Output from Integrating MongoDB based
    Hive Table into Oracle Database


    4.  选择“Operator”选项卡。从“Session List”中选择会话。列出了集成的不同阶段，包括创建暂存表和启动 Oracle Loader for
    Hadoop，如 [Figure 12-78](#part0018.xhtml#Fig78) 所示。


    ![9781484215999_Fig12-78.jpg](Images/image00785.jpeg)

    [Figure 12-78](#part0018.xhtml#_Fig78). Integration Phases


    数据集成后，暂存表、Oracle 目录、外部表目录、本地数据文件、本地临时文件和 HDFS 数据文件将被删除，如 [Figure 12-79](#part0018.xhtml#Fig79)
    所示。


    ![9781484215999_Fig12-79.jpg](Images/image00786.jpeg)

    [Figure 12-79](#part0018.xhtml#_Fig79). Integration Phases for Deleting Files


    与在命令行使用 Oracle Loader for Hadoop 相比，使用 Oracle Data Integrator 的一个优势是，如果未找到某些配置参数，集成将被挂起，而不会终止。例如，如果未找到目标数据库表
    `OE.WLSLOG`，集成将被挂起，如在创建 Hive 暂存表阶段所示，见 [Figure 12-80](#part0018.xhtml#Fig80)。


    ![9781484215999_Fig12-80.jpg](Images/image00787.jpeg)

    [Figure 12-80](#part0018.xhtml#_Fig80). Suspended Integration Phase


    5.  会话仍在运行，如果配置参数被修复（例如，为数据库表添加缺失的模式），则会完成。或者，可以停止集成会话。右键单击会话并选择其中一个“Stop”选项以终止会话，如
    [Figure 12-81](#part0018.xhtml#Fig81) 所示。


    ![9781484215999_Fig12-81.jpg](Images/image00788.jpeg)

    [Figure 12-81](#part0018.xhtml#_Fig81). Options to Stop Integration Session


    # 在 Oracle 数据库表中选择集成数据


    将 MongoDB 数据存储集成到 Oracle 数据库后，在 SQL/Plus 中运行 `SELECT` 语句以选择列表显示集成的数据，如 [Figure
    12-82](#part0018.xhtml#Fig82) 所示。


    ![9781484215999_Fig12-82.jpg](Images/image00789.jpeg)

    [Figure 12-82](#part0018.xhtml#_Fig82). Selecting Integrated Data


    # 总结


    在本章中，我们使用 `IKM File-Hive to Oracle` 知识模块在 Oracle Data Integrator 中将 MongoDB 数据集成到
    Oracle 数据库。


    本章是本书的结尾。您已经了解了 MongoDB 开发的各个方面，例如使用 Java、PHP、Ruby 和 Node.js 访问 MongoDB。我们还讨论了将其他一些
    NoSQL 数据库（Apache Cassandra 和 Couchbase）迁移到 MongoDB。我们学习了在 MongoDB 中使用 Java EE
    框架 Spring Data 和 Kundera。我们还介绍了在 MongoDB 中使用 Hadoop 和 Oracle Data Integrator。


