- fmt: "## 继续配置 Oracle 数据库模型\n\n![9781484215999_Fig12-45.jpg](Images/image00752.jpeg)\n\
    [Figure 12-45](#part0018.xhtml#_Fig45). 选择 View Data\n\n空的数据库表将显示如 [Figure 12-46](#part0018.xhtml#Fig46)\
    \ 所示。\n\n![9781484215999_Fig12-46.jpg](Images/image00753.jpeg)\n[Figure 12-46](#part0018.xhtml#_Fig46).\
    \ 空的数据库表\n\n10. 接下来，为 Oracle 数据库添加一个模型。在 Designer ![image](Images/image00406.jpeg)\
    \ Models 中选择 `New Model`，如 [Figure 12-47](#part0018.xhtml#Fig47) 所示。\n\n![9781484215999_Fig12-47.jpg](Images/image00754.jpeg)\n\
    [Figure 12-47](#part0018.xhtml#Fig47). 为 Oracle 数据库添加新模型\n\n11. 在 `Model Definition`\
    \ 中指定 `Name` 并选择 `Technology` 为 `Oracle`，如 [Figure 12-48](#part0018.xhtml#Fig48)\
    \ 所示。选择 `Logical Schema` 为之前创建的 `OracleDB` 模式。选择 `Action Group` 为 `<Generic Action>`。点击\
    \ `Save`。\n\n![9781484215999_Fig12-48.jpg](Images/image00755.jpeg)\n[Figure 12-48](#part0018.xhtml#Fig48).\
    \ 配置 Oracle 数据库的模型定义\n\nOracle 数据库的模型将被添加，如 [Figure 12-49](#part0018.xhtml#Fig49)\
    \ 所示。\n\n![9781484215999_Fig12-49.jpg](Images/image00756.jpeg)\n[Figure 12-49](#part0018.xhtml#Fig49).\
    \ OracleDB 模型\n\n12. 接下来，我们将从 Oracle 数据库逆向工程生成数据存储。\n    1. 选择 `Reverse Engineer`\
    \ 选项卡并选择 `Standard`。\n    2. 选择 `Context` 为 `Global`，并选择要逆向工程的对象类型为 `Table`。\n\
    \    3. 指定 `Mask` 为 `WLSLOG`，这是要将 MongoDB 数据加载到的 Oracle 数据库表。\n    4. 同时指定 `Characters\
    \ to remove from Table Alias` 为 `WLSLOG`。\n    5. 点击 `Reverse Engineer`，如 [Figure\
    \ 12-50](#part0018.xhtml#Fig50) 所示。\n\n![9781484215999_Fig12-50.jpg](Images/image00757.jpeg)\n\
    [Figure 12-50](#part0018.xhtml#Fig50). 选择 Reverse Engineer\n\n13. 在确认对话框中点击 `Yes`，如\
    \ [Figure 12-51](#part0018.xhtml#Fig51) 所示。\n\n![9781484215999_Fig12-51.jpg](Images/image00758.jpeg)\n\
    [Figure 12-51](#part0018.xhtml#Fig51). 逆向工程的确认对话框\n\n`WLSLOG` 表的逆向工程开始，如 [Figure\
    \ 12-52](#part0018.xhtml#Fig52) 所示。\n\n![9781484215999_Fig12-52.jpg](Images/image00759.jpeg)\n\
    [Figure 12-52](#part0018.xhtml#Fig52). 逆向工程进行中\n\n`WLSLOG` 数据库表被逆向工程为一个 `WLSLOG`\
    \ 数据存储。该数据存储的列也被逆向工程生成，如 [Figure 12-53](#part0018.xhtml#Fig53) 所示。\n\n![9781484215999_Fig12-53.jpg](Images/image00760.jpeg)\n\
    [Figure 12-53](#part0018.xhtml#Fig53). 逆向工程生成的列\n\n14. 最初，数据存储是空的。右键单击 `WLSLOG`\
    \ 数据存储并选择 `View Data`，如 [Figure 12-54](#part0018.xhtml#Fig54) 所示。\n\n![9781484215999_Fig12-54.jpg](Images/image00761.jpeg)\n\
    [Figure 12-54](#part0018.xhtml#Fig54). 为 Oracle 数据库模型选择 View Data\n\n将显示一个仅包含列头的空表，如\
    \ [Figure 12-55](#part0018.xhtml#Fig55) 所示。\n\n![9781484215999_Fig12-55.jpg](Images/image00762.jpeg)\n\
    [Figure 12-55](#part0018.xhtml#Fig55). 空数据表\n\n# 创建集成项目\n\n集成项目用于将数据从源数据存储整合到目标数据存储。接下来我们将创建一个集成项目，添加一个集成接口，并运行该集成接口。\n\
    \n1. 选择 Designer ![image](Images/image00406.jpeg) `Projects`，然后选择 `New Project`\
    \ 来创建一个新项目，如 [Figure 12-56](#part0018.xhtml#Fig56) 所示。\n\n![9781484215999_Fig12-56.jpg](Images/image00763.jpeg)\n\
    [Figure 12-56](#part0018.xhtml#Fig56). 选择 Projects ![image](Images/image00406.jpeg)\
    \ New Project\n\n2. 在 `Project Definition` 中指定一个 `Name` 并点击 `Save`，如 [Figure 12-57](#part0018.xhtml#Fig57)\
    \ 所示。\n\n![9781484215999_Fig12-57.jpg](Images/image00764.jpeg)\n[Figure 12-57](#part0018.xhtml#Fig57).\
    \ 配置集成项目\n\n一个集成项目将被添加到 `Projects` 中，如 [Figure 12-58](#part0018.xhtml#Fig58) 所示。\n\
    \n![9781484215999_Fig12-58.jpg](Images/image00765.jpeg)\n[Figure 12-58](#part0018.xhtml#Fig58).\
    \ 新的集成项目\n\n我们将使用 `IKM File-Hive to Oracle` 集成知识模块来将 Hive 表数据整合到 Oracle 数据库。我们需要将\
    \ `IKM File-Hive to Oracle` 知识模块添加到项目中。\n\n3. 右键单击 `Knowledge Modules` ![image](Images/image00406.jpeg)\
    \ `Integration`，并选择 `Import Knowledge Modules`，如 [Figure 12-59](#part0018.xhtml#Fig59)\
    \ 所示。\n\n![9781484215999_Fig12-59.jpg](Images/image00766.jpeg)\n[Figure 12-59](#part0018.xhtml#Fig59).\
    \ 选择 Knowledge Modules ![image](Images/image00406.jpeg) Integration ![image](Images/image00406.jpeg)\
    \ Import Knowledge Modules\n\n4. 在 `Import Knowledge Modules` 中选择 `IKM File-Hive\
    \ to Oracle` 知识模块，如 [Figure 12-60](#part0018.xhtml#Fig60) 所示。使用 `IKM File-Hive\
    \ to Oracle` 知识模块，源可以是文件或 Hive，目标是 Oracle 数据库。点击 `OK`。\n\n![9781484215999_Fig12-60.jpg](Images/image00767.jpeg)\n\
    [Figure 12-60](#part0018.xhtml#Fig60). 选择 IKM File-Hive to Oracle 知识模块\n\n5. 在导入报告中点击\
    \ `Close`。`IKM File-Hive to Oracle` 知识模块将被添加到集成知识模块中，如 [Figure 12-61](#part0018.xhtml#Fig61)\
    \ 所示。\n\n![9781484215999_Fig12-61.jpg](Images/image00768.jpeg)\n[Figure 12-61](#part0018.xhtml#Fig61).\
    \ 知识模块 IKM File-Hive to Oracle\n\n# 创建集成接口\n\n集成接口定义了从源数据存储到目标数据存储的映射，包括数据流和集成中使用的知识模块。\n\
    \n1. 右键单击集成项目中的 `First Folder` ![image](Images/image00406.jpeg) `Interfaces`，并选择\
    \ `New Interface`，如 [Figure 12-62](#part0018.xhtml#Fig62) 所示。\n\n![9781484215999_Fig12-62.jpg](Images/image00769.jpeg)\n\
    [Figure 12-62](#part0018.xhtml#Fig62). 选择 Interfaces ![image](Images/image00406.jpeg)\
    \ New Interface\n\n2. 在 `Interface Definition` 中指定一个 `Name` 并选择 `Optimization\
    \ Context` 为 `Global`，如 [Figure 12-63](#part0018.xhtml#Fig63) 所示。\n\n![9781484215999_Fig12-63.jpg](Images/image00770.jpeg)\n\
    [Figure 12-63](#part0018.xhtml#Fig63). 配置接口\n\n3. 选择 `Mapping` 选项卡。从 `MongoDB`\
    \ 模型中选择 `MongoDB` (`wlslog`) 数据存储，并将其拖放到源数据存储区域，如 [Figure 12-64](#part0018.xhtml#Fig64)\
    \ 所示。\n\n![9781484215999_Fig12-64.jpg](Images/image00771.jpeg)\n[Figure 12-64](#part0018.xhtml#Fig64).\
    \ 将 MongoDB 数据存储添加到映射\n\n4. `MongoDB` 数据存储被添加到源数据存储。同样地，为 Oracle 数据库模型 `OracleDB`\
    \ 选择 `WLSLOG` 数据存储，并将其拖放到目标数据存储区域，如 [Figure 12-65](#part0018.xhtml#Fig65) 所示。\n\
    \n![9781484215999_Fig12-65.jpg](Images/image00772.jpeg)\n[Figure 12-65](#part0018.xhtml#Fig65).\
    \ 将 Oracle 数据库数据存储添加到映射"
