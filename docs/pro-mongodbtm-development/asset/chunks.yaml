    \ key, Object value)`构造函数创建文档对象，并使用`append(String key, Object val)`方法向对象添加键/值对。`BasicDBObject`的一个实例代表数据库集合中的一个文档对象。需要从日志数据创建三个`BasicDBObject`实例，以添加到\
    \ MongoDB 数据库集合中。\n\n`DBCollection`类提供了重载的插入方法，用于将`BasicDBObject`实例添加到集合中。使用`insert(DBObject...\
    \ arr)`方法将`BasicDBObject`实例添加到`DBCollection`。\n\n要在集合中查找文档对象，请在`DBCollection`对象上调用`findOne()`方法。\n\
    \n### `CreateMongoDBDocument`类\n\n```java\npackage mongodb;\n\nimport com.mongodb.MongoClient;\n\
    import com.mongodb.DB;\nimport import com.mongodb.DBCollection;\nimport com.mongodb.BasicDBObject;\n\
