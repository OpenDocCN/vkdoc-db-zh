    \n## Summary\n\n在本章中，我们使用 Eclipse IDE 中的 Java 应用程序将 Apache Cassandra 表迁移到 MongoDB\
    \ 服务器。首先，我们使用 Cassandra Java 驱动程序向 Cassandra 添加文档。随后，我们将 Cassandra 文档迁移到 MongoDB。\n\
    \n在下一章中，我们将把 Couchbase 数据库文档迁移到 MongoDB。\n\n# CHAPTER 7\n\n![image](img/image00404.jpeg)\n\
    \n## 将 Couchbase 迁移到 MongoDB\n\nMongoDB 和 Couchbase 都是以文档为中心的 NoSQL 数据库。两者都基于相同的数据存储模型，即\
    \ JSON，但有一个细微差别：MongoDB 基于 BSON（二进制 JSON）数据模型，这提供了更广泛的数据类型选择。Couchbase 中的 JSON\
    \ 支持相对不够成熟。MongoDB 将文档存储在集合中，这使得处理文档更加容易。Mongo 对在 Mongo shell 中运行以对文档执行 CRUD 操作的\
    \ JavaScript 方法的支持是另一个优于 Couchbase 的优势。为了利用 MongoDB 中的这些附加功能，将文档从 Couchbase 迁移到\
    \ MongoDB 可能是有利的。在本章中，我们将把 Couchbase 文档迁移到 MongoDB。本章涵盖以下主题：\n\n*   设置环境\n*  \
    \ 创建 Maven 项目\n*   创建 Java 类\n*   配置 Maven 项目\n*   向 Couchbase 添加文档\n*   创建 Couchbase\
    \ 视图\n*   将 Couchbase 文档迁移到 MongoDB\n\n### 设置环境\n\n我们需要为本章下载以下软件。\n\n*   Couchbase\
    \ Server Community 或 Enterprise Edition 3.0.x（或更高版本） `couchbase-server-enterprise_3.0.3-windows_amd64.exe`\
    \ 文件，从 `www.couchbase.com/nosql-databases/downloads` 下载。双击 `exe` 文件启动安装程序并安装 Couchbase\
    \ Server。\n*   适用于 Java EE 开发者的 Eclipse IDE，从 `www.eclipse.org/downloads/` 下载。\n\
    *   MongoDB 3.05（或更高版本）Windows 二进制文件 `mongodb-win32-x86_64-3.0.5-signed.msi`，从\
    \ `www.mongodb.org/downloads` 下载。双击 `mongodb-win32-x86_64-3.0.5-signed` 文件安装 MongoDB\
    \ 3.05。将 `bin` 目录（例如 `C:\\Program Files\\MongoDB\\Server\\3.0\\bin`）添加到 `PATH`\
    \ 环境变量中。\n*   Java 7，从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
    \ 下载。\n\n如果尚未为前面的章节创建，请为 MongoDB 数据创建一个目录 `C:\\data\\db`。从命令 shell 启动 MongoDB\
    \ 的命令如下。\n\n```\n>mongod\n```\n\nMongoDB 启动并在端口 27017 上等待连接。\n\n登录 Couchbase 控制台。在\
    \ Couchbase 管理控制台（通过 URL `localhost:8091` 访问）中单击 Data Buckets。默认存储桶应列在 Couchbase\
    \ Buckets 中。单击默认存储桶的 Documents 按钮。默认情况下，存储桶最初不应包含任何文档，如 图 7-1 所示。\n![9781484215999_Fig07-01.jpg](img/image00609.jpeg)\n\
    图 7-1. 空的 Couchbase 存储桶 default\n\n### 创建 Maven 项目\n\n我们将使用一个 Maven 项目来创建 Couchbase\
    \ 文档，随后将 Couchbase 文档迁移到 MongoDB。接下来，在 Eclipse 中创建一个 Maven 项目。\n\n1.  选择 File\
    \ ![image](img/image00406.jpeg) New ![image](img/image00406.jpeg) Other。\n2. \
    \ 在 New 窗口中，选择 Maven ![image](img/image00406.jpeg) Maven Project 并单击 Next，如 图\
    \ 7-2 所示。\n    ![9781484215999_Fig07-02.jpg](img/image00610.jpeg)\n    图 7-2.\
    \ 选择 Maven ![image](img/image00406.jpeg) Maven Project\n3.  在 New Maven Project\
    \ 向导中，选中 “Create a simple project” 复选框和 “Use default Workspace location” 复选框，然后单击\
    \ Next，如 图 7-3 所示。\n    ![9781484215999_Fig07-03.jpg](img/image00611.jpeg)\n \
    \   图 7-3. 创建新的 Maven 项目\n4.  要创建 Maven 项目，请指定以下内容并单击 Finish，如 图 7-4 所示。\n   \
    \ *   Group Id: `com.mongodb.migration`\n    *   Artifact Id: `CouchbaseToMongoDB`\n\
    \    *   Version: `1.0`\n"
- fmt: "## Creating Java Classes\n\nWe shall migrate a MongoDB database document to\
    \ Couchbase Server in a Java application. Create two classes: `CreateCouchbaseDocument`\
    \ and `MigrateCouchbaseToMongoDB`.\n\n1.  To create a Java class select File >\
    \ New > Other.\n2.  In the New window, select Java > Class and click on Next as\
    \ shown in Figure 7-6.\n    ![9781484215999_Fig07-06.jpg](Images/image00614.jpeg)\n\
    \    [Figure 7-6](#part0013.xhtml#_Fig6). Selecting Java > Java Class\n3.  In\
    \ New Java Class wizard select the Source folder and specify Package as `mongodb`.\
    \ Specify class Name as `CreateCouchbaseDocument` and click on Finish as shown\
    \ in Figure 7-7.\n    ![9781484215999_Fig07-07.jpg](Images/image00615.jpeg)\n\
    \    [Figure 7-7](#part0013.xhtml#_Fig7). New Java Class Wizard\n4.  Similarly,\
    \ add a class `MigrateCouchbaseToMongoDB` as shown in Figure 7-8. The two classes\
    \ `CreateMongoDB` and `MigrateMongoDBToCouchbase` are shown in Package Explorer\
    \ as shown in Figure 7-8.\n    ![9781484215999_Fig07-08.jpg](Images/image00616.jpeg)\n\
    \    [Figure 7-8](#part0013.xhtml#_Fig8). Java Classes in Package Explorer\n\n\
    ## Configuring the Maven Project\n\nWe need to add some Maven dependencies to\
    \ the project classpath. Add the dependencies listed in [Table 7-1](#part0013.xhtml#Tab1)\
    \ to `pom.xml` configuration file in the Maven project.\n\n[Table 7-1](#part0013.xhtml#_Tab1).\
    \ Maven Dependencies\n\n| Dependency | Description |\n| --- | --- |\n| Mongo Java\
    \ Driver 3.0.3 | The MongoDB Java driver required to access MongoDB from a Java\
    \ application. |\n| Couchbase Server Java SDK Client library 2.1.4 | The Java\
    \ Client to Couchbase Server. |\n| Apache Commons BeanUtils 1.9.2 | Utility Jar\
    \ for Java classes developed with the JavaBeans pattern. |\n| Apache Commons Collections\
    \ 3.2.1 | Java Collections framework provides data structures that accelerate\
    \ development. |\n| Apache Commons Logging 1.2 | An interface for common logging\
    \ implementations. |\n\nThe `pom.xml` is listed below.\n\n```xml\n<project xmlns=\"\
    http://maven.apache.org/POM/4.0.0\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.mongodb.migration</groupId>\n\
    \    <artifactId>CouchbaseToMongoDB</artifactId>\n    <version>1.0.0</version>\n\
    \    <name>CouchbaseToMongoDB</name>\n    <dependencies>\n        <dependency>\n\
    \            <groupId>com.couchbase.client</groupId>\n            <artifactId>java-client</artifactId>\n\
    \            <version>2.1.4</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>org.mongodb</groupId>\n            <artifactId>mongo-java-driver</artifactId>\n\
    \            <version>3.0.3</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>commons-beanutils</groupId>\n            <artifactId>commons-beanutils</artifactId>\n\
    \            <version>1.9.2</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>commons-collections</groupId>\n            <artifactId>commons-collections</artifactId>\n\
    \            <version>3.2.1</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>commons-logging</groupId>\n            <artifactId>commons-logging</artifactId>\n\
    \            <version>1.2</version>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\nSelect File > Save All to save the `pom.xml` configuration\
    \ file. The required jar files get downloaded, and get added to the Java build\
    \ path. To find which Jars have been added to the Maven project Java build path,\
    \ right-click on the project node in Package Explorer and select Properties. In\
    \ Properties select Java Build Path. The Jars added to the migration project are\
    \ shown in Figure 7-9.\n![9781484215999_Fig07-09.jpg](Images/image00617.jpeg)\n\
    [Figure 7-9](#part0013.xhtml#_Fig9). Jar Files in Java Build Path\n\n## Adding\
    \ Documents to Couchbase\n\nThe `com.couchbase.client.java.CouchbaseCluster` class\
    \ is the client class for Couchbase Server and is the entry point to access Couchbase\
    \ cluster, which may consist of one or more servers. In the `CreateCouchbaseDocument`\
    \ application we shall use the `CouchbaseCluster` class to create and store a\
    \ JSON document in Couchbase Server. The `CouchbaseCluster` class provides the\
    \ overloaded `create()` methods to create an instance of `CouchbaseCluster`. We\
    \ shall use the static method `create()` that does not take any args and is used\
    \ to connect to the default bucket at localhost at port 8091. Couchbase Server\
    \ stores documents in Data Buckets. The `Bucket` interface represents a connection\
    \ to a bucket to perform operations on the bucket synchronously.\n\n1.  Create\
    \ a `CouchbaseCluster` instance and subsequently connect to the default bucket\
    \ using the `openBucket()` method. For connecting to the “default” bucket, bucket\
    \ name and password are not required to be specified.\n    ```java\n    Cluster\
    \ cluster = CouchbaseCluster.create();\n    Bucket defaultBucket = cluster.openBucket();\n\
    \    ```\n\nThe `com.couchbase.client.java.document.json.JsonObject` class represents\
    \ a JSON object stored in Couchbase Server. A document is represented with the\
    \ `com.couchbase.client.java.document.Document` interface and several class implementations\
    \ are provided, including the `com.couchbase.client.java.document.JsonDocument`,\
    \ which creates a document from a `com.couchbase.client.java.document.json.JsonObject`.\
    \ `JsonObject` represents a JSON object, the `{a1:v1,a2:v2}` JSON stored in Couchbase.\
    \ The `JsonObject` class provides static methods `empty()` and `create()` to create\
    \ an empty `JsonObject` instance. The `JsonObject` class provides the overloaded\
    \ put methods to put field/value pairs in a `JsonObject` instance. The field name\
    \ in each of these methods is of type `String`. A `put` method is provided for\
    \ each of the value types `String`, `int`, `long`, `double`, `boolean`, `JsonObject`,\
    \ `JsonArray`, and `Object`. We shall make use of the `put(String,String)` method\
    \ to add key/value pairs to a JSON document.\n\n2.  Create a `JsonObject` instance\
    \ for a JSON document with fields `journal`, `publisher`, `edition`, `title`,\
    \ and `author` with `String` values using the `put(java.lang.String name, java.lang.String\
    \ value)` method. First, invoke the `empty()` method to return an empty `JsonObject`\
    \ instance and subsequently invoke the `put(java.lang.String name, java.lang.String\
    \ value)` method to add field/value pairs.\n    ```java\n    JsonObject catalogObj\
    \ = JsonObject.empty()\n                .put(\"journal\", \"Oracle Magazine\"\
    )\n                .put(\"publisher\", \"Oracle Publishing\")\n              \
    \  .put(\"edition\", \"March April 2013\")\n                .put(\"title\", \"\
    Engineering as a Service\")\n                .put(\"author\", \"David A. Kelly\"\
    );\n    ```\n\n3.  The `Bucket` class provides several overloaded `insert` and\
    \ `upsert` methods to add a document to a bucket. Create an instance of `JsonDocument`\
    \ using the `JsonDocument.create(java.lang.String id, JsonObject content)` method."
