    being included with the Apache Cassandra Project dependency and should not be
    added separately.    [Table 6-1](#part0012.xhtml#_Tab1). Dependencies     | Jar
    | Description | | --- | --- | | Mongo Java Driver 3.0.3 | The Java Client to MongoDB
    Server. | | Apache Cassandra 2.2.0 | Apache Cassandra Project. | | Cassandra Driver
    Core 2.2.0-rc2 | The Datastax Java driver. | | Apache Commons BeanUtils 1.9.2
    | Utility Jar for Java classes developed with the JavaBeans pattern. | | Apache
    Commons Collections 3.2.1 | Provides data structures that accelerate Java application
