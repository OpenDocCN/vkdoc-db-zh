    \        System.out.println(catalog.getJournal());\n        System.out.println(catalog.getPublisher());\n\
    \        System.out.println(catalog.getEdition());\n        System.out.println(catalog.getTitle());\n\
    \        System.out.println(catalog.getAuthor());\n    }\n    ```\n\n当客户端类运行时，`Catalog`\
    \ 实体字段值应当被输出。\n\n## 更新目录条目\n\n在本节中，我们将使用 Java 持久化 API 更新一个目录条目。`EntityManager`\
    \ 中的 `persist()` 方法可用于持久化更新后的实体实例。\n\n1.  向 `KunderaClient` 类添加一个名为 `update()`\
    \ 的方法，并从 `main` 方法中调用该方法。\n    1.  要更新主键为 `\"catalog1\"` 的文档中的 `edition` 列，请使用\
    \ `find(java.lang.Class<T> entityClass, java.lang.Object primaryKey)` 方法为 `catalog1`\
    \ 行创建一个实体实例。\n    2.  随后，使用 `setEdition` 方法将 `edition` 字段设置为更新后的值。\n    3.  使用\
    \ `persist(java.lang.Object entity)` 方法持久化更新后的 `Catalog` 实例。\n        ```java\n\
    \        Catalog catalog = em.find(Catalog.class, \"catalog1\");\n        catalog.setEdition(\"\
    Nov-Dec 2013\");\n        em.persist(catalog);\n        ```\n2.  Java 持久化查询语言提供了\
    \ `UPDATE` 子句来更新一行。使用 `UPDATE` 语句和 `EntityManager` 中的 `createQuery(String)` 方法创建一个\
    \ `Query` 实例。随后调用 `executeUpdate()` 方法来执行 `UPDATE` 语句。\n    ```java\n    em.createQuery(\"\
    UPDATE Catalog c SET c.journal = 'Oracle-Magazine'\").executeUpdate();\n    ```\n\
    3.  `catalog` 列族中所有行的 `journal` 列都将被更新。应用更新后，调用 `query()` 方法以输出更新后的字段值。\n\n当 `KunderaClient`\
    \ 类运行时，已更新的 `journal` 字段应具有更新后的值 `Oracle-Magazine`，而不是 `Oracle Magazine`。\n\n\
    ## 删除目录条目\n\n在本节中，我们将使用 Java 持久化 API 移除持久化在 MongoDB 中的文档。`EntityManager` 中的 `remove(java.lang.Object\
    \ entity)` 方法可用于移除一个实体实例。\n\n1.  向 `KunderaClient` 类添加一个名为 `delete()` 的方法，并从 `main`\
    \ 方法中调用该方法。\n2.  要移除主键为 `\"catalog1\"` 的文档，请使用 `find(java.lang.Class<T> entityClass,\
    \ java.lang.Object primaryKey)` 方法为 `catalog1` 行创建一个实体实例。随后调用 `remove(java.lang.Object\
    \ entity)` 方法，从 MongoDB 中移除主键为 `catalog1` 的文档。\n    ```java\n    Catalog catalog\
    \ = em.find(Catalog.class, \"catalog1\");\n    em.remove(catalog);\n    ```\n\
    3.  Java 持久化查询语言提供了 `DELETE` 子句来删除文档。使用 `DELETE` 语句和 `EntityManager` 中的 `createQuery(String)`\
    \ 方法创建一个 `Query` 实例。随后调用 `executeUpdate()` 方法来执行 `DELETE` 语句。\n    ```java\n \
    \   em.createQuery(\"DELETE FROM Catalog c\").executeUpdate();\n    ```\n    所有行都将被删除。`DELETE`\
    \ 语句不会删除文档本身，而是删除行中的所有列。\n4.  应用删除操作（无论是使用 `remove(java.lang.Object entity)` 还是使用\
    \ `DELETE` Java 持久化查询语言语句）后，调用 `query()` 方法以输出任何持久化到 `catalog` 表中的 `Catalog` 实例。\n\
    \n当客户端类运行时，在删除 `Catalog` 条目后调用 `query()` 方法时，不应列出任何字段值。\n\n## Kundera-Mongo JPA\
