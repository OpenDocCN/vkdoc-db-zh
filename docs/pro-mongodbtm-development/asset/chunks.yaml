- fmt: "## Finding Documents Using a Query\n\n在前面的章节中，我们使用了 `findAll`（查找所有文档）、`findOne`（查找单个文档）和\
    \ `findById`（按 Id 查找）来查找文档。`MongoOperations` 接口提供了重载的 `find()` 方法，用于使用特定查询查找文档。`find()`\
    \ 方法返回一个 `List<T>` 实例，并在表 10-12 中讨论。\n\n**表 10-12. 重载的 find() 方法**\n\n| 方法 | 描述\
    \ |\n| --- | --- |\n| `find(Query query, Class<T> entityClass)` | 为指定的实体类类型返回集合中符合指定查询的文档列表。\
    \ |\n| `find(Query query, Class<T> entityClass, String collectionName)` | 为指定的实体类类型从指定集合中返回符合指定查询的文档列表。\
    \ |\n\n在 `App` 应用程序的 `find()` 方法中，我们将查找 `publisher` 字段值为 `Oracle Publishing` 的文档。\n\
    \n1.  使用构造函数 `BasicDBObject(String key, Object value)` 创建一个 `BasicDBObject` 实例，键为\
    \ `publisher`，值为 `Oracle Publishing`。\n    ```\n    DBObject dbObject = new BasicDBObject(\"\
    publisher\", \"Oracle Publishing\");\n    ```\n2.  使用构造函数 `BasicQuery(com.mongodb.DBObject\
    \ queryObject)` 从 `BasicDBObject` 对象创建一个 `BasicQuery` 对象。\n    ```\n    BasicQuery\
    \ query = new BasicQuery(dbObject);\n    ```\n3.  使用 `BasicQuery` 实例调用 `find(Query\
    \ query, Class<T> entityClass, String collectionName)` 方法，以查找符合指定查询的文档。`find()`\
    \ 方法返回文档的 `List<Catalog>` 实例。\n    ```\n    List<Catalog> list = ops.find(query,\
    \ Catalog.class, \"catalog\");\n    ```\n4.  从 `List` 实例获取一个迭代器，并迭代该 `List` 实例以输出列表中文档的字段值。`App`\
    \ 应用程序中的 `find()` 方法如下所示。\n    ```\n    private static void find() {\n       \
    \     createCatalogInstances();\n            ops.save(catalog1);\n           \
    \ ops.save(catalog2);\n            DBObject dbObject = new BasicDBObject(\"publisher\"\
    , \"Oracle Publishing\");\n            BasicQuery query = new BasicQuery(dbObject);\n\
    \            List<Catalog> list = ops.find(query, Catalog.class, \"catalog\");\n\
    \            Iterator<Catalog> iter = list.iterator();\n            while (iter.hasNext())\
    \ {\n                Catalog catalog = iter.next();\n                System.out.println(\"\
    Journal : \" + catalog.getJournal());\n                System.out.println(\"Publisher\
    \ : \" + catalog.getPublisher());\n                System.out.println(\"Edition\
    \ : \" + catalog.getEdition());\n                System.out.println(\"Title :\
    \ \" + catalog.getTitle());\n                System.out.println(\"Author : \"\
    \ + catalog.getAuthor());\n            }\n    ```\n5.  运行 `App` 应用程序，输出使用 `find(Query\
    \ query, Class<T> entityClass, String collectionName)` 方法找到的文档的字段值，如图 10-15 所示。\n\
    \    ![9781484215999_Fig10-15.jpg](Images/image00676.jpeg)\n    **图 10-15. 使用\
    \ find() 查找文档**\n6.  如对于 `findOne(Query query, Class<T> entityClass)` 方法所讨论的，也可以使用条件定义来查找文档。依次使用\
    \ `where` 和 `is` 方法调用创建一个用于 `journal` 字段值为 `Oracle Magazine` 的 `Criteria` 实例。从\
    \ `Criteria` 实例创建一个 `Query` 实例，并使用该 `Query` 实例和 `Catalog.class` 实体类类型调用 `find()`\
    \ 方法。\n    ```\n    List<Catalog> list = ops.find(new Query(Criteria.where(\"\
    journal\").is(\"Oracle Magazine\")), Catalog.class);\n    ```\n7.  迭代 `find` 方法返回的列表，输出\
    \ `Catalog` 实例在列表中的字段值。使用条件的 `find()` 方法的输出如图 10-16 所示的 Eclipse 控制台中。\n    ![9781484215999_Fig10-16.jpg](Images/image00677.jpeg)\n\
    \    **图 10-16. 使用查询条件通过 find() 方法查找文档**\n\n## Updating the First Document\n\n\
    在本节中，我们将使用查询来查找要更新的文档。一个查询可能返回多个文档。如果只想更新查询结果中的第一个文档，`MongoOperations` 接口提供了重载的\
