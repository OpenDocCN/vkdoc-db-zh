    \ static void main (String[] args)` method stub to create the class and click\
    \ on Finish as shown in [Figure 1-7](#part0007.xhtml#Fig7).\n\n![9781484215999_Fig01-07.jpg](Images/image00412.jpeg)\n\
    \n[Figure 1-7](#part0007.xhtml#_Fig7). Creating a New Class\n\n6.  The `MongoDBClient`\
    \ class gets created in the `MongoDBJava` project. Similarly add the Java classes\
    \ listed in [Table 1-1](#part0007.xhtml#Tab1) to the same package as the `MongoDBClient`\
    \ class: the `mongodb` package.\n\n[Table 1-1](#part0007.xhtml#_Tab1). Java Classes\n\
    \n| Class | Description |\n    | --- | --- |\n    | `Catalog` | The model class\
    \ to define properties and accessor methods for a record to be added to MongoDB\
    \ server. |\n    | `CreateMongoDBDocument` | Class to create a MongoDB document.\
    \ |\n    | `CreateMongoDBDocumentModel` | Class to create a MongoDB document using\
    \ the model class catalog. |\n    | `UpdateDBDocument` | Class to update a document.\
    \ |\n    | `DeleteDBDocument` | Class to delete a document. |\n\nThe Java classes\
    \ in the Maven project are shown in the Package Explorer in [Figure 1-8](#part0007.xhtml#Fig8).\n\
    \n![9781484215999_Fig01-08.jpg](Images/image00413.jpeg)\n\n[Figure 1-8](#part0007.xhtml#_Fig8).\
    \ Java Classes\n\n7.  Next, configure the Maven project by adding the required\
    \ dependencies to the `pom.xml` configuration file. Add the Java MongoDB Driver\
    \ dependency to the `pom.xml`. The `pom.xml` is listed below. Click on File ![image](Images/image00406.jpeg)\
    \ Save All to save the `pom.xml`.\n\n```\n    <project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n        xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n        <modelVersion>4.0.0</modelVersion>\n        <groupId>mongodb.java</groupId>\n\
    \        <artifactId>MongoDBJava</artifactId>\n        <version>1.0.0</version>\n\
    \        <name>MongoDBJava</name>\n        <dependencies>\n            <dependency>\n\
    \                <groupId>org.mongodb</groupId>\n                <artifactId>mongo-java-driver</artifactId>\n\
    \                <version>3.0.3</version>\n            </dependency>\n        </dependencies>\n\
    \    </project>\n    ```\n\n8.  Right-click on the project node in Package Explorer\
    \ and select Project Properties. In Properties select Java Build Path. Select\
    \ the Libraries tab and click on Maven Dependencies to expand the node. The MongoDB\
    \ Java driver should be listed in the Java Build Path as shown in [Figure 1-9](#part0007.xhtml#Fig9).\
    \ Click on OK.\n\n![9781484215999_Fig01-09.jpg](Images/image00414.jpeg)\n\n[Figure\
    \ 1-9](#part0007.xhtml#_Fig9). Mongo Java Driver in Java Build Path\n\nThe Maven\
    \ project with the Mongo Java driver dependency configured in `pom.xml` is shown\
    \ in [Figure 1-10](#part0007.xhtml#Fig10). The directory structure of the `MongoDBJava`\
    \ Maven project is shown in the Package Explorer.\n\n![9781484215999_Fig01-10.jpg](Images/image00415.jpeg)\n\
    \n[Figure 1-10](#part0007.xhtml#_Fig10). Maven Project with Mongo Java Driver\
    \ Dependency Configured\n\nCreating a BSON Document\n\nIn this section we shall\
    \ add a BSON (Binary JSON) document to MongoDB server. We shall use the `CreateMongoDBDocument.java`\
    \ application in Eclipse IDE. A MongoDB document is represented with the `org.bson.Document`\
    \ class. MongoDB stores data in collections. The main packages for MongoDB classes\
    \ in the MongoDB Java driver are `com.mongodb` and `com.mongodb.client`. A MongoDB\
    \ client to connect to MongoDB server is represented with the `com.mongodb.MongoClient`\
    \ class. A `MongoClient` object provides connection pooling, and only one instance\
    \ is required for the entire instance. The `MongoClient` class provides several\
    \ constructors, some of which are listed in [Table 1-2](#part0007.xhtml#Tab2).\n\
    \n[Table 1-2](#part0007.xhtml#_Tab2). MongoClient Class Constructors\n\n| Constructor\
    \ | Description |\n| --- | --- |\n| `MongoClient``()` | Creates an instance based\
    \ on a single MongoDB node for localhost and default port 27017. |\n| `MongoClient``(``String`\
    \ `host)` | Creates an instance based on a single MongoDB node with host specified\
    \ as a host[:port] String literal. |\n| `MongoClient`(String `host, int port)`\
    \ | Creates an instance based on a single MongoDB node using the specified host\
    \ and port. |\n| `MongoClient`(List`<``ServerAddress``> seeds)` | Creates an instance\
    \ using a List of MongoDB servers to select from. The server with the lowest ping\
    \ time is selected. If the lowest ping time server is down, the next in the list\
    \ is selected. |\n| `MongoClient`(List<`ServerAddress``> seeds,``List``<``MongoCredential``>\
    \ credentialsList)` | Same as the previous version except a List of credentials\
    \ are provided to authenticate connections to the server/s. |\n| `MongoClient`(List<`ServerAddress``>\
    \ seeds,``List``<``MongoCredential``> credentialsList,``MongoClientOptions` `options)`\
    \ | Same as the previous version except that Mongo client options are also provided.\
    \ |\n\n1.  Create a `MongoClient` instance using the `MongoClient(List<ServerAddress>\
    \ seeds)` constructor. Supply “localhost” or the IPv4 address of the host and\
    \ port as 27017.\n\n```\n    MongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n    ```\n\n2.  When creating many `MongoClient`\
    \ instances, all resource usage limits apply per `MongoClient` instance. To close\
    \ an instance you need to call `MongoClient.close()` to clean up resources. A\
    \ logical database in MongoDB is represented with the `com.mongodb.client.MongoDatabase`\
    \ interface. Obtain a `com.mongodb.client.MongoDatabase` instance for the “local”\
    \ database, which is a default MongoDB database instance, using the `getDatabase(``String`\
    \ `databaseName)` method in `MongoClient` class.\n\n```\n    MongoDatabase db\
    \ = mongoClient.getDatabase(\"local\");\n    ```\n\n3.  Some of the Mongo client\
    \ API has been modified in version 3.0.x. For example, a database instance is\
    \ represented with the `MongoDatabase` in 3.0.x instead of `com.mongodb.DB`. The\
    \ `getDB(String dbName)` method, which returns a `DB` instance, in `MongoClient`\
    \ is deprecated. A database collection in 3.0.x is represented with `com.mongodb.client.MongoCollection<TDocument>`\
    \ instead of `com.mongodb.DBCollection`. Get all collections from the database\
    \ instance using the `listCollectionNames()` method in `MongoDatabase`.\n\n```\n\
    \    MongoIterable<String> colls = db.listCollectionNames();\n    ```\n\n4.  The\
    \ `listCollectionNames()` method returns a `MongoIterable<String>` of collections.\
    \ Iterate over the collection to output the collection names.\n\n```\n    for\
    \ (String s : colls) {\n    System.out.println(s);\n    }\n    ```\n\n5.  Next,\
    \ create a new `MongoCollection<Document>`instance using the `getCollection(String\
    \ collectionName)` method in `MongoDatabase`. Create a collection of `Document`\
    \ instances called `catalog`. A collection gets created implicitly when the `getCollection(String)`\
    \ method is invoked.\n\n```\n    MongoCollection<Document> coll = db.getCollection(\"\
    catalog\");\n    ```"
