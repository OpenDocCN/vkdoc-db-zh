    \ in the `C:\\php` directory. In a `try`-`catch` statement create a `MongoCollection`\
    \ instance as before.                    ```     $connection = new MongoClient();\
    \     $collection=$connection->local->catalog;     ```           2.  Add two documents\
    \ using the `insert()` method. Do not include the `journal` field in the documents\
    \ added as we shall be adding the field using the `update()` method.         \
    \           ```     $collection->insert(array(\"catalogId\" => 'catalog1', \"\
    publisher\" => 'Oracle Publishing', \"edition\" => 'November December 2013',\"\
    title\" => 'Engineering as a Service',\"author\" => 'David A. Kelly'));     $collection->insert(array(\"\
    catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
    \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert'));     ```           3.  We shall add the `journal`\
    \ field to the documents added using the update operator `$set` in the update\
    \ method with the `multiple` option set to `true`.                    ```    \
    \ $newdata = array('$set' => array(\"journal\" => \"Oracle Magazine\"));     ```\
    \           4.  Invoke the `update()` method using the `$criteria` as documents\
    \ with edition field as November December 2013, the `$newdata` for fields to update,\
    \ and options array with `multiple` set to `true`.                    ```    \
    \ $status=$collection->update(array(\"edition\" => \"November December 2013\"\
    ), $newdata,array(\"multiple\" => true));     ```                    The `updateMultiDocuments.php`\
    \ script is listed:                    ```     <?php     try     {          $connection\
    \ = new MongoClient();     $collection=$connection->local->catalog;          $collection->insert(array(\"\
    catalogId\" => 'catalog1', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
    \ 'November December 2013',\"title\" => 'Engineering as a Service',\"author\"\
    \ => 'David A. Kelly'));          $collection->insert(array(\"catalogId\" => 'catalog2',\
    \ \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December 2013',\"\
    title\" => 'Quintessential and Collaborative',\"author\" => 'Tom Haunert')); \
    \         $newdata = array('$set' => array(\"journal\" => \"Oracle Magazine\"\
    ));     $status=$collection->update(array(\"edition\" => \"November December 2013\"\
    ), $newdata,array(\"multiple\" => true));          var_dump($status);        \
    \  }     catch (MongoConnectionException $e)     {         echo '<p>Couldn\\'t\
    \ connect to mongodb</p>';         exit();     }catch(MongoCursorException $e)\
    \ {      echo $e;         exit();     }     ?>     ```           5.  Run the `updateMultiDocuments.php`\
    \ script in a browser using the URL `http://localhost:8000/updateMultiDocuments.php`.\
    \ In the output `updatedExisting` key value is `true` with `nModified` key value\
    \ as 2, which indicates that two existing documents got updated as shown in [Figure\
    \ 3-23](#part0009.xhtml#Fig23).          ![9781484215999_Fig03-23.jpg](Images/image00500.jpeg)\
    \                    [Figure 3-23](#part0009.xhtml#_Fig23). Updating Multiple\
    \ Documents           6.  Run the `db.catalog.find()` method in Mongo shell to\
    \ list the updated documents. As shown in the output the documents include the\
    \ `journal` field as shown in [Figure 3-24](#part0009.xhtml#Fig24).          ![9781484215999_Fig03-24.jpg](Images/image00501.jpeg)\
    \                    [Figure 3-24](#part0009.xhtml#_Fig24). Listing Updated Documents\
    \              Saving a Document    By default the `insert()` method does not\
    \ add a modified document if the document already exists in the database."
  trans: "# 更新与插入文档\n\n创建一个`$criteria`数组，指定要更新的文档。\n\n```php\n$criteria = array(\"\
    _id\" => new MongoId(\"53f3d425098c6e2410000064\"));\n```\n\n指定一个`$new_object`来替换文档，并调用`update()`方法，同时将`upsert`选项设置为`true`。\n\
    \n```php\n$new_object = array(\"catalogId\" => 'catalog3', \"journal\" => 'Oracle\
    \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013');\n\
    $status=$collection->update($criteria,$new_object, array(\"upsert\" => true));\n\
    ```\n\n`updateDocument.php`脚本如下：\n\n```php\n<?php\ntry\n{\n    $connection = new\
    \ MongoClient();\n    $collection=$connection->local->catalog;\n    $criteria\
    \ = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000043\"));\n    $new_object\
    \ = array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => '11-12-2013',\"title\" => 'Engineering\
    \ As a Service',\"author\" => 'Kelly, David A.', \"updated\"=>true);\n    $status=$collection->update($criteria,$new_object,\
    \ array(\"upsert\" => false));\n    var_dump($status);\n    print '<br/>';\n \
    \   $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000044\"));\n\
    \    $new_object = array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle Magazine',\
    \ \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"title\"\
    \ => 'Quintessential and Collaborative',\"author\" => 'Haunert, Tom', \"updated\"\
    =>true);\n    $status=$collection->update($criteria,$new_object, array(\"upsert\"\
    \ => false));\n    var_dump($status);\n    print '<br/>';\n    $criteria = array(\"\
    _id\" => new MongoId(\"53f3d425098c6e2410000064\"));\n    $new_object = array(\"\
    catalogId\" => 'catalog3', \"journal\" => 'Oracle Magazine', \"publisher\" =>\
    \ 'Oracle Publishing', \"edition\" => '11-12-2013');\n    $status=$collection->update($criteria,$new_object,\
    \ array(\"upsert\" => true));\n    var_dump($status);\n}\ncatch ( MongoConnectionException\
    \ $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}\n\
    catch(MongoCursorException $e) {\n    echo '<p>w option is set and the write has\
    \ failed</p>';\n    exit();\n}\n?>\n```\n\n在浏览器中运行`updateDocument.php`脚本，URL 为`http://localhost:8000/updateDocument.php`。两个文档被更新，一个文档被插入（upserted）。在状态数组中，两个`updatedExisting`键为`true`，一个为`false`，如图\
    \ 3-21 所示。\n\n![9781484215999_Fig03-21.jpg](img/image00498.jpeg)\n图 3-21. 更新文档\n\
    \n在 Mongo shell 中运行以下 JavaScript 方法：\n\n```javascript\n>use local\n>db.catalog.find()\n\
    ```\n\n更新/插入的文档将被列出，如图 3-22 所示。\n\n![9781484215999_Fig03-22.jpg](img/image00499.jpeg)\n\
    图 3-22. 列出更新的文档\n\n## 更新多个文档\n\n在上一节中，我们提到了`update()`方法中的`multiple`选项，用于更新多个文档。在本节中，我们将使用`multiple`选项。\n\
    \n1.  在`C:\\php`目录中创建一个 PHP 脚本`updateMultiDocuments.php`。在`try`-`catch`语句中像之前一样创建一个`MongoCollection`实例。\n\
    \n    ```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  使用`insert()`方法添加两个文档。在添加的文档中不要包含`journal`字段，因为我们将使用`update()`方法添加该字段。\n\
    \n    ```php\n    $collection->insert(array(\"catalogId\" => 'catalog1', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Engineering as a Service',\"author\" => 'David A. Kelly'));\n    $collection->insert(array(\"\
    catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
    \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert'));\n    ```\n\n3.  我们将使用更新操作符`$set`在`update()`方法中将`journal`字段添加到这些文档中，同时将`multiple`选项设置为`true`。\n\
    \n    ```php\n    $newdata = array('$set' => array(\"journal\" => \"Oracle Magazine\"\
    ));\n    ```\n\n4.  调用`update()`方法，使用`$criteria`作为`edition`字段为`November December\
    \ 2013`的文档，`$newdata`作为要更新的字段，以及`multiple`设置为`true`的选项数组。\n\n    ```php\n    $status=$collection->update(array(\"\
    edition\" => \"November December 2013\"), $newdata,array(\"multiple\" => true));\n\
    \    ```\n\n    `updateMultiDocuments.php`脚本如下：\n\n    ```php\n    <?php\n   \
    \ try\n    {\n        $connection = new MongoClient();\n        $collection=$connection->local->catalog;\n\
    \        $collection->insert(array(\"catalogId\" => 'catalog1', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Engineering as a Service',\"author\" => 'David A. Kelly'));\n        $collection->insert(array(\"\
    catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
    \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert'));\n        $newdata = array('$set' => array(\"journal\"\
    \ => \"Oracle Magazine\"));\n        $status=$collection->update(array(\"edition\"\
    \ => \"November December 2013\"), $newdata,array(\"multiple\" => true));\n   \
    \     var_dump($status);\n    }\n    catch (MongoConnectionException $e)\n   \
    \ {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n \
    \   }\n    catch(MongoCursorException $e) {\n        echo $e;\n        exit();\n\
    \    }\n    ?>\n    ```\n\n5.  在浏览器中运行`updateMultiDocuments.php`脚本，URL 为`http://localhost:8000/updateMultiDocuments.php`。在输出中，`updatedExisting`键值为`true`，`nModified`键值为\
    \ 2，这表明两个现有文档被更新，如图 3-23 所示。\n\n    ![9781484215999_Fig03-23.jpg](img/image00500.jpeg)\n\
    \    图 3-23. 更新多个文档\n\n6.  在 Mongo shell 中运行`db.catalog.find()`方法以列出更新的文档。如输出所示，文档包含了`journal`字段，如图\
    \ 3-24 所示。\n\n    ![9781484215999_Fig03-24.jpg](img/image00501.jpeg)\n    图 3-24.\
    \ 列出更新的文档\n\n## 保存文档\n\n默认情况下，`insert()`方法不会添加已存在于数据库中的文档。"
- fmt: "## 保存文档\n\n`MongoCollection` 类提供了另一种插入已修改文档的方法。`MongoCollection::save()` 方法将文档保存到集合中。**Save**\
    \ 与 **insert** 的区别在于，要保存的文档可能已存在于数据库中。在本节中，我们将使用 `insert()` 方法添加两个文档，然后调用 `save()`\
    \ 方法来保存这些文档，并修改其中某些字段的值。save 方法的语法如下：\n\n```text\nMongoCollection::save ( array|object\
    \ $document [, array $options = array() ] )\n```\n\n1.  在 `C:\\php` 目录下创建一个 PHP\
    \ 脚本 `saveDocument.php`。在 `try`-`catch` 语句中创建一个 `MongoCollection` 实例。\n    ```php\n\
    \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  使用 `insert()` 方法添加两个文档。\n    ```php\n    $doc1 = array(\"catalogId\"\
    \ => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly');\n    $status=$collection->insert($doc1);\n    $doc2\
    \ =array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle Magazine', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Quintessential and Collaborative',\"author\" => 'Tom Haunert');\n    $status=$collection->insert($doc2);\n\
    \    ```\n\n3.  随后修改这两个文档中的部分字段值，并在修改后的文档上调用 `save()` 方法。\n    ```php\n    $doc1['edition']=\
    \ '11-12-2013';\n    $doc1['author'] = 'Kelly, David A.';\n    $doc1['updated']=true;\n\
    \    $status=$collection->save($doc1);\n    $doc2['edition']='11-12-2013';\n \
    \   $doc2['author'] = 'Haunert, Tom';\n    $doc2['updated']=true;\n    $status=$collection->save($doc2);\n\
    \    ```\n    `save()` 方法保存了带有修改后字段值的文档。如果我们使用 `insert` 方法来保存修改后的文档，将会收到错误。`saveDocument.php`\
    \ 脚本如下：\n    ```php\n    <?php\n    try\n    {\n    $connection = new MongoClient();\n\
    \    $collection=$connection->local->catalog;\n    $doc1 = array(\"catalogId\"\
    \ => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly');\n    $status=$collection->insert($doc1);\n    var_dump($status);\n\
    \    print '<br/>';\n    $doc2 =array(\"catalogId\" => 'catalog2', \"journal\"\
    \ => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Quintessential and Collaborative',\"author\" =>\
    \ 'Tom Haunert');\n    $status=$collection->insert($doc2);\n    var_dump($status);\n\
    \    print '<br/>';\n    $doc1['edition']= '11-12-2013';\n    $doc1['author']\
    \ = 'Kelly, David A.';\n    $doc1['updated']=true;\n    $status=$collection->save($doc1);\n\
    \    var_dump($status);\n    print '<br/>';\n    $doc2['edition']='11-12-2013';\n\
    \    $doc2['author'] = 'Haunert, Tom';\n    $doc2['updated']=true;\n    $status=$collection->save($doc2);\n\
    \    var_dump($status);\n    print '<br/>';\n    }catch ( MongoConnectionException\
    \ $e )\n    {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n\
    \    }catch(MongoCursorException $e) {\n     echo '<p>w option is set and the\
    \ write has failed</p>';\n        exit();\n    }\n    ?>\n    ```\n\n4.  在浏览器中运行\
    \ PHP 脚本，URL 为 `http://localhost:8000/saveDocument.php`。两个文档被添加，随后这两个文档被更新，如 [图\
    \ 3-25](#part0009.xhtml#Fig25) 中 `updatedExisting` 键值为 true 所示。\n    ![9781484215999_Fig03-25.jpg](Images/image00502.jpeg)\n\
    \    [图 3-25](#part0009.xhtml#_Fig25). 保存文档\n\n5.  在 Mongo shell 中运行 JavaScript\
    \ 方法 `db.catalog.find()` 以列出更新后的文档，如 [图 3-26](#part0009.xhtml#Fig26) 所示。\n   \
    \ ![9781484215999_Fig03-26.jpg](Images/image00503.jpeg)\n    [图 3-26](#part0009.xhtml#_Fig26).\
    \ 列出已保存的文档\n\n## 删除文档\n\n`MongoCollection::remove()` 方法用于删除文档，其语法如下：\n\n```text\n\
    MongoCollection::remove ([ array $criteria = array() [, array $options = array()\
    \ ]] )\n```\n\n方法参数 `$criteria` 是要删除的文档的查询条件。大多数选项，如 `w`、`j`、`fsync`，与其他方法相同。`remove()`\
    \ 方法提供了 `justOne` 选项来仅删除一个文档。在本节中，我们将从集合中删除一个文档。\n\n1.  首先，使用 `addDocumentBatch.php`\
    \ 脚本添加一些文档，如 [图 3-27](#part0009.xhtml#Fig27) 所示。\n    ![9781484215999_Fig03-27.jpg](Images/image00504.jpeg)\n\
    \    [图 3-27](#part0009.xhtml#_Fig27). 使用 addDocumentBatch.php 添加文档\n    mongo\
    \ shell 中的 `db.catalog.find()` 方法应列出添加的两个文档，如 [图 3-28](#part0009.xhtml#Fig28)\
    \ 所示。\n    ![9781484215999_Fig03-28.jpg](Images/image00505.jpeg)\n    [图 3-28](#part0009.xhtml#_Fig28).\
    \ 列出使用 addDocumentBatch.php 添加的文档\n\n2.  在 `C:\\php` 目录下创建一个 PHP 脚本 `removeDocument.php`。像之前一样创建一个\
    \ `MongoCollection` 实例。\n    ```php\n    $connection = new MongoClient();\n  \
    \  $collection=$connection->local->catalog;\n    ```\n\n3.  使用要删除的文档的 `_id` 作为方法参数调用\
    \ `remove` 方法。`_id` 字段必须以 `MongoId` 实例的形式提供，对于不同用户会有所不同。\n    ```php\n    $id\
    \ = '55bba8d9098c6e1c19000049';\n    $status=$collection->remove(array('_id' =>\
    \ new MongoId($id)));\n    ```\n    `removeDocument.php` 脚本如下：\n    ```php\n \
    \   <?php\n    try\n    {\n    $id = '55bba8d9098c6e1c19000049';\n    $connection\
    \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    $status=$collection->remove(array('_id'\
    \ => new MongoId($id)));\n    var_dump($status);\n    }catch (MongoConnectionException\
    \ $e)\n    {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n\
    \    }\n    ?>\n    ```\n\n4.  在浏览器中运行 `removeDocument.php` 脚本，URL 为 `http://localhost:8000/removeDocument.php`\
    \ 以删除文档，如 [图 3-29](#part0009.xhtml#Fig29) 所示。\n    ![9781484215999_Fig03-29.jpg](Images/image00506.jpeg)\n\
    \    [图 3-29](#part0009.xhtml#_Fig29). 删除文档\n\n如果再次运行 `db.catalog.find()` 方法，则只列出一个文档，如\
    \ [图 3-30](#part0009.xhtml#Fig30) 中 `db.catalog.find()` 的第二次运行结果所示。\n![9781484215999_Fig03-30.jpg](Images/image00507.jpeg)\n\
    [图 3-30](#part0009.xhtml#_Fig30). 删除两个文档中的一个后列出文档\n\n`remove()` 方法可用于删除所有文档。由于我们通过运行\
    \ `addDocumentBatch.php` 脚本添加的两个文档中只删除了一个，我们需要向 `catalog` 集合中添加更多文档来演示删除所有文档，因为仅删除一个文档无法证明所有或多个文档已被删除。\n\
    \n1.  再次运行 `addDocumentBatch.php` 脚本以再添加两个文档，使文档总数达到三个。\n2.  接下来，在 `C:\\php` 目录下创建一个\
    \ PHP 脚本 `removeAllDocuments.php`。像删除单个文档一样调用 `remove()` 方法，但提供一个空数组。\n    ```php\n\
    \    $status=$collection->remove(array());\n    ```\n    `removeAllDocuments.php`\
    \ 脚本如下：\n    ```php\n    <?php\n    try\n    {\n    $connection = new MongoClient();\n\
    \    $collection=$connection->local->catalog;\n    $status=$collection->remove(array());\n\
    \    var_dump($status);\n    }catch (MongoConnectionException $e)\n    {\n   \
    \     echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n    }\n \
    \   ?>\n    ```"
  raw: 'The `MongoCollection` class provides another method to insert a modified document.
    The `MongoCollection::save()` method saves a document to a collection. *Save*
    is different from *insert* in that the document to be saved may already exist
    in the database. In this section we shall add two documents using the `insert()`
    method and subsequently invoke the `save()` method to save the same documents
    with modified field values for some of the fields. The syntax of the save method
    is as follows.    ``` MongoCollection::save ( array|object $document [, array
    $options = array() ] ) ```    1.  Create a PHP script `saveDocument.php` in the
    `C:\php` directory. In the `try`-`catch` statement create a `MongoCollection`
    instance.                    ```     $connection = new MongoClient();     $collection=$connection->local->catalog;     ```           2.  Add
    two documents using the `insert()` method.                    ```     $doc1 = array("catalogId"
    => ''catalog1'', "journal" => ''Oracle Magazine'', "publisher" => ''Oracle Publishing'',
    "edition" => ''November December 2013'',"title" => ''Engineering as a     Service'',"author"
    => ''David A. Kelly'');     $status=$collection->insert($doc1);     $doc2 =array("catalogId"
    => ''catalog2'', "journal" => ''Oracle Magazine'', "publisher" => ''Oracle Publishing'',
    "edition" => ''November December 2013'',"title" => ''Quintessential and Collaborative'',"author"
    => ''Tom Haunert'');     $status=$collection->insert($doc2);     ```           3.  Subsequently
    modify some of the field values in the two documents and invoke the `save()` method
    on the modified documents.                    ```     $doc1[''edition'']= ''11-12-2013'';     $doc1[''author'']
    = ''Kelly, David A.'';     $doc1[''updated'']=true;     $status=$collection->save($doc1);     $doc2[''edition'']=''11-12-2013'';     $doc2[''author'']
    = ''Haunert, Tom'';     $doc2[''updated'']=true;     $status=$collection->save($doc2);     ```                    The
    `save()` method saves the documents with the modified field values. If we had
    used the `insert` method to save the modified documents we would have received
    an error. The `saveDocument.php` script is listed:                    ```     <?php     try     {     $connection
    = new MongoClient();     $collection=$connection->local->catalog;     $doc1 = array("catalogId"
    => ''catalog1'', "journal" => ''Oracle Magazine'', "publisher" => ''Oracle     Publishing'',
    "edition" => ''November December 2013'',"title" => ''Engineering as a     Service'',"author"
    => ''David A. Kelly'');     $status=$collection->insert($doc1);     var_dump($status);     print
    ''<br/>'';     $doc2 =array("catalogId" => ''catalog2'', "journal" => ''Oracle
    Magazine'', "publisher" => ''Oracle Publishing'', "edition" => ''November December
    2013'',"title" => ''Quintessential and Collaborative'',"author" => ''Tom Haunert'');     $status=$collection->insert($doc2);     var_dump($status);     print
    ''<br/>'';     $doc1[''edition'']= ''11-12-2013'';     $doc1[''author''] = ''Kelly,
    David A.'';     $doc1[''updated'']=true;          $status=$collection->save($doc1);     var_dump($status);     print
    ''<br/>'';          $doc2[''edition'']=''11-12-2013'';     $doc2[''author''] = ''Haunert,
    Tom'';     $doc2[''updated'']=true;     $status=$collection->save($doc2);     var_dump($status);     print
    ''<br/>'';          }catch ( MongoConnectionException $e )     {         echo
    ''<p>Couldn\''t connect to mongodb</p>'';         exit();     }catch(MongoCursorException
    $e) {      echo ''<p>w option is set and the write has failed</p>'';         exit();     }     ?>     ```           4.  Run
    the PHP script in the browser with the URL `http://localhost:8000/saveDocument.php`.
    Two documents get added. Subsequently the two documents get updated as indicated
    by the `updatedExisting` key value true in [Figure 3-25](#part0009.xhtml#Fig25).          ![9781484215999_Fig03-25.jpg](Images/image00502.jpeg)                    [Figure
    3-25](#part0009.xhtml#_Fig25). Saving Documents           5.  Run the JavaScript
    method `db.catalog.


    find()` in Mongo shell to list the updated documents as shown in [Figure 3-26](#part0009.xhtml#Fig26).          ![9781484215999_Fig03-26.jpg](Images/image00503.jpeg)                    [Figure
    3-26](#part0009.xhtml#_Fig26). Listing Saved Documents              Removing a
    Document    The `MongoCollection::remove()` method to remove a document has the
    following syntax.    `MongoCollection::remove ([ array $criteria = array() [,
    array $options = array() ]] )`    The method parameter `$criteria` is the query
    criteria for the document/s to remove. Most of the options such as `w`, `j`, `fsync`,
    are the same as the other methods. The `remove()` method provides the `justOne`
    option to remove just one document. In this section we shall remove a document
    from a collection.    1.  First, add some documents using the `addDocumentBatch.php`
    script as shown in [Figure 3-27](#part0009.xhtml#Fig27).                    ![9781484215999_Fig03-27.jpg](Images/image00504.jpeg)                    [Figure
    3-27](#part0009.xhtml#_Fig27). Adding Documents with addDocumentBatch.php                    The
    `db.catalog.find()` method in mongo shell should list the two documents added
    as shown in [Figure 3-28](#part0009.xhtml#Fig28).                    ![9781484215999_Fig03-28.jpg](Images/image00505.jpeg)                    [Figure
    3-28](#part0009.xhtml#_Fig28). Listing Documents added with addDocumentBatch.php           2.  Create
    a PHP script `removeDocument.php` in the `C:\php` directory. Create a `MongoCollection`
    instance as before.                    ```     $connection = new MongoClient();     $collection=$connection->local->catalog;     ```           3.  Invoke
    the `remove` method with the `_id` for the document to remove as method arg. The
    `_id` field must be supplied as a `MongoId` instance and would be different for
    different users.                    ```     $id = ''55bba8d9098c6e1c19000049'';     $status=$collection->remove(array(''_id''
    => new MongoId($id)));     ```                    The `removeDocument.php` script
    is listed:                    ```     <?php     try     {     $id = ''55bba8d9098c6e1c19000049'';     $connection
    = new MongoClient();     $collection=$connection->local->catalog;     $status=$collection->remove(array(''_id''
    => new MongoId($id)));     var_dump($status);     }catch (MongoConnectionException
    $e)     {         echo ''<p>Couldn\''t connect to mongodb</p>'';         exit();     }     ?>     ```           4.  Run
