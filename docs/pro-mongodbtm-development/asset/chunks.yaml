    \ | string | 数据库名称。 |\n| `options` | object | 与关联实例相关的选项。 |\n| `native_parser`\
    \ | boolean | 获取参数 native_parser 的当前值。 |\n| `slaveOk` | boolean | 获取 `slaveOk`\
    \ 的当前值。 |\n| `writeConcern` | object | 获取写关注的当前值。 |\n\n`Db` 类支持的一些方法在表 5-10 中讨论。\n\
    \n表 5-10. Db 类方法\n\n| 方法 | 返回类型 | 描述 |\n| --- | --- | --- |\n| `addUser(username,\
    \ password, options, callback)` | 如果未指定回调则返回 Promise。 | 向数据库添加用户。 |\n| `admin()`\
    \ | Admin db。 | 返回 Admin 实例。 |\n| `authenticate(username, password, options, callback)`\
    \ | 如果未指定回调则返回 Promise。 | 验证用户身份。 |\n| `close(force, callback)` | Object。 | 关闭数据库及底层连接。\
    \ |\n| `collection(name, options, callback)` | Collection。 | 获取一个集合。 |\n| `collections(callback)`\
