    \ 被设置为 `:after`），如 图 4-31 所示。\n\n![9781484215999_Fig04-31.jpg](img/image00539.jpeg)\n\
    \n图 4-31. 查找并更新文档\n\n当在 Mongo shell 中运行 `db.mongodb.find()` 命令时，更新后的文档会被列出，如 图\
    \ 4-32 所示。\n\n![9781484215999_Fig04-32.jpg](img/image00540.jpeg)\n\n图 4-32. 列出更新后的文档\n\
    \n`updateDocument.rb` 脚本如下所列，其中五个示例的代码都被注释掉了。通过取消注释示例代码来运行脚本。\n\n```\nrequire\
    \ 'mongo'\ninclude Mongo\n\nclient = Mongo::Client.new([ '127.0.0.1:27017' ],\
    \ :database => 'test')\nclient = client.use(:local)\ndb = client.database\ncollection\
    \ = db.collection(\"mongodb\")\n\ncollection.create\n\ndocument1 = {\n  \"catalogId\"\
    \ => 1,\n  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" => \"Oracle Publishing\"\
    ,\n  \"edition\" => \"November December 2013\",\n  \"title\" => \"Engineering\
    \ as a Service\",\n  \"author\" => \"David A. Kelly\"\n}\n\ndocument2 = {\n  \"\
    catalogId\" => 2,\n  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" => \"\
    Oracle Publishing\",\n  \"edition\" => \"November December 2013\",\n  \"title\"\
    \ => \"Quintessential and Collaborative\",\n  \"author\" => \"Tom Haunert\"\n\
    }\n\ncollection.insert_many([document1, document2])\n\nprint \"\\n\"\n\ncollection\
    \ = client[:mongodb]\n\n#更新示例 1\n#result = collection.find(:journal => 'Oracle\
    \ Magazine').update_one(\"$inc\" => { :catalogId => 1 })\n#print \"Number of documents\
    \ updated: \"\n#print \"\\n\"\n#print result.n\n#print \"\\n\"\n\n#更新示例 2\n#result\
    \ = collection.find(:publisher => 'Oracle Publishing').update_many('$set' => {\
    \ publisher: 'OraclePublishing'})\n#print \"Number of documents updated: \"\n\
    #print \"\\n\"\n#print result.n\n#print \"\\n\"\n\n#更新示例 3\n#result = collection.find(:edition\
    \ => 'November December 2013').replace_one(:edition => '11-12-2013')\n#print \"\
    Number of documents updated: \"\n#print \"\\n\"\n#print result.n\n#print \"\\\
    n\"\n\n#更新示例 4\n#document = collection.find(:journal => 'Oracle Magazine').find_one_and_replace({:journal\
    \ => 'OracleMagazine'}, :return_document => :after)\n#print \"Document after being\
    \ updated: \"\n#print \"\\n\"\n#print document\n#print \"\\n\"\n\n#更新示例 5\n#document\
    \ = collection.find(:edition => 'November December 2013').find_one_and_update('$set'\
    \ => {:edition=>'11-12-2013'})\n#print \"Document before being updated: \"\n#print\
    \ \"\\n\"\n#print document\n#print \"\\n\"\n```\n\n## 删除文档\n\n在本节中，我们将从 MongoDB\
    \ 集合中删除文档。用于删除文档的方法包含在 表 4-10 中（参见 “查找多个文档” 部分）。\n\n1.  创建一个 Ruby 脚本 `deleteDocument.rb`，并为\
    \ `mongodb` 集合创建一个 `Collection` 实例。\n2.  使用 `insert_many()` 方法向集合中添加四个文档。\n\n\
    \    ```\n    collection.create\n\n    document1 = {\n      \"catalogId\" => 1,\n\
    \      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" => \"November December 2013\",\n      \"title\" => \"Engineering\
    \ as a Service\",\n      \"author\" => \"David A. Kelly\"\n    }\n\n    document2\
    \ = {\n      \"catalogId\" => 2,\n      \"journal\" => \"Oracle Magazine\",\n\
    \      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" => \"November\
    \ December 2013\",\n      \"title\" => \"Quintessential and Collaborative\",\n\
    \      \"author\" => \"Tom Haunert\"\n    }\n\n    document3 = {\n      \"catalogId\"\
    \ => 3,\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"\
    Oracle Publishing\",\n      \"edition\" => \"November December 2013\",\n     \
    \ \"title\" => \"\",\n      \"author\" => \"\"\n    }\n\n    document4 = {\n \
    \     \"catalogId\" => 4,\n      \"journal\" => \"Oracle Magazine\",\n      \"\
    publisher\" => \"Oracle Publishing\",\n      \"edition\" => \"November December\
    \ 2013\",\n      \"title\" => \"\",\n      \"author\" => \"\"\n    }\n\n    collection.insert_many([document1,\
    \ document2, document3, document4])\n    ```\n\n3.  在 `mongodb` 集合上创建一个 `Collection`\
    \ 实例。\n\n    ```\n    collection = client[:mongodb]\n    ```\n\n4.  随后使用 `delete_one()`\
    \ 方法删除其中一个文档。`find()` 方法的过滤器被设置为查找所有 `edition` 字段为 `'November December 2013'`\
    \ 的文档。\n\n    ```\n    print collection.find(:edition => 'November December 2013').delete_one\n\
    \    ```\n\n    作为另一个例子，使用 `find_one_and_delete()` 方法删除一个文档。\n\n    ```\n    print\
    \ collection.find(:journal => 'Oracle Magazine').find_one_and_delete\n    ```\n\
    \n    作为第三个例子，使用 `delete_many()` 方法删除多个文档，其 `find()` 方法的过滤器被设置为查找所有 `edition`\
    \ 字段为 'November December 2013' 的文档。\n\n    ```\n    print collection.find(:edition\
    \ => 'November December 2013').delete_many\n    ```\n\n5.  `deleteDocument.rb`\
    \ 脚本如下所列，其中一些代码被注释掉了。首先，取消前两个删除示例的注释并运行脚本。随后删除 `mongodb` 集合，并运行脚本执行第三个示例以删除所有文档。\n\
    \n    ```\n    require 'mongo'\n    include Mongo\n    client = Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    client = client.use(:local)\n\
    \    db = client.database\n    collection = db.collection(\"mongodb\")\n    #collection.create\n\
    \    document1 = {\n      \"catalogId\" => 1,\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" => \"November\
    \ December 2013\",\n      \"title\" => \"Engineering as a Service\",\n      \"\
    author\" => \"David A. Kelly\"\n    }\n    document2 = {\n      \"catalogId\"\
    \ => 2,\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"\
    Oracle Publishing\",\n      \"edition\" => \"November December 2013\",\n     \
    \ \"title\" => \"Quintessential and Collaborative\",\n      \"author\" => \"Tom\
    \ Haunert\"\n    }\n    document3 = {\n      \"catalogId\" => 3,\n      \"journal\"\
    \ => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\",\n   \
    \   \"edition\" => \"November December 2013\",\n      \"title\" => \"\",\n   \
    \   \"author\" => \"\"\n    }\n    document4 = {\n      \"catalogId\" => 4,\n\
    \      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" => \"November December 2013\",\n      \"title\" => \"\",\n\
    \      \"author\" => \"\"\n    }\n\n    collection.insert_many([document1, document2,\
    \ document3, document4])\n    print \"\\n\"\n    collection = client[:mongodb]\n\
    \    #print collection.find(:edition => 'November December 2013').delete_one\n\
    \    print \"\\n\"\n    #print collection.find(:journal => 'Oracle Magazine').find_one_and_delete\n\
    \    print \"\\n\"\n    #print collection.find(:edition => 'November December\
    \ 2013').delete_many\n    print \"\\n\"\n    ```\n\n6.  使用 `db.mongodb.drop()`\
    \ 删除 `mongodb` 集合。\n"
- fmt: "# 删除文档与批量操作\n\n取消注释 `delete_one` 和 `find_one_and_delete_one`，并运行 `deleteDocument.rb`\
    \ 脚本来删除四个文档中的两个，一个使用 `each` 配合 `delete_one`，另一个使用 `find_one_and_delete`。脚本的输出如\
    \ [图 4-33](#part0010.xhtml#Fig33) 所示。\n![9781484215999_Fig04-33.jpg](Images/image00541.jpeg)\n\
    [图 4-33](#part0010.xhtml#_Fig33)：使用 `delete_one` 和 `find_one_and_delete` 删除文档\n\
    \n7. 在 Mongo shell 中运行 `db.mongodb.find()` 命令以列出剩余的两个文档，如 [图 4-34](#part0010.xhtml#Fig34)\
    \ 所示。\n![9781484215999_Fig04-34.jpg](Images/image00542.jpeg)\n[图 4-34](#part0010.xhtml#_Fig34)：列出四个文档中的两个（已删除两个）\n\
    \n8. 在 Mongo shell 中使用 `db.mongodb.drop()` 命令删除 `mongodb` 集合，然后再次运行 `deleteDocument.rb`\
    \ 脚本，这次仅使用 `delete_many` 的第三个示例。`deleteDocument.rb` 脚本的输出如 [图 4-35](#part0010.xhtml#Fig35)\
    \ 所示。\n![9781484215999_Fig04-35.jpg](Images/image00543.jpeg)\n[图 4-35](#part0010.xhtml#_Fig35)：使用\
    \ `delete_many` 删除多个文档\n\n在 Mongo shell 中运行 `db.mongodb.find()` 命令时，不会列出任何文档，如\
    \ [图 4-36](#part0010.xhtml#Fig36) 所示。\n![9781484215999_Fig04-36.jpg](Images/image00544.jpeg)\n\
    [图 4-36](#part0010.xhtml#_Fig36)：列出空集合\n\n## 执行批量操作\n\nMongoDB Ruby 驱动通过 `Mongo::Collection`\
    \ 类中的 `bulk_write(operations, options)` 方法支持批量操作。可以使用 `bulk_write()` 方法调用一系列操作。每个操作使用一个文档定义，其中一个键在\
    \ [表 4-11](#part0010.xhtml#Tab11) 中讨论。\n[表 4-37](#part0010.xhtml#_Tab11)：批量操作\n\
    \n| 批量操作键          | 描述               |\n| ------------------- | ------------------\
    \ |\n| `insert_one`        | 插入一个文档       |\n| `delete_one`        | 删除一个文档  \
    \     |\n| `delete_many`       | 删除多个文档       |\n| `replace_one`       | 替换一个文档\
    \       |\n| `update_one`        | 更新一个文档       |\n| `update_many`       | 更新多个文档\
    \       |\n\n1. 在 `C:\\Ruby21-x64\\mongodbscripts` 目录下创建一个 Ruby 脚本 `bulk.rb`。\n\
    2. 如果 `mongodb` 集合已存在，则使用 `db.mongodb.drop()` 将其删除，并在脚本中创建该集合。\n3. 使用 `insert_many()`\
    \ 方法插入多个文档。\n    ```\n    collection.insert_many([document1,document2,document3,document4])\n\
    \    ```\n4. 为 `mongodb` 集合创建一个集合对象。\n    ```\n    collection = client[:mongodb]\n\
    \    ```\n5. 使用 `insert_one`、`update_one` 和 `replace_one` 批量操作调用 `bulk_write()`\
    \ 方法。将第二个参数设置为 `:ordered => true` 以指示批量操作按指定顺序执行（这也是默认行为）。\n\n    `bulk.rb` 脚本如下所示。\n\
    \    ```\n    require 'mongo'\n    include Mongo\n\n    client =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    client=client.use(:local)\n \
    \   db=client.database\n    collection=db.collection(\"mongodb\")\n\n    collection.create\n\
    \n    document1={\n      \"catalogId\" => 1,\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
    \ December 2013\",\n      \"title\" => \"Engineering as a Service\",\n      \"\
    author\" =>  \"David A. Kelly\"\n    }\n\n    document2={\n      \"catalogId\"\
    \ => 2,\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"\
    Oracle Publishing\",\n      \"edition\" =>  \"November December 2013\",\n    \
    \  \"title\" => \"Quintessential and Collaborative\",\n      \"author\" =>  \"\
    Tom Haunert\"\n    }\n\n    document3={\n      \"catalogId\" => 3,\n      \"journal\"\
    \ => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\",\n   \
    \   \"edition\" =>  \"November December 2013\",\n      \"title\" => \"\",\n  \
    \    \"author\" => \"\"\n    }\n\n    document4={\n      \"catalogId\" => 4,\n\
    \      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" =>  \"November December 2013\",\n      \"title\" => \"\"\
    ,\n      \"author\" => \"\"\n    }\n\n    collection.insert_many([document1,document2,document3,document4])\n\
    \n    print \"\\n\"\n\n    collection = client[:mongodb]\n\n    collection.bulk_write([\
    \ { :insert_one => { :catalogId => 5 }\n                    },\n             \
    \       { :update_one => { :find => { :catalogId => 1 },\n                   \
    \                    :update => {'$set' => { :catalogId => 6 } }\n           \
    \                          }\n                    },\n                    { :replace_one\
    \ => { :find => { :catalogId => 2 },\n                                       \
    \ :replacement => { :catalogId => 7 }\n                                      }\n\
    \                    }\n                  ],\n                  :ordered => true\
    \ )\n    ```\n6. 按如下方式运行 `bulk.rb` 脚本。\n    ```\n    >ruby bulk.rb\n    ```\n\
    \    `bulk.rb` 脚本的输出如 [图 4-37](#part0010.xhtml#Fig37) 所示。\n    ![9781484215999_Fig04-37.jpg](Images/image00545.jpeg)\n\
    \    [图 4-37](#part0010.xhtml#_Fig37)：运行 bulk.rb 脚本\n7. 随后，使用 `db.mongodb.find()`\
    \ 方法列出 `mongodb` 集合中的文档。如 [图 4-38](#part0010.xhtml#Fig38) 所示，添加了一个 `catalogId`\
    \ 为 5 的新文档。`catalogId` 1 已更新为 6，而 `catalogId` 为 2 的文档已被 `catalogId` 为 7 的文档替换。\n\
    \    ![9781484215999_Fig04-38.jpg](Images/image00546.jpeg)\n    [图 4-38](#part0010.xhtml#_Fig38)：批量操作后列出文档\n\
    \n## 总结\n\n在本章中，我们使用 Ruby 驱动连接到 MongoDB 服务器，并对数据库执行 CRUD（创建、读取、更新、删除）操作。我们演示了针对单个文档和多个文档的每种\
    \ CRUD 操作。在下一章中，我们将使用 Node.js 驱动连接到 MongoDB 并执行类似的 CRUD 操作。\n\n# 第五章 使用 Node.js\
    \ 操作 MongoDB\n\n传统的基于脚本语言的 Web 应用程序构建在客户端/服务器模型上，需要客户端脚本语言（如 JavaScript）和服务器端脚本语言（如\
    \ PHP），并利用 Web 服务器。Node.js 的不同之处在于，它是基于 V8 JavaScript 引擎构建的服务器端脚本。V8 是 Google\
    \ 用于 Google Chrome 的开源 JavaScript 引擎。Node.js 基于事件驱动模型，用于开发快速、可扩展、数据密集型、实时网络应用程序。在本章中，我们将讨论使用\
    \ Node.js（或简称 Node）访问 MongoDB，以及使用 MongoDB 的 Node.js 驱动在数据库中进行数据修改。本章涵盖以下主题：\n\
    \n*   入门\n*   使用连接\n*   使用文档\n\n## 入门\n\n在以下小节中，我们将介绍 MongoDB 的 Node.js 驱动并设置环境。\n\
    \n### Node.js 驱动概述\n\nMongoDB 的 Node.js 驱动提供了一个 API，用于连接到 MongoDB 服务器并在服务器上执行不同的操作，例如添加文档或查找文档。Node.js\
    \ 驱动中的主要类包括..."
