    \ = ops.updateMulti(query,Update.update(\"edition\", \"11-12-2013\"), Catalog.class);\n\
    \    System.out.println(result);\n    ```\n5.  随后调用 `findAll()` 方法查找并输出所有文档的字段值，以验证文档已更新。`updateMulti()`\
    \ 方法如下：\n    ```java\n    private static void updateMulti() {\n        createCatalogInstances();\n\
    \        ops.save(catalog1);\n        ops.save(catalog2);\n        DBObject dbObject\
    \ = new BasicDBObject(\"edition\",\n                \"November-December 2013\"\
    );\n        BasicQuery query = new BasicQuery(dbObject);\n        WriteResult\
    \ result = ops.updateMulti(query,\n                Update.update(\"edition\",\
    \ \"11-12-2013\"), Catalog.class);\n        System.out.println(result);\n    \
    \    List<Catalog> list = ops.findAll(Catalog.class);\n        Iterator<Catalog>\
    \ iter = list.iterator();\n        while (iter.hasNext()) {\n            Catalog\
    \ catalog = iter.next();\n            System.out.println(\"Journal : \" + catalog.getJournal());\n\
    \            System.out.println(\"Publisher : \" + catalog.getPublisher());\n\
    \            System.out.println(\"Edition : \" + catalog.getEdition());\n    \
    \        System.out.println(\"Title : \" + catalog.getTitle());\n            System.out.println(\"\
    Author : \" + catalog.getAuthor());\n        }\n    }\n    ```\n6.  在 Mongo shell\
    \ 中使用 `db.catalog.drop()` 方法删除任何先前添加的 `catalog` 集合。\n\n当运行 `App` 应用程序调用 `updateMulti()`\
    \ 方法时，所有符合指定查询条件的文档都会被更新。随后调用 `findAll()` 会列出修改后的文档，其中 `edition` 字段已在所有文档中更新，而不仅仅是第一个文档，如\
    \ 图 10-18 所示。\n\n![9781484215999_Fig10-18.jpg](img/image00679.jpeg)\n**图 10-18.\
    \ 使用 updateMulti() 方法更新多个文档**\n\n`updateMulti()` 方法调用中的查询文档也可以使用条件定义来创建，如下所示：\n\
    ```java\nWriteResult result = ops.updateMulti(new Query(Criteria.where(\"edition\"\
    ).is(\"November-December 2013\")), Update.update(\"edition\", \"11-12-2013\"),\
    \ Catalog.class);\n```\n\n## 删除文档\n\n在本节中，我们将从 `catalog` 集合中删除文档。`MongoOperations`\
    \ 接口提供了重载的 `remove()` 方法，用于根据指定查询删除文档，如 表 10-15 所述。\n\n**表 10-15. 重载的 remove()\
    \ 方法**\n\n| 方法 | 描述 |\n| --- | --- |\n| `remove(Query query, Class<?> entityClass)`\
    \ | 从给定实体类对应的集合中，移除所有匹配指定查询的文档。 |\n| `remove(Query query, Class<?> entityClass,\
    \ String collectionName)` | 从给定集合中，移除所有匹配指定查询的、属于给定实体类类型的文档。 |\n"
