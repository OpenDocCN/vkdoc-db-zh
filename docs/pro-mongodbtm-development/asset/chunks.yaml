    \ }\n\nmongoClient.close();\n    }\n\n}\n    ```\n\n10. 在运行应用程序之前，请在 mongo shell\
    \ 中使用 `db.catalog.drop()` 命令删除 `catalog` 集合。要运行 `DeleteDBDocument` 应用程序，请在 Package\
    \ Explorer 中右键单击 `DeleteDBDocument.java` 文件，然后选择 Run As ![image](Images/image00406.jpeg)\
