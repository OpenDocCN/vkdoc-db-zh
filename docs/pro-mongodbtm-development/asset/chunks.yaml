            } else {             ops.dropCollection("catalog");             ops.createCollection("catalog");
            }      }      private static void createCatalogInstances() {         catalog1
    = new Catalog("catalog1", "Oracle Magazine",                 "Oracle Publishing",
    "November-December 2013",                 "Engineering as a Service", "David A.
