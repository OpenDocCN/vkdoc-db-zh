  trans: "\n## 使用文档\n\n在以下小节中，我们将向 MongoDB 服务器添加一个文档、添加一批文档、查找单个文档、查找多个文档、更新文档、删除文档以及执行批量操作。\n\
    \n### 添加文档\n\n在本节中，我们将向一个 MongoDB 集合添加单个文档。使用 `Collection` 类中的 `insert_one(document,\
    \ options = {})` 方法来添加文档。`document` 参数是要添加的文档。`options` 参数是一个定制选项的哈希表，默认值为 `{}`。\n\
    \n1.  创建一个 Ruby 脚本 `addDocument.rb`，并为 `mongo` gem 和 `Mongo` 命名空间分别添加 `require`\
    \ 和 `include` 语句。\n2.  创建一个连接，将数据库设置为 `local` 并获取 `mongodb` 集合。\n    ```ruby\n\
    \    client =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n \
    \   client=client.use(:local)\n    db=client.database\n    collection=db.collection(\"\
    mongodb\")\n    ```\n3.  如果 `mongodb` 集合尚不存在，则必须调用 `create()` 方法。\n    ```ruby\n\
    \    collection.create\n    ```\n4.  创建要添加的文档 JSON。\n    ```ruby\n    document1={\n\
    \      \"_id\" => \"document1a\",\n      \"catalogId\" => \"catalog1\",\n    \
    \  \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" =>  \"November December 2013\",\n      \"title\" => \"Engineering\
    \ as a Service\",\n      \"author\" =>  \"David A. Kelly\"\n    }\n    ```\n5.\
    \  调用 `insert_one()` 方法将文档添加到 `mongodb` 集合中。\n    ```ruby\n    collection.insert_one(document1)\n\
    \    ```\n6.  同样添加另一个文档。\n    ```ruby\n    document2={\n      \"_id\" => \"document1a\"\
    ,\n      \"catalogId\" => \"catalog2\",\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
    \ December 2013\",\n      \"title\" => \"Quintessential and Collaborative\",\n\
    \      \"author\" =>  \"Tom Haunert\"\n    }\n    collection.insert_one(document2)\n\
    \    ```\n\n`addDocument.rb` 脚本如下所示：\n```ruby\nrequire 'mongo'\ninclude Mongo\n\
    client =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\nclient=client.use(:local)\n\
    db=client.database\ncollection=db.collection(\"mongodb\")\n\ncollection.create\n\
    \ndocument1={\n  \"_id\" => \"document1a\",\n  \"catalogId\" => \"catalog1\",\n\
    \  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" => \"Oracle Publishing\"\
    ,\n  \"edition\" =>  \"November December 2013\",\n  \"title\" => \"Engineering\
    \ as a Service\",\n  \"author\" =>  \"David A. Kelly\"\n}\n\ncollection.insert_one(document1)\n\
    \ndocument2={\n  \"catalogId\" => \"catalog2\",\n  \"journal\" => \"Oracle Magazine\"\
    ,\n  \"publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"November December\
    \ 2013\",\n  \"title\" => \"Quintessential and Collaborative\",\n  \"author\"\
    \ =>  \"Tom Haunert\"\n}\ncollection.insert_one(document2)\n```\n\n7.  使用以下命令运行\
    \ `addDocument.rb` 脚本。\n    ```bash\n    >ruby addDocument.rb\n    ```\n\n`addDocument.rb`\
    \ 脚本的输出如 图 4-13 所示。\n\n![9781484215999_Fig04-13.jpg](img/image00521.jpeg)\n图 4-13.\
    \ 运行 collection.rb 脚本\n\n8.  在 Mongo shell 中运行以下 JavaScript 方法。\n    ```javascript\n\
    \    >db.mongodb.find()\n    ```\n    添加的两个文档被列出，如 图 4-15 所示。\n\n![9781484215999_Fig04-15.jpg](img/image00523.jpeg)\n\
    图 4-15. 查找并列出已添加的文档\n\n9.  添加文档的 `_id` 必须是唯一的，否则会生成 `OperationFailure` 错误。\n"
- fmt: "To demonstrate adding two documents with the same `_id`. The Ruby script `addDocument.rb`\
    \ to demonstrate `OperationFailure` error is listed:\n```ruby\nrequire 'mongo'\n\
    include Mongo\n\nclient =Mongo::Client.new([ '127.0.0.1:27017' ], :database =>\
    \ 'test')\nclient=client.use(:local)\ndb=client.database\ncollection=db.collection(\"\
    mongodb\")\n\ncollection.create\n\ndocument1={\n  \"_id\" => \"document1a\",\n\
    \  \"catalogId\" => \"catalog1\",\n  \"journal\" => \"Oracle Magazine\",\n  \"\
    publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"November December 2013\"\
    ,\n  \"title\" => \"Engineering as a Service\",\n  \"author\" =>  \"David A. Kelly\"\
    \n}\n\ncollection.insert_one(document1)\n\ndocument2={\n  \"_id\" => \"document1a\"\
    ,\n  \"catalogId\" => \"catalog2\",\n  \"journal\" => \"Oracle Magazine\",\n \
    \ \"publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"November December\
    \ 2013\",\n  \"title\" => \"Quintessential and Collaborative\",\n  \"author\"\
    \ =>  \"Tom Haunert\"\n}\n\ncollection.insert_one(document2)\n```\n\nWhen the\
    \ script is run again with `ruby addDocument.rb`, the `OperationFailure` error\
    \ gets generated as shown in [Figure 4-16](#part0010.xhtml#Fig16).\n![9781484215999_Fig04-16.jpg](Images/image00524.jpeg)\n\
    [Figure 4-16](#part0010.xhtml#_Fig16). OperationFailure Error due to Duplicate\
    \ Key\n\n## Adding Multiple Documents\n\nIn the preceding section we added two\
    \ documents but by invoking the `insert_one()` method twice. The `Mongo::Collection`\
    \ class provides the `insert_many(documents, options = {})` method to add multiple\
    \ documents.\n\n1.  Create a Ruby script `addDocuments.rb` in the `C:\\Ruby21-x64\\\
    mongodbscripts` directory.\n2.  Create a `Client` instance and get the `mongodb`\
    \ collection as before. So that the newly added documents do not have duplicate\
    \ key with a document already in the `mongodb` collection, delete the `mongodb`\
    \ collection before running the `addDocuments.rb` script using the `db.mongodb.drop()`\
    \ method in the mongo shell.\n    ```ruby\n    client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\n    client=client.use(:local)\n    db=client.database\n\
    \    collection=db.collection(\"mongodb\")\n    collection.create\n    ```\n3.\
    \  Create JSON for two documents.\n    ```ruby\n    document1={\n      \"catalogId\"\
    \ => \"catalog1\",\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\"\
    \ => \"Oracle Publishing\",\n      \"edition\" =>  \"November December 2013\"\
    ,\n      \"title\" => \"Engineering as a Service\",\n      \"author\" =>  \"David\
    \ A. Kelly\"\n    }\n\n    document2={\n      \"catalogId\" => \"catalog2\",\n\
    \      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" =>  \"November December 2013\",\n      \"title\" => \"Quintessential\
    \ and Collaborative\",\n      \"author\" =>  \"Tom Haunert\"\n    }\n    ```\n\
    4.  Invoke the `insert_many()` method to add the two documents.\n    ```ruby\n\
    \    collection.insert_many([document1,document2])\n    ```\n\nThe `addDocuments.rb`\
    \ is listed:\n```ruby\nrequire 'mongo'\ninclude Mongo\nclient =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\nclient=client.use(:local)\ndb=client.database\n\
    collection=db.collection(\"mongodb\")\ncollection.create\ndocument1={\n  \"catalogId\"\
    \ => \"catalog1\",\n  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" =>\
    \ \"Oracle Publishing\",\n  \"edition\" =>  \"November December 2013\",\n  \"\
    title\" => \"Engineering as a Service\",\n  \"author\" =>  \"David A. Kelly\"\n\
    }\n\ndocument2={\n  \"catalogId\" => \"catalog2\",\n  \"journal\" => \"Oracle\
    \ Magazine\",\n  \"publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"\
    November December 2013\",\n  \"title\" => \"Quintessential and Collaborative\"\
    ,\n  \"author\" =>  \"Tom Haunert\"\n}\n\ncollection.insert_many([document1,document2])\n\
    ```\n\nRun the script with `ruby addDocuments.rb`. The output from the `addDocuments.rb`\
    \ script is shown in [Figure 4-17](#part0010.xhtml#Fig17).\n![9781484215999_Fig04-17.jpg](Images/image00525.jpeg)\n\
    [Figure 4-17](#part0010.xhtml#_Fig17). Output from addDocuments.rb Script\n\n\
    5.  To verify that the two documents got added, run the following command in Mongo\
    \ shell.\n    ```javascript\n    >db.mongodb.find()\n    ```\n\nThe two documents\
    \ added get listed as shown in [Figure 4-18](#part0010.xhtml#Fig18).\n![9781484215999_Fig04-18.jpg](Images/image00526.jpeg)\n\
    [Figure 4-18](#part0010.xhtml#_Fig18). Listing the Documents Added with insert_many\n\
    \nIn this section we shall also add multiple documents using a `for` loop.\n\n\
    1.  Drop the `mongodb` collection with `db.mongodb.drop()`.\n2.  Create another\
    \ Ruby script `addDocument2.rb` and create the collection `mongodb` in the `local`\
    \ database. First get the `local` database instance and subsequently invoke the\
    \ `create()` method to create a collection.\n    ```ruby\n    client =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    client=client.use(:local)\n \
    \   db=client.database\n    collection=db.collection(\"mongodb\")\n    collection.create\n\
    \    ```\n3.  Using a `for` loop, create a variable for `catalogId` and create\
    \ a new document instance using the `catalogId` variable value in each iteration\
    \ of the `for` loop. Add the document instance to the collection using the `insert_one()`\
    \ method. The `addDocument2.rb` script is listed:\n    ```ruby\n    require 'mongo'\n\
    \    include Mongo\n\n    client =Mongo::Client.new([ '127.0.0.1:27017' ], :database\
    \ => 'test')\n    client=client.use(:local)\n    db=client.database\n    collection=db.collection(\"\
    mongodb\")\n    collection.create\n    for i in 1..10 do\n      catalogId=\"catalog\"\
    +i.to_s\n      document={\n        \"catalogId\" => catalogId,\n        \"journal\"\
    \ => \"Oracle Magazine\",\n        \"publisher\" => \"Oracle Publishing\"\n  \
    \    }\n      collection.insert_one(document)\n      print \"\\n\"\n    end\n\
    \    ```\n4.  Run the `addDocument2.rb` script with the following command.\n \
    \   ```bash\n    >ruby addDocument2.rb\n    ```\n\nMultiple documents get added\
    \ as shown by the output from the script in [Figure 4-19](#part0010.xhtml#Fig19).\n\
    ![9781484215999_Fig04-19.jpg](Images/image00527.jpeg)\n[Figure 4-19](#part0010.xhtml#_Fig19).\
    \ Running the addDocument2.rb Script\n\n5.  Subsequently run the following JavaScript\
    \ method in Mongo shell to list the documents added.\n    ```javascript\n    >db.mongodb.find()\n\
    \    ```\n\nThe documents added get listed as shown in [Figure 4-20](#part0010.xhtml#Fig20).\n\
    ![9781484215999_Fig04-20.jpg](Images/image00528.jpeg)\n[Figure 4-20](#part0010.xhtml#_Fig20).\
    \ Listing Multiple Documents Added with a for Loop\n\n## Finding a Single Document\n\
    \nThe `find(filter = nil)` method in `Mongo::Collection` class is used to find\
    \ one or more documents. By default, if no filter is specified, all documents\
    \ get found. In this section we shall find a single document using a filter.\n\
    \n1.  Create a Ruby script `findDocument.rb` in the `C:\\Ruby21-x64\\mongodbscripts`\
    \ directory.\n2.  Create the `mongodb` collection as before.\n3.  Add two documents\
    \ using the `insert_many()` method as in the `addDocuments.rb` script.\n4.  Invoke\
    \ the `find()` method with a filter specifying `catalogId` as `catalog1`. Iterate\
    \ over the result cursor to output the documents found.\n    ```ruby\n    collection.find(:catalogId=>\"\
    catalog1\").each do |document|\n        print document\n    end\n    ```\n\nThe\
    \ `findDocument.rb` script is listed below.\n```ruby\nrequire 'mongo'\ninclude\
    \ Mongo\nclient =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n\
    client=client.use(:local)\ndb=client.database\n```"
