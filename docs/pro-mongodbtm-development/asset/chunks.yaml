    to Couchbase    The `com.couchbase.client.java.CouchbaseCluster` class is the
    client class for Couchbase Server and is the entry point to access Couchbase cluster,
    which may consist of one or more servers. In the `CreateCouchbaseDocument` application
    we shall use the `CouchbaseCluster` class to create and store a JSON document
    in Couchbase Server. The `CouchbaseCluster` class provides the overloaded `create()`
    methods to create an instance of `CouchbaseCluster`. We shall use the static method
    `create()` that does not take any args and is used to connect to the default bucket
    at localhost at port 8091\. Couchbase Server stores documents in Data Buckets.
    The `Bucket` interface represents a connection to a bucket to perform operations
    on the bucket synchronously.    1.  Create a `CouchbaseCluster` instance and subsequently
    connect to the default bucket using the `openBucket()` method. For connecting
    to the “default” bucket, bucket name and password are not required to be specified.                    ```     Cluster
    cluster = CouchbaseCluster.create();     Bucket defaultBucket = cluster.openBucket();     ```                    The
    `com.couchbase.client.java.document.json.JsonObject` class represents a JSON object
    stored in Couchbase Server. A document is represented with the `com.couchbase.client.java.document.Document`
    interface and several class implementations are provided, including the `com.couchbase.client.java.document.JsonDocument`,
    which creates a document from a `com.couchbase.client.java.document.json.JsonObject.
    JsonObject` represents a JSON object, the `{a1:v1,a2:v2}` JSON stored in Couchbase.
    The `JsonObject` class provides static methods `empty()` and `create()` to create
    an empty `JsonObject` instance. The `JsonObject` class provides the overloaded
    put methods to put field/value pairs in a `JsonObject` instance. The field name
    in each of these methods is of type `String`. A `put` method is provided for each
    of the value types `String`, `int`, `long`, `double`, `boolean`, `JsonObject`,
    `JsonArray`, and `Object`. We shall make use of the `put(String,String)` method
    to add key/value pairs to a JSON document.           2.  Create a `JsonObject`
    instance for a JSON document with fields `journal`, `publisher`, `edition`, `title,`
    and `author` with `String` values using the `put(java.lang.String name, java.lang.String
    value)` method. First, invoke the `empty()` method to return an empty `JsonObject`
    instance and subsequently invoke the `put(java.lang.String name, java.lang.String
    value)` method to add field/value pairs.                    ```     JsonObject
    catalogObj = JsonObject.empty()                     .put("journal", "Oracle Magazine")                     .put("publisher",
