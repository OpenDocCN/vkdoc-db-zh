    collection. The method parameters are discussed in [Table 5-27](#part0011.xhtml#Tab27).    [Table
    5-27](#part0011.xhtml#_Tab27). Options for the deleteMany() Method     | Parameter
    | Type | Description | | --- | --- | --- | | `filter` | object | Specifies a document
    selection filter. | | `options` | object | Method options. Supported options are
    `w`, `wtimeout,` and `j`. | | `callback` | `writeOpCallback(error, result)` |
    The callback function. |    1.  Create a script `removeDocuments.js` in the `C:\Program
    Files\nodejs\scripts` directory. 2.  Add an array of documents to a collection
    using the `insertMany()` method. 3.  Invoke the `deleteMany()` method using a
    selector query to select all documents with `journal` as ''`Oracle Magazine`''
    and output the callback function result to the console.                    ```     collection.deleteMany({journal:''Oracle
    Magazine''},function(error, result) {      if (error) console.log(error);       else       
    console.log(result);           });     ```                    The `removeDocuments.js`
    script is listed:                    ```     Server = require(''mongodb'').Server;     Db
    = require(''mongodb'').Db;     Collection = require(''mongodb'').Collection;     var
    db = new Db(''local'', new Server(''localhost'', 27017));     db.open(function(error,
    db) {      if (error)              console.log(error);     else{     db.createCollection(''catalog'',
    function(error, collection){     if (error)              console.log(error);     else{      doc1
    = {"catalogId" : ''catalog1'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle
    Publishing'', "edition" : ''November December     2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''};     doc2 = {"catalogId" : ''catalog2'',
    "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition"
    : ''November December     2013'',"title" : ''Quintessential and Collaborative'',"author"
    : ''Tom Haunert''};     collection.insertMany([doc1,doc2], function(error, result){     if
    (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     collection.deleteMany({journal:''Oracle Magazine''},function(error,
    result) {      if (error) console.log(error);       else        console.log(result);           });     }     });     }});     ```           4.  Drop
    the `catalog` collection from the `local` database.                    ```     >use
    local     >db.catalog.drop()     ```                    When the `removeDocuments.js`
    script is run with the command `node removeDocuments.js` two documents get added
    and both get removed. The `n` in the result is 2 indicating that two documents
    have been removed as shown in [Figure 5-38](#part0011.xhtml#Fig38).                    ![9781484215999_Fig05-38.jpg](Images/image00587.jpeg)                    [Figure
    5-38](#part0011.xhtml#_Fig38). Output of removeDocuments.js           5.  Run
    the `db.catalog.find()` method in Mongo shell to list the documents. As one of
    the two added documents has been removed, no documents get listed as shown in
    [Figure 5-39](#part0011.xhtml#Fig39).          ![9781484215999_Fig05-39.jpg](Images/image00588.jpeg)                    [Figure
    5-39](#part0011.xhtml#_Fig39).


    Listing Documents after Removing All              Performing Bulk Write Operations    The
    `Collection` class provides the `bulkWrite(operations, options, callback)` method
    to perform bulk write operations. The method parameters are discussed in [Table
    5-28](#part0011.xhtml#Tab28).    [Table 5-28](#part0011.xhtml#_Tab28). Method
    Parameters for the bulkWrite() Method     | Parameter | Type | Description | |
    --- | --- | --- | | `operations` | Array.<object> | Bulk operations to perform.
    Supported operations are `insertOne`, `updateOne`, `updateMany`, `deleteOne`,
    `deleteMany`, and `replaceOne`. | | `options` | object | Method options. Supported
    options are `w`, `wtimeout`, `j`, `serializeFunctions`, and `ordered`. The `serializeFunctions`
    is `false` by default. The `ordered` is `true` by default, indicating that the
    write operations are to be performed in order specified. | | `callback` | `bulkWriteOpCallback`
    | The callback function. |    1.  Create a `bulkWriteDocuments.js` script in the
    `C:\Program Files\nodejs\scripts` directory. 2.  Drop the `catalog` collection
    in the local database.                    ```     >use local         >db.catalog.drop()     ```           3.  Create
    the `catalog` collection in the script and use the `bulkWrite(operations, options,
    callback)` method to perform bulk write operations to add some documents, update
    a single document, update multiple documents, replace a document, and delete a
    document. Set `ordered` option to `true`, which is also the default so that the
    bulk write operations are performed in the order specified. The order could be
    significant if a bulk write operation depends on a preceding bulk write operation.
    For example, documents in a collection cannot be updated before being added.                    ```      collection.bulkWrite([           {
    insertOne: { document: {"catalogId" : ''catalog1'', "journal" : ''Oracle Magazine'',
    "publisher" : ''Oracle Publishing'', "edition":     ''November December 2013'',"title"
    : ''Engineering as a Service'',"author" : ''David A. Kelly''} } },     { insertOne:
    { document: {"catalogId" : ''catalog2'', "journal" : ''Oracle Magazine'', "publisher"
    : ''Oracle Publishing'', "edition" :     ''November December 2013'',"title" : ''Quintessential
    and Collaborative'',"author" : ''Tom Haunert''} } },     { insertOne: { document:
    {"catalogId" : ''catalog3'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle
    Publishing'', "edition" : ''November December 2013''} } },          { insertOne:
    { document: {"catalogId" : ''catalog4'', "journal" : ''Oracle Magazine'', "publisher"
    : ''Oracle Publishing'', "edition" :     ''November December 2013''} } }         ,
    { updateOne: { filter: {journal:''Oracle Magazine''}, update: {$set: {journal:''OracleMagazine''}},
    upsert:true } }         , { updateMany: { filter: {edition:''November December
    2013''}, update: {$set: {edition:''11-12-2013''}}, upsert:true } }         , { deleteOne:
    { filter: {journal:''Oracle Magazine''} } }         , { replaceOne: { filter:
    {catalogId:''catalog5''}, replacement: {"catalogId" : ''catalog5'', "journal"
    : ''Oracle Magazine'',     "publisher" : ''Oracle Publishing'', "edition" : ''November
    December 2013''}, upsert:true}}]       , {ordered:true, w:1}, function(error,
    result){     if (error)           console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     ```                    Similarly a `{ deleteMany:
    { filter: {journal:''Oracle Magazine''} } }` bulk write operation may be added
    to delete all documents for a selection query. A `deleteMany()` has not been included
    in the sample script to demonstrate the effect of the other bulk write operations
    because if `deleteMany()` is included, all or most documents would get deleted.
    The `bulkWriteDocuments.js` script is listed:                    ```     Server
    = require(''mongodb'').Server;     Db = require(''mongodb'').Db;     Collection
    = require(''mongodb'').Collection;     var db = new Db(''local'', new Server(''localhost'',
    27017));     db.'
  trans: "\nxhtml#_Fig36). `removeDocuments.js` 的输出\n\n5.  在 Mongo shell 中运行 `db.catalog.find()`\
    \ 方法以列出文档。由于两个添加的文档中有一个已被删除，因此没有列出任何文档，如图 5-37 所示。\n\n![9781484215999_Fig05-37.jpg](img/image00586.jpeg)\n\
    \n图 5-37. 删除一个文档后的文档列表\n\n`deleteOne(filter, options, callback)` 方法与 `findOneAndDelete(filter,\
    \ options, callback)` 方法类似，不同之处在于 `deleteOne()` 方法仅支持 `w`、`wtimeout` 和 `j` 选项。\n\
    \n## 删除多个文档\n\n`deleteMany(filter, options, callback)` 方法可用于从集合中删除一个或多个文档。该方法的参数在表\
    \ 5-27 中讨论。\n\n表 5-27. `deleteMany()` 方法的选项\n\n| 参数 | 类型 | 描述 |\n| --- | --- |\
    \ --- |\n| `filter` | object | 指定文档选择过滤器。 |\n| `options` | object | 方法选项。支持的选项有\
    \ `w`、`wtimeout` 和 `j`。 |\n| `callback` | `writeOpCallback(error, result)` | 回调函数。\
    \ |\n\n1.  在 `C:\\Program Files\\nodejs\\scripts` 目录下创建一个脚本 `removeDocuments.js`。\n\
    2.  使用 `insertMany()` 方法将一组文档添加到集合中。\n3.  使用选择器查询调用 `deleteMany()` 方法，以选择所有 `journal`\
    \ 为 '`Oracle Magazine`' 的文档，并将回调函数结果输出到控制台。\n\n```\ncollection.deleteMany({journal:'Oracle\
    \ Magazine'},function(error, result) {\n    if (error) console.log(error);\n \
    \   else\n        console.log(result);\n});\n```\n\n`removeDocuments.js` 脚本如下：\n\
    \n```\nServer = require('mongodb').Server;\nDb = require('mongodb').Db;\nCollection\
    \ = require('mongodb').Collection;\nvar db = new Db('local', new Server('localhost',\
    \ 27017));\ndb.open(function(error, db) {\n    if (error)\n        console.log(error);\n\
    \    else {\n        db.createCollection('catalog', function(error, collection)\
    \ {\n            if (error)\n                console.log(error);\n           \
    \ else {\n                doc1 = {\"catalogId\": 'catalog1', \"journal\": 'Oracle\
    \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
    \ 2013', \"title\": 'Engineering as a Service', \"author\": 'David A. Kelly'};\n\
    \                doc2 = {\"catalogId\": 'catalog2', \"journal\": 'Oracle Magazine',\
    \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013', \"\
    title\": 'Quintessential and Collaborative', \"author\": 'Tom Haunert'};\n   \
    \             collection.insertMany([doc1, doc2], function(error, result) {\n\
    \                    if (error)\n                        console.log(error);\n\
    \                    else {\n                        console.log(\"Documents added:\
    \ \" + result);\n                    }\n                });\n                collection.deleteMany({journal:\
    \ 'Oracle Magazine'}, function(error, result) {\n                    if (error)\
    \ console.log(error);\n                    else\n                        console.log(result);\n\
    \                });\n            }\n        });\n    }\n});\n```\n\n4.  从 `local`\
    \ 数据库中删除 `catalog` 集合。\n\n```\n>use local\n>db.catalog.drop()\n```\n\n当使用命令 `node\
    \ removeDocuments.js` 运行 `removeDocuments.js` 脚本时，会添加两个文档并且两个都被删除。结果中的 `n` 为 2，表示有两个文档已被删除，如图\
    \ 5-38 所示。\n\n![9781484215999_Fig05-38.jpg](img/image00587.jpeg)\n\n图 5-38. `removeDocuments.js`\
    \ 的输出\n\n5.  在 Mongo shell 中运行 `db.catalog.find()` 方法以列出文档。由于添加的两个文档中有一个已被删除，因此没有列出任何文档，如图\
    \ 5-39 所示。\n\n![9781484215999_Fig05-39.jpg](img/image00588.jpeg)\n\n图 5-39. 删除所有文档后的文档列表\n\
    \n## 执行批量写入操作\n\n`Collection` 类提供了 `bulkWrite(operations, options, callback)`\
    \ 方法来执行批量写入操作。该方法的参数在表 5-28 中讨论。\n\n表 5-28. `bulkWrite()` 方法的参数\n\n| 参数 | 类型 |\
    \ 描述 |\n| --- | --- | --- |\n| `operations` | Array.<object> | 要执行的批量操作。支持的操作有\
    \ `insertOne`、`updateOne`、`updateMany`、`deleteOne`、`deleteMany` 和 `replaceOne`。\
    \ |\n| `options` | object | 方法选项。支持的选项有 `w`、`wtimeout`、`j`、`serializeFunctions`\
    \ 和 `ordered`。`serializeFunctions` 默认为 `false`。`ordered` 默认为 `true`，表示写入操作将按指定的顺序执行。\
    \ |\n| `callback` | `bulkWriteOpCallback` | 回调函数。 |\n\n1.  在 `C:\\Program Files\\\
    nodejs\\scripts` 目录中创建一个 `bulkWriteDocuments.js` 脚本。\n2.  在 local 数据库中删除 `catalog`\
    \ 集合。\n\n```\n>use local\n>db.catalog.drop()\n```\n\n3.  在脚本中创建 `catalog` 集合，并使用\
    \ `bulkWrite(operations, options, callback)` 方法执行批量写入操作，以添加一些文档、更新单个文档、更新多个文档、替换一个文档以及删除一个文档。将\
    \ `ordered` 选项设置为 `true`（这也是默认值），以便批量写入操作按指定的顺序执行。如果某个批量写入操作依赖于前一个操作，那么顺序可能很重要。例如，集合中的文档必须在添加后才能更新。\n\
    \n```\ncollection.bulkWrite([\n    { insertOne: { document: {\"catalogId\": 'catalog1',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Engineering as a Service', \"author\"\
    : 'David A. Kelly'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog2',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Quintessential and Collaborative', \"\
    author\": 'Tom Haunert'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog3',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013'} } },\n    { insertOne: { document: {\"catalogId\"\
    : 'catalog4', \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing',\
    \ \"edition\": 'November December 2013'} } },\n    { updateOne: { filter: {journal:\
    \ 'Oracle Magazine'}, update: {$set: {journal: 'OracleMagazine'}}, upsert: true\
    \ } },\n    { updateMany: { filter: {edition: 'November December 2013'}, update:\
    \ {$set: {edition: '11-12-2013'}}, upsert: true } },\n    { deleteOne: { filter:\
    \ {journal: 'Oracle Magazine'} } },\n    { replaceOne: { filter: {catalogId: 'catalog5'},\
    \ replacement: {\"catalogId\": 'catalog5', \"journal\": 'Oracle Magazine', \"\
    publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'}, upsert:\
    \ true }}\n], {ordered: true, w: 1}, function(error, result) {\n    if (error)\n\
    \        console.log(error);\n    else {\n        console.log(\"Documents added:\
    \ \" + result);\n    }\n});\n```\n\n类似地，可以添加一个 `{ deleteMany: { filter: {journal:'Oracle\
    \ Magazine'} } }` 批量写入操作，以根据选择查询删除所有文档。示例脚本中没有包含 `deleteMany()` 操作，这是为了展示其他批量写入操作的效果，因为如果包含了\
    \ `deleteMany()`，所有或大部分文档都会被删除。`bulkWriteDocuments.js` 脚本如下：\n\n```\nServer =\
    \ require('mongodb').Server;\nDb = require('mongodb').Db;\nCollection = require('mongodb').Collection;\n\
    var db = new Db('local', new Server('localhost', 27017));\ndb.\n```\n"
- fmt: "# 第六章 将 Apache Cassandra 表迁移到 MongoDB\n\n虽然 MongoDB 是最常用的基于文档的 NoSQL 存储，但\
    \ Apache Cassandra 是最常用的基于宽列的 NoSQL 存储。MongoDB 和 Apache Cassandra 使用的数据模型不同。MongoDB\
    \ 基于 JSON（BSON）数据模型，而 Cassandra 基于列/行（表）数据模型。两者都提供了无模式、灵活的存储模型。在本章中，我们将讨论将 Apache\
    \ Cassandra 文档迁移到 MongoDB。本章包括以下主题：\n\n*   设置环境\n*   在 Eclipse 中创建 Maven 项目\n\
    *   在 Apache Cassandra 中创建文档\n*   将 Cassandra 表迁移到 MongoDB\n\n## 设置环境\n\n我们需要为本章安装以下软件：\n\
    \n*   Apache Cassandra 2.2.0：从 `http://cassandra.apache.org/download/` 获取 `apache-cassandra-2.2.0-bin.tar.gz`。将\
    \ `tar.gz` 文件解压到一个目录，并将 `bin` 目录（例如 `C:\\apache-cassandra-2.2.0\\bin`）添加到 `PATH`\
    \ 环境变量中。\n*   MongoDB 3.0.5：从 `www.mongodb.org/downloads` 获取。\n*   Eclipse IDE\
    \ for Java EE Developers：从 `www.eclipse.org/downloads/` 获取。\n*   Java 7：从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
    \ 获取。\n\n双击 MongoDB 二进制发行版以安装 MongoDB。将 MongoDB 安装的 `bin` 目录（`C:\\Program Files\\\
    MongoDB\\Server\\3.0\\bin`）添加到 `PATH` 环境变量中。如果尚未为前面的章节创建，请创建目录 `C:\\data\\db`\
    \ 用于存放 MongoDB 数据。\n\n使用以下命令启动 Apache Cassandra 服务器。\n```\n>cassandra –f\n```\n\
    服务器启动，如 [图 6-1](#part0012.xhtml#_Fig1) 的服务器输出所示。如果 thrift 服务未启动，请运行命令 `nodetool\
    \ enablethrift`。Cassandra 服务器正在 `localhost` 端口 9160 上监听客户端连接。\n\n![9781484215999_Fig06-01.jpg](Images/image00591.jpeg)\n\
    [图 6-1](#part0012.xhtml#_Fig1). 启动 Apache Cassandra\n\n使用以下命令启动 MongoDB 服务器。\n\
    ```\n>mongod\n```\nMongoDB 服务器启动，如 [图 6-2](#part0012.xhtml#_Fig2) 所示。MongoDB 正在\
    \ `localhost` 端口 27017 上等待连接。\n\n![9781484215999_Fig06-02.jpg](Images/image00592.jpeg)\n\
    [图 6-2](#part0012.xhtml#_Fig2). 启动 MongoDB 服务器\n\n## 在 Eclipse 中创建 Maven 项目\n\n\
    接下来，在 Eclipse IDE 中创建一个 Java 项目，用于将 Cassandra 数据库数据迁移到 MongoDB 数据库。\n\n1.  选择\
    \ File ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg) Other。\n\
    2.  在 New 窗口中，选择 Maven ![image](Images/image00406.jpeg) Maven Project 并点击 Next，如\
    \ [图 6-3](#part0012.xhtml#_Fig3) 所示。\n\n![9781484215999_Fig06-03.jpg](Images/image00593.jpeg)\n\
    [图 6-3](#part0012.xhtml#_Fig3). 选择 Maven ![image](Images/image00406.jpeg) Maven\
    \ Project\n\n3.  New Maven Project 向导启动。选择 Create a simple project 复选框和 Use default\
    \ Workspace location 复选框，然后点击 Next，如 [图 6-4](#part0012.xhtml#_Fig4) 所示。\n\n![9781484215999_Fig06-04.jpg](Images/image00594.jpeg)\n\
    [图 6-4](#part0012.xhtml#_Fig4). New Maven Project 向导\n\n4.  在 Configure project\
    \ 中，指定以下内容，然后点击 Finish，如 [图 6-5](#part0012.xhtml#_Fig5) 所示。\n    *   Group Id:\
    \ `com.mongodb.migration`\n    *   Artifact Id: `CassandraToMongoDB`\n    *  \
    \ Version: `1.0.0`\n    *   Packaging: `jar`\n    *   Name: `CassandraToMongoDB`\n\
    \n![9781484215999_Fig06-05.jpg](Images/image00595.jpeg)\n[图 6-5](#part0012.xhtml#_Fig5).\
    \ 配置 Maven 项目\n\n在 Eclipse IDE 中创建了一个 Maven 项目，如 [图 6-6](#part0012.xhtml#_Fig6)\
    \ 所示。\n\n![9781484215999_Fig06-06.jpg](Images/image00596.jpeg)\n[图 6-6](#part0012.xhtml#_Fig6).\
    \ Package Explorer 中的 Maven 项目 CassandraToMongoDB\n\n现在，我们需要为迁移创建两个 Java 类：一个用于在\
    \ Cassandra 中创建初始数据，另一个用于将数据迁移到 MongoDB。\n\n1.  要创建 Java 类，点击 File ![image](Images/image00406.jpeg)\
    \ New ![image](Images/image00406.jpeg) Other。\n2.  在 New 窗口中，选择 Java ![image](Images/image00406.jpeg)\
    \ Class 并点击 Next，如 [图 6-7](#part0012.xhtml#_Fig7) 所示。\n\n![9781484215999_Fig06-07.jpg](Images/image00597.jpeg)\n\
    [图 6-7](#part0012.xhtml#_Fig7). 选择 Java ![image](Images/image00406.jpeg) Java\
    \ Class\n\n3.  在 New Java Class 向导中，选择 Source folder 为 `CassandraToMongoDB/src/main/java`，指定\
    \ Package 为 `mongodb`，类名为 `CreateCassandraDatabase`。\n\n```javascript\nopen(function(error,\
    \ db) {\n    if (error)\n        console.log(error);\n    else {\n        db.createCollection('catalog',\
    \ function(error, collection) {\n            if (error)\n                console.log(error);\n\
    \            else {\n                collection.bulkWrite([\n                \
    \    { insertOne: { document: { \"catalogId\": 'catalog1', \"journal\": 'Oracle\
    \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
    \ 2013', \"title\": 'Engineering as a Service', \"author\": 'David A. Kelly' }\
    \ } },\n                    { insertOne: { document: { \"catalogId\": 'catalog2',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Quintessential and Collaborative', \"\
    author\": 'Tom Haunert' } } },\n                    { insertOne: { document: {\
    \ \"catalogId\": 'catalog3', \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle\
    \ Publishing', \"edition\": 'November December 2013' } } },\n                \
    \    { insertOne: { document: { \"catalogId\": 'catalog4', \"journal\": 'Oracle\
    \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
    \ 2013' } } },\n                    { updateOne: { filter: { journal: 'Oracle\
    \ Magazine' }, update: { $set: { journal: 'OracleMagazine' } }, upsert: true }\
    \ },\n                    { updateMany: { filter: { edition: 'November December\
    \ 2013' }, update: { $set: { edition: '11-12-2013' } }, upsert: true } },\n  \
    \                  { deleteOne: { filter: { journal: 'Oracle Magazine' } } },\n\
    \                    { replaceOne: { filter: { catalogId: 'catalog5' }, replacement:\
    \ { \"catalogId\": 'catalog5', \"journal\": 'Oracle Magazine', \"publisher\":\
    \ 'Oracle Publishing', \"edition\": 'November December 2013' }, upsert: true }\
    \ }\n                ], { ordered: true, w: 1 }, function(error, result) {\n \
    \                   if (error)\n                        console.log(error);\n\
    \                    else {\n                        console.log(\"Documents added:\
    \ \" + result);\n                    }\n                });\n            }\n \
    \       });\n    }\n});\n```\n\n4.  使用命令 `node bulkWriteDocuments.js` 运行脚本。输出如\
    \ [图 5-40](#part0011.xhtml#_Fig40) 所示。\n\n![9781484215999_Fig05-40.jpg](Images/image00589.jpeg)\n\
    [图 5-40](#part0011.xhtml#_Fig40). 运行 bulkWriteDocuments.js 脚本\n\n5.  随后在 Mongo\
    \ shell 中运行 `db.catalog.find()` 命令以列出文档，如 [图 5-41](#part0011.xhtml#_Fig41) 所示。\n\
    \n![9781484215999_Fig05-41.jpg](Images/image00590.jpeg)\n[图 5-41](#part0011.xhtml#_Fig41).\
    \ 列出文档\n\n如输出所示，只列出了四个文档，因为最初添加了四个，删除了一个，随后更新（upsert）了一个文档。其中一个文档的 `journal` 字段被设置为\
    \ `OracleMagazine`，因为使用了 `updateOne` 来更新一个文档的 `journal` 字段。`catalog5` `catalogId`\
    \ 文档是使用 `replaceOne` 更新（upsert）的文档。\n\n## 总结\n\n在本章中，我们使用 MongoDB 的 Node.js 驱动程序连接到\
    \ MongoDB 服务器并执行 CRUD（创建、读取、更新和删除）操作。我们演示了单文档和多文档的 CRUD 操作。在下一章中，我们将把文档从 Apache\
    \ Cassandra 迁移到 MongoDB。"
