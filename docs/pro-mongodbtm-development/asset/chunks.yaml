    \ | 描述 |\n| --- | --- | --- |\n| `databaseName` | string | 数据库名称。 |\n| `topology`\
    \ | Server &#124; ReplSet &#124; Mongos | 服务器的拓扑结构。 |\n| `options` | object |\
    \ 可选设置。 |\n\n`Db` 类构造函数支持的选项在表 5-8 中讨论。\n\n表 5-8. Db 选项\n\n![image](img/image00558.jpeg)\n\
    \n`Db` 类提供的属性在表 5-9 中讨论。\n\n表 5-9. Db 类属性\n\n| 选项 | 类型 | 描述 |\n| --- | --- | ---\
