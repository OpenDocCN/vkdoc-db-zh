    Selecting Maven ![image](Images/image00406.jpeg) Maven Project           3.  In
    New Maven Project wizard select the Create a simple project check box. Also select
    the Use default Workspace location check box as shown in [Figure 9-3](#part0015.xhtml#Fig3).
    Click on Next.          ![9781484215999_Fig09-03.jpg](Images/image00637.jpeg)                    [Figure
    9-3](#part0015.xhtml#_Fig3). New Maven Project Wizard           4.  In the New
    Maven wizard’s Configure project window, select the following values and click
    on Finish as shown in [Figure 9-4](#part0015.xhtml#Fig4).               *   Group
    Id: `com.kundera.mongodb`     *   Artifact Id: `KunderaMongoDB`     *   Version:
    1.0.0     *   Packaging: jar     *   Name: `KunderaMongoDB`          ![9781484215999_Fig09-04.jpg](Images/image00638.jpeg)                    [Figure
    9-4](#part0015.xhtml#_Fig4). Configuring Maven Project                    A Maven
    project for Kundera Mongo gets created as shown in the Package Explorer in [Figure
    9-5](#part0015.xhtml#Fig5).                    ![9781484215999_Fig09-05.jpg](Images/image00639.jpeg)                    [Figure
    9-5](#part0015.xhtml#_Fig5). Maven Project KunderaMongoDB           5.  Next,
    modify the `pom.xml` to add dependencies for the `kundera-mongo` library and EclipseLink.
    As we shall be using JPA, EclipseLink is required.                    ```     <dependencies>             <dependency>                 <groupId>com.impetus.client</groupId>                 <artifactId>kundera-mongo</artifactId>                 <version>2.9</version>             </dependency>             <dependency>                 <groupId>org.eclipse.persistence</groupId>                 <artifactId>eclipselink</artifactId>                 <version>2.6.0</version>             </dependency>         </dependencies>     ```           6.  In
    the build configuration specify the `maven-compiler-plugin` plug-in to compile
    the Maven project and the `exec-maven-plugin` plug-in to run the Maven client
    class. For the `exec-maven-plugin` plug-in specify the main class to run in the
    `<configuration/>` as the Kundera `Client` class `kundera.KunderaClient`, which
    we shall create later in the chapter.                    ```     <build>             <plugins>                 <plugin>                     <artifactId>maven-compiler-plugin</artifactId>                     <configuration>                         <source>1.7</source>                         <target>1.7</target>                     </configuration>                 </plugin>                 <plugin>                     <groupId>org.codehaus.mojo</groupId>                     <artifactId>exec-maven-plugin</artifactId>                     <version>1.2.1</version>                     <configuration>                         <mainClass>kundera.KunderaClient</mainClass>                     </configuration>                 </plugin>             </plugins>         </build>     ```              The
    `pom.xml` is listed:    ``` <project xmlns="http://maven.apache.org/POM/4.0.0"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"     xsi:schemaLocation="http://maven.apache.org/POM/4.0.0
    http://maven.apache.org/xsd/maven-4.0.0.xsd">     <modelVersion>4.0.0</modelVersion>
        <groupId>com.kundera.mongodb</groupId>     <artifactId>KunderaMongoDB</artifactId>
        <version>1.0.0</version>     <name>KunderaMongoDB</name>     <dependencies>
            <dependency>             <groupId>com.impetus.client</groupId>             <artifactId>kundera-mongo</artifactId>
                <version>2.9</version>         </dependency>         <dependency>
                <groupId>org.eclipse.persistence</groupId>             <artifactId>eclipselink</artifactId>
                <version>2.6.


    0</version>         </dependency>      </dependencies>     <build>         <plugins>
                <plugin>                 <artifactId>maven-compiler-plugin</artifactId>
                    <configuration>                     <source>1.7</source>                     <target>1.7</target>
                    </configuration>             </plugin>             <plugin>                 <groupId>org.codehaus.mojo</groupId>
                    <artifactId>exec-maven-plugin</artifactId>                 <version>1.2.1</version>
                    <configuration>                     <mainClass>kundera.KunderaClient</mainClass>
                    </configuration>             </plugin>         </plugins>     </build>  </project>
    ```    Creating a JPA Entity Class    The domain model for a JPA object/relational
    mapping application is defined in a JPA entity class. The domain model class is
    just a *plain old Java object* (POJO) that describes the Java object entity to
    be persisted, the object properties, and the MongoDB database and collection to
    persist to. In this section we shall create a JPA entity class for object/relational
    mapping using Kundera and MongoDB databases. MongoDB, though not a relational
    database, can be used with object/relational mapping using the Kundera library,
    which supports some NoSQL databases.    1.  Select File ![image](Images/image00406.jpeg)
    New ![image](Images/image00406.jpeg) Other. 2.  In the New window, select Java
    ![image](Images/image00406.jpeg) Class and click on Next as shown in [Figure 9-6](#part0015.xhtml#Fig6).          ![9781484215999_Fig09-06.jpg](Images/image00640.jpeg)                    [Figure
    9-6](#part0015.xhtml#_Fig6). Selecting Java ![image](Images/image00406.jpeg) Class           3.  In
    New Java Class wizard assign the following values as shown in [Figure 9-7](#part0015.xhtml#Fig7).
    Click on Finish.               *   Source folder: `KunderaMongoDB/src/main/java`     *   Package:
    `kundera`     *   Name: `Catalog`          ![9781484215999_Fig09-07.jpg](Images/image00641.jpeg)                    [Figure
    9-7](#part0015.xhtml#_Fig7). Creating Entity Class Catalog                    The
    Java class `kundera.Catalog` gets added to the Maven project as shown in [Figure
    9-8](#part0015.xhtml#Fig8).                    ![9781484215999_Fig09-08.jpg](Images/image00642.jpeg)                    [Figure
    9-8](#part0015.xhtml#_Fig8). Entity Class Catalog           4.  Annotate the `Catalog`
    class with `@Entity` annotation to indicate that the class is a JPA entity class.
    By default the entity name is the same as the entity class name. Annotate the
    class with `@Table` to indicate the MongoDB collection name and schema. The table
    name is the collection name `catalog`. The schema is in `database@persistence-unit`
    format. For the `local` database and the `kundera` persistence unit name, which
    we shall configure in the next section, the schema is `local@kundera`.                    ```     @Entity     @Table(name
    = "catalog", schema = "local@kundera")     ```           5.  The entity class
    implements the `Serializable` interface to serialize a cache enabled entity bean
    to a cache when persisted to a database. To associate a version number with a
    serializable class by serialization runtime specify a `serialVersionUID` variable.                    ```     private
    static final long serialVersionUID = 1L;     ```           6.  Annotate the `catalogId`
    field with the `@Id` annotation to indicate that the field is the primary key
    of the entity. Specify the document field `_id` as the primary key column using
    the `@Column` annotation.                    ```     @Id     @Column(name = "_id")     private
    String catalogId;     ```                    The field annotated with `@Id` must
    be one of the following types: Java primitive type (such as `int`, `double`),
    any primitive wrapper type (such as `Integer`, `Double`), `String`, `java.util.Date`,
    `java.sql.Date`, `java.math.BigDecimal`, or `java.math.BigInteger`.           7.'
  trans: "\n# 创建 Maven 项目并配置 JPA 实体类\n\n## 创建 Maven 项目\n\n1.  在 Eclipse 中，选择 **文件**\
    \ ![image](img/image00406.jpeg) **新建** ![image](img/image00406.jpeg) **Maven 项目**，如图\
    \ 9-2 所示。\n    \n    ![jpg](img/image00636.jpeg) 图 9-2. 选择 Maven ![image](img/image00406.jpeg)\
    \ Maven Project\n\n2.  在 **新建 Maven 项目** 向导中，选中 **创建一个简单的项目** 复选框。同时选中 **使用默认的工作空间位置**\
    \ 复选框，如图 9-3 所示。点击 **下一步**。\n\n    ![9781484215999_Fig09-03.jpg](img/image00637.jpeg)\
    \ 图 9-3. 新建 Maven 项目向导\n\n3.  在 **新建 Maven** 向导的 **配置项目** 窗口中，选择以下值并点击 **完成**，如图\
    \ 9-4 所示。\n    *   Group Id: `com.kundera.mongodb`\n    *   Artifact Id: `KunderaMongoDB`\n\
    \    *   Version: `1.0.0`\n    *   Packaging: `jar`\n    *   Name: `KunderaMongoDB`\n\
    \n    ![9781484215999_Fig09-04.jpg](img/image00638.jpeg) 图 9-4. 配置 Maven 项目\n\n\
    \    一个用于 Kundera Mongo 的 Maven 项目已创建，如包资源管理器中的图 9-5 所示。\n\n    ![9781484215999_Fig09-05.jpg](img/image00639.jpeg)\
    \ 图 9-5. Maven 项目 KunderaMongoDB\n\n4.  接下来，修改 `pom.xml` 以添加 `kundera-mongo` 库和\
    \ EclipseLink 的依赖。由于我们将使用 JPA，因此需要 EclipseLink。\n\n    ```xml\n    <dependencies>\n\
    \        <dependency>\n            <groupId>com.impetus.client</groupId>\n   \
    \         <artifactId>kundera-mongo</artifactId>\n            <version>2.9</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.eclipse.persistence</groupId>\n\
    \            <artifactId>eclipselink</artifactId>\n            <version>2.6.0</version>\n\
    \        </dependency>\n    </dependencies>\n    ```\n\n5.  在构建配置中，指定 `maven-compiler-plugin`\
    \ 插件来编译 Maven 项目，以及 `exec-maven-plugin` 插件来运行 Maven 客户端类。对于 `exec-maven-plugin`\
    \ 插件，在 `<configuration/>` 中指定要运行的主类为 Kundera `Client` 类 `kundera.KunderaClient`，我们将在本章后面创建它。\n\
    \n    ```xml\n    <build>\n        <plugins>\n            <plugin>\n         \
    \       <artifactId>maven-compiler-plugin</artifactId>\n                <configuration>\n\
    \                    <source>1.7</source>\n                    <target>1.7</target>\n\
    \                </configuration>\n            </plugin>\n            <plugin>\n\
    \                <groupId>org.codehaus.mojo</groupId>\n                <artifactId>exec-maven-plugin</artifactId>\n\
    \                <version>1.2.1</version>\n                <configuration>\n \
    \                   <mainClass>kundera.KunderaClient</mainClass>\n           \
    \     </configuration>\n            </plugin>\n        </plugins>\n    </build>\n\
    \    ```\n\n    完整的 `pom.xml` 文件如下：\n\n    ```xml\n    <project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n        xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n        <modelVersion>4.0.0</modelVersion>\n        <groupId>com.kundera.mongodb</groupId>\n\
    \        <artifactId>KunderaMongoDB</artifactId>\n        <version>1.0.0</version>\n\
    \        <name>KunderaMongoDB</name>\n        <dependencies>\n            <dependency>\n\
    \                <groupId>com.impetus.client</groupId>\n                <artifactId>kundera-mongo</artifactId>\n\
    \                <version>2.9</version>\n            </dependency>\n         \
    \   <dependency>\n                <groupId>org.eclipse.persistence</groupId>\n\
    \                <artifactId>eclipselink</artifactId>\n                <version>2.6.0</version>\n\
    \            </dependency>\n        </dependencies>\n        <build>\n       \
    \     <plugins>\n                <plugin>\n                    <artifactId>maven-compiler-plugin</artifactId>\n\
    \                    <configuration>\n                        <source>1.7</source>\n\
    \                        <target>1.7</target>\n                    </configuration>\n\
    \                </plugin>\n                <plugin>\n                    <groupId>org.codehaus.mojo</groupId>\n\
    \                    <artifactId>exec-maven-plugin</artifactId>\n            \
    \        <version>1.2.1</version>\n                    <configuration>\n     \
    \                   <mainClass>kundera.KunderaClient</mainClass>\n           \
    \         </configuration>\n                </plugin>\n            </plugins>\n\
    \        </build>\n    </project>\n    ```\n\n## 创建 JPA 实体类\n\nJPA 对象/关系映射应用程序的领域模型在\
    \ JPA 实体类中定义。该领域模型类只是一个*普通的 Java 对象*（POJO），它描述了要持久化的 Java 对象实体、对象属性以及要持久化到的 MongoDB\
    \ 数据库和集合。在本节中，我们将使用 Kundera 和 MongoDB 数据库创建一个用于对象/关系映射的 JPA 实体类。尽管 MongoDB 不是关系型数据库，但可以使用支持某些\
    \ NoSQL 数据库的 Kundera 库与之进行对象/关系映射。\n\n1.  选择 **文件** ![image](img/image00406.jpeg)\
    \ **新建** ![image](img/image00406.jpeg) **其他**。\n2.  在 **新建** 窗口中，选择 **Java** ![image](img/image00406.jpeg)\
    \ **类** 并点击 **下一步**，如图 9-6 所示。\n    \n    ![9781484215999_Fig09-06.jpg](img/image00640.jpeg)\
    \ 图 9-6. 选择 Java ![image](img/image00406.jpeg) Class\n\n3.  在 **新建 Java 类** 向导中分配以下值，如图\
    \ 9-7 所示。点击 **完成**。\n    *   源文件夹: `KunderaMongoDB/src/main/java`\n    *   包:\
    \ `kundera`\n    *   名称: `Catalog`\n\n    ![9781484215999_Fig09-07.jpg](img/image00641.jpeg)\
    \ 图 9-7. 创建实体类 Catalog\n\n    Java 类 `kundera.Catalog` 被添加到 Maven 项目中，如图 9-8 所示。\n\
    \n    ![9781484215999_Fig09-08.jpg](img/image00642.jpeg) 图 9-8. 实体类 Catalog\n\n\
    4.  使用 `@Entity` 注解标注 `Catalog` 类，以表明该类是一个 JPA 实体类。默认情况下，实体名称与实体类名相同。使用 `@Table`\
    \ 注解标注类以指示 MongoDB 集合名称和模式。表名是集合名 `catalog`。模式采用 `database@persistence-unit` 格式。对于\
    \ `local` 数据库和我们将在下一节配置的 `kundera` 持久性单元名称，模式是 `local@kundera`。\n\n    ```java\n\
    \    @Entity\n    @Table(name = \"catalog\", schema = \"local@kundera\")\n   \
    \ ```\n\n5.  实体类实现 `Serializable` 接口，以便在持久化到数据库时序列化启用缓存的实体 bean。要将版本号与序列化类关联，需指定一个\
    \ `serialVersionUID` 变量。\n\n    ```java\n    private static final long serialVersionUID\
    \ = 1L;\n    ```\n\n6.  使用 `@Id` 注解标注 `catalogId` 字段，以表明该字段是实体的主键。使用 `@Column`\
    \ 注解指定文档字段 `_id` 作为主键列。\n\n    ```java\n    @Id\n    @Column(name = \"_id\")\n\
    \    private String catalogId;\n    ```\n    被 `@Id` 注解的字段必须是以下类型之一：Java 基本类型（如\
    \ `int`，`double`）、任何基本包装类型（如 `Integer`，`Double`）、`String`、`java.util.Date`、`java.sql.Date`、`java.math.BigDecimal`\
    \ 或 `java.math.BigInteger`。\n\n7.\n"
- fmt: "### 为实体类添加字段与注解\n\n为实体类添加 `journal`、`publisher`、`edition`、`title` 和 `author`\
    \ 字段，并使用 `@Column` 注解来指定字段与文档列的映射关系。\n\n```java\n@Column(name = \"journal\")\n\
    private String journal;\n\n@Column(name = \"publisher\")\nprivate String publisher;\n\
    \n@Column(name = \"edition\")\nprivate String edition;\n\n@Column(name = \"title\"\
    )\nprivate String title;\n\n@Column(name = \"author\")\nprivate String author;\n\
    ```\n\n8.  为每个字段添加对应的 `get`/`set` 访问器方法。完整的 JPA `Entity` 类如下所示。\n\n```java\npackage\
    \ kundera;\n\nimport java.io.Serializable;\nimport javax.persistence.*;\n\n/**\n\
    \ * Entity implementation class for Entity: Catalog\n *\n */\n@Entity\n@Table(name\
    \ = \"catalog\", schema = \"local@kundera\")\npublic class Catalog implements\
    \ Serializable {\n\n    private static final long serialVersionUID = 1L;\n\n \
    \   @Id\n    @Column(name = \"_id\")\n    private String catalogId;\n\n    public\
    \ Catalog() {\n        super();\n    }\n\n    @Column(name = \"journal\")\n  \
    \  private String journal;\n\n    @Column(name = \"publisher\")\n    private String\
    \ publisher;\n\n    @Column(name = \"edition\")\n    private String edition;\n\
    \n    @Column(name = \"title\")\n    private String title;\n\n    @Column(name\
    \ = \"author\")\n    private String author;\n\n    public String getCatalogId()\
    \ {\n        return catalogId;\n    }\n\n    public void setCatalogId(String catalogId)\
    \ {\n        this.catalogId = catalogId;\n    }\n\n    public String getJournal()\
    \ {\n        return journal;\n    }\n\n    public void setJournal(String journal)\
    \ {\n        this.journal = journal;\n    }\n\n    public String getPublisher()\
    \ {\n        return publisher;\n    }\n\n    public void setPublisher(String publisher)\
    \ {\n        this.publisher = publisher;\n    }\n\n    public String getEdition()\
    \ {\n        return edition;\n    }\n\n    public void setEdition(String edition)\
    \ {\n        this.edition = edition;\n    }\n\n    public String getTitle() {\n\
    \        return title;\n    }\n\n    public void setTitle(String title) {\n  \
    \      this.title = title;\n    }\n\n    public String getAuthor() {\n       \
    \ return author;\n    }\n\n    public void setAuthor(String author) {\n      \
    \  this.author = author;\n    }\n}\n```\n\n### 在 persistence.xml 配置文件中配置 JPA\n\
    \n在本节中，我们将在 Maven 项目的 `src/main/resources` 文件夹下创建一个 `META-INF/persistence.xml`\
    \ 配置文件。我们将在 `persistence.xml` 配置文件中配置对象/关系映射。Kundera 支持一些通过 `<property/>` 标签在\
    \ `persistence.xml` 中指定的属性，这些属性对所有支持的 NoSQL 数据存储都是通用的。这些通用属性在 [表 9-1](#part0015.xhtml#Tab1)\
    \ 中讨论。\n\n**表 9-1**. Kundera 持久化配置属性\n\n| 属性 | 描述 | 必需/可选 |\n| :--- | :--- | :---\
    \ |\n| `kundera.nodes` | NoSQL 服务器运行的节点。 | 必需 |\n| `kundera.port` | NoSQL 数据库端口。\
    \ | 必需 |\n| `kundera.keyspace` | NoSQL 数据库键空间。 | 必需 |\n| `kundera.dialect` | NoSQL\
    \ 数据库方言，用于确定持久化提供者。有效值：`cassandra`、`mongodb` 和 `hbase`。 | 必需 |\n| `kundera.client.lookup.class`\
    \ | 用于低级别数据存储操作的 NoSQL 数据库特定客户端类。 | 必需 |\n| `kundera.cache.provider.class` | L2\
    \ 缓存实现类。 | 必需 |\n| `kundera.cache.config.resource` | 包含 L2 缓存实现的文件。 | 必需 |\n|\
    \ `kundera.ddl.auto.prepare` | 指定自动生成所有实体的模式和表的选项。有效选项：`create`：如果存在则删除，并基于实体定义创建模式/表。`create-drop`：与\
    \ `create` 相同，并在操作结束后删除模式。`update`：基于实体定义更新模式/表。`validate`：基于实体定义验证模式/表，如果验证失败则抛出\
    \ `SchemaGenerationException`。 | 可选 |\n| `kundera.pool.size.max.active` | 每个节点由池管理的对象实例数量的上限。\
    \ | 可选 |\n| `kundera.pool.size.max.idle` | 池中空闲对象实例数量的上限。 | 可选 |\n| `kundera.pool.size.min.idle`\
    \ | 池中空闲对象实例的最小数量。 | 可选 |\n| `kundera.pool.size.max.total` | 所有节点合并的池中对象实例总数的上限。\
    \ | 可选 |\n| `index.home.dir` | 如果选择 Lucene 索引而不是内置的二级索引，此属性指定存储 Lucene 索引的目录路径。\
    \ | 可选 |\n| `kundera.client.property` | NoSQL 数据库特定配置文件的名称，该文件必须在类路径中。 | 可选 |\n\
    | `kundera.batch.size` | 批量插入/更新的批处理大小（整数）。 | 可选 |\n| `kundera.username` | 用于认证\
    \ Cassandra 和 MongoDB 的用户名。 | 可选 |\n| `kundera.password` | 用于认证 Cassandra 和 MongoDB\
    \ 的密码。 | 可选 |\n\n9.  在 Maven 项目的 `persistence.xml` 文件中，将持久化单元名称指定为 `kundera`。\n\
    10. 添加一个 `<provider/>` 元素，其值设置为 `com.impetus.kundera.KunderaPersistence`。\n11.\
    \ 在 `<class/>` 元素中将 JPA 实体类指定为 `kundera.Catalog`。\n12. 在 `<properties/>` 标签内作为子元素添加\
    \ `<property/>` 标签。添加 [表 9-2](#part0015.xhtml#Tab2) 中讨论的属性。\n\n**表 9-2**. 已配置的\
    \ Kundera 持久化属性\n\n| 属性 | 描述 | 值 |\n| :--- | :--- | :--- |\n| `kundera.nodes`\
    \ | MongoDB 主机名。 | `localhost` 或 `127.0.0.1` |\n| `kundera.port` | MongoDB 端口。\
    \ | `27017` |\n| `kundera.keyspace` | MongoDB 数据库。 | `local` |\n| `kundera.dialect`\
    \ | Kundera 方言。Kundera 使用它来确定持久化提供者实现。 | `mongodb` |\n| `kundera.ddl.auto.prepare`\
    \ | Kundera 使用它自动在持久化单元中生成模式和实体。 | `create` |\n| `kundera.client.lookup.class`\
    \ | Kundera 使用它来查找用于在 MongoDB 上执行操作的低级别方言类。 | `com.impetus.client.mongodb.MongoDBClientFactory`\
    \ |\n| `kundera.annotations.scan.package` | 要扫描 JPA 实体的包。 | `kundera` |\n\n`persistence.xml`\
    \ 配置文件如下所示。\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence\
    \ version=\"2.1\"\n    xmlns=\"http://xmlns.jcp.org/xml/ns/persistence\" xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/persistence\
    \ http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\">\n    <persistence-unit\
    \ name=\"kundera\">\n        <provider>com.impetus.kundera.KunderaPersistence</provider>\n\
    \        <class>kundera.Catalog</class>\n        <properties>\n            <property\
    \ name=\"kundera.nodes\" value=\"127.0.0.1\" />\n            <property name=\"\
    kundera.port\" value=\"27017\" />\n            <property name=\"kundera.keyspace\"\
    \ value=\"local\" />\n            <property name=\"kundera.dialect\" value=\"\
    mongodb\" />\n            <property name=\"kundera.ddl.auto.prepare\" value=\"\
    create\" />\n            <property name=\"kundera.client.lookup.class\"\n    \
    \            value=\"com.impetus.client.mongodb.MongoDBClientFactory\" />\n  \
    \          <property name=\"kundera.annotations.scan.package\" value=\"kundera\"\
    \ />\n        </properties>\n    </persistence-unit>\n</persistence>\n```\n\n\
    一些 NoSQL 数据库特定的属性也可以在单独的 XML 配置文件中指定。"
  raw: 'Add fields `journal`, `publisher`, `edition`, `title`, and `author` and annotate
    them with the `@Column` annotation to specify the mapping of the fields to columns
    in the document.                    ```     @Column(name = "journal")         private
    String journal;         @Column(name = "publisher")         private String publisher;         @Column(name
    = "edition")         private String edition;         @Column(name = "title")         private
    String title;         @Column(name = "author")         private String author;     ```           8.  Add
    `get`/`set` accessor methods for each of the fields. The JPA `Entity` class is
    listed below.                    ```     package kundera;          import java.io.Serializable;     import
    javax.persistence.*;          /**      * Entity implementation class for Entity:
    Catalog      *      */     @Entity     @Table(name = "catalog", schema = "local@kundera")     public
    class Catalog implements Serializable {              private static final long
    serialVersionUID = 1L;              @Id         @Column(name = "_id")         private
    String catalogId;              public Catalog() {             super();         }              @Column(name
    = "journal")         private String journal;              @Column(name = "publisher")         private
    String publisher;              @Column(name = "edition")         private String
    edition;              @Column(name = "title")         private String title;              @Column(name
    = "author")         private String author;              public String getCatalogId()
    {             return catalogId;         }              public void setCatalogId(String
    catalogId) {             this.catalogId = catalogId;         }              public
    String getJournal() {             return journal;         }              public
    void setJournal(String journal) {             this.journal = journal;         }              public
    String getPublisher() {             return publisher;         }              public
    void setPublisher(String publisher) {             this.publisher = publisher;         }              public
    String getEdition() {             return edition;         }              public
    void setEdition(String edition) {             this.edition = edition;         }              public
    String getTitle() {             return title;         }              public void
    setTitle(String title) {             this.title = title;         }              public
    String getAuthor() {             return author;         }              public
    void setAuthor(String author) {             this.author = author;         }     }     ```              Configuring
    JPA in the persistence.xml Configuration File    In this section we shall create
    a `META-INF/persistence.xml` configuration file in the `src/main/resources` folder
    in the Maven project. We shall configure the object/relational mapping in the
    `persistence.xml` configuration file. Kundera supports some properties that are
    specified in `persistence.xml` using the `<property/>` tag, common to all NoSQL
    datastores it supports. These common properties are discussed in [Table 9-1](#part0015.xhtml#Tab1).    [Table
    9-1](#part0015.xhtml#_Tab1). Kundera Persistence Configuration Properties     |
    Property | Description | Required/Optional | | --- | --- | --- | | `kundera.nodes`
    | Nodes/s on which NoSQL server is running. | Required | | `kundera.port` | NoSQL
    database port. | Required | | `kundera.keyspace` | NoSQL database keyspace. |
    Required | | `kundera.dialect` | The NoSQL database dialect to determine the persistence
    provider. Valid values are: `cassandra`, `mongodb,` and `hbase`. | Required |
    | `kundera.client.lookup.class` | NoSQL database-specific client class for low-level
    datastore operations. | Required | | `kundera.cache.provider.class` | The L2 cache
    implementation class. | Required | | `kundera.cache.config.resource` | File containing
    L2 cache implementation. | Required | | `kundera.ddl.auto.


    prepare` | Specifies an option to automatically generate schema and tables for
    all entities. Valid options are:`create`: Drops, if one exists, the schema and
    creates schema/tables based on entity definitions.`create-drop`: Same as `create`
    and in addition drops schema after operation ends.`update`: Updates schema/tables
    based on entity definitions.`validate`: Validates schema/table based on entity
    definitions and throws `SchemaGenerationException` if validation fails. | Optional
    | | `kundera.pool.size.max.active` | Upper limit on the number of object instances
    managed by the pool per node. | Optional | | `kundera.pool.size.max.idle` | Upper
    limit on the number of idle object instances in the pool. | Optional | | `kundera.pool.size.min.idle`
    | Minimum number of idle object instances in the pool. | Optional | | `kundera.pool.size.max.total`
    | Upper limit on the total number of object instances in the pool from all nodes
    combined. | Optional | | `index.home.dir` | If Lucene indexes are chosen instead
    of the inbuilt secondary indexes, directory path to store Lucene indexes. | Optional
    | | `kundera.client.property` | Name of the NoSQL database-specific configuration
    file, which must be in the classpath. | Optional | | `kundera.batch.size` | Batch
    size in integer for bulk insert/update. | Optional | | `kundera.username` | Username
    to authenticate Cassandra and MongoDB. | Optional | | `kundera.password` | Password
    to authenticate Cassandra and MongoDB. | Optional |     9.    In the `persistence.xml`
    for the Maven project specify persistence-unit name as `kundera`.    10.    Add
    a `<provider/>` element set to `com.impetus.kundera.KunderaPersistence`.    11.    Specify
    the JPA entity class to `kundera.Catalog` in the `<class/>` element.    12.    Add
    `<property/>` tags grouped as subelements of the `<properties/>` tag. Add the
    properties discussed in [Table 9-2](#part0015.xhtml#Tab2).    [Table 9-2](#part0015.xhtml#_Tab2).
    Configured Kundera Persistence Properties     | Property | Description | Value
    | | --- | --- | --- | | `kundera.nodes` | MongoDB host name. | `localhost` or
    `127.0.0.1` | | `kundera.port` | MongoDB port. | `27017` | | `kundera.keyspace`
    | MongoDB database. | `local` | | `kundera.dialect` | Kundera Dialect. Used by
    Kundera to determine persistence provider implementation. | `mongodb` | | `kundera.ddl.auto.prepare`
    | Used by Kundera to automatically generate schema and entities in a persistence
    unit. | `create` | | `kundera.client.lookup.class` | Used by Kundera to find low-level
    dialect classes to perform operations on the MongoDB. | `com.impetus.client.mongodb.``MongoDBClientFactory`
    | | `kundera.annotations.scan.package` | The package to scan for JPA entities.
    | `kundera` |    The `persistence.xml` configuration file is listed below.    ```
    <?xml version="1.0" encoding="UTF-8"?> <persistence version="2.1"     xmlns="http://xmlns.jcp.org/xml/ns/persistence"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"     xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/persistence
    http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd">     <persistence-unit
    name="kundera">         <provider>com.impetus.kundera.KunderaPersistence</provider>
            <class>kundera.Catalog</class>         <properties>             <property
    name="kundera.nodes" value="127.0.0.1" />             <property name="kundera.port"
    value="27017" />             <property name="kundera.keyspace" value="local" />
                <property name="kundera.dialect" value="mongodb" />             <property
    name="kundera.ddl.auto.prepare" value="create" />             <property name="kundera.client.lookup.class"
                    value="com.impetus.client.mongodb.MongoDBClientFactory" />             <property
    name="kundera.annotations.scan.package" value="kundera" />         </properties>
        </persistence-unit> </persistence> ```    Some NoSQL database-specific properties
    may also be specified in a separate XML configuration file.'
  trans: "\n### 为实体类添加字段与注解\n\n为实体类添加 `journal`、`publisher`、`edition`、`title` 和 `author`\
    \ 字段，并使用 `@Column` 注解来指定字段与文档列的映射关系。\n\n```java\n@Column(name = \"journal\")\n\
    private String journal;\n\n@Column(name = \"publisher\")\nprivate String publisher;\n\
    \n@Column(name = \"edition\")\nprivate String edition;\n\n@Column(name = \"title\"\
    )\nprivate String title;\n\n@Column(name = \"author\")\nprivate String author;\n\
    ```\n\n8.  为每个字段添加对应的 `get`/`set` 访问器方法。完整的 JPA `Entity` 类如下所示。\n\n```java\npackage\
    \ kundera;\n\nimport java.io.Serializable;\nimport javax.persistence.*;\n\n/**\n\
    \ * Entity implementation class for Entity: Catalog\n *\n */\n@Entity\n@Table(name\
    \ = \"catalog\", schema = \"local@kundera\")\npublic class Catalog implements\
    \ Serializable {\n\n    private static final long serialVersionUID = 1L;\n\n \
    \   @Id\n    @Column(name = \"_id\")\n    private String catalogId;\n\n    public\
    \ Catalog() {\n        super();\n    }\n\n    @Column(name = \"journal\")\n  \
    \  private String journal;\n\n    @Column(name = \"publisher\")\n    private String\
    \ publisher;\n\n    @Column(name = \"edition\")\n    private String edition;\n\
    \n    @Column(name = \"title\")\n    private String title;\n\n    @Column(name\
    \ = \"author\")\n    private String author;\n\n    public String getCatalogId()\
    \ {\n        return catalogId;\n    }\n\n    public void setCatalogId(String catalogId)\
    \ {\n        this.catalogId = catalogId;\n    }\n\n    public String getJournal()\
    \ {\n        return journal;\n    }\n\n    public void setJournal(String journal)\
    \ {\n        this.journal = journal;\n    }\n\n    public String getPublisher()\
    \ {\n        return publisher;\n    }\n\n    public void setPublisher(String publisher)\
    \ {\n        this.publisher = publisher;\n    }\n\n    public String getEdition()\
    \ {\n        return edition;\n    }\n\n    public void setEdition(String edition)\
    \ {\n        this.edition = edition;\n    }\n\n    public String getTitle() {\n\
    \        return title;\n    }\n\n    public void setTitle(String title) {\n  \
    \      this.title = title;\n    }\n\n    public String getAuthor() {\n       \
    \ return author;\n    }\n\n    public void setAuthor(String author) {\n      \
    \  this.author = author;\n    }\n}\n```\n\n### 在 persistence.xml 配置文件中配置 JPA\n\
    \n在本节中，我们将在 Maven 项目的 `src/main/resources` 文件夹下创建一个 `META-INF/persistence.xml`\
    \ 配置文件。我们将在 `persistence.xml` 配置文件中配置对象/关系映射。Kundera 支持一些通过 `<property/>` 标签在\
    \ `persistence.xml` 中指定的属性，这些属性对所有支持的 NoSQL 数据存储都是通用的。这些通用属性在 表 9-1 中讨论。\n\n**表\
    \ 9-1**. Kundera 持久化配置属性\n\n| 属性 | 描述 | 必需/可选 |\n| :--- | :--- | :--- |\n| `kundera.nodes`\
    \ | NoSQL 服务器运行的节点。 | 必需 |\n| `kundera.port` | NoSQL 数据库端口。 | 必需 |\n| `kundera.keyspace`\
    \ | NoSQL 数据库键空间。 | 必需 |\n| `kundera.dialect` | NoSQL 数据库方言，用于确定持久化提供者。有效值：`cassandra`、`mongodb`\
    \ 和 `hbase`。 | 必需 |\n| `kundera.client.lookup.class` | 用于低级别数据存储操作的 NoSQL 数据库特定客户端类。\
    \ | 必需 |\n| `kundera.cache.provider.class` | L2 缓存实现类。 | 必需 |\n| `kundera.cache.config.resource`\
    \ | 包含 L2 缓存实现的文件。 | 必需 |\n| `kundera.ddl.auto.prepare` | 指定自动生成所有实体的模式和表的选项。有效选项：`create`：如果存在则删除，并基于实体定义创建模式/表。`create-drop`：与\
    \ `create` 相同，并在操作结束后删除模式。`update`：基于实体定义更新模式/表。`validate`：基于实体定义验证模式/表，如果验证失败则抛出\
    \ `SchemaGenerationException`。 | 可选 |\n| `kundera.pool.size.max.active` | 每个节点由池管理的对象实例数量的上限。\
    \ | 可选 |\n| `kundera.pool.size.max.idle` | 池中空闲对象实例数量的上限。 | 可选 |\n| `kundera.pool.size.min.idle`\
    \ | 池中空闲对象实例的最小数量。 | 可选 |\n| `kundera.pool.size.max.total` | 所有节点合并的池中对象实例总数的上限。\
    \ | 可选 |\n| `index.home.dir` | 如果选择 Lucene 索引而不是内置的二级索引，此属性指定存储 Lucene 索引的目录路径。\
    \ | 可选 |\n| `kundera.client.property` | NoSQL 数据库特定配置文件的名称，该文件必须在类路径中。 | 可选 |\n\
    | `kundera.batch.size` | 批量插入/更新的批处理大小（整数）。 | 可选 |\n| `kundera.username` | 用于认证\
    \ Cassandra 和 MongoDB 的用户名。 | 可选 |\n| `kundera.password` | 用于认证 Cassandra 和 MongoDB\
    \ 的密码。 | 可选 |\n\n9.  在 Maven 项目的 `persistence.xml` 文件中，将持久化单元名称指定为 `kundera`。\n\
    10. 添加一个 `<provider/>` 元素，其值设置为 `com.impetus.kundera.KunderaPersistence`。\n11.\
    \ 在 `<class/>` 元素中将 JPA 实体类指定为 `kundera.Catalog`。\n12. 在 `<properties/>` 标签内作为子元素添加\
    \ `<property/>` 标签。添加 表 9-2 中讨论的属性。\n\n**表 9-2**. 已配置的 Kundera 持久化属性\n\n| 属性 |\
    \ 描述 | 值 |\n| :--- | :--- | :--- |\n| `kundera.nodes` | MongoDB 主机名。 | `localhost`\
    \ 或 `127.0.0.1` |\n| `kundera.port` | MongoDB 端口。 | `27017` |\n| `kundera.keyspace`\
    \ | MongoDB 数据库。 | `local` |\n| `kundera.dialect` | Kundera 方言。Kundera 使用它来确定持久化提供者实现。\
    \ | `mongodb` |\n| `kundera.ddl.auto.prepare` | Kundera 使用它自动在持久化单元中生成模式和实体。 |\
    \ `create` |\n| `kundera.client.lookup.class` | Kundera 使用它来查找用于在 MongoDB 上执行操作的低级别方言类。\
    \ | `com.impetus.client.mongodb.MongoDBClientFactory` |\n| `kundera.annotations.scan.package`\
    \ | 要扫描 JPA 实体的包。 | `kundera` |\n\n`persistence.xml` 配置文件如下所示。\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"2.1\"\n    xmlns=\"\
    http://xmlns.jcp.org/xml/ns/persistence\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/persistence http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\"\
    >\n    <persistence-unit name=\"kundera\">\n        <provider>com.impetus.kundera.KunderaPersistence</provider>\n\
    \        <class>kundera.Catalog</class>\n        <properties>\n            <property\
    \ name=\"kundera.nodes\" value=\"127.0.0.1\" />\n            <property name=\"\
    kundera.port\" value=\"27017\" />\n            <property name=\"kundera.keyspace\"\
    \ value=\"local\" />\n            <property name=\"kundera.dialect\" value=\"\
    mongodb\" />\n            <property name=\"kundera.ddl.auto.prepare\" value=\"\
    create\" />\n            <property name=\"kundera.client.lookup.class\"\n    \
    \            value=\"com.impetus.client.mongodb.MongoDBClientFactory\" />\n  \
    \          <property name=\"kundera.annotations.scan.package\" value=\"kundera\"\
    \ />\n        </properties>\n    </persistence-unit>\n</persistence>\n```\n\n\
    一些 NoSQL 数据库特定的属性也可以在单独的 XML 配置文件中指定。\n"
- fmt: "# MongoDB 特定属性配置\n\n[Table 9-3](#part0015.xhtml#Tab3) 展示了支持的以下 MongoDB 特定属性。\n\
    \n**表 9-3. MongoDB 特定配置属性**\n\n| 属性 | 描述 |\n| --- | --- |\n| `read.preference`\
    \ | 读取偏好。应从主节点还是从节点读取数据。 |\n| `socket.timeout` | 套接字超时是 Kundera 在连接 MongoDB 超时前等待的时间段（以毫秒为单位）。\
    \ |\n\n例如，要配置 MongoDB 特定属性，请在 `persistence.xml` 中的 MongoDB 特定配置文件中添加以下属性。\n\n\
    ```\n<property name=\"kundera.client.property\" value=\"kundera-mongo.xml\" />\n\
    ```\n\nMongoDB 特定配置文件的名称是 `kundera-mongo.xml`。以下是一个示例 MongoDB 特定配置文件。\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<clientProperties>\n    <datastores>\n\
    \        <dataStore>\n        <name>mongo</name>\n        <connection>\n     \
    \       <properties>\n                <property name=\"read.preference\" value=\"\
    secondary\"></property>\n            <property name=\"socket.timeout\" value=\"\
    50000\"></property>\n            </properties>\n            <servers>\n      \
    \          <server>\n                <host>192.160.140.160</host>\n          \
    \      <port>27017</port>\n            </server>\n                <server>\n \
    \               <host>192.161.141.161</host>\n                <port>27018</port>\n\
    \            </server>\n            </servers>\n        </connection>\n      \
    \  </dataStore>\n    </datastores>\n</clientProperties>\n```\n\n我们尚未使用任何 MongoDB\
    \ 特定的配置文件。\n\n接下来，在 `src/main/resources/META-INF/` 文件夹中创建 `persistence.xml` 配置文件。新建\
    \ Maven 项目时，`META-INF` 文件夹不会自动创建。要添加 `META-INF` 文件夹，请右键单击资源文件夹，选择 **New > Folder**，如\
    \ [Figure 9-9](#part0015.xhtml#Fig9) 所示。\n\n![9781484215999_Fig09-09.jpg](Images/image00643.jpeg)\n\
    \n[图 9-9](#part0015.xhtml#_Fig9). 在资源文件夹中创建新文件夹\n\n在 **New Folder** 向导中，选择 `src/main/resources`\
    \ 文件夹，将文件夹名称指定为 `META-INF`，然后单击 **Finish**，如 [Figure 9-10](#part0015.xhtml#Fig10)\
    \ 所示。\n\n![9781484215999_Fig09-10.jpg](Images/image00644.jpeg)\n\n[图 9-10](#part0015.xhtml#_Fig10).\
    \ 创建 META-INF 文件夹\n\n`META-INF` 文件夹已创建。接下来，将 `persistence.xml` 文件添加到 `META-INF`\
    \ 文件夹。\n\n1.  要创建 `persistence.xml` 文件，请选择 **File > New > Other**。\n2.  在 **New**\
    \ 窗口中，选择 **XML > XML File** 并单击 **Next**，如 [Figure 9-11](#part0015.xhtml#Fig11)\
    \ 所示。\n    ![9781484215999_Fig09-11.jpg](Images/image00645.jpeg)\n    [图 9-11](#part0015.xhtml#_Fig11).\
    \ 创建 XML 文件\n3.  在 **New XML File** 向导中，选择 `META-INF` 文件夹并将文件名指定为 `persistence.xml`，如\
    \ [Figure 9-12](#part0015.xhtml#Fig12) 所示。单击 **Finish**。\n    ![9781484215999_Fig09-12.jpg](Images/image00646.jpeg)\n\
    \    [图 9-12](#part0015.xhtml#_Fig12). 创建 persistence.xml\n    `persistence.xml`\
    \ 文件已添加到 `META-INF` 文件夹。\n4.  将前面列出的 `persistence.xml` 文件内容复制到 Maven 项目中的 `persistence.xml`\
    \ 文件，如 [Figure 9-13](#part0015.xhtml#Fig13) 所示。\n    ![9781484215999_Fig09-13.jpg](Images/image00647.jpeg)\n\
    \    [图 9-13](#part0015.xhtml#_Fig13). 持久化配置文件 persistence.xml\n\n# 创建 JPA 客户端类\n\
    \n我们已经配置了一个 JPA 项目用于对象/关系映射到 MongoDB 数据库。接下来，我们将使用 JPA API 运行一些 CRUD 操作。但是，首先我们需要为\
    \ CRUD 操作创建一个客户端类。我们将使用一个 Java 类作为客户端类。\n\n1.  选择 **File > New > Other**。\n2.\
    \  在 **New** 窗口中，选择 **Java > Class** 并单击 **Next**。\n3.  在 **New Java Class** 向导中，指定一个包\
    \ (`kundera`) 和一个类名 (`KunderaClient`)，如 [Figure 9-14](#part0015.xhtml#Fig14) 所示。选择为类添加\
    \ `main` 方法的方法存根，然后单击 **Finish**。\n    ![9781484215999_Fig09-14.jpg](Images/image00648.jpeg)\n\
    \    [图 9-14](#part0015.xhtml#_Fig14). 创建客户端类 KunderaClient\n    `kundera.KunderaClient`\
    \ 类已添加到 `KunderaMongoDB` Maven 项目中，如 [Figure 9-15](#part0015.xhtml#Fig15) 所示。\n\
    \    ![9781484215999_Fig09-15.jpg](Images/image00649.jpeg)\n    [图 9-15](#part0015.xhtml#_Fig15).\
    \ 包含 KunderaClient 类的 Maven 项目目录结构\n\n我们将向 `KunderaClient` 应用程序添加 [Table 9-4](#part0015.xhtml#Tab4)\
    \ 中所示的方法，以在 MongoDB 上运行 CRUD 操作。我们将从 `main` 方法调用这些方法，开始时注释掉所有方法。我们将一次取消注释一个方法并运行\
    \ `KunderaClient` 应用程序。\n\n**表 9-4. KunderaClient 应用程序方法**\n\n| 属性 | 描述 |\n| ---\
    \ | --- |\n| `create()` | 创建实体。 |\n| `findByClass()` | 使用实体类查找实体。 |\n| `query()`\
    \ | 查询实体。 |\n| `update()` | 更新实体。 |\n| `delete()` | 删除实体。 |\n\n# 运行 CRUD 操作\n\n\
    在接下来的几个小节中，我们将在 `catalog` 集合中创建一个目录，并向目录中添加数据、查找目录条目、更新目录条目和删除目录条目。\n\n## 创建目录\n\
    \n在本节中，我们将向 MongoDB 中的 `catalog` 集合添加一些文档。\n\n1.  向 `KunderaClient` 类添加一个名为 `create()`\
    \ 的方法，并从 `main` 方法调用该方法，以便在应用程序运行时调用该方法。\n    JPA API 在 `javax.persistence` 包中定义。`EntityManager`\
    \ 接口用于与持久化上下文交互。`EntityManagerFactory` 接口用于与持久化单元的实体管理器工厂交互。在 Java SE 环境中，`Persistence`\
    \ 类用于获取 `EntityManagerFactory` 对象。\n2.  使用 `Persistence` 类的静态方法 `createEntityManagerFactory(java.lang.String\
    \ persistenceUnitName)` 创建一个 `EntityManagerFactory` 对象。\n3.  使用 `EntityManagerFactory`\
    \ 对象的 `createEntityManager()` 方法创建一个 `EntityManager` 实例。\n    ```\n    EntityManagerFactory\
    \  emf = Persistence.createEntityManagerFactory(\"kundera\");\n    em = emf.createEntityManager();\n\
    \    ```\n4.  在 `create()` 方法中，创建实体类 `Catalog` 的一个实例。使用 set 方法设置 `catalogId`、`journal`、`publisher`、`edition`、`title`\
    \ 和 `author` 字段。\n    ```\n    Catalog catalog = new Catalog();\n            catalog.setCatalogId(\"\
    catalog1\");\n            catalog.setJournal(\"Oracle Magazine\");\n         \
    \   catalog.setPublisher(\"Oracle Publishing\");\n            catalog.setEdition(\"\
    November-December 2013\");\n            catalog.setTitle(\"Engineering as a Service\"\
    );\n            catalog.setAuthor(\"David A. Kelly\");\n    ```\n5.  使用 `EntityManager`\
    \ 接口中的 `persist(java.lang.Object entity)` 方法使领域模型实例受管理和持久化。\n    ```\n    em.persist(catalog);\n\
    \    ```\n    同样，其他 JPA 实例也可以被持久化。当我们在后面的部分运行 `KunderaClient` 类时，`Catalog` 实体将被持久化到\
    \ MongoDB 数据库。\n\n## 使用实体类查找目录条目\n\n`EntityManager` 类提供了多种方法用于查找实体实例。在本节中，我们将使用\
    \ `find(java.lang.`"
  raw: 'The following ([Table 9-3](#part0015.xhtml#Tab3)) MongoDB-specific properties
    are supported.    [Table 9-3](#part0015.xhtml#_Tab3). MongoDB-Specific Configuration
    Properties     | Property | Description | | --- | --- | | `read.preference` |
    The read preference. Whether the primary or secondary server should be read from.
    | | `socket.timeout` | The socket timeout is the time period in milliseconds that
    Kundera waits for connection from MongoDB before timing out. |    13.    For example,
    to configure MongoDB-specific properties add the following property for the MongoDB-specific
    configuration file in `persistence.xml`.    ``` <property name="kundera.client.property"
    value="kundera-mongo.xml" /> ```    The name of the MongoDB-specific configuration
    file, `kundera-mongo.xml`. A sample MongoDB-specific configuration file is listed.    ```
    <?xml version="1.0" encoding="UTF-8"?> <clientProperties>     <datastores>         <dataStore>
            <name>mongo</name>         <connection>             <properties>                 <property
    name="read.preference" value="secondary"></property>             <property name="socket.timeout"
    value="50000"></property>             </properties>             <servers>                 <server>
                    <host>192.160.140.160</host>                 <port>27017</port>
                </server>                 <server>                 <host>192.161.141.161</host>
                    <port>27018</port>             </server>             </servers>
            </connection>         </dataStore>     </datastores> </clientProperties>
    ```    We have not used any MongoDB-specific configuration file.    14.    Next,
