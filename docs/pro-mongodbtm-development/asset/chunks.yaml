    November December 2013\ntitle\nQuintessential and Collaborative\nauthor\nTom Haunert\n\
    _id\n55d4e56c0bc271d4a7002749\ncatalogId\ncatalog3\njournal\nOracle Magazine\n\
    publisher\nOracle Publishing\nedition\nNovember December 2013\ntitle\nEngineering\
    \ as a Service\nauthor\nDavid A. Kelly\n```\n\nThe `updateOne()` method example\
    \ updates the `edition` and `author` fields of the document with `catalogId` as\
    \ `catalog1 using the update operator $set`. The `updateMany()` method example\
    \ sets the `journal` field of all documents to `OracleMagazine` using the update\
    \ operator `$set`. As indicated in the output, the number of documents matched\
    \ and modified are both 0 for the `replaceOne()` method example. Because `UpdateOptions`\
    \ are set to upsert a document, a new document gets added when a `Document` instance\
    \ for `catalogId catalog3` is not found.\n\nDeleting Data in MongoDB\n\nIn this\
    \ section we shall delete documents using the `DeleteDBDocument` application.\
    \ The `MongoCollection<TDocument>` interface provides several methods for deleting\
    \ documents as discussed in [Table 1-10](#part0007.xhtml#Tab10).\n\n[Table 1-10](#part0007.xhtml#_Tab10).\
    \ MongoCollection<TDocument> Methods to Delete Documents\n\n| Method | Description\
    \ |\n| --- | --- |\n| `deleteMany(Bson filter)` | Deletes all documents from a\
    \ collection using a query filter and returns result as `DeleteResult`. The `DeleteResult`\
    \ contains information about number of documents deleted, and whether the delete\
    \ was acknowledged. |\n| `deleteOne(Bson filter)` | Deletes one document based\
    \ on a query filter and returns result as `DeleteResult`. |\n| `findOneAndDelete(Bson\
    \ filter)` | Finds a document based on a query filter and deletes the document.\
    \ Returns the deleted document. |\n| `findOneAndDelete(Bson filter, FindOneAndDeleteOptions\
    \ options)` | Finds a document based on a query filter and the `FindOneAndDeleteOptions`\
    \ options and deletes the document. Returns the deleted document. `FindOneAndDeleteOptions`\
    \ options include the maximum time to find and delete, the sort criteria, and\
    \ which document fields to return. |\n\n1.  In the `DeleteDBDocument` application\
    \ create a `MongoClient` client as discussed previously. Create a `MongoDatabase`\
    \ instance for the `local` database from the `MongoClient` instance and create\
    \ a `MongoCollection<TDocument>` instance for the `catalog` collection from the\
    \ `MongoDatabase` instance.\n\n```\n    MongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n    MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n    MongoCollection<Document> coll = db.getCollection(\"catalog\");\n\
    \    ```\n\n2.  Create and add four `Document` instances using the model class\
    \ `Catalog` to set the `Document` fields."
  trans: "\n# 验证文档更新\n\n6.  为了验证文档是否已更新或替换，输出目录集合中的所有文档。使用 `find()` 方法为 `catalog`\
