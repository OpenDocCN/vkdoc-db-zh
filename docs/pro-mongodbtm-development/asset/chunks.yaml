    \ Hive 管理。对于外部表，Hive 只管理元数据，而不管理表数据。如果删除一个 Hive 管理表，数据和元数据都会被删除。但如果删除一个 Hive 外部表，则只会删除元数据，而不会删除表数据。Hive\
    \ 外部表适用于数据存储在外部数据源（如 MongoDB 数据库）中的场景。本节我们将介绍 Hive MongoDB 存储处理器，它用于在 MongoDB\
    \ 数据库上创建 Hive 外部表。\n\nHive 的 MongoDB 存储处理器类是`org.yong3.hive.mongo.MongoStorageHandler`。该存储处理器仅支持\
    \ Hive 原始类型，如`int`和`string`。MongoDB 存储处理器提供了 serde 属性`mongo.column.mapping`，用于指定要映射到\
    \ Hive 外部表的 MongoDB 数据存储列名。此外，还支持以下`tblproperties`属性（见表 11-1）。\n\n表 11-1. Mongo\
    \ 存储处理器属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `mongo.host` | MongoDB 主机名。 |\n| `mongo.port`\
    \ | MongoDB 端口。 |\n| `mongo.db` | MongoDB 数据库。 |\n| `mongo.user` | MongoDB 用户名。\
    \ |\n| `mongo.passwd` | MongoDB 密码。 |\n| `mongo.collection` | MongoDB 集合。 |\n\n\
    ## 环境设置\n\n本章需要以下软件：\n\n*   Hadoop 2.0.0 CDH 4.6\n*   Hive 0.10.0 CDH 4.6\n* \
    \  MongoDB Java Driver 2.11.3\n*   MongoDB Storage Handler for Hive 0.0.3\n* \
    \  MongoDB 2.6.3\n*   Eclipse IDE for Java EE Developers\n*   Java 7\n\n也可以使用所列软件的更高版本。从`https://github.com/yc-huang/Hive-mongo`下载\
    \ MongoDB 存储处理器，并将 zip 文件解压到一个目录。包含存储处理器的 Jar 文件位于`Hive-mongo-master/release`目录中。使用`hive-mongo-0.0.3-jar-with-dependencies.jar`文件，其中包含了所有必需的依赖项。从`http://central.maven.org/maven2/org/mongodb/mongo-java-driver/`下载\
    \ MongoDB Java 驱动程序 Jar 文件`mongo-java-driver-2.11.3.jar`或更高版本。\n\n完成以下步骤来设置环境：\n\
    \n1.  我们使用了安装在 Oracle VirtualBox 4.3 上的 Oracle Linux 6.5。但也可以使用不同的 Linux 发行版。Oracle\
    \ Linux 基于 RedHat Linux，是最常用的 Linux 发行版之一。创建 MongoDB 和其他软件的目录并设置权限。\n\n    ```\n\
    \    mkdir /mongodb\n    chmod -R 777 /mongodb\n    cd /mongodb\n    ```\n\n2.\
    \  下载 Java 7 并将文件解压到`/mongodb`目录。\n\n    ```\n    tar zxvf jdk-7u55-linux-i586.gz\n\
    \    ```\n\n3.  下载 Hadoop 2.0.0 并将`tar.gz`文件解压到一个目录。\n\n    ```\n    wget http://archive.cloudera.com/cdh4/cdh/4/hadoop-2.0.0-cdh4.6.0.tar.gz\n\
    \    tar -xvf hadoop-2.0.0-cdh4.6.0.tar.gz\n    ```\n\n4.  为 Hadoop 的`bin`和`conf`目录创建符号链接。\n\
    \n    ```\n    ln -s /mongodb/hadoop-2.0.0-cdh4.6.0/bin /oranosql/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2/bin\n\
    \    ln -s /mongodb/hadoop-2.0.0-cdh4.6.0/etc/hadoop /oranosql/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2/conf\n\
    \    ```\n\n5.  在`core-site.xml`和`hdfs-site.xml`配置文件中配置 Hadoop。在下面列出的`core-site.xml`中，设置`fs.defaultFS`和`hadoop.tmp.dir`属性。\n\
    \n    ```\n    <?xml-stylesheet type=\"text/xsl\" href=\"configuration.xsl\"?>\n\
    \    <!-- Put site-specific property overrides in this file. -->\n    <configuration>\n\
    \    <property>\n      <name>fs.defaultFS</name>\n        <value>hdfs://10.0.2.15:8020</value>\n\
    \    </property>\n    <property>\n        <name>hadoop.tmp.dir</name>\n      \
    \  <value>file:///var/lib/hadoop-0.20/cache</value>\n    </property>\n    </configuration>\n\
    \    ```\n\n6.  创建为`hadoop.tmp.dir`属性指定的目录，并将其权限设置为全局（`777`）。\n\n    ```\n   \
    \ mkdir -p /var/lib/hadoop-0.20/cache\n    chmod -R 777 /var/lib/hadoop-0.20/cache\n\
    \    ```\n\n7.  在下面列出的`hdfs-site.xml`配置文件中，设置`dfs.permissions.superusergroup`、`dfs.namenode.name.dir`、`dfs.replication`和`dfs.permissions`属性。\n\
    \n    ```\n    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n    <?xml-stylesheet\
    \ type=\"text/xsl\" href=\"configuration.xsl\"?>\n    <!-- Put site-specific property\
    \ overrides in this file. -->\n    <configuration>\n    <property>\n      <name>dfs.permissions.superusergroup</name>\n\
    \      <value>hadoop</value>\n    </property>\n    <property>\n      <name>dfs.namenode.name.dir</name>\n\
    \      <value>file:///data/1/dfs/nn</value>\n    </property>\n    <property>\n\
    \      <name>dfs.replication</name>\n      <value>1</value>\n    </property>\n\
    \    <property>\n      <name>dfs.permissions</name>\n      <value>false</value>\n\
    \    </property>\n    </configuration>\n    ```\n\n8.  创建 NameNode 存储目录并设置其权限。\n\
    \n    ```\n    mkdir -p /data/1/dfs/nn\n    chmod -R 777 /data/1/dfs/nn\n    ```\n\
    \n9.  下载并安装 Hive 0.10.0 CDH 4.6。\n\n    ```\n    wget http://archive.cloudera.com/cdh4/cdh/4/hive-0.10.0-cdh4.6.0.tar.gz\n\
    \    tar -xvf hive-0.10.0-cdh4.6.0.tar.gz\n    ```\n\n10. 从模板创建`hive-site.xml`文件。\n\
    \n    ```\n    cd /mongodb/hive-0.10.0-cdh4.6.0/conf\n    cp hive-default.xml.template\
    \ hive-site.xml\n    ```\n\n11. 默认情况下，Hive 使用嵌入式元存储。我们将使用远程元存储，为此需要将`hive.metastore.uris`属性配置为远程元存储的\
    \ URI。同时将`hive.metastore.warehouse.dir`属性设置为 Hive 存储目录，即存储 Hive 数据库和表的目录。`hive-site.xml`配置文件如下：\n\
    \n    ```\n    <?xml version=\"1.0\"?>\n    <?xml-stylesheet type=\"text/xsl\"\
    \ href=\"configuration.xsl\"?>\n    <configuration>\n    <property>\n      <name>hive.metastore.warehouse.dir</name>\n\
    \      <value>hdfs://10.0.2.15:8020/user/hive/warehouse</value>\n    </property>\n\
    \    <property>\n      <name>hive.metastore.uris</name>\n      <value>thrift://localhost:10000</value>\n\
    \    </property>\n    </configuration>\n    ```\n\n12. 创建在`hive.metastore.warehouse.dir`属性中指定的\
    \ HDFS 路径目录并设置其权限。\n\n    ```\n    hadoop dfs -mkdir hdfs://10.0.2.15:8020/user/hive/warehouse\n\
    \    hadoop dfs -chmod -R g+w hdfs://10.0.2.15:8020/user/hive/warehouse\n    ```\n\
    \n13. 下载并解压 MongoDB 2.6.3 文件。\n\n    ```\n    curl -O http://downloads.mongodb.org/linux/mongodb-linux-i686-2.6.3.tgz\n\
    \    tar -zxvf mongodb-linux-i686-2.6.3.tgz\n    ```\n\n14. 将`mongo-java-driver-2.6.3.jar`和`hive-mongo-0.0.3-jar-with-dependencies.jar`复制到`/mongodb/hive-0.10.0-cdh4.6.0/lib`目录。在\
    \ bash shell 中设置 Hadoop、Hive、Java 和 MongoDB 的环境变量。\n\n    ```\n    vi ~/.bashrc\n\
    \    export HADOOP_PREFIX=/mongodb/hadoop-2.0.0-cdh4.6.0\n    export HADOOP_CONF=$HADOOP_PREFIX/etc/hadoop\n\
    \    export MONGO_HOME=/mongodb/mongodb-linux-i686-2.6.3\n    export HIVE_HOME=/mongodb/hive-0.10.0-cdh4.6.0\n\
    \    export HIVE_CONF=$HIVE_HOME/conf\n    export JAVA_HOME=/mongodb/jdk1.7.0_55\n\
    \    export HADOOP_MAPRED_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/bin\n    export\
    \ HADOOP_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2\n    export\
    \ HADOOP_CLASSPATH=$HADOOP_HOME/*:$HADOOP_HOME/lib/*:$HIVE_HOME/lib/*:/mongodb/mongo-java-driver-2.6.3.jar:/mongodb/hive-mongo-0.0.3-jar-with-dependencies.jar\n\
    \    export PATH=$PATH:$JAVA_HOME/bin:$HADOOP_PREFIX/bin:$HIVE_HOME/bin:$MONGO_HOME/bin\n\
    \    ```\n"
