    # 使用文档


    在接下来的小节中，我们将讨论添加文档、批量添加文档、查询文档、更新文档以及删除文档。


    ## 添加文档


    本节我们将使用 `db.collection.insert()` 这个 JavaScript 方法，通过 Mongo shell 向 MongoDB 添加一个文档。`insert()`
    辅助方法对于不同版本的 MongoDB 具有不同的语法，后续版本中添加了一些新功能，如 表 2-2 所列。


    表 2-2. 插入辅助方法语法


    | MongoDB 版本 | insert 方法语法 | 描述 |

    | --- | --- | --- |

    | 2.6 及更高版本 | `db.collection.insert(<document or array of documents>,{writeConcern:
    <document>,ordered:<boolean>})` | 添加了 `writeConcern` 和 ordered 选项——两者都是可选的。`writeConcern`
    选项为“安全写入”提供不同级别的插入成功保证。ordered 选项接受一个布尔值，并按顺序插入文档，默认为 false。该插入方法对单个文档插入返回一个 `WriteResult`
    对象，对文档数组插入返回一个 `BulkWriteResult` 对象。 |

    | 2.2 | `db.collection.insert(<document or array of documents>)` | 支持添加单个文档或文档数组。
    |

    | 2.04 | `db.collection.insert(<document>)` | 仅支持添加一个文档。单个文档可以包含子文档。 |


    要添加一个文档，请完成以下步骤：


    ### 1. 删除现有集合


    在添加新文档或文档数组之前，如果 `catalog` 集合已存在，则将其删除。


    ```

    >db.catalog.drop()

    ```


    ### 2. 创建文档


    创建要添加的 BSON 文档结构。


    ```

    >use catalog

    >doc1 = {"catalogId" : "catalog1", "journal" : ''Oracle Magazine'', "publisher"
    : ''Oracle Publishing'', "edition" : ''November December 2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''}

    ```


    ### 3. 插入文档


    使用 `catalog` 集合，在文档上调用 `db.collection.insert()` 方法。


    ```

    >db.catalog.insert(doc1)

    ```


    ### 4. 验证插入


    随后运行 `db.collection.find()` 方法以查找 `catalog` 集合中的文档。


    ```

    >db.catalog.find()

    ```


    添加的单个文档会被列出，并包含 `_id` 字段。`_id` 字段在文档的 JSON 结构中并未指定，它在文档被添加到数据库之前会自动被添加。


    `insert()` 方法返回的 `WriteResult` 对象包含 `nInserted` 字段，用以指示添加的文档数量。添加一个文档时，`nInserted`
    字段的值为 1，如 图 2-23 所示。


    ![9781484215999_Fig02-23.jpg](img/image00447.jpeg)


    图 2-23. 使用插入方法添加文档


    接下来，我们将添加一个在 BSON 文档结构中指定了 `_id` 字段的 BSON 文档。


    ### 5. 创建带 _id 的文档


    指定与之前相同的文档，但额外添加一个 `_id` 字段。`_id` 字段的值必须是一个 `ObjectId` 对象。


    ```

    >doc1 = {"_id": ObjectId("507f191e810c19729de860ea"), "catalogId" : "catalog1",
    "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition"
    : ''November December 2013'',"title" : ''Engineering as a Service'',"author" :
    ''David A. Kelly''};

    ```


    ### 6. 插入带 _id 的文档


    使用 `db.collection.insert` 方法添加该文档。

