    \ with save() Method\n\nIn all of the preceding examples of `save()` we specified\
    \ the `_id` field in the document added with `insert()` and subsequently saved\
    \ with `save` method. In the next example of using the `save()` method we shall\
    \ invoke the `save()` method with a different _id field value than in the document\
    \ added with `insert()` method. Construct a BSON document as before and add the\
    \ document using the `insert()` method. Drop the `catalog` collection before running\
    \ the example.\n\n1.  A subsequent invocation of the `db.collection.find()` method\
    \ lists the document added.\n\n```\n    >db.catalog.drop()\n    >doc2 = {\"_id\"\
    : ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" : \"catalog2\", \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013'}\n    > db.catalog.insert(doc2)\n     >db.catalog.find()\n  \
    \  ```\n\n2.  Next, construct another document with the same fields and field\
    \ values except the `_id` field value being different. Save the document with\
    \ the `save` method.\n\n```\n     >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860eb\"\
    ),\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : '11-12-2013',\"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'}\n     >db.catalog.save(doc2)\n    ```\n\n3.  Subsequently\
    \ invoke the `db.collection.find()` method on the `catalog` collection.\n\n```\n\
    \    db.catalog.find()\n    ```\n\nBecause the document saved with the `save()`\
    \ method has a different `_id` field value, a new document gets added and two\
    \ documents get listed with `find()` as shown in [Figure 2-33](#part0008.xhtml#Fig33).\n\
    \n![9781484215999_Fig02-33.jpg](Images/image00457.jpeg)\n\n[Figure 2-33](#part0008.xhtml#_Fig33).\
    \ Upserting a Document with save()\n\nThe `nUpserted` in the `WriteResult` is\
    \ 1\\. *Upsert* is just a term for an insert when no document matches a query\
    \ document that could possibly match and update a document. *Upsert* is used in\
    \ the context of operations that modify or update a document if a matching document\
    \ is found. The `insert()` method does not modify or update a document and the\
    \ term *upsert* cannot be used in the context of the `insert()` method. The `save()`\
    \ and `update()` methods do modify or update a document and *upsert* is used in\
    \ the context of these methods.\n\nWhen a new `_id` field is used in the document\
    \ added with `insert()` and subsequently saved with the `save()` method the process\
    \ is called *upserting* the document.\n\nWhen the `_id` field is not specified\
    \ in the document with `insert()` and subsequently saved with `save()` an *insert*\
    \ is performed instead of an *upsert*. Next, we shall discuss an example of insert\
    \ using the `save()` method."
  trans: "# 使用 save()方法操作 MongoDB 文档示例\n\n| MongoDB 版本 | Save 方法 | 描述 |\n| --- | ---\
    \ | --- |\n| 2.4 | `db.collection.save(document)` | 保存一个文档。 |\n| 2.6 及更高版本 | `db.collection.save(<document>,{writeConcern:\
    \ <document>})` | 将文档保存到集合中。`writeConcern` 是一个新增的方法参数。 |\n\n本节将演示 `save()` 方法的不同用法。首先，我们将使用\
    \ `save()` 方法更新一个文档。使用 `db.collection.insert()` 方法在 `catalog` 集合中添加以下文档。\n\n##\
    \ 示例一：更新现有文档\n\n1.  在添加文档之前，先删除 `catalog` 集合并将当前数据库设置为 `catalog`。\n\n    ```javascript\n\
    \    >db.catalog.drop()\n    >use catalog\n    >doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"\
    ), \"catalogId\" : \"catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n    >db.catalog.insert(doc1)\n\
    \    ```\n\n2.  `db.collection.insert()` 方法添加文档，并返回一个 `WriteResult` 对象，其 `nInserted`\
    \ 字段值为 1。调用 `db.collection.find()` 方法列出添加的文档。\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\n3.  接着，构造一个与添加的文档具有相同 `_id` 但某些字段不同的文档。\n\n    ```javascript\n   \
    \ >doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 'catalog1',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : '11-12-2013',\"title\" : 'Engineering as a Service',\"author\" : 'Kelly, David\
    \ A.'}\n    ```\n\n4.  调用 `db.collection.save()` 方法保存修改了部分字段的文档。如果指定了 `writeConcern`\
    \ 选项，则会被忽略。\n\n    ```javascript\n    >db.catalog.save(doc1,{ writeConcern: {\
    \ w: \"majority\", wtimeout: 5000 } })\n    ```\n\n5.  `db.collection.save()`\
    \ 方法保存文档，并返回一个 `WriteResult` 对象，其 `nMatched` 和 `nModified` 字段值均为 1。因为使用了相同的 `_id`\
    \ 字段值，该文档被更新或修改为新文档的内容。随后，在 `catalog` 集合上调用 `db.collection.find()` 方法，列出先前添加并随后保存的文档。\n\
    \n    ```javascript\n    >db.catalog.find()\n    ```\n\n通过 `db.collection.insert()`\
    \ 添加并随后通过 `db.collection.save()` 保存的文档被列出。保存（更新后）的文档中，`edition` 字段和 `author` 字段已被修改，如\
    \ 图 2-31 所示。\n\n![9781484215999_Fig02-31.jpg](img/image00455.jpeg)\n\n图 2-31.\
    \ 使用 `save()` 方法更新文档\n\n在前面的例子中，用 `save()` 方法保存的文档与用 `insert()` 方法添加的文档具有完全相同的字段。在下一个例子中，我们将在\
    \ `save` 方法保存的文档中添加新字段，而不是在 `insert` 方法添加的文档中。\n\n## 示例二：为文档添加新字段\n\n1.  构造一个包含\
    \ `_id` 字段、`catalogId` 字段、`journal` 字段、`publisher` 字段和 `edition` 字段，但不包含 `title`\
    \ 和 `author` 字段的 BSON 文档。\n\n    ```javascript\n    doc2 = {\"_id\": ObjectId(\"\
    507f191e810c19729de860ea\"), \"catalogId\" : \"catalog2\", \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013'}\n    ```\n\n2.  使用 `db.collection.insert()` 方法将文档添加到 `catalog` 集合中。在运行命令之前，先删除\
    \ `catalog` 集合。\n\n    ```javascript\n    >db.cataog.drop()\n    >db.catalog.insert(doc2)\n\
    \    ```\n\n3.  `insert()` 方法返回一个 `WriteResult` 对象，其 `nInserted` 字段值为 1。随后在 `catalog`\
    \ 集合上调用 `db.collection.find()` 方法会列出该文档。\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\n4.  添加文档后，接下来我们将使用 `save()` 方法更新该文档。构造一个文档，其包含与 `insert()` 方法添加的文档完全相同的字段和字段值，包括\
    \ `_id` 字段以及新增的 `title` 和 `author` 字段。\n\n    ```javascript\n    >doc2 = {\"_id\"\
    : ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" : 'catalog2', \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : '11-12-2013',\"\
    title\" : 'Quintessential and Collaborative',\"author\" : 'Tom Haunert'}\n   \
    \ ```\n\n5.  使用 `db.collection.save()` 方法将文档保存到 `catalog` 集合中。在运行以下命令前**不要**删除\
    \ `catalog` 集合，因为我们正在保存（并修改）与之前添加的同一个文档。\n\n    ```javascript\n    >db.catalog.save(doc2)\n\
    \    ```\n\n6.  `save()` 方法修改了文档，添加了 `title` 和 `author` 字段。`save()` 方法返回一个 `WriteResult`\
    \ 对象，其 `nInserted` 和 `nModified` 字段值均为 1。随后调用 `db.collection.find()` 方法列出文档。\n\
    \n    ```javascript\n    >db.catalog.find()\n    ```\n\n修改后的文档被列出，并包含新增的两个字段，如\
    \ 图 2-32 所示。文档已被修改。\n\n![9781484215999_Fig02-32.jpg](img/image00456.jpeg)\n\n\
    图 2-32. 使用 `save()` 方法更新文档并添加新字段\n\n在前面所有的 `save()` 示例中，我们都在用 `insert()` 添加的文档中指定了\
    \ `_id` 字段，然后在用 `save` 方法保存时使用了相同的 `_id`。在下一个使用 `save()` 方法的例子中，我们将使用一个与 `insert()`\
    \ 方法添加的文档不同的 `_id` 字段值来调用 `save()` 方法。像之前一样构造一个 BSON 文档，并使用 `insert()` 方法添加该文档。在运行示例前删除\
    \ `catalog` 集合。\n\n## 示例三：执行 Upsert 操作\n\n1.  随后调用 `db.collection.find()` 方法列出添加的文档。\n\
    \n    ```javascript\n    >db.catalog.drop()\n    >doc2 = {\"_id\": ObjectId(\"\
    507f191e810c19729de860ea\"),\"catalogId\" : \"catalog2\", \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013'}\n    > db.catalog.insert(doc2)\n     >db.catalog.find()\n    ```\n\n\
    2.  接着，构造另一个具有相同字段和字段值，但 `_id` 字段值不同的文档。使用 `save` 方法保存该文档。\n\n    ```javascript\n\
    \     >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860eb\"),\"catalogId\" :\
    \ 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : '11-12-2013',\"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'}\n     >db.catalog.save(doc2)\n    ```\n\n3.  随后在 `catalog`\
    \ 集合上调用 `db.collection.find()` 方法。\n\n    ```javascript\n    db.catalog.find()\n\
    \    ```\n\n因为使用 `save()` 方法保存的文档具有不同的 `_id` 字段值，所以添加了一个新文档，`find()` 列出了两个文档，如\
    \ 图 2-33 所示。\n\n![9781484215999_Fig02-33.jpg](img/image00457.jpeg)\n\n图 2-33.\
    \ 使用 `save()` 执行 Upsert 操作\n\n`WriteResult` 中的 `nUpserted` 为 1。`Upsert` 是一个术语，表示当没有文档匹配一个可能匹配并更新文档的查询文档时执行的插入操作。`Upsert`\
    \ 用于在找到匹配文档时修改或更新文档的操作上下文中。`insert()` 方法不修改或更新文档，因此 `upsert` 一词不能用于 `insert()`\
    \ 方法的上下文中。`save()` 和 `update()` 方法确实会修改或更新文档，因此 `upsert` 用于这些方法的上下文中。\n\n当在 `insert()`\
    \ 添加的文档中使用了新的 `_id` 字段，并随后用 `save()` 方法保存时，这个过程称为对文档执行 `upserting`。\n\n当在 `insert()`\
    \ 的文档中未指定 `_id` 字段，并随后用 `save()` 保存时，执行的是 `insert` 操作，而非 `upsert`。接下来，我们将讨论一个使用\
    \ `save()` 方法执行插入的例子。"
- fmt: "# MongoDB 文档操作\n\n## 插入文档\n\n1.  像之前一样构建一个文档，但不包含 `_id` 字段。使用 `insert()` 方法添加文档。随后调用\
    \ `find()` 方法列出该文档。像之前一样删除 `catalog` 集合。\n\n    ```javascript\n    >db.catalog.drop()\n\
    \    >doc2 = {\"catalogId\" : “catalog2”, \"journal\" : 'Oracle Magazine', \"\
    publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n \
    \   >db.catalog.insert(doc2)\n    >db.catalog.find()\n    ```\n\n2.  接下来，构建另一个文档，其中修改了\
    \ `edition` 字段，并新增了 `title` 和 `author` 两个字段。\n\n    ```javascript\n    >doc2 =\
    \ {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : '11-12-2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n    ```\n\n3.  在更新后的文档上调用 `save()`\
    \ 方法。\n\n    ```javascript\n    >db.catalog.save(doc2)\n    ```\n\n4.  随后调用 `find()`\
    \ 方法不会列出更新后的文档，而是列出两个文档。\n\n    ```javascript\n    >db.catalog.find()\n    ```\n\
    \n因为使用 `insert()` 添加的文档和使用 `save()` 保存的文档都不包含 `_id` 字段，所以会添加一个新文档，并通过 `find()`\
    \ 列出，如 [图 2-34](#part0008.xhtml#Fig34) 所示。返回的 `WriteResult` 对象有一个值为 1 的 `nInserted`\
    \ 字段，表明已添加一个文档。\n\n![9781484215999_Fig02-34.jpg](Images/image00458.jpeg)\n\n[图\
    \ 2-34](#part0008.xhtml#_Fig34)。使用 `save()` 插入文档\n\n## 更新文档\n\n在本节中，我们将更新一个文档。`db.collection.update()`\
    \ JavaScript 方法用于更新文档。该方法在 MongoDB 2.2 和 2.6 版本中有所修订。不同版本的方法如 [表 2-6](#part0008.xhtml#Tab6)\
    \ 所示。\n\n[表 2-6](#part0008.xhtml#_Tab6)。`update()` 方法的不同版本\n\n| 版本 | 方法 | 描述 |\n\
    | --- | --- | --- |\n| 2.2 之前 | `db.collection.update(query, update, <upsert>,\
    \ <multi>)` | `<upsert>` 和 `<multi>` 是位置布尔选项。 |\n| 2.2 | `db.collection.update(query,\
    \ update, options)` 或 `db.collection.update(<query>,<update>,{ upsert: <boolean>,\
    \ multi: <boolean> })` | 为 `<upsert>` 和 `<multi>` 选项添加了 `options` 文档类型参数。 |\n\
    | 2.6 及之后 | `db.collection.update(query, update, options)` 或 `db.collection.update(<query>,<update>,{\
    \ upsert: <boolean>, multi: <boolean>, writeConcern: <document> })` | `options`\
    \ 参数增加了 `writeConcern` 选项。同时，该方法返回一个包含操作状态的 `WriteResult`。 |\n\n`update()` 方法的参数（包括可选参数\
    \ `options`）在 [表 2-7](#part0008.xhtml#Tab7) 中讨论。\n\n[表 2-7](#part0008.xhtml#_Tab7)。`update`\
    \ 方法参数\n\n| 选项 | 类型 | 描述 |\n| --- | --- | --- |\n| `query` | document | 用于选择要更新的文档的查询条件。\
    \ |\n| `update` | document | 要应用的更新或修改。 |\n| `upsert` | Boolean | 如果设置为 `true`，当未找到符合选择条件的文档时，会插入一个新文档。默认为\
    \ `false`。 |\n| `multi` | Boolean | 如果设置为 `true`，当找到多个符合选择条件的文档时，会更新多个文档。 |\n\
    | `writeConcern` | document | 指定写关注（write concern）。写关注在本章前面已讨论过。 |\n\n接下来，我们将更新一个文档。首先，我们将使用\
    \ `insert()` 方法添加一个文档，随后使用 `update` 方法更新添加的文档。\n\n1.  在 mongo 命令 shell 中运行以下命令来添加文档。在运行命令之前，先删除\
    \ `catalog` 集合。\n\n    ```javascript\n    >db.catalog.drop()\n    >doc1 = {\"\
    catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013'}\n    >db.catalog.insert(doc1)\n\
    \    ```\n\n2.  随后运行以下命令来查找添加的文档。\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\n3.  要更新文档，需调用 `update()` 方法，为 `edition` 字段提供修改后的值，并添加新的 `title` 和\
    \ `author` 字段。包含 `options` 参数，其中 `upsert` 选项设置为 `true`。\n\n    ```javascript\n\
    \    db.catalog.update(\n       { catalogId: \"catalog1\" },\n       {\"catalogId\"\
    \ : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : '11-12-2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'Kelly, David A.'},\n       { upsert: true}\n    )\n    ```\n\n4.  随后再次调用\
    \ `find()` 方法。\n\n    ```javascript\n    >db.catalog.find()\n    ```\n\n文档被更新，并返回一个\
    \ `WriteResult` 对象。`WriteResult` 对象中的 `nMatched` 字段值为 1，`nUpserted` 为 0，`nModified`\
    \ 为 1，如 [图 2-35](#part0008.xhtml#Fig35) 所示。\n\n![9781484215999_Fig02-35.jpg](Images/image00459.jpeg)\n\
    \n[图 2-35](#part0008.xhtml#_Fig35)。使用 `update()` 方法更新文档\n\n如果在 `update` 参数中使用了键值表达式，则会用\
    \ `update` 参数中的文档完全替换原文档。如果在 `update()` 方法中使用了诸如 `$set` 之类的更新操作符表达式，则仅替换更新操作符表达式中指定的字段，而不是整个文档。如果\
    \ `update` 参数包含更新操作符表达式，则它不能包含字段键值表达式。\n\n## 更新多个文档\n\n`update()` 方法默认更新单个文档。要更新多个文档，请使用\
    \ `multi` 参数。`update()` 方法要更新多个文档的一个要求是使用更新操作符表达式。如果 `update()` 方法仅指定字段:值表达式，则无法更新多个文档。\n\
    \n接下来，我们将在 MongoDB 3.0.5 中更新多个文档。\n\n1.  首先通过调用 `db.catalog.drop()` 删除之前添加的 `catalog`\
    \ 集合。使用 `db.collection.insert()` 方法向 `catalog` 集合添加两个文档。随后使用 `db.collection.find()`\
    \ 方法列出 `catalog` 集合中的文档。\n\n    ```javascript\n    > db.catalog.drop()\n    >use\
    \ catalog\n    >doc1 = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"\
    publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\"\
    \ : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n    db.catalog.insert(doc1)\n\
    \    >doc2 = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n    >db.catalog.insert(doc2)\n\
    \    >db.catalog.find()\n    ```\n\n2.  接下来，调用 `db.collection.update()` 方法，使用包含\
    \ `$set`（更新 `edition` 字段）和 `$inc`（更新 `catalogId` 字段）的更新操作符表达式。在 `options` 参数中，指定\
    \ `multi` 选项为 `true`，同时也指定 `writeConcern` 选项。尽管为 `w:1` 指定了 `wtimeout`，但它仅适用于 w>1\
    \ 的情况，对于 w:1 会被忽略。随后调用 `db.catalog.find()` 方法列出更新后的文档。\n\n    ```javascript\n\
    \    >db.catalog.update(\n       { journal: 'Oracle Magazine'},\n       {\n  \
    \        $set: { edition: '11-12-2013' },\n          $inc: { catalogId: 2 }\n\
    \       },\n       {\n         multi: true,\n         writeConcern: { w: 1, wtimeout:\
    \ 5000 }\n       }\n    )\n    >db.catalog.find()\n    ```\n\n从 `update()` 方法的输出表明，两个文档被匹配并更新，如\
    \ [图 2-36](#part0008.xhtml#Fig36) 所示。\n\n![9781484215999_Fig02-36.jpg](Images/image00460.jpeg)\n\
    \n[图 2-36](#part0008.xhtml#_Fig36)。使用 `update()` 方法更新多个文档\n\n## 查询单个文档\n\n可以使用\
    \ `findOne()` 方法从集合中查询单个文档。`findOne()` 方法的语法如下。\n\n```\ndb.collection.findOne(query,\
    \ <projection>)\n```"
  raw: "1.  Construct a document as before but do not include an `_id` field. Add\
    \ the document with the `insert()` method. A subsequent invocation of the `find()`\
    \ method lists the document. Drop the `catalog` collection as before.\n\n```\n\
    \    >db.catalog.drop()\n    >doc2 = {\"catalogId\" : “catalog2”, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013'}\n    >db.catalog.insert(doc2)\n    >db.catalog.find()\n    ```\n\
    \n2.  Next, construct another document with the `edition` field modified and two\
    \ new fields `title` and `author`.\n\n```\n    >doc2 = {\"catalogId\" : 'catalog2',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : '11-12-2013',\"title\" : 'Quintessential and Collaborative',\"author\" : 'Tom\
    \ Haunert'}\n    ```\n\n3.  Invoke the `save()` method on the updated document.\n\
    \n```\n    >db.catalog.save(doc2)\n    ```\n\n4.  A subsequent invocation of the\
    \ `find()` method does not list an updated document but lists two documents.\n\
    \n```\n    >db.catalog.find()\n    ```\n\nBecause the document added with `insert()`\
    \ and the document saved with `save()` do not include the `_id` field, a new document\
    \ gets added and gets listed with `find()` as shown in [Figure 2-34](#part0008.xhtml#Fig34).\
    \ The `WriteResult` object returned has an `nInserted` field with a value as 1,\
    \ indicating that a document has been added.\n\n![9781484215999_Fig02-34.jpg](Images/image00458.jpeg)\n\
    \n[Figure 2-34](#part0008.xhtml#_Fig34). Inserting a Document with save()\n\n\
    Updating a Document\n\nIn this section we shall update a document. The `db.collection.update()`\
    \ JavaScript method is used to update a document. The method has been revised\
    \ in MongoDB 2.2 and 2.6\\. The different versions of the method are shown in\
    \ [Table 2-6](#part0008.xhtml#Tab6).\n\n[Table 2-6](#part0008.xhtml#_Tab6). Different\
    \ Versions of the update() Method\n\n| Version | Method | Description |\n| ---\
    \ | --- | --- |\n| Pre 2.2 | `db.collection.update(query, update, <upsert>, <multi>)`\
    \ | The `<upsert>` and `<multi>` are positional Boolean options. |\n| 2.2 | `db.collection.update(query,\
    \ update, options)`or`db.collection.update(``<query>,``<update>,``{ upsert: <boolean>,\
    \ multi: <boolean> }``)` | Added the options parameter of type document for the\
    \ `<upsert>` and `<multi>` options. |\n| 2.6 and later | `db.collection.update(query,\
    \ update, options)`or`db.collection.update(``<query>,``<update>,``{``upsert: <boolean>,``multi:\
    \ <boolean>,``writeConcern: <document>``}``)` | The `options` parameter added\
    \ the `writeConcern` option. Also the method returns a `WriteResult` with the\
    \ status of the operation. |\n\nThe `update()` method parameters including the\
    \ options, which are optional, are discussed in [Table 2-7](#part0008.xhtml#Tab7).\n\
    \n[Table 2-7](#part0008.xhtml#_Tab7). Update Method Parameters\n\n| Option | Type\
    \ | Description |\n| --- | --- | --- |\n| `query` | document | The query to select\
    \ the document/s to update. |\n| `update` | document | The update or modifications\
    \ to apply. |\n| `upsert` | Boolean | If set to true inserts a new document if\
    \ a document by the selection criteria is not found. Default is false. |\n| `multi`\
    \ | Boolean | If set to true updates multiple documents if multiple documents\
    \ are found with the selection criteria. |\n| `writeConcern` | document | Specifies\
    \ the write concern. Write concern is discussed earlier in this chapter. |\n\n\
    Next, we shall update a document. First, we shall add a document using the `insert()`\
    \ method and subsequently we shall update the added document using the update\
    \ method.\n\n1.  In the mongo command shell run the following commands to add\
    \ a document. Before running the command, drop the `catalog` collection.\n\n```\n\
    \    >db.catalog.drop()\n    >doc1 = {\"catalogId\" : 'catalog1', \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013'}\n    >db.catalog.insert(doc1)\n    ```\n\n2.  Subsequently run\
    \ the following command to find the added document.\n\n```\n    >db.catalog.find()\n\
    \    ```\n\n3.  To update the document invoke the `update()` method with a modified\
    \ value for the `edition` field and new fields `title` and `author` fields. Include\
    \ the `options` parameter consisting of the `upsert` option set to `true`.\n\n\
    ```\n    db.catalog.update(\n       { catalogId: \"catalog1\" },\n       {\"catalogId\"\
    \ : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : '11-12-2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'Kelly, David A.'},\n       { upsert: true}\n    )\n    ```\n\n4.  Subsequently\
    \ invoke the `find()` method again.\n\n```\n    >db.catalog.find()\n    ```\n\n\
    The document gets updated and a `WriteResult` object is returned. The `nMatched`\
    \ field in the `WriteResult` object has the value 1, `nUpserted` 0 and `nModified`\
    \ 1 as shown in [Figure 2-35](#part0008.xhtml#Fig35).\n\n![9781484215999_Fig02-35.jpg](Images/image00459.jpeg)\n\
    \n[Figure 2-35](#part0008.xhtml#_Fig35). Updating a Document with update() Method\n\
    \nIf key:value expressions are used in the `update` parameter the complete document\
    \ is replaced with the document in the `update` parameter. If update operators\
    \ expressions such as `$set` are used in the `update()` method only the specified\
    \ fields in the update operator expressions are replaced, not the complete document.\
    \ If the `update` parameter contains update operators expressions it must not\
    \ contain field key:value expressions.\n\nUpdating Multiple Documents\n\nThe `update()`\
    \ method updates a single document by default. To update multiple documents use\
    \ the `multi` parameter. A requirement for the `update()` method to update multiple\
    \ documents is to use the update operators expressions. If the `update()` method\
    \ specifies only field:value expressions it cannot update multiple documents.\n\
    \nNext, we shall update multiple documents in MongoDB 3.0.5.\n\n1.  First delete\
    \ any previously added `catalog` collection by invoking `db.catalog.drop()`. Add\
    \ two documents to the `catalog` collection using the `db.collection.insert()`\
    \ method. Subsequently list the documents in the `catalog` collection using the\
    \ `db.collection.find()` method.\n\n```\n    > db.catalog.drop()\n    >use catalog\n\
    \    >doc1 = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n    db.catalog.insert(doc1)\n\
    \    >doc2 = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n    >db.catalog.insert(doc2)\n\
    \    >db.catalog.find()\n    ```\n\n2.  Next, invoke the `db.collection.update()`\
    \ method using update operators expressions with `$set` updating the `edition`\
    \ field and `$inc` updating the `catalogId` field. In the `options` parameter\
    \ specify `multi` option as true and also specify the `writeConcern` option. The\
    \ `wtimeout` though specified for `w:1` is applicable only for w>1 and is ignored\
    \ for w:1\\. Subsequently invoke the `db.catalog.find()` method to list the updated\
    \ documents.\n\n```\n    >db.catalog.update(\n       { journal: 'Oracle Magazine'},\n\
    \       {\n          $set: { edition: '11-12-2013' },\n          $inc: { catalogId:\
    \ 2 }\n       },\n       {\n         multi: true,\n         writeConcern: { w:\
    \ 1, wtimeout: 5000 }\n       }\n    )\n    >db.catalog.find()\n    ```\n\nAs\
    \ the output from the `update()` method indicates, two documents get matched and\
    \ two documents get updated as shown in [Figure 2-36](#part0008.xhtml#Fig36).\n\
    \n![9781484215999_Fig02-36.jpg](Images/image00460.jpeg)\n\n[Figure 2-36](#part0008.xhtml#_Fig36).\
    \ Updating Multiple Documents with update() Method\n\nFinding One Document\n\n\
    The `findOne()` method may be used to find a single document from a collection.\
    \ The syntax of the `findOne()` method is as follows.\n\n```\ndb.collection.findOne(query,\
    \ <projection>)\n```"
  trans: "\n# MongoDB 文档操作\n\n## 插入文档\n\n1.  像之前一样构建一个文档，但不包含 `_id` 字段。使用 `insert()`\
    \ 方法添加文档。随后调用 `find()` 方法列出该文档。像之前一样删除 `catalog` 集合。\n\n    ```javascript\n  \
    \  >db.catalog.drop()\n    >doc2 = {\"catalogId\" : “catalog2”, \"journal\" :\
    \ 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013'}\n    >db.catalog.insert(doc2)\n    >db.catalog.find()\n    ```\n\
    \n2.  接下来，构建另一个文档，其中修改了 `edition` 字段，并新增了 `title` 和 `author` 两个字段。\n\n    ```javascript\n\
    \    >doc2 = {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"\
    publisher\" : 'Oracle Publishing', \"edition\" : '11-12-2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n    ```\n\n3.  在更新后的文档上调用 `save()`\
    \ 方法。\n\n    ```javascript\n    >db.catalog.save(doc2)\n    ```\n\n4.  随后调用 `find()`\
    \ 方法不会列出更新后的文档，而是列出两个文档。\n\n    ```javascript\n    >db.catalog.find()\n    ```\n\
    \n因为使用 `insert()` 添加的文档和使用 `save()` 保存的文档都不包含 `_id` 字段，所以会添加一个新文档，并通过 `find()`\
    \ 列出，如 图 2-34 所示。返回的 `WriteResult` 对象有一个值为 1 的 `nInserted` 字段，表明已添加一个文档。\n\n![9781484215999_Fig02-34.jpg](img/image00458.jpeg)\n\
    \n图 2-34。使用 `save()` 插入文档\n\n## 更新文档\n\n在本节中，我们将更新一个文档。`db.collection.update()`\
    \ JavaScript 方法用于更新文档。该方法在 MongoDB 2.2 和 2.6 版本中有所修订。不同版本的方法如 表 2-6 所示。\n\n表 2-6。`update()`\
    \ 方法的不同版本\n\n| 版本 | 方法 | 描述 |\n| --- | --- | --- |\n| 2.2 之前 | `db.collection.update(query,\
    \ update, <upsert>, <multi>)` | `<upsert>` 和 `<multi>` 是位置布尔选项。 |\n| 2.2 | `db.collection.update(query,\
    \ update, options)` 或 `db.collection.update(<query>,<update>,{ upsert: <boolean>,\
    \ multi: <boolean> })` | 为 `<upsert>` 和 `<multi>` 选项添加了 `options` 文档类型参数。 |\n\
    | 2.6 及之后 | `db.collection.update(query, update, options)` 或 `db.collection.update(<query>,<update>,{\
    \ upsert: <boolean>, multi: <boolean>, writeConcern: <document> })` | `options`\
    \ 参数增加了 `writeConcern` 选项。同时，该方法返回一个包含操作状态的 `WriteResult`。 |\n\n`update()` 方法的参数（包括可选参数\
    \ `options`）在 表 2-7 中讨论。\n\n表 2-7。`update` 方法参数\n\n| 选项 | 类型 | 描述 |\n| --- | ---\
    \ | --- |\n| `query` | document | 用于选择要更新的文档的查询条件。 |\n| `update` | document |\
    \ 要应用的更新或修改。 |\n| `upsert` | Boolean | 如果设置为 `true`，当未找到符合选择条件的文档时，会插入一个新文档。默认为\
    \ `false`。 |\n| `multi` | Boolean | 如果设置为 `true`，当找到多个符合选择条件的文档时，会更新多个文档。 |\n\
    | `writeConcern` | document | 指定写关注（write concern）。写关注在本章前面已讨论过。 |\n\n接下来，我们将更新一个文档。首先，我们将使用\
    \ `insert()` 方法添加一个文档，随后使用 `update` 方法更新添加的文档。\n\n1.  在 mongo 命令 shell 中运行以下命令来添加文档。在运行命令之前，先删除\
    \ `catalog` 集合。\n\n    ```javascript\n    >db.catalog.drop()\n    >doc1 = {\"\
    catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013'}\n    >db.catalog.insert(doc1)\n\
    \    ```\n\n2.  随后运行以下命令来查找添加的文档。\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\n3.  要更新文档，需调用 `update()` 方法，为 `edition` 字段提供修改后的值，并添加新的 `title` 和\
    \ `author` 字段。包含 `options` 参数，其中 `upsert` 选项设置为 `true`。\n\n    ```javascript\n\
    \    db.catalog.update(\n       { catalogId: \"catalog1\" },\n       {\"catalogId\"\
    \ : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : '11-12-2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'Kelly, David A.'},\n       { upsert: true}\n    )\n    ```\n\n4.  随后再次调用\
    \ `find()` 方法。\n\n    ```javascript\n    >db.catalog.find()\n    ```\n\n文档被更新，并返回一个\
    \ `WriteResult` 对象。`WriteResult` 对象中的 `nMatched` 字段值为 1，`nUpserted` 为 0，`nModified`\
    \ 为 1，如 图 2-35 所示。\n\n![9781484215999_Fig02-35.jpg](img/image00459.jpeg)\n\n图\
    \ 2-35。使用 `update()` 方法更新文档\n\n如果在 `update` 参数中使用了键值表达式，则会用 `update` 参数中的文档完全替换原文档。如果在\
    \ `update()` 方法中使用了诸如 `$set` 之类的更新操作符表达式，则仅替换更新操作符表达式中指定的字段，而不是整个文档。如果 `update`\
    \ 参数包含更新操作符表达式，则它不能包含字段键值表达式。\n\n## 更新多个文档\n\n`update()` 方法默认更新单个文档。要更新多个文档，请使用\
    \ `multi` 参数。`update()` 方法要更新多个文档的一个要求是使用更新操作符表达式。如果 `update()` 方法仅指定字段:值表达式，则无法更新多个文档。\n\
    \n接下来，我们将在 MongoDB 3.0.5 中更新多个文档。\n\n1.  首先通过调用 `db.catalog.drop()` 删除之前添加的 `catalog`\
    \ 集合。使用 `db.collection.insert()` 方法向 `catalog` 集合添加两个文档。随后使用 `db.collection.find()`\
    \ 方法列出 `catalog` 集合中的文档。\n\n    ```javascript\n    > db.catalog.drop()\n    >use\
    \ catalog\n    >doc1 = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"\
    publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\"\
    \ : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n    db.catalog.insert(doc1)\n\
    \    >doc2 = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n    >db.catalog.insert(doc2)\n\
    \    >db.catalog.find()\n    ```\n\n2.  接下来，调用 `db.collection.update()` 方法，使用包含\
    \ `$set`（更新 `edition` 字段）和 `$inc`（更新 `catalogId` 字段）的更新操作符表达式。在 `options` 参数中，指定\
    \ `multi` 选项为 `true`，同时也指定 `writeConcern` 选项。尽管为 `w:1` 指定了 `wtimeout`，但它仅适用于 w>1\
    \ 的情况，对于 w:1 会被忽略。随后调用 `db.catalog.find()` 方法列出更新后的文档。\n\n    ```javascript\n\
    \    >db.catalog.update(\n       { journal: 'Oracle Magazine'},\n       {\n  \
    \        $set: { edition: '11-12-2013' },\n          $inc: { catalogId: 2 }\n\
    \       },\n       {\n         multi: true,\n         writeConcern: { w: 1, wtimeout:\
    \ 5000 }\n       }\n    )\n    >db.catalog.find()\n    ```\n\n从 `update()` 方法的输出表明，两个文档被匹配并更新，如\
    \ 图 2-36 所示。\n\n![9781484215999_Fig02-36.jpg](img/image00460.jpeg)\n\n图 2-36。使用\
    \ `update()` 方法更新多个文档\n\n## 查询单个文档\n\n可以使用 `findOne()` 方法从集合中查询单个文档。`findOne()`\
    \ 方法的语法如下。\n\n```\ndb.collection.findOne(query, <projection>)\n```\n"
- fmt: "# MongoDB 查询操作：findOne() 与 find()\n\n方法参数均为可选。`query` 参数指定查询选择标准，类型为文档（document）。`<projection>`\
    \ 参数指定要返回的字段。`query` 和 `<projection>` 参数的类型均为文档（`document`）。默认情况下返回所有字段。如果多个文档匹配选择标准，或者未指定选择标准且集合中有多个文档，则返回匹配到的第一个文档。\n\
    \n接下来，我们将添加两个文档，并使用不带参数的 `findOne()` 方法查找一个文档。\n\n1.  删除 `catalog` 集合，并使用 `db.collection.insert()`\
    \ 方法向 `catalog` 集合添加两个文档。\n\n```\n>db.catalog.drop()\n>doc1 = {\"catalogId\" :\
    \ \"catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : 'November December 2013',\"title\" : 'Engineering as a Service',\"\
    author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2 = {\"_id\": ObjectId(\"\
    507f191e810c19729de860ea\"),\"catalogId\" :\"catalog2\", \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013'}\n>db.catalog.insert(doc2)\n```\n\n2.  使用 `findOne()` 方法查找一个文档。\n\n```\n\
    >db.catalog.findOne()\n```\n\n两个文档中的一个会被返回，如图 2-37 所示。\n\n![9781484215999_Fig02-37.jpg](Images/image00461.jpeg)\n\
    图 2-37. 查找单个文档\n\n## 查找所有文档\n\n要查找所有文档，必须使用 `find()` 方法。`find()` 方法的语法如下。\n\n\
    ```\ndb.collection.find(query, <projection>)\n```\n\n`query` 参数指定查询选择标准，`<projection>`\
    \ 参数指定要返回的字段。这些参数都不是必需的，且类型均为文档。`find()` 方法实际上返回一个游标（cursor），如果在 MongoDB shell\
    \ 中调用该方法，游标会自动迭代以显示前 20 个文档。要在 shell 中迭代剩余文档，请指定它。\n\n要在 `catalog` 集合中查找之前添加且未被删除的所有文档，请运行\
    \ `find()` 方法。\n\n```\n>db.catalog.find()\n```\n\n`catalog` 集合中的所有文档都将被返回，如图 2-38\
    \ 所示。为了区分 `findOne()` 方法返回的单个文档和 `find()` 方法返回的所有文档，下面列出了 `findOne()` 和 `find()`\
    \ 的结果。\n\n![9781484215999_Fig02-38.jpg](Images/image00462.jpeg)\n图 2-38. 使用 find()\
    \ 方法查找所有文档\n\n## 查找选定字段\n\n如前所述，`find()` 和 `findOne()` 方法都支持 `<projection>` 参数。`<projection>`\
    \ 参数指定要返回的字段，其文档语法如下。\n\n```\n{ field1: <boolean>, field2: <boolean> ... }\n```\n\
    \n要包含一个字段，请将 `boolean` 设置为 true 或 1。要排除一个字段，请将字段设置为 `false` 或 0。例如，使用 `insert()`\
    \ 方法向 `catalog` 集合添加两个文档。但首先需要删除 `catalog` 集合。\n\n```\n>db.catalog.drop()\n>doc1\
    \ = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2\
    \ = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n```\n\
    \n随后调用 `findOne()` 方法，将 `query` 参数设置为空文档，并将 `<projection>` 参数设置为包含 `edition`、`title`\
    \ 和 `author` 字段。\n\n```\n>db.catalog.findOne(\n    {  },\n{ edition: 1, title:\
    \ 1, author: 1 }\n)\n```\n\n将返回一个文档，并且仅返回 `title`、`author` 和 `edition` 字段，如图 2-39\
    \ 所示。`_id` 字段总是会被返回，无需在 `<projection>` 参数中指定其为要返回的字段之一。\n\n![9781484215999_Fig02-39.jpg](Images/image00463.jpeg)\n\
    图 2-39. 查找选定字段\n\n`<projection>` 参数可以指定包含字段或排除字段，但不能同时两者兼有。为了演示，请调用 `findOne()`\
    \ 方法，排除 `edition` 字段，但包含 `title` 和 `author` 字段。\n\n```\n>db.catalog.findOne(\n\
    \    {  },\n{ edition: 0, title: true, author: 1 }\n)\n```\n\n这将引发异常，表明不能混合包含和排除字段，如图\
    \ 2-40 所示。\n\n![9781484215999_Fig02-40.jpg](Images/image00464.jpeg)\n图 2-40. 不能混合包含和排除字段\n\
    \n要排除字段，`<projection>` 参数中的所有字段必须都设置为排除。例如，在以下对 `findOne()` 的调用中，使用查询比较操作符 `$gt`\
    \ 设置 `catalogId` 字段，并将 `<projection>` 参数值设置为排除 `journal` 和 `publisher` 字段。\n\n\
    ```\n>db.catalog.findOne(\n    { catalogId : {$gt: 1} },\n    { journal: 0, publisher:\
    \ 0}\n)\n```\n\n`findOne()` 方法仅返回 `catalogId` 大于 1 的文档，并排除了 `journal` 和 `publisher`\
    \ 字段，如图 2-41 所示。\n\n![9781484215999_Fig02-41.jpg](Images/image00465.jpeg)\n图 2-41.\
    \ 使用 findOne() 方法查找文档\n\n甚至可以在 `<projection>` 参数中排除 `_id` 字段。例如，排除 `_id`、`journal`\
    \ 和 `publisher` 字段。\n\n```\n>db.catalog.findOne(\n    { catalogId : {$gt: 1} },\n\
    \    { _id:0, journal: 0, publisher: 0}\n)\n```\n\n输出中也会排除 `_id` 字段，如图 2-42 所示。\n\
    \n![9781484215999_Fig02-42.jpg](Images/image00466.jpeg)\n图 2-42. 排除 _id 字段\n\n\
    如果要在 `find()` 或 `findOne()` 方法的 `query` 参数中指定 `_id` 字段值，则必须使用 `ObjectId` 包装类。例如，使用比较查询操作符\
    \ `$in` 和 `ObjectId` 来指定 `_id` 字段值。这些 `_id` 字段值与添加文档时使用的值相同。不同用户的 `_id` 字段值会不同；请使用之前添加文档的\
    \ `_id` 字段值。可以使用 `db.catalog.find()` 命令查找这些 `_id` 字段值。\n\n```\n>db.catalog.find(\n\
    \   {\n      _id: { $in: [ ObjectId(\"55ba5ae4403cc01aa5b078e3\"),  ObjectId(\"\
    55ba5ae5403cc01aa5b078e4\") ] }\n   }, { edition: 1, title: 1, author: 1 }\n)\n\
    ```\n\n`find()` 方法返回具有指定 `_id` 字段值的两个文档，如图 2-43 所示。仅返回在 `<projection>` 参数中指定的字段。\n\
    \n![9781484215999_Fig02-43.jpg](Images/image00467.jpeg)\n图 2-43. 使用比较查询操作符 $in\
    \ 查找文档\n\n## 使用游标\n\n如前所述，`db.collection.find()` 方法返回一个游标，当在 shell 中调用 `find()`\
    \ 方法时，默认会迭代并显示前 20 个文档。游标支持多种方法，并且可以获取游标对象的句柄来调用这些方法。游标支持的部分方法见表 2-8。\n\n表 2-8.\
    \ 游标支持的方法"
  raw: "Both the method parameters are optional. The `query` parameter specifies the\
    \ query selection criteria and is of type document. The `<projection>` parameter\
    \ specifies the fields to return. The type of the `query` and `<projection>` parameters\
    \ is `document`. By default all fields are returned. If multiple documents match\
    \ a selection criteria or if not selection criteria is specified and the collection\
    \ has multiple documents the first document that is matched is returned.\n\nNext,\
    \ we shall add two documents and find one document using `findOne()` method without\
    \ any args.\n\n1.  Drop the `catalog` collection and add two documents to the\
    \ `catalog` collection using the `db.collection.insert()` method.\n\n```\n   \
    \ >db.catalog.drop()\n    >doc1 = {\"catalogId\" : \"catalog1\", \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n\
    \    >db.catalog.insert(doc1)\n    >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"\
    ),\"catalogId\" :\"catalog2\", \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n    >db.catalog.insert(doc2)\n\
    \    ```\n\n2.  Find one document using the `findOne()` method.\n\n```\n    >db.catalog.findOne()\n\
    \    ```\n\nOne of the two documents gets returned as shown in [Figure 2-37](#part0008.xhtml#Fig37).\n\
    \n![9781484215999_Fig02-37.jpg](Images/image00461.jpeg)\n\n[Figure 2-37](#part0008.xhtml#_Fig37).\
    \ Finding One Document\n\nFinding All Documents\n\nTo find all documents the `find()`\
    \ method must be used. The `find()` method has the following syntax.\n\n```\n\
    db.collection.find(query, <projection>)\n```\n\nThe `query` parameter specifies\
    \ the query selection criteria and the `<projection>` parameter specifies the\
    \ fields to return. None of the parameters is required and both are of type document.\
    \ The `find()` method actually returns a cursor and if the method is invoked in\
    \ the MongoDB shell the cursor is automatically iterated to display the first\
    \ 20 documents. To run the iterator on the remaining document specify it in the\
    \ shell.\n\nTo find all documents in the `catalog` collection that may have been\
    \ added previously and not removed, run the `find()` method.\n\n```\n>db.catalog.find()\n\
    ```\n\nAll the documents in the `catalog` collection get returned as shown in\
    \ [Figure 2-38](#part0008.xhtml#Fig38). To distinguish between the single document\
    \ returned by the `findOne()` method and all documents returned by `find()`, the\
    \ results from both `findOne()` and `find()` are listed.\n\n![9781484215999_Fig02-38.jpg](Images/image00462.jpeg)\n\
    \n[Figure 2-38](#part0008.xhtml#_Fig38). Finding All Documents with find() Method\n\
    \nFinding Selected Fields\n\nBoth the `find()` and `findOne()` methods support\
    \ the `<projection>` parameter as mentioned before. The `<projection>` parameter\
    \ specifies the fields to return with a document of the following syntax.\n\n\
    ```\n{ field1: <boolean>, field2: <boolean> ... }\n```\n\nTo include a field set\
    \ the `boolean` to true or 1\\. To exclude a field set the field to `false` or\
    \ 0\\. For example, add two documents to the `catalog` collection using the `insert()`\
    \ method. But, first drop the `catalog` collection.\n\n```\n>db.catalog.drop()\n\
    >doc1 = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2\
    \ = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n```\n\
    \nSubsequently invoke the `findOne()` method with the `query` parameter set to\
    \ an empty document and the `<projection>` parameter set to include the `edition`,\
    \ `title`, and `author` fields.\n\n```\n>db.catalog.findOne(\n    {  },\n{ edition:\
    \ 1, title: 1, author: 1 }\n)\n```\n\nA single document gets returned and only\
    \ the `title`, `author`, and `edition` fields get returned as shown in [Figure\
    \ 2-39](#part0008.xhtml#Fig39). The `_id` field is always returned and is not\
    \ required to be specified in the `<projection>` parameter as one of the fields\
    \ to return.\n\n![9781484215999_Fig02-39.jpg](Images/image00463.jpeg)\n\n[Figure\
    \ 2-39](#part0008.xhtml#_Fig39). Finding Selected Fields\n\nThe `<projection>`\
    \ parameter may specify to either include field/s or exclude field/s, not both.\
    \ To demonstrate invoke the `findOne()` method with `edition` field excluded,\
    \ and `title` and `author` fields included.\n\n```\n>db.catalog.findOne(\n    {  },\n\
    { edition: 0, title: true, author: 1 }\n)\n```\n\nAn exception gets generated\
    \ indicating that including and excluding fields cannot be mixed as shown in [Figure\
    \ 2-40](#part0008.xhtml#Fig40).\n\n![9781484215999_Fig02-40.jpg](Images/image00464.jpeg)\n\
    \n[Figure 2-40](#part0008.xhtml#_Fig40). Including and Excluding Fields Cannot\
    \ Be Mixed\n\nTo exclude fields all fields in the `<projection>` argument must\
    \ be set to be excluded. For example, in the following invocation of `findOne()`\
    \ the `catalogId` field is set using the query comparison operator `$gt` and the\
    \ `<projection>` parameter value is set to exclude the `journal` and `publisher`\
    \ fields.\n\n```\n>db.catalog.findOne(\n    { catalogId : {$gt: 1} },\n    { journal:\
    \ 0, publisher: 0}\n)\n```\n\nThe `findOne()` method returns only the document\
    \ with `catalogId` greater than 1 and excludes the `journal` and `publisher` fields\
    \ as shown in [Figure 2-41](#part0008.xhtml#Fig41).\n\n![9781484215999_Fig02-41.jpg](Images/image00465.jpeg)\n\
    \n[Figure 2-41](#part0008.xhtml#_Fig41). Finding a Document with findOne() Method\n\
    \nEven the `_id` field may be excluded in the `<projection>` argument. For example,\
    \ exclude the `_id`, `journal` and `publisher` fields.\n\n```\n>db.catalog.findOne(\n\
        { catalogId : {$gt: 1} },\n    { _id:0, journal: 0, publisher: 0}\n)\n```\n\
    \nThe `_id` field is also excluded in the output as shown in [Figure 2-42](#part0008.xhtml#Fig42).\n\
    \n![9781484215999_Fig02-42.jpg](Images/image00466.jpeg)\n\n[Figure 2-42](#part0008.xhtml#_Fig42).\
    \ Excludingthe _id Field\n\nIf the `_id` field value is to be specified in the\
    \ `query` arg of the `find()` or `findOne()` method, the `ObjectId` wrapper class\
    \ must be used. For example, specify the `query` arg using the comparison query\
    \ operator `$in` and the `ObjectId` to specify the `_id` field values. The same\
    \ `_id` field values were used in adding the documents. The `_id` field values\
    \ would be different for different users; use the `_id` field values for documents\
    \ added previously. The `_id` field values may be found using the `db.catalog.find()`\
    \ command.\n\n```\n>db.catalog.find(\n   {\n      _id: { $in: [ ObjectId(\"55ba5ae4403cc01aa5b078e3\"\
    ),  ObjectId(\"55ba5ae5403cc01aa5b078e4\") ] }\n   }, { edition: 1, title: 1,\
    \ author: 1 }\n)\n```\n\nThe `find()` method returns the two documents with the\
    \ specified `_id` field values as shown in [Figure 2-43](#part0008.xhtml#Fig43).\
    \ Only the fields specified in the `<projection>` arg are returned.\n\n![9781484215999_Fig02-43.jpg](Images/image00467.jpeg)\n\
    \n[Figure 2-43](#part0008.xhtml#_Fig43). Using the Comparison Query 0perator $in\
    \ to Find Documents\n\nUsing the Cursor\n\nAs mentioned before the `db.collection.find()`\
    \ method returns a cursor and when the `find()` method is invoked in the shell\
    \ the first 20 documents are iterated over and displayed by default. The cursor\
    \ supports several methods and a handle to the cursor object may be obtained to\
    \ invoke the methods. Some of the methods supported by the cursor are discussed\
    \ in [Table 2-8](#part0008.xhtml#Tab8).\n\n[Table 2-8](#part0008.xhtml#_Tab8).\
    \ Methods Supported by Cursor"
  trans: "\n# MongoDB 查询操作：findOne() 与 find()\n\n方法的所有参数均为可选。`query` 参数用于指定查询的选择条件，其类型为文档（document）。`<projection>`\
    \ 参数用于指定要返回的字段。`query` 和 `<projection>` 参数的类型均为文档（`document`）。默认情况下，将返回所有字段。如果多个文档满足选择条件，或者未指定选择条件且集合中有多个文档，则返回匹配到的第一个文档。\n\
    \n接下来，我们将添加两个文档，并使用不带参数的 `findOne()` 方法来查找一个文档。\n\n1.  删除 `catalog` 集合，并使用 `db.collection.insert()`\
    \ 方法向 `catalog` 集合添加两个文档。\n\n```\n>db.catalog.drop()\n>doc1 = {\"catalogId\" :\
    \ \"catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : 'November December 2013',\"title\" : 'Engineering as a Service',\"\
    author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2 = {\"_id\": ObjectId(\"\
    507f191e810c19729de860ea\"),\"catalogId\" :\"catalog2\", \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013'}\n>db.catalog.insert(doc2)\n```\n\n2.  使用 `findOne()` 方法查找一个文档。\n\n```\n\
    >db.catalog.findOne()\n```\n\n两个文档中的一个会被返回，如图 2-37 所示。\n\n![9781484215999_Fig02-37.jpg](img/image00461.jpeg)\n\
    图 2-37. 查找单个文档\n\n## 查找所有文档\n\n要查找所有文档，必须使用 `find()` 方法。`find()` 方法的语法如下。\n\n\
    ```\ndb.collection.find(query, <projection>)\n```\n\n`query` 参数指定查询的选择条件，`<projection>`\
    \ 参数指定要返回的字段。这些参数都不是必需的，且类型均为文档。`find()` 方法实际上返回一个游标（cursor），如果在 MongoDB shell\
    \ 中调用该方法，游标会自动迭代以显示前 20 个文档。要在 shell 中迭代剩余的文档，请指定该游标。\n\n要在 `catalog` 集合中查找之前添加且未被删除的所有文档，请运行\
    \ `find()` 方法。\n\n```\n>db.catalog.find()\n```\n\n`catalog` 集合中的所有文档都将被返回，如图 2-38\
    \ 所示。为了区分 `findOne()` 方法返回的单个文档和 `find()` 方法返回的所有文档，下面列出了 `findOne()` 和 `find()`\
    \ 的结果。\n\n![9781484215999_Fig02-38.jpg](img/image00462.jpeg)\n图 2-38. 使用 find()\
    \ 方法查找所有文档\n\n## 查找选定字段\n\n如前所述，`find()` 和 `findOne()` 方法都支持 `<projection>` 参数。`<projection>`\
    \ 参数指定要返回的字段，其文档语法如下。\n\n```\n{ field1: <boolean>, field2: <boolean> ... }\n```\n\
    \n要包含一个字段，请将对应的 `boolean` 值设置为 true 或 1。要排除一个字段，请将其设置为 `false` 或 0。例如，使用 `insert()`\
    \ 方法向 `catalog` 集合添加两个文档。但首先需要删除 `catalog` 集合。\n\n```\n>db.catalog.drop()\n>doc1\
    \ = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2\
    \ = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n```\n\
    \n随后调用 `findOne()` 方法，将 `query` 参数设置为空文档，并将 `<projection>` 参数设置为包含 `edition`、`title`\
    \ 和 `author` 字段。\n\n```\n>db.catalog.findOne(\n    {  },\n{ edition: 1, title:\
    \ 1, author: 1 }\n)\n```\n\n将返回一个文档，并且仅返回 `title`、`author` 和 `edition` 字段，如图 2-39\
    \ 所示。`_id` 字段总是会被返回，无需在 `<projection>` 参数中指定其为要返回的字段之一。\n\n![9781484215999_Fig02-39.jpg](img/image00463.jpeg)\n\
    图 2-39. 查找选定字段\n\n`<projection>` 参数可以指定包含字段或排除字段，但不能同时两者兼有。为了演示，请调用 `findOne()`\
    \ 方法，排除 `edition` 字段，但包含 `title` 和 `author` 字段。\n\n```\n>db.catalog.findOne(\n\
    \    {  },\n{ edition: 0, title: true, author: 1 }\n)\n```\n\n这将引发异常，表明不能混合包含和排除字段，如图\
    \ 2-40 所示。\n\n![9781484215999_Fig02-40.jpg](img/image00464.jpeg)\n图 2-40. 不能混合包含和排除字段\n\
    \n要排除字段，`<projection>` 参数中的所有字段必须都设置为排除。例如，在以下对 `findOne()` 的调用中，使用查询比较操作符 `$gt`\
    \ 设置 `catalogId` 字段，并将 `<projection>` 参数值设置为排除 `journal` 和 `publisher` 字段。\n\n\
    ```\n>db.catalog.findOne(\n    { catalogId : {$gt: 1} },\n    { journal: 0, publisher:\
    \ 0}\n)\n```\n\n`findOne()` 方法仅返回 `catalogId` 大于 1 的文档，并排除了 `journal` 和 `publisher`\
    \ 字段，如图 2-41 所示。\n\n![9781484215999_Fig02-41.jpg](img/image00465.jpeg)\n图 2-41.\
    \ 使用 findOne() 方法查找文档\n\n甚至可以在 `<projection>` 参数中排除 `_id` 字段。例如，排除 `_id`、`journal`\
    \ 和 `publisher` 字段。\n\n```\n>db.catalog.findOne(\n    { catalogId : {$gt: 1} },\n\
    \    { _id:0, journal: 0, publisher: 0}\n)\n```\n\n输出中也会排除 `_id` 字段，如图 2-42 所示。\n\
    \n![9781484215999_Fig02-42.jpg](img/image00466.jpeg)\n图 2-42. 排除 _id 字段\n\n如果要在\
    \ `find()` 或 `findOne()` 方法的 `query` 参数中指定 `_id` 字段值，则必须使用 `ObjectId` 包装类。例如，使用比较查询操作符\
    \ `$in` 和 `ObjectId` 来指定 `_id` 字段值。这些 `_id` 字段值与添加文档时使用的值相同。不同用户的 `_id` 字段值会不同；请使用之前添加文档的\
    \ `_id` 字段值。可以使用 `db.catalog.find()` 命令查找这些 `_id` 字段值。\n\n```\n>db.catalog.find(\n\
    \   {\n      _id: { $in: [ ObjectId(\"55ba5ae4403cc01aa5b078e3\"),  ObjectId(\"\
    55ba5ae5403cc01aa5b078e4\") ] }\n   }, { edition: 1, title: 1, author: 1 }\n)\n\
    ```\n\n`find()` 方法返回具有指定 `_id` 字段值的两个文档，如图 2-43 所示。仅返回在 `<projection>` 参数中指定的字段。\n\
    \n![9781484215999_Fig02-43.jpg](img/image00467.jpeg)\n图 2-43. 使用比较查询操作符 $in 查找文档\n\
    \n## 使用游标\n\n如前所述，`db.collection.find()` 方法返回一个游标，当在 shell 中调用 `find()` 方法时，默认会迭代并显示前\
    \ 20 个文档。游标支持多种方法，并且可以获取游标对象的句柄来调用这些方法。游标支持的部分方法见表 2-8。\n\n表 2-8. 游标支持的方法\n"
- fmt: "## 游标方法\n\n| Method | Description |\n| --- | --- |\n| `batchSize()` | 指定在单个网络消息中返回的文档数量。\
    \ |\n| `count()` | 游标中的文档数量。 |\n| `forEach(<function>)` | 遍历每个文档以应用一个 JavaScript\
    \ 函数。 |\n| `hasNext()` | 如果游标有另一个文档可供迭代，则返回 true；如果游标没有，则返回 false。 |\n| `limit()`\
    \ | 限制游标结果集的大小。 |\n| `next()` | 返回游标中的下一个文档。 |\n| `skip()` | 指定在从 MongoDB 数据库获取文档之前要跳过的文档数量。\
    \ |\n| `sort()` | 按指定的排序顺序返回结果。 |\n| `toArray()` | 返回文档数组。 |\n\n接下来，我们将演示一些游标方法的使用。使用\
    \ `insert()` 方法删除 `catalog` 集合并向其中添加三个文档。\n\n```\n>db.catalog.drop()\n>doc1 =\
    \ {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"),\"catalogId\" : 1, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A.\
    \ Kelly'}\ndb.catalog.insert(doc1)\n>doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d6\"\
    ), \"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n>doc3\
    \ = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d7\"), \"catalogId\" : 3, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013'}\n>db.catalog.insert(doc3)\n```\n\n在返回的游标上调用 `forEach` 方法，并调用\
    \ `printjson` 函数以 JSON 格式输出文档。\n\n```\n>db.catalog.find().forEach(printjson)\n\
    ```\n\n三个文档以 JSON 格式显示，如图 2-44 所示。\n\n![9781484215999_Fig02-44.jpg](Images/image00468.jpeg)\n\
    \n**图 2-44. 使用游标列出文档 JSON**\n\n在前面的例子中，我们没有为游标创建变量，而是在 `find()` 方法调用之后顺序调用了 `forEach()`\
    \ 方法。我们也可以如下指定游标变量。如果游标还要用于其他目的，则可以使用变量。\n\n```\nvar cursor= db.catalog.find();\n\
    ```\n\n随后，在三元/条件运算符中调用 `hasNext()` 和 `next()` 方法以查找游标中的下一个文档。\n\n```\nvar document\
    \ = cursor.hasNext() ? cursor.next() : null;\n```\n\n如果返回了文档，则打印其 JSON 形式。\n\n\
    ```\nif (document) {\n    print (tojson(document));\n}\n```\n\n文档的 JSON 形式输出如图\
    \ 2-45 所示。\n\n![9781484215999_Fig02-45.jpg](Images/image00469.jpeg)\n\n**图 2-45.\
    \ 为游标使用变量**\n\n可以按顺序调用游标方法，如下面的 `find()` 方法调用所示，其中调用了 `limit()` 方法，随后调用了 `sort()`\
    \ 方法。`limit()` 方法将返回的文档限制为两个，`sort` 方法按 `catalogId` 升序排序。\n\n```\n>db.catalog.find().limit(2).sort({catalogId:\
    \ 1})\n```\n\n返回两个按 `catalogId` 字段升序排列的文档，如图 2-46 所示。\n\n![9781484215999_Fig02-46.jpg](Images/image00470.jpeg)\n\
    \n**图 2-46. 顺序调用游标方法**\n\n## 查找和修改文档\n\n`findAndModify()` 方法可用于查找和修改单个文档，其语法如下。\n\
    \n```\ndb.collection.findAndModify({\n    query: <document>,\n    sort: <document>,\n\
    \    remove: <boolean>,\n    update: <document>,\n    new: <boolean>,\n    fields:\
    \ <document>,\n    upsert: <boolean>\n})\n```\n\n`findAndModify()` 方法支持以下列出的参数。除必须指定\
    \ update 或 remove 之一外，所有参数都是可选的。\n\n**表 2-9. findAndModify() 方法支持的参数**\n\n| Parameter\
    \ | Type | Description |\n| --- | --- | --- |\n| `query` | document | 用于查找要修改的文档的查询选择标准。如果选择标准返回多个文档，则只修改其中一个文档。\
    \ |\n| `sort` | document | 指定如果返回多个文档则修改哪个文档。由 `sort` 参数指定排序顺序中的第一个文档。 |\n| `remove`\
    \ | boolean | 指定是否要删除所选文档。默认为 false。必须指定 `remove` 或 `upsert` 之一。 |\n| `update`\
    \ | document | 指定要应用的更新。更新参数使用更新操作符或 field:value。 |\n| `new` | boolean | 指定是返回修改后的文档还是原始文档。默认为\
    \ false。如果 `remove` 设置为 true，则 new 被忽略。 |\n| `fields` | document | 要返回的字段子集，以\
    \ <projection> 格式 {field1:1, field2:1 } 指定。 |\n| `upsert` | boolean | 指定如果未找到匹配选择标准的文档，是否要创建并返回一个新文档。默认为\
    \ false。必须指定 `remove` 或 `upsert` 之一。 |\n\n例如，按如下方式调用 `findAndModify()` 方法：\n*\
    \   设置 `query` 参数以查找 journal 字段为 Oracle Magazine 的文档。\n*   按 catalogId 字段升序排序。\n\
    *   指定 `update` 参数，使用 `update` 操作符 `$inc` 将 catalogId 字段递增 1，并使用 `$set` 操作符为 edition\
    \ 字段设置新值。\n*   `upsert` 参数设置为 `true`，`new` 参数也设置为 `true`。\n*   `fields` 参数指定要返回的字段为\
    \ `catalogId`、`edition`、`title` 和 `author`。\n\n```\n>db.catalog.findAndModify({\n\
    \  query: {journal : \"Oracle Magazine\"},\n  sort: {catalogId : 1},\n  update:\
    \ {$inc: {catalogId: 1}, $set: {edition: '11-12-2013'}},\n  upsert :true,\n  new:\
    \ true,\n  fields: {catalogId: 1, edition: 1, title: 1, author: 1}\n})\n```\n\n\
    在调用前面的方法之前，请添加一些文档，这些文档的 `catalogId` 字段值应为数字，因为 `$inc` 操作符不能应用于非数字。由于参数 `new`\
    \ 设置为 `true`，该方法返回修改后的文档，如图 2-47 所示。\n\n![9781484215999_Fig02-47.jpg](Images/image00471.jpeg)\n\
    \n**图 2-47. 使用 findAndModify 方法**\n\n不能在方法调用中同时指定 `upsert` 和 `remove` 参数值。例如，运行以下命令。\n\
    \n```\ndb.catalog.findAndModify({\n  query: {journal : \"Oracle Magazine\"},\n\
    \  sort: {catalogId : 1},\n  update: {$inc: {catalogId: 1}, $set: {edition: '11-12-2013'}},\n\
    \  remove: true,\n  upsert :true,\n  new: true,\n  fields: {catalogId: 1, edition:\
    \ 1, title: 1, author: 1}\n})\n```\n\n如以下异常所示，`upsert` 和 `remove` 参数值不能共存，如图 2-48\
    \ 所示。\n\n![9781484215999_Fig02-48.jpg](Images/image00472.jpeg)\n\n**图 2-48. 错误消息\
    \ “remove and upsert can’t co-exist”**\n\n## 删除文档\n\n`db.collection.remove()`\
    \ 方法用于删除文档。在 MongoDB 2.6 之前的版本中，该方法的语法如下。\n\n```\ndb.collection.remove(\n   <query>,\n\
    \   <justOne>\n)\n```\n\n在 2.6 及更高版本中，`remove()` 方法的语法如下。\n\n```\ndb.collection.remove(\n\
    \   <query>,\n   {\n     justOne: <boolean>,\n     writeConcern: <document>\n\
    \   }\n)\n```\n\n该方法的参数如表 2-10 所列。\n\n**表 2-10. remove 方法参数**"
  raw: "| Method | Description |\n| --- | --- |\n| `batchSize()` | Specifies the number\
    \ of documents returned in a single network message. |\n| `count()` | Number of\
    \ documents in the cursor. |\n| `forEach(<function>)` | Iterates over each document\
    \ to apply a JavaScript function. |\n| `hasNext()` | Returns true if the cursor\
    \ has another document to iterate over or returns false if the cursor does not.\
    \ |\n| `limit()` | Limits the size of the cursor’s result set. |\n| `next()` |\
    \ Returns the next document in the cursor. |\n| `skip()` | Specifies the number\
    \ of documents to skip before getting documents from the MongoDB database. |\n\
    | `sort()` | Returns results in the specified sort order. |\n| `toArray()` | Returns\
    \ an array of documents. |\n\nNext, we shall demonstrate the use of some of the\
    \ cursor methods. Remove the `catalog` collection and add three documents to the\
    \ `catalog` collection using the `insert()` method.\n\n```\n>db.catalog.drop()\n\
    >doc1 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"),\"catalogId\" : 1, \"\
    journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'David A. Kelly'}\ndb.catalog.insert(doc1)\n>doc2 = {\"_id\" : ObjectId(\"\
    53fb4b08d17e68cd481295d6\"), \"catalogId\" : 2, \"journal\" : 'Oracle Magazine',\
    \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"\
    title\" : 'Quintessential and Collaborative',\"author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n\
    >doc3 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d7\"), \"catalogId\" : 3,\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013'}\n>db.catalog.insert(doc3)\n```\n\nInvoke the `forEach`\
    \ method on the cursor returned and invoke the `printjson` function to output\
    \ the document as JSON.\n\n```\n>db.catalog.find().forEach(printjson)\n```\n\n\
    The three documents get displayed in JSON format as shown in [Figure 2-44](#part0008.xhtml#Fig44).\n\
    \n![9781484215999_Fig02-44.jpg](Images/image00468.jpeg)\n\n[Figure 2-44](#part0008.xhtml#_Fig44).\
    \ Listing Document JSON with Cursor\n\nIn the previous example we did not create\
    \ a variable for the cursor but invoked the `forEach()` method in sequence to\
    \ the `find()` method invocation. We may also specify a variable for the cursor\
    \ as follows. A variable may be used if the cursor is to be used for some other\
    \ purpose also.\n\n```\nvar cursor= db.catalog.find();\n```\n\nSubsequently the\
    \ `hasNext()` and `next()` methods are invoked in a ternary/conditional operator\
    \ to find the next document in the cursor.\n\n```\nvar document = cursor.hasNext()\
    \ ? cursor.next() : null;\n```\n\nIf a document is returned, print the JSON form\
    \ of the document.\n\n```\nif (document) {\n    print (tojson(document));\n}\n\
    ```\n\nThe JSON form of a document gets output as shown in [Figure 2-45](#part0008.xhtml#Fig45).\n\
    \n![9781484215999_Fig02-45.jpg](Images/image00469.jpeg)\n\n[Figure 2-45](#part0008.xhtml#_Fig45).\
    \ Using a Variable for the Cursor\n\nThe cursor methods may be invoked in sequence\
    \ as in the following `find()` method invocation in which the `limit()` method\
    \ is invoked followed by the `sort()` method. The `limit()` method limits the\
    \ documents returned to two and the `sort` method sorts by `catalogId` in ascending\
    \ order.\n\n```\n>db.catalog.find().limit(2).sort({catalogId: 1})\n```\n\nTwo\
    \ documents with `catalogId` field in ascending order get returned as shown in\
    \ [Figure 2-46](#part0008.xhtml#Fig46).\n\n![9781484215999_Fig02-46.jpg](Images/image00470.jpeg)\n\
    \n[Figure 2-46](#part0008.xhtml#_Fig46). Invoking Cursor Methods in Sequence\n\
    \nFinding and Modifying a Document\n\nThe `findAndModify()` method may be used\
    \ to find and modify a single document and has the following syntax.\n\n```\n\
    db.collection.findAndModify({\n    query: <document>,\n    sort: <document>,\n\
        remove: <boolean>,\n    update: <document>,\n    new: <boolean>,\n    fields:\
    \ <document>,\n    upsert: <boolean>\n})\n```\n\nThe following parameters listed\
    \ in [Table 2-9](#part0008.xhtml#Tab9) are supported by the `findAndModify()`\
    \ method. All parameters are optional except that one of update or remove must\
    \ be specified.\n\n[Table 2-9](#part0008.xhtml#_Tab9). Parameters Supported by\
    \ findAndModify() Method\n\n| Parameter | Type | Description |\n| --- | --- |\
    \ --- |\n| `query` | document | The query selection criteria to find a document\
    \ to modify. If multiple documents are returned by the selection criteria, only\
    \ one of the documents is modified. |\n| `sort` | document | Specifies which document\
    \ is modified if multiple documents are returned. The first document in the sort\
    \ order is specified by the `sort` parameter. |\n| `remove` | boolean | Specifies\
    \ if the selected document is to be removed. Default is false. Either `remove`\
    \ or `upsert` must be specified. |\n| `update` | document | Specifies the update\
    \ to apply. The update parameter makes use of update operators or field:value.\
    \ |\n| `new` | boolean | Specifies whether the modified document is to be returned\
    \ or the original. Default is false. If `remove` is set to true new is ignored.\
    \ |\n| `fields` | document | Subset of fields to return specified in the <projection>\
    \ format {field1:1, field2:1 }. |\n| `upsert` | boolean | Specifies if a new document\
    \ is to be created and returned if a document to match the selection criteria\
    \ is not found. Default is false. Either `remove` or `upsert` must be specified.\
    \ |\n\nFor example, invoke the `findAndModify()` method as follows:\n\n*   Set\
    \ the `query` parameter to find documents with the journal field as Oracle Magazine.\n\
    *   Sort by catalogId field in ascending order.\n*   Specify the `update` parameter\
    \ with `update` operators `$inc` to increment the catalogId field by 1 and the\
    \ `$set` operator to set a new value for the edition field.\n*   The `upsert`\
    \ parameter is set to `true` and so is the `new` parameter.\n*   The `fields`\
    \ parameter specifies the fields to return as `catalogId`, `edition`, `title`,\
    \ and `author`.\n\n```\n    >db.catalog.findAndModify({\n      query: {journal\
    \ : \"Oracle Magazine\"},\n      sort: {catalogId : 1},\n      update: {$inc:\
    \ {catalogId: 1}, $set: {edition: '11-12-2013'}},\n      upsert :true,\n      new:\
    \ true,\n      fields: {catalogId: 1, edition: 1, title: 1, author: 1}\n    })\n\
    \    ```\n\nBefore invoking the preceding method add some documents, which should\
    \ have the `catalogId` field value as a number because the `$inc` operator cannot\
    \ be applied to a non-number. Because the parameter `new` is set to `true` the\
    \ method returns the modified document as shown in [Figure 2-47](#part0008.xhtml#Fig47).\n\
    \n![9781484215999_Fig02-47.jpg](Images/image00471.jpeg)\n\n[Figure 2-47](#part0008.xhtml#_Fig47).\
    \ Using the findAndModify Method\n\nBoth `upsert` and `remove` parameter values\
    \ cannot be specified in the method invocation. For example, run the following\
    \ command.\n\n```\ndb.catalog.findAndModify({\n  query: {journal : \"Oracle Magazine\"\
    },\n  sort: {catalogId : 1},\n  update: {$inc: {catalogId: 1}, $set: {edition:\
    \ '11-12-2013'}},\n  remove: true,\n  upsert :true,\n  new: true,\n  fields: {catalogId:\
    \ 1, edition: 1, title: 1, author: 1}\n})\n```\n\nAs indicated by the following\
    \ exception both `upsert` and `remove` parameter values cannot coexist as shown\
    \ in [Figure 2-48](#part0008.xhtml#Fig48).\n\n![9781484215999_Fig02-48.jpg](Images/image00472.jpeg)\n\
    \n[Figure 2-48](#part0008.xhtml#_Fig48). Error Message “remove and upsert can’t\
    \ co-exist”\n\nRemoving a Document\n\nThe `db.collection.remove()` method is used\
    \ to remove document/s. The method has the following syntax in MongoDB version\
    \ prior to 2.6.\n\n```\ndb.collection.remove(\n   <query>,\n   <justOne>\n)\n\
    ```\n\nThe `remove()` method has the following syntax in version 2.6 and later.\n\
    \n```\ndb.collection.remove(\n   <query>,\n   {\n     justOne: <boolean>,\n    \
    \ writeConcern: <document>\n   }\n)\n```\n\nThe method parameters are as listed\
    \ in [Table 2-10](#part0008.xhtml#Tab10).\n\n[Table 2-10](#part0008.xhtml#_Tab10).\
    \ The remove Method Parameters"
  trans: "\n## 游标方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `batchSize()` | 指定在单个网络消息中返回的文档数量。\
    \ |\n| `count()` | 游标中的文档数量。 |\n| `forEach(<function>)` | 遍历每个文档以应用一个 JavaScript\
    \ 函数。 |\n| `hasNext()` | 如果游标有另一个文档可供迭代，则返回 true；如果游标没有，则返回 false。 |\n| `limit()`\
    \ | 限制游标结果集的大小。 |\n| `next()` | 返回游标中的下一个文档。 |\n| `skip()` | 指定在从 MongoDB 数据库获取文档之前要跳过的文档数量。\
    \ |\n| `sort()` | 按指定的排序顺序返回结果。 |\n| `toArray()` | 返回文档数组。 |\n\n接下来，我们将演示一些游标方法的使用。使用\
    \ `insert()` 方法删除 `catalog` 集合并向其中添加三个文档。\n\n```\n>db.catalog.drop()\n>doc1 =\
    \ {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"),\"catalogId\" : 1, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A.\
    \ Kelly'}\ndb.catalog.insert(doc1)\n>doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d6\"\
    ), \"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n>doc3\
    \ = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d7\"), \"catalogId\" : 3, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013'}\n>db.catalog.insert(doc3)\n```\n\n在返回的游标上调用 `forEach` 方法，并调用\
    \ `printjson` 函数以 JSON 格式输出文档。\n\n```\n>db.catalog.find().forEach(printjson)\n\
    ```\n\n三个文档以 JSON 格式显示，如图 2-44 所示。\n\n![9781484215999_Fig02-44.jpg](img/image00468.jpeg)\n\
    \n**图 2-44. 使用游标列出文档 JSON**\n\n在前面的例子中，我们没有为游标创建变量，而是在 `find()` 方法调用之后顺序调用了 `forEach()`\
    \ 方法。我们也可以如下指定游标变量。如果游标还要用于其他目的，则可以使用变量。\n\n```\nvar cursor= db.catalog.find();\n\
    ```\n\n随后，在三元/条件运算符中调用 `hasNext()` 和 `next()` 方法以查找游标中的下一个文档。\n\n```\nvar document\
    \ = cursor.hasNext() ? cursor.next() : null;\n```\n\n如果返回了文档，则打印其 JSON 形式。\n\n\
    ```\nif (document) {\n    print (tojson(document));\n}\n```\n\n文档的 JSON 形式输出如图\
    \ 2-45 所示。\n\n![9781484215999_Fig02-45.jpg](img/image00469.jpeg)\n\n**图 2-45.\
    \ 为游标使用变量**\n\n可以按顺序调用游标方法，如下面的 `find()` 方法调用所示，其中调用了 `limit()` 方法，随后调用了 `sort()`\
    \ 方法。`limit()` 方法将返回的文档限制为两个，`sort` 方法按 `catalogId` 升序排序。\n\n```\n>db.catalog.find().limit(2).sort({catalogId:\
    \ 1})\n```\n\n返回两个按 `catalogId` 字段升序排列的文档，如图 2-46 所示。\n\n![9781484215999_Fig02-46.jpg](img/image00470.jpeg)\n\
    \n**图 2-46. 顺序调用游标方法**\n\n## 查找和修改文档\n\n`findAndModify()` 方法可用于查找和修改单个文档，其语法如下。\n\
    \n```\ndb.collection.findAndModify({\n    query: <document>,\n    sort: <document>,\n\
    \    remove: <boolean>,\n    update: <document>,\n    new: <boolean>,\n    fields:\
    \ <document>,\n    upsert: <boolean>\n})\n```\n\n`findAndModify()` 方法支持以下列出的参数。除必须指定\
    \ update 或 remove 之一外，所有参数都是可选的。\n\n**表 2-9. findAndModify() 方法支持的参数**\n\n| 参数\
    \ | 类型 | 描述 |\n| --- | --- | --- |\n| `query` | document | 用于查找要修改的文档的查询选择标准。如果选择标准返回多个文档，则只修改其中一个文档。\
    \ |\n| `sort` | document | 指定如果返回多个文档则修改哪个文档。由 `sort` 参数指定排序顺序中的第一个文档。 |\n| `remove`\
    \ | boolean | 指定是否要删除所选文档。默认为 false。必须指定 `remove` 或 `upsert` 之一。 |\n| `update`\
    \ | document | 指定要应用的更新。更新参数使用更新操作符或 field:value。 |\n| `new` | boolean | 指定是返回修改后的文档还是原始文档。默认为\
    \ false。如果 `remove` 设置为 true，则 new 被忽略。 |\n| `fields` | document | 要返回的字段子集，以\
    \ <projection> 格式 {field1:1, field2:1 } 指定。 |\n| `upsert` | boolean | 指定如果未找到匹配选择标准的文档，是否要创建并返回一个新文档。默认为\
    \ false。必须指定 `remove` 或 `upsert` 之一。 |\n\n例如，按如下方式调用 `findAndModify()` 方法：\n*\
    \   设置 `query` 参数以查找 journal 字段为 Oracle Magazine 的文档。\n*   按 catalogId 字段升序排序。\n\
    *   指定 `update` 参数，使用 `update` 操作符 `$inc` 将 catalogId 字段递增 1，并使用 `$set` 操作符为 edition\
    \ 字段设置新值。\n*   `upsert` 参数设置为 `true`，`new` 参数也设置为 `true`。\n*   `fields` 参数指定要返回的字段为\
    \ `catalogId`、`edition`、`title` 和 `author`。\n\n```\n>db.catalog.findAndModify({\n\
    \  query: {journal : \"Oracle Magazine\"},\n  sort: {catalogId : 1},\n  update:\
    \ {$inc: {catalogId: 1}, $set: {edition: '11-12-2013'}},\n  upsert :true,\n  new:\
    \ true,\n  fields: {catalogId: 1, edition: 1, title: 1, author: 1}\n})\n```\n\n\
    在调用前面的方法之前，请添加一些文档，这些文档的 `catalogId` 字段值应为数字，因为 `$inc` 操作符不能应用于非数字。由于参数 `new`\
    \ 设置为 `true`，该方法返回修改后的文档，如图 2-47 所示。\n\n![9781484215999_Fig02-47.jpg](img/image00471.jpeg)\n\
    \n**图 2-47. 使用 findAndModify 方法**\n\n不能在方法调用中同时指定 `upsert` 和 `remove` 参数值。例如，运行以下命令。\n\
    \n```\ndb.catalog.findAndModify({\n  query: {journal : \"Oracle Magazine\"},\n\
    \  sort: {catalogId : 1},\n  update: {$inc: {catalogId: 1}, $set: {edition: '11-12-2013'}},\n\
    \  remove: true,\n  upsert :true,\n  new: true,\n  fields: {catalogId: 1, edition:\
    \ 1, title: 1, author: 1}\n})\n```\n\n如以下异常所示，`upsert` 和 `remove` 参数值不能共存，如图 2-48\
    \ 所示。\n\n![9781484215999_Fig02-48.jpg](img/image00472.jpeg)\n\n**图 2-48. 错误消息\
    \ “remove and upsert can’t co-exist”**\n\n## 删除文档\n\n`db.collection.remove()`\
    \ 方法用于删除文档。在 MongoDB 2.6 之前的版本中，该方法的语法如下。\n\n```\ndb.collection.remove(\n   <query>,\n\
    \   <justOne>\n)\n```\n\n在 2.6 及更高版本中，`remove()` 方法的语法如下。\n\n```\ndb.collection.remove(\n\
    \   <query>,\n   {\n     justOne: <boolean>,\n     writeConcern: <document>\n\
    \   }\n)\n```\n\n该方法的参数如表 2-10 所列。\n\n**表 2-10. remove 方法参数**\n"
- fmt: "## MongoDB `remove()`方法\n\n| Parameter | Type | Description |\n| --- | ---\
    \ | --- |\n| `query` | document | 指定使用查询操作符的删除条件。要删除所有文档，请指定一个空文档 `{}`。在2.6之前的版本中，通过省略查询也可以删除所有文档。\
    \ |\n| `justOne` | boolean | 指定是否仅删除单个文档。默认为 `false`，这意味着将删除所有匹配的文档。 |\n| `writeConcern`\
    \ | document | 写入关注级别，这在之前的章节中已经讨论过。 |\n\n在2.6及更高版本中，`remove()`方法会返回一个`WriteResult`对象。例如，添加三个文档，其中一个`catalogId`为3，两个`catalogId`为2。\n\
    \n```\n>db.catalog.drop()\n>doc1 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"\
    ),\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2\
    \ = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d6\"), \"catalogId\" : 2, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013',\"title\" : 'Quintessential and Collaborative',\"author\" : 'Tom\
    \ Haunert'}\n>db.catalog.insert(doc2)\n>doc3 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d7\"\
    ), \"catalogId\" : 3, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013'}\n>db.catalog.insert(doc3)\n\
    ```\n\n随后，如下所示删除`catalogId`为2的文档。\n\n```\n>db.catalog.remove({ catalogId: 2 })\n\
    ```\n\n如[图2-49](#part0008.xhtml#Fig49)的输出所示，两个`catalogId`为2的文档被删除（`nRemoved`为2），并且在删除文档后调用`find()`方法时，只返回了`catalogId`为3的文档。\n\
    \n![9781484215999_Fig02-49.jpg](Images/image00473.jpeg)\n\n[图2-49](#part0008.xhtml#_Fig49).\
    \ 使用 `remove()` 删除文档\n\n在另一个例子中，为`catalogId`字段使用比较查询操作符`$gt`来指定查询。将`justOne`设置为\
    \ `true` 以仅删除一个文档，并将`writeConcern`设置为 `{ w: 1, wtimeout: 5000 }`。`w`选项的值为1表示在单个MongoDB服务器上确认写入。如果为`w:1`指定了`wtimeout`，则会被忽略，这意味着不会发生超时，并且会从单个服务器返回确认。\n\
    \n```\n>db.catalog.remove(\n    { catalogId: { $gt: 1 } },\n    {justOne:true,\
    \ writeConcern: { w: 1, wtimeout: 5000 } }\n)\n```\n\n返回的`WriteResult`对象中的`nRemoved`字段表明有一个文档被删除，如[图2-50](#part0008.xhtml#Fig50)所示。\n\
    \n![9781484215999_Fig02-50.jpg](Images/image00474.jpeg)\n\n[图2-50](#part0008.xhtml#_Fig50).\
    \ 在 `remove()` 方法中使用比较查询操作符 `$gt`\n\n在2.6之前的版本中，要删除所有文档，`remove()`方法的调用方式如下，不带任何参数。\n\
    \n```\n>db.catalog.remove()\n```\n\n在MongoDB 2.6及更高版本中，要删除集合中的所有文档，必须提供一个空文档`{}`作为参数，如下所示。\n\
    \n```\n>db.catalog.remove({})\n```\n\n`remove()`方法返回一个`WriteResult`对象，其中`nRemoved`为3，表明已删除三个文档，如[图2-51](#part0008.xhtml#Fig51)所示。\n\
    \n![9781484215999_Fig02-51.jpg](Images/image00475.jpeg)\n\n[图2-51](#part0008.xhtml#_Fig51).\
