    \ 10 分钟后超时游标以防止内存过度使用。设置`no_cursor_timeout`不会使空闲游标超时。 |\n| `projection(document\
    \ = nil)` | Hash, View | 在结果集中为每个文档包含或排除的字段。 |\n| `read(value = nil)` | Symbol,\
    \ View | 读取偏好。 |\n| `show_disk_loc(value = nil)` | (true, false, View) | 设置是否应显示每个文档的磁盘位置。值可以是`true`、`false,`或`nil`（默认）。\
    \ |\n| `skip(number = nil)` | Integer, View | 要跳过的文档数量。设置为整数值。 |\n| `snapshot(value\
    \ = nil)` | Object | 当设置为`true`时，防止文档返回超过一次。值可以是`true`、`false,`或`nil`。 |\n| `sort(spec\
    \ = nil)` | Hash, View | 指定结果集排序方式的键值对（作为 Hash）。 |\n| `each {&#124;Each&#124;\
    \ ... }` | Enumerator | 用于遍历结果集中的文档。 |\n\n# 更新文档\n\n`Collection`类不直接提供用于更新文档的任何实例方法。但是，由`find()`方法返回的集合视图提供了几种方法，如前面第\
    \ 4-10 表中讨论的，用于更新或替换文档。在本节中，我们将更新文档。\n\n1.  在`C:\\Ruby21-x64\\mongodbscripts`目录中创建一个\
    \ Ruby 脚本`updateDocument.rb`。\n2.  在`updateDocument.rb`脚本中，如果`mongodb`集合已存在则删除它，然后创建`mongodb`集合。\n\
    3.  向`mongodb`集合添加两个文档。\n4.  为`mongodb`集合创建一个集合视图。\n\n    ```\n    collection\
    \ = client[:mongodb]\n    ```\n\n我们将讨论几个示例，在这些示例中，两个文档将被添加到`mongodb`集合中，随后被更新或替换。\n\
    \n## 示例 1：使用`update_one()`\n\n1.  对于第一个示例，使用`update_one()`方法将其中一个文档的`catalogId`递增\
    \ 1。使用`$inc`更新操作符来递增`catalogId`。`find()`方法查找所有`journal`设置为`'Oracle Magazine'`的文档。\n\
    \n    ```\n    result = collection.find(:journal => 'Oracle Magazine').update_one(\"\
    $inc\" => { :catalogId => 1 })\n    ```\n\n2.  输出更新的文档数量。\n\n    ```\n    print\
    \ result.n\n    ```\n\n3.  运行`updateDocument.rb`脚本。\n\n    ```\n    >ruby updateDocument.rb\n\
    \    ```\n\n    如图 4-23 所示的输出所示，一个文档被更新。\n\n    ![9781484215999_Fig04-23.jpg](img/image00531.jpeg)\n\
    \    图 4-23. 运行 updateDocument.rb 脚本\n\n4.  在 Mongo shell 中运行`db.mongodb.find()`命令以列出更新后的文档，如图\
    \ 4-24 所示。两个文档的`catalogId`都为 2；一个文档起始`catalogId`为 1，另一个的`catalogId`被递增了 1。\n\n\
    \    ![9781484215999_Fig04-24.jpg](img/image00532.jpeg)\n    图 4-24. 其中一个文档的 catalogId\
    \ 被递增 1 至 2\n\n## 示例 2：使用`update_many()`\n\n1.  对于第二个示例，使用`update_many`方法更新多个文档。使用`$set`更新操作符将\
    \ publisher 字段设置为`OraclePublishing`。`find()`方法设置了过滤器，用于查找所有`publisher`设置为`'Oracle\
    \ Publishing'`的文档。\n\n    ```\n    result = collection.find(:publisher => 'Oracle\
    \ Publishing').update_many('$set' => { publisher: 'OraclePublishing'})\n    ```\n\
    \n2.  使用`db.mongodb.drop()`删除`mongodb`集合。运行`updateDocument.rb`脚本。输出表明两个文档已被更新，如图\
    \ 4-25 所示。\n\n    ![9781484215999_Fig04-25.jpg](img/image00533.jpeg)\n    图 4-25.\
    \ 更新多个文档\n\n3.  运行`db.mongodb.find()`方法以列出两个更新后的文档，如图 4-26 所示。\n\n    ![9781484215999_Fig04-26.jpg](img/image00534.jpeg)\n\
    \    图 4-26. 列出两个更新后的文档\n\n## 示例 3：使用`replace_one()`\n\n1.  在第三个示例中，查找`edition`设置为\
    \ November December 2013 的文档，并使用`replace_one()`方法将其中一个文档替换为仅包含`edition`字段且设置为`'11-12-2013'`的文档。\n\
    \n    ```\n    result = collection.find(:edition => 'November December 2013').replace_one(:edition\
    \ => '11-12-2013')\n    ```\n\n2.  使用`db.mongodb.drop()`删除`mongodb`集合。运行仅包含示例\
    \ 3 的`updateDocument.rb`脚本。如输出所示，一个文档已被更新（替换），如图 4-27 所示。\n\n    ![9781484215999_Fig04-27.jpg](img/image00535.jpeg)\n\
    \    图 4-27. 替换单个文档\n\n3.  在 Mongo shell 中运行`db.mongodb.find()`命令以列出替换后的文档，如图\
    \ 4-28 所示。\n\n    ![9781484215999_Fig04-28.jpg](img/image00536.jpeg)\n    图 4-28.\
    \ 列出替换后的文档\n\n## 示例 4：使用`find_one_and_replace()`\n\n1.  在第四个示例中，`find()`方法的过滤器设置为查找所有`journal`设置为`'Oracle\
    \ Magazine'`的文档，并使用`find_one_and_replace()`方法查找并替换一个文档，替换为仅设置了`journal`字段的文档。`return_document`设置为`:after`以返回替换后的文档。\n\
    \n    ```\n    document = collection.find(:journal => 'Oracle Magazine').find_one_and_replace({:journal\
    \ => 'OracleMagazine'}, :return_document => :after)\n    ```\n\n    使用`db.mongodb.drop()`删除`mongodb`集合。当运行`updateDocument.rb`脚本时，一个文档被替换，并且替换后的文档被输出，如图\
    \ 4-29 所示。\n\n    ![9781484215999_Fig04-29.jpg](img/image00537.jpeg)\n    图 4-29.\
    \ 查找并替换文档\n"
