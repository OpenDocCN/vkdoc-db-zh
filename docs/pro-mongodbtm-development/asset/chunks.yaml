- fmt: "**Deepak Vohra** is a consultant and a principal member of the `NuBean.com`\
    \ software company. Deepak is a Sun-certified Java programmer and Web component\
    \ developer. He has worked in the fields of XML, Java programming, and Java EE\
    \ for over ten years. Deepak is the author of *Pro Couchbase Development* (Apress,\
    \ 2015) and the coauthor of *Pro XML Development with Java Technology* (Apress,\
    \ 2006). Deepak is also the author of the *JDBC 4.0* and *Oracle JDeveloper for\
    \ J2EE Development, Processing XML Documents with Oracle JDeveloper 11g, EJB 3.0\
    \ Database Persistence with Oracle Fusion Middleware 11g, and Java EE Development\
    \ in Eclipse IDE* (Packt Publishing). He also served as the technical reviewer\
    \ on *WebLogic: The Definitive Guide* (O’Reilly Media, 2004) and *Ruby Programming\
    \ for the Absolute Beginner* (Cengage Learning PTR, 2007).\n\n## About the Technical\
    \ Reviewers\n\n![9781484215999_unFigFM-02.jpg](Images/image00401.jpeg)\n\n**Manuel\
    \ Jordan** is an autodidactic developer and researcher who enjoys learning new\
    \ technologies so that he can experiment with new ways to integrate them.\n\n\
    Manuel won the 2010 Springy Award – Community Champion and Spring Champion 2013\\\
    . In his little free time, he reads the Bible and composes music on his bass and\
    \ guitar.\n\n![9781484215999_unFigFM-03.jpg](Images/image00402.jpeg)\n\n**Massimo\
    \ Nardone** holds a Master of Science degree in Computing Science from the University\
    \ of Salerno, Italy. He worked as a PCI QSA and Senior Lead IT Security/Cloud/SCADA\
    \ Architect for many years and currently works as Security, Cloud and SCADA Lead\
    \ IT Architect for Hewlett Packard Finland. He has more than twenty years of work\
    \ experience in IT including Security, SCADA, Cloud Computing, IT Infrastructure,\
    \ Mobile, Security, and WWW technology areas for both national and international\
    \ projects. Massimo has worked as a Project Manager, Cloud/SCADA Lead IT Architect,\
    \ Software Engineer, Research Engineer, Chief Security Architect, and Software\
    \ Specialist. He worked as visiting a lecturer and supervisor for exercises at\
    \ the Networking Laboratory of the Helsinki University of Technology (Aalto University).\
    \ Massimo has been programming and teaching how to program with Perl, PHP, Java,\
    \ VB, Python, C/C++, and MySQL for more than twenty years. He holds four international\
    \ patents (PKI, SIP, SAML, and Proxy areas).\n\nMassimo is the author of *Pro\
    \ Android Games* (Apress, 2015).\n\n## Introduction\n\nMongoDB server is ranked\
    \ first in NoSQL databases and fourth in all databases (relational or NoSQL).\
    \ While several books on MongoDB administration are available, none on MongoDB-based\
    \ development are available.\n\nThis *Pro MongoDB Development* book is about MongoDB\
    \ server, a NoSQL database based on the BSON (binary JSON) document model. As\
    \ already noted, MongoDB is the most commonly used NoSQL database and is ranked\
    \ fourth in all databases (relational or NoSQL) according to DB-Engines.com (Reference:\
    \ `http://db-engines.com/en/ranking`). The book discusses all aspects of using\
    \ MongoDB database in web development. Java, PHP, Ruby, and JavaScript are the\
    \ most commonly used programming/scripting languages, and the book discusses accessing\
    \ MongoDB database with these languages. The book also discusses using Java EE\
    \ frameworks Kundera and Spring Data with MongoDB. As NoSQL databases are commonly\
    \ used with the Hadoop ecosystem, the book discusses using MongoDB with Apache\
    \ Hadoop and Apache Hive. An Oracle Data Integrator-based integration of MongoDB\
    \ data into Oracle Database is also discussed. Migration from other NoSQL databases\
    \ (Apache Cassandra and Couchbase) and from relational database (Oracle Database)\
    \ is discussed.\n\nThis book is for web developers and NoSQL developers who develop\
    \ applications using MongoDB server. Prerequisite knowledge of Java, Java EE,\
    \ and scripting languages PHP, Ruby, and JavaScript is essential. Familiarity\
    \ with Apache Hadoop, Apache Hive, Oracle Database, and Oracle Data Integrator\
    \ is also a prerequisite.\n\nAccording to the Java Tools and Technologies Landscape\
    \ for 2014, “In the NoSQL world… among the developers using NoSQL… MongoDB (56%)\
    \ is clearly leading… ” (Reference: `http://zeroturnaround.com/rebellabs/java-tools-and-technologies-landscape-for-2014/13/`).\n\
    \nMore than 2000 organizations use MongoDB (Reference: `www.mongodb.com/who-uses-mongodb`).\n\
    \nVarious metrics have ranked MongoDB above all other NoSQL databases (Reference:\
    \ `www.mongodb.com/leading-nosql-database`).\n\nMongoDB was named as the Database\
    \ of the Year in 2013 by DB-Engines (Reference: `www.mongodb.com/blog/post/mongodb-named-2013-database-year-why-matters`).\n\
    \nGoogle Trends search term ranking for “MongoDB” as compared with “Apache Cassandra”\
    \ and “Couchbase” in September 2015 is shown in the following illustration.\n\n\
    ![9781484215999_unFigFM-04.jpg](Images/image00403.jpeg)\n\n*Google Trends Database\
    \ Search Results*\n\n# CHAPTER 1\n\n![image](Images/image00404.jpeg)\n\n## Using\
    \ a Java Client with MongoDB\n\nMongoDB server provides drivers for several languages\
    \ including Java. The MongoDB Java driver may be used to connect to MongoDB server\
    \ from a Java application and create a collection, get a collection or a list\
    \ of collections, add a document or multiple documents to a collection, and find\
    \ a document or a set of documents. In this chapter we shall create a Java application\
    \ in Eclipse and access MongoDB server to add a document and subsequently get\
    \ data from MongoDB server and also update and delete data in MongoDB server.\
    \ This chapter covers the following topics:\n\n*   Setting up the environment\n\
    *   Creating a Maven project\n*   Creating a BSON document in MongoDB\n*   Using\
    \ a model to create a BSON document in MongoDB\n*   Getting data from MongoDB\n\
    *   Updating data in MongoDB\n*   Deleting data in MongoDB\n\n### Setting Up the\
    \ Environment\n\nWe need to download and install the following software.\n\n1.\
    \  MongoDB 3.0.5 binary distribution `mongodb-win32-x86_64-3.0.5-signed.msi` from\
    \ `www.mongodb.org/downloads`. Stable Release (3.0.5) for Windows 64-bit is used\
    \ in this chapter.\n2.  Eclipse IDE for Java EE Developers from `www.eclipse.org/downloads`.\n\
    3.  Java 5 or later (Java 7 used) from `www.oracle.com/technetwork/java/javase/downloads/index.html`.\n\
    \nDouble-click on the MongoDB binary distribution to install MongoDB. Add the\
    \ `bin` directory (`C:\\Program Files\\MongoDB\\Server\\3.0\\bin`) of the MongoDB\
    \ installation to the `PATH` environment. Create a directory `C:\\data\\db` for\
    \ the MongoDB data. Start the MongoDB server with the following command.\n\n```\n\
    >mongod\n```\n\nThe MongoDB server gets started as shown in [Figure 1-1](#part0007.xhtml#Fig1).\n\
    \n![9781484215999_Fig01-01.jpg](Images/image00405.jpeg)\n\n[Figure 1-1](#part0007.xhtml#_Fig1).\
    \ Starting MongoDB\n\n### Creating a Maven Project\n\nTo access MongoDB from a\
    \ Java application we need to create a Maven project in Eclipse IDE and add the\
    \ required dependencies.\n\n1.  Select File ![image](Images/image00406.jpeg) New\
    \ ![image](Images/image00406.jpeg) Other. In the New window, select the Maven\
    \ ![image](Images/image00406.jpeg) Maven Project wizard and click on Next as shown\
    \ in [Figure 1-2](#part0007.xhtml#Fig2).\n\n![9781484215999_Fig01-02.jpg](Images/image00407.jpeg)\n\
    \n[Figure 1-2](#part0007.xhtml#_Fig2). Selecting Maven ![image](Images/image00406.jpeg)\
    \ Maven Project\n\n2.  In New Maven Project wizard select the check boxes “Create\
    \ a simple project” and “Use default Workspace location” as shown in [Figure 1-3](#part0007.xhtml#Fig3).\
    \ Click on Next.\n\n![9781484215999_Fig01-03.jpg](Images/image00408.jpeg)\n\n\
    [Figure 1-3](#part0007.xhtml#_Fig3). New Maven Project wizard\n\n3.  Next, configure\
    \ the project, specifying the following values as shown in [Figure 1-4](#part0007.xhtml#Fig4)\
    \ and then clicking on Finish:\n\n*   Group Id: `mongodb.java`\n    *   Artifact\
    \ Id: `MongoDBJava`\n    *   Version: 1.0.0\n    *   Packaging: jar\n    *   Name:\
    \ `MongoDBJava`\n\n![9781484215999_Fig01-04.jpg](Images/image00409.jpeg)\n\n[Figure\
    \ 1-4](#part0007.xhtml#_Fig4). Configuring the Maven Project"
