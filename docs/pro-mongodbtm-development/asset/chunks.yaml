    \  db.listCollections().toArray(function(error, items) {\n    console.log(items);\n\
    \    db.close();\n  });\n});\n```\n\n以下用于前述示例的`db.js`文件内容如下：\n\n```javascript\n\
    Db = require('mongodb').Db;\nServer = require('mongodb').Server;\nvar db = new\
    \ Db('local', new Server('localhost', 27017));\ndb.open(function(error, db) {\n\
    \  if (error)\n    console.log(error);\n  db.listCollections().toArray(function(error,\
    \ items) {\n    console.log(items);\n    db.close();\n  });\n});\n```\n\n4.  运行`db.js`脚本以列出`mongodb`数据库中的集合，如[图\
    \ 5-13](#part0011.xhtml#Fig13)所示。\n    ![9781484215999_Fig05-13.jpg](Images/image00560.jpeg)\n\
    \    [图 5-13](#part0011.xhtml#_Fig13). 使用类构造函数创建Db实例并运行db.js脚本\n\n在上面的例子中，我们使用了`Server`拓扑。拓扑也可以是`Mongos`或`ReplSet`。例如，要使用`Mongos`拓扑，请遵循以下步骤：\n\
    \n1.  为`Mongos`添加一条`require`语句，并使用一个`Server`实例数组创建`Mongos`实例，如下所示。数组中的`Server`实例并不全是必须是正在运行且可用的服务器。例如，我们列出了一个端口为50000的服务器，但在运行示例时，该端口上并没有运行MongoDB服务器。\n\
    \n    ```javascript\n    var mongos = new Mongos([\n        new Server(\"localhost\"\
    , 50000),\n        new Server(\"localhost\", 27017)\n      ]);\n    ```\n\n2.\
    \  使用`Db`类构造函数创建`Db`实例，数据库名作为第一个参数，`Mongos`类实例作为第二个参数。\n\n    ```javascript\n\
    \    var db = new Db('local', mongos);\n    ```\n\n3.  使用`open()`方法打开数据库，并在回调函数块中像之前一样列出集合。\n\
    \n    用于`Mongos`类型拓扑的`db.js`脚本内容如下：\n\n    ```javascript\n    Mongos = require('mongodb').Mongos;\n\
    \    Db = require('mongodb').Db;\n    Server = require('mongodb').Server;\n  \
    \  var mongos = new Mongos([\n        new Server(\"localhost\", 50000),\n    \
    \    new Server(\"localhost\", 27017)\n      ]);\n    var db = new Db('local',\
    \ mongos);\n    db.open(function(error, db) {\n      if (error)\n        console.log(error);\n\
    \      db.listCollections().toArray(function(error, items) {\n        console.log(items);\n\
    \        db.close();\n      });\n    });\n    ```\n\n4.  运行`db.js`脚本以列出`mongodb`数据库中的集合，如[图\
    \ 5-14](#part0011.xhtml#Fig14)所示。\n    ![9781484215999_Fig05-14.jpg](Images/image00561.jpeg)\n\
    \    [图 5-14](#part0011.xhtml#_Fig14). 使用Mongos拓扑运行db.js脚本\n\n### 使用集合\n\n集合由`Collection`类对象表示。`Collection`类的构造函数不接受任何参数，可以使用`new\
    \ Collection()`创建一个新的`Collection`实例。`Collection`类提供了[表 5-11](#part0011.xhtml#Tab11)中讨论的属性。\n\
    \n[表 5-11](#part0011.xhtml#_Tab11). 集合类属性\n| 属性 | 类型 | 描述 |\n| --- | --- | ---\
    \ |\n| `collectionName` | 字符串 | 获取集合名称。 |\n| `namespace` | 字符串 | 获取完全限定的集合命名空间。\
    \ |\n| `writeConcern` | 对象 | 获取当前的写关注值。 |\n| `hint` | 对象 | 获取当前的索引提示。 |\n\n`Collection`构造函数并非旨在直接调用，而是在内部调用。`Collection`类提供的一些方法在[表\
    \ 5-12](#part0011.xhtml#Tab12)中讨论。\n\n[表 5-12](#part0011.xhtml#_Tab12). 部分集合类方法\n\
    | 方法 | 返回类型 | 描述 |\n| --- | --- | --- |\n| `bulkWrite(operations, options, callback)`\
    \ | 如果未指定回调，则为 Promise。 | 执行批量写操作。 |\n| `count(query, options, callback)` | 如果未指定回调，则为\
    \ Promise。 | 计算匹配文档的数量。 |\n| `createIndex(fieldOrSpec, options, callback)` | 如果未指定回调，则为\
    \ Promise。 | 创建索引。 |\n| `deleteMany(filter, options, callback)` | 如果未指定回调，则为 Promise。\
    \ | 删除多个文档。 |\n| `deleteOne(filter, options, callback)` | 如果未指定回调，则为 Promise。\
    \ | 删除单个文档。 |\n| `distinct(key, query, options, callback)` | 如果未指定回调，则为 Promise。\
    \ | 获取给定键的不同文档。 |\n| `drop(callback)` | 如果未指定回调，则为 Promise。 | 删除集合。 |\n| `dropIndex(indexName,\
    \ options, callback)` | 如果未指定回调，则为 Promise。 | 删除索引。 |\n| `find(query)` | 游标。 |\
    \ 查找文档。在结果集上创建游标。 |\n| `findAndModify(query, sort, doc, options, callback)` |\
    \ 如果未指定回调，则为 Promise。 | 查找并更新文档。该方法已弃用，其替代方法是`findOneAndUpdate`、`findOneAndReplace`或`findOneAndDelete`。仍可使用已弃用的方法。\
    \ |\n| `findAndRemove(query, sort, options, callback)` | 如果未指定回调，则为 Promise。 |\
    \ 查找并删除文档。该方法已弃用，其替代方法是`findOneAndDelete`。仍可使用已弃用的方法。 |\n| `findOne(query, options,\
    \ callback)` | 如果未指定回调，则为 Promise。 | 查找单个文档。 |\n| `findOneAndDelete(filter, options,\
    \ callback)` | 如果未指定回调，则为 Promise。 | 查找单个文档并将其删除。 |\n| `findOneAndReplace(filter,\
    \ replacement, options, callback)` | 如果未指定回调，则为 Promise。 | 查找单个文档并替换它。 |\n| `findOneAndUpdate(filter,\
    \ update, options, callback)` | 如果未指定回调，则为 Promise。 | 查找单个文档并更新它。 |\n| `indexes(callback)`\
    \ | 如果未指定回调，则为 Promise。 | 返回所有索引。 |\n| `insertMany(docs, options, callback)` |\
    \ 如果未指定回调，则为 Promise。 | 插入文档数组。 |\n| `insertOne(doc, options, callback)` | 如果未指定回调，则为\
    \ Promise。 | 插入单个文档。 |\n| `isCapped(callback)` | 如果未指定回调，则为 Promise。 | 检查集合是否为固定集合。\
    \ |\n| `listIndexes(options)` | CommandCursor。 | 列出所有索引。 |\n| `mapReduce(map,\
    \ reduce, options, callback)` | 如果未指定回调，则为 Promise。 | 在集合上运行 Map Reduce。 |\n|\
    \ `options(callback)` | 如果未指定回调，则为 Promise。 | 返回集合的选项集。 |\n| `parallelCollectionScan(options,\
    \ callback)` | 如果未指定回调，则为 Promise。 | 返回集合上的 n 个并行游标。 |\n| `rename(newName, options,\
    \ callback)` | 如果未指定回调，则为 Promise。 | 重命名集合。 |\n| `replaceOne(filter, doc, options,\
    \ callback)` | 如果未指定回调，则为 Promise。 | 替换单个文档。 |\n| `save(doc, options, callback)`\
    \ | 如果未指定回调，则为 Promise。 | 将文档保存为完整文档替换。该方法已弃用，其替代方法是`insertOne`、`insertMany`、`updateOne`或`updateMany`。\
    \ |\n| `stats(options, callback)` | 如果未指定回调，则为 Promise。 | 获取所有集合统计信息。 |\n| `updateMany(filter,\
    \ update, options, callback)` | 如果未指定回调，则为 Promise。 | 更新多个文档。 |\n| `updateOne(filter,\
    \ update, options, callback)` | 如果未指定回调，则为 Promise。 | 更新单个文档。 |\n\n`Db`类提供了几个与集合相关的方法（`collection`、`collections`、`createCollection`、`dropCollection`、`listCollections`、`renameCollection`），如[表\
    \ 5-10](#part0011.xhtml#Tab10)中所讨论。在本节中，我们将使用其中一些方法来获取、创建、重命名。"
