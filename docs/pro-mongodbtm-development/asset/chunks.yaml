    \n[Figure 6-15](#part0012.xhtml#_Fig15). Listing the Catalog Table Rows\n\nNext,\
    \ we shall migrate the Cassandra data to MongoDB server.\n\n# Migrating the Cassandra\
    \ Table to MongoDB\n\nIn this section we shall get the data stored in Cassandra\
