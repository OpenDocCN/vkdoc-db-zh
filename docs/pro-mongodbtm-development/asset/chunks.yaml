    \ | 如果未指定回调则返回 Promise。 | 执行命令。 |\n| `createCollection(name, options, callback)`\
    \ | 如果未指定回调则返回 Promise。 | 创建集合。 |\n| `db(name, options)` | Db。 | 创建新的数据库实例。 |\n\
    | `dropCollection(name, callback)` | 如果未指定回调则返回 Promise。 | 删除集合。 |\n| `dropDatabase(callback)`\
    \ | 如果未指定回调则返回 Promise。 | 删除数据库。 |\n| `executeDbAdminCommand(command, options,\
    \ callback)` | 如果未指定回调则返回 Promise。 | 以管理员身份执行命令。 |\n| `listCollections(filter,\
    \ options)` | CommandCursor。 | 列出所有集合。 |\n| `logout(options, callback)` | 如果未指定回调则返回\
    \ Promise。 | 从服务器注销用户。 |\n| `open(callback)` | 如果未指定回调则返回 Promise。 | 打开数据库。 |\n\
    | `removeUser(username, options, callback)` | 如果未指定回调则返回 Promise。 | 从数据库中移除用户。\
    \ |\n| `renameCollection(fromCollection, toCollection, options, callback)` | 如果未指定回调则返回\
    \ Promise。 | 重命名集合。 |\n\n1.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个 JavaScript\
    \ 脚本 `db.js`。\n2.  在脚本中，我们将获取一个数据库实例并从中获取数据库集合的列表。首先，使用 `require` 从 `mongodb`\
