  raw: '| Parameter | Type | Description |

    | --- | --- | --- |

    | `query` | document | Specifies deletion criteria using query operators. To remove
    all documents specify an empty document {}. In pre-2.6 versions all documents
    may also be deleted by omitting the query. |

    | `justOne` | boolean | Specifies if only a single document is to be removed.
    Default is false, which implies all documents are removed. |

    | `writeConcern` | document | The write concern, which is discussed in an earlier
    section. |


    In version 2.6 and later the `remove()` method returns a `WriteResult` object.
    As an example add three documents, one with `catalogId` 3 and two with `catalogId`
    2.


    ```

    >db.catalog.drop()

    >doc1 = {"_id" : ObjectId("53fb4b08d17e68cd481295d5"),"catalogId" : 2, "journal"
    : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition" : ''November
    December 2013'',"title" : ''Engineering as a Service'',"author" : ''David A. Kelly''}

    d b.catalog.insert(doc1)

    >doc2 = {"_id" : ObjectId("53fb4b08d17e68cd481295d6"), "catalogId" : 2, "journal"
    : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition" : ''November
    December 2013'',"title" : ''Quintessential and Collaborative'',"author" : ''Tom
    Haunert''}

    >db.catalog.insert(doc2)

    >doc3 = {"_id" : ObjectId("53fb4b08d17e68cd481295d7"), "catalogId" : 3, "journal"
    : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition" : ''November
    December 2013''}

    >db.catalog.insert(doc3)

    ```


    Subsequently remove the document/s with `catalogId` as 2 as follows.


    ```

    >db.catalog.remove({ catalogId: 2 })

    ```


    As indicated in the output in [Figure 2-49](#part0008.xhtml#Fig49) the two documents
    with `catalogId` as 2 are removed (`nRemoved` is 2) and only the document with
    `catalogId` as 3 is returned with the `find()` method invocation subsequent to
    removing the documents.


    ![9781484215999_Fig02-49.jpg](Images/image00473.jpeg)


    [Figure 2-49](#part0008.xhtml#_Fig49). Removing Document/s with remove()


    In another example, specify the query using the comparison query operator `$gt`
    for the `catalogId` field. Set `justOne` to true to remove only one document and
    set the `writeConcern` to `{ w: 1, wtimeout: 5000 }`. The value of 1 for the `w`
    option provides acknowledgment of write on a single MongoDB server. The `wtimeout`
    if specified for `w:1` is ignored implying that the a timeout does not occur and
    an acknowledgment from a single server is returned.


    ```

    >db.catalog.remove(

        { catalogId: { $gt: 1 } },

        {justOne:true, writeConcern: { w: 1, wtimeout: 5000 } }

    )

    ```


    The `nRemoved` field in the `WriteResult` object returned indicates that one document
    got removed as shown in [Figure 2-50](#part0008.xhtml#Fig50).


    ![9781484215999_Fig02-50.jpg](Images/image00474.jpeg)


    [Figure 2-50](#part0008.xhtml#_Fig50). Using a Comparison Query Operator $gt in
    remove() Method


    To remove all documents in pre-2.6 version the `remove()` method is invoked as
    follows without any args.


    ```

    >db.catalog.remove()

    ```


    To remove all documents from a MongoDB version 2.6 and later collection an empty
    document `{}` must be provided as an argument as follows.


    ```

    >db.catalog.remove({})

    ```


    The `remove()` method returns a `WriteResult` object with `nRemoved` as 3 indicating
    that three documents have been removed as shown in [Figure 2-51](#part0008.xhtml#Fig51).


    ![9781484215999_Fig02-51.jpg](Images/image00475.jpeg)


    [Figure 2-51](#part0008.xhtml#_Fig51). Removing All Documents


    A document cannot be removed from a capped collection, which is a fixed size collection
    similar to a circular buffer, using the `remove()` method. To demonstrate, invoke
    the `remove()` method on a capped collection; first drop the `catalog` collection
    and create a capped collection as discussed earlier in the section “Creating a
    Collection.”


    ```

    >db.catalog.drop()

    > db.createCollection("catalog", {capped: true, autoIndexId: true, size: 64 * 1024,
    max: 1000} )

    >db.catalog.remove({})

    ```


    An error message gets displayed as shown in [Figure 2-52](#part0008.xhtml#Fig52).


    ![9781484215999_Fig02-52.jpg](Images/image00476.jpeg)


    [Figure 2-52](#part0008.xhtml#_Fig52). A Capped Collection Cannot Be Deleted


    Summary


    In this chapter we discussed so me of the salient Mongo shell methods and commands.
    In the next chapter we shall use PHP with MongoDB server.


    CHAPTER 3


    ![image](Images/image00404.jpeg)


    Using MongoDB with PHP


    PHP continues to be one of the most commonly used scripting languages used in
    developing web sites. The PHP Driver for MongoDB may be used to connect to MongoDB,
    and create a collection and perform CRUD (Create, Read, Update, Delete) operations
    on the database. The PHP driver extension `dll` is not packaged with the PHP download
    but is required to be added and configured. In this chapter we shall use the PHP
    Driver for MongoDB to connect to MongoDB database server and add, find, update,
    and delete data from the server. This chapter covers the following topics:


    *   Getting Started

    *   Using Collections

    *   Using Documents


    Getting Started


    In the following subsections we shall discuss the PHP MongoDB Database Driver.
    We also discuss setting up the environment and creating a connection to MongoDB
    Driver from a PHP script.


    Overview of the PHP MongoDB Database Driver


    The PHP MongoDB Driver provides several classes for connecting to MongoDB and
    performing CRUD operations. The core classes in the PHP driver are shown in [Figure
    3-1](#part0009.xhtml#Fig1).


    ![9781484215999_Fig03-01.jpg](Images/image00477.jpeg)


    [Figure 3-1](#part0009.xhtml#_Fig1). Core Classes in PHP MongoDB Driver


    The main core classes are discussed in [Table 3-1](#part0009.xhtml#Tab1).


    [Table 3-1](#part0009.xhtml#_Tab1). PHP MongoDB Driver Core Classes


    | Class | Description |

    | --- | --- |

    | `MongoDB` | Instances of the class are used to interact with MongoDB database.
    The class constructor `MongoDB::__construct ( MongoClient $conn , string $name
    )` creates a new database, but the constructor is not supposed to be called directly.
    Instead an instance of MongoDB is created using `MongoClient::__get()` or `MongoClient::selectDB()`
    method. |

    | `MongoClient` | The class is used to create and manage connections with MongoDB.
    The class constructor `MongoClient::__construct ([ string $server = "mongodb://localhost:27017"
    [, array $options = array("connect" => TRUE) [, array $driver_options ]]] )` creates
    a new client connection. |

    | `MongoCollection` | The class represents a MongoDB collection. |

    | `MongoCursor` | The class represents a cursor that is used to iterate a result
    set of a database query. |


    MongoDB server operations may generate exceptions. Some of the main exceptions
    are illustrated in [Figure 3-2](#part0009.xhtml#Fig2).


    ![9781484215999_Fig03-02.jpg](Images/image00478.jpeg)


    [Figure 3-2](#part0009.xhtml#_Fig2). Types of Exceptions Generated by MongoDB


    The main exceptions are discussed in [Table 3-2](#part0009.xhtml#Tab2).


    [Table 3-2](#part0009.xhtml#_Tab2). The Main Exception Classes


    | Exception Class | Description |

    | --- | --- |

    | `MongoException` | The default exception class that all other exception classes
    must extend. Thrown by `MongoCollection::batchInsert MongoCollection::insert`
    methods if the inserted documents are empty. |

    | `MongoResultException` | Several command helpers such as `MongoCollection::findAndModify`
    throw the exception. |

    | `MongoCursorException` | Any database request that fails to receive an expected
    reply throws the exception. `MongoCollection::update, MongoCollection::batchInsert`
    and `MongoCollection::insert` throw the exception if the `w` option is set and
    the write fails. |

    | `MongoConnectionException` | Thrown when the driver fails to connect to the
    database. `MongoClient::connect` and `MongoCollection::findOne` throw `MongoConnectionException`
    if they fail to connect to the database. |

    | `MongoDuplicateKeyException` | Thrown if a document is inserted into a collection
    and the collection already has another document with the same unique key. |


