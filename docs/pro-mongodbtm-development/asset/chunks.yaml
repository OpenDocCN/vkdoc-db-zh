    \ collection.find.to_a\n    ```\n\n5.  在 `findDocuments.rb` 脚本中，创建一个文档数组，并使用 `insert_many`\
    \ 脚本添加。\n\n    ```\n    collection.insert_many([document1,document2])\n    ```\n\
    \n6.  尝试以下每种查找文档的选项：\n    *   使用 `find()` 方法查找所有文档，并在由 `CollectionView` 生成的 `Cursor`\
    \ 上调用 `each` 以迭代返回的文档集合。\n\n        ```\n        collection.find().each do |document|\n\
    \           print document\n        end\n        ```\n\n    *   作为另一个示例，仅查找 `:journal`\
    \ 设置为 'Oracle Magazine' 的文档，并使用 `limit()` 方法限制返回的文档数量。\n\n        ```\n      \
    \  collection.find(:journal => 'Oracle Magazine').limit(5).each do |document|\n\
    \              print document\n           end\n        ```\n\n    *   要查找特定版本的文档数量，请使用\
    \ `count()` 方法。\n\n        ```\n        print collection.find(:edition => 'November\
    \ December 2013').count\n        ```\n\n    *   可以使用 `distinct()` 方法查找不同的文档。\n\
    \n        ```\n        print collection.find.distinct(:catalogId)\n        collection.find(:journal\
    \ => 'Oracle Magazine').limit(5).each do |document|\n              print document\n\
    \           end\n        ```\n\n    `findDocuments.rb` 脚本如下所列。\n\n    ```\n  \
    \  require 'mongo'\n    include Mongo\n    client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\n    client=client.use(:local)\n    db=client.database\n\
    \    collection=db.collection(\"mongodb\")\n    collection.create\n    document1={\n\
    \      \"catalogId\" => \"catalog1\",\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
    \ December 2013\",\n      \"title\" => \"Engineering as a Service\",\n      \"\
    author\" =>  \"David A. Kelly\"\n    }\n    document2={\n      \"catalogId\" =>\
    \ \"catalog2\",\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\"\
    \ => \"Oracle Publishing\",\n      \"edition\" =>  \"November December 2013\"\
    ,\n      \"title\" => \"Quintessential and Collaborative\",\n      \"author\"\
    \ =>  \"Tom Haunert\"\n    }\n     collection.insert_many([document1,document2])\n\
    \       collection.find().each do |document|\n          print document\n     \
    \  end\n    collection.find(:journal => 'Oracle Magazine').limit(5).each do |document|\n\
    \          print document\n       end\n    print \"Number of documents with edition\
    \  November December 2013: \"\n    print \"\\n\"\n    print collection.find(:edition\
    \ => 'November December 2013').count\n    print \"\\n\"\n    print \"Number of\
    \ distinct documents by catalogId: \"\n    print \"\\n\"\n    print collection.find.distinct(:catalogId)\n\
    \    ```\n\n7.  由于该集合将再次使用，请使用 `db.mongodb.drop()` 删除 `mongodb` 集合。使用以下命令运行 `findDocuments.rb`\
    \ 脚本。\n\n    ```\n    >ruby findDocuments.rb\n    ```\n\n`findDocuments.rb` 脚本的输出如图\
    \ 4-22 所示。\n\n![9781484215999_Fig04-22.jpg](img/image00530.jpeg)\n图 4-22. 查找多个文档\n\
    \n`collection.find()` 的输出列出了 `mongodb` 集合中的两个文档。`collection.find(:journal => 'Oracle\
    \ Magazine').limit(5)` 的输出则列出了 `:journal` 设置为 'Oracle Magazine' 的文档。`limit()`\
    \ 方法将结果限制为 5，但由于集合只有 2 个文档，`limit` 方法没有效果。`collection.find(:edition => 'November\
    \ December 2013').count()` 方法调用输出了版本为 'November December 2013' 的文档数量为 2。`collection.find.distinct(:catalogId)`\
    \ 方法查找了 `mongodb` 集合中两个不同的 `catalogId`。\n\n`find()` 方法返回一个集合视图，当在视图上调用 `each`\
    \ 时，会创建一个 `Cursor` 对象。`Mongo::Collection::View` 是查询和选项的表示，生成文档结果集。`find()` 方法本身不会将查询发送到服务器。必须在\
    \ `find()` 方法之后调用另一个方法才能将查询发送到服务器。例如，在 `View` 上调用 `each()` 方法时，会创建一个将查询发送到服务器的\
    \ `Cursor` 对象。`Mongo::Collection::View` 类支持表 4-10 中讨论的方法。这些方法来自 `Writable`、`Explainable`、`Readable`\
    \ 和 `Iterable` 类。\n\n表 4-10. `Mongo::Collection::View` 类实例方法\n\n| 方法 | 返回类型 |\
    \ 描述 |\n| --- | --- | --- |\n| `delete_many` | Result | 删除多个文档。\n"
- fmt: "# 方法参考\n\n| 方法 | 返回类型 | 描述 |\n|------|----------|------|\n| `delete_one` |\
    \ Result | 删除单个文档。 |\n| `find_one_and_delete` | BSON::Document | 查找并删除一个文档。 |\n\
    | `find_one_and_replace(replacement, opts = {})` | BSON::Document | 查找并替换一个文档。\
    \ |\n| `find_one_and_update(document, opts = {})` | BSON::Document | 查找并更新一个文档。\
    \ |\n| `replace_one(document, opts = {})` | Result | 替换单个文档。 |\n| `update_many(spec,\
    \ opts = {})` | Result | 更新多个文档。 |\n| `update_one(spec, opts = {})` | Result |\
    \ 更新单个文档。 |\n| `explain` | Hash | 获取查询的解释计划。 |\n| `aggregate(pipeline, options\
    \ = {})` | Aggregation | 创建集合视图的聚合。 |\n| `allow_partial_results` | View | 允许查询在部分分片宕机时获取部分结果。\
    \ |\n| `batch_size(batch_size = nil)` | (Integer, View) | 设置批处理大小。设置为1或负值相当于设置限制。\
    \ |\n| `comment(comment = nil)` | (String, View) | 为查询关联注释。 |\n| `count(options\
    \ = {})` | Integer | 获取匹配文档的数量。 |\n| `distinct(field_name, options = {})` | Array&lt;Object&gt;\
    \ | 获取不同值的列表。 |\n| `hint(hint = nil)` | Hash, View | 查询必须使用的MongoDB索引。 |\n| `limit(limit\
    \ = nil)` | Integer, View | 限制查询返回文档的最大数量。 |\n| `map_reduce(map, reduce, options\
    \ = {}))` | MapReduce | 在查询上运行map reduce函数。 |\n| `max_scan(value = nil)` | Integer,\
    \ View | 设置要扫描文档的最大数量。 |\n| `no_cursor_timeout` | View | 默认情况下，服务器会在空闲10分钟后超时游标以防止内存过度使用。设置`no_cursor_timeout`不会使空闲游标超时。\
    \ |\n| `projection(document = nil)` | Hash, View | 在结果集中为每个文档包含或排除的字段。 |\n| `read(value\
    \ = nil)` | Symbol, View | 读取偏好。 |\n| `show_disk_loc(value = nil)` | (true, false,\
    \ View) | 设置是否应显示每个文档的磁盘位置。值可以是`true`、`false,`或`nil`（默认）。 |\n| `skip(number =\
    \ nil)` | Integer, View | 要跳过的文档数量。设置为整数值。 |\n| `snapshot(value = nil)` | Object\
    \ | 当设置为`true`时，防止文档返回超过一次。值可以是`true`、`false,`或`nil`。 |\n| `sort(spec = nil)`\
    \ | Hash, View | 指定结果集排序方式的键值对（作为Hash）。 |\n| `each {&#124;Each&#124; ... }` |\
    \ Enumerator | 用于遍历结果集中的文档。 |\n\n# 更新文档\n\n`Collection`类不直接提供用于更新文档的任何实例方法。但是，由`find()`方法返回的集合视图提供了几种方法，如前面[第4-10表](#part0010.xhtml#Tab10)中讨论的，用于更新或替换文档。在本节中，我们将更新文档。\n\
    \n1.  在`C:\\Ruby21-x64\\mongodbscripts`目录中创建一个Ruby脚本`updateDocument.rb`。\n2. \
    \ 在`updateDocument.rb`脚本中，如果`mongodb`集合已存在则删除它，然后创建`mongodb`集合。\n3.  向`mongodb`集合添加两个文档。\n\
    4.  为`mongodb`集合创建一个集合视图。\n\n    ```\n    collection = client[:mongodb]\n    ```\n\
    \n我们将讨论几个示例，在这些示例中，两个文档将被添加到`mongodb`集合中，随后被更新或替换。\n\n## 示例1：使用`update_one()`\n\
    \n1.  对于第一个示例，使用`update_one()`方法将其中一个文档的`catalogId`递增1。使用`$inc`更新操作符来递增`catalogId`。`find()`方法查找所有`journal`设置为`'Oracle\
    \ Magazine'`的文档。\n\n    ```\n    result = collection.find(:journal => 'Oracle\
    \ Magazine').update_one(\"$inc\" => { :catalogId => 1 })\n    ```\n\n2.  输出更新的文档数量。\n\
    \n    ```\n    print result.n\n    ```\n\n3.  运行`updateDocument.rb`脚本。\n\n   \
    \ ```\n    >ruby updateDocument.rb\n    ```\n\n    如[图4-23](#part0010.xhtml#Fig23)所示的输出所示，一个文档被更新。\n\
    \n    ![9781484215999_Fig04-23.jpg](Images/image00531.jpeg)\n    [图4-23](#part0010.xhtml#_Fig23).\
    \ 运行 updateDocument.rb 脚本\n\n4.  在Mongo shell中运行`db.mongodb.find()`命令以列出更新后的文档，如[图4-24](#part0010.xhtml#Fig24)所示。两个文档的`catalogId`都为2；一个文档起始`catalogId`为1，另一个的`catalogId`被递增了1。\n\
    \n    ![9781484215999_Fig04-24.jpg](Images/image00532.jpeg)\n    [图4-24](#part0010.xhtml#_Fig24).\
    \ 其中一个文档的 catalogId 被递增 1 至 2\n\n## 示例2：使用`update_many()`\n\n1.  对于第二个示例，使用`update_many`方法更新多个文档。使用`$set`更新操作符将publisher字段设置为`OraclePublishing`。`find()`方法设置了过滤器，用于查找所有`publisher`设置为`'Oracle\
    \ Publishing'`的文档。\n\n    ```\n    result = collection.find(:publisher => 'Oracle\
    \ Publishing').update_many('$set' => { publisher: 'OraclePublishing'})\n    ```\n\
    \n2.  使用`db.mongodb.drop()`删除`mongodb`集合。运行`updateDocument.rb`脚本。输出表明两个文档已被更新，如[图4-25](#part0010.xhtml#Fig25)所示。\n\
    \n    ![9781484215999_Fig04-25.jpg](Images/image00533.jpeg)\n    [图4-25](#part0010.xhtml#_Fig25).\
    \ 更新多个文档\n\n3.  运行`db.mongodb.find()`方法以列出两个更新后的文档，如[图4-26](#part0010.xhtml#Fig26)所示。\n\
    \n    ![9781484215999_Fig04-26.jpg](Images/image00534.jpeg)\n    [图4-26](#part0010.xhtml#_Fig26).\
    \ 列出两个更新后的文档\n\n## 示例3：使用`replace_one()`\n\n1.  在第三个示例中，查找`edition`设置为November\
    \ December 2013的文档，并使用`replace_one()`方法将其中一个文档替换为仅包含`edition`字段且设置为`'11-12-2013'`的文档。\n\
    \n    ```\n    result = collection.find(:edition => 'November December 2013').replace_one(:edition\
    \ => '11-12-2013')\n    ```\n\n2.  使用`db.mongodb.drop()`删除`mongodb`集合。运行仅包含示例3的`updateDocument.rb`脚本。如输出所示，一个文档已被更新（替换），如[图4-27](#part0010.xhtml#Fig27)所示。\n\
    \n    ![9781484215999_Fig04-27.jpg](Images/image00535.jpeg)\n    [图4-27](#part0010.xhtml#_Fig27).\
    \ 替换单个文档\n\n3.  在Mongo shell中运行`db.mongodb.find()`命令以列出替换后的文档，如[图4-28](#part0010.xhtml#Fig28)所示。\n\
    \n    ![9781484215999_Fig04-28.jpg](Images/image00536.jpeg)\n    [图4-28](#part0010.xhtml#_Fig28).\
    \ 列出替换后的文档\n\n## 示例4：使用`find_one_and_replace()`\n\n1.  在第四个示例中，`find()`方法的过滤器设置为查找所有`journal`设置为`'Oracle\
    \ Magazine'`的文档，并使用`find_one_and_replace()`方法查找并替换一个文档，替换为仅设置了`journal`字段的文档。`return_document`设置为`:after`以返回替换后的文档。\n\
    \n    ```\n    document = collection.find(:journal => 'Oracle Magazine').find_one_and_replace({:journal\
    \ => 'OracleMagazine'}, :return_document => :after)\n    ```\n\n    使用`db.mongodb.drop()`删除`mongodb`集合。当运行`updateDocument.rb`脚本时，一个文档被替换，并且替换后的文档被输出，如[图4-29](#part0010.xhtml#Fig29)所示。\n\
    \n    ![9781484215999_Fig04-29.jpg](Images/image00537.jpeg)\n    [图4-29](#part0010.xhtml#_Fig29).\
    \ 查找并替换文档"
  raw: '| | `delete_one` | Result | Deletes one document. | | `find_one_and_delete`
    | BSON::Document | Finds and deletes a document. | | `find_one_and_replace(replacement,
    opts = {})` | BSON::Document | Finds and replaces a document. | | `find_one_and_update(document,
    opts = {})` | BSON::Document | Finds and updates a document. | | `replace_one(document,
    opts = {})` | Result | Replaces a single document. | | `update_many(spec, opts
    = {})` | Result | Updates multiple documents. | | `update_one(spec, opts = {})`
    | Result | Updates a single document. | | `explain` | Hash | Gets the explain
    plan for the query. | | `aggregate(pipeline, options = {})` | Aggregation | Creates
    an aggregation of the collection view. | | `allow_partial_results` | View | Allows
    the query to get partial results if some shards are down. | | `batch_size(batch_size
    = nil)` | (Integer, View) | Sets the batch size. Setting to 1 or a –ve value is
    equivalent to setting a limit. | | `comment(comment = nil)` | (String, View) |
    Associates a comment with the query. | | `count(options = {})` | Integer | Gets
    a count of matching documents. | | `distinct(field_name, options = {})` | Array<Object>
    | Gets a list of distinct values. | | `hint(hint = nil)` | Hash, View | The index
    MongoDB has to use on a query. | | `limit(limit = nil)` | Integer, View | Limits
    the maximum number of documents to return from the query. | | `map_reduce(map,
    reduce, options = {}))` | MapReduce | Runs a map reduce function on the query.
    | | `max_scan(value = nil)` | Integer, View | Sets the maximum number of documents
    to scan. | | `no_cursor_timeout` | View | By default the server times out idle
    cursors after 10 minutes to prevent excessive memory use. Setting `no_cursor_timeout`
    does not time out idle cursors. | | `projection(document = nil)` | Hash, View
    | The fields to include or exclude from each document in the result set. | | `read(value
    = nil)` | Symbol, View | The read preference. | | `show_disk_loc(value = nil)`
    | (true, false, View) | Sets whether disk location should be shown for each document.
    Value may be `true`, `false,` or `nil` (the default). | | `skip(number = nil)`
    | Integer, View | Number of documents to skip. Set to an Integer value. | | `snapshot(value
    = nil)` | Object | When set to `true` prevents documents from returning more than
    once. Value may be `true`, `false,` or `nil`. | | `sort(spec = nil)` | Hash, View
    | The key and direction pairs specified as Hash by which the result set is sorted.
    | | `each {&#124;Each&#124; ... }` | Enumerator | Used to iterate through the
    documents in the result set. |    Updating Documents    The `Collection` class
    does not directly provide any instance methods for updating documents. But the
    collection view returned by the `find()` method provides several methods as discussed
    in [Table 4-10](#part0010.xhtml#Tab10) in the preceding section to update or replace
    document/s. In this section we shall update documents.    1.  Create a Ruby script
    `updateDocument.rb` in the `C:\Ruby21-x64\mongodbscripts` directory. 2.  Delete
    the `mongodb` collection if already present and create the `mongodb` collection
    in the `updateDocument.rb` script. 3.  Add two documents to the `mongodb` collection.
    4.  Create a collection view for the `mongodb` collection.                    ```     collection
    = client[:mongodb]     ```              We shall discuss several examples for
    which the two documents shall be added to the `mongodb` collection and subsequently
    updated or replaced.    **Example 1**    1.  For the first example, use the `update_one()`
    method to increment the `catalogId` of one of the documents by 1\. The `$inc`
    update operator is used to increment the `catalogId`. The `find()` method finds
    all documents with journal set to `''Oracle Magazine''`.                    ```     result
    = collection.find(:journal => ''Oracle Magazine'').update_one("$inc" => { :catalogId
    => 1 })     ```           2.  Output the number of documents updated.


    ```     print result.n     ```           3.  Run the `updateDocument.rb` script.                    ```     >ruby
    updateDocument.rb     ```                    As the output shown in [Figure 4-23](#part0010.xhtml#Fig23)
    shows, one document gets updated.                    ![9781484215999_Fig04-23.jpg](Images/image00531.jpeg)                    [Figure
    4-23](#part0010.xhtml#_Fig23). Running the updateDocument.rb script           4.  Run
    the `db.mongodb.find()` command in Mongo shell to list the updated document as
    shown in [Figure 4-24](#part0010.xhtml#Fig24). Both documents have `catalogId`
    as 2; one document had `catalogId` 1 to start with and the other `catalogId` has
    been incremented by 1.          ![9781484215999_Fig04-24.jpg](Images/image00532.jpeg)                    [Figure
    4-24](#part0010.xhtml#_Fig24). One of the Document’s catalogId Is incremented
    by 1 to 2              **Example 2**    1.  For the second example use the `update_many`
    method to update multiple documents. Use the `$set` update operator to set publisher
    field to `OraclePublishing`. The `find()` method has a filter set to find all
    documents with `publisher` set to `''Oracle Publishing''`.                    ```     result
    = collection.find(:publisher => ''Oracle Publishing'').update_many(''$set'' =>
    { publisher: ''OraclePublishing''})     ```           2.  Drop the `mongodb` collection
    with `db.mongodb.drop()`. Run the `updateDocument.rb` script. The output indicates
    that two documents have been updated as shown in [Figure 4-25](#part0010.xhtml#Fig25).          ![9781484215999_Fig04-25.jpg](Images/image00533.jpeg)                    [Figure
    4-25](#part0010.xhtml#_Fig25). Updating Multiple Documents           3.  Run the
    `db.mongodb.find()` method to list the two updated documents as shown in [Figure
    4-26](#part0010.xhtml#Fig26).          ![9781484215999_Fig04-26.jpg](Images/image00534.jpeg)                    [Figure
    4-26](#part0010.xhtml#_Fig26). Listing Two Updated Documents              **Example
    3**    1.  In the third example find the documents with edition set to November
    December 2013 and use the `replace_one()` method to replace one document with
    a document with only an `edition` field set to `''11-12-2013''`.                    ```     result
    = collection.find(:edition => ''November December 2013'').replace_one(:edition
    => ''11-12-2013'')     ```           2.  Drop the `mongodb` collection with `db.mongodb.drop()`.
    Run the `updateDocument.rb` script with just Example 3. As the output indicates
    one document has been updated (replaced) as shown in [Figure 4-27](#part0010.xhtml#Fig27).          ![9781484215999_Fig04-27.jpg](Images/image00535.jpeg)                    [Figure
    4-27](#part0010.xhtml#_Fig27). Replacing One Document           3.  Run the `db.mongodb.find()`
    command in Mongo shell to list the replacement document as shown in [Figure 4-28](#part0010.xhtml#Fig28).          ![9781484215999_Fig04-28.jpg](Images/image00536.jpeg)                    [Figure
    4-28](#part0010.xhtml#_Fig28). Listing the Replaced Document              **Example
    4**    1.  In the fourth example the `find()` method filter is set to find all
    documents with `journal` set to `''Oracle Magazine''` and the `find_one_and_replace()`
    method is used to find and replace one document with a document with just the
    `journal` field set. The `return_document` is set to `:after` to return the document
    after replacement.                    ```     document = collection.find(:journal
    => ''Oracle Magazine'').find_one_and_replace({:journal => ''OracleMagazine''},
    :return_document => :after)     ```                    Drop the `mongodb` collection
    with `db.mongodb.drop()`. When the `updateDocument.rb` script is run, one document
    gets replaced and the replaced document gets output as shown in [Figure 4-29](#part0010.xhtml#Fig29).                    ![9781484215999_Fig04-29.jpg](Images/image00537.jpeg)                    [Figure
    4-29](#part0010.xhtml#_Fig29). Finding and Replacing a Document           2.'
