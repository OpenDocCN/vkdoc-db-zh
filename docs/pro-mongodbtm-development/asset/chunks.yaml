    \ Apache Cassandra 2.1.7 来获取 `cassandra-cli`。\n\n```bash\ncassandra-cli\n```\n\
    \n# Authenticate the `datastax` keyspace\n\n运行以下命令以认证 `datastax` keyspace。\n\n\
    ```sql\nuse datastax;\n```\n\n`datastax` keyspace 将被认证，如 [Figure 6-14](#part0012.xhtml#Fig14)\
    \ 所示。\n\n![9781484215999_Fig06-14.jpg](Images/image00604.jpeg)\n\n[Figure 6-14](#part0012.xhtml#_Fig14).\
