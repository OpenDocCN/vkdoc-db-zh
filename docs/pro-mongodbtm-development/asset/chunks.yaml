    as shown in [Figure 10-1](#part0016.xhtml#Fig1).          ![9781484215999_Fig10-01.jpg](Images/image00661.jpeg)                    [Figure
    10-1](#part0016.xhtml#_Fig1). Creating a New Maven Project           3.  The New
    Maven Project wizard gets started. Select the Create a simple project check box
    and the Use default Workspace location check box as shown in [Figure 10-2](#part0016.xhtml#Fig2).
    Then click on Next.          ![9781484215999_Fig10-02.jpg](Images/image00662.jpeg)                    [Figure
    10-2](#part0016.xhtml#_Fig2). The New Maven Project Wizard           4.


    In Configure project specify the following settings and click on Finish as shown
    in [Figure 10-3](#part0016.xhtml#Fig3).     *   Group Id: `com.spring.mongodb`     *   Artifact
    Id:`SpringDataMongo`     *   Version: 1.0.0     *   Packaging: jar     *   Name:
    `SpringDataMongo`          ![9781484215999_Fig10-03.jpg](Images/image00663.jpeg)                    [Figure
    10-3](#part0016.xhtml#_Fig3). Configuring a New Maven Project              A Maven
    project (`SpringDataMongo`) gets created as shown in Package Explorer as shown
    in [Figure 10-4](#part0016.xhtml#Fig4).    ![9781484215999_Fig10-04.jpg](Images/image00664.jpeg)    [Figure
    10-4](#part0016.xhtml#_Fig4). The New Maven Project SpringDataMongo    The Java
    Build Path for the project should include the Maven dependencies including the
    Spring Data MongoDB project dependency. Installing Spring Data MongoDB and other
    dependencies is discussed in the next section. We need to add some classes to
