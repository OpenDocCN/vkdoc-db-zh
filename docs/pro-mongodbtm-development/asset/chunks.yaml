    \ document to be replaced or updated is not found. |\n| `findOneAndUpdate(Bson\
    \ filter, Bson update)` | Finds a document using the specified query filter and\
    \ replaces it with the update document. The update must include only update operators.\
    \ |\n| `findOneAndUpdate(Bson filter, Bson update, FindOneAndUpdateOptions options)`\
    \ | Finds a document using the specified query filter and replaces it with the\
    \ update document. The update must include only update operators. The `FindOneAndUpdateOptions`\
    \ options are also provided. The `FindOneAndUpdateOptions` options include the\
    \ maximum time to find and update, whether to return the original document or\
    \ the updated document, the sort criteria to apply, whether to upsert the document\
    \ if the query filter does not find a document, and which document fields to return.\
    \ |\n| `replaceOne(Bson filter, TDocument replacement)` | Replaces a document\
    \ using the specified query filter and the replacement document. |\n| `replaceOne(Bson\
    \ filter, TDocument replacement, UpdateOptions updateOptions)` | Replaces a document\
    \ using the specified query filter and the replacement document. The `UpdateOptions`\
    \ are also provided. The `UpdateOptions` options include whether to upsert the\
    \ document if the query filter does not find a document. |\n| `updateMany(Bson\
    \ filter, Bson update)` | Updates one or more documents using a query filter and\
    \ an update document. |\n| `updateMany(Bson filter, Bson update, UpdateOptions\
    \ updateOptions)` | Updates one or more documents using a query filter and an\
    \ update document. The `UpdateOptions` are also provided. The `UpdateOptions`\
    \ options include whether to upsert the document if the query filter does not\
    \ find a document. |\n| `updateOne(Bson filter, Bson update)` | Updates one document\
    \ using a query filter and an update document. |\n| `updateOne(Bson filter, Bson\
    \ update, UpdateOptions updateOptions)` | Updates one document using a query filter\
    \ and an update document. The `UpdateOptions` are also provided. The `UpdateOptions`\
    \ options include whether to upsert the document if the query filter does not\
    \ find a document. |\n\nSome of the methods listed support only `update` operators\
    \ in the update document. The `update` operators that may be applied on document\
    \ fields are discussed in [Table 1-9](#part0007.xhtml#Tab9).\n\n[Table 1-9](#part0007.xhtml#_Tab9).\
    \ Update Operators\n\n| Method | Description |\n| --- | --- |\n| `$inc` | Increments\
    \ the value of a field. The increment must be a positive or negative value. |\n\
    | `$mul` | Multiplies the value of a field. |\n| `$rename` | Renames a field.\
    \ |\n| `$setOnInsert` | Sets the value of a field if the update results in an\
    \ insert. |\n| `$set` | Sets the value of a field in a document. |\n| `$unset`\
    \ | Unsets the value of a field in a document. |\n| `$min` | Updates a field only\
    \ if the specified value is less than the present field value. |\n| `$max` | Updates\
    \ a field only if the specified value is more than the present field value. |\n\
    | `$currentDate` | Sets the value of the field to the current date as a Date or\
    \ Timestamp. |\n\n1.  In the `UpdateDBDocument` application create a `MongoClient`\
    \ instance as discussed earlier and create a `MongoDatabase` instance for the\
    \ `local` database. Subsequently, create a `MongoCollection<TDocument>` instance\
    \ for the `catalog` collection. Add two instances of `Catalog` objects to the\
    \ catalog collection using the `insertOne(TDocument document)` method.\n\n```\n\
    \    Document catalog = new Document(\"catalogId\", \"catalog1\")\n    .append(\"\
    journal\", \"Oracle Magazine\")\n    .append(\"publisher\", \"Oracle Publishing\"\
    )\n    .append(\"edition\", \"November December 2013\")\n    .append(\"title\"\
    , \"Engineering as a Service\")\n    .append(\"author\", \"David A. Kelly\");\n\
    \    coll.insertOne(catalog);\n\ncatalog = new Document(\"catalogId\", \"catalog2\"\
    )\n    .append(\"journal\", \"Oracle Magazine\")\n    .append(\"publisher\", \"\
    Oracle Publishing\")\n    .append(\"edition\", \"November December 2013\")\n \
    \   .append(\"title\", \"Quintessential and Collaborative\")\n    .append(\"author\"\
    , \"Tom Haunert\");\n    coll.insertOne(catalog);\n    ```\n\n2.  As an example\
    \ of using the `updateOne(Bson filter, Bson update)` method, update the `edition`\
    \ and `author` fields of the `Document` instance with `catalogId catalog1` using\
    \ the `update` operator `$set`.\n\n```\n    coll.updateOne(new Document(\"catalogId\"\
    , \"catalog1\"),new Document(\"$set\", new Document(\"edition\", \"11-12 2013\"\
    ).append(\"author\", \"Kelly, David A.\")));\n    ```\n\n3.  As an example of\
    \ using the `updateMany(Bson filter, Bson update)` method, update the `journal`\
    \ field of all `Document` instances using `update` operator `$set`.\n\n```\n \
    \   coll.updateMany(new Document(\"journal\", \"Oracle Magazine\"),new Document(\"\
    $set\", new Document(\"journal\", \"OracleMagazine\")));\n    ```\n\n4.  As an\
    \ example of using the `replaceOne(Bson filter, TDocument replacement, UpdateOptions\
    \ updateOptions)` method, replace the `Document` instance with `catalogId catalog3,  which\
    \ does not exist,` with a new `Document` instance. Provide an `UpdateOptions`\
    \ argument to upsert the `Document` if the query filter does not return a `Document`\
    \ instance.\n\n```\n    UpdateResult result = coll.replaceOne(new Document(\"\
    catalogId\", \"catalog3\"),new Document(\"catalogId\", \"catalog3\").append(\"\
    journal\", \"Oracle Magazine\").append(\"publisher\", \"Oracle Publishing\").append(\"\
    edition\", \"November December 2013\").append(\"title\", \"Engineering as a Service\"\
    ).append(\"author\", \"David A. Kelly\"),new UpdateOptions().upsert(true));\n\
    \    ```\n\n5.  The r`eplaceOne()` method returns an `UpdateResult` object. Output\
    \ the following:\n\n*   The number of documents matched using the `getMatchedCount()`\
    \ method of `UpdateResult`.\n    *   The number of documents modified using the\
    \ `getModifiedCount()` method. Not all matched documents may be modified.\n  \
    \  *   The `_id` field value for the upserted document using the `getUpsertedId()`\
    \ method. The `_id` field value has to be obtained using the `asObjectId()` method\
    \ invocation followed by the `getValue()` method invocation.\n\n```\n    System.out.println(\"\
    Number of documents matched: \"+ result.getMatchedCount());\n    System.out.println(\"\
    Number of documents modified: \"+ result.getModifiedCount());\n    System.out.println(\"\
    Upserted Document Id: \"+ result.getUpsertedId().asObjectId().getValue());\n \
    \   ```"
  trans: "\n![9781484215999_Fig01-15.jpg](img/image00420.jpeg)\n\n图 1-15. 运行 `MongoClient.java`\
    \ 应用程序\n\n应用程序的输出显示在 Eclipse 控制台中，如图 1-16 所示。添加的两个文档被获取，关联的键/值对被输出。\n\n![9781484215999_Fig01-16.jpg](img/image00421.jpeg)\n\
    \n图 1-16. 查找文档并输出键/值对\n\n## 更新 MongoDB 中的数据\n\n在本节中，我们将更新 MongoDB 数据。我们将使用 `UpdateDBDocument`\
    \ 应用程序。`MongoCollection<TDocument>` 类提供了多种方法（其中一些是重载的）来查找和更新数据，如表 1-8 所述。\n\n\
    表 1-8. 用于更新或替换文档的 `MongoCollection<TDocument>` 方法\n\n| 方法 | 描述 |\n| --- | ---\
    \ |\n| `findOneAndReplace(Bson filter, TDocument replacement)` | 使用指定的查询过滤器查找文档，并用替换文档替换它。\
    \ |\n| `findOneAndReplace(Bson filter, TDocument replacement, FindOneAndReplaceOptions\
    \ options)` | 使用指定的查询过滤器和 `FindOneAndReplaceOptions` 选项查找文档，并用替换文档替换它。`FindOneAndReplaceOptions`\
    \ 选项包括查找和替换的最大时间、是返回原始文档还是替换文档、要应用的排序标准、如果查询过滤器未找到文档是否要插入或更新文档（upsert），以及要返回哪些文档字段。\"\
    插入或更新\"是指如果要替换或更新的文档未找到，则插入一个文档的术语。 |\n| `findOneAndUpdate(Bson filter, Bson update)`\
    \ | 使用指定的查询过滤器查找文档，并用更新文档替换它。更新必须仅包含更新操作符。 |\n| `findOneAndUpdate(Bson filter,\
    \ Bson update, FindOneAndUpdateOptions options)` | 使用指定的查询过滤器查找文档，并用更新文档替换它。更新必须仅包含更新操作符。同时也提供了\
    \ `FindOneAndUpdateOptions` 选项。`FindOneAndUpdateOptions` 选项包括查找和更新的最大时间、是返回原始文档还是更新后的文档、要应用的排序标准、如果查询过滤器未找到文档是否要插入或更新文档，以及要返回哪些文档字段。\
    \ |\n| `replaceOne(Bson filter, TDocument replacement)` | 使用指定的查询过滤器和替换文档替换一个文档。\
    \ |\n| `replaceOne(Bson filter, TDocument replacement, UpdateOptions updateOptions)`\
    \ | 使用指定的查询过滤器和替换文档替换一个文档。同时提供了 `UpdateOptions`。`UpdateOptions` 选项包括如果查询过滤器未找到文档是否要插入或更新文档。\
    \ |\n| `updateMany(Bson filter, Bson update)` | 使用查询过滤器和更新文档更新一个或多个文档。 |\n| `updateMany(Bson\
    \ filter, Bson update, UpdateOptions updateOptions)` | 使用查询过滤器和更新文档更新一个或多个文档。同时提供了\
    \ `UpdateOptions`。`UpdateOptions` 选项包括如果查询过滤器未找到文档是否要插入或更新文档。 |\n| `updateOne(Bson\
    \ filter, Bson update)` | 使用查询过滤器和更新文档更新一个文档。 |\n| `updateOne(Bson filter, Bson\
    \ update, UpdateOptions updateOptions)` | 使用查询过滤器和更新文档更新一个文档。同时提供了 `UpdateOptions`。`UpdateOptions`\
    \ 选项包括如果查询过滤器未找到文档是否要插入或更新文档。 |\n\n上表列出的一些方法仅支持在更新文档中使用 `update` 操作符。可以应用于文档字段的\
    \ `update` 操作符在表 1-9 中讨论。\n\n表 1-9. 更新操作符\n\n| 操作符 | 描述 |\n| --- | --- |\n| `$inc`\
    \ | 递增字段的值。增量必须是正值或负值。 |\n| `$mul` | 乘以字段的值。 |\n| `$rename` | 重命名字段。 |\n| `$setOnInsert`\
    \ | 如果更新导致插入，则设置字段的值。 |\n| `$set` | 设置文档中字段的值。 |\n| `$unset` | 取消设置文档中字段的值。 |\n\
    | `$min` | 仅当指定值小于当前字段值时才更新字段。 |\n| `$max` | 仅当指定值大于当前字段值时才更新字段。 |\n| `$currentDate`\
    \ | 将字段的值设置为当前日期（Date 或 Timestamp 类型）。 |\n\n### 分步操作\n\n1.  在 `UpdateDBDocument`\
    \ 应用程序中，如前所述创建一个 `MongoClient` 实例，并为 `local` 数据库创建一个 `MongoDatabase` 实例。随后，为 `catalog`\
    \ 集合创建一个 `MongoCollection<TDocument>` 实例。使用 `insertOne(TDocument document)` 方法向\
    \ `catalog` 集合添加两个 `Catalog` 对象实例。\n\n    ```\n    Document catalog = new Document(\"\
    catalogId\", \"catalog1\")\n        .append(\"journal\", \"Oracle Magazine\")\n\
    \        .append(\"publisher\", \"Oracle Publishing\")\n        .append(\"edition\"\
    , \"November December 2013\")\n        .append(\"title\", \"Engineering as a Service\"\
    )\n        .append(\"author\", \"David A. Kelly\");\n    coll.insertOne(catalog);\n\
    \n    catalog = new Document(\"catalogId\", \"catalog2\")\n        .append(\"\
    journal\", \"Oracle Magazine\")\n        .append(\"publisher\", \"Oracle Publishing\"\
    )\n        .append(\"edition\", \"November December 2013\")\n        .append(\"\
    title\", \"Quintessential and Collaborative\")\n        .append(\"author\", \"\
    Tom Haunert\");\n    coll.insertOne(catalog);\n    ```\n\n2.  以使用 `updateOne(Bson\
    \ filter, Bson update)` 方法为例，使用更新操作符 `$set` 更新 `catalogId` 为 `catalog1` 的 `Document`\
    \ 实例的 `edition` 和 `author` 字段。\n\n    ```\n    coll.updateOne(new Document(\"\
    catalogId\", \"catalog1\"), new Document(\"$set\", new Document(\"edition\", \"\
    11-12 2013\").append(\"author\", \"Kelly, David A.\")));\n    ```\n\n3.  以使用 `updateMany(Bson\
    \ filter, Bson update)` 方法为例，使用更新操作符 `$set` 更新所有 `Document` 实例的 `journal` 字段。\n\
    \n    ```\n    coll.updateMany(new Document(\"journal\", \"Oracle Magazine\"),\
    \ new Document(\"$set\", new Document(\"journal\", \"OracleMagazine\")));\n  \
    \  ```\n\n4.  以使用 `replaceOne(Bson filter, TDocument replacement, UpdateOptions\
    \ updateOptions)` 方法为例，替换 `catalogId` 为 `catalog3`（该文档不存在）的 `Document` 实例为一个新的\
    \ `Document` 实例。提供一个 `UpdateOptions` 参数，以便在查询过滤器未返回 `Document` 实例时插入或更新（upsert）该文档。\n\
    \n    ```\n    UpdateResult result = coll.replaceOne(new Document(\"catalogId\"\
    , \"catalog3\"),\n        new Document(\"catalogId\", \"catalog3\")\n        \
    \    .append(\"journal\", \"Oracle Magazine\")\n            .append(\"publisher\"\
    , \"Oracle Publishing\")\n            .append(\"edition\", \"November December\
    \ 2013\")\n            .append(\"title\", \"Engineering as a Service\")\n    \
    \        .append(\"author\", \"David A. Kelly\"),\n        new UpdateOptions().upsert(true));\n\
    \    ```\n\n5.  `replaceOne()` 方法返回一个 `UpdateResult` 对象。输出以下内容：\n    *   使用 `UpdateResult`\
    \ 的 `getMatchedCount()` 方法获取匹配的文档数量。\n    *   使用 `getModifiedCount()` 方法获取修改的文档数量。并非所有匹配的文档都一定被修改。\n\
    \    *   使用 `getUpsertedId()` 方法获取插入或更新的文档的 `_id` 字段值。`_id` 字段值需要通过调用 `asObjectId()`\
    \ 方法后再调用 `getValue()` 方法来获取。\n\n    ```\n    System.out.println(\"Number of documents\
    \ matched: \" + result.getMatchedCount());\n    System.out.println(\"Number of\
    \ documents modified: \" + result.getModifiedCount());\n    System.out.println(\"\
    Upserted Document Id: \" + result.getUpsertedId().asObjectId().getValue());\n\
    \    ```\n"
- fmt: "# Verifying Document Updates\n\n6. To verify that the documents got updated\
    \ or replaced, output all the documents in the catalog collection. Create a `FindIterable<TDocument>`\
    \ for the documents in the `catalog` collection using the `find()` method. Subsequently,\
    \ use an enhanced `for` loop to obtain the `Document` instances and output the\
    \ key/value pairs in each `Document` instance as discussed earlier.\n\nThe `UpdateDBDocument`\
    \ application is listed below.\n\n```java\npackage mongodb;\n\nimport java.util.Arrays;\n\
    import java.util.Iterator;\nimport java.util.Set;\nimport org.bson.Document;\n\
    import com.mongodb.MongoClient;\nimport com.mongodb.ServerAddress;\nimport com.mongodb.client.FindIterable;\n\
    import com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    import com.mongodb.client.model.UpdateOptions;\nimport com.mongodb.client.result.UpdateResult;\n\
    \npublic class UpdateDBDocument {\n\n    public static void main(String[] args)\
    \ {\n        MongoClient mongoClient = new MongoClient(\n                Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n        MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n        MongoCollection<Document> coll = db.getCollection(\"catalog\"\
    );\n        Document catalog = new Document(\"catalogId\", \"catalog1\")\n   \
    \             .append(\"journal\", \"Oracle Magazine\")\n                .append(\"\
    publisher\", \"Oracle Publishing\")\n                .append(\"edition\", \"November\
    \ December 2013\")\n                .append(\"title\", \"Engineering as a Service\"\
    )\n                .append(\"author\", \"David A. Kelly\");\n        coll.insertOne(catalog);\n\
    \        catalog = new Document(\"catalogId\", \"catalog2\")\n               \
    \ .append(\"journal\", \"Oracle Magazine\")\n                .append(\"publisher\"\
    , \"Oracle Publishing\")\n                .append(\"edition\", \"November December\
    \ 2013\")\n                .append(\"title\", \"Quintessential and Collaborative\"\
    )\n                .append(\"author\", \"Tom Haunert\");\n        coll.insertOne(catalog);\n\
    \        coll.updateOne(\n                new Document(\"catalogId\", \"catalog1\"\
    ),\n                new Document(\"$set\", new Document(\"edition\", \"11-12 2013\"\
    )\n                        .append(\"author\", \"Kelly, David A.\")));\n     \
    \   coll.updateMany(new Document(\"journal\", \"Oracle Magazine\"),\n        \
    \        new Document(\"$set\", new Document(\"journal\", \"OracleMagazine\")));\n\
    \        UpdateResult result = coll.replaceOne(\n                new Document(\"\
    catalogId\", \"catalog3\"),\n                new Document(\"catalogId\", \"catalog3\"\
    )\n                        .append(\"journal\", \"Oracle Magazine\")\n       \
    \                 .append(\"publisher\", \"Oracle Publishing\")\n            \
    \            .append(\"edition\", \"November December 2013\")\n              \
    \          .append(\"title\", \"Engineering as a Service\")\n                \
    \        .append(\"author\", \"David A. Kelly\"),\n                new UpdateOptions().upsert(true));\n\
    \        System.out.println(\"Number of documents matched: \"\n              \
    \  + result.getMatchedCount());\n        System.out.println(\"Number of documents\
    \ modified: \"\n                + result.getModifiedCount());\n        System.out.println(\"\
    Upserted Document Id: \"\n                + result.getUpsertedId().asObjectId().getValue());\n\
    \        FindIterable<Document> iterable = coll.find();\n        String documentKey\
    \ = null;\n        for (Document document : iterable) {\n            Set<String>\
    \ keySet = document.keySet();\n            Iterator<String> iter = keySet.iterator();\n\
    \            while (iter.hasNext()) {\n                documentKey = iter.next();\n\
    \                System.out.println(documentKey);\n                System.out.println(document.get(documentKey));\n\
    \            }\n        }\n        mongoClient.close();\n    }\n}\n```\n\n7. Again,\
    \ before running the application drop the catalog collection with `db.catalog.drop()`\
    \ command in mongo shell. To run the `UpdateDBDocument.java` application right-click\
    \ on `UpdateDBDocument.java` in Package Explorer and select Run As ![image](Images/image00406.jpeg)\
    \ Java Application as shown in [Figure 1-17](#part0007.xhtml#Fig17).\n\n![9781484215999_Fig01-17.jpg](Images/image00422.jpeg)\n\
    \n[Figure 1-17](#part0007.xhtml#_Fig17). Running the UpdateDBDocument.java Application\n\
    \nThe output from the `UpdateDBDocument.java` application is as follows.\n\n```\n\
    Number of documents matched: 0\nNumber of documents modified: 0\nUpserted Document\
    \ Id: 55d4e56c0bc271d4a7002749\n_id\n55d4e56cd292641a003cb55a\ncatalogId\ncatalog1\n\
    journal\nOracleMagazine\npublisher\nOracle Publishing\nedition\n11-12 2013\ntitle\n\
    Engineering as a Service\nauthor\nKelly, David A.\n_id\n55d4e56cd292641a003cb55b\n\
    catalogId\ncatalog2\njournal\nOracleMagazine\npublisher\nOracle Publishing\nedition\n\
    November December 2013\ntitle\nQuintessential and Collaborative\nauthor\nTom Haunert\n\
    _id\n55d4e56c0bc271d4a7002749\ncatalogId\ncatalog3\njournal\nOracle Magazine\n\
    publisher\nOracle Publishing\nedition\nNovember December 2013\ntitle\nEngineering\
    \ as a Service\nauthor\nDavid A. Kelly\n```\n\nThe `updateOne()` method example\
    \ updates the `edition` and `author` fields of the document with `catalogId` as\
    \ `catalog1` using the update operator `$set`. The `updateMany()` method example\
    \ sets the `journal` field of all documents to `OracleMagazine` using the update\
    \ operator `$set`. As indicated in the output, the number of documents matched\
    \ and modified are both 0 for the `replaceOne()` method example. Because `UpdateOptions`\
    \ are set to upsert a document, a new document gets added when a `Document` instance\
    \ for `catalogId` `catalog3` is not found.\n\n# Deleting Data in MongoDB\n\nIn\
    \ this section we shall delete documents using the `DeleteDBDocument` application.\
    \ The `MongoCollection<TDocument>` interface provides several methods for deleting\
    \ documents as discussed in [Table 1-10](#part0007.xhtml#Tab10).\n\n[Table 1-10](#part0007.xhtml#_Tab10).\
    \ MongoCollection<TDocument> Methods to Delete Documents\n\n| Method | Description\
    \ |\n| --- | --- |\n| `deleteMany(Bson filter)` | Deletes all documents from a\
    \ collection using a query filter and returns result as `DeleteResult`. The `DeleteResult`\
    \ contains information about number of documents deleted, and whether the delete\
    \ was acknowledged. |\n| `deleteOne(Bson filter)` | Deletes one document based\
    \ on a query filter and returns result as `DeleteResult`. |\n| `findOneAndDelete(Bson\
    \ filter)` | Finds a document based on a query filter and deletes the document.\
    \ Returns the deleted document. |\n| `findOneAndDelete(Bson filter, FindOneAndDeleteOptions\
    \ options)` | Finds a document based on a query filter and the `FindOneAndDeleteOptions`\
    \ options and deletes the document. Returns the deleted document. `FindOneAndDeleteOptions`\
    \ options include the maximum time to find and delete, the sort criteria, and\
    \ which document fields to return. |\n\n1. In the `DeleteDBDocument` application\
    \ create a `MongoClient` client as discussed previously. Create a `MongoDatabase`\
    \ instance for the `local` database from the `MongoClient` instance and create\
    \ a `MongoCollection<TDocument>` instance for the `catalog` collection from the\
    \ `MongoDatabase` instance.\n\n```java\nMongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\nMongoDatabase db = mongoClient.getDatabase(\"\
    local\");\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n```\n\
    \n2. Create and add four `Document` instances using the model class `Catalog`\
    \ to set the `Document` fields."
