  trans: "\n# 更新多个文档\n\n在本章节中，我们将使用 `updateMany(filter, update, options, callback)`\
    \ 方法来更新多个文档。相关参数在表 5-24 中讨论。\n\n## 表 5-24. `updateMany()` 方法的参数\n\n| 参数 | 类型 |\
    \ 描述 |\n| --- | --- | --- |\n| `filter` | object | 指定用于选择要更新的文档的选择过滤器。 |\n| `update`\
    \ | object | 要在文档上执行的更新操作。 |\n| `options` | object | 方法选项。选项包括 `upsert`、`w`、`wtimeout`\
    \ 和 `j`。 |\n| `callback` | `writeOpCallback(error, result)` | 回调函数，其第一个参数是一个 `MongoError`\
    \ 对象，第二个参数是方法结果。如果使用写关注点，则必须指定回调函数。 |\n\n1.  在 `C:\\Program Files\\nodejs\\scripts`\
    \ 目录中创建一个脚本 `updateDocuments.js` 以更新多个文档。\n2.  如前所述，使用 `insertMany()` 方法向 `catalog`\
    \ 数据库中的 `catalog` 集合添加一个文档数组。添加 `catalogId`、`title` 和 `author` 字段（这些是所有文档独有的字段），但不要添加通用字段\
    \ `edition`、`journal` 和 `publisher`。\n\n    ```javascript\n    doc1 = {\"catalogId\"\
    \ : 'catalog1',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \    doc2 = {\"catalogId\" : 'catalog2', \"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'};\n    collection.insertMany([doc1,doc2], function(error,\
    \ result){\n        if (error)\n            console.log(error);\n        else{\n\
    \            console.log(\"Documents added: \"+result);\n        }\n    });\n\
    \    ```\n\n3.  调用 `updateMany()` 方法，使用选择过滤器 `{}` 来选择所有文档。使用 `$set` 更新操作符指定更新，以添加通用字段\
    \ `journal`、`publisher` 和 `edition`。在回调函数中，将方法结果记录到控制台。\n\n    ```javascript\n\
    \    collection.updateMany({}, {$set:{edition:'November December 2013', journal:'Oracle\
    \ Magazine', publisher:'Oracle Publishing'}},\n        {upsert:true},\n      \
    \  function(error, result) {\n            if (error) console.log(error);\n   \
    \         else\n                console.log(result);\n        });\n    ```\n\n\
    \    `updateDocuments.js` 脚本如下：\n\n    ```javascript\n    Server = require('mongodb').Server;\n\
    \    Db = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    var db = new Db('local', new Server('localhost', 27017));\n    db.open(function(error,\
    \ db) {\n        if (error)\n            console.log(error);\n        else{\n\
    \            db.createCollection('catalog', function(error, collection){\n   \
    \             if (error)\n                    console.log(error);\n          \
    \      else{\n                    doc1 = {\"catalogId\" : 'catalog1',\"title\"\
    \ : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n             \
    \       doc2 = {\"catalogId\" : 'catalog2', \"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'};\n                    collection.insertMany([doc1,doc2],\
    \ function(error, result){\n                        if (error)\n             \
    \               console.log(error);\n                        else{\n         \
    \                   console.log(\"Documents added: \"+result);\n             \
    \           }\n                    });\n                    collection.updateMany({},\
    \ {$set:{edition:'November December 2013', journal:'Oracle Magazine', publisher:'Oracle\
    \ Publishing'}},\n                        {upsert:true},\n                   \
    \     function(error, result) {\n                            if (error) console.log(error);\n\
    \                            else\n                                console.log(result);\n\
    \                        });\n                }\n            });\n        }\n\
    \    });\n    ```\n\n4.  运行脚本前，在 Mongo shell 中使用以下命令删除 `catalog` 集合。\n\n    ```javascript\n\
    \    >use local\n    >db.catalog.drop()\n    ```\n\n5.  使用命令 `node updateDocuments.js`\
    \ 运行 `updateDocuments.js` 脚本。两个文档被匹配，如结果中的 `nModified` 字段所示，这两个文档被修改，如图 5-34 所示。\n\
    \n    ![9781484215999_Fig05-34.jpg](img/image00583.jpeg)\n\n    图 5-34. `updateDocuments.js`\
    \ 的输出\n\n6.  在 Mongo shell 中运行 `db.catalog.find()` 方法以列出更新后的文档。两个文档都添加/更新了 `edition`、`publisher`\
    \ 和 `journal` 字段，如图 5-35 所示。\n\n    ![9781484215999_Fig05-35.jpg](img/image00584.jpeg)\n\
    \n    图 5-35. 列出更新的文档\n\n# 删除单个文档\n\n`findOneAndDelete(filter, options, callback)`\
    \ 方法可用于从集合中删除一个或多个文档。方法参数在表 5-25 中讨论。\n\n## 表 5-25. `findOneAndDelete()` 方法的参数\n\
    \n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object | 指定文档选择过滤器。如果未指定过滤器，则删除所有文档。\
    \ |\n| `options` | object | 方法选项。 |\n| `callback` | `findAndModifyCallback(error,\
    \ result)` | 回调函数，如果使用写关注点，则必须指定。 |\n\n支持的选项在表 5-26 中讨论。\n\n## 表 5-26. `findOneAndDelete()`\
    \ 方法的选项\n\n| 选项 | 类型 | 描述 |\n| --- | --- | --- |\n| `projection` | object | 结果的字段投射。\
    \ |\n| `sort` | object | 如果查询选择多个文档，则根据排序顺序确定替换哪个文档。 |\n| `maxTimeMS` | number\
    \ | 查询可以运行的最长时间（以毫秒为单位）。 |\n\n1.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个脚本\
    \ `removeDocument.js`。\n2.  使用 `insertMany()` 方法向集合添加一个文档数组。\n3.  调用 `findOneAndRemove()`\
    \ 方法，使用选择查询来选择所有 `journal` 为 `Oracle Magazine` 的文档，并将回调函数结果输出到控制台。\n\n    ```javascript\n\
    \    collection.findOneAndRemove({journal:'Oracle Magazine'},\n        function(error,\
    \ result) {\n            if (error) console.log(error);\n            else\n  \
    \              console.log(result);\n        });\n    ```\n\n    `removeDocument.js`\
    \ 脚本如下：\n\n    ```javascript\n    Server = require('mongodb').Server;\n    Db\
    \ = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    var db = new Db('local', new Server('localhost', 27017));\n    db.open(function(error,\
    \ db) {\n        if (error)\n            console.log(error);\n        else{\n\
    \            db.createCollection('catalog', function(error, collection){\n   \
    \             if (error)\n                    console.log(error);\n          \
    \      else{\n                    doc1 = {\"catalogId\" : 'catalog1', \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A.\
    \ Kelly'};\n                    doc2 = {\"catalogId\" : 'catalog2', \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013',\"title\" : 'Quintessential and Collaborative',\"author\" : 'Tom\
    \ Haunert'};\n                    collection.insertMany([doc1,doc2], function(error,\
    \ result){\n                        if (error)\n                            console.log(error);\n\
    \                        else{\n                            console.log(\"Documents\
    \ added: \"+result);\n                        }\n                    });\n   \
    \                 collection.findOneAndDelete({journal:'Oracle Magazine'},\n \
    \                       function(error, result) {\n                          \
    \  if (error) console.log(error);\n                            else\n        \
    \                        console.log(result);\n                        });\n \
    \               }\n            });\n        }\n    });\n    ```\n\n4.  使用 `db.catalog.drop()`\
    \ 删除 `local` 数据库中的 `catalog` 集合。\n\n当使用 `node removeDocument.js` 命令运行 `removeDocument.js`\
    \ 脚本时，将添加两个文档并删除一个。被删除的文档会输出，如图 5-36 所示。\n\n![9781484215999_Fig05-36.jpg](img/image00585.jpeg)\n\
    \n图 5-36.\n"
- fmt: "xhtml#_Fig36). Output of `removeDocuments.js`\n\n5. Run the `db.catalog.find()`\
    \ method in Mongo shell to list the documents. As one of the two added documents\
    \ has been removed, no documents get listed as shown in [Figure 5-37](#part0011.xhtml#Fig37).\n\
    \n![9781484215999_Fig05-37.jpg](Images/image00586.jpeg)\n\n[Figure 5-37](#part0011.xhtml#_Fig37).\
    \ Listing Documents after Removing One\n\nThe `deleteOne(filter, options, callback)`\
    \ method is similar to the `findOneAndDelete(filter, options, callback)` method\
    \ except that the `deleteOne()` method supports only the `w`, `wtimeout` and `j`\
    \ options.\n\n## Removing Multiple Documents\n\nThe `deleteMany(filter, options,\
    \ callback)` method may be used to remove one or more documents from a collection.\
    \ The method parameters are discussed in [Table 5-27](#part0011.xhtml#Tab27).\n\
    \n[Table 5-27](#part0011.xhtml#_Tab27). Options for the `deleteMany()` Method\n\
    \n| Parameter | Type | Description |\n| --- | --- | --- |\n| `filter` | object\
    \ | Specifies a document selection filter. |\n| `options` | object | Method options.\
    \ Supported options are `w`, `wtimeout,` and `j`. |\n| `callback` | `writeOpCallback(error,\
    \ result)` | The callback function. |\n\n1. Create a script `removeDocuments.js`\
    \ in the `C:\\Program Files\\nodejs\\scripts` directory.\n2. Add an array of documents\
    \ to a collection using the `insertMany()` method.\n3. Invoke the `deleteMany()`\
    \ method using a selector query to select all documents with `journal` as '`Oracle\
    \ Magazine`' and output the callback function result to the console.\n\n```\n\
    collection.deleteMany({journal:'Oracle Magazine'},function(error, result) {\n\
    \    if (error) console.log(error);\n    else\n        console.log(result);\n\
    });\n```\n\nThe `removeDocuments.js` script is listed:\n\n```\nServer = require('mongodb').Server;\n\
    Db = require('mongodb').Db;\nCollection = require('mongodb').Collection;\nvar\
    \ db = new Db('local', new Server('localhost', 27017));\ndb.open(function(error,\
    \ db) {\n    if (error)\n        console.log(error);\n    else {\n        db.createCollection('catalog',\
    \ function(error, collection) {\n            if (error)\n                console.log(error);\n\
    \            else {\n                doc1 = {\"catalogId\": 'catalog1', \"journal\"\
    : 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November\
    \ December 2013', \"title\": 'Engineering as a Service', \"author\": 'David A.\
    \ Kelly'};\n                doc2 = {\"catalogId\": 'catalog2', \"journal\": 'Oracle\
    \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
    \ 2013', \"title\": 'Quintessential and Collaborative', \"author\": 'Tom Haunert'};\n\
    \                collection.insertMany([doc1, doc2], function(error, result) {\n\
    \                    if (error)\n                        console.log(error);\n\
    \                    else {\n                        console.log(\"Documents added:\
    \ \" + result);\n                    }\n                });\n                collection.deleteMany({journal:\
    \ 'Oracle Magazine'}, function(error, result) {\n                    if (error)\
    \ console.log(error);\n                    else\n                        console.log(result);\n\
    \                });\n            }\n        });\n    }\n});\n```\n\n4. Drop the\
    \ `catalog` collection from the `local` database.\n\n```\n>use local\n>db.catalog.drop()\n\
    ```\n\nWhen the `removeDocuments.js` script is run with the command `node removeDocuments.js`\
    \ two documents get added and both get removed. The `n` in the result is 2 indicating\
    \ that two documents have been removed as shown in [Figure 5-38](#part0011.xhtml#Fig38).\n\
    \n![9781484215999_Fig05-38.jpg](Images/image00587.jpeg)\n\n[Figure 5-38](#part0011.xhtml#_Fig38).\
    \ Output of `removeDocuments.js`\n\n5. Run the `db.catalog.find()` method in Mongo\
    \ shell to list the documents. As one of the two added documents has been removed,\
    \ no documents get listed as shown in [Figure 5-39](#part0011.xhtml#Fig39).\n\n\
    ![9781484215999_Fig05-39.jpg](Images/image00588.jpeg)\n\n[Figure 5-39](#part0011.xhtml#_Fig39).\
    \ Listing Documents after Removing All\n\n## Performing Bulk Write Operations\n\
    \nThe `Collection` class provides the `bulkWrite(operations, options, callback)`\
    \ method to perform bulk write operations. The method parameters are discussed\
    \ in [Table 5-28](#part0011.xhtml#Tab28).\n\n[Table 5-28](#part0011.xhtml#_Tab28).\
    \ Method Parameters for the `bulkWrite()` Method\n\n| Parameter | Type | Description\
    \ |\n| --- | --- | --- |\n| `operations` | Array.<object> | Bulk operations to\
    \ perform. Supported operations are `insertOne`, `updateOne`, `updateMany`, `deleteOne`,\
    \ `deleteMany`, and `replaceOne`. |\n| `options` | object | Method options. Supported\
    \ options are `w`, `wtimeout`, `j`, `serializeFunctions`, and `ordered`. The `serializeFunctions`\
    \ is `false` by default. The `ordered` is `true` by default, indicating that the\
    \ write operations are to be performed in order specified. |\n| `callback` | `bulkWriteOpCallback`\
    \ | The callback function. |\n\n1. Create a `bulkWriteDocuments.js` script in\
    \ the `C:\\Program Files\\nodejs\\scripts` directory.\n2. Drop the `catalog` collection\
    \ in the local database.\n\n```\n>use local\n>db.catalog.drop()\n```\n\n3. Create\
    \ the `catalog` collection in the script and use the `bulkWrite(operations, options,\
    \ callback)` method to perform bulk write operations to add some documents, update\
    \ a single document, update multiple documents, replace a document, and delete\
    \ a document. Set `ordered` option to `true`, which is also the default so that\
    \ the bulk write operations are performed in the order specified. The order could\
    \ be significant if a bulk write operation depends on a preceding bulk write operation.\
    \ For example, documents in a collection cannot be updated before being added.\n\
    \n```\ncollection.bulkWrite([\n    { insertOne: { document: {\"catalogId\": 'catalog1',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Engineering as a Service', \"author\"\
    : 'David A. Kelly'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog2',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Quintessential and Collaborative', \"\
    author\": 'Tom Haunert'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog3',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013'} } },\n    { insertOne: { document: {\"catalogId\"\
    : 'catalog4', \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing',\
    \ \"edition\": 'November December 2013'} } },\n    { updateOne: { filter: {journal:\
    \ 'Oracle Magazine'}, update: {$set: {journal: 'OracleMagazine'}}, upsert: true\
    \ } },\n    { updateMany: { filter: {edition: 'November December 2013'}, update:\
    \ {$set: {edition: '11-12-2013'}}, upsert: true } },\n    { deleteOne: { filter:\
    \ {journal: 'Oracle Magazine'} } },\n    { replaceOne: { filter: {catalogId: 'catalog5'},\
    \ replacement: {\"catalogId\": 'catalog5', \"journal\": 'Oracle Magazine', \"\
    publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'}, upsert:\
    \ true }}\n], {ordered: true, w: 1}, function(error, result) {\n    if (error)\n\
    \        console.log(error);\n    else {\n        console.log(\"Documents added:\
    \ \" + result);\n    }\n});\n```\n\nSimilarly a `{ deleteMany: { filter: {journal:'Oracle\
    \ Magazine'} } }` bulk write operation may be added to delete all documents for\
    \ a selection query. A `deleteMany()` has not been included in the sample script\
    \ to demonstrate the effect of the other bulk write operations because if `deleteMany()`\
    \ is included, all or most documents would get deleted. The `bulkWriteDocuments.js`\
    \ script is listed:\n\n```\nServer = require('mongodb').Server;\nDb = require('mongodb').Db;\n\
    Collection = require('mongodb').Collection;\nvar db = new Db('local', new Server('localhost',\
    \ 27017));\ndb.\n```"
