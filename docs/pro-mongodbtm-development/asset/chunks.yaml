    \ |\n| `updateFirst(Query query, Update update, String collectionName)` | 使用给定的更新文档更新在给定集合中使用给定查询找到的第一个文档。\
    \ |\n\n1.  使用 Mongo shell 中的 `db.catalog.drop()` 方法删除任何先前添加的文档。\n2.  在 `App` 类的\
    \ `updateFirst()` 方法中，使用 `createCatalogInstances()` 方法创建 `Catalog` 实例，并使用 `save()`\
    \ 方法保存一些 `Catalog` 实例。\n3.  为 `edition` 字段创建一个 `BasicDBObject` 实例，键为 `edition`，值为\
    \ `November-December 2013`。\n    ```\n    DBObject dbObject = new BasicDBObject(\"\
    edition\", \"November-December 2013\");\n    ```\n4.  从 `BasicDBObject` 实例创建一个\
    \ `BasicQuery` 实例。\n    ```\n    BasicQuery query = new BasicQuery(dbObject);\n\
    \    ```\n5.  使用 `BasicQuery` 对象作为第一个参数调用 `updateFirst(Query query, Update update,\
    \ Class<?> entityClass)` 方法。为第二个参数创建 `Update` 对象，使用 `Update` 类的静态方法 `update(String\
    \ key, Object value)`，键为 `edition`，值为 `11-12-2013`，这意味着将 `edition` 字段更新为 `11-12-2013`。对于第三个参数，指定\
    \ `Catalog.class`。输出 `updateFirst()` 方法返回的 `WriteResult` 对象。\n    ```\n    WriteResult\
    \ result = ops.updateFirst(query, Update.update(\"edition\", \"11-12-2013\"),\
    \ Catalog.class);\n    ```"
