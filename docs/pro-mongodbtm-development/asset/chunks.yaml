    \ `db` 实例调用 `collections(callback)` 方法。在 `collections(callback)` 方法的回调函数块中，输出集合信息。\n\
    \    ```javascript\n    db.collections(function(error, collections){\n       \
    \ if (error)\n            console.log(error);\n        else{\n            console.log(\"\
    Collections in database local\");\n            console.log(collections);\n   \
    \     }\n    });\n    ```\n5.  类似地，在 `open()` 方法的回调函数块中使用 `db` 实例，调用 `collection(name,\
    \ options, callback)` 方法来获取 `mongodb` 集合实例。在 `collection(name, options, callback)`\
    \ 方法的回调函数块中，输出有关集合的信息，例如集合名称、集合是否为 capped 集合以及集合中的文档数量。\n    ```javascript\n \
