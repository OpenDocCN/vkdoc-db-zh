    "catalog1");     ```           3.  Invoke the `get` methods on the `Catalog` instance
    to output the entity fields.                    ```     System.out.println(catalog.getJournal());     System.out.println(catalog.getPublisher());     System.out.println(catalog.getEdition());     System.out.println(catalog.getTitle());     System.out.println(catalog.getAuthor());     ```              The
    `Catalog` entity field values shall get output when the client class is run.    Finding
    a Catalog Entry Using a JPA Query    The `Query` interface is used to run a query
    in the Java Persistence query language and native SQL. The `EntityManager` interface
    provides several methods for creating a `Query` instance. In this section we shall
    run a Java Persistence query language statement by first creating an instance
    of `Query` using the `EntityManager` method `createQuery(java.lang.String qlString)`
    and subsequently invoking the `getResultList()` method on the `Query` instance.    1.  Add
    a method called `query()` to the `KunderaClient` class and invoke the method from
    the `main` method so that when the application is run the method gets invoked.
    2.  In the `query()` method invoke the `createQuery(java.lang.String qlString)`
    method to create a Query instance. 3.  Supply the Java Persistence query language
    statement as `SELECT c FROM Catalog c`.                    ```     javax.persistence.Query
    query = em.createQuery("SELECT c FROM Catalog c");     ```           4.  Invoke
    the `getResultList()` method on the `Query` instance to run the `SELECT` statement
    and return a `List<Catalog>` as result.                    ```     List<Catalog>
    results = query.getResultList();     ```           5.  Iterate over the `List`
    object using an enhanced `for` statement to output the fields of the `Catalog`
    instance.                    ```     for (Catalog catalog : results) {                 System.out.println(catalog.getCatalogId());                 System.out.println(catalog.getJournal());                 System.out.println(catalog.getPublisher());                 System.out.println(catalog.getEdition());                 System.out.println(catalog.getTitle());                 System.out.println(catalog.getAuthor());             }     ```              The
    `Catalog` entity field values shall get output when the client class is run.    Updating
    a Catalog Entry    In this section we shall update a catalog entry using the Java
    Persistence API. The `persist()` method in `EntityManager` may be used to persist
    an updated entity instance.    1.  Add a method called `update()` to the `KunderaClient`
    class and invoke the method from the `main` method so that when the application
    is run the method gets invoked. For example,     1.  To update the `edition` column
    in document with primary key “catalog1” create an entity instance for the `catalog1`
    row using the `find(java.lang.Class<T> entityClass, java.lang.Object primaryKey)`
    method.     2.  Subsequently set the edition field to the updated value using
    the `setEdition` method.     3.  Persist the updated `Catalog` instance using
    the `persist(java.lang.Object entity)` method                                    ```         Catalog
    catalog = em.find(Catalog.class, "catalog1");         catalog.setEdition("Nov-Dec
    2013");         em.persist(catalog);         ```                   2.


    The Java Persistence query language provides the `UPDATE` clause to update a row.
    Create a `Query` instance using an `UPDATE` statement and the `createQuery(String)`
    method in `EntityManager`. Subsequently invoke the `executeUpdate()` method to
    execute the `UPDATE` statement.                    ```     em.createQuery("UPDATE
    Catalog c SET c.journal = ''Oracle-Magazine''").executeUpdate();     ```           3.  The
    `journal` column in all the rows in the `catalog` column family gets updated.
    Having applied updates invokes the `query()` method to output the updated field
    values.    When the `KunderaClient` class is run the updated field `journal` should
    have the updated value `Oracle-Magazine` instead of `Oracle Magazine`.    Deleting
    a Catalog Entry    In this section we shall remove documents persisted in MongoDB
    using the Java Persistence API. The `remove(java.lang.Object` entity) method in
    `EntityManager` may be used to remove an entity instance.    1.  Add a method
    called `delete()` to the `KunderaClient` class and invoke the method from the
    `main` method so that when the application is run the method gets invoked. 2.  To
    remove the document with primary key “catalog1” create an entity instance for
    the `catalog1` row using the `find(java.lang.Class<T> entityClass, java.lang.Object
    primaryKey)` method. Subsequently invoke the `remove(java.lang.Object entity)`
    method to remove the document with primary key `catalog1` from MongoDB.                    ```     Catalog
    catalog = em.find(Catalog.class, "catalog1");     em.remove(catalog);     ```           3.  The
    Java Persistence query language provides the `DELETE` clause to delete a document.
    Create a `Query` instance using an `DELETE` statement and the `createQuery(String)`
    method in `EntityManager`. Subsequently invoke the `executeUpdate()` method to
    execute the `DELETE` statement.                    ```     em.createQuery("DELETE
    FROM Catalog c").executeUpdate();     ```                    All rows get deleted.
    The `DELETE` statement does not delete the document itself but deletes all the
    columns in the rows.           4.  Having applied deletes, either using the `remove(java.lang.Object
    entity)` or using the `DELETE` Java Persistence query language statement invoke
    the `query()` method to output any `Catalog` instances persisted to catalog table.    When
    the client class is run no field values should get listed when the `query()` method
    is invoked subsequent to deleting the `Catalog` entries.    The Kundera-Mongo
    JPA Client Class    In the following subsections we shall install the Maven project
    and generate Eclipse IDE files for use with the Maven project. Subsequently we
    shall run the Kundera-Mongo JPA client class, which was discussed in the preceding
    section “Running JPA CRUD operations,” to invoke the different methods of the
    client class. The `KunderaClient` class used in this chapter is listed:    ```
    package kundera;  import java.util.List;  import javax.persistence.EntityManager;
    import javax.persistence.EntityManagerFactory; import javax.persistence.Persistence;  public
    class KunderaClient {      private static EntityManager em;     private static
    EntityManagerFactory emf;      public static void main(String[] args) {          emf
    = Persistence.createEntityManagerFactory("kundera");         em = emf.createEntityManager();
            create();         findByClass();         query();         update();         delete();
            close();     }      private static void create() {         Catalog catalog
    = new Catalog();         catalog.setCatalogId("catalog1");         catalog.setJournal("Oracle
    Magazine");         catalog.setPublisher("Oracle Publishing");         catalog.setEdition("November-December
    2013");         catalog.setTitle("Engineering as a Service");         catalog.setAuthor("David
    A. Kelly");          em.persist(catalog);          catalog = new Catalog();         catalog.setCatalogId("catalog2");
            catalog.setJournal("Oracle Magazine");         catalog.'
  trans: "# 使用 Kundera 进行 JPA CRUD 操作\n\n## 查找目录条目\n\n使用 `EntityManager` 接口中的 `find(java.lang.Class<T>\
    \ entityClass, java.lang.Object primaryKey)` 方法，第一个参数是实体类，第二个参数是要查找的文档的 `_id`\
    \ 字段值。\n\n1.  向 `KunderaClient` 类添加一个名为 `findByClass()` 的方法，并从 `main` 方法中调用该方法，以便在应用程序运行时调用它。\n\
    2.  使用 `Catalog.class` 作为第一个参数，`\"catalog1\"` 作为第二个参数来调用 `find(java.lang.Class<T>\
    \ entityClass, java.lang.Object primaryKey)` 方法。\n    ```java\n    Catalog catalog\
    \ = em.find(Catalog.class, \"catalog1\");\n    ```\n3.  在 `Catalog` 实例上调用 `get`\
    \ 方法以输出实体字段。\n    ```java\n    System.out.println(catalog.getJournal());\n   \
    \ System.out.println(catalog.getPublisher());\n    System.out.println(catalog.getEdition());\n\
    \    System.out.println(catalog.getTitle());\n    System.out.println(catalog.getAuthor());\n\
    \    ```\n\n当客户端类运行时，`Catalog` 实体字段值应当被输出。\n\n## 使用 JPA 查询查找目录条目\n\n`Query` 接口用于运行\
    \ Java 持久化查询语言和原生 SQL 的查询。`EntityManager` 接口提供了几种创建 `Query` 实例的方法。在本节中，我们将首先使用\
    \ `EntityManager` 方法 `createQuery(java.lang.String qlString)` 创建一个 `Query` 实例，然后在\
    \ `Query` 实例上调用 `getResultList()` 方法，从而运行一个 Java 持久化查询语言语句。\n\n1.  向 `KunderaClient`\
    \ 类添加一个名为 `query()` 的方法，并从 `main` 方法中调用该方法。\n2.  在 `query()` 方法中，调用 `createQuery(java.lang.String\
    \ qlString)` 方法来创建一个 `Query` 实例。\n3.  提供 Java 持久化查询语言语句 `SELECT c FROM Catalog\
    \ c`。\n    ```java\n    javax.persistence.Query query = em.createQuery(\"SELECT\
    \ c FROM Catalog c\");\n    ```\n4.  在 `Query` 实例上调用 `getResultList()` 方法以运行 `SELECT`\
    \ 语句，并返回一个 `List<Catalog>` 作为结果。\n    ```java\n    List<Catalog> results = query.getResultList();\n\
    \    ```\n5.  使用增强的 `for` 语句遍历 `List` 对象，以输出 `Catalog` 实例的字段。\n    ```java\n \
