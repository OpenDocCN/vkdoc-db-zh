    \            System.out.println(row1);\n\n        } catch (UnknownHostException\
    \ e) {\n            e.printStackTrace();\n        }\n    }\n}\n```\n\n### 运行应用程序\n\
    \n要将 BSON 文档对象添加到 MongoDB，请运行 Java 应用程序。右键单击`CreateMongoDBDocument.java`源文件，然后选择\
