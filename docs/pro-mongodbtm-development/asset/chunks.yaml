    \n[图 1-18](#part0007.xhtml#_Fig18). 运行 DeleteDBDocument.java 应用程序\n\n`DeleteDBDocument.java`\
    \ 应用程序的输出如 [图 1-19](#part0007.xhtml#Fig19) 所示。\n\n![9781484215999_Fig01-19.jpg](Images/image00424.jpeg)\n\
    \n[图 1-19](#part0007.xhtml#_Fig19). DeleteDBDocument.java 应用程序的输出\n\n由于 `deleteOne()`\
    \ 方法删除一个文档，在调用 `deleteOne()` 方法之后指示已删除的文档数量被输出为 1。使用 `findOneAndDelete()` 方法删除的文档被输出。`deleteMany()`\
    \ 方法的删除计数被输出为 2，这是在 `DeleteDBDocument` 应用程序中添加的 4 个文档中删除 2 个后，`catalog` 集合中的文档数量。\n\
    \n## 总结\n\n在本章中，我们使用了 MongoDB Java 驱动程序来访问 MongoDB 服务器并向数据库添加文档。随后，我们从数据库中获取文档，并对文档进行了更新和删除。在本章中，我们还介绍了\
    \ Mongo shell。在下一章中，我们将讨论 Mongo shell。"
