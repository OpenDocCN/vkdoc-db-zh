    \ 的两行数据，如 [Figure 6-13](#part0012.xhtml#Fig13) 所示。\n\n![9781484215999_Fig06-13.jpg](Images/image00603.jpeg)\n\
    \n[Figure 6-13](#part0012.xhtml#_Fig13). The Two Rows of Data Added to Cassandra\
    \ Database\n\n# Verify the `datastax` keyspace creation\n\n要验证 `datastax` keyspace\
