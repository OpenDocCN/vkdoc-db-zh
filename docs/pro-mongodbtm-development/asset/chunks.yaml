    Storage Handler. The `TBLPROPERTIES` for the MongoDB storage handler requires
    the `mongo.user` and `mongo.password` properties for which we need to create a
    user. We’ll create a MongoDB user first and then go on to create the external
    table.    1.  Start the MongoDB server shell with the following command.                    ```     >mongod     ```           2.  A
