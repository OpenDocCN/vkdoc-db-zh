- fmt: '# Using Documents


    In the following subsections we shall discuss adding a document, adding documents
    in a batch, querying a document, updating a document, and removing a document.


    ## Adding a Document


    In this section we shall use the `db.collection.insert()` JavaScript method to
    add a document to MongoDB from Mongo shell. The `insert()` helper method has a
    different syntax for different versions of MongoDB with some new features added
    to latter versions as listed in [Table 2-2](#part0008.xhtml#Tab2).


    [Table 2-2](#part0008.xhtml#_Tab2). Insert Helper Method Syntax


    | MongoDB Version | insert Method Syntax | Description |

    | --- | --- | --- |

    | 2.6 and later | `db.collection.insert(<document or array of documents>,{writeConcern:
    <document>,ordered:<boolean>})` | Added the `writeConcern` and ordered options
    – both of which are optional. The `writeConcern` option provides different levels
    of guarantees on the success of an insert for “safe writes.” The ordered option
    takes a Boolean value and performs an ordered insert of documents with the default
    being false.The insert method returns a `WriteResult` object for a single document
    insert and a `BulkWriteResult` object for an array of documents. |

    | 2.2 | `db.collection.insert(<document or array of documents>)` | Supports adding
    a single document or an array of documents. |

    | 2.04 | `db.collection.insert(<document>)` | Supports adding only one document.
    The single document may contain subdocuments. |


    To add a document, complete the following steps:


    ### 1. Drop Existing Collection


    Drop the `catalog` collection if it already exists before adding a new document
    or array of documents.


    ```

    >db.catalog.drop()

    ```


    ### 2. Create the Document


    Create the BSON document construct to add.


    ```

    >use catalog

    >doc1 = {"catalogId" : "catalog1", "journal" : ''Oracle Magazine'', "publisher"
    : ''Oracle Publishing'', "edition" : ''November December 2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''}

    ```


    ### 3. Insert the Document


    Invoke the `db.collection.insert()` method on the document using the `catalog`
    collection.


    ```

    >db.catalog.insert(doc1)

    ```


    ### 4. Verify the Insert


    Subsequently run the `db.collection.find()` method to find the documents in the
    `catalog` collection.


    ```

    >db.catalog.find()

    ```


    The single document added gets listed and includes the `_id` field. The `_id`
    field, which was not specified in the document JSON construct, gets added automatically
    before the document is added to the database.


    A `WriteResult` object returned by the `insert()` method includes the field `nInserted`
    to indicate the number of documents added. With one document added `nInserted`
    field value is 1 as shown in [Figure 2-23](#part0008.xhtml#Fig23).


    ![9781484215999_Fig02-23.jpg](Images/image00447.jpeg)


    [Figure 2-23](#part0008.xhtml#_Fig23). Using the Insert Method to Add a Document


    Next, we shall add a BSON document in which the `_id` field is specified in the
    BSON document construct.


    ### 5. Create Document with _id


    Specify the same document as earlier but with an additional field `_id`. The value
    of the `_id` field must be an `ObjectId` object.


    ```

    >doc1 = {"_id": ObjectId("507f191e810c19729de860ea"), "catalogId" : "catalog1",
    "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition"
    : ''November December 2013'',"title" : ''Engineering as a Service'',"author" :
    ''David A. Kelly''};

    ```


    ### 6. Insert Document with _id


    Add the document using the `db.collection.insert` method.'
  raw: "```\n>show collections\n>db.catalog.drop()\n>show collections\n```\n\nIf the\
    \ `show collections` command is invoked subsequent to dropping the `catalog` collection,\
    \ the `catalog` collection is not listed as shown in [Figure 2-22](#part0008.xhtml#Fig22).\n\
    \n![9781484215999_Fig02-22.jpg](Images/image00446.jpeg)\n\n[Figure 2-22](#part0008.xhtml#_Fig22).\
    \ Dropping a Collection\n\nIn most examples in this chapter we have dropped a\
    \ previously created collection and created the same collection for the example\
    \ to demonstrate the effect of the command used in the example. Running commands\
    \ with a previously created collection may not fully demonstrate the effect of\
    \ a command.\n\nUsing Documents\n\nIn the following subsections we shall discuss\
    \ adding a document, adding documents in a batch, querying a document, updating\
    \ a document, and removing a document.\n\nAdding a Document\n\nIn this section\
    \ we shall use the `db.collection.insert()` JavaScript method to add a document\
    \ to MongoDB from Mongo shell. The `insert()` helper method has a different syntax\
    \ for different versions of MongoDB with some new features added to latter versions\
    \ as listed in [Table 2-2](#part0008.xhtml#Tab2).\n\n[Table 2-2](#part0008.xhtml#_Tab2).\
    \ Insert Helper Method Syntax\n\n| MongoDB Version | insert Method Syntax | Description\
    \ |\n| --- | --- | --- |\n| 2.6 and later | `db.collection.insert(<document or\
