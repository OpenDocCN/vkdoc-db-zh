    \ lists the MongoDB 2.4 and MongoDB 2.6 (and later) version of the `save()` method.\n\
    \n[Table 2-5](#part0008.xhtml#_Tab5). The Save Method"
  trans: "\n```\n    >db.catalog.insert(doc1)\n```\n\n和之前一样，`insert()`方法返回一个`WriteResult`对象，其`nInserted`字段值为\
    \ 1，表示已添加一个文档，如图 2-24 所示。\n\n![9781484215999_Fig02-24.jpg](img/image00448.jpeg)\n\
    \n图 2-24. 添加包含 `_id` 字段的 BSON 文档\n\n3.  接着运行 `db.catalog.find()` 方法以查找数据库中的文档。添加的文档会被列出，并包含文档中指定的\
    \ `_id` 字段，如图 2-25 所示。\n\n![9781484215999_Fig02-25.jpg](img/image00449.jpeg)\n\
    \n图 2-25. 列出包含 `_id` 字段的文档\n\n对于任何版本的 MongoDB，`_id` 字段值在集合（collection）的文档中必须是唯一的。为了演示这一点，添加以下文档，其\
    \ `_id` 字段设置为 `ObjectId(\"507f191e810c19729de860ea\")`。\n\n```\n>doc2 = {\"_id\"\
    : ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" : 2, \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013'};\n>db.catalog.insert(doc2)\n```\n\n再添加另一个 `_id` 字段设置为相同 `ObjectId` 值的文档。\n\
    \n```\n>doc3 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\"\
    \ : 3};\n>db.catalog.insert(doc3)\n```\n\n这会产生一个重复键错误，如图 2-26 所示。\n\n![9781484215999_Fig02-26.jpg](img/image00450.jpeg)\n\
    \n图 2-26. 重复键错误\n\n添加一批文档\n\nMongoDB 2.2 版本开始支持添加文档数组。在 2.2 之前的版本中，每次调用 `db.collection.insert()`\
    \ 方法只能添加单个文档。要在 MongoDB 3.0.5 中添加一批文档，请指定或创建要添加的两个文档的 JSON，包括 `_id` 字段。\n\n```\n\
    >doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 'catalog1',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'David A. Kelly'}\n>doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"\
    ), \"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n```\n\n删除 `catalog` 集合，然后使用文档数组作为\
    \ `catalog` 集合来调用 `db.catalog.insert()` 方法。\n\n```\n>db.catalog.drop()\n>db.catalog.insert([doc1,\
    \ doc2])\n```\n\n`insert()` 方法返回一个 `BulkWriteResult` 对象，其中包含一个 `nInserted` 字段，表示添加的文档数量。数组中的两个文档作为两个不同的文档被添加，`nInserted`\
    \ 字段值为 2 即表明了这一点。随后运行 `db.collection.find()` 方法以查找 `catalog` 集合中的文档。\n\n```\n\
    >db.catalog.find()\n```\n\n集合方法 `find()` 列出了两个不同的文档，如图 2-27 所示。\n\n![9781484215999_Fig02-27.jpg](img/image00451.jpeg)\n\
    \n图 2-27. 添加一批文档\n\nMongoDB 2.6 的 Mongo shell 增加了两个新选项的支持：`writeConcern` 和 `ordered`。接下来，我们将演示这些选项的用法。`writeConcern`\
    \ 选项文档支持表 2-3 中列出的选项。\n\n表 2-3. 插入方法选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `w` |\
    \ 指定写入关注级别。 |\n| `j` | 确认 MongoDB 已将数据写入磁盘上的日志。布尔值，默认值为 false。MongoDB 不能以 `–nojournal`\
    \ 选项运行。 |\n| `wtimeout` | 适用于 `w` 值大于 1 的情况，指定写入关注的时间限制（毫秒）。写入关注是 MongoDB 在报告操作成功时提供的保证。\
    \ |\n\n写入关注级别 `w` 可以设置为表 2-4 中列出的值。\n\n表 2-4. 写入关注级别值\n\n| w 值 | 描述 |\n| --- |\
    \ --- |\n| `1` | 对独立 MongoDB 或副本集中的主节点提供写入关注确认。默认值。 |\n| `0` | 禁用写入操作的确认。 |\n\
    | `majority` | 确认写入操作已传播到大多数副本集成员。 |\n| 大于 `1` 的数字 | 确认写入操作已传播到指定数量的副本集成员。 |\n\
    | `标签集` | 以细粒度方式指定哪些副本集成员必须确认写入操作。 |\n\n接下来，我们将使用 `writeConcern` 和 `ordered` 选项添加一批文档。指定要添加的三个\
    \ BSON 文档。\n\n```\ndoc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"\
    catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : 'November December 2013',\"title\" : 'Engineering as a Service',\"\
    author\" : 'David A. Kelly'}\ndoc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"\
    ), \"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\ndoc3 = {\"_id\" : ObjectId(\"\
    53fb4b08d17e68cd481295d6\"), \"catalogId\" : 3, \"journal\" : 'Oracle Magazine',\
    \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n\
    ```\n\n使用 `db.collection.insert()` 方法和一个 `writeConcern`（`w` 设置为 `majority`，`wtimeout`\
    \ 设置为 5000）以及 `ordered` 选项设置为 `true` 来添加文档数组。同样，在运行 `db.catalog.insert()` 命令之前，先删除\
    \ `catalog` 集合。\n\n```\n>db.catalog.drop()\n>db.catalog.insert([doc3, doc1, doc2],\
    \  { writeConcern: { w: \"majority\", wtimeout: 5000 }, ordered:true })\n```\n\
    \n将返回一个 `BulkWriteResult` 对象，其 `nInserted` 值为 3，如图 2-28 所示。\n\n![9781484215999_Fig02-28.jpg](img/image00452.jpeg)\n\
    \n图 2-28. 使用 writeConcern 选项\n\n随后调用 `db.catalog.find()` 来列出添加的三个文档。文档按照添加时文档数组中指定的顺序列出，如图\
    \ 2-29 所示。\n\n![9781484215999_Fig02-29.jpg](img/image00453.jpeg)\n\n图 2-29. 使用\
    \ find() 列出文档\n\n当主机不是副本集的成员时，不能使用非 `majority` 的 `w` 值（例如 1）。例如，运行以下命令。\n\n```\n\
    >db.catalog.drop()\n>db.catalog.insert([doc3, doc1, doc2],  { writeConcern: {\
    \ w: \"1\", wtimeout: 5000 }, ordered:true })\n```\n\n正如错误消息所示，`w` 不能为 1，如图 2-30\
    \ 所示。\n\n![9781484215999_Fig02-30.jpg](img/image00454.jpeg)\n\n图 2-30. 错误消息 “cannot\
    \ use non-majority”\n\n保存文档\n\n`db.collection.save()` 方法用于保存文档，这与 `db.collection.insert()`\
    \ 方法不同，因为 insert 方法总是添加新文档，或者如果数据库中已存在具有相同 `_id` 字段的文档，则抛出错误。相反，`db.collection.save()`\
    \ 方法如果数据库中已存在具有相同 `_id` 的文档，则更新该文档；如果不存在具有相同 `_id` 的文档，则添加新文档。当数据库中已存在具有相同 `_id`\
    \ 的文档时，save 方法会用新文档完全替换旧文档。`db.collection.save()` 方法在 MongoDB 2.6 版本中进行了修订。下表，表\
    \ 2-5，列出了 MongoDB 2.4 和 MongoDB 2.6（及更高版本）的 `save()` 方法。\n\n表 2-5. Save 方法\n"
- fmt: "# 使用save()方法操作MongoDB文档示例\n\n| MongoDB Version | Save Method | Description\
    \ |\n| --- | --- | --- |\n| 2.4 | `db.collection.save(document)` | Saves a document.\
    \ |\n| 2.6 and later | `db.collection.save(<document>,{writeConcern: <document>})`\
    \ | Saves a document to the collection. The `writeConcern` is a new method argument.\
    \ |\n\nIn this section we shall demonstrate the different uses of the `save()`\
    \ method. First, we shall update a document using the `save()` method. Add the\
    \ following document using the `db.collection.insert()` method on the `catalog`\
    \ collection.\n\n## 示例一：更新现有文档\n\n1.  Before adding the document drop the `catalog`\
    \ collection and set the current database to `catalog`.\n\n    ```javascript\n\
    \    >db.catalog.drop()\n    >use catalog\n    >doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"\
    ), \"catalogId\" : \"catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'}\n    >db.catalog.insert(doc1)\n\
    \    ```\n\n2.  The `db.collection.insert()` method adds the document and returns\
    \ a `WriteResult` object with `nInserted` field as 1. Invoke the `db.collection.find()`\
    \ method to list the document added.\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\n3.  Subsequently construct a document with the same `_id` as the added\
    \ document but with some of the fields different.\n\n    ```javascript\n    >doc1\
    \ = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 'catalog1',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : '11-12-2013',\"title\" : 'Engineering as a Service',\"author\" : 'Kelly, David\
    \ A.'}\n    ```\n\n4.  Invoke the `db.collection.save()` method to save the document\
    \ with some of the fields modified. The `writeConcern` option, if specified, is\
    \ ignored.\n\n    ```javascript\n    >db.catalog.save(doc1,{ writeConcern: { w:\
    \ \"majority\", wtimeout: 5000 } })\n    ```\n\n5.  The `db.collection.save()`\
    \ method saves the document and returns a `WriteResult` object with `nMatched`\
    \ and `nModified` field value as 1. Because the same `_id` field value is used\
    \ the document gets updated or modified with the new document. Subsequently invoke\
    \ the `db.collection.find()` method on the `catalog` collection to list the document\
    \ added and subsequently saved.\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\nThe document added with `db.collection.insert()` and subsequently\
    \ saved with `db.collection.save()` gets listed. The `edition` field and the `author`\
    \ field get modified in the saved (updated) document as shown in [Figure 2-31](#part0008.xhtml#Fig31).\n\
    \n![9781484215999_Fig02-31.jpg](Images/image00455.jpeg)\n\n[Figure 2-31](#part0008.xhtml#_Fig31).\
    \ Updating a Document with `save()` Method\n\nIn the preceding example the document\
    \ saved with the `save()` method has all of the same fields as the document added\
    \ with the `insert()` method. In the next example we shall add new fields in the\
    \ document saved with the `save` method rather than in the document added with\
    \ the `insert()` method.\n\n## 示例二：为文档添加新字段\n\n1.  Construct a BSON document with\
    \ the `_id` field, the `catalogId` field, the `journal` field, the `publisher`\
    \ field, and the `edition` field but without the `title` and `author` fields.\n\
    \n    ```javascript\n    doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"\
    ), \"catalogId\" : \"catalog2\", \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n    ```\n\n\
    2.  Add the document with the `db.collection.insert()` method in the `catalog`\
    \ collection. Before running the command, drop the `catalog` collection.\n\n \
    \   ```javascript\n    >db.cataog.drop()\n    >db.catalog.insert(doc2)\n    ```\n\
    \n3.  The `insert()` method returns a `WriteResult` object with `nInserted` field\
    \ value as 1. A subsequent invocation of the `db.collection.find()` method on\
    \ the `catalog` collection lists the document.\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\n4.  Having added a document, next we shall update the document using\
    \ the `save()` method. Construct a document with all of the same fields and field\
    \ values as the document added with the `insert()` method including the `_id`\
    \ field and additional fields of `title` and `author`.\n\n    ```javascript\n\
    \    >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" :\
    \ 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : '11-12-2013',\"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'}\n    ```\n\n5.  Save the document with the `db.collection.save()`\
    \ method in the `catalog` collection. The `catalog` collection is not to be dropped\
    \ before the following command as we are saving (and modifying) the same document\
    \ as added before.\n\n    ```javascript\n    >db.catalog.save(doc2)\n    ```\n\
    \n6.  The `save()` method modifies the document adding the fields `title` and\
    \ `author`. The `save()` method returns a `WriteResult` object with the `nInserted`\
    \ and `nModified` field values as 1. Subsequently invoke the `db.collection.find()`\
    \ method to list the document.\n\n    ```javascript\n    >db.catalog.find()\n\
    \    ```\n\nThe modified document gets listed with the two additional fields as\
    \ shown in [Figure 2-32](#part0008.xhtml#Fig32). The document has been modified.\n\
    \n![9781484215999_Fig02-32.jpg](Images/image00456.jpeg)\n\n[Figure 2-32](#part0008.xhtml#_Fig32).\
    \ Updating a Document and Adding New Fields with `save()` Method\n\nIn all of\
    \ the preceding examples of `save()` we specified the `_id` field in the document\
    \ added with `insert()` and subsequently saved with `save` method. In the next\
    \ example of using the `save()` method we shall invoke the `save()` method with\
    \ a different `_id` field value than in the document added with `insert()` method.\
    \ Construct a BSON document as before and add the document using the `insert()`\
    \ method. Drop the `catalog` collection before running the example.\n\n## 示例三：执行Upsert操作\n\
    \n1.  A subsequent invocation of the `db.collection.find()` method lists the document\
    \ added.\n\n    ```javascript\n    >db.catalog.drop()\n    >doc2 = {\"_id\": ObjectId(\"\
    507f191e810c19729de860ea\"),\"catalogId\" : \"catalog2\", \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013'}\n    > db.catalog.insert(doc2)\n     >db.catalog.find()\n    ```\n\n\
    2.  Next, construct another document with the same fields and field values except\
    \ the `_id` field value being different. Save the document with the `save` method.\n\
    \n    ```javascript\n     >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860eb\"\
    ),\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" :\
    \ 'Oracle Publishing', \"edition\" : '11-12-2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n     >db.catalog.save(doc2)\n\
    \    ```\n\n3.  Subsequently invoke the `db.collection.find()` method on the `catalog`\
    \ collection.\n\n    ```javascript\n    db.catalog.find()\n    ```\n\nBecause\
    \ the document saved with the `save()` method has a different `_id` field value,\
    \ a new document gets added and two documents get listed with `find()` as shown\
    \ in [Figure 2-33](#part0008.xhtml#Fig33).\n\n![9781484215999_Fig02-33.jpg](Images/image00457.jpeg)\n\
    \n[Figure 2-33](#part0008.xhtml#_Fig33). Upserting a Document with `save()`\n\n\
    The `nUpserted` in the `WriteResult` is 1. `Upsert` is just a term for an insert\
    \ when no document matches a query document that could possibly match and update\
    \ a document. `Upsert` is used in the context of operations that modify or update\
    \ a document if a matching document is found. The `insert()` method does not modify\
    \ or update a document and the term `upsert` cannot be used in the context of\
    \ the `insert()` method. The `save()` and `update()` methods do modify or update\
    \ a document and `upsert` is used in the context of these methods.\n\nWhen a new\
    \ `_id` field is used in the document added with `insert()` and subsequently saved\
    \ with the `save()` method the process is called `upserting` the document.\n\n\
    When the `_id` field is not specified in the document with `insert()` and subsequently\
    \ saved with `save()` an `insert` is performed instead of an `upsert`. Next, we\
    \ shall discuss an example of insert using the `save()` method."
