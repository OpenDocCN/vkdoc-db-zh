    \ 应用程序，请在“Package Explorer”中右键单击 `UpdateDBDocument.java`，然后选择 Run As ![image](img/image00406.jpeg)\
    \ Java Application，如 图 1-17 所示。\n\n![9781484215999_Fig01-17.jpg](img/image00422.jpeg)\n\
    \n图 1-17. 运行 UpdateDBDocument.java 应用程序\n\n`UpdateDBDocument.java` 应用程序的输出如下。\n\
    \n```\nNumber of documents matched: 0\nNumber of documents modified: 0\nUpserted\
    \ Document Id: 55d4e56c0bc271d4a7002749\n_id\n55d4e56cd292641a003cb55a\ncatalogId\n\
    catalog1\njournal\nOracleMagazine\npublisher\nOracle Publishing\nedition\n11-12\
    \ 2013\ntitle\nEngineering as a Service\nauthor\nKelly, David A.\n_id\n55d4e56cd292641a003cb55b\n\
    catalogId\ncatalog2\njournal\nOracleMagazine\npublisher\nOracle Publishing\nedition\n\
    November December 2013\ntitle\nQuintessential and Collaborative\nauthor\nTom Haunert\n\
    _id\n55d4e56c0bc271d4a7002749\ncatalogId\ncatalog3\njournal\nOracle Magazine\n\
    publisher\nOracle Publishing\nedition\nNovember December 2013\ntitle\nEngineering\
    \ as a Service\nauthor\nDavid A. Kelly\n```\n\n`updateOne()` 方法示例使用更新操作符 `$set`\
    \ 更新了 `catalogId` 为 `catalog1` 的文档的 `edition` 和 `author` 字段。`updateMany()` 方法示例使用更新操作符\
    \ `$set` 将所有文档的 `journal` 字段设置为 `OracleMagazine`。如输出所示，`replaceOne()` 方法示例匹配和修改的文档数均为\
    \ 0。因为 `UpdateOptions` 被设置为 upsert（更新插入）文档，所以当找不到 `catalogId` 为 `catalog3` 的 `Document`\
    \ 实例时，就会添加一个新文档。\n\n# 在 MongoDB 中删除数据\n\n在本节中，我们将使用 `DeleteDBDocument` 应用程序来删除文档。`MongoCollection<TDocument>`\
    \ 接口提供了多种删除文档的方法，如 表 1-10 所述。\n\n表 1-10. 用于删除文档的 MongoCollection<TDocument> 方法\n\
    \n| 方法 | 描述 |\n| --- | --- |\n| `deleteMany(Bson filter)` | 使用查询过滤器从集合中删除所有文档，并将结果作为\
    \ `DeleteResult` 返回。`DeleteResult` 包含有关删除文档数量以及删除是否被确认的信息。 |\n| `deleteOne(Bson\
    \ filter)` | 根据查询过滤器删除一个文档，并将结果作为 `DeleteResult` 返回。 |\n| `findOneAndDelete(Bson\
    \ filter)` | 根据查询过滤器查找一个文档并将其删除。返回被删除的文档。 |\n| `findOneAndDelete(Bson filter,\
    \ FindOneAndDeleteOptions options)` | 根据查询过滤器和 `FindOneAndDeleteOptions` 选项查找一个文档并将其删除。返回被删除的文档。`FindOneAndDeleteOptions`\
    \ 选项包括查找和删除的最长时间、排序条件以及要返回的文档字段。 |\n\n1.  在 `DeleteDBDocument` 应用程序中，如前所述创建一个\
    \ `MongoClient` 客户端。从 `MongoClient` 实例为 `local` 数据库创建一个 `MongoDatabase` 实例，并从\
    \ `MongoDatabase` 实例为 `catalog` 集合创建一个 `MongoCollection<TDocument>` 实例。\n\n```java\n\
    MongoClient mongoClient = new MongoClient(Arrays.asList(new ServerAddress(\"localhost\"\
    , 27017)));\nMongoDatabase db = mongoClient.getDatabase(\"local\");\nMongoCollection<Document>\
    \ coll = db.getCollection(\"catalog\");\n```\n\n2.  使用模型类 `Catalog` 创建并添加四个 `Document`\
    \ 实例来设置 `Document` 字段。\n"
- fmt: "# CHAPTER 2\n\n## Using the Mongo Shell\n\n7.  作为使用 `findOneAndDelete(Bson\
    \ filter)` 方法的示例，删除 `catalogId` 为 `catalog2` 的文档。`findOneAndDelete()` 方法返回被删除的文档。输出被删除的文档。\n\
    \n```\n    Document documentDeleted = coll.findOneAndDelete(new Document(\"catalogId\"\
    , \"catalog2\"));\n    System.out.println(\"Document deleted: \" + documentDeleted);\n\
    \    ```\n\n8.  作为使用 `deleteMany(Bson filter)` 方法的示例，通过提供一个未指定键值对的 `Document`\
    \ 对象作为方法参数，删除所有剩余的文档。随后，使用 `DeleteResult` 中的 `getDeletedCount()` 方法输出被删除文档的数量。\n\
    \n```\n    DeleteResult result = coll.deleteMany(new Document());\n    System.out.println(\"\
    Number of documents deleted: \"+ result.getDeletedCount());\n    ```\n\n9.  要验证文档已被删除，请使用\
    \ `find()` 方法查找所有文档，并按之前讨论的方式输出每个文档中的键值对。`DeleteDBDocument` 应用程序如下所列。\n\n```\n\
