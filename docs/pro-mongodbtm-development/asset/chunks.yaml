    \ | 执行作为字符串提供的查询，并使用指定的值，返回一个 `ResultSet`。 |\n\n# 创建键空间\n\n我们需要创建一个键空间来存储表。在 `CreateCassandraDatabase`\
    \ 应用程序中添加一个静态方法 `createKeyspace()` 来创建键空间。\n\nCQL 3（Cassandra 查询语言 3）增加了有条件运行\
    \ `CREATE` 语句的支持，这意味着只有当要构建的对象尚不存在时才会创建该对象。`IF NOT EXISTS` 子句用于条件创建。\n\n创建一个名为\
    \ `datastax` 的键空间，使用复制策略类为 `SimpleStrategy`，复制因子为 1。\n\n```\nsession.execute(\"\
    CREATE KEYSPACE IF NOT EXISTS datastax WITH replication \"\n    + \"= {'class':'SimpleStrategy',\
    \ 'replication_factor':1};\");\n```\n\n在 `main` 方法中调用 `createKeyspace()` 方法。当应用程序运行时，键空间就会被创建。\n\
    \nCassandra 支持以下策略类，如表 6-3 所示，这些类指的是副本放置策略类。\n\n**表 6-3. 策略类**\n\n| 类 | 描述 |\n\
    | --- | --- |\n| `org.apache.cassandra.locator.SimpleStrategy` | 仅用于单个数据中心。第一个副本根据分区器的决定放置在一个节点上。随后的副本以顺时针方式放置在节点环中的下一个节点上，不考虑拓扑。仅当使用\
    \ `SimpleStrategy` 类时才需要复制因子。 |\n| `org.apache.cassandra.locator.NetworkTopologyStrategy`\
    \ | 用于多个数据中心。指定在每个数据中心存储多少个副本。尝试将副本存储在同一数据中心内的不同机架上，因为同一机架内的节点更有可能一起发生故障。 |\n\n\
    # 创建表（列族）\n\n接下来，我们将创建一个列族，在 CQL 3 中也称为表。向 `CreateCassandraDatabase` 应用程序添加一个静态方法\
    \ `createTable()`。\n\n如前所述，`CREATE TABLE` 命令也支持 `IF NOT EXISTS` 来有条件地创建表。CQL 3\
