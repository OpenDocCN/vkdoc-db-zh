    \ 连接到 MongoDB 并在数据库上执行了 CRUD 操作。我们还讨论了添加、查找和更新单个文档与多个文档的区别。在下一章中，我们将使用 Ruby 与\
    \ MongoDB。\n\n# 第 4 章\n\n![image](Images/image00404.jpeg)\n\n## 使用 Ruby 操作 MongoDB\n\
    \nRuby 是一种开源编程语言，最常用于 Ruby on Rails 框架。Ruby 的一些显著特性包括简单性、灵活性、可扩展性、可移植性以及操作系统无关的线程处理。MongoDB\
    \ Ruby 驱动程序可用于连接到 MongoDB 服务器，并对数据库中的数据进行添加、获取和更新操作。Ruby 驱动程序还提供了用于提高性能的 C 语言扩展。在本章中，我们将讨论使用\
    \ Ruby 客户端访问 MongoDB 并更改数据。本章涵盖以下主题：\n\n*   入门指南\n*   使用集合\n*   使用文档\n\n### 入门指南\n\
    \n在以下小节中，我们将介绍 Ruby Driver for MongoDB，并设置包含所需软件的环境。\n\n#### Ruby Driver for MongoDB\
    \ 概述\n\nMongoDB 的 Ruby 驱动程序 API 可用于在 Ruby 脚本中连接到 MongoDB 服务器，并在服务器上执行 CRUD（创建、读取、更新、删除）操作。Ruby\
    \ 驱动程序 API 中唯一的命名空间称为 `Mongo`。`Mongo` 命名空间中的主要类如 [Figure 4-1](#part0010.xhtml#Fig1)\
    \ 所示。\n\n![9781484215999_Fig04-01.jpg](Images/image00509.jpeg)\n\n[Figure 4-1](#part0010.xhtml#_Fig1).\
    \ Ruby MongoDB 驱动程序中的核心类\n\n`Mongo` 命名空间类在 [Table 4-1](#part0010.xhtml#Tab1) 中讨论。\n\
    \n[Table 4-1](#part0010.xhtml#_Tab1). Ruby MongoDB 驱动程序核心类\n\n| 类 | 描述 | 示例用法\
    \ |\n| --- | --- | --- |\n| `URI` | 根据连接字符串格式规范定义的 MongoDB uri 的表示。 | `uri = URI.new('mongodb://localhost:27017')`\
    \ |\n| `Address` | 表示到服务器的地址。 | `Mongo::Address.new(\"127.0.0.1:27017\")` |\n\
    | `Auth` | 表示认证。 | `Auth.get(user)` |\n| `BulkWrite` | 用于批量写入操作。 | `Mongo::BulkWrite.get(collection,\
    \ operations, ordered: true)` |\n| `Client` | `Client` 类是驱动程序的入口点。 | `Mongo::Client.new([\
    \ '127.0.0.1:27017' ])` |\n| `Cluster` | 表示一组服务器。 | `Mongo::Cluster.new([\"127.0.0.1:27017\"\
    ])` |\n| `Collection` | 表示一个集合。 | `Mongo::Collection.new(database, 'test')` |\n\
    | `Cursor` | 客户端对查询结果的迭代器。不由用户直接创建，而是由 `CollectionView` 内部创建。 | `catalog.find.each\
    \ { |document| puts document }` |\n| `Database` | 表示服务器上的一个数据库。 | `Mongo::Database.new(client,\
    \ :test)` |\n| `Error` | `Error` 类。 | `Mongo::Error::BulkWriteFailure.new(response)`\
    \ |\n| `Logger` | 记录消息。 | `Logger.error('mongo', 'message', '10ms')` |\n| `Server`\
    \ | 表示单个服务器。 | `Mongo::Server.new('127.0.0.1:27017', cluster, listeners)` |\n\
    | `ServerSelector` | 根据给定的偏好选择服务器。 | `Mongo::ServerSelector.get({ :mode => :secondary\
    \ })` |\n| `WriteConcern` | 表示写关注。 | `Mongo::WriteConcern.get(:w => 1)` |\n\n\
    #### 设置环境\n\n我们需要下载并安装以下软件以从 Ruby 访问 MongoDB 服务器。\n\n*   Ruby 2.1.6 安装程序 (`rubyinstaller-2.1.6-x64.exe`)。从\
