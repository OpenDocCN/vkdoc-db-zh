    \n[Figure 2-29](#part0008.xhtml#_Fig29). Listing Documents with find()\n\nA nonmajority\
    \ `w` value of 1 cannot be used when a host is not a member of a replica set.\
    \ For example, run the following commands.\n\n```\n>db.catalog.drop()\n>db.catalog.insert([doc3,\
    \ doc1, doc2],  { writeConcern: { w: \"1\", wtimeout: 5000 }, ordered:true })\n\
    ```\n\nAs indicated by the error message, `w` cannot be 1 as shown in [Figure\
    \ 2-30](#part0008.xhtml#Fig30).\n\n![9781484215999_Fig02-30.jpg](Images/image00454.jpeg)\n\
    \n[Figure 2-30](#part0008.xhtml#_Fig30). Error Message “cannot use non-majority”\n\
    \nSaving a Document\n\nThe `db.collection.save()` method is used to save a document,\
    \ which is different from the `db.collection.insert()` method as the insert method\
    \ always adds a new document or throws an error if a document with the same `_id`\
    \ field is already in the database. In contrast the `db.collection.save()` method\
    \ updates the document if a document with the same `_id` already exists in the\
    \ database and adds a new document if a document with the same `_id` does not\
    \ already exist. When a document with the same `_id` already exists in the database\
    \ the save method completely replaces the document with the new document. The\
    \ `db.collection.save()` method was revised in the MongoDB 2.6 version. The following\
    \ table, [Table 2-5](#part0008.xhtml#Tab5), lists the MongoDB 2.4 and MongoDB\
    \ 2.6 (and later) version of the `save()` method.\n\n[Table 2-5](#part0008.xhtml#_Tab5).\
