    use one of the following methods to add a batch of documents:               1.  Add
    the `ArrayList` instance using the `insert(Collection<? extends Object> batchToSave,
    String collectionName)` method to the `catalog` collection. `ops.insert(arrayList,
    "catalog");`     2.  Alternatively add the batch of objects using the `insert(Collection<?
    extends Object> batchToSave, Class<?> entityClass)` method. `ops.insert(arrayList,Catalog.class);`     3.  Or
    the `insertAll(Collection<? extends Object> objectsToSave)` method may be used
    to add the `ArrayList`. The database collection name to use is determined based
    on the `class.ops.insertAll(arrayList);`          For all of the `insert()` methods
    and the `insertAll()` method the collection is created implicitly if not already
    created.                    ![Image](Images/image00482.jpeg) **Note**  The source
    code includes implementations for each of the two overloaded `insert()` methods
    and for the `insertAll()` method to add a batch of documents. Only one of the
    method implementations should be invoked at a time to add a batch of two documents.
    The other method invocations may be commented out.           4.  Remove the `catalog`
    collection before adding a batch of documents with the following commands in Mongo
    shell.                    ```     >use local     >db.catalog.drop()     ```                    When
    the `App` application is run to invoke the `addDocumentBatch()` method a batch
    of documents gets added to the `catalog` collection.           5.  Subsequently
    run the `db.catalog.


    find()` method in Mongo shell to list the documents added as shown in [Figure
    10-10](#part0016.xhtml#Fig10). The `_id` is generated automatically.          ![9781484215999_Fig10-10.jpg](Images/image00671.jpeg)                    [Figure
    10-10](#part0016.xhtml#_Fig10). Listing Documents Added in Batch              Finding
    a Document by Id    In this section we shall find a document by Id. The `MongoCollection`
    interface provides the overloaded `findById()` methods discussed in [Table 10-8](#part0016.xhtml#Tab8)
    for finding a document by Id.    [Table 10-8](#part0016.xhtml#_Tab8). Overloaded
    findById() Methods     | Method | Description | | --- | --- | | `findById(Object
    id, Class<T> entityClass)` | Returns a document by the given id mapped onto the
    given entity class. | | `findById(Object id, Class<T> entityClass, String collectionName)`
    | Returns a document by the given id from the given collection mapped onto the
    given entity class. |    In this section we shall find a document by Id using
    the `findById(Object id, Class<T> entityClass, String collectionName)` method.    1.  In
    the `findById()` method in the `App` application create a `Catalog` instance `catalog1`.                    ```     catalog1
    = new Catalog("catalog1", "Oracle Magazine",     "Oracle Publishing", "November-December
    2013",     "Engineering as a Service", "David A. Kelly");     ```           2.  Save
    the `catalog1` instance to the `catalog` collection using the `save()` method.                    ```     ops.save(catalog1,
    "catalog");     ```           3.  Find the document using the `findById()` method
    using the `catalog1.getId()` method invocation for the id argument, `Catalog.class`
    for the entity class argument, and `catalog` as the collection name.                    ```     Catalog
    catalog = ops.findById(catalog1.getId(),Catalog.class,"catalog");     ```                    Alternatively,
    use the other `findById()` method.                    ```     Catalog catalog
    = ops.findById(catalog1.getId(), Catalog.class);     ```           4.  Subsequently,
    output the field values from the `Catalog` instance found by id.                    ```     System.out.println("Id
    in Catalog instance: " + catalog1.getId());     System.out.println("Journal : "
    + catalog.getJournal());     System.out.println("Publisher : " + catalog.getPublisher());     System.out.println("Edition
    : " + catalog.getEdition());     System.out.println("Title : " + catalog.getTitle());     System.out.println("Author
    : " + catalog.getAuthor());     ```                    The `findById()` method
    in the `App` application is as follows.                    ```     private static
    void findById() {     catalog1 = new Catalog("catalog1", "Oracle Magazine",     "Oracle
    Publishing", "November-December 2013",     "Engineering as a Service", "David
    A. Kelly");          ops.save(catalog1);     // Catalog catalog = ops.findById(catalog1.getId(),     //
    Catalog.class,"catalog");     Catalog catalog = ops.findById(catalog1.getId(),
    Catalog.class);     System.out.println("Id in Catalog instance: " + catalog1.getId());     System.out.println("Journal
    : " + catalog.getJournal());     System.out.println("Publisher : " + catalog.getPublisher());     System.out.println("Edition
    : " + catalog.getEdition());     System.out.println("Title : " + catalog.getTitle());     System.out.println("Author
    : " + catalog.getAuthor());     }     ```           5.  Run the `App.java`. The
    output lists the field values from the document found by Id as shown in [Figure
    10-11](#part0016.xhtml#Fig11). What is to be noted is that the id for the `Catalog`
    instance `catalog1` is not the id value (`catalog1`) specified in the constructor,
    but the automatically generated id value.          ![9781484215999_Fig10-11.jpg](Images/image00672.jpeg)                    [Figure
    10-11](#part0016.xhtml#_Fig11).'
  trans: "\n# 在 Mongo Shell 中列出文档\n\n`MongoOperations` 接口也提供了重载的 `insert()` 方法，用于添加单个文档，如\
    \ 表 10-6 所述。\n\n## 表 10-6. 重载的 insert() 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `insert(Object\
    \ objectToSave)` | 根据要保存对象的实体类型，将一个对象（文档）添加到集合中。 |\n| `insert(Object objectToSave,\
    \ String collectionName)` | 将一个对象（文档）添加到指定的集合中。 |\n\n## 批量添加文档\n\n在本节中，我们将添加一批文档，而非单个文档。`MongoOperations`\
    \ 接口提供了重载的 `insert()` 方法和 `insertAll()` 方法，用于将一批对象添加或插入到集合中，如 表 10-7 所述。我们将演示\
    \ 表 10-7 中的三种方法，以将文档列表添加到集合中。\n\n### 表 10-7. 重载的批量插入方法\n\n| 方法 | 描述 |\n| --- |\
    \ --- |\n| `insert(Collection<? extends Object> batchToSave, Class<?> entityClass)`\
    \ | 在单个批次中添加指定实体类类型的对象列表。 |\n| `insert(Collection<? extends Object> batchToSave,\
    \ String collectionName)` | 在单个批次中将对象列表添加到指定的集合。 |\n| `insertAll(Collection<?\
    \ extends Object> objectsToSave)` | 将混合对象（文档）集合添加到数据库集合中。 |\n\n1.  在 `App` 应用程序中使用自定义方法\
    \ `addDocumentBatch()` 添加一批文档。\n2.  创建一个 `Catalog` 实例的 `ArrayList`。创建新的 `Catalog`\
    \ 实例 `catalog1` 和 `catalog2`。`Catalog` 实例 `catalog1` 和 `catalog2` 可以与 `addDocument()`\
    \ 自定义方法中创建的实例相同。由于 `catalog1` 和 `catalog2` 是类变量，可以复用相同的实例。\n\n    ```java\n  \
    \  catalog1 = new Catalog(\"catalog1\", \"Oracle Magazine\",\n        \"Oracle\
    \ Publishing\", \"November-December 2013\",\n        \"Engineering as a Service\"\
    , \"David A. Kelly\");\n    catalog2 = new Catalog(\"catalog2\", \"Oracle Magazine\"\
    ,\n        \"Oracle Publishing\", \"November-December 2013\",\n        \"Quintessential\
    \ and Collaborative\", \"Tom Haunert\");\n    ArrayList arrayList = new ArrayList();\n\
    \    arrayList.add(catalog1);\n    arrayList.add(catalog2);\n    ```\n\n3.  接下来，使用以下方法之一添加一批文档：\n\
    \    1.  使用 `insert(Collection<? extends Object> batchToSave, String collectionName)`\
    \ 方法将 `ArrayList` 实例添加到 `catalog` 集合。\n        `ops.insert(arrayList, \"catalog\"\
    );`\n    2.  或者使用 `insert(Collection<? extends Object> batchToSave, Class<?> entityClass)`\
    \ 方法添加这批对象。\n        `ops.insert(arrayList, Catalog.class);`\n    3.  或者可以使用 `insertAll(Collection<?\
    \ extends Object> objectsToSave)` 方法来添加 `ArrayList`。要使用的数据库集合名称根据 `class` 确定。\n\
    \        `ops.insertAll(arrayList);`\n\n    对于所有 `insert()` 方法和 `insertAll()`\
    \ 方法，如果集合尚未创建，则会隐式创建。\n\n    ![Image](img/image00482.jpeg) `注意` 源代码包含两个重载 `insert()`\
    \ 方法和 `insertAll()` 方法的实现，用于添加一批文档。一次只能调用其中一种方法实现来添加两个文档。其他的方法调用可以注释掉。\n\n4. \
    \ 在添加一批文档之前，先在 Mongo shell 中使用以下命令移除 `catalog` 集合。\n\n    ```javascript\n    >use\
    \ local\n    >db.catalog.drop()\n    ```\n\n    当运行 `App` 应用程序以调用 `addDocumentBatch()`\
    \ 方法时，一批文档就会被添加到 `catalog` 集合中。\n\n5.  随后在 Mongo shell 中运行 `db.catalog.find()`\
    \ 方法以列出添加的文档，如 图 10-10 所示。`_id` 是自动生成的。\n\n    ![9781484215999_Fig10-10.jpg](img/image00671.jpeg)\n\
    \n    图 10-10. 列出批量添加的文档\n\n## 按 Id 查找文档\n\n在本节中，我们将按 Id 查找文档。`MongoCollection`\
    \ 接口提供了重载的 `findById()` 方法，如 表 10-8 所述，用于按 Id 查找文档。\n\n### 表 10-8. 重载的 findById()\
    \ 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `findById(Object id, Class<T> entityClass)`\
    \ | 根据给定 id 返回映射到给定实体类的文档。 |\n| `findById(Object id, Class<T> entityClass, String\
    \ collectionName)` | 从给定的集合中，根据给定 id 返回映射到给定实体类的文档。 |\n\n在本节中，我们将使用 `findById(Object\
    \ id, Class<T> entityClass, String collectionName)` 方法按 Id 查找文档。\n\n1.  在 `App`\
    \ 应用程序的 `findById()` 方法中创建一个 `Catalog` 实例 `catalog1`。\n\n    ```java\n    catalog1\
    \ = new Catalog(\"catalog1\", \"Oracle Magazine\",\n        \"Oracle Publishing\"\
    , \"November-December 2013\",\n        \"Engineering as a Service\", \"David A.\
    \ Kelly\");\n    ```\n\n2.  使用 `save()` 方法将 `catalog1` 实例保存到 `catalog` 集合。\n\n\
    \    ```java\n    ops.save(catalog1, \"catalog\");\n    ```\n\n3.  使用 `findById()`\
    \ 方法查找文档，其中 id 参数使用 `catalog1.getId()` 方法调用，实体类参数使用 `Catalog.class`，集合名称为 `catalog`。\n\
    \n    ```java\n    Catalog catalog = ops.findById(catalog1.getId(), Catalog.class,\
    \ \"catalog\");\n    ```\n\n    或者，使用另一个 `findById()` 方法。\n\n    ```java\n   \
    \ Catalog catalog = ops.findById(catalog1.getId(), Catalog.class);\n    ```\n\n\
    4.  随后，输出通过 id 找到的 `Catalog` 实例的字段值。\n\n    ```java\n    System.out.println(\"\
    Id in Catalog instance: \" + catalog1.getId());\n    System.out.println(\"Journal\
    \ : \" + catalog.getJournal());\n    System.out.println(\"Publisher : \" + catalog.getPublisher());\n\
    \    System.out.println(\"Edition : \" + catalog.getEdition());\n    System.out.println(\"\
    Title : \" + catalog.getTitle());\n    System.out.println(\"Author : \" + catalog.getAuthor());\n\
    \    ```\n\n    `App` 应用程序中的 `findById()` 方法如下所示。\n\n    ```java\n    private\
    \ static void findById() {\n        catalog1 = new Catalog(\"catalog1\", \"Oracle\
    \ Magazine\",\n            \"Oracle Publishing\", \"November-December 2013\",\n\
    \            \"Engineering as a Service\", \"David A. Kelly\");\n\n        ops.save(catalog1);\n\
    \        // Catalog catalog = ops.findById(catalog1.getId(),\n        //     Catalog.class,\
    \ \"catalog\");\n        Catalog catalog = ops.findById(catalog1.getId(), Catalog.class);\n\
    \        System.out.println(\"Id in Catalog instance: \" + catalog1.getId());\n\
    \        System.out.println(\"Journal : \" + catalog.getJournal());\n        System.out.println(\"\
    Publisher : \" + catalog.getPublisher());\n        System.out.println(\"Edition\
    \ : \" + catalog.getEdition());\n        System.out.println(\"Title : \" + catalog.getTitle());\n\
    \        System.out.println(\"Author : \" + catalog.getAuthor());\n    }\n   \
    \ ```\n\n5.  运行 `App.java`。输出列出了通过 Id 找到的文档的字段值，如 图 10-11 所示。需要注意的是，`Catalog`\
    \ 实例 `catalog1` 的 id 不是在构造函数中指定的 id 值 (`catalog1`)，而是自动生成的 id 值。\n\n    ![9781484215999_Fig10-11.jpg](img/image00672.jpeg)\n\
    \n    图 10-11.\n"
- fmt: "# Finding Documents By Id\n\n## Finding One Document\n\nAnother method used\
    \ to find a single document is the overloaded `findOne()`, which has the following\
    \ variants, discussed in [Table 10-9](#part0016.xhtml#Tab9).\n\n**Table 10-9**.\
    \ Overloaded `findOne()` Methods\n\n| Method | Description |\n| --- | --- |\n\
    | `findOne(Query query, Class<T> entityClass)` | Finds a single instance of an\
    \ object of the specified entity class type from the collection for the entity\
    \ class type using the specified query. |\n| `findOne(Query query, Class<T> entityClass,\
    \ String collectionName)` | Finds a single instance of an object of the specified\
    \ type from the specified collection using the specified query. |\n\nIn this section\
    \ we shall find a single document of type `Catalog` using a `Query` object from\
    \ the `catalog` collection in the `findOne()` method in the `App` application.\
    \ First, we need to construct the `Query` object to find the single document.\
    \ The `BasicQuery` class extends Query and provides the following constructors,\
    \ discussed in [Table 10-10](#part0016.xhtml#Tab10).\n\n**Table 10-10**. Overloaded\
    \ `BasicQuery` Constructors\n\n| Method | Description |\n| --- | --- |\n| `BasicQuery(com.mongodb.DBObject\
    \ queryObject)` | Creates a `BasicQuery` instance using the specified `DBObject`\
    \ query object. |\n| `BasicQuery(com.mongodb.DBObject queryObject, com.mongodb.DBObject\
    \ fieldsObject)` | Creates a `BasicQuery` instance using the specified `DBObject`\
    \ query object and the `DBObject` fields object. |\n| `BasicQuery(String query)`\
    \ | Creates a `BasicQuery` instance using the specified query String. |\n| `BasicQuery(String\
    \ query, String fields)` | Creates a `BasicQuery` instance using the specified\
    \ query String and fields String. |\n\n1.  Drop any previously created collection\
    \ called `catalog` using the following JavaScript method in Mongo shell.\n   \
    \ ```\n    >db.catalog.drop()\n    ```\n2.  In the `findOne()` method in `App`\
    \ application invoke the `createCatalogInstances()` method to create `Catalog`\
    \ instances and save the entity instances using the `save()` method.\n    ```\n\
    \    createCatalogInstances();\n    ops.save(catalog1);\n    ops.save(catalog2);\n\
    \    ```\n3.  Create a `BasicDBObject` instance using the `BasicDBObject(String\
    \ key, Object value)` constructor. Specify key as id and value as the `ObjectId`\
    \ instance created from the id in the `catalog1` instance obtained using the `getId()`\
    \ method.\n    ```\n    DBObject dbObject = new BasicDBObject(\"id\", new ObjectId(catalog1.getId()));\n\
    \    ```\n4.  Using the `BasicDBobject` instance create a `BasicQuery` object.\n\
    \    ```\n    BasicQuery query = new BasicQuery(dbObject);\n    ```\n5.  Using\
    \ the `BasicQuery` object find a single document from the `catalog` collection\
    \ of entity class type `Catalog` using either of the `findOne()` methods.\n  \
    \  ```\n    Catalog catalog = ops.findOne(query, Catalog.class);\n    // Catalog\
    \ catalog = ops.findOne(query, Catalog.class,\"catalog\");\n    ```\n    The `findOne()`\
    \ method in `App` application is as follows.\n    ```\n    private static void\
    \ findOne() {\n            createCatalogInstances();\n            ops.save(catalog1);\n\
    \            ops.save(catalog2);\n            DBObject dbObject = new BasicDBObject(\"\
    id\", new ObjectId(\n                    catalog1.getId()));\n            BasicQuery\
    \ query = new BasicQuery(dbObject);\n\n            Catalog catalog = ops.findOne(query,\
    \ Catalog.class);\n            // Catalog catalog = ops.findOne(query, Catalog.class,\"\
    catalog\");\n            System.out.println(\"Id in Catalog instance: \" + catalog1.getId());\n\
    \            System.out.println(\"Journal : \" + catalog.getJournal());\n    \
    \        System.out.println(\"Publisher : \" + catalog.getPublisher());\n    \
    \        System.out.println(\"Edition : \" + catalog.getEdition());\n        \
    \    System.out.println(\"Title : \" + catalog.getTitle());\n            System.out.println(\"\
    Author : \" + catalog.getAuthor());\n\n        }\n    ```\n6.  Run the `App` application\
    \ to save some `Catalog` instances and find one of the `Catalog` instances using\
    \ the `findOne()` method in `MongoOperations`. The output from the `findOne()`\
    \ method is shown in the Eclipse Console in [Figure 10-12](#part0016.xhtml#Fig12).\n\
    \    ![9781484215999_Fig10-12.jpg](Images/image00673.jpeg)\n    **Figure 10-12**.\
    \ Finding a Document with `findOne()`\n    A new `Query` instance to be given\
    \ to the `findOne()` method may also be created using a criteria definition with\
    \ the `Query(CriteriaDefinition criteriaDefinition)` constructor. The `Criteria`\
    \ class implements the `CriteriaDefinition` interface and provides several methods\
    \ to create a criterion and return a `Criteria` instance. Use the `where(String\
    \ key)` method to specify a key for a criterion and subsequently invoke the `is(Object\
    \ o)` method to compare the key to the id field value in the `catalog2 Catalog`\
    \ instance.\n7.  Using the `Criteria` instance returned by the sequence method\
    \ invocation of `where()` and `is()` methods creates a `Query` instance and using\
    \ the `Query` instance invokes the `findOne(Query query, Class<T> entityClass)`\
    \ method.\n    ```\n    String _id = catalog2.getId();\n    Catalog catalog =\
    \ ops.findOne(new Query(Criteria.where(\"_id\").is(_id)),\n    Catalog.class);\n\
    \    ```\n8.  Output the field values in the `Catalog` instance returned by the\
    \ `findOne()` method.\n    ```\n    System.out.println(\"Id in Catalog instance:\
    \ \" + catalog2.getId());\n    System.out.println(\"Journal : \" + catalog.getJournal());\n\
    \    System.out.println(\"Publisher : \" + catalog.getPublisher());\n    System.out.println(\"\
    Edition : \" + catalog.getEdition());\n    System.out.println(\"Title : \" + catalog.getTitle());\n\
    \    System.out.println(\"Author : \" + catalog.getAuthor());\n    ```\n    When\
    \ the `App` application is run the field values in the `Catalog` instance found\
    \ by using a criteria definition are output as shown in [Figure 10-13](#part0016.xhtml#Fig13).\n\
    \    ![9781484215999_Fig10-13.jpg](Images/image00674.jpeg)\n    **Figure 10-13**.\
    \ Finding a Document with Query Criteria\n\n## Finding All Documents\n\nThe `MongoOperations`\
    \ interface provides the overloaded `findAll()` method to find all documents from\
    \ a collection as discussed in [Table 10-11](#part0016.xhtml#Tab11).\n\n**Table\
    \ 10-11**. Overloaded `findAll()` Methods\n\n| Method | Description |\n| --- |\
    \ --- |\n| `findAll(Class<T> entityClass)` | Returns a list of documents from\
    \ the collection for the specified entity class type. |\n| `findAll(Class<T> entityClass,\
    \ String collectionName)` | Returns a list of documents from the specified collection\
    \ of the specified entity class type. |\n\n1.  In the `findAll()` method in `App`\
    \ application first add some `Catalog` instances to the `catalog` collection.\n\
    2.  Subsequently find all documents of entity class type `Catalog` using the `findAll(Class<T>\
    \ entityClass)` method. The `findAll()` method returns a `List` instance.\n3.\
    \  Obtain a `Iterator<Catalog>` from the `List` instance using the `iterator()`\
    \ method.\n    ```\n    Iterator<Catalog> iter = list.iterator();\n    ```\n4.\
    \  Iterate over the result set using the `hasNext()` method in a `while` loop\
    \ and obtain the `Catalog` instances in the result set.\n5.  Output the field\
    \ values in the `Catalog` instances using the `get()` methods for the fields defined\
    \ in the `Catalog` class. The `findAll()` method in `App` class is as follows.\n\
    \    ```\n    private static void findAll() {\n            createCatalogInstances();\n\
    \            ops.save(catalog1);\n            ops.save(catalog2);\n          \
    \  List<Catalog> list = ops.findAll(Catalog.class);\n    ```"
