    ,\n  \"CATEGORY\" : \"Notice\",\n  \"TYPE\" : \"WebLogicServer\",\n  \"SERVERNAME\"\
    \ : \"AdminServer\",\n  \"CODE\" : \"BEA-000365\",\n  \"MSG\" : \"Server state\
    \ changed to STANDBY\"\n}\n```\n\n## 在 Hive 中创建外部表\n\n创建了 MongoDB 数据存储后，我们将使用\
