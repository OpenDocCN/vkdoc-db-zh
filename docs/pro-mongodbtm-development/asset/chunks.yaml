    \ Eclipse IDE 控制台中输出，如图 11-12 所示。\n\n![9781484215999_Fig11-12.jpg](Images/image00702.jpeg)\n\
    \n**图 11-12**. 添加的 MongoDB 对象\n\n每个 BSON 文档对象会自动添加一个`_id`键。\n\n```json\n{\n  \"\
