  trans: "\n## 创建 Java 类\n\n我们将在一个 Java 应用程序中将 MongoDB 数据库文档迁移到 Couchbase Server。创建两个类：`CreateCouchbaseDocument`\
    \ 和 `MigrateCouchbaseToMongoDB`。\n\n1.  要创建 Java 类，请选择 File > New > Other。\n2.\
    \  在“新建”窗口中，选择 Java > Class，然后点击 Next，如图 7-6 所示。\n    ![9781484215999_Fig07-06.jpg](img/image00614.jpeg)\n\
    \    图 7-6。选择 Java > Java Class\n3.  在“新建 Java 类”向导中，选择 Source folder（源文件夹），并指定\
    \ Package（包）为 `mongodb`。指定 class Name（类名）为 `CreateCouchbaseDocument`，然后点击 Finish（完成），如图\
    \ 7-7 所示。\n    ![9781484215999_Fig07-07.jpg](img/image00615.jpeg)\n    图 7-7。新建\
    \ Java 类向导\n4.  类似地，添加一个类 `MigrateCouchbaseToMongoDB`，如图 7-8 所示。这两个类 `CreateMongoDB`\
    \ 和 `MigrateMongoDBToCouchbase` 在 Package Explorer 中的显示如图 7-8 所示。\n    ![9781484215999_Fig07-08.jpg](img/image00616.jpeg)\n\
    \    图 7-8。Package Explorer 中的 Java 类\n\n## 配置 Maven 项目\n\n我们需要将一些 Maven 依赖项添加到项目类路径中。将\
    \ 表 7-1 中列出的依赖项添加到 Maven 项目的 `pom.xml` 配置文件中。\n\n表 7-1。Maven 依赖项\n\n| 依赖项 | 描述\
    \ |\n| --- | --- |\n| Mongo Java Driver 3.0.3 | 从 Java 应用程序访问 MongoDB 所需的 MongoDB\
    \ Java 驱动程序。 |\n| Couchbase Server Java SDK Client library 2.1.4 | Couchbase Server\
    \ 的 Java 客户端。 |\n| Apache Commons BeanUtils 1.9.2 | 用于遵循 JavaBeans 模式开发的 Java\
    \ 类的实用工具 Jar 包。 |\n| Apache Commons Collections 3.2.1 | Java Collections 框架提供了加速开发的数据结构。\
    \ |\n| Apache Commons Logging 1.2 | 通用日志记录实现的一个接口。 |\n\n`pom.xml` 文件如下所列。\n\n\
    ```xml\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.mongodb.migration</groupId>\n\
    \    <artifactId>CouchbaseToMongoDB</artifactId>\n    <version>1.0.0</version>\n\
    \    <name>CouchbaseToMongoDB</name>\n    <dependencies>\n        <dependency>\n\
    \            <groupId>com.couchbase.client</groupId>\n            <artifactId>java-client</artifactId>\n\
    \            <version>2.1.4</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>org.mongodb</groupId>\n            <artifactId>mongo-java-driver</artifactId>\n\
    \            <version>3.0.3</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>commons-beanutils</groupId>\n            <artifactId>commons-beanutils</artifactId>\n\
    \            <version>1.9.2</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>commons-collections</groupId>\n            <artifactId>commons-collections</artifactId>\n\
    \            <version>3.2.1</version>\n        </dependency>\n        <dependency>\n\
    \            <groupId>commons-logging</groupId>\n            <artifactId>commons-logging</artifactId>\n\
    \            <version>1.2</version>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\n选择 File > Save All 来保存 `pom.xml` 配置文件。所需的 jar 文件会被下载，并被添加到\
    \ Java 构建路径中。要查看哪些 Jar 文件已添加到 Maven 项目的 Java 构建路径中，请在 Package Explorer 中右键单击项目节点并选择\
    \ Properties（属性）。在 Properties 中选择 Java Build Path（Java 构建路径）。添加到迁移项目的 Jar 文件如图\
    \ 7-9 所示。\n![9781484215999_Fig07-09.jpg](img/image00617.jpeg)\n图 7-9。Java 构建路径中的\
    \ Jar 文件\n\n## 向 Couchbase 添加文档\n\n`com.couchbase.client.java.CouchbaseCluster`\
    \ 类是 Couchbase Server 的客户端类，是访问 Couchbase 集群的入口点，该集群可能包含一台或多台服务器。在 `CreateCouchbaseDocument`\
    \ 应用程序中，我们将使用 `CouchbaseCluster` 类在 Couchbase Server 中创建并存储一个 JSON 文档。`CouchbaseCluster`\
    \ 类提供了重载的 `create()` 方法来创建 `CouchbaseCluster` 的实例。我们将使用不带任何参数的静态方法 `create()`，该方法用于连接到\
    \ localhost 端口 8091 上的默认存储桶。Couchbase Server 将文档存储在数据桶（Data Buckets）中。`Bucket`\
    \ 接口表示与一个存储桶的连接，用于同步地在该存储桶上执行操作。\n\n1.  创建一个 `CouchbaseCluster` 实例，并随后使用 `openBucket()`\
    \ 方法连接到默认存储桶。连接到“default”存储桶时，无需指定存储桶名称和密码。\n    ```java\n    Cluster cluster\
    \ = CouchbaseCluster.create();\n    Bucket defaultBucket = cluster.openBucket();\n\
    \    ```\n\n`com.couchbase.client.java.document.json.JsonObject` 类表示存储在 Couchbase\
    \ Server 中的 JSON 对象。文档由 `com.couchbase.client.java.document.Document` 接口表示，并提供了多种类实现，包括\
    \ `com.couchbase.client.java.document.JsonDocument`，它从 `com.couchbase.client.java.document.json.JsonObject`\
    \ 创建文档。`JsonObject` 代表一个 JSON 对象，即存储在 Couchbase 中的 `{a1:v1,a2:v2}` 格式的 JSON。`JsonObject`\
    \ 类提供了静态方法 `empty()` 和 `create()` 来创建一个空的 `JsonObject` 实例。`JsonObject` 类提供了重载的\
    \ put 方法，用于将字段/值对放入 `JsonObject` 实例中。这些方法中的字段名都是 `String` 类型。为值类型 `String`、`int`、`long`、`double`、`boolean`、`JsonObject`、`JsonArray`\
    \ 和 `Object` 都提供了相应的 `put` 方法。我们将使用 `put(String,String)` 方法向 JSON 文档添加键/值对。\n\n\
    2.  使用 `put(java.lang.String name, java.lang.String value)` 方法为字段 `journal`、`publisher`、`edition`、`title`\
    \ 和 `author` 创建一个包含其字符串值的 JSON 文档的 `JsonObject` 实例。首先，调用 `empty()` 方法返回一个空的 `JsonObject`\
    \ 实例，然后调用 `put(java.lang.String name, java.lang.String value)` 方法添加字段/值对。\n  \
    \  ```java\n    JsonObject catalogObj = JsonObject.empty()\n                .put(\"\
    journal\", \"Oracle Magazine\")\n                .put(\"publisher\", \"Oracle\
    \ Publishing\")\n                .put(\"edition\", \"March April 2013\")\n   \
    \             .put(\"title\", \"Engineering as a Service\")\n                .put(\"\
    author\", \"David A. Kelly\");\n    ```\n\n3.  `Bucket` 类提供了多个重载的 `insert` 和 `upsert`\
    \ 方法来向存储桶添加文档。使用 `JsonDocument.create(java.lang.String id, JsonObject content)`\
    \ 方法创建一个 `JsonDocument` 实例。\n"
- fmt: "## 创建 Couchbase 文档\n\n1.  使用`insert(D document)`方法向`default`存储桶添加一个`JsonObject`实例。\n\
    \    ```\n    defaultBucket.insert(JsonDocument.create(\"catalog1\", catalogObj));\n\
    \    ```\n2.  同样，向`default`存储桶添加另一个JSON文档。\n    ```\n    catalogObj = JsonObject.empty()\n\
    \                .put(\"journal\", \"Oracle Magazine\")\n                .put(\"\
    publisher\", \"Oracle Publishing\")\n                .put(\"edition\", \"March\
    \ April 2013\")\n                .put(\"title\", \"Quintessential and Collaborative\"\
    )\n                .put(\"author\", \"Tom Haunert\");\n    defaultBucket.insert(JsonDocument.create(\"\
    catalog2\", catalogObj));\n    ```\n3.  添加文档后，使用`disconnect()`方法断开与Couchbase集群的连接。\n\
    \    ```\n    cluster.disconnect();\n    ```\n\n`CreateCouchbaseDocument`类如下所示。\n\
    ```\npackage mongodb;\nimport com.couchbase.client.java.Bucket;\nimport com.couchbase.client.java.Cluster;\n\
    import com.couchbase.client.java.CouchbaseCluster;\nimport com.couchbase.client.java.document.JsonDocument;\n\
    import com.couchbase.client.java.document.json.JsonObject;\n\npublic class CreateCouchbaseDocument\
    \ {\n    public static void main(String args[]) {\n        Cluster cluster = CouchbaseCluster.create();\n\
    \        Bucket defaultBucket = cluster.openBucket();\n        JsonObject catalogObj\
    \ = JsonObject.empty()\n                .put(\"journal\", \"Oracle Magazine\"\
    )\n                .put(\"publisher\", \"Oracle Publishing\")\n              \
    \  .put(\"edition\", \"March April 2013\")\n                .put(\"title\", \"\
    Engineering as a Service\")\n                .put(\"author\", \"David A. Kelly\"\
    );\n        defaultBucket.insert(JsonDocument.create(\"catalog1\", catalogObj));\n\
    \n        catalogObj = JsonObject.empty()\n                .put(\"journal\", \"\
    Oracle Magazine\")\n                .put(\"publisher\", \"Oracle Publishing\"\
    )\n                .put(\"edition\", \"March April 2013\")\n                .put(\"\
    title\", \"Quintessential and Collaborative\")\n                .put(\"author\"\
    , \"Tom Haunert\");\n        defaultBucket.insert(JsonDocument.create(\"catalog2\"\
    , catalogObj));\n        cluster.disconnect();\n    }\n}\n```\n\n要运行`CreateCouchbaseDocument.java`应用程序，在Package\
