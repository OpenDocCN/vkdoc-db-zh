    4    ![image](Images/image00404.jpeg)    Using MongoDB with Ruby    Ruby is an
    open source programming language, most commonly used in the Ruby on Rails framework.
    Some of the salient features of Ruby are simplicity, flexibility, extensibility,
    portability, and OS independent threading. The MongoDB Ruby driver may be used
    to connect to MongoDB server and add, fetch, and update data in the database.
    The Ruby diver also provides a C extension for performance. In this chapter we
    shall discuss using a Ruby client to access and make data changes in MongoDB.
    This chapter covers the following topics:    *   Getting Started *   Using a Collection
    *   Using Documents    Getting Started    In the following subsections we shall
    introduce the Ruby Driver for MongoDB, and set up the environment with the required
    software.    Overview of the Ruby Driver for MongoDB    The Ruby driver for MongoDB
    API may be used in a Ruby script to connect to MongoDB Server and perform CRUD
    (create, read, update, and delete) operations on the server. The only namespace
    in the Ruby driver API is called `Mongo`. The main classes in the `Mongo` namespace
    are shown in [Figure 4-1](#part0010.xhtml#Fig1).    ![9781484215999_Fig04-01.jpg](Images/image00509.jpeg)    [Figure
    4-1](#part0010.xhtml#_Fig1). Core Classes in Ruby MongoDB Driver    The `Mongo`
    namespace classes are discussed in [Table 4-1](#part0010.xhtml#Tab1).    [Table
    4-1](#part0010.xhtml#_Tab1). Ruby MongoDB Driver Core Classes     | Class | Description
    | Example Usage | | --- | --- | --- | | `URI` | Representation of the MongoDB
    uri as defined in the connection string format specification. | `uri = URI.new(''mongodb://localhost:27017'')`
    | | `Address` | Represents an address to the server. | `Mongo::Address.new("127.0.0.1:27017")`
    | | `Auth` | Represents authentication. | `Auth.get(user)` | | `BulkWrite` | For
    bulk write operations. | `Mongo::BulkWrite.get(collection, operations, ordered:
    true)` | | `Client` | The `Client` class is the entry point to the driver. | `Mongo::Client.new([
    ''127.0.0.1:27017'' ])` | | `Cluster` | Represents a group of servers. | `Mongo::Cluster.new(["127.0.0.1:27017"])`
    | | `Collection` | Represents a collection. | `Mongo::Collection.new(database,
    ''test'')` | | `Cursor` | Client–side iterator over a query result. Not created
    directly by a user but created internally by `CollectionView`. | `catalog.find.each
    { &#124;document&#124; puts document }` | | `Database` | Represents a database
    on the server. | `Mongo::Database.new(client, :test)` | | `Error` | `Error` class.
    | `Mongo::Error::BulkWriteFailure.``new(response)` | | `Logger` | Logs messages.
    | `Logger.error(''mongo'', ''message'', ''10ms'')` | | `Server` | Represents a
    single server. | `Mongo::Server.new(''127.0.0.


    1:27017''cluster, listeners)` | | `ServerSelector` | Given a preference selects
    a server. | `Mongo::ServerSelector.get({ :mode => :secondary })` | | `WriteConcern`
    | Represents write concern. | `Mongo::WriteConcern.get(:w => 1)` |    Setting
    Up the Environment    We need to download and install the following software to
    access MongoDB Server from Ruby.    *   Ruby Installer for Ruby 2.1.6 (`rubyinstaller-2.1.6-x64.exe`).
    Download it from `http://rubyinstaller.org/downloads/`. MongoDB Ruby driver 2.x
    supports Ruby versions 1.8.7, 1.9, 2.0, and 2.1. *   Rubygems. *   RubyInstaller
    Development Kit (DevKit). Download the appropriate version from `http://rubyinstaller.org/downloads/`.
    For Ruby 2.1.6 download `DevKit-mingw64-64-4.7.2-20130224-1432-sfx.exe`. *   Ruby
    driver for MongoDB *   MongoDB Server 3.0.5    Installing Ruby    To install Ruby
    double-click on the Ruby installer application `rubyinstaller-2.1.6-x64.exe` The
    Ruby Setup wizard gets started.    1.  Select the Setup Language and click on
    OK. 2.  Accept the License Agreement and click on Next. 3.  In Installation Destination
    and Optional Tasks, specify a destination folder to install Ruby, or select the
    default folder. The directory path should not include any spaces. Select Add Ruby
    Executables to your `PATH`. 4.  Click on Install as shown in [Figure 4-2](#part0010.xhtml#Fig2).          ![9781484215999_Fig04-02.jpg](Images/image00510.jpeg)                    [Figure
    4-2](#part0010.xhtml#_Fig2). Selecting Installation Directory for Ruby              Ruby
    starts installing as shown in [Figure 4-3](#part0010.xhtml#Fig3).    ![9781484215999_Fig04-03.jpg](Images/image00511.jpeg)    [Figure
    4-3](#part0010.xhtml#_Fig3). Installing Ruby    The Setup wizard completes installing
    Ruby as shown in [Figure 4-4](#part0010.xhtml#Fig4). Click on Finish.    ![9781484215999_Fig04-04.jpg](Images/image00512.jpeg)    [Figure
    4-4](#part0010.xhtml#_Fig4). Ruby Installed    Next, install Rubygems, which is
    a package management framework for Ruby. Run the following command to install
    Rubygems.    ``` gem install rubygems-update ```    The Rubygems gem gets installed
    as shown in [Figure 4-5](#part0010.xhtml#Fig5).    ![9781484215999_Fig04-05.jpg](Images/image00513.jpeg)    [Figure
    4-5](#part0010.xhtml#_Fig5). Installing Rubygems    If Rubygems is already installed,
    update to the latest version with the following command.    ``` update_rubygems
    ```    Rubygems gets updated as shown in [Figure 4-6](#part0010.xhtml#Fig6).    ![9781484215999_Fig04-06.jpg](Images/image00514.jpeg)    [Figure
    4-6](#part0010.xhtml#_Fig6). Updating Rubygems    Installing DevKit    DevKit
    is a toolkit that is used to build many of the C/C++ extensions available for
    Ruby.    1.  To install DevKit double-click on the DevKit installer application
    (DevKit-mingw64-64-4.7.2-20130224-1432-sfx.exe) to extract DevKit files to a directory.
    Change directories (`cd`) to the directory in which the files are extracted.                    ```     C:\Ruby21-x64     ```           2.  Initialize
    DevKit and autogenerate the `config.yml` file using the following command.                    ```     ruby
    dk.rb init     ```           3.  A `config.yml` file gets generated in the C:\Ruby21-x64
    directory. Add the following line to the `config.yml` file.                    ```     -
    C:/Ruby21-x64     ```           4.  Install DevKit using the following command.                    ```     ruby
    dk.rb install     ```           5.  Verify that DevKit has been installed using
    the following command.                    ```     ruby -rubygems -e "require ''json'';
    puts JSON.load(''[42]'').inspect"     ```              The output from the preceding
    commands to initialize/install DevKit are shown in the command shell in [Figure
    4-7](#part0010.xhtml#Fig7).    ![9781484215999_Fig04-07.jpg](Images/image00515.jpeg)    [Figure
    4-7](#part0010.xhtml#_Fig7).'
  trans: "\n# PHP 操作 MongoDB：删除所有文档\n\n```php\ntry {\n    $connection = new MongoClient();\n\
    \    $collection = $connection->local->catalog;\n    $status = $collection->remove(array());\n\
    \    var_dump($status);\n} catch (MongoConnectionException $e) {\n    echo '<p>无法连接到\
    \ mongodb</p>';\n    exit();\n}\n?>\n```\n\n3.  使用 URL `http://localhost:8000/removeAllDocuments.php`\
    \ 运行 PHP 脚本。如 图 3-31 中 `n=>int(3)` 所示，所有三个文档都被删除了。\n\n    ![9781484215999_Fig03-31.jpg](img/image00508.jpeg)\n\
    \n    图 3-31. 运行 removeAllDocuments.php 脚本\n\n随后运行 `db.catalog.find()` 将不会列出任何文档。请不要删除\
    \ `local` 数据库中的 `catalog` 集合，因为我们将在下一节中演示删除集合。\n\n## 小结\n\n在本章中，我们使用 PHP Driver\
    \ for MongoDB 连接到 MongoDB 并在数据库上执行了 CRUD 操作。我们还讨论了添加、查找和更新单个文档与多个文档的区别。在下一章中，我们将使用\
    \ Ruby 与 MongoDB。\n\n# 第 4 章\n\n![image](img/image00404.jpeg)\n\n## 使用 Ruby 操作\
    \ MongoDB\n\nRuby 是一种开源编程语言，最常用于 Ruby on Rails 框架。Ruby 的一些显著特性包括简单性、灵活性、可扩展性、可移植性以及操作系统无关的线程处理。MongoDB\
    \ Ruby 驱动程序可用于连接到 MongoDB 服务器，并对数据库中的数据进行添加、获取和更新操作。Ruby 驱动程序还提供了用于提高性能的 C 语言扩展。在本章中，我们将讨论使用\
    \ Ruby 客户端访问 MongoDB 并更改数据。本章涵盖以下主题：\n\n*   入门指南\n*   使用集合\n*   使用文档\n\n### 入门指南\n\
    \n在以下小节中，我们将介绍 Ruby Driver for MongoDB，并设置包含所需软件的环境。\n\n#### Ruby Driver for MongoDB\
    \ 概述\n\nMongoDB 的 Ruby 驱动程序 API 可用于在 Ruby 脚本中连接到 MongoDB 服务器，并在服务器上执行 CRUD（创建、读取、更新、删除）操作。Ruby\
    \ 驱动程序 API 中唯一的命名空间称为 `Mongo`。`Mongo` 命名空间中的主要类如 图 4-1 所示。\n\n![9781484215999_Fig04-01.jpg](img/image00509.jpeg)\n\
    \n图 4-1. Ruby MongoDB 驱动程序中的核心类\n\n`Mongo` 命名空间类在 表 4-1 中讨论。\n\n表 4-1. Ruby MongoDB\
    \ 驱动程序核心类\n\n| 类 | 描述 | 示例用法 |\n| --- | --- | --- |\n| `URI` | 根据连接字符串格式规范定义的\
    \ MongoDB uri 的表示。 | `uri = URI.new('mongodb://localhost:27017')` |\n| `Address`\
    \ | 表示到服务器的地址。 | `Mongo::Address.new(\"127.0.0.1:27017\")` |\n| `Auth` | 表示认证。\
    \ | `Auth.get(user)` |\n| `BulkWrite` | 用于批量写入操作。 | `Mongo::BulkWrite.get(collection,\
    \ operations, ordered: true)` |\n| `Client` | `Client` 类是驱动程序的入口点。 | `Mongo::Client.new([\
    \ '127.0.0.1:27017' ])` |\n| `Cluster` | 表示一组服务器。 | `Mongo::Cluster.new([\"127.0.0.1:27017\"\
    ])` |\n| `Collection` | 表示一个集合。 | `Mongo::Collection.new(database, 'test')` |\n\
    | `Cursor` | 客户端对查询结果的迭代器。不由用户直接创建，而是由 `CollectionView` 内部创建。 | `catalog.find.each\
    \ { |document| puts document }` |\n| `Database` | 表示服务器上的一个数据库。 | `Mongo::Database.new(client,\
    \ :test)` |\n| `Error` | `Error` 类。 | `Mongo::Error::BulkWriteFailure.new(response)`\
    \ |\n| `Logger` | 记录消息。 | `Logger.error('mongo', 'message', '10ms')` |\n| `Server`\
    \ | 表示单个服务器。 | `Mongo::Server.new('127.0.0.1:27017', cluster, listeners)` |\n\
    | `ServerSelector` | 根据给定的偏好选择服务器。 | `Mongo::ServerSelector.get({ :mode => :secondary\
    \ })` |\n| `WriteConcern` | 表示写关注。 | `Mongo::WriteConcern.get(:w => 1)` |\n\n\
    #### 设置环境\n\n我们需要下载并安装以下软件以从 Ruby 访问 MongoDB 服务器。\n\n*   Ruby 2.1.6 安装程序 (`rubyinstaller-2.1.6-x64.exe`)。从\
    \ `http://rubyinstaller.org/downloads/` 下载。MongoDB Ruby 驱动程序 2.x 支持 Ruby 版本 1.8.7、1.9、2.0\
    \ 和 2.1。\n*   Rubygems。\n*   RubyInstaller Development Kit (DevKit)。从 `http://rubyinstaller.org/downloads/`\
    \ 下载合适的版本。对于 Ruby 2.1.6，请下载 `DevKit-mingw64-64-4.7.2-20130224-1432-sfx.exe`。\n\
    *   MongoDB Ruby 驱动程序\n*   MongoDB Server 3.0.5\n\n##### 安装 Ruby\n\n要安装 Ruby，请双击\
    \ Ruby 安装程序应用程序 `rubyinstaller-2.1.6-x64.exe`。Ruby 安装向导将启动。\n\n1.  选择安装语言并单击“确定”。\n\
    2.  接受许可协议并单击“下一步”。\n3.  在“安装目标和可选任务”中，指定安装 Ruby 的目标文件夹，或选择默认文件夹。目录路径不应包含任何空格。选择“将\
    \ Ruby 可执行文件添加到您的 `PATH`”。\n4.  单击“安装”，如 图 4-2 所示。\n\n    ![9781484215999_Fig04-02.jpg](img/image00510.jpeg)\n\
    \n    图 4-2. 选择 Ruby 的安装目录\n\nRuby 开始安装，如 图 4-3 所示。\n\n![9781484215999_Fig04-03.jpg](img/image00511.jpeg)\n\
    \n图 4-3. 安装 Ruby\n\n安装向导完成 Ruby 的安装，如 图 4-4 所示。单击“完成”。\n\n![9781484215999_Fig04-04.jpg](img/image00512.jpeg)\n\
    \n图 4-4. Ruby 已安装\n\n接下来，安装 Rubygems，这是一个用于 Ruby 的包管理框架。运行以下命令来安装 Rubygems。\n\n\
    ```\ngem install rubygems-update\n```\n\nRubygems gem 将被安装，如 图 4-5 所示。\n\n![9781484215999_Fig04-05.jpg](img/image00513.jpeg)\n\
    \n图 4-5. 安装 Rubygems\n\n如果 Rubygems 已经安装，请使用以下命令更新到最新版本。\n\n```\nupdate_rubygems\n\
    ```\n\nRubygems 将被更新，如 图 4-6 所示。\n\n![9781484215999_Fig04-06.jpg](img/image00514.jpeg)\n\
    \n图 4-6. 更新 Rubygems\n\n##### 安装 DevKit\n\nDevKit 是一个工具包，用于构建许多适用于 Ruby 的 C/C++\
    \ 扩展。\n\n1.  要安装 DevKit，请双击 DevKit 安装程序应用程序 (DevKit-mingw64-64-4.7.2-20130224-1432-sfx.exe)\
    \ 将 DevKit 文件解压到一个目录。使用 `cd` 命令切换到文件解压到的目录。\n\n    ```\n    C:\\Ruby21-x64\n \
    \   ```\n\n2.  使用以下命令初始化 DevKit 并自动生成 `config.yml` 文件。\n\n    ```\n    ruby dk.rb\
    \ init\n    ```\n\n3.  在 C:\\Ruby21-x64 目录中生成一个 `config.yml` 文件。将以下行添加到 `config.yml`\
    \ 文件中。\n\n    ```\n    - C:/Ruby21-x64\n    ```\n\n4.  使用以下命令安装 DevKit。\n\n  \
    \  ```\n    ruby dk.rb install\n    ```\n\n5.  使用以下命令验证 DevKit 是否已安装。\n\n    ```\n\
    \    ruby -rubygems -e \"require 'json'; puts JSON.load('[42]').inspect\"\n  \
    \  ```\n\n用于初始化/安装 DevKit 的上述命令的输出显示在 图 4-7 的命令 shell 中。\n\n![9781484215999_Fig04-07.jpg](img/image00515.jpeg)\n\
    \n图 4-7.\n"
- fmt: "# Installing Ruby Driver for MongoDB\n\nTo install the MongoDB Ruby driver\
    \ gem `mongo`, complete the following steps:\n\n1.  Run the following command.\n\
    \n    ```ruby\n    >gem install mongo\n    ```\n\n    The MongoDB Ruby driver\
    \ gem gets installed as shown in [Figure 4-8](#part0010.xhtml#Fig8).\n\n    ![9781484215999_Fig04-08.jpg](Images/image00516.jpeg)\n\
    \    [Figure 4-8](#part0010.xhtml#_Fig8). Installing MongoDB Ruby Driver\n\n2.\
    \  Next, install MongoDB Server. Only MongoDB versions 2.4, 2.6, and 3.x are compatible\
    \ with MongoDB Ruby driver 2.x. Download MongoDB 3.0.5 from `www.mongodb.org/`\
    \ and extract the zip file to a directory.\n3.  Add the `bin` directory from the\
    \ MongoDB installation (for example, `C:\\Program Files\\MongoDB\\Server\\3.0\\\
    bin`) to the `PATH` environment variable.\n4.  Start MongoDB server with the following\
    \ command.\n\n    ```bash\n    >mongod\n    ```\n\n    MongoDB server gets started\
    \ as shown in [Figure 4-9](#part0010.xhtml#Fig9).\n\n    ![9781484215999_Fig04-09.jpg](Images/image00517.jpeg)\n\
    \    [Figure 4-9](#part0010.xhtml#_Fig9). Starting MongoDB Server\n\n## Using\
    \ a Collection\n\nIn the following subsections we shall connect to MongoDB server,\
    \ get database information, and create a collection.\n\n### Creating a Connection\
    \ with MongoDB\n\nIn this section we shall connect with MongoDB Server using a\
    \ Ruby script.\n\n1.  Create a directory called `C:\\Ruby21-x64\\mongodbscripts`\
    \ for Ruby scripts.\n2.  Create a Ruby script `connection.rb` in the `C:\\Ruby21-x64\\\
    mongodbscripts` directory. In the script add a `require` statement for the `mongo`\
    \ gem. Add an `include` statement for the `Mongo` namespace.\n\n    ```ruby\n\
    \    require 'mongo'\n    include Mongo\n    ```\n\n    The `Client` class provides\
    \ several attributes and methods for getting information about the connection.\
    \ Some of the attributes are discussed in [Table 4-2](#part0010.xhtml#Tab2).\n\
    \n    [Table 4-2](#part0010.xhtml#_Tab2). Client Class Attributes\n\n    | Attribute\
    \ | Description |\n    | --- | --- |\n    | `cluster` | The cluster of servers\
    \ for the client. |\n    | `database` | The database instance. |\n    | `options`\
    \ | Configuration options. |\n\n    Some of the salient methods in the `Client`\
    \ class are discussed in [Table 4-3](#part0010.xhtml#Tab3).\n\n    [Table 4-3](#part0010.xhtml#_Tab3).\
    \ Client Class Methods\n\n    | Method | Return type | Description |\n    | ---\
    \ | --- | --- |\n    | `[]` | `Mongo::Collection` | Gets a collection object.\
    \ |\n    | `database_names` | `Array<String>` | Gets names of all databases. |\n\
    \    | `initialize` | `Client` | Instantiates a new driver client. |\n    | `list_databases`\
    \ | `Array<Hash>` | Gets info for each database. |\n    | `read_preference` |\
    \ `Object` | Gets the read preferences for the provided options. |\n    | `use(name)`\
    \ | `Mongo::Client` | Uses the database with the specified name. |\n    | `with(new_options\
    \ = {})` | `Mongo::Client` | Provides a new client with the options. |\n    |\
    \ `write_concern` | `Mongo::WriteConcern` | Gets the write concern. |\n\n    The\
    \ syntax for `Client` class constructor is as follows.\n\n    ```ruby\n    initialize(addresses_or_uri,\
    \ options = {})\n    ```\n\n    The parameters for the constructor are discussed\
    \ in [Table 4-4](#part0010.xhtml#Tab4).\n\n    [Table 4-4](#part0010.xhtml#_Tab4).\
    \ Client Constructor Parameters\n\n    | Parameter | Type | Description |\n  \
    \  | --- | --- | --- |\n    | `addresses_or_uri` | `Array<String>, String` | Array\
    \ of server addresses in the format host:port or a MongoDB URI connection string.\
    \ |\n    | `options` | `Hash` | Client options. Defaults to {}. |\n\n    Some\
    \ of the options supported by `Client` class constructor are discussed in [Table\
    \ 4-5](#part0010.xhtml#Tab5).\n\n    [Table 4-5](#part0010.xhtml#_Tab5). Client\
    \ Class Constructor Options\n\n    | Options | Type | Description |\n    | ---\
    \ | --- | --- |\n    | `:auth_mech` | Symbol | Authentication mechanism to use.\
    \ |\n    | `:connect` | Symbol | Connection method to use. Value could be `:direct`,\
    \ `:replica_set`, `:sharded.` |\n    | `:database` | String | The database to\
    \ connect to. |\n    | `:user` | String | Username. |\n    | `:password` | String\
    \ | Password. |\n    | `:max_pool_size` | Integer | Maximum size of the connection\
    \ pool. |\n    | `:min_pool_size` | Integer | Minimum size of the connection pool.\
    \ |\n    | `:connect_timeout` | Float | Connection timeout in secs. |\n    | `:read`\
    \ | Hash | Read preference options. The `:mode` option may be set to `:secondary`,\
    \ `:secondary_preferred`, `:primary`, `:primary_preferred`, `:nearest.` |\n  \
    \  | `:replica_set` | Symbol | Replica set to connect to. |\n    | `:write` |\
    \ Hash | Write concern options. |\n\n3.  In the `connection.rb` script create\
    \ a connection with MongoDB Server using one of the `Client` class constructors.\
    \ The host and port may be specified explicitly; if either is not specified the\
    \ default value is used. If the host and port are not specified the default. host\
    \ and port are `localhost:27017`. The default database is `test`. The following\
    \ are some of the different applications of the `Client` class constructors.\n\
    \n    ```ruby\n    client =Mongo::Client.new\n    client =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test', :connect => :direct)\n    client =Mongo::Client.new('mongodb://127.0.0.1:27017/test')\n\
    \    client = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test', :max_pool_size\
    \ => 20, :connection_timeout => 60)\n    ```\n\n    The IPv4 address of the host\
    \ may be specified instead of localhost.\n\n    ```ruby\n    client =Mongo::Client.new(['192.168.1.72:27017'\
    \ ], :database => 'test')\n    ```\n\n    The `Client` class attributes’ values\
    \ may be output, and instance methods may be invoked using the `Client` class\
    \ instance.\n\n    The `connection.rb` script for connecting to MongoDB server,\
    \ invoking some of the methods, and outputting some of the attribute values are\
    \ listed:\n\n    ```ruby\n    require 'mongo'\n    include Mongo\n    #client\
    \ =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n    #client\
    \ =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test', :connect => :direct)\n\
    \    #client =Mongo::Client.new('mongodb://127.0.0.1:27017/test')\n    client\
    \ = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test', :max_pool_size\
    \ => 20, :connection_timeout => 60)\n    print \"Cluster: \"\n    print  client.cluster\n\
    \    print \"\\n\"\n    print \"Configuration Options: \"\n    print  client.options\n\
    \    print \"\\n\"\n    print \"Read Preference: \"\n    print  client.read_preference\n\
    \    print \"\\n\"\n    print \"Write Concern : \"\n    print client.write_concern\n\
    \    print \"\\n\"\n    ```\n\n4.  From the `C:\\Ruby21-x64\\mongodbscripts` directory\
    \ run the `connection.rb` script with the following command.\n\n    ```bash\n\
    \    >ruby connection.rb\n    ```\n\n    The output from the `connection.rb` script\
    \ is shown in [Figure 4-10](#part0010.xhtml#Fig10).\n\n    ![9781484215999_Fig04-10.jpg](Images/image00518.jpeg)\n\
    \    [Figure 4-10](#part0010.xhtml#_Fig10). Running Ruby Sript connection.rb\n\
    \n### Connecting to a Database\n\nA MongoDB database instance is represented with\
    \ the `Mongo::Database` class. In this section we shall create some MongoDB database\
    \ instances and get other information about databases.\n\n1.  Create a Ruby script\
    \ `db.rb` in the `C:\\Ruby21-x64\\mongodbscripts` directory. The `Database` class\
    \ provides several instance attributes and methods. The attributes are discussed\
    \ in [Table 4-6](#part0010.xhtml#Tab6).\n\n    [Table 4-6](#part0010.xhtml#_Tab6)."
