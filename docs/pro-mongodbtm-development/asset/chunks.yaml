    \ $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}\n\
    catch(MongoCursorException $e) {\n    echo '<p>w option is set and the write has\
    \ failed</p>';\n    exit();\n}\n?>\n```\n\n在浏览器中运行`updateDocument.php`脚本，URL为`http://localhost:8000/updateDocument.php`。两个文档被更新，一个文档被插入（upserted）。在状态数组中，两个`updatedExisting`键为`true`，一个为`false`，如[图3-21](#part0009.xhtml#Fig21)所示。\n\
    \n![9781484215999_Fig03-21.jpg](Images/image00498.jpeg)\n[图 3-21](#part0009.xhtml#_Fig21).\
    \ 更新文档\n\n在Mongo shell中运行以下JavaScript方法：\n\n```javascript\n>use local\n>db.catalog.find()\n\
    ```\n\n更新/插入的文档将被列出，如[图3-22](#part0009.xhtml#Fig22)所示。\n\n![9781484215999_Fig03-22.jpg](Images/image00499.jpeg)\n\
    [图 3-22](#part0009.xhtml#_Fig22). 列出更新的文档\n\n## 更新多个文档\n\n在上一节中，我们提到了`update()`方法中的`multiple`选项，用于更新多个文档。在本节中，我们将使用`multiple`选项。\n\
    \n1.  在`C:\\php`目录中创建一个PHP脚本`updateMultiDocuments.php`。在`try`-`catch`语句中像之前一样创建一个`MongoCollection`实例。\n\
    \n    ```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    ```\n\n2.  使用`insert()`方法添加两个文档。在添加的文档中不要包含`journal`字段，因为我们将使用`update()`方法添加该字段。\n\
    \n    ```php\n    $collection->insert(array(\"catalogId\" => 'catalog1', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Engineering as a Service',\"author\" => 'David A. Kelly'));\n    $collection->insert(array(\"\
    catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
    \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert'));\n    ```\n\n3.  我们将使用更新操作符`$set`在`update()`方法中将`journal`字段添加到这些文档中，同时将`multiple`选项设置为`true`。\n\
    \n    ```php\n    $newdata = array('$set' => array(\"journal\" => \"Oracle Magazine\"\
    ));\n    ```\n\n4.  调用`update()`方法，使用`$criteria`作为`edition`字段为`November December\
    \ 2013`的文档，`$newdata`作为要更新的字段，以及`multiple`设置为`true`的选项数组。\n\n    ```php\n    $status=$collection->update(array(\"\
    edition\" => \"November December 2013\"), $newdata,array(\"multiple\" => true));\n\
    \    ```\n\n    `updateMultiDocuments.php`脚本如下：\n\n    ```php\n    <?php\n   \
    \ try\n    {\n        $connection = new MongoClient();\n        $collection=$connection->local->catalog;\n\
    \        $collection->insert(array(\"catalogId\" => 'catalog1', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" =>\
    \ 'Engineering as a Service',\"author\" => 'David A. Kelly'));\n        $collection->insert(array(\"\
    catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
    \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
    author\" => 'Tom Haunert'));\n        $newdata = array('$set' => array(\"journal\"\
    \ => \"Oracle Magazine\"));\n        $status=$collection->update(array(\"edition\"\
    \ => \"November December 2013\"), $newdata,array(\"multiple\" => true));\n   \
    \     var_dump($status);\n    }\n    catch (MongoConnectionException $e)\n   \
    \ {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n \
    \   }\n    catch(MongoCursorException $e) {\n        echo $e;\n        exit();\n\
    \    }\n    ?>\n    ```\n\n5.  在浏览器中运行`updateMultiDocuments.php`脚本，URL为`http://localhost:8000/updateMultiDocuments.php`。在输出中，`updatedExisting`键值为`true`，`nModified`键值为2，这表明两个现有文档被更新，如[图3-23](#part0009.xhtml#Fig23)所示。\n\
    \n    ![9781484215999_Fig03-23.jpg](Images/image00500.jpeg)\n    [图 3-23](#part0009.xhtml#_Fig23).\
    \ 更新多个文档\n\n6.  在Mongo shell中运行`db.catalog.find()`方法以列出更新的文档。如输出所示，文档包含了`journal`字段，如[图3-24](#part0009.xhtml#Fig24)所示。\n\
    \n    ![9781484215999_Fig03-24.jpg](Images/image00501.jpeg)\n    [图 3-24](#part0009.xhtml#_Fig24).\
    \ 列出更新的文档\n\n## 保存文档\n\n默认情况下，`insert()`方法不会添加已存在于数据库中的文档。"
