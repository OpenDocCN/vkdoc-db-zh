    >mongo connection.js

    ```


    JavaScript 代码将被求值并生成输出，对于示例 JavaScript，输出如 图 2-8 所示，是一个集合名称的列表。


    ![9781484215999_Fig02-08.jpg](img/image00432.jpeg)


    图 2-8. 运行 JavaScript 脚本


    Mongo shell 还提供了一些帮助方法来获取有关数据库、集合和文档的信息。部分帮助方法列于下表 表 2-1 中。


    表 2-1. 帮助方法


    | 帮助命令 | 描述 |

    | --- | --- |

    | `show dbs` | 列出服务器上的数据库。 |

    | `use <db>` | 选择一个数据库。在对集合或文档执行任何操作之前，必须先选择数据库。 |

    | `show collections` | 列出数据库中的所有集合。 |


    ## 使用数据库


    在以下小节中，我们将讨论获取有关数据库的信息、创建数据库和删除数据库。


    ### 获取数据库信息


    Mongo shell 有一个名为 `db` 的变量，它引用当前数据库。默认情况下，当使用 `mongo` 命令启动 Mongo shell 时，如前面章节所述，`test`
    数据库成为当前数据库。`show dbs` 命令列出服务器上的所有数据库。`db.stats()` Mongo shell 辅助方法列出当前数据库的统计信息。`listDatabases`
    命令列出所有数据库，包括总大小、每个数据库的大小以及数据库是否为空。一些命令——管理命令，例如 `listDatabases` 命令——必须在 `admin`
    数据库上运行。


    ```bash

    >show dbs

    >db.stats()

    >use admin

    >db.runCommand({listDatabases : 1})

    ```


    前面命令的输出在 Mongo shell 中显示，如 图 2-9 所示。


    ![9781484215999_Fig02-09.jpg](img/image00433.jpeg)


    图 2-9. 获取数据库信息


    ### 创建数据库实例


    当向数据库实例发送命令并执行诸如创建集合之类的操作时，MongoDB 数据库实例会被隐式创建。`use <db>` 命令可用于选择当前数据库，即使该数据库尚不存在，但
    `use <db>` 命令不会创建不存在的数据库。要创建数据库，必须在该数据库上运行一个操作。例如，使用 `show dbs` 命令列出所有数据库。随后，使用
    `use mongodb` 命令将当前数据库选择为一个不存在的数据库 `mongodb`。接着，使用 `db.createCollection(name,
    options)` 辅助方法创建一个名为 `catalog` 的集合。


    ```bash

    >show dbs

    >use mongodb

    >show dbs

    >db.createCollection("catalog")

    >show dbs

    ```


    如果在 `use mongodb` 命令之后运行 `show dbs` 命令，则 `mongodb` 数据库不会被列出；但如果在 `db.createCollection()`
    命令之后运行 `show dbs` 命令，则 `mongodb` 数据库会被列出，如 图 2-10 所示。


    ![9781484215999_Fig02-10.jpg](img/image00434.jpeg)


    图 2-10. 创建数据库实例


    `db.copyDatabase(fromdb, todb, fromhost, username, password, mechanism)` 命令可用于将一个数据库复制到另一个数据库。目标数据库会被创建。例如，将数据库
    `local` 复制到一个名为 `catalog` 的新数据库。


    ```javascript

    db.copyDatabase(''local'', ''catalog'')

    ```


    如果在 `db.copyDatabase()` 命令之前和之后运行 `show dbs` 命令，之后运行的命令会列出 `catalog` 数据库，如 图 2-11
    所示。


    ![9781484215999_Fig02-11.jpg](img/image00435.jpeg)


    图 2-11. 复制数据库实例


    ### 删除数据库


    要删除当前数据库，请使用 `db.dropDatabase()` 方法。当前数据库是用 `use <db>` 命令设置的数据库。即使删除了数据库，当前数据库名称也不会改变，并且如果创建了一个新集合，它将在使用新数据文件的、与被删除数据库同名的数据库中创建。例如，使用
    `show dbs` 命令列出所有数据库。随后，将当前数据库设置为列出的数据库之一，例如数据库 `catalog`。选择用于删除的数据库可以不同，不一定名为
    `catalog`。接着，调用 `db.dropDatabase()` 方法删除当前数据库，即数据库 `mongo`。如果随后调用 `show dbs` 命令，则不会列出
    `catalog` 数据库。


    ```bash

    >show dbs

    >use catalog

    >db.dropDatabase()

    >show dbs

    ```


    `db.dropDatabase()` 方法返回一个包含字段 "dropped" 和 "ok" 的文档。"dropped" 字段的值是被删除的数据库，"ok"
    字段值为 1 表示方法无错误返回，如 图 2-12 所示。


    ![9781484215999_Fig02-12.jpg](img/image00436.jpeg)


    图 2-12. 删除数据库


    要退出 Mongo shell，请运行 `quit()` 命令或 `exit` 命令。


    ```bash

    >quit()

    ```


    Mongo shell 会话结束，如 图 2-13 所示。


    ![9781484215999_Fig02-13.jpg](img/image00437.jpeg)


    图 2-13. 结束 Mongo Shell 会话


    ## 使用集合


    在以下小节中，我们将在 Mongo shell 中创建一个集合，随后删除一个集合。


    ### 创建集合


    `create` 命令用于创建集合。我们之前已经讨论了使用 `create` 命令创建集合（参见“在 mongo Shell 中运行命令或方法”）。`show
    collections` 命令可用于列出数据库中的集合。


    ```bash

    >use test

    >show collections

    ```


    数据库中的集合被列出，如 图 2-14 所示。


    ![9781484215999_Fig02-14.jpg](img/image00438.jpeg)


    图 2-14. 使用 show collections 列出集合


    列出的集合可能因用户而异，但无论用户是谁，都应列出 `system.indexes` 集合。一个集合只有在被创建之后才会被列出。例如，在 test 数据库中，先列出集合，然后运行
    `db.createCollection()` 方法创建一个名为 `catalog` 的集合，之后再次列出集合。如果 `catalog` 集合已经存在，请使用
    `db.catalog.drop()` 删除它。


    ```bash

    >use test

    >db.catalog.drop()

    >show collections

    >db.createCollection("catalog")

    >show collections

    ```


    在 `db.createCollection()` 方法之后运行的 `show collections` 命令会列出 `catalog` 集合，如 图 2-15
    所示。列出的其他集合可能因用户而异。


    ![9781484215999_Fig02-15.jpg](img/image00439.jpeg)


    图 2-15. 创建集合后运行 show collections'
- fmt: '# 固定集合


    ## 创建固定集合


    一个 *capped* 集合是具有固定大小的集合，类似于循环列表。当固定集合已满时，数据会被覆盖。数据无法从固定集合中删除。例如，创建一个名为 `catalog`
    的固定集合，启用自动索引，大小为 64 KB，最大文档数为 1000。在创建固定的 `catalog` 集合之前，使用 `db.catalog.drop()`
    命令删除先前创建的同名集合（删除操作将在下一节详细讨论）。


    ```

    >use test

    >db.catalog.drop()

    >db.createCollection("catalog", {capped: true, autoIndexId: true, size: 64 * 1024,
    max: 1000} )

    ```


    返回的响应中 `ok` 字段为 1，表示固定集合已创建，如 [图 2-16](#part0008.xhtml#Fig16) 所示。


    ![9781484215999_Fig02-16.jpg](Images/image00440.jpeg)


    [图 2-16](#part0008.xhtml#_Fig16). 创建固定集合


    `create` 命令也可以使用 `db.runCommand()` 方法运行。同样地，如果 `catalog` 集合已存在，则先将其删除。如果已在使用 `test`
    数据库，则无需重新运行 `use test` 命令。


    ```

    >use test

    >db.catalog.drop()

    >db.runCommand( { create: "catalog", capped: true, size: 64 * 1024, max: 1000
    } )

    ```


    固定集合已创建，如 [图 2-17](#part0008.xhtml#Fig17) 中所示的 `"ok": 1` 响应所示。


    ![9781484215999_Fig02-17.jpg](Images/image00441.jpeg)


    [图 2-17](#part0008.xhtml#_Fig17). 使用 runCommand() 创建固定集合


    集合不能已存在，否则会生成错误。例如，在 `catalog` 集合已存在时再次创建它。会输出“collection already exists”错误信息，如
    [图 2-18](#part0008.xhtml#Fig18) 所示。


    ![9781484215999_Fig02-18.jpg](Images/image00442.jpeg)


    [图 2-18](#part0008.xhtml#_Fig18). “集合已存在”错误信息


    ## 管理集合


    可以使用辅助方法 `db.collection.count()` 列出集合中的文档数量。例如，以下方法列出了 `catalog` 集合中的文档计数。


    ```

    >db.catalog.count()

    ```


    输出为 0 表示尚未向 `catalog` 集合添加任何文档，如 [图 2-19](#part0008.xhtml#Fig19) 所示。


    ![9781484215999_Fig02-19.jpg](Images/image00443.jpeg)


    [图 2-19](#part0008.xhtml#_Fig19). 列出文档计数


    可以使用 `db.collection.stats()` 方法列出集合的统计信息。例如，以下方法列出了 `catalog` 集合的统计信息。


    ```

    >db.catalog.stats()

    ```


    集合统计信息输出包括集合命名空间（格式为 `<database>.<collection>`）、文档计数、集合是否为固定集合、存储大小、最大文档数等，如 [图
    2-20](#part0008.xhtml#Fig20) 所示。


    ![9781484215999_Fig02-20.jpg](Images/image00444.jpeg)


    [图 2-20](#part0008.xhtml#_Fig20). 使用 stats() 方法列出统计信息


    可以使用 `db.collection.renameCollection(target, dropTarget)` 方法重命名集合。默认情况下，`dropTarget
    boolean` 为 `false`，表示如果已存在与新集合名同名的集合，则目标集合应被删除。例如，将 `mongo` 集合重命名为 `mongodb`。


    ```

    >db.mongo.renameCollection(''mongodb'', false)

    ```


    返回的 `"ok": 1` 响应表示 `mongo` 集合已被重命名，如 [图 2-21](#part0008.xhtml#Fig21) 所示。如果在重命名后运行
    `show collections` 命令，它将列出重命名后的集合 `mongodb`，而不是重命名前列出的 `mongo` 集合。


    ![9781484215999_Fig02-21.jpg](Images/image00445.jpeg)


    [图 2-21](#part0008.xhtml#_Fig21). 重命名集合


    ## 删除集合


    要从数据库中移除集合，请调用 `db.collection.drop()` 方法。例如，调用 `show collections` 命令列出所有集合。随后删除
    `catalog` 集合。'
  raw: 'A *capped* collection is a collection with a fixed size, similar to a circular
    list. When a capped collection is full the data gets overwritten. Data cannot
    be deleted from a capped collection. For example, create a capped collection `catalog`
    with auto indexing and 64 KB size with maximum number of documents as 1000\. Before
    creating the capped `catalog` collection, drop the collection if created previously
    using the `db.catalog.drop()` command. (Dropping is discussed in more detail in
    the following section.)


    ```

    >use test

    >db.catalog.drop()

    >db.createCollection("catalog", {capped: true, autoIndexId: true, size: 64 * 1024,
    max: 1000} )

    ```


    A response with `ok` field as 1 indicates the capped collection gets created as
    shown in [Figure 2-16](#part0008.xhtml#Fig16).


    ![9781484215999_Fig02-16.jpg](Images/image00440.jpeg)


    [Figure 2-16](#part0008.xhtml#_Fig16). Creating a Capped Collection


    The `create` command may also be run using the `db.runCommand()` method. As before,
    if the `catalog` collection already exists drop it first. The `use test` command
    is not required to be rerun if already using the `test` database.


    ```

    >use test

    >db.catalog.drop()

    >db.runCommand( { create: "catalog", capped: true, size: 64 * 1024, max: 1000
    } )

    ```


    The capped collection gets created as indicated by the `"ok": 1` response in [Figure
    2-17](#part0008.xhtml#Fig17).


    ![9781484215999_Fig02-17.jpg](Images/image00441.jpeg)


    [Figure 2-17](#part0008.xhtml#_Fig17). Creating a Capped Collection with runCommand()


    A collection must not already exist or an error gets generated. For example, create
    the `catalog` collection when it already exists. The “collection already exists”
    error message gets output as shown in [Figure 2-18](#part0008.xhtml#Fig18).


    ![9781484215999_Fig02-18.jpg](Images/image00442.jpeg)


    [Figure 2-18](#part0008.xhtml#_Fig18). The “collection already exists” Error Message


    The number of documents in a collection may be listed with the following helper
    method `db.collection.count()`. For example, the following method lists the document
    count in the `catalog` collection.


    ```

    >db.catalog.count()

    ```


    An output of 0 indicates no documents in the `catalog` collection have been added,
    as shown in [Figure 2-19](#part0008.xhtml#Fig19)


    ![9781484215999_Fig02-19.jpg](Images/image00443.jpeg)


    [Figure 2-19](#part0008.xhtml#_Fig19). Listing the Document Count


    .


    The stats on a collection may be listed with the following `db.collection.stats()`
    method. For example, the following method lists the stats on the `catalog` collection.


    ```

    >db.catalog.stats()

    ```


    The collection stats output include the collection namespace in the format `<database>.<collection>`,
    the document count, if the collection is capped, the storage size, and the maximum
    number of documents and more as shown in [Figure 2-20](#part0008.xhtml#Fig20).


    ![9781484215999_Fig02-20.jpg](Images/image00444.jpeg)


    [Figure 2-20](#part0008.xhtml#_Fig20). Listing Stats with the stats() Method


    A collection may be renamed with the `db.collection.renameCollection(target, dropTarget)`
    method. By default the `dropTarget boolean` is `false` indicating if a collection
    by the same name as the new name of the collection already exists should the target
    collection be dropped. For example, rename the `mongo` collection to `mongodb`.


    ```

    >db.mongo.renameCollection(''mongodb'', false)

    ```


    A response of `"ok": 1` indicates the `mongo` collection gets renamed as shown
    in [Figure 2-21](#part0008.xhtml#Fig21). If you run the `show collections` command
    after the renaming, it lists the renamed collection `mongodb` instead of the `mongo`
    collection listed prior to renaming.


    ![9781484215999_Fig02-21.jpg](Images/image00445.jpeg)


    [Figure 2-21](#part0008.xhtml#_Fig21). Renaming a Collection


    Dropping a Collection


    To remove a collection from the database invoke the `db.collection.drop()` method.
    For example, invoke the `show collections` command to list all collections. Subsequently
    drop the `catalog` collection.'
