    \ New ![image](Images/image00406.jpeg) Other, and in the New window, select Java\
    \ ![image](Images/image00406.jpeg) Class as shown in [Figure 1-6](#part0007.xhtml#Fig6).\n\
    \n![9781484215999_Fig01-06.jpg](Images/image00411.jpeg)\n\n[Figure 1-6](#part0007.xhtml#_Fig6).\
    \ Selecting Java ![image](Images/image00406.jpeg) Class\n\n5.  In New Java Class\
    \ wizard the Source folder is preselected as `MongoDBJava/src/main/java`. Specify\
