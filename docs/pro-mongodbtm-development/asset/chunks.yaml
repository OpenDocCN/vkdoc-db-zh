    \    }\n    }catch (MongoConnectionException $e)\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo $e;\n        exit();\n    }\n    ?>\n    ```\n\n9.  Run the\
    \ `findDocumentSet.php` script in a browser with URL `http://localhost:8000/findDocumentSet.php`\
    \ to output the selected fields from the selected documents as shown in [Figure\
    \ 3-18](#part0009.xhtml#Fig18).\n\n![9781484215999_Fig03-18.jpg](Images/image00495.jpeg)\n\
    \n[Figure 3-18](#part0009.xhtml#_Fig18). Finding Subset of Fields for Subset of\
    \ Documents\n\n10.  To select all documents specify the query as follows.\n\n\
    ```\n    $query = array();\n    ```\n\nWhen the `findDocumentSet.php` script is\
    \ run in the browser to select all documents, the selected fields from all documents\
    \ get selected as shown in [Figure 3-19](#part0009.xhtml#Fig19).\n\n![9781484215999_Fig03-19.jpg](Images/image00496.jpeg)\n\
    \n[Figure 3-19](#part0009.xhtml#_Fig19). Finding Subset of Fields for All Documents\n\
    \nUpdating a Document\n\nThe `MongoCollection::update()` method is used to update\
    \ one or more documents based on a specified criteria. The method returns a status\
    \ array if `w` option is set or returns a `boolean`. The method syntax takes the\
    \ `$criteria`, `$new_object` and `$options` parameters all of type array.\n\n\
    ```\nMongoCollection::update ( array $criteria , array $new_object [, array $options\
    \ = array() ] )\n```\n\nThe method parameters are discussed in [Table 3-6](#part0009.xhtml#Tab6).\n\
    \n[Table 3-6](#part0009.xhtml#_Tab6). Parameters for the Update Method\n\n| Parameter\
    \ | Description |\n| --- | --- |\n| `$criteria` | Query criteria for the documents\
    \ to update. |\n| `$new_object` | The replacement document if the new object contains\
    \ key=>value pairs. Or if the new object contains update operators the specific\
    \ fields to update. |\n| `$options` | The main options are `upsert`, `w.` and\
    \ `multiple`. The `upsert` option if set to true adds a new document if no document\
    \ matches criteria. The default value of `upsert` is false. The default value\
    \ of `w` is 1\\. The `multiple` option if set to true updates multiple documents.\
    \ Default value of `multiple` is false. |\n\nNext, we shall update some documents.\n\
    \n1.  First, we need to add the documents to update. Run the `addDocumentBatch.php`\
    \ script with URL `http://localhost:8000/addDocumentBatch.php` as shown in [Figure\
    \ 3-20](#part0009.xhtml#Fig20) to add two documents to the `catalog` collection\
    \ in the `local` database. The document `_id` is output. We shall use these `_id`\
    \ values to update the documents. The `_id` values would be different for different\
    \ users.\n\n![9781484215999_Fig03-20.jpg](Images/image00497.jpeg)\n\n[Figure 3-20](#part0009.xhtml#_Fig20).\
    \ Adding a Batch of Documents\n\n2.  Create a PHP script `updateDocument.php`\
    \ in the `C:\\php` directory. In a `try`-`catch` statement create a connection\
    \ with MongoDB using a `MongoClient` instance. Create a `MongoCollection` instance\
    \ for the `catalog` collection in the `local` database.\n\n```\n    $connection\
    \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    ```\n\
    \n3.  Specify the `$criteria` for the document to update by setting the `_id`\
    \ field in the array to a `MongoId` instance constructed from `53f3d425098c6e2410000065`,\
    \ which is the `_id` for one of the documents added to the `catalog` collection\
    \ with `addDocumentBatch.php`.The `_id` value would be different for different\
    \ users.\n\n```\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000043\
    \ \"));\n    ```\n\n4.  Specify a `$new_object` using key=>value pairs for the\
    \ replacement document. Add a new field “updated” set to “true.”\n\n```\n    $new_object\
    \ = array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\"\
    \ => 'Oracle Publishing', \"edition\" => '11-12-2013',\"title\" => 'Engineering\
    \ As a Service',\"author\" => 'Kelly, David A.', \"updated\"=>true);\n    ```\n\
    \n5.  Invoke the `update()` method using the `$criteria` and `$new_object` and\
    \ using an options array with `upsert` set to `false`.\n\n```\n    $status=$collection->update($criteria,$new_object,\
    \ array(\"upsert\" => false));\n    var_dump($status);\n    ```\n\n6.  Similarly,\
    \ update another document.\n\n```\n    $criteria = array(\"_id\" => new MongoId(\"\
    55bba68a098c6e1c19000044\"));\n    $new_object = array(\"catalogId\" => 'catalog2',\
    \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
    \ => '11-12-2013',\"title\" => 'Quintessential and Collaborative',\"author\" =>\
    \ 'Haunert, Tom', \"updated\"=>true);\n    $status=$collection->update($criteria,$new_object,\
    \ array(\"upsert\" => false));\n    var_dump($status);\n    ```\n\nWe set the\
    \ `upsert` option to false in the preceding document updates. Next we shall invoke\
    \ the `update` method using `upsert` option set to true.\n\nTo demonstrate that\
    \ `upsert` adds new document if a document for the `$criteria` is not found specify\
    \ a `$criteria` using a `_id` that does not already exist in the database. The\
    \ same `_id` value may be used by different users as in the `updateDocument.php`\
    \ script listed`.`"
  trans: "\n# 使用 MongoDB 查询与更新文档\n\n## 查询文档集合\n\n以下 PHP 代码演示了如何使用游标遍历查询结果：\n\n```php\n\
    \    while ($cursor->hasNext())\n    {\n        var_dump($cursor->getNext());\n\
    \    }\n    ?>\n```\n\n`findDocumentSet.php` 脚本如下：\n\n```php\n    <?php\n    try\n\
    \    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    $query = array('catalogId'=>'catalog1');\n    $fields = array('title' =>\
    \ true, 'author' => true);\n    $cursor = $collection->find($query, $fields);\n\
    \    while ($cursor->hasNext())\n    {\n        var_dump($cursor->getNext());\n\
    \    }\n    }catch (MongoConnectionException $e)\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo $e;\n        exit();\n    }\n    ?>\n```\n\n9.  在浏览器中运行 `findDocumentSet.php`\
    \ 脚本，URL 为 `http://localhost:8000/findDocumentSet.php`，将输出从选定文档中选择的字段，如 图 3-18\
    \ 所示。\n\n![9781484215999_Fig03-18.jpg](img/image00495.jpeg)\n\n图 3-18. 为文档子集查找字段子集\n\
    \n10. 要选择所有文档，请按如下方式指定查询：\n\n```php\n    $query = array();\n```\n\n当在浏览器中运行 `findDocumentSet.php`\
    \ 脚本以选择所有文档时，将选择所有文档的选定字段，如 图 3-19 所示。\n\n![9781484215999_Fig03-19.jpg](img/image00496.jpeg)\n\
    \n图 3-19. 为所有文档查找字段子集\n\n## 更新文档\n\n`MongoCollection::update()` 方法用于根据指定条件更新一个或多个文档。如果设置了\
    \ `w` 选项，该方法返回一个状态数组，否则返回一个布尔值。该方法的语法接受 `$criteria`、`$new_object` 和 `$options`\
    \ 参数，均为数组类型。\n\n```\nMongoCollection::update ( array $criteria , array $new_object\
    \ [, array $options = array() ] )\n```\n\n方法参数在 表 3-6 中讨论。\n\n表 3-6. Update 方法的参数\n\
    \n| 参数 | 描述 |\n| --- | --- |\n| `$criteria` | 要更新的文档的查询条件。 |\n| `$new_object`\
    \ | 如果新对象包含 key=>value 对，则为替换文档。或者，如果新对象包含更新操作符，则为要更新的特定字段。 |\n| `$options` |\
    \ 主要选项是 `upsert`、`w.` 和 `multiple`。如果 `upsert` 选项设置为 true，则在没有文档匹配条件时添加新文档。`upsert`\
    \ 的默认值为 false。`w` 的默认值为 1。如果 `multiple` 选项设置为 true，则更新多个文档。`multiple` 的默认值为 false。\
    \ |\n\n接下来，我们将更新一些文档。\n\n1.  首先，我们需要添加要更新的文档。运行 `addDocumentBatch.php` 脚本，URL\
    \ 为 `http://localhost:8000/addDocumentBatch.php`，如 图 3-20 所示，向 `local` 数据库中的 `catalog`\
    \ 集合添加两个文档。文档 `_id` 被输出。我们将使用这些 `_id` 值来更新文档。不同用户的 `_id` 值会不同。\n\n![9781484215999_Fig03-20.jpg](img/image00497.jpeg)\n\
    \n图 3-20. 添加一批文档\n\n2.  在 `C:\\php` 目录中创建 PHP 脚本 `updateDocument.php`。在 `try`-`catch`\
    \ 语句中，使用 `MongoClient` 实例创建与 MongoDB 的连接。为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection`\
    \ 实例。\n\n```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    ```\n\n3.  通过将数组中的 `_id` 字段设置为从 `53f3d425098c6e2410000065`（这是使用 `addDocumentBatch.php`\
    \ 添加到 `catalog` 集合的其中一个文档的 `_id`）构造的 `MongoId` 实例，来指定要更新文档的 `$criteria`。不同用户的\
    \ `_id` 值会不同。\n\n```php\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000043\
    \ \"));\n```\n\n4.  使用 key=>value 对为替换文档指定 `$new_object`。添加一个新字段 “updated” 并设置为\
    \ “true。”\n\n```php\n    $new_object = array(\"catalogId\" => 'catalog1', \"journal\"\
    \ => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"\
    title\" => 'Engineering As a Service',\"author\" => 'Kelly, David A.', \"updated\"\
    =>true);\n```\n\n5.  使用 `$criteria` 和 `$new_object` 调用 `update()` 方法，并使用一个 `upsert`\
    \ 设置为 `false` 的选项数组。\n\n```php\n    $status=$collection->update($criteria,$new_object,\
    \ array(\"upsert\" => false));\n    var_dump($status);\n```\n\n6.  类似地，更新另一个文档。\n\
    \n```php\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000044\"\
    ));\n    $new_object = array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle\
    \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"\
    title\" => 'Quintessential and Collaborative',\"author\" => 'Haunert, Tom', \"\
    updated\"=>true);\n    $status=$collection->update($criteria,$new_object, array(\"\
    upsert\" => false));\n    var_dump($status);\n```\n\n我们在前面的文档更新中将 `upsert` 选项设置为\
    \ false。接下来，我们将使用 `upsert` 选项设置为 true 来调用 `update` 方法。\n\n为了演示如果未找到符合 `$criteria`\
    \ 的文档，`upsert` 会添加新文档，请指定一个在数据库中不存在的 `_id` 的 `$criteria`。与 `updateDocument.php`\
    \ 脚本中一样，不同的用户可以使用相同的 `_id` 值。\n"
