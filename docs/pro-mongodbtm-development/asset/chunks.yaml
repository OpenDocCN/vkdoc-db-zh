  trans: "\n|  | `remove(Query query, String collectionName)` | 从给定集合中移除所有匹配指定查询的文档。\
    \ | `MongoOperations`接口也提供了重载的`findAndRemove()`方法，用于查找并移除单个文档，如表 10-16 所述。 表 10-16\
    \ 重载的`findAndRemove()`方法 | 方法 | 描述 | | --- | --- | | `findAndRemove(Query query,\
    \ Class<T> entityClass)` | 从给定实体类的集合中查找并移除单个文档。匹配给定查询的第一个文档将被移除。 | | `findAndRemove(Query\
    \ query, Class<T> entityClass, String collectionName)` | 从给定集合中查找并移除指定实体类类型的单个文档。匹配给定查询的第一个文档将被移除。\
    \ | 首先，我们来看一个使用`remove()`方法的示例。\n\n1.  在`App`应用程序的自定义`remove()`类方法中（不要与`MongoOperations`接口中的`remove()`方法混淆），创建并保存两个`Catalog`实例。\n\
    2.  使用`_id`字段作为键，`catalog1`实例中的 id 字段值作为值，创建一个`BasicDBObject`实例。使用该`BasicDBObject`实例创建一个`BasicQuery`实例。\n\
    \n    ```\n    DBObject dbObject = new BasicDBObject(\"_id\", catalog1.getId());\n\
    \    BasicQuery query = new BasicQuery(dbObject);\n    ```\n\n3.  调用某个`remove()`方法来移除所有匹配指定查询的文档。输出`remove()`方法的结果。\n\
    \n    ```\n    WriteResult result = ops.remove(query, Catalog.class);\n    //WriteResult\
    \ result = ops.remove(query, \"catalog\");\n    //WriteResult result = ops.remove(query,\
    \ Catalog.class, \"catalog\");\n    System.out.println(result);\n    ```\n\n4.\
    \  随后调用`findAll()`方法来查找并列出所有文档。当运行`App`应用程序以调用`remove()`方法时，匹配给定查询的文档将被移除。在此示例中，两个文档中的一个被移除，另一个通过`findAll()`列出，如图\
    \ 10-19 所示。\n\n    ![9781484215999_Fig10-19.jpg](img/image00680.jpeg)\n    图 10-19\
    \ 使用`remove()`移除单个文档\n\n5.  要移除所有文档，可以使用以下查询。\n\n    ```\n    DBObject dbObject\
    \ = new BasicDBObject(\"edition\",\"November-December 2013\");\n    BasicQuery\
    \ query = new BasicQuery(dbObject);\n    ```\n\n    当使用前面的查询调用`remove()`方法时，添加的两个文档将被移除，如`n`字段值为\
    \ 2 所示，如图 10-20 所示。\n\n    ![9781484215999_Fig10-20.jpg](img/image00681.jpeg)\n\
    \    图 10-20 使用`remove()`移除多个文档\n\n`App`应用程序中的`remove()`方法如下。\n\n```\nprivate\
    \ static void remove() {\n    createCatalogInstances();\n    ops.save(catalog1);\n\
    \    ops.save(catalog2);\n    //DBObject dbObject = new BasicDBObject(\"edition\"\
    ,\"November-December 2013\");\n    DBObject dbObject = new BasicDBObject(\"_id\"\
    , catalog1.getId());\n    BasicQuery query = new BasicQuery(dbObject);\n    WriteResult\
    \ result = ops.remove(query, Catalog.class);\n    // WriteResult result = ops.remove(query,\
    \ \"catalog\");\n    System.out.println(result);\n\n    List<Catalog> list = ops.findAll(Catalog.class);\n\
    \    Iterator<Catalog> iter = list.iterator();\n    while (iter.hasNext()) {\n\
    \        Catalog catalog = iter.next();\n        System.out.println(\"Journal\
    \ : \" + catalog.getJournal());\n        System.out.println(\"Publisher : \" +\
    \ catalog.getPublisher());\n        System.out.println(\"Edition : \" + catalog.getEdition());\n\
    \        System.out.println(\"Title : \" + catalog.getTitle());\n        System.out.println(\"\
    Author : \" + catalog.getAuthor());\n    }\n}\n```\n\n接下来，我们将演示`findAndModify()`方法。\n\
    \n1.  创建一个`BasicQuery`对象以查找具有特定`_id`字段值的所有文档。由于`_id`字段值是唯一的，该查询应仅返回一个文档。\n\n \
    \   ```\n    DBObject dbObject = new BasicDBObject(\"_id\", catalog1.getId());\n\
    \    BasicQuery query = new BasicQuery(dbObject);\n    ```\n\n2.  使用该查询调用某个`findAndRemove()`方法。\n\
    \n    ```\n    Catalog catalog = ops.findAndRemove(query, Catalog.class);\n  \
    \  //Catalog catalog = ops.findAndRemove(query, Catalog.class, \"catalog\");\n\
    \    ```\n\n3.  `findAndRemove()`方法返回找到并被移除的文档。输出被移除文档的字段值。当运行`App`应用程序时，匹配查询的文档将被移除，其字段值将输出到\
