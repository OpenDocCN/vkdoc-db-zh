    , \"Oracle Publishing\",\n                \"11-12-2013\", \"Engineering as a Service\"\
    , \"Kelly, David\");\n\n        catalog2 = new Catalog(\"\", \"Oracle Magazine\"\
    , \"Oracle Publishing\",\n                \"11-12-2013\", \"Quintessential and\
    \ Collaborative\",\n                \"Haunert, Tom\");\n        entities = new\
    \ ArrayList<Catalog>();\n        entities.add(catalog1);\n        entities.add(catalog2);\n\
    \        repository.save(entities);\n        repository.delete(catalog1.getId());\n\
    \        findAll();\n    }\n\n    public static void saveBatch() {\n\n       \
    \ catalog1 = new Catalog(\"\", \"Oracle Magazine\", \"Oracle Publishing\",\n \
    \               \"11-12-2013\", \"Engineering as a Service\", \"Kelly, David\"\
    );\n\n        catalog2 = new Catalog(\"\", \"Oracle Magazine\", \"Oracle Publishing\"\
    ,\n                \"11-12-2013\", \"Quintessential and Collaborative\",\n   \
    \             \"Haunert, Tom\");\n        entities = new ArrayList<Catalog>();\n\
    \        entities.add(catalog1);\n        entities.add(catalog2);\n        repository.save(entities);\n\
    \        findAll();\n\n    }\n\n    public static void save() {\n\n        Catalog\
    \ catalog = new Catalog(\"\", \"Oracle Magazine\",\n                \"Oracle Publishing\"\
    , \"11-12-2013\", \"Engineering as a Service\",\n                \"Kelly, David\"\
    );\n        repository.save(catalog);\n        findAll();\n    }\n\n    public\
    \ static void findOne(String id) {\n\n        Catalog catalog = repository.findOne(id);\n\
    \        System.out.println(\"Journal: \" + catalog.getJournal());\n        System.out.println(\"\
    Publisher: \" + catalog.getPublisher());\n        System.out.println(\"Edition:\
    \ \" + catalog.getEdition());\n        System.out.println(\"Title: \" + catalog.getTitle());\n\
    \        System.out.println(\"Author: \" + catalog.getAuthor());\n\n    }\n\n\
    \    public static void count() {\n        System.out.println(\"Number of documents:\
    \ \" + repository.count());\n\n    }\n\n    public static void findAll() {\n\n\
    \        Iterable<Catalog> iterable = repository.findAll();\n\n        Iterator<Catalog>\
    \ iter = iterable.iterator();\n        while (iter.hasNext()) {\n            Catalog\
    \ catalog = iter.next();\n\n            System.out.println(\"Journal: \" + catalog.getJournal());\n\
    \            System.out.println(\"Publisher: \" + catalog.getPublisher());\n \
    \           System.out.println(\"Edition: \" + catalog.getEdition());\n      \
    \      System.out.println(\"Title: \" + catalog.getTitle());\n            System.out.println(\"\
    Author: \" + catalog.getAuthor());\n        }\n    }\n\n}\n```\n\n## 总结\n\n在本章中，我们使用了\
    \ Spring Data MongoDB 项目与 MongoDB 服务器。对 MongoDB 数据存储的常见 CRUD 操作可以通过`org.springframework.data.mongodb.core.MongoOperations`接口和`org.springframework.data.mongodb.repository.MongoRepository`来执行。本章我们讨论了使用这两个接口对\
    \ MongoDB 进行 CRUD 操作。在下一章中，我们将讨论 MongoDB 与 Hadoop 的集成，并在 MongoDB 之上创建一个 Apache\
    \ Hive 表。\n\n## 第十一章\n\n![image](img/image00404.jpeg)\n\n## 使用 MongoDB 创建 Apache\
    \ Hive 表\n\nMongoDB 是领先的 NoSQL 数据库。MongoDB 基于 BSON（二进制 JSON）文档格式，该格式基于动态模式，提供了存储的灵活性。Hive\
    \ MongoDB 存储处理器使得从 Apache Hive 访问 MongoDB 变得可行。可以在 MongoDB 文档存储上创建一个 Hive 外部表。在本章中，我们将在\
    \ MongoDB 中创建一个文档存储，然后在该 MongoDB 文档存储上创建一个 Hive 外部表。\n\nApache Hadoop 是一个用于大规模数据集分布式处理的框架。Apache\
    \ Hadoop 文件系统是 Hadoop 分布式文件系统（HDFS）。Apache Hive 是一个用于查询和管理存储在分布式存储上的大型数据集的软件，默认是\
    \ HDFS。本章假设读者具备 Apache Hadoop（参考：`https://hadoop.apache.org/`）和 Apache Hive（参考：`https://hive.apache.org/`）的知识，因为我们不会讨论\
    \ HDFS 是什么或 HDFS 如何为 Hive 存储数据。我们还将使用一些 Hadoop shell 命令。本章包括以下主题：\n\n*   Hive\
    \ MongoDB 存储处理器概述\n*   设置环境\n*   创建 MongoDB 数据存储\n*   在 Hive 中创建外部表\n\n### Hive\
    \ MongoDB 存储处理器概述\n\nApache Hive 支持两种类型的表：*managed*表和*external*表。\n"
- fmt: "# Hive管理表与外部表及MongoDB存储处理器\n\nHive管理表与外部表的区别在于，管理表由Hive管理，这意味着表的元数据和数据都由Hive管理。对于外部表，Hive只管理元数据，而不管理表数据。如果删除一个Hive管理表，数据和元数据都会被删除。但如果删除一个Hive外部表，则只会删除元数据，而不会删除表数据。Hive外部表适用于数据存储在外部数据源（如MongoDB数据库）中的场景。本节我们将介绍Hive\
    \ MongoDB存储处理器，它用于在MongoDB数据库上创建Hive外部表。\n\nHive的MongoDB存储处理器类是`org.yong3.hive.mongo.MongoStorageHandler`。该存储处理器仅支持Hive原始类型，如`int`和`string`。MongoDB存储处理器提供了serde属性`mongo.column.mapping`，用于指定要映射到Hive外部表的MongoDB数据存储列名。此外，还支持以下`tblproperties`属性（见表11-1）。\n\
    \n表11-1. Mongo存储处理器属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `mongo.host` | MongoDB主机名。\
    \ |\n| `mongo.port` | MongoDB端口。 |\n| `mongo.db` | MongoDB数据库。 |\n| `mongo.user`\
    \ | MongoDB用户名。 |\n| `mongo.passwd` | MongoDB密码。 |\n| `mongo.collection` | MongoDB集合。\
    \ |\n\n## 环境设置\n\n本章需要以下软件：\n\n*   Hadoop 2.0.0 CDH 4.6\n*   Hive 0.10.0 CDH 4.6\n\
    *   MongoDB Java Driver 2.11.3\n*   MongoDB Storage Handler for Hive 0.0.3\n*\
    \   MongoDB 2.6.3\n*   Eclipse IDE for Java EE Developers\n*   Java 7\n\n也可以使用所列软件的更高版本。从`https://github.com/yc-huang/Hive-mongo`下载MongoDB存储处理器，并将zip文件解压到一个目录。包含存储处理器的Jar文件位于`Hive-mongo-master/release`目录中。使用`hive-mongo-0.0.3-jar-with-dependencies.jar`文件，其中包含了所有必需的依赖项。从`http://central.maven.org/maven2/org/mongodb/mongo-java-driver/`下载MongoDB\
    \ Java驱动程序Jar文件`mongo-java-driver-2.11.3.jar`或更高版本。\n\n完成以下步骤来设置环境：\n\n1.  我们使用了安装在Oracle\
    \ VirtualBox 4.3上的Oracle Linux 6.5。但也可以使用不同的Linux发行版。Oracle Linux基于RedHat Linux，是最常用的Linux发行版之一。创建MongoDB和其他软件的目录并设置权限。\n\
    \n    ```\n    mkdir /mongodb\n    chmod -R 777 /mongodb\n    cd /mongodb\n  \
    \  ```\n\n2.  下载Java 7并将文件解压到`/mongodb`目录。\n\n    ```\n    tar zxvf jdk-7u55-linux-i586.gz\n\
    \    ```\n\n3.  下载Hadoop 2.0.0并将`tar.gz`文件解压到一个目录。\n\n    ```\n    wget http://archive.cloudera.com/cdh4/cdh/4/hadoop-2.0.0-cdh4.6.0.tar.gz\n\
    \    tar -xvf hadoop-2.0.0-cdh4.6.0.tar.gz\n    ```\n\n4.  为Hadoop的`bin`和`conf`目录创建符号链接。\n\
    \n    ```\n    ln -s /mongodb/hadoop-2.0.0-cdh4.6.0/bin /oranosql/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2/bin\n\
    \    ln -s /mongodb/hadoop-2.0.0-cdh4.6.0/etc/hadoop /oranosql/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2/conf\n\
    \    ```\n\n5.  在`core-site.xml`和`hdfs-site.xml`配置文件中配置Hadoop。在下面列出的`core-site.xml`中，设置`fs.defaultFS`和`hadoop.tmp.dir`属性。\n\
    \n    ```\n    <?xml-stylesheet type=\"text/xsl\" href=\"configuration.xsl\"?>\n\
    \    <!-- Put site-specific property overrides in this file. -->\n    <configuration>\n\
    \    <property>\n      <name>fs.defaultFS</name>\n        <value>hdfs://10.0.2.15:8020</value>\n\
    \    </property>\n    <property>\n        <name>hadoop.tmp.dir</name>\n      \
    \  <value>file:///var/lib/hadoop-0.20/cache</value>\n    </property>\n    </configuration>\n\
    \    ```\n\n6.  创建为`hadoop.tmp.dir`属性指定的目录，并将其权限设置为全局（`777`）。\n\n    ```\n   \
    \ mkdir -p /var/lib/hadoop-0.20/cache\n    chmod -R 777 /var/lib/hadoop-0.20/cache\n\
    \    ```\n\n7.  在下面列出的`hdfs-site.xml`配置文件中，设置`dfs.permissions.superusergroup`、`dfs.namenode.name.dir`、`dfs.replication`和`dfs.permissions`属性。\n\
    \n    ```\n    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n    <?xml-stylesheet\
    \ type=\"text/xsl\" href=\"configuration.xsl\"?>\n    <!-- Put site-specific property\
    \ overrides in this file. -->\n    <configuration>\n    <property>\n      <name>dfs.permissions.superusergroup</name>\n\
    \      <value>hadoop</value>\n    </property>\n    <property>\n      <name>dfs.namenode.name.dir</name>\n\
    \      <value>file:///data/1/dfs/nn</value>\n    </property>\n    <property>\n\
    \      <name>dfs.replication</name>\n      <value>1</value>\n    </property>\n\
    \    <property>\n      <name>dfs.permissions</name>\n      <value>false</value>\n\
    \    </property>\n    </configuration>\n    ```\n\n8.  创建NameNode存储目录并设置其权限。\n\
    \n    ```\n    mkdir -p /data/1/dfs/nn\n    chmod -R 777 /data/1/dfs/nn\n    ```\n\
    \n9.  下载并安装Hive 0.10.0 CDH 4.6。\n\n    ```\n    wget http://archive.cloudera.com/cdh4/cdh/4/hive-0.10.0-cdh4.6.0.tar.gz\n\
    \    tar -xvf hive-0.10.0-cdh4.6.0.tar.gz\n    ```\n\n10. 从模板创建`hive-site.xml`文件。\n\
    \n    ```\n    cd /mongodb/hive-0.10.0-cdh4.6.0/conf\n    cp hive-default.xml.template\
    \ hive-site.xml\n    ```\n\n11. 默认情况下，Hive使用嵌入式元存储。我们将使用远程元存储，为此需要将`hive.metastore.uris`属性配置为远程元存储的URI。同时将`hive.metastore.warehouse.dir`属性设置为Hive存储目录，即存储Hive数据库和表的目录。`hive-site.xml`配置文件如下：\n\
    \n    ```\n    <?xml version=\"1.0\"?>\n    <?xml-stylesheet type=\"text/xsl\"\
    \ href=\"configuration.xsl\"?>\n    <configuration>\n    <property>\n      <name>hive.metastore.warehouse.dir</name>\n\
    \      <value>hdfs://10.0.2.15:8020/user/hive/warehouse</value>\n    </property>\n\
    \    <property>\n      <name>hive.metastore.uris</name>\n      <value>thrift://localhost:10000</value>\n\
    \    </property>\n    </configuration>\n    ```\n\n12. 创建在`hive.metastore.warehouse.dir`属性中指定的HDFS路径目录并设置其权限。\n\
    \n    ```\n    hadoop dfs -mkdir hdfs://10.0.2.15:8020/user/hive/warehouse\n \
    \   hadoop dfs -chmod -R g+w hdfs://10.0.2.15:8020/user/hive/warehouse\n    ```\n\
    \n13. 下载并解压MongoDB 2.6.3文件。\n\n    ```\n    curl -O http://downloads.mongodb.org/linux/mongodb-linux-i686-2.6.3.tgz\n\
    \    tar -zxvf mongodb-linux-i686-2.6.3.tgz\n    ```\n\n14. 将`mongo-java-driver-2.6.3.jar`和`hive-mongo-0.0.3-jar-with-dependencies.jar`复制到`/mongodb/hive-0.10.0-cdh4.6.0/lib`目录。在bash\
    \ shell中设置Hadoop、Hive、Java和MongoDB的环境变量。\n\n    ```\n    vi ~/.bashrc\n    export\
    \ HADOOP_PREFIX=/mongodb/hadoop-2.0.0-cdh4.6.0\n    export HADOOP_CONF=$HADOOP_PREFIX/etc/hadoop\n\
    \    export MONGO_HOME=/mongodb/mongodb-linux-i686-2.6.3\n    export HIVE_HOME=/mongodb/hive-0.10.0-cdh4.6.0\n\
    \    export HIVE_CONF=$HIVE_HOME/conf\n    export JAVA_HOME=/mongodb/jdk1.7.0_55\n\
    \    export HADOOP_MAPRED_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/bin\n    export\
    \ HADOOP_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2\n    export\
    \ HADOOP_CLASSPATH=$HADOOP_HOME/*:$HADOOP_HOME/lib/*:$HIVE_HOME/lib/*:/mongodb/mongo-java-driver-2.6.3.jar:/mongodb/hive-mongo-0.0.3-jar-with-dependencies.jar\n\
    \    export PATH=$PATH:$JAVA_HOME/bin:$HADOOP_PREFIX/bin:$HIVE_HOME/bin:$MONGO_HOME/bin\n\
    \    ```"
  raw: 'The difference between the two is that a managed table is managed by Hive,
    which implies that both the metadata and the data for a Hive managed table are
    managed by Hive. For an external table, Hive only manages the metadata – not the
    table data. If a Hive managed table is dropped, both the data and the metadata
    get dropped. But if a Hive external table is dropped, only the metadata is dropped
    and not the table data. A Hive external table is suitable if the data is stored
    in an external datasource such as MongoDB database. In this section we introduce
    the Hive MongoDB Storage Handler, which is used to create a Hive external table
    over a MongoDB database.    The MongoDB storage handler for Hive class is `org.yong3.hive.mongo.MongoStorageHandler`.
    The storage handler supports only the Hive primitive types such as `int` and `string`.
    The MongoDB storage handler provides serdeproperties `mongo.column.mapping` in
    which the MongoDB datastore column names that are to be mapped to the Hive external
    table are specified. In addition the following ([Table 11-1](#part0017.xhtml#Tab1))
    `tblproperties` are supported.    [Table 11-1](#part0017.xhtml#_Tab1). Mongo Storage
    Handler Properties     | Property | Description | | --- | --- | | `mongo.host`
    | MongoDB host name. | | `mongo.port` | MongoDB port. | | `mongo.db` | MongoDB
    database. | | `mongo.user` | MongoDB user name. | | `mongo.passwd` | MongoDB password.
    | | `mongo.collection` | MongoDB collection. |    Setting Up the Environment    The
    following software is required for the chapter.    *   Hadoop 2.0.0 CDH 4.6 *   Hive
    0.10.0 CDH 4.6 *   MongoDB Java Driver 2.11.3 *   MongoDB Storage Handler for
    Hive 0.0.3 *   MongoDB 2.6.3 *   Eclipse IDE for Java EE Developers *   Java 7    Later
    versions of the listed software may also be used. Download the MongoDB storage
    handler for Hive from `https://github.com/yc-huang/Hive-mongo` and extract the
    zip file to a directory. The Jar files with the storage handler are in the `Hive-mongo-master/release`
    directory. Use the `hive-mongo-0.0.3-jar-with-dependencies.jar` file, which has
    all the required dependencies included. Download the MongoDB Java driver Jar file
    `mongo-java-driver-2.11.3.jar` or a later version from `http://central.maven.org/maven2/org/mongodb/mongo-java-driver/`.    Complete
    the following steps to set up the environment:    1.  We have used Oracle Linux
    6.5, which is installed on Oracle VirtualBox 4.3\. But a different distribution
    of Linux may be used instead. Oracle Linux is based on RedHat Linux, one of the
    most commonly used Linux distributions. Create a directory for MongoDB and other
    software and set its permissions.                    ```     mkdir /mongodb     chmod
    -R 777 /mongodb     cd /mongodb     ```           2.  Download Java 7 and extract
    the file to the `/mongodb` directory.                    ```     tar zxvf jdk-7u55-linux-i586.gz     ```           3.  Download
    Hadoop 2.0.0 and extract the `tar.gz` file to a directory.                    ```     wget
    http://archive.cloudera.com/cdh4/cdh/4/hadoop-2.0.0-cdh4.6.0.tar.gz     tar -xvf
    hadoop-2.0.0-cdh4.6.0.tar.gz     ```           4.  Create symlinks for the Hadoop
    `bin` and `conf` directories.                    ```     ln -s /mongodb/hadoop-2.0.0-cdh4.6.0/bin
    /oranosql/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2/bin     ln -s /mongodb/hadoop-2.0.0-cdh4.6.0/etc/hadoop
    /oranosql/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2/conf     ```           5.  Configure
    Hadoop in the `core-site.xml` and `hdfs-site.xml` configuration files. In the
    `core-site.xml`, which is listed below, set the `fs.defaultFS` and `hadoop.tmp.dir`
    properties.                    ```     <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>     <!--
    Put site-specific property overrides in this file. -->     <configuration>     <property>       <name>fs.defaultFS</name>         <value>hdfs://10.0.2.15:8020</value>         </property>      <property>         
    <name>hadoop.tmp.


    dir</name>          <value>file:///var/lib/hadoop-0.20/cache</value>       </property>     </configuration>     ```           6.  Create
    the directory specified for the `hadoop.tmp.dir` property and set its permissions
    to global (`777`).                    ```     mkdir -p /var/lib/hadoop-0.20/cache     chmod
    -R 777  /var/lib/hadoop-0.20/cache     ```           7.  In the `hdfs-site.xml`
    configuration file, which is listed below, set the `dfs.permissions.superusergroup`,
    `dfs.namenode.name.dir`, `dfs.replication`, and `dfs.permissions` properties.                    ```     <?xml
    version="1.0" encoding="UTF-8"?>     <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>     <!--
    Put site-specific property overrides in this file. -->     <configuration>     <property>      <name>dfs.permissions.superusergroup</name>       <value>hadoop</value>       </property><property>       
    <name>dfs.namenode.name.dir</name>         <value>file:///data/1/dfs/nn</value>         </property>             
    <property>                    <name>dfs.replication</name>                         
    <value>1</value>              </property>     <property>     <name>dfs.permissions</name>     <value>false</value>     </property>     </configuration>     ```           8.  Create
    the NameNode storage directory and set its permissions.                    ```     mkdir
    -p /data/1/dfs/nn     chmod -R 777 /data/1/dfs/nn     ```           9.  Download
    and install Hive 0.10.0 CDH 4.6.                    ```     wget http://archive.cloudera.com/cdh4/cdh/4/hive-0.10.0-cdh4.6.0.tar.gz     tar
    -xvf hive-0.10.0-cdh4.6.0.tar.gz     ```           10.  Create the `hive-site.xml`
    file from the template.                    ```     cd /mongodb/hive-0.10.0-cdh4.6.0/conf     cp
    hive-default.xml.template hive-site.xml     ```           11.  By default, Hive
    makes use of the Embedded metastore. We shall use the Remote metastore for which
    we need to configure the `hive.metastore.uris` property to the remote metastore
    URI. Also set the `hive.metastore.warehouse.dir` property to the Hive storage
    directory, the directory in which Hive databases and tables are stored. The `hive-site.xml`
    configuration file is listed:                    ```     <?xml version="1.0"?>     <?xml-stylesheet
    type="text/xsl" href="configuration.xsl"?>     <configuration>     <property>       <name>hive.metastore.warehouse.dir</name>       <value>hdfs://10.0.2.15:8020/user/hive/warehouse</value>     </property>     </configuration>     <property>       <name>hive.metastore.uris</name>       <value>thrift://localhost:10000</value>     </property>     </configuration>     ```           12.  Create
    the HDFS path directory specified in the `hive.metastore.warehouse.dir` property
    and set its permissions.                    ```     hadoop dfs -mkdir  hdfs://10.0.2.15:8020/user/hive/warehouse     hadoop
    dfs -chmod -R g+w hdfs://10.0.2.15:8020/user/hive/warehouse     ```           13.  Download
    and extract the MongoDB 2.6.3 file.                    ```     curl -O http://downloads.mongodb.org/linux/mongodb-linux-i686-2.6.3.tgz     tar
    -zxvf mongodb-linux-i686-2.6.3.tgz     ```           14.  Copy the `mongo-java-driver-2.6.3.jar`
    and `hive-mongo-0.0.3-jar-with-dependencies.jar` to the `/mongodb/hive-0.10.0-cdh4.6.0/lib`
    directory. Set the environment variables for Hadoop, Hive, Java, and MongoDB in
    the bash shell.                    ```     vi ~/.bashrc     export HADOOP_PREFIX=/mongodb/hadoop-2.0.0-cdh4.6.0     export
    HADOOP_CONF=$HADOOP_PREFIX/etc/hadoop     export MONGO_HOME=/mongodb/mongodb-linux-i686-2.6.3     export
    HIVE_HOME=/mongodb/hive-0.10.0-cdh4.6.0     export HIVE_CONF=$HIVE_HOME/conf     export
    JAVA_HOME=/mongodb/jdk1.7.0_55     export HADOOP_MAPRED_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/bin     export
    HADOOP_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2     export
    HADOOP_CLASSPATH=$HADOOP_HOME/*:$HADOOP_HOME/lib/*:$HIVE_HOME/lib/*:/mongodb/mongo-java-driver-2.6.3.'
