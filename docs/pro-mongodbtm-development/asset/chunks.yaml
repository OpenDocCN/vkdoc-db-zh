    9-12](#part0015.xhtml#_Fig12). Creating the persistence.xml                    The
    `persistence.xml` file gets added to the `META-INF` folder.           4.  Copy
    the `persistence.xml` file listed earlier to the `persistence.xml` file in the
    Maven project as shown in [Figure 9-13](#part0015.xhtml#Fig13).    ![9781484215999_Fig09-13.jpg](Images/image00647.jpeg)    [Figure
    9-13](#part0015.xhtml#_Fig13). Persistence Configuration File persistence.xml    Creating
    a JPA Client Class    We have configured a JPA project for object/relational mapping
    to MongoDB database. Next, we shall run some CRUD operations using the JPA API.
    But, first we need to create a client class for the CRUD operations. We shall
    use a Java class as a client class.    1.  Select File !


    [image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg) Other. 2.  In
    the New window, select Java ![image](Images/image00406.jpeg) Class and click on
    Next. 3.  In New Java Class wizard specify a Package (`kundera`) and a class Name
    (`KunderaClient`) as shown in [Figure 9-14](#part0015.xhtml#Fig14). Select the
    method stub for the `main` method to add to the class and click on Finish.    ![9781484215999_Fig09-14.jpg](Images/image00648.jpeg)    [Figure
    9-14](#part0015.xhtml#_Fig14). Creating the Client Class KunderaClient    The
    `kundera.KunderaClient` class gets added to the `KunderaMongoDB` Maven project
    as shown in [Figure 9-15](#part0015.xhtml#Fig15).    ![9781484215999_Fig09-15.jpg](Images/image00649.jpeg)    [Figure
    9-15](#part0015.xhtml#_Fig15). Maven Project Directory Structure including KunderaClient
    Class    We shall add the methods shown in [Table 9-4](#part0015.xhtml#Tab4) to
    the `KunderaClient` application to run CRUD operations on MongoDB. We shall invoke
    the methods from the `main` method and comment out all the methods to begin with.
    We shall uncomment one method at a time and run the `KunderaClient` application.    [Table
    9-4](#part0015.xhtml#_Tab4). KunderaClient Application Methods     | Property
    | Description | | --- | --- | | `create()` | Create entities. | | `findByClass()`
    | Find an entity using the entity class. | | `query()` | Query the entities. |
    | `update()` | Update entities. | | `delete()` | Delete the entities. |    Running
    CRUD Operations    In the next few subsections we shall create a catalog in the
    `catalog` collection and we shall add data to the catalog, find a catalog entry,
    update a catalog entry, and delete a catalog entry.    Creating a Catalog    In
    this section we shall add some documents to the `catalog` collection in MongoDB.    1.  Add
    a method called `create()` to the `KunderaClient` class and invoke the method
    from the `main` method so that when the application is run the method gets invoked.                    The
    JPA API is defined in the `javax.persistence` package. The `EntityManager` interface
    is used to interact with the persistence context. The `EntityManagerFactory` interface
    is used to interact with the entity manager factory for the persistence unit.
    The persistence class is used to obtain an `EntityManagerFactory` object in a
    Java SE environment.           2.  Create a `EntityManagerFactory` object using
    Persistence class static method `createEntityManagerFactory(java.lang.String`
    persistenceUnitName). 3.  Create an `EntityManager` instance from the `EntityManagerFactory`
    object using the `createEntityManager()` method.                    ```     EntityManagerFactory  emf
    = Persistence.createEntityManagerFactory("kundera");     em = emf.createEntityManager();     ```           4.  In
    the `create()` method create an instance of the entity class `Catalog`. Using
    the set methods set the `catalogId`, `journal`, `publisher`, `edition`, `title`,
    and `author` fields.                    ```     Catalog catalog = new Catalog();             catalog.setCatalogId("catalog1");             catalog.setJournal("Oracle
    Magazine");             catalog.setPublisher("Oracle Publishing");             catalog.setEdition("November-December
    2013");             catalog.setTitle("Engineering as a Service");             catalog.setAuthor("David
    A. Kelly");     ```           5.  Make the domain model instance managed and persistent
    using the `persist(java.lang.Object entity)` method in the `EntityManager` interface.                    ```     em.persist(catalog);     ```              Similarly,
    other JPA instances may be persisted. When we run the `KunderaClient` class in
    a later section the `Catalog` entities get persisted to the MongoDB database.    Finding
    a Catalog Entry Using the Entity Class    The `EntityManager` class provides several
