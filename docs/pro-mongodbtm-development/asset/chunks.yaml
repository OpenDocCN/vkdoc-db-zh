    507f191e810c19729de860ea\"),\"catalogId\" : 3};\n>db.catalog.insert(doc3)\n```\n\
    \nA duplicate key error gets generated as shown in [Figure 2-26](#part0008.xhtml#Fig26).\n\
    \n![9781484215999_Fig02-26.jpg](Images/image00450.jpeg)\n\n[Figure 2-26](#part0008.xhtml#_Fig26).\
    \ Duplicate Key Error\n\nAdding a Batch of Documents\n\nThe support for adding\
    \ an array of documents was added in MongoDB 2.2. In the pre-2.2 version only\
    \ a single document could be added with a single invocation of the `db.collection.insert()`\
    \ method. To add a batch of documents in MongoDB 3.0.5, specify or create JSON\
    \ for two documents to be added including the `_id` fields.\n\n```\n>doc1 = {\"\
    _id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 'catalog1', \"\
    journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'David A. Kelly'}\n>doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"\
