- fmt: "# Using Spring Data with MongoDB\n\n## Spring Data Repository 概念\n\nSpring\
    \ Data 仓库是数据访问层的抽象实现，位于底层数据存储之上。Spring Data 仓库减少了访问数据存储所需的样板代码。Spring Data 仓库可以与\
    \ MongoDB 数据存储一起使用。\n\n## 配置仓库基础设施\n\n要为 MongoDB 启用 Spring Data 仓库基础设施，需要用 `@EnableMongoRepositories`\
    \ 注解标注 `JavaConfig` 类。用 `@EnableMongoRepositories(\"com.mongo.repositories\")`\
    \ 注解标注 `SpringMongoApplicationConfig` 类。`com.mongo.repositories` 是用于搜索仓库的包。使用\
    \ `@ComponentScan` 注解指定要扫描带注解组件的包，并将其 `basePackageClasses` 元素设置为服务类 `CatalogService.class`（我们将在本节后面开发）。会扫描\
    \ `basePackageClasses` 中指定的每个类所在的包。修改后的 `SpringMongoApplicationConfig` 类声明如下。\n\
    \n```java\n@Configuration\n@EnableMongoRepositories(\"com.mongo.repositories\"\
    )\n@ComponentScan(basePackageClasses = {CatalogService.class})\npublic class SpringMongoApplicationConfig\
    \ extends AbstractMongoConfiguration {\n\n}\n```\n\n## Repository 接口\n\n核心仓库标记接口是\
    \ `org.springframework.data.repository.Repository`，它在实体之上提供 CRUD 访问。实体类 `Catalog`\
    \ 在本章前面已定义。用于在仓库上进行 CRUD 操作的泛型接口是 `org.springframework.data.repository.CrudRepository`。特定于\
    \ MongoDB 服务器的仓库接口是 `org.springframework.data.mongodb.repository.MongoRepository<T,ID\
    \ extends Serializable>`，它扩展了 `CrudRepository` 接口。该接口在领域类型（本例中为 `Catalog`）和 ID\
    \ 类型（本例中为 `String`）上进行参数化。ID 继承 `java.io.Serializable` 接口，以便能够在 MongoDB 服务器中序列化\
    \ ID。创建一个接口 `CatalogRepository`，它扩展参数化类型 `MongoRepository<Catalog, String>`。\n\
    \n`CatalogRepository` 表示特定于 MongoDB 的仓库接口，用于在 MongoDB 服务器中存储类型为 `Catalog`、ID 类型为\
    \ `String` 的实体。\n\n```java\npackage com.mongo.repositories;\n\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
    \nimport com.mongo.model.Catalog;\n\npublic interface CatalogRepository extends\
    \ MongoRepository<Catalog, String> {\n\n}\n```\n\n## 服务类实现\n\n在服务类 `CatalogService`\
    \ 中，按如下方式从上下文中访问仓库实例。\n\n```java\nApplicationContext context = new AnnotationConfigApplicationContext(\n\
    \        SpringMongoApplicationConfig.class);\nCatalogRepository repository =\
    \ context.getBean(CatalogRepository.class);\n```\n\n随后，使用声明为类变量的 `CatalogRepository`\
    \ 实例在 MongoDB 文档存储上执行 CRUD 操作。将以下（[Table 10-17](#part0016.xhtml#Tab17)）方法添加到 `CatalogService`\
    \ 类以实现 CRUD 操作。方法名与 `MongoRepository` 方法名相同或相似。\n\n**[Table 10-17](#part0016.xhtml#_Tab17).\
    \ CatalogService 类中的方法**\n\n| 方法 | 描述 |\n| --- | --- |\n| `count()` | 统计仓库中的文档数量。\
    \ |\n| `findAll()` | 查找仓库中的所有文档。 |\n| `save()` | 保存文档到仓库。 |\n| `saveBatch()` |\
    \ 批量保存文档到仓库。 |\n| `findOne(String id)` | 在仓库中查找单个文档。 |\n| `deleteAll()` | 删除仓库中的所有文档。\
    \ |\n| `deleteById()` | 根据 Id 删除文档。 |\n\n## 运行与操作\n\n在 `main` 方法中为每个方法添加方法调用。要运行\
    \ `CatalogService` 类，请在 Package Explorer 中右键单击 `CatalogService.java` 应用程序，然后选择\
    \ Run As ![image](Images/image00406.jpeg) Java Application，如 [Figure 10-22](#part0016.xhtml#Fig22)\
    \ 所示。\n\n![9781484215999_Fig10-22.jpg](Images/image00683.jpeg)\n\n**[Figure 10-22](#part0016.xhtml#_Fig22).\
    \ 运行 CatalogService 应用程序**\n\n当运行 `CatalogService.java` 应用程序时，我们将分别调用每个方法，并在调用时注释掉其他方法。\n\
    \n## 获取文档计数\n\n扩展 `CrudRepository<T,ID>` 接口的 `MongoRepository<T,ID extends Serializable>`\
    \ 接口提供了 CRUD 操作方法。`MongoRepository` 接口还包含一个 `count()` 方法，该方法返回集合中存储的实体数量。要能够计数实体，首先需要使用本章前面讨论的\
    \ `MongoOperations` 实例创建一些实体。运行 `App` 应用程序以调用 `addDocumentBatch()` 方法添加一些文档。使用\
    \ `CatalogRepository` 实例调用 `count()` 方法并输出返回的长整型值。\n\n```java\npublic static void\
    \ count() {\n        System.out.println(\"Number of documents: \" + repository.count());\n\
    \n    }\n```\n\n[Figure 10-23](#part0016.xhtml#Fig23) 中 Eclipse 控制台的输出显示存储的文档实体数量为\
    \ 2。\n\n![9781484215999_Fig10-23.jpg](Images/image00684.jpeg)\n\n**[Figure 10-23](#part0016.xhtml#_Fig23).\
    \ 输出文档计数**\n\n## 从仓库查找实体\n\n`MongoRepository` 接口提供以下 ([Table 10-18](#part0016.xhtml#Tab18))\
    \ 方法用于从仓库中查找文档。\n\n**[Table 10-18](#part0016.xhtml#_Tab18). 用于查找文档的 MongoRepository\
    \ 方法**\n\n| 方法 | 描述 |\n| --- | --- |\n| `T findOne(ID id)` | 返回指定 ID 的实体实例。 |\n\
    | `Iterable<T> findAll()` | 返回仓库中指定实体类型的所有实体。 |\n| `Iterable<T> findAll(Iterable<ID>\
    \ ids)` | 返回给定 ID 的实体类型的所有实体。 |\n| `findAll(Sort sort)` | 返回按给定选项排序的所有实体。 |"
