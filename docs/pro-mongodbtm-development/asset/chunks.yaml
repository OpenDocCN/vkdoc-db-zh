    \ document : iterable) {\n                Set<String> keySet = document.keySet();\n\
    \                Iterator<String> iter = keySet.iterator();\n                while\
    \ (iter.hasNext()) {\n                    documentKey = iter.next();\n                    System.out.println(documentKey);\n\
    \                    System.out.println(document.get(documentKey));\n                }\n\
    \            }\n            mongoClient.close();\n        }\n    }\n    ```\n\n\
    11.  Next, run the `CreateMongoDBDocumentModel` application. Before running the\
    \ application drop the `catalog` collection using `db.catalog.drop()` in mongo\
    \ shell as we shall be creating an empty `catalog` collection in the application\
    \ to add documents. Right-click on the `CreateMongoDBDocumentModel.java` file\
    \ in Package Explorer and select Run As ![image](Images/image00406.jpeg) Java\
    \ Application as shown in [Figure 1-13](#part0007.xhtml#Fig13).\n\n![9781484215999_Fig01-13.jpg](Images/image00418.jpeg)\n\
    \n[Figure 1-13](#part0007.xhtml#_Fig13). Running the CreateMongoDBDocumentModel.java\
    \ Application\n\nOne document gets added to the MongoDB collection catalog as\
    \ indicated by the one `_id` fetched. The document added has two key/value pairs.\
    \ Subsequently, the key/value pairs for the `Catalog` instances added get output\
    \ as shown in [Figure 1-14](#part0007.xhtml#Fig14). The `_id` would most likely\
    \ be different than what is shown in [Figure 1-14](#part0007.xhtml#Fig14) as it\
    \ is generated automatically.\n\n![9781484215999_Fig01-14.jpg](Images/image00419.jpeg)\n\
    \n[Figure 1-14](#part0007.xhtml#_Fig14). Output from the CreateMongoDBDocumentModel.java\
    \ Application\n\nGetting Data from MongoDB\n\nIn this section we shall fetch data\
    \ from MongoDB. We shall use the `MongoDBClient` application in this section.\
    \ The `MongoCollection<TDocument>` interface provides the overloaded methods discussed\
    \ in [Table 1-7](#part0007.xhtml#Tab7) to find documents.\n\n[Table 1-7](#part0007.xhtml#_Tab7).\
    \ Overloaded find() Methods\n\n| Method | Description |\n| --- | --- |\n| `find()`\
    \ | Finds all the documents in the collection and returns a `FindIterable<TDocument>`\
    \ instance. |\n| `find(Bson filter)` | Finds all the documents in the collection\
    \ using the specified query filter and returns a `FindIterable<TDocument>` instance.\
    \ |\n| `find(Bson filter, Class<TResult> resultClass)` | Finds all the documents\
    \ in the collection using the specified query filter and result class and returns\
    \ a `<TResult> FindIterable<TResult>` instance. |\n| `find(Class<TResult> resultClass)`\
    \ | Finds all the documents in the collection using the specified result class\
    \ and returns a `<TResult> FindIterable<TResult>` instance. |\n\n1.  Create a\
    \ `MongoClient` instance, a `MongoDatabase` instance, and a `MongoCollection<TDocument>`\
    \ instance as discussed earlier.\n\n```\n    MongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n    MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n    MongoCollection<Document> coll = db.getCollection(\"catalog\");\n\
    \    ```\n\n2.  Create two `Catalog` instances and add the `Catalog` instances\
    \ to the `MongoCollection<TDocument>` instance using the `insertOne(TDocument\
    \ document)` method.\n\n```\n    Document catalog = new Document(\"journal\",\
    \ \"Oracle Magazine\")\n                    .append(\"publisher\", \"Oracle Publishing\"\
    )\n                    .append(\"edition\", \"November December 2013\")\n                    .append(\"\
    title\", \"Engineering as a Service\")\n                    .append(\"author\"\
    , \"David A. Kelly\");\n            coll.insertOne(catalog);\n\ncatalog = new\
    \ Document(\"journal\", \"Oracle Magazine\")\n                    .append(\"publisher\"\
    , \"Oracle Publishing\")\n                    .append(\"edition\", \"November\
    \ December 2013\")\n                    .append(\"title\", \"Quintessential and\
    \ Collaborative\")\n                    .append(\"author\", \"Tom Haunert\");\n\
    \            coll.insertOne(catalog);\n    ```\n\n3.  Subsequently, find the documents\
    \ added using the `find()` method, which returns the result as a `FindIterable\
    \ <TDocument>`.\n\n```\n    FindIterable<Document> iterable = coll.find();\n \
    \   ```\n\n4.  Using an enhanced `for` loop iterate over the `FindIterable<TDocument>`\
    \ to obtain the `Document` instances stored and obtain the key set associated\
    \ with each `Document` instance. Create a iterator over the key set and using\
    \ a `while` loop iterate over the key set to output each document key and `Document`\
    \ object associated with each document key.\n\n```\n    String documentKey = null;\n\
    \        for (Document document : iterable) {\n            Set<String> keySet\
    \ = document.keySet();\n            Iterator<String> iter = keySet.iterator();\n\
    \            while (iter.hasNext()) {\n                documentKey = iter.next();\n\
    \                System.out.println(documentKey);\n                System.out.println(document.get(documentKey));\n\
    \                }\n            }\n    ```\n\nThe `MongoDBClient` class is listed\
    \ below.\n\n```\n    package mongodb;\n\nimport java.util.Arrays;\n    import\
    \ java.util.Iterator;\n    import java.util.Set;\n    import org.bson.Document;\n\
    \    import com.mongodb.MongoClient;\n    import com.mongodb.ServerAddress;\n\
    \    import com.mongodb.client.FindIterable;\n    import com.mongodb.client.MongoCollection;\n\
    \    import com.mongodb.client.MongoDatabase;\n    public class MongoDBClient\
    \ {\n        public static void main(String[] args) {\n            MongoClient\
    \ mongoClient = new MongoClient(\n                    Arrays.asList(new ServerAddress(\"\
    localhost\", 27017)));\n            MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n            MongoCollection<Document> coll = db.getCollection(\"catalog);\n\
    \            Document catalog = new Document(\"journal\", \"Oracle Magazine\"\
    )\n                    .append(\"publisher\", \"Oracle Publishing\")\n                    .append(\"\
    edition\", \"November December 2013\")\n                    .append(\"title\"\
    , \"Engineering as a Service\")\n                    .append(\"author\", \"David\
    \ A. Kelly\");\n            coll.insertOne(catalog);\n\ncatalog = new Document(\"\
    journal\", \"Oracle Magazine\")\n                    .append(\"publisher\", \"\
    Oracle Publishing\")\n                    .append(\"edition\", \"November December\
    \ 2013\")\n                    .append(\"title\", \"Quintessential and Collaborative\"\
    )\n                    .append(\"author\", \"Tom Haunert\");\n            coll.insertOne(catalog);\n\
    \            FindIterable<Document> iterable = coll.find();\n            String\
    \ documentKey = null;\n            for (Document document : iterable) {\n                Set<String>\
    \ keySet = document.keySet();\n                Iterator<String> iter = keySet.iterator();\n\
    \                while (iter.hasNext()) {\n                    documentKey = iter.next();\n\
    \                    System.out.println(documentKey);\n                    System.out.println(document.get(documentKey));\n\
    \                }\n            }\n              mongoClient.close();\n        }\n\
    \    }\n    ```\n\n5.  Before running the `MongoDBClient` application drop catalog\
    \ collection from local database using the following commands from Mongo shell\
    \ (which is discussed in more detail in the next chapter). The Mongo shell is\
    \ started using the `mongo` command. Start the Mongo shell in a new command window\
    \ and the MongoDB server instance should be running when the mongo shell commands\
    \ are run.\n\n```\n    >mongo\n    >use local\n    >db.catalog.drop()\n    ```\n\
    \n6.  To run the `MongoDBClient` application right-click on the `MongoDBClient.java`\
    \ file in Package Explorer and select Run As ![image](Images/image00406.jpeg)\
    \ Java Application as shown in [Figure 1-15](#part0007.xhtml#Fig15)."
  trans: "\n## 从 MongoDB 获取数据\n\n在本节中，我们将从 MongoDB 获取数据。我们将在此部分使用 `MongoDBClient`\
    \ 应用程序。`MongoCollection<TDocument>` 接口提供了表 1-7 中讨论的重载方法来查找文档。\n\n**表 1-7.** 重载的\
    \ `find()` 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `find()` | 查找集合中的所有文档并返回一个 `FindIterable<TDocument>`\
    \ 实例。 |\n| `find(Bson filter)` | 使用指定的查询过滤器查找集合中的所有文档，并返回一个 `FindIterable<TDocument>`\
    \ 实例。 |\n| `find(Bson filter, Class<TResult> resultClass)` | 使用指定的查询过滤器和结果类查找集合中的所有文档，并返回一个\
    \ `<TResult> FindIterable<TResult>` 实例。 |\n| `find(Class<TResult> resultClass)`\
    \ | 使用指定的结果类查找集合中的所有文档，并返回一个 `<TResult> FindIterable<TResult>` 实例。 |\n\n### 步骤\
    \ 1：创建客户端、数据库和集合实例\n\n创建一个 `MongoClient` 实例、一个 `MongoDatabase` 实例和一个 `MongoCollection<TDocument>`\
    \ 实例，如前所述。\n\n```java\nMongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\nMongoDatabase db = mongoClient.getDatabase(\"\
    local\");\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n```\n\
    \n### 步骤 2：创建并插入文档\n\n创建两个 `Catalog` 实例，并使用 `insertOne(TDocument document)` 方法将这些\
    \ `Catalog` 实例添加到 `MongoCollection<TDocument>` 实例中。\n\n```java\nDocument catalog\
    \ = new Document(\"journal\", \"Oracle Magazine\")\n            .append(\"publisher\"\
    , \"Oracle Publishing\")\n            .append(\"edition\", \"November December\
    \ 2013\")\n            .append(\"title\", \"Engineering as a Service\")\n    \
    \        .append(\"author\", \"David A. Kelly\");\n    coll.insertOne(catalog);\n\
    \ncatalog = new Document(\"journal\", \"Oracle Magazine\")\n            .append(\"\
    publisher\", \"Oracle Publishing\")\n            .append(\"edition\", \"November\
    \ December 2013\")\n            .append(\"title\", \"Quintessential and Collaborative\"\
    )\n            .append(\"author\", \"Tom Haunert\");\n    coll.insertOne(catalog);\n\
    ```\n\n### 步骤 3：查询文档\n\n随后，使用 `find()` 方法查找添加的文档，该方法将结果作为 `FindIterable<TDocument>`\
    \ 返回。\n\n```java\nFindIterable<Document> iterable = coll.find();\n```\n\n### 步骤\
    \ 4：遍历并输出文档\n\n使用增强的 `for` 循环遍历 `FindIterable<TDocument>` 以获取存储的 `Document` 实例，并获取与每个\
    \ `Document` 实例关联的键集。在键集上创建一个迭代器，并使用 `while` 循环遍历键集以输出每个文档键及其关联的 `Document` 对象。\n\
    \n```java\nString documentKey = null;\nfor (Document document : iterable) {\n\
    \    Set<String> keySet = document.keySet();\n    Iterator<String> iter = keySet.iterator();\n\
    \    while (iter.hasNext()) {\n        documentKey = iter.next();\n        System.out.println(documentKey);\n\
    \        System.out.println(document.get(documentKey));\n    }\n}\n```\n\n`MongoDBClient`\
    \ 类的完整代码如下所示。\n\n```java\npackage mongodb;\n\nimport java.util.Arrays;\nimport\
    \ java.util.Iterator;\nimport java.util.Set;\nimport org.bson.Document;\nimport\
    \ com.mongodb.MongoClient;\nimport com.mongodb.ServerAddress;\nimport com.mongodb.client.FindIterable;\n\
    import com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    \npublic class MongoDBClient {\n    public static void main(String[] args) {\n\
    \        MongoClient mongoClient = new MongoClient(\n                Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n        MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n        MongoCollection<Document> coll = db.getCollection(\"catalog\"\
    );\n        Document catalog = new Document(\"journal\", \"Oracle Magazine\")\n\
    \                .append(\"publisher\", \"Oracle Publishing\")\n             \
    \   .append(\"edition\", \"November December 2013\")\n                .append(\"\
    title\", \"Engineering as a Service\")\n                .append(\"author\", \"\
    David A. Kelly\");\n        coll.insertOne(catalog);\n\n        catalog = new\
    \ Document(\"journal\", \"Oracle Magazine\")\n                .append(\"publisher\"\
    , \"Oracle Publishing\")\n                .append(\"edition\", \"November December\
    \ 2013\")\n                .append(\"title\", \"Quintessential and Collaborative\"\
    )\n                .append(\"author\", \"Tom Haunert\");\n        coll.insertOne(catalog);\n\
    \n        FindIterable<Document> iterable = coll.find();\n        String documentKey\
    \ = null;\n        for (Document document : iterable) {\n            Set<String>\
    \ keySet = document.keySet();\n            Iterator<String> iter = keySet.iterator();\n\
    \            while (iter.hasNext()) {\n                documentKey = iter.next();\n\
    \                System.out.println(documentKey);\n                System.out.println(document.get(documentKey));\n\
    \            }\n        }\n        mongoClient.close();\n    }\n}\n```\n\n###\
    \ 步骤 5：清理集合（可选但推荐）\n\n在运行 `MongoDBClient` 应用程序之前，请使用 Mongo shell 中的以下命令（下一章将更详细地讨论）从\
    \ `local` 数据库中删除 `catalog` 集合。Mongo shell 使用 `mongo` 命令启动。在一个新的命令窗口中启动 Mongo shell，并且在运行\
    \ Mongo shell 命令时，MongoDB 服务器实例应该正在运行。\n\n```\n>mongo\n>use local\n>db.catalog.drop()\n\
    ```\n\n### 步骤 6：运行应用程序\n\n要运行 `MongoDBClient` 应用程序，请在 Package Explorer 中右键单击 `MongoDBClient.java`\
    \ 文件，然后选择 **Run As** ![image](img/image00406.jpeg) **Java Application**，如图 1-15\
    \ 所示。\n\n![9781484215999_Fig01-15.jpg](img/image00420.jpeg)\n\n**图 1-15.** 运行\
    \ MongoDBClient.java 应用程序\n"
- fmt: "![9781484215999_Fig01-15.jpg](Images/image00420.jpeg)\n\n[Figure 1-15](#part0007.xhtml#_Fig15).\
    \ Running the `MongoClient.java` Application\n\nThe output from the application\
    \ is displayed in the Eclipse Console as shown in [Figure 1-16](#part0007.xhtml#Fig16).\
    \ The two documents added get fetched and the associated key/value pairs get output.\n\
    \n![9781484215999_Fig01-16.jpg](Images/image00421.jpeg)\n\n[Figure 1-16](#part0007.xhtml#_Fig16).\
    \ Finding Documents and Outputting Key/Value Pairs\n\n## Updating Data in MongoDB\n\
    \nIn this section we shall update MongoDB data. We shall be using the `UpdateDBDocument`\
    \ application. The `MongoCollection<TDocument>` class provides several methods,\
    \ some of them overloaded, to find and update data as discussed in [Table 1-8](#part0007.xhtml#Tab8).\n\
    \n[Table 1-8](#part0007.xhtml#_Tab8). `MongoCollection<TDocument>` Methods to\
    \ Update or Replace Documents\n\n| Method | Description |\n| --- | --- |\n| `findOneAndReplace(Bson\
    \ filter, TDocument replacement)` | Finds a document using the specified query\
    \ filter and replaces it with the replacement document. |\n| `findOneAndReplace(Bson\
    \ filter, TDocument replacement, FindOneAndReplaceOptions options)` | Finds a\
    \ document using the specified query filter and `FindOneAndReplaceOptions` options\
    \ and replaces it with the replacement document. The `FindOneAndReplaceOptions`\
    \ options include the maximum time to find and replace, whether to return the\
    \ original document or the replacement document, the sort criteria to apply, whether\
    \ to upsert the document if the query filter does not find a document, and which\
    \ document fields to return. Upsert is the term used to insert a document if the\
    \ document to be replaced or updated is not found. |\n| `findOneAndUpdate(Bson\
    \ filter, Bson update)` | Finds a document using the specified query filter and\
    \ replaces it with the update document. The update must include only update operators.\
    \ |\n| `findOneAndUpdate(Bson filter, Bson update, FindOneAndUpdateOptions options)`\
    \ | Finds a document using the specified query filter and replaces it with the\
    \ update document. The update must include only update operators. The `FindOneAndUpdateOptions`\
    \ options are also provided. The `FindOneAndUpdateOptions` options include the\
    \ maximum time to find and update, whether to return the original document or\
    \ the updated document, the sort criteria to apply, whether to upsert the document\
    \ if the query filter does not find a document, and which document fields to return.\
    \ |\n| `replaceOne(Bson filter, TDocument replacement)` | Replaces a document\
    \ using the specified query filter and the replacement document. |\n| `replaceOne(Bson\
    \ filter, TDocument replacement, UpdateOptions updateOptions)` | Replaces a document\
    \ using the specified query filter and the replacement document. The `UpdateOptions`\
    \ are also provided. The `UpdateOptions` options include whether to upsert the\
    \ document if the query filter does not find a document. |\n| `updateMany(Bson\
    \ filter, Bson update)` | Updates one or more documents using a query filter and\
    \ an update document. |\n| `updateMany(Bson filter, Bson update, UpdateOptions\
    \ updateOptions)` | Updates one or more documents using a query filter and an\
    \ update document. The `UpdateOptions` are also provided. The `UpdateOptions`\
    \ options include whether to upsert the document if the query filter does not\
    \ find a document. |\n| `updateOne(Bson filter, Bson update)` | Updates one document\
    \ using a query filter and an update document. |\n| `updateOne(Bson filter, Bson\
    \ update, UpdateOptions updateOptions)` | Updates one document using a query filter\
    \ and an update document. The `UpdateOptions` are also provided. The `UpdateOptions`\
    \ options include whether to upsert the document if the query filter does not\
    \ find a document. |\n\nSome of the methods listed support only `update` operators\
    \ in the update document. The `update` operators that may be applied on document\
    \ fields are discussed in [Table 1-9](#part0007.xhtml#Tab9).\n\n[Table 1-9](#part0007.xhtml#_Tab9).\
    \ Update Operators\n\n| Method | Description |\n| --- | --- |\n| `$inc` | Increments\
    \ the value of a field. The increment must be a positive or negative value. |\n\
    | `$mul` | Multiplies the value of a field. |\n| `$rename` | Renames a field.\
    \ |\n| `$setOnInsert` | Sets the value of a field if the update results in an\
    \ insert. |\n| `$set` | Sets the value of a field in a document. |\n| `$unset`\
    \ | Unsets the value of a field in a document. |\n| `$min` | Updates a field only\
    \ if the specified value is less than the present field value. |\n| `$max` | Updates\
    \ a field only if the specified value is more than the present field value. |\n\
    | `$currentDate` | Sets the value of the field to the current date as a Date or\
    \ Timestamp. |\n\n### Step-by-Step Operations\n\n1.  In the `UpdateDBDocument`\
    \ application create a `MongoClient` instance as discussed earlier and create\
    \ a `MongoDatabase` instance for the `local` database. Subsequently, create a\
    \ `MongoCollection<TDocument>` instance for the `catalog` collection. Add two\
    \ instances of `Catalog` objects to the catalog collection using the `insertOne(TDocument\
    \ document)` method.\n\n    ```\n    Document catalog = new Document(\"catalogId\"\
    , \"catalog1\")\n        .append(\"journal\", \"Oracle Magazine\")\n        .append(\"\
    publisher\", \"Oracle Publishing\")\n        .append(\"edition\", \"November December\
    \ 2013\")\n        .append(\"title\", \"Engineering as a Service\")\n        .append(\"\
    author\", \"David A. Kelly\");\n    coll.insertOne(catalog);\n\n    catalog =\
    \ new Document(\"catalogId\", \"catalog2\")\n        .append(\"journal\", \"Oracle\
    \ Magazine\")\n        .append(\"publisher\", \"Oracle Publishing\")\n       \
    \ .append(\"edition\", \"November December 2013\")\n        .append(\"title\"\
    , \"Quintessential and Collaborative\")\n        .append(\"author\", \"Tom Haunert\"\
    );\n    coll.insertOne(catalog);\n    ```\n\n2.  As an example of using the `updateOne(Bson\
    \ filter, Bson update)` method, update the `edition` and `author` fields of the\
    \ `Document` instance with `catalogId catalog1` using the `update` operator `$set`.\n\
    \n    ```\n    coll.updateOne(new Document(\"catalogId\", \"catalog1\"), new Document(\"\
    $set\", new Document(\"edition\", \"11-12 2013\").append(\"author\", \"Kelly,\
    \ David A.\")));\n    ```\n\n3.  As an example of using the `updateMany(Bson filter,\
    \ Bson update)` method, update the `journal` field of all `Document` instances\
    \ using `update` operator `$set`.\n\n    ```\n    coll.updateMany(new Document(\"\
    journal\", \"Oracle Magazine\"), new Document(\"$set\", new Document(\"journal\"\
    , \"OracleMagazine\")));\n    ```\n\n4.  As an example of using the `replaceOne(Bson\
    \ filter, TDocument replacement, UpdateOptions updateOptions)` method, replace\
    \ the `Document` instance with `catalogId catalog3, which does not exist,` with\
    \ a new `Document` instance. Provide an `UpdateOptions` argument to upsert the\
    \ `Document` if the query filter does not return a `Document` instance.\n\n  \
    \  ```\n    UpdateResult result = coll.replaceOne(new Document(\"catalogId\",\
    \ \"catalog3\"),\n        new Document(\"catalogId\", \"catalog3\")\n        \
    \    .append(\"journal\", \"Oracle Magazine\")\n            .append(\"publisher\"\
    , \"Oracle Publishing\")\n            .append(\"edition\", \"November December\
    \ 2013\")\n            .append(\"title\", \"Engineering as a Service\")\n    \
    \        .append(\"author\", \"David A. Kelly\"),\n        new UpdateOptions().upsert(true));\n\
    \    ```\n\n5.  The `replaceOne()` method returns an `UpdateResult` object. Output\
    \ the following:\n    *   The number of documents matched using the `getMatchedCount()`\
    \ method of `UpdateResult`.\n    *   The number of documents modified using the\
    \ `getModifiedCount()` method. Not all matched documents may be modified.\n  \
    \  *   The `_id` field value for the upserted document using the `getUpsertedId()`\
    \ method. The `_id` field value has to be obtained using the `asObjectId()` method\
    \ invocation followed by the `getValue()` method invocation.\n\n    ```\n    System.out.println(\"\
    Number of documents matched: \" + result.getMatchedCount());\n    System.out.println(\"\
    Number of documents modified: \" + result.getModifiedCount());\n    System.out.println(\"\
    Upserted Document Id: \" + result.getUpsertedId().asObjectId().getValue());\n\
    \    ```"
