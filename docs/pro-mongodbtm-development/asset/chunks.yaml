    \    [图 7-19](#part0013.xhtml#_Fig19)：将 `catalog_view` 转换为生产视图\n\n# 将 Couchbase\
    \ 文档迁移到 MongoDB\n\n在本节中，我们将查询先前存储在 Couchbase Server 中的 JSON 文档，并将其迁移到 MongoDB\
    \ 数据库。我们将使用 `MigrateCouchbaseToMongoDB` 应用程序将 JSON 文档从 Couchbase Server 迁移到 MongoDB\
    \ 数据库。我们向 Couchbase Server 添加了一个封装在设计文档中的视图，以便可以使用该视图查询 Couchbase Server。视图由 `com.couchbase.client.java.view.View`\
    \ 类表示，视图查询由 `com.couchbase.client.java.view.ViewQuery` 类表示，该类提供了 `from(java.lang.String\
    \ design, java.lang.String view)` 类方法来创建 `ViewQuery` 实例。`Bucket` 类提供了重载的 `query()`\
    \ 方法来查询视图。每个 `query()` 方法都返回一个 `ViewResult` 实例，该实例表示来自 `ViewQuery` 的结果。我们将使用视图查询为\
    \ Couchbase Server 中存储的文档生成 `ViewResult`，然后迭代视图结果以将 JSON 文档迁移到 MongoDB。\n\n1.\
    \  在 `MigrateCouchbaseToMongoDB` 应用程序的 `main` 方法中，如前所述创建一个 `Bucket` 实例。\n\n  \
    \  ```java\n    Cluster cluster = CouchbaseCluster.create();\n    Bucket defaultBucket\
    \ = cluster.openBucket();\n    ```\n\n2.  同样如 [第 1 章](#part0007.xhtml) 所讨论的，为要迁移到的\
    \ `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```java\n    mongoClient = new\
    \ MongoClient(Arrays.asList(new ServerAddress(\"localhost\", 27017)));\n    MongoDatabase\
    \ db = mongoClient.getDatabase(\"local\");\n    MongoCollection<Document> coll\
    \ = db.getCollection(\"catalog\");\n    ```\n\n3.  创建与 Couchbase Server 和 MongoDB\
    \ 服务器的连接后，我们将把 Couchbase 文档迁移到 MongoDB。调用 `Bucket` 实例的 `query(ViewQuery query)`\
    \ 方法以生成 `ViewResult` 对象。使用静态方法 `from(java.lang.String design, java.lang.String\
    \ view)` 创建 `ViewQuery` 参数，设计文档名称为 `catalog`，视图名称为 `catalog_view`，这些在上一节中已创建。\n\
    \n    ```java\n    ViewResult result = defaultBucket.query(ViewQuery.from(\"catalog\"\
    , \"catalog_view\"));\n    ```\n\n4.  `ViewResult` 提供了重载的 `rows()` 方法，该方法返回视图结果中行的\
    \ `Iterator`。`ViewRow` 接口表示视图行。使用增强的 `for` 循环，迭代 `ViewResult` 中的行并将每一行输出到 MongoDB。\n\
    \n    ```java\n    for (ViewRow row : result) {\n        // 将每一行迁移到 MongoDB\n\
    \    }\n    ```\n\n5.  MongoDB Java 驱动程序中的文档由 `org.bson.Document` 类表示。为 `ViewResult`\
    \ 中的每一行创建一个 `Document` 实例。Couchbase Server 驱动程序中的 JSON 文档由 `JsonDocument` 类表示。可以使用\
    \ `document()` 方法从 `ViewRow` 实例获取 `JsonDocument` 实例。随后，使用 `content()` 方法从 `JsonDocument`\
    \ 获取 JSON 对象。\n\n    `JsonObject` 实例具有 JSON 文档的字段/值对。使用 `getNames()` 方法从 `JsonObject`\
    \ 获取字段名称作为 `Set`。使用 `iterator()` 方法从 `Set` 获取 `Iterator`。使用 `while` 循环迭代字段名称，并将每个字段名称作为\
    \ `String` 获取。使用 `JsonObject` 中的 `getString(String fieldName)` 方法获取字段值。使用 `Document`\
    \ 中的 `append(String key, Object value)` 方法将字段/值对添加到要存储在 MongoDB 中的 BSON 文档。\n\n\
    \    ```java\n    for (ViewRow viewRow : result) {\n        Document catalog =\
    \ new Document();\n        JsonDocument json = viewRow.document();\n        JsonObject\
    \ jsonObj = json.content();\n        Set<java.lang.String> fieldNames = jsonObj.getNames();\n\
    \        Iterator<String> iter = fieldNames.iterator();\n        while (iter.hasNext())\
    \ {\n            String fieldName = iter.next();\n            String fieldValue\
    \ = jsonObj.getString(fieldName);\n            catalog = catalog.append(fieldName,\
    \ fieldValue);\n        }\n    ```\n\n6.  创建了要存储在 MongoDB 的 `Document` 实例后，调用\
    \ `MongoCollection` 实例的 `insertOne(TDocument document)` 方法将 BSON 文档存储在 MongoDB\
    \ 中。\n\n    ```java\n    coll.insertOne(catalog);\n    ```\n\n`MigrateCouchbaseToMongoDB`\
    \ 应用程序如下所列。\n\n```java\npackage mongodb;\n\nimport java.util.Arrays;\nimport java.util.Iterator;\n\
