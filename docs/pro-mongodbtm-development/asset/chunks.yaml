  trans: "\njpeg) 图 5-27. `findAndModify.js` 脚本的输出\n\n6.  在 Mongo shell 中运行 `db.catalog.find()`\
    \ 方法以列出更新后的文档。只有一个文档被更新，如 图 5-28 所示。因为 `catalogId` 字段的 `sort` 顺序设置为升序，所以找到的第一个文档\
    \ `catalogId:1` 就是被修改的文档。\n\n![9781484215999_Fig05-28.jpg](img/image00577.jpeg)\
    \ 图 5-28. 列出更新后的文档\n\n## 查找并移除单个文档\n\n`Collection` 类中的 `findAndRemove(query, sort,\
    \ options, callback)` 方法用于查找并移除一个文档。本章我们讨论了已弃用的方法 `findAndRemove()` 及其替代方法 `findOneAndDelete()`。方法参数如\
    \ 表 5-20 所示。\n\n表 5-20. `findAndRemove()` 方法的参数\n\n| 参数 | 类型 | 描述 |\n| --- | ---\
    \ | --- |\n| `query` | object | 选择器查询，用于找到要移除的文档。 |\n| `sort` | array | 如果多个文档匹配查询，则按指定顺序选择第一个进行移除。\
    \ |\n| `options` | object | 方法选项。支持的选项是 `w`、`wtimeout` 和 `j`。 |\n| `callback`\
    \ | `resultCallback(error, result)` | 回调函数。第一个参数是 Error 对象，第二个参数是方法结果，即被移除的文档。\
    \ |\n\n1.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建脚本 `findAndRemove.js`。\n\
    2.  用 `db.catalog.drop()` 从 `local` 数据库中删除 `catalog` 集合。\n3.  按照前面的讨论，向集合中添加两个文档。`catalogId`\
    \ 字段应具有数值，因为我们将按 `catalogId` 字段排序。\n\n```\ndoc1 = {\"catalogId\" : 1, \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 11122013,\"\
