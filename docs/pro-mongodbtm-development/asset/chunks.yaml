    \ 应用程序中添加的 4 个文档中删除 2 个后，`catalog` 集合中的文档数量。\n\n## 总结\n\n在本章中，我们使用了 MongoDB Java\
    \ 驱动程序来访问 MongoDB 服务器并向数据库添加文档。随后，我们从数据库中获取文档，并对文档进行了更新和删除。在本章中，我们还介绍了 Mongo shell。在下一章中，我们将讨论\
    \ Mongo shell。\n"
- fmt: '# MongoDB数据库基础操作：Shell环境、数据库、集合与文档


    ## 本章内容


    *   入门指南

    *   数据库操作

    *   集合操作

    *   文档操作


    ## 入门指南


    在以下小节中，我们将设置环境，包括安装必需的软件。我们将启动Mongo shell并连接到MongoDB服务器，同时讨论如何在Mongo shell中运行命令。


    ### 环境设置


    如果尚未安装，请从[第1章](#part0007.xhtml)下载并安装以下软件：


    *   本章使用适用于Windows 64位的MongoDB (3.0.5)。从`http://www.mongodb.org/downloads`下载二进制发行版。


    双击MongoDB二进制发行版以安装MongoDB。将MongoDB安装目录的`bin`目录添加到`PATH`环境变量中。为MongoDB数据创建目录`C:\data\db`。在命令窗口中使用以下命令启动MongoDB服务器。


    ```

    >mongod

    ```


    MongoDB服务器启动，如[图2-1](#part0008.xhtml#Fig1)所示。


    ![9781484215999_Fig02-01.jpg](Images/image00425.jpeg)


    [图2-1](#part0008.xhtml#_Fig1). 启动MongoDB


    ### 启动Mongo Shell


    打开一个新的命令窗口。使用以下命令启动Mongo shell。


    ```

    >mongo

    ```


    Mongo shell启动并默认连接到`test`数据库，如[图2-2](#part0008.xhtml#Fig2)所示。默认情况下，Mongo shell连接到`localhost`上的MongoDB，端口为27017。


    ![9781484215999_Fig02-02.jpg](Images/image00426.jpeg)


    [图2-2](#part0008.xhtml#_Fig2). 启动Mongo Shell


    可能会生成类似“Hotifx KB2731284或后续更新未安装，将清零数据文件”的消息。产生此消息的原因之一是MongoDB安装在目录路径包含空格的目录中，例如目录路径`C:\Program
    Files\MongoDB\Server\3.0`。如果消息是由带空格的目录路径引起的，可以忽略此消息。如果原因是未创建`C:\data\db`目录，请创建该目录。


    要启动不连接任何数据库的Mongo shell，请运行以下命令。在运行此命令前，请打开一个新的命令窗口，因为我们已经使用`mongo`命令连接过一次。


    ```

    >mongo –nodb>

    ```


    随后，可以使用JavaScript `Mongo()`构造函数打开到MongoDB服务器的连接，该函数默认连接到`localhost`的端口27017。


    ```

    >connection=new Mongo()

    ```


    可以使用Mongo shell中的`getDB()`方法设置数据库，如[图2-3](#part0008.xhtml#Fig3)所示。


    ```

    db=connection.getDB("test")

    ```


    ![9781484215999_Fig02-03.jpg](Images/image00427.jpeg)


    [图2-3](#part0008.xhtml#_Fig3). 初始时不连接数据库启动Mongo Shell


    上述命令的结果是，Mongo shell连接到默认主机`localhost`和默认端口27017上的MongoDB服务器，并使用`test`数据库，这与直接运行`mongo`命令相同。使用`Mongo()`构造函数在连接到非默认主机和端口时很有用。


    或者，可以在Mongo shell中使用`connect`方法连接到MongoDB。使用`–nodb`选项启动Mongo shell后，使用以下命令连接到`localhost`和端口27017上的MongoDB，并将数据库设置为`test`。


    ```

    db = connect("localhost:27017/test");

    ```


    `connect()`方法连接到MongoDB的`test`数据库，如[图2-4](#part0008.xhtml#Fig4)所示。


    ![9781484215999_Fig02-04.jpg](Images/image00428.jpeg)


    [图2-4](#part0008.xhtml#_Fig4). 使用connect()方法连接到MongoDB


    ### 在Mongo Shell中运行命令或方法


    可以在Mongo shell中运行以下类型的命令和方法。


    *   数据库命令

    *   Mongo shell JavaScript辅助方法

    *   Mongo shell帮助方法


    JavaScript辅助方法与帮助方法之间的区别在于JavaScript辅助方法使用JavaScript。数据库命令具有BSON文档格式，由键/值对组成，第一个键是命令名称，后续的键/值对是命令选项。例如，用于创建集合的`create`命令具有以下语法。


    ```

    { create: <collection_name>, option1:value, option2:value, option3:value,..optionN:value
    }

    ```


    `create`命令提供以下选项（仅讨论主要选项）。


    *   `capped`。设置为`boolean`值（true或false）以指定集合是否为固定集合。默认值为false。如果设置为true，则还需要size选项。固定集合是大小固定的集合，当达到最大大小时，较早的文档会被覆盖。

    *   `autoIndexId`。设置为`boolean`值（`true`或`false`）以指定是否在`_id`字段上自动创建索引。默认值为`true`。

    *   `size`。固定集合的最大大小（以字节为单位）。固定集合必需。

    *   `max`。固定集合中的最大文档数。size设置优先于max设置。例如，如果`size`为3且`max`为4，则最大文档数为3。


    可以使用Mongo shell辅助方法`db.runCommand()`运行数据库命令。例如，可以使用Mongo shell中的以下辅助/包装JavaScript方法运行`create`命令来创建名为“mongo”的集合。


    ```

    db.runCommand({ create: "mongo" })

    ```


    命令响应是一个JSON文档，至少包含`ok`字段，该字段指示命令是否成功，如[图2-5](#part0008.xhtml#Fig5)所示。值为1表示命令成功，值为0表示命令失败。


    ![9781484215999_Fig02-05.jpg](Images/image00429.jpeg)


    [图2-5](#part0008.xhtml#_Fig5). 使用db.runCommand()辅助方法


    `create`命令是那些具有等效JavaScript shell辅助方法`db.createCollection()`的命令之一。可以按如下方式创建`mongo`集合。


    ```

    db.createCollection("mongo")

    ```


    前面的命令返回一个JSON文档，其`ok`字段设置为1，表示命令成功，如[图2-6](#part0008.xhtml#Fig6)所示。


    ![9781484215999_Fig02-06.jpg](Images/image00430.jpeg)


    [图2-6](#part0008.xhtml#_Fig6). 使用db.createCollection()辅助方法


    如果前面的命令要在`db.runCommand`之后运行以创建`mongo`集合，则必须使用`db.mongo.drop()`命令删除该集合，以避免“集合已存在”错误消息，如[图2-7](#part0008.xhtml#Fig7)所示。（请参阅本章后面的“删除集合”。）'
  raw: 'The MongoDB data storage structures are similar to those of a SQL relational
    database. A MongoDB database is similar to an SQL database. A table in an SQL
    database is a collection in MongoDB. A row in an SQL database is a document in
    MongoDB. A column in an SQL database is a field in MongoDB. MongoDB distribution
    includes an interactive shell called the Mongo shell. The Mongo shell provides
    database commands of different kinds including aggregation commands (for example,
    the `count` command finds the number of documents in a collection), collection
    commands (for example, the `create` command creates a collection), and administration
    commands (for example, the `copydb` command copies a database instance). The Mongo
    shell provides various JavaScript Mongo shell helper methods for data operations
    and administration. Some of the database commands have the equivalent Mongo shell
    helper methods, while others don’t. In this chapter we shall discuss how to access
    the Mongo shell and run database commands and JavaScript helper methods on a database,
    collection, or document.


    This chapter includes the following topics:


    *   Getting started

    *   Using databases

    *   Using collections

    *   Using documents


    Getting Started


    In the following subsections we shall set up the environment including installing
    the required software. We shall start Mongo shell and connect with MongoDB server.
    And we will also discuss running a command in Mongo shell.


    Setting Up the Environment


    Download and install the following software if not already installed from [Chapter
    1](#part0007.xhtml):


    *   MongoDB (3.0.5) for Windows 64-bit is used in this chapter. Download binary
    distribution from `http://www.mongodb.org/downloads`.


    Double-click on the MongoDB binary distribution to install MongoDB. Add the `bin`
    directory of the MongoDB installation to the `PATH` environment. Create a directory
    `C:\data\db` for the MongoDB data. Start the MongoDB server with the following
    command in a Command window.


    ```

    >mongod

    ```


    The MongoDB server gets started as shown in [Figure 2-1](#part0008.xhtml#Fig1).


    ![9781484215999_Fig02-01.jpg](Images/image00425.jpeg)


    [Figure 2-1](#part0008.xhtml#_Fig1). Starting MongoDB


    Starting the Mongo Shell


    Open a new Command window. Start the Mongo shell with the following command.


    ```

    >mongo

    ```


    The Mongo shell gets started and gets connected to the `test` database by default
    as shown in [Figure 2-2](#part0008.xhtml#Fig2). By default the Mongo shell connects
    to MongoDB on `localhost` on port 27017.


    ![9781484215999_Fig02-02.jpg](Images/image00426.jpeg)


    [Figure 2-2](#part0008.xhtml#_Fig2). Starting Mongo Shell


    A message similar to "Hotifx KB2731284 or later update is not installed, will
    zero-out data files" might get generated. One of the reasons for the message is
    that MongoDB is installed in a directory such that the directory path has spaces,
    for example, directory path `C:\Program Files\MongoDB\Server\3.0`. The message
    may be ignored if directory path with spaces is the cause of the message. If the
    reason for the message is that the `C:\data\db` directory has not been created,
    create the directory `C:\data\db`.


    To start the Mongo shell without connecting to any database, run the following
    command. Before running the following command, open a new command window as we
    already connected once using the `mongo` command.


    ```

    >mongo –nodb

    ```


    Subsequently a connection may be opened to MongoDB server using the JavaScript
    `Mongo()` constructor, which by default connects to `localhost` at port 27017.


    ```

    >connection=new Mongo()

    ```


    The `getDB()` method in Mongo shell may be used to set the database as shown in
    [Figure 2-3](#part0008.xhtml#Fig3).


    ```

    db=connection.getDB("test")

    ```


    ![9781484215999_Fig02-03.jpg](Images/image00427.jpeg)


    [Figure 2-3](#part0008.xhtml#_Fig3). Starting Mongo Shell without Connecting to
    a Database at First


    As a result of the preceding commands the Mongo shell is connected to MongoDB
    server on the default host `localhost` and on the default port 27017 with the
    `test` database in use, which is the same if just the `mongo` command is run.
    Connecting using the `Mongo()` constructor is useful if connecting to a non-default
    host and port.


    Alternatively, the `connect` method may be used to connect to MongoDB in Mongo
    shell. After starting Mongo shell with `–nodb` option, connect to MongoDB on localhost
    and port 27017 and set database as `test` with the following command.


    ```

    db = connect("localhost:27017/test");

    ```


    The `connect()` method gets connected to MongoDB `test` database as shown in [Figure
    2-4](#part0008.xhtml#Fig4).


    ![9781484215999_Fig02-04.jpg](Images/image00428.jpeg)


    [Figure 2-4](#part0008.xhtml#_Fig4). Using the connect() Method to Connect to
    MongoDB


    Running a Command or Method in Mongo Shell


    The following kinds of commands and methods may be run in Mongo shell.


    *   The database commands.

    *   Mongo shell JavaScript helper methods

    *   Mongo shell help methods


    The difference between the JavaScript helper methods and the help methods is that
    the JavaScript helper methods make use of JavaScript. The database commands have
    the BSON document format consisting of key/value pairs with the first key being
    the name of the command and subsequent key/value pairs being the command options.
    For example, the `create` command, which is used to create a collection, has the
    following syntax.


    ```

    { create: <collection_name>, option1:value, option2:value, option3:value,..optionN:value
    }

    ```


    The `create` command provides the following options (only the main options are
    discussed).


    *   `capped`. Set to `boolean` value (true or false) to specify if the collection
    is a capped collection. Default value is false. If true is set, the size option
    is also required. A capped collection is a fixed size collection in which the
    earlier documents are overwritten when the maximum size is reached.

    *   `autoIndexId`. Set to `boolean` value (`true` or `false`) to specify if an
    automatic index is to be created on the `_id` field. The default value is `true`.

    *   `size`. The maximum size in bytes of a capped collection. Required for a capped
    collection.

    *   `max`. Maximum number of documents in a capped collection. The size setting
    takes precedence over the max setting. For example, if `size` is 3 and `max` is
    4, the maximum number of documents is 3.


    The database commands may be run using the Mongo shell helper method `db.runCommand()`.
    For example the `create` command may be run to create a collection “mongo” using
    the following helper/wrapper JavaScript method in Mongo shell.


    ```

    db.runCommand({ create: "mongo" })

    ```


    A command response is a JSON document with at least the `ok` field, which indicates
    if the command succeeded as shown in [Figure 2-5](#part0008.xhtml#Fig5). A value
    of 1 indicates the command succeeded and a value of 0 indicates the command failed.


    ![9781484215999_Fig02-05.jpg](Images/image00429.jpeg)


    [Figure 2-5](#part0008.xhtml#_Fig5). Using the db.runCommand() Helper Method


    The `create` command is one of those commands that have an equivalent JavaScript
    shell helper method, the `db.createCollection()` method. The `mongo` collection
    could have been created as follows.


    ```

    db.createCollection("mongo")

    ```


    The preceding command returns a JSON document with `ok` field set to 1, which
