    environment variable. 4.  Start MongoDB server with the following command.                    ```     >mongod     ```              MongoDB
    server gets started as shown in [Figure 4-9](#part0010.xhtml#Fig9).    ![9781484215999_Fig04-09.jpg](Images/image00517.jpeg)    [Figure
    4-9](#part0010.xhtml#_Fig9). Starting MongoDB Server    Using a Collection    In
    the following subsections we shall connect to MongoDB server, get database information,
    and create a collection.    Creating a Connection with MongoDB    In this section
    we shall connect with MongoDB Server using a Ruby script.    1.  Create a directory
    called `C:\Ruby21-x64\mongodbscripts` for Ruby scripts. 2.  Create a Ruby script
    `connection.rb` in the `C:\Ruby21-x64\mongodbscripts` directory. In the script
    add a `require` statement for the `mongo` gem. Add an `include` statement for
    the `Mongo` namespace.                    ```     require ''mongo''     include
    Mongo     ```                    The `Client` class provides several attributes
    and methods for getting information about the connection. Some of the attributes
    are discussed in [Table 4-2](#part0010.xhtml#Tab2).                    [Table
    4-2](#part0010.xhtml#_Tab2). Client Class Attributes                         |
    Attribute | Description |     | --- | --- |     | `cluster` | The cluster of servers
    for the client. |     | `database` | The database instance. |     | `options`
    | Configuration options. |                    Some of the salient methods in the
    `Client` class are discussed in [Table 4-3](#part0010.xhtml#Tab3).                    [Table
    4-3](#part0010.xhtml#_Tab3). Client Class Methods                         | Method
    | Return type | Description |     | --- | --- | --- |     | `[]` | `Mongo::Collection`
    | Gets a collection object. |     | `database_names` | `Array<String>` | Gets
    names of all databases. |     | `initialize` | `Client` | Instantiates a new driver
    client. |     | `list_databases` | `Array<Hash>` | Gets info for each database.
    |     | `read_preference` | `Object` | Gets the read preferences for the provided
    options. |     | `use(name)` | `Mongo::Client` | Uses the database with the specified
    name. |     | `with(new_options = {})` | `Mongo::Client` | Provides a new client
    with the options. |     | `write_concern` | `Mongo::WriteConcern` | Gets the write
    concern. |                    The syntax for `Client` class constructor is as
    follows.                    ```     initialize(addresses_or_uri, options = {})     ```                    The
    parameters for the constructor are discussed in [Table 4-4](#part0010.xhtml#Tab4).                    [Table
    4-4](#part0010.xhtml#_Tab4). Client Constructor Parameters                         |
    Parameter | Type | Description |     | --- | --- | --- |     | `addresses_or_uri`
    | `Array<String>, String` | Array of server addresses in the format host:port
    or a MongoDB URI connection string. |     | `options` | `Hash` | Client options.
    Defaults to {}. |                    Some of the options supported by `Client`
    class constructor are discussed in [Table 4-5](#part0010.xhtml#Tab5).                    [Table
    4-5](#part0010.xhtml#_Tab5).


    Client Class Constructor Options                         | Options | Type | Description
    |     | --- | --- | --- |     | `:auth_mech` | Symbol | Authentication mechanism
    to use. |     | `:connect` | Symbol | Connection method to use. Value could be
    `:direct`, `:replica_set`, `:sharded.` |     | `:database` | String | The database
    to connect to. |     | `:user` | String | Username. |     | `:password` | String
    | Password. |     | `:max_pool_size` | Integer | Maximum size of the connection
    pool. |     | `:min_pool_size` | Integer | Minimum size of the connection pool.
    |     | `:connect_timeout` | Float | Connection timeout in secs. |     | `:read`
    | Hash | Read preference options. The `:mode` option may be set to `:secondary`,`:secondary_preferred`,
    `:primary`, `:primary_preferred`, `:nearest.` |     | `:replica_set` | Symbol
    | Replica set to connect to. |     | `:write` | Hash | Write concern options.
    |           3.  In the `connection.rb` script create a connection with MongoDB
    Server using one of the `Client` class constructors. The host and port may be
    specified explicitly; if either is not specified the default value is used. If
    the host and port are not specified the default. host and port are `localhost:27017`.
    The default database is `test`. The following are some of the different applications
    of the `Client` class constructors.                    ```     client =Mongo::Client.new     client
    =Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'')     client
    =Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'', :connect =>
    :direct)     client =Mongo::Client.new(''mongodb://127.0.0.1:27017/test'')     client
    = Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'', :max_pool_size
    => 20, :connection_timeout => 60)     ```                    The IPv4 address
    of the host may be specified instead of localhost.                    ```     client
    =Mongo::Client.new([‘192.168.1.72:27017'' ], :database => ''test'')     ```                    The
    `Client` class attributes’ values may be output, and instance methods may be invoked
    using the `Client` class instance.                    The `connection.rb` script
    for connecting to MongoDB server, invoking some of the methods, and outputting
    some of the attribute values are listed:                    ```     require ''mongo''     include
    Mongo     #client =Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'')     #client
    =Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'', :connect =>
    :direct)     #client =Mongo::Client.new(''mongodb://127.0.0.1:27017/test'')     client
    = Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'', :max_pool_size
    => 20, :connection_timeout => 60)     print "Cluster: "     print  client.cluster     print
    "\n"     print "Configuration Options: "     print  client.options     print "\n"     print
    "Read Preference: "     print  client.read_preference     print "\n"     print
    "Write Concern : "     print client.write_concern     print "\n"     ```           4.  From
    the `C:\Ruby21-x64\mongodbscripts` directory run the `connection.rb` script with
    the following command.                    ```     >ruby connection.rb     ```                    The
    output from the `connection.rb` script is shown in [Figure 4-10](#part0010.xhtml#Fig10).                    ![9781484215999_Fig04-10.jpg](Images/image00518.jpeg)                    [Figure
    4-10](#part0010.xhtml#_Fig10). Running Ruby Sript connection.rb              Connecting
    to a Database    A MongoDB database instance is represented with the `Mongo::Database`
    class. In this section we shall create some MongoDB database instances and get
    other information about databases.    1.  Create a Ruby script `db.rb` in the
    `C:\Ruby21-x64\mongodbscripts` directory. The `Database` class provides several
    instance attributes and methods. The attributes are discussed in [Table 4-6](#part0010.xhtml#Tab6).                    [Table
    4-6](#part0010.xhtml#_Tab6).'
  trans: "\n# 安装 MongoDB 的 Ruby 驱动\n\n要安装 MongoDB Ruby 驱动 gem `mongo`，请完成以下步骤：\n\n\
    1.  运行以下命令。\n\n    ```ruby\n    >gem install mongo\n    ```\n\n    MongoDB Ruby\
    \ 驱动 gem 安装过程如 图 4-8 所示。\n\n    ![9781484215999_Fig04-08.jpg](img/image00516.jpeg)\n\
    \    图 4-8. 安装 MongoDB Ruby 驱动\n\n2.  接下来，安装 MongoDB 服务器。只有 MongoDB 2.4、2.6 和\
    \ 3.x 版本与 MongoDB Ruby 驱动 2.x 兼容。从 `www.mongodb.org/` 下载 MongoDB 3.0.5，并将 zip\
    \ 文件解压到一个目录。\n3.  将 MongoDB 安装目录下的 `bin` 目录（例如，`C:\\Program Files\\MongoDB\\Server\\\
    3.0\\bin`）添加到 `PATH` 环境变量中。\n4.  使用以下命令启动 MongoDB 服务器。\n\n    ```bash\n    >mongod\n\
    \    ```\n\n    MongoDB 服务器启动过程如 图 4-9 所示。\n\n    ![9781484215999_Fig04-09.jpg](img/image00517.jpeg)\n\
    \    图 4-9. 启动 MongoDB 服务器\n\n## 使用集合\n\n在以下小节中，我们将连接到 MongoDB 服务器，获取数据库信息，并创建一个集合。\n\
    \n### 与 MongoDB 建立连接\n\n在本节中，我们将使用 Ruby 脚本连接到 MongoDB 服务器。\n\n1.  为 Ruby 脚本创建一个名为\
    \ `C:\\Ruby21-x64\\mongodbscripts` 的目录。\n2.  在 `C:\\Ruby21-x64\\mongodbscripts`\
    \ 目录中创建一个 Ruby 脚本 `connection.rb`。在脚本中添加对 `mongo` gem 的 `require` 语句。为 `Mongo`\
    \ 命名空间添加一个 `include` 语句。\n\n    ```ruby\n    require 'mongo'\n    include Mongo\n\
    \    ```\n\n    `Client` 类提供了多个用于获取连接信息的属性和方法。部分属性在 表 4-2 中讨论。\n\n    表 4-2. Client\
    \ 类属性\n\n    | 属性 | 描述 |\n    | --- | --- |\n    | `cluster` | 客户端的服务器集群。 |\n\
    \    | `database` | 数据库实例。 |\n    | `options` | 配置选项。 |\n\n    `Client` 类中一些重要的方法在\
    \ 表 4-3 中讨论。\n\n    表 4-3. Client 类方法\n\n    | 方法 | 返回类型 | 描述 |\n    | --- | ---\
    \ | --- |\n    | `[]` | `Mongo::Collection` | 获取集合对象。 |\n    | `database_names`\
    \ | `Array<String>` | 获取所有数据库的名称。 |\n    | `initialize` | `Client` | 实例化一个新的驱动客户端。\
    \ |\n    | `list_databases` | `Array<Hash>` | 获取每个数据库的信息。 |\n    | `read_preference`\
    \ | `Object` | 获取指定选项的读取偏好。 |\n    | `use(name)` | `Mongo::Client` | 使用指定名称的数据库。\
    \ |\n    | `with(new_options = {})` | `Mongo::Client` | 使用这些选项提供一个新客户端。 |\n  \
    \  | `write_concern` | `Mongo::WriteConcern` | 获取写入关注。 |\n\n    `Client` 类构造函数的语法如下。\n\
    \n    ```ruby\n    initialize(addresses_or_uri, options = {})\n    ```\n\n   \
    \ 构造函数的参数在 表 4-4 中讨论。\n\n    表 4-4. Client 构造函数参数\n\n    | 参数 | 类型 | 描述 |\n  \
    \  | --- | --- | --- |\n    | `addresses_or_uri` | `Array<String>, String` | 以\
    \ host:port 格式表示的服务器地址数组或 MongoDB URI 连接字符串。 |\n    | `options` | `Hash` | 客户端选项。默认为\
    \ {}。 |\n\n    `Client` 类构造函数支持的部分选项在 表 4-5 中讨论。\n\n    表 4-5. Client 类构造函数选项\n\
    \n    | 选项 | 类型 | 描述 |\n    | --- | --- | --- |\n    | `:auth_mech` | Symbol |\
    \ 要使用的认证机制。 |\n    | `:connect` | Symbol | 要使用的连接方法。值可以是 `:direct`, `:replica_set`,\
    \ `:sharded`。 |\n    | `:database` | String | 要连接的数据库。 |\n    | `:user` | String\
    \ | 用户名。 |\n    | `:password` | String | 密码。 |\n    | `:max_pool_size` | Integer\
    \ | 连接池的最大大小。 |\n    | `:min_pool_size` | Integer | 连接池的最小大小。 |\n    | `:connect_timeout`\
    \ | Float | 连接超时时间（秒）。 |\n    | `:read` | Hash | 读取偏好选项。`:mode` 选项可以设置为 `:secondary`,\
    \ `:secondary_preferred`, `:primary`, `:primary_preferred`, `:nearest`。 |\n  \
    \  | `:replica_set` | Symbol | 要连接的副本集。 |\n    | `:write` | Hash | 写入关注选项。 |\n\
    \n3.  在 `connection.rb` 脚本中，使用 `Client` 类的一个构造函数创建与 MongoDB 服务器的连接。可以显式指定主机和端口；如果未指定其中任何一个，则使用默认值。如果未指定主机和端口，默认的主机和端口是\
    \ `localhost:27017`。默认数据库是 `test`。以下是 `Client` 类构造函数的一些不同应用方式。\n\n    ```ruby\n\
    \    client =Mongo::Client.new\n    client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\n    client =Mongo::Client.new([ '127.0.0.1:27017' ],\
    \ :database => 'test', :connect => :direct)\n    client =Mongo::Client.new('mongodb://127.0.0.1:27017/test')\n\
    \    client = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test', :max_pool_size\
    \ => 20, :connection_timeout => 60)\n    ```\n\n    可以指定主机的 IPv4 地址代替 localhost。\n\
    \n    ```ruby\n    client =Mongo::Client.new(['192.168.1.72:27017' ], :database\
    \ => 'test')\n    ```\n\n    可以输出 `Client` 类属性的值，并使用 `Client` 类实例调用实例方法。\n\n \
    \   用于连接到 MongoDB 服务器、调用一些方法并输出一些属性值的 `connection.rb` 脚本如下所列：\n\n    ```ruby\n\
    \    require 'mongo'\n    include Mongo\n    #client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\n    #client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test', :connect => :direct)\n    #client =Mongo::Client.new('mongodb://127.0.0.1:27017/test')\n\
    \    client = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test', :max_pool_size\
    \ => 20, :connection_timeout => 60)\n    print \"Cluster: \"\n    print  client.cluster\n\
    \    print \"\\n\"\n    print \"Configuration Options: \"\n    print  client.options\n\
    \    print \"\\n\"\n    print \"Read Preference: \"\n    print  client.read_preference\n\
    \    print \"\\n\"\n    print \"Write Concern : \"\n    print client.write_concern\n\
    \    print \"\\n\"\n    ```\n\n4.  从 `C:\\Ruby21-x64\\mongodbscripts` 目录，使用以下命令运行\
    \ `connection.rb` 脚本。\n\n    ```bash\n    >ruby connection.rb\n    ```\n\n   \
    \ `connection.rb` 脚本的输出如 图 4-10 所示。\n\n    ![9781484215999_Fig04-10.jpg](img/image00518.jpeg)\n\
    \    图 4-10. 运行 Ruby 脚本 connection.rb\n\n### 连接到数据库\n\n一个 MongoDB 数据库实例由 `Mongo::Database`\
    \ 类表示。在本节中，我们将创建一些 MongoDB 数据库实例并获取有关数据库的其他信息。\n\n1.  在 `C:\\Ruby21-x64\\mongodbscripts`\
    \ 目录中创建一个 Ruby 脚本 `db.rb`。`Database` 类提供了多个实例属性和方法。这些属性在 表 4-6 中讨论。\n\n    表 4-6.\n"
- fmt: "# Database 和 Collection 类参考\n\n## Database 类\n\n### 实例属性\n\n| 参数 | 类型 | 描述\
    \ |\n| --- | --- | --- |\n| `client` | `Client` | 数据库客户端。 |\n| `name` | `String`\
    \ | 数据库名称。 |\n| `options` | `Hash` | 配置选项。 |\n\n`Database` 类支持的一些实例方法在 [表 4-7](#part0010.xhtml#Tab7)\
    \ 中讨论。\n\n### Database 类方法\n\n| 方法 | 返回类型 | 描述 |\n| --- | --- | --- |\n| `[]`\
    \ 或 `collection` | `Mongo::Collection` | 获取此数据库中的一个集合。 |\n| `collection_names(options\
    \ = {})` | `Array<String>` | 获取所有非系统集合的名称。 |\n| `collections` | `Array<Mongo::Collection>`\
    \ | 获取此数据库下所有的集合。 |\n| `command(operation, opts = {})` | `Hash` | 在数据库上执行一个命令。\
    \ |\n| `drop` | `Result` | 删除此数据库。 |\n| `initialize(client, name, options = {})`\
    \ | `Database` | 实例化一个新的 `Database` 对象。 |\n| `list_collections` | `Array<Hash>`\
    \ | 获取数据库中所有集合的信息。 |\n| `users` | `View::User` | 获取数据库的用户视图。 |\n\n`Database` 类构造函数具有以下签名。\n\
    \n```ruby\ninitialize(client, name, options = {})\n```\n\n构造函数参数与类属性相同，并在 [表 4-6](#part0010.xhtml#Tab6)\
    \ 中讨论。\n\n1.  在 `db.rb` 脚本中，像之前一样创建一个 `Client` 实例。\n\n    ```ruby\n    client\
    \ = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n    ```\n\n\
    2.  使用 `Client` 实例的 `database` 属性获取数据库，并使用数据库实例的 `name` 属性输出数据库名称。\n\n    ```ruby\n\
    \    db = client.database\n    print db.name\n    ```\n\n3.  使用 `client` 和 `options`\
    \ 属性输出客户端和配置选项。\n\n    ```ruby\n    print db.client\n    print db.options\n  \
    \  ```\n\n4.  使用 `Client` 类的 `database_names()` 方法输出数据库名称。\n\n    ```ruby\n  \
    \  print client.database_names\n    ```\n\n5.  遍历 `Client` 实例的 `list_databases()`\
    \ 方法返回的集合，输出每个数据库的信息。\n\n    ```ruby\n    client.list_databases.each { |info|\
    \ puts info.inspect }\n    ```\n\n6.  要使用特定数据库，调用 `Client` 实例的 `use(database)`\
    \ 方法。例如，可以将数据库设置为 `mongo` 数据库。\n\n    ```ruby\n    client = client.use(:mongo)\n\
    \    ```\n\n7.  将数据库设置为 `mongo` 后，再次输出数据库名称以验证设置。使用 `drop()` 方法删除数据库。\n\n    ```ruby\n\
    \    print db.drop\n    ```\n\n`db.rb` 脚本如下所列。\n\n```ruby\nrequire 'mongo'\ninclude\
    \ Mongo\n\nclient = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n\
    print \"Database Connected to: \"\ndb = client.database\nprint db.name\nprint\
    \ \"\\n\"\n\nprint \"Database Client: \"\nprint db.client\nprint \"\\n\"\n\nprint\
    \ \"Database Options: \"\nprint db.options\nprint \"\\n\"\n\nprint \"Database\
    \ Names: \"\nprint client.database_names\nprint \"\\n\"\n\nprint \"Database Info:\
    \ \"\nclient.list_databases.each { |info| puts info.inspect }\nprint \"\\n\"\n\
    \nprint \"Use Database mongo: \"\nclient = client.use(:mongo)\nprint \"\\n\"\n\
    \nprint \"Database Connected to: \"\ndb = client.database\nprint db.name\nprint\
    \ \"\\n\"\n\nprint \"Use Database mongo: \"\nclient = client.use(:local)\nprint\
    \ \"\\n\"\n\nprint \"Database Connected to: \"\ndb = client.database\nprint db.name\n\
    print \"\\n\"\n\nprint db.drop\n```\n\n8.  使用以下命令运行 `db.rb` 脚本。\n\n    ```bash\n\
    \    >ruby db.rb\n    ```\n\n`db.rb` 脚本的输出如 [图 4-11](#part0010.xhtml#Fig11) 所示。在输出中需要注意的是，将数据库实例设置为\
    \ `mongo` 后，`mongo` 数据库实例不会通过 `database_names` 列出，因为尚未访问该数据库实例。\n\n![9781484215999_Fig04-11.jpg](Images/image00519.jpeg)\n\
    **图 4-11** 运行 Ruby 脚本 db.rb\n\n在删除数据库实例 `local` 后，如 [图 4-12](#part0010.xhtml#Fig12)\
    \ 所示，该数据库不会在 Mongo shell 中通过 `show dbs` 命令列出。\n\n![9781484215999_Fig04-12.jpg](Images/image00520.jpeg)\n\
    **图 4-12** `local` 数据库未通过 `show dbs` 列出\n\n由于我们将在后续章节中使用 `local` 数据库，请在 Mongo\
    \ shell 中使用以下命令创建 `local` 数据库。\n\n```bash\n>use local\n>db.createCollection(\"\
    local\")\n```\n\n## 创建集合\n\n`Mongo::Database` 类提供了几种用于集合的方法，这些方法在 [表 4-7](#part0010.xhtml#Tab7)\
    \ 中讨论。集合由 `Mongo::Collection` 类表示。`Collection` 类提供了几个实例属性和方法。属性在 [表 4-8](#part0010.xhtml#Tab8)\
    \ 中讨论。\n\n### Collection 类实例属性\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `database`\
    \ | `Mongo::Database` | 所属数据库。 |\n| `name` | `String` | 集合名称。 |\n| `options` |\
    \ `Hash` | 配置选项。 |\n\n`Collection` 类支持的一些实例方法在 [表 4-9](#part0010.xhtml#Tab9) 中讨论。\n\
    \n### Collection 类实例方法\n\n| 方法 | 返回类型 | 描述 |\n| --- | --- | --- |\n| `bulk_write(operations,\
    \ options)` | `BSON::Document` | 运行一批批量写操作。 |\n| `capped?` | `true`, `false` |\
    \ 判断集合是否为固定集合。 |\n| `create` | `Result` | 创建一个集合。 |\n| `drop` | `Result` | 删除一个集合。\
    \ |\n| `find(filter = nil)` | `CollectionView` | 查找集合中的文档。 |\n| `indexes(options\
    \ = {})` | `View::Index` | 返回集合所有索引的视图。 |\n| `insert_many(documents, options =\
    \ {})` | `Result` | 在集合中插入提供的文档。 |\n| `insert_one(document, options = {})` | `Result`\
    \ | 在集合中插入单个文档。 |\n| `namespace` | `String` | 获取集合的完全限定命名空间。 |\n\n`Collection`\
    \ 类构造函数具有以下签名。\n\n```ruby\ninitialize(database, name, options = {})\n```\n\n构造函数参数与类属性相同。\n\
    \n1.  首先，在 `C:\\Ruby21-x64\\mongodbscripts` 目录中创建一个 Ruby 脚本 `collection.rb`，并像之前一样包含\
    \ `mongo` gem 和 `Mongo` 命名空间。\n2.  创建一个用于连接到 MongoDB 的 `Client` 实例，随后获取 `local`\
    \ 数据库的实例。\n\n    ```ruby\n    client = Mongo::Client.new([ '127.0.0.1:27017' ],\
    \ :database => 'test')\n    ```\n\n3.  使用 `Client` 类中的 `use(database)` 实例方法，将数据库设置为\
    \ `local`。\n\n    ```ruby\n    client = client.use(:local)\n    ```\n\n4.  使用\
    \ `Mongo::Database` 类中的 `collection_names()` 方法输出集合名称。\n\n    ```ruby\n    print\
    \ db.collection_names({})\n    ```\n\n5.  使用 `list_collections()` 方法输出所有集合的信息。\n\
    \n    ```ruby\n    db.list_collections.each { |info| puts info.inspect }\n   \
