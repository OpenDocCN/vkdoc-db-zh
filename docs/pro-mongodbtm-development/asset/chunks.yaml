    in Mongo shell in [Figure 5-18](#part0011.xhtml#Fig18).                    ![9781484215999_Fig05-18.jpg](Images/image00565.jpeg)                    [Figure
    5-18](#part0011.xhtml#_Fig18). Creating the catalog Collection           2.  Create
    an `addDocument.js` script in the `C:\Program Files\nodejs\scripts` directory.
    The `Collection` class provides the `insertOne(doc, options, callback)` method
    to add a single document. 3.  In the `addDocument.js` script add `require` statements
    for the `Db`, `Server,` and `Collection` classes.                    ```     Server
    = require(''mongodb'').Server;     Db = require(''mongodb'').Db;     Collection
    = require(''mongodb'').Collection;     ```                    The parameters for
    the `insertOne` document are discussed in [Table 5-13](#part0011.xhtml#Tab13).                    [Table
    5-13](#part0011.xhtml#_Tab13).'
  trans: "\n## 集合操作\n\n本节将介绍如何在 MongoDB 中创建、重命名和删除集合，以及输出集合相关信息。我们在前一节已经使用了 `listCollections()`\
    \ 方法。\n\n1.  在 `C:\\Program Files\\nodejs\\scripts` 目录下创建一个 JavaScript 脚本 `collection.js`。\n\
    2.  导入所需的类 `MongoClient`、`Server` 和 `Db`；根据 `Db` 实例的创建方式，可能会部分或全部用到这些类来创建和访问集合。\n\
    \    ```javascript\n    MongoClient = require('mongodb').MongoClient;\n    Server\
    \ = require('mongodb').Server;\n    Db = require('mongodb').Db;\n    ```\n3. \
    \ 为本地数据库创建一个 `Db` 实例，如之前所述。\n    ```javascript\n    var db = new Db('local', new\
    \ Server('localhost', 27017));\n    db.open(function(error, db) {\n        if\
    \ (error)\n            console.log(error);\n    });\n    ```\n4.  在 `open()` 方法的回调函数块中，使用\
    \ `db` 实例调用 `collections(callback)` 方法。在 `collections(callback)` 方法的回调函数块中，输出集合信息。\n\
    \    ```javascript\n    db.collections(function(error, collections){\n       \
    \ if (error)\n            console.log(error);\n        else{\n            console.log(\"\
    Collections in database local\");\n            console.log(collections);\n   \
    \     }\n    });\n    ```\n5.  类似地，在 `open()` 方法的回调函数块中使用 `db` 实例，调用 `collection(name,\
    \ options, callback)` 方法来获取 `mongodb` 集合实例。在 `collection(name, options, callback)`\
    \ 方法的回调函数块中，输出有关集合的信息，例如集合名称、集合是否为 capped 集合以及集合中的文档数量。\n    ```javascript\n \
    \   db.collection('mongodb', function(error, collection){\n        if (error)\n\
    \            console.log(error);\n        else{\n            console.log(\"Got\
    \ collection from local database, collection name: \"+collection.collectionName);\n\
    \            collection.isCapped(function(error, result){\n                console.log(\"\
    Is collection capped?: \" +result);\n            });\n            collection.count(function(error,\
    \ result){\n                console.log(\"Document count in the collection: \"\
    +result);\n            });\n        }\n    });\n    ```\n6.  接下来，使用 `createCollection(name,\
    \ options, callback)` 方法创建一个名为 `mongo` 的集合。在回调函数中输出集合名称。\n    ```javascript\n\
    \    db.createCollection('mongo', function(error, collection){\n        if (error)\n\
    \            console.log(error);\n        else{\n            console.log(\"Collection\
    \ created. Collection name: \"+collection.collectionName);\n        }\n    });\n\
    \    ```\n7.  使用 `renameCollection(fromCollection, toCollection, options, callback)`\
    \ 方法将 `mongodb` 集合重命名为 `mongocoll`。输出回调函数中返回的集合名称。\n    ```javascript\n    db.renameCollection('mongodb',\
    \ 'mongocoll', function(error, collection){\n        if (error)\n            console.log(error);\n\
    \        else{\n            console.log(\"Collection renamed: \"+collection.collectionName);\n\
    \        }\n    });\n    ```\n8.  使用 `dropCollection(name, callback)` 方法删除 `mongocoll`\
    \ 集合。\n    ```javascript\n    db.dropCollection('mongocoll', function(error, result){\n\
    \        if (error)\n            console.log(error);\n        else{\n        \
    \    console.log(\"Collection mongocoll dropped: \"+result);\n        }\n    });\n\
    \    ```\n\n`collection.js` 脚本如下所示。\n```javascript\nMongoClient = require('mongodb').MongoClient;\n\
    Server = require('mongodb').Server;\nDb = require('mongodb').Db;\nvar db = new\
    \ Db('local', new Server('localhost', 27017));\ndb.open(function(error, db) {\n\
    \    if (error)\n        console.log(error);\n    db.collections(function(error,\
    \ collections){\n        if (error)\n            console.log(error);\n       \
    \ else{\n            console.log(\"Collections in database local\");\n       \
    \     console.log(collections);\n        }\n    });\n    db.collection('mongodb',\
    \ function(error, collection){\n        if (error)\n            console.log(error);\n\
    \        else{\n            console.log(\"Got collection from local database,\
    \ collection name: \"+collection.collectionName);\n            collection.isCapped(function(error,\
    \ result){\n                console.log(\"Is collection capped?: \" +result);\n\
    \            });\n            collection.count(function(error, result){\n    \
    \            console.log(\"Document count in the collection: \"+result);\n   \
    \         });\n        }\n    });\n    db.createCollection('mongo', function(error,\
    \ collection){\n        if (error)\n            console.log(error);\n        else{\n\
    \            console.log(\"Collection created. Collection name: \"+collection.collectionName);\n\
    \        }\n    });\n    db.renameCollection('mongodb', 'mongocoll', function(error,\
    \ collection){\n        if (error)\n            console.log(error);\n        else{\n\
    \            console.log(\"Collection renamed: \"+collection.collectionName);\n\
    \        }\n    });\n    db.dropCollection('mongocoll', function(error, result){\n\
    \        if (error)\n            console.log(error);\n        else{\n        \
    \    console.log(\"Collection mongocoll dropped: \"+result);\n        }\n    });\n\
    });\n```\n\n9.  在运行 `collection.js` 脚本之前，请在 Mongo shell 中的本地数据库中创建一个名为 `mongodb`\
    \ 的集合，如图 5-15 所示。如果 `local` 数据库已有 `mongodb` 集合，则无需创建。\n    ![9781484215999_Fig05-15.jpg](img/image00562.jpeg)\n\
    \    **图 5-15** 创建 mongodb 集合\n\n10.  使用以下命令运行 `collection.js` 脚本。\n    ```bash\n\
    \    >node collection.js\n    ```\n    脚本输出如图 5-16 所示。脚本会持续运行，要停止脚本请按 `Ctrl +\
    \ C`。\n    ![9781484215999_Fig05-16.jpg](img/image00563.jpeg)\n    **图 5-16**\
    \ collection.js 脚本输出\n\n我们从 `mongodb` 集合开始。随后我们创建了一个名为 `mongo` 的集合。我们将 `mongodb`\
    \ 集合重命名为 `mongocoll`，然后删除了 `mongocoll` 集合。如图 5-17 所示，`local` 数据库中除了 `startup_log`\
    \ 和 `system.indexes` 集合外，唯一的集合是 `mongo` 集合。\n![9781484215999_Fig05-17.jpg](img/image00564.jpeg)\n\
    **图 5-17** 运行 collection.js 脚本后本地数据库中的集合列表\n\n## 使用文档\n\n在以下小节中，我们将添加文档、批量添加文档、查询文档、更新文档、删除文档以及对文档执行批量操作。\n\
    \n### 添加单个文档\n\n在本节中，我们将向 MongoDB 集合添加一个文档。\n\n1.  首先，在 Mongo shell 中的 `local`\
    \ 数据库中创建一个名为 `catalog` 的集合。\n    ```bash\n    >db.createCollection('catalog')\n\
    \    ```\n    在 Mongo shell 中使用 `show collections` 命令列出已创建的 `catalog` 集合，如图 5-18\
    \ 所示。\n    ![9781484215999_Fig05-18.jpg](img/image00565.jpeg)\n    **图 5-18**\
    \ 创建 catalog 集合\n2.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个 `addDocument.js`\
    \ 脚本。`Collection` 类提供了 `insertOne(doc, options, callback)` 方法来添加单个文档。\n3.  在 `addDocument.js`\
    \ 脚本中，为 `Db`、`Server` 和 `Collection` 类添加 `require` 语句。\n    ```javascript\n  \
    \  Server = require('mongodb').Server;\n    Db = require('mongodb').Db;\n    Collection\
    \ = require('mongodb').Collection;\n    ```\n    `insertOne` 文档的参数在表 5-13 中讨论。\n\
    \    **表 5-13** insertOne 方法的参数\n"
- fmt: "## `insertOne()` 方法参数\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `doc` |\
    \ object | 要插入的文档。 |\n| `options` | object | 方法选项。支持的选项包括 `w` (写入关注)、`wtimeout`\
    \ (写入关注超时时间)、`j` (布尔值，指示是否启用日志写入关注)、`serializeFunctions` (布尔值，指示是否序列化任何对象上的函数)\
    \ 和 `forceServerObjectId` (布尔值，指示是否由服务器分配 `_id` 值而不是由驱动程序分配)。 |\n| `callback`\
    \ | `insertWriteOpCallback(error, result)` | 结果回调函数。 |\n\n## 添加单个文档\n\n4.  使用类构造函数创建一个\
    \ `Db` 实例。\n\n    ```\n    var db = new Db('local', new Server('localhost', 27017));\n\
    \    ```\n\n5.  使用 `open()` 方法打开数据库。\n\n    ```\n    db.open(function(error, db)\
    \ {\n        //Get collection catalog\n    });\n    ```\n\n6.  在结果回调函数中，调用 `Db`\
    \ 实例的 `collection()` 方法以获取 `catalog` 集合。\n\n    ```\n    db.collection('catalog',\
    \ function(error, collection){\n        if (error)\n            console.log(error);\n\
    \        else{\n            //Add document with insertOne\n        }\n    });\n\
    \    ```\n\n7.  创建要添加文档的 JSON 数据。\n\n    ```\n    doc1 = {\"catalogId\" : 'catalog1',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'David A. Kelly'};\n    ```\n\n8.  使用 `insertOne()` 方法添加文档。\n\n    ```\n \
    \   collection.insertOne(doc1, function(error, result){\n        if (error)\n\
    \            console.log(error);\n        else{\n            console.log(\"Document\
    \ added: \"+result);\n        }\n    });\n    ```\n\n    `addDocument.js` 的完整代码如下。\n\
    \n    ```\n    Server = require('mongodb').Server;\n    Db = require('mongodb').Db;\n\
    \    Collection = require('mongodb').Collection;\n    var db = new Db('local',\
    \ new Server('localhost', 27017));\n    db.open(function(error, db) {\n      \
    \  if (error)\n            console.log(error);\n        else{\n            db.collection('catalog',\
    \ function(error, collection){\n                if (error)\n                 \
    \   console.log(error);\n                else{\n                    doc1 = {\"\
    catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'};\n                    collection.insertOne(doc1,\
    \ function(error, result){\n                        if (error)\n             \
    \               console.log(error);\n                        else{\n         \
    \                   console.log(\"Document added: \"+result);\n              \
    \          }\n                    });\n                }\n            });\n  \
    \      }\n    });\n    ```\n\n9.  使用以下命令运行 `addDocument.js` 脚本。\n\n    ```\n \
    \   >node addDocument.js\n    ```\n\n    一个文档会被添加。脚本的输出如 [Figure 5-19](#part0011.xhtml#Fig19)\
    \ 所示。\n\n    ![9781484215999_Fig05-19.jpg](Images/image00566.jpeg)\n\n    [Figure\
    \ 5-19](#part0011.xhtml#_Fig19)。`addDocument.js` 的输出\n\n10. 在 mongo shell 中运行以下命令来列出已添加的文档。\n\
    \n    ```\n    >use local\n    >db.catalog.find()\n    ```\n\n    如 [Figure 5-20](#part0011.xhtml#Fig20)\
    \ 所示，添加的文档被列出。\n\n    ![9781484215999_Fig05-20.jpg](Images/image00567.jpeg)\n\n\
    \    [Figure 5-20](#part0011.xhtml#_Fig20)。列出已添加的文档\n\n## 添加多个文档\n\n在本节中，我们将向\
    \ MongoDB 集合添加多个文档。\n\n1.  在 `local` 数据库中删除 `catalog` 集合并重新创建它，因为我们将使用同一个集合来添加多个文档。\n\
    \n    ```\n    >use local\n    >db.catalog.drop()\n    >db.createCollection('catalog')\n\
    \    ```\n\n    `Collection` 类提供了 `insertMany(docs, options, callback)` 方法来添加多个文档。\n\
    \n    该方法的参数在 [Table 5-14](#part0011.xhtml#Tab14) 中讨论。\n\n## `insertMany` 方法参数\n\
    \n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `docs` | Array <object> | 要插入的文档数组。\
    \ |\n| `options` | object | 方法选项。支持的选项包括 `w` (写入关注)、`wtimeout` (写入关注超时时间)、`j`\
    \ (布尔值，指示是否启用日志写入关注)、`serializeFunctions` (布尔值，指示是否序列化任何对象上的函数) 和 `forceServerObjectId`\
    \ (布尔值，指示是否由服务器分配 `_id` 值而不是由驱动程序分配)。 |\n| `callback` | `insertWriteOpCallback(error,\
    \ result)` | 结果回调函数。 |\n\n2.  创建一个脚本 `addDocuments.js` 来添加文档。导入 `Server`、`Db`\
    \ 和 `Collection` 类。\n\n    ```\n    Server = require('mongodb').Server;\n    Db\
    \ = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    ```\n\n3.  如前一节关于添加单个文档所述，获取 `catalog` 集合的 `Collection` 实例。创建要添加的两个文档的 JSON\
    \ 数据。\n\n    ```\n    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \    doc2 = {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'};\n    ```\n\n4.  使用 `Collection`\
    \ 类的 `insertMany()` 实例方法，添加一个文档数组。\n\n    ```\n    collection.insertMany([doc1,doc2],\
    \ function(error, result){\n        if (error)\n            console.log(error);\n\
    \        else{\n            console.log(\"Documents added: \"+result);\n     \
    \   }\n    });\n    ```\n\n    `addDocuments.js` 脚本的完整代码如下。\n\n    ```\n    Server\
    \ = require('mongodb').Server;\n    Db = require('mongodb').Db;\n    Collection\
    \ = require('mongodb').Collection;\n    var db = new Db('local', new Server('localhost',\
    \ 27017));\n    db.open(function(error, db) {\n        if (error)\n          \
    \  console.log(error);\n        else{\n            db.collection('catalog', function(error,\
    \ collection){\n                if (error)\n                    console.log(error);\n\
    \                else{\n                    doc1 = {\"catalogId\" : 'catalog1',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013',\"title\" : 'Engineering as a Service',\"author\"\
    \ : 'David A. Kelly'};\n                    doc2 = {\"catalogId\" : 'catalog2',\
    \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 'November December 2013',\"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'};\n                    collection.insertMany([doc1,doc2],\
    \ function(error, result){\n                        if (error)\n             \
    \               console.log(error);\n                        else{\n         \
    \                   console.log(\"Documents added: \"+result);\n             \
    \           }\n                    });\n                }\n            });\n \
    \       }\n    });\n    ```\n\n5.  删除并重新创建 `catalog` 集合，然后运行脚本。\n\n    ```\n \
    \   > db.catalog.drop()\n    >db.createCollection('catalog')\n    >node addDocuments.js\n\
    \    ```\n\n    [Figure 5-21](#part0011.xhtml#Fig21) 中的输出显示有两个文档被添加。\n\n    ![9781484215999_Fig05-21.jpg](Images/image00568.jpeg)\n\
    \n    [Figure 5-21](#part0011.xhtml#_Fig21)。`addDocuments.js` 的输出\n\n    在 Mongo\
    \ shell 中运行 `db.catalog.find()` 命令以列出已添加的文档，如 [Figure 5-22](#part0011.xhtml#Fig22)\
    \ 所示。\n\n    ![9781484215999_Fig05-22.jpg](Images/image00569.jpeg)\n\n    [Figure\
    \ 5-22](#part0011.xhtml#_Fig22)。"
  raw: 'Parameters for insertOne() Method                         | Parameter | Type
    | Description |     | --- | --- | --- |     | `doc` | object | Document to insert.
    |     | `options` | object | Method options. The supported options are `w` (the
    write concern), `wtimeout` (the write concern timeout), `j` (Boolean indicating
    whether to enable journal write concern), `serializeFunctions` (Boolean indicating
    whether to serialize functions on any object), and `forceServerObjectId`(Boolean
    indicating whether the server assigns the `_id` values instead of the driver).
    |     | `callback` | `insertWriteOpCallback(error, result)` | The result callback
    function. |           4.  Create a `Db` instance using the class constructor.                    ```     var
    db = new Db(''local'', new Server(''localhost'', 27017));     ```           5.  Open
    the database using the `open()` method.                    ```     db.open(function(error,
    db) {     //Get collection catalog     });     ```           6.  Invoke the `collection()`
    method of `Db` instance to get a `catalog` collection in the result callback function.                    ```     db.collection(''catalog'',
    function(error, collection){     if (error)              console.log(error);     else{      //Add
    document with insertOne      }     });     ```           7.  Create JSON for a
    document to add.                    ```     doc1 = {"catalogId" : ''catalog1'',
    "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition"
    : ''November December 2013'',"title" : ''Engineering as a Service'',"author" : ''David
    A. Kelly''};     ```           8.  Add the document using the `insertOne()` method.                    ```     collection.insertOne(doc1,
    function(error, result){     if (error)     console.log(error);     else{     console.log("Document
    added: "+result);     }     });     ```                    The `addDocument.js`
    is listed.                    ```     Server = require(''mongodb'').Server;     Db
    = require(''mongodb'').Db;     Collection = require(''mongodb'').Collection;     var
    db = new Db(''local'', new Server(''localhost'', 27017));     db.open(function(error,
    db) {      if (error)              console.log(error);     else{     db.collection(''catalog'',
    function(error, collection){     if (error)              console.log(error);     else{      doc1
    = {"catalogId" : ''catalog1'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle
    Publishing'', "edition" : ''November December     2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''};     collection.insertOne(doc1,
    function(error, result){     if (error)              console.log(error);     else{     console.log("Document
    added: "+result);     }     });}     });     }});     ```           9.  Run the
    `addDocument.js` script with the following command.                    ```     >node
    addDocument.js     ```                    A document gets added. The output from
    the script is shown in [Figure 5-19](#part0011.xhtml#Fig19).                    ![9781484215999_Fig05-19.jpg](Images/image00566.jpeg)                    [Figure
    5-19](#part0011.xhtml#_Fig19). Output from addDocument.js           10.  Run the
    following command in mongo shell to list the document added.                    ```     >use
    local     >db.catalog.find()     ```              As shown in [Figure 5-20](#part0011.xhtml#Fig20)
    the added document gets listed.    ![9781484215999_Fig05-20.jpg](Images/image00567.jpeg)    [Figure
    5-20](#part0011.xhtml#_Fig20). Listing Added Document    Adding Multiple Documents    In
    this section we add multiple documents to a MongoDB collection.    1.  Drop the
    `catalog` collection in the `local` database and create the `catalog` collection
    again as we shall be using the same collection to add multiple documents.                    ```     >use
    local     >db.catalog.drop()     >db.createCollection(‘catalog’)     ```                    The
    `Collection` class provides the `insertMany(docs, options, callback)` method to
    add multiple documents.


    The method parameters are discussed in [Table 5-14](#part0011.xhtml#Tab14).                    [Table
    5-14](#part0011.xhtml#_Tab14). Parameters for insertMany Method                         |
    Parameter | Type | Description |     | --- | --- | --- |     | `docs` | Array
    <object> | Documents to insert. |     | `options` | object | Method options. The
    supported options are `w` (the write concern), `wtimeout` (the write concern timeout),
    `j` (Boolean indicating whether to enable journal write concern), `serializeFunctions`
    (Boolean indicating whether to serialize functions on any object), and `forceServerObjectId`(Boolean
    indicating whether the server assigns the `_id` values instead of the driver).
    |     | `callback` | `insertWriteOpCallback(error, result)` | The result callback
    function. |           2.  Create a script `addDocuments.js` to add documents.
    Import the `Server`, `Db,` and `Collection` classes.                    ```     Server
    = require(''mongodb'').Server;     Db = require(''mongodb'').Db;     Collection
    = require(''mongodb'').Collection;     ```           3.  As in the preceding section
    on adding a single document obtain a `Collection` instance for the `catalog` collection.
    Create JSON for two documents to add.                    ```     doc1 = {"catalogId"
    : ''catalog1'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'',
    "edition" : ''November December 2013'',"title" : ''Engineering as a Service'',"author"
    : ''David A. Kelly''};     doc2 = {"catalogId" : ''catalog2'', "journal" : ''Oracle
    Magazine'', "publisher" : ''Oracle Publishing'', "edition" : ''November December
    2013'',"title" : ''Quintessential and Collaborative'',"author" : ''Tom Haunert''};     ```           4.  Using
    the `insertMany()` instance method from `Collection` class, add an array of documents.                    ```     collection.insertMany([doc1,doc2],
    function(error, result){     if (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     ```                    The `addDocuments.js`
    script is listed.                    ```     Server = require(''mongodb'').Server;     Db
    = require(''mongodb'').Db;     Collection = require(''mongodb'').Collection;     var
    db = new Db(''local'', new Server(''localhost'', 27017));     db.open(function(error,
    db) {      if (error)              console.log(error);     else{     db.collection(''catalog'',
    function(error, collection){          if (error)              console.log(error);     else{      doc1
    = {"catalogId" : ''catalog1'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle
    Publishing'', "edition" : ''November December     2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''};     doc2 = {"catalogId" : ''catalog2'',
    "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition"
    : ''November December     2013'',"title" : ''Quintessential and Collaborative'',"author"
    : ''Tom Haunert''};     collection.insertMany([doc1,doc2], function(error, result){     if
    (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });}          });     }});     ```           5.  Drop
    and created the `catalog` collection and run the script with the following commands.                    ```     >
    db.catalog.drop()     >db.createCollection(''catalog'')     >node addDocuments.js     ```              The
    output in [Figure 5-21](#part0011.xhtml#Fig21) shows that two documents get added.    ![9781484215999_Fig05-21.jpg](Images/image00568.jpeg)    [Figure
    5-21](#part0011.xhtml#_Fig21). Output from addDocuments.js    Run the `db.catalog.find()`
    command in Mongo shell to list the documents added as shown in [Figure 5-22](#part0011.xhtml#Fig22).    ![9781484215999_Fig05-22.jpg](Images/image00569.jpeg)    [Figure
    5-22](#part0011.xhtml#_Fig22).'
  trans: "\n## `insertOne()` 方法参数\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `doc`\
    \ | object | 要插入的文档。 |\n| `options` | object | 方法选项。支持的选项包括 `w` (写入关注)、`wtimeout`\
    \ (写入关注超时时间)、`j` (布尔值，指示是否启用日志写入关注)、`serializeFunctions` (布尔值，指示是否序列化任何对象上的函数)\
    \ 和 `forceServerObjectId` (布尔值，指示是否由服务器分配 `_id` 值而不是由驱动程序分配)。 |\n| `callback`\
    \ | `insertWriteOpCallback(error, result)` | 结果回调函数。 |\n\n## 添加单个文档\n\n4.  使用类构造函数创建一个\
    \ `Db` 实例。\n\n    ```\n    var db = new Db('local', new Server('localhost', 27017));\n\
    \    ```\n\n5.  使用 `open()` 方法打开数据库。\n\n    ```\n    db.open(function(error, db)\
    \ {\n        //获取集合目录\n    });\n    ```\n\n6.  在结果回调函数中，调用 `Db` 实例的 `collection()`\
    \ 方法以获取 `catalog` 集合。\n\n    ```\n    db.collection('catalog', function(error,\
    \ collection){\n        if (error)\n            console.log(error);\n        else{\n\
    \            //使用 insertOne 添加文档\n        }\n    });\n    ```\n\n7.  创建要添加文档的\
    \ JSON 数据。\n\n    ```\n    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \    ```\n\n8.  使用 `insertOne()` 方法添加文档。\n\n    ```\n    collection.insertOne(doc1,\
    \ function(error, result){\n        if (error)\n            console.log(error);\n\
    \        else{\n            console.log(\"文档已添加: \"+result);\n        }\n    });\n\
    \    ```\n\n    `addDocument.js` 的完整代码如下。\n\n    ```\n    Server = require('mongodb').Server;\n\
    \    Db = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    var db = new Db('local', new Server('localhost', 27017));\n    db.open(function(error,\
    \ db) {\n        if (error)\n            console.log(error);\n        else{\n\
    \            db.collection('catalog', function(error, collection){\n         \
    \       if (error)\n                    console.log(error);\n                else{\n\
    \                    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \                    collection.insertOne(doc1, function(error, result){\n   \
    \                     if (error)\n                            console.log(error);\n\
    \                        else{\n                            console.log(\"文档已添加:\
    \ \"+result);\n                        }\n                    });\n          \
    \      }\n            });\n        }\n    });\n    ```\n\n9.  使用以下命令运行 `addDocument.js`\
    \ 脚本。\n\n    ```\n    >node addDocument.js\n    ```\n\n    一个文档会被添加。脚本的输出如 图 5-19\
    \ 所示。\n\n    ![9781484215999_Fig05-19.jpg](img/image00566.jpeg)\n\n    图 5-19。`addDocument.js`\
    \ 的输出\n\n10. 在 mongo shell 中运行以下命令来列出已添加的文档。\n\n    ```\n    >use local\n    >db.catalog.find()\n\
    \    ```\n\n    如 图 5-20 所示，添加的文档被列出。\n\n    ![9781484215999_Fig05-20.jpg](img/image00567.jpeg)\n\
    \n    图 5-20。列出已添加的文档\n\n## 添加多个文档\n\n在本节中，我们将向 MongoDB 集合添加多个文档。\n\n1.  在 `local`\
    \ 数据库中删除 `catalog` 集合并重新创建它，因为我们将使用同一个集合来添加多个文档。\n\n    ```\n    >use local\n\
    \    >db.catalog.drop()\n    >db.createCollection('catalog')\n    ```\n\n    `Collection`\
    \ 类提供了 `insertMany(docs, options, callback)` 方法来添加多个文档。\n\n    该方法的参数在 表 5-14\
    \ 中讨论。\n\n## `insertMany` 方法参数\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `docs`\
    \ | Array <object> | 要插入的文档数组。 |\n| `options` | object | 方法选项。支持的选项包括 `w` (写入关注)、`wtimeout`\
    \ (写入关注超时时间)、`j` (布尔值，指示是否启用日志写入关注)、`serializeFunctions` (布尔值，指示是否序列化任何对象上的函数)\
    \ 和 `forceServerObjectId` (布尔值，指示是否由服务器分配 `_id` 值而不是由驱动程序分配)。 |\n| `callback`\
    \ | `insertWriteOpCallback(error, result)` | 结果回调函数。 |\n\n2.  创建一个脚本 `addDocuments.js`\
    \ 来添加文档。导入 `Server`、`Db` 和 `Collection` 类。\n\n    ```\n    Server = require('mongodb').Server;\n\
    \    Db = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    ```\n\n3.  如前一节关于添加单个文档所述，获取 `catalog` 集合的 `Collection` 实例。创建要添加的两个文档的 JSON\
    \ 数据。\n\n    ```\n    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \    doc2 = {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'};\n    ```\n\n4.  使用 `Collection`\
    \ 类的 `insertMany()` 实例方法，添加一个文档数组。\n\n    ```\n    collection.insertMany([doc1,doc2],\
    \ function(error, result){\n        if (error)\n            console.log(error);\n\
    \        else{\n            console.log(\"文档已添加: \"+result);\n        }\n    });\n\
    \    ```\n\n    `addDocuments.js` 脚本的完整代码如下。\n\n    ```\n    Server = require('mongodb').Server;\n\
    \    Db = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    var db = new Db('local', new Server('localhost', 27017));\n    db.open(function(error,\
    \ db) {\n        if (error)\n            console.log(error);\n        else{\n\
    \            db.collection('catalog', function(error, collection){\n         \
    \       if (error)\n                    console.log(error);\n                else{\n\
    \                    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \                    doc2 = {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Quintessential and Collaborative',\"author\" : 'Tom Haunert'};\n\
    \                    collection.insertMany([doc1,doc2], function(error, result){\n\
    \                        if (error)\n                            console.log(error);\n\
    \                        else{\n                            console.log(\"文档已添加:\
    \ \"+result);\n                        }\n                    });\n          \
    \      }\n            });\n        }\n    });\n    ```\n\n5.  删除并重新创建 `catalog`\
    \ 集合，然后运行脚本。\n\n    ```\n    > db.catalog.drop()\n    >db.createCollection('catalog')\n\
    \    >node addDocuments.js\n    ```\n\n    图 5-21 中的输出显示有两个文档被添加。\n\n    ![9781484215999_Fig05-21.jpg](img/image00568.jpeg)\n\
    \n    图 5-21。`addDocuments.js` 的输出\n\n    在 Mongo shell 中运行 `db.catalog.find()`\
    \ 命令以列出已添加的文档，如 图 5-22 所示。\n\n    ![9781484215999_Fig05-22.jpg](img/image00569.jpeg)\n\
    \n    图 5-22。\n"
- fmt: "# Mongo Shell 文档查询操作\n\n## 查找单个文档\n\n`Collection` 类提供了 `findOne(query, options,\
    \ callback)` 方法，用于从集合中查找单个文档。该方法的参数在 [Table 5-15](#part0011.xhtml#Tab15) 中讨论。\n\
    \n**Table 5-15. `findOne()` 方法参数**\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n\
    | `query` | object | 用于查找单个文档的选择器查询。 |\n| `options` | object | 方法选项。 |\n| `callback`\
    \ | `resultCallback(error, result)` | 回调函数。回调函数的第一个参数是如果产生错误时的 `MongoError` 对象，第二个参数是\
    \ `result`。 |\n\n`findOne()` 方法支持的一些选项在 [Table 5-16](#part0011.xhtml#Tab16) 中讨论。\n\
    \n**Table 5-16. `findOne()` 方法的部分选项**\n\n![Table5-16.jpg](Images/image00570.jpeg)\n\
    \n### 操作步骤\n\n1.  创建一个脚本 `findOneDocument.js`，并像之前一样导入所需的类。\n2.  创建一个 `Db` 实例并打开数据库实例。\n\
    3.  创建一个集合并向集合中添加一个文档数组。在 `createCollection()` 方法的回调函数方法块内，调用 `findOne()` 方法。在选择器查询中，指定\
    \ `journal` 字段设置为 `'Oracle Magazine'`。在 `options` 参数中，指定要返回的字段为 `edition`、`title`\
    \ 和 `author`，并将 `skip` 选项设置为 `1`。在回调函数中，第二个参数是由 `findOne()` 方法返回的文档游标。将单个文档输出到控制台。\n\
    \n    ```javascript\n    collection.findOne({journal:'Oracle Magazine'}, {fields:{edition:1,title:1,author:1},\
    \ skip:1},\n    function(error, result) {\n     if (error) console.log(error.message);\n\
    \      else\n       console.log(result);\n          });\n    ```\n\n    `findOneDocument.js`\
    \ 脚本如下：\n\n    ```javascript\n    Server = require('mongodb').Server;\n    Db\
    \ = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
    \    var db = new Db('local', new Server('localhost', 27017));\n    db.open(function(error,\
    \ db) {\n     if (error)\n            console.log(error);\n    else{\n    db.createCollection('catalog',\
    \ function(error, collection){\n    if (error)\n            console.log(error);\n\
    \    else{\n     doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine',\
    \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"\
    title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n     doc2\
    \ = {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'};\n     collection.insertMany([doc1,doc2],\
    \ function(error, result){\n     if (error)\n            console.log(error);\n\
    \     else{\n     console.log(\"Documents added: \"+result);\n     }\n     });\n\
    \    collection.findOne({journal:'Oracle Magazine'}, {fields:{edition:1,title:1,author:1},\
    \ skip:1},\n    function(error, result) {\n     if (error) console.log(error.message);\n\
    \      else\n       console.log(result);\n          });\n    }\n    });\n    }});\n\
    \    ```\n\n4.  在命令行中运行脚本 `node findOneDocument.js`。单个文档被输出到控制台，如 [Figure 5-23](#part0011.xhtml#Fig23)\
    \ 所示。由于设置了 `fields` 选项，因此只输出了指定的字段。\n\n![9781484215999_Fig05-23.jpg](Images/image00571.jpeg)\n\
    \n**Figure 5-23. 查找单个文档**\n\n## 查找所有文档\n\n在本节中，我们将从集合中查找所有文档。\n\n### 操作步骤\n\n\
    1.  从 `local` 数据库中删除 `catalog` 集合，因为我们将在本节中使用相同的集合。\n\n    ```javascript\n   \
    \ >use local\n    >db.catalog.drop()\n    ```\n\n    虽然 `findOne` 文档返回单个文档，但 `find(query)`\
    \ 方法可用于根据选择器查询返回一个或多个文档。`find()` 方法只有一个参数 `query`，并返回一个 `Cursor`。\n\n2.  在 `C:\\\
    Program Files\\nodejs\\scripts` 目录中创建一个脚本 `findAllDocuments.js` 来查找一个、多个或所有文档。导入所需的类\
    \ `Db`、`Collection` 和 `Server`。\n\n3.  创建并打开一个数据库实例，并使用 `createCollection()` 方法创建一个名为\
    \ `catalog` 的集合。在 `createCollection()` 方法块内，使用 `insertMany()` 方法向集合中添加两个文档。调用\
    \ `find()` 方法查找所有文档。如果未指定查询，则默认选择所有文档。`find()` 方法返回结果集上的 `Cursor`。在返回的 `Cursor`\
    \ 对象上调用 `toArray(callback)` 方法以返回一个文档数组。`toArray()` 方法的回调函数的第二个参数是 BSON 反序列化对象的数组。\n\
    \n    ```javascript\n    collection.find().toArray(function(error, result) {\n\
    \     if (error) console.warn(error.message);\n      else\n       console.log(result);\n\
    \          });\n    ```\n\n    `findAllDocuments.js` 脚本如下：\n\n    ```javascript\n\
    \    Server = require('mongodb').Server;\n    Db = require('mongodb').Db;\n  \
    \  Collection = require('mongodb').Collection;\n    var db = new Db('local', new\
    \ Server('localhost', 27017));\n    db.open(function(error, db) {\n     if (error)\n\
    \            console.log(error);\n    else{\n    db.createCollection('catalog',\
    \ function(error, collection){\n    if (error)\n            console.log(error);\n\
    \    else{\n     doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine',\
    \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"\
    title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n     doc2\
    \ = {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\"\
    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'};\n     collection.insertMany([doc1,doc2],\
    \ function(error, result){\n     if (error)\n            console.log(error);\n\
    \     else{\n     console.log(\"Documents added: \"+result);\n     }\n     });\n\
    \    collection.find().toArray(function(error, result) {\n     if (error) console.warn(error.message);\n\
    \      else\n       console.log(result);\n          });\n    }\n    });\n    }});\n\
    \    ```\n\n4.  运行脚本 `node findAllDocuments.js` 以查找并列出所有文档，如 [Figure 5-24](#part0011.xhtml#Fig24)\
    \ 所示。\n\n![9781484215999_Fig05-24.jpg](Images/image00572.jpeg)\n\n**Figure 5-24.\
    \ 查找所有文档**\n\n## 查找文档子集\n\n在本节中，我们将使用之前讨论过的 `find()` 方法来查找文档的子集。我们将使用 `skip`、`limit`\
    \ 和 `fields` 选项来跳过一些文档，限制文档数量，并返回字段的子集。\n\n### 操作步骤\n\n1.  创建一个脚本 `findSubsetDocuments.js`。导入所需的类\
    \ `Collection`、`Server` 和 `Db`。\n2.  创建并打开一个 `Db` 实例，并像前面的章节一样创建一个名为 `catalog`\
    \ 的集合。在 `createCollection()` 方法的回调函数块内，创建一个文档数组，并使用 `insertMany()` 方法将文档添加到集合中。\n\
    \n    ```javascript\n    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle\
    \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
    \ 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n\
    \    ```"
  raw: 'Listing Multiple Documents Added in Mongo Shell    Finding a Single Document    The
    `Collection` class provides the `findOne(query, options, callback)` method to
    find a single document from a collection. The method parameters are discussed
    in [Table 5-15](#part0011.xhtml#Tab15).    [Table 5-15](#part0011.xhtml#_Tab15).
    Parameters for findOne Method     | Parameter | Type | Description | | --- | ---
    | --- | | `query` | object | Selector query to find a single document. | | `options`
    | object | Method options. | | `callback` | `resultCallback(error, result)` |
    The callback function. The first parameter of the callback function is the `MongoError`
    object if an error is generated and the second parameter is result . |    Some
    of the options supported by the `findOne()` method are discussed in [Table 5-16](#part0011.xhtml#Tab16).    [Table
    5-16](#part0011.xhtml#_Tab16). Some of the Options for findOne() Method    ![Table5-16.jpg](Images/image00570.jpeg)    1.  Create
    a script `findOneDocument.js` and import the required classes as before. 2.  Create
    a `Db` instance and open the database instance. 3.  Create a collection and add
    an array of documents to the collection. Within the method block for the callback
    function for the `createCollection()` method invoke the `findOne()` method. In
    the selector query specify the `journal` field set to ‘`Oracle Magazine`’. In
    the options argument specify the fields to return as edition, title. and author
    and set the skip option to 1\. In the callback function the second parameter is
    the cursor to the document returned by the `findOne()` method. Output the single
    document to the console.                    ```     collection.findOne({journal:''Oracle
    Magazine''}, {fields:{edition:1,title:1,author:1}, skip:1},     function(error,
    result) {      if (error) console.log(error.message);       else        console.log(result);           });     The
    findOneDocument.js script is listed:     Server = require(''mongodb'').Server;     Db
    = require(''mongodb'').Db;     Collection = require(''mongodb'').Collection;     var
    db = new Db(''local'', new Server(''localhost'', 27017));     db.open(function(error,
    db) {      if (error)              console.log(error);     else{     db.createCollection(''catalog'',
    function(error, collection){     if (error)              console.log(error);     else{      doc1
    = {"catalogId" : ''catalog1'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle
    Publishing'', "edition" : ''November December     2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''};     doc2 = {"catalogId" : ''catalog2'',
    "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition"
    : ''November December     2013'',"title" : ''Quintessential and Collaborative'',"author"
    : ''Tom Haunert''};     collection.insertMany([doc1,doc2], function(error, result){     if
    (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     collection.findOne({journal:''Oracle Magazine''},
    {fields:{edition:1,title:1,author:1}, skip:1},     function(error, result) {      if
    (error) console.log(error.message);       else        console.log(result);           });     }     });     }});     ```           4.  Run
    the script with the command node `findOneDocument.js` in a command shell. A single
    document is output to the console as shown in [Figure 5-23](#part0011.xhtml#Fig23).
    Only the specified fields are output as the `fields` option was set.    ![9781484215999_Fig05-23.jpg](Images/image00571.jpeg)    [Figure
    5-23](#part0011.xhtml#_Fig23). Finding One Document    Finding All Documents    In
    this section we shall find all documents from a collection.    1.  Drop the catalog
    collection from the local database as we shall be using the same collection in
    this section.                    ```     >use local     >db.catalog.


    drop()     ```                    While the `findOne` document returns a single
    document the `find(query)` method may be used to return one or more documents
    based on the selector query. The `find()` method has only one parameter, query.
    and returns a Cursor.           2.  Create a script `findAllDocuments.js` in the
    `C:\Program Files\nodejs\scripts` directory to find one or more or all documents.
    Import the required classes `Db`, `Collection.` and `Server`. 3.  Create and open
    a database instance and create a collection called `catalog` using the `createCollection()`
    method. Within the `createCollection()` method block add two documents to the
    collection using the `insertMany()` method. Invoke the `find()` method to find
    all documents. If a query is not specified all documents are selected by default.
    The `find()` method returns a `Cursor` over the result set. Invoke the `toArray(callback)`
    method on the `Cursor` object returned to return an array of documents. The callback
    function to the `toArray()` method has as the second parameter an array of BSON
    deserialized objects.                    ```     collection.find().toArray(function(error,
    result) {      if (error) console.warn(error.message);       else        console.log(result);                });     ```                    The
    `findAllDocuments.js` script is listed:                    ```     Server = require(''mongodb'').Server;     Db
    = require(''mongodb'').Db;     Collection = require(''mongodb'').Collection;     var
    db = new Db(''local'', new Server(''localhost'', 27017));     db.open(function(error,
    db) {      if (error)              console.log(error);     else{     db.createCollection(''catalog'',
    function(error, collection){     if (error)              console.log(error);     else{      doc1
    = {"catalogId" : ''catalog1'', "journal" : ''Oracle Magazine'', "publisher" : ''Oracle
    Publishing'', "edition" : ''November December     2013'',"title" : ''Engineering
    as a Service'',"author" : ''David A. Kelly''};     doc2 = {"catalogId" : ''catalog2'',
