    Class Constructor    In the preceding example we used the `Server` topology. The
    topology could also be `Mongos` or `ReplSet`. For example, to use the `Mongos`
    topology, follow these steps:    1.  Add a `require` statement for `Mongos` and
    create an instance of `Mongos` using an array of `Server` instances as follows.
    Not all the `Server` instances in the array have to be servers that are running
    and available. For example, we have listed a server at port 50000, but no MongoDB
    server at port 50000 is running when we run the example.                    ```     var
    mongos = new Mongos([         new Server("localhost", 50000),         new Server("localhost",
    27017)       ]);     ```           2.  Create an instance of `Db` using the `Db`
    class constructor with database name as the first argument, the `Mongos` class
    instance as the second argument.                    ```     var db = new Db(''local'',
    mongos);     ```           3.  Open the database using the `open()` method and
    in the callback function block list the collections as before.                    The
    `db.js` script for the `Mongos` type topology is listed below.                    ```     Mongos
    = require(''mongodb'').Mongos;      Db = require(''mongodb'').Db;     Server = require(''mongodb'').Server;     var
    mongos = new Mongos([         new Server("localhost", 50000),         new Server("localhost",
    27017)       ]);     var db = new Db(''local'', mongos);     db.open(function(error,
    db) {      if (error)              console.log(error);     db.listCollections().toArray(function(error,
    items) {             console.log(items);             db.close();           });     });     ```           4.  Run
    the `db.js` script to list the collections in the `mongodb` database as shown
    in [Figure 5-14](#part0011.xhtml#Fig14).    ![9781484215999_Fig05-14.jpg](Images/image00561.jpeg)    [Figure
    5-14](#part0011.xhtml#_Fig14). Running db.js Script with Topology as Mongos    Using
    a Collection    A collection is represented with a `Collection` class object.
    The constructor for the `Collection` class does not take any args, and a new `Collection`
    instance may be created with `new Collection()`. The `Collection` class provides
    the properties discussed in [Table 5-11](#part0011.xhtml#Tab11).    [Table 5-11](#part0011.xhtml#_Tab11).
    Collection Class Properties     | Property | Type | Description | | --- | ---
    | --- | | `collectionName` | string | Gets the collection name. | | `namespace`
    | string | Gets the fully qualified collection namespace. | | `writeConcern` |
    object | Gets the current write concern values. | | `hint` | object | Gets the
    current index hint. |    The `Collection` constructor is not meant to be invoked
    directly but is invoked internally. Some of the methods provided by the `Collection`
    class are discussed in [Table 5-12](#part0011.xhtml#Tab12).    [Table 5-12](#part0011.xhtml#_Tab12).


    Some Collection Class Methods     | Method | Return Type | Description | | ---
    | --- | --- | | `bulkWrite(operations, options, callback)` | Promise if no callback
    specified. | Performs a bulk write operation. | | `count(query, options, callback)`
    | Promise if no callback specified. | Counts the number of matching documents.
    | | `createIndex(fieldOrSpec, options, callback)` | Promise if no callback specified.
    | Creates an index. | | `deleteMany(filter, options, callback)` | Promise if no
    callback specified. | Deletes multiple documents. | | `deleteOne(filter, options,
    callback)` | Promise if no callback specified. | Deletes a single document. |
    | `distinct(key, query, options, callback)` | Promise if no callback specified.
    | Distinct documents for a given key. | | `drop(callback)` | Promise if no callback
    specified. | Drops a collection. | | `dropIndex(indexName, options, callback)`
    | Promise if no callback specified. | Drops an index. | | `find(query)` | Cursor.
    | Finds documents. Creates a Cursor over the result set. | | `findAndModify(query,
    sort, doc, options, callback)` | Promise if no callback specified. | Finds and
    updates a document. The method is deprecated and its alternative methods are `findOneAndUpdate`,
    `findOneAndReplace` or `findOneAndDelete`. The deprecated method could still be
    used. | | `findAndRemove(query, sort, options, callback)` | Promise if no callback
    specified. | Finds and removes a document. The method is deprecated and its alternative
    method is `findOneAndDelete`. The deprecated method could still be used. | | `findOne(query,
    options, callback)` | Promise if no callback specified. | Finds a single document.
    | | `findOneAndDelete(filter, options, callback)` | Promise if no callback specified.
    | Finds a single document and deletes it. | | `findOneAndReplace(filter, replacement,
    options, callback)` | Promise if no callback specified. | Finds a single document
    and replaces it. | | `findOneAndUpdate(filter, update, options, callback)` | Promise
    if no callback specified. | Finds a single document and updates it. | | `indexes(callback)`
    | Promise if no callback specified. | Returns all the indexes. | | `insertMany(docs,
    options, callback)` | Promise if no callback specified. | Inserts an Array of
    Documents. | | `insertOne(doc, options, callback)` | Promise if no callback specified.
    | Inserts a single document. | | `isCapped(callback)` | Promise if no callback
    specified. | Finds if the collection is capped. | | `listIndexes(options)` | CommandCursor.
    | Lists all the indexes. | | `mapReduce(map, reduce, options, callback)` | Promise
    if no callback specified. | Runs a Map Reduce on the collection. | | `options(callback)`
    | Promise if no callback specified. | Returns the options set of the collection.
