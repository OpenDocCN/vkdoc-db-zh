    ## Installing the Maven Project\n\nIn the preceding section we developed the source\
    \ code for a Maven project. In this section we shall build the Maven project,\
    \ including generating the dependency JAR `KunderaMongoDB-1.0.0.jar` for the Maven\
    \ project.\n\nRight-click on `pom.xml` in Project Explorer and select Run As ![image](Images/image00406.jpeg)\
    \ Maven install as shown in [Figure 9-16](#part0015.xhtml#Fig16) to build and\
    \ install `KunderaMongoDB-1.0.0.jar` in the local repository in the target subdirectory.\n\
    \n![9781484215999_Fig09-16.jpg](Images/image00650.jpeg)\n\n[Figure 9-16](#part0015.xhtml#_Fig16).\
    \ Installing Maven Project\n\nMaven scans for projects and builds and installs\
    \ the `KunderaMongo` project as shown in [Figure 9-17](#part0015.xhtml#Fig17).\
    \ The output from the Maven install should include the message “BUILD SUCCESS.”\
    \ If not, some error has occurred and the Maven project has not been installed.\
    \ The `/root/workspace/KunderaMongoDB/target/KunderaMongoDB-1.0.0.jar` gets built\
    \ and installed.\n\n![9781484215999_Fig09-17.jpg](Images/image00651.jpeg)\n\n\
    [Figure 9-17](#part0015.xhtml#_Fig17). Output from Installing Maven Project\n\n\
    Next, we shall use the Maven Eclipse plugin to generate Eclipse IDE files for\
    \ use with the Maven project. We shall run the following goals, listed in [Table\
    \ 9-5](#part0015.xhtml#Tab5), from the Maven Eclipse plug-in.\n\n[Table 9-5](#part0015.xhtml#_Tab5).\
    \ Eclipse Specific Configuration Properties\n\n| Goal | Description |\n| --- |\
    \ --- |\n| `eclipse:clean` | Deletes the files used by Eclipse IDE. |\n| `eclipse:eclipse`\
    \ | Generates the Eclipse configuration files. |\n\nWe need to create a run configuration\
    \ for the `eclipse:clean eclipse:eclipse` goals.\n\n1.  Right-click on `pom.xml`\
    \ and select Run As ![image](Images/image00406.jpeg) Run Configuration as shown\
    \ in [Figure 9-18](#part0015.xhtml#Fig18).\n\n    ![9781484215999_Fig09-18.jpg](Images/image00652.jpeg)\n\
    \n    [Figure 9-18](#part0015.xhtml#_Fig18). Selecting pom.xml ![image](Images/image00406.jpeg)\
    \ Run As ![image](Images/image00406.jpeg) Run Configuration\n\n2.  Right-click\
    \ on Maven Build and select New.\n3.  For the new run configuration, specify the\
    \ following values and click on Apply.\n\n    *   Name: Eclipse (for example)\n\
    \    *   Base directory: The `KunderaMongoDB` project base directory\n    *  \
    \ Goals: `eclipse:clean eclipse:eclipse`\n\n4.  Subsequently click on Run as shown\
    \ in [Figure 9-19](#part0015.xhtml#Fig19).\n\n    ![9781484215999_Fig09-19.jpg](Images/image00653.jpeg)\n\
    \n    [Figure 9-19](#part0015.xhtml#_Fig19). Configuring a New Run Configuration\n\
    \nIf the Maven goals do not generate an error, a `BUILD SUCCESS` message should\
    \ get output as shown in [Figure 9-20](#part0015.xhtml#Fig20).\n\n![9781484215999_Fig09-20.jpg](Images/image00654.jpeg)\n\
    \n[Figure 9-20](#part0015.xhtml#_Fig20). Output from the Maven Goals\n\n## Running\
    \ the Kundera-Mongo JPA Client Class\n\nIn this section we shall run the `KunderaClient`\
    \ class in the `KunderaMongoDB` project. We shall use the Maven `exec:java` goal\
    \ from the Exec Maven plug-in to run the `KunderaClient` class. We specified the\
    \ class to run using the `mainClass` parameter to the `exec-maven-plugin` configuration\
    \ in `pom.xml`.\n\n```\n<configuration>\n  <mainClass>kundera.KunderaClient</mainClass>\n\
    </configuration>\n```\n\nWe shall run the `exec:java` goal in Eclipse to run the\
    \ `KunderaClient` class. But, first we need to create a new run configuration\
    \ in Eclipse.\n\n1.  Right-click on Maven Build in Run Configurations and New.\n\
    2.  Specify a Name (`KunderaClient`, for example) and a goal (`exec:java`) and\
    \ click on Apply and subsequently on Run as shown in [Figure 9-21](#part0015.xhtml#Fig21).\n\
    \n    ![9781484215999_Fig09-21.jpg](Images/image00655.jpeg)\n\n    [Figure 9-21](#part0015.xhtml#_Fig21).\
    \ Running the exec:java Goal\n\nThe `KunderaClient` application gets run and the\
    \ output for the invoked methods gets generated such as finding and listing entities.\
    \ In the next section we shall invoke the `KunderaClient` class methods to create,\
    \ find, update, and delete entities.\n\n## Invoking the KunderaClient Methods\n\
    \nNow it is time to invoke the methods.\n\n1.  First, invoke the `create()` method\
    \ in the `main` method and comment out the other methods. When the Run Configuration\
    \ for `exec:java` is run the `KunderaClient` application runs and the `create()`\
    \ method gets invoked to create some entities.\n2.  Subsequently, run the `db.catalog.find()`\
    \ method in Mongo shell to list the two entities added to MongoDB as shown in\
    \ [Figure 9-22](#part0015.xhtml#Fig22).\n\n    ![9781484215999_Fig09-22.jpg](Images/image00656.jpeg)\n\
    \n    [Figure 9-22](#part0015.xhtml#_Fig22). Listing the Two Documents Added to\
    \ MongoDB in Mongo Shell\n\n3.  Next, invoke the `findByClass()` method in the\
    \ `main` method by uncommenting the method invocation.\n4.  Run the `exec:java`\
    \ goal run configuration again. The `catalog1` entity fields get listed as shown\
    \ in [Figure 9-23](#part0015.xhtml#Fig23).\n\n    ![9781484215999_Fig09-23.jpg](Images/image00657.jpeg)\n\
    \n    [Figure 9-23](#part0015.xhtml#_Fig23). Output from Running the exec:java\
    \ run Configuration for Invoking the findByClass() Method\n\n5.  Next, invoke\
    \ the `query()` method using the `exec:java` run configuration. The output from\
