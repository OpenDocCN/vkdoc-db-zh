    \ because we would need to connect to MongoDB and add the fetched data to MongoDB.\n\
    \n5.  The `MongoClient` class represents a client to MongoDB and provides internal\
    \ connection pooling. We shall use the `MongoClient(List<ServerAddress> seeds)`\
    \ constructor with the `ServerAddress` instance constructed from the host as localhost\
    \ and the port on which the server is running as 27017. In the `migrate()` method\
    \ create a `MongoClient` instance.\n\n    ```java\n    MongoClient mongoClient\
    \ = new MongoClient(Arrays.asList(new ServerAddress(\n    \"localhost\", 27017)));\n\
    \    ```\n\n6.  A database instance is represented with the `com.mongodb.client.MongoDatabase`\
    \ class. Create a database object for the `local` database.\n\n    ```java\n \
