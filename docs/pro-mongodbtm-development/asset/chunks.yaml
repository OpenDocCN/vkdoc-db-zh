    7-21](#part0013.xhtml#_Fig21). Listing the Migrated Documents in Mongo Shell    Summary    Both
    Couchbase and MongoDB store documents as JSON with MongoDB having some advantages
    over Couchbase in document handling. In this chapter we migrated a Couchbase document
    to MongoDB. First, we created a JSON document in Couchbase in a Java application
    in Eclipse IDE. Subsequently we migrated the Couchbase document to MongoDB in
    another Java application. In the next chapter we shall migrate an Oracle Database
    table to MongoDB.    CHAPTER 8    ![image](Images/image00404.jpeg)    Migrating
    Oracle Database    MongoDB is the leading NoSQL database. MongoDB stores documents
    using the BSON (binary JSON) data format, which is the most flexible of data models
    with provisions to create hierarchies of data structures. Oracle Database stores
    data in a fixed schema table format. The database models of the two databases
    are vastly different: MongoDB being based on Document store while Oracle Database
    is based on the fixed table format with two-dimensional matrices made of columns
    and rows. In this chapter we shall migrate an Oracle Database table to MongoDB
    Server. While a direct migration tool is not available for migrating from Oracle
    to MongoDB, the latter provides an import tool called the `mongoimport` tool for
    importing data from a CSV, TSV, or JSON file into a MongoDB database. We shall
    first export Oracle Database table to a CSV file. Subsequently we shall import
    the CSV file data into MongoDB Server using the `mongoimport` tool. This chapter
    covers the following topics.    *   Overview of the `mongoimport` tool *   Setting
    up the environment *   Creating an Oracle Database table *   Exporting an Oracle
    Database table to a CSV file *   Importing data from a CSV file to MongoDB *   Displaying
    the JSON data in MongoDB    Overview of the mongoimport Tool    The `mongoimport`
    tool is used to transfer data from a file (CSV, TSV, or JSON) to MongoDB Server.
    The syntax for using the `mongoimport` tool is as follows.    ``` mongoimport
    <options> <file> ```    Some of the options supported by `mongoimport` are discussed
    in [Table 8-1](#part0014.xhtml#Tab1).    [Table 8-1](#part0014.xhtml#_Tab1). Options
    Supported by mongoimport Tool     | Option | Description | | --- | --- | | `-v
    , --verbose` | Verbosity option for a detailed output. Include multiple times
    for more verbosity, for example, `-vvv`. | | `--quiet` | Command output is not
    generated (data still transfers). | | `-h, --host` | MongoDB host to connect to.
    Could include port in the format `--host host:port`. | | `--port` | MongoDB port
    to connect to. | | `-u, --username` | Username for authentication. | | `-p, --password`
    | Password for authentication. | | `-d, --db` | Database instance to use. | |
    `-c, --collection` | Collection to use. | | `-f, --fields` | Field names separated
    by comma. | | `--file` | File to import from. If not specified, `stdin` is used.
    Could be a `.csv` file, `.json` file, or `.tsv` file. | | `--headerline` | Use
    the first line in the input file as field list. | | `--jsonArray` | Input source
    is JSON array. | | `--type` | Input format to import. Value could be `json`, `csv,`
    or `tsv`. Default is `json`. | | `--drop` | Drop collection before inserting documents.
    | | `--ignoreBlanks` | Ignore fields with empty values in CSV and TSV. | | `--maintainInsertionOrder`
    | Maintain insertion order. | | `--stopOnError` | Stop importing at first insert/upsert
    error.


    | | `--upsert` | Insert or update objects that already exist. | | `--writeConcern`
    | Write concern options. | | `--numInsertionWorkers, -j` | Number of insert operations
    to run concurrently. | | `--fieldFile` | File with field names - one per line.
    |    Setting Up the Environment    We need to download the following software
    for this chapter.    *   Oracle Database 12c. Download from `www.oracle.com/technetwork/database/enterprise-edition/downloads/index-092322.html`.
    *   MongoDB Server (Version: 3.0.5). *   The `mongoimport` tool is installed with
    MongoDB Server and for Windows located in `C:\Program Files\MongoDB\Server\3.0\bin`
    directory.    As a reminder, when installing and configuring MongoDB Server create
    the `c:\data\db` directory.    Creating an Oracle Database Table    First, create
    an Oracle Database table `WLSLOG` using the following SQL script. The SQL script
    may be run from SQL*Plus.    ``` CREATE TABLE OE.WLSLOG (ID VARCHAR2(255) PRIMARY
    KEY, TIME_STAMP VARCHAR2(255), CATEGORY VARCHAR2(255), TYPE VARCHAR2(255), SERVERNAME
    VARCHAR2(255), CODE VARCHAR2(255), MSG VARCHAR2(255)); INSERT INTO OE.WLSLOG (ID,
