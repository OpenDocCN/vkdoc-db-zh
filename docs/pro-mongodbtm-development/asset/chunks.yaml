  raw: 'Drop the `mongodb` collection with `db.mongodb.drop()`. Run the `db.mongodb.find()`
    command in Mongo shell to list the documents including the replaced document as
    shown in [Figure 4-30](#part0010.xhtml#Fig30).          ![9781484215999_Fig04-30.jpg](Images/image00538.jpeg)                    [Figure
    4-30](#part0010.xhtml#_Fig30). Listing the Replaced Document              **Example
    5**    In the fifth example the `find()` method filter is set to find all documents
    with `edition` set to `''November December 2013''` and the `find_one_and_update()`
    method is used to find and update the `edition` field using the `$set` operator.    ```
    document = collection.find(:edition => ''November December 2013'').find_one_and_update(''$set''
    => {:edition=>''11-12-2013''}) ```    When the `updateDocument.rb` script is run,
    one of the documents with `edition` set to `''November December 2013''` gets updated
    and the document before the update gets output, which is the default if `:return_document`
    is not set to `:after`, as shown in [Figure 4-31](#part0010.xhtml#Fig31).    ![9781484215999_Fig04-31.jpg](Images/image00539.jpeg)    [Figure
    4-31](#part0010.xhtml#_Fig31). Finding and Updating a Document    When the `db.mongodb.find()`
    command is run in Mongo shell the updated document gets listed as shown in [Figure
    4-32](#part0010.xhtml#Fig32).    ![9781484215999_Fig04-32.jpg](Images/image00540.jpeg)    [Figure
    4-32](#part0010.xhtml#_Fig32). Listing the Updated Document    The `updateDocument.rb`
    script is listed with each of the five examples commented out. Run the script
    by uncommenting the example code to run.    ``` require ''mongo'' include Mongo  client
    =Mongo::Client.new([ ''127.0.0.1:27017'' ], :database => ''test'') client=client.use(:local)
    db=client.database collection=db.collection("mongodb")  collection.create  document1={
      "catalogId" => 1,   "journal" => "Oracle Magazine",   "publisher" => "Oracle
    Publishing",   "edition" =>  "November December 2013",   "title" => "Engineering
    as a Service",   "author" =>  "David A. Kelly" }  document2={   "catalogId" =>
    2,   "journal" => "Oracle Magazine",   "publisher" => "Oracle Publishing",   "edition"
    =>  "November December 2013",   "title" => "Quintessential and Collaborative",
      "author" =>  "Tom Haunert" }    collection.insert_many([document1,document2])  print
    "\n"  collection = client[:mongodb]  #Update example 1  #result = collection.find(:journal
    => ''Oracle Magazine'').update_one("$inc" => { :catalogId => 1 })  #print "Number
    of documents updated: " #print "\n" #print result.n #print "\n"  #Update example
    2  #result = collection.find(:publisher => ''Oracle Publishing'').update_many(''$set''
    => { publisher: ''OraclePublishing''}) #print "Number of documents updated: "
    #print "\n" #print result.n #print "\n"  #Update example 3  #result = collection.find(:edition
    => ''November December 2013'').replace_one(:edition => ''11-12-2013'') #print
    "Number of documents updated: " #print "\n" #print result.n #print "\n"  #Update
    example 4  #document = collection.find(:journal => ''Oracle Magazine'').find_one_and_replace({:journal
    => ''OracleMagazine''}, :return_document => :after) #print "Document after being
    updated: " #print "\n" #print document #print "\n"  #Update example 5  #document
    = collection.find(:edition => ''November December 2013'').find_one_and_update(''$set''
    => {:edition=>''11-12-2013''}) #print "Document before being updated: " #print
    "\n" #print document #print "\n" ```    Deleting Documents    In this section
    we shall delete documents from a MongoDB collection. Methods for deleting document/s
    are included in [Table 4-10](#part0010.xhtml#Tab10) (see the “Finding Multiple
    Documents” section).    1.  Create a Ruby script `deleteDocument.rb` and create
    a `Collection` instance for the `mongodb` collection. 2.  Add four documents to
    the collection using the `insert_many()` method.                    ```     collection.


    create     document1={            "catalogId" => 1,       "journal" => "Oracle
    Magazine",       "publisher" => "Oracle Publishing",       "edition" =>  "November
    December 2013",       "title" => "Engineering as a Service",       "author" =>  "David
    A. Kelly"     }          document2={            "catalogId" => 2,       "journal"
    => "Oracle Magazine",       "publisher" => "Oracle Publishing",       "edition"
    =>  "November December 2013",       "title" => "Quintessential and Collaborative",       "author"
    =>  "Tom Haunert"     }          document3={            "catalogId" => 3,       "journal"
    => "Oracle Magazine",       "publisher" => "Oracle Publishing",       "edition"
    =>  "November December 2013",       "title" => "",       "author" =>  ""     }          document4={            "catalogId"
    => 4,       "journal" => "Oracle Magazine",       "publisher" => "Oracle Publishing",       "edition"
    =>  "November December 2013",       "title" => "",       "author" =>  ""     }            collection.insert_many([document1,document2,document3,document4])     ```           3.  Create
    a `Collection` instance over the `mongodb` collection.                    ```     collection
    = client[:mongodb]     ```           4.  Subsequently remove one of the documents
    using the `delete_one()` method. The `find()` method filter is set to find all
    documents with edition set to `''November December 2013''`.                    ```     print
    collection.find(:edition => ''November December 2013'').delete_one     ```                    As
    another example, delete a document using `find_one_and_delete()` method.                    ```     print
    collection.find(:journal => ''Oracle Magazine'').find_one_and_delete     ```                    As
    a third example, delete multiple documents using the `delete_many()` method with
    the `find()` method filter set to find all documents with `edition` set to ''November
    December 2013''.                    ```     print collection.find(:edition =>
    ''November December 2013'').delete_many     ```           5.  The `deleteDocument.rb`
    script is listed below with some of the code commented out. First, uncomment the
