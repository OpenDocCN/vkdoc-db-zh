    the `forEach()` method is invoked the cursor has already been exhausted and an
    error is output. The `count()` method invocation outputs the document count.    Finding
    and Modifying a Single Document    In this section we shall find and modify a
    document using the `findAndModify(query, sort, doc, options, callback)` method
    in `Collection` class. In this chapter we discuss both the deprecated method `findAndModify()`
    and its alternatives `findOneAndUpdate()`, `findOneAndReplace().` or `findOneAndDelete()`.
    The `findAndModify()` method returns the original document before modification.
    The method parameters are discussed in [Table 5-18](#part0011.xhtml#Tab18).    [Table
    5-18](#part0011.xhtml#_Tab18). Parameters for findAndModify() Method     | Parameter
    | Type | Description | | --- | --- | --- | | `query` | object | Query to find
    the document to modify. | | `sort` | array | If multiple documents match the query
    chooses the first one in the specified order. | | `doc` | object | The document
    containing the fields and values to be updated. | | `options` | object | Method
    options. | | `callback` | `resultCallback(error, result)` | The callback function.


    The first parameter is the `MongoError` object if an error occurs or null and
    the second parameter is the result of the find and modify. |    In addition to
