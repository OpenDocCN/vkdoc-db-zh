    \                    .append(\"TYPE\", \"WebLogicServer\")\n                 \
    \   .append(\"SERVERNAME\", \"AdminServer\")\n                    .append(\"CODE\"\
    , \"BEA-000365\").append(\"MSG\", \"Server state changed to STARTING\");\n   \
    \         coll.insert(row2);\n\n            BasicDBObject row3 = new BasicDBObject(\"\
