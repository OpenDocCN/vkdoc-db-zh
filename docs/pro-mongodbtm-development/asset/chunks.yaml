  trans: "# Database 和 Collection 类参考\n\n## Database 类\n\n### 实例属性\n\n| 参数 | 类型 |\
    \ 描述 |\n| --- | --- | --- |\n| `client` | `Client` | 数据库客户端。 |\n| `name` | `String`\
    \ | 数据库名称。 |\n| `options` | `Hash` | 配置选项。 |\n\n`Database` 类支持的一些实例方法在 表 4-7 中讨论。\n\
    \n### Database 类方法\n\n| 方法 | 返回类型 | 描述 |\n| --- | --- | --- |\n| `[]` 或 `collection`\
    \ | `Mongo::Collection` | 获取此数据库中的一个集合。 |\n| `collection_names(options = {})`\
    \ | `Array<String>` | 获取所有非系统集合的名称。 |\n| `collections` | `Array<Mongo::Collection>`\
    \ | 获取此数据库下所有的集合。 |\n| `command(operation, opts = {})` | `Hash` | 在数据库上执行一个命令。\
    \ |\n| `drop` | `Result` | 删除此数据库。 |\n| `initialize(client, name, options = {})`\
    \ | `Database` | 实例化一个新的 `Database` 对象。 |\n| `list_collections` | `Array<Hash>`\
    \ | 获取数据库中所有集合的信息。 |\n| `users` | `View::User` | 获取数据库的用户视图。 |\n\n`Database` 类构造函数具有以下签名。\n\
    \n```ruby\ninitialize(client, name, options = {})\n```\n\n构造函数参数与类属性相同，并在 表 4-6\
    \ 中讨论。\n\n1.  在 `db.rb` 脚本中，像之前一样创建一个 `Client` 实例。\n\n    ```ruby\n    client\
    \ = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n    ```\n\n\
    2.  使用 `Client` 实例的 `database` 属性获取数据库，并使用数据库实例的 `name` 属性输出数据库名称。\n\n    ```ruby\n\
    \    db = client.database\n    print db.name\n    ```\n\n3.  使用 `client` 和 `options`\
    \ 属性输出客户端和配置选项。\n\n    ```ruby\n    print db.client\n    print db.options\n  \
    \  ```\n\n4.  使用 `Client` 类的 `database_names()` 方法输出数据库名称。\n\n    ```ruby\n  \
    \  print client.database_names\n    ```\n\n5.  遍历 `Client` 实例的 `list_databases()`\
    \ 方法返回的集合，输出每个数据库的信息。\n\n    ```ruby\n    client.list_databases.each { |info|\
    \ puts info.inspect }\n    ```\n\n6.  要使用特定数据库，调用 `Client` 实例的 `use(database)`\
    \ 方法。例如，可以将数据库设置为 `mongo` 数据库。\n\n    ```ruby\n    client = client.use(:mongo)\n\
    \    ```\n\n7.  将数据库设置为 `mongo` 后，再次输出数据库名称以验证设置。使用 `drop()` 方法删除数据库。\n\n    ```ruby\n\
    \    print db.drop\n    ```\n\n`db.rb` 脚本如下所列。\n\n```ruby\nrequire 'mongo'\ninclude\
    \ Mongo\n\nclient = Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n\
    print \"Database Connected to: \"\ndb = client.database\nprint db.name\nprint\
    \ \"\\n\"\n\nprint \"Database Client: \"\nprint db.client\nprint \"\\n\"\n\nprint\
    \ \"Database Options: \"\nprint db.options\nprint \"\\n\"\n\nprint \"Database\
    \ Names: \"\nprint client.database_names\nprint \"\\n\"\n\nprint \"Database Info:\
    \ \"\nclient.list_databases.each { |info| puts info.inspect }\nprint \"\\n\"\n\
    \nprint \"Use Database mongo: \"\nclient = client.use(:mongo)\nprint \"\\n\"\n\
    \nprint \"Database Connected to: \"\ndb = client.database\nprint db.name\nprint\
    \ \"\\n\"\n\nprint \"Use Database mongo: \"\nclient = client.use(:local)\nprint\
    \ \"\\n\"\n\nprint \"Database Connected to: \"\ndb = client.database\nprint db.name\n\
    print \"\\n\"\n\nprint db.drop\n```\n\n8.  使用以下命令运行 `db.rb` 脚本。\n\n    ```bash\n\
    \    >ruby db.rb\n    ```\n\n`db.rb` 脚本的输出如 图 4-11 所示。在输出中需要注意的是，将数据库实例设置为 `mongo`\
    \ 后，`mongo` 数据库实例不会通过 `database_names` 列出，因为尚未访问该数据库实例。\n\n![9781484215999_Fig04-11.jpg](img/image00519.jpeg)\n\
    **图 4-11** 运行 Ruby 脚本 db.rb\n\n在删除数据库实例 `local` 后，如 图 4-12 所示，该数据库不会在 Mongo shell\
    \ 中通过 `show dbs` 命令列出。\n\n![9781484215999_Fig04-12.jpg](img/image00520.jpeg)\n\
    **图 4-12** `local` 数据库未通过 `show dbs` 列出\n\n由于我们将在后续章节中使用 `local` 数据库，请在 Mongo\
    \ shell 中使用以下命令创建 `local` 数据库。\n\n```bash\n>use local\n>db.createCollection(\"\
    local\")\n```\n\n## 创建集合\n\n`Mongo::Database` 类提供了几种用于集合的方法，这些方法在 表 4-7 中讨论。集合由\
    \ `Mongo::Collection` 类表示。`Collection` 类提供了几个实例属性和方法。属性在 表 4-8 中讨论。\n\n### Collection\
    \ 类实例属性\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `database` | `Mongo::Database`\
    \ | 所属数据库。 |\n| `name` | `String` | 集合名称。 |\n| `options` | `Hash` | 配置选项。 |\n\n\
    `Collection` 类支持的一些实例方法在 表 4-9 中讨论。\n\n### Collection 类实例方法\n\n| 方法 | 返回类型 | 描述\
    \ |\n| --- | --- | --- |\n| `bulk_write(operations, options)` | `BSON::Document`\
    \ | 运行一批批量写操作。 |\n| `capped?` | `true`, `false` | 判断集合是否为固定集合。 |\n| `create` |\
    \ `Result` | 创建一个集合。 |\n| `drop` | `Result` | 删除一个集合。 |\n| `find(filter = nil)`\
    \ | `CollectionView` | 查找集合中的文档。 |\n| `indexes(options = {})` | `View::Index`\
    \ | 返回集合所有索引的视图。 |\n| `insert_many(documents, options = {})` | `Result` | 在集合中插入提供的文档。\
    \ |\n| `insert_one(document, options = {})` | `Result` | 在集合中插入单个文档。 |\n| `namespace`\
    \ | `String` | 获取集合的完全限定命名空间。 |\n\n`Collection` 类构造函数具有以下签名。\n\n```ruby\ninitialize(database,\
    \ name, options = {})\n```\n\n构造函数参数与类属性相同。\n\n1.  首先，在 `C:\\Ruby21-x64\\mongodbscripts`\
    \ 目录中创建一个 Ruby 脚本 `collection.rb`，并像之前一样包含 `mongo` gem 和 `Mongo` 命名空间。\n2.  创建一个用于连接到\
    \ MongoDB 的 `Client` 实例，随后获取 `local` 数据库的实例。\n\n    ```ruby\n    client = Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    ```\n\n3.  使用 `Client` 类中的 `use(database)`\
    \ 实例方法，将数据库设置为 `local`。\n\n    ```ruby\n    client = client.use(:local)\n    ```\n\
    \n4.  使用 `Mongo::Database` 类中的 `collection_names()` 方法输出集合名称。\n\n    ```ruby\n\
    \    print db.collection_names({})\n    ```\n\n5.  使用 `list_collections()` 方法输出所有集合的信息。\n\
    \n    ```ruby\n    db.list_collections.each { |info| puts info.inspect }\n   \
    \ ```\n\n6.  使用 `collections()` 方法输出所有集合的数组。\n\n    ```ruby\n    db.collections.each\
    \ { |info| puts info.inspect }\n    ```"
- fmt: "## Using Documents\n\nIn the following subsections we shall add a document\
    \ to MongoDB server, add a batch of documents, find a single document, find multiple\
    \ documents, update documents, delete documents, and perform bulk operations.\n\
    \n### Adding a Document\n\nIn this section we shall add a single document to a\
    \ MongoDB collection. The `insert_one(document, options = {})` method in the `Collection`\
    \ class is used to add a document. The `document` parameter is the document to\
    \ add. The `options` parameter is a customization Hash of options that defaults\
    \ to `{}`.\n\n1.  Create a Ruby script `addDocument.rb` and add `require` and\
    \ `include` statements for `mongo` gem and `Mongo` namespace respectively.\n2.\
    \  Create a connection, set database to `local` and get the `mongodb` collection.\n\
    \    ```ruby\n    client =Mongo::Client.new([ '127.0.0.1:27017' ], :database =>\
    \ 'test')\n    client=client.use(:local)\n    db=client.database\n    collection=db.collection(\"\
    mongodb\")\n    ```\n3.  The `create()` method must be invoked as the `mongodb`\
    \ collection if it does not already exist.\n    ```ruby\n    collection.create\n\
    \    ```\n4.  Create a document JSON to add.\n    ```ruby\n    document1={\n \
    \     \"_id\" => \"document1a\",\n      \"catalogId\" => \"catalog1\",\n     \
    \ \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" =>  \"November December 2013\",\n      \"title\" => \"Engineering\
    \ as a Service\",\n      \"author\" =>  \"David A. Kelly\"\n    }\n    ```\n5.\
    \  Invoke the `insert_one()` method to add the document to the `mongodb` collection.\n\
    \    ```ruby\n    collection.insert_one(document1)\n    ```\n6.  Similarly add\
    \ another document.\n    ```ruby\n    document2={\n      \"_id\" => \"document1a\"\
    ,\n      \"catalogId\" => \"catalog2\",\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
    \ December 2013\",\n      \"title\" => \"Quintessential and Collaborative\",\n\
    \      \"author\" =>  \"Tom Haunert\"\n    }\n    collection.insert_one(document2)\n\
    \    ```\n\nThe `addDocument.rb` script is listed:\n```ruby\nrequire 'mongo'\n\
    include Mongo\nclient =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n\
    client=client.use(:local)\ndb=client.database\ncollection=db.collection(\"mongodb\"\
    )\n\ncollection.create\n\ndocument1={\n  \"_id\" => \"document1a\",\n  \"catalogId\"\
    \ => \"catalog1\",\n  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" =>\
    \ \"Oracle Publishing\",\n  \"edition\" =>  \"November December 2013\",\n  \"\
    title\" => \"Engineering as a Service\",\n  \"author\" =>  \"David A. Kelly\"\n\
    }\n\ncollection.insert_one(document1)\n\ndocument2={\n  \"catalogId\" => \"catalog2\"\
    ,\n  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" => \"Oracle Publishing\"\
    ,\n  \"edition\" =>  \"November December 2013\",\n  \"title\" => \"Quintessential\
    \ and Collaborative\",\n  \"author\" =>  \"Tom Haunert\"\n}\ncollection.insert_one(document2)\n\
    ```\n\n7.  Run the `addDocument.rb` script with the following command.\n    ```bash\n\
    \    >ruby addDocument.rb\n    ```\n\nThe output from the `addDocument.rb` script\
    \ is shown in [Figure 4-13](#part0010.xhtml#Fig13).\n\n![9781484215999_Fig04-13.jpg](Images/image00521.jpeg)\n\
    [Figure 4-13](#part0010.xhtml#_Fig13). Running the collection.rb script\n\n8.\
    \  Run the following JavaScript method in Mongo shell.\n    ```javascript\n  \
    \  >db.mongodb.find()\n    ```\n    The two documents added get listed as shown\
    \ in [Figure 4-15](#part0010.xhtml#Fig15).\n\n![9781484215999_Fig04-15.jpg](Images/image00523.jpeg)\n\
    [Figure 4-15](#part0010.xhtml#_Fig15). Finding and listing Documents added\n\n\
    9.  The `_id`s of the documents added must be unique or the `OperationFailure`\
    \ error gets generated."
