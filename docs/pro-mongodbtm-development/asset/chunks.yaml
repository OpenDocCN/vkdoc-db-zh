    edition\", \"11-12-2013\"), Catalog.class);\n```\n\n## 更新多个文档\n\n如果需要更新多个文档，`MongoOperations`\
    \ 接口提供了重载的 `updateMulti()` 方法，如 表 10-14 所述。\n\n**表 10-14. 重载的 updateMulti() 方法**\n\
