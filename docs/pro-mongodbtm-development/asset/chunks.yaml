  raw: '| | `remove(Query query, String collectionName)` | Removes all documents that
    match the specified query from the given collection. |    The `MongoOperations`
    interface also provides the overloaded `findAndRemove()` method to find and remove
    a single document as discussed in [Table 10-16](#part0016.xhtml#Tab16).    [Table
    10-16](#part0016.xhtml#_Tab16). Overloaded findAndRemove() Methods     | Method
    | Description | | --- | --- | | `findAndRemove(Query query, Class<T> entityClass)`
    | Finds and removes a single document from the collection for the given entity
    class. The first document that matches the given query is removed. | | `findAndRemove(Query
    query, Class<T> entityClass, String collectionName)` | Finds and removes a single
    document of the specified entity class type from the given collection. The first
    document that matches the given query is removed. |    First, we shall look at
    an example using the `remove()` method.    1.  In the custom `remove()` class
    method in the `App` application (not to be confused with the `remove()` method
    in the `MongoOperations` interface), create and save two `Catalog` instances.
    2.  Create a `BasicDBObject` instance using the `_id` field as key and id field
    value in the `catalog1` instance as value. Create a `BasicQuery` instance using
    the `BasicDBObject` instance.                    ```     DBObject dbObject = new
    BasicDBObject("_id", catalog1.getId());             BasicQuery query = new BasicQuery(dbObject);     ```           3.  Invoke
    one of the `remove()` methods to remove all the documents that match the specified
    query. Output the result of the `remove()` method.                    ```     WriteResult
    result = ops.remove(query, Catalog.class);      //WriteResult result =    ops.remove(query,
    "catalog");      //WriteResult result =ops.remove(query, Catalog.class, "catalog");     System.out.println(result);     ```           4.  Subsequently
    invoke the `findAll()` method to find and list all the documents. When the `App`
    application is run to invoke the `remove()` method the documents that match the
    given query get removed. For the example, one of the two documents gets removed
    and the other gets listed with `findAll()` as shown in [Figure 10-19](#part0016.xhtml#Fig19).          ![9781484215999_Fig10-19.jpg](Images/image00680.jpeg)                    [Figure
    10-19](#part0016.xhtml#_Fig19). Removing a Single Document with remove()           5.  To
    remove all documents the following query may be used.                    ```     DBObject
    dbObject = new BasicDBObject("edition","November-December 2013");     BasicQuery
    query = new BasicQuery(dbObject);     ```              When the `remove()` method
    is invoked with the preceding query the two documents added get removed as indicated
    by the `n` field value of 2 as shown in [Figure 10-20](#part0016.xhtml#Fig20).    ![9781484215999_Fig10-20.jpg](Images/image00681.jpeg)    [Figure
    10-20](#part0016.xhtml#_Fig20). Removing Multiple Documents with remove()    The
    `remove()` method in `App` application is as follows.    ``` private static void
    remove() {         createCatalogInstances();         ops.save(catalog1);         ops.save(catalog2);
            //DBObject dbObject = new BasicDBObject("edition","November-December 2013");
            DBObject dbObject = new BasicDBObject("_id", catalog1.getId());         BasicQuery
    query = new BasicQuery(dbObject);         WriteResult result = ops.remove(query,
    Catalog.class);         // WriteResult result = ops.remove(query, "catalog");
            System.out.println(result);          List<Catalog> list = ops.findAll(Catalog.class);
            Iterator<Catalog> iter = list.iterator();         while (iter.hasNext())
    {             Catalog catalog = iter.next();             System.out.println("Journal
    : " + catalog.getJournal());             System.out.println("Publisher : " + catalog.getPublisher());
                System.out.println("Edition : " + catalog.getEdition());             System.out.println("Title
    : " + catalog.


    getTitle());             System.out.println("Author : " + catalog.getAuthor());
            }     } ```    Next, we shall demonstrate the `findAndModify()` method.    1.  Create
    a `BasicQuery` object to find all documents with a specific the `_id` field value.
    The query should return only one document as the `_id` field value is unique.                    ```     DBObject
    dbObject = new BasicDBObject("_id", catalog1.getId());     BasicQuery query = new
    BasicQuery(dbObject);     ```           2.  Invoke one of the `findAndRemove()`
    methods using the query.                    ```     Catalog catalog = ops.findAndRemove(query,
    Catalog.class);     //Catalog catalog = ops.findAndRemove(query, Catalog.class,
    "catalog");     ```           3.  The `findAndRemove()` method returns the document
    that is found and removed. Output the field values from the removed document.
    When the `App` application is run the document matching the query is removed and
    its field values are output to the Eclipse Console as shown in [Figure 10-21](#part0016.xhtml#Fig21).          ![9781484215999_Fig10-21.jpg](Images/image00682.jpeg)                    [Figure
    10-21](#part0016.xhtml#_Fig21). Removing a Document with findAndRemove()              The
    `App` application is listed below with some of the method invocations and code
