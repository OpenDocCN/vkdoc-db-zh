    \ class, which implements the `Map` interface among others. The `Document` class\
    \ provides the following constructors listed in [Table 1-3](#part0007.xhtml#Tab3)\
    \ to create a new instance.\n\n[Table 1-3](#part0007.xhtml#_Tab3). Document Class\
    \ Constructors\n\n| Constructor | Description |\n    | --- | --- |\n    | `Document()`\
    \ | Creates an empty `Document` instance. |\n    | `Document(Map<String,Object>\
    \ map)` | Creates a `Document` instance initialized with a `Map`. |\n    | `Document(String\
    \ key, Object value)` | Creates a `Document` instance initialized with a key/value\
    \ pair. |\n\nThe `Document` class provides some other utility methods, some of\
    \ which are in [Table 1-4](#part0007.xhtml#Tab4).\n\n[Table 1-4](#part0007.xhtml#_Tab4).\
    \ Document Class Utility Methods\n\n| Method | Description |\n    | --- | ---\
    \ |\n    | `append(String key, Object value)` | Appends a key/value pair to a\
    \ `Document` object and returns a new instance. |\n    | `toString``()` | Returns\
    \ a String representation of the object. |\n\n6.  Create a `Document` instance\
    \ using the `Document(String key, Object value)` constructor and use the `append``(``String`\
    \ `key,` `Object` `value)` method to append key/value pairs. The `append()` method\
    \ may be invoked multiple times in sequence to add multiple key/value pairs. Add\
    \ key/value pairs for the `journal`, `publisher`, `edition`, `title`, and `author`\
    \ fields.\n\n```\n    Document catalog = new Document(\"journal\", \"Oracle Magazine\"\
    )\n    .append(\"publisher\", \"Oracle Publishing\")\n    .append(\"edition\"\
    , \"November December 2013\")\n    .append(\"title\", \"Engineering as a Service\"\
    ).append(\"author\", \"David A. Kelly\");\n    ```\n\n7.  The `MongoCollection<TDocument>`\
    \ interface provides `insertOne(TDocument document)` method to add a document(s)\
    \ to a collection. Add the `catalog Document` to the `MongoCollection<TDocument>`\
    \ instance for the `catalog` collection.\n\n```\n    coll.insertOne(catalog);\n\
    \    ```\n\n8.  The `MongoCollection<TDocument>` interface provides overloaded\
    \ `find()` method to find a `Document` instance. Next, obtain the document added\
    \ using the `find()` method. Furthermore, the `find()` method returns an iterable\
    \ collection from which we obtain the first document using the `first()` method.\n\
    \n```\n    Document dbObj = coll.find().first();\n    ```\n\n9.  Output the `Document`\
    \ object found as such and also by iterating over the `Set<E>` obtained from the\
    \ `Document` using the `keySet()` method. The `keySet()` method returns a `Set<String>`.\
    \ Create an `Iterator` from the Set <string>using the</string> `iterator()` method.\
    \ While the `Iterator` has elements as determined by the `hasNext()` method, obtain\
    \ the elements using the `next()` method. Each element is a key in the `Document`\
    \ fetched. Obtain the value for the key using the `get(``String` `key)` method\
    \ in `Document`.\n\n```\n    System.out.println(dbObj);\n    Set<String> set = dbObj.keySet();\n\
    \    Iterator iter = set.iterator();\n    while(iter.hasNext()){\n    Object obj=    \
    \ iter.next();\n    System.out.println(obj);\n    System.out.println(dbObj.get(obj.toString()));\n\
    \    }\n    ```\n\n10.  Close the `MongoClient instance`.\n\n```\n    mongoClient.close();\n\
    \    ```\n\nThe `CreateMongoDBDocument` class is listed below.\n\n```\n    package\
    \ mongodb;\n\nimport java.util.Arrays;\n    import java.util.Iterator;\n    import\
    \ java.util.Set;\n    import org.bson.Document;\n    import com.mongodb.MongoClient;\n\
    \    import com.mongodb.ServerAddress;\n    import com.mongodb.client.MongoCollection;\n\
    \    import com.mongodb.client.MongoDatabase;\n    import com.mongodb.client.MongoIterable;\n\
    \npublic class CreateMongoDBDocument {\n\npublic static void main(String[] args)\
    \ {\n\nMongoClient mongoClient = new MongoClient(\n                    Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n            for (String s : mongoClient.listDatabaseNames())\
    \ {\n                System.out.println(s);\n            }\n            MongoDatabase\
    \ db = mongoClient.getDatabase(\"local\");\n            MongoIterable<String>\
    \ colls = db.listCollectionNames();\n            System.out.println(\"MongoDB\
    \ Collection Names: \");\n            for (String s : colls) {\n                System.out.println(s);\n\
    \            }\n            MongoCollection<Document> coll = db.getCollection(\"\
    catalog\");\n            Document catalog = new Document(\"journal\", \"Oracle\
    \ Magazine\")\n                    .append(\"publisher\", \"Oracle Publishing\"\
    )\n                    .append(\"edition\", \"November December 2013\")\n                    .append(\"\
    title\", \"Engineering as a Service\")\n                    .append(\"author\"\
    , \"David A. Kelly\");\n            coll.insertOne(catalog);\n            Document\
    \ dbObj = coll.find().first();\n            System.out.println(dbObj);\n            Set<String>\
    \ set = catalog.keySet();\n            Iterator<String> iter = set.iterator();\n\
    \            while (iter.hasNext()) {\n                Object obj = iter.next();\n\
    \                System.out.println(obj);\n                System.out.println(dbObj.get(obj.toString()));\n\
    \            }\n            mongoClient.close();\n        }\n    }\n    ```\n\n\
    11.  To run the `CreateMongoDBDocument` application, right-click on the `CreateMongoDBDocument.java`\
    \ file in Package Explorer and select Run As ![image](Images/image00406.jpeg)\
    \ Java Application as shown in [Figure 1-11](#part0007.xhtml#Fig11).\n\n![9781484215999_Fig01-11.jpg](Images/image00416.jpeg)\n\
    \n[Figure 1-11](#part0007.xhtml#_Fig11). Running CreateMongoDBDocument.java Application\n\
    \nA new BSON document gets stored in a new collection `catalog` in MongoDB database.\
    \ The document stored is also output as such and as key/value pairs as shown in\
    \ [Figure 1-12](#part0007.xhtml#Fig12).\n\n![9781484215999_Fig01-12.jpg](Images/image00417.jpeg)\n\
    \n[Figure 1-12](#part0007.xhtml#_Fig12). Outputting Document Stored in MongoDB\n\
    \nUsing a Model to Create a BSON Document\n\nIn the previous section we constructed\
    \ the documents to add to a collection using the `append(String key, Object value)`\
    \ method in `Document` class and added the documents to a collection using the\
    \ `insertOne(TDocument document)` method in `MongoCollection<TDocument>` interface.\
    \ A `Document` object may also be constructed using a model class that represents\
    \ the objects in a collection. The `MongoCollection<TDocument>` interface provides\
    \ the overloaded `insertMany()` method to add a list of documents as discussed\
    \ in [Table 1-5](#part0007.xhtml#Tab5).\n\n[Table 1-5](#part0007.xhtml#_Tab5).\
    \ Overloaded insertMany() Method\n\n| Method | Description |\n| --- | --- |\n\
    | `insertMany(List<? extends TDocument> documents)` | Inserts one or more documents.\
    \ |\n| `insertMany(List<? extends TDocument> documents, InsertManyOptions options)`\
    \ | Inserts one or more documents using the specified insert options. The only\
    \ option supported is to insert the documents in the order provided. |\n\nIn this\
    \ section we shall construct a list of documents using a model class. Subsequently,\
    \ we shall insert the list into a collection using one of the `insertMany()` methods.\n\
    \n1.  First, create a model class `Catalog` with the following fields:\n    *\
    \   `catalogId`\n    *   `journal`\n    *   `publisher`\n    *   `edition`\n \
    \   *   `title`\n    *   `author`\n2.  The model class extends the `BasicDBObject`\
    \ class, which is a basic implementation of a MongoDB specific BSON object, and\
    \ implements the `Serializable` interface. The class implements the `Serializable`\
    \ interface to serialize a model class object to a cache when persisted to a database.\
    \ To associate a version number with a serializable class by serialization runtime,\
    \ specify a `serialVersionUID` variable with scope `private`.\n\n```\n    private\
    \ static final long serialVersionUID = 1L;\n    ```"
  trans: "# MongoDB 文档操作：使用 Document 类和模型\n\n一个 MongoDB 特定的 BSON 对象由 `org.bson.Document`\
    \ 类表示，该类实现了 `Map` 等接口。`Document` 类提供了表 1-3 中列出的以下构造方法来创建新实例。\n\n### 表 1-3. Document\
    \ 类构造方法\n\n| 构造方法 | 描述 |\n| --- | --- |\n| `Document()` | 创建一个空的 `Document` 实例。\
    \ |\n| `Document(Map<String,Object> map)` | 创建一个使用 `Map` 初始化的 `Document` 实例。 |\n\
    | `Document(String key, Object value)` | 创建一个使用键/值对初始化的 `Document` 实例。 |\n\n`Document`\
    \ 类提供了一些其他实用方法，其中一部分在表 1-4 中。\n\n### 表 1-4. Document 类实用方法\n\n| 方法 | 描述 |\n| ---\
    \ | --- |\n| `append(String key, Object value)` | 将一个键/值对追加到 `Document` 对象并返回一个新实例。\
    \ |\n| `toString()` | 返回对象的字符串表示形式。 |\n\n6. 使用 `Document(String key, Object value)`\
    \ 构造方法创建一个 `Document` 实例，并使用 `append(String key, Object value)` 方法追加键/值对。可以按顺序多次调用\
    \ `append()` 方法来添加多个键/值对。为 `journal`、`publisher`、`edition`、`title` 和 `author`\
    \ 字段添加键/值对。\n\n```java\nDocument catalog = new Document(\"journal\", \"Oracle\
    \ Magazine\")\n.append(\"publisher\", \"Oracle Publishing\")\n.append(\"edition\"\
    , \"November December 2013\")\n.append(\"title\", \"Engineering as a Service\"\
    ).append(\"author\", \"David A. Kelly\");\n```\n\n7. `MongoCollection<TDocument>`\
    \ 接口提供了 `insertOne(TDocument document)` 方法，用于向集合中添加文档。将 `catalog` `Document` 添加到\
    \ `catalog` 集合的 `MongoCollection<TDocument>` 实例中。\n\n```java\ncoll.insertOne(catalog);\n\
    ```\n\n8. `MongoCollection<TDocument>` 接口提供了重载的 `find()` 方法来查找 `Document` 实例。接下来，使用\
    \ `find()` 方法获取添加的文档。此外，`find()` 方法返回一个可迭代的集合，我们从中使用 `first()` 方法获取第一个文档。\n\n\
    ```java\nDocument dbObj = coll.find().first();\n```\n\n9. 输出找到的 `Document` 对象，同时也通过迭代使用\
    \ `Document` 的 `keySet()` 方法获得的 `Set<E>` 来输出。`keySet()` 方法返回一个 `Set<String>`。使用\
    \ `iterator()` 方法从 `Set<String>` 创建一个 `Iterator`。当 `Iterator` 通过 `hasNext()` 方法确定有元素时，使用\
    \ `next()` 方法获取元素。每个元素都是所获取 `Document` 中的一个键。使用 `Document` 中的 `get(String key)`\
    \ 方法获取该键对应的值。\n\n```java\nSystem.out.println(dbObj);\nSet<String> set = dbObj.keySet();\n\
    Iterator iter = set.iterator();\nwhile(iter.hasNext()){\nObject obj=     iter.next();\n\
    System.out.println(obj);\nSystem.out.println(dbObj.get(obj.toString()));\n}\n\
    ```\n\n10. 关闭 `MongoClient` 实例。\n\n```java\nmongoClient.close();\n```\n\n`CreateMongoDBDocument`\
    \ 类如下所示。\n\n```java\npackage mongodb;\n\nimport java.util.Arrays;\nimport java.util.Iterator;\n\
    import java.util.Set;\nimport org.bson.Document;\nimport com.mongodb.MongoClient;\n\
    import com.mongodb.ServerAddress;\nimport com.mongodb.client.MongoCollection;\n\
    import com.mongodb.client.MongoDatabase;\nimport com.mongodb.client.MongoIterable;\n\
    \npublic class CreateMongoDBDocument {\n\n    public static void main(String[]\
    \ args) {\n\n        MongoClient mongoClient = new MongoClient(\n            \
    \    Arrays.asList(new ServerAddress(\"localhost\", 27017)));\n        for (String\
    \ s : mongoClient.listDatabaseNames()) {\n            System.out.println(s);\n\
    \        }\n        MongoDatabase db = mongoClient.getDatabase(\"local\");\n \
    \       MongoIterable<String> colls = db.listCollectionNames();\n        System.out.println(\"\
    MongoDB Collection Names: \");\n        for (String s : colls) {\n           \
    \ System.out.println(s);\n        }\n        MongoCollection<Document> coll =\
    \ db.getCollection(\"catalog\");\n        Document catalog = new Document(\"journal\"\
    , \"Oracle Magazine\")\n                .append(\"publisher\", \"Oracle Publishing\"\
    )\n                .append(\"edition\", \"November December 2013\")\n        \
    \        .append(\"title\", \"Engineering as a Service\")\n                .append(\"\
    author\", \"David A. Kelly\");\n        coll.insertOne(catalog);\n        Document\
    \ dbObj = coll.find().first();\n        System.out.println(dbObj);\n        Set<String>\
    \ set = catalog.keySet();\n        Iterator<String> iter = set.iterator();\n \
    \       while (iter.hasNext()) {\n            Object obj = iter.next();\n    \
    \        System.out.println(obj);\n            System.out.println(dbObj.get(obj.toString()));\n\
    \        }\n        mongoClient.close();\n    }\n}\n```\n\n11. 要运行 `CreateMongoDBDocument`\
    \ 应用程序，请在 Package Explorer 中右键单击 `CreateMongoDBDocument.java` 文件，然后选择 \"运行方式\"\
    \ ![image](img/image00406.jpeg) \"Java 应用程序\"，如图 1-11 所示。\n\n![9781484215999_Fig01-11.jpg](img/image00416.jpeg)\n\
    \n### 图 1-11. 运行 CreateMongoDBDocument.java 应用程序\n\n一个新的 BSON 文档将被存储在 MongoDB\
    \ 数据库的新集合 `catalog` 中。存储的文档也会如图 1-12 所示，以原样及键/值对的形式输出。\n\n![9781484215999_Fig01-12.jpg](img/image00417.jpeg)\n\
    \n### 图 1-12. 输出存储在 MongoDB 中的文档\n\n## 使用模型创建 BSON 文档\n\n在上一节中，我们使用 `Document`\
    \ 类中的 `append(String key, Object value)` 方法构造要添加到集合的文档，并使用 `MongoCollection<TDocument>`\
    \ 接口中的 `insertOne(TDocument document)` 方法将文档添加到集合中。也可以使用表示集合中对象的模型类来构造 `Document`\
    \ 对象。`MongoCollection<TDocument>` 接口提供了重载的 `insertMany()` 方法来添加文档列表，如表 1-5 所述。\n\
    \n### 表 1-5. 重载的 insertMany() 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `insertMany(List<?\
    \ extends TDocument> documents)` | 插入一个或多个文档。 |\n| `insertMany(List<? extends\
    \ TDocument> documents, InsertManyOptions options)` | 使用指定的插入选项插入一个或多个文档。唯一支持的选项是按提供的顺序插入文档。\
    \ |\n\n在本节中，我们将使用一个模型类构造一个文档列表。随后，我们将使用其中一个 `insertMany()` 方法将该列表插入到一个集合中。\n\n\
    1.  首先，创建一个具有以下字段的模型类 `Catalog`：\n    *   `catalogId`\n    *   `journal`\n   \
    \ *   `publisher`\n    *   `edition`\n    *   `title`\n    *   `author`\n2.  该模型类扩展了\
    \ `BasicDBObject` 类（这是 MongoDB 特定 BSON 对象的基本实现）并实现了 `Serializable` 接口。该类实现 `Serializable`\
    \ 接口是为了在模型类对象持久化到数据库时将其序列化到缓存中。为了通过序列化运行时将版本号与可序列化类关联，请指定一个作用域为 `private` 的 `serialVersionUID`\
    \ 变量。\n\n```java\nprivate static final long serialVersionUID = 1L;\n```"
- fmt: "3.  Specify a class constructor that takes all the fields as `args`. The model\
    \ class `Catalog` is listed below.\n\n```\n    package mongodb;\n    import java.io.Serializable;\n\
    \    import com.mongodb.BasicDBObject;\n    public class Catalog extends BasicDBObject\
    \ implements Serializable {\n\nprivate static final long serialVersionUID = 1L;\n\
    \nprivate String catalogId;\n        private String journal;\n        private\
    \ String publisher;\n        private String edition;\n        private String title;\n\
    \        private String author;\n    public Catalog() {\n        super();\n  \
    \  }\n\npublic Catalog(String catalogId, String journal, String publisher,\n \
    \           String edition, String title, String author) {\n        this.catalogId\
    \ = catalogId;\n        this.journal = journal;\n        this.publisher = publisher;\n\
    \        this.edition = edition;\n        this.title = title;\n        this.author\
    \ = author;\n    }\n}\n```\n\nNext, we shall use the model class `Catalog` to\
    \ construct documents and add the documents to MongoDB database. We shall use\
    \ the `CreateMongoDBDocumentModel` class to construct and add documents to MongoDB.\n\
    \n### 1.  First, create a `MongoClient` instance as discussed previously.\n\n\
    ```\n    MongoClient mongoClient = new MongoClient(Arrays.asList(new ServerAddress(\"\
    localhost\", 27017)));\n```\n\n### 2.  Also create a `MongoDatabase` instance\
    \ for the `local` database\n\nAlso create a `MongoDatabase` instance for the `local`\
    \ database using the `getDatabase(String databaseName)` method in `MongoClient`\
    \ class.\n\n```\n    MongoDatabase db = mongoClient.getDatabase(\"local\");\n\
    ```\n\nThe `MongoDatabase` interface provides the overloaded methods listed in\
    \ `Table 1-6` for getting or creating a collection represented with the `MongoCollection<TDocument>`\
    \ interface.\n\n`Table 1-6`. Overloaded `getCollection()` Method\n\n| Method |\
    \ Description |\n| --- | --- |\n| `getCollection(String collectionName)` | Gets\
    \ a collection as a `MongoCollection<Document>` instance. If the collection does\
    \ not already exist, it creates the collection. |\n| `getCollection(String collectionName,\
    \ Class<TDocument> documentClass)` | Gets a collection as a `MongoCollection<TDocument>`\
    \ instance. If the collection does not already exist, it creates the collection.\
    \ The second argument represents the document class. The only difference between\
    \ `MongoCollection<Document>` and `MongoCollection<TDocument>` is the type parameter;\
    \ `TDocument` represents the type of the document and `Document` the document.\
    \ |\n\n### 3.  Create a collection from the `MongoDatabase` instance\n\nCreate\
    \ a collection from the `MongoDatabase` instance created earlier using the `getCollection(String\
    \ collectionName)` method.\n\n```\n    MongoCollection<Document> coll = db.getCollection(\"\
    catalog\");\n```\n\n### 4.  Create instances of `Catalog`\n\nAs the `Catalog`\
    \ class extends the `BasicDBObject` class it also represents a document object\
    \ that may be stored in MongoDB database. Create instances of `Catalog` and set\
    \ the object fields using the `put(String key, Object value)` method in `BasicDBObject`\
    \ class.\n\n```\n    Catalog catalog1 = new Catalog();\n    catalog1.put(\"catalogId\"\
    , \"catalog1\");\n    catalog1.put(\"journal\", \"Oracle Magazine\");\n    catalog1.put(\"\
    publisher\", \"Oracle Publishing\");\n    catalog1.put(\"edition\", \"November\
    \ December 2013\");\n    catalog1.put(\"title\", \"Engineering as a Service\"\
    );\n    catalog1.put(\"author\", \"David A. Kelly\");\n\nCatalog catalog2 = new\
    \ Catalog();\n    catalog2.put(\"catalogId\", \"catalog2\");\n    catalog2.put(\"\
    journal\", \"Oracle Magazine\");\n    catalog2.put(\"publisher\", \"Oracle Publishing\"\
    );\n    catalog2.put(\"edition\", \"November December 2013\");\n    catalog2.put(\"\
    title\", \"Quintessential and Collaborative\");\n    catalog2.put(\"author\",\
    \ \"Tom Haunert\");\n```\n\n### 5.  Create a `Document` instance and add the `Catalog`\
    \ objects\n\nCreate a `Document` instance and add the `Catalog` objects to the\
    \ `Document` as key/value pairs using the `append(String key, Object value)` method.\n\
    \n```\n    Document documentSet = new Document();\n    documentSet.append(\"catalog1\"\
    , catalog1);\n    documentSet.append(\"catalog2\", catalog2);\n```\n\n### 6. \
    \ Create a `List<E>` instance\n\nAs the argument to the `insertMany()` method\
    \ for adding documents is required to be of type `List<E>` we need to create a\
    \ `List<E>` instance using a `ArrayList<E>` constructor.\n\n```\n    ArrayList<Document>\
    \ arrayList = new ArrayList<Document>();\n```\n\n### 7.  Add the `Document` instance\
    \ to the `ArrayList<E>`\n\nAdd the `Document` instance with key/value pairs added\
    \ to it to the `ArrayList<E>` using the `add(E e)` method.\n\n```\n    arrayList.add(documentSet);\n\
    ```\n\n### 8.  Add the `ArrayList<E>` instance to the `MongoCollection<TDocument>`\
    \ instance\n\nAdd the `ArrayList<E>` instance to the `MongoCollection<TDocument>`\
    \ instance using the `insertMany(List<? extends TDocument> documents)` method.\n\
    \n```\n    coll.insertMany(arrayList);\n```\n\n### 9.  Get the documents using\
    \ the `find()` method\n\nTo verify that the documents have been added get the\
    \ documents using the `find()` method in `MongoCollection<TDocument>`. The `find()`\
    \ method returns as the result a `FindIterable<TDocument>` object.\n\n```\n  \
    \  FindIterable<Document> iterable = coll.find();\n```\n\nSubsequently, output\
    \ the key/value pairs stored in the `FindIterable<TDocument>` object. Using an\
    \ enhanced `for` loop obtain the `Document` instances in the `FindIterable<TDocument>`\
    \ and obtain the key set associated with each `Document` instance using the `keySet()`\
    \ method, which returns a `Set<String>` object. Create an iterator represented\
    \ with an `Iterator<String>` object using the `iterator()` method in `Set<E>`.\
    \ Using a `while` loop iterate over the key set to output the document key for\
    \ each `Document` and the associated `Document` object.\n\n```\n    FindIterable<Document>\
    \ iterable = coll.find();\n        String documentKey = null;\n        for (Document\
    \ document : iterable) {\n            Set<String> keySet = document.keySet();\n\
    \            Iterator<String> iter = keySet.iterator();\n            while (iter.hasNext())\
    \ {\n                documentKey = iter.next();\n                System.out.println(documentKey);\n\
    \                System.out.println(document.get(documentKey));\n            }\n\
    \        }\n```\n\n### 10.  Close the `MongoClient` object\n\nClose the `MongoClient`\
    \ object using the `close()` method.\n\n```\n    mongoClient.close();\n```\n\n\
    The `CreateMongoDBDocumentModel` class is listed below.\n\n```\n    package mongodb;\n\
    \nimport java.util.ArrayList;\n    import java.util.Arrays;\n    import java.util.Iterator;\n\
    \    import java.util.Set;\n    import org.bson.Document;\n    import com.mongodb.MongoClient;\n\
    \    import com.mongodb.ServerAddress;\n    import com.mongodb.client.FindIterable;\n\
    \    import com.mongodb.client.MongoCollection;\n    import com.mongodb.client.MongoDatabase;\n\
    \npublic class CreateMongoDBDocumentModel {\n        public static void main(String[]\
    \ args) {\n            MongoClient mongoClient = new MongoClient(\n          \
    \          Arrays.asList(new ServerAddress(\"localhost\", 27017)));\n\nMongoDatabase\
    \ db = mongoClient.getDatabase(\"local\");\n\nMongoCollection<Document> coll =\
    \ db.getCollection(\"catalog\");\n\nCatalog catalog1 = new Catalog();\n      \
    \      catalog1.put(\"catalogId\", \"catalog1\");\n            catalog1.put(\"\
    journal\", \"Oracle Magazine\");\n            catalog1.put(\"publisher\", \"Oracle\
    \ Publishing\");\n            catalog1.put(\"edition\", \"November December 2013\"\
    );\n            catalog1.put(\"title\", \"Engineering as a Service\");\n     \
    \       catalog1.put(\"author\", \"David A. Kelly\");\n\nCatalog catalog2 = new\
    \ Catalog();\n            catalog2.put(\"catalogId\", \"catalog2\");\n       \
    \     catalog2.put(\"journal\", \"Oracle Magazine\");\n            catalog2.put(\"\
    publisher\", \"Oracle Publishing\");\n            catalog2.put(\"edition\", \"\
    November December 2013\");\n            catalog2.put(\"title\", \"Quintessential\
    \ and Collaborative\");\n            catalog2.put(\"author\", \"Tom Haunert\"\
    );\n```"
  raw: "3.  Specify a class constructor that takes all the fields as `args`. The model\
    \ class `Catalog` is listed below.\n\n```\n    package mongodb;\n    import java.io.Serializable;\n\
    \    import com.mongodb.BasicDBObject;\n    public class Catalog extends BasicDBObject\
    \ implements Serializable {\n\nprivate static final long serialVersionUID = 1L;\n\
    \nprivate String catalogId;\n            private String journal;\n            private\
    \ String publisher;\n            private String edition;\n            private\
    \ String title;\n            private String author;    public Catalog() {\n  \
    \          super();\n        }\n\npublic Catalog(String catalogId, String journal,\
    \ String publisher,\n                String edition, String title, String author)\
    \ {\n            this.catalogId = catalogId;\n            this.journal = journal;\n\
    \            this.publisher = publisher;\n            this.edition = edition;\n\
    \            this.title = title;\n            this.author = author;\n        }\n\
    \    }\n    ```\n\nNext, we shall use the model class `Catalog` to construct documents\
    \ and add the documents to MongoDB database. We shall use the `CreateMongoDBDocumentModel`\
    \ class to construct and add documents to MongoDB.\n\n1.  First, create a `MongoClient`\
    \ instance as discussed previously.\n\n```\n    MongoClient mongoClient = new\
    \ MongoClient(Arrays.asList(new ServerAddress(\"localhost\", 27017)));\n    ```\n\
    \n2.  Also create a `MongoDatabase` instance for the `local` database using the\
    \ `getDatabase(String databaseName)` method in `MongoClient` class.\n\n```\n \
    \   MongoDatabase db = mongoClient.getDatabase(\"local\");\n    ```\n\nThe `MongoDatabase`\
    \ interface provides the overloaded methods listed in [Table 1-6](#part0007.xhtml#Tab6)\
    \ for getting or creating a collection represented with the `MongoCollection<TDocument>`\
    \ interface.\n\n[Table 1-6](#part0007.xhtml#_Tab6). Overloaded `getCollection`()\
    \ Method\n\n| Method | Description |\n    | --- | --- |\n    | `getCollection(String\
    \ collectionName)` | Gets a collection as a `MongoCollection<Document>` instance.\
    \ If the collection does not already exist, it creates the collection. |\n   \
    \ | `getCollection(String collectionName, Class<TDocument> documentClass)` | Gets\
    \ a collection as a `MongoCollection<TDocument>` instance. If the collection does\
    \ not already exist, it creates the collection. The second argument represents\
    \ the document class. The only difference between `MongoCollection<Document>`\
    \ and `MongoCollection<TDocument>` is the type parameter; `TDocument` represents\
    \ the type of the document and `Document` the document. |\n\n3.  Create a collection\
    \ from the `MongoDatabase i`nstance created earlier using the `getCollection(String\
    \ collectionName)` method.\n\n```\n    MongoCollection<Document> coll = db.getCollection(\"\
    catalog\");\n    ```\n\n4.  As the `Catalog` class extends the `BasicDBObject`\
    \ class it also represents a document object that may be stored in MongoDB database.\
    \ Create instances of `Catalog` and set the object fields using the `put(String\
    \ key,Object value)` method in `BasicDBObject` class.\n\n```\n    Catalog catalog1\
    \ = new Catalog();\n    catalog1.put(\"catalogId\", \"catalog1\");\n    catalog1.put(\"\
    journal\", \"Oracle Magazine\");\n    catalog1.put(\"publisher\", \"Oracle Publishing\"\
    );\n    catalog1.put(\"edition\", \"November December 2013\");\n    catalog1.put(\"\
    title\", \"Engineering as a Service\");\n    catalog1.put(\"author\", \"David\
    \ A. Kelly\");\n\nCatalog catalog2 = new Catalog();\n    catalog2.put(\"catalogId\"\
    , \"catalog2\");\n    catalog2.put(\"journal\", \"Oracle Magazine\");\n    catalog2.put(\"\
    publisher\", \"Oracle Publishing\");\n    catalog2.put(\"edition\", \"November\
    \ December 2013\");\n    catalog2.put(\"title\", \"Quintessential and Collaborative\"\
    );\n    catalog2.put(\"author\", \"Tom Haunert\");\n    ```\n\n5.  Create a `Document`\
    \ instance and add the `Catalog` objects to the `Document` as key/value pairs\
    \ using the `append(String key, Object value)` method.\n\n```\n    Document documentSet\
    \ = new Document();\n    documentSet.append(\"catalog1\", catalog1);\n    documentSet.append(\"\
    catalog2\", catalog2);\n    ```\n\n6.  As the argument to the `insertMany()` method\
    \ for adding documents is required to be of type `List<E>` we need to create a\
    \ `List<E>` instance using a `ArrayList<E>` constructor.\n\n```\n    ArrayList<Document>\
    \ arrayList = new ArrayList<Document>();\n    ```\n\n7.  Add the `Document i`nstance\
    \ with key/value pairs added to it to the `ArrayList<E>` using the `add(E e)`\
    \ method.\n\n```\n    arrayList.add(documentSet);\n    ```\n\n8.  Add the `ArrayList<E>`\
    \ instance to the `MongoCollection<TDocument>` instance using the `insertMany(List<?\
    \ extends TDocument> documents)` method.\n\n```\n    coll.insertMany(arrayList);\n\
    \    ```\n\n9.  To verify that the documents have been added get the documents\
    \ using the `find()` method in `MongoCollection<TDocument>` The `find()` method\
    \ returns as the result a `FindIterable<TDocument>` object.\n\n```\n    FindIterable<Document>\
    \ iterable = coll.find();\n    ```\n\nSubsequently, output the key/value pairs\
    \ stored in the `FindIterable<TDocument>` object. Using an enhanced `for` loop\
    \ obtain the `Document` instances in the `FindIterable<TDocument>` and obtain\
    \ the key set associated with each `Document` instance using the `keySet()` method,\
    \ which returns a `Set<String>` object. Create an iterator represented with an\
    \ `Iterator<String>` object using the `iterator()` method in `Set<E>`. Using a\
    \ `while` loop iterate over the key set to output the document key for each `Document`\
    \ and the associated `Document` object.\n\n```\n    FindIterable<Document> iterable\
    \ = coll.find();\n            String documentKey = null;\n            for (Document\
    \ document : iterable) {\n                Set<String> keySet = document.keySet();\n\
    \                Iterator<String> iter = keySet.iterator();\n                while\
    \ (iter.hasNext()) {\n                    documentKey = iter.next();\n                    System.out.println(documentKey);\n\
    \                    System.out.println(document.get(documentKey));\n                }\n\
    \            }\n    ```\n\n10.  Close the `MongoClient` object using the `close()`\
    \ method.\n\n```\n    mongoClient.close();\n    ```\n\nThe `CreateMongoDBDocumentModel`\
    \ class is listed below.\n\n```\n    package mongodb;\n\nimport java.util.ArrayList;\n\
    \    import java.util.Arrays;\n    import java.util.Iterator;\n    import java.util.Set;\n\
    \    import org.bson.Document;\n    import com.mongodb.MongoClient;\n    import\
    \ com.mongodb.ServerAddress;\n    import com.mongodb.client.FindIterable;\n  \
    \  import com.mongodb.client.MongoCollection;\n    import com.mongodb.client.MongoDatabase;\n\
    \npublic class CreateMongoDBDocumentModel {\n        public static void main(String[]\
    \ args) {\n            MongoClient mongoClient = new MongoClient(\n                    Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n\nMongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n\
    \nCatalog catalog1 = new Catalog();\n            catalog1.put(\"catalogId\", \"\
    catalog1\");\n            catalog1.put(\"journal\", \"Oracle Magazine\");\n  \
    \          catalog1.put(\"publisher\", \"Oracle Publishing\");\n            catalog1.put(\"\
    edition\", \"November December 2013\");\n            catalog1.put(\"title\", \"\
    Engineering as a Service\");\n            catalog1.put(\"author\", \"David A.\
    \ Kelly\");\n\nCatalog catalog2 = new Catalog();\n            catalog2.put(\"\
    catalogId\", \"catalog2\");\n            catalog2.put(\"journal\", \"Oracle Magazine\"\
    );\n            catalog2.put(\"publisher\", \"Oracle Publishing\");\n            catalog2.put(\"\
    edition\", \"November December 2013\");\n            catalog2.put(\"title\", \"\
    Quintessential and Collaborative\");\n            catalog2.put(\"author\", \"\
    Tom Haunert\");"
  trans: "\n3.  指定一个类构造函数，将所有字段作为 `args` 参数。模型类 `Catalog` 列于下方。\n\n```\n    package\
    \ mongodb;\n    import java.io.Serializable;\n    import com.mongodb.BasicDBObject;\n\
    \    public class Catalog extends BasicDBObject implements Serializable {\n\n\
    private static final long serialVersionUID = 1L;\n\nprivate String catalogId;\n\
    \        private String journal;\n        private String publisher;\n        private\
    \ String edition;\n        private String title;\n        private String author;\n\
    \    public Catalog() {\n        super();\n    }\n\npublic Catalog(String catalogId,\
    \ String journal, String publisher,\n            String edition, String title,\
    \ String author) {\n        this.catalogId = catalogId;\n        this.journal\
    \ = journal;\n        this.publisher = publisher;\n        this.edition = edition;\n\
    \        this.title = title;\n        this.author = author;\n    }\n}\n```\n\n\
    接下来，我们将使用模型类 `Catalog` 来构建文档，并将这些文档添加到 MongoDB 数据库中。我们将使用 `CreateMongoDBDocumentModel`\
    \ 类来构建文档并将其添加到 MongoDB。\n\n### 1.  首先，如前所述创建一个 `MongoClient` 实例。\n\n```\n    MongoClient\
    \ mongoClient = new MongoClient(Arrays.asList(new ServerAddress(\"localhost\"\
    , 27017)));\n```\n\n### 2.  同时为 `local` 数据库创建一个 `MongoDatabase` 实例\n\n同时，使用 `MongoClient`\
    \ 类中的 `getDatabase(String databaseName)` 方法为 `local` 数据库创建一个 `MongoDatabase` 实例。\n\
    \n```\n    MongoDatabase db = mongoClient.getDatabase(\"local\");\n```\n\n`MongoDatabase`\
    \ 接口提供了 `表 1-6` 中列出的重载方法，用于获取或创建由 `MongoCollection<TDocument>` 接口表示的集合。\n\n`表\
    \ 1-6`. 重载的 `getCollection()` 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `getCollection(String\
    \ collectionName)` | 以 `MongoCollection<Document>` 实例的形式获取一个集合。如果该集合尚不存在，则会创建它。\
    \ |\n| `getCollection(String collectionName, Class<TDocument> documentClass)`\
    \ | 以 `MongoCollection<TDocument>` 实例的形式获取一个集合。如果该集合尚不存在，则会创建它。第二个参数表示文档类。`MongoCollection<Document>`\
    \ 和 `MongoCollection<TDocument>` 之间的唯一区别在于类型参数；`TDocument` 代表文档的类型，而 `Document`\
    \ 代表文档本身。 |\n\n### 3.  从 `MongoDatabase` 实例创建集合\n\n使用先前创建的 `MongoDatabase` 实例，通过\
    \ `getCollection(String collectionName)` 方法创建一个集合。\n\n```\n    MongoCollection<Document>\
    \ coll = db.getCollection(\"catalog\");\n```\n\n### 4.  创建 `Catalog` 的实例\n\n由于\
    \ `Catalog` 类继承自 `BasicDBObject` 类，因此它也代表一个可以存储在 MongoDB 数据库中的文档对象。创建 `Catalog`\
    \ 的实例，并使用 `BasicDBObject` 类中的 `put(String key, Object value)` 方法设置对象字段。\n\n```\n\
    \    Catalog catalog1 = new Catalog();\n    catalog1.put(\"catalogId\", \"catalog1\"\
    );\n    catalog1.put(\"journal\", \"Oracle Magazine\");\n    catalog1.put(\"publisher\"\
    , \"Oracle Publishing\");\n    catalog1.put(\"edition\", \"November December 2013\"\
    );\n    catalog1.put(\"title\", \"Engineering as a Service\");\n    catalog1.put(\"\
    author\", \"David A. Kelly\");\n\nCatalog catalog2 = new Catalog();\n    catalog2.put(\"\
    catalogId\", \"catalog2\");\n    catalog2.put(\"journal\", \"Oracle Magazine\"\
    );\n    catalog2.put(\"publisher\", \"Oracle Publishing\");\n    catalog2.put(\"\
    edition\", \"November December 2013\");\n    catalog2.put(\"title\", \"Quintessential\
    \ and Collaborative\");\n    catalog2.put(\"author\", \"Tom Haunert\");\n```\n\
    \n### 5.  创建一个 `Document` 实例并添加 `Catalog` 对象\n\n创建一个 `Document` 实例，并使用 `append(String\
    \ key, Object value)` 方法将 `Catalog` 对象作为键值对添加到 `Document` 中。\n\n```\n    Document\
    \ documentSet = new Document();\n    documentSet.append(\"catalog1\", catalog1);\n\
    \    documentSet.append(\"catalog2\", catalog2);\n```\n\n### 6.  创建一个 `List<E>`\
    \ 实例\n\n由于用于添加文档的 `insertMany()` 方法的参数要求类型为 `List<E>`，我们需要使用 `ArrayList<E>` 构造函数来创建一个\
    \ `List<E>` 实例。\n\n```\n    ArrayList<Document> arrayList = new ArrayList<Document>();\n\
    ```\n\n### 7.  将 `Document` 实例添加到 `ArrayList<E>`\n\n使用 `add(E e)` 方法将已添加了键值对的\
    \ `Document` 实例添加到 `ArrayList<E>` 中。\n\n```\n    arrayList.add(documentSet);\n\
    ```\n\n### 8.  将 `ArrayList<E>` 实例添加到 `MongoCollection<TDocument>` 实例\n\n使用 `insertMany(List<?\
    \ extends TDocument> documents)` 方法将 `ArrayList<E>` 实例添加到 `MongoCollection<TDocument>`\
    \ 实例中。\n\n```\n    coll.insertMany(arrayList);\n```\n\n### 9.  使用 `find()` 方法获取文档\n\
    \n为了验证文档已被添加，使用 `MongoCollection<TDocument>` 中的 `find()` 方法获取文档。`find()` 方法返回一个\
    \ `FindIterable<TDocument>` 对象作为结果。\n\n```\n    FindIterable<Document> iterable\
    \ = coll.find();\n```\n\n随后，输出存储在 `FindIterable<TDocument>` 对象中的键值对。使用增强的 `for`\
    \ 循环获取 `FindIterable<TDocument>` 中的 `Document` 实例，并使用 `keySet()` 方法获取与每个 `Document`\
    \ 实例关联的键集，该方法返回一个 `Set<String>` 对象。使用 `Set<E>` 中的 `iterator()` 方法创建一个由 `Iterator<String>`\
    \ 对象表示的迭代器。使用 `while` 循环遍历键集，输出每个 `Document` 的文档键以及关联的 `Document` 对象。\n\n```\n\
    \    FindIterable<Document> iterable = coll.find();\n        String documentKey\
    \ = null;\n        for (Document document : iterable) {\n            Set<String>\
    \ keySet = document.keySet();\n            Iterator<String> iter = keySet.iterator();\n\
    \            while (iter.hasNext()) {\n                documentKey = iter.next();\n\
    \                System.out.println(documentKey);\n                System.out.println(document.get(documentKey));\n\
    \            }\n        }\n```\n\n### 10.  关闭 `MongoClient` 对象\n\n使用 `close()`\
    \ 方法关闭 `MongoClient` 对象。\n\n```\n    mongoClient.close();\n```\n\n`CreateMongoDBDocumentModel`\
    \ 类列于下方。\n\n```\n    package mongodb;\n\nimport java.util.ArrayList;\n    import\
    \ java.util.Arrays;\n    import java.util.Iterator;\n    import java.util.Set;\n\
    \    import org.bson.Document;\n    import com.mongodb.MongoClient;\n    import\
    \ com.mongodb.ServerAddress;\n    import com.mongodb.client.FindIterable;\n  \
    \  import com.mongodb.client.MongoCollection;\n    import com.mongodb.client.MongoDatabase;\n\
    \npublic class CreateMongoDBDocumentModel {\n        public static void main(String[]\
    \ args) {\n            MongoClient mongoClient = new MongoClient(\n          \
    \          Arrays.asList(new ServerAddress(\"localhost\", 27017)));\n\nMongoDatabase\
    \ db = mongoClient.getDatabase(\"local\");\n\nMongoCollection<Document> coll =\
    \ db.getCollection(\"catalog\");\n\nCatalog catalog1 = new Catalog();\n      \
    \      catalog1.put(\"catalogId\", \"catalog1\");\n            catalog1.put(\"\
    journal\", \"Oracle Magazine\");\n            catalog1.put(\"publisher\", \"Oracle\
    \ Publishing\");\n            catalog1.put(\"edition\", \"November December 2013\"\
    );\n            catalog1.put(\"title\", \"Engineering as a Service\");\n     \
    \       catalog1.put(\"author\", \"David A. Kelly\");\n\nCatalog catalog2 = new\
    \ Catalog();\n            catalog2.put(\"catalogId\", \"catalog2\");\n       \
    \     catalog2.put(\"journal\", \"Oracle Magazine\");\n            catalog2.put(\"\
    publisher\", \"Oracle Publishing\");\n            catalog2.put(\"edition\", \"\
    November December 2013\");\n            catalog2.put(\"title\", \"Quintessential\
    \ and Collaborative\");\n            catalog2.put(\"author\", \"Tom Haunert\"\
    );\n```\n"
- fmt: "## 从 MongoDB 获取数据\n\n在本节中，我们将从 MongoDB 获取数据。我们将在此部分使用 `MongoDBClient` 应用程序。`MongoCollection<TDocument>`\
    \ 接口提供了[表 1-7](#part0007.xhtml#_Tab7) 中讨论的重载方法来查找文档。\n\n**表 1-7.** 重载的 `find()`\
    \ 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `find()` | 查找集合中的所有文档并返回一个 `FindIterable<TDocument>`\
    \ 实例。 |\n| `find(Bson filter)` | 使用指定的查询过滤器查找集合中的所有文档，并返回一个 `FindIterable<TDocument>`\
    \ 实例。 |\n| `find(Bson filter, Class<TResult> resultClass)` | 使用指定的查询过滤器和结果类查找集合中的所有文档，并返回一个\
    \ `<TResult> FindIterable<TResult>` 实例。 |\n| `find(Class<TResult> resultClass)`\
    \ | 使用指定的结果类查找集合中的所有文档，并返回一个 `<TResult> FindIterable<TResult>` 实例。 |\n\n### 步骤\
    \ 1：创建客户端、数据库和集合实例\n\n创建一个 `MongoClient` 实例、一个 `MongoDatabase` 实例和一个 `MongoCollection<TDocument>`\
    \ 实例，如前所述。\n\n```java\nMongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\nMongoDatabase db = mongoClient.getDatabase(\"\
    local\");\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n```\n\
    \n### 步骤 2：创建并插入文档\n\n创建两个 `Catalog` 实例，并使用 `insertOne(TDocument document)` 方法将这些\
    \ `Catalog` 实例添加到 `MongoCollection<TDocument>` 实例中。\n\n```java\nDocument catalog\
    \ = new Document(\"journal\", \"Oracle Magazine\")\n            .append(\"publisher\"\
    , \"Oracle Publishing\")\n            .append(\"edition\", \"November December\
    \ 2013\")\n            .append(\"title\", \"Engineering as a Service\")\n    \
    \        .append(\"author\", \"David A. Kelly\");\n    coll.insertOne(catalog);\n\
    \ncatalog = new Document(\"journal\", \"Oracle Magazine\")\n            .append(\"\
    publisher\", \"Oracle Publishing\")\n            .append(\"edition\", \"November\
    \ December 2013\")\n            .append(\"title\", \"Quintessential and Collaborative\"\
    )\n            .append(\"author\", \"Tom Haunert\");\n    coll.insertOne(catalog);\n\
    ```\n\n### 步骤 3：查询文档\n\n随后，使用 `find()` 方法查找添加的文档，该方法将结果作为 `FindIterable<TDocument>`\
    \ 返回。\n\n```java\nFindIterable<Document> iterable = coll.find();\n```\n\n### 步骤\
    \ 4：遍历并输出文档\n\n使用增强的 `for` 循环遍历 `FindIterable<TDocument>` 以获取存储的 `Document` 实例，并获取与每个\
    \ `Document` 实例关联的键集。在键集上创建一个迭代器，并使用 `while` 循环遍历键集以输出每个文档键及其关联的 `Document` 对象。\n\
    \n```java\nString documentKey = null;\nfor (Document document : iterable) {\n\
    \    Set<String> keySet = document.keySet();\n    Iterator<String> iter = keySet.iterator();\n\
    \    while (iter.hasNext()) {\n        documentKey = iter.next();\n        System.out.println(documentKey);\n\
    \        System.out.println(document.get(documentKey));\n    }\n}\n```\n\n`MongoDBClient`\
    \ 类的完整代码如下所示。\n\n```java\npackage mongodb;\n\nimport java.util.Arrays;\nimport\
    \ java.util.Iterator;\nimport java.util.Set;\nimport org.bson.Document;\nimport\
    \ com.mongodb.MongoClient;\nimport com.mongodb.ServerAddress;\nimport com.mongodb.client.FindIterable;\n\
    import com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    \npublic class MongoDBClient {\n    public static void main(String[] args) {\n\
    \        MongoClient mongoClient = new MongoClient(\n                Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n        MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n        MongoCollection<Document> coll = db.getCollection(\"catalog\"\
    );\n        Document catalog = new Document(\"journal\", \"Oracle Magazine\")\n\
    \                .append(\"publisher\", \"Oracle Publishing\")\n             \
    \   .append(\"edition\", \"November December 2013\")\n                .append(\"\
    title\", \"Engineering as a Service\")\n                .append(\"author\", \"\
    David A. Kelly\");\n        coll.insertOne(catalog);\n\n        catalog = new\
    \ Document(\"journal\", \"Oracle Magazine\")\n                .append(\"publisher\"\
    , \"Oracle Publishing\")\n                .append(\"edition\", \"November December\
    \ 2013\")\n                .append(\"title\", \"Quintessential and Collaborative\"\
    )\n                .append(\"author\", \"Tom Haunert\");\n        coll.insertOne(catalog);\n\
    \n        FindIterable<Document> iterable = coll.find();\n        String documentKey\
    \ = null;\n        for (Document document : iterable) {\n            Set<String>\
    \ keySet = document.keySet();\n            Iterator<String> iter = keySet.iterator();\n\
    \            while (iter.hasNext()) {\n                documentKey = iter.next();\n\
    \                System.out.println(documentKey);\n                System.out.println(document.get(documentKey));\n\
    \            }\n        }\n        mongoClient.close();\n    }\n}\n```\n\n###\
    \ 步骤 5：清理集合（可选但推荐）\n\n在运行 `MongoDBClient` 应用程序之前，请使用 Mongo shell 中的以下命令（下一章将更详细地讨论）从\
    \ `local` 数据库中删除 `catalog` 集合。Mongo shell 使用 `mongo` 命令启动。在一个新的命令窗口中启动 Mongo shell，并且在运行\
    \ Mongo shell 命令时，MongoDB 服务器实例应该正在运行。\n\n```\n>mongo\n>use local\n>db.catalog.drop()\n\
    ```\n\n### 步骤 6：运行应用程序\n\n要运行 `MongoDBClient` 应用程序，请在 Package Explorer 中右键单击 `MongoDBClient.java`\
    \ 文件，然后选择 **Run As** ![image](Images/image00406.jpeg) **Java Application**，如[图\
    \ 1-15](#part0007.xhtml#Fig15) 所示。\n\n![9781484215999_Fig01-15.jpg](Images/image00420.jpeg)\n\
    \n**[图 1-15](#part0007.xhtml#_Fig15).** 运行 MongoDBClient.java 应用程序"
