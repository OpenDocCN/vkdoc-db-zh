    \n![9781484215999_Fig01-09.jpg](img/image00414.jpeg)\n\n图 1-9. Java 构建路径中的 Mongo\
    \ Java 驱动程序\n\n在`pom.xml`中配置了 Mongo Java 驱动程序依赖项的 Maven 项目如图 1-10 所示。`MongoDBJava`\
    \ Maven 项目的目录结构显示在 Package Explorer 中。\n\n![9781484215999_Fig01-10.jpg](img/image00415.jpeg)\n\
    \n图 1-10. 配置了 Mongo Java 驱动程序依赖项的 Maven 项目\n\n# 创建 BSON 文档\n\n在本节中，我们将向 MongoDB\
    \ 服务器添加一个 BSON（二进制 JSON）文档。我们将使用 Eclipse IDE 中的`CreateMongoDBDocument.java`应用程序。MongoDB\
    \ 文档由`org.bson.Document`类表示。MongoDB 将数据存储在集合中。MongoDB Java 驱动程序中用于 MongoDB 类的主要包是`com.mongodb`和`com.mongodb.client`。用于连接到\
    \ MongoDB 服务器的 MongoDB 客户端由`com.mongodb.MongoClient`类表示。一个`MongoClient`对象提供连接池，并且整个应用程序只需要一个实例。`MongoClient`类提供了几个构造函数，其中一些在表\
    \ 1-2 中列出。\n\n表 1-2. MongoClient 类构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `MongoClient()`\
    \ | 基于单个 MongoDB 节点（localhost 和默认端口 27017）创建一个实例。 |\n| `MongoClient(String host)`\
    \ | 基于单个 MongoDB 节点创建实例，主机指定为 host[:port] 字符串。 |\n| `MongoClient(String host,\
    \ int port)` | 使用指定的主机和端口基于单个 MongoDB 节点创建实例。 |\n| `MongoClient(List<ServerAddress>\
    \ seeds)` | 使用 MongoDB 服务器列表创建实例以进行选择。选择 ping 时间最短的服务器。如果 ping 时间最短的服务器宕机，则选择列表中的下一个。\
    \ |\n| `MongoClient(List<ServerAddress> seeds, List<MongoCredential> credentialsList)`\
    \ | 与上一个版本相同，但提供凭据列表以验证到服务器的连接。 |\n| `MongoClient(List<ServerAddress> seeds, List<MongoCredential>\
    \ credentialsList, MongoClientOptions options)` | 与上一个版本相同，但也提供了 Mongo 客户端选项。\
    \ |\n\n1.  使用`MongoClient(List<ServerAddress> seeds)`构造函数创建一个`MongoClient`实例。提供“localhost”或主机的\
    \ IPv4 地址，端口为 27017。\n\n```java\nMongoClient mongoClient = new MongoClient(Arrays.asList(new\
    \ ServerAddress(\"localhost\", 27017)));\n```\n\n2.  当创建多个`MongoClient`实例时，所有资源使用限制都适用于每个`MongoClient`实例。要关闭实例，需要调用`MongoClient.close()`来清理资源。MongoDB\
    \ 中的逻辑数据库由`com.mongodb.client.MongoDatabase`接口表示。使用`MongoClient`类中的`getDatabase(String\
    \ databaseName)`方法获取“local”数据库的`com.mongodb.client.MongoDatabase`实例，这是一个默认的 MongoDB\
    \ 数据库实例。\n\n```java\nMongoDatabase db = mongoClient.getDatabase(\"local\");\n\
    ```\n\n3.  一些 Mongo 客户端 API 在 3.0.x 版本中已被修改。例如，在 3.0.x 中，数据库实例由`MongoDatabase`表示，而不是`com.mongodb.DB`。`MongoClient`中返回`DB`实例的`getDB(String\
    \ dbName)`方法已被弃用。在 3.0.x 中，数据库集合由`com.mongodb.client.MongoCollection<TDocument>`表示，而不是`com.mongodb.DBCollection`。使用`MongoDatabase`中的`listCollectionNames()`方法获取数据库中的所有集合名称。\n\
    \n```java\nMongoIterable<String> colls = db.listCollectionNames();\n```\n\n4.\
    \  `listCollectionNames()`方法返回一个`MongoIterable<String>`的集合。迭代该集合以输出集合名称。\n\n```java\n\
    for (String s : colls) {\n    System.out.println(s);\n}\n```\n\n5.  接下来，使用`MongoDatabase`中的`getCollection(String\
    \ collectionName)`方法创建一个新的`MongoCollection<Document>`实例。创建一个名为`catalog`的`Document`实例集合。当调用`getCollection(String)`方法时，会隐式创建集合。\n\
    \n```java\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n```\n"
- fmt: "# MongoDB 文档操作：使用 Document 类和模型\n\nA MongoDB specific BSON object is represented\
    \ with the `org.bson.Document` class, which implements the `Map` interface among\
    \ others. The `Document` class provides the following constructors listed in [Table\
    \ 1-3](#part0007.xhtml#Tab3) to create a new instance.\n\n### Table 1-3. Document\
    \ Class Constructors\n\n| Constructor | Description |\n| --- | --- |\n| `Document()`\
    \ | Creates an empty `Document` instance. |\n| `Document(Map<String,Object> map)`\
    \ | Creates a `Document` instance initialized with a `Map`. |\n| `Document(String\
    \ key, Object value)` | Creates a `Document` instance initialized with a key/value\
    \ pair. |\n\nThe `Document` class provides some other utility methods, some of\
    \ which are in [Table 1-4](#part0007.xhtml#Tab4).\n\n### Table 1-4. Document Class\
    \ Utility Methods\n\n| Method | Description |\n| --- | --- |\n| `append(String\
    \ key, Object value)` | Appends a key/value pair to a `Document` object and returns\
    \ a new instance. |\n| `toString()` | Returns a String representation of the object.\
    \ |\n\n6. Create a `Document` instance using the `Document(String key, Object\
    \ value)` constructor and use the `append(String key, Object value)` method to\
    \ append key/value pairs. The `append()` method may be invoked multiple times\
    \ in sequence to add multiple key/value pairs. Add key/value pairs for the `journal`,\
    \ `publisher`, `edition`, `title`, and `author` fields.\n\n```java\nDocument catalog\
    \ = new Document(\"journal\", \"Oracle Magazine\")\n.append(\"publisher\", \"\
    Oracle Publishing\")\n.append(\"edition\", \"November December 2013\")\n.append(\"\
    title\", \"Engineering as a Service\").append(\"author\", \"David A. Kelly\");\n\
    ```\n\n7. The `MongoCollection<TDocument>` interface provides `insertOne(TDocument\
    \ document)` method to add a document(s) to a collection. Add the `catalog` `Document`\
    \ to the `MongoCollection<TDocument>` instance for the `catalog` collection.\n\
    \n```java\ncoll.insertOne(catalog);\n```\n\n8. The `MongoCollection<TDocument>`\
    \ interface provides overloaded `find()` method to find a `Document` instance.\
    \ Next, obtain the document added using the `find()` method. Furthermore, the\
    \ `find()` method returns an iterable collection from which we obtain the first\
    \ document using the `first()` method.\n\n```java\nDocument dbObj = coll.find().first();\n\
    ```\n\n9. Output the `Document` object found as such and also by iterating over\
    \ the `Set<E>` obtained from the `Document` using the `keySet()` method. The `keySet()`\
    \ method returns a `Set<String>`. Create an `Iterator` from the `Set<String>`\
    \ using the `iterator()` method. While the `Iterator` has elements as determined\
    \ by the `hasNext()` method, obtain the elements using the `next()` method. Each\
    \ element is a key in the `Document` fetched. Obtain the value for the key using\
    \ the `get(String key)` method in `Document`.\n\n```java\nSystem.out.println(dbObj);\n\
    Set<String> set = dbObj.keySet();\nIterator iter = set.iterator();\nwhile(iter.hasNext()){\n\
    Object obj=     iter.next();\nSystem.out.println(obj);\nSystem.out.println(dbObj.get(obj.toString()));\n\
    }\n```\n\n10. Close the `MongoClient` instance.\n\n```java\nmongoClient.close();\n\
    ```\n\nThe `CreateMongoDBDocument` class is listed below.\n\n```java\npackage\
    \ mongodb;\n\nimport java.util.Arrays;\nimport java.util.Iterator;\nimport java.util.Set;\n\
    import org.bson.Document;\nimport com.mongodb.MongoClient;\nimport com.mongodb.ServerAddress;\n\
    import com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    import com.mongodb.client.MongoIterable;\n\npublic class CreateMongoDBDocument\
    \ {\n\n    public static void main(String[] args) {\n\n        MongoClient mongoClient\
    \ = new MongoClient(\n                Arrays.asList(new ServerAddress(\"localhost\"\
    , 27017)));\n        for (String s : mongoClient.listDatabaseNames()) {\n    \
    \        System.out.println(s);\n        }\n        MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n        MongoIterable<String> colls = db.listCollectionNames();\n \
    \       System.out.println(\"MongoDB Collection Names: \");\n        for (String\
    \ s : colls) {\n            System.out.println(s);\n        }\n        MongoCollection<Document>\
    \ coll = db.getCollection(\"catalog\");\n        Document catalog = new Document(\"\
    journal\", \"Oracle Magazine\")\n                .append(\"publisher\", \"Oracle\
    \ Publishing\")\n                .append(\"edition\", \"November December 2013\"\
    )\n                .append(\"title\", \"Engineering as a Service\")\n        \
    \        .append(\"author\", \"David A. Kelly\");\n        coll.insertOne(catalog);\n\
    \        Document dbObj = coll.find().first();\n        System.out.println(dbObj);\n\
    \        Set<String> set = catalog.keySet();\n        Iterator<String> iter =\
    \ set.iterator();\n        while (iter.hasNext()) {\n            Object obj =\
    \ iter.next();\n            System.out.println(obj);\n            System.out.println(dbObj.get(obj.toString()));\n\
    \        }\n        mongoClient.close();\n    }\n}\n```\n\n11. To run the `CreateMongoDBDocument`\
    \ application, right-click on the `CreateMongoDBDocument.java` file in Package\
    \ Explorer and select Run As ![image](Images/image00406.jpeg) Java Application\
    \ as shown in [Figure 1-11](#part0007.xhtml#Fig11).\n\n![9781484215999_Fig01-11.jpg](Images/image00416.jpeg)\n\
    \n### Figure 1-11. Running CreateMongoDBDocument.java Application\n\nA new BSON\
    \ document gets stored in a new collection `catalog` in MongoDB database. The\
    \ document stored is also output as such and as key/value pairs as shown in [Figure\
    \ 1-12](#part0007.xhtml#Fig12).\n\n![9781484215999_Fig01-12.jpg](Images/image00417.jpeg)\n\
    \n### Figure 1-12. Outputting Document Stored in MongoDB\n\n## Using a Model to\
    \ Create a BSON Document\n\nIn the previous section we constructed the documents\
    \ to add to a collection using the `append(String key, Object value)` method in\
    \ `Document` class and added the documents to a collection using the `insertOne(TDocument\
    \ document)` method in `MongoCollection<TDocument>` interface. A `Document` object\
    \ may also be constructed using a model class that represents the objects in a\
    \ collection. The `MongoCollection<TDocument>` interface provides the overloaded\
    \ `insertMany()` method to add a list of documents as discussed in [Table 1-5](#part0007.xhtml#Tab5).\n\
    \n### Table 1-5. Overloaded insertMany() Method\n\n| Method | Description |\n\
    | --- | --- |\n| `insertMany(List<? extends TDocument> documents)` | Inserts one\
    \ or more documents. |\n| `insertMany(List<? extends TDocument> documents, InsertManyOptions\
    \ options)` | Inserts one or more documents using the specified insert options.\
    \ The only option supported is to insert the documents in the order provided.\
    \ |\n\nIn this section we shall construct a list of documents using a model class.\
    \ Subsequently, we shall insert the list into a collection using one of the `insertMany()`\
    \ methods.\n\n1.  First, create a model class `Catalog` with the following fields:\n\
    \    *   `catalogId`\n    *   `journal`\n    *   `publisher`\n    *   `edition`\n\
    \    *   `title`\n    *   `author`\n2.  The model class extends the `BasicDBObject`\
    \ class, which is a basic implementation of a MongoDB specific BSON object, and\
    \ implements the `Serializable` interface. The class implements the `Serializable`\
    \ interface to serialize a model class object to a cache when persisted to a database.\
    \ To associate a version number with a serializable class by serialization runtime,\
    \ specify a `serialVersionUID` variable with scope `private`.\n\n```java\nprivate\
    \ static final long serialVersionUID = 1L;\n```"
