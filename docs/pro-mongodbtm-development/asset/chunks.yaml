  raw: 'In the Automap dialog click on Yes to perform automatic mapping as shown in
    [Figure 12-66](#part0018.xhtml#Fig66).                    ![9781484215999_Fig12-66.jpg](Images/image00773.jpeg)                    [Figure
    12-66](#part0018.xhtml#_Fig66). Automap Dialog                    The source and
    target datastores get defined for the mapping in the integration interface, and
    the datastore diagrams get added as shown in [Figure 12-67](#part0018.xhtml#Fig67).                    ![9781484215999_Fig12-67.jpg](Images/image00774.jpeg)                    [Figure
    12-67](#part0018.xhtml#_Fig67). Source and Target Datastores           6.  Select
    the Quick-Edit tab and select Staging Area in the Execute On column for the target
    datastore `WLSLOG` as shown in [Figure 12-68](#part0018.xhtml#Fig68).          ![9781484215999_Fig12-68.jpg](Images/image00775.jpeg)                    [Figure
    12-68](#part0018.xhtml#_Fig68). Configuring Target Datastore WLSLOG           7.  Select
    the Flow tab. The flow diagram describes the flow of data from the source datastore
    to the target datastore. The default flow diagram has the staging area in the
    target database. But, the staging area should be in the source database as shown
    in [Figure 12-69](#part0018.xhtml#Fig69).          ![9781484215999_Fig12-69.jpg](Images/image00776.jpeg)                    [Figure
    12-69](#part0018.xhtml#_Fig69). Default Flow Diagram           8.  Select the
    Overview tab and select Staging Area Different From Target. Even if the check
    box is already selected, deselect and select again. Select the staging area as
    `Hive:MongoDB` as shown in [Figure 12-70](#part0018.xhtml#Fig70).                    ![9781484215999_Fig12-70.jpg](Images/image00777.jpeg)                    [Figure
    12-70](#part0018.xhtml#_Fig70). Configuring Staging Area                    The
    Flow diagram gets updated to indicate flow of data from a staging area in the
    source database to the target database as shown in [Figure 12-71](#part0018.xhtml#Fig71).
    The IKM Selector should be selected as IKM File-Hive to Oracle.                    ![9781484215999_Fig12-71.jpg](Images/image00778.jpeg)                    [Figure
    12-71](#part0018.xhtml#_Fig71). Configured Flow Diagram           9.  Click on
    Save to save the integration interface as shown in [Figure 12-72](#part0018.xhtml#Fig72).                    ![9781484215999_Fig12-72.jpg](Images/image00779.jpeg)                    [Figure
    12-72](#part0018.xhtml#_Fig72). Saving Interface                    An integration
    interface gets added as shown in [Figure 12-73](#part0018.xhtml#Fig73).                    ![9781484215999_Fig12-73.jpg](Images/image00780.jpeg)                    [Figure
    12-73](#part0018.xhtml#_Fig73). New Integration Interface              Running
    the Interface    In this section we shall run the integration interface to integrate
    the data from MongoDB to Oracle Database.    1.  Right-click on the integration
    interface node and select Execute as shown in [Figure 12-74](#part0018.xhtml#Fig74).          ![9781484215999_Fig12-74.jpg](Images/image00781.jpeg)                    [Figure
    12-74](#part0018.xhtml#_Fig74). Running the Interface           2.  In Execution
    select OK as shown in [Figure 12-75](#part0018.xhtml#Fig75).          ![9781484215999_Fig12-75.jpg](Images/image00782.jpeg)                    [Figure
    12-75](#part0018.xhtml#_Fig75). Configuring the Interface Run           3.  A
    Session started dialog gets displayed. Click on OK as shown in [Figure 12-76](#part0018.xhtml#Fig76).                    ![9781484215999_Fig12-76.jpg](Images/image00783.jpeg)                    [Figure
    12-76](#part0018.xhtml#_Fig76). Information Dialog for Integration Session Started                    Three
    MapReduce jobs run to integrate Hive table data into Oracle Database as shown
    in [Figure 12-77](#part0018.xhtml#Fig77).                    ![9781484215999_Fig12-77.jpg](Images/image00784.jpeg)                    [Figure
    12-77](#part0018.xhtml#_Fig77).


    Output from Integrating MongoDB based Hive Table into Oracle Database           4.  Select
    the Operator tab. Select the session from the Session List. The different phases
    of the integration are listed, including creating staging tables and launching
    Oracle Loader for Hadoop as shown in [Figure 12-78](#part0018.xhtml#Fig78).                    ![9781484215999_Fig12-78.jpg](Images/image00785.jpeg)                    [Figure
    12-78](#part0018.xhtml#_Fig78). Integration Phases                    After data
    has been integrated staging tables, Oracle Directory, ext tab dir, local data
    files, local temp files, and HDFS data files get deleted as shown in [Figure 12-79](#part0018.xhtml#Fig79).                    ![9781484215999_Fig12-79.jpg](Images/image00786.jpeg)                    [Figure
    12-79](#part0018.xhtml#_Fig79). Integration Phases for Deleting Files                    One
    of the advantages of using Oracle Data Integrator over using Oracle Loader for
    Hadoop on the command line is that the integration gets suspended, without getting
    terminated, if some configured parameter is not found. For example, if the target
    database table `OE.WLSLOG` is not found the integration gets suspended, as in
    the Create Hive staging table phase as shown in [Figure 12-80](#part0018.xhtml#Fig80).                    ![9781484215999_Fig12-80.jpg](Images/image00787.jpeg)                    [Figure
    12-80](#part0018.xhtml#_Fig80). Suspended Integration Phase           5.  The
    session is still running and gets completed if the configuration parameter is
    fixed, for example, add a missing schema for a database table. Alternatively the
    integration session may be stopped. Right-click on the session and select one
    of the Stop options to terminate the session as shown in [Figure 12-81](#part0018.xhtml#Fig81).          ![9781484215999_Fig12-81.jpg](Images/image00788.jpeg)                    [Figure
    12-81](#part0018.xhtml#_Fig81). Options to Stop Integration Session              Selecting
    Integrated Data in Oracle Database Table    Having integrated MongoDB datastore
    into Oracle Database, run a `SELECT` statement in SQL/Plus to select-list the
    integrated data as shown in [Figure 12-82](#part0018.xhtml#Fig82).    ![9781484215999_Fig12-82.jpg](Images/image00789.jpeg)    [Figure
    12-82](#part0018.xhtml#_Fig82). Selecting Integrated Data    Summary    In this
    chapter we integrated MongoDB data into Oracle Database in Oracle Data Integrator
    using the IKM File-Hive to Oracle knowledge module.    This chapter concludes
    the book. You have learned about the different aspects of development with MongoDB
    such as accessing MongoDB with Java, PHP, Ruby, and Node.js. We also discussed
    migrating some of the other NoSQL databases - Apache Cassandra and Couchbase –
    to MongoDB. We learned about using Java EE frameworks Spring Data and Kundera
    with MongoDB. We also introduced using Hadoop and Oracle Data Integrator with
