    \ and “Couchbase” in September 2015 is shown in the following illustration.\n\n\
    ![9781484215999_unFigFM-04.jpg](Images/image00403.jpeg)\n\n*Google Trends Database\
    \ Search Results*\n\nCHAPTER 1\n\n![image](Images/image00404.jpeg)\n\nUsing a\
    \ Java Client with MongoDB\n\nMongoDB server provides drivers for several languages\
    \ including Java. The MongoDB Java driver may be used to connect to MongoDB server\
    \ from a Java application and create a collection, get a collection or a list\
    \ of collections, add a document or multiple documents to a collection, and find\
    \ a document or a set of documents. In this chapter we shall create a Java application\
    \ in Eclipse and access MongoDB server to add a document and subsequently get\
    \ data from MongoDB server and also update and delete data in MongoDB server.\
    \ This chapter covers the following topics:\n\n*   Setting up the environment\n\
    *   Creating a Maven project\n*   Creating a BSON document in MongoDB\n*   Using\
    \ a model to create a BSON document in MongoDB\n*   Getting data from MongoDB\n\
    *   Updating data in MongoDB\n*   Deleting data in MongoDB\n\nSetting Up the Environment\n\
    \nWe need to download and install the following software.\n\n1.  MongoDB 3.0.5\
    \ binary distribution `mongodb-win32-x86_64-3.0.5-signed.msi` from `www.mongodb.org/downloads`.\
    \ Stable Release (3.0.5) for Windows 64-bit is used in this chapter.\n2.  Eclipse\
    \ IDE for Java EE Developers from `www.eclipse.org/downloads`.\n3.  Java 5 or\
    \ later (Java 7 used) from `www.oracle.com/technetwork/java/javase/downloads/index.html`.\n\
    \nDouble-click on the MongoDB binary distribution to install MongoDB. Add the\
    \ `bin` directory (`C:\\Program Files\\MongoDB\\Server\\3.0\\bin`) of the MongoDB\
    \ installation to the `PATH` environment. Create a directory `C:\\data\\db` for\
    \ the MongoDB data. Start the MongoDB server with the following command.\n\n```\n\
    >mongod\n```\n\nThe MongoDB server gets started as shown in [Figure 1-1](#part0007.xhtml#Fig1).\n\
    \n![9781484215999_Fig01-01.jpg](Images/image00405.jpeg)\n\n[Figure 1-1](#part0007.xhtml#_Fig1).\
    \ Starting MongoDB\n\nCreating a Maven Project\n\nTo access MongoDB from a Java\
    \ application we need to create a Maven project in Eclipse IDE and add the required\
    \ dependencies.\n\n1.  Select File ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg)\
    \ Other. In the New window, select the Maven ![image](Images/image00406.jpeg)\
    \ Maven Project wizard and click on Next as shown in [Figure 1-2](#part0007.xhtml#Fig2).\n\
    \n![9781484215999_Fig01-02.jpg](Images/image00407.jpeg)\n\n[Figure 1-2](#part0007.xhtml#_Fig2).\
    \ Selecting Maven ![image](Images/image00406.jpeg) Maven Project\n\n2.  In New\
    \ Maven Project wizard select the check boxes “Create a simple project” and “Use\
    \ default Workspace location” as shown in [Figure 1-3](#part0007.xhtml#Fig3).\
    \ Click on Next.\n\n![9781484215999_Fig01-03.jpg](Images/image00408.jpeg)\n\n\
    [Figure 1-3](#part0007.xhtml#_Fig3). New Maven Project wizard\n\n3.  Next, configure\
    \ the project, specifying the following values as shown in [Figure 1-4](#part0007.xhtml#Fig4)\
    \ and then clicking on Finish:\n\n*   Group Id: `mongodb.java`\n    *   Artifact\
    \ Id: `MongoDBJava`\n    *   Version: 1.0.0\n    *   Packaging: jar\n    *   Name:\
    \ `MongoDBJava`\n\n![9781484215999_Fig01-04.jpg](Images/image00409.jpeg)\n\n[Figure\
    \ 1-4](#part0007.xhtml#_Fig4). Configuring the Maven Project"
  trans: "\n**迪帕克·沃赫拉**是一名顾问，也是`NuBean.com`软件公司的首席成员。迪帕克是一名经过 Sun 认证的 Java 程序员和 Web\
    \ 组件开发人员。他在 XML、Java 编程和 Java EE 领域工作超过十年。迪帕克是*Pro Couchbase 开发*（Apress, 2015）一书的作者，以及*Pro\
    \ XML Java 技术开发*（Apress, 2006）一书的合著者。迪帕克还是*JDBC 4.0*、*Oracle JDeveloper J2EE 开发*、*使用\
    \ Oracle JDeveloper 11g 处理 XML 文档*、*Oracle Fusion Middleware 11g 的 EJB 3.0 数据库持久化*以及*在\
    \ Eclipse IDE 中进行 Java EE 开发*（Packt Publishing）等书的作者。他还曾担任*WebLogic 权威指南*（O’Reilly\
    \ Media, 2004）和*Ruby 编程初学者指南*（Cengage Learning PTR, 2007）的技术审阅者。\n\n## 关于技术审阅者\n\
    \n![9781484215999_unFigFM-02.jpg](img/image00401.jpeg)\n\n**曼努埃尔·乔丹**是一位自学成才的开发者和研究员，他喜欢学习新技术，以便尝试以新的方式将它们整合起来。\n\
    \n曼努埃尔赢得了 2010 年 Springy 奖 – 社区冠军和 2013 年 Spring 冠军。在他为数不多的空闲时间里，他会阅读圣经，并用他的贝斯和吉他创作音乐。\n\
    \n![9781484215999_unFigFM-03.jpg](img/image00402.jpeg)\n\n**马西莫·纳尔多内**拥有意大利萨勒诺大学计算机科学硕士学位。他曾担任\
    \ PCI QSA 和高级首席 IT 安全/云/SCADA 架构师多年，目前担任惠普芬兰公司的安全、云和 SCADA 首席 IT 架构师。他拥有超过二十年的\
    \ IT 工作经验，涉及安全、SCADA、云计算、IT 基础设施、移动技术和 WWW 技术领域的国内和国际项目。马西莫曾担任项目经理、云/SCADA 首席\
    \ IT 架构师、软件工程师、研究工程师、首席安全架构师和软件专员。他曾在赫尔辛基技术大学（阿尔托大学）网络实验室担任客座讲师和练习指导老师。马西莫使用 Perl、PHP、Java、VB、Python、C/C++和\
    \ MySQL 进行编程和教授编程已超过二十年。他持有四项国际专利（涉及 PKI、SIP、SAML 和代理领域）。\n\n马西莫是*Pro Android\
    \ 游戏*（Apress, 2015）一书的作者。\n\n## 引言\n\nMongoDB 服务器在 NoSQL 数据库中排名第一，在所有数据库（关系型或\
    \ NoSQL）中排名第四。虽然市面上有几本关于 MongoDB 管理的书籍，但还没有关于基于 MongoDB 开发的书。\n\n这本*Pro MongoDB\
    \ 开发*是关于 MongoDB 服务器的，它是一个基于 BSON（二进制 JSON）文档模型的 NoSQL 数据库。如前所述，MongoDB 是最常用的\
    \ NoSQL 数据库，根据 DB-Engines.com 的数据，它在所有数据库（关系型或 NoSQL）中排名第四（参考：`http://db-engines.com/en/ranking`）。本书讨论了在\
    \ Web 开发中使用 MongoDB 数据库的各个方面。Java、PHP、Ruby 和 JavaScript 是最常用的编程/脚本语言，本书讨论了使用这些语言访问\
    \ MongoDB 数据库。本书还讨论了使用 Java EE 框架 Kundera 和 Spring Data 与 MongoDB。由于 NoSQL 数据库通常与\
    \ Hadoop 生态系统一起使用，本书讨论了 MongoDB 与 Apache Hadoop 和 Apache Hive 的结合使用。还讨论了基于 Oracle\
    \ Data Integrator 将 MongoDB 数据集成到 Oracle Database 中。讨论了从其他 NoSQL 数据库（Apache Cassandra\
    \ 和 Couchbase）以及关系型数据库（Oracle Database）的迁移。\n\n本书适用于使用 MongoDB 服务器开发应用程序的 Web\
    \ 开发者和 NoSQL 开发者。必须具备 Java、Java EE 以及脚本语言 PHP、Ruby 和 JavaScript 的预备知识。熟悉 Apache\
    \ Hadoop、Apache Hive、Oracle Database 和 Oracle Data Integrator 也是先决条件。\n\n根据 2014\
    \ 年 Java 工具和技术展望，“在 NoSQL 领域……在使用 NoSQL 的开发者中……MongoDB（56%）显然处于领先地位……”（参考：`http://zeroturnaround.com/rebellabs/java-tools-and-technologies-landscape-for-2014/13/`）。\n\
    \n超过 2000 个组织使用 MongoDB（参考：`www.mongodb.com/who-uses-mongodb`）。\n\n各种指标都将 MongoDB\
    \ 排在所有其他 NoSQL 数据库之上（参考：`www.mongodb.com/leading-nosql-database`）。\n\nMongoDB\
    \ 被 DB-Engines 评为 2013 年度数据库（参考：`www.mongodb.com/blog/post/mongodb-named-2013-database-year-why-matters`）。\n\
    \n2015 年 9 月，Google Trends 中“MongoDB”与“Apache Cassandra”和“Couchbase”搜索词排名如下图所示。\n\
    \n![9781484215999_unFigFM-04.jpg](img/image00403.jpeg)\n\n*Google Trends 数据库搜索结果*\n\
    \n# 第 1 章\n\n![image](img/image00404.jpeg)\n\n## 使用 Java 客户端连接 MongoDB\n\nMongoDB\
    \ 服务器为包括 Java 在内的多种语言提供了驱动程序。MongoDB Java 驱动程序可用于从 Java 应用程序连接到 MongoDB 服务器，并创建集合、获取集合或集合列表、向集合添加一个或多个文档，以及查找一个或一组文档。在本章中，我们将在\
    \ Eclipse 中创建一个 Java 应用程序，访问 MongoDB 服务器添加文档，随后从 MongoDB 服务器获取数据，以及更新和删除 MongoDB\
    \ 服务器中的数据。本章涵盖以下主题：\n\n*   设置环境\n*   创建 Maven 项目\n*   在 MongoDB 中创建 BSON 文档\n\
    *   使用模型在 MongoDB 中创建 BSON 文档\n*   从 MongoDB 获取数据\n*   更新 MongoDB 中的数据\n*   删除\
    \ MongoDB 中的数据\n\n### 设置环境\n\n我们需要下载并安装以下软件。\n\n1.  从`www.mongodb.org/downloads`下载\
    \ MongoDB 3.0.5 二进制发行版`mongodb-win32-x86_64-3.0.5-signed.msi`。本章使用 Windows 64\
    \ 位稳定版（3.0.5）。\n2.  从`www.eclipse.org/downloads`下载 Eclipse IDE for Java EE Developers。\n\
    3.  从`www.oracle.com/technetwork/java/javase/downloads/index.html`下载 Java 5 或更高版本（本章使用\
    \ Java 7）。\n\n双击 MongoDB 二进制发行版进行安装。将 MongoDB 安装目录下的`bin`文件夹（`C:\\Program Files\\\
    MongoDB\\Server\\3.0\\bin`）添加到`PATH`环境变量中。为 MongoDB 数据创建一个目录`C:\\data\\db`。使用以下命令启动\
    \ MongoDB 服务器。\n\n```\n>mongod\n```\n\nMongoDB 服务器启动，如图 1-1 所示。\n\n![9781484215999_Fig01-01.jpg](img/image00405.jpeg)\n\
    \n图 1-1. 启动 MongoDB\n\n### 创建 Maven 项目\n\n为了从 Java 应用程序访问 MongoDB，我们需要在 Eclipse\
    \ IDE 中创建一个 Maven 项目并添加所需的依赖项。\n\n1.  选择文件 ![image](img/image00406.jpeg) 新建 ![image](img/image00406.jpeg)\
    \ 其他。在“新建”窗口中，选择 Maven ![image](img/image00406.jpeg) Maven 项目向导，然后单击下一步，如图 1-2\
    \ 所示。\n\n![9781484215999_Fig01-02.jpg](img/image00407.jpeg)\n\n图 1-2. 选择 Maven\
    \ ![image](img/image00406.jpeg) Maven 项目\n\n2.  在“新建 Maven 项目”向导中，选中“创建简单项目”和“使用默认工作空间位置”复选框，如图\
    \ 1-3 所示。单击下一步。\n\n![9781484215999_Fig01-03.jpg](img/image00408.jpeg)\n\n图 1-3.\
    \ 新建 Maven 项目向导\n\n3.  接下来，配置项目，指定以下值，如图 1-4 所示，然后单击完成：\n\n*   Group Id: `mongodb.java`\n\
    \    *   Artifact Id: `MongoDBJava`\n    *   Version: 1.0.0\n    *   Packaging:\
    \ jar\n    *   Name: `MongoDBJava`\n\n![9781484215999_Fig01-04.jpg](img/image00409.jpeg)\n\
    \n图 1-4. 配置 Maven 项目\n"
- fmt: "# 创建和配置 Maven 项目\n\n一个新的 Maven 项目被创建，如[图 1-5](#part0007.xhtml#Fig5)所示。\n\n\
    ![9781484215999_Fig01-05.jpg](Images/image00410.jpeg)\n\n[图 1-5](#part0007.xhtml#_Fig5).\
    \ Maven Project MongoDBJava\n\n4.  我们需要向 Maven 项目添加一些 Java 类，以便在 MongoDB 服务器上运行\
    \ CRUD 操作。选择 File ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg)\
    \ Other，然后在 New 窗口中，选择 Java ![image](Images/image00406.jpeg) Class，如[图 1-6](#part0007.xhtml#Fig6)所示。\n\
    \n![9781484215999_Fig01-06.jpg](Images/image00411.jpeg)\n\n[图 1-6](#part0007.xhtml#_Fig6).\
    \ 选择 Java ![image](Images/image00406.jpeg) Class\n\n5.  在 New Java Class 向导中，Source\
    \ folder 预先选定为`MongoDBJava/src/main/java`。指定 Package 名称（`mongodb`）。指定一个 class\
    \ Name（例如，用于连接 MongoDB 并获取数据的应用程序类`MongoDBClient`）。勾选`public static void main\
    \ (String[] args)`方法存根以创建类，然后单击 Finish，如[图 1-7](#part0007.xhtml#Fig7)所示。\n\n![9781484215999_Fig01-07.jpg](Images/image00412.jpeg)\n\
    \n[图 1-7](#part0007.xhtml#_Fig7). 创建一个新类\n\n6.  `MongoDBClient`类在`MongoDBJava`项目中被创建。类似地，将[表\
    \ 1-1](#part0007.xhtml#Tab1)中列出的 Java 类添加到与`MongoDBClient`类相同的包中：`mongodb`包。\n\
    \n[表 1-1](#part0007.xhtml#_Tab1). Java 类\n\n| 类 | 描述 |\n| --- | --- |\n| `Catalog`\
    \ | 模型类，用于定义要添加到 MongoDB 服务器的记录的属性和访问方法。 |\n| `CreateMongoDBDocument` | 创建 MongoDB\
    \ 文档的类。 |\n| `CreateMongoDBDocumentModel` | 使用模型类 catalog 创建 MongoDB 文档的类。 |\n\
    | `UpdateDBDocument` | 更新文档的类。 |\n| `DeleteDBDocument` | 删除文档的类。 |\n\nMaven 项目中的\
    \ Java 类在 Package Explorer 中如[图 1-8](#part0007.xhtml#Fig8)所示。\n\n![9781484215999_Fig01-08.jpg](Images/image00413.jpeg)\n\
    \n[图 1-8](#part0007.xhtml#_Fig8). Java 类\n\n7.  接下来，通过向`pom.xml`配置文件添加所需的依赖项来配置\
    \ Maven 项目。将 Java MongoDB Driver 依赖项添加到`pom.xml`。`pom.xml`内容如下所示。单击 File ![image](Images/image00406.jpeg)\
    \ Save All 保存`pom.xml`。\n\n```xml\n    <project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n        xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n        <modelVersion>4.0.0</modelVersion>\n        <groupId>mongodb.java</groupId>\n\
    \        <artifactId>MongoDBJava</artifactId>\n        <version>1.0.0</version>\n\
    \        <name>MongoDBJava</name>\n        <dependencies>\n            <dependency>\n\
    \                <groupId>org.mongodb</groupId>\n                <artifactId>mongo-java-driver</artifactId>\n\
    \                <version>3.0.3</version>\n            </dependency>\n       \
    \ </dependencies>\n    </project>\n```\n\n8.  在 Package Explorer 中右键单击项目节点，然后选择\
    \ Project Properties。在 Properties 中选择 Java Build Path。选择 Libraries 选项卡并单击 Maven\
    \ Dependencies 以展开节点。MongoDB Java 驱动程序应列在 Java Build Path 中，如[图 1-9](#part0007.xhtml#Fig9)所示。单击\
    \ OK。\n\n![9781484215999_Fig01-09.jpg](Images/image00414.jpeg)\n\n[图 1-9](#part0007.xhtml#_Fig9).\
    \ Java 构建路径中的 Mongo Java 驱动程序\n\n在`pom.xml`中配置了 Mongo Java 驱动程序依赖项的 Maven 项目如[图\
    \ 1-10](#part0007.xhtml#Fig10)所示。`MongoDBJava` Maven 项目的目录结构显示在 Package Explorer\
    \ 中。\n\n![9781484215999_Fig01-10.jpg](Images/image00415.jpeg)\n\n[图 1-10](#part0007.xhtml#_Fig10).\
    \ 配置了 Mongo Java 驱动程序依赖项的 Maven 项目\n\n# 创建 BSON 文档\n\n在本节中，我们将向 MongoDB 服务器添加一个\
    \ BSON（二进制 JSON）文档。我们将使用 Eclipse IDE 中的`CreateMongoDBDocument.java`应用程序。MongoDB\
    \ 文档由`org.bson.Document`类表示。MongoDB 将数据存储在集合中。MongoDB Java 驱动程序中用于 MongoDB 类的主要包是`com.mongodb`和`com.mongodb.client`。用于连接到\
    \ MongoDB 服务器的 MongoDB 客户端由`com.mongodb.MongoClient`类表示。一个`MongoClient`对象提供连接池，并且整个应用程序只需要一个实例。`MongoClient`类提供了几个构造函数，其中一些在[表\
    \ 1-2](#part0007.xhtml#Tab2)中列出。\n\n[表 1-2](#part0007.xhtml#_Tab2). MongoClient\
    \ 类构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `MongoClient()` | 基于单个 MongoDB 节点（localhost\
    \ 和默认端口 27017）创建一个实例。 |\n| `MongoClient(String host)` | 基于单个 MongoDB 节点创建实例，主机指定为\
    \ host[:port] 字符串。 |\n| `MongoClient(String host, int port)` | 使用指定的主机和端口基于单个\
    \ MongoDB 节点创建实例。 |\n| `MongoClient(List<ServerAddress> seeds)` | 使用 MongoDB 服务器列表创建实例以进行选择。选择\
    \ ping 时间最短的服务器。如果 ping 时间最短的服务器宕机，则选择列表中的下一个。 |\n| `MongoClient(List<ServerAddress>\
    \ seeds, List<MongoCredential> credentialsList)` | 与上一个版本相同，但提供凭据列表以验证到服务器的连接。\
    \ |\n| `MongoClient(List<ServerAddress> seeds, List<MongoCredential> credentialsList,\
    \ MongoClientOptions options)` | 与上一个版本相同，但也提供了 Mongo 客户端选项。 |\n\n1.  使用`MongoClient(List<ServerAddress>\
    \ seeds)`构造函数创建一个`MongoClient`实例。提供“localhost”或主机的 IPv4 地址，端口为 27017。\n\n```java\n\
    MongoClient mongoClient = new MongoClient(Arrays.asList(new ServerAddress(\"localhost\"\
    , 27017)));\n```\n\n2.  当创建多个`MongoClient`实例时，所有资源使用限制都适用于每个`MongoClient`实例。要关闭实例，需要调用`MongoClient.close()`来清理资源。MongoDB\
    \ 中的逻辑数据库由`com.mongodb.client.MongoDatabase`接口表示。使用`MongoClient`类中的`getDatabase(String\
    \ databaseName)`方法获取“local”数据库的`com.mongodb.client.MongoDatabase`实例，这是一个默认的 MongoDB\
    \ 数据库实例。\n\n```java\nMongoDatabase db = mongoClient.getDatabase(\"local\");\n\
    ```\n\n3.  一些 Mongo 客户端 API 在 3.0.x 版本中已被修改。例如，在 3.0.x 中，数据库实例由`MongoDatabase`表示，而不是`com.mongodb.DB`。`MongoClient`中返回`DB`实例的`getDB(String\
    \ dbName)`方法已被弃用。在 3.0.x 中，数据库集合由`com.mongodb.client.MongoCollection<TDocument>`表示，而不是`com.mongodb.DBCollection`。使用`MongoDatabase`中的`listCollectionNames()`方法获取数据库中的所有集合名称。\n\
    \n```java\nMongoIterable<String> colls = db.listCollectionNames();\n```\n\n4.\
    \  `listCollectionNames()`方法返回一个`MongoIterable<String>`的集合。迭代该集合以输出集合名称。\n\n```java\n\
    for (String s : colls) {\n    System.out.println(s);\n}\n```\n\n5.  接下来，使用`MongoDatabase`中的`getCollection(String\
    \ collectionName)`方法创建一个新的`MongoCollection<Document>`实例。创建一个名为`catalog`的`Document`实例集合。当调用`getCollection(String)`方法时，会隐式创建集合。\n\
    \n```java\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n```"
