    11-13](#part0017.xhtml#_Fig13). Running Mongo Shell Commands           3.  Shut
    down the server.                    ```     >db.shutdownServer()     ```           4.  Start
    the MongoDB server and log in to the shell as the administrative user `hive` with
    the following command.                    ```     mongo --port 27017 -u hive -p
    hive --authenticationDatabase admin     ```           5.  The MongoDB shell connects
