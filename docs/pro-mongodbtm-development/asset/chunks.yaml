    \ 查找文档子集**\n\n### 使用游标\n`find()` 方法并不直接返回文档，而是返回结果集上的一个 `Cursor`。\n\n`Cursor`\
    \ 类提供了几种方法来获取有关文档的更多信息，例如迭代文档、计算文档数量以及查找结果集中的下一个文档。一些 `Cursor` 类方法列在 [表 5-17](#part0011.xhtml#Tab17)\
    \ 中。\n\n**[表 5-17](#part0011.xhtml#_Tab17). 部分游标类方法**\n\n| 方法 | 描述 |\n| :--- |\
    \ :--- |\n| `rewind()` | 倒回游标并返回游标。可以再次迭代游标以获取文档。 |\n| `toArray(callback)` | 返回一个文档数组。如果游标之前已被访问过，结果仅包含部分文档，即尚未迭代过的文档。对于先前访问过的游标，必须调用\
    \ `rewind()` 方法才能获取所有文档。 |\n| `each(callback)` | 迭代文档。如果游标之前已被访问过，则不会迭代所有文档，只会迭代尚未迭代过的文档。对于先前访问过的游标，必须调用\
    \ `rewind()` 方法才能迭代所有文档。 |\n| `count(applySkipLimit, options, callback)` | 返回游标中的文档数量。布尔值\
    \ `applySkipLimit` 可设置为 `true` 以应用游标上设置的 `skip` 和 `limit`。 |\n| `sort(keyOrList,\
    \ direction)` | 对文档进行排序并返回排序结果集上的游标。 |\n| `limit(value)` | 限制结果集中的文档数量，并返回限制结果集上的新游标。\
    \ |\n| `skip(value)` | 跳过结果集中指定数量的文档，并返回结果集上的新游标。 |\n| `batchSize(value)` | 设置批处理大小并返回新游标。\
    \ |\n| `nextObject(callback)` | 从游标获取下一个文档。 |\n| `close(callback)` | 关闭游标。 |\n\
    \n1.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个脚本 `findWithCursor.js`。\n\
