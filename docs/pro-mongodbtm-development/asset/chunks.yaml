    \ `'Connected with MongoDB'`。\n\n    ```\n    mongoclient.connect(\"mongodb://localhost:27017/local\"\
    , function(error, db) {\n         if (error)\n             console.log(error);\n\
    \         else\n             console.log('Connected with MongoDB');\n      });\n\
    \    ```\n\n    我们将使用 `listCollections(filter, options)` 方法列出本地数据库中的集合。`listCollections(filter,\
    \ options)` 可以选择性地指定一个过滤器，例如，过滤器 `{name: \"collection1\"}` 仅获取 `collection1` 集合。`listCollections()`\
    \ 唯一支持的选项是 `batchSize`。`listCollections()` 方法返回一个 `CommandCursor`，它提供了几种方法，包括用于返回文档数组的\
