    the script with the command `node bulkWriteDocuments.js`. The output is shown
    in [Figure 5-40](#part0011.xhtml#Fig40).          ![9781484215999_Fig05-40.jpg](Images/image00589.jpeg)                    [Figure
    5-40](#part0011.xhtml#_Fig40). Running the bulkWriteDocuments.js Script           5.  Subsequently
    run the `db.catalog.find()` command in Mongo shell to list the documents as shown
    in [Figure 5-41](#part0011.xhtml#Fig41).          ![9781484215999_Fig05-41.jpg](Images/image00590.jpeg)                    [Figure
    5-41](#part0011.xhtml#_Fig41). Listing Documents              As shown in the
    output only four documents are listed because four were added initially and one
    was deleted and subsequently a document was upserted. One of the documents has
    `journal` set to `OracleMagazine` because `updateOne` was used to update the `journal`
    field of one document. The `catalog5 catalogId` document is the document upserted
    with `replaceOne`.    Summary    In this chapter we used the Node.js driver for
    MongoDB to connect to MongoDB server and perform CRUD (create, read, update, and
    delete) operations. We demonstrated the CRUD operations for single and multiple
    documents. In the next chapter we shall migrate a document from Apache Cassandra
    to MongoDB.    CHAPTER 6    ![image](Images/image00404.jpeg)    Migrating an Apache
    Cassandra Table to MongoDB    While MongoDB is the most commonly used document-based
    NoSQL datastore, Apache Cassandra is the most commonly used wide column-based
    NoSQL datastore. The data models used in MongoDB and Apache Cassandra are different.
    MongoDB is based on a JSON (BSON) data model while Cassandra is based on a column/row
    (table) data model. Both provide a schema-less, flexible storage model. In this
    chapter we shall discuss migrating Apache Cassandra documents to MongoDB. This
    chapter includes the following topics:    *   Setting Up the Environment *   Creating
    a Maven Project in Eclipse *   Creating a Document in Apache Cassandra *   Migrating
    the Cassandra Table to MongoDB    Setting Up the Environment    We need to install
    the following software for this chapter:    *   Apache Cassandra 2.2.0 `apache-cassandra-2.2.0-bin.tar.


    gz` from `http://cassandra.apache.org/download/`. Extract `tar.gz` file to a directory
    and add the `bin` directory, for example, the `C:\apache-cassandra-2.2.0\bin`
    directory to the `PATH` variable. *   MongoDB 3.0.5 from `www.mongodb.org/downloads`.
    *   Eclipse IDE for Java EE Developers from`www.eclipse.org/downloads/`. *   Java
    7 from `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`.    Double-click
    on the MongoDB binary distribution to install MongoDB. Add the `bin` directory
    (`C:\Program Files\MongoDB\Server\3.0\bin`) of the MongoDB installation to the
    `PATH` environment. Create a directory `C:\data\db` for the MongoDB data if not
    already created for an earlier chapter.    Start Apache Cassandra server with
    the following command.    ``` >cassandra –f ```    The server gets started as
    shown in the server output in [Figure 6-1](#part0012.xhtml#Fig1). If the thrift
    service does not get started, run the command `nodetool enablethrift`. The Cassandra
    server is listening for clients on `localhost` on port 9160.    ![9781484215999_Fig06-01.jpg](Images/image00591.jpeg)    [Figure
    6-1](#part0012.xhtml#_Fig1). Starting Apache Cassandra    Start the MongoDB server
    with the following command.    ``` >mongod ```    The MongoDB server gets started
    as shown in [Figure 6-2](#part0012.xhtml#Fig2). The MongoDB is waiting for connections
    on `localhost` on port 27017.    ![9781484215999_Fig06-02.jpg](Images/image00592.jpeg)    [Figure
    6-2](#part0012.xhtml#_Fig2). Starting MongoDB Server    Creating a Maven Project
    in Eclipse    Next, create a Java project in Eclipse IDE for migrating Cassandra
    database data to MongoDB database.    1.  Select File ![image](Images/image00406.jpeg)
    New ![image](Images/image00406.jpeg) Other. 2.  In the New window, select Maven
    ![image](Images/image00406.jpeg) Maven Project and click on Next as shown in [Figure
    6-3](#part0012.xhtml#Fig3).          ![9781484215999_Fig06-03.jpg](Images/image00593.jpeg)                    [Figure
    6-3](#part0012.xhtml#_Fig3). Selecting Maven ![image](Images/image00406.jpeg)
    Maven Project           3.  The New Maven Project wizard gets started. Select
    the Create a simple project check box and the Use default Workspace location check
    box and click on Next as shown in [Figure 6-4](#part0012.xhtml#Fig4).          ![9781484215999_Fig06-04.jpg](Images/image00594.jpeg)                    [Figure
    6-4](#part0012.xhtml#_Fig4). New Maven Project Wizard           4.  In Configure
    project, specify the following and then click on Finish as shown in [Figure 6-5](#part0012.xhtml#Fig5).     *   Group
    Id: `com.mongodb.migration`     *   Artifact Id: `CassandraToMongoDB`     *   Version:
    1.0.0     *   Packaging: jar     *   Name: `CassandraToMongoDB`                  ![9781484215999_Fig06-05.jpg](Images/image00595.jpeg)                                    [Figure
    6-5](#part0012.xhtml#_Fig5). Configuring Maven Project                      A
    Maven Project gets created in Eclipse IDE as shown in [Figure 6-6](#part0012.xhtml#Fig6).    ![9781484215999_Fig06-06.jpg](Images/image00596.jpeg)    [Figure
    6-6](#part0012.xhtml#_Fig6). Maven Project CassandraToMongoDB in Package Explorer    Now
    we need to create two Java classes for the migration: one to create the initial
    data in Cassandra and the other to migrate the data to MongoDB.    1.  To create
    a Java class click on File ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg)
    Other. 2.  In the New window, select Java ![image](Images/image00406.jpeg) Class
    and click on Next as shown in [Figure 6-7](#part0012.xhtml#Fig7).          ![9781484215999_Fig06-07.jpg](Images/image00597.jpeg)                    [Figure
    6-7](#part0012.xhtml#_Fig7). Selecting Java ![image](Images/image00406.jpeg) Java
    Class           3.  In New Java Class wizard select the Source folder as `CassandraToMongoDB/src/main/java`
    and specify Package as `mongodb` and class name as `CreateCassandraDatabase`.'
  trans: "\n# 第六章 将 Apache Cassandra 表迁移到 MongoDB\n\n虽然 MongoDB 是最常用的基于文档的 NoSQL 存储，但\
    \ Apache Cassandra 是最常用的基于宽列的 NoSQL 存储。MongoDB 和 Apache Cassandra 使用的数据模型不同。MongoDB\
    \ 基于 JSON（BSON）数据模型，而 Cassandra 基于列/行（表）数据模型。两者都提供了无模式、灵活的存储模型。在本章中，我们将讨论将 Apache\
    \ Cassandra 文档迁移到 MongoDB。本章包括以下主题：\n\n*   设置环境\n*   在 Eclipse 中创建 Maven 项目\n\
    *   在 Apache Cassandra 中创建文档\n*   将 Cassandra 表迁移到 MongoDB\n\n## 设置环境\n\n我们需要为本章安装以下软件：\n\
    \n*   Apache Cassandra 2.2.0：从 `http://cassandra.apache.org/download/` 获取 `apache-cassandra-2.2.0-bin.tar.gz`。将\
    \ `tar.gz` 文件解压到一个目录，并将 `bin` 目录（例如 `C:\\apache-cassandra-2.2.0\\bin`）添加到 `PATH`\
    \ 环境变量中。\n*   MongoDB 3.0.5：从 `www.mongodb.org/downloads` 获取。\n*   Eclipse IDE\
    \ for Java EE Developers：从 `www.eclipse.org/downloads/` 获取。\n*   Java 7：从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
    \ 获取。\n\n双击 MongoDB 二进制发行版以安装 MongoDB。将 MongoDB 安装的 `bin` 目录（`C:\\Program Files\\\
    MongoDB\\Server\\3.0\\bin`）添加到 `PATH` 环境变量中。如果尚未为前面的章节创建，请创建目录 `C:\\data\\db`\
    \ 用于存放 MongoDB 数据。\n\n使用以下命令启动 Apache Cassandra 服务器。\n```\n>cassandra –f\n```\n\
    服务器启动，如 图 6-1 的服务器输出所示。如果 thrift 服务未启动，请运行命令 `nodetool enablethrift`。Cassandra\
    \ 服务器正在 `localhost` 端口 9160 上监听客户端连接。\n\n![9781484215999_Fig06-01.jpg](img/image00591.jpeg)\n\
    图 6-1. 启动 Apache Cassandra\n\n使用以下命令启动 MongoDB 服务器。\n```\n>mongod\n```\nMongoDB\
    \ 服务器启动，如 图 6-2 所示。MongoDB 正在 `localhost` 端口 27017 上等待连接。\n\n![9781484215999_Fig06-02.jpg](img/image00592.jpeg)\n\
    图 6-2. 启动 MongoDB 服务器\n\n## 在 Eclipse 中创建 Maven 项目\n\n接下来，在 Eclipse IDE 中创建一个\
    \ Java 项目，用于将 Cassandra 数据库数据迁移到 MongoDB 数据库。\n\n1.  选择 File ![image](img/image00406.jpeg)\
    \ New ![image](img/image00406.jpeg) Other。\n2.  在 New 窗口中，选择 Maven ![image](img/image00406.jpeg)\
    \ Maven Project 并点击 Next，如 图 6-3 所示。\n\n![9781484215999_Fig06-03.jpg](img/image00593.jpeg)\n\
    图 6-3. 选择 Maven ![image](img/image00406.jpeg) Maven Project\n\n3.  New Maven Project\
    \ 向导启动。选择 Create a simple project 复选框和 Use default Workspace location 复选框，然后点击\
