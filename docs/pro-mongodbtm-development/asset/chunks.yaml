    **图 5-17** 运行 collection.js 脚本后本地数据库中的集合列表\n\n## 使用文档\n\n在以下小节中，我们将添加文档、批量添加文档、查询文档、更新文档、删除文档以及对文档执行批量操作。\n\
    \n### 添加单个文档\n\n在本节中，我们将向 MongoDB 集合添加一个文档。\n\n1.  首先，在 Mongo shell 中的 `local`\
