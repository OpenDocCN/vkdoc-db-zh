    );\nprint 'List Open Connections: <br/>';\nvar_dump($connection->getConnections());\n\
    print '<br/>';\n$connection->close(true);\nprint 'List Open Connections: <br/>';\n\
    var_dump($connection->getConnections());\n?>\n```\n\nRun the PHP script in the\
    \ browser using the URL `http://localhost:8000/mongoconnection.php`. The output\
    \ from the `mongoconnection.php` script is shown in [Figure 3-6](#part0009.xhtml#Fig6).\n\
    \n![9781484215999_Fig03-06.jpg](Images/image00483.jpeg)\n\n[Figure 3-6](#part0009.xhtml#_Fig6).\
    \ Output from the mongoconnection.php Script\n\n# Getting Database Info\n\nThe\
    \ `MongoDB` class represents a database. The class instance may be obtained using\
    \ the `selectDB()` method in `MongoClient` or by direct indirection of a database\
    \ name. Create a PHP script `db.php` in the `C:\\php` directory. Get a `MongoDB`\
    \ instance for the `test` database as follows.\n\n```\n$connection = new MongoClient();\n\
    $db = $connection->test;\n```\n\nAlternatively, the `selectDB()` method may be\
    \ used. For example, the following `MongoDB` instance represents the database\
    \ `local`.\n\n```\n$db=$connection->selectDB(\"local\");\n```\n\nThe `selectDB()`\
    \ method throws the `MongoConnectionException`, which must be handled in a `try`-`catch`\
    \ statement. The `getCollectionNames(boolean)` method in `MongoDB` gets all the\
    \ connection names in a database. To get the system collections also invoke the\
    \ method with arg `true`.\n\n```\n$collections=$db->getCollectionNames(true);\n\
    ```\n\nThe collection names may be output as follows.\n\n```\nvar_dump($collections);\n\
    ```\n\nThe `db.php` script is listed. `MongoDB` class does not explicitly appear\
    \ in the `db.php` script because the return value is assigned to a variable.\n\
    \n```\n<?php\ntry\n{\n$connection = new MongoClient();\n\n$db = $connection->test;\n\
    print 'Datbase: ';\nvar_dump($db);\nprint '<br/>';\n$db=$connection->selectDB(\"\
    local\");\n$collections=$db->getCollectionNames(true);\nprint 'Collections: ';\n\
    var_dump($collections);\nprint '<br/>';\n}catch ( MongoConnectionException $e\
    \ )\n{\n    echo '<p>Couldn\\'t connect to mongodb, is the \"mongo\" process running?</p>';\n\
    \    exit();\n}\n?>\n```\n\nRun the PHP script in a browser with the URL `http://localhost:8000/db.php`.\
    \ The collection names listed for the local database include `system.indexes`\
    \ and `catalog` as shown in [Figure 3-7](#part0009.xhtml#Fig7). The collections\
    \ listed could be different for different users.\n\n![9781484215999_Fig03-07.jpg](Images/image00484.jpeg)\n\
    \n[Figure 3-7](#part0009.xhtml#_Fig7). Output from the db.php Script\n\n# Using\
    \ Collections\n\nIn subsequent subsections we shall discuss getting a collection\
    \ and dropping a collection using the PHP MongoDB Driver.\n\n## Getting a Collection\n\
    \nIn this section we shall create a collection in a MongoDB database instance.\
    \ Create a PHP script `collection.php` in the `C:\\php` directory. The `MongoCollection`\
    \ class represents a collection. The syntax to get a collection from a connection\
    \ instance is the same as for getting a database. For example first get the database\
    \ instance `local` and subsequently get the collection `catalog` from the database\
    \ instance as follows.\n\n```\n$connection = new MongoClient();\n$db=$connection->local;\n\
    $collection=$db->catalog;\n```\n\nThe collection info and collection name may\
    \ be output as follows.\n\n```\nvar_dump($collection);\nvar_dump($collection->getName());\n\
    ```\n\nA collection may also be gotten directly as follows.\n\n```\n$collection=$connection->local->mongo;\n\
    ```\n\nThe `MongoDB::createCollection()` may also be used to create a `MongoCollection`\
    \ instance. The `createCollection()` method has the following syntax.\n\n```\n\
    $db->createCollection(\n    \"create\" => $name,\n    \"capped\" => $options[\"\
    capped\"],\n    \"size\" => $options[\"size\"],\n    \"max\" => $options[\"max\"\
    ],\n    \"autoIndexId\" => $options[\"autoIndexId\"],\n));\n```\n\nThe parameters\
    \ and options in the `createCollection()` method are as follows in [Table 3-4](#part0009.xhtml#Tab4).\n\
    \n[Table 3-4](#part0009.xhtml#_Tab4). Parameters and Options in createCollection\
    \ Method\n\n| Parameter/Option | Description |\n| --- | --- |\n| `create` | The\
    \ name of the collection. |\n| `capped` | Option to indicate if the collection\
    \ is capped or fixed size. |\n| `size` | Option to indicate the fixed size of\
    \ a capped collection in bytes. |\n| `max` | Option to indicate the maximum number\
    \ of documents in a capped collection. |\n| `autoIndexId` | Automatic indexing\
    \ is true by default for MongoDB 2.2 and later. For pre-2.2 auto indexing is false\
    \ by default. For capped collections `autoIndexId` may be set to false. |\n\n\
    For example, create a capped collection called `catalog` with fixed size of 1\
    \ MB, and maximum number of documents as 10.\n\n```\n$coll = $db->createCollection(\n\
    \    \"catalog\",\n    array(\n        'capped' => true,\n        'size' => 1*1024,\n\
    \        'max' => 10\n    )\n);\n```\n\nThe `collection.php` script is listed\
    \ below.\n\n```\n<?php\ntry\n{\n$connection = new MongoClient();\n$db=$connection->local;\n\
    $collection=$db->catalog;\nvar_dump($collection);\nprint '<br/>';\nprint 'Collection\
    \ Name: ';\nvar_dump($collection->getName());\nprint '<br/>';\n$collection=$connection->local->mongo;\n\
    print 'Collection Name: ';\nvar_dump($collection->getName());\n\n}catch ( MongoConnectionException\
    \ $e ) \n{\n    echo '<p>Couldn\\'t connect to mongodb, is the \"mongo\" process\
    \ running?</p>';\n    exit();\n}\n$collection->drop();\n\n$coll = $db->createCollection(\n\
    \    \"catalog\",\n    array(\n        'capped' => true,\n        'size' => 1*1024,\n\
    \        'max' => 10\n    )\n);\nprint '<br/>';\nvar_dump($coll);\nprint '<br/>';\n\
    print 'Collection Name: ';\nvar_dump($coll->getName());\n\n?>\n```"
