    A complete reference of the database commands is available at `http://docs.mongodb.org/v3.0/reference/command/`,
    and a complete reference of Mongo shell helper methods is available at `http://docs.mongodb.org/v3.0/reference/method/`.


    JavaScript methods may also be run using a JavaScript file. For example, copy
    the following JavaScript to a file `connection.js` in the directory `C:\MongoDB`
    from which the command is to be run.


    ```

    connection = new Mongo();

    db = connection.getDB("test");

    printjson(db.getCollectionNames());

    ```


    From the command line run the JavaScript file with the following command.


    ```

    >mongo connection.js

    ```


    The JavaScript gets evaluated and the output gets generated, which is a listing
    of collection names for the example JavaScript as shown in [Figure 2-8](#part0008.xhtml#Fig8).


    ![9781484215999_Fig02-08.jpg](Images/image00432.jpeg)


    [Figure 2-8](#part0008.xhtml#_Fig8). Running a JavaScript Script


    The Mongo shell also provides some help methods to get information about the databases,
    collections, and documents. Some of the help methods are listed in following table,
    [Table 2-1](#part0008.xhtml#Tab1).


    [Table 2-1](#part0008.xhtml#_Tab1). Help Methods


    | Help Command | Description |

    | --- | --- |

    | `show dbs` | Lists the databases on the server. |

    | `use <db>` | Selects a database. A database must be selected before any operation
    on a collection or a document may be performed. |

    | `show collections` | Lists all the collections in a database. |


    Using Databases


    In the following subsections we shall discuss getting information about a database,
    creating a database, and dropping a database.


    Getting Databases Information


    The Mongo shell has a variable called `db`, which references the current database.
    By default when the Mongo shell is started using the `mongo` command the `test`
    database becomes the current database as discussed in an earlier section. The
    `show dbs` command lists all the databases on the server. The `db.stats()` Mongo
    shell helper method lists the stats on the current database. The `listDatabases`
    command lists all the databases including the total size and size for each database
    and if the database is empty. Some commands – the administrative commands – such
    as the `listDatabases` command must be run on the `admin` database.


    ```

    >show dbs

    >db.stats()

    >use admin

    >db.runCommand({listDatabases : 1})

    ```


    The output from the preceding commands gets displayed in the Mongo shell as shown
    in [Figure 2-9](#part0008.xhtml#Fig9).


    ![9781484215999_Fig02-09.jpg](Images/image00433.jpeg)


    [Figure 2-9](#part0008.xhtml#_Fig9). Getting Databases Information


    Creating a Database Instance


    A MongoDB database instance is created implicitly when a command is sent to the
    database instance and an operation is performed such as creating a collection.
    The `use <db>` command may be used to select the current database even if the
    database does not already exist, but the `use <db>` command does not create a
    nonexistent database. To create the database an operation must be run on the database.
    For example, list all databases with the `show dbs` command. Subsequently select
    the current database as a nonexistent database `mongodb` using the `use mongodb`
    command. And subsequently create a collection called `catalog` using the `db.createCollection
    (name,options)` helper method.


    ```

    >show dbs

    >use mongodb

    >show dbs

    >db.createCollection("catalog")

    >show dbs

    ```


    If the `show dbs` command is run after the `use mongodb` command the `mongodb`
    database does not get listed, but if the `show dbs` command is run after the `db.createCollection()`
    command the `mongodb` database gets listed as shown in [Figure 2-10](#part0008.xhtml#Fig10).


    ![9781484215999_Fig02-10.jpg](Images/image00434.jpeg)


    [Figure 2-10](#part0008.xhtml#_Fig10). Creating a Database Instance


    The `db.copyDatabase(fromdb, todb, fromhost, username, password, mechanism)` command
    may be used to copy a database to another database. The target database gets created.
    For example, copy the database `local` to a new database called `catalog`.


    ```

    db.copyDatabase(''local'', ''catalog'')

    ```


    If the `show dbs` command is run before and after the `db.copyDatabase()` command,
    the command run after it lists the `catalog` database as shown in [Figure 2-11](#part0008.xhtml#Fig11).


    ![9781484215999_Fig02-11.jpg](Images/image00435.jpeg)


    [Figure 2-11](#part0008.xhtml#_Fig11). Copying a Database Instance


    Dropping a Database


    To remove the current database use the `db.dropDatabase()` method. The current
    database is the database set with the `use <db>` command. Even after dropping
    a database the current database name is not changed, and if a new collection is
    created, it is created in a database of the same name as the dropped database
    using new data files. For example list all databases using the `show dbs` command.
    Subsequently set the current database as one of the databases listed, for example,
    database `catalog.` The database chosen for deletion could be different and does
    not have to be called `catalog`. Subsequently invoke the `db.dropDatabase()` method
    to drop the current database, which is the database `mongo`. If subsequently the
    `show dbs` command is invoked the `catalog` database does not get listed.


    ```

    >show dbs

    >use catalog

    >db.dropDatabase()

    >show dbs

    ```


    The `db.dropDatabase()` method returns a document with fields “dropped” and “ok.”
    The “dropped” field value is the database dropped, and the “ok” field value of
    1 indicates the method returned without error as shown in [Figure 2-12](#part0008.xhtml#Fig12).


    ![9781484215999_Fig02-12.jpg](Images/image00436.jpeg)


    [Figure 2-12](#part0008.xhtml#_Fig12). Dropping a Database


    To quit the Mongo shell run the `quit()` command or the `exit` command.


    ```

    >quit()

    ```


    The Mongo shell session gets ended as shown in [Figure 2-13](#part0008.xhtml#Fig13).


    ![9781484215999_Fig02-13.jpg](Images/image00437.jpeg)


    [Figure 2-13](#part0008.xhtml#_Fig13). Ending a Mongo Shell Session


    Using Collections


    In the following subsections we shall create a collection and subsequently drop
    a collection from the Mongo shell.


    Creating a Collection


    The `create` command is used to create a collection. We already discussed the
    `create` command to create a collection (see “Running a Command or Method in mongo
    Shell”). The `show collections` command may be used to list the collections in
    a database.


    ```

    >use test

    >show collections

    ```


    The collections in the database get listed as shown in [Figure 2-14](#part0008.xhtml#Fig14).


    ![9781484215999_Fig02-14.jpg](Images/image00438.jpeg)


    [Figure 2-14](#part0008.xhtml#_Fig14). Listing Collections with show collections


    The collections listed could be different for different users but the `system.indexes`
    collection should get listed regardless of the user. A collection gets listed
    only after it has been created. For example, list the collections before and after
    running the `db.createCollection()` method to create a collection `catalog` in
    the test database. If the `catalog` collection has already been created, drop
    the collection with `db.catalog.drop()`


    ```

    >use test

    >db.catalog.drop()

    >show collections

    >db.createCollection("catalog")

    >show collections

    ```


    The `show collections` command runs after the `db.createCollection()` method lists
    the `catalog` collection as shown in [Figure 2-15](#part0008.xhtml#Fig15). The
    other collections listed could be different for different users.


    ![9781484215999_Fig02-15.jpg](Images/image00439.jpeg)


    [Figure 2-15](#part0008.xhtml#_Fig15). Running show collections after Creating
    a Collection'
