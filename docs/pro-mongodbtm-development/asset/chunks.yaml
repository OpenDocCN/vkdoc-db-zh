- fmt: "```markdown\n# Run the `CreateCassandraDatabase` application\n\n运行 `CreateCassandraDatabase`\
    \ 应用程序，向 `catalog` 表添加两行数据。在 Package Explorer 中右键点击 `CreateCassandraDatabase.java`，选择\
    \ **Run As** ![image](Images/image00406.jpeg) **Java Application**，如 [Figure 6-12](#part0012.xhtml#Fig12)\
    \ 所示。\n\n![9781484215999_Fig06-12.jpg](Images/image00602.jpeg)\n\n[Figure 6-12](#part0012.xhtml#_Fig12).\
    \ Running Java Application CreateCassandraDatabase.java\n\nCassandra keyspace\
