    图 6-6. Package Explorer 中的 Maven 项目 CassandraToMongoDB\n\n现在，我们需要为迁移创建两个 Java\
    \ 类：一个用于在 Cassandra 中创建初始数据，另一个用于将数据迁移到 MongoDB。\n\n1.  要创建 Java 类，点击 File ![image](img/image00406.jpeg)\
    \ New ![image](img/image00406.jpeg) Other。\n2.  在 New 窗口中，选择 Java ![image](img/image00406.jpeg)\
    \ Class 并点击 Next，如 图 6-7 所示。\n\n![9781484215999_Fig06-07.jpg](img/image00597.jpeg)\n\
    图 6-7. 选择 Java ![image](img/image00406.jpeg) Java Class\n\n3.  在 New Java Class\
    \ 向导中，选择 Source folder 为 `CassandraToMongoDB/src/main/java`，指定 Package 为 `mongodb`，类名为\
    \ `CreateCassandraDatabase`。\n\n```javascript\nopen(function(error, db) {\n  \
    \  if (error)\n        console.log(error);\n    else {\n        db.createCollection('catalog',\
    \ function(error, collection) {\n            if (error)\n                console.log(error);\n\
    \            else {\n                collection.bulkWrite([\n                \
    \    { insertOne: { document: { \"catalogId\": 'catalog1', \"journal\": 'Oracle\
    \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
    \ 2013', \"title\": 'Engineering as a Service', \"author\": 'David A. Kelly' }\
    \ } },\n                    { insertOne: { document: { \"catalogId\": 'catalog2',\
    \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Quintessential and Collaborative', \"\
    author\": 'Tom Haunert' } } },\n                    { insertOne: { document: {\
    \ \"catalogId\": 'catalog3', \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle\
    \ Publishing', \"edition\": 'November December 2013' } } },\n                \
    \    { insertOne: { document: { \"catalogId\": 'catalog4', \"journal\": 'Oracle\
    \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
    \ 2013' } } },\n                    { updateOne: { filter: { journal: 'Oracle\
    \ Magazine' }, update: { $set: { journal: 'OracleMagazine' } }, upsert: true }\
    \ },\n                    { updateMany: { filter: { edition: 'November December\
    \ 2013' }, update: { $set: { edition: '11-12-2013' } }, upsert: true } },\n  \
    \                  { deleteOne: { filter: { journal: 'Oracle Magazine' } } },\n\
    \                    { replaceOne: { filter: { catalogId: 'catalog5' }, replacement:\
    \ { \"catalogId\": 'catalog5', \"journal\": 'Oracle Magazine', \"publisher\":\
    \ 'Oracle Publishing', \"edition\": 'November December 2013' }, upsert: true }\
    \ }\n                ], { ordered: true, w: 1 }, function(error, result) {\n \
    \                   if (error)\n                        console.log(error);\n\
    \                    else {\n                        console.log(\"Documents added:\
    \ \" + result);\n                    }\n                });\n            }\n \
    \       });\n    }\n});\n```\n\n4.  使用命令 `node bulkWriteDocuments.js` 运行脚本。输出如\
    \ 图 5-40 所示。\n\n![9781484215999_Fig05-40.jpg](img/image00589.jpeg)\n图 5-40. 运行\
    \ bulkWriteDocuments.js 脚本\n\n5.  随后在 Mongo shell 中运行 `db.catalog.find()` 命令以列出文档，如\
    \ 图 5-41 所示。\n\n![9781484215999_Fig05-41.jpg](img/image00590.jpeg)\n图 5-41. 列出文档\n\
    \n如输出所示，只列出了四个文档，因为最初添加了四个，删除了一个，随后更新（upsert）了一个文档。其中一个文档的 `journal` 字段被设置为 `OracleMagazine`，因为使用了\
    \ `updateOne` 来更新一个文档的 `journal` 字段。`catalog5` `catalogId` 文档是使用 `replaceOne`\
    \ 更新（upsert）的文档。\n\n## 总结\n\n在本章中，我们使用 MongoDB 的 Node.js 驱动程序连接到 MongoDB 服务器并执行\
    \ CRUD（创建、读取、更新和删除）操作。我们演示了单文档和多文档的 CRUD 操作。在下一章中，我们将把文档从 Apache Cassandra 迁移到\
    \ MongoDB。\n"
- fmt: "Select the check box to create method stub `public static void main(String[]\
    \ args)`. Click on Finish as shown in [Figure 6-8](#part0012.xhtml#Fig8).\n![9781484215999_Fig06-08.jpg](Images/image00598.jpeg)\n\
    [Figure 6-8](#part0012.xhtml#_Fig8). Configuring Java Class `CreateCassandraDatabase`\n\
    \n4. Similarly create a Java class `MigrateCassandraToMongoDB` as shown in [Figure\
    \ 6-9](#part0012.xhtml#Fig9).\n![9781484215999_Fig06-09.jpg](Images/image00599.jpeg)\n\
    [Figure 6-9](#part0012.xhtml#_Fig9). Configuring Java Class `MigrateCassandraToMongoDB`\n\
    \nThe two Java classes are shown in the Package Explorer in [Figure 6-10](#part0012.xhtml#Fig10).\n\
    ![9781484215999_Fig06-10.jpg](Images/image00600.jpeg)\n[Figure 6-10](#part0012.xhtml#_Fig10).\
    \ Java Classes in Package Explorer\n\n## Adding Dependencies\n\nWe need to add\
    \ some dependencies to the `pom.xml`. Add the following dependencies listed in\
    \ [Table 6-1](#part0012.xhtml#Tab1); some of the dependencies are indicated as\
    \ being included with the Apache Cassandra Project dependency and should not be\
    \ added separately.\n\n[Table 6-1](#part0012.xhtml#_Tab1). Dependencies\n\n| Jar\
    \ | Description |\n| --- | --- |\n| Mongo Java Driver 3.0.3 | The Java Client\
    \ to MongoDB Server. |\n| Apache Cassandra 2.2.0 | Apache Cassandra Project. |\n\
    | Cassandra Driver Core 2.2.0-rc2 | The Datastax Java driver. |\n| Apache Commons\
    \ BeanUtils 1.9.2 | Utility Jar for Java classes developed with the JavaBeans\
    \ pattern. |\n| Apache Commons Collections 3.2.1 | Provides data structures that\
    \ accelerate Java application development. |\n| Apache Commons Lang 3 3.1 | Provides\
    \ extra classes for manipulation of Java core classes. Included with Apache Cassandra\
    \ Project dependency. |\n| Apache Commons Logging 1.2 | An interface for common\
    \ logging implementations. |\n| Guava 16.0.1 | Google’s core libraries used in\
    \ Java-based projects. Included with Apache Cassandra dependency. |\n| Jackson\
    \ Core ASL 1.9.2 | High-performance JSON processor. Included with Apache Cassandra\
    \ Project dependency. |\n| Jackson Mapper ASL 1.9.2 | High-performance data binding\
    \ package built on Jackson JSON processor. Included with Apache Cassandra Project\
    \ dependency. |\n| Metrics Core 3.1.0 | The core library for Metrics. Included\
    \ with Apache Cassandra Project dependency. |\n| Netty 4.0.27 | NIO client server\
    \ framework to develop network applications such as protocol servers and clients.\
    \ Included with Apache Cassandra Project dependency. |\n| Slf4j API 1.7.7 | Simple\
    \ Logging Façade for Java, which serves as an abstraction for various logging\
    \ frameworks. Included with Apache Cassandra Project dependency. |\n\nThe `pom.xml`\
    \ is listed below.\n\n```xml\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.mongodb.migration</groupId>\n\
    \    <artifactId>CassandraToMongoDB</artifactId>\n    <version>1.0.0</version>\n\
    \    <name>CassandraToMongoDB</name>\n\n    <dependencies>\n        <dependency>\n\
    \            <groupId>org.mongodb</groupId>\n            <artifactId>mongo-java-driver</artifactId>\n\
    \            <version>3.0.3</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>com.datastax.cassandra</groupId>\n            <artifactId>cassandra-driver-core</artifactId>\n\
    \            <version>2.2.0-rc2</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>org.apache.cassandra</groupId>\n            <artifactId>cassandra-all</artifactId>\n\
    \            <version>2.2.0</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>commons-beanutils</groupId>\n            <artifactId>commons-beanutils</artifactId>\n\
    \            <version>1.9.2</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>commons-collections</groupId>\n            <artifactId>commons-collections</artifactId>\n\
    \            <version>3.2.1</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>commons-logging</groupId>\n            <artifactId>commons-logging</artifactId>\n\
    \            <version>1.2</version>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\nSome of these dependencies have further dependencies, which\
    \ get added automatically and should not be added separately. To find the required\
    \ Jars that get added from the dependencies, right-click on the project node in\
    \ Package Explorer and select Properties. In Properties select Java Build Path.\
    \ The Jars added to the migration project are shown in [Figure 6-11](#part0012.xhtml#Fig11).\n\
    \n![9781484215999_Fig06-11.jpg](Images/image00601.jpeg)\n[Figure 6-11](#part0012.xhtml#_Fig11).\
    \ Jar Files in the Java Build Path\n\n## Creating a Document in Apache Cassandra\n\
    \nIn this section we shall create the Cassandra table to be migrated to MongoDB.\
    \ A Cassandra table may be created either using the Cassandra-CLI or using a Java\
    \ application with Cassandra Java driver. We shall create a Cassandra table in\
    \ a Java application, the `CreateCassandraDatabase` application.\n\nIn the Java\
    \ application, first we need to connect to Cassandra from the application. We\
    \ shall use the Datastax Java driver to connect to Cassandra. Create an instance\
    \ of `Cluster`, which is the main entry point for the Datastax Java driver. The\
    \ cluster maintains a connection with one of the server nodes to keep information\
    \ on the state and current topology of the cluster. The driver discovers all the\
    \ nodes in the cluster making use of auto-discovery of nodes, which includes new\
    \ nodes that join later. Build a `Cluster.Builder` instance, which is a helper\
    \ class to build `Cluster` instances, using the `static` method `builder()`.\n\
    \n1.  We need to provide the connect address of at least one of the nodes in the\
    \ Cassandra cluster for the Datastax driver to be able to connect with the cluster\
    \ and discover other nodes in the cluster using auto-discovery. Add the address\
    \ of the Cassandra server running on the localhost (127.0.0.1) using the `addContactPoint(String)`\
    \ method of `Cluster.Builder`.\n2.  Next, invoke the `build()` method to build\
    \ the `Cluster` using the configured addresses. The methods may be invoked in\
    \ sequence as we don’t need an instance of the intermediary `Cluster.Builder`.\n\
    \n    ```java\n    cluster = Cluster.builder().addContactPoint(\"127.0.0.1\").build();\n\
    \    ```\n\n3.  Next, create a session on the cluster by invoking the `connect()`\
    \ method. A `Session` instance is used to query the cluster and is represented\
    \ with the `Session` class, which holds multiple connections to the cluster. The\
    \ `Session` instance also provides policies on which node in the cluster to use\
    \ for querying the cluster. The default policy is to use a round robin on all\
    \ the nodes in the cluster. `Session` is also used to handle retries of failed\
    \ queries. `Session` instances are thread-safe and a single instance is sufficient\
    \ for an application if connecting to a single keyspace only. A separate `Session`\
    \ instance is required if connecting to multiple keyspaces.\n\n    ```java\n \
    \   Session session = cluster.connect();\n    ```\n\nThe Cassandra server must\
    \ be running to be able to connect to the server when the application is run,\
    \ and we already started the Cassandra server earlier. If Cassandra server is\
    \ not running, the `com.datastax.driver.core.exceptions.NoHostAvailableException`\
    \ exception is generated when a connection is tried.\n\nThe `Session` class provides\
    \ several methods to prepare and run queries on the server, some of which are\
    \ discussed in [Table 6-2](#part0012.xhtml#Tab2).\n\n[Table 6-2](#part0012.xhtml#_Tab2)."
