    ## 小结


    Couchbase和MongoDB都将文档存储为JSON格式，但MongoDB在文档处理方面具有一些优势。在本章中，我们将一个Couchbase文档迁移到了MongoDB。首先，我们在Eclipse
    IDE中用Java应用程序在Couchbase中创建了一个JSON文档。随后，我们在另一个Java应用程序中将该Couchbase文档迁移到了MongoDB。下一章我们将迁移一个Oracle
    Database表到MongoDB。


    # 第8章


    ![image](Images/image00404.jpeg)


    ## 迁移Oracle数据库


    MongoDB是领先的NoSQL数据库。MongoDB使用BSON（二进制JSON）数据格式存储文档，这是最灵活的数据模型，支持创建数据结构的层次结构。Oracle
    Database则以固定模式的表格格式存储数据。这两种数据库的模型截然不同：MongoDB基于文档存储，而Oracle Database基于由列和行组成的二维矩阵的固定表格格式。在本章中，我们将把一个Oracle
    Database表迁移到MongoDB Server。虽然没有直接从Oracle迁移到MongoDB的迁移工具，但MongoDB提供了一个名为`mongoimport`的导入工具，用于将CSV、TSV或JSON文件中的数据导入到MongoDB数据库中。我们将首先将Oracle
    Database表导出为CSV文件，随后使用`mongoimport`工具将CSV文件数据导入MongoDB Server。本章涵盖以下主题。


    -   `mongoimport`工具概述

    -   环境设置

    -   创建Oracle Database表

    -   将Oracle Database表导出为CSV文件

    -   从CSV文件导入数据到MongoDB

    -   显示MongoDB中的JSON数据


    ## mongoimport工具概述


    `mongoimport`工具用于将数据从文件（CSV、TSV或JSON）传输到MongoDB Server。使用`mongoimport`工具的语法如下。

    ```

    mongoimport <options> <file>

    ```


    `mongoimport`支持的一些选项在[表8-1](#part0014.xhtml#Tab1)中讨论。


    [表8-1](#part0014.xhtml#_Tab1). mongoimport工具支持的选项

    | 选项 | 描述 |

    | --- | --- |

    | `-v , --verbose` | 详细输出选项。多次包含以获取更多详细信息，例如 `-vvv`。 |

    | `--quiet` | 不生成命令输出（数据仍会传输）。 |

    | `-h, --host` | 要连接的MongoDB主机。可包含端口，格式为 `--host host:port`。 |

    | `--port` | 要连接的MongoDB端口。 |

    | `-u, --username` | 认证用户名。 |

    | `-p, --password` | 认证密码。 |

    | `-d, --db` | 要使用的数据库实例。 |

    | `-c, --collection` | 要使用的集合。 |

    | `-f, --fields` | 以逗号分隔的字段名。 |

    | `--file` | 要从中导入的文件。如果未指定，则使用 `stdin`。可以是 `.csv`、`.json` 或 `.tsv` 文件。 |

    | `--headerline` | 使用输入文件中的第一行作为字段列表。 |

    | `--jsonArray` | 输入源是JSON数组。 |

    | `--type` | 要导入的输入格式。值可以是 `json`、`csv` 或 `tsv`。默认为 `json`。 |

    | `--drop` | 在插入文档前删除集合。 |

    | `--ignoreBlanks` | 忽略CSV和TSV中值为空的字段。 |

    | `--maintainInsertionOrder` | 维护插入顺序。 |

    | `--stopOnError` | 在第一次插入/更新错误时停止导入。 |

    | `--upsert` | 插入或更新已存在的对象。 |

    | `--writeConcern` | 写关注选项。 |

    | `--numInsertionWorkers, -j` | 并发运行的插入操作数。 |

    | `--fieldFile` | 包含字段名的文件 - 每行一个。 |


    ## 环境设置


    我们需要为本章下载以下软件。


    -   Oracle Database 12c。从 `www.oracle.com/technetwork/database/enterprise-edition/downloads/index-092322.html`
    下载。

    -   MongoDB Server（版本：3.0.5）。

    -   `mongoimport`工具随MongoDB Server一起安装，对于Windows系统，位于 `C:\Program Files\MongoDB\Server\3.0\bin`
    目录中。


    提醒一下，在安装和配置MongoDB Server时，创建 `c:\data\db` 目录。


    ## 创建Oracle Database表


    首先，使用以下SQL脚本创建一个Oracle Database表 `WLSLOG`。该脚本可以从SQL*Plus运行。

    ```

    CREATE TABLE OE.WLSLOG (ID VARCHAR2(255) PRIMARY KEY, TIME_STAMP VARCHAR2(255),
    CATEGORY VARCHAR2(255), TYPE VARCHAR2(255), SERVERNAME VARCHAR2(255), CODE VARCHAR2(255),
    MSG VARCHAR2(255));

    INSERT INTO OE.WLSLOG (ID, TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG)
    values (''catalog1'',''Apr-8-2014-7:06:16-PM-PDT'',''Notice'',''WebLogicServer'',''AdminServer'',''BEA-000365'',''Server
    state changed to STANDBY'');

    INSERT INTO OE.WLSLOG (ID, TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG)
    values (''catalog2'',''Apr-8-2014-7:06:17-PM-PDT'',''Notice'',''WebLogicServer'',''AdminServer'',''BEA-000365'',''Server
    state changed to STARTING'');

    INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values
    (''catalog3'',''Apr-8-2014-7:06:18-PM-PDT'', ''Notice'', ''WebLogicServer'', ''AdminServer'',
    ''BEA-000365'', ''Server state changed to ADMIN'');

    INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values
    (''catalog4'',''Apr-8-2014-7:06:19-PM-PDT'', ''Notice'', ''WebLogicServer'', ''AdminServer'',
    ''BEA-000365'', ''Server state changed to RESUMING'');

    INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values
    (''catalog5'',''Apr-8-2014-7:06:20-PM-PDT'', ''Notice'', ''WebLogicServer'', ''AdminServer'',
    ''BEA-000361'', ''Started WebLogic AdminServer'');

    INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values
    (''catalog6'',''Apr-8-2014-7:06:21-PM-PDT'', ''Notice'', ''WebLogicServer'', ''AdminServer'',
    ''BEA-000365'', ''Server state changed to RUNNING'');

    INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values
    (''catalog7'',''Apr-8-2014-7:06:22-PM-PDT'', ''Notice'', ''WebLogicServer'', ''AdminServer'',
    ''BEA-000360'', ''Server started in RUNNING mode'');

    ```


    ## 将Oracle Database表导出为CSV文件


    接下来，将Oracle Database表导出为CSV文件。在SQL*Plus中运行以下SQL脚本，从 `OE.WLSLOG` 表中选择数据并导出到 `wlslog.csv`
    文件。

    ```

    set pagesize 0 linesize 500 trimspool on feedback off echo off

    select ID || '','' || TIME_STAMP || '','' || CATEGORY || '','' || TYPE || '',''
    || SERVERNAME || '','' || CODE || '','' || MSG from OE.WLSLOG;

    spool wlslog.csv

    /

    spool off

    ```


    如[图8-1](#part0014.xhtml#Fig1)所示运行SQL脚本，数据将被导出到 `wlslog.csv` 文件。


    ![9781484215999_Fig08-01.jpg](Images/image00630.jpeg)

    [图8-1](#part0014.xhtml#_Fig1). 将Oracle Database表导出为CSV文件


    从导出的输出中移除开头的 `SQL> /` 和结尾的 `SQL> spool off`，然后将其保存为 `wlslog.csv` 文件。需要移除这些首尾行，因为
    `mongoimport`工具的输入应该是一个CSV文件。'
