    export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_MAPRED_HOME::$HIVE_HOME/bin:$MONGO_HOME/bin:$ORACLE_HOME/bin
    ```    We shall use the Hive table created over MongoDB in [Chapter 11](#part0017.xhtml)
    to integrate MongoDB data to Oracle Database. Create the target database table
    in Oracle Database with the following SQL script.    ``` CREATE TABLE OE.wlslog
    (time_stamp VARCHAR2(255), category VARCHAR2(255), type VARCHAR2(255), servername
    VARCHAR2(255), code VARCHAR2(255), msg VARCHAR2(255)); ```    The output from
    the `CREATE TABLE` SQL statement is shown in [Figure 12-1](#part0018.xhtml#Fig1).
    Oracle Database table `OE.WLSLOG` has the same column names as the Hive external
    table from which data is to be loaded.    ![9781484215999_Fig12-01.jpg](Images/image00708.jpeg)    [Figure
    12-1](#part0018.xhtml#_Fig1). Creating Oracle Database Table    As discussed in
    [Chapter 11](#part0017.xhtml), add data to MongoDB datastore in a Java application.
    Create a Hive external table `wlslog` also as discussed in [Chapter 11](#part0017.xhtml).
    Start the Hive remote metastore with the following command.    ``` hive –service
    hiveserver ```    Hive server gets started as shown in [Figure 12-2](#part0018.xhtml#Fig2).    ![9781484215999_Fig12-02.jpg](Images/image00709.jpeg)    [Figure
    12-2](#part0018.xhtml#_Fig2). Starting Hive Server    As we are using Oracle Data
    Integrator (ODI), we need to install ODI, create the repositories, and connect
    to repositories for defining the physical and logical architecture and the models
    and the interface for mapping the source datastore to the target datastore. Oracle
    Data Integrator Studio is launched with the following command.    ``` cd /home/dvohra/dbhome_1/oracledi/client
    sh odi.sh ```    Creating the Physical Architecture    The physical architecture
    consists of the data servers and the physical schemas.'
  trans: "\n# 运行 `CREATE EXTERNAL TABLE` 命令\n\n运行 `CREATE EXTERNAL TABLE` 命令以创建 Hive\
    \ 表 `wlslog`，包含以下内容：\n*   将列设置为 `TIME_STAMP`、`CATEGORY`、`TYPE`、`SERVERNAME`、`CODE`\
    \ 和 `MSG`。\n*   将 `STORED BY` 子句设置为 `'org.yong3.hive.mongo.MongoStorageHandler'`。\n\
    *   在 `WITH SERDEPROPERTIES` 子句中，将 `mongo.column.mapping` 属性设置为 MongoDB 文档集合中的列名。\n\
    *   在 `TBLPROPERTIES` 子句中，设置表 11-2 中所示的属性。\n\n表 11-2. Hive 表的 `TBLPROPERTIES`\
    \ 属性\n\n| 属性 | 值 |\n| --- | --- |\n| `mongo.host` | `10.0.2.15` |\n| `mongo.port`\
    \ | `27017` |\n| `mongo.db` | `test` |\n| `mongo.user` | `hive` |\n| `mongo.passwd`\
    \ | `hive` |\n| `mongo.collection` | `wlslog` |\n\n在 Hive shell 中用于创建 Hive 外部表的命令是\
    \ `wlslog`。\n\n```sql\nhive>CREATE EXTERNAL TABLE wlslog (TIME_STAMP string, CATEGORY\
    \ string, TYPE string, SERVERNAME string, CODE string, MSG string)\n      STORED\
    \ BY 'org.yong3.hive.mongo.MongoStorageHandler'\n      WITH SERDEPROPERTIES (\"\
    mongo.column.mapping\"=\"TIME_STAMP,CATEGORY,TYPE,SERVERNAME,CODE,MSG\")\n   \
    \   TBLPROPERTIES ( \"mongo.host\" = \"10.0.2.15\", \"mongo.port\" = \"27017\"\
    ,\n      \"mongo.db\" = \"test\", \"mongo.user\" = \"hive\", \"mongo.passwd\"\
    \ = \"hive\", \"mongo.collection\" = \"wlslog\" );\n```\n\n该命令的输出表明已创建一个 Hive\
    \ 外部表。\n\n# 10. 运行 `SELECT` 查询\n\n在 `wlslog` 表上运行 `SELECT` 查询，以列出 MongoDB 数据，如图\
    \ 11-16 所示。\n\n![9781484215999_Fig11-16.jpg](img/image00706.jpeg)\n\n图 11-16.\
    \ 创建 Hive 外部表\n\n`show tables` 命令应列出添加的 `wlslog` 表，如图 11-17 所示。\n\n![9781484215999_Fig11-17.jpg](img/image00707.jpeg)\n\
    \n图 11-17. 列出 Hive 表\n\n# 总结\n\n在本章中，我们使用 MongoDB Storage Handler for Hive 在 MongoDB\
    \ 上创建了一个 Hive 外部表。如果数据需要由外部管理（如本章中的 MongoDB 数据库），Hive 外部表是合适的。下一章中，我们将在 Oracle\
    \ Data Integrator 中将 MongoDB 数据集成到 Oracle Database。\n\n# 第 12 章 在 Oracle Data\
    \ Integrator 中将 MongoDB 与 Oracle Database 集成\n\n![image](img/image00404.jpeg)\n\
    \nMongoDB 是一种 BSON（二进制 JSON）格式的 NoSQL 数据库，也是领先的 NoSQL 数据库。Oracle Database 是领先的关系数据库。用例可能是将\
    \ MongoDB 数据加载到 Oracle Database 中。Oracle Loader for Hadoop 不直接支持 MongoDB BSON\
    \ 格式。Oracle Loader for Hadoop 支持从 Hive 加载。可以使用 Hive Storage Handler for MongoDB\
    \ 在 MongoDB 数据存储上定义一个 Hive 外部表。Oracle Data Integrator 通过 IKM File-Hive to Oracle\
    \ 知识模块，自动化了 Oracle Loader for Hadoop 的使用。在本章中，我们将在 Oracle Data Integrator 中将 MongoDB\
    \ 数据加载到 Oracle Database。本章是第 11 章的延续。\n\n本章涵盖以下主题：\n*   设置环境\n*   创建物理架构\n*  \
    \ 创建逻辑架构\n*   创建数据模型\n*   创建集成项目\n*   创建集成接口\n*   运行接口\n*   在 Oracle Database\
    \ 表中选择集成的数据\n\n# 设置环境\n\n除了第 11 章中使用的软件外，还需下载并安装以下软件。\n*   Oracle Database 11g。本章假定您已安装\
    \ Oracle Database 11g（或更高版本）。\n*   Oracle Loader for Hadoop 3.0.0。从 `www.oracle.com/technetwork/database/database-technologies/bdc/big-data-connectors/downloads/index.html`\
    \ 下载，作为“Big Data Collectors”下载的一部分。\n*   Oracle Data Integrator 11g。从 `www.oracle.com/technetwork/middleware/data-integrator/downloads/index.html`\
    \ 下载 Data Integrator 11g（或更高版本）。\n\n本章与第 11 章一样，使用 Oracle Linux。Oracle Database\
    \ 11g 和 Oracle Data Integrator 11g 的安装过程过于复杂，无法在一章中详述。从 `www.oracle.com/technetwork/database/database-technologies/bdc/big-data-connectors/downloads/index.html`\
    \ 下载 Oracle Loader for Hadoop Release 3.0.0 的 `oraloader-3.0.0.x86_64.zip`。将文件解压缩到一个目录。解压出两个文件：`oraloader-3.0.0-h1.x86_64.zip`\
    \ 和 `oraloader-3.0.0-h2.x86_64.zip`。`oraloader-3.0.0-h1.x86_64.zip` 文件适用于 Apache\
    \ Hadoop 1.x，`oraloader-3.0.0-h2.x86_64.zip` 适用于 CDH4 和 CDH5。由于我们使用 CDH4.6，因此以\
    \ root 用户身份在 Linux 上使用以下命令解压 `oraloader-3.0.0-h2.x86_64.zip`。\n\n```bash\nroot>unzip\
    \ oraloader-3.0.0-h2.x86_64.zip\n```\n\nOracle Loader for Hadoop 3.0.0 被解压到 `oraloader-3.0.0-h2`\
    \ 目录。在 bash shell 中设置 Oracle Database、Oracle Data Integrator、Oracle Loader for\
    \ Hadoop、Hadoop、Hive、Java 和 MongoDB 的环境变量。\n\n```bash\nvi ~/.bashrc\nexport ODI_HOME=/home/dvohra/dbhome_1\n\
    export ORACLE_HOME=/home/oracle/app/oracle/product/11.2.0/dbhome_1\nexport ORACLE_SID=ORCL\n\
    export OLH_HOME=/mongodb/oraloader-3.0.0-h2\nexport HADOOP_PREFIX=/mongodb/hadoop-2.0.0-cdh4.6.0\n\
    export HADOOP_CONF=$HADOOP_PREFIX/etc/hadoop\nexport MONGO_HOME=/mongodb/mongodb-linux-i686-2.6.3\n\
    export HIVE_HOME=/mongodb/hive-0.10.0-cdh4.6.0\nexport HIVE_CONF=$HIVE_HOME/conf\n\
    export JAVA_HOME=/mongodb/jdk1.7.0_55\nexport HADOOP_MAPRED_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/bin\n\
    export HADOOP_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2\nexport\
    \ HADOOP_CLASSPATH=$HADOOP_HOME/*:$HADOOP_HOME/lib/*:$HIVE_HOME/lib/*:$OLH_HOME/jlib/*:/mongodb/mongo-java-driver-2.6.3.jar:/mongodb/hive-mongo-0.0.3-jar-with-dependencies.jar:$HIVE_CONF:$HADOOP_CONF\n\
    export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_MAPRED_HOME::$HIVE_HOME/bin:$MONGO_HOME/bin:$ORACLE_HOME/bin\n\
    ```\n\n我们将使用在第 11 章中创建在 MongoDB 上的 Hive 表，将 MongoDB 数据集成到 Oracle Database。使用以下\
    \ SQL 脚本在 Oracle Database 中创建目标数据库表。\n\n```sql\nCREATE TABLE OE.wlslog (time_stamp\
    \ VARCHAR2(255), category VARCHAR2(255), type VARCHAR2(255), servername VARCHAR2(255),\
    \ code VARCHAR2(255), msg VARCHAR2(255));\n```\n\n`CREATE TABLE` SQL 语句的输出如图 12-1\
    \ 所示。Oracle Database 表 `OE.WLSLOG` 的列名与要从中加载数据的 Hive 外部表相同。\n\n![9781484215999_Fig12-01.jpg](img/image00708.jpeg)\n\
    \n图 12-1. 创建 Oracle Database 表\n\n如第 11 章所述，在 Java 应用程序中向 MongoDB 数据存储添加数据。也如第\
    \ 11 章所述，创建 Hive 外部表 `wlslog`。使用以下命令启动 Hive 远程 metastore。\n\n```bash\nhive –service\
    \ hiveserver\n```\n\nHive 服务器启动，如图 12-2 所示。\n\n![9781484215999_Fig12-02.jpg](img/image00709.jpeg)\n\
    \n图 12-2. 启动 Hive 服务器\n\n由于我们使用 Oracle Data Integrator (ODI)，因此需要安装 ODI，创建存储库，并连接到存储库以定义物理和逻辑架构、模型以及用于将源数据存储映射到目标数据存储的接口。使用以下命令启动\
    \ Oracle Data Integrator Studio。\n\n```bash\ncd /home/dvohra/dbhome_1/oracledi/client\n\
    sh odi.sh\n```\n\n# 创建物理架构\n\n物理架构由数据服务器和物理模式组成。\n"
- fmt: '# 为 MongoDB 和 Oracle Database 添加数据服务器和物理架构


    本节我们将为 MongoDB 和 Oracle Database 添加数据服务器和物理架构。MongoDB 的物理和逻辑架构基于 Hive 技术。


    ## 1. 选择拓扑


    在 ODI Studio 中，选择 **Topology** > **Physical Architecture** > **Technologies**
    > **Hive**，如图 12-3 所示。


    ![9781484215999_Fig12-03.jpg](Images/image00710.jpeg)


    **图 12-3** 在 Physical Architecture 中选择 Hive 技术


    ## 2. 创建 MongoDB 数据服务器


    要通过 Hive 表为 MongoDB 创建新的数据服务器，请右键单击 `Hive` 并选择 **New Data Server**，如图 12-4 所示。


    ![9781484215999_Fig12-04.jpg](Images/image00711.jpeg)


    **图 12-4** 创建新的 Hive 数据服务器


    ## 3. 配置数据服务器定义


    在 **Data Server Definition** 中，指定一个 `Name`（例如 `MongoDB`），如图 12-5 所示。技术（Technology）已预选为
    `Hive`。


    ![9781484215999_Fig12-05.jpg](Images/image00712.jpeg)


    **图 12-5** 配置新的数据服务器定义


    ## 4. 配置 Flexfields


    选择 **Flexfields** 选项卡，如图 12-6 所示。取消选中 `Default` 复选框，并为 Hive Metastore URIs 指定值
    `thrift://localhost:10000`。


    ![9781484215999_Fig12-06.jpg](Images/image00713.jpeg)


    **图 12-6** 配置 Hive Metastore URIs


    ## 5. 配置并测试 JDBC 连接


    选择 **JDBC** 选项卡，将 **JDBC Driver** 选择为 `HiveDriver`，并将 **JDBC Url** 指定为 `jdbc:hive://localhost:10000/default`。单击
    **Test Connection** 以测试 JDBC 连接，如图 12-7 所示。


    ![9781484215999_Fig12-07.jpg](Images/image00714.jpeg)


    **图 12-7** 测试与 Hive 服务器的连接


    ## 6. 确认测试连接


    将出现一个确认对话框，提示“Your data will be saved before testing connection. Do you want to
    continue?”，如图 12-8 所示。单击 **OK**。


    ![9781484215999_Fig12-08.jpg](Images/image00715.jpeg)


    **图 12-8** 测试连接的确认对话框


    ## 7. 提示注册物理架构


    将出现一个信息对话框，提示为该数据服务器注册至少一个物理架构，如图 12-9 所示。单击 **OK**。


    ![9781484215999_Fig12-09.jpg](Images/image00716.jpeg)


    **图 12-9** 注册物理架构的信息对话框


    ## 8. 执行连接测试


    在 **Test Connection** 对话框中，单击 **Test**，如图 12-10 所示。


    ![9781484215999_Fig12-10.jpg](Images/image00717.jpeg)


    **图 12-10** 测试与 Hive 服务器的连接


    ## 9. 确认连接成功


    将出现“Successful connection”消息，表明连接已建立，如图 12-11 所示。单击 **OK**。


    ![9781484215999_Fig12-11.jpg](Images/image00718.jpeg)


    **图 12-11** 连接成功的信息对话框


    ## 10. 保存数据服务器


    单击 **Save**。一个基于 Hive 技术的 MongoDB 数据服务器即被添加完成，如图 12-12 所示。


    ![9781484215999_Fig12-12.jpg](Images/image00719.jpeg)


    **图 12-12** 名为 MongoDB 的 Hive 数据服务器


    ## 11. 添加物理架构


    接下来，为该数据服务器添加一个物理架构。右键单击 `MongoDB` 数据服务器节点，选择 **New Physical Schema**，如图 12-13
    所示。


    ![9781484215999_Fig12-13.jpg](Images/image00720.jpeg)


    **图 12-13** 选择 Physical Architecture > Hive > MongoDB > New Physical Schema


    ## 12. 定义物理架构


    在 **Physical Schema Definition** 中，`Name` 已预指定为 `MongoDB.default`。将 **Schema**
    和 **Work Schema** 都指定为 `default`，如图 12-14 所示。单击 **Save**。


    ![9781484215999_Fig12-14.jpg](Images/image00721.jpeg)


    **图 12-14** MongoDB 数据服务器的物理架构定义


    一个物理架构即被添加到该数据服务器，如图 12-15 所示。


    ![9781484215999_Fig12-15.jpg](Images/image00722.jpeg)


    **图 12-15** 物理架构 MongoDB.default


    ## 13. 创建 Oracle Database 数据服务器


    目标数据存储是一个 Oracle Database 表。要为 Oracle Database 创建数据服务器，请右键单击 **Topology** > **Physical
    Architecture** > **Technologies** > **Oracle**，然后选择 **New Data Server**，如图 12-16
    所示。


    ![9781484215999_Fig12-16.jpg](Images/image00723.jpeg)


    **图 12-16** 选择 Physical Architecture > Oracle > New Data Server


    ## 14. 配置 Oracle 数据服务器定义


    在 **Data Server Definition** 中，指定一个数据服务器 `Name`。技术（Technology）已预选为 `Oracle`。指定
    `Instance` 为 `ORCL`，如图 12-17 所示。指定 `User` 和 `Password`。


    ![9781484215999_Fig12-17.jpg](Images/image00724.jpeg)


    **图 12-17** 为 Oracle Database 配置数据服务器


    ## 15. 配置并测试 Oracle JDBC 连接


    选择 **JDBC** 选项卡。将 **JDBC Driver** 选择为 `oracle.jdbc.OracleDriver`，并将 **JDBC Url**
    指定为 `jdbc:oracle:thin:@127.0.0.1:1521:ORCL`。单击 **Test Connection** 以测试 JDBC 连接，如图
    12-18 所示。


    ![9781484215999_Fig12-18.jpg](Images/image00725.jpeg)


    **图 12-18** 单击 Test Connection


    ## 16. 提示注册物理架构


    将出现一个信息对话框，提示为该数据服务器注册至少一个物理架构，如图 12-19 所示。单击 **OK**。


    ![9781484215999_Fig12-19.jpg](Images/image00726.jpeg)


    **图 12-19** 注册物理架构的信息对话框


    ## 17. 执行连接测试


    在 **Test Connection** 对话框中，单击 **Test**，如图 12-20 所示。


    ![9781484215999_Fig12-20.jpg](Images/image00727.jpeg)


    **图 12-20** 测试与 Oracle Database 的连接


    ## 18. 确认连接成功并查看结果


    将出现“Successful Connection”消息，表明连接已建立，如图 12-21 所示。单击 **OK**。


    ![9781484215999_Fig12-21.jpg](Images/image00728.jpeg)


    **图 12-21** 连接成功的信息对话框


    一个 Oracle 技术数据服务器即被添加完成，如图 12-22 所示。


    ![9781484215999_Fig12-22.jpg](Images/image00729.jpeg)


    **图 12-22** 新的 Oracle 技术数据服务器


    ## 19. 注册物理架构到数据服务器


    要为该数据服务器注册物理架构，请右键单击数据服务器节点并选择 **New Physical Schema**，如图 12-23 所示。


    ![9781484215999_Fig12-23.jpg](Images/image00730.jpeg)


    **图 12-23** 选择 Physical Architecture > Oracle > OracleDB Data Server > New Physical
    Schema


    ## 20. 物理架构定义


    在 **Physical Schema Definition** 中，`Name` 已预指定。'
