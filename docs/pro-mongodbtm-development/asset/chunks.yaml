    \                   .append(\"publisher\", \"Oracle Publishing\")\n                    .append(\"\
    edition\", \"November December 2013\");\n            coll.insertOne(catalog);\n\
    \nDeleteResult result = coll.deleteOne(\n                    new Document(\"catalogId\"\
