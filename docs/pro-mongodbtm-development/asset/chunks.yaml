    \  }\n}\n```\n\nTo close connection/s invoke the `MongoClient::close([boolean|string\
    \ $connection])` method. To close all connections invoke the `close()` method\
    \ with arg `true`. If an arg is not supplied or is `false` only the connection\
    \ on which the method is invoked is closed. A specific connection may be supplied\
    \ using a connection string. If `getConnections()` method is invoked subsequent\
    \ to closing all connections an empty array is listed.\n\n```\narray(0) { }\n\
    ```\n\nThe PHP script `mongoconnection.php` is listed:\n\n```\n<?php\n$connection\
    \ = new MongoClient(); // connects to localhost:27017\nprint 'Connection: <br/>';\n\
