    \nFigure 10-25. 查找一个文档\n\n### 保存实体\n\n`MongoRepository` 接口提供了以下方法（Table 10-19）用于通过仓库保存文档。\n\
    \nTable 10-19. 用于保存文档的 MongoRepository 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `<S\
    \ extends T> S save(S entity)` | 保存给定的实体。如果实体已在服务器中，则覆盖该实体。返回已保存的实体实例。 |\n| `<S\
    \ extends T> Iterable<S> save(Iterable<S> entities)` | 保存给定的实体集合。如果某个实体已在服务器中，则覆盖该实体。返回已保存的实体实例。\
    \ |\n\n#### 保存单个文档\n\n作为示例，使用 `save(S entity)` 方法创建并保存一个实体实例。\n\n1.  在 `CatalogService`\
    \ 类的 `save()` 方法中创建一个 `Catalog` 实例。ID 字段参数可以是空字符串，因为 `_id` 字段是自动生成的。\n2.  随后，使用\
    \ `Catalog` 实例作为方法参数调用 `save()` 方法。\n\n要查找已保存的文档，请在 `CatalogService` 中调用 `findAll()`\
    \ 方法。`CatalogService` 中的 `save()` 方法如下。\n\n```\npublic static void save() {\n\
    \    Catalog catalog = new Catalog(\"\", \"Oracle Magazine\",\n        \"Oracle\
    \ Publishing\", \"11-12-2013\", \"Engineering as a Service\", \"Kelly, David\"\
    );\n    repository.save(catalog);\n    findAll();\n}\n```\n\n3.  从 `main` 方法调用\
    \ `save()` 方法以保存 `Catalog` 实例，随后查找并列出文档的字段值，如 Figure 10-26 所示。\n\n![9781484215999_Fig10-26.jpg](img/image00687.jpeg)\n\
    \nFigure 10-26. 保存一个文档\n\n#### 保存一批文档\n\n作为使用 `save(Iterable<S> entities)` 方法的示例，在\
    \ `CatalogService` 应用程序的 `saveBatch()` 方法中创建一个实体实例的 `ArrayList`。使用 `ArrayList`\
    \ 实例作为参数调用 `save(Iterable<S> entities)` 方法。\n\n```\nrepository.save(arrayList);\n\
    ```\n\n随后调用 `findAll()` 方法查找所有已保存的实体。`saveBatch()` 方法如下。\n\n```\npublic static\
    \ void saveBatch() {\n    Catalog catalog1 = new Catalog(\"\", \"Oracle Magazine\"\
    ,\n        \"Oracle Publishing\", \"11-12-2013\", \"Engineering as a Service\"\
    ,\n        \"Kelly, David\");\n    Catalog catalog2 = new Catalog(\"\", \"Oracle\
    \ Magazine\",\n        \"Oracle Publishing\", \"11-12-2013\",\n        \"Quintessential\
    \ and Collaborative\", \"Haunert, Tom\");\n    entities = new ArrayList<Catalog>();\n\
    \    entities.add(catalog1);\n    entities.add(catalog2);\n    repository.save(entities);\n\
    \    findAll();\n}\n```\n\n从 `main` 方法调用 `saveBatch()` 方法。在运行 `CatalogService`\
    \ 应用程序之前，请使用 Mongo shell 中的 `db.catalog.drop()` 方法删除先前创建的 `catalog` 集合。当 `CatalogService`\
    \ 应用程序运行时，`ArrayList` 中的实体实例集合会被添加到 MongoDB 服务器。已保存的 `Catalog` 实体字段值会输出到 Eclipse\
    \ 控制台，如 Figure 10-27 所示。\n\n![9781484215999_Fig10-27.jpg](img/image00688.jpeg)\n\
    \nFigure 10-27. 保存一批文档\n\n### 删除实体\n\n`MongoRepository` 接口提供了以下方法（Table 10-20）用于通过仓库删除文档。\n\
    \nTable 10-20. 用于删除文档的 MongoRepository 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `void\
    \ delete(ID id)` | 删除由仓库管理的具有给定 ID 的实体。 |\n| `void delete(T entity)` | 删除由仓库管理的指定实体。\
    \ |\n| `void delete(Iterable<? extends T> entities)` | 删除由仓库管理的在指定 `Iterable`\
    \ 中的实体。 |\n| `void deleteAll()` | 删除由仓库管理的所有实体。 |\n\n#### 按 ID 删除文档\n\n作为使用 `delete(ID\
    \ id)` 方法的示例，在 `CatalogService` 应用程序的 `deleteById()` 方法中删除已知存在于 MongoDB 服务器中的具有特定\
    \ ID 的实体。\n\n首先，在 `deleteById()` 方法中保存一些文档。为已保存的 `Catalog` 实体使用类变量 `catalog1`\
    \ 和 `catalog2`。在 `deleteById()` 方法中，使用其中一个已保存文档的 ID 作为方法参数，调用 `CatalogRepository`\
    \ 实例的 `delete(ID id)` 方法。文档的 ID 使用 `getId()` 方法获取。随后调用 `findAll()` 方法查找所有文档。\n\
    \n```\npublic static void deleteById() {\n    //Add documents\n    repository.delete(catalog1.getId());\n\
    \    findAll();\n}\n```\n\n在 `CatalogService` 的 `main` 方法中调用 `deleteById()` 方法。\n"
