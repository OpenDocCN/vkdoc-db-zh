  trans: "\n# MongoDB 特定属性配置\n\n表 9-3 展示了支持的以下 MongoDB 特定属性。\n\n**表 9-3. MongoDB 特定配置属性**\n\
    \n| 属性 | 描述 |\n| --- | --- |\n| `read.preference` | 读取偏好。应从主节点还是从节点读取数据。 |\n|\
    \ `socket.timeout` | 套接字超时是 Kundera 在连接 MongoDB 超时前等待的时间段（以毫秒为单位）。 |\n\n例如，要配置\
    \ MongoDB 特定属性，请在 `persistence.xml` 中的 MongoDB 特定配置文件中添加以下属性。\n\n```\n<property\
    \ name=\"kundera.client.property\" value=\"kundera-mongo.xml\" />\n```\n\nMongoDB\
    \ 特定配置文件的名称是 `kundera-mongo.xml`。以下是一个示例 MongoDB 特定配置文件。\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<clientProperties>\n    <datastores>\n        <dataStore>\n\
    \        <name>mongo</name>\n        <connection>\n            <properties>\n\
    \                <property name=\"read.preference\" value=\"secondary\"></property>\n\
    \            <property name=\"socket.timeout\" value=\"50000\"></property>\n \
    \           </properties>\n            <servers>\n                <server>\n \
    \               <host>192.160.140.160</host>\n                <port>27017</port>\n\
    \            </server>\n                <server>\n                <host>192.161.141.161</host>\n\
    \                <port>27018</port>\n            </server>\n            </servers>\n\
    \        </connection>\n        </dataStore>\n    </datastores>\n</clientProperties>\n\
    ```\n\n我们尚未使用任何 MongoDB 特定的配置文件。\n\n接下来，在 `src/main/resources/META-INF/` 文件夹中创建\
    \ `persistence.xml` 配置文件。新建 Maven 项目时，`META-INF` 文件夹不会自动创建。要添加 `META-INF` 文件夹，请右键单击资源文件夹，选择\
    \ **新建 > 文件夹**，如 图 9-9 所示。\n\n![9781484215999_Fig09-09.jpg](img/image00643.jpeg)\n\
    \n图 9-9. 在资源文件夹中创建新文件夹\n\n在 **新建文件夹** 向导中，选择 `src/main/resources` 文件夹，将文件夹名称指定为\
    \ `META-INF`，然后单击 **完成**，如 图 9-10 所示。\n\n![9781484215999_Fig09-10.jpg](img/image00644.jpeg)\n\
    \n图 9-10. 创建 META-INF 文件夹\n\n`META-INF` 文件夹已创建。接下来，将 `persistence.xml` 文件添加到 `META-INF`\
    \ 文件夹。\n\n1.  要创建 `persistence.xml` 文件，请选择 **文件 > 新建 > 其他**。\n2.  在 **新建** 窗口中，选择\
    \ **XML > XML 文件** 并单击 **下一步**，如 图 9-11 所示。\n    ![9781484215999_Fig09-11.jpg](img/image00645.jpeg)\n\
    \    图 9-11. 创建 XML 文件\n3.  在 **新建 XML 文件** 向导中，选择 `META-INF` 文件夹并将文件名指定为 `persistence.xml`，如\
    \ 图 9-12 所示。单击 **完成**。\n    ![9781484215999_Fig09-12.jpg](img/image00646.jpeg)\n\
    \    图 9-12. 创建 persistence.xml\n    `persistence.xml` 文件已添加到 `META-INF` 文件夹。\n\
    4.  将前面列出的 `persistence.xml` 文件内容复制到 Maven 项目中的 `persistence.xml` 文件，如 图 9-13\
    \ 所示。\n    ![9781484215999_Fig09-13.jpg](img/image00647.jpeg)\n    图 9-13. 持久化配置文件\
    \ persistence.xml\n\n# 创建 JPA 客户端类\n\n我们已经配置了一个 JPA 项目用于对象/关系映射到 MongoDB 数据库。接下来，我们将使用\
    \ JPA API 运行一些 CRUD 操作。但是，首先我们需要为 CRUD 操作创建一个客户端类。我们将使用一个 Java 类作为客户端类。\n\n1.\
    \  选择 **文件 > 新建 > 其他**。\n2.  在 **新建** 窗口中，选择 **Java > 类** 并单击 **下一步**。\n3.  在\
    \ **新建 Java 类** 向导中，指定一个包 (`kundera`) 和一个类名 (`KunderaClient`)，如 图 9-14 所示。选择为类添加\
    \ `main` 方法的方法存根，然后单击 **完成**。\n    ![9781484215999_Fig09-14.jpg](img/image00648.jpeg)\n\
    \    图 9-14. 创建客户端类 KunderaClient\n    `kundera.KunderaClient` 类已添加到 `KunderaMongoDB`\
    \ Maven 项目中，如 图 9-15 所示。\n    ![9781484215999_Fig09-15.jpg](img/image00649.jpeg)\n\
    \    图 9-15. 包含 KunderaClient 类的 Maven 项目目录结构\n\n我们将向 `KunderaClient` 应用程序添加 表\
    \ 9-4 中所示的方法，以在 MongoDB 上运行 CRUD 操作。我们将从 `main` 方法调用这些方法，开始时注释掉所有方法。我们将一次取消注释一个方法并运行\
    \ `KunderaClient` 应用程序。\n\n**表 9-4. KunderaClient 应用程序方法**\n\n| 属性 | 描述 |\n| ---\
    \ | --- |\n| `create()` | 创建实体。 |\n| `findByClass()` | 使用实体类查找实体。 |\n| `query()`\
    \ | 查询实体。 |\n| `update()` | 更新实体。 |\n| `delete()` | 删除实体。 |\n\n# 运行 CRUD 操作\n\n\
    在接下来的几个小节中，我们将在 `catalog` 集合中创建一个目录，并向目录中添加数据、查找目录条目、更新目录条目和删除目录条目。\n\n## 创建目录\n\
    \n在本节中，我们将向 MongoDB 中的 `catalog` 集合添加一些文档。\n\n1.  向 `KunderaClient` 类添加一个名为 `create()`\
    \ 的方法，并从 `main` 方法调用该方法，以便在应用程序运行时调用该方法。\n    JPA API 在 `javax.persistence` 包中定义。`EntityManager`\
    \ 接口用于与持久化上下文交互。`EntityManagerFactory` 接口用于与持久化单元的实体管理器工厂交互。在 Java SE 环境中，`Persistence`\
    \ 类用于获取 `EntityManagerFactory` 对象。\n2.  使用 `Persistence` 类的静态方法 `createEntityManagerFactory(java.lang.String\
    \ persistenceUnitName)` 创建一个 `EntityManagerFactory` 对象。\n3.  使用 `EntityManagerFactory`\
    \ 对象的 `createEntityManager()` 方法创建一个 `EntityManager` 实例。\n    ```\n    EntityManagerFactory\
    \  emf = Persistence.createEntityManagerFactory(\"kundera\");\n    em = emf.createEntityManager();\n\
    \    ```\n4.  在 `create()` 方法中，创建实体类 `Catalog` 的一个实例。使用 set 方法设置 `catalogId`、`journal`、`publisher`、`edition`、`title`\
    \ 和 `author` 字段。\n    ```\n    Catalog catalog = new Catalog();\n            catalog.setCatalogId(\"\
    catalog1\");\n            catalog.setJournal(\"Oracle Magazine\");\n         \
    \   catalog.setPublisher(\"Oracle Publishing\");\n            catalog.setEdition(\"\
    November-December 2013\");\n            catalog.setTitle(\"Engineering as a Service\"\
    );\n            catalog.setAuthor(\"David A. Kelly\");\n    ```\n5.  使用 `EntityManager`\
    \ 接口中的 `persist(java.lang.Object entity)` 方法使领域模型实例受管理和持久化。\n    ```\n    em.persist(catalog);\n\
    \    ```\n    同样，其他 JPA 实例也可以被持久化。当我们在后面的部分运行 `KunderaClient` 类时，`Catalog` 实体将被持久化到\
    \ MongoDB 数据库。\n\n## 使用实体类查找目录条目\n\n`EntityManager` 类提供了多种方法用于查找实体实例。在本节中，我们将使用\
    \ `find(java.lang.`\n"
- fmt: "# 使用Kundera进行JPA CRUD操作\n\n## 查找目录条目\n\n使用 `EntityManager` 接口中的 `find(java.lang.Class<T>\
    \ entityClass, java.lang.Object primaryKey)` 方法，第一个参数是实体类，第二个参数是要查找的文档的 `_id`\
    \ 字段值。\n\n1.  向 `KunderaClient` 类添加一个名为 `findByClass()` 的方法，并从 `main` 方法中调用该方法，以便在应用程序运行时调用它。\n\
    2.  使用 `Catalog.class` 作为第一个参数，`\"catalog1\"` 作为第二个参数来调用 `find(java.lang.Class<T>\
    \ entityClass, java.lang.Object primaryKey)` 方法。\n    ```java\n    Catalog catalog\
    \ = em.find(Catalog.class, \"catalog1\");\n    ```\n3.  在 `Catalog` 实例上调用 `get`\
    \ 方法以输出实体字段。\n    ```java\n    System.out.println(catalog.getJournal());\n   \
    \ System.out.println(catalog.getPublisher());\n    System.out.println(catalog.getEdition());\n\
    \    System.out.println(catalog.getTitle());\n    System.out.println(catalog.getAuthor());\n\
    \    ```\n\n当客户端类运行时，`Catalog` 实体字段值应当被输出。\n\n## 使用JPA查询查找目录条目\n\n`Query` 接口用于运行Java持久化查询语言和原生SQL的查询。`EntityManager`\
    \ 接口提供了几种创建 `Query` 实例的方法。在本节中，我们将首先使用 `EntityManager` 方法 `createQuery(java.lang.String\
    \ qlString)` 创建一个 `Query` 实例，然后在 `Query` 实例上调用 `getResultList()` 方法，从而运行一个Java持久化查询语言语句。\n\
    \n1.  向 `KunderaClient` 类添加一个名为 `query()` 的方法，并从 `main` 方法中调用该方法。\n2.  在 `query()`\
    \ 方法中，调用 `createQuery(java.lang.String qlString)` 方法来创建一个 `Query` 实例。\n3.  提供Java持久化查询语言语句\
    \ `SELECT c FROM Catalog c`。\n    ```java\n    javax.persistence.Query query =\
    \ em.createQuery(\"SELECT c FROM Catalog c\");\n    ```\n4.  在 `Query` 实例上调用 `getResultList()`\
    \ 方法以运行 `SELECT` 语句，并返回一个 `List<Catalog>` 作为结果。\n    ```java\n    List<Catalog>\
    \ results = query.getResultList();\n    ```\n5.  使用增强的 `for` 语句遍历 `List` 对象，以输出\
    \ `Catalog` 实例的字段。\n    ```java\n    for (Catalog catalog : results) {\n     \
    \   System.out.println(catalog.getCatalogId());\n        System.out.println(catalog.getJournal());\n\
    \        System.out.println(catalog.getPublisher());\n        System.out.println(catalog.getEdition());\n\
    \        System.out.println(catalog.getTitle());\n        System.out.println(catalog.getAuthor());\n\
    \    }\n    ```\n\n当客户端类运行时，`Catalog` 实体字段值应当被输出。\n\n## 更新目录条目\n\n在本节中，我们将使用Java持久化API更新一个目录条目。`EntityManager`\
    \ 中的 `persist()` 方法可用于持久化更新后的实体实例。\n\n1.  向 `KunderaClient` 类添加一个名为 `update()`\
    \ 的方法，并从 `main` 方法中调用该方法。\n    1.  要更新主键为 `\"catalog1\"` 的文档中的 `edition` 列，请使用\
    \ `find(java.lang.Class<T> entityClass, java.lang.Object primaryKey)` 方法为 `catalog1`\
    \ 行创建一个实体实例。\n    2.  随后，使用 `setEdition` 方法将 `edition` 字段设置为更新后的值。\n    3.  使用\
    \ `persist(java.lang.Object entity)` 方法持久化更新后的 `Catalog` 实例。\n        ```java\n\
    \        Catalog catalog = em.find(Catalog.class, \"catalog1\");\n        catalog.setEdition(\"\
    Nov-Dec 2013\");\n        em.persist(catalog);\n        ```\n2.  Java持久化查询语言提供了\
    \ `UPDATE` 子句来更新一行。使用 `UPDATE` 语句和 `EntityManager` 中的 `createQuery(String)` 方法创建一个\
    \ `Query` 实例。随后调用 `executeUpdate()` 方法来执行 `UPDATE` 语句。\n    ```java\n    em.createQuery(\"\
    UPDATE Catalog c SET c.journal = 'Oracle-Magazine'\").executeUpdate();\n    ```\n\
    3.  `catalog` 列族中所有行的 `journal` 列都将被更新。应用更新后，调用 `query()` 方法以输出更新后的字段值。\n\n当 `KunderaClient`\
    \ 类运行时，已更新的 `journal` 字段应具有更新后的值 `Oracle-Magazine`，而不是 `Oracle Magazine`。\n\n\
    ## 删除目录条目\n\n在本节中，我们将使用Java持久化API移除持久化在MongoDB中的文档。`EntityManager` 中的 `remove(java.lang.Object\
    \ entity)` 方法可用于移除一个实体实例。\n\n1.  向 `KunderaClient` 类添加一个名为 `delete()` 的方法，并从 `main`\
    \ 方法中调用该方法。\n2.  要移除主键为 `\"catalog1\"` 的文档，请使用 `find(java.lang.Class<T> entityClass,\
    \ java.lang.Object primaryKey)` 方法为 `catalog1` 行创建一个实体实例。随后调用 `remove(java.lang.Object\
    \ entity)` 方法，从MongoDB中移除主键为 `catalog1` 的文档。\n    ```java\n    Catalog catalog\
    \ = em.find(Catalog.class, \"catalog1\");\n    em.remove(catalog);\n    ```\n\
    3.  Java持久化查询语言提供了 `DELETE` 子句来删除文档。使用 `DELETE` 语句和 `EntityManager` 中的 `createQuery(String)`\
    \ 方法创建一个 `Query` 实例。随后调用 `executeUpdate()` 方法来执行 `DELETE` 语句。\n    ```java\n \
    \   em.createQuery(\"DELETE FROM Catalog c\").executeUpdate();\n    ```\n    所有行都将被删除。`DELETE`\
    \ 语句不会删除文档本身，而是删除行中的所有列。\n4.  应用删除操作（无论是使用 `remove(java.lang.Object entity)` 还是使用\
    \ `DELETE` Java持久化查询语言语句）后，调用 `query()` 方法以输出任何持久化到 `catalog` 表中的 `Catalog` 实例。\n\
    \n当客户端类运行时，在删除 `Catalog` 条目后调用 `query()` 方法时，不应列出任何字段值。\n\n## Kundera-Mongo JPA客户端类\n\
    \n在以下小节中，我们将安装Maven项目并为Maven项目生成Eclipse IDE文件。随后，我们将运行Kundera-Mongo JPA客户端类（在上一节“运行JPA\
    \ CRUD操作”中讨论过）以调用客户端类的不同方法。本章中使用的 `KunderaClient` 类如下所列：\n\n```java\npackage kundera;\n\
    \nimport java.util.List;\n\nimport javax.persistence.EntityManager;\nimport javax.persistence.EntityManagerFactory;\n\
    import javax.persistence.Persistence;\n\npublic class KunderaClient {\n    private\
    \ static EntityManager em;\n    private static EntityManagerFactory emf;\n\n \
    \   public static void main(String[] args) {\n        emf = Persistence.createEntityManagerFactory(\"\
    kundera\");\n        em = emf.createEntityManager();\n        create();\n    \
