    ```    Summary    In this chapter we used the Spring Data MongoDB project with
    MongoDB server. The common CRUD operations on a MongoDB datastore may be performed
    using the `org.springframework.data.mongodb.core.MongoOperations` interface and
    the `org.springframework.data.mongodb.repository.MongoRepository`. In this chapter
    we discussed CRUD operations on MongoDB using these two interfaces. In the next
    chapter we shall discuss using MongoDB with Hadoop and create an Apache Hive table
    over MongoDB.    CHAPTER 11    ![image](Images/image00404.jpeg)    Creating an
    Apache Hive Table with MongoDB    MongoDB is the leading NoSQL database. MongoDB
    is based on the BSON (Binary JSON) JSON-style document format, which is based
    on dynamic schemas providing flexibility in storage. The Hive MongoDB Storage
    Handler makes it feasible to access MongoDB from Apache Hive. A Hive external
    table may be created on a MongoDB document store. In this chapter we shall create
    a document store in MongoDB, and subsequently create a Hive external table on
    the MongoDB document store.    Apache Hadoop is a framework for distributed processing
    of large data sets. Apache Hadoop file system is the Hadoop Distributed File System
    (HDFS). Apache Hive is a software for querying and managing large data sets stored
    on a distributed storage, which is the HDFS by default. This chapter assumes knowledge
    of Apache Hadoop (Reference: `https://hadoop.apache.org/`) and Apache Hive (Reference:
    `https://hive.apache.org/`) as we won’t be discussing what is HDFS or how HDFS
    stores data for Hive. We shall also make use of some Hadoop shell commands. This
    chapter includes the following topics:    *   Overview of Hive storage handler
    for MongoDB *   Setting up the environment *   Creating a MongoDB datastore *   Creating
    an external table in Hive    Overview of Hive Storage Handler for MongoDB    Apache
    Hive supports two types of tables: *managed* tables and *external* tables.'
