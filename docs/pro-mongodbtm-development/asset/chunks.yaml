    \ Item Count为2\n\n7.  添加的两个文档将列出，如[图 7-12](#part0013.xhtml#Fig12)所示。单击Edit Document以显示文档的JSON。\n\
    ![9781484215999_Fig07-12.jpg](Images/image00620.jpeg)\n[图 7-12](#part0013.xhtml#_Fig12).\
    \ 列出default存储桶中的文档\n\n`catalog1` ID的JSON文档将显示，如[图 7-13](#part0013.xhtml#Fig13)所示。\n\
    ![9781484215999_Fig07-13.jpg](Images/image00621.jpeg)\n[图 7-13](#part0013.xhtml#_Fig13).\
    \ 列出catalog1文档JSON\n\n8.  同样地，列出`catalog2`文档，如[图 7-14](#part0013.xhtml#Fig14)所示。\n\
    ![9781484215999_Fig07-14.jpg](Images/image00622.jpeg)\n[图 7-14](#part0013.xhtml#_Fig14).\
    \ 列出catalog2文档JSON\n\n## 创建 Couchbase 视图\n\n存储在Couchbase Server中的JSON数据可以使用视图进行索引，视图根据定义的格式和结构在数据上创建索引。视图从Couchbase\
    \ Server中的JSON文档对象提取字段，并创建可查询的索引。视图是一个逻辑结构，映射函数将存储在Couchbase Server中的JSON文档对象的字段映射到视图。\n\
    \n可选地，也可以应用规约函数来汇总（或平均或求和）数据。在本节中，我们在Couchbase Server中的JSON文档上创建一个视图。映射函数具有以下格式。\n\
    ```\nfunction(doc, meta) {\n  emit(doc.name, [doc.field1, doc.field2]);\n}\n```\n\
    \n当函数被转换为`map()`函数时，`map()`函数为存储在存储桶中的每个文档提供两个参数：`doc`参数和`meta`参数。`doc`参数是存储在Couchbase存储桶中的文档对象，其内容类型可以通过`meta.type`字段识别。`meta`参数是存储在存储桶中的文档对象的元数据。数据存储桶中的每个文档都会提交给`map()`函数。在`map()`函数内，可以指定任何自定义代码。`emit()`函数用于从`map()`函数发出一行或一条数据记录。`emit()`函数接受两个参数：一个键和一个值。\n\
    ```\nemit(key, value)\n```\n\n发出的键用于对映射到视图的文档对象字段进行排序和查询。键可以是任何格式，例如字符串、数字、复合结构（如数组）或JSON对象。值是要在一行或记录中输出的数据，它可以是任何格式，包括字符串、数字、数组或JSON。指定以下函数用于从Couchbase\
    \ Server存储桶到视图的映射。该函数首先测试文档的类型是否为JSON，随后发出记录，每个记录的键是文档名称，每个记录的值是文档对象字段中存储的数据。\n\
    \n接下来，在Couchbase Console中创建一个视图。\n\n1.  选择Data Buckets ![image](Images/image00406.jpeg)\
    \ default存储桶。随后，选择View。默认选择Development View选项卡。\n2.  单击Create Development View以创建开发视图，如[图\
    \ 7-15](#part0013.xhtml#Fig15)所示。\n![9781484215999_Fig07-15.jpg](Images/image00623.jpeg)\n\
    [图 7-15](#part0013.xhtml#_Fig15). 选择Create Development View\n3.  在Create Development\
    \ View对话框中，指定Design Document Name（`_design/dev_catalog`）和View Name（`catalog_view`），如[图\
    \ 7-16](#part0013.xhtml#Fig16)所示。当使用Java客户端以编程方式访问时，设计文档名称中不包含`_design`前缀。单击Save。\n\
    ![9781484215999_Fig07-16.jpg](Images/image00624.jpeg)\n[图 7-16](#part0013.xhtml#_Fig16).\
    \ 创建开发视图\n将创建一个名为`catalog_view`的开发视图，如[图 7-17](#part0013.xhtml#Fig17)所示。\n![9781484215999_Fig07-17.jpg](Images/image00625.jpeg)\n\
    [图 7-17](#part0013.xhtml#_Fig17). catalog_view视图\n4.  我们需要编辑默认的Map函数，以输出包含journal、publisher、edition、title和author字段键值对的JSON。单击Edit以编辑视图。\n\
    5.  将以下函数复制到View Code ![image](Images/image00406.jpeg) Map区域。\n```\nfunction(doc,meta)\
    \ {\n  if (meta.type == 'json') {\n  emit(doc.name, [doc.journal,doc.publisher,doc.edition,doc.title,doc.author]);\n\
    \  }\n}\n```"
