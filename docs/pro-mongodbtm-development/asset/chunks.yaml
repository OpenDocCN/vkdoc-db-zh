    \ 脚本来删除四个文档中的两个，一个使用 `each` 配合 `delete_one`，另一个使用 `find_one_and_delete`。脚本的输出如\
    \ 图 4-33 所示。\n![9781484215999_Fig04-33.jpg](img/image00541.jpeg)\n图 4-33：使用 `delete_one`\
    \ 和 `find_one_and_delete` 删除文档\n\n7. 在 Mongo shell 中运行 `db.mongodb.find()` 命令以列出剩余的两个文档，如\
    \ 图 4-34 所示。\n![9781484215999_Fig04-34.jpg](img/image00542.jpeg)\n图 4-34：列出四个文档中的两个（已删除两个）\n\
    \n8. 在 Mongo shell 中使用 `db.mongodb.drop()` 命令删除 `mongodb` 集合，然后再次运行 `deleteDocument.rb`\
    \ 脚本，这次仅使用 `delete_many` 的第三个示例。`deleteDocument.rb` 脚本的输出如 图 4-35 所示。\n![9781484215999_Fig04-35.jpg](img/image00543.jpeg)\n\
    图 4-35：使用 `delete_many` 删除多个文档\n\n在 Mongo shell 中运行 `db.mongodb.find()` 命令时，不会列出任何文档，如\
    \ 图 4-36 所示。\n![9781484215999_Fig04-36.jpg](img/image00544.jpeg)\n图 4-36：列出空集合\n\
    \n## 执行批量操作\n\nMongoDB Ruby 驱动通过 `Mongo::Collection` 类中的 `bulk_write(operations,\
    \ options)` 方法支持批量操作。可以使用 `bulk_write()` 方法调用一系列操作。每个操作使用一个文档定义，其中一个键在 表 4-11\
    \ 中讨论。\n表 4-37：批量操作\n\n| 批量操作键          | 描述               |\n| -------------------\
    \ | ------------------ |\n| `insert_one`        | 插入一个文档       |\n| `delete_one`\
    \        | 删除一个文档       |\n| `delete_many`       | 删除多个文档       |\n| `replace_one`\
    \       | 替换一个文档       |\n| `update_one`        | 更新一个文档       |\n| `update_many`\
    \       | 更新多个文档       |\n\n1. 在 `C:\\Ruby21-x64\\mongodbscripts` 目录下创建一个 Ruby\
    \ 脚本 `bulk.rb`。\n2. 如果 `mongodb` 集合已存在，则使用 `db.mongodb.drop()` 将其删除，并在脚本中创建该集合。\n\
    3. 使用 `insert_many()` 方法插入多个文档。\n    ```\n    collection.insert_many([document1,document2,document3,document4])\n\
    \    ```\n4. 为 `mongodb` 集合创建一个集合对象。\n    ```\n    collection = client[:mongodb]\n\
    \    ```\n5. 使用 `insert_one`、`update_one` 和 `replace_one` 批量操作调用 `bulk_write()`\
    \ 方法。将第二个参数设置为 `:ordered => true` 以指示批量操作按指定顺序执行（这也是默认行为）。\n\n    `bulk.rb` 脚本如下所示。\n\
    \    ```\n    require 'mongo'\n    include Mongo\n\n    client =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    client=client.use(:local)\n \
    \   db=client.database\n    collection=db.collection(\"mongodb\")\n\n    collection.create\n\
    \n    document1={\n      \"catalogId\" => 1,\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
    \ December 2013\",\n      \"title\" => \"Engineering as a Service\",\n      \"\
    author\" =>  \"David A. Kelly\"\n    }\n\n    document2={\n      \"catalogId\"\
    \ => 2,\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"\
    Oracle Publishing\",\n      \"edition\" =>  \"November December 2013\",\n    \
    \  \"title\" => \"Quintessential and Collaborative\",\n      \"author\" =>  \"\
    Tom Haunert\"\n    }\n\n    document3={\n      \"catalogId\" => 3,\n      \"journal\"\
    \ => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\",\n   \
    \   \"edition\" =>  \"November December 2013\",\n      \"title\" => \"\",\n  \
    \    \"author\" => \"\"\n    }\n\n    document4={\n      \"catalogId\" => 4,\n\
    \      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
    ,\n      \"edition\" =>  \"November December 2013\",\n      \"title\" => \"\"\
    ,\n      \"author\" => \"\"\n    }\n\n    collection.insert_many([document1,document2,document3,document4])\n\
    \n    print \"\\n\"\n\n    collection = client[:mongodb]\n\n    collection.bulk_write([\
    \ { :insert_one => { :catalogId => 5 }\n                    },\n             \
    \       { :update_one => { :find => { :catalogId => 1 },\n                   \
    \                    :update => {'$set' => { :catalogId => 6 } }\n           \
    \                          }\n                    },\n                    { :replace_one\
    \ => { :find => { :catalogId => 2 },\n                                       \
    \ :replacement => { :catalogId => 7 }\n                                      }\n\
    \                    }\n                  ],\n                  :ordered => true\
    \ )\n    ```\n6. 按如下方式运行 `bulk.rb` 脚本。\n    ```\n    >ruby bulk.rb\n    ```\n\
    \    `bulk.rb` 脚本的输出如 图 4-37 所示。\n    ![9781484215999_Fig04-37.jpg](img/image00545.jpeg)\n\
    \    图 4-37：运行 bulk.rb 脚本\n7. 随后，使用 `db.mongodb.find()` 方法列出 `mongodb` 集合中的文档。如\
    \ 图 4-38 所示，添加了一个 `catalogId` 为 5 的新文档。`catalogId` 1 已更新为 6，而 `catalogId` 为 2\
    \ 的文档已被 `catalogId` 为 7 的文档替换。\n    ![9781484215999_Fig04-38.jpg](img/image00546.jpeg)\n\
    \    图 4-38：批量操作后列出文档\n\n## 总结\n\n在本章中，我们使用 Ruby 驱动连接到 MongoDB 服务器，并对数据库执行 CRUD（创建、读取、更新、删除）操作。我们演示了针对单个文档和多个文档的每种\
    \ CRUD 操作。在下一章中，我们将使用 Node.js 驱动连接到 MongoDB 并执行类似的 CRUD 操作。\n\n# 第五章 使用 Node.js\
    \ 操作 MongoDB\n\n传统的基于脚本语言的 Web 应用程序构建在客户端/服务器模型上，需要客户端脚本语言（如 JavaScript）和服务器端脚本语言（如\
    \ PHP），并利用 Web 服务器。Node.js 的不同之处在于，它是基于 V8 JavaScript 引擎构建的服务器端脚本。V8 是 Google\
    \ 用于 Google Chrome 的开源 JavaScript 引擎。Node.js 基于事件驱动模型，用于开发快速、可扩展、数据密集型、实时网络应用程序。在本章中，我们将讨论使用\
    \ Node.js（或简称 Node）访问 MongoDB，以及使用 MongoDB 的 Node.js 驱动在数据库中进行数据修改。本章涵盖以下主题：\n\
    \n*   入门\n*   使用连接\n*   使用文档\n\n## 入门\n\n在以下小节中，我们将介绍 MongoDB 的 Node.js 驱动并设置环境。\n\
    \n### Node.js 驱动概述\n\nMongoDB 的 Node.js 驱动提供了一个 API，用于连接到 MongoDB 服务器并在服务器上执行不同的操作，例如添加文档或查找文档。Node.js\
    \ 驱动中的主要类包括...\n"
- fmt: "# Node.js 驱动程序\n\nNode.js 驱动程序的主要类如[图 5-1](#part0011.xhtml#Fig1)所示。  \n![9781484215999_Fig05-01.jpg](Images/image00547.jpeg)\
    \  \n[图 5-1](#part0011.xhtml#_Fig1)。 Node.js 驱动程序的主要类\n\nNode.js 驱动程序类在[表 5-1](#part0011.xhtml#Tab1)中讨论。\
    \  \n[表 5-1](#part0011.xhtml#_Tab1)。 Node.js 驱动程序的主要类\n\n| 类 | 描述 |\n| --- | ---\
    \ |\n| `Admin` | 提供对 MongoDB 服务器管理功能的访问，例如检索服务器信息和状态、添加/删除用户以及进行身份验证。 |\n| `Collection`\
    \ | 表示 MongoDB 服务器中的一个集合。 |\n| `MongoClient` | 表示到 MongoDB 服务器的一个连接。 |\n| `Db`\
    \ | 表示一个数据库实例。 |\n| `Cursor` | 表示一个查询结果集上的游标。 |\n| `ReadPreference` | 表示读取偏好。\
    \ |\n| `BulkWriteResult` | 表示一个批量写入的结果。 |\n| `Mongos` | 表示一个 Mongo 服务器数组。 |\n\
    | `Server` | 表示一个 MongoDB 服务器。 |\n\n# 设置环境\n\n我们需要为本章安装以下软件：\n* MongoDB\n* Node.js\n\
    * MongoDB 的 Node.js 驱动程序\n\n## 安装 MongoDB 服务器\n\n从 `www.mongodb.org/` 下载 MongoDB\
    \ 3.0.5，并将 zip 文件解压到一个目录。将 MongoDB 安装目录中的 `bin` 目录（例如，`C:\\Program Files\\MongoDB\\\
    Server\\3.0\\bin`）添加到 `PATH` 环境变量中。如果尚未创建，请创建 `C:\\data\\db` 目录。使用以下命令启动 MongoDB\
    \ 服务器。\n\n```\n>mongod\n```\n\n## 安装 Node.js\n\n从 `blog.nodejs.org/release/` 下载适用于\
    \ Node.js 的 `node-v0.12.7-x64.msi` 应用程序，并完成以下步骤：\n\n1. 双击 `msi` 应用程序以启动 Node.js\
    \ 安装向导。\n2. 在安装向导中单击“下一步”，如[图 5-2](#part0011.xhtml#Fig2)所示。  \n   ![9781484215999_Fig05-02.jpg](Images/image00548.jpeg)\
    \  \n   [图 5-2](#part0011.xhtml#_Fig2)。 Node.js 安装向导\n3. 接受最终用户许可协议并单击“下一步”。\n\
    4. 在“目标文件夹”中指定安装 Node.js 的目录，默认为 `C:\\Program Files\\nodejs`，如[图 5-3](#part0011.xhtml#Fig3)所示。单击“下一步”。\
    \  \n   ![9781484215999_Fig05-03.jpg](Images/image00549.jpeg)  \n   [图 5-3](#part0011.xhtml#_Fig3)。\
    \ 选择 Node.js 的安装目录\n5. 在“自定义安装”中，列出了要安装的 Node.js 功能（包括核心 Node.js 运行时）供选择，如[图 5-4](#part0011.xhtml#Fig4)所示。选择默认设置并单击“下一步”。\
    \  \n   ![9781484215999_Fig05-04.jpg](Images/image00550.jpeg)  \n   [图 5-4](#part0011.xhtml#_Fig4)。\
    \ 选择要安装的功能\n6. 在“准备安装 Node.js”窗口中，单击“安装”，如[图 5-5](#part0011.xhtml#Fig5)所示。  \n\
    \   ![9781484215999_Fig05-05.jpg](Images/image00551.jpeg)  \n   [图 5-5](#part0011.xhtml#_Fig5)。\
    \ 单击“安装”  \n   Node.js 的安装开始，如[图 5-6](#part0011.xhtml#Fig6)所示。等待安装完成。  \n   ![9781484215999_Fig05-06.jpg](Images/image00552.jpeg)\
    \  \n   [图 5-6](#part0011.xhtml#_Fig6)。 正在安装 Node.js\n7. 当 Node 安装完成时，单击“完成”，如[图\
    \ 5-7](#part0011.xhtml#Fig7)所示。  \n   ![9781484215999_Fig05-07.jpg](Images/image00553.jpeg)\
    \  \n   [图 5-7](#part0011.xhtml#_Fig7)。 Node.js 已安装\n8. 要查找已安装的 Node.js 版本，请在命令\
    \ shell 中运行以下命令：  \n   ```\n   node --version\n   ```  \n   该命令的输出列出版本为 0.12.7，如[图\
    \ 5-8](#part0011.xhtml#Fig8)所示。  \n   ![9781484215999_Fig05-08.jpg](Images/image00554.jpeg)\
    \  \n   [图 5-8](#part0011.xhtml#_Fig8)。 查找 Node.js 版本\n9. 要测试 Node.js 安装，请使用以下脚本创建一个服务器；将脚本存储在任意目录的\
    \ `example.js` 文件中，例如 `C:\\Program Files\\nodejs\\scripts` 目录。  \n   ```\n   var\
    \ http = require('http');\n   http.createServer(function (req, res) {\n     res.writeHead(200,\
    \ {'Content-Type': 'text/plain'});\n     res.end('Hello World\\n');\n   }).listen(1337,\
    \ '127.0.0.1');\n   console.log('Server running at http://127.0.0.1:1337/');\n\
    \   ```\n10. 从包含脚本的目录中，使用以下命令运行脚本：  \n    ```\n    node example.js\n    ```  \n\
    \    脚本的输出显示在命令 shell 中，如[图 5-9](#part0011.xhtml#Fig9)所示。  \n    ![9781484215999_Fig05-09.jpg](Images/image00555.jpeg)\
    \  \n    [图 5-9](#part0011.xhtml#_Fig9)。 运行 Node.js 示例脚本\n\n## 安装用于 MongoDB 的\
    \ Node.js 驱动程序\n\n打开一个新的终端/控制台，进入 `C:\\Program Files\\nodejs`。然后运行以下命令来安装用于 MongoDB\
    \ 的 Node.js 驱动程序。\n\n```\nnpm install mongodb\n```\n\n用于 MongoDB 的 Node.js 驱动程序将被安装，如[图\
    \ 5-10](#part0011.xhtml#Fig10)所示。  \n![9781484215999_Fig05-10.jpg](Images/image00556.jpeg)\
    \  \n[图 5-10](#part0011.xhtml#_Fig10)。 安装用于 MongoDB 的 Node.js 驱动程序\n\n# 使用连接\n\
    \n在以下小节中，我们将创建一个到 MongoDB 服务器的连接并创建一个数据库实例。\n\n## 创建 MongoDB 连接\n\n在本节中，我们将使用用于\
    \ MongoDB 的 Node.js 驱动程序连接到 MongoDB 服务器。我们将使用 `MongoClient` 类连接到 MongoDB 服务器。`MongoClient`\
    \ 构造函数不接受任何参数，其语法如下。\n\n```\nMongoClient()\n```\n\n`MongoClient` 类支持[表 5-2](#part0011.xhtml#Tab2)中讨论的方法（静态和实例）。\n\
    \n[表 5-2](#part0011.xhtml#_Tab2)。 MongoClient 类方法\n\n| 方法 | 描述 |\n| --- | ---\
    \ |\n| `MongoClient.connect(url, options, callback)` | 使用字符串 URI 连接到 MongoDB 服务器的静态方法。连接\
    \ URI 通常包含数据库名称，格式为 `mongodb://[username:password@]host1[:port1][,host2[:port2],...][,hostN[:portN]]/[database][?options]]`。连接\
    \ URI 的组件在[表 5-3](#part0011.xhtml#Tab3)中讨论。连接方法的 `options` 参数在[表 5-6](#part0011.xhtml#Tab6)中讨论。回调类型为\
    \ `connectCallback(error, db)` |\n| `connect(url, options, callback)` | 连接到 MongoDB\
    \ 服务器的实例方法。方法参数与静态方法相同。 |\n\n连接 URI 的组件在[表 5-3](#part0011.xhtml#Tab3)中讨论。\n\n\
    [表 5-3](#part0011.xhtml#_Tab3)。 连接 URI 的组件\n\n| 组件 | 描述 |\n| --- | --- |\n| `mongodb://`\
    \ | 连接字符串中必需的前缀。 |\n| `username:password@` | 特定数据库的登录凭据。可选。 |\n| `host1` | 要连接到的\
    \ MongoDB 服务器地址，指定为主机名、IP 地址或 UNIX 域套接字。唯一必需的组件。 |\n| `:port1` | 要连接到的端口。默认为 `:27017`。\
    \ |\n| `host2[:port2],...[,hostN[:portN]]` | 多个主机：端口配置，例如用于副本集。 |\n| `/database`\
    \ | 如果指定了 `username:password@`，则为要进行身份验证连接的数据库。如果指定了 `username:password@` 但未指定\
    \ `/database`，则对管理员数据库进行身份验证连接。 |\n| `?options` | 连接字符串选项。如果未指定 `/database`，则必须在最后一个\
    \ `hostN` 后添加 `/` 和 `?`。部分连接字符串选项在[表 5-4](#part0011.xhtml#Tab4)中讨论。连接字符串选项指定为用\
    \ `&` 或逗号分隔的名称/值对，值区分大小写。 |"
  raw: 'js driver are illustrated in [Figure 5-1](#part0011.xhtml#Fig1).    ![9781484215999_Fig05-01.jpg](Images/image00547.jpeg)    [Figure
    5-1](#part0011.xhtml#_Fig1). The Main Node.js Driver Classes    The Node.js driver
    classes are discussed in [Table 5-1](#part0011.xhtml#Tab1).    [Table 5-1](#part0011.xhtml#_Tab1).
    The Main Node.js Driver Classes     | Class | Description | | --- | --- | | `Admin`
    | Provides access to the admin functionality of MongoDB server such as retrieving
    the server info and status, adding/removing user, and authenticating. | | `Collection`
    | Represents a collection in MongoDB server. | | `MongoClient` | Represents a
    connection to MongoDB server. | | `Db` | Represents a database instance. | | `Cursor`
    | Represents a cursor over a query result set. | | `ReadPreference` | Represents
    the read preference. | | `BulkWriteResult` | Represents a bulk/batch write result.
    | | `Mongos` | Represents an array of Mongo servers. | | `Server` | Represents
    a MongoDB server. |    Setting Up the Environment    We need to install the following
    software for this chapter:    *   MongoDB *   Node.js *   Node.js driver for MongoDB    Installing
    MongoDB Server    Download MongoDB 3.0.5 from `www.mongodb.org/` and extract the
    zip file to a directory. Add the `bin` directory from the MongoDB installation,
    for example, `C:\Program Files\MongoDB\Server\3.0\bin` to the `PATH` environment
    variable. Create the `C:\data\db` directory if not already created. Start MongoDB
    server with the following command.    ``` >mongod ```    Installing Node.js    Download
    the `node-v0.12.7-x64.msi` application for Node.js from`blog.nodejs.org/release/`
    and complete the following steps:    1.  Double-click on the `msi` application
    to launch the Node.js Setup Wizard. 2.  Click on Next in the Setup Wizard as shown
    in [Figure 5-2](#part0011.xhtml#Fig2).          ![9781484215999_Fig05-02.jpg](Images/image00548.jpeg)                    [Figure
    5-2](#part0011.xhtml#_Fig2). Node.js Setup Wizard           3.  Accept the End-User
    License Agreement and click on Next. 4.  In Destination Folder specify a directory
    to install Node.js in, the default being `C:\Program Files\nodejs` as shown in
    [Figure 5-3](#part0011.xhtml#Fig3). Click on Next.          ![9781484215999_Fig05-03.jpg](Images/image00549.jpeg)                    [Figure
    5-3](#part0011.xhtml#_Fig3). Selecting Installation Directory for Node.js           5.  In
    Custom Setup, the Node.js features to be installed including the core Node.js
    runtime are listed for selection as shown in [Figure 5-4](#part0011.xhtml#Fig4).
    Choose the default settings and click on Next.          ![9781484215999_Fig05-04.jpg](Images/image00550.jpeg)                    [Figure
    5-4](#part0011.xhtml#_Fig4). Selecting the Features to Install           6.  In
    the Ready to Install Node.js window, click on Install as shown in [Figure 5-5](#part0011.xhtml#Fig5).                    ![9781484215999_Fig05-05.jpg](Images/image00551.jpeg)                    [Figure
    5-5](#part0011.xhtml#_Fig5). Clicking on Install                    The installation
    of Node.js starts as shown in [Figure 5-6](#part0011.xhtml#Fig6). Wait for the
    installation to finish.                    ![9781484215999_Fig05-06.jpg](Images/image00552.jpeg)                    [Figure
    5-6](#part0011.xhtml#_Fig6). Installing Node.js           7.  When the Node.js
    completes installing, click on Finish as shown in [Figure 5-7](#part0011.xhtml#Fig7).          ![9781484215999_Fig05-07.jpg](Images/image00553.jpeg)                    [Figure
    5-7](#part0011.xhtml#_Fig7). Node.js Installed           8.  To find the version
    of Node.js installed, run the following command in a command shell.                    ```     node
    --version     ```                    The output from the command lists the version
    as 0.12.7 as shown in [Figure 5-8](#part0011.xhtml#Fig8).                    ![9781484215999_Fig05-08.jpg](Images/image00554.jpeg)                    [Figure
    5-8](#part0011.xhtml#_Fig8).


    Finding the Node.js Version           9.  To test the Node.js installation, create
    a server using the following script; store the script in `example.js` in any directory,
    for example, the `C:\Program Files\nodejs\scripts` directory.                    ```     var
    http = require(''http'');     http.createServer(function (req, res) {       res.writeHead(200,
    {''Content-Type'': ''text/plain''});       res.end(''Hello World\n'');     }).listen(1337,
    ''127.0.0.1'');     console.log(''Server running at http://127.0.0.1:1337/'');     ```           10.  From
    the directory containing the script, run the script with the following command.                    ```     node
    example.js     ```              The output from the script is shown in the command
    shell in [Figure 5-9](#part0011.xhtml#Fig9).    ![9781484215999_Fig05-09.jpg](Images/image00555.jpeg)    [Figure
    5-9](#part0011.xhtml#_Fig9). Running the Node.js Example Script    Installing
    the Node.js Driver for MongoDB    Open a new terminal/console and go to `C:\Program
    Files\nodejs`. Then to install the Node.js driver for MongoDB run the following
    command.    ``` npm install mongodb ```    Node.js driver for MongoDB gets installed
    as shown in [Figure 5-10](#part0011.xhtml#Fig10).    ![9781484215999_Fig05-10.jpg](Images/image00556.jpeg)    [Figure
    5-10](#part0011.xhtml#_Fig10). Installing the Node.js Driver for MongoDB    Using
    a Connection    In the following subsections we shall create a connection with
    MongoDB server and create a database instance.    Creating a MongoDB Connection    In
    this section we shall connect to MongoDB server using the Node.js driver for MongoDB.
    We shall use the `MongoClient` class for connecting to MongoDB server. The `MongoClient`
    constructor does not take any args and has the following syntax.    ``` MongoClient()
    ```    The `MongoClient` class supports the methods (static and instance) discussed
    in [Table 5-2](#part0011.xhtml#Tab2).    [Table 5-2](#part0011.xhtml#_Tab2). MongoClient
    Class Methods     | Method | Description | | --- | --- | | `MongoClient.connect(url,
    options, callback)` | Static method to connect to MongoDB server using a string
    URI. The connection URI would typically include the database name and has the
    following format.`mongodb://[username:password@]host1[:port1][,host2[:port2],..``.[,hostN[:portN]]][/[database][?options]]`The
    components of the connection URI are discussed in [Table 5-3](#part0011.xhtml#Tab3).The
    `options` parameter for the connect method is discussed in [Table 5-6](#part0011.xhtml#Tab6).The
    callback type is `connectCallback(error, db)` | | `connect(url, options, callback)`
    | Instance method to connect to MongoDB server. The method parameters are the
    same as for the static method. |    The components of the connection URI are discussed
    in [Table 5-3](#part0011.xhtml#Tab3).    [Table 5-3](#part0011.xhtml#_Tab3). Components
    of the Connection URI     | Component | Description | | --- | --- | | `mongodb://`
    | Required prefix in connection string. | | `username:password@` | Login credentials
    for a specific database. Optional. | | `host1` | MongoDB server address to connect
    to specified as a hostname, IP address, or UNIX domain socket. The only required
    component. | | `:port1` | Port to connect on. Default is `:27017`. | | `host2[:port2],...[,hostN[:portN]]`
    | Multiple host:port configurations for a replica set, for example. | | `/database`
    | The database to authenticate connection to if `username:password@` is specified.
    If `username:password@` is specified but `/database` is not specified, connection
    to the admin database is authenticated. | | `?options` | Connection string options.
    If /database is not specified a `/` must be added after the last `hostN` and `?`
    Some of the connection string options are discussed in [Table 5-4](#part0011.xhtml#Tab4).
    Connection string options are specified as name/value pairs separated with an
    `&` or a, with the value being case sensitive.'
  trans: "\n# Node.js 驱动程序\n\nNode.js 驱动程序的主要类如图 5-1 所示。\n![9781484215999_Fig05-01.jpg](img/image00547.jpeg)\n\
    图 5-1。 Node.js 驱动程序的主要类\n\nNode.js 驱动程序类在表 5-1 中讨论。\n表 5-1。 Node.js 驱动程序的主要类\n\
    \n| 类 | 描述 |\n| --- | --- |\n| `Admin` | 提供对 MongoDB 服务器管理功能的访问，例如检索服务器信息和状态、添加/删除用户以及进行身份验证。\
    \ |\n| `Collection` | 表示 MongoDB 服务器中的一个集合。 |\n| `MongoClient` | 表示到 MongoDB 服务器的一个连接。\
    \ |\n| `Db` | 表示一个数据库实例。 |\n| `Cursor` | 表示一个查询结果集上的游标。 |\n| `ReadPreference`\
    \ | 表示读取偏好。 |\n| `BulkWriteResult` | 表示一个批量写入的结果。 |\n| `Mongos` | 表示一个 Mongo 服务器数组。\
    \ |\n| `Server` | 表示一个 MongoDB 服务器。 |\n\n# 设置环境\n\n我们需要为本章安装以下软件：\n* MongoDB\n\
    * Node.js\n* MongoDB 的 Node.js 驱动程序\n\n## 安装 MongoDB 服务器\n\n从 `www.mongodb.org/`\
    \ 下载 MongoDB 3.0.5，并将 zip 文件解压到一个目录。将 MongoDB 安装目录中的 `bin` 目录（例如，`C:\\Program\
    \ Files\\MongoDB\\Server\\3.0\\bin`）添加到 `PATH` 环境变量中。如果尚未创建，请创建 `C:\\data\\db`\
    \ 目录。使用以下命令启动 MongoDB 服务器。\n\n```\n>mongod\n```\n\n## 安装 Node.js\n\n从 `blog.nodejs.org/release/`\
    \ 下载适用于 Node.js 的 `node-v0.12.7-x64.msi` 应用程序，并完成以下步骤：\n\n1. 双击 `msi` 应用程序以启动\
    \ Node.js 安装向导。\n2. 在安装向导中单击“下一步”，如图 5-2 所示。\n   ![9781484215999_Fig05-02.jpg](img/image00548.jpeg)\n\
    \   图 5-2。 Node.js 安装向导\n3. 接受最终用户许可协议并单击“下一步”。\n4. 在“目标文件夹”中指定安装 Node.js 的目录，默认为\
    \ `C:\\Program Files\\nodejs`，如图 5-3 所示。单击“下一步”。\n   ![9781484215999_Fig05-03.jpg](img/image00549.jpeg)\n\
    \   图 5-3。 选择 Node.js 的安装目录\n5. 在“自定义安装”中，列出了要安装的 Node.js 功能（包括核心 Node.js 运行时）供选择，如图\
    \ 5-4 所示。选择默认设置并单击“下一步”。\n   ![9781484215999_Fig05-04.jpg](img/image00550.jpeg)\n\
    \   图 5-4。 选择要安装的功能\n6. 在“准备安装 Node.js”窗口中，单击“安装”，如图 5-5 所示。\n   ![9781484215999_Fig05-05.jpg](img/image00551.jpeg)\n\
    \   图 5-5。 单击“安装”\n   Node.js 的安装开始，如图 5-6 所示。等待安装完成。\n   ![9781484215999_Fig05-06.jpg](img/image00552.jpeg)\n\
    \   图 5-6。 正在安装 Node.js\n7. 当 Node 安装完成时，单击“完成”，如图 5-7 所示。\n   ![9781484215999_Fig05-07.jpg](img/image00553.jpeg)\n\
    \   图 5-7。 Node.js 已安装\n8. 要查找已安装的 Node.js 版本，请在命令 shell 中运行以下命令：\n   ```\n  \
    \ node --version\n   ```\n   该命令的输出列出版本为 0.12.7，如图 5-8 所示。\n   ![9781484215999_Fig05-08.jpg](img/image00554.jpeg)\n\
    \   图 5-8。 查找 Node.js 版本\n9. 要测试 Node.js 安装，请使用以下脚本创建一个服务器；将脚本存储在任意目录的 `example.js`\
    \ 文件中，例如 `C:\\Program Files\\nodejs\\scripts` 目录。\n   ```\n   var http = require('http');\n\
    \   http.createServer(function (req, res) {\n     res.writeHead(200, {'Content-Type':\
    \ 'text/plain'});\n     res.end('Hello World\\n');\n   }).listen(1337, '127.0.0.1');\n\
    \   console.log('Server running at http://127.0.0.1:1337/');\n   ```\n10. 从包含脚本的目录中，使用以下命令运行脚本：\n\
    \    ```\n    node example.js\n    ```\n    脚本的输出显示在命令 shell 中，如图 5-9 所示。\n  \
    \  ![9781484215999_Fig05-09.jpg](img/image00555.jpeg)\n    图 5-9。 运行 Node.js 示例脚本\n\
    \n## 安装用于 MongoDB 的 Node.js 驱动程序\n\n打开一个新的终端/控制台，进入 `C:\\Program Files\\nodejs`。然后运行以下命令来安装用于\
    \ MongoDB 的 Node.js 驱动程序。\n\n```\nnpm install mongodb\n```\n\n用于 MongoDB 的 Node.js\
    \ 驱动程序将被安装，如图 5-10 所示。\n![9781484215999_Fig05-10.jpg](img/image00556.jpeg)\n图\
    \ 5-10。 安装用于 MongoDB 的 Node.js 驱动程序\n\n# 使用连接\n\n在以下小节中，我们将创建一个到 MongoDB 服务器的连接并创建一个数据库实例。\n\
    \n## 创建 MongoDB 连接\n\n在本节中，我们将使用用于 MongoDB 的 Node.js 驱动程序连接到 MongoDB 服务器。我们将使用\
    \ `MongoClient` 类连接到 MongoDB 服务器。`MongoClient` 构造函数不接受任何参数，其语法如下。\n\n```\nMongoClient()\n\
    ```\n\n`MongoClient` 类支持表 5-2 中讨论的方法（静态和实例）。\n\n表 5-2。 MongoClient 类方法\n\n| 方法\
    \ | 描述 |\n| --- | --- |\n| `MongoClient.connect(url, options, callback)` | 使用字符串\
    \ URI 连接到 MongoDB 服务器的静态方法。连接 URI 通常包含数据库名称，格式为 `mongodb://[username:password@]host1[:port1][,host2[:port2],...][,hostN[:portN]]/[database][?options]]`。连接\
    \ URI 的组件在表 5-3 中讨论。连接方法的 `options` 参数在表 5-6 中讨论。回调类型为 `connectCallback(error,\
    \ db)` |\n| `connect(url, options, callback)` | 连接到 MongoDB 服务器的实例方法。方法参数与静态方法相同。\
    \ |\n\n连接 URI 的组件在表 5-3 中讨论。\n\n表 5-3。 连接 URI 的组件\n\n| 组件 | 描述 |\n| --- | ---\
    \ |\n| `mongodb://` | 连接字符串中必需的前缀。 |\n| `username:password@` | 特定数据库的登录凭据。可选。\
    \ |\n| `host1` | 要连接到的 MongoDB 服务器地址，指定为主机名、IP 地址或 UNIX 域套接字。唯一必需的组件。 |\n| `:port1`\
    \ | 要连接到的端口。默认为 `:27017`。 |\n| `host2[:port2],...[,hostN[:portN]]` | 多个主机：端口配置，例如用于副本集。\
    \ |\n| `/database` | 如果指定了 `username:password@`，则为要进行身份验证连接的数据库。如果指定了 `username:password@`\
    \ 但未指定 `/database`，则对管理员数据库进行身份验证连接。 |\n| `?options` | 连接字符串选项。如果未指定 `/database`，则必须在最后一个\
    \ `hostN` 后添加 `/` 和 `?`。部分连接字符串选项在表 5-4 中讨论。连接字符串选项指定为用 `&` 或逗号分隔的名称/值对，值区分大小写。\
    \ |\n"
- fmt: "# MongoDB 连接 URI\n\n以下是一些用于连接 MongoDB 服务器的较简单的 URI 示例，适用于大多数场景：\n\n```\nmongodb://\n\
    mongodb://localhost\nmongodb://user1:password1@localhost\nmongodb://user1:password1@localhost/test\n\
    mongodb://localhost:27017,localhost:27018,localhost:27019\nmongodb://example1.com,example2.com\n\
    ```\n\n一些主要的连接字符串选项在表 5-4 中讨论。\n\n**表 5-4 连接字符串选项**\n\n| 选项 | 描述 |\n| --- | ---\
    \ |\n| `uri.replicaSet` | 如果 MongoDB 是副本集的成员，则为副本集的名称。与至少包含两个 MongoDB 实例的种子列表结合使用。\
    \ |\n| `uri.connectTimeoutMS` | 连接超时（毫秒）。默认为永不超时，具体实现取决于驱动程序。 |\n| `uri.maxPoolSize`\
    \ | 如果驱动程序支持连接池（大多数驱动都支持），则指定连接池中的最大连接数。默认为 100。 |\n| `uri.minPoolSize` | 连接池中的最小连接数。默认为\
    \ 0。 |\n| `uri.maxIdleTimeMS` | 连接在连接池中保持空闲状态的最大秒数，超过则被关闭。并非所有驱动都支持此选项。 |\n| `uri.waitQueueMultiple`\
    \ | 与 `maxPoolSize` 相乘，以提供在连接池中等待连接的最大线程数。 |\n| `uri.w` | 写关注选项，以数字或字符串指定写关注级别。不同的写关注级别在表\
    \ 5-5 中讨论。 |\n| `uri.wtimeoutMS` | 等待复制成功超时的毫秒数。默认为 0，表示永不超时。 |\n| `uri.journal`\
    \ | 如果设置为 `true`，写操作会等待 MongoDB 确认写操作并将数据提交到磁盘日志后才返回。默认为 `false`。 |\n| `uri.readPreference`\
    \ | 适用于副本集。指定读取偏好模式。值可以为 `primary`、`primaryPreferred`、`secondary`、`secondaryPreferred`、`nearest`。\
    \ |\n| `uri.authSource` | 指定与用户凭据关联的数据库名称。如果连接字符串中未指定用户名，则此设置被忽略，其值默认为连接字符串中指定的数据库。\
    \ |\n| `uri.authMechanism` | 认证机制。值可以为 `SCRAM-SHA-1`、`MONGODB-CR`、`MONGODB-X509`、`GSSAPI`\
    \ (Kerberos)、`PLAIN` (LDAP SASL)。 |\n\n写关注选项描述了写操作的保证级别，例如写操作是否已提交。不同的写关注级别在表\
    \ 5-5 中讨论。\n\n**表 5-5 写关注级别**\n\n| 级别 | 描述 |\n| --- | --- |\n| 0 | 驱动程序不确认写操作。\
    \ |\n| 1 | 基本确认级别。独立的 MongoDB 实例或副本集中的主节点确认所有写操作。 |\n| majority | 自 MongoDB 数据库\
    \ 3.0 版本起，写操作仅在副本集的大多数投票成员确认后才返回。 |\n| n | 适用于副本集。写操作仅在副本集中指定的 n 台服务器确认后才返回。不应设置为大于副本集成员数的值，否则写操作可能无限期等待副本集成员变得可用。\
    \ |\n| tags | 适用于副本集。与副本集成员配置的标签集。写操作会等待配置了这些标签的副本集成员确认。 |\n\n`connect(url, options,\
    \ callback)` 方法中的 `options` 参数支持表 5-6 中讨论的选项。\n\n**表 5-6 `connect()` 方法的选项**\n\
    \n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `uri_decode_auth` | boolean | 指定是否对用户名和密码进行\
    \ URI 解码。默认为 `false`。 |\n| `db` | object | 要设置在 `Db` 对象上的选项哈希。默认值为 `null`。 |\n\
    | `server` | object | 要设置在服务器对象上的选项哈希。默认值为 `null`。 |\n| `replSet` | object | 要设置在\
    \ `replSet` 对象上的选项哈希。默认值为 `null`。 |\n| `mongos` | object | 要设置在 mongos 对象上的选项哈希。默认值为\
    \ `null`。 |\n| `promiseLibrary` | object | 供应用程序使用的 ES6 兼容的 Promise 库。默认值为 `null`。Promise\
    \ 是一个包装器函数，可与支持回调的 Node 函数一起使用，关于 Promise 的详细讨论超出了本章范围。 |\n\n`connect()` 方法的 `callback`\
    \ 参数类型为 `connectCallback(error, db)`，定义了结果的回掉格式。`error` 参数类型为 `MongoError`，表示错误实例。`db`\
    \ 参数类型为 `Db`，表示已连接的数据库。\n\n### 连接步骤\n\n1.  在 `C:\\Program Files\\nodejs\\scripts`\
    \ 目录下创建一个 `connection.js` 脚本。Node.js 中连接到 MongoDB 的唯一可用方法是 `connect()` 方法，该方法有静态版本和实例版本，并使用连接\
    \ URI。如前所列，连接 URI 的语法如下：\n\n    ```\n    mongodb://[username:password@]host1[:port1][,host2[:port2],...[,hostN[:portN]]][/[database][?options]]\n\
    \    ```\n\n    连接 URL 的必需部分是 `mongodb://host1`。`port1` 默认为 `:27017`。如果不使用副本集（本章中我们不会使用），则不需要\
    \ `host2[:port2],...[,hostN[:portN]]` 段。我们也不会使用连接凭据 `username:password`。\n\n2.\
    \  使用 `require` 语句从 `mongodb` 模块导入 `MongoClient` 类，如下所示：\n\n    ```\n    MongoClient\
    \ = require('mongodb').MongoClient;\n    ```\n\n3.  创建一个 `MongoClient` 实例：\n\n\
    \    ```\n    var mongoclient = new MongoClient();\n    ```\n\n    接下来，我们将使用 `connect(url,\
    \ options, callback)` 方法进行连接，其中第一个参数是连接 URI，第二个是选项，第三个是回调函数。回调函数在 `connect()`\
    \ 方法完成后调用。回调函数的第一个参数是发生错误时的 `MongoError` 对象或 `null`，第二个参数是初始化的 `Db` 对象。\n\n4.\
    \  使用 `connect()` 方法连接到 MongoDB 服务器，并在连接 URI 中指定数据库为 `test`。在回调函数的方法块中，如果发生错误则将错误消息记录到控制台，否则记录一条消息表明连接已建立。\n\
    \n    ```\n    mongoclient.connect(\"mongodb://localhost:27017/test\", function(error,\
    \ db) {\n        if (error)\n            console.log(error);\n        else\n \
    \           console.log('Connected with MongoDB');\n    });\n    ```\n\n    静态方法\
    \ `MongoClient.connect()` 也可用于连接到 MongoDB 服务器，并支持与实例方法 `connect()` 相同的参数。\n\n\
    \    `connection.js` 脚本如下：\n\n    ```\n    MongoClient = require('mongodb').MongoClient;\n\
    \    var mongoclient = new MongoClient();\n    mongoclient.connect(\"mongodb://localhost:27017/test\"\
    , function(error, db) {\n        if (error)\n            console.log(error);\n\
    \        else\n            console.log('Connected with MongoDB');\n    });\n \
    \   ```\n\n5.  打开一个新的终端/控制台，导航到 `C:\\Program Files\\nodejs`。使用以下命令在 Node.js 中运行\
    \ `connection.js` 脚本。"
  raw: '|    The following are some of the simpler URI examples to connect to MongoDB
    server and are suitable for most purposes.    ``` mongodb:// mongodb://localhost
    mongodb://user1:password1@localhost mongodb://user1:password1@localhost/test mongodb://localhost:27017,localhost:27018,localhost:27019
    mongodb://example1.com,example2.com ```    Some of the main connection string
    options are discussed in [Table 5-4](#part0011.xhtml#Tab4).    [Table 5-4](#part0011.xhtml#_Tab4).
    Connection String Options     | Option | Description | | --- | --- | | `uri.replicaSet`
    | Name of the replica set if the MongoDB is a member of the replica set. Used
    in conjunction with a seed list of at least two MongoDB instances. | | `uri.connectTimeoutMS`
    | Connection timeout in milliseconds. Default is to never time out and implementation
    is driver specific. | | `uri.maxPoolSize` | If the driver supports connection
    pooling and most drivers do, the maximum number of connections in the connection
    pool. Default is 100. | | `uri.minPoolSize` | Minimum number of connections in
    the connection pool. Default is 0. | | `uri.maxIdleTimeMS` | Maximum number of
    seconds a connection may stay idle in a connection pool before being closed. Option
    not supported by all drivers. | | `uri.waitQueueMultiple` | Multiplied with `maxPoolSize`
    to provide the maximum number of threads that wait for a connection in a connection
    pool. | | `uri.w` | Write concern option that specifies the level of write concern
    as a number or a string. The different levels of write concern are discussed in
    [Table 5-5](#part0011.xhtml#Tab5). | | `uri.wtimeoutMS` | The wait time in milliseconds
    for the replication to succeed before timing out. Default is 0, which never times
    out. | | `uri.journal` | If set to true write operations wait until MongoDB acknowledges
    the write operations and commits the data to the on disk journal. Default is false.
    | | `uri.readPreference` | Applies to replica sets. Specifies the read preference
    mode. Value could be `primary``primaryPreferred``secondary``secondaryPreferred``nearest`
    | | `uri.authSource` | Specifies the database name associated with the user credentials.
    Setting ignored if the connection string does not specify a user name and the
    value defaults to the database specified in the connection string. | | `uri.authMechanism`
    | Authentication mechanism. Value could be`SCRAM-SHA-1``MONGODB-CR``MONGODB-X509``GSSAPI`
    (Kerberos)`PLAIN` (LDAP SASL) |    The write concern options describe the guarantees
    of a write operation such as whether the write operation has been committed. The
    different levels of the write concern are discussed in [Table 5-5](#part0011.xhtml#Tab5).    [Table
    5-5](#part0011.xhtml#_Tab5). Levels of Write Concern     | Level | Description
    | | --- | --- | | 0 | The driver does not acknowledge write operations. | | 1
    | Basic acknowledgment level. A stand-alone MongoDB instance or the primary of
    a replica set acknowledges all write operations. | | majority | Since MongoDB
    database version 3.0 the write operation returns only after the majority of the
    voting members of the replica set have acknowledged the write operation. | | n
    | Applies to replica sets. The write operation returns only after the specified
    n number of servers in the replica set have acknowledged the write operation.
    Should not be set to a value greater than the replica set members as the write
    operation could wait indefinitely for the replica set members to become available.
    | | tags | Applies to replica sets. Tag set configured with members of a replica
    set. The write operation waits until the replica set members with these tags configured
    have acknowledged the write operation. |    The `options` parameter in the `connect(url,
    options, callback)` method supports the options discussed in [Table 5-6](#part0011.xhtml#Tab6).    [Table
    5-6](#part0011.xhtml#_Tab6).


    Options for Connect() Method     | Name | Type | Description | | --- | --- | ---
    | | `uri_decode_auth` | boolean | Specifies if the username and password are to
    be uri decoded. Default is `false`. | | `db` | object | Hash of options to be
    set on the `Db` objects. Default value is `null`. | | `server` | object | Hash
    of options to be set on the server objects. Default value is `null`. | | `replSet`
    | object | Hash of options to be set on the `replSet` objects. Default value is
    `null`. | | `mongos` | object | Hash of options to be set on the mongos objects.
    Default value is `null`. | | `promiseLibrary` | object | An ES6-compatible Promise
    library for use by the application. Default value is `null`. A Promise is a wrapper
    function that may be used with Node functions that support a callback and a detailed
    discussion of promises. Promisification is beyond the scope of this chapter. |    The
    `callback` parameter of the `connect()` method is of type `connectCallback(error,
    db)` and defines the callback format for results. The `error` arg is of type `MongoError`
    and represents an error instance. The `db` arg is of type `Db` and represents
    the connected database.    1.  Create a `connection.js` script in the `C:\Program
    Files\nodejs\scripts` directory. The only method available to connect to MongoDB
    with Node is the `connect()` method, which has a `static` version and an instance
    version, and makes use of a connection URI. As listed before the syntax of the
    connection URI is as follows.                    ```     mongodb://[username:password@]host1[:port1][,host2[:port2],...[,hostN[:portN]]][/[database][?options]]     ```                    The
    required segment of the connection URL is `mongodb://host1`. The `port1` defaults
    to :27017\. The `host2[:port2],...[,hostN[:portN]]` segment is not required if
    not using a replica set, which we won’t be in this chapter. We won’t also be using
    connection credentials `username:password`.           2.  Import the `MongoClient`
    class from the `mongodb` module as follows using `require` statements.                    ```     MongoClient
    = require(''mongodb'').MongoClient;     ```           3.  Create a `MongoClient`
    instance.                    ```     var mongoclient = new MongoClient();     ```                    Next,
    we shall connect using the `connect(url, options, callback)` method in which the
    first parameter is the connection URI, the second the options, and the third the
    callback function. The callback function is called after the `connect()` method
    completes. The first arg of the callback function is an `MongoError` object if
    an error occurs or `null` and the second arg is an initialized `Db` object.           4.  Connect
    with MongoDB server using the `connect()` method and in the connection URI specify
    the database as `test`. In the method block for the callback function log an error
    message to the console if an error occurs or log a message to indicate that the
    connection got established if an error does not occur.                    ```     mongoclient.connect("mongodb://localhost:27017/test",
    function     (error, db) {          if (error)              console.log(error);         
    else              console.log(''Connected with MongoDB'');       });     ```                    The
    `static` method `MongoClient.connect()` may also be used to connect to MongoDB
    server and supports the same parameters as the instance method `connect()`.                    The
    `connection.js` script is listed:                    ```     MongoClient = require(''mongodb'').MongoClient;     var
    mongoclient = new MongoClient();     mongoclient.connect("mongodb://localhost:27017/test",
    function     (error, db) {          if (error)              console.log(error);         
    else              console.log(''Connected with MongoDB'');       });     ```           5.  Open
    a new terminal/console and navigate to `C:\Program Files\nodejs`. Run the connection.js
    script in Node.js with the following command.'
  trans: "# MongoDB 连接字符串\n\n以下是一些用于连接 MongoDB 服务器的较简单的连接字符串示例，适用于大多数场景：\n\n```\n\
    mongodb://\nmongodb://localhost\nmongodb://user1:password1@localhost\nmongodb://user1:password1@localhost/test\n\
    mongodb://localhost:27017,localhost:27018,localhost:27019\nmongodb://example1.com,example2.com\n\
    ```\n\n一些主要的连接字符串选项在表 5-4 中讨论。\n\n**表 5-4 连接字符串选项**\n\n| 选项 | 描述 |\n| --- | ---\
    \ |\n| `uri.replicaSet` | 如果 MongoDB 是副本集的成员，则为副本集的名称。与至少包含两个 MongoDB 实例的种子列表结合使用。\
    \ |\n| `uri.connectTimeoutMS` | 连接超时（毫秒）。默认为永不超时，具体实现取决于驱动程序。 |\n| `uri.maxPoolSize`\
    \ | 如果驱动程序支持连接池（大多数驱动都支持），则指定连接池中的最大连接数。默认为 100。 |\n| `uri.minPoolSize` | 连接池中的最小连接数。默认为\
    \ 0。 |\n| `uri.maxIdleTimeMS` | 连接在连接池中保持空闲状态的最大毫秒数，超过则被关闭。并非所有驱动都支持此选项。 |\n|\
    \ `uri.waitQueueMultiple` | 与 `maxPoolSize` 相乘，以提供在连接池中等待连接的最大线程数。 |\n| `uri.w`\
    \ | 写关注选项，以数字或字符串指定写关注级别。不同的写关注级别在表 5-5 中讨论。 |\n| `uri.wtimeoutMS` | 等待复制成功超时的毫秒数。默认为\
    \ 0，表示永不超时。 |\n| `uri.journal` | 如果设置为 `true`，写操作会等待 MongoDB 确认写操作并将数据提交到磁盘日志后才返回。默认为\
    \ `false`。 |\n| `uri.readPreference` | 适用于副本集。指定读取偏好模式。值可以为 `primary`、`primaryPreferred`、`secondary`、`secondaryPreferred`、`nearest`。\
    \ |\n| `uri.authSource` | 指定与用户凭据关联的数据库名称。如果连接字符串中未指定用户名，则此设置被忽略，其值默认为连接字符串中指定的数据库。\
    \ |\n| `uri.authMechanism` | 认证机制。值可以为 `SCRAM-SHA-1`、`MONGODB-CR`、`MONGODB-X509`、`GSSAPI`\
    \ (Kerberos)、`PLAIN` (LDAP SASL)。 |\n\n写关注选项描述了写操作的保证级别，例如写操作是否已提交。不同的写关注级别在表\
    \ 5-5 中讨论。\n\n**表 5-5 写关注级别**\n\n| 级别 | 描述 |\n| --- | --- |\n| 0 | 驱动程序不确认写操作。\
    \ |\n| 1 | 基本确认级别。独立的 MongoDB 实例或副本集中的主节点确认所有写操作。 |\n| majority | 自 MongoDB 数据库\
    \ 3.0 版本起，写操作仅在副本集的大多数投票成员确认后才返回。 |\n| n | 适用于副本集。写操作仅在副本集中指定的 n 台服务器确认后才返回。不应设置为大于副本集成员数的值，否则写操作可能无限期等待副本集成员变得可用。\
    \ |\n| tags | 适用于副本集。与副本集成员配置的标签集。写操作会等待配置了这些标签的副本集成员确认。 |\n\n`connect(url, options,\
    \ callback)` 方法中的 `options` 参数支持表 5-6 中讨论的选项。\n\n**表 5-6 `connect()` 方法的选项**\n\
    \n| 名称 | 类型 | 描述 |\n| --- | --- | --- |\n| `uri_decode_auth` | boolean | 指定是否对用户名和密码进行\
    \ URI 解码。默认为 `false`。 |\n| `db` | object | 要设置在 `Db` 对象上的选项哈希。默认值为 `null`。 |\n\
    | `server` | object | 要设置在服务器对象上的选项哈希。默认值为 `null`。 |\n| `replSet` | object | 要设置在\
    \ `replSet` 对象上的选项哈希。默认值为 `null`。 |\n| `mongos` | object | 要设置在 mongos 对象上的选项哈希。默认值为\
    \ `null`。 |\n| `promiseLibrary` | object | 供应用程序使用的 ES6 兼容的 Promise 库。默认值为 `null`。Promise\
    \ 是一个包装器函数，可与支持回调的 Node 函数一起使用，关于 Promise 的详细讨论超出了本章范围。 |\n\n`connect()` 方法的 `callback`\
    \ 参数类型为 `connectCallback(error, db)`，定义了结果的回调格式。`error` 参数类型为 `MongoError`，表示错误实例。`db`\
    \ 参数类型为 `Db`，表示已连接的数据库。\n\n### 连接步骤\n\n1.  在 `C:\\Program Files\\nodejs\\scripts`\
    \ 目录下创建一个 `connection.js` 脚本。Node.js 中连接到 MongoDB 的唯一可用方法是 `connect()` 方法，该方法有静态版本和实例版本，并使用连接字符串。如前所列，连接字符串的语法如下：\n\
    \n    ```\n    mongodb://[username:password@]host1[:port1][,host2[:port2],...[,hostN[:portN]]][/[database][?options]]\n\
    \    ```\n\n    连接 URL 的必需部分是 `mongodb://host1`。`port1` 默认为 `:27017`。如果不使用副本集（本章中我们不会使用），则不需要\
    \ `host2[:port2],...[,hostN[:portN]]` 段。我们也不会使用连接凭据 `username:password`。\n\n2.\
    \  使用 `require` 语句从 `mongodb` 模块导入 `MongoClient` 类，如下所示：\n\n    ```\n    MongoClient\
    \ = require('mongodb').MongoClient;\n    ```\n\n3.  创建一个 `MongoClient` 实例：\n\n\
    \    ```\n    var mongoclient = new MongoClient();\n    ```\n\n    接下来，我们将使用 `connect(url,\
    \ options, callback)` 方法进行连接，其中第一个参数是连接字符串，第二个是选项，第三个是回调函数。回调函数在 `connect()` 方法完成后调用。回调函数的第一个参数是发生错误时的\
    \ `MongoError` 对象或 `null`，第二个参数是初始化的 `Db` 对象。\n\n4.  使用 `connect()` 方法连接到 MongoDB\
    \ 服务器，并在连接字符串中指定数据库为 `test`。在回调函数的方法块中，如果发生错误则将错误消息记录到控制台，否则记录一条消息表明连接已建立。\n\n\
    \    ```\n    mongoclient.connect(\"mongodb://localhost:27017/test\", function(error,\
    \ db) {\n        if (error)\n            console.log(error);\n        else\n \
    \           console.log('Connected with MongoDB');\n    });\n    ```\n\n    静态方法\
    \ `MongoClient.connect()` 也可用于连接到 MongoDB 服务器，并支持与实例方法 `connect()` 相同的参数。\n\n\
    \    `connection.js` 脚本如下：\n\n    ```\n    MongoClient = require('mongodb').MongoClient;\n\
    \    var mongoclient = new MongoClient();\n    mongoclient.connect(\"mongodb://localhost:27017/test\"\
    , function(error, db) {\n        if (error)\n            console.log(error);\n\
    \        else\n            console.log('Connected with MongoDB');\n    });\n \
    \   ```\n\n5.  打开一个新的终端/控制台，导航到 `C:\\Program Files\\nodejs`。使用以下命令在 Node.js 中运行\
    \ `connection.js` 脚本。"
- fmt: "```\n>node connection.js\n```\n\nAs the output in [Figure 5-11](#part0011.xhtml#Fig11)\
    \ indicates, the method `connect()` establishes a connection with MongoDB.\n\n\
    ![9781484215999_Fig05-11.jpg](Images/image00557.jpeg)\n\n[Figure 5-11](#part0011.xhtml#_Fig11).\
    \ Connecting with MongoDB\n\n## Using the Database\n\nIn this section we shall\
    \ discuss the `Db` class and create a MongoDB database instance. The `Db` class\
    \ constructor has the following syntax.\n\n```\nDb(databaseName, topology, options)\n\
    ```\n\nThe constructor parameters are discussed in [Table 5-7](#part0011.xhtml#Tab7).\n\
    \n[Table 5-7](#part0011.xhtml#_Tab7). Db Constructor Parameters\n\n| Parameter\
    \ | Type | Description |\n| --- | --- | --- |\n| `databaseName` | string | The\
    \ database name. |\n| `topology` | Server &#124; ReplSet &#124; Mongos | The server\
    \ topology for the server. |\n| `options` | object | Optional settings. |\n\n\
    The options supported by `Db` class constructor are discussed in [Table 5-8](#part0011.xhtml#Tab8).\n\
    \n[Table 5-8](#part0011.xhtml#_Tab8). Db Options\n\n![image](Images/image00558.jpeg)\n\
    \nThe `Db` class provides the properties discussed in [Table 5-9](#part0011.xhtml#Tab9).\n\
    \n[Table 5-9](#part0011.xhtml#_Tab9). Db Class Properties\n\n| Option | Type |\
    \ Description |\n| --- | --- | --- |\n| `serverConfig` | Server &#124; ReplSet\
    \ &#124; Mongos | Gets the current topology. |\n| `bufferMaxEntries` | number\
    \ | Gets the current `bufferMaxEntries` value. |\n| `databaseName` | string |\
    \ The database name. |\n| `options` | object | Options associated with the associated\
    \ instance. |\n| `native_parser` | boolean | Gets the current value of parameter\
    \ native_parser. |\n| `slaveOk` | boolean | Gets the current value of `slaveOk`.\
    \ |\n| `writeConcern` | object | Gets the current value of write concern. |\n\n\
    Some of the methods supported by the `Db` class are discussed in [Table 5-10](#part0011.xhtml#Tab10).\n\
    \n[Table 5-10](#part0011.xhtml#_Tab10). Db Class Methods\n\n| Method | Return\
    \ Type | Description |\n| --- | --- | --- |\n| `addUser(username, password, options,\
    \ callback)` | Promise if no callback specified. | Adds a user to the database.\
    \ |\n| `admin()` | Admin db. | Returns the Admin instance. |\n| `authenticate(username,\
    \ password, options, callback)` | Promise if no callback specified. | Authenticates\
    \ a user. |\n| `close(force, callback)` | Object. | Closes the database and underlying\
    \ connections. |\n| `collection(name, options, callback)` | Collection. | Gets\
    \ a collection. |\n| `collections(callback)` | Promise if no callback specified.\
    \ | Gets all collections for the current database instance. |\n| `command(command,\
    \ options, callback)` | Promise if no callback specified. | Runs a command. |\n\
    | `createCollection(name, options, callback)` | Promise if no callback specified.\
    \ | Creates a collection. |\n| `db(name, options)` | Db. | Creates a new database\
    \ instance. |\n| `dropCollection(name, callback)` | Promise if no callback specified.\
    \ | Drops a collection. |\n| `dropDatabase(callback)` | Promise if no callback\
    \ specified. | Drops a database. |\n| `executeDbAdminCommand(command, options,\
    \ callback)` | Promise if no callback specified. | Runs a command as admin. |\n\
    | `listCollections(filter, options)` | CommandCursor. | Lists all collections.\
    \ |\n| `logout(options, callback)` | Promise if no callback specified. | Logs\
    \ out user from server. |\n| `open(callback)` | Promise if no callback specified.\
    \ | Opens the database. |\n| `removeUser(username, options, callback)` | Promise\
    \ if no callback specified. | Removes a user from the database. |\n| `renameCollection(fromCollection,\
    \ toCollection, options, callback)` | Promise if no callback specified. | Renames\
    \ a collection. |\n\n1. Create a JavaScript script `db.js` in the `C:\\Program\
    \ Files\\nodejs\\scripts` directory.\n2. In the script we shall get a database\
    \ instance and get a list of database collections from the database. First, import\
    \ the `MongoClient` and `Db` classes from the `mongodb` module using `require`.\n\
    \n    ```\n    MongoClient = require('mongodb').MongoClient;\n    Db = require('mongodb').Db;\n\
    \    ```\n\n    A `Db` instance is not required to be created directly using the\
    \ class constructor but may be created implicitly by the `MongoClient connect()`\
    \ method as the second parameter to callback function.\n3. Create a `MongoClient`\
    \ instance.\n\n    ```\n    var mongoclient = new MongoClient();\n    ```\n4.\
    \ Connect with the database using the `connect(url, options, callback)` method.\
    \ Specify the URI as `mongodb://localhost:27017/local`, which includes the database\
    \ instance as `local`. In the method block for the callback function, log an error\
    \ message to the console if an error occurs; otherwise log the message `'Connected\
    \ with MongoDB'`.\n\n    ```\n    mongoclient.connect(\"mongodb://localhost:27017/local\"\
    , function(error, db) {\n         if (error\n             console.log(error);\n\
    \         else\n             console.log('Connected with MongoDB');\n      });\n\
    \    ```\n\n    We shall use the `listCollections(filter, options)` method to\
    \ list the collections in the local database. The `listCollections(filter, options)`\
    \ may optionally specify a filter, for example, the filter `{name: \"collection1\"\
    }` gets only the `collection1` collection. The only option supported by `listCollections()`\
    \ is `batchSize`. The `listCollections()` method returns a `CommandCursor`, which\
    \ provides several methods including the `toArray(callback)` method to return\
    \ an array of documents, the `each(callback)` method to iterate over the documents\
    \ in the collection, and the `next()` method to get the next document.\n5. Within\
    \ the method block for the callback function of the `connect()` method, output\
    \ the list of collections.\n\n    ```\n    db.listCollections().toArray(function(err,\
    \ items) {\n            console.log(items);\n            db.close();\n       \
    \   });\n    ```\n\n    The `db.js` script is listed below.\n\n    ```\n    MongoClient\
    \ = require('mongodb').MongoClient;\n    Db = require('mongodb').Db;\n      var\
    \ mongoclient = new MongoClient();\n     mongoclient.connect(\"mongodb://localhost:27017/local\"\
    , function(error, db) {\n         if (error\n             console.log(error;\n\
    \         else\n             console.log('Connected with MongoDB');\n    db.listCollections().toArray(function(err,\
    \ items) {\n            console.log(items);\n            db.close();\n       \
    \   });\n    });\n    ```\n6. Open a new terminal/window and navigate to `C:\\\
    Program Files\\nodejs`. Run the `db.js` script with the following command.\n\n\
    \    ```\n    >node db.js\n    ```\n\nThe different collections in the local database\
    \ and their options get listed as shown in [Figure 5-12](#part0011.xhtml#Fig12).\n\
    \n![9781484215999_Fig05-12.jpg](Images/image00559.jpeg)\n\n[Figure 5-12](#part0011.xhtml#_Fig12).\
    \ Listing Collections in Local Database\n\nThe `Db()` class constructor creates\
    \ a new database instance but does not create a new database as we shall demonstrate\
    \ next.\n\n1. Using the same script `db.js`, comment out the section of code for\
    \ the `mongoclient.connect()` method invocation. Add a `require` statement for\
    \ the `Server` class.\n\n    ```\n    Server = require('mongodb').Server;\n  \
    \  ```\n2. Create a new instance of `Db` using the class constructor new `Db(databaseName,\
    \ topology, options)` with database name as `'mongo'` and topology created using\
    \ the `Server` class with host as `localhost` and port as 27017.\n\n    ```\n\
    \    var db = new Db('mongo', new Server('localhost', 27017));\n    ```\n3. Open\
    \ a connection with the database using the `open(callback)` method. The callback\
    \ type for the `open()` method is `openCallback(error, db)`. Log error if generated.\
    \ Output a list of collections using the `Db` instance returned if open is successful.\n\
    \n    ```\n    db.\n```"
