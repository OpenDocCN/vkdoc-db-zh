    : [ { role: "clusterAdmin", db: "admin" },                                  {
    role: "readAnyDatabase", db: "admin" },                                  "readWrite"                                 
    ] },                    { w: "majority" , wtimeout: 5000 } )     ```                    A
    new user called `hive` gets added as shown in [Figure 11-14](#part0017.xhtml#Fig14).                    ![9781484215999_Fig11-14.jpg](Images/image00704.jpeg)                    [Figure
    11-14](#part0017.xhtml#_Fig14). Adding a New User           6.  As we shall be
    using the Remote metastore we need to start the Hive server with the following
    command.                    ```     hive –service hiveserver     ```                    The
    Hive Thrift Server gets started as shown in [Figure 11-15](#part0017.xhtml#Fig15).                    ![9781484215999_Fig11-15.jpg](Images/image00705.jpeg)                    [Figure
    11-15](#part0017.xhtml#_Fig15). Starting the Hive Thrift Server           7.  Start
    the Hive shell with the following command.                    ```     hive     ```           8.  In
    the Hive shell add the MongoDB storage handler for Hive to the Hive classpath
    with the `ADD JAR` command.                    ```     hive> ADD JAR hive-mongo-0.0.3-jar-with-dependencies.jar;     ```           9.'
  trans: "\n## 创建 MongoDB 文档对象\n\n数据库集合中的 BSON 文档对象由`DBObject`接口表示。`BasicDBObject`类实现了`DBObject`接口，并提供了用于创建键/值文档对象的构造函数。使用`BasicDBObject(String\
    \ key, Object value)`构造函数创建文档对象，并使用`append(String key, Object val)`方法向对象添加键/值对。`BasicDBObject`的一个实例代表数据库集合中的一个文档对象。需要从日志数据创建三个`BasicDBObject`实例，以添加到\
    \ MongoDB 数据库集合中。\n\n`DBCollection`类提供了重载的插入方法，用于将`BasicDBObject`实例添加到集合中。使用`insert(DBObject...\
    \ arr)`方法将`BasicDBObject`实例添加到`DBCollection`。\n\n要在集合中查找文档对象，请在`DBCollection`对象上调用`findOne()`方法。\n\
    \n### `CreateMongoDBDocument`类\n\n```java\npackage mongodb;\n\nimport com.mongodb.MongoClient;\n\
    import com.mongodb.DB;\nimport import com.mongodb.DBCollection;\nimport com.mongodb.BasicDBObject;\n\
    import com.mongodb.DBObject;\nimport com.mongodb.ServerAddress;\nimport java.util.Arrays;\n\
    import java.net.UnknownHostException;\n\npublic class CreateMongoDBDocument {\n\
    \    public static void main(String[] args) {\n        try {\n            MongoClient\
    \ mongoClient = new MongoClient(\n                    Arrays.asList(new ServerAddress(\"\
    10.0.2.15\", 27017)));\n            DB db = mongoClient.getDB(\"test\");\n   \
    \         DBCollection coll = db.createCollection(\"wlslog\", null);\n\n     \
    \       BasicDBObject row1 = new BasicDBObject(\"TIME_STAMP\",\n             \
    \       \"Apr-8-2014-7:06:16-PM-PDT\").append(\"CATEGORY\", \"Notice\")\n    \
    \                .append(\"TYPE\", \"WebLogicServer\")\n                    .append(\"\
    SERVERNAME\", \"AdminServer\")\n                    .append(\"CODE\", \"BEA-000365\"\
    ).append(\"MSG\", \"Server state changed to STANDBY\");\n            coll.insert(row1);\n\
    \n            BasicDBObject row2 = new BasicDBObject(\"TIME_STAMP\",\n       \
    \             \"Apr-8-2014-7:06:17-PM-PDT\").append(\"CATEGORY\", \"Notice\")\n\
    \                    .append(\"TYPE\", \"WebLogicServer\")\n                 \
    \   .append(\"SERVERNAME\", \"AdminServer\")\n                    .append(\"CODE\"\
    , \"BEA-000365\").append(\"MSG\", \"Server state changed to STARTING\");\n   \
    \         coll.insert(row2);\n\n            BasicDBObject row3 = new BasicDBObject(\"\
    TIME_STAMP\",\n                    \"Apr-8-2014-7:06:18-PM-PDT\").append(\"CATEGORY\"\
    , \"Notice\")\n                    .append(\"TYPE\", \"WebLogicServer\")\n   \
    \                 .append(\"SERVERNAME\", \"AdminServer\")\n                 \
    \   .append(\"CODE\", \"BEA-000360\").append(\"MSG\", \"Server started in RUNNING\
    \ mode\");\n            coll.insert(row3);\n\n            DBObject catalog = coll.findOne();\n\
    \            System.out.println(row1);\n\n        } catch (UnknownHostException\
    \ e) {\n            e.printStackTrace();\n        }\n    }\n}\n```\n\n### 运行应用程序\n\
    \n要将 BSON 文档对象添加到 MongoDB，请运行 Java 应用程序。右键单击`CreateMongoDBDocument.java`源文件，然后选择\
    \ **运行方式** ![image](img/image00406.jpeg) **Java 应用程序**，如图 11-11 所示。\n\n![9781484215999_Fig11-11.jpg](img/image00701.jpeg)\n\
    \n**图 11-11**. 运行 Java 应用程序 `CreateMongoDBDocument.java`\n\n这样就创建了一个 MongoDB 文档存储。\n\
    \n添加到文档存储的其中一个文档对象会在 Eclipse IDE 控制台中输出，如图 11-12 所示。\n\n![9781484215999_Fig11-12.jpg](img/image00702.jpeg)\n\
    \n**图 11-12**. 添加的 MongoDB 对象\n\n每个 BSON 文档对象会自动添加一个`_id`键。\n\n```json\n{\n  \"\
    _id\" : { \"$oid\" : \"53a6cf25e4b09cac451ef1d6\" },\n  \"TIME_STAMP\" : \"Apr-8-2014-7:06:16-PM-PDT\"\
    ,\n  \"CATEGORY\" : \"Notice\",\n  \"TYPE\" : \"WebLogicServer\",\n  \"SERVERNAME\"\
    \ : \"AdminServer\",\n  \"CODE\" : \"BEA-000365\",\n  \"MSG\" : \"Server state\
    \ changed to STANDBY\"\n}\n```\n\n## 在 Hive 中创建外部表\n\n创建了 MongoDB 数据存储后，我们将使用\
    \ Hive MongoDB Storage Handler 在该数据存储上创建一个 Hive 外部表。MongoDB 存储处理器的`TBLPROPERTIES`需要`mongo.user`和`mongo.password`属性，因此我们需要先创建一个用户。我们将首先创建一个\
    \ MongoDB 用户，然后继续创建外部表。\n\n1.  使用以下命令启动 MongoDB 服务器 shell。\n    ```shell\n   \
    \ >mongod\n    ```\n\n2.  创建另一个用户的用户必须具有`createUser`操作权限。首先，创建一个具有`createUser`操作权限的管理员用户。`use\
    \ admin`命令将数据库设置为`admin`。使用`db.addUser()`或`db.createUser()`方法添加一个名为`hive`的用户。使用`db.auth()`方法对管理员用户进行身份验证。\n\
    \    ```shell\n    >use admin\n    >db.addUser('hive', 'hive');\n    >db.auth('hive','hive');\n\
    \    ```\n    Mongo shell 命令的输出如图 11-13 所示。\n    ![9781484215999_Fig11-13.jpg](img/image00703.jpeg)\n\
    \    **图 11-13**. 运行 Mongo Shell 命令\n\n3.  关闭服务器。\n    ```shell\n    >db.shutdownServer()\n\
    \    ```\n\n4.  启动 MongoDB 服务器，并以管理员用户`hive`登录到 shell，使用以下命令。\n    ```shell\n\
    \    mongo --port 27017 -u hive -p hive --authenticationDatabase admin\n    ```\n\
    \n5.  MongoDB shell 连接到`test`数据库。使用以下命令创建一个名为`hive`的用户。\n    ```javascript\n \
    \   db.createUser( { \"user\" : \"hive\",\n                     \"pwd\": \"hive\"\
    ,\n                     \"roles\" : [ { role: \"clusterAdmin\", db: \"admin\"\
    \ },\n                                 { role: \"readAnyDatabase\", db: \"admin\"\
    \ },\n                                 \"readWrite\"\n                       \
    \        ]\n                   },\n                   { w: \"majority\" , wtimeout:\
    \ 5000 } )\n    ```\n    一个名为`hive`的新用户被添加，如图 11-14 所示。\n    ![9781484215999_Fig11-14.jpg](img/image00704.jpeg)\n\
    \    **图 11-14**. 添加新用户\n\n6.  由于我们将使用远程元存储，我们需要使用以下命令启动 Hive 服务器。\n    ```shell\n\
    \    hive –service hiveserver\n    ```\n    Hive Thrift Server 启动，如图 11-15 所示。\n\
    \    ![9781484215999_Fig11-15.jpg](img/image00705.jpeg)\n    **图 11-15**. 启动 Hive\
    \ Thrift Server\n\n7.  使用以下命令启动 Hive shell。\n    ```shell\n    hive\n    ```\n\
    \n8.  在 Hive shell 中，使用`ADD JAR`命令将 MongoDB 存储处理器添加到 Hive 类路径。\n    ```hive\n\
    \    hive> ADD JAR hive-mongo-0.0.3-jar-with-dependencies.jar;\n    ```\n"
- fmt: "# Run a `CREATE EXTERNAL TABLE` command\n\nRun a `CREATE EXTERNAL TABLE` command\
    \ to create the Hive table `wlslog` with the following included:\n*   Set the\
    \ columns to `TIME_STAMP`, `CATEGORY`, `TYPE`, `SERVERNAME`, `CODE`, and `MSG`.\n\
    *   Set the `STORED BY` clause to `'org.yong3.hive.mongo.MongoStorageHandler'`.\n\
    *   In the `WITH SERDEPROPERTIES` clause set the `mongo.column.mapping` property\
    \ to the column names in the MongoDB document collection.\n*   In the `TBLPROPERTIES`\
    \ clause set the properties shown in [Table 11-2](#part0017.xhtml#Tab2).\n\n[Table\
    \ 11-2](#part0017.xhtml#_Tab2). Hive Table `TBLPROPERTIES` Properties\n\n| Property\
    \ | Value |\n| --- | --- |\n| `mongo.host` | `10.0.2.15` |\n| `mongo.port` | `27017`\
    \ |\n| `mongo.db` | `test` |\n| `mongo.user` | `hive` |\n| `mongo.passwd` | `hive`\
    \ |\n| `mongo.collection` | `wlslog` |\n\nThe command in the Hive shell to create\
    \ a Hive external table is `wlslog`.\n\n```sql\nhive>CREATE EXTERNAL TABLE wlslog\
    \ (TIME_STAMP string, CATEGORY string, TYPE string, SERVERNAME string, CODE string,\
    \ MSG string)\n      STORED BY 'org.yong3.hive.mongo.MongoStorageHandler'\n  \
    \    WITH SERDEPROPERTIES (\"mongo.column.mapping\"=\"TIME_STAMP,CATEGORY,TYPE,SERVERNAME,CODE,MSG\"\
    )\n      TBLPROPERTIES ( \"mongo.host\" = \"10.0.2.15\", \"mongo.port\" = \"27017\"\
    ,\n      \"mongo.db\" = \"test\", \"mongo.user\" = \"hive\", \"mongo.passwd\"\
    \ = \"hive\", \"mongo.collection\" = \"wlslog\" );\n```\n\nThe output from the\
    \ command indicates that a Hive external table gets created.\n\n# 10. Run a `SELECT`\
    \ query\n\nRun a `SELECT` query on the `wlslog` table to list the MongoDB data\
    \ as shown in [Figure 11-16](#part0017.xhtml#Fig16).\n\n![9781484215999_Fig11-16.jpg](Images/image00706.jpeg)\n\
    \n[Figure 11-16](#part0017.xhtml#_Fig16). Creating Hive External Table\n\nThe\
    \ show tables command should list the `wlslog` table added as shown in [Figure\
    \ 11-17](#part0017.xhtml#Fig17).\n\n![9781484215999_Fig11-17.jpg](Images/image00707.jpeg)\n\
    \n[Figure 11-17](#part0017.xhtml#_Fig17). Listing Hive Tables\n\n# Summary\n\n\
    In this chapter we created a Hive external table on MongoDB using the MongoDB\
    \ Storage Handler for Hive. A Hive external table is suitable if the data is to\
    \ be managed externally, as by MongoDB database in this chapter. In the next chapter\
    \ we shall integrate MongoDB data into Oracle Database in Oracle Data Integrator.\n\
    \n# CHAPTER 12 Integrating MongoDB with Oracle Database in Oracle Data Integrator\n\
    \n![image](Images/image00404.jpeg)\n\nMongoDB is a BSON (binary JSON) format NoSQL\
    \ database and the leading NoSQL database. Oracle Database is the leading relational\
    \ database. The use case could be to load MongoDB data into Oracle Database. Oracle\
    \ Loader for Hadoop does not support the MongoDB BSON format directly. Oracle\
    \ Loader for Hadoop supports loading from Hive. A Hive external table may be defined\
    \ on a MongoDB datastore using the Hive Storage Handler for MongoDB. Oracle Data\
    \ Integrator automates the use of Oracle Loader for Hadoop with the IKM File-Hive\
    \ to Oracle knowledge module. In this chapter we shall load MongoDB data into\
    \ Oracle Database in Oracle Data Integrator. This chapter is a continuation of\
    \ [Chapter 11](#part0017.xhtml).\n\nThis chapter covers the following topics:\n\
    *   Setting up the environment\n*   Creating the physical architecture\n*   Creating\
    \ the logical architecture\n*   Creating the data models\n*   Creating the integration\
    \ project\n*   Creating the integration interface\n*   Running the interface\n\
    *   Selecting integrated data in an Oracle Database table\n\n# Setting Up the\
    \ Environment\n\nIn addition to the software used in [Chapter 11](#part0017.xhtml),\
    \ download and install the following software.\n*   Oracle Database 11g. This\
    \ chapter assumes you have Oracle Database 11g (or later) installed.\n*   Oracle\
    \ Loader for Hadoop 3.0.0. Download from `www.oracle.com/technetwork/database/database-technologies/bdc/big-data-connectors/downloads/index.html`\
    \ as part of the “Big Data Collectors” download.\n*   Oracle Data Integrator 11g.\
    \ Download Data Integrator 11g (or later) from `www.oracle.com/technetwork/middleware/data-integrator/downloads/index.html`.\n\
    \nOracle Linux is used in this chapter as in [Chapter 11](#part0017.xhtml). The\
    \ installation procedure for Oracle Database 11g and Oracle Data Integrator 11g\
    \ is too elaborate to be included in a chapter. Download Oracle Loader for Hadoop\
    \ Release 3.0.0 `oraloader-3.0.0.x86_64.zip` from `www.oracle.com/technetwork/database/database-technologies/bdc/big-data-connectors/downloads/index.html`.\
    \ Unzip the file to a directory. Two files get extracted `oraloader-3.0.0-h1.x86_64.zip`\
    \ and `oraloader-3.0.0-h2.x86_64.zip`. The `oraloader-3.0.0-h1.x86_64.zip` file\
    \ is for Apache Hadoop 1.x and `oraloader-3.0.0-h2.x86_64.zip` for CDH4 and CDH5.\
    \ As we are using CDH4.6, extract `oraloader-3.0.0-h2.x86_64.zip` on Linux as\
    \ user root with the following command.\n\n```bash\nroot>unzip oraloader-3.0.0-h2.x86_64.zip\n\
    ```\n\nOracle Loader for Hadoop 3.0.0 gets extracted to `oraloader-3.0.0-h2` directory.\
    \ Set the environment variables for Oracle Database, Oracle Data Integrator, Oracle\
    \ Loader for Hadoop, Hadoop, Hive, Java, and MongoDB in the bash shell.\n\n```bash\n\
    vi ~/.bashrc\nexport ODI_HOME=/home/dvohra/dbhome_1\nexport ORACLE_HOME=/home/oracle/app/oracle/product/11.2.0/dbhome_1\n\
    export ORACLE_SID=ORCL\nexport OLH_HOME=/mongodb/oraloader-3.0.0-h2\nexport HADOOP_PREFIX=/mongodb/hadoop-2.0.0-cdh4.6.0\n\
    export HADOOP_CONF=$HADOOP_PREFIX/etc/hadoop\nexport MONGO_HOME=/mongodb/mongodb-linux-i686-2.6.3\n\
    export HIVE_HOME=/mongodb/hive-0.10.0-cdh4.6.0\nexport HIVE_CONF=$HIVE_HOME/conf\n\
    export JAVA_HOME=/mongodb/jdk1.7.0_55\nexport HADOOP_MAPRED_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/bin\n\
    export HADOOP_HOME=/mongodb/hadoop-2.0.0-cdh4.6.0/share/hadoop/mapreduce2\nexport\
    \ HADOOP_CLASSPATH=$HADOOP_HOME/*:$HADOOP_HOME/lib/*:$HIVE_HOME/lib/*:$OLH_HOME/jlib/*:/mongodb/mongo-java-driver-2.6.3.jar:/mongodb/hive-mongo-0.0.3-jar-with-dependencies.jar:$HIVE_CONF:$HADOOP_CONF\n\
    export PATH=$PATH:$HADOOP_HOME/bin:$HADOOP_MAPRED_HOME::$HIVE_HOME/bin:$MONGO_HOME/bin:$ORACLE_HOME/bin\n\
    ```\n\nWe shall use the Hive table created over MongoDB in [Chapter 11](#part0017.xhtml)\
    \ to integrate MongoDB data to Oracle Database. Create the target database table\
    \ in Oracle Database with the following SQL script.\n\n```sql\nCREATE TABLE OE.wlslog\
    \ (time_stamp VARCHAR2(255), category VARCHAR2(255), type VARCHAR2(255), servername\
    \ VARCHAR2(255), code VARCHAR2(255), msg VARCHAR2(255));\n```\n\nThe output from\
    \ the `CREATE TABLE` SQL statement is shown in [Figure 12-1](#part0018.xhtml#Fig1).\
    \ Oracle Database table `OE.WLSLOG` has the same column names as the Hive external\
    \ table from which data is to be loaded.\n\n![9781484215999_Fig12-01.jpg](Images/image00708.jpeg)\n\
    \n[Figure 12-1](#part0018.xhtml#_Fig1). Creating Oracle Database Table\n\nAs discussed\
    \ in [Chapter 11](#part0017.xhtml), add data to MongoDB datastore in a Java application.\
    \ Create a Hive external table `wlslog` also as discussed in [Chapter 11](#part0017.xhtml).\
    \ Start the Hive remote metastore with the following command.\n\n```bash\nhive\
    \ –service hiveserver\n```\n\nHive server gets started as shown in [Figure 12-2](#part0018.xhtml#Fig2).\n\
    \n![9781484215999_Fig12-02.jpg](Images/image00709.jpeg)\n\n[Figure 12-2](#part0018.xhtml#_Fig2).\
    \ Starting Hive Server\n\nAs we are using Oracle Data Integrator (ODI), we need\
    \ to install ODI, create the repositories, and connect to repositories for defining\
    \ the physical and logical architecture and the models and the interface for mapping\
    \ the source datastore to the target datastore. Oracle Data Integrator Studio\
    \ is launched with the following command.\n\n```bash\ncd /home/dvohra/dbhome_1/oracledi/client\n\
    sh odi.sh\n```\n\n# Creating the Physical Architecture\n\nThe physical architecture\
    \ consists of the data servers and the physical schemas."
