    \n```\n>use local\n>show collections\n>db.catalog.find()\n```\n\n迁移到 MongoDB 的两个文档被列出，如\
    \ [Figure 6-18](#part0012.xhtml#Fig18) 所示。\n![9781484215999_Fig06-18.jpg](Images/image00608.jpeg)\n\
    [Figure 6-18](#part0012.xhtml#_Fig18). 列出迁移的文档\n\n## Summary\n\n在本章中，我们使用 Eclipse\
    \ IDE 中的 Java 应用程序将 Apache Cassandra 表迁移到 MongoDB 服务器。首先，我们使用 Cassandra Java 驱动程序向\
    \ Cassandra 添加文档。随后，我们将 Cassandra 文档迁移到 MongoDB。\n\n在下一章中，我们将把 Couchbase 数据库文档迁移到\
    \ MongoDB。\n\n# CHAPTER 7\n\n![image](Images/image00404.jpeg)\n\n## Migrating\
    \ Couchbase to MongoDB\n\nMongoDB 和 Couchbase 都是以文档为中心的 NoSQL 数据库。两者都基于相同的数据存储模型，即\
    \ JSON，但有一个细微差别：MongoDB 基于 BSON（二进制 JSON）数据模型，这提供了更广泛的数据类型选择。Couchbase 中的 JSON\
    \ 支持相对不够成熟。MongoDB 将文档存储在集合中，这使得处理文档更加容易。Mongo 对在 Mongo shell 中运行以对文档执行 CRUD 操作的\
    \ JavaScript 方法的支持是另一个优于 Couchbase 的优势。为了利用 MongoDB 中的这些附加功能，将文档从 Couchbase 迁移到\
    \ MongoDB 可能是有利的。在本章中，我们将把 Couchbase 文档迁移到 MongoDB。本章涵盖以下主题：\n\n*   设置环境\n*  \
    \ 创建 Maven 项目\n*   创建 Java 类\n*   配置 Maven 项目\n*   向 Couchbase 添加文档\n*   创建 Couchbase\
    \ 视图\n*   将 Couchbase 文档迁移到 MongoDB\n\n### Setting Up the Environment\n\n我们需要为本章下载以下软件。\n\
    \n*   Couchbase Server Community 或 Enterprise Edition 3.0.x（或更高版本） `couchbase-server-enterprise_3.0.3-windows_amd64.exe`\
    \ 文件，从 `www.couchbase.com/nosql-databases/downloads` 下载。双击 `exe` 文件启动安装程序并安装 Couchbase\
    \ Server。\n*   适用于 Java EE 开发者的 Eclipse IDE，从 `www.eclipse.org/downloads/` 下载。\n\
    *   MongoDB 3.05（或更高版本）Windows 二进制文件 `mongodb-win32-x86_64-3.0.5-signed.msi`，从\
    \ `www.mongodb.org/downloads` 下载。双击 `mongodb-win32-x86_64-3.0.5-signed` 文件安装 MongoDB\
    \ 3.05。将 `bin` 目录（例如 `C:\\Program Files\\MongoDB\\Server\\3.0\\bin`）添加到 `PATH`\
    \ 环境变量中。\n*   Java 7，从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
    \ 下载。\n\n如果尚未为前面的章节创建，请为 MongoDB 数据创建一个目录 `C:\\data\\db`。从命令 shell 启动 MongoDB\
    \ 的命令如下。\n\n```\n>mongod\n```\n\nMongoDB 启动并在端口 27017 上等待连接。\n\n登录 Couchbase 控制台。在\
    \ Couchbase 管理控制台（通过 URL `localhost:8091` 访问）中单击 Data Buckets。默认存储桶应列在 Couchbase\
    \ Buckets 中。单击默认存储桶的 Documents 按钮。默认情况下，存储桶最初不应包含任何文档，如 [Figure 7-1](#part0013.xhtml#Fig1)\
    \ 所示。\n![9781484215999_Fig07-01.jpg](Images/image00609.jpeg)\n[Figure 7-1](#part0013.xhtml#_Fig1).\
    \ 空的 Couchbase 存储桶 default\n\n### Creating a Maven Project\n\n我们将使用一个 Maven 项目来创建\
    \ Couchbase 文档，随后将 Couchbase 文档迁移到 MongoDB。接下来，在 Eclipse 中创建一个 Maven 项目。\n\n1.\
    \  选择 File ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg)\
    \ Other。\n2.  在 New 窗口中，选择 Maven ![image](Images/image00406.jpeg) Maven Project\
    \ 并单击 Next，如 [Figure 7-2](#part0013.xhtml#Fig2) 所示。\n    ![9781484215999_Fig07-02.jpg](Images/image00610.jpeg)\n\
    \    [Figure 7-2](#part0013.xhtml#_Fig2). 选择 Maven ![image](Images/image00406.jpeg)\
    \ Maven Project\n3.  在 New Maven Project 向导中，选中 “Create a simple project” 复选框和\
    \ “Use default Workspace location” 复选框，然后单击 Next，如 [Figure 7-3](#part0013.xhtml#Fig3)\
    \ 所示。\n    ![9781484215999_Fig07-03.jpg](Images/image00611.jpeg)\n    [Figure\
    \ 7-3](#part0013.xhtml#_Fig3). 创建新的 Maven 项目\n4.  要创建 Maven 项目，请指定以下内容并单击 Finish，如\
    \ [Figure 7-4](#part0013.xhtml#Fig4) 所示。\n    *   Group Id: `com.mongodb.migration`\n\
    \    *   Artifact Id: `CouchbaseToMongoDB`\n    *   Version: `1.0`"
