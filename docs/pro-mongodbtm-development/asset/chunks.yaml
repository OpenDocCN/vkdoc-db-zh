    \n[Figure 3-8](#part0009.xhtml#_Fig8). Output from the collection.php Script\n\
    \n## Dropping a Collection\n\nThe `MongoCollection::drop()` method drops a collection\
    \ and does not have any parameters.\n\nCreate a PHP script `dropCollection.php`\
    \ in the `C:\\php` directory. In a `try`-`catch` statement create a `MongoCollection`\
    \ instance. Invoke the `drop()` method to drop the collection.\n\n```\n$collection->drop();\n\
    ```\n\nThe `dropCollection.php` script is listed:\n\n```php\n<?php\ntry\n{\n$connection\
    \ = new MongoClient();\n$collection=$connection->local->catalog;\n$collection->drop();\n\
    echo '<p>Collection Dropped</p>';\n}catch (MongoConnectionException $e)\n{\n \
    \   echo '<p>Couldn\\'t connect to mongodb</p>';\n    exit(); \n} \n?>\n```\n\n\
    Run the PHP script in the browser with URL `http://localhost:8000/dropCollection.php`\
    \ as shown in [Figure 3-9](#part0009.xhtml#Fig9).\n\n![9781484215999_Fig03-09.jpg](Images/image00486.jpeg)\n\
    \n[Figure 3-9](#part0009.xhtml#_Fig9). Dropping a Collection\n\nThe `catalog`\
    \ collection gets dropped as indicated by the `show collections` method run before\
    \ and after running the `dropCollection.php` script in [Figure 3-10](#part0009.xhtml#Fig10).\n\
    \n![9781484215999_Fig03-10.jpg](Images/image00487.jpeg)\n\n[Figure 3-10](#part0009.xhtml#_Fig10).\
    \ Listing Collections Before and After Dropping a Collection\n\n## Using Documents\n\
    \nIn the following subsections we shall discuss adding, querying, updating, and\
    \ deleting a document in MongoDB server using the PHP MongoDB Driver.\n\n### Adding\
    \ a Document\n\nThe `MongoCollection::insert` method is used to add a single document\
    \ to MongoDB. The `insert()` method takes parameters.\n\n```\nMongoCollection::insert\
    \ ( array|object $document [, array $options = array() ] )\n```\n\nThe first parameter\
    \ is an array or an object and if the parameter does not provide an `_id` key\
    \ a new `MongoId` instance is created and assigned to it. The `insert` method\
    \ supports the following options listed in [Table 3-5](#part0009.xhtml#Tab5).\n\
    \n[Table 3-5](#part0009.xhtml#_Tab5). Options in Insert Method\n\n| Option | Description\
    \ |\n| --- | --- |\n| `j` | To be used if journaling is enabled. Journaling is\
    \ the process of applying write operations in memory and in the on-disk journal\
    \ before applying them to data files on disk. If set to true an acknowledged write\
    \ must be received. The write operation is blocked until it is synced to the journal\
    \ on disk. The default is false. Overrides a `w` setting of '0'. |\n| `fsync`\
    \ | If journaling is enabled `fsync` is similar to `j`. If journaling is not enabled\
    \ the write operation is blocked until it is synced with data files on disk and\
    \ an acknowledged insert must be received overriding a `w` setting of '0'. |\n\
    | `socketTimeoutMS` | Specifies the time limit for socket communication and a\
    \ `MongoCursorTimeoutException` exception is thrown if the server does not respond\
    \ within this time period. The default value for MongoClient is 30,000 ms. |\n\
    | `w` | Write concern with a default value of 1. |\n| `wTimeoutMS` | For w >1\
    \ specifies the time limit in ms for acknowledgement. If write concern is not\
    \ met within the time limit a MongoCursorException exception is thrown. The default\
    \ value for `MongoClient` is 10,000. |\n\n1.  Create a PHP script `addDocument.php`\
    \ in the `C:\\php` directory. In a `try`-`catch` statement create a `MongoClient`\
    \ instance, which represents a connection, and create a `MongoCollection` instance\
    \ in `local` database for `catalog` collection.\n\n    ```php\n    $connection\
    \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    ```\n\
    \n2.  Create an array for a document to add.\n\n    ```php\n    $doc = array(\n\
    \        \"name\" => \"MongoDB\",\n        \"type\" => \"database\",\n       \
    \ \"count\" => 1,\n        \"info\" => (object)array(\"catalogId\" => 'catalog1',\
    \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
    \ => 'November December 2013',\"title\" => 'Engineering as a Service',\"author\"\
    \ => 'David A. Kelly')\n    );\n    ```\n\n3.  Add the document to the `MongoDB`\
    \ collection using the `insert()` method.\n\n    ```php\n    $status=$collection->insert($doc);\n\
    \    var_dump($status);\n    ```\n\n4.  Add catch blocks for `MongoConnectionException`\
    \ and `MongoCursorException`.\n5.  Similarly add another document to the collection.\
    \ The `addDocument.php` script is listed below.\n\n    ```php\n    <?php\n   \
    \ try\n    {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
    \    $doc = array(\n        \"name\" => \"MongoDB\",\n        \"type\" => \"database\"\
    ,\n        \"count\" => 1,\n        \"info\" => (object)array(\"catalogId\" =>\
    \ 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
    \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
    author\" => 'David A. Kelly')\n    );\n    $status=$collection->insert($doc);\n\
    \    var_dump($status);\n    print '<br/>';\n    $doc = array(\n        \"name\"\
    \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
    \        \"info\" => (object)array(\"catalogId\" => 'catalog2', \"journal\" =>\
    \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
    \ December 2013',\"title\" => 'Quintessential and Collaborative',\"author\" =>\
    \ 'Tom Haunert')\n    );\n    $status=$collection->insert($doc);\n    var_dump($status);\n\
    \    }catch ( MongoConnectionException $e )\n    {\n        echo '<p>Couldn\\\
    't connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
    \ $e) {\n     echo '<p>w option is set and the write has failed</p>';\n      \
    \  exit();\n    }\n    ?>\n    ```\n\n6.  Run the PHP script in the browser with\
    \ the URL `http://localhost:8000/addDocument.php`. The output is shown in [Figure\
    \ 3-11](#part0009.xhtml#Fig11). As indicated by the `status` message array returned\
    \ by the `insert()` method the `err` key is `NULL`, which implies no error and\
    \ the `errmsg` is also NULL. And the `ok` key is 1, which implies all database\
    \ operations completed successfully. The `n` key indicates the number of documents\
    \ affected, which is 0 for an insert. The `n` for an update, upsert, or remove\
    \ would be a positive number if document/s have been updated, upserted, or removed.\n\
    \n![9781484215999_Fig03-11.jpg](Images/image00488.jpeg)\n\n[Figure 3-11](#part0009.xhtml#_Fig11).\
    \ Output from the addDocument.php Script\n\nAs we did not provide a `_id` key\
    \ for the documents added, a unique `MongoId` is created automatically for the\
    \ documents added. The `_id` key or `MongoId` must be unique. Next, we shall demonstrate\
    \ that the `_id` or `MongoId` must be unique.\n\nUsing a `try`-`catch` statement\
    \ create and add a document using the `insert()` method. Invoke the `insert` method\
    \ on the same document twice.\n\n```php\n$status=$collection->insert($doc);\n\
    $status=$collection->insert($doc);\n```\n\nThe `addDocumentException.php` script\
    \ is listed:\n\n```php\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
    $doc = array(\n    \"name\" => \"MongoDB\",\n    \"type\" => \"database\",\n \
    \   \"count\" => 1,\n    \"info\" => (object)array(\"catalogId\" => 'catalog1',\
    \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
    \ => 'November December 2013',\"title\" => 'Engineering as a Service',\"author\"\
    \ => 'David A. Kelly')\n);\n$status=$collection->insert($doc);\nvar_dump($status);\n\
    print '<br/>';\n$status=$collection->insert($doc);\n}catch ( MongoConnectionException\
    \ $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException\
    \ $e) {\n echo '<p>w option is set and the write has failed</p>';\n    exit();\n\
    }\n?>\n```"
