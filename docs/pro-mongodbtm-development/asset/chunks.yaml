    documents imported to MongoDB Server get listed as shown in [Figure 8-5](#part0014.xhtml#Fig5).    ![9781484215999_Fig08-05.jpg](Images/image00634.jpeg)    [Figure
    8-5](#part0014.xhtml#_Fig5).


    The 7 Documents Transferred to MongoDB Server    Summary    In this chapter we
    transferred Oracle Database table data to MongoDB Server. First, we created an
    Oracle Database table. As a direct data transfer tool is not available, first
    we exported the Oracle Database table to a CSV file. Subsequently the CSV file
    data is transferred to MongoDB Server using the MongoDB `mongoimport` tool. In
    the next chapter we shall use Kundera, a JPA 2.0 compliant Object-Datastore Mapping
    library for NoSQL datastores.    CHAPTER 9    ![image](Images/image00404.jpeg)    Using
    Kundera with MongoDB    The Java Persistence API (JPA) is the Java API for persistence
    management and object/relational mapping in Java EE/Java SE environment with which
    a Java domain model is used to manage a relational database. JPA also provides
    a query language API with the Query interface for static and dynamic queries.
    JPA is designed primarily for relational databases, and Kundera is a JPA 2.0-compliant
    Object-Datastore Mapping library for NoSQL datastores. Kundera also supports relational
    databases and provides NoSQL datastore-specific configurations for MongoDB and
    some other NoSQL databases: Apache Cassandra, and HBase. Using the kundera-mongo
    library in the domain model MongoDB may be accessed using the JPA. In this chapter
    we shall access MongoDB with the kundera-mongo module and run CRUD (Create, Read,
    Update, and Delete) operations on MongoDB, covering the following topics:    *   Setting
    up the environment *   Creating a MongoDB collection *   Creating a Maven project
    in Eclipse *   Creating a JPA entity class *   Configuring JPA in the `persistence.xml`
    configuration file *   Creating a JPA client class *   Running JPA CRUD operations
    *   The Kundera-Mongo JPA Client class *   Installing the Maven project *   Running
    the Kundera-Mongo JPA Client class *   Invoking the `KunderaClient` methods    Setting
    Up the Environment    We shall need the following software for this chapter.    *   Eclipse
    IDE for Java EE Developers from `www.eclipse.org/downloads/`. *   MongoDB 3.0.2
    (or a later version) Windows binaries `mongodb-win32-x86_64-3.0.2-signed.msi`
    from `www.mongodb.org/dl/win32/x86_64`. Double-click on the `mongodb-win32-x86_64-3.0.2-signed`
    file to install MongoDB 3.0.2\. Add the `bin` directory, for example `C:\Program
    Files\MongoDB\Server\3.0\bin`, to the `PATH` environment variable. *   Java 7
    from `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`    The
    MongoDB versions supported by Kundera are 2.6.3+ & 3.0.2. Create a directory `C:\data\db`
    for the MongoDB data if not already created for an earlier chapter. Start MongoDB
    with the following command from a command shell.    ``` >mongod ```    MongoDB
    gets started waiting for connections on `localhost:27017`.    Creating a MongoDB
    Collection    We need to create a MongoDB collection in which to store the documents.
    Start the Mongo shell with the `mongo` command    ``` >mongo ```    Create a collection
    called `catalog` with the following commands in Mongo shell. The first command
    sets the database to `local`. The second command drops the `catalog` collection.    ```
    >use local >db.catalog.drop() >db.createCollection("catalog") ```    The `catalog`
    collection gets created as shown in [Figure 9-1](#part0015.xhtml#Fig1).    ![9781484215999_Fig09-01.jpg](Images/image00635.jpeg)    [Figure
    9-1](#part0015.xhtml#_Fig1). Creating MongoDB Collection    Creating a Maven Project
    in Eclipse    The kundera-mongo library is available as a Maven dependency. We
    shall use a Maven project to access MongoDB with the kundera-mongo library for
    which to create a Maven project in Eclipse IDE.    1.  Select File ![image](Images/image00406.jpeg)
    New ![image](Images/image00406.jpeg) Other in Eclipse IDE. 2.  Select Maven ![image](Images/image00406.jpeg)
    Maven Project in the New window as shown in [Figure 9-2](#part0015.xhtml#Fig2).
    Click on Next.          ![9781484215999_Fig09-02.'
  trans: "# 从 CSV 文件导入数据到 MongoDB\n\n```catalog1,Apr-8-2014-7:06:16-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to STANDBY catalog2,Apr-8-2014-7:06:17-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to STARTING catalog3,Apr-8-2014-7:06:18-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to ADMIN catalog4,Apr-8-2014-7:06:19-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to RESUMING catalog5,Apr-8-2014-7:06:20-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000361,Started\
    \ WebLogic AdminServer catalog6,Apr-8-2014-7:06:21-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to RUNNING catalog7,Apr-8-2014-7:06:22-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000360,Server\
    \ started in RUNNING mode```\n\n在本节中，我们将使用 `mongoimport` 工具将数据从 `wlslog.csv` 文件传输到\
    \ MongoDB 服务器。\n\n1.  使用以下命令启动 MongoDB 服务器。\n\n    ```\n    >mongod\n    ```\n\
    \n    MongoDB 在 `localhost` 的 `27017` 端口上启动，如 图 8-2 所示。\n\n    ![9781484215999_Fig08-02.jpg](img/image00631.jpeg)\n\
    \    图 8-2. 启动 MongoDB 服务器\n\n2.  运行 `mongoimport` 工具，将数据从 `wlslog.csv` 文件传输到\
    \ MongoDB 服务器。命令选项列于 表 8-2。\n\n    表 8-2. `mongoimort` 工具命令所使用的命令参数\n\n    | 选项\
    \ | 值 | 描述 |\n    | --- | --- | --- |\n    | `--db` | `wls` | MongoDB 数据库实例。该数据库无需在运行\
    \ `mongoimport` 工具之前创建，会在导入工具运行时自动创建。 |\n    | `--collection` | `wlslog` | 集合名称。该集合同样无需在运行导入工具之前创建。\
    \ |\n    | `--type` | `csv` | 输入数据的类型是 CSV。 |\n    | `--fields` | `ID`,`TIME_STAMP`,`CATEGORY`,`TYPE`,`SERVERNAME`,`CODE`,`MSG`\
    \ | 输入字段。 |\n    | `--file` | `wlslog.csv` | 输入文件。 |\n\n3.  运行以下 `mongoimport`\
    \ 命令。\n\n    ```\n    mongoimport --db wls --collection wlslog --type csv --fields\
    \ ID,TIME_STAMP,CATEGORY,TYPE,SERVERNAME,CODE,MSG --file wlslog.csv\n    ```\n\
    \n    如输出所示，数据从 `wlslog.csv` 文件传输到了 MongoDB 服务器，如 图 8-3 所示。针对 7 行输入数据，在 MongoDB\
    \ 服务器中创建了 7 个文档。\n\n    ![9781484215999_Fig08-03.jpg](img/image00632.jpeg)\n \
    \   图 8-3. 运行 `mongoimport` 工具命令\n\n# 在 MongoDB 中显示 JSON 数据\n\n以下步骤向您展示如何显示 JSON\
    \ 数据：\n\n1.  使用以下命令启动 Mongo shell。\n\n    ```\n    >mongo\n    ```\n\n2.  要使用\
    \ `wls` 数据库，请运行以下 Mongo shell 命令。\n\n    ```\n    >use wls\n    ```\n\n3.  要列出集合，请运行以下\
    \ Mongo shell 命令。\n\n    ```\n    >show collections\n    ```\n\n4.  要输出文档计数，请运行以下\
    \ Mongo shell 命令。\n\n    ```\n    >db.wlslog.count()\n    ```\n\n    上述命令的输出如\
    \ 图 8-4 所示。\n\n    ![9781484215999_Fig08-04.jpg](img/image00633.jpeg)\n    图 8-4.\
    \ 文档计数为 7\n\n5.  要列出导入到 MongoDB 服务器的文档，请运行以下 Mongo shell 命令。\n\n    ```\n    >db.wlslog.find()\n\
    \    ```\n\n    导入到 MongoDB 服务器的文档被列出，如 图 8-5 所示。\n\n    ![9781484215999_Fig08-05.jpg](img/image00634.jpeg)\n\
    \    图 8-5. 传输到 MongoDB 服务器的 7 个文档\n\n# 总结\n\n在本章中，我们将 Oracle 数据库表数据传输到了 MongoDB\
    \ 服务器。首先，我们创建了一个 Oracle 数据库表。由于没有直接的数据传输工具，我们首先将 Oracle 数据库表导出为 CSV 文件。随后，使用 MongoDB\
    \ 的 `mongoimport` 工具将 CSV 文件数据传输到 MongoDB 服务器。在下一章中，我们将使用 Kundera，一个符合 JPA 2.0\
    \ 标准的对象-数据存储映射库，用于 NoSQL 数据存储。\n\n# 第 9 章\n\n## 将 Kundera 与 MongoDB 一起使用\n\nJava\
    \ 持久化 API (JPA) 是用于在 Java EE/Java SE 环境中进行持久化管理和对象/关系映射的 Java API，它使用 Java 领域模型来管理关系数据库。JPA\
    \ 还通过 Query 接口提供了查询语言 API，用于静态和动态查询。JPA 主要为关系数据库设计，而 Kundera 是一个符合 JPA 2.0 标准的对象-数据存储映射库，用于\
    \ NoSQL 数据存储。Kundera 也支持关系数据库，并为 MongoDB 和其他一些 NoSQL 数据库（如 Apache Cassandra 和\
    \ HBase）提供特定的 NoSQL 数据存储配置。在领域模型中使用 `kundera-mongo` 库，即可通过 JPA 访问 MongoDB。在本章中，我们将使用\
    \ `kundera-mongo` 模块访问 MongoDB，并在 MongoDB 上运行 CRUD（创建、读取、更新、删除）操作，涵盖以下主题：\n\n\
    *   设置环境\n*   创建 MongoDB 集合\n*   在 Eclipse 中创建 Maven 项目\n*   创建 JPA 实体类\n*   在\
    \ `persistence.xml` 配置文件中配置 JPA\n*   创建 JPA 客户端类\n*   运行 JPA CRUD 操作\n*   Kundera-Mongo\
    \ JPA 客户端类\n*   安装 Maven 项目\n*   运行 Kundera-Mongo JPA 客户端类\n*   调用 `KunderaClient`\
    \ 方法\n\n## 设置环境\n\n本章我们将需要以下软件。\n\n*   从 `www.eclipse.org/downloads/` 下载适用于 Java\
    \ EE 开发者的 Eclipse IDE。\n*   从 `www.mongodb.org/dl/win32/x86_64` 下载 MongoDB 3.0.2（或更高版本）Windows\
    \ 二进制文件 `mongodb-win32-x86_64-3.0.2-signed.msi`。双击 `mongodb-win32-x86_64-3.0.2-signed`\
    \ 文件以安装 MongoDB 3.0.2。将 `bin` 目录（例如 `C:\\Program Files\\MongoDB\\Server\\3.0\\\
    bin`）添加到 `PATH` 环境变量中。\n*   从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
    \ 下载 Java 7。\n\nKundera 支持的 MongoDB 版本是 `2.6.3+` 和 `3.0.2`。如果之前没有为前面的章节创建过，请为\
    \ MongoDB 数据创建一个目录 `C:\\data\\db`。从命令 shell 使用以下命令启动 MongoDB。\n\n```\n>mongod\n\
    ```\n\nMongoDB 启动，等待在 `localhost:27017` 上的连接。\n\n## 创建 MongoDB 集合\n\n我们需要创建一个\
    \ MongoDB 集合来存储文档。使用 `mongo` 命令启动 Mongo shell。\n\n```\n>mongo\n```\n\n在 Mongo\
    \ shell 中使用以下命令创建一个名为 `catalog` 的集合。第一条命令将数据库设置为 `local`。第二条命令删除 `catalog` 集合。\n\
    \n```\n>use local\n>db.catalog.drop()\n>db.createCollection(\"catalog\")\n```\n\
    \n`catalog` 集合被创建，如 图 9-1 所示。\n\n![9781484215999_Fig09-01.jpg](img/image00635.jpeg)\n\
    图 9-1. 创建 MongoDB 集合\n\n## 在 Eclipse 中创建 Maven 项目\n\n`kundera-mongo` 库可作为 Maven\
    \ 依赖项使用。我们将使用一个 Maven 项目，通过 `kundera-mongo` 库访问 MongoDB，为此需要在 Eclipse IDE 中创建一个\
    \ Maven 项目。\n\n1.  在 Eclipse IDE 中选择 文件 ![image](img/image00406.jpeg) 新建 ![image](img/image00406.jpeg)\
    \ 其他。\n2.  在“新建”窗口中选择 Maven ![image](img/image00406.jpeg) Maven 项目，如 图 9-2 所示。单击\
    \ 下一步。\n\n    ![9781484215999_Fig09-02."
- fmt: "# 创建 Maven 项目并配置 JPA 实体类\n\n## 创建 Maven 项目\n\n1. 在 Eclipse 中，选择 **File** ![image](Images/image00406.jpeg)\
    \ **New** ![image](Images/image00406.jpeg) **Maven Project**，如图 9-2 所示。\n    \n\
    \    ![jpg](Images/image00636.jpeg) 图 9-2. 选择 Maven ![image](Images/image00406.jpeg)\
    \ Maven Project\n\n2. 在 **New Maven Project** 向导中，选中 **Create a simple project**\
    \ 复选框。同时选中 **Use default Workspace location** 复选框，如图 9-3 所示。点击 **Next**。\n\n \
    \   ![9781484215999_Fig09-03.jpg](Images/image00637.jpeg) 图 9-3. 新建 Maven 项目向导\n\
    \n3. 在 **New Maven** 向导的 **Configure project** 窗口中，选择以下值并点击 **Finish**，如图 9-4\
    \ 所示。\n    *   Group Id: `com.kundera.mongodb`\n    *   Artifact Id: `KunderaMongoDB`\n\
    \    *   Version: `1.0.0`\n    *   Packaging: `jar`\n    *   Name: `KunderaMongoDB`\n\
    \n    ![9781484215999_Fig09-04.jpg](Images/image00638.jpeg) 图 9-4. 配置 Maven 项目\n\
    \n    一个用于 Kundera Mongo 的 Maven 项目已创建，如 Package Explorer 中的图 9-5 所示。\n\n    ![9781484215999_Fig09-05.jpg](Images/image00639.jpeg)\
    \ 图 9-5. Maven 项目 KunderaMongoDB\n\n4. 接下来，修改 `pom.xml` 以添加 `kundera-mongo` 库和\
    \ EclipseLink 的依赖。由于我们将使用 JPA，因此需要 EclipseLink。\n\n    ```xml\n    <dependencies>\n\
    \        <dependency>\n            <groupId>com.impetus.client</groupId>\n   \
    \         <artifactId>kundera-mongo</artifactId>\n            <version>2.9</version>\n\
    \        </dependency>\n        <dependency>\n            <groupId>org.eclipse.persistence</groupId>\n\
    \            <artifactId>eclipselink</artifactId>\n            <version>2.6.0</version>\n\
    \        </dependency>\n    </dependencies>\n    ```\n\n5. 在构建配置中，指定 `maven-compiler-plugin`\
    \ 插件来编译 Maven 项目，以及 `exec-maven-plugin` 插件来运行 Maven 客户端类。对于 `exec-maven-plugin`\
    \ 插件，在 `<configuration/>` 中指定要运行的主类为 Kundera `Client` 类 `kundera.KunderaClient`，我们将在本章后面创建它。\n\
    \n    ```xml\n    <build>\n        <plugins>\n            <plugin>\n         \
    \       <artifactId>maven-compiler-plugin</artifactId>\n                <configuration>\n\
    \                    <source>1.7</source>\n                    <target>1.7</target>\n\
    \                </configuration>\n            </plugin>\n            <plugin>\n\
    \                <groupId>org.codehaus.mojo</groupId>\n                <artifactId>exec-maven-plugin</artifactId>\n\
    \                <version>1.2.1</version>\n                <configuration>\n \
    \                   <mainClass>kundera.KunderaClient</mainClass>\n           \
    \     </configuration>\n            </plugin>\n        </plugins>\n    </build>\n\
    \    ```\n\n    完整的 `pom.xml` 文件如下：\n\n    ```xml\n    <project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
    \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n        xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n        <modelVersion>4.0.0</modelVersion>\n        <groupId>com.kundera.mongodb</groupId>\n\
    \        <artifactId>KunderaMongoDB</artifactId>\n        <version>1.0.0</version>\n\
    \        <name>KunderaMongoDB</name>\n        <dependencies>\n            <dependency>\n\
    \                <groupId>com.impetus.client</groupId>\n                <artifactId>kundera-mongo</artifactId>\n\
    \                <version>2.9</version>\n            </dependency>\n         \
    \   <dependency>\n                <groupId>org.eclipse.persistence</groupId>\n\
    \                <artifactId>eclipselink</artifactId>\n                <version>2.6.0</version>\n\
    \            </dependency>\n        </dependencies>\n        <build>\n       \
    \     <plugins>\n                <plugin>\n                    <artifactId>maven-compiler-plugin</artifactId>\n\
    \                    <configuration>\n                        <source>1.7</source>\n\
    \                        <target>1.7</target>\n                    </configuration>\n\
    \                </plugin>\n                <plugin>\n                    <groupId>org.codehaus.mojo</groupId>\n\
    \                    <artifactId>exec-maven-plugin</artifactId>\n            \
    \        <version>1.2.1</version>\n                    <configuration>\n     \
    \                   <mainClass>kundera.KunderaClient</mainClass>\n           \
    \         </configuration>\n                </plugin>\n            </plugins>\n\
    \        </build>\n    </project>\n    ```\n\n## 创建 JPA 实体类\n\nJPA 对象/关系映射应用程序的领域模型在\
    \ JPA 实体类中定义。该领域模型类只是一个*普通的 Java 对象*（POJO），它描述了要持久化的 Java 对象实体、对象属性以及要持久化到的 MongoDB\
    \ 数据库和集合。在本节中，我们将使用 Kundera 和 MongoDB 数据库创建一个用于对象/关系映射的 JPA 实体类。尽管 MongoDB 不是关系型数据库，但可以使用支持某些\
    \ NoSQL 数据库的 Kundera 库与之进行对象/关系映射。\n\n1.  选择 **File** ![image](Images/image00406.jpeg)\
    \ **New** ![image](Images/image00406.jpeg) **Other**。\n2.  在 **New** 窗口中，选择 **Java**\
    \ ![image](Images/image00406.jpeg) **Class** 并点击 **Next**，如图 9-6 所示。\n    \n \
    \   ![9781484215999_Fig09-06.jpg](Images/image00640.jpeg) 图 9-6. 选择 Java ![image](Images/image00406.jpeg)\
    \ Class\n\n3.  在 **New Java Class** 向导中分配以下值，如图 9-7 所示。点击 **Finish**。\n    * \
    \  Source folder: `KunderaMongoDB/src/main/java`\n    *   Package: `kundera`\n\
    \    *   Name: `Catalog`\n\n    ![9781484215999_Fig09-07.jpg](Images/image00641.jpeg)\
    \ 图 9-7. 创建实体类 Catalog\n\n    Java 类 `kundera.Catalog` 被添加到 Maven 项目中，如图 9-8 所示。\n\
    \n    ![9781484215999_Fig09-08.jpg](Images/image00642.jpeg) 图 9-8. 实体类 Catalog\n\
    \n4.  使用 `@Entity` 注解标注 `Catalog` 类，以表明该类是一个 JPA 实体类。默认情况下，实体名称与实体类名相同。使用 `@Table`\
    \ 注解标注类以指示 MongoDB 集合名称和模式。表名是集合名 `catalog`。模式采用 `database@persistence-unit` 格式。对于\
    \ `local` 数据库和我们将在下一节配置的 `kundera` 持久性单元名称，模式是 `local@kundera`。\n\n    ```java\n\
    \    @Entity\n    @Table(name = \"catalog\", schema = \"local@kundera\")\n   \
    \ ```\n\n5.  实体类实现 `Serializable` 接口，以便在持久化到数据库时序列化启用缓存的实体 bean。要将版本号与序列化类关联，需指定一个\
    \ `serialVersionUID` 变量。\n\n    ```java\n    private static final long serialVersionUID\
    \ = 1L;\n    ```\n\n6.  使用 `@Id` 注解标注 `catalogId` 字段，以表明该字段是实体的主键。使用 `@Column`\
    \ 注解指定文档字段 `_id` 作为主键列。\n\n    ```java\n    @Id\n    @Column(name = \"_id\")\n\
    \    private String catalogId;\n    ```\n    被 `@Id` 注解的字段必须是以下类型之一：Java 基本类型（如\
    \ `int`，`double`）、任何基本包装类型（如 `Integer`，`Double`）、`String`、`java.util.Date`、`java.sql.Date`、`java.math.BigDecimal`\
    \ 或 `java.math.BigInteger`。\n\n7."
