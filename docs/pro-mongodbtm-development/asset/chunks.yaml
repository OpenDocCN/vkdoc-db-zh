  trans: "\n## 使用 Java 将 Cassandra 表迁移到 MongoDB\n\n### 步骤\n14. 使用`org.bson.Document`类的`append(String\
    \ key, Object value)`方法为`Document`添加键值对。利用从 Cassandra 结果集中获取的列名/值对，通过`append`方法创建一个完整的\
    \ BSON 文档。\n    ```\n    catalog = catalog.append(columnName, columnValue);\n\
    \    ```\n\n15. 如第 1 章所述，`MongoCollection`类提供了`insertOne(TDocument document)`方法来添加单个文档。使用`insertOne(TDocument\
    \ document)`方法保存`Document`实例。\n    ```\n    coll.insertOne(catalog);\n    ```\n\
    \n16. 接下来，输出添加到 MongoDB 集合中的文档，这也验证了文档确实已添加。可以使用`MongoCollection`中的`find()`方法获取集合中的所有文档。`find()`方法返回一个`FindIterable`对象作为结果。\n\
    \    ```\n    FindIterable<Document> iterable = coll.find();\n    ```\n\n17. 如第\
    \ 1 章所述，输出存储在`FindIterable`对象中每个文档的键值对。使用增强的`for`循环获取`FindIterable`中的`Document`实例。使用`keySet()`方法获取每个`Document`实例关联的键集合，该方法返回一个`Set<String>`对象。使用`iterator()`方法从`Set`对象创建一个`Iterator<String>`对象。使用`while`循环遍历键集，并输出每个`Document`的文档键及其关联的`Document`对象。\n\
    \    ```\n    FindIterable<Document> iterable = coll.find();\n    String documentKey\
    \ = null;\n    for (Document document : iterable) {\n        Set<String> keySet\
    \ = document.keySet();\n        Iterator<String> iter = keySet.iterator();\n \
    \       while (iter.hasNext()) {\n            documentKey = iter.next();\n   \
    \         System.out.println(documentKey);\n            System.out.println(document.get(documentKey));\n\
    \        }\n    }\n    ```\n\n18. 使用`close()`方法关闭`MongoClient`对象。\n    ```\n \
    \   mongoClient.close();\n    ```\n\n19. 同时关闭 Cassandra 的会话和集群。\n    ```\n   \
    \ session.close();\n    cluster.close();\n    ```\n\n`MigrateCassandraToMongoDB`类如下所示：\n\
    ```\npackage mongodb;\nimport java.util.Arrays;\nimport java.util.Iterator;\n\
    import java.util.Set;\nimport org.bson.Document;\nimport com.datastax.driver.core.Cluster;\n\
    import com.datastax.driver.core.ColumnDefinitions;\nimport com.datastax.driver.core.ResultSet;\n\
    import com.datastax.driver.core.Row;\nimport com.datastax.driver.core.Session;\n\
    import com.mongodb.MongoClient;\nimport com.mongodb.ServerAddress;\nimport com.mongodb.client.FindIterable;\n\
    import com.mongodb.client.MongoCollection;\nimport com.mongodb.client.MongoDatabase;\n\
    \npublic class MigrateCassandraToMongoDB {\n    private static Cluster cluster;\n\
    \    private static Session session;\n    private static MongoClient mongoClient;\n\
    \    public static void main(String[] args) {\n        cluster = Cluster.builder().addContactPoint(\"\
    127.0.0.1\").build();\n        session = cluster.connect();\n        session =\
    \ cluster.connect();\n        migrate();\n        mongoClient.close();\n     \
    \   session.close();\n        cluster.close();\n    }\n    public static void\
    \ migrate() {\n        mongoClient = new MongoClient(Arrays.asList(new ServerAddress(\n\
    \                \"localhost\", 27017)));\n        MongoDatabase db = mongoClient.getDatabase(\"\
    local\");\n        MongoCollection<Document> coll = db.getCollection(\"catalog\"\
    );\n        ResultSet results = session.execute(\"select * from datastax.catalog\"\
    );\n        for (Row row : results) {\n            ColumnDefinitions columnDefinitions\
    \ = row.getColumnDefinitions();\n            Iterator<ColumnDefinitions.Definition>\
    \ iter = columnDefinitions\n                    .iterator();\n            Document\
    \ catalog = new Document();\n            while (iter.hasNext()) {\n          \
    \      ColumnDefinitions.Definition column = iter.next();\n                String\
    \ columnName = column.getName();\n                String columnValue = row.getString(columnName);\n\
    \                catalog = catalog.append(columnName, columnValue);\n        \
    \    }\n            coll.insertOne(catalog);\n        }\n        FindIterable<Document>\
    \ iterable = coll.find();\n        String documentKey = null;\n        for (Document\
    \ document : iterable) {\n            Set<String> keySet = document.keySet();\n\
    \            Iterator<String> iter = keySet.iterator();\n            while (iter.hasNext())\
    \ {\n                documentKey = iter.next();\n                System.out.println(documentKey);\n\
    \                System.out.println(document.get(documentKey));\n            }\n\
    \        }\n    }\n}\n```\n\n要将 Cassandra 表迁移到 MongoDB，请在 Package Explorer 中右键单击`MigrateCassandraToMongoDB`类，然后选择“运行方式”\
    \ ![image](img/image00406.jpeg) “Java 应用程序”，如图 6-16 所示。\n\n![9781484215999_Fig06-16.jpg](img/image00606.jpeg)\n\
    图 6-16。运行 MigrateCassandraToMongoDB.java 应用程序\n\nApache Cassandra 表被迁移到 MongoDB。迁移到\
    \ MongoDB 的表数据也会在 Eclipse 控制台中输出，如图 6-17 所示。\n\n![9781484215999_Fig06-17.jpg](img/image00607.jpeg)\n\
    图 6-17。输出迁移的文档\n\n应用程序更详细的输出如下所示：\n```\n16:31:48.058 [main] INFO  com.datastax.driver.core.Cluster\
