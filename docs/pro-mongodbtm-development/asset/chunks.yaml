    \ Data MongoDB项目与MongoDB服务器。对MongoDB数据存储的常见CRUD操作可以通过`org.springframework.data.mongodb.core.MongoOperations`接口和`org.springframework.data.mongodb.repository.MongoRepository`来执行。本章我们讨论了使用这两个接口对MongoDB进行CRUD操作。在下一章中，我们将讨论MongoDB与Hadoop的集成，并在MongoDB之上创建一个Apache\
    \ Hive表。\n\n## 第十一章\n\n![image](Images/image00404.jpeg)\n\n## 使用MongoDB创建Apache\
    \ Hive表\n\nMongoDB是领先的NoSQL数据库。MongoDB基于BSON（二进制JSON）文档格式，该格式基于动态模式，提供了存储的灵活性。Hive\
    \ MongoDB存储处理器使得从Apache Hive访问MongoDB变得可行。可以在MongoDB文档存储上创建一个Hive外部表。在本章中，我们将在MongoDB中创建一个文档存储，然后在该MongoDB文档存储上创建一个Hive外部表。\n\
    \nApache Hadoop是一个用于大规模数据集分布式处理的框架。Apache Hadoop文件系统是Hadoop分布式文件系统（HDFS）。Apache\
    \ Hive是一个用于查询和管理存储在分布式存储上的大型数据集的软件，默认是HDFS。本章假设读者具备Apache Hadoop（参考：`https://hadoop.apache.org/`）和Apache\
