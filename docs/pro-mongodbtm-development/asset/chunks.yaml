  trans: "\n为了演示添加两个具有相同 `_id` 的文档，下面列出了用于演示 `OperationFailure` 错误的 Ruby 脚本 `addDocument.rb`：\n\
    ```ruby\nrequire 'mongo'\ninclude Mongo\n\nclient =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\nclient=client.use(:local)\ndb=client.database\ncollection=db.collection(\"\
    mongodb\")\n\ncollection.create\n\ndocument1={\n  \"_id\" => \"document1a\",\n\
    \  \"catalogId\" => \"catalog1\",\n  \"journal\" => \"Oracle Magazine\",\n  \"\
    publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"November December 2013\"\
    ,\n  \"title\" => \"Engineering as a Service\",\n  \"author\" =>  \"David A. Kelly\"\
    \n}\n\ncollection.insert_one(document1)\n\ndocument2={\n  \"_id\" => \"document1a\"\
    ,\n  \"catalogId\" => \"catalog2\",\n  \"journal\" => \"Oracle Magazine\",\n \
    \ \"publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"November December\
    \ 2013\",\n  \"title\" => \"Quintessential and Collaborative\",\n  \"author\"\
    \ =>  \"Tom Haunert\"\n}\n\ncollection.insert_one(document2)\n```\n\n当再次使用 `ruby\
    \ addDocument.rb` 运行该脚本时，会生成 `OperationFailure` 错误，如图 4-16 所示。\n![9781484215999_Fig04-16.jpg](img/image00524.jpeg)\n\
    图 4-16. 因重复键导致的 OperationFailure 错误\n\n## 添加多个文档\n\n在上一节中，我们添加了两个文档，但通过调用两次 `insert_one()`\
    \ 方法实现。`Mongo::Collection` 类提供了 `insert_many(documents, options = {})` 方法来添加多个文档。\n\
    \n1.  在 `C:\\Ruby21-x64\\mongodbscripts` 目录中创建一个 Ruby 脚本 `addDocuments.rb`。\n\
    2.  像之前一样创建一个 `Client` 实例并获取 `mongodb` 集合。为了使新添加的文档不会与 `mongodb` 集合中已有的文档产生重复键，请在运行\
    \ `addDocuments.rb` 脚本之前，使用 mongo shell 中的 `db.mongodb.drop()` 方法删除 `mongodb`\
    \ 集合。\n    ```ruby\n    client =Mongo::Client.new([ '127.0.0.1:27017' ], :database\
    \ => 'test')\n    client=client.use(:local)\n    db=client.database\n    collection=db.collection(\"\
    mongodb\")\n    collection.create\n    ```\n3.  创建两个文档的 JSON。\n    ```ruby\n \
    \   document1={\n      \"catalogId\" => \"catalog1\",\n      \"journal\" => \"\
    Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\"\
    \ =>  \"November December 2013\",\n      \"title\" => \"Engineering as a Service\"\
    ,\n      \"author\" =>  \"David A. Kelly\"\n    }\n\n    document2={\n      \"\
    catalogId\" => \"catalog2\",\n      \"journal\" => \"Oracle Magazine\",\n    \
    \  \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November December\
    \ 2013\",\n      \"title\" => \"Quintessential and Collaborative\",\n      \"\
    author\" =>  \"Tom Haunert\"\n    }\n    ```\n4.  调用 `insert_many()` 方法添加这两个文档。\n\
    \    ```ruby\n    collection.insert_many([document1,document2])\n    ```\n\n`addDocuments.rb`\
    \ 脚本内容如下：\n```ruby\nrequire 'mongo'\ninclude Mongo\nclient =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\nclient=client.use(:local)\ndb=client.database\n\
    collection=db.collection(\"mongodb\")\ncollection.create\ndocument1={\n  \"catalogId\"\
    \ => \"catalog1\",\n  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" =>\
    \ \"Oracle Publishing\",\n  \"edition\" =>  \"November December 2013\",\n  \"\
    title\" => \"Engineering as a Service\",\n  \"author\" =>  \"David A. Kelly\"\n\
    }\n\ndocument2={\n  \"catalogId\" => \"catalog2\",\n  \"journal\" => \"Oracle\
    \ Magazine\",\n  \"publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"\
    November December 2013\",\n  \"title\" => \"Quintessential and Collaborative\"\
    ,\n  \"author\" =>  \"Tom Haunert\"\n}\n\ncollection.insert_many([document1,document2])\n\
    ```\n\n使用 `ruby addDocuments.rb` 运行脚本。`addDocuments.rb` 脚本的输出如图 4-17 所示。\n![9781484215999_Fig04-17.jpg](img/image00525.jpeg)\n\
    图 4-17. addDocuments.rb 脚本的输出\n\n5.  为了验证两个文档已被添加，在 Mongo shell 中运行以下命令。\n   \
    \ ```javascript\n    >db.mongodb.find()\n    ```\n\n已添加的两个文档会被列出，如图 4-18 所示。\n\
    ![9781484215999_Fig04-18.jpg](img/image00526.jpeg)\n图 4-18. 列出使用 insert_many 添加的文档\n\
    \n在本节中，我们还将使用 `for` 循环来添加多个文档。\n\n1.  使用 `db.mongodb.drop()` 删除 `mongodb` 集合。\n\
    2.  创建另一个 Ruby 脚本 `addDocument2.rb`，并在 `local` 数据库中创建集合 `mongodb`。首先获取 `local`\
    \ 数据库实例，然后调用 `create()` 方法来创建集合。\n    ```ruby\n    client =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\n    client=client.use(:local)\n \
    \   db=client.database\n    collection=db.collection(\"mongodb\")\n    collection.create\n\
    \    ```\n3.  使用 `for` 循环，为 `catalogId` 创建一个变量，并在 `for` 循环的每次迭代中使用该变量值创建一个新的文档实例。使用\
    \ `insert_one()` 方法将文档实例添加到集合中。`addDocument2.rb` 脚本内容如下：\n    ```ruby\n    require\
    \ 'mongo'\n    include Mongo\n\n    client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\n    client=client.use(:local)\n    db=client.database\n\
    \    collection=db.collection(\"mongodb\")\n    collection.create\n    for i in\
    \ 1..10 do\n      catalogId=\"catalog\"+i.to_s\n      document={\n        \"catalogId\"\
    \ => catalogId,\n        \"journal\" => \"Oracle Magazine\",\n        \"publisher\"\
    \ => \"Oracle Publishing\"\n      }\n      collection.insert_one(document)\n \
    \     print \"\\n\"\n    end\n    ```\n4.  使用以下命令运行 `addDocument2.rb` 脚本。\n  \
    \  ```bash\n    >ruby addDocument2.rb\n    ```\n\n脚本的输出显示添加了多个文档，如图 4-19 所示。\n\
    ![9781484215999_Fig04-19.jpg](img/image00527.jpeg)\n图 4-19. 运行 addDocument2.rb\
    \ 脚本\n\n5.  随后，在 Mongo shell 中运行以下 JavaScript 方法来列出添加的文档。\n    ```javascript\n\
    \    >db.mongodb.find()\n    ```\n\n添加的文档会被列出，如图 4-20 所示。\n![9781484215999_Fig04-20.jpg](img/image00528.jpeg)\n\
    图 4-20. 列出使用 for 循环添加的多个文档\n\n## 查找单个文档\n\n`Mongo::Collection` 类中的 `find(filter\
    \ = nil)` 方法用于查找一个或多个文档。默认情况下，如果未指定筛选器，则查找所有文档。在本节中，我们将使用筛选器查找单个文档。\n\n1.  在 `C:\\\
    Ruby21-x64\\mongodbscripts` 目录中创建一个 Ruby 脚本 `findDocument.rb`。\n2.  像之前一样创建 `mongodb`\
    \ 集合。\n3.  像在 `addDocuments.rb` 脚本中一样，使用 `insert_many()` 方法添加两个文档。\n4.  调用 `find()`\
    \ 方法，指定筛选条件 `catalogId` 为 `catalog1`。遍历结果游标以输出找到的文档。\n    ```ruby\n    collection.find(:catalogId=>\"\
    catalog1\").each do |document|\n        print document\n    end\n    ```\n\n`findDocument.rb`\
    \ 脚本内容如下。\n```ruby\nrequire 'mongo'\ninclude Mongo\nclient =Mongo::Client.new([\
    \ '127.0.0.1:27017' ], :database => 'test')\nclient=client.use(:local)\ndb=client.database\n\
    ```\n"
- fmt: "# 使用 `find()` 方法查找文档\n\n## 查找单个文档\n\n使用 `collection.find(:catalogId=>\"catalog1\"\
    ).each do |document|` 迭代并打印找到的文档。\n\n使用以下命令删除 `mongodb` 集合：`db.mongodb.drop()`。然后使用以下命令运行脚本：\n\
    \n```\n>ruby findDocument.rb\n```\n\n找到的 `catalogId` 为 `catalog1` 的文档如 [图 4-21](#part0010.xhtml#Fig21)\
    \ 所示输出。\n\n![9781484215999_Fig04-21.jpg](Images/image00529.jpeg)\n[图 4-21](#part0010.xhtml#_Fig21).\
    \ 查找单个文档\n\n## 查找多个文档\n\n本节我们将使用 `find()` 方法查找多个文档。`find(filter = nil)` 方法可用于查找与过滤器匹配的多个文档。`find()`\
    \ 方法返回一个游标。如果对 `find()` 方法的调用包含一个代码块，就像对 `find()` 方法的结果调用 `each()` 方法一样，该方法会将游标传递给代码块，可以迭代该代码块以输出文档。\n\
    \n1.  要使用 `find()` 方法查找文档，请在 `C:\\Ruby21-x64\\mongodbscripts` 目录中创建一个 Ruby 脚本\
    \ `findDocuments.rb`。\n2.  如前所述，创建一个集合实例。`find()` 方法本身不返回 `Cursor` 对象，而是返回一个创建\
    \ `Cursor` 的 `CollectionView`。以下每一行都返回一个 `CollectionView` 对象。\n\n    ```\n   \
    \ print collection.find()\n    print collection.find({\"journal\" => \"Oracle\
    \ Magazine\"})\n    ```\n\n3.  `Cursor` 类实现了 `Enumerable`，这意味着可以使用 `Enumerable`\
    \ 的方法（如 `each`）。要输出 `Cursor` 中的文档，请使用 `each` 方法迭代结果集。\n\n    ```\n    collection.find.each\
    \ { |document| puts document }\n    ```\n\n4.  要输出所有文档，可以使用 `Enumerable#find.to_a()`\
    \ 方法，该方法会一次性将所有文档加载到内存中，因此与在块迭代中一次处理一个文档的 `each()` 方法相比效率较低。\n\n    ```\n    puts\
    \ collection.find.to_a\n    ```\n\n5.  在 `findDocuments.rb` 脚本中，创建一个文档数组，并使用 `insert_many`\
    \ 脚本添加。\n\n    ```\n    collection.insert_many([document1,document2])\n    ```\n\
    \n6.  尝试以下每种查找文档的选项：\n    *   使用 `find()` 方法查找所有文档，并在由 `CollectionView` 生成的 `Cursor`\
    \ 上调用 `each` 以迭代返回的文档集合。\n\n        ```\n        collection.find().each do |document|\n\
    \           print document\n        end\n        ```\n\n    *   作为另一个示例，仅查找 `:journal`\
    \ 设置为 'Oracle Magazine' 的文档，并使用 `limit()` 方法限制返回的文档数量。\n\n        ```\n      \
    \  collection.find(:journal => 'Oracle Magazine').limit(5).each do |document|\n\
    \              print document\n           end\n        ```\n\n    *   要查找特定版本的文档数量，请使用\
    \ `count()` 方法。\n\n        ```\n        print collection.find(:edition => 'November\
    \ December 2013').count\n        ```\n\n    *   可以使用 `distinct()` 方法查找不同的文档。\n\
    \n        ```\n        print collection.find.distinct(:catalogId)\n        collection.find(:journal\
    \ => 'Oracle Magazine').limit(5).each do |document|\n              print document\n\
    \           end\n        ```\n\n    `findDocuments.rb` 脚本如下所列。\n\n    ```\n  \
    \  require 'mongo'\n    include Mongo\n    client =Mongo::Client.new([ '127.0.0.1:27017'\
    \ ], :database => 'test')\n    client=client.use(:local)\n    db=client.database\n\
    \    collection=db.collection(\"mongodb\")\n    collection.create\n    document1={\n\
    \      \"catalogId\" => \"catalog1\",\n      \"journal\" => \"Oracle Magazine\"\
    ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
    \ December 2013\",\n      \"title\" => \"Engineering as a Service\",\n      \"\
    author\" =>  \"David A. Kelly\"\n    }\n    document2={\n      \"catalogId\" =>\
    \ \"catalog2\",\n      \"journal\" => \"Oracle Magazine\",\n      \"publisher\"\
    \ => \"Oracle Publishing\",\n      \"edition\" =>  \"November December 2013\"\
    ,\n      \"title\" => \"Quintessential and Collaborative\",\n      \"author\"\
    \ =>  \"Tom Haunert\"\n    }\n     collection.insert_many([document1,document2])\n\
    \       collection.find().each do |document|\n          print document\n     \
    \  end\n    collection.find(:journal => 'Oracle Magazine').limit(5).each do |document|\n\
    \          print document\n       end\n    print \"Number of documents with edition\
    \  November December 2013: \"\n    print \"\\n\"\n    print collection.find(:edition\
    \ => 'November December 2013').count\n    print \"\\n\"\n    print \"Number of\
    \ distinct documents by catalogId: \"\n    print \"\\n\"\n    print collection.find.distinct(:catalogId)\n\
    \    ```\n\n7.  由于该集合将再次使用，请使用 `db.mongodb.drop()` 删除 `mongodb` 集合。使用以下命令运行 `findDocuments.rb`\
    \ 脚本。\n\n    ```\n    >ruby findDocuments.rb\n    ```\n\n`findDocuments.rb` 脚本的输出如\
    \ [图 4-22](#part0010.xhtml#Fig22) 所示。\n\n![9781484215999_Fig04-22.jpg](Images/image00530.jpeg)\n\
    [图 4-22](#part0010.xhtml#_Fig22). 查找多个文档\n\n`collection.find()` 的输出列出了 `mongodb`\
    \ 集合中的两个文档。`collection.find(:journal => 'Oracle Magazine').limit(5)` 的输出则列出了 `:journal`\
    \ 设置为 'Oracle Magazine' 的文档。`limit()` 方法将结果限制为 5，但由于集合只有 2 个文档，`limit` 方法没有效果。`collection.find(:edition\
    \ => 'November December 2013').count()` 方法调用输出了版本为 'November December 2013' 的文档数量为\
    \ 2。`collection.find.distinct(:catalogId)` 方法查找了 `mongodb` 集合中两个不同的 `catalogId`。\n\
    \n`find()` 方法返回一个集合视图，当在视图上调用 `each` 时，会创建一个 `Cursor` 对象。`Mongo::Collection::View`\
    \ 是查询和选项的表示，生成文档结果集。`find()` 方法本身不会将查询发送到服务器。必须在 `find()` 方法之后调用另一个方法才能将查询发送到服务器。例如，在\
    \ `View` 上调用 `each()` 方法时，会创建一个将查询发送到服务器的 `Cursor` 对象。`Mongo::Collection::View`\
    \ 类支持 [表 4-10](#part0010.xhtml#Tab10) 中讨论的方法。这些方法来自 `Writable`、`Explainable`、`Readable`\
    \ 和 `Iterable` 类。\n\n[表 4-10](#part0010.xhtml#_Tab10). `Mongo::Collection::View`\
    \ 类实例方法\n\n| 方法 | 返回类型 | 描述 |\n| --- | --- | --- |\n| `delete_many` | Result |\
    \ 删除多个文档。"
