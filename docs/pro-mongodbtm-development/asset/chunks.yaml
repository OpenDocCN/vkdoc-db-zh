    5-25](#part0011.xhtml#_Fig25). Finding a Subset of Documents    Using the Cursor    The
    `find()` method does not return the documents as such but returns a `Cursor` over
    the result set.


    The `Cursor` class provides several methods for getting more information about
    the documents such as iterating over the documents, counting the documents. and
    finding the next document in the result set. Some of the `Cursor` class methods
    are listed in [Table 5-17](#part0011.xhtml#Tab17).    [Table 5-17](#part0011.xhtml#_Tab17).
    Some Cursor Class Methods     | Method | Description | | --- | --- | | `rewind()`
    | Rewinds the cursor and returns the cursor. The cursor may again be iterated
    over to get the documents. | | `toArray(callback)` | Returns an array of documents.
    If the cursor has been previously accessed the result contains only partial documents,
    the documents that have not yet been iterated over. The `rewind()` method must
    be called for a previously accessed cursor to get all the documents. | | `each(callback)`
