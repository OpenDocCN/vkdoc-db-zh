    of Java core classes. Included with Apache Cassandra Project dependency. | | Apache
    Commons Logging 1.2 | An interface for common logging implementations. | | Guava
    16.0.1 | Google’s core libraries used in Java-based projects. Included with Apache
    Cassandra dependency. | | Jackson Core ASL 1.9.2 | High-performance JSON processor.
    Included with Apache Cassandra Project dependency. | | Jackson Mapper ASL 1.9.2
    | High-performance data binding package built on Jackson JSON processor. Included
    with Apache Cassandra Project dependency. | | Metrics Core 3.1.0 | The core library
    for Metrics. Included with Apache Cassandra Project dependency. | | Netty 4.0.27
    | NIO client server framework to develop network applications such as protocol
    servers and clients. Included with Apache Cassandra Project dependency. | | Slf4j
    API 1.7.7 | Simple Logging Façade for Java, which serves as an abstraction for
    various logging frameworks. Included with Apache Cassandra Project dependency.
    |    The `pom.xml` is listed below.    ``` <project xmlns="http://maven.apache.org/POM/4.0.0"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"     xsi:schemaLocation="http://maven.apache.org/POM/4.0.0
    http://maven.apache.org/xsd/maven-4.0.0.xsd">     <modelVersion>4.0.0</modelVersion>
        <groupId>com.mongodb.migration</groupId>     <artifactId>CassandraToMongoDB</artifactId>
        <version>1.0.0</version>     <name>CassandraToMongoDB</name>      <dependencies>
            <dependency>             <groupId>org.mongodb</groupId>             <artifactId>mongo-java-driver</artifactId>
                <version>3.0.3</version>         </dependency>          <dependency>
                <groupId>com.datastax.cassandra</groupId>             <artifactId>cassandra-driver-core</artifactId>
                <version>2.2.0-rc2</version>         </dependency>          <dependency>
                <groupId>org.apache.cassandra</groupId>             <artifactId>cassandra-all</artifactId>
                <version>2.2.0</version>         </dependency>          <dependency>
                <groupId>commons-beanutils</groupId>             <artifactId>commons-beanutils</artifactId>
                <version>1.9.


    2</version>         </dependency>          <dependency>             <groupId>commons-collections</groupId>
                <artifactId>commons-collections</artifactId>             <version>3.2.1</version>
            </dependency>          <dependency>             <groupId>commons-logging</groupId>
                <artifactId>commons-logging</artifactId>             <version>1.2</version>
            </dependency>     </dependencies>  </project> ```    Some of these dependencies
    have further dependencies, which get added automatically and should not be added
    separately. To find the required Jars that get added from the dependencies, right-click
    on the project node in Package Explorer and select Properties. In Properties select
    Java Build Path. The Jars added to the migration project are shown in [Figure
    6-11](#part0012.xhtml#Fig11).    ![9781484215999_Fig06-11.jpg](Images/image00601.jpeg)    [Figure
    6-11](#part0012.xhtml#_Fig11). Jar Files in the Java Build Path    Creating a
    Document in Apache Cassandra    In this section we shall create the Cassandra
    table to be migrated to MongoDB. A Cassandra table may be created either using
    the Cassandra-CLI or using a Java application with Cassandra Java driver. We shall
    create a Cassandra table in a Java application, the `CreateCassandraDatabase`
    application. In the Java application, first we need to connect to Cassandra from
    the application. We shall use the Datastax Java driver to connect to Cassandra.
    Create an instance of `Cluster`, which is the main entry point for the Datastax
    Java driver. The cluster maintains a connection with one of the server nodes to
    keep information on the state and current topology of the cluster. The driver
    discovers all the nodes in the cluster making use of auto-discovery of nodes,
    which includes new nodes that join later. Build a `Cluster.Builder` instance,
    which is a helper class to build `Cluster` instances, using the `static` method
    `builder()`.    1.  We need to provide the connect address of at least one of
    the nodes in the Cassandra cluster for the Datastax driver to be able to connect
    with the cluster and discover other nodes in the cluster using auto-discovery.
    Add the address of the Cassandra server running on the localhost (127.0.0.1) using
    the `addContactPoint(String)` method of `Cluster.Builder`. 2.  Next, invoke the
    `build()` method to build the `Cluster` using the configured addresses. The methods
    may be invoked in sequence as we don’t need an instance of the intermediary `Cluster.Builder`.                    ```     cluster
    = Cluster.builder().addContactPoint("127.0.0.1").build();     ```           3.  Next,
    create a session on the cluster by invoking the `connect()` method. A `Session`
    instance is used to query the cluster and is represented with the `Session` class,
    which holds multiple connections to the cluster. The `Session` instance also provides
    policies on which node in the cluster to use for querying the cluster. The default
    policy is to use a round robin on all the nodes in the cluster. `Session` is also
    used to handle retries of failed queries. `Session` instances are thread-safe
    and a single instance is sufficient for an application if connecting to a single
    keyspace only. A separate `Session` instance is required if connecting to multiple
    keyspaces.                    ```     Session session = cluster.connect();     ```                    The
    Cassandra server must be running to be able to connect to the server when the
    application is run, and we already started the Cassandra server earlier. If Cassandra
    server is not running, the `com.datastax.driver.core.exceptions.NoHostAvailableException`
    exception is generated when a connection is tried.                    The `Session`
    class provides several methods to prepare and run queries on the server, some
    of which are discussed in [Table 6-2](#part0012.xhtml#Tab2).                    [Table
    6-2](#part0012.xhtml#_Tab2).'
  trans: "\n勾选复选框以创建方法存根 `public static void main(String[] args)`。如 图 6-8 所示，点击 Finish（完成）。\n\
    \n![9781484215999_Fig06-08.jpg](img/image00598.jpeg)\n图 6-8. 配置 Java 类 `CreateCassandraDatabase`\n\
    \n4.  类似地，创建一个 Java 类 `MigrateCassandraToMongoDB`，如 图 6-9 所示。\n\n![9781484215999_Fig06-09.jpg](img/image00599.jpeg)\n\
    图 6-9. 配置 Java 类 `MigrateCassandraToMongoDB`\n\n这两个 Java 类在 Package Explorer 中的显示如\
    \ 图 6-10 所示。\n\n![9781484215999_Fig06-10.jpg](img/image00600.jpeg)\n图 6-10. Package\
    \ Explorer 中的 Java 类\n\n## 添加依赖项\n\n我们需要在 `pom.xml` 中添加一些依赖项。按照 表 6-1 所列添加以下依赖项；其中一些依赖项已注明随\
    \ Apache Cassandra Project 依赖项一同包含，不应单独添加。\n\n表 6-1. 依赖项\n\n| JAR 包 | 描述 |\n|\
    \ --- | --- |\n| Mongo Java Driver 3.0.3 | 连接 MongoDB 服务器的 Java 客户端。 |\n| Apache\
    \ Cassandra 2.2.0 | Apache Cassandra 项目。 |\n| Cassandra Driver Core 2.2.0-rc2\
    \ | Datastax Java 驱动程序。 |\n| Apache Commons BeanUtils 1.9.2 | 用于基于 JavaBeans 模式开发的\
    \ Java 类的实用工具 JAR 包。 |\n| Apache Commons Collections 3.2.1 | 提供加速 Java 应用程序开发的数据结构。\
    \ |\n| Apache Commons Lang 3 3.1 | 提供用于操作 Java 核心类的额外类。随 Apache Cassandra 项目依赖项一同包含。\
    \ |\n| Apache Commons Logging 1.2 | 通用日志记录实现的接口。 |\n| Guava 16.0.1 | Google 的核心库，用于基于\
    \ Java 的项目。随 Apache Cassandra 依赖项一同包含。 |\n| Jackson Core ASL 1.9.2 | 高性能 JSON\
    \ 处理器。随 Apache Cassandra 项目依赖项一同包含。 |\n| Jackson Mapper ASL 1.9.2 | 构建于 Jackson\
    \ JSON 处理器之上的高性能数据绑定包。随 Apache Cassandra 项目依赖项一同包含。 |\n| Metrics Core 3.1.0 |\
    \ Metrics 的核心库。随 Apache Cassandra 项目依赖项一同包含。 |\n| Netty 4.0.27 | 用于开发网络应用程序（如协议服务器和客户端）的\
    \ NIO 客户端服务器框架。随 Apache Cassandra 项目依赖项一同包含。 |\n| Slf4j API 1.7.7 | Java 的简单日志门面，充当各种日志框架的抽象层。随\
    \ Apache Cassandra 项目依赖项一同包含。 |\n\n`pom.xml` 文件内容如下。\n\n```xml\n<project xmlns=\"\
    http://maven.apache.org/POM/4.0.0\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n    xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.mongodb.migration</groupId>\n\
    \    <artifactId>CassandraToMongoDB</artifactId>\n    <version>1.0.0</version>\n\
    \    <name>CassandraToMongoDB</name>\n\n    <dependencies>\n        <dependency>\n\
    \            <groupId>org.mongodb</groupId>\n            <artifactId>mongo-java-driver</artifactId>\n\
    \            <version>3.0.3</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>com.datastax.cassandra</groupId>\n            <artifactId>cassandra-driver-core</artifactId>\n\
    \            <version>2.2.0-rc2</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>org.apache.cassandra</groupId>\n            <artifactId>cassandra-all</artifactId>\n\
    \            <version>2.2.0</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>commons-beanutils</groupId>\n            <artifactId>commons-beanutils</artifactId>\n\
    \            <version>1.9.2</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>commons-collections</groupId>\n            <artifactId>commons-collections</artifactId>\n\
    \            <version>3.2.1</version>\n        </dependency>\n\n        <dependency>\n\
    \            <groupId>commons-logging</groupId>\n            <artifactId>commons-logging</artifactId>\n\
    \            <version>1.2</version>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\n其中一些依赖项还有进一步的依赖项，它们会被自动添加，不应单独添加。要查找从依赖项中添加的所需 JAR 包，请在 Package\
    \ Explorer 中右键单击项目节点并选择 Properties（属性）。在 Properties 中选择 Java Build Path（Java 构建路径）。添加到迁移项目的\
    \ JAR 包如 图 6-11 所示。\n\n![9781484215999_Fig06-11.jpg](img/image00601.jpeg)\n图 6-11.\
    \ Java 构建路径中的 JAR 文件\n\n## 在 Apache Cassandra 中创建文档\n\n在本节中，我们将创建要迁移到 MongoDB\
    \ 的 Cassandra 表。Cassandra 表可以使用 Cassandra-CLI 或使用带有 Cassandra Java 驱动程序的 Java\
    \ 应用程序来创建。我们将在 Java 应用程序 `CreateCassandraDatabase` 中创建一个 Cassandra 表。\n\n在 Java\
    \ 应用程序中，首先我们需要从应用程序连接到 Cassandra。我们将使用 Datastax Java 驱动程序连接到 Cassandra。创建一个 `Cluster`\
    \ 实例，它是 Datastax Java 驱动程序的主要入口点。该集群维护与其中一个服务器节点的连接，以保存集群状态和当前拓扑的信息。驱动程序利用节点的自动发现功能来发现集群中的所有节点，包括后来加入的新节点。使用静态方法\
    \ `builder()` 构建一个 `Cluster.Builder` 实例，它是用于构建 `Cluster` 实例的辅助类。\n\n1.  我们需要提供\
    \ Cassandra 集群中至少一个节点的连接地址，以便 Datastax 驱动程序能够连接到集群并使用自动发现功能发现集群中的其他节点。使用 `Cluster.Builder`\
    \ 的 `addContactPoint(String)` 方法添加在本地主机 (127.0.0.1) 上运行的 Cassandra 服务器的地址。\n2.\
    \  接下来，调用 `build()` 方法，使用配置的地址构建 `Cluster`。这些方法可以按顺序调用，因为我们不需要中间类 `Cluster.Builder`\
    \ 的实例。\n\n    ```java\n    cluster = Cluster.builder().addContactPoint(\"127.0.0.1\"\
    ).build();\n    ```\n\n3.  接下来，通过调用 `connect()` 方法在集群上创建一个会话。`Session` 实例用于查询集群，由\
    \ `Session` 类表示，它持有到集群的多个连接。`Session` 实例还提供有关使用集群中哪个节点进行查询的策略。默认策略是对集群中的所有节点进行轮询。`Session`\
    \ 还用于处理失败查询的重试。`Session` 实例是线程安全的，如果仅连接到单个键空间，单个实例对应用程序来说就足够了。如果要连接到多个键空间，则需要单独的\
    \ `Session` 实例。\n\n    ```java\n    Session session = cluster.connect();\n   \
    \ ```\n\nCassandra 服务器必须正在运行，才能在应用程序运行时连接到服务器，我们之前已经启动了 Cassandra 服务器。如果 Cassandra\
    \ 服务器没有运行，尝试连接时会生成 `com.datastax.driver.core.exceptions.NoHostAvailableException`\
    \ 异常。\n\n`Session` 类提供了多种方法来准备和执行服务器上的查询，其中一些在 表 6-2 中讨论。\n\n表 6-2.\n"
- fmt: "# Session Class Methods to Run Queries\n\n| Method | Description |\n| ---\
    \ | --- |\n| `execute(Statement statement)` | Executes the query provided as a\
    \ `Statement` object to return a `ResultSet`. |\n| `execute(String query)` | Executes\
    \ the query provided as a String to return a `ResultSet`. |\n| `execute(String\
    \ query, Object... values)` | Executes the query provided as a String and uses\
    \ the specified values to return a `ResultSet`. |\n\n# 创建 Keyspace\n\n我们需要创建一个键空间（keyspace）来存储表。在\
    \ `CreateCassandraDatabase` 应用程序中添加一个静态方法 `createKeyspace()` 来创建键空间。\n\nCQL 3（Cassandra\
    \ Query Language 3）增加了有条件运行 `CREATE` 语句的支持，这意味着只有当要构建的对象尚不存在时才会创建该对象。`IF NOT EXISTS`\
    \ 子句用于条件创建。\n\n创建一个名为 `datastax` 的键空间，使用复制策略类为 `SimpleStrategy`，复制因子为 1。\n\n```\n\
    session.execute(\"CREATE KEYSPACE IF NOT EXISTS datastax WITH replication \"\n\
    \    + \"= {'class':'SimpleStrategy', 'replication_factor':1};\");\n```\n\n在 `main`\
    \ 方法中调用 `createKeyspace()` 方法。当应用程序运行时，键空间就会被创建。\n\nCassandra 支持以下策略类，如表 6-3 所示，这些类指的是副本放置策略类。\n\
    \n**表 6-3. 策略类**\n\n| Class | Description |\n| --- | --- |\n| `org.apache.cassandra.locator.SimpleStrategy`\
    \ | 仅用于单个数据中心。第一个副本根据分区器的决定放置在一个节点上。随后的副本以顺时针方式放置在节点环中的下一个节点上，不考虑拓扑。仅当使用 `SimpleStrategy`\
    \ 类时才需要复制因子。 |\n| `org.apache.cassandra.locator.NetworkTopologyStrategy` | 用于多个数据中心。指定在每个数据中心存储多少个副本。尝试将副本存储在同一数据中心内的不同机架上，因为同一机架内的节点更有可能一起发生故障。\
    \ |\n\n# 创建表（Column Family）\n\n接下来，我们将创建一个列族（column family），在 CQL 3 中也称为表。向 `CreateCassandraDatabase`\
    \ 应用程序添加一个静态方法 `createTable()`。\n\n如前所述，`CREATE TABLE` 命令也支持 `IF NOT EXISTS` 来有条件地创建表。CQL\
    \ 3 增加了创建复合主键的功能，即由多个组件主键列创建的主键。在复合主键中，第一列称为分区键。\n\n创建一个名为 `catalog` 的表，包含 `catalog_id`、`journal`、`publisher`、`edition`、`title`\
    \ 和 `author` 列。在 `catalog` 表中，复合主键由 `catalog_id` 和 `journal` 列组成，其中 `catalog_id`\
    \ 是分区键。\n\n调用 `execute(String)` 方法来创建 `catalog` 表，如下所示。\n\n```\nsession.execute(\"\
    CREATE TABLE IF NOT EXISTS datastax.catalog (catalog_id text,journal text,publisher\
    \ text, edition text,title text,author text,PRIMARY KEY (catalog_id, journal))\"\
    );\n```\n\n在表名前加上键空间名。在 `main` 方法中调用 `createTable()` 方法。当 `CreateCassandraDatabase`\
    \ 应用程序运行时，`catalog` 表将被创建。\n\n# 插入数据\n\n接下来，我们将使用 `INSERT` 语句向 `catalog` 表添加数据。使用\
    \ `IF NOT EXISTS` 关键字有条件地添加行。当使用复合主键时，必须指定所有组件主键列，包括复合键列的值。\n\n向 `CreateCassandraDatabase`\
    \ 类添加一个方法 `insert()`，并在 `main()` 方法中调用该方法。\n\n向 `catalog` 表添加两行，行 ID 分别为 `catalog1`\
    \ 和 `catalog2`。\n\n例如，两行数据被添加到 `catalog` 表中，如下所示。\n\n```\nsession.execute(\"INSERT\
    \ INTO datastax.catalog (catalog_id, journal, publisher, edition,title,author)\
    \ VALUES ('catalog1','Oracle Magazine', 'Oracle Publishing', 'November-December\
    \ 2013', 'Engineering as a Service','David A.  Kelly') IF NOT EXISTS\");\nsession.execute(\"\
    INSERT INTO datastax.catalog (catalog_id, journal, publisher, edition,title,author)\
    \ VALUES ('catalog2','Oracle Magazine', 'Oracle Publishing', 'November-December\
    \ 2013', 'Quintessential and Collaborative','Tom Haunert') IF NOT EXISTS\");\n\
    ```\n\n# 查询数据\n\n为了验证 Cassandra 表是否已创建，接下来我们将运行一个 `SELECT` 语句从 `catalog` 表中选择列。添加一个方法\
    \ `select()` 来运行 `SELECT` 语句。\n\n使用 `*` 选择所有列从 `catalog` 表中查询。运行 `SELECT` 语句作为测试，以确认我们添加的数据确实已被添加。\n\
    \n```\nResultSet results = session.execute(\"select * from datastax.catalog\"\
    );\n```\n\n`ResultSet` 中的一行由 `Row` 类表示。遍历 `ResultSet` 以输出每个列的值。\n\n```\nfor (Row\
    \ row : results) {\n        System.out.println(\"Catalog Id: \" + row.getString(\"\
    catalog_id\"));\n        System.out.println(\"\\n\");\n            System.out.println(\"\
    Journal: \" + row.getString(\"journal\"));\n            System.out.println(\"\
    Publisher: \" + row.getString(\"publisher\"));\n            System.out.println(\"\
    Edition: \" + row.getString(\"edition\"));\n            System.out.println(\"\
    Title: \" + row.getString(\"title\"));\n            System.out.println(\"Author:\
    \ \" + row.getString(\"author\"));\n            System.out.println(\"\\n\");\n\
    \            System.out.println(\"\\n\");\n        }\n```\n\n`CreateCassandraDatabase`\
    \ 类如下所列。\n\n```\npackage mongodb;\n\nimport com.datastax.driver.core.Cluster;\n\
    import com.datastax.driver.core.ResultSet;\nimport com.datastax.driver.core.Row;\n\
    import com.datastax.driver.core.Session;\n\npublic class CreateCassandraDatabase\
    \ {\n    private static Cluster cluster;\n    private static Session session;\n\
    \n    public static void main(String[] argv) {\n        cluster = Cluster.builder().addContactPoint(\"\
    127.0.0.1\").build();\n        session = cluster.connect();\n        createKeyspace();\n\
    \        createTable();\n        insert();\n        select();\n        session.close();\n\
    \        cluster.close();\n    }\n\n    private static void createKeyspace() {\n\
    \        session.execute(\"CREATE KEYSPACE IF NOT EXISTS datastax WITH replication\
    \ \"\n                + \"= {'class':'SimpleStrategy', 'replication_factor':1};\"\
    );\n    }\n\n    private static void createTable() {\n        session.execute(\"\
    CREATE TABLE IF NOT EXISTS datastax.catalog (catalog_id text,journal text,publisher\
    \ text, edition text,title text,author text,PRIMARY KEY (catalog_id, journal))\"\
    );\n    }\n\n    private static void insert() {\n        session.execute(\"INSERT\
    \ INTO datastax.catalog (catalog_id, journal, publisher, edition,title,author)\
    \ VALUES ('catalog1','Oracle Magazine', 'Oracle Publishing', 'November-December\
    \ 2013', 'Engineering as a Service','David A.  Kelly') IF NOT EXISTS\");\n   \
    \     session.execute(\"INSERT INTO datastax.catalog (catalog_id, journal, publisher,\
    \ edition,title,author) VALUES ('catalog2','Oracle Magazine', 'Oracle Publishing',\
    \ 'November-December 2013', 'Quintessential and Collaborative','Tom Haunert')\
    \ IF NOT EXISTS\");\n    }\n\n    private static void select() {\n        ResultSet\
    \ results = session.execute(\"select * from datastax.catalog\");\n        for\
    \ (Row row : results) {\n            System.out.println(\"Catalog Id: \" + row.getString(\"\
    catalog_id\"));\n            System.out.println(\"\\n\");\n            System.out.println(\"\
    Journal: \" + row.getString(\"journal\"));\n            System.out.println(\"\
