    two documents migrated to MongoDB get listed as shown in [Figure 6-18](#part0012.xhtml#Fig18).    ![9781484215999_Fig06-18.jpg](Images/image00608.jpeg)    [Figure
    6-18](#part0012.xhtml#_Fig18). Listing the Migrated Documents    Summary    In
    this chapter we migrated an Apache Cassandra table to MongoDB server using a Java
    application in Eclipse IDE. First, we added documents to Cassandra using the Cassandra
    Java driver. Subsequently we migrated the Cassandra documents to MongoDB.


    In the next chapter we shall migrate Couchbase database documents to MongoDB.    CHAPTER
    7    ![image](Images/image00404.jpeg)    Migrating Couchbase to MongoDB    Both
    MongoDB and Couchbase are document-centric NoSQL databases. Both are based on
    the same data storage model, which is JSON, with a slight difference that MongoDB
    is based on the BSON (binary JSON) data model, which provides a wider selection
    of data types. The JSON support in Couchbase is relatively less developed. MongoDB
    stores documents in collections, which make it easier to handle documents. Mongo’s
    support for JavaScript methods that run in the Mongo shell to perform CRUD operations
    on the documents is another advantage over Couchbase. To make use of these added
    features in MongoDB, it may be advantageous to migrate documents from Couchbase
    to MongoDB. In this chapter we shall migrate Couchbase documents to MongoDB. This
    chapter covers the following topics:    *   Setting up the environment *   Creating
    a Maven project *   Creating Java classes *   Configuring the Maven project *   Adding
    a document to Couchbase *   Creating a Couchbase view *   Migrating a Couchbase
    document to MongoDB    Setting Up the Environment    We need to download the following
    software for this chapter.    *   Couchbase Server Community or Enterprise Edition
    3.0.x (or later version) `couchbase-server-enterprise_3.0.3-windows_amd64.exe`
    file from `www.couchbase.com/nosql-databases/downloads`. Double-click on the `exe`
    file to launch the installer and install Couchbase Server. *   Eclipse IDE for
    Java EE Developers from `www.eclipse.org/downloads/`. *   MongoDB 3.05 (or a later
    version) Windows binaries `mongodb-win32-x86_64-3.0.5-signed.msi` from `www.mongodb.org/downloads`.
    Double-click on the `mongodb-win32-x86_64-3.0.5-signed` file to install MongoDB
    3.05\. Add the `bin` directory, for example `C:\Program Files\MongoDB\Server\3.0\bin`,
    to the `PATH` environment variable. *   Java 7 from `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`.    Create
    a directory `C:\data\db` for the MongoDB data if not already created for an earlier
    chapter. Start MongoDB with the following command from a command shell.    ```
    >mongod ```    MongoDB gets started waiting for connections on port 27017.    Log
    in to the Couchbase Console. Click on Data Buckets in the Couchbase Admin Console,
    which is accessed with URL `localhost:8091`. The default bucket should be listed
    in Couchbase Buckets. Click on the Documents button for the default bucket. Initially
    the default bucket should not have any documents in it as shown in [Figure 7-1](#part0013.xhtml#Fig1).    ![9781484215999_Fig07-01.jpg](Images/image00609.jpeg)    [Figure
    7-1](#part0013.xhtml#_Fig1). Empty Couchbase Bucket default    Creating a Maven
    Project    We shall use a Maven project to create Couchbase documents and subsequently
    migrate the Couchbase documents to MongoDB. Next, create a Maven project in Eclipse.    1.  Select
    File ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg) Other.
    2.  In the New window, select Maven ![image](Images/image00406.jpeg) Maven Project
    and click on Next as shown in [Figure 7-2](#part0013.xhtml#Fig2).          ![9781484215999_Fig07-02.jpg](Images/image00610.jpeg)                    [Figure
    7-2](#part0013.xhtml#_Fig2). Selecting Maven ![image](Images/image00406.jpeg)
    Maven Project           3.  In the New Maven Project wizard select the “Create
    a simple project” check box and the “Use default Workspace location” check box,
    and click on Next as shown in [Figure 7-3](#part0013.xhtml#Fig3).          ![9781484215999_Fig07-03.jpg](Images/image00611.jpeg)                    [Figure
    7-3](#part0013.xhtml#_Fig3). Creating a New Maven Project           4.  To create
    the Maven project, specify the following and click on Finish as shown in [Figure
    7-4](#part0013.xhtml#Fig4).     *   Group Id: `com.mongodb.migration`     *   Artifact
    Id: `CouchbaseToMongoDB`     *   Version: 1.0.'
