    \ successfully\n16:31:48.190 [cluster1-nio-worker-2] DEBUG com.datastax.driver.core.Session\
    \ - Added connection pool for /127.0.0.1:9042\n16:31:49.122 [main] INFO  org.mongodb.driver.cluster\
    \ - Cluster created with settings {hosts=[localhost:27017], mode=MULTIPLE, requiredClusterType=UNKNOWN,\
    \ serverSelectionTimeout='30000 ms', maxWaitQueueSize=500}\n16:31:49.122 [main]\
    \ INFO  org.mongodb.driver.cluster - Adding discovered server localhost:27017\
    \ to client view of cluster\n16:31:49.165 [main] DEBUG org.mongodb.driver.cluster\
    \ - Updating cluster description to  {type=UNKNOWN, servers=[{address=localhost:27017,\
    \ type=UNKNOWN, state=CONNECTING}]\n16:31:49.253 [cluster-ClusterId{value='55c93465cd73501ae89a80b9',\
    \ description='null'}-localhost:27017] INFO  org.mongodb.driver.connection - Opened\
    \ connection [connectionId{localValue:1, serverValue:16}] to localhost:27017\n\
    16:31:49.254 [cluster-ClusterId{value='55c93465cd73501ae89a80b9', description='null'}-localhost:27017]\
    \ DEBUG org.mongodb.driver.cluster - Checking status of localhost:27017\n16:31:49.256\
    \ [cluster-ClusterId{value='55c93465cd73501ae89a80b9', description='null'}-localhost:27017]\
    \ INFO  org.mongodb.driver.cluster -\n```\n"
