    4-21](#part0010.xhtml#_Fig21). Finding a Single Document    Finding Multiple Documents    In
    this section we shall find multiple documents using the `find()` method. The `find(filter
    = nil)` method may be used to find multiple documents that match the filter. The
    `find()` method returns a cursor. If the `find()` method invocation includes a
    block, as with invoking the `each()` method on the result of invoking the `find()`
    method, the method yields a cursor to the block that may be iterated over to output
    the documents.    1.  To find documents using the `find()` method create a Ruby
    script `findDocuments.rb` in the `C:\Ruby21-x64\mongodbscripts` directory. 2.  Create
    a collection instance as discussed before. The `find()` method by itself does
    not return a `Cursor` object but returns a `CollectionView` that creates a `Cursor`.
    Each of the following returns a `CollectionView` object.                    ```     print
    collection.find()     print collection.find({"journal" => "Oracle Magazine"})     ```           3.  The
    `Cursor` class implements the `Enumerable`, which implies that the `Enumerable`
    methods such as `each` may be used. To output the documents in the `Cursor`, iterate
    over the result set using the `each` method.                    ```     collection.find.each
    { |document| puts document }     ```           4.  To output all documents use
    the `Enumerable#find.to_a()` method, which gets all documents into the memory
    at once thus making the method inefficient in comparison to the `each()` method
    with which one document at a time in is processed in the block iteration.                    ```     puts
    collection.find.to_a     ```           5.  In the `findDocuments.rb` script create
    an array of documents and add using the `insert_many` script.                    ```     collection.insert_many([document1,document2])     ```           6.  Try
    each of the following options for finding documents:     *   Using the `find()`
    method find all documents and invoke each over the `Cursor` generated by the `CollectionView`
    to iterate over the collection of documents returned.                                    ```         collection.find().each
    do |document|            print document         end         ```                       *   As
    another example find only documents with `:journal` set to ‘Oracle Magazine’ and
    limit the number of documents returned using the `limit()` method.                                    ```         collection.find(:journal
    => ''Oracle Magazine'').limit(5).each do |document|               print document           
    end         ```                       *   To find the number of documents for
    a particular edition use the `count()` method.                                    ```         print
    collection.find(:edition => ''November December 2013'').


    count         ```                       *   Distinct documents may be found using
    the `distinct()` method.                                    ```         print
    collection.find.distinct(:catalogId)         collection.find(:journal => ''Oracle
    Magazine'').limit(5).each do |document|               print document           
    end         ```                                    The `findDocuments.rb` script
    is listed below.                                    ```         require ''mongo''         include
    Mongo         client =Mongo::Client.new([ ''127.0.0.1:27017'' ], :database =>
    ''test'')         client=client.use(:local)         db=client.database         collection=db.collection("mongodb")         collection.create         document1={           "catalogId"
    => "catalog1",           "journal" => "Oracle Magazine",           "publisher"
    => "Oracle Publishing",           "edition" =>  "November December 2013",           "title"
    => "Engineering as a Service",           "author" =>  "David A. Kelly"         }         document2={           "catalogId"
    => "catalog2",           "journal" => "Oracle Magazine",           "publisher"
    => "Oracle Publishing",           "edition" =>  "November December 2013",           "title"
    => "Quintessential and Collaborative",           "author" =>  "Tom Haunert"         }           collection.insert_many([document1,document2])           
    collection.find().each do |document|               print document            end         collection.find(:journal
    => ''Oracle Magazine'').limit(5).each do |document|               print document           
    end         print "Number of documents with edition  November December 2013: "         print
    "\n"         print collection.find(:edition => ''November December 2013'').count         print
    "\n"         print "Number of distinct documents by catalogId: "         print
    "\n"         print collection.find.distinct(:catalogId)         ```                   7.  Drop
    the `mongodb` collection with `db.mongodb.drop()` as the collection is used again.
    Run the `findDocuments.rb` script with the following command.                    ```     >ruby
    findDocuments.rb     ```              The output from the `findDocuments.rb` script
    is shown in [Figure 4-22](#part0010.xhtml#Fig22).    ![9781484215999_Fig04-22.jpg](Images/image00530.jpeg)    [Figure
    4-22](#part0010.xhtml#_Fig22). Finding Multiple Documents    The output from `collection.find()`
    lists the two documents in the `mongodb` collection. The output from `collection.find(:journal
    => ''Oracle Magazine'').limit(5)` outputs documents with `:journal` set to ''Oracle
    Magazine''. The `limit()` method limits the result to 5, but because the collection
    has only 2 documents the `limit` method does not have an effect. The `collection.find(:edition
    => ''November December 2013'').count()` method invocation outputs the document
    count for documents with edition as ''November December 2013'' as 2\. The `collection.find.distinct(:catalogId)`
    method finds the 2 distinct `catalogId`s in the `mongodb` collection.    The `find()`
    method returns a collection view and when `each` is invoked on the view a `Cursor`
    object is created. The `Mongo::Collection::View` is a representation of a query
    and options generating a result set of documents. The `find()` method by itself
    does not send the query to the server. Another method has to be invoked subsequent
    to the `find()` method to send the query to the server. For example, when the
    `each()` method is invoked on a `View` a `Cursor` object is created which sends
    the query to the server. The `Mongo::Collection::View` class supports the methods
    discussed in [Table 4-10](#part0010.xhtml#Tab10). These methods are included from
    `Writable`, `Explainable`, `Readable`, and `Iterable` classes.    [Table 4-10](#part0010.xhtml#_Tab10).
    Mongo::Collection::View Class Instance Methods     | Method | Return Type | Description
    | | --- | --- | --- | | `delete_many` | Result | Deletes multiple documents.'
