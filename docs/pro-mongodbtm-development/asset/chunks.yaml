    Method              Updating the First Document    In this section we shall update
    a document using a query to find the document to update. A query could return
    multiple documents. If only the first document in the query result is to be updated
    the `MongoOperations` interface provides the overloaded `updateFirst()` method.
    The `org.springframework.data.mongodb.core.query.Update` class is used to provide
    the update clauses. Each of the `updateFirst()` methods, detailed in [Table 10-13](#part0016.xhtml#Tab13),
    returns a `WriteResult` object.    [Table 10-13](#part0016.xhtml#_Tab13). Overloaded
    updateFirst() Methods     | Method | Description | | --- | --- | | `updateFirst(Query
    query, Update update, Class<?> entityClass)` | Updates the first document of the
    given entity class type that is found using the given query with the update document.
    | | `updateFirst(Query query, Update update, Class<?> entityClass, String collectionName)`
    | Updates the first document of the given entity class type that is found in the
    given collection using the given query with the update document. | | `updateFirst(Query
    query, Update update, String collectionName)` | Updates the first document that
