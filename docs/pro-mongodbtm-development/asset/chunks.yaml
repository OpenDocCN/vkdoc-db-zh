    catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
    \ \"edition\" : 11122013,\"title\" : 'Quintessential and Collaborative',\"author\"\
    \ : 'Tom Haunert'};\ndocArray=[doc1,doc2];\ncollection.insertMany(docArray, function(error,\
    \ result){\n    if (error)\n        console.log(error);\n    else{\n        console.log(\"\
    Documents added: \"+result);\n    }\n});\n```\n\n4.  调用 `findAndRemove()` 方法，使用\
    \ `{journal:'Oracle Magazine'}` 作为查询文档，`[['catalogId', 'ascending']]` 作为排序数组。在回调函数中，第二个参数是要被移除的文档。将被移除的文档记录到控制台。\n\
    \n```\ncollection.findAndRemove({journal:'Oracle Magazine'},\n    [['catalogId',\
    \ 'ascending']], {w:1}, function(error, result) {\n        if (error) console.log(error);\n\
    \        else console.log(result);\n    });\n```\n\n`findAndRemove.js` 脚本如下：\n\
    \n```\nServer = require('mongodb').Server;\nDb = require('mongodb').Db;\nCollection\
    \ = require('mongodb').Collection;\nvar db = new Db('local', new Server('localhost',\
    \ 27017));\ndb.open(function(error, db) {\n    if (error)\n        console.log(error);\n\
    \    else{\n        db.createCollection('catalog', function(error, collection){\n\
    \            if (error)\n                console.log(error);\n            else{\n\
    \                doc1 = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine',\n\
    \                    \"publisher\" : 'Oracle Publishing', \"edition\" : 11122013,\"\
    title\"\n                    : 'Engineering as a Service',\"author\" : 'David\
    \ A. Kelly'};\n                doc2 = {\"catalogId\" : 2, \"journal\" : 'Oracle\
    \ Magazine',\n                    \"publisher\" : 'Oracle Publishing', \"edition\"\
    \ : 11122013,\"title\"\n                    : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'};\n                collection.insertMany([doc1,doc2],\
    \ function(error, result){\n                    if (error)\n                 \
    \       console.log(error);\n                    else{\n                     \
    \   console.log(\"Documents added: \"+result);\n                    }\n      \
    \          });\n                collection.findAndRemove({journal:'Oracle Magazine'},\n\
    \                    [['catalogId', 'ascending']], {w:1}, function(error, result)\
    \ {\n                        if (error) console.log(error);\n                \
    \        else console.log(result);\n                    });\n            }\n \
    \       });\n    }\n});\n```\n\n5.  使用命令 `node findAndRemove.js` 运行 `findAndRemove.js`\
    \ 脚本。被移除的文档被记录到控制台，如 图 5-29 所示。\n\n![9781484215999_Fig05-29.jpg](img/image00578.jpeg)\
    \ 图 5-29. `findAndRemove.js` 脚本的输出\n\n## 替换单个文档\n\n`Collection` 类提供了 `findOneAndReplace(filter,\
    \ replacement, options, callback)` 方法来替换单个文档。方法参数在 表 5-21 中讨论。\n\n表 5-21. `findOneAndReplace()`\
    \ 方法的参数\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object | 指定文档选择过滤器以选择要更新的文档。\
    \ |\n| `replacement` | object | 替换文档。 |\n| `options` | object | 方法选项。 |\n| `callback`\
    \ | `resultCallback(error, result)` | 回调函数，其第一个参数是 `MongoError` 对象，第二个参数是方法结果。如果使用写关注，则必须指定回调函数。\
    \ |\n\n`findOneAndReplace()` 方法支持的选项在 表 5-22 中讨论。\n\n表 5-22. `findOneAndReplace()`\
    \ 方法的选项\n\n| 选项 | 类型 | 描述 |\n| --- | --- | --- |\n| `projection` | object | 结果的字段投影。\
    \ |\n| `sort` | object | 如果查询选择多个文档，根据排序顺序确定哪个文档被替换。 |\n| `maxTimeMS` | number\
    \ | 查询可以运行的最长时间（毫秒）。 |\n| `upsert` | boolean | 如果文档不存在，是否进行 upsert。默认为 `false`。\
    \ |\n| `returnOriginal` | boolean | 是否返回原始文档而非替换文档。默认为 `true`。 |\n\n1.  使用 `db.catalog.drop()`\
    \ 从 `local` 数据库中删除 `catalog` 集合。\n2.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个\
    \ `findOneAndReplaceDocument.js` 脚本。\n3.  获取并打开一个 `Db` 实例，创建一个集合，并向集合中添加文档。\n\
    4.  使用 `findOneAndReplace(filter, replacement, options, callback)` 方法，将其中一个 `journal`\
    \ 字段为 `Oracle Magazine` 的文档替换。提供一个 `catalogId` 为 `catalog3` 的替换文档。\n\n```\ncollection.findOneAndReplace({journal:'Oracle\
    \ Magazine'}, {\"catalogId\" : 'catalog3', \"journal\" : 'OracleMagazine', \"\
    publisher\" :\n    'OraclePublishing', \"edition\" : '11122013'}, function(error,\
    \ result) {\n    if (error) console.warn(error.message);\n    else console.log(result);\n\
    });\n```\n\n`findOneAndReplaceDocument.js` 脚本如下：\n\n```\nServer = require('mongodb').Server;\n\
    Db = require('mongodb').Db;\nCollection = require('mongodb').Collection;\nvar\
    \ db = new Db('local', new Server('localhost', 27017));\ndb.open(function(error,\
    \ db) {\n    if (error)\n        console.log(error);\n    else{\n        db.createCollection('catalog',\
    \ function(error, collection){\n            if (error)\n                console.log(error);\n\
    \            else{\n                doc1 = {\"catalogId\" : 'catalog1', \"journal\"\
    \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
    \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A.\
    \ Kelly'};\n```\n"
- fmt: "# 更新单个文档\n\n在本节中，我们将介绍如何使用 `findOneAndReplace`、`replaceOne` 和 `findOneAndUpdate`\
    \ 方法来更新 MongoDB 集合中的文档。\n\n## 使用 findOneAndReplace\n\n`findOneAndReplace(filter,\
    \ replacement, options, callback)` 方法用于查找一个文档并将其替换为一个新文档。\n\n### 参数说明\n\n| 参数\
    \ | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object | 指定用于选择要替换文档的选择器查询。 |\n\
    | `replacement` | object | 用于替换的新文档。 |\n| `options` | object | 方法选项。 |\n| `callback`\
    \ | `resultCallback(error, result)` | 回调函数，第一个参数是 `MongoError` 对象，第二个参数是方法结果。如果使用写关注，则必须指定回调函数。\
    \ |\n\n### 示例脚本\n\n创建一个名为 `findOneAndReplaceDocument.js` 的脚本。该脚本会连接到数据库，创建一个集合并插入两个文档，然后使用\
    \ `findOneAndReplace` 方法替换其中一个文档。\n\n```javascript\nvar db = new Db('local', new\
    \ Server('localhost', 27017));\ndb.open(function(error, db) {\n  if (error)\n\
    \    console.log(error);\n  else {\n    db.createCollection('catalog', function(error,\
    \ collection) {\n      if (error)\n        console.log(error);\n      else {\n\
    \        var doc1 = {\"catalogId\": 1, \"journal\": 'Oracle Magazine', \"publisher\"\
    : 'Oracle Publishing', \"edition\": 'November December 2013', \"title\": 'Oracle\
    \ and Linux', \"author\": 'Tom Haunert'};\n        var doc2 = {\"catalogId\":\
    \ 2, \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Quintessential and Collaborative', \"\
    author\": 'Tom Haunert'};\n        collection.insertMany([doc1, doc2], function(error,\
    \ result) {\n          if (error)\n            console.log(error);\n         \
    \ else {\n            console.log(\"Documents added: \" + result);\n         \
    \ }\n        });\n        collection.findOneAndReplace({journal: 'Oracle Magazine'},\
    \ {\"catalogId\": 3, \"journal\": 'OracleMagazine', \"publisher\": 'OraclePublishing',\
    \ \"edition\": '11122013'}, function(error, result) {\n          if (error) console.warn(error.message);\n\
    \          else\n            console.log(result);\n        });\n      }\n    });\n\
    \  }\n});\n```\n\n### 运行与验证\n\n1.  使用 `node findOneAndReplaceDocument.js` 命令运行脚本。被替换的原始文档将被返回并输出，如图\
    \ 5-30 所示。\n    ![图 5-30](Images/image00579.jpeg)\n    *图 5-30. findOneAndReplaceDocument.js\
    \ 脚本的输出*\n2.  在 Mongo shell 中运行 `db.catalog.find()` 查询以列出文档，包括替换后的文档，如图 5-31 所示。\n\
    \    ![图 5-31](Images/image00580.jpeg)\n    *图 5-31. 列出替换后的文档*\n\n## 使用 replaceOne\n\
    \n另一种可以用来替换文档的方法是 `replaceOne(filter, doc, options, callback)` 方法。它与 `findOneAndReplace(filter,\
    \ replacement, options, callback)` 方法类似，但 `replaceOne` 方法提供的选项更少（`w`、`wtimeout`、`j`、`upsert`\
    \ 和 `upsert`）。\n\n## 更新单个文档\n\n在本节中，我们将更新一个文档。`findOneAndUpdate(filter, update,\
    \ options, callback)` 方法用于基于选择器查询来更新一个或多个文档。\n\n### 参数说明\n\n`findOneAndUpdate()`\
    \ 方法的参数如下表所示。\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object |\
    \ 指定文档选择过滤器以选择要更新的文档。 |\n| `update` | object | 要在文档上执行的更新操作。 |\n| `options` |\
    \ object | 方法选项。 |\n| `callback` | `resultCallback(error, result)` | 回调函数，第一个参数是\
    \ `MongoError` 对象，第二个参数是方法结果。如果使用写关注，则必须指定回调函数。 |\n\n该方法支持的选项与 `findOneAndReplace()`\
    \ 方法相同，在上一节的表 5-21 中已有讨论。\n\n### 示例脚本\n\n1.  在 `local` 数据库中，使用 `db.catalog.drop()`\
    \ 删除 `catalog` 集合。\n2.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个 `updateDocument.js`\
    \ 脚本。\n3.  如前所述，创建一个名为 `catalog` 的集合。\n4.  添加两个只设置了部分字段的文档，因为后续我们将通过更新来添加其他字段。\n\
    \    ```javascript\n    doc1 = {\"catalogId\": 1, \"journal\": 'Oracle Magazine',\
    \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'};\n\
    \    doc2 = {\"catalogId\": 2, \"journal\": 'Oracle Magazine', \"publisher\":\
    \ 'Oracle Publishing', \"edition\": 'November December 2013'};\n    collection.insertMany([doc1,\
    \ doc2], function(error, result) {\n      if (error)\n        console.log(error);\n\
    \      else {\n        console.log(\"Documents added: \" + result);\n      }\n\
    \    });\n    ```\n5.  使用 `findOneAndUpdate(filter, update, options, callback)`\
    \ 方法，筛选 `journal` 字段为 `'Java Magazine'` 的所有文档，并使用 `$set` 操作符更新其中一个文档为 `{journal:'Java\
    \ Magazine'}`。将 `upsert` 选项设置为 `true`，这样如果找不到匹配的文档，就会插入一个新文档。\n    ```javascript\n\
    \    collection.findOneAndUpdate({journal: 'Java Magazine'}, {$set: {journal:\
    \ 'Java Magazine'}}, {returnOriginal: false, upsert: true}, function(error, result)\
    \ {\n      if (error) console.log(error);\n      else\n        console.log(result);\n\
    \    });\n    ```\n    用于更新的字段和值的第二个参数可以使用任何更新操作符来指定。当使用更新操作符 `$set` 修改字段值时，不需要指定所有字段/值，只需指定要更新的字段。\n\
    6.  作为另一个示例，更新第一个匹配的、`journal` 字段设置为 `'Oracle Magazine'` 的文档。在文档参数中使用 `$set` 操作符来更新\
    \ `edition`、`title` 和 `author` 字段。由于通过 `insertMany` 添加的文档不包含 `title` 和 `author`\
    \ 字段，因此在更新时会添加这些字段。在回调函数中输出方法结果。\n    ```javascript\n    collection.update({journal:\
    \ 'Oracle Magazine'}, {$set: {edition: '11-12-2013', title: 'Engineering as a\
    \ Service', author: 'David A. Kelly'}}, {upsert: true, w: 1}, function(err, result)\
    \ {\n      if (err)\n        console.log(err);\n      else\n        console.log(result);\n\
    \    });\n    ```\n完整的 `updateDocument.js` 脚本如下：\n```javascript\nServer = require('mongodb').Server;\n\
    Db = require('mongodb').Db;\nCollection = require('mongodb').Collection;\nvar\
    \ db = new Db('local', new Server('localhost', 27017));\ndb.open(function(error,\
    \ db) {\n  if (error)\n    console.log(error);\n  else {\n    db.createCollection('catalog',\
    \ function(error, collection) {\n      if (error)\n        console.log(error);\n\
    \      else {\n        doc1 = {\"catalogId\": 1, \"journal\": 'Oracle Magazine',\
    \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'};\n\
    \        doc2 = {\"catalogId\": 2, \"journal\": 'Oracle Magazine', \"publisher\"\
    : 'Oracle Publishing', \"edition\": 'November December 2013'};\n        collection.insertMany([doc1,\
    \ doc2], function(error, result) {\n          if (error)\n            console.log(error);\n\
    \          else {\n            console.log(\"Documents added: \" + result);\n\
    \          }\n        });\n        collection.findOneAndUpdate({journal: 'Java\
    \ Magazine'}, {$set: {journal: 'Java Magazine'}}, {returnOriginal: false, upsert:\
    \ true}, function(error, result) {\n          if (error) console.log(error);\n\
    \          else\n            console.log(result);\n        });\n        collection.update({journal:\
    \ 'Oracle Magazine'}, {$set: {edition: '11-12-2013', title: 'Engineering as a\
    \ Service', author: 'David A. Kelly'}}, {upsert: true}, function(error, result)\
    \ {\n          if (error) console.log(error);\n          else\n            console.log(result);\n\
    \        });\n      }\n    });\n  }\n});\n```\n\n### 运行与验证\n\n1.  使用 `node updateDocument.js`\
    \ 命令运行脚本。图 5-32 所示的输出表明有一个文档被更新插入（upsert）。\n    ![图 5-32](Images/image00581.jpeg)\n\
    \    *图 5-32. updateDocument.js 的输出*\n2.  在 Mongo shell 中运行 `db.catalog.find()`\
    \ 方法以列出集合中的文档。列出的文档中有一个是更新插入的文档，如图 5-33 所示。另一个文档已被更新，其中添加了一些字段。\n    ![图 5-33](Images/image00582.jpeg)\n\
    \    *图 5-33. 列出更新后的文档*\n\n在被更新的文档（不是更新插入的文档）中，只有在 `$set` 操作符中指定的字段被更新，其他字段保持与更新前相同。只有第一个匹配的文档会被更新。"
  raw: 'Kelly''};     doc2 = {"catalogId" : ''catalog2'', "journal" : ''Oracle Magazine'',
    "publisher" : ''Oracle Publishing'', "edition" : ''November December     2013'',"title"
    : ''Quintessential and Collaborative'',"author" : ''Tom Haunert''};     collection.insertMany([doc1,doc2],
    function(error, result){     if (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     collection.findOneAndReplace({journal:''Oracle
    Magazine''}, {"catalogId" : ''catalog3'', "journal" : ''OracleMagazine'', "publisher"
    :     ''OraclePublishing'', "edition" : ''11122013''}, function(error, result)
    {      if (error) console.warn(error.message);       else        console.log(result);                });     }     });     }});     ```           5.  Run
    the script to replace a single document with `node findOneAndReplaceDocument.js`.
    The original document that gets replaced gets returned and output as shown in
    [Figure 5-30](#part0011.xhtml#Fig30).          ![9781484215999_Fig05-30.jpg](Images/image00579.jpeg)                    [Figure
    5-30](#part0011.xhtml#_Fig30). Output from findOneAndReplaceDocument.js Script           6.  Run
    a query in the Mongo shell with `db.catalog.find()` to list the documents including
    the replacement document as shown in [Figure 5-31](#part0011.xhtml#Fig31).          ![9781484215999_Fig05-31.jpg](Images/image00580.jpeg)                    [Figure
    5-31](#part0011.xhtml#_Fig31). Listing the Replacement Document              Another
    method that could be used to replace a document is the `replaceOne(filter, doc,
    options, callback)` method, which is similar to the `findOneAndReplace(filter,
    replacement, options, callback)` method except that the `replaceOne` method provides
    fewer options (`w`, `wtimeout`, `j`, `upsert,` and `upsert`).    Updating a Single
    Document    In this section we shall update a document. The `findOneAndUpdate(filter,
    update, options, callback)` method is used to update one or more documents based
    on a selector query. The method has the parameters shown in [Table 5-23](#part0011.xhtml#Tab23).    [Table
    5-23](#part0011.xhtml#_Tab23). Parameters for the findOneAndUpdate() Method     |
    Parameter | Type | Description | | --- | --- | --- | | `filter` | object | Specifies
    the document selection filter to select the document/s to update. | | `update`
    | object | Update operations to be performed on the document. | | `options` |
    object | Method options. | | `callback` | `resultCallback(error, result)` | The
    callback function, which has the first parameter a `MongoError` object and the
    second parameter the method result. The callback function must be specified if
    using write concern. |    The options supported by the `findOneAndUpdate()` method
    are the same as for the `findOneAndReplace()` method and discussed in the preceding
    section in [Table 5-21](#part0011.xhtml#Tab21).    1.  Drop the `catalog` collection
    in the `local` database with `db.catalog.drop()`. 2.  Create an `updateDocument.js`
    script in the `C:\Program Files\nodejs\scripts` directory. 3.  Create a collection
    called `catalog` as discussed previously. 4.  Add two documents with only some
    of the fields set as we shall be adding others as an update.                    ```     doc1
    = {"catalogId" : 1, "journal" : ''Oracle Magazine'',     "publisher" : ''Oracle
    Publishing'', "edition" : ''November December 2013''};     doc2 = {"catalogId"
    : 2, "journal" : ''Oracle Magazine'',     "publisher" : ''Oracle Publishing'',
    "edition" : ''November December 2013''};     collection.insertMany([doc1,doc2],
    function(error, result){     if (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     ```           5.  Using the `findOneAndUpdate(filter,
    update, options, callback)` method with filter as all documents with `journal`
    field as `''Java Magazine''` update one of the documents set to `{journal:''Java
    Magazine''}` using the `$set` operator.


    Set the `upsert` option to true so that a new document is added if one not found.                    ```     collection.findOneAndUpdate({journal:''Java
    Magazine''}           , {$set: {journal:''Java Magazine''}}           , {returnOriginal:
    false               ,upsert: true             }           , function(error, result)
    {      if (error) console.log(error);       else        console.log(result);           });     ```                    The
    second argument for the fields and values to be updated may be specified using
    any of the update operators. When using the update operator `$set` to modify field
    values, not all the fields/values need to be specified. Only the fields to be
    updated need to be specified.           6.  As another example, update the first
    matching document that has the `journal` field set to `''Oracle Magazine''`, using
    the `$set` operator in the document argument to update the `edition`, `title.`
    and `author` fields. As the documents added with `insertMany` do not include the
    `title` and `author` fields these fields are added when the update is made. In
    the callback function. output the method result.                    ```     collection.update({journal:''Oracle
    Magazine''}, {$set:{edition:''11-12-2013'', title:''Engineering as a Service'',
    author:''David A. Kelly''}}, {upsert:true, w: 1},     function(err, result){     if
    (err)         console.log(err);     else        console.log(result);     });     ```                    The
    `updateDocument.js` script is listed:                    ```     Server = require(''mongodb'').Server;     Db
    = require(''mongodb'').Db;     Collection = require(''mongodb'').Collection;     var
    db = new Db(''local'', new Server(''localhost'', 27017));     db.open(function(error,
    db) {      if (error)              console.log(error);     else{     db.createCollection(''catalog'',
    function(error, collection){     if (error)              console.log(error);     else{      doc1
    = {"catalogId" : 1, "journal" : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'',
    "edition" : ''November December 2013''};     doc2 = {"catalogId" : 2, "journal"
    : ''Oracle Magazine'', "publisher" : ''Oracle Publishing'', "edition" : ''November
    December 2013''};     collection.insertMany([doc1,doc2], function(error, result){     if
    (error)              console.log(error);     else{     console.log("Documents
    added: "+result);     }     });     collection.findOneAndUpdate({journal:''Java
    Magazine''}           , {$set: {journal:''Java Magazine''}}           , {returnOriginal:
    false               ,upsert: true             }           , function(error, result)
    {      if (error) console.log(error);       else        console.log(result);           });     collection.update({journal:''Oracle
    Magazine''}, {$set:{edition:''11-12-2013'', title:''Engineering as a Service'',
    author:''David A.     Kelly''}}, {upsert:true},     function(error, result) {      if
    (error) console.log(error);       else        console.log(result);                });     }     });     }});     ```           7.  Run
    the script with the command `node updateDocument.js`. The output shown in [Figure
    5-32](#part0011.xhtml#Fig32) indicates that one document gets upserted.          ![9781484215999_Fig05-32.jpg](Images/image00581.jpeg)                    [Figure
    5-32](#part0011.xhtml#_Fig32). Output from updateDocument.js           8.  Run
    the `db.catalog.find()` method in Mongo shell to list the document in the collection.
    One of the documents listed is the upserted document as shown in [Figure 5-33](#part0011.xhtml#Fig33).
    Another document has been updated with some fields added.          ![9781484215999_Fig05-33.jpg](Images/image00582.jpeg)                    [Figure
    5-33](#part0011.xhtml#_Fig33). Listing Updated Documents              In the updated
    document (not the upserted document) only the fields specified in the `$set` operator
    are updated and the other fields are the same as before the update. Only the first
    matching document is updated.'
  trans: "# 更新单个文档\n\n在本节中，我们将介绍如何使用 `findOneAndReplace`、`replaceOne` 和 `findOneAndUpdate`\
    \ 方法来更新 MongoDB 集合中的文档。\n\n## 使用 findOneAndReplace\n\n`findOneAndReplace(filter,\
    \ replacement, options, callback)` 方法用于查找一个文档并将其替换为一个新文档。\n\n### 参数说明\n\n| 参数\
    \ | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object | 指定用于选择要替换文档的选择器查询。 |\n\
    | `replacement` | object | 用于替换的新文档。 |\n| `options` | object | 方法选项。 |\n| `callback`\
    \ | `resultCallback(error, result)` | 回调函数，第一个参数是 `MongoError` 对象，第二个参数是方法结果。如果使用写关注，则必须指定回调函数。\
    \ |\n\n### 示例脚本\n\n创建一个名为 `findOneAndReplaceDocument.js` 的脚本。该脚本会连接到数据库，创建一个集合并插入两个文档，然后使用\
    \ `findOneAndReplace` 方法替换其中一个文档。\n\n```javascript\nvar db = new Db('local', new\
    \ Server('localhost', 27017));\ndb.open(function(error, db) {\n  if (error)\n\
    \    console.log(error);\n  else {\n    db.createCollection('catalog', function(error,\
    \ collection) {\n      if (error)\n        console.log(error);\n      else {\n\
    \        var doc1 = {\"catalogId\": 1, \"journal\": 'Oracle Magazine', \"publisher\"\
    : 'Oracle Publishing', \"edition\": 'November December 2013', \"title\": 'Oracle\
    \ and Linux', \"author\": 'Tom Haunert'};\n        var doc2 = {\"catalogId\":\
    \ 2, \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
    : 'November December 2013', \"title\": 'Quintessential and Collaborative', \"\
    author\": 'Tom Haunert'};\n        collection.insertMany([doc1, doc2], function(error,\
    \ result) {\n          if (error)\n            console.log(error);\n         \
    \ else {\n            console.log(\"Documents added: \" + result);\n         \
    \ }\n        });\n        collection.findOneAndReplace({journal: 'Oracle Magazine'},\
    \ {\"catalogId\": 3, \"journal\": 'OracleMagazine', \"publisher\": 'OraclePublishing',\
    \ \"edition\": '11122013'}, function(error, result) {\n          if (error) console.warn(error.message);\n\
    \          else\n            console.log(result);\n        });\n      }\n    });\n\
    \  }\n});\n```\n\n### 运行与验证\n\n1.  使用 `node findOneAndReplaceDocument.js` 命令运行脚本。被替换的原始文档将被返回并输出，如图\
    \ 5-30 所示。\n    ![图 5-30](img/image00579.jpeg)\n    *图 5-30. findOneAndReplaceDocument.js\
    \ 脚本的输出*\n2.  在 Mongo shell 中运行 `db.catalog.find()` 查询以列出文档，包括替换后的文档，如图 5-31 所示。\n\
    \    ![图 5-31](img/image00580.jpeg)\n    *图 5-31. 列出替换后的文档*\n\n## 使用 replaceOne\n\
    \n另一种可以用来替换文档的方法是 `replaceOne(filter, doc, options, callback)` 方法。它与 `findOneAndReplace(filter,\
    \ replacement, options, callback)` 方法类似，但 `replaceOne` 方法提供的选项更少（`w`、`wtimeout`、`j`、`upsert`\
    \ 和 `upsert`）。\n\n## 更新单个文档\n\n在本节中，我们将更新一个文档。`findOneAndUpdate(filter, update,\
    \ options, callback)` 方法用于基于选择器查询来更新一个或多个文档。\n\n### 参数说明\n\n`findOneAndUpdate()`\
    \ 方法的参数如下表所示。\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object |\
    \ 指定文档选择过滤器以选择要更新的文档。 |\n| `update` | object | 要在文档上执行的更新操作。 |\n| `options` |\
    \ object | 方法选项。 |\n| `callback` | `resultCallback(error, result)` | 回调函数，第一个参数是\
    \ `MongoError` 对象，第二个参数是方法结果。如果使用写关注，则必须指定回调函数。 |\n\n该方法支持的选项与 `findOneAndReplace()`\
    \ 方法相同，在上一节的表 5-21 中已有讨论。\n\n### 示例脚本\n\n1.  在 `local` 数据库中，使用 `db.catalog.drop()`\
    \ 删除 `catalog` 集合。\n2.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个 `updateDocument.js`\
    \ 脚本。\n3.  如前所述，创建一个名为 `catalog` 的集合。\n4.  添加两个只设置了部分字段的文档，因为后续我们将通过更新来添加其他字段。\n\
    \    ```javascript\n    doc1 = {\"catalogId\": 1, \"journal\": 'Oracle Magazine',\
    \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'};\n\
    \    doc2 = {\"catalogId\": 2, \"journal\": 'Oracle Magazine', \"publisher\":\
    \ 'Oracle Publishing', \"edition\": 'November December 2013'};\n    collection.insertMany([doc1,\
    \ doc2], function(error, result) {\n      if (error)\n        console.log(error);\n\
    \      else {\n        console.log(\"Documents added: \" + result);\n      }\n\
    \    });\n    ```\n5.  使用 `findOneAndUpdate(filter, update, options, callback)`\
    \ 方法，筛选 `journal` 字段为 `'Java Magazine'` 的所有文档，并使用 `$set` 操作符更新其中一个文档为 `{journal:'Java\
    \ Magazine'}`。将 `upsert` 选项设置为 `true`，这样如果找不到匹配的文档，就会插入一个新文档。\n    ```javascript\n\
    \    collection.findOneAndUpdate({journal: 'Java Magazine'}, {$set: {journal:\
    \ 'Java Magazine'}}, {returnOriginal: false, upsert: true}, function(error, result)\
    \ {\n      if (error) console.log(error);\n      else\n        console.log(result);\n\
    \    });\n    ```\n    用于更新的字段和值的第二个参数可以使用任何更新操作符来指定。当使用更新操作符 `$set` 修改字段值时，不需要指定所有字段/值，只需指定要更新的字段。\n\
    6.  作为另一个示例，更新第一个匹配的、`journal` 字段设置为 `'Oracle Magazine'` 的文档。在文档参数中使用 `$set` 操作符来更新\
    \ `edition`、`title` 和 `author` 字段。由于通过 `insertMany` 添加的文档不包含 `title` 和 `author`\
    \ 字段，因此在更新时会添加这些字段。在回调函数中输出方法结果。\n    ```javascript\n    collection.update({journal:\
    \ 'Oracle Magazine'}, {$set: {edition: '11-12-2013', title: 'Engineering as a\
    \ Service', author: 'David A. Kelly'}}, {upsert: true, w: 1}, function(err, result)\
    \ {\n      if (err)\n        console.log(err);\n      else\n        console.log(result);\n\
    \    });\n    ```\n完整的 `updateDocument.js` 脚本如下：\n```javascript\nServer = require('mongodb').Server;\n\
    Db = require('mongodb').Db;\nCollection = require('mongodb').Collection;\nvar\
    \ db = new Db('local', new Server('localhost', 27017));\ndb.open(function(error,\
    \ db) {\n  if (error)\n    console.log(error);\n  else {\n    db.createCollection('catalog',\
    \ function(error, collection) {\n      if (error)\n        console.log(error);\n\
    \      else {\n        doc1 = {\"catalogId\": 1, \"journal\": 'Oracle Magazine',\
    \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'};\n\
    \        doc2 = {\"catalogId\": 2, \"journal\": 'Oracle Magazine', \"publisher\"\
    : 'Oracle Publishing', \"edition\": 'November December 2013'};\n        collection.insertMany([doc1,\
    \ doc2], function(error, result) {\n          if (error)\n            console.log(error);\n\
    \          else {\n            console.log(\"Documents added: \" + result);\n\
    \          }\n        });\n        collection.findOneAndUpdate({journal: 'Java\
    \ Magazine'}, {$set: {journal: 'Java Magazine'}}, {returnOriginal: false, upsert:\
    \ true}, function(error, result) {\n          if (error) console.log(error);\n\
    \          else\n            console.log(result);\n        });\n        collection.update({journal:\
    \ 'Oracle Magazine'}, {$set: {edition: '11-12-2013', title: 'Engineering as a\
    \ Service', author: 'David A. Kelly'}}, {upsert: true}, function(error, result)\
    \ {\n          if (error) console.log(error);\n          else\n            console.log(result);\n\
    \        });\n      }\n    });\n  }\n});\n```\n\n### 运行与验证\n\n1.  使用 `node updateDocument.js`\
    \ 命令运行脚本。图 5-32 所示的输出表明有一个文档被更新插入（upsert）。\n    ![图 5-32](img/image00581.jpeg)\n\
    \    *图 5-32. updateDocument.js 的输出*\n2.  在 Mongo shell 中运行 `db.catalog.find()`\
    \ 方法以列出集合中的文档。列出的文档中有一个是更新插入的文档，如图 5-33 所示。另一个文档已被更新，其中添加了一些字段。\n    ![图 5-33](img/image00582.jpeg)\n\
    \    *图 5-33. 列出更新后的文档*\n\n在被更新的文档（不是更新插入的文档）中，只有在 `$set` 操作符中指定的字段被更新，其他字段保持与更新前相同。只有第一个匹配的文档会被更新。"
- fmt: "# Updating Multiple Documents\n\nIn this document we shall update multiple\
    \ documents using the `updateMany(filter, update, options, callback)` method.\
    \ The parameters are discussed in [Table 5-24](#part0011.xhtml#Tab24).\n\n## [Table\
    \ 5-24](#part0011.xhtml#_Tab24). Parameters for the `updateMany()` Method\n\n\
    | Parameter | Type | Description |\n| --- | --- | --- |\n| `filter` | object |\
    \ Specifies the document selection filter to select the document/s to update.\
    \ |\n| `update` | object | Update operations to be performed on the document.\
    \ |\n| `options` | object | Method options. The options are `upsert`, `w`, `wtimeout`,\
    \ and `j`. |\n| `callback` | `writeOpCallback(error, result)` | The callback function,\
    \ which has the first parameter a `MongoError` object and the second parameter\
    \ the method result. The callback function must be specified if using write concern.\
    \ |\n\n1.  Create a script `updateDocuments.js` in the `C:\\Program Files\\nodejs\\\
    scripts` directory to update multiple documents.\n2.  Add an array of documents\
    \ to the `catalog` collection in the `catalog` database as before using the `insertMany()`\
    \ method. Add the `catalogId`, `title`, and `author` fields; fields that are unique\
    \ to all documents, but don’t add the common fields `edition`, `journal`, and\
    \ `publisher`.\n\n    ```javascript\n    doc1 = {\"catalogId\" : 'catalog1',\"\
    title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n    doc2\
    \ = {\"catalogId\" : 'catalog2', \"title\" : 'Quintessential and Collaborative',\"\
    author\" : 'Tom Haunert'};\n    collection.insertMany([doc1,doc2], function(error,\
    \ result){\n        if (error)\n            console.log(error);\n        else{\n\
    \            console.log(\"Documents added: \"+result);\n        }\n    });\n\
    \    ```\n\n3.  Invoke the `updateMany()` method using selection filter to select\
    \ all documents represented with `{}`. Specify the update using the `$set` update\
    \ operator to add the common fields `journal`, `publisher`, and `edition`. In\
    \ the callback function, log the method result to the console.\n\n    ```javascript\n\
    \    collection.updateMany({}, {$set:{edition:'November December 2013', journal:'Oracle\
    \ Magazine', publisher:'Oracle Publishing'}},\n        {upsert:true},\n      \
    \  function(error, result) {\n            if (error) console.log(error);\n   \
    \         else\n                console.log(result);\n        });\n    ```\n\n\
    \    The `updateDocuments.js` script is listed:\n\n    ```javascript\n    Server\
    \ = require('mongodb').Server;\n    Db = require('mongodb').Db;\n    Collection\
    \ = require('mongodb').Collection;\n    var db = new Db('local', new Server('localhost',\
    \ 27017));\n    db.open(function(error, db) {\n        if (error)\n          \
    \  console.log(error);\n        else{\n            db.createCollection('catalog',\
    \ function(error, collection){\n                if (error)\n                 \
    \   console.log(error);\n                else{\n                    doc1 = {\"\
    catalogId\" : 'catalog1',\"title\" : 'Engineering as a Service',\"author\" : 'David\
    \ A. Kelly'};\n                    doc2 = {\"catalogId\" : 'catalog2', \"title\"\
    \ : 'Quintessential and Collaborative',\"author\" : 'Tom Haunert'};\n        \
    \            collection.insertMany([doc1,doc2], function(error, result){\n   \
    \                     if (error)\n                            console.log(error);\n\
    \                        else{\n                            console.log(\"Documents\
    \ added: \"+result);\n                        }\n                    });\n   \
    \                 collection.updateMany({}, {$set:{edition:'November December\
    \ 2013', journal:'Oracle Magazine', publisher:'Oracle Publishing'}},\n       \
    \                 {upsert:true},\n                        function(error, result)\
    \ {\n                            if (error) console.log(error);\n            \
    \                else\n                                console.log(result);\n\
    \                        });\n                }\n            });\n        }\n\
    \    });\n    ```\n\n4.  Before running the script delete the `catalog` collection\
    \ from the Mongo shell using the following commands in the Mongo shell.\n\n  \
    \  ```javascript\n    >use local\n    >db.catalog.drop()\n    ```\n\n5.  Run the\
    \ `updateDocuments.js` script using the command `node updateDocuments.js`. Two\
    \ documents get matched and the two documents get modified as indicated by the\
    \ `nModified` field in the result as shown in [Figure 5-34](#part0011.xhtml#Fig34).\n\
    \n    ![9781484215999_Fig05-34.jpg](Images/image00583.jpeg)\n\n    [Figure 5-34](#part0011.xhtml#_Fig34).\
    \ Output from `updateDocuments.js`\n\n6.  Run the `db.catalog.find()` method in\
    \ Mongo shell to list the updated documents. Both the documents have the `edition`,\
    \ `publisher`, and `journal` fields added/updated as shown in [Figure 5-35](#part0011.xhtml#Fig35).\n\
    \n    ![9781484215999_Fig05-35.jpg](Images/image00584.jpeg)\n\n    [Figure 5-35](#part0011.xhtml#_Fig35).\
    \ Listing Updated Documents\n\n# Removing a Single Document\n\nThe `findOneAndDelete(filter,\
    \ options, callback)` method may be used to remove one or more documents from\
    \ a collection. The method parameters are discussed in [Table 5-25](#part0011.xhtml#Tab25).\n\
    \n## [Table 5-25](#part0011.xhtml#_Tab25). Parameters for the `findOneAndDelete()`\
    \ Method\n\n| Parameter | Type | Description |\n| --- | --- | --- |\n| `filter`\
    \ | object | Specifies a document selection filter. If no filter is specified,\
    \ all documents are removed. |\n| `options` | object | Method options. |\n| `callback`\
    \ | `findAndModifyCallback(error, result)` | The callback function, which must\
    \ be specified if using write concern. |\n\nThe supported options are discussed\
    \ in [Table 5-26](#part0011.xhtml#Tab26).\n\n## [Table 5-26](#part0011.xhtml#_Tab26).\
    \ Options for the `findOneAndDelete()` Method\n\n| Option | Type | Description\
    \ |\n| --- | --- | --- |\n| `projection` | object | The fields projection for\
    \ the result. |\n| `sort` | object | If the query selects multiple documents,\
    \ determines which documents are replaced based on the sort order. |\n| `maxTimeMS`\
    \ | number | The maximum time in milliseconds for which the query may run. |\n\
    \n1.  Create a script `removeDocument.js` in the `C:\\Program Files\\nodejs\\\
    scripts` directory.\n2.  Add an array of documents to a collection using the `insertMany()`\
    \ method.\n3.  Invoke the `findOneAndRemove()` method using a selector query to\
    \ select all documents with `journal` as `Oracle Magazine` and output the callback\
    \ function result to the console.\n\n    ```javascript\n    collection.findOneAndRemove({journal:'Oracle\
    \ Magazine'},\n        function(error, result) {\n            if (error) console.log(error);\n\
    \            else\n                console.log(result);\n        });\n    ```\n\
    \n    The `removeDocument.js` script is listed:\n\n    ```javascript\n    Server\
    \ = require('mongodb').Server;\n    Db = require('mongodb').Db;\n    Collection\
    \ = require('mongodb').Collection;\n    var db = new Db('local', new Server('localhost',\
    \ 27017));\n    db.open(function(error, db) {\n        if (error)\n          \
    \  console.log(error);\n        else{\n            db.createCollection('catalog',\
    \ function(error, collection){\n                if (error)\n                 \
    \   console.log(error);\n                else{\n                    doc1 = {\"\
    catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
    \ as a Service',\"author\" : 'David A. Kelly'};\n                    doc2 = {\"\
    catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'};\n                    collection.insertMany([doc1,doc2],\
    \ function(error, result){\n                        if (error)\n             \
    \               console.log(error);\n                        else{\n         \
    \                   console.log(\"Documents added: \"+result);\n             \
    \           }\n                    });\n                    collection.findOneAndDelete({journal:'Oracle\
    \ Magazine'},\n                        function(error, result) {\n           \
    \                 if (error) console.log(error);\n                           \
    \ else\n                                console.log(result);\n               \
    \         });\n                }\n            });\n        }\n    });\n    ```\n\
    \n4.  Drop the `catalog` collection in `local` database with `db.catalog.drop()`.\n\
    \nWhen the `removeDocument.js` script is run with `node removeDocument.js` command,\
    \ two documents get added and one gets removed. The removed document gets output\
    \ as shown in [Figure 5-36](#part0011.xhtml#Fig36).\n\n![9781484215999_Fig05-36.jpg](Images/image00585.jpeg)\n\
    \n[Figure 5-36](#part0011.xhtml#_Fig36)."
  raw: 'Updating Multiple Documents    In this document we shall update multiple documents
    using the `updateMany(filter, update, options, callback)` method. The parameters
    are discussed in [Table 5-24](#part0011.xhtml#Tab24).    [Table 5-24](#part0011.xhtml#_Tab24).
    Parameters for the updateMany() Method     | Parameter | Type | Description |
    | --- | --- | --- | | `filter` | object | Specifies the document selection filter
    to select the document/s to update. | | `update` | object | Update operations
    to be performed on the document. | | `options` | object | Method options. The
    options are `upsert`, `w`, `wtimeout`, and `j`. | | `callback` | `writeOpCallback(error,
    result)` | The callback function, which has the first parameter a `MongoError`
    object and the second parameter the method result. The callback function must
