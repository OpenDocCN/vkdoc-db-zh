- fmt: "# Importing Data from a CSV File to MongoDB\n\n```catalog1,Apr-8-2014-7:06:16-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to STANDBY catalog2,Apr-8-2014-7:06:17-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to STARTING catalog3,Apr-8-2014-7:06:18-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to ADMIN catalog4,Apr-8-2014-7:06:19-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to RESUMING catalog5,Apr-8-2014-7:06:20-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000361,Started\
    \ WebLogic AdminServer catalog6,Apr-8-2014-7:06:21-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
    \ state changed to RUNNING catalog7,Apr-8-2014-7:06:22-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000360,Server\
    \ started in RUNNING mode```\n\nIn this section we shall transfer data from the\
    \ `wlslog.csv` file to MongoDB Server using the `mongoimport` tool.\n\n1.  Start\
    \ the MongoDB server with the following command.\n\n    ```\n    >mongod\n   \
    \ ```\n\n    MongoDB gets started on `localhost` on port `27017` as shown in [Figure\
    \ 8-2](#part0014.xhtml#Fig2).\n\n    ![9781484215999_Fig08-02.jpg](Images/image00631.jpeg)\n\
    \    [Figure 8-2](#part0014.xhtml#_Fig2). Starting MongoDB Server\n\n2.  Run the\
    \ `mongoimport` tool to transfer data from the `wlslog.csv` file to the MongoDB\
    \ Server. The command options are listed in [Table 8-2](#part0014.xhtml#Tab2).\n\
    \n    [Table 8-2](#part0014.xhtml#_Tab2). Command Parameters Used for the `mongoimort`\
    \ Tool Command\n\n    | Option | Value | Description |\n    | --- | --- | ---\
    \ |\n    | `--db` | `wls` | MongoDB database instance. The database is not required\
    \ to be created prior to running the `mongoimport` tool and gets created when\
    \ the import toll is run. |\n    | `--collection` | `wlslog` | Collection name.\
    \ The collection is also not required to be created prior to running the import\
    \ tool. |\n    | `--type` | `csv` | Type of input data is CSV. |\n    | `--fields`\
    \ | `ID`,`TIME_STAMP`,`CATEGORY`,`TYPE`,`SERVERNAME`,`CODE`,`MSG` | Input fields.\
    \ |\n    | `--file` | `wlslog.csv` | Input file. |\n\n3.  Run the following `mongoimport`\
    \ command.\n\n    ```\n    mongoimport --db wls --collection wlslog --type csv\
    \ --fields ID,TIME_STAMP,CATEGORY,TYPE,SERVERNAME,CODE,MSG --file wlslog.csv\n\
    \    ```\n\n    As the output indicates, data gets transferred to MongoDB Server\
    \ from the `wlslog.csv` file as shown in [Figure 8-3](#part0014.xhtml#Fig3). For\
    \ the 7 lines of input data 7 documents get created in MongoDB Server.\n\n   \
    \ ![9781484215999_Fig08-03.jpg](Images/image00632.jpeg)\n    [Figure 8-3](#part0014.xhtml#_Fig3).\
    \ Running the `mongoimport` Tool Command\n\n# Displaying the JSON Data in MongoDB\n\
    \nThe following steps show you how to display the JSON data:\n\n1.  Start the\
    \ Mongo shell with the following command.\n\n    ```\n    >mongo\n    ```\n\n\
    2.  To use the `wls` database run the following Mongo shell command.\n\n    ```\n\
    \    >use wls\n    ```\n\n3.  To list the collections run the following Mongo\
    \ shell command.\n\n    ```\n    >show collections\n    ```\n\n4.  To output the\
    \ document count run the following Mongo shell command.\n\n    ```\n    >db.wlslog.count()\n\
    \    ```\n\n    The output from the preceding commands is shown in [Figure 8-4](#part0014.xhtml#Fig4).\n\
    \n    ![9781484215999_Fig08-04.jpg](Images/image00633.jpeg)\n    [Figure 8-4](#part0014.xhtml#_Fig4).\
    \ The Document Count is 7\n\n5.  To list the documents imported to MongoDB Server\
    \ run the following Mongo shell command.\n\n    ```\n    >db.wlslog.find()\n \
    \   ```\n\n    The documents imported to MongoDB Server get listed as shown in\
    \ [Figure 8-5](#part0014.xhtml#Fig5).\n\n    ![9781484215999_Fig08-05.jpg](Images/image00634.jpeg)\n\
    \    [Figure 8-5](#part0014.xhtml#_Fig5). The 7 Documents Transferred to MongoDB\
    \ Server\n\n# Summary\n\nIn this chapter we transferred Oracle Database table\
    \ data to MongoDB Server. First, we created an Oracle Database table. As a direct\
    \ data transfer tool is not available, first we exported the Oracle Database table\
    \ to a CSV file. Subsequently the CSV file data is transferred to MongoDB Server\
    \ using the MongoDB `mongoimport` tool. In the next chapter we shall use Kundera,\
    \ a JPA 2.0 compliant Object-Datastore Mapping library for NoSQL datastores.\n\
    \n# CHAPTER 9\n\n## Using Kundera with MongoDB\n\nThe Java Persistence API (JPA)\
    \ is the Java API for persistence management and object/relational mapping in\
    \ Java EE/Java SE environment with which a Java domain model is used to manage\
    \ a relational database. JPA also provides a query language API with the Query\
    \ interface for static and dynamic queries. JPA is designed primarily for relational\
    \ databases, and Kundera is a JPA 2.0-compliant Object-Datastore Mapping library\
    \ for NoSQL datastores. Kundera also supports relational databases and provides\
    \ NoSQL datastore-specific configurations for MongoDB and some other NoSQL databases:\
    \ Apache Cassandra, and HBase. Using the `kundera-mongo` library in the domain\
    \ model MongoDB may be accessed using the JPA. In this chapter we shall access\
    \ MongoDB with the `kundera-mongo` module and run CRUD (Create, Read, Update,\
    \ and Delete) operations on MongoDB, covering the following topics:\n\n*   Setting\
    \ up the environment\n*   Creating a MongoDB collection\n*   Creating a Maven\
    \ project in Eclipse\n*   Creating a JPA entity class\n*   Configuring JPA in\
    \ the `persistence.xml` configuration file\n*   Creating a JPA client class\n\
    *   Running JPA CRUD operations\n*   The Kundera-Mongo JPA Client class\n*   Installing\
    \ the Maven project\n*   Running the Kundera-Mongo JPA Client class\n*   Invoking\
    \ the `KunderaClient` methods\n\n## Setting Up the Environment\n\nWe shall need\
    \ the following software for this chapter.\n\n*   Eclipse IDE for Java EE Developers\
    \ from `www.eclipse.org/downloads/`.\n*   MongoDB 3.0.2 (or a later version) Windows\
    \ binaries `mongodb-win32-x86_64-3.0.2-signed.msi` from `www.mongodb.org/dl/win32/x86_64`.\
    \ Double-click on the `mongodb-win32-x86_64-3.0.2-signed` file to install MongoDB\
    \ 3.0.2\\. Add the `bin` directory, for example `C:\\Program Files\\MongoDB\\\
    Server\\3.0\\bin`, to the `PATH` environment variable.\n*   Java 7 from `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\n\
    \nThe MongoDB versions supported by Kundera are `2.6.3+` & `3.0.2`. Create a directory\
    \ `C:\\data\\db` for the MongoDB data if not already created for an earlier chapter.\
    \ Start MongoDB with the following command from a command shell.\n\n```\n>mongod\n\
    ```\n\nMongoDB gets started waiting for connections on `localhost:27017`.\n\n\
    ## Creating a MongoDB Collection\n\nWe need to create a MongoDB collection in\
    \ which to store the documents. Start the Mongo shell with the `mongo` command\n\
    \n```\n>mongo\n```\n\nCreate a collection called `catalog` with the following\
    \ commands in Mongo shell. The first command sets the database to `local`. The\
    \ second command drops the `catalog` collection.\n\n```\n>use local\n>db.catalog.drop()\n\
    >db.createCollection(\"catalog\")\n```\n\nThe `catalog` collection gets created\
    \ as shown in [Figure 9-1](#part0015.xhtml#Fig1).\n\n![9781484215999_Fig09-01.jpg](Images/image00635.jpeg)\n\
    [Figure 9-1](#part0015.xhtml#_Fig1). Creating MongoDB Collection\n\n## Creating\
    \ a Maven Project in Eclipse\n\nThe `kundera-mongo` library is available as a\
    \ Maven dependency. We shall use a Maven project to access MongoDB with the `kundera-mongo`\
    \ library for which to create a Maven project in Eclipse IDE.\n\n1.  Select File\
    \ ![image](Images/image00406.jpeg) New ![image](Images/image00406.jpeg) Other\
    \ in Eclipse IDE.\n2.  Select Maven ![image](Images/image00406.jpeg) Maven Project\
    \ in the New window as shown in [Figure 9-2](#part0015.xhtml#Fig2). Click on Next.\n\
    \n    ![9781484215999_Fig09-02."
