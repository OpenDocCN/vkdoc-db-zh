    \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\n```\n\nDrop the `catalog` collection\
    \ and invoke the `db.catalog.insert()` method using an array of documents with\
    \ collection as `catalog`.\n\n```\n>db.catalog.drop()\n>db.catalog.insert([doc1,\
    \ doc2])\n```\n\nThe `insert()` method returns a `BulkWriteResult` object, which\
    \ includes a field `nInserted`, which signifies the number of documents added.\
    \ The two documents in the array are added as two distinct documents as indicated\
    \ by the `nInserted` field value as 2. Subsequently run the `db.collection.find()`\
    \ method to find the documents in the `catalog` collection.\n\n```\n>db.catalog.find()\n\
    ```\n\nThe collection method `find()` lists two distinct documents as shown in\
    \ [Figure 2-27](#part0008.xhtml#Fig27).\n\n![9781484215999_Fig02-27.jpg](Images/image00451.jpeg)\n\
    \n[Figure 2-27](#part0008.xhtml#_Fig27). Adding a Batch of Documents\n\nMongoDB\
    \ 2.6 Mongo shell added support for two new options: `writeConcern` and `ordered`.\
    \ Next, we shall demonstrate the use of these options. The `writeConcern` option\
    \ document supports the options listed in [Table 2-3](#part0008.xhtml#Tab3).\n\
    \n[Table 2-3](#part0008.xhtml#_Tab3). Insert Method Options\n\n| Option | Description\
    \ |\n| --- | --- |\n| `w` | Specifies the write concern. |\n| `j` | Confirms that\
    \ MongoDB has written the data to the on-disk journal. Boolean value, default\
    \ value is false. MongoDB shouldn’t be running with `–nojournal` option. |\n|\
    \ `wtimeout` | Applicable for `w` value greater than 1 specifies the time limit\
    \ in milliseconds for the write concern. Write concern is the guarantee MongoDB\
    \ provides when on reporting the success of an operation. |\n\nThe write concern\
    \ `w` may be set to the values listed in [Table 2-4](#part0008.xhtml#Tab4).\n\n\
    [Table 2-4](#part0008.xhtml#_Tab4). Write Concern Values\n\n| w Value | Description\
    \ |\n| --- | --- |\n| `1` | Provides acknowledgment of write concern on a stand-alone\
    \ MongoDB or the primary in a replica set. Default value. |\n| `0` | Disables\
    \ acknowledgment of write operations. |\n| `majority` | Confirms write operations\
    \ to the majority of the replica set members. |\n| Number greater than `1` | Confirms\
    \ write operations to the specified number of the replica set members. |\n| `tag\
    \ set` | Specifies in a fine-grained manner which replica set members must acknowledge\
    \ the write operation. |\n\nNext, we shall add a batch of documents using the\
    \ `writeConcern` and `ordered` options. Specify three BSON documents to be added.\n\
    \n```\ndoc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\"\
    \ : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"\
    edition\" : 'November December 2013',\"title\" : 'Engineering as a Service',\"\
    author\" : 'David A. Kelly'}\ndoc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"\
    ), \"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
    \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
    \ and Collaborative',\"author\" : 'Tom Haunert'}\ndoc3 = {\"_id\" : ObjectId(\"\
    53fb4b08d17e68cd481295d6\"), \"catalogId\" : 3, \"journal\" : 'Oracle Magazine',\
    \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n\
    ```\n\nUsing the `db.collection.insert()` method and a `writeConcern` (with `w`\
    \ set to `majority` and `wtimeout` set to 5000) and the `ordered` option set to\
    \ `true` add the array of documents. Again, before running the `db.catalog.insert()`\
    \ command drop the `catalog` collection.\n\n```\n>db.catalog.drop()\n>db.catalog.insert([doc3,\
    \ doc1, doc2],  { writeConcern: { w: \"majority\", wtimeout: 5000 }, ordered:true\
    \ })\n```\n\nA `BulkWriteResult` object gets returned with the `nInserted` value\
    \ of 3 as shown in [Figure 2-28](#part0008.xhtml#Fig28).\n\n![9781484215999_Fig02-28.jpg](Images/image00452.jpeg)\n\
