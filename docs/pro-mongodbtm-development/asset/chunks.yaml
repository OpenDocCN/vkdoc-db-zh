    12-36](#part0018.xhtml#_Fig36). New Model Folder           3.  Right-click on
    the model folder and select New Model as shown in [Figure 12-37](#part0018.xhtml#Fig37).          ![9781484215999_Fig12-37.jpg](Images/image00744.jpeg)                    [Figure
    12-37](#part0018.xhtml#_Fig37). Selecting New Model           4.  In the Model
    Definition specify a Name and select Technology as Hive as shown in [Figure 12-38](#part0018.xhtml#Fig38).
    Select Logical Schema as the `MongoDB` schema created in the previous section.
    Select Action Group as `<Generic Action>`. Click on Save.                    ![9781484215999_Fig12-38.jpg](Images/image00745.jpeg)                    [Figure
    12-38](#part0018.xhtml#_Fig38). Configuring a Model for MongoDB                    A
    model gets added for the Hive technology based on the logical schema `MongoDB`
    as shown in [Figure 12-39](#part0018.xhtml#Fig39).                    ![9781484215999_Fig12-39.jpg](Images/image00746.jpeg)                    [Figure
    12-39](#part0018.xhtml#_Fig39). New Model Called MongoDB           5.  Right-click
    on the model and select New Datastore as shown in [Figure 12-40](#part0018.xhtml#Fig40).          ![9781484215999_Fig12-40.jpg](Images/image00747.jpeg)                    [Figure
    12-40](#part0018.xhtml#_Fig40). Selecting New Datastore           6.  In the Datastore
    definition specify a Name and select Datastore Type as Table. Specify Resource
    Name as `wlslog` as shown in [Figure 12-41](#part0018.xhtml#Fig41).          ![9781484215999_Fig12-41.jpg](Images/image00748.jpeg)                    [Figure
    12-41](#part0018.xhtml#_Fig41). Configuring a New Datastore           7.  Select
    the Columns tab. We shall construct the data model for the datastore. Click on
    Add Column as shown in [Figure 12-42](#part0018.xhtml#Fig42).          ![9781484215999_Fig12-42.jpg](Images/image00749.jpeg)                    [Figure
    12-42](#part0018.xhtml#_Fig42). Selecting Add Column           8.  Specify the
    column Name, Type, Logical Length for the columns in the Hive table `wlslog`,
    which is stored as a MongoDB document collection as shown in [Figure 12-43](#part0018.xhtml#Fig43).
    Click on Save.                    ![9781484215999_Fig12-43.jpg](Images/image00750.jpeg)                    [Figure
    12-43](#part0018.xhtml#_Fig43). Configuring Columns                    A datastore
    gets added to the model as shown in [Figure 12-44](#part0018.xhtml#Fig44).                    ![9781484215999_Fig12-44.jpg](Images/image00751.jpeg)                    [Figure
    12-44](#part0018.xhtml#_Fig44). New Datastore           9.  Initially the datastore
    is empty. Right-click on the datastore and select View Data as shown in [Figure
    12-45](#part0018.xhtml#Fig45).'
