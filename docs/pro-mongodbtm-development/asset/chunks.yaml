    | `MongoDuplicateKeyException` | 如果将文档插入到一个集合中，而该集合中已存在另一个具有相同唯一键的文档，则抛出此异常。 |\n\
    \n### 环境设置\n"
- fmt: "# MongoDB 和 PHP 环境安装与连接\n\n## 安装所需软件\n\n除了安装 MongoDB 服务器外，我们还需要安装以下软件：\n*\
    \   MongoDB Server\n*   PHP\n*   PHP Driver for MongoDB\n\n## 安装 MongoDB Server\n\
    \n下载并安装 MongoDB 3.0.5。将 MongoDB 的 `bin` 目录（例如 `C:\\Program Files\\MongoDB\\Server\\\
    3.0\\bin`）添加到 `PATH` 环境变量中。使用以下命令启动 MongoDB 服务器：\n\n```\n>mongod\n```\n\n命令的输出表明\
    \ MongoDB 服务器已启动，如图 3-3 所示。\n\n![9781484215999_Fig03-03.jpg](Images/image00479.jpeg)\n\
    图 3-3. 启动 MongoDB\n\n## 安装 PHP\n\n运行 PHP 脚本需要 Web 服务器。PHP 5.4 及更高版本在安装包中包含了 Web\
    \ 服务器。\n\n1.  从 `http://windows.php.net/download/` 下载 PHP 5.5 (5.5.26) VC11 x64\
    \ Thread-Safe 版本的 PHP zip 文件 `php-5.5.26-Win32-VC11-x64.zip`。也可以使用更高的 PHP 版本。支持\
    \ PHP 5.3、5.4、5.5 和 5.6。VC11 版本需要预先安装 Visual C++ Redistributable for Visual Studio\
    \ 2012 x86 或 x64。\n2.  将 `php-5.5.26-Win32-VC11-x64.zip` 文件解压到一个目录，会创建一个 `php-5.5.26-Win32-VC11-x64`\
    \ 目录。如果使用不同版本，目录名会不同。\n3.  创建一个文档根目录（本章使用 `C:\\php`），并将文件和目录从 `php-5.5.26-Win32-VC11-x64`\
    \ 目录复制到 `C:\\php` 目录。\n4.  在 PHP 安装的根目录 `C:\\php` 中，将 PHP 配置文件 `php.ini-development`\
    \ 或 `php.ini-production` 重命名为 `php.ini`。\n5.  从文档根目录 `C:\\php` 使用以下命令在端口 8000\
    \ 启动内置的 Web 服务器：\n\n```\n    php -S localhost:8000\n```\n\n命令的输出表明开发服务器已启动并正在监听\
    \ `http://localhost:8000`，如图 3-4 所示。\n\n![9781484215999_Fig03-04.jpg](Images/image00480.jpeg)\n\
    图 3-4. 启动 PHP Web 服务器\n\n6.  任何复制到文档根目录 (`C:\\php`) 的 PHP 脚本都可以在集成 Web 服务器上运行。PHP\
    \ 脚本可以复制到文档根目录的子目录中，并通过在 URL 中包含从文档根目录开始的目录路径来运行。将以下脚本 `hellomongo.php` 复制到文档根目录的\
    \ `C:\\php` 目录。\n\n```\n    <html>\n     <head>\n      <title>PHP Test</title>\n\
    \     </head>\n     <body>\n     <?php echo '<p>Hello MongoDB</p>'; ?>\n     </body>\n\
    \    </html>\n```\n\n7.  使用 URL `http://localhost:8000/hellomongo.php` 运行该脚本。输出如图\
    \ 3-5 所示。\n\n![9781484215999_Fig03-05.jpg](Images/image00481.jpeg)\n图 3-5. 运行\
    \ PHP 脚本\n\n## 安装 PHP Driver for MongoDB\n\n要下载的驱动程序版本取决于所使用的 MongoDB 版本。PHP MongoDB\
    \ 驱动程序和 MongoDB 版本的兼容性矩阵列在表 3-3 中。\n\n表 3-3. 兼容性矩阵\n\n| PHP Driver | MongoDB Driver\
    \ |\n| --- | --- |\n| 1.6 | 2.4, 2.6, 3.0 |\n| 1.5 | 2.4, 2.6 |\n\n因为我们使用的是 MongoDB\
    \ 3.0.5，所以要下载的兼容 PHP 驱动程序版本是 1.6。\n\n1.  从 `http://pecl.php.net/package/mongo`\
    \ 下载 PHP MongoDB Database Driver。因为我们使用的是 PHP 5.5，所以需要从 `https://pecl.php.net/package/mongo/1.6.10/windows`\
    \ 下载 5.5 Thread Safe (TS) x64 版本的 `php_mongo-1.6.10-5.5-ts-vc11-x64.zip` 文件。\n\
    2.  将 `php_mongo-1.6.10-5.5-ts-vc11-x64.zip` 文件解压到一个目录。\n3.  将解压目录中的 `php_mongo.dll`\
    \ 文件复制到 PHP 安装的文档根目录 `C:\\php`。\n4.  将以下配置添加到 `php.ini` 文件中：\n\n```\n    extension=php_mongo.dll\n\
    ```\n\n5.  重启 PHP Web 服务器。\n\n![Image](Images/image00482.jpeg) **注意** 在后续章节中，我们将运行\
    \ PHP 脚本来连接 MongoDB 并在服务器上执行 CRUD 操作。在每个后续部分（除非特别说明）之前，在 Mongo shell 中运行以下命令，从\
    \ `local` 数据库中删除 `catalog` 集合；可以通过 `mongo` 命令启动 Mongo shell：\n\n```\nuse local\n\
    db.catalog.drop()\n```\n\n对于每个部分，我们将使用一个空集合，这样前一部分的文档就不会被使用，只有当前部分的脚本用于演示 PHP\
    \ MongoDB 驱动程序。\n\n## 创建连接\n\n在文档根目录 `C:\\php` 中创建一个 PHP 脚本 `mongoconnection.php`。使用\
    \ `MongoClient` 构造函数连接到 MongoDB 数据库，如下所示：\n\n```\n$connection = new MongoClient();\n\
    ```\n\n构造函数中未指定任何连接参数时，会建立到 `localhost:27017` 的连接，其中 `localhost` 是默认的 MongoDB\
    \ 主机，27017 是默认的 MongoDB 端口。输出连接详情：\n\n```\nprint 'Connection: <br/>';\nvar_dump($connection);\n\
    ```\n\n生成的输出如下：\n\n```\nobject(MongoClient)#1 (4) { [\"connected\"]=> bool(true)\
    \ [\"status\"]=> NULL [\"server\":protected]=> NULL [\"persistent\":protected]=>\
    \ NULL }\n```\n\n其中 `[\"connected\"]=> bool(true)` 表示客户端脚本已连接到 MongoDB。可以使用 `getWriteConcern()`\
    \ 方法输出写关注点，如下所示：\n\n```\nvar_dump($connection->getWriteConcern());\n```\n\n以下输出表示\
    \ `w` 的值为 1，`wtimeout` 的值为 -1：\n\n```\narray(2) { [\"w\"]=> int(1) [\"wtimeout\"\
    ]=> int(-1) }\n```\n\n可以使用必须以 `mongodb://` 开头的连接字符串来建立连接：\n\n```\n$connection\
    \ = new MongoClient( \"mongodb://localhost:27017\" );\n```\n\n使用 `getReadPreference()`\
    \ 方法输出读偏好。输出表明读取操作被定向到副本集中的主成员，这也是默认设置：\n\n```\narray(1) { [\"type\"]=> string(7)\
    \ \"primary\" }\n```\n\n使用 `listDBs()` 方法列出服务器上的数据库。输出一个包含数据库信息的数组。对于每个数据库，输出其名称、`sizeOnDisk`、`empty`\
    \ 属性。示例脚本中的三个数据库是 `catalog`、`local` 和 `test`：\n\n```\narray(3) { [\"databases\"\
    ]=> array(3) { [0]=> array(3) { [\"name\"]=> string(5) \"Loc8r\" [\"sizeOnDisk\"\
    ]=> float(83886080) [\"empty\"]=> bool(false) } [1]=> array(3) { [\"name\"]=>\
    \ string(5) \"local\" [\"sizeOnDisk\"]=> float(83886080) [\"empty\"]=> bool(false)\
    \ } [2]=> array(3) { [\"name\"]=> string(4) \"test\" [\"sizeOnDisk\"]=> float(83886080)\
    \ [\"empty\"]=> bool(false) } } [\"totalSize\"]=> float(251658240) [\"ok\"]=>\
    \ float(1) }\n```\n\n连接字符串中使用的主机名也可以是 IPv4 地址，如下所示。不同用户的 IPv4 地址会不同，可以使用 `ipconfig/all`\
    \ 命令查找：\n\n```\n$connection = new MongoClient(\"mongodb://192.168.1.72:27017\"\
    );\n```\n\n可以使用 `getConnections()` 方法列出所有打开的连接。连接信息（包括主机、端口和连接类型，示例连接为 `STANDALONE`）将被列出。"
  raw: "We need to install the following software in addition to installing MongoDB\
    \ server.\n\n*   MongoDB Server\n*   PHP\n*   PHP Driver for MongoDB\n\nDownload\
    \ and install MongoDB 3.0.5\\. Add the MongoDB `bin` directory, for example `C:\\\
    Program Files\\MongoDB\\Server\\3.0\\bin` directory to the `PATH` environment\
    \ variable. Start the MongoDB server with the following command.\n\n```\n>mongod\n\
    ```\n\nThe output from the command indicates that the MongoDB server has started\
    \ as shown in [Figure 3-3](#part0009.xhtml#Fig3).\n\n![9781484215999_Fig03-03.jpg](Images/image00479.jpeg)\n\
    \n[Figure 3-3](#part0009.xhtml#_Fig3). Starting MongoDB\n\nInstalling PHP\n\n\
    A web server is required for running PHP scripts and PHP 5.4, and later versions\
    \ include a web server packaged in the PHP installation.\n\n1.  Download PHP 5.5\
    \ (5.5.26) VC11 x64 Thread-Safe version of the PHP zip file `php-5.5.26-Win32-VC11-x64.zip`\
    \ from `http://windows.php.net/download/`. A later PHP version may also be used.\
    \ PHP 5.3, 5.4, 5.5 and 5.6 are supported. The VC11 builds require the Visual\
    \ C++ Redistributable for Visual Studio 2012 x86 or x64 installed as a prerequisite.\n\
    2.  Extract the `php-5.5.26-Win32-VC11-x64.zip` file to a directory. A `php-5.5.26-Win32-VC11-x64`\
    \ directory gets created. The directory would be different if a different version\
    \ is used.\n3.  Create a document root directory (`C:\\php` used in this chapter)\
    \ and copy the files and directories from the `php-5.5.26-Win32-VC11-x64` directory\
    \ to the `C:\\php` directory.\n4.  Rename the PHP configuration file `php.ini-development`\
    \ or `php.ini-production` in the root directory of the PHP installation, `C:\\\
    php`, to `php.ini`.\n5.  Start the packaged web server at port 8000 with the following\
    \ command from the document root directory `C:\\php` directory.\n\n```\n    php\
    \ -S localhost:8000\n    ```\n\nThe output from the command indicates that the\
    \ Development Server has been started and listening on `http://localhost:8000`\
    \ as shown in [Figure 3-4](#part0009.xhtml#Fig4).\n\n![9781484215999_Fig03-04.jpg](Images/image00480.jpeg)\n\
    \n[Figure 3-4](#part0009.xhtml#_Fig4). Starting PHP Web Server\n\n6.  Any PHP\
    \ script copied to the document root directory (`C:\\php`) may be run on the integrated\
    \ web server. PHP scripts may be copied to a subdirectory of the document root\
    \ directory and run by including the directory path starting from the document\
    \ root in the URL. Copy the following script `hellomongo.php` to the `C:\\php`\
    \ directory in the document root.\n\n```\n    <html>\n     <head>\n      <title>PHP\
    \ Test</title>\n     </head>\n     <body>\n     <?php echo '<p>Hello MongoDB</p>';\
    \ ?>\n     </body>\n    </html>\n    ```\n\n7.  Run the script with the URL `http://localhost:8000/hellomongo.php`.\
    \ The output is shown in [Figure 3-5](#part0009.xhtml#Fig5).\n\n![9781484215999_Fig03-05.jpg](Images/image00481.jpeg)\n\
    \n[Figure 3-5](#part0009.xhtml#_Fig5). Running a PHP Script\n\nInstalling PHP\
    \ Driver for MongoDB\n\nThe driver version to download is based on the MongoDB\
    \ version used. The compatibility matrix for PHP MongoDB Driver and MongoDB version\
    \ is listed in [Table 3-3](#part0009.xhtml#Tab3).\n\n[Table 3-3](#part0009.xhtml#_Tab3).\
    \ Compatibility Matrix\n\n| PHP Driver | MongoDB Driver |\n| --- | --- |\n| 1.6\
    \ | 2.4, 2.6, 3.0 |\n| 1.5 | 2.4, 2.6 |\n\nAs we are using MongoDB 3.0.5, the\
    \ compatible PHP driver version to download is 1.6.\n\n1.  Download the PHP MongoDB\
    \ Database Driver from `http://pecl.php.net/package/mongo`. As we are using PHP\
    \ 5.5 we need to download the 5.5 Thread Safe (TS) x64 `php_mongo-1.6.10-5.5-ts-vc11-x64.zip`\
    \ file from `https://pecl.php.net/package/mongo/1.6.10/windows`.\n2.  Extract\
    \ the `php_mongo-1.6.10-5.5-ts-vc11-x64.zip` file to a directory.\n3.  Copy the\
    \ `php_mongo.dll` file from the extracted directory to the PHP installation document\
    \ root directory `C:\\php`.\n4.  Add the following configuration to the `php.ini`\
    \ file.\n\n```\n    extension=php_mongo.dll\n    ```\n\n5.  Restart the PHP web\
    \ server.\n\n![Image](Images/image00482.jpeg) **Note**  In subsequent sections\
    \ we shall run PHP scripts to connect to MongoDB and run CRUD operations in the\
    \ server. Before each of the subsequent sections (except as noted), run the following\
    \ command in Mongo shell to delete the `catalog` collection from the local database;\
    \ the Mongo shell may be started with the `mongo` command:\n\n```\nuse local\n\
    db.catalog.drop()\n```\n\nWe shall be using an empty collection for each of the\
    \ sections so that document/s from a preceding section are not used, and only\
    \ the section script is used to demonstrate the PHP MongoDB Driver.\n\nCreating\
    \ a Connection\n\nCreate a PHP script `mongoconnection.php` in `C:\\php`, the\
    \ document root. Connect to MongoDB database using the `MongoClient` constructor\
    \ as follows.\n\n```\n$connection = new MongoClient();\n```\n\nWithout any connection\
    \ parameters specified in the constructor, a connection to `localhost:27017` is\
    \ established, `localhost` being the default MongoDB host and 27017 being the\
    \ default MongoDB port. Output the connection detail.\n\n```\nprint 'Connection:\
    \ <br/>';\nvar_dump($connection);\n```\n\nThe following output gets generated.\n\
    \n```\nobject(MongoClient)#1 (4) { [\"connected\"]=> bool(true) [\"status\"]=>\
    \ NULL [\"server\":protected]=> NULL [\"persistent\":protected]=> NULL }\n```\n\
    \nThe `[\"connected\"]=> bool(true)` indicates the client script has connected\
    \ to MongoDB. The write concern may be output using the `getWriteConcern()` method\
    \ as follows.\n\n```\nvar_dump($connection->getWriteConcern());\n```\n\nThe following\
    \ output indicates the value of `w` as 1 `wtimeout` as –1.\n\n```\narray(2) { [\"\
    w\"]=> int(1) [\"wtimeout\"]=> int(-1) }\n```\n\nA connection can be obtained\
    \ using a connection string that must start with `mongodb://`.\n\n```\n$connection\
    \ = new MongoClient( \"mongodb://localhost:27017\" );\n```\n\nOutput the read\
    \ preferences using the `getReadPreference()` method. The output indicates that\
    \ the read is directed at the primary member in the replica set, which is also\
    \ the default.\n\n```\narray(1) { [\"type\"]=> string(7) \"primary\" }\n```\n\n\
    List the databases on the server using the `listDBs()` method. An array consisting\
    \ of databases information gets output. For each database the name, `sizeOnDisk`,\
    \ empty properties get output. The three databases in the example script are `catalog`,\
    \ `local` and `test`.\n\n```\narray(3) { [\"databases\"]=> array(3) { [0]=> array(3)\
    \ { [\"name\"]=> string(5) \"Loc8r\" [\"sizeOnDisk\"]=> float(83886080) [\"empty\"\
    ]=> bool(false) } [1]=> array(3) { [\"name\"]=> string(5) \"local\" [\"sizeOnDisk\"\
    ]=> float(83886080) [\"empty\"]=> bool(false) } [2]=> array(3) { [\"name\"]=>\
    \ string(4) \"test\" [\"sizeOnDisk\"]=> float(83886080) [\"empty\"]=> bool(false)\
    \ } } [\"totalSize\"]=> float(251658240) [\"ok\"]=> float(1) }\n```\n\nThe hostname\
    \ used in the connection string may also be the IPv4 address as follows. The IPv4\
    \ address would be different for different users and may be found using the `ipconfig/all`\
    \ command.\n\n```\n$connection = new MongoClient(\"mongodb://192.168.1.72:27017\"\
    );\n```\n\nAll the open connections may be listed using the `getConnections()`\
    \ method. The connections info including host, port, and connection type (`STANDALONE`\
    \ for the sample connections) get listed."
