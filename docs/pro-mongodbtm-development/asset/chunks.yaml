    [Table 10-1](#part0016.xhtml#Tab1).    [Table 10-1](#part0016.xhtml#_Tab1). Java
    Classes     | Class | Description | | --- | --- | | `com.mongo.config.SpringMongoApplicationConfig`
    | `JavaConfig` class. | | `com.mongo.core.App` | Java application for using Spring
