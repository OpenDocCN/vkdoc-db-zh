  \ `forceServerObjectId` (布尔值，指示是否由服务器分配 `_id` 值而不是由驱动程序分配)。 |\n| `callback` | `insertWriteOpCallback(error,\
  \ result)` | 结果回调函数。 |\n\n2.  创建一个脚本 `addDocuments.js` 来添加文档。导入 `Server`、`Db` 和\
