  , function(error, db) {\n        if (error)\n            console.log(error);\n \
  \       else\n            console.log('Connected with MongoDB');\n    });\n    ```\n\
  \n5.  打开一个新的终端/控制台，导航到 `C:\\Program Files\\nodejs`。使用以下命令在 Node.js 中运行 `connection.js`\
