  \n图 1-10. 配置了 Mongo Java 驱动程序依赖项的 Maven 项目\n\n## 创建 BSON 文档\n\n在本节中，我们将向 MongoDB\
  \ 服务器添加一个 BSON（二进制 JSON）文档。我们将使用 Eclipse IDE 中的`CreateMongoDBDocument.java`应用程序。MongoDB\
  \ 文档由`org.bson.Document`类表示。MongoDB 将数据存储在集合中。MongoDB Java 驱动程序中用于 MongoDB 类的主要包是`com.mongodb`和`com.mongodb.client`。用于连接到\
  \ MongoDB 服务器的 MongoDB 客户端由`com.mongodb.MongoClient`类表示。一个`MongoClient`对象提供连接池，并且整个应用程序只需要一个实例。`MongoClient`类提供了几个构造函数，其中一些在表\
  \ 1-2 中列出。\n\n表 1-2. MongoClient 类构造函数\n\n| 构造函数 | 描述 |\n| --- | --- |\n| `MongoClient()`\
  \ | 基于单个 MongoDB 节点（localhost 和默认端口 27017）创建一个实例。 |\n| `MongoClient(String host)`\
  \ | 基于单个 MongoDB 节点创建实例，主机指定为 host[:port] 字符串。 |\n| `MongoClient(String host, int\
  \ port)` | 使用指定的主机和端口基于单个 MongoDB 节点创建实例。 |\n| `MongoClient(List<ServerAddress>\
  \ seeds)` | 使用 MongoDB 服务器列表创建实例以进行选择。选择 ping 时间最短的服务器。如果 ping 时间最短的服务器宕机，则选择列表中的下一个。\
  \ |\n| `MongoClient(List<ServerAddress> seeds, List<MongoCredential> credentialsList)`\
  \ | 与上一个版本相同，但提供凭据列表以验证到服务器的连接。 |\n| `MongoClient(List<ServerAddress> seeds, List<MongoCredential>\
  \ credentialsList, MongoClientOptions options)` | 与上一个版本相同，但也提供了 Mongo 客户端选项。 |\n\
  \n1.  使用`MongoClient(List<ServerAddress> seeds)`构造函数创建一个`MongoClient`实例。提供“localhost”或主机的\
  \ IPv4 地址，端口为 27017。\n\n```java\nMongoClient mongoClient = new MongoClient(Arrays.asList(new\
  \ ServerAddress(\"localhost\", 27017)));\n```\n\n2.  当创建多个`MongoClient`实例时，所有资源使用限制都适用于每个`MongoClient`实例。要关闭实例，需要调用`MongoClient.close()`来清理资源。MongoDB\
  \ 中的逻辑数据库由`com.mongodb.client.MongoDatabase`接口表示。使用`MongoClient`类中的`getDatabase(String\
  \ databaseName)`方法获取“local”数据库的`com.mongodb.client.MongoDatabase`实例，这是一个默认的 MongoDB\
  \ 数据库实例。\n\n```java\nMongoDatabase db = mongoClient.getDatabase(\"local\");\n```\n\
  \n3.  一些 Mongo 客户端 API 在 3.0.x 版本中已被修改。例如，在 3.0.x 中，数据库实例由`MongoDatabase`表示，而不是`com.mongodb.DB`。`MongoClient`中返回`DB`实例的`getDB(String\
  \ dbName)`方法已被弃用。在 3.0.x 中，数据库集合由`com.mongodb.client.MongoCollection<TDocument>`表示，而不是`com.mongodb.DBCollection`。使用`MongoDatabase`中的`listCollectionNames()`方法获取数据库中的所有集合名称。\n\
  \n```java\nMongoIterable<String> colls = db.listCollectionNames();\n```\n\n4.  `listCollectionNames()`方法返回一个`MongoIterable<String>`的集合。迭代该集合以输出集合名称。\n\
  \n```java\nfor (String s : colls) {\n    System.out.println(s);\n}\n```\n\n5.  接下来，使用`MongoDatabase`中的`getCollection(String\
  \ collectionName)`方法创建一个新的`MongoCollection<Document>`实例。创建一个名为`catalog`的`Document`实例集合。当调用`getCollection(String)`方法时，会隐式创建集合。\n\
  \n```java\nMongoCollection<Document> coll = db.getCollection(\"catalog\");\n```\n\
