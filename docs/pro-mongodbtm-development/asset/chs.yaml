  \ Data\n\n## Spring Data 仓库概念\n\nSpring Data 仓库是数据访问层的抽象实现，位于底层数据存储之上。Spring Data\
  \ 仓库减少了访问数据存储所需的样板代码。Spring Data 仓库可以与 MongoDB 数据存储一起使用。\n\n## 配置仓库基础设施\n\n要为 MongoDB\
  \ 启用 Spring Data 仓库基础设施，需要用 `@EnableMongoRepositories` 注解标注 `JavaConfig` 类。用 `@EnableMongoRepositories(\"\
  com.mongo.repositories\")` 注解标注 `SpringMongoApplicationConfig` 类。`com.mongo.repositories`\
  \ 是用于搜索仓库的包。使用 `@ComponentScan` 注解指定要扫描带注解组件的包，并将其 `basePackageClasses` 元素设置为服务类\
  \ `CatalogService.class`（我们将在本节后面开发）。会扫描 `basePackageClasses` 中指定的每个类所在的包。修改后的 `SpringMongoApplicationConfig`\
  \ 类声明如下。\n\n```java\n@Configuration\n@EnableMongoRepositories(\"com.mongo.repositories\"\
  )\n@ComponentScan(basePackageClasses = {CatalogService.class})\npublic class SpringMongoApplicationConfig\
  \ extends AbstractMongoConfiguration {\n\n}\n```\n\n## Repository 接口\n\n核心仓库标记接口是\
  \ `org.springframework.data.repository.Repository`，它在实体之上提供 CRUD 访问。实体类 `Catalog`\
  \ 在本章前面已定义。用于在仓库上进行 CRUD 操作的泛型接口是 `org.springframework.data.repository.CrudRepository`。特定于\
  \ MongoDB 服务器的仓库接口是 `org.springframework.data.mongodb.repository.MongoRepository<T,ID\
  \ extends Serializable>`，它扩展了 `CrudRepository` 接口。该接口在领域类型（本例中为 `Catalog`）和 ID 类型（本例中为\
  \ `String`）上进行参数化。ID 继承 `java.io.Serializable` 接口，以便能够在 MongoDB 服务器中序列化 ID。创建一个接口\
  \ `CatalogRepository`，它扩展参数化类型 `MongoRepository<Catalog, String>`。\n\n`CatalogRepository`\
  \ 表示特定于 MongoDB 的仓库接口，用于在 MongoDB 服务器中存储类型为 `Catalog`、ID 类型为 `String` 的实体。\n\n```java\n\
  package com.mongo.repositories;\n\nimport org.springframework.data.mongodb.repository.MongoRepository;\n\
  \nimport com.mongo.model.Catalog;\n\npublic interface CatalogRepository extends\
  \ MongoRepository<Catalog, String> {\n\n}\n```\n\n## 服务类实现\n\n在服务类 `CatalogService`\
  \ 中，按如下方式从上下文中访问仓库实例。\n\n```java\nApplicationContext context = new AnnotationConfigApplicationContext(\n\
  \        SpringMongoApplicationConfig.class);\nCatalogRepository repository = context.getBean(CatalogRepository.class);\n\
  ```\n\n随后，使用声明为类变量的 `CatalogRepository` 实例在 MongoDB 文档存储上执行 CRUD 操作。将以下（Table 10-17）方法添加到\
  \ `CatalogService` 类以实现 CRUD 操作。方法名与 `MongoRepository` 方法名相同或相似。\n\n**Table 10-17.\
  \ CatalogService 类中的方法**\n\n| 方法 | 描述 |\n| --- | --- |\n| `count()` | 统计仓库中的文档数量。\
  \ |\n| `findAll()` | 查找仓库中的所有文档。 |\n| `save()` | 保存文档到仓库。 |\n| `saveBatch()` | 批量保存文档到仓库。\
  \ |\n| `findOne(String id)` | 在仓库中查找单个文档。 |\n| `deleteAll()` | 删除仓库中的所有文档。 |\n|\
  \ `deleteById()` | 根据 Id 删除文档。 |\n\n## 运行与操作\n\n在 `main` 方法中为每个方法添加方法调用。要运行 `CatalogService`\
  \ 类，请在 Package Explorer 中右键单击 `CatalogService.java` 应用程序，然后选择 Run As ![image](img/image00406.jpeg)\
  \ Java Application，如 Figure 10-22 所示。\n\n![9781484215999_Fig10-22.jpg](img/image00683.jpeg)\n\
  \n**Figure 10-22. 运行 CatalogService 应用程序**\n\n当运行 `CatalogService.java` 应用程序时，我们将分别调用每个方法，并在调用时注释掉其他方法。\n\
  \n### 获取文档计数\n\n扩展 `CrudRepository<T,ID>` 接口的 `MongoRepository<T,ID extends Serializable>`\
  \ 接口提供了 CRUD 操作方法。`MongoRepository` 接口还包含一个 `count()` 方法，该方法返回集合中存储的实体数量。要能够计数实体，首先需要使用本章前面讨论的\
  \ `MongoOperations` 实例创建一些实体。运行 `App` 应用程序以调用 `addDocumentBatch()` 方法添加一些文档。使用 `CatalogRepository`\
  \ 实例调用 `count()` 方法并输出返回的长整型值。\n\n```java\npublic static void count() {\n      \
  \  System.out.println(\"Number of documents: \" + repository.count());\n\n    }\n\
  ```\n\nFigure 10-23 中 Eclipse 控制台的输出显示存储的文档实体数量为 2。\n\n![9781484215999_Fig10-23.jpg](img/image00684.jpeg)\n\
  \n**Figure 10-23. 输出文档计数**\n\n### 从仓库查找实体\n\n`MongoRepository` 接口提供以下 (Table 10-18)\
  \ 方法用于从仓库中查找文档。\n\n**Table 10-18. 用于查找文档的 MongoRepository 方法**\n\n| 方法 | 描述 |\n\
  | --- | --- |\n| `T findOne(ID id)` | 返回指定 ID 的实体实例。 |\n| `Iterable<T> findAll()`\
  \ | 返回仓库中指定实体类型的所有实体。 |\n| `Iterable<T> findAll(Iterable<ID> ids)` | 返回给定 ID 的实体类型的所有实体。\
  \ |\n| `findAll(Sort sort)` | 返回按给定选项排序的所有实体。 |\n\n\n\n## 介绍\n\n在运行 `CatalogService`\
  \ 应用程序查找文档之前，请先删除 `catalog` 集合，因为我们会发现 `catalog` 集合中已有的文档。\n\n### 查找所有文档\n\n要能够查找文档，首先需要使用本章前面讨论的\
  \ `MongoOperations` 实例创建一些实体。例如，使用 `CatalogRepository` 实例仓库的 `findAll()` 方法查找所有实例。\n\
  \n```\nIterable<Catalog> iterable = repository.findAll();\n```\n\n`findAll()` 方法返回一个\
  \ `Iterable`，从中可以使用 `iterator()` 方法获取 `Iterator`。\n\n```\nIterator<Catalog> iter\
  \ = iterable.iterator();\n```\n\n使用 `Iterator` 迭代实体实例并输出每个实体实例的字段。`findAll()` 方法如下所示。\n\
  \n```\n    public static void findAll() {\n    Iterable<Catalog> iterable = repository.findAll();\n\
  \    Iterator<Catalog> iter = iterable.iterator();\n    while (iter.hasNext()) {\n\
  \        Catalog catalog = iter.next();\n \n        System.out.println(\"Journal:\
  \ \" + catalog.getJournal());\n        System.out.println(\"Publisher: \" + catalog.getPublisher());\n\
  \        System.out.println(\"Edition: \" + catalog.getEdition());\n        System.out.println(\"\
  Title: \" + catalog.getTitle());\n        System.out.println(\"Author: \" + catalog.getAuthor());\n\
  \    }\n}\n```\n\n当 `CatalogService` 应用程序运行时，两个实体实例的字段值会在 Eclipse 控制台中输出，如 Figure\
  \ 10-24 所示。\n\n![9781484215999_Fig10-24.jpg](img/image00685.jpeg)\n\nFigure 10-24.\
  \ 查找所有文档\n\n### 查找一个文档\n\n作为在 `MongoRepository` 中使用 `findOne()` 方法的示例，查找特定 ID 的实体实例（该\
  \ ID 已知存在于 MongoDB 数据库中）。随后输出该实体实例的字段值。`CatalogService` 类中的 `findOne()` 方法如下所示。\n\
  \n```\npublic static void findOne(String id) {\n    Catalog catalog = repository.findOne(id);\n\
  \    System.out.println(\"Journal: \" + catalog.getJournal());\n    System.out.println(\"\
  Publisher: \" + catalog.getPublisher());\n    System.out.println(\"Edition: \" +\
  \ catalog.getEdition());\n    System.out.println(\"Title: \" + catalog.getTitle());\n\
  \    System.out.println(\"Author: \" + catalog.getAuthor());\n}\n```\n\n使用之前保存的特定\
  \ ID，从 `main` 方法调用 `findOne()` 方法。\n\n```\nif (repository.exists(\"53ea75e336845ce83eeb214f\"\
  )) {\n    findOne(\"53ea75e336845ce83eeb214f\");\n}\n```\n\n实体实例的字段值在 Eclipse 控制台中输出，如\
  \ Figure 10-25 所示。\n\n![9781484215999_Fig10-25.jpg](img/image00686.jpeg)\n\nFigure\
  \ 10-25. 查找一个文档\n\n### 保存实体\n\n`MongoRepository` 接口提供了以下方法（Table 10-19）用于通过仓库保存文档。\n\
  \nTable 10-19. 用于保存文档的 MongoRepository 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `<S extends\
  \ T> S save(S entity)` | 保存给定的实体。如果实体已在服务器中，则覆盖该实体。返回已保存的实体实例。 |\n| `<S extends\
  \ T> Iterable<S> save(Iterable<S> entities)` | 保存给定的实体集合。如果某个实体已在服务器中，则覆盖该实体。返回已保存的实体实例。\
  \ |\n\n#### 保存单个文档\n\n作为示例，使用 `save(S entity)` 方法创建并保存一个实体实例。\n\n1.  在 `CatalogService`\
  \ 类的 `save()` 方法中创建一个 `Catalog` 实例。ID 字段参数可以是空字符串，因为 `_id` 字段是自动生成的。\n2.  随后，使用\
  \ `Catalog` 实例作为方法参数调用 `save()` 方法。\n\n要查找已保存的文档，请在 `CatalogService` 中调用 `findAll()`\
  \ 方法。`CatalogService` 中的 `save()` 方法如下。\n\n```\npublic static void save() {\n  \
  \  Catalog catalog = new Catalog(\"\", \"Oracle Magazine\",\n        \"Oracle Publishing\"\
  , \"11-12-2013\", \"Engineering as a Service\", \"Kelly, David\");\n    repository.save(catalog);\n\
  \    findAll();\n}\n```\n\n3.  从 `main` 方法调用 `save()` 方法以保存 `Catalog` 实例，随后查找并列出文档的字段值，如\
  \ Figure 10-26 所示。\n\n![9781484215999_Fig10-26.jpg](img/image00687.jpeg)\n\nFigure\
  \ 10-26. 保存一个文档\n\n#### 保存一批文档\n\n作为使用 `save(Iterable<S> entities)` 方法的示例，在 `CatalogService`\
  \ 应用程序的 `saveBatch()` 方法中创建一个实体实例的 `ArrayList`。使用 `ArrayList` 实例作为参数调用 `save(Iterable<S>\
  \ entities)` 方法。\n\n```\nrepository.save(arrayList);\n```\n\n随后调用 `findAll()` 方法查找所有已保存的实体。`saveBatch()`\
  \ 方法如下。\n\n```\npublic static void saveBatch() {\n    Catalog catalog1 = new Catalog(\"\
  \", \"Oracle Magazine\",\n        \"Oracle Publishing\", \"11-12-2013\", \"Engineering\
  \ as a Service\",\n        \"Kelly, David\");\n    Catalog catalog2 = new Catalog(\"\
  \", \"Oracle Magazine\",\n        \"Oracle Publishing\", \"11-12-2013\",\n     \
  \   \"Quintessential and Collaborative\", \"Haunert, Tom\");\n    entities = new\
  \ ArrayList<Catalog>();\n    entities.add(catalog1);\n    entities.add(catalog2);\n\
  \    repository.save(entities);\n    findAll();\n}\n```\n\n从 `main` 方法调用 `saveBatch()`\
  \ 方法。在运行 `CatalogService` 应用程序之前，请使用 Mongo shell 中的 `db.catalog.drop()` 方法删除先前创建的\
  \ `catalog` 集合。当 `CatalogService` 应用程序运行时，`ArrayList` 中的实体实例集合会被添加到 MongoDB 服务器。已保存的\
  \ `Catalog` 实体字段值会输出到 Eclipse 控制台，如 Figure 10-27 所示。\n\n![9781484215999_Fig10-27.jpg](img/image00688.jpeg)\n\
  \nFigure 10-27. 保存一批文档\n\n### 删除实体\n\n`MongoRepository` 接口提供了以下方法（Table 10-20）用于通过仓库删除文档。\n\
  \nTable 10-20. 用于删除文档的 MongoRepository 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `void\
  \ delete(ID id)` | 删除由仓库管理的具有给定 ID 的实体。 |\n| `void delete(T entity)` | 删除由仓库管理的指定实体。\
  \ |\n| `void delete(Iterable<? extends T> entities)` | 删除由仓库管理的在指定 `Iterable` 中的实体。\
  \ |\n| `void deleteAll()` | 删除由仓库管理的所有实体。 |\n\n#### 按 ID 删除文档\n\n作为使用 `delete(ID\
  \ id)` 方法的示例，在 `CatalogService` 应用程序的 `deleteById()` 方法中删除已知存在于 MongoDB 服务器中的具有特定\
  \ ID 的实体。\n\n首先，在 `deleteById()` 方法中保存一些文档。为已保存的 `Catalog` 实体使用类变量 `catalog1` 和\
  \ `catalog2`。在 `deleteById()` 方法中，使用其中一个已保存文档的 ID 作为方法参数，调用 `CatalogRepository`\
  \ 实例的 `delete(ID id)` 方法。文档的 ID 使用 `getId()` 方法获取。随后调用 `findAll()` 方法查找所有文档。\n\n\
  ```\npublic static void deleteById() {\n    //Add documents\n    repository.delete(catalog1.getId());\n\
  \    findAll();\n}\n```\n\n在 `CatalogService` 的 `main` 方法中调用 `deleteById()` 方法。\n\
  \n\n\n### 删除文档\n\n```java\ndeleteById();\n```\n\n运行`CatalogService`应用时，指定`Id`的`Catalog`实例将被删除。之后调用`findAll()`方法将只列出一个已保存的文档，如图\
  \ 10-28 所示。\n\n![9781484215999_Fig10-28.jpg](img/image00689.jpeg)\n\n图 10-28. 按\
  \ Id 删除文档\n\n### 删除所有文档\n\n以使用`deleteAll()`方法为例，首先在`CatalogService`的`deleteAll()`方法中添加一批文档。随后调用`CatalogRepository`实例的`deleteAll()`方法。接着调用`findAll()`方法来查找所有文档。\n\
  \n```java\npublic static void deleteAll() {\n    //添加文档\n    repository.deleteAll();\n\
  \    findAll();\n}\n```\n\n在`CatalogService`的`main`方法中调用`deleteAll()`方法。\n\n```java\n\
  deleteAll();\n```\n\n运行`CatalogService`应用时，一批文档会被保存，随后`deleteAll()`方法将删除所有已保存的文档。接着调用`findAll()`方法将找不到并列出任何文档，因为所有文档都已被删除，如图\
