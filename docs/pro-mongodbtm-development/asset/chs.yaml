- "# 使用 Spring Data 与 MongoDB\n\nSpring Data 专为非关系数据库等新型数据访问技术而设计。MongoDB 是一个非关系型\
  \ NoSQL 数据库，具有可扩展性、灵活性和高性能等优点。Spring Data MongoDB 项目为 MongoDB 服务器添加了 Spring Data\
  \ 功能。本章阐述如何使用 Spring Data MongoDB 项目访问 MongoDB 并在 Eclipse 中对数据库执行 CRUD 操作。我们将使用\
  \ Maven 作为构建自动化工具。本章包含以下主题：\n\n*   设置环境\n*   创建 Maven 项目\n*   安装 Spring Data MongoDB\n\
  *   配置 JavaConfig\n*   创建模型\n*   使用带有 Template 的 Spring Data 与 MongoDB\n*   使用带有\
  \ MongoDB 的 Spring Data 仓库\n\n## 设置环境\n我们需要为本章下载并安装以下软件。\n\n*   Eclipse IDE for\
  \ Java EE Developers。从 `www.eclipse.org/downloads` 下载。本章使用 Eclipse 4.4 Luna。\n*\
  \   从 `www.mongodb.org/downloads` 获取 MongoDB 3.0.5（或更高版本）二进制发行版。\n*   从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
  \ 获取 Java SE 7。\n\n双击 MongoDB 二进制发行版以安装 MongoDB。将 MongoDB 安装目录的 `bin` 目录（例如 `C:\\\
  Program Files\\MongoDB\\Server\\3.0\\bin`）添加到 `PATH` 环境变量中。如果之前章节未创建，请为 MongoDB\
  \ 数据创建目录 `C:\\data\\db`。\n\n使用以下命令启动 MongoDB 服务器。\n\n```bash\n>mongod\n```\n\n###\
  \ 创建 Maven 项目\n首先，我们需要在 Eclipse 中创建一个 Maven 项目。\n\n1.  选择 **File > New > Other**。\n\
  2.  在 **New** 窗口中，选择 **Maven > Maven Project** 向导并单击 **Next**，如图 10-1 所示。\n\n  \
  \  ![9781484215999_Fig10-01.jpg](img/image00661.jpeg)\n    **图 10-1.** 创建新的 Maven\
  \ 项目\n\n3.  **New Maven Project** 向导启动。选中 **Create a simple project** 复选框和 **Use\
  \ default Workspace location** 复选框，如图 10-2 所示。然后单击 **Next**。\n\n    ![9781484215999_Fig10-02.jpg](img/image00662.jpeg)\n\
  \    **图 10-2.** New Maven Project 向导\n\n4.  在 **Configure project** 中指定以下设置，然后单击\
  \ **Finish**，如图 10-3 所示。\n    *   Group Id: `com.spring.mongodb`\n    *   Artifact\
  \ Id: `SpringDataMongo`\n    *   Version: `1.0.0`\n    *   Packaging: `jar`\n  \
  \  *   Name: `SpringDataMongo`\n\n    ![9781484215999_Fig10-03.jpg](img/image00663.jpeg)\n\
  \    **图 10-3.** 配置新的 Maven 项目\n\n一个 Maven 项目（`SpringDataMongo`）被创建，如图 10-4 的 Package\
  \ Explorer 所示。\n\n![9781484215999_Fig10-04.jpg](img/image00664.jpeg)\n**图 10-4.**\
  \ 新的 Maven 项目 SpringDataMongo\n\n项目的 Java 构建路径应包含 Maven 依赖项，包括 Spring Data MongoDB\
  \ 项目依赖项。安装 Spring Data MongoDB 和其他依赖项将在下一节讨论。我们需要向 Maven 项目添加一些类以使用 Spring Data\
  \ 与 MongoDB。添加表 10-1 中列出的 Java 类。\n\n**表 10-1.** Java 类\n\n| 类 | 描述 |\n|---|---|\n\
  | `com.mongo.config.SpringMongoApplicationConfig` | `JavaConfig` 类。 |\n| `com.mongo.core.App`\
  \ | 用于通过 Template 使用 Spring Data 与 MongoDB 的 Java 应用程序。 |\n| `com.mongo.model.Catalog`\
  \ | 模型类。 |\n| `com.mongo.repositories.CatalogRepository` | MongoDB 特定仓库的实现类。 |\n\
  | `com.mongo.service.CatalogService` | 用于调用对 MongoDB 仓库的 CRUD 操作的服务类。 |\n\nMaven\
  \ 项目中的 Java 类如图 10-5 所示。\n\n![9781484215999_Fig10-05.jpg](img/image00665.jpeg)\n\
  **图 10-5.** Maven 项目中的 Java 类\n\n在后续章节中，我们将安装并使用 Spring Data MongoDB 项目。除非另有说明，在运行应用程序\
  \ `App.java` 或 `CatalogService.java` 之前，如果 `local` 数据库中已存在 `catalog` 集合，请使用 Mongo\
  \ shell 中的方法 `db.catalog.drop()` 将其删除。\n\n```javascript\n>use local\n>db.catalog.drop()\n\
  ```\n\n### 安装 Spring Data MongoDB\nMaven 项目在根目录下包含一个 `pom.xml` 文件，用于指定项目的依赖项和项目的构建配置。在\
  \ `pom.xml` 中指定表 10-2 中列出的依赖项。\n\n**表 10-2.** Maven 项目依赖项\n\n| 依赖项 | Group Id |\
  \ Artifact Id | 版本 |\n|---|---|---|---|\n| Spring Data MongoDB | `org.springframework.data`\
  \ | `spring-data-mongodb` | `1.7.2.RELEASE` |\n\n在构建配置中指定 `maven-compiler-plugin`\
  \ 和 `maven-eclipse-plugin` 插件。用于 Spring Data MongoDB 项目的 `pom.xml` 列出如下。\n\n```xml\n\
  <project xmlns=\"http://maven.apache.org/POM/4.0.0\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n    xsi:schemaLocation=\"http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
  >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.spring.mongodb</groupId>\n\
  \    <artifactId>SpringDataMongo</artifactId>\n    <version>1.0.0</version>\n  \
  \  <name>SpringDataMongo</name>\n    <dependencies>\n        <dependency>\n    \
  \        <groupId>org.springframework.data</groupId>\n            <artifactId>spring-data-mongodb</artifactId>\n\
  \            <version>1.7.2.RELEASE</version>\n        </dependency>\n    </dependencies>\n\
  \    <build>\n        <plugins>\n            <plugin>\n                <artifactId>maven-compiler-plugin</artifactId>\n\
  \                <version>3.0</version>\n                <configuration>\n     \
  \               <source>1.7</source>\n                    <target>1.7</target>\n\
  \                </configuration>\n            </plugin>\n            <plugin>\n\
  \                <groupId>org.apache.maven.plugins</groupId>\n                <artifactId>maven-eclipse-plugin</artifactId>\n\
  \                <version>2.9</version>\n            </plugin>\n        </plugins>\n\
  \    </build>\n</project>\n```\n\n\n### 配置 JavaConfig\n\n在配置 Spring 环境时，可以使用 `JavaConfig`\
  \ 来配置*普通的旧 Java 对象*（POJO）。POJO 是一种普通的 Java 对象，不受 Java 对象模型或约定的任何特殊约束。使用 `JavaConfig`\
  \ 进行 Spring Data MongoDB 配置的基类是 `org.springframework.data.mongodb.config.AbstractMongoConfiguration`。\n\
  \n1.  创建一个名为 `SpringMongoApplicationConfig` 的类，它声明一些 `@Bean` 方法并继承 `org.springframework.data.mongodb.config.AbstractMongoConfiguration`\
  \ 类。\n2.  使用 `@Configuration` 注解该类，这表明该类由 Spring 容器处理，以在运行时生成 Bean 定义和 Bean 请求。\n\
  3.  声明一个带有 `@Bean` 注解的方法，该方法返回一个 `MongoClient` 实例。`SpringMongoApplicationConfig`\
  \ 类必须实现继承的抽象方法 `getDatabaseName()` 和 `mongo()`。使用本地主机名（也可以使用 IP 地址）和端口号 27017 来创建\
  \ `MongoClient` 实例。\n4.  同时，重写非抽象方法 `getMappingBasePackage` 以返回模型类定义所在的包（`com.mongo.model`）。\n\
  \nSpring 配置类 `SpringMongoApplicationConfig` 如下所示。\n\n```java\npackage com.mongo.config;\n\
  \nimport org.springframework.context.annotation.Configuration;\nimport org.springframework.data.mongodb.config.AbstractMongoConfiguration;\n\
  import org.springframework.context.annotation.Bean;\nimport com.mongo.service.CatalogService;\n\
  import com.mongodb.Mongo;\nimport com.mongodb.MongoClient;\nimport com.mongodb.ServerAddress;\n\
  \nimport java.util.Arrays;\n\n@Configuration\npublic class SpringMongoApplicationConfig\
  \ extends AbstractMongoConfiguration {\n\n    @Override\n    @Bean\n    public Mongo\
  \ mongo() throws Exception {\n        return new MongoClient(Arrays.asList(new ServerAddress(\"\
  localhost\",\n                27017)));\n    }\n\n    @Override\n    protected String\
  \ getDatabaseName() {\n        return \"local\";\n    }\n\n    @Override\n    protected\
  \ String getMappingBasePackage() {\n        return \"com.mongo.model\";\n    }\n\
  }\n```\n\n### 创建模型\n\n接下来，为 Spring Data MongoDB 项目创建模型类。要持久化到 MongoDB 服务器的域对象必须使用\
  \ `@Document` 注解。\n\n1.  在 `com.mongo.model` 包中创建一个 POJO 类 `Catalog`。\n2.  为 `id`、`journal`、`edition`、`publisher`、`title`\
  \ 和 `author` 字段添加相应的 get/set 方法。\n3.  使用 `@Id` 注解 id 字段。\n4.  添加一个可用于构造 `Catalog`\
  \ 实例的构造函数。\n\n`Catalog` 实体如下所示。\n\n```java\npackage com.mongo.model;\nimport org.springframework.data.annotation.Id;\n\
  import org.springframework.data.mongodb.core.mapping.Document;\n@Document\npublic\
  \ class Catalog {\n    @Id\n    private String id;\n    private String journal;\n\
  \    private String publisher;\n    private String edition;\n    private String\
  \ title;\n    private String author;\n\n    public String getId() {\n        return\
  \ id;\n    }\n\n    public void setId(String id) {\n        this.id = id;\n    }\n\
  \n    public String getJournal() {\n        return journal;\n    }\n\n    public\
  \ void setJournal(String journal) {\n        this.journal = journal;\n    }\n\n\
  \    public String getPublisher() {\n        return publisher;\n    }\n\n    public\
  \ void setPublisher(String publisher) {\n        this.publisher = publisher;\n \
  \   }\n\n    public String getEdition() {\n        return edition;\n    }\n\n  \
  \  public void setEdition(String edition) {\n        this.edition = edition;\n \
  \   }\n\n    public String getTitle() {\n        return title;\n    }\n\n    public\
  \ void setTitle(String title) {\n        this.title = title;\n    }\n\n    public\
  \ String getAuthor() {\n        return author;\n    }\n\n    public void setAuthor(String\
  \ author) {\n        this.author = author;\n    }\n\n    public Catalog(String id,\
  \ String journal, String publisher, String edition,\n            String title, String\
  \ author) {\n        id = this.id;\n        this.journal = journal;\n        this.publisher\
  \ = publisher;\n        this.edition = edition;\n        this.title = title;\n \
  \       this.author = author;\n\n    }\n\n}\n```\n\n## 使用 Spring Data MongoDB Template\n\
  \n在本节中，我们将使用 MongoDB 模板在 MongoDB 服务器上执行 CRUD 操作。术语“模板”指的是 MongoDB 操作的实现，例如创建、查找、更新、删除、聚合、更新插入和计数。可以使用\
  \ `org.springframework.data.mongodb.core.MongoOperations` 接口在 MongoDB 数据存储上执行常见的\
  \ CRUD 操作。\n\n1.  创建一个 Java 类 `com.mongo.core.App` 以在 MongoDB 服务器上运行 CRUD 操作。\n\
  2.  `org.springframework.data.mongodb.core.MongoTemplate` 类实现了 `MongoOperations`\
  \ 接口。`MongoTemplate` 实例可以使用 `ApplicationContext` 获取。创建 `ApplicationContext` 如下：\n\
  \n    ```java\n    ApplicationContext context = new AnnotationConfigApplicationContext(\n\
  \    SpringMongoApplicationConfig.class);\n    ```\n\n    `getBean(String name,\
  \ Class requiredType)` 方法返回指定类型的命名 Bean。`MongoTemplate` 的 Bean 名称是 `mongoTemplate`。类类型是\
  \ `MongoOperations.class`。\n\n    ```java\n    MongoOperations ops = context.getBean(\"\
  mongoTemplate\", MongoOperations.class);\n    ```\n\n3.  可以使用 `MongoOperations`\
  \ 实例对存储在 MongoDB 中的域对象执行各种 CRUD 操作。将 表 10-3 中列出的 `static` 方法添加到 `App.java` 类中，并在\
  \ `main` 方法中添加对这些方法的调用。`App` 类的方法名称与 `MongoOperations` 方法名称相同或相似。\n4.  为 `MongoOperations`\
  \ 实例 `ops` 和两个 `Catalog` 实例 `catalog1` 与 `catalog2` 添加类变量。\n\n    ```java\n    static\
  \ MongoOperations ops;\n    static Catalog catalog1;\n    static Catalog catalog2;\n\
  \    ```\n\n在以下小节中，我们将调用 表 10-3 中列出的方法来创建集合、创建文档实例以及运行 CRUD 操作。\n\n**表 10-3. App.java\
  \ 中的方法**\n\n| 方法 | 描述 |\n| --- | --- |\n| `createCollection()` | 创建一个集合。 |\n| `createCatalogInstances()`\
  \ | 创建一些 Catalog 实例。 |\n| `addDocument()` | 添加一个文档。 |\n| `addDocumentBatch()` |\
  \ 批量添加文档。 |\n| `findById()` | 按 ID 查找文档。 |\n| `findOne()` | 查找一个文档。 |\n| `findAll()`\
  \ | 查找所有文档。 |\n| `find()` | 查找文档。 |\n| `updateFirst()` | 更新第一个文档。 |\n| `updateMulti()`\
  \ | 更新多个文档。 |\n| `remove()` | 移除文档。 |\n\n### 创建 MongoDB 集合\n\n首先，我们需要创建一个集合来添加文档。`MongoOperations`\
  \ 接口提供了重载的 `createCollection()` 方法来创建集合。每个 `createCollection()` 方法都返回一个 `com.mongodb.DBCollection`\
  \ 实例，如 表 10-4 所述。\n\n**表 10-4. MongoOperations 中重载的 createCollection() 方法**\n\n\
  | 方法 | 描述 |\n| --- | --- |\n| `createCollection(Class<T> entityClass)` | 创建一个非固定集合，其名称基于指定的实体类。\
  \ |\n| `createCollection(Class<T> entityClass, CollectionOptions collectionOptions)`\
  \ | 创建一个集合，其名称基于指定的实体类，并使用指定的集合选项。 |\n\n\n"
- "# MongoDB 操作：创建集合与添加文档\n\n### 创建集合\n\n首先，我们将在 `App` 应用程序的 `createCollection()`\
  \ 类方法中创建一个集合。我们需要检查名为 `catalog` 的集合是否已存在。`MongoOperations` 接口提供了 `collectionExists(String\
  \ collectionName)` 和 `collectionExists(Class<T> entityClass)` 方法来检查集合是否存在。\n\n1.\
  \  在 `if`-`else` 语句中检查 `catalog` 集合是否存在。如果不存在，则使用 `createCollection(String collectionName)`\
  \ 方法创建集合；如果已存在，则先使用 `dropCollection(String collectionName)` 方法删除集合，再重新创建。`createCollection()`\
  \ 类方法代码如下：\n    ```\n    private static void createCollection() {\n        if (!ops.collectionExists(\"\
  catalog\")) {\n            ops.createCollection(\"catalog\");\n        } else {\n\
  \            ops.dropCollection(\"catalog\");\n            ops.createCollection(\"\
  catalog\");\n        }\n    }\n    ```\n\n2.  在 `main` 方法中调用 `createCollection()`\
  \ 方法。\n3.  运行 `App.java` 应用程序，在 `local` 数据库中创建名为 `catalog` 的集合。在 Package Explorer\
  \ 中右键点击 `App.java`，选择 **Run As** > **Java Application** 来运行，如图 10-6 所示。\n    ![运行\
  \ App.java 应用程序](img/image00667.jpeg)\n    *图 10-6. 运行 App.java 应用程序*\n\n4.  运行\
  \ `show collections` 命令列出应用程序创建集合后的所有集合。`catalog` 集合会被列出，如图 10-7 所示。\n    ![在 Mongo\
  \ Shell 中列出 catalog 集合](img/image00668.jpeg)\n    *图 10-7. 在 Mongo Shell 中列出 catalog\
  \ 集合*\n\n### 创建文档实例\n\n我们将对 MongoDB 文档执行 CRUD 操作，为此我们添加了文档实例的类变量，以便在不同的方法调用中使用同一个文档实例，而无需在每个方法中创建新的文档实例。在\
  \ `createCatalogInstances()` 方法中，使用类构造函数创建两个 `Catalog` 实例。除了自动生成的必需字段 `_id` 外，其他字段值可以留空。\n\
  ```\ncatalog1 = new Catalog(\"catalog1\", \"Oracle Magazine\", \"Oracle Publishing\"\
  , \"November-December 2013\", \"Engineering as a Service\", \"David A. Kelly\");\n\
  catalog2 = new Catalog(\"catalog2\", \"Oracle Magazine\", \"Oracle Publishing\"\
  , \"November-December 2013\", \"Quintessential and Collaborative\", \"Tom Haunert\"\
  );\n```\n\n### 添加文档\n\n`MongoOperations` 接口提供了重载的 `save()` 方法和 `insert()` 方法来添加文档。`insert()`\
  \ 方法用于初次将文档存储到数据库中，而 `save()` 方法用于在数据库中不存在具有相同 `_id` 的文档时添加新文档，或在存在时更新该文档。如果不确定具有特定\
  \ `_id` 的文档是否已存在，应使用 `save()` 方法，因为如果已存在相同 `_id` 的文档，`insert()` 方法将会失败。本节我们将使用 `save()`\
  \ 方法，下一小节也将讨论使用 `insert()` 方法添加文档集合。\n\n`save()` 方法会在数据库中已存在相同 `_id` 的文档时更新该文档。如果不存在，则添加新文档，执行一次\
  \ upsert 操作。`_id` 是自动生成的。如果要保存对象的实体类型有一个 Id 属性（即用 `@Id` 注解的属性），则该属性会被设置为 MongoDB\
  \ 生成的 `_id` 值。如果 Id 属性的类型是 `String`，则其值会使用从 `_id` 字段值创建的 `ObjectId` 实例来设置。表 10-5\
  \ 讨论了两个重载的 `save()` 方法。\n\n*表 10-5. 重载的 save() 方法*\n\n| 方法 | 描述 |\n| --- | --- |\n\
  | `save(Object objectToSave)` | 将对象保存到该对象实体类型对应的集合中。 |\n| `save(Object objectToSave,\
  \ String collectionName)` | 将对象保存到指定的集合中。 |\n\n1.  在 `addDocument()` 方法中创建一个 `Catalog`\
  \ 实例。\n    ```\n    catalog1 = new Catalog(\"catalog1\", \"Oracle Magazine\", \"\
  Oracle Publishing\", \"November-December 2013\", \"Engineering as a Service\", \"\
  David A. Kelly\");\n    ```\n\n2.  调用 `save(Object objectToSave, String collectionName)`\
  \ 方法，以 `Catalog` 实例作为第一个参数，集合名称 `catalog` 作为第二个参数。如果集合在数据库中不存在，它会被隐式创建。例如，在调用 `save()`\
  \ 方法并指定集合名称为 `catalog` 之前，并不需要在 MongoDB 数据库中预先存在 `catalog` 集合。\n    ```\n    ops.save(catalog1,\
  \ \"catalog\");\n    ```\n    如果使用 `save(Object objectToSave)` 方法保存到特定集合，且该集合不存在，则会隐式创建一个与对象类同名的集合。\n\
  \    ```\n    ops.save(catalog1);\n    ```\n\n3.  输出自动设置在 Id 属性中的 `_id`。\n    ```\n\
  \    System.out.println(\"MongoDB generated Id: \" + catalog1.getId());\n    ```\n\
  \n4.  类似地添加另一个文档。\n    ```\n    catalog2 = new Catalog(\"catalog2\", \"Oracle Magazine\"\
  , \"Oracle Publishing\", \"November-December 2013\", \"Quintessential and Collaborative\"\
  , \"Tom Haunert\");\n    ops.save(catalog2, \"catalog\");\n    System.out.println(\"\
  MongoDB generated Id: \" + catalog2.getId());\n    ```\n    `addDocument()` 方法如下所示：\n\
  \    ```\n    private static void addDocument() {\n        catalog1 = new Catalog(\"\
  catalog1\", \"Oracle Magazine\",\n                \"Oracle Publishing\", \"November-December\
  \ 2013\",\n                \"Engineering as a Service\", \"David A. Kelly\");\n\
  \        ops.save(catalog1, \"catalog\");\n        //ops.save(catalog1);\n     \
  \   System.out.println(\"MongoDB generated Id: \" + catalog1.getId());\n\n     \
  \   catalog2 = new Catalog(\"catalog2\", \"Oracle Magazine\",\n                \"\
  Oracle Publishing\", \"November-December 2013\",\n                \"Quintessential\
  \ and Collaborative\", \"Tom Haunert\");\n        ops.save(catalog2, \"catalog\"\
  );\n        System.out.println(\"MongoDB generated Id: \" + catalog2.getId());\n\
  \    }\n    ```\n    当运行 `App.java` 应用程序并调用 `addDocument()` 方法时，两个文档会被添加到 `catalog`\
  \ 集合中。自动生成的 `_id` 字段值会输出到 Eclipse 控制台，如图 10-8 所示。\n    ![添加文档](img/image00669.jpeg)\n\
  \    *图 10-8. 添加文档*\n\n5.  要列出添加的两个文档，请在 Mongo shell 中运行 `db.catalog.find()` 方法，如图\
  \ 10-9 所示。\n    ![查找文档](img/image00670.jpeg)\n    *图 10-9. 查找文档*\n\n\n\n"
- "# 在 Mongo Shell 中列出文档\n\n`MongoOperations` 接口也提供了重载的 `insert()` 方法，用于添加单个文档，如 表\
  \ 10-6 所述。\n\n## 表 10-6. 重载的 insert() 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `insert(Object\
  \ objectToSave)` | 根据要保存对象的实体类型，将一个对象（文档）添加到集合中。 |\n| `insert(Object objectToSave,\
  \ String collectionName)` | 将一个对象（文档）添加到指定的集合中。 |\n\n### 批量添加文档\n\n在本节中，我们将添加一批文档，而非单个文档。`MongoOperations`\
  \ 接口提供了重载的 `insert()` 方法和 `insertAll()` 方法，用于将一批对象添加或插入到集合中，如 表 10-7 所述。我们将演示 表\
  \ 10-7 中的三种方法，以将文档列表添加到集合中。\n\n### 表 10-7. 重载的批量插入方法\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| `insert(Collection<? extends Object> batchToSave, Class<?> entityClass)`\
  \ | 在单个批次中添加指定实体类类型的对象列表。 |\n| `insert(Collection<? extends Object> batchToSave,\
  \ String collectionName)` | 在单个批次中将对象列表添加到指定的集合。 |\n| `insertAll(Collection<? extends\
  \ Object> objectsToSave)` | 将混合对象（文档）集合添加到数据库集合中。 |\n\n1.  在 `App` 应用程序中使用自定义方法\
  \ `addDocumentBatch()` 添加一批文档。\n2.  创建一个 `Catalog` 实例的 `ArrayList`。创建新的 `Catalog`\
  \ 实例 `catalog1` 和 `catalog2`。`Catalog` 实例 `catalog1` 和 `catalog2` 可以与 `addDocument()`\
  \ 自定义方法中创建的实例相同。由于 `catalog1` 和 `catalog2` 是类变量，可以复用相同的实例。\n\n    ```java\n    catalog1\
  \ = new Catalog(\"catalog1\", \"Oracle Magazine\",\n        \"Oracle Publishing\"\
  , \"November-December 2013\",\n        \"Engineering as a Service\", \"David A.\
  \ Kelly\");\n    catalog2 = new Catalog(\"catalog2\", \"Oracle Magazine\",\n   \
  \     \"Oracle Publishing\", \"November-December 2013\",\n        \"Quintessential\
  \ and Collaborative\", \"Tom Haunert\");\n    ArrayList arrayList = new ArrayList();\n\
  \    arrayList.add(catalog1);\n    arrayList.add(catalog2);\n    ```\n\n3.  接下来，使用以下方法之一添加一批文档：\n\
  \    1.  使用 `insert(Collection<? extends Object> batchToSave, String collectionName)`\
  \ 方法将 `ArrayList` 实例添加到 `catalog` 集合。\n        `ops.insert(arrayList, \"catalog\"\
  );`\n    2.  或者使用 `insert(Collection<? extends Object> batchToSave, Class<?> entityClass)`\
  \ 方法添加这批对象。\n        `ops.insert(arrayList, Catalog.class);`\n    3.  或者可以使用 `insertAll(Collection<?\
  \ extends Object> objectsToSave)` 方法来添加 `ArrayList`。要使用的数据库集合名称根据 `class` 确定。\n\
  \        `ops.insertAll(arrayList);`\n\n    对于所有 `insert()` 方法和 `insertAll()` 方法，如果集合尚未创建，则会隐式创建。\n\
  \n    ![Image](img/image00482.jpeg) `注意` 源代码包含两个重载 `insert()` 方法和 `insertAll()`\
  \ 方法的实现，用于添加一批文档。一次只能调用其中一种方法实现来添加两个文档。其他的方法调用可以注释掉。\n\n4.  在添加一批文档之前，先在 Mongo shell\
  \ 中使用以下命令移除 `catalog` 集合。\n\n    ```javascript\n    >use local\n    >db.catalog.drop()\n\
  \    ```\n\n    当运行 `App` 应用程序以调用 `addDocumentBatch()` 方法时，一批文档就会被添加到 `catalog`\
  \ 集合中。\n\n5.  随后在 Mongo shell 中运行 `db.catalog.find()` 方法以列出添加的文档，如 图 10-10 所示。`_id`\
  \ 是自动生成的。\n\n    ![9781484215999_Fig10-10.jpg](img/image00671.jpeg)\n\n    图 10-10.\
  \ 列出批量添加的文档\n\n## 按 Id 查找文档\n\n在本节中，我们将按 Id 查找文档。`MongoCollection` 接口提供了重载的 `findById()`\
  \ 方法，如 表 10-8 所述，用于按 Id 查找文档。\n\n### 表 10-8. 重载的 findById() 方法\n\n| 方法 | 描述 |\n\
  | --- | --- |\n| `findById(Object id, Class<T> entityClass)` | 根据给定 id 返回映射到给定实体类的文档。\
  \ |\n| `findById(Object id, Class<T> entityClass, String collectionName)` | 从给定的集合中，根据给定\
  \ id 返回映射到给定实体类的文档。 |\n\n在本节中，我们将使用 `findById(Object id, Class<T> entityClass, String\
  \ collectionName)` 方法按 Id 查找文档。\n\n1.  在 `App` 应用程序的 `findById()` 方法中创建一个 `Catalog`\
  \ 实例 `catalog1`。\n\n    ```java\n    catalog1 = new Catalog(\"catalog1\", \"Oracle\
  \ Magazine\",\n        \"Oracle Publishing\", \"November-December 2013\",\n    \
  \    \"Engineering as a Service\", \"David A. Kelly\");\n    ```\n\n2.  使用 `save()`\
  \ 方法将 `catalog1` 实例保存到 `catalog` 集合。\n\n    ```java\n    ops.save(catalog1, \"catalog\"\
  );\n    ```\n\n3.  使用 `findById()` 方法查找文档，其中 id 参数使用 `catalog1.getId()` 方法调用，实体类参数使用\
