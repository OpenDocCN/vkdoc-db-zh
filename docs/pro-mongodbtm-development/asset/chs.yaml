  \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"\
  title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n    doc2 =\
  \ {\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" :\
