  \ Ruby 与 MongoDB。\n\n"
- "# 第 4 章\n\n![image](img/image00404.jpeg)\n\n## 使用 Ruby 操作 MongoDB\n\nRuby 是一种开源编程语言，最常用于\
  \ Ruby on Rails 框架。Ruby 的一些显著特性包括简单性、灵活性、可扩展性、可移植性以及操作系统无关的线程处理。MongoDB Ruby 驱动程序可用于连接到\
  \ MongoDB 服务器，并对数据库中的数据进行添加、获取和更新操作。Ruby 驱动程序还提供了用于提高性能的 C 语言扩展。在本章中，我们将讨论使用 Ruby\
  \ 客户端访问 MongoDB 并更改数据。本章涵盖以下主题：\n\n*   入门指南\n*   使用集合\n*   使用文档\n\n## 入门指南\n\n在以下小节中，我们将介绍\
  \ Ruby Driver for MongoDB，并设置包含所需软件的环境。\n\n#### Ruby Driver for MongoDB 概述\n\nMongoDB\
  \ 的 Ruby 驱动程序 API 可用于在 Ruby 脚本中连接到 MongoDB 服务器，并在服务器上执行 CRUD（创建、读取、更新、删除）操作。Ruby\
  \ 驱动程序 API 中唯一的命名空间称为 `Mongo`。`Mongo` 命名空间中的主要类如 图 4-1 所示。\n\n![9781484215999_Fig04-01.jpg](img/image00509.jpeg)\n\
  \n图 4-1. Ruby MongoDB 驱动程序中的核心类\n\n`Mongo` 命名空间类在 表 4-1 中讨论。\n\n表 4-1. Ruby MongoDB\
  \ 驱动程序核心类\n\n| 类 | 描述 | 示例用法 |\n| --- | --- | --- |\n| `URI` | 根据连接字符串格式规范定义的 MongoDB\
  \ uri 的表示。 | `uri = URI.new('mongodb://localhost:27017')` |\n| `Address` | 表示到服务器的地址。\
  \ | `Mongo::Address.new(\"127.0.0.1:27017\")` |\n| `Auth` | 表示认证。 | `Auth.get(user)`\
  \ |\n| `BulkWrite` | 用于批量写入操作。 | `Mongo::BulkWrite.get(collection, operations, ordered:\
  \ true)` |\n| `Client` | `Client` 类是驱动程序的入口点。 | `Mongo::Client.new([ '127.0.0.1:27017'\
  \ ])` |\n| `Cluster` | 表示一组服务器。 | `Mongo::Cluster.new([\"127.0.0.1:27017\"])` |\n\
  | `Collection` | 表示一个集合。 | `Mongo::Collection.new(database, 'test')` |\n| `Cursor`\
  \ | 客户端对查询结果的迭代器。不由用户直接创建，而是由 `CollectionView` 内部创建。 | `catalog.find.each { |document|\
  \ puts document }` |\n| `Database` | 表示服务器上的一个数据库。 | `Mongo::Database.new(client,\
  \ :test)` |\n| `Error` | `Error` 类。 | `Mongo::Error::BulkWriteFailure.new(response)`\
  \ |\n| `Logger` | 记录消息。 | `Logger.error('mongo', 'message', '10ms')` |\n| `Server`\
  \ | 表示单个服务器。 | `Mongo::Server.new('127.0.0.1:27017', cluster, listeners)` |\n| `ServerSelector`\
  \ | 根据给定的偏好选择服务器。 | `Mongo::ServerSelector.get({ :mode => :secondary })` |\n| `WriteConcern`\
  \ | 表示写关注。 | `Mongo::WriteConcern.get(:w => 1)` |\n\n#### 设置环境\n\n我们需要下载并安装以下软件以从\
  \ Ruby 访问 MongoDB 服务器。\n\n*   Ruby 2.1.6 安装程序 (`rubyinstaller-2.1.6-x64.exe`)。从\
  \ `http://rubyinstaller.org/downloads/` 下载。MongoDB Ruby 驱动程序 2.x 支持 Ruby 版本 1.8.7、1.9、2.0\
  \ 和 2.1。\n*   Rubygems。\n*   RubyInstaller Development Kit (DevKit)。从 `http://rubyinstaller.org/downloads/`\
  \ 下载合适的版本。对于 Ruby 2.1.6，请下载 `DevKit-mingw64-64-4.7.2-20130224-1432-sfx.exe`。\n*\
  \   MongoDB Ruby 驱动程序\n*   MongoDB Server 3.0.5\n\n### 安装 Ruby\n\n要安装 Ruby，请双击 Ruby\
  \ 安装程序应用程序 `rubyinstaller-2.1.6-x64.exe`。Ruby 安装向导将启动。\n\n1.  选择安装语言并单击“确定”。\n2.\
  \  接受许可协议并单击“下一步”。\n3.  在“安装目标和可选任务”中，指定安装 Ruby 的目标文件夹，或选择默认文件夹。目录路径不应包含任何空格。选择“将\
  \ Ruby 可执行文件添加到您的 `PATH`”。\n4.  单击“安装”，如 图 4-2 所示。\n\n    ![9781484215999_Fig04-02.jpg](img/image00510.jpeg)\n\
  \n    图 4-2. 选择 Ruby 的安装目录\n\nRuby 开始安装，如 图 4-3 所示。\n\n![9781484215999_Fig04-03.jpg](img/image00511.jpeg)\n\
  \n图 4-3. 安装 Ruby\n\n安装向导完成 Ruby 的安装，如 图 4-4 所示。单击“完成”。\n\n![9781484215999_Fig04-04.jpg](img/image00512.jpeg)\n\
  \n图 4-4. Ruby 已安装\n\n接下来，安装 Rubygems，这是一个用于 Ruby 的包管理框架。运行以下命令来安装 Rubygems。\n\n\
  ```\ngem install rubygems-update\n```\n\nRubygems gem 将被安装，如 图 4-5 所示。\n\n![9781484215999_Fig04-05.jpg](img/image00513.jpeg)\n\
  \n图 4-5. 安装 Rubygems\n\n如果 Rubygems 已经安装，请使用以下命令更新到最新版本。\n\n```\nupdate_rubygems\n\
  ```\n\nRubygems 将被更新，如 图 4-6 所示。\n\n![9781484215999_Fig04-06.jpg](img/image00514.jpeg)\n\
  \n图 4-6. 更新 Rubygems\n\n### 安装 DevKit\n\nDevKit 是一个工具包，用于构建许多适用于 Ruby 的 C/C++ 扩展。\n\
  \n1.  要安装 DevKit，请双击 DevKit 安装程序应用程序 (DevKit-mingw64-64-4.7.2-20130224-1432-sfx.exe)\
  \ 将 DevKit 文件解压到一个目录。使用 `cd` 命令切换到文件解压到的目录。\n\n    ```\n    C:\\Ruby21-x64\n   \
  \ ```\n\n2.  使用以下命令初始化 DevKit 并自动生成 `config.yml` 文件。\n\n    ```\n    ruby dk.rb\
  \ init\n    ```\n\n3.  在 C:\\Ruby21-x64 目录中生成一个 `config.yml` 文件。将以下行添加到 `config.yml`\
  \ 文件中。\n\n    ```\n    - C:/Ruby21-x64\n    ```\n\n4.  使用以下命令安装 DevKit。\n\n    ```\n\
  \    ruby dk.rb install\n    ```\n\n5.  使用以下命令验证 DevKit 是否已安装。\n\n    ```\n    ruby\
  \ -rubygems -e \"require 'json'; puts JSON.load('[42]').inspect\"\n    ```\n\n用于初始化/安装\
  \ DevKit 的上述命令的输出显示在 图 4-7 的命令 shell 中。\n\n![9781484215999_Fig04-07.jpg](img/image00515.jpeg)\n\
  \n图 4-7.\n\n\n\n"
- "# 安装 MongoDB 的 Ruby 驱动\n\n要安装 MongoDB Ruby 驱动 gem `mongo`，请完成以下步骤：\n\n1.  运行以下命令。\n\
  \n    ```ruby\n    >gem install mongo\n    ```\n\n    MongoDB Ruby 驱动 gem 安装过程如\
  \ 图 4-8 所示。\n\n    ![9781484215999_Fig04-08.jpg](img/image00516.jpeg)\n    图 4-8.\
  \ 安装 MongoDB Ruby 驱动\n\n2.  接下来，安装 MongoDB 服务器。只有 MongoDB 2.4、2.6 和 3.x 版本与 MongoDB\
  \ Ruby 驱动 2.x 兼容。从 `www.mongodb.org/` 下载 MongoDB 3.0.5，并将 zip 文件解压到一个目录。\n3.  将\
  \ MongoDB 安装目录下的 `bin` 目录（例如，`C:\\Program Files\\MongoDB\\Server\\3.0\\bin`）添加到\
  \ `PATH` 环境变量中。\n4.  使用以下命令启动 MongoDB 服务器。\n\n    ```bash\n    >mongod\n    ```\n\
  \n    MongoDB 服务器启动过程如 图 4-9 所示。\n\n    ![9781484215999_Fig04-09.jpg](img/image00517.jpeg)\n\
