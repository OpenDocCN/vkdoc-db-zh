  \ '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException\
  \ $e) {\n echo '<p>w option is set and the write has failed</p>';\n    exit();\n\
  \n}\n?>\n```\n\n7.  在浏览器中运行 PHP 脚本`addDocumentBatch.php`，URL 为`http://localhost:8000/addDocumentBatch.php`。如图\
  \ 3-14 的输出所示，两个具有唯一 id 的文档被添加到了 MongoDB 的`catalog`集合中。\n\n![9781484215999_Fig03-14.jpg](img/image00491.jpeg)\n\
  \n**图 3-14. `addDocumentBatch.php`脚本的输出**\n\n8.  随后，在 Mongo shell 中调用`local`数据库中`catalog`集合的`find()`方法，以输出添加的文档。\n\
