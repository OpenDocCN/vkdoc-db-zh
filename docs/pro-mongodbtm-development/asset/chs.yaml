  \ 方法。要关闭所有连接，可调用带参数 `true` 的 `close()` 方法。如果未提供参数或参数为 `false`，则仅关闭调用该方法时所使用的连接。可以通过连接字符串指定一个特定的连接。如果在关闭所有连接后调用\
  \ `getConnections()` 方法，则会列出一个空数组。\n\n```\narray(0) { }\n```\n\n以下是 PHP 脚本 `mongoconnection.php`\
  \ 的内容：\n\n```\n<?php\n$connection = new MongoClient(); // 连接到 localhost:27017\n\
