  \    ```\n\n    如 图 5-20 所示，添加的文档被列出。\n\n    ![9781484215999_Fig05-20.jpg](img/image00567.jpeg)\n\
  \n    图 5-20。列出已添加的文档\n\n### 添加多个文档\n\n在本节中，我们将向 MongoDB 集合添加多个文档。\n\n1.  在 `local`\
