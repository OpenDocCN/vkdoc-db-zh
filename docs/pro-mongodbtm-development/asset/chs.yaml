  \ collection.js 脚本后本地数据库中的集合列表\n\n## 使用文档\n\n在以下小节中，我们将添加文档、批量添加文档、查询文档、更新文档、删除文档以及对文档执行批量操作。\n\
  \n### 添加单个文档\n\n在本节中，我们将向 MongoDB 集合添加一个文档。\n\n1.  首先，在 Mongo shell 中的 `local` 数据库中创建一个名为\
  \ `catalog` 的集合。\n    ```bash\n    >db.createCollection('catalog')\n    ```\n  \
  \  在 Mongo shell 中使用 `show collections` 命令列出已创建的 `catalog` 集合，如图 5-18 所示。\n    ![9781484215999_Fig05-18.jpg](img/image00565.jpeg)\n\
  \    **图 5-18** 创建 catalog 集合\n2.  在 `C:\\Program Files\\nodejs\\scripts` 目录中创建一个\
  \ `addDocument.js` 脚本。`Collection` 类提供了 `insertOne(doc, options, callback)` 方法来添加单个文档。\n\
  3.  在 `addDocument.js` 脚本中，为 `Db`、`Server` 和 `Collection` 类添加 `require` 语句。\n  \
  \  ```javascript\n    Server = require('mongodb').Server;\n    Db = require('mongodb').Db;\n\
  \    Collection = require('mongodb').Collection;\n    ```\n    `insertOne` 文档的参数在表\
  \ 5-13 中讨论。\n    **表 5-13** insertOne 方法的参数\n\n\n\n## `insertOne()` 方法参数\n\n| 参数\
  \ | 类型 | 描述 |\n| --- | --- | --- |\n| `doc` | object | 要插入的文档。 |\n| `options` |\
  \ object | 方法选项。支持的选项包括 `w` (写入关注)、`wtimeout` (写入关注超时时间)、`j` (布尔值，指示是否启用日志写入关注)、`serializeFunctions`\
  \ (布尔值，指示是否序列化任何对象上的函数) 和 `forceServerObjectId` (布尔值，指示是否由服务器分配 `_id` 值而不是由驱动程序分配)。\
  \ |\n| `callback` | `insertWriteOpCallback(error, result)` | 结果回调函数。 |\n\n### 添加单个文档\n\
  \n4.  使用类构造函数创建一个 `Db` 实例。\n\n    ```\n    var db = new Db('local', new Server('localhost',\
  \ 27017));\n    ```\n\n5.  使用 `open()` 方法打开数据库。\n\n    ```\n    db.open(function(error,\
  \ db) {\n        //获取集合目录\n    });\n    ```\n\n6.  在结果回调函数中，调用 `Db` 实例的 `collection()`\
  \ 方法以获取 `catalog` 集合。\n\n    ```\n    db.collection('catalog', function(error, collection){\n\
  \        if (error)\n            console.log(error);\n        else{\n          \
  \  //使用 insertOne 添加文档\n        }\n    });\n    ```\n\n7.  创建要添加文档的 JSON 数据。\n\n\
  \    ```\n    doc1 = {\"catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine',\
  \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"\
  title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'};\n    ```\n\n\
  8.  使用 `insertOne()` 方法添加文档。\n\n    ```\n    collection.insertOne(doc1, function(error,\
  \ result){\n        if (error)\n            console.log(error);\n        else{\n\
  \            console.log(\"文档已添加: \"+result);\n        }\n    });\n    ```\n\n \
  \   `addDocument.js` 的完整代码如下。\n\n    ```\n    Server = require('mongodb').Server;\n\
  \    Db = require('mongodb').Db;\n    Collection = require('mongodb').Collection;\n\
