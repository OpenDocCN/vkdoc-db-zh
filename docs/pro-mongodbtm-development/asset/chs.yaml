  \ ```java\n    Catalog catalog = ops.findById(catalog1.getId(), Catalog.class);\n\
  \    ```\n\n4.  随后，输出通过 id 找到的 `Catalog` 实例的字段值。\n\n    ```java\n    System.out.println(\"\
  Id in Catalog instance: \" + catalog1.getId());\n    System.out.println(\"Journal\
  \ : \" + catalog.getJournal());\n    System.out.println(\"Publisher : \" + catalog.getPublisher());\n\
  \    System.out.println(\"Edition : \" + catalog.getEdition());\n    System.out.println(\"\
  Title : \" + catalog.getTitle());\n    System.out.println(\"Author : \" + catalog.getAuthor());\n\
  \    ```\n\n    `App` 应用程序中的 `findById()` 方法如下所示。\n\n    ```java\n    private static\
  \ void findById() {\n        catalog1 = new Catalog(\"catalog1\", \"Oracle Magazine\"\
  ,\n            \"Oracle Publishing\", \"November-December 2013\",\n            \"\
  Engineering as a Service\", \"David A. Kelly\");\n\n        ops.save(catalog1);\n\
  \        // Catalog catalog = ops.findById(catalog1.getId(),\n        //     Catalog.class,\
  \ \"catalog\");\n        Catalog catalog = ops.findById(catalog1.getId(), Catalog.class);\n\
  \        System.out.println(\"Id in Catalog instance: \" + catalog1.getId());\n\
  \        System.out.println(\"Journal : \" + catalog.getJournal());\n        System.out.println(\"\
  Publisher : \" + catalog.getPublisher());\n        System.out.println(\"Edition\
  \ : \" + catalog.getEdition());\n        System.out.println(\"Title : \" + catalog.getTitle());\n\
  \        System.out.println(\"Author : \" + catalog.getAuthor());\n    }\n    ```\n\
  \n5.  运行 `App.java`。输出列出了通过 Id 找到的文档的字段值，如 图 10-11 所示。需要注意的是，`Catalog` 实例 `catalog1`\
  \ 的 id 不是在构造函数中指定的 id 值 (`catalog1`)，而是自动生成的 id 值。\n\n    ![9781484215999_Fig10-11.jpg](img/image00672.jpeg)\n\
  \n    图 10-11.\n\n\n\n"
- "# 通过 ID 查找文档\n\n### 查找单个文档\n\n另一种用于查找单个文档的方法是重载的 `findOne()`，它具有以下几种变体，在 表 10-9\
  \ 中讨论。\n\n**表 10-9**. 重载的 `findOne()` 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `findOne(Query\
  \ query, Class<T> entityClass)` | 使用指定的查询，从实体类类型的集合中查找该指定实体类类型的一个对象实例。 |\n| `findOne(Query\
  \ query, Class<T> entityClass, String collectionName)` | 使用指定的查询，从指定的集合中查找指定类型的一个对象实例。\
  \ |\n\n在本节中，我们将在 `App` 应用程序的 `findOne()` 方法中，使用 `Query` 对象从 `catalog` 集合中查找一个 `Catalog`\
  \ 类型的文档。首先，我们需要构造 `Query` 对象来查找该单个文档。`BasicQuery` 类继承自 Query，并提供以下构造函数，在 表 10-10\
  \ 中讨论。\n\n**表 10-10**. 重载的 `BasicQuery` 构造函数\n\n| 方法 | 描述 |\n| --- | --- |\n| `BasicQuery(com.mongodb.DBObject\
  \ queryObject)` | 使用指定的 `DBObject` 查询对象创建 `BasicQuery` 实例。 |\n| `BasicQuery(com.mongodb.DBObject\
  \ queryObject, com.mongodb.DBObject fieldsObject)` | 使用指定的 `DBObject` 查询对象和 `DBObject`\
  \ 字段对象创建 `BasicQuery` 实例。 |\n| `BasicQuery(String query)` | 使用指定的查询字符串创建 `BasicQuery`\
  \ 实例。 |\n| `BasicQuery(String query, String fields)` | 使用指定的查询字符串和字段字符串创建 `BasicQuery`\
  \ 实例。 |\n\n1.  使用 Mongo shell 中的以下 JavaScript 方法删除任何先前创建的名为 `catalog` 的集合。\n   \
  \ ```\n    >db.catalog.drop()\n    ```\n2.  在 `App` 应用程序的 `findOne()` 方法中调用 `createCatalogInstances()`\
  \ 方法来创建 `Catalog` 实例，并使用 `save()` 方法保存这些实体实例。\n    ```\n    createCatalogInstances();\n\
  \    ops.save(catalog1);\n    ops.save(catalog2);\n    ```\n3.  使用 `BasicDBObject(String\
  \ key, Object value)` 构造函数创建一个 `BasicDBObject` 实例。指定键为 id，值为使用 `getId()` 方法从 `catalog1`\
  \ 实例获取的 id 所创建的 `ObjectId` 实例。\n    ```\n    DBObject dbObject = new BasicDBObject(\"\
  id\", new ObjectId(catalog1.getId()));\n    ```\n4.  使用该 `BasicDBobject` 实例创建一个\
  \ `BasicQuery` 对象。\n    ```\n    BasicQuery query = new BasicQuery(dbObject);\n\
  \    ```\n5.  使用 `BasicQuery` 对象，通过任一种 `findOne()` 方法从实体类类型为 `Catalog` 的 `catalog`\
  \ 集合中查找单个文档。\n    ```\n    Catalog catalog = ops.findOne(query, Catalog.class);\n\
  \    // Catalog catalog = ops.findOne(query, Catalog.class,\"catalog\");\n    ```\n\
  \    `App` 应用程序中的 `findOne()` 方法如下所示。\n    ```\n    private static void findOne()\
  \ {\n            createCatalogInstances();\n            ops.save(catalog1);\n  \
  \          ops.save(catalog2);\n            DBObject dbObject = new BasicDBObject(\"\
  id\", new ObjectId(\n                    catalog1.getId()));\n            BasicQuery\
  \ query = new BasicQuery(dbObject);\n\n            Catalog catalog = ops.findOne(query,\
  \ Catalog.class);\n            // Catalog catalog = ops.findOne(query, Catalog.class,\"\
  catalog\");\n            System.out.println(\"Id in Catalog instance: \" + catalog1.getId());\n\
  \            System.out.println(\"Journal : \" + catalog.getJournal());\n      \
  \      System.out.println(\"Publisher : \" + catalog.getPublisher());\n        \
  \    System.out.println(\"Edition : \" + catalog.getEdition());\n            System.out.println(\"\
  Title : \" + catalog.getTitle());\n            System.out.println(\"Author : \"\
  \ + catalog.getAuthor());\n\n        }\n    ```\n6.  运行 `App` 应用程序以保存一些 `Catalog`\
  \ 实例，并使用 `MongoOperations` 中的 `findOne()` 方法查找其中一个 `Catalog` 实例。`findOne()` 方法的输出显示在\
  \ 图 10-12 的 Eclipse 控制台中。\n    ![9781484215999_Fig10-12.jpg](img/image00673.jpeg)\n\
  \    **图 10-12**. 使用 `findOne()` 查找文档\n    也可以使用带有 `Query(CriteriaDefinition criteriaDefinition)`\
  \ 构造函数的条件定义来创建要传递给 `findOne()` 方法的新 `Query` 实例。`Criteria` 类实现了 `CriteriaDefinition`\
  \ 接口，并提供了几种方法来创建条件并返回 `Criteria` 实例。使用 `where(String key)` 方法为条件指定一个键，随后调用 `is(Object\
  \ o)` 方法将该键与 `catalog2 Catalog` 实例中的 id 字段值进行比较。\n7.  使用通过链式调用 `where()` 和 `is()`\
  \ 方法返回的 `Criteria` 实例来创建一个 `Query` 实例，并使用该 `Query` 实例调用 `findOne(Query query, Class<T>\
  \ entityClass)` 方法。\n    ```\n    String _id = catalog2.getId();\n    Catalog catalog\
  \ = ops.findOne(new Query(Criteria.where(\"_id\").is(_id)),\n    Catalog.class);\n\
  \    ```\n8.  输出由 `findOne()` 方法返回的 `Catalog` 实例中的字段值。\n    ```\n    System.out.println(\"\
  Id in Catalog instance: \" + catalog2.getId());\n    System.out.println(\"Journal\
  \ : \" + catalog.getJournal());\n    System.out.println(\"Publisher : \" + catalog.getPublisher());\n\
  \    System.out.println(\"Edition : \" + catalog.getEdition());\n    System.out.println(\"\
  Title : \" + catalog.getTitle());\n    System.out.println(\"Author : \" + catalog.getAuthor());\n\
  \    ```\n    当运行 `App` 应用程序时，使用条件定义找到的 `Catalog` 实例中的字段值会输出，如 图 10-13 所示。\n   \
  \ ![9781484215999_Fig10-13.jpg](img/image00674.jpeg)\n    **图 10-13**. 使用查询条件查找文档\n\
  \n### 查找所有文档\n\n`MongoOperations` 接口提供了重载的 `findAll()` 方法，用于从集合中查找所有文档，如 表 10-11\
  \ 所述。\n\n**表 10-11**. 重载的 `findAll()` 方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `findAll(Class<T>\
  \ entityClass)` | 返回指定实体类类型的集合中的文档列表。 |\n| `findAll(Class<T> entityClass, String\
  \ collectionName)` | 返回指定实体类类型的指定集合中的文档列表。 |\n\n1.  在 `App` 应用程序的 `findAll()` 方法中，首先向\
  \ `catalog` 集合添加一些 `Catalog` 实例。\n2.  随后使用 `findAll(Class<T> entityClass)` 方法查找实体类类型为\
  \ `Catalog` 的所有文档。`findAll()` 方法返回一个 `List` 实例。\n3.  使用 `iterator()` 方法从 `List`\
  \ 实例获取一个 `Iterator<Catalog>`。\n    ```\n    Iterator<Catalog> iter = list.iterator();\n\
  \    ```\n4.  在 `while` 循环中使用 `hasNext()` 方法遍历结果集，并获取结果集中的 `Catalog` 实例。\n5.  使用\
  \ `Catalog` 类中为字段定义的 `get()` 方法输出 `Catalog` 实例中的字段值。`App` 类中的 `findAll()` 方法如下。\n\
  \    ```\n    private static void findAll() {\n            createCatalogInstances();\n\
  \            ops.save(catalog1);\n            ops.save(catalog2);\n            List<Catalog>\
  \ list = ops.findAll(Catalog.class);\n    ```\n\n\n\n### 使用查询查找文档\n\n在前面的章节中，我们使用了\
  \ `findAll`（查找所有文档）、`findOne`（查找单个文档）和 `findById`（按 Id 查找）来查找文档。`MongoOperations`\
  \ 接口提供了重载的 `find()` 方法，用于使用特定查询查找文档。`find()` 方法返回一个 `List<T>` 实例，并在表 10-12 中讨论。\n\
  \n**表 10-12. 重载的 find() 方法**\n\n| 方法 | 描述 |\n| --- | --- |\n| `find(Query query,\
  \ Class<T> entityClass)` | 为指定的实体类类型返回集合中符合指定查询的文档列表。 |\n| `find(Query query, Class<T>\
  \ entityClass, String collectionName)` | 为指定的实体类类型从指定集合中返回符合指定查询的文档列表。 |\n\n在 `App`\
  \ 应用程序的 `find()` 方法中，我们将查找 `publisher` 字段值为 `Oracle Publishing` 的文档。\n\n1.  使用构造函数\
  \ `BasicDBObject(String key, Object value)` 创建一个 `BasicDBObject` 实例，键为 `publisher`，值为\
  \ `Oracle Publishing`。\n    ```\n    DBObject dbObject = new BasicDBObject(\"publisher\"\
  , \"Oracle Publishing\");\n    ```\n2.  使用构造函数 `BasicQuery(com.mongodb.DBObject\
  \ queryObject)` 从 `BasicDBObject` 对象创建一个 `BasicQuery` 对象。\n    ```\n    BasicQuery\
  \ query = new BasicQuery(dbObject);\n    ```\n3.  使用 `BasicQuery` 实例调用 `find(Query\
  \ query, Class<T> entityClass, String collectionName)` 方法，以查找符合指定查询的文档。`find()`\
  \ 方法返回文档的 `List<Catalog>` 实例。\n    ```\n    List<Catalog> list = ops.find(query,\
  \ Catalog.class, \"catalog\");\n    ```\n4.  从 `List` 实例获取一个迭代器，并迭代该 `List` 实例以输出列表中文档的字段值。`App`\
  \ 应用程序中的 `find()` 方法如下所示。\n    ```\n    private static void find() {\n         \
  \   createCatalogInstances();\n            ops.save(catalog1);\n            ops.save(catalog2);\n\
  \            DBObject dbObject = new BasicDBObject(\"publisher\", \"Oracle Publishing\"\
