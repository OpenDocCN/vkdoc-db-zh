  \ 和端口 `27017` 创建一个 `List<ServerAddress>`。\n3. MongoDB 服务器上的逻辑数据库由 `com.mongodb.DB`\
  \ 类表示。使用 `MongoClient` 中的 `getDB(String dbname)` 方法创建一个 DB 实例，数据库名称为 `test`。\n4.\
  \ `DBCollection` 类表示数据库中文档对象的集合。使用 `MongoClient` 方法 `createCollection(String name,\
  \ DBObject options)` 创建一个 `DBCollection` 实例。\n```\n\n\n\n## 创建 MongoDB 文档对象\n\n\
  数据库集合中的 BSON 文档对象由`DBObject`接口表示。`BasicDBObject`类实现了`DBObject`接口，并提供了用于创建键/值文档对象的构造函数。使用`BasicDBObject(String\
  \ key, Object value)`构造函数创建文档对象，并使用`append(String key, Object val)`方法向对象添加键/值对。`BasicDBObject`的一个实例代表数据库集合中的一个文档对象。需要从日志数据创建三个`BasicDBObject`实例，以添加到\
  \ MongoDB 数据库集合中。\n\n`DBCollection`类提供了重载的插入方法，用于将`BasicDBObject`实例添加到集合中。使用`insert(DBObject...\
  \ arr)`方法将`BasicDBObject`实例添加到`DBCollection`。\n\n要在集合中查找文档对象，请在`DBCollection`对象上调用`findOne()`方法。\n\
  \n### `CreateMongoDBDocument`类\n\n```java\npackage mongodb;\n\nimport com.mongodb.MongoClient;\n\
  import com.mongodb.DB;\nimport import com.mongodb.DBCollection;\nimport com.mongodb.BasicDBObject;\n\
  import com.mongodb.DBObject;\nimport com.mongodb.ServerAddress;\nimport java.util.Arrays;\n\
  import java.net.UnknownHostException;\n\npublic class CreateMongoDBDocument {\n\
  \    public static void main(String[] args) {\n        try {\n            MongoClient\
  \ mongoClient = new MongoClient(\n                    Arrays.asList(new ServerAddress(\"\
  10.0.2.15\", 27017)));\n            DB db = mongoClient.getDB(\"test\");\n     \
  \       DBCollection coll = db.createCollection(\"wlslog\", null);\n\n         \
  \   BasicDBObject row1 = new BasicDBObject(\"TIME_STAMP\",\n                   \
  \ \"Apr-8-2014-7:06:16-PM-PDT\").append(\"CATEGORY\", \"Notice\")\n            \
  \        .append(\"TYPE\", \"WebLogicServer\")\n                    .append(\"SERVERNAME\"\
  , \"AdminServer\")\n                    .append(\"CODE\", \"BEA-000365\").append(\"\
  MSG\", \"Server state changed to STANDBY\");\n            coll.insert(row1);\n\n\
  \            BasicDBObject row2 = new BasicDBObject(\"TIME_STAMP\",\n          \
  \          \"Apr-8-2014-7:06:17-PM-PDT\").append(\"CATEGORY\", \"Notice\")\n   \
  \                 .append(\"TYPE\", \"WebLogicServer\")\n                    .append(\"\
  SERVERNAME\", \"AdminServer\")\n                    .append(\"CODE\", \"BEA-000365\"\
  ).append(\"MSG\", \"Server state changed to STARTING\");\n            coll.insert(row2);\n\
  \n            BasicDBObject row3 = new BasicDBObject(\"TIME_STAMP\",\n         \
  \           \"Apr-8-2014-7:06:18-PM-PDT\").append(\"CATEGORY\", \"Notice\")\n  \
  \                  .append(\"TYPE\", \"WebLogicServer\")\n                    .append(\"\
  SERVERNAME\", \"AdminServer\")\n                    .append(\"CODE\", \"BEA-000360\"\
  ).append(\"MSG\", \"Server started in RUNNING mode\");\n            coll.insert(row3);\n\
  \n            DBObject catalog = coll.findOne();\n            System.out.println(row1);\n\
  \n        } catch (UnknownHostException e) {\n            e.printStackTrace();\n\
  \        }\n    }\n}\n```\n\n### 运行应用程序\n\n要将 BSON 文档对象添加到 MongoDB，请运行 Java 应用程序。右键单击`CreateMongoDBDocument.java`源文件，然后选择\
  \ **运行方式** ![image](img/image00406.jpeg) **Java 应用程序**，如图 11-11 所示。\n\n![9781484215999_Fig11-11.jpg](img/image00701.jpeg)\n\
  \n**图 11-11**. 运行 Java 应用程序 `CreateMongoDBDocument.java`\n\n这样就创建了一个 MongoDB 文档存储。\n\
  \n添加到文档存储的其中一个文档对象会在 Eclipse IDE 控制台中输出，如图 11-12 所示。\n\n![9781484215999_Fig11-12.jpg](img/image00702.jpeg)\n\
  \n**图 11-12**. 添加的 MongoDB 对象\n\n每个 BSON 文档对象会自动添加一个`_id`键。\n\n```json\n{\n  \"\
  _id\" : { \"$oid\" : \"53a6cf25e4b09cac451ef1d6\" },\n  \"TIME_STAMP\" : \"Apr-8-2014-7:06:16-PM-PDT\"\
  ,\n  \"CATEGORY\" : \"Notice\",\n  \"TYPE\" : \"WebLogicServer\",\n  \"SERVERNAME\"\
  \ : \"AdminServer\",\n  \"CODE\" : \"BEA-000365\",\n  \"MSG\" : \"Server state changed\
  \ to STANDBY\"\n}\n```\n\n### 在 Hive 中创建外部表\n\n创建了 MongoDB 数据存储后，我们将使用 Hive MongoDB\
  \ Storage Handler 在该数据存储上创建一个 Hive 外部表。MongoDB 存储处理器的`TBLPROPERTIES`需要`mongo.user`和`mongo.password`属性，因此我们需要先创建一个用户。我们将首先创建一个\
  \ MongoDB 用户，然后继续创建外部表。\n\n1.  使用以下命令启动 MongoDB 服务器 shell。\n    ```shell\n    >mongod\n\
  \    ```\n\n2.  创建另一个用户的用户必须具有`createUser`操作权限。首先，创建一个具有`createUser`操作权限的管理员用户。`use\
  \ admin`命令将数据库设置为`admin`。使用`db.addUser()`或`db.createUser()`方法添加一个名为`hive`的用户。使用`db.auth()`方法对管理员用户进行身份验证。\n\
  \    ```shell\n    >use admin\n    >db.addUser('hive', 'hive');\n    >db.auth('hive','hive');\n\
  \    ```\n    Mongo shell 命令的输出如图 11-13 所示。\n    ![9781484215999_Fig11-13.jpg](img/image00703.jpeg)\n\
  \    **图 11-13**. 运行 Mongo Shell 命令\n\n3.  关闭服务器。\n    ```shell\n    >db.shutdownServer()\n\
  \    ```\n\n4.  启动 MongoDB 服务器，并以管理员用户`hive`登录到 shell，使用以下命令。\n    ```shell\n  \
  \  mongo --port 27017 -u hive -p hive --authenticationDatabase admin\n    ```\n\n\
  5.  MongoDB shell 连接到`test`数据库。使用以下命令创建一个名为`hive`的用户。\n    ```javascript\n    db.createUser(\
  \ { \"user\" : \"hive\",\n                     \"pwd\": \"hive\",\n            \
  \         \"roles\" : [ { role: \"clusterAdmin\", db: \"admin\" },\n           \
  \                      { role: \"readAnyDatabase\", db: \"admin\" },\n         \
  \                        \"readWrite\"\n                               ]\n     \
  \              },\n                   { w: \"majority\" , wtimeout: 5000 } )\n \
  \   ```\n    一个名为`hive`的新用户被添加，如图 11-14 所示。\n    ![9781484215999_Fig11-14.jpg](img/image00704.jpeg)\n\
  \    **图 11-14**. 添加新用户\n\n6.  由于我们将使用远程元存储，我们需要使用以下命令启动 Hive 服务器。\n    ```shell\n\
  \    hive –service hiveserver\n    ```\n    Hive Thrift Server 启动，如图 11-15 所示。\n\
  \    ![9781484215999_Fig11-15.jpg](img/image00705.jpeg)\n    **图 11-15**. 启动 Hive\
  \ Thrift Server\n\n7.  使用以下命令启动 Hive shell。\n    ```shell\n    hive\n    ```\n\n\
  8.  在 Hive shell 中，使用`ADD JAR`命令将 MongoDB 存储处理器添加到 Hive 类路径。\n    ```hive\n    hive>\
  \ ADD JAR hive-mongo-0.0.3-jar-with-dependencies.jar;\n    ```\n\n\n\n"
- "# 运行 `CREATE EXTERNAL TABLE` 命令\n\n运行 `CREATE EXTERNAL TABLE` 命令以创建 Hive 表 `wlslog`，包含以下内容：\n\
  *   将列设置为 `TIME_STAMP`、`CATEGORY`、`TYPE`、`SERVERNAME`、`CODE` 和 `MSG`。\n*   将 `STORED\
  \ BY` 子句设置为 `'org.yong3.hive.mongo.MongoStorageHandler'`。\n*   在 `WITH SERDEPROPERTIES`\
  \ 子句中，将 `mongo.column.mapping` 属性设置为 MongoDB 文档集合中的列名。\n*   在 `TBLPROPERTIES` 子句中，设置表\
  \ 11-2 中所示的属性。\n\n表 11-2. Hive 表的 `TBLPROPERTIES` 属性\n\n| 属性 | 值 |\n| --- | ---\
  \ |\n| `mongo.host` | `10.0.2.15` |\n| `mongo.port` | `27017` |\n| `mongo.db` |\
  \ `test` |\n| `mongo.user` | `hive` |\n| `mongo.passwd` | `hive` |\n| `mongo.collection`\
  \ | `wlslog` |\n\n在 Hive shell 中用于创建 Hive 外部表的命令是 `wlslog`。\n\n```sql\nhive>CREATE\
  \ EXTERNAL TABLE wlslog (TIME_STAMP string, CATEGORY string, TYPE string, SERVERNAME\
  \ string, CODE string, MSG string)\n      STORED BY 'org.yong3.hive.mongo.MongoStorageHandler'\n\
  \      WITH SERDEPROPERTIES (\"mongo.column.mapping\"=\"TIME_STAMP,CATEGORY,TYPE,SERVERNAME,CODE,MSG\"\
  )\n      TBLPROPERTIES ( \"mongo.host\" = \"10.0.2.15\", \"mongo.port\" = \"27017\"\
  ,\n      \"mongo.db\" = \"test\", \"mongo.user\" = \"hive\", \"mongo.passwd\" =\
  \ \"hive\", \"mongo.collection\" = \"wlslog\" );\n```\n\n该命令的输出表明已创建一个 Hive 外部表。\n\
  \n"
