  \ 3-21 所示。\n\n![9781484215999_Fig03-21.jpg](img/image00498.jpeg)\n图 3-21. 更新文档\n\
  \n在 Mongo shell 中运行以下 JavaScript 方法：\n\n```javascript\n>use local\n>db.catalog.find()\n\
  ```\n\n更新/插入的文档将被列出，如图 3-22 所示。\n\n![9781484215999_Fig03-22.jpg](img/image00499.jpeg)\n\
  图 3-22. 列出更新的文档\n\n### 更新多个文档\n\n在上一节中，我们提到了`update()`方法中的`multiple`选项，用于更新多个文档。在本节中，我们将使用`multiple`选项。\n\
  \n1.  在`C:\\php`目录中创建一个 PHP 脚本`updateMultiDocuments.php`。在`try`-`catch`语句中像之前一样创建一个`MongoCollection`实例。\n\
  \n    ```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n2.  使用`insert()`方法添加两个文档。在添加的文档中不要包含`journal`字段，因为我们将使用`update()`方法添加该字段。\n\
  \n    ```php\n    $collection->insert(array(\"catalogId\" => 'catalog1', \"publisher\"\
  \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" => 'Engineering\
  \ as a Service',\"author\" => 'David A. Kelly'));\n    $collection->insert(array(\"\
  catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
  \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"author\"\
  \ => 'Tom Haunert'));\n    ```\n\n3.  我们将使用更新操作符`$set`在`update()`方法中将`journal`字段添加到这些文档中，同时将`multiple`选项设置为`true`。\n\
  \n    ```php\n    $newdata = array('$set' => array(\"journal\" => \"Oracle Magazine\"\
  ));\n    ```\n\n4.  调用`update()`方法，使用`$criteria`作为`edition`字段为`November December\
  \ 2013`的文档，`$newdata`作为要更新的字段，以及`multiple`设置为`true`的选项数组。\n\n    ```php\n    $status=$collection->update(array(\"\
  edition\" => \"November December 2013\"), $newdata,array(\"multiple\" => true));\n\
  \    ```\n\n    `updateMultiDocuments.php`脚本如下：\n\n    ```php\n    <?php\n    try\n\
  \    {\n        $connection = new MongoClient();\n        $collection=$connection->local->catalog;\n\
  \        $collection->insert(array(\"catalogId\" => 'catalog1', \"publisher\" =>\
  \ 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" => 'Engineering\
  \ as a Service',\"author\" => 'David A. Kelly'));\n        $collection->insert(array(\"\
  catalogId\" => 'catalog2', \"publisher\" => 'Oracle Publishing', \"edition\" =>\
  \ 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"author\"\
  \ => 'Tom Haunert'));\n        $newdata = array('$set' => array(\"journal\" => \"\
  Oracle Magazine\"));\n        $status=$collection->update(array(\"edition\" => \"\
  November December 2013\"), $newdata,array(\"multiple\" => true));\n        var_dump($status);\n\
  \    }\n    catch (MongoConnectionException $e)\n    {\n        echo '<p>Couldn\\\
  't connect to mongodb</p>';\n        exit();\n    }\n    catch(MongoCursorException\
  \ $e) {\n        echo $e;\n        exit();\n    }\n    ?>\n    ```\n\n5.  在浏览器中运行`updateMultiDocuments.php`脚本，URL\
  \ 为`http://localhost:8000/updateMultiDocuments.php`。在输出中，`updatedExisting`键值为`true`，`nModified`键值为\
  \ 2，这表明两个现有文档被更新，如图 3-23 所示。\n\n    ![9781484215999_Fig03-23.jpg](img/image00500.jpeg)\n\
  \    图 3-23. 更新多个文档\n\n6.  在 Mongo shell 中运行`db.catalog.find()`方法以列出更新的文档。如输出所示，文档包含了`journal`字段，如图\
  \ 3-24 所示。\n\n    ![9781484215999_Fig03-24.jpg](img/image00501.jpeg)\n    图 3-24.\
  \ 列出更新的文档\n\n## 保存文档\n\n默认情况下，`insert()`方法不会添加已存在于数据库中的文档。\n\n## 保存文档\n\n`MongoCollection`\
  \ 类提供了另一种插入已修改文档的方法。`MongoCollection::save()` 方法将文档保存到集合中。**保存（Save）** 与 **插入（insert）**\
  \ 的区别在于，要保存的文档可能已存在于数据库中。在本节中，我们将使用 `insert()` 方法添加两个文档，然后调用 `save()` 方法来保存这些文档，并修改其中某些字段的值。save\
  \ 方法的语法如下：\n\n```text\nMongoCollection::save ( array|object $document [, array $options\
  \ = array() ] )\n```\n\n1.  在 `C:\\php` 目录下创建一个 PHP 脚本 `saveDocument.php`。在 `try`-`catch`\
  \ 语句中创建一个 `MongoCollection` 实例。\n    ```php\n    $connection = new MongoClient();\n\
  \    $collection=$connection->local->catalog;\n    ```\n\n2.  使用 `insert()` 方法添加两个文档。\n\
  \    ```php\n    $doc1 = array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle\
  \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December\
  \ 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David A. Kelly');\n\
  \    $status=$collection->insert($doc1);\n    $doc2 =array(\"catalogId\" => 'catalog2',\
  \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
  \ => 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
  author\" => 'Tom Haunert');\n    $status=$collection->insert($doc2);\n    ```\n\n\
  3.  随后修改这两个文档中的部分字段值，并在修改后的文档上调用 `save()` 方法。\n    ```php\n    $doc1['edition']=\
  \ '11-12-2013';\n    $doc1['author'] = 'Kelly, David A.';\n    $doc1['updated']=true;\n\
  \    $status=$collection->save($doc1);\n    $doc2['edition']='11-12-2013';\n   \
  \ $doc2['author'] = 'Haunert, Tom';\n    $doc2['updated']=true;\n    $status=$collection->save($doc2);\n\
  \    ```\n    `save()` 方法保存了带有修改后字段值的文档。如果我们使用 `insert` 方法来保存修改后的文档，将会收到错误。`saveDocument.php`\
  \ 脚本如下：\n    ```php\n    <?php\n    try\n    {\n    $connection = new MongoClient();\n\
  \    $collection=$connection->local->catalog;\n    $doc1 = array(\"catalogId\" =>\
  \ 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
  \ \"edition\" => 'November December 2013',\"title\" => 'Engineering as a Service',\"\
  author\" => 'David A. Kelly');\n    $status=$collection->insert($doc1);\n    var_dump($status);\n\
  \    print '<br/>';\n    $doc2 =array(\"catalogId\" => 'catalog2', \"journal\" =>\
  \ 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November\
  \ December 2013',\"title\" => 'Quintessential and Collaborative',\"author\" => 'Tom\
  \ Haunert');\n    $status=$collection->insert($doc2);\n    var_dump($status);\n\
  \    print '<br/>';\n    $doc1['edition']= '11-12-2013';\n    $doc1['author'] =\
  \ 'Kelly, David A.';\n    $doc1['updated']=true;\n    $status=$collection->save($doc1);\n\
  \    var_dump($status);\n    print '<br/>';\n    $doc2['edition']='11-12-2013';\n\
  \    $doc2['author'] = 'Haunert, Tom';\n    $doc2['updated']=true;\n    $status=$collection->save($doc2);\n\
  \    var_dump($status);\n    print '<br/>';\n    }catch ( MongoConnectionException\
  \ $e )\n    {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n\
  \    }catch(MongoCursorException $e) {\n     echo '<p>w option is set and the write\
  \ has failed</p>';\n        exit();\n    }\n    ?>\n    ```\n\n4.  在浏览器中运行 PHP 脚本，URL\
  \ 为 `http://localhost:8000/saveDocument.php`。两个文档被添加，随后这两个文档被更新，如 图 3-25 中 `updatedExisting`\
  \ 键值为 true 所示。\n    ![9781484215999_Fig03-25.jpg](img/image00502.jpeg)\n    图 3-25.\
  \ 保存文档\n\n5.  在 Mongo shell 中运行 JavaScript 方法 `db.catalog.find()` 以列出更新后的文档，如 图\
  \ 3-26 所示。\n    ![9781484215999_Fig03-26.jpg](img/image00503.jpeg)\n    图 3-26.\
  \ 列出已保存的文档\n\n### 删除文档\n\n`MongoCollection::remove()` 方法用于删除文档，其语法如下：\n\n```text\n\
  MongoCollection::remove ([ array $criteria = array() [, array $options = array()\
  \ ]] )\n```\n\n方法参数 `$criteria` 是要删除的文档的查询条件。大多数选项，如 `w`、`j`、`fsync`，与其他方法相同。`remove()`\
  \ 方法提供了 `justOne` 选项来仅删除一个文档。在本节中，我们将从集合中删除一个文档。\n\n1.  首先，使用 `addDocumentBatch.php`\
  \ 脚本添加一些文档，如 图 3-27 所示。\n    ![9781484215999_Fig03-27.jpg](img/image00504.jpeg)\n\
  \    图 3-27. 使用 addDocumentBatch.php 添加文档\n    mongo shell 中的 `db.catalog.find()`\
  \ 方法应列出添加的两个文档，如 图 3-28 所示。\n    ![9781484215999_Fig03-28.jpg](img/image00505.jpeg)\n\
  \    图 3-28. 列出使用 addDocumentBatch.php 添加的文档\n\n2.  在 `C:\\php` 目录下创建一个 PHP 脚本 `removeDocument.php`。像之前一样创建一个\
  \ `MongoCollection` 实例。\n    ```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n3.  使用要删除的文档的 `_id` 作为方法参数调用 `remove` 方法。`_id` 字段必须以 `MongoId` 实例的形式提供，对于不同用户会有所不同。\n\
  \    ```php\n    $id = '55bba8d9098c6e1c19000049';\n    $status=$collection->remove(array('_id'\
  \ => new MongoId($id)));\n    ```\n    `removeDocument.php` 脚本如下：\n    ```php\n\
  \    <?php\n    try\n    {\n    $id = '55bba8d9098c6e1c19000049';\n    $connection\
  \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    $status=$collection->remove(array('_id'\
  \ => new MongoId($id)));\n    var_dump($status);\n    }catch (MongoConnectionException\
  \ $e)\n    {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n\
  \    }\n    ?>\n    ```\n\n4.  在浏览器中运行 `removeDocument.php` 脚本，URL 为 `http://localhost:8000/removeDocument.php`\
  \ 以删除文档，如 图 3-29 所示。\n    ![9781484215999_Fig03-29.jpg](img/image00506.jpeg)\n \
  \   图 3-29. 删除文档\n\n如果再次运行 `db.catalog.find()` 方法，则只列出一个文档，如 图 3-30 中 `db.catalog.find()`\
  \ 的第二次运行结果所示。\n![9781484215999_Fig03-30.jpg](img/image00507.jpeg)\n图 3-30. 删除两个文档中的一个后列出文档\n\
  \n`remove()` 方法可用于删除所有文档。由于我们通过运行 `addDocumentBatch.php` 脚本添加的两个文档中只删除了一个，我们需要向\
  \ `catalog` 集合中添加更多文档来演示删除所有文档，因为仅删除一个文档无法证明所有或多个文档已被删除。\n\n1.  再次运行 `addDocumentBatch.php`\
  \ 脚本以再添加两个文档，使文档总数达到三个。\n2.  接下来，在 `C:\\php` 目录下创建一个 PHP 脚本 `removeAllDocuments.php`。像删除单个文档一样调用\
  \ `remove()` 方法，但提供一个空数组。\n    ```php\n    $status=$collection->remove(array());\n\
  \    ```\n    `removeAllDocuments.php` 脚本如下：\n    ```php\n    <?php\n    try\n \
  \   {\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    $status=$collection->remove(array());\n    var_dump($status);\n    }catch (MongoConnectionException\
  \ $e)\n    {\n        echo '<p>Couldn\\'t connect to mongodb</p>';\n        exit();\n\
  \    }\n    ?>\n    ```\n\n\n"
