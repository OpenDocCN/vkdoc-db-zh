  Server = require('mongodb').Server;\nDb = require('mongodb').Db;\nCollection = require('mongodb').Collection;\n\
  var db = new Db('local', new Server('localhost', 27017));\ndb.open(function(error,\
  \ db) {\nif (error)\nconsole.log(error);\nelse{\ndb.createCollection('catalog',\
  \ function(error, collection){\nif (error)\nconsole.log(error);\nelse{\ndoc1 = {\"\
  catalogId\" : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
  \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering as\
  \ a Service',\"author\" : 'David A. Kelly'};\ndoc2 = {\"catalogId\" : 'catalog2',\
