  \         console.log('Connected with MongoDB');\n    });\n    ```\n\n    静态方法 `MongoClient.connect()`\
  \ 也可用于连接到 MongoDB 服务器，并支持与实例方法 `connect()` 相同的参数。\n\n    `connection.js` 脚本如下：\n\
  \n    ```\n    MongoClient = require('mongodb').MongoClient;\n    var mongoclient\
