  var_dump($connection->getWriteConcern());\nprint '<br/>';\n$connection = new MongoClient(\
  \ \"mongodb://localhost:27017\" );\nprint '读取偏好: <br/>';\nvar_dump($connection->getReadPreference());\n\
  print '<br/>';\nprint '列出数据库: <br/>';\nvar_dump($connection->listDBs());\nprint\
  \ '<br/>';\n$connection = new MongoClient(\"mongodb://192.168.1.72:27017\");\nprint\
  \ '列出开放的连接: <br/>';\nvar_dump($connection->getConnections());\nprint '<br/>';\n\
  $connection->close(true);\nprint '列出开放的连接: <br/>';\nvar_dump($connection->getConnections());\n\
  ?>\n```\n\n使用 URL `http://localhost:8000/mongoconnection.php` 在浏览器中运行该 PHP 脚本。`mongoconnection.php`\
  \ 脚本的输出如 图 3-6 所示。\n\n![9781484215999_Fig03-06.jpg](img/image00483.jpeg)\n\n图 3-6.\
  \ mongoconnection.php 脚本的输出\n\n## 获取数据库信息\n\n`MongoDB` 类代表一个数据库。可以通过 `MongoClient`\
  \ 中的 `selectDB()` 方法或直接通过数据库名称的间接引用来获取该类的实例。在 `C:\\php` 目录下创建一个 PHP 脚本 `db.php`。按如下方式获取\
  \ `test` 数据库的 `MongoDB` 实例。\n\n```\n$connection = new MongoClient();\n$db = $connection->test;\n\
  ```\n\n或者，也可以使用 `selectDB()` 方法。例如，以下 `MongoDB` 实例代表数据库 `local`。\n\n```\n$db=$connection->selectDB(\"\
  local\");\n```\n\n`selectDB()` 方法会抛出 `MongoConnectionException` 异常，必须在 `try`-`catch`\
  \ 语句中处理。`MongoDB` 中的 `getCollectionNames(boolean)` 方法获取数据库中的所有集合名称。要获取系统集合，也需要使用参数\
  \ `true` 调用该方法。\n\n```\n$collections=$db->getCollectionNames(true);\n```\n\n可以按如下方式输出集合名称。\n\
  \n```\nvar_dump($collections);\n```\n\n`db.php` 脚本如下所列。`MongoDB` 类并未在 `db.php` 脚本中显式出现，因为返回值被赋给了一个变量。\n\
  \n```\n<?php\ntry\n{\n$connection = new MongoClient();\n\n$db = $connection->test;\n\
  print '数据库: ';\nvar_dump($db);\nprint '<br/>';\n$db=$connection->selectDB(\"local\"\
  );\n$collections=$db->getCollectionNames(true);\nprint '集合: ';\nvar_dump($collections);\n\
  print '<br/>';\n}catch ( MongoConnectionException $e )\n{\n    echo '<p>无法连接到 mongodb，请问\
  \ \"mongo\" 进程正在运行吗？</p>';\n    exit();\n}\n?>\n```\n\n使用 URL `http://localhost:8000/db.php`\
  \ 在浏览器中运行该 PHP 脚本。为 local 数据库列出的集合名称包括 `system.indexes` 和 `catalog`，如 图 3-7 所示。不同用户列出的集合可能不同。\n\
  \n![9781484215999_Fig03-07.jpg](img/image00484.jpeg)\n\n图 3-7. db.php 脚本的输出\n\n\
  ## 使用集合\n\n在接下来的小节中，我们将讨论如何使用 PHP MongoDB 驱动程序获取集合和删除集合。\n\n## 获取集合\n\n在本节中，我们将在\
  \ MongoDB 数据库实例中创建一个集合。在 `C:\\php` 目录下创建一个 PHP 脚本 `collection.php`。`MongoCollection`\
  \ 类代表一个集合。从连接实例获取集合的语法与获取数据库的语法相同。例如，首先获取数据库实例 `local`，然后从该数据库实例获取集合 `catalog`，如下所示。\n\
  \n```\n$connection = new MongoClient();\n$db=$connection->local;\n$collection=$db->catalog;\n\
  ```\n\n可以按如下方式输出集合信息和集合名称。\n\n```\nvar_dump($collection);\nvar_dump($collection->getName());\n\
  ```\n\n也可以直接获取一个集合，如下所示。\n\n```\n$collection=$connection->local->mongo;\n```\n\n\
  也可以使用 `MongoDB::createCollection()` 来创建 `MongoCollection` 实例。`createCollection()`\
  \ 方法的语法如下。\n\n```\n$db->createCollection(\n    \"create\" => $name,\n    \"capped\"\
  \ => $options[\"capped\"],\n    \"size\" => $options[\"size\"],\n    \"max\" =>\
  \ $options[\"max\"],\n    \"autoIndexId\" => $options[\"autoIndexId\"],\n));\n```\n\
  \n`createCollection()` 方法中的参数和选项如 表 3-4 所示。\n\n表 3-4. createCollection 方法中的参数和选项\n\
  \n| 参数/选项 | 描述 |\n| --- | --- |\n| `create` | 集合的名称。 |\n| `capped` | 指示集合是否为固定集合（capped）或固定大小的选项。\
  \ |\n| `size` | 指示固定集合固定大小（以字节为单位）的选项。 |\n| `max` | 指示固定集合中最大文档数量的选项。 |\n| `autoIndexId`\
  \ | 对于 MongoDB 2.2 及更高版本，默认自动索引为 true。对于 2.2 之前的版本，默认自动索引为 false。对于固定集合，`autoIndexId`\
  \ 可设置为 false。 |\n\n例如，创建一个名为 `catalog` 的固定集合，固定大小为 1 MB，最大文档数为 10。\n\n```\n$coll\
  \ = $db->createCollection(\n    \"catalog\",\n    array(\n        'capped' => true,\n\
  \        'size' => 1*1024,\n        'max' => 10\n    )\n);\n```\n\n`collection.php`\
  \ 脚本如下所列。\n\n```\n<?php\ntry\n{\n$connection = new MongoClient();\n$db=$connection->local;\n\
  $collection=$db->catalog;\nvar_dump($collection);\nprint '<br/>';\nprint '集合名称:\
  \ ';\nvar_dump($collection->getName());\nprint '<br/>';\n$collection=$connection->local->mongo;\n\
  print '集合名称: ';\nvar_dump($collection->getName());\n\n}catch ( MongoConnectionException\
  \ $e ) \n{\n    echo '<p>无法连接到 mongodb，请问 \"mongo\" 进程正在运行吗？</p>';\n    exit();\n\
  }\n$collection->drop();\n\n$coll = $db->createCollection(\n    \"catalog\",\n  \
  \  array(\n        'capped' => true,\n        'size' => 1*1024,\n        'max' =>\
  \ 10\n    )\n);\nprint '<br/>';\nvar_dump($coll);\nprint '<br/>';\nprint '集合名称:\
  \ ';\nvar_dump($coll->getName());\n\n?>\n```\n\n\n\n在浏览器中运行脚本 `collection.php`，URL\
  \ 为 `http://localhost:8000/collection.php`。输出结果如图 3-8 所示。\n\n![9781484215999_Fig03-08.jpg](img/image00485.jpeg)\n\
  \n图 3-8. collection.php 脚本的输出\n\n## 删除集合\n\n`MongoCollection::drop()` 方法用于删除一个集合，没有任何参数。\n\
  \n在 `C:\\php` 目录下创建一个 PHP 脚本 `dropCollection.php`。在 `try`-`catch` 语句中创建一个 `MongoCollection`\
  \ 实例。调用 `drop()` 方法来删除集合。\n\n```\n$collection->drop();\n```\n\n`dropCollection.php`\
  \ 脚本如下：\n\n```php\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
  $collection->drop();\necho '<p>集合已删除</p>';\n}catch (MongoConnectionException $e)\n\
  {\n    echo '<p>无法连接到 mongodb</p>';\n    exit(); \n} \n?>\n```\n\n在浏览器中运行此 PHP 脚本，URL\
  \ 为 `http://localhost:8000/dropCollection.php`，如图 3-9 所示。\n\n![9781484215999_Fig03-09.jpg](img/image00486.jpeg)\n\
  \n图 3-9. 删除一个集合\n\n`catalog` 集合已被删除，如图 3-10 所示，在运行 `dropCollection.php` 脚本前后执行 `show\
  \ collections` 方法的结果所示。\n\n![9781484215999_Fig03-10.jpg](img/image00487.jpeg)\n\n\
  图 3-10. 删除集合前后的集合列表\n\n## 使用文档\n\n在接下来的小节中，我们将讨论使用 PHP MongoDB 驱动在 MongoDB 服务器中添加、查询、更新和删除文档。\n\
  \n### 添加文档\n\n`MongoCollection::insert` 方法用于向 MongoDB 添加单个文档。`insert()` 方法接受参数。\n\
  \n```\nMongoCollection::insert ( array|object $document [, array $options = array()\
  \ ] )\n```\n\n第一个参数是一个数组或对象，如果该参数未提供 `_id` 键，则会创建一个新的 `MongoId` 实例并分配给它。`insert`\
  \ 方法支持以下选项，列于表 3-5 中。\n\n表 3-5. 插入方法中的选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `j` |\
  \ 在启用日志记录时使用。日志记录是将写入操作先应用到内存和磁盘上的日志中，然后再应用到磁盘数据文件的过程。如果设置为 true，则必须收到确认写入。写入操作将被阻塞，直到它同步到磁盘上的日志。默认值为\
  \ false。会覆盖 `w` 设置为 '0' 的情况。 |\n| `fsync` | 如果启用日志记录，`fsync` 与 `j` 类似。如果未启用日志记录，写入操作将被阻塞，直到它与磁盘上的数据文件同步，并且必须收到确认插入，覆盖\
  \ `w` 设置为 '0' 的情况。 |\n| `socketTimeoutMS` | 指定套接字通信的时间限制，如果服务器在此时间段内未响应，则抛出 `MongoCursorTimeoutException`\
  \ 异常。MongoClient 的默认值为 30,000 毫秒。 |\n| `w` | 写入关注，默认值为 1。 |\n| `wTimeoutMS` | 当\
  \ w >1 时，指定确认的时间限制（以毫秒为单位）。如果在时限内未满足写入关注，则抛出 MongoCursorException 异常。`MongoClient`\
  \ 的默认值为 10,000。 |\n\n1.  在 `C:\\php` 目录下创建一个 PHP 脚本 `addDocument.php`。在 `try`-`catch`\
  \ 语句中创建一个 `MongoClient` 实例（表示一个连接），并在 `local` 数据库中为 `catalog` 集合创建一个 `MongoCollection`\
  \ 实例。\n\n    ```php\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n2.  创建一个要添加文档的数组。\n\n    ```php\n    $doc = array(\n        \"name\"\
  \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
  \        \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle\
  \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December\
  \ 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David A. Kelly')\n\
  \    );\n    ```\n\n3.  使用 `insert()` 方法将文档添加到 `MongoDB` 集合。\n\n    ```php\n   \
  \ $status=$collection->insert($doc);\n    var_dump($status);\n    ```\n\n4.  为 `MongoConnectionException`\
  \ 和 `MongoCursorException` 添加 catch 块。\n5.  类似地向集合添加另一个文档。`addDocument.php` 脚本如下所示。\n\
  \n    ```php\n    <?php\n    try\n    {\n    $connection = new MongoClient();\n\
  \    $collection=$connection->local->catalog;\n    $doc = array(\n        \"name\"\
  \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
  \        \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle\
  \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December\
  \ 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David A. Kelly')\n\
  \    );\n    $status=$collection->insert($doc);\n    var_dump($status);\n    print\
  \ '<br/>';\n    $doc = array(\n        \"name\" => \"MongoDB\",\n        \"type\"\
  \ => \"database\",\n        \"count\" => 1,\n        \"info\" => (object)array(\"\
  catalogId\" => 'catalog2', \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle\
  \ Publishing', \"edition\" => 'November December 2013',\"title\" => 'Quintessential\
  \ and Collaborative',\"author\" => 'Tom Haunert')\n    );\n    $status=$collection->insert($doc);\n\
  \    var_dump($status);\n    }catch ( MongoConnectionException $e )\n    {\n   \
  \     echo '<p>无法连接到 mongodb</p>';\n        exit();\n    }catch(MongoCursorException\
  \ $e) {\n     echo '<p>w 选项已设置，写入失败</p>';\n        exit();\n    }\n    ?>\n    ```\n\
  \n6.  在浏览器中运行此 PHP 脚本，URL 为 `http://localhost:8000/addDocument.php`。输出结果如图 3-11\
  \ 所示。如 `insert()` 方法返回的状态消息数组所示，`err` 键为 `NULL`，表示没有错误，`errmsg` 也为 NULL。而 `ok` 键为\
  \ 1，表示所有数据库操作已成功完成。`n` 键表示受影响的文档数，对于插入操作为 0。对于更新、upsert 或删除操作，如果文档已被更新、upsert 或删除，则\
  \ `n` 将为正数。\n\n![9781484215999_Fig03-11.jpg](img/image00488.jpeg)\n\n图 3-11. addDocument.php\
  \ 脚本的输出\n\n由于我们没有为添加的文档提供 `_id` 键，系统会自动为添加的文档创建一个唯一的 `MongoId`。`_id` 键或 `MongoId`\
  \ 必须是唯一的。接下来，我们将演示 `_id` 或 `MongoId` 必须是唯一的。\n\n使用 `try`-`catch` 语句创建并使用 `insert()`\
  \ 方法添加文档。对同一文档调用两次 `insert` 方法。\n\n```php\n$status=$collection->insert($doc);\n\
  $status=$collection->insert($doc);\n```\n\n`addDocumentException.php` 脚本如下：\n\n\
  ```php\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
  $doc = array(\n    \"name\" => \"MongoDB\",\n    \"type\" => \"database\",\n   \
  \ \"count\" => 1,\n    \"info\" => (object)array(\"catalogId\" => 'catalog1', \"\
  journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
  \ => 'November December 2013',\"title\" => 'Engineering as a Service',\"author\"\
  \ => 'David A. Kelly')\n);\n$status=$collection->insert($doc);\nvar_dump($status);\n\
  print '<br/>';\n$status=$collection->insert($doc);\n}catch ( MongoConnectionException\
  \ $e )\n{\n    echo '<p>无法连接到 mongodb</p>';\n    exit();\n}catch(MongoCursorException\
  \ $e) {\n echo '<p>w 选项已设置，写入失败</p>';\n    exit();\n}\n?>\n```\n\n\n"
- "# 使用 MongoDB PHP 库操作文档\n\n## 捕获重复插入异常\n\n当在浏览器中运行`addDocumentException.php`脚本时（URL\
  \ 为`http://localhost:8000/addDocumentException.php`），由于尝试添加重复的文档，会抛出`MongoCursorException`异常。该异常被捕获并输出错误信息，如图\
  \ 3-12 所示。\n\n![9781484215999_Fig03-12.jpg](img/image00489.jpeg)\n\n**图 3-12. `addDocumentException.php`脚本的输出**\n\
  \n### 添加多个文档\n\n在上一节中，我们使用两次单独的`insert()`方法调用添加了两个文档。`insert()`方法调用也可以使用`while`、`do`-`while`或`for`循环来完成。\n\
  \n1.  在文档根目录`C:\\php`中创建一个 PHP 脚本`addMultipleDocuments.php`。在`try`-`catch`语句中，像之前一样为集合创建一个`MongoCollection`实例。\n\
  \n    ```\n    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n2.  在一个`for`循环中，使用循环初始化器中的变量`$i`作为文档的`catalogId`字段值，向集合添加文档。\n\n   \
  \ ```\n    for ($i = 1; $i <= 5; $i++)\n    {\n        $status=$collection->insert(array(\"\
  catalogId\" =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle\
  \ Publishing', \"edition\" => 'November December 2013'));\n    var_dump($status);\n\
  \    print '<br/>';\n    }\n    ```\n\n完整的`addMultipleDocuments.php`脚本如下：\n\n```\n\
  <?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
  for ($i = 1; $i <= 5; $i++)\n{\n    $status=$collection->insert(array(\"catalogId\"\
  \ =>'catalog'.$i, \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing',\
  \ \"edition\" => 'November December 2013'));\nvar_dump($status);\nprint '<br/>';\n\
  }\n}catch (MongoConnectionException $e)\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n\
  \    exit();\n}catch(MongoCursorException $e) {\n echo '<p>w option is set and the\
  \ write has failed</p>';\n    exit();\n}\n?>\n```\n\n3.  在浏览器中运行`addMultipleDocuments.php`脚本，URL\
  \ 为`http://localhost:8000/addMultipleDocuments.php`，以向 MongoDB 集合添加多个文档。每添加一个文档，都会输出一条状态信息，如图\
  \ 3-13 所示。\n\n![9781484215999_Fig03-13.jpg](img/image00490.jpeg)\n\n**图 3-13. `addMultipleDocuments.php`脚本的输出**\n\
  \n### 批量添加文档\n\n`MongoCollection::batchInsert()`方法可用于向集合批量添加文档。该方法的语法与`insert`方法相同。\n\
  \n```\nMongoCollection::batchInsert ( array $document [, array $options = array()\
  \ ] )\n```\n\n与`insert()`方法的区别在于，其第一个参数是数组的数组或对象，而`insert`方法中是数组或对象。`batchInsert()`方法返回一个关联数组，而`insert`方法返回数组或`boolean`值。该方法支持一个额外的选项`continueOnError`，默认值为\
  \ false。如果设置为 true，当其中一个文档插入失败时，批量插入会失败。要批量添加的文档数组中的每个文档都必须有一个唯一的`_id`。\n\n1.  在`C:\\\
  php`目录中创建一个 PHP 脚本`addDocumentBatch.php`。像之前一样创建一个`MongoCollection`实例。\n\n    ```\n\
  \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n2.  创建一个用于存放文档数组的数组。\n\n    ```\n    $batch=array();\n    ```\n\n3.\
  \  创建一个文档数组，并将其添加到`$batch`数组中。\n\n    ```\n    $doc1 = array(\n        \"name\"\
  \ => \"MongoDB\",\n        \"type\" => \"database\",\n        \"count\" => 1,\n\
  \        \"info\" => (object)array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle\
  \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => 'November December\
  \ 2013',\"title\" => 'Engineering as a Service',\"author\" => 'David A. Kelly')\n\
  \    );\n\n    $batch[]=$doc1;\n    ```\n\n4.  同样地，将另一个文档添加到批量数组中。`$doc2`在`addDocumentBatch.php`脚本列表中声明。\n\
  \n    ```\n    $batch[]=$doc2;\n    ```\n\n5.  使用`$batch`数组作为参数调用`batchInsert`方法。\n\
  \n    ```\n    $status=$collection->batchInsert($batch);\n    var_dump($status);\n\
  \    ```\n\n6.  由于没有为要添加的文档提供`_id`字段，`MongoId`实例会被自动添加。随后，可以使用`foreach`循环输出添加的`_id`字段值。\n\
  \n    ```\n    foreach ($batch as $doc) {\n    print 'Document _id: ';\n      echo\
