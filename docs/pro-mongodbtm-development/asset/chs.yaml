- "# 第 2 章\n\n## 使用 Mongo Shell\n\n7.  作为使用 `findOneAndDelete(Bson filter)` 方法的示例，删除\
  \ `catalogId` 为 `catalog2` 的文档。`findOneAndDelete()` 方法返回被删除的文档。输出被删除的文档。\n\n```\n\
