  \n`Collection` 类中的 `findAndRemove(query, sort, options, callback)` 方法用于查找并移除一个文档。本章我们讨论了已弃用的方法\
  \ `findAndRemove()` 及其替代方法 `findOneAndDelete()`。方法参数如 表 5-20 所示。\n\n表 5-20. `findAndRemove()`\
