  图 4-35：使用 `delete_many` 删除多个文档\n\n在 Mongo shell 中运行 `db.mongodb.find()` 命令时，不会列出任何文档，如\
  \ 图 4-36 所示。\n![9781484215999_Fig04-36.jpg](img/image00544.jpeg)\n图 4-36：列出空集合\n\
  \n### 执行批量操作\n\nMongoDB Ruby 驱动通过 `Mongo::Collection` 类中的 `bulk_write(operations,\
  \ options)` 方法支持批量操作。可以使用 `bulk_write()` 方法调用一系列操作。每个操作使用一个文档定义，其中一个键在 表 4-11 中讨论。\n\
  表 4-37：批量操作\n\n| 批量操作键          | 描述               |\n| ------------------- | ------------------\
  \ |\n| `insert_one`        | 插入一个文档       |\n| `delete_one`        | 删除一个文档    \
  \   |\n| `delete_many`       | 删除多个文档       |\n| `replace_one`       | 替换一个文档  \
  \     |\n| `update_one`        | 更新一个文档       |\n| `update_many`       | 更新多个文档\
  \       |\n\n1. 在 `C:\\Ruby21-x64\\mongodbscripts` 目录下创建一个 Ruby 脚本 `bulk.rb`。\n\
  2. 如果 `mongodb` 集合已存在，则使用 `db.mongodb.drop()` 将其删除，并在脚本中创建该集合。\n3. 使用 `insert_many()`\
  \ 方法插入多个文档。\n    ```\n    collection.insert_many([document1,document2,document3,document4])\n\
  \    ```\n4. 为 `mongodb` 集合创建一个集合对象。\n    ```\n    collection = client[:mongodb]\n\
  \    ```\n5. 使用 `insert_one`、`update_one` 和 `replace_one` 批量操作调用 `bulk_write()`\
  \ 方法。将第二个参数设置为 `:ordered => true` 以指示批量操作按指定顺序执行（这也是默认行为）。\n\n    `bulk.rb` 脚本如下所示。\n\
  \    ```\n    require 'mongo'\n    include Mongo\n\n    client =Mongo::Client.new([\
  \ '127.0.0.1:27017' ], :database => 'test')\n    client=client.use(:local)\n   \
  \ db=client.database\n    collection=db.collection(\"mongodb\")\n\n    collection.create\n\
  \n    document1={\n      \"catalogId\" => 1,\n      \"journal\" => \"Oracle Magazine\"\
  ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
  \ December 2013\",\n      \"title\" => \"Engineering as a Service\",\n      \"author\"\
  \ =>  \"David A. Kelly\"\n    }\n\n    document2={\n      \"catalogId\" => 2,\n\
  \      \"journal\" => \"Oracle Magazine\",\n      \"publisher\" => \"Oracle Publishing\"\
  ,\n      \"edition\" =>  \"November December 2013\",\n      \"title\" => \"Quintessential\
  \ and Collaborative\",\n      \"author\" =>  \"Tom Haunert\"\n    }\n\n    document3={\n\
  \      \"catalogId\" => 3,\n      \"journal\" => \"Oracle Magazine\",\n      \"\
  publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November December\
  \ 2013\",\n      \"title\" => \"\",\n      \"author\" => \"\"\n    }\n\n    document4={\n\
  \      \"catalogId\" => 4,\n      \"journal\" => \"Oracle Magazine\",\n      \"\
  publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November December\
  \ 2013\",\n      \"title\" => \"\",\n      \"author\" => \"\"\n    }\n\n    collection.insert_many([document1,document2,document3,document4])\n\
  \n    print \"\\n\"\n\n    collection = client[:mongodb]\n\n    collection.bulk_write([\
  \ { :insert_one => { :catalogId => 5 }\n                    },\n               \
  \     { :update_one => { :find => { :catalogId => 1 },\n                       \
  \                :update => {'$set' => { :catalogId => 6 } }\n                 \
  \                    }\n                    },\n                    { :replace_one\
  \ => { :find => { :catalogId => 2 },\n                                        :replacement\
  \ => { :catalogId => 7 }\n                                      }\n            \
  \        }\n                  ],\n                  :ordered => true )\n    ```\n\
  6. 按如下方式运行 `bulk.rb` 脚本。\n    ```\n    >ruby bulk.rb\n    ```\n    `bulk.rb` 脚本的输出如\
  \ 图 4-37 所示。\n    ![9781484215999_Fig04-37.jpg](img/image00545.jpeg)\n    图 4-37：运行\
  \ bulk.rb 脚本\n7. 随后，使用 `db.mongodb.find()` 方法列出 `mongodb` 集合中的文档。如 图 4-38 所示，添加了一个\
  \ `catalogId` 为 5 的新文档。`catalogId` 1 已更新为 6，而 `catalogId` 为 2 的文档已被 `catalogId`\
  \ 为 7 的文档替换。\n    ![9781484215999_Fig04-38.jpg](img/image00546.jpeg)\n    图 4-38：批量操作后列出文档\n\
  \n## 总结\n\n在本章中，我们使用 Ruby 驱动连接到 MongoDB 服务器，并对数据库执行 CRUD（创建、读取、更新、删除）操作。我们演示了针对单个文档和多个文档的每种\
  \ CRUD 操作。在下一章中，我们将使用 Node.js 驱动连接到 MongoDB 并执行类似的 CRUD 操作。\n\n"
- '# 第五章 使用 Node.js 操作 MongoDB


  传统的基于脚本语言的 Web 应用程序构建在客户端/服务器模型上，需要客户端脚本语言（如 JavaScript）和服务器端脚本语言（如 PHP），并利用 Web
  服务器。Node.js 的不同之处在于，它是基于 V8 JavaScript 引擎构建的服务器端脚本。V8 是 Google 用于 Google Chrome
  的开源 JavaScript 引擎。Node.js 基于事件驱动模型，用于开发快速、可扩展、数据密集型、实时网络应用程序。在本章中，我们将讨论使用 Node.js（或简称
  Node）访问 MongoDB，以及使用 MongoDB 的 Node.js 驱动在数据库中进行数据修改。本章涵盖以下主题：


  *   入门

  *   使用连接

  *   使用文档


