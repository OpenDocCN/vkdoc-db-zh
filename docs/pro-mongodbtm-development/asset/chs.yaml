  \ 字段，因此在更新时会添加这些字段。在回调函数中输出方法结果。\n    ```javascript\n    collection.update({journal:\
  \ 'Oracle Magazine'}, {$set: {edition: '11-12-2013', title: 'Engineering as a Service',\
  \ author: 'David A. Kelly'}}, {upsert: true, w: 1}, function(err, result) {\n  \
  \    if (err)\n        console.log(err);\n      else\n        console.log(result);\n\
  \    });\n    ```\n完整的 `updateDocument.js` 脚本如下：\n```javascript\nServer = require('mongodb').Server;\n\
  Db = require('mongodb').Db;\nCollection = require('mongodb').Collection;\nvar db\
