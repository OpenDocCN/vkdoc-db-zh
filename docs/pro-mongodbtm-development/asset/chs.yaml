  \ 脚本的输出*\n2.  在 Mongo shell 中运行 `db.catalog.find()` 查询以列出文档，包括替换后的文档，如图 5-31 所示。\n\
  \    ![图 5-31](img/image00580.jpeg)\n    *图 5-31. 列出替换后的文档*\n\n## 使用 replaceOne\n\
  \n另一种可以用来替换文档的方法是 `replaceOne(filter, doc, options, callback)` 方法。它与 `findOneAndReplace(filter,\
  \ replacement, options, callback)` 方法类似，但 `replaceOne` 方法提供的选项更少（`w`、`wtimeout`、`j`、`upsert`\
  \ 和 `upsert`）。\n\n### 更新单个文档\n\n在本节中，我们将更新一个文档。`findOneAndUpdate(filter, update,\
  \ options, callback)` 方法用于基于选择器查询来更新一个或多个文档。\n\n### 参数说明\n\n`findOneAndUpdate()`\
  \ 方法的参数如下表所示。\n\n| 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `filter` | object | 指定文档选择过滤器以选择要更新的文档。\
  \ |\n| `update` | object | 要在文档上执行的更新操作。 |\n| `options` | object | 方法选项。 |\n| `callback`\
  \ | `resultCallback(error, result)` | 回调函数，第一个参数是 `MongoError` 对象，第二个参数是方法结果。如果使用写关注，则必须指定回调函数。\
  \ |\n\n该方法支持的选项与 `findOneAndReplace()` 方法相同，在上一节的表 5-21 中已有讨论。\n\n### 示例脚本\n\n1.\
  \  在 `local` 数据库中，使用 `db.catalog.drop()` 删除 `catalog` 集合。\n2.  在 `C:\\Program Files\\\
  nodejs\\scripts` 目录中创建一个 `updateDocument.js` 脚本。\n3.  如前所述，创建一个名为 `catalog` 的集合。\n\
  4.  添加两个只设置了部分字段的文档，因为后续我们将通过更新来添加其他字段。\n    ```javascript\n    doc1 = {\"catalogId\"\
  : 1, \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
  : 'November December 2013'};\n    doc2 = {\"catalogId\": 2, \"journal\": 'Oracle\
  \ Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November December\
  \ 2013'};\n    collection.insertMany([doc1, doc2], function(error, result) {\n \
  \     if (error)\n        console.log(error);\n      else {\n        console.log(\"\
  Documents added: \" + result);\n      }\n    });\n    ```\n5.  使用 `findOneAndUpdate(filter,\
  \ update, options, callback)` 方法，筛选 `journal` 字段为 `'Java Magazine'` 的所有文档，并使用 `$set`\
  \ 操作符更新其中一个文档为 `{journal:'Java Magazine'}`。将 `upsert` 选项设置为 `true`，这样如果找不到匹配的文档，就会插入一个新文档。\n\
  \    ```javascript\n    collection.findOneAndUpdate({journal: 'Java Magazine'},\
  \ {$set: {journal: 'Java Magazine'}}, {returnOriginal: false, upsert: true}, function(error,\
  \ result) {\n      if (error) console.log(error);\n      else\n        console.log(result);\n\
  \    });\n    ```\n    用于更新的字段和值的第二个参数可以使用任何更新操作符来指定。当使用更新操作符 `$set` 修改字段值时，不需要指定所有字段/值，只需指定要更新的字段。\n\
