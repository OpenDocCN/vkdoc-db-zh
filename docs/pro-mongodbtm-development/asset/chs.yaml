  \    图 8-5. 传输到 MongoDB 服务器的 7 个文档\n\n# 总结\n\n在本章中，我们将 Oracle 数据库表数据传输到了 MongoDB\
  \ 服务器。首先，我们创建了一个 Oracle 数据库表。由于没有直接的数据传输工具，我们首先将 Oracle 数据库表导出为 CSV 文件。随后，使用 MongoDB\
  \ 的 `mongoimport` 工具将 CSV 文件数据传输到 MongoDB 服务器。在下一章中，我们将使用 Kundera，一个符合 JPA 2.0 标准的对象-数据存储映射库，用于\
  \ NoSQL 数据存储。\n\n# 第 9 章\n\n## 将 Kundera 与 MongoDB 一起使用\n\nJava 持久化 API (JPA) 是用于在\
  \ Java EE/Java SE 环境中进行持久化管理和对象/关系映射的 Java API，它使用 Java 领域模型来管理关系数据库。JPA 还通过 Query\
  \ 接口提供了查询语言 API，用于静态和动态查询。JPA 主要为关系数据库设计，而 Kundera 是一个符合 JPA 2.0 标准的对象-数据存储映射库，用于\
  \ NoSQL 数据存储。Kundera 也支持关系数据库，并为 MongoDB 和其他一些 NoSQL 数据库（如 Apache Cassandra 和 HBase）提供特定的\
  \ NoSQL 数据存储配置。在领域模型中使用 `kundera-mongo` 库，即可通过 JPA 访问 MongoDB。在本章中，我们将使用 `kundera-mongo`\
  \ 模块访问 MongoDB，并在 MongoDB 上运行 CRUD（创建、读取、更新、删除）操作，涵盖以下主题：\n\n*   设置环境\n*   创建 MongoDB\
  \ 集合\n*   在 Eclipse 中创建 Maven 项目\n*   创建 JPA 实体类\n*   在 `persistence.xml` 配置文件中配置\
  \ JPA\n*   创建 JPA 客户端类\n*   运行 JPA CRUD 操作\n*   Kundera-Mongo JPA 客户端类\n*   安装 Maven\
  \ 项目\n*   运行 Kundera-Mongo JPA 客户端类\n*   调用 `KunderaClient` 方法\n\n## 设置环境\n\n本章我们将需要以下软件。\n\
  \n*   从 `www.eclipse.org/downloads/` 下载适用于 Java EE 开发者的 Eclipse IDE。\n*   从 `www.mongodb.org/dl/win32/x86_64`\
  \ 下载 MongoDB 3.0.2（或更高版本）Windows 二进制文件 `mongodb-win32-x86_64-3.0.2-signed.msi`。双击\
  \ `mongodb-win32-x86_64-3.0.2-signed` 文件以安装 MongoDB 3.0.2。将 `bin` 目录（例如 `C:\\Program\
  \ Files\\MongoDB\\Server\\3.0\\bin`）添加到 `PATH` 环境变量中。\n*   从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
  \ 下载 Java 7。\n\nKundera 支持的 MongoDB 版本是 `2.6.3+` 和 `3.0.2`。如果之前没有为前面的章节创建过，请为 MongoDB\
  \ 数据创建一个目录 `C:\\data\\db`。从命令 shell 使用以下命令启动 MongoDB。\n\n```\n>mongod\n```\n\nMongoDB\
  \ 启动，等待在 `localhost:27017` 上的连接。\n\n### 创建 MongoDB 集合\n\n我们需要创建一个 MongoDB 集合来存储文档。使用\
  \ `mongo` 命令启动 Mongo shell。\n\n```\n>mongo\n```\n\n在 Mongo shell 中使用以下命令创建一个名为 `catalog`\
  \ 的集合。第一条命令将数据库设置为 `local`。第二条命令删除 `catalog` 集合。\n\n```\n>use local\n>db.catalog.drop()\n\
  >db.createCollection(\"catalog\")\n```\n\n`catalog` 集合被创建，如 图 9-1 所示。\n\n![9781484215999_Fig09-01.jpg](img/image00635.jpeg)\n\
  图 9-1. 创建 MongoDB 集合\n\n### 在 Eclipse 中创建 Maven 项目\n\n`kundera-mongo` 库可作为 Maven\
  \ 依赖项使用。我们将使用一个 Maven 项目，通过 `kundera-mongo` 库访问 MongoDB，为此需要在 Eclipse IDE 中创建一个\
  \ Maven 项目。\n\n1.  在 Eclipse IDE 中选择 文件 ![image](img/image00406.jpeg) 新建 ![image](img/image00406.jpeg)\
  \ 其他。\n2.  在“新建”窗口中选择 Maven ![image](img/image00406.jpeg) Maven 项目，如 图 9-2 所示。单击\
  \ 下一步。\n\n    ![9781484215999_Fig09-02.\n\n\n# 创建 Maven 项目并配置 JPA 实体类\n\n### 创建\
  \ Maven 项目\n\n1.  在 Eclipse 中，选择 **文件** ![image](img/image00406.jpeg) **新建** ![image](img/image00406.jpeg)\
  \ **Maven 项目**，如图 9-2 所示。\n    \n    ![jpg](img/image00636.jpeg) 图 9-2. 选择 Maven\
  \ ![image](img/image00406.jpeg) Maven Project\n\n2.  在 **新建 Maven 项目** 向导中，选中 **创建一个简单的项目**\
  \ 复选框。同时选中 **使用默认的工作空间位置** 复选框，如图 9-3 所示。点击 **下一步**。\n\n    ![9781484215999_Fig09-03.jpg](img/image00637.jpeg)\
  \ 图 9-3. 新建 Maven 项目向导\n\n3.  在 **新建 Maven** 向导的 **配置项目** 窗口中，选择以下值并点击 **完成**，如图\
  \ 9-4 所示。\n    *   Group Id: `com.kundera.mongodb`\n    *   Artifact Id: `KunderaMongoDB`\n\
  \    *   Version: `1.0.0`\n    *   Packaging: `jar`\n    *   Name: `KunderaMongoDB`\n\
  \n    ![9781484215999_Fig09-04.jpg](img/image00638.jpeg) 图 9-4. 配置 Maven 项目\n\n\
  \    一个用于 Kundera Mongo 的 Maven 项目已创建，如包资源管理器中的图 9-5 所示。\n\n    ![9781484215999_Fig09-05.jpg](img/image00639.jpeg)\
  \ 图 9-5. Maven 项目 KunderaMongoDB\n\n4.  接下来，修改 `pom.xml` 以添加 `kundera-mongo` 库和\
  \ EclipseLink 的依赖。由于我们将使用 JPA，因此需要 EclipseLink。\n\n    ```xml\n    <dependencies>\n\
  \        <dependency>\n            <groupId>com.impetus.client</groupId>\n     \
  \       <artifactId>kundera-mongo</artifactId>\n            <version>2.9</version>\n\
  \        </dependency>\n        <dependency>\n            <groupId>org.eclipse.persistence</groupId>\n\
  \            <artifactId>eclipselink</artifactId>\n            <version>2.6.0</version>\n\
  \        </dependency>\n    </dependencies>\n    ```\n\n5.  在构建配置中，指定 `maven-compiler-plugin`\
  \ 插件来编译 Maven 项目，以及 `exec-maven-plugin` 插件来运行 Maven 客户端类。对于 `exec-maven-plugin`\
  \ 插件，在 `<configuration/>` 中指定要运行的主类为 Kundera `Client` 类 `kundera.KunderaClient`，我们将在本章后面创建它。\n\
  \n    ```xml\n    <build>\n        <plugins>\n            <plugin>\n           \
  \     <artifactId>maven-compiler-plugin</artifactId>\n                <configuration>\n\
  \                    <source>1.7</source>\n                    <target>1.7</target>\n\
  \                </configuration>\n            </plugin>\n            <plugin>\n\
  \                <groupId>org.codehaus.mojo</groupId>\n                <artifactId>exec-maven-plugin</artifactId>\n\
  \                <version>1.2.1</version>\n                <configuration>\n   \
  \                 <mainClass>kundera.KunderaClient</mainClass>\n               \
  \ </configuration>\n            </plugin>\n        </plugins>\n    </build>\n  \
  \  ```\n\n    完整的 `pom.xml` 文件如下：\n\n    ```xml\n    <project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
  \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n        xsi:schemaLocation=\"\
  http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
  >\n        <modelVersion>4.0.0</modelVersion>\n        <groupId>com.kundera.mongodb</groupId>\n\
  \        <artifactId>KunderaMongoDB</artifactId>\n        <version>1.0.0</version>\n\
  \        <name>KunderaMongoDB</name>\n        <dependencies>\n            <dependency>\n\
  \                <groupId>com.impetus.client</groupId>\n                <artifactId>kundera-mongo</artifactId>\n\
  \                <version>2.9</version>\n            </dependency>\n           \
  \ <dependency>\n                <groupId>org.eclipse.persistence</groupId>\n   \
  \             <artifactId>eclipselink</artifactId>\n                <version>2.6.0</version>\n\
  \            </dependency>\n        </dependencies>\n        <build>\n         \
  \   <plugins>\n                <plugin>\n                    <artifactId>maven-compiler-plugin</artifactId>\n\
  \                    <configuration>\n                        <source>1.7</source>\n\
  \                        <target>1.7</target>\n                    </configuration>\n\
  \                </plugin>\n                <plugin>\n                    <groupId>org.codehaus.mojo</groupId>\n\
  \                    <artifactId>exec-maven-plugin</artifactId>\n              \
  \      <version>1.2.1</version>\n                    <configuration>\n         \
  \               <mainClass>kundera.KunderaClient</mainClass>\n                 \
  \   </configuration>\n                </plugin>\n            </plugins>\n      \
  \  </build>\n    </project>\n    ```\n\n### 创建 JPA 实体类\n\nJPA 对象/关系映射应用程序的领域模型在\
  \ JPA 实体类中定义。该领域模型类只是一个*普通的 Java 对象*（POJO），它描述了要持久化的 Java 对象实体、对象属性以及要持久化到的 MongoDB\
  \ 数据库和集合。在本节中，我们将使用 Kundera 和 MongoDB 数据库创建一个用于对象/关系映射的 JPA 实体类。尽管 MongoDB 不是关系型数据库，但可以使用支持某些\
  \ NoSQL 数据库的 Kundera 库与之进行对象/关系映射。\n\n1.  选择 **文件** ![image](img/image00406.jpeg)\
  \ **新建** ![image](img/image00406.jpeg) **其他**。\n2.  在 **新建** 窗口中，选择 **Java** ![image](img/image00406.jpeg)\
  \ **类** 并点击 **下一步**，如图 9-6 所示。\n    \n    ![9781484215999_Fig09-06.jpg](img/image00640.jpeg)\
  \ 图 9-6. 选择 Java ![image](img/image00406.jpeg) Class\n\n3.  在 **新建 Java 类** 向导中分配以下值，如图\
  \ 9-7 所示。点击 **完成**。\n    *   源文件夹: `KunderaMongoDB/src/main/java`\n    *   包: `kundera`\n\
  \    *   名称: `Catalog`\n\n    ![9781484215999_Fig09-07.jpg](img/image00641.jpeg)\
  \ 图 9-7. 创建实体类 Catalog\n\n    Java 类 `kundera.Catalog` 被添加到 Maven 项目中，如图 9-8 所示。\n\
  \n    ![9781484215999_Fig09-08.jpg](img/image00642.jpeg) 图 9-8. 实体类 Catalog\n\n\
  4.  使用 `@Entity` 注解标注 `Catalog` 类，以表明该类是一个 JPA 实体类。默认情况下，实体名称与实体类名相同。使用 `@Table`\
  \ 注解标注类以指示 MongoDB 集合名称和模式。表名是集合名 `catalog`。模式采用 `database@persistence-unit` 格式。对于\
  \ `local` 数据库和我们将在下一节配置的 `kundera` 持久性单元名称，模式是 `local@kundera`。\n\n    ```java\n\
  \    @Entity\n    @Table(name = \"catalog\", schema = \"local@kundera\")\n    ```\n\
  \n5.  实体类实现 `Serializable` 接口，以便在持久化到数据库时序列化启用缓存的实体 bean。要将版本号与序列化类关联，需指定一个 `serialVersionUID`\
  \ 变量。\n\n    ```java\n    private static final long serialVersionUID = 1L;\n   \
  \ ```\n\n6.  使用 `@Id` 注解标注 `catalogId` 字段，以表明该字段是实体的主键。使用 `@Column` 注解指定文档字段 `_id`\
  \ 作为主键列。\n\n    ```java\n    @Id\n    @Column(name = \"_id\")\n    private String\
  \ catalogId;\n    ```\n    被 `@Id` 注解的字段必须是以下类型之一：Java 基本类型（如 `int`，`double`）、任何基本包装类型（如\
  \ `Integer`，`Double`）、`String`、`java.util.Date`、`java.sql.Date`、`java.math.BigDecimal`\
  \ 或 `java.math.BigInteger`。\n\n7.\n\n\n\n### 为实体类添加字段与注解\n\n为实体类添加 `journal`、`publisher`、`edition`、`title`\
  \ 和 `author` 字段，并使用 `@Column` 注解来指定字段与文档列的映射关系。\n\n```java\n@Column(name = \"journal\"\
  )\nprivate String journal;\n\n@Column(name = \"publisher\")\nprivate String publisher;\n\
  \n@Column(name = \"edition\")\nprivate String edition;\n\n@Column(name = \"title\"\
  )\nprivate String title;\n\n@Column(name = \"author\")\nprivate String author;\n\
  ```\n\n8.  为每个字段添加对应的 `get`/`set` 访问器方法。完整的 JPA `Entity` 类如下所示。\n\n```java\npackage\
  \ kundera;\n\nimport java.io.Serializable;\nimport javax.persistence.*;\n\n/**\n\
  \ * Entity implementation class for Entity: Catalog\n *\n */\n@Entity\n@Table(name\
  \ = \"catalog\", schema = \"local@kundera\")\npublic class Catalog implements Serializable\
  \ {\n\n    private static final long serialVersionUID = 1L;\n\n    @Id\n    @Column(name\
  \ = \"_id\")\n    private String catalogId;\n\n    public Catalog() {\n        super();\n\
  \    }\n\n    @Column(name = \"journal\")\n    private String journal;\n\n    @Column(name\
  \ = \"publisher\")\n    private String publisher;\n\n    @Column(name = \"edition\"\
  )\n    private String edition;\n\n    @Column(name = \"title\")\n    private String\
  \ title;\n\n    @Column(name = \"author\")\n    private String author;\n\n    public\
  \ String getCatalogId() {\n        return catalogId;\n    }\n\n    public void setCatalogId(String\
  \ catalogId) {\n        this.catalogId = catalogId;\n    }\n\n    public String\
  \ getJournal() {\n        return journal;\n    }\n\n    public void setJournal(String\
  \ journal) {\n        this.journal = journal;\n    }\n\n    public String getPublisher()\
  \ {\n        return publisher;\n    }\n\n    public void setPublisher(String publisher)\
  \ {\n        this.publisher = publisher;\n    }\n\n    public String getEdition()\
  \ {\n        return edition;\n    }\n\n    public void setEdition(String edition)\
  \ {\n        this.edition = edition;\n    }\n\n    public String getTitle() {\n\
  \        return title;\n    }\n\n    public void setTitle(String title) {\n    \
  \    this.title = title;\n    }\n\n    public String getAuthor() {\n        return\
  \ author;\n    }\n\n    public void setAuthor(String author) {\n        this.author\
  \ = author;\n    }\n}\n```\n\n### 在 persistence.xml 配置文件中配置 JPA\n\n在本节中，我们将在 Maven\
  \ 项目的 `src/main/resources` 文件夹下创建一个 `META-INF/persistence.xml` 配置文件。我们将在 `persistence.xml`\
  \ 配置文件中配置对象/关系映射。Kundera 支持一些通过 `<property/>` 标签在 `persistence.xml` 中指定的属性，这些属性对所有支持的\
  \ NoSQL 数据存储都是通用的。这些通用属性在 表 9-1 中讨论。\n\n**表 9-1**. Kundera 持久化配置属性\n\n| 属性 | 描述\
  \ | 必需/可选 |\n| :--- | :--- | :--- |\n| `kundera.nodes` | NoSQL 服务器运行的节点。 | 必需 |\n\
  | `kundera.port` | NoSQL 数据库端口。 | 必需 |\n| `kundera.keyspace` | NoSQL 数据库键空间。 | 必需\
  \ |\n| `kundera.dialect` | NoSQL 数据库方言，用于确定持久化提供者。有效值：`cassandra`、`mongodb` 和 `hbase`。\
  \ | 必需 |\n| `kundera.client.lookup.class` | 用于低级别数据存储操作的 NoSQL 数据库特定客户端类。 | 必需 |\n\
  | `kundera.cache.provider.class` | L2 缓存实现类。 | 必需 |\n| `kundera.cache.config.resource`\
  \ | 包含 L2 缓存实现的文件。 | 必需 |\n| `kundera.ddl.auto.prepare` | 指定自动生成所有实体的模式和表的选项。有效选项：`create`：如果存在则删除，并基于实体定义创建模式/表。`create-drop`：与\
  \ `create` 相同，并在操作结束后删除模式。`update`：基于实体定义更新模式/表。`validate`：基于实体定义验证模式/表，如果验证失败则抛出\
  \ `SchemaGenerationException`。 | 可选 |\n| `kundera.pool.size.max.active` | 每个节点由池管理的对象实例数量的上限。\
  \ | 可选 |\n| `kundera.pool.size.max.idle` | 池中空闲对象实例数量的上限。 | 可选 |\n| `kundera.pool.size.min.idle`\
  \ | 池中空闲对象实例的最小数量。 | 可选 |\n| `kundera.pool.size.max.total` | 所有节点合并的池中对象实例总数的上限。\
  \ | 可选 |\n| `index.home.dir` | 如果选择 Lucene 索引而不是内置的二级索引，此属性指定存储 Lucene 索引的目录路径。\
  \ | 可选 |\n| `kundera.client.property` | NoSQL 数据库特定配置文件的名称，该文件必须在类路径中。 | 可选 |\n\
  | `kundera.batch.size` | 批量插入/更新的批处理大小（整数）。 | 可选 |\n| `kundera.username` | 用于认证\
  \ Cassandra 和 MongoDB 的用户名。 | 可选 |\n| `kundera.password` | 用于认证 Cassandra 和 MongoDB\
  \ 的密码。 | 可选 |\n\n9.  在 Maven 项目的 `persistence.xml` 文件中，将持久化单元名称指定为 `kundera`。\n\
  10. 添加一个 `<provider/>` 元素，其值设置为 `com.impetus.kundera.KunderaPersistence`。\n11. 在\
  \ `<class/>` 元素中将 JPA 实体类指定为 `kundera.Catalog`。\n12. 在 `<properties/>` 标签内作为子元素添加\
  \ `<property/>` 标签。添加 表 9-2 中讨论的属性。\n\n**表 9-2**. 已配置的 Kundera 持久化属性\n\n| 属性 | 描述\
  \ | 值 |\n| :--- | :--- | :--- |\n| `kundera.nodes` | MongoDB 主机名。 | `localhost`\
  \ 或 `127.0.0.1` |\n| `kundera.port` | MongoDB 端口。 | `27017` |\n| `kundera.keyspace`\
  \ | MongoDB 数据库。 | `local` |\n| `kundera.dialect` | Kundera 方言。Kundera 使用它来确定持久化提供者实现。\
  \ | `mongodb` |\n| `kundera.ddl.auto.prepare` | Kundera 使用它自动在持久化单元中生成模式和实体。 | `create`\
  \ |\n| `kundera.client.lookup.class` | Kundera 使用它来查找用于在 MongoDB 上执行操作的低级别方言类。 |\
  \ `com.impetus.client.mongodb.MongoDBClientFactory` |\n| `kundera.annotations.scan.package`\
  \ | 要扫描 JPA 实体的包。 | `kundera` |\n\n`persistence.xml` 配置文件如下所示。\n\n```xml\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence version=\"2.1\"\n    xmlns=\"\
  http://xmlns.jcp.org/xml/ns/persistence\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \n    xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/persistence http://xmlns.jcp.org/xml/ns/persistence/persistence_2_1.xsd\"\
  >\n    <persistence-unit name=\"kundera\">\n        <provider>com.impetus.kundera.KunderaPersistence</provider>\n\
  \        <class>kundera.Catalog</class>\n        <properties>\n            <property\
  \ name=\"kundera.nodes\" value=\"127.0.0.1\" />\n            <property name=\"kundera.port\"\
  \ value=\"27017\" />\n            <property name=\"kundera.keyspace\" value=\"local\"\
  \ />\n            <property name=\"kundera.dialect\" value=\"mongodb\" />\n    \
  \        <property name=\"kundera.ddl.auto.prepare\" value=\"create\" />\n     \
  \       <property name=\"kundera.client.lookup.class\"\n                value=\"\
  com.impetus.client.mongodb.MongoDBClientFactory\" />\n            <property name=\"\
  kundera.annotations.scan.package\" value=\"kundera\" />\n        </properties>\n\
  \    </persistence-unit>\n</persistence>\n```\n\n一些 NoSQL 数据库特定的属性也可以在单独的 XML 配置文件中指定。\n\
  \n\n\n# MongoDB 特定属性配置\n\n表 9-3 展示了支持的以下 MongoDB 特定属性。\n\n**表 9-3. MongoDB 特定配置属性**\n\
