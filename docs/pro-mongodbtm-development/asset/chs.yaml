  \ Spring Data MongoDB 项目与 MongoDB 服务器。对 MongoDB 数据存储的常见 CRUD 操作可以通过`org.springframework.data.mongodb.core.MongoOperations`接口和`org.springframework.data.mongodb.repository.MongoRepository`来执行。本章我们讨论了使用这两个接口对\
  \ MongoDB 进行 CRUD 操作。在下一章中，我们将讨论 MongoDB 与 Hadoop 的集成，并在 MongoDB 之上创建一个 Apache Hive\
  \ 表。\n\n## 第十一章\n\n![image](img/image00404.jpeg)\n\n## 使用 MongoDB 创建 Apache Hive\
  \ 表\n\nMongoDB 是领先的 NoSQL 数据库。MongoDB 基于 BSON（二进制 JSON）文档格式，该格式基于动态模式，提供了存储的灵活性。Hive\
  \ MongoDB 存储处理器使得从 Apache Hive 访问 MongoDB 变得可行。可以在 MongoDB 文档存储上创建一个 Hive 外部表。在本章中，我们将在\
  \ MongoDB 中创建一个文档存储，然后在该 MongoDB 文档存储上创建一个 Hive 外部表。\n\nApache Hadoop 是一个用于大规模数据集分布式处理的框架。Apache\
  \ Hadoop 文件系统是 Hadoop 分布式文件系统（HDFS）。Apache Hive 是一个用于查询和管理存储在分布式存储上的大型数据集的软件，默认是\
  \ HDFS。本章假设读者具备 Apache Hadoop（参考：`https://hadoop.apache.org/`）和 Apache Hive（参考：`https://hive.apache.org/`）的知识，因为我们不会讨论\
  \ HDFS 是什么或 HDFS 如何为 Hive 存储数据。我们还将使用一些 Hadoop shell 命令。本章包括以下主题：\n\n*   Hive MongoDB\
  \ 存储处理器概述\n*   设置环境\n*   创建 MongoDB 数据存储\n*   在 Hive 中创建外部表\n\n### Hive MongoDB\
  \ 存储处理器概述\n\nApache Hive 支持两种类型的表：*managed*表和*external*表。\n\n\n\n"
- "# Hive 管理表与外部表及 MongoDB 存储处理器\n\nHive 管理表与外部表的区别在于，管理表由 Hive 管理，这意味着表的元数据和数据都由\
  \ Hive 管理。对于外部表，Hive 只管理元数据，而不管理表数据。如果删除一个 Hive 管理表，数据和元数据都会被删除。但如果删除一个 Hive 外部表，则只会删除元数据，而不会删除表数据。Hive\
  \ 外部表适用于数据存储在外部数据源（如 MongoDB 数据库）中的场景。本节我们将介绍 Hive MongoDB 存储处理器，它用于在 MongoDB 数据库上创建\
  \ Hive 外部表。\n\nHive 的 MongoDB 存储处理器类是`org.yong3.hive.mongo.MongoStorageHandler`。该存储处理器仅支持\
  \ Hive 原始类型，如`int`和`string`。MongoDB 存储处理器提供了 serde 属性`mongo.column.mapping`，用于指定要映射到\
  \ Hive 外部表的 MongoDB 数据存储列名。此外，还支持以下`tblproperties`属性（见表 11-1）。\n\n表 11-1. Mongo\
  \ 存储处理器属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `mongo.host` | MongoDB 主机名。 |\n| `mongo.port`\
  \ | MongoDB 端口。 |\n| `mongo.db` | MongoDB 数据库。 |\n| `mongo.user` | MongoDB 用户名。\
  \ |\n| `mongo.passwd` | MongoDB 密码。 |\n| `mongo.collection` | MongoDB 集合。 |\n\n\
  ## 环境设置\n\n本章需要以下软件：\n\n*   Hadoop 2.0.0 CDH 4.6\n*   Hive 0.10.0 CDH 4.6\n*   MongoDB\
  \ Java Driver 2.11.3\n*   MongoDB Storage Handler for Hive 0.0.3\n*   MongoDB 2.6.3\n\
  *   Eclipse IDE for Java EE Developers\n*   Java 7\n\n也可以使用所列软件的更高版本。从`https://github.com/yc-huang/Hive-mongo`下载\
