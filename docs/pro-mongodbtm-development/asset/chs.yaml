- "# 第 1 章\n\n![image](img/image00404.jpeg)\n\n## 使用 Java 客户端连接 MongoDB\n\nMongoDB\
  \ 服务器为包括 Java 在内的多种语言提供了驱动程序。MongoDB Java 驱动程序可用于从 Java 应用程序连接到 MongoDB 服务器，并创建集合、获取集合或集合列表、向集合添加一个或多个文档，以及查找一个或一组文档。在本章中，我们将在\
  \ Eclipse 中创建一个 Java 应用程序，访问 MongoDB 服务器添加文档，随后从 MongoDB 服务器获取数据，以及更新和删除 MongoDB\
  \ 服务器中的数据。本章涵盖以下主题：\n\n*   设置环境\n*   创建 Maven 项目\n*   在 MongoDB 中创建 BSON 文档\n* \
  \  使用模型在 MongoDB 中创建 BSON 文档\n*   从 MongoDB 获取数据\n*   更新 MongoDB 中的数据\n*   删除 MongoDB\
  \ 中的数据\n\n### 设置环境\n\n我们需要下载并安装以下软件。\n\n1.  从`www.mongodb.org/downloads`下载 MongoDB\
  \ 3.0.5 二进制发行版`mongodb-win32-x86_64-3.0.5-signed.msi`。本章使用 Windows 64 位稳定版（3.0.5）。\n\
  2.  从`www.eclipse.org/downloads`下载 Eclipse IDE for Java EE Developers。\n3.  从`www.oracle.com/technetwork/java/javase/downloads/index.html`下载\
  \ Java 5 或更高版本（本章使用 Java 7）。\n\n双击 MongoDB 二进制发行版进行安装。将 MongoDB 安装目录下的`bin`文件夹（`C:\\\
  Program Files\\MongoDB\\Server\\3.0\\bin`）添加到`PATH`环境变量中。为 MongoDB 数据创建一个目录`C:\\\
  data\\db`。使用以下命令启动 MongoDB 服务器。\n\n```\n>mongod\n```\n\nMongoDB 服务器启动，如图 1-1 所示。\n\
  \n![9781484215999_Fig01-01.jpg](img/image00405.jpeg)\n\n图 1-1. 启动 MongoDB\n\n###\
  \ 创建 Maven 项目\n\n为了从 Java 应用程序访问 MongoDB，我们需要在 Eclipse IDE 中创建一个 Maven 项目并添加所需的依赖项。\n\
  \n1.  选择文件 ![image](img/image00406.jpeg) 新建 ![image](img/image00406.jpeg) 其他。在“新建”窗口中，选择\
  \ Maven ![image](img/image00406.jpeg) Maven 项目向导，然后单击下一步，如图 1-2 所示。\n\n![9781484215999_Fig01-02.jpg](img/image00407.jpeg)\n\
  \n图 1-2. 选择 Maven ![image](img/image00406.jpeg) Maven 项目\n\n2.  在“新建 Maven 项目”向导中，选中“创建简单项目”和“使用默认工作空间位置”复选框，如图\
  \ 1-3 所示。单击下一步。\n\n![9781484215999_Fig01-03.jpg](img/image00408.jpeg)\n\n图 1-3.\
  \ 新建 Maven 项目向导\n\n3.  接下来，配置项目，指定以下值，如图 1-4 所示，然后单击完成：\n\n*   Group Id: `mongodb.java`\n\
  \    *   Artifact Id: `MongoDBJava`\n    *   Version: 1.0.0\n    *   Packaging:\
  \ jar\n    *   Name: `MongoDBJava`\n\n![9781484215999_Fig01-04.jpg](img/image00409.jpeg)\n\
  \n图 1-4. 配置 Maven 项目\n\n\n\n"
- "# 创建和配置 Maven 项目\n\n一个新的 Maven 项目已创建，如图 1-5 所示。\n\n![9781484215999_Fig01-05.jpg](img/image00410.jpeg)\n\
  \n图 1-5. Maven 项目 MongoDBJava\n\n4.  我们需要向 Maven 项目添加一些 Java 类，以便在 MongoDB 服务器上运行\
  \ CRUD 操作。选择 File ![image](img/image00406.jpeg) New ![image](img/image00406.jpeg)\
  \ Other，然后在 New 窗口中，选择 Java ![image](img/image00406.jpeg) Class，如图 1-6 所示。\n\n![9781484215999_Fig01-06.jpg](img/image00411.jpeg)\n\
  \n图 1-6. 选择 Java ![image](img/image00406.jpeg) Class\n\n5.  在 New Java Class 向导中，Source\
  \ folder 预先选定为`MongoDBJava/src/main/java`。指定 Package 名称（`mongodb`）。指定一个 class Name（例如，用于连接\
  \ MongoDB 并获取数据的应用程序类`MongoDBClient`）。勾选`public static void main (String[] args)`方法存根以创建类，然后单击\
  \ Finish，如图 1-7 所示。\n\n![9781484215999_Fig01-07.jpg](img/image00412.jpeg)\n\n图 1-7.\
  \ 创建一个新类\n\n6.  `MongoDBClient`类在`MongoDBJava`项目中被创建。类似地，将表 1-1 中列出的 Java 类添加到与`MongoDBClient`类相同的包中：`mongodb`包。\n\
  \n表 1-1. Java 类\n\n| 类 | 描述 |\n| --- | --- |\n| `Catalog` | 模型类，用于定义要添加到 MongoDB\
  \ 服务器的记录的属性和访问方法。 |\n| `CreateMongoDBDocument` | 创建 MongoDB 文档的类。 |\n| `CreateMongoDBDocumentModel`\
  \ | 使用模型类 catalog 创建 MongoDB 文档的类。 |\n| `UpdateDBDocument` | 更新文档的类。 |\n| `DeleteDBDocument`\
  \ | 删除文档的类。 |\n\nMaven 项目中的 Java 类在 Package Explorer 中如图 1-8 所示。\n\n![9781484215999_Fig01-08.jpg](img/image00413.jpeg)\n\
