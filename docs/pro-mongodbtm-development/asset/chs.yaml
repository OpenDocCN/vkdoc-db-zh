  \ 查找单个文档\n\n`MongoCollection::findOne()`方法用于从集合中查找单个文档。`findOne()`方法返回一个由文档字段组成的数组。该方法接受一个`$query`参数、一个`$fields`参数（指定返回文档中要包含的字段）以及选项参数。即使未在`$fields`中指定，`_id`字段也会被返回。\n\
  \n```\nMongoCollection::findOne ([ array $query = array() [, array $fields = array()\
  \ [, array $options = array() ]]] )\n```\n\n\n"
- "# 使用 `findOne()` 和 `find()` 查找文档\n\n`findOne()` 方法用于查找单个文档。所有参数都是可选的，如果未指定任何参数，则返回集合中的第一个文档。只支持一个选项\
  \ `maxTimeMS`，它是处理该方法的累计时间限制（毫秒），不包括空闲时间。如果方法未在指定时间内完成，则抛出 `MongoExecutionTimeoutException`。如果未与\
  \ MongoDB 服务器建立连接，则抛出 `MongoConnectionException`。\n\n## 使用 `findOne()` 查找单个文档\n\n\
  1.  在 `C:\\php` 目录中创建一个 PHP 脚本 `findDocument.php`。在 `try`-`catch` 语句中，创建一个 `MongoClient`\
  \ 实例，并使用该连接为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n \
  \   $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n2.  在 `MongoCollection` 实例上调用 `findOne()` 方法以查找单个文档。找到的第一个文档将被返回，对于不同的用户可能不同。\n\
  \n    ```\n    $document = $collection->findOne();\n    var_dump($document);\n \
  \   ```\n\n3.  可以通过指定传递给 `findOne()` 方法的数组中的 `_id` 字段来查找特定文档。`_id` 字段值使用 `MongoId`\
  \ 类构造函数构建。`_id` 字段值对于不同的用户会有所不同。\n\n    ```\n    $document = $collection->findOne(array('_id'\
  \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\n    var_dump($document);\n  \
  \  ```\n\n`findDocument.php` 脚本如下：\n\n```\n<?php\ntry\n{\n$connection = new MongoClient();\n\
  $collection=$connection->local->catalog;\n\n$document = $collection->findOne();\n\
  var_dump($document);\nprint '<br/>';\n$document = $collection->findOne(array('_id'\
  \ => new MongoId(\"55bcf87a098c6ec80b00002a\")));\nvar_dump($document);\nprint '<br/>';\n\
  \n}catch ( MongoConnectionException $e )\n{\n    echo '<p>Couldn\\'t connect to\
  \ mongodb</p>';\n    exit();\n}catch(MongoCursorException $e) {\n echo '<p>w option\
  \ is set and the write has failed</p>';\n    exit();\n}\n?>\n```\n\n4.  在浏览器中使用\
  \ URL `http://localhost:8000/findDocument.php` 运行 PHP 脚本。浏览器中会显示两个文档，如 图 3-16 所示。\n\
  \n![9781484215999_Fig03-16.jpg](img/image00493.jpeg)\n\n图 3-16. 使用 findOne() 查找单个文档\n\
  \n同样，不要删除 `local` 数据库中的 `catalog` 集合，因为将在下一节中使用批量添加的文档来演示查找文档。\n\n### 查找所有文档\n\n\
  `MongoCollection::find()` 方法用于查找匹配指定查询的所有文档。该方法语法接受两个参数 `$query` 和 `$fields`，均为数组类型且均为可选。`_id`\
  \ 字段总是会被返回。如果未指定查询，则返回所有文档。`find()` 方法返回一个游标，由 `MongoCursor` 实例表示，该游标位于数据库查询的结果集之上。\n\
  \n```\nMongoCursor MongoCollection::find ([ array $query = array() [, array $fields\
  \ = array() ]] )\n```\n\n1.  在 `C:\\php` 目录中创建一个 PHP 脚本 `findAllDocuments.php`。在\
  \ `try`-`catch` 语句中创建一个 `MongoClient` 实例，它表示与 MongoDB 服务器的连接。为 `local` 数据库中的 `catalog`\
  \ 集合创建一个 `MongoCollection` 实例。\n\n    ```\n    $connection = new MongoClient();\
  \ \n    $collection=$connection->local->catalog;\n    ```\n\n2.  在 `MongoCollection`\
  \ 实例上调用 `find()` 方法，并使用 `iterator_to_array` 方法将返回的游标转换为数组。\n\n    ```\n    $cursor\
  \ = $collection->find();\n    var_dump(iterator_to_array($cursor));\n    ```\n\n\
  3.  也可以使用 `foreach` 循环来遍历数据库查询的结果集。例如，输出 `_id` 和 `catalogId` 字段值，如下所示。\n\n    ```\n\
  \    foreach ($cursor as $doc) {\n         var_dump($doc[\"_id\"]);\n    print '<br/>';\n\
  \    var_dump($doc[\"info\"][\"catalogId\"]);\n    }\n    ```\n\n`findAllDocuments.php`\
  \ 脚本如下：\n\n```\n<?php\ntry\n{\n$connection = new MongoClient();\n$collection=$connection->local->catalog;\n\
  print 'Number of Documents: ';\nvar_dump($collection->count());\nprint '<br/>';\n\
  \n$cursor = $collection->find();\nvar_dump(iterator_to_array($cursor));\nprint '<br/>';\n\
  foreach ($cursor as $doc) {\n     var_dump($doc[\"_id\"]);\nprint '<br/>';\nvar_dump($doc[\"\
  info\"][\"catalogId\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"journal\"]);\n\
  print '<br/>';\nvar_dump($doc[\"info\"][\"publisher\"]);\nprint '<br/>';\nvar_dump($doc[\"\
  info\"][\"edition\"]);\nprint '<br/>';\nvar_dump($doc[\"info\"][\"title\"]);\nprint\
  \ '<br/>';\nvar_dump($doc[\"info\"][\"author\"]);\nprint '<br/>';\n}\n}catch ( MongoConnectionException\
  \ $e )\n{\n    echo '<p>Couldn\\'t connect to mongodb</p>';\n    exit();\n}catch(MongoCursorException\
  \ $e) {\n echo '<p>w option is set and the write has failed</p>';\n    exit();\n\
  \n}\n?>\n```\n\n4.  在浏览器中使用 URL `http://localhost:8000/findAllDocuments.php` 运行\
  \ PHP 脚本。`local` 数据库中 `catalog` 集合的所有文档都将显示出来。每个文档的字段值也会显示，如 图 3-17 所示。\n\n![9781484215999_Fig03-17.jpg](img/image00494.jpeg)\n\
  \n图 3-17. 使用 find() 查找所有文档\n\n## 查找字段和文档的子集\n\n`find()` 方法接受两个数组类型的参数 `$query` 和\
  \ `$fields`，两者都是可选的。为了从文档子集中选择字段子集，可以指定两者的参数值。\n\n1.  首先，使用以下脚本 `addDocumentSet.php`\
  \ 在 `C:\\php` 目录中添加一个文档集合。\n\n    ```\n    <?php\n    try\n    {\n    $connection\
  \ = new MongoClient();\n    $collection=$connection->local->catalog;\n    $doc =\
  \ array(\"catalogId\" => 'catalog1', \"journal\" => 'Oracle Magazine', \"publisher\"\
  \ => 'Oracle Publishing', \"edition\" => 'November December 2013',\"title\" => 'Engineering\
  \ as a\n    Service',\"author\" => 'David A. Kelly');\n    $status=$collection->insert($doc);\n\
  \    var_dump($status);\n    print '<br/>';\n    $doc = array(\"catalogId\" => 'catalog2',\
  \ \"journal\" => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\"\
  \ => 'November December 2013',\"title\" => 'Quintessential and Collaborative',\"\
  author\" => 'Tom Haunert');\n    $status=$collection->insert($doc);\n    var_dump($status);\n\
  \    }catch ( MongoConnectionException $e )\n    {\n        echo '<p>Couldn\\'t\
  \ connect to mongodb</p>';\n        exit();\n    }catch(MongoCursorException $e)\
  \ {\n     echo '<p>w option is set and the write has failed</p>';\n        exit();\n\
  \n}\n     ?>\n    ```\n\n2.  将脚本复制到 `C:\\php` 目录，并使用 URL `http://localhost:8000/addDocumentSet.php`\
  \ 运行。\n3.  创建另一个 PHP 脚本 `findDocumentSet.php`，放在 `C:\\php` 目录中，用于查找字段和文档的子集。\n4.\
  \  像之前一样，为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```\n   \
  \ $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    ```\n\n5.  指定要查找文档的 key=>value 对数组。例如，选择所有 `catalogId` 为 `catalog1` 的文档。\n\n\
  \    ```\n    $query = array('catalogId'=>'catalog1');\n    ```\n\n6.  指定要从找到的文档中选择的字段数组。例如，选择\
  \ `title` 和 `author` 字段。\n\n    ```\n    $fields = array('title' => true, 'author'\
  \ => true);\n    ```\n\n7.  使用 `$query` 和 `$fields` 参数调用 `find()` 方法，以获得结果集上的游标。\n\
  \n    ```\n    $cursor = $collection->find($query, $fields);\n    ```\n\n8.  使用\
  \ `while` 循环遍历结果以输出返回的文档字段。`MongoCursor` 中的 `hasNext()` 方法将光标移动到下一个文档，`getNext()`\
  \ 方法获取下一个文档。\n\n\n\n"
- "# 使用 MongoDB 查询与更新文档\n\n## 查询文档集合\n\n以下 PHP 代码演示了如何使用游标遍历查询结果：\n\n```php\n    while\
  \ ($cursor->hasNext())\n    {\n        var_dump($cursor->getNext());\n    }\n  \
  \  ?>\n```\n\n`findDocumentSet.php` 脚本如下：\n\n```php\n    <?php\n    try\n    {\n\
  \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  \    $query = array('catalogId'=>'catalog1');\n    $fields = array('title' => true,\
  \ 'author' => true);\n    $cursor = $collection->find($query, $fields);\n    while\
  \ ($cursor->hasNext())\n    {\n        var_dump($cursor->getNext());\n    }\n  \
  \  }catch (MongoConnectionException $e)\n    {\n        echo '<p>Couldn\\'t connect\
  \ to mongodb</p>';\n        exit();\n    }catch(MongoCursorException $e) {\n   \
  \  echo $e;\n        exit();\n    }\n    ?>\n```\n\n9.  在浏览器中运行 `findDocumentSet.php`\
  \ 脚本，URL 为 `http://localhost:8000/findDocumentSet.php`，将输出从选定文档中选择的字段，如 图 3-18 所示。\n\
  \n![9781484215999_Fig03-18.jpg](img/image00495.jpeg)\n\n图 3-18. 为文档子集查找字段子集\n\n\
  10. 要选择所有文档，请按如下方式指定查询：\n\n```php\n    $query = array();\n```\n\n当在浏览器中运行 `findDocumentSet.php`\
  \ 脚本以选择所有文档时，将选择所有文档的选定字段，如 图 3-19 所示。\n\n![9781484215999_Fig03-19.jpg](img/image00496.jpeg)\n\
  \n图 3-19. 为所有文档查找字段子集\n\n### 更新文档\n\n`MongoCollection::update()` 方法用于根据指定条件更新一个或多个文档。如果设置了\
  \ `w` 选项，该方法返回一个状态数组，否则返回一个布尔值。该方法的语法接受 `$criteria`、`$new_object` 和 `$options` 参数，均为数组类型。\n\
  \n```\nMongoCollection::update ( array $criteria , array $new_object [, array $options\
  \ = array() ] )\n```\n\n方法参数在 表 3-6 中讨论。\n\n表 3-6. Update 方法的参数\n\n| 参数 | 描述 |\n\
  | --- | --- |\n| `$criteria` | 要更新的文档的查询条件。 |\n| `$new_object` | 如果新对象包含 key=>value\
  \ 对，则为替换文档。或者，如果新对象包含更新操作符，则为要更新的特定字段。 |\n| `$options` | 主要选项是 `upsert`、`w.` 和 `multiple`。如果\
  \ `upsert` 选项设置为 true，则在没有文档匹配条件时添加新文档。`upsert` 的默认值为 false。`w` 的默认值为 1。如果 `multiple`\
  \ 选项设置为 true，则更新多个文档。`multiple` 的默认值为 false。 |\n\n接下来，我们将更新一些文档。\n\n1.  首先，我们需要添加要更新的文档。运行\
  \ `addDocumentBatch.php` 脚本，URL 为 `http://localhost:8000/addDocumentBatch.php`，如\
  \ 图 3-20 所示，向 `local` 数据库中的 `catalog` 集合添加两个文档。文档 `_id` 被输出。我们将使用这些 `_id` 值来更新文档。不同用户的\
  \ `_id` 值会不同。\n\n![9781484215999_Fig03-20.jpg](img/image00497.jpeg)\n\n图 3-20. 添加一批文档\n\
  \n2.  在 `C:\\php` 目录中创建 PHP 脚本 `updateDocument.php`。在 `try`-`catch` 语句中，使用 `MongoClient`\
  \ 实例创建与 MongoDB 的连接。为 `local` 数据库中的 `catalog` 集合创建一个 `MongoCollection` 实例。\n\n```php\n\
  \    $connection = new MongoClient();\n    $collection=$connection->local->catalog;\n\
  ```\n\n3.  通过将数组中的 `_id` 字段设置为从 `53f3d425098c6e2410000065`（这是使用 `addDocumentBatch.php`\
  \ 添加到 `catalog` 集合的其中一个文档的 `_id`）构造的 `MongoId` 实例，来指定要更新文档的 `$criteria`。不同用户的 `_id`\
  \ 值会不同。\n\n```php\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000043\
  \ \"));\n```\n\n4.  使用 key=>value 对为替换文档指定 `$new_object`。添加一个新字段 “updated” 并设置为\
  \ “true。”\n\n```php\n    $new_object = array(\"catalogId\" => 'catalog1', \"journal\"\
  \ => 'Oracle Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"\
  title\" => 'Engineering As a Service',\"author\" => 'Kelly, David A.', \"updated\"\
  =>true);\n```\n\n5.  使用 `$criteria` 和 `$new_object` 调用 `update()` 方法，并使用一个 `upsert`\
  \ 设置为 `false` 的选项数组。\n\n```php\n    $status=$collection->update($criteria,$new_object,\
  \ array(\"upsert\" => false));\n    var_dump($status);\n```\n\n6.  类似地，更新另一个文档。\n\
  \n```php\n    $criteria = array(\"_id\" => new MongoId(\"55bba68a098c6e1c19000044\"\
  ));\n    $new_object = array(\"catalogId\" => 'catalog2', \"journal\" => 'Oracle\
  \ Magazine', \"publisher\" => 'Oracle Publishing', \"edition\" => '11-12-2013',\"\
  title\" => 'Quintessential and Collaborative',\"author\" => 'Haunert, Tom', \"updated\"\
  =>true);\n    $status=$collection->update($criteria,$new_object, array(\"upsert\"\
  \ => false));\n    var_dump($status);\n```\n\n我们在前面的文档更新中将 `upsert` 选项设置为 false。接下来，我们将使用\
  \ `upsert` 选项设置为 true 来调用 `update` 方法。\n\n为了演示如果未找到符合 `$criteria` 的文档，`upsert` 会添加新文档，请指定一个在数据库中不存在的\
  \ `_id` 的 `$criteria`。与 `updateDocument.php` 脚本中一样，不同的用户可以使用相同的 `_id` 值。\n\n\n"
