  图 7-9。Java 构建路径中的 Jar 文件\n\n### 向 Couchbase 添加文档\n\n`com.couchbase.client.java.CouchbaseCluster`\
  \ 类是 Couchbase Server 的客户端类，是访问 Couchbase 集群的入口点，该集群可能包含一台或多台服务器。在 `CreateCouchbaseDocument`\
  \ 应用程序中，我们将使用 `CouchbaseCluster` 类在 Couchbase Server 中创建并存储一个 JSON 文档。`CouchbaseCluster`\
  \ 类提供了重载的 `create()` 方法来创建 `CouchbaseCluster` 的实例。我们将使用不带任何参数的静态方法 `create()`，该方法用于连接到\
  \ localhost 端口 8091 上的默认存储桶。Couchbase Server 将文档存储在数据桶（Data Buckets）中。`Bucket` 接口表示与一个存储桶的连接，用于同步地在该存储桶上执行操作。\n\
  \n1.  创建一个 `CouchbaseCluster` 实例，并随后使用 `openBucket()` 方法连接到默认存储桶。连接到“default”存储桶时，无需指定存储桶名称和密码。\n\
  \    ```java\n    Cluster cluster = CouchbaseCluster.create();\n    Bucket defaultBucket\
  \ = cluster.openBucket();\n    ```\n\n`com.couchbase.client.java.document.json.JsonObject`\
  \ 类表示存储在 Couchbase Server 中的 JSON 对象。文档由 `com.couchbase.client.java.document.Document`\
  \ 接口表示，并提供了多种类实现，包括 `com.couchbase.client.java.document.JsonDocument`，它从 `com.couchbase.client.java.document.json.JsonObject`\
  \ 创建文档。`JsonObject` 代表一个 JSON 对象，即存储在 Couchbase 中的 `{a1:v1,a2:v2}` 格式的 JSON。`JsonObject`\
  \ 类提供了静态方法 `empty()` 和 `create()` 来创建一个空的 `JsonObject` 实例。`JsonObject` 类提供了重载的 put\
  \ 方法，用于将字段/值对放入 `JsonObject` 实例中。这些方法中的字段名都是 `String` 类型。为值类型 `String`、`int`、`long`、`double`、`boolean`、`JsonObject`、`JsonArray`\
  \ 和 `Object` 都提供了相应的 `put` 方法。我们将使用 `put(String,String)` 方法向 JSON 文档添加键/值对。\n\n\
  2.  使用 `put(java.lang.String name, java.lang.String value)` 方法为字段 `journal`、`publisher`、`edition`、`title`\
  \ 和 `author` 创建一个包含其字符串值的 JSON 文档的 `JsonObject` 实例。首先，调用 `empty()` 方法返回一个空的 `JsonObject`\
  \ 实例，然后调用 `put(java.lang.String name, java.lang.String value)` 方法添加字段/值对。\n    ```java\n\
  \    JsonObject catalogObj = JsonObject.empty()\n                .put(\"journal\"\
  , \"Oracle Magazine\")\n                .put(\"publisher\", \"Oracle Publishing\"\
  )\n                .put(\"edition\", \"March April 2013\")\n                .put(\"\
  title\", \"Engineering as a Service\")\n                .put(\"author\", \"David\
  \ A. Kelly\");\n    ```\n\n3.  `Bucket` 类提供了多个重载的 `insert` 和 `upsert` 方法来向存储桶添加文档。使用\
  \ `JsonDocument.create(java.lang.String id, JsonObject content)` 方法创建一个 `JsonDocument`\
  \ 实例。\n\n\n## 创建 Couchbase 文档\n\n1.  使用`insert(D document)`方法向`default`存储桶添加一个`JsonObject`实例。\n\
