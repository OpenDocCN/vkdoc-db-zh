- "# 输出存储在 Cassandra 中的表\n\n要在 Cassandra-CLI 中输出存储在 Cassandra 中的表，请运行以下命令。\n\n```sql\n\
  assume catalog keys as utf8;\nassume catalog validator as utf8;\nassume catalog\
  \ comparator as utf8;\nGET catalog[utf8('catalog1')];\nGET catalog[utf8('catalog2')];\n\
  ```\n\n存储在 `catalog` 表中的两行数据将被列出，如 图 6-15 所示。\n\n![9781484215999_Fig06-15.jpg](img/image00605.jpeg)\n\
  \n图 6-15. 列出 Catalog 表行\n\n接下来，我们将把 Cassandra 数据迁移到 MongoDB 服务器。\n\n### 将 Cassandra\
  \ 表迁移到 MongoDB\n\n在本节中，我们将获取存储在 Cassandra 数据库中的数据，并将其迁移到 MongoDB 服务器。我们将使用 `MigrateCassandraToMongoDB`\
  \ 类将数据从 Cassandra 数据库迁移到 MongoDB 服务器。\n\n1.  向 `MigrateCassandraToMongoDB` 类添加一个名为\
  \ `migrate()` 的方法，并从 `main` 方法中调用该方法。\n\n2.  按照上一节在 `main` 方法中的说明，从 `MigrateCassandraToMongoDB`\
  \ 类连接到 Cassandra 服务器。\n\n    ```java\n    cluster = Cluster.builder().addContactPoint(\"\
  127.0.0.1\").build();\n    session = cluster.connect();\n    ```\n\n    创建一个 `Session`\
  \ 对象来表示与 Cassandra 服务器的连接。我们将使用 `Session` 对象在 Cassandra 上运行 `SELECT` 语句以选择要迁移的数据。\n\
  \n3.  在 `migrate()` 方法中运行如下 `SELECT` 语句，从 `datastax` 键空间的 `catalog` 表中选择所有行。\n\n\
  \    ```java\n    ResultSet results = session.execute(\"select * from datastax.catalog\"\
  );\n    ```\n\n4.  查询的结果集用 `ResultSet` 类表示。`ResultSet` 中的一行用 `Row` 类表示。遍历 `ResultSet`\
  \ 以将每一行作为 `Row` 对象取出。\n\n    ```java\n    for (Row row : results) {\n    }\n   \
  \ ```\n\n    在我们迁移从 Cassandra 获取的数据行之前，先为 MongoDB 创建一个 Java 客户端，因为我们需要连接到 MongoDB\
  \ 并将获取的数据添加到 MongoDB。\n\n5.  `MongoClient` 类表示 MongoDB 的客户端并提供内部连接池。我们将使用 `MongoClient(List<ServerAddress>\
  \ seeds)` 构造函数，其中 `ServerAddress` 实例的主机为 localhost，服务器运行的端口为 27017。在 `migrate()`\
  \ 方法中创建一个 `MongoClient` 实例。\n\n    ```java\n    MongoClient mongoClient = new MongoClient(Arrays.asList(new\
  \ ServerAddress(\n    \"localhost\", 27017)));\n    ```\n\n6.  数据库实例由 `com.mongodb.client.MongoDatabase`\
  \ 类表示。为 `local` 数据库创建一个数据库对象。\n\n    ```java\n    MongoDatabase db = mongoClient.getDatabase(\"\
  local\");\n    ```\n\n7.  MongoDB 数据库集合由 `com.mongodb.client.MongoCollection` 类表示。接下来，使用\
  \ `MongoDatabase` 对象的 `getCollection(String collectionName)` 方法创建一个 MongoDB 集合实例。创建一个名为\
  \ `catalog` 的集合。\n\n    ```java\n    MongoCollection<Document> coll = db.getCollection(\"\
  catalog\");\n    ```\n\n8.  当按名称引用集合而无需首先创建集合时，MongoDB 集合会隐式创建。接下来，我们将使用 `for` 循环遍历结果集中的行，将从\
  \ Cassandra 获得的结果集迁移到 MongoDB。\n\n    ```java\n    for (Row row : results) {\n \
  \   }\n    ```\n\n9.  `ColumnDefinitions` 类表示描述 `ResultSet` 中包含的列的元数据。使用 `Row` 的\
  \ `getColumnDefinitions()` 方法获取由 `ColumnDefinitions` 对象表示的列定义。使用 `iterator()` 方法在\
  \ `ColumnDefinitions` 对象上创建一个 `Iterator`，其中每个列定义由 `ColumnDefinitions.Definition`\
  \ 表示。\n\n    ```java\n    ColumnDefinitions columnDefinitions = row.getColumnDefinitions();\n\
  \    Iterator<ColumnDefinitions.Definition> iter = columnDefinitions.iterator();\n\
  \    ```\n\n10. 使用 `while` 循环和 `Iterator` 的 `hasNext` 方法遍历列，并使用 `ColumnDefinitions.Definition`\
  \ 中的 `getName` 方法获取列名。\n\n    ```java\n    while (iter.hasNext()) {\n        ColumnDefinitions.Definition\
  \ column = iter.next();\n        String columnName = column.getName();\n    }\n\
  \    ```\n\n11. 在 `while` 循环中，使用 `Row` 中的 `getString(String columnName)` 方法获取每列对应的值。\n\
  \n    ```java\n    String columnValue = row.getString(columnName);\n    ```\n\n\
  \    `org.bson.Document` 类将 MongoDB 文档表示为 `Map`；可以存储在 Mongo 数据库中的键/值映射。`org.bson.Document`\
  \ 实现了 `org.bson.conversions.Bson` 接口，并表示存储在 MongoDB 服务器中的基本 BSON 对象。\n\n12. 接下来，我们将向\
  \ Mongo 数据库添加一个 BSON 文档。在 `for` 循环中，使用类构造函数创建一个 `org.bson.Document` 实例。\n\n    ```java\n\
  \    Document catalog = new Document();\n    ```\n\n13. 一旦 `org.bson.\n\n\n\n##\
  \ 使用 Java 将 Cassandra 表迁移到 MongoDB\n\n### 步骤\n14. 使用`org.bson.Document`类的`append(String\
  \ key, Object value)`方法为`Document`添加键值对。利用从 Cassandra 结果集中获取的列名/值对，通过`append`方法创建一个完整的\
  \ BSON 文档。\n    ```\n    catalog = catalog.append(columnName, columnValue);\n  \
  \  ```\n\n15. 如第 1 章所述，`MongoCollection`类提供了`insertOne(TDocument document)`方法来添加单个文档。使用`insertOne(TDocument\
  \ document)`方法保存`Document`实例。\n    ```\n    coll.insertOne(catalog);\n    ```\n\n\
  16. 接下来，输出添加到 MongoDB 集合中的文档，这也验证了文档确实已添加。可以使用`MongoCollection`中的`find()`方法获取集合中的所有文档。`find()`方法返回一个`FindIterable`对象作为结果。\n\
  \    ```\n    FindIterable<Document> iterable = coll.find();\n    ```\n\n17. 如第\
  \ 1 章所述，输出存储在`FindIterable`对象中每个文档的键值对。使用增强的`for`循环获取`FindIterable`中的`Document`实例。使用`keySet()`方法获取每个`Document`实例关联的键集合，该方法返回一个`Set<String>`对象。使用`iterator()`方法从`Set`对象创建一个`Iterator<String>`对象。使用`while`循环遍历键集，并输出每个`Document`的文档键及其关联的`Document`对象。\n\
  \    ```\n    FindIterable<Document> iterable = coll.find();\n    String documentKey\
  \ = null;\n    for (Document document : iterable) {\n        Set<String> keySet\
  \ = document.keySet();\n        Iterator<String> iter = keySet.iterator();\n   \
  \     while (iter.hasNext()) {\n            documentKey = iter.next();\n       \
  \     System.out.println(documentKey);\n            System.out.println(document.get(documentKey));\n\
  \        }\n    }\n    ```\n\n18. 使用`close()`方法关闭`MongoClient`对象。\n    ```\n   \
  \ mongoClient.close();\n    ```\n\n19. 同时关闭 Cassandra 的会话和集群。\n    ```\n    session.close();\n\
  \    cluster.close();\n    ```\n\n`MigrateCassandraToMongoDB`类如下所示：\n```\npackage\
  \ mongodb;\nimport java.util.Arrays;\nimport java.util.Iterator;\nimport java.util.Set;\n\
  import org.bson.Document;\nimport com.datastax.driver.core.Cluster;\nimport com.datastax.driver.core.ColumnDefinitions;\n\
  import com.datastax.driver.core.ResultSet;\nimport com.datastax.driver.core.Row;\n\
  import com.datastax.driver.core.Session;\nimport com.mongodb.MongoClient;\nimport\
  \ com.mongodb.ServerAddress;\nimport com.mongodb.client.FindIterable;\nimport com.mongodb.client.MongoCollection;\n\
  import com.mongodb.client.MongoDatabase;\n\npublic class MigrateCassandraToMongoDB\
  \ {\n    private static Cluster cluster;\n    private static Session session;\n\
  \    private static MongoClient mongoClient;\n    public static void main(String[]\
