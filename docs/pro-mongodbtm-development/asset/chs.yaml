  \ 和 `j`。 |\n| `callback` | `writeOpCallback(error, result)` | 回调函数。 |\n\n1.  在 `C:\\\
  Program Files\\nodejs\\scripts` 目录下创建一个脚本 `removeDocuments.js`。\n2.  使用 `insertMany()`\
  \ 方法将一组文档添加到集合中。\n3.  使用选择器查询调用 `deleteMany()` 方法，以选择所有 `journal` 为 '`Oracle Magazine`'\
  \ 的文档，并将回调函数结果输出到控制台。\n\n```\ncollection.deleteMany({journal:'Oracle Magazine'},function(error,\
  \ result) {\n    if (error) console.log(error);\n    else\n        console.log(result);\n\
  });\n```\n\n`removeDocuments.js` 脚本如下：\n\n```\nServer = require('mongodb').Server;\n\
  Db = require('mongodb').Db;\nCollection = require('mongodb').Collection;\nvar db\
  \ = new Db('local', new Server('localhost', 27017));\ndb.open(function(error, db)\
  \ {\n    if (error)\n        console.log(error);\n    else {\n        db.createCollection('catalog',\
