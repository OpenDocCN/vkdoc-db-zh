  \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013'};\n\
  \        doc2 = {\"catalogId\": 2, \"journal\": 'Oracle Magazine', \"publisher\"\
  : 'Oracle Publishing', \"edition\": 'November December 2013'};\n        collection.insertMany([doc1,\
