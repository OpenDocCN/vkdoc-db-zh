  \ 5-38 所示。\n\n![9781484215999_Fig05-38.jpg](img/image00587.jpeg)\n\n图 5-38. `removeDocuments.js`\
  \ 的输出\n\n5.  在 Mongo shell 中运行 `db.catalog.find()` 方法以列出文档。由于添加的两个文档中有一个已被删除，因此没有列出任何文档，如图\
  \ 5-39 所示。\n\n![9781484215999_Fig05-39.jpg](img/image00588.jpeg)\n\n图 5-39. 删除所有文档后的文档列表\n\
  \n### 执行批量写入操作\n\n`Collection` 类提供了 `bulkWrite(operations, options, callback)` 方法来执行批量写入操作。该方法的参数在表\
  \ 5-28 中讨论。\n\n表 5-28. `bulkWrite()` 方法的参数\n\n| 参数 | 类型 | 描述 |\n| --- | --- | ---\
  \ |\n| `operations` | Array.<object> | 要执行的批量操作。支持的操作有 `insertOne`、`updateOne`、`updateMany`、`deleteOne`、`deleteMany`\
  \ 和 `replaceOne`。 |\n| `options` | object | 方法选项。支持的选项有 `w`、`wtimeout`、`j`、`serializeFunctions`\
  \ 和 `ordered`。`serializeFunctions` 默认为 `false`。`ordered` 默认为 `true`，表示写入操作将按指定的顺序执行。\
  \ |\n| `callback` | `bulkWriteOpCallback` | 回调函数。 |\n\n1.  在 `C:\\Program Files\\\
  nodejs\\scripts` 目录中创建一个 `bulkWriteDocuments.js` 脚本。\n2.  在 local 数据库中删除 `catalog`\
  \ 集合。\n\n```\n>use local\n>db.catalog.drop()\n```\n\n3.  在脚本中创建 `catalog` 集合，并使用\
  \ `bulkWrite(operations, options, callback)` 方法执行批量写入操作，以添加一些文档、更新单个文档、更新多个文档、替换一个文档以及删除一个文档。将\
  \ `ordered` 选项设置为 `true`（这也是默认值），以便批量写入操作按指定的顺序执行。如果某个批量写入操作依赖于前一个操作，那么顺序可能很重要。例如，集合中的文档必须在添加后才能更新。\n\
  \n```\ncollection.bulkWrite([\n    { insertOne: { document: {\"catalogId\": 'catalog1',\
  \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
  : 'November December 2013', \"title\": 'Engineering as a Service', \"author\": 'David\
  \ A. Kelly'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog2', \"journal\"\
  : 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November\
  \ December 2013', \"title\": 'Quintessential and Collaborative', \"author\": 'Tom\
  \ Haunert'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog3', \"journal\"\
  : 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November\
  \ December 2013'} } },\n    { insertOne: { document: {\"catalogId\": 'catalog4',\
  \ \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\"\
  : 'November December 2013'} } },\n    { updateOne: { filter: {journal: 'Oracle Magazine'},\
  \ update: {$set: {journal: 'OracleMagazine'}}, upsert: true } },\n    { updateMany:\
  \ { filter: {edition: 'November December 2013'}, update: {$set: {edition: '11-12-2013'}},\
  \ upsert: true } },\n    { deleteOne: { filter: {journal: 'Oracle Magazine'} } },\n\
  \    { replaceOne: { filter: {catalogId: 'catalog5'}, replacement: {\"catalogId\"\
  : 'catalog5', \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing',\
  \ \"edition\": 'November December 2013'}, upsert: true }}\n], {ordered: true, w:\
  \ 1}, function(error, result) {\n    if (error)\n        console.log(error);\n \
  \   else {\n        console.log(\"Documents added: \" + result);\n    }\n});\n```\n\
  \n类似地，可以添加一个 `{ deleteMany: { filter: {journal:'Oracle Magazine'} } }` 批量写入操作，以根据选择查询删除所有文档。示例脚本中没有包含\
  \ `deleteMany()` 操作，这是为了展示其他批量写入操作的效果，因为如果包含了 `deleteMany()`，所有或大部分文档都会被删除。`bulkWriteDocuments.js`\
  \ 脚本如下：\n\n```\nServer = require('mongodb').Server;\nDb = require('mongodb').Db;\n\
  Collection = require('mongodb').Collection;\nvar db = new Db('local', new Server('localhost',\
  \ 27017));\ndb.\n```\n\n\n\n"
- "# 第六章 将 Apache Cassandra 表迁移到 MongoDB\n\n虽然 MongoDB 是最常用的基于文档的 NoSQL 存储，但 Apache\
  \ Cassandra 是最常用的基于宽列的 NoSQL 存储。MongoDB 和 Apache Cassandra 使用的数据模型不同。MongoDB 基于\
  \ JSON（BSON）数据模型，而 Cassandra 基于列/行（表）数据模型。两者都提供了无模式、灵活的存储模型。在本章中，我们将讨论将 Apache Cassandra\
  \ 文档迁移到 MongoDB。本章包括以下主题：\n\n*   设置环境\n*   在 Eclipse 中创建 Maven 项目\n*   在 Apache\
  \ Cassandra 中创建文档\n*   将 Cassandra 表迁移到 MongoDB\n\n## 设置环境\n\n我们需要为本章安装以下软件：\n\n\
  *   Apache Cassandra 2.2.0：从 `http://cassandra.apache.org/download/` 获取 `apache-cassandra-2.2.0-bin.tar.gz`。将\
  \ `tar.gz` 文件解压到一个目录，并将 `bin` 目录（例如 `C:\\apache-cassandra-2.2.0\\bin`）添加到 `PATH`\
  \ 环境变量中。\n*   MongoDB 3.0.5：从 `www.mongodb.org/downloads` 获取。\n*   Eclipse IDE for\
  \ Java EE Developers：从 `www.eclipse.org/downloads/` 获取。\n*   Java 7：从 `www.oracle.com/technetwork/java/javase/downloads/jdk7-downloads-1880260.html`\
  \ 获取。\n\n双击 MongoDB 二进制发行版以安装 MongoDB。将 MongoDB 安装的 `bin` 目录（`C:\\Program Files\\\
  MongoDB\\Server\\3.0\\bin`）添加到 `PATH` 环境变量中。如果尚未为前面的章节创建，请创建目录 `C:\\data\\db` 用于存放\
  \ MongoDB 数据。\n\n使用以下命令启动 Apache Cassandra 服务器。\n```\n>cassandra –f\n```\n服务器启动，如\
  \ 图 6-1 的服务器输出所示。如果 thrift 服务未启动，请运行命令 `nodetool enablethrift`。Cassandra 服务器正在 `localhost`\
  \ 端口 9160 上监听客户端连接。\n\n![9781484215999_Fig06-01.jpg](img/image00591.jpeg)\n图 6-1.\
  \ 启动 Apache Cassandra\n\n使用以下命令启动 MongoDB 服务器。\n```\n>mongod\n```\nMongoDB 服务器启动，如\
  \ 图 6-2 所示。MongoDB 正在 `localhost` 端口 27017 上等待连接。\n\n![9781484215999_Fig06-02.jpg](img/image00592.jpeg)\n\
  图 6-2. 启动 MongoDB 服务器\n\n### 在 Eclipse 中创建 Maven 项目\n\n接下来，在 Eclipse IDE 中创建一个 Java\
  \ 项目，用于将 Cassandra 数据库数据迁移到 MongoDB 数据库。\n\n1.  选择 File ![image](img/image00406.jpeg)\
  \ New ![image](img/image00406.jpeg) Other。\n2.  在 New 窗口中，选择 Maven ![image](img/image00406.jpeg)\
  \ Maven Project 并点击 Next，如 图 6-3 所示。\n\n![9781484215999_Fig06-03.jpg](img/image00593.jpeg)\n\
  图 6-3. 选择 Maven ![image](img/image00406.jpeg) Maven Project\n\n3.  New Maven Project\
  \ 向导启动。选择 Create a simple project 复选框和 Use default Workspace location 复选框，然后点击 Next，如\
  \ 图 6-4 所示。\n\n![9781484215999_Fig06-04.jpg](img/image00594.jpeg)\n图 6-4. New Maven\
  \ Project 向导\n\n4.  在 Configure project 中，指定以下内容，然后点击 Finish，如 图 6-5 所示。\n    *\
  \   Group Id: `com.mongodb.migration`\n    *   Artifact Id: `CassandraToMongoDB`\n\
  \    *   Version: `1.0.0`\n    *   Packaging: `jar`\n    *   Name: `CassandraToMongoDB`\n\
  \n![9781484215999_Fig06-05.jpg](img/image00595.jpeg)\n图 6-5. 配置 Maven 项目\n\n在 Eclipse\
  \ IDE 中创建了一个 Maven 项目，如 图 6-6 所示。\n\n![9781484215999_Fig06-06.jpg](img/image00596.jpeg)\n\
  图 6-6. Package Explorer 中的 Maven 项目 CassandraToMongoDB\n\n现在，我们需要为迁移创建两个 Java 类：一个用于在\
  \ Cassandra 中创建初始数据，另一个用于将数据迁移到 MongoDB。\n\n1.  要创建 Java 类，点击 File ![image](img/image00406.jpeg)\
  \ New ![image](img/image00406.jpeg) Other。\n2.  在 New 窗口中，选择 Java ![image](img/image00406.jpeg)\
  \ Class 并点击 Next，如 图 6-7 所示。\n\n![9781484215999_Fig06-07.jpg](img/image00597.jpeg)\n\
  图 6-7. 选择 Java ![image](img/image00406.jpeg) Java Class\n\n3.  在 New Java Class\
  \ 向导中，选择 Source folder 为 `CassandraToMongoDB/src/main/java`，指定 Package 为 `mongodb`，类名为\
  \ `CreateCassandraDatabase`。\n\n```javascript\nopen(function(error, db) {\n    if\
  \ (error)\n        console.log(error);\n    else {\n        db.createCollection('catalog',\
  \ function(error, collection) {\n            if (error)\n                console.log(error);\n\
  \            else {\n                collection.bulkWrite([\n                  \
  \  { insertOne: { document: { \"catalogId\": 'catalog1', \"journal\": 'Oracle Magazine',\
  \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013', \"\
  title\": 'Engineering as a Service', \"author\": 'David A. Kelly' } } },\n     \
  \               { insertOne: { document: { \"catalogId\": 'catalog2', \"journal\"\
  : 'Oracle Magazine', \"publisher\": 'Oracle Publishing', \"edition\": 'November\
  \ December 2013', \"title\": 'Quintessential and Collaborative', \"author\": 'Tom\
  \ Haunert' } } },\n                    { insertOne: { document: { \"catalogId\"\
  : 'catalog3', \"journal\": 'Oracle Magazine', \"publisher\": 'Oracle Publishing',\
  \ \"edition\": 'November December 2013' } } },\n                    { insertOne:\
  \ { document: { \"catalogId\": 'catalog4', \"journal\": 'Oracle Magazine', \"publisher\"\
  : 'Oracle Publishing', \"edition\": 'November December 2013' } } },\n          \
  \          { updateOne: { filter: { journal: 'Oracle Magazine' }, update: { $set:\
  \ { journal: 'OracleMagazine' } }, upsert: true } },\n                    { updateMany:\
  \ { filter: { edition: 'November December 2013' }, update: { $set: { edition: '11-12-2013'\
  \ } }, upsert: true } },\n                    { deleteOne: { filter: { journal:\
  \ 'Oracle Magazine' } } },\n                    { replaceOne: { filter: { catalogId:\
  \ 'catalog5' }, replacement: { \"catalogId\": 'catalog5', \"journal\": 'Oracle Magazine',\
  \ \"publisher\": 'Oracle Publishing', \"edition\": 'November December 2013' }, upsert:\
  \ true } }\n                ], { ordered: true, w: 1 }, function(error, result)\
  \ {\n                    if (error)\n                        console.log(error);\n\
  \                    else {\n                        console.log(\"Documents added:\
  \ \" + result);\n                    }\n                });\n            }\n   \
  \     });\n    }\n});\n```\n\n4.  使用命令 `node bulkWriteDocuments.js` 运行脚本。输出如 图 5-40\
  \ 所示。\n\n![9781484215999_Fig05-40.jpg](img/image00589.jpeg)\n图 5-40. 运行 bulkWriteDocuments.js\
  \ 脚本\n\n5.  随后在 Mongo shell 中运行 `db.catalog.find()` 命令以列出文档，如 图 5-41 所示。\n\n![9781484215999_Fig05-41.jpg](img/image00590.jpeg)\n\
  图 5-41. 列出文档\n\n如输出所示，只列出了四个文档，因为最初添加了四个，删除了一个，随后更新（upsert）了一个文档。其中一个文档的 `journal`\
  \ 字段被设置为 `OracleMagazine`，因为使用了 `updateOne` 来更新一个文档的 `journal` 字段。`catalog5` `catalogId`\
  \ 文档是使用 `replaceOne` 更新（upsert）的文档。\n\n## 总结\n\n在本章中，我们使用 MongoDB 的 Node.js 驱动程序连接到\
  \ MongoDB 服务器并执行 CRUD（创建、读取、更新和删除）操作。我们演示了单文档和多文档的 CRUD 操作。在下一章中，我们将把文档从 Apache\
  \ Cassandra 迁移到 MongoDB。\n\n\n\n勾选复选框以创建方法存根 `public static void main(String[] args)`。如\
  \ 图 6-8 所示，点击 Finish（完成）。\n\n![9781484215999_Fig06-08.jpg](img/image00598.jpeg)\n\
  图 6-8. 配置 Java 类 `CreateCassandraDatabase`\n\n4.  类似地，创建一个 Java 类 `MigrateCassandraToMongoDB`，如\
  \ 图 6-9 所示。\n\n![9781484215999_Fig06-09.jpg](img/image00599.jpeg)\n图 6-9. 配置 Java\
  \ 类 `MigrateCassandraToMongoDB`\n\n这两个 Java 类在 Package Explorer 中的显示如 图 6-10 所示。\n\
  \n![9781484215999_Fig06-10.jpg](img/image00600.jpeg)\n图 6-10. Package Explorer 中的\
  \ Java 类\n\n## 添加依赖项\n\n我们需要在 `pom.xml` 中添加一些依赖项。按照 表 6-1 所列添加以下依赖项；其中一些依赖项已注明随\
  \ Apache Cassandra Project 依赖项一同包含，不应单独添加。\n\n表 6-1. 依赖项\n\n| JAR 包 | 描述 |\n| ---\
  \ | --- |\n| Mongo Java Driver 3.0.3 | 连接 MongoDB 服务器的 Java 客户端。 |\n| Apache Cassandra\
  \ 2.2.0 | Apache Cassandra 项目。 |\n| Cassandra Driver Core 2.2.0-rc2 | Datastax Java\
  \ 驱动程序。 |\n| Apache Commons BeanUtils 1.9.2 | 用于基于 JavaBeans 模式开发的 Java 类的实用工具 JAR\
  \ 包。 |\n| Apache Commons Collections 3.2.1 | 提供加速 Java 应用程序开发的数据结构。 |\n| Apache\
  \ Commons Lang 3 3.1 | 提供用于操作 Java 核心类的额外类。随 Apache Cassandra 项目依赖项一同包含。 |\n| Apache\
  \ Commons Logging 1.2 | 通用日志记录实现的接口。 |\n| Guava 16.0.1 | Google 的核心库，用于基于 Java 的项目。随\
  \ Apache Cassandra 依赖项一同包含。 |\n| Jackson Core ASL 1.9.2 | 高性能 JSON 处理器。随 Apache\
  \ Cassandra 项目依赖项一同包含。 |\n| Jackson Mapper ASL 1.9.2 | 构建于 Jackson JSON 处理器之上的高性能数据绑定包。随\
  \ Apache Cassandra 项目依赖项一同包含。 |\n| Metrics Core 3.1.0 | Metrics 的核心库。随 Apache Cassandra\
  \ 项目依赖项一同包含。 |\n| Netty 4.0.27 | 用于开发网络应用程序（如协议服务器和客户端）的 NIO 客户端服务器框架。随 Apache Cassandra\
  \ 项目依赖项一同包含。 |\n| Slf4j API 1.7.7 | Java 的简单日志门面，充当各种日志框架的抽象层。随 Apache Cassandra\
  \ 项目依赖项一同包含。 |\n\n`pom.xml` 文件内容如下。\n\n```xml\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\
  \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n    xsi:schemaLocation=\"\
  http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
  >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.mongodb.migration</groupId>\n\
  \    <artifactId>CassandraToMongoDB</artifactId>\n    <version>1.0.0</version>\n\
  \    <name>CassandraToMongoDB</name>\n\n    <dependencies>\n        <dependency>\n\
  \            <groupId>org.mongodb</groupId>\n            <artifactId>mongo-java-driver</artifactId>\n\
  \            <version>3.0.3</version>\n        </dependency>\n\n        <dependency>\n\
  \            <groupId>com.datastax.cassandra</groupId>\n            <artifactId>cassandra-driver-core</artifactId>\n\
  \            <version>2.2.0-rc2</version>\n        </dependency>\n\n        <dependency>\n\
  \            <groupId>org.apache.cassandra</groupId>\n            <artifactId>cassandra-all</artifactId>\n\
  \            <version>2.2.0</version>\n        </dependency>\n\n        <dependency>\n\
  \            <groupId>commons-beanutils</groupId>\n            <artifactId>commons-beanutils</artifactId>\n\
  \            <version>1.9.2</version>\n        </dependency>\n\n        <dependency>\n\
  \            <groupId>commons-collections</groupId>\n            <artifactId>commons-collections</artifactId>\n\
  \            <version>3.2.1</version>\n        </dependency>\n\n        <dependency>\n\
  \            <groupId>commons-logging</groupId>\n            <artifactId>commons-logging</artifactId>\n\
  \            <version>1.2</version>\n        </dependency>\n    </dependencies>\n\
  </project>\n```\n\n其中一些依赖项还有进一步的依赖项，它们会被自动添加，不应单独添加。要查找从依赖项中添加的所需 JAR 包，请在 Package\
  \ Explorer 中右键单击项目节点并选择 Properties（属性）。在 Properties 中选择 Java Build Path（Java 构建路径）。添加到迁移项目的\
  \ JAR 包如 图 6-11 所示。\n\n![9781484215999_Fig06-11.jpg](img/image00601.jpeg)\n图 6-11.\
  \ Java 构建路径中的 JAR 文件\n\n### 在 Apache Cassandra 中创建文档\n\n在本节中，我们将创建要迁移到 MongoDB 的\
  \ Cassandra 表。Cassandra 表可以使用 Cassandra-CLI 或使用带有 Cassandra Java 驱动程序的 Java 应用程序来创建。我们将在\
  \ Java 应用程序 `CreateCassandraDatabase` 中创建一个 Cassandra 表。\n\n在 Java 应用程序中，首先我们需要从应用程序连接到\
  \ Cassandra。我们将使用 Datastax Java 驱动程序连接到 Cassandra。创建一个 `Cluster` 实例，它是 Datastax\
  \ Java 驱动程序的主要入口点。该集群维护与其中一个服务器节点的连接，以保存集群状态和当前拓扑的信息。驱动程序利用节点的自动发现功能来发现集群中的所有节点，包括后来加入的新节点。使用静态方法\
  \ `builder()` 构建一个 `Cluster.Builder` 实例，它是用于构建 `Cluster` 实例的辅助类。\n\n1.  我们需要提供 Cassandra\
  \ 集群中至少一个节点的连接地址，以便 Datastax 驱动程序能够连接到集群并使用自动发现功能发现集群中的其他节点。使用 `Cluster.Builder`\
  \ 的 `addContactPoint(String)` 方法添加在本地主机 (127.0.0.1) 上运行的 Cassandra 服务器的地址。\n2. \
  \ 接下来，调用 `build()` 方法，使用配置的地址构建 `Cluster`。这些方法可以按顺序调用，因为我们不需要中间类 `Cluster.Builder`\
  \ 的实例。\n\n    ```java\n    cluster = Cluster.builder().addContactPoint(\"127.0.0.1\"\
  ).build();\n    ```\n\n3.  接下来，通过调用 `connect()` 方法在集群上创建一个会话。`Session` 实例用于查询集群，由\
  \ `Session` 类表示，它持有到集群的多个连接。`Session` 实例还提供有关使用集群中哪个节点进行查询的策略。默认策略是对集群中的所有节点进行轮询。`Session`\
  \ 还用于处理失败查询的重试。`Session` 实例是线程安全的，如果仅连接到单个键空间，单个实例对应用程序来说就足够了。如果要连接到多个键空间，则需要单独的\
  \ `Session` 实例。\n\n    ```java\n    Session session = cluster.connect();\n    ```\n\
  \nCassandra 服务器必须正在运行，才能在应用程序运行时连接到服务器，我们之前已经启动了 Cassandra 服务器。如果 Cassandra 服务器没有运行，尝试连接时会生成\
  \ `com.datastax.driver.core.exceptions.NoHostAvailableException` 异常。\n\n`Session`\
  \ 类提供了多种方法来准备和执行服务器上的查询，其中一些在 表 6-2 中讨论。\n\n表 6-2.\n\n\n\n"
- '# 会话类方法：运行查询


  | 方法 | 描述 |

  | --- | --- |

  | `execute(Statement statement)` | 执行作为 `Statement` 对象提供的查询，返回一个 `ResultSet`。 |

  | `execute(String query)` | 执行作为字符串提供的查询，返回一个 `ResultSet`。 |

  | `execute(String query, Object... values)` | 执行作为字符串提供的查询，并使用指定的值，返回一个 `ResultSet`。
  |


  '
- "# 创建键空间\n\n我们需要创建一个键空间来存储表。在 `CreateCassandraDatabase` 应用程序中添加一个静态方法 `createKeyspace()`\
  \ 来创建键空间。\n\nCQL 3（Cassandra 查询语言 3）增加了有条件运行 `CREATE` 语句的支持，这意味着只有当要构建的对象尚不存在时才会创建该对象。`IF\
  \ NOT EXISTS` 子句用于条件创建。\n\n创建一个名为 `datastax` 的键空间，使用复制策略类为 `SimpleStrategy`，复制因子为\
  \ 1。\n\n```\nsession.execute(\"CREATE KEYSPACE IF NOT EXISTS datastax WITH replication\
  \ \"\n    + \"= {'class':'SimpleStrategy', 'replication_factor':1};\");\n```\n\n\
  在 `main` 方法中调用 `createKeyspace()` 方法。当应用程序运行时，键空间就会被创建。\n\nCassandra 支持以下策略类，如表\
  \ 6-3 所示，这些类指的是副本放置策略类。\n\n**表 6-3. 策略类**\n\n| 类 | 描述 |\n| --- | --- |\n| `org.apache.cassandra.locator.SimpleStrategy`\
  \ | 仅用于单个数据中心。第一个副本根据分区器的决定放置在一个节点上。随后的副本以顺时针方式放置在节点环中的下一个节点上，不考虑拓扑。仅当使用 `SimpleStrategy`\
  \ 类时才需要复制因子。 |\n| `org.apache.cassandra.locator.NetworkTopologyStrategy` | 用于多个数据中心。指定在每个数据中心存储多少个副本。尝试将副本存储在同一数据中心内的不同机架上，因为同一机架内的节点更有可能一起发生故障。\
  \ |\n\n"
- '# 创建表（列族）


  接下来，我们将创建一个列族，在 CQL 3 中也称为表。向 `CreateCassandraDatabase` 应用程序添加一个静态方法 `createTable()`。


  如前所述，`CREATE TABLE` 命令也支持 `IF NOT EXISTS` 来有条件地创建表。CQL 3 增加了创建复合主键的功能，即由多个组件主键列创建的主键。在复合主键中，第一列称为分区键。


  创建一个名为 `catalog` 的表，包含 `catalog_id`、`journal`、`publisher`、`edition`、`title` 和 `author`
  列。在 `catalog` 表中，复合主键由 `catalog_id` 和 `journal` 列组成，其中 `catalog_id` 是分区键。


  调用 `execute(String)` 方法来创建 `catalog` 表，如下所示。


  ```

  session.execute("CREATE TABLE IF NOT EXISTS datastax.catalog (catalog_id text,journal
  text,publisher text, edition text,title text,author text,PRIMARY KEY (catalog_id,
  journal))");

  ```


  在表名前加上键空间名。在 `main` 方法中调用 `createTable()` 方法。当 `CreateCassandraDatabase` 应用程序运行时，`catalog`
  表将被创建。


  '
- '# 插入数据


  接下来，我们将使用 `INSERT` 语句向 `catalog` 表添加数据。使用 `IF NOT EXISTS` 关键字有条件地添加行。当使用复合主键时，必须指定所有组件主键列，包括复合键列的值。


  向 `CreateCassandraDatabase` 类添加一个方法 `insert()`，并在 `main()` 方法中调用该方法。


  向 `catalog` 表添加两行，行 ID 分别为 `catalog1` 和 `catalog2`。


  例如，两行数据被添加到 `catalog` 表中，如下所示。


  ```

  session.execute("INSERT INTO datastax.catalog (catalog_id, journal, publisher, edition,title,author)
  VALUES (''catalog1'',''Oracle Magazine'', ''Oracle Publishing'', ''November-December
  2013'', ''Engineering as a Service'',''David A.  Kelly'') IF NOT EXISTS");

  session.execute("INSERT INTO datastax.catalog (catalog_id, journal, publisher, edition,title,author)
  VALUES (''catalog2'',''Oracle Magazine'', ''Oracle Publishing'', ''November-December
  2013'', ''Quintessential and Collaborative'',''Tom Haunert'') IF NOT EXISTS");

  ```


  '
- "# 查询数据\n\n为了验证 Cassandra 表是否已创建，接下来我们将运行一个 `SELECT` 语句从 `catalog` 表中选择列。添加一个方法\
  \ `select()` 来运行 `SELECT` 语句。\n\n使用 `*` 选择所有列从 `catalog` 表中查询。运行 `SELECT` 语句作为测试，以确认我们添加的数据确实已被添加。\n\
  \n```\nResultSet results = session.execute(\"select * from datastax.catalog\");\n\
  ```\n\n`ResultSet` 中的一行由 `Row` 类表示。遍历 `ResultSet` 以输出每个列的值。\n\n```\nfor (Row row\
  \ : results) {\n        System.out.println(\"目录 ID: \" + row.getString(\"catalog_id\"\
  ));\n        System.out.println(\"\\n\");\n            System.out.println(\"期刊:\
  \ \" + row.getString(\"journal\"));\n            System.out.println(\"出版商: \" +\
  \ row.getString(\"publisher\"));\n            System.out.println(\"版次: \" + row.getString(\"\
  edition\"));\n            System.out.println(\"标题: \" + row.getString(\"title\"\
  ));\n            System.out.println(\"作者: \" + row.getString(\"author\"));\n   \
  \         System.out.println(\"\\n\");\n            System.out.println(\"\\n\");\n\
  \        }\n```\n\n`CreateCassandraDatabase` 类如下所列。\n\n```\npackage mongodb;\n\n\
  import com.datastax.driver.core.Cluster;\nimport com.datastax.driver.core.ResultSet;\n\
  import com.datastax.driver.core.Row;\nimport com.datastax.driver.core.Session;\n\
  \npublic class CreateCassandraDatabase {\n    private static Cluster cluster;\n\
  \    private static Session session;\n\n    public static void main(String[] argv)\
  \ {\n        cluster = Cluster.builder().addContactPoint(\"127.0.0.1\").build();\n\
  \        session = cluster.connect();\n        createKeyspace();\n        createTable();\n\
  \        insert();\n        select();\n        session.close();\n        cluster.close();\n\
  \    }\n\n    private static void createKeyspace() {\n        session.execute(\"\
  CREATE KEYSPACE IF NOT EXISTS datastax WITH replication \"\n                + \"\
  = {'class':'SimpleStrategy', 'replication_factor':1};\");\n    }\n\n    private\
  \ static void createTable() {\n        session.execute(\"CREATE TABLE IF NOT EXISTS\
  \ datastax.catalog (catalog_id text,journal text,publisher text, edition text,title\
  \ text,author text,PRIMARY KEY (catalog_id, journal))\");\n    }\n\n    private\
  \ static void insert() {\n        session.execute(\"INSERT INTO datastax.catalog\
  \ (catalog_id, journal, publisher, edition,title,author) VALUES ('catalog1','Oracle\
  \ Magazine', 'Oracle Publishing', 'November-December 2013', 'Engineering as a Service','David\
  \ A.  Kelly') IF NOT EXISTS\");\n        session.execute(\"INSERT INTO datastax.catalog\
  \ (catalog_id, journal, publisher, edition,title,author) VALUES ('catalog2','Oracle\
  \ Magazine', 'Oracle Publishing', 'November-December 2013', 'Quintessential and\
  \ Collaborative','Tom Haunert') IF NOT EXISTS\");\n    }\n\n    private static void\
  \ select() {\n        ResultSet results = session.execute(\"select * from datastax.catalog\"\
  );\n        for (Row row : results) {\n            System.out.println(\"目录 ID: \"\
  \ + row.getString(\"catalog_id\"));\n            System.out.println(\"\\n\");\n\
  \            System.out.println(\"期刊: \" + row.getString(\"journal\"));\n      \
  \      System.out.println(\"出版商: \" + row.getString(\"publisher\"));\n         \
  \   System.out.println(\"版次: \" + row.getString(\"edition\"));\n            System.out.println(\"\
  标题: \" + row.getString(\"title\"));\n            System.out.println(\"作者: \" + row.getString(\"\
  author\"));\n            System.out.println(\"\\n\");\n            System.out.println(\"\
  \\n\");\n        }\n    }\n}\n```\n\n\n\n"
