- '# MongoDB 数据库基础操作：Shell 环境、数据库、集合与文档


  ## 本章内容


  *   入门指南

  *   数据库操作

  *   集合操作

  *   文档操作


  ## 入门指南


  在以下小节中，我们将设置环境，包括安装必需的软件。我们将启动 Mongo shell 并连接到 MongoDB 服务器，同时讨论如何在 Mongo shell
  中运行命令。


  ## 环境设置


  如果尚未安装，请从第 1 章下载并安装以下软件：


  *   本章使用适用于 Windows 64 位的 MongoDB (3.0.5)。从`http://www.mongodb.org/downloads`下载二进制发行版。


  双击 MongoDB 二进制发行版以安装 MongoDB。将 MongoDB 安装目录的`bin`目录添加到`PATH`环境变量中。为 MongoDB 数据创建目录`C:\data\db`。在命令窗口中使用以下命令启动
  MongoDB 服务器。


  ```

  >mongod

  ```


  MongoDB 服务器启动，如图 2-1 所示。


  ![9781484215999_Fig02-01.jpg](img/image00425.jpeg)


  图 2-1. 启动 MongoDB


  ## 启动 Mongo Shell


  打开一个新的命令窗口。使用以下命令启动 Mongo shell。


  ```

  >mongo

  ```


  Mongo shell 启动并默认连接到`test`数据库，如图 2-2 所示。默认情况下，Mongo shell 连接到`localhost`上的 MongoDB，端口为
  27017。


  ![9781484215999_Fig02-02.jpg](img/image00426.jpeg)


  图 2-2. 启动 Mongo Shell


  可能会生成类似“Hotifx KB2731284 或后续更新未安装，将清零数据文件”的消息。产生此消息的原因之一是 MongoDB 安装在目录路径包含空格的目录中，例如目录路径`C:\Program
  Files\MongoDB\Server\3.0`。如果消息是由带空格的目录路径引起的，可以忽略此消息。如果原因是未创建`C:\data\db`目录，请创建该目录。


  要启动不连接任何数据库的 Mongo shell，请运行以下命令。在运行此命令前，请打开一个新的命令窗口，因为我们已经使用`mongo`命令连接过一次。


  ```

  >mongo –nodb>

  ```


  随后，可以使用 JavaScript `Mongo()`构造函数打开到 MongoDB 服务器的连接，该函数默认连接到`localhost`的端口 27017。


  ```

  >connection=new Mongo()

  ```


  可以使用 Mongo shell 中的`getDB()`方法设置数据库，如图 2-3 所示。


  ```

  db=connection.getDB("test")

  ```


  ![9781484215999_Fig02-03.jpg](img/image00427.jpeg)


  图 2-3. 初始时不连接数据库启动 Mongo Shell


  上述命令的结果是，Mongo shell 连接到默认主机`localhost`和默认端口 27017 上的 MongoDB 服务器，并使用`test`数据库，这与直接运行`mongo`命令相同。使用`Mongo()`构造函数在连接到非默认主机和端口时很有用。


  或者，可以在 Mongo shell 中使用`connect`方法连接到 MongoDB。使用`–nodb`选项启动 Mongo shell 后，使用以下命令连接到`localhost`和端口
  27017 上的 MongoDB，并将数据库设置为`test`。


  ```

  db = connect("localhost:27017/test");

  ```


  `connect()`方法连接到 MongoDB 的`test`数据库，如图 2-4 所示。


  ![9781484215999_Fig02-04.jpg](img/image00428.jpeg)


  图 2-4. 使用 connect()方法连接到 MongoDB


  ## 在 Mongo Shell 中运行命令或方法


  可以在 Mongo shell 中运行以下类型的命令和方法。


  *   数据库命令

  *   Mongo shell JavaScript 辅助方法

  *   Mongo shell 帮助方法


  JavaScript 辅助方法与帮助方法之间的区别在于 JavaScript 辅助方法使用 JavaScript。数据库命令具有 BSON 文档格式，由键/值对组成，第一个键是命令名称，后续的键/值对是命令选项。例如，用于创建集合的`create`命令具有以下语法。


  ```

  { create: <collection_name>, option1:value, option2:value, option3:value,..optionN:value
  }

  ```


  `create`命令提供以下选项（仅讨论主要选项）。


  *   `capped`。设置为`boolean`值（true 或 false）以指定集合是否为固定集合。默认值为 false。如果设置为 true，则还需要
  size 选项。固定集合是大小固定的集合，当达到最大大小时，较早的文档会被覆盖。

  *   `autoIndexId`。设置为`boolean`值（`true`或`false`）以指定是否在`_id`字段上自动创建索引。默认值为`true`。

  *   `size`。固定集合的最大大小（以字节为单位）。固定集合必需。

  *   `max`。固定集合中的最大文档数。size 设置优先于 max 设置。例如，如果`size`为 3 且`max`为 4，则最大文档数为 3。


  可以使用 Mongo shell 辅助方法`db.runCommand()`运行数据库命令。例如，可以使用 Mongo shell 中的以下辅助/包装 JavaScript
  方法运行`create`命令来创建名为“mongo”的集合。


  ```

  db.runCommand({ create: "mongo" })

  ```


  命令响应是一个 JSON 文档，至少包含`ok`字段，该字段指示命令是否成功，如图 2-5 所示。值为 1 表示命令成功，值为 0 表示命令失败。


  ![9781484215999_Fig02-05.jpg](img/image00429.jpeg)


  图 2-5. 使用 db.runCommand()辅助方法


  `create`命令是那些具有等效 JavaScript shell 辅助方法`db.createCollection()`的命令之一。可以按如下方式创建`mongo`集合。


  ```

  db.createCollection("mongo")

  ```


  前面的命令返回一个 JSON 文档，其`ok`字段设置为 1，表示命令成功，如图 2-6 所示。


  ![9781484215999_Fig02-06.jpg](img/image00430.jpeg)


  图 2-6. 使用 db.createCollection()辅助方法


  如果前面的命令要在`db.runCommand`之后运行以创建`mongo`集合，则必须使用`db.mongo.drop()`命令删除该集合，以避免“集合已存在”错误消息，如图
  2-7 所示。（请参阅本章后面的“删除集合”。）



  '
- '# 使用 MongoDB


  ![9781484215999_Fig02-07.jpg](img/image00431.jpeg)


  图 2-7. “集合已存在”错误消息


  数据库命令的完整参考可在 `http://docs.mongodb.org/v3.0/reference/command/` 获取，Mongo shell 辅助方法的完整参考可在
  `http://docs.mongodb.org/v3.0/reference/method/` 获取。


  JavaScript 方法也可以通过 JavaScript 文件运行。例如，将以下 JavaScript 代码复制到文件 `connection.js` 中，并将该文件放在将从其运行命令的目录
  `C:\MongoDB` 下。


  ```javascript

  connection = new Mongo();

  db = connection.getDB("test");

  printjson(db.getCollectionNames());

  ```


  从命令行运行以下命令来执行该 JavaScript 文件。


  ```bash

  >mongo connection.js

  ```


  JavaScript 代码将被求值并生成输出，对于示例 JavaScript，输出如 图 2-8 所示，是一个集合名称的列表。


  ![9781484215999_Fig02-08.jpg](img/image00432.jpeg)


  图 2-8. 运行 JavaScript 脚本


  Mongo shell 还提供了一些帮助方法来获取有关数据库、集合和文档的信息。部分帮助方法列于下表 表 2-1 中。


  表 2-1. 帮助方法


  | 帮助命令 | 描述 |

  | --- | --- |

  | `show dbs` | 列出服务器上的数据库。 |

  | `use <db>` | 选择一个数据库。在对集合或文档执行任何操作之前，必须先选择数据库。 |

  | `show collections` | 列出数据库中的所有集合。 |


  ## 使用数据库


  在以下小节中，我们将讨论获取有关数据库的信息、创建数据库和删除数据库。


  ## 获取数据库信息


  Mongo shell 有一个名为 `db` 的变量，它引用当前数据库。默认情况下，当使用 `mongo` 命令启动 Mongo shell 时，如前面章节所述，`test`
  数据库成为当前数据库。`show dbs` 命令列出服务器上的所有数据库。`db.stats()` Mongo shell 辅助方法列出当前数据库的统计信息。`listDatabases`
  命令列出所有数据库，包括总大小、每个数据库的大小以及数据库是否为空。一些命令——管理命令，例如 `listDatabases` 命令——必须在 `admin`
  数据库上运行。


  ```bash

  >show dbs

  >db.stats()

  >use admin

  >db.runCommand({listDatabases : 1})

  ```


  前面命令的输出在 Mongo shell 中显示，如 图 2-9 所示。


  ![9781484215999_Fig02-09.jpg](img/image00433.jpeg)


  图 2-9. 获取数据库信息


  ## 创建数据库实例


  当向数据库实例发送命令并执行诸如创建集合之类的操作时，MongoDB 数据库实例会被隐式创建。`use <db>` 命令可用于选择当前数据库，即使该数据库尚不存在，但
  `use <db>` 命令不会创建不存在的数据库。要创建数据库，必须在该数据库上运行一个操作。例如，使用 `show dbs` 命令列出所有数据库。随后，使用
  `use mongodb` 命令将当前数据库选择为一个不存在的数据库 `mongodb`。接着，使用 `db.createCollection(name, options)`
  辅助方法创建一个名为 `catalog` 的集合。


  ```bash

  >show dbs

  >use mongodb

  >show dbs

  >db.createCollection("catalog")

  >show dbs

  ```


  如果在 `use mongodb` 命令之后运行 `show dbs` 命令，则 `mongodb` 数据库不会被列出；但如果在 `db.createCollection()`
  命令之后运行 `show dbs` 命令，则 `mongodb` 数据库会被列出，如 图 2-10 所示。


  ![9781484215999_Fig02-10.jpg](img/image00434.jpeg)


  图 2-10. 创建数据库实例


  `db.copyDatabase(fromdb, todb, fromhost, username, password, mechanism)` 命令可用于将一个数据库复制到另一个数据库。目标数据库会被创建。例如，将数据库
  `local` 复制到一个名为 `catalog` 的新数据库。


  ```javascript

  db.copyDatabase(''local'', ''catalog'')

  ```


  如果在 `db.copyDatabase()` 命令之前和之后运行 `show dbs` 命令，之后运行的命令会列出 `catalog` 数据库，如 图 2-11
  所示。


  ![9781484215999_Fig02-11.jpg](img/image00435.jpeg)


  图 2-11. 复制数据库实例


  ## 删除数据库


  要删除当前数据库，请使用 `db.dropDatabase()` 方法。当前数据库是用 `use <db>` 命令设置的数据库。即使删除了数据库，当前数据库名称也不会改变，并且如果创建了一个新集合，它将在使用新数据文件的、与被删除数据库同名的数据库中创建。例如，使用
  `show dbs` 命令列出所有数据库。随后，将当前数据库设置为列出的数据库之一，例如数据库 `catalog`。选择用于删除的数据库可以不同，不一定名为 `catalog`。接着，调用
  `db.dropDatabase()` 方法删除当前数据库，即数据库 `mongo`。如果随后调用 `show dbs` 命令，则不会列出 `catalog`
  数据库。


  ```bash

  >show dbs

  >use catalog

  >db.dropDatabase()

  >show dbs

  ```


  `db.dropDatabase()` 方法返回一个包含字段 "dropped" 和 "ok" 的文档。"dropped" 字段的值是被删除的数据库，"ok"
  字段值为 1 表示方法无错误返回，如 图 2-12 所示。


  ![9781484215999_Fig02-12.jpg](img/image00436.jpeg)


  图 2-12. 删除数据库


  要退出 Mongo shell，请运行 `quit()` 命令或 `exit` 命令。


  ```bash

  >quit()

  ```


  Mongo shell 会话结束，如 图 2-13 所示。


  ![9781484215999_Fig02-13.jpg](img/image00437.jpeg)


  图 2-13. 结束 Mongo Shell 会话


  ## 使用集合


  在以下小节中，我们将在 Mongo shell 中创建一个集合，随后删除一个集合。


  ### 创建集合


  `create` 命令用于创建集合。我们之前已经讨论了使用 `create` 命令创建集合（参见“在 mongo Shell 中运行命令或方法”）。`show
  collections` 命令可用于列出数据库中的集合。


  ```bash

  >use test

  >show collections

  ```


  数据库中的集合被列出，如 图 2-14 所示。


  ![9781484215999_Fig02-14.jpg](img/image00438.jpeg)


  图 2-14. 使用 show collections 列出集合


  列出的集合可能因用户而异，但无论用户是谁，都应列出 `system.indexes` 集合。一个集合只有在被创建之后才会被列出。例如，在 test 数据库中，先列出集合，然后运行
  `db.createCollection()` 方法创建一个名为 `catalog` 的集合，之后再次列出集合。如果 `catalog` 集合已经存在，请使用
  `db.catalog.drop()` 删除它。


  ```bash

  >use test

  >db.catalog.drop()

  >show collections

  >db.createCollection("catalog")

  >show collections

  ```


  在 `db.createCollection()` 方法之后运行的 `show collections` 命令会列出 `catalog` 集合，如 图 2-15
  所示。列出的其他集合可能因用户而异。


  ![9781484215999_Fig02-15.jpg](img/image00439.jpeg)


  图 2-15. 创建集合后运行 show collections


