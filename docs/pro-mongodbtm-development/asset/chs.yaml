  \ |info| puts info.inspect }\n    ```\n\n\n## 使用文档\n\n在以下小节中，我们将向 MongoDB 服务器添加一个文档、添加一批文档、查找单个文档、查找多个文档、更新文档、删除文档以及执行批量操作。\n\
  \n### 添加文档\n\n在本节中，我们将向一个 MongoDB 集合添加单个文档。使用 `Collection` 类中的 `insert_one(document,\
  \ options = {})` 方法来添加文档。`document` 参数是要添加的文档。`options` 参数是一个定制选项的哈希表，默认值为 `{}`。\n\
  \n1.  创建一个 Ruby 脚本 `addDocument.rb`，并为 `mongo` gem 和 `Mongo` 命名空间分别添加 `require`\
  \ 和 `include` 语句。\n2.  创建一个连接，将数据库设置为 `local` 并获取 `mongodb` 集合。\n    ```ruby\n \
  \   client =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\n    client=client.use(:local)\n\
  \    db=client.database\n    collection=db.collection(\"mongodb\")\n    ```\n3.\
  \  如果 `mongodb` 集合尚不存在，则必须调用 `create()` 方法。\n    ```ruby\n    collection.create\n\
  \    ```\n4.  创建要添加的文档 JSON。\n    ```ruby\n    document1={\n      \"_id\" => \"\
  document1a\",\n      \"catalogId\" => \"catalog1\",\n      \"journal\" => \"Oracle\
  \ Magazine\",\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\"\
  \ =>  \"November December 2013\",\n      \"title\" => \"Engineering as a Service\"\
  ,\n      \"author\" =>  \"David A. Kelly\"\n    }\n    ```\n5.  调用 `insert_one()`\
  \ 方法将文档添加到 `mongodb` 集合中。\n    ```ruby\n    collection.insert_one(document1)\n \
  \   ```\n6.  同样添加另一个文档。\n    ```ruby\n    document2={\n      \"_id\" => \"document1a\"\
  ,\n      \"catalogId\" => \"catalog2\",\n      \"journal\" => \"Oracle Magazine\"\
  ,\n      \"publisher\" => \"Oracle Publishing\",\n      \"edition\" =>  \"November\
  \ December 2013\",\n      \"title\" => \"Quintessential and Collaborative\",\n \
  \     \"author\" =>  \"Tom Haunert\"\n    }\n    collection.insert_one(document2)\n\
  \    ```\n\n`addDocument.rb` 脚本如下所示：\n```ruby\nrequire 'mongo'\ninclude Mongo\n\
  client =Mongo::Client.new([ '127.0.0.1:27017' ], :database => 'test')\nclient=client.use(:local)\n\
  db=client.database\ncollection=db.collection(\"mongodb\")\n\ncollection.create\n\
  \ndocument1={\n  \"_id\" => \"document1a\",\n  \"catalogId\" => \"catalog1\",\n\
  \  \"journal\" => \"Oracle Magazine\",\n  \"publisher\" => \"Oracle Publishing\"\
  ,\n  \"edition\" =>  \"November December 2013\",\n  \"title\" => \"Engineering as\
  \ a Service\",\n  \"author\" =>  \"David A. Kelly\"\n}\n\ncollection.insert_one(document1)\n\
  \ndocument2={\n  \"catalogId\" => \"catalog2\",\n  \"journal\" => \"Oracle Magazine\"\
  ,\n  \"publisher\" => \"Oracle Publishing\",\n  \"edition\" =>  \"November December\
  \ 2013\",\n  \"title\" => \"Quintessential and Collaborative\",\n  \"author\" =>\
  \  \"Tom Haunert\"\n}\ncollection.insert_one(document2)\n```\n\n7.  使用以下命令运行 `addDocument.rb`\
  \ 脚本。\n    ```bash\n    >ruby addDocument.rb\n    ```\n\n`addDocument.rb` 脚本的输出如\
