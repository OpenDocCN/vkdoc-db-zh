- "# CHAPTER 7\n\n![image](img/image00404.jpeg)\n\n## 将 Couchbase 迁移到 MongoDB\n\n\
  MongoDB 和 Couchbase 都是以文档为中心的 NoSQL 数据库。两者都基于相同的数据存储模型，即 JSON，但有一个细微差别：MongoDB 基于\
  \ BSON（二进制 JSON）数据模型，这提供了更广泛的数据类型选择。Couchbase 中的 JSON 支持相对不够成熟。MongoDB 将文档存储在集合中，这使得处理文档更加容易。Mongo\
  \ 对在 Mongo shell 中运行以对文档执行 CRUD 操作的 JavaScript 方法的支持是另一个优于 Couchbase 的优势。为了利用 MongoDB\
  \ 中的这些附加功能，将文档从 Couchbase 迁移到 MongoDB 可能是有利的。在本章中，我们将把 Couchbase 文档迁移到 MongoDB。本章涵盖以下主题：\n\
