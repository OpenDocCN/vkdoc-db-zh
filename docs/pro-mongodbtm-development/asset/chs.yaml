  ## 引言


  MongoDB 服务器在 NoSQL 数据库中排名第一，在所有数据库（关系型或 NoSQL）中排名第四。虽然市面上有几本关于 MongoDB 管理的书籍，但还没有关于基于
  MongoDB 开发的书。


  这本*Pro MongoDB 开发*是关于 MongoDB 服务器的，它是一个基于 BSON（二进制 JSON）文档模型的 NoSQL 数据库。如前所述，MongoDB
  是最常用的 NoSQL 数据库，根据 DB-Engines.com 的数据，它在所有数据库（关系型或 NoSQL）中排名第四（参考：`http://db-engines.com/en/ranking`）。本书讨论了在
  Web 开发中使用 MongoDB 数据库的各个方面。Java、PHP、Ruby 和 JavaScript 是最常用的编程/脚本语言，本书讨论了使用这些语言访问
  MongoDB 数据库。本书还讨论了使用 Java EE 框架 Kundera 和 Spring Data 与 MongoDB。由于 NoSQL 数据库通常与
  Hadoop 生态系统一起使用，本书讨论了 MongoDB 与 Apache Hadoop 和 Apache Hive 的结合使用。还讨论了基于 Oracle
  Data Integrator 将 MongoDB 数据集成到 Oracle Database 中。讨论了从其他 NoSQL 数据库（Apache Cassandra
  和 Couchbase）以及关系型数据库（Oracle Database）的迁移。


  本书适用于使用 MongoDB 服务器开发应用程序的 Web 开发者和 NoSQL 开发者。必须具备 Java、Java EE 以及脚本语言 PHP、Ruby
  和 JavaScript 的预备知识。熟悉 Apache Hadoop、Apache Hive、Oracle Database 和 Oracle Data Integrator
  也是先决条件。


  根据 2014 年 Java 工具和技术展望，“在 NoSQL 领域……在使用 NoSQL 的开发者中……MongoDB（56%）显然处于领先地位……”（参考：`http://zeroturnaround.com/rebellabs/java-tools-and-technologies-landscape-for-2014/13/`）。


  超过 2000 个组织使用 MongoDB（参考：`www.mongodb.com/who-uses-mongodb`）。


  各种指标都将 MongoDB 排在所有其他 NoSQL 数据库之上（参考：`www.mongodb.com/leading-nosql-database`）。


  MongoDB 被 DB-Engines 评为 2013 年度数据库（参考：`www.mongodb.com/blog/post/mongodb-named-2013-database-year-why-matters`）。


  2015 年 9 月，Google Trends 中“MongoDB”与“Apache Cassandra”和“Couchbase”搜索词排名如下图所示。


  ![9781484215999_unFigFM-04.jpg](img/image00403.jpeg)


  *Google Trends 数据库搜索结果*


