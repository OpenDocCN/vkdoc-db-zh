  \ console.log(error);\n                    else\n                        console.log(result);\n\
  \                });\n            }\n        });\n    }\n});\n```\n\n4.  从 `local`\
  \ 数据库中删除 `catalog` 集合。\n\n```\n>use local\n>db.catalog.drop()\n```\n\n当使用命令 `node\
