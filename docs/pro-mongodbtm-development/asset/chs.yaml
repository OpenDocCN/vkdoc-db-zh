  \        }\n        });\n        collection.findOneAndUpdate({journal: 'Java Magazine'},\
  \ {$set: {journal: 'Java Magazine'}}, {returnOriginal: false, upsert: true}, function(error,\
  \ result) {\n          if (error) console.log(error);\n          else\n        \
  \    console.log(result);\n        });\n        collection.update({journal: 'Oracle\
  \ Magazine'}, {$set: {edition: '11-12-2013', title: 'Engineering as a Service',\
  \ author: 'David A. Kelly'}}, {upsert: true}, function(error, result) {\n      \
  \    if (error) console.log(error);\n          else\n            console.log(result);\n\
  \        });\n      }\n    });\n  }\n});\n```\n\n### 运行与验证\n\n1.  使用 `node updateDocument.js`\
  \ 命令运行脚本。图 5-32 所示的输出表明有一个文档被更新插入（upsert）。\n    ![图 5-32](img/image00581.jpeg)\n\
  \    *图 5-32. updateDocument.js 的输出*\n2.  在 Mongo shell 中运行 `db.catalog.find()`\
  \ 方法以列出集合中的文档。列出的文档中有一个是更新插入的文档，如图 5-33 所示。另一个文档已被更新，其中添加了一些字段。\n    ![图 5-33](img/image00582.jpeg)\n\
  \    *图 5-33. 列出更新后的文档*\n\n在被更新的文档（不是更新插入的文档）中，只有在 `$set` 操作符中指定的字段被更新，其他字段保持与更新前相同。只有第一个匹配的文档会被更新。\n\
  \n\n### 更新多个文档\n\n在本章节中，我们将使用 `updateMany(filter, update, options, callback)` 方法来更新多个文档。相关参数在表\
