- "# 固定集合\n\n## 创建固定集合\n\n一个 *capped* 集合是具有固定大小的集合，类似于循环列表。当固定集合已满时，数据会被覆盖。数据无法从固定集合中删除。例如，创建一个名为\
  \ `catalog` 的固定集合，启用自动索引，大小为 64 KB，最大文档数为 1000。在创建固定的 `catalog` 集合之前，使用 `db.catalog.drop()`\
  \ 命令删除先前创建的同名集合（删除操作将在下一节详细讨论）。\n\n```\n>use test\n>db.catalog.drop()\n>db.createCollection(\"\
  catalog\", {capped: true, autoIndexId: true, size: 64 * 1024, max: 1000} )\n```\n\
  \n返回的响应中 `ok` 字段为 1，表示固定集合已创建，如 图 2-16 所示。\n\n![9781484215999_Fig02-16.jpg](img/image00440.jpeg)\n\
  \n图 2-16. 创建固定集合\n\n`create` 命令也可以使用 `db.runCommand()` 方法运行。同样地，如果 `catalog` 集合已存在，则先将其删除。如果已在使用\
  \ `test` 数据库，则无需重新运行 `use test` 命令。\n\n```\n>use test\n>db.catalog.drop()\n>db.runCommand(\
  \ { create: \"catalog\", capped: true, size: 64 * 1024, max: 1000 } )\n```\n\n固定集合已创建，如\
  \ 图 2-17 中所示的 `\"ok\": 1` 响应所示。\n\n![9781484215999_Fig02-17.jpg](img/image00441.jpeg)\n\
  \n图 2-17. 使用 runCommand() 创建固定集合\n\n集合不能已存在，否则会生成错误。例如，在 `catalog` 集合已存在时再次创建它。会输出“collection\
  \ already exists”错误信息，如 图 2-18 所示。\n\n![9781484215999_Fig02-18.jpg](img/image00442.jpeg)\n\
  \n图 2-18. “集合已存在”错误信息\n\n## 管理集合\n\n可以使用辅助方法 `db.collection.count()` 列出集合中的文档数量。例如，以下方法列出了\
  \ `catalog` 集合中的文档计数。\n\n```\n>db.catalog.count()\n```\n\n输出为 0 表示尚未向 `catalog`\
  \ 集合添加任何文档，如 图 2-19 所示。\n\n![9781484215999_Fig02-19.jpg](img/image00443.jpeg)\n\n\
  图 2-19. 列出文档计数\n\n可以使用 `db.collection.stats()` 方法列出集合的统计信息。例如，以下方法列出了 `catalog`\
  \ 集合的统计信息。\n\n```\n>db.catalog.stats()\n```\n\n集合统计信息输出包括集合命名空间（格式为 `<database>.<collection>`）、文档计数、集合是否为固定集合、存储大小、最大文档数等，如\
  \ 图 2-20 所示。\n\n![9781484215999_Fig02-20.jpg](img/image00444.jpeg)\n\n图 2-20. 使用\
  \ stats() 方法列出统计信息\n\n可以使用 `db.collection.renameCollection(target, dropTarget)`\
  \ 方法重命名集合。默认情况下，`dropTarget boolean` 为 `false`，表示如果已存在与新集合名同名的集合，则目标集合应被删除。例如，将\
  \ `mongo` 集合重命名为 `mongodb`。\n\n```\n>db.mongo.renameCollection('mongodb', false)\n\
  ```\n\n返回的 `\"ok\": 1` 响应表示 `mongo` 集合已被重命名，如 图 2-21 所示。如果在重命名后运行 `show collections`\
  \ 命令，它将列出重命名后的集合 `mongodb`，而不是重命名前列出的 `mongo` 集合。\n\n![9781484215999_Fig02-21.jpg](img/image00445.jpeg)\n\
  \n图 2-21. 重命名集合\n\n## 删除集合\n\n要从数据库中移除集合，请调用 `db.collection.drop()` 方法。例如，调用 `show\
  \ collections` 命令列出所有集合。随后删除 `catalog` 集合。\n\n\n## 使用文档\n\n在接下来的小节中，我们将讨论添加文档、批量添加文档、查询文档、更新文档以及删除文档。\n\
  \n### 添加文档\n\n本节我们将使用 `db.collection.insert()` 这个 JavaScript 方法，通过 Mongo shell 向\
  \ MongoDB 添加一个文档。`insert()` 辅助方法对于不同版本的 MongoDB 具有不同的语法，后续版本中添加了一些新功能，如 表 2-2 所列。\n\
  \n表 2-2. 插入辅助方法语法\n\n| MongoDB 版本 | insert 方法语法 | 描述 |\n| --- | --- | --- |\n| 2.6\
  \ 及更高版本 | `db.collection.insert(<document or array of documents>,{writeConcern:\
  \ <document>,ordered:<boolean>})` | 添加了 `writeConcern` 和 ordered 选项——两者都是可选的。`writeConcern`\
  \ 选项为“安全写入”提供不同级别的插入成功保证。ordered 选项接受一个布尔值，并按顺序插入文档，默认为 false。该插入方法对单个文档插入返回一个 `WriteResult`\
  \ 对象，对文档数组插入返回一个 `BulkWriteResult` 对象。 |\n| 2.2 | `db.collection.insert(<document\
  \ or array of documents>)` | 支持添加单个文档或文档数组。 |\n| 2.04 | `db.collection.insert(<document>)`\
  \ | 仅支持添加一个文档。单个文档可以包含子文档。 |\n\n要添加一个文档，请完成以下步骤：\n\n### 1. 删除现有集合\n\n在添加新文档或文档数组之前，如果\
  \ `catalog` 集合已存在，则将其删除。\n\n```\n>db.catalog.drop()\n```\n\n### 2. 创建文档\n\n创建要添加的\
  \ BSON 文档结构。\n\n```\n>use catalog\n>doc1 = {\"catalogId\" : \"catalog1\", \"journal\"\
  \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
  \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n\
  ```\n\n### 3. 插入文档\n\n使用 `catalog` 集合，在文档上调用 `db.collection.insert()` 方法。\n\n```\n\
  >db.catalog.insert(doc1)\n```\n\n### 4. 验证插入\n\n随后运行 `db.collection.find()` 方法以查找\
  \ `catalog` 集合中的文档。\n\n```\n>db.catalog.find()\n```\n\n添加的单个文档会被列出，并包含 `_id` 字段。`_id`\
  \ 字段在文档的 JSON 结构中并未指定，它在文档被添加到数据库之前会自动被添加。\n\n`insert()` 方法返回的 `WriteResult` 对象包含\
  \ `nInserted` 字段，用以指示添加的文档数量。添加一个文档时，`nInserted` 字段的值为 1，如 图 2-23 所示。\n\n![9781484215999_Fig02-23.jpg](img/image00447.jpeg)\n\
  \n图 2-23. 使用插入方法添加文档\n\n接下来，我们将添加一个在 BSON 文档结构中指定了 `_id` 字段的 BSON 文档。\n\n### 5.\
  \ 创建带 _id 的文档\n\n指定与之前相同的文档，但额外添加一个 `_id` 字段。`_id` 字段的值必须是一个 `ObjectId` 对象。\n\n\
  ```\n>doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : \"\
  catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013',\"title\" : 'Engineering as a Service',\"\
  author\" : 'David A. Kelly'};\n```\n\n### 6. 插入带 _id 的文档\n\n使用 `db.collection.insert`\
  \ 方法添加该文档。\n\n\n\n```\n    >db.catalog.insert(doc1)\n```\n\n和之前一样，`insert()`方法返回一个`WriteResult`对象，其`nInserted`字段值为\
  \ 1，表示已添加一个文档，如图 2-24 所示。\n\n![9781484215999_Fig02-24.jpg](img/image00448.jpeg)\n\
  \n图 2-24. 添加包含 `_id` 字段的 BSON 文档\n\n3.  接着运行 `db.catalog.find()` 方法以查找数据库中的文档。添加的文档会被列出，并包含文档中指定的\
  \ `_id` 字段，如图 2-25 所示。\n\n![9781484215999_Fig02-25.jpg](img/image00449.jpeg)\n\n\
  图 2-25. 列出包含 `_id` 字段的文档\n\n对于任何版本的 MongoDB，`_id` 字段值在集合（collection）的文档中必须是唯一的。为了演示这一点，添加以下文档，其\
  \ `_id` 字段设置为 `ObjectId(\"507f191e810c19729de860ea\")`。\n\n```\n>doc2 = {\"_id\"\
  : ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" : 2, \"journal\" : 'Oracle\
  \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
  \ 2013'};\n>db.catalog.insert(doc2)\n```\n\n再添加另一个 `_id` 字段设置为相同 `ObjectId` 值的文档。\n\
  \n```\n>doc3 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" :\
  \ 3};\n>db.catalog.insert(doc3)\n```\n\n这会产生一个重复键错误，如图 2-26 所示。\n\n![9781484215999_Fig02-26.jpg](img/image00450.jpeg)\n\
  \n图 2-26. 重复键错误\n\n添加一批文档\n\nMongoDB 2.2 版本开始支持添加文档数组。在 2.2 之前的版本中，每次调用 `db.collection.insert()`\
  \ 方法只能添加单个文档。要在 MongoDB 3.0.5 中添加一批文档，请指定或创建要添加的两个文档的 JSON，包括 `_id` 字段。\n\n```\n\
  >doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 'catalog1',\
  \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
  \ : 'November December 2013',\"title\" : 'Engineering as a Service',\"author\" :\
  \ 'David A. Kelly'}\n>doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"),\
  \ \"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
  \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
  \ and Collaborative',\"author\" : 'Tom Haunert'}\n```\n\n删除 `catalog` 集合，然后使用文档数组作为\
  \ `catalog` 集合来调用 `db.catalog.insert()` 方法。\n\n```\n>db.catalog.drop()\n>db.catalog.insert([doc1,\
  \ doc2])\n```\n\n`insert()` 方法返回一个 `BulkWriteResult` 对象，其中包含一个 `nInserted` 字段，表示添加的文档数量。数组中的两个文档作为两个不同的文档被添加，`nInserted`\
  \ 字段值为 2 即表明了这一点。随后运行 `db.collection.find()` 方法以查找 `catalog` 集合中的文档。\n\n```\n>db.catalog.find()\n\
  ```\n\n集合方法 `find()` 列出了两个不同的文档，如图 2-27 所示。\n\n![9781484215999_Fig02-27.jpg](img/image00451.jpeg)\n\
  \n图 2-27. 添加一批文档\n\nMongoDB 2.6 的 Mongo shell 增加了两个新选项的支持：`writeConcern` 和 `ordered`。接下来，我们将演示这些选项的用法。`writeConcern`\
  \ 选项文档支持表 2-3 中列出的选项。\n\n表 2-3. 插入方法选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `w` | 指定写入关注级别。\
  \ |\n| `j` | 确认 MongoDB 已将数据写入磁盘上的日志。布尔值，默认值为 false。MongoDB 不能以 `–nojournal` 选项运行。\
  \ |\n| `wtimeout` | 适用于 `w` 值大于 1 的情况，指定写入关注的时间限制（毫秒）。写入关注是 MongoDB 在报告操作成功时提供的保证。\
  \ |\n\n写入关注级别 `w` 可以设置为表 2-4 中列出的值。\n\n表 2-4. 写入关注级别值\n\n| w 值 | 描述 |\n| --- | ---\
  \ |\n| `1` | 对独立 MongoDB 或副本集中的主节点提供写入关注确认。默认值。 |\n| `0` | 禁用写入操作的确认。 |\n| `majority`\
  \ | 确认写入操作已传播到大多数副本集成员。 |\n| 大于 `1` 的数字 | 确认写入操作已传播到指定数量的副本集成员。 |\n| `标签集` | 以细粒度方式指定哪些副本集成员必须确认写入操作。\
  \ |\n\n接下来，我们将使用 `writeConcern` 和 `ordered` 选项添加一批文档。指定要添加的三个 BSON 文档。\n\n```\n\
  doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 2, \"journal\"\
  \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
  \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n\
  doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"), \"catalogId\" : 1, \"\
  journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
  \ : 'November December 2013',\"title\" : 'Quintessential and Collaborative',\"author\"\
  \ : 'Tom Haunert'}\ndoc3 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d6\"), \"\
  catalogId\" : 3, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013'}\n```\n\n使用 `db.collection.insert()` 方法和一个\
  \ `writeConcern`（`w` 设置为 `majority`，`wtimeout` 设置为 5000）以及 `ordered` 选项设置为 `true`\
  \ 来添加文档数组。同样，在运行 `db.catalog.insert()` 命令之前，先删除 `catalog` 集合。\n\n```\n>db.catalog.drop()\n\
  >db.catalog.insert([doc3, doc1, doc2],  { writeConcern: { w: \"majority\", wtimeout:\
  \ 5000 }, ordered:true })\n```\n\n将返回一个 `BulkWriteResult` 对象，其 `nInserted` 值为 3，如图\
  \ 2-28 所示。\n\n![9781484215999_Fig02-28.jpg](img/image00452.jpeg)\n\n图 2-28. 使用 writeConcern\
  \ 选项\n\n随后调用 `db.catalog.find()` 来列出添加的三个文档。文档按照添加时文档数组中指定的顺序列出，如图 2-29 所示。\n\n\
  ![9781484215999_Fig02-29.jpg](img/image00453.jpeg)\n\n图 2-29. 使用 find() 列出文档\n\n\
  当主机不是副本集的成员时，不能使用非 `majority` 的 `w` 值（例如 1）。例如，运行以下命令。\n\n```\n>db.catalog.drop()\n\
  >db.catalog.insert([doc3, doc1, doc2],  { writeConcern: { w: \"1\", wtimeout: 5000\
  \ }, ordered:true })\n```\n\n正如错误消息所示，`w` 不能为 1，如图 2-30 所示。\n\n![9781484215999_Fig02-30.jpg](img/image00454.jpeg)\n\
  \n图 2-30. 错误消息 “cannot use non-majority”\n\n保存文档\n\n`db.collection.save()` 方法用于保存文档，这与\
  \ `db.collection.insert()` 方法不同，因为 insert 方法总是添加新文档，或者如果数据库中已存在具有相同 `_id` 字段的文档，则抛出错误。相反，`db.collection.save()`\
  \ 方法如果数据库中已存在具有相同 `_id` 的文档，则更新该文档；如果不存在具有相同 `_id` 的文档，则添加新文档。当数据库中已存在具有相同 `_id`\
  \ 的文档时，save 方法会用新文档完全替换旧文档。`db.collection.save()` 方法在 MongoDB 2.6 版本中进行了修订。下表，表\
  \ 2-5，列出了 MongoDB 2.4 和 MongoDB 2.6（及更高版本）的 `save()` 方法。\n\n表 2-5. Save 方法\n\n\n"
- "# 使用 save()方法操作 MongoDB 文档示例\n\n| MongoDB 版本 | Save 方法 | 描述 |\n| --- | --- | ---\
  \ |\n| 2.4 | `db.collection.save(document)` | 保存一个文档。 |\n| 2.6 及更高版本 | `db.collection.save(<document>,{writeConcern:\
  \ <document>})` | 将文档保存到集合中。`writeConcern` 是一个新增的方法参数。 |\n\n本节将演示 `save()` 方法的不同用法。首先，我们将使用\
  \ `save()` 方法更新一个文档。使用 `db.collection.insert()` 方法在 `catalog` 集合中添加以下文档。\n\n## 示例一：更新现有文档\n\
  \n1.  在添加文档之前，先删除 `catalog` 集合并将当前数据库设置为 `catalog`。\n\n    ```javascript\n    >db.catalog.drop()\n\
  \    >use catalog\n    >doc1 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"),\
  \ \"catalogId\" : \"catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\" :\
  \ 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
  \ as a Service',\"author\" : 'David A. Kelly'}\n    >db.catalog.insert(doc1)\n \
  \   ```\n\n2.  `db.collection.insert()` 方法添加文档，并返回一个 `WriteResult` 对象，其 `nInserted`\
  \ 字段值为 1。调用 `db.collection.find()` 方法列出添加的文档。\n\n    ```javascript\n    >db.catalog.find()\n\
  \    ```\n\n3.  接着，构造一个与添加的文档具有相同 `_id` 但某些字段不同的文档。\n\n    ```javascript\n    >doc1\
  \ = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"), \"catalogId\" : 'catalog1',\
  \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
  \ : '11-12-2013',\"title\" : 'Engineering as a Service',\"author\" : 'Kelly, David\
  \ A.'}\n    ```\n\n4.  调用 `db.collection.save()` 方法保存修改了部分字段的文档。如果指定了 `writeConcern`\
  \ 选项，则会被忽略。\n\n    ```javascript\n    >db.catalog.save(doc1,{ writeConcern: { w:\
  \ \"majority\", wtimeout: 5000 } })\n    ```\n\n5.  `db.collection.save()` 方法保存文档，并返回一个\
  \ `WriteResult` 对象，其 `nMatched` 和 `nModified` 字段值均为 1。因为使用了相同的 `_id` 字段值，该文档被更新或修改为新文档的内容。随后，在\
  \ `catalog` 集合上调用 `db.collection.find()` 方法，列出先前添加并随后保存的文档。\n\n    ```javascript\n\
  \    >db.catalog.find()\n    ```\n\n通过 `db.collection.insert()` 添加并随后通过 `db.collection.save()`\
  \ 保存的文档被列出。保存（更新后）的文档中，`edition` 字段和 `author` 字段已被修改，如 图 2-31 所示。\n\n![9781484215999_Fig02-31.jpg](img/image00455.jpeg)\n\
  \n图 2-31. 使用 `save()` 方法更新文档\n\n在前面的例子中，用 `save()` 方法保存的文档与用 `insert()` 方法添加的文档具有完全相同的字段。在下一个例子中，我们将在\
  \ `save` 方法保存的文档中添加新字段，而不是在 `insert` 方法添加的文档中。\n\n## 示例二：为文档添加新字段\n\n1.  构造一个包含\
  \ `_id` 字段、`catalogId` 字段、`journal` 字段、`publisher` 字段和 `edition` 字段，但不包含 `title`\
  \ 和 `author` 字段的 BSON 文档。\n\n    ```javascript\n    doc2 = {\"_id\": ObjectId(\"\
  507f191e810c19729de860ea\"), \"catalogId\" : \"catalog2\", \"journal\" : 'Oracle\
  \ Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December\
  \ 2013'}\n    ```\n\n2.  使用 `db.collection.insert()` 方法将文档添加到 `catalog` 集合中。在运行命令之前，先删除\
  \ `catalog` 集合。\n\n    ```javascript\n    >db.cataog.drop()\n    >db.catalog.insert(doc2)\n\
  \    ```\n\n3.  `insert()` 方法返回一个 `WriteResult` 对象，其 `nInserted` 字段值为 1。随后在 `catalog`\
  \ 集合上调用 `db.collection.find()` 方法会列出该文档。\n\n    ```javascript\n    >db.catalog.find()\n\
  \    ```\n\n4.  添加文档后，接下来我们将使用 `save()` 方法更新该文档。构造一个文档，其包含与 `insert()` 方法添加的文档完全相同的字段和字段值，包括\
  \ `_id` 字段以及新增的 `title` 和 `author` 字段。\n\n    ```javascript\n    >doc2 = {\"_id\"\
  : ObjectId(\"507f191e810c19729de860ea\"),\"catalogId\" : 'catalog2', \"journal\"\
  \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : '11-12-2013',\"\
  title\" : 'Quintessential and Collaborative',\"author\" : 'Tom Haunert'}\n    ```\n\
  \n5.  使用 `db.collection.save()` 方法将文档保存到 `catalog` 集合中。在运行以下命令前**不要**删除 `catalog`\
  \ 集合，因为我们正在保存（并修改）与之前添加的同一个文档。\n\n    ```javascript\n    >db.catalog.save(doc2)\n\
  \    ```\n\n6.  `save()` 方法修改了文档，添加了 `title` 和 `author` 字段。`save()` 方法返回一个 `WriteResult`\
  \ 对象，其 `nInserted` 和 `nModified` 字段值均为 1。随后调用 `db.collection.find()` 方法列出文档。\n\n\
  \    ```javascript\n    >db.catalog.find()\n    ```\n\n修改后的文档被列出，并包含新增的两个字段，如 图\
  \ 2-32 所示。文档已被修改。\n\n![9781484215999_Fig02-32.jpg](img/image00456.jpeg)\n\n图 2-32.\
  \ 使用 `save()` 方法更新文档并添加新字段\n\n在前面所有的 `save()` 示例中，我们都在用 `insert()` 添加的文档中指定了 `_id`\
  \ 字段，然后在用 `save` 方法保存时使用了相同的 `_id`。在下一个使用 `save()` 方法的例子中，我们将使用一个与 `insert()` 方法添加的文档不同的\
  \ `_id` 字段值来调用 `save()` 方法。像之前一样构造一个 BSON 文档，并使用 `insert()` 方法添加该文档。在运行示例前删除 `catalog`\
  \ 集合。\n\n## 示例三：执行 Upsert 操作\n\n1.  随后调用 `db.collection.find()` 方法列出添加的文档。\n\n \
  \   ```javascript\n    >db.catalog.drop()\n    >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860ea\"\
  ),\"catalogId\" : \"catalog2\", \"journal\" : 'Oracle Magazine', \"publisher\" :\
  \ 'Oracle Publishing', \"edition\" : 'November December 2013'}\n    > db.catalog.insert(doc2)\n\
  \     >db.catalog.find()\n    ```\n\n2.  接着，构造另一个具有相同字段和字段值，但 `_id` 字段值不同的文档。使用\
  \ `save` 方法保存该文档。\n\n    ```javascript\n     >doc2 = {\"_id\": ObjectId(\"507f191e810c19729de860eb\"\
  ),\"catalogId\" : 'catalog2', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
  \ Publishing', \"edition\" : '11-12-2013',\"title\" : 'Quintessential and Collaborative',\"\
  author\" : 'Tom Haunert'}\n     >db.catalog.save(doc2)\n    ```\n\n3.  随后在 `catalog`\
  \ 集合上调用 `db.collection.find()` 方法。\n\n    ```javascript\n    db.catalog.find()\n\
  \    ```\n\n因为使用 `save()` 方法保存的文档具有不同的 `_id` 字段值，所以添加了一个新文档，`find()` 列出了两个文档，如 图\
  \ 2-33 所示。\n\n![9781484215999_Fig02-33.jpg](img/image00457.jpeg)\n\n图 2-33. 使用 `save()`\
  \ 执行 Upsert 操作\n\n`WriteResult` 中的 `nUpserted` 为 1。`Upsert` 是一个术语，表示当没有文档匹配一个可能匹配并更新文档的查询文档时执行的插入操作。`Upsert`\
  \ 用于在找到匹配文档时修改或更新文档的操作上下文中。`insert()` 方法不修改或更新文档，因此 `upsert` 一词不能用于 `insert()` 方法的上下文中。`save()`\
  \ 和 `update()` 方法确实会修改或更新文档，因此 `upsert` 用于这些方法的上下文中。\n\n当在 `insert()` 添加的文档中使用了新的\
  \ `_id` 字段，并随后用 `save()` 方法保存时，这个过程称为对文档执行 `upserting`。\n\n当在 `insert()` 的文档中未指定\
  \ `_id` 字段，并随后用 `save()` 保存时，执行的是 `insert` 操作，而非 `upsert`。接下来，我们将讨论一个使用 `save()`\
  \ 方法执行插入的例子。\n\n\n"
- "# MongoDB 文档操作\n\n## 插入文档\n\n1.  像之前一样构建一个文档，但不包含 `_id` 字段。使用 `insert()` 方法添加文档。随后调用\
  \ `find()` 方法列出该文档。像之前一样删除 `catalog` 集合。\n\n    ```javascript\n    >db.catalog.drop()\n\
  \    >doc2 = {\"catalogId\" : “catalog2”, \"journal\" : 'Oracle Magazine', \"publisher\"\
  \ : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n    >db.catalog.insert(doc2)\n\
  \    >db.catalog.find()\n    ```\n\n2.  接下来，构建另一个文档，其中修改了 `edition` 字段，并新增了 `title`\
  \ 和 `author` 两个字段。\n\n    ```javascript\n    >doc2 = {\"catalogId\" : 'catalog2',\
  \ \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
  \ : '11-12-2013',\"title\" : 'Quintessential and Collaborative',\"author\" : 'Tom\
  \ Haunert'}\n    ```\n\n3.  在更新后的文档上调用 `save()` 方法。\n\n    ```javascript\n    >db.catalog.save(doc2)\n\
  \    ```\n\n4.  随后调用 `find()` 方法不会列出更新后的文档，而是列出两个文档。\n\n    ```javascript\n    >db.catalog.find()\n\
  \    ```\n\n因为使用 `insert()` 添加的文档和使用 `save()` 保存的文档都不包含 `_id` 字段，所以会添加一个新文档，并通过\
  \ `find()` 列出，如 图 2-34 所示。返回的 `WriteResult` 对象有一个值为 1 的 `nInserted` 字段，表明已添加一个文档。\n\
  \n![9781484215999_Fig02-34.jpg](img/image00458.jpeg)\n\n图 2-34。使用 `save()` 插入文档\n\
  \n### 更新文档\n\n在本节中，我们将更新一个文档。`db.collection.update()` JavaScript 方法用于更新文档。该方法在 MongoDB\
  \ 2.2 和 2.6 版本中有所修订。不同版本的方法如 表 2-6 所示。\n\n表 2-6。`update()` 方法的不同版本\n\n| 版本 | 方法\
  \ | 描述 |\n| --- | --- | --- |\n| 2.2 之前 | `db.collection.update(query, update, <upsert>,\
  \ <multi>)` | `<upsert>` 和 `<multi>` 是位置布尔选项。 |\n| 2.2 | `db.collection.update(query,\
  \ update, options)` 或 `db.collection.update(<query>,<update>,{ upsert: <boolean>,\
  \ multi: <boolean> })` | 为 `<upsert>` 和 `<multi>` 选项添加了 `options` 文档类型参数。 |\n| 2.6\
  \ 及之后 | `db.collection.update(query, update, options)` 或 `db.collection.update(<query>,<update>,{\
  \ upsert: <boolean>, multi: <boolean>, writeConcern: <document> })` | `options`\
  \ 参数增加了 `writeConcern` 选项。同时，该方法返回一个包含操作状态的 `WriteResult`。 |\n\n`update()` 方法的参数（包括可选参数\
  \ `options`）在 表 2-7 中讨论。\n\n表 2-7。`update` 方法参数\n\n| 选项 | 类型 | 描述 |\n| --- | ---\
  \ | --- |\n| `query` | document | 用于选择要更新的文档的查询条件。 |\n| `update` | document | 要应用的更新或修改。\
  \ |\n| `upsert` | Boolean | 如果设置为 `true`，当未找到符合选择条件的文档时，会插入一个新文档。默认为 `false`。 |\n\
  | `multi` | Boolean | 如果设置为 `true`，当找到多个符合选择条件的文档时，会更新多个文档。 |\n| `writeConcern`\
  \ | document | 指定写关注（write concern）。写关注在本章前面已讨论过。 |\n\n接下来，我们将更新一个文档。首先，我们将使用 `insert()`\
  \ 方法添加一个文档，随后使用 `update` 方法更新添加的文档。\n\n1.  在 mongo 命令 shell 中运行以下命令来添加文档。在运行命令之前，先删除\
  \ `catalog` 集合。\n\n    ```javascript\n    >db.catalog.drop()\n    >doc1 = {\"catalogId\"\
  \ : 'catalog1', \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013'}\n    >db.catalog.insert(doc1)\n    ```\n\
  \n2.  随后运行以下命令来查找添加的文档。\n\n    ```javascript\n    >db.catalog.find()\n    ```\n\n\
  3.  要更新文档，需调用 `update()` 方法，为 `edition` 字段提供修改后的值，并添加新的 `title` 和 `author` 字段。包含\
  \ `options` 参数，其中 `upsert` 选项设置为 `true`。\n\n    ```javascript\n    db.catalog.update(\n\
  \       { catalogId: \"catalog1\" },\n       {\"catalogId\" : 'catalog1', \"journal\"\
  \ : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : '11-12-2013',\"\
  title\" : 'Engineering as a Service',\"author\" : 'Kelly, David A.'},\n       {\
  \ upsert: true}\n    )\n    ```\n\n4.  随后再次调用 `find()` 方法。\n\n    ```javascript\n\
  \    >db.catalog.find()\n    ```\n\n文档被更新，并返回一个 `WriteResult` 对象。`WriteResult` 对象中的\
  \ `nMatched` 字段值为 1，`nUpserted` 为 0，`nModified` 为 1，如 图 2-35 所示。\n\n![9781484215999_Fig02-35.jpg](img/image00459.jpeg)\n\
  \n图 2-35。使用 `update()` 方法更新文档\n\n如果在 `update` 参数中使用了键值表达式，则会用 `update` 参数中的文档完全替换原文档。如果在\
  \ `update()` 方法中使用了诸如 `$set` 之类的更新操作符表达式，则仅替换更新操作符表达式中指定的字段，而不是整个文档。如果 `update`\
  \ 参数包含更新操作符表达式，则它不能包含字段键值表达式。\n\n### 更新多个文档\n\n`update()` 方法默认更新单个文档。要更新多个文档，请使用\
  \ `multi` 参数。`update()` 方法要更新多个文档的一个要求是使用更新操作符表达式。如果 `update()` 方法仅指定字段:值表达式，则无法更新多个文档。\n\
  \n接下来，我们将在 MongoDB 3.0.5 中更新多个文档。\n\n1.  首先通过调用 `db.catalog.drop()` 删除之前添加的 `catalog`\
  \ 集合。使用 `db.collection.insert()` 方法向 `catalog` 集合添加两个文档。随后使用 `db.collection.find()`\
  \ 方法列出 `catalog` 集合中的文档。\n\n    ```javascript\n    > db.catalog.drop()\n    >use\
  \ catalog\n    >doc1 = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\"\
  \ : 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering\
  \ as a Service',\"author\" : 'David A. Kelly'}\n    db.catalog.insert(doc1)\n  \
  \  >doc2 = {\"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" :\
  \ 'Oracle Publishing', \"edition\" : 'November December 2013',\"title\" : 'Quintessential\
  \ and Collaborative',\"author\" : 'Tom Haunert'}\n    >db.catalog.insert(doc2)\n\
  \    >db.catalog.find()\n    ```\n\n2.  接下来，调用 `db.collection.update()` 方法，使用包含\
  \ `$set`（更新 `edition` 字段）和 `$inc`（更新 `catalogId` 字段）的更新操作符表达式。在 `options` 参数中，指定\
  \ `multi` 选项为 `true`，同时也指定 `writeConcern` 选项。尽管为 `w:1` 指定了 `wtimeout`，但它仅适用于 w>1\
  \ 的情况，对于 w:1 会被忽略。随后调用 `db.catalog.find()` 方法列出更新后的文档。\n\n    ```javascript\n  \
  \  >db.catalog.update(\n       { journal: 'Oracle Magazine'},\n       {\n      \
  \    $set: { edition: '11-12-2013' },\n          $inc: { catalogId: 2 }\n      \
  \ },\n       {\n         multi: true,\n         writeConcern: { w: 1, wtimeout:\
  \ 5000 }\n       }\n    )\n    >db.catalog.find()\n    ```\n\n从 `update()` 方法的输出表明，两个文档被匹配并更新，如\
  \ 图 2-36 所示。\n\n![9781484215999_Fig02-36.jpg](img/image00460.jpeg)\n\n图 2-36。使用\
  \ `update()` 方法更新多个文档\n\n## 查询单个文档\n\n可以使用 `findOne()` 方法从集合中查询单个文档。`findOne()`\
  \ 方法的语法如下。\n\n```\ndb.collection.findOne(query, <projection>)\n```\n\n\n\n"
- "# MongoDB 查询操作：findOne() 与 find()\n\n方法的所有参数均为可选。`query` 参数用于指定查询的选择条件，其类型为文档（document）。`<projection>`\
  \ 参数用于指定要返回的字段。`query` 和 `<projection>` 参数的类型均为文档（`document`）。默认情况下，将返回所有字段。如果多个文档满足选择条件，或者未指定选择条件且集合中有多个文档，则返回匹配到的第一个文档。\n\
  \n接下来，我们将添加两个文档，并使用不带参数的 `findOne()` 方法来查找一个文档。\n\n1.  删除 `catalog` 集合，并使用 `db.collection.insert()`\
  \ 方法向 `catalog` 集合添加两个文档。\n\n```\n>db.catalog.drop()\n>doc1 = {\"catalogId\" : \"\
  catalog1\", \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013',\"title\" : 'Engineering as a Service',\"\
  author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2 = {\"_id\": ObjectId(\"\
  507f191e810c19729de860ea\"),\"catalogId\" :\"catalog2\", \"journal\" : 'Oracle Magazine',\
  \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n\
  >db.catalog.insert(doc2)\n```\n\n2.  使用 `findOne()` 方法查找一个文档。\n\n```\n>db.catalog.findOne()\n\
  ```\n\n两个文档中的一个会被返回，如图 2-37 所示。\n\n![9781484215999_Fig02-37.jpg](img/image00461.jpeg)\n\
  图 2-37. 查找单个文档\n\n### 查找所有文档\n\n要查找所有文档，必须使用 `find()` 方法。`find()` 方法的语法如下。\n\n```\n\
  db.collection.find(query, <projection>)\n```\n\n`query` 参数指定查询的选择条件，`<projection>`\
  \ 参数指定要返回的字段。这些参数都不是必需的，且类型均为文档。`find()` 方法实际上返回一个游标（cursor），如果在 MongoDB shell 中调用该方法，游标会自动迭代以显示前\
  \ 20 个文档。要在 shell 中迭代剩余的文档，请指定该游标。\n\n要在 `catalog` 集合中查找之前添加且未被删除的所有文档，请运行 `find()`\
  \ 方法。\n\n```\n>db.catalog.find()\n```\n\n`catalog` 集合中的所有文档都将被返回，如图 2-38 所示。为了区分\
  \ `findOne()` 方法返回的单个文档和 `find()` 方法返回的所有文档，下面列出了 `findOne()` 和 `find()` 的结果。\n\n\
  ![9781484215999_Fig02-38.jpg](img/image00462.jpeg)\n图 2-38. 使用 find() 方法查找所有文档\n\
  \n## 查找选定字段\n\n如前所述，`find()` 和 `findOne()` 方法都支持 `<projection>` 参数。`<projection>`\
  \ 参数指定要返回的字段，其文档语法如下。\n\n```\n{ field1: <boolean>, field2: <boolean> ... }\n```\n\
  \n要包含一个字段，请将对应的 `boolean` 值设置为 true 或 1。要排除一个字段，请将其设置为 `false` 或 0。例如，使用 `insert()`\
  \ 方法向 `catalog` 集合添加两个文档。但首先需要删除 `catalog` 集合。\n\n```\n>db.catalog.drop()\n>doc1\
  \ = {\"catalogId\" : 1, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle\
  \ Publishing', \"edition\" : 'November December 2013',\"title\" : 'Engineering as\
  \ a Service',\"author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n>doc2 = {\"\
  catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013',\"title\" : 'Quintessential and Collaborative',\"\
  author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n```\n\n随后调用 `findOne()` 方法，将\
  \ `query` 参数设置为空文档，并将 `<projection>` 参数设置为包含 `edition`、`title` 和 `author` 字段。\n\n\
  ```\n>db.catalog.findOne(\n    {  },\n{ edition: 1, title: 1, author: 1 }\n)\n```\n\
  \n将返回一个文档，并且仅返回 `title`、`author` 和 `edition` 字段，如图 2-39 所示。`_id` 字段总是会被返回，无需在 `<projection>`\
  \ 参数中指定其为要返回的字段之一。\n\n![9781484215999_Fig02-39.jpg](img/image00463.jpeg)\n图 2-39.\
  \ 查找选定字段\n\n`<projection>` 参数可以指定包含字段或排除字段，但不能同时两者兼有。为了演示，请调用 `findOne()` 方法，排除\
  \ `edition` 字段，但包含 `title` 和 `author` 字段。\n\n```\n>db.catalog.findOne(\n    {  },\n\
  { edition: 0, title: true, author: 1 }\n)\n```\n\n这将引发异常，表明不能混合包含和排除字段，如图 2-40 所示。\n\
  \n![9781484215999_Fig02-40.jpg](img/image00464.jpeg)\n图 2-40. 不能混合包含和排除字段\n\n要排除字段，`<projection>`\
  \ 参数中的所有字段必须都设置为排除。例如，在以下对 `findOne()` 的调用中，使用查询比较操作符 `$gt` 设置 `catalogId` 字段，并将\
  \ `<projection>` 参数值设置为排除 `journal` 和 `publisher` 字段。\n\n```\n>db.catalog.findOne(\n\
  \    { catalogId : {$gt: 1} },\n    { journal: 0, publisher: 0}\n)\n```\n\n`findOne()`\
  \ 方法仅返回 `catalogId` 大于 1 的文档，并排除了 `journal` 和 `publisher` 字段，如图 2-41 所示。\n\n![9781484215999_Fig02-41.jpg](img/image00465.jpeg)\n\
  图 2-41. 使用 findOne() 方法查找文档\n\n甚至可以在 `<projection>` 参数中排除 `_id` 字段。例如，排除 `_id`、`journal`\
  \ 和 `publisher` 字段。\n\n```\n>db.catalog.findOne(\n    { catalogId : {$gt: 1} },\n\
  \    { _id:0, journal: 0, publisher: 0}\n)\n```\n\n输出中也会排除 `_id` 字段，如图 2-42 所示。\n\
  \n![9781484215999_Fig02-42.jpg](img/image00466.jpeg)\n图 2-42. 排除 _id 字段\n\n如果要在\
  \ `find()` 或 `findOne()` 方法的 `query` 参数中指定 `_id` 字段值，则必须使用 `ObjectId` 包装类。例如，使用比较查询操作符\
  \ `$in` 和 `ObjectId` 来指定 `_id` 字段值。这些 `_id` 字段值与添加文档时使用的值相同。不同用户的 `_id` 字段值会不同；请使用之前添加文档的\
  \ `_id` 字段值。可以使用 `db.catalog.find()` 命令查找这些 `_id` 字段值。\n\n```\n>db.catalog.find(\n\
  \   {\n      _id: { $in: [ ObjectId(\"55ba5ae4403cc01aa5b078e3\"),  ObjectId(\"\
  55ba5ae5403cc01aa5b078e4\") ] }\n   }, { edition: 1, title: 1, author: 1 }\n)\n\
  ```\n\n`find()` 方法返回具有指定 `_id` 字段值的两个文档，如图 2-43 所示。仅返回在 `<projection>` 参数中指定的字段。\n\
  \n![9781484215999_Fig02-43.jpg](img/image00467.jpeg)\n图 2-43. 使用比较查询操作符 $in 查找文档\n\
  \n### 使用游标\n\n如前所述，`db.collection.find()` 方法返回一个游标，当在 shell 中调用 `find()` 方法时，默认会迭代并显示前\
  \ 20 个文档。游标支持多种方法，并且可以获取游标对象的句柄来调用这些方法。游标支持的部分方法见表 2-8。\n\n表 2-8. 游标支持的方法\n\n\n\n\
  ## 游标方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `batchSize()` | 指定在单个网络消息中返回的文档数量。 |\n\
  | `count()` | 游标中的文档数量。 |\n| `forEach(<function>)` | 遍历每个文档以应用一个 JavaScript 函数。\
  \ |\n| `hasNext()` | 如果游标有另一个文档可供迭代，则返回 true；如果游标没有，则返回 false。 |\n| `limit()` |\
  \ 限制游标结果集的大小。 |\n| `next()` | 返回游标中的下一个文档。 |\n| `skip()` | 指定在从 MongoDB 数据库获取文档之前要跳过的文档数量。\
  \ |\n| `sort()` | 按指定的排序顺序返回结果。 |\n| `toArray()` | 返回文档数组。 |\n\n接下来，我们将演示一些游标方法的使用。使用\
  \ `insert()` 方法删除 `catalog` 集合并向其中添加三个文档。\n\n```\n>db.catalog.drop()\n>doc1 = {\"\
  _id\" : ObjectId(\"53fb4b08d17e68cd481295d5\"),\"catalogId\" : 1, \"journal\" :\
  \ 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\" : 'November\
  \ December 2013',\"title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n\
  db.catalog.insert(doc1)\n>doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d6\"\
  ), \"catalogId\" : 2, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013',\"title\" : 'Quintessential and Collaborative',\"\
  author\" : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n>doc3 = {\"_id\" : ObjectId(\"\
  53fb4b08d17e68cd481295d7\"), \"catalogId\" : 3, \"journal\" : 'Oracle Magazine',\
  \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013'}\n\
  >db.catalog.insert(doc3)\n```\n\n在返回的游标上调用 `forEach` 方法，并调用 `printjson` 函数以 JSON\
  \ 格式输出文档。\n\n```\n>db.catalog.find().forEach(printjson)\n```\n\n三个文档以 JSON 格式显示，如图\
  \ 2-44 所示。\n\n![9781484215999_Fig02-44.jpg](img/image00468.jpeg)\n\n**图 2-44. 使用游标列出文档\
  \ JSON**\n\n在前面的例子中，我们没有为游标创建变量，而是在 `find()` 方法调用之后顺序调用了 `forEach()` 方法。我们也可以如下指定游标变量。如果游标还要用于其他目的，则可以使用变量。\n\
  \n```\nvar cursor= db.catalog.find();\n```\n\n随后，在三元/条件运算符中调用 `hasNext()` 和 `next()`\
  \ 方法以查找游标中的下一个文档。\n\n```\nvar document = cursor.hasNext() ? cursor.next() : null;\n\
  ```\n\n如果返回了文档，则打印其 JSON 形式。\n\n```\nif (document) {\n    print (tojson(document));\n\
  }\n```\n\n文档的 JSON 形式输出如图 2-45 所示。\n\n![9781484215999_Fig02-45.jpg](img/image00469.jpeg)\n\
  \n**图 2-45. 为游标使用变量**\n\n可以按顺序调用游标方法，如下面的 `find()` 方法调用所示，其中调用了 `limit()` 方法，随后调用了\
  \ `sort()` 方法。`limit()` 方法将返回的文档限制为两个，`sort` 方法按 `catalogId` 升序排序。\n\n```\n>db.catalog.find().limit(2).sort({catalogId:\
  \ 1})\n```\n\n返回两个按 `catalogId` 字段升序排列的文档，如图 2-46 所示。\n\n![9781484215999_Fig02-46.jpg](img/image00470.jpeg)\n\
  \n**图 2-46. 顺序调用游标方法**\n\n## 查找和修改文档\n\n`findAndModify()` 方法可用于查找和修改单个文档，其语法如下。\n\
  \n```\ndb.collection.findAndModify({\n    query: <document>,\n    sort: <document>,\n\
  \    remove: <boolean>,\n    update: <document>,\n    new: <boolean>,\n    fields:\
  \ <document>,\n    upsert: <boolean>\n})\n```\n\n`findAndModify()` 方法支持以下列出的参数。除必须指定\
  \ update 或 remove 之一外，所有参数都是可选的。\n\n**表 2-9. findAndModify() 方法支持的参数**\n\n| 参数 |\
  \ 类型 | 描述 |\n| --- | --- | --- |\n| `query` | document | 用于查找要修改的文档的查询选择标准。如果选择标准返回多个文档，则只修改其中一个文档。\
  \ |\n| `sort` | document | 指定如果返回多个文档则修改哪个文档。由 `sort` 参数指定排序顺序中的第一个文档。 |\n| `remove`\
  \ | boolean | 指定是否要删除所选文档。默认为 false。必须指定 `remove` 或 `upsert` 之一。 |\n| `update` |\
  \ document | 指定要应用的更新。更新参数使用更新操作符或 field:value。 |\n| `new` | boolean | 指定是返回修改后的文档还是原始文档。默认为\
  \ false。如果 `remove` 设置为 true，则 new 被忽略。 |\n| `fields` | document | 要返回的字段子集，以 <projection>\
  \ 格式 {field1:1, field2:1 } 指定。 |\n| `upsert` | boolean | 指定如果未找到匹配选择标准的文档，是否要创建并返回一个新文档。默认为\
  \ false。必须指定 `remove` 或 `upsert` 之一。 |\n\n例如，按如下方式调用 `findAndModify()` 方法：\n*  \
  \ 设置 `query` 参数以查找 journal 字段为 Oracle Magazine 的文档。\n*   按 catalogId 字段升序排序。\n*\
  \   指定 `update` 参数，使用 `update` 操作符 `$inc` 将 catalogId 字段递增 1，并使用 `$set` 操作符为 edition\
  \ 字段设置新值。\n*   `upsert` 参数设置为 `true`，`new` 参数也设置为 `true`。\n*   `fields` 参数指定要返回的字段为\
  \ `catalogId`、`edition`、`title` 和 `author`。\n\n```\n>db.catalog.findAndModify({\n\
  \  query: {journal : \"Oracle Magazine\"},\n  sort: {catalogId : 1},\n  update:\
  \ {$inc: {catalogId: 1}, $set: {edition: '11-12-2013'}},\n  upsert :true,\n  new:\
  \ true,\n  fields: {catalogId: 1, edition: 1, title: 1, author: 1}\n})\n```\n\n\
  在调用前面的方法之前，请添加一些文档，这些文档的 `catalogId` 字段值应为数字，因为 `$inc` 操作符不能应用于非数字。由于参数 `new` 设置为\
  \ `true`，该方法返回修改后的文档，如图 2-47 所示。\n\n![9781484215999_Fig02-47.jpg](img/image00471.jpeg)\n\
  \n**图 2-47. 使用 findAndModify 方法**\n\n不能在方法调用中同时指定 `upsert` 和 `remove` 参数值。例如，运行以下命令。\n\
  \n```\ndb.catalog.findAndModify({\n  query: {journal : \"Oracle Magazine\"},\n \
  \ sort: {catalogId : 1},\n  update: {$inc: {catalogId: 1}, $set: {edition: '11-12-2013'}},\n\
  \  remove: true,\n  upsert :true,\n  new: true,\n  fields: {catalogId: 1, edition:\
  \ 1, title: 1, author: 1}\n})\n```\n\n如以下异常所示，`upsert` 和 `remove` 参数值不能共存，如图 2-48\
  \ 所示。\n\n![9781484215999_Fig02-48.jpg](img/image00472.jpeg)\n\n**图 2-48. 错误消息 “remove\
  \ and upsert can’t co-exist”**\n\n### 删除文档\n\n`db.collection.remove()` 方法用于删除文档。在\
  \ MongoDB 2.6 之前的版本中，该方法的语法如下。\n\n```\ndb.collection.remove(\n   <query>,\n   <justOne>\n\
  )\n```\n\n在 2.6 及更高版本中，`remove()` 方法的语法如下。\n\n```\ndb.collection.remove(\n   <query>,\n\
  \   {\n     justOne: <boolean>,\n     writeConcern: <document>\n   }\n)\n```\n\n\
  该方法的参数如表 2-10 所列。\n\n**表 2-10. remove 方法参数**\n\n\n\n## MongoDB `remove()`方法\n\n\
  | 参数 | 类型 | 描述 |\n| --- | --- | --- |\n| `query` | 文档 | 指定使用查询操作符的删除条件。要删除所有文档，请指定一个空文档\
  \ `{}`。在 2.6 之前的版本中，通过省略查询也可以删除所有文档。 |\n| `justOne` | 布尔值 | 指定是否仅删除单个文档。默认为 `false`，这意味着将删除所有匹配的文档。\
  \ |\n| `writeConcern` | 文档 | 写入关注级别，这在之前的章节中已经讨论过。 |\n\n在 2.6 及更高版本中，`remove()`方法会返回一个`WriteResult`对象。例如，添加三个文档，其中一个`catalogId`为\
  \ 3，两个`catalogId`为 2。\n\n```\n>db.catalog.drop()\n>doc1 = {\"_id\" : ObjectId(\"\
  53fb4b08d17e68cd481295d5\"),\"catalogId\" : 2, \"journal\" : 'Oracle Magazine',\
  \ \"publisher\" : 'Oracle Publishing', \"edition\" : 'November December 2013',\"\
  title\" : 'Engineering as a Service',\"author\" : 'David A. Kelly'}\n>db.catalog.insert(doc1)\n\
  >doc2 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d6\"), \"catalogId\" : 2, \"\
  journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing', \"edition\"\
  \ : 'November December 2013',\"title\" : 'Quintessential and Collaborative',\"author\"\
  \ : 'Tom Haunert'}\n>db.catalog.insert(doc2)\n>doc3 = {\"_id\" : ObjectId(\"53fb4b08d17e68cd481295d7\"\
  ), \"catalogId\" : 3, \"journal\" : 'Oracle Magazine', \"publisher\" : 'Oracle Publishing',\
  \ \"edition\" : 'November December 2013'}\n>db.catalog.insert(doc3)\n```\n\n随后，如下所示删除`catalogId`为\
  \ 2 的文档。\n\n```\n>db.catalog.remove({ catalogId: 2 })\n```\n\n如图 2-49 的输出所示，两个`catalogId`为\
  \ 2 的文档被删除（`nRemoved`为 2），并且在删除文档后调用`find()`方法时，只返回了`catalogId`为 3 的文档。\n\n![9781484215999_Fig02-49.jpg](img/image00473.jpeg)\n\
  \n图 2-49. 使用 `remove()` 删除文档\n\n在另一个例子中，为`catalogId`字段使用比较查询操作符`$gt`来指定查询。将`justOne`设置为\
  \ `true` 以仅删除一个文档，并将`writeConcern`设置为 `{ w: 1, wtimeout: 5000 }`。`w`选项的值为 1 表示在单个\
  \ MongoDB 服务器上确认写入。如果为`w:1`指定了`wtimeout`，则会被忽略，这意味着不会发生超时，并且会从单个服务器返回确认。\n\n```\n\
  >db.catalog.remove(\n    { catalogId: { $gt: 1 } },\n    {justOne:true, writeConcern:\
  \ { w: 1, wtimeout: 5000 } }\n)\n```\n\n返回的`WriteResult`对象中的`nRemoved`字段表明有一个文档被删除，如图\
  \ 2-50 所示。\n\n![9781484215999_Fig02-50.jpg](img/image00474.jpeg)\n\n图 2-50. 在 `remove()`\
  \ 方法中使用比较查询操作符 `$gt`\n\n在 2.6 之前的版本中，要删除所有文档，`remove()`方法的调用方式如下，不带任何参数。\n\n```\n\
  >db.catalog.remove()\n```\n\n在 MongoDB 2.6 及更高版本中，要删除集合中的所有文档，必须提供一个空文档`{}`作为参数，如下所示。\n\
  \n```\n>db.catalog.remove({})\n```\n\n`remove()`方法返回一个`WriteResult`对象，其中`nRemoved`为\
  \ 3，表明已删除三个文档，如图 2-51 所示。\n\n![9781484215999_Fig02-51.jpg](img/image00475.jpeg)\n\
  \n图 2-51. 删除所有文档\n\n无法使用`remove()`方法从固定容量集合（capped collection，一种类似于循环缓冲区的固定大小集合）中删除文档。为了演示，在固定容量集合上调用`remove()`方法；首先删除`catalog`集合，然后如本章前面“创建集合”一节所讨论的，创建一个固定容量集合。\n\
  \n```\n>db.catalog.drop()\n> db.createCollection(\"catalog\", {capped: true, autoIndexId:\
  \ true, size: 64 * 1024, max: 1000} )\n>db.catalog.remove({})\n```\n\n如图 2-52 所示，会显示一条错误消息。\n\
  \n![9781484215999_Fig02-52.jpg](img/image00476.jpeg)\n\n图 2-52. 固定容量集合无法被删除\n\n\
  ### 总结\n\n在本章中，我们讨论了一些重要的 Mongo shell 方法和命令。在下一章中，我们将使用 PHP 与 MongoDB 服务器。\n\n##\
  \ 使用 PHP 驱动 MongoDB\n\nPHP 仍然是开发网站最常用的脚本语言之一。MongoDB 的 PHP 驱动可用于连接 MongoDB，并创建集合以及对数据库执行\
  \ CRUD（创建、读取、更新、删除）操作。PHP 驱动扩展`dll`并未打包在 PHP 下载包中，需要单独添加和配置。在本章中，我们将使用 MongoDB 的\
  \ PHP 驱动来连接 MongoDB 数据库服务器，并从服务器添加、查找、更新和删除数据。本章涵盖以下主题：\n\n*   入门\n*   使用集合\n* \
  \  使用文档\n\n## 入门\n\n在以下小节中，我们将讨论 PHP MongoDB 数据库驱动。我们还将讨论环境设置以及从 PHP 脚本创建到 MongoDB\
  \ 驱动的连接。\n\n## PHP MongoDB 数据库驱动概述\n\nPHP MongoDB 驱动提供了多个用于连接 MongoDB 和执行 CRUD 操作的类。PHP\
  \ 驱动中的核心类如图 3-1 所示。\n\n![9781484215999_Fig03-01.jpg](img/image00477.jpeg)\n\n图 3-1.\
  \ PHP MongoDB 驱动中的核心类\n\n主要的核心类在表 3-1 中讨论。\n\n表 3-1. PHP MongoDB 驱动核心类\n\n| 类 |\
  \ 描述 |\n| --- | --- |\n| `MongoDB` | 该类的实例用于与 MongoDB 数据库交互。类构造函数 `MongoDB::__construct\
  \ ( MongoClient $conn , string $name )` 创建一个新数据库，但不应直接调用该构造函数。而是使用 `MongoClient::__get()`\
  \ 或 `MongoClient::selectDB()` 方法创建 `MongoDB` 的实例。 |\n| `MongoClient` | 该类用于创建和管理与\
  \ MongoDB 的连接。类构造函数 `MongoClient::__construct ([ string $server = \"mongodb://localhost:27017\"\
  \ [, array $options = array(\"connect\" => TRUE) [, array $driver_options ]]] )`\
  \ 创建一个新的客户端连接。 |\n| `MongoCollection` | 该类表示一个 MongoDB 集合。 |\n| `MongoCursor` |\
  \ 该类表示一个游标，用于迭代数据库查询的结果集。 |\n\nMongoDB 服务器操作可能会产生异常。一些主要的异常类型如图 3-2 所示。\n\n![9781484215999_Fig03-02.jpg](img/image00478.jpeg)\n\
  \n图 3-2. MongoDB 生成的异常类型\n\n主要的异常在表 3-2 中讨论。\n\n表 3-2. 主要异常类\n\n| 异常类 | 描述 |\n|\
  \ --- | --- |\n| `MongoException` | 默认的异常类，所有其他异常类都必须扩展此类。如果插入的文档为空，则由 `MongoCollection::batchInsert`\
  \ 和 `MongoCollection::insert` 方法抛出。 |\n| `MongoResultException` | 一些命令辅助方法（如 `MongoCollection::findAndModify`）会抛出此异常。\
  \ |\n| `MongoCursorException` | 任何未能收到预期回复的数据库请求都会抛出此异常。如果设置了 `w` 选项但写入失败，`MongoCollection::update`、`MongoCollection::batchInsert`\
  \ 和 `MongoCollection::insert` 会抛出此异常。 |\n| `MongoConnectionException` | 当驱动程序无法连接到数据库时抛出。`MongoClient::connect`\
  \ 和 `MongoCollection::findOne` 如果无法连接到数据库，会抛出 `MongoConnectionException`。 |\n| `MongoDuplicateKeyException`\
  \ | 如果将文档插入到一个集合中，而该集合中已存在另一个具有相同唯一键的文档，则抛出此异常。 |\n\n## 环境设置\n\n\n\n"
- "# MongoDB 和 PHP 环境安装与连接\n\n## 安装所需软件\n\n除了安装 MongoDB 服务器外，我们还需要安装以下软件：\n*   MongoDB\
  \ Server\n*   PHP\n*   PHP Driver for MongoDB\n\n## 安装 MongoDB Server\n\n下载并安装 MongoDB\
  \ 3.0.5。将 MongoDB 的 `bin` 目录（例如 `C:\\Program Files\\MongoDB\\Server\\3.0\\bin`）添加到\
  \ `PATH` 环境变量中。使用以下命令启动 MongoDB 服务器：\n\n```\n>mongod\n```\n\n命令的输出表明 MongoDB 服务器已启动，如图\
  \ 3-3 所示。\n\n![9781484215999_Fig03-03.jpg](img/image00479.jpeg)\n图 3-3. 启动 MongoDB\n\
  \n## 安装 PHP\n\n运行 PHP 脚本需要 Web 服务器。PHP 5.4 及更高版本在安装包中包含了 Web 服务器。\n\n1.  从 `http://windows.php.net/download/`\
  \ 下载 PHP 5.5 (5.5.26) VC11 x64 Thread-Safe 版本的 PHP zip 文件 `php-5.5.26-Win32-VC11-x64.zip`。也可以使用更高的\
  \ PHP 版本。支持 PHP 5.3、5.4、5.5 和 5.6。VC11 版本需要预先安装 Visual C++ Redistributable for Visual\
  \ Studio 2012 x86 或 x64。\n2.  将 `php-5.5.26-Win32-VC11-x64.zip` 文件解压到一个目录，会创建一个\
  \ `php-5.5.26-Win32-VC11-x64` 目录。如果使用不同版本，目录名会不同。\n3.  创建一个文档根目录（本章使用 `C:\\php`），并将文件和目录从\
  \ `php-5.5.26-Win32-VC11-x64` 目录复制到 `C:\\php` 目录。\n4.  在 PHP 安装的根目录 `C:\\php` 中，将\
  \ PHP 配置文件 `php.ini-development` 或 `php.ini-production` 重命名为 `php.ini`。\n5.  从文档根目录\
  \ `C:\\php` 使用以下命令在端口 8000 启动内置的 Web 服务器：\n\n```\n    php -S localhost:8000\n```\n\
  \n命令的输出表明开发服务器已启动并正在监听 `http://localhost:8000`，如图 3-4 所示。\n\n![9781484215999_Fig03-04.jpg](img/image00480.jpeg)\n\
  图 3-4. 启动 PHP Web 服务器\n\n6.  任何复制到文档根目录 (`C:\\php`) 的 PHP 脚本都可以在集成 Web 服务器上运行。PHP\
  \ 脚本可以复制到文档根目录的子目录中，并通过在 URL 中包含从文档根目录开始的目录路径来运行。将以下脚本 `hellomongo.php` 复制到文档根目录的\
  \ `C:\\php` 目录。\n\n```\n    <html>\n     <head>\n      <title>PHP Test</title>\n\
  \     </head>\n     <body>\n     <?php echo '<p>Hello MongoDB</p>'; ?>\n     </body>\n\
  \    </html>\n```\n\n7.  使用 URL `http://localhost:8000/hellomongo.php` 运行该脚本。输出如图\
  \ 3-5 所示。\n\n![9781484215999_Fig03-05.jpg](img/image00481.jpeg)\n图 3-5. 运行 PHP 脚本\n\
  \n## 安装 PHP Driver for MongoDB\n\n要下载的驱动程序版本取决于所使用的 MongoDB 版本。PHP MongoDB 驱动程序和\
  \ MongoDB 版本的兼容性矩阵列在表 3-3 中。\n\n表 3-3. 兼容性矩阵\n\n| PHP Driver | MongoDB Driver |\n\
  | --- | --- |\n| 1.6 | 2.4, 2.6, 3.0 |\n| 1.5 | 2.4, 2.6 |\n\n因为我们使用的是 MongoDB 3.0.5，所以要下载的兼容\
  \ PHP 驱动程序版本是 1.6。\n\n1.  从 `http://pecl.php.net/package/mongo` 下载 PHP MongoDB Database\
  \ Driver。因为我们使用的是 PHP 5.5，所以需要从 `https://pecl.php.net/package/mongo/1.6.10/windows`\
  \ 下载 5.5 Thread Safe (TS) x64 版本的 `php_mongo-1.6.10-5.5-ts-vc11-x64.zip` 文件。\n2.\
  \  将 `php_mongo-1.6.10-5.5-ts-vc11-x64.zip` 文件解压到一个目录。\n3.  将解压目录中的 `php_mongo.dll`\
  \ 文件复制到 PHP 安装的文档根目录 `C:\\php`。\n4.  将以下配置添加到 `php.ini` 文件中：\n\n```\n    extension=php_mongo.dll\n\
  ```\n\n5.  重启 PHP Web 服务器。\n\n![Image](img/image00482.jpeg) **注意** 在后续章节中，我们将运行\
  \ PHP 脚本来连接 MongoDB 并在服务器上执行增删改查操作。在每个后续部分（除非特别说明）之前，在 Mongo shell 中运行以下命令，从 `local`\
  \ 数据库中删除 `catalog` 集合；可以通过 `mongo` 命令启动 Mongo shell：\n\n```\nuse local\ndb.catalog.drop()\n\
  ```\n\n对于每个部分，我们将使用一个空集合，这样前一部分的文档就不会被使用，只有当前部分的脚本用于演示 PHP MongoDB 驱动程序。\n\n## 创建连接\n\
  \n在文档根目录 `C:\\php` 中创建一个 PHP 脚本 `mongoconnection.php`。使用 `MongoClient` 构造函数连接到 MongoDB\
  \ 数据库，如下所示：\n\n```\n$connection = new MongoClient();\n```\n\n构造函数中未指定任何连接参数时，会建立到\
  \ `localhost:27017` 的连接，其中 `localhost` 是默认的 MongoDB 主机，27017 是默认的 MongoDB 端口。输出连接详情：\n\
  \n```\nprint 'Connection: <br/>';\nvar_dump($connection);\n```\n\n生成的输出如下：\n\n```\n\
  object(MongoClient)#1 (4) { [\"connected\"]=> bool(true) [\"status\"]=> NULL [\"\
  server\":protected]=> NULL [\"persistent\":protected]=> NULL }\n```\n\n其中 `[\"connected\"\
  ]=> bool(true)` 表示客户端脚本已连接到 MongoDB。可以使用 `getWriteConcern()` 方法输出写关注点，如下所示：\n\n\
  ```\nvar_dump($connection->getWriteConcern());\n```\n\n以下输出表示 `w` 的值为 1，`wtimeout`\
  \ 的值为 -1：\n\n```\narray(2) { [\"w\"]=> int(1) [\"wtimeout\"]=> int(-1) }\n```\n\n\
  可以使用必须以 `mongodb://` 开头的连接字符串来建立连接：\n\n```\n$connection = new MongoClient( \"mongodb://localhost:27017\"\
  \ );\n```\n\n使用 `getReadPreference()` 方法输出读偏好。输出表明读取操作被定向到副本集中的主成员，这也是默认设置：\n\n\
  ```\narray(1) { [\"type\"]=> string(7) \"primary\" }\n```\n\n使用 `listDBs()` 方法列出服务器上的数据库。输出一个包含数据库信息的数组。对于每个数据库，输出其名称、`sizeOnDisk`、`empty`\
  \ 属性。示例脚本中的三个数据库是 `catalog`、`local` 和 `test`：\n\n```\narray(3) { [\"databases\"\
  ]=> array(3) { [0]=> array(3) { [\"name\"]=> string(5) \"Loc8r\" [\"sizeOnDisk\"\
  ]=> float(83886080) [\"empty\"]=> bool(false) } [1]=> array(3) { [\"name\"]=> string(5)\
  \ \"local\" [\"sizeOnDisk\"]=> float(83886080) [\"empty\"]=> bool(false) } [2]=>\
  \ array(3) { [\"name\"]=> string(4) \"test\" [\"sizeOnDisk\"]=> float(83886080)\
  \ [\"empty\"]=> bool(false) } } [\"totalSize\"]=> float(251658240) [\"ok\"]=> float(1)\
  \ }\n```\n\n连接字符串中使用的主机名也可以是 IPv4 地址，如下所示。不同用户的 IPv4 地址会不同，可以使用 `ipconfig/all` 命令查找：\n\
  \n```\n$connection = new MongoClient(\"mongodb://192.168.1.72:27017\");\n```\n\n\
  可以使用 `getConnections()` 方法列出所有打开的连接。连接信息（包括主机、端口和连接类型，示例连接为 `STANDALONE`）将被列出。\n\
  \n\n\n"
