  图 7-12. 列出 default 存储桶中的文档\n\n`catalog1` ID 的 JSON 文档将显示，如图 7-13 所示。\n![9781484215999_Fig07-13.jpg](img/image00621.jpeg)\n\
  图 7-13. 列出 catalog1 文档 JSON\n\n8.  同样地，列出`catalog2`文档，如图 7-14 所示。\n![9781484215999_Fig07-14.jpg](img/image00622.jpeg)\n\
  图 7-14. 列出 catalog2 文档 JSON\n\n### 创建 Couchbase 视图\n\n存储在 Couchbase Server 中的 JSON\
  \ 数据可以使用视图进行索引，视图根据定义的格式和结构在数据上创建索引。视图从 Couchbase Server 中的 JSON 文档对象提取字段，并创建可查询的索引。视图是一个逻辑结构，映射函数将存储在\
  \ Couchbase Server 中的 JSON 文档对象的字段映射到视图。\n\n可选地，也可以应用规约函数来汇总（或平均或求和）数据。在本节中，我们在\
  \ Couchbase Server 中的 JSON 文档上创建一个视图。映射函数具有以下格式。\n```\nfunction(doc, meta) {\n \
  \ emit(doc.name, [doc.field1, doc.field2]);\n}\n```\n\n当函数被转换为`map()`函数时，`map()`函数为存储在存储桶中的每个文档提供两个参数：`doc`参数和`meta`参数。`doc`参数是存储在\
  \ Couchbase 存储桶中的文档对象，其内容类型可以通过`meta.type`字段识别。`meta`参数是存储在存储桶中的文档对象的元数据。数据存储桶中的每个文档都会提交给`map()`函数。在`map()`函数内，可以指定任何自定义代码。`emit()`函数用于从`map()`函数发出一行或一条数据记录。`emit()`函数接受两个参数：一个键和一个值。\n\
  ```\nemit(key, value)\n```\n\n发出的键用于对映射到视图的文档对象字段进行排序和查询。键可以是任何格式，例如字符串、数字、复合结构（如数组）或\
  \ JSON 对象。值是要在一行或记录中输出的数据，它可以是任何格式，包括字符串、数字、数组或 JSON。指定以下函数用于从 Couchbase Server\
  \ 存储桶到视图的映射。该函数首先测试文档的类型是否为 JSON，随后发出记录，每个记录的键是文档名称，每个记录的值是文档对象字段中存储的数据。\n\n接下来，在\
  \ Couchbase Console 中创建一个视图。\n\n1.  选择数据存储桶 ![image](img/image00406.jpeg) default\
  \ 存储桶。随后，选择视图。默认选择开发视图选项卡。\n2.  单击创建开发视图以创建开发视图，如图 7-15 所示。\n![9781484215999_Fig07-15.jpg](img/image00623.jpeg)\n\
  图 7-15. 选择创建开发视图\n3.  在创建开发视图对话框中，指定设计文档名称（`_design/dev_catalog`）和视图名称（`catalog_view`），如图\
  \ 7-16 所示。当使用 Java 客户端以编程方式访问时，设计文档名称中不包含`_design`前缀。单击保存。\n![9781484215999_Fig07-16.jpg](img/image00624.jpeg)\n\
  图 7-16. 创建开发视图\n将创建一个名为`catalog_view`的开发视图，如图 7-17 所示。\n![9781484215999_Fig07-17.jpg](img/image00625.jpeg)\n\
  图 7-17. catalog_view 视图\n4.  我们需要编辑默认的 Map 函数，以输出包含 journal、publisher、edition、title\
  \ 和 author 字段键值对的 JSON。单击编辑以编辑视图。\n5.  将以下函数复制到视图代码 ![image](img/image00406.jpeg)\
  \ Map 区域。\n```\nfunction(doc,meta) {\n  if (meta.type == 'json') {\n  emit(doc.name,\
  \ [doc.journal,doc.publisher,doc.edition,doc.title,doc.author]);\n  }\n}\n```\n\n"
- "# 保存 Map 函数\n\n6.  点击 **Save** 以保存 Map 函数。包含视图代码的 `catalog_view` 视图如 图 7-18 所示。\n\
  \n    ![9781484215999_Fig07-18.jpg](img/image00626.jpeg)\n    图 7-18：`catalog_view`\
  \ 视图的 Map 函数\n\n7.  我们需要在能够通过 Couchbase Java 客户端访问视图之前，将开发视图转换为生产视图。点击如 图 7-19 所示的\
  \ **Publish**，将视图转换为生产视图。\n\n    ![9781484215999_Fig07-19.jpg](img/image00627.jpeg)\n\
  \    图 7-19：将 `catalog_view` 转换为生产视图\n\n### 将 Couchbase 文档迁移到 MongoDB\n\n在本节中，我们将查询先前存储在\
  \ Couchbase Server 中的 JSON 文档，并将其迁移到 MongoDB 数据库。我们将使用 `MigrateCouchbaseToMongoDB`\
  \ 应用程序将 JSON 文档从 Couchbase Server 迁移到 MongoDB 数据库。我们向 Couchbase Server 添加了一个封装在设计文档中的视图，以便可以使用该视图查询\
  \ Couchbase Server。视图由 `com.couchbase.client.java.view.View` 类表示，视图查询由 `com.couchbase.client.java.view.ViewQuery`\
  \ 类表示，该类提供了 `from(java.lang.String design, java.lang.String view)` 类方法来创建 `ViewQuery`\
  \ 实例。`Bucket` 类提供了重载的 `query()` 方法来查询视图。每个 `query()` 方法都返回一个 `ViewResult` 实例，该实例表示来自\
  \ `ViewQuery` 的结果。我们将使用视图查询为 Couchbase Server 中存储的文档生成 `ViewResult`，然后迭代视图结果以将 JSON\
  \ 文档迁移到 MongoDB。\n\n1.  在 `MigrateCouchbaseToMongoDB` 应用程序的 `main` 方法中，如前所述创建一个\
  \ `Bucket` 实例。\n\n    ```java\n    Cluster cluster = CouchbaseCluster.create();\n\
  \    Bucket defaultBucket = cluster.openBucket();\n    ```\n\n2.  同样如 第 1 章 所讨论的，为要迁移到的\
  \ `catalog` 集合创建一个 `MongoCollection` 实例。\n\n    ```java\n    mongoClient = new MongoClient(Arrays.asList(new\
  \ ServerAddress(\"localhost\", 27017)));\n    MongoDatabase db = mongoClient.getDatabase(\"\
  local\");\n    MongoCollection<Document> coll = db.getCollection(\"catalog\");\n\
  \    ```\n\n3.  创建与 Couchbase Server 和 MongoDB 服务器的连接后，我们将把 Couchbase 文档迁移到 MongoDB。调用\
  \ `Bucket` 实例的 `query(ViewQuery query)` 方法以生成 `ViewResult` 对象。使用静态方法 `from(java.lang.String\
  \ design, java.lang.String view)` 创建 `ViewQuery` 参数，设计文档名称为 `catalog`，视图名称为 `catalog_view`，这些在上一节中已创建。\n\
  \n    ```java\n    ViewResult result = defaultBucket.query(ViewQuery.from(\"catalog\"\
  , \"catalog_view\"));\n    ```\n\n4.  `ViewResult` 提供了重载的 `rows()` 方法，该方法返回视图结果中行的\
  \ `Iterator`。`ViewRow` 接口表示视图行。使用增强的 `for` 循环，迭代 `ViewResult` 中的行并将每一行输出到 MongoDB。\n\
  \n    ```java\n    for (ViewRow row : result) {\n        // 将每一行迁移到 MongoDB\n  \
  \  }\n    ```\n\n5.  MongoDB Java 驱动程序中的文档由 `org.bson.Document` 类表示。为 `ViewResult`\
  \ 中的每一行创建一个 `Document` 实例。Couchbase Server 驱动程序中的 JSON 文档由 `JsonDocument` 类表示。可以使用\
  \ `document()` 方法从 `ViewRow` 实例获取 `JsonDocument` 实例。随后，使用 `content()` 方法从 `JsonDocument`\
  \ 获取 JSON 对象。\n\n    `JsonObject` 实例具有 JSON 文档的字段/值对。使用 `getNames()` 方法从 `JsonObject`\
  \ 获取字段名称作为 `Set`。使用 `iterator()` 方法从 `Set` 获取 `Iterator`。使用 `while` 循环迭代字段名称，并将每个字段名称作为\
  \ `String` 获取。使用 `JsonObject` 中的 `getString(String fieldName)` 方法获取字段值。使用 `Document`\
  \ 中的 `append(String key, Object value)` 方法将字段/值对添加到要存储在 MongoDB 中的 BSON 文档。\n\n\
  \    ```java\n    for (ViewRow viewRow : result) {\n        Document catalog = new\
  \ Document();\n        JsonDocument json = viewRow.document();\n        JsonObject\
  \ jsonObj = json.content();\n        Set<java.lang.String> fieldNames = jsonObj.getNames();\n\
  \        Iterator<String> iter = fieldNames.iterator();\n        while (iter.hasNext())\
  \ {\n            String fieldName = iter.next();\n            String fieldValue\
  \ = jsonObj.getString(fieldName);\n            catalog = catalog.append(fieldName,\
  \ fieldValue);\n        }\n    ```\n\n6.  创建了要存储在 MongoDB 的 `Document` 实例后，调用 `MongoCollection`\
  \ 实例的 `insertOne(TDocument document)` 方法将 BSON 文档存储在 MongoDB 中。\n\n    ```java\n\
  \    coll.insertOne(catalog);\n    ```\n\n`MigrateCouchbaseToMongoDB` 应用程序如下所列。\n\
  \n```java\npackage mongodb;\n\nimport java.util.Arrays;\nimport java.util.Iterator;\n\
  import java.util.Set;\nimport org.bson.Document;\nimport com.couchbase.client.java.Bucket;\n\
  import com.couchbase.client.java.Cluster;\nimport com.couchbase.client.java.CouchbaseCluster;\n\
  import com.couchbase.client.java.document.JsonDocument;\nimport com.couchbase.client.java.document.json.JsonObject;\n\
  import com.couchbase.client.java.view.ViewQuery;\nimport com.couchbase.client.java.view.ViewResult;\n\
  import com.couchbase.client.java.view.ViewRow;\nimport com.mongodb.MongoClient;\n\
  import com.mongodb.ServerAddress;\nimport com.mongodb.client.MongoCollection;\n\
  import com.mongodb.client.MongoDatabase;\n\npublic class MigrateCouchbaseToMongoDB\
  \ {\n    private static Bucket defaultBucket;\n    private static MongoClient mongoClient;\n\
  \    public static void main(String[] args) {\n        Cluster cluster = CouchbaseCluster.create();\n\
  \        defaultBucket = cluster.openBucket();\n        migrate();\n    }\n    public\
  \ static void migrate() {\n        mongoClient = new MongoClient(Arrays.asList(new\
  \ ServerAddress(\n                \"localhost\", 27017)));\n        MongoDatabase\
  \ db = mongoClient.getDatabase(\"local\");\n        MongoCollection<Document> coll\
  \ = db.getCollection(\"catalog\");\n        ViewResult result = defaultBucket.query(ViewQuery.from(\"\
  catalog\",\n                \"catalog_view\"));\n        for (ViewRow viewRow :\
  \ result) {\n            Document catalog = new Document();\n            JsonDocument\
  \ json = viewRow.document();\n            JsonObject jsonObj = json.content();\n\
  \            Set<java.lang.String> fieldNames = jsonObj.getNames();\n          \
  \  Iterator<String> iter = fieldNames.iterator();\n            while (iter.hasNext())\
  \ {\n                String fieldName = iter.next();\n                String fieldValue\
  \ = jsonObj.getString(fieldName);\n                catalog = catalog.append(fieldName,\
  \ fieldValue);\n            }\n            coll.insertOne(catalog);\n        }\n\
  \    }\n}\n```\n\n7.  要运行 `MigrateCouchbaseToMongoDB` 应用程序，请在 Package Explorer 中右键单击\
  \ `MigrateCouchbaseToMongoDB.java`，然后选择 **Run As** ![image](img/image00406.jpeg)\
  \ **Java Application**，如 图 7-20 所示。\n\n    ![9781484215999_Fig07-20.jpg](img/image00628.jpeg)\n\
  \n\n## 运行迁移应用程序\n\n运行 MigrateCouchbaseToMongoDB 应用程序。\n\nCouchbase Server 文档被迁移到\
  \ MongoDB。随后在 Mongo shell 中运行以下命令。\n```\n>use local\n>db.catalog.find()\n```\n\n\
  迁移到 MongoDB 的两个 JSON 文档如 图 7-21 所示。\n\n![9781484215999_Fig07-21.jpg](img/image00629.jpeg)\n\
  图 7-21. 在 Mongo shell 中列出迁移的文档\n\n## 小结\n\nCouchbase 和 MongoDB 都将文档存储为 JSON 格式，但\
  \ MongoDB 在文档处理方面具有一些优势。在本章中，我们将一个 Couchbase 文档迁移到了 MongoDB。首先，我们在 Eclipse IDE 中用\
  \ Java 应用程序在 Couchbase 中创建了一个 JSON 文档。随后，我们在另一个 Java 应用程序中将该 Couchbase 文档迁移到了 MongoDB。下一章我们将迁移一个\
  \ Oracle Database 表到 MongoDB。\n\n"
- "# 第 8 章\n\n![image](img/image00404.jpeg)\n\n## 迁移 Oracle 数据库\n\nMongoDB 是领先的 NoSQL\
  \ 数据库。MongoDB 使用 BSON（二进制 JSON）数据格式存储文档，这是最灵活的数据模型，支持创建数据结构的层次结构。Oracle Database\
  \ 则以固定模式的表格格式存储数据。这两种数据库的模型截然不同：MongoDB 基于文档存储，而 Oracle Database 基于由列和行组成的二维矩阵的固定表格格式。在本章中，我们将把一个\
  \ Oracle Database 表迁移到 MongoDB Server。虽然没有直接从 Oracle 迁移到 MongoDB 的迁移工具，但 MongoDB\
  \ 提供了一个名为 `mongoimport` 的导入工具，用于将 CSV、TSV 或 JSON 文件中的数据导入到 MongoDB 数据库中。我们将首先将 Oracle\
  \ Database 表导出为 CSV 文件，随后使用 `mongoimport` 工具将 CSV 文件数据导入 MongoDB Server。本章涵盖以下主题。\n\
  \n-   `mongoimport` 工具概述\n-   环境设置\n-   创建 Oracle Database 表\n-   将 Oracle Database\
  \ 表导出为 CSV 文件\n-   从 CSV 文件导入数据到 MongoDB\n-   显示 MongoDB 中的 JSON 数据\n\n## mongoimport\
  \ 工具概述\n\n`mongoimport` 工具用于将数据从文件（CSV、TSV 或 JSON）传输到 MongoDB Server。使用 `mongoimport`\
  \ 工具的语法如下。\n```\nmongoimport <options> <file>\n```\n\n`mongoimport` 支持的一些选项在 表 8-1\
  \ 中讨论。\n\n表 8-1. mongoimport 工具支持的选项\n| 选项 | 描述 |\n| --- | --- |\n| `-v , --verbose`\
  \ | 详细输出选项。多次包含以获取更多详细信息，例如 `-vvv`。 |\n| `--quiet` | 不生成命令输出（数据仍会传输）。 |\n| `-h,\
  \ --host` | 要连接的 MongoDB 主机。可包含端口，格式为 `--host host:port`。 |\n| `--port` | 要连接的 MongoDB\
  \ 端口。 |\n| `-u, --username` | 认证用户名。 |\n| `-p, --password` | 认证密码。 |\n| `-d, --db`\
  \ | 要使用的数据库实例。 |\n| `-c, --collection` | 要使用的集合。 |\n| `-f, --fields` | 以逗号分隔的字段名。\
  \ |\n| `--file` | 要从中导入的文件。如果未指定，则使用 `stdin`。可以是 `.csv`、`.json` 或 `.tsv` 文件。 |\n\
  | `--headerline` | 使用输入文件中的第一行作为字段列表。 |\n| `--jsonArray` | 输入源是 JSON 数组。 |\n| `--type`\
  \ | 要导入的输入格式。值可以是 `json`、`csv` 或 `tsv`。默认为 `json`。 |\n| `--drop` | 在插入文档前删除集合。 |\n\
  | `--ignoreBlanks` | 忽略 CSV 和 TSV 中值为空的字段。 |\n| `--maintainInsertionOrder` | 维护插入顺序。\
  \ |\n| `--stopOnError` | 在第一次插入/更新错误时停止导入。 |\n| `--upsert` | 插入或更新已存在的对象。 |\n| `--writeConcern`\
  \ | 写关注选项。 |\n| `--numInsertionWorkers, -j` | 并发运行的插入操作数。 |\n| `--fieldFile` | 包含字段名的文件\
  \ - 每行一个。 |\n\n## 环境设置\n\n我们需要为本章下载以下软件。\n\n-   Oracle Database 12c。从 `www.oracle.com/technetwork/database/enterprise-edition/downloads/index-092322.html`\
  \ 下载。\n-   MongoDB Server（版本：3.0.5）。\n-   `mongoimport` 工具随 MongoDB Server 一起安装，对于\
  \ Windows 系统，位于 `C:\\Program Files\\MongoDB\\Server\\3.0\\bin` 目录中。\n\n提醒一下，在安装和配置\
  \ MongoDB Server 时，创建 `c:\\data\\db` 目录。\n\n## 创建 Oracle Database 表\n\n首先，使用以下 SQL\
  \ 脚本创建一个 Oracle Database 表 `WLSLOG`。该脚本可以从 SQL*Plus 运行。\n```\nCREATE TABLE OE.WLSLOG\
  \ (ID VARCHAR2(255) PRIMARY KEY, TIME_STAMP VARCHAR2(255), CATEGORY VARCHAR2(255),\
  \ TYPE VARCHAR2(255), SERVERNAME VARCHAR2(255), CODE VARCHAR2(255), MSG VARCHAR2(255));\n\
  INSERT INTO OE.WLSLOG (ID, TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values\
  \ ('catalog1','Apr-8-2014-7:06:16-PM-PDT','Notice','WebLogicServer','AdminServer','BEA-000365','Server\
  \ state changed to STANDBY');\nINSERT INTO OE.WLSLOG (ID, TIME_STAMP, CATEGORY,\
  \ TYPE, SERVERNAME, CODE, MSG) values ('catalog2','Apr-8-2014-7:06:17-PM-PDT','Notice','WebLogicServer','AdminServer','BEA-000365','Server\
  \ state changed to STARTING');\nINSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY,\
  \ TYPE, SERVERNAME, CODE, MSG) values ('catalog3','Apr-8-2014-7:06:18-PM-PDT', 'Notice',\
  \ 'WebLogicServer', 'AdminServer', 'BEA-000365', 'Server state changed to ADMIN');\n\
  INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values\
  \ ('catalog4','Apr-8-2014-7:06:19-PM-PDT', 'Notice', 'WebLogicServer', 'AdminServer',\
  \ 'BEA-000365', 'Server state changed to RESUMING');\nINSERT INTO OE.WLSLOG (ID,TIME_STAMP,\
  \ CATEGORY, TYPE, SERVERNAME, CODE, MSG) values ('catalog5','Apr-8-2014-7:06:20-PM-PDT',\
  \ 'Notice', 'WebLogicServer', 'AdminServer', 'BEA-000361', 'Started WebLogic AdminServer');\n\
  INSERT INTO OE.WLSLOG (ID,TIME_STAMP, CATEGORY, TYPE, SERVERNAME, CODE, MSG) values\
  \ ('catalog6','Apr-8-2014-7:06:21-PM-PDT', 'Notice', 'WebLogicServer', 'AdminServer',\
  \ 'BEA-000365', 'Server state changed to RUNNING');\nINSERT INTO OE.WLSLOG (ID,TIME_STAMP,\
  \ CATEGORY, TYPE, SERVERNAME, CODE, MSG) values ('catalog7','Apr-8-2014-7:06:22-PM-PDT',\
  \ 'Notice', 'WebLogicServer', 'AdminServer', 'BEA-000360', 'Server started in RUNNING\
  \ mode');\n```\n\n## 将 Oracle Database 表导出为 CSV 文件\n\n接下来，将 Oracle Database 表导出为\
  \ CSV 文件。在 SQL*Plus 中运行以下 SQL 脚本，从 `OE.WLSLOG` 表中选择数据并导出到 `wlslog.csv` 文件。\n```\n\
  set pagesize 0 linesize 500 trimspool on feedback off echo off\nselect ID || ','\
  \ || TIME_STAMP || ',' || CATEGORY || ',' || TYPE || ',' || SERVERNAME || ',' ||\
  \ CODE || ',' || MSG from OE.WLSLOG;\nspool wlslog.csv\n/\nspool off\n```\n\n如 图\
  \ 8-1 所示运行 SQL 脚本，数据将被导出到 `wlslog.csv` 文件。\n\n![9781484215999_Fig08-01.jpg](img/image00630.jpeg)\n\
  图 8-1. 将 Oracle Database 表导出为 CSV 文件\n\n从导出的输出中移除开头的 `SQL> /` 和结尾的 `SQL> spool off`，然后将其保存为\
  \ `wlslog.csv` 文件。需要移除这些首尾行，因为 `mongoimport` 工具的输入应该是一个 CSV 文件。\n\n\n### 从 CSV 文件导入数据到\
  \ MongoDB\n\n```catalog1,Apr-8-2014-7:06:16-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
  \ state changed to STANDBY catalog2,Apr-8-2014-7:06:17-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
  \ state changed to STARTING catalog3,Apr-8-2014-7:06:18-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
  \ state changed to ADMIN catalog4,Apr-8-2014-7:06:19-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
  \ state changed to RESUMING catalog5,Apr-8-2014-7:06:20-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000361,Started\
  \ WebLogic AdminServer catalog6,Apr-8-2014-7:06:21-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000365,Server\
  \ state changed to RUNNING catalog7,Apr-8-2014-7:06:22-PM-PDT,Notice,WebLogicServer,AdminServer,BEA-000360,Server\
  \ started in RUNNING mode```\n\n在本节中，我们将使用 `mongoimport` 工具将数据从 `wlslog.csv` 文件传输到\
  \ MongoDB 服务器。\n\n1.  使用以下命令启动 MongoDB 服务器。\n\n    ```\n    >mongod\n    ```\n\n\
  \    MongoDB 在 `localhost` 的 `27017` 端口上启动，如 图 8-2 所示。\n\n    ![9781484215999_Fig08-02.jpg](img/image00631.jpeg)\n\
  \    图 8-2. 启动 MongoDB 服务器\n\n2.  运行 `mongoimport` 工具，将数据从 `wlslog.csv` 文件传输到 MongoDB\
  \ 服务器。命令选项列于 表 8-2。\n\n    表 8-2. `mongoimort` 工具命令所使用的命令参数\n\n    | 选项 | 值 | 描述\
  \ |\n    | --- | --- | --- |\n    | `--db` | `wls` | MongoDB 数据库实例。该数据库无需在运行 `mongoimport`\
  \ 工具之前创建，会在导入工具运行时自动创建。 |\n    | `--collection` | `wlslog` | 集合名称。该集合同样无需在运行导入工具之前创建。\
  \ |\n    | `--type` | `csv` | 输入数据的类型是 CSV。 |\n    | `--fields` | `ID`,`TIME_STAMP`,`CATEGORY`,`TYPE`,`SERVERNAME`,`CODE`,`MSG`\
  \ | 输入字段。 |\n    | `--file` | `wlslog.csv` | 输入文件。 |\n\n3.  运行以下 `mongoimport` 命令。\n\
  \n    ```\n    mongoimport --db wls --collection wlslog --type csv --fields ID,TIME_STAMP,CATEGORY,TYPE,SERVERNAME,CODE,MSG\
