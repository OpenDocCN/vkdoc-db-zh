- fmt: '# SQL查询优化相关术语


    关于[transformations](../Text/9781430248095_Ch05.xhtml#cXXX.218) 与 [and codes](../Text/9781430248095_Ch05.xhtml#cXXX.219)，以及
    [complex view merging (CVM)](../Text/9781430248095_Ch05.xhtml#cXXX.221) 和 [join
    predicate push down (JPPD)](../Text/9781430248095_Ch05.xhtml#cXXX.222)。


    涉及 [subquery unnesting (SU)](../Text/9781430248095_Ch05.xhtml#cXXX.220) 与 [subquery
    unnesting](../Text/9781430248095_Ch05.xhtml#cXXX.224)，以及 [unnesting sub query](../Text/9781430248095_Ch05.xhtml#cXXX.7c)。


    对于 [SQL statements](../Text/9781430248095_Ch05.xhtml#cXXX.223)，需要了解 [original
    query](../Text/9781430248095_Ch05.xhtml#cXXX.229)、[new query](../Text/9781430248095_Ch05.xhtml#cXXX.230)
    和 [final query](../Text/9781430248095_Ch05.xhtml#cXXX.15l)。


    包括 [tracing a query](../Text/9781430248095_Ch05.xhtml#cXXX.225)、[signature text](../Text/9781430248095_Ch05.xhtml#cXXX.227)
    以及数据库参数 `user_dump_dest`。


    # 数据库统计与执行计划相关术语


    ## 数据倾斜与直方图


    关于数据[skewed data](../Text/9781430248095_Ch04.xhtml#cXXX.173)与[Skewness](../Text/9781430248095_Ch04.xhtml#cXXX.169)，它们会[affects
    execution plan](../Text/9781430248095_Ch04.xhtml#cXXX.181)。


    这涉及[histogram](../Text/9781430248095_Ch04.xhtml#cXXX.180)的[types](../Text/9781430248095_Ch04.xhtml#cXXX.182)，例如[bucket-object
    type](../Text/9781430248095_Ch04.xhtml#cXXX.175)和[height balanced](../Text/9781430248095_Ch04.xhtml#cXXX.183)类型，以及[to
    use](../Text/9781430248095_Ch04.xhtml#cXXX.184)和[add and remove](../Text/9781430248095_Ch04.xhtml#cXXX.186)操作。


    需要理解[column statistics](../Text/9781430248095_Ch04.xhtml#cXXX.185)、[table column
    statistics](../Text/9781430248095_Ch04.xhtml#cXXX.171)与[define](../Text/9781430248095_Ch04.xhtml#cXXX.170)直方图。


    ## 执行计划与变量


    关于[bind variables](../Text/9781430248095_Ch04.xhtml#cXXX.187)，包括[peek and capture](../Text/9781430248095_Ch04.xhtml#cXXX.189)和[captured
    binds](../Text/9781430248095_Ch04.xhtml#cXXX.190)。


    以及`Cursor_Sharing`和`define`参数。


    执行计划的[variable execution time](../Text/9781430248095_Ch04.xhtml#cXXX.192)可能源于[different
    plans](../Text/9781430248095_Ch04.xhtml#cXXX.193)，例如[optimizer estimates](../Text/9781430248095_Ch04.xhtml#cXXX.195)不准导致的[
    worst plan](../Text/9781430248095_Ch04.xhtml#cXXX.194)。


    需要分析[column statistics](../Text/9781430248095_Ch04.xhtml#cXXX.196)。


    ## 其他概念


    包括[object types](../Text/9781430248095_Ch04.xhtml#cXXX.174)、[resource plan](../Text/9781430248095_Ch04.xhtml#cXXX.176)和[section,
    table](../Text/9781430248095_Ch04.xhtml#cXXX.178)。


    以及[hyperlink](../Text/9781430248095_Ch04.xhtml#cXXX.179)、[SQLT report](../Text/9781430248095_Ch04.xhtml#cXXX.172)和[SQLXECUTE
    report](../Text/9781430248095_Ch04.xhtml#cXXX.177)。


    # 报告与脚本相关术语


    ## `sqldx.sql`脚本


    关于`sqldx.sql`脚本，它需要指定[CSV directory](../Text/9781430248095_Ch14.xhtml#cXXX.647)、[FCSV
    directory](../Text/9781430248095_Ch14.xhtml#cXXX.649)、[FHTML directory](../Text/9781430248095_Ch14.xhtml#cXXX.651)、[GCSV
    directory](../Text/9781430248095_Ch14.xhtml#cXXX.653)、[HTML directory](../Text/9781430248095_Ch14.xhtml#cXXX.655)和[LOG
    directory](../Text/9781430248095_Ch14.xhtml#cXXX.657)。


    它生成[CSV formatted files](../Text/9781430248095_Ch14.xhtml#cXXX.631)和[ hierarchical
    lists](../Text/9781430248095_Ch14.xhtml#cXXX.645)，其[report format](../Text/9781430248095_Ch14.xhtml#cXXX.635)取决于[license
    level](../Text/9781430248095_Ch14.xhtml#cXXX.633)。


    [main execution](../Text/9781430248095_Ch14.xhtml#cXXX.637)后得到[final result](../Text/9781430248095_Ch14.xhtml#cXXX.639)，可打包为[zip
    file](../Text/9781430248095_Ch14.xhtml#cXXX.641)，并支持[import CSV result](../Text/9781430248095_Ch14.xhtml#cXXX.643)和查看[HTML
    DBA_HIST_SNAPSHOT report](../Text/9781430248095_Ch14.xhtml#cXXX.659)。


    ## `sqlhc.sql`脚本


    关于`sqlhc.sql`脚本，它提供[detail report](../Text/9781430248095_Ch14.xhtml#cXXX.95h)，包含[Parallel
    button page](../Text/9781430248095_Ch14.xhtml#cXXX.629)和[plan statistics button](../Text/9781430248095_Ch14.xhtml#cXXX.628)。


    ## 诊断报告


    关于[diagnostics report](../Text/9781430248095_Ch01.xhtml#cXXX.58p)，它包含[HTML report](../Text/9781430248095_Ch14.xhtml#cXXX.614)形式的[information](../Text/9781430248095_Ch14.xhtml#cXXX.613)和[historical
    information](../Text/9781430248095_Ch14.xhtml#cXXX.618)。'
