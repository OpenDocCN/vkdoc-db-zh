    \  08:46 PM           909,869 sqlt_s11992_tc.zip\n<<<Test Case File\n12/11/2012\
    \  08:46 PM            30,764 sqlt_s11992_tcx.zip\n<<<Test Case Express File\n\
    12/11/2012  08:46 PM               404 sqlt_s11992_tc_script.sql\n12/11/2012 \
    \ 08:46 PM               297 sqlt_s11992_tc_sql.sql\n12/11/2012  08:47 PM    \
    \     1,012,953 sqlt_s11992_trc.zip\n```\n\n我在上面的目录列表中高亮了两个文件。第一个文件 `sqlt_s11992_tc.zip`\
    \ 是标准测试用例文件。我们将在下一节讨论如何使用这个文件。第二个文件 `sqlt_s11992_tcx.zip` 是一个较新的创新（截至2012年12月），我们将在“测试用例快速模式”部分进行讨论。\n\
    \n## 逐步创建测试用例\n\n创建测试用例的第一步是在 SQLT 主目录下创建一个子目录。然后将 `sqlt_s11992_tc.zip` 文件复制到该目录并解压。这会创建多个文件，我们将逐一描述它们。以下是一个示例列表。\n\
    \n```\n12/11/2012  08:46 PM               132 10053.sql\n12/11/2012  08:46 PM\
    \               103 flush.sql\n12/11/2012  08:46 PM               279 plan.sql\n\
    12/11/2012  08:46 PM               404 q.sql\n12/11/2012  08:46 PM           \
    \     38 readme.txt\n12/11/2012  08:46 PM               424 sel.sql\n12/11/2012\
    \  08:46 PM               378 sel_aux.sql\n12/11/2012  08:46 PM              \
    \ 448 setup.sql\n12/11/2012  08:46 PM               267 sqlt_s11992_del_hgrm.sql\n\
    12/11/2012  08:46 PM         7,708,672 sqlt_s11992_exp.dmp\n12/11/2012  08:46\
    \ PM               683 sqlt_s11992_import.sh\n12/11/2012  08:46 PM           \
    \  5,077 sqlt_s11992_metadata.sql\n12/11/2012  08:46 PM               244 sqlt_s11992_purge.sql\n\
    12/11/2012  08:46 PM             9,720 sqlt_s11992_readme.txt\n12/11/2012  08:46\
    \ PM               362 sqlt_s11992_restore.sql\n12/11/2012  08:46 PM         \
    \   84,648 sqlt_s11992_set_cbo_env.sql\n12/11/2012  08:46 PM             1,285\
    \ sqlt_s11992_system_stats.sql\n12/11/2012  08:46 PM           909,869 sqlt_s11992_tc.zip\n\
    12/11/2012  08:46 PM               141 tc.sql\n12/11/2012  08:46 PM          \
    \     965 tc_pkg.sql\n12/11/2012  08:46 PM               117 xpress.sh\n12/11/2012\
    \  08:46 PM             1,087 xpress.sql\n```\n\n该目录中的文件，连同 SQLT 一起，就足以在您的数据库上创建一个测试用例。在下一节中，我们将详细查看这些文件。\n\
    \n## 测试用例文件说明\n\n该目录中的脚本和其他文件旨在协同工作，以简单快速地生成测试用例。我在下面列出了每个文件及其用途。稍后我们将看到这些文件如何协同工作以产生一个逼真的测试环境。\n\
    \n*   `10053.sql` – 设置级别为1的10053跟踪。\n*   `flush.sql` – 刷新共享池。\n*   `plan.sql`\
    \ – 显示最近执行的 SQL 的执行计划，并将输出假脱机到 `plan.log`。它使用 `dbms_xplan.display_cursor` 过程。\n\
    *   `q.sql` – 正在调查的 SQL 语句。\n*   `readme.txt` – 说明文档。内容非常简洁，例如：“以 sys 用户连接并执行\
    \ `setup.sql`。”\n*   `sel.sql` – 计算谓词选择性。这个小脚本依赖于 `sel_aux.sql`（见下文），提示输入表名和谓词，然后给出预测的基数（cardinality）和选择性。下面有一个使用\
    \ `sel.sql` 的示例。\n*   `sel_aux.sql` – 根据不同的谓词，与 `sel.sql` 一起产生预期的基数和选择性。\n*  \
    \ `setup.sql` – 设置系统统计信息，创建测试用户和元数据，导入对象统计信息和优化器环境，执行测试查询并显示执行计划。\n*   `sqlt_snnnnn_del_hgrm.sql`\
    \ – 删除测试用例（TC）模式的直方图。\n*   `sqlt_snnnnn_exp.dmp` – 包含统计信息的转储文件。\n*   `sqlt_snnnnn_import.sh`\
    \ – SQLT 对象导入脚本的 Unix 版本。\n*   `sqlt_snnnnn_metadat.sql` – 从 `setup.sql` 调用的脚本；创建测试用例用户和用户对象。\n\
    *   `sqlt_snnnnn_purge.sql` – 从 SQLT 存储库中移除对测试用例 SQL 的引用。\n*   `sqlt_snnnnn_readme.txt`\
    \ – 特定测试用例的文档，包含关于导出和导入 SQLT 存储库、使用 `SQLT COMPARE`（在[第10章](../Text/9781430248095_Ch10.xhtml)中介绍）、恢复\
    \ CBO 统计信息以及在快速模式和自定义模式下实现测试用例的简要说明。\n*   `sqlt_snnnnn_restore.sql` – 将 CBO 统计信息导入到测试用例中。\n\
    *   `sqlt_snnnnn_set_cbo_env.sql` – 为测试用例设置 CBO 环境。\n*   `sqlt_snnnnn_system_stats.sql`\
    \ – 在测试系统上设置系统统计信息。\n*   `tc.sql` – 运行测试 SQL 并显示执行计划。\n*   `tc_pkg.sql` – 为小测试用例文件创建\
    \ `tc.zip` 文件。\n*   `xpress.sh` – 运行 `xpress.sql` 的脚本的 Unix 版本。构建整个测试用例。\n*  \
    \ `xpress.sql` – 在快速模式下构建整个测试用例的 SQL 脚本。\n\n如您所见，一旦解压缩，`TC` 目录中就有相当多的文件。其中大部分是从\
    \ `xpress.sql` 和 `setup.sql` 中调用的，因此我们不会对每个文件都进行详细介绍，但有些文件有一些有趣的独立功能，我们将在构建测试用例后进行查看。\n\
    \n## SQL 语句示例\n\n请记住，SQLT 一次只针对一条 SQL 语句进行调优。在我们的示例案例中，我们将使用以下 SQL：\n\n```sql\n\
    select\n  country_name, sum(AMOUNT_SOLD)\nfrom sales s, customers c, countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\n这个示例 SQL 计算欧盟各国消费总额。以下是运行此查询的结果：\n\n```\nCOUNTRY_NAME                 \
    \            SUM(AMOUNT_SOLD)\n---------------------------------------- ----------------\n\
    Poland                                            8447.14\nDenmark           \
    \                             1977764.79\nSpain                              \
    \            2090863.44\nFrance                                         3776270.13\n\
    Italy                                          4854505.28\nUnited Kingdom    \
    \                             6393762.94\nGermany                            \
    \            9210129.22\n\n7 rows selected.\n```"
