    在我的示例中，所有元数据对象都是有效的，并且我没有包、视图、函数或过程。由于没有无效对象，我按 Return 键继续步骤 2。


    ## 步骤 2：从仓库中清除先前的 SQL 语句


    在步骤 2 中，运行 `sqlt_snnnnn_purge.sql`。这会从 SQLT 仓库中清除与正在分析的 SQL 语句相关的所有数据。根据需要重新加载测试用例是常见操作。脚本输出如下所示。


