    \ CBO（基于成本的优化器）进行查询转换的基于成本的优化器参数：\n\n*   `_complex_view_merging`\n*   `_convert_set_to_join`\n\
    *   `_unnest_subquery`\n*   `_optimizer_cost_based_transformation`\n*   `_optimizer_extend_jppd_view_types`\n\
    *   `_optimizer_filter_pred_pullup`\n*   `_optimizer_group_by_placement`\n*  \
    \ `_optimizer_improve_selectivity`\n*   `_optimizer_join_elimination_enabled`\n\
    *   `_optimizer_join_factorization`\n*   `_optimizer_multi_level_push_pred`\n\
    *   `_optimizer_native_full_outer_join`\n*   `_optimizer_order_by_elimination_enabled`\n\
    *   `_optimizer_push_pred_cost_based`\n*   `_optimizer_unnest_all_subqueries`\n\
    *   `_optimizer_unnest_corr_set_subq`\n*   `_optimizer_squ_bottomup`\n*   `_optimizer_null_aware_antijoin`\n\
    *   `_pred_move_around`\n*   `_push_join_predicate`\n\n以下是一些影响此行为的提示：\n\n*   `first_rows(n)`\n\
    *   `no_query_transformation`\n*   `unnest`\n*   `no_unnest`\n*   `push_pred`\n\
    *   `no_push_pred`\n*   `push_subq`\n*   `native_full_outer_join`\n*   `no_push_subq`\n\
    *   `no_set_to_join`\n*   `qb_name`\n"
- fmt: "This is by no means a complete list of all the hidden parameters influencing\
    \ the optimizer. These parameters can be used to turn on and off certain features.\
    \ For example, `unnest_subquery` has a default value of `TRUE` (for versions of\
    \ Oracle after 9.0) or later. In most situations you would only notice the problems\
    \ if you were tuning SQL and found that some hint or some system parameter was\
    \ not changing the execution plan the way you would expect. In some situations\
    \ it is merely a lack of performance (or a sudden change of performance) that\
    \ is the clue that something may be wrong. These parameters should only be set\
    \ if Oracle support asks you to set them. They are generally only set for a short\
    \ time to debug certain issues associated with these transformations and bugs\
    \ associated with them, but there’s no reason not to open a Service Request with\
    \ Oracle and ask if you can try something. Support people at Oracle are all very\
    \ helpful and accommodating (honest).\n\n## Optimizer Parameters\n\nLuckily the\
    \ 10053 trace file lists optimizer parameters and their default values so that\
    \ you can tell if there have been any changes. In the section titled **“PARAMETERS\
    \ USED BY THE OPTIMIZER”** (as shown in [Figure 5-6](#9781430248095_Ch05.xhtml#Fig6)),\
    \ we see the first few entries of these parameters. Note that **“Compilation Environment\
    \ Dump”** and **“Bug Fix Control Environment”** are subheadings present in both\
    \ the altered values and default values section. In our case there are no altered\
    \ values for either of these subsections in the altered values section. In the\
    \ default values section the first actual parameter shown with a default value\
    \ is `optimizer_mode_hinted` (which is set to `false`). All the parameters are\
    \ listed (including the hidden ones). Play with these at your peril, however.\
    \ If support asks you to change one of these parameters, it is because they are\
    \ helping you with some problem related to the optimizer. Also note that any non-default\
    \ parameters are shown in a separate section entitled **“PARAMETERS WITH ALTERED\
    \ VALUES”**.\n\n![9781430248095_Fig05-06.jpg](Images/9781430248095_Fig05-06.jpg)\n\
    \n[Figure 5-6](#9781430248095_Ch05.xhtml#_Fig6) .  The optimizer parameter section\
    \ of the 10053 trace file\n\nAs an example, let’s see what happens if we change\
    \ the parameter `cursor_sharing` from its default value of `EXACT` to a value\
    \ of `FORCE`. Here we set `cursor_sharing` to `FORCE` (it was `EXACT` before).\
    \ Then we ask for a 10053 trace and issue a query; then we go to the `user_dump_dest`\
    \ and look at the 10053 trace file and find the section with the parameters. Here\
    \ are the commands issued:\n\n```\nSQL> show parameter cursor_sharing\nNAME  \
    \                               TYPE        VALUE\n------------------------------------\
    \ ----------- ---------------------------\ncursor_sharing                    \
    \   string      EXACT\n_optimizer_extended_cursor_sharing  = none\n_optimizer_extended_cursor_sharing_rel\
    \ = none\n\nSQL> alter system set cursor_sharing=FORCE scope=memory;\n\nSystem\
    \ altered.\n\nSQL> alter session set events '10053 trace name context forever,\
    \ level 1';\n\nSession altered.\n\nSQL> explain plan for select count(*) from\
    \ dba_objects;\n\nExplained.\n```\n\nAnd in the figure below ([Figure 5-7](#9781430248095_Ch05.xhtml#Fig7))\
    \ we see that `cursor_sharing` has been changed to `force`.\n\n![9781430248095_Fig05-07.jpg](Images/9781430248095_Fig05-07.jpg)\n\
    \n[Figure 5-7](#9781430248095_Ch05.xhtml#_Fig7) .  Here we see the parameter `cursor_sharing`\
    \ has been changed to `FORCE`\n\nWe see that the 10053 trace file is useful for\
    \ tracking optimizer parameters both hidden and unhidden. Now we’ll look at optimizer\
    \ hints.\n\n## Optimizer Hints\n\nIf you use any optimizer hints in your SQL,\
    \ it is a good idea to check that these hints are being used. The optimizer will\
    \ do its best to use hints given to it but will not use the hints if there is\
    \ a problem with such use.  Reasons why the optimizer will ignore hints are incorrect\
    \ syntax or a conflict in the hint with another hint. If the hints are correct\
    \ the optimizer will use them. Let’s look at an example involving the query we\
    \ were previously working on. Now, armed with our knowledge of subquery unnesting,\
    \ we’ll write the query a different way and try a few hints. First we’ll run the\
    \ query with no hint and look at the execution plan. It will show a hash join.\
    \ Then we’ll hint a nested loop join. We’ll confirm that but look at the execution\
    \ plan again. Then finally we’ll use conflicting hints and see that the execution\
    \ plan reverts to the hash join.\n\n```\nSQL> set autotrace traceonly explain;\n\
    set lines 100\nselect\n  a.first_name, a.last_name, a.hire_date\n  from employees\
    \ a, employees b\n  where a.hire_date = b.hire_date\n  and a.department_id=30\n\
    /\nExecution Plan\n\nPlan hash value: 2254211361\n\n| Id  | Operation        \
    \            | Name              | Rows  | Bytes | Cost (%CPU)| Time     |\n\n\
    | 0   | SELECT STATEMENT             |                   |     7 |   238 |   \
    \  6  (17)| 00:00:01 |\n|*1   |  HASH JOIN                   |               \
    \    |     7 |   238 |     6  (17)| 00:00:01 |\n| 2   |   TABLE ACCESS BY INDEX\
    \ ROWID| EMPLOYEES         |     6 |   156 |     2   (0)| 00:00:01 |\n|*3   |\
    \    INDEX RANGE SCAN          | EMP_DEPARTMENT_IX |     6 |       |     1   (0)|\
    \ 00:00:01 |\n| 4   |   TABLE ACCESS FULL          | EMPLOYEES         |   107\
    \ |   856 |     3   (0)| 00:00:01 |\n\nPredicate Information (identified by operation\
    \ id):\n\n1 - access(\"A\".\"HIRE_DATE\"=\"B\".\"HIRE_DATE\")\n   3 - access(\"\
    A\".\"DEPARTMENT_ID\"=30)\n```\n\n```\nSQL> select /*+ use_nl(a b) */\n  a.first_name,\
    \ a.last_name, a.hire_date\n  from employees a, employees b\n  where a.hire_date\
    \ = b.hire_date\n  and a.department_id=30\n/\nExecution Plan\n\nPlan hash value:\
    \ 3321434377\n\n| Id  | Operation                  | Name              | Rows\
    \  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT           | \
    \                  |     7 |   238 |    12   (0)| 00:00:01 |\n|   1 |  NESTED\
    \ LOOPS              |                   |     7 |   238 |    12   (0)| 00:00:01\
    \ |\n|   2 | TABLE ACCESS BY INDEX ROWID| EMPLOYEES         |     6 |   156 |\
    \     2   (0)| 00:00:01 |\n|*  3 |  INDEX RANGE SCAN          | EMP_DEPARTMENT_IX\
    \ |     6 |       |     1   (0)| 00:00:01 |\n|*  4 | TABLE ACCESS FULL       \
    \   | EMPLOYEES         |     1 |     8 |     2   (0)| 00:00:01 |\n\nPredicate\
    \ Information (identified by operation id):\n\n3 - access(\"A\".\"DEPARTMENT_ID\"\
    =30)\n   4 - filter(\"A\".\"HIRE_DATE\"=\"B\".\"HIRE_DATE\")\n```\n\n```\nSQL>\
    \ select /*+ use_nl(a b) use_merge(a b) */\n  a.first_name, a.last_name, a.hire_date\n\
    \  from employees a, employees b\n  where a.hire_date = b.hire_date\n  and a.department_id=30\n\
    /\n\nExecution Plan\n\nPlan hash value: 2254211361\n\n| Id  | Operation      \
    \             | Name             | Rows  | Bytes | Cost (%CPU)| Time     |\n\n\
    |   0 |SELECT STATEMENT             |                  |     7 |   238 |     6\
    \  (17)| 00:00:01 |\n|*  1 | HASH JOIN                   |                  |\
    \     7 |   238 |     6  (17)| 00:00:01 |\n|   2 |  TABLE ACCESS BY INDEX ROWID|EMPLOYEES\
    \         |     6 |   156 |     2   (0)| 00:00:01 |\n|*  3 |   INDEX RANGE SCAN\
    \          |EMP_DEPARTMENT_IX |     6 |       |     1   (0)| 00:00:01 |\n|   4\
    \ |  TABLE ACCESS FULL          |EMPLOYEES         |   107 |   856 |     3   (0)|\
    \ 00:00:01 |\n\nPredicate Information (identified by operation id):\n\n1 - access(\"\
    A\".\"HIRE_DATE\"=\"B\".\"HIRE_DATE\")\n   3 - access(\"A\".\"DEPARTMENT_ID\"\
    =30)\n```"
  raw: "This is by no means a complete list of all the hidden parameters influencing\
