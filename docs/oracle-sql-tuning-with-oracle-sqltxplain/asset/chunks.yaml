    \                 2        0.00          0.00\n  asynch descriptor resize    \
    \                    3        0.00          0.00\n  SQL*Net message from client\
    \                     2      574.61        574.61\n```\n\n## TKPROF 与 TRCASPLIT\
    \ 工具介绍\n\n在 SQL 的 `TKPROF` 输出中，我们能看到 SQL 语句、一个描述“解析”、“执行”和“获取”执行时间的摘要部分，以及执行计划和等待时间的简要描述。请将此类信息与\
    \ 10046 跟踪文件解读的相关章节进行比较。您认为哪种更快？我知道我更喜欢看哪种。这种信息聚合方式使得解读正在发生的事情变得更加简单和快速。现在我们已经简要提到了\
    \ 10046 跟踪（并且我们在第 5 章 中提到了 10053 跟踪），让我们来看看 `TRCASPLIT` 能为我们做什么。\n\n### TRCASPLIT\
    \ 功能与使用\n\n`TRCASPLIT` 是 `SQLT` 中可用的第一个跟踪实用程序，它简单地将 10046 跟踪与其他跟踪分开。虽然理论上这可能是一个简单的任务，但手动操作会非常困难且容易出错。`TRCASPLIT`\
    \ 可以立即完成这项工作，并将结果呈现在一个 zip 文件中。首先让我展示我们将要收集的内容，然后我们将进行收集，最后使用 `TRCASPLIT` 进行拆分。\n\
    \n在本例中，我们将同时收集 10046 和 10053 跟踪文件信息。换句话说，我们将同时打开用于运行 SQL 和解析 SQL 的调试信息。和之前一样，我们还将通过设置转储文件大小为\
    \ `unlimited` 来确保转储文件不被截断，并将统计信息收集级别设置为所有可能的最高级别。\n\n```\nSQL> alter session set\
    \ tracefile_identifier='10046_10053';\n会话已更改。\nSQL> alter session set max_dump_file_size=unlimited;\n\
    会话已更改。\nSQL> alter session set statistics_level=all;\n会话已更改。\nSQL> alter session\
    \ set events '10046 trace name context forever, level 12';\n会话已更改。\nSQL> alter\
    \ session set events '10053 trace name context forever, level 1';\n会话已更改。\nSQL>\
    \ alter system flush shared_pool;\n系统已更改。\nSQL> @q3\n```\n\n我相信我们不需要再次查看此查询的结果。我们需要查看的是创建的跟踪文件。在跟踪文件中，我们可以看到明显是\
    \ 10046 类型的行，例如：\n\n```\nSTAT #1 id=6 cnt=55500 pid=4 pos=2 obj=74151 op='TABLE\
    \ ACCESS FULL CUSTOMERS (cr=1459 pr=0 pw=0 time=112536 us cost=406 size=555000\
    \ card=55500)'\nSTAT #1 id=7 cnt=918843 pid=3 pos=2 obj=0 op='PARTITION RANGE\
    \ ALL PARTITION: 1 28 (cr=1718 pr=0 pw=0 time=5428724 us cost=494 size=9188430\
    \ card=918843)'\nSTAT #1 id=8 cnt=918843 pid=7 pos=1 obj=74083 op='TABLE ACCESS\
    \ FULL SALES PARTITION: 1 28 (cr=1718 pr=0 pw=0 time=1892572 us cost=494 size=9188430\
    \ card=918843)'\n```\n\n这些与 10046 跟踪相关，但我们也会看到：\n\n```\n***************************************\n\
    优化器使用的参数\n********************************\n  *************************************\n\
    \  值被更改的参数\n  ******************************\n编译环境转储\nsqlstat_enabled        \
    \             = true\noptimizer_dynamic_sampling          = 4\nstatistics_level\
    \                    = all\n```\n\n这些行被识别为 10053 跟踪。我们看不到任何与代码执行行和等待相关的逻辑 10046\
    \ 跟踪信息。行首也没有与正在发生的事情相关的代码。任何设计用于解码 10046 的程序此时都必须停止并寻求帮助，但 `TRCASPLIT` 通过筛选两种类型的信息来帮助我们。要拆分它们，我们只需要运行\
    \ `sqltrcasplit.sql`。在此示例中，我将跟踪目录中生成的跟踪文件复制到了本地目录。只需要向 `sqltrcasplit.sql` 传递一个参数，即需要拆分的跟踪文件的名称。\n\
    \n```\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT 11.4.5.1\\sqlt\\run>sqlplus\
    \ stelios/password\nSQL*Plus: Release 11.2.0.1.0 Production on Wed Dec 26 10:50:43\
    \ 2012\nCopyright (c) 1982, 2010, Oracle.  All rights reserved.\nConnected to:\n\
    Oracle Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the\
    \ Partitioning, OLAP, Data Mining and Real Application Testing options\nSQL> @sqltrcasplit.sql\n\
    PL/SQL 过程已成功完成。\n参数 1:\n跟踪文件名 (必需的)\n输入 1 的值:\n输入 1 的值: snc1_ora_2796_10046_10053.trc\n\
    传递给 sqltrcasplit.sql 的值:\nTRACE_FILENAME: snc1_ora_2796_10046_10053.trc\nPL/SQL\
    \ 过程已成功完成。\n正在拆分 snc1_ora_2796_10046_10053.trc\n***\n*** 注意：\n*** 如果您看到下面的错误，则表示\
    \ SQLTXPLAIN 未安装：\n***   PLS-00201: 标识符 'SQLTXADMIN.SQLT$A' 必须声明。\n*** 在这种情况下，请查找安装期间创建的\
    \ NN_*.log 文件中的错误。\n***\nSQLT_VERSION\n"
