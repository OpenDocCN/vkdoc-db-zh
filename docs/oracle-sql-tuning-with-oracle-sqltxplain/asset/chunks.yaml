    \ of this hint are to modify `q.sql` (add the hint) and run `tc.sql`. Nothing\
    \ more is needed.\n\n## Versions of the optimizer\n\nSuppose we upgraded or transferred\
    \ SQL from version 10g to version 11g. We think that maybe the execution plan\
    \ changed between these two versions. We can test this idea by changing `optimizer_features_enable`\
    \ to `'10.2.0.5'`. Then we can do that easily and simply by setting the parameter\
    \ at the session level and retesting.\n\nThe steps to carry out this test are:\n\
    \n```sql\nSQL> alter session set optimizer_features_enable='10.2.0.5';\nSQL> @tc\n\
    ```\n\nIn this case we see that the execution plan is unchanged, but in other\
    \ cases we may see some changes, usually the better execution plan is from 11g\
    \ although not always. Remember that `optimizer_features_enable` is like a super-switch\
    \ that sets a number of features in the database on or off. Setting this parameter\
    \ to a value that was there before the feature was introduced can turn off any\
    \ new features. For example, you could disable SQL Plan management by setting\
    \ this parameter to `10.2.0.5`, a version of the database that existed when this\
    \ feature was not present. This is not a recommended solution to any particular\
    \ problem, but will help in giving the developer or DBA a clue, if it improves\
    \ a particular SQL, that the solution may lie in investigating one of the new\
    \ features introduced in the later version. As the `optimizer_features_enable`\
    \ parameter made no difference we set it back to `11.2.0.1`.\n\n## Structure of\
    \ the SQL\n\nThe test case once built allows you to investigate the target SQL\
    \ in many ways, including changing the SQL itself, as long as your SQL does not\
    \ include any new tables (which were not captured by XTRACT) you could test the\
    \ SQL in the same way. In this example I changed the SQL from\n\n```sql\nselect\
    \ /*+ INDEX(S SALES_CUST_BIX) */\n  country_name, sum(AMOUNT_SOLD)\nfrom sales\
    \ s, customers c, countries co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n\
    \  and country_name in ('Ireland','Denmark','Poland',\n  'United Kingdom','Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\nto\n\n```sql\nselect /*+ INDEX(S SALES_CUST_BIX) */\n  country_name, sum(AMOUNT_SOLD)\n\
    from sales s, customers c, countries co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n\
    \  and country_name in ( select country_name from sh.countries where\n  country_name\
