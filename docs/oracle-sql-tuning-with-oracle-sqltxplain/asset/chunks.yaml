    3.4ms and 15ms. Are these good values? It can be hard to tell because modern SAN
    systems can deliver blistering I/O read rates. For traditional non-SAN systems
    you would expect multi-block read times to be higher than single block read times
    and the normally around 9ms and 22ms. In this case they are in a reasonable range.
    The Single block read time is less than the multi-block read time (you would expect
    that, right?).


    Now look in [Figure 2-5](#9781430248095_Ch02.xhtml#Fig5) at a screen shot from
