  trans: "让我们逐步分析每个步骤，看看能否理解发生了什么。在第一次执行中，我们允许优化器自行决定。如果想确认没有隐藏参数影响优化器，也可以通过查看`10053`跟踪文件来验证。因此在第一步中，优化器选择了`哈希连接`。在第二次执行中，我们决定（无论出于什么原因）尝试改用`嵌套循环`，于是在\
    \ SQL 中使用了提示`use_nl (a b)`。请记住，`(a b)`代表此提示中要连接的两个表的别名。令人满意的是，新的执行计划确实使用了`嵌套循环`。目前为止一切顺利。\n\
    \n现在，在第三次执行中，我们想进一步调整，并使用额外的提示`use_merge(a b)`。这看似有些矛盾，但我们想了解优化器会如何处理。它会使用`哈希连接`，还是`排序合并连接`，或者从两者中选择最佳方案？查看生成的执行计划后，我们发现它两样都没选，而是用了`哈希连接`。因此，与其猜测，我们现在生成了这个\"\
    异常\"行为的`10053`跟踪文件。在此步骤中，我们将转储文件大小设为无限，请求`10053`跟踪文件，运行包含两个待查提示的 SQL，然后执行该 SQL。\n\
    \n```\nSQL> alter session set max_dump_file_size=unlimited;\n\nSession altered.\n\
    \nSQL> alter session set events '10053 trace name context forever, level 1';\n\
    \nSession altered.\n\nSQL> set autotrace off;\nSQL> select /*+ use_nl(a b) user_merge\
    \ (a b) */\n  2  a.first_name, a.last_name, a.hire_date\n  3  from employees a,\
    \ employees b\n  4  where a.hire_date=b.hire_date\n  5  and a.department_id=30\n\
    \  6  /\n\nFIRST_NAME           LAST_NAME                 HIRE_DATE\n--------------------\
    \ ------------------------- ---------\nDen                  Raphaely         \
    \         07-DEC-02\nAlexander            Khoo                      18-MAY-03\n\
    Shelli               Baida                     24-DEC-05\nSigal              \
    \  Tobias                    24-JUL-05\nGuy                  Himuro          \
    \          15-NOV-06\nKaren                Colmenares                10-AUG-07\n\
    \n6 rows selected.\n```\n\n通过检查文本内容，我们确认正在查看正确的`10053`跟踪文件，确实，提示与之匹配。现在如果搜索\"\
    hint\"一词，会在跟踪文件末尾找到一个名为\"Dumping Hints\"的部分。请参见图 5-8。\n\n![9781430248095_Fig05-08.jpg](img/9781430248095_Fig05-08.jpg)\n\
    \n图 5-8 . `10053`跟踪文件的提示部分\n\n这个小部分中需要注意的重要一点是`used=0`。这意味着该提示未被使用，被完全忽略了。实际上两个提示都被忽略了，这使得优化器能够自行决策，从而导致使用了`哈希连接`。SQL\
    \ 的执行没有产生错误，我们没有从优化器得到任何关于提示有误的错误信息。这些信息被隐藏在（如果我们请求了）`10053`跟踪文件中。那么问题出在哪里呢？`err`代码为\
    \ 4，表示与其他提示存在冲突。在这种情况下，两个提示相互抵消了。这里需要注意的重要一点是，上面第三次执行 SQL 并未生成错误。优化器识别了这些提示，发现它们彼此冲突，于是忽略它们并制定一个不考虑这些提示的计划。\n\
    \n## 成本计算\n\n优化器最重要的工作是比较不同执行计划之间的成本。当然，这是总体目标。执行计划的成本由其每一行的成本组成，而每一行又基于依赖于统计信息的计算。不同计划的计算基于不同的访问路径、连接方法以及查询不同部分的访问顺序。听起来很有趣，不是吗？如果你有七个不同的表，你可以选择七种处理顺序（即七的阶乘，相当于`7x6x5x4x3x2x1`）！这总共有\
    \ 5,040 种方式，这还不算最初访问这些表的不同方式。优化器选择一个合理的计划，挑选外表并逐层推进，尝试几种组合，并快速排除那些成本已经超过先前尝试过的计划的选项（这是高度简化的）。因此，例如，如果优化器猜测第一个计划的成本是\
    \ 1,000，那么当第二个计划在成本计算到一半达到 1,500 时，它就会被放弃。在这种情况下，无需继续计算。它这样做是为了在总体硬解析耗时中节省时间。它知道你渴望得到结果。一旦你知道`10053`是关于优化器如何基于这种方法推导其计划的故事，这个跟踪文件就开始变得有意义了。\n\
    \n在提供了关于参数、所考虑的 SQL 以及任何可能适用的查询转换的一些基本信息后，基于成本的优化器开始介绍访问相关对象成本的一些基本信息。例如，在图 5-9\
    \ 中展示了关于表`EMPLOYEES`的一些基本信息（在此例中展示了两次）。\n\n![9781430248095_Fig05-09.jpg](img/9781430248095_Fig05-09.jpg)\n\
    \n图 5-9 . `10053`中显示 BASE STATISTICAL INFORMATION 的部分\n\n一旦我们获得了关于表及其索引的所有这些基本信息（注意在此基本信息中我们也有了聚簇因子`CLUF`），我们就可以开始确定以最低成本获取信息的方式。例如，CBO\
    \ 将考虑单表访问路径，并由此考虑`全表扫描`（成本为 3）或`索引（AllEqRange）`（成本为 2），然后告诉我们哪个成本最低：`最佳:: 访问路径：索引范围扫描`。图\
    \ 5-10 展示了`10053`中的相关部分。\n\n![9781430248095_Fig05-10.jpg](img/9781430248095_Fig05-10.jpg)\n\
    \n图 5-10 . 优化器对表`EMPLOYEES`的看法\n\n完成这一步后，优化器开始考虑连接顺序，在此例中仅与另一个版本的`EMPLOYEES`表进行连接。图\
    \ 5-11 展示了优化器放弃计算的一个例子。\n\n![9781430248095_Fig05-11.jpg](img/9781430248095_Fig05-11.jpg)\n\
    \n图 5-11 . 优化器因成本高于当前最佳而放弃一个连接\n\n## 总结\n\n既然我们已经介绍了可以从`10053`跟踪文件中获取的部分信息，你也就了解了它的用处。通过仔细阅读跟踪文件，你现在应该能够看出优化器选择其行为的原因：它考虑了哪些访问路径以及为何拒绝其中一些。如果你认为某些访问路径本不该被拒绝，你应该能够追溯到根本原因，并回答所有\
    \ DBA 那个由来已久的问题：“为什么它没有使用我的索引？”"
- fmt: "# CHAPTER 6\n\n![image](Images/frontdot.jpg)\n\n## Forcing Execution Plans\
    \ Through Profiles\n\nSometimes it’s best to fix a problem and figure out afterward\
    \ what went wrong and determine the root cause. By this I mean that when there\
    \ are production time pressures to get something done, any way that works is good\
    \ enough. The idea is to get the business back up and running, then sit at your\
    \ leisure and work out what went wrong, figure out how to stop it from happening\
    \ again, and develop a plan to implement the permanent fix in a controlled manner\
    \ during a planned outage if required. Management is not usually very tolerant\
    \ of perfectionists who want to understand every detail of a problem and its solution\
    \ before acting: and if they are tolerant, it’s because they have another system\
    \ in their pocket that’s keeping the lights on and the business going.\n\nThe\
    \ scenario I am about to describe is rare, but it does happen. An overnight batch\
    \ job, one that is time critical (has to be finished by a certain time), suddenly\
    \ starts taking much longer to run. The online day is affected, management reports\
    \ are not produced on time (if at all), and the DBAs and developers are at a loss.\
    \ Nothing was changed (which is never true), no releases to production, no parameter\
    \ changes, no changes in statistics gathering. This is when you often hear the\
    \ plaintive cry: “What’s it doing?”\n\nThis is a good question to ask when you\
    \ are trying to fix a problem properly; but when you need the system to behave\
    \ the way it did before, there’s a short cut. This technique of fixing the problem\
    \ without understanding the problem is often referred to as the “Severity 1 killer”.\
    \ This is because Severity 1 service requests at Oracle are the highest priority:\
    \ if there is a way to fix the problem, then go for it. Understand it later.\n\
    \nSo how do you do this? `SQLT` has the tools to get the job done (most of the\
    \ time). As part of `SQLT` modus operandi, `SQLT` produces a script that uses\
    \ an SQL profile. This SQL profile (if it is the “good” execution plan), can be\
    \ applied to the troublesome SQL, which then forces the SQL to run “properly”\
    \ despite whatever else is happening on the system (wrong statistics, changed\
    \ parameters, etc). SQL profiles, despite the introduction of SQL plan management,\
    \ are still useful. In the version of Oracle to come, however, expect SQL plan\
    \ baselines to become a better product. For now, however, let’s look at what we\
    \ can do with SQL profiles.\n\n### What is an SQL Profile?\n\nAlthough the title\
    \ of this chapter is “Forcing Execution Plans Through Profiles,” SQL profiles\
    \ do not exactly force an execution plan. They are more like “super hints.” With\
    \ hints there is always the possibility that the optimizer will find yet another\
    \ way of doing the query, with your hint that isn’t what you want. Super hints,\
    \ on the other hand, have specified so many constraints on the execution plan\
    \ that the optimizer (usually) has no choices left. The word “profile” in this\
    \ context is quite descriptive. The optimizer has seen this SQL statement go through\
    \ many times and has determined that it behaves in a certain way: it accesses\
    \ rows in a certain order and consistently uses a particular index. All this profiling\
    \ information is gathered and kept for the query and can be used to “force” the\
    \ statement to behave in the same way in the future if its new behavior is suboptimal.\n\
    \nCan SQL profiles be a bad thing? Let’s examine an analogy. Everyone has their\
    \ routines they stick to. Get up, brush your teeth, eat breakfast, go to work,\
    \ drive home, read the newspaper, etc. The “profile” in this case is fairly simple.\
    \ Make sure to brush your teeth before going to work, otherwise you might have\
    \ to come back home to do it. If somebody wiped your memory (perhaps a tuning\
    \ book fell off a shelf and bumped you on the head), and you forgot your routine,\
    \ you might want a reminder of your previous routine until your memory returned.\
    \ This routine forcing, or “profile,” might be a good thing if nothing else had\
    \ changed. Suppose, however, that you had also moved into a new house and now\
    \ worked from home. Your profile might now be completely out of date. Driving\
    \ to work would no longer make sense. Here we see that a profile might be good\
    \ for a short while to get things back to normal, but every so often you need\
    \ to check that the profile still makes sense.\n\nSo what does a super hint look\
    \ like? Here’s one:\n\n```\nh := SYS.SQLPROF_ATTR(\n  '[BEGIN_OUTLINE_DATA]',\n\
    \  '[IGNORE_OPTIM_EMBEDDED_HINTS]',\n  '[OPTIMIZER_FEATURES_ENABLE('11.2.0.1')]',\n\
    \  '[DB_VERSION('11.2.0.1')]',\n  '[ALL_ROWS]',\n  '[OUTLINE_LEAF(@\"SEL$E9AF9BDE\"\
    )]',\n  '[MERGE(@\"SEL$CE1D94FA\")]',\n  '[OUTLINE(@\"SEL$98588D1C\")]',\n  '[UNNEST(@\"\
    SEL$6\")]',\n  '[OUTLINE(@\"SEL$CE1D94FA\")]',\n  '[OUTLINE(@\"SEL$C50F9DEF\"\
    )]',\n  '[OUTLINE(@\"SEL$6\")]',\n  '[OUTLINE(@\"SEL$81719215\")]',\n  '[MERGE(@\"\
    SEL$EE94F965\")]',\n  '[OUTLINE(@\"SEL$5\")]',\n  '[OUTLINE(@\"SEL$EE94F965\"\
    )]',\n  '[MERGE(@\"SEL$9E43CB6E\")]',\n  '[OUTLINE(@\"SEL$4\")]',\n  '[OUTLINE(@\"\
    SEL$9E43CB6E\")]',\n  '[MERGE(@\"SEL$58A6D7F6\")]',\n  '[OUTLINE(@\"SEL$3\")]',\n\
    \  '[OUTLINE(@\"SEL$58A6D7F6\")]',\n  '[MERGE(@\"SEL$1\")]',\n  '[OUTLINE(@\"\
    SEL$2\")]',\n  '[OUTLINE(@\"SEL$1\")]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"\
    TABLE1\"@\"SEL$4\" \"TABLE1\".\"TABLE_NAME\" \"TABLE1\".\"STATUS\" \"TABLE1\"\
    .\"CATEGORY\"))]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$3\" (\"\
    TABLE2\".\"COL2\" TABLE2\".\"COL1\" \"TABLE2\".\"COL3\"))]',\n  '[INDEX(@\"SEL$E9AF9BDE\"\
    \ \"TABLE3\"@\"SEL$2\" (\"TABLE3\".\"COL2\"  TABLE3\".\"COL1\"))]',\n  '[FULL(@\"\
    SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"\
    TABLE1\"@\"SEL$6\" (\"TABLE1\".\"TABLE_NAME\" \"TABLE1\".\"STATUS\" \"TABLE1\"\
    .\"CATEGORY\"))]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$6\" (\"\
    TABLE2\".\"COL2\" \"TABLE2\".\"COL1\" \"TABLE2\".\"COL3\"))]',\n  '[LEADING(@\"\
    SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$4\" \"TABLE2\"@\"SEL$3\" \"TABLE3\"@\"SEL$2\"\
    \ \"TABLE4\"@\"SEL$1\" \"TABLE1\"@\"SEL$6\" \"TABLE2\"@\"SEL$6\")]',\n  '[USE_NL(@\"\
    SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$3\")]',\n  '[USE_NL(@\"SEL$E9AF9BDE\" \"TABLE3\"\
    @\"SEL$2\")]',\n  '[NLJ_BATCHING(@\"SEL$E9AF9BDE\" \"TABLE3\"@\"SEL$2\")]',\n\
    \  '[USE_HASH(@\"SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[USE_MERGE_CARTESIAN(@\"\
    SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$6\")]',\n  '[USE_NL(@\"SEL$E9AF9BDE\" \"TABLE2\"\
    @\"SEL$6\")]',\n  '[PX_JOIN_FILTER(@\"SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n\
    \  '[USE_HASH_AGGREGATION(@\"SEL$E9AF9BDE\")]',\n  '[END_OUTLINE_DATA]');\n```\n\
    \nNotice how the hint is more verbose than the normal hint you would use to tune\
    \ an SQL statement. Still, there are recognizable parts after the standard preamble\
    \ (which includes `BEGIN_OUTLINE_DATA`, `IGNORE_OPTIM_EMBEDDED_HINTS`, `OPTIMIZER_FEATURES_ENABLE('11.2.0.1')`\
    \ and `DB_VERSION('11.2.0.1')`). Let’s list the more familiar parts:\n\n*   `ALL_ROWS`\n\
    *   `MERGE`\n*   `INDEX_RS_ASC`\n*   `FULL`\n*   `USE_NL`\n*   `NLJ_BATCHING`\n\
    *   `PX_JOIN_FILTERING`\n*   `USE_MERGE_CARTESIAN`\n\nYou’ll also notice that\
    \ the references made are to obscure objects such as `SEL$3` and `SEL$E9AF9BDE`\
    \ (which are properly called “query block names”). Remember that the optimizer\
    \ has transformed the SQL (through the use of query transformations as described\
    \ in [Chapter 5](../Text/9781430248095_Ch05.xhtml)) before it gets to do more\
    \ detailed cost-based tuning. During the transformation, the various sections\
    \ of the query get these exotic names (which are unrecognizable). The profile\
    \ hints then refer to these names."
  raw: "SQLTXPLAIN is a wonderful tool, and it generates the 10053 trace file by default\
    \ in most cases. While it is sometimes difficult to understand, there is a mine\
    \ of information that helps you tune your SQL when things are going wrong. In\
    \ the next chapter we’ll cover SQL*Profiles and what to do when an emergency strikes\
    \ and we need the right performance, fast!\n\nCHAPTER 6\n\n![image](Images/frontdot.jpg)\n\
    \nForcing Execution Plans Through Profiles\n\nSometimes it’s best to fix a problem\
    \ and figure out afterward what went wrong and determine the root cause. By this\
    \ I mean that when there are production time pressures to get something done,\
    \ any way that works is good enough. The idea is to get the business back up and\
    \ running, then sit at your leisure and work out what went wrong, figure out how\
    \ to stop it from happening again, and develop a plan to implement the permanent\
    \ fix in a controlled manner during a planned outage if required. Management is\
    \ not usually very tolerant of perfectionists who want to understand every detail\
    \ of a problem and its solution before acting: and if they are tolerant, it’s\
    \ because they have another system in their pocket that’s keeping the lights on\
    \ and the business going.\n\nThe scenario I am about to describe is rare, but\
    \ it does happen. An overnight batch job, one that is time critical (has to be\
    \ finished by a certain time), suddenly starts taking much longer to run. The\
    \ online day is affected, management reports are not produced on time (if at all),\
    \ and the DBAs and developers are at a loss. Nothing was changed (which is never\
    \ true), no releases to production, no parameter changes, no changes in statistics\
    \ gathering. This is when you often hear the plaintive cry: “What’s it doing?”\n\
    \nThis is a good question to ask when you are trying to fix a problem properly;\
    \ but when you need the system to behave the way it did before, there’s a short\
    \ cut. This technique of fixing the problem without understanding the problem\
    \ is often referred to as the “Severity 1 killer”. This is because Severity 1\
    \ service requests at Oracle are the highest priority: if there is a way to fix\
    \ the problem, then go for it. Understand it later.\n\nSo how do you do this?\
    \ SQLT has the tools to get the job done (most of the time). As part of SQLT modus\
    \ operandi, SQLT produces a script that uses an SQL profile. This SQL profile\
    \ (if it is the “good” execution plan), can be applied to the troublesome SQL,\
    \ which then forces the SQL to run “properly” despite whatever else is happening\
    \ on the system (wrong statistics, changed parameters, etc). SQL profiles, despite\
    \ the introduction of SQL plan management, are still useful. In the version of\
    \ Oracle to come, however, expect SQL plan baselines to become a better product.\
    \ For now, however, let’s look at what we can do with SQL profiles.\n\n**What\
    \ is an SQL Profile?**\n\nAlthough the title of this chapter is “Forcing Execution\
    \ Plans Through Profiles,” SQL profiles do not exactly force an execution plan.\
    \ They are more like “super hints.” With hints there is always the possibility\
    \ that the optimizer will find yet another way of doing the query, with your hint\
    \ that isn’t what you want. Super hints, on the other hand, have specified so\
    \ many constraints on the execution plan that the optimizer (usually) has no choices\
    \ left. The word “profile” in this context is quite descriptive. The optimizer\
    \ has seen this SQL statement go through many times and has determined that it\
    \ behaves in a certain way: it accesses rows in a certain order and consistently\
    \ uses a particular index. All this profiling information is gathered and kept\
    \ for the query and can be used to “force” the statement to behave in the same\
    \ way in the future if its new behavior is suboptimal.\n\nCan SQL profiles be\
    \ a bad thing? Let’s examine an analogy. Everyone has their routines they stick\
    \ to. Get up, brush your teeth, eat breakfast, go to work, drive home, read the\
    \ newspaper, etc. The “profile” in this case is fairly simple. Make sure to brush\
    \ your teeth before going to work, otherwise you might have to come back home\
    \ to do it. If somebody wiped your memory (perhaps a tuning book fell off a shelf\
    \ and bumped you on the head), and you forgot your routine, you might want  a\
    \ reminder of your previous routine until your memory returned. This routine forcing,\
    \ or “profile,” might be a good thing if nothing else had changed. Suppose, however,\
    \ that you had also moved into a new house and now worked from home. Your profile\
    \ might now be completely out of date. Driving to work would no longer make sense.\
    \ Here we see that a profile might be good for a short while to get things back\
    \ to normal, but every so often you need to check that the profile still makes\
    \ sense.\n\nSo what does a super hint look like? Here’s one:\n\n```\nh := SYS.SQLPROF_ATTR(\n\
    \  '[BEGIN_OUTLINE_DATA]',\n  '[IGNORE_OPTIM_EMBEDDED_HINTS]',\n  '[OPTIMIZER_FEATURES_ENABLE('11.2.0.1')]',\n\
    \  '[DB_VERSION('11.2.0.1')]',\n  '[ALL_ROWS]',\n  '[OUTLINE_LEAF(@\"SEL$E9AF9BDE\"\
    )]',\n  '[MERGE(@\"SEL$CE1D94FA\")]',\n  '[OUTLINE(@\"SEL$98588D1C\")]',\n  '[UNNEST(@\"\
    SEL$6\")]',\n  '[OUTLINE(@\"SEL$CE1D94FA\")]',\n  '[OUTLINE(@\"SEL$C50F9DEF\"\
    )]',\n  '[OUTLINE(@\"SEL$6\")]',\n  '[OUTLINE(@\"SEL$81719215\")]',\n  '[MERGE(@\"\
    SEL$EE94F965\")]',\n  '[OUTLINE(@\"SEL$5\")]',\n  '[OUTLINE(@\"SEL$EE94F965\"\
    )]',\n  '[MERGE(@\"SEL$9E43CB6E\")]',\n  '[OUTLINE(@\"SEL$4\")]',\n  '[OUTLINE(@\"\
    SEL$9E43CB6E\")]',\n  '[MERGE(@\"SEL$58A6D7F6\")]',\n  '[OUTLINE(@\"SEL$3\")]',\n\
    \  '[OUTLINE(@\"SEL$58A6D7F6\")]',\n  '[MERGE(@\"SEL$1\")]',\n  '[OUTLINE(@\"\
    SEL$2\")]',\n  '[OUTLINE(@\"SEL$1\")]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"\
    TABLE1\"@\"SEL$4\" \"TABLE1\".\"TABLE_NAME\" \"TABLE1\".\"STATUS\" \"TABLE1\"\
    .\"CATEGORY\"))]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$3\" (\"\
    TABLE2\".\"COL2\" TABLE2\".\"COL1\" \"TABLE2\".\"COL3\"))]',\n  '[INDEX(@\"SEL$E9AF9BDE\"\
    \ \"TABLE3\"@\"SEL$2\" (\"TABLE3\".\"COL2\"  TABLE3\".\"COL1\"))]',\n  '[FULL(@\"\
    SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"\
    TABLE1\"@\"SEL$6\" (\"TABLE1\".\"TABLE_NAME\" \"TABLE1\".\"STATUS\" \"TABLE1\"\
    .\"CATEGORY\"))]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$6\" (\"\
    TABLE2\".\"COL2\" \"TABLE2\".\"COL1\" \"TABLE2\".\"COL3\"))]',\n  '[LEADING(@\"\
    SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$4\" \"TABLE2\"@\"SEL$3\" \"TABLE3\"@\"SEL$2\"\
    \ \"TABLE4\"@\"SEL$1\" \"TABLE1\"@\"SEL$6\" \"TABLE2\"@\"SEL$6\")]',\n  '[USE_NL(@\"\
    SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$3\")]',\n  '[USE_NL(@\"SEL$E9AF9BDE\" \"TABLE3\"\
    @\"SEL$2\")]',\n  '[NLJ_BATCHING(@\"SEL$E9AF9BDE\" \"TABLE3\"@\"SEL$2\")]',\n\
    \  '[USE_HASH(@\"SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[USE_MERGE_CARTESIAN(@\"\
    SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$6\")]',\n  '[USE_NL(@\"SEL$E9AF9BDE\" \"TABLE2\"\
    @\"SEL$6\")]',\n  '[PX_JOIN_FILTER(@\"SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n\
    \  '[USE_HASH_AGGREGATION(@\"SEL$E9AF9BDE\")]',\n  '[END_OUTLINE_DATA]');\n```\n\
    \nNotice how the hint is more verbose than the normal hint you would use to tune\
    \ an SQL statement. Still, there are recognizable parts after the standard preamble\
    \ (which includes `BEGIN_OUTLINE_DATA`, `IGNORE_OPTIM_EMBEDDED_HINTS`, `OPTIMIZER_FEATURES_ENABLE('11.2.0.1')`\
    \ and `DB_VERSION('11.2.0.1')`). Let’s list the more familiar parts:\n\n*   `ALL_ROWS`\n\
    *   `MERGE`\n*   `INDEX_RS_ASC`\n*   `FULL`\n*   `USE_NL`\n*   `NLJ_BATCHING`\n\
    *   `PX_JOIN_FILTERING`\n*   `USE_MERGE_CARTESIAN`\n\nYou’ll also notice that\
