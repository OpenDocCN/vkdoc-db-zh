  raw: "```\nSQL> exec sqltxadmin.sqlt$a.disable_tuning_pack_access;\nPL/SQL procedure\
    \ successfully completed.\nSQL> exec sqltxadmin.sqlt$a.disable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\n```\n\nNo parameters are needed for\
    \ these routines, just execute these from the SQLT account on the databases where\
    \ SQLT is installed. You could change the license level by just re-installing\
    \ SQLT, but this would not be a good idea if you had many records in the SQLT\
    \ repository that you wanted to keep. The list of configurable settings can be\
    \ found under the Global section of the main SQLTXECUTE or SQLTXTRACT report (as\
    \ covered in Chapter 13). See [Figure A-1](#9781430248095_AppA.xhtml#Fig1).\n\n\
    ![9781430248095_FigAppA-01.jpg](Images/9781430248095_AppA-01.jpg)\n\n[Figure A-1](#9781430248095_AppA.xhtml#_Fig1)\
    \ .  The top of a SQLTXECUTE report highlighting the configuration section\n\n\
    The license levels are more important and there are special routines for these.\
    \ If we installed the product with the wrong license level then we can change\
    \ this with the `sqltxadmin.sqlt$a` packages, which has the previously mentioned\
    \ four procedures related to the licensing levels:\n\n*   `disable_tuning_pack_access;`\n\
    *   `enable_tuning_pack_access;`\n*   `disable_diagnostic_pack_access;`\n*   `enable_diagnostic_pack_access;`\n\
    \nThese four procedures disable and enable the tuning pack and diagnostic pack\
    \ functionality in SQLT. The arrow in [Figure A-1](#9781430248095_AppA.xhtml#Fig1)\
    \ points to the prompt at the top of the SQLT main report that shows the example\
    \ code. Below I’ve disabled and enabled the tuning pack and then disabled and\
    \ enabled the diagnostic pack to end up with the same license level I started\
    \ with.\n\n```\nSQL> SQL> exec sqltxadmin.sqlt$a.disable_tuning_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqltxadmin.sqlt$a.enable_tuning_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqltxadmin.sqlt$a.disable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqltxadmin.sqlt$a.enable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\n```\n\nPlease note that in earlier versions\
    \ of SQLT (before 11.4.4.6 and older) the routines to change the license level\
    \ are in the SQLTXPLAIN schema, and so the command to change the license level\
    \ is\n\n```\nSQL> SQL> exec sqlt$a.disable_tuning_pack_access;\nPL/SQL procedure\
    \ successfully completed.\nSQL> exec sqlt$a.enable_tuning_pack_access;\nPL/SQL\
    \ procedure successfully completed.\nSQL> exec sqlt$a.disable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqlt$a.enable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\n```\n\nA Remote SQLT Installation\n\n\
    During the installation you will see the optional connect identifier prompt. Normally\
    \ this is ignored as you are installing locally. If, however, you want to install\
    \ SQLT in remote mode you can specify a remote link. In these examples the local\
    \ system is where you are connected to SQL Plus and the remote system is where\
    \ the SQLT repository can be found.\n\n```\nSpecify optional Connect Identifier\
    \ (as per Oracle Net)\nInclude \"@\" symbol, ie. @PROD\nIf not applicable, enter\
    \ nothing and hit the \"Enter\" key.\nThis connect identifier is only used while\
    \ exporting SQLT\nrepository everytime you execute one of the main methods.\n\
    Optional Connect Identifier (ie: @PROD): @REMOTE\n```\n\nThis appends **@REMOTE**\
    \ to all SQL operations so that if you run `@sqltxtract` on the local database\
    \ it will reach over to the remote database to store SQLT information.\n\nIn a\
    \ remote installation the sequence of steps to run a report are slightly different\
    \ than running everything locally.\n\n1.  Install SQLT on the remote node from\
    \ the local node.\n2.  Run the SQL on the remote node\n3.  Run the SQLTXTRACT\
    \ or SQLTXECUTE report on the local node but that runs on the remote node.\n4.\
    \  The reports are produced on the local node, but the repository data is stored\
    \ on the remote node.\n\nOther Ways to Install SQLT\n\nIf you want to deploy SQLT\
    \ to many systems (and who wouldn’t?) you might want to do a non-interactive installation.\
    \ In this case you can populate a number of variables and then run `sqcsilent.sql`.\
    \ An example variable definition file is provided in the installation directory\
    \ of SQLT called `sqdefparams.sql`.\n\nThis is what it contains. These are all\
    \ the values we’ve supplied in the interactive installation.\n\n```\nDEF connect_identifier\
    \      = '';\nDEF enter_tool_password     = 'sqltxplain';\nDEF re_enter_password\
    \       = 'sqltxplain';\nDEF default_tablespace      = 'USERS';\nDEF temporary_tablespace\
    \    = 'TEMP';\nDEF main_application_schema = '';\nDEF pack_license          \
    \  = 'T';\n```\n\nThese variables should be changed to suit your environment:\
    \ for example, the password should be changed, and the tablespace and main application\
    \ user could be different. When you have your own values in the file you can run\
    \ `sqcsilent.sql,` which will then execute in “silent” mode with no prompts for\
    \ parameters.\n\n```\nSQL> @sqcsilent.sql\n```\n\nYou can also run the installation\
    \ with all the parameters on the line as in the example below\n\n```\nSQL> @sqcsilent2.sql\
    \ '' sqltxplain USERS TEMP '' T\n```\n\nThis will also execute a normal installation\
    \ with no prompts for information. This could be a quick way to do a standard\
    \ install on a number of different systems.\n\nHow to Remove SQLT\n\nIf for some\
    \ reason you wish to de-install SQLT (perhaps a new version has become available),\
    \ you can use the routine in the `/install` directory called `sqdrop.sql`. There\
    \ are no parameters to this routine\n\n```\nSQL> @sqdrop\nPL/SQL procedure successfully\
    \ completed.\nPL/SQL procedure successfully completed.\nRDBMS_RELEASE\n\n11.2\n\
    RDBMS_VERSION\n\n11.2.0.1.0\nno rows selected\n... uninstalling SQLT, please wait\n\
    TADOBJ completed.\nPL/SQL procedure successfully completed.\nPL/SQL procedure\
    \ successfully completed.\nRDBMS_RELEASE\n\n11.2\nRDBMS_VERSION\n\n11.2.0.1.0\n\
    no rows selected\nSQDOLD completed. Ignore errors from this script\nPL/SQL procedure\
    \ successfully completed.\nPL/SQL procedure successfully completed.\nRDBMS_RELEASE\n\
    \n11.2\nRDBMS_VERSION\n\n11.2.0.1.0\nno rows selected\nSQDOBJ completed. Ignore\
    \ errors from this script\nPL/SQL procedure successfully completed.\nPL/SQL procedure\
    \ successfully completed.\nRDBMS_RELEASE\n\n11.2\nRDBMS_VERSION\n\n11.2.0.1.0\n\
    no rows selected\nSQL>\nSQL> DECLARE\n  2    my_count INTEGER;\n\n4  BEGIN\n \
    \ 5    SELECT COUNT(*)\n  6      INTO my_count\n  7      FROM sys.dba_users\n\
    \  8     WHERE username = 'TRCADMIN';\n\n10    IF my_count = 0 THEN\n 11     \
    \ BEGIN\n 12        EXECUTE IMMEDIATE 'DROP PROCEDURE sys.sqlt$_trca$_dir_set';\n\
    \ 13      EXCEPTION\n 14        WHEN OTHERS THEN\n 15          DBMS_OUTPUT.PUT_LINE('Cannot\
    \ drop procedure sys.sqlt$_trca$_dir_set. '||SQLERRM);\n 16      END;\n\n18  \
    \    FOR i IN (SELECT directory_name\n 19                  FROM sys.dba_directories\n\
    WHERE directory_name IN (\n'SQLT$UDUMP', 'SQLT$BDUMP', 'SQLT$STAGE', 'TRCA$INPUT1',\
    \ 'TRCA$INPUT2', 'TRCA$STAGE'))\n 21      LOOP\n 22        BEGIN\n 23        \
    \  EXECUTE IMMEDIATE 'DROP DIRECTORY '||i.directory_name;\n 24          DBMS_OUTPUT.PUT_LINE('Dropped\
    \ directory '||i.directory_name||'.');\n 25        EXCEPTION\n 26          WHEN\
    \ OTHERS THEN\n 27            DBMS_OUTPUT.PUT_LINE('Cannot drop directory '||i.directory_name||'.\
    \ '||SQLERRM);\n 28        END;\n 29      END LOOP;\n 30    END IF;\n 31  END;\n\
    \ 32  /\nDropped directory TRCA$INPUT2.\nDropped directory TRCA$INPUT1.\nDropped\
    \ directory SQLT$BDUMP.\nDropped directory SQLT$UDUMP.\nDropped directory TRCA$STAGE.\n\
    Dropped directory SQLT$STAGE.\nPL/SQL procedure successfully completed.\nSQL>\n\
    SQL> WHENEVER SQLERROR CONTINUE;\nSQL>\nSQL> PAU About to DROP users &&tool_repository_schema.\
    \ and &&tool_administer_schema.. Press RETURN to continue.\n```\n\nAt this point\
    \ you are prompted to confirm that you want to do a `drop user SQLTXADMIN cascade;`\
    \ and a `drop user SQLTXPLAIN cascade;`:"
