  raw: '*   10046 is the raw trace file or files of information.

    *   TKPROF provides a high-level view of the 10046 trace file. The input to this
    is the 10046 trace file, the output is the TKPROF report.

    *   TRCASPLIT takes the raw 10046 and 10053 trace file or files and splits off
    the 10046 trace file information. This data can then be fed into TKPROF or any
    other utility that needs 10046 trace.

    *   10053 is the raw trace file of the optimizer’s choices during parsing.

    *   TRCANLZR takes the raw 10046 and produces a graphical report that makes understanding
    the data easier.

    *   TRCAXTR takes the raw 10046 trace and produces a SQLTXTRACT report.


    Each of the above tools takes 10046 or 10046 and 10053 mixed together and produces
    some simpler version of the information.


    We’ll start with methods to collect 10046 trace, then look at the oldest tool
    available, TKPROF (which has been around since Oracle 7, and not part of SQLT)
    , then we’ll look at TRCASPLIT, which is used to separate 10046 and (usually)
    10053 trace information. Consider this method the simplest of the advanced tools.
    Then we’ll look at collecting 10053 trace. TRCANLZR is the next step, and it works
    from a single or multiple files to produce an extended version of TKPROF. TRCANLZR
    is part of SQLT unlike TKPROF.


    Finally we’ll talk about TRCAXTR, which combines TRCANLZR and XTRACT to produce
    a report on multiple SQLs. Each of these sections will be explained with the aid
    of an example SQL.


    10046 Trace


    10046 is essentially a low-level logging facility of the activity of the Oracle
    engine while it is processing your SQL statement. It produces a file called a
    “trace” file, which is a text file, with details of the low-level step of the
    execution. This trace can be configured (depending on the trace level selected)
    to collect wait events, bind variables, and bind values  (see below for the different
    levels that can be selected). There is an overhead in collecting this information,
    and it can consume a considerable amount of disk space and take resources away
    from the executing statement in producing the trace file.


    Why Collect 10046 Trace?


    Collecting 10046 trace is not an activity to take lightly. As mentioned above
    it can take considerable resource (especially disk space). Considering the overhead
    in collecting 10046 trace you would not lightly choose to collect this information.
    It would not normally be collected unless there was a good reason. To investigate
    tuning problems that are not solvable by looking at the high-level aggregated
    information, 10046 trace is specifically collected. In these more difficult cases
    some low-level piece of information (which is lost in the aggregation)  is needed
    as a vital clue in the puzzle we are solving. This is because it contains very
    detailed information of what is happening during the SQL execution.


    The 10046 trace can also be produced by enabling trace in other ways, such as
    at system level or by tracing another session instead of your own. The information
    collected is the same and the decode is the same; only the method of initiating
    the trace will change. In each case the trace file is a stand-alone file found
    in the `user_dump_dest` area (controlled by the parameter `diagnostic_dest` for
    11g Release 1 and above).


    10046 Decode


    Some people will read 10046 directly; this can be useful, as it contains low-level
    information that is sometimes not included in an aggregation (this is the nature
    of aggregation). This is a typical snippet of a SQL 10046 trace file.


    ```

    EXEC #1:c=0,e=162,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=2938593747,tim=6801557607

    WAIT #1: nam=''SQL*Net message to client'' ela= 6 driver id=1111838976 #bytes=1
    p3=0 obj#=-1 tim=6801557680

    WAIT #1: nam=''Disk file operations I/O'' ela= 821 FileOperation=2 fileno=5 filetype=2
    obj#=-1 tim=6801559064

    *** 2012-12-26 09:59:43.625

    WAIT #1: nam=''asynch descriptor resize'' ela= 4 outstanding #aio=0 current aio
    limit=4294967295 new aio limit=257 obj#=-1 tim=6802577972

    WAIT #1: nam=''asynch descriptor resize'' ela= 2 outstanding #aio=0 current aio
    limit=4294967295 new aio limit=257 obj#=-1 tim=6802578401

    FETCH #1:c=0,e=1020838,p=0,cr=3180,cu=0,mis=0,r=1,dep=0,og=1,plh=2938593747,tim=6802578585

    WAIT #1: nam=''SQL*Net message from client'' ela= 302 driver id=1111838976 #bytes=1
    p3=0 obj#=-1 tim=6802578974

