    # 参数列表


    ### `_add_stale_mv_to_dependency_list`

    将过时的物化视图添加到依赖列表


    ### `_aggregation_optimization_settings`

    聚合优化设置


    ### `_always_anti_join`

    尽可能始终使用此方法进行反连接


    ### `_always_semi_join`

    尽可能始终使用此方法进行半连接


    ### `_always_star_transformation`

    始终优先使用星型转换


    ### `_and_pruning_enabled`

