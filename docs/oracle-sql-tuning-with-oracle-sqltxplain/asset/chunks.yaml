    \ Volume in drive C has no label.\n Volume Serial Number is 77E9-80B4\n\nDirectory\
    \ of C:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\sqlt\\run\n\n11/17/2012\
    \  03:03 PM           355,957 sqlt_s96376_s73560_compare.html\n              \
    \ 1 File(s)        355,957 bytes\n               0 Dir(s)   7,088,697,344 bytes\
    \ free\n```\n\n## Analyzing the SQLTCOMPARE Report\n\nThe HTML file produced by\
    \ running `SQLTCOMPARE` contains information that compares the plan hash value\
    \ from each of the two target databases. In this case the first system was slightly\
    \ faster than the second system. There could be many reasons for this, but the\
    \ key element here is to see which sections are there for investigation. We already\
    \ know the execution plan is slightly different. Here is the top of the `SQLTCOMPARE`\
    \ report for our example (see [Figure 10-3](#9781430248095_Ch10.xhtml#Fig3)).\n\
    \n![9781430248095_Fig10-03.jpg](Images/9781430248095_Fig10-03.jpg)\n\n[Figure\
    \ 10-3](#9781430248095_Ch10.xhtml#_Fig3) .  The top of the `SQLTCOMPARE` report\n\
    \nIf we click on the SQL Identification hyperlink from the top of the report,\
    \ we’ll see differences (if there are any) as shown in [Figure 10-4](#9781430248095_Ch10.xhtml#Fig4).\n\
    \n![9781430248095_Fig10-04.jpg](Images/9781430248095_Fig10-04.jpg)\n\n[Figure\
    \ 10-4](#9781430248095_Ch10.xhtml#_Fig4) .  The SQL Identification shows some\
    \ basic differences\n\nNotice we did indeed choose the same SQL ID, but that some\
    \ entries are marked in red highlighted by the boxes in [Figure 10-4](#9781430248095_Ch10.xhtml#Fig4)),\
    \ to indicate that there are differences. This method of showing differences is\
    \ not consistently used throughout the report. Sometimes sections are marked in\
    \ amber for differences that are not so important, but generally differences marked\
    \ in red are important and should be noted and understood before moving on.\n\n\
    ## The Environment Section\n\nThe next section is the Environment section, for\
    \ which an example is shown in [Figure 10-5](#9781430248095_Ch10.xhtml#Fig5).\n\
    \n![9781430248095_Fig10-05.jpg](Images/9781430248095_Fig10-05.jpg)\n\n[Figure\
    \ 10-5](#9781430248095_Ch10.xhtml#_Fig5) .  The Environment section of the `SQLTCOMPARE`\
    \ report\n\nHere the things that are the same are just as important as the things\
    \ that are different. We can see immediately that the CPU count is the same, the\
    \ RAC environment is the same, and the block size is the same. Some differences\
    \ exist: the character set, time zone, etc.\n\n## Report Sections Overview\n\n\
    In the main HTML Compare report (as shown in [Figure 10-3](#9781430248095_Ch10.xhtml#Fig3))\
    \ we can scan from top to bottom. This is not a long complicated report like the\
    \ main `SQLTXTRACT` or `SQLTXECUTE` report. There are also sections on:\n\n* \
    \  SQL Text\n*   SQL Identification\n*   Environment\n*   NLS session parameters\n\
    *   I/O calibration\n*   CBO parameters\n*   Fix control\n*   CBO System statistics\n\
    *   Execution plans\n*   Table information\n*   Table partition information\n\
    *   Index information\n*   Index partition information\n*   Column information\n\
    *   Peeked binds\n*   Captured binds\n\n## Comparing Execution Plans\n\nAnd of\
    \ course there are the execution plans (as shown in [Figure 10-6](#9781430248095_Ch10.xhtml#Fig6)).\
    \ Much of this information is exactly the same as you would see in a `SQLTXRACT`\
    \ report, so we won’t dwell on it too much here. The important thing to note is\
    \ that it gives you an easy side-by-side comparison for many features including\
    \ the execution plan (see [Figure 10-6](#9781430248095_Ch10.xhtml#Fig6)). This\
    \ is a great way to quickly spot differences, especially if you have hundreds\
    \ of lines in your execution plan and only one line is different (yes, it does\
    \ happen and yes, it can make a vast difference in the execution time).\n\n![9781430248095_Fig10-06.jpg](Images/9781430248095_Fig10-06.jpg)\n\
    \n[Figure 10-6](#9781430248095_Ch10.xhtml#_Fig6) .  The Execution plans side by\
    \ side from the two systems\n\n## The Plan Summary\n\nThe most important section\
    \ is the Plan Summary. This shows the average elapsed time and CPU time for both\
    \ compared SQL statements. We see an example of this in [Figure 10-7](#9781430248095_Ch10.xhtml#Fig7).\n\
    \n![9781430248095_Fig10-07.jpg](Images/9781430248095_Fig10-07.jpg)\n\n[Figure\
    \ 10-7](#9781430248095_Ch10.xhtml#_Fig7) .  The Plan Summary section of the report\n\
    \nNot only can we see how the two statements compare in terms of elapsed time\
    \ (which might be misleading if the load on the two systems is different), but\
    \ we also see the CPU time in seconds and the average number of buffer gets, which\
    \ is usually a good measure of how good an execution plan is compared to a different\
    \ run of the same SQL. I’ve highlighted the buffer gets with an arrow. Naturally\
    \ every line of the plan summary is telling us something. I’ve listed below the\
    \ items I consider important:"
