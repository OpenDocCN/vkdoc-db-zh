  trans: "\n在我们草率下结论之前（这在调查性能问题时应极力避免），我们需要查看有问题的系统并进行对比（参见 图 8-11）。我们的计划是找出这两个系统之间可能导致一个使用动态采样而另一个使用基数反馈的差异之处。\n\
    \n![9781430248095_Fig08-11.jpg](img/9781430248095_Fig08-11.jpg)\n\n图 8-11. 有问题的系统的表统计信息\n\
    \n现在将两者放在一起看，我们发现了一些非常有趣的现象。两个数据库都显示 `TABLE4` 是一个临时表，且针对这一张表，这两个系统的统计信息收集情况是不同的。我们还看到\
    \ `TABLE1` 的数据量也不同，但至少目前看来，`TABLE4` 的差异似乎更值得关注，因为它的计数为 0，行数也为 0。我们将 `TABLE1` 的问题作为备选思路。因此，让我们检查一下\
    \ `TABLE4` 的元数据，看看它是如何定义的。（我们可以通过点击报告顶部的“元数据”轻松获取此信息。参见 图 8-12。\n\n![9781430248095_Fig08-12.jpg](img/9781430248095_Fig08-12.jpg)\n\
    \n图 8-12. 从 `SQLTXECUTE` 报告的顶部，我们可以导航至该查询所有对象的元数据\n\n然后，从报告中标有“元数据”的部分，我们可以通过点击“表”超链接来选择表元数据，如\
    \ 图 8-13 所示。请注意，如果我们想调查索引，这里还有一个指向索引元数据的链接。\n\n![9781430248095_Fig08-13.jpg](img/9781430248095_Fig08-13.jpg)\n\
    \n图 8-13. 我们拥有元数据的对象类型列表，本例中是表和索引\n\n`SQLTXPLAIN` 报告的表元数据显示了所有表的链接，这些表位于生成报告所针对的查询中。参见\
    \ 图 8-14。本例中有四个表。我们目前感兴趣的是第四个表，因此我们点击“`TABLE4`”超链接。\n\n![9781430248095_Fig08-14.jpg](img/9781430248095_Fig08-14.jpg)\n\
    \n图 8-14. 我们拥有元数据的表对象列表\n\n这将我们带到报告中显示 `TABLE4` 元数据的部分。我们看到它是一个带有 `ON COMMIT PRESERVE\
    \ ROWS` 子句的全局临时表。我们看到的 DDL 如下：\n\n```sql\n CREATE GLOBAL TEMPORARY TABLE \"SCHEMA1\"\
    .\"TABLE4\"\n   (   \"COLUMN1\" NUMBER(10,0),\n       \"COLUMN2\" NUMBER(10,0),\n\
    \       \"COLUMN3\" NUMBER(10,0)\n   ) ON COMMIT PRESERVE ROWS\n```\n\n这张表没什么特别之处。这是一个全局临时表的默认创建方式，可以在\
    \ SQL 处理期间供多个会话使用。如果开发人员希望在表中保留一些临时数据供应用程序的后续步骤处理，这通常会包含在应用程序设计中。DDL（元数据）中的 `on\
    \ commit preserve` 部分确保提交到表中的数据会被保留。对于这类表，通常期望在处理结束时，有时是在处理开始时清理表中的数据。这里需要注意的关键点是，在有问题的系统上，为该表收集了统计信息（参见\
    \ 图 8-11）。`TABLE4` 有一个最后分析的日期，但在良好的系统上没有。如果我们查看收集到的 `TABLE4` 的统计信息，会发现表当时是空的。这些统计信息随后会阻止动态采样被激活（因为\
    \ `TABLE4` 有“良好”的统计信息），但不会阻止基数反馈，因为在处理过程中加载的数据会使基数估计出错。这听起来像一个可行的理论。不知何故，在有问题的系统上为\
    \ `TABLE4` 收集了统计信息，而在良好的系统上则没有。在良好的系统上，该表没有被分析。这将允许动态采样在运行时估计统计数据并确定一个良好的执行计划。有了这个可行的理论，我们现在可以构建一个测试用例（在第\
    \ 13 章中描述），并通过删除全局临时表的统计信息，尝试从有问题的测试用例中获得良好的执行计划。\n\n## 总结\n\n动态采样和基数反馈是很有用的功能，适用于统计信息缺失的少数情况。然而，良好的统计信息是无可替代的。由于复杂功能的相互作用，可能会产生表现出奇怪行为的情况。即使看似相同的系统，如果关键组件被更改（有时是无意的），其行为也可能大不相同。`SQLTXPLAIN`\
    \ 由于收集了所有信息，是解决大多数 SQL 调优难题最快、最简便的方法。在下一章中，我们将更详细地了解特殊的 Data Guard 物理备用环境以及 `SQLT`\
    \ 如何提供帮助。\n\n# 第 9 章\n\n![image](img/frontdot.jpg)\n\n## 在 Data Guard 物理备用数据库中使用\
    \ SQLTXPLAIN\n\n`SQLTXPLAIN` 是一个旨在帮助解决 SQL 调优问题的强大工具，但当数据库是只读的 Data Guard 物理备用数据库时，其有效性会受到限制。像\
    \ Data Guard 物理备用数据库这样的只读数据库无法被 `SQLTXPLAIN` 等工具写入。在本章中，我们将探讨专门为处理 Data Guard\
    \ 而创建的特殊工具。\n\nData Guard 物理备用数据库\n"
- fmt: "# Oracle Data Guard 与 SQLT 工具概述\n\nData Guard 是 Oracle 公司开发的一项技术，旨在应对“如果……会怎样”的场景。如果我的数据中心因洪水完全被摧毁会怎样？如果存放我数据库的建筑物被火灾烧毁会怎样？传统上，这个问题通过及时的备份来解决：备份被运送到场外，存储在安全地点，然后可以在约定的时间范围内访问，并在另一个站点（推测不在灾区）恢复到备用的硬件上。这种策略存在许多困难：执行备份、将备份运输到安全地点、从安全地点获取正确的备份、使用备份和恢复程序重建系统，最后为需要使用系统的员工提供访问权限。最后也是最重要的，你需要定期测试这些程序，否则当灾难来临时，你可能拥有所有数据和设备，却不知道如何将它们组合成一个可工作的系统。当然，这个恢复过程可能耗费相当长的时间。你肯定已经测试过你的恢复程序了吧？我曾合作过的一个站点对此非常重视，在测试当天，他们会四处走动，给人和设备贴上红色贴纸，并告诉这些人他们不能参加此次测试（推测是在“外星人绑架你的数据中心”的场景中被外星人绑架了）。测试这些场景很困难；不足为奇的是，许多站点没有做足够的测试，只是交叉\
    \ IT 手指并祈求好运。\n\nData Guard 使保护数据站点变得简单得多。前面提到的所有复杂情况都有可能被消除。使 Data Guard 物理备用数据库工作的技术在概念上非常简单。跟踪数据库中每个更改的归档日志（或重做日志）通过源系统上的特殊进程传输到备用系统上的特殊进程，在那里这些更改被逐块应用到源数据库的副本上。这个称为传播的过程可以在备用数据库上应用数据。数据可以与主数据库同步应用，也可以落后于主数据库一个预设的量。你甚至可以拥有多个备用数据库，全部从主数据库收集更改。借助\
    \ Data Guard 活动备用数据库，你甚至可以让故障转移（即主数据库发生故障，备用数据库必须接管的过程）以最小的混乱发生。\n\nData Guard\
    \ 是灾难恢复技术的一次巨大飞跃。完整的覆盖范围远远超出了本书的范围；但是，对该工具有一个基本的、高层次的了解是有用的。\n\n![image](Images/sq.jpg)\
    \ **注意** 我不可能在此涵盖比 Data Guard 最简要的细节更多的内容。这本身就是一个需要一本书的篇幅才能讲完的话题。最新的书籍是 Larry\
    \ Carpenter 等人所著的 *Oracle Data Guard 11g Handbook* (Oracle Press 2009)。\n\n可以说，Oracle\
    \ Data Guard 物理备用数据库允许数据中心一直在线。没有停机时间。当然，你仍然需要备份来处理那些讨厌的系统性错误（你删除了错误的数据）。Data\
    \ Guard 使你的测试场景简单得多。现在你只需要执行一次切换（一个受控的计算机角色切换，与故障转移相对），一旦切换完成，你就可以立即开始测试。\n\n\
    在 11g 第 1 版中，Oracle 改变了 Data Guard，使得物理备用数据库不仅可以用于故障转移或切换操作，还可以用于只读操作。通常，这是为了允许在备用数据库上运行报告。许多站点发现这对他们的运营是一个巨大的好处。现在，他们可以将昂贵的报告操作（就资源使用而言）转移到备用数据库上，并为主数据库腾出资源用于在线事务处理（OLTP）。\n\
    \n## SQLTXTRSBY\n\n一旦报告操作转移到物理备用（和逻辑备用）数据库上，我们可能再次遇到性能不佳的 SQL。在读/写数据库上出现的性能问题正是\
    \ SQLT 可以帮助我们解决的那类问题。唯一的问题是，`SQLTXTRACT` 和 `SQLTXECUTE` 需要数据库的读/写访问权限（以在 SQLT\
    \ 存储库中存储数据以及安装包和过程）。如果我们甚至无法将性能数据存储在出现性能问题的数据库上，SQLT 又如何能帮助我们呢？这就是 `SQLTXTRSBY`\
    \ 发挥作用的地方。\n\n它提供了一些特殊的过程来处理这些特殊情况。随着 Data Guard（和其他只读数据库）变得越来越流行，上述性能问题在 Data\
    \ Guard 实例上出现得越来越多。为了处理这些问题，`SQLTXTRACT` 被调整为无需本地存储即可工作。这是通过创建特殊的例程实现的，这些例程从一个读/写数据库运行，并通过数据库链接延伸到只读数据库，收集所需信息，整理后呈现在读写数据库上。让我们更详细地看看\
    \ `SQLTXTRACT` 的一些限制，然后讨论使用 `SQLTXTRSBY`。\n\n## SQLTXTRACT 限制\n\n我总是把 `SQLTXTRACT`（别名\
    \ `XTRACT`）和 `SQLTXTRSBY`（别名 `XTRSBY`）想象成一个超级英雄和他（或她）的搭档。超级英雄 `XTRACT` 似乎无所不能，但每个超级英雄都有他们的阿喀琉斯之踵，在这里就是无法在只读数据库上工作。`XTRSBY`\
    \ 拥有主英雄所不具备的特殊技能。在这种情况下，`XTRSBY` 可以进入只读的 Data Guard 系统并提取信息，而 `XTRACT` 则不能。物理备用数据库不能容忍写操作。不能有两个系统\
    \ potentially 更新相同的数据（当然，除非你有多主复制，但那是另一本书的内容了），除非主系统有办法知道故障转移系统在做什么，而 Data Guard\
    \ 不允许这样做。这就是为什么物理备用数据库以只读模式打开。如果你碰巧进入一个只读数据库并尝试插入一些数据，你会得到如下错误消息：\n\n```\nSQL>\
    \ insert into test1 values (1);\ninsert into test1 values (1)\n            *\n\
    ERROR at line 1:\nORA-00604: error occurred at recursive SQL level 1\nORA-16000:\
    \ database open for read-only access\n```\n\n我们在上面的例子中看到，向只读数据库插入数据是不可能的。错误消息甚至\
    \ somewhat 说明了发生了什么。`XTRACT` 需要保存一些数据来进行分析，因此这一步（在本地数据库中保存数据）对 `XTRACT` 行不通。`XTRSBY`\
    \ 通过将所需数据通过数据库链接拉取到一个读/写数据库并将其本地存储，而不是存储在只读数据库上，从而解决了这个问题。\n\n`XTRACT` 还依赖于创建一个用户来安全地存储其对象。`XTRACT`\
    \ 无法在只读数据库上执行此操作。\n\n```\nSQL> connect / as sysdba\nConnected.\nSQL> create user\
    \ sqltxplain_read_only identified by orcle;\ncreate user sqltxplain_read_only\
    \ identified by orcle\n            *\nERROR at line 1:\nORA-00604: error occurred\
    \ at recursive SQL level 1\nORA-16000: database open for read-only access\n```\n\
    \n即使是收集跟踪的简单过程也无法完成："
  raw: "Data Guard is a piece of technology, developed by Oracle in response to a\
    \ “what if” scenario. What if my data center is completely wiped out by flooding?\
    \ What if a fire destroys the building my database is housed in? Traditionally\
    \ this has been answered by timely backups, shipped off site and stored in a secure\
    \ location that can then be accessed within an agreed time scale and restored\
    \ to backup hardware made available at another site (presumably a site not in\
    \ the disaster zone). This strategy had many difficulties: taking the backup,\
    \ shipping the backup to a safe location, getting the right backup from the secure\
    \ location, recreating your systems with the use of the backup and your restore\
    \ procedures, and finally getting access to those systems for the staff required\
    \ to use them. Finally and most importantly, you need to test these procedures\
    \ on a regular basis, otherwise come the day of the disaster you may have all\
    \ the data and equipment, but you’ll have no idea how to put it all together to\
    \ make a working system. Of course, this restore procedure can take a considerable\
    \ amount of time. You have tested your recovery procedure haven’t you? One site\
    \ I worked with took this so seriously that on the day of the test, they would\
    \ go around and put red stickers on people and equipment and tell the people they\
    \ were not available for this test (presumably they had been abducted by the aliens\
    \ in the “Aliens abduct your data center” scenario). It was hard to test these\
    \ scenarios; and not surprisingly, many sites did not do adequate testing and\
    \ crossed their IT fingers and hoped for the best.\n\nData Guard makes preserving\
    \ your data site much simpler. All of the aforementioned complications can potentially\
    \ be eliminated. The technology that makes Data Guard physical standby work is\
    \ in concept very simple. The archive logs (or redo logs), that track every change\
    \ in your database are transferred by special processes on your source system\
    \ to special processes on the standby system, where the changes are applied, block\
    \ by block to a copy of your source database. This process called propagation\
    \ can apply data on the standby database. The data can be applied in lock step\
    \ with the primary database or it can lag behind the primary database by a preset\
    \ amount. You can even have multiple standby databases all collecting changes\
    \ from the primary database. With Data Guard active standby, you can even allow\
    \ the failover (the process whereby the primary fails and the standby has to take\
    \ over) to happen with the minimum of fuss.\n\nData Guard is a huge leap forward\
    \ in disaster-recovery technology. Complete coverage goes well beyond the scope\
    \ of this book; but a basic, high-level understanding of the tool is useful.\n\
    \n![image](Images/sq.jpg) **Note**  I could not hope to cover any more than the\
    \ briefest details of Data Guard here. It is a book- length topic by itself. The\
    \ latest book is entitled *Oracle Data Guard 11g Handbook* by Larry Carpenter,\
    \ et. al. (Oracle Press 2009).\n\nSuffice it to say that Oracle Data Guard Physical\
    \ Standby allows the data center to be online all of the time. There is no down\
    \ time. Naturally you still need backups for those pesky systematic errors (you\
    \ deleted the wrong data).  Data Guard makes your testing scenario much simpler.\
    \ Now you need only carry out a switchover (a controlled switch of the computer\
    \ roles as opposed to the failover), and once the switchover is complete you can\
    \ start your testing immediately.\n\nIn 11g release 1, Oracle changed Data Guard\
    \ so that not only was the physical standby ready for a failover or switchover\
    \ operation, it was also available for read-only operations. Typically this would\
    \ be to allow reports to run on the standby database. Many sites found that this\
    \ was a massive boon to their operations. Now they could move their expensive\
    \ reporting operations (in terms of resource usage) to the standby database and\
    \ free up the primary for On-Line Transaction Processing (OLTP).\n\nSQLTXTRSBY\n\
    \nOnce reporting operations moved to the physical standby (and logical standby)\
    \ we could once more have poorly performing SQL. Performance problems that are\
    \ on a read/write database are the sort of thing that SQLT can help us with. The\
    \ only problem being that SQLTXTRACT and SQLTXECUTE need read/write access to\
    \ the database (to store data in the SQLT repository and to install packages and\
    \ procedures). How is it possible for SQLT to help us if we can’t even store data\
    \ about the performance on the database with the performance problem? This is\
    \ where SQLTXTRSBY comes into play.\n\nIt provides some special procedures that\
    \ deal with these special circumstances. As Data Guard (and other read-only databases)\
    \ became more popular more of the performance problems mentioned above appeared\
    \ on Data Guard instances. To deal with these problems SQLTXTRACT was adapted\
    \ to work without any local storage. This was done by making special routines\
    \ that ran from a read/write database and reached out across a database link to\
    \ the read-only database, collected the required information and collated it and\
    \ presented it on the read-write database. Let’s take a more detailed look at\
    \ some of SQLTXTRACT’s limitations and then discuss using SQLTXTRSBY.\n\nSQLTXTRACT\
    \ Limitations\n\nI always think of SQLTXTRACT (alias XTRACT) and SQLTXTRSBY (alias\
    \ XTRSBY) as a superhero and his (or her) sidekick. XTRACT the superhero can seemingly\
    \ do it all, but every superhero has their Achilles heel, in this case it is the\
    \ inability to work on a read-only database. XTRSBY has those special skills that\
    \ the main hero does not have. In this case XTRSBY can go into a read-only Data\
    \ Guard system and get out with the information, where XTRACT cannot. Physical\
    \ standbys cannot tolerate write operations. There cannot be two systems potentially\
    \ updating the same data (unless you have multi-master replication of course,\
    \ but that’s a whole other book), not unless there was some way for the primary\
    \ to know what the failover system was doing, and Data Guard does not allow for\
    \ that. This is why the physical standby database is open in read-only mode. If\
    \ you do happen to wander onto a read-only database and try and insert some data\
    \ you’ll get an error message like this:\n\n```\nSQL> insert into test1 values\
    \ (1);\ninsert into test1 values (1)\n            *\nERROR at line 1:\nORA-00604:\
    \ error occurred at recursive SQL level 1\nORA-16000: database open for read-only\
    \ access\n```\n\nWhat we see in the above example is that inserting data into\
    \ a read-only database is not possible. The error message is even somewhat descriptive\
    \ of what happened. XTRACT needs to keep some data in the database to do its analysis,\
    \ so this step (saving the data in the local database) will not work for XTRACT.\
    \ XTRSBY solves this problem by pulling the required data across a database link\
    \ to a read/write database and stores it locally rather than on the read-only\
    \ database.\n\nXTRACT also relies on creating a user so that it can store its\
    \ objects safely. XTRACT cannot do that on a read-only database.\n\n```\nSQL>\
    \ connect / as sysdba\nConnected.\nSQL> create user sqltxplain_read_only identified\
    \ by orcle;\ncreate user sqltxplain_read_only identified by orcle\n          \
    \  *\nERROR at line 1:\nORA-00604: error occurred at recursive SQL level 1\nORA-16000:\
    \ database open for read-only access\n```\n\nEven a simple procedure to collect\
    \ trace cannot be done:"
