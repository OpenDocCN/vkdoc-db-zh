    Peter Gadah 是性能团队的同事，也值得特别一提。他们真的很棒，让我明白无论你认为自己对调优了解多少，总有更多东西要学。我非常幸运能遇到这么多知识渊博、热情洋溢的同事和经理。这里没有空间感谢他们所有人，为此我很抱歉。

    '
- fmt: 'Thanks are also due to Professor Garry Hunt who always believed in my potential
    and taught me that anything is possible if you put your mind to it.


    From Apress, Jonathan Gennick made the final decision to publish this book, showing
    faith when others were doubtful. Thanks also to Anamika Panchoo, who put up with
    my missed deadlines: I’m sorry, I did my best. Last but by no means least, Chris
    Nelson’s herculean efforts have made immeasurable improvements to my poor illiterate
    scratchings (don’t change that) and allowed me to produce a book I hope will be
    useful for years to come. Chris shouted, pushed, and otherwise kept me going by
    telling me the finish line was just around the corner. For your patience and hard
    work I sincerely thank you.


    ## Foreword


    You are about to read this book on the subject of SQL Tuning using `SQLTXPLAIN`
    (also referred to as `SQLT` for short). Chances are you know a bit about what
    this `SQLT` tool offers but not much about the story behind it. This foreword
    provides some background on how this tool became what it is today. I hope you
    enjoy this behind-the-scenes look at the motivations and events that slowly came
    together over the years as I’ve worked on the tool you’re about to learn.


    In the late 1990s I was a “road warrior” like many consultants back then. I was
    an Oracle “field support engineer” with pretty good expertise in manufacturing
    and SQL tuning, and I had chosen to be part of the Short-term Assignments Team.
    (We had two options back then, short or long-term assignments!). I used to travel
    a lot from site to site for these assignments.


    Manufacturing and SQL Tuning was a good combination for someone like me, willing
    to go on site and handle some of the big fires affecting large manufacturing corporations
    using Oracle ERP. Life was intense, and it was good! After several week-long assignments
    I started noticing some patterns: when trying to diagnose a SQL statement performing
    poorly, there were many areas to look at, and `trace/tkprof` would not give me
    everything I needed to effectively diagnose SQL tuning issues promptly! Through
    my assignments, I developed a set of flexible scripts. That is how the legendary
    `coe_xplain.sql` came to life.


    Karl Daday, my manager at the time, supported my endeavors and actually encouraged
    me to build my own set of tools so I could deliver results in a one-week time
    frame. Thus, I used `coe_xplain.sql` on pretty much every performance assignment
    and always with good results. Over time I was glad I developed this little tool,
    since most of my enhancement requests for `tkprof` are still pending.


    One day, while I has happily using my `coe_xplain.sql` personal script, as well
    as some other scripts I had developed, a talented DBA in one of the corporations
    I was working with at the time asked me if he could keep my set of tools for later
    use. My concern over leaving behind my toys was that I knew from experience that
    anything you code will follow you your entire life, which is both a reward and
    a curse. If your code has only a few bugs, you do fine. Otherwise, you feel haunted
    and hunted for decades!


    Nevertheless, I decided to share my `coe_xplain.sql` and other small tools, with
    the understanding that their users would take them “as is.” A year later, the
    same DBA asked me if I would publish my `coe_xplain.sql` script in `Metalink`
    (now known as `MyOracle Support`), so he could keep getting new versions if I
    decided to keep it updated. This was a turning point for me. Making a tool available
    in `Metalink` back in 2001 meant only one thing to me: I was willing to compromise
    to keep this tool free of bugs as much as possible, and I would have to react
    to enhancement requests even if that meant declining them all. I knew back then
    (as I know today) that I always have a hard time saying “no” when I actually can
    and want to say “yes.”


    So after `coe_xplain.sql` was published in `Metalink`, I quickly started getting
    some questions like: “Can you add this little tiny functionality to your otherwise
    nice script?”


    Late in 2002 the `coe_xplain.sql` script had become a large script, and I decided
    it was time to actually upgrade it to PL/SQL. That would mean rewriting the entire
    functionality but using one PL/SQL package instead of several SQL statements embedded
    into one large script. In those days I was still part of a team named the “Center
    of Expertise.” That is why `coe_xplain.sql` had that prefix “coe_”. Today there
    are many teams within Oracle sharing the same “CoE” name, so I feel its meaning
    is somewhat diluted. (Something similar happened to the “BDE” team, which means
    “Bug Diagnostics and Escalations.” That’s the reason why some of my scripts had
    and still have the prefix “bde_”.)


    I decided it was time to upgrade `coe_xplain.sql` to something more robust. I
    no longer wanted to name my scripts after the name of the team I was working for.
    So in 2002, on the second major version, this `coe_xplain.sql` tool came to be
    `SQLTXPLAIN`, and I published it on `Metalink` (`MyOracle Support`) under note
    `215187.1`, which still is its location today. The name `SQLTXPLAIN` is loosely
    derived from “SQL Tuning and Explain Plan”. I had searched the Internet and had
    not found any references to this `SQLTXPLAIN` name. I was trying to avoid collisions
    with other tool names, products, or companies, and as of today I have succeeded,
    at least in regard to this naming!


    `SQLTXPLAIN` was rapidly adopted by many Oracle ERP teams within Oracle Support
    and gradually through Oracle Development. Most of the `SQLT` enhancement requests
    I used to get in those days were E-Business Suite (`EBS`) specific, so `SQLTXPLAIN`
    became mostly a tool to diagnose SQL statements performing poorly within `EBS`.
    From 2002 all the way to 2006, this tool was installed inside the application
    schema, what was `APPS` for `EBS`. So `SQLTXPLAIN` used to have strong `EBS` dependencies.
    It was created inside an application schema, creating and dropping objects there.
    But don’t panic! It no longer works like this.


    Those years between 2002 and 2006 were difficult for me at Oracle. I was extremely
    busy developing internal applications. I was also getting my master’s degree in
    computer science, so I had a double challenge on my hands. And that’s not to mention
    that my wife and I were raising four teenagers! Thus, `SQLTXPLAIN` was practically
    frozen until 2007.


    I didn’t mention it before, so I will now: `SQLTXPLAIN` was never an official
    project with Oracle. `SQLTXPLAIN` up until 2007 was my weekend pet project (a
    big one!). I spent pretty much all my personal free time developing and maintaining
    this tool. It was my baby and still is today. I am very lucky that my wife Kelly
    Santana, who also works for Oracle, has been so very supportive during all these
    busy years. Without her patience and understanding I would have had to abandon
    `SQLTXPLAIN` and taken it off `Metalink` years ago!


    Late in 2006 I moved to the Server Technologies Center of Expertise (`ST CoE`)
    within Oracle. I had been at the `Applications CoE` before, and now I was getting
    into the `ST CoE`. That was “the other side of the house,” “the dark side” as
    some call it, or simply “the other side.” I took with me all my `EBS` expertise
    and all my tools. Steve Franchi, one of the best managers I have had at Oracle,
    gave me the green light to keep maintaining my tools, so I was going to be able
    to work on `SQLTXPLAIN` during my regular working hours. That was a huge incentive
    for me, so I was very happy at my new home within Oracle. Until then, most of
    my scripts were actually worked only at night and on the weekend. That’s the problem
    when your hobby and your job blend so smoothly into one: and on top of that, you
    have the privilege of working from home. So today I would say I take care of `SQLTXPLAIN`
    pretty much around the clock, every day of the week. But of course I still sleep
    and eat!'
