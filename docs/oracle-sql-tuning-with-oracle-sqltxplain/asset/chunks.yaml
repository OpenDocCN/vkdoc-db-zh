  trans: '

    # SQL 查询优化相关术语


    关于转换 与 代码，以及 复杂视图合并 (CVM) 和 连接谓词下推 (JPPD)。


    涉及 子查询展开 (SU) 与 子查询展开，以及 展开子查询。


    对于 SQL 语句，需要了解 原始查询、新查询 和 最终查询。


    包括 追踪查询、签名文本 以及数据库参数 `user_dump_dest`。


    # 数据库统计与执行计划相关术语


    ## 数据倾斜与直方图


    关于数据偏斜数据与偏度，它们会影响执行计划。


    这涉及直方图的类型，例如桶对象类型和高度平衡类型，以及使用和添加与移除操作。


    需要理解列统计信息、表列统计信息与定义直方图。


    ## 执行计划与变量


    关于绑定变量，包括窥探与捕获和已捕获的绑定。


    以及`Cursor_Sharing`和`define`参数。


    执行计划的可变执行时间可能源于不同的计划，例如优化器估算不准导致的最差计划。


    需要分析列统计信息。


    ## 其他概念


    包括对象类型、资源计划和章节，表。


    以及超链接、SQLT 报告和 SQLXECUTE 报告。


    # 报告与脚本相关术语


    ## `sqldx.sql`脚本


    关于`sqldx.sql`脚本，它需要指定 CSV 目录、FCSV 目录、FHTML 目录、GCSV 目录、HTML 目录和日志目录。


    它生成 CSV 格式文件和层次化列表，其报告格式取决于许可级别。


    主执行后得到最终结果，可打包为 zip 文件，并支持导入 CSV 结果和查看 HTML DBA_HIST_SNAPSHOT 报告。


    ## `sqlhc.sql`脚本


    关于`sqlhc.sql`脚本，它提供详细报告，包含并行按钮页面和计划统计按钮。


    ## 诊断报告


    关于诊断报告，它包含 HTML 报告形式的信息和历史信息。

    '
