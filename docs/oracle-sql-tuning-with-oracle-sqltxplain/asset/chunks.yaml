- fmt: 'Do any of these settings cause problems? Generally not. Sometimes, however,
    the sample sizes can be very small. This is a deliberate attempt by the algorithm
    designers to reduce the amount of time spent gathering statistics on these columns.
    If too many samples are similar, then the algorithm will decide that there is
    no point in looking any further and will finish collecting for the column. If
    from the top of the `SQLT` report we click on `columns` we are able to see the
    `Table Columns` area of the report. Here we can see column statistics. Of special
    interest are the sample sizes and the percentage that these represent (about halfway
    across the report). See [Figure 3-5](#9781430248095_Ch03.xhtml#Fig5) for an example
    of this area (I’ve only shown columns 8 to 12 of the report). Notice that some
    sample sizes are extremely small.


    ![9781430248095_Fig03-05.jpg](Images/9781430248095_Fig03-05.jpg)


    [Figure 3-5](#9781430248095_Ch03.xhtml#_Fig5) . In this section of the `Column
    Statistics` example (found by clicking on the `Columns` hyperlink from the top
    of the report) the auto sampling size has collected very small sample sizes of
    0.3 percent.


    So how do we get such small sample sizes? Imagine organizing your socks. You’re
    a real fan of socks, so you have ten drawers full of socks. You want to know how
    many types of socks you have. You look in the first drawer and pick a pair of
    socks at random. Black. The second pair is also black, and the third. Do you keep
    going? Or do you now assume all the socks are black? You see the problem. The
    algorithm is trying to be efficient and will sample randomly, but if it is unlucky
    it may get too many similar samples and give up. What if there are millions of
    socks and they are all black except one pair (gold with silver stripes). You probably
    will not find that pair in your random sample. But suppose further that you love
    those gold-and-silvery striped socks and you want to wear them every day. In this
    case you will always do a full table scan of your sock drawer (as you think most
    socks are black and you think that all colored socks you look for will have the
    same distribution). This sounds counterintuitive, but you need to see that the
    optimizer has no idea about your actual data distribution in that column, it only
    has a sample (and a very small one). It then applies the rules it has worked out
    for that drawer for all sock searches. In fact your sock color distribution is
    highly skewed, and the one rare sock pair is the one you want to query all the
    time. Data is exactly the same. Random samples may not pick up the rare skewed
    values and if these are popular in queries, you may need to adjust your column
    sample size.


    ### How to Gather Statistics


    `SQLT` can help you come up with a methodology to use when creating a plan for
    gathering statistics. For pre-production environments with a realistic workload
    you’ll find it sensible to run a `SQLT` report on key `SQL` statements (the ones
    performing badly) and look at the overall performance. Don’t rely on the overall
    runtime alone to decide if your workload is going to be OK. Choose the top `SQL`s,
    as identified by `AWR` or `SQL Tuning Advisor`. You can even pick them off `Enterprise
    Manager` (see [Figure 3-6](#9781430248095_Ch03.xhtml#Fig6)).


    ![9781430248095_Fig03-06.jpg](Images/9781430248095_Fig03-06.jpg)


    [Figure 3-6](#9781430248095_Ch03.xhtml#_Fig6) . You can even select the Top `SQL`
    to investigate from `OEM`.


    Then run a `SQLT XTRACT` report and look at the statistics for these `SQL`s. Remember,
    you’ve picked the heavy hitters on the system so you need to tune these `SQL`s’
    statistics gathering to improve their performance (if possible) while having no
    adverse effect on other queries. If you can see small sample sizes, `which are
    adversely affecting performance`, then you have a candidate for statistics collection
    amendments.


    In 11g you can set preferences for statistics gathering at many granular levels;
    at the database level (`dbms_stats.set_database_prefs`), the schema level (`dbms_stats.set_schema_prefs`),
    or the table level (`dbms_stats.set_table_prefs`). Don’t just increase the percentage
    blindly because performance is bad. Look at the `SQL` that performs badly and
    tune those `SQL` statements. Turning up all statistics to 100 percent will just
    eat up resources and in some cases will not collect enough statistics on columns.
    This is why it is important to look at what is actually happening.


    ### Saving and Restoring and Locking Statistics


    Saving and restoring statistics can be extremely useful. In an earlier example,
    you saw that collecting statistics at the wrong time could break your execution
    plan. If you collected statistics when a table was empty you need to make another
    statistics collection when the table has a representative data set in it. On the
    other hand, if you collect statistics when the data in the table are representative,
    you can save that collection and later restore it for that table. This should
    allow you to represent the newly loaded table correctly, while collecting statistics
    at a convenient time.


    You can also lock statistics from a convenient time.


    ![9781430248095_Fig03-07.jpg](Images/9781430248095_Fig03-07.jpg)


    Figure 3-7 . If your table statistics are very volatile, you may be better off
    locking them.


    Here is an example sequence to collect statistics on an object and save them to
    a table called `MYSTATS2`.


    ```

    SQL> create table test2 as select object_id from dba_objects;


    Table created.


    SQL> exec dbms_stats.gather_table_stats(''STELIOS'',''TEST2'');


    PL/SQL procedure successfully completed.


    SQL> exec dbms_stats.create_stat_table(''STELIOS'',''MYSTATS2'');


    PL/SQL procedure successfully completed.


    SQL> delete from test2;


    73419 rows deleted.


    SQL> commit;


    Commit complete.


    SQL> select count(*) from test2;


    COUNT(*)

    ----------

    0


    SQL> exec dbms_stats.import_table_stats(''STELIOS'',''TEST2'',null,''MYSTATS2'');


    PL/SQL procedure successfully completed.


    SQL>

    ```


    These simple steps are all that is required to save statistics for later use.
    This is what `SQLT` does for you when you collect information about an `SQL` statement.
    The statistics for the objects are collected together and placed into the `ZIP`
    file so you can build test cases where a query will work as if it were on production
    but requires no data. We’ll look at creating a test case in [Chapter 11](../Text/9781430248095_Ch11.xhtml).
    It is one of the most useful tools you get with `SQLT`.


    ### The Case of the Midnight Truncate


    Time to look at the second case in our detective series. You’re new on site and
    see a query with lots of hints. When you ask about it and why it has so many hints,
    you’re told that the execution plan is wrong if the hints are removed. You also
    notice that cartesian joins have been disabled with `_optimizer_cartesian_enabled=FALSE`
    (see [Figure 3-8](#9781430248095_Ch03.xhtml#Fig8)).


    ![9781430248095_Fig03-08.jpg](Images/9781430248095_Fig03-08.jpg)


    [Figure 3-8](#9781430248095_Ch03.xhtml#_Fig8) . The `CBO Environment` section
    can often reveal “odd” parameter settings.


    Now I’m not suggesting that you leap into every situation and remove hints without
    thinking, but `SQL`s with hints are sometimes a sign of something else that is
    going wrong. Usually the culprit is Moriarty, I mean statistics, of course! Don’t
    be prejudiced, always go with the evidence, so the first thing to do is collect
    some. In a duplicate environment you run the query without hints.


    First look at the execution plan, specifically the one in memory (see [Figure
    3-9](#9781430248095_Ch03.xhtml#Fig9)).


    ![9781430248095_Fig03-09.jpg](Images/9781430248095_Fig03-09.jpg)


    [Figure 3-9](#9781430248095_Ch03.xhtml#_Fig9) . This execution plan has a glaring
    problem (highlighted in red no less).'
