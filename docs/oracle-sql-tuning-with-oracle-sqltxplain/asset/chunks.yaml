  trans: "\n现在我们了解了偏斜度是什么，以及特定 SQL 语句在 SQLT 报告中如何显示统计数据，接下来应该探讨偏斜度如何可能导致执行计划出现问题。\n\
    \n假设我们想查询上个月与我们有业务往来的每个金融机构的所有财务交易总和。很可能在描述字段中包含机构名称，可能有一个`company_ID`来代表公司，以及一个字段来表示财务交易的金额。当然，我们可能还有许多其他字段，但就偏斜度而言，我们关心的是这些。我们可以查询此表，找出所有`company_ID`与我们当前查找的公司匹配的记录总和。如果我们选择了一个业务往来不多的公司，可能只会得到几条记录。优化器很可能预期某些公司只有一条记录，因此可能选择执行笛卡尔积连接。然而，如果该公司是美国银行，我们可能会预期有数千（甚至数百万）笔交易。在这种情况下，哈希连接可能是更好的选择。对于这两种极端情况，“好”的执行计划大相径庭。\n\
    \n如果对美国银行的记录使用笛卡尔积连接，当 Oracle 试图在数千条记录上执行笛卡尔积时，性能将灾难性下降。即便是 Exadata 也无法应对这样的错误。因此，根据谓词值的不同，我们很可能需要不同的执行计划。要解决这类问题，我们需要考虑有哪些选项：移除直方图、改进直方图、使用自适应游标共享或更改查询。对于在这些情况下该怎么做，没有一成不变的规则。SQLT\
    \ 会显示发生了什么以及偏斜度如何影响执行计划；然后，你可以与开发人员一起，决定哪种策略最适合你的情况：添加或删除哪些索引，以及收集哪些直方图是有帮助的。\n\
    \n## 直方图\n\n直方图是一个令人困惑的主题，除非你知道它是什么。不同文档中使用且有时相互矛盾的术语也无助于理解。因此，让我从定义“桶”开始。桶是特定列的值的范围。例如，如果我们有一个\
    \ TRUE_OR_FALSE 列，并且它只能有两个值（TRUE 或 FALSE），那么我们最多可以有两个桶：每个桶会有一个值来描述 TRUE 的数量和 FALSE\
    \ 的数量。直方图是一种数据表示形式，它描述了不同数据值范围的相对分布情况。\n\n## 直方图类型\n\n我们已经笼统地讨论了直方图，但 Oracle 目前对任何类型的直方图都有\
    \ 254 个桶的限制。这意味着它无法存储一列超过 254 种类型的值的频率。可以想象，与几乎任何事物的任何可能取值范围相比，这是一个非常小的数字！“油漆颜色”、“银行名称”、“邮政编码”：大多数直方图都需要超过\
    \ 254 个桶。如果不同值的数量（在 SQLT 报告中显示为 NDV）大于 254，并且统计信息收集过程检测到了这一点，那么你将不得不以某种方式将数据分布压缩到比不同值数量更少的桶中。如果发生这种情况，你就将优化器暴露在不完整信息的风险之下，这可能对你的执行计划产生不利影响。回顾一下图\
    \ 4-6。你会看到从 5,502 行的样本中产生了 33 个桶。而实际上我们知道有 45 个不同的值。看看下面这个读取表中所有数据的查询结果：\n\n```sql\n\
    SQL> select count(distinct object_type) from test3;\n\nCOUNT(DISTINCTOBJECT_TYPE)\n\
    --------------------------\n                        45\n```\n\n不同值数量的真实答案是 45。统计抽样得到的答案是\
    \ 33。统计信息采样器，即使采样了 5,502 行，也不够幸运，未能找到`object_type`所有可能的不同值。尽管如此，它还是生成了一个频率型直方图，因为没有超过\
    \ 254 的限制。关键是，尽管是频率型直方图，并非所有值都被代表了。如果我们人为地将桶的数量压缩到 10 个，会发生什么？\n\n```sql\nSQL>\
    \ exec dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n\
    \  pname=>'method_opt',\n  pvalue=>'for all columns size 10');\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n现在我们得到了另一种类型（两种可能类型中的另一种）的直方图，即基于高度的直方图（参见图\
    \ 4-7）。\n\n![9781430248095_Fig04-07.jpg](img/9781430248095_Fig04-07.jpg)\n\n图\
    \ 4-7 . 一个包含 10 个桶的基于高度的直方图\n\n在基于高度的直方图中，值类型会根据桶进行计数，并被标记为流行或不流行。如果不流行，则分配一个桶。例如，看看桶号\
    \ 1，它代表按字母顺序低于“CONSUM”的对象类型的值：例如，“CLUSTER”和“CONSUMER GROUP”。因为一个桶可能对应多个值，其中一些我们可能没有遇到，所以终点是估计的。我们知道没有“SYNONY1”这种对象类型，但它是桶\
    \ 5、6、7 和 8 的标签。如你所见，只有 10 个桶时，对对象类型（实际上有 45 个不同类型）的数据分布估计非常差。使用质量如此差的直方图，我们很可能最终得到一些糟糕的执行计划。因此，重要的是我们要知道何时使用直方图，何时它们是一种阻碍。\n\
    \n## 何时使用直方图\n\n如果你使用优化器统计信息收集的默认值，那么你很可能会在一些你没注意到的列上拥有直方图。如果你有一个性能不佳的查询，或者一个你想要调优的查询，你可能需要检查收集到的信息以确保其合理。在决定是否在一列上创建直方图时，需要考虑一些指导原则。直方图旨在处理偏斜数据，因此如果你的数据偏斜度不高，那么直方图就没有用处。一个例子可能是表记录的时间戳。如果数据库活动每天都发生，并且我们每天有\
    \ 100 笔交易，每笔都有一个时间戳，那么日期列上的直方图将无济于事。在频率直方图中，这相当于所有桶的高度都相同。如果没有偏斜度，直方图对我们没有帮助。这只是意味着我们花了夜间时间收集不需要的统计信息。正如我之前提到的，自动样本大小在数据几乎没有偏斜时非常聪明地知道何时停止采样，因此你可能不会因此损失太多时间。\n\
    \n如果你的数据偏斜度很高，那么直方图可能对你非常重要；但如果你确实有直方图，你应该通过 SQLT 检查直方图是否合适且正确。在图 4-8 中，我们看到了\
    \ TABLE 1 的列统计信息。\n\n![9781430248095_Fig04-08.jpg](img/9781430248095_Fig04-08.jpg)\n\
    \n图 4-8 . 部分列统计信息摘录\n"
- fmt: "# 直方图问题与绑定变量\n\n除了许多列的样本率非常低（0.3%）之外，我们还有一些桶计数与不同值的数量不匹配。最后一个条目显示有76个不同的值，但只有75个桶。这意味着有一个值甚至未出现在17.5%的样本量中。在这种情况下，您必须查看直方图（此处为频率直方图）并判断该直方图是否有用。如果您判断数据没有偏斜，因此直方图没有用，那么可以移除该直方图，并更改表首选项以不收集此列的统计信息。如果您发现数据确实存在偏斜，则需要收集更好的统计信息。这意味着需要为此列收集更大的样本量。您可以通过设置表首选项或在主要统计信息作业之后运行特定作业来收集数据。\n\
    \n## 如何添加和移除直方图\n\n如果您想移除列的直方图，可以简单地使用 `dbms_stats` 过程，如下例所示。\n\n```\nSQL> exec\
    \ dbms_stats.delete_column_stats(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n\
    \  colname=>'OBJECT_TYPE',col_stat_type=>'HISTOGRAM');\nPL/SQL procedure successfully\
    \ completed.\n```\n\n但是，这不会永久删除统计信息。下次统计信息作业遇到该表时，它可能会决定再次需要同一列的列统计信息。如果您正在测试查询的执行情况，则可以一次性移除列的统计信息。移除列统计信息可能使您能够重新解析语句，并查看执行计划是否受到实质性影响。如果您想永久移除列统计信息收集，则可以设置表首选项，如下例所示，将\
    \ `method_opt` 值设置为 `\"FOR ALL COLUMNS SIZE 1\"`，这意味着没有列直方图。\n\n```\nSQL> exec\
    \ dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n\
    \  pvalue=>'FOR ALL COLUMNS SIZE 1');\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n如果表有您需要统计信息的其他列，您可能决定设置首选项，以便只忽略某一特定列的列统计信息。以下是此命令的示例。\n\n```\nSQL> exec\
    \ dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n\
    \  pvalue=>'FOR COLUMNS OBJECT_TYPE SIZE 1');\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n另一方面，如果您想添加列统计信息，可以使用 `dbms_stats.get_column_stats` 命令手动收集它们。\n\
    \n## 绑定变量\n\n绑定变量是新Oracle DBA可能不会立即意识到的奥秘之一。另一方面，开发人员会一直使用绑定变量，并且对定义和含义感到熟悉。如果您熟悉变量及其值的概念，那么从绑定变量中无需理解更多内容。它只是Oracle版本的变量。变量（和绑定变量）只是一个值的符号名称，该值可以根据代码的需要而变化。然而，绑定窥视和绑定捕获是更特定于Oracle的概念，它们是允许优化器在存在偏斜时做出更好决策的技术。绑定变量、偏斜度和绑定窥视都与\
    \ `CURSOR_SHARING` 协同工作以改进CBO计划。我们将在以下部分介绍所有这些概念及其工作原理。\n\n### 什么是绑定变量？\n\n既然我们已经进入了直方图的世界并查看了偏斜度，我们看到用作谓词的值可能会对返回的行数产生重大影响。在下面的示例中，我们看到根据我们选择“EDITION”还是“TABLE”，我们会得到不同的计数。\n\
    \n```\nSQL> select count(*) from test3 where object_type='EDITION';\n  COUNT(*)\n\
    \nSQL> select count(*) from test3 where object_type='TABLE';\n  COUNT(*)\n\n```\n\
    \n如果我们想在SQL中避免字面值（这些字面值都会被单独解析，并会对性能产生不利影响），我们可能会引入绑定变量。绑定变量是一种通过设置参数值将参数传递给例程的方法。下面我展示一个简单的过程，使用名为\
    \ `b1` 的绑定变量来计算TEST3中不同对象类型的数量。\n\n```\nSQL> set serveroutput on;\nSQL> create\
    \ or replace procedure object_count(b1 in char)\n  2  as\n  3    object_count\
    \ number;\n  4    begin\n  5    select count(*) into object_count from test3 where\
    \ object_type=b1;\n  6    dbms_output.put_line(b1||' = '||object_count);\n  7\
    \    end;\n  8  /\n\nProcedure created.\n```\n\n如果我们运行此过程几次，可以看到传入并使用了不同的值。\n\n\
    ```\nSQL> exec object_count('EDITION');\nEDITION = 1\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> exec object_count('TABLE');\nTABLE = 3113\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n在上面的例子中，`b1` 接受了值“EDITION”，然后是值“TABLE”。过程中实际完成工作的文本是一个简单的\
    \ `select` 语句。它的谓词是 `object_type=b1`。就优化器而言，查询的文本没有改变。\n\n### 什么是绑定窥视和绑定捕获？\n\n\
    通过使用绑定变量，我们将绑定变量的实际值隐藏在优化器之外。我们这样做是有充分理由的。我们希望避免为每个具有不同谓词值的SQL进行过度解析。当数据没有偏斜且您的执行计划不太可能根据传入的绑定变量值而改变时，这是一个很好的策略。对于偏斜数据，优化器可以从知道传递给SQL的绑定变量值中受益。这个过程被称为“绑定窥视”，是在硬解析期间完成的。另一方面，绑定捕获是在SQL执行期间使用的实际绑定变量值的快照。在这种情况下，用于绑定（此处为\
    \ `b1`）的值被收集并可供SQLT使用。在下面的例子中（[图4-9](#9781430248095_Ch04.xhtml#Fig9)），我们看到了SQLT报告中显示捕获的绑定值的部分。\n\
    \n![9781430248095_Fig04-09.jpg](Images/9781430248095_Fig04-09.jpg)\n\n[图4-9](#9781430248095_Ch04.xhtml#_Fig9).\
    \ 捕获的绑定示例输出\n\n在偏斜度很重要且您怀疑绑定值将优化器引向错误路径的情况下，您可能需要查看“捕获的绑定”部分。结合捕获的绑定和时间戳（以及任何关于性能不佳的报告），您可以追踪为什么特定语句决定执行错误的操作。\n\
    \n## Cursor_Sharing及其值\n\nOracle引入 `CURSOR_SHARING` 参数来解决未使用绑定变量的代码所引起的问题。当不使用绑定变量时，优化器必须解析SQL文本。这是一个昂贵的操作，如果唯一改变的是字面值，这可能是浪费时间。\n\
    \n`CURSOR_SHARING` 有三个可能的值：`EXACT`、`FORCE` 和 `SIMILAR`。`EXACT` 是默认值，告诉优化器在遇到每个SQL文本时分别考虑它。如果您的应用程序编写良好，并且按照最有效的方式使用绑定和字面值，那么保持\
    \ `EXACT` 不变是最佳选择。\n\n将 `CURSOR_SHARING` 设置为 `FORCE` 会告诉优化器为所有谓词使用绑定（并会生成自己的名称）。如果您有一个编写不良的应用程序，并且您希望利用使用绑定变量带来的性能提升，而无需修改应用程序以使用绑定变量，那么您将使用此值。"
  raw: "Apart from the very low percentage sample rates (0.3 percent) for many columns\
    \ we also have some bucket counts that do not match the number of distinct values.\
    \ The last entry shows 76 distinct values but only 75 buckets. This means there\
    \ is one value that is not even represented in the sample size of 17.5 percent.\
    \ In a case such as this, you would have to look at the histogram (a FREQUENCY\
    \ histogram in this case) and determine if the histogram was useful. If it isn’t\
    \ because you judge the data is not skewed, then you can remove the histogram\
    \ and change the table preferences to not collect statistics on this column. If\
    \ you find that the data is indeed skewed then you need to collect better statistics.\
    \ This will mean collecting a larger sample size for this column. You could do\
    \ this by setting table preferences or by running specific jobs to collect data\
    \ after the main statistics job.\n\nHow to Add and Remove Histograms\n\nIf you\
    \ want to remove a column’s histogram you can simply use the `dbms_stats` procedure\
    \ as shown in the example below\n\n```\nSQL> exec dbms_stats.delete_column_stats(\n\
    \  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  colname=>'OBJECT_TYPE',col_stat_type=>'HISTOGRAM');\n\
    PL/SQL procedure successfully completed.\n```\n\nHowever, this does not remove\
    \ the statistics permanently. The next time the statistics job comes across the\
    \ table, it may decide that the same column needs column statistics again. You\
    \ would remove statistics from a column on a one-time basis if you were testing\
    \ the execution of a query. Removing the column statistics might then allow you\
    \ to re-parse a statement and see if the execution plan is materially affected\
    \ by the change. If you wanted to remove the column statistics collection forever\
    \ then you could set the table preferences, as in the example below, by setting\
    \ the `method_opt` value to “`FOR ALL COLUMNS SIZE 1`”, which means no column\
    \ histograms.\n\n```\nSQL> exec dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n\
    \  tabname=>'TEST3',\n  pname=>'method_opt',\n  pvalue=>'FOR ALL COLUMNS SIZE\
    \ 1');\n\nPL/SQL procedure successfully completed.\n```\n\nIf the table has other\
    \ columns you need statistics for, you may decide that you want to set the preferences\
    \ so that only one column in particular is ignored for column statistics. This\
    \ is the command example show in the following example.\n\n```\nSQL> exec dbms_stats.set_table_prefs(\n\
    \  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n  pvalue=>'FOR\
    \ COLUMNS OBJECT_TYPE SIZE 1');\n\nPL/SQL procedure successfully completed.\n\
    ```\n\nIf on the other hand you want to add column statistics you can gather them\
    \ manually with a `dbms_stats.get_column_stats` command.\n\nBind Variables\n\n\
    Bind variables are one of those mysteries that a new Oracle DBA might not immediately\
    \ be aware of. Developers, on the other hand, will use bind variables all the\
    \ time and be comfortable with the definitions and the meanings. If you are familiar\
    \ with the concept of a variable and its value, then there is nothing more to\
    \ understand from a bind variable. It’s just Oracle’s version of a variable. A\
    \ variable (and bind variable) is just a symbolic name for a value that can change\
    \ depending on the needs of the code. Bind peeking and bind capture, however,\
    \ are ideas that are more specific to Oracle and are techniques allowing the optimizer\
    \ to make better decisions when skewness is present. Bind variables, skewness,\
    \ and bind peeking all work with CURSOR_SHARING to improve the CBO plan. We cover\
    \ all these concepts and how they work for you, in the following sections.\n\n\
    What Are Bind Variables?\n\nNow that we have entered the world of histograms and\
    \ have looked at skewness, we see that the value used as the value for the predicate\
    \ could have a material effect on the number of rows returned. In the example\
    \ below we see that depending on whether we select “EDITION” or “TABLE” we get\
    \ a different count.\n\n```\nSQL> select count(*) from test3 where object_type='EDITION';\n\
    \  COUNT(*)\n\nSQL> select count(*) from test3 where object_type='TABLE';\n  COUNT(*)\n\
    \n```\n\nIf we wanted to avoid literal values in our SQL, which would all be parsed\
    \ separately (and would have an adverse effect on performance), we might have\
    \ introduced bind variables. Bind variables are a way to pass parameters to routines\
    \ by setting the values of the parameters. Below I show a simple procedure to\
    \ count the number of different object types in TEST3, using a bind variable called\
    \ `b1`.\n\n```\nSQL> set serveroutput on;\nSQL> create or replace procedure object_count(b1\
    \ in char)\n  2  as\n  3    object_count number;\n  4    begin\n  5    select\
    \ count(*) into object_count from test3 where object_type=b1;\n  6    dbms_output.put_line(b1||'\
    \ = '||object_count);\n  7    end;\n  8  /\n\nProcedure created.\n```\n\nIf we\
    \ ran this procedure a few times we could see that different values are being\
    \ passed in and being used.\n\n```\nSQL> exec object_count('EDITION');\nEDITION\
    \ = 1\n\nPL/SQL procedure successfully completed.\n\nSQL> exec object_count('TABLE');\n\
    TABLE = 3113\n\nPL/SQL procedure successfully completed.\n```\n\nIn the example\
    \ above, `b1` is taking the value “EDITION” and then the value “TABLE”. The text\
    \ in the procedure that actually does the work is a simple `select` statement.\
    \ Its predicate is `object_type=b1`. The text of the query did not change as far\
    \ as the optimizer is concerned.\n\nWhat Are Bind Peeking and Bind Capture?\n\n\
    By using bind variables we are hiding the actual value of the bind variable from\
    \ the optimizer. We did this for a good reason. We want to avoid excessive parsing\
    \ of every SQL with a different predicate value. That’s a good strategy when the\
    \ data is not skewed and your execution plan is not likely to change depending\
    \ on the value passed in as the bind variable. With skewed data, the optimizer\
    \ could benefit from knowing the value of the bind variable being passed to the\
    \ SQL. This process is called “bind peeking” and is done during hard parsing.\
    \ Bind capture, on the other hand, is a snapshot of the value of actual bind variables\
    \ being used during execution of the SQL. The values used for the bind, in this\
    \ case `b1`, are collected and available to SQLT. In the example below ([Figure\
    \ 4-9](#9781430248095_Ch04.xhtml#Fig9)) we see the section in the SQLT report\
    \ showing the values of the captured binds.\n\n![9781430248095_Fig04-09.jpg](Images/9781430248095_Fig04-09.jpg)\n\
    \n[Figure 4-9](#9781430248095_Ch04.xhtml#_Fig9) .  Example output of captured\
    \ binds\n\nIn cases where skewness is important and you suspect that the values\
    \ of the binds are sending the optimizer down the wrong path, you may want to\
    \ look at the section “Captured Binds.” In conjunction with the captured binds\
    \ and the time stamps (and any reports of poor performance) you can track down\
    \ why a particular statement decided to do the wrong thing.\n\nCursor_Sharing\
    \ and Its Values\n\nThe CURSOR_SHARING parameter was introduced by Oracle to address\
    \ the issues caused by code, which did not use bind variables as described above.\
    \ When bind variables are not used, the SQL text has to be parsed by the optimizer.\
    \ This is a costly operation, and it’s probably a waste of time if the only thing\
    \ that’s changed is the value of a literal.\n\nCURSOR_SHARING has three possible\
    \ values: EXACT, FORCE, and SIMILAR. EXACT is the default and tells the optimizer\
    \ to consider each SQL text as it comes across it. If your application is well\
    \ written and uses binds and literals as seems most efficient, then leaving EXACT\
    \ alone is the best choice.\n\nCURSOR_SHARING set to FORCE tells the optimizer\
    \ to use binds for all the predicates (and it will make its own names). This is\
    \ a value you would use if you had a badly written application and you wanted\
    \ to take advantage of the performance gains from using bind variables, without\
    \ modifying your application to use bind variables."
  trans: "\n# 直方图问题与绑定变量\n\n除了许多列的样本率非常低（0.3%）之外，我们还有一些桶计数与不同值的数量不匹配。最后一个条目显示有 76\
    \ 个不同的值，但只有 75 个桶。这意味着有一个值甚至未出现在 17.5%的样本量中。在这种情况下，您必须查看直方图（此处为频率直方图）并判断该直方图是否有用。如果您判断数据没有偏斜，因此直方图没有用，那么可以移除该直方图，并更改表首选项以不收集此列的统计信息。如果您发现数据确实存在偏斜，则需要收集更好的统计信息。这意味着需要为此列收集更大的样本量。您可以通过设置表首选项或在主要统计信息作业之后运行特定作业来收集数据。\n\
    \n## 如何添加和移除直方图\n\n如果您想移除列的直方图，可以简单地使用 `dbms_stats` 过程，如下例所示。\n\n```\nSQL> exec\
    \ dbms_stats.delete_column_stats(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n\
    \  colname=>'OBJECT_TYPE',col_stat_type=>'HISTOGRAM');\nPL/SQL procedure successfully\
    \ completed.\n```\n\n但是，这不会永久删除统计信息。下次统计信息作业遇到该表时，它可能会决定再次需要同一列的列统计信息。如果您正在测试查询的执行情况，则可以一次性移除列的统计信息。移除列统计信息可能使您能够重新解析语句，并查看执行计划是否受到实质性影响。如果您想永久移除列统计信息收集，则可以设置表首选项，如下例所示，将\
    \ `method_opt` 值设置为 `\"FOR ALL COLUMNS SIZE 1\"`，这意味着没有列直方图。\n\n```\nSQL> exec\
    \ dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n\
    \  pvalue=>'FOR ALL COLUMNS SIZE 1');\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n如果表有您需要统计信息的其他列，您可能决定设置首选项，以便只忽略某一特定列的列统计信息。以下是此命令的示例。\n\n```\nSQL> exec\
    \ dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n\
    \  pvalue=>'FOR COLUMNS OBJECT_TYPE SIZE 1');\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n另一方面，如果您想添加列统计信息，可以使用 `dbms_stats.get_column_stats` 命令手动收集它们。\n\
    \n## 绑定变量\n\n绑定变量是新 Oracle DBA 可能不会立即意识到的奥秘之一。另一方面，开发人员会一直使用绑定变量，并且对定义和含义感到 familiar。如果您熟悉变量及其值的概念，那么从绑定变量中无需理解更多内容。它只是\
    \ Oracle 版本的变量。变量（和绑定变量）只是一个值的符号名称，该值可以根据代码的需要而变化。然而，绑定窥视和绑定捕获是更特定于 Oracle 的概念，它们是允许优化器在存在偏斜时做出更好决策的技术。绑定变量、偏斜度和绑定窥视都与\
    \ `CURSOR_SHARING` 协同工作以改进 CBO 计划。我们将在以下部分介绍所有这些概念及其工作原理。\n\n### 什么是绑定变量？\n\n\
    既然我们已经进入了直方图的世界并查看了偏斜度，我们看到用作谓词的值可能会对返回的行数产生重大影响。在下面的示例中，我们看到根据我们选择“EDITION”还是“TABLE”，我们会得到不同的计数。\n\
    \n```\nSQL> select count(*) from test3 where object_type='EDITION';\n  COUNT(*)\n\
    \nSQL> select count(*) from test3 where object_type='TABLE';\n  COUNT(*)\n\n```\n\
    \n如果我们想在 SQL 中避免字面值（这些字面值都会被单独解析，并会对性能产生不利影响），我们可能会引入绑定变量。绑定变量是一种通过设置参数值将参数传递给例程的方法。下面我展示一个简单的过程，使用名为\
    \ `b1` 的绑定变量来计算 TEST3 中不同对象类型的数量。\n\n```\nSQL> set serveroutput on;\nSQL> create\
    \ or replace procedure object_count(b1 in char)\n  2  as\n  3    object_count\
    \ number;\n  4    begin\n  5    select count(*) into object_count from test3 where\
    \ object_type=b1;\n  6    dbms_output.put_line(b1||' = '||object_count);\n  7\
    \    end;\n  8  /\n\nProcedure created.\n```\n\n如果我们运行此过程几次，可以看到传入并使用了不同的值。\n\n\
    ```\nSQL> exec object_count('EDITION');\nEDITION = 1\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> exec object_count('TABLE');\nTABLE = 3113\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n在上面的例子中，`b1` 接受了值“EDITION”，然后是值“TABLE”。过程中实际完成工作的文本是一个简单的\
    \ `select` 语句。它的谓词是 `object_type=b1`。就优化器而言，查询的文本没有改变。\n\n### 什么是绑定窥视和绑定捕获？\n\n\
    通过使用绑定变量，我们将绑定变量的实际值隐藏在优化器之外。我们这样做是有充分理由的。我们希望避免为每个具有不同谓词值的 SQL 进行过度解析。当数据没有偏斜且您的执行计划不太可能根据传入的绑定变量值而改变时，这是一个很好的策略。对于偏斜数据，优化器可以从知道传递给\
    \ SQL 的绑定变量值中受益。这个过程被称为“绑定窥视”，是在硬解析期间完成的。另一方面，绑定捕获是在 SQL 执行期间使用的实际绑定变量值的快照。在这种情况下，用于绑定（此处为\
    \ `b1`）的值被收集并可供 SQLT 使用。在下面的例子中（图 4-9），我们看到了 SQLT 报告中显示捕获的绑定值的部分。\n\n![9781430248095_Fig04-09.jpg](img/9781430248095_Fig04-09.jpg)\n\
    \n图 4-9. 捕获的绑定示例输出\n\n在偏斜度很重要且您怀疑绑定值将优化器引向错误路径的情况下，您可能需要查看“捕获的绑定”部分。结合捕获的绑定和时间戳（以及任何关于性能不佳的报告），您可以追踪为什么特定语句决定执行错误的操作。\n\
    \n## Cursor_Sharing 及其值\n\nOracle 引入 `CURSOR_SHARING` 参数来解决未使用绑定变量的代码所引起的问题。当不使用绑定变量时，优化器必须解析\
    \ SQL 文本。这是一个昂贵的操作，如果唯一改变的是字面值，这可能是浪费时间。\n\n`CURSOR_SHARING` 有三个可能的值：`EXACT`、`FORCE`\
    \ 和 `SIMILAR`。`EXACT` 是默认值，告诉优化器在遇到每个 SQL 文本时分别考虑它。如果您的应用程序编写良好，并且按照最有效的方式使用绑定和字面值，那么保持\
    \ `EXACT` 不变是最佳选择。\n\n将 `CURSOR_SHARING` 设置为 `FORCE` 会告诉优化器为所有谓词使用绑定（并会生成自己的名称）。如果您有一个编写不良的应用程序，并且您希望利用使用绑定变量带来的性能提升，而无需修改应用程序以使用绑定变量，那么您将使用此值。\n"
- fmt: '`CURSOR_SHARING` set to `SIMILAR` is deprecated as of 11g and should not be
    used, but it’s probably worth mentioning that it was an “intelligent” version
    of `CURSOR_SHARING=FORCE`. It created system-defined bind variables in most cases
    unless the bind variable affected the optimization in some way. It was not a complete
    solution, and the introduction of Adaptive Cursor Sharing is a big improvement
    on `CURSOR_SHARING=SIMILAR`. The value of the parameter `CURSOR_SHARING` is important
    to note so that you understand if the bind variables are in play. You will also
    see in the SQL text section of the SQL report that if literals have been replaced
    by bind variables they will have system-defined names.


    ## The Case of the Variable Execution Time


    Sometimes it is better to have a slightly longer stable execution time than a
    slightly faster unstable plan. Unstable execution times (where the execution time
    can vary widely) cause problems with scheduling of batch jobs. In the example
    case here the execution times have never been stable. You’re in a pre-production
    environment and you want to get some information on what can be done to improve
    the stability of the execution time. You have a luxury in that you have a test
    environment with representative queries and data. So after the test you look at
    the `AWR` reports and decide that one particular query needs attention, because
    sometimes it takes a long time. We get the `SQL_ID` and generate the `SQLT`. We
    want to know what’s happening with the execution plans, so we look in the “Execution
    Plans” section as shown in [Figure 4-10](#9781430248095_Ch04.xhtml#Fig10).


    ![9781430248095_Fig04-10.jpg](Images/9781430248095_Fig04-10.jpg)


    [Figure 4-10](#9781430248095_Ch04.xhtml#_Fig10) .  Shows many different execution
    plans


    In the “Execution Plans” section we see that there are many different execution
    plans. Why would we have so many different execution plans? Let’s look at the
    worst execution plan first, as shown in [Figure 4-11](#9781430248095_Ch04.xhtml#Fig11)
    (the left side of the screen) and [Figure 4-12](#9781430248095_Ch04.xhtml#Fig12)
    (on the right side). We see many Nested Loop steps in [Figure 4-11](#9781430248095_Ch04.xhtml#Fig11)
    and many under estimates in [Figure 4-12](#9781430248095_Ch04.xhtml#Fig12).


    ![9781430248095_Fig04-11.jpg](Images/9781430248095_Fig04-11.jpg)


    [Figure 4-11](#9781430248095_Ch04.xhtml#_Fig11) .  The worst execution plan as
    selected by clicking on the “W” from the list of execution plans in Figure 4-10


    ![9781430248095_Fig04-12.jpg](Images/9781430248095_Fig04-12.jpg)


    [Figure 4-12](#9781430248095_Ch04.xhtml#_Fig12) .  The numbers highlighted with
    *** show very big under estimates by the optimizer


    Since we have actual rows returned, we can look at the over and under estimates.
    We have quite a few of them, so something is not right. Possibly more than one
    thing is not right. Since the first step, Line 11, is already “wrong,” by a factor
    of 4,230, we should start there. Look at [Figure 4-13](#9781430248095_Ch04.xhtml#Fig13),
    as it shows the column statistics for Table 1\. Do you see anything of interest?
    (The actual table has more information than is shown in the figure. I have removed
    some table columns for readability.)


    ![9781430248095_Fig04-13.jpg](Images/9781430248095_Fig04-13.jpg)


    [Figure 4-13](#9781430248095_Ch04.xhtml#_Fig13) .  Column statistics for Table
    1


    Let’s look at the `ID` column’s statistics. The sample size is good at 100 percent,
    and there are 34,916 distinct values: so that’s more values than we can fit into
    our 254 buckets. So if we had a histogram it would be a HEIGHT BALANCED one, but
    under the “Histograms” column we see “NONE”. So what about `ORG_ID`? Only a 2.4
    percent sample with only one distinct value, and high and low values of “ABC”.
    Also we have a FREQUENCY histogram with only one bucket. Not surprisingly the
    selectivity will be 1.0, but equally this histogram can’t be doing anything for
    us, as it’s pointless. On the other hand, it can’t be contributing to a variable
    execution plan. So let’s look at Column `ID2`, where we have a 2.4 percent sample
    with 397 distinct values and a height balanced histogram. If we looked at the
    histogram in detail we’d see there were lots of popular values, but let’s keep
    going. The DATE column has a HEIGHT BALANCED histogram: does that make any sense?
    It depends on what the DATE column represents. But usually DATE columns with histograms
    should be viewed with suspicion. `ID3`, also 2.4 percent, has two distinct values,
    “Y” and “N”. If we look at the histogram we’d see that “N” has a selectivity of
    0.03 and “Y” has a selectivity of 0.97. This alone could affect the rows returned.
    It’s looking like there is some skewed data for sure. But let’s keep looking.
    Next we have `ID4` with 51 distinct values and 49 buckets, so things don’t look
    quite so good now. The histogram for that shows selectivities between 0.005 and
    0.1. That’s a factor of 20: which means that’s another skewed column, plus the
    bucket count is wrong. `ID5` doesn’t have a histogram and `ID6` has a wrong bucket
    count: again it’s skewed. You would spend time looking at every column in a report
    like this because sometimes the real culprit is the last thing you look at; but
    in this example, we have poor sampling for histograms, inappropriate histograms,
    and probably missing histograms.


    In a case like this you would do your best to set up the right histograms, eliminating
    them where they are not needed and adding them where they are.


    ## Summary


    Skewness is one of the most difficult concepts to understand and one of the most
    troublesome to deal with in `SQL`. Many attempts have been made through iterations
    of the Oracle software to deal with the problem, some attempts were more successful
    than others, but Adaptive Cursor Sharing is the most successful to date. Throughout
    the twists and turns that can result from unstable execution plans, `SQLTXPLAIN`
    is there with the information to get your plan stable and the right statistics
    collected. In the next chapter we will look at query transformation that the optimizer
    does during parsing to get your execution plan to execute quickly.


