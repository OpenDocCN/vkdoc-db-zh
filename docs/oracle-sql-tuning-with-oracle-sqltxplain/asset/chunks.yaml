  trans: "\n# 一个 XPLORE 会话示例\n\n| 错误编号 | 值 | 描述 | 优化器特性启用 | 是否默认 |\n| :--- | :---\
    \ | :--- | :--- | :--- |\n| 6897034 | 0 | 索引基数估算未考虑 NULL 行 | 10.2.0.5 | 1 |\n\n\
    ```\n如果我们运行超级脚本，它会执行此步骤，从而设置此参数。结果将是在 XPLORE 脚本的那个步骤中，我们的会话采用了一个非默认的设置。这个参数不太可能改善你的查询，但也不是完全不可能。想象一个情况，某些\
    \ SQL 依赖于一个有缺陷的基数计算，然后通过应用针对错误 6897034 的修复程序将其“修复”。接着该 SQL 可能会出现性能回退（表现变差），并可能看起来像是升级到\
    \ 10.2.0.5 导致 SQL 出错了。然而，XPLORE 方法只是在应用一种蛮力方法；它强制遍历每一个选项，并让你运用自己的智慧来决定哪些是重要的，哪些不是。现在我们知道了\
    \ XPLORE 的工作原理、何时使用它以及如何使用它。我们也知道 XPLORE 并非调优问题的万能药，它只是调优瑞士军刀上的又一件工具。在我们看一个 XPLORE\
    \ 会话示例之前，让我先解释一下 SQL 监控器。\n```\n\n## 什么是 SQL 监控报告？\n\n实时 SQL 监控功能在 11g 中引入，默认情况下是关闭的。如果\
    \ SQL 使用超过五秒的 CPU 时间或并行运行，实时监控将会开启。如果启用此功能，统计信息指标将在 SQL 执行期间收集，并存储几分钟。在此期间，视图\
    \ `v$sql_monitor` 和 `v$sql_plan_monitor` 包含性能信息。收集的信息类型可由 `type` 参数控制，我选择了 `active`，它会产生一个\
    \ HTML 报告类型的显示（这是 11g 第 2 版中的新功能）。这些详细信息特别有用，因为它显示了每个步骤对 CPU 和 I/O 资源的使用情况。这对于确定查询的哪些部分需要调查，以及如果你在比较\
    \ SQL，查询的哪些部分发生了显著变化非常有帮助。下面我列出了获取 SQL 监控器 HTML 报告通常需要执行的命令集。\n\n1.  在查询中添加提示\
    \ `/*+ monitor */`。这会导致 CBO 监控该查询，即使它运行时间少于五秒或不是并行执行。\n2.  运行你的查询。\n3.  获取 SQL_ID\
    \ (`select sql_id from v$sql_text where sql_text like '%<在此处输入你的 SQL 文本>%';`)\n\
    4.  然后执行此代码：\n\n```\nset trimspool on\nset trim on\nset pages 0\nset linesize\
    \ 1000\nset long 1000000\nset longchunksize 1000000\nspool sqlmon_active_1st_run.html\n\
    select dbms_sqltune.report_sql_monitor(sql_id=>'&sqlid',type=>'active') from\n\
    dual;\nspool off\n```\n\n这将生成一个 HTML 文件，类似于图 12-1 中的文件。\n\n![9781430248095_Fig12-01.jpg](img/9781430248095_Fig12-01.jpg)\n\
    \n图 12-1. 一个典型的 SQL 监控报告\n\n既然我们知道了 SQL 监控器 HTML 报告是什么，我们会看到 XPLORE 会话默认会为我们创建它们。让我们看看创建\
    \ XPLORE 报告所需的步骤。\n\n## 构建你的测试用例\n\n正如我之前提到的，不先构建测试用例就无法运行 XPLORE。在这个例子中，我使用了与第\
    \ 11 章中相同的测试用例。通过导航到 `utl` 下的 `xplore` 目录，我可以轻松运行 XPLORE 的安装脚本。\n\n```\nC:\\Documents\
    \ and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\utl\\xplore>sqlplus / as\
    \ sysdba\nSQL*Plus: Release 11.2.0.1.0 Production on Mon Dec 17 19:37:00 2012\n\
    Copyright (c) 1982, 2010, Oracle.  All rights reserved.\nConnected to:\nOracle\
    \ Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
    \ OLAP, Data Mining and Real Application Testing options\nSQL> @install\nTest\
    \ Case User: TC64661\nPassword: TC64661\n```\n\n这个安装脚本授予测试用例用户足够的权限（DBA）以运行后续的脚本。请记住，这只能在容易更换的独立系统上运行。脚本以如下内容结束：\n\
    \n```\nPackage created.\nNo errors.\nPackage body created.\nNo errors.\nInstallation\
    \ completed.\nYou are now connected as TC64661.\n1. Set CBO env if needed\n2.\
    \ Execute @create_xplore_script.sql\n```\n\n第一步“如果需要则设置 CBO 环境”是在提醒你，如果你的测试用例需要设置任何环境设置，并且你希望这些设置对于测试用例的所有运行都保持不变，那么你必须在这里设置。然后这会被应用到基线，并在为每个测试执行脚本之前执行。通过向安装脚本提供测试用例用户，你已将该用户更改为系统的\
    \ DBA，并允许它更改所有系统参数和修复控制设置。测试用例用户也知道需要运行的脚本，然后将开始构建模板脚本，接着是超级脚本。\n\n## 构建第一个脚本\n\
    \n这第一个脚本只是收集你为 XPLORE 会话设置的配置，然后用这些参数调用 `xplore.create_xplore_script`。这是脚本中的那行代码：\n\
    \n```\nEXEC xplore.create_xplore_script(\n  '&&xplore_method.',         <<<此参数可接受\
    \ XECUTE 或 XPLAIN 值\n  '&&include_cbo_parameters.',<<<是否包含 CBO 参数\n  '&&include_exadata_parameters.',<<<是否包含\
    \ Exadata 特定参数\n  '&&include_fix_control.',   <<<是否包含修复控制\n  '&&generate_sql_monitor_reports.');\
    \ <<<是否生成 SQL 监控报告。\n```\n\n这些设置都会对最终创建的报告产生影响。`xplore_method` 控制 XPLORE，允许它以\
    \ XPLAIN 模式或 XECUTE 模式运行。在 XPLAIN 模式下，不会执行 SQL。XPLAIN 模式对于大多数情况通常足够快。XECUTE 会执行\
    \ SQL，如果同时存在数据，那么这可能需要很长时间才能完成。需要澄清的是，这里的 XECUTE 选项与 XECUTE 方法无关：我们在这里谈论的是 XPLORE\
    \ 工具的一个选项。如果 SQL 可以相对快速地执行，或者你有足够的时间等待结果，那么 XECUTE 将为你提供更多信息。\n"
- fmt: "# 构建超级脚本\n\n接下来的两个参数用于控制您希望探索的参数组。您可以选择探索所有参数，即尝试所有CBO参数以及所有Exadata特有参数的值。如果您的测试用例来自Exadata机器，那么您可能也会对选择此选项感兴趣。如果您的测试用例并非来自Exadata，则没有必要选择此选项，因为这些测试只会在Exadata机器上生效。然后，您可以选择设置修复控制参数（我们在本章前面的章节中提到过）。如果您怀疑自己遇到了优化器错误，可能会对这些参数感兴趣。当您运行此脚本并输入所需参数时，将会生成一个新的、更大的脚本。\n\
    \n# 构建超级脚本\n\n现在我们进入运行XPLORE会话前的最后一步。首先需要做的是将测试SQL脚本复制到 `utl\\xplore` 目录。这是为了让XPLORE会话能够访问该脚本。就我而言，我执行的命令是：\n\
    \n```\n>copy \"C:\\Documents and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\\
    run\\sqlt_s64661\\TC\\q.sql\"\n\"C:\\Documents and Settings\\Stelios\\Desktop\\\
    SQLT 11.4.4.6\\sqlt\\utl\\xplore\\q.sql\"\n```\n\n我们运行 `create_xplore_script.sql`，它将提示输入前一节描述的参数。这里我们看到一个脚本运行示例，我们选择了XPLAIN模式，并选择探索CBO参数、Exadata参数和修复控制参数，同时生成SQL监控报告。\n\
    \n```\nSQL> @create_xplore_script.sql\nParameter 1:\nXPLORE Method: XECUTE (default)\
    \ or XPLAIN\n\"XECUTE\" requires /* ^^unique_id */ token in SQL\n\"XPLAIN\" uses\
    \ \"EXPLAIN PLAN FOR\" command\nEnter \"XPLORE Method\" [XECUTE]: XPLAIN\nParameter\
    \ 2:\nInclude CBO Parameters: Y (default) or N\nEnter \"CBO Parameters\" [Y]:\
    \ Y\nParameter 3:\nInclude Exadata Parameters: Y (default) or N\nEnter \"EXADATA\
    \ Parameters\" [Y]: Y\nParameter 4:\nInclude Fix Control: Y (default) or N\nEnter\
    \ \"Fix Control\" [Y]: Y\nParameter 5:\nGenerate SQL Monitor Reports: N (default)\
    \ or Y\nOnly applicable when XPLORE Method is XECUTE\nEnter \"SQL Monitor\" [N]:\
    \ Y\nReview and execute @xplore_script_1.sql\n```\n\n现在创建的脚本非常长。我们可以通过查看文件顶部附近的一些条目来大致了解这个脚本的内容。\n\
    \n```\n1\\. SET DEF ON ECHO OFF TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF\
    \ \"\" SQLP SQL>;\n2\\. SET SERVEROUT ON SIZE UNL;\n3\\. SET ESC ON SQLBL ON;\n\
    4\\. SPO xplore_script_1.log;\n5\\. COL connected_user NEW_V connected_user FOR\
    \ A30;\n6\\. SELECT user connected_user FROM DUAL;\n7\\. PRO\n8\\. PRO Parameter\
    \ 1:\n9\\. PRO Name of SCRIPT file that contains SQL to be xplored (required)\n\
    10\\. PRO\n11\\. SET DEF ^ ECHO OFF;\n12\\. DEF script_with_sql = '^1';\n13\\\
    . PRO\n14\\. PRO Parameter 2:\n15\\. PRO Password for ^^connected_user. (required)\n\
    16\\. PRO\n17\\. DEF user_password = '^2';\n18\\. PRO\n19\\. PRO Value passed\
    \ to xplore_script.sql:\n20\\. PRO ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n21\\. PRO\
    \ SCRIPT_WITH_SQL: ^^script_with_sql\n22\\. PRO\n23\\. PRO -- begin common\n24\\\
    . PRO DEF _SQLPLUS_RELEASE\n25\\. PRO SELECT USER FROM DUAL;\n26\\. PRO SELECT\
    \ TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL;\n27\\. PRO\
    \ SELECT * FROM v$version;\n28\\. PRO SELECT * FROM v$instance;\n29\\. PRO SELECT\
    \ name, value FROM v$parameter2 WHERE name LIKE '%dump_dest';\n30\\. PRO SELECT\
    \ directory_name||' '||directory_path directories FROM dba_directories WHERE directory_name\
    \ LIKE 'SQLT$%' OR directory_name LIKE 'TRCA$%' ORDER BY 1;\n31\\. PRO -- end\
    \ common\n32\\. PRO\n33\\. SET VER ON HEA ON LIN 2000 PAGES 1000 TRIMS ON TI OFF\
    \ TIMI OFF;\n```\n\n我在代码中添加了行号，因为值得详细解释其中一些行的情况。有些行只是 `PROMPT`，这只是一个空行。\n\n* \
    \  **`1\\. SET DEF ON ECHO OFF TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF\
    \ \"\" SQLP SQL>;`** - 设置输出的默认格式，因为脚本依赖该格式以在运行时生成可用的HTML文件。\n*   **`2\\. SET SERVEROUT\
    \ ON SIZE UNL;`** - 确保输出大小无限制。\n*   **`3\\. SET ESC ON SQLBL ON;`** - 开启 `ESCAPE`\
    \ 模式和空行模式。\n*   **`4\\. SPO xplore_script_1.log;`** - 我们正在假脱机到的脚本文件。\n*   **`5\\\
    . COL connected_user NEW_V connected_user FOR A30;`** - 设置 `connected_user` 列的格式。\n\
    *   **`6\\. SELECT user connected_user FROM DUAL;`** - 获取连接的用户。\n*   **`8\\. PRO\
    \ Parameter 1:`** - 获取脚本名称。\n*   **`9\\. PRO Name of SCRIPT file that contains\
    \ SQL to be explored (required)`** - 提示信息。\n*   **`11\\. SET DEF ^ ECHO OFF;`**\
    \ - 设置更多环境配置。\n*   **`12\\. DEF script_with_sql = '^1';`** - 将变量名 (`script_with_sql`)\
    \ 设置为 `'^1'`。\n*   **`15\\. PRO Password for ^^connected_user. (required)`** -\
    \ 获取测试用例用户的密码。\n*   **`17\\. DEF user_password = '^2';`** - 将测试用例用户的密码设置为变量 `user_password`。\n\
    *   **`21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql`** - 获取脚本文件名并设置变量 `script_with_sql`。\n\
    *   **`25\\. PRO SELECT USER FROM DUAL;`** - 选择当前连接的用户。\n*   **`26\\. PRO SELECT\
    \ TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL;`** - 选择日期和时间。\n\
    *   **`27\\. PRO SELECT * FROM v$version;`** - 选择当前版本。\n*   **`28\\. PRO SELECT\
    \ * FROM v$instance;`** - 选择实例信息。\n*   **`29\\. PRO SELECT name, value FROM v$parameter2\
    \ WHERE name LIKE '%dump_dest';`** - 显示转储目标。\n*   **`30\\. PRO SELECT directory_name||'\
    \ '||directory_path directories FROM dba_directories WHERE directory_name LIKE\
    \ 'SQLT$%' OR directory_name LIKE 'TRCA$%' ORDER BY 1;`** - 检查Oracle目录是否已设置。\n\
    *   **`33\\. SET VER ON HEA ON LIN 2000 PAGES 1000 TRIMS ON TI OFF TIMI OFF;`**\
    \ - 在通用部分的末尾，设置所需的格式环境。\n\n这是通用代码的结束。现在我们有一个在循环中生成的代码。我展示这个脚本的第一部分：\n\n```\n--\n\
    \ 1\\. SET ECHO ON;\n 2\\. --in case of disconnects, suspect 6356566 and un-comment\
    \ workaround in line below if needed\n 3\\. --ALTER SESSION SET \"_cursor_plan_unparse_enabled\"\
    \ = FALSE;\n 4\\. WHENEVER SQLERROR EXIT SQL.SQLCODE;\n 5\\. --\n 6\\. COL run_id\
    \ NEW_V run_id FOR A4;\n 7\\. SELECT LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id\
    \ FROM xplore_test;\n 8\\. --\n 9\\. DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[^^run_id.]_(%)';\n10\\. EXEC xplore.set_baseline(1);\n11\\\
    . --\n12\\. SET BLO .\n13\\. GET ^^script_with_sql.\n14\\. .\n15\\. C/;/\n16\\\
    . 0 EXPLAIN PLAN SET statement_id = 'xplore_{001}_[^^run_id.]_(00000)' INTO plan_table_all\
    \ FOR\n17\\. L\n18\\. /\n19\\. EXEC xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
    \ 'XPLAIN', 'Y');\n20\\. WHENEVER SQLERROR CONTINUE;\n```\n\n这20行是XPLORE的核心。我将解释这里发生的事情。"
  raw: "The next two parameters control the groups of parameters that you wish to\
    \ explore. You can choose to explore all of them, in other words try all values\
    \ for all CBO parameters, and all Exadata-specific parameters. If your test case\
    \ is from an Exadata machine then you may be interested in choosing this option\
    \ also. If your test case is not from Exadata, then there is no point in choosing\
    \ this option because these tests will only have an effect on an Exadata machine.\
    \ Then you can choose to set fix control parameters (we mentioned these in a previous\
    \ section of this chapter). You may be interested in checking these parameters\
    \ if you suspect you are suffering from an optimizer bug. When you run this script\
    \ and enter the required parameters a new bigger script will be generated.\n\n\
    Building the Superscript\n\nNow we come to the last step before running the XPLORE\
    \ session. The first thing we need to do is copy the test SQL script to the `utl\\\
    xplore` directory. This is to allow the XPLORE session to access the script. In\
    \ my case this is the command I issued:\n\n```\n>copy \"C:\\Documents and Settings\\\
    Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\run\\sqlt_s64661\\TC\\q.sql\"\n\"C:\\Documents\
    \ and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\utl\\xplore\\q.sql\"\n\
    ```\n\nWe run the `create_xplore_script.sql`, which will prompt for the parameters\
    \ described in the previous section. Here we see a run of the script where we\
    \ have chosen XPLAIN mode and chosen to explore CBO parameters, Exadata parameters,\
    \ and fix control parameters and to produce SQL monitor reports.\n\n```\nSQL>\
    \ @create_xplore_script.sql\nParameter 1:\nXPLORE Method: XECUTE (default) or\
    \ XPLAIN\n\"XECUTE\" requires /* ^^unique_id */ token in SQL\n\"XPLAIN\" uses\
    \ \"EXPLAIN PLAN FOR\" command\nEnter \"XPLORE Method\" [XECUTE]: XPLAIN\nParameter\
    \ 2:\nInclude CBO Parameters: Y (default) or N\nEnter \"CBO Parameters\" [Y]:\
    \ Y\nParameter 3:\nInclude Exadata Parameters: Y (default) or N\nEnter \"EXADATA\
    \ Parameters\" [Y]: Y\nParameter 4:\nInclude Fix Control: Y (default) or N\nEnter\
    \ \"Fix Control\" [Y]: Y\nParameter 5:\nGenerate SQL Monitor Reports: N (default)\
    \ or Y\nOnly applicable when XPLORE Method is XECUTE\nEnter \"SQL Monitor\" [N]:\
    \ Y\nReview and execute @xplore_script_1.sql\n```\n\nThe script created now is\
    \ extremely long. We can get a general feeling for what’s in this script by looking\
    \ at a few entries near the top of the file.\n\n```\n1\\. SET DEF ON ECHO OFF\
    \ TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF \"\" SQLP SQL>;\n2\\. SET SERVEROUT\
    \ ON SIZE UNL;\n3\\. SET ESC ON SQLBL ON;\n4\\. SPO xplore_script_1.log;\n5\\\
    . COL connected_user NEW_V connected_user FOR A30;\n6\\. SELECT user connected_user\
    \ FROM DUAL;\n7\\. PRO\n8\\. PRO Parameter 1:\n9\\. PRO Name of SCRIPT file that\
    \ contains SQL to be xplored (required)\n10\\. PRO\n11\\. SET DEF ^ ECHO OFF;\n\
    12\\. DEF script_with_sql = '^1';\n13\\. PRO\n14\\. PRO Parameter 2:\n15\\. PRO\
    \ Password for ^^connected_user. (required)\n16\\. PRO\n17\\. DEF user_password\
    \ = '^2';\n18\\. PRO\n19\\. PRO Value passed to xplore_script.sql:\n20\\. PRO\
    \ ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql\n\
    22\\. PRO\n23\\. PRO -- begin common\n24\\. PRO DEF _SQLPLUS_RELEASE\n25\\. PRO\
    \ SELECT USER FROM DUAL;\n26\\. PRO SELECT TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS')\
    \ current_time FROM DUAL;\n27\\. PRO SELECT * FROM v$version;\n28\\. PRO SELECT\
    \ * FROM v$instance;\n29\\. PRO SELECT name, value FROM v$parameter2 WHERE name\
    \ LIKE '%dump_dest';\n30\\. PRO SELECT directory_name||' '||directory_path directories\
    \ FROM dba_directories WHERE directory_name LIKE 'SQLT$%' OR directory_name LIKE\
    \ 'TRCA$%' ORDER BY 1;\n31\\. PRO -- end common\n32\\. PRO\n33\\. SET VER ON HEA\
    \ ON LIN 2000 PAGES 1000 TRIMS ON TI OFF TIMI OFF;\n```\n\nI’ve numbered the lines\
    \ in the code, as it is worth explaining what’s happening in detail here for some\
    \ of these lines. Some lines are just PROMPT, which is just a blank line.\n\n\
    *   **1\\. SET DEF ON ECHO OFF TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF\
    \ \"\" SQLP SQL>;** - Sets up the default format for output as the script relies\
    \ on the format to produce a workable HTML file as it runs the script\n*   **2\\\
    . SET SERVEROUT ON SIZE UNL;** - Makes sure the size of output is unlimited\n\
    *   **3\\. SET ESC ON SQLBL ON;** - Sets ESCAPE Mode on and blank line mode\n\
    *   **4\\. SPO xplore_script_1.log;** - The script we are spooling to\n*   **5\\\
    . COL connected_user NEW_V connected_user FOR A30;** - Sets the format for the\
    \ `connected_user` column\n*   **6\\. SELECT user connected_user FROM DUAL;**\
    \ - Gets the connected user\n*   **8\\. PRO Parameter 1:** - Gets the script name\n\
    *   **9\\. PRO Name of SCRIPT file that contains SQL to be explored (required)**\
    \ - Prompts for information\n*   **11\\. SET DEF ^ ECHO OFF;** - Sets up more\
    \ environmental settings\n*   **12\\. DEF script_with_sql = '^1';** - Sets up\
    \ the variable name (`script_with_sql`) to `^1`\n*   **15\\. PRO Password for\
    \ ^^connected_user. (required)** - Gets the password for the test case user\n\
    *   **17\\. DEF user_password = '^2';** - Sets the password for the test case\
    \ user to the variable `user_password`\n*   **21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql**\
    \ - Gets the script file name and sets the variable `script_with_sql`\n*   **25\\\
    . PRO SELECT USER FROM DUAL;** - Selects the current connected user\n*   **26\\\
    . PRO SELECT TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL;**\
    \ - Selects the date and time\n*   **27\\. PRO SELECT * FROM v$version;** - Selects\
    \ the current version\n*   **28\\. PRO SELECT * FROM v$instance;** - Selects the\
    \ instance information\n*   **29\\. PRO SELECT name, value FROM v$parameter2 WHERE\
    \ name LIKE '%dump_dest';** - Shows the dump destinations\n*   **30\\. PRO SELECT\
    \ directory_name||' '||directory_path directories FROM dba_directories WHERE directory_name\
    \ LIKE 'SQLT$%' OR directory_name LIKE 'TRCA$%' ORDER BY 1;** - Checks the Oracle\
    \ Directories are set up\n*   **33\\. SET VER ON HEA ON LIN 2000 PAGES 1000 TRIMS\
    \ ON TI OFF TIMI OFF;** - At the end of the common section, sets the required\
    \ format environment.\n\nThis is the end of the common code. Now we have code\
    \ that is generated in a loop. I show the first section of this script:\n\n```\n\
    --\n 1\\. SET ECHO ON;\n 2\\. --in case of disconnects, suspect 6356566 and un-comment\
    \ workaround in line below if needed\n 3\\. --ALTER SESSION SET \"_cursor_plan_unparse_enabled\"\
    \ = FALSE;\n 4\\. WHENEVER SQLERROR EXIT SQL.SQLCODE;\n 5\\. --\n 6\\. COL run_id\
    \ NEW_V run_id FOR A4;\n 7\\. SELECT LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id\
    \ FROM xplore_test;\n 8\\. --\n 9\\. DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[^^run_id.]_(%)';\n10\\. EXEC xplore.set_baseline(1);\n11\\\
    . --\n12\\. SET BLO .\n13\\. GET ^^script_with_sql.\n14\\. .\n15\\. C/;/\n16\\\
    . 0 EXPLAIN PLAN SET statement_id = 'xplore_{001}_[^^run_id.]_(00000)' INTO plan_table_all\
    \ FOR\n17\\. L\n18\\. /\n19\\. EXEC xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
    \ 'XPLAIN', 'Y');\n20\\. WHENEVER SQLERROR CONTINUE;\n```\n\nThese 20 lines are\
    \ the core of XPLORE. I’ll explain what is happening here."
  trans: "\n# 构建超级脚本\n\n接下来的两个参数用于控制您希望探索的参数组。您可以选择探索所有参数，即尝试所有 CBO 参数以及所有 Exadata\
    \ 特有参数的值。如果您的测试用例来自 Exadata 机器，那么您可能也会对选择此选项感兴趣。如果您的测试用例并非来自 Exadata，则没有必要选择此选项，因为这些测试只会在\
    \ Exadata 机器上生效。然后，您可以选择设置修复控制参数（我们在本章前面的章节中提到过）。如果您怀疑自己遇到了优化器错误，可能会对这些参数感兴趣。当您运行此脚本并输入所需参数时，将会生成一个新的、更大的脚本。\n\
    \n# 构建超级脚本\n\n现在我们进入运行 XPLORE 会话前的最后一步。首先需要做的是将测试 SQL 脚本复制到 `utl\\xplore` 目录。这是为了让\
    \ XPLORE 会话能够访问该脚本。就我而言，我执行的命令是：\n\n```\n>copy \"C:\\Documents and Settings\\\
    Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\run\\sqlt_s64661\\TC\\q.sql\"\n\"C:\\Documents\
    \ and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\utl\\xplore\\q.sql\"\n\
    ```\n\n我们运行 `create_xplore_script.sql`，它将提示输入前一节描述的参数。这里我们看到一个脚本运行示例，我们选择了 XPLAIN\
    \ 模式，并选择探索 CBO 参数、Exadata 参数和修复控制参数，同时生成 SQL 监控报告。\n\n```\nSQL> @create_xplore_script.sql\n\
    Parameter 1:\nXPLORE Method: XECUTE (default) or XPLAIN\n\"XECUTE\" requires /*\
    \ ^^unique_id */ token in SQL\n\"XPLAIN\" uses \"EXPLAIN PLAN FOR\" command\n\
    Enter \"XPLORE Method\" [XECUTE]: XPLAIN\nParameter 2:\nInclude CBO Parameters:\
    \ Y (default) or N\nEnter \"CBO Parameters\" [Y]: Y\nParameter 3:\nInclude Exadata\
    \ Parameters: Y (default) or N\nEnter \"EXADATA Parameters\" [Y]: Y\nParameter\
    \ 4:\nInclude Fix Control: Y (default) or N\nEnter \"Fix Control\" [Y]: Y\nParameter\
    \ 5:\nGenerate SQL Monitor Reports: N (default) or Y\nOnly applicable when XPLORE\
    \ Method is XECUTE\nEnter \"SQL Monitor\" [N]: Y\nReview and execute @xplore_script_1.sql\n\
    ```\n\n现在创建的脚本非常长。我们可以通过查看文件顶部附近的一些条目来大致了解这个脚本的内容。\n\n```\n1\\. SET DEF ON ECHO\
    \ OFF TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF \"\" SQLP SQL>;\n2\\. SET\
    \ SERVEROUT ON SIZE UNL;\n3\\. SET ESC ON SQLBL ON;\n4\\. SPO xplore_script_1.log;\n\
    5\\. COL connected_user NEW_V connected_user FOR A30;\n6\\. SELECT user connected_user\
    \ FROM DUAL;\n7\\. PRO\n8\\. PRO Parameter 1:\n9\\. PRO Name of SCRIPT file that\
    \ contains SQL to be xplored (required)\n10\\. PRO\n11\\. SET DEF ^ ECHO OFF;\n\
    12\\. DEF script_with_sql = '¹';\n13\\. PRO\n14\\. PRO Parameter 2:\n15\\. PRO\
    \ Password for ^^connected_user. (required)\n16\\. PRO\n17\\. DEF user_password\
    \ = '²';\n18\\. PRO\n19\\. PRO Value passed to xplore_script.sql:\n20\\. PRO ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n\
    21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql\n22\\. PRO\n23\\. PRO -- begin common\n\
    24\\. PRO DEF _SQLPLUS_RELEASE\n25\\. PRO SELECT USER FROM DUAL;\n26\\. PRO SELECT\
    \ TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL;\n27\\. PRO\
    \ SELECT * FROM v$version;\n28\\. PRO SELECT * FROM v$instance;\n29\\. PRO SELECT\
    \ name, value FROM v$parameter2 WHERE name LIKE '%dump_dest';\n30\\. PRO SELECT\
    \ directory_name||' '||directory_path directories FROM dba_directories WHERE directory_name\
    \ LIKE 'SQLT$%' OR directory_name LIKE 'TRCA$%' ORDER BY 1;\n31\\. PRO -- end\
    \ common\n32\\. PRO\n33\\. SET VER ON HEA ON LIN 2000 PAGES 1000 TRIMS ON TI OFF\
    \ TIMI OFF;\n```\n\n我在代码中添加了行号，因为值得详细解释其中一些行的情况。有些行只是 `PROMPT`，这只是一个空行。\n\n* \
    \  **`1\\. 设置 DEF ON ECHO OFF TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF\
    \ \"\" SQLP SQL>;`** - 设置输出的默认格式，因为脚本依赖该格式以在运行时生成可用的 HTML 文件。\n*   **`2\\. 设置\
    \ SERVEROUT ON SIZE UNL;`** - 确保输出大小无限制。\n*   **`3\\. 设置 ESC ON SQLBL ON;`** -\
    \ 开启 `ESCAPE` 模式和空行模式。\n*   **`4\\. SPO xplore_script_1.log;`** - 我们正在假脱机到的脚本文件。\n\
    *   **`5\\. COL connected_user NEW_V connected_user FOR A30;`** - 设置 `connected_user`\
    \ 列的格式。\n*   **`6\\. 选择 user connected_user FROM DUAL;`** - 获取连接的用户。\n*   **`8\\\
    . PRO 参数 1:`** - 获取脚本名称。\n*   **`9\\. PRO 包含待探索 SQL 的脚本文件的名称 (必需)`** - 提示信息。\n\
    *   **`11\\. 设置 DEF ^ ECHO OFF;`** - 设置更多环境配置。\n*   **`12\\. DEF script_with_sql\
    \ = '¹';`** - 将变量名 (`script_with_sql`) 设置为 `'¹'`。\n*   **`15\\. PRO ^^connected_user.\
    \ 的密码 (必需)`** - 获取测试用例用户的密码。\n*   **`17\\. DEF user_password = '²';`** - 将测试用例用户的密码设置为变量\
    \ `user_password`。\n*   **`21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql`** - 获取脚本文件名并设置变量\
    \ `script_with_sql`。\n*   **`25\\. PRO 选择 USER FROM DUAL;`** - 选择当前连接的用户。\n* \
    \  **`26\\. PRO 选择 TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM\
    \ DUAL;`** - 选择日期和时间。\n*   **`27\\. PRO 选择 * FROM v$version;`** - 选择当前版本。\n* \
    \  **`28\\. PRO 选择 * FROM v$instance;`** - 选择实例信息。\n*   **`29\\. PRO 选择 name,\
    \ value FROM v$parameter2 WHERE name LIKE '%dump_dest';`** - 显示转储目标。\n*   **`30\\\
    . PRO 选择 directory_name||' '||directory_path directories FROM dba_directories\
    \ WHERE directory_name LIKE 'SQLT$%' OR directory_name LIKE 'TRCA$%' ORDER BY\
    \ 1;`** - 检查 Oracle 目录是否已设置。\n*   **`33\\. 设置 VER ON HEA ON LIN 2000 PAGES 1000\
    \ TRIMS ON TI OFF TIMI OFF;`** - 在通用部分的末尾，设置所需的格式环境。\n\n这是通用代码的结束。现在我们有一个在循环中生成的代码。我展示这个脚本的第一部分：\n\
    \n```\n--\n 1\\. 设置 ECHO ON;\n 2\\. --如果断开连接，请怀疑错误 6356566，如果需要，在下方行中取消注释解决方法\n\
    \ 3\\. --ALTER SESSION SET \"_cursor_plan_unparse_enabled\" = FALSE;\n 4\\. WHENEVER\
    \ SQLERROR EXIT SQL.SQLCODE;\n 5\\. --\n 6\\. COL run_id NEW_V run_id FOR A4;\n\
    \ 7\\. 选择 LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id FROM xplore_test;\n 8\\\
    . --\n 9\\. DELETE plan_table_all WHERE statement_id LIKE 'xplore_{001}_[^^run_id.]_(%)';\n\
    10\\. 执行 xplore.set_baseline(1);\n11\\. --\n12\\. 设置 BLO .\n13\\. GET ^^script_with_sql.\n\
    14\\. .\n15\\. C/;/\n16\\. 0 EXPLAIN PLAN SET statement_id = 'xplore_{001}_[^^run_id.]_(00000)'\
    \ INTO plan_table_all FOR\n17\\. L\n18\\. /\n19\\. 执行 xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
    \ 'XPLAIN', 'Y');\n20\\. WHENEVER SQLERROR CONTINUE;\n```\n\n这 20 行是 XPLORE 的核心。我将解释这里发生的事情。\n"
- fmt: "# 脚本核心逻辑注释\n\n*   第1–4行：确保`echo`开启以便获取输出，并让错误终止SQL执行。\n*   第5–8行：设置列`run_id`的格式，并从表`xplore_test`中选择当前的`run_id`。\n\
    *   第9行：删除`PLAN_TABLE`中所有与即将执行的语句匹配的条目。\n*   第10行：设置我们用户决定在每次XPLORE迭代执行前设置的基线。\n\
    *   第11–14行：将块终止符设置为“.”，获取脚本（本例中为`q.sql`），并停止块。\n*   第15–17行：从文件中移除刚获取的脚本中的“;”，并用空格替换（我们将用“/”而不是“;”来执行）；然后设置第`0`行为`EXPLAIN\
    \ PLAN`等，用`L`追加从文件获取的SQL，并执行组合语句。完整的行应如下所示：\n\n```sql\n    EXPLAIN PLAN SET statement_id\
    \ = 'xplore_{001}_[0001]_(00001)' INTO plan_table_all FOR select /* ^^001 */ \
    \ country_name, sum(AMOUNT_SOLD) from sh.sales s, sh.customers c, sh.countries\
    \ co where s.cust_id=c.cust_id and co.country_id=c.country_id and country_name\
    \ in ('Ireland','Denmark','Poland','United Kingdom','Germany','France','Spain','The\
    \ Netherlands','Italy') group by country_name order by sum(AMOUNT_SOLD);\n```\n\
    \n*   第18–20行：执行上述语句，并使用`snapshot_plan`例程捕获计划表中的所有信息及其他信息，并将其全部存储在内部SQLT存储库中，以便在最终报告结束时输出。\n\
    \n一旦你审查了此脚本并确信它会产生正确的结果，就可以运行`xplore_script_1.sql`。我知道我在这里的细节阐述超出了使用脚本所需的范围，但这些行正是XPLORE方法的核心。我们可以更深入地探讨`xplore.pkb`中的过程`snapshot_plan`，但这超出了本书的范围。\n\
    \n# 运行脚本\n\n运行脚本只需执行`xplore_script_1.sql`。下面我展示了脚本的第一次运行过程，并收集了参数：\n\n```sql\n\
    SQL>@xplore_script_1.sql\nTC64661\n\nParameter 1:\nName of SCRIPT file that contains\
    \ SQL to be xplored (required)\nNote: SCRIPT must contain comment /* ^^unique_id\
    \ */\nEnter value for 1: q.sql\nParameter 2:\nPassword for TC64661 (required)\n\
    Enter value for 2: TC64661\nValue passed to xplore_script.sql:\n∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n\
    SCRIPT_WITH_SQL: q.sql\n-- begin common\nDEF _SQLPLUS_RELEASE\nSELECT USER FROM\
    \ DUAL\nSELECT TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL\n\
    SELECT * FROM v$version\nSELECT * FROM v$instance\nSELECT name, value FROM v$parameter2\
    \ WHERE name LIKE '%dump_dest'\nSELECT directory_name||' '||directory_path directories\
    \ FROM dba_directories WHERE directory_name LIKE 'SQLT\n' ORDER BY 1\n-- end common\n\
    SQL>--in case of disconnects, suspect 6356566 and un-comment workaround in line\
    \ below if needed\nSQL>--ALTER SESSION SET \"_cursor_plan_unparse_enabled\" =\
    \ FALSE;\nSQL>WHENEVER SQLERROR EXIT SQL.SQLCODE;\nSQL>--\nSQL>COL run_id NEW_V\
    \ run_id FOR A4;\nSQL>SELECT LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id FROM\
    \ xplore_test;\nRUN_\n\nSQL>--\nSQL>DELETE plan_table_all WHERE statement_id LIKE\
    \ 'xplore_{001}_[^^run_id.]_(%)';\nold   1: DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[^^run_id.]_(%)'\nnew   1: DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[0001]_(%)'\n```\n\n我们现在已设置好环境，必须在运行我们正在研究的脚本之前设置任何基线。\n\n\
    ```sql\nSQL>EXEC xplore.set_baseline(1);\n--\n-- begin set_baseline\n--\n--\n\
    -- end set_baseline\n--\nSQL>--\nSQL>ALTER SESSION SET STATISTICS_LEVEL = ALL;\n\
    SQL>DEF unique_id = \"xplore_{001}_[^^run_id.]_(00000)\"\nSQL>@^^script_with_sql.\n\
    SQL>REM $Header: 215187.1 sqlt_s64661_tc_script.sql 11.4.4.6 2012/12/13 carlos.sierra\
    \ $\nSQL>\nSQL>\nSQL>select\n  2   /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\n\
    \  3  from sh.sales s, sh.customers c, sh.countries co\n  4  where\n  5    s.cust_id=c.cust_id\n\
    \  6    and co.country_id=c.country_id\n  7    and country_name in (\n  8    \
    \  'Ireland','Denmark','Poland','United Kingdom',\n  9       'Germany','France','Spain','The\
    \ Netherlands','Italy')\n 10    group by country_name order by sum(AMOUNT_SOLD);\n\
    old   2:  /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\nnew   2:  /* xplore_{001}_[0001]_(00000)\
    \ */  country_name, sum(AMOUNT_SOLD)\nCOUNTRY_NAME                           \
    \  SUM(AMOUNT_SOLD)\n---------------------------------------- ----------------\n\
    Poland                                            8447.14\nDenmark           \
    \                             1977764.79\nSpain                              \
    \            2090863.44\nFrance                                         3776270.13\n\
    Italy                                          4854505.28\nUnited Kingdom    \
    \                             6393762.94\nGermany                            \
    \            9210129.22\nSQL>EXEC xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
    \ 'XECUTE', 'Y');\nSQL>WHENEVER SQLERROR CONTINUE;\nSQL>--\n```\n\n在这第一次运行之后，我们看到确实得到了结果（因为我选择在XPLORE中放入数据）。这次运行的数据将被收集，与所有其他运行一起存入SQLT存储库，准备在运行结束时生成报告。\n\
    \n# 查看结果\n\n当脚本最终完成（如果有数据，可能需要数小时）时，你会看到消息指示HTML文件正在被压缩，主报告正在创建。“XPLORE Completed”消息是一个重要线索，表明我们现在可以阅读报告了。以下是XPLORE运行结束时的输出。\n\
    \n```sql\n adding: xplore_sql_monitor_report_1_00728.html (164 bytes security)\
    \ (deflated 81%)\n  adding: xplore_sql_monitor_report_1_00729.html (164 bytes\
    \ security) (deflated 80%)\n  adding: xplore_sql_monitor_report_1_00730.html (164\
    \ bytes security) (deflated 80%)\n  adding: xplore_sql_monitor_report_1_00731.html\
    \ (164 bytes security) (deflated 80%)\ntest of xplore_sql_monitor_report_1.zip\
    \ OK\n  adding: xplore_report_1.html (164 bytes security) (deflated 96%)\n  adding:\
    \ xplore_script_1.log (164 bytes security) (deflated 98%)\n  adding: xplore_script_1.sql\
    \ (164 bytes security) (deflated 95%)\n  adding: xplore_sql_monitor_report_1.zip\
    \ (164 bytes security) (stored 0%)\ntest of xplore_1.zip OK\n        zip warning:\
    \ error deleting xplore_script_1.sql\nXPLORE Completed.\nDisconnected from Oracle\
    \ Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
    \ OLAP, Data Mining and Real Application Testing options\n```\n\n一个名为`xplore_1.zip`的新文件已被创建，它位于我们运行XPLORE脚本的目录中。\n\
    \n```cmd\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\\
    utl\\xplore>dir\n Volume in drive C has no label.\n Volume Serial Number is 77E9-80B4\n\
    \nDirectory of C:\\Documents and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\\
    utl\\xplore\n```"
  raw: "*   **Lines 1–4.** Ensures that echo is on so that we get some output and\
    \ ensure that an error stops the SQL\n*   **Lines 5–8.** Sets the format for the\
    \ column `run_id`, and selects the current `run_id` from the table `xplore_test`\n\
    *   **Line 9.** Deletes the entries in the `PLAN_TABLE` where there are any matching\
    \ statements to the about to be executed statement.\n*   **Line 10.** Sets the\
    \ baseline that we decided as users to set before the execution of every iteration\
    \ of the XPLORE\n*   **Lines 11–14.** Sets the block termination to “.”, gets\
    \ the script (in our case q.sql) and stops the block\n*   **Lines 15–17.** Removes\
    \ the “;” from the script you just got from the file and replaces it with a blank\
    \ (we are going to execute this with “/” not “;”); then sets line `0` as `EXPLAIN\
    \ PLAN` etc., appends the SQL you got from the file with `L`, and executes the\
    \ combination statement. The complete line should look like this:\n\n```\n   \
    \ EXPLAIN PLAN SET statement_id = 'xplore_{001}_[0001]_(00001)' INTO plan_table_all\
    \ FOR select /* ^^001 */  country_name, sum(AMOUNT_SOLD) from sh.sales s, sh.customers\
    \ c, sh.countries co where s.cust_id=c.cust_id and co.country_id=c.country_id\
    \ and country_name in ('Ireland','Denmark','Poland','United Kingdom','Germany','France','Spain','The\
    \ Netherlands','Italy') group by country_name order by sum(AMOUNT_SOLD);\n   \
    \ ```\n\n*   **Lines 18–20.** Executes the above statement and uses the `snapshot_plan`\
    \ routine that captures all the information in the plan table and other information\
    \ and stores it all in the internal SQLT repository ready to be output at the\
    \ end in the final report.\n\nOnce you’ve reviewed this script and are happy that\
    \ it will produce the right results, then you can run the `xplore_script_1.sql`.\
    \ I know I’ve gone into more detail here than is needed to use the script, but\
    \ these few lines are the very core of the XPLORE method. We could go into more\
    \ detail and look at the procedure `snapshot_plan` in `xplore.pkb`, but that is\
    \ beyond the scope of this book.\n\nRunning the Script\n\nRunning the script is\
    \ just a matter of executing `xplore_script_1.sql`. I show below the first run\
    \ through of the script, with the collection of the parameters:\n\n```\nSQL>@xplore_script_1.sql\n\
    TC64661\n\nParameter 1:\nName of SCRIPT file that contains SQL to be xplored (required)\n\
    Note: SCRIPT must contain comment /* ^^unique_id */\nEnter value for 1: q.sql\n\
    Parameter 2:\nPassword for TC64661 (required)\nEnter value for 2: TC64661\nValue\
    \ passed to xplore_script.sql:\n∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\nSCRIPT_WITH_SQL:\
    \ q.sql\n-- begin common\nDEF _SQLPLUS_RELEASE\nSELECT USER FROM DUAL\nSELECT\
    \ TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL\nSELECT * FROM\
    \ v$version\nSELECT * FROM v$instance\nSELECT name, value FROM v$parameter2 WHERE\
    \ name LIKE '%dump_dest'\nSELECT directory_name||' '||directory_path directories\
    \ FROM dba_directories WHERE directory_name LIKE 'SQLT\n' ORDER BY 1\n-- end common\n\
    SQL>--in case of disconnects, suspect 6356566 and un-comment workaround in line\
    \ below if needed\nSQL>--ALTER SESSION SET \"_cursor_plan_unparse_enabled\" =\
    \ FALSE;\nSQL>WHENEVER SQLERROR EXIT SQL.SQLCODE;\nSQL>--\nSQL>COL run_id NEW_V\
    \ run_id FOR A4;\nSQL>SELECT LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id FROM\
    \ xplore_test;\nRUN_\n\nSQL>--\nSQL>DELETE plan_table_all WHERE statement_id LIKE\
    \ 'xplore_{001}_[^^run_id.]_(%)';\nold   1: DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[^^run_id.]_(%)'\nnew   1: DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[0001]_(%)'\n```\n\nWe’ve set the environment now and have\
    \ to set any baseline set up before running the script we are investigating.\n\
    \n```\nSQL>EXEC xplore.set_baseline(1);\n--\n-- begin set_baseline\n--\n--\n--\
    \ end set_baseline\n--\nSQL>--\nSQL>ALTER SESSION SET STATISTICS_LEVEL = ALL;\n\
    SQL>DEF unique_id = \"xplore_{001}_[^^run_id.]_(00000)\"\nSQL>@^^script_with_sql.\n\
    SQL>REM $Header: 215187.1 sqlt_s64661_tc_script.sql 11.4.4.6 2012/12/13 carlos.sierra\
    \ $\nSQL>\nSQL>\nSQL>select\n  2   /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\n\
    \  3  from sh.sales s, sh.customers c, sh.countries co\n  4  where\n  5    s.cust_id=c.cust_id\n\
    \  6    and co.country_id=c.country_id\n  7    and country_name in (\n  8    \
    \  'Ireland','Denmark','Poland','United Kingdom',\n  9       'Germany','France','Spain','The\
    \ Netherlands','Italy')\n 10    group by country_name order by sum(AMOUNT_SOLD);\n\
    old   2:  /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\nnew   2:  /* xplore_{001}_[0001]_(00000)\
    \ */  country_name, sum(AMOUNT_SOLD)\nCOUNTRY_NAME                           \
    \  SUM(AMOUNT_SOLD)\n---------------------------------------- ----------------\n\
    Poland                                            8447.14\nDenmark           \
    \                             1977764.79\nSpain                              \
    \            2090863.44\nFrance                                         3776270.13\n\
    Italy                                          4854505.28\nUnited Kingdom    \
    \                             6393762.94\nGermany                            \
    \            9210129.22\nSQL>EXEC xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
    \ 'XECUTE', 'Y');\nSQL>WHENEVER SQLERROR CONTINUE;\nSQL>--\n```\n\nAfter this\
    \ first run we see that we do get results (as I selected to have data in my XPLORE).\
    \ The data from this run will be collected, along with all the other runs into\
    \ the SQLT repository ready to produce the report at the end of the run.\n\nReviewing\
    \ the Results\n\nWhen the script finally finishes (it can take hours if you have\
    \ data) you will see a messages indicating that the HTML files are being compressed\
    \ and the main report is being created. The XPLORE Completed message is a big\
    \ clue that we are now ready to read the report. Here is the output at the end\
    \ of the XPLORE run.\n\n```\n adding: xplore_sql_monitor_report_1_00728.html (164\
    \ bytes security) (deflated 81%)\n  adding: xplore_sql_monitor_report_1_00729.html\
    \ (164 bytes security) (deflated 80%)\n  adding: xplore_sql_monitor_report_1_00730.html\
    \ (164 bytes security) (deflated 80%)\n  adding: xplore_sql_monitor_report_1_00731.html\
    \ (164 bytes security) (deflated 80%)\ntest of xplore_sql_monitor_report_1.zip\
    \ OK\n  adding: xplore_report_1.html (164 bytes security) (deflated 96%)\n  adding:\
    \ xplore_script_1.log (164 bytes security) (deflated 98%)\n  adding: xplore_script_1.sql\
    \ (164 bytes security) (deflated 95%)\n  adding: xplore_sql_monitor_report_1.zip\
    \ (164 bytes security) (stored 0%)\ntest of xplore_1.zip OK\n        zip warning:\
    \ error deleting xplore_script_1.sql\nXPLORE Completed.\nDisconnected from Oracle\
    \ Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
    \ OLAP, Data Mining and Real Application Testing options\n```\n\nA new file has\
    \ been created called `xplore_1.zip`, which is in the directory where we ran the\
    \ XPLORE superscript.\n\n```\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT\
    \ 11.4.4.6\\sqlt\\utl\\xplore>dir\n Volume in drive C has no label.\n Volume Serial\
    \ Number is 77E9-80B4\n\nDirectory of C:\\Documents and Settings\\Stelios\\Desktop\\\
    SQLT 11.4.4.6\\sqlt\\utl\\xplore"
  trans: "\n# 脚本核心逻辑注释\n\n*   第 1–4 行：确保`echo`开启以便获取输出，并让错误终止 SQL 执行。\n*   第 5–8 行：设置列`run_id`的格式，并从表`xplore_test`中选择当前的`run_id`。\n\
    *   第 9 行：删除`PLAN_TABLE`中所有与即将执行的语句匹配的条目。\n*   第 10 行：设置我们用户决定在每次 XPLORE 迭代执行前设置的基线。\n\
    *   第 11–14 行：将块终止符设置为“.”，获取脚本（本例中为`q.sql`），并停止块。\n*   第 15–17 行：从文件中移除刚获取的脚本中的“;”，并用空格替换（我们将用“/”而不是“;”来执行）；然后设置第`0`行为`EXPLAIN\
    \ PLAN`等，用`L`追加从文件获取的 SQL，并执行组合语句。完整的行应如下所示：\n\n```sql\n    EXPLAIN PLAN SET statement_id\
    \ = 'xplore_{001}_[0001]_(00001)' INTO plan_table_all FOR select /* ^⁰⁰¹ */  country_name,\
    \ sum(AMOUNT_SOLD) from sh.sales s, sh.customers c, sh.countries co where s.cust_id=c.cust_id\
    \ and co.country_id=c.country_id and country_name in ('Ireland','Denmark','Poland','United\
    \ Kingdom','Germany','France','Spain','The Netherlands','Italy') group by country_name\
    \ order by sum(AMOUNT_SOLD);\n```\n\n*   第 18–20 行：执行上述语句，并使用`snapshot_plan`例程捕获计划表中的所有信息及其他信息，并将其全部存储在内部\
    \ SQLT 存储库中，以便在最终报告结束时输出。\n\n一旦你审查了此脚本并确信它会产生正确的结果，就可以运行`xplore_script_1.sql`。我知道我在这里的细节阐述超出了使用脚本所需的范围，但这些行正是\
    \ XPLORE 方法的核心。我们可以更深入地探讨`xplore.pkb`中的过程`snapshot_plan`，但这超出了本书的范围。\n\n# 运行脚本\n\
    \n运行脚本只需执行`xplore_script_1.sql`。下面我展示了脚本的第一次运行过程，并收集了参数：\n\n```sql\nSQL>@xplore_script_1.sql\n\
    TC64661\n\nParameter 1:\nName of SCRIPT file that contains SQL to be xplored (required)\n\
    Note: SCRIPT must contain comment /* ^^unique_id */\nEnter value for 1: q.sql\n\
    Parameter 2:\nPassword for TC64661 (required)\nEnter value for 2: TC64661\nValue\
    \ passed to xplore_script.sql:\n∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\nSCRIPT_WITH_SQL:\
    \ q.sql\n-- begin common\nDEF _SQLPLUS_RELEASE\nSELECT USER FROM DUAL\nSELECT\
    \ TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL\nSELECT * FROM\
    \ v$version\nSELECT * FROM v$instance\nSELECT name, value FROM v$parameter2 WHERE\
    \ name LIKE '%dump_dest'\nSELECT directory_name||' '||directory_path directories\
    \ FROM dba_directories WHERE directory_name LIKE 'SQLT\n' ORDER BY 1\n-- end common\n\
    SQL>--in case of disconnects, suspect 6356566 and un-comment workaround in line\
    \ below if needed\nSQL>--ALTER SESSION SET \"_cursor_plan_unparse_enabled\" =\
    \ FALSE;\nSQL>WHENEVER SQLERROR EXIT SQL.SQLCODE;\nSQL>--\nSQL>COL run_id NEW_V\
    \ run_id FOR A4;\nSQL>SELECT LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id FROM\
    \ xplore_test;\nRUN_\n\nSQL>--\nSQL>DELETE plan_table_all WHERE statement_id LIKE\
    \ 'xplore_{001}_[^^run_id.]_(%)';\nold   1: DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[^^run_id.]_(%)'\nnew   1: DELETE plan_table_all WHERE statement_id\
    \ LIKE 'xplore_{001}_[0001]_(%)'\n```\n\n我们现在已设置好环境，必须在运行我们正在研究的脚本之前设置任何基线。\n\n\
    ```sql\nSQL>EXEC xplore.set_baseline(1);\n--\n-- begin set_baseline\n--\n--\n\
    -- end set_baseline\n--\nSQL>--\nSQL>ALTER SESSION SET STATISTICS_LEVEL = ALL;\n\
    SQL>DEF unique_id = \"xplore_{001}_[^^run_id.]_(00000)\"\nSQL>@^^script_with_sql.\n\
    SQL>REM $Header: 215187.1 sqlt_s64661_tc_script.sql 11.4.4.6 2012/12/13 carlos.sierra\
    \ $\nSQL>\nSQL>\nSQL>select\n  2   /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\n\
    \  3  from sh.sales s, sh.customers c, sh.countries co\n  4  where\n  5    s.cust_id=c.cust_id\n\
    \  6    and co.country_id=c.country_id\n  7    and country_name in (\n  8    \
    \  'Ireland','Denmark','Poland','United Kingdom',\n  9       'Germany','France','Spain','The\
    \ Netherlands','Italy')\n 10    group by country_name order by sum(AMOUNT_SOLD);\n\
    old   2:  /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\nnew   2:  /* xplore_{001}_[0001]_(00000)\
    \ */  country_name, sum(AMOUNT_SOLD)\nCOUNTRY_NAME                           \
    \  SUM(AMOUNT_SOLD)\n---------------------------------------- ----------------\n\
    Poland                                            8447.14\nDenmark           \
    \                             1977764.79\nSpain                              \
    \            2090863.44\nFrance                                         3776270.13\n\
    Italy                                          4854505.28\nUnited Kingdom    \
    \                             6393762.94\nGermany                            \
    \            9210129.22\nSQL>EXEC xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
    \ 'XECUTE', 'Y');\nSQL>WHENEVER SQLERROR CONTINUE;\nSQL>--\n```\n\n在这第一次运行之后，我们看到确实得到了结果（因为我选择在\
    \ XPLORE 中放入数据）。这次运行的数据将被收集，与所有其他运行一起存入 SQLT 存储库，准备在运行结束时生成报告。\n\n# 查看结果\n\n当脚本最终完成（如果有数据，可能需要数小时）时，你会看到消息指示\
    \ HTML 文件正在被压缩，主报告正在创建。“XPLORE Completed”消息是一个重要线索，表明我们现在可以阅读报告了。以下是 XPLORE 运行结束时的输出。\n\
    \n```sql\n adding: xplore_sql_monitor_report_1_00728.html (164 bytes security)\
    \ (deflated 81%)\n  adding: xplore_sql_monitor_report_1_00729.html (164 bytes\
    \ security) (deflated 80%)\n  adding: xplore_sql_monitor_report_1_00730.html (164\
    \ bytes security) (deflated 80%)\n  adding: xplore_sql_monitor_report_1_00731.html\
    \ (164 bytes security) (deflated 80%)\ntest of xplore_sql_monitor_report_1.zip\
    \ OK\n  adding: xplore_report_1.html (164 bytes security) (deflated 96%)\n  adding:\
    \ xplore_script_1.log (164 bytes security) (deflated 98%)\n  adding: xplore_script_1.sql\
    \ (164 bytes security) (deflated 95%)\n  adding: xplore_sql_monitor_report_1.zip\
    \ (164 bytes security) (stored 0%)\ntest of xplore_1.zip OK\n        zip warning:\
    \ error deleting xplore_script_1.sql\nXPLORE Completed.\nDisconnected from Oracle\
    \ Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
    \ OLAP, Data Mining and Real Application Testing options\n```\n\n一个名为`xplore_1.zip`的新文件已被创建，它位于我们运行\
    \ XPLORE 脚本的目录中。\n\n```cmd\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT\
    \ 11.4.4.6\\sqlt\\utl\\xplore>dir\n Volume in drive C has no label.\n Volume Serial\
    \ Number is 77E9-80B4\n\nDirectory of C:\\Documents and Settings\\Stelios\\Desktop\\\
    SQLT 11.4.4.6\\sqlt\\utl\\xplore\n```\n"
- fmt: "# 文件列表与使用说明\n\n## 目录内容\n\n```\n12/22/2012  12:28 PM    <DIR>          .\n\
    12/22/2012  12:28 PM    <DIR>          ..\n08/11/2011  01:19 AM             1,696\
    \ create_xplore_script.sql\n07/09/2011  07:01 PM               325 drop_sys_views.sql\n\
    08/11/2011  12:46 AM               499 drop_user_objects.sql\n08/11/2011  12:46\
    \ AM               537 install.sql\n12/13/2012  08:53 PM               452 q.sql\n\
    08/11/2011  12:46 AM             2,622 readme.txt\n07/09/2011  07:01 PM      \
    \       3,972 sys_views.sql\n08/11/2011  12:46 AM               184 uninstall.sql\n\
    08/11/2011  12:46 AM             6,844 user_objects.sql\n04/02/2012  10:43 AM\
    \            58,807 xplore.pkb\n10/11/2011  06:29 AM             2,843 xplore.pks\n\
    12/22/2012  12:28 PM         3,839,878 xplore_1.zip\n12/22/2012  09:45 AM    \
    \       301,600 xplore_script_1.sql\n12/22/2012  09:31 AM             3,239 xplore_script_2.log\n\
    12/22/2012  09:29 AM           301,600 xplore_script_2.sql\n12/22/2012  09:33\
    \ AM             2,341 xplore_script_3.log\n12/22/2012  09:32 AM           301,600\
    \ xplore_script_3.sql\n              17 File(s)      4,829,039 bytes\n       \
    \        2 Dir(s)   6,701,252,608 bytes free\n```\n\n## 使用报告\n\n要使用此报告，最好创建一个子目录并解压\
    \ `xplore_1.zip` 中的文件。压缩文件中包含一个HTML文件（主报告）、一个运行日志文件以及运行过的 `xplore` 脚本。目前我们唯一感兴趣的文件是HTML文件。如果用浏览器打开此文件，会发现它比正常的XECUTE或XTRACT报告简洁得多。它以一个简单的标题“`XPLORE\
    \ Report for baseline:1 runid:1`”开始，然后直接就是大量的数字。报告的“Plans Summary”部分显示了我们的一条SQL的所有已发现执行计划。让我们看一下图12-2，它展示了报告的这一部分。这是通往报告所有其他部分的起点。\n\
    \n![9781430248095_Fig12-02.jpg](Images/9781430248095_Fig12-02.jpg)\n图12-2 . XPLORE报告的顶部部分\n\
    \n在这个案例中只有5个不同的执行计划（这是一段非常简单的SQL）。例如，`PHV` 922729823只有一个测试，因此其最大和最小成本相同，都是5046，这并不奇怪。原始计划的成本是947，所以这个选项显然不是好的选择。如果我们看看那个测试是什么，就能明白为什么结果不好。滚动到图12-3所示的部分，它显示了“Plans\
    \ Summary”正下方的“Discovered Plans”。这里我想知道为什么我原始的成本947会增加到5046。箭头指向一个超链接，点击它可以带我到同一报告的不同部分，那里详细说明了这次测试的情况。见图12-3，它显示了报告的“Discovered\
    \ Plans”部分。\n\n![9781430248095_Fig12-03.jpg](Images/9781430248095_Fig12-03.jpg)\n\
    图12-3 . 你可以通过点击“Total Tests”列下的超链接来查看测试详情\n\n一旦我们点击这个超链接，就会被带到报告的一个部分，显示做了什么以及发生了什么。图12-4显示了这个特定\
    \ `PHV` 的详细信息。\n\n![9781430248095_Fig12-04.jpg](Images/9781430248095_Fig12-04.jpg)\n\
    图12-4 . `PHV` 922729823的详细信息\n\n我们可以看到，这个 `PHV` 的测试是将 `\"_hash_join_enabled\"\
    =FALSE`。如果我们查看此SQL的XTRACT报告的原始执行计划（见图12-5）就能明白。\n\n![9781430248095_Fig12-05.jpg](Images/9781430248095_Fig12-05.jpg)\n\
    图12-5 . XTRACT报告中显示的原始执行计划\n\n原始计划是对 `COUNTRIES` 和 `CUSTOMERS` 使用“`TABLE ACCESS\
    \ FULL`”，然后使用哈希连接，接着再将其与对 `SALES` 的“`TABLE ACCESS FULL`”的结果进行另一次哈希连接。此计划的核心是使用哈希连接。现在我们的\
    \ `XPLORE` 通过设置隐藏参数禁用了这个选项，难怪计划的成本变得更高了。如果我们点击图12-4中“`Test Id`”列下的数字，就能看到实际选择了哪个计划。这就是我们看到的计划。\n\
    \n```\n|Id |Operation                        |Name         | Cost (%CPU)| Buffers\
    \ |  1Mem |  O/1/M   |\n|  0|SELECT STATEMENT                 |             |\
    \  5046 (100)|    3179 |       |          |\n|  1| SORT ORDER BY             \
    \      |             |  5046   (3)|    3179 |  2048 |     1/0/0|\n|  2|  HASH\
    \ GROUP BY                  |             |  5046   (3)|    3179 |   770K|   \
    \  1/0/0|\n|  3|   MERGE JOIN                    |             |  5008   (2)|\
    \    3179 |       |          |\n|  4|    SORT JOIN                    |      \
    \       |   825   (1)|    1461 |   546K|     1/0/0|\n|  5|     MERGE JOIN    \
    \              |             |   632   (1)|    1461 |       |          |\n|* 6|\
    \      TABLE ACCESS BY INDEX ROWID|COUNTRIES    |     2   (0)|       2 |     \
    \  |          |\n|  7|       INDEX FULL SCAN           |COUNTRIES_PK |     1 \
    \  (0)|       1 |       |          |\n|* 8|      SORT JOIN                  |\
    \             |  630   (1) |    1459 |   615K|     1/0/0|\n|  9|       TABLE ACCESS\
    \ FULL         |CUSTOMERS    |   406   (1)|    1459 |       |          |\n|*10|\
    \    SORT JOIN                    |             |  4183   (2)|    1718 |  1763K|\
    \     1/0/0|\n| 11|     PARTITION RANGE ALL         |             |   494   (3)|\
    \    1718 |       |          |\n| 12|      TABLE ACCESS FULL          |SALES \
    \       |   494   (3)|    1718 |       |          |\n```\n\n正如预期，没有哈希连接的迹象。优化器尊重了我们的要求并避免了它，但这对我们的计划产生了不利影响，所以我们知道不要强制优化器不使用哈希连接。这就是智能分析发挥作用的地方。我们知道哈希连接在这里是个好主意，但\
    \ `XPLORE` 的蛮力方法并不知道。\n\n## 寻找最佳执行计划\n\n那么，关于计划如何变得更糟就讲这么多。让我们回到计划摘要（见图12-2），现在看看是否有任何改进。我们看到\
    \ `PHV` 2917593948有一个很大的改进。这里我们看到一个计划，其最小成本是123（远低于我们原始计划的成本947）。如果我们再看“Discovered\
    \ Plans”部分，会发现有两个测试完成。如果我们现在点击超链接“2”，就能看到这个 `PHV` 的完整测试（见图12-6）。\n\n![9781430248095_Fig12-06.jpg](Images/9781430248095_Fig12-06.jpg)\n\
    图12-6 . `PHV` 2917593948的测试详情\n\n我们立即看到，这个案例成本如此之低的原因是我们将 `optimizer_index_cost_adj`\
    \ 设置为1。换句话说，我们强制使用了索引。我们可以通过点击超链接315来查看测试315使用的计划。这就是我们看到的计划（为清晰起见，我已删除了一些列）。\n\
    \n```\n|Id  |Operation                             | Name                 | Cost\
    \ (%CPU)| Reads  |\n```"
