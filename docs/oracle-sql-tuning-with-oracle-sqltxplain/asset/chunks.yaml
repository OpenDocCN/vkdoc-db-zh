    a slow one. One relates to `DIMENSION` and the other relates to `SYNONYM`


    The figure above is the left hand side of the section for the Plans Summary. As
    expected, we see slower execution, more CPU usage and more buffer gets for the
    value `Plan Hash Value 2348726875`, because this is the plan associated with the
    predicate value `SYNONYM`. If we look at the right hand side of the same section
    we see more corroborating evidence (see [Figure 7-5](#9781430248095_Ch07.xhtml#Fig5)).


    ![9781430248095_Fig07-05.jpg](Images/9781430248095_Fig07-05.jpg)


