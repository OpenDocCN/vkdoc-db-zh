    \ 13-1。\n\n![9781430248095_Fig13-01.jpg](img/9781430248095_Fig13-01.jpg)\n\n图\
    \ 13-1 . TRCANLZR 报告的顶部\n\n文件顶部的这个列表确保我们拥有正确的 TRCANLZR 输出。其下方是报告各部分的摘要，可直接跳转。参见\
    \ 图 13-2。\n\n![9781430248095_Fig13-02.jpg](img/9781430248095_Fig13-02.jpg)\n\n\
    图 13-2 . 页眉部分包含指向报告其他部分的链接\n\n看 图 13-2。这里有很多部分，都包含有用的信息。第一部分是“所用术语表”。你可能很想直接跳到“响应时间摘要”，因为“所用术语表”听起来很乏味。如果你确实进入了“所用术语表”，乍一看似乎内容不多。参见\
    \ 图 13-3。准确理解所用的每个术语对于理解报告至关重要，因此应该检查“所用术语表”。你只需要点击标题下的加号即可获取详细信息。参见 图 13-3，它显示了我展开该部分后的屏幕。\n\
    \n![9781430248095_Fig13-03.jpg](img/9781430248095_Fig13-03.jpg)\n\n图 13-3 . 所用术语表通常不显示\n\
    \n## 报告术语解读\n我提到术语表的原因是 TRCANLZR 需要被正确解读。存在许多时间度量，每一个都需要被理解，你才能正确理解发生了什么。例如，“响应时间”是用户如果坐在终端前运行\
    \ SQL 时所感知到的时间度量。该时间由实际工作（Elapsed）和非空闲等待时间组成。空闲等待时间可以忽略，因为它们是由于最终用户未响应造成的（通常显示为\
    \ `SQL*Net message from client`）。非空闲等待时间通常由 SQL 执行步骤期间发生的活动组成，例如从磁盘获取数据。一旦我们明确了这些定义，就可以查看“响应时间摘要”。参见\
