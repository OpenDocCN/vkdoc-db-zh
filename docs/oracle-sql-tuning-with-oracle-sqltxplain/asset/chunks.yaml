    \ because the other information fed to the optimizer is wrong. So, for example,\
    \ if the object statistics are wrong you may *need* to give the optimizer a hint\
    \ because its statistics are wrong.\n\nIs this the correct way to use a hint?\
    \ No. The problem with using a hint like this is that it may have been right when\
