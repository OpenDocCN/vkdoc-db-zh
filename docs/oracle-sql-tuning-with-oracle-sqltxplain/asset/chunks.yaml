    上面的示例显示了数据库中的对象类型与这些对象类型的数量。这里的“桶”（`bucket`）指的是`object_type`的值（“桶”现在常用来表示数据集中涵盖的值范围）。例如，对象类型`SYNONYM`（示例中的最后一行）有
    27,802 个值。有时桶可以是一周中的某天，比如星期六或星期日；有时可以是原色，比如红色或蓝色；有时桶也可以是一个范围，比如“2011年的日期”。在每种情况下，这些值都是你在绘制图表时会放在X轴上的值。从现在开始，我们将使用术语“桶”来表示所讨论的值范围。


    一旦你执行了查询，你将看到有助于你决定数据偏斜程度的信息。然而，请注意，几乎所有数据在某种程度上都是偏斜的。即使在我们上一节关于超市支出的例子中，数据也是偏斜的。你需要回答的问题是：它是否偏斜到足以给我的查询带来问题？10%的变异性通常不会引起问题，但如果你有一个桶包含了90%的样本，那么数据就是高度偏斜的。因此，关于偏斜度的判断在一定程度上是主观的。在上面的查询示例中，如果我查询的是表`test3`，并且我的谓词值是`SYNONYM`，那么我可能会返回比针对值`RESOURCE
    PLAN`进行查询时多得多的行。请参见下面的示例代码。如果我们对罕见值进行采样，我们只能得到10个值。


    ```

    SQL> select count(*) from test3 where object_type=''SYNONYM'';


    COUNT(*)


    SQL> select count(*) from test3 where object_type=''RESOURCE PLAN'';


    COUNT(*)


    ```


    我们是否关心这种偏斜度？数据是否非常偏斜？从技术上讲，即使是最轻微的偏离“常态”也可以归类为偏斜，但这个术语现在通常指那种会使执行计划不稳定的偏斜程度。然而，从更客观的角度来看，如果你看到如上例所示，某些谓词返回的值是其他谓词的10倍以上，那么这就是非常偏斜的。如果你看到最常见值与最不常见值的比率大于或等于1.5，你就可以开始考虑偏斜度作为一个因素了。


    SQLT 使得收集这类查询信息的工作变得容易得多。它展示了列直方图的数据分布。首先，在报告顶部（参见[图 4-2](#9781430248095_Ch04.xhtml#Fig2)），我们可以点击“Tables”（表）、“Columns”（列），或者我们也可以点击“Histograms”（直方图）。在这个例子中，我们将点击“Tables”，因为这可能是你在调查中最可能遵循的路径。


