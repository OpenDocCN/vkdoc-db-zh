    you did not want to deviate from. Then you let the brute force method take over.


    The third step is to generate a generic script based on your settings, which is
    used as a framework for the superscript.


    The final step is to use this framework script to iterate over all the possible
    values of the choices you have selected (optimizer parameter, fix control, and
    Exadata parameters) to create a very big script that does all the work. This big
    script (the superscript) collects all the information from all the executions
    and puts all the information into one HTML document. This is the HTML document
    you then look at manually and apply your intelligence to.


    What Can XPLORE Change?


    As we mentioned earlier, XPLORE can look at the effect of changes to the optimizer
    parameters, the fix control settings, and the special Exadata parameters. It cannot
    be used to test for bad statistics, skewed data, index changes, or similar structural
    changes to the database objects. If you choose CBO parameters you will only get
    a report covering the standard CBO parameters (including the hidden ones). This
    is a much shorter report than including the fix control settings. If you suspect
    that some optimizer feature related to a bug is the cause of the problem then
    you may choose to use the fix control settings and ignore the optimizer parameters.
    If you suspect an Exadata specific problem then you can choose to select only
    those parameters related to Exadata. There are not many (16) Exadata specific
    parameters, so I think it would be useful to list them here. You can get this
    list from `sqlt$_v$parameter_exadata`. You can get a similar list for the “normal”
    non-Exadata parameters, but the list is too long to put here (there are 275 parameters,
    I list these in Appendix B)


    ```

    SQL> select name, description from sqlt$_v$parameter_exadata;


    NAME                                 DESCRIPTION'
  trans: '

    我希望您能与我一同欣赏测试用例工具的各项功能。它们既强大又灵活。这也开启了调优新世界的大门。一旦您拥有一个可以修改的测试用例（在独立系统上），您就可以无止境地探索
    CBO 环境，寻找最佳性能。随着您对 SQL 和调优概念知识的增长，您将能够尝试越来越多的方法来改进执行计划。您所有这些努力的基石将是 `SQLTXPLAIN`
    的测试用例工具。在下一章中，我们将探讨一种使用测试用例来寻找问题解决方案的方法。使用 `XPLORE` 方法，您将用大锤来砸开坚果。


    # 第 12 章


    ![image](img/frontdot.jpg)


    # 使用 XPLORE 调查意外的执行计划变更


    我相信到现在您已经意识到，如果您想调优 Oracle SQL，熟悉 `SQLTXPLAIN` 是一件相当酷的事情。在第 11 章中，我们讨论了测试用例工具，以及它如何能构建一个完整的测试环境来测试
    SQL、系统参数、优化器设置、对象统计信息，实际上包含了足够的设置，使得优化器表现得如同在源系统上一样。一旦您达到那种状态，您就拥有了一个绝佳的环境去探索优化器的选择。这种智能的、有方向的方法在您对问题可能是什么有一个大致概念，并且您怀疑自己距离解决方案仅差几步之遥时，是极其富有成效的。在那种情况下，您可以创建测试用例，尝试您的更改，然后测试结果。这是解决调优问题的好方法，但是如果您在
    Oracle 升级或打补丁后，对某些 SQL 出现性能回退的原因毫无头绪，或者某个 SQL 执行计划意外变更，那该怎么办？您可能有数百个参数更改可以尝试，但逐一检查将耗费太长时间。另一方面，计算机非常擅长处理数百种选择以找出最佳方案，而这正是
    `XPLORE` 所做的。


    ## 何时应该使用 XPLORE？


    `XPLORE` 方法在设计时只有一个目的：对一条 SQL 语句进行强力攻击，尝试每一个可能的参数选择，然后向您展示答案。尽管 `XPLORE` 可以探索优化器环境的许多变化，但它被设计用于一个特定目标：发现由
    Oracle 引擎升级和补丁引起的缺陷。它并非设计用于直接调优 SQL，因为 `SQLT` 的其他部分有充足的功能来处理该场景。尽管如此，如果您已经用尽了所有想法需要一点提示，或者您在新的
    SQL 上遇到了缺陷并且认为修复控制更改可能有所帮助，它仍然可以在非升级情况下使用。它旨在处理已发生升级且系统运行正常，但有一两个 SQL 出于某些未明确说明的原因出现性能回退的情况。在这种情况下，可能是
    Oracle 引擎的某些功能升级导致特定的 SQL 不再是最优的。一般来说，SQL 性能会随着版本迭代而提升，但每次版本升级，如果数千条 SQL 得到改善，可能有一两条会变得更差。如果那一两条
    SQL 恰好对您的运营至关重要，您将需要 `XPLORE` 来找出原因。您能使用 `XPLORE` 来调优那些只需稍作调整的语句吗？如果您运行了 `XPLORE`，它提出了一些可能有益的参数更改，这些更改可能会给您一些改进的思路。但这通常不是
    `XPLORE` 的最佳用途。


    ## XPLORE 如何工作？


    `XPLORE` 依赖于一个可工作的测试用例（如第 11 章所述）。您必须使用 `XECUTE` 或 `XTRACT` 创建一个包含测试用例文件的 zip
    文件。一旦您完成了创建测试用例的步骤，您将拥有一个 `XPLORE` 可以基于其工作的测试用例。一旦这个测试用例准备就绪，`XPLORE` 就开始工作。它会生成一个脚本，其中包含每一个可用优化器参数的每一个可能值，包括隐藏参数以及修复控制设置（我们稍后会讨论这些）。然后，该脚本针对所有参数的每一个可能值运行测试用例，并生成一个包含结果的
    HTML 文件。所有这些测试的结果都进行了总结，并通过超链接链接到 HTML 文件中的执行计划和更改的设置。这对基于成本的优化器来说是一次真正的考验，但请记住，这里没有数据（通常情况下）。


    使用 `XPLORE` 有四个基本步骤。


    1.  获取对测试用例的访问权限。

    2.  为测试用例设置基线环境。

    3.  创建一个可以运行您的测试用例的脚本。

    4.  创建一个超级脚本，该脚本将使用您的测试用例运行所有可能的值。


    让我们更详细地讨论每个步骤。


    您必须能够无错误地运行 `q.sql` 并能够生成执行计划。这两点都是要求，因为如果 SQL 无法运行，您就无法生成执行计划，而如果无法生成执行计划，您就无法计算成本。没有成本，您就无法进行探索。


    第二步允许您为测试用例设置一些特殊的特性，这些特性适用于所有测试的变体。无论您在这里选择什么（可能是一个优化器参数、一个修复控制或其他环境设置），都将在 `XPLORE`
    过程的每次迭代之前完成。如果您确定您正在调查的问题具有某些您不想偏离的特性，您可能会选择这样做。然后您就让强力方法接管。


    第三步是根据您的设置生成一个通用脚本，该脚本用作超级脚本的框架。


    最后一步是使用这个框架脚本来遍历您所选选项（优化器参数、修复控制和 Exadata 参数）的所有可能值，以创建一个完成所有工作的非常大的脚本。这个大的脚本（超级脚本）收集所有执行的信息，并将所有信息放入一个
    HTML 文档中。这就是您随后手动查看并运用您的智慧进行分析的 HTML 文档。


    ## XPLORE 可以更改什么？


    正如我们前面提到的，`XPLORE` 可以查看更改优化器参数、修复控制设置和特殊 Exadata 参数的效果。它不能用于测试不良统计信息、数据倾斜、索引更改或类似的数据库对象结构更改。如果您选择
    CBO 参数，您将只得到一份涵盖标准 CBO 参数（包括隐藏参数）的报告。这比包含修复控制设置的报告要短得多。如果您怀疑某个与缺陷相关的优化器功能是问题的原因，那么您可以选择使用修复控制设置并忽略优化器参数。如果您怀疑是
    Exadata 特定的问题，那么您可以选择仅与 Exadata 相关的参数。Exadata 特定参数不多（16 个），因此我认为在这里列出它们会很有用。您可以从
    `sqlt$_v$parameter_exadata` 获取此列表。您可以为“常规”的非 Exadata 参数获取类似的列表，但该列表太长，无法在此处列出（共有
    275 个参数，我在附录 B 中列出了它们）。


    ```sql

    SQL> select name, description from sqlt$_v$parameter_exadata;


    NAME                                 DESCRIPTION

    ```

