    * `enable_tuning_pack_access;`\n* `disable_diagnostic_pack_access;`\n* `enable_diagnostic_pack_access;`\n\
    \n这四个存储过程分别禁用和启用 SQLT 中的调优包和诊断包功能。[Figure A-1](#9781430248095_AppA.xhtml#Fig1)\
    \ 中的箭头指向了 SQLT 主报告顶部显示示例代码的提示。下面我禁用了调优包，然后重新启用，接着又禁用了诊断包并重新启用，最终回到了我开始时的许可证级别。\n\
