    ## 如何在 SQLT 安装后更改许可级别


    SQLT 安装的默认设置适用于大多数情况，但有时你可能需要更改它们。例如，在安装 SQLT 后，你购买了诊断包或调优包的许可。调优包和诊断包可以单独购买，也可以作为捆绑包从
    Oracle 购买。如果你没有这两个包，并且你在正常安装中使用了选项 “T”，那么你应该使用 `disable_tuning_pack_access` 和
    `disable_diagnostic_pack_access`。以下是示例步骤

    '
- fmt: "SQL 执行示例：\n```\nSQL> exec sqltxadmin.sqlt$a.disable_tuning_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqltxadmin.sqlt$a.disable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\n```\n这些例程不需要任何参数，只需在安装了 SQLT 的数据库上从\
    \ SQLT 账户执行即可。您可以通过重新安装 SQLT 来更改许可证级别，但如果您在 SQLT 存储库中有许多想要保留的记录，这不是一个好主意。可配置设置的列表可以在主要\
    \ `SQLTXECUTE` 或 `SQLTXTRACT` 报告的“全局”部分下找到（如第 13 章所述）。参见 [Figure A-1](#9781430248095_AppA.xhtml#Fig1)。\n\
    \n![9781430248095_FigAppA-01.jpg](Images/9781430248095_AppA-01.jpg)\n\n[Figure\
    \ A-1](#9781430248095_AppA.xhtml#_Fig1) .  一个 SQLTXECUTE 报告的顶部，突出显示了配置部分\n\n许可证级别更为重要，并且有专门的例程来管理它们。如果我们安装产品时设置了错误的许可证级别，我们可以使用\
