    \ flush.sql\n12/29/2012  09:59 AM               118 install.sh\n12/29/2012  09:59\
    \ AM               960 install.sql\n12/29/2012  09:59 AM             2,911 pack_tcx.sql\n\
    12/29/2012  10:03 AM             2,209 plan.log\n12/29/2012  09:59 AM        \
    \       279 plan.sql\n12/29/2012  09:50 AM               324 q.sql\n12/29/2012\
    \  09:59 AM               424 sel.sql\n12/29/2012  09:59 AM               378\
    \ sel_aux.sql\n12/29/2012  09:59 AM         1,193,984 sqlt_s11996_exp2.dmp\n12/29/2012\
    \  10:02 AM               596 sqlt_s11996_imp2.log\n12/29/2012  10:02 AM     \
    \       44,263 sqlt_s11996_metadata1.log\n12/29/2012  09:59 AM            29,223\
    \ sqlt_s11996_metadata1.sql\n12/29/2012  10:02 AM           106,511 sqlt_s11996_metadata2.log\n\
    12/29/2012  09:59 AM            95,604 sqlt_s11996_metadata2.sql\n12/29/2012 \
    \ 10:02 AM             3,272 sqlt_s11996_schema_stats.log\n12/29/2012  09:59 AM\
    \             2,174 sqlt_s11996_schema_stats.sql\n12/29/2012  10:02 AM       \
    \    109,835 sqlt_s11996_set_cbo_env.log\n12/29/2012  09:59 AM            84,672\
    \ sqlt_s11996_set_cbo_env.sql\n12/29/2012  10:02 AM             1,658 sqlt_s11996_system_stats.log\n\
    12/29/2012  09:59 AM             1,285 sqlt_s11996_system_stats.sql\n12/29/2012\
    \  09:59 AM           103,448 sqlt_s11996_tcx.zip\n12/29/2012  09:59 AM      \
    \         141 tc.sql\n```\n\n所有这些文件都可以从我们之前见过的 TC 文件中识别出来。对我们来说，新的有趣文件是 `install.sql`，它在我们的新数据库中安装测试用例。如果我们运行这个脚本，会看到最后一页如下所示，其中测试用例用户（本例中是\
    \ `TC11996`）已被创建，并且测试 SQL 已运行。\n\n```\nEXPLAINED SQL STATEMENT:\n\nselect   country_name,\
    \ sum(AMOUNT_SOLD) from sales s, customers c,\ncountries co where   s.cust_id=c.cust_id\
    \   and\nco.country_id=c.country_id   and country_name in\n('Ireland','Denmark','Poland','United\n\
    Kingdom','Germany','France','Spain','The Netherlands','Italy')   group\nby country_name\
    \ order by sum(AMOUNT_SOLD)\nPlan hash value: 2938593747\n\n| Id  | Operation\
    \              | Name      | Rows  | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT\
    \       |           |       |   947 (100)|\n|   1 |  SORT ORDER BY         | \
    \          |     9 |   947   (7)|\n|   2 |   HASH GROUP BY        |          \
    \ |     9 |   947   (7)|\n|*  3 |    HASH JOIN           |           |   435K|\
    \   909   (3)|\n|*  4 |     HASH JOIN          |           | 26289 |   409   (1)|\n\
    |*  5 |      TABLE ACCESS FULL | COUNTRIES |     9 |     3   (0)|\n|   6 |   \
    \   TABLE ACCESS FULL | CUSTOMERS | 55500 |   406   (1)|\n|   7 |     PARTITION\
    \ RANGE ALL|           |   918K|   494   (3)|\n|   8 |      TABLE ACCESS FULL\
    \ | SALES     |   918K|   494   (3)|\n\nPredicate Information (identified by operation\
    \ id):\n\n3 - access(\"S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n   4 - access(\"CO\"\
    .\"COUNTRY_ID\"=\"C\".\"COUNTRY_ID\")\n   5 - filter((\"COUNTRY_NAME\"='Denmark'\
    \ OR \"COUNTRY_NAME\"='France' OR\n               \"COUNTRY_NAME\"='Germany' OR\
    \ \"COUNTRY_NAME\"='Ireland' OR\n               \"COUNTRY_NAME\"='Italy' OR \"\
    COUNTRY_NAME\"='Poland' OR\n               \"COUNTRY_NAME\"='Spain' OR \"COUNTRY_NAME\"\
    ='The Netherlands' OR\n               \"COUNTRY_NAME\"='United Kingdom'))\n36\
    \ rows selected.\nSQL> SPO OFF;\nSQL> show user\nUSER is \"TC11996\"\n```\n\n\
    这个数据库是全新的。没有 `SH` 模式（我在创建数据库后删除了该模式）也没有 SQLT 模式（我从未在此数据库上安装 SQLT）。所有模式都是标准账户，然而，如果我以\
    \ `TC11996` 身份登录，我就可以执行我的测试用例，并像通常使用 SQLT 时那样，进行所有尝试改进执行计划的操作。\n\nTCX 还有一个有时很有用的额外功能。有一个名为\
    \ `pack_tcx.sql` 的文件，它允许您更紧凑地打包测试用例。如果运行此文件，会生成一个名为 `tcx.zip` 的新 zip 文件，其中包含如下所示的文件（在您情况下，其中一些文件名会有所不同）。\n\
    \n```\n12/29/2012  09:59 AM               132 10053.sql\n12/29/2012  09:59 AM\
    \               103 flush.sql\n12/29/2012  09:59 AM               279 plan.sql\n\
    12/29/2012  09:50 AM               324 q.sql\n12/29/2012  10:29 AM           \
    \     74 readme.txt\n12/29/2012  10:29 AM             1,447 setup.sql\n12/29/2012\
    \  09:59 AM            95,604 sqlt_s11996_metadata2.sql\n12/29/2012  09:59 AM\
    \            84,672 sqlt_s11996_set_cbo_env.sql\n12/29/2012  09:59 AM        \
    \     1,285 sqlt_s11996_system_stats.sql\n12/29/2012  10:30 AM         1,136,640\
    \ TC11996_expdat.dmp\n```\n\n这些文件会被（通过 `pack_tcx.sql`）自动解压。这次我们只以 `sys` 身份运行 `setup.sql`，测试用例用户就被创建了。虽然当您已经安装了\
    \ SQLT（我鼓励您这样做）时，这些创建测试用例的额外选项可能显得有点多余，但这些越来越小的、能展示您的问题 SQL 和执行计划的测试用例，在试图说服他人（例如\
    \ Oracle 支持人员）您确实存在问题时，是极其有帮助的。您的测试用例中包含的无关细节越少（只要它仍然能展示问题），就越有利于解决问题。\n\n## 包含测试用例数据\n\
    \nSQLT 测试用例默认不包含应用程序数据。这是因为问题（1）与应用程序数据无关，（2）数据量太大，或（3）数据具有某种特权，不能向其他人展示。在极少数情况下，可能需要数据来展示问题。幸运的是，只要能克服其他障碍，SQLT\
    \ 提供了一个选项允许这样做。在 SQLT 的后期版本中，您可以这样做：\n\n```\nSQL> EXEC SQLTXADMIN.sqlt$a.set_param('tcb_export_data',\
    \ 'TRUE');\n\nPL/SQL procedure successfully completed.\n```\n\n在旧版本的 SQLT 中，在安装目录的\
    \ `sqcpkgi.pkb` 文件中找到这部分代码，并将 `FALSE` 改为 `TRUE`。这是更改前的代码片段：\n\n```\nEXECUTE IMMEDIATE\n\
    \  'BEGIN DBMS_SQLDIAG.EXPORT_SQL_TESTCASE ( '||\n  'directory     => :directory,\
    \ '||\n  'sql_id        => :sql_id, '||\n  'exportData    => FALSE , '||  <<<将此处改为\
    \ TRUE\n  'timeLimit     => :timeLimit, '||\n  'testcase_name => :testcase_name,\
    \ '||\n  'testcase      => :testcase ); END;'\n```\n\n然后重新构建这个包。\n\n```\nSQL>\
    \ @sqcpkgi.pkb\n\nPackage body created.\n\nNo errors.\n```\n\n一旦您选择了此选项，就可以运行\
    \ `sqltxecute.sql`（或 `sqltxtract.sql`）并收集包含应用程序数据的测试用例。此后的所有设置步骤完全相同，您运行 `xpress.sql`\
    \ 并按照前面章节概述的步骤操作。\n\n### 总结\n"
- fmt: 'I hope you’ve enjoyed looking at the features of the test case utility with
    me. They are powerful and flexible. They are also the beginning of a new world
    of tuning. Once you have a test case you can change (on a stand-alone system)
    you can endlessly explore the CBO environment looking for the best performance.
    As your knowledge of SQL and tuning concepts increases you will be able to try
    more and more methods to improve the execution plan. Your bedrock in all these
    endeavors will be `SQLTXPLAIN`’s test case utility. In the next chapter we’ll
    look at a way you can use the test case to find a solution to a problem. With
    the `XPLORE` method you’ll use a sledgehammer to crack a nut.


    # CHAPTER 12


    ![image](Images/frontdot.jpg)


    # Using XPLORE to Investigate Unexpected Plan Changes


    I’m sure by now you’re thinking that `SQLTXPLAIN` is a pretty cool tool to be
    familiar with, if you want to tune Oracle SQL. In [Chapter 11](../Text/9781430248095_Ch11.xhtml)
    we discussed the test case utility and how that could build an entire environment
    for testing SQL, system parameter, optimizer settings, objects statistics, enough
    of the settings in fact to make the optimizer behave as if it was on the source
    system. Once you achieve that state you have a superb environment to go exploring
    the optimizer’s choices. This intelligent, directed approach is extremely fruitful
    when you have a rough idea what the problem might be and you suspect that you
    are only a few changes away from the solution. In those kinds of situations you
    can create the test case, try your changes, and test the result. This is a good
    way to solve tuning problems, but what if you had no idea what had caused a regression
    to some SQL after an upgrade or patch to Oracle or if a SQL plan changed unexpectedly.
    Then what could you do? There are hundreds of parameter changes you could try,
    but it would take far too long to go through them all. On the other hand, computers
    are pretty good at churning through hundreds of choices to find the best one,
    and this is exactly what `XPLORE` does.


    ## When Should You Use XPLORE?


    The `XPLORE` method was designed with one purpose in mind: to do a brute force
    attack on an SQL statement by trying every choice of parameter and then presenting
    you with the answers. Even though `XPLORE` can explore many changes to the optimizer
    environment, it was designed with one specific goal: to find bugs caused by upgrades
    and patches to the Oracle engine. It is not designed to tune SQL directly, as
    there are adequate features in other parts of `SQLT` to deal with that scenario.
    Nonetheless, it can still be used in a non-upgrade situation if you’ve run out
    of ideas and need a hint or if you’ve hit a bug on a new SQL and you think a fix
    control change may help. It is designed to deal with situations where an upgrade
    has occurred and the system works just fine, except for one or two SQLs that for
    some unspecified reason have regressed. In this scenario it is possible that some
    feature upgrade of the Oracle engine has caused a specific SQL to no longer be
    optimal. Generally speaking SQL performance improves from version to version,
    but with every version upgrade if 1000s of SQL statements improve maybe one or
    two will be worse off. If those one or two SQL happen to be crucial to your operation,
    you’ll need `XPLORE` to find the reason. Can you use `XPLORE` to tune statements
    that just need some tuning? It’s possible that if you ran `XPLORE`, and it came
    up with some parameter changes that might be beneficial, those changes might give
    you some ideas for improvements. But it’s generally not the best use of `XPLORE`.


    ## How Does XPLORE Work?


    `XPLORE` relies on a working test case (as described in [Chapter 11](../Text/9781430248095_Ch11.xhtml)).
    You must have used `XECUTE` or `XTRACT` to create a zip file that contains a test
    case file. Once you have been through the steps to create your test case you will
    have a test case that `XPLORE` can work from. Once this test case is in place,
    `XPLORE` goes to work. It generates a script with every possible value for every
    optimizer parameter available, including the hidden ones as well as the fix control
    settings (we’ll discuss those shortly). This script then runs the test case for
    each possible value for all the parameters and generates an HTML file with the
    results. The results of all these tests are summarized and hyperlinked in the
    HTML file to the execution plan and the setting that was changed. It’s a real
    work out for the cost-based optimizer, but remember there’s no data (usually).


    There are four basic steps to using `XPLORE`.


    1.  Get access to the test case

    2.  Set the baseline environment for the test case

    3.  Create a script that can run your test case

    4.  Create a superscript that will run all possible values with your test case.


    Let’s talk about each of these steps in more detail.


    You must be able to run `q.sql` without an error and be able to generate the execution
    plan. Both of these are requirements, because if the SQL does not run you cannot
    generate an execution plan, and if you cannot generate an execution plan you cannot
    generate costs. Without costs you cannot go exploring.


    The second step allows you to set some special characteristic of the test case
    that applies to all the variants tested. Whatever you select here (it could be
    an optimizer parameter or a fix control or some other environmental setting) it
    will be done before each iteration of the `XPLORE` process. You might choose to
    do this if you were sure that the problem you were investigating had some characteristic
    you did not want to deviate from. Then you let the brute force method take over.


    The third step is to generate a generic script based on your settings, which is
    used as a framework for the superscript.


    The final step is to use this framework script to iterate over all the possible
    values of the choices you have selected (optimizer parameter, fix control, and
    Exadata parameters) to create a very big script that does all the work. This big
    script (the superscript) collects all the information from all the executions
    and puts all the information into one HTML document. This is the HTML document
    you then look at manually and apply your intelligence to.


    ## What Can XPLORE Change?


    As we mentioned earlier, `XPLORE` can look at the effect of changes to the optimizer
    parameters, the fix control settings, and the special Exadata parameters. It cannot
    be used to test for bad statistics, skewed data, index changes, or similar structural
    changes to the database objects. If you choose CBO parameters you will only get
    a report covering the standard CBO parameters (including the hidden ones). This
    is a much shorter report than including the fix control settings. If you suspect
    that some optimizer feature related to a bug is the cause of the problem then
    you may choose to use the fix control settings and ignore the optimizer parameters.
    If you suspect an Exadata specific problem then you can choose to select only
    those parameters related to Exadata. There are not many (16) Exadata specific
    parameters, so I think it would be useful to list them here. You can get this
    list from `sqlt$_v$parameter_exadata`. You can get a similar list for the “normal”
    non-Exadata parameters, but the list is too long to put here (there are 275 parameters,
    I list these in Appendix B).


    ```sql

    SQL> select name, description from sqlt$_v$parameter_exadata;


    NAME                                 DESCRIPTION

    ```'
