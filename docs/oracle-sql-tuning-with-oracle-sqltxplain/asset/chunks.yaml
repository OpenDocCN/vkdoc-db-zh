    \  2    sql_txt CLOB;\n  3    h          SYS.SQLPROF_ATTR;\n  4    PROCEDURE wa\
    \ (p_line IN VARCHAR2) IS\n  5    BEGIN\n  6      DBMS_LOB.WRITEAPPEND(sql_txt,\
    \ LENGTH(p_line), p_line);\n  7    END wa;\n  8  BEGIN\n  9    DBMS_LOB.CREATETEMPORARY(sql_txt,\
    \ TRUE);\n 10    DBMS_LOB.OPEN(sql_txt, DBMS_LOB.LOB_READWRITE);\n 11    -- 下面的\
    \ SQL 文本片段不必长度相同。\n 12    -- 所以如果你编辑了 SQL 文本（即移除了临时的提示），\n 13    -- 无需编辑或重新对齐未修改的片段。\n\
    \ 14    wa(q'[select     s.amount_sold,c.cust_id,p.prod_name from sh.products\
    \ p,s]');\n 15    wa(q'[h.sales s,sh.customers c where\n 16    c.cust_id=s.cust_id\
    \ and s.prod_]');\n 17    wa(q'[id=p.prod_id and c.cust_first_name=''Theodorick''\
    \ ]');\n 18    DBMS_LOB.CLOSE(sql_txt);\n 19    h := SYS.SQLPROF_ATTR(\n 20  \
    \  q'[BEGIN_OUTLINE_DATA]',\n 21    q'[SWAP_JOIN_INPUTS(@\"SEL$1\" \"P\"@\"SEL$1\"\
    )]',\n 22    q'[USE_HASH(@\"SEL$1\" \"P\"@\"SEL$1\")]',\n 23    q'[NLJ_BATCHING(@\"\
    SEL$1\" \"S\"@\"SEL$1\")]',\n 24    q'[USE_NL(@\"SEL$1\" \"S\"@\"SEL$1\")]',\n\
    \ 25    q'[LEADING(@\"SEL$1\" \"C\"@\"SEL$1\" \"S\"@\"SEL$1\" \"P\"@\"SEL$1\"\
    )]',\n 26    q'[FULL(@\"SEL$1\" \"P\"@\"SEL$1\")]',\n 27    q'[INDEX(@\"SEL$1\"\
    \ \"S\"@\"SEL$1\" (\"SALES\".\"CUST_ID\"))]',\n 28    q'[INDEX(@\"SEL$1\" \"C\"\
