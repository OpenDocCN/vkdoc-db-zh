    ## Installing SQLTXPLAIN


    You may ask, why show the installation log for a utility that installs in five
    minutes and only has at most five parameters as inputs. The plain fact of the
    matter is that despite the simplicity of the inputs and that most installs can
    be quick and easy, there are situations where the installation can fail: either
    because the inputs were wrong or because the installation steps were not done
    from suitably privileged accounts. You occasionally get questions about an installation
    that may have worked, but the user is not clear. This is another reason to show
    what a “normal” installation looks like. I also look at alternative ways in which
    SQLT can be installed, including a “silent” mode and a remote install mode. There
    are also ways to change the setup of SQLT after it has installed, and I mention
    some of the options available there. Finally I also mention how to de-install
    SQLT, in case you want to install a later version, for example. By showing these
    options and describing the installation, I hope to convince you that the installation
    is simple and robust and should be considered an asset to any system rather than
    a liability.


    ### A Standard SQLT Installation


    As an assistance to anyone installing SQLT I have supplied a partial install log
    of the SQLT utility. I have highlighted and documented those areas of the installation
    that are of interest and note. New comers to SQLT may find this useful, but regular
    users will find the section on other ways to install SQLT more interesting. In
    the example SQLT installation below I have bolded my responses to make it clear
    where I am entering data, and I have removed blank lines for brevity. In this
    example the SQLT zip file has been downloaded to a local directory and unzipped.
    Inside the zip file we find the `sqlt` directory and the `install` directory (as
    we saw in Chapter 1). Now we connect as `SYS` into `SQL*Plus` and start the main
    installation script `sqcreate.sql`:


    ```

    SQL> @sqcreate

    PL/SQL procedure successfully completed.

    PL/SQL procedure successfully completed.

    RDBMS_RELEASE


    11.2

    RDBMS_VERSION


    11.2.0.1.0

    no rows selected

    ```'
  raw: 'Now that we’ve put SQLT in its proper place in the strategy of tuning a system,
    we should acknowledge that for tuning individual SQLs, SQLT is hands down the
    best starting tool for the job. It’s true that there are many tuning utilities
    out there: some of them on the Oracle MOS site and some of them paid-for products.
    For example, TRCANLZR is available as a stand-alone utility, TKPROF comes with
    Oracle as a utility, 10046 and 10053 tracing can be collected from a standard
    Oracle installation. All of them, however, are focusing on one particular aspect
    or are going into great detail on a problem without giving a bigger picture. SQLT
    is the main tool for focusing on one SQL and gives you the big picture in an easily
    digestible form. SQLT does require you to do some work of course, and analysis
    of the reports and building the overall picture of the SQL takes some time and
    some expertise. Sometimes you will need more information than a particular run
    of SQLT has supplied (for example, the shared pool was flushed, or the system
    was rebooted, so much information was lost). Depending on what you learn by looking
    at the SQL history and statistics, you could look at the COMPARE method, for example
    (if you have a good run of the SQL). If you need to experiment you can use the
    test case on a stand-alone system to try out a few things and if you know changes
    have come about because of optimizer version changes, you can use XPLORE. SQLT
    is like a helpful assistant at a shopping mall:


    “I think you need the statistics department today, sir. Try floor two, just two
    doors along.”


    A Word About Platforms


    A platform, in IT jargon, is the hardware and operating system on which other
    applications reside. In the case of the Oracle product itself, it can be loaded
    onto many different platforms: Unix, Linux, OpenVMS, Solaris, Windows, and others.
    As far as SQL commands are concerned, the platform makes very little difference.
    A “select” is still a “select.” SQLT can be used on Unix (including Linux) and
    Windows. Other platforms will not allow the full functionality of SQLT. SQLHC,
    the health check script will run on as many platforms as Oracle runs on, as it
    relies only on Oracle.


    In this book almost all my examples are based on a Windows platform, but on a
    day-to-day basis I use SQLT on both Linux and Windows, and I have noticed no difference
    in behavior. I also regularly use SQLT on an Exadata platform and again everything
    works as you would expect. Every example shown in the book for Windows can just
    as easily work on Linux and vice versa. The interaction of SQLT with the operating
    system is usually only during the end phases of reports where files are being
    collected and being zipped up. In these phases commands such as `cp` (`copy` on
    Windows) and `ls` (`DIR` on windows) will generate messages indicating that those
    commands do not exist on the current platform. This is not a serious error, and
    the alternative command will have been issued for the appropriate platform.


    Other Resources


    This may be the final word in this book, but there are many other good resources
    available on SQLT. There are many Metalink notes: I haven’t counted them but there
    are many more than the ones listed here. Luckily many of these notes are linked
    to each other so these are good starting points:


    *   215187.1 – The main SQLT note where you can download SQLT

    *   1454160.1 – FAQ about SQLT

    *   1465741.1 – How to create test cases using SQLT with test data.

    *   1455583.1 – Gives you access to a SQLHC video

    *   1366133.1 – SQL Health Check Script


    There are even webcasts (look at Note 740964.1), which leads to the Oracle Webcast
    Program. Select “Oracle Database” and then browse the archived recordings. For
    SQLT here are some interesting topics for 2012:


    *   “Resolve – Troubleshooting Performance Issues Using SQLT & SQLHealthCheck”

    *   “Understanding SQLTXPLAIN Main Report by Navigating Through Some Samples”

    *   “What is SQLTXPLAIN tool and how do I use it?”

    *   “How to create in 5 minutes a SQL Tuning Test Case using SQLTXPLAIN”


    Blogs on SQL and SQLT can be found at:


    *   `www.carlos-sierra.net`

    *   `www.SteliosCharalambides.com`


    Summary


    The SQLTXPLAIN utility, one of the most useful free utilities available to Oracle
    customers, has evolved over many versions and many generations of the Oracle product.
    The latest version 11.4.5.6 (March 5, 2013) has come a long way, and there are
    many new features. It is still evolving and no doubt will continue to evolve,
    but at least for 2013 there will be a pseudo-freeze so this is a good time to
    get up to speed. SQLT is a deceptively complex utility with many features hidden
    away in innocuous-looking scripts. I hope I’ve cast some light on those features,
    so that maybe you’ll be inspired to look at other scripts I have not mentioned.
    Get the latest SQLT version from the MOS site: `http://support.oracle.com` .


    I hope you’ve enjoyed the journey, and I sincerely hope you use SQLT to learn
    more about your system and the SQL running on it. Remember, the key is to use
    SQLT regularly and investigate anything you don’t understand using reliable sources;
    soon, you will be tuning with the best of them.


