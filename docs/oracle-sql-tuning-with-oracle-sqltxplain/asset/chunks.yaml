- fmt: 'I dedicate this book to my beautiful family, who put up with my strange working
    hours and endless nights strapped to a laptop. The journey is nearly at an end.
    As always, Lesley is my core. Without her I would achieve nothing. Thank you for
    helping me to achieve this.


