    ## 10046 跟踪


    `10046` 本质上是 Oracle 引擎在处理您的 SQL 语句时的活动的低级日志记录工具。它生成一个称为“跟踪”文件的文件，该文件是一个文本文件，包含执行低级步骤的详细信息。根据选择的跟踪级别，可以将此跟踪配置为收集等待事件、绑定变量和绑定值（可选择的级别见下文）。收集此信息存在开销，它可能消耗大量磁盘空间，并在生成跟踪文件时占用正在执行语句的资源。


    ## 为什么收集 10046 跟踪？


    收集 `10046` 跟踪不是一项可以掉以轻心的活动。如上所述，它会消耗大量资源（尤其是磁盘空间）。考虑到收集 `10046` 跟踪的开销，您不会轻易选择收集此信息。除非有充分的理由，否则通常不会收集它。为了解决通过查看高层次聚合信息无法解决的性能调优问题，才会专门收集
    `10046` 跟踪。在这些更困难的情况下，需要一些低级别信息（这些信息在聚合中丢失了）作为我们正在解决的谜题的关键线索。这是因为它包含了 SQL 执行期间发生的非常详细的信息。


    `10046` 跟踪也可以通过其他方式启用跟踪来产生，例如在系统级别或跟踪另一个会话而不是您自己的会话。收集的信息是相同的，解码也是相同的；只是启动跟踪的方法会改变。在每种情况下，跟踪文件都是一个独立的文件，位于
    `user_dump_dest` 区域（对于 11g Release 1 及以上版本，由 `diagnostic_dest` 参数控制）。


