    \ to deal with the problem of complex predicates. This is more restrictive than\
    \ level 2\\. This level also applies to indexed and partitioned tables just like\
    \ level 2."
  trans: "\n从这里，如果我们点击\"执行计划\"，自然会进入报告显示当前 SQL 所有已知执行计划的部分。如果使用了动态采样，我们会在报告的\"计划信息\"\
    部分看到一条消息。有关使用了动态采样的报告示例，请参阅图 8-2。此图仅显示了页面的左侧部分。\n\n![9781430248095_Fig08-02.jpg](img/9781430248095_Fig08-02.jpg)\n\
    图 8-2。两个执行计划都使用了动态采样。\n\n## 什么是动态采样？\n\n那么动态采样被用到了，但它到底是什么呢？它是一种通过在编译过程*期间*收集统计信息来改进查询统计信息的方法。然而，不要因此就认为你可以忽略统计信息的收集。你不能。动态采样并非良好统计信息的替代品。它是避免生成糟糕执行计划的最后一道防线。用最简单的话来说，优化器经历的步骤如下所示：\n\
    \n1.  优化器开始解析查询。\n2.  在解析过程中，优化器会评估对象统计信息的状态。\n3.  如果优化器发现某些统计信息缺失，它可能会进行一些动态采样。采样量，甚至是否进行动态采样，将取决于`optimizer_dynamic_sampling`的值。\n\
    4.  如果不进行动态采样，则优化过程的其余部分继续进行，并在可用的地方使用统计信息。\n5.  如果要进行动态采样，采样量由`optimizer_dynamic_sampling`确定，并生成一个动态查询来收集信息。\n\
    6.  如果进行了动态采样，则收集到的统计信息将用于生成更好的执行计划。\n\n在图 8-2 中，我们看到使用了动态采样，但没有任何地方标明参数的值。这可以在报告的\
    \ CBO 环境部分看到。（请参阅下面的\"如何查找`optimizer_dynamic_sampling`的值\"部分。）请记住，这一切都*在*查询执行之前和解析过程中发生。\n\
    \n## 如何控制动态采样\n\n如前所述，动态采样由`optimizer_dynamic_sampling`的值控制。可以在系统级别或会话级别设置，或者通过在\
    \ SQL 中使用提示来设置。这些不同的选项允许对动态采样的行为进行非常精细的控制，并为不同的 SQL（使用提示）和不同的会话（例如登录触发器）设置不同的行为方式。以下是所有这些选项的示例。（我将值设为\
    \ 4。你可以设置 0 到 10 之间的任何值。）首先在会话级别设置。\n\n```sql\nSQL> alter session set optimizer_dynamic_sampling=4\
    \ ;\nSession altered.\n```\n\n如果你正在测试一些 SQL，希望快速看到不同值对执行计划的影响，而不影响其他人，你可能希望在会话级别设置该参数。你也可以在当前实例中设置该值而不使其永久生效。\n\
    \n```sql\nSQL> alter system set optimizer_dynamic_sampling=4 scope=memory;\nSystem\
    \ altered.\n```\n\n如果你在系统级别进行测试，并希望在永久更改之前确认这是系统的正确选择，你可能需要这样做。一旦你确定在系统级别设置此值是合适的，你可以按照如下所示进行设置。\n\
    \n```sql\nSQL> alter system set optimizer_dynamic_sampling=4 scope=spfile;\nSystem\
    \ altered.\n```\n\n在系统级别设置该值会修改`spfile`，以便在数据库下次启动时应用。如果你想进行更细粒度的更改，也许是针对单个 SQL，你可能需要使用提示。此参数的提示版本可以采用两种形式：游标级别和表级别版本。因此，例如，为游标设置：\n\
    \n```sql\nSQL> select /*+ dynamic_sampling (4) */ count(*) from dba_objects;\n\
    \  COUNT(*)\n```\n\n此提示有一个不同的形式，允许你为表设置采样级别。这变得非常具体：你可能会想，如果你知道这个特定对象的统计信息缺失，为什么你没有收集真实的统计信息呢？\n\
    \n```sql\nSQL> select /*+ dynamic_sampling (dba_objects 4) */ count(*) from dba_objects;\n\
    \  COUNT(*)\n```\n\n正如我前面提到的，采样量以及是否进行采样取决于动态采样参数的值。大多数系统将采用默认值 2。\n\n```sql\n\
    C:\\Documents and Settings\\Stelios>sqlplus / as sysdba\nSQL*Plus: Release 11.2.0.1.0\
    \ Production on Sat Oct 13 11:47:40 2012\nCopyright (c) 1982, 2010, Oracle.  All\
    \ rights reserved.\nConnected to:\nOracle Database 11g Enterprise Edition Release\
    \ 11.2.0.1.0 - Production\nWith the Partitioning, OLAP, Data Mining and Real Application\
    \ Testing options\nSQL> show parameter optimizer_dynamic_sampling\nNAME      \
    \                           TYPE        VALUE\n------------------------------------\
    \ ----------- ----------------------------\noptimizer_dynamic_sampling       \
    \    integer     2\n```\n\n如果设置了默认值并使用了动态采样，那么优化器将尝试对 64 个数据块进行采样，除非查询是并行的（请参阅下面的\"\
    动态采样与并行语句\"部分）。这不是表或索引大小的百分比，而是一个固定的块数。采样的行数取决于一个块中能容纳多少行。请记住，动态采样的目标是在查询执行前的*最后一刻*获取一些非常基本的统计信息。为了最小化这种开销，采样大小以块为单位设置为一个明确定义的值，该值不会随表行的大小而膨胀或收缩。动态采样这样设计是为了防止解析过程在大型表上消耗过多资源。如果动态采样过程发生（我们可以在\
    \ SQLTXPLAIN 报告中检查），收集到的样本可能有助于使执行计划比原本更好。该参数的值（如前所述）从 0 到 10 不等，并控制动态采样的操作。如果`optimizer_dynamic_sampling`被设置为\n\
    \n*   `0`: 在任何情况下都不使用动态采样。\n*   `1`: 如果至少有 1 个未分析、未索引、未分区的表，并且该表大于 32 个块，则对 32\
    \ 个块进行采样。这意味着如果表有索引或是分区表或小于 32 个块，则不会进行动态采样。\n*   `2`: 如果至少有一个表没有统计信息，无论它是否有索引，则对\
    \ 64 个块进行采样。分区表和索引表也包括在内。与级别 1 不同（其中一些表会被排除），此级别将应用于所有没有统计信息的表。\n*   `3`: 如果至少有一个表没有统计信息，并且`where`子句中使用了表达式，则对\
    \ 64 个块进行采样。这是试图解决`where`子句中表达式的问题，因为在那里制定正确的执行计划可能很棘手。这比级别 2 限制性更强。与级别 2 一样，这仍然适用于所有表。\n\
    *   `4`: 如果至少有一个表没有统计信息，并且在同一表的谓词上使用了`OR`或`AND`运算符，则对 64 个块进行采样。这是试图处理复杂谓词的问题。这比级别\
    \ 2 限制性更强。与级别 2 一样，此级别也适用于索引表和分区表。\n"
- fmt: "For values between 5 and 8 the rules are unchanged from the value for `optimizer_dynamic_sampling`\
    \ set to 4 but the sample sizes increase, doubling each time so that for 5 the\
    \ sample size is 128 blocks and for 8 the sample size is 1024. For level 9, the\
    \ sample size is 4086. For a value of 10 all blocks are sampled. As you can imagine,\
    \ setting this value can be a very big overhead. If we generate the 10053 trace\
    \ for a query against the `sales` table, we would type the following commands:\n\
    ```\nSQL> ALTER SESSION SET MAX_DUMP_FILE_SIZE = UNLIMITED;\nSQL> ALTER SESSION\
    \ SET TRACEFILE_IDENTIFIER = '10053_TRACE';\nSQL> ALTER SESSION SET EVENTS '10053\
    \ TRACE NAME CONTEXT FOREVER, LEVEL 1';\nSQL> select /*+ PARSE 5 */ count(*) from\
    \ sales;\nSQL> exit\n```\n\nHere I set the dump file size (the trace file) to\
    \ an unlimited size and appended a string to the automatically generated file\
    \ name so I can easily find the file by setting the `TRACEFILE_IDENTIFIER` value\
    \ to `10053_TRACE`. The generated name for the trace file will be made up from\
    \ the sid (in this case `snc1`), the string “ora”, a session number (5556 in this\
    \ case), and then my appended string. Your file name will be different, but if\
    \ you use a sensible `TRACEFILE_IDENTIFIER` value you should be able to find your\
    \ trace file easily. If you wanted to see the overhead, you could look in the\
    \ 10053 trace file for a query that was using dynamic sampling. If you search\
    \ the 10053 trace file, you’ll see a section similar to the one below. (I’ve removed\
    \ some of the text for clarity.)\n\nNow if we look in the `user_dump_dest` location,\
    \ we will find a file called `snc1_ora_5556_10053_TRACE.trc`. If we then search\
    \ this file for the string “dynamic sampling”, we’ll see the section below.\n\
    ```\n*** 2012-12-01 12:59:17.671\n** Performing dynamic sampling initial checks.\
    \ **\n** Dynamic sampling initial checks returning TRUE (level = 4).<<<Dynamic\
    \ sampling value\n*** 2012-12-01 12:59:18.078\n** Generated dynamic sampling query:\
    \ <<<A dynamic query is generated\n    query text :\nSELECT /* OPT_DYN_SAMP */\
    \ /*+ ALL_ROWS IGNORE_WHERE_CLAUSE NO_PARALLEL(SAMPLESUB) opt_param('parallel_execution_enabled',\
    \ 'false') NO_PARALLEL_INDEX(SAMPLESUB) NO_SQL_TUNE */ NVL(SUM(C1),0), NVL(SUM(C2),0)\
    \ FROM (SELECT /*+ NO_PARALLEL(\"SALES\") FULL(\"SALES\") NO_PARALLEL_INDEX(\"\
    SALES\") */ 1 AS C1, 1 AS C2 FROM \"SALES\" SAMPLE BLOCK (2.035048 , 1) SEED (1)\
    \ \"SALES\") SAMPLESUB\n\n*** 2012-12-01 12:59:18.093\n** Executed dynamic sampling\
    \ query:\n    level : 4\n    sample pct. : 2.035048 <<<2 percent of the table\
    \ was sampled\n    total partitions : 28 <<<There were 28 partitions in the table.\n\
    \      partitions for sampling : 28\n    actual sample size : 18860 <<<Sample\
    \ size used\n    filtered sample card. : 18860\n    orig. card. : 145484 <<<Original\
    \ estimate for cardinality\n    block cnt. table stat. : 1769\n    block cnt.\
    \ for sampling: 1769\n    max. sample block cnt. : 64\n    sample block cnt. :\
    \ 36\n    min. sel. est. : -1.00000000\n** Using dynamic sampling card. : 926759\
    \ <<<New estimated cardinality\n** Dynamic sampling updated table card.\n```\n\
    \nLet me step through what happens in this 10053 trace file. First we see that\
    \ `optimizer_dynamic_sampling` is detected at level 4. Then a dynamic sampling\
    \ query is generated. The query text is shown. There are a number of interesting\
    \ options used for the hints in this query\n\n*   `/* OPT_DYN_SAMP */` - This\
    \ is not a hint it is just a comment\n*   `/*+ ALL_ROWS` – The `ALL_ROWS` hint,\
    \ a standard hint\n*   `IGNORE_WHERE_CLAUSE` – This ignores any `WHERE` clauses\n\
    *   `NO_PARALLEL(SAMPLESUB)` – No parallel execution, the overhead from this dynamic\
    \ query must not be allowed to take too many resources\n*   `opt_param('parallel_execution_enabled','false')`\
    \ – No parallel execution\n*   `NO_PARALLEL_INDEX` – No parallel Index plans\n\
    *   `NO_SQL_TUNE */ - Undocumented hint`\n\nThen the dynamic sampling query is\
    \ executed and from the value 4 of the parameter we were able to sample approximately\
    \ 2 percent of the rows. You can see in the query that the blocks sampled are\
    \ randomized (`SEED (1)`) and that we are using the `SAMPLE` clause, which samples\
    \ blocks from a table. So did the dynamic sampling query do any good? The original\
    \ estimate for the cardinality was 145,484. After the dynamic sampling query is\
    \ executed the new estimate is 926,759. This is much closer to the actual value\
    \ of 918,843. The value of the controlling parameter is pretty important; so next\
    \ we’ll see how to find out its value.\n\n## How to Find the Value of `optimizer_dynamic_sampling`\n\
    \nWe can see the actual value used for `optimizer_dynamic_sampling` by looking\
    \ at the “CBO Environment” section of the SQLT report. The hyperlink is shown\
    \ in [Figure 8-3](#9781430248095_Ch08.xhtml#Fig3) below.\n\n![9781430248095_Fig08-03.jpg](Images/9781430248095_Fig08-03.jpg)\n\
    \n[Figure 8-3](#9781430248095_Ch08.xhtml#_Fig3). The hyperlink that takes you\
    \ to the non-default CBO parameters\n\nOnce we’ve clicked on this we see the “CBO\
    \ Environment” part of the report, which shows, amongst other things, the value\
    \ of `optimizer_dynamic_sampling`. See [Figure 8-4](#9781430248095_Ch08.xhtml#Fig4).\n\
    \n![9781430248095_Fig08-04.jpg](Images/9781430248095_Fig08-04.jpg)\n\n[Figure\
    \ 8-4](#9781430248095_Ch08.xhtml#_Fig4). The value of `optimizer_dynamic_sampling`\
    \ set to the non-default value of 5\n\n[Figure 8-4](#9781430248095_Ch08.xhtml#Fig4)\
    \ also shows us that the value `optimizer_dynamic_sampling` was changed by an\
    \ `ALTER SYSTEM` statement. We can see this because under the “Is Modified” column\
    \ we see `SYSTEM_MOD`. We can also find out what the value is by looking at the\
    \ 10053 trace of a SQL statement (as we did above) or we can show the value:\n\
    ```\nSQL> show parameter optimizer_dynamic_sampling\n\nNAME                  \
    \               TYPE        VALUE\n------------------------------------ -----------\
    \ --------------\noptimizer_dynamic_sampling           integer     4\n```\n\n\
    ## Dynamic Sampling and Parallel Statements\n\nThe rules for deciding if dynamic\
    \ sampling should be used for parallel execution plans are slightly different\
    \ than for serially executed statements. Parallel statements are already expected\
    \ to be resource intensive so the small overhead in dynamic sampling is worth\
    \ it to ensure a good execution plan. The logic is that if the value is set to\
    \ the default (`optimizer_dynamic_sampling=2`) then the 64 block sample size is\
    \ ignored and the actual sample size is determined by looking at the table sizes\
    \ and the predicate complexity. If there is a non-default value then the rules\
    \ are applied as for serially executing statements.\n\n## What Dynamic Sampling\
    \ Value Should I Set?\n\nThe general rule of thumb for dynamic sampling is that\
    \ first of all you should not rely on this feature. Remember dynamic sampling\
    \ is there to catch potential problems in the optimization process caused by missing\
    \ statistics. If your query is not performing as expected, dynamic sampling should\
    \ not be your first port of call. You should get a `SQLTXPLAIN` report and look\
    \ at that first. For parallel statements, especially if you have complex predicates\
    \ and at least one table with missing statistics, you may well end up using dynamic\
    \ sampling.\n\nIf you see dynamic sampling being used (as shown earlier in [Figure\
    \ 8-2](#9781430248095_Ch08.xhtml#Fig2)) then you should check to see why it was\
    \ used and what you can do to avoid using it. If you have statistics on a table\
    \ and still see dynamic sampling, then one possibility is that you have complex\
    \ predicates and have not used extended statistics (mentioned in [Chapter 3](../Text/9781430248095_Ch03.xhtml))."
