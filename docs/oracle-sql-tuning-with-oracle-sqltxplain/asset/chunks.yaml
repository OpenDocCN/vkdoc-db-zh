    \              30 File(s)        498,251 bytes\n               5 Dir(s)   7,103,299,584\
    \ bytes free\n```\n\nHow Do We Use roxtract?\n\nAs we saw above `roxtract.sql`\
    \ can be found in the `utl` directory of the `SQLT` unzipped area. You still need\
    \ this procedure to be present on the target system, but you do not need the SQLTXPLAIN\
    \ schema, in fact in the case of `roxtract.sql` you run the script as SYS. This\
    \ is the target SQL in this case:\n\n```\nSQL>\n\nselect /*+ GATHER_PLAN_STATISTICS\
    \ MONITOR*/\n  cust_first_name,\n  amount_sold\nfrom\n  customers C,\n  sales\
    \ S\nwhere\n  c.cust_id=s.cust_id\n  and amount_sold > 1750\n```\n\nNow we get\
    \ the SQL ID:\n\n```\nSQL> select sql_id from v$sqlarea where sql_text like 'select\
    \ /*+ GATHER_PLAN_STATISTICS%';\nSQL_ID\n\ndck1xz983xa8c\n```\n\nNow that we have\
    \ the SQL ID we can run the `roxtract` script from the SYS account. Notice that\
    \ we have to enter the SQL ID the licensing level and if we want to select 10053\
    \ information. Notice there is no prompt for the SQLTXPLAIN schema password, because\
    \ we do not use it.\n\n```\nSQL>@roxtract\nParameter 1:\nOracle Pack License (Tuning,\
