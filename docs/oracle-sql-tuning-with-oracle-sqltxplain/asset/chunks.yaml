    `='Denmark' OR `\"COUNTRY_NAME\"`='France' OR `\"COUNTRY_NAME\"`='Germany' OR\n\
    \              `\"COUNTRY_NAME\"`='Ireland' OR `\"COUNTRY_NAME\"`='Italy' OR `\"\
    COUNTRY_NAME\"`='Poland' OR `\"COUNTRY_NAME\"`='Spain' OR\n              `\"COUNTRY_NAME\"\
    `='The Netherlands' OR `\"COUNTRY_NAME\"`='United Kingdom'))\n\n正如预期的那样，索引 `sales_cust_bix`\
    \ 不再被使用。我们现在看到一个不同的执行计划，看起来稍微好一些（成本为 3347，而之前的成本是 3793）。最后，我们移除了提示，并决定需要一台性能两倍于当前的机器才能获得更好的响应时间。\n\
    \n## 设置系统统计信息\n\n作为设置系统统计信息能力的示例，我将对我的测试设备执行这些步骤。如果你想对你的临时测试环境做类似的事情，使其与另一个环境相似，你可以获取系统统计信息并手动设置它们，就像我在这个示例中将要做的那样。从上面的示例中，我们目前的最佳成本是\
    \ 947。我们还知道我们的源机器（我的旧笔记本电脑）的 CPU 速度为 1683 MHz，I/O 寻道时间为 10ms，I/O 传输速度为 4096。在这个示例中，我将把\
    \ CPU 速度设置为当前值的 10 倍：\n\n```sql\nEXEC DBMS_STATS.SET_SYSTEM_STATS('CPUSPEEDNW',\
    \ 16830.00);\n```\n\n然后，当我们下一次运行测试用例（在刷新共享池之后）时，我们得到这个执行计划：\n\n```\n|Id  |Operation\
    \              |Name     | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop\
    \ |\n|  0 |SELECT STATEMENT       |         |       |       |   897 (100)|   \
    \       |       |       |\n|  1 | SORT ORDER BY         |         |     9 |  \
    \ 315 |   897   (2)| 00:00:11 |       |       |\n|  2 |  HASH GROUP BY       \
    \ |         |     9 |   315 |   897   (2)| 00:00:11 |       |       |\n|* 3 |\
    \   HASH JOIN           |         |   435K|    14M|   891   (1)| 00:00:11 |  \
    \     |       |\n|* 4 |    HASH JOIN          |         | 26289 |   641K|   408\
    \   (1)| 00:00:05 |       |       |\n|* 5 |     TABLE ACCESS FULL |COUNTRIES|\
    \     9 |   135 |     3   (0)| 00:00:01 |       |       |\n|  6 |     TABLE ACCESS\
    \ FULL |CUSTOMERS| 55500 |   541K|   404   (0)| 00:00:05 |       |       |\n|\
    \  7 |    PARTITION RANGE ALL|         |   918K|  8973K|   482   (1)| 00:00:06\
    \ |     1 |    28 |\n|  8 |     TABLE ACCESS FULL |SALES    |   918K|  8973K|\
    \   482   (1)| 00:00:06 |     1 |    28 |\n```\n\n请注意，在这种情况下，执行计划并未改变；然而，我们确实看到响应时间从\
    \ 12 秒略微减少到了 11 秒，并且成本也略有降低。查询的大部分成本在于 I/O，而 CPU 对执行时间并非至关重要。由此我们可以得出结论，如果我们想要一台更大更好的笔记本电脑，一个更重要的参数是关注磁盘的传输速度而不是\
    \ CPU 的速度（当然，就这个查询而言）。在你的测试环境中尝试此类设置可以让你发现对于改进你的环境性能什么是重要的，并通过让你专注于重要的方面而忽略不那么重要的方面来节省时间。\n\
    \n## 对象统计信息\n\n你也可以为查询中的所有对象设置对象统计信息，但这是一项棘手的操作，不建议用于此类探索。查看 10053 跟踪文件以了解成本为何如此，比更改成本然后观察结果要好。\n\
    \n## 调试优化器\n\n创建和使用测试用例主要是你期望 Oracle 支持人员为你做的事情。他们将获取你提供的测试用例文件并进行充分的探索，以便能够解决你的问题。你也可以使用测试用例文件（如我上面所述）在一个没有其他人使用的独立测试环境中进行一些测试。测试用例例程主要用于探索优化器的行为。测试用例文件中的一切都是为了让优化器认为它是在原始源系统上。如果存在一个导致优化器以不恰当的方式改变其执行计划的错误，那么\
    \ Oracle 支持人员将使用测试用例，可能结合你的数据，来确定是存在真正的错误，还是某种并非错误的意外行为。有时在极少数情况下，某些特定的执行计划可能导致错误暴露，在这种情况下，有时你可以通过设置一些优化器环境因素来避免错误。\n\
    \n## 其他测试用例工具\n\n好像能够在独立测试环境中探索你的 SQL 还不够，SQLT 还提供了进一步的工具来理解任何特定 SQL 中发生的情况。有时你想做的不仅仅是更改环境设置并重试查询。就像一把可靠的瑞士军刀，SQLT\
    \ 几乎为每项工作都准备了工具。\n\n## sel.sql 是做什么的？\n\n`Sel` 是一个很好的小工具，如果它还没有被写出来，你可能会自己写一个。以下是\
    \ `sel.sql` 的代码：\n\n```sql\nREM 使用 CBO 计算谓词选择性。需要 sel_aux.sql。\nSPO sel.log;\n\
    SET ECHO OFF FEED OFF SHOW OFF VER OFF;\nPRO\nCOL table_rows NEW_V table_rows\
    \ FOR 999999999999;\nCOL selectivity FOR 0.000000000000 HEA \"Selectivity\";\n\
    COL e_rows NEW_V e_rows FOR 999999999999 NOPRINT;\nACC table PROMPT 'Table Name:\
    \ ';\nSELECT num_rows table_rows FROM user_tables WHERE table_name = UPPER(TRIM('&&table.'));\n\
    @@sel_aux.sql\n```"
- fmt: "This routine prompts for the table to be accessed after setting up the column\
    \ formats and then calls `sel_aux.sql`:\n\n```\nREM Computes predicate selectivity\
    \ using CBO. Requires sel.sql.\nPRO\nACC predicate PROMPT 'Predicate for &&table.:\
    \ ';\nDELETE plan_table;\nEXPLAIN PLAN FOR SELECT /*+ FULL(t) */ COUNT(*) FROM\
    \ &&table. t WHERE &&predicate.;\nSELECT MAX(cardinality) e_rows FROM plan_table;\n\
    SELECT &&e_rows. \"Comp Card\", ROUND(&&e_rows./&&table_rows., 12) selectivity\
    \ FROM DUAL;\n@@sel_aux.sql\n```\n\n`sel_aux.sql` uses `explain plan` to determine\
    \ the cardinality and selectivity by selecting this information from the `plan_table`\
    \ populated by `explain plan`. It displays the computed cardinality and selectivity\
    \ for any particular predicate and table in the test case. At the end of the routine\
    \ `sel_aux` is called again to give a chance to select a different value for a\
    \ predicate or a different predicate entirely. So if you were looking at problems\
    \ regarding a particular value you might want to test cardinality by using `sel.sql`.\
    \ In the example below I choose the `SALES` table to investigate, and I’m interested\
    \ in the cardinality of a query against `SALES` where the `CUST_ID` is `100` and\
    \ `200`.\n\n```\nSQL> @sel\n\nTable Name: sales\n\nTABLE_ROWS\n\nPredicate for\
    \ sales: cust_id=100\n\nComp Card     Selectivity\n---------- ---------------\n\
    \       130  0.000141482277\n\nPredicate for sales: cust_id=200\n\nComp Card \
    \    Selectivity\n---------- ---------------\n       130  0.000141482277\n\nPredicate\
    \ for sales: cust_id between 100 and 300\n\nComp Card     Selectivity\n----------\
    \ ---------------\n      2080  0.002263716435\n\nPredicate for sales:\n```\n\n\
    I can see that the statistics estimate that the cardinality for `SALES` for `CUST_ID`\
    \ is `130`. The same value is seen for `cust_id=200`. Since I also have the data\
    \ on this system I can see what the actual values are.\n\n```\nSQL> select count(*)\
    \ From sh.sales where cust_id=100;\n\nCOUNT(*)\n\nSQL> select count(*) From sh.sales\
    \ where cust_id=200;\n\nCOUNT(*)\n\nSQL> select count(*) From sh.sales where cust_id\
    \ between 100 and 300;\n\nCOUNT(*)\n```\n\nNotice that each of the estimates is\
    \ wrong. The estimates are so far off that using the `BETWEEN` clause gives me\
    \ an estimate of `2,080`, whereas the actual value is `18,091`. We can see from\
    \ this that the statistics on the objects need to be improved. Perhaps a histogram\
    \ on the `CUST_ID` column would help here.\n\n### What Does `sqlt_snnnnn_del_hgrm.sql`\
    \ Do?\n\nOften histograms can cause a problem, if they are not properly sampled\
    \ or are inappropriately used. In such cases, with the test case utility you can\
    \ try deleting the histograms to see what the effect on the execution plan is.\
    \ In this example we delete all the histograms registered against the test schema.\n\
