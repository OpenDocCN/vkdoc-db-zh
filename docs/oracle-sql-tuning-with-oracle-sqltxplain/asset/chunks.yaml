    \ Kingdom',\n'Germany','France','Spain','The Netherlands','Italy')   group by\n\
    country_name order by sum(AMOUNT_SOLD)\n\nPlan hash value: 1235134607\n\n| Id\
    \  | Operation                       | Name         | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n\n|   0 | SELECT STATEMENT                |              |     \
    \  |       |     4 (100)|          |\n|   1 |  SORT ORDER BY                 \
    \ |              |     1 |    87 |     4  (50)| 00:00:01 |   |   2 |   HASH GROUP\
    \ BY                 |              |     1 |    87 |     4  (50)| 00:00:01 |\n\
    |   3 |    NESTED LOOPS                 |              |     1 |    87 |     2\
    \   (0)| 00:00:01 |\n|   4 |     NESTED LOOPS                |              |\
    \     1 |    52 |     2   (0)| 00:00:01 |  |   5 |      PARTITION RANGE ALL  \
    \      |              |     1 |    26 |     2   (0)| 00:00:01 |     |   6 |  \
    \     TABLE ACCESS FULL         | SALES        |     1 |    26 |     2   (0)|\
    \ 00:00:01 |     |   7 |      TABLE ACCESS BY INDEX ROWID| CUSTOMERS    |    \
    \ 1 |    26 |     0   (0)|          |\n|*  8 |       INDEX UNIQUE SCAN       \
    \  | CUSTOMERS_PK |     1 |       |     0   (0)|          |\n|*  9 |     TABLE\
    \ ACCESS BY INDEX ROWID | COUNTRIES    |     1 |    35 |     0   (0)|        \
    \  |\n|* 10 |      INDEX UNIQUE SCAN          | COUNTRIES_PK |     1 |       |\
    \     0   (0)|          |\n\nPredicate Information (identified by operation id):\n\
    \n8 - access(\"S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n   9 - filter((\"COUNTRY_NAME\"\
