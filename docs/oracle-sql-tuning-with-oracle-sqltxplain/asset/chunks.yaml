    PL/SQL procedure successfully completed.

    ... please wait

    TABLESPACE


    TEMP

    Specify TEMPORARY tablespace to be used by SQLTXPLAIN.

    Tablespace name is case sensitive.

    Temporary tablespace [UNKNOWN]: TEMP

    PL/SQL procedure successfully completed.

    ```


    The next section is the part of the installation that most often causes confusion.
    The “main application user of SQLT” is the schema name of the user that actually
    executes the SQL to be analyzed. This is not SQLTXPLAIN. Throughout most of this
    book my example schema is called STELIOS, so I enter **STELIOS** here. If for
    some reason you want to change this or add another schema you only need to grant
    the SQLT_USER_ROLE role to the user in question. This would be done with `grant
    SQLT_USER_ROLE to <username>;`. Normally this username should be connectable from
    the SQL*Plus prompt so that you can run the SQLT methods.


    ![image](Images/sq.jpg) **Note**  In some systems SQL is executed via a remote
    connection from another system (for example through JDBC connections), and the
    account used for these connections cannot be locally connected through SQL*Plus
    due to security restrictions. In these cases  the next best next option is to
    create a schema or use another schema that can execute the SQL and that has access
    to the same data and objects as the target schema. Be wary in this case that you
    are not creating a different environment that does not show your problem.


    ```

    The main application user of SQLT is the schema

    owner that issued the SQL to be analyzed.

    For example, on an EBS application you would

    enter APPS.

    You will not be asked to enter its password.

    To add more SQLT users after this installation

    is completed simply grant them the SQLT_USER_ROLE

    role.

