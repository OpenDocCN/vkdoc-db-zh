  trans: '

    假设你被告知某个分区中只有很少的几行（`<1,000` 行）。你很可能会进行全表扫描而不使用索引，但如果你的统计信息已过时，并且在上次运行统计信息之后加载了大量数据（比如
    250 万行），并且所有这些数据都匹配你的谓词条件，那么你的执行计划就会是**次优的**。这是调优术语中对“性能回退”的说法，而“性能回退”在调优术语中也就是“对你的经理来说太慢了”。这突显了在正确时间收集统计信息的重要性；是在数据加载**之后**，而不是之前。


    到目前为止，我们已经提到了表统计信息，以及这些统计信息需要具备正确的质量和及时性。多年来，随着数据集变得越来越大，表也变得越来越大。一些单独的表变得非常大（达到
    TB 级别）。这使得处理这些表变得更加困难，纯粹是因为对这些表的操作耗时更长。Oracle 公司很早就看到了这一趋势，并引入了表分区。这些迷你表将大表按不同的键拆分成更小的部分。一个常见的键是日期。因此，一个表的一个分区可能覆盖
    2012 年。这限制了这些分区的大小，并允许对各个分区单独执行操作。这是一项伟大的创新（需要相应的许可费用），它简化了 DBA 的许多日常工作，并为 SQL
    优化提供了极佳的优化器机会。例如，如果一个分区是按日期分区的，并且你在谓词中使用了日期，那么你可能能够使用**分区修剪**，即只查看匹配的分区。拥有此特性，一方面为响应时间的改善带来了巨大机会，另一方面也加大了你犯错的可能性。就像表一样，分区也需要为其收集良好的统计信息才能有效工作。


    ## 分区


    分区是处理大型数据集的好方法，特别是那些不断增长的数据集。使用范围分区，或者更好的是，使用间隔分区。这些工具允许将“旧”数据和“新”数据分开并区别对待，例如归档旧数据或对其进行压缩。无论出于何种原因，许多机构都使用分区来组织其数据。特别是基于日期的分区，在分区刚创建后，通常会创建一个包含零行或极少数行的新分区（有关这种情况的示例，请参见
    图 3-2）。新的分区 `MAIN_TABE_201202` 有零行（它刚刚被创建），但其他分区有数百万行。


    ![9781430248095_Fig03-02.jpg](img/9781430248095_Fig03-02.jpg)


    图 3-2 . 一个新创建的分区将具有与旧分区不同的特征。在本例中，`MAIN_TABLE_201202` 中的行数为零


    对于刚刚完成的分区，任何新添加的数据都不会导致实际数据与统计信息之间发生巨大变化，但对于新创建的分区，优化器目前认为该分区有零行。如果就在收集统计信息几小时后，现在有
    10,000 行数据，这将如何影响执行计划？这种分区的“初始化”可能对执行计划产生巨大影响，那种影响会随着时间推移而出现和消失。例如，在月初表现很差，然后逐渐变好。


    这类情况需要仔细把握统计信息收集的时机和良好的采样比例。在新分区创建后的一段时间内，可能有些时期需要采用更高的分区采样收集百分比，以便收集该时间段内任何异常偏斜的数据。意识到正在发生（或可能发生）什么，就已经成功了一半。如果数据加载后不久进行更多的统计信息收集不是一种可行的选择，那么你可能不得不求助于
    SQL 概要文件，甚至提示。


    ## 过时的统计信息


    从 SQLT 的角度来看，如果表中超过 10% 的数据发生了变化，那么该统计信息会在“过时统计信息”列中被标记为“YES”。在下面的示例中（图 3-3），你可以看到一个具有过时统计信息的索引。


    ![9781430248095_Fig03-03.jpg](img/9781430248095_Fig03-03.jpg)


    图 3-3 . 在此示例中显示了一个索引行，其“过时统计信息”列为“YES”，表示该索引的统计信息已过时


    你应该如何处理这些信息？这取决于具体情况。有时过时的统计信息不是问题；即使表的变化超过了 10%，数据在统计意义上可能仍然相同。10% 是一个相当随意的数字，在某些情况下，你可能会觉得它太低或太高。如果是这样，你总是可以更改它：


    `SQL> exec dbms_stats.set_table_prefs(null,''USER2'',''STALE_PERCENT'',5)`


    话虽如此，如果你在特定表或索引的“过时统计信息”列中看到“YES”，你应该怎么做？简单的答案（再次）是“视情况而定”。这就像一个谋杀悬疑故事。如果你已经怀疑是管家干的，然后你看到他口袋里有一把枪，那可能就是一个很好的线索。


    这里的关键点是，该列将是一个线索，表明某些地方出了问题，并且可能在你当前的调查中具有重要意义。例如，假设你有一个表，每天创建并加载一个间隔分区。除非你在新分区加载数据后每天都运行统计信息收集，否则它的统计信息将被标记为“过时”。关键是要认识到，统计信息收集是
    Oracle 提供的一个工具，你可以以多种不同的方式使用它。这种控制必须基于你对架构、数据模型以及你预期在数据库上运行的查询的了解。


    ## 采样大小


    这是统计信息收集最受热议的要点之一。许多站点依赖于 `DBMS_STATS.AUTO_SAMPLE_SIZE`，对于某些情况（如果不是大多数情况）来说，这是一个不错的选择，但它并不完美。它只是一个良好的起点。如果你的查询没有问题，并且统计信息收集在合理的时间内运行，那就保持默认设置，去做些更有用的事情吧。


    如果你努力收集所需的统计信息级别以使你的在线日常高效运行，你可能需要仔细查看你正在收集的统计信息。如果 100% 采样不可行，那么计算一下你实际有多少时间，并尝试达到那个百分比。审视你收集的内容，看看是否全部需要。如果你在收集模式统计信息，那么问问自己：模式中的所有表都在使用吗？你是否在没有偏斜度的列上收集统计信息？在这种情况下，你是在浪费资源收集那些对优化器无关紧要的信息。理所当然地，更改统计信息收集采样大小应谨慎进行，逐步调整，并留出足够的时间来评估效果。这正是测试系统的用途。


    你可以通过从 SQLT 报告中单击 `DBMS_STATS` 设置超链接，查看你在系统上设置的内容（图 3-4）。


    ![9781430248095_Fig03-04.jpg](img/9781430248095_Fig03-04.jpg)


    图 3-4 . 检查你的 `DBMS_STATS` 首选项设置总是好的。在此示例中，所有设置均为默认值


    在这里你可以看到 `DBMS_STATS` 的首选项。所有设置都是 `AUTO`。采样大小是 `DBMS_STATS.AUTO_SAMPLE_SIZE`；级联设置是
    `DBMS_STATS.AUTO_CASCADE`；方法选项设置为 `FOR ALL COLUMNS SIZE AUTO`。

