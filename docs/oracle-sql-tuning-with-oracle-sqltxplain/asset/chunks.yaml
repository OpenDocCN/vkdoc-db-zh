  trans: "\n# 了解 SQL 配置文件\n\n至此，我们已了解什么是 SQL 配置文件及其对优化器的呈现形式。我们也明白，对一个 SQL 语句保持不变的配置文件可能并非良策。话虽如此，我们仍清楚地认识到，使生产数据库恢复运行状态可能是成败的关键。因此，在所有这些前提和限制条件下，让我们探究一下\
    \ SQLT 是从何处获取其 SQL 配置文件的。\n\n## SQLT 从何处获取其 SQL 配置文件？\n\n获取为你创建 SQL 配置文件的脚本很简单。SQLT\
    \ 可从 `XTRACT` 方法和 `XECUTE` 方法生成所需的脚本。我们在 `第 1 章` 中看到了如何生成 `XTRACT` 报告，并在 `第 3\
    \ 章` 中介绍了 `XECUTE`。请记下报告的 SQLT ID（而非 SQL ID）以及你想要的执行计划哈希值。参见下图 `图 6-1`。它显示了 SQLT\
    \ ID，即标题“Report: `sqlt_s89915_main.html`”中的数字。在本例中，SQLT ID 为 `89915`。\n\n![9781430248095_Fig06-01.jpg](img/9781430248095_Fig06-01.jpg)\n\
    \n`图 6-1` .  标题页显示了生成配置文件所需的 SQLT ID\n\n执行计划哈希值 (`PHV`) 可从报告的“执行计划”部分获取。 参见 `图\
    \ 6-2`，该部分显示了可用的执行计划哈希值。\n\n![9781430248095_Fig06-02.jpg](img/9781430248095_Fig06-02.jpg)\n\
    \n`图 6-2` .  可用的执行计划及其执行计划哈希值 (`PHV`)\n\n现在我们同时拥有了 SQLT ID 和 `PHV`。在 SQLT 安装目录下的\
    \ `utl` 目录中，我们现在可以运行生成配置文件的脚本，如下例所示。但在生产系统上执行此操作之前，应咨询 Oracle 支持，确保你的步骤是经过验证且受支持的操作。只需提交一个服务请求，负责调优支持的友好人员会非常乐意帮助你。以下是显示\
    \ `utl` 目录中文件的目录列表。从该目录中，我们首先启用配置文件创建，然后运行生成配置文件的例程，确保传入 SQLT ID 和 `PHV`。我展示了脚本的输出，最后展示了新创建的文件。就这么简单。\n\
