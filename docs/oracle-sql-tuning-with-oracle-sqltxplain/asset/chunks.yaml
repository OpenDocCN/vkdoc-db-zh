    \n[Figure 2-14](#9781430248095_Ch02.xhtml#_Fig14) .  正在研究的执行计划\n\n查看该计划，您可以确认开发者关于“奇怪”的执行计划和奇怪的位图索引的说法。实际上，这个计划本身并无奇怪之处。只是第一步是：\n\
    \n```\n... BITMAP INDEX FULL SCAN PRODUCTS_PROD_STATUS_BIX\n```\n\n这一步不在开发者最初的计划中。因此开发者认为它很奇怪。对于我们正在处理的这一个SQL语句，我们怀疑至少存在2个执行计划（一个SQL语句可以有数十个执行计划，而SQLT会捕获所有这些计划）。\n\
    \n在执行计划列表的下方，我们看到确实有使用哈希连接和全表扫描的计划。请参见[Figure 2-15](#9781430248095_Ch02.xhtml#Fig15)，它显示了开发者正在处理的同一个SQL的不同执行计划。在此执行计划中，返回的行与之前的执行计划相同，总成本为908。\n\
    \n![9781430248095_Fig02-15.jpg](Images/9781430248095_Fig02-15.jpg)\n\n[Figure\
