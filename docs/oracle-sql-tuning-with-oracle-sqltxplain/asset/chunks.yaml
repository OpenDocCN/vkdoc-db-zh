    07/09/2011  07:01 PM               325 drop_sys_views.sql\n08/11/2011  12:46 AM\
    \               499 drop_user_objects.sql\n08/11/2011  12:46 AM              \
    \ 537 install.sql\n12/13/2012  08:53 PM               452 q.sql\n08/11/2011  12:46\
    \ AM             2,622 readme.txt\n07/09/2011  07:01 PM             3,972 sys_views.sql\n\
    08/11/2011  12:46 AM               184 uninstall.sql\n08/11/2011  12:46 AM   \
    \          6,844 user_objects.sql\n04/02/2012  10:43 AM            58,807 xplore.pkb\n\
    10/11/2011  06:29 AM             2,843 xplore.pks\n12/22/2012  12:28 PM      \
    \   3,839,878 xplore_1.zip\n12/22/2012  09:45 AM           301,600 xplore_script_1.sql\n\
    12/22/2012  09:31 AM             3,239 xplore_script_2.log\n12/22/2012  09:29\
    \ AM           301,600 xplore_script_2.sql\n12/22/2012  09:33 AM             2,341\
    \ xplore_script_3.log\n12/22/2012  09:32 AM           301,600 xplore_script_3.sql\n\
    \              17 File(s)      4,829,039 bytes\n               2 Dir(s)   6,701,252,608\
    \ bytes free\n```\n\nTo use this report it is best to create a sub-directory and\
    \ unzip the files in `xplore_1.zip`. In the zip file is an HTML file (the main\
    \ report), a log file of the run, and the `xplore` script that was run. The only\
    \ file of interest to us now is the HTML file. If we open this file with a browser\
    \ we see it is much less fussy than a normal XECUTE or XTRACT report. It starts\
    \ with a simple title “XPLORE Report for baseline:1 runid:1”, and we are straight\
    \ into endless numbers. This “Plans Summary” part of the report shows all the\
    \ discovered plans for our one SQL. Let’s look at [Figure 12-2](#9781430248095_Ch12.xhtml#Fig2),\
    \ which shows this part of the report. This is the jumping off point to all the\
    \ other parts of the report.\n\n![9781430248095_Fig12-02.jpg](Images/9781430248095_Fig12-02.jpg)\n\
    \n[Figure 12-2](#9781430248095_Ch12.xhtml#_Fig2) .  The top part of the XPLORE\
    \ report\n\nThere were only 5 different plans in this case (it was a very simple\
    \ piece of SQL). For example, PHV 922729823 only had one test so it is not surprising\
    \ that the maximum and minimum cost was the same at 5046\\. The original plan\
    \ had a cost of 947, so this option clearly is not a good one. If we look at what\
    \ that test was we’ll be able to see why it didn’t turn out so well. Scroll to\
    \ the section show in [Figure 12-3](#9781430248095_Ch12.xhtml#Fig3), which shows\
    \ the “Discovered Plans,” just below the “Plans Summary.” Here I want to know\
    \ why my original cost of 947 increased to 5,046\\. The arrow is pointing to the\
    \ hyperlink that takes me to a different section of the same report, which details\
    \ what happened on this test. See [Figure 12-3](#9781430248095_Ch12.xhtml#Fig3),\
    \ which shows the “Discovered Plans” section of the report.\n\n![9781430248095_Fig12-03.jpg](Images/9781430248095_Fig12-03.jpg)\n\
    \n[Figure 12-3](#9781430248095_Ch12.xhtml#_Fig3) .  You can get to the test details\
    \ by clicking on the hyperlink under the “Total Tests” column\n\nOnce we click\
    \ on this hyperlink we are taken to section of the report showing what was done\
    \ and what happened. [Figure 12-4](#9781430248095_Ch12.xhtml#Fig4) shows the details\
    \ for this particular plan hash value.\n\n![9781430248095_Fig12-04.jpg](Images/9781430248095_Fig12-04.jpg)\n\
    \n[Figure 12-4](#9781430248095_Ch12.xhtml#_Fig4) .  The details for the PHV 922729823\n\
    \nWe can see that the test for this PHV was to set `\"_hash_join_enabled\"=FALSE`\
    \ if we look at the original execution plan from the XTRACT report for this SQL\
    \ (see [Figure 12-5](#9781430248095_Ch12.xhtml#Fig5))\n\n![9781430248095_Fig12-05.jpg](Images/9781430248095_Fig12-05.jpg)\n\
    \n[Figure 12-5](#9781430248095_Ch12.xhtml#_Fig5) .  The original execution plan\
    \ as shown in the XTRACT report for the SQL\n\nThe original plan was to use “TABLE\
    \ ACCESS FULL” for COUNTRIES and CUSTOMERS and then use a hash join,followed by\
    \ another hash join of that with the result of the “TABLE ACCESS FULL” of SALES.\
    \ The main thrust of this plan is to use hash joins. Now our XPLORE has disabled\
    \ this option by setting the hidden parameter, not too surprising the plan has\
    \ become more costly. If we click on the number under the “Test Id” column (as\
    \ shown in [Figure 12-4](#9781430248095_Ch12.xhtml#Fig4)) we will see which plan\
    \ was actually chosen. This is the plan we see.\n\n```\n\n|Id |Operation     \
    \                   |Name         | Cost (%CPU)| Buffers |  1Mem |  O/1/M   |\n\
    \n|  0|SELECT STATEMENT                 |             |  5046 (100)|    3179 |\
    \       |          |\n|  1| SORT ORDER BY                   |             |  5046\
    \   (3)|    3179 |  2048 |     1/0/0|\n|  2|  HASH GROUP BY                  |\
    \             |  5046   (3)|    3179 |   770K|     1/0/0|\n|  3|   MERGE JOIN\
    \                    |             |  5008   (2)|    3179 |       |          |\n\
    |  4|    SORT JOIN                    |             |   825   (1)|    1461 | \
    \  546K|     1/0/0|\n|  5|     MERGE JOIN                  |             |   632\
    \   (1)|    1461 |       |          |\n|* 6|      TABLE ACCESS BY INDEX ROWID|COUNTRIES\
    \    |     2   (0)|       2 |       |          |\n|  7|       INDEX FULL SCAN\
    \           |COUNTRIES_PK |     1   (0)|       1 |       |          |\n|* 8| \
    \     SORT JOIN                  |             |  630   (1) |    1459 |   615K|\
    \     1/0/0|\n|  9|       TABLE ACCESS FULL         |CUSTOMERS    |   406   (1)|\
    \    1459 |       |          |\n|*10|    SORT JOIN                    |      \
    \       |  4183   (2)|    1718 |  1763K|     1/0/0|\n| 11|     PARTITION RANGE\
    \ ALL         |             |   494   (3)|    1718 |       |          |\n| 12|\
    \      TABLE ACCESS FULL          |SALES        |   494   (3)|    1718 |     \
    \  |          |\n```\n\nNo sign of a hash join, as expected. The optimizer has\
    \ honored our requirement and avoided this, but it has been detrimental to our\
    \ plan, so we know not to force the optimizer to not use a hash join. This is\
    \ where the intelligence part comes in. We know that a hash join is a good idea\
    \ here, but the brute force approach of XPLORE does not.\n\nFinding the Best Execution\
    \ Plan\n\nSo enough of how the plan can be made worse. Let’s go back to the plan\
    \ summaries (see [Figure 12-2](#9781430248095_Ch12.xhtml#Fig2)) and now look to\
    \ see if there have been any improvements. We see that there was a big improvement\
    \ for PHV 2917593948\\. Here we see a plan that shows a minimum cost of 123 (much\
    \ less than our original plan cost of 947\\. If we then look at the “Discovered\
    \ Plans” section we see that there were two tests done. If we now click on the\
    \ hyperlinked “2” we see the completed tests for this PHV (see [Figure 12-6](#9781430248095_Ch12.xhtml#Fig6))\n\
    \n![9781430248095_Fig12-06.jpg](Images/9781430248095_Fig12-06.jpg)\n\n[Figure\
    \ 12-6](#9781430248095_Ch12.xhtml#_Fig6) .  The test details for PHV 2917593948\n\
    \nWe see in this already that the reason the cost was so low in this case was\
    \ that we set `optimizer_index_cost_adj` to 1\\. In other words, we forced indexes\
    \ to be used. We can see the plan used for test 315 by clicking on the hyperlinked\
    \ 315\\. This is the plan we see (I’ve removed some columns for clarity).\n\n\
    ```\n\n|Id  |Operation                             | Name                 | Cost\
    \ (%CPU)| Reads  |"
  trans: "\n# 文件列表与使用说明\n\n## 目录内容\n\n```\n12/22/2012  12:28 PM    <DIR>         \
