- fmt: '# 4. 恢复测试用例对象统计信息


    ## 4/7 按 ENTER 键恢复 TC64661 的模式对象统计信息。


    正如你从导入的对象列表中所看到的，第3步导入了 SQLT 在 SQLTXTRACT 期间捕获的信息，并将其存储在 SQLT 存储库中。然后系统会提示你继续执行第4步，该步骤将恢复测试用例对象的统计信息。


    ### 步骤 4 操作说明


    4.  按 Enter 键继续执行第4步。在第4步中，我们会从 SQLT 存储库中为测试用例替换数据字典信息。这就是为什么你执行此操作的系统必须是一个你可以重新创建的系统。第4步的显示内容如下：


    ```

