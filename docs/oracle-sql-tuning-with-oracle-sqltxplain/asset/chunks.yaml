    is installing itself into. The next steps are to gather information so that the
    installation can be properly targeted. For most circumstances installing into
    the local database is the easiest and simplest option. You only need a tablespace
    in which SQLT will store its information, packages, functions, and the data repository.
    The size of this is generally very small (in my small installation this was about
    2 Mbytes). If you specify a remote connection here the data will be stored elsewhere,
    such as on a remote database.


    ```

