  trans: '

    幸运的是，SQLT 已经为你完成了所有工作。通过一次 `SQLT XECUTE`，你可能已经看到，在当前的执行计划中，执行步骤 1，即 `INDEX RANGE
    SCAN`，优化器预期的 `基数` 为 1。（要查看这一点，请看 `执行顺序` 列，向下找到“1”。这是第一个要执行的行。）


    然后横向阅读，直到你找到 `预估基数` 列。在这里你会看到值“1”。但由于这是一个 `SQLT XECUTE` 操作，SQL 已经被执行，而实际返回的行数超过了百万。预期是
    1 行，但实际有 100 万行。这是一个重要的线索，表明有地方出错了。此时的问题是“为什么优化器认为 `基数` 会是 1”？


    看看 `成本` 列。你会看到预期的成本是 0。优化器认为检索这些数据没有成本。


    要继续遵循这种基于证据的追踪路径，你必须了解索引统计信息的状况。


    查看一下索引。你可以展开 `转到` 列中的按钮以显示更多链接（参见 图 3-10）。


    ![9781430248095_Fig03-10.jpg](img/9781430248095_Fig03-10.jpg)


    图 3-10 . 执行计划中“更多”列下的扩展可以显示指向其他信息的更多链接


    然后，点击“索引列”或“表列”标题下的 `列统计信息` 来显示列统计信息（参见 图 3-11）。


    ![9781430248095_Fig03-11.jpg](img/9781430248095_Fig03-11.jpg)


    图 3-11 . 列统计信息显示没有行


    在这里你可以看到一个有趣的情况。所有列的行数都是 0。这意味着在收集统计信息时表是空的。那么，父表的统计信息是什么时候收集的呢？为此，你需要父表名。点击返回按钮回到执行计划，这次点击表列部分下的
    `列统计信息` 来显示表统计信息（参见 图 3-12）。


    ![9781430248095_Fig03-12.jpg](img/9781430248095_Fig03-12.jpg)


    图 3-12 . 表统计信息显示在收集统计信息时没有行


    你会看到 `TABLE 2` 上收集了 100%的统计信息，表中没有行，并且收集发生在凌晨 04:47。这是一个相当典型的统计信息收集时间。现在你必须问，数据从何而来，以及在凌晨
    4 点表中是否真的有 0 行。为此，点击主页上的“表”超链接以显示表详细信息（参见 图 3-13）。


    ![9781430248095_Fig03-13.jpg](img/9781430248095_Fig03-13.jpg)


    图 3-13 . 表详细信息部分显示了我们可以去哪里查看修改信息


    这里显示了一个有趣的新列，即 `表修改` 列。点击 `TABLE 2` 的“修改”超链接以查看修改历史（参见 图 3-14）。


    ![9781430248095_Fig03-14.jpg](img/9781430248095_Fig03-14.jpg)


    图 3-14 . 表修改部分显示了行的插入、删除和更新情况


    ![image](img/sq.jpg) **注意** 我知道你在想什么。SQLT 真是个源源不断提供帮助的工具。我知道所有这些信息都在数据库里，可以通过合适的查询获取，但
    SQLT 已经为你做好了。你不需要回到数据库去查找。SQLT 已经收集好了，以防万一。


    现在你可以看到表的修改情况，并带有时间戳。阅读 `TABLE 2` 条目所在行。表中最初有零行，然后插入了大约 200 万行，没有更新也没有删除，这导致表中大约有
    200 万行。由于这个变化（超过了 10%的变更），统计信息变得陈旧，而这发生在下午 4:09。


    现在的步骤很清楚了。表是空的。收集了统计信息。添加了 200 万行，运行了查询，优化器估计 `基数` 为 1（记住，如果值是 0，它会向上舍入为 1），因此计算出
    `NESTED LOOPS`（甚至更糟的 `CARTESIAN JOINS`）是可以的，结果大错特错。


    既然你知道了发生了什么，就可以用几种不同的方式来解决问题（如果看起来合适的话）：


    *   你可以在不同的时间收集统计信息。

    *   你可以根据需要导出并导入统计信息。

    *   你可以在表有数据时冻结统计信息。


    可能还有更多方法。解决方案本身不是这里的重点。关键在于，一旦你知道了发生了什么，你就可以设计一个适合你情况的解决方案。你还可以看到为什么在这个案例中需要 `_optimizer_cartesian_enabled=FALSE`。存在一种可能性，优化器可能会选择笛卡尔积连接，因为其中一个关键步骤的
    `基数` 是 1（这是少数几种 `CARTESIAN JOIN` 有意义的情况之一）。你可以非常简单地测试你的理论。在 `TABLE 2` 完全加载后，收集统计信息。然后重试查询，或者更好的是，直接检查执行计划会是什么。


    优化器拿到了糟糕的统计信息，“决定”做一些看起来没有道理的事情。SQLT 收集了足够的信息，让你能够看到优化器为什么这样做，然后你可以设置统计信息收集方式，使优化器不再出错。优化器是你的朋友，是一段几乎总是正确的神奇代码，只要它得到了所需的信息。


    ## 总结


    在本章中，我们通过实际例子清楚地看到，统计信息确实会产生真正的影响，而仅仅把所有事情都设为自动并不总是最佳策略。你需要注意你收集了哪些统计信息、这些统计信息的质量以及你收集它们的频率。要特别小心列直方图。SQLT
    帮助你快速高效地完成这项工作，并且比一大堆脚本能提供更多信息。我们在本章中触及了偏斜度；但在下一章中，我们将深入细节，看看什么是偏斜度以及它如何影响你的执行计划。


    # 第四章


    ![image](img/frontdot.jpg)


    ## 偏斜度如何使你的执行时间变得不稳定


    偏斜度是一个由于某种原因经常被忽视或被误解的话题。偏斜度是基于成本的优化器处理数据的一个重要部分。它会影响优化器决定做什么。它如此重要，以至于 Oracle
    创建了诸如自适应游标共享这样的新功能，就是为了处理偏斜度带来的后果。


    ### 偏斜度


    在本节中，我们将探讨什么是偏斜度，它是如何产生的，以及它如何影响你的执行计划。如果你每天都处理偏斜度，你可能会立即知道哪些情况可能产生偏斜数据。有时偏斜数据也可能意外出现。我们还将看看如何检测偏斜度，既可以从
    SQL 层面，也可以通过 SQLT。


    #### 什么是偏斜度？

