- fmt: '# What Are Query Transformations?


    Query transformations, as the name implies, change the SQL query from its original
    text into something different: but it still gives the same result. This is a little
    bit like saying you want to go from London to New York, and you have decided to
    go via Orlando, have a nice rest, visit Disneyworld, soak up the sun and then
    drive up the East Coast. A query transformation would optimize your journey by
    using heuristics. One of the heuristics might be: “If there is a direct flight
    from your starting point to your destination, then avoid using stopovers in other
    locations”. Or perhaps you could rewrite the rule and use “minimize the number
    of stop over points in your journey”. I’m sure you can see this could get pretty
    complicated, even for my simple example. What if you really wanted to see Mickey
    Mouse? Then the plan would be more difficult to change. Sometimes even the simplest
    Mickey Mouse queries can cause problems when you’re trying to make the journey
    quickly and efficiently.


    To explain what is meant by “query transformation,” from the point of view of
    an SQL query, let’s look at a simple example. Ask yourself a question. Is this
    query something that can be simplified?


    ```

    SQL> select * from (select * from sales); -- Query 1

    ```


    This query “obviously” simplifies to


    ```

    SQL> select * from sales; -- Query 2

    ```


    That’s about the simplest example of a query transformation. Query 1 was transformed
    into query 2. There is no danger with this query transformation that the results
    will be different between version 1 and version 2 of the query. This particular
    transformation is called “sub-query unnesting.” Each transformation has its name
    and its set of rules to follow to ensure that the end results are correct as well
    as optimized. Does the cost-based optimizer recognize this fact? Let’s ask the
    optimizer to calculate a plan for a very simple query; but we’ll use a hint that
    tells it to not use any query transformations. Here is the SQL and the execution
    plan.


    ```

    SQL> select /*+ no_query_transformation */ * from (select * from sales);

    Execution Plan


    Plan hash value: 2635429107


    | Id  | Operation           | Name  | Rows  | Bytes | Cost (%CPU)| Time     |
    Pstart| Pstop |


    |   0 | SELECT STATEMENT    |       |   918K|    76M|   503   (5)| 00:00:07 |       |       |

    |   1 |  PARTITION RANGE ALL|       |   918K|    76M|   503   (5)| 00:00:07 |     1
    |    28 |

    |   2 |   VIEW              |       |   918K|    76M|   503   (5)| 00:00:07 |       |       |

    |   3 |    TABLE ACCESS FULL| SALES |   918K|    25M|   503   (5)| 00:00:07 |     1
    |    28 |


    ```


    We see from this example that the optimizer chose to access `SALES` with a full
    table scan. This is required because of the `select * from sales` inside the round
    brackets. Then the optimizer chose to create a view on that data and select all
    of the partitions to create the selected data. So the optimizer collected all
    the data inside the bracket then presented the data to the next `select`. Now,
    however, let’s give the optimizer a chance to show us how clever it is. Now we
    run the query but without our hint. Now the optimizer can use query optimizations.


    ```

    SQL> select  * from (select * from sales);

    Execution Plan


    Plan hash value: 1550251865


    | Id  | Operation           | Name  | Rows  | Bytes | Cost (%CPU)| Time     |
    Pstart| Pstop |


    |   0 | SELECT STATEMENT    |       |   918K|    25M|   503   (5)| 00:00:07 |       |       |

    |   1 |  PARTITION RANGE ALL|       |   918K|    25M|   503   (5)| 00:00:07 |     1
    |    28 |

    |   2 |   TABLE ACCESS FULL | SALES |   918K|    25M|   503   (5)| 00:00:07 |     1
    |    28 |


    ```


    Now we see that the optimizer has chosen a simpler plan. The `VIEW` step has been
    eliminated and is in fact now the same execution plan as the select statement
    with no sub-query:


    ```

    SQL> select * from sales;


    Execution Plan


    Plan hash value: 1550251865


    | Id  | Operation           | Name  | Rows  | Bytes | Cost (%CPU)| Time     |
    Pstart| Pstop |


    |   0 | SELECT STATEMENT    |       |   918K|    25M|   503   (5)| 00:00:07 |       |       |

    |   1 |  PARTITION RANGE ALL|       |   918K|    25M|   503   (5)| 00:00:07 |     1
    |    28 |

    |   2 |   TABLE ACCESS FULL | SALES |   918K|    25M|   503   (5)| 00:00:07 |     1
    |    28 |


    ```


    Just to prove the point that query transformations are doing something, I show
    an example below that nests the `select` statements, and we see from the execution
    plan that the optimizer has added a view for every layer. This is because I have
    told the optimizer to not use any query transformations with the hint `/*+ no_query_transformation
    */`.


    ```

    SQL> select /*+ no_query_transformation */ * from (select * from (select * from
    (

    select * from sales)));

    Execution Plan


    Plan hash value: 1018107371


    | Id  |Operation             |Name  |Rows  | Bytes | Cost (%CPU)| Time     | Pstart|
    Pstop |


    |   0 |SELECT STATEMENT      |      |  918K|    76M|   503   (5)| 00:00:07 |       |       |

    |   1 | PARTITION RANGE ALL  |      |  918K|    76M|   503   (5)| 00:00:07 |     1
    |    28 |

    |   2 |  VIEW                |      |  918K|    76M|   503   (5)| 00:00:07 |       |       |

    |   3 |   VIEW               |      |  918K|    76M|   503   (5)| 00:00:07 |       |       |

    |   4 |    VIEW              |      |  918K|    76M|   503   (5)| 00:00:07 |       |       |

    |   5 |     TABLE ACCESS FULL|SALES |  918K|    25M|   503   (5)| 00:00:07 |     1
    |    28 |


    ```


    If we go back to the original question at the beginning of this chapter “Can this
    query be simplified?”, we see that in this simple case the answer is “yes.” This
    partially answers the question: “Why do we simplify queries?” The answer to this
    question is that the cost-based optimizer knows some rules it can use to save
    the execution engine from doing some work. The example given is very simple and
    for illustrative purposes only, but it does explain why we need to do query transformation.


    The next question you might ask is “if the CBO knows all these rules to simplify
    my query, why do I need to know about it and what has this got to do with SQLT?”
    Let me answer the second question first.


    SQLT, as a matter of routine, produces many different files that are useful. The
    main one is the HTML file we’ve looked at so far, but there are also trace files.
    One of the trace files is a “10053” trace file, which I’ll explain in the next
    section. The answer to the first question is simply that when things go wrong
    with the CBO we sometimes need to look at the 10053 trace file to get more detailed
    information on what decisions the optimizer made during parsing. You can then
    check these steps against what you consider sensible and decide if the optimizer
    is making a mistake or has insufficient statistics or some other input is influencing
    the optimizer in some way which is producing poorly performing SQL.


    ## The 10053 Trace File


    The 10053 trace file is the result of a request to trace an SQL statement. More
    properly, it is a request to trace the steps the optimizer makes to produce the
    execution plan. The contents are verbose and cryptic but extremely useful if you
    want to understand what is happening with query transformation.


    ## How Do I Get a 10053 Trace File?


    SQLTXPLAIN generates the 10053 trace file automatically and places it in the main
    reports directory. It has 10053 in the name so it’s pretty easy to spot. This
    is an example file name from the SQLT reports directory:


    ```

    sqlt_s89909_10046_10053_execute.trc

    ```


    If you want to collect 10053 manually (i.e., without using SQLTXPLAIN) then these
    are the commands:


    ```

    SQL> ALTER SESSION SET MAX_DUMP_FILE_SIZE = UNLIMITED;

    SQL> ALTER SESSION SET TRACEFILE_IDENTIFIER = ''MY_10053_TRACE'';

    SQL> ALTER SESSION SET EVENTS ''10053 TRACE NAME CONTEXT FOREVER, LEVEL 1'';

    SQL> select sysdate from dual;

    SQL> exit

    ```'
