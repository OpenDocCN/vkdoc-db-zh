- fmt: 'Imagine you’ve been told there are few rows in a partition (`<1,000` rows).
    You’re probably going to do a full table scan and not use the index, but if your
    statistics are out of date and you’ve had a massive data load (say 2.5 million
    rows) since the last time they ran and all of them match your predicate, then
    your plan is going to be sub-optimal. That’s tuning-speak for “regressed,” which
    is also tuning-speak for “too slow for your manager.” This underlines the importance
    of collecting statistics at the right time; after the data load, not before.


    So far we’ve mentioned table statistics and how these statistics need to be of
    the right quality and of a timely nature. As data sets grew larger and larger
    over the years, so too did tables grow larger. Some individual tables became very
    large (Terabytes in size). This made handling these tables more difficult, purely
    because operations on these tables took longer. Oracle Corporation saw this trend
    early on and introduced table partitioning. These mini tables split a large table
    into smaller pieces partitioned by different keys. A common key is a date. So
    one partition of a table might cover 2012. This limited the size of these partitions
    and allowed operations to be carried out on individual partitions. This was a
    great innovation (that has a license cost associated with it) that simplified
    many day-to-day tasks for the DBA and allowed some great optimizer opportunities
    for SQL improvement. For example, if a partition is partitioned by date and you
    use a date in your predicate you might be able to use partition pruning, which
    only looks at the matching partitions. With this feature comes great opportunities
    for improvement in response times but also a greater possibility you’ll get it
    wrong. Just like tables, partitions need to have good statistics gathered for
    them to work effectively.


    ## Partitions


    Partitions are a great way to deal with large data sets, especially ones that
    are growing constantly. Use a range partition, or even better, an interval partition.
    These tools allow “old” data and “new” data to be separated and treated differently,
    perhaps archiving old data or compressing it. Whatever the reason, many institutions
    use partitioning to organize their data. Especially with partitions based on date,
    it is common to have a new partition created which has zero or very few rows just
    after it is created (see [Figure 3-2](#9781430248095_Ch03.xhtml#Fig2) for an example
    of this situation). The new partition `MAIN_TABE_201202` has zero rows (it’s only
    just been created), but the other partitions have millions.


    ![9781430248095_Fig03-02.jpg](Images/9781430248095_Fig03-02.jpg)


    [Figure 3-2](#9781430248095_Ch03.xhtml#_Fig2) .  A newly created partition will
    have different characteristics than an old partition. In this case, the number
    of partitions in `MAIN_TABLE_201202` is zero


    For the recently finished partition, any new data added will not result in a huge
    change in the actual data versus the statistics, but for the newly created partition
    the optimizer currently thinks there are zero rows in this partition. How will
    this affect the execution plan if there are now 10,000 rows just a few hours after
    the statistics were collected? This kind of “initialization” of partitions can
    have a huge impact on execution plans, the kind of impact that comes and goes
    with the time of the month. Bad on the first of the month, then gradually better.


    These types of situations require careful timing of statistics collections and
    good samples. During the time just after the creation of a new partition, there
    may be periods of time when a higher sample collection percentage of a partition
    is beneficial in order to collect any unusually skewed data in that time partition.
    Just being aware of what is (or could) be happening, is half the battle. If more
    statistics collections are not an option soon after the load, then you may have
    to resort to SQL Profiles or even hints.


    ## Stale Statistics


    From the point of view of SQLT if more than 10 percent of the data in a table
    has changed then the statistics are marked with a “YES” in the “Stale Stats” column.
    In the example below ([Figure 3-3](#9781430248095_Ch03.xhtml#Fig3)) you can see
    an index with stale statistics.


    ![9781430248095_Fig03-03.jpg](Images/9781430248095_Fig03-03.jpg)


    [Figure 3-3](#9781430248095_Ch03.xhtml#_Fig3) .  An index row is shown with “Stale
    Stats” as “YES” in this example, indicating stale statistics for this index


    What should you do with this information? That depends. Sometimes stale statistics
    are not a problem; it may be that even though the table has changed by more than
    10 percent, the data could still be the same statistically. Ten percent is a pretty
    arbitrary number, and in some situations you may decide that it’s too low or too
    high. If so, you can always change it:


    `SQL> exec dbms_stats.set_table_prefs(null,''USER2'',''STALE_PERCENT'',5)`


    Having said that, what should you do if you see “YES” in the Stale Stats column
    for a particular table or index? The simple answer is (once again) “it depends.”
    It’s like a murder mystery. If you already suspect that the butler did it, and
    then you see he has a gun in his pocket, that might be a good lead.


    The point here is that the column would be a clue that something was wrong, and
    that it might be materially important in your current investigation. For example,
    suppose you have a table with an interval partition created and loaded with data
    every day. Its statistics are going to be STALE unless you run statistics collection
    every day after you load data in a new partition. The key is to realize that statistics
    collection is a tool provided by Oracle that you can use in many different ways.
    That control must be informed by your knowledge of the architecture, the data
    model, and the queries you expect on your database.


    ## Sampling Size


    This is one of the most hotly argued points of statistics collection. Many sites
    depend on the `DBMS_STATS.AUTO_SAMPLE_SIZE`, and this is a good choice for some
    if not most situations, but it’s not perfect. It’s just a good starting point.
    If you have no problems with your queries, and your statistics run in a reasonable
    time, then leave the defaults and go do something more useful.


    If you struggle to collect the level of statistics you need to get your online
    day working efficiently, you may want to look closely at the statistics you are
    gathering. If 100 percent is not possible, then work out how much time you do
    have, and try to aim for that percentage. Look at what you are collecting and
    see if all of it is needed. If you are gathering schema stats, then ask yourself:
    Are all the tables in the schema being used? Are you collecting statistics on
    columns with no skewness? In such situations you are wasting resources collecting
    information that will make no difference to the optimizer. It stands to reason
    that changing statistics collection sample sizes should be done carefully and
    in small steps, with enough time between changes to evaluate the effect. This
    is what test systems are for.


    You can see what you have set up on the system by clicking on the `DBMS_STATS`
    setup hyperlink from the SQLT report ([Figure 3-4](#9781430248095_Ch03.xhtml#Fig4)).


    ![9781430248095_Fig03-04.jpg](Images/9781430248095_Fig03-04.jpg)


    [Figure 3-4](#9781430248095_Ch03.xhtml#_Fig4) .  It’s always good to check what
    `DBMS_STATS` preferences you have. In this example everything is set to the defaults


    Here you can see the `DBMS_STATS` preferences. Everything is set to `AUTO`. The
    sample size is `DBMS_STATS.AUTO_SAMPLE_SIZE`; Cascade is set to `DBMS_STATS.AUTO_CASCADE`;
    and Method Opt is set to `FOR ALL COLUMNS SIZE AUTO`.'
