    _optimizer_extended_cursor_sharing_rel


    We already discussed disabling adaptive cursor sharing in chapter 7. Where we
    disabled ACS with


    ```

    SQL> alter system set "_optimizer_extended_cursor_sharing_rel"=NONE scope=both;

    SQL> alter system set "_optimizer_extended_cursor_sharing"=none scope=both;

    ```


    Both parameters are needed to disable ACS. The default values are SIMPLE for _optimizer_extended_cursor_sharing_rel
    and UDO for _optimizer_extended_cursor_sharing.


    _optimizer_cartesian_enabled


    Disable the Cartesian join if set to FALSE. This may be a useful way of debugging
    a failing statement, in conjunction with Oracle supports help. The default value
    is TRUE.


    _optimizer_cost_model


    This changed the basis for costing of activity by the CBO. It can be set to `cpu`,
    `io` or `choose`. The name is a little misleading, by setting `cpu` we do not
    optimize for reducing CPU usage, we optimize for reducing cost as before but are
    now taking CPU into account for I/O operations. The value `choose` allows the
    optimizer to make a choice based on statistics available in `sys.aux_stats$`.
    The default value is `choose`.


    _optimizer_ignore_hints


    This hidden parameter allows the optimizer to ignore embedded hints. The default
    value is FALSE. You might want to try this if you felt the hints were not producing
    the best plan and wanted to disable these at the session level with


    ```

    SQL> alter session set "_optimizer_ignore_hints"=TRUE;

    ```


    _optimizer_max_permutations


    If you feel somehow that the optimizer is not working hard enough, there is always
    the option to set `_optimizer_max_permutations` to something other than the default
    value of 2,000\. The parameter controls the number of different permutations that
    the optimizer will try per query block when joining a number of tables. There
    may be circumstances where this value can be as high as 80,000\. The value is
    overridden by `_optimizer_search_limit`, where `_optimizer_search_limit` is the
    number factorial of join permutations.


    _optimizer_use_feedback


    Controls the cardinality feedback feature as discussed in chapter 8. The default
    is TRUE. Set to FALSE to disable this feature.


    _optimizer_search_limit


    The default value for this parameter is 5\. This is the factorial number of maximum
    Cartesian joins that will be considered. 5! (read as “five factorial”) is equivalent
    to 5x4x3x2x1 which equals 120.


    Full List of Parameters


    Why include a full list of parameters that we should not as DBAs change unless
    directed to by Oracle support? There are two possible answers.


    *   Oracle support may suggest some parameter for some investigation and it is
    useful to be able to have at least a brief description of what the parameter does.
    You should ask Oracle support for this description before applying to any database
    anyway. This list is your backup for this information.

    *   Read and research each of these parameters carefully or try things out on
    a disposable database to give you insight in to how the optimizer works and what
    it is doing for us. This greater understanding becomes a story that cements clear
    knowledge about some aspect of the optimizer. An example of this is `_optimizer_max_permutations`.
