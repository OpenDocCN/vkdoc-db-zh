    \ we need a machine twice as powerful to get a better elapsed time.\n\n## Setting\
    \ System Statistics\n\nAs an example of the power of setting system statistics,\
    \ I’ll carry out the steps to do this to my test rig. If you wanted to do something\
    \ similar to your throwaway test environment to make it similar to another environment,\
    \ you could get the system statistics and set them manually as I am going to do\
    \ in this example. From the example above our best cost so far was 947. We also\
    \ know that our source machine (my ancient laptop) had a CPU speed of 1683 MHz\
    \ and I/O seek time of 10ms and an I/O transfer speed of 4096. In this example\
    \ I’ll set the CPU speed to 10 times the current value:\n\n```sql\nEXEC DBMS_STATS.SET_SYSTEM_STATS('CPUSPEEDNW',\
    \ 16830.00);\n```\n\nThen when we next run the test case (after flushing the shared\
    \ Pool) we get this execution plan:\n\n```\n|Id  |Operation              |Name\
    \     | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop |\n|  0 |SELECT\
    \ STATEMENT       |         |       |       |   897 (100)|          |       |\
    \       |\n|  1 | SORT ORDER BY         |         |     9 |   315 |   897   (2)|\
    \ 00:00:11 |       |       |\n|  2 |  HASH GROUP BY        |         |     9 |\
    \   315 |   897   (2)| 00:00:11 |       |       |\n|* 3 |   HASH JOIN        \
    \   |         |   435K|    14M|   891   (1)| 00:00:11 |       |       |\n|* 4\
    \ |    HASH JOIN          |         | 26289 |   641K|   408   (1)| 00:00:05 |\
    \       |       |\n|* 5 |     TABLE ACCESS FULL |COUNTRIES|     9 |   135 |  \
    \   3   (0)| 00:00:01 |       |       |\n|  6 |     TABLE ACCESS FULL |CUSTOMERS|\
    \ 55500 |   541K|   404   (0)| 00:00:05 |       |       |\n|  7 |    PARTITION\
    \ RANGE ALL|         |   918K|  8973K|   482   (1)| 00:00:06 |     1 |    28 |\n\
    |  8 |     TABLE ACCESS FULL |SALES    |   918K|  8973K|   482   (1)| 00:00:06\
    \ |     1 |    28 |\n```\n\nPlease note that in this case the plan has not changed;\
    \ however, what we do see is that the elapsed time has been reduced slightly from\
    \ 12 seconds to 11 seconds and that the cost has been reduced slightly. Most of\
    \ the cost of the query is in the I/O, and the CPU is not crucial to the execution\
    \ time. We could conclude from this that if we wanted a bigger better laptop,\
    \ that a much more important parameter to pay attention to would be the transfer\
    \ speed of the disks rather than the speed of the CPU (as far as this query is\
    \ concerned, of course). Playing around in your test environment with settings\
    \ like this can allow you to discover what is important in your environment for\
    \ improving performance and save time by allowing you to concentrate on what is\
    \ important and ignore what is less important.\n\n## Object Statistics\n\nYou\
    \ can set object statistics for all the objects in the query also, but this is\
    \ a tricky operation and not recommended for this kind of exploration. You are\
    \ better off looking at the 10053 trace file to see why your costs are the way\
    \ they are than by changing the costs to see what happens.\n\n## Debugging the\
    \ Optimizer\n\nCreating and using a test case is mostly something that you should\
    \ expect Oracle support to do on your behalf. They will take the test case files\
    \ that you supply and explore them sufficiently to be able to solve your problem.\
    \ You can also use the test case files (as I’ve described above) to do some testing\
    \ in a free-standing test environment that nobody else is using. The test case\
    \ routines are mostly used to explore the behavior of the optimizer. Everything\
    \ in the test case files is designed to make the optimizer think it is on the\
    \ original source system. If there is a bug that causes the optimizer to change\
    \ its execution plan in an inappropriate way, then a test case is what Oracle\
    \ support will use possibly in conjunction with your data to determine if there\
    \ is a true bug or some unexpected behavior that is not a bug. Sometimes in rare\
    \ cases some particular execution plan can cause a bug to be exposed, and in these\
    \ cases you can sometimes avoid the bug by setting some optimizer environmental\
    \ factor.\n\n## Other Test Case Utilities\n\nAs if the ability to explore your\
    \ SQL in a stand-alone test environment isn’t enough, SQLT provides further utilities\
    \ for understanding what’s happening in any particular SQL. Sometimes you want\
    \ to do more than just change environmental settings and retry your query. Just\
    \ like a dependable Swiss Army knife of tuning, SQLT has a tool for nearly every\
    \ job.\n\n## What Does sel.sql Do?\n\n`Sel` is a nice little utility that you\
    \ would probably write if it wasn’t already written for you. Here is the code\
    \ for `sel.sql`:\n\n```sql\nREM Computes predicate selectivity using CBO. Requires\
    \ sel_aux.sql.\nSPO sel.log;\nSET ECHO OFF FEED OFF SHOW OFF VER OFF;\nPRO\nCOL\
    \ table_rows NEW_V table_rows FOR 999999999999;\nCOL selectivity FOR 0.000000000000\
    \ HEA \"Selectivity\";\nCOL e_rows NEW_V e_rows FOR 999999999999 NOPRINT;\nACC\
    \ table PROMPT 'Table Name: ';\nSELECT num_rows table_rows FROM user_tables WHERE\
    \ table_name = UPPER(TRIM('&&table.'));\n@@sel_aux.sql\n```"
