  trans: "\n毫无疑问，自适应游标共享（Adaptive Cursor Sharing）是优化器中最容易被误解和令人困惑的领域之一。这还因为该功能有时被称为\"\
    智能游标共享\"或\"绑定变量感知窥探\"，使其更加难以理解。自适应游标共享在 11g 版本中引入，旨在处理那些不断变化的棘手绑定变量。SQLTXTRACT\
    \ 工具的主报告顶部有一个名为\"游标共享与绑定变量\"的部分。请参阅图 7-1 以帮助您回忆。自适应游标共享部分位于屏幕的左下角。\n\n![9781430248095_Fig07-01.jpg](img/9781430248095_Fig07-01.jpg)\n\
    \n图 7-1 。自适应游标共享部分可在屏幕左下角找到。\n\n理解优化器的这一功能，文档的帮助也不大。它并非完全清晰明了，并且缺乏一些理解该功能运作时所必需的细节。我将用简单的术语解释这一功能，并展示其实际应用的例子。如果您的系统中此功能很重要，您将能更好地理解正在发生的情况及其原因。您也可以选择完全禁用此功能。\n\
    \n## 绑定变量及其必要性\n\n然而，在我们深入探讨自适应游标共享之前，需要先介绍一些先决知识，这将有助于您理解后续讨论以及 ACS 的发展历史。绑定变量是\
    \ ACS 所依赖的 SQL 关键组件。程序员在 Oracle 系统中使用它们，因为多年来 Oracle 一直告诉他们，包含大量字面值的系统是不好的。这在大多数情况下确实如此，但即使在今天，您仍然会看到系统因为字面值而生成数十万个游标。这通常是因为\
    \ SQL 是由自动生成 SQL 的应用程序创建的。以下是一个 SQL 语句中绑定变量和等效语句中字面值的例子：\n\n```\nvariable b varchar2(5);\n\
    exec :b := 'TABLE'\nselect count(object_type) from acs where object_type=:b;\n\
    select count(object_type) from acs where object_type='TABLE';\n```\n\n这里的绑定变量是\
    \ `b`，它在 SQL 语句（本例中是 `select`）中用来代表值 `'TABLE'`。人们可能会合理地问：\"为什么我们需要绑定变量？\"，因为我们完全可以直接使用：\n\
    \n```\nselect count(object_type) from acs where object_type='TABLE';\n```\n\n\
    答案是，在繁忙的系统上，硬解析的开销是难以承受的，并且每个 SQL 游标的详细信息都必须保存在共享池中，这可能是一个巨大的内存开销。如果每次都因为绑定变量值变化而让基于代价的优化器详细检查每个语句，那么不同语句的解析成本将完全相同；我们不希望这样做。在遥远的过去（8i\
    \ 版本），绑定变量已经存在，但使用并不广泛。Oracle 认为应该使用更多绑定变量来提高性能，但不一定非要用绑定变量不可。于是引入了 `cursor_sharing`\
    \ 参数。\n\n### CURSOR_SHARING 参数\n\n引入的解决方案是 `cursor_sharing` 参数，其可能值为 `EXACT` 或\
    \ `FORCE`。默认值是 `EXACT`，这不会改变行为：即，如果 SQL 语句中有字面值，则对其进行解析和执行。如果解析开销过高，您可以考虑将该值设置为\
    \ `FORCE`。在这种情况下，字面值（在上面的例子中是 'TABLE'）将被系统定义的绑定变量（例如 `SYS_B_0`）替换。这在某些情况下提高了性能，但在绑定变量的值对执行计划有影响的情况下（换句话说，数据分布倾斜）会导致问题。具有罕见值和常见值的谓词会使用相同的系统生成绑定变量，从而得到相同的执行计划。这有时会引发问题，因此后来创建了绑定变量窥探来帮助解决。以下是一个展示该行为的例子：\n\
    \n```\nSQL> alter session set cursor_sharing='FORCE';\n会话已更改。\nSQL> @q4\n  COUNT(*)\n\
    ----------\n     18432\nSQL> host type q4.sql\nselect  count(*) from sh.products\
    \ p,sh.sales s,sh.customers c where\n  c.cust_id=s.cust_id and s.prod_id=p.prod_id\
    \ and\n  c.cust_first_name='Stelios' ;\nSQL> select sql_id from v$sqlarea where\
    \ sql_text like 'select  count(*) from sh.products p,sh.sales s,sh.customers c\
    \ where%';\nSQL_ID\n---------------\n7d16bm8ub2w1g\nSQL> select sql_text from\
    \ v$sqlarea where sql_id='7d16bm8ub2w1g';\nSQL_TEXT\n--------------------------------------------------\n\
    select  count(*) from sh.products p,sh.sales s,sh.customers c where   c.cust_id=s.cust_id\
    \ and s.prod_id=p.prod_id and c.cust_first_name=:\"SYS_B_0\"\n\nSQL> alter session\
    \ set cursor_sharing='EXACT';\n会话已更改。\nSQL> @q4\n  COUNT(*)\n----------\n    \
    \ 18432\nSQL> select sql_id from v$sqlarea where sql_text like 'select  count(*)\
    \ from sh.products p,sh.sales s,sh.customers c where%';\nSQL_ID\n---------------\n\
    7d16bm8ub2w1g\nfqsukcqvrby36\nSQL> select sql_text from v$sqlarea where sql_id='fqsukcqvrby36';\n\
    SQL_TEXT\n--------------------------------------------------\nselect  count(*)\
    \ from sh.products p,sh.sales s,sh.customers c where   c.cust_id=s.cust_id and\
    \ s.prod_id=p.prod_id and c.cust_first_name='Stelios'\n```\n\n在上面的例子中，我将 `cursor_sharing`\
    \ 的默认值改为了 `FORCE`。我的 SQL 语句随之改变，包含了一个名为 `SYS_B_0` 的系统定义绑定变量。然后我将值设回 `EXACT`，绑定值消失，被字面值取代。这是预期的行为。\n\
    \n### 绑定变量窥探\n\n在 9i 版本中，Oracle 引入了绑定变量窥探。绑定变量窥探用于在硬解析过程中查看绑定变量使用的值，以确定合适的执行计划。`cursor_sharing`\
    \ 参数还引入了一个新的可能值 `SIMILAR`。如果解析时认为合适，就会生成一个新的执行计划；否则（基于窥探结果）执行计划保持不变。这样做的问题是，如果第一个执行计划对后续计划来说并不理想，那么您就被困在一个执行效果不佳的计划中了。\n\
    \n### 绑定敏感和绑定感知游标\n"
- fmt: 'A new hybrid system was introduced by 11g called Adaptive Cursor Sharing (ACS),
    which is a little more subtle about when to introduce a new plan. The concepts
    of “bind sensitive” and “bind aware” were introduced. Bind sensitive is true when
    you have bind variables whose value `may` affect the execution plan. Bind sensitive
    means that the optimizer suspects that a new plan may be appropriate for some
    values, but it’s not sure. Think of bind sensitive as the first step in becoming
    aware that more execution plans are needed. You have to be sensitive to the bind
    variables before you become aware. If you run the SQL a number of times so that
    the number of buffer gets significantly changed for different bind variables,
    eventually the cursor will be marked “bind aware.” In other words, we went from
    bind sensitive (we have bind variables) to bind aware (these bind variables make
    a significant difference to the number of buffer gets). You can track the progress
    of the bind sensitivity and bind awareness values by looking at the `SQLTXPLAIN`
    report.


    ## Setting Up a Bind Sensitive Cursor


    To show the behavior of ACS will take a little setting up. In broad terms, here
    are the steps we’ll carry out in the example code. We’ll show the code for doing
    the following below:


    1.  Creating a test table

    2.  Inserting skewed data into the test table. There should be enough rows to
    allow the possibility of multiple execution plans.

    3.  Showing how skewed the data is

    4.  Creating indexes to allow them to be used in the execution plan

    5.  Gathering statistics including histograms on all columns

    6.  Selecting common and rare values in a number of executions until ACS is activated

    7.  Checking the results in `SQLTXECUTE`


    ```

    -- Set up

    drop table acs;

    create table acs(object_id number, object_type varchar2(19));

    insert into acs select object_id, object_type from dba_objects;

    insert into acs select object_id, object_type from dba_objects;

    select object_type, count(*) from acs group by object_type order by count(object_type);

    create index i1 on acs(object_id);

    create index i2 on acs(object_type);

    exec dbms_stats.gather_table_stats(''STELIOS'',''ACS'', estimate_percent=>100,
    method_opt=>''FOR ALL COLUMNS SIZE 254'');

    prompt Now we have a table, ACS with skewed data.

    -- Now let''s do some selecting...

    variable b varchar2(19);

    @@acs_query ''SYNONYM''

    @@acs_query ''TABLE''

    @@acs_query ''SYNONYM''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    ```


    We’ve selected `dba_objects` yet again as a good source for psuedo-random data.
    In this case, we are interested in the fact that there are many more SYNONYM types
    in this table than there are DIMENSIONs. The script `acs_query.sql` contains the
    following:


    ```

    exec :b := ''&1''

    select count(object_type) from acs where object_type=:b;

    ```


