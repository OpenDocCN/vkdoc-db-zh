  raw: "![9781430248095_Fig02-14.jpg](Images/9781430248095_Fig02-14.jpg)\n\n[Figure\
    \ 2-14](#9781430248095_Ch02.xhtml#_Fig14) .  Execution plan being investigated\n\
    \nLooking at the plan, you can confirm what the developer said about a “weird”\
    \ execution plan with strange bit map indexes. In fact though, there is nothing\
    \ strange about this plan. It’s just that the first step is:\n\n```\n... BITMAP\
    \ INDEX FULL SCAN PRODUCTS_PROD_STATUS_BIX\n```\n\nThis step was not in the developer’s\
    \ original plan. Hence the reason the developer perceives it as strange. For the\
    \ one SQL statement the developer was working with we suspect that there are at\
    \ least 2 execution plans (there can be dozens of execution plans for the one\
    \ SQL statement, and SQLT captures them all).\n\nFurther down in the list of execution\
    \ plans, we see that there are indeed plans using hash joins and full table scans.\
    \ See [Figure 2-15](#9781430248095_Ch02.xhtml#Fig15), which shows a different\
    \ execution plan for the same SQL that the developer is working with. In this\
    \ execution plan, which returns the same rows as the previous execution plan,\
    \ the overall cost is 908.\n\n![9781430248095_Fig02-15.jpg](Images/9781430248095_Fig02-15.jpg)\n\
    \n[Figure 2-15](#9781430248095_Ch02.xhtml#_Fig15) .  An execution plan showing\
    \ a hash join\n\nSo far we know there was a plan involving a hash join and bitmap\
    \ indexes and that earlier there were plans with full table scans. If we look\
    \ at the times of the statistics collection we see that indeed the statistics\
    \ were gathered before the execution of these queries.  This is a good thing,\
    \ as statistics should be collected before the execution of a query!\n\n![image](Images/sq.jpg) **Note**  As\
    \ an aside, the ability of SQLT to present all relevant information quickly and\
    \ easily is its greatest strength. It takes the guesswork out of detective work.\
    \ Without SQLT, you would probably have to dig out a query to show you the time\
    \ that the statistics were collected. With SQLT, the time of the collection of\
    \ the statistics is right there in the report. You can check it while still thinking\
    \ about the question!\n\nSo, the statistics didn’t change and the SQL text didn’t\
    \ change. It’s possible that an index was added sometime over lunchtime.  You\
    \ can check that by looking at the objects section of the report, as shown in\
    \ [Figure 2-16](#9781430248095_Ch02.xhtml#Fig16).\n\n![9781430248095_Fig02-16.jpg](Images/9781430248095_Fig02-16.jpg)\n\
    \n[Figure 2-16](#9781430248095_Ch02.xhtml#_Fig16) .  Object information and creation\
    \ times\n\nThe objects section in [Figure 2-16](#9781430248095_Ch02.xhtml#Fig16)\
    \ will confirm the creation date of the index PRODUCTION_PROD_STATUS_BIX. As you\
    \ can see, the index used in the BITMAP INDEX FULL SCAN was created long ago.\
    \ So where are we now?\n\nLet’s review the facts:\n\n*   No new indexes have been\
    \ added.\n*   The plan has changed—it uses more indexes.\n*   The statistics haven’t\
    \ changed.\n\nNow you need to consider what else can change an execution plan.\
    \ Here are some possibilities:\n\n*   System statistics. We check those, and they\
    \ seem OK. Knowing what normal looks like helps here.\n*   Hints. We look to be\
    \ sure. There are no hints in the SQL text.\n*   CBO parameters. We look and see\
    \ the values in [Figure 2-17](#9781430248095_Ch02.xhtml#Fig17).\n\n![9781430248095_Fig02-17.jpg](Images/9781430248095_Fig02-17.jpg)\n\
    \n[Figure 2-17](#9781430248095_Ch02.xhtml#_Fig17) .  The CBO environment section\n\
    \n[Figure 2-17](#9781430248095_Ch02.xhtml#Fig17) shows statistics_level, _*parallel*_syspls_obey_force,\
    \ and `optimizer_index_cost_adj`. This is in the section “Non-Default CBO Parameters”,\
    \ so you know they are not normal values. As optimizer_index_cost_adj is a parameter\
    \ for adjusting the cost used by the optimizer for indexes this may have something\
    \ to do with our change in execution plan. Then notice that the “Observations”\
    \ section  (see [Figure 2-18](#9781430248095_Ch02.xhtml#Fig18)) highlights that\
