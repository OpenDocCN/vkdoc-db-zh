- fmt: 'These steps are an example of the standard tuning methodology: test, make
    single changes, and test again. The test case allows you to do this quickly and
    efficiently. As you get more proficient with `XTRACT` you will find that using
    `XPLORE` is not needed. It’s a bit like weather forecasting: “The accuracy of
    a weather forecast is in direct proportion to the number of gray hairs on the
    forecaster’s head.” The lesson to remember from this chapter is that although
    we found that setting `optimizer_index_cost_adj` to `1` made our execution plan
    much better, that was not the solution. That only prompted us to find the real
    solution, which was to fix the statistics.


    In other words, we found a problem that was not related to an upgrade (i.e., the
    statistics were wrong), but `XPLORE` hinted at the solution. This is the surprising
    thing about `XPLORE`. Again, it is primarily used to determine what changes (due
    to upgrades) were made to the optimizer and may have regressed execution plans.
    However, if we use `XPLORE` `in extremis`, we may find in one of the execution
    plans a kernel of an idea that suggests a solution to our tuning problem, even
    though the original problem may not be related to changes in the optimizer behavior.


    ## Other Information in XPLORE


    In our example `XPLORE` we focused directly on finding the best plan and didn’t
    stop to look at all the other information presented by `XPLORE`. Here we’ll briefly
    look at some other sections that need to be mentioned.


    ### Baseline


    The first one is the “Baseline” section, which shows the settings for each of
    the tests. See [Figure 12-8](#9781430248095_Ch12.xhtml#Fig8), which shows the
    top part of the baseline section of the `XPLORE` report.


    ![9781430248095_Fig12-08.jpg](Images/9781430248095_Fig12-08.jpg)


    [Figure 12-8](#9781430248095_Ch12.xhtml#_Fig8) .  The top part of the baselines
    report in `XPLORE`


    This part of the report shows the starting position of the tests. It starts by
    listing all the fix control settings as they are on the test database before we
    start and then goes on to list all the optimizer parameters (including the hidden
    ones).


    ### SQL Monitor Reports


    Along with all this information in the main report there is also a zip file created
    in the `XPLORE` zip file (yes, a zip file inside a zip file). This zip file called
    `xplore_sql_monitor_report_1.zip` contains the SQL monitor HTML output for every
    single execution of the script. This is a vast amount of information. You would
    never look at every single one of these execution reports, but if you have data
    and you have finally settled on a plan that you like, such as our test Id 315
    from above, then we can investigate the SQL monitor report for this one test more
    closely. As usual you should create a directory and put the zip file in there.
    Then unzip the file. In this directory you will end up with 732 HTML reports:
    one for each test and one SQL file that shows how the scripts were created. Let’s
    look at one of these monitor reports, specifically report 315. Look at [Figure
    12-9](#9781430248095_Ch12.xhtml#Fig9), which shows the left hand side of the monitor
    report for test Id 315.


    ![9781430248095_Fig12-09.jpg](Images/9781430248095_Fig12-09.jpg)


    [Figure 12-9](#9781430248095_Ch12.xhtml#_Fig9) .  The left hand side of the SQL
    monitor report for test ID 315


    We can see the execution plan and the cost for each step, but we can also see
    the amount of time spent on each step of the plan. We can see that much of the
    time was spent on `BITMAP INDEX FULL SCAN` of `SALES_PROMO_BIX`. In fact if we
    hover the mouse over the duration bar for this bitmap index we will see the duration
    in seconds for that step. If we look at the right hand side of the same report
    (as shown in [Figure 12-10](#9781430248095_Ch12.xhtml#Fig10)).


    ![9781430248095_Fig12-10.jpg](Images/9781430248095_Fig12-10.jpg)


    [Figure 12-10](#9781430248095_Ch12.xhtml#_Fig10) .  The right hand side of the
    SQL Monitor report for plan ID 315


    This shows that 50 percent of the wait activity was for `BITMAP INDEX FULL SCAN`
    on `CUSTOMERS` and the other 50 percent was for a `BITMAP INDEX FULL SCAN` on
    `SALES`. Because this plan was obtained by setting `optimizer_index_cost_adj`
    to `1`, we can see that indexes were used inappropriately and the change has resulted
    in a better plan than the original bad plan. With this information we know that
    working on these two indexes is the way to improve the execution time because
    they are the biggest contributors to the wait time.


    ## Summary


    I hope you are impressed with what `XPLORE` can do for you, especially in conjunction
    with `XTRACT` and `XECUTE` and of course with your knowledge of how the optimizer
    works. Although the example in this chapter was a nice simple piece of SQL, this
    same methodology can work with very complex SQL and execution plans. Large pieces
    of SQL can be broken down into smaller steps and attacked in order of importance,
    the importance being governed by the cost of each step. `XPLORE` can investigate
    all the changes that are likely to have affected the optimizer’s calculations,
    and this is most often the case when the optimizer changes when the versions of
    the database change. Use `XPLORE` wisely and you will capture more of those pesky
    SQLs that go awry.


    I must emphasize that all of the `XPLORE` activity must be run on a disposable
    database. It bears repeating that setting environmental variables and system parameters
    and statistics that `XPLORE` does could cause havoc for any system that you might
    be sharing with somebody else.


    For all its power and flexibility `XPLORE` is not the ideal tool for general tuning
    but is extremely useful in those cases where something has changed unexpectedly.
    In the next chapter we’ll look at the more advanced methods available in `SQLT`.


    # CHAPTER 13


    ![image](Images/frontdot.jpg)


    ## Trace Files, TRCANLZR and Modifying SQLT behavior


    Even with `SQLT` helping you sometimes you need to look at `10046` trace files
    and analyze these to determine what’s happening. How you analyze and interpret
    `10046` files is outside the scope of this book. The standard guide for this is
    Cary Millsap’s book *Optimizing Oracle Performance* (O’Reilly 2003). (This book
    is a little dated now, but still contains useful information on `10046` trace
    files.) How to more easily collect these trace files, however, and format them
    so they are easier to interpret is not beyond the scope of this book, as `SQLT`
    provides a number of methods for collecting this information more quickly and
    more easily.


    The `10046` trace files are log files of the Oracle engine’s activity as it executes
    SQL. These files are difficult to interpret, full of obscure codes, and also very
    long. The `10053` trace files (as I mentioned in [Chapter 5](../Text/9781430248095_Ch05.xhtml))
    are equally obscure, difficult to understand, and also very long. When SQL statements
    are executed in parallel and `10046` tracing is enabled, each slave process that
    is helping with the execution creates its own trace file. This makes the interpretation
    and understanding of what is happening with parallel execution even more difficult.
    You can have hundreds of trace files all relating to the same SQL all working
    in parallel and communicating with each other to achieve a common goal. When things
    go wrong with these complex cases it can be hard enough just collecting the right
    trace files let alone analyzing those trace files and getting a coherent picture
    from potentially hundreds of trace files.


    In this chapter I’ll describe the following methods building from the simplest
    to the more complex. I’ll try building on the simpler cases to explain the more
    complex cases.'
