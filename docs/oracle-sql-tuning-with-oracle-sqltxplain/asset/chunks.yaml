    ### `_smm_px_max_size`

    在自动模式（全局）下的最大工作区大小


    ### `_sort_elimination_cost_ratio`

    在 FIRST_ROWS 模式下消除排序的成本比率


    ### `_sort_multiblock_read_count`

    排序的多块读取计数


    ### `_spr_push_pred_refspr`

    通过引用电子表格下推谓词


    ### `_sql_compatibility`

    SQL 兼容性位向量


    ### `_sql_model_unfold_forloops`

    指定 SQL MODEL FOR 循环的编译时展开


    ### `_subquery_pruning_enabled`

    启用使用子查询谓词执行剪裁


    ### `_subquery_pruning_mv_enabled`

    启用使用带有物化视图的子查询谓词执行剪裁


    ### `_system_index_caching`

    优化器系统索引缓存百分比


    ### `_table_scan_cost_plus_one`

    将估计的全表扫描和索引快速全扫描成本增加一


    ### `_trace_virtual_columns`

    跟踪虚拟列表达式


    ### `_union_rewrite_for_gs`

    将带有分组集合的查询展开为 UNION 进行重写


    ### `_unnest_subquery`

    启用解嵌套复杂子查询


    ### `_use_column_stats_for_function`

    为 DDP 函数启用使用列统计信息


    ### `_virtual_column_overload_allowed`

    重载虚拟列表达式


    ### `_with_subquery`

    WITH 子查询转换


    ### `active_instance_count`

    集群数据库中的活动实例数


    ### `bitmap_merge_area_size`

    允许用于位图合并的最大内存


    ### `cell_offload_compaction`

    Cell 数据包压缩策略


    ### `cell_offload_plan_display`

    Cell 下载执行计划显示


    ### `cell_offload_processing`

    启用 SQL 处理卸载到单元格


    ### `cpu_count`

    此实例的 CPU 数量


    ### `cursor_sharing`

    游标共享模式


    ### `db_file_multiblock_read_count`

    每次 I/O 要读取的数据库块数


    ### `dst_upgrade_insert_conv`

    在 DST 升级期间启用/禁用内部转换


    ### `hash_area_size`

    内存中哈希工作区的大小


    ### `optimizer_capture_sql_plan_baselines`

    自动捕获可重复语句的 SQL 计划基线


    ### `optimizer_dynamic_sampling`

    优化器动态采样


    ### `optimizer_features_enable`

    优化器计划兼容性参数


    ### `optimizer_index_caching`

    优化器索引缓存百分比


    ### `optimizer_index_cost_adj`

    优化器索引成本调整


    ### `optimizer_mode`

    优化器模式


    ### `optimizer_secure_view_merging`

    优化器安全视图合并和谓词下推/移动


    ### `optimizer_use_invisible_indexes`

    不可见索引的使用 (TRUE/FALSE)


    ### `optimizer_use_pending_statistics`

    控制是否使用优化器待处理统计信息


    ### `optimizer_use_sql_plan_baselines`

    对捕获的 SQL 语句使用 SQL 计划基线


    ### `parallel_degree_limit`

    对并行度的限制


    ### `parallel_degree_policy`

    用于计算并行度的策略 (MANUAL/LIMITED/AUTO)


    ### `parallel_force_local`

    强制单实例执行


    ### `parallel_min_time_threshold`

    计划成为并行化候选者的阈值（以秒为单位）


    ### `parallel_threads_per_cpu`

    每个 CPU 的并行执行线程数


    ### `pga_aggregate_target`

    实例消耗的聚合 PGA 内存的目标大小


    ### `query_rewrite_enabled`

    如果启用，则允许使用物化视图重写查询


    ### `query_rewrite_integrity`

    使用所需完整性级别使用物化视图执行重写


    ### `result_cache_mode`

    结果缓存运算符使用模式


    ### `skip_unusable_indexes`

    如果设置为 TRUE，则跳过不可用索引


    ### `sort_area_retained_size`

    在提取调用之间保留的内存中排序工作区的大小


    ### `sort_area_size`

    内存中排序工作区的大小


    ### `star_transformation_enabled`

    启用星型转换的使用


    ### `statistics_level`

    统计信息级别


    ### `workarea_size_policy`

    用于确定 SQL 工作区大小的策略 (MANUAL/AUTO)


