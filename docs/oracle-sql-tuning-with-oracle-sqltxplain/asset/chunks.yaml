    08/11/2011  12:46 AM             6,844 user_objects.sql\n04/02/2012  10:43 AM\
    \            58,807 xplore.pkb\n10/11/2011  06:29 AM             2,843 xplore.pks\n\
    12/22/2012  12:28 PM         3,839,878 xplore_1.zip\n12/22/2012  09:45 AM    \
    \       301,600 xplore_script_1.sql\n12/22/2012  09:31 AM             3,239 xplore_script_2.log\n\
    12/22/2012  09:29 AM           301,600 xplore_script_2.sql\n12/22/2012  09:33\
    \ AM             2,341 xplore_script_3.log\n12/22/2012  09:32 AM           301,600\
    \ xplore_script_3.sql\n              17 File(s)      4,829,039 bytes\n       \
    \        2 Dir(s)   6,701,252,608 bytes free\n```\n\n## 使用报告\n\n要使用此报告，最好创建一个子目录并解压\
    \ `xplore_1.zip` 中的文件。压缩文件中包含一个 HTML 文件（主报告）、一个运行日志文件以及运行过的 `xplore` 脚本。目前我们唯一感兴趣的文件是\
    \ HTML 文件。如果用浏览器打开此文件，会发现它比正常的 XECUTE 或 XTRACT 报告简洁得多。它以一个简单的标题“`XPLORE Report\
    \ for baseline:1 runid:1`”开始，然后直接就是大量的数字。报告的“Plans Summary”部分显示了我们的一条 SQL 的所有已发现执行计划。让我们看一下图\
    \ 12-2，它展示了报告的这一部分。这是通往报告所有其他部分的起点。\n\n![9781430248095_Fig12-02.jpg](img/9781430248095_Fig12-02.jpg)\n\
    图 12-2 . XPLORE 报告的顶部部分\n\n在这个案例中只有 5 个不同的执行计划（这是一段非常简单的 SQL）。例如，`PHV` 922729823\
    \ 只有一个测试，因此其最大和最小成本相同，都是 5046，这并不奇怪。原始计划的成本是 947，所以这个选项显然不是好的选择。如果我们看看那个测试是什么，就能明白为什么结果不好。滚动到图\
    \ 12-3 所示的部分，它显示了“Plans Summary”正下方的“Discovered Plans”。这里我想知道为什么我原始的成本 947 会增加到\
    \ 5046。箭头指向一个超链接，点击它可以带我到同一报告的不同部分，那里详细说明了这次测试的情况。见图 12-3，它显示了报告的“Discovered Plans”部分。\n\
    \n![9781430248095_Fig12-03.jpg](img/9781430248095_Fig12-03.jpg)\n图 12-3 . 你可以通过点击“Total\
    \ Tests”列下的超链接来查看测试详情\n\n一旦我们点击这个超链接，就会被带到报告的一个部分，显示做了什么以及发生了什么。图 12-4 显示了这个特定\
    \ `PHV` 的详细信息。\n\n![9781430248095_Fig12-04.jpg](img/9781430248095_Fig12-04.jpg)\n\
    图 12-4 . `PHV` 922729823 的详细信息\n\n我们可以看到，这个 `PHV` 的测试是将 `\"_hash_join_enabled\"\
    =FALSE`。如果我们查看此 SQL 的 XTRACT 报告的原始执行计划（见图 12-5）就能明白。\n\n![9781430248095_Fig12-05.jpg](img/9781430248095_Fig12-05.jpg)\n\
    图 12-5 . XTRACT 报告中显示的原始执行计划\n\n原始计划是对 `COUNTRIES` 和 `CUSTOMERS` 使用“`TABLE ACCESS\
    \ FULL`”，然后使用哈希连接，接着再将其与对 `SALES` 的“`TABLE ACCESS FULL`”的结果进行另一次哈希连接。此计划的核心是使用哈希连接。现在我们的\
    \ `XPLORE` 通过设置隐藏参数禁用了这个选项，难怪计划的成本变得更高了。如果我们点击图 12-4 中“`Test Id`”列下的数字，就能看到实际选择了哪个计划。这就是我们看到的计划。\n\
    \n```\n|Id |Operation                        |Name         | Cost (%CPU)| Buffers\
    \ |  1Mem |  O/1/M   |\n|  0|SELECT STATEMENT                 |             |\
    \  5046 (100)|    3179 |       |          |\n|  1| SORT ORDER BY             \
    \      |             |  5046   (3)|    3179 |  2048 |     1/0/0|\n|  2|  HASH\
    \ GROUP BY                  |             |  5046   (3)|    3179 |   770K|   \
    \  1/0/0|\n|  3|   MERGE JOIN                    |             |  5008   (2)|\
    \    3179 |       |          |\n|  4|    SORT JOIN                    |      \
    \       |   825   (1)|    1461 |   546K|     1/0/0|\n|  5|     MERGE JOIN    \
    \              |             |   632   (1)|    1461 |       |          |\n|* 6|\
    \      TABLE ACCESS BY INDEX ROWID|COUNTRIES    |     2   (0)|       2 |     \
    \  |          |\n|  7|       INDEX FULL SCAN           |COUNTRIES_PK |     1 \
    \  (0)|       1 |       |          |\n|* 8|      SORT JOIN                  |\
    \             |  630   (1) |    1459 |   615K|     1/0/0|\n|  9|       TABLE ACCESS\
    \ FULL         |CUSTOMERS    |   406   (1)|    1459 |       |          |\n|*10|\
    \    SORT JOIN                    |             |  4183   (2)|    1718 |  1763K|\
    \     1/0/0|\n| 11|     PARTITION RANGE ALL         |             |   494   (3)|\
    \    1718 |       |          |\n| 12|      TABLE ACCESS FULL          |SALES \
    \       |   494   (3)|    1718 |       |          |\n```\n\n正如预期，没有哈希连接的迹象。优化器尊重了我们的要求并避免了它，但这对我们的计划产生了不利影响，所以我们知道不要强制优化器不使用哈希连接。这就是智能分析发挥作用的地方。我们知道哈希连接在这里是个好主意，但\
    \ `XPLORE` 的蛮力方法并不知道。\n\n## 寻找最佳执行计划\n\n那么，关于计划如何变得更糟就讲这么多。让我们回到计划摘要（见图 12-2），现在看看是否有任何改进。我们看到\
    \ `PHV` 2917593948 有一个很大的改进。这里我们看到一个计划，其最小成本是 123（远低于我们原始计划的成本 947）。如果我们再看“Discovered\
    \ Plans”部分，会发现有两个测试完成。如果我们现在点击超链接“2”，就能看到这个 `PHV` 的完整测试（见图 12-6）。\n\n![9781430248095_Fig12-06.jpg](img/9781430248095_Fig12-06.jpg)\n\
    图 12-6 . `PHV` 2917593948 的测试详情\n\n我们立即看到，这个案例成本如此之低的原因是我们将 `optimizer_index_cost_adj`\
    \ 设置为 1。换句话说，我们强制使用了索引。我们可以通过点击超链接 315 来查看测试 315 使用的计划。这就是我们看到的计划（为清晰起见，我已删除了一些列）。\n\
    \n```\n|Id  |Operation                             | Name                 | Cost\
    \ (%CPU)| Reads  |\n```\n"
- fmt: "## 分析原始执行计划\n\n|  0 | SELECT STATEMENT                      |            \
    \          |   123 (100)|     60 |\n|  1 | SORT ORDER BY                     \
    \   |                      |   123  (54)|     60 |\n|  2 | HASH GROUP BY     \
    \                  |                      |   123  (54)|     60 |\n|* 3 | HASH\
    \ JOIN                          |                      |    84  (33)|     60 |\n\
    |* 4 | HASH JOIN                         |                      |    31  (10)|\
    \      4 |\n|* 5 | TABLE ACCESS FULL                | COUNTRIES            | \
    \    3   (0)|      0 |\n|  6 | TABLE ACCESS BY INDEX ROWID      | CUSTOMERS  \
    \          |    27   (8)|      4 |\n|  7 | BITMAP CONVERSION TO ROWIDS     | \
    \                     |            |      4 |\n|  8 | BITMAP INDEX FULL SCAN \
    \        | CUSTOMERS_GENDER_BIX |            |      4 |\n|  9 | PARTITION RANGE\
    \ ALL               |                      |    49  (41)|     56 |\n| 10 | TABLE\
    \ ACCESS BY LOCAL INDEX ROWID| SALES                |    49  (41)|     56 |\n\
    | 11 | BITMAP CONVERSION TO ROWIDS     |                      |            | \
    \    56 |\n| 12 | BITMAP INDEX FULL SCAN         | SALES_PROMO_BIX      |    \
    \        |     56 |\n\nIt looks like using the bitmap indexes is useful in this\
    \ case, as the cost is so low. We have to ask why the optimizer did not choose\
    \ the index in the first place, and for this we would need to look at the statistics\
    \ in the original XTRACT report. We see from the system observations that `optimizer_dynamic_sampling`\
    \ is set to 1 (so in this case no dynamic sampling would have been done). See\
    \ [Figure 12-7](#9781430248095_Ch12.xhtml#Fig7), which shows this from the XTRACT\
    \ report.\n\n![9781430248095_Fig12-07.jpg](Images/9781430248095_Fig12-07.jpg)\n\
    \n[Figure 12-7](#9781430248095_Ch12.xhtml#_Fig7). Optimizer dynamic sampling is\
    \ set to 1.\n\nAs we have a value of 1 for dynamic sampling we know that dynamic\
    \ sampling could take place but in this case did not because the tables involved\
    \ are not unindexed (see [Chapter 8](../Text/9781430248095_Ch08.xhtml) for details\
    \ on cardinality feedback and dynamic sampling). Still not using dynamic sampling\
    \ is not an excuse for getting the plan wrong, but it could explain why the plan\
    \ was not saved by dynamic sampling if statistics are missing.\n\n## 回顾原始测试案例\n\
    \nIf we look at the observations in the original report we see that the many of\
    \ the partition statistics are missing and are out of date (which doesn’t matter\
    \ in my case as the data is static). However as it looks like the statistics are\
    \ the cause of the wrong plan being selected I’ll update them and retry the SQL.\n\
    \nThe SQL I used to collect the new up to date statistics was:\n\n```\nSQL> exec\
    \ dbms_stats.gather_Table_stats(ownname=>'TC64661',\n  tabname=>'SALES', estimate_percent=>dbms_stats.auto_sample_size,cascade=>TRUE)\n\
    \nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_stats.gather_Table_stats(ownname=>'TC64661',\n\
    \  tabname=>'COUNTRIES', estimate_percent=>dbms_stats.auto_sample_size,cascade=>TRUE);\n\
    \nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_stats.gather_Table_stats(ownname=>'TC64661',\n\
    \  tabname=>'CUSTOMERS', estimate_percent=>dbms_stats.auto_sample_size,cascade=>TRUE);\n\
    \nPL/SQL procedure successfully completed.\n```\n\nRemember, in this case I also\
    \ used data from the source tables (which is not always the case). If I collect\
    \ fresh statistics on all of the relevant tables (as shown above) and re-run my\
    \ test case I get this execution plan\n\n```\nSQL> @tc\n\nCOUNTRY_NAME       \
    \                      SUM(AMOUNT_SOLD)\n----------------------------------------\
    \ ----------------\nPoland                                            8447.14\n\
    Denmark                                        1977764.79\nSpain             \
    \                             2090863.44\nFrance                             \
    \            3776270.13\nItaly                                          4854505.28\n\
    United Kingdom                                 6393762.94\nGermany           \
    \                             9210129.22\n\n7 rows selected.\n\nPLAN_TABLE_OUTPUT\n\
    \nSQL_ID  f43bszax8xh07, child number 0\n\nselect  /* ^^unique_id */  country_name,\
    \ sum(AMOUNT_SOLD) from sales s,\ncustomers c, countries co where   s.cust_id=c.cust_id\
    \   and\nco.country_id=c.country_id   and country_name in (\n'Ireland','Denmark','Poland','United\
    \ Kingdom',\n'Germany','France','Spain','The Netherlands','Italy')   group by\n\
    country_name order by sum(AMOUNT_SOLD)\n\nPlan hash value: 1235134607\n\n| Id\
    \  | Operation                       | Name         | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n|   0 | SELECT STATEMENT                |              |       |\
    \       |     4 (100)|          |\n|   1 |  SORT ORDER BY                  | \
    \             |     1 |    87 |     4  (50)| 00:00:01 |\n|   2 |   HASH GROUP\
    \ BY                 |              |     1 |    87 |     4  (50)| 00:00:01 |\n\
    |   3 |    NESTED LOOPS                 |              |     1 |    87 |     2\
    \   (0)| 00:00:01 |\n|   4 |     NESTED LOOPS                |              |\
    \     1 |    52 |     2   (0)| 00:00:01 |\n|   5 |      PARTITION RANGE ALL  \
    \      |              |     1 |    26 |     2   (0)| 00:00:01 |\n|   6 |     \
    \  TABLE ACCESS FULL         | SALES        |     1 |    26 |     2   (0)| 00:00:01\
    \ |\n|   7 |      TABLE ACCESS BY INDEX ROWID| CUSTOMERS    |     1 |    26 |\
    \     0   (0)|          |\n|*  8 |       INDEX UNIQUE SCAN         | CUSTOMERS_PK\
    \ |     1 |       |     0   (0)|          |\n|*  9 |     TABLE ACCESS BY INDEX\
    \ ROWID | COUNTRIES    |     1 |    35 |     0   (0)|          |\n|* 10 |    \
    \  INDEX UNIQUE SCAN          | COUNTRIES_PK |     1 |       |     0   (0)|  \
    \        |\n\nPredicate Information (identified by operation id):\n\n8 - access(\"\
    S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n   9 - filter((\"COUNTRY_NAME\"='Denmark'\
    \ OR \"COUNTRY_NAME\"='France' OR \"COUNTRY_NAME\"='Germany' OR\n            \
    \  \"COUNTRY_NAME\"='Ireland' OR \"COUNTRY_NAME\"='Italy' OR \"COUNTRY_NAME\"\
    ='Poland' OR \"COUNTRY_NAME\"='Spain'\n              OR \"COUNTRY_NAME\"='The\
    \ Netherlands' OR \"COUNTRY_NAME\"='United Kingdom'))\n  10 - access(\"CO\".\"\
    COUNTRY_ID\"=\"C\".\"COUNTRY_ID\")\n\n36 rows selected.\n```\n\nThis plan is even\
    \ better than the one found by XPLORE. It has a cost of 4. We found this plan\
    \ because we used XPLORE to give us a hint. The hint was that using indexes would\
    \ be a good idea for everything except `SALES`. We need to do a `TABLE ACCESS\
    \ FULL` on `SALES` as we are summing sales for a big group of countries. However,\
    \ using `TABLE ACCESS FULL` on the other tables didn’t make sense. It’s not surprising\
    \ that the example came out this way (I planned it that way), but real life examples\
    \ are exactly like this. The steps in the discovery usually go:\n\n1.  Something\
    \ unexpected happens to some SQL (slows down invariably).\n2.  Get the XTRACT\
    \ test case.\n3.  Discover what is wrong with the SQL or its environment by studying\
    \ the report.\n4.  If the previous step fails, run an XPLORE, which sometimes\
    \ finds an interesting change to consider (such as the `optimizer_index_cost_adj`\
    \ in our example above).\n5.  We compare the “good” plan from the XPLORE with\
    \ the “bad” plan from the XTRACT and figure out what the difference is in terms\
    \ of optimizer steps. In our case it was lack of index use.\n6.  Review the XTRACT\
    \ report again to see if you can determine why the action that should have taken\
    \ place did not (in our case it was “why were the indexes not used”).\n7.  Amend\
    \ the original test environment to make the optimizer action take place and compare\
    \ the execution plan costs again.\n8.  If step 7 has the desired effect, do more\
    \ testing, and if everything goes as expected implement the improvement."
