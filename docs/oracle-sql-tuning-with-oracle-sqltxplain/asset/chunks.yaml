    \ then the cardinality feedback information will be lost, as the information held\
    \ in memory is not persistent.\n\nHow Can You Tell If Cardinality Feedback Is\
    \ Used?\n\nThe simplest way to tell if cardinality feedback has been used is to\
    \ use the SQLTXPLAIN report. Click on “Execution Plans” (as shown in [Figure 8-1](#9781430248095_Ch08.xhtml#Fig1))\
    \ and if cardinality feedback has been used for some of your execution plans you\
    \ will see “cardinality_feedback yes” under the “Plan Info” column. See figure\
    \ [Figure 8-5](#9781430248095_Ch08.xhtml#Fig5) for an example.\n\n![9781430248095_Fig08-05.jpg](Images/9781430248095_Fig08-05.jpg)\n\
    \n[Figure 8-5](#9781430248095_Ch08.xhtml#_Fig5) .  “Execution Plans” section shows\
    \ that cardinality feedback was used for an execution plan"
  trans: "\n如果由于某些原因您想使用动态采样，但发现其采样级别过低或未产生预期的执行计划，您可以通过调整 `optimizer_dynamic_sampling`\
    \ 的值来提高采样级别。但请注意，务必在测试系统上验证这些更改，并进行小幅调整以观察其开销是否过大。选择一个具有代表性的 SQL，并观察其在不同参数值下的表现。如果您未对此参数进行过测试，请保持其默认值。\n\
    \n若希望完全禁用此功能，请将该值设为 0。\n\n有些情况下，动态采样是唯一可用的选择。例如，在查询过程中填充的表不会有良好的统计信息（因为它们很可能在收集统计信息的维护窗口期间是空的）。全局临时表就是动态采样适用的一个好例子。\n\
    \n如果说动态采样是您获得正确执行计划的最后机会，那么基数反馈则为您提供了在第二次执行时修正执行计划的机会。\n\n## 基数反馈\n\n基数反馈是一种校正基数（Cardinality）的简单而优雅的方法。它无需陷入无尽的复杂计算来确定正确的基数，而是等待执行计划中每一步的结果，将其存储在共享池中，并在后续执行中参考这些信息，以期这些信息能为我们提供关于上次执行效果的良好洞察。这种简单技术自然有其自身的陷阱，例如，我们如何防止结果在不同的估计值之间来回跳变？让我们看看其中的一些细节。\n\
    \n### 基数反馈如何工作？\n\n如果关于每个 SQL 的信息没有被存储在内存中供同一 SQL 的后续执行访问，基数反馈就无法工作。让我们看看我们可以访问哪些信息。我们将运行一个简单的查询，然后获取该次执行的实际基数和估计基数，接着在动态采样和基数反馈均被禁用的情况下运行两次查询，并比较估计返回行数和实际返回行数。然后我们将启用基数反馈并重复实验。第一步，我们检查\
    \ `optimizer_dynamic_sampling` 的值，发现它被设置为 0，意味着此功能已禁用。\n\n```sql\nSQL> show parameter\
    \ optimizer_dynamic_sampling\nNAME                                 TYPE      \
    \  VALUE\n------------------------------------ ----------- ------------\noptimizer_dynamic_sampling\
    \           integer     0 <<<DS disabled\nSQL> alter system set \"_optimizer_use_feedback\"\
    =FALSE; <<CFB disabled\nSystem altered.\n```\n\n![image](img/sq.jpg) `注意` 我们也可以使用提示\
    \ `/*+ opt_param('_optimizer_use_feedback' 'false') */` 来禁用基数反馈。\n\n接下来，我们创建一个从\
    \ `dba_objects` 填充数据的测试表。我们使用提示 `/*+ gather_plan_statistics */` 以确保能获取到我们想要查看的执行计划的良好统计信息。\n\
    \n```sql\nSQL> create table test1 as select (object_id) from dba_objects;\nTable\
    \ created.\nSQL> select /*+ gather_plan_statistics */ count(*) from test1;\n \
    \ COUNT(*)\n```\n\n现在我们使用 `dbms_xplan.display_cursor` 来获取执行计划以及与该执行相关的统计信息。这是\
    \ Oracle 11g 引入的一个非常不错的功能。\n\n```sql\nSQL> select * from table(dbms_xplan.display_cursor(null,null,'ALLSTATS\
    \ LAST'));\nPLAN_TABLE_OUTPUT\nSQL_ID  gtukt6kw8yjm6, child number 0\n\nselect\
    \ /*+ gather_plan_statistics */ count(*) from test1\nPlan hash value: 3896847026\n\
    \n| Id  | Operation          | Name  | Starts | E-Rows | A-Rows |   A-Time   |\
    \ Buffers | Reads  |\n\n|   0 | SELECT STATEMENT   |       |      1 |        |\
    \      1 |00:00:00.09 |     116 |    112 |\n|   1 |  SORT AGGREGATE    |     \
    \  |      1 |      1 |      1 |00:00:00.09 |     116 |    112 |\n|   2 |   TABLE\
    \ ACCESS FULL| TEST1 |      1 |   9965 |  73532 |00:00:00.18 |     116 |    112\
    \ |\n\n14 rows selected.\n```\n\n我们在这行看到估计值 (`E-Rows`) 与实际行数 (`A-Rows`) 相比相当差。这个估计值差到足以触发使用基数反馈，但在本例中该功能是关闭的。因此，如果我们第二次运行查询，预计\
    \ `E-Rows` 不会有改善；而实际情况确实如此。\n\n```sql\nSQL> select /*+ gather_plan_statistics\
    \ */  count(*) from test1;\n  COUNT(*)\n\nSQL> select * from table(dbms_xplan.display_cursor(null,null,'ALLSTATS\
    \ LAST'));\nPLAN_TABLE_OUTPUT\nSQL_ID  gtukt6kw8yjm6, child number 0\n\nselect\
    \ /*+ gather_plan_statistics */ count(*) from test1\nPlan hash value: 3896847026\n\
    \n| Id  | Operation          | Name  | Starts | E-Rows | A-Rows |   A-Time   |\
    \ Buffers | Reads  |\n\n|   0 | SELECT STATEMENT   |       |      1 |        |\
    \      1 |00:00:00.09 |     116 |    112 |\n|   1 |  SORT AGGREGATE    |     \
    \  |      1 |      1 |      1 |00:00:00.09 |     116 |    112 |\n|   2 |   TABLE\
    \ ACCESS FULL| TEST1 |      1 |   9965 |  73532 |00:00:00.18 |     116 |    112\
    \ |\n\n14 rows selected.\n```\n\n此计划的估计基数 (`E-Rows`) 并未改善。`E-Rows` 值没有变化；尽管估计值偏差很大，优化器并未做出任何更改。我们实验的下一步是启用基数反馈。\n\
    \n```sql\nSQL> alter system set \"_optimizer_use_feedback\"=TRUE;\nSystem altered.\n\
    ```\n\n现在我们重复整个步骤序列，发现在最后一步我们得到了：\n\n```sql\nSQL> select * from table(dbms_xplan.display_cursor(null,null,'ALLSTATS\
    \ LAST'));\nPLAN_TABLE_OUTPUT\nSQL_ID  gtukt6kw8yjm6, child number 3\n\nselect\
    \ /*+ gather_plan_statistics */ count(*) from test1\nPlan hash value: 3896847026\n\
    \n| Id  | Operation          | Name  | Starts | E-Rows | A-Rows |   A-Time   |\
    \ Buffers |\n\n|   0 | SELECT STATEMENT   |       |      1 |        |      1 |00:00:00.02\
    \ |     116 |\n|   1 |  SORT AGGREGATE    |       |      1 |      1 |      1 |00:00:00.02\
    \ |     116 |\n|   2 |   TABLE ACCESS FULL| TEST1 |      1 |  73532 |  73532 |00:00:00.18\
    \ |     116 |\n\nNote\n-----\n- cardinality feedback used for this statement\n\
    ```\n\n我们在 `Note` 部分看到优化器留下了一条信息，表明基数反馈已被使用。在上面的例子中，我们最初估计有 9,965 行，实际行数为 73,532\
    \ 行。在没有基数反馈、动态采样或新对象统计信息的情况下，我们最初的估计相当糟糕。由于估计行数“显著”不同，因此使用了基数反馈。虽然没有明文规定“显著”差异是多少，但大约\
    \ 8 倍的差异就足够了。\n\n系统内置了安全机制，以防止基数在不同估计值之间来回跳变，因此经过少量迭代后，计划就会稳定下来。实际基数存储在 `SGA`\
    \ 中这一事实也解释了为什么基数反馈信息不是持久的——如果实例重启，基数反馈信息将会丢失，因为内存中保存的信息并非持久化存储。\n\n### 如何判断是否使用了基数反馈？\n\
    \n判断基数反馈是否已被使用的最简单方法是使用 `SQLTXPLAIN` 报告。点击“执行计划”（如 图 8-1 所示），如果您的某些执行计划使用了基数反馈，您将在“Plan\
    \ Info”列下看到 `cardinality_feedback yes`。示例请参见 图 8-5。\n\n![9781430248095_Fig08-05.jpg](img/9781430248095_Fig08-05.jpg)\n\
    \n图 8-5 . “执行计划”部分显示某个执行计划使用了基数反馈\n"
- fmt: "To emphasize the point that cardinality feedback is a backup mechanism, its\
    \ use is also highlighted in the “Observations” section of the SQLTXPLAIN report.\
    \ See section in [Figure 8-6](#9781430248095_Ch08.xhtml#Fig6), which you can reach\
    \ by clicking on the “Observations” hyperlink from the top of the main SQLTXPLAIN\
    \ report.\n\n![9781430248095_Fig08-06.jpg](Images/9781430248095_Fig08-06.jpg)\n\
    \n[Figure 8-6](#9781430248095_Ch08.xhtml#_Fig6) .  Cardinality feedback usage\
    \ is shown as an observation of type PLAN_CONTROL\n\n## When is Cardinality Feedback\
    \ used?\n\nLack of statistics or “complex” predicates that create queries with\
    \ hard-to-determine cardinalities will give cardinality feedback a chance to improve\
    \ E-Rows. Here is a SQL with a “complex” predicate:\n\n```\nSQL> select product_name\
    \ from order_items ord, product_information pro\n  where ord.unit_price= 15 and\
    \ quantity > 1\n  and pro.product_id = ord.product_id;\n```\n\nHere we have a\
    \ filter on `unit_price` (must be equal to 15 and `quantity` must be > 1). This\
    \ situation is not very rare so cardinality feedback could be used often. However,\
    \ remember that we mentioned that the statement needs to execute at least once\
    \ for the optimizer to store the actual rows so that it can compare them to the\
    \ estimated number of rows. If dynamic sampling has already been used (because\
    \ it was needed and it was not disabled), then cardinality feedback will not be\
    \ used. Also because of the problems that can be introduced by bind variables\
    \ (especially if you have skewed data), cardinality feedback will not be used\
    \ for parts of the statement that involve bind variables.\n\nIf you find cardinality\
    \ feedback is not useful for your site or SQL statement you can, with the assistance\
    \ of support, disable it with\n\n```\nSQL> alter system set \"_optimizer_use_feedback\"\
    \ = FALSE;\n```\n\nIf you want to disable an individual statement, then you can\
    \ put this hint in the SQL\n\n```\n/*+ opt_param('_optimizer_use_feedback' 'false')\
    \ */\n```\n\nA `select sysdate from dual` becomes\n\n```\nSQL> select /*+ opt_param('_optimizer_use_feedback'\
    \ 'false') */ sysdate from dual;\n```\n\nCardinality feedback is not persistent\
    \ through instance restarts, so it is better to get your statistics from other\
    \ sources, preferably from `dbms_stats`, but remember that cardinality feedback\
    \ is enabled by default.\n\n## How Do Cardinality Feedback and Dynamic Sampling\
    \ Work Together?\n\nI’m sure you can imagine that with dynamic sampling and cardinality\
    \ feedback both working on the same statement, there could be conflicts, and the\
    \ amount of overhead could be doubled. There are no controls on cardinality feedback\
    \ (except to disable it), unlike dynamic sampling, which can be set for different\
    \ criteria and different levels of sample collection. Oracle has thought about\
    \ these potential conflicts and overheads by having built-in safeties. For example,\
    \ if dynamic sampling is used, cardinality feedback will not be used. Dynamic\
    \ sampling can be used more than once for an individual statement, whereas collection\
    \ of information for an individual SQL statement by cardinality feedback is only\
    \ allowed to run a limited number of times. The safeties are there to catch problems,\
    \ but the care has been taken to ensure the safeties are not too much of an overhead.\n\
    \nNow that we’ve got some understanding about these two features let’s see an\
    \ example mystery case involving both of these features.\n\n## The Case of the\
    \ Identical Twins\n\nThis is the kind of situation that occurs frequently in the\
    \ DBA world: two apparently identical systems, one cloned from the other but with\
    \ widely different performance in some SQL. Naturally you can suspect different\
    \ DDL, statistics, or operational procedures, different resource allocation, different\
    \ workloads, etc. When the hardware is identical and the databases are cloned\
    \ from each other, the number of choices becomes more limited. In this case we\
    \ discover by experimentation that one particular SQL is behaving well on system\
    \ A (say, New York) and the cloned system B (say, London) is behaving badly. The\
    \ SQL is the same, the systems are the same, the parameter settings are the same.\
    \ Let me show you the steps you could follow to solve a problem like this using\
    \ SQLT.\n\nThere are many ways you could solve this problem. No doubt you could\
    \ do it just by collecting 10046 trace files, but we’re looking at how you would\
    \ do this with SQLTXPLAIN. Step by step. First, if we collect SQLT for both SQL\
    \ statements, one SQLT XECUTE report for New York (as it executes normally) and\
    \ one SQLT XTRACT report for the evil twin in London (as it takes too long to\
    \ execute). From the top of SQLTXPLAIN report (see [Figure 8-7](#9781430248095_Ch08.xhtml#Fig7))\
    \ we look at the list of execution plans by clicking on “Execution Plans”.\n\n\
    ![9781430248095_Fig08-07.jpg](Images/9781430248095_Fig08-07.jpg)\n\n[Figure 8-7](#9781430248095_Ch08.xhtml#_Fig7)\
    \ .  The top of the SQLT report. We click on “Execution Plans”\n\nThis is for\
    \ the evil system. We see that cardinality feedback is in play, so something must\
    \ have happened to make this feature kick in. We also see ([Figure 8-8](#9781430248095_Ch08.xhtml#Fig8))\
    \ that the estimated cardinality is very different for some of the executions\
    \ (where cardinality feedback was used). We also see that the `optimizer_cost`\
    \ is very high where cardinality feedback was used.\n\n![9781430248095_Fig08-08.jpg](Images/9781430248095_Fig08-08.jpg)\n\
    \n[Figure 8-8](#9781430248095_Ch08.xhtml#_Fig8) .  The London evil twin shows\
    \ cardinality feedback being used and high values for estimated cardinality\n\n\
    Since we are comparing the good and bad systems, we should now look at the execution\
    \ plans for the good system in New York. Remember these two systems are identical\
    \ (same hardware, same database versions, similar volumes of data, same tables,\
    \ and indexes). Here is the same part of the report for the good system (see [Figure\
    \ 8-9](#9781430248095_Ch08.xhtml#Fig9))\n\n![9781430248095_Fig08-09.jpg](Images/9781430248095_Fig08-09.jpg)\n\
    \n[Figure 8-9](#9781430248095_Ch08.xhtml#_Fig9) .  The New York good twin shows\
    \ dynamic sampling and smaller values for estimated cardinality\n\nWe also see\
    \ that there are many more different plans in London than there are in New York.\
    \ We know that dynamic sampling and cardinality feedback are sometimes used when\
    \ poor statistics are involved, so it is a reasonable route of inquiry to look\
    \ at the statistics of the main objects in the query. We should be thinking throughout\
    \ our investigation of the information presented by SQLT: “Why was dynamic sampling\
    \ used and why was cardinality feedback used and why are they different?” From\
    \ the top of the report we click on “Statistics”. We see for the good system ([Figure\
    \ 8-10](#9781430248095_Ch08.xhtml#Fig10)) that we have a “Y” under the “Temp”\
    \ column. Also we have no values under “Num Rows” or “Sample Size” or “Perc”.\
    \ `TABLE4` is of interest because as we’ll see the same part of the report for\
    \ the bad system is very different in this respect.\n\n![9781430248095_Fig08-10.jpg](Images/9781430248095_Fig08-10.jpg)\n\
    \n[Figure 8-10](#9781430248095_Ch08.xhtml#_Fig10) .  The table statistics for\
    \ the good system"
