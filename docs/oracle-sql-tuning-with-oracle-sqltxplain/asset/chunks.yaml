    \n![9781430248095_Fig05-05.jpg](img/9781430248095_Fig05-05.jpg)\n\n**图 5-5**  转换后的最终查询\n\
    \n这个查询在语义上看起来和原始查询一样吗？原始查询是：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\n\
