    \     \"COUNTRY_NAME\"='Italy' OR \"COUNTRY_NAME\"='Poland' OR\n           \"\
    COUNTRY_NAME\"='Spain' OR \"COUNTRY_NAME\"='The Netherlands' OR\n           \"\
    COUNTRY_NAME\"='United Kingdom'))\n\nNow we have reached that point in the test\
    \ case where we can do some work on exploring the set up of the environment and\
    \ changing things to see what we can achieve or to see how the SQL, under the\
    \ microscope can be influenced to do what we want.\n\n## Exploring the Execution\
    \ Plan\n\nNow that we have a test case, we can explore the execution plan by changing\
    \ all those things that can affect the execution plan. I’ve listed some of them\
    \ below:\n\n- Optimizer parameters\n- SQL hints\n- Optimizer versions\n- Structure\
    \ of the SQL\n- Adding or removing indexes\n- System statistics\n- Object Statistics\n\
    \nOf these environmental factors, the last two require the setting of object statistics\
    \ through routines. Setting object statistics can be done but is beyond the scope\
    \ of this book. System statistics can also be set and tested; but again, this\
    \ is not generally a test that is carried out because it implies you are planning\
    \ for a different machine. (I give a short example of this at the end of the section.)\
    \ The things most commonly explored using the test case are optimizer parameters\
    \ and the structure of the SQL.\n\nWhile this kind of testing can be done in other\
    \ ways (`set autotrace`, `EXPLAIN PLAN`, etc.), setting up the environment can\
    \ be time consuming and tricky. Even if you do set up an environment to be a duplicate\
    \ of another environment, how will you know you’ve got everything right? The optimizer\
    \ works the same way and produces an execution plan when you test. With a SQLT\
    \ test case everything is brought in, and nothing is missing. You get the environment\
    \ right every time. If you copy the data you will also have a very similar copy\
    \ of the source environment. An additional advantage of this method of working\
    \ is that the system environment can also be changed.\n\n## Optimizer Parameters\n\
    \nIf a developer comes to you and says my SQL would work fine if `optimizer_index_cost_adj`\
    \ was set to 10, you can now test the suggestion with a test case in your own\
    \ test environment. Of course, good (or bad) suggestions for tuning can come from\
    \ any source; the point here is that you can take a suggestion, put it through\
    \ the optimizer via the test case you built, and see what the cost and execution\
    \ plan will be. Below we see such an example. Notice that I am setting the optimizer\
    \ parameter at the session level, but this would normally be a pre-cursor to setting\
    \ the parameter at the system level. By the way I would not suggest you make changes\
    \ like this on a real system without extensive testing, there is too much scope\
    \ for other SQL to be affected by changes like this. This is an exploration of\
    \ what the optimizer might be able to do for us if the environment were different.\
    \ So here’s the result.\n\n```\nPlan hash value: 2917593948\n\n|Id |Operation\
    \                             |Name                |Rows |Cost(%CPU)|Pstart|Pstop\
    \ |\n|  0|SELECT STATEMENT                      |                    |     | \
    \ 593(100)|      |      |\n|  1| SORT ORDER BY                        |      \
    \              |    9|  593 (12)|      |      |\n|  2|  HASH GROUP BY        \
    \               |                    |    9|  593 (12)|      |      |\n|* 3| \
    \  HASH JOIN                          |                    | 435K|  555  (6)|\
    \      |      |\n|* 4|    HASH JOIN                         |                \
    \    |26289|  243  (2)|      |      |\n|* 5|     TABLE ACCESS FULL           \
    \     |COUNTRIES           |    9|    3  (0)|      |      |\n|  6|     TABLE ACCESS\
    \ BY INDEX ROWID      |CUSTOMERS           |55500|  239  (1)|      |      |\n\
    |  7|      BITMAP CONVERSION TO ROWIDS     |                    |     |      \
    \    |      |      |\n|  8|       BITMAP INDEX FULL SCAN         |CUSTOMERS_GENDER_BIX|\
    \     |          |      |      |\n|  9|    PARTITION RANGE ALL               |\
    \                    | 918K|  306  (7)|    1 |   28 |\n| 10|     TABLE ACCESS\
    \ BY LOCAL INDEX ROWID|SALES               | 918K|  306  (7)|    1 |   28 |\n\
    | 11|      BITMAP CONVERSION TO ROWIDS     |                    |     |      \
    \    |      |      |\n| 12|       BITMAP INDEX FULL SCAN         |SALES_PROMO_BIX\
    \     |     |          |    1 |   28 |\n\nPredicate Information (identified by\
    \ operation id):\n3 - access(\"S\".\"CUST_ID\"=\"C\".\"CUST_ID\")\n4 - access(\"\
    CO\".\"COUNTRY_ID\"=\"C\".\"COUNTRY_ID\")\n5 - filter((\"COUNTRY_NAME\"='Denmark'\
    \ OR \"COUNTRY_NAME\"='France' OR\n           \"COUNTRY_NAME\"='Germany' OR \"\
    COUNTRY_NAME\"='Ireland' OR\n           \"COUNTRY_NAME\"='Italy' OR \"COUNTRY_NAME\"\
    ='Poland' OR\n           \"COUNTRY_NAME\"='Spain' OR \"COUNTRY_NAME\"='The Netherlands'\
    \ OR\n           \"COUNTRY_NAME\"='United Kingdom'))\n```\n\nIn this example,\
    \ I’ve removed some of the execution plan columns for clarity. We can see that\
    \ the cost has gone down from 947 to 593. Let me emphasize this next point, as\
    \ it is very important. This does not mean that changing `optimizer_index_cost_adj`\
    \ is a good idea: rather, this means that if the optimizer environment were set\
    \ correctly the optimizer could choose a better plan. The next step in this scenario\
    \ would be to investigate why the optimizer is choosing a sub-optimal plan. The\
    \ important fact to remember here is that the test case allows you to confirm\
    \ that there is a better plan.\n\n## Adding and Removing Hints\n\nIn my previous\
    \ example we saw that setting session parameters can change the execution plan\
    \ and that on our test system we can see those changes without having all the\
    \ data. We saw that setting `optimizer_index_cost_adj` made a difference and that\
