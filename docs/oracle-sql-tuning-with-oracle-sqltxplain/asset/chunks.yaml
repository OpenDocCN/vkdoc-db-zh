    may be wrong. Other ways in which statistics can be wrong is by being out of date.
    Let’s look at the example in [Figure 3-1](#9781430248095_Ch03.xhtml#Fig1). In
    this example we see “Table Statistics” for TABLE_A, a non-partitioned table with
    a Num Rows value of 87,116, which was 100 percent analyzed.


    ![9781430248095_Fig03-01.jpg](Images/9781430248095_Fig03-01.jpg)


    [Figure 3-1](#9781430248095_Ch03.xhtml#_Fig1) .  In the “Table Statistics” section
    you can see the number of rows in a table, the sample size, and the percentage
    of the total data set that this sample represents


    Object statistics are a vital input to the CBO, but even these can lead the optimizer
    astray when the statistics are out of date. The CBO also uses past execution history
    to determine if it needs better sampling (cardinality feedback) or makes use of
    bind peeking to determine which of many potential execution plans to use. Many
    people rely on setting everything on AUTO but this is not a panacea. If you don’t
    understand and monitor what the auto settings are doing for you, you may not spot
    errors when they happen.


    Just to clarify, in the very simplest terms, why does the optimizer get it wrong
    when the statistics are out of date? After all once you’ve collected all that
    statistical information about your tables, why collect it again? Let’s do a thought
    experiment just like Einstein sitting in the trolley bus in Vienna.'
  trans: '

    # 对象统计信息如何使你的执行计划出错


    在本章中，我们学习了基于成本的优化器算法的输入项以及这些输入项如何影响优化器。为了使优化器能够有效且高效地工作，需要以反映你的环境使用情况和业务需求的方式来考虑和设置这些输入项。`SQLTXPLAIN`
    通过收集信息并以易于理解的方式展示，有助于处理所有环境方面的考量。`SQLTXPLAIN` 还能有帮助地突出显示那些异常元素，以便你能更严格地审视它们，并决定这些元素是否必要且是否符合你的意图。在下一章中，我们将讨论
    `CBO` 环境中最重要的方面之一：对象统计信息。这些统计信息到目前为止收集起来最耗时，并且非常频繁地是性能问题的根源。我们将探讨缺乏统计信息、统计信息收集时机不当以及这项重要维护工作的其他要素所带来的影响。


    ![图片](img/frontdot.jpg)


    在本章中，我们将讨论一个如果你正在进行 `SQL` 调优就被认为非常重要的话题。收集对象统计信息至关重要；这就是为什么 Oracle 花费了如此多的时间和精力，使统计信息收集过程尽可能简单和轻松。他们知道，在大多数情况下，`DBA`
    们在压力下需要在允许的微小维护窗口内尽快完成工作，他们会选择最简单直接的方式。如果有一个复选框写着“点击我，你所有的统计信息烦恼都将结束”，他们会点击它，然后转向下一个问题。


    当然，自动程序多年来已经改进，用于自动收集对象（尤其是列）统计信息的最新算法非常复杂。然而，这并不意味着你可以忽视它们。你需要关注正在收集的内容，并确保它适合你的数据结构和查询。在本章中，我们将介绍分区如何影响你的执行计划和统计信息捕获。我们还将探讨如何处理抽样错误、如何锁定统计信息以及何时应该执行此操作。如果这听起来很无聊，那么
    `SQLT` 就介入其中，使整个过程变得更简单、更快速。让我们从对象统计信息开始。


    ## 什么是统计信息？


    当 `SQL` 性能不佳时，质量差的统计信息是最常见的原因。质量差的统计信息涵盖范围广泛的可能缺陷：


    *   样本量不足。

    *   样本收集不频繁。

    *   某些对象没有样本。

    *   在不需要时收集直方图。

    *   在需要时未收集直方图。

    *   在错误的时间收集统计信息。

    *   在直方图上使用非常小的样本量进行收集。

    *   未使用更高级的选项（如扩展统计信息）来设置相关列之间的关联。

    *   依赖自动样本收集而不检查收集的内容。


    至关重要的是要认识到，基于成本的优化器 (`CBO`) 的使命是制定一个运行快速的执行计划，并快速制定它。让我们稍微分解一下：


    *   “快速制定。” 优化器几乎没有时间进行解析或获取对象的统计信息，或者尝试多种连接方法的变体，更不用说检查 `SQL` 优化并制定它认为良好的计划了。它不能花费很长时间来做这件事，否则，制定计划所花的时间可能比执行工作本身还要长。

    *   “运行快速。” 这里，关键理念是“实际耗时”很重要。`CBO` 并非试图最小化 `I/O` 或 `CPU` 周期，它只是试图减少经过的时间。如果你有多个
    `CPU`，并且 `CBO` 能有效地利用它们，它将选择并行执行计划。


    第 1 章 讨论了基数，即满足谓词的行数。这意味着任何操作的成本由三类操作组成：


    *   单块读取的成本

    *   多块读取的成本

    *   执行所有操作所用 `CPU` 的成本


    当你看到一个成本为 1,000 时，这实际意味着什么？执行计划中一个操作的成本为 1,000，意味着所花费的时间大约相当于进行 1,000 次单块读取的成本。所以在这种情况下，1,000
    x 12 毫秒，得出 12 秒（12 毫秒是典型的单块读取时间）。


    那么，`CBO` 采取哪些步骤来确定最佳执行计划呢？用非常宽泛的术语来说，查询会被转换（应用任何适用的快捷方式），然后通过查看表的大小并决定哪个表在连接中作为内表、哪个作为外表来生成计划。会尝试不同的连接顺序和不同的访问方法。这里的“尝试”是指优化器将经历有限数量的步骤（记住，它的目标是快速制定计划）来计算每个选项的成本，并通过排除过程得到最佳计划。有时优化器尝试的选项并不是完整的计划列表，这意味着它可能错过最佳计划；但这极为罕见。


    这是操作的估算阶段。如果正在评估的操作是全表扫描，这将基于行数、行的平均长度、磁盘子系统的速度等进行估算。


    现在我们知道了优化器在尝试为你获取正确计划时做了什么，我们可以看看当对象统计信息具有误导性时可能会出什么问题。


    ## 对象统计信息


    构成对象统计信息的主要组件是表和索引。为简化讨论，我们将主要关注表统计信息，但相同的原则适用于所有对象。在上面提到的硬解析的估算阶段，即估算表的大小和选择连接方式的阶段，表中的行数至关重要。一个简单的例子是在嵌套循环连接和哈希连接之间做出选择。如果行数错误，那么连接方法可能就是错误的。统计信息可能出错的其他方式是过时。让我们看图
    3-1 中的示例。在此示例中，我们看到 `TABLE_A`（一个非分区表）的“表统计信息”，其 `行数` 值为 87,116，分析比例为 100%。


    ![9781430248095_Fig03-01.jpg](img/9781430248095_Fig03-01.jpg)


    图 3-1 。在“表统计信息”部分，你可以看到表中的行数、样本大小以及此样本代表的数据集总百分比


    对象统计信息是 `CBO` 的重要输入，但即使这些信息在统计信息过时的情况下也可能误导优化器。`CBO` 还会使用过去的执行历史记录来确定是否需要更好的抽样（基数反馈），或者利用绑定变量窥探来确定使用众多潜在执行计划中的哪一个。许多人依赖将所有设置为
    `AUTO`，但这并非万能药。如果你不了解并监控自动设置为你做了什么，当错误发生时你可能无法察觉。


    为了澄清，用最简单的话说，为什么当统计信息过时优化器会出错？毕竟，一旦你收集了关于表的所有这些统计信息，为什么还要再次收集呢？让我们做一个思想实验，就像坐在维也纳电车上的爱因斯坦那样。

