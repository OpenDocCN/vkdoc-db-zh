    set to `TRUE` (which is the default value, but its value was set in the `spfile`).
    If we look at this page  (see [Figure 14-10](#9781430248095_Ch14.xhtml#Fig10))
    we see the descriptions of the parameters.


    ![9781430248095_Fig14-09.jpg](Images/9781430248095_Fig14-09.jpg)


    Figure 14-9 .  The descriptions of the intialization parameters


    Finally we can look at the historical information that SQHC can provide. All the
    usual information is there: disk reads, buffer gets, etc. Just as in SQLT we can
    use this information to relate the history to any change in the execution plan.


    ![9781430248095_Fig14-10.jpg](Images/9781430248095_Fig14-10.jpg)


    [Figure 14-10](#9781430248095_Ch14.xhtml#_Fig10) .  The historical information
    from our example SQL. (Only the left hand side of the report is shown)


    As you can see, the second report from the SQLHC report is useful because it shows
    the metrics related to the statistics execution, as well as reports on non-default
    parameters and a historical view of the execution of your SQL. The historical
    information in conjunction with the plan hash value (the unique identifier for
    a specific execution plan [PHV for short]), and the system initialization parameters
    can be very useful in working out what is happening with your SQL.


    The Execution Plan Report


    The next report shows the execution plan for all the SQLs captured. See [Figure
    14-11](#9781430248095_Ch14.xhtml#Fig11), which shows the execution plan for the
    latest execution.


    ![9781430248095_Fig14-11.jpg](Images/9781430248095_Fig14-11.jpg)


    [Figure 14-11](#9781430248095_Ch14.xhtml#_Fig11) .  The left hand side of the
    report showing the execution plan of the last execution


    I’ve shown only the left hand side of the report, but all the usual columns are
    present for the execution plan. This execution plan shows a parallelized execution
    with a hash join between SALES and the hash join of COUNTRIES and CUSTOMERS. As
    you would for an XTRACT report look at the steps and determine if they are appropriate,
    later in this chapter we’ll also see a SQL monitor report that shows where time
    was spent during the execution. Look at the expected rows, look at the cost of
    each line and see if they meet your expectations. Additionally you can see the
    historical execution plans for the same SQL. Remember all this information is
    available from a system where you have NOT installed SQLT.


    The Monitor Reports


    There are two types of monitor reports. The first one is the previously mentioned
    HTML file that provides a summary of the activity of all the SQL being monitored.
    The second type of monitor report consists of the details of execution plans.
    A zip file includes a separate report with the details for each execution plan.


    The SQL Monitor Summary Report


    The purpose of the first report is to put the SQL under investigation into some
    sort of context. After all, if you are tuning an SQL statement, you want to make
    sure it’s having a significant effect on the system. In other words, there’s no
    point in tuning an SQL statement so that it takes half the time (if it’s only
    run once), and it uses only 1 percent of the system resources when there’s another
    statement that takes 50 percent of the system resources.


    This summary view has three panes: “SQL Text”, “Top Activity”, and “Details”.
    You can expand and minimize these sections by clicking the minimize icons on the
    right hand side of the pane. The “Detail” pane has four icons, which cover “Activity”,
    “Statistics”, “Plan”, and “SQL Monitoring”.


    *   Activity: This shows the active sessions in a graphic form and shows what
    the active sessions were doing. For example in [Figure 14-12](#9781430248095_Ch14.xhtml#Fig12)
    we see the “Activity” button in the “Details” section, which shows a spike in
    “direct path read” and “db file sequential read” near the end of the sampling
    interval.


    ![9781430248095_Fig14-12.jpg](Images/9781430248095_Fig14-12.jpg)


    [Figure 14-12](#9781430248095_Ch14.xhtml#_Fig12) .  The Detail section activity
    chart


    *   Statistics: Shows the cursor details, including such details as number of
    executions, memory usage, cursor load times, number of versions of the cursor
    and database time used as well as I/O requests and many other details as shown
    in [Figure 14-13](#9781430248095_Ch14.xhtml#Fig13).


    ![9781430248095_Fig14-13.jpg](Images/9781430248095_Fig14-13.jpg)


    [Figure 14-13](#9781430248095_Ch14.xhtml#_Fig13) .  Showing an example statistics
    page from the Details section of the report


    *   Plan: Shows the execution plan in graphic form. An example of this is shown
    in [Figure 14-14](#9781430248095_Ch14.xhtml#Fig14), showing the plan in left to
    right style.


    ![9781430248095_Fig14-14.jpg](Images/9781430248095_Fig14-14.jpg)


    [Figure 14-14](#9781430248095_Ch14.xhtml#_Fig14) .  Shows the plan section of
    the Detail tab


    *   SQL Monitoring: Shows the duration, users, serial/parallel status, and other
    statistics related to the SQL ID. An example of this is shown in [Figure 14-15](#9781430248095_Ch14.xhtml#Fig15).


    ![9781430248095_Fig14-15.jpg](Images/9781430248095_Fig14-15.jpg)


    [Figure 14-15](#9781430248095_Ch14.xhtml#_Fig15) .  The SQL Monitor tab on the
    Details page


    This report shows that for the current SQL text, almost 100% of the database activity
    was that SQL. We see in the bottom half of the report that my SQL took 10 seconds
    to run and that it ran in parallel. The result of this was that it used almost
    20 seconds of CPU time.


    The SQL Monitor Detail Reports'
  trans: '

    # SQLHC 报告的第二页


    SQLHC 报告的第二页可能包含许多信息片段：例如实例参数。某些部分可能不包含信息：例如，在我的案例中，没有正在使用的配置文件。实际上，如果你转到报告中的该部分，你会看到如下文本：


    ```

    Available in 10g or higher. If this section is empty that means there are no profiles
    for this SQL.

    ```


    （我们在第 6 章中更详细地介绍了配置文件。）图 14-6 展示了 HTML 报告的标题部分。


    ![9781430248095_Fig14-06.jpg](img/9781430248095_Fig14-06.jpg)


    图 14-6 . 我们在此看到 SQLHC 报告第 2 页的标题部分


    通过标题，你可以通过超链接链接到所有提到的部分。这份报告中包含更详细的统计信息。例如，我们拥有所有系统参数（不仅仅是默认参数）以及参数的描述。DBA 应该扫描此部分，以确保对系统的理解与此处看到的内容一致。例如，我看到
    `memory_target` 被设置为 780M（见图 14-7）。


    ![9781430248095_Fig14-07.jpg](img/9781430248095_Fig14-07.jpg)


    图 14-7 . 报告实例参数部分的一个片段


    这符合我的预期吗？在我的案例中，是的。这是为了根据你对实例的期望来检查实例设置。另一个例子可能是 `optimizer_mode` 被设置为 ALL_ROWS。幸运的是，我知道这是默认值，也是我期望的值。对于系统上的每个参数，你都应该很好地理解它为何被如此设置。在图
    14-8 中，我们看到了非默认参数。你应该更加关注这些参数，因为 SQLHC 告诉你这些设置是不同寻常的。


    ![9781430248095_Fig14-08.jpg](img/9781430248095_Fig14-08.jpg)


    图 14-8 . 报告的非默认系统参数部分


    我们在图中看到，参数的默认值被高亮显示，以及它们当前被手动设置的值。例如，`_optimizer_use_feedback` 被设置为 `TRUE`（这是默认值，但它的值是在
    `spfile` 中设置的）。如果我们查看此页面（见图 14-10），我们可以看到参数的描述。


    ![9781430248095_Fig14-09.jpg](img/9781430248095_Fig14-09.jpg)


    图 14-9 . 初始化参数的描述


    最后，我们可以查看 SQHC 能够提供的历史信息。所有常用信息都在那里：磁盘读取、缓冲区获取等。就像在 SQLT 中一样，我们可以利用这些信息将历史与执行计划的任何变更关联起来。


    ![9781430248095_Fig14-10.jpg](img/9781430248095_Fig14-10.jpg)


    图 14-10 . 我们示例 SQL 的历史信息。（仅显示了报告的左侧部分）


    如你所见，SQLHC 报告的第二份报告非常有用，因为它显示了与统计执行相关的指标，并报告了非默认参数以及 SQL 执行的历史视图。历史信息结合计划哈希值（特定执行计划的唯一标识符，简称[PHV]）以及系统初始化参数，对于分析你的
    SQL 出了什么问题非常有用。


    # 执行计划报告


    下一份报告展示了所有捕获到的 SQL 的执行计划。参见图 14-11，该图显示了最近一次执行的执行计划。


    ![9781430248095_Fig14-11.jpg](img/9781430248095_Fig14-11.jpg)


    图 14-11 . 显示上次执行计划的报告左侧部分


    我仅展示了报告的左侧部分，但执行计划的所有常用列都存在。该执行计划显示了一个并行执行，其中 SALES 表与 COUNTRIES 和 CUSTOMERS 的哈希连接进行哈希连接。就像你处理
    XTRACT 报告一样，查看各个步骤并判断它们是否合适，本章稍后我们还会看到一份 SQL 监控报告，该报告展示了执行期间时间花费在何处。查看预期的行数，查看每行的成本，看看是否符合你的预期。此外，你还可以看到同一
    SQL 的历史执行计划。请记住，所有这些信息都可以从一个**未安装** SQLT 的系统中获得。


    # 监控报告


    有两种类型的监控报告。第一种是前面提到的 HTML 文件，它提供了所有被监控 SQL 活动的摘要。第二种监控报告由执行计划的详细信息组成。一个 ZIP 文件包含每个执行计划的单独详细报告。


    ## SQL 监控摘要报告


    第一份报告的目的是将正在调查的 SQL 置于某种上下文之中。毕竟，如果你在调整一条 SQL 语句，你希望确保它对系统有显著影响。换句话说，如果一条 SQL
    语句只运行一次，并且只占用 1%的系统资源，而另一条语句却占用 50%的系统资源，那么将第一条语句调整为只需一半时间是没有意义的。


    此摘要视图有三个窗格：“SQL 文本”、“顶级活动”和“详细信息”。你可以通过点击窗格右侧的最小化图标来展开或最小化这些部分。“详细信息”窗格有四个图标，分别覆盖“活动”、“统计信息”、“计划”和“SQL
    监控”。


    *   **活动**：以图形方式显示活动会话及其正在执行的操作。例如，在图 14-12 中，我们看到“详细信息”部分中的“活动”按钮，它显示了在采样间隔接近结束时，“直接路径读取”和“数据库文件顺序读取”出现了一个尖峰。


    ![9781430248095_Fig14-12.jpg](img/9781430248095_Fig14-12.jpg)


    图 14-12 . 详细信息部分的活动图表


    *   **统计信息**：显示游标详细信息，包括执行次数、内存使用情况、游标加载时间、游标版本数、数据库时间以及 I/O 请求等许多其他详细信息，如图 14-13
    所示。


    ![9781430248095_Fig14-13.jpg](img/9781430248095_Fig14-13.jpg)


    图 14-13 . 显示报告“详细信息”部分中的一个统计信息页面示例


    *   **计划**：以图形形式显示执行计划。图 14-14 展示了此示例，以从左到右的样式显示计划。


    ![9781430248095_Fig14-14.jpg](img/9781430248095_Fig14-14.jpg)


    图 14-14 . 显示“详细信息”选项卡中的计划部分


    *   **SQL 监控**：显示持续时间、用户、串行/并行状态以及与 SQL ID 相关的其他统计信息。图 14-15 展示了此示例。


    ![9781430248095_Fig14-15.jpg](img/9781430248095_Fig14-15.jpg)


    图 14-15 . “详细信息”页面上的 SQL 监控选项卡


    此报告显示，对于当前的 SQL 文本，几乎 100%的数据库活动都是该 SQL。我们在报告的下半部分看到，我的 SQL 运行了 10 秒，并且是并行运行的。结果是它使用了近
    20 秒的 CPU 时间。


    ## SQL 监控详细报告

