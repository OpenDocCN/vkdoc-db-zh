  raw: "The other SQL monitor reports show the details of the execution plan. All\
    \ of the SQL monitor reports for this are zipped up into one file, and each one\
    \ represents one execution. [Figure 14-16](#9781430248095_Ch14.xhtml#Fig16) shows\
    \ the monitored SQL execution plan for the SQL in detail.\n\n![9781430248095_Fig14-16.jpg](Images/9781430248095_Fig14-16.jpg)\n\
    \n[Figure 14-16](#9781430248095_Ch14.xhtml#_Fig16) .  One of the SQL Monitor reports\
    \ in the Detail pane for the Plan Statistics button\n\nWe covered this kind of\
    \ execution plan in [Chapter 9](../Text/9781430248095_Ch09.xhtml). The Plan button\
    \ of the Details pane shows a graphical plan layout just like in [Figure 14-14](#9781430248095_Ch14.xhtml#Fig14),\
    \ shown earlier. The Parallel button shows some parallel specific information\
    \ (see [Figure 14-17](#9781430248095_Ch14.xhtml#Fig17)). This shows the I/O requests,\
    \ buffer gets, and CPU time spent by each parallel set. For example, in my SQL\
    \ I see that Parallel server p000 used 0.8 seconds of database time while P001\
    \ used 0.9 seconds. If I hover my mouse over the bar for those I get even more\
    \ detail on this, broken down into CPU, I/O, and other. This kind of report should\
    \ allow you to investigate particular branches of your complex code quickly and\
    \ easily.\n\n![9781430248095_Fig14-17.jpg](Images/9781430248095_Fig14-17.jpg)\n\
    \n[Figure 14-17](#9781430248095_Ch14.xhtml#_Fig17) .  Showing the Parallel button\
    \ page on the Details pane. Parallel Set 1 has been expanded\n\nThe rest of the\
    \ files inside the main zip file, produced by the `sqlhc.sql` script are text\
    \ files. One is a 10053 trace file of the SQL (covered in [Chapter 5](../Text/9781430248095_Ch05.xhtml))\
    \ and the other is the log of the `sqlhc.sql` script itself (which you can check\
    \ for errors) and the temporary scripts that were generated to produce the HTML\
    \ files.\n\nThe sqldx.sql Script\n\n`Sqldx` was written to collect detailed information\
    \ about one SQL statement. It does not need SQLT and produces many CSV formatted\
    \ files (comma separated values) to take away from a further analysis. It also\
    \ produces over 20 HTML formatted files.\n\nIn the example below I’ve used the\
    \ same SQL, `q3.sql`, which I have used throughout this chapter. To generate a\
    \ report from `sqldx.sql`, we need only run the script on the system where the\
    \ SQL has run. The SQL_ID in this case is `81s67vj4pjqm8`. When we run `sqldx.sql`\
    \ we get a prompt to confirm our license level. Select the appropriate license\
    \ level. In my case this is `T`.\n\n```\nSQL> @sqldx\nParameter 1:\nOracle Pack\
    \ License (Tuning or Diagnostics) [T|D] (required)\nEnter value for 1: T\nPL/SQL\
    \ procedure successfully completed.\n```\n\nNow I need to enter the format of\
    \ the report. `H` stands for HTML and `C` stands for a CSV report and `B` stands\
    \ for both. I’m going to choose `B` in this case to create the maximum number\
    \ of files. Generally speaking the HTML files are the most useful. The CSVs are\
    \ a nice to have. They contain information I have not used thus far.\n\n```\n\
    Parameter 2:\nOutput Type (HTML or CSV or Both) [H|C|B] (required)\nEnter value\
    \ for 2: B\nPL/SQL procedure successfully completed.\nParameter 3:\nSQL_ID of\
    \ the SQL to be analyzed (required)\nEnter value for 3: 81s67vj4pjqm8\n```\n\n\
    Before the main execution starts we see the values passed as a confirmation that\
    \ we are doing what we wanted.\n\n```\nValues passed:\n∼∼∼∼∼∼∼∼∼∼∼∼∼\nLicense:\
    \ \"T\"\nOutput : \"B\"\nSQL_ID : \"81s67vj4pjqm8\"\n```\n\nThe execution proceeds,\
    \ it takes just a few minutes usually, but may take longer if there is more data\
    \ in your database to analyze. After a couple of pages of output we see the final\
    \ result.\n\n```\nSQLDX files have been created.\nArchive:  sqldx_20130103_195515.zip\n\
    \  Length      Date    Time    Name\n---------  ---------- -----   ----\n    39708\
    \  01/03/2013 19:55   sqldx_20130103_195515_81s67vj4pjqm8_csv.zip\n    67897 \
    \ 01/03/2013 19:55   sqldx_20130103_195515_81s67vj4pjqm8_html.zip\n    15118 \
    \ 01/03/2013 19:55   sqldx_20130103_195515_13811832730830921192_force_csv.zip\n\
    \    28024  01/03/2013 19:55   sqldx_20130103_195515_13811832730830921192_force_html.zip\n\
    \    26717  01/03/2013 19:55   sqldx_20130103_195515_global_csv.zip\n    21463\
    \  01/03/2013 19:55   sqldx_20130103_195515_global_html.zip\n     6976  01/03/2013\
    \ 19:55   sqldx_20130103_195515_81s67vj4pjqm8_log.zip\n---------             \
    \        -------\n   205903                     7 files\n```\n\nThe zip file produced\
    \ contains seven more zip files. Yes, that’s what I said: zip files within zip\
    \ files. If you want to keep track of which file came from which, create a directory\
    \ for each zip file and unpack the zip file into that directory. If that zip file\
    \ contains other zip files then create a sub-directory to keep those and so on.\n\
    \n*   Three CSV zip files (Normal, Force, and Global). These contain comma-separated\
    \ files of the information gathered. They are in a form suitable to import into\
    \ a spreadsheet. I don’t think this is as useful as the HTML format, but it may\
    \ be useful for further analysis: for example, you could add up shared memory\
    \ use or number of executions if you were investigating a complex parallel statement.\
    \ See [Figure 14-18](#9781430248095_Ch14.xhtml#Fig18) below, which shows an example\
    \ spreadsheet created from `sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_PLAN.csv`.\
    \ There are 20 other CSV files in total in here with various forms of information\
    \ all in CSV format. (After the figure is a hierarchical listing of the files\
    \ in the various zip, which I show to make the layout clear.)\n\n![9781430248095_Fig14-18.jpg](Images/9781430248095_Fig14-18.jpg)\n\
    \n[Figure 14-18](#9781430248095_Ch14.xhtml#_Fig18) .  A section of an import CSV\
    \ result\n\n*   Three HTML zip files (Normal, Force, and Global). These are the\
    \ files we’ll look at to see what sqldx has collected.\n*   A Log zip file\n\n\
    Here’s a hierarchical listing of the files starting from the main zip file: `sqldx_20130103_195515.zip`.\n\
    \n`sqldx_20130103_195515.zip` contains:\n\n*   The `CSV` directory, which contains:\n\
    \n```\n sqldx_20130103_195515_81s67vj4pjqm8_DBA_HIST_ACTIVE_SESS_HISTORY.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_DBA_HIST_SQLSTAT.csv\n       \
    \    sqldx_20130103_195515_81s67vj4pjqm8_DBA_HIST_SQLTEXT.csv\n           sqldx_20130103_195515_81s67vj4pjqm8_DBA_HIST_SQL_PLAN.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_GVsACTIVE_SESSION_HISTORY.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL.csv\n           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQLAREA.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQLAREA_PLAN_HASH.csv\n   \
    \        sqldx_20130103_195515_81s67vj4pjqm8_GVsSQLSTATS.csv\n           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQLSTATS_PLAN_HASH.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQLTEXT.csv\n           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQLTEXT_WITH_NEWLINES.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_MONITOR.csv\n         \
    \  sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_OPTIMIZER_ENV.csv\n           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_PLAN.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_PLAN_MONITOR.csv\n    \
    \       sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_PLAN_STATISTICS_ALL.csv\n \
    \          sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_REDIRECTION.csv\n      \
    \     sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_SHARED_CURSOR.csv\n         \
    \  sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_SHARED_MEMORY.csv\n           sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_WORKAREA.csv\n\
    ```\n\n*   The `FCSV` directory, which contains:"
  trans: "\n# SQL 监控报告与脚本工具\n\n## 执行计划的详细报告\n\n其他的 SQL 监控报告显示了执行计划的细节。所有相关的 SQL 监控报告都被压缩到一个文件中，每个报告代表一次执行。图\
    \ 14-16 详细展示了被监控的 SQL 执行计划。\n\n![9781430248095_Fig14-16.jpg](img/9781430248095_Fig14-16.jpg)\n\
    \n图 14-16 . 细节面板中“**计划统计信息**”按钮对应的其中一个 SQL 监控报告\n\n我们在第 9 章已经介绍过这种执行计划。细节面板的“计划”按钮会显示一个图形化的计划布局，类似于前面图\
    \ 14-14 所示。“并行”按钮则显示一些与并行相关的信息（见图 14-17）。它展示了每个并行集花费的 I/O 请求、缓冲区获取和 CPU 时间。例如，在我的\
    \ SQL 中，我看到并行服务器 `p000` 使用了 0.8 秒的数据库时间，而 `P001` 使用了 0.9 秒。如果我将鼠标悬停在这些条形图上，会得到更详细的信息，细分为\
    \ CPU、I/O 和其他。这类报告应该能让您快速、轻松地调查复杂代码的特定分支。\n\n![9781430248095_Fig14-17.jpg](img/9781430248095_Fig14-17.jpg)\n\
    \n图 14-17 . 显示细节面板上的“并行”按钮页面。并行集 1 已被展开\n\n由 `sqlhc.sql` 脚本生成的主压缩文件内的其余文件是文本文件。一个是该\
    \ SQL 的 10053 跟踪文件（在第 5 章介绍过），另一个是 `sqlhc.sql` 脚本自身的日志（您可以检查是否有错误）以及为生成 HTML 文件而创建的临时脚本。\n\
    \n## Sqldx.sql 脚本\n\n`Sqldx` 是为收集单条 SQL 语句的详细信息而编写的。它不需要 SQLT，并会生成许多 CSV 格式文件（逗号分隔值）以便进行进一步分析。它还会生成超过\
    \ 20 个 HTML 格式的文件。\n\n在下面的例子中，我使用了本章一直在用的同一个 SQL，`q3.sql`。要从 `sqldx.sql` 生成报告，我们只需要在\
    \ SQL 运行过的系统上运行该脚本。本例中的 `SQL_ID` 是 `81s67vj4pjqm8`。当我们运行 `sqldx.sql` 时，会提示我们确认许可级别。选择适当的许可级别。我的情况是\
    \ `T`。\n\n```\nSQL> @sqldx\nParameter 1:\nOracle Pack License (Tuning or Diagnostics)\
    \ [T|D] (required)\nEnter value for 1: T\nPL/SQL procedure successfully completed.\n\
    ```\n\n现在我需要输入报告的格式。`H` 代表 HTML，`C` 代表 CSV 报告，`B` 代表两者。我将选择 `B` 以创建最大数量的文件。一般来说，HTML\
    \ 文件最有用。CSV 文件是*锦上添花*。它们包含的信息我至今尚未用到。\n\n```\nParameter 2:\nOutput Type (HTML\
    \ or CSV or Both) [H|C|B] (required)\nEnter value for 2: B\nPL/SQL procedure successfully\
    \ completed.\nParameter 3:\nSQL_ID of the SQL to be analyzed (required)\nEnter\
    \ value for 3: 81s67vj4pjqm8\n```\n\n在主要执行开始之前，我们会看到传递的值，作为确认我们在做预期操作的依据。\n\n\
    ```\nValues passed:\n∼∼∼∼∼∼∼∼∼∼∼∼∼\nLicense: \"T\"\nOutput : \"B\"\nSQL_ID : \"\
    81s67vj4pjqm8\"\n```\n\n执行过程开始，通常只需要几分钟，但如果数据库中有更多数据需要分析，可能需要更长时间。输出几页后，我们会看到最终结果。\n\
    \n```\nSQLDX files have been created.\nArchive:  sqldx_20130103_195515.zip\n \
    \ Length      Date    Time    Name\n---------  ---------- -----   ----\n    39708\
    \  01/03/2013 19:55   sqldx_20130103_195515_81s67vj4pjqm8_csv.zip\n    67897 \
    \ 01/03/2013 19:55   sqldx_20130103_195515_81s67vj4pjqm8_html.zip\n    15118 \
    \ 01/03/2013 19:55   sqldx_20130103_195515_13811832730830921192_force_csv.zip\n\
    \    28024  01/03/2013 19:55   sqldx_20130103_195515_13811832730830921192_force_html.zip\n\
    \    26717  01/03/2013 19:55   sqldx_20130103_195515_global_csv.zip\n    21463\
    \  01/03/2013 19:55   sqldx_20130103_195515_global_html.zip\n     6976  01/03/2013\
    \ 19:55   sqldx_20130103_195515_81s67vj4pjqm8_log.zip\n---------             \
    \        -------\n   205903                     7 files\n```\n\n生成的压缩文件包含另外七个压缩文件。是的，就像我说的：**压缩文件套压缩文件**。如果您想追踪哪个文件来自哪个压缩包，可以为每个压缩文件创建一个目录，并将压缩文件解压到该目录中。如果那个压缩文件还包含其他压缩文件，就创建一个子目录来存放它们，依此类推。\n\
    \n*   三个 CSV 压缩文件（普通、强制和全局）。它们包含所收集信息的逗号分隔文件。格式适合导入电子表格。我认为这不如 HTML 格式有用，但可能对进一步分析有用：例如，如果您正在调查复杂的并行语句，可以累加共享内存使用量或执行次数。参见下面的图\
    \ 14-18，它显示了一个从 `sqldx_20130103_195515_81s67vj4pjqm8_GVsSQL_PLAN.csv` 创建的电子表格示例。这里总共有\
    \ 20 个其他 CSV 文件，包含各种形式的信息，均为 CSV 格式。（图后是不同压缩包中文件的层次列表，我将其展示出来以使布局清晰。）\n\n![9781430248095_Fig14-18.jpg](img/9781430248095_Fig14-18.jpg)\n\
    \n图 14-18 . 导入 CSV 结果的一个片段\n\n*   三个 HTML 压缩文件（普通、强制和全局）。这些是我们将要查看以了解 `sqldx`\
    \ 收集了什么内容的文件。\n*   一个日志压缩文件\n\n以下是文件的分层列表，从主压缩文件 `sqldx_20130103_195515.zip` 开始：\n\
    \n`sqldx_20130103_195515.zip` 包含：\n\n*   `CSV` 目录，其中包含：\n\n```\n sqldx_20130103_195515_81s67vj4pjqm8_DBA_HIST_ACTIVE_SESS_HISTORY.csv\n\
    \           sqldx_20130103_195515_81s67vj4pjqm8_DBA_HIST_SQLSTAT.csv\n       \
