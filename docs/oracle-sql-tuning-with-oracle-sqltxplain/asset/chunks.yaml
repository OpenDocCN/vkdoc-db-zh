  trans: '

    将 `CURSOR_SHARING` 设置为 `SIMILAR` 自 11g 版本起已被废弃，不应再使用。但值得一提的是，它曾是 `CURSOR_SHARING=FORCE`
    的一个“智能”版本。在大多数情况下，它会创建系统定义的绑定变量，除非该绑定变量以某种方式影响了优化。它并非一个完整的解决方案，而自适应游标共享的引入是对 `CURSOR_SHARING=SIMILAR`
    的一个巨大改进。需要注意 `CURSOR_SHARING` 参数的值，以便理解绑定变量是否生效。在 SQL 报告的 SQL 文本部分，您还会看到，如果字面量已被绑定变量替换，它们将具有系统定义的名称。


    ## 变量执行时间案例


    有时，拥有一个稍长但稳定的执行时间，比拥有一个稍快但不稳定的执行计划更好。不稳定的执行时间（执行时间可能大幅波动）会给批处理作业的调度带来问题。在此示例案例中，执行时间从未稳定过。您处于预生产环境中，希望获得有关可采取哪些措施来提高执行时间稳定性的信息。您有一个优势，即拥有一个包含代表性查询和数据的测试环境。因此，在测试之后，您查阅了
    `AWR` 报告，并决定有一个特定查询需要关注，因为它有时耗时很长。我们获取其 `SQL_ID` 并生成 `SQLT`。我们想知道执行计划出了什么问题，因此我们查看了“执行计划”部分，如
    图 4-10 所示。


    ![9781430248095_Fig04-10.jpg](img/9781430248095_Fig04-10.jpg)


    图 4-10 . 显示了许多不同的执行计划


    在“执行计划”部分，我们看到存在许多不同的执行计划。为什么会有这么多不同的执行计划？让我们首先看看最差的执行计划，如 图 4-11（屏幕左侧）和 图 4-12（屏幕右侧）所示。我们在
    图 4-11 中看到了许多嵌套循环步骤，在 图 4-12 中看到了许多低估。


    ![9781430248095_Fig04-11.jpg](img/9781430248095_Fig04-11.jpg)


    图 4-11 . 通过点击图 4-10 执行计划列表中的“W”所选中的最差执行计划


    ![9781430248095_Fig04-12.jpg](img/9781430248095_Fig04-12.jpg)


    图 4-12 . 用 *** 高亮的数字显示了优化器非常大的估算偏差


    由于我们有实际返回的行数，我们可以查看高估和低估。我们遇到了相当多的估算偏差，所以有些地方不对劲。可能不止一个问题。既然第一步，第 11 行，已经“错了”，偏差达
    4,230 倍，我们应该从那里开始。查看 图 4-13，因为它显示了表 1 的列统计信息。您看到任何值得注意的东西了吗？（实际表格包含比图中显示更多的信息。为了可读性，我删除了一些表列。）


    ![9781430248095_Fig04-13.jpg](img/9781430248095_Fig04-13.jpg)


    图 4-13 . 表 1 的列统计信息


    让我们看看 `ID` 列的统计信息。样本大小良好，为 100%，并且有 34,916 个不同值：这超过了我们 254 个存储桶所能容纳的数量。因此，如果我们有直方图，它将是一个高度平衡的直方图，但在“直方图”列下我们看到“无”。那么
    `ORG_ID` 呢？只有 2.4% 的样本，且仅有一个不同值，高低值都是“ABC”。此外，我们有一个只有一个存储桶的频率直方图。毫不意外，其选择性将是 1.0，但同样地，这个直方图对我们没有任何作用，因为它毫无意义。另一方面，它不可能对可变的执行计划有贡献。那么让我们看看
    `ID2` 列，其样本为 2.4%，有 397 个不同值和一个高度平衡的直方图。如果我们详细查看直方图，会发现有很多流行值，但我们继续看。DATE 列有一个高度平衡的直方图：这合理吗？这取决于
    DATE 列代表什么。但通常，带有直方图的 DATE 列应引起怀疑。`ID3` 列同样是 2.4% 样本，有两个不同值：“Y”和“N”。如果我们查看直方图，会发现“N”的选择性为
    0.03，“Y”的选择性为 0.97。仅这一点就可能影响返回的行数。看起来确实存在一些倾斜数据。但我们继续看。接下来是 `ID4` 列，有 51 个不同值和
    49 个存储桶，所以现在情况看起来不那么好了。它的直方图显示选择性在 0.005 到 0.1 之间。这是 20 倍的差异：这意味着这是另一个倾斜列，而且存储桶数量是错误的。`ID5`
    列没有直方图，`ID6` 列的存储桶数量错误：同样是倾斜的。在这样的报告中，您会花时间查看每一列，因为有时真正的罪魁祸首是您最后查看的东西；但在本例中，我们存在直方图采样不佳、直方图不合适以及可能缺失直方图的问题。


    在这种情况下，您会尽力设置正确的直方图，在不需要的地方消除它们，在需要的地方添加它们。


    ## 总结


    倾斜度是 `SQL` 中最难理解的概念之一，也是最麻烦的问题之一。Oracle 软件历经多次迭代，尝试了许多方法来解决这个问题，有些尝试比其他更成功，但自适应游标共享是迄今为止最成功的。尽管不稳定的执行计划可能导致各种波折，但
    `SQLTXPLAIN` 能提供信息，帮助您稳定执行计划并收集正确的统计信息。在下一章中，我们将探讨优化器在解析过程中进行的查询转换，以使您的执行计划能够快速执行。


    # 第 5 章


    ![image](img/frontdot.jpg)


    ## 查询转换故障排除


    Oracle 查询优化器是一段令人惊叹的代码，经过多年发展和改进（或许途中也走过一些弯路），旨在生成既易于生成又能快速运行的执行计划。优化器在过程中使用了许多“技巧”来提高执行速度，并以与您未修改的
    `SQL` 结果相同的方式实现执行计划。这些“技巧”（或启发式方法）有时包括查询转换。

