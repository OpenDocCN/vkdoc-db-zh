- fmt: '# APPENDIX C


    ![image](Images/frontdot.jpg)


    ## Tool Configuration Parameters


    This appendix includes all the tool configuration parameters and their descriptions.


    | Parameter | Description |

    | --- | --- |

    | `automatic_workload_repository` | Access to the Automatic Workload Repository
    (AWR) requires a license for the Oracle Diagnostic Pack. If you don’t have it
    you can set this parameter to `N`. |

    | `bde_chk_cbo` | On EBS applications SQLT automatically executes `bde_chk_cbo.sql`
    from Note:174605.1. |

    | `c_cbo_stats_vers_days` | Days of CBO statistics versions to be collected. If
    set to `0` no statistics versions are collected. If set to a value larger than
    actual stored days, then SQLT collects the whole history. A value of 7 means collect
    the past 7 days of CBO statistics versions for the schema objects related to given
    SQL. It includes tables, indexes, partitions, columns, and histograms. |

    | `c_dba_hist_parameter` | Collects relevant entries out of `DBA_HIST_PARAMETER`.
    If `automatic_workload_repository` and `c_dba_hist_parameter` are both set to
    `Y` then SQLT collects relevant rows out of view `DBA_HIST_PARAMETER`. |

    | `c_gran_cols` | Collection Granularity for Columns. Default value of `SUBPARTITION`
    allows SQLT to collect into its repository CBO statistics for columns at all levels:
    table, partitions and subpartitions. All related to the one SQL being analyzed.
    |

    | `c_gran_hgrm` | Collection Granularity for Histograms. Default value of `SUBPARTITION`
    allows SQLT to collect into its repository CBO statistics for histograms at all
    levels: table, partitions and subpartitions. All related to the one SQL being
    analyzed. |

    | `c_gran_segm` | Collection Granularity for Segments (Tables and Indexes). Default
    value of `SUBPARTITION` allows SQLT to collect into its repository CBO statistics
    for tables, indexes, partitions and subpartitions. All related to the one SQL
    being analyzed. |

    | `collect_perf_stats` | Collects performance statistics on XECUTE method. |

    | `connect_identifier` | Optional Connect Identifier (as per Oracle Net). This
    is used during export of SQLT repository. Include “@” symbol, i.e., `@PROD`. You
    can also set this parameter to `NULL`. |

    | `count_star_threshold` | Limits the number or rows to count while doing a `SELECT
    COUNT(*)` in set of tables accessed by SQL passed. If you want to disable this
    functionality set this parameter to `0`. |

    | `custom_sql_profile` | Controls if a script with a Custom SQL Profile is generated
    with every execution of SQLT main methods. |

    | `distributed_queries` | SQLT can use DB links referenced by the SQL being analyzed.
    It connects to those remote systems to get 10053 and 10046 traces for the SQL
    being distributed. |

    | `domain_index_metadata` | This parameter controls if domain index metadata is
    included in main report and metadata script. If you get an ORA-07445, and the
    `alert.log` shows the error is caused by `CTXSYS.CTX_REPORT.CREATE_INDEX_SCRIPT`,
    then you want to set this parameter to `N`. |

    | `event_10046_level` | SQLT XECUTE turns event 10046 level 12 on by default.
    You can set a different level or turn this event 10046 off using this parameter.
    It only affects the execution of the script passed to SQLT XECUTE. Level 0 means
    no trace, level 1 is standard SQL Trace, level 4 includes bind variable values,
    level 8 includes waits and level 12 both binds and waits. |

    | `event_10053_level` | SQLT XECUTE, XTRACT and XPLAIN turn event 10053 level
    1 on by default. You can turn this event 10053 off using this parameter. It only
    affects the SQL passed to SQLT. Level 0 means no trace, level 1 traces the CBO.
    |

    | `event_10507_level` | SQLT XECUTE uses this event on 11g to trace Cardinality
    Feedback CFB. You can turn this event 10507 off using this parameter. It only
    affects the SQL passed to SQLT. Level 0 means no trace, for meaning of other levels
    see MOS Doc ID 740052.1. |

    | `event_others` | This parameter controls the use of events 10241, 10032, 10033,
    10104, 10730, 46049, but only if 10046 is turned on (any level but 0). It only
    affects the execution of the script passed to SQLT XECUTE. |'
