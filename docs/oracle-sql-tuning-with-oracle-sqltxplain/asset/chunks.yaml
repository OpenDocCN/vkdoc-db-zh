    \ XTRSBY. The first is the 10053 trace file, which we specifically requested.\
    \ We discussed this extensively in [Chapter 5](../Text/9781430248095_Ch05.xhtml),\
    \ so there’s no need to go through its contents. The other two are HTML files,\
    \ the “main” HTML file and the “monitor” HTML file. Let’s look at what information\
    \ `roxtract.sql` provides.\n\n## What Do roxtract Reports Look Like?\n\nThe first\
    \ report `roxtract_SNC2_locutus_11.2.0.1.0_dck1xz983xa8c_20121103_111855_main.html`\
    \ (in this example) is the roxtract main report. It is a trimmed down version\
    \ of the `SQLTXTRACT` report, but nonetheless an amazingly useful HTML file. Let’s\
    \ look at the top of this HTML file, as shown in [Figure 9-4](#9781430248095_Ch09.xhtml#Fig4).\n\
    \n![9781430248095_Fig09-04.jpg](Images/9781430248095_Fig09-04.jpg)\n\n[Figure\
    \ 9-4](#9781430248095_Ch09.xhtml#_Fig4) .  The top of the HTML ROXTRACT report\n\
    \nAs you can see, roxtract is weaker than the powerful `XTRACT` report. The number\
    \ of sections it covers is reduced, but you still have the execution plans, table\
    \ information and many other sections.\n\nThe other file supplied by roxtract\
    \ is `roxtract_SNC2_locutus_11.2.0.1.0_dck1xz983xa8c_20121103_111855_monitor.html.`\
    \ The HTML defaults to the Plan Statistics tab as shown in [Figure 9-5](#9781430248095_Ch09.xhtml#Fig5).\n\
    \n![9781430248095_Fig09-05.jpg](Images/9781430248095_Fig09-05.jpg)\n\n[Figure\
    \ 9-5](#9781430248095_Ch09.xhtml#_Fig5) .  The left-hand side of the page of the\
    \ Monitored Execution Details page\n\nThe figure above shows only the left hand\
    \ side of the report. We see the expected execution steps and the estimated number\
    \ of rows and the associated cost. We also have access to the menu, which allows\
    \ us to choose between different displays. The right hand of the report shows\
    \ us more information about the actual rows returned I/O requests and any wait\
    \ activity. For this SQL there is nothing much to say, but you need to know those\
    \ entries are there. See [Figure 9-6](#9781430248095_Ch09.xhtml#Fig6).\n\n![9781430248095_Fig09-06.jpg](Images/9781430248095_Fig09-06.jpg)\n\
    \n[Figure 9-6](#9781430248095_Ch09.xhtml#_Fig6) .  The right hand side of the\
    \ Monitored Execution Details page\n\nThere’s even a button to change the language\
    \ of the report. The drop-down list includes English, German, Spanish, French,\
    \ Italian, Korean, and other languages. If you click on the Plan tab, highlighted\
    \ in [Figure 9-5](#9781430248095_Ch09.xhtml#Fig5), you can also get a flow diagram\
    \ version of the execution plan (as seen in [Figure 9-7](#9781430248095_Ch09.xhtml#Fig7)).\n\
    \n![9781430248095_Fig09-07.jpg](Images/9781430248095_Fig09-07.jpg)\n\n[Figure\
    \ 9-7](#9781430248095_Ch09.xhtml#_Fig7) .  Shows the flow chart representation\
    \ of the execution plan\n\nSome developers prefer this representation of the execution\
    \ plan, and they even get a choice of the flow going left to right or bottom to\
    \ top.\n\n### Summary\n\nIn this chapter we covered the special case of Data Guard\
    \ tuning and the utilities SQLTXPLAIN gives us to deal with this situation. You\
    \ should not view Data Guard as a black box where no tuning can be done if it\
    \ is open in read-only mode. Many companies do this, and you should be able to\
    \ investigate performance if you need to. Now you can with XTRSBY and its trusty\
    \ sidekick `roxtract.sql`. In the next chapter we will deal with comparison of\
    \ execution plans. This is a very powerful technique for determining what has\
    \ changed in an execution plan: and believe me, in an execution plan, nothing\
    \ ever stays the same.\n\n## CHAPTER 10\n\n![image](Images/frontdot.jpg)\n\n#\
    \ Comparing Execution Plans\n\nComparing execution plans is one of the most useful\
    \ diagnostic tests you can do. If you’re lucky enough to have a good execution\
    \ plan, you can use that plan as a guide to bring the bad execution plan into\
    \ compliance. In [Chapter 6](../Text/9781430248095_Ch06.xhtml) we talked about\
    \ using SQL Profiles to apply a plan onto another database’s SQL, in order to\
    \ have an emergency option. Suppose, however, you have more time to consider the\
    \ difference and try to fix it properly, rather than using the SQL Profile sticking\
    \ plaster. `SQLTCOMPARE` is the tool for the job. It will compare two target systems\
    \ for the same SQL and produce a report that describes the differences. You can\
    \ even import the SQLTXPLAIN repositories from the two target systems and do the\
    \ comparison there. This chapter is a pure SQLTXPLAIN chapter, we will be using\
    \ SQLTXPLAIN’s method `SQLTCOMPARE` and showing how our tuning knowledge from\
    \ previous chapters can be used to diagnose a problem.\n\n## How Do You Use SQLTCOMPARE?\n\
    \nWe will go through the steps for using `SQLTCOMPARE` in more detail with a practical\
    \ example, but in broad terms the steps to use `SQLTCOMPARE` are as follows:"
