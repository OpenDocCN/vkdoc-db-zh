    This last message `SQCREATE completed` is a good sign that all has gone well.
    Although the amount of work that SQLT does for you during the installation may
    seem daunting, the installation itself usually takes no more than five minutes.
    Even if you get something wrong during the installation it takes a very short
    time to correct the error by simply removing SQLT and re-installing it with the
    correct settings or if you prefer you can change the setting after the installation.
    For example if you get the license level wrong during installation you can correct
    it with one of the following four routines:


    `disable_tuning_pack_access;`


    `enable_tuning_pack_access;`


    `disable_diagnostic_pack_access;`


    `enable_diagnostic_pack_access;`


    I’ve given more details on the use of these routines in the section “How to Change
    the Licensing Level after a SQLT Installation” below.


    How to Change the Licensing Level after a SQLT Installation


    The default settings for a SQLT installation work for most situations, yet sometimes
    you may want to change them. For example, after installing SQLT you buy a diagnostic
    pack or tuning pack license. The tuning pack and diagnostic pack can be bought
    separately or as a bundle from Oracle. If you have neither of these packs you
    should use `disable_tuning_pack_access` and `disable_diagnostic_pack_access` if
    you installed with option “T” in a normal installation. Here are the example steps'
