    PL/SQL procedure successfully completed.\n\nSession altered.\n\nSQL> host dir\
    \ f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\\*.trc\n Volume in drive F\
    \ is My Passport\n Volume Serial Number is 1E65-69CC\n\nDirectory of f:\\app\\\
    stelios\\diag\\rdbms\\snc1\\snc1\\trace\n\n10/06/2012  09:49 AM              \
    \ 2,593 snc1_dbrm_2404.trc\n10/06/2012  09:46 AM               1,175 snc1_j000_4956.trc\n\
    10/06/2012  09:46 AM             130,630 snc1_ora_4804_PLSQL.trc\n10/06/2012 \
    \ 06:00 AM                 973 snc1_vkrm_2948.trc\n               4 File(s)  \
    \       135,371 bytes\n               0 Dir(s)  799,840,133,120 bytes free\n```\n\
    \n不要再因为 SQL 在 PL/SQL 块内而借口说无法获取跟踪文件了。你可以之后用以下命令关闭该 SQL ID 的跟踪：\n\n```sql\nALTER\
    \ SESSION SET EVENTS 'trace[rdbms.SQL_Optimizer.*]off';\n```\n\n收集 10053 的老方法是使用\
    \ `alter session`，前面提到过，这种方法效果很好。它也更容易记住，并且是迄今为止收集跟踪最受欢迎的方式，因为它适用于大多数版本的 Oracle。\n\
    \n```sql\nALTER SESSION SET EVENTS '10053 trace name context forever, level 1';\n\
    ```\n\n## 什么是查询转换？\n\n既然我们知道如何获取 10053（而 SQLT 使得这一点特别容易），我们需要看一些可以在其上执行的查询（以及一些查询转换）的示例。正如我们在本章前面提到的，查询转换是优化器为了将一条\
    \ SQL 语句改变为另一条逻辑上相同（并将给出相同结果）的 SQL 语句而执行的过程。\n\n以下是一些常见的查询转换及其代码：\n\n*   子查询解嵌套：`SU`\n\
    *   复杂视图合并：`CVM`\n*   连接谓词下推：`JPPD`"
  raw: "In my case this produces a trace file (with a file extenstion of `trc`) in\
    \ the `F:\\app\\Stelios\\diag\\rdbms\\snc1\\snc1\\trace` directory on my PC. The\
    \ file is called `snc1_ora_2872_MY_10053_TRACE.trc`. The location is dependent\
    \ on your operating system and system parameters. This is why it’s useful to set\
    \ the `tracefile_identifier` parameter, which allows you an easy way to spot your\
    \ file among all the others. Notice how in my case the instance name (snc1) and\
    \ ora are placed at the beginning of the name, then the `tracefile_identifier`value\
    \ is used, and finally the standard extension makes the full file name. We also\
    \ set  `max_dump_file_size=unlimited` so that the file is not truncated just as\
    \ we reach the interesting part.\n\nWhat’s in a 10053 Trace File?\n\nI remember\
    \ when I first looked inside a 10053 (many years ago now) thinking, *What is all\
    \ this gibberish, and how can I possibly understand it*? None of this is documented,\
    \ and there are many, many short codes for information that are not explained\
    \ anywhere. It’s not as bad as it sounds though: the 10053 trace file is, simply\
    \ put, a log of what the cost-based optimizer “thought” as it parsed the query\
    \ in question. It is literally a log of every step considered by the optimizer.\
    \ It is not often considered a user facing file, so although it is purely text,\
    \ it is pretty difficult to understand and pretty verbose. After all, the file\
    \ is written to allow debugging of the optimization process and so has to include\
    \ everything the optimizer does in great detail. The file was created so that\
    \ support can fix problems that are discovered in the optimizer. No one to my\
    \ knowledge has attempted to make the file user friendly. An example section from\
    \ a 10053 trace file is shown in [Figure 5-1](#9781430248095_Ch05.xhtml#Fig1).\n\
    \n![9781430248095_Fig05-01.jpg](Images/9781430248095_Fig05-01.jpg)\n\n[Figure\
    \ 5-1](#9781430248095_Ch05.xhtml#_Fig1) .  A section of an example 10053 trace\
    \ file\n\nDespite the text in a 10053 trace file being difficult to understand,\
    \ we can see snippets of information that begin to make sense. For example, we’ve\
    \ mentioned that NL is short for “nested loop” and that is a kind of join. We\
    \ see that USER$ is having its Access path analyzed. USER$ was one of the tables\
    \ involved in this query. We also see references to Cost (we’ve discussed those\
    \ in [Chapters 1](../Text/9781430248095_Ch01.xhtml) and [2](../Text/9781430248095_Ch02.xhtml)),\
    \ and we see references to different types of access. For example, index (FFS)\
    \ – which is short for Index Fast Full Scan.  This is the approach to take with\
    \ a 10053 trace file. Do not try and understand every line of it. You will not\
    \ be able to because some lines cannot be decoded unless you are a developer working\
    \ for Oracle. There are a number of different ways to get 10053 trace file information.\
    \ The simplest way is to use SQLT XTRACT (as described in [Chapter 1](../Text/9781430248095_Ch01.xhtml)).\
    \ This will generate a 10053 trace file and include it in the ZIP file. Sometimes,\
    \ however, you do not want all the information that SQLT gives you and maybe you\
    \ are only after the 10053 trace file, in which case you could use the DBMS_SQLDIAG\
    \ package as long as you have the SQL ID of the SQL statement you are interested\
    \ in.\n\nAnother advantage DBMS_SQLDIAG has is that you don’t need to execute\
    \ the statement. As long as you have the SQL ID you can get the 10053 trace. This\
    \ feature is only available from 11g Release 2, however. The steps are as follows:\n\
    \n1.  First we find the `sql_id`, by knowing the text in the SQL we can search\
    \ `v$sql`.\n2.  Then we can use the `dbms_sqldiag.dump_trace` routine to get the\
    \ 10053 trace file. This puts the trace file in the `user_dump_dest` location,\
    \ where we can review it with any text editor.\n\nLet’s see those steps in action:\n\
    \n```\nSQL> column sql_text format a30\nSQL> select sysdate from dual;\nSYSDATE\n\
    \n05-OCT-12\n\nSQL> select sql_id from v$sql where sql_text like 'select sysdate\
    \ from dual%';\n\nSQL_ID\n\n7h35uxf5uhmm1\n\nSQL> execute dbms_sqldiag.dump_trace(p_sql_id=>'7h35uxf5uhmm1',\n\
    \  p_child_number=>0,\n  p_component=>'Compiler',p_file_id=>'DIAG');\n\nPL/SQL\
    \ procedure successfully completed.\n\nSQL> show parameter user_dump_Dest\n\n\
    NAME                  TYPE                             VALUE\n---------------------\
    \ -------------------------------- -------\nuser_dump_dest        string    f:\\\
    app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\n\nSQL> host dir f:\\app\\stelios\\\
    diag\\rdbms\\snc1\\snc1\\trace\\*DIAG*.trc\n Volume in drive F is My Passport\n\
    \ Volume Serial Number is 1E65-69CC\n\nDirectory of f:\\app\\stelios\\diag\\rdbms\\\
    snc1\\snc1\\trace\n\n09/15/2012  12:41 PM              1,096 snc1_diag_2548.trc\n\
    10/05/2012  12:54 PM             68,133 snc1_ora_4980_DIAG.trc\n             \
    \ 2 File(s)          69,229 bytes\n              0 Dir(s)  788,285,857,792 bytes\
    \ free\n\nSQL> host notepad f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\\\
    snc1_ora_4980_DIAG.trc\n```\n\nThis method, which is part of the event infrastructure,\
    \ has the added advantage that it can capture trace for an SQL statement inside\
    \ a PL/SQL block. An example of this is shown below. A package specification and\
    \ body are created to calculate the area of a circle. Then we identify the SQL\
    \ ID inside the PL/SQL package and trace only the matching statement.\n\n```\n\
    SQL> host type area.sql\ncreate or replace package getcircarea as\n  function\
    \ getcircarea(radius number)\n  return number;\nend getcircarea;\n/\n\ncreate\
    \ or replace package body getcircarea as\n  function getcircarea (radius number)\
    \ return number\n  is area number(8,2);\n  begin\n    select 3.142*radius*radius\
    \ into area from dual;\n    return area;\n  end;\n  end getcircarea;\n/\n\nset\
    \ serveroutput on size 100000;\n\ndeclare\n  area number(8,2);\n  begin\n    area:=\
    \ getcircarea.getcircarea(10);\n    dbms_output.put_line('Area is '||area);\n\
    \  end;\n/\n\nSQL> select sql_text, sql_id from v$sqlarea where sql_text like\
    \ '%3.142%';\n\nSQL_TEXT\n\nSQL_ID\n\nSELECT 3.142*:B1 *:B1 FROM DUAL\n9rjmrhbjuasav\n\
    \nselect sql_text, sql_id from v$sqlarea where sql_text like '%3.142%'\nggux6y542z8mr\n\
    \nalter session set tracefile_identifier='PLSQL';\nalter session set events 'trace[rdbms.SQL_Optimizer.*][sql:9rjmrhbjuasav]';\n\
    \nSQL> @area\n\nPackage created.\n\nPackage body created.\n\nArea is 314.2\n\n\
    PL/SQL procedure successfully completed.\n\nSession altered.\n\nSQL> host dir\
    \ f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\\*.trc\n Volume in drive F\
    \ is My Passport\n Volume Serial Number is 1E65-69CC\n\nDirectory of f:\\app\\\
    stelios\\diag\\rdbms\\snc1\\snc1\\trace\n\n10/06/2012  09:49 AM              \
    \ 2,593 snc1_dbrm_2404.trc\n10/06/2012  09:46 AM               1,175 snc1_j000_4956.trc\n\
    10/06/2012  09:46 AM             130,630 snc1_ora_4804_PLSQL.trc\n10/06/2012 \
    \ 06:00 AM                 973 snc1_vkrm_2948.trc\n               4 File(s)  \
    \       135,371 bytes\n               0 Dir(s)  799,840,133,120 bytes free\n```\n\
    \nNo more excuses about not being able to get the trace file because the SQL is\
    \ inside a PL/SQL block.  You can turn off tracing for that SQL ID afterwards\
    \ with\n\n```\nALTER SESSION SET EVENTS 'trace[rdbms.SQL_Optimizer.*]off';\n```\n\
    \nThe old fashioned way to collect 10053 is `alter session`, which was mentioned\
    \ earlier, and which works well enough. It is also easier to remember and is by\
    \ far the most popular way to collect trace, as it works with most versions of\
    \ Oracle.\n\n```\nALTER SESSION SET EVENTS '10053 trace name context forever,\
    \ level 1';\n```\n\nWhat Is a Query Transformation?\n\nNow that we know how to\
    \ get a 10053 (and SQLT makes that particularly easy), we need to look at some\
    \ examples of queries (and some query transformations) that can be carried out\
    \ on them. As we said earlier in the chapter, query transformation is the process\
    \ the optimizer carries out to change an SQL statement to another SQL statement\
    \ that is logically the same (and will give the same result).\n\nHere is a list\
    \ of common query transformations and their codes:\n\n*   Subquery Unnesting:\
    \ SU\n*   Complex View Merging: CVM\n*   Join Predicate Push Down: JPPD"
  trans: "## 跟踪文件的位置与命名\n\n在我的案例中，这会在我的电脑 `F:\\app\\Stelios\\diag\\rdbms\\snc1\\snc1\\\
    trace` 目录下生成一个跟踪文件（文件扩展名为 `.trc`）。文件名为 `snc1_ora_2872_MY_10053_TRACE.trc`。具体位置取决于你的操作系统和系统参数。这就是为什么设置\
    \ `tracefile_identifier` 参数很有用，它提供了一种简便方法，让你能在众多文件中轻松找到自己的文件。请注意，在我的例子中，实例名（snc1）和\
    \ ora 位于文件名的开头，然后是 `tracefile_identifier` 的值，最后是标准扩展名构成了完整的文件名。我们还设置了 `max_dump_file_size=unlimited`，以防止文件恰好在到达感兴趣的部分时被截断。\n\
    \n## 10053 跟踪文件里有什么？\n\n我记得当我第一次查看 10053 文件时（那是很多年前了），心里想的是：*这些都是什么乱码，我怎么可能理解得了？*\
    \ 这些内容都没有文档记录，并且有许多、许多信息的简短代码无处可查。不过，情况并没有听起来那么糟：简单来说，10053 跟踪文件是基于成本的优化器在解析相关查询时“思考过程”的日志。它本质上是优化器考虑的每一个步骤的日志。它通常不被认为是面向用户的文件，所以尽管它纯文本，却相当难以理解且非常冗长。毕竟，这个文件的编写是为了调试优化过程，因此必须包含优化器所做的一切的详细信息。该文件是创建出来供支持人员修复在优化器中发现的问题的。据我所知，没有人试图让这个文件变得用户友好。图\
    \ 5-1 展示了一个来自 10053 跟踪文件的示例片段。\n\n![9781430248095_Fig05-01.jpg](img/9781430248095_Fig05-01.jpg)\n\
    \n图 5-1 . 一个示例 10053 跟踪文件的部分内容\n\n尽管 10053 跟踪文件中的文字难以理解，我们还是能看到一些开始变得有意义的信息片段。例如，我们提到过\
    \ NL 是 “nested loop” 的缩写，这是一种连接方式。我们看到正在分析 `USER$` 的访问路径。`USER$` 是此查询涉及的表之一。我们还看到对\
    \ Cost（成本）的引用（我们在第 1 章 和 第 2 章 中讨论过），以及看到对不同类型访问的引用。例如，index (FFS) – 这是 Index\
    \ Fast Full Scan 的缩写。这就是处理 10053 跟踪文件的方法。不要试图去理解它的每一行。你无法做到，因为除非你是 Oracle 的开发人员，否则有些行无法解码。有几种不同的方法可以获取\
    \ 10053 跟踪文件信息。最简单的方法是使用 SQLT XTRACT（如第 1 章所述）。这将生成一个 10053 跟踪文件并将其包含在 ZIP 文件中。然而，有时你并不需要\
    \ SQLT 提供的所有信息，也许你只想要 10053 跟踪文件本身，这种情况下，你可以使用 `DBMS_SQLDIAG` 包，只要你有感兴趣的 SQL 语句的\
    \ SQL ID。\n\n`DBMS_SQLDIAG` 的另一个优点是，你不需要执行该语句。只要你有 SQL ID，就可以获取 10053 跟踪文件。不过，此功能仅从\
    \ 11g Release 2 开始可用。步骤如下：\n\n1.  首先，我们通过知道 SQL 中的文本来查找 `sql_id`，我们可以搜索 `v$sql`。\n\
    2.  然后，我们可以使用 `dbms_sqldiag.dump_trace` 例程来获取 10053 跟踪文件。这会将跟踪文件放在 `user_dump_dest`\
    \ 位置，我们可以用任何文本编辑器查看它。\n\n让我们看看这些步骤的实际操作：\n\n```sql\nSQL> column sql_text format\
    \ a30\nSQL> select sysdate from dual;\nSYSDATE\n---------\n05-OCT-12\n\nSQL> select\
    \ sql_id from v$sql where sql_text like 'select sysdate from dual%';\n\nSQL_ID\n\
    -------------\n7h35uxf5uhmm1\n\nSQL> execute dbms_sqldiag.dump_trace(p_sql_id=>'7h35uxf5uhmm1',\n\
    \  p_child_number=>0,\n  p_component=>'Compiler',p_file_id=>'DIAG');\n\nPL/SQL\
    \ procedure successfully completed.\n\nSQL> show parameter user_dump_Dest\n\n\
    NAME                  TYPE                             VALUE\n---------------------\
    \ -------------------------------- -------\nuser_dump_dest        string    f:\\\
    app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\n\nSQL> host dir f:\\app\\stelios\\\
    diag\\rdbms\\snc1\\snc1\\trace\\*DIAG*.trc\n Volume in drive F is My Passport\n\
    \ Volume Serial Number is 1E65-69CC\n\nDirectory of f:\\app\\stelios\\diag\\rdbms\\\
    snc1\\snc1\\trace\n\n09/15/2012  12:41 PM              1,096 snc1_diag_2548.trc\n\
    10/05/2012  12:54 PM             68,133 snc1_ora_4980_DIAG.trc\n             \
    \ 2 File(s)          69,229 bytes\n              0 Dir(s)  788,285,857,792 bytes\
    \ free\n\nSQL> host notepad f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\\\
    snc1_ora_4980_DIAG.trc\n```\n\n这种方法是事件基础设施的一部分，还有一个额外优势，即它可以捕获位于 PL/SQL 块内的 SQL\
    \ 语句的跟踪。下面展示了一个例子。创建了一个包规范和包体来计算圆的面积。然后我们在 PL/SQL 包中识别 SQL ID，并仅跟踪匹配的语句。\n\n```sql\n\
    SQL> host type area.sql\ncreate or replace package getcircarea as\n  function\
    \ getcircarea(radius number)\n  return number;\nend getcircarea;\n/\n\ncreate\
    \ or replace package body getcircarea as\n  function getcircarea (radius number)\
    \ return number\n  is area number(8,2);\n  begin\n    select 3.142*radius*radius\
    \ into area from dual;\n    return area;\n  end;\n  end getcircarea;\n/\n\nset\
    \ serveroutput on size 100000;\n\ndeclare\n  area number(8,2);\n  begin\n    area:=\
    \ getcircarea.getcircarea(10);\n    dbms_output.put_line('Area is '||area);\n\
    \  end;\n/\n\nSQL> select sql_text, sql_id from v$sqlarea where sql_text like\
    \ '%3.142%';\n\nSQL_TEXT                     SQL_ID\n---------------------------\
    \ -------------\nSELECT 3.142*:B1 *:B1 FROM DUAL  9rjmrhbjuasav\nselect sql_text,\
    \ sql_id from v$sqlarea where sql_text like '%3.142%' ggux6y542z8mr\n\nalter session\
    \ set tracefile_identifier='PLSQL';\nalter session set events 'trace[rdbms.SQL_Optimizer.*][sql:9rjmrhbjuasav]';\n\
    \nSQL> @area\n\nPackage created.\n\nPackage body created.\n\nArea is 314.2\n\n\
    PL/SQL procedure successfully completed.\n\nSession altered.\n\nSQL> host dir\
    \ f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\\*.trc\n Volume in drive F\
    \ is My Passport\n Volume Serial Number is 1E65-69CC\n\nDirectory of f:\\app\\\
    stelios\\diag\\rdbms\\snc1\\snc1\\trace\n\n10/06/2012  09:49 AM              \
    \ 2,593 snc1_dbrm_2404.trc\n10/06/2012  09:46 AM               1,175 snc1_j000_4956.trc\n\
    10/06/2012  09:46 AM             130,630 snc1_ora_4804_PLSQL.trc\n10/06/2012 \
    \ 06:00 AM                 973 snc1_vkrm_2948.trc\n               4 File(s)  \
    \       135,371 bytes\n               0 Dir(s)  799,840,133,120 bytes free\n```\n\
    \n不要再因为 SQL 在 PL/SQL 块内而借口说无法获取跟踪文件了。你可以之后用以下命令关闭该 SQL ID 的跟踪：\n\n```sql\nALTER\
    \ SESSION SET EVENTS 'trace[rdbms.SQL_Optimizer.*]off';\n```\n\n收集 10053 的老方法是使用\
    \ `alter session`，前面提到过，这种方法效果很好。它也更容易记住，并且是迄今为止收集跟踪最受欢迎的方式，因为它适用于大多数版本的 Oracle。\n\
    \n```sql\nALTER SESSION SET EVENTS '10053 trace name context forever, level 1';\n\
    ```\n\n## 什么是查询转换？\n\n既然我们知道如何获取 10053（而 SQLT 使得这一点特别容易），我们需要看一些可以在其上执行的查询（以及一些查询转换）的示例。正如我们在本章前面提到的，查询转换是优化器为了将一条\
    \ SQL 语句改变为另一条逻辑上相同（并将给出相同结果）的 SQL 语句而执行的过程。\n\n以下是一些常见的查询转换及其代码：\n\n*   子查询解嵌套：`SU`\n\
    *   复杂视图合并：`CVM`\n*   连接谓词下推：`JPPD`"
- fmt: "# 查看10053跟踪文件与理解查询转换\n\n幸运的是，如果你想获得所有缩写及其含义的完整列表，可以在10053跟踪文件的“Legend”部分查看。请参考[图\
    \ 5-2](#9781430248095_Ch05.xhtml#Fig2)中的示例。每个10053跟踪文件都会显示这样一个部分，它展示了所有SQL语句可能用到的所有查询转换。这个部分并不针对正在被分析的特定SQL语句。\n\
    \n![9781430248095_Fig05-02.jpg](Images/9781430248095_Fig05-02.jpg)\n\n**图 5-2**  10053跟踪文件的Legend部分\n\
    \n## 子查询非嵌套\n\n子查询非嵌套是我们列表中的第一个查询转换，其正式定义是：一种将子查询转换为外部查询中的连接的查询转换技术，这随后允许优化器将子查询中的表纳入连接顺序、访问路径和连接方法的考虑范围。我们将通过这个例子来探讨查询优化，因为它是一个常用的技术；相关的示例也易于解释和生成！\n\
    \n一个可以使用子查询非嵌套的示例查询是：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\nfrom\
    \ employees\nwhere\nhire_date IN (\nselect hire_date from employees where department_id\
    \ = 30\n);\n```\n\n子查询部分位于括号内，在这个子查询示例中我们使用了 `IN`。\n\n让我们看看当我们使用事件10053跟踪这个查询时会发生什么，如下所示：\n\
    \n```\nSQL> connect hr/hr\nConnected.\nSQL> alter session set max_dump_file_size=unlimited;\n\
    \nSession altered.\n\nSQL> alter session set events '10053 trace name context\
    \ forever, level 1';\n\nSession altered.\n\nSQL> select /*+ hard parse */ first_name,\
    \ last_name, hire_Date\n  2  from employees where hire_date in\n  3  (select hire_date\
    \ from employees where\n  4  department_id=30);\n\nFIRST_NAME           LAST_NAME\
    \                 HIRE_DATE\n-------------------- ------------------------- ---------\n\
    Den                  Raphaely                  07-DEC-02\nAlexander          \
    \  Khoo                      18-MAY-03\nShelli               Baida           \
    \          24-DEC-05\nSigal                Tobias                    24-JUL-05\n\
    Guy                  Himuro                    15-NOV-06\nKaren              \
    \  Colmenares                10-AUG-07\n\n6 rows selected.\n\nSQL> connect / as\
    \ sysdba\nConnected.\nSQL> show parameter user_dump_Dest\n\nNAME             \
    \                    TYPE        VALUE\n------------------------------------ -----------\
    \ ------------------------------\nuser_dump_dest                       string\
    \      f:\\app\\stelios\\diag\\rdbms\\snc1\n                                 \
    \                \\snc1\\trace\n```\n\n跟踪文件位于 `user_dump_dest` 所指向的任何位置。如果我们编辑该跟踪文件，将看到[图\
    \ 5-3](#9781430248095_Ch05.xhtml#Fig3)中所示的头部信息。\n\n![9781430248095_Fig05-03.jpg](Images/9781430248095_Fig05-03.jpg)\n\
    \n**图 5-3**  示例10053跟踪文件的第一页\n\n我们看到了通常的签名文本，告诉我们操作系统、Oracle版本等信息。本次讨论的重要部分是确认我们期望解析的SQL语句是否出现在“Current\
    \ SQL statement for this session”部分（位于[图 5-3](#9781430248095_Ch05.xhtml#Fig3)的底部）。在我们的例子中，我们在原始SQL中添加了提示\
    \ `/*+ hard parse */`，这个提示也出现在了10053部分的“Current SQL section”下。因此我们可以基本确定这是正确的SQL。\n\
    \n那么，我们如何知道子查询非嵌套是否发生了呢？我们在10053跟踪文件中搜索与[图 5-4](#9781430248095_Ch05.xhtml#Fig4)类似的文本。我们应该搜索“subquery\
    \ unnesting”，但我在图中高亮了与子查询非嵌套相关的部分。注意这些行开头的“SU”。这告诉你优化器正在考虑该查询的子查询非嵌套转换。\n\n![9781430248095_Fig05-04.jpg](Images/9781430248095_Fig05-04.jpg)\n\
    \n**图 5-4**  10053跟踪文件中的文本显示了子查询非嵌套的发生过程\n\n我们还可以看到转换后的新SQL是什么。请参阅[图 5-5](#9781430248095_Ch05.xhtml#Fig5)来查看我们的测试查询被转换成了什么。\n\
    \n![9781430248095_Fig05-05.jpg](Images/9781430248095_Fig05-05.jpg)\n\n**图 5-5**  转换后的最终查询\n\
    \n这个查询在语义上看起来和原始查询一样吗？原始查询是：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\n\
    from employees\nwhere\nhire_date IN (\nselect hire_date from employees where department_id\
    \ = 30\n);\n```\n\n而这是新的查询：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_date\n\
    from employees A, employees B\nwhere\nA.hire_date = B.hire_date\nand\nA.department_id=30;\n\
    ```\n\n通过上面这个相当简单的例子，我们了解了什么是子查询非嵌套。子查询非嵌套的目标是允许优化器可能使用其他连接方式或表顺序，以更高效地获得满意的结果。换句话说，通过移除子查询，我们给了优化器更多的自由去使用其他连接方式，因为我们把表名提升到了主查询的层级。子查询非嵌套有许多变体。例如，子查询可能使用\
    \ `NOT IN` 或 `NOT EXISTS`。我们不会涵盖这种技术的所有变体和组合，也不会介绍其他查询转换。（你可以轻松地就查询转换写一整本书。）只需知道10053跟踪文件会列出它考虑过的内容并显示它所执行的操作。此时你应该问的问题是：“如果它能正常工作，我为什么要在意优化器‘底层’在做什么？”\n\
    \n## 为什么要禁用查询转换？\n\n在某些情况下，你可能希望关闭特定的转换：例如，当优化器的错误导致问题时。这可能是因为Oracle支持建议进行更改或指出某个查询转换存在问题。在你管理的系统上，你也可能会看到下面显示的一些隐藏参数。以下是一些可以影响CBO（基于成本的优化器）进行查询转换的基于成本的优化器参数：\n\
    \n*   `_complex_view_merging`\n*   `_convert_set_to_join`\n*   `_unnest_subquery`\n\
    *   `_optimizer_cost_based_transformation`\n*   `_optimizer_extend_jppd_view_types`\n\
    *   `_optimizer_filter_pred_pullup`\n*   `_optimizer_group_by_placement`\n*  \
    \ `_optimizer_improve_selectivity`\n*   `_optimizer_join_elimination_enabled`\n\
    *   `_optimizer_join_factorization`\n*   `_optimizer_multi_level_push_pred`\n\
    *   `_optimizer_native_full_outer_join`\n*   `_optimizer_order_by_elimination_enabled`\n\
    *   `_optimizer_push_pred_cost_based`\n*   `_optimizer_unnest_all_subqueries`\n\
    *   `_optimizer_unnest_corr_set_subq`\n*   `_optimizer_squ_bottomup`\n*   `_optimizer_null_aware_antijoin`\n\
    *   `_pred_move_around`\n*   `_push_join_predicate`\n\n以下是一些影响此行为的提示：\n\n*   `first_rows(n)`\n\
    *   `no_query_transformation`\n*   `unnest`\n*   `no_unnest`\n*   `push_pred`\n\
    *   `no_push_pred`\n*   `push_subq`\n*   `native_full_outer_join`\n*   `no_push_subq`\n\
    *   `no_set_to_join`\n*   `qb_name`"
  raw: "Luckily if you want a full listing of the abbreviations and their meanings\
    \ you can look in the 10053 trace file in the “Legend” section. Look at [Figure\
    \ 5-2](#9781430248095_Ch05.xhtml#Fig2) for an example. A section like this is\
    \ shown in every 10053 trace file, and it shows all the query transformations\
    \ that can be used for all SQL statements. This section is not specific to the\
    \ SQL statement being examined.\n\n![9781430248095_Fig05-02.jpg](Images/9781430248095_Fig05-02.jpg)\n\
    \n[Figure 5-2](#9781430248095_Ch05.xhtml#_Fig2) .  The Legend section of the 10053\
    \ trace file\n\nSubquery unnesting, the first query transformation on our list,\
    \ is formally defined as a query transformation that converts a subquery into\
    \ a join in the outer query, which then allows subquery tables to be considered\
    \ for join order, access paths and join methods. We’ll look at this example of\
    \ query optimization because it is a commonly used one; examples for this are\
    \ also easy to explain and to generate!\n\nAn example query that can use subquery\
    \ unnesting is:\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\nfrom employees\n\
    where\nhire_date IN (\nselect hire_date from employees where department_id = 30\n\
    );\n```\n\nThe subquery part is inside the brackets, and in this subquery example\
    \ we are using `IN`.\n\nLet’s see what happens when we trace this query with event\
    \ 10053, as shown below:\n\n```\nSQL> connect hr/hr\nConnected.\nSQL> alter session\
    \ set max_dump_file_size=unlimited;\n\nSession altered.\n\nSQL> alter session\
    \ set events '10053 trace name context forever, level 1';\n\nSession altered.\n\
    \nSQL> select /*+ hard parse */ first_name, last_name, hire_Date\n  2  from employees\
    \ where hire_date in\n  3  (select hire_date from employees where\n  4  department_id=30);\n\
    \nFIRST_NAME           LAST_NAME                 HIRE_DATE\n--------------------\
    \ ------------------------- ---------\nDen                  Raphaely         \
    \         07-DEC-02\nAlexander            Khoo                      18-MAY-03\n\
    Shelli               Baida                     24-DEC-05\nSigal              \
    \  Tobias                    24-JUL-05\nGuy                  Himuro          \
    \          15-NOV-06\nKaren                Colmenares                10-AUG-07\n\
    \n6 rows selected.\n\nSQL> connect / as sysdba\nConnected.\nSQL> show parameter\
    \ user_dump_Dest\n\nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- ------------------------------\nuser_dump_dest                 \
    \      string      f:\\app\\stelios\\diag\\rdbms\\snc1\n                     \
    \                            \\snc1\\trace\n```\n\nThe trace file is located in\
    \ wherever `user_dump_dest` points to. If we edit that trace file, we’ll see the\
    \ header shown in [Figure 5-3](#9781430248095_Ch05.xhtml#Fig3).\n\n![9781430248095_Fig05-03.jpg](Images/9781430248095_Fig05-03.jpg)\n\
    \n[Figure 5-3](#9781430248095_Ch05.xhtml#_Fig3) .  The first page of the example\
    \ 10053 trace file\n\nWe see the usual signature text, telling us about the operating\
    \ system, the version of Oracle and so on. The important part for this discussion\
    \ is to check that the SQL statement we thought we were parsing is found under\
    \ the “Current SQL statement for this session” section (at the bottom of [Figure\
    \ 5-3](#9781430248095_Ch05.xhtml#Fig3)). In our case we put the hint `/*+ hard\
    \ parse */` in the original SQL, and this has appeared in the 10053 section under\
    \ the “Current SQL section”. So we’re pretty sure it’s the right SQL.  So how\
    \ do we know if subquery unnesting is taking place? We search the 10053 trace\
    \ file for text similar to that in [Figure 5-4](#9781430248095_Ch05.xhtml#Fig4).\
    \ We would search for “subquery unnesting”, but I’ve highlighted the section relating\
    \ to subquery unnesting. Notice the “SU” at the beginning of the lines. This tells\
    \ you the optimizer is looking at the query with regard to subquery unnesting.\n\
    \n![9781430248095_Fig05-04.jpg](Images/9781430248095_Fig05-04.jpg)\n\n[Figure\
    \ 5-4](#9781430248095_Ch05.xhtml#_Fig4) .  The text in the 10053 trace file shows\
    \ subquery unnesting taking place\n\nWe can also see what the new SQL is after\
    \ it has been transformed. See [Figure 5-5](#9781430248095_Ch05.xhtml#Fig5) to\
    \ see what our test query has been changed into.\n\n![9781430248095_Fig05-05.jpg](Images/9781430248095_Fig05-05.jpg)\n\
    \n[Figure 5-5](#9781430248095_Ch05.xhtml#_Fig5) .  The final query after transformation\n\
    \nDoes this query look semantically the same as the original query to you? This\
    \ was the original query:\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\n\
    from employees\nwhere\nhire_date IN (\nselect hire_date from employees where department_id\
    \ = 30\n);\n```\n\nand this is the new query:\n\n```\nSelect\nfirst_name,\nlast_name,\n\
    hire_date\nfrom employees A, employees B\nwhere\nA.hire_date = B.hire_date\nand\n\
    A.department_id=30;\n```\n\nWe see from the above example what subquery unnesting\
    \ is, from a fairly simple example. The objective of subquery unnesting is to\
    \ allow the optimizer to possibly use other joins or table orders to get satisfactory\
    \ results more efficiently. In other words, by removing the subquery we give the\
    \ optimizer more freedom to use other joins because we’ve moved the table name\
    \ up a level into the main query. There are many variations on subquery unnesting.\
    \ For example, the subquery could utilize `NOT IN` or `NOT EXISTS`.  We will not\
    \ cover all the variations and combinations of this technique or cover the other\
    \ query transformations. (You could easily write a whole book on just query transformations.)\
    \ Suffice it to say the 10053 trace file will list what it has considered and\
    \ show what it has done. The question you should be asking at this point is “Why\
    \ do I care, what the optimizer is doing ‘under the hood’ if it works properly?”\n\
    \nWhy Would We Want to Disable Query Transformations?\n\nThere are situations\
    \ in which you may want to turn off particular transformations: for example, where\
    \ an optimizer bug is causing a problem. This may be because Oracle support has\
    \ suggested changes or indicated that there is a problem with a query transformation.\
    \ You may also see some of the hidden parameters shown below on a system that\
    \ you are managing. Here are some cost-based optimizer parameters that can influence\
    \ the CBO with regard to query transformation:\n\n*   `_complex_view_merging`\n\
    *   `_convert_set_to_join`\n*   `_unnest_subquery`\n*   `_optimizer_cost_based_transformation`\n\
    *   `_optimizer_extend_jppd_view_types`\n*   `_optimizer_filter_pred_pullup`\n\
    *   `_optimizer_group_by_placement`\n*   `_optimizer_improve_selectivity`\n* \
    \  `_optimizer_join_elimination_enabled`\n*   `_optimizer_join_factorization`\n\
    *   `_optimizer_multi_level_push_pred`\n*   `_optimizer_native_full_outer_join`\n\
    *   `_optimizer_order_by_elimination_enabled`\n*   `_optimizer_push_pred_cost_based`\n\
    *   `_optimizer_unnest_all_subqueries`\n*   `_optimizer_unnest_corr_set_subq`\n\
    *   `_optimizer_squ_bottomup`\n*   `_optimizer_null_aware_antijoin`\n*   `_pred_move_around`\n\
    *   `_push_join_predicate`\n\nThese are some hints that influence this behavior:\n\
    \n*   `first_rows(n)`\n*   `no_query_transformation`\n*   `unnest`\n*   `no_unnest`\n\
    *   `push_pred`\n*   `no_push_pred`\n*   `push_subq`\n*   `native_full_outer_join`\n\
    *   `no_push_subq`\n*   `no_set_to_join`\n*   `qb_name`"
  trans: "\n# 查看 10053 跟踪文件与理解查询转换\n\n幸运的是，如果你想获得所有缩写及其含义的完整列表，可以在 10053 跟踪文件的“Legend”部分查看。请参考图\
