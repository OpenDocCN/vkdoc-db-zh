  trans: "## 使用 Hints 的考量与执行计划分析\n\n有时使用提示是正确的，但有时却是错误的。偶尔，提示是从旧代码中继承下来的，而移除它们以期望性能提升，则需要开发者有足够的勇气。提示也是优化器（CBO）在制定执行计划过程中的一种数据输入形式。之所以常常需要提示，是因为提供给优化器的其他信息是错误的。例如，如果对象统计信息错误，你可能就需要\
    \ `需要` 给优化器一个提示，因为它的统计信息是错的。\n\n这是使用提示的正确方式吗？不是。这样使用提示的问题在于，它可能在被应用时是正确的，但后来可能就错了，而事实上很可能就是如此。如果你想调优代码，首先移除那些提示，让优化器自由运行，去“感受”数据的脉动，摆脱束缚。确保它拥有良好且最新的统计信息，然后看看它会得出什么结果。\n\
    \n### 获取 SQL 文本与执行计划\n\n你总是可以通过点击 SQLT 报告顶部的“SQL Text”链接来获取你正在评估的 SQL 文本。这是另一个查询示例。这次我们使用了一个包含两个别名的\
    \ `USE_NL` 提示。\n\n```sql\nSQL> set autotrace traceonly explain;\nSQL> select cust_first_name,\
    \ amount_sold\n  2  from customers C, sales S\n  3  where c.cust_id=s.cust_id\
    \ and amount_sold>100;\nSQL> REM\nSQL> REM 这是执行计划\nSQL> REM\n```\n\n```\n执行计划\n\
    \nPlan hash value: 3549450340\n\n| Id  | Operation            | Name      | Rows\
    \  | Bytes |TempSpc| Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT     |\
    \           |   144K|  3107K|       |  1118   (2)| 00:00:14 |\n|*  1 |  HASH JOIN\
    \           |           |   144K|  3107K|  1304K|  1118   (2)| 00:00:14 |\n| \
    \  2 |   TABLE ACCESS FULL  | CUSTOMERS | 55500 |   650K|       |   405   (1)|\
    \ 00:00:05 |\n|   3 |   PARTITION RANGE ALL|           |   144K|  1412K|     \
    \  |   496   (4)| 00:00:06 |\n|*  4 |    TABLE ACCESS FULL | SALES     |   144K|\
    \  1412K|       |   496   (4)| 00:00:06 |\n\n谓词信息 (由操作 ID 标识):\n\n1 - access(\"\
    C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"AMOUNT_SOLD\">100)\n```\n\n\
    我只展示了执行计划的一部分，因为我们只对操作（在“Operation”列下）感兴趣。`Id` 为 1 的操作显示的是哈希连接。这可能是合理的，因为 `sales`\
    \ 表中有超过 90 万行数据。拥有最多行的对象（本例中是 `SALES`）首先被读取，然后是 `CUSTOMERS`（只有 55,500 行）。因此，如果我们决定改用嵌套循环，我们会像这样在代码中添加一个提示：\n\
    \n```sql\nSQL> select /*+ USE_NL(C S) */\n  cust_first_name,\n  amount_sold\n\
    from\n  customers C,\n  sales S\nwhere\n  c.cust_id=s.cust_id\n  and amount_sold>100;\n\
    ```\n\n```\n执行计划\n\nPlan hash value: 4237376444\n\n| Id  | Operation         \
    \           | Name         | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0\
    \ | SELECT STATEMENT             |              |   144K|  3107K|   145K  (1)|\
    \ 00:29:03 |\n|   1 |  NESTED LOOPS                |              |       |  \
    \     |            |\n|   2 |   NESTED LOOPS               |              |  \
    \ 144K|  3107K|   145K  (1)| 00:29:03 |\n|   3 |    PARTITION RANGE ALL      \
    \ |              |   144K|  1412K|   496   (4)| 00:00:06 |\n|*  4 |     TABLE\
    \ ACCESS FULL        | SALES        |   144K|  1412K|   496   (4)| 00:00:06 |\n\
    |*  5 |    INDEX UNIQUE SCAN         | CUSTOMERS_PK |     1 |       |     0  \
    \ (0)| 00:00:01 |\n|   6 |   TABLE ACCESS BY INDEX ROWID| CUSTOMERS    |     1\
    \ |    12 |     1   (0)| 00:00:01 |\n\n谓词信息 (由操作 ID 标识):\n\n4 - filter(\"AMOUNT_SOLD\"\
    >100)\n   5 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n```\n\n提示被包含在 `/*+`\
    \ 和 `*/` 之间，和之前一样。这些提示括号内的任何内容都会被优化器考虑。但重要的是要认识到，提示（本例中是 `USE_NL(C S)`）必须是有效的。注意现在操作已经改变了。现在的计划是使用嵌套循环，而不是哈希连接。成本比哈希连接计划高得多，达到了\
    \ 145,000，但优化器必须遵守这个提示，因为它是有效的。如果提示无效，则不会产生错误，优化器会继续执行，就像没有提示一样。看看会发生什么。\n\n```sql\n\
    SQL> select /*+ MY_HINT(C S) */ cust_first_name, amount_sold\nfrom\n  customers\
    \ C, sales S\nwhere c.cust_id=s.cust_id and amount_sold>100;\n```\n\n```\n执行计划\n\
    \nPlan hash value: 3549450340\n\n| Id  | Operation            | Name      | Rows\
    \  | Bytes |TempSpc| Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT     |\
    \           |   144K|  3107K|       |  1118   (2)| 00:00:14 |\n|*  1 |  HASH JOIN\
    \           |           |   144K|  3107K|  1304K|  1118   (2)| 00:00:14 |\n| \
    \  2 |   TABLE ACCESS FULL  | CUSTOMERS | 55500 |   650K|       |   405   (1)|\
    \ 00:00:05 |\n|   3 |   PARTITION RANGE ALL|           |   144K|  1412K|     \
    \  |   496   (4)| 00:00:06 |\n|*  4 |    TABLE ACCESS FULL | SALES     |   144K|\
    \  1412K|       |   496   (4)| 00:00:06 |\n\n谓词信息 (由操作 ID 标识):\n\n1 - access(\"\
    C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"AMOUNT_SOLD\">100)\n```\n\n\
    优化器看到了我的提示，但没有将其识别为有效的提示，于是忽略了它并自行决定，本例中它回到了哈希连接。\n\n### 执行历史变更\n\n在调查性能问题时，了解\
    \ SQL 性能何时发生变化至关重要。像“昨天还好好的”这样的模糊报告不够精确，尽管它们可能通过将你的分析引导到 SQLT 报告中的特定时间段来提供帮助。优化器环境的每一次更改（参数更改）都有时间戳。每次执行更改时，都会创建一个新的执行计划，该计划也有时间戳。每次执行\
    \ SQL 语句时，其度量指标都会被收集并存储在 AWR 存储库中。这与 Oracle 中自动建议 SQL 改进功能使用的数据源相同。SQLT 利用这些数据源来构建你所选\
    \ SQL ID 的执行历史。这座信息宝库只需在 SQLT HTML 报告顶部点击一下即可访问。点击“Plans”标题下的“Performance History”链接。根据你的\
    \ SQL 在系统中执行的次数，你可能会看到类似图 2-9 中的截图。完整的 HTML 报告中还有其他列，但我们现在将讨论限制在“Opt Env Hash\
    \ Value”上。\n\n![9781430248095_Fig02-09.jpg](img/9781430248095_Fig02-09.jpg)\n\n\
    图 2-9 .  优化器环境哈希值（Optimizer Env Hash Value）在 2 月 22 日从 3945002051 变为 2904154100。这意味着\
    \ CBO 环境在那一天有某些方面发生了变化。\n\n查看图 2-9 中该语句历史的“Opt Env Hash Value”。对于我们正在分析的这一条 SQL\
    \ 语句，根据其“开始时间”和“结束时间”列表，我们看到其他变化正在发生。例如，执行计划哈希值（针对同一条 SQL 语句）改变了，“Opt Env Hash\
    \ Value”也改变了。它的值是`2904154100`，直到 2012 年 2 月 17 日。然后它变为`3945002051`，再变回`2904154100`，然后又变回`3945002051`（在\
    \ 2 月 18 日）。优化器环境的某些方面在那些日期发生了变化。这些变化是改善了情况还是使之恶化？请注意，每次优化器哈希值变化时，执行计划的哈希值也随之变化。有某人或某事在改变优化器的环境并影响执行计划。\n\
    \n### 列统计信息"
- fmt: "# 观察与直方图问题\n\n其中一个SQLT报告示例（我们查看的第一个）在观察部分包含以下行：\n\n| TABLE | SYS.OBJ$ | Table\
    \ contains 4 column(s) referenced in predicates where the number of distinct values\
    \ does not match the number of buckets. |\n\n如果我按照主HTML报告顶部的链接查看列统计信息（点击“Columns”然后“Column\
    \ Statistics”），可以在[图2-10](#9781430248095_Ch02.xhtml#Fig10)中看到结果。\n\n![9781430248095_Fig02-10.jpg](Images/9781430248095_Fig02-10.jpg)\n\
    \n[图2-10](#9781430248095_Ch02.xhtml#_Fig10) .  列统计信息\n\n统计信息的第二行对应`OWNER#`表列。向右看`Num\
    \ Distinct`值。您会看到它是30，表示估计的不同值数量。收集统计信息时，可能确实有大约30个不同的值。但请注意“Histogram”列！它显示了一个包含25个桶的`FREQUENCY`类型直方图。在`FREQUENCY`类型直方图中，每个可能的值都有一个用于保存该值数量的桶。例如，如果从1到255的每个值都只有一个值，那么每个桶将包含一个“1”。如果第一个桶（标记为“1”）中有300，这表示值1在数据中出现了300次。优化器使用这些保存在桶中的数字来计算检索与该值相关的数据的成本。因此，在上面的例子中，检索“1”会比从同一个表中检索“2”成本更高（因为“1”的值更多）。如果我们有10个桶（每个桶有其`FREQUENCY`值），然后我们尝试检索某些数据并找到一个“11”，那么优化器必须猜测这个新值从未被收集过，并对值的可能性做出某些假设（例如，对于高于最大值和低于最小值的情况，可能性会急剧下降）。范围中间没有桶的值会被插值。因此，如果您拥有的桶少于255个，那么在`FREQUENCY`直方图中拥有少于实际桶数是没有充分理由的。这没有任何意义。这种异常的结果是，为`OWNER#`列保存的直方图信息将缺少五个不同的值。如果这些不同的值很常见，并且您正在故障排除的查询恰好在谓词中使用了它们，优化器将不得不猜测它们的基数。\n\
    \n想象一下，例如以下情况：\n\n1.  想象一个包含“STELIOS”和“STEVEN”两个桶的直方图。现在我们添加第三个桶“STEPHAN”，他恰好是`OBJ$`中对象的所有者。\n\
    2.  假设`STELIOS`和`STEVEN`的直方图值如下：\n    *   `STELIOS` – 100个对象\n    *   `STEVEN`\
    \ – 110个对象\n    *   这意味着对于这个特定表，`STELIOS`拥有100条对象记录，`STEVEN`拥有110条对象记录。因此，当创建直方图时，`STELIOS`和`STEVEN`的桶分别填充了100和110。\n\
    3.  进一步假设`STEPHAN`实际拥有500个对象，因此他在表中有500条记录。优化器并不知道这一点，因为`STEPHAN`是在收集统计信息之后的某个时间创建的。\n\
    \n优化器现在猜测`STEPHAN`的基数为105，而实际上`STEPHAN`有500个对象。因为`STEPHAN`按字母顺序介于`STELIOS`和`STEVEN`之间，优化器假定`STEPHAN`的`Num\
    \ Distinct`值介于其他两个用户的值之间（105是相邻两个桶的平均值）。结果是CBO对基数的猜测将偏离很远。我们会在执行计划中看到这一点（例如，如果我们运行`SQLT\
    \ XECUTE`，会是一个低估），然后我们可以深入查看`OWNER#`列，并发现列统计信息是错误的。要解决这个问题，我们会为`SYS.OBJ$`收集统计信息。当然，在这种情况下，由于我们使用的示例是`SYS`对象，收集统计信息有特殊过程，但通常这种问题会发生在用户表上，应使用正常的`DBMS_STATS`收集过程。\n\
    \n## 超出范围值\n\n当CBO必须在两个值之间猜测基数时，它所面临的情况已经足够糟糕，但还不如下一种情况：谓词中的值超出范围——要么大于统计信息所见的最大值，要么小于统计信息所见的最小值。在这些情况下，优化器假设超出范围值的估计值逐渐趋近于零。如果该值远高于最高值，优化器可能会估计一个非常低的基数，例如1。基数为1可能会促使优化器尝试笛卡尔连接，如果实际基数是10,000，这将导致非常差的性能。解决此类问题的方法将是相同的。\n\
    \n1.  使用`XECUTE`获取执行计划。\n2.  在“执行计划”部分查看执行计划，并如前所述查看“more”下的谓词。\n3.  查看谓词中列的统计信息，看看是否有问题。麻烦迹象的例子包括：\n\
    \    *   a. 缺失的桶（如前一节所述）\n    *   b. 没有直方图但数据高度偏斜\n\n当数据在当前数据集的高端或低端插入时，超出范围的值可能特别麻烦。无论如何，通过研究`SQLT`中出现的直方图，您很有机会了解您的数据及其随时间的变化情况。这对于设计调整SQL或收集良好统计信息的策略来说是宝贵的信息。\n\
    \n## 高估与低估\n\n现在让我们看一个SQL片段的示例，它有如此多的连接，以至于操作数量达到了96个。参见[图2-11](#9781430248095_Ch02.xhtml#Fig11)，它显示了生成的执行计划的一小部分。\n\
    \n![9781430248095_Fig02-11.jpg](Images/9781430248095_Fig02-11.jpg)\n\n[图2-11](#9781430248095_Ch02.xhtml#_Fig11)\
    \ .  执行计划的一小部分，包含96个步骤\n\n我们如何处理有96个或更多步骤的执行计划？我们是否需要将该计划交给开发团队并告诉他们去调优？使用`SQLT`，您不需要这样做。\n\
    \n让我们更详细地查看此页面，放大右上角部分并查看屏幕上的高估和低估部分（参见[图2-12](#9781430248095_Ch02.xhtml#Fig12)）。\n\
    \n![9781430248095_Fig02-12.jpg](Images/9781430248095_Fig02-12.jpg)\n\n[图2-12](#9781430248095_Ch02.xhtml#_Fig12)\
    \ .  显示执行计划高估和低估部分的右上角区域"
  raw: "One of the example SQLT reports (the first one we looked at) had the following\
    \ line in the observation:\n\n| TABLE | SYS.OBJ$ | Table contains 4 column(s)\
    \ referenced in predicates where the number of distinct values does not match\
    \ the number of buckets. |\n\nIf I follow the link to the column statistics (from\
    \ the top section of the main HTML report, click on “Columns” then “Column Statistics”),\
    \ I can see the results in [Figure 2-10](#9781430248095_Ch02.xhtml#Fig10).\n\n\
    ![9781430248095_Fig02-10.jpg](Images/9781430248095_Fig02-10.jpg)\n\n[Figure 2-10](#9781430248095_Ch02.xhtml#_Fig10)\
    \ .  Column statistics\n\nThe second line of statistics is for the OWNER# table\
    \ column. Look toward the right at the Num Distinct value. You’ll see that it\
    \ is 30, representing that number of estimated distinct values. At the time the\
    \ statistics were collected there probably were 30 or so distinct values. But\
    \ notice the “Histogram” column! It shows a FREQUENCY type histogram with 25 buckets.\
    \ In a FREQUENCY type histogram each possible value has a bucket in which is kept\
    \ the number of values for that value. So for example if every value from 1 to\
    \ 255 had only one value then each bucket would contain a “1”. If the first bucket\
    \ (labeled “1” had 300 in it, this would mean that the value 1 had been found\
    \ 300 times in the data. These numbers kept in the buckets are then used by the\
    \ optimizer to calculate costs for retrieving data related to that value. So in\
    \ our example above retrieving a “1” would be more costly than retrieving a “2”\
    \ from the same table (because there are more values that are “1”s). If we had\
    \ 10 buckets (each with their FREQUENCY value) and then we attempt to retrieve\
    \ some data and find an “11”, then the optimizer has to guess that this new value\
    \ was never collected and makes certain assumptions about the values likelihood\
    \ (such as for higher and lower than the maximum values) the likelihood drops\
    \ off dramatically as we go above the maximum value or below the minimum value.\
    \ Values that have no buckets in the middle of the range are interpolated. So\
    \ if you have less than 255 buckets, there is no good reason to have less than\
    \ the actual number of buckets in a FREQUENCY histogram. That doesn’t make any\
    \ sense. The result of this kind of anomaly is that the histogram information\
    \ kept for the OWNER# column will have five distinct values missing. If the distinct\
    \ values are popular, and if the query you are troubleshooting happens to use\
    \ them in a predicate, the optimizer will have to guess their cardinality.\n\n\
    Imagine for example, the following situation:\n\n*   1.  Imagine a two bucket\
    \ histogram with “STELIOS” and “STEVEN”. Now we add a third bucket “STEPHAN”,\
    \ who happens to be the biggest owner of objects in OBJ$.\n*   2.  Let’s say the\
    \ histogram values for STELIOS and STEVEN as follows:\n\n*   STELIOS –  100 objects\n\
    *   STEVEN –  110 objects\n*   This means that for this particular table STELIOS\
    \ has 100 records for objects he owns and STEVEN has 110 objects that he owns.\
    \ So when the histogram was created the buckets for STELIOS and STEVEN were filled\
    \ with 100 and 110.\n\n*   3.  Further say that STEPHAN really owns 500 objects,\
    \ so he has 500 records in the table. The optimizer doesn’t know that though,\
    \ because STEPHAN was created at some point after statistics were collected.\n\
    \nThe optimizer now guesses the cardinality of STEPHAN as 105, when in fact STEPHAN\
    \ has 500 objects. Because STEPHAN falls between STELIOS and STEVEN (alphabetically\
    \ speaking), the optimizer presumes the Num Distinct value for STEPHAN falls between\
    \ the values for the other two users (105 is the average of the two adjacent,\
    \ alphabetically speaking, buckets. The result is that the CBO’s guess for cardinality\
    \ will be a long way out. We would see this in the execution plan (as an under\
    \ estimate, if we ran a SQLT XECUTE), and we would drill into the OWNER# column\
    \ and see that the column statistics were wrong. To fix the problem, we would\
    \ gather statistics for SYS.OBJ$. In this case, of course, since the example we\
    \ used was a SYS object there are special procedures for gathering statistics,\
    \ but generally this kind of problem will occur on a user table and normal `DBMS_STATS`\
    \ gathering procedures should be used.\n\nOut-of-Range Values\n\nThe situation\
    \ the CBO is left with when it has to guess the cardinality between two values\
    \ is bad enough but is not as bad as the situation when the value in a predicate\
    \ is out of range: either larger than the largest value seen by the statistics\
    \ or smaller than the smallest value seen by the statistics. In these cases the\
    \ optimizer assumes that the estimated value for the out of range value tails\
    \ off towards zero. If the value is well above the highest value, the optimizer\
    \ may estimate a very low cardinality, say 1\\. A cardinality of 1 might persuade\
    \ the optimizer to try a Cartesian join, which would result in very poor  performance\
    \ if the actual cardinality was 10,000\\. The method of solving such a problem\
    \ would be the same.\n\n1.  Get the execution plan with XECUTE.\n2.  Look at the\
    \ execution plan in the Execution Plan section and look at the predicates under\
    \ “more” as described earlier.\n3.  Look at the statistics for the columns in\
    \ the predicates and see if there is something wrong. Examples of signs of trouble\
    \ would be\n    *   a.  A missing bucket (as described in the previous section)\n\
    \    *   b.  No histograms but highly skewed data\n\nOut-of-range values can be\
    \ particularly troublesome when data is being inserted at the higher or lower\
    \ ends of the current data set. In any case by studying the histograms that appear\
    \ in SQLT you have a good chance of understanding your data and how it changes\
    \ with time. This is invaluable information for designing a strategy to tune your\
    \ SQL or collecting good statistics.\n\nOver Estimates and Under Estimates\n\n\
    Now let’s look at a sample of a piece of SQL having so many joins that the number\
    \ of operations is up to 96.  See [Figure 2-11](#9781430248095_Ch02.xhtml#Fig11),\
    \ which shows a small portion of the resulting execution plan.\n\n![9781430248095_Fig02-11.jpg](Images/9781430248095_Fig02-11.jpg)\n\
    \n[Figure 2-11](#9781430248095_Ch02.xhtml#_Fig11) .  A small part of the execution\
    \ plan, with 96 steps\n\nHow do we handle an execution plan that has 96 steps,\
    \ or more? Do we hand that plan over to development and tell them to tune it?\
    \ With SQLT you don’t need to do this.\n\nLet’s look at this page in more detail,\
    \ by zooming in on the top right hand portion and look at the over and under estimates\
    \ part of the screen (see [Figure 2-12](#9781430248095_Ch02.xhtml#Fig12)).\n\n\
    ![9781430248095_Fig02-12.jpg](Images/9781430248095_Fig02-12.jpg)\n\n[Figure 2-12](#9781430248095_Ch02.xhtml#_Fig12)\
    \ .  The top right hand portion of the section showing the execution plan’s over\
    \ and under estimates"
