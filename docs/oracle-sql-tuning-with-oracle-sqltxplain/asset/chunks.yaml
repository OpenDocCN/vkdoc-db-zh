- fmt: '# Oracle SQL执行计划与成本分析


    ## 系统指标与成本计算


    我们获得了对象的基数后，就可以利用系统中的其他信息来计算任何操作的成本。系统中的其他信息包括：


    *   磁盘速度

    *   CPU速度

    *   CPU数量

    *   数据库块大小


    这些指标可以轻松从系统中提取，也显示在SQLT报告中（在“`Environment`”部分）。现在可以计算系统为任何特定步骤使用的I/O和CPU资源量，从而推导出一个确定的成本。这是所有调优的关键概念。优化器总是在尝试降低操作的成本。我不打算详细介绍这些成本是如何计算的，因为确切的数值并不重要。你只需要知道这一点：**数值越高越糟糕**，而糟糕可能源于更高的基数（可能基于过时的统计信息），并且如果你的磁盘I/O速度设置错误（可能过于乐观地偏低），那么即使在有索引可用的情况下，全表扫描也可能更受青睐。成本也可以直接转换为（空闲系统上的）耗时，但这可能并不是大多数情况下你最需要的信息，因为你几乎总是试图减少执行时间，即降低成本。正如我们将在下一节看到的，你可以从SQLT获取该信息。在某些情况下，SQLT还会生成一个10053跟踪文件，因此你可以查看成本计算的具体细节。


    ## 执行计划的阅读方法


    我们之前已经见过执行计划部分。它看起来很有趣，左侧参差不齐，还有很多超链接。这一切意味着什么？这是一个相当简单的执行计划，因为它不像SIEBEL或PeopleSoft的执行计划那样长达数页。


    阅读执行计划有一些简单的步骤。我相信阅读执行计划的方法不止一种，但这是我处理问题的方式。请记住，在这些例子中，如果你熟悉正在检查的SQL片段，你可能会直接跳到你认为有问题的部分；但一般来说，如果你是第一次看到执行计划，你会从查看几个关键成本开始。


    第一个也是最重要的成本是整个查询的总成本。这总是显示为“ID 0”，并且总是执行计划的第一行。在我们的例子（如图[1-5](#9781430248095_Ch01.xhtml#Fig5)所示）中，成本是256。因此，要获取整个查询的成本，只需看第一行。这也是最后执行的步骤（“`Exec
    Ord`”是18）。执行顺序不是从上到下，Oracle引擎将按照“`Exec Ord`”列所示的值顺序执行步骤。所以，如果我们跟踪执行过程，Oracle引擎将按以下顺序执行：


    1.  `INDEX FULL SCAN I_USER2`

    2.  `INDEX FULL SCAN I_USER2`

    3.  `TABLE ACCESS FULL OBJ$`

    4.  `HASH JOIN`

    5.  `HASH JOIN`

    6.  `INDEX UNIQUE SCAN I_IND1`

    7.  `TABLE ACCESS BY INDEX ROWID IND$`

    8.  `INDEX FULL SCAN I_USERS2`

    9.  `INDEX RANGE SCAN I_OBJ4`

    10. `NESTED LOOP`

    11. `FILTER`

    12. `INDEX FULL SCAN I_LINK1`

    13. `INDEX RANGE SCAN I_USERS2`

    14. `NESTED LOOPS`

    15. `UNION-ALL`

    16. `VIEW DBA_OBJECTS`

    17. `SORT AGGREGATE`

    18. `SELECT STATEMENT`


    然而，没有人会这样表示SQL语句的计划。重要的是要认识到，左侧的参差不齐提供了步骤如何执行的信息。缩进较少的操作表示在内部（缩进更多的）操作上执行的外部操作。例如，步骤2、3和4可以理解为：“使用`I_USERS2`执行索引全扫描，然后对`OBJ$`执行全表扫描，并将这些结果进行`HASH
    JOIN`以产生一个结果集。”每个操作为缩进较少的部分产生结果，直到最终结果呈现给`SELECT (ID = 0)`。


    “`Operation`”列也标有“+”和“–”以指示缩进相等的部分。这对于对齐操作以查看一个操作正在处理哪些结果集很有帮助。例如，重要的是要认识到步骤5的`HASH
    JOIN`正在使用来自步骤1、4、2和3的结果。我们稍后会看到更复杂的例子。同样重要的是要认识到，所示的成本也是每个操作的聚合成本。所以第一行显示的成本是整个操作的成本，我们还可以看到整个操作的大部分成本来自步骤3。（SQLT会以红色显示成本最高的操作）。现在让我们更详细地看看步骤1（如图[1-5](#9781430248095_Ch01.xhtml#Fig5)所示）。在我们的简单例子中，这是：


    ```

    INDEX FULL SCAN I_USER2

    ```


    让我们将整行翻译成英文：“首先为我执行索引`I_USERS2`的全扫描。我估计将返回93行，根据你当前的系统统计信息（单块读取时间和多块读取时间以及CPU速度），成本将为1。”


    第二和第三步是另一个`INDEX FULL SCAN`和对`OBJ$`的`TABLE ACCESS FULL`。这第三步的成本是251。整个SQL语句的总成本是256（首行）。因此，如果我们希望优化这个语句，我们知道收益必须来自这第三步（总成本256中它占了251的成本）。现在，将你的光标悬停在步骤3的“TABLE”一词上（参见图[1-8](#9781430248095_Ch01.xhtml#Fig8)）。


    ![9781430248095_Fig01-08.jpg](Images/9781430248095_Fig01-08.jpg)


    [图 1-8](#9781430248095_Ch01.xhtml#_Fig8)。通过“悬停”在链接上可以获取更多详细信息


    请注意如何显示有关对象的信息。


    *   `Object#`: 18

    *   `Owner`: SYS

    *   `Qblock`: SEL$1FF6F973

    *   `Alias`: O@SEL$4

    *   Current Table Statistics:

    *   `Analyzed`: 08-JUN-12 22:01:24

    *   `TblRows`: 73575

    *   `Blocks`: 905

    *   `Sample` 73575


    只需将鼠标悬停在对象上，你就可以获得其所有者、查询块名称、上次分析时间以及对象的大小。


    现在让我们看看“`Go To`”列。注意到该列下的“+”了吗？点击步骤3对应的“+”，你将得到一个类似图[1-9](#9781430248095_Ch01.xhtml#Fig9)的结果。


    ![9781430248095_Fig01-09.jpg](Images/9781430248095_Fig01-09.jpg)


    [图 1-9](#9781430248095_Ch01.xhtml#_Fig9)。通过展开执行计划上的部分可以显示更多超链接


    因此，从执行计划出发，你可以直接跳转到“`Col Statistics`”或“`Stats Versions`”或其他许多内容。你根据自己目前的理解以及你认为执行计划哪里有问题来决定下一步去哪里。现在关闭那个展开的区域，点击步骤3“`More`”列下的“+”（参见图[1-10](#9781430248095_Ch01.xhtml#Fig10)）


    ![9781430248095_Fig01-10.jpg](Images/9781430248095_Fig01-10.jpg)


    [图 1-10](#9781430248095_Ch01.xhtml#_Fig10)。这里我们看到“More”标题下的扩展内容


    现在我们看到了过滤谓词和投影。这些可以帮助你理解优化器在执行计划的哪一行考虑谓词，以及哪些值用于过滤器。


    在第一个执行计划正上方有一个名为“`Execution Plans`”的部分。这列出了Oracle引擎为该SQL看到的所有不同执行计划。因为执行计划可以存储在系统中的多个地方，所以在报告的“`Execution
    Plans`”部分中很可能有多个条目。其来源将被注明（在“`Source`”列下）。以下是我遇到过的来源列表：


    *   `GV$SQL_PLAN`

    *   `GV$SQLAREA_PLAN_HASH`

    *   `PLAN_TABLE`

    *   `DBA_SQLTUNE_PLANS`

    *   `DBA_HIST_SQL_PLAN`'
  raw: 'Now that we have cardinality for an object we can work with other information
    derived from the system to calculate a cost for any operation. Other information
    from the system includes the following:


    *   Speed of the disks

    *   Speed of the CPU

    *   Number of CPUs

    *   Database block size


    These metrics can be easily extracted from the system and are shown in the SQLT
    report also (under the “Environment” section). The amount of I/O and CPU resource
    used on the system for any particular step can now be calculated and thus used
    to derive a definite cost. This is the key concept for all tuning. The optimizer
    is always trying to reduce the cost for an operation. I won’t go into details
    about how these costs are calculated because the exact values are not important.
    All you need to know is this: higher is worse, and worse can be based on higher
    cardinality (possibly based on out-of-date statistics), and if your disk I/O speeds
    are wrong (perhaps optimistically low) then full table scans might be favored
    when indexes are available. Cost can also be directly translated into elapsed
    time (on a quiet system), but that probably isn’t what you need most of the time
    because you’re almost always trying to get an execution time to be reduced, i.e.,
    lower cost. As we’ll see in the next section, you can get that information from
    SQLT. SQLT will also produce a 10053 trace file in some cases, so you can look
    at the details of how the cost calculations are made.


    Reading the Execution Plan Section


    We saw the execution plan section previously. It looks interesting, and it has
    a wobbly left edge and lots of hyperlinks. What does it all mean? This is a fairly
    simple execution plan, as it doesn’t go on for pages and pages (like SIEBEL or
    PeopleSoft execution plans).


    There are a number of simple steps to reading an execution plan. I’m sure there’s
    more than one way of reading an execution plan, but this is the way I approach
    the problem. Bear in mind in these examples that if you are familiar with the
    pieces of SQL being examined, you may go directly to the section you think is
    wrong; but in general if you are seeing the execution plan for the first time,
    you will start by looking at a few key costs.


    The first and most important cost is the overall cost of the entire query. This
    is always shown as “ID 0” and is always the first row in the execution plan. In
    our example shown in [Figure 1-5](#9781430248095_Ch01.xhtml#Fig5), this is a cost
    of 256\. So to get the cost for the entire query just look at the first row. This
    is also the last step to be executed (“Exec Ord” is 18). The execution order is
    not top to bottom, the Oracle engine will carry out the steps in the order shown
    by the value in the “Exec Ord” column. So if we followed the execution through,
    the Oracle engine would do the execution in this order:


    1.  `INDEX FULL SCAN I_USER2`

    2.  `INDEX FULL SCAN I_USER2`

    3.  `TABLE ACCESS FULL OBJ$`

    4.  `HASH JOIN`

    5.  `HASH JOIN`

    6.  `INDEX UNIQUE SCAN I_IND1`

    7.  `TABLE ACCESS BY INDEX ROWID IND$`

    8.  `INDEX FULL SCAN I_USERS2`

    9.  `INDEX RANGE SCAN I_OBJ4`

    10.  `NESTED LOOP`

    11.  `FILTER`

    12.  `INDEX FULL SCAN I_LINK1`

    13.  `INDEX RANGE SCAN I_USERS2`

    14.  `NESTED LOOPS`

    15.  `UNION-ALL`

    16.  `VIEW DBA_OBJECTS`

    17.  `SORT AGGREGATE`

    18.  `SELECT STATEMENT`


    However, nobody ever represents the plan of a SQL statement like this. What is
    important to realize is that the wobbly left edge gives information about how
    the steps are carried out. The less-indented operations indicate outer operations
    that are being carried out on inner (more indented) operations. So for example
    steps 2, 3, and 4 would be read as “An index full scan is carried out using `I_USERS2`,
    then a full table scan of `OBJ$` and the results of these are `HASH JOINED` to
    produce a result set.” Each operation produces results for a less-indented section
    until the final result is presented to the `SELECT (ID = 0)`.


    The “Operation” column is also marked with “+” and “–” to indicate sections of
    equal indentation. This is helpful in lining up operations to see which result
    sets an operation is working on. So, for example, it is important to realize that
    the `HASH JOIN` at step 5 is using results from steps 1, 4, 2, and 3\. We’ll see
    more complex examples of these later. It is also important to realize that the
    costs shown are aggregate costs for each operation as well. So the cost shown
    on the first line is the cost for the entire operation, and we can also see that
    most of the cost of the entire operation came from step 3\. (SQLT helpfully shows
    the highest cost operation in red). So let’s look at step 1 (as shown in [Figure
    1-5](#9781430248095_Ch01.xhtml#Fig5)) in more detail. In our simple case this
    is


    ```

    "INDEX FULL SCAN I_USER2"

    ```


    Let’s translate the full line into English: “First get me a full index scan of
    index `I_USERS2`. I estimate 93 rows will be returned which, based on your current
    system statistics (Single block read time and multi-block read times and CPU speed),
    will be a cost of 1.”


    The second and third steps are another `INDEX FULL SCAN` and a `TABLE ACCESS FULL`
    of `OBJ$`. This third step has a cost of 251\. The total cost of the entire SQL
    statement is 256 (top row). So if were looking to tune this statement we know
    that the benefit must come from this third step (it is a cost of 251 out of a
    total cost of 256). Now place your cursor over the word “TABLE” on step 3 (see
    [Figure 1-8](#9781430248095_Ch01.xhtml#Fig8)).


    ![9781430248095_Fig01-08.jpg](Images/9781430248095_Fig01-08.jpg)


    [Figure 1-8](#9781430248095_Ch01.xhtml#_Fig8) .  More details can be obtained
    by ‘hovering’ over links


    Notice how information is displayed about the object.


    *   Object#: 18

    *   Owner: SYS

    *   Qblock: SEL$1FF6F973

    *   Alias: O@SEL$4

    *   Current Table Statistics:

    *   Analyzed: 08-JUN-12 22:01:24

    *   TblRows: 73575

    *   Blocks: 905

    *   Sample 73575


    Just by hovering your mouse over the object you get its owner, the query block
    name, when it was last analyzed, and how big the object is.


    Now let’s look at the “Go To” column. Notice the “+” under that column? Click
    on the one for step 3, and you’ll get a result like the one in [Figure 1-9](#9781430248095_Ch01.xhtml#Fig9).


    ![9781430248095_Fig01-09.jpg](Images/9781430248095_Fig01-09.jpg)


    [Figure 1-9](#9781430248095_Ch01.xhtml#_Fig9) .  More hyperlinks can be revealed
    by expanding sections on the execution plan


    So right from the execution plan you can go to the “Col Statistics” or the “Stats
    Versions” or many other things. You decide where you want to go next, based on
    what you’ve understood so far and on what you think is wrong with your execution
    plan. Now close that expanded area and click on the “+” under the “More” column
    for step 3 (see [Figure 1-10](#9781430248095_Ch01.xhtml#Fig10))


    ![9781430248095_Fig01-10.jpg](Images/9781430248095_Fig01-10.jpg)


    [Figure 1-10](#9781430248095_Ch01.xhtml#_Fig10) .  Here we see an expansion under
    the “More” heading


    Now we see the filter predicates and the projections. These can help you understand
    which line in the execution plan the optimizer is considering predicates for and
    which values are in play for filters.


    Just above the first execution plan is a section called “Execution Plans.” This
    lists all the different execution plans the Oracle engine has seen for this SQL.
    Because execution plans can be stored in multiple places in the system, you could
    well have multiple entries in the “Execution Plans” section of the report. Its
    source will be noted (under the “Source” column). Here is a list of sources I’ve
    come across:


    *   `GV$SQL_PLAN`

    *   `GV$SQLAREA_PLAN_HASH`

    *   `PLAN_TABLE`

    *   `DBA_SQLTUNE_PLANS`

    *   `DBA_HIST_SQL_PLAN`'
