  trans: "\n为了强调**基数反馈**是一种备用机制，其使用情况也在 SQLTXPLAIN 报告的“观察结果”部分中被特别标出。请参阅图 8-6 中的对应章节，你可以通过点击\
    \ SQLTXPLAIN 主报告顶部的“观察结果”超链接到达该处。\n\n![9781430248095_Fig08-06.jpg](img/9781430248095_Fig08-06.jpg)\n\
    \n图 8-6 。基数反馈的使用情况被显示为一种类型为 PLAN_CONTROL 的观察结果。\n\n## 何时使用基数反馈？\n\n缺乏统计信息或存在“复杂”谓词（导致查询的基数难以确定）的情况，会给基数反馈一个机会来改进\
    \ E-Rows（估计行数）。以下是一个带有“复杂”谓词的 SQL 示例：\n\n```\nSQL> select product_name from order_items\
    \ ord, product_information pro\n  where ord.unit_price= 15 and quantity > 1\n\
    \  and pro.product_id = ord.product_id;\n```\n\n这里我们有一个对 `unit_price` 的过滤（必须等于\
    \ 15 且 `quantity` 必须大于 1）。这种情况并不罕见，因此基数反馈可能会被经常使用。然而，请记住我们之前提到的，该语句至少需要执行一次，优化器才能存储实际的行数，以便将其与估计的行数进行比较。如果已经使用了动态采样（因为需要且未被禁用），那么基数反馈将不会被使用。同样地，由于绑定变量可能引发的问题（特别是在数据分布倾斜的情况下），对于涉及绑定变量的语句部分，也不会使用基数反馈。\n\
    \n如果你发现基数反馈对你的站点或 SQL 语句没有用处，可以在支持人员的协助下，使用以下命令禁用它：\n\n```\nSQL> alter system\
    \ set \"_optimizer_use_feedback\" = FALSE;\n```\n\n如果你想禁用单个语句，可以在 SQL 中加入此提示：\n\
    \n```\n/*+ opt_param('_optimizer_use_feedback' 'false') */\n```\n\n一个 `select\
    \ sysdate from dual` 语句就变成了：\n\n```\nSQL> select /*+ opt_param('_optimizer_use_feedback'\
    \ 'false') */ sysdate from dual;\n```\n\n基数反馈在实例重启后不会持久保存，因此最好从其他来源获取统计信息，首选 `dbms_stats`，但请记住基数反馈默认是启用的。\n\
    \n## 基数反馈和动态采样如何协同工作？\n\n我相信你可以想象，如果动态采样和基数反馈同时作用于同一个语句，可能会发生冲突，并且开销可能会翻倍。不像动态采样可以为不同的标准和不同级别的采样收集进行设置，基数反馈（除了禁用它之外）没有可调的控制项。Oracle\
    \ 已经通过内置的安全措施考虑到了这些潜在的冲突和开销。例如，如果使用了动态采样，基数反馈就不会被使用。动态采样可以对单个语句使用多次，而基数反馈为单个 SQL\
    \ 语句收集信息只允许运行有限的次数。这些安全措施旨在发现问题，但也经过精心设计以确保安全措施本身不会带来太大的开销。\n\n现在我们已经对这两个特性有了一些了解，让我们看一个同时涉及这两个特性的神秘案例。\n\
    \n## 同卵双胞胎案例\n\n这是 DBA 世界中经常发生的情况：两个看起来完全相同的系统，一个是从另一个克隆而来，但某些 SQL 的性能却大相径庭。自然，你可以怀疑是不同的\
    \ DDL、统计信息或操作流程、不同的资源分配、不同的工作负载等等。当硬件相同且数据库相互克隆时，可能的选择就变得有限了。在这种情况下，我们通过实验发现，某个特定的\
    \ SQL 在系统 A（比如纽约）上表现良好，而在克隆的系统 B（比如伦敦）上表现糟糕。SQL 是相同的，系统是相同的，参数设置也是相同的。让我向你展示你可以遵循哪些步骤，使用\
    \ SQLT 来解决这样的问题。\n\n解决这个问题的方法有很多种。毫无疑问，你只收集 10046 跟踪文件也可以做到，但我们看看如何使用 SQLTXPLAIN\
    \ 来完成。一步一步来。首先，如果我们为两条 SQL 语句收集 SQLT：一份是为纽约的（正常执行）生成的 SQLT XECUTE 报告，另一份是为伦敦的“问题双胞胎”（执行时间过长）生成的\
    \ SQLT XTRACT 报告。从 SQLTXPLAIN 报告的顶部（参见图 8-7），我们通过点击“执行计划”来查看执行计划列表。\n\n![9781430248095_Fig08-07.jpg](img/9781430248095_Fig08-07.jpg)\n\
    \n图 8-7 。SQLT 报告的顶部。我们点击“执行计划”。\n\n这是针对问题系统（伦敦）的。我们看到基数反馈正在起作用，所以一定是发生了某些事情导致这个特性被触发。我们还看到（图\
    \ 8-8）某些执行（使用了基数反馈的地方）的估计基数差异很大。我们还看到，在使用了基数反馈的地方，`optimizer_cost` 非常高。\n\n![9781430248095_Fig08-08.jpg](img/9781430248095_Fig08-08.jpg)\n\
    \n图 8-8 。伦敦的问题双胞胎显示正在使用基数反馈，并且估计基数的值很高。\n\n既然我们在比较好系统和坏系统，我们现在应该看看纽约好系统的执行计划。记住这两个系统是相同的（相同的硬件、相同的数据库版本、相似的数据量、相同的表和索引）。以下是好系统报告的相同部分（参见图\
    \ 8-9）\n\n![9781430248095_Fig08-09.jpg](img/9781430248095_Fig08-09.jpg)\n\n图 8-9\
    \ 。纽约的好双胞胎显示使用了动态采样，并且估计基数的值较小。\n\n我们还看到伦敦的执行计划比纽约多得多。我们知道，当涉及不良统计信息时，有时会使用动态采样和基数反馈，因此一个合理的调查途径是查看查询中主要对象的统计信息。在我们的整个调查过程中，我们应该思考\
    \ SQLT 提供的信息：“为什么使用了动态采样？为什么使用了基数反馈？为什么它们不同？” 从报告的顶部，我们点击“统计信息”。我们看到好系统（图 8-10）在“临时”列下有一个“Y”。同时，在“行数”、“样本大小”或“百分比”下没有值。`TABLE4`\
    \ 值得关注，因为我们将看到坏系统报告的相同部分在这方面非常不同。\n\n![9781430248095_Fig08-10.jpg](img/9781430248095_Fig08-10.jpg)\n\
    \n图 8-10 。好系统的表统计信息。\n"
- fmt: "Before we leap to conclusions (and this is always to be avoided in investigating\
    \ performance issues), we need to look at the bad system and do a comparison (see\
    \ [Figure 8-11](#9781430248095_Ch08.xhtml#Fig11)). Our plan is to figure out what\
    \ could be different between these two systems to cause one to use dynamic sampling\
    \ and the other to use cardinality feedback.\n\n![9781430248095_Fig08-11.jpg](Images/9781430248095_Fig08-11.jpg)\n\
    \n[Figure 8-11](#9781430248095_Ch08.xhtml#_Fig11). The table statistics for the\
    \ bad system\n\nNow that we see both together we see something very interesting.\
    \ Both databases show that `TABLE4` is a temporary table and that the statistics\
    \ gathering is different for these two systems for this one table. We also see\
    \ that the data volume for `TABLE1` is different, but `TABLE4` seems much more\
    \ interesting in terms of difference, at least for now because it has a count\
    \ of 0 and row count of 0 also. We’ll keep the `TABLE1` idea as a backup. So let’s\
    \ check on the metadata for `TABLE4` and see how it was defined. (We can get this\
    \ easily enough by clicking on the \"Metadata\" from the top of the report. See\
    \ [Figure 8-12](#9781430248095_Ch08.xhtml#Fig12).\n\n![9781430248095_Fig08-12.jpg](Images/9781430248095_Fig08-12.jpg)\n\
    \n[Figure 8-12](#9781430248095_Ch08.xhtml#_Fig12). From the top of the `SQLTXECUTE`\
    \ report we can navigate to the metadata for all objects for this query\n\nThen\
    \ from the part of the report labeled \"Metadata\" we can select the table metadata\
    \ by clicking on \"Table\" hyperlink, which is shown in the [Figure 8-13](#9781430248095_Ch08.xhtml#Fig13).\
    \ Notice how we also have a link to index metadata if we wanted to investigate\
    \ that.\n\n![9781430248095_Fig08-13.jpg](Images/9781430248095_Fig08-13.jpg)\n\n\
    [Figure 8-13](#9781430248095_Ch08.xhtml#_Fig13). The list of object types for\
    \ which we have metadata, in this case tables and indexes\n\nThe table metadata\
    \ part of the `SQLTXPLAIN` report show links to all the tables, which are in the\
    \ query for which the report was created. See in [Figure 8-14](#9781430248095_Ch08.xhtml#Fig14).\
    \ In this case we have four tables. We are interested in the fourth table in this\
    \ case, so we click on the \"`TABLE4`\" hyperlink.\n\n![9781430248095_Fig08-14.jpg](Images/9781430248095_Fig08-14.jpg)\n\
    \n[Figure 8-14](#9781430248095_Ch08.xhtml#_Fig14). The list of table objects for\
    \ which we have metadata\n\nThis gets us to the part of the report which shows\
    \ the metadata for `TABLE4`. We see that is is global temporary table with the\
    \ clause `ON COMMIT PRESERVE ROWS`. This is the DDL we see:\n\n```sql\n CREATE\
    \ GLOBAL TEMPORARY TABLE \"SCHEMA1\".\"TABLE4\"\n   (   \"COLUMN1\" NUMBER(10,0),\n\
    \       \"COLUMN2\" NUMBER(10,0),\n       \"COLUMN3\" NUMBER(10,0)\n   ) ON COMMIT\
    \ PRESERVE ROWS\n```\n\nThere’s nothing remarkable about this table. This is a\
    \ default creation of a global temporary table that can be used by more than one\
    \ session during SQL processing. This is often included in application designs\
    \ if the developer wants to keep some temporary data in a table for processing\
    \ in later steps in the application. The `on commit preserve` part of the DDL\
    \ (metadata) ensures that data committed to the table is preserved. In this kind\
    \ of table you would normally expect the table to be cleaned out at the end of\
    \ processing, or sometimes at the beginning of processing. The key thing to note\
    \ here is that on the bad system, statistics were collected for this table (see\
    \ [Figure 8-11](#9781430248095_Ch08.xhtml#Fig11)). There is a last analyzed date\
    \ for `TABLE4` but not on the good system. If we look at the statistics for `TABLE4`\
    \ where they were collected we see that the table was empty. These statistics\
    \ would then prevent dynamic sampling from being activated (as there are \"good\"\
    \ statistics for `TABLE4`), but would not prevent cardinality feedback because\
    \ data loaded during processing would make the cardinality estimates wrong. This\
    \ sounds like a working theory. Somehow `TABLE4` has had statistics collected\
    \ on it on the bad system but not on the good system. On the good system the table\
    \ was not analyzed. This would have allowed dynamic sampling to take an estimate\
    \ of the statistics at run time and determine a good execution plan. With a working\
    \ theory we can now build a test case (described in [Chapter 13](../Text/9781430248095_Ch13.xhtml))\
    \ and attempt to get the good execution plan from the bad test case by deleting\
    \ the statistics for the global temporary table.\n\n## Summary\n\nDynamic sampling\
    \ and cardinality feedback are useful features, for those rare occasions when\
    \ statistics are missing. There is no substitute for good statistics, however.\
    \ With the interplay of complex features situations can be created that show strange\
    \ behavior. Even seemingly identical systems can behave very differently if key\
    \ components are changed, sometimes unwittingly. `SQLTXPLAIN`, because it gathers\
    \ everything, is the quickest and easiest way to solve most SQL tuning mysteries.\
    \ In the next chapter we’ll take a closer look at the special Data Guard physical\
    \ standby environment and how `SQLT` can help.\n\n# CHAPTER 9\n\n![image](Images/frontdot.jpg)\n\
    \n## Using SQLTXPLAIN with Data Guard Physical Standby Databases\n\n`SQLTXPLAIN`\
    \ is a great tool designed to help with SQL tuning problems, but its effectiveness\
    \ is limited when the database is a read-only Data Guard physical standby database.\
    \ Read only databases like a Data Guard physical standby databases cannot be written\
    \ to by utilities such as `SQLTXPLAIN`. In this chapter we explore the special\
    \ tools created just to deal with Data Guard.\n\nData Guard Physical Standby Database"
