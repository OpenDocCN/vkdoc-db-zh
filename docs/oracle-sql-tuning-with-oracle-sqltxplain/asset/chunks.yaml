  trans: '

    # 我与 SQLT 的故事：从被拒绝到广泛采用


    ## 与 Abel Macias 的初次碰撞


    自从我加入 ST CoE 后，我便肩负着一项个人使命：我希望服务器技术支持组能了解 `SQLTXPLAIN`，并像采用 `EBS` 那样尽可能多地采用它。因此，我请求与性能支持团队的一位传奇人物兼领导者会面。就这样，我得以结识
    Abel Macias。当我向 Abel 询问在 ST 性能问题上使用 `SQLTXPLAIN` 时，他的回答很生硬。我不记得他的原话了，但大意是这样的：“我们不会用它，因为它烂透了。”


    Abel 以其时而直截了当（但正确）的回答而闻名。他为人非常谦逊，但观察问题过于直接，这可能让人望而生畏。最初的震惊过后，我问他为什么这么想。这为我打开了一扇门，了解到
    `SQLTXPLAIN` 存在的一系列虽短但重要的缺陷。我离开时感到沮丧，但面前也有了一个新的挑战：我要把这些建设性的批评全部收集起来，转化为对 `SQLTXPLAIN`
    的重大改进。经过数周的辛勤工作（以及喝了太多杯咖啡），我再次见到 Abel，并向他展示了所有这些对 `SQLTXPLAIN` 的“调整”。直到那时，他才喜欢上它，而
    Abel 和我也成了朋友！如今，我们一起骑车驰骋数英里。即使我们不想谈，但在我们享受山地骑行，或者喝着一杯……或两杯啤酒时，我们经常会就 SQL 调优和 `SQLTXPLAIN`
    进行简短而有意义的交谈。


    ## 第三次重写与`SQLT`的独立


    根据 Abel 的意见，`SQLT` 变得独立于应用程序，安装在自己的模式中，并且支持 `RAC`。由于 `SQLTXPLAIN` 这个名字非常独特，它成为了安装所有工具对象的应用程序模式的名称。一切看起来都不错，但有件事一直困扰着我，那就是
    `SQLTXPLAIN` 被大幅修改，并且需要越来越多的维护。是时候进行第三次全面重写了。由于代码量已经很大，我知道我需要大量不受打扰的专属时间。我决定利用我所有累积的假期，加上一些节假日；于是在
    2009 年 12 月和 2010 年 1 月期间，我几乎都待在我的“男人洞穴”里开发 `SQLT` 的第三个主要版本。


    ## 工具的本质与社区的认可


    我在 2010 年 4 月完成了所有的细节和测试。此时的 `SQLT` 已经包含了多个程序包，代码行数接近 10 万行，所有这些都是用两根手指开发的（我至今仍用两根手指打字）。有些人认为
    `SQLT` 是由一个大型团队开发和维护的。如果你这么想，那很抱歉让你失望了：`SQLT` 诞生的初衷是作为支持人员的工具，为了让他们的工作更轻松，现在在某种程度上也被许多其他从事
    SQL 调优这一复杂任务的人共享和使用。然而，这个工具的精神始终未变：一个帮助诊断性能不佳（或产生错误结果）的 SQL 语句的工具。


    2010 年 4 月发布的第三个主要版本的 `SQLTXPLAIN`，迅速被支持部门内的服务器技术性能团队采纳。自从我加入 ST CoE 以来，我还很荣幸地开发了两个为期一周的内部
    SQL 调优研讨会。在全球范围内向 700 多名 Oracle 专业人士交付了数十次这些研讨会后，我收集并整合了数百条在课堂上口头交流中获得的改进建议。


    ## 致谢杰出贡献者


    在所有为我提供如何改进 `SQLT` 的想法的好心人和聪明人中，我想特别提到两个人的名字，他们除了 Abel 之外，还为该工具的功能集做出了卓越贡献：Mauro
    Pagano 和 Mark Jefferys。Mauro 凭借其持续的洞察力，启发了 `SQLTXPLAIN` 的 `XPLORE` 方法，该方法使用强力分析来缩小升级后出现性能回退的可能原因范围。Mark
    凭借其深厚的数学和科学背景，向我指出了我犯的几个错误，尤其是在统计和测试用例创建方面。我由衷地认为，`SQLT` 能有今天的成就，要归功于我从众多聪明人那里不断获得的建设性反馈。有时反馈很直接，但大多数时候只是要求我在这里或那里加入一点东西，或者修复一个小错误。作为改进的例子，我想提及一些大的方面：在
    `SQLT` 中增加对 `Siebel` 和 `PeopleSoft` 的感知能力，以及它执行的所有健康检查。


    ## 个人的感言


    我认为自己是一个非常幸运的人，自 1996 年以来就有机会在像 `Oracle` 这样伟大的公司工作；我还遇到了一些非常棒的经理，他们非常支持我采取我认为正确的策略来诊断困难的
    SQL 调优问题。对于我为这个 `SQLTXPLAIN` 工具所投入的个人时间，我一分钟都不后悔。起初，它是为了我自己，也来源于我自己。现在，它来源于我和其他许多聪明的头脑，基本上服务于任何希望深入进行严肃
    Oracle 数据库 SQL 调优的人。


    当 Stelios Charlambides 询问我关于他撰写一本以 `SQLXPLAIN` 为核心的书的意见时，我感到荣幸和高兴。许多人问我：“我们什么时候能有一本关于
    `SQLTXPLAIN` 的书？”如果你也是其中之一，请尽情享受 Stelios 利用他个人时间所开发的成果，并感谢他写了这本书！我真诚地希望你能享受 `SQLTXPLAIN`，甚至享受
    SQL 调优的过程。


    我总是说，SQL 调优就像寿司，你要么爱它，要么恨它！我希望随着你了解得越来越多，你会像我在 20 世纪 90 年代那样爱上它。同时请记住，SQL 调优的学习永无止境。扎实的基础、好奇心、毅力和经验——这些只是有朝一日能从容进行
    SQL 调优的部分要素。干杯！


    —Carlos Sierra，《`SQLTXPLAIN`》作者


    # 引言


    本书旨在作为一本实用指南，介绍一个名为 `SQLTXPLAIN` 的宝贵工具，通常简称为 `SQLT`。你可能从未听说过它，但如果你的工作涉及 `Oracle`
    调优，`SQLT` 将是你能找到的最有用的工具之一。最棒的是，它可以从 `Oracle` 免费获得。你需要做的就是学会如何使用它。


    ## 本书的由来


    我担任 `DBA` 已超过二十年。在那段时间里，我处理过许许多多的调优问题，但直到我开始为 `Oracle` 工作时，我才了解到 `SQLT`。作为 `Oracle`
    支持部门调优团队的一员，我每天都使用 `SQLT` 来解决客户最复杂的调优问题。我很快意识到我的经历并非个例。在 `Oracle` 之外，很少有 `DBA`
    知道 `SQLT` 的存在。知道如何使用它的人就更少了。因此，本书应运而生。


    ## 不要购买本书


    如果你正在寻找一本关于抽象调优理论或如何调优“原始”SQL 的书。本书是关于如何使用 `SQLT` 进行 `Oracle` SQL 调优的。所采用的方法完全实用，并使用大量示例来展示
    `SQLT` 工具的实际操作。


    ## 请购买本书


    如果你是一名开发人员或 `DBA`，并且参与处理 `Oracle` SQL 调优问题。无论你的系统多么复杂，或者你与数据之间隔着多少层技术，让你的查询高效运行才是关键所在。无论你是一名初入职场的初级
    `DBA`，还是一名经验丰富、见多识广的老手，本书旨在向你展示一些完全实用、对你日常工作非常有用的东西。

    '
- fmt: '# Introduction to SQLTXPLAIN


    ![image](Images/frontdot.jpg)


    An understanding of `SQLT` will radically improve your ability to solve tuning
    problems and will also give you an effective checklist to use against new code
    and old.


    Tuning problems are among the most complex technical problems around. `SQLTXPLAIN`
    is a fantastic tool that will help you solve them. Prepare to be smitten.


    Welcome to the world of fast Oracle SQL tuning with `SQLTXPLAIN`, or `SQLT` as
    it is typically called. Never heard of `SQLT`? You’re not alone. I’d never heard
    of it before I joined ORACLE, and I had been a DBA for more years than I care
    to mention. That’s why I’m writing this book. `SQLT` is a fantastic tool because
    it helps you diagnose tuning problems quickly. What do I mean by that? I mean
    that in half a day, maximum, you can go from a slow SQL to having an understanding
    of why SQL is malfunctioning, and finally, to knowing how to fix the SQL.


    Will `SQLT` fix your SQL? No. Fixing the SQL takes longer. Some tables are so
    large that it can take days to gather statistics. It may take a long time to set
    up the test environment and roll the fix to production. The important point is
    that in half a day working with `SQLT` will give you an explanation. You’ll know
    why the SQL was slow, or you’ll be able to explain why it can’t go any faster.


    You need to know about `SQLT` because it will make your life easier. But let me
    back up a little and tell you more about what `SQLT` is, how it came into existence,
    why you probably haven’t heard of it, and why you should use it for your Oracle
    SQL tuning.


    ## What Is SQLT?


    `SQLT` is a set of packages and scripts that produces `HTML`-formatted reports,
    some SQL scripts and some text files. The entire collection of information is
    packaged in a zip file and often sent to Oracle Support, but you can look at these
    files yourself. There are just over a dozen packages and procedures (called “methods”)
    in `SQLT`. These packages and procedures collect different information based on
    your circumstances. We’ll talk about the packages suitable for a number of situations
    later.


    ## What’s the Story of SQLT?


    They say that necessity is the mother of invention, and that was certainly the
    case with `SQLT`. Oracle support engineers handle a huge number of tuning problems
    on a daily basis; problem is, the old methods of linear analysis are just too
    slow. You need to see the big picture fast so you can zoom in on the detail and
    tell the customer what’s wrong. As a result, Carlos Sierra, a support engineer
    at the time (now a member of the Oracle Center of Expertise—a team of experts
    within Oracle) created `SQLT`. The routines evolved over many visits to customer
    sites to a point where they can gather *all* the information required quickly
    and effectively. He then provided easy-to-use procedures for reporting on those
    problems.


    Carlos Sierra, the genius of `SQLT`, now spends much of his time improving `SQLT`
    code and adapting the `SQLT` code to new versions of the RDBMS. He also assists
    Oracle Tuning Performance engineers with SQL tuning through the medium of `SQLT`.


    ## Why Haven’t You Heard of SQLT?


    If it’s so useful, why haven’t you heard about `SQLT`? Oracle has tried to publicize
    `SQLT` to the DBA community, but still I get support calls and talk to DBAs who
    have never heard of `SQLT`—or if they have, they’ve never used it. This amazing
    tool is free to supported customers, so there’s no cost involved. DBAs need to
    look at problematic SQL often, and `SQLT` is hands down the fastest way to fix
    a problem. The learning curve may be high, but it’s nowhere near as high as the
    alternatives: interpreting raw `10046` trace files or `10053` trace files. Looking
    through tables of statistics to find the needle in the haystack, guessing about
    what might fix the problem and trying it out? No thanks. `SQLT` is like a cruise
    missile that travels across the world right to its target.


    Perhaps DBAs are too busy to learn a tool, which is not even mentioned in the
    release notes for Oracle. It’s not in the documentation set, it’s not officially
    part of the product set either. It’s just a tool, written by a talented support
    engineer, and it happens to be better than any other tool out there. Let me repeat.
    It’s free.


    It’s also possible that some DBAs are so busy focusing on the obscure minutiae
    of tuning that they forget the real world of fixing SQL. Why talk about a package
    that’s easy to use when you could be talking about esoteric hidden parameters
    for situations you’ll never come across? `SQLT` is a very practical tool.


    Whatever the reason, if you haven’t used `SQLT` before, my mission in this book
    is to get you up and running as fast and with as little effort from you as possible.
    I promise you installing and using `SQLT` is easy. Just a few simple concepts,
    and you’ll be ready to go in 30 minutes.


    ## How Did I Learn About SQLT?


    Like the rest of the DBA world (I’ve been a DBA for many years), I hadn’t heard
    of `SQLT` until I joined Oracle. It was a revelation to me. Here was this tool
    that’s existed for years, which was exactly what I needed many times in the past,
    although I’d never used it. Of course I had read many books on tuning in years
    past: for example, Cary Millsaps’s classic *Optimizing Oracle Performance*, and
    of course *Cost-Based Oracle Fundamentals* by Jonathan Lewis.


    The training course (which was two weeks in total) was so intense that it was
    described by at least two engineers as trying to drink water from a fire hydrant.
    Fear not! This book will make the job of learning to use `SQLT` much easier.


    Now that I’ve used `SQLT` extensively in day-to-day tuning problems, I can’t imagine
    managing without it. I want you to have the same ability. It won’t take long.
    Stick with me until the end of the book, understand the examples, and then try
    and relate them to your own situation. You’ll need a few basic concepts (which
    I’ll cover later), and then you’ll be ready to tackle your own tuning problems.
    Remember to use `SQLT` regularly even when you don’t have a problem; this way
    you can learn to move around the main `HTML` file quickly to find what you need.
    Run a `SQLT` report against SQL that isn’t a problem. You’ll learn a lot. Stick
    with me on this amazing journey.


    ## Getting Started with SQLT


    Getting started with `SQLT` couldn’t be easier. I’ve broken the process down into
    three easy steps.


    1.  Downloading `SQLT`

    2.  Installing `SQLT`

    3.  Running your first `SQLT` report


    `SQLT` will work on many different platforms. Many of my examples will be based
    on Microsoft Windows, but Linux or Unix is just as easy to use, and there are
    almost no differences in the use of `SQLT` between the platforms. If there are,
    I’ll make a note in the text.


    ### How Do You Get a Copy of SQLT?


    How do you download `SQLT`? It’s simple and easy. I just did it to time myself.
    It took two minutes. Here are the steps to get the `SQLT` packages ready to go
    on your target machine:


    1.  Find a web browser and log in to `My Oracle Support` (`http://support.oracle.com`)

    2.  Go to the knowledge section and type “`SQLT`” in the search box. `Note 215187.1`
    entitled “`SQLT` (`SQLTXPLAIN`) – Tool that helps to diagnose a SQL statement
    performing poorly [ID 215187.1]” should be at the top of the list.

    3.  Scroll to the bottom of the note and choose the version of `SQLT` suitable
    for your environment. There are currently versions suitable from 9i to 11 g.

    4.  Download the zip file (the version I downloaded was 2Mbytes).

    5.  Unzip the zip file.


    You now have the `SQLT` programs available to you for installation onto any suitable
    database. You can download the zip file to a PC and then copy it to a server if
    needed.


    ### How Do You Install SQLT?


    So without further ado, let’s install `SQLT` so we can do some tuning:'
  raw: 'An understanding of SQLT will radically improve your ability to solve tuning
    problems and will also give you an effective checklist to use against new code
    and old.


    Tuning problems are among the most complex technical problems around. SQLTXPLAIN
    is a fantastic tool that will help you solve them. Prepare to be smitten.


    CHAPTER 1


    ![image](Images/frontdot.jpg)


    Introduction to SQLTXPLAIN


    Welcome to the world of fast Oracle SQL tuning with SQLTXPLAIN, or SQLT as it
    is typically called. Never heard of SQLT? You’re not alone. I’d never heard of
    it before I joined ORACLE, and I had been a DBA for more years than I care to
    mention. That’s why I’m writing this book. SQLT is a fantastic tool because it
    helps you diagnose tuning problems quickly. What do I mean by that? I mean that
    in half a day, maximum, you can go from a slow SQL to having an understanding
    of why SQL is malfunctioning, and finally, to knowing how to fix the SQL.


    Will SQLT fix your SQL? No. Fixing the SQL takes longer. Some tables are so large
    that it can take days to gather statistics. It may take a long time to set up
    the test environment and roll the fix to production. The important point is that
    in half a day working with SQLT will give you an explanation. You’ll know why
    the SQL was slow, or you’ll be able to explain why it can’t go any faster.


    You need to know about SQLT because it will make your life easier. But let me
    back up a little and tell you more about what SQLT is, how it came into existence,
    why you probably haven’t heard of it, and why you should use it for your Oracle
    SQL tuning.


    What Is SQLT?


    SQLT is a set of packages and scripts that produces HTML-formatted reports, some
    SQL scripts and some text files. The entire collection of information is packaged
    in a zip file and often sent to Oracle Support, but you can look at these files
    yourself. There are just over a dozen packages and procedures (called “methods”)
    in SQLT. These packages and procedures collect different information based on
    your circumstances. We’ll talk about the packages suitable for a number of situations
    later.


    What’s the Story of SQLT?


    They say that necessity is the mother of invention, and that was certainly the
    case with SQLT. Oracle support engineers handle a huge number of tuning problems
    on a daily basis; problem is, the old methods of linear analysis are just too
    slow. You need to see the big picture fast so you can zoom in on the detail and
    tell the customer what’s wrong.  As a result, Carlos Sierra, a support engineer
    at the time (now a member of the Oracle Center of Expertise—a team of experts
    within Oracle) created SQLT. The routines evolved over many visits to customer
    sites to a point where they can gather *all* the information required quickly
    and effectively.  He then provided easy-to-use procedures for reporting on those
    problems.


    Carlos Sierra, the genius of SQLT, now spends much of his time improving SQLT
    code and adapting the SQLT code to new versions of the RDBMS. He also assists
    Oracle Tuning Performance engineers with SQL tuning through the medium of SQLT.


    Why Haven’t You Heard of SQLT?


    If it’s so useful, why haven’t you heard about SQLT? Oracle has tried to publicize
    SQLT to the DBA community, but still I get support calls and talk to DBAs who
    have never heard of SQLT—or if they have, they’ve never used it. This amazing
    tool is free to supported customers, so there’s no cost involved.  DBAs need to
    look at problematic SQL often, and SQLT is hands down the fastest way to fix a
    problem. The learning curve may be high, but it’s nowhere near as high as the
    alternatives: interpreting raw 10046 trace files or 10053 trace files. Looking
    through tables of statistics to find the needle in the haystack, guessing about
    what might fix the problem and trying it out? No thanks. SQLT is like a cruise
    missile that travels across the world right to its target.


    Perhaps DBAs are too busy to learn a tool, which is not even mentioned in the
    release notes for Oracle. It’s not in the documentation set, it’s not officially
    part of the product set either. It’s just a tool, written by a talented support
    engineer, and it happens to be better than any other tool out there. Let me repeat.
    It’s free.


    It’s also possible that some DBAs are so busy focusing on the obscure minutiae
    of tuning that they forget the real world of fixing SQL. Why talk about a package
    that’s easy to use when you could be talking about esoteric hidden parameters
    for situations you’ll never come across? SQLT is a very practical tool.


    Whatever the reason, if you haven’t used SQLT before, my mission in this book
    is to get you up and running as fast and with as little effort from you as possible.
    I promise you installing and using SQLT is easy. Just a few simple concepts, and
    you’ll be ready to go in 30 minutes.


    How Did I Learn About SQLT?


    Like the rest of the DBA world (I’ve been a DBA for many years), I hadn’t heard
    of SQLT until I joined Oracle. It was a revelation to me. Here was this tool that’s
    existed for years, which was exactly what I needed many times in the past, although
    I’d never used it. Of course I had read many books on tuning in years past: for
    example, Cary Millsaps’s classic *Optimizing Oracle Performance*, and of course
    *Cost-Based Oracle Fundamentals* by Jonathan Lewis.


    The training course (which was two weeks in total) was so intense that it was
    described by at least two engineers as trying to drink water from a fire hydrant.
    Fear not! This book will make the job of learning to use SQLT much easier.


    Now that I’ve used SQLT extensively in day-to-day tuning problems, I can’t imagine
    managing without it. I want you to have the same ability. It won’t take long.
    Stick with me until the end of the book, understand the examples, and then try
    and relate them to your own situation. You’ll need a few basic concepts (which
    I’ll cover later), and then you’ll be ready to tackle your own tuning problems.
    Remember to use SQLT regularly even when you don’t have a problem; this way you
    can learn to move around the main HTML file quickly to find what you need. Run
    a SQLT report against SQL that isn’t a problem. You’ll learn a lot. Stick with
    me on this amazing journey.


    Getting Started with SQLT


    Getting started with SQLT couldn’t be easier. I’ve broken the process down into
    three easy steps.


    1.  Downloading SQLT

    2.  Installing SQLT

    3.  Running your first SQLT report


    SQLT will work on many different platforms. Many of my examples will be based
    on Microsoft Windows, but Linux or Unix is just as easy to use, and there are
    almost no differences in the use of SQLT between the platforms. If there are,
    I’ll make a note in the text.


    How Do You Get a Copy of SQLT?


    How do you download SQLT? It’s simple and easy. I just did it to time myself.
    It took two minutes. Here are the steps to get the SQLT packages ready to go on
    your target machine:


    1.  Find a web browser and log in to My Oracle Support ([http://support.oracle.com](http://support.oracle.com))

    2.  Go to the knowledge section and type “SQLT” in the search box. Note 215187.1
    entitled “SQLT (SQLTXPLAIN) – Tool that helps to diagnose a SQL statement performing
    poorly [ID 215187.1]” should be at the top of the list.

    3.  Scroll to the bottom of the note and choose the version of SQLT suitable for
    your environment. There are currently versions suitable from 9i to 11 g.

    4.  Download the zip file (the version I downloaded was 2Mbytes).

    5.  Unzip the zip file.


    You now have the SQLT programs available to you for installation onto any suitable
    database. You can download the zip file to a PC and then copy it to a server if
    needed.


    How Do You Install SQLT?


    So without further ado, let’s install SQLT so we can do some tuning:'
  trans: '# SQLT 入门指南


    ![image](img/frontdot.jpg)


    理解 `SQLT` 将显著提升您解决调优问题的能力，并为您提供一个针对新代码和旧代码的有效检查清单。


    调优问题是最复杂的技术难题之一。`SQLTXPLAIN` 是一个出色的工具，能帮助您解决这些问题。准备好被它折服吧。


    欢迎来到使用 `SQLTXPLAIN`（通常简称为 `SQLT`）进行快速 Oracle SQL 调优的世界。从未听说过 `SQLT`？您并不孤单。在我加入甲骨文之前，作为一名从业多年的
    DBA，我也从未听说过它。这就是我撰写本书的原因。`SQLT` 是一个极好的工具，因为它能帮助您快速诊断调优问题。我指的是什么？我的意思是，最多在半天时间内，您就能从一条运行缓慢的
    SQL 开始，理解其为何运行异常，并最终知道如何修复它。


    `SQLT` 会直接修复您的 SQL 吗？不会。修复 SQL 需要更长时间。有些表非常大，收集统计信息可能就需要数天。搭建测试环境或将修复方案部署到生产环境也可能耗时良久。关键点在于，使用
    `SQLT` 工作半天，就能为您提供一份解释。您将知道 SQL 为何缓慢，或者能够解释它为何无法再快。


    您需要了解 `SQLT`，因为它会让您的工作更轻松。但让我先稍微回退一下，详细介绍一下 `SQLT` 是什么、它是如何诞生的、您可能为何没听说过它，以及您为何应该将其用于
    Oracle SQL 调优。


    ## 什么是 SQLT？


    `SQLT` 是一套程序包和脚本，用于生成 `HTML` 格式的报告、一些 SQL 脚本以及一些文本文件。所有信息被打包在一个 zip 文件中，通常会发送给
    Oracle 支持团队，但您也可以自己查看这些文件。`SQLT` 中包含十几个程序包和过程（称为“方法”）。这些程序包和过程会根据您的情况收集不同的信息。我们稍后将讨论适用于多种情况的程序包。


    ## SQLT 的由来？


    俗话说，需要是发明之母，`SQLT` 的诞生正是如此。Oracle 支持工程师每天处理大量的调优问题；问题是，旧有的线性分析方法实在太慢了。您需要快速把握全局，以便聚焦细节并告知客户问题所在。因此，当时的支持工程师
    Carlos Sierra（现为 Oracle 专家中心成员——Oracle 内部的一个专家团队）创建了 `SQLT`。这些例程在多次客户现场服务中不断演进，最终能够快速有效地收集*所有*必需的信息。随后，他提供了易于使用的例程来报告这些问题。


    `SQLT` 的天才创作者 Carlos Sierra，如今大部分时间都用于改进 `SQLT` 代码，并使 `SQLT` 代码适配新版数据库管理系统。他还通过
    `SQLT` 这一媒介，协助 Oracle 性能调优工程师进行 SQL 调优。


    ## 你为何没听说过 SQLT？


    如果它如此有用，为什么您没听说过 `SQLT`？ Oracle 曾尝试向 DBA 社区宣传 `SQLT`，但我仍然会接到支持电话，并与从未听说过 `SQLT`
    的 DBA 交流——或者即使听说过，也从未使用过。这个神奇的工具对支持客户是免费的，因此没有成本。 DBA 需要经常查看有问题的 SQL，而 `SQLT`
    无疑是最快的解决问题的方法。学习曲线可能较陡，但远不及其他替代方案那样高：解析原始的 `10046` 跟踪文件或 `10053` 跟踪文件。在统计信息表中大海捞针般查找问题？猜测可能的修复方法并尝试？不了，谢谢。`SQLT`
    就像一枚巡航导弹，穿越世界直击目标。


    也许 DBA 太忙，没时间学习一个 Oracle 发行说明中都未提及的工具。它不在文档集中，也不是产品套装的官方组成部分。它只是一个由才华横溢的支持工程师编写的工具，却碰巧比市场上任何其他工具都好。让我重申一遍：它是免费的。


    也有可能，一些 DBA 过于专注于调优中晦涩的细节，而忘记了修复 SQL 的现实世界。当你可以谈论那些你永远遇不到的情况的深奥隐藏参数时，为何要谈论一个易于使用的程序包呢？`SQLT`
    是一个非常实用的工具。


    无论原因为何，如果您以前从未使用过 `SQLT`，那么我在本书中的使命就是让您尽可能快、尽可能轻松地上手并运行。我向您保证，安装和使用 `SQLT` 很容易。只需掌握几个简单的概念，30
    分钟内您就可以开始使用。


    ## 我是如何知道 SQLT 的？


    和 DBA 界的其他人一样（我担任 DBA 多年），直到加入 Oracle 我才听说 `SQLT`。它让我豁然开朗。这个已经存在多年的工具，正是我过去多次需要的东西，尽管我从未用过。当然，过去几年我读过许多关于调优的书籍：例如
    Cary Millsaps 的经典著作 *优化 Oracle 性能*，以及 Jonathan Lewis 的 *基于成本的 Oracle 基础*。


    培训课程（总共两周）非常密集，至少有两位工程师形容它就像试图从消防栓里喝水。别担心！这本书将使学习使用 `SQLT` 的工作变得容易得多。


    现在，由于我在日常调优问题中广泛使用了 `SQLT`，我无法想象没有它的日子。我希望您也能拥有同样的能力。这不会花很长时间。请跟随我读完本书，理解示例，然后尝试将其与您自己的情况联系起来。您需要一些基本概念（我稍后会介绍），然后就可以着手解决您自己的调优问题了。请记住，即使没有问题也要定期使用
    `SQLT`；这样您可以学会快速浏览主 `HTML` 文件以找到所需内容。针对没有问题的 SQL 运行一份 `SQLT` 报告。您会学到很多。请在这段奇妙的旅程中与我同行。


    ## 开始使用 SQLT


    开始使用 `SQLT` 再简单不过了。我将这个过程分解为三个简单的步骤。


    1.  下载 `SQLT`

    2.  安装 `SQLT`

    3.  运行您的第一份 `SQLT` 报告


    `SQLT` 可在许多不同的平台上运行。我的许多示例将基于 Microsoft Windows，但 Linux 或 Unix 同样易于使用，并且 `SQLT`
    的使用在各平台之间几乎没有差异。如果有，我会在文中注明。


    ### 如何获取 SQLT 副本？


    如何下载 `SQLT`？这简单又轻松。我刚刚还为自己计时了一下。花了两分钟。以下是在目标机器上准备好 `SQLT` 程序包的步骤：


    1.  找一个网页浏览器并登录 `My Oracle Support` (`http://support.oracle.com`)

    2.  进入知识库部分，在搜索框中键入“`SQLT`”。标题为“`SQLT` (`SQLTXPLAIN`) – 帮助诊断性能不佳的 SQL 语句的工具 [ID
    215187.1]”的 `Note 215187.1` 应该位于列表顶部。

    3.  滚动到该说明的底部，选择适合您环境的 `SQLT` 版本。目前有适用于 9i 到 11g 的版本。

    4.  下载 zip 文件（我下载的版本是 2MB）。

    5.  解压 zip 文件。


    您现在拥有了 `SQLT` 程序，可以安装到任何合适的数据库上。如果需要，您可以将 zip 文件下载到 PC，然后复制到服务器。


    ### 如何安装 SQLT？


    那么，闲话少说，让我们安装 `SQLT`，以便进行一些调优：'
- fmt: "# 安装与运行 SQLT 报告\n\n## 安装步骤\n\n1.  下载适合您环境的 SQLT zip 文件（请参阅前面的步骤）。\n2.  将 zip\
    \ 文件解压到合适的位置。\n3.  导航到您解压目录下的“install”目录（在我的情况下是 `C:\\Document and Settings\\\
    Stelios\\Desktop\\SQLT\\sqlt\\install`，您的位置会不同）。\n4.  以 `sys` 身份连接，例如：`sqlplus\
    \ / as sysdba`。\n5.  确保您的数据库正在运行。\n6.  运行 `sqcreate.sql` 脚本。\n7.  对第一个选项选择默认值。（我们将在附录\
    \ A 中详细介绍安装细节。）\n8.  输入并确认 SQLTXPLAIN（SQLT 包的所有者）的密码。\n9.  选择 SQLTXPLAIN 用户存放其包和数据的表空间（在我的情况下是\
    \ `USERS`）。\n10. 选择 SQLTXPLAIN 用户的临时表空间（在我的情况下是 `TEMP`）。\n11. 然后输入数据库中将使用 SQLT\
    \ 包来解决调优问题的用户的 `username`。通常是运行有问题的 SQL 的架构（在我的情况下是 `STELIOS`）。\n12. 然后输入“T”、“D”或“N”。这反映了您对调优和诊断包的许可证级别。大多数站点同时拥有两者，因此您可以输入“T”（这也是默认值）。我的测试系统在我的\
    \ PC 上（一个没有生产能力的评估平台），因此我也会输入“T”。如果您只有诊断包，请仅输入“D”；如果您没有这些许可证，请输入“N”。\n\n最后您将看到的消息是“SQCREATE\
    \ completed. Installation completed successfully.”。\n\n## 运行您的第一个 SQLT 报告\n\n\
    SQLT 安装完成后即可使用。请记住，安装包是作为 `sys` 完成的，而运行报告是作为目标用户完成的。另外请注意，虽然我使用了 Oracle 安装文件中可用的许多标准架构示例，但您的平台和确切的\
    \ Oracle 版本可能不同，因此请不要期望您的结果与我的完全相同。但是，您的结果将与我的相似，并且您在您的环境中看到的结果应该仍然有意义。\n\n1.\
    \  现在退出 SQL 并将目录更改为 `...\\SQLT\\run`。在我的情况下是 `C:\\Documents and Settings\\Stelios\\\
    Desktop\\SQLT\\sqlt\\run`。从这里以目标用户身份登录到 SQLPLUS。\n2.  然后输入以下 SQL（这将是我们要调整的语句）：\n\
    \n    ```sql\n    SQL > select count(*) from dba_objects;\n    ```\n\n3.  然后从以下\
    \ SQL 获取 `SQL_ID` 值：\n\n    ```sql\n    SQL > select sql_id from v$sqlarea where\
    \ sql_text like 'select count(*) from dba_objects%';\n    ```\n\n    在我的情况下，`SQL_ID`\
    \ 是 `g4pkmrqrgxg3b`。\n\n4.  现在我们从目标架构（本例中为 `STELIOS`）执行我们的第一个 SQLT 工具 `sqltxtract`，使用以下命令：\n\
    \n    ```sql\n    SQL > @sqltxtract g4pkmrqrgxg3b\n    ```\n\n5.  输入 SQLTXPLAIN\
    \ 的密码（您在安装期间输入的密码）。如果一切顺利，您将看到的最后一条消息是“SQLTXTRACT completed”。\n6.  现在在 `run` 目录下创建一个\
    \ `zip` 目录，并将创建的 zip 文件复制到 `zip` 目录中。然后解压它。\n7.  最后，从您喜欢的浏览器导航到并打开名为 `sqlt_s<nnnnn>_main.html`\
    \ 的文件。符号“nnnnn”代表为使所有 SQLT 报告在您的机器上唯一而创建的数字。在我的情况下，该文件名为 `sqlt_s89906_main.html`。\n\
    \n恭喜！您已经获得了第一个可供查看的 SQLT XTRACT 报告。\n\n## 何时使用 SQLTXTRACT 与 SQLTXECUTE\n\nSQLT\
    \ XTRACT 是最容易创建的报告，因为它不需要在生成报告时执行 SQL。该报告可以在语句执行后收集。另一方面，SQLTXECUTE 会执行 SQL 语句，因此具有更好的运行时信息和访问实际返回行的能力。这意味着它可以评估执行计划中步骤的估计基数的准确性（请参阅本章后面的“基数和选择性”）。SQLTXECUTE\
    \ 将为您提供更多信息，但并非总是可以使用此方法，可能因为您处于生产环境中，或者 SQL 语句当前需要运行三天，而这正是您首先调查它的原因。我们将研究 SQLTXECUTE\
    \ 和 SQLTXTRACT 报告（以及其他 SQLT 选项）。现在，我们将专注于一个非常简单的 SQL 语句上的简单 SQLTXTRACT 报告。那么，让我们开始吧。\n\
    \n## 您的第一份 SQLT 报告\n\n在我们过于深入 SQLT 主报告的使用细节之前，请先看一下 [图 1-1](#9781430248095_Ch01.xhtml#Fig1)。这是一个全新的\
    \ SQLT 调优世界的开始。您兴奋吗？您应该兴奋。这个标题页仅仅是开始。从这里我们将了解一些基本的导航，以便让您了解有什么可用以及 SQLT 在导航方面是如何工作的。然后我们将看看\
    \ SQLT 实际上报告了关于 SQL 的什么信息。\n\n![9781430248095_Fig01-01.jpg](Images/9781430248095_Fig01-01.jpg)\n\
    \n[图 1-1](#9781430248095_Ch01.xhtml#_Fig1) .  SQLT 报告的顶部部分显示了指向许多区域的链接。\n\n##\
    \ 一些简单的导航\n\n让我们从基础开始。每个超链接部分都有一个“返回顶部”超链接，可让您返回到顶部。各部分中包含大量信息，您可能会迷失方向。其他相关的超链接将分组在“返回顶部”超链接上方。例如，如果我点击“索引”（“表”标题下的最后一个链接），我将看到如\
    \ [图 1-2](#9781430248095_Ch01.xhtml#Fig2) 所示的页面。\n\n![9781430248095_Fig01-02.jpg](Images/9781430248095_Fig01-02.jpg)\n\
    \n[图 1-2](#9781430248095_Ch01.xhtml#_Fig2) .  报告的“索引”部分。\n\n在我们迷失在 SQLT 报告中之前，让我们再次看一下标题页（[图\
    \ 1-1](#9781430248095_Ch01.xhtml#Fig1)）。主要部分涵盖了系统的各个方面。\n\n*   CBO 环境\n*   游标共享\n\
    *   自适应游标共享\n*   SQL 调优顾问 (STA) 报告\n*   执行计划（如果计划更改，将会有多个计划）\n*   SQL*Profiles\n\
    *   概要\n*   执行统计信息\n*   表元数据\n*   索引元数据\n*   列定义\n*   外键\n\n花点时间浏览一下报告。\n\n您注意到表格内某些数据上的超链接了吗？SQLT\
    \ 收集了它能找到的所有信息并将其全部交叉引用。\n\n因此，例如，像之前一样从顶部的主报告（[图 1-1](#9781430248095_Ch01.xhtml#Fig1)）继续：\n\
    \n1.  点击“索引”，即“表”下的最后一个标题。\n2.  在“索引”标题的“索引”列下，数字是超链接的（参见 [图 1-2](#9781430248095_Ch01.xhtml#Fig2)）。我点击了\
    \ `USERS$` 记录的 2。\n\n现在您可以看到该表中列的详细信息（参见 [图 1-3](#9781430248095_Ch01.xhtml#Fig3)）。作为一个例子，我们在这里看到索引\
    \ `I_USER2` 在我的查询执行中被使用了（“执行计划中”列的值设置为 `TRUE`）。\n\n![9781430248095_Fig01-03.jpg](Images/9781430248095_Fig01-03.jpg)\n\
    \n[图 1-3](#9781430248095_Ch01.xhtml#_Fig3) .  索引统计信息的详细信息。\n\n3.  现在，在“索引元数据”列中（[图\
    \ 1-3](#9781430248095_Ch01.xhtml#Fig3) 的最右侧），为 `I_USER2` 索引点击“元数据”超链接，以显示如 [图\
    \ 1-4](#9781430248095_Ch01.xhtml#Fig4) 所示的索引元数据。\n\n![9781430248095_Fig01-04.jpg](Images/9781430248095_Fig01-04.jpg)"
  raw: "1.  Download the SQLT zip file appropriate for your environment (see steps\
    \ above).\n2.  Unzip the zip file to a suitable location.\n3.  Navigate to your\
    \ “install” directory under the unzipped area (in my case it is `C:\\Document\
    \ and Settings\\Stelios\\Desktop\\SQLT\\sqlt\\install`, your locations will be\
    \ different).\n4.  Connect as `sys`, e.g., `sqlplus / as sysdba`\n5.  Make sure\
    \ your database is running\n6.  Run the `sqcreate.sql` script.\n7.  Select the\
    \ default for the first option. (We’ll cover more details of the installation\
    \ in Appendix A.)\n8.  Enter and confirm the password for SQLTXPLAIN (the owner\
    \ of the SQLT packages).\n9.  Select the tablespace where the SQLTXPLAIN will\
    \ keep its packages and data (in my case, USERS).\n10.  Select the temporary tablespace\
    \ for the SQLTXPLAIN user (in my case, TEMP).\n11.  Then enter the `username`\
    \ of the user in the database who will use SQLT packages to fix tuning problems.\
    \ Typically this is the schema that runs the problematic SQL (in my case this\
    \ is STELIOS).\n12.  Then enter “T”, “D” or “N.” This reflects your license level\
    \ for the tuning and diagnostics packs. Most sites have both so you would enter\
    \ “T”, (this is also the default). My test system is on my PC (an evaluation platform\
    \ with no production capability) so I would also enter “T”. If you have the diagnostics\
    \ pack, only enter “D”; and if you do not have these licenses, enter “N”.\n\n\
    The last message you see is “SQCREATE completed. Installation completed successfully.”\n\
    \nRunning Your First SQLT Report\n\nNow that SQLT is installed, it is ready to\
    \ be used. Remember that installing the package is done as `sys` and that running\
    \ the reports is done as the target user. Please also bear in mind that although\
    \ I have used many examples from standard schemas available from the Oracle installation\
    \ files, your platform and exact version of Oracle may well be different, so please\
    \ don’t expect your results to be exactly the same as mine. However, your results\
    \ will be similar to mine, and the results you see in your environment should\
    \ still make sense.\n\n1.  Now exit SQL and change your directory to `...\\SQLT\\\
    run`. In my case this is `C:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\\
    sqlt\\run`. From here log in to SQLPLUS as the target user.\n2.  Then enter the\
    \ following SQL (this is going to be the statement we will tune):\n\n```\n   \
    \ SQL > select count(*) from dba_objects;\n    ```\n\n3.  Then get the SQL_ID\
    \ value from the following SQL\n\n```\n    SQL > select sql_id from v$sqlarea\
    \ where sql_text like 'select count(*) from dba_objects%';\n    ```\n\nIn my case\
    \ the SQL_ID was g4pkmrqrgxg3b.\n\n4.  Now we execute our first SQLT tool `sqltxtract`\
    \ from the target schema (in this case STELIOS) with the following command:\n\n\
    ```\n    SQL > @sqltxtract g4pkmrqrgxg3b\n    ```\n\n5.  Enter the password for\
    \ SQLTXPLAIN (which you entered during the installation). The last message you\
    \ will see if all goes well is “SQLTXTRACT completed”.\n6.  Now create a `zip`\
    \ directory under the `run` directory and copy the zip file created into the `zip`\
    \ directory. Unzip it.\n7.  Finally from your favorite browser navigate to and\
    \ open the file named `sqlt_s <nnnnn> _main.html`. The symbols “nnnnn” represent\
    \ numbers created to make all SQLT reports unique on your machine. In my case\
    \ the file is called `sqlt_s89906_main.html`\n\nCongratulations! You have your\
    \ first SQLT XTRACT report to look at.\n\nWhen to Use SQLTXTRACT and When to Use\
    \ SQLTXECUTE\n\nSQLT XTRACT is the easiest report to create because it does not\
    \ require the execution of the SQL at the time of the report generation. The report\
    \ can be collected after the statement has been executed. SQLTXECUTE, on the other\
    \ hand, executes the SQL statement and thus has better run-time information and\
    \ access to the actual rows returned. This means it can assess the accuracy of\
    \ the estimated cardinality of the steps in the execution plan (see “Cardinality\
    \ and Selectivity” later in this chapter). SQLTXECUTE will get you more information,\
    \ but it is not always possible to use this method, perhaps because you are in\
    \ a production environment or perhaps the SQL statement is currently taking three\
    \ days to run, which is why you are investigating this in the first place. We\
    \ will look at both SQLTXECUTE and SQLTXTRACT report (and other SQLT options also).\
    \ For now we will concentrate on one simple SQLTXTRACT report on a very simple\
    \ SQL statement. So let’s dive in.\n\nYour First SQLT Report\n\nBefore we get\
    \ too carried away with all the details of using the SQLT main report, just look\
    \ at [Figure 1-1](#9781430248095_Ch01.xhtml#Fig1). It’s the beginning of a whole\
    \ new SQLT tuning world. Are you excited? You should be. This header page is just\
    \ the beginning. From here we will look at some basic navigation, just so you\
    \ get an idea of what is available and how SQLT works, in terms of its navigation.\
    \ Then we’ll look at what SQLT is actually reporting about the SQL.\n\n![9781430248095_Fig01-01.jpg](Images/9781430248095_Fig01-01.jpg)\n\
    \n[Figure 1-1](#9781430248095_Ch01.xhtml#_Fig1) .  The top part of the SQLT report\
    \ shows the links to many areas\n\nSome Simple Navigation\n\nLet’s start with\
    \ the basics. Each hyperlinked section has a `Go to Top` hyperlink to get you\
    \ back to the top. There’s a lot of information in the various sections, and you\
    \ can get lost. Other related hyperlinks will be grouped together above the `Go\
    \ to Top` hyperlink. For example, if I clicked on `Indexes` (the last link under\
    \ the `Tables` heading), I would see the page shown in [Figure 1-2](#9781430248095_Ch01.xhtml#Fig2).\n\
    \n![9781430248095_Fig01-02.jpg](Images/9781430248095_Fig01-02.jpg)\n\n[Figure\
    \ 1-2](#9781430248095_Ch01.xhtml#_Fig2) .  The Indexes section of the report\n\
    \nBefore we get lost in the SQLT report let’s again look at the header page ([Figure\
    \ 1-1](#9781430248095_Ch01.xhtml#Fig1)). The main sections cover all sorts of\
    \ aspects of the system.\n\n*   CBO environment\n*   Cursor sharing\n*   Adaptive\
    \ cursor sharing\n*   SQL Tuning Advisor (STA) report\n*   Execution plan(s) (there\
    \ will be more than one plan if the plan changed)\n*   SQL*Profiles\n*   Outlines\n\
    *   Execution statistics\n*   Table metadata\n*   Index metadata\n*   Column definitions\n\
    *   Foreign keys\n\nTake a minute and browse through the report.\n\nDid you notice\
    \ the hyperlinks on some of the data within the tables? SQLT collected all the\
    \ information it could find and cross-referenced it all.\n\nSo for example, continuing\
    \ as before from the main report at the top ([Figure 1-1](#9781430248095_Ch01.xhtml#Fig1))\n\
    \n1.  Click on `Indexes`, the last heading under `Tables.`\n2.  Under the `Indexes`\
    \ column of the `Indexes` heading, the numbers are hyperlinked (see [Figure 1-2](#9781430248095_Ch01.xhtml#Fig2)).\
    \ I clicked on 2 of the `USERS$` record.\n\nNow you can see the details of the\
    \ columns in that table (see [Figure 1-3](#9781430248095_Ch01.xhtml#Fig3)). As\
    \ an example here we see that the index `I_USER2` was used in the execution of\
    \ my query (the `In Plan` column value is set to `TRUE`).\n\n![9781430248095_Fig01-03.jpg](Images/9781430248095_Fig01-03.jpg)\n\
    \n[Figure 1-3](#9781430248095_Ch01.xhtml#_Fig3) .  An Index’s detailed information\
    \ about statistics\n\n3.  Now, in the `Index Meta` column (far right in [Figure\
    \ 1-3](#9781430248095_Ch01.xhtml#Fig3)), click on the `Meta` hyperlink for the\
    \ `I_USER2` index to display the index metadata shown in [Figure 1-4](#9781430248095_Ch01.xhtml#Fig4).\n\
    \n![9781430248095_Fig01-04.jpg](Images/9781430248095_Fig01-04.jpg)"
  trans: "\n# SQLT 报告的安装与运行\n\n## 安装步骤\n\n1.  下载适合您环境的 SQLT zip 文件（请参阅前面的步骤）。\n2.\
    \  将 zip 文件解压到合适的位置。\n3.  导航到解压目录下的“install”目录（在我的情况下是 `C:\\Document and Settings\\\
    Stelios\\Desktop\\SQLT\\sqlt\\install`，您的位置会不同）。\n4.  以 `sys` 身份连接，例如：`sqlplus\
    \ / as sysdba`。\n5.  确保您的数据库正在运行。\n6.  运行 `sqcreate.sql` 脚本。\n7.  对第一个选项选择默认值。（我们将在附录\
    \ A 中详细介绍安装细节。）\n8.  输入并确认 SQLTXPLAIN（SQLT 包的所有者）的密码。\n9.  选择 SQLTXPLAIN 用户存放其包和数据的表空间（在我的情况下是\
    \ `USERS`）。\n10. 选择 SQLTXPLAIN 用户的临时表空间（在我的情况下是 `TEMP`）。\n11. 然后输入数据库中将使用 SQLT\
    \ 包来解决调优问题的用户的 `username`。通常是运行有问题的 SQL 的架构（在我的情况下是 `STELIOS`）。\n12. 然后输入“T”、“D”或“N”。这反映了您对调优和诊断包的许可证级别。大多数站点同时拥有两者，因此您可以输入“T”（这也是默认值）。我的测试系统在我的\
    \ PC 上（一个没有生产能力的评估平台），因此我也会输入“T”。如果您只有诊断包，请仅输入“D”；如果您没有这些许可证，请输入“N”。\n\n最后您将看到的消息是“SQCREATE\
    \ completed. Installation completed successfully.”。\n\n## 运行您的第一个 SQLT 报告\n\n\
    SQLT 安装完成后即可使用。请记住，安装包是作为 `sys` 完成的，而运行报告是作为目标用户完成的。另外请注意，虽然我使用了 Oracle 安装文件中可用的许多标准架构示例，但您的平台和确切的\
    \ Oracle 版本可能不同，因此请不要期望您的结果与我的完全相同。但是，您的结果将与我的相似，并且您在您的环境中看到的结果应该仍然有意义。\n\n1.\
    \  现在退出 SQL 并将目录更改为 `...\\SQLT\\run`。在我的情况下是 `C:\\Documents and Settings\\Stelios\\\
    Desktop\\SQLT\\sqlt\\run`。从这里以目标用户身份登录到 SQLPLUS。\n2.  然后输入以下 SQL（这将是我们要调整的语句）：\n\
    \n    ```sql\n    SQL > select count(*) from dba_objects;\n    ```\n\n3.  然后从以下\
    \ SQL 获取 `SQL_ID` 值：\n\n    ```sql\n    SQL > select sql_id from v$sqlarea where\
    \ sql_text like 'select count(*) from dba_objects%';\n    ```\n\n    在我的情况下，`SQL_ID`\
    \ 是 `g4pkmrqrgxg3b`。\n\n4.  现在我们从目标架构（本例中为 `STELIOS`）执行我们的第一个 SQLT 工具 `sqltxtract`，使用以下命令：\n\
    \n    ```sql\n    SQL > @sqltxtract g4pkmrqrgxg3b\n    ```\n\n5.  输入 SQLTXPLAIN\
    \ 的密码（您在安装期间输入的密码）。如果一切顺利，您将看到的最后一条消息是“SQLTXTRACT completed”。\n6.  现在在 `run` 目录下创建一个\
    \ `zip` 目录，并将创建的 zip 文件复制到 `zip` 目录中。然后解压它。\n7.  最后，从您喜欢的浏览器导航到并打开名为 `sqlt_s<nnnnn>_main.html`\
    \ 的文件。符号“nnnnn”代表为使所有 SQLT 报告在您的机器上唯一而创建的数字。在我的情况下，该文件名为 `sqlt_s89906_main.html`。\n\
    \n恭喜！您已经获得了第一个可供查看的 SQLT XTRACT 报告。\n\n## 何时使用 SQLTXTRACT 与 SQLTXECUTE\n\nSQLT\
