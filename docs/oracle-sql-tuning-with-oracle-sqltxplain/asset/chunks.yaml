    \ <<< Note 1.\nREM\nREM NOTES\nREM   1\\. Should be run as SYSTEM or SYSDBA.\n\
    REM   2\\. User must have CREATE ANY SQL PROFILE privilege.\nREM   3\\. SOURCE\
