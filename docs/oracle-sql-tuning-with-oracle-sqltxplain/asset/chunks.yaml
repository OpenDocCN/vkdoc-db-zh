  trans: "\n我将此书献给我美丽的家人，他们包容了我古怪的工作时间和无数个被笔记本电脑“绑住”的夜晚。这段旅程即将抵达终点。一如既往，莱斯莉（Lesley）是我的核心支柱。没有她，我将一事无成。感谢你帮助我实现了这一切。\n\
    \n## 章节概览\n\n关于作者\n\n关于技术审校\n\n致谢\n\n前言\n\n引言\n\n![image](img/sq1.jpg) 第 1 章：`SQLTXPLAIN`简介\n\
    \n![image](img/sq1.jpg) 第 2 章：基于成本的优化器环境\n\n![image](img/sq1.jpg) 第 3 章：对象统计信息如何导致你的执行计划出错\n\
    \n![image](img/sq1.jpg) 第 4 章：数据倾斜如何导致你的执行时间波动不定\n\n![image](img/sq1.jpg) 第 5\
    \ 章：查询转换的故障排除\n\n![image](img/sq1.jpg) 第 6 章：通过概要文件强制执行计划\n\n![image](img/sq1.jpg)\
    \ 第 7 章：自适应游标共享\n\n![image](img/sq1.jpg) 第 8 章：动态采样与基数反馈\n\n![image](img/sq1.jpg)\
    \ 第 9 章：在 Data Guard 物理备库中使用`SQLTXPLAIN`\n\n![image](img/sq1.jpg) 第 10 章：比较执行计划\n\
    \n![image](img/sq1.jpg) 第 11 章：构建良好的测试用例\n\n![image](img/sq1.jpg) 第 12 章：使用`XPLORE`调查意外的计划变更\n\
