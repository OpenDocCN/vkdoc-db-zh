- fmt: "## How Do You Confirm You Are Using an SQL Profile?\n\nTo confirm that the\
    \ SQL Profile is working we need to run the SQL from the SQL prompt or re-run\
    \ SQLT and look at the display showing the SQL profiles being used. Below is an\
    \ example where I have run the SQL manually and got the execution plan.\n\n```\n\
    SQL> @q1\n1127 rows selected.\n\nExecution Plan\n\nPlan hash value: 1574422790\n\
    \n| Id  |Operation                           |Name                |Rows |Cost\
    \ (%CPU)|Time    |\n\n|   0 |SELECT STATEMENT                    |           \
    \         | 5557| 7035   (1)|00:01:25|\n|*  1 | HASH JOIN                    \
    \      |                    | 5557| 7035   (1)|00:01:25|\n|   2 |  TABLE ACCESS\
    \ FULL                 |PRODUCTS            |   72|    3   (0)|00:00:01|\n|  \
    \ 3 |  NESTED LOOPS                      |                    |     |        \
    \   |        |\n|   4 |   NESTED LOOPS                     |                 \
    \   | 5557| 7032   (1)|00:01:25|\n|*  5 |    TABLE ACCESS BY INDEX ROWID     |CUSTOMERS\
    \           |   43| 2366   (1)|00:00:29|\n|   6 |     BITMAP CONVERSION TO ROWIDS\
    \    |                    |     |           |        |\n|   7 |      BITMAP INDEX\
    \ FULL SCAN        |CUSTOMERS_GENDER_BIX|     |           |        |\n|   8 |\
    \    PARTITION RANGE ALL             |                    |     |           |\
    \        |\n|   9 |     BITMAP CONVERSION TO ROWIDS    |                    |\
    \     |           |        |\n|* 10 |      BITMAP INDEX SINGLE VALUE     |SALES_CUST_BIX\
    \      |     |           |        |\n|  11 |   TABLE ACCESS BY LOCAL INDEX ROWID|SALES\
    \               |  130| 7032   (1)|00:01:25|\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   5 -\
    \ filter(\"C\".\"CUST_FIRST_NAME\"='Theodorick')\n  10 - access(\"C\".\"CUST_ID\"\
    =\"S\".\"CUST_ID\")\nNote\n\n- SQL profile \"sqlt_s89915_p3005811457\" used for\
    \ this statement\nStatistics\n\n0  recursive calls\n          0  db block gets\n\
    \       5782  consistent gets\n          0  physical reads\n          0  redo\
    \ size\n      49680  bytes sent via SQL*Net to client\n       1241  bytes received\
    \ via SQL*Net from client\n         77  SQL*Net roundtrips to/from client\n  \
    \        0  sorts (memory)\n          0  sorts (disk)\n       1127 rows processed\n\
    ```\n\nIf you look at the execution plan, you’ll see that a note is appended stating\
    \ `SQL profile \"sqlt_s89915_p3005811457\" used for this statement`. If a SQLT\
    \ XECUTE report was run against this system and this SQL ID you would see this\
    \ header page (see [Figure 6-3](#9781430248095_Ch06.xhtml#Fig3)) from which you\
    \ could look at the execution plans created.\n\n![9781430248095_Fig06-03.jpg](Images/9781430248095_Fig06-03.jpg)\n\
    \n[Figure 6-3](#9781430248095_Ch06.xhtml#_Fig3) . Shows the top of the SQLT HTML\
    \ report `sqlt_s89918_main.html` file\n\nFrom here, click on Execution Plans.\
    \ We see now that the `sql_profile` text is present and highighted in the Plan\
    \ Info column. See [Figure 6-4](#9781430248095_Ch06.xhtml#Fig4), which shows this\
    \ section of the report.\n\n![9781430248095_Fig06-04.jpg](Images/9781430248095_Fig06-04.jpg)\n\
    \n[Figure 6-4](#9781430248095_Ch06.xhtml#_Fig4) . shows the Execution Plans section\
    \ of the SQLT HTML report. This is the left hand side of the page. There are more\
    \ details available on the right hand side of the page. Note the use of `sql_profile`\
    \ in the Plan Info column\n\n## How Do You Transfer an SQL Profile from One Database\
    \ to Another?\n\nIn many cases SQLT is considered too intrusive to database operations\
    \ (it isn’t) or there are strict rules on a particular site that disallow the\
    \ use of SQLT directly on a production database. In such cases there will often\
    \ be a development or staging environment where test SQL can be run against a\
    \ representative workload (i.e., one with enough data, which is up to date). In\
    \ cases like these you can often get the right execution plan in the development\
    \ or staging environment, but can’t in the production environment. Either because\
    \ you don’t have time to correct statistics or some other factor prevents you\
    \ from correcting production in a timely manner. In such cases, after confirming\
    \ with Oracle support, you can create an SQL profile on one system and transfer\
    \ it to production. You can follow the steps described in the Oracle Support Note\
    \ “How To Move SQL Profiles From One Database To Another Database [ID 457531.1]”\
    \ or follow the steps described here, which are a simplified version of the note\
    \ steps using SQLT.\n\n1.  Create an SQL profile script on your staging or development\
    \ system (as described above). The SQL profile should be based on SQL text that\
    \ matches the SQL text on the production system where you are going to transfer\
    \ the SQL profile. The end result of this step is an SQL Profile.\n2.  On the\
    \ Development or Staging system create a staging table with the commands\n   \
    \ ```\n    SQL> exec dbms_sqltune.create_stgtab_sqlprof(table_name=>'STAGE', schema_name='STELIOS');\n\
    \    ```\n3.  Pack the SQL profile into the staging area just created with the\
    \ commands\n    ```\n    SQL> exec dbms_sqltune.pack_stgtab_sqlprof(staging_table_name=>'STAGE',\
    \  profile_name=>' sqlt_s89915_p3005811457');\n    ```\n4.  Export from the development\
    \ or staging system the SQL Profile Staging table either with `exp` or `expdp`.\n\
    5.  Import the dump file using `imp` or `impdp` into the production environment\n\
    6.  Unpack the staging table using the command\n    ```\n    SQL> exec dbms_sqltune.unpack_stgtab_sqlprof(replace=>TRUE,\
    \ staging_table_name=>'STAGE');\n    ```\n\nOnce you have carried out these steps\
    \ your target SQL should run with the execution plan from your development or\
    \ staging environment. You can check it by getting the execution plan as we did\
    \ earlier on.\n\n## Summary\n\nAs you can see SQLT is a powerful tool when used\
    \ properly. Traditional tuning can seem slow and cumbersome in comparison after\
    \ you have used SQLT for a while. This is the main objective of this book: to\
    \ make you familiar with SQLT and then for you to use SQLT often enough to become\
    \ fast and efficient at tuning SQL. In the next chapter we’ll look at a feature\
    \ introduced in 11g called Adaptive Cursor Sharing. There is much confusion about\
    \ how this feature works and when it is being used and under what circumstances.\
    \ SQLT has a section in the main report, which is just for Adaptive Cursor Sharing.\n\
    \n## CHAPTER 7\n\n![image](Images/frontdot.jpg)\n\nAdaptive Cursor Sharing"
