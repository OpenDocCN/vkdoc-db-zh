    About the Author


    ![image](Images/9781430248095_unFM-01.jpg)


    **Stelios Charalambides** has more than 20 years experience working with Oracle
    databases. He is OCP certified from 7 to 11g and has worked as a Senior Consultant
    DBA on both sides of the Atlantic, dealing with all aspects of system design,
    implementation, and post-production support, solving practical problems in a wide
    variety of environments. He now works as a Principal Oracle Support Engineer developing
    time- critical solutions for tier-one customers with high-profile performance
    problems. Though born in the UK, Stelios now lives in New Hampshire with his wife,
    two children, and two dogs. Once this book is complete, he looks forward to devoting
    more time to his hobbies.


    About the Technical Reviewer


    **Mark Bobak** is a Senior Oracle DBA at ProQuest Company in Ann Arbor, MI. He’s
    been working in IT for over 25 years. For the past 13 years, he has worked as
    an Oracle DBA. He is an Oracle ACE and a member of the OakTable Network. He is
    also active in his local Oracle User Group (SEMOP) and attends and presents at
    conferences at the local, state, national, and international levels.


    Acknowledgments


    Carlos Sierra is the author of SQLTXPLAIN. His enthusiasm, patience, and willingness
    to listen allowed me to enter the world of Oracle SQL tuning with SQLT. Without
    his help and inspiration, this book would not have been possible. I hope that
    the text meets his expectations and that I haven’t made any errors in my description
    of his baby. If I have I apologize. The error was all mine.


    Thanks are also due to my first family within Oracle (The Oracle Performance Group),
    Chris Crocker, and Cathy Scully (who had the good sense to hire a Brit) and Mike
    Matagranno, whose persistence in getting me to move to Oracle was truly astounding.
    I hope none of you have regretted that decision. Special mention must go to Mauro
    Pagano, whose special knowledge and endless enthusiasm convinced me that I had
    something useful to say about SQLT.


    Many thanks also to Mike Gervais, my first manager, whose kindness helped so much
    during my first months at Oracle. Alan Bashy, Nick Meola, and Peter Gadah are
    fellow members of the performance team who also deserve special mention. They
    are truly awesome and showed me that no matter how much you think you know about
    tuning, there is always more to learn. I have been very lucky to come across so
    many knowledgeable and enthusiastic colleagues and managers. There isn’t room
    here to thank them all, and for that I am sorry.'
