    ```


    如果按 Enter 键，则完成步骤 1。此步骤将运行脚本 `sqlt_snnnnn_metadata.sql`。系统会提示您输入测试用例用户后缀。典型值可能是
    "_1"，但您可以按 RETURN 接受默认值，即无后缀。然后创建元数据对象，如表、索引以及任何约束、函数、包、视图或其他元数据。在此步骤结束时，会显示这些对象的状态。它们应该都是有效的。以下是我的示例的屏幕输出。


