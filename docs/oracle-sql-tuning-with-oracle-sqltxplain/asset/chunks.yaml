    Running a Health Check


    The SQL health check script is not SQLT. It is a completely separate utility downloaded
    from a different Metalink note and used in a different way. Why is it even mentioned
    in this book? SQLHC is considered a backup option when SQLT cannot be installed.
    This does not happen very often, but when it does it is usually because of site
    restrictions. There are many reasons for this:


    *   Not allowed to install anything on production (security reasons).

    *   Not allowed to install anything on production (fear of affecting production).

    *   Installation and testing procedures take too long and you have a problem on
    production.

    *   Don’t trust SQLT.

    *   SQLT is too complicated.

    *   Not enough space to install SQLT.


    Let me start by saying that SQLT has a small footprint and has been tried and
    tested on many different systems. Business reasons may preclude the installation
    of new packages in a timely manner: for example, if you have to test on development
    and QA before you can get to production. If you have those rules in place you
    should honor those business rules or local IT standards and consider using the
    health check script instead. However, I hope I’ve shown that SQLT is a trustworthy
    tool with many benefits for the user. If you come across a situation in which
    the use of SQLT is prohibited, then you can still choose the second best option,
    which is to run a SQL health check script against the target SQL.


    What Is SQL Health Check?


    The SQL health check (SQLHC) script is available as a free download from Oracle
    Metalink note 1366133.1\. It is a zip file containing three simple SQL scripts
    (`sqldx.sql`, `sqlhc.sql` and `sqlhcxec.sql`) that you run as sys on the target
    system. Until recently `sqlhc.sql` was only script, so we’ll talk about that script
    mostly and cover the other scripts later in this chapter. With all of these scripts
    nothing is installed: they are just SQL scripts and are very simple to use. These
    scripts were developed in response to the requirements on some sites that precluded
    the installation of SQLT (which has a schema, schema objects, tables and indexes,
    packages and functions). Because a script such as `sqlhc.sql` is just a simple
    script, more sites will accept it for installation so more sites can take advantage
    of the recommendations that come from SQLHC. SQLHC was developed from SQLT (it
    provides a subset of SQLT’s functionality) and so discussions of what SQLHC can
    do cover many of the topics already covered in this book.


