    系统统计信息是基于成本的优化器环境中常被忽视的部分。如果系统未收集任何系统统计信息，那么 SQLT 的“当前系统统计信息”部分将显示许多重要的系统参数为空。示例如图
    2-3 所示。它会对这些值进行猜测。但您为何要在意这些值是否提供给优化器呢？没有这些值，优化器将凭其最佳猜测来调整一系列关键操作的时间估算。这将导致在应使用全表扫描时却使用了不合适的索引，反之亦然。这些设置至关重要，以至于在某些工作负载发生变化（例如从日间
    OLTP 转向夜间 DW（数据仓库）环境）的动态环境中，应加载不同的系统统计信息集。在本节中，我们将探讨这些设置为何影响优化器、应如何以及何时收集它们，以及在
    SQLT 报告中需要关注什么。


    让我们回顾一下 HTML 报告第一部分的样貌（参见图 2-1）。请记住，这是一个包含多个部分的巨大 HTML 页面。


    ![9781430248095_Fig02-01.jpg](img/9781430248095_Fig02-01.jpg)


    图 2-1 .  SQLT 报告的顶部部分


    从主屏幕的“全局”部分，选择“CBO 系统统计信息”。这将带您进入可以看到标题“CBO 系统统计信息”的部分（参见图 2-2）。


    ![9781430248095_Fig02-02.jpg](img/9781430248095_Fig02-02.jpg)


    图 2-2 .  “CBO 系统统计信息”部分


    现在点击“信息性系统统计信息”。图 2-3 显示了您将看到的内容。


    ![9781430248095_Fig02-03.jpg](img/9781430248095_Fig02-03.jpg)


    图 2-3 .  “信息性系统统计信息”部分


    “信息性系统统计信息”部分显示了关于您环境的许多重要信息。此截图还显示了“当前系统统计信息”以及“基础值和合成值”部分的顶部。


    注意`系统统计信息`收集开始的时间。它始于 2007 年 7 月 23 日（相当久以前了）。此后工作负载变化大吗？是否添加了任何新设备？新的`SAN`驱动器？更快的磁盘？所有这些都可能影响系统的性能特征。您甚至可能拥有一个在不同时间段需要不同系统统计信息集的系统。


    注意到系统统计信息还有其他奇怪之处吗？开始和结束时间几乎相同。开始和结束时间`应该`被安排为代表性工作负载的`开始`和`结束`时刻收集系统特征信息。这些值意味着它们是在数据库创建时设置且从未更改过。查看图
    2-4 中显示的“基础值和合成值”部分。


    ![9781430248095_Fig02-04.jpg](img/9781430248095_Fig02-04.jpg)


    图 2-4 .  来自“信息性系统统计信息”部分正下方的“基础值和合成值”部分


    预估的`SREADTIM`（单块读取时间，毫秒）和`MREADTIM`（多块读取时间，毫秒）分别为 12 毫秒和 58 毫秒，而实际值（其下方）为 3.4
    毫秒和 15 毫秒。这些是好的值吗？可能难以判断，因为现代`SAN`系统能提供极高的 I/O 读取速率。对于传统的非 SAN 系统，通常期望多块读取时间高于单块读取时间，通常分别在
    9 毫秒和 22 毫秒左右。在此案例中，它们处于合理范围内。单块读取时间小于多块读取时间（您会预期如此，对吧？）。


    现在在图 2-5 中查看来自另一个系统的截图。

