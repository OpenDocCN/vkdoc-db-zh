    \ `SQLTXPLAIN` 模式中，因此更改许可证级别的命令是：\n```\nSQL> SQL> exec sqlt$a.disable_tuning_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqlt$a.enable_tuning_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqlt$a.disable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\nSQL> exec sqlt$a.enable_diagnostic_pack_access;\n\
    PL/SQL procedure successfully completed.\n```\n\n## A Remote SQLT Installation\n\
    \n在安装过程中，您将看到可选的连接标识符提示。通常这是被忽略的，因为您是在本地安装。但是，如果您想以远程模式安装 SQLT，则可以指定一个远程链接。在这些示例中，本地系统是您连接到\
    \ SQL Plus 的系统，远程系统是可以找到 SQLT 存储库的系统。\n```\nSpecify optional Connect Identifier\
    \ (as per Oracle Net)\nInclude \"@\" symbol, ie. @PROD\nIf not applicable, enter\
    \ nothing and hit the \"Enter\" key.\nThis connect identifier is only used while\
    \ exporting SQLT\nrepository everytime you execute one of the main methods.\n\
    Optional Connect Identifier (ie: @PROD): @REMOTE\n```\n这会将 `@REMOTE` 附加到所有 SQL\
    \ 操作上，因此如果您在本地数据库上运行 `@sqltxtract`，它将访问远程数据库来存储 SQLT 信息。\n\n在远程安装中，运行报告的步骤顺序与在本地运行所有操作略有不同。\n\
    1.  从本地节点在远程节点上安装 SQLT。\n2.  在远程节点上运行 SQL。\n3.  在本地节点上运行 `SQLTXTRACT` 或 `SQLTXECUTE`\
    \ 报告，但该报告在远程节点上运行。\n4.  报告在本地节点上生成，但存储库数据存储在远程节点上。\n\n## Other Ways to Install\
    \ SQLT\n\n如果您想将 SQLT 部署到多个系统（谁不想呢？），您可能希望进行非交互式安装。在这种情况下，您可以填充一些变量，然后运行 `sqcsilent.sql`。安装目录中提供了一个名为\
    \ `sqdefparams.sql` 的示例变量定义文件。\n\n以下是它包含的内容。这些都是我们在交互式安装中提供的值。\n```\nDEF connect_identifier\
    \      = '';\nDEF enter_tool_password     = 'sqltxplain';\nDEF re_enter_password\
    \       = 'sqltxplain';\nDEF default_tablespace      = 'USERS';\nDEF temporary_tablespace\
    \    = 'TEMP';\nDEF main_application_schema = '';\nDEF pack_license          \
    \  = 'T';\n```\n应根据您的环境更改这些变量：例如，应更改密码，表空间和主要应用程序用户也可能不同。当您在文件中填入自己的值后，就可以运行 `sqcsilent.sql`，它将在“静默”模式下执行，不再提示输入参数。\n\
    ```\nSQL> @sqcsilent.sql\n```\n您也可以像下面的示例那样，在命令行中带上所有参数运行安装：\n```\nSQL> @sqcsilent2.sql\
    \ '' sqltxplain USERS TEMP '' T\n```\n这也将执行一个正常的安装，不再提示输入信息。这可能是在多个不同系统上进行标准安装的快速方法。\n\
    \n## How to Remove SQLT\n\n如果您出于某种原因希望卸载 SQLT（例如可能有新版本可用），可以使用 `/install` 目录中名为\
    \ `sqdrop.sql` 的例程。此例程没有参数。\n```\nSQL> @sqdrop\nPL/SQL procedure successfully\
    \ completed.\nPL/SQL procedure successfully completed.\nRDBMS_RELEASE\n      \
    \      11.2\nRDBMS_VERSION\n            11.2.0.1.0\nno rows selected\n... uninstalling\
    \ SQLT, please wait\nTADOBJ completed.\nPL/SQL procedure successfully completed.\n\
    PL/SQL procedure successfully completed.\nRDBMS_RELEASE\n            11.2\nRDBMS_VERSION\n\
    \            11.2.0.1.0\nno rows selected\nSQDOLD completed. Ignore errors from\
    \ this script\nPL/SQL procedure successfully completed.\nPL/SQL procedure successfully\
    \ completed.\nRDBMS_RELEASE\n            11.2\nRDBMS_VERSION\n            11.2.0.1.0\n\
    no rows selected\nSQDOBJ completed. Ignore errors from this script\nPL/SQL procedure\
    \ successfully completed.\nPL/SQL procedure successfully completed.\nRDBMS_RELEASE\n\
    \            11.2\nRDBMS_VERSION\n            11.2.0.1.0\nno rows selected\nSQL>\n\
    SQL> DECLARE\n  2    my_count INTEGER;\n  3  BEGIN\n  4    SELECT COUNT(*)\n \
    \ 5      INTO my_count\n  6      FROM sys.dba_users\n  7     WHERE username =\
    \ 'TRCADMIN';\n  8  \n  9    IF my_count = 0 THEN\n 10      BEGIN\n 11       \
    \ EXECUTE IMMEDIATE 'DROP PROCEDURE sys.sqlt$_trca$_dir_set';\n 12      EXCEPTION\n\
