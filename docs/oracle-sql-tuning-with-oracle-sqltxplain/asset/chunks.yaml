    \n因此，统计信息没有改变，SQL文本也没有改变。可能是在午餐期间添加了一个索引。您可以通过查看报告的对象部分来确认，如[Figure 2-16](#9781430248095_Ch02.xhtml#Fig16)所示。\n\
