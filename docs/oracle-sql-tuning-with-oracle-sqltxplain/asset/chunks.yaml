  trans: "\n# 基于成本的优化器参数\n\nCBO 决策过程（用于制定你的执行计划）的另一个输入是 CBO 参数。这些参数控制着基于成本的优化器行为的各个方面。例如，`optimizer_dynamic_sampling`\
    \ 控制着 SQL 执行时要进行的动态采样级别。如果能快速查看每个系统，并看到那些参数列表被从默认值修改过，岂不是很好？使用 SQLT，在“CBO 环境”下就能立即找到这个列表。\n\
    \n图 2-6 就是一个几乎没有任何改动的例子。这很容易看出来，因为在这个 SQLT HTML 报告的这一部分只有 2 行记录。其中 `optimizer_mode`\
    \ 已被从默认值修改。如果你在这里看到数百个条目，那么你应该仔细查看这些条目，并评估被修改的参数中是否有任何导致了问题。这个例子代表了一位喜欢让系统保持原样的\
    \ DBA。\n\n![9781430248095_Fig02-06.jpg](img/9781430248095_Fig02-06.jpg)\n\n图 2-6\
    \ . CBO 环境部分。仅 2 条记录表明系统非常接近默认设置。\n\n图 2-7 展示了一个不止两个参数被从默认设置修改过的例子。现在，不再是前一个例子的\
    \ 2 行，我们有 8 个非默认值。每一个这样的参数都需要被证明其合理性。\n\n![9781430248095_Fig02-07.jpg](img/9781430248095_Fig02-07.jpg)\n\
    \n图 2-7 . 具有许多非标准参数设置的 CBO 环境。\n\n我们还设置了 4 个隐藏参数（它们以下划线开头）。在这个例子中，每一个隐藏参数都应该被仔细研究，看看是否能解释其原因。如果你保存了仔细的记录或注释了你的更改，你可能会知道为什么\
    \ `_b_tree_bitmap_plans` 被设置为 FALSE。然而，像这样的参数常常会毫无解释地在系统中设置多年。\n\n以下是常见的解释：\n\n\
    *   有人很久以前改的，我们不知道为什么，而且他/她现在已经离开了。\n*   我们不想改，怕会破坏什么东西。\n\n这个部分很有用，通常可以给你一些关于过去（也许你刚到当前站点）更改了什么的线索。要特别注意隐藏参数。Oracle\
    \ 支持团队会仔细检查这些参数，并判断它们存在的理由是否仍然成立。通常来说，隐藏参数不太可能对你有益，尤其是当你不知道它们是干什么用的时候。当然，你不能直接从生产系统中移除它们。你必须在测试系统上执行关键的\
    \ SQL 语句，然后在那个测试系统上移除那些参数，看看对整个优化器成本有什么影响。\n\n如果你精通了这个操作，你甚至可以为不同的工作负载设置不同的统计表，导入它们，并在不需要时删除旧的统计信息。要删除现有的统计信息，你会使用\n\
    \n```sql\nSQL> execute DBMS_STATS.DELETE_SYSTEM_STATS;\n```\n\n然而，关于设置和删除系统统计信息，有一点需要警惕。这种操作会影响系统中每一个\
    \ SQL 的 CBO 行为。因此，对这些参数的任何更改都应该谨慎进行，并在合适的测试环境中彻底测试。\n\n## Siebel 环境考量\n\n有些环境很特殊，仅仅是因为\
    \ Oracle 工程部门认为一套特殊的参数对它们更好。Siebel Systems 客户关系管理（CRM）应用程序就是这种情况。Oracle 工程部门已经确定了一些隐藏参数，能使你的系统获得最佳性能。如果你的系统是\
    \ Siebel，那么在“环境”部分你会看到类似图 2-8 所示的内容。\n\n![9781430248095_Fig02-08.jpg](img/9781430248095_Fig02-08.jpg)\n\
    \n图 2-8 . 一个 Siebel CRM 环境的参数设置示例。\n\nSiebel 调优的“必去之处”是“Oracle 数据库上 Siebel CRM\
    \ 应用程序的性能调优指南”白皮书。可以在说明 781927.1 中找到。这份文档中有很多有用的信息，但关于优化器参数，第 9 页列出了为获得良好性能而应设置的非默认参数。例如，`optimizer_index_cashing`\
    \ 应设置为 0。\n\n在这些值都正确之前，甚至不要尝试在 Siebel 系统上调整你的 SQL。例如，在上述 Siebel 系统上，如果出现性能问题，第一步将是根据说明\
    \ 781927.1 修正所有错误的参数。除非这个基础已经到位，否则你不可能期望从一个 Siebel CRM 系统中获得稳定的性能。\n\n## 提示\n\n\
    创建提示是为了让 DBA 和开发人员能够对优化器被允许做出的选择施加一些控制。一个提示的例子是 `USE_NL`。在下面的例子中，我创建了两个最小化的表，分别叫做\
    \ `test` 和 `test2`，每个表只有一行数据。不出所料，如果我让优化器选择计划，它会使用 `MERGE JOIN CARTESIAN`，因为这些表中都只有一行数据。\n\
    \n```sql\nSQL> select\n  test.col1,\n  test2.col1\nfrom\n  test,\n  test2\nwhere\n\
    \  test.col1=test2.col1;\n      COL1       COL1\n---------- ----------\n     \
    \    1          1\n         1          1\nSQL> set autotrace traceonly explain;\n\
    SQL> /\nExecution Plan\nPlan hash value: 1571755046\n\n| Id  | Operation     \
    \       | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT\
    \     |       |     2 |    52 |     6   (0)| 00:00:01 |\n|   1 |  MERGE JOIN CARTESIAN|\
    \       |     2 |    52 |     6   (0)| 00:00:01 |\n|   2 |   TABLE ACCESS FULL\
    \  | TEST2 |     1 |    13 |     3   (0)| 00:00:01 |\n|   3 |   BUFFER SORT  \
    \      |       |     2 |    26 |     3   (0)| 00:00:01 |\n|*  4 |    TABLE ACCESS\
    \ FULL | TEST  |     2 |    26 |     3   (0)| 00:00:01 |\n\nPredicate Information\
    \ (identified by operation id):\n\n4 - filter(\"TEST\".\"COL1\" = \"TEST2\".\"\
    COL1\")\nNote\n\n- dynamic sampling used for this statement (level=2)\nSQL> list\n\
    \  1* select\n  test.col1,\n  test2.col1\nfrom\n  test,\n  test2\nwhere\n  test.col1=test2.col1\n\
    ```\n\n上面的命令 `list` 显示了之前的 DML（数据操作语言）。然后我修改了 SQL，加入了一个提示。所有提示的语法都以 `/*+` 开头，以\
    \ `*/` 结尾。对于 `USE_NL`，括号内的部分可以接受多个代表表的条目（可以是表名，如我们的例子，或者如果是别名的话）。这是修改后的查询。\n\n\
    ```sql\nSQL> select /*+ USE_NL(test) */ * from test, test2 where test.col1=test2.col1;\n\
    \nExecution Plan\n\nPlan hash value: 74026472\n\n| Id  | Operation          |\
    \ Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT\
    \   |       |     2 |    52 |     6   (0)| 00:00:01 |\n|   1 |  NESTED LOOPS \
    \     |       |     2 |    52 |     6   (0)| 00:00:01 |\n|   2 |   TABLE ACCESS\
    \ FULL| TEST2 |     1 |    13 |     3   (0)| 00:00:01 |\n|*  3 |   TABLE ACCESS\
    \ FULL| TEST  |     2 |    26 |     3   (0)| 00:00:01 |\n\nPredicate Information\
    \ (identified by operation id):\n\n3 - filter(\"TEST\".\"COL1\"=\"TEST2\".\"COL1\"\
    )\nNote\n\n-   dynamic sampling used for this statement (level=2)\n```\n\n注意第二个执行计划中是如何使用了\
    \ `NESTED LOOP` 的。\n\n我们是在对优化器说：“我们知道你没我们聪明，所以忽略规则吧，在这一点上就按我们想的做。”\n"
- fmt: "## 使用Hints的考量与执行计划分析\n\nSometimes using hints is right, but sometimes it’s\
    \ wrong. Occasionally hints are inherited from old code, and it is a brave developer\
    \ who removes them in the hope that performance will improve. Hints are also a\
    \ form of data input to the CBOs process of developing an execution plan. Hints\
    \ are often needed because the other information fed to the optimizer is wrong.\
    \ So, for example, if the object statistics are wrong you may `need` to give the\
    \ optimizer a hint because its statistics are wrong.\n\nIs this the correct way\
    \ to use a hint? No. The problem with using a hint like this is that it may have\
    \ been right when it was applied, but it could be wrong later, and in fact it\
    \ probably is. If you want to tune code, first remove the hints, let the optimizer\
    \ run free, while feeling the blades of data between its toes, free of encumbrances.\
    \ Make sure it has good recent, statistics, and see what it comes up with.\n\n\
    ### 获取SQL文本与执行计划\n\nYou can always get the SQL Text that you are evaluating by\
    \ clicking on the “SQL Text” link from the top section of the SQLT report. Here’s\
    \ another example of a query. This time we’re using a `USE_NL` hint with two aliases.\n\
    \n```sql\nSQL> set autotrace traceonly explain;\nSQL> select cust_first_name,\
    \ amount_sold\n  2  from customers C, sales S\n  3  where c.cust_id=s.cust_id\
    \ and amount_sold>100;\nSQL> REM\nSQL> REM Here is the execution plan\nSQL> REM\n\
    ```\n\n```\nExecution Plan\n\nPlan hash value: 3549450340\n\n| Id  | Operation\
    \            | Name      | Rows  | Bytes |TempSpc| Cost (%CPU)| Time     |\n\n\
    |   0 | SELECT STATEMENT     |           |   144K|  3107K|       |  1118   (2)|\
    \ 00:00:14 |\n|*  1 |  HASH JOIN           |           |   144K|  3107K|  1304K|\
    \  1118   (2)| 00:00:14 |\n|   2 |   TABLE ACCESS FULL  | CUSTOMERS | 55500 |\
    \   650K|       |   405   (1)| 00:00:05 |\n|   3 |   PARTITION RANGE ALL|    \
    \       |   144K|  1412K|       |   496   (4)| 00:00:06 |\n|*  4 |    TABLE ACCESS\
    \ FULL | SALES     |   144K|  1412K|       |   496   (4)| 00:00:06 |\n\nPredicate\
    \ Information (identified by operation id):\n\n1 - access(\"C\".\"CUST_ID\"=\"\
    S\".\"CUST_ID\")\n   4 - filter(\"AMOUNT_SOLD\">100)\n```\n\nI’ve only shown part\
    \ of the execution plan because we’re only interested in the operations (under\
    \ the “Operation” column). `Id` 1 shows an operation of hash join. This is probably\
    \ reasonable as there are over 900,000 rows in `sales`. The object with the most\
    \ rows (in this case `SALES`) is read first and then `CUSTOMERS` (with only 55,500\
    \ rows). So if we decided to use a nested loop instead we would add a hint to\
    \ the code like this:\n\n```sql\nSQL> select /*+ USE_NL(C S) */\n  cust_first_name,\n\
    \  amount_sold\nfrom\n  customers C,\n  sales S\nwhere\n  c.cust_id=s.cust_id\n\
    \  and amount_sold>100;\n```\n\n```\nExecution Plan\n\nPlan hash value: 4237376444\n\
    \n| Id  | Operation                    | Name         | Rows  | Bytes | Cost (%CPU)|\
    \ Time     |\n\n|   0 | SELECT STATEMENT             |              |   144K|\
    \  3107K|   145K  (1)| 00:29:03 |\n|   1 |  NESTED LOOPS                |    \
    \          |       |       |            |\n|   2 |   NESTED LOOPS            \
    \   |              |   144K|  3107K|   145K  (1)| 00:29:03 |\n|   3 |    PARTITION\
    \ RANGE ALL       |              |   144K|  1412K|   496   (4)| 00:00:06 |\n|*\
    \  4 |     TABLE ACCESS FULL        | SALES        |   144K|  1412K|   496   (4)|\
    \ 00:00:06 |\n|*  5 |    INDEX UNIQUE SCAN         | CUSTOMERS_PK |     1 |  \
    \     |     0   (0)| 00:00:01 |\n|   6 |   TABLE ACCESS BY INDEX ROWID| CUSTOMERS\
    \    |     1 |    12 |     1   (0)| 00:00:01 |\n\nPredicate Information (identified\
    \ by operation id):\n\n4 - filter(\"AMOUNT_SOLD\">100)\n   5 - access(\"C\".\"\
    CUST_ID\"=\"S\".\"CUST_ID\")\n```\n\nThe hint is enclosed inside `/*+` and `*/`\
    \ as before. Anything inside these hint brackets will then be considered by the\
    \ optimizer. But it is important to realize that the hint (in this case `USE_NL(C\
    \ S)`) must be valid. Notice that now the operations have changed. Now the plan\
    \ is to use nested loops instead of a hash join. The cost is much higher than\
    \ the hash join plan at 145,000, but the optimizer has to obey the hint because\
    \ it is valid. If it is not valid, no error is generated and the optimizer carries\
    \ on as if there was no hint. Look at what happens.\n\n```sql\nSQL> select /*+\
    \ MY_HINT(C S) */ cust_first_name, amount_sold\nfrom\n  customers C, sales S\n\
    where c.cust_id=s.cust_id and amount_sold>100;\n```\n\n```\nExecution Plan\n\n\
    Plan hash value: 3549450340\n\n| Id  | Operation            | Name      | Rows\
    \  | Bytes |TempSpc| Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT     |\
    \           |   144K|  3107K|       |  1118   (2)| 00:00:14 |\n|*  1 |  HASH JOIN\
    \           |           |   144K|  3107K|  1304K|  1118   (2)| 00:00:14 |\n| \
    \  2 |   TABLE ACCESS FULL  | CUSTOMERS | 55500 |   650K|       |   405   (1)|\
    \ 00:00:05 |\n|   3 |   PARTITION RANGE ALL|           |   144K|  1412K|     \
    \  |   496   (4)| 00:00:06 |\n|*  4 |    TABLE ACCESS FULL | SALES     |   144K|\
    \  1412K|       |   496   (4)| 00:00:06 |\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 -\
    \ filter(\"AMOUNT_SOLD\">100)\n```\n\nThe optimizer saw my hint, didn’t recognize\
    \ it as a valid hint, ignored it and did its own thing, which in this case was\
    \ to go back to the hash join.\n\n### 执行历史变更\n\nOften when investigating a performance\
    \ problem, it is crucial to get an idea when SQL performance changed. Vague reports\
    \ like “it was fine yesterday” are not precise enough, although they may help\
    \ you by directing your analysis to a particular time period in your SQLT report.\
    \ Every change in the optimizer environment (parameter changes) is timestamped.\
    \ Every time an execution changes a new execution plan is created that is also\
    \ timestamped, every time an SQL statement is executed its metrics are gathered\
    \ and stored in the AWR repository. This is the same source of data that the automatic\
    \ facilities in Oracle use to suggest improvements in your SQL. SQLT uses these\
    \ sources to build a history of the executions of your chosen SQL ID. This mine\
    \ of information is only one click away from the top of the SQLT report. Click\
    \ on the “Performance History” link under the “Plans” heading from the top of\
    \ the SQLT HTML report. Depending on how many executions of your SQL there are\
    \ in the system you may see something like the screen shot in [Figure 2-9](#9781430248095_Ch02.xhtml#Fig9).\
    \ There are other columns in the full HTML report but we’ll limit our discussion\
    \ to the “Opt Env Hash Value” for now.\n\n![9781430248095_Fig02-09.jpg](Images/9781430248095_Fig02-09.jpg)\n\
    \n[Figure 2-9](#9781430248095_Ch02.xhtml#_Fig9) .  The optimizer Env Hash Value\
    \ changed on the 22^(nd) of February from 3945002051 to 2904154100. This means\
    \ something in the CBO enviroment changed on that date.\n\nLook at the “Opt Env\
    \ Hash Value” for the statement history in [Figure 2-9](#9781430248095_Ch02.xhtml#Fig9).\
    \ For the one SQL statement that we are analyzing with its list of “Begin Time”\
    \ and “End Times” we see other changes taking place. For example, the plan hash\
    \ value changed (for the same SQL statement) and so did the “Opt Env Hash Value”.\
    \ Its value is `2904154100` until the 17th of February 2012. Then it changes to\
    \ `3945002051` then back to `2904154100` and then back to `3945002051` (on the\
    \ 18th of February). Something about the optimizer’s environment changed on those\
    \ dates. Did the change improve the situation or make it worse? Notice that every\
    \ time the optimizer hash value changes, the hash value of the plan changes also.\
    \ Somebody or something is changing the optimizer’s environment and affecting\
    \ the execution plan.\n\n### 列统计信息"
