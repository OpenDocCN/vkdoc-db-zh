    COUNTRY_ID\"=\"C\".\"COUNTRY_ID\")\n\n36 rows selected.\n```\n\nThis plan is even\
    \ better than the one found by XPLORE. It has a cost of 4\\. We found this plan\
    \ because we used XPLORE to give us a hint. The hint was that using indexes would\
    \ be a good idea for everything except `SALES.` We need to do a `TABLE ACCESS\
    \ FULL` on `SALES` as we are summing sales for a big group of countries. However,\
    \ using `TABLE ACCESS FULL` on the other tables didn’t make sense. It’s not surprising\
    \ that the example came out this way (I planned it that way), but real life examples\
    \ are exactly like this. The steps in the discovery usually go:\n\n1.  Something\
    \ unexpected happens to some SQL (slows down invariably).\n2.  Get the XTRACT\
    \ test case.\n3.  Discover what is wrong with the SQL or its environment by studying\
    \ the report.\n4.  If the previous step fails, run an XPLORE, which sometimes\
