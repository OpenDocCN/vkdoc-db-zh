    \ Columns`（表列）区域。在这里，我们可以看到列统计信息。特别值得关注的是样本大小及其所代表的百分比（大约在报告的中部位置）。有关该区域的示例，请参见图\
    \ 3-5（我只显示了报告的第 8 至 12 列）。请注意，有些样本大小非常小。\n\n![9781430248095_Fig03-05.jpg](img/9781430248095_Fig03-05.jpg)\n\
    \n图 3-5。在这个`列统计信息`示例中（通过点击报告顶部的`Columns`超链接找到），自动采样大小收集到的样本非常小，仅为 0.3%。\n\n那么，我们是如何得到如此小的样本大小的呢？想象一下整理你的袜子。你是个十足的袜子爱好者，有十个装满袜子的抽屉。你想知道自己有多少种袜子。你查看第一个抽屉，随机拿出一双袜子。黑色的。第二双也是黑色，第三双还是。你会继续拿下去吗？还是你现在就假设所有的袜子都是黑色的？你看到问题所在了。算法试图高效工作，会进行随机抽样，但如果运气不好，它可能拿到太多相似的样本并就此放弃。想象一下，如果有数百万双袜子，除了一双（金底银条纹）外全是黑色。在你的随机样本中很可能找不到那双特殊的袜子。但再进一步假设，你特别喜欢那双金银条纹袜，每天都想穿。在这种情况下，你会始终对袜子抽屉进行全表扫描（因为你认为大多数袜子是黑色，并且你认为所有要找的彩色袜子分布情况都一样）。这听起来有违直觉，但你需要明白，优化器对列中数据的实际分布一无所知，它只有一个样本（而且是非常小的样本）。然后，它将针对那个抽屉总结出的规则应用于所有的袜子查找。事实上，你的袜子颜色分布是高度偏斜的，而那一双稀有的袜子恰恰是你一直想要查询的。数据的情况完全相同。随机样本可能无法捕捉到稀有的偏斜值，而如果这些值在查询中很常见，你可能就需要调整列的样本大小了。\n\
    \n### 如何收集统计信息\n\n`SQLT`可以帮助你制定在创建统计信息收集计划时可以采用的方法论。对于具有真实工作负载的预生产环境，你会明智地对关键的`SQL`语句（即那些性能不佳的）运行`SQLT`报告，并查看整体性能。不要仅依赖整体运行时来判断你的工作负载是否没问题。选择由`AWR`或`SQL\
    \ Tuning Advisor`识别出的顶级`SQL`语句。你甚至可以从`Enterprise Manager`（企业管理器）中挑选它们（见图 3-6）。\n\
    \n![9781430248095_Fig03-06.jpg](img/9781430248095_Fig03-06.jpg)\n\n图 3-6。你甚至可以从`OEM`中选择要研究的顶级`SQL`。\n\
    \n然后运行一个`SQLT XTRACT`报告，并查看这些`SQL`的统计信息。记住，你挑选的是系统上的资源消耗大户，因此你需要调整这些`SQL`的统计信息收集方式，以在可能的情况下改善其性能，同时避免对其他查询产生不利影响。如果你看到小的样本大小，`且它们正在对性能产生不利影响`，那么你就找到了一个需要修改统计信息收集的候选对象。\n\
    \n在 11g 中，你可以在许多不同粒度级别上设置统计信息收集的首选项；在数据库级别（`dbms_stats.set_database_prefs`）、模式级别（`dbms_stats.set_schema_prefs`）或表级别（`dbms_stats.set_table_prefs`）。不要仅仅因为性能差就盲目地增加百分比。查看性能不佳的`SQL`，并调整那些`SQL`语句的统计信息收集。将所有统计信息收集比例都调到\
    \ 100%只会浪费资源，而且在某些情况下，仍然无法收集到足够的列统计信息。这就是为什么了解实际发生的情况至关重要。\n\n### 保存、恢复和锁定统计信息\n\
    \n保存和恢复统计信息可能极其有用。在早前的例子中，你看到在错误的时间收集统计信息可能会破坏你的执行计划。如果你在表为空时收集了统计信息，那么当表中有代表性数据集时，你需要再次收集统计信息。另一方面，如果你在表中的数据具有代表性时收集了统计信息，你可以保存该收集结果，并在以后为该表恢复它。这应该能让你正确地表示新加载的表，同时在方便的时间收集统计信息。\n\
    \n你还可以在方便的时间锁定统计信息。\n\n![9781430248095_Fig03-07.jpg](img/9781430248095_Fig03-07.jpg)\n\
    \n图 3-7。如果你的表统计信息变化非常大，锁定它们可能是更好的选择。\n\n以下是一个收集对象统计信息并将其保存到名为`MYSTATS2`的表中的示例序列。\n\
    \n```\nSQL> create table test2 as select object_id from dba_objects;\n\n表已创建。\n\
    \nSQL> exec dbms_stats.gather_table_stats('STELIOS','TEST2');\n\nPL/SQL 过程已成功完成。\n\
    \nSQL> exec dbms_stats.create_stat_table('STELIOS','MYSTATS2');\n\nPL/SQL 过程已成功完成。\n\
    \nSQL> delete from test2;\n\n已删除 73419 行。\n\nSQL> commit;\n\n提交完成。\n\nSQL> select\
    \ count(*) from test2;\n\n  COUNT(*)\n----------\n         0\n\nSQL> exec dbms_stats.import_table_stats('STELIOS','TEST2',null,'MYSTATS2');\n\
    \nPL/SQL 过程已成功完成。\n\nSQL>\n```\n\n这些简单的步骤就是保存统计信息供以后使用所需的全部操作。这正是`SQLT`在收集关于`SQL`语句的信息时为你做的事情。对象的统计信息被收集在一起，并放入`ZIP`文件中，这样你就可以构建测试用例，让查询像在生产环境一样工作，却不需要数据。我们将在第\
    \ 11 章中介绍如何创建测试用例。这是你使用`SQLT`能获得的最有用的工具之一。\n\n### 午夜截断案\n\n是时候看看我们侦探系列的第二个案例了。你刚到现场，看到一个有很多提示的查询。当你询问此事以及为什么它有这么多提示时，你被告知如果移除这些提示，执行计划就是错误的。你还注意到，笛卡尔连接已被`_optimizer_cartesian_enabled=FALSE`禁用（见图\
    \ 3-8）。\n\n![9781430248095_Fig03-08.jpg](img/9781430248095_Fig03-08.jpg)\n\n图\
    \ 3-8。`CBO 环境`部分常常能揭示“古怪”的参数设置。\n\n我并不是建议你贸然介入每种情况，不加思考地移除提示，但带有提示的`SQL`有时是其他地方出错的迹象。通常，罪魁祸首是莫里亚蒂，当然，我是指统计信息！不要有偏见，始终要以证据为准，所以首先要做的就是收集证据。在一个复制的环境中，你运行不带提示的查询。\n\
    \n首先查看执行计划，特别是内存中的那个（见图 3-9）。\n\n![9781430248095_Fig03-09.jpg](img/9781430248095_Fig03-09.jpg)\n\
    \n图 3-9。这个执行计划有一个显而易见的问题（红框高亮显示）。\n"
- fmt: 'Luckily SQLT has done all the work for you. Following a `SQLT XECUTE` you
    saw that in the current execution plan, on Execution Step 1, the `INDEX RANGE
    SCAN`, the optimizer expected a `cardinality` of 1. (To see this look at the `Exec
    Ord` column, go down until you find “1”. This is the first line to be executed.)


    Then read across until you get to the `Estim Card` column. Here you’ll see a value
    of “1”. But as this was a `SQLT XECUTE` the SQL was executed, and the actual number
    of rows returned was greater than a million. The 1 row was expected, but there
    were actually 1 million rows. This is a big clue that something is wrong. The
    question at this point is “Why does the optimizer think the `cardinality` is going
    to be 1”?


    Look at the `Cost` column. You will see that the cost is expected to be 0. The
    optimizer thinks there is no cost in retrieving this data.


    To continue following the evidence-based trail you have to know the situation
    with the index statistics.


    Take a look at the index. You can expand the button in the `Go To` column to display
    more links (see [Figure 3-10](#9781430248095_Ch03.xhtml#Fig10)).


    ![9781430248095_Fig03-10.jpg](Images/9781430248095_Fig03-10.jpg)


    [Figure 3-10](#9781430248095_Ch03.xhtml#_Fig10) .  An expansion under the “more”
    column in an execution plan can show more links to other information


    Then click on `Col Statistics` under either the “Index Columns” or “Table Columns”
    heading to display the Column Statistics (see [Figure 3-11](#9781430248095_Ch03.xhtml#Fig11)).


    ![9781430248095_Fig03-11.jpg](Images/9781430248095_Fig03-11.jpg)


    [Figure 3-11](#9781430248095_Ch03.xhtml#_Fig11) .  Column statistics reveal no
    rows


    Here you can see an interesting situation. The number of rows is 0 for all the
    columns. This means the table was empty when the statistics were collected. So,
    when were the statistics collected on the parent table? For that you need the
    parent table name. Click the back button to get to the execution plan again, and
    this time click on `Col Statistics` under the Table Columns section to display
    the table statistics (see [Figure 3-12](#9781430248095_Ch03.xhtml#Fig12)).


    ![9781430248095_Fig03-12.jpg](Images/9781430248095_Fig03-12.jpg)


    [Figure 3-12](#9781430248095_Ch03.xhtml#_Fig12) .  Table statistics reveal no
    rows at the time of statistics collection


    You will see that 100 percent statistics were collected on `TABLE 2`, that there
    were no rows in the table, and that the collection happened at 04:47 in the morning.
    This is a fairly typical time for statistics collection to happen. Now you have
    to ask where the data came from and if there were 0 rows in the table at 4am.
    For this, click on the “Table” hyperlink from the main page to display the table
    details (see [Figure 3-13](#9781430248095_Ch03.xhtml#Fig13)).


    ![9781430248095_Fig03-13.jpg](Images/9781430248095_Fig03-13.jpg)


    [Figure 3-13](#9781430248095_Ch03.xhtml#_Fig13) .  The table details section shows
    where we can go for modification information


    This shows a new column of interest, the `Table Modif` column. Click on the “Modif”
    hyperlink for `TABLE 2` to see the modification history (see [Figure 3-14](#9781430248095_Ch03.xhtml#Fig14)).


    ![9781430248095_Fig03-14.jpg](Images/9781430248095_Fig03-14.jpg)


    [Figure 3-14](#9781430248095_Ch03.xhtml#_Fig14) .  The table modifications section
    shows rows being inserted, deleted, and updated


    ![image](Images/sq.jpg) **Note**  I know what you’re thinking. SQLT is the utility
    that just keeps on giving. I know all this information is in the database and
    can be obtained with suitable queries, but SQLT has done that for you already.
    You don’t have to go back to the database to find it. SQLT collected it, just
    in case.


    Now you can see the modifications to the tables, with time-stamps. Read across
    the row for the `TABLE 2` entry. There were zero rows in the table, then roughly
    2 million rows were inserted, there were no updates and no deletes, which resulted
    in roughly 2 million rows in the table. The statistics became stale because of
    this (more than a 10 percent change), and this happened at 4:09 pm.


    The steps are now clear. The table was empty. Statistics were collected. Two million
    rows were added, the query was run, the optimizer estimated a `cardinality` of
    1 (remember it rounds up to 1 if the value would be 0), and hence calculated that
    `NESTED LOOPS` (or even worse `CARTESIAN JOINS`) would be fine and got it completely
    wrong.


    Now that you know what happened you can fix the problem (if it seems appropriate),
    in a few different ways:


    *   You could collect statistics at a different time.

    *   You could export and import statistics as appropriate.

    *   You could freeze the statistics for when the table is populated.


    There are probably even more ways to do this. The solution is not the issue here.
    The point is that once you know what happened you can design a solution that suits
    your circumstances. You can also see why in this case the `_optimizer_cartesian_enabled=FALSE`
    was needed. It was a possibility that the optimizer may have chosen a cartesian
    join because one of the key steps would have a `cardinality` of 1 (one of the
    few cases where a `CARTESIAN JOIN` makes sense). You can test your theory very
    simply. With `TABLE 2` fully loaded, collect statistics. Then retry the query,
    or even better, just check what the execution plan would be.


    The optimizer had bad statistics and “decided” to do something that didn’t seem
    to make sense. SQLT collects enough information to let you see why the optimizer
    did what it did, and then you can set up statistics collection so that the optimizer
    doesn’t get it wrong. The optimizer is your friend, an awesome piece of code that
    is nearly always right, as long as it gets the information it needs.


    ## Summary


    In this chapter we saw clearly from practical examples that statistics make a
    real difference and that just leaving everything on automatic pilot is not always
    the best strategy. You need to pay attention to what statistics you are collecting,
    the quality of those statistics, and how often you are collecting them. Take special
    care with column histograms. SQLT helps you to do this quickly and efficiently
    and gives you more information than a pile of scripts ever could. We touched on
    skewness in this chapter; but in the next chapter we’ll dive right into the detail
    and look at what skewness is and how it affects your execution plan.


    # CHAPTER 4


    ![image](Images/frontdot.jpg)


    ## How Skewness Can Make Your Execution Times Variable


    Skewness is one of those topics that for some reason is often ignored, or misunderstood.
    Skewness is an important part of data handling for the cost-based optimizer. It
    makes a difference as to what the optimizer decides to do. It is so important
    that Oracle created new features such as Adaptive Cursor Sharing just to handle
    the consequences of skewness.


    ### Skewness


    In this section we are going to look at what skewness is, how it comes about,
    and how it affects your execution plan. If you handle skewness every day, you’re
    likely to know immediately what kind of situations are likely to produce skewed
    data. Sometimes skewed data can arise unexpectedly as well. We’ll also look at
    how to detect skewness, both from SQL and from SQLT.


    #### What Is Skewness?'
