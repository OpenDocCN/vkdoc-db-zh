    IMMEDIATE\"\n    SQL> ALTER SYSTEM SET \"_pga_max_size\" = 209715200 SCOPE=MEMORY;\n\
    \nSystem altered.\n\nSQL>\n    SQL> -- optimizer use feedback. isdefault=\"TRUE\"\
    \ ismodified=\"SYSTEM_MOD\"\n    SQL> ALTER SESSION SET \"_optimizer_use_feedback\"\
    \ = TRUE;\n\nSession altered.\n\nSQL>\n    SQL> -- optimizer dynamic sampling.\
    \ isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\"\n    SQL> ALTER SESSION SET optimizer_dynamic_sampling\
    \ = 0;\n\nSession altered.\n    ```\n\nNotice how we are changing system parameters.\
    \ For example `optimizer_dynamic_sampling` is set 0\\. This is not the default,\
    \ as we learned in [chapter 8](../Text/9781430248095_Ch08.xhtml). Apart from non-default\
    \ system parameters we also set the session parameters. Here is a section from\
    \ the log file where we set a number of hidden session parameters:\n\n```\n  \
    \  SQL>\n    SQL> -- compute join cardinality using non-rounded input values\n\
    \    SQL> ALTER SESSION SET \"_optimizer_new_join_card_computation\" = TRUE;\n\
    \nSession altered.\n\nSQL>\n    SQL> -- null-aware antijoin parameter\n    SQL>\
    \ ALTER SESSION SET \"_optimizer_null_aware_antijoin\" = TRUE;\n\nSession altered.\n\
    \nSQL> -- Use subheap for optimizer or-expansion\n    SQL> ALTER SESSION SET \"\
    _optimizer_or_expansion_subheap\" = TRUE;\n\nSession altered.\n\nSQL>\n    SQL>\
    \ -- Eliminates order bys from views before query transformation\n    SQL> ALTER\
    \ SESSION SET \"_optimizer_order_by_elimination_enabled\" = TRUE;\n\nSession altered.\n\
    \    ```\n\nNotice how in the preceding example hidden parameters are included.\
    \ We even set the `fix_control` parameters, in the next example. The `fix_control`parameters\
    \ control whether certain bug fixes (included with the database) are enabled or\
    \ disabled. Here is a section from the fix control part of the log file (we’ll\
    \ talk more about fix control in the next chapter).\n\n```\n    SQL>\n    SQL>\
    \ -- remove distribution method optimization for insert/update qbc (ofe 11.2.0.1)\
    \ (event 0)\n    SQL> ALTER SESSION SET \"_fix_control\" = '6376551:1';\n\nSession\
    \ altered."
  trans: '# 4. 恢复测试用例对象统计信息


    ## 4/7 按 ENTER 键恢复 TC64661 的模式对象统计信息。


    正如你从导入的对象列表中所看到的，第 3 步导入了 SQLT 在 SQLTXTRACT 期间捕获的信息，并将其存储在 SQLT 存储库中。然后系统会提示你继续执行第
    4 步，该步骤将恢复测试用例对象的统计信息。


    ### 步骤 4 操作说明


    4.  按 Enter 键继续执行第 4 步。在第 4 步中，我们会从 SQLT 存储库中为测试用例替换数据字典信息。这就是为什么你执行此操作的系统必须是一个你可以重新创建的系统。第
    4 步的显示内容如下：


    ```

    SQL> @@sqlt_s64661_restore.sql

    SQL> REM Restores schema object stats for statement_id 64661 from local SQLT repository
    into data dictionary. Just execute "@sqlt_s64661_resore.sql" from sqlplus.

    SQL> SPO sqlt_s64661_restore.log;

    SQL> SET SERVEROUT ON;

    SQL> EXEC sqltxplain.sqlt$a.import_cbo_stats(p_statement_id => ''s64661'', p_schema_owner
    => ''&&tc_user.'', p_include_bk => ''N'');

    remapping stats into user TC64661(120)

    obtain statistics staging table version for this system

    statistics version for this system: 5

    +-----+

    upgrade/downgrade of sqli$_stattab_temp to version 5 as per this system

    restoring cbo stats for table TC64661.COUNTRIES

    restoring cbo stats for table TC64661.CUSTOMERS

    restoring cbo stats for table TC64661.SALES

    deleting conflicting rows from tables:

    wri$_optstat_histgrm_history, _histhead_history, and _tab_history

    deleting conflicting wri$_optstat_ind_history

    restoring wri$_optstat_tab_history

    restoring wri$_optstat_ind_history

    restoring wri$_optstat_histhead_history

    restoring wri$_optstat_histgrm_history

    deleted 30 rows from wri$_optstat_tab_history

    deleted 18 rows from wri$_optstat_ind_history

    deleted 226 rows from wri$_optstat_histhead_history

    deleted 0 rows from wri$_optstat_histgrm_history

    restored 60 rows into wri$_optstat_tab_history

    restored 298 rows into wri$_optstat_ind_history

    restored 452 rows into wri$_optstat_histhead_history

    restored 2983 rows into wri$_optstat_histgrm_history

