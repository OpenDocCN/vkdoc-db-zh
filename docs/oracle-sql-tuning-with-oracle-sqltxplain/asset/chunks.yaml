    ```\n\n运行健康检查脚本就是这些。现在我们只需要查看各个单独的文件。\n\n# 主要健康检查报告\n\n第一个 HTML 文件包含主报告，涵盖了观察结果、SQL\
    \ 文本（以便我们确认正在查看正确的页面）以及表和索引的摘要信息。图 14-1 显示了第一页的顶部部分。\n\n![9781430248095_Fig14-01.jpg](img/9781430248095_Fig14-01.jpg)\n\
    \n图 14-1 . 第一个 SQLHC HTML 文件的顶部\n\n报告中的每个部分都可以通过上图中所示部分的超链接访问。在接下来的章节中，我将查看此报告四个部分中的三个，省略不言自明的\
    \ SQL 文本部分。\n\n# 观察结果部分\n\n最有趣的是“观察结果”部分，它列出了其认为值得关注的观察项。通常这些是关于非标准设置或不符合最佳实践的架构项目的提示。让我们看一个示例的“观察结果”部分，如\
    \ 图 14-2 所示。\n\n![9781430248095_Fig14-02.jpg](img/9781430248095_Fig14-02.jpg)\n\
    \n图 14-2 . 健康检查的观察结果部分\n\n观察结果部分包含许多关于如何改进 SQL 的有趣建议。我只显示了屏幕的左侧。在 图 14-3 中，我展示了对应的右侧屏幕，它告诉我们需要做什么来补救或调查这些观察结果。我在\
    \ 图 14-2 中重点标记了两个可能值得调查的观察结果。第一个与参数 `optimizer_dynamic_sampling` 的值有关，它有一个非默认值\
    \ 4（默认值是 2）。第二个与一个没有流行值的 height-balanced 直方图有关。让我们看看显示的右侧（图 14-3）中标签为 “More”（在后续版本的\
    \ SQLT 中改为 “Details”）的列。\n\n![9781430248095_Fig14-03.jpg](img/9781430248095_Fig14-03.jpg)\n\
    \n图 14-3 . 观察结果部分的右侧\n\n“More” 列实际上应该称为“建议”列。例如，对于非默认的 `optimizer_dynamic_sampling`\
    \ 参数，建议是“Review the correctness of this non-default value “4” for SQL_ID 81s67vj4pjqm8.”。这意味着发现了值\
    \ 4，并“建议”我们在坚持当前值 4 之前要深思熟虑。建议的值是 2。如果这是一个即将投入生产的 SQL，DBA 和开发人员之间必须讨论为什么将值设置为\
    \ 4 以及 2 是否更好。"
- fmt: '## Interpreting SQLHC Observations and Reports


    In the case of the histogram for `SH.SALES`, the suggestion is “A Height-balanced
    histogram with no popular values is not helpful nor desired. Consider dropping
    this histogram by collecting new CBO statistics while using `METHOD_OPT` with
    `SIZE 1`.” This suggestion is saying that the histogram on this column is not
    useful and should be dropped. It will only waste time. The statistics collection
    option is even suggested to you. Again, if this appeared in a pre-production test
    there would have to be some discussion about this histogram and whether it was
    useful or not.


    I’ve only mentioned two of the observations as examples. There are many suggestions
    (even for my simple SQL), and there are many other observation possibilities that
    do not appear because I did not violate the rules that cause them to appear. When
    you see the suggestions for your SQL you should carefully review them. Sometimes
    they are important (for example, the two mentioned above would be considered important),
    and in such cases you should either change your system (after careful testing)
    or have a good reason why those suggestions can be ignored. In most cases, observations
    are not generated when you run `SQLHC` because you did not trigger the rule by
    doing (or not doing) whatever it was that triggers the rule. This means that if
    you have a short list of observations you are doing well. If you have a long list
    of observations you may be doing badly.


    In the case of this example I would consider “Automatic gathering of CBO statistics
    is enabled.” as a relatively unimportant observation (in this case), since I am
    aware I am gathering statistics in that way and I know that if needed I will collect
    specific statistics to cover certain objects if needed. The warning is about small
    sample sizes in some cases causing non-optimal plans. It is not always easy to
    distinguish important observations from unimportant ones. How important an observation
    is will depend to some extent on your circumstances. Remember `SQLHC` is only
    following rules, it doesn’t “know” your environment. You have to judge if an observation
    is important or not. With practice and a good knowledge of your environment you
    can develop the skill to quickly separate the wheat from the chaff. Each of the
    four HTML reports list the SQL text, but there’s nothing to say about the SQL
    text, it’s just the text of your SQL. If you’ve run the SQL many times with many
    different parameters or hints, it may be worth giving it a quick glance to make
    sure you’re looking at the right report.


    ## The Tables Summary Section


    The “Tables Summary” section is the usual collection of information that you should
    be familiar with from a `SQLT XTRACT` or `XECUTE` report. See [Figure 14-4](#9781430248095_Ch14.xhtml#Fig4).


    ![9781430248095_Fig14-04.jpg](Images/9781430248095_Fig14-04.jpg)


    [Figure 14-4](#9781430248095_Ch14.xhtml#_Fig4) .  The “Tables Summary” section
    of the first page of the SQLHC report


    In this report we see the tables involved in the query and the time of the statistics
    gathering. We also see some information about the number of indexes and columns,
    but notice no hyperlinks are present to guide us quickly through the report.


    ## The Indexes Summary Section


    The indexes are shown in [Figure 14-5](#9781430248095_Ch14.xhtml#Fig5) and can
    be reached by clicking on “Indexes Summary” at the top of the page. There are
    no sophisticated links from the Tables section like there are in `SQLT` reports.
    This is because the `SQLHC` script is much simpler and cannot link in this way
    so easily.


    ![9781430248095_Fig14-05.jpg](Images/9781430248095_Fig14-05.jpg)


    [Figure 14-5](#9781430248095_Ch14.xhtml#_Fig5) .  The index report from SQLHC


    A similar page is made available for the indexes involved in the query. So the
    first HTML report from `SQLHC` is a fairly simple collection of data on the SQL
    tables and indexes and any observations related to these. The next `SQLHC` HTML
    report has more sections in it, including some historical information.


    ## The Diagnostics Report'
