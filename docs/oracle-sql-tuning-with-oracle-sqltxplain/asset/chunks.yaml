  trans: '

    11g 引入了一个新的混合系统，称为**自适应游标共享（ACS）**，它在何时引入新执行计划方面更为精细。同时引入了“**绑定敏感**”和“**绑定感知**”的概念。当绑定变量的值`可能`影响执行计划时，即为绑定敏感。绑定敏感意味着优化器怀疑某些值可能需要新的执行计划，但尚不确定。可以将绑定敏感视为开始意识到需要更多执行计划的第一步。在意识到之前，你必须先对绑定变量敏感。如果你多次运行
    SQL，使得不同绑定变量的缓冲区获取次数发生显著变化，最终该游标会被标记为“绑定感知”。换句话说，我们从绑定敏感（我们有绑定变量）发展到绑定感知（这些绑定变量对缓冲区获取次数产生了显著影响）。你可以通过查看`SQLTXPLAIN`报告来追踪绑定敏感度和绑定感知值的变化过程。


    ## 设置绑定敏感游标


    要展示 ACS 的行为需要进行一些设置。概括地说，我们在示例代码中将执行以下步骤。下方将展示相应代码：


    1.  创建测试表

    2.  向测试表中插入偏斜数据。应有足够多的行以允许多种执行计划的可能性。

    3.  展示数据的偏斜程度

    4.  创建索引以使其能在执行计划中使用

    5.  收集统计信息，包括所有列的直方图

    6.  在若干次执行中选择常见值和罕见值，直至 ACS 被激活

    7.  在`SQLTXECUTE`中检查结果


    ```

    -- 设置

    drop table acs;

    create table acs(object_id number, object_type varchar2(19));

    insert into acs select object_id, object_type from dba_objects;

    insert into acs select object_id, object_type from dba_objects;

    select object_type, count(*) from acs group by object_type order by count(object_type);

    create index i1 on acs(object_id);

    create index i2 on acs(object_type);

    exec dbms_stats.gather_table_stats(''STELIOS'',''ACS'', estimate_percent=>100,
    method_opt=>''FOR ALL COLUMNS SIZE 254'');

    prompt 现在我们有了一张表，ACS，其中包含偏斜数据。

    -- 现在我们做一些查询...

    variable b varchar2(19);

    @@acs_query ''SYNONYM''

    @@acs_query ''TABLE''

    @@acs_query ''SYNONYM''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    @@acs_query ''DIMENSION''

    ```


    我们再次选择了`dba_objects`作为伪随机数据的良好来源。在这个案例中，我们感兴趣的是这张表中 SYNONYM 类型远多于 DIMENSION 类型这一事实。脚本`acs_query.sql`包含以下内容：


    ```

    exec :b := ''&1''

    select count(object_type) from acs where object_type=:b;

    ```


