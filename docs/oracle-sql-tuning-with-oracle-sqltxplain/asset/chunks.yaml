    \ 1\nORA-16000: database open for read-only access\n```\n\n我们在上面的例子中看到，向只读数据库插入数据是不可能的。错误消息甚至\
    \ somewhat 说明了发生了什么。`XTRACT` 需要保存一些数据来进行分析，因此这一步（在本地数据库中保存数据）对 `XTRACT` 行不通。`XTRSBY`\
    \ 通过将所需数据通过数据库链接拉取到一个读/写数据库并将其本地存储，而不是存储在只读数据库上，从而解决了这个问题。\n\n`XTRACT` 还依赖于创建一个用户来安全地存储其对象。`XTRACT`\
    \ 无法在只读数据库上执行此操作。\n\n```\nSQL> connect / as sysdba\nConnected.\nSQL> create user\
    \ sqltxplain_read_only identified by orcle;\ncreate user sqltxplain_read_only\
    \ identified by orcle\n            *\nERROR at line 1:\nORA-00604: error occurred\
    \ at recursive SQL level 1\nORA-16000: database open for read-only access\n```\n\
    \n即使是收集跟踪的简单过程也无法完成：\n"
- fmt: "# 在 Data Guard 环境中使用 XTRSBY\n\nSQL> CREATE OR REPLACE PROCEDURE set_trace\n\
    \       /* grant alter session to <user> */\n       /* create this procedure on\
    \ both sites */\n       as\n         c1  integer;\n         r1 integer;\n    \
    \     c2  integer;\n         r2 integer;\n         BEGIN\n           c1:=dbms_sql.open_cursor;\n\
    \          dbms_sql.parse(c1,\n            'alter session set events\n       \
    \     ''10046 trace name context forever, level 8''',dbms_sql.v7);\n         \
    \   r1:=dbms_sql.execute(c1);\n            dbms_sql.close_cursor(c1);\n      \
    \      c2:=dbms_sql.open_cursor;\n            dbms_sql.parse(c2,\n           \
    \   'alter session set events\n              ''10053 trace name context forever,\
    \ level 1''', dbms_sql.v7);\n            r2:=dbms_sql.execute(c2);\n         \
    \   dbms_sql.close_cursor(c2);\n          END;\n    /\nCREATE OR REPLACE PROCEDURE\
    \ set_trace\n*\nERROR at line 1:\nORA-00604: error occurred at recursive SQL level\
    \ 1\nORA-16000: database open for read-only access\n```\n\n显然这是不被允许的。因此，如果我们不能创建\
    \ `SQLTXPLAIN` 模式或任何存储过程，那么如何针对这个数据库使用 `XTRACT` 呢？`XTRSBY` 通过使用本地用户（位于读/写数据库上）并创建通过数据库链接访问只读数据库的存储过程来解决这个问题。\n\
    \n## 如何使用 XTRSBY？\n\n我们刚刚看到了一些在 Data Guard 物理备用数据库上无法发生的事情。这时 `XTRSBY` 就可以发挥作用，完成\
    \ `XTRACT` 所能做的大部分工作。我说“大部分”是因为 `XTRSBY` 在结果上与 `XTRACT` 并不完全相同（我们将在“XTRSBY 报告是什么样子？”一节中看到差异）。然而，报告中包含足够的信息来帮助调优\
    \ Data Guard 实例上的查询。那么，我们如何让 `XTRSBY` 在 Data Guard 数据库上工作呢？在 Data Guard 备用数据库上启用\
    \ `XTRSBY` 的简要步骤如下：\n\n1.  在主数据库上安装 `SQLTXPLAIN`（我们已经在本书的[第 1 章](../Text/9781430248095_Ch01.xhtml)中介绍过）。\n\
    2.  允许 DDL 被传播到备用数据库。\n3.  为 `SQLTXPLAIN` 模式创建一个指向备用数据库的数据库链接（我将在下面给出一个示例）。\n\
    4.  从主数据库运行 `XTRSBY`，指定备用数据库上 SQL 的 SQL ID 和数据库链接。\n5.  报告在主数据库上生成。\n\n上述步骤 1\
    \ 在[第 1 章](../Text/9781430248095_Ch01.xhtml)中已有介绍。步骤 2 是等待模式被传播（或作为正常 Data Guard\
    \ 操作的一部分被复制）到备用数据库的问题。步骤 3 仅仅是创建一个公共数据库链接（或可从 `SQLTXPLAIN` 访问的链接）：以下是我为创建一个连接到只读数据库的公共可用数据库链接而输入的命令。\n\
    \n```\nSQL> show user\nUSER is \"SYS\"\nSQL> create public database link \"TO_STANDBY\"\
    \ connect to sqltxplain identified by oracle using '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=localhost)(Port=1521))(connect_data=(SID=SNC2)))';\n\
    \nDatabase link created.\n\nSQL> select sysdate from dual@to_standby;\n\nSYSDATE\n\
    \n28-OCT-12\n```\n\n在这里，我使用了一个只读数据库来模拟备用数据库，因此在我的公共数据库链接连接字符串中使用了 `localhost`。在实际示例中，您应该使用备用数据库的主机名。此外，在我的示例中我使用了\
    \ `PUBLIC` 数据库链接，但您的站点可能有关于创建数据库链接的标准，要求您创建私有链接或两段式链接（其中链接信息和密码是分开指定的）。只要 `SQLTXPLAIN`\
    \ 有权访问该链接以找到备用数据库，例程 `xtrsby.sql` 就应该可以工作。\n\n一旦这些先决条件到位，我们就可以通过在主数据库上运行 `sqlxtrsby`\
    \ 来使用 `XTRSBY` 收集有关备用数据库 SQL 的信息。\n\n首先，让我们在备用数据库上创建一些 SQL。这将等同于在备用数据库上运行的报告。\n\
    \n```\nSQL> select count(1) from dba_objects where object_type ='DIMENSION';\n\
    \nCOUNT(1)\n\nSQL> select sql_id from v$sql where sql_text like 'select count(1)\
    \ from dba_objects where object_type =''DIMENSION''';\n\nSQL_ID\n\ngaz0dgkpffqrr\n\
    \nSQL>\n```\n\n在上面的步骤中，我们运行了一些任意的 SQL 并获取了该 SQL 的 SQL ID。记住，我们是在备用数据库（我们的报告可能运行的地方）上运行的\
    \ SQL。我们无法在 Data Guard 物理备用数据库上存储任何数据，因此现在我们必须通过数据库链接从主数据库捕获有关该 SQL 的信息：\n\n```\n\
    SQL> @sqltxtrsby gaz0dgkpffqrr to_standby\n\nPL/SQL procedure successfully completed.\n\
    \nParameter 1:\nSQL_ID or HASH_VALUE of the SQL to be extracted (required)\n\n\
    Parameter 2:\nDBLINK to SQLTXPLAIN in the stand-by database (required)\n\nParemeter\
    \ 3:\nSQLTXPLAIN password (required)\n\nEnter value for 3:\n\nAt this point enter\
    \ the password for SQLTXPLAIN\n\n. . . please wait . . .\n```\n\n这是为简洁起见而缩短的输出：\n\
    \n```\nArchive:  sqlt_s96365_xtrsby_gaz0dgkpffqrr.zip\n  Length      Date    Time\
    \    Name\n---------  ---------- -----   ----\n     3060  10/30/2012 13:00   sqlt_s96365_driver.zip\n\
