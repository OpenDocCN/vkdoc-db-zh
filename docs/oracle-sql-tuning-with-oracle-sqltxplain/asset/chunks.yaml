    \ of the report showing all the known execution plans for our current SQL. If\
    \ dynamic sampling was used we see a message in the report under \"Plan Info\"\
    . See [Figure 8-2](#9781430248095_Ch08.xhtml#Fig2) for an example report showing\
    \ dynamic sampling being used. This figure only shows the left hand side of the\
    \ page.\n\n![9781430248095_Fig08-02.jpg](Images/9781430248095_Fig08-02.jpg)\n\
    [Figure 8-2](#9781430248095_Ch08.xhtml#_Fig2). Both execution plans used dynamic\
    \ sampling.\n\n## What Is Dynamic Sampling?\n\nSo dynamic sampling was used, but\
    \ what is it exactly? It is a way to improve the statistics of a query by collecting\
    \ those statistics *during* the compilation process. Don’t assume from this that\
    \ you can ignore the collection of statistics, however. You can’t. Dynamic sampling\
    \ is not a substitute for good statistics. It’s a last attempt to avoid a bad\
    \ execution plan. In the simplest terms the steps the optimizer goes through are\
    \ shown below:\n\n1.  The optimizer starts parsing the query.\n2.  During the\
    \ parsing process the optimizer assesses the state of the object statistics.\n\
    3.  If the optimizer finds that some statistics are missing, it may do some dynamic\
    \ sampling. The amount, and even whether dynamic sampling is done, will depend\
    \ on the value of `optimizer_dynamic_sampling`.\n4.  If no dynamic sampling is\
    \ to be done the rest of the optimization process continues, and statistics are\
    \ used where available.\n5.  If dynamic sampling is to be done, the amount of\
    \ sampling is determined from `optimizer_dynamic_sampling`, and a dynamic query\
    \ is generated to gather the information.\n6.  If dynamic sampling was done then\
    \ the statistics gathered are used to generate a better execution plan.\n\nIn\
    \ [Figure 8-2](#9781430248095_Ch08.xhtml#Fig2) we saw that dynamic sampling was\
    \ used, but nowhere is there an indication of the value of the parameter. This\
    \ can be seen in the CBO Environment part of the report. (See the section below\
    \ “How to find the value of `optimizer_dynamic_sampling`.”) Remember, this all\
    \ happens *before* the query executes and during the parsing process.\n\n## How\
    \ to Control Dynamic Sampling\n\nDynamic sampling is controlled by the value of\
    \ `optimizer_dynamic_sampling` as already mentioned. It can be set at the system\
    \ level or at the session level or by using hints in the SQL. These different\
    \ options allow the behavior of dynamic sampling to be very carefully controlled\
    \ and be set to behave in different ways for different SQL (with hints) and different\
    \ sessions (log on triggers for example). Here are examples of all of these options.\
    \ (I’ve set the value to 4. You can set any value from 0 to 10.) First set it\
    \ at the session level.\n\n```sql\nSQL> alter session set optimizer_dynamic_sampling=4\
    \ ;\nSession altered.\n```\n\nYou may want to set the parameter at the session\
    \ level if you are testing some SQL and want to see the effect on the execution\
    \ plan for a number of different values and you want to see it quickly without\
    \ affecting anybody else. You can also set the value in the current instance without\
    \ making the value permanent.\n\n```sql\nSQL> alter system set optimizer_dynamic_sampling=4\
    \ scope=memory;\nSystem altered.\n```\n\nYou might want to do this if you are\
    \ testing at the system level and want to be sure it is the right choice across\
    \ the system before making the change permanent. Once you’ve decided that setting\
    \ this value at the system level is appropriate, you can set it as shown below.\n\
    \n```sql\nSQL> alter system set optimizer_dynamic_sampling=4 scope=spfile;\nSystem\
    \ altered.\n```\n\nSetting the value at the system level makes changes to the\
    \ `spfile` so that it is applied to the database the next time it starts. If you\
    \ want to make changes on a more granular level, perhaps individual SQLs you may\
    \ want to use a hint. The hint version of this parameter can take two forms: a\
    \ cursor level and a table level version. So, for example, to set for the cursor:\n\
    \n```sql\nSQL> select /*+ dynamic_sampling (4) */ count(*) from dba_objects;\n\
    \  COUNT(*)\n```\n\nThere is a different form of this hint that allows you to\
    \ set the sampling level on a table. This is getting very specific: and you have\
    \ to wonder, if you know the object statistics on this particular object are missing,\
    \ why haven’t you collected real statistics?\n\n```sql\nSQL> select /*+ dynamic_sampling\
    \ (dba_objects 4) */ count(*) from dba_objects;\n  COUNT(*)\n```\n\nAs I mentioned\
    \ earlier, the amount of sampling and whether sampling is done depends on the\
    \ value of the dynamic sampling parameter value. Most systems will have the default\
    \ value of 2.\n\n```sql\nC:\\Documents and Settings\\Stelios>sqlplus / as sysdba\n\
    SQL*Plus: Release 11.2.0.1.0 Production on Sat Oct 13 11:47:40 2012\nCopyright\
    \ (c) 1982, 2010, Oracle.  All rights reserved.\nConnected to:\nOracle Database\
    \ 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
    \ OLAP, Data Mining and Real Application Testing options\nSQL> show parameter\
    \ optimizer_dynamic_sampling\nNAME                                 TYPE      \
    \  VALUE\n------------------------------------ ----------- ----------------------------\n\
    optimizer_dynamic_sampling           integer     2\n```\n\nIf the default value\
    \ is set and dynamic sampling is used, then the optimizer will attempt to sample\
    \ 64 blocks of data, unless the query is parallelized (see section below, “Dynamic\
    \ Sampling and Parallel Statements”). This is not a percentage of the table or\
    \ index size, it is a fixed number of blocks. The number of rows sampled is dependent\
    \ on how many rows fit into a block. Remember the objective of dynamic sampling\
    \ is to get some very basic statistics at the last moment just before the query\
    \ is executed. To minimize this overhead the sampling size is set in blocks to,\
    \ a clearly defined value that cannot expand or contract with the size of the\
    \ table rows. Dynamic sampling was designed this way to stop the parsing process\
    \ from consuming too many resources on large tables. If the dynamic sampling process\
    \ takes place (and we can check in the SQLTXPLAIN report) the samples collected\
    \ may help to make the execution plan better than it would otherwise be. The values\
    \ for the parameter (as mentioned earlier) vary from 0 to 10, and control the\
    \ operation of dynamic sampling. If `optimizer_dynamic_sampling` is set to\n\n\
    *   `0`: No dynamic sampling is used under any circumstances.\n*   `1`: If there\
    \ is at least 1 unanalyzed, unindexed, nonpartitioned table and this table is\
    \ bigger than 32 blocks, then 32 blocks are sampled. This means that if the table\
    \ is indexed or is partitioned or is smaller than 32 blocks no dynamic sampling\
    \ will take place.\n*   `2`: If at least one table has no statistics, whether\
    \ it has been indexed or not, then 64 blocks are sampled. Partitioned and indexed\
    \ tables are included in this. This will apply to all tables with no statistics\
    \ unlike level 1, where some tables will be excluded.\n*   `3`: If at least one\
    \ table has no statistics and if there is a `where` clause with an expression,\
    \ 64 blocks are sampled. This is trying to fix the problem of expressions on `where`\
    \ clauses where it can be tricky to develop the right execution plan. This is\
    \ more restrictive than level 2. This still applies to all tables just like level\
    \ 2.\n*   `4`: If at least one table has no statistics and if an `OR` or `AND`\
    \ operator is used on predicates on the same table, then 64 blocks are sampled.\
    \ This is attempting to deal with the problem of complex predicates. This is more\
    \ restrictive than level 2. This level also applies to indexed and partitioned\
    \ tables just like level 2."
