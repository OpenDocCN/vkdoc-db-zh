    \ 语句。\n\n![9781430248095_Fig05-02.jpg](img/9781430248095_Fig05-02.jpg)\n\n**图\
    \ 5-2**  10053 跟踪文件的 Legend 部分\n\n## 子查询非嵌套\n\n子查询非嵌套是我们列表中的第一个查询转换，其正式定义是：一种将子查询转换为外部查询中的连接的查询转换技术，这随后允许优化器将子查询中的表纳入连接顺序、访问路径和连接方法的考虑范围。我们将通过这个例子来探讨查询优化，因为它是一个常用的技术；相关的示例也易于解释和生成！\n\
    \n一个可以使用子查询非嵌套的示例查询是：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\nfrom\
    \ employees\nwhere\nhire_date IN (\nselect hire_date from employees where department_id\
    \ = 30\n);\n```\n\n子查询部分位于括号内，在这个子查询示例中我们使用了 `IN`。\n\n让我们看看当我们使用事件 10053 跟踪这个查询时会发生什么，如下所示：\n\
    \n```\nSQL> connect hr/hr\nConnected.\nSQL> alter session set max_dump_file_size=unlimited;\n\
    \nSession altered.\n\nSQL> alter session set events '10053 trace name context\
