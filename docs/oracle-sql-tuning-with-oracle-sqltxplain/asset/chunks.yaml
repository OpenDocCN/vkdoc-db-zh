    \ \"\";\nSPO OFF;\nPRO\nPRO SQLPROFILE 已完成。\n```\n\n你无需了解这段代码的任何工作细节；在紧急情况下，你只需按照指示操作，然后让你的系统按要求运行即可。\n\
    \n1.  `SQL> START sqlt_s89915_p3005811457_sqlprof.sql;` - 这是运行 SQL 脚本的方式。如注意事项中所说，你应该使用具有足够权限的账户，例如\
    \ `SYS`。\n2.  `SQL> EXEC DBMS_SQLTUNE.DROP_SQL_PROFILE('sqlt_s89915_p3005811457');`\
