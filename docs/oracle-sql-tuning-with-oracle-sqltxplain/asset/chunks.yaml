    \ 9-4 所示。\n\n![9781430248095_Fig09-04.jpg](img/9781430248095_Fig09-04.jpg)\n\n\
    图 9-4 . HTML ROXTRACT 报告顶部\n\n如你所见，roxtract 比强大的 `XTRACT` 报告功能要弱一些。它涵盖的部分数量减少了，但你仍然拥有执行计划、表信息和许多其他部分。\n\
