    \ last_name, hire_Date\n  2  from employees where hire_date in\n  3  (select hire_date\
    \ from employees where\n  4  department_id=30);\n\nFIRST_NAME           LAST_NAME\
    \                 HIRE_DATE\n-------------------- ------------------------- ---------\n\
