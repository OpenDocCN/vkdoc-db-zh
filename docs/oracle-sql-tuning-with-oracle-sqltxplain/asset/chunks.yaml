    \          24-DEC-05\nSigal                Tobias                    24-JUL-05\n\
    Guy                  Himuro                    15-NOV-06\nKaren              \
    \  Colmenares                10-AUG-07\n\n6 rows selected.\n\nSQL> connect / as\
    \ sysdba\nConnected.\nSQL> show parameter user_dump_Dest\n\nNAME             \
    \                    TYPE        VALUE\n------------------------------------ -----------\
    \ ------------------------------\nuser_dump_dest                       string\
    \      f:\\app\\stelios\\diag\\rdbms\\snc1\n                                 \
    \                \\snc1\\trace\n```\n\n跟踪文件位于 `user_dump_dest` 所指向的任何位置。如果我们编辑该跟踪文件，将看到图\
    \ 5-3 中所示的头部信息。\n\n![9781430248095_Fig05-03.jpg](img/9781430248095_Fig05-03.jpg)\n\
