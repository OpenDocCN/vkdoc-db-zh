    12/11/2012  08:47 PM             6,705 sqlt_s11992_driver.zip\n12/11/2012  08:46\
    \ PM             3,452 sqlt_s11992_lite.html\n12/11/2012  08:47 PM           \
    \ 12,646 sqlt_s11992_log.zip\n12/11/2012  08:46 PM           507,040 sqlt_s11992_main.html\n\
    12/11/2012  08:46 PM            11,979 sqlt_s11992_readme.html\n12/11/2012  08:46\
    \ PM             2,722 sqlt_s11992_sql_detail_active.html\n12/11/2012  08:46 PM\
    \           909,869 sqlt_s11992_tc.zip\n<<<Test Case File\n12/11/2012  08:46 PM\
    \            30,764 sqlt_s11992_tcx.zip\n<<<Test Case Express File\n12/11/2012\
    \  08:46 PM               404 sqlt_s11992_tc_script.sql\n12/11/2012  08:46 PM\
    \               297 sqlt_s11992_tc_sql.sql\n12/11/2012  08:47 PM         1,012,953\
    \ sqlt_s11992_trc.zip\n```\n\nI’ve highlighted two of the files from this directory\
    \ listing. The first one `sqlt_s11992_tc.zip` is the standard test case file.\
    \ We’ll deal with what you can do with this file in the next section. The second\
    \ file `sqlt_s11992_tcx.zip` is a recent innovation (as of December 2012) and\
    \ we’ll discuss that in the section on test case express.\n\nA Test Case Step\
    \ by Step\n\nThe first step in creating your test case is to create a sub-directory\
    \ of the main SQLT area. Then copy the `sqlt_s11992_tc.zip` file into this area\
    \ and unzip the file. A number of files are created and we’ll describe each of\
    \ them. Here is a sample listing.\n\n```\n12/11/2012  08:46 PM               132\
    \ 10053.sql\n12/11/2012  08:46 PM               103 flush.sql\n12/11/2012  08:46\
    \ PM               279 plan.sql\n12/11/2012  08:46 PM               404 q.sql\n\
    12/11/2012  08:46 PM                38 readme.txt\n12/11/2012  08:46 PM      \
    \         424 sel.sql\n12/11/2012  08:46 PM               378 sel_aux.sql\n12/11/2012\
    \  08:46 PM               448 setup.sql\n12/11/2012  08:46 PM               267\
    \ sqlt_s11992_del_hgrm.sql\n12/11/2012  08:46 PM         7,708,672 sqlt_s11992_exp.dmp\n\
    12/11/2012  08:46 PM               683 sqlt_s11992_import.sh\n12/11/2012  08:46\
    \ PM             5,077 sqlt_s11992_metadata.sql\n12/11/2012  08:46 PM        \
    \       244 sqlt_s11992_purge.sql\n12/11/2012  08:46 PM             9,720 sqlt_s11992_readme.txt\n\
    12/11/2012  08:46 PM               362 sqlt_s11992_restore.sql\n12/11/2012  08:46\
    \ PM            84,648 sqlt_s11992_set_cbo_env.sql\n12/11/2012  08:46 PM     \
    \        1,285 sqlt_s11992_system_stats.sql\n12/11/2012  08:46 PM           909,869\
    \ sqlt_s11992_tc.zip\n12/11/2012  08:46 PM               141 tc.sql\n12/11/2012\
    \  08:46 PM               965 tc_pkg.sql\n12/11/2012  08:46 PM               117\
    \ xpress.sh\n12/11/2012  08:46 PM             1,087 xpress.sql\n```\n\nThe files\
    \ in this directory are all that is needed (along with SQLT to create a test case\
    \ on your database). In the next section we’ll look at these files in detail.\n\
    \nThe Test Case Files\n\nThe scripts and other files in this directory are designed\
    \ to work together to produce a test case simply and quickly. I list below each\
    \ of the files and what they are for. Later we’ll see how these files work together\
    \ to produce a realistic test environment.\n\n*   `10053.sql` – Sets 10053 tracing\
    \ at level 1\n*   `flush.sql` – Flushes the shared pool\n*   `plan.sql` – Displays\
    \ the execution plan for the most recently executed SQL and spools the output\
    \ to `plan.log`. It uses the `dbms_xplan.display_cursor` procedure.\n*   `q.sql`\
    \ – The SQL being investigated.\n*   `readme.txt` – The instructions. They are\
    \ very brief: for example, “connect as sys and execute setup.sql.”\n*   `sel.sql`\
    \ – Computes predicate selectivity. This little script relies on `sel_aux.sql`(see\
    \ below) and prompts for a table name and predicate and then gives you the predicted\
    \ cardinality and selectivity. There is an example of the use of `sel.sql` below.\n\
    *   `sel_aux.sql` – Produces expected cardinality and selectivity with `sel.sql`,\
    \ based on different predicates.\n*   `setup.sql` – Sets up system statistics,\
    \ creates the test user and metadata, imports the object statistics and the optimizer\
    \ environment, executes the test query and displays the execution plan.\n*   `sqlt_snnnnn_del_hgrm.sql`\
    \ – Deletes histograms for the TC schema.\n*   `sqlt_snnnnn_exp.dmp` – Dump file\
    \ containing the statistics.\n*   `sqlt_snnnnn_import.sh` – Unix  version of the\
    \ import script for the SQLT objects.\n*   `sqlt_snnnnn_metadat.sql` – Script\
    \ called from `setup.sql`; creates the test case user and user objects.\n*   `sqlt_snnnnn_purge.sql`\
    \ – Removes the reference to the test case SQL from the SQLT repository.\n*  \
    \ `sqlt_snnnnn_readme.txt` – Documentation for the specific test case, containing\
    \ brief instructions on exporting and importing the SQLT repository, using SQLT\
    \ COMPARE, (covered in [chapter 10](../Text/9781430248095_Ch10.xhtml)), restoring\
    \ CBO statistics and implementing a test case in both express mode and custom\
    \ mode.\n*   `sqlt_snnnnn_restore.sql` – Imports the CBO statistics into the test\
    \ case.\n*   `sqlt_snnnnn_set_cbo_env.sql` – Sets the CBO environment for the\
    \ test case.\n*   `sqlt_snnnnn_system_stats.sql` – Sets the system statistics\
    \ on the test system.\n*   `tc.sql` – Runs the test sql and displays the execution\
    \ plan.\n*   `tc_pkg.sql` – Creates a `tc.zip` file for a small test case file.\n\
    *   `xpress.sh` – The unix version of the script that runs `xpress.sql`. Builds\
    \ the entire test case.\n*   `xpress.sql` – The SQL script that builds the entire\
    \ test case in express mode.\n\nAs you can see there are quite a few files in\
    \ the `TC` directory once you’ve unzipped it. Most of them are called from `xpress.sql`\
    \ and `setup.sql` so we will not go into great detail on each of them, but some\
    \ have some interesting stand-alone functions that we’ll look at after we’ve built\
    \ the test case.\n\nThe SQL Statement\n\nRemember that SQLT is about tuning one\
    \ SQL statement at a time. In our example case we will be using this SQL:\n\n\
    ```\nselect\n  country_name, sum(AMOUNT_SOLD)\nfrom sales s, customers c, countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\nThis example SQL totals the spending from each country in the European\
    \ Union. This is the result of running this query:\n\n```\nCOUNTRY_NAME      \
    \                       SUM(AMOUNT_SOLD)\n----------------------------------------\
    \ ----------------\nPoland                                            8447.14\n\
    Denmark                                        1977764.79\nSpain             \
    \                             2090863.44\nFrance                             \
    \            3776270.13\nItaly                                          4854505.28\n\
    United Kingdom                                 6393762.94\nGermany           \
    \                             9210129.22\n\n7 rows selected.\n```"
  trans: "\n# 创建 SQLT 测试用例\n\n要创建一个测试用例，只需运行一份 SQLT 报告，无需其他操作。单独运行 `SQLTXTRACT` 就会生成创建测试用例所需的全部信息。下面是一个示例目录，展示了主要的\
    \ SQLT 压缩包内的文件。\n\n```\n12/11/2012  08:47 PM             6,705 sqlt_s11992_driver.zip\n\
    12/11/2012  08:46 PM             3,452 sqlt_s11992_lite.html\n12/11/2012  08:47\
    \ PM            12,646 sqlt_s11992_log.zip\n12/11/2012  08:46 PM           507,040\
    \ sqlt_s11992_main.html\n12/11/2012  08:46 PM            11,979 sqlt_s11992_readme.html\n\
    12/11/2012  08:46 PM             2,722 sqlt_s11992_sql_detail_active.html\n12/11/2012\
    \  08:46 PM           909,869 sqlt_s11992_tc.zip\n<<<测试用例文件\n12/11/2012  08:46\
    \ PM            30,764 sqlt_s11992_tcx.zip\n<<<测试用例快速文件\n12/11/2012  08:46 PM\
    \               404 sqlt_s11992_tc_script.sql\n12/11/2012  08:46 PM          \
    \     297 sqlt_s11992_tc_sql.sql\n12/11/2012  08:47 PM         1,012,953 sqlt_s11992_trc.zip\n\
    ```\n\n我在上面的目录列表中高亮显示了两个文件。第一个文件 `sqlt_s11992_tc.zip` 是标准测试用例文件。我们将在下一节讨论如何使用此文件。第二个文件\
    \ `sqlt_s11992_tcx.zip` 是一个较新的创新（截至 2012 年 12 月），我们将在“测试用例快速模式”部分进行讨论。\n\n## 逐步创建测试用例\n\
    \n创建测试用例的第一步是在 SQLT 主目录下创建一个子目录。然后，将 `sqlt_s11992_tc.zip` 文件复制到该目录并解压。这将创建多个文件，我们将逐一描述。以下是一个示例列表。\n\
    \n```\n12/11/2012  08:46 PM               132 10053.sql\n12/11/2012  08:46 PM\
    \               103 flush.sql\n12/11/2012  08:46 PM               279 plan.sql\n\
    12/11/2012  08:46 PM               404 q.sql\n12/11/2012  08:46 PM           \
    \     38 readme.txt\n12/11/2012  08:46 PM               424 sel.sql\n12/11/2012\
    \  08:46 PM               378 sel_aux.sql\n12/11/2012  08:46 PM              \
    \ 448 setup.sql\n12/11/2012  08:46 PM               267 sqlt_s11992_del_hgrm.sql\n\
    12/11/2012  08:46 PM         7,708,672 sqlt_s11992_exp.dmp\n12/11/2012  08:46\
    \ PM               683 sqlt_s11992_import.sh\n12/11/2012  08:46 PM           \
    \  5,077 sqlt_s11992_metadata.sql\n12/11/2012  08:46 PM               244 sqlt_s11992_purge.sql\n\
    12/11/2012  08:46 PM             9,720 sqlt_s11992_readme.txt\n12/11/2012  08:46\
    \ PM               362 sqlt_s11992_restore.sql\n12/11/2012  08:46 PM         \
    \   84,648 sqlt_s11992_set_cbo_env.sql\n12/11/2012  08:46 PM             1,285\
    \ sqlt_s11992_system_stats.sql\n12/11/2012  08:46 PM           909,869 sqlt_s11992_tc.zip\n\
    12/11/2012  08:46 PM               141 tc.sql\n12/11/2012  08:46 PM          \
    \     965 tc_pkg.sql\n12/11/2012  08:46 PM               117 xpress.sh\n12/11/2012\
    \  08:46 PM             1,087 xpress.sql\n```\n\n此目录中的文件，连同 SQLT，已足以在您的数据库上创建一个测试用例。在下一节中，我们将详细查看这些文件。\n\
    \n## 测试用例文件说明\n\n该目录中的脚本和其他文件设计为协同工作，以简单快速地生成测试用例。我在下面列出了每个文件及其用途。稍后我们将看到这些文件如何协同工作以产生一个逼真的测试环境。\n\
    \n*   `10053.sql` – 设置级别为 1 的 10053 跟踪。\n*   `flush.sql` – 刷新共享池。\n*   `plan.sql`\
    \ – 显示最近执行的 SQL 的执行计划，并将输出假脱机到 `plan.log`。它使用 `dbms_xplan.display_cursor` 过程。\n\
    *   `q.sql` – 正在调查的 SQL 语句。\n*   `readme.txt` – 说明文档。内容非常简洁，例如：“以 sys 用户连接并执行\
    \ `setup.sql`。”\n*   `sel.sql` – 计算谓词选择性。这个小脚本依赖于 `sel_aux.sql`（见下文），提示输入表名和谓词，然后给出预测的基数（cardinality）和选择性。下面有一个使用\
    \ `sel.sql` 的示例。\n*   `sel_aux.sql` – 根据不同的谓词，与 `sel.sql` 一起产生预期的基数和选择性。\n*  \
    \ `setup.sql` – 设置系统统计信息，创建测试用户和元数据，导入对象统计信息和优化器环境，执行测试查询并显示执行计划。\n*   `sqlt_snnnnn_del_hgrm.sql`\
    \ – 删除测试用例（TC）模式的直方图。\n*   `sqlt_snnnnn_exp.dmp` – 包含统计信息的转储文件。\n*   `sqlt_snnnnn_import.sh`\
    \ – SQLT 对象导入脚本的 Unix 版本。\n*   `sqlt_snnnnn_metadat.sql` – 从 `setup.sql` 调用的脚本；创建测试用例用户和用户对象。\n\
    *   `sqlt_snnnnn_purge.sql` – 从 SQLT 存储库中移除对测试用例 SQL 的引用。\n*   `sqlt_snnnnn_readme.txt`\
    \ – 特定测试用例的文档，包含关于导出和导入 SQLT 存储库、使用 `SQLT COMPARE`（在第 10 章中介绍）、恢复 CBO 统计信息以及在快速模式和自定义模式下实现测试用例的简要说明。\n\
    *   `sqlt_snnnnn_restore.sql` – 将 CBO 统计信息导入到测试用例中。\n*   `sqlt_snnnnn_set_cbo_env.sql`\
    \ – 为测试用例设置 CBO 环境。\n*   `sqlt_snnnnn_system_stats.sql` – 在测试系统上设置系统统计信息。\n* \
    \  `tc.sql` – 运行测试 SQL 并显示执行计划。\n*   `tc_pkg.sql` – 为小测试用例文件创建 `tc.zip` 文件。\n\
    *   `xpress.sh` – 运行 `xpress.sql` 的脚本的 Unix 版本。构建整个测试用例。\n*   `xpress.sql` – 在快速模式下构建整个测试用例的\
    \ SQL 脚本。\n\n如您所见，一旦解压缩，`TC` 目录中就有相当多的文件。其中大部分是从 `xpress.sql` 和 `setup.sql` 中调用的，因此我们不会对每个文件都进行详细介绍，但有些文件有一些有趣的独立功能，我们将在构建测试用例后进行查看。\n\
    \n## SQL 语句示例\n\n请记住，SQLT 一次只针对一条 SQL 语句进行调优。在我们的示例案例中，我们将使用以下 SQL：\n\n```sql\n\
    select\n  country_name, sum(AMOUNT_SOLD)\nfrom sales s, customers c, countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\n这个示例 SQL 计算欧盟各国消费总额。以下是运行此查询的结果：\n\n```\nCOUNTRY_NAME                 \
    \            SUM(AMOUNT_SOLD)\n---------------------------------------- ----------------\n\
    Poland                                            8447.14\nDenmark           \
    \                             1977764.79\nSpain                              \
    \            2090863.44\nFrance                                         3776270.13\n\
    Italy                                          4854505.28\nUnited Kingdom    \
    \                             6393762.94\nGermany                            \
    \            9210129.22\n\n7 rows selected.\n```\n"
- fmt: '# How to Build a Test Case Fast (XPRESS.sql)


    What it does is not important for this example. We only need the SQL ID (`fp2wkm07dr0nd`)
    and a SQLT XTRACT report. The intention here is to build a test case in another
    schema and then adjust the environment so that we can test different theories
    in isolation. In the normal way (as discussed in [Chapter 1](../Text/9781430248095_Ch01.xhtml)
    and [Chapter 3](../Text/9781430248095_Ch03.xhtml)) we collect a SQLT XTRACT report
    and then place the zip file in a convenient place. In this case in the `/run`
    directory.


    First we create a directory to put the SQLTXTRACT report files in. In this directory
    I created a `TC` directory and put the test case zip file in the `TC` directory.
    Now that we have a test case directory and we’ve unzipped the test case files
    the quickest and simplest thing to do is to set up the test case user. Remember
    you need to be logged into SYS to do this operation. This is because some of the
    steps in `xpress.sql` will change the database environment. This environment cannot
    be shared with anyone else. So with all the warnings out of the way let’s proceed
    to create a test case.


    First we’ll run `xpress.sql`. This will pause in various sections to give you
    a chance to review the steps and to check for any errors. If there are none, then
    normally you would press return to go to the next section. The steps in the script
    are each highlighted by a heading such as this:


    ```

    1/7 Press ENTER to create TC user and schema objects for statement_id 64661.

    ```


    The following list provides a high-level view of the script’s steps. Next, we’ll
    look at each of the several steps in more detail:


    1.  Create the test case user, the user objects (including tables and indexes),
    the name of the user is of the form `TCnnnn`. In step 1 you are prompted for a
    suffix for the name of the test case user. You can just hit Return at this point,
    or enter a suffix such as `DEV`. At the end of this section you should check to
    see if there are any invalid objects. Valid objects are also listed.

    2.  The SQL repository is purged of any previous incarnation of the SQL statement.

    3.  The SQL statement is imported into the SQL repository and system environment
    is restored using the import utility. You will be prompted to enter the password
    for the `SQLTXPLAIN` user. This step is one of the reasons why you should not
    run `xpress` on a system you cannot afford to lose.

    4.  The test user schema object statistics are restored.

    5.  The system statistics are restored.

    6.  You are connected to the test schema and the CBO environment is set up.

    7.  The test schema environment is set up the SQL is executed and the execution
    plan displayed.


    Once you reach this stage, assuming there are no errors along the way, you are
    free to make changes to the test case environment (remember that this is a system
    that can be junked after this testing). You can change whatever you need to change
    to improve the performance of your test case, or sometimes you may want to change
    something about the test case to more fully understand what is happening and why
    the execution plan is the way it is. Next, we’ll look at each of the seven steps
    above in much more detail. We’ll see example output and explain what is happening.
    We’ll go through all the steps to set up a test case that you can work.


    ## Step 1: Create Test Case User and Schema Objects


    In step 1 you are asked to confirm that you want to create a test case user in
    my case `TC64661` and the schema objects.


    ```

    1/7 Press ENTER to create TC user and schema objects for statement_id 64661.

    ```


    If you press Enter you complete step 1. In this step the script `sqlt_snnnnn_metadata.sql`
    is run. You are prompted for a test case user suffix. A typical value might be
    “_1”, but you can press RETURN to accept the default, which is no suffix. This
    then creates the metadata objects, such as tables and indexes as well as any constraints,
    functions, packages, views or any other metadata. At the end of this step you
    are shown the status of these objects. They should all be valid. Here is the screen
    from my example.


    ```

    SQL>

    SQL> /**********************************************************************/

    SQL>

    SQL> REM PACKAGE

    SQL>

    SQL>

    SQL> /**********************************************************************/

    SQL> REM VIEW

    SQL>

    SQL>

    SQL> /**********************************************************************/

    SQL>

    SQL> REM FUNCTION, PROCEDURE, LIBRARY and PACKAGE BODY

    SQL>

    SQL>

    SQL> /**********************************************************************/

    SQL>

    SQL> REM OTHERS

    SQL>

    SQL>

    SQL>

    SQL> /**********************************************************************/

    SQL>

    SQL> SET ECHO OFF VER OFF PAGES 1000 LIN 80 LONG 8000000 LONGC 800000;


    PL/SQL procedure successfully completed.


    :VALID_OBJECTS

    --------------------------------------------------------------------------------

    VALID TABLE TC64661 COUNTRIES

    VALID TABLE TC64661 CUSTOMERS

    VALID TABLE TC64661 SALES

    VALID INDEX TC64661 COUNTRIES_PK

    VALID INDEX TC64661 CUSTOMERS_GENDER_BIX

    VALID INDEX TC64661 CUSTOMERS_MARITAL_BIX

    VALID INDEX TC64661 CUSTOMERS_PK

    VALID INDEX TC64661 CUSTOMERS_YOB_BIX

    VALID INDEX TC64661 SALES_CHANNEL_BIX

    VALID INDEX TC64661 SALES_CUST_BIX

    VALID INDEX TC64661 SALES_PROD_BIX

    VALID INDEX TC64661 SALES_PROMO_BIX

    VALID INDEX TC64661 SALES_TIME_BIX


    :INVALID_OBJECTS

    --------------------------------------------------------------------------------


    SQL> REM In case of INVALID OBJECTS: review log, fix errors and execute again.

    SQL> SPO OFF;

    SQL> SET ECHO OFF;


    2/7 Press ENTER to purge statement_id 64661 from SQLT repository.

    ```


    In my example all my metadata objects are valid, and I have no packages, views,
    functions, or procedures. Since there are no invalid objects, I press Return to
    proceed with step2.


    ## Step 2: Purge Previous SQL Statement from Repository


    In step 2 `sqlt_snnnnn_purge.sql` is run. This purges the SQLT repository of any
    data related to the SQL statement that is being analyzed. It is common to reload
    a test case when needed. The script output looks like this.


    ```

    SQL> @@sqlt_s64661_purge.sql

    SQL> REM Purges statement_id 64661 from local SQLT repository. Just execute "@sqlt_s64661_purge.sql"
    from sqlplu

    SQL> SPO sqlt_s64661_purge.log;

    SQL> SET SERVEROUT ON;

    SQL> EXEC sqltxplain.sqlt$a.purge_repository(64661, 64661);

    15:13:56 sqlt$a: purging repository

    15:13:57 sqlt$a: TRUNCATE TABLE SQLI$_DB_LINK

    15:13:57 sqlt$a: TRUNCATE TABLE SQLI$_FILE

    15:13:57 sqlt$a: TRUNCATE TABLE SQLI$_STATTAB_TEMP

    15:13:57 sqlt$a: TRUNCATE TABLE SQLI$_STGTAB_SQLPROF

    15:13:57 sqlt$a: TRUNCATE TABLE SQLI$_STGTAB_SQLSET

    15:13:57 sqlt$a: TRUNCATE TABLE SQLT$_AUX_STATS$

    15:13:57 sqlt$a: TRUNCATE TABLE SQLT$_DBA_AUDIT_POLICIES

    15:13:57 sqlt$a: TRUNCATE TABLE SQLT$_DBA_AUTOTASK_CLIENT

    15:13:57 sqlt$a: TRUNCATE TABLE SQLT$_DBA_COL_STATS_VERSIONS

    15:13:58 sqlt$a: TRUNCATE TABLE SQLT$_DBA_COL_USAGE$

    15:13:58 sqlt$a: TRUNCATE TABLE SQLT$_DBA_CONSTRAINTS

    15:13:58 sqlt$a: TRUNCATE TABLE SQLT$_DBA_DEPENDENCIES

    15:13:58 sqlt$a: TRUNCATE TABLE SQLT$_DBA_HISTGRM_STATS_VERSN

    15:13:58 sqlt$a: TRUNCATE TABLE SQLT$_DBA_HIST_ACTIVE_SESS_HIS

    At the end of this section you are prompted to proceed with step 3.

    15:14:03 sqlt$a: 128 tables were truncated

    15:14:03 sqlt$a: -> delete_sqltxplain_stats

    15:14:07 sqlt$a: <- delete_sqltxplain_stats


    PL/SQL procedure successfully completed.

    ```'
  raw: "What it does is not important for this example. We only need the SQL ID (`fp2wkm07dr0nd`)\
    \ and a SQLT XTRACT report. The intention here is to build a test case in another\
    \ schema and then adjust the environment so that we can test different theories\
    \ in isolation. In the normal way (as discussed in [Chapter 1](../Text/9781430248095_Ch01.xhtml)\
    \ and [Chapter 3](../Text/9781430248095_Ch03.xhtml)) we collect a SQLT XTRACT\
    \ report and then place the zip file in a convenient place. In this case in the\
    \ `/run` directory.\n\nHow to Build a Test Case Fast (XPRESS.sql)\n\nFirst we\
    \ create a directory to put the SQLTXTRACT report files in. In this directory\
    \ I created a `TC` directory and put the test case zip file in the `TC` directory.\
    \ Now that we have a test case directory and we’ve unzipped the test case files\
    \ the quickest and simplest thing to do is to set up the test case user. Remember\
    \ you need to be logged into SYS to do this operation. This is because some of\
    \ the steps in `xpress.sql` will change the database environment. This environment\
    \ cannot be shared with anyone else. So with all the warnings out of the way let’s\
    \ proceed to create a test case.\n\nFirst we’ll run `xpress.sql`. This will pause\
    \ in various sections to give you a chance to review the steps and to check for\
    \ any errors. If there are none, then normally you would press return to go to\
    \ the next section. The steps in the script are each highlighted by a heading\
    \ such as this:\n\n```\n1/7 Press ENTER to create TC user and schema objects for\
    \ statement_id 64661.\n```\n\nThe following list provides a high-level view of\
    \ the script’s steps. Next, we’ll look at each of the several steps in more detail:\n\
    \n1.  Create the test case user, the user objects (including tables and indexes),\
    \ the name of the user is of the form TCnnnn. In step 1 you are prompted for a\
    \ suffix for the name of the test case user. You can just hit Return at this point,\
    \ or enter a suffix such as DEV. At the end of this section you should check to\
    \ see if there are any invalid objects. Valid objects are also listed.\n2.  The\
    \ SQL repository is purged of any previous incarnation of the SQL statement.\n\
    3.  The SQL statement is imported into the SQL repository and system environment\
    \ is restored using the import utility. You will be prompted to enter the password\
    \ for the SQLTXPLAIN user. This step is one of the reasons why you should not\
    \ run xpress on a system you cannot afford to lose.\n4.  The test user schema\
    \ object statistics are restored.\n5.  The system statistics are restored.\n6.\
    \  You are connected to the test schema and the CBO environment is set up.\n7.\
    \  The test schema environment is set up the SQL is executed and the execution\
    \ plan displayed.\n\nOnce you reach this stage, assuming there are no errors along\
    \ the way, you are free to make changes to the test case environment (remember\
    \ that this is a system that can be junked after this testing). You can change\
    \ whatever you need to change to improve the performance of your test case, or\
    \ sometimes you may want to change something about the test case to more fully\
    \ understand what is happening and why the execution plan is the way it is. Next,\
    \ we’ll look at each of the seven steps above in much more detail. We’ll see example\
