    \ What Can You Do with a SQL Profile?\n\nNow that we have the `sqlt_s89915_p3005811457_sqlprof.sql`\
    \ script, what can we do with it? In broad terms, we can run this script on the\
    \ database where the SQL is executing and this will freeze the execution plan\
    \ for that SQL ID. It can also be used to freeze an execution plan on another\
    \ system. So for example if your development system has the right execution plan\
    \ and your production system does not, you can transfer the execution plan. In\
    \ a situation where the production database is in an unusable state because some\
    \ vital piece of SQL is using the wrong execution plan and consequently running\
    \ too slowly to fit into the execution window, this script alone is worth the\
    \ price of this book. Let’s look at the script.\n\n```\nSPO sqlt_s89915_p3005811457_sqlprof.log;\n\
