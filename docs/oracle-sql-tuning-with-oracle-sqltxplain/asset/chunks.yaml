    \n## Decoding Records and Keywords\n\n10046 跟踪的主要部分由记录关键字（位于行首）和记录内的关键字（详细关键字）组成，它们提供了有关正在发生的事情的详细信息。[表\
    \ 13-1](#9781430248095_Ch13.xhtml#Tab1) 提供了记录关键字的解码。\n\n### [表 13-1](#9781430248095_Ch13.xhtml#_Tab1).\
    \ The 10046 Record Keywords\n\n| 记录关键字 | 描述 |\n| --- | --- |\n| `APPNAME` | 应用程序名称设置\
    \ |\n| `PARSING IN CURSOR #n` | 当前正在解析的光标编号 |\n| `PARSE ERROR` | 如果存在解析错误则出现 |\n\
    | `ERROR` | 如果存在错误则出现 |\n| `END OF STMT` | SQL 语句结束已标记 |\n| `PARSE #n` | 正在被解析的光标编号\
    \ |\n| `BINDS #n` | 如果选择了绑定信息，则显示绑定信息 |\n| `EXEC #n` | 正在被执行的光标编号 |\n| `FETCH\
    \ #n` | 正在获取行的光标编号 |\n| `RPC` | 远程过程调用 |\n| `SORT UNMAP` | 关闭操作系统临时文件 |\n| `STAT\
    \ #n` | 光标编号的状态信息 |\n| `UNMAP` | 临时段关闭 |\n| `CLOSE #n` | 关闭光标，我们已完成此语句 |\n| `WAIT\
    \ #n` | 等待事件 |\n| `XCTEND` | 事务结束 |\n\n详细关键字出现在记录本身中，并位于记录关键字之后。下表涵盖了所使用的大多数关键字；但是，可能存在其他关键字。\n\
    \n| 详细关键字 | 描述 |\n| --- | --- |\n| `act` | 动作 |\n| `ad` | SQL 的地址 |\n| `c` | 使用的\
    \ CPU 秒数 |\n| `card` | 估计的基数 |\n| `cnt` | 行数 |\n| `cost` | 优化器成本 |\n| `cr` | 一致性读取次数\
    \ |\n| `cu` | 当前模式一致性读取 |\n| `dep` | 光标的深度。0 代表顶级语句。`dep=1` 和 `2` 表示涉及触发器，`dep=3`\
    \ 表示从触发器调用的触发器。 |\n| `dty` | 数据类型 |\n| `e` | 以微秒为单位的已用时间 |\n| `err` | 标准错误代码 |\n\
    | `flg` | 指示绑定状态的标志 |\n| `hv` | 哈希值 |\n| `len` | 表示 SQL 语句的字符串的字符计数 |\n| `lid`\
    \ | 特权用户 ID |\n| `mis` | 共享池未命中次数 |\n| `mod` | 模块名称 |\n| `mx1` | 绑定变量的最大长度 |\n\
    | `oct` | Oracle 命令类型（`2`=插入，`3`=选择，`6`=更新，`7`=删除，`26`=锁定表，`35`=修改数据库，`42`=修改会话，`44`=提交，`47`=匿名块，`45`=回滚）\
    \ |\n| `nam` | 等待的名称 |\n| `oacflg` | 绑定选项 |\n| `obj` | 对象 ID |\n| `og` | 优化器目标。`1`=`ALL_ROWS`,\
    \ `2`=`FIRST_ROWS`, `3`=`RULE`, `4`=`CHOOSE` |\n| `op` | 正在执行的操作。例如 `PARTITION\
    \ RANGE ALL`, `SORT AGGREGATE` 等。 |\n| `p` | 从磁盘读取的物理块 |\n| `p1`, `p2`, `p3` |\
    \ 给定等待的参数 |\n| `pr` | 物理读取 |\n| `pre` | 精度 |\n| `pid` | 行源的父 ID |\n| `pw` | 物理写入\
    \ |\n| `r` | 返回的行数 |\n| `rd_only` | 提交时数据库中未更改数据 |\n| `rlbk` | 回滚。`0`=`Commit`，`1`=`Rollback`\
    \ |\n| `size` | 估计大小（以字节为单位） |\n| `sqlid` | 单引号内的 SQL ID |\n| `tim` | 时间戳。以百万分之一秒为单位测量。\
    \ |\n| `time` | 以微秒为单位的已用时间 |\n| `uid` | 执行解析的模式的用户 ID |\n| `value` | 绑定变量的值 |\n\
    \n因此，例如，给定原始 10046 跟踪文件中的这一行：\n\n```\nPARSE #2:c=0,e=88,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111495\n\
    ```\n\n我们可以将其翻译为：\n\n“我们正在解析光标编号 2，它直接从应用程序发出，已用时间为 88 微秒，未进行任何物理读取，也未进行任何一致性读取或当前模式读取。光标未进行硬解析，未返回任何行，光标深度为顶级，优化器目标为\
    \ `ALL_ROWS`，计划哈希值为 `1123225294`，时间戳为 `843704111495`。”\n\n如您所见，这些密集的跟踪信息包含大量信息。许多工具已经围绕解释和管理这些信息而发展起来。但为什么我们需要这个跟踪文件呢？\n\
    \n## How Do We Collect 10046 Trace\n\n收集 10046 有不同的方法和不同的级别。如果您有直接执行 SQL 语句的权限，那么您可以使用以下命令收集\
    \ SQL 跟踪：\n\n```\nSQL> alter session set sql_trace=true\n```\n\n要关闭此功能：\n\n```\n\
    SQL> alter session set sql_trace=false\n```\n\n或者，如果您想调整跟踪级别（下面讨论）：\n\n```\nSQL>\
    \ alter session set events '10046 trace name context forever, level n'\n```\n\n\
    要关闭此功能：\n\n```\nSQL> alter session set events '10046 trace name context off'\n\
    ```\n\n您也可以使用 `oradebug` 命令为另一个会话（PID 为 `n`）启用跟踪。\n\n```\nSQL> oradebug setorapid\
    \ n\nSQL> oradebug event 10046 trace name contect forever, level m;\n```\n\n这将为\
    \ PID `n` 发布级别为 `m` 的 10046 跟踪。\n\n您甚至可以使用登录触发器（即会话登录到数据库时触发的触发器）来跟踪会话。在用户会话开始之前，会执行一些命令来为该会话启用跟踪。“触发”代码通常以类似以下内容开始：\n\
    \n```\nCreate or replace trigger Start_10046_trace after logon on database\n \
    \ begin\n  execute immediate 'alter session set timed_statistics=true';\n  execute\
    \ immediate 'alter session set events \"10046 trace name context forever, level\
    \ 4\" '\nend;\n```"
  raw: "```\n==============\nPARSING IN CURSOR – Gives you the cursor number\nselect\
    \  - This is statement being issued on your behalf\nEND OF STMT – The end of the\
    \ SQL statement is marked\nPARSE – Now we parse the statement\nEXEC – Now we execute\
    \ the statement\nFETCH – Now we fetch rows for the statement\nSTAT – Status information\n\
    WAIT – Wait for something\nXCTEND - Transaction ends\nCLOSE – Close the cursor\
    \ we are finished with this statement.\n==============\n```\n\nHere is what it\
    \ looks like in the raw form (I’ve truncated the lines on the right to makes it\
    \ less confusing).\n\n```\nCLOSE #2:c=0,e=19,dep=0,type=1,tim=839550052037\n=====================\n\
    PARSING IN CURSOR #2 len=29 dep=0 uid=0 oct=3 lid=0 tim=843704111499 hv=3864810328\n\
    select count(*) from sh.sales\nEND OF STMT\nPARSE #2:c=0,e=88,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111495\n\
    EXEC #2:c=0,e=134,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111781\n\
    WAIT #2: nam='SQL*Net message to client' ela= 10 driver id=1111838976 #bytes=1\
    \ p3=0\nFETCH #2:c=0,e=2502,p=0,cr=140,cu=0,mis=0,r=1,dep=0,og=1,plh=1123225294,tim=843704114422\n\
    STAT #2 id=1 cnt=1 pid=0 pos=1 obj=0 op='SORT AGGREGATE (cr=140 pr=0 pw=0 time=0\
    \ us)'\nSTAT #2 id=2 cnt=54 pid=1 pos=1 obj=0 op='PARTITION RANGE ALL PARTITION:\
    \ 1 28 (cr=140\nSTAT #2 id=3 cnt=54 pid=2 pos=1 obj=0 op='BITMAP CONVERSION COUNT\
    \ (cr=140 pr=0 pw=0 t\nSTAT #2 id=4 cnt=54 pid=3 pos=1 obj=74275 op='BITMAP INDEX\
    \ FAST FULL SCAN SALES_PROMO\nWAIT #2: nam='SQL*Net message from client' ela=\
    \ 301 driver id=1111838976 #bytes=1 p3=0\nFETCH #2:c=0,e=5,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=0,plh=1123225294,tim=843704115083\n\
    WAIT #2: nam='SQL*Net message to client' ela= 5 driver id=1111838976 #bytes=1\
    \ p3=0 ob\n\n*** 2013-02-03 13:51:07.597\nWAIT #2: nam='SQL*Net message from client'\
    \ ela= 2865946 driver id=1111838976 #bytes=1\nXCTEND rlbk=0, rd_only=1, tim=843706981465\n\
    CLOSE #2:c=0,e=31,dep=0,type=0,tim=843706981612\n```\n\nAlthough the raw 10046\
    \ trace can look intimidating, it has the huge advantage that it is logical in\
    \ its layout. This makes it relatively easy to decode with utilities. For example\
    \ TKPROF (which we’ll mention later) can read this raw file and produce an aggregated\
    \ file. The downside of such facilities is that the interpretation of the file\
    \ may leave out details you need or the decode can be wrong, causing you to see\
    \ the wrong information and possibly come to the wrong conclusion.\n\nDecoding\
    \ Records and Keywords\n\nThe main 10046 tracing section consists of record keywords\
    \ (at the beginning of a line) and keywords within the record (detail keywords),\
    \ which give detailed information about what is happening. [Table 13-1](#9781430248095_Ch13.xhtml#Tab1)\
    \ provides the decodes for the record keywords.\n\n[Table 13-1](#9781430248095_Ch13.xhtml#_Tab1).\
    \ The 10046 Record Keywords\n\n| Record Keyword | Description |\n| --- | --- |\n\
    | APPNAME | Application name setting |\n| PARSING IN CURSOR #n | The cursor number\
    \ which is currently being parsed |\n| PARSE ERROR | Seen if there is a parsing\
    \ error |\n| ERROR | Seen if there is an error |\n| END OF STMT | The end of the\
    \ SQL statement is marked |\n| PARSE #n | The cursor number being parsed |\n|\
    \ BINDS #n | Shows the binds information if selected |\n| EXEC #n | The cursor\
    \ number being executed |\n| FETCH #n | The cursor number for which we are fetching\
    \ rows |\n| RPC | Remote procedure call |\n| SORT UNMAP | Closing operating system\
    \ temporary files |\n| STAT #n | Status information for the cursor number |\n\
    | UNMAP | Closing of a temporary segment |\n| CLOSE #n | Close the cursor, we\
    \ are finished with this statement |\n| WAIT #n | A wait event |\n| XCTEND | Transaction\
    \ end |\n\nThe detail keywords occur within the record itself and are preceded\
    \ by record keywords. The table below covers the majority of the keywords used;\
    \ however, there may be others.\n\n| Detail Keyword | Description |\n| --- | ---\
    \ |\n| act | Action |\n| ad | Address of SQL |\n| c | The number of CPU seconds\
    \ used |\n| card | Estimated cardinality |\n| cnt | Number of rows |\n| cost |\
    \ Optimizer cost |\n| cr | The number of consistent reads |\n| cu | Current mode\
    \ consistent reads |\n| dep | The depth of the cursor. 0 represents a top level\
    \ statement. dep=1 and 2 indicate trigger involvement and dep=3 represents a trigger\
    \ called from a trigger. |\n| dty | Data Type |\n| e | Elapsed time in microseconds\
    \ |\n| err | Standard Error code |\n| flg | Flag indicating bind status |\n| hv\
    \ | Hash value |\n| len | The character count of the string representing the SQL\
    \ statement |\n| lid | Privilege user ID |\n| mis | Number of shared pool misses\
    \ |\n| mod | Module name |\n| mx1 | Maximum length of bind variables |\n| oct\
    \ | The Oracle command type (2=insert, 3=select, 6=update, 7=delete, 26=lock table,\
    \ 35=alter database, 42=alter session, 44=commit, 47=anonymous block, 45=rollback)\
    \ |\n| nam | Name of the wait |\n| oacflg | Bind options |\n| obj | Object ID\
    \ |\n| og | Optimizer goal. 1=ALL_ROWS, 2=FIRST_ROWS, 3=RULE, 4=CHOOSE |\n| op\
    \ | The operation being done. Examples are PARTITION RANGE ALL, SORT AGGREGATE\
    \ etc. |\n| p | Physical blocks read from disk |\n| p1, p2, p3 | Parameter for\
    \ a given wait |\n| pr | Physical reads |\n| pre | Precision |\n| pid | Parent\
    \ ID of the row source |\n| pw | Physical writes |\n| r | Number of rows returned\
    \ |\n| rd_only | No data changed in the database on commit |\n| rlbk | Rollback.\
    \ 0=Commit, 1=Rollback |\n| size | Estimated size in bytes |\n| sqlid | The SQL\
    \ ID inside single quotes |\n| tim | The time stamp. Measured in 1 millionths\
    \ of a second. |\n| time | Elapsed time in microseconds |\n| uid | The user Id\
    \ of the schema doing the parsing |\n| value | The value of a bind variable |\n\
    \nSo, for example, given this line in the raw 10046 trace file:\n\n```\nPARSE\
    \ #2:c=0,e=88,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111495\n\
    ```\n\nWe could translate this into:\n\n“We are parsing in cursor number2, which\
    \ was issued directly from the application, the elapsed time was 88 microseconds  and\
    \ no physical reads were done, nor any consistent reads or current mode reads.\
    \ The cursor was not hard parsed and no rows were returned, the depth of the cursor\
    \ was top level, and the optimizer goal was ALL_ROWS for the plan hash value 1123225294,\
    \ the time stamp was 843704111495.”\n\nAs you can see, this dense tracing information\
    \ has a lot of information in it. A number of tools have grown up around interpreting\
    \ this and managing the information. But why do we need this trace file in the\
    \ first place?\n\nHow Do We Collect 10046 Trace\n\nThere are different ways 10046\
    \ can be collected and at different levels. If you have the luxury of being able\
    \ to execute the SQL statement directly, then you can collect SQL trace with:\n\
    \n```\nSQL> alter session set sql_trace=true\n```\n\nTo turn this off\n\n```\n\
    SQL> alter session set sql_trace=false\n```\n\nOr if you want to adjust the level\
    \ of trace (discussed below):\n\n```\nSQL> alter session set events '10046 trace\
    \ name context forever, level n'\n```\n\nTo turn this off:\n\n```\nSQL> alter\
    \ session set events '10046 trace name context off'\n```\n\nYou can also enable\
    \ trace for another session (with pid n) with an oradebug command.\n\n```\nSQL>\
    \ oradebug setorapid n\nSQL> oradebug event 10046 trace name contect forever,\
    \ level m;\n```\n\nThis issues the trace for the pid n to 10046 trace level m.\n\
    \nYou can even trace a session with a log on trigger, that is a trigger, which\
    \ is fired when a session logs into the database. Before the user session begins\
    \ some commands are carried out which enable tracing for that session. The “triggering”\
    \ code usually begins with something like this:\n\n```\nCreate or replace trigger\
    \ Start_10046_trace after logon on database\n  begin\n  execute immediate 'alter\
    \ session set timed_statistics=true';\n  execute immediate 'alter session set\
    \ events \"10046 trace name context forever, level 4\" '\nend;\n```"
  trans: "\n# Oracle 10046 跟踪记录详解\n\n```\n==============\nPARSING IN CURSOR – 给出光标编号\n\
    select  - 这是代为发出的语句\nEND OF STMT – 标记 SQL 语句结束\nPARSE – 现在我们解析语句\nEXEC – 现在我们执行语句\n\
    FETCH – 现在我们为语句获取行\nSTAT – 状态信息\nWAIT – 等待某事\nXCTEND - 事务结束\nCLOSE – 关闭光标，我们已完成此语句。\n\
    ==============\n```\n\n以下是原始形式的外观（我截断了右侧的行以使其不那么混乱）。\n\n```\nCLOSE #2:c=0,e=19,dep=0,type=1,tim=839550052037\n\
    =====================\nPARSING IN CURSOR #2 len=29 dep=0 uid=0 oct=3 lid=0 tim=843704111499\
    \ hv=3864810328\nselect count(*) from sh.sales\nEND OF STMT\nPARSE #2:c=0,e=88,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111495\n\
    EXEC #2:c=0,e=134,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111781\n\
    WAIT #2: nam='SQL*Net message to client' ela= 10 driver id=1111838976 #bytes=1\
    \ p3=0\nFETCH #2:c=0,e=2502,p=0,cr=140,cu=0,mis=0,r=1,dep=0,og=1,plh=1123225294,tim=843704114422\n\
    STAT #2 id=1 cnt=1 pid=0 pos=1 obj=0 op='SORT AGGREGATE (cr=140 pr=0 pw=0 time=0\
    \ us)'\nSTAT #2 id=2 cnt=54 pid=1 pos=1 obj=0 op='PARTITION RANGE ALL PARTITION:\
    \ 1 28 (cr=140\nSTAT #2 id=3 cnt=54 pid=2 pos=1 obj=0 op='BITMAP CONVERSION COUNT\
    \ (cr=140 pr=0 pw=0 t\nSTAT #2 id=4 cnt=54 pid=3 pos=1 obj=74275 op='BITMAP INDEX\
    \ FAST FULL SCAN SALES_PROMO\nWAIT #2: nam='SQL*Net message from client' ela=\
    \ 301 driver id=1111838976 #bytes=1 p3=0\nFETCH #2:c=0,e=5,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=0,plh=1123225294,tim=843704115083\n\
    WAIT #2: nam='SQL*Net message to client' ela= 5 driver id=1111838976 #bytes=1\
    \ p3=0 ob\n\n*** 2013-02-03 13:51:07.597\nWAIT #2: nam='SQL*Net message from client'\
    \ ela= 2865946 driver id=1111838976 #bytes=1\nXCTEND rlbk=0, rd_only=1, tim=843706981465\n\
    CLOSE #2:c=0,e=31,dep=0,type=0,tim=843706981612\n```\n\n尽管原始的 10046 跟踪看起来令人生畏，但它具有布局符合逻辑的巨大优势。这使得用工具解码相对容易。例如，`TKPROF`（我们稍后会提到）可以读取这个原始文件并生成聚合文件。这类工具的缺点是，文件的解释可能会遗漏您需要的细节，或者解码可能出错，导致您看到错误的信息并可能得出错误的结论。\n\
    \n## 解码记录与关键字\n\n10046 跟踪的主要部分由记录关键字（位于行首）和记录内的关键字（详细关键字）组成，它们提供了有关正在发生的事情的详细信息。表\
    \ 13-1 提供了记录关键字的解码。\n\n### 表 13-1. 10046 记录关键字\n\n| 记录关键字 | 描述 |\n| --- | ---\
    \ |\n| `APPNAME` | 应用程序名称设置 |\n| `PARSING IN CURSOR #n` | 当前正在解析的光标编号 |\n| `PARSE\
    \ ERROR` | 如果存在解析错误则出现 |\n| `ERROR` | 如果存在错误则出现 |\n| `END OF STMT` | SQL 语句结束已标记\
    \ |\n| `PARSE #n` | 正在被解析的光标编号 |\n| `BINDS #n` | 如果选择了绑定信息，则显示绑定信息 |\n| `EXEC\
    \ #n` | 正在被执行的光标编号 |\n| `FETCH #n` | 正在获取行的光标编号 |\n| `RPC` | 远程过程调用 |\n| `SORT\
    \ UNMAP` | 关闭操作系统临时文件 |\n| `STAT #n` | 光标编号的状态信息 |\n| `UNMAP` | 临时段关闭 |\n| `CLOSE\
    \ #n` | 关闭光标，我们已完成此语句 |\n| `WAIT #n` | 等待事件 |\n| `XCTEND` | 事务结束 |\n\n详细关键字出现在记录本身中，并位于记录关键字之后。下表涵盖了所使用的大多数关键字；但是，可能存在其他关键字。\n\
    \n| 详细关键字 | 描述 |\n| --- | --- |\n| `act` | 动作 |\n| `ad` | SQL 的地址 |\n| `c` | 使用的\
    \ CPU 秒数 |\n| `card` | 估计的基数 |\n| `cnt` | 行数 |\n| `cost` | 优化器成本 |\n| `cr` | 一致性读取次数\
    \ |\n| `cu` | 当前模式一致性读取 |\n| `dep` | 光标的深度。0 代表顶级语句。`dep=1` 和 `2` 表示涉及触发器，`dep=3`\
    \ 表示从触发器调用的触发器。 |\n| `dty` | 数据类型 |\n| `e` | 以微秒为单位的已用时间 |\n| `err` | 标准错误代码 |\n\
    | `flg` | 指示绑定状态的标志 |\n| `hv` | 哈希值 |\n| `len` | 表示 SQL 语句的字符串的字符计数 |\n| `lid`\
    \ | 特权用户 ID |\n| `mis` | 共享池未命中次数 |\n| `mod` | 模块名称 |\n| `mx1` | 绑定变量的最大长度 |\n\
    | `oct` | Oracle 命令类型（`2`=插入，`3`=选择，`6`=更新，`7`=删除，`26`=锁定表，`35`=修改数据库，`42`=修改会话，`44`=提交，`47`=匿名块，`45`=回滚）\
    \ |\n| `nam` | 等待的名称 |\n| `oacflg` | 绑定选项 |\n| `obj` | 对象 ID |\n| `og` | 优化器目标。`1`=`ALL_ROWS`,\
    \ `2`=`FIRST_ROWS`, `3`=`RULE`, `4`=`CHOOSE` |\n| `op` | 正在执行的操作。例如 `PARTITION\
    \ RANGE ALL`, `SORT AGGREGATE` 等。 |\n| `p` | 从磁盘读取的物理块 |\n| `p1`, `p2`, `p3` |\
    \ 给定等待的参数 |\n| `pr` | 物理读取 |\n| `pre` | 精度 |\n| `pid` | 行源的父 ID |\n| `pw` | 物理写入\
    \ |\n| `r` | 返回的行数 |\n| `rd_only` | 提交时数据库中未更改数据 |\n| `rlbk` | 回滚。`0`=`Commit`，`1`=`Rollback`\
    \ |\n| `size` | 估计大小（以字节为单位） |\n| `sqlid` | 单引号内的 SQL ID |\n| `tim` | 时间戳。以百万分之一秒为单位测量。\
    \ |\n| `time` | 以微秒为单位的已用时间 |\n| `uid` | 执行解析的模式的用户 ID |\n| `value` | 绑定变量的值 |\n\
    \n因此，例如，给定原始 10046 跟踪文件中的这一行：\n\n```\nPARSE #2:c=0,e=88,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111495\n\
    ```\n\n我们可以将其翻译为：\n\n“我们正在解析光标编号 2，它直接从应用程序发出，已用时间为 88 微秒，未进行任何物理读取，也未进行任何一致性读取或当前模式读取。光标未进行硬解析，未返回任何行，光标深度为顶级，优化器目标为\
    \ `ALL_ROWS`，计划哈希值为 `1123225294`，时间戳为 `843704111495`。”\n\n如您所见，这些密集的跟踪信息包含大量信息。许多工具已经围绕解释和管理这些信息而发展起来。但为什么我们需要这个跟踪文件呢？\n\
    \n## 如何收集 10046 跟踪\n\n收集 10046 有不同的方法和不同的级别。如果您有直接执行 SQL 语句的权限，那么您可以使用以下命令收集 SQL\
    \ 跟踪：\n\n```\nSQL> alter session set sql_trace=true\n```\n\n要关闭此功能：\n\n```\nSQL>\
    \ alter session set sql_trace=false\n```\n\n或者，如果您想调整跟踪级别（下面讨论）：\n\n```\nSQL>\
    \ alter session set events '10046 trace name context forever, level n'\n```\n\n\
    要关闭此功能：\n\n```\nSQL> alter session set events '10046 trace name context off'\n\
    ```\n\n您也可以使用 `oradebug` 命令为另一个会话（PID 为 `n`）启用跟踪。\n\n```\nSQL> oradebug setorapid\
    \ n\nSQL> oradebug event 10046 trace name contect forever, level m;\n```\n\n这将为\
    \ PID `n` 发布级别为 `m` 的 10046 跟踪。\n\n您甚至可以使用登录触发器（即会话登录到数据库时触发的触发器）来跟踪会话。在用户会话开始之前，会执行一些命令来为该会话启用跟踪。“触发”代码通常以类似以下内容开始：\n\
    \n```\nCreate or replace trigger Start_10046_trace after logon on database\n \
    \ begin\n  execute immediate 'alter session set timed_statistics=true';\n  execute\
    \ immediate 'alter session set events \"10046 trace name context forever, level\
    \ 4\" '\nend;\n```\n"
- fmt: "The above trigger will trace every session that logs into the database, you\
    \ may want to restrict the collection of trace information by checking on the\
    \ user or some other user context to limit the amount of trace collected. You\
    \ may also want to identify each trace file and set the file size to unlimited.\
    \ In these cases you should add code such as this before the `10046` trace command:\n\
    \n```\nexecute immediate 'alter session set max_dump_file_size=unlimited';\n```\n\
    \nand/or\n\n```\nexecute immediate 'alter session set tracefile_identifier=\"\
    My_trace\"';\n```\n\n## Different Levels of Trace\n\nDifferent types of information\
    \ are collected for different investigations. Here are the levels and what they\
    \ do as of 11g. The default collects the least information, thus protecting you\
    \ from excessive size of trace files. With option `4` you also collect information\
    \ on bind variables.\n\n*   `01` – Default\n*   `04` – Standard plus binds\n \
    \   *   With this level of parsing we see a `BINDS` section\n\n    ```\n     \
    \   BINDS #1:\n         Bind#0\n          oacdty=02 mxl=22(22) mxlc=00 mal=00\
    \ scl=00 pre=00\n          oacflg=03 fl2=1000000 frm=00 csi=00 siz=24 off=0\n\
    \          kxsbbbfp=0e90cbb8  bln=22  avl=02  flg=05\n          value=100\n  \
    \      ```\n\n*   `8` – Standard plus waits\n    *   With this level of tracing\
    \ we see the waits indicating where we spend the time in the statement\n*   `12`\
    \ – Standard plus waits and binds\n    *   With this level we collect not only\
    \ the binds but also the waits\n*   `16` – Generate `STAT` line dumps for each\
    \ execution\n*   `32` – Never dump execution statistics\n*   `64` – Adaptive dump\
    \ of `STAT` lines (11.2.0.2+)\n\nA typical example of generating this trace would\
    \ be as follows:\n\n1.  Find the location of `USER_DUMP_DEST`\n2.  Set the file\
    \ size to `unlimited` if possible\n3.  Set the `statistics_level` to `all`\n4.\
    \  Select the tracing level based on the values above\n\nHere is an example set\
    \ of steps, beginning with setting the identifier for the trace file name, which\
    \ will allow you to easily find the trace file.\n\n1.  Set the identifier:\n\n\
    \    ```\n        SQL> alter session set tracefile_identifier='10046_STELIOS';\n\
    \        Session altered.\n        ```\n\n2.  Now I want to make sure I don’t\
    \ lose information if the trace file is too long, so I set the size to `unlimited`.\n\
    \n    ```\n        SQL> alter session set max_dump_file_size=unlimited;\n    \
    \    Session altered.\n        ```\n\n3.  Set the `statistics_level` parameter\
    \ to `all` to collect as much information as possible.\n\n    ```\n        SQL>\
    \ alter session set statistics_level=all;\n        Session altered.\n        ```\n\
    \n4.  Now set the `10046` trace event to collect tracing information at `level\
    \ 12` (which includes binds and waits).\n\n    ```\n        SQL> alter session\
    \ set events '10046 trace name context forever, level 12';\n        Session altered.\n\
    \        ```\n\n5.  Now I execute my SQL\n\n    ```\n        SQL> @q3\n\n    COUNTRY_NAME\
    \                             SUM(AMOUNT_SOLD)\n        ----------------------------------------\
    \ ----------------\n        Poland                                           \
    \ 8447.14\n        Denmark                                        1977764.79\n\
    \        Spain                                          2090863.44\n        France\
    \                                         3776270.13\n        Italy          \
    \                                4854505.28\n        United Kingdom          \
    \                       6393762.94\n        Germany                          \
    \              9210129.22\n\n    7 rows selected.\n        ```\n\n6.  Then turn\
    \ off the tracing\n\n    ```\n        SQL> alter session set events '10046 trace\
    \ name context off';\n        ```\n\nThis is the SQL that ran:\n\n```\nselect\n\
    \  country_name, sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\n![image](Images/sq.jpg) **Note**  If you want to follow along with these\
    \ examples and collect your own trace files and view them yourself you can easily\
    \ do so by using all the code in these examples. All of the data and examples\
    \ used rely on the standard example schemas shipped with every database installation.\
    \ If you do not have the schemas `SH` and `HR` you can either select to install\
    \ the example schemas at installation time or manually add them afterward with\
    \ the instructions here `http://docs.oracle.com/cd/E14072_01/server.112/e10831/installation.htm#sthref33`.\n\
    \n7.  Finally I want to find the file so I look at the value of `user_dump_dest`\n\
    \n    ```\n        SQL> show parameter user_dump_dest\n\n    NAME            \
    \                     TYPE        VALUE\n        ------------------------------------\
    \ ----------- ------------------------------\n        user_dump_dest         \
    \              string      f:\\app\\stelios\\diag\\rdbms\\snc1\n             \
    \                                            \\snc1\\trace\n        ```\n\nThis\
    \ is all very well if you want to look at raw `10046` trace files, but what if\
    \ you wanted to interpret what was going on more quickly? First we’ll look at\
    \ one of the oldest utilities around for processing `10046` trace, `TKPROF`, which\
    \ is still used today to get a good overview of what has been happening. `TKPROF`\
    \ is not part of `SQLT`; but as it is commonly used, we’ll give it a brief mention.\n\
    \n### TKPROF\n\nNo doubt some people can read `10046` trace files in the raw (and\
    \ it wouldn’t be too difficult to do once you gather the translation of the short\
    \ codes), but this is a pretty inefficient way of going about things. It would\
    \ be like listing the position, velocity, and direction of every atom in a football,\
    \ when in fact you could aggregate the information to describe the ball’s trajectory\
    \ with just a few parameters. `TKPROF` aggregates information and presents a summary\
    \ of the high-level view of what’s going on. `TKPROF` is not part of `SQLT` and\
    \ has been in existence since early versions of Oracle.\n\n`TKPROF` is best explained\
    \ through the use of an example: we’ll take a trace file produced as described\
    \ above and generate the `TKPROF` output. To use `TKPROF` just run the `TKPROF`\
    \ command with the input of the trace file.\n\n```\n>tkprof trca_e68572_10046.trc\
    \ output = trca_e68572_10046.txt\nTKPROF: Release 11.2.0.1.0 - Development on\
    \ Wed Dec 26 11:08:49 2012\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.\
    \  All rights reserved.\n```\n\nIf we look at the `TKPROF` output file and find\
    \ our SQL, we then see this kind of information:\n\n```\n*******************************************************************************\n\
    select\n  country_name, sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD)\n\n\
    call     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.09       0.09          0          0          0         \
    \  0\nExecute      1      0.00       0.00          0          0          0   \
    \        0\nFetch        2     12.20      12.24          0       3180        \
    \  0           7\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\ntotal        4     12.29      12.34          0       3180     \
    \     0           7\n\nMisses in library cache during parse: 1\nOptimizer mode:\
    \ ALL_ROWS\nParsing user id: SYS\n```"
  raw: "The above trigger will trace every session that logs into the database, you\
    \ may want to restrict the collection of trace information by checking on the\
    \ user or some other user context to limit the amount of trace collected. You\
    \ may also want to identify each trace file and set the file size to unlimited.\
    \ In these cases you should add code such as this before the 10046 trace command:\n\
    \n```\nexecute immediate 'alter session set max_dump_file_size=unlimited';\n```\n\
    \nand/or\n\n```\nexecute immediate 'alter session set tracefile_identifier=\"\
    My_trace\"';\n```\n\nDifferent Levels of Trace\n\nDifferent types of information\
    \ are collected for different investigations. Here are the levels and what they\
    \ do as of 11g. The default collects the least information, thus protecting you\
    \ from excessive size of trace files. With option 4 you also collect information\
    \ on bind variables\n\n*   01 – Default\n*   04 – Standard plus binds\n*   With\
    \ this level of parsing we see a BINDS section\n\n```\n    BINDS #1:\n     Bind#0\n\
    \      oacdty=02 mxl=22(22) mxlc=00 mal=00 scl=00 pre=00\n      oacflg=03 fl2=1000000\
    \ frm=00 csi=00 siz=24 off=0\n      kxsbbbfp=0e90cbb8  bln=22  avl=02  flg=05\n\
    \      value=100\n    ```\n\n*   8 – Standard plus waits\n*   With this level\
    \ of tracing we see the waits indicating where we spend the time in the statement\n\
    *   12 – Standard plus waits and binds\n*   With this level we collect not only\
    \ the binds but also the waits\n*   16 – Generate STAT line dumps for each execution\n\
    *   32 – Never dump execution statistics\n*   64 – Adaptive dump of STAT lines\
    \ (11.2.0.2+)\n\nA typical example of generating this trace would be as follows:\n\
    \n1.  Find the location of `USER_DUMP_DEST`\n2.  Set the file size to unlimited\
    \ if possible\n3.  Set the statistics level to all\n4.  Select the tracing level\
    \ based on the values above\n\nHere is an example set of steps, beginning with\
    \ setting the identifier for the trace file name, which will allow you to easily\
    \ find the trace file.\n\n1.  Set the identifier:\n\n```\n    SQL> alter session\
    \ set tracefile_identifier='10046_STELIOS';\n    Session altered.\n    ```\n\n\
    2.  Now I want to make sure I don’t lose information if the trace file is too\
    \ long, so I set the size to `unlimited`.\n\n```\n    SQL> alter session set max_dump_file_size=unlimited;\n\
    \    Session altered.\n    ```\n\n3.  Set the `statistics_level` parameter to\
    \ `all` to collect as much information as possible.\n\n```\n    SQL> alter session\
    \ set statistics_level=all;\n    Session altered.\n    ```\n\n4.  Now set the\
    \ 10046 trace event to collect tracing information at `level 12` (which includes\
    \ binds and waits).\n\n```\n    SQL> alter session set events '10046 trace name\
    \ context forever, level 12';\n    Session altered.\n    ```\n\n5.  Now I execute\
    \ my SQL\n\n```\n    SQL> @q3\n\nCOUNTRY_NAME                             SUM(AMOUNT_SOLD)\n\
    \    ---------------------------------------- ----------------\n    Poland   \
    \                                         8447.14\n    Denmark               \
    \                         1977764.79\n    Spain                              \
    \            2090863.44\n    France                                         3776270.13\n\
    \    Italy                                          4854505.28\n    United Kingdom\
    \                                 6393762.94\n    Germany                    \
    \                    9210129.22\n\n7 rows selected.\n    ```\n\n6.  Then turn\
    \ off the tracing\n\n```\n    SQL> alter session set events '10046 trace name\
    \ context off';\n    ```\n\nThis is the SQL that ran:\n\n```\n    select\n   \
    \   country_name, sum(AMOUNT_SOLD)\n    from sh.sales s, sh.customers c, sh.countries\
    \ co\n    where\n      s.cust_id=c.cust_id\n      and co.country_id=c.country_id\n\
    \      and country_name in (\n        'Ireland','Denmark','Poland','United Kingdom',\n\
    \         'Germany','France','Spain','The Netherlands','Italy')\n      group by\
    \ country_name order by sum(AMOUNT_SOLD);\n    ```\n\n![image](Images/sq.jpg) **Note**  If\
    \ you want to follow along with these examples and collect your own trace files\
    \ and view them yourself you can easily do so by using all the code in these examples.\
    \ All of the data and examples used rely on the standard example schemas shipped\
    \ with every database installation. If you do not have the schemas SH and HR you\
    \ can either select to install the example schemas at installation time or manually\
    \ add them afterward with the instructions here `http://docs.oracle.com/cd/E14072_01/server.112/e10831/installation.htm#sthref33`.\n\
    \n7.  Finally I want to find the file so I look at the value of `user_dump_dest`\n\
    \n```\n    SQL> show parameter user_dump_dest\n\nNAME                        \
    \         TYPE        VALUE\n    ------------------------------------ -----------\
    \ ------------------------------\n    user_dump_dest                       string\
    \      f:\\app\\stelios\\diag\\rdbms\\snc1\n                                 \
    \                    \\snc1\\trace\n    ```\n\nThis is all very well if you want\
    \ to look at raw 10046 trace files, but what if you wanted to interpret what was\
    \ going on more quickly? First we’ll look at one of the oldest utilities around\
    \ for procesing 10046 trace, TKPROF, which is still used today to get a good overview\
    \ of what has been happening. TKPROF is not part of SQLT; but as it is commonly\
    \ used, we’ll give it a brief mention.\n\nTKPROF\n\nNo doubt some people can read\
    \ 10046 trace files in the raw (and it wouldn’t be too difficult to do once you\
    \ gather the translation of the short codes), but this is a pretty inefficient\
    \ way of going about things. It would be like listing the position, velocity,\
    \ and direction of every atom in a football, when in fact you could aggregate\
    \ the information to describe the ball’s trajectory with just a few parameters.\
    \ TKPROF aggregates information and presents a summary of the high-level view\
    \ of what’s going on. TKPROF is not part of SQLT and has been in existence since\
    \ early versions of Oracle.  TKPROF is best explained through the use of an example:\
    \ we’ll take a trace file produced as desribed above and generate the TKPROF output.\
    \ To use TKPROF just run the  TKPROF command with the input of the trace file\n\
    \n.\n\n```\n>tkprof trca_e68572_10046.trc output = trca_e68572_10046.txt\nTKPROF:\
    \ Release 11.2.0.1.0 - Development on Wed Dec 26 11:08:49 2012\nCopyright (c)\
    \ 1982, 2009, Oracle and/or its affiliates.  All rights reserved.\n```\n\nIf we\
    \ look at the TKPROF output file and find our SQL, we then see this kind of information:\n\
    \n```\n*******************************************************************************\n\
    select\n  country_name, sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD)\n\n\
    call     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.09       0.09          0          0          0         \
    \  0\nExecute      1      0.00       0.00          0          0          0   \
    \        0\nFetch        2     12.20      12.24          0       3180        \
    \  0           7\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\ntotal        4     12.29      12.34          0       3180     \
    \     0           7\n\nMisses in library cache during parse: 1\nOptimizer mode:\
    \ ALL_ROWS\nParsing user id: SYS"
  trans: "\n上述触发器将追踪每一个登录数据库的会话。您可能希望通过检查用户或其他用户上下文来限制收集的追踪信息量，从而控制追踪文件的大小。您还可能希望为每个追踪文件进行标识，并将文件大小设置为无限制。在这些情况下，您应该在\
    \ `10046` 追踪命令之前添加如下代码：\n\n```\nexecute immediate 'alter session set max_dump_file_size=unlimited';\n\
    ```\n\n和/或\n\n```\nexecute immediate 'alter session set tracefile_identifier=\"\
    My_trace\"';\n```\n\n## 不同级别的追踪\n\n不同类型的调查会收集不同的信息。以下是截至 11g 版本的各级别及其作用。默认级别收集的信息最少，从而保护您免受追踪文件过大的困扰。使用选项\
    \ `4` 时，您还会收集关于绑定变量的信息。\n\n*   `01` – 默认\n*   `04` – 标准 + 绑定\n    *   在此解析级别，我们会看到一个\
    \ `BINDS` 部分\n\n    ```\n        BINDS #1:\n         Bind#0\n          oacdty=02\
    \ mxl=22(22) mxlc=00 mal=00 scl=00 pre=00\n          oacflg=03 fl2=1000000 frm=00\
    \ csi=00 siz=24 off=0\n          kxsbbbfp=0e90cbb8  bln=22  avl=02  flg=05\n \
    \         value=100\n        ```\n\n*   `8` – 标准 + 等待\n    *   在此追踪级别，我们会看到等待事件，指示我们在语句执行中时间花费在何处。\n\
    *   `12` – 标准 + 等待和绑定\n    *   在此级别，我们不仅收集绑定信息，还收集等待事件。\n*   `16` – 为每次执行生成 `STAT`\
    \ 行转储\n*   `32` – 从不转储执行统计信息\n*   `64` – 自适应转储 `STAT` 行 (11.2.0.2+)\n\n生成此追踪的一个典型示例如下：\n\
    \n1.  找到 `USER_DUMP_DEST` 的位置\n2.  如果可能，将文件大小设置为 `unlimited`\n3.  将 `statistics_level`\
    \ 设置为 `all`\n4.  根据上述值选择追踪级别\n\n以下是一组示例步骤，首先为追踪文件名设置标识符，这将使您能轻松找到追踪文件。\n\n1. \
    \ 设置标识符：\n\n    ```\n        SQL> alter session set tracefile_identifier='10046_STELIOS';\n\
    \        会话已更改。\n        ```\n\n2.  现在我想确保如果追踪文件太长也不会丢失信息，因此我将其大小设置为 `unlimited`。\n\
    \n    ```\n        SQL> alter session set max_dump_file_size=unlimited;\n    \
    \    会话已更改。\n        ```\n\n3.  将 `statistics_level` 参数设置为 `all` 以收集尽可能多的信息。\n\
    \n    ```\n        SQL> alter session set statistics_level=all;\n        会话已更改。\n\
    \        ```\n\n4.  现在设置 `10046` 追踪事件以 `级别 12`（包括绑定和等待）收集追踪信息。\n\n    ```\n  \
    \      SQL> alter session set events '10046 trace name context forever, level\
    \ 12';\n        会话已更改。\n        ```\n\n5.  现在执行我的 SQL\n\n    ```\n        SQL>\
    \ @q3\n\n    COUNTRY_NAME                             SUM(AMOUNT_SOLD)\n     \
    \   ---------------------------------------- ----------------\n        Poland\
    \                                            8447.14\n        Denmark        \
    \                                1977764.79\n        Spain                   \
    \                       2090863.44\n        France                           \
    \              3776270.13\n        Italy                                     \
    \     4854505.28\n        United Kingdom                                 6393762.94\n\
    \        Germany                                        9210129.22\n\n    已选择\
    \ 7 行。\n        ```\n\n6.  然后关闭追踪\n\n    ```\n        SQL> alter session set events\
    \ '10046 trace name context off';\n        ```\n\n这是运行的 SQL：\n\n```\nselect\n\
    \  country_name, sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\n![image](img/sq.jpg) **注意** 如果您想跟随这些示例操作，收集您自己的追踪文件并亲自查看，您可以轻松地使用这些示例中的所有代码来完成。所有使用的数据和示例都依赖于每个数据库安装时附带的标准示例方案。如果您没有\
    \ `SH` 和 `HR` 方案，您可以在安装时选择安装示例方案，或之后按照此处 `http://docs.oracle.com/cd/E14072_01/server.112/e10831/installation.htm#sthref33`\
    \ 的说明手动添加它们。\n\n7.  最后我想找到该文件，因此我查看 `user_dump_dest` 的值\n\n    ```\n        SQL>\
    \ show parameter user_dump_dest\n\n    NAME                                 TYPE\
    \        VALUE\n        ------------------------------------ ----------- ------------------------------\n\
    \        user_dump_dest                       string      f:\\app\\stelios\\diag\\\
    rdbms\\snc1\n                                                         \\snc1\\\
    trace\n        ```\n\n如果您想查看原始的 `10046` 追踪文件，这一切都很好，但如果您想更快地解释发生了什么该怎么办呢？首先，我们将看看处理\
    \ `10046` 追踪的最古老工具之一，`TKPROF`，它至今仍被用于获取正在发生事件的概览。`TKPROF` 不是 `SQLT` 的一部分；但由于它很常用，我们将简要提及。\n\
    \n### TKPROF\n\n毫无疑问，有些人可以阅读原始的 `10046` 追踪文件（一旦您收集了短代码的翻译，这并不难），但这是一个相当低效的方法。这就像列出一个足球中每个原子的位置、速度和方向，而实际上您可以聚合信息，仅用几个参数来描述球的轨迹。`TKPROF`\
    \ 聚合信息并呈现高层次概览的摘要。`TKPROF` 不是 `SQLT` 的一部分，并且自 Oracle 早期版本就已存在。\n\n`TKPROF` 最好通过一个例子来解释：我们将以上述方式生成的追踪文件为例，生成\
    \ `TKPROF` 输出。要使用 `TKPROF`，只需运行 `TKPROF` 命令并输入追踪文件。\n\n```\n>tkprof trca_e68572_10046.trc\
    \ output = trca_e68572_10046.txt\nTKPROF: Release 11.2.0.1.0 - Development on\
    \ Wed Dec 26 11:08:49 2012\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.\
    \  All rights reserved.\n```\n\n如果我们查看 `TKPROF` 输出文件并找到我们的 SQL，我们会看到这类信息：\n\n\
    ```\n*******************************************************************************/\n\
    select\n  country_name, sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries\
    \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
    \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD)\n\n\
    call     count       cpu    elapsed       disk      query    current        rows\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    Parse        1      0.09       0.09          0          0          0         \
    \  0\nExecute      1      0.00       0.00          0          0          0   \
    \        0\nFetch        2     12.20      12.24          0       3180        \
    \  0           7\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\ntotal        4     12.29      12.34          0       3180     \
    \     0           7\n\n解析期间库缓存未命中：1\n优化器模式：ALL_ROWS\n解析用户 ID：SYS\n```\n"
- fmt: "# SQL 执行计划与 TRCASPLIT 工具\n\n## 执行计划输出\n\n```\nRows     Row Source Operation\n\
    -------  ---------------------------------------------------\n 7       SORT ORDER\
    \ BY (cr=3180 pr=0 pw=0 time=15 us cost=947 size=315 card=9)\n 7       HASH GROUP\
    \ BY (cr=3180 pr=0 pw=0 time=21 us cost=947 size=315 card=9)\n250069   HASH JOIN\
    \  (cr=3180 pr=0 pw=0 time=11059983 us cost=909 size=15233435 card=435241)\n30473\
    \    HASH JOIN  (cr=1462 pr=0 pw=0 time=453228 us cost=409 size=657225 card=26289)\n\
    \ 9       TABLE ACCESS FULL COUNTRIES (cr=3 pr=0 pw=0 time=20 us cost=3 size=135\
    \ card=9)\n55500    TABLE ACCESS FULL CUSTOMERS (cr=1459 pr=0 pw=0 time=112536\
    \ us cost=406 size=555000 card=55500)\n918843   PARTITION RANGE ALL PARTITION:\
    \ 1 28 (cr=1718 pr=0 pw=0 time=5428724 us cost=494 size=9188430 card=918843)\n\
    918843   TABLE ACCESS FULL SALES PARTITION: 1 28 (cr=1718 pr=0 pw=0 time=1892572\
    \ us cost=494 size=9188430 card=918843)\n\nElapsed times include waiting on following\
    \ events:\n  Event waited on                             Times   Max. Wait  Total\
    \ Waited\n  ----------------------------------------   Waited  ----------  ------------\n\
    \  SQL*Net message to client                       2        0.00          0.00\n\
    \  asynch descriptor resize                        3        0.00          0.00\n\
    \  SQL*Net message from client                     2      574.61        574.61\n\
    ```\n\n## TKPROF 与 TRCASPLIT 工具介绍\n\n在 SQL 的 `TKPROF` 输出中，我们能看到 SQL 语句、一个描述“解析”、“执行”和“获取”执行时间的摘要部分，以及执行计划和等待时间的简要描述。将此类信息与\
    \ 10046 跟踪文件解读的相关章节进行比较。您认为哪种更快？我知道我更喜欢看哪种。这种信息聚合方式使得解读正在发生的事情变得更加简单和快速。现在我们已经简要提到了\
    \ 10046 跟踪（并且我们在[第 5 章](../Text/9781430248095_Ch05.xhtml) 中提到了 10053 跟踪），让我们来看看\
    \ `TRCASPLIT` 能为我们做什么。\n\n### TRCASPLIT 功能与使用\n\n`TRCASPLIT` 是 `SQLT` 中可用的第一个跟踪实用程序，它简单地将\
    \ 10046 跟踪与其他跟踪分开。虽然理论上这可能是一个简单的任务，但手动操作会非常困难且容易出错。`TRCASPLIT` 可以立即完成这项工作，并将结果呈现在一个\
    \ zip 文件中。首先让我展示我们将要收集的内容，然后我们将进行收集，最后使用 `TRCASPLIT` 进行拆分。\n\n在本例中，我们将同时收集 10046\
    \ 和 10053 跟踪文件信息。换句话说，我们将同时打开用于运行 SQL 和解析 SQL 的调试信息。和之前一样，我们还将通过设置转储文件大小为 `unlimited`\
    \ 来确保转储文件不被截断，并将统计信息收集级别设置为所有可能的最高级别。\n\n```\nSQL> alter session set tracefile_identifier='10046_10053';\n\
    Session altered.\nSQL> alter session set max_dump_file_size=unlimited;\nSession\
    \ altered.\nSQL> alter session set statistics_level=all;\nSession altered.\nSQL>\
    \ alter session set events '10046 trace name context forever, level 12';\nSession\
    \ altered.\nSQL> alter session set events '10053 trace name context forever, level\
    \ 1';\nSession altered.\nSQL> alter system flush shared_pool;\nSystem altered.\n\
    SQL> @q3\n```\n\n我相信我们不需要再次查看此查询的结果。我们需要查看的是创建的跟踪文件。在跟踪文件中，我们可以看到明显是 10046 类型的行，例如：\n\
    \n```\nSTAT #1 id=6 cnt=55500 pid=4 pos=2 obj=74151 op='TABLE ACCESS FULL CUSTOMERS\
