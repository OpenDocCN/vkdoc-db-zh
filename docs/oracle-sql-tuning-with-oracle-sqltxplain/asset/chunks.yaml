    让我们总结一下发生了什么。我们创建了一个测试表，用偏斜数据填充它，选择了一个常用值、一个中等常用值、一个常用值，最后多次选择了一个罕见值。我们预期罕见值会使用索引范围扫描，而常用值会使用全表扫描或快速全索引扫描。如果我们生成一份`SQLT
    XTRACT`报告（一份`SQLTXECUTE`报告同样适用），我们现在就可以检查发生了什么。


    ## 使用 SQLTXTRACT 报告检查 ACS


    `SQLTXTRACT`和`SQLTXECUTE`报告都会收集 ACS 信息。这两种`SQLTXPLAIN`报告都会收集绑定变量信息（如果有的话），并在清晰的报告中向你展示这些信息。我们的示例报告恰好是`SQLTXTRACT`报告，但导航和示例对两种`SQLTXPLAIN`报告都适用。首先，我们可以检查是否选择了正确的
    SQL：参见图 7-2，它显示了带有一个绑定变量的 SQL，符合预期。


    ![9781430248095_Fig07-02.jpg](img/9781430248095_Fig07-02.jpg)


    图 7-2 .  显示带有绑定变量的 SQL


    如果我们从主`SQLTXTRACT`报告顶部的超链接导航到观察部分，可以看到有一个观察结果：该 SQL 语句存在多个执行计划。参见图 7-3，它显示了这一点：


    ![9781430248095_Fig07-03.jpg](img/9781430248095_Fig07-03.jpg)

