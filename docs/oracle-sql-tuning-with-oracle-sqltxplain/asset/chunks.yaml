    10/30/2012  01:00 PM            15,498 sqlt_s96365_readme.html\n10/30/2012  01:00\
    \ PM               222 sqlt_s96365_remote_driver.sql\n10/30/2012  01:00 PM   \
    \        217,088 sqlt_s96365_tc.zip\n10/30/2012  01:00 PM               193 sqlt_s96365_tcb_driver.sql\n\
    10/30/2012  01:00 PM               172 sqlt_s96365_tc_script.sql\n10/30/2012 \
    \ 01:00 PM                65 sqlt_s96365_tc_sql.sql\n10/30/2012  01:00 PM    \
    \     3,183,654 sqlt_s96365_trc.zip\n              12 File(s)      5,268,661 bytes\n\
    \               2 Dir(s)   7,211,745,280 bytes free\n```\n\nWe’ll see the main\
    \ `sqlt_s96365_main.html` file, but fewer files than for a “normal” `sqltxtract`\
    \ run: no 10053 trace file, no sql profile script and no SQL Tuning Advisor reports.\
    \ This is because the read-only status of the standby restricts what can be done.\
    \ Production of the XTRSBY report, as you can see, is only a little more complicated\
    \ to produce. The additional steps already described are that one additional link\
    \ is required, and the link name needs to be passed in the call to the routine.\
    \ These are all that is required to get XTRSBY working.\n\nWhat Does a XTRSBY\
    \ Report Look Like?\n\nNow that you have a report, what can we do with it? Let’s\
    \ look at the top of another example report. See [Figure 9-1](#9781430248095_Ch09.xhtml#Fig1).\n\
    \n![9781430248095_Fig09-01.jpg](Images/9781430248095_Fig09-01.jpg)\n\n[Figure\
    \ 9-1](#9781430248095_Ch09.xhtml#_Fig1) .  The top of a SQLT XTRSBY report. Some\
    \ features are not available"
