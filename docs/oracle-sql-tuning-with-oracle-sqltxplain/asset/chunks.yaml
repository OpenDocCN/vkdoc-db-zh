- fmt: "In this case there was no difference in the execution plan, so we know that\
    \ the histograms make no difference for this query. We cannot of course go back\
    \ to the target system and delete the histograms because there could be other\
    \ SQL that relies on those histograms to execute effectively.\n\n## What Does\
    \ `sqlt_snnnnn_tcx.zip` Do?\n\nIn the latest version of SQLT you can create test\
    \ cases that have no dependence on SQLT on the target platform. In other words,\
    \ once you have run `SQLTXECUTE` or `SQLTXTRACT` you can take the test case (as\
    \ described in the sections above) and use the `sqlt_snnnnn_tcx.zip` file to create\
    \ a test case on the target platform and not be reliant on SQLT being installed\
    \ on that database. In this section I’ll use the same SQL as before to create\
    \ a test case on a new database that has no SQLT installed on it. As usual I have\
    \ put the files from this zip file into a sub-directory. Now on my new standard\
    \ database I’ll install the test case with the `install.sql` script provided in\
    \ the list of files. Here is the list of files in the `sqlt_s11996_tcx` directory\
    \ I created.\n\n```\n12/29/2012  09:59 AM               132 10053.sql\n12/29/2012\
    \  09:59 AM               103 flush.sql\n12/29/2012  09:59 AM               118\
    \ install.sh\n12/29/2012  09:59 AM               960 install.sql\n12/29/2012 \
    \ 09:59 AM             2,911 pack_tcx.sql\n12/29/2012  10:03 AM             2,209\
    \ plan.log\n12/29/2012  09:59 AM               279 plan.sql\n12/29/2012  09:50\
    \ AM               324 q.sql\n12/29/2012  09:59 AM               424 sel.sql\n\
    12/29/2012  09:59 AM               378 sel_aux.sql\n12/29/2012  09:59 AM     \
    \    1,193,984 sqlt_s11996_exp2.dmp\n12/29/2012  10:02 AM               596 sqlt_s11996_imp2.log\n\
    12/29/2012  10:02 AM            44,263 sqlt_s11996_metadata1.log\n12/29/2012 \
    \ 09:59 AM            29,223 sqlt_s11996_metadata1.sql\n12/29/2012  10:02 AM \
    \          106,511 sqlt_s11996_metadata2.log\n12/29/2012  09:59 AM           \
    \ 95,604 sqlt_s11996_metadata2.sql\n12/29/2012  10:02 AM             3,272 sqlt_s11996_schema_stats.log\n\
    12/29/2012  09:59 AM             2,174 sqlt_s11996_schema_stats.sql\n12/29/2012\
    \  10:02 AM           109,835 sqlt_s11996_set_cbo_env.log\n12/29/2012  09:59 AM\
    \            84,672 sqlt_s11996_set_cbo_env.sql\n12/29/2012  10:02 AM        \
    \     1,658 sqlt_s11996_system_stats.log\n12/29/2012  09:59 AM             1,285\
    \ sqlt_s11996_system_stats.sql\n12/29/2012  09:59 AM           103,448 sqlt_s11996_tcx.zip\n\
    12/29/2012  09:59 AM               141 tc.sql\n```\n\nAll of these files are recognizable\
    \ from the TC files we saw earlier. The new interesting file for us is `install.sql,`\
    \ which installs the test case in our new database. If we run this script we see\
    \ the final page as shown below, where the test case user (in this case `TC11996`)\
    \ has been created and the test SQL run.\n\n```\nEXPLAINED SQL STATEMENT:\n\n\
    select   country_name, sum(AMOUNT_SOLD) from sales s, customers c,\ncountries\
    \ co where   s.cust_id=c.cust_id   and\nco.country_id=c.country_id   and country_name\
    \ in\n('Ireland','Denmark','Poland','United\nKingdom','Germany','France','Spain','The\
    \ Netherlands','Italy')   group\nby country_name order by sum(AMOUNT_SOLD)\nPlan\
    \ hash value: 2938593747\n\n| Id  | Operation              | Name      | Rows\
    \  | Cost (%CPU)|\n\n|   0 | SELECT STATEMENT       |           |       |   947\
    \ (100)|\n|   1 |  SORT ORDER BY         |           |     9 |   947   (7)|\n\
    |   2 |   HASH GROUP BY        |           |     9 |   947   (7)|\n|*  3 |   \
    \ HASH JOIN           |           |   435K|   909   (3)|\n|*  4 |     HASH JOIN\
    \          |           | 26289 |   409   (1)|\n|*  5 |      TABLE ACCESS FULL\
    \ | COUNTRIES |     9 |     3   (0)|\n|   6 |      TABLE ACCESS FULL | CUSTOMERS\
    \ | 55500 |   406   (1)|\n|   7 |     PARTITION RANGE ALL|           |   918K|\
    \   494   (3)|\n|   8 |      TABLE ACCESS FULL | SALES     |   918K|   494   (3)|\n\
    \nPredicate Information (identified by operation id):\n\n3 - access(\"S\".\"CUST_ID\"\
    =\"C\".\"CUST_ID\")\n   4 - access(\"CO\".\"COUNTRY_ID\"=\"C\".\"COUNTRY_ID\"\
    )\n   5 - filter((\"COUNTRY_NAME\"='Denmark' OR \"COUNTRY_NAME\"='France' OR\n\
    \               \"COUNTRY_NAME\"='Germany' OR \"COUNTRY_NAME\"='Ireland' OR\n\
    \               \"COUNTRY_NAME\"='Italy' OR \"COUNTRY_NAME\"='Poland' OR\n   \
    \            \"COUNTRY_NAME\"='Spain' OR \"COUNTRY_NAME\"='The Netherlands' OR\n\
    \               \"COUNTRY_NAME\"='United Kingdom'))\n36 rows selected.\nSQL> SPO\
    \ OFF;\nSQL> show user\nUSER is \"TC11996\"\n```\n\nThis database is completely\
    \ fresh. There is no `SH` schema (I dropped the schema after creation of the database)\
    \ or SQLT schema (I never installed SQLT on this database). All the schemas are\
    \ the standard accounts, and yet if I log in as `TC11996` I can execute my test\
    \ case and do all the things to try and improve the execution plan as I would\
    \ normally be able to do with SQLT.\n\nThere is one additional wrinkle to TCX\
    \ that is sometimes useful. There is a file called `pack_tcx.sql` that allows\
    \ you to pack the test case even more tightly. If you run this file a new zip\
    \ file is produced called `tcx.zip,` which contains the files shown below (some\
    \ of these file names will be different in your case).\n\n```\n12/29/2012  09:59\
    \ AM               132 10053.sql\n12/29/2012  09:59 AM               103 flush.sql\n\
    12/29/2012  09:59 AM               279 plan.sql\n12/29/2012  09:50 AM        \
    \       324 q.sql\n12/29/2012  10:29 AM                74 readme.txt\n12/29/2012\
    \  10:29 AM             1,447 setup.sql\n12/29/2012  09:59 AM            95,604\
    \ sqlt_s11996_metadata2.sql\n12/29/2012  09:59 AM            84,672 sqlt_s11996_set_cbo_env.sql\n\
    12/29/2012  09:59 AM             1,285 sqlt_s11996_system_stats.sql\n12/29/2012\
    \  10:30 AM         1,136,640 TC11996_expdat.dmp\n```\n\nThese files are automatically\
    \ unzipped (by `pack_tcx.sql`). This time we run just `setup.sql` as `sys` and\
    \ the test case user is created. While these extra options to create test cases\
    \ may seem a little redundant when you have SQLT already installed (and I encourage\
    \ you to do this), these increasingly smaller test cases that show your problem\
    \ SQL and execution plan are extremely helpful when trying to convince someone\
    \ (for example, Oracle support) that you have a problem. The fewer extraneous\
    \ details included in your test case (as long as it still shows the problem) the\
    \ better it is for trying to solve the problem.\n\n## Including Test Case Data\n\
    \nSQLT test cases do not by default include application data. This is because\
    \ the problem (1) has nothing to do with the application data, (2) there is too\
    \ much data or (3) the data is privileged in some way and cannot be shown to anyone\
    \ else. In some rare cases data may be required to show the problem. Luckily SQLT\
    \ has an option to allow this as long as the other hurdles can be overcome. In\
    \ the later versions of SQLT you can do it like this:\n\n```\nSQL> EXEC SQLTXADMIN.sqlt$a.set_param('tcb_export_data',\
    \ 'TRUE');\n\nPL/SQL procedure successfully completed.\n```\n\nIn the older versions\
    \ of SQLT, find this section of code in the `sqcpkgi.pkb` file in the install\
    \ directory and change the `FALSE` to `TRUE`. This is what the code fragment looks\
    \ like before it is changed:\n\n```\nEXECUTE IMMEDIATE\n  'BEGIN DBMS_SQLDIAG.EXPORT_SQL_TESTCASE\
    \ ( '||\n  'directory     => :directory, '||\n  'sql_id        => :sql_id, '||\n\
    \  'exportData    => FALSE , '||  <<<Change this to TRUE\n  'timeLimit     =>\
    \ :timeLimit, '||\n  'testcase_name => :testcase_name, '||\n  'testcase      =>\
    \ :testcase ); END;'\n```\n\nThen rebuild this package.\n\n```\nSQL> @sqcpkgi.pkb\n\
    \nPackage body created.\n\nNo errors.\n```\n\nOnce you’ve selected this option\
    \ you can run `sqltxecute.sql` (or `sqltxtract.sql`) and collect a test case that\
    \ contains application data. All the set up steps are exactly the same after this,\
    \ you run `xpress.sql` and follow the steps outlined in previous sections.\n\n\
    ### Summary"
