    \n图 9-5 . 监控执行详情页面的左侧部分\n\n上图仅显示了报告的左侧部分。我们看到了预期的执行步骤、估计的行数以及相关的成本。我们还可以访问菜单，该菜单允许我们在不同的显示方式之间进行选择。报告的右侧向我们展示了有关实际返回行数、I/O\
    \ 请求以及任何等待活动的更多信息。对于这条 SQL 来说，没什么太多可说的，但你需要知道这些条目是存在的。参见图 9-6。\n\n![9781430248095_Fig09-06.jpg](img/9781430248095_Fig09-06.jpg)\n\
    \n图 9-6 . 监控执行详情页面的右侧部分\n\n甚至还有一个按钮可以更改报告的语言。下拉列表包括英语、德语、西班牙语、法语、意大利语、韩语和其他语言。如果你点击图\
    \ 9-5 中高亮显示的“计划”选项卡，你还可以获得执行计划的流程图版本（如图 9-7 所示）。\n\n![9781430248095_Fig09-07.jpg](img/9781430248095_Fig09-07.jpg)\n\
    \n图 9-7 . 显示执行计划的流程图表示\n\n一些开发人员更喜欢这种执行计划的表示方式，他们甚至可以选择流程是从左到右还是从下到上。\n\n### 总结\n\
    \n在本章中，我们涵盖了 Data Guard 调优的特殊情况，以及 SQLTXPLAIN 为我们提供的用于处理这种情况的实用程序。你不应将 Data Guard\
    \ 视为一个黑盒，认为如果它以只读模式打开就无法进行调优。许多公司都这样做，但你应该能够在需要时调查性能问题。现在，借助 XTRSBY 及其可靠的助手 `roxtract.sql`，你就可以做到。在下一章中，我们将处理执行计划的比较。这是一种非常强大的技术，用于确定执行计划中发生了什么变化：相信我，在执行计划中，没有什么东西是一成不变的。\n\
    \n## 第 10 章\n\n![image](img/frontdot.jpg)\n\n# 比较执行计划\n\n比较执行计划是最有用的诊断测试之一。如果你足够幸运，拥有一个好的执行计划，你可以使用该计划作为指导，使糟糕的执行计划符合要求。在第\
    \ 6 章中，我们讨论了使用 SQL Profiles 将计划应用到另一个数据库的 SQL 上，以作为一种应急选项。然而，假设你有更多的时间来考虑差异并尝试正确地修复它，而不是使用\
    \ SQL Profile 这个创可贴。`SQLTCOMPARE` 就是完成这项工作的工具。它将比较两个目标系统上相同的 SQL，并生成一份描述差异的报告。你甚至可以从两个目标系统导入\
    \ SQLTXPLAIN 存储库，并在那里进行比较。本章是纯粹的 SQLTXPLAIN 章节，我们将使用 SQLTXPLAIN 的方法 `SQLTCOMPARE`，并展示如何利用我们从前面章节学到的调优知识来诊断问题。\n\
    \n## 如何使用 SQLTCOMPARE？\n\n我们将通过一个实际示例更详细地介绍使用 `SQLTCOMPARE` 的步骤，但大致上使用 `SQLTCOMPARE`\
    \ 的步骤如下：\n"
- fmt: "# 使用 SQLTCOMPARE 比较 SQL 执行\n\n## 操作步骤\n1.  获取你正在调查的SQL在两个目标数据库上的`SQL ID`。它应该是相同的。\n\
    2.  然后，在**两个目标系统**上针对此SQL运行一个主要方法。\n3.  记录两次主要方法运行的`statement ID`。\n4.  创建一个目录来存放你的主要方法压缩文件。\n\
    5.  将两个主要方法解压到各自的目录中。\n6.  在主要方法目录内再创建一个目录，专门存放测试用例文件（该文件来自主要方法文件内的一个压缩文件：是的，压缩包中的压缩包）。我们将在[第11章](../Text/9781430248095_Ch11.xhtml)详细查看测试用例。\n\
    7.  将测试用例文件解压到专门的测试用例区域。\n8.  然后，将一个`statement ID`的存储库导入到另一个数据库，或者将两个存储库都导入到第三个数据库（这是我们将会使用的方法）。\n\
    9.  最后，运行`SQLTCOMPARE`。\n\n## SQLTCOMPARE 简介\n`SQLTCOMPARE`依赖`SQLT`存储库中的信息进行比较，并且必须拥有从其中一个主要方法收集的信息。主要方法有：\n\
    \n*   `XTRACT`（我们在[第1章](../Text/9781430248095_Ch01.xhtml)介绍过）\n*   `XECUTE`（同样在[第1章](../Text/9781430248095_Ch01.xhtml)介绍过）\n\
    *   `XTRXEC`\n*   `XPLAIN`\n*   `XTRSBY`（我们在[第9章](../Text/9781430248095_Ch09.xhtml)介绍过）\n\
    \n由于`SQLTCOMPARE`可以与任何主要方法一起使用，它也可用于比较来自两个不同系统的SQL语句，或来自主数据库和备用数据库的SQL语句（如果你使用`XTRSBY`）。它甚至可用于比较在两个不同平台上的执行：例如，Linux和Windows，以及来自不同版本的数据库。例如，可以将Linux上的10g与Solaris上的11g进行比较。\n\
    \n## 实际示例\n在这个例子中，我们将比较以下语句在两个目标数据库上的执行，但这些步骤适用于任何SQL：\n\n```\nSQL> host type\
    \ chapter10_01.sql\nselect\n  s.amount_sold,\n  c.cust_id,\n  p.prod_name\nfrom\n\
    \  sh.products p,\n  sh.sales s,\n  sh.customers c\nwhere\n  c.cust_id=s.cust_id\n\
    \  and s.prod_id=p.prod_id\n  and c.cust_first_name='Theodorick';\n```\n\n通常，如果你的批处理时间不同，或者你的OLTP性能有明显差异，并且你正在调查数据库以寻找差异时，你会注意到特定SQL的性能差异。你也可以在迁移前评估两个不同平台的相对性能。出于本示例的目的，我们注意到目标SQL在系统1和系统2上的执行计划不同。我们在系统2上从系统1创建了表，并且数据库位于相同的平台和硬件上，但我们看到执行计划存在一些差异。在第一个数据库上，我们看到以下执行计划：\n\
    \n```\nSQL> set autotrace traceonly explain\nSQL> set lines 200\nSQL> /\nExecution\
    \ Plan\n\nPlan hash value: 725901306\n\n| Id |Operation              |Name   \
    \   | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop\n\n|  0 |SELECT STATEMENT\
    \       |          |  5557 |   303K|   908   (3)| 00:00:11 |       |      |\n\
    |* 1 | HASH JOIN             |          |  5557 |   303K|   908   (3)| 00:00:11\
    \ |       |      |\n|  2 |  TABLE ACCESS FULL    |PRODUCTS  |    72 |  2160 |\
    \     3   (0)| 00:00:01 |       |      |\n|* 3 |  HASH JOIN            |     \
    \     |  5557 |   141K|   904   (3)| 00:00:11 |       |      |\n|* 4 |   TABLE\
    \ ACCESS FULL   |CUSTOMERS |    43 |   516 |   405   (1)| 00:00:05 |       | \
    \     |\n|  5 |   PARTITION RANGE ALL\n|          |   918K|    12M|   494   (3)|\
    \ 00:00:06 |     1 |   28 |\n|  6 |    TABLE ACCESS FULL  |SALES     |   918K|\
    \    12M|   494   (3)| 00:00:06 |     1 |   28 |\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   3 -\
    \ access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"C\".\"CUST_FIRST_NAME\"\
    ='Theodorick')\n```\n\n在第二个系统上，我们看到执行计划略有不同：\n\n```\nSQL> set autotrace traceonly\
    \ explain\nSQL> set lines 200\nSQL> /\n\nExecution Plan\n\nPlan hash value: 3857478275\n\
    \n| Id  | Operation           | Name      | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n\n|   0 | SELECT STATEMENT    |           |  2789\n|   473K\n|  1652\
    \   ( 2\n)| 00:00:20\n|\n|*  1 |  HASH JOIN          |           |  2789\n|  \
    \ 473K\n|  1652   ( 2\n)| 00:00:20\n|\n|   2 |   TABLE ACCESS FULL | PRODUCTS\
    \  |    72 |  6480\n|     3   (0)| 00:00:01\n|\n|*  3 |   HASH JOIN         |\
    \           |  2789\n|   228K\n|  1648   (1)| 00:00:20\n|\n|*  4 |    TABLE ACCESS\
    \ FULL| CUSTOMERS |    17\n|   765\n|   409   ( 1\n)| 00:00:05\n|\n|   5 |   \
    \ TABLE ACCESS FULL| SALES     |   860K\n|    31M\n|  1235   (1)| 00:00:15\n|\n\
    \nPredicate Information (identified by operation id):\n\n1 - access(\"S\".\"PROD_ID\"\
    =\"P\".\"PROD_ID\")\n   3 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4\
    \ - filter(\"C\".\"CUST_FIRST_NAME\"='Theodorick')\n\nNote\n\ndynamic sampling\
    \ used for this statement (level=2)\n```\n\n成本不同，计划的细节也不同，可能还有其他差异，但这并不是这里的重点。`SQLTCOMPARE`能告诉我们这两段相同但表现不同的SQL之间有什么区别吗？在非`SQLTXPLAIN`的世界里，我们现在会开始搜索系统之间的差异，一个一个地查看所有可能的嫌疑人，使用他们所有的特殊工具，这将是一个冗长且容易出错的过程。然而，使用`SQLTCOMPARE`，我们收集所有信息，并一次性完成所有内容的比较。然后我们再决定什么是重要的。\n\
    \n## 收集主要方法存储库数据\n收集`SQLTXPLAIN`数据的步骤就是我们已经使用的标准方法。在这个例子中，我们将使用`SQLTXECUTE`。回顾一下，步骤是识别`SQL\
    \ ID`，创建一个包含SQL语句的文件（包括任何绑定变量），然后在两个系统上运行`SQLTXECUTE`。\n\n我们已经提到了上面的SQL语句，我们可以在两个系统上检查`SQL\
    \ ID`是否相同。在系统1和2上我们得到：\n\n```\nSQL> select sql_id from v$sqlarea where sql_text\
    \ like 'select  %Theodorick%';\n\nSQL_ID\n\n2qjq95uds6hpd\n```\n\n这是一个简单但重要的步骤。如果没有验证`SQL_ID`是相同的，我们可能在比较稍有不同的SQL。那样的话，比较将无法工作。对于我们使用的每种主要方法，我们都在收集关于SQL语句的信息，我们需要记下`statement\
    \ ID`（而不是`SQL ID`）。这是`SQLTXPLAIN`分配给SQLT方法运行的语句编号。所以，在第一个系统上，我们像这样运行`SQLTXECUTE`：\n\
    \n```\nSQL> @sqltxecute chapter10_01.sql\n```\n\n文件`chapter10_01.sql`包含上面提到的SQL。当`SQLTXECUTE`方法完成时，我们看到这个输出。\n\
    \n```\nFile sqlt_s96376_xecute.zip for chapter10_01.sql has been created.\n\n\
    SQLTXECUTE completed.\n```\n\n这里我们记录下`statement ID`，在这个例子中是`96376`。同样地，在第二个系统上，我们运行相同的SQL（记得我们检查了`SQL\
    \ ID`），并使用相同的文件再次运行`SQLTXECUTE`。第二个系统的输出是：\n\n```\nFile sqlt_s73560_xecute.zip\
    \ for chapter10_01.sql has been created.\n\nSQLTXECUTE completed.\n```\n\n## 准备主要方法存储库数据"
  raw: "1.  Get the SQL ID of the SQL you are investigating on both target databases.\
    \ It should be the same.\n2.  Then run a main method on this SQL on BOTH target\
    \ systems.\n3.  Make a note of the statement ID from both runs of the main method.\n\
    4.  Create a directory to keep the files from your main method zip files.\n5.\
    \  Unzip both main methods into their respective directories.\n6.  Create another\
    \ directory inside the main method directory to keep just the test case file (which\
    \ is from a zip file inside the main method files: yes a zip file within a zip\
    \ file). We will look at test cases in detail in [Chapter 11](../Text/9781430248095_Ch11.xhtml).\n\
    7.  Unzip the test case files into the test case dedicated area.\n8.  Then import\
    \ one of the repositories of the statement ID to the other database or import\
    \ both repositories to a third database (this is the method we will use).\n9.\
    \  Then finally run SQLTCOMPARE.\n\nSQLTCOMPARE relies on the information in the\
    \ SQLT repository to do its comparison and must have the information that’s collected\
    \ from one of the main methods. The main methods are:\n\n*   XTRACT (We covered\
    \ this in [Chapter 1](../Text/9781430248095_Ch01.xhtml))\n*   XECUTE (Also covered\
    \ in [Chapter 1](../Text/9781430248095_Ch01.xhtml))\n*   XTRXEC\n*   XPLAIN\n\
    *   XTRSBY (We covered this in [Chapter 9](../Text/9781430248095_Ch09.xhtml))\n\
    \nBecause SQLTCOMPARE can be used with any of the main methods, it can also be\
    \ used to compare SQL statements from two different systems, or from a primary\
    \ and a standby database (if you use XTRSBY). It can even be used to compare execution\
    \ on two different platforms: for example, a Linux and Windows and from a different\
    \ version of the database as well. For example, 10g on Linux could be compared\
    \ with 11g from Solaris.\n\nA Practical Example\n\nIn this example we will compare\
    \ the executions of the following statement against two target databases, but\
    \ the steps apply to any SQL:\n\n```\nSQL> host type chapter10_01.sql\nselect\n\
    \  s.amount_sold,\n  c.cust_id,\n  p.prod_name\nfrom\n  sh.products p,\n  sh.sales\
    \ s,\n  sh.customers c\nwhere\n  c.cust_id=s.cust_id\n  and s.prod_id=p.prod_id\n\
    \  and c.cust_first_name='Theodorick';\n```\n\nUsually you would notice a difference\
    \ in performance of a particular SQL if your batch times were different or if\
    \ your OLTP performance was markedly different and you were investigating the\
    \ databases looking for differences. You could also be doing an evaluation of\
    \ the relative performance of two different platforms before migration. For the\
    \ purposes of this example we have noticed that our target SQL has a different\
    \ plan on system 1 than on system 2\\. We created the tables on system 2 from\
    \ system 1, and the databases are on the same platform and hardware, but we see\
    \ some differences in the execution plan. On the first database we see this execution\
    \ plan:\n\n```\nSQL> set autotrace traceonly explain\nSQL> set lines 200\nSQL>\
    \ /\nExecution Plan\n\nPlan hash value: 725901306\n\n| Id |Operation         \
    \     |Name      | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop\n\n|\
    \  0 |SELECT STATEMENT       |          |  5557 |   303K|   908   (3)| 00:00:11\
    \ |       |      |\n|* 1 | HASH JOIN             |          |  5557 |   303K|\
    \   908   (3)| 00:00:11 |       |      |\n|  2 |  TABLE ACCESS FULL    |PRODUCTS\
    \  |    72 |  2160 |     3   (0)| 00:00:01 |       |      |\n|* 3 |  HASH JOIN\
    \            |          |  5557 |   141K|   904   (3)| 00:00:11 |       |    \
    \  |\n|* 4 |   TABLE ACCESS FULL   |CUSTOMERS |    43 |   516 |   405   (1)| 00:00:05\
    \ |       |      |\n|  5 |   PARTITION RANGE ALL\n|          |   918K|    12M|\
    \   494   (3)| 00:00:06 |     1 |   28 |\n|  6 |    TABLE ACCESS FULL  |SALES\
    \     |   918K|    12M|   494   (3)| 00:00:06 |     1 |   28 |\n\nPredicate Information\
    \ (identified by operation id):\n\n1 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\"\
    )\n   3 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"C\".\"\
    CUST_FIRST_NAME\"='Theodorick')\n```\n\nOn the second system we see the execution\
    \ plan is slightly different:\n\n```\nSQL> set autotrace traceonly explain\nSQL>\
    \ set lines 200\nSQL> /\n\nExecution Plan\n\nPlan hash value: 3857478275\n\n|\
    \ Id  | Operation           | Name      | Rows  | Bytes | Cost (%CPU)| Time  \
    \   |\n\n|   0 | SELECT STATEMENT    |           |  2789\n|   473K\n|  1652  \
    \ ( 2\n)| 00:00:20\n|\n|*  1 |  HASH JOIN          |           |  2789\n|   473K\n\
    |  1652   ( 2\n)| 00:00:20\n|\n|   2 |   TABLE ACCESS FULL | PRODUCTS  |    72\
    \ |  6480\n|     3   (0)| 00:00:01\n|\n|*  3 |   HASH JOIN         |         \
    \  |  2789\n|   228K\n|  1648   (1)| 00:00:20\n|\n|*  4 |    TABLE ACCESS FULL|\
    \ CUSTOMERS |    17\n|   765\n|   409   ( 1\n)| 00:00:05\n|\n|   5 |    TABLE\
    \ ACCESS FULL| SALES     |   860K\n|    31M\n|  1235   (1)| 00:00:15\n|\n\nPredicate\
    \ Information (identified by operation id):\n\n1 - access(\"S\".\"PROD_ID\"=\"\
    P\".\"PROD_ID\")\n   3 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"\
    C\".\"CUST_FIRST_NAME\"='Theodorick')\n\nNote\n\ndynamic sampling used for this\
    \ statement (level=2)\n```\n\nThe cost is different, the details of the plan are\
    \ different, there could also be other differences, but that’s not the point here.\
    \ What can SQLTCOMPARE tell us about the difference between these two identical\
    \ pieces of SQL that behave differently? In the non-SQLTXPLAIN world, we would\
    \ now be searching for differences between the systems, looking at all the likely\
    \ suspects one by one, with all their special tools, which would be a long-winded\
    \ and error-prone process. With SQLTCOMPARE, however, we collect all the information\
    \ and do a comparison of everything in one go. Then we decide what’s important.\n\
    \nCollecting the Main Method Repository Data\n\nThe steps in collecting the SQLTXPLAIN\
    \ data are just the standard methods we have already used. In this example we’ll\
    \ use SQLTXECUTE. To recap, the steps are to identify the SQL ID, create a file\
    \ with the SQL statement in it (including any bind variables), and then run SQLTXECUTE\
    \ on both systems.\n\nWe already mentioned the SQL statement above, and we can\
    \ check on both systems that the SQL ID is the same. On both systems 1 and 2 we\
    \ get:\n\n```\nSQL> select sql_id from v$sqlarea where sql_text like 'select \
    \ %Theodorick%';\n\nSQL_ID\n\n2qjq95uds6hpd\n```\n\nThis is a simple step, but\
    \ an important one. Without verifying that the SQL_ID is the same we could be\
    \ comparing slightly different SQLs. In which case the comparison will not work.\
    \ For each main method we use we are collecting information about the SQL statement\
    \ and we need to take note of the statement ID (not the SQL IDs). That’s the statement\
    \ number that SQLTXPLAIN assigns to the run of the SQLT method. So on the first\
    \ system we run SQLTXECUTE like this:\n\n```\nSQL> @sqltxecute chapter10_01.sql\n\
    ```\n\nThe file `chapter10_01.sql` contains the SQL mentioned above. When the\
    \ SQLTXECUTE method completes we see this output.\n\n```\nFile sqlt_s96376_xecute.zip\
    \ for chapter10_01.sql has been created.\n\nSQLTXECUTE completed.\n```\n\nHere\
    \ we take a note of the statement ID, in this case it is 96376. Similarly on the\
    \ second system we run the same SQL (remember we checked the SQL ID) and use the\
    \ same file to run SQLTXECUTE again. The output from the second system is this:\n\
    \n```\nFile sqlt_s73560_xecute.zip for chapter10_01.sql has been created.\n\n\
    SQLTXECUTE completed.\n```\n\nPreparing the Main Method Repository Data"
  trans: "\n# 使用 SQLTCOMPARE 比较 SQL 执行\n\n## 操作步骤\n1.  获取你正在调查的 SQL 在两个目标数据库上的`SQL\
    \ ID`。它应该是相同的。\n2.  然后，在**两个目标系统**上针对此 SQL 运行一个主要方法。\n3.  记录两次主要方法运行的`statement\
    \ ID`。\n4.  创建一个目录来存放你的主要方法压缩文件。\n5.  将两个主要方法解压到各自的目录中。\n6.  在主要方法目录内再创建一个目录，专门存放测试用例文件（该文件来自主要方法文件内的一个压缩文件：是的，压缩包中的压缩包）。我们将在第\
    \ 11 章详细查看测试用例。\n7.  将测试用例文件解压到专门的测试用例区域。\n8.  然后，将一个`statement ID`的存储库导入到另一个数据库，或者将两个存储库都导入到第三个数据库（这是我们将会使用的方法）。\n\
    9.  最后，运行`SQLTCOMPARE`。\n\n## SQLTCOMPARE 简介\n`SQLTCOMPARE`依赖`SQLT`存储库中的信息进行比较，并且必须拥有从其中一个主要方法收集的信息。主要方法有：\n\
    \n*   `XTRACT`（我们在第 1 章介绍过）\n*   `XECUTE`（同样在第 1 章介绍过）\n*   `XTRXEC`\n*   `XPLAIN`\n\
    *   `XTRSBY`（我们在第 9 章介绍过）\n\n由于`SQLTCOMPARE`可以与任何主要方法一起使用，它也可用于比较来自两个不同系统的 SQL\
    \ 语句，或来自主数据库和备用数据库的 SQL 语句（如果你使用`XTRSBY`）。它甚至可用于比较在两个不同平台上的执行：例如，Linux 和 Windows，以及来自不同版本的数据库。例如，可以将\
    \ Linux 上的 10g 与 Solaris 上的 11g 进行比较。\n\n## 实际示例\n在这个例子中，我们将比较以下语句在两个目标数据库上的执行，但这些步骤适用于任何\
    \ SQL：\n\n```\nSQL> host type chapter10_01.sql\nselect\n  s.amount_sold,\n  c.cust_id,\n\
    \  p.prod_name\nfrom\n  sh.products p,\n  sh.sales s,\n  sh.customers c\nwhere\n\
    \  c.cust_id=s.cust_id\n  and s.prod_id=p.prod_id\n  and c.cust_first_name='Theodorick';\n\
    ```\n\n通常，如果你的批处理时间不同，或者你的 OLTP 性能有明显差异，并且你正在调查数据库以寻找差异时，你会注意到特定 SQL 的性能差异。你也可以在迁移前评估两个不同平台的相对性能。出于本示例的目的，我们注意到目标\
    \ SQL 在系统 1 和系统 2 上的执行计划不同。我们在系统 2 上从系统 1 创建了表，并且数据库位于相同的平台和硬件上，但我们看到执行计划存在一些差异。在第一个数据库上，我们看到以下执行计划：\n\
    \n```\nSQL> set autotrace traceonly explain\nSQL> set lines 200\nSQL> /\nExecution\
    \ Plan\n\nPlan hash value: 725901306\n\n| Id |Operation              |Name   \
    \   | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop\n\n|  0 |SELECT STATEMENT\
    \       |          |  5557 |   303K|   908   (3)| 00:00:11 |       |      |\n\
    |* 1 | HASH JOIN             |          |  5557 |   303K|   908   (3)| 00:00:11\
    \ |       |      |\n|  2 |  TABLE ACCESS FULL    |PRODUCTS  |    72 |  2160 |\
    \     3   (0)| 00:00:01 |       |      |\n|* 3 |  HASH JOIN            |     \
    \     |  5557 |   141K|   904   (3)| 00:00:11 |       |      |\n|* 4 |   TABLE\
    \ ACCESS FULL   |CUSTOMERS |    43 |   516 |   405   (1)| 00:00:05 |       | \
    \     |\n|  5 |   PARTITION RANGE ALL\n|          |   918K|    12M|   494   (3)|\
    \ 00:00:06 |     1 |   28 |\n|  6 |    TABLE ACCESS FULL  |SALES     |   918K|\
    \    12M|   494   (3)| 00:00:06 |     1 |   28 |\n\nPredicate Information (identified\
    \ by operation id):\n\n1 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   3 -\
    \ access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"C\".\"CUST_FIRST_NAME\"\
    ='Theodorick')\n```\n\n在第二个系统上，我们看到执行计划略有不同：\n\n```\nSQL> set autotrace traceonly\
    \ explain\nSQL> set lines 200\nSQL> /\n\nExecution Plan\n\nPlan hash value: 3857478275\n\
    \n| Id  | Operation           | Name      | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n\n|   0 | SELECT STATEMENT    |           |  2789\n|   473K\n|  1652\
    \   ( 2\n)| 00:00:20\n|\n|*  1 |  HASH JOIN          |           |  2789\n|  \
    \ 473K\n|  1652   ( 2\n)| 00:00:20\n|\n|   2 |   TABLE ACCESS FULL | PRODUCTS\
    \  |    72 |  6480\n|     3   (0)| 00:00:01\n|\n|*  3 |   HASH JOIN         |\
    \           |  2789\n|   228K\n|  1648   (1)| 00:00:20\n|\n|*  4 |    TABLE ACCESS\
    \ FULL| CUSTOMERS |    17\n|   765\n|   409   ( 1\n)| 00:00:05\n|\n|   5 |   \
    \ TABLE ACCESS FULL| SALES     |   860K\n|    31M\n|  1235   (1)| 00:00:15\n|\n\
    \nPredicate Information (identified by operation id):\n\n1 - access(\"S\".\"PROD_ID\"\
    =\"P\".\"PROD_ID\")\n   3 - access(\"C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4\
    \ - filter(\"C\".\"CUST_FIRST_NAME\"='Theodorick')\n\nNote\n\ndynamic sampling\
    \ used for this statement (level=2)\n```\n\n成本不同，计划的细节也不同，可能还有其他差异，但这并不是这里的重点。`SQLTCOMPARE`能告诉我们这两段相同但表现不同的\
    \ SQL 之间有什么区别吗？在非`SQLTXPLAIN`的世界里，我们现在会开始搜索系统之间的差异，一个一个地查看所有可能的嫌疑人，使用他们所有的特殊工具，这将是一个冗长且容易出错的过程。然而，使用`SQLTCOMPARE`，我们收集所有信息，并一次性完成所有内容的比较。然后我们再决定什么是重要的。\n\
    \n## 收集主要方法存储库数据\n收集`SQLTXPLAIN`数据的步骤就是我们已经使用的标准方法。在这个例子中，我们将使用`SQLTXECUTE`。回顾一下，步骤是识别`SQL\
    \ ID`，创建一个包含 SQL 语句的文件（包括任何绑定变量），然后在两个系统上运行`SQLTXECUTE`。\n\n我们已经提到了上面的 SQL 语句，我们可以在两个系统上检查`SQL\
    \ ID`是否相同。在系统 1 和 2 上我们得到：\n\n```\nSQL> select sql_id from v$sqlarea where sql_text\
    \ like 'select  %Theodorick%';\n\nSQL_ID\n\n2qjq95uds6hpd\n```\n\n这是一个简单但重要的步骤。如果没有验证`SQL_ID`是相同的，我们可能在比较稍有不同的\
    \ SQL。那样的话，比较将无法工作。对于我们使用的每种主要方法，我们都在收集关于 SQL 语句的信息，我们需要记下`statement ID`（而不是`SQL\
    \ ID`）。这是`SQLTXPLAIN`分配给 SQLT 方法运行的语句编号。所以，在第一个系统上，我们像这样运行`SQLTXECUTE`：\n\n```\n\
    SQL> @sqltxecute chapter10_01.sql\n```\n\n文件`chapter10_01.sql`包含上面提到的 SQL。当`SQLTXECUTE`方法完成时，我们看到这个输出。\n\
    \n```\nFile sqlt_s96376_xecute.zip for chapter10_01.sql has been created.\n\n\
    SQLTXECUTE completed.\n```\n\n这里我们记录下`statement ID`，在这个例子中是`96376`。同样地，在第二个系统上，我们运行相同的\
    \ SQL（记得我们检查了`SQL ID`），并使用相同的文件再次运行`SQLTXECUTE`。第二个系统的输出是：\n\n```\nFile sqlt_s73560_xecute.zip\
    \ for chapter10_01.sql has been created.\n\nSQLTXECUTE completed.\n```\n\n## 准备主要方法存储库数据\n"
- fmt: "The execution of `sqltxecute` creates zip files that contain important information.\
    \ The information in this zip file contains instructions on how to import the\
    \ data into another SQLT repository, but first you must unzip the main zip file.\
    \ From the execution of the two main methods on the target systems we see that\
    \ the statement IDs are `96376` (low CBO cost) and `73560` (higher CBO cost).\
    \ In this case I created two directories, `sqlt_s96376` and `sqlt_s73560`, each\
    \ with the corresponding zip file in it, which I then unzipped. Each directory\
    \ contains many files as we’ve learned, but in this case we are interested in\
    \ the readme file, called `sql_snnnnn_readme.html`. This is your go to file in\
    \ case of doubt (and this book of course). In this file the exact steps are described\
    \ to carry out many functions including SQLTCOMPARE actions. This is the top of\
    \ the readme file for the SQLTXECUTE report we ran on the first target system\
    \ (see [Figure 10-1](#9781430248095_Ch10.xhtml#Fig1)).\n\n![9781430248095_Fig10-01.jpg](Images/9781430248095_Fig10-01.jpg)\n\
    [Figure 10-1](#9781430248095_Ch10.xhtml#_Fig1) . The top of the readme file\n\n\
    If we click on the “Using SQLT COMPARE” hyperlink in this part of the report we\
    \ are taken to the steps describing the actions we need to take to import the\
    \ data into a new database (or in fact the same database) to do the comparison.\
    \ See [Figure 10-2](#9781430248095_Ch10.xhtml#Fig2) for the readme section for\
    \ `s96376`.\n\n![9781430248095_Fig10-02.jpg](Images/9781430248095_Fig10-02.jpg)\n\
    [Figure 10-2](#9781430248095_Ch10.xhtml#_Fig2) . The instructions for SQLTCOMPARE\
    \ show the import\n\nNotice that we have to unzip the `sqlt_s96376_tc.zip` file,\
    \ which is found inside the main SQLT zip file. We’ll do more with the test case\
    \ file in [Chapter 11](../Text/9781430248095_Ch11.xhtml), which is on building\
    \ good test cases. For the moment, however, we need only concern ourselves with\
    \ the dump file found inside the test case zip file. I’ve unzipped this file into\
    \ a directory called `TC` inside the unzipped area. Now making sure that your\
    \ SID is pointing to the right database (in my case I am importing into a third\
    \ database), we execute the instructions to import the data into our third database.\n\
    \n## Importing the Repository Data\n\nImporting the repository data is the last\
    \ step before we can actually run `SQLTCOMPARE`. As long as we’ve kept track of\
    \ the various zip files along the way, it should only be a matter of importing\
    \ the files.\n\n```\nimp sqltxplain file=sqlt_s96376_exp.dmp tables=sqlt% ignore=y\n\
    \nImport: Release 11.2.0.1.0 - Production on Sat Nov 17 14:38:09 2012\n\nCopyright\
    \ (c) 1982, 2009, Oracle and/or its affiliates.  All rights reserved.\n\nPassword:\n\
    \nConnected to: Oracle Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\n\
    With the Partitioning, OLAP, Data Mining and Real Application Testing options\n\
    \nExport file created by EXPORT:V11.02.00 via conventional path\nimport done in\
    \ WE8MSWIN1252 character set and AL16UTF16 NCHAR character set\n. importing SQLTXPLAIN's\
    \ objects into SQLTXPLAIN\n. importing SQLTXPLAIN's objects into SQLTXPLAIN\n\
    . . importing table          \"SQLT$_SQL_STATEMENT\"          1 rows imported\n\
    . . importing table             \"SQLT$_AUX_STATS$\"         13 rows imported\n\
    . . importing table    \"SQLT$_DBA_AUTOTASK_CLIENT\"          1 rows imported\n\
    . . importing table \"SQLT$_DBA_COL_STATS_VERSIONS\"        248 rows imported\n\
    . . importing table         \"SQLT$_DBA_COL_USAGE$\"         13 rows imported\n\
    \n---Output removed for clarity\n\n. . importing table          \"SQLT$_STGTAB_SQLSET\"\
    \          7 rows imported\n. . importing table  \"SQLT$_V$SESSION_FIX_CONTROL\"\
    \        406 rows imported\n. . importing table     \"SQLT$_WRI$_ADV_RATIONALE\"\
    \          2 rows imported\n. . importing table         \"SQLT$_WRI$_ADV_TASKS\"\
    \          2 rows imported\nImport terminated successfully without warnings.\n\
    ```\n\nThis has imported the required information from the first database (the\
    \ good execution plan) into the `SQLTXPLAIN` schema on the third database. Now\
    \ we repeat the entire process for the second database.\n\n```\nimp sqltxplain\
    \ file=sqlt_s73560_exp.dmp tables=sqlt% ignore=y\nImport: Release 11.2.0.1.0 -\
    \ Production on Sat Nov 17 14:48:31 2012\n\nCopyright (c) 1982, 2009, Oracle and/or\
    \ its affiliates.  All rights reserved.\n\nPassword:\n\nConnected to: Oracle Database\
    \ 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
    \ OLAP, Data Mining and Real Application Testing options\n\nExport file created\
    \ by EXPORT:V11.02.00 via conventional path\nimport done in WE8MSWIN1252 character\
    \ set and AL16UTF16 NCHAR character set\n. importing SQLTXPLAIN's objects into\
    \ SQLTXPLAIN\n. importing SQLTXPLAIN's objects into SQLTXPLAIN\n. . importing\
    \ table          \"SQLT$_SQL_STATEMENT\"          1 rows imported\n. . importing\
    \ table             \"SQLT$_AUX_STATS$\"         13 rows imported\n. . importing\
    \ table    \"SQLT$_DBA_AUTOTASK_CLIENT\"          1 rows imported\n. . importing\
    \ table         \"SQLT$_DBA_COL_USAGE$\"          5 rows imported\n---Output removed\
    \ for clarity\n. . importing table          \"SQLT$_STGTAB_SQLSET\"          6\
    \ rows imported\n. . importing table  \"SQLT$_V$SESSION_FIX_CONTROL\"        406\
    \ rows imported\n. . importing table     \"SQLT$_WRI$_ADV_RATIONALE\"        \
    \  8 rows imported\n. . importing table         \"SQLT$_WRI$_ADV_TASKS\"     \
    \     2 rows imported\n. . importing table \"SQLT$_WRI$_OPTSTAT_AUX_HISTORY\"\
    \         18 rows imported\nImport terminated successfully without warnings.\n\
    ```\n\nNow all that remains to be done is to run the `SQLTCOMPARE` method. The\
    \ script for this is in the “run” area. Logged in as `SQLTXPLAIN` we run `SQLTCOMPARE`.\n\
    \n## Running SQLTCOMPARE\n\nOnce we have imported the data we can run `SQLTCOMPARE`.\
    \ We can run it with or without the parameters on the command line. In this case\
    \ I’ll omit the parameters so that we can see what the prompts are:\n\n```\nSQL>\
    \ @sqltcompare\n. . . please wait . . .\n\nSTAID MET INSTANCE SQL_TEXT\n-----\
    \ --- -------- ------------------------------------------------------------\n\
    73560 XEC snc2     select   s.amount_sold,   c.cust_id,   p.prod_name from   sh\n\
    96376 XEC snc1     select   s.amount_sold,   c.cust_id,   p.prod_name from   sh\n\
    \nParameter 1:\nSTATEMENT_ID1 (required)\n\nEnter value for 1: 96376\n\nParameter\
    \ 2:\nSTATEMENT_ID2 (required)\n\nEnter value for 2: 73560\n```\n\nWe see that\
    \ the `SQLTCOMPARE` method immediately identifies the statements that we could\
    \ compare and shows them to us (because we did not specify the statement Ids on\
    \ the command line). Our good execution plan was run on `snc1` (statement ID `96376`),\
    \ and our not so good execution plan was run on `snc2` (a newly created database).\
    \ I always like to compare good to bad, so for the first statement ID I’ll enter\
    \ `96376` and for the second I’ll enter the only remaining statement ID `73560`.\
    \ (When you do your own comparisons you can compare the SQLs anyway you like,\
    \ but I like the good vs. bad convention to keep me focused on finding the differences\
    \ the right way around).\n\nNow we are presented with the plan hash value history\
    \ for each of the statements on each instance so we can choose which plan hash\
    \ values to compare. In this case I’ll compare the best plan on both systems.\n\
    \n```\nPLAN_HASH_VALUE SQLT_PLAN_HASH_VALUE STATEMENT_ID ATTRIBUTE\n---------------\
    \ -------------------- ------------ ---------\n      725901306               \
    \ 16588        96376 [B][W]\n     2025531852                21473        96376\n\
    \     3852404249                68517        96376\n\nParameter 3:\nPLAN_HASH_VALUE1\
    \ (required if more than one)\n\nEnter value for 3: 725901306\n\nPLAN_HASH_VALUE\
    \ SQLT_PLAN_HASH_VALUE STATEMENT_ID ATTRIBUTE\n--------------- --------------------\
    \ ------------ ---------\n     3850511567                 8739        73560\n\
    \     3857478275                 9628        73560 [B][W]\n     3858714362   \
    \             69559        73560\n\nParameter 4:\nPLAN_HASH_VALUE2 (required if\
    \ more than one)\n```"
