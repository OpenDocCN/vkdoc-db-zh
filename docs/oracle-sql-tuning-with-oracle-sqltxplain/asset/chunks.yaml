- fmt: "Now that we know what skewness is and how statistics are shown in a SQLT report\
    \ for a particular SQL statement, we should look at how skewness can cause problems\
    \ with an execution plan.\n\nSuppose we wanted to know the sum of all the financial\
    \ transactions we had carried out in the previous month with each financial institution\
    \ we had done business with. We might well have the name of the institution in\
    \ the description field, possibly a `company_ID` to represent the company and\
    \ a field to represent the amount of the financial transaction. We would probably\
    \ have lots of other fields as well of course, but these are the ones we would\
    \ be interested with regard to skewness. We could query this table to find the\
    \ sum of all the records where the `company_ID` matched the company that we were\
    \ currently looking for. If we chose a company we had not done much business with\
    \ we might only get a few records. The optimizer might well be expecting only\
    \ one record for some companies and so might choose to do a Cartesian join. If\
    \ the company was Bank of America, however, we might expect thousands (perhaps\
    \ millions) of transactions. In this case a hash join might be a better choice.\
    \ The “good” plan for these two extreme cases are very different.\n\nIf the Cartesian\
    \ join is used with the Bank of America records, there would be a disastrous drop\
    \ in performance as Oracle tried to do a Cartesian join on thousands of records.\
    \ Even Exadata can’t cope with errors like this. So depending on the predicate\
    \ value, we could well need different execution plans. To fix these kinds of problems,\
    \ we need to consider what the options are: removing the histogram, improving\
    \ the histogram, using Adaptive Cursor Sharing, or changing the query. There is\
    \ no hard and fast rule here for what to do in these circumstances. SQLT will\
    \ show what is happening and how skewness is affecting the execution plan; then\
    \ you, in conjunction with the developers, can decide which is the best strategy\
    \ for your situation: which indexes to add or remove and which histograms are\
    \ helpful to collect.\n\n## Histograms\n\nHistograms are a confusing topic, unless\
    \ you know what they are. The confusing and sometimes contradictory terminology\
    \ used by different documents does not help. So let me start by defining a bucket.\
    \ A bucket is a range of values for a particular column. So, for example, if we\
    \ had a column TRUE_OR_FALSE and it could only have two values (TRUE or FALSE)\
    \ then we could have up to two buckets: each bucket would have a value describing\
    \ the number of values that were TRUE and the number that were FALSE. A histogram\
    \ is a data representation that describes the relative population of different\
    \ ranges of data value.\n\n## Histogram Types\n\nWe’ve talked about histograms\
    \ in general terms, but Oracle currently has a bucket limit of 254 for any type\
    \ of histogram. This means it cannot store the frequency of more than 254 types\
    \ of value for a column. As you can imagine this is a very small number when compared\
    \ to almost any range of possible values of anything! “Colors of paint”, “Names\
    \ of Banks”, “Zip Codes”: most histograms will need more than 254 buckets. If\
    \ the number of distinct values (shown as NDV in SQLT reports) is greater than\
    \ 254 and the statistics gathering process detects this, then you will have to\
    \ somehow squeeze the data distribution into fewer buckets than there are distinct\
    \ values. If this happens, you are exposing the optimizer to the risk of incomplete\
    \ information that may adversely affect your execution plan. Look back at [Figure\
    \ 4-6](#9781430248095_Ch04.xhtml#Fig6). You’ll see that there were 33 buckets\
    \ from the sample of 5,502 rows. When in fact we know there are 45 distinct values.\
    \ Look at the result of this query, which reads all the data from the table.\n\
    \n```sql\nSQL> select count(distinct object_type) from test3;\n\nCOUNT(DISTINCTOBJECT_TYPE)\n\
    --------------------------\n                        45\n```\n\nThe true answer\
    \ to the number of distinct values is 45\\. The statistically sampled answer was\
    \ 33\\. The statistics sampler, even with a sample of 5,502, just wasn’t lucky\
    \ enough to find all the different possible values of `object_type`. Still, it\
    \ produced a frequency type histogram, because it did not exceed its 254 limit.\
    \ The point is that despite being a frequency-type histogram not all the values\
    \ were represented. What happens if we artificially squeeze the number of buckets\
    \ down to 10?\n\n```sql\nSQL> exec dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n\
    \  tabname=>'TEST3',\n  pname=>'method_opt',\n  pvalue=>'for all columns size\
    \ 10');\n\nPL/SQL procedure successfully completed.\n```\n\nNow we have the other\
    \ type of histogram (of the two possible types), the height based histogram (see\
    \ [Figure 4-7](#9781430248095_Ch04.xhtml#Fig7)).\n\n![9781430248095_Fig04-07.jpg](Images/9781430248095_Fig04-07.jpg)\n\
    \n[Figure 4-7](#9781430248095_Ch04.xhtml#_Fig7) .  A height-balanced histogram\
    \ with 10 buckets\n\nIn the height-based histogram, value types are counted against\
    \ the buckets and are marked as popular or not popular. If they are not popular,\
    \ then one bucket is allocated. For example, see bucket number 1, as it represents\
    \ the values for object types named lower in the alphabet than “CONSUM”: for example,\
    \ “CLUSTER” and “CONSUMER GROUP”. Because there could be numerous values for one\
    \ bucket, some of which we might not come across, the end point is estimated.\
    \ We know there is no object type of “SYNONY1”, but it’s the label for buckets\
    \ 5, 6, 7, and 8\\. As you can see, with only 10 buckets the estimate of the distribution\
    \ of data for object type (which in fact has 45 distinct types) is very poor.\
    \ With a histogram of this poor quality we might well end up with some poor plans.\
    \ It is therefore important that we know when to have histograms and when they\
    \ are a hindrance.\n\n## When to Use Histograms\n\nIf you use the default values\
    \ for optimizer statistics collection then you will most likely have some histograms\
    \ on columns that you aren’t aware of. If you have a query with poor performance,\
    \ or one you want to tune, you may want to examine what has been collected to\
    \ make sure it makes sense. There are a few guidelines to consider when deciding\
    \ if you want a histogram on a column or not. Histograms were designed to take\
    \ care of skewed data, so if your data is not very skewed then it follows that\
    \ histograms are not useful. An example might be a date-stamp against a table\
    \ record. If the database activity happens every day and we have 100 transactions\
    \ every day each with a timestamp, a histogram on the date column is not going\
    \ to help. In FREQUENCY histograms this would be equivalent to the height of all\
    \ buckets being the same. If there is no skewness then histograms do not help\
    \ us. It just means we spend time overnight gathering statistics that we don’t\
    \ need. As I’ve mentioned before the auto sample size is very clever about when\
    \ to quit sampling if the data is hardly skewed, so you probably will not lose\
    \ much time in this way.\n\nIf you have very skewed data, then histograms may\
    \ be very important for you; but if you do have them, you should check with SQLT\
    \ that the histograms are appropriate and correct. In [Figure 4-8](#9781430248095_Ch04.xhtml#Fig8),\
    \ we see the column statistics for TABLE 1.\n\n![9781430248095_Fig04-08.jpg](Images/9781430248095_Fig04-08.jpg)\n\
    \n[Figure 4-8](#9781430248095_Ch04.xhtml#_Fig8) .  A section from some column\
    \ statistics"
  raw: "Now that we know what skewness is and how statistics are shown in a SQLT report\
    \ for a particular SQL statement, we should look at how skewness can cause problems\
    \ with an execution plan.\n\nSuppose we wanted to know the sum of all the financial\
    \ transactions we had carried out in the previous month with each financial institution\
    \ we had done business with. We might well have the name of the institution in\
    \ the description field, possibly a *company_ID* to represent the company and\
    \ a field to represent the amount of the financial transaction. We would probably\
    \ have lots of other fields as well of course, but these are the ones we would\
    \ be interested with regard to skewness. We could query this table to find the\
    \ sum of all the records where the `company_ID` matched the company that we were\
    \ currently looking for. If we chose a company we had not done much business with\
    \ we might only get a few records. The optimizer might well be expecting only\
    \ one record for some companies and so might choose to do a Cartesian join. If\
    \ the company was Bank of America, however, we might expect thousands (perhaps\
    \ millions) of transactions. In this case a hash join might be a better choice.\
    \ The “good” plan for these two extreme cases are very different.\n\nIf the Cartesian\
    \ join is used with the Bank of America records, there would be a disastrous drop\
    \ in performance as Oracle tried to do a Cartesian join on thousands of records.\
    \ Even Exadata can’t cope with errors like this. So depending on the predicate\
    \ value, we could well need different execution plans. To fix these kinds of problems,\
    \ we need to consider what the options are: removing the histogram, improving\
    \ the histogram, using Adaptive Cursor Sharing, or changing the query. There is\
    \ no hard and fast rule here for what to do in these circumstances. SQLT will\
    \ show what is happening and how skewness is affecting the execution plan; then\
    \ you, in conjunction with the developers, can decide which is the best strategy\
