  trans: "\n对于介于 5 到 8 之间的值，其规则与`optimizer_dynamic_sampling`设置为 4 时保持不变，但样本大小会增加，每次翻倍。因此，值为\
    \ 5 时样本大小为 128 个块，值为 8 时样本大小为 1024 个块。对于级别 9，样本大小为 4086。对于值 10，则对所有块进行采样。正如您所想，设置此值可能会带来非常大的开销。如果我们要生成针对`sales`表的查询的\
    \ 10053 跟踪文件，可以输入以下命令：\n```\nSQL> ALTER SESSION SET MAX_DUMP_FILE_SIZE = UNLIMITED;\n\
    SQL> ALTER SESSION SET TRACEFILE_IDENTIFIER = '10053_TRACE';\nSQL> ALTER SESSION\
    \ SET EVENTS '10053 TRACE NAME CONTEXT FOREVER, LEVEL 1';\nSQL> select /*+ PARSE\
    \ 5 */ count(*) from sales;\nSQL> exit\n```\n\n在这里，我将转储文件大小（跟踪文件）设置为无限大，并在自动生成的文件名后附加了一个字符串，这样通过设置`TRACEFILE_IDENTIFIER`值为`10053_TRACE`，我就可以轻松找到该文件。生成的跟踪文件名将由\
    \ sid（本例中为`snc1`）、字符串“ora”、会话号（本例中为 5556）以及我附加的字符串组成。您的文件名会不同，但如果您使用一个合理的`TRACEFILE_IDENTIFIER`值，您应该能够轻松找到您的跟踪文件。如果您想查看开销，可以在使用了动态采样的查询的\
    \ 10053 跟踪文件中查找。如果您搜索 10053 跟踪文件，您将看到一个类似于下文的节选。（为清晰起见，我已删除了部分文本。）\n\n现在，如果我们查看`user_dump_dest`位置，会找到一个名为`snc1_ora_5556_10053_TRACE.trc`的文件。如果我们在这个文件中搜索字符串“dynamic\
    \ sampling”，将会看到以下节选。\n```\n*** 2012-12-01 12:59:17.671\n** 执行动态采样初始检查。 **\n**\
    \ 动态采样初始检查返回 TRUE (级别 = 4). <<<动态采样值\n*** 2012-12-01 12:59:18.078\n** 生成的动态采样查询:\
    \ <<<生成了一个动态查询\n    查询文本 :\nSELECT /* OPT_DYN_SAMP */ /*+ ALL_ROWS IGNORE_WHERE_CLAUSE\
    \ NO_PARALLEL(SAMPLESUB) opt_param('parallel_execution_enabled', 'false') NO_PARALLEL_INDEX(SAMPLESUB)\
    \ NO_SQL_TUNE */ NVL(SUM(C1),0), NVL(SUM(C2),0) FROM (SELECT /*+ NO_PARALLEL(\"\
    SALES\") FULL(\"SALES\") NO_PARALLEL_INDEX(\"SALES\") */ 1 AS C1, 1 AS C2 FROM\
    \ \"SALES\" SAMPLE BLOCK (2.035048 , 1) SEED (1) \"SALES\") SAMPLESUB\n\n*** 2012-12-01\
    \ 12:59:18.093\n** 已执行的动态采样查询:\n    级别 : 4\n    采样百分比 : 2.035048 <<<对表进行了约 2%的采样\n\
    \    总分区数 : 28 <<<表中共有 28 个分区。\n      用于采样的分区数 : 28\n    实际样本大小 : 18860 <<<使用的样本大小\n\
    \    过滤后的样本基数 : 18860\n    原始基数 : 145484 <<<基数的原始估计值\n    表统计信息的块计数 : 1769\n \
    \   用于采样的块计数: 1769\n    最大采样块数 : 64\n    采样块数 : 36\n    最小选择率估计值 : -1.00000000\n\
    ** 使用的动态采样基数 : 926759 <<<新的基数估计值\n** 动态采样更新了表基数。\n```\n\n让我逐步解释这个 10053 跟踪文件中发生的事情。首先我们看到检测到`optimizer_dynamic_sampling`级别为\
    \ 4。然后生成了一个动态采样查询。查询文本已显示。此查询提示中使用了许多有趣的选项\n\n*   `/* OPT_DYN_SAMP */` - 这不是提示，只是一个注释\n\
    *   `/*+ ALL_ROWS` – `ALL_ROWS`提示，一个标准提示\n*   `IGNORE_WHERE_CLAUSE` – 此提示忽略任何`WHERE`子句\n\
    *   `NO_PARALLEL(SAMPLESUB)` – 不允许并行执行，此动态查询的开销不得占用过多资源\n*   `opt_param('parallel_execution_enabled','false')`\
    \ – 禁用并行执行\n*   `NO_PARALLEL_INDEX` – 禁用并行索引计划\n*   `NO_SQL_TUNE */ - 未文档化的提示`\n\
    \n然后执行动态采样查询，根据参数值 4，我们能够采样大约 2%的行。您可以在查询中看到，采样的块是随机的（`SEED (1)`），并且我们使用了`SAMPLE`子句，该子句从表中采样块。那么，动态采样查询是否起到了作用？基数的原始估计值是\
    \ 145,484。动态采样查询执行后，新的估计值是 926,759。这比实际值 918,843 要接近得多。控制参数的值相当重要；接下来我们将了解如何查明其值。\n\
    \n## 如何找到 `optimizer_dynamic_sampling` 的值\n\n我们可以通过查看 SQLT 报告的“CBO 环境”部分来了解`optimizer_dynamic_sampling`的实际使用值。超链接显示在下面的图\
    \ 8-3 中。\n\n![9781430248095_Fig08-03.jpg](img/9781430248095_Fig08-03.jpg)\n\n\
    图 8-3。将您带到非默认 CBO 参数的超链接\n\n点击该链接后，我们会看到报告的“CBO 环境”部分，其中显示了`optimizer_dynamic_sampling`的值等内容。参见图\
    \ 8-4。\n\n![9781430248095_Fig08-04.jpg](img/9781430248095_Fig08-04.jpg)\n\n图 8-4。`optimizer_dynamic_sampling`的值被设置为非默认值\
    \ 5\n\n图 8-4 还向我们显示，`optimizer_dynamic_sampling`的值是通过`ALTER SYSTEM`语句更改的。我们之所以知道这一点，是因为在“已修改”列下我们看到了`SYSTEM_MOD`。我们也可以通过查看\
    \ SQL 语句的 10053 跟踪（如我们之前所做的那样）来查明其值，或者直接显示该值：\n```\nSQL> show parameter optimizer_dynamic_sampling\n\
    \nNAME                                 TYPE        VALUE\n------------------------------------\
    \ ----------- --------------\noptimizer_dynamic_sampling           integer   \
    \  4\n```\n\n## 动态采样与并行语句\n\n判断是否应对并行执行计划使用动态采样的规则与串行执行的语句略有不同。并行语句本身就被认为是资源密集型的，因此动态采样的少量开销对于确保良好的执行计划是值得的。其逻辑是，如果该值设置为默认值（`optimizer_dynamic_sampling=2`），则忽略\
    \ 64 块的样本大小，实际样本大小通过查看表大小和谓词复杂性来确定。如果存在非默认值，则规则与串行执行语句相同。\n\n## 我应该设置什么动态采样值？\n\
    \n关于动态采样的一般经验法则是，首先您不应依赖此功能。请记住，动态采样是为了 catch 优化过程中因缺少统计信息而可能导致的潜在问题。如果您的查询性能不符合预期，动态采样不应是您的首选。您应该先获取一份`SQLTXPLAIN`报告并查看它。对于并行语句，特别是当您有复杂谓词且至少有一个表缺少统计信息时，您很可能会最终使用动态采样。\n\
    \n如果您看到使用了动态采样（如前面图 8-2 所示），那么您应该检查为什么使用了它，以及您可以做些什么来避免使用它。如果您在表上已有统计信息但仍然看到动态采样，那么一种可能性是您有复杂谓词并且没有使用扩展统计信息（在第\
    \ 3 章中提到过）。\n"
- fmt: "If for some reason you want to use dynamic sampling but find its sampling\
    \ level too low or the expected plan is not produced, you can increase the sampling\
    \ level by changing the value of `optimizer_dynamic_sampling`, but take care to\
    \ test these changes on a test system and make small changes to see that the overhead\
    \ is not too great. Pick a representative SQL and see how it performs with different\
    \ values. If you have done no testing on this parameter, then keep the value at\
    \ its default.\n\nIf you want to disable this feature completely then set the\
    \ value to 0.\n\nThere are cases where dynamic sampling is the only option left.\
    \ For example, tables that are populated during the query will not have good statistics\
    \ (as they are most likely empty during the maintenance window when statistics\
    \ are gathered). Global temporary tables are a good example where dynamic sampling\
    \ is a good idea.\n\nIf dynamic sampling is your last chance to get your execution\
    \ plan right, then cardinality feedback is your chance to get the execution plan\
    \ right the second time around.\n\n## Cardinality Feedback\n\nCardinality feedback\
    \ is a simple yet elegant way of correcting cardinality. Rather than going to\
    \ endless complications to determine the right cardinality, we just wait for the\
    \ result of each step in the execution plan, store it in the shared pool and reference\
    \ it on subsequent executions, in the hope that the information will give us a\
    \ good idea of how well we did the last time. This simple technique naturally\
    \ has its own pitfalls, how do we stop results bouncing from one estimate to another\
    \ for example? Let’s look at some of the details.\n\n### How Does Cardinality\
    \ Feedback Work?\n\nCardinality feedback could not work if information about every\
    \ SQL was not stored in memory, to be accessed by later executions of the same\
    \ SQL. Let’s see what information we can access. We’ll run a simple query, then\
    \ get the Actual and Estimated cardinalities for the execution and then run for\
    \ two queries and compare estimates and actual rows returned, with both dynamic\
    \ sampling and cardinality feedback disabled. Then we’ll enable cardinality feedback\
    \ and repeat the experiment. In our first step we check the value of `optimizer_dynamic_sampling`\
    \ and see that it is set to 0, which means this feature is disabled.\n\n```sql\n\
    SQL> show parameter optimizer_dynamic_sampling\nNAME                         \
    \        TYPE        VALUE\n------------------------------------ ----------- ------------\n\
    optimizer_dynamic_sampling           integer     0 <<<DS disabled\nSQL> alter\
    \ system set \"_optimizer_use_feedback\"=FALSE; <<CFB disabled\nSystem altered.\n\
    ```\n\n![image](Images/sq.jpg) `Note` We could also have disabled cardinality\
    \ feedback with a hint `/*+ opt_param('_optimizer_use_feedback' 'false') */`.\n\
    \nNext we create a test table that is populated from `dba_objects`. We use the\
    \ hint `/*+ gather_plan_statistics */` to ensure we have good statistics for the\
    \ execution plan we want to look at.\n\n```sql\nSQL> create table test1 as select\
    \ (object_id) from dba_objects;\nTable created.\nSQL> select /*+ gather_plan_statistics\
    \ */ count(*) from test1;\n  COUNT(*)\n```\n\nNow we use the `dbms_xplan.display_cursor`\
    \ to get the execution plan and the statistics associated with the execution.\
    \ This is a pretty nice feature introduced in 11g of Oracle.\n\n```sql\nSQL> select\
    \ * from table(dbms_xplan.display_cursor(null,null,'ALLSTATS LAST'));\nPLAN_TABLE_OUTPUT\n\
    SQL_ID  gtukt6kw8yjm6, child number 0\n\nselect /*+ gather_plan_statistics */\
    \ count(*) from test1\nPlan hash value: 3896847026\n\n| Id  | Operation      \
    \    | Name  | Starts | E-Rows | A-Rows |   A-Time   | Buffers | Reads  |\n\n\
    |   0 | SELECT STATEMENT   |       |      1 |        |      1 |00:00:00.09 | \
    \    116 |    112 |\n|   1 |  SORT AGGREGATE    |       |      1 |      1 |  \
    \    1 |00:00:00.09 |     116 |    112 |\n|   2 |   TABLE ACCESS FULL| TEST1 |\
    \      1 |   9965 |  73532 |00:00:00.18 |     116 |    112 |\n\n14 rows selected.\n\
    ```\n\nWe see on this line that the estimate (`E-Rows`) is pretty poor compared\
    \ to the actual number of rows (`A-Rows`). This estimate counts as bad enough\
    \ to merit cardinality feedback use, but in this case we have the feature turned\
    \ off. So if we run the query a second time we would expect no improvement in\
    \ `E-Rows`; and indeed this is what happens.\n\n```sql\nSQL> select /*+ gather_plan_statistics\
    \ */  count(*) from test1;\n  COUNT(*)\n\nSQL> select * from table(dbms_xplan.display_cursor(null,null,'ALLSTATS\
    \ LAST'));\nPLAN_TABLE_OUTPUT\nSQL_ID  gtukt6kw8yjm6, child number 0\n\nselect\
    \ /*+ gather_plan_statistics */ count(*) from test1\nPlan hash value: 3896847026\n\
    \n| Id  | Operation          | Name  | Starts | E-Rows | A-Rows |   A-Time   |\
    \ Buffers | Reads  |\n\n|   0 | SELECT STATEMENT   |       |      1 |        |\
    \      1 |00:00:00.09 |     116 |    112 |\n|   1 |  SORT AGGREGATE    |     \
    \  |      1 |      1 |      1 |00:00:00.09 |     116 |    112 |\n|   2 |   TABLE\
    \ ACCESS FULL| TEST1 |      1 |   9965 |  73532 |00:00:00.18 |     116 |    112\
    \ |\n\n14 rows selected.\n```\n\nNo improvement has occurred in the estimated\
    \ cardinality (`E-Rows`) for this plan. The `E-Rows` value has not changed; the\
    \ optimizer did not make any changes even though its estimate was so far out.\
    \ The next step in our experiment is to enable cardinality feedback.\n\n```sql\n\
    SQL> alter system set \"_optimizer_use_feedback\"=TRUE;\nSystem altered.\n```\n\
    \nNow we repeat the entire sequence of steps and we find that for the last step\
    \ we get\n\n```sql\nSQL> select * from table(dbms_xplan.display_cursor(null,null,'ALLSTATS\
    \ LAST'));\nPLAN_TABLE_OUTPUT\nSQL_ID  gtukt6kw8yjm6, child number 3\n\nselect\
    \ /*+ gather_plan_statistics */ count(*) from test1\nPlan hash value: 3896847026\n\
    \n| Id  | Operation          | Name  | Starts | E-Rows | A-Rows |   A-Time   |\
    \ Buffers |\n\n|   0 | SELECT STATEMENT   |       |      1 |        |      1 |00:00:00.02\
    \ |     116 |\n|   1 |  SORT AGGREGATE    |       |      1 |      1 |      1 |00:00:00.02\
    \ |     116 |\n|   2 |   TABLE ACCESS FULL| TEST1 |      1 |  73532 |  73532 |00:00:00.18\
    \ |     116 |\n\nNote\n-----\n- cardinality feedback used for this statement\n\
    ```\n\nWe see that in the `Note` section the optimizer has left us a message indicating\
    \ that cardinality feedback was used. In our example above we had an estimated\
    \ 9,965 rows to begin with and an actual number of 73,532 rows. Without cardinality\
    \ feedback and dynamic sampling or statistics on the new object our estimate is\
    \ pretty poor to begin with. Because the number of estimated rows was “significantly”\
    \ different, cardinality feedback was used. It is not documented what a “significant”\
    \ difference is, but approximately 8-fold difference is enough.\n\nThere are safety\
    \ features in place to stop the cardinalities bouncing back and forth between\
    \ estimates, so after a small number of iterations the plan is stabilized. The\
    \ fact that the actual cardinalities are stored in the `SGA` also explains why\
    \ cardinality feedback information is not persistent, that is if the instance\
    \ is restarted then the cardinality feedback information will be lost, as the\
    \ information held in memory is not persistent.\n\n### How Can You Tell If Cardinality\
    \ Feedback Is Used?\n\nThe simplest way to tell if cardinality feedback has been\
    \ used is to use the `SQLTXPLAIN` report. Click on “Execution Plans” (as shown\
    \ in [Figure 8-1](#9781430248095_Ch08.xhtml#Fig1)) and if cardinality feedback\
    \ has been used for some of your execution plans you will see `cardinality_feedback\
    \ yes` under the “Plan Info” column. See figure [Figure 8-5](#9781430248095_Ch08.xhtml#Fig5)\
    \ for an example.\n\n![9781430248095_Fig08-05.jpg](Images/9781430248095_Fig08-05.jpg)\n\
    \n[Figure 8-5](#9781430248095_Ch08.xhtml#_Fig5) . “Execution Plans” section shows\
    \ that cardinality feedback was used for an execution plan"
