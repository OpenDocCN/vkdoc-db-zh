    Summary


    In this chapter, we covered the basic behavior of Adaptive Cursor Sharing. We
    also saw how it was an evolution of various features introduced over the years
    by Oracle. No doubt there will be further development in this area. With `SQLTXPLAIN`
    we can collect information on ACS and get enough information to decide if it is
    going to be helpful. In the next chapter we’ll cover another couple of features,
