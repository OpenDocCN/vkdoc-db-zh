    \ 文本出现在计划信息列中并被高亮显示。参见 图 6-4，它显示了报告的此部分。\n\n![9781430248095_Fig06-04.jpg](img/9781430248095_Fig06-04.jpg)\n\
    \n图 6-4 . 显示 SQLT HTML 报告的执行计划部分。这是页面的左侧。页面右侧有更多详细信息。注意计划信息列中 `sql_profile` 的使用\n\
    \n## 如何将 SQL 配置文件从一个数据库转移到另一个数据库？\n\n在许多情况下，SQLT 被认为对数据库操作侵入性太强（其实不然），或者特定站点有严格的规定，禁止直接在生产数据库上使用\
    \ SQLT。在这种情况下，通常会有一个开发或预演环境，可以在其中针对代表性的工作负载（即数据足够且最新的）运行测试 SQL。类似这样的情况下，你通常可以在开发或预演环境中获得正确的执行计划，但在生产环境中却不行。可能是因为你没有时间来更正统计信息，或者其他因素阻止你及时更正生产环境。在这种情况下，在与\
    \ Oracle 支持确认后，你可以在一个系统上创建 SQL 配置文件并将其转移到生产环境。你可以遵循 Oracle 支持说明 “如何将 SQL 配置文件从一个数据库移动到另一个数据库\
    \ [ID 457531.1]” 中描述的步骤，或者遵循此处描述的步骤，这些步骤是使用 SQLT 的说明步骤的简化版本。\n\n1.  在你的预演或开发系统上创建\
    \ SQL 配置文件脚本（如上所述）。SQL 配置文件应基于与你将要转移 SQL 配置文件的生产系统上的 SQL 文本匹配的 SQL 文本。此步骤的最终结果是一个\
    \ SQL 配置文件。\n2.  在开发或预演系统上，使用以下命令创建一个预演表：\n    ```\n    SQL> exec dbms_sqltune.create_stgtab_sqlprof(table_name=>'STAGE',\
    \ schema_name='STELIOS');\n    ```\n3.  使用以下命令将 SQL 配置文件打包到刚刚创建的预演区中：\n    ```\n\
    \    SQL> exec dbms_sqltune.pack_stgtab_sqlprof(staging_table_name=>'STAGE', \
    \ profile_name=>' sqlt_s89915_p3005811457');\n    ```\n4.  使用 `exp` 或 `expdp`\
    \ 从开发或预演系统导出 SQL 配置文件预演表。\n5.  使用 `imp` 或 `impdp` 将转储文件导入生产环境。\n6.  使用以下命令解包预演表：\n\
    \    ```\n    SQL> exec dbms_sqltune.unpack_stgtab_sqlprof(replace=>TRUE, staging_table_name=>'STAGE');\n\
    \    ```\n\n一旦你执行了这些步骤，你的目标 SQL 就应该使用来自开发或预演环境的执行计划运行。你可以像之前那样获取执行计划来检查它。\n\n\
    ## 总结\n\n如你所见，SQLT 如果使用得当，是一个强大的工具。与使用 SQLT 相比，传统的调优可能会显得缓慢而繁琐。本书的主要目标是让你熟悉 SQLT，然后让你足够频繁地使用\
    \ SQLT，从而能够快速高效地调优 SQL。在下一章中，我们将探讨 11g 中引入的一个名为 **自适应游标共享** 的功能。关于此功能如何工作、何时被使用以及在什么情况下使用存在很多困惑。SQLT\
    \ 在主报告中有一个专门针对自适应游标共享的部分。\n\n## 第 7 章\n\n![image](img/frontdot.jpg)\n\n**自适应游标共享**\n"
- fmt: "There’s no doubt that Adaptive Cursor Sharing is one of the most misunderstood\
    \ and confusing optimizer areas. It doesn’t help that it is sometimes referred\
    \ to as Intelligent Cursor Sharing or Bind Aware Peeking. Adaptive Cursor Sharing\
    \ was introduced in 11g to take care of those pesky bind variables that keep changing.\
    \ SQLTXTRACT has a section called “Cursor Sharing and Binds,” which can be found\
    \ at the top of the main report. See [Figure 7-1](#9781430248095_Ch07.xhtml#Fig1)\
    \ to remind yourself. The Adaptive Cursor Sharing section is at the bottom left\
    \ of the screen.\n\n![9781430248095_Fig07-01.jpg](Images/9781430248095_Fig07-01.jpg)\n\
    \n[Figure 7-1](#9781430248095_Ch07.xhtml#_Fig1) .  The Adaptive Cursor Sharing\
    \ section can be found in the bottom left hand corner of the screen\n\nUnderstanding\
    \ this area of the optimizer is not helped by the documentation either. It is\
    \ not exactly crystal clear and lacks some details that are required to understand\
    \ what happens when you use this feature. I will explain this feature in simple\
    \ terms and show examples where it has kicked into action. If you have a system\
    \ where this feature is important, you will better be able to understand what\
    \ is happening and why. You will also have the option of disabling the feature\
    \ completely.\n\n## Bind Variables and Why We Need Them\n\nBefore we go into Adaptive\
    \ Cursor Sharing (ACS), however, we need to cover some prerequisite knowledge,\
    \ which will be required for you to follow the discussion and understand the history\
    \ of ACS. Bind variables are the key component of SQL, which ACS relies on. They\
    \ are used by programmers in Oracle systems, because over the years Oracle has\
    \ told them that systems with many literal variables are a bad thing. This is\
    \ true in the majority of cases, but even today you will see systems with hundreds\
    \ of thousands of cursors being generated because of literal values. Often because\
    \ SQL is being created by an application that generates SQL automatically. This\
    \ is an example of a bind variable in an SQL statement and a literal value of\
    \ an equivalent statement:\n\n```\nvariable b varchar2(5);\nexec :b := 'TABLE'\n\
    select count(object_type) from acs where object_type=:b;\nselect count(object_type)\
    \ from acs where object_type='TABLE';\n```\n\nHere the bind variable is `b`, and\
    \ it is being used in the SQL statement (a `select` in this case) to stand in\
    \ for the value `TABLE`. It would be a reasonable question to ask, “Why do we\
    \ need bind variables,” when we could just as well do\n\n```\nselect count(object_type)\
    \ from acs where object_type='TABLE';\n```\n\nThe answer is that the overhead\
    \ of hard parsing is prohibitive on busy systems and each SQL cursor’s details\
    \ have to be kept in the shared pool, which can be a big memory overhead. Each\
    \ of the statements would be exactly the same; we don’t want the cost-based optimizer\
    \ to look in detail at each statement each time the bind variable changed. Back\
    \ in the dim and distant past (8i), bind variables were available, but were not\
    \ used very often. Oracle decided that more bind variables should be used to improve\
    \ performance but without necessarily having bind variables. The `cursor_sharing`\
    \ parameter was introduced.\n\n### The CURSOR_SHARING Parameter\n\nThe solution\
    \ introduced was the `cursor_sharing` parameter, which had possible values of\
    \ `EXACT` or `FORCE`. The default value was `EXACT`, which resulted in no change\
    \ in behavior: i.e., if there was a literal value in an SQL statement then it\
    \ was parsed and executed. If the overhead of the parsing was too high, then you\
    \ could consider setting the value to `FORCE`. In this case, the literal value\
    \ (in the example from above this would be ‘TABLE’), would be replaced by a system-defined\
    \ bind variable (an example would be `SYS_B_0`). This resulted in an improvement\
    \ in performance in some cases, but caused problems in some situations where the\
    \ value of the binds made a difference to the execution plan (in other words,\
    \ skewed data). A predicate with a rare value and a common value would have the\
    \ same execution plan as they were using the same system-generated bind variable.\
    \ This sometimes caused problems, so bind peeking was created to help. Here is\
    \ an example to show the behavior:\n\n```\nSQL> alter session set cursor_sharing='FORCE';\n\
    Session altered.\nSQL> @q4\n  COUNT(*)\n\nSQL> host type q4.sql\nselect  count(*)\
    \ from sh.products p,sh.sales s,sh.customers c where\n  c.cust_id=s.cust_id and\
    \ s.prod_id=p.prod_id and\n  c.cust_first_name='Stelios' ;\nSQL> select sql_id\
    \ from v$sqlarea where sql_text like 'select  count(*) from sh.products p,sh.sales\
    \ s,sh.customers c where%';\nSQL_ID\n---------------\n7d16bm8ub2w1g\nSQL> select\
    \ sql_text from v$sqlarea where sql_id='7d16bm8ub2w1g';\nSQL_TEXT\n--------------------------------------------------\n\
    select  count(*) from sh.products p,sh.sales s,sh.customers c where   c.cust_id=s.cust_id\
    \ and s.prod_id=p.prod_id and c.cust_first_name=:\"SYS_B_0\"\n\nSQL> alter session\
    \ set cursor_sharing='EXACT';\nSession altered.\nSQL> @q4\n  COUNT(*)\n----------\n\
    \     18432\nSQL> select sql_id from v$sqlarea where sql_text like 'select  count(*)\
    \ from sh.products p,sh.sales s,sh.customers c where%';\nSQL_ID\n---------------\n\
    7d16bm8ub2w1g\nfqsukcqvrby36\nSQL> select sql_text from v$sqlarea where sql_id='fqsukcqvrby36';\n\
    SQL_TEXT\n--------------------------------------------------\nselect  count(*)\
    \ from sh.products p,sh.sales s,sh.customers c where   c.cust_id=s.cust_id and\
    \ s.prod_id=p.prod_id and c.cust_first_name='Stelios'\n```\n\nIn the example above\
    \ I changed the default value of `cursor_sharing` to `FORCE`. My SQL then changed\
    \ so that it included a system defined bind variable called `SYS_B_0`. Then I\
    \ set the value back to `EXACT`, and the bind value disappeared and was replaced\
    \ by a literal. This is the expected behavior.\n\n### Bind Peeking\n\nIn 9i Oracle\
    \ introduced bind peeking. Bind peeking is used to look at the value being used\
    \ for a bind variable, during the hard parsing process, to determine an appropriate\
    \ execution plan. A new possible value of `SIMILAR` for `cursor_sharing` was also\
    \ introduced. If it was appropriate, during parsing, a new plan was generated;\
    \ otherwise (based on peeking) the plan was unchanged. The problem with this was\
    \ that if the first execution plan resulted in a plan that was not good for the\
    \ subsequent plans then you were stuck with a poorly executing plan.\n\n### Bind\
    \ Sensitive and Bind Aware Cursors"
