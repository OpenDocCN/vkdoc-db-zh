    \ us cost=406 size=555000 card=55500)\n918843   PARTITION RANGE ALL PARTITION:\
    \ 1 28 (cr=1718 pr=0 pw=0 time=5428724 us cost=494 size=9188430 card=918843)\n\
    918843   TABLE ACCESS FULL SALES PARTITION: 1 28 (cr=1718 pr=0 pw=0 time=1892572\
    \ us cost=494 size=9188430 card=918843)\n\n耗时包括等待以下事件：\n  事件名称               \
    \                      等待次数   最大等待时间  总等待时间\n  ----------------------------------------\
