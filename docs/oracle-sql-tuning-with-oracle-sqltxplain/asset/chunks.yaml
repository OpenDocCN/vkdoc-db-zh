    \ TRCANLZR 知道要分析哪些文件，我创建了一个名为 `control.txt` 的文本文件，其中列出了跟踪目录中与该 SQL 执行相关的文件名。这是\
    \ `control.txt` 的内容。\n\n```text\nsnc1_p003_3480_10046.trc\nsnc1_p003_3480.trc\n\
    snc1_p002_5284_10046.trc\nsnc1_p002_5284.trc\nsnc1_p001_4320_10046.trc\nsnc1_p001_4320.trc\n\
    snc1_p000_3600_10046.trc\nsnc1_p000_3600.trc\nsnc1_j000_4656.trc\n```\n\n顺便说一句，文件名\
    \ `control.txt` 是硬编码的，是 SQLT 的一部分。你必须使用这个文件名。另请注意，在此情况下，有些文件包含文本“10046”，有些则不包含。请记住，除非你通过以下方式指定，否则\
    \ 10046 跟踪文件的名称中通常不会包含文本 10046：\n\n`alter session set tracefile_identifier='10046'`\n\
