    \ SQL 如何被影响以实现我们的目标。\n\n## 探索执行计划\n\n既然我们有了一个测试用例，我们就可以通过改变那些可能影响执行计划的因素来探索执行计划。我在下面列出了一些：\n\
    \n-   优化器参数\n-   SQL 提示\n-   优化器版本\n-   SQL 的结构\n-   添加或删除索引\n-   系统统计信息\n-  \
    \ 对象统计信息\n\n在这些环境因素中，最后两个需要通过例程来设置对象统计信息。设置对象统计信息是可以做到的，但这超出了本书的范围。系统统计信息也可以设置和测试；但同样，这通常不是进行的测试，因为它意味着你是在为不同的机器做规划。（我在本节末尾给出了一个简短的例子。）使用测试用例最常探索的是优化器参数和\
    \ SQL 的结构。\n\n虽然这种测试可以用其他方式完成（`set autotrace`、`EXPLAIN PLAN`等），但设置环境可能既耗时又棘手。即使你设置了一个与其他环境完全相同的环境，你又怎么知道一切都设置正确了呢？优化器以相同的方式工作，并在你测试时生成执行计划。使用\
    \ SQLT 测试用例，所有内容都被导入，无一遗漏。你每次都能得到正确的环境。如果你复制了数据，你还将拥有一个与源环境非常相似的副本。这种工作方法的另一个优点是，系统环境也可以被改变。\n\
