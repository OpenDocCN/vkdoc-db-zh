    \ 访问的链接）：以下是我为创建一个连接到只读数据库的公共可用数据库链接而输入的命令。\n\n```\nSQL> show user\nUSER is \"\
    SYS\"\nSQL> create public database link \"TO_STANDBY\" connect to sqltxplain identified\
    \ by oracle using '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=localhost)(Port=1521))(connect_data=(SID=SNC2)))';\n\
    \nDatabase link created.\n\nSQL> select sysdate from dual@to_standby;\n\nSYSDATE\n\
    \n28-OCT-12\n```\n\n在这里，我使用了一个只读数据库来模拟备用数据库，因此在我的公共数据库链接连接字符串中使用了 `localhost`。在实际示例中，您应该使用备用数据库的主机名。此外，在我的示例中我使用了\
    \ `PUBLIC` 数据库链接，但您的站点可能有关于创建数据库链接的标准，要求您创建私有链接或两段式链接（其中链接信息和密码是分开指定的）。只要 `SQLTXPLAIN`\
    \ 有权访问该链接以找到备用数据库，例程 `xtrsby.sql` 就应该可以工作。\n\n一旦这些先决条件到位，我们就可以通过在主数据库上运行 `sqlxtrsby`\
    \ 来使用 `XTRSBY` 收集有关备用数据库 SQL 的信息。\n\n首先，让我们在备用数据库上创建一些 SQL。这将等同于在备用数据库上运行的报告。\n\
    \n```\nSQL> select count(1) from dba_objects where object_type ='DIMENSION';\n\
    \nCOUNT(1)\n\nSQL> select sql_id from v$sql where sql_text like 'select count(1)\
    \ from dba_objects where object_type =''DIMENSION''';\n\nSQL_ID\n\ngaz0dgkpffqrr\n\
    \nSQL>\n```\n\n在上面的步骤中，我们运行了一些任意的 SQL 并获取了该 SQL 的 SQL ID。记住，我们是在备用数据库（我们的报告可能运行的地方）上运行的\
    \ SQL。我们无法在 Data Guard 物理备用数据库上存储任何数据，因此现在我们必须通过数据库链接从主数据库捕获有关该 SQL 的信息：\n\n```\n\
    SQL> @sqltxtrsby gaz0dgkpffqrr to_standby\n\nPL/SQL procedure successfully completed.\n\
    \nParameter 1:\nSQL_ID or HASH_VALUE of the SQL to be extracted (required)\n\n\
    Parameter 2:\nDBLINK to SQLTXPLAIN in the stand-by database (required)\n\nParemeter\
    \ 3:\nSQLTXPLAIN password (required)\n\nEnter value for 3:\n\nAt this point enter\
    \ the password for SQLTXPLAIN\n\n. . . please wait . . .\n```\n\n这是为简洁起见而缩短的输出：\n\
    \n```\nArchive:  sqlt_s96365_xtrsby_gaz0dgkpffqrr.zip\n  Length      Date    Time\
    \    Name\n---------  ---------- -----   ----\n     3060  10/30/2012 13:00   sqlt_s96365_driver.zip\n\
    \     1159  10/30/2012 13:00   sqlt_s96365_export_driver.sql\n    46903  10/30/2012\
    \ 13:00   sqlt_s96365_lite.html\n    12448  10/30/2012 13:00   sqlt_s96365_log.zip\n\
    \  1788199  10/30/2012 13:00   sqlt_s96365_main.html\n    15498  10/30/2012 13:00\
    \   sqlt_s96365_readme.html\n      222  10/30/2012 13:00   sqlt_s96365_remote_driver.sql\n\
    \   217088  10/30/2012 13:00   sqlt_s96365_tc.zip\n      193  10/30/2012 13:00\
    \   sqlt_s96365_tcb_driver.sql\n      172  10/30/2012 13:00   sqlt_s96365_tc_script.sql\n\
    \       65  10/30/2012 13:00   sqlt_s96365_tc_sql.sql\n  3183654  10/30/2012 13:00\
    \   sqlt_s96365_trc.zip\n---------                     -------\n  5268661    \
    \                 12 files\n\nFile sqlt_s96365_xtrsby_gaz0dgkpffqrr.zip for gaz0dgkpffqrr\
    \ has been created.\n\nSQLTXTRSBY completed.\n```\n\n这会在运行 `SQLTXPLAIN` 例程的目录中生成\
    \ zip 文件。如果我们解压这个 zip 文件，会看到以下内容：\n\n```\n10/31/2012  12:03 PM    <DIR>      \
    \    .\n10/31/2012  12:03 PM    <DIR>          ..\n10/30/2012  01:00 PM      \
    \       3,060 sqlt_s96365_driver.zip\n10/30/2012  01:00 PM             1,159 sqlt_s96365_export_driver.sql\n\
