    \ REM\nSQL> REM 参数\nSQL> REM   无。\nSQL> REM\nSQL> REM 示例\nSQL> REM   SQL> START\
    \ sqlt_s89915_p3005811457_sqlprof.sql;\nSQL> REM\nSQL> REM 注意事项\nSQL> REM   1.\
    \ 应作为 SYSTEM 或 SYSDBA 运行。\nSQL> REM   2. 用户必须具有 CREATE ANY SQL PROFILE 权限。\nSQL>\
    \ REM   3. 源系统和目标系统可以是相同或相似的。\nSQL> REM   4. 创建此定制 SQL 配置文件后，如需删除：\nSQL> REM \
    \        EXEC DBMS_SQLTUNE.DROP_SQL_PROFILE('sqlt_s89915_p3005811457');\nSQL>\
    \ REM   5. 请注意，使用 DBMS_SQLTUNE 需要 Oracle 调优包的许可。\nSQL> REM   6. 如果你修改了 SQL 并添加了提示以生成期望的计划，\n\
    SQL> REM         你可以从下面的 SQL 文本片段中移除人工添加的提示。\nSQL> REM         这样，你可以为原始 SQL 创建一个定制的\
