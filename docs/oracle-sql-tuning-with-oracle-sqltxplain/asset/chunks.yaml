    ## The Final Word


    *   一个 SQL 详情 HTML 文件，就像由 `sqlhc.sql` 生成的那种。

    *   一个压缩包，其中包含针对该 SQL 已知历史执行的 SQL Monitor HTML 文件。

    *   一个针对该 SQL 执行的 10046 / 10053 HTML 文件。

    *   一个 `sqldx` 压缩包，包含与 `sqldx.sql` 执行结果相同的所有报告。

    *   一个压缩的日志文件。


    ### Summary


    SQL 健康检查工具，虽然与 SQLT 没有直接关联也不依赖它，但包含了许多与 SQLT 相同的元素。创建它的目的是，对于那些不想或无法安装 SQLT 的站点，可以通过使用
    `sqlhc.sql` 及其关联脚本获得一些好处。SQLHC 不像 SQLT 那样相互关联，也没有那么多潜在的观察点（SQLHC 大约有一百个可能的观察点，而
    SQLT 有 200 到 300 个）。SQLHC 足够有用，应该被视为最低要求，针对新的生产环境 SQL 运行它来检查观察点和预期的执行计划。我们的 SQLT
    之旅即将结束，因此在下一章，我将退后一步，为你提供一个关于调优的更宏观视角。


    ## Tuning Methodology


    调优方法论不是本书的主题，但我认为有必要对此说几句，因为 SQLT 可以成为一个良好策略的核心要素。在我看来，缺乏一个核心的方法来解决 SQL 调优问题，一直是
    DBAs（尤其是他们）以及需要编写高效代码的开发者面临的主要问题。当你遇到一个调优问题时，从哪里开始？通常这取决于你遇到的是哪种问题。为了帮助你，这里是我的五步法。


    1.  获取问题时间段的 AWR 报告。如果在报告的“Top 5 waits”部分存在“显著”问题，先处理那个。如果没有明显问题，则检查 AWR 报告的“SQL
    Report”部分。如果有某个 SQL 比其他 SQL 消耗更多资源，那么获取一个合适的 SQLT 报告。始终根据 AWR 报告中呈现的证据来引导你，而不是根据自己的直觉或猜测。

    2.  如果是单个 SQL 问题，从 SQLT `XTRACT` 或 `XEXCUTE` 开始（取决于你是否能可靠地运行该 SQL），然后利用获得的信息继续深入。如果不能使用
    SQLT，那么使用 SQLHC。

    3.  评估收集到的信息，并仔细检查任何看起来不寻常的信息（这是持续练习有帮助的地方，因为你开始能识别系统上不寻常的行为）。

    4.  调查任何异常并确保理解它们。它们可能是无害的。如果异常无法解释，则尝试评估它们是否可能是问题的原因。

    5.  如果你最终在调查一个性能发生变化的单个 SQL，请记住可以部署许多 SQL 工具来获取更多信息。构建一个测试用例，并使用 `COMPARE`，或者在绝望时使用
    `XPLORE`（如果你有时间的话）。


    这种高层次的方法论有几个关键要素。首先是识别异常事物。要做到这一点，你必须首先了解什么是正常的，就像我们在[第 2 章](../Text/9781430248095_Ch02.xhtml)中遇到的外星访客一样。第二个要素是了解优化器中事物如何工作的知识。这需要练习和一些阅读（希望本书有所帮助）。


    重要的是要认识到，SQLT 并不是这种方法论的第一步。尽管 SQLT 对于许多调优问题很有用，但第一步应该是评估整个系统的性能，这可以通过针对相应数据库的
    AWR 报告最好地完成。如果问题与操作系统相关，你可能会在那里找到解决方案，并且永远不需要查看 SQLT 报告或任何 SQL。如果你的问题与数据库相关，那么
    AWR 报告是了解内存需求、意外等待（在顶部五个事件中看到）的一个很好的起点。参见图 15-1，它显示了 AWR 报告中系统前五个等待的部分。这份报告不是很典型，但至少没有显示异常等待的高百分比。


    ![9781430248095_Fig15-01.jpg](Images/9781430248095_Fig15-01.jpg)


    [图 15-1](#9781430248095_Ch15.xhtml#_Fig1) . AWR 中的前 5 个等待


    如果你的系统负载很重，你应该会看到此报告部分中需要调查的等待。根据这些等待是什么，可能会引导你查看报告的 SQL 部分，然后可能建议调查某个特定的 SQL
    或一两个 SQL。这时 SQLT 就可以很好地发挥作用（只要该 SQL 不是某些内部的 Oracle 代码）。参见下面的图 15-2，它是按缓冲区获取排序的顶部
    SQL。


    ![9781430248095_Fig15-02.jpg](Images/9781430248095_Fig15-02.jpg)


    [图 15-2](#9781430248095_Ch15.xhtml#_Fig2) . 按获取排序的 SQL，AWR 报告的一部分


    在上面这份非典型报告中，我们看到一个 SQL 占用了所有获取的 28%，这在生产系统上相当不寻常，你应该可能调查这个（除非你知道它是什么以及为什么它消耗了那么多系统资源）。有时，如果许多
    SQL 都发生了性能下降，你可以使用 SQLT 详细查看一个 SQL：这是为了评估困扰该 SQL 的问题，希望影响该 SQL 的因素也将是所有 SQL 的相同解决方案。


    ## Why SQLT Is, Hands Down, the Best Tuning Utility'
  raw: '*   A SQL detail HTML file just like the one produced by `sqlhc.sql.`

    *   SQL Monitor HTML files inside a zip file for each of the known historical
    executions of the SQL.

    *   A 10046 / 10053 HTML file for the execution of the SQL.

    *   A sqldx zip file, containing all of the same reports as the results of `sqldx.sql.`

    *   A zipped up log file.


    Summary


    The SQL health check utility, although it not directly linked to SQLT and does
    not rely on it, has many of the same elements in it as SQLT. It was created so
    that sites that do not want to or cannot install SQLT can get some benefit from
    using `sqlhc.sql` and its associated scripts instead. SQLHC is not as interlinked
    as SQLT nor does it have as many potential observations (SQLHC has about a hundred
    possible observations, while SQLT has 200 to 300 observations). SQLHC is sufficiently
    useful that it should be considered a minimum requirement for SQLHC to be run
    against a new production SQL to check against observations and expected execution
    plans. We are nearing the end of our journey with SQLT, and so in the next chapter
    I’ll pull back and give you a bigger perspective on tuning.


    CHAPTER 15


    ![image](Images/frontdot.jpg)


    The Final Word


    The key to successful tuning with SQLT is to use SQLT regularly and for real-life
    problems. If you’ve reached the final chapter, you should now consider yourself
    a card-carrying member of the SQLT supporters club. You’ve learned a lot about
    what SQLT can do, and along the way you’ve probably learned some things about
    the cost-based optimizer and the Oracle engine. Let me remind you of some of the
    features we came across on our journey:


    *   The effect of statistics on execution plans

    *   The effect of skewness on execution plans

    *   How the optimizer transforms SQL during parsing

    *   How profiles can help you temporarily freeze an execution plan

    *   How adaptive cursor sharing works

    *   How dynamic sampling works

    *   How cardinality feedback works

    *   How you can use SQLT with Data Guard

    *   How test cases can be built with SQLT to allow exploration of the execution
    plans

    *   How to use the brute force of XPLORE to look for unexpected effects on the
    CBO from upgrades and other changes.

    *   How we can use the COMPARE method to investigate two SQLs

    *   Last but not least we talked about the health check script, which is a good
    second choice if SQLT is not available.


    In this chapter I’ll try and give you a quick overview of a methodology I use
    to approach a tuning problem. Naturally all methodologies have exceptions, but
    it’s better to have a default plan than having to determine a new one for every
    occasion. I’ll also give my opinion as to why SQLT is the best tool available
    for tuning (apart from being free). Then I’ll discuss some platform issues and
    assure you that SQLT and the examples we’ve covered do not just work on one platform.
    Finally I’ll mention a few resources you should be aware of as you continue your
    greater journey into the world of tuning.


    Tuning Methodology


    Tuning methodology is not this book’s main theme, but I feel I need to say something
    about it because SQLT can be a central element to a good strategy. The lack of
    a central methodology to attack SQL tuning problems has always, in my opinion,
    been the main problem for DBAs especially but also for developers who have to
    create efficient code. When you have a tuning problem, where do you start? Usually
    it all depends on what kind of problem you have. To help you here’s my five-step
    method.


    1.  Get an AWR report for the problem time. If there is a ”significant” problem
    in the “Top 5 waits” section of the report, deal with that first. If there is
    nothing obvious there then check the “SQL Report” section of the AWR report. If
    there is an SQL using more resources than other SQLs, then get an appropriate
    SQLT report. Always be led by the evidence presented in the AWR report and not
    by your own hunches or guesswork.

    2.  If it’s an individual SQL problem, start with SQLT XTRACT or XEXCUTE (depending
    on whether you can reliably run the SQL) and then use the information to go from
    there. If you can’t use SQLT, then use SQLHC.

    3.  Evaluate the information collected and scrutinize any information that looks
    out of the ordinary (this is where the constant practice helps, because you begin
    to recognize out-of-the-ordinary behavior on your system).

    4.  Investigate any anomalies and make sure you understand them. They may be benign.
    If the anomalies cannot be explained then try and assess if they could be the
    cause of your problems.

    5.  If you do end up investigating an individual SQL that has changed performance,
    remember there are many SQL tools that can be deployed to get more information.
    Build a test case and use COMPARE or use XPLORE in desperation (if you have the
    time).


    This high-level methodology has a few key elements. The first is to recognize
    things that are out of the ordinary. To do this you must first understand what
    is normal, just like our alien visitor back in [Chapter 2](../Text/9781430248095_Ch02.xhtml).
    The second element is the knowledge of how things work in the optimizer. This
    takes practice and some reading (hopefully this book helped).


    It’s important to recognize that SQLT is not the first step in this methodology.
    Although SQLT is useful for many tuning problems, the first step should be to
    assess the overall system performance, which can be best done from an AWR report
    against the appropriate database. If the problem is related to the operating system,
    you may find your solution there and need never look at a SQLT report or indeed
    any SQL. If your problem is with the database then the AWR report is a good starting
    point for memory requirements, unexpected waits (seen in the top five events).
    See [Figure 15-1](#9781430248095_Ch15.xhtml#Fig1), which shows the section of
    the AWR report with the top five waits on the system. This report is not very
    typical but at least shows no high percentages for unusual waits.


    ![9781430248095_Fig15-01.jpg](Images/9781430248095_Fig15-01.jpg)


    [Figure 15-1](#9781430248095_Ch15.xhtml#_Fig1) .  The top 5 waits in AWR


    If your system is heavily loaded you should see waits in this section of the report
    that may require investigation. Depending on what these waits are, you may be
    led to the SQL section of the report, which then may suggest an investigation
    of a particular SQL or perhaps one or two. Then SQLT can be used to good effect
    (as long as the SQL is not some internal Oracle code). See below in [Figure 15-2](#9781430248095_Ch15.xhtml#Fig2)
    for the top SQL sorted by buffer gets.


    ![9781430248095_Fig15-02.jpg](Images/9781430248095_Fig15-02.jpg)


    [Figure 15-2](#9781430248095_Ch15.xhtml#_Fig2) .  The SQL ordered by gets, part
    of the AWR report


    In the atypical report above we see that one SQL is taking 28 percent of all the
    gets, that’s pretty unusual on a production system, and you should probably investigate
    this (unless you know what it is and why it’s using that much of the system).
    Sometimes if many SQL have regressed you can use SQLT to look at one SQL in detail:
    this is to assess the problem afflicting that SQL in the hope that whatever has
    affected that SQL will be the same solution for all the SQLs.


    Why SQLT Is, Hands Down, the Best Tuning Utility'
