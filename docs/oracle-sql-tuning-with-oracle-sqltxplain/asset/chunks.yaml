    \n我们会看到主要的 `sqlt_s96365_main.html` 文件，但文件比“正常”的 `sqltxtract` 运行要少：没有 10053 跟踪文件，没有\
    \ sql profile 脚本，也没有 SQL 调优顾问报告。这是因为备用数据库的只读状态限制了可以执行的操作。正如您所看到的，生成 `XTRSBY` 报告只是稍微复杂一些。已经描述的额外步骤是需要一个额外的链接，并且需要在调用例程时传入链接名称。这些就是让\
    \ `XTRSBY` 工作所需的全部。\n\n## XTRSBY 报告是什么样子？\n\n现在您有了报告，我们可以用它做什么？让我们看另一个示例报告的顶部。参见图\
    \ 9-1。\n\n![9781430248095_Fig09-01.jpg](img/9781430248095_Fig09-01.jpg)\n\n图 9-1\
    \ . SQLT XTRSBY 报告的顶部。某些功能不可用\n"
- fmt: "# XTRSBY与roxtract工具的使用\n\n## XTRSBY中的执行计划\n\n某些功能不可用。例如，在[图9-1](#9781430248095_Ch09.xhtml#Fig1)中，我高亮显示了两个没有链接的部分，因为它们在`XTRSBY`中不可用。这是因为备机上的例程无法运行（我们在本章前面已经看到了会发生什么）。那么执行计划呢？它们和往常一样可见。你将在[图9-2](#9781430248095_Ch09.xhtml#Fig2)中看到，收集的信息没有真正的区别。\n\
    \n![9781430248095_Fig09-02.jpg](Images/9781430248095_Fig09-02.jpg)\n\n[图9-2](#9781430248095_Ch09.xhtml#_Fig2)\
    \ . 由`XTRSBY`收集的执行计划显示了所使用的链接\n\n在[图9-2](#9781430248095_Ch09.xhtml#Fig2)中，我们看到[第2章](../Text/9781430248095_Ch02.xhtml)和[第3章](../Text/9781430248095_Ch03.xhtml)中描述的所有常用功能都存在，并且可以以相同的方式解释。在这个新示例中（在另一台机器上创建），链接名称仍然称为`TO_STANDBY`，显示在执行计划中。我们还看到，在“环境”标题下（我们可以通过点击报告顶部的“环境”来访问），显示了备机数据库链接。参见[图9-3](#9781430248095_Ch09.xhtml#Fig3)。\n\
    \n![9781430248095_Fig09-03.jpg](Images/9781430248095_Fig09-03.jpg)\n\n[图9-3](#9781430248095_Ch09.xhtml#_Fig3)\
    \ . 备机数据库链接显示在“环境”部分中\n\n除了这些微小的差异外，`SQLTXPLAIN`报告是相同的。尽管`XTRSBY`在其有限的方式中非常有用，但我们仍然需要在备机系统本身上收集一些信息。在早期版本的`SQLT`（例如，11.4.4.6）中，只读工具`roxtract.sql`会被使用。这个工具现在被`SQLHC`（见[第14章](../Text/9781430248095_Ch14.xhtml)）取代了。只读（`ro`）工具仍然有用，如果你有旧版本的`SQLT`，你可能仍然想使用这个工具。该工具的名称带有`RO`前缀，表示它是一个只读工具，并且具有主要`XTRACT`工具的大部分功能。然而，从`SQLT`的11.4.5.1版本开始，它就不再可用。\n\
    \n## roxtract工具简介\n\n`SQLT`目录的`utl`区域有许多有用的实用程序。其中之一是`roxtract.sql`。这个只读例程专为在只读数据库中运行而设计，因此非常适合用于以只读模式打开的Data\
    \ Guard物理备机数据库。我敢肯定你已经在问，这个例程与我们刚才看到的`xtrsby.sql`例程有什么不同。简单的答案是，远程运行（如`xtrsby.sql`）通过数据库链接并不能获得所有信息。有些事情在本地做更好，我们很快就会看到`roxtract.sql`产生什么。这个例程直接在只读的Data\
    \ Guard备机数据库上运行（使用具有适当权限的账户），并在本地生成报告，而不像`xtrsby.sql`，它在读写数据库上生成报告。为了获取这些额外信息，我们必须使用`utl`目录中提供的例程。以下是在Windows系统上的目录列表。\n\
    \n```\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\sqlt\\utl>dir\n Volume\
    \ in drive C has no label.\n Volume Serial Number is 77E9-80B4\n```\n\n```\nDirectory\
    \ of C:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\sqlt\\utl\n```\n\n```\n\
    11/03/2012  10:08 AM    <DIR>          .\n11/03/2012  10:08 AM    <DIR>      \
