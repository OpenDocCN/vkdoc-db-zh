- fmt: "# 如何分析 SQLT 报告\n\n[Figure 1-4](#9781430248095_Ch01.xhtml#_Fig4) 展示了从 “Meta”\
    \ 超链接可以看到关于一个索引的元数据信息。\n\n这里我们看到了创建这个索引所需的语句。你有脚本来执行它吗？嗯，SQLT 能做得更好更快。那么，在你看过\
    \ SQLT 报告之后，你该如何着手解决问题呢？你打开了报告，只有一秒钟来做决定。你会去哪里看？\n\n嗯，这要视情况而定。\n\n## 如何分析 SQLT\
    \ 报告\n\n如同任何方法论一样，针对不同的情况需要采用不同的方法。一旦你确定 SQL 有问题，就可以使用 SQLT 报告。拿到 SQLT 报告后，你会看到一个首页，它会引导你到许多不同的地方（没人会从头到尾按顺序读完一份\
    \ SQLT 报告）。那么，你会从主页面去哪里呢？\n\n如果你完全确信执行计划是错的，你可能会直接前往 “Execution Plans” 并查看执行计划的历史记录。我们稍后会详细讨论如何查看它们。\n\
    \n假设你认为系统整体变慢了。那么你可能需要查看报告的 “Observations” 部分。\n\n也许你的统计信息出了问题，那么你肯定需要查看报告 “Tables”\
    \ 下的 “Statistics” 部分。\n\n我上面提到的所有部分，都是你处理每个问题时都可能会参考的。目的是构建你 SQL 语句的完整图景，理解与查询相关的统计信息，理解基于成本的优化器（CBO）环境，并尝试进入它的“思维”。它为什么那样做？为什么它与你认为应该做的不一致？SQLT\
    \ 报告就是优化器向你解释它为什么决定那样做的原因。除了少数错误，CBO 通常有充分的理由去做它所做的事。你的工作是设置好环境，使 CBO 与你的世界观一致，从而更快地运行\
    \ SQL！\n\n## 基数与选择性\n\n我写这本书的目标，除了让你成为超级 SQL 调优专家外，就是尽可能避免术语，并尽可能简单地解释调优概念。毕竟我们是\
    \ DBA，不是天体物理学家或火箭科学家。\n\n所以在解释这些术语之前，理解为什么这些概念对 CBO 操作和你理解系统上运行的 SQL 至关重要。我们首先来看基数（cardinality）。它的定义是，如果一个谓词选择了某个特定列，期望该列返回的行数。如果表没有统计信息，那么这个数字基本上是基于行数、最小值和最大值以及空值数量的启发式猜测。如果你收集了统计信息，这些信息会帮助完善猜测，但它仍然是一个猜测。如果你查看表的每一行（收集\
    \ 100% 的统计信息），它可能仍然是一个猜测，因为数据可能已经改变，或者数据可能是倾斜的（我们稍后会介绍偏斜度）。这个枯燥的定义并不真正贴近现实生活，所以我们来看一个例子。点击\
    \ SQLT 报告顶部的 “Execution Plans” 超链接，显示如 [Figure 1-5](#9781430248095_Ch01.xhtml#Fig5)\
    \ 所示的执行计划。\n\n![9781430248095_Fig01-05.jpg](Images/9781430248095_Fig01-05.jpg)\n\
    \n[Figure 1-5](#9781430248095_Ch01.xhtml#_Fig5) .  “Execution Plan” 部分中的执行计划\n\
    \n在 “Execution Plan” 部分，你会看到 “Estim Card” 列。在我的例子中，查看 `TABLE ACCESS FULL OBJ$`\
    \ 步骤。在 “Estim Card” 列下，值是 73,572。记住，基数是执行计划中某个步骤返回的行数。CBO（基于表的统计信息）会对基数有一个估计。“Estim\
    \ Card” 列显示的是 CBO 期望从查询步骤中得到的结果。73,572 表示 CBO *期望* 从这个步骤得到 73,572 条记录，但实际上得到了\
    \ 73,235。那么，对于基数（执行计划中某个步骤返回的行数）的估计，CBO 做得有多好？在我们这个简单的例子中，我们可以通过执行下面展示的查询来进行非常简单的直接比较。\n\
    \n```\nSQL> select count(*) from dba_objects;\n  COUNT(*)\n----------\n     73235\n\
    SQL>\n```\n\n所以基数是实际将返回的行数，但优化器当然无法预先知道答案。它必须猜测。这个猜测可能好也可能坏，取决于统计信息和偏斜度。当然，直方图在这里可以提供帮助。\n\
    \n关于选择性（selectivity）的例子，让我们看看通过从主页的 `Tables` 选项中选择 `Columns` 得到的页面（参考 [Figure\
    \ 1-1](#9781430248095_Ch01.xhtml#Fig1)），如 [Figure 1-6](#9781430248095_Ch01.xhtml#Fig6)\
    \ 所示。\n\n![9781430248095_Fig01-06.jpg](Images/9781430248095_Fig01-06.jpg)\n\n\
    [Figure 1-6](#9781430248095_Ch01.xhtml#_Fig6) .  SQLT 报告的 “Table Column” 部分\n\n\
    查看 “SYS.IND$ - Table Column” 部分。从 “Table Columns” 页面，如果我们点击 “Column Stats” 列下的\
    \ “34”，我们将看到 `SYS.IND$` 索引的列统计信息。[Figure 1-7](#9781430248095_Ch01.xhtml#Fig7)\
    \ 显示了从 “High Value” 列到 “Equality Predicate Cardinality” 列的页面子集。查看 “Equality Predicate\
    \ Selectivity” 和 “Equality Predicate Cardinality” 列（最后两列）。查看第一行 `OBJ#` 的值。\n\n\
    ![9781430248095_Fig01-07.jpg](Images/9781430248095_Fig01-07.jpg)\n\n[Figure 1-7](#9781430248095_Ch01.xhtml#_Fig7)\
    \ .  选择性在 “Equality Predicate Selectivity” 列中\n\n选择性是 0.000209，基数是 1。\n\n这可以解释为：“我期望这个等式谓词返回\
    \ 1 行，这相当于 0.000209 的机会（1 表示肯定，0 表示不可能），或者用百分比表示，如果我得到匹配的行，我将获得整个表的 0.0209%。”\n\
    \n注意，随着基数的增加，选择性也会增加。选择性只在 0 到 1 之间变化（或者如果你喜欢，0% 到 100%），而基数 *应该* 只在 0 到表中的总行数（不包括空值）之间变化。我说\
    \ *应该* 是因为这些值是基于统计信息的。如果你对一个分区（假设它有 1000 万行）收集了统计信息，然后你截断了该分区，但没有告诉优化器（即，你没有收集新的统计信息，也没有清除旧的统计信息），会发生什么？如果你要求\
    \ CBO 在这种情况下生成执行计划，它可能期望从该分区的谓词中获得 1000 万行。它可能“认为”全表扫描是一个好计划。它可能会因为信息不佳而尝试做错误的事情。\n\
    \n总结一下，基数是期望的行数，而选择性是同样的东西，只是在 0 到 1 的范围内。那么，为什么这一切对 CBO 和制定好的执行计划如此重要呢？简短的回答是，CBO\
    \ 正在努力为你制定最快、最简单的方式来获取结果。如果 CBO 对执行计划中各步骤将返回的行数有所了解，那么它就可以尝试执行计划的不同变体，并选择工作量最小、结果最快的方案。这就引出了“成本（cost）”的概念，我们将在下一节中介绍。\n\
    \n## 什么是成本？"
  raw: "[Figure 1-4](#9781430248095_Ch01.xhtml#_Fig4) .  Metadata about an index can\
    \ be seen from the “Meta” hyperlink\n\nHere we see the statement we would need\
    \ to create this index. Do you have a script to do that? Well SQLT can get it\
    \ better and faster. So now that you’ve seen a SQLT report, how do you approach\
    \ a problem? You’ve opened the report, and you have one second to decide. Where\
    \ do you go?\n\nWell, that all depends.\n\nHow to Approach a SQLT Report\n\nAs\
    \ with any methodology, different approaches are considered for different circumstances.\
    \ Once you’ve decided there is something wrong with your SQL, you could use a\
    \ SQLT report. Once you have the SQLT report, you are presented with a header\
    \ page, which can take you to many different places (no one reads a SQLT report\
    \ from start to finish in order). So where do you go from the main page?\n\nIf\
    \ you’re absolutely convinced that the execution plan is wrong, you might go straight\
    \ to “Execution Plans” and look at the history of the execution plans. We’ll deal\
    \ with looking at those in detail later.\n\nSuppose you think there is a general\
    \ slowdown on the system. Then you might want to look at the “Observations” section\
    \ of the report.\n\nMaybe something happened to your statistics, so you’ll certainly\
    \ need to look at the “Statistics” section of the report under “Tables.”\n\nAll\
    \ of the sections I’ve mentioned above are sections you will probably refer to\
    \ for every problem. The idea is to build up a picture of your SQL statement,\
    \ understand the statistics related to the query, understand the cost-based optimizer\
    \ (CBO) environment and try and get into its “head.” Why did it do what it did?\
    \ Why does it not relate to what you think it ought to do? The SQLT report is\
    \ the explanation from the optimizer telling you why it decided to do what it\
    \ did. Barring the odd bug, the CBO usually has a good reason for doing what it\
    \ did. Your job is to set up the environment so that the CBO agrees with your\
    \ worldview and run the SQL faster!\n\nCardinality and Selectivity\n\nMy objective\
    \ throughout this book, apart from making you a super SQL tuner, is to avoid as\
    \ much jargon as possible and explain tuning concepts as simply as possible. After\
    \ all we’re DBAs, not astrophysicists or rocket scientists.\n\nSo before explaining\
    \ some of these terms it is important to understand why these concepts are key\
    \ to the CBO operation and to your understanding of the SQL running on your system.\
    \ Let’s first look at cardinality. It is defined as the number of rows expected\
    \ to be returned for a particular column if a predicate selects it. If there are\
    \ no statistics for the table, then the number is pretty much based on heuristics\
    \ about the number of rows, the minimum and maximum values, and the number of\
    \ nulls. If you collect statistics then these statistics help to inform the guess,\
    \ but it’s still a guess. If you look at every single row of a table (collecting\
    \ 100 percent statistics), it might still be a guess because the data might have\
    \ changed, or the data may be skewed (we’ll cover skewness later). That dry definition\
    \ doesn’t really relate to real life, so let’s look at an example. Click on the\
    \ “Execution Plans” hyperlink at the top of the SQLT report to display an execution\
    \ plan like the one shown in [Figure 1-5](#9781430248095_Ch01.xhtml#Fig5).\n\n\
    ![9781430248095_Fig01-05.jpg](Images/9781430248095_Fig01-05.jpg)\n\n[Figure 1-5](#9781430248095_Ch01.xhtml#_Fig5)\
    \ .  An execution plan in the “Execution Plan” section\n\nIn the “Execution Plan”\
    \ section, you’ll see the “Estim Card” column. In my example, look at the `TABLE\
    \ ACCESS FULL OBJ$` step. Under the “Estim Card” column the value is 73,572. Remember\
    \ cardinality is the number of rows returned from a step in an execution plan.\
    \ The CBO (based on the table’s statistics) will have an estimate for the cardinality.\
    \ The “Estim Card” column then shows what the CBO expected to get from the step\
    \ in the query. The 73,572 shows that the CBO *expected* to get 73,572 records\
    \ from this step, but in fact got 73,235\\. So how good was the CBO’s estimate\
    \ for the cardinality (the number of rows returned for a step in an execution\
    \ plan)? In our simple example we can do a very simple direct comparison by executing\
    \ the query show below.\n\n```\nSQL> select count(*) from dba_objects;\n  COUNT(*)\n\
    \nSQL>\n```\n\nSo cardinality is the actual number of rows that will be returned,\
    \ but of course the optimizer can’t know the answers in advance. It has to guess.\
    \ This guess can be good or bad, based on statistics and skewness. Of course,\
    \ histograms can help here.\n\nFor an example of selectivity, let’s look at the\
    \ page (see [Figure 1-6](#9781430248095_Ch01.xhtml#Fig6)) we get by selecting\
    \ `Columns` from the `Tables` options on the main page (refer to [Figure 1-1](#9781430248095_Ch01.xhtml#Fig1)).\n\
    \n![9781430248095_Fig01-06.jpg](Images/9781430248095_Fig01-06.jpg)\n\n[Figure\
    \ 1-6](#9781430248095_Ch01.xhtml#_Fig6) .  The “Table Column” section of the SQLT\
    \ report\n\nLook at the “SYS.IND$ - Table Column” section. From the “Table Columns”\
    \ page, if we click on the “34” under the “Column Stats” column, we will see the\
    \ column statistics for the `SYS.IND$` index. [Figure 1-7](#9781430248095_Ch01.xhtml#Fig7)\
    \ shows a subset of the page from the “High Value” column to the “Equality Predicate\
    \ Cardinality” column. Look at the “Equality Predicate Selectivity” and “Equality\
    \ Predicate Cardinality” columns (the last two columns). Look at the values in\
    \ the first row for `OBJ#.`\n\n![9781430248095_Fig01-07.jpg](Images/9781430248095_Fig01-07.jpg)\n\
    \n[Figure 1-7](#9781430248095_Ch01.xhtml#_Fig7) .  Selectivity is found in the\
    \ “Equality Predicate Selectivity” column\n\nSelectivity is 0.000209, and cardinality\
    \ is 1.\n\nThis translates to “I expect to get 1 row back for this equality predicate,\
    \ which is equivalent to a 0.000209 chance (1 is certainty 0 is impossible) or\
    \ in percentage terms I’ll get 0.0209 percent of the entire table if I get the\
    \ matching rows back.”\n\nNotice that as the cardinality increases the selectivity\
    \ also increases. The selectivity only varies between 0 and 1 (or if you prefer\
    \ 0 percent and 100 percent) and cardinality *should* only vary between 0 and\
    \ the total number of rows in the table (excluding nulls). I say *should* because\
    \ these values are based on statistics. What would happen if you gathered statistics\
    \ on a partition (say it had 10 million rows) and then you truncate that partition,\
    \ but don’t tell the optimizer (i.e., you don’t gather new statistics, or clear\
    \ the old ones). If you ask the CBO to develop an execution plan in this case\
    \ it might expect to get 10 million rows from a predicate against that partition.\
    \ It might “think” that a full table scan would be a good plan. It might try to\
    \ do the wrong thing because it had poor information.\n\nTo summarize, cardinality\
    \ is the count of expected rows, and selectivity is the same thing but on a 0–1\
    \ scale. So why is all this important to the CBO and to the development of good\
    \ execution plans? The short answer is that the CBO is working hard for you to\
    \ develop the quickest and simplest way to get your results. If the CBO has some\
    \ idea about how many rows will be returned for steps in the execution plan, then\
    \ it can try variations in the execution plan and choose the plan with the least\
    \ work and the fastest results. This leads into the concept of “cost,” which we\
    \ will cover in the next section.\n\nWhat Is Cost?"
