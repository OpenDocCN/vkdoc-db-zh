- fmt: '# APPENDIX B


    ## The CBO Parameters (11.2.0.1)


    SQLT has within it the entire list of parameters that affect your query performance.
    It uses this list for the XPLORE method. Some parameters are hidden (only sporadically
    documented in various places) and some are non-hidden (documented in Oracle’s
    online documentation: database reference manual `http://docs.oracle.com/cd/B28359_01/server.111/b28320/initparams.htm#i102439`).
    You can get this list by issuing the following query from `SQLTXPLAIN`:


    ```sql

    SQL> select name, description from sqlt$_v$parameter_cbo order by name;

    ```


    The parameter list included in the “Full List of Parameters” section later in
    this chapter is from a database I used previously, which happened to be 11.2.0.1.
    I could have put a different listing here from previous versions or later versions,
    but this list is not meant to be exhaustive or definitive. It is here to act as
    a partial reference and to point out that you can get the latest set from SQLT
    queries. This list is however a good starting point and many of these parameters
    are still in use in 12c. You should not, however, consider this a list of parameters
    that you think might improve your SQL: the default parameter settings are there
    for a reason: they give the best overall results. But if your XPLORE report highlights
    some parameter that might make a difference, this list can give you a clue, along
    with the description as to what is happening in your query. Remember that just
    knowing the name of the hidden parameter is useful, as it gives you the chance
    to search My Oracle Support for even more clues.


    Dealing with hidden parameters (they are hidden for a reason) can be a tricky
    business. The purpose of the list in this appendix is to inform, not to give a
    template for experimentation. I’ll give some guidelines, caveats, and more detailed
    descriptions of certain important hidden parameters, but the general rule is this:
    talk to support. The names and effects of these parameters can change with any
    release. Oracle support will have the latest set of parameters and their effects.


    ## General Approach to Dealing with Hidden Parameters


    In the general scheme of things, hidden parameters are needed only rarely or under
    special environments. For example Exadata installations are recommended to use
    a small number of hidden parameters. Apart from these special circumstances you
    will sometimes be requested to set some hidden parameters by Oracle support. Hidden
    parameters when suggested by support will be attempts to confirm some bug that
    has affected performance (wrong execution plan) or has resulted in wrong results
    or has even caused errors to be generated (`ORA-00600`’s or `ORA-07445`’s). The
    setting of these parameters usually follows these steps:


    1.  A specific error occurs (wrong result, bad plan, `ORA-00600`, `ORA-07445`)

    2.  The characteristics of the wrong result, bad plan steps or trace file of the
    `ORA-00600` or trace file of the `ORA-07445` suggest a course of action.

    3.  Often the suggested bug will have a workaround which consists of setting some
    parameter, sometimes a hidden parameter, to either mitigate the problem (avoid
    the error), change the execution plan back to the correct one or to ensure the
    retrieval of correct data.

    4.  If the suggested changes have the desired effect and the bug is confirmed,
    using this technique and other techniques, you then have the options of setting
    the hidden parameter or parameters at the system level or at the session level
    if possible, as a short term workaround or tolerating the error while a bug fix
    is produced. This will depend on many factors including your special circumstances
    and the effect of the parameters on your system generally.


    This is why I specify with all of these parameters that you should be working
    with Oracle support. Changing hidden parameters without knowing the full implications
    can be disastrous (corrupted database springs to mind). The following descriptions
    and list give you the understanding to allow you to work more knowledgeably with
    Oracle support. If you have a database that is expendable, then you can do some
    experimentation with these parameters; but they should never be applied to production,
    development, QA, or testing databases without checking with Oracle support. I
    think that’s enough of a warning.


    ## More Detailed Descriptions of Some Hidden Parameters


    For general information I have listed below some of the hidden parameters that
    may be used to alleviate problems under certain circumstances. None of this information
    should be used without the assistance of Oracle support. There are sometimes unforeseen
    effects of setting these parameters. If Oracle support suggests some of these
    parameters for exploratory investigation you will usually be asked to do this
    at the session level to determine the effect and also to determine if you are
    being affected by a particular bug or to assess the efficacy of a bug fix. The
    defaults are as of 11.2, and these may change in future versions of Oracle, or
    indeed may be removed completely.


    `_and_pruning_enabled`


    With composite partitioned tables you may be affected by some bugs which if they
    involve “AND” partition pruning can be fixed by setting this parameter to `FALSE`.
    The default is `TRUE`.


    `_bloom_filters_enabled`


    Bloom filters are a memory efficient way of determining the membership of a set
    for a particular value. This can be very effective with Oracle queries and large
    data sets. If your execution plan shows a bloom filter (BF) in the plan and you
    get wrong results or `ORA-00600`’s, you may want to open a Service Request with
    Oracle support and discuss setting this parameter to `FALSE`. The default is `TRUE`.


    `_complex_view_merging`


    Under some circumstances the process of merging complex views can cause problems.
