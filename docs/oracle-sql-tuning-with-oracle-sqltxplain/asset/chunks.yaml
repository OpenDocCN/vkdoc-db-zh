    \ SQL：\n\n```\nSQL>\nselect /*+ GATHER_PLAN_STATISTICS MONITOR*/\n  cust_first_name,\n\
    \  amount_sold\nfrom\n  customers C,\n  sales S\nwhere\n  c.cust_id=s.cust_id\n\
    \  and amount_sold > 1750\n```\n\n现在我们获取`SQL_ID`：\n\n```\nSQL> select sql_id from\
