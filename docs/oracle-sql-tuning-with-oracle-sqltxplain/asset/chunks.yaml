  trans: "\n此例程在设置好列格式后提示访问的表，然后调用 `sel_aux.sql`：\n\n```\nREM 使用 CBO 计算谓词选择性。需要 sel.sql。\n\
    PRO\nACC predicate PROMPT '请输入 &&table. 表的谓词: ';\nDELETE plan_table;\nEXPLAIN\
    \ PLAN FOR SELECT /*+ FULL(t) */ COUNT(*) FROM &&table. t WHERE &&predicate.;\n\
    SELECT MAX(cardinality) e_rows FROM plan_table;\nSELECT &&e_rows. \"计算基数\", ROUND(&&e_rows./&&table_rows.,\
    \ 12) 选择性 FROM DUAL;\n@@sel_aux.sql\n```\n\n`sel_aux.sql` 使用 `explain plan` 通过从\
    \ `explain plan` 填充的 `plan_table` 中选择相关信息来确定基数和选择性。它会显示测试用例中任何特定谓词和表的计算基数与选择性。在例程结束时，会再次调用\
    \ `sel_aux`，以便有机会为谓词选择不同的值或完全不同的谓词。因此，如果您正在研究与特定值相关的问题，可能希望使用 `sel.sql` 来测试基数。在下面的示例中，我选择\
    \ `SALES` 表进行调查，并且对 `CUST_ID` 为 `100` 和 `200` 时针对 `SALES` 的查询基数感兴趣。\n\n```\nSQL>\
    \ @sel\n\n表名: sales\n\nTABLE_ROWS\n\nsales 表的谓词: cust_id=100\n\n计算基数      选择性\n\
    ---------- ---------------\n       130  0.000141482277\n\nsales 表的谓词: cust_id=200\n\
    \n计算基数      选择性\n---------- ---------------\n       130  0.000141482277\n\nsales\
    \ 表的谓词: cust_id between 100 and 300\n\n计算基数      选择性\n---------- ---------------\n\
    \      2080  0.002263716435\n\nsales 表的谓词:\n```\n\n我可以看到，统计信息估计 `SALES` 表中 `CUST_ID`\
    \ 的基数为 `130`。`cust_id=200` 时也看到了相同的值。由于我在此系统上也有数据，因此可以看到实际值是多少。\n\n```\nSQL> select\
    \ count(*) From sh.sales where cust_id=100;\n\nCOUNT(*)\n\nSQL> select count(*)\
    \ From sh.sales where cust_id=200;\n\nCOUNT(*)\n\nSQL> select count(*) From sh.sales\
    \ where cust_id between 100 and 300;\n\nCOUNT(*)\n```\n\n请注意，每个估计值都是错误的。估计值偏差如此之大，以至于使用\
    \ `BETWEEN` 子句给出的估计值是 `2,080`，而实际值是 `18,091`。由此我们可以看到，对象上的统计信息需要改进。也许在 `CUST_ID`\
    \ 列上创建直方图会有所帮助。\n\n### `sqlt_snnnnn_del_hgrm.sql` 的作用是什么？\n\n如果未正确采样或使用不当，直方图常常会导致问题。在这种情况下，您可以使用测试用例实用程序尝试删除直方图，以查看其对执行计划的影响。在此示例中，我们删除了在测试模式下注册的所有直方图。\n\
    \n```\nSQL> @sqlt_s64661_del_hgrm.sql\n输入 tc_user 的值: TC64661\ndelete_column_hgrm:\
