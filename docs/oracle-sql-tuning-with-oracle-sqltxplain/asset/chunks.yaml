- fmt: '# SQL 性能指标与测试用例构建


    ## 性能指标概述


    在比较 SQL 性能时，以下指标至关重要：


    *   `Avg. Elapsed Time in secs`：如果系统负载相当，此指标明确指示 SQL 的性能。

    *   `Avg. CPU Time in secs`：将 CPU 时间与总耗时对比，可判断 SQL 是否受 CPU 限制。

    *   `Avg. User I/O Wait Time in secs`：衡量 I/O 所花费的时间，可判断是否受 I/O 限制。

    *   `Avg. Buffer Gets`：在活动频繁、难以判断单次运行相对性能的繁忙系统上，是同一 SQL 不同运行间良好的比较指标。

    *   `Avg. Disk Reads`：显示有多少读取操作访问了磁盘。

    *   `Avg. Direct Writes`：指示有多少 I/O 是直接写入。

    *   `Avg. Rows Processed`：在数据相同的情况下，比较时期望此值相同。

    *   `Total Executions`：了解 SQL 在每个系统上运行的次数。

    *   `Total Fetches`：衡量所有执行中返回的数据量。

    *   `Total Version Count`：系统上找到的游标版本数量的计数。

    *   `Total Loads`：SQL 被加载的次数。

    *   `Total Invalidations`：显示 SQL 失效的次数。

    *   `Is Bind Sensitive`：在[第 7 章](../Text/9781430248095_Ch07.xhtml)中讨论。

    *   `Min Optimizer Environment`：显示最小优化器环境哈希值。

    *   `Max Optimizer Environment`：显示最大优化器环境哈希值（此值与前一个值对于比较环境值很有用）。

    *   `Optimizer Cost`：用于比较总体成本。

    *   `Estimated Cardinality`：用于查看优化器的估计值。

    *   `Estimated Time in Seconds`：优化器计算的另一种度量。

    *   `Plan Time Stamp`：显示执行计划的计算时间。

    *   `First Load Time`：计划首次加载到内存的时间。

    *   `Last Load Time`：计划最后一次加载到内存的时间。

    *   `Src`：显示信息的来源。

    *   `Source`：显示在此案例中使用的来源是 `GV$SQLAREA_PLAN_HASH`。


    我们看到许多不同的部分，但 `SQLTCOMPARE` 并不够智能以告诉我们所有情况下什么才是重要的。在此案例中，我们可以确认第二个目标系统的耗时略高于第一个系统。报告中使用的琥珀色表示比较结果差异不大，不足以引发问题，但如果不存在其他更紧迫的问题，可能仍需调查。在百分比方面，“Avg
    User I/O Wait Time in secs”差异非常大（因为其中一个值为 0.000），因此以红色高亮显示。磁盘读取（`disk reads`）也是如此。其他差异（如计划时间戳）不那么重要，但仍以红色显示。请记住，这些只是指导方针，您必须根据您对环境和情况的了解来决定什么差异是重要的。`SQLTCOMPARE`
    的作用是向您展示差异，以便您快速做出明智的决策。


    ## 总结


    比较两个 SQL 语句 ID 和计划哈希值是一种极其宝贵的方法，可以突出那些单独检查时可能不明显的差异。`SQLTCOMPARE` 对于确认用户或开发人员检测到的差异、从而排除其他导致差异的原因也至关重要。不同的环境通常难以比较，因为有太多因素会影响执行计划。`SQLTCOMPARE`
    收集所有可用信息，并以简单易读的报告并排展示。这再次体现了 `SQLTXPLAIN` 如何让复杂的工作变得快速而简单。在下一章中，我们将探讨如何构建良好的测试用例以及如何利用它们来修改您的执行计划。


    # 第 11 章


    ![image](Images/frontdot.jpg)


    ## 构建良好的测试用例


    偶尔会遇到一些性能调优问题，通过检查 `SQLTXTRACT` 或 `SQLTXECUTE` 报告无法明显得出解决方案。所有常见的嫌疑因素都已排除，可能需要更彻底的调查。在这种情况下，构建一个测试用例以允许在主要环境之外进行实验是很有用的。如果您正在测试环境中调查有问题的
    SQL，通常您会尝试使该环境与您试图复制的环境保持一致。这通常非常困难，因为有许多影响环境的因素需要复制。以下是其中一些因素：


    *   硬件

    *   软件

    *   CBO 参数

    *   对象统计信息

    *   数据字典统计信息

    *   数据

    *   表聚簇因子

    *   索引

    *   序列

    *   表


    还有许多其他因素；有些因素对您的问题可能至关重要，而另一些则可能不是。您可以尝试用传统方式构建测试用例，即导出数据和相关统计信息到测试环境，但这容易出错且是手动过程，除非您已经编写了脚本来完成此操作。幸运的是，`SQLT`
    只需几个非常简单的步骤就能完成构建测试用例所需的一切。它是平台无关的，因此例如您可以在 Windows 上运行 Solaris 测试用例；它易于使用且自动化。通常无法复制的唯一东西是数据（因为这通常会使测试用例过大）。然而，如果需要，也可以包含数据（我们在本章末尾提供了一个示例）。


    ![image](Images/sq.jpg) **警告** 仅在您可以轻松替换的环境中运行测试用例设置脚本。设置测试环境所涉及的一些脚本会更改操作环境。您需要
    `SYS` 权限才能执行这些操作是有充分理由的。它们会改变系统设置。通常，您会为测试用例创建一个独立的数据库，并在您的环境中仅使用该测试用例。完成测试用例后，您会删除整个数据库。重复使用这样的数据库将是一个危险的操作。任何数量的
    CBO 参数都可能已被更改。**仅在废弃数据库中设置测试用例。特此警告。**


    ## 您能用测试用例做什么？


    在某些情况下，调优可能是一项棘手的工作。在开始调查问题之前，您必须了解执行计划的各个部分在做什么。有时这种理解来自于对 SQL 及其环境的副本进行调试。您可以添加索引、更改提示、更改优化器参数、删除直方图统计信息——可能性无穷无尽。这类操作并非随机进行，而是基于对当前问题的一些理解（或至少是您当时掌握的尽可能多的理解）。


    所有这些调试都无法在生产环境中进行，在开发环境中也常常难以进行，因为风险太高，您案例的某些方面可能会影响他人：例如公共同义词或序列。另一方面，如果您能建立一个包含良好测试用例的小型私有数据库，您就可以更改各种参数而不会直接影响任何人。只要数据库的版本相同，您将获得基本相同的行为。我说“基本”是因为在某些情况下（例如
    Exadata），需要更接近您所复制环境的环境来处理特定问题。例如，混合列压缩（Hybrid columnar compression）无法在非 Exadata
    环境中完成。自 Oracle 发布以来，DBA 和开发人员一直在为其环境编写脚本来创建测试用例，但随着环境复杂性的增加，设置健壮的良好测试用例所需的时间越来越长。这些手工制作的测试用例很有用，但创建起来过于耗时。`SQLT`
    通过自动收集所有必需的元数据和统计信息，为您完成了所有艰苦的工作。


    ## 构建测试用例'
  raw: '*   Avg. Elapsed Time in secs: clearly important if the load on the systems
    is comparable as it is an indication of the performance of the SQL.

    *   Avg. CPU Time in secs: the CPU time in comparison to the total elapsed time
    can tell you if the SQL is CPU bound or not.

    *   Avg. User I/O Wait Time in secs: a measure of how much time is spent on I/O
    could tell you if you are I/O bound.

    *   Avg. Buffer Gets: can be a good comparison between individual runs of the
    same SQL on busy systems with much activity where relative performance from one
    run to another is hard to gauge.

    *   Avg. Disk Reads: shows how many of your reads are going to disk.

    *   Avg. Direct Writes: indicates how much of your I/O is a direct write.

    *   Avg. Rows Processed: in comparisons you would expect these to be the same
    if the data was the same.

    *   Total Executions: this gives you an idea of how many times the SQL was run
    on each system.

    *   Total Fetches: a measure of the data returned in all executions.

    *   Total Version Count: a count of the number of versions of the cursor found
    on the system.

    *   Total Loads: the number of times the SQL was loaded.

    *   Total Invalidations: shows how many times the SQL was made invalid.

    *   Is Bind Sensitive: discussed in [Chapter 7](../Text/9781430248095_Ch07.xhtml).

    *   Min Optimizer Environment: shows the minimum optimizer environment hash value.

    *   Max Optimizer Environment: shows the maximum optimizer environment hash value
    (this and the previous value are useful for comparing environment values).

    *   Optimizer Cost: useful to compare overall cost.

    *   Estimated Cardinality: useful to see what the optimizer estimated.

    *   Estimated Time in Seconds: another measure of the optimizer calculations.

    *   Plan Time Stamp: shows when the execution plan was calculated.

    *   First Load Time: when the plan was first loaded into memory.

    *   Last Load Time: when the plan was loaded into memory last.

    *   Src:  shows where the information was derived from.

    *   Source: shows which source was used in this case GV$SQLAREA_PLAN_HASH.


    We see a lot of sections that are different from one another, but Compare is not
    intelligent enough to tell us what is important in all cases. In this case we
    can confirm that the elapsed time was slightly higher on the second target system
    than on the first system. In this case the amber color used in the report indicates
    that the comparisons are not so different as to cause a problem but should probably
    be investigated if there aren’t any other more pressing problems. In percentage
    terms “Avg User I/O Wait Time in secs” is very different (as one of the values
    is 0.000), so this is highlighted in red. The same applies to disk reads. Other
    differences are not so important (such as plan time stamp), but these are shown
    in red anyway. Remember these are only guidelines, so you must decide what’s important
    in terms of a difference because you know your environment and circumstances.
    SQLTCOMPARE is there to show you the differences so as to allow you to make a
    good decision quickly.


    Summary


    Comparison of two SQL statement IDs and plan hash values is an invaluable method
    for highlighting differences, which sometimes do not stand out on individual inspection.
    SQLTCOMPARE is also invaluable in confirming the differences detected by users
    or developers and thereby eliminating other sources as the cause of differences.
    Different environments can often be challenging to compare because there are so
    many differences that can affect the execution plan. SQLTCOMPARE grabs all the
    information available and shows it side by side in a simple-to-read report. Yet
    another case of SQLTXPLAIN making a complex job fast and easy. In the next chapter
    we look at building good test cases and how these can be used to modify your execution
    plan.


    CHAPTER 11


    ![image](Images/frontdot.jpg)


    Building Good Test Cases


    Occasionally there are tuning problems where the solution is not obvious from
    the examination of the SQLTXTRACT or SQLTXECUTE report. All the usual suspects
    have been eliminated and a more thorough investigation may be required. In cases
    like these it is useful to build a test case to allow experimentation away from
    the main environment. If you are investigating a problematic SQL in a test environment,
    normally you would try and make the environment the same as the environment you
    are attempting to replicate. This is often very difficult to do because there
    are many factors affecting an environment that need to be copied. Here are some
    of them.


    *   Hardware

    *   Software

    *   CBO parameters

    *   Object Statistics

    *   Dictionary statistics

    *   Data

    *   Table clustering factors.

    *   Indexes

    *   Sequences

    *   Tables


    There are many other factors; some factors may be crucial to your problem, but
    others may not be. You can try and build a test case the old fashioned way, by
    exporting the data and associated statistics to a test environment, but this is
    an error prone manual process, unless you’ve built a script to do this. Luckily
    SQLT does everything needed to build a test case in a few very simple steps. It’s
    platform independent, so you can run a Solaris test case on Windows for example:
    it’s easy to use and automated. The only thing that is not usually replicated
    is the data (because that would usually make the test case too big). However,
    data can be included if needed (we include an example at the end of this chapter).


    ![image](Images/sq.jpg) **Warning**  Only run test case setup scripts in environments
    that you can easily replace. Some of the scripts involved in setting up the test
    environment will change the operational environment. There is a good reason you
    need access to SYS to carry out these operations. They will change system setup.
    Typically, you would create a stand-alone database for a test case and work with
    only that test case in your environment. When you are finished with the test case
    you would drop the entire database. Re-using such a database would be a dangerous
    course of action. Any number of CBO parameters may have been changed. Only set
    up test case in scrap databases. You have been warned.


    What Can You Do with Test Cases?


    In some situations tuning can be a tricky job. Before you can start to investigate
    the problem, you have to understand what all the parts of the execution plan are
    doing. Sometimes this understanding comes from tinkering with a copy of the SQL
    and its environment. You can add indexes, change hints, change optimizer parameters,
    drop histogram statistics—the list is endless. These kinds of things are done
    not at random but based on some understanding (or at least as much as you have
    at the time) of the problem at hand.


    All this kind of tinkering cannot be done on a production environment, and it
    is often difficult to do on a development environment because the risk is too
    high that some aspect of your case will affect someone else: for example, public
    synonyms or sequences. On the other hand if you can set up a little private database
    with a good test case you can change all sorts of parameters without affecting
    anyone directly. As long as the versions of the database are the same you will
    get mostly the same behavior. I say “mostly” because in some cases (such as Exadata)
    there are specific issues that need an environment closer to the one you are replicating.
    Hybrid columnar compression, for example, cannot be done on a non-Exadata environment.
    DBAs and developers have been creating scripts to create test cases for their
    environment ever since Oracle was released, but as the complexity of environments
    increased setting up good robust cases has taken longer and longer. These hand-crafted
    test cases are useful but too time consuming to create. SQLT does all of the hard
    work for you by automatically collecting all the required metadata and statistical
    information.


    Building a Test Case'
  trans: '

    # SQL 性能指标与测试用例构建


    ## 性能指标概述


    在比较 SQL 性能时，以下指标至关重要：


    *   `Avg. Elapsed Time in secs`：如果系统负载相当，此指标明确指示 SQL 的性能。

    *   `Avg. CPU Time in secs`：将 CPU 时间与总耗时对比，可判断 SQL 是否受 CPU 限制。

    *   `Avg. User I/O Wait Time in secs`：衡量 I/O 所花费的时间，可判断是否受 I/O 限制。

    *   `Avg. Buffer Gets`：在活动频繁、难以判断单次运行相对性能的繁忙系统上，是同一 SQL 不同运行间良好的比较指标。

    *   `Avg. Disk Reads`：显示有多少读取操作访问了磁盘。

    *   `Avg. Direct Writes`：指示有多少 I/O 是直接写入。

    *   `Avg. Rows Processed`：在数据相同的情况下，比较时期望此值相同。

    *   `Total Executions`：了解 SQL 在每个系统上运行的次数。

    *   `Total Fetches`：衡量所有执行中返回的数据量。

    *   `Total Version Count`：系统上找到的游标版本数量的计数。

    *   `Total Loads`：SQL 被加载的次数。

    *   `Total Invalidations`：显示 SQL 失效的次数。

    *   `Is Bind Sensitive`：在第 7 章中讨论。

    *   `Min Optimizer Environment`：显示最小优化器环境哈希值。

    *   `Max Optimizer Environment`：显示最大优化器环境哈希值（此值与前一个值对于比较环境值很有用）。

    *   `Optimizer Cost`：用于比较总体成本。

    *   `Estimated Cardinality`：用于查看优化器的估计值。

    *   `Estimated Time in Seconds`：优化器计算的另一种度量。

    *   `Plan Time Stamp`：显示执行计划的计算时间。

    *   `First Load Time`：计划首次加载到内存的时间。

    *   `Last Load Time`：计划最后一次加载到内存的时间。

    *   `Src`：显示信息的来源。

    *   `Source`：显示在此案例中使用的来源是 `GV$SQLAREA_PLAN_HASH`。


    我们看到许多不同的部分，但 `SQLTCOMPARE` 并不够智能以告诉我们所有情况下什么才是重要的。在此案例中，我们可以确认第二个目标系统的耗时略高于第一个系统。报告中使用的琥珀色表示比较结果差异不大，不足以引发问题，但如果不存在其他更紧迫的问题，可能仍需调查。在百分比方面，“Avg
    User I/O Wait Time in secs”差异非常大（因为其中一个值为 0.000），因此以红色高亮显示。磁盘读取（`disk reads`）也是如此。其他差异（如计划时间戳）不那么重要，但仍以红色显示。请记住，这些只是指导方针，您必须根据您对环境和情况的了解来决定什么差异是重要的。`SQLTCOMPARE`
    的作用是向您展示差异，以便您快速做出明智的决策。


    ## 总结


    比较两个 SQL 语句 ID 和计划哈希值是一种极其宝贵的方法，可以突出那些单独检查时可能不明显的差异。`SQLTCOMPARE` 对于确认用户或开发人员检测到的差异、从而排除其他导致差异的原因也至关重要。不同的环境通常难以比较，因为有太多因素会影响执行计划。`SQLTCOMPARE`
    收集所有可用信息，并以简单易读的报告并排展示。这再次体现了 `SQLTXPLAIN` 如何让复杂的工作变得快速而简单。在下一章中，我们将探讨如何构建良好的测试用例以及如何利用它们来修改您的执行计划。


    # 第 11 章


    ![image](img/frontdot.jpg)


    ## 构建良好的测试用例


    偶尔会遇到一些性能调优问题，通过检查 `SQLTXTRACT` 或 `SQLTXECUTE` 报告无法明显得出解决方案。所有常见的嫌疑因素都已排除，可能需要更彻底的调查。在这种情况下，构建一个测试用例以允许在主要环境之外进行实验是很有用的。如果您正在测试环境中调查有问题的
    SQL，通常您会尝试使该环境与您试图复制的环境保持一致。这通常非常困难，因为有许多影响环境的因素需要复制。以下是其中一些因素：


    *   硬件

    *   软件

    *   CBO 参数

    *   对象统计信息

    *   数据字典统计信息

    *   数据

    *   表聚簇因子

    *   索引

    *   序列

    *   表


    还有许多其他因素；有些因素对您的问题可能至关重要，而另一些则可能不是。您可以尝试用传统方式构建测试用例，即导出数据和相关统计信息到测试环境，但这容易出错且是手动过程，除非您已经编写了脚本来完成此操作。幸运的是，`SQLT`
    只需几个非常简单的步骤就能完成构建测试用例所需的一切。它是平台无关的，因此例如您可以在 Windows 上运行 Solaris 测试用例；它易于使用且自动化。通常无法复制的唯一东西是数据（因为这通常会使测试用例过大）。然而，如果需要，也可以包含数据（我们在本章末尾提供了一个示例）。


    ![image](img/sq.jpg) **警告** 仅在您可以轻松替换的环境中运行测试用例设置脚本。设置测试环境所涉及的一些脚本会更改操作环境。您需要
    `SYS` 权限才能执行这些操作是有充分理由的。它们会改变系统设置。通常，您会为测试用例创建一个独立的数据库，并在您的环境中仅使用该测试用例。完成测试用例后，您会删除整个数据库。重复使用这样的数据库将是一个危险的操作。任何数量的
    CBO 参数都可能已被更改。**仅在废弃数据库中设置测试用例。特此警告。**


    ## 您能用测试用例做什么？


    在某些情况下，调优可能是一项棘手的工作。在开始调查问题之前，您必须了解执行计划的各个部分在做什么。有时这种理解来自于对 SQL 及其环境的副本进行调试。您可以添加索引、更改提示、更改优化器参数、删除直方图统计信息——可能性无穷无尽。这类操作并非随机进行，而是基于对当前问题的一些理解（或至少是您当时掌握的尽可能多的理解）。


    所有这些调试都无法在生产环境中进行，在开发环境中也常常难以进行，因为风险太高，您案例的某些方面可能会影响他人：例如公共同义词或序列。另一方面，如果您能建立一个包含良好测试用例的小型私有数据库，您就可以更改各种参数而不会直接影响任何人。只要数据库的版本相同，您将获得基本相同的行为。我说“基本”是因为在某些情况下（例如
    Exadata），需要更接近您所复制环境的环境来处理特定问题。例如，混合列压缩（Hybrid columnar compression）无法在非 Exadata
    环境中完成。自 Oracle 发布以来，DBA 和开发人员一直在为其环境编写脚本来创建测试用例，但随着环境复杂性的增加，设置健壮的良好测试用例所需的时间越来越长。这些手工制作的测试用例很有用，但创建起来过于耗时。`SQLT`
    通过自动收集所有必需的元数据和统计信息，为您完成了所有艰苦的工作。


    ## 构建测试用例

