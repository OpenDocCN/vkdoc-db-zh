    _bloom_predicate_pushdown_to_storage 启用或禁用布隆过滤器谓词下推到存储\n_bloom_folding_enabled\
    \               启用布隆过滤器折叠\n_bloom_pushing_max                   布隆过滤器推送大小上限\n\
    _bloom_pruning_enabled               启用使用布隆过滤的分区修剪\nparallel_force_local     \
    \            强制单实例执行\n\n16 行已选择。\n\n使用此方法，优化器参数、修复控制设置和特殊的 Exadata 参数是您可以探索的唯一内容，但请记住，您仍然可以更改基线环境并每次重新运行探索。每次\
    \ XPLORE 迭代都需要相当长的时间，因此如果您进行此类更改，需要在投入 XPLORE 运行之前确保方向正确。\n\n**XPLORE 无法更改的内容**\n\
    \nXPLORE 无法更改您的 SQL 结构，也不会建议创建或删除表上的索引。它纯粹是用于发现当 CBO 参数更改或修复控制更改时发生的变化。尽管 XPLORE\
    \ 不能为您更改这些内容，但您可以自由修改 `q.sql` 中的查询并重新运行 XPLORE。例如，您可能决定需要更改索引类型或删除一个索引。这同样超出了\
    \ XPLORE 的范围，但可以用更好的方式完成。\n\n**什么是修复控制？**\n\nOracle 是一个极其灵活的产品，拥有许多特性和错误修复，其中一些默认关闭，一些默认开启。修复控制是\
    \ Oracle 内部允许将错误修复从 0（FALSE）更改为 1（TRUE）或反之的机制。可以想象，以这种方式启用或禁用错误修复应仅在可丢弃的数据库上进行，因为它可能会严重损害您的数据库（在进行任何此类更改之前，请开立支持请求）。让我们从\
    \ `xplore_script_1.sql`（整个 XPLORE 过程的主脚本）中使用的众多设置中查看一个示例。我们将以 6897034 修复控制参数为例。还有许多其他类似的修复控制参数，我们不会一一描述，但它们都以类似方式控制。这个特定的修复控制参数控制着在估算基数时考虑\
    \ NULL 行的错误修复。当 `\"_fix_control\"` 为 true 时，优化器会考虑 NULL 值。这里我们将其设置为 FALSE，这在真实场景中可能不是您想做的事情。\n\
    \n```\nALTER SESSION SET \"_fix_control\" = '6897034:0';\n```\n\n脚本 `xplore_script_1.sql`\
    \ 是 XPLORE 过程的主驱动脚本，它将在 XPLORE 的一次迭代中将此修复控制设置从其默认值更改为非默认值。在此例中，它将从 1 更改为 0。设置为\
    \ 1 时，此修复控制设置开启；设置为 0 时，此修复控制功能关闭。我们可以通过查询 `v$system_fix_control` 来找出此修复控制设置所代表的功能是什么。下面我展示一个查询，用于在本地数据库中查询此特定修复控制设置的含义：\n\
    \n```\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
    \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n\nBUGNO\
    \      VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE  IS_DEFAULT\n----------\
    \ ---------- --------------------- ------------------------- ----------\n   6897034\
    \          1 index cardinality est 10.2.0.5                           1\n    \
    \                  imates not taking int\n                      o account NULL\
    \ rows\n```\n\n在这个特定案例中，错误编号 6897034 与索引基数估算以及这些估算与行中 NULL 值的关系有关。这可能是一个相当严重的问题，因此默认情况下设置为\
    \ 1（TRUE）。我运行的脚本会将其设置为 0，以查看这是否会对执行计划产生影响。此值设置为 1 的最早 Oracle 版本是 10.2.0.5。在之前的版本\
    \ 10.2.0.4 中，该值为 0（或者该错误修复尚未引入）。\n\n记得我说过 `optimizer_features_enable` 就像一个超级开关。嗯，我们现在可以通过将\
    \ `optimizer_features_enable` 设置为 10.2.0.4 并观察此特定修复控制的变化来测试这一点。首先我显示 `optimizer_features_enable`\
    \ 的当前值，然后显示修复控制的当前值。接着我将超级参数更改为 10.2.0.4（先在会话级别，然后在系统级别）。我需要设置的值是 10.2.0.5 之前的值，即修复控制的\
    \ `OPTIMIZER_FEATURE_ENABLE` 列的值。（是的，列名是 `OPTIMIZER_FEATURE_ENABLE,`，而参数是 `optimizer_features_enable`）。在系统级别设置超级参数后，我重新查询修复控制的值，看到超级参数已经发挥作用，并将修复控制设置为该版本应有的值。\n\
    \n```\nSQL> show parameter optimizer_features_enable;\n\nNAME                \
    \                 TYPE        VALUE\n------------------------------------ -----------\
    \ ------------------------------\noptimizer_features_enable            string\
    \      11.2.0.1\n\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
    \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n\nBUGNO\
    \      VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE  IS_DEFAULT\n----------\
    \ ---------- --------------------- ------------------------- ----------\n   6897034\
    \          1 index cardinality est 10.2.0.5                           1\n    \
    \                  imates not taking int\n                      o account NULL\
    \ rows\n\nSQL> alter session set optimizer_features_enable='10.2.0.4';\n\nSession\
    \ altered.\n\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
    \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n\nBUGNO\
    \      VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE  IS_DEFAULT\n----------\
    \ ---------- --------------------- ------------------------- ----------\n   6897034\
    \          1 index cardinality est 10.2.0.5                           1\n    \
    \                  imates not taking int\n                      o account NULL\
    \ rows\n\nSQL> alter system set optimizer_features_enable='10.2.0.4' scope=memory;\n\
    \nSystem altered.\n\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
    \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n```\n"
- fmt: "# An Example XPLORE Session\n\n| BUGNO | VALUE | DESCRIPTION | OPTIMIZER_FEATURE_ENABLE\
    \ | IS_DEFAULT |\n| :--- | :--- | :--- | :--- | :--- |\n| 6897034 | 0 | index\
    \ cardinality estimates not taking into account NULL rows | 10.2.0.5 | 1 |\n\n\
    ```\nIf we run the super script it will do this step so that this parameter is\
    \ set. The result will be that during that step of the XPLORE script we have a\
    \ non-default set up for the session. It seems unlikely that this parameter is\
    \ going to improve your query, but it’s not impossible. Imagine a case where some\
    \ SQL is reliant on a faulty calculation for cardinality, which is then “fixed”\
    \ by applying the fix for bug 6897034. Then the SQL could regress (perform less\
    \ well), and it could then appear that the SQL was broken by an upgrade to 10.2.0.5.\
    \ However, the XPLORE method is only applying a brute force approach; it just\
    \ powers through every single option and lets you supply the intelligence to determine\
    \ what is important and what is not. Now we know how XPLORE works, when to use\
    \ it, and how to use it. We also know XPLORE is not the panacea for tuning problems\
    \ but just one more tool on the Swiss Army knife of tuning. Before we look at\
    \ an example XPLORE session let me first explain about SQL monitor.\n```\n\n##\
    \ What Is a SQL Monitor Report?\n\nThe real-time SQL monitoring feature was introduced\
    \ in 11g and is by default turned off. If the SQL uses more than five seconds\
    \ of CPU or runs in parallel the real-time monitoring will be turned on. If this\
    \ feature is enabled statistics metrics are collected as the SQL executes and\
    \ are stored for a few minutes. During that time the view `v$sql_monitor` and\
    \ `v$sql_plan_monitor` contain the performance information. The type of information\
    \ collected can be controlled by the `type` parameter and I’ve selected `active`\
    \ which produces an HTML report type display (This is new in 11g Release 2). This\
    \ detailed information is particularly useful because it shows each step’s use\
    \ of CPU and I/O resources. This can be very helpful in determining which parts\
    \ of your query need to be investigated, and if you are comparing SQL, which parts\
    \ of your query have changed significantly. Below I list a typical set of commands\
    \ you would issue to get a SQL monitor HTML report.\n\n1.  Add the hint `/*+ monitor\
    \ */` in the query. This causes the CBO to monitor the query even if it runs for\
    \ less than five seconds or is not parallel.\n2.  Run your query.\n3.  Get the\
    \ SQL_ID (`select sql_id from v$sql_text where sql_text like '%<Your SQL Text\
    \ here>%';`)\n4.  Then execute this code:\n\n```\nset trimspool on\nset trim on\n\
    set pages 0\nset linesize 1000\nset long 1000000\nset longchunksize 1000000\n\
    spool sqlmon_active_1st_run.html\nselect dbms_sqltune.report_sql_monitor(sql_id=>'&sqlid',type=>'active')\
    \ from\ndual;\nspool off\n```\n\nThis produces an HTML file just like the one\
    \ in [Figure 12-1](#9781430248095_Ch12.xhtml#Fig1).\n\n![9781430248095_Fig12-01.jpg](Images/9781430248095_Fig12-01.jpg)\n\
    \n[Figure 12-1](#9781430248095_Ch12.xhtml#_Fig1). A typical SQL Monitor report\n\
    \nNow that we know what SQL monitor HTML reports are, we’ll see that the XPLORE\
    \ session creates them for us by default. Let’s see the steps required to create\
    \ an XPLORE report.\n\n## Getting Your Test Case Built\n\nAs I mentioned earlier\
    \ there is no way to run XPLORE without first building a test case. In this example\
    \ I’m using the same test case as I used in [Chapter 11](../Text/9781430248095_Ch11.xhtml).\
    \ By navigating to the `xplore` directory under `utl` I am able to easily run\
    \ XPLORE’s install script.\n\n```\nC:\\Documents and Settings\\Stelios\\Desktop\\\
    SQLT 11.4.4.6\\sqlt\\utl\\xplore>sqlplus / as sysdba\nSQL*Plus: Release 11.2.0.1.0\
    \ Production on Mon Dec 17 19:37:00 2012\nCopyright (c) 1982, 2010, Oracle.  All\
    \ rights reserved.\nConnected to:\nOracle Database 11g Enterprise Edition Release\
    \ 11.2.0.1.0 - Production\nWith the Partitioning, OLAP, Data Mining and Real Application\
    \ Testing options\nSQL> @install\nTest Case User: TC64661\nPassword: TC64661\n\
    ```\n\nThis install script grants the test case user enough privileges (DBA) to\
    \ run the scripts that are to follow. Remember this can only be run on a stand-alone\
    \ system that can be replaced easily. The script finishes with\n\n```\nPackage\
    \ created.\nNo errors.\nPackage body created.\nNo errors.\nInstallation completed.\n\
    You are now connected as TC64661.\n1. Set CBO env if needed\n2. Execute @create_xplore_script.sql\n\
    ```\n\nThe first step “Set CBO env if needed” is reminding you that if your test\
    \ case needs to set any environmental settings that you want to be constant for\
    \ all the runs of your test case, then you must set it here. This is then applied\
    \ to the baseline and is executed before each execution of the scripts for each\
    \ test. By giving the install script the test case user you have changed the user\
    \ into a DBA of the system and allowed it to change all system parameters and\
    \ fix control settings. The test case user also knows the script that needs to\
    \ be run and will then proceed to build the template script and then the superscript.\n\
    \n## Building the First Script\n\nThis first script does nothing more than collect\
    \ your settings for your XPLORE session and then calls `xplore.create_xplore_script`\
    \ with those parameters. Here is the line from the script:\n\n```\nEXEC xplore.create_xplore_script(\n\
    \  '&&xplore_method.',         <<<This can take a value of XECUTE or XPLAIN\n\
    \  '&&include_cbo_parameters.',<<<Include CBO parameters or not\n  '&&include_exadata_parameters.',<<<Include\
    \ Exadata specific parameters or not\n  '&&include_fix_control.',   <<<Include\
    \ Fix control or not\n  '&&generate_sql_monitor_reports.'); <<<Generate SQL monitor\
    \ reports or not.\n```\n\nThese lines all make a difference to the final report\
    \ that is created. The `xplore_method` controls XPLORE to allow it to run in XPLAIN\
    \ mode or in XECUTE mode. In XPLAIN mode there is no execution of the SQL. XPLAIN\
    \ mode is generally fast enough for most cases. XECUTE executes the SQL, and if\
    \ there is also data present then this can take a very long time to complete.\
    \ To clarify, the XECUTE option here is not related to the XECUTE method: this\
    \ is an option of XPLORE utility we are talking about here. If the SQL can be\
    \ executed relatively quickly, or if you have enough time to wait for the result\
    \ then XECUTE will give you more information."
