    总结


    在本章中，我们介绍了自适应游标共享的基本行为。我们还看到它如何是 Oracle 多年来引入的各种功能的演进。毫无疑问，这个领域还会有进一步的发展。借助 `SQLTXPLAIN`，我们可以收集有关自适应游标共享的信息，并获得足够的信息来判断它是否有益。在下一章中，我们将介绍另外两个功能：动态采样和基数反馈，它们试图在执行计划出现问题时对其进行修正。


    # 第 8 章


    ![image](img/frontdot.jpg)


    ## 动态采样与基数反馈


    想象一下，你被分配了一项任务：整理一所房子里的一些书籍，找出所有书名中包含“维也纳”一词的书。你被告知书房里有两三本书，如果你需要的话，书桌里还有一个索引。自然地，对于两三本甚至十几本书，使用书桌里的索引是没有意义的，你只需要逐一查看书名，就能快速找到所有书名包含“维也纳”的书。不幸的是，你不知道的是，自从上次有人看过这些书之后，房主已经买下了当地公共图书馆的全部藏书，而你只是在开始之后才发现这一点。如果你坚持原计划，这将是非常漫长的一天。


    在本章中，我们将看到 Oracle 的动态采样和基数反馈功能如何能帮助我们可怜的图书管理员。我们将看到，这两个功能在解析过程的开始和结束时协同工作，以快速得到正确的答案。我们将了解到动态采样和基数反馈并非总是被使用，并且我们会知道这些情况何时出现。在牢记这些知识的同时，我们还将通过
    `SQLTXPLAIN` 来看一个神秘的案例。这次谁是反派，谁是英雄？


    动态采样？


    可怜的优化器必须应对偶尔遇到的糟糕对象统计信息（我们在第 3 章中讨论过），或者完全缺失统计信息的情况。Oracle 开发了动态采样和基数反馈，并非只是为了放任这种情况发生并接受缺失或糟糕的统计信息有时会导致糟糕的执行计划。这两个强大的功能协同工作，以修正缺失或糟糕的统计信息。`SQLT`
    会在检测到使用了动态采样以及基数反馈时进行报告。让我们看一个示例报告。图 8-1 显示了如今熟悉的 `SQLTXPLAIN` 主报告的顶部。


    ![9781430248095_Fig08-01.jpg](img/9781430248095_Fig08-01.jpg)


    图 8-1。 `SQLTXPLAIN` 报告顶部

