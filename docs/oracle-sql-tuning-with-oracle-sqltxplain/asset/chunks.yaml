- fmt: 'We know that [Figure 2-12](#9781430248095_Ch02.xhtml#Fig12) is a `SQLT XECUTE`
    report, (we know this because we have over and under estimate values in the report).
    But what are these over and under estimates? The numbers in the “Last Over/Under
    Estimate” column, represent by how many factors the actual number of rows expected
    by the optimizer for that operation is wrong. The rows returned is also dependent
    on the rows returned from the previous operation. So, for example, if we followed
    the operation count step by step from “Exec Ord” (see [Figure 2-11](#9781430248095_Ch02.xhtml#Fig11)),
    we would have these steps:


    1.  `INDEX RANGE SCAN` actually returned 948 rows

    2.  `INDEX RANGE SCAN` actually returned 948 rows

    3.  The result of step 1 and 2 was fed into a `NESTED LOOP` which actually returned
    948 rows

    4.  `INDEX RANGE SCAN` actually returned 948 rows

    5.  `NESTED LOOP` (of the previous step with result of step 3)


    And so on. The best way to approach this kind of problem is to read the steps
    in the execution plan, understand them, look at the over and under estimates and
    from there determine where to focus your attention.


    Now look at [Figure 2-13](#9781430248095_Ch02.xhtml#Fig13). Step ID 34 (which
    is the third line in [Figure 2-13](#9781430248095_Ch02.xhtml#Fig13) and the 33rd
    step in the execution plan. Remember the execution order is shown by the numbers
    immediately to the left of the operation names e.g. `INDEX RANGE SCAN`) shows
    an under estimate of 11,984. This `NESTED LOOP` is a result of the sections below
    it. We can drill into why the estimates are as they are by clicking on the “+”
    in the “More” column. From the “More” column we can look at the access predicates
    and see why the estimated cardinality and the actual rows returned diverged.


    ![9781430248095_Fig02-13.jpg](Images/9781430248095_Fig02-13.jpg)


    [Figure 2-13](#9781430248095_Ch02.xhtml#_Fig13). Over and under estimated values
    can be good clues


    So for large statements like this, we work on each access predicate, each under
    and over estimate, working from the biggest estimation error to the smallest until
    we know the reason for each. In some cases, the cause will be stale statistics.
    In other cases, it will be skewed data. With `SQLT`, looking at a 200-line execution
    plan is no longer a thing to be feared. If you address each error as far as the
    optimizer is concerned (it expected 10 rows and got 1000) you can, step by step,
    fix the execution plan. You don’t need hints to twist the `CBO` into the shape
    you *guess* might be right. You just need to make sure it has good statistics
    for system performance, single and multiblock read times, CPU speed and object
    statistics. Once you have all the right statistics in place, the optimizer will
    generate a good plan. If the execution plan is sometimes right and sometimes wrong,
    then you could be dealing with skewed data, in which case you’ll need to consider
    the use of histograms. We discuss skewness as a special topic in much more detail
    in [Chapter 4](../Text/9781430248095_Ch04.xhtml).


    ## The Case of the Mysterious Change


    Now that you’ve learned a little bit about `SQLT` and how to use it, we can look
    at an example without any prior knowledge of what the problem might be. Here is
    the scenario:


    A developer comes to you and says his SQL was fine up until 3pm the previous day.
    It was doing hash joins as he wanted and expected, so he went to lunch. When he
    came back the plan had changed completely. All sorts of weird bit map indexes
    are being used. His data hasn’t changed, and he hasn’t collected any new statistics.
    What happened? He ends by saying “Honest, I didn’t change anything.”


    Once you’ve confirmed that the data has not changed, and no-one has added any
    new indexes (or dropped any), you ask for a `SQLT XECUTE` report (as the SQL is
    fairly short running and this is a development system).


    Once you have that you look at the execution plans. The plan in [Figure 2-14](#9781430248095_Ch02.xhtml#Fig14)
    happens to be the one you view first.'
  raw: 'We know that [Figure 2-12](#9781430248095_Ch02.xhtml#Fig12) is a SQLT XECUTE
    report, (we know this because we have over and under estimate values in the report).
    But what are these over and under estimates? The numbers in the “Last Over/Under
    Estimate” column, represent by how many factors the actual number of rows expected
    by the optimizer for that operation is wrong. The rows returned is also dependent
    on the rows returned from the previous operation. So, for example, if we followed
    the operation count step by step from “Exec Ord” (see [Figure 2-11](#9781430248095_Ch02.xhtml#Fig11)),
