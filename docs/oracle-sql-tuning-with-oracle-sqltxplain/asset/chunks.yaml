- fmt: 'System statistics are an often-neglected part of the cost-based optimizer
    environment. If no system statistics have been collected for a system then the
    SQLT section “Current System Statistics” will show nothing for a number of important
    parameters for the system. An example is shown in [Figure 2-3](#9781430248095_Ch02.xhtml#Fig3).
    It will guess these values. But why should you care if these values are not supplied
    to the optimizer? Without these values the optimizer will apply its best guess
    for scaling the timings of a number of crucial operations. This will result in
    inappropriate indexes being used when a full table scan would do or vice versa.
    These settings are so important that in some dynamic environments where the workload
    is changing, for example from the daytime OLTP to a nighttime DW (Data Warehouse)
    environment, that different sets of system statistics should be loaded. In this
    section we’ll look at why these settings affect the optimizer, how and when they
    should be collected, and what to look for in a SQLT report.


    Let’s remind ourselves what the first part of the HTML report looks like (see
    [Figure 2-1](#9781430248095_Ch02.xhtml#Fig1)). Remember this is one huge HTML
    page with many sections.


    ![9781430248095_Fig02-01.jpg](Images/9781430248095_Fig02-01.jpg)


    [Figure 2-1](#9781430248095_Ch02.xhtml#_Fig1) .  The top section of the SQLT report


    From the main screen, in the Global section, select “CBO System Statistics”. This
    brings you to the section where you will see a heading “CBO System Statistics”
    (See [Figure 2-2](#9781430248095_Ch02.xhtml#Fig2)).


    ![9781430248095_Fig02-02.jpg](Images/9781430248095_Fig02-02.jpg)


    [Figure 2-2](#9781430248095_Ch02.xhtml#_Fig2) .  The “CBO System Statistics” section


    Now click on “Info System Statistics.” [Figure 2-3](#9781430248095_Ch02.xhtml#Fig3)
    shows what you will see.


    ![9781430248095_Fig02-03.jpg](Images/9781430248095_Fig02-03.jpg)


    [Figure 2-3](#9781430248095_Ch02.xhtml#_Fig3) .  The “Info System Statistics”
    section


    The “Info System Statistics” section shows many pieces of important information
    about your environment. This screenshot also shows the “Current System Statistics”
    and the top of the “Basis and Synthesized Values” section.


    Notice, when the `System Statistics` collection was started. It was begun on 23^(rd)
    of July 2007 (quite a while ago). Has the workload changed much since then? Has
    any new piece of equipment been added? New `SAN` drives? Faster disks? All of
    these could affect the performance characteristics of the system. You could even
    have a system that needs a different set of system statistics for different times
    of the day.


    Notice anything else strange about the system statistics? The start and end times
    are almost identical. The start and end time `should` be scheduled to collect
    information about the system characteristics at the `start` and `end` times of
    the representative workload. These values mean that they where set at database
    creation time and never changed.  Look at the “Basis and Synthesized Values” sections
    shown in [Figure 2-4](#9781430248095_Ch02.xhtml#Fig4).


    ![9781430248095_Fig02-04.jpg](Images/9781430248095_Fig02-04.jpg)


    [Figure 2-4](#9781430248095_Ch02.xhtml#_Fig4) .  From the “Basis and Synthesized
    Values” section just under “Info System Statistics” section


    The estimated `SREADTIM` (single block read time in ms.) and `MREADTIM` (multi-block
    read time in ms) are 12ms and 58ms, whereas the actual values (just below) are
    3.4ms and 15ms. Are these good values? It can be hard to tell because modern `SAN`
    systems can deliver blistering I/O read rates. For traditional non-SAN systems
    you would expect multi-block read times to be higher than single block read times
    and the normally around 9ms and 22ms. In this case they are in a reasonable range.
    The Single block read time is less than the multi-block read time (you would expect
    that, right?).


    Now look in [Figure 2-5](#9781430248095_Ch02.xhtml#Fig5) at a screen shot from
    a different system.'
  raw: 'System statistics are an often-neglected part of the cost-based optimizer
    environment. If no system statistics have been collected for a system then the
    SQLT section “Current System Statistics” will show nothing for a number of important
    parameters for the system. An example is shown in [Figure 2-3](#9781430248095_Ch02.xhtml#Fig3).
    It will guess these values. But why should you care if these values are not supplied
    to the optimizer? Without these values the optimizer will apply its best guess
    for scaling the timings of a number of crucial operations. This will result in
    inappropriate indexes being used when a full table scan would do or vice versa.
    These settings are so important that in some dynamic environments where the workload
    is changing, for example from the daytime OLTP to a nighttime DW (Data Warehouse)
    environment, that different sets of system statistics should be loaded. In this
    section we’ll look at why these settings affect the optimizer, how and when they
    should be collected, and what to look for in a SQLT report.


    Let’s remind ourselves what the first part of the HTML report looks like (see
    [Figure 2-1](#9781430248095_Ch02.xhtml#Fig1)). Remember this is one huge HTML
    page with many sections.


    ![9781430248095_Fig02-01.jpg](Images/9781430248095_Fig02-01.jpg)


    [Figure 2-1](#9781430248095_Ch02.xhtml#_Fig1) .  The top section of the SQLT report


    From the main screen, in the Global section, select “CBO System Statistics”. This
    brings you to the section where you will see a heading “CBO System Statistics”
    (See [Figure 2-2](#9781430248095_Ch02.xhtml#Fig2)).


    ![9781430248095_Fig02-02.jpg](Images/9781430248095_Fig02-02.jpg)


    [Figure 2-2](#9781430248095_Ch02.xhtml#_Fig2) .  The “CBO System Statistics” section


    Now click on “Info System Statistics.” [Figure 2-3](#9781430248095_Ch02.xhtml#Fig3)
    shows what you will see.


    ![9781430248095_Fig02-03.jpg](Images/9781430248095_Fig02-03.jpg)


    [Figure 2-3](#9781430248095_Ch02.xhtml#_Fig3) .  The “Info System Statistics”
    section


    The “Info System Statistics” section shows many pieces of important information
    about your environment. This screenshot also shows the “Current System Statistics”
    and the top of the “Basis and Synthesized Values” section.


    Notice, when the System Statistics collection was started. It was begun on 23^(rd)
    of July 2007 (quite a while ago). Has the workload changed much since then? Has
    any new piece of equipment been added? New SAN drives? Faster disks? All of these
    could affect the performance characteristics of the system. You could even have
    a system that needs a different set of system statistics for different times of
    the day.


    Notice anything else strange about the system statistics? The start and end times
    are almost identical. The start and end time **should** be scheduled to collect
    information about the system characteristics at the *start* and *end* times of
    the representative workload. These values mean that they where set at database
