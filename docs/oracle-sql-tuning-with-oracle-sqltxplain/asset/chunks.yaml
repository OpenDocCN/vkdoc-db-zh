    Let’s summarize what happened. We created a test table, populated it with skewed
    data, selected a popular value, a moderately popular value, a popular value, and
    finally a rare value a number of times. We would expect the rare value would use
    an index range scan and the popular value would use a full table scan or fast
    full index scan. If we generate a `SQLT XTRACT` report (a `SQLTXECUTE` report
    would be just as good) we can now examine what happened.


    ## Examining ACS with a SQLTXTRACT Report


    ACS information is gathered for both `SQLTXTRACT` and for `SQLTXECUTE` reports.
    Both of these types of `SQLTXPLAIN` reports collect the bind variable information
    (if available) and show you the information in a clear report. Our example report
    happens to be a `SQLTXTRACT` report, but the navigation and examples work for
    both kinds of `SQLTXPLAIN` reports. First we can check to see if the right SQL
    was picked up: see [Figure 7-2](#9781430248095_Ch07.xhtml#Fig2), which shows the
    SQL with a bind variable as expected.


