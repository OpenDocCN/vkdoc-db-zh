- fmt: "# SQL 监控报告与脚本工具\n\n## 执行计划的详细报告\n\n其他的 SQL 监控报告显示了执行计划的细节。所有相关的 SQL 监控报告都被压缩到一个文件中，每个报告代表一次执行。[图\
    \ 14-16](#9781430248095_Ch14.xhtml#Fig16) 详细展示了被监控的 SQL 执行计划。\n\n![9781430248095_Fig14-16.jpg](Images/9781430248095_Fig14-16.jpg)\n\
    \n[图 14-16](#9781430248095_Ch14.xhtml#_Fig16) .  细节面板中“计划统计信息”按钮对应的其中一个 SQL 监控报告\n\
    \n我们在[第 9 章](../Text/9781430248095_Ch09.xhtml)已经介绍过这种执行计划。细节面板的“计划”按钮会显示一个图形化的计划布局，类似于前面[图\
    \ 14-14](#9781430248095_Ch14.xhtml#Fig14)所示。“并行”按钮则显示一些与并行相关的信息（见[图 14-17](#9781430248095_Ch14.xhtml#Fig17)）。它展示了每个并行集花费的\
    \ I/O 请求、缓冲区获取和 CPU 时间。例如，在我的 SQL 中，我看到并行服务器 `p000` 使用了 0.8 秒的数据库时间，而 `P001` 使用了\
    \ 0.9 秒。如果我将鼠标悬停在这些条形图上，会得到更详细的信息，细分为 CPU、I/O 和其他。这类报告应该能让您快速、轻松地调查复杂代码的特定分支。\n\
    \n![9781430248095_Fig14-17.jpg](Images/9781430248095_Fig14-17.jpg)\n\n[图 14-17](#9781430248095_Ch14.xhtml#_Fig17)\
    \ .  显示细节面板上的“并行”按钮页面。并行集 1 已被展开\n\n由 `sqlhc.sql` 脚本生成的主压缩文件内的其余文件是文本文件。一个是该 SQL\
    \ 的 10053 跟踪文件（在[第 5 章](../Text/9781430248095_Ch05.xhtml)介绍过），另一个是 `sqlhc.sql`\
    \ 脚本自身的日志（您可以检查是否有错误）以及为生成 HTML 文件而创建的临时脚本。\n\n## Sqldx.sql 脚本\n\n`Sqldx` 是为收集单条\
    \ SQL 语句的详细信息而编写的。它不需要 SQLT，并会生成许多 CSV 格式文件（逗号分隔值）以便进行进一步分析。它还会生成超过 20 个 HTML\
    \ 格式的文件。\n\n在下面的例子中，我使用了本章一直在用的同一个 SQL，`q3.sql`。要从 `sqldx.sql` 生成报告，我们只需要在 SQL\
    \ 运行过的系统上运行该脚本。本例中的 `SQL_ID` 是 `81s67vj4pjqm8`。当我们运行 `sqldx.sql` 时，会提示我们确认许可级别。选择适当的许可级别。我的情况是\
    \ `T`。\n\n```\nSQL> @sqldx\nParameter 1:\nOracle Pack License (Tuning or Diagnostics)\
    \ [T|D] (required)\nEnter value for 1: T\nPL/SQL procedure successfully completed.\n\
    ```\n\n现在我需要输入报告的格式。`H` 代表 HTML，`C` 代表 CSV 报告，`B` 代表两者。我将选择 `B` 以创建最大数量的文件。一般来说，HTML\
    \ 文件最有用。CSV 文件是锦上添花。它们包含的信息我至今尚未用到。\n\n```\nParameter 2:\nOutput Type (HTML or\
