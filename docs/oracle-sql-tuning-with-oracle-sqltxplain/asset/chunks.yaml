  trans: "\n![9781430248095_Fig02-05.jpg](img/9781430248095_Fig02-05.jpg)\n\n图 2-5.\
    \ 信息系统统计信息下的基准值与合成值部分\n\n注意到实际 `SREADTIM` 和实际 `MREADTIM` 有什么异常之处了吗？\n\n除了实际 `SREADTIM`\
    \ 为 6.809 毫秒（一个较低的值）而实际 `MREADTIM` 为 3.563 毫秒（同样是一个较低的值）这一事实之外，问题在于实际 `MREADTIM`\
    \ 小于 `SREADTIM`。如果你看到这样的数值，你应该警惕一种可能性：全表扫描的成本可能会被计算得比需要单块读取的操作更低。\n\n对优化器而言，`MREADTIM`\
    \ 小于 `SREADTIM` 意味着什么？这大致相当于你告诉优化器，汽车车顶贴地倒着开也没问题。这是本末倒置的。如果优化器将图 2-5 中的值当作事实，它会倾向于选择涉及多块读取的执行步骤。例如，优化器会偏好全表扫描。这对你的运行时执行来说可能非常糟糕。另一方面，如果你拥有一个快速的\
    \ SAN 系统，你的实际 `MREADTIM` 可能确实很低。\n\n以上只是一个错误数值如何将优化器引入歧途的例子。在这个特定案例中，实际上没有实际值、仅依赖优化器的猜测（即估计的\
    \ `SREADTIM` 和 `MREADTIM` 值）反而会更好。那些猜测会比这些实际值更准确。\n\n如何修正我刚刚描述的这种情况？这比你想象的要容易得多。解决此类问题的步骤如下所列：\n\
    \n1.  选择一个能代表你工作负载的时间段。例如，你可以有一个名为 `WORKLOAD` 的日间工作负载。\n2.  创建一个表来存放统计信息。在下面的例子中，我们将表命名为\
    \ `SYSTEM_STATISTICS`。\n3.  在所选时间段内运行 `GATHER_SYSTEM_STATS` 过程来收集统计信息。\n4.  使用\
    \ `DBMS_STATS.IMPORT_SYSTEM_STATS` 导入这些统计信息。\n\n让我们更详细地查看在 2 小时间隔内收集系统统计信息的步骤。第一步，我们创建一个表来存放将要收集的值。第二步，我们调用例程\
    \ `DBMS_STATS.GATHER_SYSTEM_STATS`，其 `INTERVAL` 参数设置为 120 分钟。请记住，`interval` 参数的选择应能反映你具有代表性的工作负载周期。\n\
    \n```\nexec DBMS_STATS.CREATE_STAT_TABLE ('SYS','SYSTEM_STATISTICS');\nBEGIN\n\
    \   DBMS_STATS.GATHER_SYSTEM_STATS ('interval',interval => 120, stattab => 'SYSTEM_STATISTICS',\
    \ statid => 'WORKLOAD');\nEND;\n/\nexecute DBMS_STATS.IMPORT_SYSTEM_STATS(stattab\
    \ => 'SYSTEM_STATISTICS', statid => 'WORKLOAD', statown => 'SYS');\n```\n完成上述操作后，你可以从\
    \ SQLT 报告或一个 `SELECT` 语句中查看这些值。\n\n```\nSQL> select * from sys.aux_stats$;\n\n\
    SNAME                          PNAME                               PVAL1 PVAL2\n\
    ------------------------------ ------------------------------ ---------- ------------------\n\
    SYSSTATS_INFO                  STATUS                                    COMPLETED\n\
    SYSSTATS_INFO                  DSTART                                    09-29-2012\
    \ 11:01\nSYSSTATS_INFO                  DSTOP                                \
    \     09-29-2012 11:02\nSYSSTATS_INFO                  FLAGS                 \
    \                  0\nSYSSTATS_MAIN                  CPUSPEEDNW              \
    \          972.327\nSYSSTATS_MAIN                  IOSEEKTIM                 \
    \             10\nSYSSTATS_MAIN                  IOTFRSPEED                  \
    \         4096\nSYSSTATS_MAIN                  SREADTIM                      \
    \      8.185\nSYSSTATS_MAIN                  MREADTIM                        \
    \   55.901\nSYSSTATS_MAIN                  CPUSPEED                          \
    \    972\nSYSSTATS_MAIN                  MBRC\nSYSSTATS_MAIN                 \
    \ MAXTHR\nSYSSTATS_MAIN                  SLAVETHR\n```\n"
- fmt: "# Cost-Based Optimizer Parameters\n\nAnother input into the CBO’s decision-making\
    \ process (for developing your execution plan) would be the CBO parameters. These\
    \ parameters control various aspects of the cost based optimizer’s behavior. For\
    \ example, `optimizer_dynamic_sampling` controls the level of dynamic sampling\
    \ to be done for SQL execution. Wouldn’t it be nice to have a quick look at every\
    \ system and see the list of parameters that have been changed from the defaults?\
    \ Well with SQLT that list is right there under “CBO Environment”.\n\n[Figure\
    \ 2-6](#9781430248095_Ch02.xhtml#Fig6) is an example where almost nothing has\
    \ been changed. It’s simple to tell this because there are only 2 rows in this\
    \ section of the SQLT HTML report. The `optimizer_mode` has been changed from\
    \ the default. If you see hundreds of entries here then you should look at the\
    \ entries carefully and assess if any of the parameters that have been changed\
    \ are causing you a problem. This example represents a DBA who likes to leave\
    \ things alone.\n\n![9781430248095_Fig02-06.jpg](Images/9781430248095_Fig02-06.jpg)\n\
    \n[Figure 2-6](#9781430248095_Ch02.xhtml#_Fig6) . The CBO environment section.\
    \ Only 2 records indicates a system very close to the default settings\n\n[Figure\
    \ 2-7](#9781430248095_Ch02.xhtml#Fig7) shows an example where more than just two\
    \ parameters have been changed from their default setting. Now instead of 2 rows\
    \ of the previous example we have 8 non-default values. Each one of these parameters\
    \ needs to be justified.\n\n![9781430248095_Fig02-07.jpg](Images/9781430248095_Fig02-07.jpg)\n\
    \n[Figure 2-7](#9781430248095_Ch02.xhtml#_Fig7) . The CBO environment with many\
    \ non-standard parameter settings\n\nWe also have 4 hidden parameters set (they\
    \ are preceded by underscores). In this example each of the hidden parameters\
    \ should be carefully researched to see if it can be explained. If you have kept\
    \ careful records or commented on your changes you may know why `_b_tree_bitmap_plans`\
    \ has been set to FALSE. Often, however, parameters like these can stay set in\
    \ a system for years with no explanation.\n\nThe following are common explanations:\n\
    \n*   Somebody changed it a while ago, we don’t know why, and he/she has left\
    \ now.\n*   We don’t want to change it in case it breaks something.\n\nThis section\
    \ is useful and can often give you a clue as to what has been changed in the past\
    \ (perhaps you’re new to the current site). Take special note of hidden parameters.\
    \ Oracle support will take a good look at these and decide if their reason for\
    \ being still holds true. It is generally true that hidden parameters are not\
    \ likely doing you any favors, especially if you don’t know what they’re for.\
    \ Naturally, you can’t just remove them from a production system. You have to\
    \ execute key SQL statements on a test system and then remove those parameters\
    \ on that test system to see what happens to the overall optimizer cost.\n\nIf\
    \ you get adept at doing this you can even set up different statistics tables\
    \ for different workloads and import them and delete the old statistics when not\
    \ needed. To delete the existing statistics you would use\n\n```sql\nSQL> execute\
    \ DBMS_STATS.DELETE_SYSTEM_STATS;\n```\n\nOne word of caution, however, with setting\
    \ and deleting system stats. This kind of operation will influence the behavior\
    \ of the CBO for every SQL on the system. It follows therefore that any changes\
    \ to these parameters should be made carefully and tested thoroughly on a suitable\
    \ test environment.\n\n## Siebel Environment Considerations\n\nSome environments\
    \ are special just because Oracle engineering have decided that a special set\
    \ of parameters are better for them. This is the case with Siebel Systems Customer\
    \ Relationship Management (CRM) application. There are hidden parameters that\
    \ Oracle engineering has determined get the best performance from your system.\
    \ If your system is Siebel, then in the “Environment” section you will see something\
    \ like that shown in [Figure 2-8](#9781430248095_Ch02.xhtml#Fig8).\n\n![9781430248095_Fig02-08.jpg](Images/9781430248095_Fig02-08.jpg)\n\
    \n[Figure 2-8](#9781430248095_Ch02.xhtml#_Fig8) . Example of parameter settings\
    \ for a Siebel CRM environment\n\nThe “go to” place for Siebel tuning is the “Performance\
    \ Tuning Guidelines for Siebel CRM Applications on Oracle Database” white paper.\
    \ This can be found in Note 781927.1. There are many useful pieces of information\
    \ in this document, but with regard to optimizer parameters, Page 9 lists the\
    \ non-default parameters that should be set for good performance. For example,\
    \ `optimizer_index_caching` should be set to 0.\n\nDo not even attempt to tune\
    \ your SQL on a Siebel system until these values are all correct. For example,\
    \ on the above Siebel system if there was a performance problem, the first steps\
    \ would be to fix all the parameters that are wrong according to Note 781927.1.\
    \ You cannot hope to get stable performance from a Siebel CRM system unless this\
    \ foundation is in place.\n\n## Hints\n\nHints were created to give the DBA and\
    \ developer some control over what choices the optimizer is allowed to make. An\
    \ example hint is `USE_NL`. In the example below I have created two minimal tables\
    \ called `test` and `test2`, each with a single row. Not surprisingly if I let\
    \ the optimizer choose a plan it will use a `MERGE JOIN CARTESIAN` as there are\
    \ only single rows in each of these tables.\n\n```sql\nSQL> select\n  test.col1,\n\
    \  test2.col1\nfrom\n  test,\n  test2\nwhere\n  test.col1=test2.col1;\n      COL1\
    \       COL1\n---------- ----------\n         1          1\n         1       \
    \   1\nSQL> set autotrace traceonly explain;\nSQL> /\nExecution Plan\nPlan hash\
    \ value: 1571755046\n\n| Id  | Operation            | Name  | Rows  | Bytes |\
    \ Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT     |       |     2 |  \
    \  52 |     6   (0)| 00:00:01 |\n|   1 |  MERGE JOIN CARTESIAN|       |     2\
    \ |    52 |     6   (0)| 00:00:01 |\n|   2 |   TABLE ACCESS FULL  | TEST2 |  \
    \   1 |    13 |     3   (0)| 00:00:01 |\n|   3 |   BUFFER SORT        |      \
    \ |     2 |    26 |     3   (0)| 00:00:01 |\n|*  4 |    TABLE ACCESS FULL | TEST\
    \  |     2 |    26 |     3   (0)| 00:00:01 |\n\nPredicate Information (identified\
    \ by operation id):\n\n4 - filter(\"TEST\".\"COL1\" = \"TEST2\".\"COL1\")\nNote\n\
    \n- dynamic sampling used for this statement (level=2)\nSQL> list\n  1* select\n\
    \  test.col1,\n  test2.col1\nfrom\n  test,\n  test2\nwhere\n  test.col1=test2.col1\n\
    ```\n\nThe command `list` above shows the previous DML (Data Manipulation Language).\
    \ I then amended the SQL to contain a single hint. The syntax for all hints begins\
    \ with `/*+` and ends with `*/`. In the case of `USE_NL` the portion inside the\
    \ bracket can take multiple entries representing tables (either a table name,\
    \ as in our case, or an alias if used). Here is the modified query.\n\n```sql\n\
    SQL> select /*+ USE_NL(test) */ * from test, test2 where test.col1=test2.col1;\n\
    \nExecution Plan\n\nPlan hash value: 74026472\n\n| Id  | Operation          |\
    \ Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT\
    \   |       |     2 |    52 |     6   (0)| 00:00:01 |\n|   1 |  NESTED LOOPS \
    \     |       |     2 |    52 |     6   (0)| 00:00:01 |\n|   2 |   TABLE ACCESS\
    \ FULL| TEST2 |     1 |    13 |     3   (0)| 00:00:01 |\n|*  3 |   TABLE ACCESS\
    \ FULL| TEST  |     2 |    26 |     3   (0)| 00:00:01 |\n\nPredicate Information\
    \ (identified by operation id):\n\n3 - filter(\"TEST\".\"COL1\"=\"TEST2\".\"COL1\"\
    )\nNote\n\n-   dynamic sampling used for this statement (level=2)\n```\n\nNotice\
    \ how in the second execution plan a `NESTED LOOP` was used.\n\nWhat we’re saying\
    \ to the optimizer is: “we know you’re not as clever as we are, so ignore the\
    \ rules and just do what we think at this point.”"
