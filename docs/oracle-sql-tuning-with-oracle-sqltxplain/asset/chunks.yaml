    Review first `sqltrcasplit_error.log` file for possible fatal errors.\nReview\
    \ next `trca_e68572.log` for parsing messages and totals.\nCopying now generated\
    \ files into local directory\n  adding: `trca_e68572.log` (164 bytes security)\
    \ (deflated 65%)\n  adding: `trca_e68572_10046.trc` (164 bytes security) (deflated\
    \ 93%)\n  adding: `trca_e68572_not_10046.trc` (164 bytes security) (deflated 91%)\n\
    \  adding: `sqltrcasplit_error.log` (164 bytes security) (deflated 79%)\ndeleting:\
    \ `sqltrcasplit_error.log`\nFile `trca_e68572.zip` has been created.\nSQLTRCASPLIT\
    \ completed.\n\n## SQLTRCASPLIT 工具说明\nOnce the script has finished, I have a zip\
    \ file in the local directory called `trca_e68572.zip` (in my example) containing\
    \ the results of the split. If I create a directory and put the files from the\
    \ zip file in this directory I see that there are two files. One is named `trca_e68572_10046.trc`\
    \ and one is named `trca_e68572_not_10046.trc`. Now we can look at the 10046 trace\
    \ file without the 10053 trace information making the interpretation less difficult.\n\
    \n## TRCANLZR 工具介绍\nTRCANLZR is used to analyze multiple trace files and generate\
    \ one aggregated form of information. In the example below I have added a parallel\
    \ hint to force parallel execution and multiple trace files. This is the SQL I\
    \ used with the hint in place.\n\n```sql\nselect /*+ parallel (s, 2) */\n  country_name,\
    \ sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries co\nwhere\n\
    \  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name in\
    \ (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
    \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n\
    ```\n\nOnce I have enabled tracing for 10046 (see the earlier section “How Do\
    \ We Collect 10046 Trace”) I have a number of trace files in the trace directory.\
    \ To allow TRCANLZR to know which files to analyze I created a text file called\
    \ `control.txt` that lists the file names in the trace directory that relate to\
    \ the execution of the SQL. This is what `control.txt` contains.\n\n```text\n\
    snc1_p003_3480_10046.trc\nsnc1_p003_3480.trc\nsnc1_p002_5284_10046.trc\nsnc1_p002_5284.trc\n\
    snc1_p001_4320_10046.trc\nsnc1_p001_4320.trc\nsnc1_p000_3600_10046.trc\nsnc1_p000_3600.trc\n\
    snc1_j000_4656.trc\n```\n\nBy the way the file name `control.txt` is hard-coded\
    \ and part of SQLT. You have to use this file name. Also notice in this case that\
    \ some of the files contain the text “10046” and some do not. Remember that 10046\
    \ trace files will not usually have the text 10046 in the name unless you specify\
    \ it with:\n\n`alter session set tracefile_identifier='10046'`\n\nWhen I run `sqltracnlzr.sql`\
    \ I am prompted for a control file name or a trace file to analyze. In my case\
    \ I have a number of trace files so I entered `control.txt`. This file is located\
    \ in the same directory as the trace files. The execution of `sqltrcanlzr` finishes\
    \ with the following screen.\n\n```text\n adding: trca_e68578.html (164 bytes\
    \ security) (deflated 92%)\n  adding: trca_e68578.log (164 bytes security) (deflated\
    \ 90%)\n  adding: trca_e68578.txt (164 bytes security) (deflated 87%)\n  adding:\
    \ trca_e68578_nosort.tkprof (164 bytes security) (deflated 78%)\n  adding: trca_e68578_sort.tkprof\
    \ (164 bytes security) (deflated 78%)\n  adding: sqltrcanlzr_error.log (164 bytes\
    \ security) (deflated 86%)\ndeleting: sqltrcanlzr_error.log\n\nFile trca_e68578.zip\
    \ has been created.\n\nSQLTRCANLZR completed.\n```\n\nIn the run directory of\
    \ SQLT I now have a zip file, which as usual I create a directory for and unzip\
    \ the files into that directory. The HTML file in this directory is the Trace\
    \ Analyzer file. It starts with the list of trace files it analyzed. See [Figure\
    \ 13-1](#9781430248095_Ch13.xhtml#Fig1).\n\n![9781430248095_Fig13-01.jpg](Images/9781430248095_Fig13-01.jpg)\n\
