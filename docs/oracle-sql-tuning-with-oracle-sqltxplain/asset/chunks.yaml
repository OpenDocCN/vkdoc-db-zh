    “Tables”页面向我们展示了[图 4-3](#9781430248095_Ch04.xhtml#Fig3)中的屏幕。


    ![9781430248095_Fig04-03.jpg](Images/9781430248095_Fig04-03.jpg)


    **[图 4-3](#9781430248095_Ch04.xhtml#_Fig3)** .  报告的表部分


    从[图 4-3](#9781430248095_Ch04.xhtml#Fig3)（它只显示了屏幕的左侧），我们现在可以点击任何单个表的“Cols”（列）超链接以查看列详情。在这个例子中，我们正在查看TABLE
    1，因此我们点击相应的链接。这使我们进入了[图 4-4](#9781430248095_Ch04.xhtml#Fig4)所示的屏幕（它是屏幕的右侧），我在其中高亮显示了“FREQUENCY”超链接，它将带我们进入TABLE
    1的COL2的直方图。


    ![9781430248095_Fig04-04.jpg](Images/9781430248095_Fig04-04.jpg)


    **[图 4-4](#9781430248095_Ch04.xhtml#_Fig4)** .  COL2的直方图超链接


    通过点击COL2的“FREQUENCY”直方图，我们到达了[图 4-5](#9781430248095_Ch04.xhtml#Fig5)所示的屏幕。“FREQUENCY”（频率）和“HEIGHT
    BALANCED”（高度均衡）这两种类型的直方图将在后面的部分讨论，但可以说，它们都是表示桶频率的方法。


    ![9781430248095_Fig04-05.jpg](Images/9781430248095_Fig04-05.jpg)


    **[图 4-5](#9781430248095_Ch04.xhtml#_Fig5)** .  来自SQLT的示例直方图


    该图显示，对于值为“1”，估计基数（cardinality）约为190万，而对于值“17”，估计基数约为4000。这些数据偏斜吗？当然是。在[图 4-5](#9781430248095_Ch04.xhtml#Fig5)中，估计基数按流行度进行了排序，但情况并非总是如此。请看我们示例表`test3`的[图
    4-6](#9781430248095_Ch04.xhtml#Fig6)。


    ![9781430248095_Fig04-06.jpg](Images/9781430248095_Fig04-06.jpg)


    **[图 4-6](#9781430248095_Ch04.xhtml#_Fig6)** .  针对我们的test3示例的另一个示例直方图表。SYNONYM很受欢迎


    在这个示例直方图中，我们看到了列显示中呈现的基本事实：桶的数量（33）、表中的行数、空值的数量以及样本大小。在这个案例中，样本大小非常小。


    这些数据看起来高度偏斜。对于“端点实际值”（Endpoint Actual Value）为“DIMENSION”的情况，估计选择率（selectivity）是0.000182。对于JAVA_CLASS，选择率是0.313704。这意味着，由于空值数量为0，如果针对`object_type`的谓词使用值“JAVA
    CLASS”，将近三分之一的表将被返回。如果谓词使用值“JAVA RESOURCE”，那么选择率仅为0.011996，基数为883，而“JAVA CLASS”的基数为23,083。即使面对如此高度偏斜的数据，你也可以问自己：“这种偏斜度与我的查询相关吗？”如果列`object_type`没有参与你的查询，那么这种偏斜度对你来说就不重要。


