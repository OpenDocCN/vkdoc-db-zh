    [图 13-5](#9781430248095_Ch13.xhtml#_Fig5) . TRCANLZR 报告的“Top SQL”部分


    # TRCAXTR


    TRCAXTR 是一个组合报告工具，它接受与 TRCANLZR（如上一节所述）相同的参数，但随后会从报告中确定 top SQL 并通过 XTRACT 运行它。在上面的例子中，top
    SQL 将是 [图 13-5](#9781430248095_Ch13.xhtml#Fig5) 中“SQL Text”标题下的那一个。你通过在命令行输入以下内容来运行
    `sqltrcxtr.sql`：


    ```sql

    SQL> @sqltrcxtr.sql

    ```


    系统将提示你输入与 TRCANLZR 相同的参数，但在该工具结束后，系统将提示你输入运行 XTRACT 的参数。


    系统将提示你输入以下参数：


    *   包含跟踪文件的文件，或包含跟踪文件的控制文件（如前所述，`control.txt` 是“控制”文件，可以包含多个跟踪文件名）

    *   SQLTXPLAIN 密码


    这个过程非常长，因为它会遍历所有跟踪文件，为每个 SQL 生成 XTRACT。顶级的 zip 文件名为 `sqlt_snnnnn_set.zip`。该文件包含跟踪文件中每个
    SQL 的所有 XTRACT。这个简单的例程，参数很少，却能产生非常多需要分析的文件。它可以快速收集整个会话的信息，但请注意，生成的 zip 文件可能非常大。


    ## 修改 SQLT 行为


    SQLT 有很多方面和许多可用的工具。尽管如此，仍然存在 SQLT 可以做得更好或需要修改以帮助处理某些情况的情况。幸运的是，这可以通过设置参数来改变 SQLT
    的行为。如果我们看一下熟悉的第一页主报告（见 [图 13-6](#9781430248095_Ch13.xhtml#Fig6)），我们会看到“Tool Configuration
    Parameters”链接。


    ![9781430248095_Fig13-06.jpg](Images/9781430248095_Fig13-06.jpg)


    [图 13-6](#9781430248095_Ch13.xhtml#_Fig6) . 工具配置选项位于全局部分下


    如果我们点击这个链接，就会看到可以在 SQLT 中设置以更改行为或选项的参数列表。这里的许多选项用于开启或关闭功能，例如 `ash_reports`。“Domain”列列出了可能的值，在本例中是“Y”或“N”。


