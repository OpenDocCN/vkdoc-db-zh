- fmt: "# In the simplest terms possible\n\nIn the simplest terms possible, a table\
    \ is a representation of data, and skewness is a property of a data set that results\
    \ in an unexpectedly large or unexpectedly low number of matches for a particular\
    \ column predicate. For example, if we plotted the amount in dollars spent at\
    \ a hardware store for June, July, and August, we might find that the amount spent\
    \ varied by only 10 percent. The variability per week would be very low. If we\
    \ now extend our timeline to include Thanksgiving and Christmas, we would find\
    \ that the amount spent peaks around those dates, so the amount could be twice\
    \ or three times the “normal” June–August amount. If we only had June–August to\
    \ predict the future, we might expect a much lower level of spending. This unexpectedly\
    \ large spending around Thanksgiving and Christmas would give a skewed data set.\n\
    \nIf we now instead plotted the amount each person spent per visit, in groupings\
    \ of $10, we would find another distribution. A few people spend in the $0–$10\
    \ range, perhaps more in the $10.01 to $20 range. The trend would continue up\
    \ to some peak and then fall off. Most people would spend in some specific range,\
    \ and then we would have the “high rollers,” who spend thousands. The graph of\
    \ the amount spent vs. the number of people who spent in this range will be skewed.\
    \ If everybody came to the mall and spent exactly the same amount, then everybody\
    \ would fall into the same range. All the other ranges would have a value of zero.\
    \ This would be a highly skewed data set.\n\nThis highlights a crucial point that\
    \ DBAs and developers should constantly be on the alert for: do you really truly\
    \ understand your data? Sometimes it can be hard because the columns are not named\
    \ in a way that is obvious. This is where database designers, developers, and\
    \ DBAs must work together to get good structures, relevant indexes, and primary\
    \ and foreign keys. In some databases you’ll find that if sampling is set to automatic,\
    \ you’ll find column statistics are collected (sometimes with very small sample\
    \ sizes), but that do no good because there is no skewness. In [Figure 4-1](#9781430248095_Ch04.xhtml#Fig1),\
    \ we see the information about what statistics were collected for each of the\
    \ columns in the table `TABLE 1`.\n\n![9781430248095_Fig04-01.jpg](Images/9781430248095_Fig04-01.jpg)\n\
    \n[Figure 4-1](#9781430248095_Ch04.xhtml#_Fig1). Table column statistics showing\
    \ the sample size and number of distinct values.\n\nIn the figure for the `SQLT`\
    \ report collected, we see, under the “Table Column” section, for the particular\
    \ table `TABLE 1`, that a number of columns have had column statistics collected.\
    \ Look at the highlighted section for `COL1`. It had 100 percent statistics collected.\
    \ `COL4` had 0.1 percent collected. Why is there such a vast difference between\
    \ the `COL1` and `COL4`? This is because the automatic sampling algorithm chose\
    \ only 5,791 rows for its `COL4` sample size. Let me explain what the optimizer\
    \ does when it samples these columns.\n\nIn this case, for table `TABLE 1`, for\
    \ **each** column `COL1`, `COL2`, `COL3`, `COL4`, etc., the statistics gathering\
    \ algorithm is sampling the values from the table. The sample size is shown in\
    \ the “Sample Size” column. So if `COL1` was the amount spent, then the statistics\
    \ sampling algorithm would sample the columns and find there was some distribution\
    \ of data (as we discussed above). If `COL4` was the store name, it would sample\
    \ the data and find there were a certain number of distinct values (38 in this\
    \ case). In each case, however, there are 5,144,909 rows of data. It’s not documented\
    \ what the algorithm does exactly to decide on the sample size, but it’s pretty\
    \ clear that if the first sample was “Joe’s Hardware,” the second sample was “Joe’s\
    \ Hardware,” and the third sample was “Joe’s Hardware,” the statistics-gathering\
    \ algorithm might begin to “guess” after the one-thousandth sample that all the\
    \ values it samples are statistically very close together. If your data is highly\
    \ skewed and there was only one value in the entire column population of, say,\
    \ “Sally’s Hardware” inserted in `COL4`, then by random sampling the statistics\
    \ collection algorithm might miss this value. Suppose further that despite the\
    \ fact that the “Sally’s Hardware” value is very rare, it is the value used in\
    \ the predicate for this query. In Oracle 10g, you might well end up with a sub-optimal\
    \ plan depending on the first value used for the predicate. In 11g, you would\
    \ have Adaptive Cursor Sharing to help you (we discuss this more in [Chapter 7](../Text/9781430248095_Ch07.xhtml)).\
    \ If, on the other hand, however, you knew that your data was highly skewed in\
    \ this way, and you saw that your auto sample size was tiny, you might very well\
    \ decide that choosing a larger sample size might be a good idea.\n\n## How to\
    \ Tell If Data Is Skewed\n\nSkewness is so important that as a DBA or developer,\
    \ you should be on the alert for columns that might contain skewed data. When\
    \ data sets are as large as they are today, it is very difficult to immediately\
    \ tell if a data set is skewed. `SQLTXPLAIN` makes the job much easier for you\
    \ by showing the statistics for the histograms, if there are any.\n\nSo how do\
    \ you find out if data is skewed? There’s more than one way of seeing the collected\
    \ data, but all methods rely on sampling. The simplest way to sample is with a\
    \ query (as shown below). In this simple example, we create a test table `test3`\
    \ with a `CTAS` (Create Table As Select) statement from a known (at least to me)\
    \ skewed data set: the `object_type` column of the `dba_objects` view. The `dba_objects`\
    \ view lists attributes of the objects in the database, including the object type.\
    \ There are many different object types: for example, `table` (this is a very\
    \ common object type) and `dimension` (this is a very rare object type). Once\
    \ we’ve created a test table called `test3`, which will contain 73,583 rows, we\
    \ can sample the number of each type of object: this will give us an idea of the\
    \ data set’s skewness.\n\n```sql\nSQL> create table test3 (object_type) as select\
    \ object_type from dba_objects;\nTable created.\n\nSQL> select object_type, count(object_type)\n\
    \  from test3 group by object_type order by count(object_type);\n```"
