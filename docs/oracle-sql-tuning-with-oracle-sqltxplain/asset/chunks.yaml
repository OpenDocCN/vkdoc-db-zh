    The `Bind Sensitive` column is always set to “yes” in this case, for all the children.
    But how does the second child get created and when? The algorithm is not published
    or documented, but the clue is under the histogram heading in the Adaptive Cursor
    Sharing section. Look at the `Bucket ID` column. There appear to be only three
    buckets, `0`, `1`, and `2`. The annotation at the bottom mentions that a `0` bucket
    represents less than 1k. The `1` bucket represents greater than 1k but less than
    1M, and bucket `2` represents everything that is more than 1M. So for cursor `0`
    (remember this was the `SYNONYM` and `TABLE` values) there were a total of six
    executions, all of them with fewer than 1M buffer gets. For child number `1` the
    situation is different. Every one of its six executions had fewer than 1K in buffer
    gets. This is why after the seventh execution a new child is created that is bind
    aware. Some DBAs call this “warming the bucket.” The idea is there is no point
    in creating a new bucket (and the overhead that goes with that) if the predicate
    value is rarely going to be seen. We also judge if a predicate is the same as
    another child by this broad criteria. Once the cursor is bind aware it can be
    used for matching bind values that are peeked. In this simple example this would
    mean that two execution plans are possible and available based on the bind values.


    This chapter covered what Adaptive Cursor Sharing is and how it works. The example
    shown is a simple one- dimensional example; there was only one column with skewed
    data. If you had a table with multiple columns of skewed data then you could potentially
    get different combinations of the columns, which would each generate their own
    child cursor. ACS allows for this by creating a range of selectivities for each
    column.


    Does ACS Go Wrong?


    As with all features that attempt to improve performance, there are rare cases
    where performance actually deteriorates. If you feel your execution plans are
    unstable, or the wrong plans have been chosen, you can always disable ACS by setting
    the following parameters (after first checking with Oracle Support):


    ```

    SQL> alter system set "_optimizer_extended_cursor_sharing_rel"=NONE scope=both;

    SQL> alter system set "_optimizer_extended_cursor_sharing"=none scope=both;

    ```


