  trans: "# 7. 执行测试用例\n\n在步骤 7 中，我们终于可以执行测试用例中的 SQL 了。以测试用例用户身份执行测试用例，将输出查询结果以及查询的执行计划。在我们的示例中，结果大致如下所示：\n\
