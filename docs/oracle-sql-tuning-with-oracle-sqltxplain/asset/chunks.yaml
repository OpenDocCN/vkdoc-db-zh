    ********************************************************************************\n\
    ```\n\nIn the TKPROF of the SQL we see the SQL statement, a summary section that\
    \ describes the execution times for “Parse”, “Execute”, and “Fetch”, as well as\
    \ an execution plan and a brief description of the wait times. Compare this kind\
    \ of information with the sections on 10046 trace file interpretation. Which do\
    \ you think would be faster? I know which one I prefer to look at. That kind of\
    \ aggregation of information makes interpretation of what is happening much simpler\
    \ and faster. Now that we’ve briefly mentioned 10046 tracing (and we mentioned\
    \ 10053 tracing in [chapter 5](../Text/9781430248095_Ch05.xhtml)), we look at\
    \ what TRCASPLIT can do for us.\n\nTRCASPLIT\n\nTRCASPLIT the first of the trace\
    \ utilities available in SQLT simply separates 10046 trace from other trace. While\
    \ this may be a simple task in theory it would be very difficult and error prone\
    \ to do manually. TRCASPLIT does the job in no time and presents you with the\
    \ results in a zip file. First let me show you what we are going to collect, then\
    \ we will collect it. Then we will split it using TRCASPLIT.\n\nIn this example\
    \ we are going to collect both 10046 and 10053 trace file information. In other\
    \ words we are turning on debugging information for both running the SQL and for\
    \ parsing it. As before we will also ensure that the dump file is not truncated\
    \ by setting the dump file size to unlimited, and we’ll also set the statistics\
    \ collection level to the highest possible level of all.\n\n```\nSQL> alter session\
    \ set tracefile_identifier='10046_10053';\nSession altered.\nSQL> alter session\
    \ set max_dump_file_size=unlimited;\nSession altered.\nSQL> alter session set\
    \ statistics_level=all;\nSession altered.\nSQL> alter session set events '10046\
    \ trace name context forever, level 12';\nSession altered.\nSQL> alter session\
    \ set events '10053 trace name context forever, level 1';\nSession altered.\n\
    SQL> alter system flush shared_pool;\nSystem altered.\nSQL> @q3\n```\n\nI’m sure\
    \ we don’t need to see the results of this query again. What we do need to look\
    \ at is the trace file created. In the trace file we see sections which are clearly\
    \ 10046 type lines such as:\n\n```\nSTAT #1 id=6 cnt=55500 pid=4 pos=2 obj=74151\
    \ op='TABLE ACCESS FULL CUSTOMERS (cr=1459 pr=0 pw=0 time=112536 us cost=406 size=555000\
    \ card=55500)'\nSTAT #1 id=7 cnt=918843 pid=3 pos=2 obj=0 op='PARTITION RANGE\
    \ ALL PARTITION: 1 28 (cr=1718 pr=0 pw=0 time=5428724 us cost=494 size=9188430\
    \ card=918843)'\nSTAT #1 id=8 cnt=918843 pid=7 pos=1 obj=74083 op='TABLE ACCESS\
    \ FULL SALES PARTITION: 1 28 (cr=1718 pr=0 pw=0 time=1892572 us cost=494 size=9188430\
    \ card=918843)'\n```\n\nThese are related to 10046 tracing, but we also see:\n\
    \n```\n***************************************\nPARAMETERS USED BY THE OPTIMIZER\n\
    ********************************\n  *************************************\n  PARAMETERS\
    \ WITH ALTERED VALUES\n  ******************************\nCompilation Environment\
    \ Dump\nsqlstat_enabled                     = true\noptimizer_dynamic_sampling\
    \          = 4\nstatistics_level                    = all\n```\n\nThese lines\
    \ are recognizable as 10053 tracing. We don’t see any of the logical 10046 tracing\
    \ information related to the execution lines of code and waits. There are no codes\
    \ at the beginning of lines related to what is happening. Any program designed\
    \ to decode 10046 would have to stop and ask for help at this point, but TRACSPLIT\
    \ helps us by sifting the two types of information. To split these we need only\
    \ run `sqltrcasplit.sql`. In this example I’ve copied the trace file produced\
    \ in the trace directory to the local directory. There is only one parameter to\
    \ pass to `sqltrcasplit.sql`, the name of the trace file that needs to be split.\n\
    \n```\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT 11.4.5.1\\sqlt\\run>sqlplus\
    \ stelios/password\nSQL*Plus: Release 11.2.0.1.0 Production on Wed Dec 26 10:50:43\
    \ 2012\nCopyright (c) 1982, 2010, Oracle.  All rights reserved.\nConnected to:\n\
    Oracle Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the\
    \ Partitioning, OLAP, Data Mining and Real Application Testing options\nSQL> @sqltrcasplit.sql\n\
    PL/SQL procedure successfully completed.\nParameter 1:\nTrace Filename (required)\n\
    Enter value for 1:\nEnter value for 1: snc1_ora_2796_10046_10053.trc\nValue passed\
    \ to sqltrcasplit.sql:\nTRACE_FILENAME: snc1_ora_2796_10046_10053.trc\nPL/SQL\
    \ procedure successfully completed.\nSplitting snc1_ora_2796_10046_10053.trc\n\
    ***\n*** NOTE:\n*** If you get error below it means SQLTXPLAIN is not installed:\n\
    ***   PLS-00201: identifier 'SQLTXADMIN.SQLT$A' must be declared.\n*** In such\
    \ case look for errors in NN_*.log files created during install.\n***\nSQLT_VERSION"
  trans: "\n# SQL 执行计划与 TRCASPLIT 工具\n\n## 执行计划输出\n\n```\nRows     Row Source Operation\n\
    -------  ---------------------------------------------------\n 7       SORT ORDER\
    \ BY (cr=3180 pr=0 pw=0 time=15 us cost=947 size=315 card=9)\n 7       HASH GROUP\
