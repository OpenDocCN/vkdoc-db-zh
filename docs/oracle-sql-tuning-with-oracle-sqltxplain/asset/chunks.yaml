    The example above shows the object type in the database vs. the number of those
    object types. Here the “bucket” is the `object_type` value (“bucket” has come
    to mean the range of values covered in a data set). So, for example, the object
    type of `SYNONYM` (bottom line in the example) has 27,802 values. Sometimes buckets
    are days of the week such as Saturday or Sunday, sometimes primary colors such
    as red or blue, and sometimes buckets are ranges such as “dates in 2011”. In each
    case these are the values you plot on your X-axis if you were plotting a graph.
    From here on in, we will use the term “bucket” to represent the range of values
    in question.


    Once you have issued the query you will see information that will help you decide
    how skewed the data is. Please note, however, that almost all data is skewed to
    some extent. The data will be skewed even in our example in the previous section
    regarding the spending of money in a superstore. The question you need to answer
    is this: is it skewed enough to cause a problem with my queries? A 10 percent
    variability doesn’t usually cause a problem, but if you have one bucket with 90
    percent of the samples, then the data is highly skewed. So decisions on skewness
    are somewhat subjective. In the example query above if I am querying my table
    `test3` and my predicate value is `SYNONYM`, then I am likely to get many more
    rows returned than if I issued my query against the value “`RESOURCE PLAN`”. See
    the example code below. If we sample our test table for the rare value we only
    get 10 values.


    ```

    SQL> select count(*) from test3 where object_type=''SYNONYM'';


    COUNT(*)


    SQL> select count(*) from test3 where object_type=''RESOURCE PLAN'';


    COUNT(*)


    ```


    Do we care about this skewness, and is this data skewed a lot? Technically speaking
    even the slightest deviation from the “norm” can be classed as skewness, but the
    term has come to mean an amount of skewness that makes my execution plan unstable.
    From a more objective point of view, however, if you see as in the example above
    that some predicates return more than 10 times the values of other predicates,
    then this is very skewed. If you see a ratio of the most common to the least common
    value of 1.5 or higher, you can start to consider skewness as a factor.


    SQLT makes the job of collecting queries like this much easier. It shows the distribution
    of data for a column histogram. First from the top of the report, (see [Figure
    4-2](#9781430248095_Ch04.xhtml#Fig2)) we can click on “Tables”, “Columns”, or
    we could click on “Histograms”. In this example we’ll click on “Tables” since
    that’s the route you’ll most likely follow in an investigation.


    ![9781430248095_Fig04-02.jpg](Images/9781430248095_Fig04-02.jpg)


    [Figure 4-2](#9781430248095_Ch04.xhtml#_Fig2) .  The top of the SQLXECUTE report


    The “Tables” page shows us the screen in [Figure 4-3](#9781430248095_Ch04.xhtml#Fig3).


    ![9781430248095_Fig04-03.jpg](Images/9781430248095_Fig04-03.jpg)


    [Figure 4-3](#9781430248095_Ch04.xhtml#_Fig3) .  The tables section of the report


    From [Figure 4-3](#9781430248095_Ch04.xhtml#Fig3), which shows only the left hand
    side of the screen, we can now click on the “Cols” hyperlink for any individual
    table to see the column details. In this case we are looking at TABLE 1 so we
    click on the corresponding link. This gets us to the screen shown in [Figure 4-4](#9781430248095_Ch04.xhtml#Fig4)
    (which is the right hand side of the screen), where I have highlighted the “FREQUENCY”
    hyperlink, which takes us to the histogram for COL2 of TABLE 1.


    ![9781430248095_Fig04-04.jpg](Images/9781430248095_Fig04-04.jpg)


    [Figure 4-4](#9781430248095_Ch04.xhtml#_Fig4) .  The hyperlink for the histogram
    for COL2


    We arrived at the screen shown in [Figure 4-5](#9781430248095_Ch04.xhtml#Fig5),
    by clicking on the “FREQUENCY” histogram for column COL2\. The two types of histograms,
    “FREQUENCY” and “HEIGHT BALANCED” will be discussed in a later section, but suffice
    to say that they are both ways of representing bucket frequencies.


    ![9781430248095_Fig04-05.jpg](Images/9781430248095_Fig04-05.jpg)


    [Figure 4-5](#9781430248095_Ch04.xhtml#_Fig5) .  A sample histogram from SQLT


    This figure shows us that for a value of “1” the estimated cardinality is approximately
    1.9 million, while the value for “17” is approximately 4000\. Is this data skewed?
    It sure is. In [Figure 4-5](#9781430248095_Ch04.xhtml#Fig5) the estimated cardinality
    popularity have been ordered, but this is not always the case. Look at [Figure
    4-6](#9781430248095_Ch04.xhtml#Fig6) from our example `test3` table.


    ![9781430248095_Fig04-06.jpg](Images/9781430248095_Fig04-06.jpg)


    [Figure 4-6](#9781430248095_Ch04.xhtml#_Fig6) .  Another example histogram table
    for our test3 example. SYNONYMs are popular


    In this example histogram, we see the basic facts shown on the column display;
    the number of buckets (33), the number of rows in the table, the number of nulls,
    and the sample size. In this case the sample size is extremely small.


    This data looks highly skewed. For the “Endpoint Actual Value” of “DIMENSION”
    the estimated selectivity is 0.000182\. For JAVA_CLASS the selectivity is 0.313704\.
    This means that since there were 0 null values nearly a third of the table will
    be returned if a predicate against `object_type` uses the value “JAVA CLASS”.
    If the predicate used the value “JAVA RESOURCE” then the selectivity is only 0.011996
    or a cardinality of 883, compared to the value of 23,083 values for “JAVA CLASS”.
    Even with this highly skewed data, you could ask yourself: “Is this skewness relevant
    for my query?” If the column `object_type` is not involved in your query, then
    the skewness does not matter to you.


