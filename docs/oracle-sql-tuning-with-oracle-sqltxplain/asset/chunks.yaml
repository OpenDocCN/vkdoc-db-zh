    因此，从执行计划出发，你可以直接跳转到“`Col Statistics`”或“`Stats Versions`”或其他许多内容。你根据自己目前的理解以及你认为执行计划哪里有问题来决定下一步去哪里。现在关闭那个展开的区域，点击步骤
    3“`More`”列下的“+”（参见图 1-10）


    ![9781430248095_Fig01-10.jpg](img/9781430248095_Fig01-10.jpg)


    图 1-10。这里我们看到“More”标题下的扩展内容


    现在我们看到了过滤谓词和投影。这些可以帮助你理解优化器在执行计划的哪一行考虑谓词，以及哪些值用于过滤器。


    在第一个执行计划正上方有一个名为“`Execution Plans`”的部分。这列出了 Oracle 引擎为该 SQL 看到的所有不同执行计划。因为执行计划可以存储在系统中的多个地方，所以在报告的“`Execution
    Plans`”部分中很可能有多个条目。其来源将被注明（在“`Source`”列下）。以下是我遇到过的来源列表：


    *   `GV$SQL_PLAN`

    *   `GV$SQLAREA_PLAN_HASH`

    *   `PLAN_TABLE`

    *   `DBA_SQLTUNE_PLANS`

    *   `DBA_HIST_SQL_PLAN`'
- fmt: 'SQLT will look for plans in as many places as possible so that it can you
    give you a full range of options. When SQLT gathers this information, it will
    look at the cost associated with each of these plans and label them with “W” in
    red (worst) and “B” in green (best). In my simple test case, the “Best” and “Worst”
    are the same, as there is only one execution plan in play. However you’ll notice
    there are three records: one came from mining the memory `GV$SQL_PLAN`, one came
    from `PLAN_TABLE` (i.e., an `EXPLAIN PLAN`) and one came from `DBA_SQLTUNE_PLANS`,
    (SQL Tuning Analyzer) whose source is `DBA_SQLTUNE_PLANS`.


    When you have many records here, perhaps a long history, you can go back and see
    which plans were best and try to see why they changed. Noting the timing of a
    change can sometimes be crucial, as it can help you zoom in on the change that
    made things worse.


    Before we launch into even more detailed use of the “Execution Plans” section,
    we’ll need more complex examples.


    ## Join Methods


    This book is focused on very practical tuning with SQLT. I try to avoid unnecessary
    concepts and tuning minutiae. For this reason I will not cover every join method
    available or every DBA table that might have some interesting information about
    performance or every hint. These are well documented in multiple sources, not
    least of which is the Oracle Performance guide (which I recommend you read). However,
    we need to cover some basic concepts to ensure we get the maximum benefit from
    using SQLT. So, for example, here are some simple joins. As its name implies,
    a join is a way of “joining” two data sets together: one might contain a person’s
    name and age and another table might contain the person’s name and income level.
    In which case you could “join” these tables to get the names of people of a particular
    age and income level. As the name of the operation implies, there must be something
    to join the two data sets together: in our case, it’s the person’s name. So what
    are some simple joins? (i.e., ones we’ll see in out SQLT reports).


    *   `HASH JOINS (HJ)` – The `smaller` table is hashed and placed into memory.
    The `larger` table is then scanned for rows that match the hash value in memory.
    If the larger and smaller tables are the wrong way around this is inefficient.
    If the tables are not large, this is inefficient. If the smaller table does not
    fit in memory, then this is more than inefficient: it’s really bad!

    *   `NESTED LOOP (NL)` – Nested Loop joins are better if the tables are smaller.
    Notice how in the execution plan examples above there is a `HASH JOIN` and a `NESTED
    LOOP`. Why was each chosen for the task? The details of each join method and its
    associated cost can be determined from the `10053 trace file`. It is a common
    practice to promote the indexes and NL by adjusting the optimizer parameters `Optimizer_index_cost_adj`
    and `optimizer_index_caching` parameters. This is not generally a winning strategy.
    These parameters should be set to the defaults of `100` and `0`. Work on getting
    the object and system statistics right first.

    *   `CARTESIAN JOINS` – Usually bad. Every row of the first table is used as a
    key to access every row of the second table. If you have a very few number of
    rows in the joining tables this join is OK. In most production environments, if
    you see this occurring then something is wrong, usually statistics.

    *   `SORT MERGE JOINS (SMJ)` – Generally joined in memory if memory allows. If
    the cardinality is high then you would expect to see SMJs and HJs.


    ## Summary


    In this chapter we covered the basics of using `SQLTXTRACT`. This is a simple
    method of SQLT that does not execute the SQL statement in question. It extracts
    the information required from all possible sources and presents this in a report.


    In this chapter we looked at a simple download and install of SQLT. You’ve seen
    that installing SQLT on a local database can take very little time, and its use
    is very simple. The report produced was easy to unzip and can be used to investigate
    the SQL performance. In this first example we briefly mentioned cardinality and
    selectivity and how these affect the cost-based optimizer’s plans. Now let’s investigate
    more of SQLT’s features and look at more complex examples.


    # CHAPTER 2


    ![image](Images/frontdot.jpg)


    ## The Cost-Based Optimizer Environment


    When I’m solving tricky tuning problems, I’m often reminded of the story of the
    alien who came to earth to try his hand at driving. He’d read all about it and
    knew the physics involved in the engine. It sounded like fun. He sat down in the
    driver’s seat and turned the ignition; the engine ticked over nicely, and the
    electrics were on. He put his seatbelt on and tentatively pressed the accelerator
    pedal. Nothing happened. Ah! Maybe the handbrake was on. He released the handbrake
    and pressed the accelerator again. Nothing happened. Later, standing back from
    the car and wondering why he couldn’t get it to go anywhere, he wondered why the
    roof was in contact with the road.


    My rather strange analogy is trying to help point out that before you can tune
    something, you need to know what it should look like in broad terms. Is `200ms`
    reasonable for a single block read time? Should system statistics be collected
    over a period of `1 minute`? Should we be using hash joins for large table joins?
    There are `1,001` things that to the practiced eye look wrong, but to the optimizer
    it’s just the truth.


    Just like the alien, the Cost Based Optimizer (CBO) is working out how to get
    the best performance from your system. It knows some basic rules and guestimates
    (heuristics) but doesn’t know about your particular system or data. You have to
    tell it about what you have. You have to tell the alien that the black round rubbery
    things need to be in contact with the road. If you ‘lie’ to the optimizer, then
    it could get the execution plan wrong, and by wrong I mean the plan will perform
    badly. There are rare cases where heuristics are used inappropriately or there
    are bugs in the code that lead the CBO to take shortcuts (Query transformations)
    that are inappropriate and give the wrong results. Apart from these, the optimizer
    generally delivers poor performance because it has poor information to start with.
    Give it good information, and you’ll generally get good performance.


    So how do you tell if the “environment” is right for your system? In this chapter
    we’ll look at a number of aspects of this environment. We’ll start with (often
    neglected) system statistics and then look at the database parameters that affect
    the CBO. We’ll briefly touch on Siebel environments and the have a brief look
    at histograms (these are covered in more detail in the next chapter). Finally,
    we’ll look at both overestimates and underestimates (one of SQLT’s best features
    is highlighting these), and then we’ll dive into a real life example, where you
    can play detective and look at examples to hone your tuning skills (no peeking
    at the answer). Without further ado let’s start with system statistics.


    ## System Statistics'
