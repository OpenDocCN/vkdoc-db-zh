    ## Dynamic Sampling and Cardinality Feedback


    Imagine you’ve been given the job of sorting through some books in a house to
    find all the references to the word “Vienna” in the book titles. You’ve been told
    there are 2 or 3 books in the study, and that there is an index in the desk if
    you need it. Naturally with 2 or 3 books or even a dozen books, there’s no point
    in using the index in the desk, you’ll just look at the book titles one by one
    and quickly find all of the books with “Vienna” in the title. Unfortunately, what
    you didn’t know is that since the last person looked at the books the owner has
    bought the entire contents of the local public library, but you only discover
    this after you start. It’s going to be a long day if you stick to your plan.


    In this chapter we’ll see how Oracle’s dynamic sampling (DS) and cardinality feedback
    (CFB) features could help our poor librarian. We’ll see that these features both
    work together at the beginning and at the end of the parsing process to get the
    right answer fast. We’ll learn that DS and CFB are not always used, and we’ll
    learn when those occasions arise. With this knowledge fresh in our minds we’ll
    also look at an example mystery case that we’ll follow through with `SQLTXPLAIN`.
    Who will be the villain and who will be the hero this time?


    Dynamic Sampling?


    The poor optimizer has to cope with occasionally coming across poor objects statistics
    (we covered that in [Chapter 3](../Text/9781430248095_Ch03.xhtml)), or completely
    missing statistics. Rather than just letting this situation occur and accepting
    that missing or poor statistics sometimes cause poor execution plans, Oracle developed
    dynamic sampling and cardinality feedback. Both of these great features work together
    to correct missing or poor statistics. `SQLT` reports when it detects that dynamic
    sampling is used as well as cardinality feedback. Let’s look at an example report.
    [Figure 8-1](#9781430248095_Ch08.xhtml#Fig1) shows the top of the now familiar
    `SQLTXPLAIN` main report.


    ![9781430248095_Fig08-01.jpg](Images/9781430248095_Fig08-01.jpg)


    [Figure 8-1](#9781430248095_Ch08.xhtml#_Fig1). The top of the `SQLTXPLAIN` report'
