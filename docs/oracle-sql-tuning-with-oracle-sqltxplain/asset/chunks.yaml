    \            \"COUNTRY_NAME\"='Spain' OR \"COUNTRY_NAME\"='The Netherlands' OR\n\
    \               \"COUNTRY_NAME\"='United Kingdom'))\n36 rows selected.\nSQL> SPO\
    \ OFF;\nSQL> show user\nUSER is \"TC11996\"\n```\n\nThis database is completely\
    \ fresh. There is no SH schema (I dropped the schema after creation of the database)\
    \ or SQLT schema (I never installed SQLT on this database). All the schemas are\
    \ the standard accounts, and yet if I log in as TC11996 I can execute my test\
    \ case and do all the things to try and improve the execution plan as I would\
    \ normally be able to do with SQLT. There is one additional wrinkle to TCX that\
    \ is sometimes useful. There is a file called `pack_tcx.sql` that allows you to\
    \ pack the test case even more tightly. If you run this file a new zip file is\
    \ produced called `tcx.zip,` which contains the files shown below (some of these\
    \ file names will be different in your case).\n\n```\n12/29/2012  09:59 AM   \
    \            132 10053.sql\n12/29/2012  09:59 AM               103 flush.sql\n\
    12/29/2012  09:59 AM               279 plan.sql\n12/29/2012  09:50 AM        \
    \       324 q.sql\n12/29/2012  10:29 AM                74 readme.txt\n12/29/2012\
    \  10:29 AM             1,447 setup.sql\n12/29/2012  09:59 AM            95,604\
    \ sqlt_s11996_metadata2.sql\n12/29/2012  09:59 AM            84,672 sqlt_s11996_set_cbo_env.sql\n\
    12/29/2012  09:59 AM             1,285 sqlt_s11996_system_stats.sql\n12/29/2012\
    \  10:30 AM         1,136,640 TC11996_expdat.dmp\n```\n\nThese files are automatically\
    \ unzipped (by `pack_tcx.sql`). This time we run just `setup.sql` as sys and the\
    \ test case user is created. While these extra options to create test cases may\
    \ seem a little redundant when you have SQLT already installed (and I encourage\
    \ you to do this), these increasingly smaller test cases that show your problem\
    \ SQL and execution plan are extremely helpful when trying to convince someone\
    \ (for example, Oracle support) that you have a problem. The fewer extraneous\
    \ details included in your test case (as long as it still shows the problem) the\
    \ better it is for trying to solve the problem.\n\nIncluding Test Case Data\n\n\
    SQLT test cases do not by default include application data. This is because the\
    \ problem (1) has nothing to do with the application data, (2) there is too much\
    \ data or (3) the data is privileged in some way and cannot be shown to anyone\
    \ else. In some rare cases data may be required to show the problem. Luckily SQLT\
    \ has an option to allow this as long as the other hurdles can be overcome. In\
    \ the later versions of SQLT you can do it like this:\n\n```\nSQL> EXEC SQLTXADMIN.sqlt$a.set_param('tcb_export_data',\
    \ 'TRUE');\n\nPL/SQL procedure successfully completed.\n```\n\nIn the older versions\
    \ of SQLT, find this section of code in the `sqcpkgi.pkb` file in the install\
    \ directory and change the FALSE to TRUE. This is what the code fragment looks\
    \ like before it is changed:\n\n```\nEXECUTE IMMEDIATE\n  'BEGIN DBMS_SQLDIAG.EXPORT_SQL_TESTCASE\
    \ ( '||\n  'directory     => :directory, '||\n  'sql_id        => :sql_id, '||\n\
    \  'exportData    => FALSE , '||  <<<Change this to TRUE\n  'timeLimit     =>\
    \ :timeLimit, '||\n  'testcase_name => :testcase_name, '||\n  'testcase      =>\
    \ :testcase ); END;'\n\nThen rebuild this package\nSQL> @sqcpkgi.pkb\n\nPackage\
    \ body created.\n\nNo errors.\n```\n\nOnce you’ve selected this option you can\
    \ run `sqltxecute.sql` (or `sqltxtract.sql`) and collect a test case that contains\
    \ application data. All the set up steps are exactly the same after this, you\
    \ run `xpress.sql` and follow the steps outlined in previous sections.\n\nSummary"
