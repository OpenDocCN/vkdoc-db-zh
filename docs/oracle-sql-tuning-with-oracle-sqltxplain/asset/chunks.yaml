    from employees A, employees B\nwhere\nA.hire_date = B.hire_date\nand\nA.department_id=30;\n\
    ```\n\n通过上面这个相当简单的例子，我们了解了什么是子查询非嵌套。子查询非嵌套的目标是允许优化器可能使用其他连接方式或表顺序，以更高效地获得满意的结果。换句话说，通过移除子查询，我们给了优化器更多的自由去使用其他连接方式，因为我们把表名提升到了主查询的层级。子查询非嵌套有许多变体。例如，子查询可能使用\
