    \ 25        EXCEPTION\n 26          WHEN OTHERS THEN\n 27            DBMS_OUTPUT.PUT_LINE('Cannot\
    \ drop directory '||i.directory_name||'. '||SQLERRM);\n 28        END;\n 29  \
