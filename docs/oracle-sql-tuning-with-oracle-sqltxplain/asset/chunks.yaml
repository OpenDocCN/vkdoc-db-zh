    \n## `sqlt_snnnnn_tcx.zip` 文件的作用是什么？\n\n在最新版本的 SQLT 中，您可以创建不依赖目标平台上 SQLT 的测试用例。换句话说，一旦您运行了\
    \ `SQLTXECUTE` 或 `SQLTXTRACT`，您就可以获取测试用例（如前面章节所述），并使用 `sqlt_snnnnn_tcx.zip` 文件在目标平台上创建测试用例，而无需依赖\
    \ SQLT 安装在该数据库上。在本节中，我将使用与之前相同的 SQL，在一个未安装 SQLT 的新数据库上创建测试用例。和往常一样，我已经将此 zip 文件中的文件放入一个子目录中。现在，在我的新标准数据库上，我将使用文件列表中提供的\
    \ `install.sql` 脚本来安装测试用例。以下是我创建的 `sqlt_s11996_tcx` 目录中的文件列表。\n\n```\n12/29/2012\
