  trans: "\n这绝不是影响优化器的所有隐藏参数的完整列表。这些参数可用于开启或关闭某些功能。例如，`unnest_subquery` 的默认值为 `TRUE`（适用于\
    \ Oracle 9.0 及之后版本）。在大多数情况下，只有在你进行 SQL 调优，并发现某些提示或系统参数未能如预期般改变执行计划时，才会注意到相关问题。在某些情况下，仅仅是性能不足（或性能突然变化）这一迹象，就可能暗示存在问题。仅在\
    \ Oracle 支持人员要求时，才应设置这些参数。它们通常只在短时间内被设置，用于调试与这些转换相关的特定问题以及相关的错误，但你没有理由不向 Oracle\
    \ 提交服务请求，询问是否可以尝试某些操作。Oracle 的支持人员都非常乐于助人且通情达理（真的）。\n\n## 优化器参数\n\n幸运的是，10053\
    \ 跟踪文件列出了优化器参数及其默认值，因此你可以判断是否有任何更改。在标题为 **“PARAMETERS USED BY THE OPTIMIZER”**（如\
    \ 图 5-6 所示）的部分中，我们看到了这些参数的前几项条目。请注意，**“Compilation Environment Dump”** 和 **“Bug\
    \ Fix Control Environment”** 是同时存在于“已更改值”和“默认值”部分的小标题。在我们这个案例中，“已更改值”部分下的这两个小节都没有任何已更改的值。在“默认值”部分，第一个显示带有默认值的实际参数是\
    \ `optimizer_mode_hinted`（设置为 `false`）。所有参数（包括隐藏参数）都会列出。然而，自行尝试修改这些参数风险自负。如果支持人员要求你更改其中某个参数，那是因为他们正在帮助你解决与优化器相关的某些问题。另请注意，任何非默认参数都会在一个名为\
    \ **“PARAMETERS WITH ALTERED VALUES”** 的单独部分中显示。\n\n![9781430248095_Fig05-06.jpg](img/9781430248095_Fig05-06.jpg)\n\
    \n图 5-6 .  10053 跟踪文件的优化器参数部分\n\n举个例子，让我们看看如果将参数 `cursor_sharing` 从其默认值 `EXACT`\
    \ 更改为 `FORCE` 会发生什么。这里我们将 `cursor_sharing` 设置为 `FORCE`（之前是 `EXACT`）。然后我们请求一个 10053\
    \ 跟踪并执行一个查询；接着我们前往 `user_dump_dest` 查看 10053 跟踪文件，并找到包含参数的部分。以下是执行的命令：\n\n```\n\
    SQL> show parameter cursor_sharing\nNAME                                 TYPE\
    \        VALUE\n------------------------------------ ----------- ---------------------------\n\
    cursor_sharing                       string      EXACT\n_optimizer_extended_cursor_sharing\
    \  = none\n_optimizer_extended_cursor_sharing_rel = none\n\nSQL> alter system\
    \ set cursor_sharing=FORCE scope=memory;\n\nSystem altered.\n\nSQL> alter session\
    \ set events '10053 trace name context forever, level 1';\n\nSession altered.\n\
    \nSQL> explain plan for select count(*) from dba_objects;\n\nExplained.\n```\n\
    \n在下面的图（图 5-7）中，我们看到 `cursor_sharing` 已被更改为 `force`。\n\n![9781430248095_Fig05-07.jpg](img/9781430248095_Fig05-07.jpg)\n\
    \n图 5-7 .  在这里我们看到参数 `cursor_sharing` 已被更改为 `FORCE`\n\n我们看到 10053 跟踪文件对于追踪隐藏和非隐藏的优化器参数非常有用。现在我们将看看优化器提示。\n\
    \n## 优化器提示\n\n如果你在 SQL 中使用任何优化器提示，检查这些提示是否被使用是一个好主意。优化器会尽力使用给予它的提示，但如果使用存在问题，则不会使用这些提示。优化器忽略提示的原因包括语法不正确或提示与其他提示冲突。如果提示正确，优化器将会使用它们。让我们看一个涉及我们之前处理的查询的例子。现在，凭借我们对子查询展开的了解，我们将以不同方式编写查询并尝试几个提示。首先，我们运行不带提示的查询并查看执行计划。它将显示一个哈希连接。然后我们将提示使用嵌套循环连接。我们会确认这一点，但再次查看执行计划。最后，我们将使用相互冲突的提示，并看到执行计划恢复为哈希连接。\n\
    \n```\nSQL> set autotrace traceonly explain;\nset lines 100\nselect\n  a.first_name,\
    \ a.last_name, a.hire_date\n  from employees a, employees b\n  where a.hire_date\
    \ = b.hire_date\n  and a.department_id=30\n/\nExecution Plan\n\nPlan hash value:\
    \ 2254211361\n\n| Id  | Operation                    | Name              | Rows\
    \  | Bytes | Cost (%CPU)| Time     |\n\n| 0   | SELECT STATEMENT             |\
    \                   |     7 |   238 |     6  (17)| 00:00:01 |\n|*1   |  HASH JOIN\
    \                   |                   |     7 |   238 |     6  (17)| 00:00:01\
    \ |\n| 2   |   TABLE ACCESS BY INDEX ROWID| EMPLOYEES         |     6 |   156\
    \ |     2   (0)| 00:00:01 |\n|*3   |    INDEX RANGE SCAN          | EMP_DEPARTMENT_IX\
    \ |     6 |       |     1   (0)| 00:00:01 |\n| 4   |   TABLE ACCESS FULL     \
    \     | EMPLOYEES         |   107 |   856 |     3   (0)| 00:00:01 |\n\nPredicate\
    \ Information (identified by operation id):\n\n1 - access(\"A\".\"HIRE_DATE\"\
    =\"B\".\"HIRE_DATE\")\n   3 - access(\"A\".\"DEPARTMENT_ID\"=30)\n```\n\n```\n\
    SQL> select /*+ use_nl(a b) */\n  a.first_name, a.last_name, a.hire_date\n  from\
    \ employees a, employees b\n  where a.hire_date = b.hire_date\n  and a.department_id=30\n\
    /\nExecution Plan\n\nPlan hash value: 3321434377\n\n| Id  | Operation        \
    \          | Name              | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|\
    \   0 | SELECT STATEMENT           |                   |     7 |   238 |    12\
    \   (0)| 00:00:01 |\n|   1 |  NESTED LOOPS              |                   |\
    \     7 |   238 |    12   (0)| 00:00:01 |\n|   2 | TABLE ACCESS BY INDEX ROWID|\
    \ EMPLOYEES         |     6 |   156 |     2   (0)| 00:00:01 |\n|*  3 |  INDEX\
    \ RANGE SCAN          | EMP_DEPARTMENT_IX |     6 |       |     1   (0)| 00:00:01\
    \ |\n|*  4 | TABLE ACCESS FULL          | EMPLOYEES         |     1 |     8 |\
    \     2   (0)| 00:00:01 |\n\nPredicate Information (identified by operation id):\n\
    \n3 - access(\"A\".\"DEPARTMENT_ID\"=30)\n   4 - filter(\"A\".\"HIRE_DATE\"=\"\
    B\".\"HIRE_DATE\")\n```\n\n```\nSQL> select /*+ use_nl(a b) use_merge(a b) */\n\
    \  a.first_name, a.last_name, a.hire_date\n  from employees a, employees b\n \
    \ where a.hire_date = b.hire_date\n  and a.department_id=30\n/\n\nExecution Plan\n\
    \nPlan hash value: 2254211361\n\n| Id  | Operation                   | Name  \
    \           | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 |SELECT STATEMENT\
    \             |                  |     7 |   238 |     6  (17)| 00:00:01 |\n|*\
    \  1 | HASH JOIN                   |                  |     7 |   238 |     6\
    \  (17)| 00:00:01 |\n|   2 |  TABLE ACCESS BY INDEX ROWID|EMPLOYEES         |\
    \     6 |   156 |     2   (0)| 00:00:01 |\n|*  3 |   INDEX RANGE SCAN        \
    \  |EMP_DEPARTMENT_IX |     6 |       |     1   (0)| 00:00:01 |\n|   4 |  TABLE\
    \ ACCESS FULL          |EMPLOYEES         |   107 |   856 |     3   (0)| 00:00:01\
    \ |\n\nPredicate Information (identified by operation id):\n\n1 - access(\"A\"\
    .\"HIRE_DATE\"=\"B\".\"HIRE_DATE\")\n   3 - access(\"A\".\"DEPARTMENT_ID\"=30)\n\
    ```\n"
- fmt: "Let’s look at each step and see if we can understand what happened. In the\
    \ first execution we allowed the optimizer to do its own thing. We could also\
    \ confirm this by looking at the `10053` trace if we wanted to make sure there\
    \ was no influence on the optimizer from hidden parameters. So in the first step\
    \ the optimizer went with a `hash join`. In the second execution, we decide (for\
    \ whatever reason) we’d like to try a `nested loop` instead, so we use a hint\
    \ in the SQL `use_nl (a b)`. Remember that `(a b)` represents the aliases of the\
    \ two tables that are being joined in this hint. Gratifyingly the new execution\
    \ plan uses a `nested loop`. So far so good.\n\nNow, in the third execution, we\
    \ want to refine things a little further and use an additional hint, `use_merge(a\
    \ b)`. This seems somewhat contradictory, but we want to know what the optimizer\
    \ will do. Will it use a `hash join`, will it use a `sort merge join`, or will\
    \ it pick the best option from both of these? If we look at the resulting execution\
    \ plan we see that it does neither of these things. Instead it uses a `hash join`.\
    \ So rather than guessing we now generate a `10053` trace file of the “errant”\
    \ behavior. In these steps we set the dump file size to unlimited ask for a `10053`\
    \ trace file run the SQL with the two hints, that we want to investigate and then\
    \ run the SQL.\n\n```\nSQL> alter session set max_dump_file_size=unlimited;\n\n\
    Session altered.\n\nSQL> alter session set events '10053 trace name context forever,\
    \ level 1';\n\nSession altered.\n\nSQL> set autotrace off;\nSQL> select /*+ use_nl(a\
    \ b) user_merge (a b) */\n  2  a.first_name, a.last_name, a.hire_date\n  3  from\
    \ employees a, employees b\n  4  where a.hire_date=b.hire_date\n  5  and a.department_id=30\n\
    \  6  /\n\nFIRST_NAME           LAST_NAME                 HIRE_DATE\n--------------------\
    \ ------------------------- ---------\nDen                  Raphaely         \
    \         07-DEC-02\nAlexander            Khoo                      18-MAY-03\n\
    Shelli               Baida                     24-DEC-05\nSigal              \
    \  Tobias                    24-JUL-05\nGuy                  Himuro          \
    \          15-NOV-06\nKaren                Colmenares                10-AUG-07\n\
    \n6 rows selected.\n```\n\nWe confirm we are looking at the right `10053` trace\
    \ file by checking the text, and true enough, the hints match. If we now search\
    \ for the word “hint” we’ll find a section at the end of the trace file called\
    \ “Dumping Hints”. See [Figure 5-8](#9781430248095_Ch05.xhtml#Fig8).\n\n![9781430248095_Fig05-08.jpg](Images/9781430248095_Fig05-08.jpg)\n\
    \n[Figure 5-8](#9781430248095_Ch05.xhtml#_Fig8) . The hints section of the `10053`\
    \ trace file\n\nThe important thing about this small section of the file is to\
    \ note that `used=0`. This means the hint was not used. It was ignored completely.\
    \ In fact both hints were ignored, which then allowed the optimizer to make its\
    \ own decisions, which resulted in the `hash join` being used. The execution of\
    \ the SQL resulted in no error. We did not get an error message from the optimizer\
    \ saying there was something wrong with the hints. This information was hidden\
    \ away in a `10053` trace file (if we asked for it). So what was wrong? The `err`\
    \ code is 4, which means that there was a conflict with another hint. In this\
    \ case both hints are taking each other out. The important thing to note here\
    \ is that the third execution of the SQL above did not generate an error. The\
    \ optimizer recognized the hints, found they were conflicting with each other,\
    \ ignored them and developed a plan without them.\n\n## 成本计算\n\nThe most important\
    \ job that the optimizer does is to compare costs between different execution\
    \ plans. That’s the overall plan of course. The cost of the execution plan is\
    \ made up of the cost of each line in the execution plan, and each line is based\
    \ on calculations that depend on statistics. The different plans calculated are\
    \ based on different access paths, join methods and order of access of different\
    \ parts of the query. Sounds like fun doesn’t it? If you had seven different tables\
    \ you could choose an order of processing in seven ways (that’s seven factorial,\
    \ which translates to `7x6x5x4x3x2x1`)! That’s 5,040 ways total, and that’s before\
    \ you consider the different ways of accessing the tables in the first place.\
    \ The optimizer chooses a reasonable plan, picks the outer table and works down,\
    \ tries a few combinations, and quickly eliminates those options that already\
    \ exceed the cost of previous plans it has tried (this is highly simplified).\
    \ So if, for example, the first plan the optimizer guesses is going to cost 1,000,\
    \ the second plan will be abandoned if halfway through the cost calculations the\
    \ plan reaches 1,500. In this case there is no need to keep calculating. It does\
    \ this to save time in the overall hard parsing elapsed time. It knows you are\
    \ hungry for results. Once you know that the `10053` is a story about how the\
    \ optimizer derived its plan based on this approach, the trace file begins to\
    \ make some sense.\n\nAfter it gives some basic information about parameters and\
    \ the SQL being considered and any possible query transformations that might apply,\
    \ the cost-based optimizer launches into some basic information about the cost\
    \ of accessing the objects involved. So for example in [Figure 5-9](#9781430248095_Ch05.xhtml#Fig9)\
    \ there is shown some basic information about the table `EMPLOYEES` (twice in\
    \ this case).\n\n![9781430248095_Fig05-09.jpg](Images/9781430248095_Fig05-09.jpg)\n\
    \n[Figure 5-9](#9781430248095_Ch05.xhtml#_Fig9) . A section in the `10053` showing\
    \ BASE STATISTICAL INFORMATION\n\nOnce we have all this base information about\
    \ the table and its indexes (note we also have the clustering factor `CLUF` in\
    \ this basic information), we can start to determine how to get the information\
    \ the cheapest way. For example, the CBO will consider a single table access path\
    \ and from that will consider a `Tablescan` (cost 3) or `index (AllEqRange)` (cost\
    \ 2) and then tell us which was cheapest: `Best:: AccessPath: IndexRange`. [Figure\
    \ 5-10](#9781430248095_Ch05.xhtml#Fig10) illustrates the section in the `10053`\
    \ that shows this.\n\n![9781430248095_Fig05-10.jpg](Images/9781430248095_Fig05-10.jpg)\n\
    \n[Figure 5-10](#9781430248095_Ch05.xhtml#_Fig10) . what the optimizer thought\
    \ of table `EMPLOYEES`\n\nOnce this is done the optimizer considers join orders,\
    \ in this case only to another version of the table `EMPLOYEES`. An example of\
    \ the optimizer abandoning its calculations is shown in [Figure 5-11](#9781430248095_Ch05.xhtml#Fig11).\n\
    \n![9781430248095_Fig05-11.jpg](Images/9781430248095_Fig05-11.jpg)\n\n[Figure\
    \ 5-11](#9781430248095_Ch05.xhtml#_Fig11) . The optimizer abandons a join because\
    \ it’s greater than the best so far cost\n\n## 总结\n\nNow that we’ve covered some\
    \ of the information that you can get from a `10053` trace file, you know how\
    \ useful it is. From a careful reading of the trace file you should now be able\
    \ to see why the optimizer chose to do what it did: which access paths it considered\
    \ and why it rejected some of them. And if you feel that some of the access paths\
    \ should not have been rejected, you should be able to work back to the root cause\
    \ and determine the answer to that age old question of all DBAs: “Why did it not\
    \ use my index?”"
