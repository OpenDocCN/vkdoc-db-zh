  raw: "```\nSQL> CREATE OR REPLACE PROCEDURE set_trace\n       /* grant alter session\
    \ to <user> */\n       /* create this procedure on both sites */\n       as\n\
    \         c1  integer;\n         r1 integer;\n         c2  integer;\n        \
    \ r2 integer;\n         BEGIN\n           c1:=dbms_sql.open_cursor;\n        \
    \  dbms_sql.parse(c1,\n            'alter session set events\n            ''10046\
    \ trace name context forever, level 8''',dbms_sql.v7);\n            r1:=dbms_sql.execute(c1);\n\
    \            dbms_sql.close_cursor(c1);\n            c2:=dbms_sql.open_cursor;\n\
    \            dbms_sql.parse(c2,\n              'alter session set events\n   \
    \           ''10053 trace name context forever, level 1''', dbms_sql.v7);\n  \
    \          r2:=dbms_sql.execute(c2);\n            dbms_sql.close_cursor(c2);\n\
    \          END;\n    /\nCREATE OR REPLACE PROCEDURE set_trace\n*\nERROR at line\
    \ 1:\nORA-00604: error occurred at recursive SQL level 1\nORA-16000: database\
    \ open for read-only access\n```\n\nClearly this is not going to be allowed. So\
    \ if we can’t create the SQLTXPLAIN schema, or any procedures, how do we use  XTRACT\
    \ against this database? XTRSBY solves this problem by using local users (on a\
    \ read/write database) and creating procedures that use database links to the\
    \ read-only database.\n\nHow Do We Use XTRSBY?\n\nWe’ve just seen some of the\
    \ things that cannot happen on a Data Guard Physical standby database. This is\
    \ when XTRSBY can step forward and do most of what XTRACT can do. I say “most”\
    \ because XTRSBY is not exactly the same as XTRACT in terms of the results (we’ll\
    \ see the differences in the “What does an XTRSBY report look like?”) There’s\
    \ enough in the report, however, to help tune queries on the Data Guard instance.\
    \ So how do we get XTRSBY to work on a Data Guard database?  The brief steps in\
    \ getting XTRSBY to work on a Data Guard standby database are as follows:\n\n\
    1.  Install SQLTXPLAIN on the primary (we already covered this in [Chapter 1](../Text/9781430248095_Ch01.xhtml)\
    \ of this book).\n2.  Allow the DDL to be propagated to the standby database.\n\
    3.  Create a database link accessible to the SQLTXPLAIN schema linking to the\
    \ standby database. I’ll give an example below.\n4.  Run XTRSBY from the primary\
    \ specifying the SQL ID of the SQL on the standby and the database link.\n5. \
    \ The report is produced on the primary.\n\nStep 1, above is covered in [Chapter\
    \ 1](../Text/9781430248095_Ch01.xhtml). Step 2 is a matter of waiting for the\
    \ schema to be propagated (or copied as part of the normal Data Guard operations)\
    \ to the standby. Step 3 is merely creating a public database link (or link available\
    \ from SQLTXPLAIN): These are the commands I typed on my read-write database to\
    \ create a publicly available database link that connects to the read-only database.\n\
    \n```\nSQL> show user\nUSER is \"SYS\"\nSQL> create public database link \"TO_STANDBY\"\
    \ connect to sqltxplain identified by oracle using '(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=localhost)(Port=1521))(connect_data=(SID=SNC2)))';\n\
    \nDatabase link created.\n\nSQL> select sysdate from dual@to_standby;\n\nSYSDATE\n\
    \n28-OCT-12\n```\n\nHere I have simulated the standby database with a read-only\
    \ database, hence in my connect string for the public database link I have used\
    \ `localhost`. In a real world example you would use the hostname of the standby\
    \ database. Also in my example I have used a `PUBLIC` database link, but you may\
    \ have standards on your site for creating database links, which require you to\
    \ create a private link or a two-part link where the link information and the\
    \ password are specified separately. As long as SQLTXPLAIN has access to the link\
    \ to find the standby database the routine `xtrsby.sql` should work. Once these\
    \ pre-requisites are in place we can use XTRSBY to collect information about a\
    \ standby SQL, by running `sqlxtrsby` on the primary.\n\nFirst let’s create some\
    \ SQL on the standby. This would be equivalent to the reports that are run on\
    \ the standby database.\n\n```\nSQL> select count(1) from dba_objects where object_type\
    \ ='DIMENSION';\n\nCOUNT(1)\n\nSQL> select sql_id from v$sql where sql_text like\
    \ 'select count(1) from dba_objects where object_type =''DIMENSION''';\n\nSQL_ID\n\
    \ngaz0dgkpffqrr\n\nSQL>\n```\n\nIn the steps above we ran some arbitrary SQL and\
    \ got the SQL ID for that SQL. Remember we ran the SQL on the standby database\
    \ (where our reports might have run). We can’t store any data on the Data Guard\
    \ Physical Standby database so now we have to capture information about the SQL\
    \ from across the database link from the primary database:\n\n```\nSQL> @sqltxtrsby\
    \ gaz0dgkpffqrr to_standby\n\nPL/SQL procedure successfully completed.\n\nParameter\
    \ 1:\nSQL_ID or HASH_VALUE of the SQL to be extracted (required)\n\nParameter\
    \ 2:\nDBLINK to SQLTXPLAIN in the stand-by database (required)\n\nParemeter 3:\n\
    SQLTXPLAIN password (required)\n\nEnter value for 3:\n\nAt this point enter the\
    \ password for SQLTXPLAIN\n\n. . . please wait . . .\n```\n\nThis is the output,\
    \ shortened for brevity:\n\n```\nArchive:  sqlt_s96365_xtrsby_gaz0dgkpffqrr.zip\n\
    \  Length      Date    Time    Name\n---------  ---------- -----   ----\n    \
    \ 3060  10/30/2012 13:00   sqlt_s96365_driver.zip\n     1159  10/30/2012 13:00\
    \   sqlt_s96365_export_driver.sql\n    46903  10/30/2012 13:00   sqlt_s96365_lite.html\n\
    \    12448  10/30/2012 13:00   sqlt_s96365_log.zip\n  1788199  10/30/2012 13:00\
    \   sqlt_s96365_main.html\n    15498  10/30/2012 13:00   sqlt_s96365_readme.html\n\
    \      222  10/30/2012 13:00   sqlt_s96365_remote_driver.sql\n   217088  10/30/2012\
    \ 13:00   sqlt_s96365_tc.zip\n      193  10/30/2012 13:00   sqlt_s96365_tcb_driver.sql\n\
    \      172  10/30/2012 13:00   sqlt_s96365_tc_script.sql\n       65  10/30/2012\
    \ 13:00   sqlt_s96365_tc_sql.sql\n  3183654  10/30/2012 13:00   sqlt_s96365_trc.zip\n\
    ---------                     -------\n  5268661                     12 files\n\
    \nFile sqlt_s96365_xtrsby_gaz0dgkpffqrr.zip for gaz0dgkpffqrr has been created.\n\
    \nSQLTXTRSBY completed.\n```\n\nThis produces the zip file in the directory where\
    \ the SQLTXPLAIN routine was run. If we expand the zip file, we’ll see the following:\n\
