- fmt: "![9781430248095_Fig02-05.jpg](Images/9781430248095_Fig02-05.jpg)\n\n[Figure\
    \ 2-5](#9781430248095_Ch02.xhtml#_Fig5). Basis and synthezed values section under\
    \ Info System Statistics\n\nNotice anything unusual about the Actual SREADTIM\
    \ and Actual MREADTIM?\n\nApart from the fact that the Actual SREADTIM is 6.809ms\
    \ (a low value) and the Actual MREADTIM is 3.563ms (also a low value). The problem\
    \ here is that the Actual MREADTIM is less than the SREADTIM. If you see values\
    \ like these, you should be alert to the possibility that full table scans are\
    \ going to be costed lower than operations that require single block reads.\n\n\
    What does it mean to the optimizer for MREADTIM to be less than SREADTIM? This\
    \ is about equivalent to you telling the optimizer that it’s OK to drive the car\
    \ upside down with the roof sliding on the road. It’s the wrong way round. If\
    \ the optimizer takes the values in [Figure 2-5](#9781430248095_Ch02.xhtml#Fig5)\
    \ as the truth, it will favor steps that involve multi-block reads. For example,\
    \ the optimizer will favor full table scans. That could be very bad for your run-time\
    \ execution. If on the other hand you have a fast SAN system you may well have\
    \ a low Actual MREADTIM.\n\nThe foregoing is just one example how a bad number\
    \ can lead the optimizer astray. In this specific case you would be better off\
    \ having no Actual values and relying on the optimizer’s guesses, which are shown\
    \ as the estimated SREADTIM and MREADTIM values. Those guesses would be better\
    \ than the actual values.\n\nHow do you correct a situation like I’ve just described?\
    \ It’s much easier that you would think. The steps to fix this kind of problem\
    \ are shown in the list below:\n\n1. Choose a time period that is representative\
    \ of your workload. For example, you could have a daytime workload called `WORKLOAD`.\n\
    2. Create a table to contain the statistics information. In the example below\
    \ we have called the table `SYSTEM_STATISTICS`.\n3. Collect the statistics by\
    \ running the `GATHER_SYSTEM_STATS` procedure during the chosen time period.\n\
    4. Import those statistics using `DBMS_STATS.IMPORT_SYSTEM_STATS`.\n\nLet’s look\
    \ at the steps for collecting the system statistics for a 2-hour interval in more\
    \ detail. In the first step we create a table to hold the values we will collect.\
    \ In the second step we call the routine `DBMS_STATS.GATHER_SYSTEM_STATS`, with\
    \ an `INTERVAL` parameter of 120 minutes. Bear in mind that the interval parameter\
    \ should be chosen to reflect the period of your representative workload.\n\n\
    ```\nexec DBMS_STATS.CREATE_STAT_TABLE ('SYS','SYSTEM_STATISTICS');\nBEGIN\n \
    \  DBMS_STATS.GATHER_SYSTEM_STATS ('interval',interval => 120, stattab => 'SYSTEM_STATISTICS',\
    \ statid => 'WORKLOAD');\nEND;\n/\nexecute DBMS_STATS.IMPORT_SYSTEM_STATS(stattab\
    \ => 'SYSTEM_STATISTICS', statid => 'WORKLOAD', statown => 'SYS');\n```\nOnce\
    \ you have done this you can view the values from the SQLT report or from a `SELECT`\
    \ statement.\n\n```\nSQL> select * from sys.aux_stats$;\n\nSNAME             \
    \             PNAME                               PVAL1 PVAL2\n------------------------------\
    \ ------------------------------ ---------- ------------------\nSYSSTATS_INFO\
    \                  STATUS                                    COMPLETED\nSYSSTATS_INFO\
    \                  DSTART                                    09-29-2012 11:01\n\
    SYSSTATS_INFO                  DSTOP                                     09-29-2012\
    \ 11:02\nSYSSTATS_INFO                  FLAGS                                \
    \   0\nSYSSTATS_MAIN                  CPUSPEEDNW                        972.327\n\
    SYSSTATS_MAIN                  IOSEEKTIM                              10\nSYSSTATS_MAIN\
    \                  IOTFRSPEED                           4096\nSYSSTATS_MAIN  \
    \                SREADTIM                            8.185\nSYSSTATS_MAIN    \
    \              MREADTIM                           55.901\nSYSSTATS_MAIN      \
    \            CPUSPEED                              972\nSYSSTATS_MAIN        \
    \          MBRC\nSYSSTATS_MAIN                  MAXTHR\nSYSSTATS_MAIN        \
    \          SLAVETHR\n```"
