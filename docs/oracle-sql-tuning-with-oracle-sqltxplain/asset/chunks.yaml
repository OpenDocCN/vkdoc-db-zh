    ## 运行运行状况检查


    SQL 运行状况检查脚本不是 SQLT。它是一个完全独立的实用程序，从不同的 Metalink 注释中下载，并以不同的方式使用。那么为什么它会在本书中被提及？当无法安装
    SQLT 时，SQLHC 被认为是一个备用选项。这种情况并不经常发生，但一旦发生，通常是由于站点限制。这有很多原因：


    *   不允许在生产环境安装任何东西（安全原因）。

    *   不允许在生产环境安装任何东西（担心影响生产）。

    *   安装和测试过程耗时太长，而你遇到了生产问题。

    *   不信任 SQLT。

    *   SQLT 太复杂。

    *   没有足够的空间安装 SQLT。


    首先我要说明的是，SQLT 占用空间很小，并且已经在许多不同的系统上经过测试。商业原因可能妨碍及时安装新软件包：例如，如果必须在开发和 QA 环境中进行测试，然后才能到达生产环境。如果你有这些规定，你应该遵守这些业务规则或本地
    IT 标准，并考虑改用运行状况检查脚本。然而，我希望我已经展示了 SQLT 是一个值得信赖的工具，能为用户带来诸多好处。如果你遇到禁止使用 SQLT 的情况，你仍然可以选择次优方案，即对目标
    SQL 运行 SQL 运行状况检查脚本。


    ## 什么是 SQL 运行状况检查？


    SQL 运行状况检查 (SQLHC) 脚本可从 Oracle Metalink 注释 1366133.1 免费下载。它是一个包含三个简单 SQL 脚本 (`sqldx.sql`、`sqlhc.sql`
    和 `sqlhcxec.sql`) 的 zip 文件，你可以在目标系统上以 sys 身份运行。直到最近，`sqlhc.sql` 还是唯一的脚本，因此我们将主要讨论该脚本，并在本章后面介绍其他脚本。所有这些脚本都不需要安装：它们只是
    SQL 脚本，使用起来非常简单。这些脚本是为满足某些站点禁止安装 SQLT（它有一个模式、模式对象、表和索引、包和函数）的要求而开发的。由于像 `sqlhc.sql`
    这样的脚本只是一个简单的脚本，更多的站点会接受它进行安装，因此更多的站点可以利用 SQLHC 提供的建议。SQLHC 是从 SQLT 发展而来的（它提供了
    SQLT 功能的一个子集），因此关于 SQLHC 能做什么的讨论涵盖了本书已经涉及的许多主题。


    以下是 SQL 运行状况检查报告涵盖的部分内容：'
  raw: '*   The CPU time was 194.768 seconds

    *   Non-idle wait time was 0.029 seconds

    *   Unaccounted for elapsed time was 0.613 seconds

    *   The percentage of each of the above times

    *   The total elapsed time which is a sum of the CPU Time, Non-idle Wait time
    and The unaccounted for Time in this example 195.411

    *   Idle wait time was 0.084 seconds

    *   Unaccounted for time was 0.1 seconds

    *   The total time for everything was 195.595 seconds


    This is an aggregation of all the information from all trace files. This gives
    you an idea of where your time is going and which item in the list above is worth
    attacking. In this case 99.6% of all time is spent on the CPU so if there is any
    improvement that is where it will be made.  This kind of report also lists all
    the related SQL (if it is recursive for example), so you will see a “Top SQL”
    section of this report (see [Figure 13-5](#9781430248095_Ch13.xhtml#Fig5)).


    ![9781430248095_Fig13-05.jpg](Images/9781430248095_Fig13-05.jpg)


    [Figure 13-5](#9781430248095_Ch13.xhtml#_Fig5) .  The “Top SQL” section of the
    TRCANLZR report


    TRCAXTR


    TRCAXTR is a combination report, which takes the same parameters are TRCANLZR
    (as described in the section above)  but then determines the top SQL from the
    report and runs that through XTRACT. In the case above the top SQL would be the
    one under the heading “SQL Text” in [Figure 13-5](#9781430248095_Ch13.xhtml#Fig5).
    You run `sqltrcxtr.sql` by entering the following on the command line


    ```

    SQL> @sqltrcxtr.sql

    ```


    You will be prompted for the same parameters as for TRCANLZR but after that ends
    you will be prompted for the parameters to run XTRACT.


    Here are the parameters that you will be prompted for


    *   The file containing the trace file or control file containing the trace files
    (as was mentioned earlier `control.txt` is the ‘control’ file and can contain
    multiple trace file names)

    *   The SQLTXPLAIN password


    The process is very long, because it goes through all the trace files generating
    XTRACTs for each SQL. The top level zip file is called `sqlt_snnnnn_set.zip`.
    This files contains all the XTRACTs for each of the SQLs in the trace file. This
    simple routine, with very few parameters can produce many many files to analyze.
    It can be a quick way to collect information for a whole session, but be warned
    the the zip files produced can be very big.


    Modifying SQLT Behavior


    SQLT has many aspects to it and many tools that can be used. Despite this there
    are still situations where SQLT could do better or be modified to help with some
    situation. Luckily this is covered by the parameters which can be set to change
    SQLT’s behavior. If we look at the now familiar first page of the main report
    (see [Figure 13-6](#9781430248095_Ch13.xhtml#Fig6)), we see the “Tool Configuration
    Parameters” link.


    ![9781430248095_Fig13-06.jpg](Images/9781430248095_Fig13-06.jpg)


    [Figure 13-6](#9781430248095_Ch13.xhtml#_Fig6) .  The Tool configuration option
    is under the Global section


    If we click on this link we see the list of parameters that can be set within
    SQLT to change behavior or options. Many of the options here turn on features
    or turn off features, such as `ash_reports`. The “Domain” column lists the possible
    values, in this case “Y” or “N”.


    ![9781430248095_Fig13-07.jpg](Images/9781430248095_Fig13-07.jpg)


    Figure 13-7 .  The first page of configuration parameters


    If you are in doubt of the meaning of these parameters then you can just hover
    your mouse over the parameter and the descriptive comment will be shown. You can
    see that in [Figure 13-8](#9781430248095_Ch13.xhtml#Fig8). (For your convenience,
    Appendix C includes a full list of these parameters and their descriptions.)


    ![9781430248095_Fig13-08.jpg](Images/9781430248095_Fig13-08.jpg)


    [Figure 13-8](#9781430248095_Ch13.xhtml#_Fig8) .  Hover the mouse over the parameter
    names to get detailed descriptions


    These parameters make the SQLT utility even more flexible and useful than it would
    otherwise be. At the end of the second page (see [Figure 13-9](#9781430248095_Ch13.xhtml#Fig9))
    we see that the way to set these parameters is described:


    To set the value for the tool for all sessions:


    ```

    SQL> EXEC SQLTXADMIN.sqlt$a.set_param(''Name'', ''Value'');

    ```


    And to set the value for one session only:


    ```

    SQL> EXEC SQLTXADMIN.sqlt$a.set_sess_param(''Name'', ''Value'');

    ```


    ![9781430248095_Fig13-09.jpg](Images/9781430248095_Fig13-09.jpg)


    [Figure 13-9](#9781430248095_Ch13.xhtml#_Fig9) .  The second page of configuration
    parameters


    With these options available we can, for example, make smaller test cases, or
    limit the number of AWR records reviewed or exclude the test case builder.


    Summary


    In this chapter we covered the use of the tools to analyze trace files which are
    available in SQLT. These are special tools over and above what TKPROF can offer
    and are useful in cases where you have 10046 trace files to analyze. SQLT XTRACT
    is still the best tool for helping with tuning in most cases, but sometimes you
    have a busy system which does not show a specific SQL to investigate. In cases
    such as these TRCANLZR can help to find the SQL which is the problem. If you use
    TRCAXTR as well then you can combine the best of both worlds.


