    \ test cases. For the moment, however, we need only concern ourselves with the\
    \ dump file found inside the test case zip file. I’ve unzipped this file into\
    \ a directory called “TC” inside the unzipped area. Now making sure that your\
    \ SID is pointing to the right database (in my case I am importing into a third\
    \ database), we execute the instructions to import the data into our third database.\n\
    \nImporting the Respository Data\n\nImporting the repository data is the last\
    \ step before we can actually run SQLTCOMPARE. As long as we’ve kept track of\
    \ the various zip files along the way, it should only be a matter of importing\
    \ the files.\n\n```\nimp sqltxplain file=sqlt_s96376_exp.dmp tables=sqlt% ignore=y\n\
    \nImport: Release 11.2.0.1.0 - Production on Sat Nov 17 14:38:09 2012\n\nCopyright\
    \ (c) 1982, 2009, Oracle and/or its affiliates.  All rights reserved.\n\nPassword:\n\
    \nConnected to: Oracle Database 11g Enterprise Edition Release 11.2.0.1.0 - Production\n\
    With the Partitioning, OLAP, Data Mining and Real Application Testing options\n\
    \nExport file created by EXPORT:V11.02.00 via conventional path\nimport done in\
    \ WE8MSWIN1252 character set and AL16UTF16 NCHAR character set\n. importing SQLTXPLAIN's\
    \ objects into SQLTXPLAIN\n. importing SQLTXPLAIN's objects into SQLTXPLAIN\n\
    . . importing table          \"SQLT$_SQL_STATEMENT\"          1 rows imported\n\
    . . importing table             \"SQLT$_AUX_STATS$\"         13 rows imported\n\
    . . importing table    \"SQLT$_DBA_AUTOTASK_CLIENT\"          1 rows imported\n\
    . . importing table \"SQLT$_DBA_COL_STATS_VERSIONS\"        248 rows imported\n\
    . . importing table         \"SQLT$_DBA_COL_USAGE$\"         13 rows imported\n\
    \n---Output removed for clarity\n\n. . importing table          \"SQLT$_STGTAB_SQLSET\"\
    \          7 rows imported\n. . importing table  \"SQLT$_V$SESSION_FIX_CONTROL\"\
    \        406 rows imported\n. . importing table     \"SQLT$_WRI$_ADV_RATIONALE\"\
    \          2 rows imported\n. . importing table         \"SQLT$_WRI$_ADV_TASKS\"\
    \          2 rows imported\nImport terminated successfully without warnings.\n\
    ```\n\nThis has imported the required information from the first database (the\
    \ good execution plan) into the SQLTXPLAIN schema on the third database. Now we\
    \ repeat the entire process for the second database.\n\n```\nimp sqltxplain file=sqlt_s73560_exp.dmp\
    \ tables=sqlt% ignore=y\nImport: Release 11.2.0.1.0 - Production on Sat Nov 17\
    \ 14:48:31 2012\n\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.  All\
    \ rights reserved.\n\nPassword:\n\nConnected to: Oracle Database 11g Enterprise\
    \ Edition Release 11.2.0.1.0 - Production\nWith the Partitioning, OLAP, Data Mining\
    \ and Real Application Testing options\n\nExport file created by EXPORT:V11.02.00\
    \ via conventional path\nimport done in WE8MSWIN1252 character set and AL16UTF16\
    \ NCHAR character set\n. importing SQLTXPLAIN's objects into SQLTXPLAIN\n. importing\
    \ SQLTXPLAIN's objects into SQLTXPLAIN\n. . importing table          \"SQLT$_SQL_STATEMENT\"\
    \          1 rows imported\n. . importing table             \"SQLT$_AUX_STATS$\"\
    \         13 rows imported\n. . importing table    \"SQLT$_DBA_AUTOTASK_CLIENT\"\
    \          1 rows imported\n. . importing table         \"SQLT$_DBA_COL_USAGE$\"\
    \          5 rows imported\n---Output removed for clarity\n. . importing table\
    \          \"SQLT$_STGTAB_SQLSET\"          6 rows imported\n. . importing table\
    \  \"SQLT$_V$SESSION_FIX_CONTROL\"        406 rows imported\n. . importing table\
    \     \"SQLT$_WRI$_ADV_RATIONALE\"          8 rows imported\n. . importing table\
    \         \"SQLT$_WRI$_ADV_TASKS\"          2 rows imported\n. . importing table\
    \ \"SQLT$_WRI$_OPTSTAT_AUX_HISTORY\"         18 rows imported\nImport terminated\
    \ successfully without warnings.\n```\n\nNow all that remains to be done is to\
    \ run the SQLTCOMPARE method. The script for this is in the “run” area. Logged\
    \ in as SQLTXPLAIN we run SQLTCOMPARE.\n\nRunning SQLTCOMPARE\n\nOnce we have\
    \ imported the data we can run SQLTCOMPARE. We can run it with or without the\
    \ parameters on the command line. In this case I’ll omit the parameters so that\
    \ we can see what the prompts are:\n\n```\nSQL> @sqltcompare\n. . . please wait\
    \ . . .\n\nSTAID MET INSTANCE SQL_TEXT\n----- --- -------- ------------------------------------------------------------\n\
    73560 XEC snc2     select   s.amount_sold,   c.cust_id,   p.prod_name from   sh\n\
    96376 XEC snc1     select   s.amount_sold,   c.cust_id,   p.prod_name from   sh\n\
    \nParameter 1:\nSTATEMENT_ID1 (required)\n\nEnter value for 1: 96376\n\nParameter\
    \ 2:\nSTATEMENT_ID2 (required)\n\nEnter value for 2: 73560\n```\n\nWe see that\
    \ the SQLTCOMPARE method immediately identifies the statements that we could compare\
    \ and shows them to us (because we did not specify the statement Ids on the command\
    \ line). Our good execution plan was run on snc1 (statement ID 96376), and our\
    \ not so good execution plan was run on snc2 (a newly created database). I always\
    \ like to compare good to bad, so for the first statement ID I’ll enter 96376\
    \ and for the second I’ll enter the only remaining statement ID 73560\\. (When\
    \ you do your own comparisons you can compare the SQLs anyway you like, but I\
    \ like the good vs. bad convention to keep me focused on finding the differences\
    \ the right way around).\n\nNow we are presented with the plan hash value history\
    \ for each of the statements on each instance so we can choose which plan hash\
    \ values to compare. In this case I’ll compare the best plan on both systems.\n\
    \n```\nPLAN_HASH_VALUE SQLT_PLAN_HASH_VALUE STATEMENT_ID ATTRIBUTE\n---------------\
    \ -------------------- ------------ ---------\n      725901306               \
    \ 16588        96376 [B][W]\n     2025531852                21473        96376\n\
    \     3852404249                68517        96376\n\nParameter 3:\nPLAN_HASH_VALUE1\
    \ (required if more than one)\n\nEnter value for 3: 725901306\n\nPLAN_HASH_VALUE\
    \ SQLT_PLAN_HASH_VALUE STATEMENT_ID ATTRIBUTE\n--------------- --------------------\
    \ ------------ ---------\n     3850511567                 8739        73560\n\
    \     3857478275                 9628        73560 [B][W]\n     3858714362   \
    \             69559        73560\n\nParameter 4:\nPLAN_HASH_VALUE2 (required if\
    \ more than one)"
  trans: "\n执行 `sqltxecute` 会创建包含重要信息的 ZIP 文件。这些 ZIP 文件中的信息包含如何将数据导入另一个 SQLT 仓库的说明，但首先你必须解压主\
    \ ZIP 文件。从在目标系统上执行两个主要方法的结果来看，我们看到语句 ID 分别为 `96376`（低 CBO 成本）和 `73560`（较高的 CBO\
    \ 成本）。在这种情况下，我创建了两个目录：`sqlt_s96376` 和 `sqlt_s73560`，每个目录中都有对应的 ZIP 文件，我随后对它们进行了解压。正如我们所了解的，每个目录都包含许多文件，但在这种情况下，我们感兴趣的是名为\
    \ `sql_snnnnn_readme.html` 的 readme 文件。如有疑问（当然也包括本书），这就是你的首选文件。该文件中描述了执行许多功能（包括\
    \ SQLTCOMPARE 操作）的确切步骤。这是我们在第一个目标系统上运行的 SQLTXECUTE 报告的 readme 文件顶部（参见图 10-1）。\n\
    \n![9781430248095_Fig10-01.jpg](img/9781430248095_Fig10-01.jpg)\n图 10-1 . readme\
    \ 文件的顶部\n\n如果我们点击报告中这一部分的“使用 SQLT COMPARE”超链接，就会跳转到描述我们需要采取哪些步骤将数据导入新数据库（或实际上是同一个数据库）以进行比较的说明部分。有关\
    \ `s96376` 的 readme 部分，请参见图 10-2。\n\n![9781430248095_Fig10-02.jpg](img/9781430248095_Fig10-02.jpg)\n\
    图 10-2 . SQLTCOMPARE 的说明展示了导入过程\n\n注意，我们必须解压主 SQLT ZIP 文件内部的 `sqlt_s96376_tc.zip`\
    \ 文件。我们将在第 11 章（关于构建良好测试用例）中对测试用例文件做更多操作。不过目前，我们只需要关注测试用例 ZIP 文件内部的转储文件。我已经将此文件解压到解压区域内的一个名为\
    \ `TC` 的目录中。现在，确保你的 SID 指向正确的数据库（在我的情况下，我正导入到第三个数据库），我们执行指令将数据导入我们的第三个数据库。\n\n\
    ## 导入仓库数据\n\n导入仓库数据是运行 `SQLTCOMPARE` 之前的最后一步。只要我们在此过程中跟踪了各种 ZIP 文件，那么导入文件应该只是一个简单的操作。\n\
    \n```\nimp sqltxplain file=sqlt_s96376_exp.dmp tables=sqlt% ignore=y\n\nImport:\
