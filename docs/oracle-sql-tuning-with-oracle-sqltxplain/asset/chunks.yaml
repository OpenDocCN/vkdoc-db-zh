- fmt: '# How Object Statistics Can Make Your Execution Plan Wrong


    In the chapter we learned about the inputs to the cost-based optimizer’s algorithm
    and how these inputs affect the optimizer. For the optimizer to work effectively
    and efficiently these inputs need to be considered and set up in a way that reflects
    the usage of your environment and business requirements. `SQLTXPLAIN` helps with
    all of the environmental considerations by collecting information and displaying
    it in a way that is easy to understand. `SQLTXPLAIN` also helpfully highlights
    those elements that are out of the ordinary so that you can consider them more
    critically and decide if those elements are needed and are what you intended.
    In the next chapter we consider one of the most important aspects of the `CBO`
    environment, the object statistics. These take the most time to collect by far
    and are very frequently the cause of performance problems. We’ll look at the effect
    of lack of statistics, poor timing of statistics, and other elements of this important
    maintenance job.


    ![image](Images/frontdot.jpg)


    In this chapter we’ll discuss what is considered a very important subject if you
    are tuning `SQL`. Gathering object statistics is crucial; this is why Oracle has
    spent so much time and effort making the statistics collection process as easy
    and painless as possible. They know that under most circumstances, `DBA`s who
    are under pressure to get their work done as quickly as possible, in the tiny
    maintenance windows they are allowed, will opt for the easiest and simplest way
    forward. If there is a check box that says “click me, all your statistics worries
    will be over,” they’ll click it and move on to the next problem.


    The automated procedure has, of course, improved over the years, and the latest
    algorithms for automatically collecting statistics on objects (and on columns
    especially) are very sophisticated. However, this does not mean you can ignore
    them. You need to pay attention to what’s being collected and make sure it’s appropriate
    for your data structures and queries. In this chapter we’ll cover how partitions
    affect your plans and statistics capture. We’ll also look at how to deal with
    sampling errors and how to lock statistics and when this should be done. If this
    sounds boring, then that’s where `SQLT` steps in and makes the whole process simpler
    and quicker. Let’s start with object statistics.


    ## What Are Statistics?


    When `SQL` performs badly, poor-quality statistics are the most common cause.
    Poor-quality statistics cover a wide range of possible deficiencies:


    *   Inadequate sample sizes.

    *   Infrequently collected samples.

    *   No samples on some objects.

    *   Collecting histograms when not needed.

    *   Not collecting histograms when needed.

    *   Collecting statistics at the wrong time.

    *   Collecting very small sample sizes on histograms.

    *   Not using more advanced options like extended statistics to set up correlation
    between related columns.

    *   Relying on auto sample collections and not checking what has been collected.


    It is crucial to realize that the mission statement of the cost-based optimizer
    (`CBO`) is to develop an execution plan that runs fast and to develop it quickly.
    Let’s break that down a little:


    *   “Develop quickly.” The optimizer has very little time to parse or to get the
    statistics for the object, or to try quite a few variations in join methods, not
    to mention to check for `SQL` optimizations and develop what it considers a good
    plan. It can’t spend a long time doing this, otherwise, working out the plan could
    take longer than doing the work.

    *   “Runs fast.” Here, the key idea is that “wall clock time” is what’s important.
    The `CBO` is not trying to minimize `I/O`s or `CPU` cycles, it’s just trying to
    reduce the elapsed time. If you have multiple `CPU`s, and the `CBO` can use them
    effectively, it will choose a parallel execution plan.


    [Chapter 1](../Text/9781430248095_Ch01.xhtml) discussed cardinality, which is
    the number of rows that satisfy a predicate. This means that the cost of any operation
    is made up of three operation classes:


    *   Cost of single block reads

    *   Cost of multi-block reads

    *   Cost of the `CPU` used to do everything


    When you see a cost of 1,000, what does that actually mean? An operation in the
    execution plan with a cost of 1,000 means that the time taken will be approximately
    the cost of doing 1,000 single-block reads. So in this case 1,000 x 12 ms, which
    gives 12 seconds (12 ms is a typical single- block read time).


    So what steps does the `CBO` take to determine the best execution plan? In very
    broad terms the query is transformed (put in any shortcuts that are applicable),
    then plans are generated by looking at the size of the tables and deciding which
    table will be the inner and which will be the outer table in joins. Different
    join orders are tried and different access methods are tried. By “tried” I mean
    that the optimizer will go through a limited number of steps (its aim is to develop
    a plan quickly, remember) to calculate a cost for each of them and by a process
    of elimination get to the best plan. Sometimes the options the optimizer tries
    are not a complete list of plans, and this means it could miss the best plan;
    but this is extremely rare.


    This is the estimation phase of the operation. If the operation being evaluated
    is a full table scan, this will be estimated based on the number of rows, the
    average length of the rows, the speed of the disk sub-system and so on.


    Now that we know what the optimizer is doing to try and get you the right plan,
    we can look at what can go wrong when the object statistics are misleading.


    ## Object Statistics


    The main components comprising object statistics are tables and indexes. To simplify
    the discussion, we will mainly look at table statistics, but the same principles
    will apply to all objects. In the estimation phase of the hard parsing mentioned
    above, where the size of tables is estimated and joins are chosen, the number
    of rows in the table is crucial. A simple example would be a choice between a
    nested loop or a hash join. If the number of rows is wrong, then the join method
    may be wrong. Other ways in which statistics can be wrong is by being out of date.
    Let’s look at the example in [Figure 3-1](#9781430248095_Ch03.xhtml#Fig1). In
    this example we see “Table Statistics” for `TABLE_A`, a non-partitioned table
    with a `Num Rows` value of 87,116, which was 100 percent analyzed.


    ![9781430248095_Fig03-01.jpg](Images/9781430248095_Fig03-01.jpg)


    [Figure 3-1](#9781430248095_Ch03.xhtml#_Fig1) .  In the “Table Statistics” section
    you can see the number of rows in a table, the sample size, and the percentage
    of the total data set that this sample represents


    Object statistics are a vital input to the `CBO`, but even these can lead the
    optimizer astray when the statistics are out of date. The `CBO` also uses past
    execution history to determine if it needs better sampling (cardinality feedback)
    or makes use of bind peeking to determine which of many potential execution plans
    to use. Many people rely on setting everything on `AUTO` but this is not a panacea.
    If you don’t understand and monitor what the auto settings are doing for you,
    you may not spot errors when they happen.


    Just to clarify, in the very simplest terms, why does the optimizer get it wrong
    when the statistics are out of date? After all once you’ve collected all that
    statistical information about your tables, why collect it again? Let’s do a thought
    experiment just like Einstein sitting in the trolley bus in Vienna.'
