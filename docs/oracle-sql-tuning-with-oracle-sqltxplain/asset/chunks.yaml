    \                      Kcfis control1\n_kcfis_control2                      Kcfis\
    \ control2\ncell_offload_processing              启用 SQL 处理卸载到单元格\n_slave_mapping_enabled\
    \               当值为 TRUE 时启用从属映射\n_projection_pushdown                 投影下推\n\
    _bloom_filter_enabled                启用或禁用布隆过滤器\n_bloom_vector_elements      \
