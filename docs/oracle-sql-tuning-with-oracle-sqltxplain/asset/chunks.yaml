    这样的脚本只是一个简单的脚本，更多的站点会接受它进行安装，因此更多的站点可以利用 SQLHC 提供的建议。SQLHC 是从 SQLT 发展而来的（它提供了
    SQLT 功能的一个子集），因此关于 SQLHC 能做什么的讨论涵盖了本书已经涉及的许多主题。


    以下是 SQL 运行状况检查报告涵盖的部分内容：

    '
- fmt: '## The sqlhc.sql Script


    *   An observation report, similar to SQLT but limited because of the limited
    access to the database.

    *   The SQL text.

    *   A summary of the table information including the number of rows and statistical
    sampling size.

    *   The number of columns and histograms for each table.

    *   A summary of all the index information for each table.

    *   A description of SQL plan baselines and profiles that are used for the SQL.

    *   The status of cursor sharing and the reasons for sharing.

    *   A history of the SQL Plans with associated statistics.

    *   A history of the execution plans.

    *   Active session history information.

    *   Column statistics and histogram types.

    *   System parameters and their values and default or non-default nature.

    *   A detailed description of all the execution plans.

    *   A SQL monitor report of the SQL.


    The above functionality is produced by the main script of SQLHC, which is `sqlhc.sql`.
    In fact, the previous versions of SQLHC consisted of only this script. Later versions
    also included `sqldx.sql` and `sqlhcxec.sql`. The `sqldx` routine is a superb
    utility that produces a test case with no dependence on SQLT. We’ll talk more
    about that in the section “The `sqldx.sql` Script.” We’ll also cover `sqlhcxec`.
    For now let’s look at the main script `sqlhc.sql`. The first step in any tuning
    exercise should be to look for the obviously wrong things. This is called a checklist:
    why go into a long tuning exercise when you’re missing an obvious index?


    The list of things that can be done incorrectly on a database or on any particular
    SQL is very long. The health check script and SQLT have these error checks built
    in. SQLHC has approximately a hundred checks that it carries out (SQLT has two
    to three times that many). With these built in checks you can find and fix those
    problems before you start any tuning exercise. In SQLT these errors are pointed
    out in the “Observations” section of the main report (see [Chapter 1](../Text/9781430248095_Ch01.xhtml)).
    In SQLHC there is also an observations section of the report in the first page
    of the SQLHC HTML file. If only a few of your SQLs are caught before they go to
    production with some “obvious” mistakes, it will be well worth your time to download
    and use the SQL health check scripts.


    ## What sqlhc.sql Produces


    The `sqlhc.sql` script is a single SQL script that produces one zip file, which
    contains four HTML files, three zip files and one trace file. If you do nothing
    else but run `sqlhc.sql` on each new SQL you introduce to your system, the health
    check script will have been worth the effort. The HTML files are reports in their
    own right and are well worth a careful read. The `sqlhc.sql` script is easy to
    use and takes only two parameters (we’ll look at an example run later in this
    chapter in the section “Running the SQLHC Script.”).


    Remember that these files can be reviewed in any order, and one does not depend
    on another. If you have a particular area you want to check, you can look at the
    appropriate file directly without looking at files in between. However, if you
    want to be thorough and check everything, the main HTML files are numbered for
    your convenience. Example file names are shown below:


    *   `sqlhcxec_20130103_205245_81s67vj4pjqm8_1_health_check.html`

    *   `sqlhcxec_20130103_205245_81s67vj4pjqm8_2_diagnostics.html`

    *   `sqlhcxec_20130103_205245_81s67vj4pjqm8_3_execution_plans.html`

    *   `sqlhcxec_20130103_205245_81s67vj4pjqm8_4_sql_detail.html`


    We’ll look at all the files produced by `sqlhc.sql` in the next section.


    This section describes the main report files. The first four files mentioned are
    the HTML pages created by `sqlhc.sql`. They all contain the SQL text so you can
    make sure you’re looking at the right file and view these in order from one to
    four.


    *   The first HTML report, the main health check script, gives you a good overview
    of observations and the general checks on the SQL. It covers observations and
    table and index summaries. The observations should be carefully reviewed for any
    problems.

    *   The second HTML report is more detailed and covers many miscellaneous areas,
    but most importantly it covers the current statistics (in the Current SQL Statistics
    section) and instance and system parameters. It also covers cursor sharing information
    and execution plan summaries. Historical information is also included, on tables,
    columns, indexes, instance, and system parameters. This report also covers SQL
    Plan baselines and profiles, as well as the new 11g feature SQL_Patches.

    *   Report three is useful if you think there is some issue with the execution
    plan or the execution plan has changed unexpectedly. Both current and historical
    execution plans are shown.

    *   The fourth report will give you some timings and shows you where you should
    concentrate your tuning effort.


    Other files include the following:


    *   A zip file with the SQL Monitor execution details for each of the execution
    plans.

    *   A 10046 and 10053 trace file for debugging optimizer issues.

    *   A text file containing the results from the execution of the SQL. This is
    to check that we are running the right SQL and that the results are what is expected.

    *   A zip file containing the log of the run and some ancillary SQL.

    *   Lastly, a SQLDX zip file that contains all of the discovered information in
    a CSV format. This will allow further post processing using spreadsheets.


    There are many useful files here, but the most useful parts of this output are
    the four HTML files and the SQL Monitor output. I’ll show some examples of these
    after running an example script. You can see that although we have not run SQLT,
    we still have a lot of information to work with.


    ## Running the SQLHC Script


    Before I start the example, I have already logged in to Metalink (or My Oracle
    Support) and downloaded the one zip file that constitutes the SQLHC script files.
    The file is called `sqlhc.zip`. It contains `sqldx.sql`, `sqlhc.sql` and `sqlhcxec.sql`.
    This one simple zip file is all that is required to get the information listed
    in the example below. When considering the endless HTML reports and historical
    information gathering and execution plans reports, why would you not want to run
    this script as a check for each deployed SQL?


    If you consider how much information you get from the SQL health check script
    and how little effort you have to put in to get this information it’s a wonder
    that this script is free to supported customers. In the example below I will log
