    \ bloom filtering\nparallel_force_local                 force single instance\
    \ execution\n\n16 rows selected.\n```\n\nOptimizer parameters, the fix control\
    \ settings and the special Exadata parameters are the only things that you can\
    \ explore with this method, but remember you can still change the baseline environment\
    \ and re-run your explore each time. Each XPLORE iteration takes a considerable\
    \ amount of time, so if you do make changes like these you need to be sure you’re\
    \ on the right track before committing to an XPLORE run.\n\nWhat XPLORE Cannot\
    \ Change\n\nXPLORE cannot change the structure of your SQL or suggest an index\
    \ or remove an index a table. It is purely designed to find the changes that occur\
    \ when CBO parameters are changed or when fix control changes are made. Even though\
    \ XPLORE cannot change these things for you you’re free to change the query in\
    \ `q.sql` and re-run XPLORE. For example you might decide that you need to change\
    \ an index type or remove an index. This is again somewhat beyond the scope of\
    \ XPLORE and can be done in better ways.\n\nWhat Is Fix Control?\n\nOracle is\
    \ an extremely flexible product, with many features and bug fixes, some of which\
    \ are turned off by default and some of which are turned on by default. Fix Control\
    \ then is the facility within Oracle that allows bug fixes to be changed from\
    \ 0 (FALSE) to 1 (TRUE) or visa versa. As you can imagine enabling or disabling\
    \ bug fixes in this way should only be done on a throwaway database as it can\
    \ severely damage your database (open a support call before making any changes\
    \ like this). Let’s look at one of these settings from the many that are used\
    \ in `xplore_script_1.sql`, the main script of the whole XPLORE process. We’ll\
    \ look at the 6897034 fix control parameter as an example. There are many many\
    \ other fix control parameters like this that we will not describe, but they are\
    \ all controlled in a similar way. This particular fix control parameter controls\
    \ the bug fix that takes into account NULL rows in estimating cardinality. When\
    \ “_fix_control” is true the optimizer takes NULLS into account. Here we set it\
    \ to FALSE, which is not likely to be something you would want to do in a real-life\
    \ situation.\n\n```\nALTER SESSION SET \"_fix_control\" = '6897034:0';\n```\n\n\
    The script, `xplore_script_1.sql`, which is the main driving script for the XPLORE\
    \ process will in one of the iterations of XPLORE change this fix control setting\
    \ from its default to its non-default value. In this case it will be changed from\
    \ 1 to 0\\. When it is set to 1 this fix control setting is on. When it is set\
    \ to 0 this fix control feature is off. We can find out what the feature is that\
    \ this fix control setting represents by querying `v$system_fix_control`. Below\
    \ I show a query where I interrogate my local database for the meaning of this\
    \ particular fix control setting:\n\n```\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n\
    \  OPTIMIZER_FEATURE_ENABLE,\n  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n\
    \  bugno=6897034;\n\nBUGNO      VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE\
    \  IS_DEFAULT\n---------- ---------- --------------------- -------------------------\
    \ ----------\n   6897034          1 index cardinality est 10.2.0.5           \
    \                1\n                      imates not taking int\n            \
    \          o account NULL rows\n```\n\nIn this particular case bug number 6897034\
    \ has to do with index cardinality estimates and those estimates in relation to\
    \ NULLs in rows. That could be a pretty serious problem, so by default this has\
    \ been set to 1 (TRUE). The script I am running will set it to 0 to see if that\
    \ makes a difference to the execution plan. The oldest version of Oracle in which\
    \ this value was set to 1 was 10.2.0.5\\. In the previous version, 10.2.0.4 the\
    \ value was 0 (or this bug fix was not introduced).\n\nRemember I said that `optimizer_features_enable`\
    \ was like a super switch. Well, we can test that now by setting `optimizer_features_enable`\
    \ to 10.2.0.4 and seeing what happens to this particular fix control. First I\
    \ show the current value of `optimizer_features_enable`, and then I show the current\
    \ value of the fix control. Then I change the super parameter to 10.2.0.4, (first\
    \ at the session level then at the system level). The value I have to set is the\
    \ value just before 10.2.0.5, which is the value of the `OPTIMIZER_FEATURE_ENABLE`\
    \ column for the fix control. (Yes the column is `OPTIMIZER_FEATURE_ENABLE,` and\
    \ the parameter is `optimizer_features_enable`). After setting the super parameter\
    \ at the system level I re-query the value of the fix control and I see that the\
    \ super parameter has done its job and set the fix control as it would have been\
