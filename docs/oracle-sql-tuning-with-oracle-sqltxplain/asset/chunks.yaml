    \        xplore\n              30 File(s)        498,251 bytes\n             \
    \  5 Dir(s)   7,103,299,584 bytes free\n```\n\n## roxtract工具的使用示例\n\n正如我们上面看到的，`roxtract.sql`可以在`SQLT`解压区域的`utl`目录中找到。你仍然需要此过程存在于目标系统上，但你不需要`SQLTXPLAIN`模式，实际上对于`roxtract.sql`，你是以`SYS`身份运行脚本。这是此案例中的目标SQL：\n\
    \n```\nSQL>\nselect /*+ GATHER_PLAN_STATISTICS MONITOR*/\n  cust_first_name,\n\
    \  amount_sold\nfrom\n  customers C,\n  sales S\nwhere\n  c.cust_id=s.cust_id\n\
    \  and amount_sold > 1750\n```\n\n现在我们获取`SQL_ID`：\n\n```\nSQL> select sql_id from\
    \ v$sqlarea where sql_text like 'select /*+ GATHER_PLAN_STATISTICS%';\nSQL_ID\n\
    ----------------\ndck1xz983xa8c\n```\n\n现在我们有了`SQL_ID`，就可以从`SYS`账户运行`roxtract`脚本。注意，我们必须输入`SQL_ID`、许可级别以及是否要选择10053信息。注意没有提示输入`SQLTXPLAIN`模式密码，因为我们不使用它。\n\
    \n```\nSQL>@roxtract\nParameter 1:\nOracle Pack License (Tuning, Diagnostics or\
    \ None) [T|D|N] (required)\nEnter value for 1: T <<<You must enter a value here\n\
    PL/SQL procedure successfully completed.\n\nParameter 2:\nSQL_ID of the SQL to\
    \ be analyzed (required)\n\nEnter value for 2: dck1xz983xa8c <<<This is the SQL\
    \ ID we are investigating\n\nParameter 3:\nEVENT 10053 Trace (on 11.2 and higher)\
    \ [Y|N]\n\nEnter value for 3: Y <<<We want a 10053 trace file.\n\nPL/SQL procedure\
    \ successfully completed.\n\nValues passed:\n∼∼∼∼∼∼∼∼∼∼∼∼∼\nLicense: \"T\"\nSQL_ID\
    \ : \" dck1xz983xa8c\"\nTrace  : \"Y\"\n\nPL/SQL procedure successfully completed.\n\
    ```"
  raw: "Some features are not available. For example, in [Figure 9-1](#9781430248095_Ch09.xhtml#Fig1)\
    \ I’ve highlighted two sections that do not have links, as they are not available\
    \ in XTRSBY. This is because routines on the standby cannot be run (we saw earlier\
    \ in the chapter what happens). What about the execution plans? They are visible\
    \ as usual. You’ll see in [Figure 9-2](#9781430248095_Ch09.xhtml#Fig2) that there\
    \ is no real difference in the information collected.\n\n![9781430248095_Fig09-02.jpg](Images/9781430248095_Fig09-02.jpg)\n\
    \n[Figure 9-2](#9781430248095_Ch09.xhtml#_Fig2) .  An execution plan collected\
    \ by XTRSBY shows the links used\n\nIn [Figure 9-2](#9781430248095_Ch09.xhtml#Fig2)\
    \ we see that all the usual features described in [Chapter 2](../Text/9781430248095_Ch02.xhtml)\
    \ and [3](../Text/9781430248095_Ch03.xhtml) are present and can be interpreted\
    \ in the same way. In this new example (created on a different machine) the link\
    \ name, still called TO_STANDBY, is shown in the execution plan. We also see that\
    \ under the “Environment” heading (which we can reach by clicking on “Environment”\
    \ from the top of the report), we see that the standby database link is shown.\
    \ See [Figure 9-3](#9781430248095_Ch09.xhtml#Fig3).\n\n![9781430248095_Fig09-03.jpg](Images/9781430248095_Fig09-03.jpg)\n\
    \n[Figure 9-3](#9781430248095_Ch09.xhtml#_Fig3) .  The standby database link is\
    \ shown in the Environment section\n\nApart from those few minor differences the\
    \ SQLTXPLAIN report is the same. Even though XTRSBY is very useful in its limited\
    \ way, we still need to collect some information on the standby system itself.\
    \ In earlier versions of SQLT (for example, 11.4.4.6), the read-only  tool `roxtract.sql`\
    \ would be used. This tool is now replaced with SQLHC [chapter 14](../Text/9781430248095_Ch14.xhtml)).\
    \ The read-only (ro) tool is still useful, and if you have an older version of\
    \ SQLT you may want to use this tool anyway. The tool is named with an RO prefix\
    \ to indicate it is a read-only tool and does most of what the main XTRACT tool\
    \ does. It is however not available from version 11.4.5.1 of SQLT onward.\n\n\
    The roxtract Tool\n\nThe `utl` area of the `SQLT` directory has many useful utilities\
    \ in it. One of these is `roxtract.sql`. This read-only routine is specially designed\
    \ for running in a read-only database and so is ideal for a Data Guard Physical\
    \ Standby Database open in read-only mode. I’m sure you’re already asking how\
    \ this routine is different from the `xtrsby.sql` routine we’ve just been looking\
    \ at. The simple answer is that running remotely (like `xtrsby.sql`) across a\
    \ database link doesn’t get us everything. Some things are better done locally,\
    \ and we’ll see shortly what `roxtract.sql` produces. This routine runs directly\
    \ on the read-only Data Guard standby database (with a suitably privileged account)\
    \ and produces the reports locally unlike `xtrsby.sql,` which produces its reports\
    \ on the read-write database. To get at this extra information we have to use\
    \ the routines provided in the `utl` directory. Here’s the directory listing on\
    \ a windows system.\n\n```\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\\
    sqlt\\utl>dir\n Volume in drive C has no label.\n Volume Serial Number is 77E9-80B4\n\
    ```\n\n```\nDirectory of C:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\\
    sqlt\\utl\n```\n\n```\n11/03/2012  10:08 AM    <DIR>          .\n11/03/2012  10:08\
    \ AM    <DIR>          ..\n07/02/2011  12:49 AM               130 10053.sql\n\
