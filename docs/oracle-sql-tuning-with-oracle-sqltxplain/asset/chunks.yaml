    \n[Figure 14-1](#9781430248095_Ch14.xhtml#_Fig1) .  The top of the first SQLHC\
    \ HTML file\n\nEach of the sections in the HTML report can be reached by use of\
    \ the hyperlinks in the section shown above in the figure. I’ll look at three\
    \ of the four sections of this report in the following sections, omitting the\
    \ SQL Text section, which is self-explanatory.\n\nThe Observations Section\n\n\
    The most interesting one is the “Observations” section, which lists what it considers\
    \ observations of interest. Usually these are complaints about non-standard settings\
    \ or architectural items that do not conform to best practices. Let’s look at\
    \ an example “Observations” section as shown in [Figure 14-2](#9781430248095_Ch14.xhtml#Fig2).\n\
    \n![9781430248095_Fig14-02.jpg](Images/9781430248095_Fig14-02.jpg)\n\n[Figure\
    \ 14-2](#9781430248095_Ch14.xhtml#_Fig2) .  The Observations section of the health\
    \ check\n\nThe Observations section has many interesting suggestions for ways\
    \ to improve your SQL. I have only shown the left side of the screen. In [Figure\
    \ 14-3](#9781430248095_Ch14.xhtml#Fig3) I show the corresponding right side of\
    \ the screen, which tells us what needs to be done to remedy or investigate the\
    \ observations. I have highlighted two observations in [Figure 14-2](#9781430248095_Ch14.xhtml#Fig2),\
    \ which could be useful to investigate. The first one related to the value of\
    \ the parameter `optimizer_dynamic_sampling` having a non-default value of 4 (the\
    \ default is 2). The second one is related to a height-balanced histogram that\
    \ has no popular values. Let’s look at the right hand side of the display ([Figure\
    \ 14-3](#9781430248095_Ch14.xhtml#Fig3)) to see the column labeled “More” (changing\
    \ to “Details” in subsequent versions of SQLT).\n\n![9781430248095_Fig14-03.jpg](Images/9781430248095_Fig14-03.jpg)\n\
    \n[Figure 14-3](#9781430248095_Ch14.xhtml#_Fig3) .  The right hand side of the\
    \ observations section\n\nThe “More” column should really be called the “suggestion”\
    \ column. For example, in the case of the non-default `optimizer_dynamic_sampling`\
    \ parameter the suggestion is “Review the correctness of this non-default value\
    \ “4” for SQL_ID 81s67vj4pjqm8.” This means that the value 4 was found, and it\
    \ was “suggested” that we should think long and hard before sticking to the current\
    \ value of 4\\. The suggested value is 2\\. If this were a SQL going into production\
    \ there would have to be a discussion between DBAs and developers about why the\
    \ value was set to 4 and whether 2 would be better."
