    If we now click on “Plans Summary” we end up at the Plans Summary section, which
    shows two execution plans (as expected). One plan is almost instantaneous and
    the other takes 0.016 seconds in elapsed time. You can guess that the faster execution
    time is associated with the value of the predicate when it is set to `DIMENSION`
    (the rarer value). See [Figure 7-4](#9781430248095_Ch07.xhtml#Fig4) for the details
    of the execution plans.


    ![9781430248095_Fig07-04.jpg](Images/9781430248095_Fig07-04.jpg)


