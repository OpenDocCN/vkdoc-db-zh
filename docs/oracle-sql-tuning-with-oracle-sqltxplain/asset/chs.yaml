  12/11/2012  08:47 PM         1,012,953 sqlt_s11992_trc.zip\n```\n\n我在上面的目录列表中高亮显示了两个文件。第一个文件\
  \ `sqlt_s11992_tc.zip` 是标准测试用例文件。我们将在下一节讨论如何使用此文件。第二个文件 `sqlt_s11992_tcx.zip` 是一个较新的创新（截至\
  \ 2012 年 12 月），我们将在“测试用例快速模式”部分进行讨论。\n\n## 逐步创建测试用例\n\n创建测试用例的第一步是在 SQLT 主目录下创建一个子目录。然后，将\
  \ `sqlt_s11992_tc.zip` 文件复制到该目录并解压。这将创建多个文件，我们将逐一描述。以下是一个示例列表。\n\n```\n12/11/2012\
