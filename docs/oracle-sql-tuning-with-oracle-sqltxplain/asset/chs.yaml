- "# SQL Profile 能用来做什么？\n\n现在我们有了 `sqlt_s89915_p3005811457_sqlprof.sql` 脚本，能用它来做什么呢？简而言之，我们可以在\
  \ SQL 正在执行的数据库上运行这个脚本，它将**冻结**该 SQL ID 的执行计划。它也可以用于在另一个系统上冻结执行计划。例如，如果你的开发系统拥有正确的执行计划，而生产系统却没有，你就可以**转移**执行计划。在某些情况下，生产数据库可能因为某个关键的\
  \ SQL 使用了错误的执行计划，导致运行速度过慢，无法在执行时间窗口内完成，从而使数据库处于不可用的状态，此时仅凭这个脚本就值回本书的价钱。让我们来看看这个脚本。\n\
  \n```\nSPO sqlt_s89915_p3005811457_sqlprof.log;\nSET ECHO ON TERM ON LIN 2000 TRIMS\
  \ ON NUMF 99999999999999999999;\nREM\nREM $Header: 215187.1 sqlt_s89915_p3005811457_sqlprof.sql\
  \ 11.4.4.6 2012/09/01 carlos.sierra $\nREM\nREM Copyright (c) 2000-2012, Oracle\
  \ Corporation. All rights reserved.\nREM\nREM AUTHOR\nREM   carlos.sierra@oracle.com\n\
  REM\nREM SCRIPT\nREM   sqlt_s89915_p3005811457_sqlprof.sql\nREM\nREM SOURCE\nREM\
  \   Host    : LOCUTUS\nREM   DB Name : SNC1\nREM   Platform: 32-bit Windows\nREM\
  \   Product : Oracle Database 11g Enterprise Edition (Production)\nREM   Version\
  \ : 11.2.0.1.0\nREM   Language: US:AMERICAN_AMERICA.WE8MSWIN1252\nREM   EBS    \
  \ : NO\nREM   Siebel  : NO\nREM   PSFT    : NO\nREM\nREM DESCRIPTION\nREM   此脚本由\
  \ SQLT 工具自动生成。\nREM   它包含用于创建自定义 SQL Profile 的 SQL*Plus 命令，\nREM   该配置基于计划哈希值 3005811457。\n\
  REM   由该脚本创建的自定义 SQL Profile 将影响其签名\nREM   与下方 SQL 文本签名相匹配的 SQL 命令的计划。\nREM   请审阅\
  \ SQL 文本并酌情调整。\nREM\nREM PARAMETERS\nREM   无。\nREM\nREM EXAMPLE\nREM   SQL> START\
