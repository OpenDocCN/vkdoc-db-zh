  \ 10);\n\nPL/SQL procedure successfully completed.\n\nSQL> EXEC DBMS_STATS.SET_SYSTEM_STATS('IOTFRSPEED',\
  \ 4096);\n\nPL/SQL procedure successfully completed.\n\nSQL>\nSQL> SPO OFF;\nSQL>\
  \ SET ECHO OFF;\n```\n\n# 6. 连接为 TC64661 并设置 CBO 环境\n\n## 6/7 按 ENTER 键连接为 TC64661\
  \ 并设置 CBO 环境。\n\n### 步骤 6 操作说明\n\n6.  在第 6 步中，我们连接为测试用户。你会在输出中看到这一行：\n\n```\nSQL>\
  \ CONN &&tc_user./&&tc_user.\nConnected.\nSQL> @@sqlt_s64661_set_cbo_env.sql\nThe\
  \ script sqlt_s64661_set_cbo_env.sql will set the CBO environment. It is an important\
  \ and you will be prompted before you run it.\nSQL> ALTER SESSION SET optimizer_features_enable\
  \ = '11.2.0.1';\n\nSession altered.\n\nSQL>\nSQL> SET ECHO OFF;\n```\n\n### 执行 CBO\
  \ 环境设置命令\n\n按 ENTER 键执行 `ALTER SYSTEM/SESSION` 命令以设置 CBO 环境。\n\n当你此时按 Enter 键时，*所有*\
  \ CBO 环境设置都会被设置为 SQL 来源系统中的值。在我的案例中，日志文件顶部包含以下内容：\n\n```\n/*************************************************************************************/\n\
  SQL>\nSQL> REM Non-Default or Modified Parameters\nSQL>\nSQL> -- enable modification\
  \ monitoring. isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\" issys_modifiable=\"IMMEDIATE\"\
  \nSQL> ALTER SYSTEM SET \"_dml_monitoring_enabled\" = TRUE SCOPE=MEMORY;\n\nSystem\
  \ altered.\n\nSQL>\nSQL> -- optimizer secure view merging and predicate pushdown/movearound.\
  \ isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\" issys_modifiable=\"IMMEDIATE\"\n\
  SQL> ALTER SYSTEM SET optimizer_secure_view_merging = TRUE SCOPE=MEMORY;\n\nSystem\
  \ altered.\n\nSQL>\nSQL> -- number of CPUs for this instance. isdefault=\"TRUE\"\
  \ ismodified=\"SYSTEM_MOD\" issys_modifiable=\"IMMEDIATE\"\nSQL> ALTER SYSTEM SET\
  \ cpu_count = 2 SCOPE=MEMORY;\n\nSystem altered.\n\nSQL> -- number of parallel execution\
  \ threads per CPU. isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\" issys_modifiable=\"\
  IMMEDIATE\"\nSQL> ALTER SYSTEM SET parallel_threads_per_cpu = 2 SCOPE=MEMORY;\n\n\
  System altered.\n\nSQL>\nSQL> -- Maximum size of the PGA memory for one process.\
  \ isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\" issys_modifiable=\"IMMEDIATE\"\n\
  SQL> ALTER SYSTEM SET \"_pga_max_size\" = 209715200 SCOPE=MEMORY;\n\nSystem altered.\n\
  \nSQL>\nSQL> -- optimizer use feedback. isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\"\
  \nSQL> ALTER SESSION SET \"_optimizer_use_feedback\" = TRUE;\n\nSession altered.\n\
  \nSQL>\nSQL> -- optimizer dynamic sampling. isdefault=\"TRUE\" ismodified=\"SYSTEM_MOD\"\
  \nSQL> ALTER SESSION SET optimizer_dynamic_sampling = 0;\n\nSession altered.\n```\n\
  \n注意我们是如何更改系统参数的。例如，`optimizer_dynamic_sampling` 被设置为 `0`。这不是默认值，正如我们在第 8 章中学到的。除了非默认的系统参数外，我们还设置了会话参数。以下是从日志文件中截取的一部分，我们在此设置了许多隐藏的会话参数：\n\
  \n```\nSQL>\nSQL> -- compute join cardinality using non-rounded input values\nSQL>\
  \ ALTER SESSION SET \"_optimizer_new_join_card_computation\" = TRUE;\n\nSession\
  \ altered.\n\nSQL>\nSQL> -- null-aware antijoin parameter\nSQL> ALTER SESSION SET\
  \ \"_optimizer_null_aware_antijoin\" = TRUE;\n\nSession altered.\n\nSQL> -- Use\
  \ subheap for optimizer or-expansion\nSQL> ALTER SESSION SET \"_optimizer_or_expansion_subheap\"\
  \ = TRUE;\n\nSession altered.\n\nSQL>\nSQL> -- Eliminates order bys from views before\
  \ query transformation\nSQL> ALTER SESSION SET \"_optimizer_order_by_elimination_enabled\"\
  \ = TRUE;\n\nSession altered.\n```\n\n注意前面的例子中包含了隐藏参数。在下一个例子中，我们甚至设置了 `fix_control`\
  \ 参数。`fix_control` 参数控制数据库中包含的某些错误修复是启用还是禁用。以下是日志文件中修复控制部分的摘录（我们将在下一章中详细讨论修复控制）。\n\
  \n```\nSQL>\nSQL> -- remove distribution method optimization for insert/update qbc\
  \ (ofe 11.2.0.1) (event 0)\nSQL> ALTER SESSION SET \"_fix_control\" = '6376551:1';\n\
  \nSession altered.\n```\n\n# 7. 执行测试用例\n\n在步骤 7 中，我们终于可以执行测试用例中的 SQL 了。以测试用例用户身份执行测试用例，将输出查询结果以及查询的执行计划。在我们的示例中，结果大致如下所示：\n\
