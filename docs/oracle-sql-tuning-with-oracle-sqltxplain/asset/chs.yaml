  \n## 添加和移除提示\n\n在我之前的例子中，我们看到设置会话参数可以改变执行计划，并且在我们的测试系统上，我们无需所有数据就能看到这些变化。我们看到设置`optimizer_index_cost_adj`产生了影响，也许我们需要一个索引提示来帮助。因此，将`optimizer_index_cost_adj`设置回默认值\
