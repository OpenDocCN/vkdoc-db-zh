  \n## 运行 SQLTCOMPARE\n\n一旦我们导入了数据，就可以运行 `SQLTCOMPARE`。我们可以在命令行带参数或不带参数运行。在这种情况下，我将省略参数，以便我们可以看到提示信息：\n\
  \n```\nSQL> @sqltcompare\n. . . please wait . . .\n\nSTAID MET INSTANCE SQL_TEXT\n\
