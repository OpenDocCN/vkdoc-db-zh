  SQL>\nSQL> REM OTHERS\nSQL>\nSQL>\nSQL>\nSQL> /**********************************************************************/\n\
  SQL>\nSQL> SET ECHO OFF VER OFF PAGES 1000 LIN 80 LONG 8000000 LONGC 800000;\n\n\
  PL/SQL 过程已成功完成。\n\n:VALID_OBJECTS\n--------------------------------------------------------------------------------\n\
  VALID TABLE TC64661 COUNTRIES\nVALID TABLE TC64661 CUSTOMERS\nVALID TABLE TC64661\
