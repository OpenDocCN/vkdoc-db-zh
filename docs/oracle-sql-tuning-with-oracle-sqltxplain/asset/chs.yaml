  \ XTRACT`报告（一份`SQLTXECUTE`报告同样适用），我们现在就可以检查发生了什么。\n\n## 使用 SQLTXTRACT 报告检查 ACS\n\
  \n`SQLTXTRACT`和`SQLTXECUTE`报告都会收集 ACS 信息。这两种`SQLTXPLAIN`报告都会收集绑定变量信息（如果有的话），并在清晰的报告中向你展示这些信息。我们的示例报告恰好是`SQLTXTRACT`报告，但导航和示例对两种`SQLTXPLAIN`报告都适用。首先，我们可以检查是否选择了正确的\
  \ SQL：参见图 7-2，它显示了带有一个绑定变量的 SQL，符合预期。\n\n![9781430248095_Fig07-02.jpg](img/9781430248095_Fig07-02.jpg)\n\
  \n图 7-2 .  显示带有绑定变量的 SQL\n\n如果我们从主`SQLTXTRACT`报告顶部的超链接导航到观察部分，可以看到有一个观察结果：该 SQL\
  \ 语句存在多个执行计划。参见图 7-3，它显示了这一点：\n\n![9781430248095_Fig07-03.jpg](img/9781430248095_Fig07-03.jpg)\n\
  \n\n\n图 7-3。显示了\"观察结果\"部分（注意，针对一条 SQL 找到了两个执行计划）\n\n如果我们现在点击\"计划摘要\"，就会跳转到\"计划摘要\"\
  部分，其中显示了两个执行计划（如预期那样）。一个计划几乎是瞬间完成的，另一个耗时 0.016 秒。你可以猜测，较快的执行时间与谓词值被设置为 `DIMENSION`（较罕见的值）时相关联。有关执行计划的详细信息，请参见图\
  \ 7-4。\n\n![9781430248095_Fig07-04.jpg](img/9781430248095_Fig07-04.jpg)\n\n图 7-4。两个执行计划，一个快，一个慢。一个与\
  \ `DIMENSION` 相关，另一个与 `SYNONYM` 相关\n\n上图是\"计划摘要\"部分的左侧。正如预期，我们看到对于值 `Plan Hash Value\
  \ 2348726875`，执行更慢、CPU 使用率更高、缓冲区读取更多，因为这是与谓词值 `SYNONYM` 相关联的计划。如果我们查看同一部分的右侧，会看到更多佐证（见图\
  \ 7-5）。\n\n![9781430248095_Fig07-05.jpg](img/9781430248095_Fig07-05.jpg)\n\n图 7-5。\"\
  计划摘要\"部分的右侧显示，第二个计划哈希值具有更高的成本和更高的预计秒数\n\n要确认这一点，请点击较慢计划的计划哈希值超链接。这将带我们进入该计划的详细信息。请参见图\
  \ 7-6。\n\n![9781430248095_Fig07-06.jpg](img/9781430248095_Fig07-06.jpg)\n\n图 7-6。在这里我们看到了执行计划、窥探到的绑定变量和捕获到的绑定变量\n\
  \n正如预期，当使用值 `SYNONYM` 时，执行速度较慢。这是因为表中有 55,604 个值匹配\"`SYNONYM`\"。因此，快速全表扫描似乎是合适的。如果我们查看\
  \ `DIMENSION`（仅匹配 10 行）的执行计划，会看到成本仅为 3，且计划基于`索引范围扫描`。请参见显示此内容的图 7-7。\n\n![9781430248095_Fig07-07.jpg](img/9781430248095_Fig07-07.jpg)\n\
  \n图 7-7。显示了与 `DIMENSION`（一个罕见值）相关联的计划的执行计划详细信息\n\n现在，让我们回到报告顶部并点击\"自适应游标共享\"。这将带我们来到图\
  \ 7-8 所示的部分。\n\n![9781430248095_Fig07-08.jpg](img/9781430248095_Fig07-08.jpg)\n\n\
  图 7-8。显示了关于自适应游标共享的部分\n\n关于\"自适应游标共享\"的部分需要一些解释。此部分的游标列表，显示了与 SQL 文本相关的所有子游标。有一个子游标\
  \ 0 和一个子游标 1。子游标 (1) 与 `DIMENSION` 值相关（因为它出现在 `SYNONYM` 值之后）。我们还在\"是否绑定敏感\"列下看到，两个子游标都是绑定敏感的，并且在此情况下（因为我们多次运行了与\
  \ `DIMENSION` 相关的语句），对于子游标 1，我们还有一个\"是否绑定感知\"的值为\"Y\"。当存在带有相关直方图的绑定变量时，游标始终是绑定敏感的。如果我们查看整个过程中\
  \ `IS_BIND_SENSITIVE` 和 `IS_BIND_AWARE` 的值，会看到如下内容：\n```\nSQL> select IS_BIND_SENSITIVE\
  \ S, IS_BIND_AWARE A from v$sqlarea where sql_id=' 5fvxn411s48p0';\n\nS A\n- -\n\
  Y N <<<第一次执行后 (SYNONYM)\n\nY N <<<第二次执行后 (TABLE)\n\nY N <<<第三次执行后 (SYNONYM)\n\n\
  Y N <<<第四次执行后 (DIMENSION)\n\nY N <<<第五次执行后 (DIMENSION)\n\nY N <<<第六次执行后 (DIMENSION)\n\
  \nY N <<<第七次执行后 (DIMENSION)\nY Y\n\nY N <<<第八次执行后 (DIMENSION)\nY Y\n\nY N <<<第九次执行后\
  \ (DIMENSION)\nY Y\n\nY N <<<第十次执行后 (DIMENSION)\nY Y\n```\n\n\n\nY N <<<第 11 次执行后（维度）\n\
  Y Y\n\nY N <<<第 12 次执行后（维度）\nY Y\n```\n\n在这种情况下，对于所有子游标，`绑定敏感`列始终设置为“是”。但第二个子游标是如何创建的，又是在何时创建的呢？该算法未公开或未记录在案，但线索可在《自适应游标共享》章节的直方图标题下找到。查看`桶\
  \ ID`列。似乎只有三个桶：`0`、`1` 和 `2`。底部的注释提到，`0`桶代表小于 1 千次。`1`桶代表大于 1 千次但小于 1 百万次，而`2`桶代表所有超过\
  \ 1 百万次的情况。因此，对于游标`0`（请记住，这是`同义词`和`表`的值），总共有六次执行，所有执行的缓冲区获取都少于 1 百万次。对于子游标编号`1`，情况则不同。它的六次执行中，每一次的缓冲区获取都少于\
  \ 1 千次。这就是为什么在第七次执行后，创建了一个新的、具有绑定感知能力的子游标。一些数据库管理员将此称为“预热桶”。其理念是，如果谓词值很少出现，就没有必要创建一个新桶（以及随之而来的开销）。我们也通过这个宽泛的标准来判断一个谓词是否与另一个子游标相同。一旦游标具备绑定感知能力，它就可以用于匹配那些被窥视的绑定值。在这个简单的例子中，这意味着基于绑定值，可以生成并使用两个执行计划。\n\
  \n本章涵盖了自适应游标共享是什么以及其工作原理。所展示的示例是一个简单的一维示例；只有一个列包含倾斜数据。如果你有一个包含多个倾斜数据列的表，那么你可能会得到这些列的不同组合，每种组合都会生成它们自己的子游标。自适应游标共享通过为每个列创建一系列选择性范围来支持这一点。\n\
  \n自适应游标共享会出错吗？\n\n与所有试图提升性能的功能一样，在极少数情况下，性能实际上会下降。如果你感觉执行计划不稳定，或者选择了错误的计划，你始终可以通过设置以下参数来禁用自适应游标共享（在首先咨询\
  \ Oracle 支持后）：\n\n```\nSQL> alter system set \"_optimizer_extended_cursor_sharing_rel\"\
  =NONE scope=both;\nSQL> alter system set \"_optimizer_extended_cursor_sharing\"\
  =none scope=both;\n```\n\n现在我们已经禁用了自适应游标共享，再次运行 `acs.sql` 的结果是什么？\n\n```\nSQL> @acs\n\
