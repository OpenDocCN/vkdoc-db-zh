  \n# 5. 恢复系统统计信息\n\n## 5/7 按 ENTER 键恢复系统统计信息。\n\n我们刚刚将对象统计信息导入到 `TC64661`（从存储库中）到系统中，使它们成为测试模式的统计信息。在此过程结束时，我们看到每个对象的统计信息都已成功导入，然后系统会提示你继续执行第\
  \ 5 步。\n\n### 步骤 5 操作说明\n\n5.  现在在第 5 步中，我们删除现有的系统统计信息（我之前提到过，你只应在可以替换且没有生产数据、没有其他用户的系统上执行此操作吗？）。然后，为系统统计信息设置新值。之后系统会提示你继续执行第\
  \ 6 步。\n\n```\nSQL> EXEC DBMS_STATS.DELETE_SYSTEM_STATS;\n\nPL/SQL procedure successfully\
