  \ `q.sql`（添加提示）并运行 `tc.sql`。无需其他操作。\n\n## 优化器的版本\n\n假设我们将 SQL 从 10g 版本升级或转移到了 11g\
  \ 版本。我们认为执行计划可能在这两个版本之间发生了变化。我们可以通过将 `optimizer_features_enable` 更改为 `'10.2.0.5'`\
  \ 来测试这个想法。然后，我们可以通过在会话级别设置该参数并重新测试来轻松简单地完成此操作。\n\n执行此测试的步骤是：\n\n```sql\nSQL> alter\
  \ session set optimizer_features_enable='10.2.0.5';\nSQL> @tc\n```\n\n在这种情况下，我们看到执行计划没有变化，但在其他情况下我们可能会看到一些变化，通常\
  \ 11g 版本的执行计划更好，但并非总是如此。请记住，`optimizer_features_enable` 就像一个超级开关，可以开启或关闭数据库中的许多功能。将此参数设置为某个功能引入之前的版本值，可以关闭任何新功能。例如，通过将此参数设置为\
  \ `10.2.0.5`（一个该功能尚不存在的数据库版本），您可以禁用 SQL 计划管理。这不是针对任何特定问题的推荐解决方案，但如果它改善了特定 SQL 的性能，将有助于给开发人员或\
  \ DBA 一个线索，即解决方案可能在于研究后续版本中引入的新功能之一。由于 `optimizer_features_enable` 参数没有带来差异，我们将其设置回\
  \ `11.2.0.1`。\n\n## SQL 的结构\n\n测试用例一旦构建，就允许您以多种方式研究目标 SQL，包括更改 SQL 本身，只要您的 SQL 不包含任何新表（这些表未被\
  \ XTRACT 捕获），您就可以以相同的方式测试 SQL。在此示例中，我将 SQL 从\n\n```sql\nselect /*+ INDEX(S SALES_CUST_BIX)\
  \ */\n  country_name, sum(AMOUNT_SOLD)\nfrom sales s, customers c, countries co\n\
  where\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
  \ in ('Ireland','Denmark','Poland',\n  'United Kingdom','Germany','France','Spain','The\
  \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n```\n\
  \n更改为\n\n```sql\nselect /*+ INDEX(S SALES_CUST_BIX) */\n  country_name, sum(AMOUNT_SOLD)\n\
  from sales s, customers c, countries co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n\
  \  and country_name in ( select country_name from sh.countries where\n  country_name\
