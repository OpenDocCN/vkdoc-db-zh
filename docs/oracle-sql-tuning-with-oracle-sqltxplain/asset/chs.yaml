  *   `DBA_HIST_SQL_PLAN`



  SQLT 会尽可能多地在多个位置查找执行计划，以便为您提供全面的选项。当 SQLT 收集此信息时，它会查看与每个计划相关的成本，并用红色的“W”（最差）和绿色的“B”（最佳）进行标记。在我的简单测试案例中，“最佳”和“最差”是相同的，因为实际只有一个执行计划。但是，您会注意到有三条记录：一条来自挖掘内存
  `GV$SQL_PLAN`，一条来自 `PLAN_TABLE`（即 `EXPLAIN PLAN`），还有一条来自 `DBA_SQLTUNE_PLANS`（SQL
  调优分析器），其来源是 `DBA_SQLTUNE_PLANS`。


  当您在这里拥有许多记录（或许是很长的历史记录）时，您可以回溯查看哪些计划是最佳的，并尝试找出它们发生变化的原因。注意变化的时间点有时至关重要，因为它能帮助您精准定位到导致情况恶化的变更。


  在我们深入探讨“执行计划”章节的更多细节用法之前，我们需要更复杂的示例。


  ## 连接方法


  本书侧重于使用 SQLT 进行非常实用的性能调优。我尽量避免不必要的概念和调优细枝末节。因此，我不会涵盖所有可用的连接方法，也不会介绍所有可能包含性能相关信息的
  DBA 表，或者每一个提示。这些内容在众多资料中都有详细记载，尤其是 Oracle 性能指南（我推荐阅读）。然而，我们需要介绍一些基本概念，以确保我们能从使用
  SQLT 中获得最大收益。例如，这里有一些简单的连接。顾名思义，连接是一种将两个数据集“连接”在一起的方式：一个数据集可能包含姓名和年龄，另一个表可能包含姓名和收入水平。在这种情况下，您可以“连接”这些表以获取特定年龄和收入水平的人的姓名。正如操作名称所暗示的，必须有东西能将两个数据集连接起来：在我们的例子中，就是姓名。那么，有哪些简单的连接呢？（即我们在
  SQLT 报告中会看到的那些）。


  *   `哈希连接 (HASH JOINS, HJ)` – `较小`的表被散列并放入内存。然后扫描`较大`的表以查找与内存中散列值匹配的行。如果大小表顺序颠倒，这种方式效率低下。如果表不大，这种方式效率低下。如果较小的表无法完全放入内存，那么这就不仅仅是效率低下了：情况会非常糟糕！

  *   `嵌套循环 (NESTED LOOP, NL)` – 如果表较小，嵌套循环连接更合适。请注意上面的执行计划示例中，一个是 `HASH JOIN`，另一个是
  `NESTED LOOP`。为什么为每个任务选择了不同的连接方式？每种连接方法的细节及其相关成本可以从 `10053 跟踪文件`中确定。通过调整优化器参数 `Optimizer_index_cost_adj`
  和 `optimizer_index_caching` 来提升索引和 NL 的使用是一种常见做法。但这通常不是一个制胜策略。这些参数应设置为默认值 `100`
  和 `0`。首先应致力于正确获取对象和系统统计信息。

  *   `笛卡尔连接 (CARTESIAN JOINS)` – 通常效果不佳。第一张表的每一行都被用作键来访问第二张表的每一行。如果连接表中的行数非常少，这种连接方式尚可。在大多数生产环境中，如果您看到这种情况发生，那么一定有问题，通常是统计信息的问题。

  *   `排序合并连接 (SORT MERGE JOINS, SMJ)` – 如果内存允许，通常会在内存中进行连接。如果基数很高，那么您会期望看到 SMJ 和
  HJ。


  ## 本章小结


  在本章中，我们介绍了使用 `SQLTXTRACT` 的基础知识。这是 SQLT 的一种简单方法，不会执行有问题的 SQL 语句。它从所有可能的来源提取所需信息，并将其呈现在报告中。


  在本章中，我们了解了 SQLT 的简单下载和安装。您已经看到，在本地数据库上安装 SQLT 可以花费很少时间，并且其使用非常简单。生成的报告易于解压，可用于调查
  SQL 性能。在这个第一个例子中，我们简要提到了基数和选择性，以及它们如何影响基于成本的优化器的计划。现在，让我们探索 SQLT 的更多功能，并看一些更复杂的例子。


