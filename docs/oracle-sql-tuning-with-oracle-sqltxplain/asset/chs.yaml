  \ SQL 和执行计划的测试用例，在试图说服他人（例如 Oracle 支持人员）您确实存在问题时，是极其有帮助的。您的测试用例中包含的无关细节越少（只要它仍然能展示问题），就越有利于解决问题。\n\
  \n## 包含测试用例数据\n\nSQLT 测试用例默认不包含应用程序数据。这是因为问题（1）与应用程序数据无关，（2）数据量太大，或（3）数据具有某种特权，不能向其他人展示。在极少数情况下，可能需要数据来展示问题。幸运的是，只要能克服其他障碍，SQLT\
  \ 提供了一个选项允许这样做。在 SQLT 的后期版本中，您可以这样做：\n\n```\nSQL> EXEC SQLTXADMIN.sqlt$a.set_param('tcb_export_data',\
  \ 'TRUE');\n\nPL/SQL procedure successfully completed.\n```\n\n在旧版本的 SQLT 中，在安装目录的\
  \ `sqcpkgi.pkb` 文件中找到这部分代码，并将 `FALSE` 改为 `TRUE`。这是更改前的代码片段：\n\n```\nEXECUTE IMMEDIATE\n\
  \  'BEGIN DBMS_SQLDIAG.EXPORT_SQL_TESTCASE ( '||\n  'directory     => :directory,\
  \ '||\n  'sql_id        => :sql_id, '||\n  'exportData    => FALSE , '||  <<<将此处改为\
  \ TRUE\n  'timeLimit     => :timeLimit, '||\n  'testcase_name => :testcase_name,\
  \ '||\n  'testcase      => :testcase ); END;'\n```\n\n然后重新构建这个包。\n\n```\nSQL> @sqcpkgi.pkb\n\
  \nPackage body created.\n\nNo errors.\n```\n\n一旦您选择了此选项，就可以运行 `sqltxecute.sql`（或\
  \ `sqltxtract.sql`）并收集包含应用程序数据的测试用例。此后的所有设置步骤完全相同，您运行 `xpress.sql` 并按照前面章节概述的步骤操作。\n\
  \n## 总结\n\n\n\n我希望您能与我一同欣赏测试用例工具的各项功能。它们既强大又灵活。这也开启了调优新世界的大门。一旦您拥有一个可以修改的测试用例（在独立系统上），您就可以无止境地探索\
  \ CBO 环境，寻找最佳性能。随着您对 SQL 和调优概念知识的增长，您将能够尝试越来越多的方法来改进执行计划。您所有这些努力的基石将是 `SQLTXPLAIN`\
  \ 的测试用例工具。在下一章中，我们将探讨一种使用测试用例来寻找问题解决方案的方法。使用 `XPLORE` 方法，您将用大锤来砸开坚果。\n\n# 第 12 章\n\
  \n![image](img/frontdot.jpg)\n\n# 使用 XPLORE 调查意外的执行计划变更\n\n我相信到现在您已经意识到，如果您想调优 Oracle\
  \ SQL，熟悉 `SQLTXPLAIN` 是一件相当酷的事情。在第 11 章中，我们讨论了测试用例工具，以及它如何能构建一个完整的测试环境来测试 SQL、系统参数、优化器设置、对象统计信息，实际上包含了足够的设置，使得优化器表现得如同在源系统上一样。一旦您达到那种状态，您就拥有了一个绝佳的环境去探索优化器的选择。这种智能的、有方向的方法在您对问题可能是什么有一个大致概念，并且您怀疑自己距离解决方案仅差几步之遥时，是极其富有成效的。在那种情况下，您可以创建测试用例，尝试您的更改，然后测试结果。这是解决调优问题的好方法，但是如果您在\
  \ Oracle 升级或打补丁后，对某些 SQL 出现性能回退的原因毫无头绪，或者某个 SQL 执行计划意外变更，那该怎么办？您可能有数百个参数更改可以尝试，但逐一检查将耗费太长时间。另一方面，计算机非常擅长处理数百种选择以找出最佳方案，而这正是\
  \ `XPLORE` 所做的。\n\n## 何时应该使用 XPLORE？\n\n`XPLORE` 方法在设计时只有一个目的：对一条 SQL 语句进行强力攻击，尝试每一个可能的参数选择，然后向您展示答案。尽管\
  \ `XPLORE` 可以探索优化器环境的许多变化，但它被设计用于一个特定目标：发现由 Oracle 引擎升级和补丁引起的缺陷。它并非设计用于直接调优 SQL，因为\
  \ `SQLT` 的其他部分有充足的功能来处理该场景。尽管如此，如果您已经用尽了所有想法需要一点提示，或者您在新的 SQL 上遇到了缺陷并且认为修复控制更改可能有所帮助，它仍然可以在非升级情况下使用。它旨在处理已发生升级且系统运行正常，但有一两个\
  \ SQL 出于某些未明确说明的原因出现性能回退的情况。在这种情况下，可能是 Oracle 引擎的某些功能升级导致特定的 SQL 不再是最优的。一般来说，SQL\
  \ 性能会随着版本迭代而提升，但每次版本升级，如果数千条 SQL 得到改善，可能有一两条会变得更差。如果那一两条 SQL 恰好对您的运营至关重要，您将需要 `XPLORE`\
  \ 来找出原因。您能使用 `XPLORE` 来调优那些只需稍作调整的语句吗？如果您运行了 `XPLORE`，它提出了一些可能有益的参数更改，这些更改可能会给您一些改进的思路。但这通常不是\
  \ `XPLORE` 的最佳用途。\n\n## XPLORE 如何工作？\n\n`XPLORE` 依赖于一个可工作的测试用例（如第 11 章所述）。您必须使用\
  \ `XECUTE` 或 `XTRACT` 创建一个包含测试用例文件的 zip 文件。一旦您完成了创建测试用例的步骤，您将拥有一个 `XPLORE` 可以基于其工作的测试用例。一旦这个测试用例准备就绪，`XPLORE`\
  \ 就开始工作。它会生成一个脚本，其中包含每一个可用优化器参数的每一个可能值，包括隐藏参数以及修复控制设置（我们稍后会讨论这些）。然后，该脚本针对所有参数的每一个可能值运行测试用例，并生成一个包含结果的\
  \ HTML 文件。所有这些测试的结果都进行了总结，并通过超链接链接到 HTML 文件中的执行计划和更改的设置。这对基于成本的优化器来说是一次真正的考验，但请记住，这里没有数据（通常情况下）。\n\
  \n使用 `XPLORE` 有四个基本步骤。\n\n1.  获取对测试用例的访问权限。\n2.  为测试用例设置基线环境。\n3.  创建一个可以运行您的测试用例的脚本。\n\
  4.  创建一个超级脚本，该脚本将使用您的测试用例运行所有可能的值。\n\n让我们更详细地讨论每个步骤。\n\n您必须能够无错误地运行 `q.sql` 并能够生成执行计划。这两点都是要求，因为如果\
  \ SQL 无法运行，您就无法生成执行计划，而如果无法生成执行计划，您就无法计算成本。没有成本，您就无法进行探索。\n\n第二步允许您为测试用例设置一些特殊的特性，这些特性适用于所有测试的变体。无论您在这里选择什么（可能是一个优化器参数、一个修复控制或其他环境设置），都将在\
  \ `XPLORE` 过程的每次迭代之前完成。如果您确定您正在调查的问题具有某些您不想偏离的特性，您可能会选择这样做。然后您就让强力方法接管。\n\n第三步是根据您的设置生成一个通用脚本，该脚本用作超级脚本的框架。\n\
  \n最后一步是使用这个框架脚本来遍历您所选选项（优化器参数、修复控制和 Exadata 参数）的所有可能值，以创建一个完成所有工作的非常大的脚本。这个大的脚本（超级脚本）收集所有执行的信息，并将所有信息放入一个\
  \ HTML 文档中。这就是您随后手动查看并运用您的智慧进行分析的 HTML 文档。\n\n## XPLORE 可以更改什么？\n\n正如我们前面提到的，`XPLORE`\
  \ 可以查看更改优化器参数、修复控制设置和特殊 Exadata 参数的效果。它不能用于测试不良统计信息、数据倾斜、索引更改或类似的数据库对象结构更改。如果您选择\
  \ CBO 参数，您将只得到一份涵盖标准 CBO 参数（包括隐藏参数）的报告。这比包含修复控制设置的报告要短得多。如果您怀疑某个与缺陷相关的优化器功能是问题的原因，那么您可以选择使用修复控制设置并忽略优化器参数。如果您怀疑是\
  \ Exadata 特定的问题，那么您可以选择仅与 Exadata 相关的参数。Exadata 特定参数不多（16 个），因此我认为在这里列出它们会很有用。您可以从\
  \ `sqlt$_v$parameter_exadata` 获取此列表。您可以为“常规”的非 Exadata 参数获取类似的列表，但该列表太长，无法在此处列出（共有\
  \ 275 个参数，我在附录 B 中列出了它们）。\n\n```sql\nSQL> select name, description from sqlt$_v$parameter_exadata;\n\
  \nNAME                                 DESCRIPTION\n```\n\n\n\n## Oracle Xplore\
  \ 参数与 Fix Control 说明\n\n_kcfis_cell_passthru_enabled         不对单元格执行智能 IO 过滤\n_kcfis_rdbms_blockio_enabled\
  \         在智能 IO 模块中对 RDBMS 使用块 IO 而非智能 IO\n_kcfis_storageidx_disabled         \
  \  不在存储单元上使用存储索引优化\n_kcfis_control1                      Kcfis control1\n_kcfis_control2\
  \                      Kcfis control2\ncell_offload_processing              启用 SQL\
  \ 处理卸载到单元格\n_slave_mapping_enabled               当值为 TRUE 时启用从属映射\n_projection_pushdown\
  \                 投影下推\n_bloom_filter_enabled                启用或禁用布隆过滤器\n_bloom_vector_elements\
  \               布隆过滤器向量中的元素数量\n_bloom_predicate_enabled             启用或禁用布隆过滤器谓词下推\n\
  _bloom_predicate_pushdown_to_storage 启用或禁用布隆过滤器谓词下推到存储\n_bloom_folding_enabled \
  \              启用布隆过滤器折叠\n_bloom_pushing_max                   布隆过滤器推送大小上限\n_bloom_pruning_enabled\
  \               启用使用布隆过滤的分区修剪\nparallel_force_local                 强制单实例执行\n\n\
  16 行已选择。\n\n使用此方法，优化器参数、修复控制设置和特殊的 Exadata 参数是您可以探索的唯一内容，但请记住，您仍然可以更改基线环境并每次重新运行探索。每次\
  \ XPLORE 迭代都需要相当长的时间，因此如果您进行此类更改，需要在投入 XPLORE 运行之前确保方向正确。\n\n**XPLORE 无法更改的内容**\n\
  \nXPLORE 无法更改您的 SQL 结构，也不会建议创建或删除表上的索引。它纯粹是用于发现当 CBO 参数更改或修复控制更改时发生的变化。尽管 XPLORE\
  \ 不能为您更改这些内容，但您可以自由修改 `q.sql` 中的查询并重新运行 XPLORE。例如，您可能决定需要更改索引类型或删除一个索引。这同样超出了 XPLORE\
  \ 的范围，但可以用更好的方式完成。\n\n**什么是修复控制？**\n\nOracle 是一个极其灵活的产品，拥有许多特性和错误修复，其中一些默认关闭，一些默认开启。修复控制是\
  \ Oracle 内部允许将错误修复从 0（FALSE）更改为 1（TRUE）或反之的机制。可以想象，以这种方式启用或禁用错误修复应仅在可丢弃的数据库上进行，因为它可能会严重损害您的数据库（在进行任何此类更改之前，请开立支持请求）。让我们从\
  \ `xplore_script_1.sql`（整个 XPLORE 过程的主脚本）中使用的众多设置中查看一个示例。我们将以 6897034 修复控制参数为例。还有许多其他类似的修复控制参数，我们不会一一描述，但它们都以类似方式控制。这个特定的修复控制参数控制着在估算基数时考虑\
  \ NULL 行的错误修复。当 `\"_fix_control\"` 为 true 时，优化器会考虑 NULL 值。这里我们将其设置为 FALSE，这在真实场景中可能不是您想做的事情。\n\
  \n```\nALTER SESSION SET \"_fix_control\" = '6897034:0';\n```\n\n脚本 `xplore_script_1.sql`\
  \ 是 XPLORE 过程的主驱动脚本，它将在 XPLORE 的一次迭代中将此修复控制设置从其默认值更改为非默认值。在此例中，它将从 1 更改为 0。设置为 1\
  \ 时，此修复控制设置开启；设置为 0 时，此修复控制功能关闭。我们可以通过查询 `v$system_fix_control` 来找出此修复控制设置所代表的功能是什么。下面我展示一个查询，用于在本地数据库中查询此特定修复控制设置的含义：\n\
  \n```\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
  \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n\nBUGNO  \
  \    VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE  IS_DEFAULT\n----------\
  \ ---------- --------------------- ------------------------- ----------\n   6897034\
  \          1 index cardinality est 10.2.0.5                           1\n      \
  \                imates not taking int\n                      o account NULL rows\n\
  ```\n\n在这个特定案例中，错误编号 6897034 与索引基数估算以及这些估算与行中 NULL 值的关系有关。这可能是一个相当严重的问题，因此默认情况下设置为\
  \ 1（TRUE）。我运行的脚本会将其设置为 0，以查看这是否会对执行计划产生影响。此值设置为 1 的最早 Oracle 版本是 10.2.0.5。在之前的版本\
  \ 10.2.0.4 中，该值为 0（或者该错误修复尚未引入）。\n\n记得我说过 `optimizer_features_enable` 就像一个超级开关。嗯，我们现在可以通过将\
  \ `optimizer_features_enable` 设置为 10.2.0.4 并观察此特定修复控制的变化来测试这一点。首先我显示 `optimizer_features_enable`\
  \ 的当前值，然后显示修复控制的当前值。接着我将超级参数更改为 10.2.0.4（先在会话级别，然后在系统级别）。我需要设置的值是 10.2.0.5 之前的值，即修复控制的\
  \ `OPTIMIZER_FEATURE_ENABLE` 列的值。（是的，列名是 `OPTIMIZER_FEATURE_ENABLE,`，而参数是 `optimizer_features_enable`）。在系统级别设置超级参数后，我重新查询修复控制的值，看到超级参数已经发挥作用，并将修复控制设置为该版本应有的值。\n\
  \n```\nSQL> show parameter optimizer_features_enable;\n\nNAME                  \
  \               TYPE        VALUE\n------------------------------------ -----------\
  \ ------------------------------\noptimizer_features_enable            string  \
  \    11.2.0.1\n\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
  \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n\nBUGNO  \
  \    VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE  IS_DEFAULT\n----------\
  \ ---------- --------------------- ------------------------- ----------\n   6897034\
  \          1 index cardinality est 10.2.0.5                           1\n      \
  \                imates not taking int\n                      o account NULL rows\n\
  \nSQL> alter session set optimizer_features_enable='10.2.0.4';\n\nSession altered.\n\
  \nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
  \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n\nBUGNO  \
  \    VALUE DESCRIPTION           OPTIMIZER_FEATURE_ENABLE  IS_DEFAULT\n----------\
  \ ---------- --------------------- ------------------------- ----------\n   6897034\
  \          1 index cardinality est 10.2.0.5                           1\n      \
  \                imates not taking int\n                      o account NULL rows\n\
  \nSQL> alter system set optimizer_features_enable='10.2.0.4' scope=memory;\n\nSystem\
  \ altered.\n\nSQL> select\n  BUGNO,\n  VALUE,\n  DESCRIPTION,\n  OPTIMIZER_FEATURE_ENABLE,\n\
  \  IS_DEFAULT\nfrom\n  v$system_fix_control\nwhere\n  bugno=6897034;\n```\n\n\n\n\
  ## 一个 XPLORE 会话示例\n\n| 错误编号 | 值 | 描述 | 优化器特性启用 | 是否默认 |\n| :--- | :--- | :--- |\
  \ :--- | :--- |\n| 6897034 | 0 | 索引基数估算未考虑 NULL 行 | 10.2.0.5 | 1 |\n\n```\n如果我们运行超级脚本，它会执行此步骤，从而设置此参数。结果将是在\
  \ XPLORE 脚本的那个步骤中，我们的会话采用了一个非默认的设置。这个参数不太可能改善你的查询，但也不是完全不可能。想象一个情况，某些 SQL 依赖于一个有缺陷的基数计算，然后通过应用针对错误\
  \ 6897034 的修复程序将其“修复”。接着该 SQL 可能会出现性能回退（表现变差），并可能看起来像是升级到 10.2.0.5 导致 SQL 出错了。然而，XPLORE\
  \ 方法只是在应用一种蛮力方法；它强制遍历每一个选项，并让你运用自己的智慧来决定哪些是重要的，哪些不是。现在我们知道了 XPLORE 的工作原理、何时使用它以及如何使用它。我们也知道\
  \ XPLORE 并非调优问题的万能药，它只是调优瑞士军刀上的又一件工具。在我们看一个 XPLORE 会话示例之前，让我先解释一下 SQL 监控器。\n```\n\
  \n## 什么是 SQL 监控报告？\n\n实时 SQL 监控功能在 11g 中引入，默认情况下是关闭的。如果 SQL 使用超过五秒的 CPU 时间或并行运行，实时监控将会开启。如果启用此功能，统计信息指标将在\
  \ SQL 执行期间收集，并存储几分钟。在此期间，视图 `v$sql_monitor` 和 `v$sql_plan_monitor` 包含性能信息。收集的信息类型可由\
  \ `type` 参数控制，我选择了 `active`，它会产生一个 HTML 报告类型的显示（这是 11g 第 2 版中的新功能）。这些详细信息特别有用，因为它显示了每个步骤对\
  \ CPU 和 I/O 资源的使用情况。这对于确定查询的哪些部分需要调查，以及如果你在比较 SQL，查询的哪些部分发生了显著变化非常有帮助。下面我列出了获取 SQL\
  \ 监控器 HTML 报告通常需要执行的命令集。\n\n1.  在查询中添加提示 `/*+ monitor */`。这会导致 CBO 监控该查询，即使它运行时间少于五秒或不是并行执行。\n\
  2.  运行你的查询。\n3.  获取 SQL_ID (`select sql_id from v$sql_text where sql_text like '%<在此处输入你的\
  \ SQL 文本>%';`)\n4.  然后执行此代码：\n\n```\nset trimspool on\nset trim on\nset pages 0\n\
  set linesize 1000\nset long 1000000\nset longchunksize 1000000\nspool sqlmon_active_1st_run.html\n\
  select dbms_sqltune.report_sql_monitor(sql_id=>'&sqlid',type=>'active') from\ndual;\n\
  spool off\n```\n\n这将生成一个 HTML 文件，类似于图 12-1 中的文件。\n\n![9781430248095_Fig12-01.jpg](img/9781430248095_Fig12-01.jpg)\n\
  \n图 12-1. 一个典型的 SQL 监控报告\n\n既然我们知道了 SQL 监控器 HTML 报告是什么，我们会看到 XPLORE 会话默认会为我们创建它们。让我们看看创建\
  \ XPLORE 报告所需的步骤。\n\n## 构建你的测试用例\n\n正如我之前提到的，不先构建测试用例就无法运行 XPLORE。在这个例子中，我使用了与第\
  \ 11 章中相同的测试用例。通过导航到 `utl` 下的 `xplore` 目录，我可以轻松运行 XPLORE 的安装脚本。\n\n```\nC:\\Documents\
  \ and Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\utl\\xplore>sqlplus / as\
  \ sysdba\nSQL*Plus: Release 11.2.0.1.0 Production on Mon Dec 17 19:37:00 2012\n\
  Copyright (c) 1982, 2010, Oracle.  All rights reserved.\nConnected to:\nOracle Database\
  \ 11g Enterprise Edition Release 11.2.0.1.0 - Production\nWith the Partitioning,\
  \ OLAP, Data Mining and Real Application Testing options\nSQL> @install\nTest Case\
  \ User: TC64661\nPassword: TC64661\n```\n\n这个安装脚本授予测试用例用户足够的权限（DBA）以运行后续的脚本。请记住，这只能在容易更换的独立系统上运行。脚本以如下内容结束：\n\
  \n```\nPackage created.\nNo errors.\nPackage body created.\nNo errors.\nInstallation\
  \ completed.\nYou are now connected as TC64661.\n1. Set CBO env if needed\n2. Execute\
  \ @create_xplore_script.sql\n```\n\n第一步“如果需要则设置 CBO 环境”是在提醒你，如果你的测试用例需要设置任何环境设置，并且你希望这些设置对于测试用例的所有运行都保持不变，那么你必须在这里设置。然后这会被应用到基线，并在为每个测试执行脚本之前执行。通过向安装脚本提供测试用例用户，你已将该用户更改为系统的\
  \ DBA，并允许它更改所有系统参数和修复控制设置。测试用例用户也知道需要运行的脚本，然后将开始构建模板脚本，接着是超级脚本。\n\n## 构建第一个脚本\n\n\
  这第一个脚本只是收集你为 XPLORE 会话设置的配置，然后用这些参数调用 `xplore.create_xplore_script`。这是脚本中的那行代码：\n\
  \n```\nEXEC xplore.create_xplore_script(\n  '&&xplore_method.',         <<<此参数可接受\
  \ XECUTE 或 XPLAIN 值\n  '&&include_cbo_parameters.',<<<是否包含 CBO 参数\n  '&&include_exadata_parameters.',<<<是否包含\
  \ Exadata 特定参数\n  '&&include_fix_control.',   <<<是否包含修复控制\n  '&&generate_sql_monitor_reports.');\
  \ <<<是否生成 SQL 监控报告。\n```\n\n这些设置都会对最终创建的报告产生影响。`xplore_method` 控制 XPLORE，允许它以 XPLAIN\
  \ 模式或 XECUTE 模式运行。在 XPLAIN 模式下，不会执行 SQL。XPLAIN 模式对于大多数情况通常足够快。XECUTE 会执行 SQL，如果同时存在数据，那么这可能需要很长时间才能完成。需要澄清的是，这里的\
  \ XECUTE 选项与 XECUTE 方法无关：我们在这里谈论的是 XPLORE 工具的一个选项。如果 SQL 可以相对快速地执行，或者你有足够的时间等待结果，那么\
  \ XECUTE 将为你提供更多信息。\n\n\n\n# 构建超级脚本\n\n接下来的两个参数用于控制您希望探索的参数组。您可以选择探索所有参数，即尝试所有 CBO\
  \ 参数以及所有 Exadata 特有参数的值。如果您的测试用例来自 Exadata 机器，那么您可能也会对选择此选项感兴趣。如果您的测试用例并非来自 Exadata，则没有必要选择此选项，因为这些测试只会在\
  \ Exadata 机器上生效。然后，您可以选择设置修复控制参数（我们在本章前面的章节中提到过）。如果您怀疑自己遇到了优化器错误，可能会对这些参数感兴趣。当您运行此脚本并输入所需参数时，将会生成一个新的、更大的脚本。\n\
  \n# 构建超级脚本\n\n现在我们进入运行 XPLORE 会话前的最后一步。首先需要做的是将测试 SQL 脚本复制到 `utl\\xplore` 目录。这是为了让\
  \ XPLORE 会话能够访问该脚本。就我而言，我执行的命令是：\n\n```\n>copy \"C:\\Documents and Settings\\Stelios\\\
  Desktop\\SQLT 11.4.4.6\\sqlt\\run\\sqlt_s64661\\TC\\q.sql\"\n\"C:\\Documents and\
  \ Settings\\Stelios\\Desktop\\SQLT 11.4.4.6\\sqlt\\utl\\xplore\\q.sql\"\n```\n\n\
  我们运行 `create_xplore_script.sql`，它将提示输入前一节描述的参数。这里我们看到一个脚本运行示例，我们选择了 XPLAIN 模式，并选择探索\
  \ CBO 参数、Exadata 参数和修复控制参数，同时生成 SQL 监控报告。\n\n```\nSQL> @create_xplore_script.sql\n\
  Parameter 1:\nXPLORE Method: XECUTE (default) or XPLAIN\n\"XECUTE\" requires /*\
  \ ^^unique_id */ token in SQL\n\"XPLAIN\" uses \"EXPLAIN PLAN FOR\" command\nEnter\
  \ \"XPLORE Method\" [XECUTE]: XPLAIN\nParameter 2:\nInclude CBO Parameters: Y (default)\
  \ or N\nEnter \"CBO Parameters\" [Y]: Y\nParameter 3:\nInclude Exadata Parameters:\
  \ Y (default) or N\nEnter \"EXADATA Parameters\" [Y]: Y\nParameter 4:\nInclude Fix\
  \ Control: Y (default) or N\nEnter \"Fix Control\" [Y]: Y\nParameter 5:\nGenerate\
  \ SQL Monitor Reports: N (default) or Y\nOnly applicable when XPLORE Method is XECUTE\n\
  Enter \"SQL Monitor\" [N]: Y\nReview and execute @xplore_script_1.sql\n```\n\n现在创建的脚本非常长。我们可以通过查看文件顶部附近的一些条目来大致了解这个脚本的内容。\n\
  \n```\n1\\. SET DEF ON ECHO OFF TERM ON APPI OFF SERVEROUT ON SIZE 1000000 NUMF\
  \ \"\" SQLP SQL>;\n2\\. SET SERVEROUT ON SIZE UNL;\n3\\. SET ESC ON SQLBL ON;\n\
  4\\. SPO xplore_script_1.log;\n5\\. COL connected_user NEW_V connected_user FOR\
  \ A30;\n6\\. SELECT user connected_user FROM DUAL;\n7\\. PRO\n8\\. PRO Parameter\
  \ 1:\n9\\. PRO Name of SCRIPT file that contains SQL to be xplored (required)\n\
  10\\. PRO\n11\\. SET DEF ^ ECHO OFF;\n12\\. DEF script_with_sql = '¹';\n13\\. PRO\n\
  14\\. PRO Parameter 2:\n15\\. PRO Password for ^^connected_user. (required)\n16\\\
  . PRO\n17\\. DEF user_password = '²';\n18\\. PRO\n19\\. PRO Value passed to xplore_script.sql:\n\
  20\\. PRO ∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\n21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql\n\
  22\\. PRO\n23\\. PRO -- begin common\n24\\. PRO DEF _SQLPLUS_RELEASE\n25\\. PRO\
  \ SELECT USER FROM DUAL;\n26\\. PRO SELECT TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS')\
  \ current_time FROM DUAL;\n27\\. PRO SELECT * FROM v$version;\n28\\. PRO SELECT\
  \ * FROM v$instance;\n29\\. PRO SELECT name, value FROM v$parameter2 WHERE name\
  \ LIKE '%dump_dest';\n30\\. PRO SELECT directory_name||' '||directory_path directories\
  \ FROM dba_directories WHERE directory_name LIKE 'SQLT$%' OR directory_name LIKE\
  \ 'TRCA$%' ORDER BY 1;\n31\\. PRO -- end common\n32\\. PRO\n33\\. SET VER ON HEA\
  \ ON LIN 2000 PAGES 1000 TRIMS ON TI OFF TIMI OFF;\n```\n\n我在代码中添加了行号，因为值得详细解释其中一些行的情况。有些行只是\
  \ `PROMPT`，这只是一个空行。\n\n*   **`1\\. 设置 DEF ON ECHO OFF TERM ON APPI OFF SERVEROUT\
  \ ON SIZE 1000000 NUMF \"\" SQLP SQL>;`** - 设置输出的默认格式，因为脚本依赖该格式以在运行时生成可用的 HTML 文件。\n\
  *   **`2\\. 设置 SERVEROUT ON SIZE UNL;`** - 确保输出大小无限制。\n*   **`3\\. 设置 ESC ON SQLBL\
  \ ON;`** - 开启 `ESCAPE` 模式和空行模式。\n*   **`4\\. SPO xplore_script_1.log;`** - 我们正在假脱机到的脚本文件。\n\
  *   **`5\\. COL connected_user NEW_V connected_user FOR A30;`** - 设置 `connected_user`\
  \ 列的格式。\n*   **`6\\. 选择 user connected_user FROM DUAL;`** - 获取连接的用户。\n*   **`8\\\
  . PRO 参数 1:`** - 获取脚本名称。\n*   **`9\\. PRO 包含待探索 SQL 的脚本文件的名称 (必需)`** - 提示信息。\n*\
  \   **`11\\. 设置 DEF ^ ECHO OFF;`** - 设置更多环境配置。\n*   **`12\\. DEF script_with_sql\
  \ = '¹';`** - 将变量名 (`script_with_sql`) 设置为 `'¹'`。\n*   **`15\\. PRO ^^connected_user.\
  \ 的密码 (必需)`** - 获取测试用例用户的密码。\n*   **`17\\. DEF user_password = '²';`** - 将测试用例用户的密码设置为变量\
  \ `user_password`。\n*   **`21\\. PRO SCRIPT_WITH_SQL: ^^script_with_sql`** - 获取脚本文件名并设置变量\
  \ `script_with_sql`。\n*   **`25\\. PRO 选择 USER FROM DUAL;`** - 选择当前连接的用户。\n*   **`26\\\
  . PRO 选择 TO_CHAR(SYSDATE, 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL;`** -\
  \ 选择日期和时间。\n*   **`27\\. PRO 选择 * FROM v$version;`** - 选择当前版本。\n*   **`28\\. PRO\
  \ 选择 * FROM v$instance;`** - 选择实例信息。\n*   **`29\\. PRO 选择 name, value FROM v$parameter2\
  \ WHERE name LIKE '%dump_dest';`** - 显示转储目标。\n*   **`30\\. PRO 选择 directory_name||'\
  \ '||directory_path directories FROM dba_directories WHERE directory_name LIKE 'SQLT$%'\
  \ OR directory_name LIKE 'TRCA$%' ORDER BY 1;`** - 检查 Oracle 目录是否已设置。\n*   **`33\\\
  . 设置 VER ON HEA ON LIN 2000 PAGES 1000 TRIMS ON TI OFF TIMI OFF;`** - 在通用部分的末尾，设置所需的格式环境。\n\
  \n这是通用代码的结束。现在我们有一个在循环中生成的代码。我展示这个脚本的第一部分：\n\n```\n--\n 1\\. 设置 ECHO ON;\n 2\\.\
  \ --如果断开连接，请怀疑错误 6356566，如果需要，在下方行中取消注释解决方法\n 3\\. --ALTER SESSION SET \"_cursor_plan_unparse_enabled\"\
  \ = FALSE;\n 4\\. WHENEVER SQLERROR EXIT SQL.SQLCODE;\n 5\\. --\n 6\\. COL run_id\
  \ NEW_V run_id FOR A4;\n 7\\. 选择 LPAD((NVL(MAX(run_id), 0) + 1), 4, '0') run_id\
  \ FROM xplore_test;\n 8\\. --\n 9\\. DELETE plan_table_all WHERE statement_id LIKE\
  \ 'xplore_{001}_[^^run_id.]_(%)';\n10\\. 执行 xplore.set_baseline(1);\n11\\. --\n\
  12\\. 设置 BLO .\n13\\. GET ^^script_with_sql.\n14\\. .\n15\\. C/;/\n16\\. 0 EXPLAIN\
  \ PLAN SET statement_id = 'xplore_{001}_[^^run_id.]_(00000)' INTO plan_table_all\
  \ FOR\n17\\. L\n18\\. /\n19\\. 执行 xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)',\
  \ 'XPLAIN', 'Y');\n20\\. WHENEVER SQLERROR CONTINUE;\n```\n\n这 20 行是 XPLORE 的核心。我将解释这里发生的事情。\n\
  \n\n\n# 脚本核心逻辑注释\n\n*   第 1–4 行：确保`echo`开启以便获取输出，并让错误终止 SQL 执行。\n*   第 5–8 行：设置列`run_id`的格式，并从表`xplore_test`中选择当前的`run_id`。\n\
  *   第 9 行：删除`PLAN_TABLE`中所有与即将执行的语句匹配的条目。\n*   第 10 行：设置我们用户决定在每次 XPLORE 迭代执行前设置的基线。\n\
  *   第 11–14 行：将块终止符设置为“.”，获取脚本（本例中为`q.sql`），并停止块。\n*   第 15–17 行：从文件中移除刚获取的脚本中的“;”，并用空格替换（我们将用“/”而不是“;”来执行）；然后设置第`0`行为`EXPLAIN\
  \ PLAN`等，用`L`追加从文件获取的 SQL，并执行组合语句。完整的行应如下所示：\n\n```sql\n    EXPLAIN PLAN SET statement_id\
  \ = 'xplore_{001}_[0001]_(00001)' INTO plan_table_all FOR select /* ^⁰⁰¹ */  country_name,\
  \ sum(AMOUNT_SOLD) from sh.sales s, sh.customers c, sh.countries co where s.cust_id=c.cust_id\
  \ and co.country_id=c.country_id and country_name in ('Ireland','Denmark','Poland','United\
  \ Kingdom','Germany','France','Spain','The Netherlands','Italy') group by country_name\
  \ order by sum(AMOUNT_SOLD);\n```\n\n*   第 18–20 行：执行上述语句，并使用`snapshot_plan`例程捕获计划表中的所有信息及其他信息，并将其全部存储在内部\
  \ SQLT 存储库中，以便在最终报告结束时输出。\n\n一旦你审查了此脚本并确信它会产生正确的结果，就可以运行`xplore_script_1.sql`。我知道我在这里的细节阐述超出了使用脚本所需的范围，但这些行正是\
  \ XPLORE 方法的核心。我们可以更深入地探讨`xplore.pkb`中的过程`snapshot_plan`，但这超出了本书的范围。\n\n## 运行脚本\n\
  \n运行脚本只需执行`xplore_script_1.sql`。下面我展示了脚本的第一次运行过程，并收集了参数：\n\n```sql\nSQL>@xplore_script_1.sql\n\
  TC64661\n\nParameter 1:\nName of SCRIPT file that contains SQL to be xplored (required)\n\
  Note: SCRIPT must contain comment /* ^^unique_id */\nEnter value for 1: q.sql\n\
  Parameter 2:\nPassword for TC64661 (required)\nEnter value for 2: TC64661\nValue\
  \ passed to xplore_script.sql:\n∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼∼\nSCRIPT_WITH_SQL:\
  \ q.sql\n-- begin common\nDEF _SQLPLUS_RELEASE\nSELECT USER FROM DUAL\nSELECT TO_CHAR(SYSDATE,\
  \ 'YYYY-MM-DD HH24:MI:SS') current_time FROM DUAL\nSELECT * FROM v$version\nSELECT\
  \ * FROM v$instance\nSELECT name, value FROM v$parameter2 WHERE name LIKE '%dump_dest'\n\
  SELECT directory_name||' '||directory_path directories FROM dba_directories WHERE\
  \ directory_name LIKE 'SQLT\n' ORDER BY 1\n-- end common\nSQL>--in case of disconnects,\
  \ suspect 6356566 and un-comment workaround in line below if needed\nSQL>--ALTER\
  \ SESSION SET \"_cursor_plan_unparse_enabled\" = FALSE;\nSQL>WHENEVER SQLERROR EXIT\
  \ SQL.SQLCODE;\nSQL>--\nSQL>COL run_id NEW_V run_id FOR A4;\nSQL>SELECT LPAD((NVL(MAX(run_id),\
  \ 0) + 1), 4, '0') run_id FROM xplore_test;\nRUN_\n\nSQL>--\nSQL>DELETE plan_table_all\
  \ WHERE statement_id LIKE 'xplore_{001}_[^^run_id.]_(%)';\nold   1: DELETE plan_table_all\
  \ WHERE statement_id LIKE 'xplore_{001}_[^^run_id.]_(%)'\nnew   1: DELETE plan_table_all\
  \ WHERE statement_id LIKE 'xplore_{001}_[0001]_(%)'\n```\n\n我们现在已设置好环境，必须在运行我们正在研究的脚本之前设置任何基线。\n\
  \n```sql\nSQL>EXEC xplore.set_baseline(1);\n--\n-- begin set_baseline\n--\n--\n\
  -- end set_baseline\n--\nSQL>--\nSQL>ALTER SESSION SET STATISTICS_LEVEL = ALL;\n\
  SQL>DEF unique_id = \"xplore_{001}_[^^run_id.]_(00000)\"\nSQL>@^^script_with_sql.\n\
  SQL>REM $Header: 215187.1 sqlt_s64661_tc_script.sql 11.4.4.6 2012/12/13 carlos.sierra\
  \ $\nSQL>\nSQL>\nSQL>select\n  2   /* ^^unique_id */  country_name, sum(AMOUNT_SOLD)\n\
  \  3  from sh.sales s, sh.customers c, sh.countries co\n  4  where\n  5    s.cust_id=c.cust_id\n\
  \  6    and co.country_id=c.country_id\n  7    and country_name in (\n  8      'Ireland','Denmark','Poland','United\
  \ Kingdom',\n  9       'Germany','France','Spain','The Netherlands','Italy')\n 10\
  \    group by country_name order by sum(AMOUNT_SOLD);\nold   2:  /* ^^unique_id\
  \ */  country_name, sum(AMOUNT_SOLD)\nnew   2:  /* xplore_{001}_[0001]_(00000) */\
  \  country_name, sum(AMOUNT_SOLD)\nCOUNTRY_NAME                             SUM(AMOUNT_SOLD)\n\
  ---------------------------------------- ----------------\nPoland              \
  \                              8447.14\nDenmark                                \
  \        1977764.79\nSpain                                          2090863.44\n\
  France                                         3776270.13\nItaly               \
  \                           4854505.28\nUnited Kingdom                         \
  \        6393762.94\nGermany                                        9210129.22\n\
  SQL>EXEC xplore.snapshot_plan('xplore_{001}_[^^run_id.]_(00000)', 'XECUTE', 'Y');\n\
  SQL>WHENEVER SQLERROR CONTINUE;\nSQL>--\n```\n\n在这第一次运行之后，我们看到确实得到了结果（因为我选择在 XPLORE\
  \ 中放入数据）。这次运行的数据将被收集，与所有其他运行一起存入 SQLT 存储库，准备在运行结束时生成报告。\n\n# 查看结果\n\n当脚本最终完成（如果有数据，可能需要数小时）时，你会看到消息指示\
