  \n图 9-7 . 显示执行计划的流程图表示\n\n一些开发人员更喜欢这种执行计划的表示方式，他们甚至可以选择流程是从左到右还是从下到上。\n\n## 总结\n\
  \n在本章中，我们涵盖了 Data Guard 调优的特殊情况，以及 SQLTXPLAIN 为我们提供的用于处理这种情况的实用程序。你不应将 Data Guard\
  \ 视为一个黑盒，认为如果它以只读模式打开就无法进行调优。许多公司都这样做，但你应该能够在需要时调查性能问题。现在，借助 XTRSBY 及其可靠的助手 `roxtract.sql`，你就可以做到。在下一章中，我们将处理执行计划的比较。这是一种非常强大的技术，用于确定执行计划中发生了什么变化：相信我，在执行计划中，没有什么东西是一成不变的。\n\
  \n## 第 10 章\n\n![image](img/frontdot.jpg)\n\n# 比较执行计划\n\n比较执行计划是最有用的诊断测试之一。如果你足够幸运，拥有一个好的执行计划，你可以使用该计划作为指导，使糟糕的执行计划符合要求。在第\
  \ 6 章中，我们讨论了使用 SQL Profiles 将计划应用到另一个数据库的 SQL 上，以作为一种应急选项。然而，假设你有更多的时间来考虑差异并尝试正确地修复它，而不是使用\
  \ SQL Profile 这个创可贴。`SQLTCOMPARE` 就是完成这项工作的工具。它将比较两个目标系统上相同的 SQL，并生成一份描述差异的报告。你甚至可以从两个目标系统导入\
  \ SQLTXPLAIN 存储库，并在那里进行比较。本章是纯粹的 SQLTXPLAIN 章节，我们将使用 SQLTXPLAIN 的方法 `SQLTCOMPARE`，并展示如何利用我们从前面章节学到的调优知识来诊断问题。\n\
  \n## 如何使用 SQLTCOMPARE？\n\n我们将通过一个实际示例更详细地介绍使用 `SQLTCOMPARE` 的步骤，但大致上使用 `SQLTCOMPARE`\
  \ 的步骤如下：\n\n\n\n# 使用 SQLTCOMPARE 比较 SQL 执行\n\n## 操作步骤\n1.  获取你正在调查的 SQL 在两个目标数据库上的`SQL\
  \ ID`。它应该是相同的。\n2.  然后，在**两个目标系统**上针对此 SQL 运行一个主要方法。\n3.  记录两次主要方法运行的`statement\
  \ ID`。\n4.  创建一个目录来存放你的主要方法压缩文件。\n5.  将两个主要方法解压到各自的目录中。\n6.  在主要方法目录内再创建一个目录，专门存放测试用例文件（该文件来自主要方法文件内的一个压缩文件：是的，压缩包中的压缩包）。我们将在第\
  \ 11 章详细查看测试用例。\n7.  将测试用例文件解压到专门的测试用例区域。\n8.  然后，将一个`statement ID`的存储库导入到另一个数据库，或者将两个存储库都导入到第三个数据库（这是我们将会使用的方法）。\n\
  9.  最后，运行`SQLTCOMPARE`。\n\n## SQLTCOMPARE 简介\n`SQLTCOMPARE`依赖`SQLT`存储库中的信息进行比较，并且必须拥有从其中一个主要方法收集的信息。主要方法有：\n\
  \n*   `XTRACT`（我们在第 1 章介绍过）\n*   `XECUTE`（同样在第 1 章介绍过）\n*   `XTRXEC`\n*   `XPLAIN`\n\
  *   `XTRSBY`（我们在第 9 章介绍过）\n\n由于`SQLTCOMPARE`可以与任何主要方法一起使用，它也可用于比较来自两个不同系统的 SQL 语句，或来自主数据库和备用数据库的\
  \ SQL 语句（如果你使用`XTRSBY`）。它甚至可用于比较在两个不同平台上的执行：例如，Linux 和 Windows，以及来自不同版本的数据库。例如，可以将\
  \ Linux 上的 10g 与 Solaris 上的 11g 进行比较。\n\n## 实际示例\n在这个例子中，我们将比较以下语句在两个目标数据库上的执行，但这些步骤适用于任何\
  \ SQL：\n\n```\nSQL> host type chapter10_01.sql\nselect\n  s.amount_sold,\n  c.cust_id,\n\
  \  p.prod_name\nfrom\n  sh.products p,\n  sh.sales s,\n  sh.customers c\nwhere\n\
  \  c.cust_id=s.cust_id\n  and s.prod_id=p.prod_id\n  and c.cust_first_name='Theodorick';\n\
  ```\n\n通常，如果你的批处理时间不同，或者你的 OLTP 性能有明显差异，并且你正在调查数据库以寻找差异时，你会注意到特定 SQL 的性能差异。你也可以在迁移前评估两个不同平台的相对性能。出于本示例的目的，我们注意到目标\
  \ SQL 在系统 1 和系统 2 上的执行计划不同。我们在系统 2 上从系统 1 创建了表，并且数据库位于相同的平台和硬件上，但我们看到执行计划存在一些差异。在第一个数据库上，我们看到以下执行计划：\n\
  \n```\nSQL> set autotrace traceonly explain\nSQL> set lines 200\nSQL> /\nExecution\
  \ Plan\n\nPlan hash value: 725901306\n\n| Id |Operation              |Name     \
  \ | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop\n\n|  0 |SELECT STATEMENT\
  \       |          |  5557 |   303K|   908   (3)| 00:00:11 |       |      |\n|*\
  \ 1 | HASH JOIN             |          |  5557 |   303K|   908   (3)| 00:00:11 |\
  \       |      |\n|  2 |  TABLE ACCESS FULL    |PRODUCTS  |    72 |  2160 |    \
  \ 3   (0)| 00:00:01 |       |      |\n|* 3 |  HASH JOIN            |          |\
  \  5557 |   141K|   904   (3)| 00:00:11 |       |      |\n|* 4 |   TABLE ACCESS\
  \ FULL   |CUSTOMERS |    43 |   516 |   405   (1)| 00:00:05 |       |      |\n|\
  \  5 |   PARTITION RANGE ALL\n|          |   918K|    12M|   494   (3)| 00:00:06\
  \ |     1 |   28 |\n|  6 |    TABLE ACCESS FULL  |SALES     |   918K|    12M|  \
  \ 494   (3)| 00:00:06 |     1 |   28 |\n\nPredicate Information (identified by operation\
  \ id):\n\n1 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   3 - access(\"C\".\"\
  CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"C\".\"CUST_FIRST_NAME\"='Theodorick')\n\
  ```\n\n在第二个系统上，我们看到执行计划略有不同：\n\n```\nSQL> set autotrace traceonly explain\nSQL>\
  \ set lines 200\nSQL> /\n\nExecution Plan\n\nPlan hash value: 3857478275\n\n| Id\
  \  | Operation           | Name      | Rows  | Bytes | Cost (%CPU)| Time     |\n\
  \n|   0 | SELECT STATEMENT    |           |  2789\n|   473K\n|  1652   ( 2\n)| 00:00:20\n\
  |\n|*  1 |  HASH JOIN          |           |  2789\n|   473K\n|  1652   ( 2\n)|\
  \ 00:00:20\n|\n|   2 |   TABLE ACCESS FULL | PRODUCTS  |    72 |  6480\n|     3\
  \   (0)| 00:00:01\n|\n|*  3 |   HASH JOIN         |           |  2789\n|   228K\n\
  |  1648   (1)| 00:00:20\n|\n|*  4 |    TABLE ACCESS FULL| CUSTOMERS |    17\n| \
  \  765\n|   409   ( 1\n)| 00:00:05\n|\n|   5 |    TABLE ACCESS FULL| SALES     |\
  \   860K\n|    31M\n|  1235   (1)| 00:00:15\n|\n\nPredicate Information (identified\
  \ by operation id):\n\n1 - access(\"S\".\"PROD_ID\"=\"P\".\"PROD_ID\")\n   3 - access(\"\
  C\".\"CUST_ID\"=\"S\".\"CUST_ID\")\n   4 - filter(\"C\".\"CUST_FIRST_NAME\"='Theodorick')\n\
  \nNote\n\ndynamic sampling used for this statement (level=2)\n```\n\n成本不同，计划的细节也不同，可能还有其他差异，但这并不是这里的重点。`SQLTCOMPARE`能告诉我们这两段相同但表现不同的\
  \ SQL 之间有什么区别吗？在非`SQLTXPLAIN`的世界里，我们现在会开始搜索系统之间的差异，一个一个地查看所有可能的嫌疑人，使用他们所有的特殊工具，这将是一个冗长且容易出错的过程。然而，使用`SQLTCOMPARE`，我们收集所有信息，并一次性完成所有内容的比较。然后我们再决定什么是重要的。\n\
  \n## 收集主要方法存储库数据\n收集`SQLTXPLAIN`数据的步骤就是我们已经使用的标准方法。在这个例子中，我们将使用`SQLTXECUTE`。回顾一下，步骤是识别`SQL\
  \ ID`，创建一个包含 SQL 语句的文件（包括任何绑定变量），然后在两个系统上运行`SQLTXECUTE`。\n\n我们已经提到了上面的 SQL 语句，我们可以在两个系统上检查`SQL\
  \ ID`是否相同。在系统 1 和 2 上我们得到：\n\n```\nSQL> select sql_id from v$sqlarea where sql_text\
  \ like 'select  %Theodorick%';\n\nSQL_ID\n\n2qjq95uds6hpd\n```\n\n这是一个简单但重要的步骤。如果没有验证`SQL_ID`是相同的，我们可能在比较稍有不同的\
  \ SQL。那样的话，比较将无法工作。对于我们使用的每种主要方法，我们都在收集关于 SQL 语句的信息，我们需要记下`statement ID`（而不是`SQL\
  \ ID`）。这是`SQLTXPLAIN`分配给 SQLT 方法运行的语句编号。所以，在第一个系统上，我们像这样运行`SQLTXECUTE`：\n\n```\n\
  SQL> @sqltxecute chapter10_01.sql\n```\n\n文件`chapter10_01.sql`包含上面提到的 SQL。当`SQLTXECUTE`方法完成时，我们看到这个输出。\n\
  \n```\nFile sqlt_s96376_xecute.zip for chapter10_01.sql has been created.\n\nSQLTXECUTE\
  \ completed.\n```\n\n这里我们记录下`statement ID`，在这个例子中是`96376`。同样地，在第二个系统上，我们运行相同的 SQL（记得我们检查了`SQL\
  \ ID`），并使用相同的文件再次运行`SQLTXECUTE`。第二个系统的输出是：\n\n```\nFile sqlt_s73560_xecute.zip for\
  \ chapter10_01.sql has been created.\n\nSQLTXECUTE completed.\n```\n\n## 准备主要方法存储库数据\n\
  \n\n\n执行 `sqltxecute` 会创建包含重要信息的 ZIP 文件。这些 ZIP 文件中的信息包含如何将数据导入另一个 SQLT 仓库的说明，但首先你必须解压主\
  \ ZIP 文件。从在目标系统上执行两个主要方法的结果来看，我们看到语句 ID 分别为 `96376`（低 CBO 成本）和 `73560`（较高的 CBO 成本）。在这种情况下，我创建了两个目录：`sqlt_s96376`\
  \ 和 `sqlt_s73560`，每个目录中都有对应的 ZIP 文件，我随后对它们进行了解压。正如我们所了解的，每个目录都包含许多文件，但在这种情况下，我们感兴趣的是名为\
  \ `sql_snnnnn_readme.html` 的 readme 文件。如有疑问（当然也包括本书），这就是你的首选文件。该文件中描述了执行许多功能（包括\
  \ SQLTCOMPARE 操作）的确切步骤。这是我们在第一个目标系统上运行的 SQLTXECUTE 报告的 readme 文件顶部（参见图 10-1）。\n\n\
  ![9781430248095_Fig10-01.jpg](img/9781430248095_Fig10-01.jpg)\n图 10-1 . readme 文件的顶部\n\
  \n如果我们点击报告中这一部分的“使用 SQLT COMPARE”超链接，就会跳转到描述我们需要采取哪些步骤将数据导入新数据库（或实际上是同一个数据库）以进行比较的说明部分。有关\
  \ `s96376` 的 readme 部分，请参见图 10-2。\n\n![9781430248095_Fig10-02.jpg](img/9781430248095_Fig10-02.jpg)\n\
