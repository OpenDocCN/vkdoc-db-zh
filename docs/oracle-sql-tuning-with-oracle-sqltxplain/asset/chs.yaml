  \                  MAXTHR\nSYSSTATS_MAIN                  SLAVETHR\n```\n\n\n\n\
  ### 基于成本的优化器参数\n\nCBO 决策过程（用于制定你的执行计划）的另一个输入是 CBO 参数。这些参数控制着基于成本的优化器行为的各个方面。例如，`optimizer_dynamic_sampling`\
  \ 控制着 SQL 执行时要进行的动态采样级别。如果能快速查看每个系统，并看到那些参数列表被从默认值修改过，岂不是很好？使用 SQLT，在“CBO 环境”下就能立即找到这个列表。\n\
  \n图 2-6 就是一个几乎没有任何改动的例子。这很容易看出来，因为在这个 SQLT HTML 报告的这一部分只有 2 行记录。其中 `optimizer_mode`\
  \ 已被从默认值修改。如果你在这里看到数百个条目，那么你应该仔细查看这些条目，并评估被修改的参数中是否有任何导致了问题。这个例子代表了一位喜欢让系统保持原样的\
  \ DBA。\n\n![9781430248095_Fig02-06.jpg](img/9781430248095_Fig02-06.jpg)\n\n图 2-6\
  \ . CBO 环境部分。仅 2 条记录表明系统非常接近默认设置。\n\n图 2-7 展示了一个不止两个参数被从默认设置修改过的例子。现在，不再是前一个例子的\
  \ 2 行，我们有 8 个非默认值。每一个这样的参数都需要被证明其合理性。\n\n![9781430248095_Fig02-07.jpg](img/9781430248095_Fig02-07.jpg)\n\
  \n图 2-7 . 具有许多非标准参数设置的 CBO 环境。\n\n我们还设置了 4 个隐藏参数（它们以下划线开头）。在这个例子中，每一个隐藏参数都应该被仔细研究，看看是否能解释其原因。如果你保存了仔细的记录或注释了你的更改，你可能会知道为什么\
  \ `_b_tree_bitmap_plans` 被设置为 FALSE。然而，像这样的参数常常会毫无解释地在系统中设置多年。\n\n以下是常见的解释：\n\n\
  *   有人很久以前改的，我们不知道为什么，而且他/她现在已经离开了。\n*   我们不想改，怕会破坏什么东西。\n\n这个部分很有用，通常可以给你一些关于过去（也许你刚到当前站点）更改了什么的线索。要特别注意隐藏参数。Oracle\
  \ 支持团队会仔细检查这些参数，并判断它们存在的理由是否仍然成立。通常来说，隐藏参数不太可能对你有益，尤其是当你不知道它们是干什么用的时候。当然，你不能直接从生产系统中移除它们。你必须在测试系统上执行关键的\
  \ SQL 语句，然后在那个测试系统上移除那些参数，看看对整个优化器成本有什么影响。\n\n如果你精通了这个操作，你甚至可以为不同的工作负载设置不同的统计表，导入它们，并在不需要时删除旧的统计信息。要删除现有的统计信息，你会使用\n\
  \n```sql\nSQL> execute DBMS_STATS.DELETE_SYSTEM_STATS;\n```\n\n然而，关于设置和删除系统统计信息，有一点需要警惕。这种操作会影响系统中每一个\
  \ SQL 的 CBO 行为。因此，对这些参数的任何更改都应该谨慎进行，并在合适的测试环境中彻底测试。\n\n### Siebel 环境考量\n\n有些环境很特殊，仅仅是因为\
  \ Oracle 工程部门认为一套特殊的参数对它们更好。Siebel Systems 客户关系管理（CRM）应用程序就是这种情况。Oracle 工程部门已经确定了一些隐藏参数，能使你的系统获得最佳性能。如果你的系统是\
  \ Siebel，那么在“环境”部分你会看到类似图 2-8 所示的内容。\n\n![9781430248095_Fig02-08.jpg](img/9781430248095_Fig02-08.jpg)\n\
  \n图 2-8 . 一个 Siebel CRM 环境的参数设置示例。\n\nSiebel 调优的“必去之处”是“Oracle 数据库上 Siebel CRM 应用程序的性能调优指南”白皮书。可以在说明\
  \ 781927.1 中找到。这份文档中有很多有用的信息，但关于优化器参数，第 9 页列出了为获得良好性能而应设置的非默认参数。例如，`optimizer_index_cashing`\
  \ 应设置为 0。\n\n在这些值都正确之前，甚至不要尝试在 Siebel 系统上调整你的 SQL。例如，在上述 Siebel 系统上，如果出现性能问题，第一步将是根据说明\
  \ 781927.1 修正所有错误的参数。除非这个基础已经到位，否则你不可能期望从一个 Siebel CRM 系统中获得稳定的性能。\n\n### 提示\n\n\
  创建提示是为了让 DBA 和开发人员能够对优化器被允许做出的选择施加一些控制。一个提示的例子是 `USE_NL`。在下面的例子中，我创建了两个最小化的表，分别叫做\
  \ `test` 和 `test2`，每个表只有一行数据。不出所料，如果我让优化器选择计划，它会使用 `MERGE JOIN CARTESIAN`，因为这些表中都只有一行数据。\n\
  \n```sql\nSQL> select\n  test.col1,\n  test2.col1\nfrom\n  test,\n  test2\nwhere\n\
  \  test.col1=test2.col1;\n      COL1       COL1\n---------- ----------\n       \
  \  1          1\n         1          1\nSQL> set autotrace traceonly explain;\n\
  SQL> /\nExecution Plan\nPlan hash value: 1571755046\n\n| Id  | Operation       \
  \     | Name  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT\
  \     |       |     2 |    52 |     6   (0)| 00:00:01 |\n|   1 |  MERGE JOIN CARTESIAN|\
  \       |     2 |    52 |     6   (0)| 00:00:01 |\n|   2 |   TABLE ACCESS FULL \
  \ | TEST2 |     1 |    13 |     3   (0)| 00:00:01 |\n|   3 |   BUFFER SORT     \
  \   |       |     2 |    26 |     3   (0)| 00:00:01 |\n|*  4 |    TABLE ACCESS FULL\
  \ | TEST  |     2 |    26 |     3   (0)| 00:00:01 |\n\nPredicate Information (identified\
  \ by operation id):\n\n4 - filter(\"TEST\".\"COL1\" = \"TEST2\".\"COL1\")\nNote\n\
  \n- dynamic sampling used for this statement (level=2)\nSQL> list\n  1* select\n\
  \  test.col1,\n  test2.col1\nfrom\n  test,\n  test2\nwhere\n  test.col1=test2.col1\n\
  ```\n\n上面的命令 `list` 显示了之前的 DML（数据操作语言）。然后我修改了 SQL，加入了一个提示。所有提示的语法都以 `/*+` 开头，以 `*/`\
  \ 结尾。对于 `USE_NL`，括号内的部分可以接受多个代表表的条目（可以是表名，如我们的例子，或者如果是别名的话）。这是修改后的查询。\n\n```sql\n\
  SQL> select /*+ USE_NL(test) */ * from test, test2 where test.col1=test2.col1;\n\
  \nExecution Plan\n\nPlan hash value: 74026472\n\n| Id  | Operation          | Name\
  \  | Rows  | Bytes | Cost (%CPU)| Time     |\n\n|   0 | SELECT STATEMENT   |   \
  \    |     2 |    52 |     6   (0)| 00:00:01 |\n|   1 |  NESTED LOOPS      |   \
  \    |     2 |    52 |     6   (0)| 00:00:01 |\n|   2 |   TABLE ACCESS FULL| TEST2\
  \ |     1 |    13 |     3   (0)| 00:00:01 |\n|*  3 |   TABLE ACCESS FULL| TEST \
  \ |     2 |    26 |     3   (0)| 00:00:01 |\n\nPredicate Information (identified\
  \ by operation id):\n\n3 - filter(\"TEST\".\"COL1\"=\"TEST2\".\"COL1\")\nNote\n\n\
  -   dynamic sampling used for this statement (level=2)\n```\n\n注意第二个执行计划中是如何使用了\
  \ `NESTED LOOP` 的。\n\n我们是在对优化器说：“我们知道你没我们聪明，所以忽略规则吧，在这一点上就按我们想的做。”\n\n\n## 使用 Hints\
  \ 的考量与执行计划分析\n\n有时使用提示是正确的，但有时却是错误的。偶尔，提示是从旧代码中继承下来的，而移除它们以期望性能提升，则需要开发者有足够的勇气。提示也是优化器（CBO）在制定执行计划过程中的一种数据输入形式。之所以常常需要提示，是因为提供给优化器的其他信息是错误的。例如，如果对象统计信息错误，你可能就需要\
  \ `需要` 给优化器一个提示，因为它的统计信息是错的。\n\n这是使用提示的正确方式吗？不是。这样使用提示的问题在于，它可能在被应用时是正确的，但后来可能就错了，而事实上很可能就是如此。如果你想调优代码，首先移除那些提示，让优化器自由运行，去“感受”数据的脉动，摆脱束缚。确保它拥有良好且最新的统计信息，然后看看它会得出什么结果。\n\
  \n### 获取 SQL 文本与执行计划\n\n你总是可以通过点击 SQLT 报告顶部的“SQL Text”链接来获取你正在评估的 SQL 文本。这是另一个查询示例。这次我们使用了一个包含两个别名的\
  \ `USE_NL` 提示。\n\n```sql\nSQL> set autotrace traceonly explain;\nSQL> select cust_first_name,\
  \ amount_sold\n  2  from customers C, sales S\n  3  where c.cust_id=s.cust_id and\
  \ amount_sold>100;\nSQL> REM\nSQL> REM 这是执行计划\nSQL> REM\n```\n\n```\n执行计划\n\nPlan\
