  \n## 如何将 SQL 配置文件从一个数据库转移到另一个数据库？\n\n在许多情况下，SQLT 被认为对数据库操作侵入性太强（其实不然），或者特定站点有严格的规定，禁止直接在生产数据库上使用\
  \ SQLT。在这种情况下，通常会有一个开发或预演环境，可以在其中针对代表性的工作负载（即数据足够且最新的）运行测试 SQL。类似这样的情况下，你通常可以在开发或预演环境中获得正确的执行计划，但在生产环境中却不行。可能是因为你没有时间来更正统计信息，或者其他因素阻止你及时更正生产环境。在这种情况下，在与\
  \ Oracle 支持确认后，你可以在一个系统上创建 SQL 配置文件并将其转移到生产环境。你可以遵循 Oracle 支持说明 “如何将 SQL 配置文件从一个数据库移动到另一个数据库\
  \ [ID 457531.1]” 中描述的步骤，或者遵循此处描述的步骤，这些步骤是使用 SQLT 的说明步骤的简化版本。\n\n1.  在你的预演或开发系统上创建\
  \ SQL 配置文件脚本（如上所述）。SQL 配置文件应基于与你将要转移 SQL 配置文件的生产系统上的 SQL 文本匹配的 SQL 文本。此步骤的最终结果是一个\
  \ SQL 配置文件。\n2.  在开发或预演系统上，使用以下命令创建一个预演表：\n    ```\n    SQL> exec dbms_sqltune.create_stgtab_sqlprof(table_name=>'STAGE',\
  \ schema_name='STELIOS');\n    ```\n3.  使用以下命令将 SQL 配置文件打包到刚刚创建的预演区中：\n    ```\n\
  \    SQL> exec dbms_sqltune.pack_stgtab_sqlprof(staging_table_name=>'STAGE',  profile_name=>'\
  \ sqlt_s89915_p3005811457');\n    ```\n4.  使用 `exp` 或 `expdp` 从开发或预演系统导出 SQL 配置文件预演表。\n\
  5.  使用 `imp` 或 `impdp` 将转储文件导入生产环境。\n6.  使用以下命令解包预演表：\n    ```\n    SQL> exec dbms_sqltune.unpack_stgtab_sqlprof(replace=>TRUE,\
  \ staging_table_name=>'STAGE');\n    ```\n\n一旦你执行了这些步骤，你的目标 SQL 就应该使用来自开发或预演环境的执行计划运行。你可以像之前那样获取执行计划来检查它。\n\
  \n## 总结\n\n如你所见，SQLT 如果使用得当，是一个强大的工具。与使用 SQLT 相比，传统的调优可能会显得缓慢而繁琐。本书的主要目标是让你熟悉 SQLT，然后让你足够频繁地使用\
  \ SQLT，从而能够快速高效地调优 SQL。在下一章中，我们将探讨 11g 中引入的一个名为 **自适应游标共享** 的功能。关于此功能如何工作、何时被使用以及在什么情况下使用存在很多困惑。SQLT\
  \ 在主报告中有一个专门针对自适应游标共享的部分。\n\n## 第 7 章\n\n![image](img/frontdot.jpg)\n\n**自适应游标共享**\n\
  \n\n\n毫无疑问，自适应游标共享（Adaptive Cursor Sharing）是优化器中最容易被误解和令人困惑的领域之一。这还因为该功能有时被称为\"\
  智能游标共享\"或\"绑定变量感知窥探\"，使其更加难以理解。自适应游标共享在 11g 版本中引入，旨在处理那些不断变化的棘手绑定变量。SQLTXTRACT 工具的主报告顶部有一个名为\"\
  游标共享与绑定变量\"的部分。请参阅图 7-1 以帮助您回忆。自适应游标共享部分位于屏幕的左下角。\n\n![9781430248095_Fig07-01.jpg](img/9781430248095_Fig07-01.jpg)\n\
  \n图 7-1 。自适应游标共享部分可在屏幕左下角找到。\n\n理解优化器的这一功能，文档的帮助也不大。它并非完全清晰明了，并且缺乏一些理解该功能运作时所必需的细节。我将用简单的术语解释这一功能，并展示其实际应用的例子。如果您的系统中此功能很重要，您将能更好地理解正在发生的情况及其原因。您也可以选择完全禁用此功能。\n\
  \n## 绑定变量及其必要性\n\n然而，在我们深入探讨自适应游标共享之前，需要先介绍一些先决知识，这将有助于您理解后续讨论以及 ACS 的发展历史。绑定变量是\
  \ ACS 所依赖的 SQL 关键组件。程序员在 Oracle 系统中使用它们，因为多年来 Oracle 一直告诉他们，包含大量字面值的系统是不好的。这在大多数情况下确实如此，但即使在今天，您仍然会看到系统因为字面值而生成数十万个游标。这通常是因为\
  \ SQL 是由自动生成 SQL 的应用程序创建的。以下是一个 SQL 语句中绑定变量和等效语句中字面值的例子：\n\n```\nvariable b varchar2(5);\n\
  exec :b := 'TABLE'\nselect count(object_type) from acs where object_type=:b;\nselect\
  \ count(object_type) from acs where object_type='TABLE';\n```\n\n这里的绑定变量是 `b`，它在\
  \ SQL 语句（本例中是 `select`）中用来代表值 `'TABLE'`。人们可能会合理地问：\"为什么我们需要绑定变量？\"，因为我们完全可以直接使用：\n\
  \n```\nselect count(object_type) from acs where object_type='TABLE';\n```\n\n答案是，在繁忙的系统上，硬解析的开销是难以承受的，并且每个\
  \ SQL 游标的详细信息都必须保存在共享池中，这可能是一个巨大的内存开销。如果每次都因为绑定变量值变化而让基于代价的优化器详细检查每个语句，那么不同语句的解析成本将完全相同；我们不希望这样做。在遥远的过去（8i\
  \ 版本），绑定变量已经存在，但使用并不广泛。Oracle 认为应该使用更多绑定变量来提高性能，但不一定非要用绑定变量不可。于是引入了 `cursor_sharing`\
  \ 参数。\n\n### CURSOR_SHARING 参数\n\n引入的解决方案是 `cursor_sharing` 参数，其可能值为 `EXACT` 或 `FORCE`。默认值是\
  \ `EXACT`，这不会改变行为：即，如果 SQL 语句中有字面值，则对其进行解析和执行。如果解析开销过高，您可以考虑将该值设置为 `FORCE`。在这种情况下，字面值（在上面的例子中是\
  \ 'TABLE'）将被系统定义的绑定变量（例如 `SYS_B_0`）替换。这在某些情况下提高了性能，但在绑定变量的值对执行计划有影响的情况下（换句话说，数据分布倾斜）会导致问题。具有罕见值和常见值的谓词会使用相同的系统生成绑定变量，从而得到相同的执行计划。这有时会引发问题，因此后来创建了绑定变量窥探来帮助解决。以下是一个展示该行为的例子：\n\
  \n```\nSQL> alter session set cursor_sharing='FORCE';\n会话已更改。\nSQL> @q4\n  COUNT(*)\n\
  ----------\n     18432\nSQL> host type q4.sql\nselect  count(*) from sh.products\
  \ p,sh.sales s,sh.customers c where\n  c.cust_id=s.cust_id and s.prod_id=p.prod_id\
  \ and\n  c.cust_first_name='Stelios' ;\nSQL> select sql_id from v$sqlarea where\
  \ sql_text like 'select  count(*) from sh.products p,sh.sales s,sh.customers c where%';\n\
  SQL_ID\n---------------\n7d16bm8ub2w1g\nSQL> select sql_text from v$sqlarea where\
  \ sql_id='7d16bm8ub2w1g';\nSQL_TEXT\n--------------------------------------------------\n\
  select  count(*) from sh.products p,sh.sales s,sh.customers c where   c.cust_id=s.cust_id\
  \ and s.prod_id=p.prod_id and c.cust_first_name=:\"SYS_B_0\"\n\nSQL> alter session\
  \ set cursor_sharing='EXACT';\n会话已更改。\nSQL> @q4\n  COUNT(*)\n----------\n     18432\n\
  SQL> select sql_id from v$sqlarea where sql_text like 'select  count(*) from sh.products\
  \ p,sh.sales s,sh.customers c where%';\nSQL_ID\n---------------\n7d16bm8ub2w1g\n\
  fqsukcqvrby36\nSQL> select sql_text from v$sqlarea where sql_id='fqsukcqvrby36';\n\
  SQL_TEXT\n--------------------------------------------------\nselect  count(*) from\
  \ sh.products p,sh.sales s,sh.customers c where   c.cust_id=s.cust_id and s.prod_id=p.prod_id\
  \ and c.cust_first_name='Stelios'\n```\n\n在上面的例子中，我将 `cursor_sharing` 的默认值改为了 `FORCE`。我的\
  \ SQL 语句随之改变，包含了一个名为 `SYS_B_0` 的系统定义绑定变量。然后我将值设回 `EXACT`，绑定值消失，被字面值取代。这是预期的行为。\n\
  \n## 绑定变量窥探\n\n在 9i 版本中，Oracle 引入了绑定变量窥探。绑定变量窥探用于在硬解析过程中查看绑定变量使用的值，以确定合适的执行计划。`cursor_sharing`\
  \ 参数还引入了一个新的可能值 `SIMILAR`。如果解析时认为合适，就会生成一个新的执行计划；否则（基于窥探结果）执行计划保持不变。这样做的问题是，如果第一个执行计划对后续计划来说并不理想，那么您就被困在一个执行效果不佳的计划中了。\n\
  \n### 绑定敏感和绑定感知游标\n\n\n\n11g 引入了一个新的混合系统，称为**自适应游标共享（ACS）**，它在何时引入新执行计划方面更为精细。同时引入了“**绑定敏感**”和“**绑定感知**”的概念。当绑定变量的值`可能`影响执行计划时，即为绑定敏感。绑定敏感意味着优化器怀疑某些值可能需要新的执行计划，但尚不确定。可以将绑定敏感视为开始意识到需要更多执行计划的第一步。在意识到之前，你必须先对绑定变量敏感。如果你多次运行\
  \ SQL，使得不同绑定变量的缓冲区获取次数发生显著变化，最终该游标会被标记为“绑定感知”。换句话说，我们从绑定敏感（我们有绑定变量）发展到绑定感知（这些绑定变量对缓冲区获取次数产生了显著影响）。你可以通过查看`SQLTXPLAIN`报告来追踪绑定敏感度和绑定感知值的变化过程。\n\
  \n## 设置绑定敏感游标\n\n要展示 ACS 的行为需要进行一些设置。概括地说，我们在示例代码中将执行以下步骤。下方将展示相应代码：\n\n1.  创建测试表\n\
  2.  向测试表中插入偏斜数据。应有足够多的行以允许多种执行计划的可能性。\n3.  展示数据的偏斜程度\n4.  创建索引以使其能在执行计划中使用\n5. \
  \ 收集统计信息，包括所有列的直方图\n6.  在若干次执行中选择常见值和罕见值，直至 ACS 被激活\n7.  在`SQLTXECUTE`中检查结果\n\n\
  ```\n-- 设置\ndrop table acs;\ncreate table acs(object_id number, object_type varchar2(19));\n\
  insert into acs select object_id, object_type from dba_objects;\ninsert into acs\
  \ select object_id, object_type from dba_objects;\nselect object_type, count(*)\
  \ from acs group by object_type order by count(object_type);\ncreate index i1 on\
  \ acs(object_id);\ncreate index i2 on acs(object_type);\nexec dbms_stats.gather_table_stats('STELIOS','ACS',\
  \ estimate_percent=>100, method_opt=>'FOR ALL COLUMNS SIZE 254');\nprompt 现在我们有了一张表，ACS，其中包含偏斜数据。\n\
  -- 现在我们做一些查询...\nvariable b varchar2(19);\n@@acs_query 'SYNONYM'\n@@acs_query 'TABLE'\n\
  @@acs_query 'SYNONYM'\n@@acs_query 'DIMENSION'\n@@acs_query 'DIMENSION'\n@@acs_query\
  \ 'DIMENSION'\n@@acs_query 'DIMENSION'\n@@acs_query 'DIMENSION'\n@@acs_query 'DIMENSION'\n\
  @@acs_query 'DIMENSION'\n@@acs_query 'DIMENSION'\n@@acs_query 'DIMENSION'\n```\n\
  \n我们再次选择了`dba_objects`作为伪随机数据的良好来源。在这个案例中，我们感兴趣的是这张表中 SYNONYM 类型远多于 DIMENSION 类型这一事实。脚本`acs_query.sql`包含以下内容：\n\
  \n```\nexec :b := '&1'\nselect count(object_type) from acs where object_type=:b;\n\
  ```\n\n该脚本的输出如下所示：\n\n```\nSQL>@acs\n\nTable dropped.\n\nTable created.\n\n73378\
