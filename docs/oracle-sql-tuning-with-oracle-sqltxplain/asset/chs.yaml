  \ I/O，而 CPU 对执行时间并非至关重要。由此我们可以得出结论，如果我们想要一台更大更好的笔记本电脑，一个更重要的参数是关注磁盘的传输速度而不是 CPU\
  \ 的速度（当然，就这个查询而言）。在你的测试环境中尝试此类设置可以让你发现对于改进你的环境性能什么是重要的，并通过让你专注于重要的方面而忽略不那么重要的方面来节省时间。\n\
  \n### 对象统计信息\n\n你也可以为查询中的所有对象设置对象统计信息，但这是一项棘手的操作，不建议用于此类探索。查看 10053 跟踪文件以了解成本为何如此，比更改成本然后观察结果要好。\n\
  \n## 调试优化器\n\n创建和使用测试用例主要是你期望 Oracle 支持人员为你做的事情。他们将获取你提供的测试用例文件并进行充分的探索，以便能够解决你的问题。你也可以使用测试用例文件（如我上面所述）在一个没有其他人使用的独立测试环境中进行一些测试。测试用例例程主要用于探索优化器的行为。测试用例文件中的一切都是为了让优化器认为它是在原始源系统上。如果存在一个导致优化器以不恰当的方式改变其执行计划的错误，那么\
  \ Oracle 支持人员将使用测试用例，可能结合你的数据，来确定是存在真正的错误，还是某种并非错误的意外行为。有时在极少数情况下，某些特定的执行计划可能导致错误暴露，在这种情况下，有时你可以通过设置一些优化器环境因素来避免错误。\n\
  \n## 其他测试用例工具\n\n好像能够在独立测试环境中探索你的 SQL 还不够，SQLT 还提供了进一步的工具来理解任何特定 SQL 中发生的情况。有时你想做的不仅仅是更改环境设置并重试查询。就像一把可靠的瑞士军刀，SQLT\
  \ 几乎为每项工作都准备了工具。\n\n## sel.sql 是做什么的？\n\n`Sel` 是一个很好的小工具，如果它还没有被写出来，你可能会自己写一个。以下是\
  \ `sel.sql` 的代码：\n\n```sql\nREM 使用 CBO 计算谓词选择性。需要 sel_aux.sql。\nSPO sel.log;\nSET\
  \ ECHO OFF FEED OFF SHOW OFF VER OFF;\nPRO\nCOL table_rows NEW_V table_rows FOR\
  \ 999999999999;\nCOL selectivity FOR 0.000000000000 HEA \"Selectivity\";\nCOL e_rows\
  \ NEW_V e_rows FOR 999999999999 NOPRINT;\nACC table PROMPT 'Table Name: ';\nSELECT\
  \ num_rows table_rows FROM user_tables WHERE table_name = UPPER(TRIM('&&table.'));\n\
  @@sel_aux.sql\n```\n\n\n此例程在设置好列格式后提示访问的表，然后调用 `sel_aux.sql`：\n\n```\nREM 使用 CBO\
  \ 计算谓词选择性。需要 sel.sql。\nPRO\nACC predicate PROMPT '请输入 &&table. 表的谓词: ';\nDELETE\
  \ plan_table;\nEXPLAIN PLAN FOR SELECT /*+ FULL(t) */ COUNT(*) FROM &&table. t WHERE\
  \ &&predicate.;\nSELECT MAX(cardinality) e_rows FROM plan_table;\nSELECT &&e_rows.\
  \ \"计算基数\", ROUND(&&e_rows./&&table_rows., 12) 选择性 FROM DUAL;\n@@sel_aux.sql\n```\n\
  \n`sel_aux.sql` 使用 `explain plan` 通过从 `explain plan` 填充的 `plan_table` 中选择相关信息来确定基数和选择性。它会显示测试用例中任何特定谓词和表的计算基数与选择性。在例程结束时，会再次调用\
  \ `sel_aux`，以便有机会为谓词选择不同的值或完全不同的谓词。因此，如果您正在研究与特定值相关的问题，可能希望使用 `sel.sql` 来测试基数。在下面的示例中，我选择\
  \ `SALES` 表进行调查，并且对 `CUST_ID` 为 `100` 和 `200` 时针对 `SALES` 的查询基数感兴趣。\n\n```\nSQL>\
  \ @sel\n\n表名: sales\n\nTABLE_ROWS\n\nsales 表的谓词: cust_id=100\n\n计算基数      选择性\n\
  ---------- ---------------\n       130  0.000141482277\n\nsales 表的谓词: cust_id=200\n\
  \n计算基数      选择性\n---------- ---------------\n       130  0.000141482277\n\nsales\
  \ 表的谓词: cust_id between 100 and 300\n\n计算基数      选择性\n---------- ---------------\n\
  \      2080  0.002263716435\n\nsales 表的谓词:\n```\n\n我可以看到，统计信息估计 `SALES` 表中 `CUST_ID`\
  \ 的基数为 `130`。`cust_id=200` 时也看到了相同的值。由于我在此系统上也有数据，因此可以看到实际值是多少。\n\n```\nSQL> select\
  \ count(*) From sh.sales where cust_id=100;\n\nCOUNT(*)\n\nSQL> select count(*)\
  \ From sh.sales where cust_id=200;\n\nCOUNT(*)\n\nSQL> select count(*) From sh.sales\
  \ where cust_id between 100 and 300;\n\nCOUNT(*)\n```\n\n请注意，每个估计值都是错误的。估计值偏差如此之大，以至于使用\
  \ `BETWEEN` 子句给出的估计值是 `2,080`，而实际值是 `18,091`。由此我们可以看到，对象上的统计信息需要改进。也许在 `CUST_ID`\
  \ 列上创建直方图会有所帮助。\n\n### `sqlt_snnnnn_del_hgrm.sql` 的作用是什么？\n\n如果未正确采样或使用不当，直方图常常会导致问题。在这种情况下，您可以使用测试用例实用程序尝试删除直方图，以查看其对执行计划的影响。在此示例中，我们删除了在测试模式下注册的所有直方图。\n\
