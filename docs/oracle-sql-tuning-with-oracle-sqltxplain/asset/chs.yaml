  \ `XPLORE` 通过设置隐藏参数禁用了这个选项，难怪计划的成本变得更高了。如果我们点击图 12-4 中“`Test Id`”列下的数字，就能看到实际选择了哪个计划。这就是我们看到的计划。\n\
