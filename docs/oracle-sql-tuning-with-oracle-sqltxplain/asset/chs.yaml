  我仅展示了报告的左侧部分，但执行计划的所有常用列都存在。该执行计划显示了一个并行执行，其中 SALES 表与 COUNTRIES 和 CUSTOMERS 的哈希连接进行哈希连接。就像你处理
  XTRACT 报告一样，查看各个步骤并判断它们是否合适，本章稍后我们还会看到一份 SQL 监控报告，该报告展示了执行期间时间花费在何处。查看预期的行数，查看每行的成本，看看是否符合你的预期。此外，你还可以看到同一
  SQL 的历史执行计划。请记住，所有这些信息都可以从一个**未安装** SQLT 的系统中获得。


