  PL/SQL procedure successfully completed.\nSQL> exec sqlt$a.enable_diagnostic_pack_access;\n\
  PL/SQL procedure successfully completed.\n```\n\n## 远程 SQLT 安装\n\n在安装过程中，您将看到可选的连接标识符提示。通常这是被忽略的，因为您是在本地安装。但是，如果您想以远程模式安装\
  \ SQLT，则可以指定一个远程链接。在这些示例中，本地系统是您连接到 SQL Plus 的系统，远程系统是可以找到 SQLT 存储库的系统。\n```\nSpecify\
  \ optional Connect Identifier (as per Oracle Net)\nInclude \"@\" symbol, ie. @PROD\n\
  If not applicable, enter nothing and hit the \"Enter\" key.\nThis connect identifier\
  \ is only used while exporting SQLT\nrepository everytime you execute one of the\
  \ main methods.\nOptional Connect Identifier (ie: @PROD): @REMOTE\n```\n这会将 `@REMOTE`\
  \ 附加到所有 SQL 操作上，因此如果您在本地数据库上运行 `@sqltxtract`，它将访问远程数据库来存储 SQLT 信息。\n\n在远程安装中，运行报告的步骤顺序与在本地运行所有操作略有不同。\n\
  1.  从本地节点在远程节点上安装 SQLT。\n2.  在远程节点上运行 SQL。\n3.  在本地节点上运行 `SQLTXTRACT` 或 `SQLTXECUTE`\
  \ 报告，但该报告在远程节点上运行。\n4.  报告在本地节点上生成，但存储库数据存储在远程节点上。\n\n## 其他安装 SQLT 的方法\n\n如果您想将\
  \ SQLT 部署到多个系统（谁不想呢？），您可能希望进行非交互式安装。在这种情况下，您可以填充一些变量，然后运行 `sqcsilent.sql`。安装目录中提供了一个名为\
  \ `sqdefparams.sql` 的示例变量定义文件。\n\n以下是它包含的内容。这些都是我们在交互式安装中提供的值。\n```\nDEF connect_identifier\
