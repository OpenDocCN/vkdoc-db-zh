- '# 数据库统计与执行计划相关术语


  ## 数据倾斜与直方图


  关于数据偏斜数据与偏度，它们会影响执行计划。


  这涉及直方图的类型，例如桶对象类型和高度平衡类型，以及使用和添加与移除操作。


  需要理解列统计信息、表列统计信息与定义直方图。


  ## 执行计划与变量


  关于绑定变量，包括窥探与捕获和已捕获的绑定。


  以及`Cursor_Sharing`和`define`参数。


  执行计划的可变执行时间可能源于不同的计划，例如优化器估算不准导致的最差计划。


  需要分析列统计信息。


  ## 其他概念


  包括对象类型、资源计划和章节，表。


  以及超链接、SQLT 报告和 SQLXECUTE 报告。


