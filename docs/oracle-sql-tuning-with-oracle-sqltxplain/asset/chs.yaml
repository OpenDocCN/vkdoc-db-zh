  \ NAME:() 2013-02-03 12:41:50.754\n```\n\n头部部分为后续信息设定了场景。应检查此部分以确保您正在查看正确的跟踪文件。例如，正确的实例和正确的时间。此部分还为您提供有关节点上资源的一些基本信息，例如内存可用量（参见\
  \ “Memory (Avail/Total)” 行）和 CPU 数量。`10046` 跟踪在此部分之后立即开始。\n\n## 主要的 10046 跟踪部分\n\
  \n一旦我们进入主要的 `10046` 跟踪部分，我们会看到由分隔符界定的每条信息对应一行。显示了一个示例。我截断了右边的行，因为我们专注于行开头的文本，并强调跟踪文件具有逻辑结构。我们在每行的开头看到代码词：\n\
  \n\n# Oracle 10046 跟踪记录详解\n\n```\n==============\nPARSING IN CURSOR – 给出光标编号\nselect\
  \  - 这是代为发出的语句\nEND OF STMT – 标记 SQL 语句结束\nPARSE – 现在我们解析语句\nEXEC – 现在我们执行语句\nFETCH\
  \ – 现在我们为语句获取行\nSTAT – 状态信息\nWAIT – 等待某事\nXCTEND - 事务结束\nCLOSE – 关闭光标，我们已完成此语句。\n\
  ==============\n```\n\n以下是原始形式的外观（我截断了右侧的行以使其不那么混乱）。\n\n```\nCLOSE #2:c=0,e=19,dep=0,type=1,tim=839550052037\n\
