  此目录中的文件，连同 SQLT，已足以在您的数据库上创建一个测试用例。在下一节中，我们将详细查看这些文件。\n\n## 测试用例文件说明\n\n该目录中的脚本和其他文件设计为协同工作，以简单快速地生成测试用例。我在下面列出了每个文件及其用途。稍后我们将看到这些文件如何协同工作以产生一个逼真的测试环境。\n\
  \n*   `10053.sql` – 设置级别为 1 的 10053 跟踪。\n*   `flush.sql` – 刷新共享池。\n*   `plan.sql`\
  \ – 显示最近执行的 SQL 的执行计划，并将输出假脱机到 `plan.log`。它使用 `dbms_xplan.display_cursor` 过程。\n\
  *   `q.sql` – 正在调查的 SQL 语句。\n*   `readme.txt` – 说明文档。内容非常简洁，例如：“以 sys 用户连接并执行 `setup.sql`。”\n\
  *   `sel.sql` – 计算谓词选择性。这个小脚本依赖于 `sel_aux.sql`（见下文），提示输入表名和谓词，然后给出预测的基数（cardinality）和选择性。下面有一个使用\
  \ `sel.sql` 的示例。\n*   `sel_aux.sql` – 根据不同的谓词，与 `sel.sql` 一起产生预期的基数和选择性。\n*   `setup.sql`\
  \ – 设置系统统计信息，创建测试用户和元数据，导入对象统计信息和优化器环境，执行测试查询并显示执行计划。\n*   `sqlt_snnnnn_del_hgrm.sql`\
  \ – 删除测试用例（TC）模式的直方图。\n*   `sqlt_snnnnn_exp.dmp` – 包含统计信息的转储文件。\n*   `sqlt_snnnnn_import.sh`\
  \ – SQLT 对象导入脚本的 Unix 版本。\n*   `sqlt_snnnnn_metadat.sql` – 从 `setup.sql` 调用的脚本；创建测试用例用户和用户对象。\n\
  *   `sqlt_snnnnn_purge.sql` – 从 SQLT 存储库中移除对测试用例 SQL 的引用。\n*   `sqlt_snnnnn_readme.txt`\
  \ – 特定测试用例的文档，包含关于导出和导入 SQLT 存储库、使用 `SQLT COMPARE`（在第 10 章中介绍）、恢复 CBO 统计信息以及在快速模式和自定义模式下实现测试用例的简要说明。\n\
  *   `sqlt_snnnnn_restore.sql` – 将 CBO 统计信息导入到测试用例中。\n*   `sqlt_snnnnn_set_cbo_env.sql`\
  \ – 为测试用例设置 CBO 环境。\n*   `sqlt_snnnnn_system_stats.sql` – 在测试系统上设置系统统计信息。\n*   `tc.sql`\
  \ – 运行测试 SQL 并显示执行计划。\n*   `tc_pkg.sql` – 为小测试用例文件创建 `tc.zip` 文件。\n*   `xpress.sh`\
  \ – 运行 `xpress.sql` 的脚本的 Unix 版本。构建整个测试用例。\n*   `xpress.sql` – 在快速模式下构建整个测试用例的 SQL\
  \ 脚本。\n\n如您所见，一旦解压缩，`TC` 目录中就有相当多的文件。其中大部分是从 `xpress.sql` 和 `setup.sql` 中调用的，因此我们不会对每个文件都进行详细介绍，但有些文件有一些有趣的独立功能，我们将在构建测试用例后进行查看。\n\
  \n## SQL 语句示例\n\n请记住，SQLT 一次只针对一条 SQL 语句进行调优。在我们的示例案例中，我们将使用以下 SQL：\n\n```sql\n\
  select\n  country_name, sum(AMOUNT_SOLD)\nfrom sales s, customers c, countries co\n\
  where\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
  \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
  \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n```\n\
  \n这个示例 SQL 计算欧盟各国消费总额。以下是运行此查询的结果：\n\n```\nCOUNTRY_NAME                        \
  \     SUM(AMOUNT_SOLD)\n---------------------------------------- ----------------\n\
  Poland                                            8447.14\nDenmark             \
  \                           1977764.79\nSpain                                  \
  \        2090863.44\nFrance                                         3776270.13\n\
  Italy                                          4854505.28\nUnited Kingdom      \
  \                           6393762.94\nGermany                                \
  \        9210129.22\n\n7 rows selected.\n```\n\n\n\n# 如何快速构建测试用例（XPRESS.sql）\n\n\
  此示例中，具体功能并不重要。我们只需 SQL ID（`fp2wkm07dr0nd`）和一份 SQLT XTRACT 报告。此处的目的是在另一个模式中构建一个测试用例，然后调整环境，以便我们能够隔离地测试不同的理论。按照常规方法（如第\
  \ 1 章和第 3 章所述），我们收集一份 SQLT XTRACT 报告，然后将 zip 文件放在一个方便的位置。本例中，放在 `/run` 目录下。\n\n\
  首先，我们创建一个目录来存放 SQLTXTRACT 报告文件。我在这个目录下创建了一个 `TC` 目录，并将测试用例的 zip 文件放入其中。现在我们有了测试用例目录并已解压文件，最快最简单的做法是设置测试用例用户。请记住，执行此操作需要以\
  \ SYS 身份登录。这是因为 `xpress.sql` 中的某些步骤会更改数据库环境，而这个环境不能与其他人共享。所有警告已说明，让我们继续创建测试用例。\n\
  \n首先运行 `xpress.sql`。脚本会在不同部分暂停，以便您有机会检查步骤和是否有错误。如果没有错误，通常按回车键进入下一部分。脚本中的每个步骤都由类似这样的标题突出显示：\n\
  \n```\n1/7 按 ENTER 键为 statement_id 64661 创建 TC 用户和模式对象。\n```\n\n以下列表提供了脚本步骤的高级视图。接下来，我们将更详细地查看其中的几个步骤：\n\
  \n1.  创建测试用例用户及其用户对象（包括表和索引），用户名格式为 `TCnnnn`。在第一步中，系统会提示您输入测试用例用户名的后缀。此时您可以直接按回车，或输入后缀如\
  \ `DEV`。在此部分结束时，您应检查是否存在任何无效对象。有效对象也会列出。\n2.  从 SQL 仓库中清除该 SQL 语句的先前版本。\n3.  将 SQL\
  \ 语句导入 SQL 仓库，并使用导入工具恢复系统环境。系统将提示您输入 `SQLTXPLAIN` 用户的密码。此步骤是为什么不应在您无法承受丢失风险的系统上运行\
  \ `xpress` 的原因之一。\n4.  恢复测试用户模式对象统计信息。\n5.  恢复系统统计信息。\n6.  连接到测试模式并设置 CBO 环境。\n\
  7.  设置测试模式环境，执行 SQL 并显示执行计划。\n\n一旦到达此阶段，假设过程中没有错误，您就可以自由地对测试用例环境进行更改（请记住，这是一个在测试后可以丢弃的系统）。您可以根据需要更改任何内容以提高测试用例的性能，或者有时您可能想更改测试用例的某些部分以更全面地理解正在发生的情况以及执行计划为何如此。接下来，我们将更详细地查看上述七个步骤。我们将查看示例输出并解释发生了什么。我们将逐步完成所有步骤，以建立一个可供您操作的测试用例。\n\
  \n## 步骤 1：创建测试用例用户和模式对象\n\n在步骤 1 中，系统要求您确认是否要创建一个测试用例用户（本例中为 `TC64661`）及其模式对象。\n\
  \n```\n1/7 按 ENTER 键为 statement_id 64661 创建 TC 用户和模式对象。\n```\n\n如果按 Enter 键，则完成步骤\
  \ 1。此步骤将运行脚本 `sqlt_snnnnn_metadata.sql`。系统会提示您输入测试用例用户后缀。典型值可能是 \"_1\"，但您可以按 RETURN\
  \ 接受默认值，即无后缀。然后创建元数据对象，如表、索引以及任何约束、函数、包、视图或其他元数据。在此步骤结束时，会显示这些对象的状态。它们应该都是有效的。以下是我的示例的屏幕输出。\n\
  \n```\nSQL>\nSQL> /**********************************************************************/\n\
