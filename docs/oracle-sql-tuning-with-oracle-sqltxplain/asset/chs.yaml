  \            |     3   (0)|      0 |\n|  6 | TABLE ACCESS BY INDEX ROWID      |\
  \ CUSTOMERS            |    27   (8)|      4 |\n|  7 | BITMAP CONVERSION TO ROWIDS\
  \     |                      |            |      4 |\n|  8 | BITMAP INDEX FULL SCAN\
  \         | CUSTOMERS_GENDER_BIX |            |      4 |\n|  9 | PARTITION RANGE\
  \ ALL               |                      |    49  (41)|     56 |\n| 10 | TABLE\
  \ ACCESS BY LOCAL INDEX ROWID| SALES                |    49  (41)|     56 |\n| 11\
  \ | BITMAP CONVERSION TO ROWIDS     |                      |            |     56\
