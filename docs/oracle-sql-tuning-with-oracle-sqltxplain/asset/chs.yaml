  of this non-default value “4” for SQL_ID 81s67vj4pjqm8.”。这意味着发现了值 4，并“建议”我们在坚持当前值
  4 之前要深思熟虑。建议的值是 2。如果这是一个即将投入生产的 SQL，DBA 和开发人员之间必须讨论为什么将值设置为 4 以及 2 是否更好。



  ## 解读 SQLHC 观察结果与报告


  以 `SH.SALES` 的直方图为例，其建议是：“一个没有热门值的高度平衡直方图既无用处也非所期望。请考虑通过收集新的 CBO 统计信息来删除此直方图，同时使用带
  `SIZE 1` 的 `METHOD_OPT`。” 这个建议是在说该列上的直方图没有用处，应该删除。它只会浪费时间。甚至为您提供了统计信息收集的选项。再次强调，如果这出现在预生产测试中，就必须就这个直方图及其是否有用进行一些讨论。


  我仅提及了两个观察结果作为示例。即使对于我简单的 SQL，也存在许多建议，并且由于我没有触发导致其出现的规则，还有许多其他可能的观察结果并未出现。当您看到针对您
  SQL 的建议时，应仔细审阅它们。有时它们很重要（例如，上面提到的两个会被认为是重要的），在这种情况下，您应该要么（在仔细测试后）更改系统，要么有充分的理由说明为何可以忽略这些建议。在大多数情况下，运行
  `SQLHC` 时不会生成观察结果，因为您没有通过做（或不做）触发规则的事情来触发它。这意味着，如果您的观察结果列表很短，那么您做得很好。如果观察结果列表很长，您可能做得不好。


  在这个例子中，我会认为“自动收集 CBO 统计信息已启用。”是一个相对不重要的观察结果（在此情况下），因为我知道自己正在以那种方式收集统计信息，并且我知道如果需要，我会收集特定的统计信息来覆盖某些对象。该警告是关于在某些情况下，较小的样本大小可能导致非最优的执行计划。区分重要和不重要的观察结果并不总是容易的。一个观察结果的重要性在一定程度上取决于您的具体情况。请记住，`SQLHC`
  只是在遵循规则，它并不“了解”您的环境。您必须判断一个观察结果是否重要。通过实践和对您环境的深入了解，您可以培养出快速去芜存菁的技能。四个 HTML 报告中的每一个都列出了
  SQL 文本，但 SQL 文本本身没什么可说的，它就是您 SQL 的文本。如果您已经使用许多不同的参数或提示运行了该 SQL 多次，可能值得快速浏览一下，以确保您正在查看正确的报告。


  ## “表格摘要”部分


  “表格摘要”部分是您应该从 `SQLT XTRACT` 或 `XECUTE` 报告中熟悉的信息集合。请参见图 14-4。


  ![9781430248095_Fig14-04.jpg](img/9781430248095_Fig14-04.jpg)


