  \nSQL> alter session set events '10053 trace name context forever, level 1';\n\n\
  Session altered.\n\nSQL> set autotrace off;\nSQL> select /*+ use_nl(a b) user_merge\
  \ (a b) */\n  2  a.first_name, a.last_name, a.hire_date\n  3  from employees a,\
  \ employees b\n  4  where a.hire_date=b.hire_date\n  5  and a.department_id=30\n\
  \  6  /\n\nFIRST_NAME           LAST_NAME                 HIRE_DATE\n--------------------\
  \ ------------------------- ---------\nDen                  Raphaely           \
  \       07-DEC-02\nAlexander            Khoo                      18-MAY-03\nShelli\
  \               Baida                     24-DEC-05\nSigal                Tobias\
  \                    24-JUL-05\nGuy                  Himuro                    15-NOV-06\n\
  Karen                Colmenares                10-AUG-07\n\n6 rows selected.\n```\n\
  \n通过检查文本内容，我们确认正在查看正确的`10053`跟踪文件，确实，提示与之匹配。现在如果搜索\"hint\"一词，会在跟踪文件末尾找到一个名为\"Dumping\
  \ Hints\"的部分。请参见图 5-8。\n\n![9781430248095_Fig05-08.jpg](img/9781430248095_Fig05-08.jpg)\n\
  \n图 5-8 . `10053`跟踪文件的提示部分\n\n这个小部分中需要注意的重要一点是`used=0`。这意味着该提示未被使用，被完全忽略了。实际上两个提示都被忽略了，这使得优化器能够自行决策，从而导致使用了`哈希连接`。SQL\
  \ 的执行没有产生错误，我们没有从优化器得到任何关于提示有误的错误信息。这些信息被隐藏在（如果我们请求了）`10053`跟踪文件中。那么问题出在哪里呢？`err`代码为\
  \ 4，表示与其他提示存在冲突。在这种情况下，两个提示相互抵消了。这里需要注意的重要一点是，上面第三次执行 SQL 并未生成错误。优化器识别了这些提示，发现它们彼此冲突，于是忽略它们并制定一个不考虑这些提示的计划。\n\
  \n### 成本计算\n\n优化器最重要的工作是比较不同执行计划之间的成本。当然，这是总体目标。执行计划的成本由其每一行的成本组成，而每一行又基于依赖于统计信息的计算。不同计划的计算基于不同的访问路径、连接方法以及查询不同部分的访问顺序。听起来很有趣，不是吗？如果你有七个不同的表，你可以选择七种处理顺序（即七的阶乘，相当于`7x6x5x4x3x2x1`）！这总共有\
  \ 5,040 种方式，这还不算最初访问这些表的不同方式。优化器选择一个合理的计划，挑选外表并逐层推进，尝试几种组合，并快速排除那些成本已经超过先前尝试过的计划的选项（这是高度简化的）。因此，例如，如果优化器猜测第一个计划的成本是\
  \ 1,000，那么当第二个计划在成本计算到一半达到 1,500 时，它就会被放弃。在这种情况下，无需继续计算。它这样做是为了在总体硬解析耗时中节省时间。它知道你渴望得到结果。一旦你知道`10053`是关于优化器如何基于这种方法推导其计划的故事，这个跟踪文件就开始变得有意义了。\n\
  \n在提供了关于参数、所考虑的 SQL 以及任何可能适用的查询转换的一些基本信息后，基于成本的优化器开始介绍访问相关对象成本的一些基本信息。例如，在图 5-9\
  \ 中展示了关于表`EMPLOYEES`的一些基本信息（在此例中展示了两次）。\n\n![9781430248095_Fig05-09.jpg](img/9781430248095_Fig05-09.jpg)\n\
  \n图 5-9 . `10053`中显示 BASE STATISTICAL INFORMATION 的部分\n\n一旦我们获得了关于表及其索引的所有这些基本信息（注意在此基本信息中我们也有了聚簇因子`CLUF`），我们就可以开始确定以最低成本获取信息的方式。例如，CBO\
  \ 将考虑单表访问路径，并由此考虑`全表扫描`（成本为 3）或`索引（AllEqRange）`（成本为 2），然后告诉我们哪个成本最低：`最佳:: 访问路径：索引范围扫描`。图\
  \ 5-10 展示了`10053`中的相关部分。\n\n![9781430248095_Fig05-10.jpg](img/9781430248095_Fig05-10.jpg)\n\
  \n图 5-10 . 优化器对表`EMPLOYEES`的看法\n\n完成这一步后，优化器开始考虑连接顺序，在此例中仅与另一个版本的`EMPLOYEES`表进行连接。图\
  \ 5-11 展示了优化器放弃计算的一个例子。\n\n![9781430248095_Fig05-11.jpg](img/9781430248095_Fig05-11.jpg)\n\
  \n图 5-11 . 优化器因成本高于当前最佳而放弃一个连接\n\n## 总结\n\n既然我们已经介绍了可以从`10053`跟踪文件中获取的部分信息，你也就了解了它的用处。通过仔细阅读跟踪文件，你现在应该能够看出优化器选择其行为的原因：它考虑了哪些访问路径以及为何拒绝其中一些。如果你认为某些访问路径本不该被拒绝，你应该能够追溯到根本原因，并回答所有\
  \ DBA 那个由来已久的问题：“为什么它没有使用我的索引？”\n\n"
- "# 第六章\n\n![image](img/frontdot.jpg)\n\n## 通过概要文件强制执行计划\n\n有时，最好的做法是先修复问题，之后再去分析哪里出了错并找出根本原因。我指的是，当面临生产时间压力需要完成某项任务时，任何有效的方法都足够好。核心思路是让业务先恢复并运行起来，然后可以在闲暇时坐下来研究问题所在，弄清楚如何防止其再次发生，并制定一个计划，在需要的情况下，于计划内的停机期间以可控的方式实施永久性修复。管理层通常对那些想在行动前弄清问题及其解决方案的每个细节的完美主义者并不十分宽容；如果他们表现出宽容，那通常是因为他们口袋里还有另一个系统维持着灯火通明和业务运转。\n\
  \n我即将描述的场景虽然罕见，但确实会发生。一个夜间批处理作业——一个对时间要求严格（必须在某个时间前完成）的作业——突然开始运行得久得多。联机业务时段受到影响，管理报告未能按时生成（甚至完全没有生成），数据库管理员和开发人员对此束手无策。什么都没变过（这从来都不是真的），没有向生产环境发布新版本，没有参数更改，没有统计信息收集的变更。这时，你常常会听到那句无奈的呼喊：“它到底在搞什么？”\n\
  \n当你想正儿八经地修复一个问题时，这是一个好问题；但当你需要系统恢复到之前的行为模式时，有一条捷径。这种不理解问题本身而直接修复问题的技巧，常被称为“一级严重性杀手”。这是因为\
  \ Oracle 的一级严重性服务请求是最高优先级的：如果有办法解决问题，那就尽管去做。理解可以留到以后。\n\n那么，该怎么做呢？`SQLT` 拥有完成这项工作的工具（大部分时候）。作为\
  \ `SQLT` 操作流程的一部分，`SQLT` 会生成一个使用 SQL 概要文件的脚本。这个 SQL 概要文件（如果它对应的是那个“良好”的执行计划）可以被应用到有问题的\
  \ SQL 上，从而强制该 SQL “正确”运行，无论系统上发生了什么其他情况（错误的统计信息、更改的参数等）。尽管引入了 SQL 计划管理，SQL 概要文件仍然有用。不过，在未来的\
  \ Oracle 版本中，可以期待 SQL 计划基线成为一个更好的产品。现在，让我们先看看如何利用 SQL 概要文件。\n\n### 什么是 SQL 概要文件？\n\
  \n尽管本章标题是“通过概要文件强制执行计划”，但 SQL 概要文件并不完全等同于强制一个执行计划。它们更像是“超级提示”。使用普通提示时，优化器总有可能找到另一种执行查询的方式，而你的提示并非你所愿。另一方面，超级提示对执行计划施加了如此多的约束，以至于优化器（通常）别无选择。“概要文件”这个词在这里相当形象。优化器见过这条\
  \ SQL 语句多次通过，并确定了它的某种行为模式：它以特定的顺序访问行，并始终使用某个特定的索引。所有这些概要信息都被收集并为该查询保留，如果它的新行为不理想，就可以用这些信息在未来“强制”该语句以相同方式行为。\n\
  \nSQL 概要文件会是坏事吗？让我们用一个类比来探讨。每个人都有自己坚持的日常惯例。起床、刷牙、吃早餐、上班、开车回家、看报纸等等。这种“概要文件”相当简单。确保上班前刷牙，否则你可能得回家来刷。如果有人抹去了你的记忆（也许是一本调优的书从架子上掉下来砸到了你的头），你忘记了自己的日常惯例，在记忆恢复之前，你可能会想要一份关于你先前惯例的提醒。如果其他情况都没变，这种强制的惯例，或者说“概要文件”，可能是件好事。然而，假设你还搬了新家，现在在家工作。你的概要文件现在可能就完全过时了。开车上班不再有意义。由此可见，概要文件在短期内让一切恢复正常可能是好的，但时不时你需要检查它是否仍然合理。\n\
  \n那么，一个超级提示长什么样呢？这里有一个：\n\n```\nh := SYS.SQLPROF_ATTR(\n  '[BEGIN_OUTLINE_DATA]',\n\
  \  '[IGNORE_OPTIM_EMBEDDED_HINTS]',\n  '[OPTIMIZER_FEATURES_ENABLE('11.2.0.1')]',\n\
  \  '[DB_VERSION('11.2.0.1')]',\n  '[ALL_ROWS]',\n  '[OUTLINE_LEAF(@\"SEL$E9AF9BDE\"\
  )]',\n  '[MERGE(@\"SEL$CE1D94FA\")]',\n  '[OUTLINE(@\"SEL$98588D1C\")]',\n  '[UNNEST(@\"\
  SEL$6\")]',\n  '[OUTLINE(@\"SEL$CE1D94FA\")]',\n  '[OUTLINE(@\"SEL$C50F9DEF\")]',\n\
  \  '[OUTLINE(@\"SEL$6\")]',\n  '[OUTLINE(@\"SEL$81719215\")]',\n  '[MERGE(@\"SEL$EE94F965\"\
  )]',\n  '[OUTLINE(@\"SEL$5\")]',\n  '[OUTLINE(@\"SEL$EE94F965\")]',\n  '[MERGE(@\"\
  SEL$9E43CB6E\")]',\n  '[OUTLINE(@\"SEL$4\")]',\n  '[OUTLINE(@\"SEL$9E43CB6E\")]',\n\
  \  '[MERGE(@\"SEL$58A6D7F6\")]',\n  '[OUTLINE(@\"SEL$3\")]',\n  '[OUTLINE(@\"SEL$58A6D7F6\"\
  )]',\n  '[MERGE(@\"SEL$1\")]',\n  '[OUTLINE(@\"SEL$2\")]',\n  '[OUTLINE(@\"SEL$1\"\
  )]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$4\" \"TABLE1\".\"TABLE_NAME\"\
  \ \"TABLE1\".\"STATUS\" \"TABLE1\".\"CATEGORY\"))]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\"\
  \ \"TABLE2\"@\"SEL$3\" (\"TABLE2\".\"COL2\" TABLE2\".\"COL1\" \"TABLE2\".\"COL3\"\
  ))]',\n  '[INDEX(@\"SEL$E9AF9BDE\" \"TABLE3\"@\"SEL$2\" (\"TABLE3\".\"COL2\"  TABLE3\"\
  .\"COL1\"))]',\n  '[FULL(@\"SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[INDEX_RS_ASC(@\"\
  SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$6\" (\"TABLE1\".\"TABLE_NAME\" \"TABLE1\".\"STATUS\"\
  \ \"TABLE1\".\"CATEGORY\"))]',\n  '[INDEX_RS_ASC(@\"SEL$E9AF9BDE\" \"TABLE2\"@\"\
  SEL$6\" (\"TABLE2\".\"COL2\" \"TABLE2\".\"COL1\" \"TABLE2\".\"COL3\"))]',\n  '[LEADING(@\"\
  SEL$E9AF9BDE\" \"TABLE1\"@\"SEL$4\" \"TABLE2\"@\"SEL$3\" \"TABLE3\"@\"SEL$2\" \"\
  TABLE4\"@\"SEL$1\" \"TABLE1\"@\"SEL$6\" \"TABLE2\"@\"SEL$6\")]',\n  '[USE_NL(@\"\
  SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$3\")]',\n  '[USE_NL(@\"SEL$E9AF9BDE\" \"TABLE3\"\
  @\"SEL$2\")]',\n  '[NLJ_BATCHING(@\"SEL$E9AF9BDE\" \"TABLE3\"@\"SEL$2\")]',\n  '[USE_HASH(@\"\
  SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[USE_MERGE_CARTESIAN(@\"SEL$E9AF9BDE\"\
  \ \"TABLE1\"@\"SEL$6\")]',\n  '[USE_NL(@\"SEL$E9AF9BDE\" \"TABLE2\"@\"SEL$6\")]',\n\
  \  '[PX_JOIN_FILTER(@\"SEL$E9AF9BDE\" \"TABLE4\"@\"SEL$1\")]',\n  '[USE_HASH_AGGREGATION(@\"\
  SEL$E9AF9BDE\")]',\n  '[END_OUTLINE_DATA]');\n```\n\n注意这个提示比你通常用于调优 SQL 语句的普通提示要冗长得多。尽管如此，在标准的前导部分（包括\
  \ `BEGIN_OUTLINE_DATA`、`IGNORE_OPTIM_EMBEDDED_HINTS`、`OPTIMIZER_FEATURES_ENABLE('11.2.0.1')`\
  \ 和 `DB_VERSION('11.2.0.1')`）之后，仍然有一些可识别的部分。让我们列出更熟悉的部分：\n\n*   `ALL_ROWS`\n*  \
  \ `MERGE`\n*   `INDEX_RS_ASC`\n*   `FULL`\n*   `USE_NL`\n*   `NLJ_BATCHING`\n* \
  \  `PX_JOIN_FILTERING`\n*   `USE_MERGE_CARTESIAN`\n\n你还会注意到，引用的是诸如 `SEL$3` 和 `SEL$E9AF9BDE`\
  \ 这样晦涩的对象（它们被正式称为“查询块名”）。记住，优化器在进行更详细的成本基准调优之前，已经对 SQL 进行了转换（通过使用如第五章所述的查询转换）。在转换过程中，查询的各个部分会获得这些奇特的名称（它们是难以识别的）。概要文件提示随后就引用了这些名称。\n\
  \n\n"
- "# 了解 SQL 配置文件\n\n至此，我们已了解什么是 SQL 配置文件及其对优化器的呈现形式。我们也明白，对一个 SQL 语句保持不变的配置文件可能并非良策。话虽如此，我们仍清楚地认识到，使生产数据库恢复运行状态可能是成败的关键。因此，在所有这些前提和限制条件下，让我们探究一下\
  \ SQLT 是从何处获取其 SQL 配置文件的。\n\n## SQLT 从何处获取其 SQL 配置文件？\n\n获取为你创建 SQL 配置文件的脚本很简单。SQLT\
  \ 可从 `XTRACT` 方法和 `XECUTE` 方法生成所需的脚本。我们在 `第 1 章` 中看到了如何生成 `XTRACT` 报告，并在 `第 3 章`\
  \ 中介绍了 `XECUTE`。请记下报告的 SQLT ID（而非 SQL ID）以及你想要的执行计划哈希值。参见下图 `图 6-1`。它显示了 SQLT ID，即标题“Report:\
  \ `sqlt_s89915_main.html`”中的数字。在本例中，SQLT ID 为 `89915`。\n\n![9781430248095_Fig06-01.jpg](img/9781430248095_Fig06-01.jpg)\n\
  \n`图 6-1` .  标题页显示了生成配置文件所需的 SQLT ID\n\n执行计划哈希值 (`PHV`) 可从报告的“执行计划”部分获取。 参见 `图 6-2`，该部分显示了可用的执行计划哈希值。\n\
