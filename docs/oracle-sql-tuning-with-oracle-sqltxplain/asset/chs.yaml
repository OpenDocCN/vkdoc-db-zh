  \     56 |\n\n看起来在本例中使用位图索引是有用的，因为其成本如此之低。我们不禁要问，为什么优化器最初没有选择该索引，为此我们需要查看原始 XTRACT\
  \ 报告中的统计信息。我们从系统观察中看到，`optimizer_dynamic_sampling` 被设置为 1（因此在本例中不会进行动态采样）。参见 图 12-7，该图展示了\
  \ XTRACT 报告中的此项设置。\n\n![9781430248095_Fig12-07.jpg](img/9781430248095_Fig12-07.jpg)\n\
  \n图 12-7。优化器动态采样被设置为 1。\n\n由于动态采样的值为 1，我们知道动态采样可以发生，但在本例中并未发生，因为涉及的表并非未编入索引（有关基数反馈和动态采样的详细信息，请参见\
  \ 第 8 章）。尽管未使用动态采样不能成为生成错误执行计划的借口，但这可以解释为何如果统计信息缺失，该计划未被动态采样所保存。\n\n## 回顾原始测试案例\n\
  \n如果我们查看原始报告中的观察结果，会发现许多分区统计信息缺失且已过时（但在我这里这并不重要，因为数据是静态的）。然而，由于看起来统计信息是导致选择了错误执行计划的原因，我将更新它们并重试该\
  \ SQL。\n\n我用来收集新的最新统计信息的 SQL 是：\n\n```\nSQL> exec dbms_stats.gather_Table_stats(ownname=>'TC64661',\n\
  \  tabname=>'SALES', estimate_percent=>dbms_stats.auto_sample_size,cascade=>TRUE)\n\
  \nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_stats.gather_Table_stats(ownname=>'TC64661',\n\
  \  tabname=>'COUNTRIES', estimate_percent=>dbms_stats.auto_sample_size,cascade=>TRUE);\n\
  \nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_stats.gather_Table_stats(ownname=>'TC64661',\n\
  \  tabname=>'CUSTOMERS', estimate_percent=>dbms_stats.auto_sample_size,cascade=>TRUE);\n\
  \nPL/SQL procedure successfully completed.\n```\n\n请记住，在本例中，我还使用了来自源表的数据（这并非总是如此）。如果我对所有相关表收集了最新的统计信息（如上所示）并重新运行测试用例，我会得到如下执行计划：\n\
  \n```\nSQL> @tc\n\nCOUNTRY_NAME                             SUM(AMOUNT_SOLD)\n----------------------------------------\
  \ ----------------\nPoland                                            8447.14\n\
  Denmark                                        1977764.79\nSpain               \
  \                           2090863.44\nFrance                                 \
  \        3776270.13\nItaly                                          4854505.28\n\
  United Kingdom                                 6393762.94\nGermany             \
  \                           9210129.22\n\n7 rows selected.\n\nPLAN_TABLE_OUTPUT\n\
  \nSQL_ID  f43bszax8xh07, child number 0\n\nselect  /* ^^unique_id */  country_name,\
  \ sum(AMOUNT_SOLD) from sales s,\ncustomers c, countries co where   s.cust_id=c.cust_id\
  \   and\nco.country_id=c.country_id   and country_name in (\n'Ireland','Denmark','Poland','United\
  \ Kingdom',\n'Germany','France','Spain','The Netherlands','Italy')   group by\n\
  country_name order by sum(AMOUNT_SOLD)\n\nPlan hash value: 1235134607\n\n| Id  |\
  \ Operation                       | Name         | Rows  | Bytes | Cost (%CPU)|\
  \ Time     |\n|   0 | SELECT STATEMENT                |              |       | \
  \      |     4 (100)|          |\n|   1 |  SORT ORDER BY                  |    \
  \          |     1 |    87 |     4  (50)| 00:00:01 |\n|   2 |   HASH GROUP BY  \
  \               |              |     1 |    87 |     4  (50)| 00:00:01 |\n|   3\
  \ |    NESTED LOOPS                 |              |     1 |    87 |     2   (0)|\
  \ 00:00:01 |\n|   4 |     NESTED LOOPS                |              |     1 | \
  \   52 |     2   (0)| 00:00:01 |\n|   5 |      PARTITION RANGE ALL        |    \
  \          |     1 |    26 |     2   (0)| 00:00:01 |\n|   6 |       TABLE ACCESS\
  \ FULL         | SALES        |     1 |    26 |     2   (0)| 00:00:01 |\n|   7 |\
  \      TABLE ACCESS BY INDEX ROWID| CUSTOMERS    |     1 |    26 |     0   (0)|\
  \          |\n|*  8 |       INDEX UNIQUE SCAN         | CUSTOMERS_PK |     1 | \
  \      |     0   (0)|          |\n|*  9 |     TABLE ACCESS BY INDEX ROWID | COUNTRIES\
  \    |     1 |    35 |     0   (0)|          |\n|* 10 |      INDEX UNIQUE SCAN \
  \         | COUNTRIES_PK |     1 |       |     0   (0)|          |\n\nPredicate\
  \ Information (identified by operation id):\n\n8 - access(\"S\".\"CUST_ID\"=\"C\"\
  .\"CUST_ID\")\n   9 - filter((\"COUNTRY_NAME\"='Denmark' OR \"COUNTRY_NAME\"='France'\
  \ OR \"COUNTRY_NAME\"='Germany' OR\n              \"COUNTRY_NAME\"='Ireland' OR\
  \ \"COUNTRY_NAME\"='Italy' OR \"COUNTRY_NAME\"='Poland' OR \"COUNTRY_NAME\"='Spain'\n\
  \              OR \"COUNTRY_NAME\"='The Netherlands' OR \"COUNTRY_NAME\"='United\
  \ Kingdom'))\n  10 - access(\"CO\".\"COUNTRY_ID\"=\"C\".\"COUNTRY_ID\")\n\n36 rows\
  \ selected.\n```\n\n这个计划甚至比 XPLORE 找到的计划还要好。它的成本是 4。我们找到这个计划是因为我们使用了 XPLORE 来给我们一个提示。这个提示就是，除了\
  \ `SALES` 表之外，对所有表使用索引都是个好主意。我们需要对 `SALES` 表进行 `TABLE ACCESS FULL`，因为我们是在对一个大的国家组进行销售总额求和。然而，对其他表使用\
  \ `TABLE ACCESS FULL` 没有意义。这个例子得出这样的结果并不奇怪（我就是这么设计的），但现实生活中的例子也完全如此。通常的发现步骤是：\n\n\
  1.  某个 SQL 发生了一些意外情况（通常会变慢）。\n2.  获取 XTRACT 测试用例。\n3.  通过研究报告来发现 SQL 或其环境的问题所在。\n\
  4.  如果上一步失败了，运行 XPLORE，有时会发现一个值得考虑的有趣改动（比如我们上面例子中的 `optimizer_index_cost_adj`）。\n\
  5.  我们将 XPLORE 得到的“好”计划与 XTRACT 得到的“坏”计划进行比较，并弄清楚在优化器步骤方面的差异是什么。在我们的例子中，就是缺少了索引的使用。\n\
  6.  再次回顾 XTRACT 报告，看看是否能确定本该发生的操作为何没有发生（在我们的例子中是“为什么没有使用索引”）。\n7.  修改原始测试环境以使优化器操作发生，并再次比较执行计划的成本。\n\
  8.  如果第 7 步达到了预期的效果，则进行更多测试，如果一切如预期进行，就实施这个改进。\n\n\n这些步骤是标准调优方法的示例：测试、进行单次更改、再次测试。测试用例使您能够快速高效地完成此操作。随着您对\
  \ `XTRACT` 的熟练度提高，您会发现使用 `XPLORE` 并非必需。这有点像天气预报：“天气预报的准确性与预报员头上的灰白数量成正比。”本章要记住的教训是，虽然我们发现将\
  \ `optimizer_index_cost_adj` 设置为 `1` 使我们的执行计划好得多，但那并非解决方案。那只是促使我们找到了真正的解决方案，即修复统计信息。\n\
  \n换句话说，我们发现了一个与升级无关的问题（即统计信息是错误的），但 `XPLORE` 暗示了解决方案。这就是 `XPLORE` 令人惊奇之处。再次说明，它主要用于确定优化器发生了哪些变化（由于升级）以及哪些变化可能导致执行计划退化。然而，如果我们\
  \ *在紧急情况下* 使用 `XPLORE`，我们可能会在某个执行计划中找到一个解决问题的核心思路，即使原始问题可能与优化器行为的变化无关。\n\n## XPLORE\
  \ 中的其他信息\n\n在我们的 `XPLORE` 示例中，我们直接专注于寻找最佳计划，并未停下来查看 `XPLORE` 提供的所有其他信息。这里我们将简要介绍一些需要提及的其他部分。\n\
  \n### 基线\n\n第一个是“基线”部分，它显示了每次测试的设置。请参见 图 12-8，该图显示了 `XPLORE` 报告基线部分的顶部内容。\n\n![9781430248095_Fig12-08.jpg](img/9781430248095_Fig12-08.jpg)\n\
  \n图 12-8 .  `XPLORE` 中基线报告的顶部部分\n\n报告的这一部分显示了测试的起始位置。它首先列出了测试数据库上启动前的所有修复控制设置，然后继续列出所有优化器参数（包括隐藏参数）。\n\
  \n### SQL 监视器报告\n\n除了主报告中的所有信息外，在 `XPLORE` 压缩文件中还创建了一个压缩文件（是的，一个压缩文件内的压缩文件）。这个名为\
  \ `xplore_sql_monitor_report_1.zip` 的压缩文件包含了脚本每次执行的 SQL 监视器 HTML 输出。这是一个庞大的信息量。您永远不会查看每一个这样的执行报告，但如果您有数据并且最终确定了一个您喜欢的计划，例如上面我们的测试\
  \ ID 315，那么我们可以更仔细地研究这一个测试的 SQL 监视器报告。像往常一样，您应该创建一个目录并将压缩文件放在那里。然后解压缩文件。在此目录中，您最终将得到\
  \ 732 个 HTML 报告：每个测试一个，以及一个显示脚本如何创建的 SQL 文件。让我们看其中一个监视器报告，具体是报告 315。查看 图 12-9，该图显示了测试\
  \ ID 315 的监视器报告的左侧部分。\n\n![9781430248095_Fig12-09.jpg](img/9781430248095_Fig12-09.jpg)\n\
  \n图 12-9 .  测试 ID 315 的 SQL 监视器报告左侧部分\n\n我们可以看到执行计划和每一步的成本，但也可以看到计划每一步花费的时间量。我们可以看到大部分时间都花在了\
  \ `SALES_PROMO_BIX` 的 `BITMAP INDEX FULL SCAN` 上。事实上，如果我们将鼠标悬停在这个位图索引的持续时间条上，我们将看到该步骤的持续时间（以秒为单位）。如果我们查看同一报告的右侧部分（如\
  \ 图 12-10 所示）。\n\n![9781430248095_Fig12-10.jpg](img/9781430248095_Fig12-10.jpg)\n\
  \n图 12-10 .  SQL 监视器报告中计划 ID 315 的右侧部分\n\n这显示了 50% 的等待活动是针对 `CUSTOMERS` 上的 `BITMAP\
  \ INDEX FULL SCAN`，另外 50% 是针对 `SALES` 上的 `BITMAP INDEX FULL SCAN`。因为此计划是通过将 `optimizer_index_cost_adj`\
  \ 设置为 `1` 获得的，我们可以看到索引被不恰当地使用了，并且这个更改导致了比原始糟糕计划更好的计划。有了这些信息，我们知道处理这两个索引是改进执行时间的方法，因为它们是等待时间的最大贡献者。\n\
  \n## 总结\n\n我希望您对 `XPLORE` 能为您做的事情印象深刻，特别是与 `XTRACT` 和 `XECUTE` 结合使用时，当然还有您对优化器工作原理的了解。尽管本章中的示例是一个简单明了的\
  \ SQL 片段，但同样的方法可以应用于非常复杂的 SQL 和执行计划。大块的 SQL 可以分解为更小的步骤，并按重要性顺序进行处理，重要性由每一步的成本决定。`XPLORE`\
  \ 可以调查所有可能影响优化器计算的更改，而这在数据库版本更改导致优化器发生变化时最为常见。明智地使用 `XPLORE`，您将能捕获更多那些出错的麻烦 SQL。\n\
  \n我必须强调，所有的 `XPLORE` 活动都必须在可丢弃的数据库上运行。值得重申的是，设置环境变量、系统参数和统计信息这些 `XPLORE` 所做的操作，可能会对您与他人共享的任何系统造成严重破坏。\n\
  \n尽管 `XPLORE` 功能强大且灵活，但它并不是通用调优的理想工具，但在某些意外发生变化的情况下它极为有用。在下一章中，我们将看看 `SQLT` 中可用的更高级方法。\n\
  \n# 第 13 章\n\n![image](img/frontdot.jpg)\n\n## 跟踪文件、TRCANLZR 和修改 SQLT 行为\n\n即使有\
  \ `SQLT` 帮助您，有时您仍然需要查看 `10046` 跟踪文件并进行分析以确定发生了什么。如何分析和解释 `10046` 文件超出了本书的范围。这方面的标准指南是\
  \ Cary Millsap 的著作 *Optimizing Oracle Performance*（O'Reilly 2003）。（这本书现在有点过时，但仍然包含关于\
  \ `10046` 跟踪文件的有用信息。）然而，如何更轻松地收集这些跟踪文件并对其进行格式化以便更容易解释，并未超出本书的范围，因为 `SQLT` 提供了多种方法来更快、更轻松地收集这些信息。\n\
  \n`10046` 跟踪文件是 Oracle 引擎执行 SQL 时活动的日志文件。这些文件难以解释，充满了晦涩的代码，而且非常长。`10053` 跟踪文件（正如我在第\
  \ 5 章中提到的）同样晦涩难懂，而且也很长。当 SQL 语句并行执行并且启用了 `10046` 跟踪时，每个协助执行的从属进程都会创建自己的跟踪文件。这使得对并行执行中发生的事情的解释和理解变得更加困难。您可能有数百个跟踪文件都与同一个\
  \ SQL 相关，它们并行工作并相互通信以实现共同目标。当这些复杂情况出现问题时，仅仅收集正确的跟踪文件就可能很困难，更不用说分析这些跟踪文件并从可能成百上千的跟踪文件中获取连贯的信息了。\n\
  \n在本章中，我将描述以下方法，从最简单到更复杂。我将尝试在更简单案例的基础上解释更复杂的案例。\n\n\n## 工具概述\n\n*   `10046` 是原始的跟踪文件或信息文件。\n\
  *   `TKPROF` 提供了对 `10046` 跟踪文件的高层次视图。其输入是 `10046` 跟踪文件，输出是 `TKPROF` 报告。\n*   `TRCASPLIT`\
  \ 接收原始的 `10046` 和 `10053` 跟踪文件，从中分离出 `10046` 跟踪文件信息。这些数据随后可以输入给 `TKPROF` 或任何其他需要\
  \ `10046` 跟踪的实用程序。\n*   `10053` 是解析期间优化器选择的原始跟踪文件。\n*   `TRCANLZR` 接收原始的 `10046`\
  \ 数据并生成图形化报告，使理解数据更容易。\n*   `TRCAXTR` 接收原始的 `10046` 跟踪并生成一份 `SQLTXTRACT` 报告。\n\n\
  上述每个工具都接收混合在一起的 `10046` 或 `10046` 和 `10053`，并产出某种更简洁的信息版本。\n\n我们将从收集 `10046` 跟踪的方法开始，然后看看最古老的可用工具\
  \ `TKPROF`（它自 Oracle 7 起就存在，并非 `SQLT` 的一部分），接着我们将研究 `TRCASPLIT`，它用于分离 `10046` 和（通常）`10053`\
  \ 跟踪信息。可以将此方法视为高级工具中最简单的一种。然后我们将研究收集 `10053` 跟踪。`TRCANLZR` 是下一步，它处理单个或多个文件以生成 `TKPROF`\
  \ 的扩展版本。与 `TKPROF` 不同，`TRCANLZR` 是 `SQLT` 的一部分。\n\n最后，我们将讨论 `TRCAXTR`，它结合了 `TRCANLZR`\
  \ 和 `XTRACT` 来生成关于多个 SQL 的报告。每个部分都将借助一个 SQL 示例进行解释。\n\n## 10046 跟踪\n\n`10046` 本质上是\
  \ Oracle 引擎在处理您的 SQL 语句时的活动的低级日志记录工具。它生成一个称为“跟踪”文件的文件，该文件是一个文本文件，包含执行低级步骤的详细信息。根据选择的跟踪级别，可以将此跟踪配置为收集等待事件、绑定变量和绑定值（可选择的级别见下文）。收集此信息存在开销，它可能消耗大量磁盘空间，并在生成跟踪文件时占用正在执行语句的资源。\n\
  \n## 为什么收集 10046 跟踪？\n\n收集 `10046` 跟踪不是一项可以掉以轻心的活动。如上所述，它会消耗大量资源（尤其是磁盘空间）。考虑到收集\
  \ `10046` 跟踪的开销，您不会轻易选择收集此信息。除非有充分的理由，否则通常不会收集它。为了解决通过查看高层次聚合信息无法解决的性能调优问题，才会专门收集\
  \ `10046` 跟踪。在这些更困难的情况下，需要一些低级别信息（这些信息在聚合中丢失了）作为我们正在解决的谜题的关键线索。这是因为它包含了 SQL 执行期间发生的非常详细的信息。\n\
  \n`10046` 跟踪也可以通过其他方式启用跟踪来产生，例如在系统级别或跟踪另一个会话而不是您自己的会话。收集的信息是相同的，解码也是相同的；只是启动跟踪的方法会改变。在每种情况下，跟踪文件都是一个独立的文件，位于\
  \ `user_dump_dest` 区域（对于 11g Release 1 及以上版本，由 `diagnostic_dest` 参数控制）。\n\n### 10046\
  \ 解码\n\n有些人会直接阅读 `10046`；这可能是有用的，因为它包含有时在聚合中未包含的低级别信息（这是聚合的本质）。以下是一个典型的 SQL `10046`\
  \ 跟踪文件片段。\n\n```\nEXEC #1:c=0,e=162,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=2938593747,tim=6801557607\n\
  WAIT #1: nam='SQL*Net message to client' ela= 6 driver id=1111838976 #bytes=1 p3=0\
  \ obj#=-1 tim=6801557680\nWAIT #1: nam='Disk file operations I/O' ela= 821 FileOperation=2\
  \ fileno=5 filetype=2 obj#=-1 tim=6801559064\n*** 2012-12-26 09:59:43.625\nWAIT\
  \ #1: nam='asynch descriptor resize' ela= 4 outstanding #aio=0 current aio limit=4294967295\
  \ new aio limit=257 obj#=-1 tim=6802577972\nWAIT #1: nam='asynch descriptor resize'\
  \ ela= 2 outstanding #aio=0 current aio limit=4294967295 new aio limit=257 obj#=-1\
  \ tim=6802578401\nFETCH #1:c=0,e=1020838,p=0,cr=3180,cu=0,mis=0,r=1,dep=0,og=1,plh=2938593747,tim=6802578585\n\
  WAIT #1: nam='SQL*Net message from client' ela= 302 driver id=1111838976 #bytes=1\
  \ p3=0 obj#=-1 tim=6802578974\nWAIT #1: nam='SQL*Net message to client' ela= 3 driver\
  \ id=1111838976 #bytes=1 p3=0 obj#=-1 tim=6802579032\nFETCH #1:c=0,e=45,p=0,cr=0,cu=0,mis=0,r=6,dep=0,og=1,plh=2938593747,tim=6802579064\n\
  STAT #1 id=1 cnt=7 pid=0 pos=1 obj=0 op='SORT ORDER BY (cr=3180 pr=0 pw=0 time=0\
  \ us cost=947 size=315 card=9)'\nSTAT #1 id=2 cnt=7 pid=1 pos=1 obj=0 op='HASH GROUP\
  \ BY (cr=3180 pr=0 pw=0 time=18 us cost=947 size=315 card=9)'\nSTAT #1 id=3 cnt=250069\
  \ pid=2 pos=1 obj=0 op='HASH JOIN  (cr=3180 pr=0 pw=0 time=1261090 us cost=909 size=15233435\
  \ card=435241)'\n```\n\n很容易理解，对吧？ 在下面的小节中，我将展示一个可用于查看跟踪文件中出现的部分类型并进行至少部分解码的 `10046`\
  \ 跟踪文件。以下是 SQL 示例：\n\n```\nSQL> alter session set events '10046 trace name context\
  \ forever, level 64';\n\nSession altered.\n\nSQL> select count(*) from sh.sales;\n\
  \nCOUNT(*)\n----------\n513605\n\nSQL> exit\n```\n\n我将 `10046` 跟踪文件的解码分为三个主要部分：头部、主体部分记录格式以及每行详细信息的解码。\n\
  \n## 头部信息\n\n虽然头部本身不是 SQL 执行的一部分，但查看头部很重要。这是我执行的 SQL 的示例头部。\n\n```\nTrace file f:\\\
