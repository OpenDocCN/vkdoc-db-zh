  作为设置系统统计信息能力的示例，我将对我的测试设备执行这些步骤。如果你想对你的临时测试环境做类似的事情，使其与另一个环境相似，你可以获取系统统计信息并手动设置它们，就像我在这个示例中将要做的那样。从上面的示例中，我们目前的最佳成本是\
