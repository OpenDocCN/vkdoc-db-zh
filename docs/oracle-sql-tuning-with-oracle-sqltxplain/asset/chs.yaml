  ## 关于作者


  ![image](img/9781430248095_unFM-01.jpg)


  `Stelios Charalambides` 拥有超过 20 年使用 Oracle 数据库的经验。他持有从 Oracle 7 到 11g 的 OCP 认证，并在大西洋两岸担任过高级顾问
  DBA，处理系统设计、实施和生产后支持的所有方面，在各种环境中解决实际问题。他现在是一名首席 Oracle 支持工程师，为面临高知名度性能问题的一级客户开发关键时间的解决方案。Stelios
  虽然出生在英国，但现在与妻子、两个孩子和两只狗住在新罕布什尔州。这本书完成后，他期待花更多时间在自己的爱好上。


  ## 关于技术审阅者


  `Mark Bobak` 是密歇根州安娜堡 ProQuest 公司的高级 Oracle DBA。他在 IT 领域工作了超过 25 年。在过去的 13 年里，他一直担任
  Oracle DBA。他是 Oracle ACE 和 OakTable Network 的成员。他还积极参与当地的 Oracle 用户组 (SEMOP)，并在地方、州、国家和国际层面的会议上发表演讲。


  ## 致谢


  Carlos Sierra 是 `SQLTXPLAIN` 的作者。他的热情、耐心和倾听的意愿使我得以进入使用 `SQLT` 进行 Oracle SQL 调优的世界。没有他的帮助和启发，这本书就不可能完成。我希望文本能达到他的期望，并且我在描述他的心血之作时没有犯任何错误。如果有，我表示歉意。错误完全在我。


  还要感谢我在 Oracle 的第一个大家庭（Oracle 性能小组）、Chris Crocker、Cathy Scully（她明智地雇佣了一个英国人）以及 Mike
  Matagranno，他执着地劝说我加入 Oracle，其坚持程度令人震惊。我希望你们没有人后悔那个决定。必须特别提到 Mauro Pagano，他专门的知识和无尽的热情让我相信，我有一些关于
  `SQLT` 的有用见解可以分享。


  还要非常感谢我的第一位经理 Mike Gervais，他的善意在我入职 Oracle 的头几个月里帮助很大。Alan Bashy、Nick Meola 和 Peter
  Gadah 是性能团队的同事，也值得特别一提。他们真的很棒，让我明白无论你认为自己对调优了解多少，总有更多东西要学。我非常幸运能遇到这么多知识渊博、热情洋溢的同事和经理。这里没有空间感谢他们所有人，为此我很抱歉。




  同时也要感谢加里·亨特教授，他一直相信我的潜力，并教导我：只要用心，一切皆有可能。


  来自 Apress 的乔纳森·杰尼做出了出版这本书的最终决定，在他人怀疑时展现了信任。还要感谢安娜米卡·潘楚，她容忍了我错过的截止日期：我很抱歉，我已尽了最大努力。最后但同样重要的是，克里斯·纳尔逊付出的巨大努力，极大地改进了我那拙劣、近乎文盲的草稿（别改那句话），并让我得以完成一本希望在未来多年都能有所助益的书。克里斯通过呼喊、推动，以及告诉我终点线就在前方等方式，让我坚持了下来。对于你的耐心和辛勤工作，我由衷地感谢。


  ## 前言


  你即将阅读的这本书，是关于使用 `SQLTXPLAIN`（也可简称为 `SQLT`）进行 SQL 调优的主题。你可能对这个 `SQLT` 工具的功能略知一二，但对其背后的故事却知之甚少。这篇前言提供了一些背景信息，讲述了这个工具是如何演变成今天的样子。希望你能喜欢这幕后一瞥，了解多年来我研究你即将学习的这个工具时，那些逐渐汇聚起来的动机和事件。


  在 1990 年代末，我和当时的许多顾问一样，是个“空中飞人”。我是一名甲骨文“现场支持工程师”，在制造和 SQL 调优方面有相当不错的专业知识，并且选择加入了短期任务团队。（那时我们有两个选择：短期或长期任务！）。我过去常常为了这些任务在各个站点之间频繁出差。


  对于像我这样愿意到现场处理影响大型制造企业的 Oracle ERP“大火”的人来说，制造和 SQL 调优是一个很好的组合。生活很紧张，但也很棒！经过几周的任务后，我开始注意到一些模式：当试图诊断性能不佳的
  SQL 语句时，需要检查的方面很多，而 `trace/tkprof` 并不能给我提供快速有效诊断 SQL 调优问题所需的一切信息！通过我的任务，我开发了一套灵活的脚本。这就是传奇的
  `coe_xplain.sql` 的诞生过程。


  当时的经理卡尔·达达伊支持我的努力，实际上还鼓励我建立自己的工具集，以便在一周的时间内交付结果。于是，我几乎在每一个性能任务中都使用 `coe_xplain.sql`，而且总是能得到很好的结果。随着时间的推移，我很高兴自己开发了这个小工具，因为我对
  `tkprof` 的大多数改进建议至今仍悬而未决。


  有一天，正当我愉快地使用我的个人脚本 `coe_xplain.sql` 以及我开发的其他一些脚本时，当时合作的一家公司里一位才华横溢的 DBA 问我，他是否可以保留我的工具集以备后用。我对于留下我的“玩具”的担忧源于经验：我知道，你编写的任何代码都会伴随你一生，这既是奖励也是诅咒。如果你的代码只有几个小错误，那还好。否则，你会感觉被困扰和追捕几十年！


  尽管如此，我还是决定分享我的 `coe_xplain.sql` 和其他小工具，并附带说明用户需“按原样”接受它们。一年后，同一位 DBA 问我是否可以在 `Metalink`（现在称为
  `MyOracle Support`）上发布我的 `coe_xplain.sql` 脚本，这样如果我决定继续更新，他就能持续获取新版本。这对我来说是一个转折点。在
  2001 年将一个工具发布在 `Metalink` 上，对我来说只意味着一件事：我愿意做出妥协，尽可能让这个工具免于错误，并且我必须对功能增强请求做出回应，即使这意味着要拒绝所有的请求。我当时就知道（正如我现在所知），当我说“可以”而且想说“可以”的时候，我总是很难说“不”。


  因此，在 `coe_xplain.sql` 发布在 `Metalink` 上后，我很快就开始收到一些类似这样的问题：“你能在这个原本不错的脚本里加上这个小小的功能吗？”


  2002 年底，`coe_xplain.sql` 脚本已经变得很大，我决定是时候真正将其升级为 PL/SQL 了。这意味着要用一个 PL/SQL 包重写所有功能，而不是将几个
  SQL 语句嵌入一个大型脚本中。那时我仍然是一个名为“卓越中心”团队的一员。这就是为什么 `coe_xplain.sql` 有“coe_”这个前缀。如今，甲骨文内部有许多团队共享“CoE”这个名字，因此我觉得它的意义有些被稀释了。（类似的情况也发生在“BDE”团队，意思是“Bug
  诊断与升级”。这就是为什么我的一些脚本过去和现在仍有“bde_”前缀的原因。）


  我决定是时候将 `coe_xplain.sql` 升级为更健壮的东西了。我不再想以我工作的团队名字来命名我的脚本。于是在 2002 年，在第二个主要版本中，这个
  `coe_xplain.sql` 工具变成了 `SQLTXPLAIN`，我将其发布在 `Metalink`（`MyOracle Support`）的注释 `215187.1`
  下，这至今仍是它的位置。`SQLTXPLAIN` 这个名字大致来源于“SQL Tuning and Explain Plan”。我曾在网上搜索过，没有找到任何关于
  `SQLTXPLAIN` 这个名字的参考。我试图避免与其他工具名、产品或公司名称冲突，截至目前，至少在这个命名方面，我成功了！


  `SQLTXPLAIN` 很快被甲骨文支持部门内部的许多 Oracle ERP 团队采用，并逐渐扩展到甲骨文开发部门。那时我收到的大多数 `SQLT` 增强请求都是针对电子商务套件（`EBS`）的，因此
  `SQLTXPLAIN` 主要变成了一个诊断 `EBS` 内性能不佳的 SQL 语句的工具。从 2002 年一直到 2006 年，这个工具都安装在应用程序模式内，即
  `EBS` 的 `APPS` 模式中。因此，`SQLTXPLAIN` 曾经有很强的 `EBS` 依赖关系。它创建在应用程序模式内，在那里创建和删除对象。但别担心！它现在已经不这么工作了。


  2002 年到 2006 年那几年，我在甲骨文的日子很艰难。我忙于开发内部应用程序，同时还在攻读计算机科学硕士学位，因此我面临着双重挑战。更不用说我和妻子还要抚养四个青少年了！因此，`SQLTXPLAIN`
  在 2007 年之前实际上被冻结了。


  我之前没提，现在说一下：`SQLTXPLAIN` 从来不是甲骨文的官方项目。直到 2007 年，`SQLTXPLAIN` 都是我周末的宠物项目（一个很大的项目！）。我几乎所有个人的空闲时间都用于开发和维护这个工具。它是我的宝贝，至今仍是。我非常幸运，我的妻子凯莉·桑塔纳也在甲骨文工作，在我忙碌的这些年里她给予了我极大的支持。如果没有她的耐心和理解，我可能早就不得不放弃
  `SQLTXPLAIN`，并将其从 `Metalink` 上下架了！


  2006 年底，我调到了甲骨文内部的服务器技术卓越中心（`ST CoE`）。我之前在`应用卓越中心`，现在进入了`ST CoE`。那是“另一边”，有人称之为“黑暗面”，或者干脆就是“另一边”。我带去了我所有的
  `EBS` 专业知识和我所有的工具。史蒂夫·弗兰奇，我在甲骨文遇到过的最好的经理之一，批准我继续维护我的工具，因此我可以在正常工作时间内处理 `SQLTXPLAIN`。这对我来说是一个巨大的激励，因此我在甲骨文的新家里非常开心。在那之前，我的大部分脚本实际上都是在夜间和周末工作的。当你的爱好和你的工作如此顺畅地融为一体时，问题就来了：而且，你还有在家工作的特权。所以今天我会说我几乎全天候、每周七天都在照看
  `SQLTXPLAIN`。但当然，我仍然要睡觉和吃饭！




  '
- '# 我与 SQLT 的故事：从被拒绝到广泛采用


  ## 与 Abel Macias 的初次碰撞


  自从我加入 ST CoE 后，我便肩负着一项个人使命：我希望服务器技术支持组能了解 `SQLTXPLAIN`，并像采用 `EBS` 那样尽可能多地采用它。因此，我请求与性能支持团队的一位传奇人物兼领导者会面。就这样，我得以结识
  Abel Macias。当我向 Abel 询问在 ST 性能问题上使用 `SQLTXPLAIN` 时，他的回答很生硬。我不记得他的原话了，但大意是这样的：“我们不会用它，因为它烂透了。”


  Abel 以其时而直截了当（但正确）的回答而闻名。他为人非常谦逊，但观察问题过于直接，这可能让人望而生畏。最初的震惊过后，我问他为什么这么想。这为我打开了一扇门，了解到
  `SQLTXPLAIN` 存在的一系列虽短但重要的缺陷。我离开时感到沮丧，但面前也有了一个新的挑战：我要把这些建设性的批评全部收集起来，转化为对 `SQLTXPLAIN`
  的重大改进。经过数周的辛勤工作（以及喝了太多杯咖啡），我再次见到 Abel，并向他展示了所有这些对 `SQLTXPLAIN` 的“调整”。直到那时，他才喜欢上它，而
  Abel 和我也成了朋友！如今，我们一起骑车驰骋数英里。即使我们不想谈，但在我们享受山地骑行，或者喝着一杯……或两杯啤酒时，我们经常会就 SQL 调优和 `SQLTXPLAIN`
  进行简短而有意义的交谈。


  ## 第三次重写与`SQLT`的独立


  根据 Abel 的意见，`SQLT` 变得独立于应用程序，安装在自己的模式中，并且支持 `RAC`。由于 `SQLTXPLAIN` 这个名字非常独特，它成为了安装所有工具对象的应用程序模式的名称。一切看起来都不错，但有件事一直困扰着我，那就是
  `SQLTXPLAIN` 被大幅修改，并且需要越来越多的维护。是时候进行第三次全面重写了。由于代码量已经很大，我知道我需要大量不受打扰的专属时间。我决定利用我所有累积的假期，加上一些节假日；于是在
  2009 年 12 月和 2010 年 1 月期间，我几乎都待在我的“男人洞穴”里开发 `SQLT` 的第三个主要版本。


  ## 工具的本质与社区的认可


  我在 2010 年 4 月完成了所有的细节和测试。此时的 `SQLT` 已经包含了多个程序包，代码行数接近 10 万行，所有这些都是用两根手指开发的（我至今仍用两根手指打字）。有些人认为
  `SQLT` 是由一个大型团队开发和维护的。如果你这么想，那很抱歉让你失望了：`SQLT` 诞生的初衷是作为支持人员的工具，为了让他们的工作更轻松，现在在某种程度上也被许多其他从事
  SQL 调优这一复杂任务的人共享和使用。然而，这个工具的精神始终未变：一个帮助诊断性能不佳（或产生错误结果）的 SQL 语句的工具。


  2010 年 4 月发布的第三个主要版本的 `SQLTXPLAIN`，迅速被支持部门内的服务器技术性能团队采纳。自从我加入 ST CoE 以来，我还很荣幸地开发了两个为期一周的内部
  SQL 调优研讨会。在全球范围内向 700 多名 Oracle 专业人士交付了数十次这些研讨会后，我收集并整合了数百条在课堂上口头交流中获得的改进建议。


  ## 致谢杰出贡献者


  在所有为我提供如何改进 `SQLT` 的想法的好心人和聪明人中，我想特别提到两个人的名字，他们除了 Abel 之外，还为该工具的功能集做出了卓越贡献：Mauro
  Pagano 和 Mark Jefferys。Mauro 凭借其持续的洞察力，启发了 `SQLTXPLAIN` 的 `XPLORE` 方法，该方法使用强力分析来缩小升级后出现性能回退的可能原因范围。Mark
  凭借其深厚的数学和科学背景，向我指出了我犯的几个错误，尤其是在统计和测试用例创建方面。我由衷地认为，`SQLT` 能有今天的成就，要归功于我从众多聪明人那里不断获得的建设性反馈。有时反馈很直接，但大多数时候只是要求我在这里或那里加入一点东西，或者修复一个小错误。作为改进的例子，我想提及一些大的方面：在
  `SQLT` 中增加对 `Siebel` 和 `PeopleSoft` 的感知能力，以及它执行的所有健康检查。


  ## 个人的感言


  我认为自己是一个非常幸运的人，自 1996 年以来就有机会在像 `Oracle` 这样伟大的公司工作；我还遇到了一些非常棒的经理，他们非常支持我采取我认为正确的策略来诊断困难的
  SQL 调优问题。对于我为这个 `SQLTXPLAIN` 工具所投入的个人时间，我一分钟都不后悔。起初，它是为了我自己，也来源于我自己。现在，它来源于我和其他许多聪明的头脑，基本上服务于任何希望深入进行严肃
  Oracle 数据库 SQL 调优的人。


  当 Stelios Charlambides 询问我关于他撰写一本以 `SQLXPLAIN` 为核心的书的意见时，我感到荣幸和高兴。许多人问我：“我们什么时候能有一本关于
  `SQLTXPLAIN` 的书？”如果你也是其中之一，请尽情享受 Stelios 利用他个人时间所开发的成果，并感谢他写了这本书！我真诚地希望你能享受 `SQLTXPLAIN`，甚至享受
  SQL 调优的过程。


  我总是说，SQL 调优就像寿司，你要么爱它，要么恨它！我希望随着你了解得越来越多，你会像我在 20 世纪 90 年代那样爱上它。同时请记住，SQL 调优的学习永无止境。扎实的基础、好奇心、毅力和经验——这些只是有朝一日能从容进行
  SQL 调优的部分要素。干杯！


  —Carlos Sierra，《`SQLTXPLAIN`》作者


  '
- '# 引言


  本书旨在作为一本实用指南，介绍一个名为 `SQLTXPLAIN` 的宝贵工具，通常简称为 `SQLT`。你可能从未听说过它，但如果你的工作涉及 `Oracle`
  调优，`SQLT` 将是你能找到的最有用的工具之一。最棒的是，它可以从 `Oracle` 免费获得。你需要做的就是学会如何使用它。


  ## 本书的由来


  我担任 `DBA` 已超过二十年。在那段时间里，我处理过许许多多的调优问题，但直到我开始为 `Oracle` 工作时，我才了解到 `SQLT`。作为 `Oracle`
  支持部门调优团队的一员，我每天都使用 `SQLT` 来解决客户最复杂的调优问题。我很快意识到我的经历并非个例。在 `Oracle` 之外，很少有 `DBA` 知道
  `SQLT` 的存在。知道如何使用它的人就更少了。因此，本书应运而生。


  ## 不要购买本书


  如果你正在寻找一本关于抽象调优理论或如何调优“原始”SQL 的书。本书是关于如何使用 `SQLT` 进行 `Oracle` SQL 调优的。所采用的方法完全实用，并使用大量示例来展示
  `SQLT` 工具的实际操作。


  ## 请购买本书


  如果你是一名开发人员或 `DBA`，并且参与处理 `Oracle` SQL 调优问题。无论你的系统多么复杂，或者你与数据之间隔着多少层技术，让你的查询高效运行才是关键所在。无论你是一名初入职场的初级
  `DBA`，还是一名经验丰富、见多识广的老手，本书旨在向你展示一些完全实用、对你日常工作非常有用的东西。



  '
- '# SQLT 入门指南


  ![image](img/frontdot.jpg)


  理解 `SQLT` 将显著提升您解决调优问题的能力，并为您提供一个针对新代码和旧代码的有效检查清单。


  调优问题是最复杂的技术难题之一。`SQLTXPLAIN` 是一个出色的工具，能帮助您解决这些问题。准备好被它折服吧。


  欢迎来到使用 `SQLTXPLAIN`（通常简称为 `SQLT`）进行快速 Oracle SQL 调优的世界。从未听说过 `SQLT`？您并不孤单。在我加入甲骨文之前，作为一名从业多年的
  DBA，我也从未听说过它。这就是我撰写本书的原因。`SQLT` 是一个极好的工具，因为它能帮助您快速诊断调优问题。我指的是什么？我的意思是，最多在半天时间内，您就能从一条运行缓慢的
  SQL 开始，理解其为何运行异常，并最终知道如何修复它。


  `SQLT` 会直接修复您的 SQL 吗？不会。修复 SQL 需要更长时间。有些表非常大，收集统计信息可能就需要数天。搭建测试环境或将修复方案部署到生产环境也可能耗时良久。关键点在于，使用
  `SQLT` 工作半天，就能为您提供一份解释。您将知道 SQL 为何缓慢，或者能够解释它为何无法再快。


  您需要了解 `SQLT`，因为它会让您的工作更轻松。但让我先稍微回退一下，详细介绍一下 `SQLT` 是什么、它是如何诞生的、您可能为何没听说过它，以及您为何应该将其用于
  Oracle SQL 调优。


  ## 什么是 SQLT？


  `SQLT` 是一套程序包和脚本，用于生成 `HTML` 格式的报告、一些 SQL 脚本以及一些文本文件。所有信息被打包在一个 zip 文件中，通常会发送给 Oracle
  支持团队，但您也可以自己查看这些文件。`SQLT` 中包含十几个程序包和过程（称为“方法”）。这些程序包和过程会根据您的情况收集不同的信息。我们稍后将讨论适用于多种情况的程序包。


  ## SQLT 的由来？


  俗话说，需要是发明之母，`SQLT` 的诞生正是如此。Oracle 支持工程师每天处理大量的调优问题；问题是，旧有的线性分析方法实在太慢了。您需要快速把握全局，以便聚焦细节并告知客户问题所在。因此，当时的支持工程师
  Carlos Sierra（现为 Oracle 专家中心成员——Oracle 内部的一个专家团队）创建了 `SQLT`。这些例程在多次客户现场服务中不断演进，最终能够快速有效地收集*所有*必需的信息。随后，他提供了易于使用的例程来报告这些问题。


  `SQLT` 的天才创作者 Carlos Sierra，如今大部分时间都用于改进 `SQLT` 代码，并使 `SQLT` 代码适配新版数据库管理系统。他还通过
  `SQLT` 这一媒介，协助 Oracle 性能调优工程师进行 SQL 调优。


  ## 你为何没听说过 SQLT？


  如果它如此有用，为什么您没听说过 `SQLT`？ Oracle 曾尝试向 DBA 社区宣传 `SQLT`，但我仍然会接到支持电话，并与从未听说过 `SQLT`
  的 DBA 交流——或者即使听说过，也从未使用过。这个神奇的工具对支持客户是免费的，因此没有成本。 DBA 需要经常查看有问题的 SQL，而 `SQLT` 无疑是最快的解决问题的方法。学习曲线可能较陡，但远不及其他替代方案那样高：解析原始的
  `10046` 跟踪文件或 `10053` 跟踪文件。在统计信息表中大海捞针般查找问题？猜测可能的修复方法并尝试？不了，谢谢。`SQLT` 就像一枚巡航导弹，穿越世界直击目标。


  也许 DBA 太忙，没时间学习一个 Oracle 发行说明中都未提及的工具。它不在文档集中，也不是产品套装的官方组成部分。它只是一个由才华横溢的支持工程师编写的工具，却碰巧比市场上任何其他工具都好。让我重申一遍：它是免费的。


  也有可能，一些 DBA 过于专注于调优中晦涩的细节，而忘记了修复 SQL 的现实世界。当你可以谈论那些你永远遇不到的情况的深奥隐藏参数时，为何要谈论一个易于使用的程序包呢？`SQLT`
  是一个非常实用的工具。


  无论原因为何，如果您以前从未使用过 `SQLT`，那么我在本书中的使命就是让您尽可能快、尽可能轻松地上手并运行。我向您保证，安装和使用 `SQLT` 很容易。只需掌握几个简单的概念，30
  分钟内您就可以开始使用。


  ## 我是如何知道 SQLT 的？


  和 DBA 界的其他人一样（我担任 DBA 多年），直到加入 Oracle 我才听说 `SQLT`。它让我豁然开朗。这个已经存在多年的工具，正是我过去多次需要的东西，尽管我从未用过。当然，过去几年我读过许多关于调优的书籍：例如
  Cary Millsaps 的经典著作 *优化 Oracle 性能*，以及 Jonathan Lewis 的 *基于成本的 Oracle 基础*。


  培训课程（总共两周）非常密集，至少有两位工程师形容它就像试图从消防栓里喝水。别担心！这本书将使学习使用 `SQLT` 的工作变得容易得多。


  现在，由于我在日常调优问题中广泛使用了 `SQLT`，我无法想象没有它的日子。我希望您也能拥有同样的能力。这不会花很长时间。请跟随我读完本书，理解示例，然后尝试将其与您自己的情况联系起来。您需要一些基本概念（我稍后会介绍），然后就可以着手解决您自己的调优问题了。请记住，即使没有问题也要定期使用
  `SQLT`；这样您可以学会快速浏览主 `HTML` 文件以找到所需内容。针对没有问题的 SQL 运行一份 `SQLT` 报告。您会学到很多。请在这段奇妙的旅程中与我同行。


  ## 开始使用 SQLT


  开始使用 `SQLT` 再简单不过了。我将这个过程分解为三个简单的步骤。


  1.  下载 `SQLT`

  2.  安装 `SQLT`

  3.  运行您的第一份 `SQLT` 报告


  `SQLT` 可在许多不同的平台上运行。我的许多示例将基于 Microsoft Windows，但 Linux 或 Unix 同样易于使用，并且 `SQLT`
  的使用在各平台之间几乎没有差异。如果有，我会在文中注明。


  ### 如何获取 SQLT 副本？


  如何下载 `SQLT`？这简单又轻松。我刚刚还为自己计时了一下。花了两分钟。以下是在目标机器上准备好 `SQLT` 程序包的步骤：


  1.  找一个网页浏览器并登录 `My Oracle Support` (`http://support.oracle.com`)

  2.  进入知识库部分，在搜索框中键入“`SQLT`”。标题为“`SQLT` (`SQLTXPLAIN`) – 帮助诊断性能不佳的 SQL 语句的工具 [ID
  215187.1]”的 `Note 215187.1` 应该位于列表顶部。

  3.  滚动到该说明的底部，选择适合您环境的 `SQLT` 版本。目前有适用于 9i 到 11g 的版本。

  4.  下载 zip 文件（我下载的版本是 2MB）。

  5.  解压 zip 文件。


  您现在拥有了 `SQLT` 程序，可以安装到任何合适的数据库上。如果需要，您可以将 zip 文件下载到 PC，然后复制到服务器。


  ### 如何安装 SQLT？


  那么，闲话少说，让我们安装 `SQLT`，以便进行一些调优：



