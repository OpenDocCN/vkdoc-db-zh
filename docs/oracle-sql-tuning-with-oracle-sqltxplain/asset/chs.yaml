  \ CPU 速度设置为当前值的 10 倍：\n\n```sql\nEXEC DBMS_STATS.SET_SYSTEM_STATS('CPUSPEEDNW',\
  \ 16830.00);\n```\n\n然后，当我们下一次运行测试用例（在刷新共享池之后）时，我们得到这个执行计划：\n\n```\n|Id  |Operation\
