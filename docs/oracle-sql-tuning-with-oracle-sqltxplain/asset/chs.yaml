  \ 1 28 (cr=140\nSTAT #2 id=3 cnt=54 pid=2 pos=1 obj=0 op='BITMAP CONVERSION COUNT\
  \ (cr=140 pr=0 pw=0 t\nSTAT #2 id=4 cnt=54 pid=3 pos=1 obj=74275 op='BITMAP INDEX\
  \ FAST FULL SCAN SALES_PROMO\nWAIT #2: nam='SQL*Net message from client' ela= 301\
  \ driver id=1111838976 #bytes=1 p3=0\nFETCH #2:c=0,e=5,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=0,plh=1123225294,tim=843704115083\n\
  WAIT #2: nam='SQL*Net message to client' ela= 5 driver id=1111838976 #bytes=1 p3=0\
  \ ob\n\n*** 2013-02-03 13:51:07.597\nWAIT #2: nam='SQL*Net message from client'\
