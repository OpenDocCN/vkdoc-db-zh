  \ 的文件：\n\n```\nC:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\sqlt\\run>dir\
  \ *compare*.html\n Volume in drive C has no label.\n Volume Serial Number is 77E9-80B4\n\
  \nDirectory of C:\\Documents and Settings\\Stelios\\Desktop\\SQLT\\sqlt\\run\n\n\
  11/17/2012  03:03 PM           355,957 sqlt_s96376_s73560_compare.html\n       \
  \        1 File(s)        355,957 bytes\n               0 Dir(s)   7,088,697,344\
  \ bytes free\n```\n\n## 分析 SQLTCOMPARE 报告\n\n通过运行 `SQLTCOMPARE` 生成的 HTML 文件包含了对比两个目标数据库执行计划哈希值的信息。在这个案例中，第一个系统比第二个系统稍快。造成这种情况的原因可能有很多，但这里的关键是要看报告中提供了哪些可供调查的部分。我们已经知道执行计划略有不同。以下是我们的示例中\
  \ `SQLTCOMPARE` 报告的顶部（参见 图 10-3）。\n\n![9781430248095_Fig10-03.jpg](img/9781430248095_Fig10-03.jpg)\n\
  \n图 10-3 . `SQLTCOMPARE` 报告的顶部\n\n如果我们点击报告顶部的 SQL Identification 超链接，我们将看到差异（如果有的话），如\
  \ 图 10-4 所示。\n\n![9781430248095_Fig10-04.jpg](img/9781430248095_Fig10-04.jpg)\n\n\
  图 10-4 . SQL Identification 显示了一些基本差异\n\n请注意，我们确实选择了相同的 SQL ID，但有一些条目标记为红色（在 图 10-4\
  \ 中用方框高亮标出），以表示存在差异。这种显示差异的方法在整个报告中并非一致使用。有时，对于不太重要的差异，部分会标记为琥珀色，但通常标记为红色的差异是重要的，应该在继续之前予以注意和理解。\n\
  \n## 环境部分\n\n下一部分是环境部分，其示例如 图 10-5 所示。\n\n![9781430248095_Fig10-05.jpg](img/9781430248095_Fig10-05.jpg)\n\
  \n图 10-5 . `SQLTCOMPARE` 报告的环境部分\n\n在这里，相同之处与不同之处同样重要。我们可以立即看到，CPU 数量相同，RAC 环境相同，块大小也相同。但也存在一些差异：字符集、时区等。\n\
  \n## 报告部分概览\n\n在主 HTML 对比报告中（如 图 10-3 所示），我们可以从上到下进行浏览。这不像主 `SQLTXTRACT` 或 `SQLTXECUTE`\
  \ 报告那样冗长复杂。报告还包含以下部分：\n\n*   SQL 文本\n*   SQL 标识\n*   环境\n*   NLS 会话参数\n*   I/O 校准\n\
  *   CBO 参数\n*   Fix control\n*   CBO 系统统计信息\n*   执行计划\n*   表信息\n*   表分区信息\n*   索引信息\n\
  *   索引分区信息\n*   列信息\n*   捕获的绑定变量\n*   已窥探的绑定变量\n\n## 对比执行计划\n\n当然，报告中还包含执行计划（如 图\
  \ 10-6 所示）。这里的很多信息与你在 `SQLTXRACT` 报告中看到的信息完全相同，因此我们不会在此过多赘述。需要注意的重要一点是，它为你提供了许多特性的便捷并排对比，包括执行计划（参见\
  \ 图 10-6）。这是一种快速发现差异的好方法，特别是当你的执行计划有数百行而只有一行不同时（是的，这种情况确实会发生，而且确实会对执行时间产生巨大影响）。\n\
  \n![9781430248095_Fig10-06.jpg](img/9781430248095_Fig10-06.jpg)\n\n图 10-6 . 来自两个系统的执行计划并排对比\n\
  \n## 计划摘要\n\n最重要的部分是计划摘要。它显示了被对比的两个 SQL 语句的平均 elapsed 时间和 CPU 时间。我们在 图 10-7 中看到一个例子。\n\
  \n![9781430248095_Fig10-07.jpg](img/9781430248095_Fig10-07.jpg)\n\n图 10-7 . 报告中的计划摘要部分\n\
  \n我们不仅能看到两个语句在 elapsed 时间上的对比（如果两个系统的负载不同，这可能会产生误导），还能看到以秒为单位的 CPU 时间和平均缓冲区获取次数，后者通常是衡量一个执行计划相对于同一\
  \ SQL 的另一次运行效果好坏的良好指标。我已经用箭头标出了缓冲区获取次数。自然，计划摘要中的每一行都在告诉我们一些信息。下面我列出了我认为重要的项目：\n\n\
  \n\n# SQL 性能指标与测试用例构建\n\n## 性能指标概述\n\n在比较 SQL 性能时，以下指标至关重要：\n\n*   `Avg. Elapsed\
  \ Time in secs`：如果系统负载相当，此指标明确指示 SQL 的性能。\n*   `Avg. CPU Time in secs`：将 CPU 时间与总耗时对比，可判断\
  \ SQL 是否受 CPU 限制。\n*   `Avg. User I/O Wait Time in secs`：衡量 I/O 所花费的时间，可判断是否受 I/O\
  \ 限制。\n*   `Avg. Buffer Gets`：在活动频繁、难以判断单次运行相对性能的繁忙系统上，是同一 SQL 不同运行间良好的比较指标。\n*\
  \   `Avg. Disk Reads`：显示有多少读取操作访问了磁盘。\n*   `Avg. Direct Writes`：指示有多少 I/O 是直接写入。\n\
  *   `Avg. Rows Processed`：在数据相同的情况下，比较时期望此值相同。\n*   `Total Executions`：了解 SQL 在每个系统上运行的次数。\n\
  *   `Total Fetches`：衡量所有执行中返回的数据量。\n*   `Total Version Count`：系统上找到的游标版本数量的计数。\n\
  *   `Total Loads`：SQL 被加载的次数。\n*   `Total Invalidations`：显示 SQL 失效的次数。\n*   `Is\
  \ Bind Sensitive`：在第 7 章中讨论。\n*   `Min Optimizer Environment`：显示最小优化器环境哈希值。\n* \
  \  `Max Optimizer Environment`：显示最大优化器环境哈希值（此值与前一个值对于比较环境值很有用）。\n*   `Optimizer\
  \ Cost`：用于比较总体成本。\n*   `Estimated Cardinality`：用于查看优化器的估计值。\n*   `Estimated Time\
  \ in Seconds`：优化器计算的另一种度量。\n*   `Plan Time Stamp`：显示执行计划的计算时间。\n*   `First Load\
  \ Time`：计划首次加载到内存的时间。\n*   `Last Load Time`：计划最后一次加载到内存的时间。\n*   `Src`：显示信息的来源。\n\
  *   `Source`：显示在此案例中使用的来源是 `GV$SQLAREA_PLAN_HASH`。\n\n我们看到许多不同的部分，但 `SQLTCOMPARE`\
  \ 并不够智能以告诉我们所有情况下什么才是重要的。在此案例中，我们可以确认第二个目标系统的耗时略高于第一个系统。报告中使用的琥珀色表示比较结果差异不大，不足以引发问题，但如果不存在其他更紧迫的问题，可能仍需调查。在百分比方面，“Avg\
  \ User I/O Wait Time in secs”差异非常大（因为其中一个值为 0.000），因此以红色高亮显示。磁盘读取（`disk reads`）也是如此。其他差异（如计划时间戳）不那么重要，但仍以红色显示。请记住，这些只是指导方针，您必须根据您对环境和情况的了解来决定什么差异是重要的。`SQLTCOMPARE`\
  \ 的作用是向您展示差异，以便您快速做出明智的决策。\n\n## 总结\n\n比较两个 SQL 语句 ID 和计划哈希值是一种极其宝贵的方法，可以突出那些单独检查时可能不明显的差异。`SQLTCOMPARE`\
  \ 对于确认用户或开发人员检测到的差异、从而排除其他导致差异的原因也至关重要。不同的环境通常难以比较，因为有太多因素会影响执行计划。`SQLTCOMPARE`\
  \ 收集所有可用信息，并以简单易读的报告并排展示。这再次体现了 `SQLTXPLAIN` 如何让复杂的工作变得快速而简单。在下一章中，我们将探讨如何构建良好的测试用例以及如何利用它们来修改您的执行计划。\n\
  \n# 第 11 章\n\n![image](img/frontdot.jpg)\n\n## 构建良好的测试用例\n\n偶尔会遇到一些性能调优问题，通过检查 `SQLTXTRACT`\
  \ 或 `SQLTXECUTE` 报告无法明显得出解决方案。所有常见的嫌疑因素都已排除，可能需要更彻底的调查。在这种情况下，构建一个测试用例以允许在主要环境之外进行实验是很有用的。如果您正在测试环境中调查有问题的\
  \ SQL，通常您会尝试使该环境与您试图复制的环境保持一致。这通常非常困难，因为有许多影响环境的因素需要复制。以下是其中一些因素：\n\n*   硬件\n* \
  \  软件\n*   CBO 参数\n*   对象统计信息\n*   数据字典统计信息\n*   数据\n*   表聚簇因子\n*   索引\n*   序列\n\
  *   表\n\n还有许多其他因素；有些因素对您的问题可能至关重要，而另一些则可能不是。您可以尝试用传统方式构建测试用例，即导出数据和相关统计信息到测试环境，但这容易出错且是手动过程，除非您已经编写了脚本来完成此操作。幸运的是，`SQLT`\
  \ 只需几个非常简单的步骤就能完成构建测试用例所需的一切。它是平台无关的，因此例如您可以在 Windows 上运行 Solaris 测试用例；它易于使用且自动化。通常无法复制的唯一东西是数据（因为这通常会使测试用例过大）。然而，如果需要，也可以包含数据（我们在本章末尾提供了一个示例）。\n\
  \n![image](img/sq.jpg) **警告** 仅在您可以轻松替换的环境中运行测试用例设置脚本。设置测试环境所涉及的一些脚本会更改操作环境。您需要\
  \ `SYS` 权限才能执行这些操作是有充分理由的。它们会改变系统设置。通常，您会为测试用例创建一个独立的数据库，并在您的环境中仅使用该测试用例。完成测试用例后，您会删除整个数据库。重复使用这样的数据库将是一个危险的操作。任何数量的\
  \ CBO 参数都可能已被更改。**仅在废弃数据库中设置测试用例。特此警告。**\n\n## 您能用测试用例做什么？\n\n在某些情况下，调优可能是一项棘手的工作。在开始调查问题之前，您必须了解执行计划的各个部分在做什么。有时这种理解来自于对\
  \ SQL 及其环境的副本进行调试。您可以添加索引、更改提示、更改优化器参数、删除直方图统计信息——可能性无穷无尽。这类操作并非随机进行，而是基于对当前问题的一些理解（或至少是您当时掌握的尽可能多的理解）。\n\
  \n所有这些调试都无法在生产环境中进行，在开发环境中也常常难以进行，因为风险太高，您案例的某些方面可能会影响他人：例如公共同义词或序列。另一方面，如果您能建立一个包含良好测试用例的小型私有数据库，您就可以更改各种参数而不会直接影响任何人。只要数据库的版本相同，您将获得基本相同的行为。我说“基本”是因为在某些情况下（例如\
  \ Exadata），需要更接近您所复制环境的环境来处理特定问题。例如，混合列压缩（Hybrid columnar compression）无法在非 Exadata\
  \ 环境中完成。自 Oracle 发布以来，DBA 和开发人员一直在为其环境编写脚本来创建测试用例，但随着环境复杂性的增加，设置健壮的良好测试用例所需的时间越来越长。这些手工制作的测试用例很有用，但创建起来过于耗时。`SQLT`\
  \ 通过自动收集所有必需的元数据和统计信息，为您完成了所有艰苦的工作。\n\n## 构建测试用例\n\n\n\n# 创建 SQLT 测试用例\n\n要创建一个测试用例，只需运行一份\
  \ SQLT 报告，无需其他操作。单独运行 `SQLTXTRACT` 就会生成创建测试用例所需的全部信息。下面是一个示例目录，展示了主要的 SQLT 压缩包内的文件。\n\
  \n```\n12/11/2012  08:47 PM             6,705 sqlt_s11992_driver.zip\n12/11/2012\
