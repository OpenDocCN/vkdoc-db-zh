  \n## 解码记录与关键字\n\n10046 跟踪的主要部分由记录关键字（位于行首）和记录内的关键字（详细关键字）组成，它们提供了有关正在发生的事情的详细信息。表\
  \ 13-1 提供了记录关键字的解码。\n\n### 表 13-1. 10046 记录关键字\n\n| 记录关键字 | 描述 |\n| --- | --- |\n\
  | `APPNAME` | 应用程序名称设置 |\n| `PARSING IN CURSOR #n` | 当前正在解析的光标编号 |\n| `PARSE ERROR`\
  \ | 如果存在解析错误则出现 |\n| `ERROR` | 如果存在错误则出现 |\n| `END OF STMT` | SQL 语句结束已标记 |\n| `PARSE\
  \ #n` | 正在被解析的光标编号 |\n| `BINDS #n` | 如果选择了绑定信息，则显示绑定信息 |\n| `EXEC #n` | 正在被执行的光标编号\
  \ |\n| `FETCH #n` | 正在获取行的光标编号 |\n| `RPC` | 远程过程调用 |\n| `SORT UNMAP` | 关闭操作系统临时文件\
  \ |\n| `STAT #n` | 光标编号的状态信息 |\n| `UNMAP` | 临时段关闭 |\n| `CLOSE #n` | 关闭光标，我们已完成此语句\
  \ |\n| `WAIT #n` | 等待事件 |\n| `XCTEND` | 事务结束 |\n\n详细关键字出现在记录本身中，并位于记录关键字之后。下表涵盖了所使用的大多数关键字；但是，可能存在其他关键字。\n\
  \n| 详细关键字 | 描述 |\n| --- | --- |\n| `act` | 动作 |\n| `ad` | SQL 的地址 |\n| `c` | 使用的\
  \ CPU 秒数 |\n| `card` | 估计的基数 |\n| `cnt` | 行数 |\n| `cost` | 优化器成本 |\n| `cr` | 一致性读取次数\
  \ |\n| `cu` | 当前模式一致性读取 |\n| `dep` | 光标的深度。0 代表顶级语句。`dep=1` 和 `2` 表示涉及触发器，`dep=3`\
  \ 表示从触发器调用的触发器。 |\n| `dty` | 数据类型 |\n| `e` | 以微秒为单位的已用时间 |\n| `err` | 标准错误代码 |\n\
  | `flg` | 指示绑定状态的标志 |\n| `hv` | 哈希值 |\n| `len` | 表示 SQL 语句的字符串的字符计数 |\n| `lid` |\
  \ 特权用户 ID |\n| `mis` | 共享池未命中次数 |\n| `mod` | 模块名称 |\n| `mx1` | 绑定变量的最大长度 |\n| `oct`\
  \ | Oracle 命令类型（`2`=插入，`3`=选择，`6`=更新，`7`=删除，`26`=锁定表，`35`=修改数据库，`42`=修改会话，`44`=提交，`47`=匿名块，`45`=回滚）\
  \ |\n| `nam` | 等待的名称 |\n| `oacflg` | 绑定选项 |\n| `obj` | 对象 ID |\n| `og` | 优化器目标。`1`=`ALL_ROWS`,\
  \ `2`=`FIRST_ROWS`, `3`=`RULE`, `4`=`CHOOSE` |\n| `op` | 正在执行的操作。例如 `PARTITION RANGE\
  \ ALL`, `SORT AGGREGATE` 等。 |\n| `p` | 从磁盘读取的物理块 |\n| `p1`, `p2`, `p3` | 给定等待的参数\
  \ |\n| `pr` | 物理读取 |\n| `pre` | 精度 |\n| `pid` | 行源的父 ID |\n| `pw` | 物理写入 |\n| `r`\
  \ | 返回的行数 |\n| `rd_only` | 提交时数据库中未更改数据 |\n| `rlbk` | 回滚。`0`=`Commit`，`1`=`Rollback`\
  \ |\n| `size` | 估计大小（以字节为单位） |\n| `sqlid` | 单引号内的 SQL ID |\n| `tim` | 时间戳。以百万分之一秒为单位测量。\
  \ |\n| `time` | 以微秒为单位的已用时间 |\n| `uid` | 执行解析的模式的用户 ID |\n| `value` | 绑定变量的值 |\n\
  \n因此，例如，给定原始 10046 跟踪文件中的这一行：\n\n```\nPARSE #2:c=0,e=88,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1123225294,tim=843704111495\n\
  ```\n\n我们可以将其翻译为：\n\n“我们正在解析光标编号 2，它直接从应用程序发出，已用时间为 88 微秒，未进行任何物理读取，也未进行任何一致性读取或当前模式读取。光标未进行硬解析，未返回任何行，光标深度为顶级，优化器目标为\
  \ `ALL_ROWS`，计划哈希值为 `1123225294`，时间戳为 `843704111495`。”\n\n如您所见，这些密集的跟踪信息包含大量信息。许多工具已经围绕解释和管理这些信息而发展起来。但为什么我们需要这个跟踪文件呢？\n\
  \n## 如何收集 10046 跟踪\n\n收集 10046 有不同的方法和不同的级别。如果您有直接执行 SQL 语句的权限，那么您可以使用以下命令收集 SQL\
  \ 跟踪：\n\n```\nSQL> alter session set sql_trace=true\n```\n\n要关闭此功能：\n\n```\nSQL>\
  \ alter session set sql_trace=false\n```\n\n或者，如果您想调整跟踪级别（下面讨论）：\n\n```\nSQL> alter\
  \ session set events '10046 trace name context forever, level n'\n```\n\n要关闭此功能：\n\
  \n```\nSQL> alter session set events '10046 trace name context off'\n```\n\n您也可以使用\
  \ `oradebug` 命令为另一个会话（PID 为 `n`）启用跟踪。\n\n```\nSQL> oradebug setorapid n\nSQL> oradebug\
  \ event 10046 trace name contect forever, level m;\n```\n\n这将为 PID `n` 发布级别为 `m`\
  \ 的 10046 跟踪。\n\n您甚至可以使用登录触发器（即会话登录到数据库时触发的触发器）来跟踪会话。在用户会话开始之前，会执行一些命令来为该会话启用跟踪。“触发”代码通常以类似以下内容开始：\n\
  \n```\nCreate or replace trigger Start_10046_trace after logon on database\n  begin\n\
  \  execute immediate 'alter session set timed_statistics=true';\n  execute immediate\
  \ 'alter session set events \"10046 trace name context forever, level 4\" '\nend;\n\
  ```\n\n\n\n上述触发器将追踪每一个登录数据库的会话。您可能希望通过检查用户或其他用户上下文来限制收集的追踪信息量，从而控制追踪文件的大小。您还可能希望为每个追踪文件进行标识，并将文件大小设置为无限制。在这些情况下，您应该在\
  \ `10046` 追踪命令之前添加如下代码：\n\n```\nexecute immediate 'alter session set max_dump_file_size=unlimited';\n\
  ```\n\n和/或\n\n```\nexecute immediate 'alter session set tracefile_identifier=\"\
  My_trace\"';\n```\n\n## 不同级别的追踪\n\n不同类型的调查会收集不同的信息。以下是截至 11g 版本的各级别及其作用。默认级别收集的信息最少，从而保护您免受追踪文件过大的困扰。使用选项\
  \ `4` 时，您还会收集关于绑定变量的信息。\n\n*   `01` – 默认\n*   `04` – 标准 + 绑定\n    *   在此解析级别，我们会看到一个\
  \ `BINDS` 部分\n\n    ```\n        BINDS #1:\n         Bind#0\n          oacdty=02\
  \ mxl=22(22) mxlc=00 mal=00 scl=00 pre=00\n          oacflg=03 fl2=1000000 frm=00\
  \ csi=00 siz=24 off=0\n          kxsbbbfp=0e90cbb8  bln=22  avl=02  flg=05\n   \
  \       value=100\n        ```\n\n*   `8` – 标准 + 等待\n    *   在此追踪级别，我们会看到等待事件，指示我们在语句执行中时间花费在何处。\n\
  *   `12` – 标准 + 等待和绑定\n    *   在此级别，我们不仅收集绑定信息，还收集等待事件。\n*   `16` – 为每次执行生成 `STAT`\
  \ 行转储\n*   `32` – 从不转储执行统计信息\n*   `64` – 自适应转储 `STAT` 行 (11.2.0.2+)\n\n生成此追踪的一个典型示例如下：\n\
  \n1.  找到 `USER_DUMP_DEST` 的位置\n2.  如果可能，将文件大小设置为 `unlimited`\n3.  将 `statistics_level`\
  \ 设置为 `all`\n4.  根据上述值选择追踪级别\n\n以下是一组示例步骤，首先为追踪文件名设置标识符，这将使您能轻松找到追踪文件。\n\n1.  设置标识符：\n\
  \n    ```\n        SQL> alter session set tracefile_identifier='10046_STELIOS';\n\
  \        会话已更改。\n        ```\n\n2.  现在我想确保如果追踪文件太长也不会丢失信息，因此我将其大小设置为 `unlimited`。\n\
  \n    ```\n        SQL> alter session set max_dump_file_size=unlimited;\n      \
  \  会话已更改。\n        ```\n\n3.  将 `statistics_level` 参数设置为 `all` 以收集尽可能多的信息。\n\n \
  \   ```\n        SQL> alter session set statistics_level=all;\n        会话已更改。\n\
  \        ```\n\n4.  现在设置 `10046` 追踪事件以 `级别 12`（包括绑定和等待）收集追踪信息。\n\n    ```\n    \
  \    SQL> alter session set events '10046 trace name context forever, level 12';\n\
  \        会话已更改。\n        ```\n\n5.  现在执行我的 SQL\n\n    ```\n        SQL> @q3\n\n\
  \    COUNTRY_NAME                             SUM(AMOUNT_SOLD)\n        ----------------------------------------\
  \ ----------------\n        Poland                                            8447.14\n\
  \        Denmark                                        1977764.79\n        Spain\
  \                                          2090863.44\n        France          \
  \                               3776270.13\n        Italy                      \
  \                    4854505.28\n        United Kingdom                        \
  \         6393762.94\n        Germany                                        9210129.22\n\
  \n    已选择 7 行。\n        ```\n\n6.  然后关闭追踪\n\n    ```\n        SQL> alter session\
  \ set events '10046 trace name context off';\n        ```\n\n这是运行的 SQL：\n\n```\n\
  select\n  country_name, sum(AMOUNT_SOLD)\nfrom sh.sales s, sh.customers c, sh.countries\
  \ co\nwhere\n  s.cust_id=c.cust_id\n  and co.country_id=c.country_id\n  and country_name\
  \ in (\n    'Ireland','Denmark','Poland','United Kingdom',\n     'Germany','France','Spain','The\
  \ Netherlands','Italy')\n  group by country_name order by sum(AMOUNT_SOLD);\n```\n\
  \n![image](img/sq.jpg) **注意** 如果您想跟随这些示例操作，收集您自己的追踪文件并亲自查看，您可以轻松地使用这些示例中的所有代码来完成。所有使用的数据和示例都依赖于每个数据库安装时附带的标准示例方案。如果您没有\
  \ `SH` 和 `HR` 方案，您可以在安装时选择安装示例方案，或之后按照此处 `http://docs.oracle.com/cd/E14072_01/server.112/e10831/installation.htm#sthref33`\
  \ 的说明手动添加它们。\n\n7.  最后我想找到该文件，因此我查看 `user_dump_dest` 的值\n\n    ```\n        SQL>\
  \ show parameter user_dump_dest\n\n    NAME                                 TYPE\
  \        VALUE\n        ------------------------------------ ----------- ------------------------------\n\
  \        user_dump_dest                       string      f:\\app\\stelios\\diag\\\
  rdbms\\snc1\n                                                         \\snc1\\trace\n\
  \        ```\n\n如果您想查看原始的 `10046` 追踪文件，这一切都很好，但如果您想更快地解释发生了什么该怎么办呢？首先，我们将看看处理 `10046`\
  \ 追踪的最古老工具之一，`TKPROF`，它至今仍被用于获取正在发生事件的概览。`TKPROF` 不是 `SQLT` 的一部分；但由于它很常用，我们将简要提及。\n\
  \n## TKPROF\n\n毫无疑问，有些人可以阅读原始的 `10046` 追踪文件（一旦您收集了短代码的翻译，这并不难），但这是一个相当低效的方法。这就像列出一个足球中每个原子的位置、速度和方向，而实际上您可以聚合信息，仅用几个参数来描述球的轨迹。`TKPROF`\
  \ 聚合信息并呈现高层次概览的摘要。`TKPROF` 不是 `SQLT` 的一部分，并且自 Oracle 早期版本就已存在。\n\n`TKPROF` 最好通过一个例子来解释：我们将以上述方式生成的追踪文件为例，生成\
  \ `TKPROF` 输出。要使用 `TKPROF`，只需运行 `TKPROF` 命令并输入追踪文件。\n\n```\n>tkprof trca_e68572_10046.trc\
  \ output = trca_e68572_10046.txt\nTKPROF: Release 11.2.0.1.0 - Development on Wed\
  \ Dec 26 11:08:49 2012\nCopyright (c) 1982, 2009, Oracle and/or its affiliates.\
  \  All rights reserved.\n```\n\n如果我们查看 `TKPROF` 输出文件并找到我们的 SQL，我们会看到这类信息：\n\n```\n\
