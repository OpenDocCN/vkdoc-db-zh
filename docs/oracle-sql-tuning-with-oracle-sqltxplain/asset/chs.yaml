  \ (`PHV`)\n\n现在我们同时拥有了 SQLT ID 和 `PHV`。在 SQLT 安装目录下的 `utl` 目录中，我们现在可以运行生成配置文件的脚本，如下例所示。但在生产系统上执行此操作之前，应咨询\
