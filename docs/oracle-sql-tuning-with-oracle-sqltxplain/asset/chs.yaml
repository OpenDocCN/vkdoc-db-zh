  \n图 1-7 .  选择性在 “Equality Predicate Selectivity” 列中\n\n选择性是 0.000209，基数是 1。\n\n\
  这可以解释为：“我期望这个等式谓词返回 1 行，这相当于 0.000209 的机会（1 表示肯定，0 表示不可能），或者用百分比表示，如果我得到匹配的行，我将获得整个表的\
  \ 0.0209%。”\n\n注意，随着基数的增加，选择性也会增加。选择性只在 0 到 1 之间变化（或者如果你喜欢，0% 到 100%），而基数 *应该* 只在\
  \ 0 到表中的总行数（不包括空值）之间变化。我说 *应该* 是因为这些值是基于统计信息的。如果你对一个分区（假设它有 1000 万行）收集了统计信息，然后你截断了该分区，但没有告诉优化器（即，你没有收集新的统计信息，也没有清除旧的统计信息），会发生什么？如果你要求\
  \ CBO 在这种情况下生成执行计划，它可能期望从该分区的谓词中获得 1000 万行。它可能“认为”全表扫描是一个好计划。它可能会因为信息不佳而尝试做错误的事情。\n\
  \n总结一下，基数是期望的行数，而选择性是同样的东西，只是在 0 到 1 的范围内。那么，为什么这一切对 CBO 和制定好的执行计划如此重要呢？简短的回答是，CBO\
  \ 正在努力为你制定最快、最简单的方式来获取结果。如果 CBO 对执行计划中各步骤将返回的行数有所了解，那么它就可以尝试执行计划的不同变体，并选择工作量最小、结果最快的方案。这就引出了“成本（cost）”的概念，我们将在下一节中介绍。\n\
  \n## 什么是成本？\n\n\n"
- '# Oracle SQL 执行计划与成本分析


  ## 系统指标与成本计算


  我们获得了对象的基数后，就可以利用系统中的其他信息来计算任何操作的成本。系统中的其他信息包括：


  *   磁盘速度

  *   CPU 速度

  *   CPU 数量

  *   数据库块大小


  这些指标可以轻松从系统中提取，也显示在 SQLT 报告中（在“`Environment`”部分）。现在可以计算系统为任何特定步骤使用的 I/O 和 CPU 资源量，从而推导出一个确定的成本。这是所有调优的关键概念。优化器总是在尝试降低操作的成本。我不打算详细介绍这些成本是如何计算的，因为确切的数值并不重要。你只需要知道这一点：**数值越高越糟糕**，而糟糕可能源于更高的基数（可能基于过时的统计信息），并且如果你的磁盘
  I/O 速度设置错误（可能过于乐观地偏低），那么即使在有索引可用的情况下，全表扫描也可能更受青睐。成本也可以直接转换为（空闲系统上的）耗时，但这可能并不是大多数情况下你最需要的信息，因为你几乎总是试图减少执行时间，即降低成本。正如我们将在下一节看到的，你可以从
  SQLT 获取该信息。在某些情况下，SQLT 还会生成一个 10053 跟踪文件，因此你可以查看成本计算的具体细节。


  ## 执行计划的阅读方法


  我们之前已经见过执行计划部分。它看起来很有趣，左侧参差不齐，还有很多超链接。这一切意味着什么？这是一个相当简单的执行计划，因为它不像 SIEBEL 或 PeopleSoft
  的执行计划那样长达数页。


  阅读执行计划有一些简单的步骤。我相信阅读执行计划的方法不止一种，但这是我处理问题的方式。请记住，在这些例子中，如果你熟悉正在检查的 SQL 片段，你可能会直接跳到你认为有问题的部分；但一般来说，如果你是第一次看到执行计划，你会从查看几个关键成本开始。


  第一个也是最重要的成本是整个查询的总成本。这总是显示为“ID 0”，并且总是执行计划的第一行。在我们的例子（如图 1-5 所示）中，成本是 256。因此，要获取整个查询的成本，只需看第一行。这也是最后执行的步骤（“`Exec
  Ord`”是 18）。执行顺序不是从上到下，Oracle 引擎将按照“`Exec Ord`”列所示的值顺序执行步骤。所以，如果我们跟踪执行过程，Oracle 引擎将按以下顺序执行：


  1.  `INDEX FULL SCAN I_USER2`

  2.  `INDEX FULL SCAN I_USER2`

  3.  `TABLE ACCESS FULL OBJ$`

  4.  `HASH JOIN`

  5.  `HASH JOIN`

  6.  `INDEX UNIQUE SCAN I_IND1`

  7.  `TABLE ACCESS BY INDEX ROWID IND$`

  8.  `INDEX FULL SCAN I_USERS2`

  9.  `INDEX RANGE SCAN I_OBJ4`

  10. `NESTED LOOP`

  11. `FILTER`

  12. `INDEX FULL SCAN I_LINK1`

  13. `INDEX RANGE SCAN I_USERS2`

  14. `NESTED LOOPS`

  15. `UNION-ALL`

  16. `VIEW DBA_OBJECTS`

  17. `SORT AGGREGATE`

  18. `SELECT STATEMENT`


  然而，没有人会这样表示 SQL 语句的计划。重要的是要认识到，左侧的参差不齐提供了步骤如何执行的信息。缩进较少的操作表示在内部（缩进更多的）操作上执行的外部操作。例如，步骤
  2、3 和 4 可以理解为：“使用`I_USERS2`执行索引全扫描，然后对`OBJ$`执行全表扫描，并将这些结果进行`HASH JOIN`以产生一个结果集。”每个操作为缩进较少的部分产生结果，直到最终结果呈现给`SELECT
  (ID = 0)`。


  “`Operation`”列也标有“+”和“–”以指示缩进相等的部分。这对于对齐操作以查看一个操作正在处理哪些结果集很有帮助。例如，重要的是要认识到步骤 5 的`HASH
  JOIN`正在使用来自步骤 1、4、2 和 3 的结果。我们稍后会看到更复杂的例子。同样重要的是要认识到，所示的成本也是每个操作的聚合成本。所以第一行显示的成本是整个操作的成本，我们还可以看到整个操作的大部分成本来自步骤
  3。（SQLT 会以红色显示成本最高的操作）。现在让我们更详细地看看步骤 1（如图 1-5 所示）。在我们的简单例子中，这是：


  ```

  INDEX FULL SCAN I_USER2

  ```


  让我们将整行翻译成英文：“首先为我执行索引`I_USERS2`的全扫描。我估计将返回 93 行，根据你当前的系统统计信息（单块读取时间和多块读取时间以及 CPU
  速度），成本将为 1。”


  第二和第三步是另一个`INDEX FULL SCAN`和对`OBJ$`的`TABLE ACCESS FULL`。这第三步的成本是 251。整个 SQL 语句的总成本是
  256（首行）。因此，如果我们希望优化这个语句，我们知道收益必须来自这第三步（总成本 256 中它占了 251 的成本）。现在，将你的光标悬停在步骤 3 的“TABLE”一词上（参见图
  1-8）。


