  \n### 执行历史变更\n\n在调查性能问题时，了解 SQL 性能何时发生变化至关重要。像“昨天还好好的”这样的模糊报告不够精确，尽管它们可能通过将你的分析引导到\
  \ SQLT 报告中的特定时间段来提供帮助。优化器环境的每一次更改（参数更改）都有时间戳。每次执行更改时，都会创建一个新的执行计划，该计划也有时间戳。每次执行\
  \ SQL 语句时，其度量指标都会被收集并存储在 AWR 存储库中。这与 Oracle 中自动建议 SQL 改进功能使用的数据源相同。SQLT 利用这些数据源来构建你所选\
  \ SQL ID 的执行历史。这座信息宝库只需在 SQLT HTML 报告顶部点击一下即可访问。点击“Plans”标题下的“Performance History”链接。根据你的\
  \ SQL 在系统中执行的次数，你可能会看到类似图 2-9 中的截图。完整的 HTML 报告中还有其他列，但我们现在将讨论限制在“Opt Env Hash Value”上。\n\
  \n![9781430248095_Fig02-09.jpg](img/9781430248095_Fig02-09.jpg)\n\n图 2-9 .  优化器环境哈希值（Optimizer\
  \ Env Hash Value）在 2 月 22 日从 3945002051 变为 2904154100。这意味着 CBO 环境在那一天有某些方面发生了变化。\n\
  \n查看图 2-9 中该语句历史的“Opt Env Hash Value”。对于我们正在分析的这一条 SQL 语句，根据其“开始时间”和“结束时间”列表，我们看到其他变化正在发生。例如，执行计划哈希值（针对同一条\
  \ SQL 语句）改变了，“Opt Env Hash Value”也改变了。它的值是`2904154100`，直到 2012 年 2 月 17 日。然后它变为`3945002051`，再变回`2904154100`，然后又变回`3945002051`（在\
  \ 2 月 18 日）。优化器环境的某些方面在那些日期发生了变化。这些变化是改善了情况还是使之恶化？请注意，每次优化器哈希值变化时，执行计划的哈希值也随之变化。有某人或某事在改变优化器的环境并影响执行计划。\n\
  \n### 列统计信息\n\n\n"
- "# 观察与直方图问题\n\n其中一个 SQLT 报告示例（我们查看的第一个）在观察部分包含以下行：\n\n| TABLE | SYS.OBJ$ | 表包含 4\
  \ 个在谓词中引用的列，其不同值的数量与桶的数量不匹配。 |\n\n如果我按照主 HTML 报告顶部的链接查看列统计信息（点击“Columns”然后“Column\
  \ Statistics”），可以在图 2-10 中看到结果。\n\n![9781430248095_Fig02-10.jpg](img/9781430248095_Fig02-10.jpg)\n\
  \n图 2-10 .  列统计信息\n\n统计信息的第二行对应`OWNER#`表列。向右看`Num Distinct`值。您会看到它是 30，表示估计的不同值数量。收集统计信息时，可能确实有大约\
  \ 30 个不同的值。但请注意“Histogram”列！它显示了一个包含 25 个桶的`FREQUENCY`类型直方图。在`FREQUENCY`类型直方图中，每个可能的值都有一个用于保存该值数量的桶。例如，如果从\
  \ 1 到 255 的每个值都只有一个值，那么每个桶将包含一个“1”。如果第一个桶（标记为“1”）中有 300，这表示值 1 在数据中出现了 300 次。优化器使用这些保存在桶中的数字来计算检索与该值相关的数据的成本。因此，在上面的例子中，检索“1”会比从同一个表中检索“2”成本更高（因为“1”的值更多）。如果我们有\
  \ 10 个桶（每个桶有其`FREQUENCY`值），然后我们尝试检索某些数据并找到一个“11”，那么优化器必须猜测这个新值从未被收集过，并对值的可能性做出某些假设（例如，对于高于最大值和低于最小值的情况，可能性会急剧下降）。范围中间没有桶的值会被插值。因此，如果您拥有的桶少于\
  \ 255 个，那么在`FREQUENCY`直方图中拥有少于实际桶数是没有充分理由的。这没有任何意义。这种异常的结果是，为`OWNER#`列保存的直方图信息将缺少五个不同的值。如果这些不同的值很常见，并且您正在故障排除的查询恰好在谓词中使用了它们，优化器将不得不猜测它们的基数。\n\
  \n想象一下，例如以下情况：\n\n1.  想象一个包含“STELIOS”和“STEVEN”两个桶的直方图。现在我们添加第三个桶“STEPHAN”，他恰好是`OBJ$`中对象的所有者。\n\
  2.  假设`STELIOS`和`STEVEN`的直方图值如下：\n    *   `STELIOS` – 100 个对象\n    *   `STEVEN`\
  \ – 110 个对象\n    *   这意味着对于这个特定表，`STELIOS`拥有 100 条对象记录，`STEVEN`拥有 110 条对象记录。因此，当创建直方图时，`STELIOS`和`STEVEN`的桶分别填充了\
  \ 100 和 110。\n3.  进一步假设`STEPHAN`实际拥有 500 个对象，因此他在表中有 500 条记录。优化器并不知道这一点，因为`STEPHAN`是在收集统计信息之后的某个时间创建的。\n\
  \n优化器现在猜测`STEPHAN`的基数为 105，而实际上`STEPHAN`有 500 个对象。因为`STEPHAN`按字母顺序介于`STELIOS`和`STEVEN`之间，优化器假定`STEPHAN`的`Num\
  \ Distinct`值介于其他两个用户的值之间（105 是相邻两个桶的平均值）。结果是 CBO 对基数的猜测将偏离很远。我们会在执行计划中看到这一点（例如，如果我们运行`SQLT\
  \ XECUTE`，会是一个低估），然后我们可以深入查看`OWNER#`列，并发现列统计信息是错误的。要解决这个问题，我们会为`SYS.OBJ$`收集统计信息。当然，在这种情况下，由于我们使用的示例是`SYS`对象，收集统计信息有特殊过程，但通常这种问题会发生在用户表上，应使用正常的`DBMS_STATS`收集过程。\n\
  \n## 超出范围值\n\n当 CBO 必须在两个值之间猜测基数时，它所面临的情况已经足够糟糕，但还不如下一种情况：谓词中的值超出范围——要么大于统计信息所见的最大值，要么小于统计信息所见的最小值。在这些情况下，优化器假设超出范围值的估计值逐渐趋近于零。如果该值远高于最高值，优化器可能会估计一个非常低的基数，例如\
  \ 1。基数为 1 可能会促使优化器尝试笛卡尔连接，如果实际基数是 10,000，这将导致非常差的性能。解决此类问题的方法将是相同的。\n\n1.  使用`XECUTE`获取执行计划。\n\
  2.  在“执行计划”部分查看执行计划，并如前所述查看“more”下的谓词。\n3.  查看谓词中列的统计信息，看看是否有问题。麻烦迹象的例子包括：\n   \
  \ *   a. 缺失的桶（如前一节所述）\n    *   b. 没有直方图但数据高度偏斜\n\n当数据在当前数据集的高端或低端插入时，超出范围的值可能特别麻烦。无论如何，通过研究`SQLT`中出现的直方图，您很有机会了解您的数据及其随时间的变化情况。这对于设计调整\
  \ SQL 或收集良好统计信息的策略来说是宝贵的信息。\n\n### 高估与低估\n\n现在让我们看一个 SQL 片段的示例，它有如此多的连接，以至于操作数量达到了\
  \ 96 个。参见图 2-11，它显示了生成的执行计划的一小部分。\n\n![9781430248095_Fig02-11.jpg](img/9781430248095_Fig02-11.jpg)\n\
  \n图 2-11 .  执行计划的一小部分，包含 96 个步骤\n\n我们如何处理有 96 个或更多步骤的执行计划？我们是否需要将该计划交给开发团队并告诉他们去调优？使用`SQLT`，您不需要这样做。\n\
  \n让我们更详细地查看此页面，放大右上角部分并查看屏幕上的高估和低估部分（参见图 2-12）。\n\n![9781430248095_Fig02-12.jpg](img/9781430248095_Fig02-12.jpg)\n\
  \n图 2-12 .  显示执行计划高估和低估部分的右上角区域\n\n\n\n我们知道图 2-12 是一个 `SQLT XECUTE` 报告（我们知道这点是因为报告中包含了过高和过低的估算值）。但这些过高和过低的估算值具体是什么呢？\"\
  最近过高/过低估算\"列中的数字表示，对于该操作，优化器预期的实际行数出错了多少倍。返回的行数也依赖于前一个操作返回的行数。因此，举例来说，如果我们按照\"执行顺序\"\
  （参见图 2-11）逐步跟踪操作计数，我们会得到以下步骤：\n\n1.  `索引范围扫描` 实际返回了 948 行\n2.  `索引范围扫描` 实际返回了 948\
  \ 行\n3.  步骤 1 和步骤 2 的结果被输入到一个 `嵌套循环` 中，该循环实际返回了 948 行\n4.  `索引范围扫描` 实际返回了 948 行\n\
  5.  `嵌套循环`（前一步结果与步骤 3 结果的组合）\n\n依此类推。处理这类问题的最佳方法是阅读执行计划中的步骤，理解它们，查看过高和过低的估算值，并由此确定需要重点关注的环节。\n\
  \n现在来看图 2-13。步骤 ID 34（这是图 2-13 中的第三行，也是执行计划中的第 33 步。记住执行顺序由操作名称左侧紧邻的数字显示，例如 `索引范围扫描`）显示低估了\
  \ 11,984。这个 `嵌套循环` 是其下方部分操作的结果。我们可以点击\"更多\"列中的\"+\"号，深入探究估算值如此的原因。通过\"更多\"列，我们可以查看访问谓词，并了解为何估算的基数与实际返回的行数存在差异。\n\
  \n![9781430248095_Fig02-13.jpg](img/9781430248095_Fig02-13.jpg)\n\n图 2-13. 过高和过低的估算值可以是很好的线索\n\
  \n因此，对于这样的大型语句，我们会处理每个访问谓词、每个过高和过低的估算值，从估算误差最大的开始，逐步到最小的，直到弄清楚每一个的原因。在某些情况下，原因可能是统计信息过时。在其他情况下，可能是数据分布不均。有了\
  \ `SQLT`，查看一个 200 行的执行计划就不再是一件令人畏惧的事情了。如果你能针对优化器关注的每个误差（它预期 10 行却得到了 1000 行）进行处理，你就能一步步地修正执行计划。你不需要用提示（hint）来强行让\
  \ `CBO` 变成你*猜测*可能正确的形状。你只需要确保它拥有良好的系统性能统计信息、单块和多块读取时间统计信息、CPU 速度统计信息和对象统计信息。一旦所有正确的统计信息到位，优化器就会生成一个好的执行计划。如果执行计划有时正确有时错误，那么你可能正在处理数据分布不均的情况，在这种情况下，你需要考虑使用直方图。我们将在第\
  \ 4 章中更详细地专门讨论偏斜度。\n\n## 神秘变更之谜\n\n现在你已经对 `SQLT` 及其使用方法有了一些了解，我们可以看一个事先对问题一无所知的例子。场景如下：\n\
  \n一位开发人员找到你，说他的 SQL 在前一天下午 3 点之前都运行良好。它按照他期望和预期的方式执行哈希连接，所以他去吃了午饭。当他回来时，执行计划完全变了。开始使用各种奇怪的位图索引。他的数据没有改变，他也没有收集任何新的统计信息。发生了什么？他最后说：\"\
  真的，我什么都没改。\"\n\n一旦你确认数据没有变化，并且没有人添加（或删除）任何新索引后，你要求提供一份 `SQLT XECUTE` 报告（因为这个 SQL\
  \ 运行时间相当短，而且这是一个开发系统）。\n\n拿到报告后，你查看执行计划。你碰巧首先看到的是图 2-14 中的那个计划。\n\n\n"
- "# 执行计划分析与调优\n\n![9781430248095_Fig02-14.jpg](img/9781430248095_Fig02-14.jpg)\n\n\
  图 2-14 .  正在研究的执行计划\n\n查看该计划，您可以确认开发者关于“奇怪”的执行计划和奇怪的位图索引的说法。实际上，这个计划本身并无奇怪之处。只是第一步是：\n\
  \n```\n... BITMAP INDEX FULL SCAN PRODUCTS_PROD_STATUS_BIX\n```\n\n这一步不在开发者最初的计划中。因此开发者认为它很奇怪。对于我们正在处理的这一个\
  \ SQL 语句，我们怀疑至少存在 2 个执行计划（一个 SQL 语句可以有数十个执行计划，而 SQLT 会捕获所有这些计划）。\n\n在执行计划列表的下方，我们看到确实有使用哈希连接和全表扫描的计划。请参见图\
  \ 2-15，它显示了开发者正在处理的同一个 SQL 的不同执行计划。在此执行计划中，返回的行与之前的执行计划相同，总成本为 908。\n\n![9781430248095_Fig02-15.jpg](img/9781430248095_Fig02-15.jpg)\n\
  \n图 2-15 .  显示哈希连接的执行计划\n\n到目前为止，我们知道有一个涉及哈希连接和位图索引的计划，而早先有使用全表扫描的计划。如果我们查看统计信息收集的时间，会发现确实是在这些查询执行之前收集的统计信息。这是一件好事，因为统计信息应该在查询执行之前收集！\n\
  \n![image](img/sq.jpg) `注意`  顺便提一下，SQLT 能够快速轻松地呈现所有相关信息是其最大的优势。它让侦探工作不再需要猜测。如果没有\
  \ SQLT，您可能需要费力编写查询来显示统计信息收集的时间。而使用 SQLT，统计信息收集的时间就在报告中。您可以在思考问题的同时进行检查！\n\n因此，统计信息没有改变，SQL\
  \ 文本也没有改变。可能是在午餐期间添加了一个索引。您可以通过查看报告的对象部分来确认，如图 2-16 所示。\n\n![9781430248095_Fig02-16.jpg](img/9781430248095_Fig02-16.jpg)\n\
  \n图 2-16 .  对象信息及创建时间\n\n图 2-16 中的对象部分将确认索引`PRODUCTION_PROD_STATUS_BIX`的创建日期。如您所见，在`BITMAP\
  \ INDEX FULL SCAN`中使用的索引是很久以前创建的。那么我们现在处于什么情况？\n\n让我们回顾一下事实：\n*   没有添加新的索引。\n* \
  \  计划已更改——它使用了更多的索引。\n*   统计信息没有变化。\n\n现在您需要考虑还有什么可以改变执行计划。以下是一些可能性：\n*   系统统计信息。我们检查了这些，它们看起来正常。了解正常情况的样子对此有帮助。\n\
  *   提示（Hints）。我们检查确认。SQL 文本中没有提示。\n*   CBO 参数。我们查看并看到了图 2-17 中的值。\n\n![9781430248095_Fig02-17.jpg](img/9781430248095_Fig02-17.jpg)\n\
  \n图 2-17 .  CBO 环境部分\n\n图 2-17 显示了`statistics_level`，`_parallel_syspls_obey_force`和`optimizer_index_cost_adj`。这是在“非默认\
  \ CBO 参数”部分，所以您知道它们不是正常值。由于`optimizer_index_cost_adj`是一个用于调整优化器为索引计算成本的参数，这可能与我们执行计划的更改有关。然后注意到“观察结果”部分（见图\
  \ 2-18）突出显示存在非标准参数。\n\n![9781430248095_Fig02-18.jpg](img/9781430248095_Fig02-18.jpg)\n\
  \n图 2-18 .  HTML 报告的“观察结果”部分显示了非默认参数观察，在本例中为 1 个非默认参数\n\n如果您查找`optimizer_index_cost_adj`，您会看到其默认值是\
  \ 100，而不是 1。所以现在您有了一个可行的理论：问题可能出在这个参数上。\n\n现在您可以转到用户终端，运行他的查询，将会话的`optimizer_index_cost_adj`值设置为\
