  \ 00:00:01 |\n|   2 | TABLE ACCESS BY INDEX ROWID| EMPLOYEES         |     6 | \
  \  156 |     2   (0)| 00:00:01 |\n|*  3 |  INDEX RANGE SCAN          | EMP_DEPARTMENT_IX\
  \ |     6 |       |     1   (0)| 00:00:01 |\n|*  4 | TABLE ACCESS FULL         \
