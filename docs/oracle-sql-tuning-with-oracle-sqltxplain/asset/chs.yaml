  \ DBA（或者至少希望不是您！）他认为是在会话级别设置该参数，但结果却是系统级别。\n\n## 摘要\n\n\n"
- "# 对象统计信息如何使你的执行计划出错\n\n在本章中，我们学习了基于成本的优化器算法的输入项以及这些输入项如何影响优化器。为了使优化器能够有效且高效地工作，需要以反映你的环境使用情况和业务需求的方式来考虑和设置这些输入项。`SQLTXPLAIN`\
  \ 通过收集信息并以易于理解的方式展示，有助于处理所有环境方面的考量。`SQLTXPLAIN` 还能有帮助地突出显示那些异常元素，以便你能更严格地审视它们，并决定这些元素是否必要且是否符合你的意图。在下一章中，我们将讨论\
  \ `CBO` 环境中最重要的方面之一：对象统计信息。这些统计信息到目前为止收集起来最耗时，并且非常频繁地是性能问题的根源。我们将探讨缺乏统计信息、统计信息收集时机不当以及这项重要维护工作的其他要素所带来的影响。\n\
  \n![图片](img/frontdot.jpg)\n\n在本章中，我们将讨论一个如果你正在进行 `SQL` 调优就被认为非常重要的话题。收集对象统计信息至关重要；这就是为什么\
  \ Oracle 花费了如此多的时间和精力，使统计信息收集过程尽可能简单和轻松。他们知道，在大多数情况下，`DBA` 们在压力下需要在允许的微小维护窗口内尽快完成工作，他们会选择最简单直接的方式。如果有一个复选框写着“点击我，你所有的统计信息烦恼都将结束”，他们会点击它，然后转向下一个问题。\n\
  \n当然，自动程序多年来已经改进，用于自动收集对象（尤其是列）统计信息的最新算法非常复杂。然而，这并不意味着你可以忽视它们。你需要关注正在收集的内容，并确保它适合你的数据结构和查询。在本章中，我们将介绍分区如何影响你的执行计划和统计信息捕获。我们还将探讨如何处理抽样错误、如何锁定统计信息以及何时应该执行此操作。如果这听起来很无聊，那么\
  \ `SQLT` 就介入其中，使整个过程变得更简单、更快速。让我们从对象统计信息开始。\n\n### 什么是统计信息？\n\n当 `SQL` 性能不佳时，质量差的统计信息是最常见的原因。质量差的统计信息涵盖范围广泛的可能缺陷：\n\
  \n*   样本量不足。\n*   样本收集不频繁。\n*   某些对象没有样本。\n*   在不需要时收集直方图。\n*   在需要时未收集直方图。\n* \
  \  在错误的时间收集统计信息。\n*   在直方图上使用非常小的样本量进行收集。\n*   未使用更高级的选项（如扩展统计信息）来设置相关列之间的关联。\n\
  *   依赖自动样本收集而不检查收集的内容。\n\n至关重要的是要认识到，基于成本的优化器 (`CBO`) 的使命是制定一个运行快速的执行计划，并快速制定它。让我们稍微分解一下：\n\
  \n*   “快速制定。” 优化器几乎没有时间进行解析或获取对象的统计信息，或者尝试多种连接方法的变体，更不用说检查 `SQL` 优化并制定它认为良好的计划了。它不能花费很长时间来做这件事，否则，制定计划所花的时间可能比执行工作本身还要长。\n\
  *   “运行快速。” 这里，关键理念是“实际耗时”很重要。`CBO` 并非试图最小化 `I/O` 或 `CPU` 周期，它只是试图减少经过的时间。如果你有多个\
  \ `CPU`，并且 `CBO` 能有效地利用它们，它将选择并行执行计划。\n\n第 1 章 讨论了基数，即满足谓词的行数。这意味着任何操作的成本由三类操作组成：\n\
  \n*   单块读取的成本\n*   多块读取的成本\n*   执行所有操作所用 `CPU` 的成本\n\n当你看到一个成本为 1,000 时，这实际意味着什么？执行计划中一个操作的成本为\
  \ 1,000，意味着所花费的时间大约相当于进行 1,000 次单块读取的成本。所以在这种情况下，1,000 x 12 毫秒，得出 12 秒（12 毫秒是典型的单块读取时间）。\n\
  \n那么，`CBO` 采取哪些步骤来确定最佳执行计划呢？用非常宽泛的术语来说，查询会被转换（应用任何适用的快捷方式），然后通过查看表的大小并决定哪个表在连接中作为内表、哪个作为外表来生成计划。会尝试不同的连接顺序和不同的访问方法。这里的“尝试”是指优化器将经历有限数量的步骤（记住，它的目标是快速制定计划）来计算每个选项的成本，并通过排除过程得到最佳计划。有时优化器尝试的选项并不是完整的计划列表，这意味着它可能错过最佳计划；但这极为罕见。\n\
  \n这是操作的估算阶段。如果正在评估的操作是全表扫描，这将基于行数、行的平均长度、磁盘子系统的速度等进行估算。\n\n现在我们知道了优化器在尝试为你获取正确计划时做了什么，我们可以看看当对象统计信息具有误导性时可能会出什么问题。\n\
  \n### 对象统计信息\n\n构成对象统计信息的主要组件是表和索引。为简化讨论，我们将主要关注表统计信息，但相同的原则适用于所有对象。在上面提到的硬解析的估算阶段，即估算表的大小和选择连接方式的阶段，表中的行数至关重要。一个简单的例子是在嵌套循环连接和哈希连接之间做出选择。如果行数错误，那么连接方法可能就是错误的。统计信息可能出错的其他方式是过时。让我们看图\
  \ 3-1 中的示例。在此示例中，我们看到 `TABLE_A`（一个非分区表）的“表统计信息”，其 `行数` 值为 87,116，分析比例为 100%。\n\n\
  ![9781430248095_Fig03-01.jpg](img/9781430248095_Fig03-01.jpg)\n\n图 3-1 。在“表统计信息”部分，你可以看到表中的行数、样本大小以及此样本代表的数据集总百分比\n\
  \n对象统计信息是 `CBO` 的重要输入，但即使这些信息在统计信息过时的情况下也可能误导优化器。`CBO` 还会使用过去的执行历史记录来确定是否需要更好的抽样（基数反馈），或者利用绑定变量窥探来确定使用众多潜在执行计划中的哪一个。许多人依赖将所有设置为\
  \ `AUTO`，但这并非万能药。如果你不了解并监控自动设置为你做了什么，当错误发生时你可能无法察觉。\n\n为了澄清，用最简单的话说，为什么当统计信息过时优化器会出错？毕竟，一旦你收集了关于表的所有这些统计信息，为什么还要再次收集呢？让我们做一个思想实验，就像坐在维也纳电车上的爱因斯坦那样。\n\
  \n\n\n假设你被告知某个分区中只有很少的几行（`<1,000` 行）。你很可能会进行全表扫描而不使用索引，但如果你的统计信息已过时，并且在上次运行统计信息之后加载了大量数据（比如\
  \ 250 万行），并且所有这些数据都匹配你的谓词条件，那么你的执行计划就会是**次优的**。这是调优术语中对“性能回退”的说法，而“性能回退”在调优术语中也就是“对你的经理来说太慢了”。这突显了在正确时间收集统计信息的重要性；是在数据加载**之后**，而不是之前。\n\
  \n到目前为止，我们已经提到了表统计信息，以及这些统计信息需要具备正确的质量和及时性。多年来，随着数据集变得越来越大，表也变得越来越大。一些单独的表变得非常大（达到\
  \ TB 级别）。这使得处理这些表变得更加困难，纯粹是因为对这些表的操作耗时更长。Oracle 公司很早就看到了这一趋势，并引入了表分区。这些迷你表将大表按不同的键拆分成更小的部分。一个常见的键是日期。因此，一个表的一个分区可能覆盖\
  \ 2012 年。这限制了这些分区的大小，并允许对各个分区单独执行操作。这是一项伟大的创新（需要相应的许可费用），它简化了 DBA 的许多日常工作，并为 SQL\
  \ 优化提供了极佳的优化器机会。例如，如果一个分区是按日期分区的，并且你在谓词中使用了日期，那么你可能能够使用**分区修剪**，即只查看匹配的分区。拥有此特性，一方面为响应时间的改善带来了巨大机会，另一方面也加大了你犯错的可能性。就像表一样，分区也需要为其收集良好的统计信息才能有效工作。\n\
  \n### 分区\n\n分区是处理大型数据集的好方法，特别是那些不断增长的数据集。使用范围分区，或者更好的是，使用间隔分区。这些工具允许将“旧”数据和“新”数据分开并区别对待，例如归档旧数据或对其进行压缩。无论出于何种原因，许多机构都使用分区来组织其数据。特别是基于日期的分区，在分区刚创建后，通常会创建一个包含零行或极少数行的新分区（有关这种情况的示例，请参见\
  \ 图 3-2）。新的分区 `MAIN_TABE_201202` 有零行（它刚刚被创建），但其他分区有数百万行。\n\n![9781430248095_Fig03-02.jpg](img/9781430248095_Fig03-02.jpg)\n\
  \n图 3-2 . 一个新创建的分区将具有与旧分区不同的特征。在本例中，`MAIN_TABLE_201202` 中的行数为零\n\n对于刚刚完成的分区，任何新添加的数据都不会导致实际数据与统计信息之间发生巨大变化，但对于新创建的分区，优化器目前认为该分区有零行。如果就在收集统计信息几小时后，现在有\
  \ 10,000 行数据，这将如何影响执行计划？这种分区的“初始化”可能对执行计划产生巨大影响，那种影响会随着时间推移而出现和消失。例如，在月初表现很差，然后逐渐变好。\n\
  \n这类情况需要仔细把握统计信息收集的时机和良好的采样比例。在新分区创建后的一段时间内，可能有些时期需要采用更高的分区采样收集百分比，以便收集该时间段内任何异常偏斜的数据。意识到正在发生（或可能发生）什么，就已经成功了一半。如果数据加载后不久进行更多的统计信息收集不是一种可行的选择，那么你可能不得不求助于\
  \ SQL 概要文件，甚至提示。\n\n### 过时的统计信息\n\n从 SQLT 的角度来看，如果表中超过 10% 的数据发生了变化，那么该统计信息会在“过时统计信息”列中被标记为“YES”。在下面的示例中（图\
  \ 3-3），你可以看到一个具有过时统计信息的索引。\n\n![9781430248095_Fig03-03.jpg](img/9781430248095_Fig03-03.jpg)\n\
  \n图 3-3 . 在此示例中显示了一个索引行，其“过时统计信息”列为“YES”，表示该索引的统计信息已过时\n\n你应该如何处理这些信息？这取决于具体情况。有时过时的统计信息不是问题；即使表的变化超过了\
  \ 10%，数据在统计意义上可能仍然相同。10% 是一个相当随意的数字，在某些情况下，你可能会觉得它太低或太高。如果是这样，你总是可以更改它：\n\n`SQL>\
  \ exec dbms_stats.set_table_prefs(null,'USER2','STALE_PERCENT',5)`\n\n话虽如此，如果你在特定表或索引的“过时统计信息”列中看到“YES”，你应该怎么做？简单的答案（再次）是“视情况而定”。这就像一个谋杀悬疑故事。如果你已经怀疑是管家干的，然后你看到他口袋里有一把枪，那可能就是一个很好的线索。\n\
  \n这里的关键点是，该列将是一个线索，表明某些地方出了问题，并且可能在你当前的调查中具有重要意义。例如，假设你有一个表，每天创建并加载一个间隔分区。除非你在新分区加载数据后每天都运行统计信息收集，否则它的统计信息将被标记为“过时”。关键是要认识到，统计信息收集是\
  \ Oracle 提供的一个工具，你可以以多种不同的方式使用它。这种控制必须基于你对架构、数据模型以及你预期在数据库上运行的查询的了解。\n\n### 采样大小\n\
  \n这是统计信息收集最受热议的要点之一。许多站点依赖于 `DBMS_STATS.AUTO_SAMPLE_SIZE`，对于某些情况（如果不是大多数情况）来说，这是一个不错的选择，但它并不完美。它只是一个良好的起点。如果你的查询没有问题，并且统计信息收集在合理的时间内运行，那就保持默认设置，去做些更有用的事情吧。\n\
  \n如果你努力收集所需的统计信息级别以使你的在线日常高效运行，你可能需要仔细查看你正在收集的统计信息。如果 100% 采样不可行，那么计算一下你实际有多少时间，并尝试达到那个百分比。审视你收集的内容，看看是否全部需要。如果你在收集模式统计信息，那么问问自己：模式中的所有表都在使用吗？你是否在没有偏斜度的列上收集统计信息？在这种情况下，你是在浪费资源收集那些对优化器无关紧要的信息。理所当然地，更改统计信息收集采样大小应谨慎进行，逐步调整，并留出足够的时间来评估效果。这正是测试系统的用途。\n\
  \n你可以通过从 SQLT 报告中单击 `DBMS_STATS` 设置超链接，查看你在系统上设置的内容（图 3-4）。\n\n![9781430248095_Fig03-04.jpg](img/9781430248095_Fig03-04.jpg)\n\
  \n图 3-4 . 检查你的 `DBMS_STATS` 首选项设置总是好的。在此示例中，所有设置均为默认值\n\n在这里你可以看到 `DBMS_STATS` 的首选项。所有设置都是\
  \ `AUTO`。采样大小是 `DBMS_STATS.AUTO_SAMPLE_SIZE`；级联设置是 `DBMS_STATS.AUTO_CASCADE`；方法选项设置为\
  \ `FOR ALL COLUMNS SIZE AUTO`。\n\n\n\n这些设置中的任何一项会导致问题吗？一般来说不会。然而，有时样本大小可能会非常小。这是算法设计者有意为之，旨在减少收集这些列统计信息所花费的时间。如果太多样本相似，算法就会判定没有必要进一步查找，并结束对该列的信息收集。如果我们从`SQLT`报告的顶部点击`columns`，就能看到报告的`Table\
  \ Columns`（表列）区域。在这里，我们可以看到列统计信息。特别值得关注的是样本大小及其所代表的百分比（大约在报告的中部位置）。有关该区域的示例，请参见图\
  \ 3-5（我只显示了报告的第 8 至 12 列）。请注意，有些样本大小非常小。\n\n![9781430248095_Fig03-05.jpg](img/9781430248095_Fig03-05.jpg)\n\
  \n图 3-5。在这个`列统计信息`示例中（通过点击报告顶部的`Columns`超链接找到），自动采样大小收集到的样本非常小，仅为 0.3%。\n\n那么，我们是如何得到如此小的样本大小的呢？想象一下整理你的袜子。你是个十足的袜子爱好者，有十个装满袜子的抽屉。你想知道自己有多少种袜子。你查看第一个抽屉，随机拿出一双袜子。黑色的。第二双也是黑色，第三双还是。你会继续拿下去吗？还是你现在就假设所有的袜子都是黑色的？你看到问题所在了。算法试图高效工作，会进行随机抽样，但如果运气不好，它可能拿到太多相似的样本并就此放弃。想象一下，如果有数百万双袜子，除了一双（金底银条纹）外全是黑色。在你的随机样本中很可能找不到那双特殊的袜子。但再进一步假设，你特别喜欢那双金银条纹袜，每天都想穿。在这种情况下，你会始终对袜子抽屉进行全表扫描（因为你认为大多数袜子是黑色，并且你认为所有要找的彩色袜子分布情况都一样）。这听起来有违直觉，但你需要明白，优化器对列中数据的实际分布一无所知，它只有一个样本（而且是非常小的样本）。然后，它将针对那个抽屉总结出的规则应用于所有的袜子查找。事实上，你的袜子颜色分布是高度偏斜的，而那一双稀有的袜子恰恰是你一直想要查询的。数据的情况完全相同。随机样本可能无法捕捉到稀有的偏斜值，而如果这些值在查询中很常见，你可能就需要调整列的样本大小了。\n\
  \n### 如何收集统计信息\n\n`SQLT`可以帮助你制定在创建统计信息收集计划时可以采用的方法论。对于具有真实工作负载的预生产环境，你会明智地对关键的`SQL`语句（即那些性能不佳的）运行`SQLT`报告，并查看整体性能。不要仅依赖整体运行时来判断你的工作负载是否没问题。选择由`AWR`或`SQL\
  \ Tuning Advisor`识别出的顶级`SQL`语句。你甚至可以从`Enterprise Manager`（企业管理器）中挑选它们（见图 3-6）。\n\
  \n![9781430248095_Fig03-06.jpg](img/9781430248095_Fig03-06.jpg)\n\n图 3-6。你甚至可以从`OEM`中选择要研究的顶级`SQL`。\n\
  \n然后运行一个`SQLT XTRACT`报告，并查看这些`SQL`的统计信息。记住，你挑选的是系统上的资源消耗大户，因此你需要调整这些`SQL`的统计信息收集方式，以在可能的情况下改善其性能，同时避免对其他查询产生不利影响。如果你看到小的样本大小，`且它们正在对性能产生不利影响`，那么你就找到了一个需要修改统计信息收集的候选对象。\n\
  \n在 11g 中，你可以在许多不同粒度级别上设置统计信息收集的首选项；在数据库级别（`dbms_stats.set_database_prefs`）、模式级别（`dbms_stats.set_schema_prefs`）或表级别（`dbms_stats.set_table_prefs`）。不要仅仅因为性能差就盲目地增加百分比。查看性能不佳的`SQL`，并调整那些`SQL`语句的统计信息收集。将所有统计信息收集比例都调到\
  \ 100%只会浪费资源，而且在某些情况下，仍然无法收集到足够的列统计信息。这就是为什么了解实际发生的情况至关重要。\n\n### 保存、恢复和锁定统计信息\n\
  \n保存和恢复统计信息可能极其有用。在早前的例子中，你看到在错误的时间收集统计信息可能会破坏你的执行计划。如果你在表为空时收集了统计信息，那么当表中有代表性数据集时，你需要再次收集统计信息。另一方面，如果你在表中的数据具有代表性时收集了统计信息，你可以保存该收集结果，并在以后为该表恢复它。这应该能让你正确地表示新加载的表，同时在方便的时间收集统计信息。\n\
  \n你还可以在方便的时间锁定统计信息。\n\n![9781430248095_Fig03-07.jpg](img/9781430248095_Fig03-07.jpg)\n\
  \n图 3-7。如果你的表统计信息变化非常大，锁定它们可能是更好的选择。\n\n以下是一个收集对象统计信息并将其保存到名为`MYSTATS2`的表中的示例序列。\n\
  \n```\nSQL> create table test2 as select object_id from dba_objects;\n\n表已创建。\n\n\
  SQL> exec dbms_stats.gather_table_stats('STELIOS','TEST2');\n\nPL/SQL 过程已成功完成。\n\
  \nSQL> exec dbms_stats.create_stat_table('STELIOS','MYSTATS2');\n\nPL/SQL 过程已成功完成。\n\
  \nSQL> delete from test2;\n\n已删除 73419 行。\n\nSQL> commit;\n\n提交完成。\n\nSQL> select\
  \ count(*) from test2;\n\n  COUNT(*)\n----------\n         0\n\nSQL> exec dbms_stats.import_table_stats('STELIOS','TEST2',null,'MYSTATS2');\n\
  \nPL/SQL 过程已成功完成。\n\nSQL>\n```\n\n这些简单的步骤就是保存统计信息供以后使用所需的全部操作。这正是`SQLT`在收集关于`SQL`语句的信息时为你做的事情。对象的统计信息被收集在一起，并放入`ZIP`文件中，这样你就可以构建测试用例，让查询像在生产环境一样工作，却不需要数据。我们将在第\
  \ 11 章中介绍如何创建测试用例。这是你使用`SQLT`能获得的最有用的工具之一。\n\n### 午夜截断案\n\n是时候看看我们侦探系列的第二个案例了。你刚到现场，看到一个有很多提示的查询。当你询问此事以及为什么它有这么多提示时，你被告知如果移除这些提示，执行计划就是错误的。你还注意到，笛卡尔连接已被`_optimizer_cartesian_enabled=FALSE`禁用（见图\
  \ 3-8）。\n\n![9781430248095_Fig03-08.jpg](img/9781430248095_Fig03-08.jpg)\n\n图 3-8。`CBO\
  \ 环境`部分常常能揭示“古怪”的参数设置。\n\n我并不是建议你贸然介入每种情况，不加思考地移除提示，但带有提示的`SQL`有时是其他地方出错的迹象。通常，罪魁祸首是莫里亚蒂，当然，我是指统计信息！不要有偏见，始终要以证据为准，所以首先要做的就是收集证据。在一个复制的环境中，你运行不带提示的查询。\n\
  \n首先查看执行计划，特别是内存中的那个（见图 3-9）。\n\n![9781430248095_Fig03-09.jpg](img/9781430248095_Fig03-09.jpg)\n\
  \n图 3-9。这个执行计划有一个显而易见的问题（红框高亮显示）。\n\n\n\n幸运的是，SQLT 已经为你完成了所有工作。通过一次 `SQLT XECUTE`，你可能已经看到，在当前的执行计划中，执行步骤\
  \ 1，即 `INDEX RANGE SCAN`，优化器预期的 `基数` 为 1。（要查看这一点，请看 `执行顺序` 列，向下找到“1”。这是第一个要执行的行。）\n\
  \n然后横向阅读，直到你找到 `预估基数` 列。在这里你会看到值“1”。但由于这是一个 `SQLT XECUTE` 操作，SQL 已经被执行，而实际返回的行数超过了百万。预期是\
  \ 1 行，但实际有 100 万行。这是一个重要的线索，表明有地方出错了。此时的问题是“为什么优化器认为 `基数` 会是 1”？\n\n看看 `成本` 列。你会看到预期的成本是\
  \ 0。优化器认为检索这些数据没有成本。\n\n要继续遵循这种基于证据的追踪路径，你必须了解索引统计信息的状况。\n\n查看一下索引。你可以展开 `转到` 列中的按钮以显示更多链接（参见\
  \ 图 3-10）。\n\n![9781430248095_Fig03-10.jpg](img/9781430248095_Fig03-10.jpg)\n\n\
  图 3-10 . 执行计划中“更多”列下的扩展可以显示指向其他信息的更多链接\n\n然后，点击“索引列”或“表列”标题下的 `列统计信息` 来显示列统计信息（参见\
  \ 图 3-11）。\n\n![9781430248095_Fig03-11.jpg](img/9781430248095_Fig03-11.jpg)\n\n\
  图 3-11 . 列统计信息显示没有行\n\n在这里你可以看到一个有趣的情况。所有列的行数都是 0。这意味着在收集统计信息时表是空的。那么，父表的统计信息是什么时候收集的呢？为此，你需要父表名。点击返回按钮回到执行计划，这次点击表列部分下的\
  \ `列统计信息` 来显示表统计信息（参见 图 3-12）。\n\n![9781430248095_Fig03-12.jpg](img/9781430248095_Fig03-12.jpg)\n\
  \n图 3-12 . 表统计信息显示在收集统计信息时没有行\n\n你会看到 `TABLE 2` 上收集了 100%的统计信息，表中没有行，并且收集发生在凌晨 04:47。这是一个相当典型的统计信息收集时间。现在你必须问，数据从何而来，以及在凌晨\
  \ 4 点表中是否真的有 0 行。为此，点击主页上的“表”超链接以显示表详细信息（参见 图 3-13）。\n\n![9781430248095_Fig03-13.jpg](img/9781430248095_Fig03-13.jpg)\n\
  \n图 3-13 . 表详细信息部分显示了我们可以去哪里查看修改信息\n\n这里显示了一个有趣的新列，即 `表修改` 列。点击 `TABLE 2` 的“修改”超链接以查看修改历史（参见\
  \ 图 3-14）。\n\n![9781430248095_Fig03-14.jpg](img/9781430248095_Fig03-14.jpg)\n\n\
  图 3-14 . 表修改部分显示了行的插入、删除和更新情况\n\n![image](img/sq.jpg) **注意** 我知道你在想什么。SQLT 真是个源源不断提供帮助的工具。我知道所有这些信息都在数据库里，可以通过合适的查询获取，但\
  \ SQLT 已经为你做好了。你不需要回到数据库去查找。SQLT 已经收集好了，以防万一。\n\n现在你可以看到表的修改情况，并带有时间戳。阅读 `TABLE\
  \ 2` 条目所在行。表中最初有零行，然后插入了大约 200 万行，没有更新也没有删除，这导致表中大约有 200 万行。由于这个变化（超过了 10%的变更），统计信息变得陈旧，而这发生在下午\
  \ 4:09。\n\n现在的步骤很清楚了。表是空的。收集了统计信息。添加了 200 万行，运行了查询，优化器估计 `基数` 为 1（记住，如果值是 0，它会向上舍入为\
  \ 1），因此计算出 `NESTED LOOPS`（甚至更糟的 `CARTESIAN JOINS`）是可以的，结果大错特错。\n\n既然你知道了发生了什么，就可以用几种不同的方式来解决问题（如果看起来合适的话）：\n\
  \n*   你可以在不同的时间收集统计信息。\n*   你可以根据需要导出并导入统计信息。\n*   你可以在表有数据时冻结统计信息。\n\n可能还有更多方法。解决方案本身不是这里的重点。关键在于，一旦你知道了发生了什么，你就可以设计一个适合你情况的解决方案。你还可以看到为什么在这个案例中需要\
  \ `_optimizer_cartesian_enabled=FALSE`。存在一种可能性，优化器可能会选择笛卡尔积连接，因为其中一个关键步骤的 `基数` 是\
  \ 1（这是少数几种 `CARTESIAN JOIN` 有意义的情况之一）。你可以非常简单地测试你的理论。在 `TABLE 2` 完全加载后，收集统计信息。然后重试查询，或者更好的是，直接检查执行计划会是什么。\n\
  \n优化器拿到了糟糕的统计信息，“决定”做一些看起来没有道理的事情。SQLT 收集了足够的信息，让你能够看到优化器为什么这样做，然后你可以设置统计信息收集方式，使优化器不再出错。优化器是你的朋友，是一段几乎总是正确的神奇代码，只要它得到了所需的信息。\n\
  \n## 总结\n\n在本章中，我们通过实际例子清楚地看到，统计信息确实会产生真正的影响，而仅仅把所有事情都设为自动并不总是最佳策略。你需要注意你收集了哪些统计信息、这些统计信息的质量以及你收集它们的频率。要特别小心列直方图。SQLT\
  \ 帮助你快速高效地完成这项工作，并且比一大堆脚本能提供更多信息。我们在本章中触及了偏斜度；但在下一章中，我们将深入细节，看看什么是偏斜度以及它如何影响你的执行计划。\n\
  \n"
- '# 第四章


  ![image](img/frontdot.jpg)


  ## 偏斜度如何使你的执行时间变得不稳定


  偏斜度是一个由于某种原因经常被忽视或被误解的话题。偏斜度是基于成本的优化器处理数据的一个重要部分。它会影响优化器决定做什么。它如此重要，以至于 Oracle 创建了诸如自适应游标共享这样的新功能，就是为了处理偏斜度带来的后果。


  ### 偏斜度


  在本节中，我们将探讨什么是偏斜度，它是如何产生的，以及它如何影响你的执行计划。如果你每天都处理偏斜度，你可能会立即知道哪些情况可能产生偏斜数据。有时偏斜数据也可能意外出现。我们还将看看如何检测偏斜度，既可以从
  SQL 层面，也可以通过 SQLT。


  #### 什么是偏斜度？




  '
- "# 用最简单的话来说\n\n用最简单的话来说，表是数据的一种表示形式，而偏斜度是数据集的一种属性，它会导致特定列谓词的匹配数量出乎意料地多或出乎意料地少。例如，如果我们绘制六月、七月和八月在五金店花费的美元金额图表，我们可能会发现花费金额的变动幅度仅为\
  \ 10%。每周的变动性会非常低。如果现在我们扩展时间线，把感恩节和圣诞节包括进来，我们就会发现花费金额在这些日期前后达到峰值，因此金额可能是“正常”六月至八月金额的两倍或三倍。如果我们只有六月至八月的数据来预测未来，我们可能会预期一个低得多的支出水平。这种在感恩节和圣诞节前后出乎意料的大额支出将产生一个偏斜的数据集。\n\
  \n如果我们改为绘制每个人每次访问的花费金额，并以每 10 美元为一组进行分组，我们会发现另一种分布。少数人的花费在 0 至 10 美元范围内，可能更多在 10.01\
  \ 至 20 美元范围内。这个趋势会持续上升到某个峰值，然后下降。大多数人会在某个特定范围内消费，然后我们会有一些“大手笔”的顾客，他们会花费数千美元。花费金额与花费在这个范围内的人数关系的图表将会是偏斜的。如果每个人来商场都花费完全相同的金额，那么所有人都会落在同一个范围。所有其他范围的值都将为零。这将是一个高度偏斜的数据集。\n\
  \n这突显了一个关键点，数据库管理员（DBA）和开发人员应时刻警惕：你是否真正理解你的数据？有时这可能很难，因为列的命名方式并不明显。这正是数据库设计者、开发人员和\
  \ DBA 必须紧密合作以获得良好结构、相关索引以及主键和外键的地方。在某些数据库中，你会发现如果抽样设置为自动，你会收集到列统计信息（有时样本量非常小），但由于没有偏斜度，这些信息并无用处。在图\
  \ 4-1 中，我们看到关于为表`TABLE 1`中每一列收集了哪些统计信息。\n\n![9781430248095_Fig04-01.jpg](img/9781430248095_Fig04-01.jpg)\n\
  \n图 4-1. 表列统计信息，显示了样本大小和不同值的数量。\n\n在收集的`SQLT`报告图表中，我们看到在“表列”部分，针对特定表`TABLE 1`，许多列已收集了列统计信息。查看`COL1`的高亮部分。它收集了\
  \ 100%的统计信息。`COL4`收集了 0.1%。为什么`COL1`和`COL4`之间存在如此巨大的差异？这是因为自动抽样算法仅为`COL4`的样本大小选择了\
  \ 5,791 行。让我解释一下优化器在对这些列进行抽样时做了什么。\n\n在这种情况下，对于表`TABLE 1`，针对**每一**列`COL1`、`COL2`、`COL3`、`COL4`等，统计信息收集算法正在从表中抽样值。样本大小显示在“样本大小”列中。因此，如果`COL1`是花费金额，那么统计信息抽样算法会抽样这些列并发现存在某种数据分布（正如我们上面讨论的）。如果`COL4`是商店名称，它会抽样数据并发现存在一定数量的不同值（本例中是\
  \ 38 个）。然而，在每种情况下，都有 5,144,909 行数据。该算法具体如何决定样本大小并未记录，但很明显，如果第一个样本是“Joe’s Hardware”，第二个样本是“Joe’s\
  \ Hardware”，第三个样本也是“Joe’s Hardware”，那么统计信息收集算法在抽到第一千个样本后可能开始“猜测”，它抽样的所有值在统计上都非常接近。如果你的数据高度偏斜，并且在`COL4`的整个列总体中只有一个值，例如“Sally’s\
  \ Hardware”，那么通过随机抽样，统计信息收集算法可能会漏掉这个值。进一步假设，尽管“Sally’s Hardware”这个值非常罕见，但它却被用作此查询谓词中的值。在\
  \ Oracle 10g 中，根据谓词使用的第一个值，你很可能最终得到一个次优的执行计划。在 11g 中，你将有自适应游标共享（Adaptive Cursor\
  \ Sharing）来帮助你（我们在第 7 章中会更多地讨论这一点）。另一方面，然而，如果你知道你的数据以这种方式高度偏斜，并且你看到你的自动抽样样本大小非常小，你很可能会决定选择更大的样本大小可能是个好主意。\n\
  \n## 如何判断数据是否偏斜\n\n偏斜度如此重要，以至于作为 DBA 或开发人员，你应该警惕那些可能包含偏斜数据的列。当数据集像今天这样庞大时，要立即判断一个数据集是否偏斜是非常困难的。`SQLTXPLAIN`通过显示直方图的统计信息（如果有的话）使这项工作对你来说容易得多。\n\
  \n那么，如何判断数据是否偏斜呢？查看收集的数据有不止一种方法，但所有方法都依赖于抽样。最简单的抽样方法是使用查询（如下所示）。在这个简单的例子中，我们使用`CTAS`（Create\
  \ Table As Select）语句从一个已知（至少对我来说是）偏斜的数据集中创建了一个测试表`test3`：`dba_objects`视图的`object_type`列。`dba_objects`视图列出了数据库中对象的属性，包括对象类型。有许多不同的对象类型：例如，`table`（这是一个非常常见的对象类型）和`dimension`（这是一个非常罕见的对象类型）。一旦我们创建了一个名为`test3`的测试表，它将包含\
  \ 73,583 行，我们就可以对每种类型的对象数量进行抽样：这将使我们了解数据集的偏斜度。\n\n```sql\nSQL> create table test3\
  \ (object_type) as select object_type from dba_objects;\nTable created.\n\nSQL>\
  \ select object_type, count(object_type)\n  from test3 group by object_type order\
  \ by count(object_type);\n```\n\n\n"
- "# 数据偏斜与直方图\n\n## 数据库对象类型分布示例\n\n以下表格展示了数据库中对象类型及其对应的数量：\n\n```\nOBJECT_TYPE   \
  \      COUNT(OBJECT_TYPE)\n------------------- ------------------\nRULE        \
  \                         1\nDATABASE LINK                        1\nLOB PARTITION\
  \                        1\nEDITION                              1\nDESTINATION\
  \                          2\nJAVA SOURCE                          2\nSCHEDULE \
  \                            3\nMATERIALIZED VIEW                    3\nSCHEDULER\
  \ GROUP                      4\nDIMENSION                            5\nCONTEXT\
  \                              7\nUNDEFINED                            9\nINDEXTYPE\
  \                            9\nWINDOW                               9\nCLUSTER\
  \                             10\nRESOURCE PLAN                       10\nJOB CLASS\
  \                           13\nJOB                                 14\nEVALUATION\
  \ CONTEXT                  14\nDIRECTORY                           14\nPROGRAM \
  \                            19\nRULE SET                            23\nCONSUMER\
  \ GROUP                      25\nQUEUE                               39\nXML SCHEMA\
  \                          52\nOPERATOR                            55\nPROCEDURE\
  \                          159\nLIBRARY                            183\nTYPE BODY\
  \                          241\nSEQUENCE                           242\nTABLE PARTITION\
  \                    258\nFUNCTION                           304\nJAVA DATA    \
  \                      328\nINDEX PARTITION                    420\nTRIGGER    \
  \                        620\nJAVA RESOURCE                      834\nLOB      \
  \                          995\nPACKAGE BODY                      1269\nPACKAGE\
  \                           1329\nTYPE                              2827\nTABLE\
  \                             3113\nINDEX                             4134\nVIEW\
  \                              5263\nJAVA CLASS                       22917\nSYNONYM\
  \                          27802\n```\n\n上面的示例显示了数据库中的对象类型与这些对象类型的数量。这里的“桶”（`bucket`）指的是`object_type`的值（“桶”现在常用来表示数据集中涵盖的值范围）。例如，对象类型`SYNONYM`（示例中的最后一行）有\
  \ 27,802 个值。有时桶可以是一周中的某天，比如星期六或星期日；有时可以是原色，比如红色或蓝色；有时桶也可以是一个范围，比如“2011 年的日期”。在每种情况下，这些值都是你在绘制图表时会放在\
  \ X 轴上的值。从现在开始，我们将使用术语“桶”来表示所讨论的值范围。\n\n一旦你执行了查询，你将看到有助于你决定数据偏斜程度的信息。然而，请注意，几乎所有数据在某种程度上都是偏斜的。即使在我们上一节关于超市支出的例子中，数据也是偏斜的。你需要回答的问题是：它是否偏斜到足以给我的查询带来问题？10%的变异性通常不会引起问题，但如果你有一个桶包含了\
  \ 90%的样本，那么数据就是高度偏斜的。因此，关于偏斜度的判断在一定程度上是主观的。在上面的查询示例中，如果我查询的是表`test3`，并且我的谓词值是`SYNONYM`，那么我可能会返回比针对值`RESOURCE\
  \ PLAN`进行查询时多得多的行。请参见下面的示例代码。如果我们对罕见值进行采样，我们只能得到 10 个值。\n\n```\nSQL> select count(*)\
  \ from test3 where object_type='SYNONYM';\n\nCOUNT(*)\n\nSQL> select count(*) from\
  \ test3 where object_type='RESOURCE PLAN';\n\nCOUNT(*)\n\n```\n\n我们是否关心这种偏斜度？数据是否非常偏斜？从技术上讲，即使是最轻微的偏离“常态”也可以归类为偏斜，但这个术语现在通常指那种会使执行计划不稳定的偏斜程度。然而，从更客观的角度来看，如果你看到如上例所示，某些谓词返回的值是其他谓词的\
  \ 10 倍以上，那么这就是非常偏斜的。如果你看到最常见值与最不常见值的比率大于或等于 1.5，你就可以开始考虑偏斜度作为一个因素了。\n\nSQLT 使得收集这类查询信息的工作变得容易得多。它展示了列直方图的数据分布。首先，在报告顶部（参见图\
  \ 4-2），我们可以点击“Tables”（表）、“Columns”（列），或者我们也可以点击“Histograms”（直方图）。在这个例子中，我们将点击“Tables”，因为这可能是你在调查中最可能遵循的路径。\n\
  \n![9781430248095_Fig04-02.jpg](img/9781430248095_Fig04-02.jpg)\n\n**图 4-2** .  SQLXECUTE\
  \ 报告的顶部\n\n“Tables”页面向我们展示了图 4-3 中的屏幕。\n\n![9781430248095_Fig04-03.jpg](img/9781430248095_Fig04-03.jpg)\n\
  \n**图 4-3** .  报告的表部分\n\n从图 4-3（它只显示了屏幕的左侧），我们现在可以点击任何单个表的“Cols”（列）超链接以查看列详情。在这个例子中，我们正在查看\
  \ TABLE 1，因此我们点击相应的链接。这使我们进入了图 4-4 所示的屏幕（它是屏幕的右侧），我在其中高亮显示了“FREQUENCY”超链接，它将带我们进入\
  \ TABLE 1 的 COL2 的直方图。\n\n![9781430248095_Fig04-04.jpg](img/9781430248095_Fig04-04.jpg)\n\
  \n**图 4-4** .  COL2 的直方图超链接\n\n通过点击 COL2 的“FREQUENCY”直方图，我们到达了图 4-5 所示的屏幕。“FREQUENCY”（频率）和“HEIGHT\
  \ BALANCED”（高度均衡）这两种类型的直方图将在后面的部分讨论，但可以说，它们都是表示桶频率的方法。\n\n![9781430248095_Fig04-05.jpg](img/9781430248095_Fig04-05.jpg)\n\
  \n**图 4-5** .  来自 SQLT 的示例直方图\n\n该图显示，对于值为“1”，估计基数（cardinality）约为 190 万，而对于值“17”，估计基数约为\
  \ 4000。这些数据偏斜吗？当然是。在图 4-5 中，估计基数按流行度进行了排序，但情况并非总是如此。请看我们示例表`test3`的图 4-6。\n\n![9781430248095_Fig04-06.jpg](img/9781430248095_Fig04-06.jpg)\n\
  \n**图 4-6** .  针对我们的 test3 示例的另一个示例直方图表。SYNONYM 很受欢迎\n\n在这个示例直方图中，我们看到了列显示中呈现的基本事实：桶的数量（33）、表中的行数、空值的数量以及样本大小。在这个案例中，样本大小非常小。\n\
  \n这些数据看起来高度偏斜。对于“端点实际值”（Endpoint Actual Value）为“DIMENSION”的情况，估计选择率（selectivity）是\
  \ 0.000182。对于 JAVA_CLASS，选择率是 0.313704。这意味着，由于空值数量为 0，如果针对`object_type`的谓词使用值“JAVA\
  \ CLASS”，将近三分之一的表将被返回。如果谓词使用值“JAVA RESOURCE”，那么选择率仅为 0.011996，基数为 883，而“JAVA CLASS”的基数为\
  \ 23,083。即使面对如此高度偏斜的数据，你也可以问自己：“这种偏斜度与我的查询相关吗？”如果列`object_type`没有参与你的查询，那么这种偏斜度对你来说就不重要。\n\
  \n## 偏斜度如何影响执行计划\n\n\n现在我们了解了偏斜度是什么，以及特定 SQL 语句在 SQLT 报告中如何显示统计数据，接下来应该探讨偏斜度如何可能导致执行计划出现问题。\n\
  \n假设我们想查询上个月与我们有业务往来的每个金融机构的所有财务交易总和。很可能在描述字段中包含机构名称，可能有一个`company_ID`来代表公司，以及一个字段来表示财务交易的金额。当然，我们可能还有许多其他字段，但就偏斜度而言，我们关心的是这些。我们可以查询此表，找出所有`company_ID`与我们当前查找的公司匹配的记录总和。如果我们选择了一个业务往来不多的公司，可能只会得到几条记录。优化器很可能预期某些公司只有一条记录，因此可能选择执行笛卡尔积连接。然而，如果该公司是美国银行，我们可能会预期有数千（甚至数百万）笔交易。在这种情况下，哈希连接可能是更好的选择。对于这两种极端情况，“好”的执行计划大相径庭。\n\
  \n如果对美国银行的记录使用笛卡尔积连接，当 Oracle 试图在数千条记录上执行笛卡尔积时，性能将灾难性下降。即便是 Exadata 也无法应对这样的错误。因此，根据谓词值的不同，我们很可能需要不同的执行计划。要解决这类问题，我们需要考虑有哪些选项：移除直方图、改进直方图、使用自适应游标共享或更改查询。对于在这些情况下该怎么做，没有一成不变的规则。SQLT\
  \ 会显示发生了什么以及偏斜度如何影响执行计划；然后，你可以与开发人员一起，决定哪种策略最适合你的情况：添加或删除哪些索引，以及收集哪些直方图是有帮助的。\n\n\
  ### 直方图\n\n直方图是一个令人困惑的主题，除非你知道它是什么。不同文档中使用且有时相互矛盾的术语也无助于理解。因此，让我从定义“桶”开始。桶是特定列的值的范围。例如，如果我们有一个\
  \ TRUE_OR_FALSE 列，并且它只能有两个值（TRUE 或 FALSE），那么我们最多可以有两个桶：每个桶会有一个值来描述 TRUE 的数量和 FALSE\
  \ 的数量。直方图是一种数据表示形式，它描述了不同数据值范围的相对分布情况。\n\n### 直方图类型\n\n我们已经笼统地讨论了直方图，但 Oracle 目前对任何类型的直方图都有\
  \ 254 个桶的限制。这意味着它无法存储一列超过 254 种类型的值的频率。可以想象，与几乎任何事物的任何可能取值范围相比，这是一个非常小的数字！“油漆颜色”、“银行名称”、“邮政编码”：大多数直方图都需要超过\
  \ 254 个桶。如果不同值的数量（在 SQLT 报告中显示为 NDV）大于 254，并且统计信息收集过程检测到了这一点，那么你将不得不以某种方式将数据分布压缩到比不同值数量更少的桶中。如果发生这种情况，你就将优化器暴露在不完整信息的风险之下，这可能对你的执行计划产生不利影响。回顾一下图\
  \ 4-6。你会看到从 5,502 行的样本中产生了 33 个桶。而实际上我们知道有 45 个不同的值。看看下面这个读取表中所有数据的查询结果：\n\n```sql\n\
  SQL> select count(distinct object_type) from test3;\n\nCOUNT(DISTINCTOBJECT_TYPE)\n\
  --------------------------\n                        45\n```\n\n不同值数量的真实答案是 45。统计抽样得到的答案是\
  \ 33。统计信息采样器，即使采样了 5,502 行，也不够幸运，未能找到`object_type`所有可能的不同值。尽管如此，它还是生成了一个频率型直方图，因为没有超过\
  \ 254 的限制。关键是，尽管是频率型直方图，并非所有值都被代表了。如果我们人为地将桶的数量压缩到 10 个，会发生什么？\n\n```sql\nSQL> exec\
  \ dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n\
  \  pvalue=>'for all columns size 10');\n\nPL/SQL procedure successfully completed.\n\
  ```\n\n现在我们得到了另一种类型（两种可能类型中的另一种）的直方图，即基于高度的直方图（参见图 4-7）。\n\n![9781430248095_Fig04-07.jpg](img/9781430248095_Fig04-07.jpg)\n\
  \n图 4-7 . 一个包含 10 个桶的基于高度的直方图\n\n在基于高度的直方图中，值类型会根据桶进行计数，并被标记为流行或不流行。如果不流行，则分配一个桶。例如，看看桶号\
  \ 1，它代表按字母顺序低于“CONSUM”的对象类型的值：例如，“CLUSTER”和“CONSUMER GROUP”。因为一个桶可能对应多个值，其中一些我们可能没有遇到，所以终点是估计的。我们知道没有“SYNONY1”这种对象类型，但它是桶\
  \ 5、6、7 和 8 的标签。如你所见，只有 10 个桶时，对对象类型（实际上有 45 个不同类型）的数据分布估计非常差。使用质量如此差的直方图，我们很可能最终得到一些糟糕的执行计划。因此，重要的是我们要知道何时使用直方图，何时它们是一种阻碍。\n\
  \n### 何时使用直方图\n\n如果你使用优化器统计信息收集的默认值，那么你很可能会在一些你没注意到的列上拥有直方图。如果你有一个性能不佳的查询，或者一个你想要调优的查询，你可能需要检查收集到的信息以确保其合理。在决定是否在一列上创建直方图时，需要考虑一些指导原则。直方图旨在处理偏斜数据，因此如果你的数据偏斜度不高，那么直方图就没有用处。一个例子可能是表记录的时间戳。如果数据库活动每天都发生，并且我们每天有\
  \ 100 笔交易，每笔都有一个时间戳，那么日期列上的直方图将无济于事。在频率直方图中，这相当于所有桶的高度都相同。如果没有偏斜度，直方图对我们没有帮助。这只是意味着我们花了夜间时间收集不需要的统计信息。正如我之前提到的，自动样本大小在数据几乎没有偏斜时非常聪明地知道何时停止采样，因此你可能不会因此损失太多时间。\n\
  \n如果你的数据偏斜度很高，那么直方图可能对你非常重要；但如果你确实有直方图，你应该通过 SQLT 检查直方图是否合适且正确。在图 4-8 中，我们看到了 TABLE\
  \ 1 的列统计信息。\n\n![9781430248095_Fig04-08.jpg](img/9781430248095_Fig04-08.jpg)\n\n\
  图 4-8 . 部分列统计信息摘录\n\n\n\n"
- "# 直方图问题与绑定变量\n\n除了许多列的样本率非常低（0.3%）之外，我们还有一些桶计数与不同值的数量不匹配。最后一个条目显示有 76 个不同的值，但只有\
  \ 75 个桶。这意味着有一个值甚至未出现在 17.5%的样本量中。在这种情况下，您必须查看直方图（此处为频率直方图）并判断该直方图是否有用。如果您判断数据没有偏斜，因此直方图没有用，那么可以移除该直方图，并更改表首选项以不收集此列的统计信息。如果您发现数据确实存在偏斜，则需要收集更好的统计信息。这意味着需要为此列收集更大的样本量。您可以通过设置表首选项或在主要统计信息作业之后运行特定作业来收集数据。\n\
  \n### 如何添加和移除直方图\n\n如果您想移除列的直方图，可以简单地使用 `dbms_stats` 过程，如下例所示。\n\n```\nSQL> exec\
  \ dbms_stats.delete_column_stats(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n\
  \  colname=>'OBJECT_TYPE',col_stat_type=>'HISTOGRAM');\nPL/SQL procedure successfully\
  \ completed.\n```\n\n但是，这不会永久删除统计信息。下次统计信息作业遇到该表时，它可能会决定再次需要同一列的列统计信息。如果您正在测试查询的执行情况，则可以一次性移除列的统计信息。移除列统计信息可能使您能够重新解析语句，并查看执行计划是否受到实质性影响。如果您想永久移除列统计信息收集，则可以设置表首选项，如下例所示，将\
  \ `method_opt` 值设置为 `\"FOR ALL COLUMNS SIZE 1\"`，这意味着没有列直方图。\n\n```\nSQL> exec dbms_stats.set_table_prefs(\n\
  \  ownname=>'STELIOS',\n  tabname=>'TEST3',\n  pname=>'method_opt',\n  pvalue=>'FOR\
  \ ALL COLUMNS SIZE 1');\n\nPL/SQL procedure successfully completed.\n```\n\n如果表有您需要统计信息的其他列，您可能决定设置首选项，以便只忽略某一特定列的列统计信息。以下是此命令的示例。\n\
  \n```\nSQL> exec dbms_stats.set_table_prefs(\n  ownname=>'STELIOS',\n  tabname=>'TEST3',\n\
  \  pname=>'method_opt',\n  pvalue=>'FOR COLUMNS OBJECT_TYPE SIZE 1');\n\nPL/SQL\
  \ procedure successfully completed.\n```\n\n另一方面，如果您想添加列统计信息，可以使用 `dbms_stats.get_column_stats`\
  \ 命令手动收集它们。\n\n### 绑定变量\n\n绑定变量是新 Oracle DBA 可能不会立即意识到的奥秘之一。另一方面，开发人员会一直使用绑定变量，并且对定义和含义感到\
  \ familiar。如果您熟悉变量及其值的概念，那么从绑定变量中无需理解更多内容。它只是 Oracle 版本的变量。变量（和绑定变量）只是一个值的符号名称，该值可以根据代码的需要而变化。然而，绑定窥视和绑定捕获是更特定于\
  \ Oracle 的概念，它们是允许优化器在存在偏斜时做出更好决策的技术。绑定变量、偏斜度和绑定窥视都与 `CURSOR_SHARING` 协同工作以改进 CBO\
  \ 计划。我们将在以下部分介绍所有这些概念及其工作原理。\n\n### 什么是绑定变量？\n\n既然我们已经进入了直方图的世界并查看了偏斜度，我们看到用作谓词的值可能会对返回的行数产生重大影响。在下面的示例中，我们看到根据我们选择“EDITION”还是“TABLE”，我们会得到不同的计数。\n\
  \n```\nSQL> select count(*) from test3 where object_type='EDITION';\n  COUNT(*)\n\
  \nSQL> select count(*) from test3 where object_type='TABLE';\n  COUNT(*)\n\n```\n\
  \n如果我们想在 SQL 中避免字面值（这些字面值都会被单独解析，并会对性能产生不利影响），我们可能会引入绑定变量。绑定变量是一种通过设置参数值将参数传递给例程的方法。下面我展示一个简单的过程，使用名为\
  \ `b1` 的绑定变量来计算 TEST3 中不同对象类型的数量。\n\n```\nSQL> set serveroutput on;\nSQL> create\
  \ or replace procedure object_count(b1 in char)\n  2  as\n  3    object_count number;\n\
  \  4    begin\n  5    select count(*) into object_count from test3 where object_type=b1;\n\
  \  6    dbms_output.put_line(b1||' = '||object_count);\n  7    end;\n  8  /\n\n\
  Procedure created.\n```\n\n如果我们运行此过程几次，可以看到传入并使用了不同的值。\n\n```\nSQL> exec object_count('EDITION');\n\
  EDITION = 1\n\nPL/SQL procedure successfully completed.\n\nSQL> exec object_count('TABLE');\n\
  TABLE = 3113\n\nPL/SQL procedure successfully completed.\n```\n\n在上面的例子中，`b1` 接受了值“EDITION”，然后是值“TABLE”。过程中实际完成工作的文本是一个简单的\
  \ `select` 语句。它的谓词是 `object_type=b1`。就优化器而言，查询的文本没有改变。\n\n### 什么是绑定窥视和绑定捕获？\n\n\
  通过使用绑定变量，我们将绑定变量的实际值隐藏在优化器之外。我们这样做是有充分理由的。我们希望避免为每个具有不同谓词值的 SQL 进行过度解析。当数据没有偏斜且您的执行计划不太可能根据传入的绑定变量值而改变时，这是一个很好的策略。对于偏斜数据，优化器可以从知道传递给\
  \ SQL 的绑定变量值中受益。这个过程被称为“绑定窥视”，是在硬解析期间完成的。另一方面，绑定捕获是在 SQL 执行期间使用的实际绑定变量值的快照。在这种情况下，用于绑定（此处为\
  \ `b1`）的值被收集并可供 SQLT 使用。在下面的例子中（图 4-9），我们看到了 SQLT 报告中显示捕获的绑定值的部分。\n\n![9781430248095_Fig04-09.jpg](img/9781430248095_Fig04-09.jpg)\n\
  \n图 4-9. 捕获的绑定示例输出\n\n在偏斜度很重要且您怀疑绑定值将优化器引向错误路径的情况下，您可能需要查看“捕获的绑定”部分。结合捕获的绑定和时间戳（以及任何关于性能不佳的报告），您可以追踪为什么特定语句决定执行错误的操作。\n\
  \n## Cursor_Sharing 及其值\n\nOracle 引入 `CURSOR_SHARING` 参数来解决未使用绑定变量的代码所引起的问题。当不使用绑定变量时，优化器必须解析\
  \ SQL 文本。这是一个昂贵的操作，如果唯一改变的是字面值，这可能是浪费时间。\n\n`CURSOR_SHARING` 有三个可能的值：`EXACT`、`FORCE`\
  \ 和 `SIMILAR`。`EXACT` 是默认值，告诉优化器在遇到每个 SQL 文本时分别考虑它。如果您的应用程序编写良好，并且按照最有效的方式使用绑定和字面值，那么保持\
  \ `EXACT` 不变是最佳选择。\n\n将 `CURSOR_SHARING` 设置为 `FORCE` 会告诉优化器为所有谓词使用绑定（并会生成自己的名称）。如果您有一个编写不良的应用程序，并且您希望利用使用绑定变量带来的性能提升，而无需修改应用程序以使用绑定变量，那么您将使用此值。\n\
  \n\n\n将 `CURSOR_SHARING` 设置为 `SIMILAR` 自 11g 版本起已被废弃，不应再使用。但值得一提的是，它曾是 `CURSOR_SHARING=FORCE`\
  \ 的一个“智能”版本。在大多数情况下，它会创建系统定义的绑定变量，除非该绑定变量以某种方式影响了优化。它并非一个完整的解决方案，而自适应游标共享的引入是对 `CURSOR_SHARING=SIMILAR`\
  \ 的一个巨大改进。需要注意 `CURSOR_SHARING` 参数的值，以便理解绑定变量是否生效。在 SQL 报告的 SQL 文本部分，您还会看到，如果字面量已被绑定变量替换，它们将具有系统定义的名称。\n\
  \n## 变量执行时间案例\n\n有时，拥有一个稍长但稳定的执行时间，比拥有一个稍快但不稳定的执行计划更好。不稳定的执行时间（执行时间可能大幅波动）会给批处理作业的调度带来问题。在此示例案例中，执行时间从未稳定过。您处于预生产环境中，希望获得有关可采取哪些措施来提高执行时间稳定性的信息。您有一个优势，即拥有一个包含代表性查询和数据的测试环境。因此，在测试之后，您查阅了\
  \ `AWR` 报告，并决定有一个特定查询需要关注，因为它有时耗时很长。我们获取其 `SQL_ID` 并生成 `SQLT`。我们想知道执行计划出了什么问题，因此我们查看了“执行计划”部分，如\
  \ 图 4-10 所示。\n\n![9781430248095_Fig04-10.jpg](img/9781430248095_Fig04-10.jpg)\n\n\
  图 4-10 . 显示了许多不同的执行计划\n\n在“执行计划”部分，我们看到存在许多不同的执行计划。为什么会有这么多不同的执行计划？让我们首先看看最差的执行计划，如\
  \ 图 4-11（屏幕左侧）和 图 4-12（屏幕右侧）所示。我们在 图 4-11 中看到了许多嵌套循环步骤，在 图 4-12 中看到了许多低估。\n\n![9781430248095_Fig04-11.jpg](img/9781430248095_Fig04-11.jpg)\n\
  \n图 4-11 . 通过点击图 4-10 执行计划列表中的“W”所选中的最差执行计划\n\n![9781430248095_Fig04-12.jpg](img/9781430248095_Fig04-12.jpg)\n\
  \n图 4-12 . 用 *** 高亮的数字显示了优化器非常大的估算偏差\n\n由于我们有实际返回的行数，我们可以查看高估和低估。我们遇到了相当多的估算偏差，所以有些地方不对劲。可能不止一个问题。既然第一步，第\
  \ 11 行，已经“错了”，偏差达 4,230 倍，我们应该从那里开始。查看 图 4-13，因为它显示了表 1 的列统计信息。您看到任何值得注意的东西了吗？（实际表格包含比图中显示更多的信息。为了可读性，我删除了一些表列。）\n\
  \n![9781430248095_Fig04-13.jpg](img/9781430248095_Fig04-13.jpg)\n\n图 4-13 . 表 1\
  \ 的列统计信息\n\n让我们看看 `ID` 列的统计信息。样本大小良好，为 100%，并且有 34,916 个不同值：这超过了我们 254 个存储桶所能容纳的数量。因此，如果我们有直方图，它将是一个高度平衡的直方图，但在“直方图”列下我们看到“无”。那么\
  \ `ORG_ID` 呢？只有 2.4% 的样本，且仅有一个不同值，高低值都是“ABC”。此外，我们有一个只有一个存储桶的频率直方图。毫不意外，其选择性将是 1.0，但同样地，这个直方图对我们没有任何作用，因为它毫无意义。另一方面，它不可能对可变的执行计划有贡献。那么让我们看看\
  \ `ID2` 列，其样本为 2.4%，有 397 个不同值和一个高度平衡的直方图。如果我们详细查看直方图，会发现有很多流行值，但我们继续看。DATE 列有一个高度平衡的直方图：这合理吗？这取决于\
  \ DATE 列代表什么。但通常，带有直方图的 DATE 列应引起怀疑。`ID3` 列同样是 2.4% 样本，有两个不同值：“Y”和“N”。如果我们查看直方图，会发现“N”的选择性为\
  \ 0.03，“Y”的选择性为 0.97。仅这一点就可能影响返回的行数。看起来确实存在一些倾斜数据。但我们继续看。接下来是 `ID4` 列，有 51 个不同值和\
  \ 49 个存储桶，所以现在情况看起来不那么好了。它的直方图显示选择性在 0.005 到 0.1 之间。这是 20 倍的差异：这意味着这是另一个倾斜列，而且存储桶数量是错误的。`ID5`\
  \ 列没有直方图，`ID6` 列的存储桶数量错误：同样是倾斜的。在这样的报告中，您会花时间查看每一列，因为有时真正的罪魁祸首是您最后查看的东西；但在本例中，我们存在直方图采样不佳、直方图不合适以及可能缺失直方图的问题。\n\
  \n在这种情况下，您会尽力设置正确的直方图，在不需要的地方消除它们，在需要的地方添加它们。\n\n## 总结\n\n倾斜度是 `SQL` 中最难理解的概念之一，也是最麻烦的问题之一。Oracle\
  \ 软件历经多次迭代，尝试了许多方法来解决这个问题，有些尝试比其他更成功，但自适应游标共享是迄今为止最成功的。尽管不稳定的执行计划可能导致各种波折，但 `SQLTXPLAIN`\
  \ 能提供信息，帮助您稳定执行计划并收集正确的统计信息。在下一章中，我们将探讨优化器在解析过程中进行的查询转换，以使您的执行计划能够快速执行。\n\n"
- "# 第 5 章\n\n![image](img/frontdot.jpg)\n\n## 查询转换故障排除\n\nOracle 查询优化器是一段令人惊叹的代码，经过多年发展和改进（或许途中也走过一些弯路），旨在生成既易于生成又能快速运行的执行计划。优化器在过程中使用了许多“技巧”来提高执行速度，并以与您未修改的\
  \ `SQL` 结果相同的方式实现执行计划。这些“技巧”（或启发式方法）有时包括查询转换。\n\n\n\n### 什么是查询转换？\n\n查询转换，顾名思义，就是将\
  \ SQL 查询从其原始文本转变为不同的形式：但它仍然给出相同的结果。这有点像说你想从伦敦去纽约，而你决定经由奥兰多，好好休息一下，游览迪士尼世界，享受阳光，然后沿着东海岸开车北上。查询转换会使用启发式规则来优化你的行程。其中一条启发式规则可能是：“如果你的起点和目的地之间有直飞航班，那么避免在其他地点转机。”或者你也可以重写规则，改为“最小化你旅程中的经停点次数”。我相信你能看出，即使对于我这个简单的例子，情况也可能变得相当复杂。如果你真的很想见到米老鼠呢？那么计划就更难改变了。有时候，即使是看起来像米老鼠一样简单的查询，在你试图快速高效地完成旅程时也会带来问题。\n\
  \n为了解释从 SQL 查询的角度看，“查询转换”意味着什么，让我们看一个简单的例子。问问你自己一个问题。这个查询可以简化吗？\n\n```\nSQL> select\
  \ * from (select * from sales); -- 查询 1\n```\n\n这个查询“显然”可以简化为\n\n```\nSQL> select\
  \ * from sales; -- 查询 2\n```\n\n这大概是查询转换最简单的例子。查询 1 被转换成了查询 2。这个查询转换不会导致版本 1 和版本\
  \ 2 的查询结果不同。这种特定的转换被称为“子查询解嵌套”。每种转换都有其名称以及为确保最终结果正确且优化而必须遵循的一套规则。基于成本的优化器认识到这一点了吗？让我们请优化器为一个非常简单的查询计算一个执行计划；但我们会使用一个提示来告诉它不要使用任何查询转换。以下是\
  \ SQL 和执行计划。\n\n```\nSQL> select /*+ no_query_transformation */ * from (select *\
  \ from sales);\n执行计划\n\nPlan hash value: 2635429107\n\n| Id  | Operation       \
  \    | Name  | Rows  | Bytes | Cost (%CPU)| Time     | Pstart| Pstop |\n\n|   0\
  \ | SELECT STATEMENT    |       |   918K|    76M|   503   (5)| 00:00:07 |      \
  \ |       |\n|   1 |  PARTITION RANGE ALL|       |   918K|    76M|   503   (5)|\
  \ 00:00:07 |     1 |    28 |\n|   2 |   VIEW              |       |   918K|    76M|\
  \   503   (5)| 00:00:07 |       |       |\n|   3 |    TABLE ACCESS FULL| SALES |\
  \   918K|    25M|   503   (5)| 00:00:07 |     1 |    28 |\n\n```\n\n从这个例子我们看到，优化器选择了对\
  \ `SALES` 进行全表扫描。这是必需的，因为圆括号内有 `select * from sales`。然后优化器选择在那个数据上创建一个视图，并选择所有分区来创建选出的数据。所以优化器收集了括号内的所有数据，然后呈现给下一个\
  \ `select`。现在，让我们给优化器一个机会来展示它有多聪明。现在我们运行查询，但不带我们的提示。这样优化器就可以使用查询优化了。\n\n```\nSQL>\
  \ select  * from (select * from sales);\n执行计划\n\nPlan hash value: 1550251865\n\n\
  | Id  | Operation           | Name  | Rows  | Bytes | Cost (%CPU)| Time     | Pstart|\
  \ Pstop |\n\n|   0 | SELECT STATEMENT    |       |   918K|    25M|   503   (5)|\
  \ 00:00:07 |       |       |\n|   1 |  PARTITION RANGE ALL|       |   918K|    25M|\
  \   503   (5)| 00:00:07 |     1 |    28 |\n|   2 |   TABLE ACCESS FULL | SALES |\
  \   918K|    25M|   503   (5)| 00:00:07 |     1 |    28 |\n\n```\n\n现在我们看到优化器选择了一个更简单的计划。`VIEW`\
  \ 步骤被消除了，实际上现在的执行计划与没有子查询的 select 语句相同：\n\n```\nSQL> select * from sales;\n\n执行计划\n\
  \nPlan hash value: 1550251865\n\n| Id  | Operation           | Name  | Rows  | Bytes\
  \ | Cost (%CPU)| Time     | Pstart| Pstop |\n\n|   0 | SELECT STATEMENT    |   \
  \    |   918K|    25M|   503   (5)| 00:00:07 |       |       |\n|   1 |  PARTITION\
  \ RANGE ALL|       |   918K|    25M|   503   (5)| 00:00:07 |     1 |    28 |\n|\
  \   2 |   TABLE ACCESS FULL | SALES |   918K|    25M|   503   (5)| 00:00:07 |  \
  \   1 |    28 |\n\n```\n\n为了证明查询转换确实在起作用，我在下面展示一个嵌套 `select` 语句的例子，我们从执行计划中看到，优化器为每一层都添加了一个视图。这是因为我通过提示\
  \ `/*+ no_query_transformation */` 告诉了优化器不要使用任何查询转换。\n\n```\nSQL> select /*+ no_query_transformation\
  \ */ * from (select * from (select * from (\nselect * from sales)));\n执行计划\n\nPlan\
  \ hash value: 1018107371\n\n| Id  |Operation             |Name  |Rows  | Bytes |\
  \ Cost (%CPU)| Time     | Pstart| Pstop |\n\n|   0 |SELECT STATEMENT      |    \
  \  |  918K|    76M|   503   (5)| 00:00:07 |       |       |\n|   1 | PARTITION RANGE\
  \ ALL  |      |  918K|    76M|   503   (5)| 00:00:07 |     1 |    28 |\n|   2 |\
  \  VIEW                |      |  918K|    76M|   503   (5)| 00:00:07 |       | \
  \      |\n|   3 |   VIEW               |      |  918K|    76M|   503   (5)| 00:00:07\
  \ |       |       |\n|   4 |    VIEW              |      |  918K|    76M|   503\
  \   (5)| 00:00:07 |       |       |\n|   5 |     TABLE ACCESS FULL|SALES |  918K|\
  \    25M|   503   (5)| 00:00:07 |     1 |    28 |\n\n```\n\n如果我们回到本章开头的原始问题“这个查询可以简化吗？”，我们看到在这个简单情况下答案是“可以”。这在一定程度上回答了这个问题：“我们为什么要简化查询？”这个问题的答案是，基于成本的优化器知道一些规则，它可以使用这些规则来让执行引擎免于做某些工作。给出的例子非常简单，仅用于说明目的，但它确实解释了为什么我们需要进行查询转换。\n\
  \n你可能会问的下一个问题是，“如果 CBO 知道所有这些简化我查询的规则，为什么我还需要了解它，这和 SQLT 有什么关系？”让我先回答第二个问题。\n\n\
  SQLT 作为一个常规操作，会生成许多有用的不同文件。主要的一个是我们到目前为止看过的 HTML 文件，但也有跟踪文件。其中一个跟踪文件是“10053”跟踪文件，我将在下一节解释。第一个问题的答案很简单，那就是当\
  \ CBO 出错时，我们有时需要查看 10053 跟踪文件，以获取关于优化器在解析期间做出了哪些决策的更详细信息。然后你可以对照你认为合理的步骤来检查这些步骤，并判断优化器是否在犯错误，或者统计信息不足，或者有其他输入以某种方式影响了优化器，从而导致了性能不佳的\
  \ SQL。\n\n## 10053 跟踪文件\n\n10053 跟踪文件是请求跟踪一条 SQL 语句的结果。更准确地说，它是请求跟踪优化器为生成执行计划所采取的步骤。其内容冗长且隐晦，但如果你想了解查询转换过程中发生了什么，它极其有用。\n\
  \n## 如何获取 10053 跟踪文件？\n\nSQLTXPLAIN 会自动生成 10053 跟踪文件，并将其放在主报告目录中。它的文件名中包含 10053，所以很容易识别。这是来自\
  \ SQLT 报告目录的文件名示例：\n\n```\nsqlt_s89909_10046_10053_execute.trc\n```\n\n如果你想手动收集\
  \ 10053 跟踪文件（即不使用 SQLTXPLAIN），那么可以使用以下命令：\n\n```\nSQL> ALTER SESSION SET MAX_DUMP_FILE_SIZE\
  \ = UNLIMITED;\nSQL> ALTER SESSION SET TRACEFILE_IDENTIFIER = 'MY_10053_TRACE';\n\
  SQL> ALTER SESSION SET EVENTS '10053 TRACE NAME CONTEXT FOREVER, LEVEL 1';\nSQL>\
  \ select sysdate from dual;\nSQL> exit\n```\n\n\n## 跟踪文件的位置与命名\n\n在我的案例中，这会在我的电脑\
  \ `F:\\app\\Stelios\\diag\\rdbms\\snc1\\snc1\\trace` 目录下生成一个跟踪文件（文件扩展名为 `.trc`）。文件名为\
  \ `snc1_ora_2872_MY_10053_TRACE.trc`。具体位置取决于你的操作系统和系统参数。这就是为什么设置 `tracefile_identifier`\
  \ 参数很有用，它提供了一种简便方法，让你能在众多文件中轻松找到自己的文件。请注意，在我的例子中，实例名（snc1）和 ora 位于文件名的开头，然后是 `tracefile_identifier`\
  \ 的值，最后是标准扩展名构成了完整的文件名。我们还设置了 `max_dump_file_size=unlimited`，以防止文件恰好在到达感兴趣的部分时被截断。\n\
  \n## 10053 跟踪文件里有什么？\n\n我记得当我第一次查看 10053 文件时（那是很多年前了），心里想的是：*这些都是什么乱码，我怎么可能理解得了？*\
  \ 这些内容都没有文档记录，并且有许多、许多信息的简短代码无处可查。不过，情况并没有听起来那么糟：简单来说，10053 跟踪文件是基于成本的优化器在解析相关查询时“思考过程”的日志。它本质上是优化器考虑的每一个步骤的日志。它通常不被认为是面向用户的文件，所以尽管它纯文本，却相当难以理解且非常冗长。毕竟，这个文件的编写是为了调试优化过程，因此必须包含优化器所做的一切的详细信息。该文件是创建出来供支持人员修复在优化器中发现的问题的。据我所知，没有人试图让这个文件变得用户友好。图\
  \ 5-1 展示了一个来自 10053 跟踪文件的示例片段。\n\n![9781430248095_Fig05-01.jpg](img/9781430248095_Fig05-01.jpg)\n\
  \n图 5-1 . 一个示例 10053 跟踪文件的部分内容\n\n尽管 10053 跟踪文件中的文字难以理解，我们还是能看到一些开始变得有意义的信息片段。例如，我们提到过\
  \ NL 是 “nested loop” 的缩写，这是一种连接方式。我们看到正在分析 `USER$` 的访问路径。`USER$` 是此查询涉及的表之一。我们还看到对\
  \ Cost（成本）的引用（我们在第 1 章 和 第 2 章 中讨论过），以及看到对不同类型访问的引用。例如，index (FFS) – 这是 Index Fast\
  \ Full Scan 的缩写。这就是处理 10053 跟踪文件的方法。不要试图去理解它的每一行。你无法做到，因为除非你是 Oracle 的开发人员，否则有些行无法解码。有几种不同的方法可以获取\
  \ 10053 跟踪文件信息。最简单的方法是使用 SQLT XTRACT（如第 1 章所述）。这将生成一个 10053 跟踪文件并将其包含在 ZIP 文件中。然而，有时你并不需要\
  \ SQLT 提供的所有信息，也许你只想要 10053 跟踪文件本身，这种情况下，你可以使用 `DBMS_SQLDIAG` 包，只要你有感兴趣的 SQL 语句的\
  \ SQL ID。\n\n`DBMS_SQLDIAG` 的另一个优点是，你不需要执行该语句。只要你有 SQL ID，就可以获取 10053 跟踪文件。不过，此功能仅从\
  \ 11g Release 2 开始可用。步骤如下：\n\n1.  首先，我们通过知道 SQL 中的文本来查找 `sql_id`，我们可以搜索 `v$sql`。\n\
  2.  然后，我们可以使用 `dbms_sqldiag.dump_trace` 例程来获取 10053 跟踪文件。这会将跟踪文件放在 `user_dump_dest`\
  \ 位置，我们可以用任何文本编辑器查看它。\n\n让我们看看这些步骤的实际操作：\n\n```sql\nSQL> column sql_text format\
  \ a30\nSQL> select sysdate from dual;\nSYSDATE\n---------\n05-OCT-12\n\nSQL> select\
  \ sql_id from v$sql where sql_text like 'select sysdate from dual%';\n\nSQL_ID\n\
  -------------\n7h35uxf5uhmm1\n\nSQL> execute dbms_sqldiag.dump_trace(p_sql_id=>'7h35uxf5uhmm1',\n\
  \  p_child_number=>0,\n  p_component=>'Compiler',p_file_id=>'DIAG');\n\nPL/SQL procedure\
  \ successfully completed.\n\nSQL> show parameter user_dump_Dest\n\nNAME        \
  \          TYPE                             VALUE\n--------------------- --------------------------------\
  \ -------\nuser_dump_dest        string    f:\\app\\stelios\\diag\\rdbms\\snc1\\\
  snc1\\trace\n\nSQL> host dir f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\\\
  *DIAG*.trc\n Volume in drive F is My Passport\n Volume Serial Number is 1E65-69CC\n\
  \nDirectory of f:\\app\\stelios\\diag\\rdbms\\snc1\\snc1\\trace\n\n09/15/2012  12:41\
  \ PM              1,096 snc1_diag_2548.trc\n10/05/2012  12:54 PM             68,133\
  \ snc1_ora_4980_DIAG.trc\n              2 File(s)          69,229 bytes\n      \
  \        0 Dir(s)  788,285,857,792 bytes free\n\nSQL> host notepad f:\\app\\stelios\\\
  diag\\rdbms\\snc1\\snc1\\trace\\snc1_ora_4980_DIAG.trc\n```\n\n这种方法是事件基础设施的一部分，还有一个额外优势，即它可以捕获位于\
  \ PL/SQL 块内的 SQL 语句的跟踪。下面展示了一个例子。创建了一个包规范和包体来计算圆的面积。然后我们在 PL/SQL 包中识别 SQL ID，并仅跟踪匹配的语句。\n\
  \n```sql\nSQL> host type area.sql\ncreate or replace package getcircarea as\n  function\
  \ getcircarea(radius number)\n  return number;\nend getcircarea;\n/\n\ncreate or\
  \ replace package body getcircarea as\n  function getcircarea (radius number) return\
  \ number\n  is area number(8,2);\n  begin\n    select 3.142*radius*radius into area\
  \ from dual;\n    return area;\n  end;\n  end getcircarea;\n/\n\nset serveroutput\
  \ on size 100000;\n\ndeclare\n  area number(8,2);\n  begin\n    area:= getcircarea.getcircarea(10);\n\
  \    dbms_output.put_line('Area is '||area);\n  end;\n/\n\nSQL> select sql_text,\
  \ sql_id from v$sqlarea where sql_text like '%3.142%';\n\nSQL_TEXT             \
  \        SQL_ID\n--------------------------- -------------\nSELECT 3.142*:B1 *:B1\
  \ FROM DUAL  9rjmrhbjuasav\nselect sql_text, sql_id from v$sqlarea where sql_text\
  \ like '%3.142%' ggux6y542z8mr\n\nalter session set tracefile_identifier='PLSQL';\n\
  alter session set events 'trace[rdbms.SQL_Optimizer.*][sql:9rjmrhbjuasav]';\n\n\
  SQL> @area\n\nPackage created.\n\nPackage body created.\n\nArea is 314.2\n\nPL/SQL\
  \ procedure successfully completed.\n\nSession altered.\n\nSQL> host dir f:\\app\\\
  stelios\\diag\\rdbms\\snc1\\snc1\\trace\\*.trc\n Volume in drive F is My Passport\n\
  \ Volume Serial Number is 1E65-69CC\n\nDirectory of f:\\app\\stelios\\diag\\rdbms\\\
  snc1\\snc1\\trace\n\n10/06/2012  09:49 AM               2,593 snc1_dbrm_2404.trc\n\
  10/06/2012  09:46 AM               1,175 snc1_j000_4956.trc\n10/06/2012  09:46 AM\
  \             130,630 snc1_ora_4804_PLSQL.trc\n10/06/2012  06:00 AM            \
  \     973 snc1_vkrm_2948.trc\n               4 File(s)         135,371 bytes\n \
  \              0 Dir(s)  799,840,133,120 bytes free\n```\n\n不要再因为 SQL 在 PL/SQL 块内而借口说无法获取跟踪文件了。你可以之后用以下命令关闭该\
  \ SQL ID 的跟踪：\n\n```sql\nALTER SESSION SET EVENTS 'trace[rdbms.SQL_Optimizer.*]off';\n\
  ```\n\n收集 10053 的老方法是使用 `alter session`，前面提到过，这种方法效果很好。它也更容易记住，并且是迄今为止收集跟踪最受欢迎的方式，因为它适用于大多数版本的\
  \ Oracle。\n\n```sql\nALTER SESSION SET EVENTS '10053 trace name context forever,\
  \ level 1';\n```\n\n### 什么是查询转换？\n\n既然我们知道如何获取 10053（而 SQLT 使得这一点特别容易），我们需要看一些可以在其上执行的查询（以及一些查询转换）的示例。正如我们在本章前面提到的，查询转换是优化器为了将一条\
  \ SQL 语句改变为另一条逻辑上相同（并将给出相同结果）的 SQL 语句而执行的过程。\n\n以下是一些常见的查询转换及其代码：\n\n*   子查询解嵌套：`SU`\n\
  *   复杂视图合并：`CVM`\n*   连接谓词下推：`JPPD`\n\n\n"
- "# 查看 10053 跟踪文件与理解查询转换\n\n幸运的是，如果你想获得所有缩写及其含义的完整列表，可以在 10053 跟踪文件的“Legend”部分查看。请参考图\
  \ 5-2 中的示例。每个 10053 跟踪文件都会显示这样一个部分，它展示了所有 SQL 语句可能用到的所有查询转换。这个部分并不针对正在被分析的特定 SQL\
  \ 语句。\n\n![9781430248095_Fig05-02.jpg](img/9781430248095_Fig05-02.jpg)\n\n**图 5-2**  10053\
  \ 跟踪文件的 Legend 部分\n\n## 子查询非嵌套\n\n子查询非嵌套是我们列表中的第一个查询转换，其正式定义是：一种将子查询转换为外部查询中的连接的查询转换技术，这随后允许优化器将子查询中的表纳入连接顺序、访问路径和连接方法的考虑范围。我们将通过这个例子来探讨查询优化，因为它是一个常用的技术；相关的示例也易于解释和生成！\n\
  \n一个可以使用子查询非嵌套的示例查询是：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\nfrom employees\n\
  where\nhire_date IN (\nselect hire_date from employees where department_id = 30\n\
  );\n```\n\n子查询部分位于括号内，在这个子查询示例中我们使用了 `IN`。\n\n让我们看看当我们使用事件 10053 跟踪这个查询时会发生什么，如下所示：\n\
  \n```\nSQL> connect hr/hr\nConnected.\nSQL> alter session set max_dump_file_size=unlimited;\n\
  \nSession altered.\n\nSQL> alter session set events '10053 trace name context forever,\
  \ level 1';\n\nSession altered.\n\nSQL> select /*+ hard parse */ first_name, last_name,\
  \ hire_Date\n  2  from employees where hire_date in\n  3  (select hire_date from\
  \ employees where\n  4  department_id=30);\n\nFIRST_NAME           LAST_NAME   \
  \              HIRE_DATE\n-------------------- ------------------------- ---------\n\
  Den                  Raphaely                  07-DEC-02\nAlexander            Khoo\
  \                      18-MAY-03\nShelli               Baida                   \
  \  24-DEC-05\nSigal                Tobias                    24-JUL-05\nGuy    \
  \              Himuro                    15-NOV-06\nKaren                Colmenares\
  \                10-AUG-07\n\n6 rows selected.\n\nSQL> connect / as sysdba\nConnected.\n\
  SQL> show parameter user_dump_Dest\n\nNAME                                 TYPE\
  \        VALUE\n------------------------------------ ----------- ------------------------------\n\
  user_dump_dest                       string      f:\\app\\stelios\\diag\\rdbms\\\
  snc1\n                                                 \\snc1\\trace\n```\n\n跟踪文件位于\
  \ `user_dump_dest` 所指向的任何位置。如果我们编辑该跟踪文件，将看到图 5-3 中所示的头部信息。\n\n![9781430248095_Fig05-03.jpg](img/9781430248095_Fig05-03.jpg)\n\
  \n**图 5-3**  示例 10053 跟踪文件的第一页\n\n我们看到了通常的签名文本，告诉我们操作系统、Oracle 版本等信息。本次讨论的重要部分是确认我们期望解析的\
  \ SQL 语句是否出现在“Current SQL statement for this session”部分（位于图 5-3 的底部）。在我们的例子中，我们在原始\
  \ SQL 中添加了提示 `/*+ hard parse */`，这个提示也出现在了 10053 部分的“Current SQL section”下。因此我们可以基本确定这是正确的\
  \ SQL。\n\n那么，我们如何知道子查询非嵌套是否发生了呢？我们在 10053 跟踪文件中搜索与图 5-4 类似的文本。我们应该搜索“subquery unnesting”，但我在图中高亮了与子查询非嵌套相关的部分。注意这些行开头的“SU”。这告诉你优化器正在考虑该查询的子查询非嵌套转换。\n\
  \n![9781430248095_Fig05-04.jpg](img/9781430248095_Fig05-04.jpg)\n\n**图 5-4**  10053\
  \ 跟踪文件中的文本显示了子查询非嵌套的发生过程\n\n我们还可以看到转换后的新 SQL 是什么。请参阅图 5-5 来查看我们的测试查询被转换成了什么。\n\n\
  ![9781430248095_Fig05-05.jpg](img/9781430248095_Fig05-05.jpg)\n\n**图 5-5**  转换后的最终查询\n\
  \n这个查询在语义上看起来和原始查询一样吗？原始查询是：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_Date\n\
  from employees\nwhere\nhire_date IN (\nselect hire_date from employees where department_id\
  \ = 30\n);\n```\n\n而这是新的查询：\n\n```\nSelect\nfirst_name,\nlast_name,\nhire_date\n\
  from employees A, employees B\nwhere\nA.hire_date = B.hire_date\nand\nA.department_id=30;\n\
  ```\n\n通过上面这个相当简单的例子，我们了解了什么是子查询非嵌套。子查询非嵌套的目标是允许优化器可能使用其他连接方式或表顺序，以更高效地获得满意的结果。换句话说，通过移除子查询，我们给了优化器更多的自由去使用其他连接方式，因为我们把表名提升到了主查询的层级。子查询非嵌套有许多变体。例如，子查询可能使用\
  \ `NOT IN` 或 `NOT EXISTS`。我们不会涵盖这种技术的所有变体和组合，也不会介绍其他查询转换。（你可以轻松地就查询转换写一整本书。）只需知道\
  \ 10053 跟踪文件会列出它考虑过的内容并显示它所执行的操作。此时你应该问的问题是：“如果它能正常工作，我为什么要在意优化器‘底层’在做什么？”\n\n##\
  \ 为什么要禁用查询转换？\n\n在某些情况下，你可能希望关闭特定的转换：例如，当优化器的错误导致问题时。这可能是因为 Oracle 支持建议进行更改或指出某个查询转换存在问题。在你管理的系统上，你也可能会看到下面显示的一些隐藏参数。以下是一些可以影响\
  \ CBO（基于成本的优化器）进行查询转换的基于成本的优化器参数：\n\n*   `_complex_view_merging`\n*   `_convert_set_to_join`\n\
  *   `_unnest_subquery`\n*   `_optimizer_cost_based_transformation`\n*   `_optimizer_extend_jppd_view_types`\n\
  *   `_optimizer_filter_pred_pullup`\n*   `_optimizer_group_by_placement`\n*   `_optimizer_improve_selectivity`\n\
  *   `_optimizer_join_elimination_enabled`\n*   `_optimizer_join_factorization`\n\
  *   `_optimizer_multi_level_push_pred`\n*   `_optimizer_native_full_outer_join`\n\
  *   `_optimizer_order_by_elimination_enabled`\n*   `_optimizer_push_pred_cost_based`\n\
  *   `_optimizer_unnest_all_subqueries`\n*   `_optimizer_unnest_corr_set_subq`\n\
  *   `_optimizer_squ_bottomup`\n*   `_optimizer_null_aware_antijoin`\n*   `_pred_move_around`\n\
  *   `_push_join_predicate`\n\n以下是一些影响此行为的提示：\n\n*   `first_rows(n)`\n*   `no_query_transformation`\n\
  *   `unnest`\n*   `no_unnest`\n*   `push_pred`\n*   `no_push_pred`\n*   `push_subq`\n\
  *   `native_full_outer_join`\n*   `no_push_subq`\n*   `no_set_to_join`\n*   `qb_name`\n\
  \n\n\n这绝不是影响优化器的所有隐藏参数的完整列表。这些参数可用于开启或关闭某些功能。例如，`unnest_subquery` 的默认值为 `TRUE`（适用于\
  \ Oracle 9.0 及之后版本）。在大多数情况下，只有在你进行 SQL 调优，并发现某些提示或系统参数未能如预期般改变执行计划时，才会注意到相关问题。在某些情况下，仅仅是性能不足（或性能突然变化）这一迹象，就可能暗示存在问题。仅在\
  \ Oracle 支持人员要求时，才应设置这些参数。它们通常只在短时间内被设置，用于调试与这些转换相关的特定问题以及相关的错误，但你没有理由不向 Oracle\
  \ 提交服务请求，询问是否可以尝试某些操作。Oracle 的支持人员都非常乐于助人且通情达理（真的）。\n\n## 优化器参数\n\n幸运的是，10053 跟踪文件列出了优化器参数及其默认值，因此你可以判断是否有任何更改。在标题为\
  \ **“PARAMETERS USED BY THE OPTIMIZER”**（如 图 5-6 所示）的部分中，我们看到了这些参数的前几项条目。请注意，**“Compilation\
  \ Environment Dump”** 和 **“Bug Fix Control Environment”** 是同时存在于“已更改值”和“默认值”部分的小标题。在我们这个案例中，“已更改值”部分下的这两个小节都没有任何已更改的值。在“默认值”部分，第一个显示带有默认值的实际参数是\
  \ `optimizer_mode_hinted`（设置为 `false`）。所有参数（包括隐藏参数）都会列出。然而，自行尝试修改这些参数风险自负。如果支持人员要求你更改其中某个参数，那是因为他们正在帮助你解决与优化器相关的某些问题。另请注意，任何非默认参数都会在一个名为\
  \ **“PARAMETERS WITH ALTERED VALUES”** 的单独部分中显示。\n\n![9781430248095_Fig05-06.jpg](img/9781430248095_Fig05-06.jpg)\n\
  \n图 5-6 .  10053 跟踪文件的优化器参数部分\n\n举个例子，让我们看看如果将参数 `cursor_sharing` 从其默认值 `EXACT`\
  \ 更改为 `FORCE` 会发生什么。这里我们将 `cursor_sharing` 设置为 `FORCE`（之前是 `EXACT`）。然后我们请求一个 10053\
  \ 跟踪并执行一个查询；接着我们前往 `user_dump_dest` 查看 10053 跟踪文件，并找到包含参数的部分。以下是执行的命令：\n\n```\n\
  SQL> show parameter cursor_sharing\nNAME                                 TYPE  \
  \      VALUE\n------------------------------------ ----------- ---------------------------\n\
  cursor_sharing                       string      EXACT\n_optimizer_extended_cursor_sharing\
  \  = none\n_optimizer_extended_cursor_sharing_rel = none\n\nSQL> alter system set\
  \ cursor_sharing=FORCE scope=memory;\n\nSystem altered.\n\nSQL> alter session set\
  \ events '10053 trace name context forever, level 1';\n\nSession altered.\n\nSQL>\
  \ explain plan for select count(*) from dba_objects;\n\nExplained.\n```\n\n在下面的图（图\
  \ 5-7）中，我们看到 `cursor_sharing` 已被更改为 `force`。\n\n![9781430248095_Fig05-07.jpg](img/9781430248095_Fig05-07.jpg)\n\
  \n图 5-7 .  在这里我们看到参数 `cursor_sharing` 已被更改为 `FORCE`\n\n我们看到 10053 跟踪文件对于追踪隐藏和非隐藏的优化器参数非常有用。现在我们将看看优化器提示。\n\
  \n### 优化器提示\n\n如果你在 SQL 中使用任何优化器提示，检查这些提示是否被使用是一个好主意。优化器会尽力使用给予它的提示，但如果使用存在问题，则不会使用这些提示。优化器忽略提示的原因包括语法不正确或提示与其他提示冲突。如果提示正确，优化器将会使用它们。让我们看一个涉及我们之前处理的查询的例子。现在，凭借我们对子查询展开的了解，我们将以不同方式编写查询并尝试几个提示。首先，我们运行不带提示的查询并查看执行计划。它将显示一个哈希连接。然后我们将提示使用嵌套循环连接。我们会确认这一点，但再次查看执行计划。最后，我们将使用相互冲突的提示，并看到执行计划恢复为哈希连接。\n\
  \n```\nSQL> set autotrace traceonly explain;\nset lines 100\nselect\n  a.first_name,\
  \ a.last_name, a.hire_date\n  from employees a, employees b\n  where a.hire_date\
  \ = b.hire_date\n  and a.department_id=30\n/\nExecution Plan\n\nPlan hash value:\
  \ 2254211361\n\n| Id  | Operation                    | Name              | Rows\
