  \ BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION,\
  \ BOOKPRICE, AUTHOR) VALUES('B5','CHING CHONG: THE RISE AND FALL OF\n        JACKSON','343322221400','NIECA\
  \ BOOKS','2011','C1','A story about the misfortunes of Jackson\n        Junior as\
  \ he travels across Asia',12.99,'TARA WILLIAMS')\n    /\n    ```\n    ```sql\n \
  \   INSERT INTO BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n\
  \        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B6','UNFORTUNATE\n        CIRCUMSTANCES','115062221400','PARAMOUNT\
  \ BOOKS','2011','C1','Read about the unfortunate\n        circumstances of Ali,\
  \ someone you will absolutely not care about',19.99,'DANA T. ROLLS')\n    /\n  \
  \  ```\n    ```sql\n    INSERT INTO BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER,\
  \ BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B7','SCARY\
  \ LIONS','11553221400','PARAMOUNT\n        BOOKS','2011','C1','A book about the\
  \ greasy politicians in Mootawambaland and how Alex becomes\n        one of them',15.99,'TERRY\
  \ BARRACK')\n    /\n    ```\n    ```sql\n    INSERT INTO BOOKS(BOOKID, BOOKTITLE,\
  \ BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION,\
  \ BOOKPRICE, AUTHOR) VALUES('B8','THE LIME TREE','22113221400','ZACK\n        PUBLISHING','2011','C1','A\
  \ book about how Sally became a top salesperson when she decides to\n        sell\
  \ lime as lemon',16.99,'JAMES LEE')\n    /\n    ```\n\n2.  创建 `Inventory` 表如下：\n\
  \    ```sql\n    CREATE TABLE  \"INVENTORY\"\n       (    \"ID\" NVARCHAR2(255),\n\
  \            \"BOOKID\" NVARCHAR2(255),\n            \"COPIESINSTOCK\" NUMBER(9,3),\n\
  \             CONSTRAINT \"INVENTORY_PK\" PRIMARY KEY (\"ID\") ENABLE\n       )\n\
  \    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('1','B1',10)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('2','B2',15)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('3','B3',1)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('4','B4',6)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('5','B5',17)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('6','B6',9)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('7','B7',14)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
  \ VALUES('8','B8',9)\n    /\n    ```\n\n3.  创建 `Category` 表如下：\n    ```sql\n   \
  \ CREATE TABLE  \"CATEGORY\"\n       (    \"CATEGORYID\" NVARCHAR2(255),\n     \
  \       \"CATEGORYNAME\" NVARCHAR2(255),\n            \"DESCRIPTION\" NVARCHAR2(255),\n\
  \             CONSTRAINT \"CATEGORY_PK\" PRIMARY KEY (\"CATEGORYID\") ENABLE\n \
  \      )\n    /\n    ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME,\
  \ DESCRIPTION) VALUES('C1','FICTION','Fiction\n        selection')\n    /\n    ```\n\
  \    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION)\n \
  \       VALUES('C2','SCIENCEFICTION','Science Fiction Selection')\n    /\n    ```\n\
  \    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION) VALUES('C3','COMPUTERS','Computer\n\
  \        Books Selection')\n    /\n    ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID,\
  \ CATEGORYNAME, DESCRIPTION) VALUES('C4','HORROR','Best Horror\n        Selections')\n\
  \    /\n    ```\n\n#### 工作原理\n\n`Books` 表是主表，存储图书目录中的书籍列表；`Inventory` 表存储每本可用书籍的库存数量；`Category`\
  \ 表存储目录中可用的完整图书类别（流派）列表。表 10-1 描述了各个相应表中各种键之间的映射关系。\n\n**表 10-1.** 图书目录应用程序中不同表之间的外键映射\n\
  \n| **外键映射** | **描述** |\n| --- | --- |\n| `Books.BookID = Inventory.BookID` | 每本书在\
  \ Inventory 表中都有一个对应的条目，用于存储该书的库存数量详情。 |\n| `Books.BookCategory = Category.CategoryID`\
  \ | 每本书属于一个流派/类别，其详细信息存储在 Category 表中。存储在 `Books.BookCategory` 列中的 ID 用于查找 `Category`\
  \ 表中的对应条目。 |\n\n### 10-2. 创建页面以管理书籍列表\n\n#### 问题\n\n店主需要一种管理其图书目录中书籍列表的方法。\n\n####\
  \ 解决方案\n\n您必须首先创建允许仓库管理员在图书目录中添加、编辑和删除书目的表单。\n\n要创建允许仓库管理员添加/编辑/删除图书的页面，请遵循以下说明：\n\
  \n1.  创建一个名为 `图书目录` 的新 `Database` 应用程序。\n2.  在创建应用程序向导的 `页面` 步骤中，选择链接到 `Books` 表的\
  \ `报表和表单` 页面类型，如 图 10-1 所示。\n\n![images](img/1001.jpg)\n\n**图 10-1.** 添加报表和表单\n\n\
  3.  点击 `添加页面` 按钮以添加表单和报表。完成后，结束向导以创建应用程序。\n4.  您现在应该看到如 图 10-2 所示的界面。\n\n![images](img/1002.jpg)\n\
  \n**图 10-2.** 应用程序中的当前页面列表\n\n5.  如果您启动主 Books 表单，您应该看到如 图 10-3 所示的界面。\n\n![images](img/1003.jpg)\n\
  \n**图 10-3.** 图书详情录入表单\n\n6.  来自 图 10-3 的图书详情录入表单允许仓库管理员向图书目录添加新书，但该表单尚不完整。`BookCategory`\
  \ 字段应显示一个类别下拉列表，以便仓库管理员可以从列表中选择类别，而无需手动输入类别代码。\n7.  编辑该表单。在 `页面渲染` 部分，右键单击 `P1_BOOKCATEGORY`\
  \ 字段，然后选择编辑该字段（如 图 10-4 所示）。\n\n![images](img/1004.jpg)\n\n**图 10-4.** 编辑图书类别字段\n\
  \n8.  在字段属性页面中，将 `显示为` 字段从 `文本字段` 更改为 `选择列表`，如 图 10-5 所示。\n\n![images](img/1005.jpg)\n\
  \n**图 10-5.** 更改“显示为”字段\n\n9.  向下滚动到 `值列表` 区域，并指定以下 SQL：\n    ```sql\n    SELECT\
  \ Description, CategoryID FROM Category\n    ```\n10. 您现在应该看到如 图 10-6 所示的界面。\n\n\
  ![images](img/1006.jpg)\n\n**图 10-6.** 为值列表区域指定 SQL\n\n11. 保存您的更改并运行表单。您应该能够从值列表中选择图书类别，如\
  \ 图 10-7 所示。\n\n![images](img/1007.jpg)\n\n**图 10-7.** 实际运行中的图书类别选择列表\n\n12. 让我们转向之前生成的报表。当您在应用程序中运行该报表时，您应该看到如\
  \ 图 10-8 所示的图书列表。\n\n![images](img/1008.jpg)\n\n**图 10-8.** 图书列表\n\n13. 此时还有一件事需要完成，即更改\
  \ `BookCategory` 列，使其显示完整的类别描述而不是类别代码。为此，请编辑报表。\n\n![images](img/square.jpg) **提示**\
  \ 您可能还想更改报表列的标题，以显示更用户友好/可读的标题。您可以通过编辑报表列并更改 `列标题` 字段来实现。\n\n14. 在报表的 `页面渲染` 区域，右键单击\
  \ `Books` 节点，然后选择 `编辑` 链接（如 图 10-9 所示）。\n\n![images](img/1009.jpg)\n\n**图 10-9.**\
  \ 编辑 Books 区域\n\n15. 向下滚动到报表源，并将现有的 SQL 更改为以下内容：\n    ```sql\n    select\n     \
  \ \"BOOKID\",\n      \"BOOKTITLE\",\n      \"CATEGORY\".\"DESCRIPTION\" \"BOOKCATEGORY\"\
  ,\n      \"BOOKISBN\",\n      \"BOOKPUBLISHER\",\n      \"BOOKEDITION\",\n     \
  \ \"BOOKDESCRIPTION\",\n      \"BOOKPRICE\",\n      \"AUTHOR\",\n      dbms_lob.getlength(\"\
  BOOKIMAGE\") \"BOOKIMAGE\"\n    from \"BOOKS\" LEFT JOIN \"CATEGORY\" ON \"BOOKS\"\
  .\"BOOKCATEGORY\" = \"CATEGORY\".\"CATEGORYID\"\n    ```\n16. 您现在应该看到如 图 10-10 所示的界面。\n\
  \n![images](img/1010.jpg)\n\n**图 10-10.** 更改区域源的 SQL\n\n17. 应用更改并再次运行报表。请注意，报表显示完整的类别名称而不是类别代码，如\
  \ 图 10-11 所示。\n\n![images](img/1011.jpg)\n\n**图 10-11.** 报表中显示的图书完整类别名称\n\n18. 尝试通过您新创建的表单/报表上传图书照片。在报表中，通过单击每行最左侧的编辑图标来编辑一本书。\n\
  19. 浏览图书图片并通过表单上传，如 图 10-12 所示。保存对记录的所有更改。\n\n![images](img/1012.jpg)\n\n**图 10-12.**\
  \ 上传图书图片\n\n20. 要确认图片已成功上传，请再次编辑该记录；这次您会在控件旁边看到一个 `下载` 链接。单击下载链接将带您到上传的图片文件，如 图\
  \ 10-13 所示。\n\n![images](img/1013.jpg)\n\n**图 10-13.** 示例图书图片\n\n21. 为 `Books` 表中的所有其他图书上传您自己的照片。\n\
  \n#### 工作原理\n\n正如本书前面章节所演示的，APEX 允许您轻松地从数据库表创建表单和报表组合。这反过来又让您能够轻松快速地在应用程序中设置 CRUD（创建、读取、更新和删除）功能。\n\
  \n本书前面章节还介绍了如何使用从指定 SQL 语句动态生成的值列表（LOV）。如本配方所见，LOV 可用作选择列表（下拉菜单）的数据源。\n\n## 练习 10-1：创建页面以管理类别列表和图书库存\n\
  \n作为一个练习，我留给您来创建表单和报表页面，以管理图书目录应用程序中不同的类别列表以及图书库存。方法与本配方中概述的步骤类似。使用 `Category` 和\
  \ `Inventory` 表作为这些页面的基础。\n\n要验证您的操作是否正确，您应该得到如下的类别列表报表。这将为仓库管理员提供一个界面，用于管理图书目录中可用的图书类别。\n\
  \n![images](img/p296-01.jpg)\n\n对于库存报表，您最终应该得到如下的报表。要在报表中显示书名以代替图书 ID，您可以使用以下 SQL：\n\
  \n```sql\nselect \"ID\",\n  \"BOOKS\".\"BOOKTITLE\" \"BOOKID\",\n  \"COPIESINSTOCK\"\
  \nfrom \"#OWNER#\".\"INVENTORY\" LEFT JOIN \"BOOKS\" ON \"INVENTORY\".\"BOOKID\"\
  = \"BOOKS\".\"BOOKID\"\n```\n\n![images](img/p297-01.jpg)\n\n库存报表和表单将允许仓库管理员管理（和查看）图书目录中每本图书的库存数量。\n\
  \n### 10-3. 设置图书目录前端\n\n#### 问题\n\n您在配方 10-2 中完成了目录后端的大部分工作。现在，您需要配套的前端门户，以典型的在线图书目录格式向公众展示目录中可用的图书列表。\n\
  \n\n#### 解决方案\n\n创建目录前端，请按照以下步骤操作：\n\n1.  在同一个 `Book catalog` 应用程序中，创建一个新的报表。\n\
  2.  在向导中，选择创建一个经典报表。\n3.  将此报表命名为 \"`My Mini Book catalog`\"，并将区域标题设置为 \"`Browse\
  \ our books`\"。\n4.  在报表的 SQL 查询部分，编写以下 SQL：`SELECT \"BOOKID\", \"BOOKTITLE\",\"\
  BOOKISBN\",\"BOOKPUBLISHER\",\"BOOKEDITION\",\"BOOKCATEGORY\",\"BOOKDESCRIPTION\"\
  ,\"BOOKPRICE\",\"AUTHOR\", dbms_lob.getlength(\"BOOKIMAGE\") \"BOOKIMAGE\" FROM\
  \ Books`\n5.  完成向导以创建报表。创建完成后，再次编辑该报表。你应该能看到如 图 10-14 所示的屏幕。\n\n    ![images](img/1014.jpg)\n\
  \n    **图 10-14.** 更改区域源的 SQL\n\n6.  使用默认设置完成向导的其余部分。\n7.  如果你运行报表，应该会看到如 图 10-15\
  \ 所示的标准布局。\n\n    ![images](img/1015.jpg)\n\n    **图 10-15.** 标准报表布局\n\n8.  当然，这个布局是可行的，但它并不是一个非常用户友好的图书目录。如果能以如\
  \ 图 10-16 所示的格式列出每个条目会更好。\n\n    ![images](img/1016.jpg)\n\n    **图 10-16.** 前端目录中图书列表的期望布局\n\
  \n9.  首先，你需要稍微修改报表，以便实际图书图像能显示在每一行中。为此，请编辑报表。在报表的页面呈现区域中，右键单击 `BookImage` 列并选择编辑。\n\
  10. 在 `Number/Date Format` 字段中，输入以下文本：`IMAGE:BOOKS:BOOKIMAGE:BOOKID`\n11. 现在你应该能看到如\
  \ 图 10-17 所示的屏幕截图。\n\n    ![images](img/1017.jpg)\n\n    **图 10-17.** 设置 Number/Date\
  \ 格式以在报表中显示图像\n\n12. 保存更改并返回到报表的主页定义区域。\n13. 单击 `Report Attributes` 选项卡。更改列的排序，使\
  \ `BookImage` 列首先显示，如 图 10-18 所示。\n\n    ![images](img/1018.jpg)\n\n    **图 10-18.**\
  \ 调整 BOOKIMAGE 列的查看顺序\n\n14. 保存更改并运行报表。现在你应该能看到类似 图 10-19 的内容。\n\n    ![images](img/1019.jpg)\n\
  \n    **图 10-19.** 报表中显示的图书图像\n\n15. 再次编辑报表。在报表的页面呈现区域中，右键单击 \"`Browse our books`\"\
  \ 区域并选择编辑。单击 `Reports Attribute` 选项卡。\n16. 在列列表中，隐藏除 `BOOKIMAGE` 和 `BOOKTITLE` 列之外的所有列（取消勾选\
  \ `Show` 列中的复选框），如 图 10-20 所示。\n\n    ![images](img/1020.jpg)\n\n    **图 10-20.**\
  \ 隐藏所有其他列\n\n17. 保存你的更改，并再次编辑报表。\n18. 在页面呈现区域中，右键单击 `BOOKTITLE` 字段并进行编辑。\n19. 滚动到\
  \ `Column Formatting` 区域，在 `HTML Expression` 字段中，输入以下 HTML：`<b>Title :</b> #BOOKTITLE#<br>\
  \ <b>Author :</b> #AUTHOR#<br> <b>Publisher :</b> #BOOKPUBLISHER#<br> <b>Price :</b>\
  \ USD #BOOKPRICE#<br> <b>Description :</b> #BOOKDESCRIPTION#<br>`\n20. 现在你应该能看到如\
  \ 图 10-21 所示的屏幕。\n\n    ![images](img/1021.jpg)\n\n    **图 10-21.** 通过 HTML Expression\
  \ 字段为行定义显示模板\n\n21. 保存并应用更改。现在尝试再次运行报表。你现在应该能看到图书以更用户友好且易读的方式排列，如 图 10-22 所示。\n\n\
  \    ![images](img/1022.jpg)\n\n    **图 10-22.** 图书目录前端的修订布局\n\n#### 工作原理\n\n`HTML\
  \ Expression` 字段允许你定义自己的模板，用于显示报表中每一行的列数据。使用 `#FIELDNAME#` 符号，你可以在 HTML 块中显示来自任何报表列的数据。\n\
  \n![images](img/square.jpg) **提示** 同样，你可能希望通过提供更直观的列标题来整理你的界面。\n\n### 10-4. 更改应用程序的主页\n\
  \n#### 问题\n\n`Book catalog` 应用程序当前的主页是管理后端图书报告。你希望将其更改为目录前端页面。\n\n#### 解决方案\n\n\
  要更改应用程序的主页，请按照以下说明操作：\n\n1.  在同一个 `Book catalog` 应用程序中，单击 `Shared Components` 图标。\n\
  2.  在 `Security` 区域下，单击 `Security Attributes` 链接，如 图 10-23 所示。\n\n    ![images](img/1023.jpg)\n\
  \n    **图 10-23.** Security Attributes 链接\n\n3.  在随后出现的页面中，将主页链接属性中的页码从 1 更改为你前端目录页面的页码。例如，如果你的前端目录页面页码是\
  \ 9，你的主页链接属性应设置为：`f?p=&APP_ID.:9:&SESSION.`\n4.  保存并应用更改。现在通过单击 `Run Application`\
  \ 图标运行你的应用程序。应用程序现在会将你重定向到前端目录页面。\n\n#### 工作原理\n\n如 第 9 章 所述，APEX 中指向页面的典型链接具有以下格式：\n\
  \n`f?p=(ApplicationID):(PageNumber):(SessionID):::::`\n\n此配方向你展示了 `&APP_ID.` 和 `&SESSION.`\
  \ 替换标签，它们分别用于在最终生成的链接中动态放置应用程序 ID 和会话标识符。在此配方中，页码（id: `9`）在链接中是硬编码的。\n\n### 10-5.\
  \ 为仓库管理员创建库存统计报告\n\n#### 问题\n\n仓库管理员的老板希望看到按类型（类别）统计图书数量（库存统计）的可视化报告（饼图）。\n\n####\
  \ 解决方案\n\n要创建库存统计饼图，请按照以下说明操作：\n\n1.  在同一个 `Book catalog` 应用程序中，创建一个新页面。\n2.  选择\
  \ `Chart` 页面类型，并在向导的下一步中，选择 `Flash Chart` 类型。\n3.  选择 `Pie & Doughnut` 图表类型，如 图\
  \ 10-24 所示。\n\n    ![images](img/1024.jpg)\n\n    **图 10-24.** Pie & Doughnut 图表类型\n\
  \n4.  在向导的下一步中选择 `3D Pie` 图表类型，并在页面名称和图表标题中输入 \"`Stockcount by Genre`\"。\n5.  当系统提示你输入图表的\
  \ SQL 数据源时，输入以下 SQL：`SELECT NULL LINK, Category.CategoryName LABEL, SUM(Inventory.CopiesInStock)\
  \ VALUE FROM Category,Books,Inventory WHERE Category.CategoryID= Books.BookCategory\
  \ AND Books.BookID=Inventory.BookID GROUP BY Category.CategoryName`\n6.  现在你应该能看到如\
  \ 图 10-25 所示的屏幕。\n\n    ![images](img/1025.jpg)\n\n    **图 10-25.** 定义图表的 SQL 数据源\n\
  \n7.  完成向导并运行页面。你应该能立即看到按类别计算的图书总数，如 图 10-26 所示。\n\n    ![images](img/1026.jpg)\n\
  \n    **图 10-26.** 运行中的库存统计图表\n\n#### 工作原理\n\n正如你在本书前面看到的，你可以轻松地从 SQL 语句生成各种可视化图表。在此配方的示例中，你结合了三个不同表的信息，以检索每个不同图书类别的库存总量。\n\
  \n### 10-6. 设置中央管理页面\n\n#### 问题\n\n你现在有各种页面，但它们都是分散的。你需要提供一个中央管理页面，仓库管理员可以从这里导航到各个管理页面。\n\
  \n\n\n#### 解决方案\n\n首先，您必须设置一个导航列表。为此，请按照以下步骤操作：\n\n1.  在同一个 `Book catalog` 应用程序中，点击\
  \ `Shared Components` 图标。\n2.  在 `Navigation` 区域，点击 图 10-27 所示的 `Lists` 链接。\n\n\
  \    ![images](img/1027.jpg)\n\n    ***图 10-27.** Lists 链接*\n\n3.  点击右上角的 `Create`\
  \ 按钮，创建一个新的导航列表。\n4.  在向导的第一步，将导航列表命名为 \"`AdministrationOptions`\"。\n5.  在向导的下一步，创建以下四个条目：\n\
  \    *   Book Categories\n    *   Inventory & Stockcount\n    *   Books Listing\n\
  \    *   Stockcount by Genre report\n6.  通过点击每个 `Target Page ID or Custom URL` 框旁边的小箭头图标，并从弹出窗口中选择要链接到的正确页面，将每个项目绑定到其各自的报表页面。如\
  \ 图 10-28 所示。\n\n    ![images](img/1028.jpg)\n\n    ***图 10-28.** 设置导航列表*\n\n7.\
  \  完成后，完成向导以创建列表。\n\n现在您已经创建了导航列表，需要将其托管在一个页面内——即中央管理页面。要设置此页面，请按照以下步骤操作：\n\n1.\
  \  在同一个 `Book catalog` 应用程序中，创建一个新的空白页面。\n2.  指定 \"`Administration`\" 作为页面名称。\n\
  3.  使用默认设置完成向导的其余步骤，以创建一个空白页面。\n4.  选择编辑该页面。\n5.  在 `Page Rendering` 区域，右键单击 `Regions`\
  \ 节点，并选择创建新区域。\n6.  选择 List 区域类型，如 图 10-29 所示。\n\n    ![images](img/1029.jpg)\n\n\
  \    ***图 10-29.** 创建 List 区域*\n\n7.  将 \"`Please pick an option below`\" 设置为该区域的标题。\n\
  8.  在向导的 `Source` 步骤中，选择您之前创建的 `AdministrationOptions` 列表，如 图 10-30 所示。\n\n    ![images](img/1030.jpg)\n\
  \n    ***图 10-30.** 为区域选择 AdministrationOptions 列表*\n\n9.  点击 `Create List Region`\
  \ 按钮完成向导。\n10. 现在运行该页面。您应该会看到指向各个管理页面的各种链接，如 图 10-31 所示。尝试点击每个链接以确保您能跳转到正确的页面。\n\
  \n    ![images](img/1031.jpg)\n\n    ***图 10-31.** 运行中的中央管理页面*\n\n#### 工作原理\n\n\
  导航列表提供了一种简单的方法来设置一组链接，这些链接可以直接显示（如本方案所示），甚至可以托管在下拉菜单中。\n\n设置导航列表实际上还有一个附带好处。一旦设置好，它可以在应用程序中被多次重用。这可以简化您应用程序未来的维护工作。例如，当需要删除一个链接时，您不必遍历应用程序中的每个位置去删除该链接。您只需将其从导航列表中移除，所有使用该导航列表的区域都会立即更新。\n\
  \n### 10-7. 在您的应用程序中创建标签页\n\n#### 问题\n\n您有一个中央管理页面——这很好。但是您如何从您的主目录页面（即前端目录页面）导航到那里呢？您意识到您需要标签页。\n\
  \n#### 解决方案\n\n要在您的应用程序中创建标签页，请按照以下步骤操作：\n\n1.  在同一个 `Book catalog` 应用程序中，点击 `Shared\
  \ Components` 图标。\n2.  在 `Navigation` 区域下，点击 图 10-32 所示的 `Tabs` 链接。\n\n    ![images](img/1032.jpg)\n\
  \n    ***图 10-32.** 导航区域中的 Tabs 链接*\n\n3.  在随后出现的页面上，点击右上角的 `Manage Tabs` 按钮。\n\
  4.  点击 `Edit Standard Tabs` 选项卡。\n5.  从此列表中移除所有现有的标签页（如果存在条目，请点击 `Edit` 图标，然后在后续页面点击\
  \ `Delete` 图标）。\n6.  您现在应该看到如 图 10-33 所示的屏幕。\n\n    ![images](img/1033.jpg)\n\n\
  \    ***图 10-33.** 移除所有标准标签页*\n\n7.  现在点击 `Manage Tabs` 选项卡，然后点击 图 10-34 中高亮显示的小添加按钮。\n\
