  ## 关于作者


  ![image](img/edmund_tan_zehoo.jpg) ![images](img/square.jpg) **Edmund Tan Zehoo**
  是新加坡一家电子表单与工作流解决方案供应商的首席技术官。他曾担任多个快速应用开发和工作流产品的首席架构师，其中最受欢迎的产品之一是 Rapidflows。过去八年，他还为新加坡的大型公司和政府机构构建了托管在
  Oracle 数据库之上的高性能 .NET 解决方案。


  Edmund 是新加坡和马来西亚各种工作流会议的常客，他不断宣扬将 Oracle 与 .NET 框架结合使用的协同力量。在空闲时间，他喜欢探索大脑和心智的内部运作，最终目标是编写智能软件来模拟心智的行为。他也是技术奇点的坚定信仰者。


  ## 关于技术评审


  ![image](img/guillermo_alan_bort.jpg) ![images](img/square.jpg) **Guillermo Alan
  Bort** 在支持模式转向基于 Web 的 Oracle Support 之前，就开始了作为 Oracle 客户一线支持的工作。起初，他的兴趣领域是 Linux
  系统管理、Oracle 数据库和 Oracle 应用；后来，他专注于 Oracle 数据库，在大规模环境中处理高可用性和灾难恢复场景。他曾为多家公司提供外包数据库管理服务，并开发了多个
  APEX 应用程序来跨区域团队控制和共享信息。


  ## 第 1 章




  '
- "# Oracle APEX 简介\n\n我仍然记得十年前为一家猎头公司部署了我的第一个 `Microsoft Access` 应用程序。他们拥有大约 200\
  \ 名用户（我仿佛已经听到你们中一些人的抱怨声），并且需要一个系统来管理求职者和希望雇佣他们的公司。然后，他们给了我这个只有两个人的微不足道的开发团队一个“不可妥协”的一个月期限，要求我们在这一个月内完成系统的构思、开发和测试——并在之后立即上线。\n\
  \n任何一个有自尊心的企业开发团队都会对这个荒谬的时间安排一笑置之，但由于一些我们自己也不清楚的原因（尽管我认为这份工作提供的丰厚报酬与我们的决定有关），我们决定尝试一下。我们求助于遥远的\
  \ `快速应用程序开发（RAD）` 领域。我们找到了一个匹配的工具 `Microsoft Access`，在确认实际用户并发率足够低，可以绕过 `Access`\
  \ 的并发限制后，我们接下了这份工作。\n\n我们这个两人团队成功地在一个月的时间内开发并部署了该应用程序，这家机构在升级系统前至少使用了它五年。这个故事的关键点在于，如果没有\
  \ `RAD` 工具，有些项目可能永远无法面世。直到今天，像我这样的故事仍在互联网的许多角落回响。\n\n自那时起，`RAD` 工具已经取得了长足的进步。既然现在大多数企业解决方案完全部署在\
  \ `Web` 上，`RAD` 工具跟上这一趋势也就顺理成章了，而它们也确实做到了。从更简单的应用程序创建工具，如基于云的 `Zoho App Creator`\
  \ 和 `Google Apps`，到更“严肃”的工具如 `APEX` 和 `Ruby on Rails`，它们都已在 `Web` 上首次亮相；现在，任何人要建立自己的销售团队应用程序或在线书店应用程序，并将它们全部托管在\
  \ `互联网` 上，都变得前所未有的容易，只需（比喻性地）点击一下按钮。\n\n`RAD` 工具在业务场景中表现得异常出色；首先是因为业务应用程序通常是 `基于\
  \ Web 的`，其次是因为它们主要由 `CRUD（创建、读取、更新和删除）` 操作组成，这些是每个 `以数据库为中心` 的应用程序的核心原子操作。出于同样的原因，`APEX`\
  \ 是其中的佼佼者；它与 `Oracle` 数据库紧密集成，并通过 `PL/SQL` 很好地处理 `CRUD`。`APEX` 作为一个平台位于数据库之上，正因如此，你从\
  \ `APEX` 开发出的应用程序享有数据库可用的所有好处（例如，集群支持）。\n\n在本章中，你将通过几个实践案例来了解 `APEX`，这些案例将帮助你快速上手并运行\
  \ `APEX`。这些案例也将作为一种入门指南，让你熟悉基本的 `APEX` 概念。你还将学习如何使用 `APEX` 中提供的一些团队开发工具。\n\n###\
  \ 1-1. 决定是否使用 APEX\n\n#### 问题\n\n你的老板刚给你分配了一个新项目。你不确定 `APEX` 是否是适合该项目的工具。\n\n####\
  \ 解决方案\n\n`APEX` 提供更短的开发时间和易用性，但在某些情况下，它并非项目的最佳工具。在使用一个工具之前，了解其全部功能和局限性很重要。如果满足以下条件，请考虑为项目使用\
  \ `APEX`：\n\n*   目标应用程序是一个 `基于 Web 的` 应用程序，主要由 `CRUD` 操作组成。\n*   `Oracle` 是你的应用程序唯一需要支持的数据库，或者迁移到不同数据库供应商的可能性极小。\n\
  *   你的项目开发时间紧迫。\n*   你的开发方法论要求快速、连续的原型迭代，或者需求经常变化。\n*   你的应用程序需要处理高交易量。\n*   你的开发团队精通\
  \ `PL/SQL` 和 `JavaScript`。\n\n在以下情况下，请避免使用 `APEX`：\n\n*   你的应用程序包含需要非 `CRUD` 架构的模块，例如消息驱动或事件驱动的架构。\n\
  *   你的应用程序需要在逻辑层和表示层都有很高的对象重用性，并且需要严格遵循传统的框架，如 `面向对象编程（OOP）` 或 `模型-视图-控制器（MVC）`。\n\
  *   你的应用程序包含复杂的表单，每页超过 100 个数据库项目（例如：可输入字段）。（我想指出，从用户界面的角度来看，在单个页面中放置 100 个或更多字段是非常糟糕的设计。但是，你的项目需求可能无论如何都要求你这样做。如果是这样，请记住\
  \ `APEX` 的这个限制。）\n*   你的应用程序包含的报表需要在同一个报表中显示超过 100 列。\n*   你的应用程序包含的表需要超过两列作为主键。\n\
  \n\n\n#### 工作原理\n\n如前所述，APEX 非常适用于基于 CRUD 的 Web 业务应用程序，并作为平台位于 Oracle 数据库之上。APEX\
  \ 能很好地做到这一点，因为其核心是利用 PL/SQL 语言来处理构建于其上的应用程序的业务逻辑，而 PL/SQL 是所有数据库 CRUD 操作的基础。一个好的衡量标准是，如果应用程序中\
  \ 75% 以上是 CRUD 操作，那么使用 APEX 将能显著减少开发应用程序所需的时间和精力。\n\n此外，APEX 是一个快速应用程序开发工具，许多开发人员都曾证实\
  \ RAD 产品如何使他们能够在数周内（而非数月）部署大型系统（包括我在本书开篇部分提到的自己）。APEX 也适用于采用软件开发方法的团队，这些方法的需求集在不断演进，例如敏捷开发，或是那些频繁需要连续原型迭代的方法。APEX\
  \ 同样适合大规模部署。考虑这些数据：Oracle 在 [`http://apex.oracle.com`](http://apex.oracle.com) 提供了一个免费的\
  \ APEX 实例，平均每周接收 140 万到 150 万次页面浏览，并托管着超过 10,000 个工作区。\n\nAPEX 应用程序实际上运行在 Oracle\
  \ 数据库内部；其代码模块主要由 PL/SQL 组成，任何应用程序、表单和报表都作为元数据存储在数据库表中。因为业务逻辑、用户界面和数据都存储在数据库中，APEX\
  \ 的优势在于消除了其他平台所需的额外网络往返开销，那些平台需要在业务层和数据层之间频繁通信。因此，APEX 应用程序的性能轻松超越传统的三层架构应用程序。\n\
  \n然而，APEX 并非独立于数据库，因此存在被数据库供应商锁定的风险。例如，将 APEX 应用程序从 Oracle 数据库迁移到基于 Microsoft SQL\
  \ Server 的数据库，几乎肯定意味着需要从头开始重写整个应用程序。在考虑是否在项目中使用 APEX 时，重要的是考虑应用程序需要支持的数据库范围。\n\n\
  在使用 APEX 时，还应注意几个技术限制，特别是在单个页面上可托管的数据库项目数量方面。表 1-1 列出了 Oracle 网站上所述的当前 APEX 的一些限制。\n\
  \n**表 1-1.** APEX 组件限制\n\n| **组件** | **描述** |\n| --- | --- |\n| `Interactive reports`\
  \ | 单个页面支持一个交互式报表。每个交互式报表最多 100 列。 |\n| `Classic reports` | 每个经典报表最多 100 列。 |\n\
  | `Forms` | 每页 100 个可输入项（输入字段）。文本区域或富文本编辑控件最多可输入 32767 字节。主键最多两列。 |\n| `Tabular\
  \ forms` | 每页最多一个向导生成的表单表格。最多 50 个可编辑的表单表格列。 |\n| `Item names` | 使用绑定变量语法引用的项目名称最长\
  \ 30 个字符。 |\n| `Validations` | 为验证输入的文本最长 3,950 个字符。 |\n\nAPEX 的大部分业务逻辑开发都是使用 PL/SQL\
  \ 完成的。虽然 PL/SQL 在一定程度上支持函数和代码可重用性，但这并未扩展到业务层之外。例如，在传统的开发工具中，你可以创建不同的按钮，这些按钮都继承自一个包含通用行为集合的通用按钮类。这种面向对象编程在用户界面层面的支持在\
  \ APEX 中并不提供。\n\n最后，重要的是要记住 APEX 是一个具有标准行为和功能的平台。它不提供与传统开发工具相同的自由度，因此，如果你需要实现 APEX\
  \ 未开箱即用的某些功能，你将需要亲自动手使用 JavaScript、AJAX 和 DHTML。\n\n### 1-2. 确定 APEX 部署模型\n\n####\
  \ 问题\n\n你想要部署 APEX。你听说有几种不同的方法，但不确定哪种部署模型适合你的需求。\n\n#### 解决方案\n\n部署 APEX 时的主要决策点是决定使用哪个\
  \ HTTP 服务器来提供你的 APEX 应用程序服务。Oracle 提供两种类型的 HTTP 服务器：\n\n*   Oracle XML DB HTTP Server（嵌入式\
  \ PL/SQL 网关）\n*   Oracle HTTP Server 和 mod_plsql\n\n如果符合以下情况，请选择 Oracle XML DB HTTP\
  \ Server：\n\n*   你希望采用更简单的两层部署（Web 浏览器和数据库服务器）。\n*   你的首要目标是以最少的配置，在尽可能短的时间内启动并运行。\n\
  *   你不希望安装单独的服务器来托管 HTTP 服务器。\n*   你将 APEX 部署在作为独立系统的个人 PC 上。\n\n如果符合以下情况，请选择 Oracle\
  \ HTTP Server 和 mod_plsql 方法：\n\n*   你希望采用完整的三层部署（Web 浏览器、HTTP Web 服务器和数据库服务器）。\n\
  *   你将 APEX 部署在企业环境中，并且需要访问广泛的 Web 服务器配置和日志设置。\n*   你打算将 APEX 应用程序暴露在互联网上。这涉及到安全目的，将在“工作原理”部分详细解释。\n\
  *   你需要单点登录集成。\n*   你需要中间层负载均衡和故障转移功能。\n\n\n\n#### 工作原理\n\nOracle XML DB HTTP 服务器包含嵌入式\
  \ PL/SQL 网关，它与标准的 Oracle 数据库安装一起安装。嵌入式 PL/SQL 网关在 Oracle XML DB HTTP 服务器中运行。这如 图\
  \ 1-1 所示。\n\n![images](img/0101.jpg)\n\n`图 1-1.` 使用 Oracle XML DB HTTP 作为您的 Web\
  \ 服务器\n\n这种部署是一个两层模型，易于设置。APEX 引擎和嵌入式 PL/SQL 网关存在于同一个数据库中。请注意，在某些情况下，两层部署可能不是理想的选择，尤其是从安全角度来看。例如，如果您计划将\
  \ APEX 应用程序暴露到互联网上，这种部署模型可能就不合适，因为 HTTP 监听器无法与数据库分离，这样您也会将数据库直接暴露给互联网。\n\n由于 Web\
  \ 服务器和数据库紧密耦合而产生的另一个缺点是，如果数据库停机，您的 Web 服务器也将关闭；这将阻止访问静态数据，如静态网页或图像。\n\n嵌入式 PL/SQL\
  \ 网关也不提供中间层负载均衡或故障转移功能。为了扩展系统，您将需要依赖数据库级别的 Oracle 真应用集群（`RAC`）技术。基于这些原因，嵌入式 PL/SQL\
  \ 网关更适用于较小的部署或独立系统。\n\n![images](img/square.jpg) `注意` 在 Oracle 数据库版本 11*g* 之前，不支持带有嵌入式\
  \ PL/SQL 网关的 Oracle XML DB HTTP 服务器。\n\nOracle HTTP 服务器和 `mod_plsql` 方法对于企业部署至关重要，因为管理员有更广泛的配置和日志设置可供使用，并且从安全角度来看也是如此。Oracle\
  \ HTTP 服务器运行在 Apache 上，并使用 `mod_plsql` 插件通过 Net8/SQL*Net 连接与 APEX 引擎通信。`mod_plsql`\
  \ 插件将 HTTP 请求映射到 Oracle 数据库中的存储过程。图 1-2 详细说明了 Oracle HTTP 服务器部署。\n\n![images](img/square.jpg)\
  \ `提示` Net8/SQL*Net 连接是一种透明连接，用于在客户端机器和 Oracle 数据库之间传输数据。它允许服务和应用程序驻留在不同的机器上，并作为对等应用程序相互通信。\n\
  \n![images](img/0102.jpg)\n\n`图 1-2.` 使用 Oracle HTTP 服务器作为您的 Web 服务器\n\n### 1-3.\
  \ 安装 Oracle APEX\n\n#### 问题\n\n您的任务是在现有的 Oracle 数据库安装（恰好运行在基于 Windows 的服务器上）之上安装最新版本的\
  \ Oracle APEX，并且您已决定使用嵌入式 PL/SQL 网关作为 Web 服务器。\n\n![images](img/square.jpg) `注意`\
  \ APEX 安装支持大量平台。本配方中显示的示例和截图将基于 Windows 安装。非 Windows 操作系统的安装过程保持不变。\n\n#### 解决方案\n\
  \n在您的系统上安装 APEX，请执行以下步骤：\n\n1.  确保存在现有的 Oracle 数据库安装。如果未找到，请先安装 Oracle 数据库（版本 10.2.0.3\
  \ 及以上）。\n![images](img/square.jpg) `注意` 某些版本的 Oracle 数据库内置了较早版本的 APEX。无论如何，无论您是全新安装\
  \ APEX 还是升级到更新版本的 APEX，以下步骤仍然适用。\n2.  下载软件。本书撰写时的 Oracle APEX 最新版本是 4.0.2。您可以从以下\
  \ URL 下载最新版本的 APEX：[`http://www.oracle.com/technetwork/developer-tools/apex/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/apex/downloads/index.html)\n\
  3.  将下载的 APEX 包解压到系统上的 `APEXFILES\\APEX` 文件夹中（例如：`C:\\APEXFILES\\APEX`）。\n![images](img/square.jpg)\
  \ `注意` `C:\\APEXFILES\\APEX` 将是您的 APEX 主目录。重要的是，您的子文件夹必须命名为 `APEX`。\n4.  以 `SYSDBA`\
  \ 身份登录到系统上的 `SQL*Plus`。\n5.  您需要创建两个表空间。在 `SQL*Plus` 中运行 清单 1-1 所示的语句。\n`清单 1-1.`\
  \ 创建 APEX 表空间\n```\nCREATE TABLESPACE APEX datafile 'C:\\oraclexe\\oradata\\XE\\\
  APEX.dbf'\nSIZE 500M\nEXTENT MANAGEMENT LOCAL\nSEGMENT SPACE MANAGEMENT AUTO;\n\n\
  CREATE TABLESPACE APEX_FILES datafile 'C:\\oraclexe\\oradata\\XE\\APEX_FILES.dbf'\
  \ SIZE 100M\nEXTENT MANAGEMENT LOCAL\nSEGMENT SPACE MANAGEMENT AUTO;\n```\n![images](img/square.jpg)\
  \ `注意` 您的 Oracle 主目录可能安装在不同的路径中。请确保将上面代码中的路径更改为正确的位置。在上面的示例中，Oracle 数据库主目录路径是 `C:\\\
  oraclexe\\oradata\\XE`。\n6.  现在，将 `SQL*Plus` 的工作目录设置为 `C:\\APEXFILES\\APEX`。最简单的方法（在\
  \ Windows 上）是先打开一个命令提示符窗口，导航到该文件夹，然后从该文件夹运行 `sqlplus` 命令。\n7.  再次以 `SYSDBA` 身份登录，并键入以下命令：\n\
  ```\n@apxsqler\n```\n如果中途出错，此命令将回滚随后执行的所有 SQL。\n8.  接下来，通过键入以下命令运行 APEX 安装脚本。执行可能需要几分钟；您应该会看到大量输出流过。\n\
  ```\n@apexins APEX APEX_FILES TEMP /i/\n```\n运行此语句的输出快照如 图 1-3 所示。\n![images](img/0103.jpg)\n\
  `图 1-3.` Apex 安装输出\n9.  要检查安装过程中是否有任何错误，您可以检查 `C:\\APEXFILES\\APEX` 文件夹中生成的日志文件。如果有任何错误，请以\
  \ `SYSDBA` 身份登录到 `SQL*Plus` 并运行以下命令来撤销安装：\n```\nDROP USER FLOWS_030000 CASCADE\n\
  ```\n然后，您需要在重新运行安装之前解决日志文件中的错误。\n![images](img/square.jpg) `提示` 日志文件名格式为 `Install<YYYY-MM-DD><HH24-MI-SS>.log`\n\
  10. 如果安装中没有错误，请再次以 `SYSDBA` 身份登录到 `SQL*Plus`，并通过运行以下语句将 APEX 图像加载到 Oracle 数据库中：\n\
  ```\n@apxldimg.sql C:\\APEXFILES\n```\n您应该会看到如 图 1-4 所示的输出。\n![images](img/0104.jpg)\n\
  `图 1-4.` Apxldimg.sql 输出\n![images](img/square.jpg) `注意` 运行此步骤时，请确保提供的路径指向父文件夹，而不是解压\
  \ APEX 安装文件的文件夹。`apxldimg` 脚本会将 `\\APEX` 后缀附加到您的路径后。\n\n\n### 11. 重置 APEX 图像前缀\n\
  接下来，你需要强制 APEX 使用正确的 APEX 图标图像和 JavaScript 文件路径。如果不执行此步骤，可能会发现 APEX 登录页面加载时没有图标显示，并出现一堆\
  \ JavaScript 错误。打开 Windows 命令提示符，导航到 `C:\\APEXFILES\\APEX\\UTILITIES` 目录。从该目录运行\
  \ `sqlplus` 工具并以 SYSDBA 身份登录。然后，运行以下语句：\n```\n@reset_image_prefix.sql\n```\n当提示输入图像前缀时，只需按\
  \ Enter 键使用默认值 (`/i/`)。成功完成后，你应该会看到如图 1-5 所示的输出。\n\n![images](img/0105.jpg)\n\n\
  **图 1-5.** 重置图像前缀\n\n### 12. 设置管理员密码\n最后，通过运行以下语句为 Administrator 设置密码 `admin123`：\n\
  ```\n@apxxepwd.sql admin123\n```\n\n### 13. 登录 APEX\n现在，尝试使用以下 URL 登录 APEX，将 *yourserver*\
  \ 替换为你的实际服务器名称、IP 地址或 localhost（如果你将 APEX 作为独立系统安装在本地机器上）：\n```\nhttp://yourserver:8080/apex\n\
  ```\n你应该会看到如图 1-6 所示的登录页面。\n\n![images](img/0106.jpg)\n\n**图 1-6.** APEX 登录页面\n\n\
  ![images](img/square.jpg) **提示** 如果你无法看到图 1-6 中的登录页面，请检查 URL 中指定的端口号是否正确。同时检查是否已将\
  \ APEX 文件解压到正确的文件夹，并在安装过程中正确引用了这些文件夹。如果仍然无法确定问题所在，查看生成的 APEX 安装日志文件总是一个好主意。更多故障排除信息可在此处获取：`http://download.oracle.com/docs/cd/E17556_01/doc/install.40/e15513/trouble.htm#BABCHHAF`\n\
  \n将工作区名称设置为 `INTERNAL`，用户名设置为 `ADMIN`，密码设置为 `admin123`，然后单击“登录”按钮。你应该能看到如图 1-7 所示的页面。这将表明你的\
  \ APEX 安装已成功。\n\n![images](img/0107.jpg)\n\n**图 1-7.** APEX 主页\n\n#### 工作原理\n\n\
  尝试安装 APEX 时，你可能注意到的第一件事是它没有所谓的安装程序。仔细观察，你会发现从 Oracle 站点下载的 APEX 安装文件只是一堆 PL/SQL\
  \ 脚本文件。\n\n没有安装程序的原因是 Oracle APEX 基本上是一个元数据存储库。APEX 应用程序、表单和报表只不过是存储在 Oracle 数据库中的元数据和\
  \ PL/SQL 代码。一个名为 Application Express 引擎的引擎使用这些元数据来渲染和处理 APEX 网页。\n\n![images](img/square.jpg)\
  \ **提示** Oracle APEX、你的应用程序、表单和报表完全存在于数据库中，这使得备份成为一个便捷的过程。备份 APEX 应用程序与备份任何其他 Oracle\
  \ 数据库没有什么不同。第 9 章 详细介绍了备份过程。\n\n为了了解 APEX 产品由什么组成，以下是一些来自 Oracle 网站的数据：APEX 包含大约\
  \ 425 个表和 230 个 PL/SQL 包，包含超过 425,000 行代码。\n\n### 1-4. 熟悉 APEX 术语\n\n#### 问题\n你发现自己置身于经验丰富的\
  \ APEX 开发人员之中。由于不懂行话，你绞尽脑汁试图理解他们每隔一分钟左右抛出的术语。你不会说 APEX 语，这是一个严重的问题。\n\n#### 解决方案\n\
  在开始使用 APEX 之前，你需要了解工作区、Websheets 和模式之间的区别。表 1-2 详细探讨了 APEX 中使用的各种术语。\n\n**表 1-2.**\
  \ APEX 术语表\n\n| **术语** | **描述** |\n| --- | --- |\n| `Workspace` | 工作区代表一个开发团队的工作区域。它允许不同的开发团队在各自独立的工作区（位于同一存储库中）中工作，而无需相互交互。\
  \ |\n| `Application` | 应用程序基本上就是它的字面意思——“应用程序”的传统概念。在 Apex 4.0 中，你可以构建两种不同类型的应用程序：数据库应用程序或\
  \ Websheet 应用程序。 |\n| `Database application` | 数据库应用程序是一种围绕 RDBMS 构建的应用程序类型。它通常由表单、视图和报表组成。\
  \ |\n| `Websheet application` | Websheet 是 Apex 4.0 的最新成员。它是另一种类型的应用程序，允许你以声明方式构建和部署基于\
  \ Web 的表单、业务逻辑和报表。 |\n| `Schema` | 每个 APEX 工作区都链接到一个或多个数据库模式。数据库模式为每个应用程序存储各种数据库对象（如表）。\
  \ |\n| `Theme` | 主题是模板的集合，定义了 APEX 应用程序的外观（布局）。 |\n| `Page` | 页面是 APEX 应用程序最基本的单位，与网页相关联。你可以创建六种不同类型的页面：空白页面、报表、表单、表格式表单、主详细信息以及“报表和表单”。\
  \ |\n| `Blank page` | 空白页面是一个空页面，允许你自行定制内容。 |\n| `Report` | APEX 中有两种类型的报表：经典报表和交互式报表。\
  \ |\n| `Classic report` | 经典报表是一种静态报表，以表格形式向用户显示记录列表。 |\n| `Interactive report`\
  \ | 交互式报表是一种允许用户交互的报表类型——在查看时进行搜索、过滤、排序、列选择、高亮显示等操作，以在报表中检索所需的数据集。 |\n| `Form` |\
  \ 表单允许数据输入。表单通常由一组数据控件和一个提交按钮组成。 |\n| `Tabular form` | 表格式表单允许你在单个屏幕上一次对多条记录执行更新、插入和删除操作。这些记录以表格格式显示。\
  \ |\n| `Master detail` | 主详细信息页面允许你从两个表创建具有主从关系的表单。 |\n| `Report and Form` | 报表和表单页面在同一页面中包含报表和表单。此类页面最常见的用法是当你需要在一页中输入搜索参数，并让搜索结果显示在同一页面中时。在这种情况下，可以通过表单组件输入搜索参数，搜索结果将显示在页面的报表组件中。\
  \ |\n\n\n\n#### 工作原理\n\nAPEX 是一个可供多个开发团队同时使用的平台。每个**工作空间**代表一个开发团队的工作区域。在每个工作空间内部，开发者可以创建多个应用程序。例如，团队\
  \ Alpha 可能正在开发两个应用程序（一个销售团队应用和一个 HRM 应用），而团队 Beta 可能正在开发一个在线书店应用程序。这在图 1-8 中进行了总结。\n\
  \n![images](img/0108.jpg)\n\n`图 1-8. APEX 工作空间`\n\n在 APEX 工作空间的上下文中，可以创建许多不同的对象和子对象。图\
  \ 1-9 展示了这些不同类型对象之间的关系。如果你再次被这些术语弄糊涂，请参考表 1-2 以获取这些对象的定义。\n\n![images](img/0109.jpg)\n\
  \n`图 1-9. 各种 APEX 对象之间的关系`\n\n![images](img/square.jpg) `注意` 数据库应用程序的原子单位是页面。一个数据库应用程序本质上由一堆页面组成，这些页面可以是数据录入界面、报表或数据表格列表的混合。\n\
  \n### 1-5. 为团队开发设置工作空间\n\n#### 问题\n\n你刚刚安装了 APEX。现在你需要创建一个工作空间，以便开发团队 Alpha（Sally\
  \ 和 John）可以开发他们的销售团队应用。\n\n#### 解决方案\n\n以下是为团队开发进行设置的方法：\n\n1.  在浏览器的地址栏中输入 [`http://yourserver:8080/apex`](http://yourserver:8080/apex)\
  \ 登录 APEX 门户。\n    ![images](img/square.jpg) `注意` 请将 `yourserver` 替换为你的服务器名称或 IP\
  \ 地址。如果你在本地安装了 APEX，请将 `yourserver` 替换为 `localhost`。\n2.  在登录窗口中，指定 `Internal` 作为工作空间，并使用你在配方\
  \ 1-3 中先前创建的用户名和密码以管理员身份登录。\n3.  成功登录后，点击 `Manage Workspaces` 菜单项。点击 `Workspace\
  \ Actions` 部分下的 `Create Workspace` 链接。在随后出现的页面中，指定工作空间名称、ID 和描述。你现在应该看到如图 1-10 所示的页面。\n\
  \    ![images](img/0110.jpg)\n    `图 1-10. 创建一个工作空间`\n4.  点击 `Next` 按钮继续。在此页面，你可以指定使用现有的数据库模式或为该工作空间创建一个新模式。图\
  \ 1-11 展示了如何为工作空间创建新模式。\n    ![images](img/0111.jpg)\n    `图 1-11. 为工作空间创建新模式`\n\
  5.  接下来，你将需要指定`工作空间管理员`用户、密码和电子邮件。参见图 1-12。\n    ![images](img/0112.jpg)\n    `图\
  \ 1-12. 指定管理员详细信息`\n6.  点击 `Next` 按钮继续。点击向导剩余页面的确认工作空间创建。你可以通过导航至 `Manage Workspace`\
  \ ![images](img/U001.jpg) `Workspace Reports` ![images](img/U001.jpg) `Existing\
  \ Workspaces` 链接来浏览现有工作空间。点击该链接后，你应该能看到你刚刚创建的 `Alpha` 工作空间（在图 1-13 中高亮显示）。\n   \
  \ ![images](img/0113.jpg)\n    `图 1-13. 团队 Alpha 工作空间`\n7.  现在你需要将开发者 Sally 和 John\
  \ 的用户账户添加到该工作空间。点击 `Manage Workspaces` 菜单，然后点击 `Workspace Actions` 部分下的 `Manage\
  \ Developers and Users` 链接。在随后的页面中，点击黄色的 `Create User` 按钮，并在下一页填写用户详细信息。务必为你创建的用户账户选择先前创建的\
  \ `WORKSPACE ALPHA` 工作空间。图 1-14 详细说明了这一点。填写完表格后点击 `Create` 按钮。\n    ![images](img/0114.jpg)\n\
  \    `图 1-14. 创建一个开发者`\n8.  创建用户后，你应该能在 `Manage Developers and Users` 页面看到新创建的账户。现在是尝试以开发者身份登录你的工作空间的时候了。点击页面右上角的\
  \ `Logout` 链接，然后点击 `Login` 链接再次导航至 `Login` 页面。在登录页面，指定 `WORKSPACE ALPHA` 作为你的工作空间名称，并指定你先前创建的开发者账户的用户名和密码（如图\
  \ 1-15 所示）。\n    ![images](img/0115.jpg)\n    `图 1-15. 登录你的工作空间`\n9.  点击 `Login`\
  \ 按钮。如果你能够成功登录，你应该能看到如图 1-16 所示的工作空间主页。\n    ![images](img/0116.jpg)\n    `图 1-16.\
  \ 工作空间主页`\n\n#### 工作原理\n\n正如前面在配方 1-4 中介绍的，工作空间代表了开发团队的工作区域。例如，在典型的 APEX 部署中，每个部门可能都会获得自己的工作空间，该空间是自我管理的，并且与其他部门分离。\n\
  \n一个 APEX 工作空间可以配置为映射到一个或多个数据库模式。这允许在此 APEX 工作空间中创建的任何应用程序、表单或报表继承关联数据库模式中的所有权限。（你的应用程序代码将有权访问该模式中的所有数据库对象，就像它直接登录到该模式一样）。\n\
  \n在一个典型的组织中，APEX 管理员会根据需要为不同的开发团队创建工作空间，然后为每个工作空间单独添加相应的开发者账户。\n\n![images](img/square.jpg)\
  \ `注意` 不要将 APEX 工作空间与数据库工作空间混淆。后者是一个共享的虚拟环境，用户可以在其中对表中的数据进行版本控制更改。数据库工作空间是 `Oracle\
  \ Workspace Manager` 的一部分，这是 Oracle 数据库的一个特性。\n\n### 1-6. 管理开发过程\n\n#### 问题\n\n\
  作为项目经理，你已为你的开发团队建立了一套功能、里程碑和任务。你需要利用 APEX 的`软件配置管理`功能来跟踪项目进度。\n\n\n#### 解决方案\n\n\
  要在整个项目中创建和更新一个功能特性，请遵循以下步骤：\n\n1.  登录到您 APEX 门户中的一个工作区。\n2.  点击 `Team Development`\
  \ -> `Features` -> `Create Feature`。\n3.  填写您希望在软件中开发的功能特性的详细信息（如图 1-17 所示）。\n\n\
  \    ![images](img/0117.jpg)\n\n    **图 1-17。** 创建功能特性\n\n4.  点击 `Create Feature`\
  \ 按钮。\n5.  您已创建了一个功能特性，现在工作区中的所有开发者都可以查看它。\n6.  如果某个开发者已完成此功能特性，并且他现在希望更改该特性的状态，他首先需要导航至\
  \ `Team Development` -> `Features` -> `Features` 标签页。\n7.  在此页面中，您应该能够看到所有功能特性的列表。您也可以通过此页面搜索您的功能特性。找到您之前创建的功能特性后，点击其旁边的\
  \ `Edit` 图标（参见图 1-18）。\n\n    ![images](img/0118.jpg)\n\n    **图 1-18。** 浏览功能特性列表\n\
  \n8.  在下一页中，将功能特性的 `Status` 字段更改为 `Complete - 100%`，然后点击 `Apply Changes` 按钮。\n9.\
  \  如果您导航至 `Team Development` -> `Features` -> `Dashboard` 标签页，您可以看到一个包含功能特性列表摘要的仪表板（如图\
  \ 1-19 所示）。\n\n    ![images](img/0119.jpg)\n\n    **图 1-19。** 功能特性仪表板\n\n10. `Calendar`\
  \ 标签页以*可视化日历格式*显示您的功能特性开发截止日期，`History` 标签页显示功能特性列表的最新更新，而 `Focus Areas` 和 `Owners`\
  \ 标签页则通过环形图显示功能特性在不同相关人员之间的分布情况。\n\n    ![images](img/square.jpg) **提示** 创建里程碑、任务和报告错误的步骤与创建功能特性的步骤非常相似。要访问各项，请点击\
  \ `Team Development` 菜单中对应的图标。\n\n#### 工作原理\n\nAPEX 4.0 版本中提供的新 `Team Development`\
  \ 模块为利益相关者（您的最终用户）提供了一种登录并跟踪功能请求状态的方式，甚至可以在他们使用您开发的应用程序时插入他们的反馈！\n\n`APEX Team Development`\
  \ 对于在项目中使用基于 `SCRUM` 方法（如 `敏捷`）的开发团队来说也是一个巨大的福音。`敏捷` 开发的基本原则之一是，功能特性可以随时以任何顺序添加，更重要的是，可以在任何迭代中发布一个可工作的产品。\n\
  \n使用 `Team Development`，您可以快速创建一个新的发布版本；将一组功能特性、里程碑和任务归入该发布版本下；并通过门户中的各种仪表板跟踪其进度。当发布版本提供给最终用户时，他们登录门户来测试您的应用程序并提供反馈（通过集成的\
  \ `Team Development Feedback` 功能）。这使得项目经理能够纳入这些反馈，并建立一个新的发布版本以及一组新的功能特性、里程碑和任务。\n\
  \n这种迭代过程可以发生多次，以每周左右的速度产生应用程序的增量发布，非常适合 `敏捷` 开发方法中普遍存在的需求快速变化的特性。\n\n## 第 2 章\n\n\
  ## 应用程序数据录入\n\n大多数以业务数据库为中心的应用程序通常以相同的方式运作。应用程序围绕一个表构建，例如一个 `Customer` 表。最终用户需要向此表中添加新数据（本例中是新客户记录）。他或她还需要修改现有数据并从此表中删除客户记录。此表中的数据记录通常以网格形式呈现，并伴有\
  \ `新建`、`编辑` 和 `删除` 按钮，允许最终用户修改网格内容。`新建` 和 `编辑` 按钮通常将用户带到单独的详细信息页面——一个表单——该表单以更简化的字段集合显示，用于数据录入。\n\
  \n随着您转向更复杂的示例，如销售订单表单或费用报销申请表，您可以用日益复杂的花哨功能来装饰您的应用程序——数据验证、计算字段、复杂表单行为、访问权限、Web\
  \ 服务调用等等。然而，就其核心而言，一个业务应用程序仍然由基本的 `CRUD`（`创建`、`读取`、`更新` 和 `删除`）操作组成。\n\n这种反复出现的模式是使整个\
  \ `Oracle APEX` 概念运作的基础。它负责设置基本数据录入屏幕并将其绑定到数据库表的繁琐工作。之后，您可以自由地为每个页面添加您想要的花哨功能，使它们按您希望的方式运行。\n\
  \n本章为您提供了一些方法，帮助您为应用程序创建 `CRUD` 基础。它将指导您创建两种不同类型的应用程序——标准数据库应用程序和 `Websheet` 应用程序（`APEX\
  \ 4.0` 中的新功能）。您将学习如何为两者生成数据录入表单，然后稍作修改以使用更丰富的 UI 控件。我还将探讨如何使用一种称为 `表单表格` 的特殊类型表单来加速数据录入。\n\
  \n### 2-1. 创建数据库应用程序\n\n#### 问题\n\n您需要创建一个 `数据库应用程序`，其中包含一个数据录入表单，用于管理主客户列表及其详细信息。\n\
  \n#### 解决方案\n\n最好将此问题分为两部分来处理。首先，创建客户表。然后创建应用程序，包括数据录入表单。\n\n\n## 创建客户表\n\n以下是创建客户表的步骤：\n\
  \n1.  以开发者身份登录到现有的 APEX 工作区。\n\n    ![images](img/square.jpg) **注意** 关于如何创建工作区的更多信息，您可以参考配方\
  \ 1-5。\n\n2.  现在需要创建客户表。点击 `SQL Workshop` ![images](img/U001.jpg) `Object Browser`\
  \ 菜单项。在随后出现的窗口中，点击右上角的 `Create` 按钮，并选择 `Table` 菜单项。\n3.  系统将显示一个允许您定义数据库表的窗口。指定表的名称并为表定义几个字段。您可以创建混合的\
  \ `NVARCHAR2`、`NUMBER` 和 `DATE` 类型字段。如图 2-1 所示。\n\n    ![images](img/0201.jpg)\n\
  \n    *图 2-1. 创建客户表*\n\n4.  点击 `Next` 按钮继续。在此屏幕中，如果需要，您可以定义主键。将主键设置为表中的 `ID` 字段，如图\
  \ 2-2 所示。\n\n    ![images](img/square.jpg) **提示** 一些 APEX 功能，例如从报表页面编辑记录，需要在报表所基于的表或视图上定义主键。您可以在配方\
  \ 2-2 中了解更多关于报表页面的信息。\n\n    ![images](img/0202.jpg)\n\n    *图 2-2. 定义主键*\n\n5.\
  \  点击 `Next` 按钮。下一页允许您定义外键（如果存在）。由于目前没有外键，跳过此页并再次点击 `Next` 按钮。在下一页中，您可以为表定义约束。例如，您可能不希望有重复记录（同一公司的两条名称相同的记录）。选择在\
  \ `Name` 字段上创建唯一约束，如图 2-3 所示。\n\n    ![images](img/0203.jpg)\n\n    *图 2-3. 在客户表上定义约束*\n\
  \n6.  点击 `Next` 按钮。您将看到即将创建的表的摘要。点击 `Create` 按钮确认请求，之后您的表将被生成。如果您浏览表列表，应该会看到 `Customers`\
  \ 表出现在该列表中（如图 2-4 所示）。\n\n    ![images](img/0204.jpg)\n\n    *图 2-4. 对象浏览器中的客户表*\n\
  \n## 创建数据库应用程序和数据录入表单\n\n现在是创建数据库应用程序的时候了。\n\n1.  要创建新的数据库应用程序，请点击工作区主页中的 `Application\
  \ Builder` ![images](img/U001.jpg) `Database applications` 菜单项。\n2.  应用程序构建器向导将显示（如图\
  \ 2-5 所示）。选择 `Database application` 类型。\n\n    ![images](img/0205.jpg)\n\n    *图\
  \ 2-5. 应用程序构建器向导*\n\n3.  接下来，您需要指定应用程序的名称。使用 `Sales Force` 作为应用程序名称。选择从头开始创建应用程序。点击\
  \ `Next` 按钮。\n4.  您现在将看到向导中名为 `Pages` 的部分。在这里，您可以定义应用程序中包含的页面列表。创建一个空白页面；这将是您应用程序的主页。选择空白页面类型并指定\
  \ `My Home` 作为您的页面名称（参见图 2-6）。完成后，点击 `Add Page` 按钮。\n\n    ![images](img/0206.jpg)\n\
  \n    *图 2-6. 创建空白页面作为主页*\n\n5.  在同一区域，您将能够创建数据录入页面。选择 `Form` 页面类型。在 `Subordinate\
  \ to Page` 字段中，选择 `My Home` 页面。在 `table name` 字段中，从数据库中选择一个现有的表；在您的情况下，就是您之前创建的\
  \ `Customers` 表。完成后，点击 `Add Page` 按钮。此步骤的详细信息如图 2-7 所示。\n\n    ![images](img/square.jpg)\
  \ **提示** `Subordinate to Page` 字段为 APEX 提供了关于您的页面如何结构化的信息。这反过来又定义了 APEX 之后生成的默认导航方案。例如，将\
  \ `Customers` 表单设置为 `My Home` 页面的下级，将导致 APEX 在主页中自动生成一个指向 `Customers` 表单的链接。\n\n\
  \    ![images](img/0207.jpg)\n\n    *图 2-7. 创建客户数据录入页面*\n\n6.  完成后，点击 `Next` 按钮。在下一页中，您可以为应用程序定义选项卡。使用默认设置并继续到下一页。您现在也可以跳过\
  \ `Shared Components`、`Attributes` 和 `UI` 向导页面。点击 `Create` 按钮创建应用程序。系统将要求您再次确认您的设置。\n\
  7.  应用程序成功创建后，您将看到图 2-8 所示的截图。（请注意，`Login` 页面会在您的应用程序中自动生成）。点击 `Run Application`\
  \ 图标来试用您的应用程序！\n\n    ![images](img/0208.jpg)\n\n    *图 2-8. SalesForceApp 应用程序创建成功！*\n\
  \n8.  您将首先看到 `Login` 页面。使用您之前登录到工作区时所用的开发者账户的相同凭据登录。登录到应用程序后，您应该会看到如图 2-9 所示的主页。请注意，主页上已自动生成了一个指向\
  \ `Customers` 页面的链接。\n\n    ![images](img/0209.jpg)\n\n    *图 2-9. 您应用程序的主页*\n\n\
  9.  点击 `Customers` 链接以打开 `Customers` 数据录入表单。您可以在这里看到您的表单（包含来自 `Customers` 表的完整字段列表）。在此表单中输入一些信息，完成后点击\
  \ `Create` 按钮。如图 2-10 所示。\n\n    ![images](img/square.jpg) **注意** 表单上生成的控件取决于数据库表中声明的字段类型。例如，数据库中的\
  \ `DATE` 字段会在表单上生成一个日期选择器控件。\n\n    ![images](img/0210.jpg)\n\n    *图 2-10. 客户数据录入页面*\n\
  \n10. 创建记录后，从应用程序注销，并点击底部栏中的 `Home` 按钮返回工作区。导航到 `SQL Workshop` 中的 `Object Browser`，查看此表中的数据。您应该能够在数据库表中看到新创建的记录（参见图\
  \ 2-11）。\n\n    ![images](img/0211.jpg)\n\n    *图 2-11. 新创建的客户记录*\n\n#### 工作原理\n\
  \n`Database Application` 类型是 APEX 中最常见的应用程序类型。它允许您设置页面（特别是表单和报表），从而快速围绕现有数据库表生成\
  \ CRUD（增删改查）用户界面。\n\n一个典型的 APEX 应用程序从开发者（或数据库设计者）定义应用程序所需的完整数据库表集开始。这可以使用 `Object\
  \ Browser` 工具或在 APEX 的 `SQL Workshop` 部分运行 PL/SQL 脚本来完成。也可以使用外部工具、脚本中的一组 DDL 或从另一个数据库导入模式来创建数据库对象——表、索引、约束、序列等。\n\
  \n一旦表全部生成，APEX 开发者就会从这些数据库表的模式中生成所需的表单和报表。表单就位后，开发者通过添加验证例程、JavaScript 功能、复杂表单行为、访问权限设置等来优化这些生成的页面。\n\
  \n### 2-2. 创建报表以管理您的数据\n\n#### 问题\n\n您的用户希望创建两个页面：一个数据录入表单和另一个页面来检索他们刚刚输入的数据。该应用程序还需要以网格（列表）格式逐行向用户显示先前输入的数据，并提供一种让他们编辑和删除其数据的方法。\n\
  \n\n#### 解决方案\n\n执行以下步骤以创建一个显示现有记录的报表：\n\n1.  在工作区中打开 Sales Force 应用程序（以开发者身份连接）。\n\
  2.  点击右上角的“创建页面”按钮。在弹出的窗口中，选择“表单”页面类型。在下一页（图 2-12）中，选择“基于表格和报表的表单”页面类型。点击“下一步”按钮继续。\n\
  \n![images](img/0212.jpg)\n\n***图 2-12.** 选择页面类型*\n\n3.  在下一页，使用默认设置。点击“下一步”按钮进入表/视图选择页面。选择\
  \ `Customers` 表并点击“下一步”按钮。在接下来的向导两页中使用默认设置。您最终将看到如图 2-13 所示的页面，该页面允许您定义报表中可用的列。高亮（选择）所有列，然后点击“下一步”按钮。\n\
  \n![images](img/0213.jpg)\n\n***图 2-13.** 指定要包含在报表中的列列表*\n\n4.  在向导的接下来四页中使用默认设置。之后，您将看到一个页面，允许您选择表单中可用的列。选择所有列。\n\
  \n![images](img/square.jpg) **提示** 此时，您可能会遇到 `Column Names must be valid Oracle\
  \ Identifiers` 错误。如果您包含了 Oracle 数据库中的某些保留关键字或包含无效字符的字段，就可能发生这种情况。与 APEX 相比，Oracle\
  \ 数据库在字段命名方面具有更高的自由度。您可以在以下链接查看 Oracle 命名数据库对象的规则：[`http://download.oracle.com/docs/cd/E11882_01/server.112/e17118/sql_elements008.htm#SQLRF51129`](http://download.oracle.com/docs/cd/E11882_01/server.112/e17118/sql_elements008.htm#SQLRF51129)。\n\
  \n5.  在下一页，您可以决定是否允许用户通过报表对 `Customers` 表执行插入、更新或删除记录的操作。将所有选项保留为“是”（参见图 2-14）。\n\
  \n![images](img/0214.jpg)\n\n***图 2-14.** 表单上的处理选项*\n\n6.  点击“下一步”按钮，然后点击“完成”以完成配置并创建表单和报表。之后，返回您的应用程序主页。您应该能够在应用程序中看到两个新页面：“CUSTOMERS\
  \ 上的报表”和“CUSTOMERS 上的表单”。您可以在图 2-15 中看到它们。\n\n![images](img/0215.jpg)\n\n***图 2-15.**\
  \ 新创建的报表和表单*\n\n7.  现在，您需要在首页创建指向该报表和表单的链接。导航到应用程序主页，点击“1-我的主页”页面。这将显示该页面的配置区域。在“页面呈现”部分下，导航到\
  \ 区域 ![images](img/U001.jpg) 主体 (3)，右键单击“导航”项并选择“编辑列表”菜单项。这将显示如图 2-16 所示的页面。\n\n\
  ![images](img/0216.jpg)\n\n***图 2-16.** “按列表显示条目”页面*\n\n8.  点击右上角的“创建列表”按钮。这将显示一个新页面，允许您配置导航列表的设置。将“列表条目标签”指定为“我的客户列表”（这是链接上显示的标题），并为“页面”字段选择“CUSTOMERS\
  \ 上的报表”页面。完成后，点击“创建”按钮。您现在应该能在“按列表显示条目”页面看到您新创建的链接。\n9.  现在，导航到您的应用程序并运行它。您现在应该在应用程序首页区域看到新的“我的客户列表”链接，如图\
  \ 2-17 所示。\n\n![images](img/0217.jpg)\n\n***图 2-17.** 应用程序首页区域*\n\n10. 点击“我的客户列表”链接。您应该能看到来自\
  \ `Customers` 表的记录显示在表格中。点击“创建”按钮以向列表中添加新记录。您将看到关联的表单显示（如图 2-18 所示）。填写此表单并点击“创建”按钮。\n\
  \n![images](img/0218.jpg)\n\n***图 2-18.** 客户详情表单*\n\n11. 添加新记录后，您将能够在列表中看到它（如图 2-19\
  \ 所示）。您也可以通过点击表格左侧的小纸笔图标来编辑现有记录。\n\n![images](img/0219.jpg)\n\n***图 2-19.** 新创建的记录*\n\
  \n#### 工作原理\n\n报表是 APEX 中的一种对象类型，指的是以表格形式显示的多个数据记录的列表。“报表”这个词有点用词不当，因为它在 APEX 中的用途远不止生成传统的数据报告。APEX\
  \ 中的报表（特别是交互式报表）通常用于向用户呈现记录列表，以便他/她可以从底层表中修改或删除它们。从这个意义上说，报表的功能可以被认为与视图类似。\n\n报表也可以用于具有主从关系的明细表单中，此时报表呈现为主表单内的表格形式。然后，可以将多个子记录输入到此表中。\n\
  \n报表带有很多内置功能；表 2-1 列出了报表提供的一些默认功能。\n\n***表 2-1.** 报表内置功能*\n\n| **功能** | **描述** |\n\
  | --- | --- |\n| `筛选` | 也许是报表最强大的功能，筛选器允许最终用户（实时地）定义一组筛选条件，这些条件可以立即应用于报表中显示的完整行集。筛选器会实时修改对数据库的查询；这意味着发送到\
  \ APEX 进行处理的数据集只是显示给用户的信息。 |\n| `分页` | 报表中的记录由 APEX 自动分页。最终用户可以动态更改页面大小（单页中显示的行数）。\
  \ |\n| `排序` | 最终用户可以轻松地实时按报表中的每一列排序。 |\n| `分组` | 最终用户可以按某个字段或字段组合动态分组记录。 |\n| `高亮显示`\
  \ | 最终用户可以选择根据某些条件动态高亮显示行（例如，将金额大于 $10,000 的所有发票记录以红色高亮显示）。 |\n| `创建计算列` | 最终用户可以动态创建由现有列中的数据计算得出的附加列。最终用户可以定义非常复杂的公式来执行此计算。\
  \ |\n| `图表` | 最终用户可以动态创建报表中现有数据的图表视图。只需点击几下，最终用户就可以创建一个复杂的饼图，例如，来可视化报表中的数据。 |\n\
  | `聚合` | 最终用户可以使用聚合函数（例如，求和），该函数计算报表中某一列所有数据的聚合值，并将其显示在列的底部。这可以与分组结合使用。 |\n\n###\
  \ 2-3. 更改表单中的字段项类型\n\n#### 问题\n\n您需要将表单上几个字段的项目类型从文本区域更改为单行文本框。\n\n\n#### 解决方案\n\
  \n要将文本区域的字段类型更改为单行文本框，请按照以下步骤操作：\n\n1.  导航至应用主页，点击 `CUSTOMERS 表单`。这将显示页面配置区域。在 `页面渲染`\
  \ 部分，展开 `区域` → `主体 (3)` → `Form on Customers` → `项目` 节点，并双击您想要修改的字段（参见 图 2-20）。\n\
  \n    ![images](img/0220.jpg)\n\n    图 2-20. 表单上的字段设置\n\n2.  在 `编辑页面项` 页面中，将该字段的字段类型从\
  \ `文本区域` 更改为 `文本字段`（如 图 2-21 所示）。\n\n    ![images](img/0221.jpg)\n\n    图 2-21.\
  \ 字段设置页面\n\n3.  点击 `应用更改` 按钮。运行应用并打开 `我的客户列表` 页面。选择创建新记录。在表单页面中，您应该能观察到您字段的字段类型已相应改变（如\
  \ 图 2-22 所示）。\n\n    ![images](img/0222.jpg)\n\n    图 2-22. 在 CUSTOMERS 表单中反映的更改\n\
  \n#### 工作原理\n\n`页面渲染` 部分提供了每个页面后端配置的概览。它列出了表单上使用的每个字段，并提供了从视觉布局到验证行为等各个方面操作这些字段的工具。\n\
  \n### 2-4. 在表单中从值列表中选择\n\n#### 问题\n\n您需要在客户表单的 `Country` 字段中创建一个作为下拉列表的值列表。此值列表必须是动态的，并且应在单独的表中进行管理。\n\
  \n#### 解决方案\n\n以下是如何创建一个允许用户从值列表中选择的表单字段：\n\n1.  使用 `SQL 工作室` 中的 `对象浏览器` 工具，创建一个名为\
  \ `Countries` 的新表，包含两列：`CountryName` 和 `Remarks`。向表中插入一些示例数据；例如，在 `CountryName`\
  \ 字段中为 `Japan`、`US` 和 `Singapore` 创建记录。\n\n    ![images](img/square.jpg) **提示**\
  \ 配方 2-1 描述了如何使用 `对象浏览器` 工具创建表。\n\n2.  导航至应用主页，点击 `CUSTOMERS 表单`。这将显示页面配置区域。在 `页面渲染`\
  \ 部分，展开 `区域` → `主体 (3)` → `Form on Customers` → `项目` 节点，并双击 `Country` 字段。\n3.  在随后的页面中，将\
  \ `显示为` 字段类型更改为 `选择列表`。这表示一个下拉列表。当您这样做时，您还会注意到顶部会出现一个名为 `值列表` 的新选项卡。点击此选项卡。\n4.\
  \  在随后的页面中，点击 `创建动态值列表` 链接。这将启动一个弹出窗口，允许您配置动态列表。在弹出窗口中，使用默认的表/视图所有者，然后点击 `下一步` 按钮。\n\
  5.  在向导的下一页中，选择 `Countries` 表。将 `CountryName` 同时设置为 `显示` 列和 `返回值`。依次点击 `下一步` 和 `完成`\
  \ 按钮以完成配置。您将在值列表 `定义` 区域看到生成的 SQL（如 图 2-23 所示）。\n\n    ![images](img/0223.jpg)\n\
  \n    图 2-23. 值列表定义区域中生成的 SQL\n\n6.  点击 `显示` 选项卡，并将 `高度` 设置为 `1`。这将把选择列表从列表框转换为下拉列表。\n\
  7.  点击 `应用更改` 按钮。运行应用，点击 `我的客户列表` 链接，并选择创建新记录。您会注意到 `Country` 字段已更改为一个下拉列表，其中包含存储在\
  \ `Countries` 表中的值（如 图 2-24 所示）。\n\n    ![images](img/0224.jpg)\n\n    图 2-24. 国家下拉列表\n\
  \n#### 工作原理\n\nOracle APEX 提供了五种不同类型的控件，允许用户从值列表中选择。它们在 表 2-2 中描述。\n\n表 2-2. 提供值列表功能的项类型\n\
  \n| 项类型 | 描述 |\n| --- | --- |\n| `复选框` | 您可以创建多个复选框（一个检查列表），供用户在表单上勾选。值列表区域允许您定义每个复选框的标题和值。\
  \ |\n| `单选按钮组` | `单选按钮组` 类型允许您使用单选按钮从值列表中选择单个值。值列表区域允许您定义每个单选按钮的标题和值。 |\n| `弹出式值列表`\
  \ | `弹出式值列表` 是一种选择控件，您可以从弹出窗口中的列表中选择一个值。 |\n| `选择列表` | 选择列表可以呈现为列表框（如果 `高度` 属性设置为大于\
  \ 1 的值）或下拉列表（如果 `高度` 属性设置为 1）。`选择列表` 中包含的值列表在值列表区域中定义。 |\n| `穿梭框` | 穿梭框基本上由两个列表框组成，允许您将项目从一个框穿梭（或添加）到另一个框。\
  \ |\n\n### 2-5. 在表单中上传和下载文件\n\n#### 问题\n\n您需要让用户在每条客户记录中上传一个附件——公司简介（任何文件格式）。\n\n\
  #### 解决方案\n\n以下是如何在表单中创建文件上传字段：\n\n1.  使用 `SQL 工作室` 中的 `对象浏览器` 工具，向 `Customers`\
  \ 表添加一个新的 `BLOB` 列，并将列命名为 `CompanyProfile`。\n2.  导航至应用主页，点击 `CUSTOMERS 表单`。这将显示页面配置区域。在\
  \ `页面渲染` 部分，展开 `区域` → `主体 (3)` → `Form on Customers` 节点，并右键单击 `项目` 节点。选择 `创建页面项`\
  \ 菜单项。\n3.  在随后的页面中，选择 `文件浏览` 字段类型并点击 `下一步`。在下一页中，将 `项名称` 更改为 `P9_COMPANYPROFILE`。在向导的其余页面中使用默认设置。创建页面项后，在\
  \ `页面渲染` 部分双击该项。\n4.  在项配置页面中，点击 `源` 选项卡，并将 `源类型` 更改为 `数据库列`。将 `源值或表达式` 字段设置为您的\
  \ `BLOB` 数据库字段的名称，`COMPANYPROFILE`。点击 `应用更改` 按钮保存您的更改。\n5.  现在，运行应用，点击 `我的客户列表`\
  \ 链接，并选择创建新记录。您会在表单中看到新的公司简介字段。点击 `浏览` 按钮并在文件选择器对话框中选择任何基于文本的文件（如 图 2-25 所示）。点击右上角的\
  \ `创建` 按钮以保存记录。文件内容将被写入 `BLOB` 列。\n\n    ![images](img/0225.jpg)\n\n    图 2-25.\
  \ 正在使用的公司简介文件上传字段\n\n6.  现在尝试编辑您刚刚创建的记录。在表单窗口中，您将能够在文件上传控件旁边看到一个小小的 `下载` 链接。点击 `下载`\
  \ 链接以下载文件内容（如 图 2-26 所示）。\n\n    ![images](img/0226.jpg)\n\n    图 2-26. 从 BLOB 字段下载数据\n\
  \n#### 工作原理\n\n当您使用 `BLOB` 字段存储文件附件时，文件附件的内容在通过 APEX 表单上传后存储在 `BLOB` 字段中。同样，当启动下载时，`BLOB`\
  \ 字段的内容会被下载到客户端浏览器。\n\n### 2-6. 使用表单表格加速数据录入\n\n#### 问题\n\n您有大量数据需要输入到您的应用程序中。您需要一种更好、更快的方式来编辑和插入数据记录。\n\
  \n\n#### 解决方案\n\n执行以下步骤以创建表格数据录入表单：\n\n1.  导航至应用程序主页。创建一个新页面，并选择“表格表单”作为页面类型。单击“下一步”按钮。\n\
  2.  在向导的下一部分，您可以选择允许在表格表单上执行的操作类型。保留默认设置（更新、插入和删除）并继续到下一页。\n3.  从列表中选择 `Customers`\
  \ 表。在下一页，选择要包含在表格表单中的所有列。如图 2-27 所示。\n\n    ![images](img/0227.jpg)\n\n    **图 2-27.\
  \ 选择要包含在表格表单中的列列表**\n\n4.  在所有后续页面中使用默认设置。在向导结束时，单击“运行页面”图标以运行您的表格表单。\n5.  您应该能够看到表格表单，如图\
  \ 2-28 所示。您可以通过直接在表格单元格中更改值来修改数据。您还可以使用表格顶部和底部提供的按钮删除和添加行。修改数据完成后，单击“提交”按钮保存更改。\n\
  \n![images](img/0228.jpg)\n\n**图 2-28. 运行中的表格表单**\n\n![images](img/square.jpg) **提示**\
  \ 您可能还想从应用程序主页直接链接到此表格表单。配方 2-9 中的步骤 7 到 9 详细解释了如何执行此操作。\n\n#### 工作原理\n\n表格表单可帮助您快速设置网格，允许您对表格数据进行内联编辑。表格表单的目标是允许最终用户修改多条记录并一次性提交所有更改。这在多用户需要频繁更新多条数据记录时，减少了网络流量。\n\
  \n表格表单功能为内联编辑中的每列提供了丰富的 UI 控件。例如，`Country` 列在编辑时可以呈现一个包含国家列表的下拉列表。\n\n## 2-7. 创建\
  \ Websheet 应用程序\n\n#### 问题\n\n您有一个包含大量数据（所有客户的列表）的 Microsoft Excel 电子表格。您需要将此整个列表放到\
  \ Web 上，以便用户可以通过 Web 界面修改它，并且需要在尽可能短的时间内完成。\n\n#### 解决方案\n\n以下是使用 Microsoft Excel\
  \ 电子表格中的数据创建 Websheet 应用程序的方法：\n\n1.  单击 `Application Builder` 主菜单项，然后单击“创建”按钮。选择创建\
  \ Websheet 应用程序。\n2.  将应用程序名称更改为 `CustomersWebSheet`。\n3.  单击“创建”按钮以创建 Websheet。您应该在工作区主页中看到您的\
  \ Websheet 应用程序（参见图 2-29）。\n\n    ![images](img/0229.jpg)\n\n    **图 2-29. 新创建的\
  \ CustomersWebSheet 应用程序**\n\n4.  单击您的 Websheet 应用程序，然后单击“运行”按钮。\n5.  使用您的开发者凭据登录到\
  \ Websheet 应用程序。\n6.  在应用程序中，单击 `Data` 主菜单项并选择 `Create` 子菜单项。\n7.  在向导中，选择创建数据网格，然后单击“下一步”按钮。\n\
  8.  在下一页中，选择通过复制和粘贴创建数据网格（如图 2-30 所示）。\n\n    ![images](img/0230.jpg)\n\n    **图\
  \ 2-30. 通过剪切和粘贴创建数据网格**\n\n9.  在下一页中，指定 `Customers` 作为数据网格的名称。您现在需要将所有数据从您的 Excel\
  \ 电子表格中复制（如图 2-31 所示）并粘贴到此页的大文本区域中（如图 2-32 所示）。\n\n    ![images](img/0231.jpg)\n\
  \n    **图 2-31. 从您的 Microsoft Excel 文件复制内容...**\n\n    ![images](img/0232.jpg)\n\
  \n    **图 2-32. ...并将它们粘贴到此处的大文本区域中...**\n\n10. 接下来，单击“上传”按钮。您会发现您的电子表格数据神奇地整齐排列在数据网格中（参见图\
  \ 2-33）！\n\n    ![images](img/0233.jpg)\n\n    **图 2-33. ...这就是整齐排列在数据网格中的电子表格数据！**\n\
  \n11. 您现在可以直接通过单击表格中的任何单元格来编辑 Websheet（如图 2-34 所示）。使用每行左侧的“编辑”图标（该图标会打开一个根据您的 Excel\
  \ 表列生成的表单）向表格添加新行等。\n\n![images](img/0234.jpg)\n\n**图 2-34. 在 Websheet 中编辑数据**\n\
  \n#### 工作原理\n\nWebsheet 提供了一种将整个电子表格转换为可编辑网格的便捷方法，该网格提供了报表提供的所有标准功能——包括验证、分页、排序、突出显示等。\n\
  \n请注意，Websheet 应用程序在底层的工作方式略有不同。Websheet 数据网格不像表单那样直接映射到数据库表。Websheet 数据存储在内部的 `APEX$_WS_ROWS`\
  \ 表中。\n\n![images](img/square.jpg) **提示** 您可以使用 SQL Workshop 中的 Object Browser 工具检查\
  \ `APEX$_WS_ROWS` 表的内容。\n\n### 2-8. 更改 Websheet 列的项类型\n\n#### 问题\n\n您需要创建一个 Websheet，其中对不同列使用不同的控件。例如，您的用户希望对\
  \ `Country` 列使用下拉列表（包含不同国家的列表）。\n\n#### 解决方案\n\n以下是为 Websheet 中的列创建下拉列表的方法：\n\n\
  1.  导航至 `CustomersWebSheet` 应用程序并运行它。使用您的开发者凭据登录到应用程序。\n2.  打开 `Customers` 数据网格。\n\
  3.  单击“管理”下拉按钮，然后单击 `Columns` ![images](img/U001.jpg) `Column Properties` 菜单项。\n\
  4.  您将看到“列属性”页面。从“列名”字段中选择 `Country` 列。\n5.  在“显示为”字段下，选择“选择列表”。\n6.  在图 2-35 所示的“值列表”部分下，选择“基于当前值新建值列表”项。这将从您之前粘贴的电子表格数据中的\
  \ `Country` 列检索整个唯一值列表。\n\n    ![images](img/0235.jpg)\n\n    **图 2-35. 修改 Country\
  \ 列属性**\n\n7.  完成后单击“添加行”按钮。当您在数据网格中单击 `Country` 列中的任何单元格时，您现在会注意到一个包含国家列表的下拉列表，而不是通常的文本框（参见图\
  \ 2-36）。\n\n![images](img/0236.jpg)\n\n**图 2-36. Websheet 数据网格内的下拉列表**\n\n#### 工作原理\n\
  \n与报表类似，您可以轻松更改 Websheet 中每列的项类型。但是，Websheet 可用的项类型仅限于以下几种：\n\n*   日期选择器\n*   只读\n\
  *   选择列表\n*   文本\n*   文本区域\n\n![images](img/square.jpg) **注意** 对于 Websheet 中的选择列表，您只能在\
  \ LOV 中定义静态项列表（以逗号分隔）。Websheet 中的选择列表不支持像表单那样的动态列表。\n\n### 2-9. 批量修改 Websheet 中的值\n\
  \n#### 问题\n\n您的 Websheet 中有一个包含数千行的列表。您需要将所有地址中的单词“Road”更改为“Street”。\n\n\n#### 解决方案\n\
  \n以下是如何在 Websheet 中批量修改数据：\n\n1.  导航至 `CustomersWebSheet` 应用程序并运行它。使用你的开发者凭据登录到该应用程序。\n\
  2.  打开“客户数据”网格。\n3.  点击“管理”下拉按钮，然后点击“行 ![images](img/U001.jpg) 替换”菜单项。\n4.  在随后打开的页面中，在“查找内容”字段中输入\
  \ `Road`，在“替换为”字段中输入 `Street`（如图 2-37 所示）。完成后点击“应用”按钮。\n\n    ![images](img/0237.jpg)\n\
  \n    ***图 2-37.** 将 “Road” 替换为 “Street”*\n\n5.  你会发现 Websheet 中所有 “`Road`” 短语都被替换为\
  \ “`Street`” 了（如图 2-38 所示）。\n\n![images](img/0238.jpg)\n\n***图 2-38.** Websheet\
  \ 中的短语替换*\n\n#### 工作原理\n\nWebsheets 提供了一些工具来帮助你在数据网格中批量修改数据。支持以下批量编辑操作：\n\n*   将某列中所有行的某个值替换为另一个值。\n\
  *   将某列的所有行设置为某个特定值。\n*   用前一行的数据填充包含空值的列。\n\n## 第 3 章\n\n## 连接应用逻辑\n\n如果你是一名 ASP.NET\
  \ 开发人员，你可能对 Microsoft 引入的用于将表示层与逻辑层分离的 **代码隐藏模型** 很熟悉。在代码隐藏页面中，代码的执行是基于事件的。你会指定在页面加载或按钮点击时执行的代码块。\n\
  \nAPEX 逻辑层的工作方式与此类似。也许总结其工作原理的最佳方式是：页面执行被划分为不同的时序事件——可以在这些时间点插入应用逻辑。例如，一个典型的 APEX\
  \ 页面的后端执行被划分为两个主要事件：页面渲染和页面处理，这两个事件又各自包含可以触发应用逻辑的更小事件。\n\nAPEX 开发人员主要可以使用 PL/SQL\
  \ 语句和 JavaScript 来插入应用逻辑，这两者也可以通过 APEX 提供的向导生成。（事实上，如果你不把 PL/SQL 视为“代码”，那么你完全可以从零开始创建一个完整的书店或销售团队应用程序，而无需编写一行代码！）\n\
  \nAPEX 与传统的开发工具不同，它旨在最短时间内快速产出业务应用程序。为了实现这一目标，APEX 强制执行一个严格的框架，期望业务应用程序以某种特定的方式开发。例如，每个表单在其生命周期中的特定点都应显示信息、提供客户端和服务器端验证，并执行后端处理。在\
  \ APEX 上开发的应用程序本质上受限于这种流程，试图编写逻辑来做一些超出此常规范围的事情，可能不如使用传统开发工具那样容易。这意味着你不能用 APEX 来创建游戏（至少无法创建出色的游戏），但你当然可以用它来非常快速地创建业务应用程序——尤其是以数据库为中心的应用程序。\n\
  \n在本章中，我将详细探讨 APEX 逻辑层，并向你展示如何在 APEX 中执行常见任务。\n\n### 3-1. 为你的表单添加服务器端验证\n\n####\
  \ 问题\n\n你正在创建一个处理医院病人出院的表单。当护士填写表单时，他们需要输入病人的社会安全号码。在记录可以被创建之前，表单数据必须在后端进行验证——病人的社会安全号码必须与支付历史记录表进行核对。如果支付记录存在（即病人已支付其医疗费用），则允许出院。否则，出院表单必须显示一条错误消息。\n\
  \n#### 解决方案\n\n在测试本教程中的解决方案之前，你需要先设置一些示例数据库和表单对象。之后，你将探索如何为这些表单添加服务器端验证。让我们从创建示例对象开始。\n\
  \n##### 设置示例对象\n\n要创建示例对象，请按照以下步骤操作：\n\n1.  使用 SQL Workshop 或 PL/SQL 创建清单 3-1 所示的\
  \ `PaymentHistory` 表。\n\n    ***清单 3-1.** `PaymentHistory` 表*\n\n    ```sql\n  \
  \  CREATE table \"PAYMENTHISTORY\" (\n        \"SOCIALSECURITYNO\" NVARCHAR2(9),\n\
  \        \"AMOUNTPAID\"       NUMBER(6,2)\n    )\n    ```\n\n2.  创建清单 3-2 所示的病人出院表（将\
  \ `DISCHARGEID` 字段设为主键），然后创建一个数据库应用程序并在此表上设置一个数据录入表单。\n\n    ***清单 3-2.** `PatientDischarge`\
  \ 表*\n\n    ```sql\n    CREATE table \"PATIENTDISCHARGE\" (\n        \"DISCHARGEID\"\
  \              NVARCHAR2(10),\n        \"PATIENTNAME\"              NVARCHAR2(255),\n\
  \        \"PATIENTSOCIALSECURITYNO\"  NVARCHAR2(9),\n        \"DATEOFDISCHARGE\"\
  \          DATE,\n        \"DISCHARGEREMARKS\"         NVARCHAR2(2000),\n      \
  \  constraint  \"PATIENTDISCHARGE_PK\" primary key (\"DISCHARGEID\")\n    )\n  \
  \  /\n\n    CREATE sequence \"PATIENTDISCHARGE_SEQ\"\n    /\n\n    CREATE trigger\
  \ \"BI_PATIENTDISCHARGE\"\n      before insert on \"PATIENTDISCHARGE\"\n      for\
  \ each row\n    begin\n      if :NEW.\"DISCHARGEID\" is null then\n        select\
  \ \"PATIENTDISCHARGE_SEQ\".nextval into :NEW.\"DISCHARGEID\" from dual;\n      end\
  \ if;\n    end;\n    /\n    ```\n\n    ![images](img/square.jpg) **提示** 有关如何设置数据录入表单的更多信息，请参考教程\
  \ 2-1。\n\n3.  向 `PaymentHistory` 表中添加一条示例记录，社会安全号码为 `123456789`。可以通过执行清单 3-3 中的\
  \ SQL 来完成。\n\n    ***清单 3-3.** 在 `PaymentHistory` 表中创建示例记录*\n\n    ```sql\n    INSERT\
  \ INTO PAYMENTHISTORY(SOCIALSECURITYNO,AMOUNTPAID) VALUES('123456789',500)\n   \
  \ ```\n\n\n\n### 3-1. 添加服务器端验证\n\n要为您的表单添加服务器端验证，请按照以下步骤操作：\n\n1.  导航至出院患者表单的“页面定义”区域中的“页面处理”部分。\n\
  2.  在“验证”节点下，右键单击“验证”节点，然后单击“创建”按钮（如图 3-1 所示）。\n\n    ![images](img/0301.jpg)\n\n\
  \    ***图 3-1.** 启动创建验证向导*\n\n3.  您现在应该会看到“创建验证”向导。在向导的第一页，选择“项目级验证”项（参见图 3-2）。\n\
  \n    ![images](img/0302.jpg)\n\n    ***图 3-2.** 选择验证类型*\n\n4.  在向导的下一页，选择 `PATIENTDISCHARGE:\
  \ 1. P1_PATIENTSOCIALSECURITYNO` (`Patientsocialsecurityno`) 项作为要验证的项。\n5.  在下一页，选择\
  \ `PL/SQL` 验证方法，接着选择函数返回布尔值 `PL/SQL` 验证类型。\n6.  在下一个（序列和名称）步骤中使用默认值。继续到下一个（验证）步骤，并输入清单\
  \ 3-4 中所示的 `PL/SQL` 验证代码。\n\n    ***清单 3-4.** PL/SQL 验证代码*\n\n    ```\n    DECLARE\n\
  \          CT INTEGER;\n    BEGIN\n          SELECT COUNT(*) INTO CT FROM PAYMENTHISTORY\
  \ WHERE\n          SOCIALSECURITYNO = :P1_PATIENTSOCIALSECURITYNO;\n          IF\
  \ CT>0 THEN\n              return true;\n          ELSE\n              return false;\n\
  \          END IF;\n    END;\n    ```\n7.  在同一步骤中，指定验证失败时显示的错误消息，如图 3-3 所示。\n\n\
  \    ![images](img/0303.jpg)\n\n    ***图 3-3.** 指定验证行为*\n\n8.  继续到下一步。为“按下按钮时”字段选择“创建”选项，如图\
  \ 3-4 所示。\n\n    ![images](img/0304.jpg)\n\n    ***图 3-4.** 指定验证行为*\n\n9.  单击“创建”按钮以创建验证规则。\n\
  10. 现在运行该表单。您将看到出院患者表单显示。在“患者社会保障号”字段中输入除 `123456789` 以外的任何值。单击“创建”按钮。您应该会看到验证错误消息显示在页面顶部（如图\
  \ 3-5 所示）。如果您输入值 `123456789`（该值存在于 PaymentHistory 表中），则不会显示错误。\n\n![images](img/0305.jpg)\n\
  \n***图 3-5.** 运行中的验证*\n\n#### 工作原理\n\n首先，简单介绍一下服务器端验证。服务器端验证与客户端验证相对，它需要到服务器的往返行程。APEX\
  \ 中主要有三种类型的服务器端验证。\n\n> **项目级验证**：当您的验证一次只涉及一个页面项时使用此类型。\n>\n> **表格表单验证**：用于验证表格表单（更多内容见配方\
  \ 3-2）。\n>\n> **页面级验证**：当您的验证涉及表单中的多个页面项时使用此类型（例如，确保开始日期早于结束日期）。\n\n“条件类型”字段允许您指定应用验证的条件。例如，如果出院的患者恰好是该医院的\
  \ VIP 患者，您可能不需要检查付款。您可以在出院患者表单中包含一个复选框，如果勾选，则表示该患者是 VIP 会员。条件配置允许您创建一个可以检查此标志的规则，如果勾选，则跳过验证。\n\
  \n### 3-2. 为您的表格表单添加服务器端验证\n\n#### 问题\n\n您有一个“员工”表格表单，需要执行服务器端验证。您需要确保在提交表单时，社会保障号不为空。\n\
  \n#### 解决方案\n\n要为您的表格表单添加服务器端验证，请按照以下步骤操作：\n\n1.  创建清单 3-5 中所示的表。\n\n    ***清单 3-5.**\
  \ 示例员工表*\n\n    ```\n    CREATE table \"EMPLOYEE\" (\n        \"EMPLOYEENAME\" \
  \    NVARCHAR2(255),\n        \"EMPLOYEETYPE\"     NVARCHAR2(10),\n        \"SOCIALSECURITYNO\"\
  \ NVARCHAR2(10),\n        \"EMPLOYEEID\"       NVARCHAR2(10),\n        constraint\
  \  \"EMPLOYEE_PK\" primary key (\"EMPLOYEEID\")\n    )\n    /\n\n    CREATE sequence\
  \ \"EMPLOYEE_SEQ\"\n    /\n\n    CREATE trigger \"BI_EMPLOYEE\"\n      before insert\
  \ on \"EMPLOYEE\"\n      for each row\n    begin\n      if :NEW.\"EMPLOYEEID\" is\
  \ null then\n        select \"EMPLOYEE_SEQ\".nextval into :NEW.\"EMPLOYEEID\" from\
  \ dual;\n      end if;\n    end;\n    ```\n2.  基于 `EMPLOYEE` 表创建一个数据库应用程序/表格表单。\n\
  \n    ![images](img/square.jpg) **提示** 配方 2-6 展示了如何创建表格表单。\n\n3.  导航到您的表格表单的“页面定义”区域的“页面呈现”部分。\n\
  4.  展开以下节点：`Employee` ![images](img/U001.jpg) `区域` ![images](img/U001.jpg) `正文 (3)`\
  \ ![images](img/U001.jpg) `EMPLOYEE` ![images](img/U001.jpg) `报表列`，右键单击 `SOCIALSECURITYNO`\
  \ 字段，然后单击“创建验证”子菜单项，如图 3-6 所示。\n\n    ![images](img/0306.jpg)\n\n    ***图 3-6.**\
  \ 为 SOCIALSECURITYNO 字段添加验证*\n\n5.  在下一页，选择“列非空”验证类型（您正在检查以确保 `SocialSecurityNo`\
  \ 字段不为空）。在下一页使用默认设置。\n6.  在接下来的页面中，您将可以指定验证失败时显示的错误消息。输入以下错误消息：“请指定员工的社会保障号码。”\n\
  7.  在下一页，为“按下按钮时”字段选择“添加”（添加行）。保存更改并运行您的表格表单。将社会保障号码字段留空并尝试提交表格表单。您应该看到如图 3-7 所示的屏幕。\n\
  \n![images](img/0307.jpg)\n\n***图 3-7.** 运行中的表格表单验证*\n\n#### 工作原理\n\n您可以在表格表单的以下四个事件中的任何一个插入简单验证：\n\
  \n*   用户单击“添加”（添加行）按钮时。\n*   用户单击“取消”按钮时。\n*   用户单击“删除”按钮时。\n*   用户单击“提交”按钮时。\n\n\
  ![images](img/square.jpg) **注意** 并非所有标准表单的验证选项都适用于表格表单。例如，表格表单不支持您在配方 3-1 中看到的复杂类型的\
  \ `PL/SQL` 验证。\n\n### 3-3. 为您的表单添加客户端 JavaScript 验证\n\n#### 问题\n\n当焦点移开标准表单上的数值字段时，您需要立即检查输入的值是否在特定范围内，如果不在则显示错误消息。您希望使用\
  \ JavaScript 来完成此操作，这样可以消除到服务器的往返行程。\n\n\n\n#### 解决方案\n\n要为表单添加客户端验证，请按照以下步骤操作：\n\
  \n1.  创建如清单 3-6 所示的表，并基于该表创建一个数据库应用/数据录入表单。\n\n    **清单 3-6.** 示例薪资表\n\n    ```sql\n\
  \    CREATE table \"SALARIES\" (\n        \"PAYROLLID\"    NVARCHAR2(255),\n   \
  \     \"EMPLOYEENAME\" NVARCHAR2(255),\n        \"SALARY\"       NUMBER(6,2),\n\
  \        constraint  \"SALARIES_PK\" primary key (\"PAYROLLID\")\n    )\n    /\n\
  \n    CREATE sequence \"SALARIES_SEQ\"\n    /\n\n    CREATE trigger \"BI_SALARIES\"\
  \n      before insert on \"SALARIES\"\n      for each row\n    begin\n      if :NEW.\"\
  PAYROLLID\" is null then\n        select \"SALARIES_SEQ\".nextval into :NEW.\"PAYROLLID\"\
  \ from dual;\n      end if;\n    end;\n    /\n    ```\n\n2.  导航到表单“页面定义”区域的“页面呈现”部分。\n\
  3.  右键单击根节点（你的数据录入表单），并选择“编辑”子菜单项。\n4.  在下一页中，导航到“HTML 头和主体属性”选项卡。在“HTML 头”字段中，输入如清单\
  \ 3-7 所示的 JavaScript 代码。你应该会看到如图 3-8 所示的屏幕。单击“应用更改”按钮。\n\n    **清单 3-7.** 验证 JavaScript\n\
  \n    ```html\n    <script type=\"text/javascript\">\n      function validSalary(object){\n\
  \        if(parseInt(object.value)>5000)\n       alert('Salary must be a figure\
  \ below $5000');\n      }\n    </script>\n    ```\n    ![images](img/0308.jpg)\n\
  \n    **图 3-8.** 指定 `validSalary` JavaScript 函数\n\n5.  完成此操作后，再次导航到表单的“页面定义”区域。在“页面呈现”部分，在“薪资\
  \ ![images](img/U001.jpg) 区域 ![images](img/U001.jpg) 主体 (3) ![images](img/U001.jpg)\
  \ 薪资 ![images](img/U001.jpg) 项”菜单下，右键单击 `P1_SALARY` 表单项。在弹出菜单中单击“编辑”项。\n6.  导航到“元素”选项卡，并在“HTML\
  \ 表单元素属性”字段中键入清单 3-8 所示的代码（如图 3-9 所示）。\n\n    **清单 3-8.** 向薪资字段添加 JavaScript 事件处理程序\n\
  \n    ```html\n    onblur=\"validSalary(this);\"\n    ```\n    ![images](img/0309.jpg)\n\
  \n    **图 3-9.** 向 SOCIALSECURITYNO 字段添加验证\n\n7.  应用你的更改。现在运行表单。如果你在“薪资”字段中输入一个大于\
  \ 5000 的值，然后离开该字段，它将显示一个 JavaScript 弹出错误消息，如图 3-10 所示。\n\n![images](img/0310.jpg)\n\
  \n**图 3-10.** 运行中的客户端验证\n\n#### 工作原理\n\nAPEX 中的客户端验证完全通过 JavaScript 实现，它非常有用，因为不会产生到服务器的额外往返。你通常在以下情况使用客户端验证：\n\
  \n*   检查缺失值。\n*   检查数值或日期值是否在特定范围内。\n*   检查特定值的长度是否超过最大字符数。\n\n表单的“HTML 头和主体属性”部分允许你插入\
  \ JavaScript 代码块，这些代码块在渲染特定页面时会被包含在内。你可以使用此部分插入一系列 JavaScript 函数，这些函数可以从表单中的任何项有选择地调用。\n\
  \n如你之前所见，“HTML 表单元素属性”字段允许你为表单上的每个页面项指定 JavaScript 事件处理程序。你可以从此区域调用在“HTML 头和主体属性”部分中定义的\
  \ JavaScript 函数。\n\n### 3-4. 动态更改下拉列表中的项列表\n\n#### 问题\n\n你有一个下拉列表。当你更改此下拉列表中的值时，你希望另一个下拉列表中的值也随之更改。换句话说，你希望创建一个级联下拉列表。\n\
  \n例如，你有一个设备请求表单。提交请求时，你可以使用类别和子类别下拉列表来聚焦到特定设备。当你更改设备类别时，子类别列表会刷新，仅显示与该类别相关的设备。\n\
  \n#### 解决方案\n\n要测试此配方中的解决方案，你首先需要设置一些示例数据库和表单对象。之后，你将在这两个下拉列表之间创建级联关系。让我们从示例对象开始。\n\
  \n\n## 设置示例对象\n\n要设置本教程中使用的示例对象，请按照以下步骤操作：\n\n1.  创建如清单 3-9 所示的表。\n\n    ***清单 3-9.**\
  \ 示例设备请求表*\n\n    ```\n    CREATE table \"EQUIPMENTREQUEST\" (\n        \"REQUESTID\"\
  \   NVARCHAR2(10),\n        \"CATEGORY\"    NVARCHAR2(255),\n        \"SUBCATEGORY\"\
  \ NVARCHAR2(255),\n        constraint  \"EQUIPMENTREQUEST_PK\" primary key (\"REQUESTID\"\
  )\n    )\n    /\n\n    CREATE sequence \"EQUIPMENTREQUEST_SEQ\"\n    /\n\n    CREATE\
  \ trigger \"BI_EQUIPMENTREQUEST\"\n      before insert on \"EQUIPMENTREQUEST\"\n\
  \      for each row\n    begin\n      if :NEW.\"REQUESTID\" is null then\n     \
  \   select \"EQUIPMENTREQUEST_SEQ\".nextval into :NEW.\"REQUESTID\" from dual;\n\
  \      end if;\n    end;\n    /\n\n    CREATE table \"CATEGORY\" (\n        \"CATEGORYNAME\"\
  \ NVARCHAR2(255),\n        \"CATEGORYID\"   NUMBER(6,2),\n        constraint  \"\
  CATEGORY_PK\" primary key (\"CATEGORYID\")\n    )\n    /\n\n    CREATE sequence\
  \ \"CATEGORY_SEQ\"\n    /\n\n    CREATE trigger \"BI_CATEGORY\"\n      before insert\
  \ on \"CATEGORY\"\n      for each row\n    begin\n      if :NEW.\"CATEGORYID\" is\
  \ null then\n        select \"CATEGORY_SEQ\".nextval into :NEW.\"CATEGORYID\" from\
  \ dual;\n      end if;\n    end;\n    /\n\n    CREATE table \"SUBCATEGORY\" (\n\
  \        \"SUBCATEGORYNAME\"  NVARCHAR2(255),\n        \"PARENTCATEGORYID\" NUMBER(6,2),\n\
  \        \"SUBCATEGORYID\"    NUMBER(6,2),\n        constraint  \"SUBCATEGORY_PK\"\
  \ primary key (\"SUBCATEGORYID\")\n    )\n    /\n\n    CREATE sequence \"SUBCATEGORY_SEQ\"\
  \n    /\n\n    CREATE trigger \"BI_SUBCATEGORY\"\n      before insert on \"SUBCATEGORY\"\
  \n      for each row\n    begin\n      if :NEW.\"SUBCATEGORYID\" is null then\n\
  \        select \"SUBCATEGORY_SEQ\".nextval into :NEW.\"SUBCATEGORYID\" from dual;\n\
  \      end if;\n    end;\n    /\n    ```\n\n2.  现在创建如清单 3-10 所示的示例数据。`MODEM`和`NETWORK\
  \ CARD`子类别项属于父类别`HARDWARE`，而`LOTUS NOTES`和`SHAREPOINT`子类别项属于父类别`SOFTWARE`。本例中的外键是`PARENTCATEGORYID`列。\n\
  \n    ***清单 3-10.** 创建示例数据*\n\n    ```\n    INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
  \ VALUES(1,'SOFTWARE')\n    /\n    INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
  \ VALUES(2,'HARDWARE')\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
  \ VALUES('LOTUS NOTES',1,1)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
  \ VALUES('SHAREPOINT',1,2)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
  \ VALUES('NETWORK CARD',2,3)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
  \ VALUES('MODEM',2,4)\n    /\n    ```\n\n3.  现在，基于`EquipmentRequest`表创建一个数据库应用程序/标准录入表单。转到表单的“页面定义”\
  \ > “页面渲染”视图，将`CATEGORY`字段更改为`选择列表`。选择为该字段创建动态值列表，分别将`CATEGORY`、`CATEGORYNAME`和`CATEGORYID`设置为表名、显示列和返回值。\n\
  \n    ![images](img/square.jpg) `提示` 请参阅教程 2-4 了解如何创建动态下拉列表。\n\n4.  对`SUBCATEGORY`字段重复相同操作，分别使用`SUBCATEGORY`、`SUBCATEGORYNAME`和`SUBCATEGORYID`作为表名、显示列和返回值。\n\
  \n5.  再次编辑`CATEGORY`字段，在“默认值”选项卡下，输入`1`作为默认值。这将把类别下拉列表中默认选定的值设置为`SOFTWARE`。\n\n\
  6.  测试你的表单。你应该能看到两个包含先前输入数据的下拉列表，但目前它们之间没有级联关系，如图 3-11 所示。\n\n    ![images](img/0311.jpg)\n\
  \n    ***图 3-11.** 没有级联关系的下拉列表*\n\n## 创建级联关系\n\n要在两个下拉列表之间创建级联关系，请按照以下步骤操作：\n\n\
  1.  在“页面定义” > “页面渲染”视图中，编辑`SUBCATEGORY`字段。导航到“值列表”选项卡。将“级联值列表父项”字段设置为`P1_CATEGORY`。\n\
  \n2.  在“值列表定义”区域，在 SQL 中添加过滤条件 `WHERE PARENTCATEGORYID=:P1_CATEGORY`。现在，你应该看到如图\
  \ 3-12 所示的屏幕。\n\n    ![images](img/0312.jpg)\n\n    ***图 3-12.** 创建级联关系*\n\n3. \
  \ 应用你的更改并再次运行表单。注意，当你更改选定的类别时，子类别下拉列表将仅显示与该类别相关的项目（参见图 3-13）。\n\n    ![images](img/0313.jpg)\n\
  \n    ***图 3-13.** 运行中的级联关系*\n\n#### 工作原理\n\n你可以使用 PL/SQL 在 `选择列表` 页面项的“值列表”选项卡中轻松指定动态下拉列表返回的值列表\
  \ (LOV)。\n\n你可能还注意到，你可以使用 `:ItemName` 语法（冒号后跟页面项名称）在 PL/SQL 代码中直接引用表单字段。这允许你创建动态\
  \ PL/SQL 代码，实时使用表单中输入的数据进行进一步处理。\n\n### 3-5. 动态禁用或隐藏表单的一部分\n\n#### 问题\n\n你有一个标准表单上的字段列表，希望根据另一个字段中指定的值来隐藏（设置为不可见）。以教程\
  \ 3-2 中的示例员工表为背景，如果员工类型被输入为 `LOCAL`，你可能会选择隐藏员工的社保号码。\n\n#### 解决方案\n\n要创建动态操作以隐藏表单的一部分，请按照以下步骤操作：\n\
  \n1.  从教程 3-2 中的 `EMPLOYEE` 表创建一个数据库应用程序/标准录入表单。\n2.  从 `EMPLOYEE` 表创建一个标准录入表单。\n\
  3.  导航到表单的`页面定义`区域。右键单击`P1_EMPLOYEETYPE`字段，然后选择“创建动态操作”菜单项。\n4.  在向导的第一页，选择“标准”动态操作类型。接下来，为你的动态操作分配一个名称。\n\
  5.  在向导的下一页，在“值”字段中指定`LOCAL`（如图 3-14 所示）。\n\n    ![images](img/0314.jpg)\n\n   \
  \ ***图 3-14.** 配置动态操作*\n\n6.  在向导的下一页，指定“隐藏”选项。确保勾选“创建相反操作”复选框。\n7.  接下来，系统将要求你选择要隐藏的字段。从“选择类型”字段中选择`项`，并添加`P1_SOCIALSECURITYNO`到右侧的框中（如图\
  \ 3-15 所示）。\n\n    ![images](img/0315.jpg)\n\n    ***图 3-15.** 指定动态操作的目标*\n\n8.\
  \  单击“创建”按钮。现在，运行你的表单。在“员工类型”字段中输入`LOCAL`。完成后，将焦点移离该字段。“社保号码”字段将立即从视图中消失（如图 3-16\
  \ 所示）。如果你在“员工类型”字段中输入除 `LOCAL` 以外的任何内容，此行为将不会应用。\n\n    ![images](img/0316.jpg)\n\
  \n    ***图 3-16.** 表单中运行的动态操作*\n\n#### 工作原理\n\n动态操作是在特定页面项目上应用的客户端行为，通常使用 JavaScript\
  \ 和 AJAX 的组合实现。APEX 提供了向导（例如你之前在本配方中看到的那个）来自动生成客户端行为。如果你想实现以下功能，动态操作非常有用：\n\n* \
  \  当表单上发生某些事件时（例如：输入了特定数据或某个字段被双击），动态隐藏或显示表单的某些部分。\n*   当表单上发生某些事件时，启用或禁用表单上的某些字段。\n\
  \n![images](img/square.jpg) **注意** 过去，APEX 开发人员必须手动编写 JavaScript/AJAX 代码来创建动态行为。在\
  \ Apex 4.0 中，向导允许你轻松生成动态客户端行为——将开发人员从复杂的 JavaScript 编程中解放出来。\n\n### 3-6. 存储计算值\n\
  \n#### 问题\n\n你需要对通过表单输入的某些值进行计算，然后再将最终值存储到数据库中。以配方 3-3 中的示例 `Salaries` 表为例，你可能希望在将金额保存到数据库之前，对工资进行一些计算。\n\
  \n#### 解决方案\n\n要在表单中创建计算字段，请按照以下步骤操作：\n\n1.  导航到 Salaries 表单的页面定义区域。在页面处理部分的 `After\
  \ Submit` 根节点下，右键单击 Computations 节点。\n2.  在向导的第一页，选择“此页面上的项目”位置类型。在下一页中，为 Compute\
  \ Item 字段选择 `P1_SALARY`，为 `type` 字段选择 `PL/SQL Function Body`。\n3.  在下一页，你将能够指定要应用的计算。例如，你可以使用以下\
  \ PL/SQL 来指定所有输入的工资在存储到数据库时都应增加 20%：`return (:P1_SALARY * 20)/100 + :P1_SALARY`\n\
  4.  保存你的更改并运行表单。尝试在工资字段中输入值 500（如 图 3-17 所示）并创建记录。\n\n    ![images](img/0317.jpg)\n\
  \n    ***图 3-17.** 运行 Salaries 表单*\n\n5.  现在，使用对象浏览器检查你的数据库。你可以看到计算已应用于你的数据（如 图\
  \ 3-18 所示）。\n\n![images](img/0318.jpg)\n\n***图 3-18.** 存储在数据库中的计算值*\n\n#### 工作原理\n\
  \nAPEX 计算允许你在表单的不同事件上应用计算算法。它可用于向最终用户显示计算值（例如，货币转换后的金额）（通过只读文本页面项目字段），或将计算值保存在数据库中。\n\
  \n### 3-7. 与 Web 服务交互\n\n#### 问题\n\n当你在表单中单击一个按钮时，需要连接到一个 Web 服务，向其传递一个参数，并让 Web\
  \ 服务返回一个值，然后你可以在表单上显示该值。例如，你可能希望显示通过表单指定的两种不同货币的最新汇率（从 Web 服务检索）。\n\n#### 解决方案\n\
  \n要测试本配方中的解决方案，你首先需要设置一个示例表单。之后，你需要将对 Web 服务的引用添加到你的应用程序中。最后，你需要在表单中使用该引用。让我们从创建示例表单开始。\n\
  \n##### 创建示例表单\n\n要创建本配方中使用的示例表单，请按照以下步骤操作：\n\n1.  你需要做的第一件事是创建一个用于输入货币代码的示例表单（并在同一表单中显示通过\
  \ Web 服务检索到的汇率）。\n2.  创建一个新应用程序并向该应用程序添加一个空白页面。在“页面定义 > 页面呈现”区域中，创建一个名为 `P1_FROMCODE`\
  \ 的新页面项目（文本字段）。为此页面项目使用默认设置。之后，创建另一个文本字段页面项目 `P1_TOCODE`，设置类似。接下来，创建一个名为 `P1_RETURNEDRATE`\
  \ 的数字字段页面项目。\n3.  接下来，在表单中创建一个按钮。右键单击“项目”节点并选择“创建按钮”。指定 `P1_GETCURRENCYRATE` 作为按钮的名称，将“标签”字段设置为“获取货币汇率”，并将\
  \ `按钮样式` 更改为“HTML 按钮”（如 图 3-19 所示）。最后，单击“创建按钮”。\n\n    ![images](img/0319.jpg)\n\
  \n    ***图 3-19.** 配置“获取货币汇率”按钮*\n\n4.  你现在应该看到如 图 3-20 所示的屏幕。\n\n![images](img/0320.jpg)\n\
  \n***图 3-20.** CurrencyRateReq 表单中的页面项目列表*\n\n##### 添加 Web 服务引用\n\n要向你的应用程序添加 Web\
  \ 服务引用，请按照以下步骤操作：\n\n1.  你现在需要添加对 Web 服务的引用。导航到你的应用程序主页，然后单击“共享组件”图标。在“逻辑”部分，单击“Web\
  \ 服务引用”。单击“创建”按钮以添加新的 Web 服务引用。\n2.  在向导的第一页，选择“基于 WSDL”选项。当被问及是否要搜索 UDDI 注册表以查找\
  \ WSDL 时，选择“否”。在向导的下一页，在 WSDL 位置字段中指定 [`www.webservicex.net/CurrencyConvertor.asmx?wsdl`](http://www.webservicex.net/CurrencyConvertor.asmx?wsdl)（如\
  \ 图 3-21 所示）。\n\n    ![images](img/0321.jpg)\n\n    ***图 3-21.** Web 服务 URL*\n\n\
  3.  单击“完成”按钮。Web 服务应成功创建。\n\n\n## 从您的表单调用 Web 服务\n\n要在您的表单中使用 Web 服务引用，请遵循以下步骤：\n\
  \n1.  在页面定义 `images/U001.jpg` 的“页面处理”区域中，右键单击“提交后”下的 `Processes`（过程），然后单击“创建”按钮。\n\
  2.  选择“Web 服务”过程类型。在下一个页面中，为过程指定一个名称。在随后的页面中，在“Web 服务引用”字段中选择 `CurrencyConverter`\
  \ Web 服务。此时会立即出现另一个“操作”字段。选择 `ConversionRate` 操作。这将依次显示该 Web 服务方法的输入参数和输出参数列表。\n\
  3.  对于“Web 服务输入参数”部分中的 `From Currency`（来源货币）参数，使用文本字段右侧的小箭头按钮从弹出列表中选择 `P1_FROMCODE`\
  \ 字段。为 `To Currency`（目标货币）字段选择 `P1_TOCODE`。确保这两个参数的“来源”均设置为“项”。\n4.  对于“Web 服务输出参数”部分，选择将结果存储在\
  \ `Items`（项）中。在 `ConversionRateResult`（汇率转换结果）参数的“值”字段中指定 `P1_RETURNEDRATE`。完成配置后，您应该看到类似于\
  \ 图 3-22 中的截图所示的内容。\n\n    ![images](img/0322.jpg)\n\n    图 3-22. 指定 Web 服务详细信息\n\
  \n5.  在向导的下一页中，您可以分别指定 Web 服务调用成功或失败时显示的成功消息和错误消息。继续到向导的下一步，在此您可以选择在单击表单上的“获取汇率”按钮时调用\
  \ Web 服务。在“当按钮被按下时”字段中选择 `P1_GETCURRENCYRATE`（如 图 3-23 所示）。\n\n    ![images](img/0323.jpg)\n\
  \n    图 3-23. 将 Web 服务执行挂接到“获取汇率”按钮\n\n6.  最后，单击“创建过程”按钮以完成向导。现在运行您的表单。在 `FromCode`\
  \ 和 `ToCode` 字段中指定三位字母的货币代码，然后单击“获取汇率”按钮。您应该能够在 `ReturnedRate`（返回汇率）字段中看到返回的货币汇率（如\
  \ 图 3-24 所示）。\n\n    ![images](img/0324.jpg)\n\n    图 3-24. 实际运行中的 Web 服务调用\n\n\
  ![images](img/square.jpg) **注意** 由于本例中使用的 Web 服务托管在网上，您需要确保托管 APEX 实例的服务器具有到互联网的活动连接，此示例才能工作。\n\
  \n#### 工作原理\n\n“Web 服务引用”部分提供了一个全局共享区域，允许您定义 Web 服务数据源。将 Web 服务引用集中在一处，而不是在整个应用程序中硬编码它们，可以在\
  \ Web 服务的 URL 或地址发生变更时，使您的应用程序更易于维护。\n\nWeb 服务可以在表单执行过程中的任何时刻被调用——当表单加载时、当按钮被点击时，或者当满足特定条件时。APEX\
  \ 还支持两种不同类型的 Web 服务：RESTful Web 服务和基于 WSDL 的 Web 服务。\n\n### 3-8. 保存页面时运行 PL/SQL\
  \ 过程\n\n#### 问题\n\n提交表单后，您希望将通过表单输入的一些数据保存到另一个单独的表中。例如，您有一个“患者出院”表单。当您在此表单中创建一条记录时，需要在“支付历史”表单中创建一个对应的条目。\n\
  \n#### 解决方案\n\n要在保存页面时运行 PL/SQL 过程，请遵循以下步骤：\n\n1.  在配方 3-1 中创建示例表。\n2.  基于 `PATIENTDISCHARGE`\
  \ 表创建一个新的数据库应用程序/标准数据录入表单。\n3.  在“患者出院”表单的页面定义 `images/U001.jpg` “页面处理”区域中，右键单击“处理”节点下的\
  \ `Processes`（过程）节点，并选择“创建”菜单项。\n4.  在向导的第一步中，选择 `PL/SQL` 项。\n5.  在向导的下一页中指定过程的名称，并为“点”字段选择“提交后\
  \ - 计算和验证之后”。\n6.  在下一页中，指定 清单 3-11 中所示的 PL/SQL。您现在应该看到如 图 3-25 所示的屏幕。\n\n    清单\
  \ 3-11. 向另一个表插入数据\n\n    ```sql\n    INSERT INTO PAYMENTHISTORY(SOCIALSECURITYNO,AMOUNTPAID)\
  \ VALUES (:P1_PATIENTSOCIALSECURITYNO,0)\n    ```\n\n    ![images](img/0325.jpg)\n\
  \n    图 3-25. 指定过程详细信息\n\n7.  保存您的更改并立即运行表单。在“社会安全号码”字段中键入 99999999 并创建记录。使用对象浏览器，打开\
  \ `PAYMENTHISTORY` 表。您应该能够看到此表中自动创建了一条社会安全号码为 99999999 的新记录。\n\n#### 工作原理\n\n过程是一种服务器端任务，当表单中发生某个事件时执行。通过向导可以生成多种不同类型的过程（例如，运行\
  \ PL/SQL 脚本、发送电子邮件或调用 Web 服务）。您甚至可以创建过程来动态修改应用程序中的会话状态。通过向导，过程还可以绑定到表单上的按钮项，以便当表单上的按钮被点击时，过程会立即执行。\n\
  \n![images](img/square.jpg) **提示** 过程也可以由客户端 JavaScript 事件启动。通过检查回发参数，可以执行不同的服务器端过程。\n\
  \n### 3-9. 从表单发送电子邮件\n\n#### 问题\n\n您需要在单击表单上的按钮时发送电子邮件。您还想使用通过表单输入的数据作为电子邮件中的各种参数。\n\
  \n\n\n"
- "# 第四章：自定义外观与感觉\n\n自定义应用程序的外观与感觉是解决方案交付中最关键的一环。这个过程定义了您的应用如何呈现给最终用户。APEX 在这方面极其灵活，允许您自定义的不仅仅是页面的配色方案、页眉和页脚，甚至包括表单上控件使用的属性。\n\
  \n很多时候，像您这样的用户并不仅仅是在为内部网环境创建独立的 Web 应用程序。我知道许多开发者使用 APEX，是因为他们需要一种更简便的方式将表单集成到面向公众的网站中。试想一下公共网站上的“申请职位”版块。当访问者点击链接时，他们不应该感觉自己被重定向到了一个全新的门户网站。该“申请职位”表单的观感应该与网站上的任何其他页面别无二致。为了实现这个目标，开发者需要使表单的配色方案、页眉和页脚与网站的其余部分保持一致。\n\
  \nAPEX 提供了完善的工具，让您可以更改应用程序中用户界面的方方面面。在本章中，我们将探讨其基本方法。\n\n### 4-1. 为表单添加图片页眉\n\n\
  #### 问题\n\n您需要在表单的页眉区域添加一张图片。\n\n#### 解决方案\n\n要向表单的页眉区域添加图片，请按照以下步骤操作：\n\n1.  在应用程序构建器中点击一个现有应用程序。\n\
  2.  点击“共享组件”图标。在随后出现的页面中，点击“文件”部分下的 `图片` 链接，如 图 4-1 所示。\n\n    ![images](img/0401.jpg)\n\
  \n    **图 4-1.** “文件”部分中的“图片”链接\n\n3.  在随后出现的页面中，点击右上角的黄色“创建”按钮。从列表中选择您的应用程序，并浏览选择一个横幅图片（GIF、JPG\
  \ 或 PNG 文件）进行上传。完成后，点击 `上传` 按钮。\n4.  现在，您应该能在应用程序中看到您的图片了，如 图 4-2 所示。\n\n    ![images](img/0402.jpg)\n\
  \n    **图 4-2.** Testsample.gif 图片\n\n5.  现在，导航到应用程序中的一个现有表单并点击它，以查看其 `页面定义`。\n\
  6.  在表单的 `共享组件` 区域，展开 `模板` 节点，然后是 `区域` 节点，右键单击 `表单区域` 节点，并选择 `编辑` 菜单项（如 图 4-3 所示）。\n\
  \n    ![images](img/0403.jpg)\n\n    **图 4-3.** 导航到表单区域模板定义页面\n\n7.  在随后出现的页面中，点击“定义”选项卡。在模板框中的\
  \ DIV 标签上方添加以下 HTML 标签：`<img border=\"0\" src=\"#APP_IMAGES#Testsample.gif\">`\n\
  8.  您现在应该能看到如 图 4-4 所示的屏幕。\n\n    ![images](img/0404.jpg)\n\n    **图 4-4.** 在模板中包含\
  \ Testsample.gif 图片\n\n9.  保存您的更改并运行表单。您现在应该能在表单顶部看到您的图片了，如 图 4-5 所示。\n\n    ![images](img/0405.jpg)\n\
  \n    **图 4-5.** 表单中的新图片页眉\n\n![images](img/square.jpg) **注意** 图片名称区分大小写！如果使用不正确的大小写，您的图片可能根本不会显示。\n\
  \n## 解决方案（针对前一个配方上下文）\n\n要测试此配方中的解决方案，您首先需要创建示例数据库和表单对象。然后，您需要从表单中调用“发送电子邮件”过程。让我们首先创建此配方中使用的示例对象。\n\
  \n### 创建示例对象\n\n要创建此配方中使用的示例对象，请按照以下步骤操作：\n\n1.  创建如 清单 3-12 所示的表，并基于该表创建一个新的数据库应用程序/数据录入表单。\n\
  \n    **清单 3-12.** PatientDB 表\n\n    ```sql\n    CREATE table \"PATIENTDB\" (\n\
  \        \"PATIENTNAME\"      NVARCHAR2(255),\n        \"PATIENTEMAIL\"     NVARCHAR2(255),\n\
  \        \"PATIENTDIAGNOSIS\" NVARCHAR2(2000),\n        \"PATIENTID\"        NVARCHAR2(10),\n\
  \        constraint  \"PATIENTDB_PK\" primary key (\"PATIENTID\")\n    )\n    /\n\
  \n    CREATE sequence \"PATIENTDB_SEQ\"\n    /\n\n    CREATE trigger \"BI_PATIENTDB\"\
  \n      before insert on \"PATIENTDB\"\n      for each row\n    begin\n      if\
  \ :NEW.\"PATIENTID\" is null then\n        select \"PATIENTDB_SEQ\".nextval into\
  \ :NEW.\"PATIENTID\" from dual;\n      end if;\n    end;\n    /\n    ```\n\n###\
  \ 发送电子邮件\n\n要从表单调用“发送电子邮件”过程，请按照以下步骤操作：\n\n1.  在 `PatientDB` 表单的“页面定义” ![images](img/U001.jpg)\
  \ “页面呈现”部分，添加一个名为“发送电子邮件”的新按钮项。将按钮类型更改为 HTML 按钮，并将按钮标签设置为“发送电子邮件”。\n2.  在 `PatientDB`\
  \ 表单的“页面定义” ![images](img/U001.jpg) “页面处理”部分，右键单击“处理”节点下的“过程”，并选择创建新过程。\n3.  在向导的第一页，选择“发送电子邮件”过程。接着，为该过程指定一个名称。在下一页，指定电子邮件的内容和收件人。您可以使用替换语法（例如，`&P1_PATIENTNAME`）将表单中的数据插入到电子邮件中。图\
  \ 3-26 所示的图展示了一个典型电子邮件的配置，该邮件使用了通过表单输入的患者电子邮件地址和姓名。\n\n    ![images](img/0326.jpg)\n\
  \n    **图 3-26.** 指定电子邮件的详细信息\n\n4.  在下一页，指定要显示的成功或失败消息。在向导的后续页面中，在“当按下按钮时”字段中指定\
  \ `P1_SENDEMAIL` 字段。\n5.  保存更改并运行表单。在“患者电子邮件”字段中指定一个可用的电子邮件地址。点击“发送电子邮件”按钮。一封电子邮件应发送到您指定的地址。\n\
  \n#### 工作原理\n\n发送电子邮件也是一个服务器端过程。外发电子邮件不会立即发送（除非您在过程配置向导中特别指定了这样做），而是会进入队列，直到一个 `DBMS_JOB`\
  \ 作业将其出队并发送出去。\n\n\n\n"
- "# 第 4 章：自定义样式\n\n#### 工作原理\n\n在开始之前，您应该了解 APEX 中用于修改应用程序外观时使用的各种术语。表 4-1 描述了其中一些术语。\n\
  \n**表 4-1.** 部分 APEX 术语\n\n| **术语** | **描述** |\n| --- | --- |\n| `Template` | 模板是一个\
  \ HTML 字符串，代表 APEX 应用程序中的用户界面元素。例如，标准按钮模板类似于这样：<br>`<button value=\"#LABEL#\" onclick=\"\
  #LINK#\" class=\"button-gray\" type=\"button\">`<br>`  <span>#LABEL#</span>`<br>`</button>`\
  \ |\n|  | 模板的灵活性在于开发者可以实际修改这些模板，创建在整个应用程序或工作区中使用的标准模板。例如，只需将现有按钮模板修改为包含宽度标签 `<button\
  \ width=\"300px\"`，整个应用程序中的所有按钮将立即变为 300 像素宽。实际上，开发者甚至可以完全更改 HTML，将 `<button>` 标签替换为\
  \ `<img>` 标签以创建图像按钮。 |\n| `Theme` | APEX 中的每种控件和用户界面元素都由模板表示。这些模板的完整集合被称为主题。换句话说，主题就是模板的集合。<br>主题使您的开发者能够轻松地为应用程序换肤，并通过点击几下鼠标即可从一个主题切换到另一个主题。\
  \ |\n| `Substitution String` | 在按钮模板示例中，您可能注意到了像 `#LABEL#` 这样的特殊标签（括在两个井号 `#` 之间的短语）。这些称为替换字符串，为开发者提供了一种在模板中插入动态字段的简便方法。<br>例如，`#LABEL#`\
  \ 实际上代表将在按钮上显示的文本。当您的表单由 APEX 渲染时，它们会被实际值（在本例中为按钮文本）替换。可以将其视为邮件合并。<br>通过这种方式，您可以重新定位和移动这些替换字符串以实现有趣的效果。例如，您可以编写一个\
  \ `onclick` JavaScript 处理程序来提示确认框，该确认框使用 `#LABEL#` 替换字符串显示按钮文本作为其消息的一部分：<br>`<button\
  \ value=\"#LABEL#\" onclick=\"if (confirm('Are`<br>`you sure you wish to click the\
  \ #LABEL# button'))`<br>`#LINK#\" ...` |\n\n现在您了解了这些术语，让我们看看如何在 APEX 中使用用户上传的图像。APEX\
  \ 将图像视为可以在应用程序或工作区内多次重用的资源。在应用程序中使用任何图像之前的第一步是导入它。应用程序的 `Shared Components` 区域，顾名思义，是一个全局区域，页面可以引用它来检索图像资源。\n\
  \n当图像已上传到此全局区域后，您可以轻松地从页面模板的任何部分引用它。但是，您不能仅仅使用其文件名来引用它；您还必须指定文件名的路径。该路径不是指定为 URL，而是指定为替换字符串；APEX\
  \ 稍后会将其替换为实际的 URL。如果您将图像上传到应用程序，则应使用 `#APP_IMAGES#` 替换字符串，如本食谱前面所见。要使用它，只需在替换字符串后附加文件名（中间没有任何斜杠），如下所示：\n\
  \n`#APP_IMAGES#myfile.jpg`\n\n如果您将图像上传到了工作区（以便工作区中的其他应用程序也可以使用该图像），也可以使用 `#WORKSPACE_IMAGES#`。\n\
  \n### 4-2. 为页面添加自定义 CSS 样式\n\n#### 问题\n\n您需要一种快速方法来声明多个样式表类，并使它们应用于表单中的某些元素。\n\n\
  #### 解决方案\n\n要为页面添加自定义 CSS 样式，请按照以下步骤操作：\n\n1.  在应用程序构建器中单击现有应用程序。\n2.  导航到应用程序中的现有表单并单击它以查看其页面定义。\n\
  3.  在表单的“页面呈现”区域中，右键单击表单根节点并选择“编辑”菜单项。\n4.  在打开的窗口中，单击“HTML 头部和正文属性”选项卡，并粘贴清单 4-1\
  \ 中显示的样式表类。（您现在应该拥有与图 4-6 中所示相同的屏幕）。\n\n    **清单 4-1.** 一个示例样式类\n\n    ```html\n\
  \    <style>\n    .specialstyle\n       {\n        font-family : Verdana;\n    \
  \    font-size : 12pt;\n        color : #FF0000;\n        font-weight : bold;\n\
  \        text-align :left ;\n        vertical-align : middle;\n    }\n    </style>\n\
  \    ```\n\n    ![images](img/0406.jpg)\n\n    **图 4-6.** 在 HTML 头部声明自定义样式\n\n5.\
  \  单击“应用更改”按钮以保存表单。导航回表单的“页面定义”区域。\n6.  在“共享组件”部分，展开“模板”节点，并进一步展开“按钮”节点。右键单击最深层的“按钮”节点，然后选择“编辑”菜单项。\n\
  7.  在打开的窗口中，单击“定义”选项卡，并将按钮的类更改为“specialstyle”，如图 4-7 所示。\n\n    ![images](img/0407.jpg)\n\
  \n    **图 4-7.** 引用 `specialstyle` 样式\n\n8.  保存更改并运行表单。您现在应该看到表单上的按钮为红色，如样式表类中所声明（参见图\
  \ 4-8）。\n\n    ![images](img/0408.jpg)\n\n    **图 4-8.** 应用在表单上的 `specialstyle`\
  \ 样式\n\n#### 工作原理\n\n如果您需要快速声明一些样式表类并在表单中使用它们（而无需在其他表单中重用这些类），声明它们的好地方是在“HTML 头部和正文属性”部分下，如本食谱前面所见。您在此部分中输入的任何内容都会按原样呈现在\
  \ APEX 生成的网页顶部。\n\n声明后，您可以通过样式类的名称直接引用这些样式。\n\n![images](img/square.jpg) **注意**\
  \ 通过将样式表类放在 HTML 头部和正文属性部分，您使其仅对该表单可用，而对应用程序中的其他表单不可用。要创建可在整个应用程序或工作区中全局使用的样式集，请考虑改用自定义\
  \ CSS 文件（在食谱 4-3 中介绍）。\n\n### 4-3. 使用自定义 CSS 文件\n\n#### 问题\n\n您有大量存储在 `.css` 文件中的样式表类，并且需要在应用程序中引用此\
  \ CSS 文件，以便可以将自定义样式应用于表单上的某些元素。\n\n\n\n#### 解决方案\n\n要使用自定义 CSS 文件，请按照以下步骤操作：\n\n\
  1.  使用记事本或任何其他编辑器工具创建一个新的 CSS 文件，内容如 代码清单 4-2 所示。\n\n    `代码清单 4-2. 一个示例 CSS 文件`\n\
  \    ```css\n    .buttonstyle_incss\n    {\n      font-family : Verdana;\n     \
  \ color : #FFFFFF;\n      font-weight : bold;\n      text-align :left ;\n      vertical-align\
  \ : middle;\n      width:150px;\n      height:25px;\n      background-color:#000000;\n\
  \    }\n    ```\n2.  在应用程序构建器中点击一个现有应用程序。\n3.  点击 `共享组件` 图标。在随后出现的页面中，点击 `文件` 部分下的\
  \ `层叠样式表` 链接。\n4.  点击 `创建` 按钮，向您的应用程序添加一个新的样式表。在随后出现的页面中，浏览并找到您的 `.CSS` 文件，然后点击右上角的黄色\
  \ `上载` 按钮。\n5.  您现在应该能看到您的 CSS 文件，如 图 4-9 所示。\n\n    ![images](img/0409.jpg)\n\n\
  \    `图 4-9. 新上载的 myclass.css 文件`\n\n6.  导航到您表单的页面定义区域。右键点击根表单节点，选择 `编辑` 菜单项。\n\
  7.  在随后出现的页面中，点击 `HTML 头和主体属性` 选项卡。在 `HTML 头` 文本框中，输入以下代码，将 `myclass.css` 替换为您上载的\
  \ CSS 类的名称。请注意，类名区分大小写。\n    ```html\n    <link href=\"#WORKSPACE_IMAGES#myclass.css\"\
  \ rel=\"stylesheet\" type=\"text/css\" />\n    ```\n8.  您现在应该看到如 图 4-10 所示的屏幕。\n\
  \n    ![images](img/0410.jpg)\n\n    `图 4-10. 引用 myclass.css 文件`\n\n9.  保存您的更改并返回到表单的\
  \ `页面定义` 区域。在 `共享组件` 部分，展开 `模板` ![images](img/U001.jpg) `按钮`，右键点击最深层的 `按钮` 节点，并选择\
  \ `编辑` 菜单项。\n10. 在随后出现的页面中点击 `定义` 选项卡，并将按钮的 `类` 属性设置为您在 CSS 样式表中定义的类的名称：`buttonstyle_incss`。您应该看到如\
  \ 图 4-11 所示的屏幕。\n\n    ![images](img/0411.jpg)\n\n    `图 4-11. 在您的 CSS 文件中引用 buttonstyle_incss\
  \ 样式`\n\n11. 保存您的更改并运行该表单。您表单上的按钮已经采用了您所附加的 CSS 文件中定义的黑底白字样式，如 图 4-12 所示。\n\n  \
  \  ![images](img/0412.jpg)\n\n    `图 4-12. 应用在您表单上的 CSS 文件`\n\n#### 工作原理\n\nCSS\
  \ 文件在 APEX 中也被视为资源。您可以全局上载一个 CSS 文件，并在工作区的任何应用程序中重复使用它。就像标准的 Web 应用程序开发一样，您必须先声明\
  \ CSS 文件，然后才能使用其中的样式。您可以通过在表单的 `HTML 头和主体属性` 部分包含 CSS 文件的标准 HTML 声明来实现，如下所示：\n\n\
  `<link href=\"#WORKSPACE_IMAGES#myclass.css\" rel=\"stylesheet\" type=\"text/css\"\
  \ />`\n\n![images](img/square.jpg) **注意** HTML 声明的 `href` 属性需要一个指向 CSS 文件的实际路径，因此您需要包含\
  \ `#WORKSPACE_IMAGES#` 替换字符串来告诉 APEX 到哪里去查找它。\n\n### 4-4. 在您的应用程序中创建新主题\n\n####\
  \ 问题\n\n您非常喜欢您的新黑底白字按钮，以至于您希望这个按钮成为您所有其他应用程序的事实标准。您希望创建一个包含此按钮作为默认项的特殊主题，以便开发人员可以轻松地将该主题用于其他应用程序。\n\
  \n#### 解决方案\n\n要使用新主题，您必须先创建主题，然后将应用程序主题切换到您的新主题。\n\n##### 创建新主题\n\n要创建新主题，请按照以下步骤操作：\n\
  \n1.  在应用程序构建器中点击一个现有应用程序。\n2.  点击 `共享组件` 图标，并点击 `用户界面` 部分内的 `主题` 链接（如 图 4-13 所示）。\n\
  \n    ![images](img/0413.jpg)\n\n    `图 4-13. 用户界面区域中的主题链接`\n\n3.  在随后出现的窗口中，点击\
  \ `创建` 按钮以启动主题创建向导。\n4.  在向导的第一步中，选择 `从存储库创建` 主题。\n5.  接下来，从主题列表中选择一个主题（选择您希望的任意主题）。最后，点击\
  \ `创建` 按钮以创建主题。\n6.  您现在应该能在 `主题` 区域看到您新创建的主题，如 图 4-14 所示。我选择了 `主题 8 (Orange)`。\n\
  \n    ![images](img/0414.jpg)\n\n    `图 4-14. 新创建的主题（主题 8 (Orange) - 8）`\n\n7. \
  \ 现在您拥有一个主题，您需要修改它以包含您的自定义按钮模板。点击该主题。您现在应该看到一个类似 图 4-15 的屏幕。\n\n    ![images](img/0415.jpg)\n\
  \n    `图 4-15. 主题的内容`\n\n8.  在此屏幕中，点击 `按钮类型` 部分中的 `按钮` 链接。在随后出现的页面中，从技巧 4-3 复制按钮模板，并将其粘贴到\
  \ `定义` 区域下的 `模板` 字段中。您现在应该看到如 图 4-16 所示的屏幕。保存您的更改。\n\n    ![images](img/0416.jpg)\n\
  \n    `图 4-16. 修改主题中的按钮模板`\n\n##### 切换应用程序主题\n\n要将您的应用程序主题切换到新创建的主题，请按照以下步骤操作：\n\
  \n1.  返回应用程序的 `共享组件` 部分。在相同的 `用户界面` 区域下，再次点击 `主题` 链接。\n2.  点击 `切换主题` 按钮。您现在应该看到如\
  \ 图 4-17 所示的屏幕。选择切换到您新创建的主题。\n\n    ![images](img/0417.jpg)\n\n    `图 4-17. 切换应用程序的活动主题`\n\
  \n3.  导航到向导的下一步并确认主题切换。成功切换主题后，将显示一条确认消息。现在，再次运行您的应用程序。您应该看到应用了新主题，以及您的自定义黑底白字按钮模板（如\
  \ 图 4-18 所示）。\n\n    ![images](img/0418.jpg)\n\n    `图 4-18. 应用在您表单上的新主题`\n\n####\
  \ 工作原理\n\n如技巧 4-1 所述，主题是模板的集合，它们是管理用户界面的好方法。一个主题包含 APEX 中每一种用户界面元素类型的模板。主题允许您轻松地为应用程序换肤，并在不同皮肤之间切换。\n\
  \n您还可以通过在 APEX 中制作主题的副本并单独修改其中包含的模板，轻松地创建主题的新变体。\n\n![images](img/square.jpg) **注意**\
  \ 有些网站会出售或提供 APEX 主题。ApexSkins 就是这样一个网站；请访问 [`www.apexskins.com`](http://www.apexskins.com)。\n\
  \n### 4-5. 修改表单控件模板\n\n#### 问题\n\n您的应用程序运行良好。有一天，办公室里有人不小心删除了一些重要数据。高层政治介入，您那些不太懂技术的老板们认为，让表单中的所有按钮在执行任何操作前都额外弹出一个确认提示是个好主意。鉴于您现有的一些表单有大量按钮，并且一个一个地更改表单按钮不会很有趣，您开始寻找更快的替代方案。\n\
  \n\n#### 解决方案\n\n修改表单控件模板，一次性更改所有按钮的行为。操作步骤如下：\n\n1.  在您的应用程序中打开现有表单。\n2.  在表单的“页面定义”区域中，展开“共享组件”部分下的“模板”节点。找到“按钮”节点并将其展开。\n\
  3.  右键单击最深层的“按钮”节点，选择编辑该项（如`图 4-19`所示）。\n    ![images](img/0419.jpg)\n    **`图 4-19.`**\
  \ 在您的表单上应用的新主题\n4.  在弹出的窗口中，找到“定义”面板。在“模板”字段中，修改`APEX`按钮模板，在按钮的`onclick`事件中包含一个确认弹出窗口的`JavaScript`（如`清单\
  \ 4-3`中粗体突出显示的部分）。\n    **`清单 4-3.`** 修改默认按钮模板\n    ```\n    <button value=\"#LABEL#\"\
  \ onclick=\"if (confirm('Are you sure?')) {#LINK#};\" class=\"button-gray\" type=\"\
  button\">\n      <span>#LABEL#</span>\n    </button>\n    ```\n5.  现在您应该看到如`图 4-20`所示的屏幕。\n\
  \    ![images](img/0420.jpg)\n    **`图 4-20.`** 新的按钮模板\n6.  保存更改并运行表单。单击表单中的任意按钮。现在您应该看到一个`JavaScript`确认弹出窗口出现，允许您取消或确认操作，如`图\
  \ 4-21`所示。\n    ![images](img/0421.jpg)\n    **`图 4-21.`** 运行中的新按钮\n\n#### 工作原理\n\
  \n对`APEX`而言，一个按钮未必是一个按钮，一个文本框也未必是一个文本框。抛开这种玄妙的说法，`APEX`表示每个表单控件的方式完全可由开发人员自定义。例如，`APEX`附带以下默认的按钮模板：\n\
  \n```\n<button value=\"#LABEL#\" onclick=\"#LINK#;\" class=\"button-gray\" type=\"\
  button\">\n  <span>#LABEL#</span>\n</button>\n```\n\n但`APEX`向您公开此模板并允许您修改它，这意味着您可以，例如，完全用其他内容替换前面的`HTML`。一旦您这样做，每当`APEX`应用程序需要渲染按钮时，它将渲染您的`HTML`。\n\
  \n这种灵活性意味着您可以，例如，通过更改按钮模板将表单中的所有按钮更改为图像按钮。或者，在本示例的案例中，添加默认控件中不具备的附加功能。\n\n### 4-6.\
  \ 创建可重用的代码片段\n\n#### 问题\n\n您的上司指派您在*所有*应用程序表单中创建一个区域，以以下格式显示当前系统日期：“`The date today\
  \ is XXXXXXXX.`” 您知道可以在每个表单中编写一个简单的一行`PL/SQL`来生成此标签，但更了解您上司的话，您知道他们第二天就会改变主意，要求不同的日期显示方式。考虑到这一点，您需要一种方法在应用程序中集中管理变更点，以便当您在一个位置更改文本时，它会自动在您的所有应用程序表单中生效。\n\
  \n#### 解决方案\n\n创建一个快捷方式，并从每个页面引用该快捷方式。\n\n要创建快捷方式，请按照以下步骤操作：\n\n1.  打开一个现有应用程序。\n\
  2.  单击`共享组件`图标。\n3.  在`用户界面`部分，单击`快捷方式`链接，如`图 4-22`所示。\n    ![images](img/0422.jpg)\n\
  \    **`图 4-22.`** 快捷方式链接\n4.  在下一个窗口中，单击“创建”按钮，并选择从头开始创建快捷方式。\n5.  单击`下一步`按钮。指定`MY_DATE_CAPTION`作为快捷方式的名称，将源`类型`更改为`PL/SQL\
  \ 函数体`，并在`快捷方式`字段中键入以下文本：`return 'The date today is ' || to_char(sysdate,'DD/MM/YYYY\
  \ HH24:MI:SS');`\n6.  现在您应该看到如`图 4-23`所示的屏幕。\n    ![images](img/0423.jpg)\n    **`图\
  \ 4-23.`** 为快捷方式指定源\n7.  单击“创建”按钮以创建快捷方式。现在您应该看到新创建的快捷方式，如`图 4-24`所示。\n    ![images](img/0424.jpg)\n\
  \    **`图 4-24.`** 新创建的快捷方式\n\n要从您的表单引用快捷方式，请按照以下步骤操作：\n\n1.  打开一个现有表单。\n2.  在表单的“页面定义”区域中，创建一个新区域（右键单击`页面渲染`部分中的`表单`\
  \ ![images](img/U001.jpg) `区域` ![images](img/U001.jpg) `主体`节点，然后单击`创建`菜单项）。\n3.\
  \  在向导中选择`HTML`区域类型。\n4.  在向导的下一页，选择`HTML 文本（含快捷方式）`，如`图 4-25`所示。\n    ![images](img/0425.jpg)\n\
  \    **`图 4-25.`** 在区域中使用 HTML 文本（含快捷方式）\n5.  在下一步中，指定区域的标题。\n6.  下一步将允许您指定`HTML\
  \ 文本区域源`。键入您之前创建的快捷方式的名称，用双引号括起来（如`图 4-26`所示）。\n    ![images](img/0426.jpg)\n  \
  \  **`图 4-26.`** 从区域引用快捷方式\n7.  现在单击`创建区域`按钮。\n8.  现在您应该看到日期值出现在表单的区域中，如`图 4-27`所示。\n\
  \    ![images](img/0427.jpg)\n    **`图 4-27.`** 运行中的快捷方式\n\n#### 工作原理\n\n您可以选择不将信息直接硬编码在表单中，而是将它们外部表示为一个动态变量，在需要时从您的应用程序中引用。在`APEX`中，这样的变量称为快捷方式。\n\
  \n使用快捷方式有很多好处。例如，如果您的上司决定将文本从“`The date today is`”更改为“`Current date is`”，您只需在快捷方式中更改它，使用该快捷方式的应用程序每个部分都将显示正确的文本。\n\
  \n### 4-7. 通过插件扩展用户界面\n\n#### 问题\n\n您需要创建一个现有`APEX`控件工具箱中没有的表单控件。您还计划与同事共享此控件，因此需要使其可重用。\n\
  \n\n#### 解决方案\n\n你决定使用 APEX 插件来实现该控件。在本教程中，你将创建一个专门的超链接控件（用于将用户引导至谷歌网站）作为示例。\n\n\
  ### 创建插件\n\n要创建插件，请按照以下步骤操作：\n\n1.  打开一个现有应用程序。\n2.  点击 `共享组件` 图标。\n3.  点击用户界面部分中的\
  \ `插件` 链接，如图 4-28 所示。\n    ![images](img/0428.jpg)\n    **图 4-28. 插件链接**\n4.  在插件配置页面，指定\
  \ `GOOGLELINKIE` 作为插件名称，`mygooglelinkie` 作为插件的内部名称。确保 `类型` 字段设置为 `项`。\n5.  在源代码区域，输入代码清单\
  \ 4-4 中所示的文本。\n    **代码清单 4-4. 渲染函数**\n    ```\n    function RENDER_LINKIE (\n \
  \       p_item                  in apex_plugin.t_page_item\n        , p_plugin \
  \             in apex_plugin.t_plugin\n        , p_value               in varchar2\n\
  \        , p_is_readonly         in boolean\n        , p_is_printer_friendly in\
  \ boolean)\n    return apex_plugin.t_page_item_render_result\n    is\n       retval\
  \ apex_plugin.t_page_item_render_result;\n    begin\n        htp.p('<a href=\"http://www.google.com\"\
  >Jump to Google</a>');\n        return retval;\n    end;\n    ```\n6.  确保将 `渲染函数名称`\
  \ （位于 `回调` 部分下）设置为你的 PL/SQL 函数名称（`RENDER_LINKIE`）。现在你应该拥有如图 4-29 所示的截图。\n    ![images](img/0429.jpg)\n\
  \    **图 4-29. 指定插件详细信息**\n7.  点击 `创建` 按钮以创建插件。\n\n### 使用插件\n\n要在应用程序中使用插件，请按照以下步骤操作：\n\
  \n1.  打开一个现有表单。\n2.  在表单的页面渲染区域，创建一个新的页面项。\n3.  在向导第一步的可用项类型列表中，选择 `插件`，如图 4-30\
  \ 所示。\n    ![images](img/0430.jpg)\n    **图 4-30. 插件项类型**\n4.  在向导的下一步中，选择 `GOOGLELINKIE`\
  \ 插件，如图 4-31 所示。\n    ![images](img/0431.jpg)\n    **图 4-31. 选择 GOOGLELINKIE 插件**\n\
  5.  使用默认设置完成向导的其余部分以创建页面项。\n6.  现在运行你的应用程序。你可以看到你的控件显示在表单中（“跳转到谷歌”），如图 4-32 所示。点击它将带你前往谷歌网页。\n\
  \    ![images](img/0432.jpg)\n    **图 4-32. 运行中的谷歌 Linkie 插件**\n\n#### 工作原理\n\n\
  插件是扩展现有 APEX 控件工具集的一种方式。插件的结构相当直接。你为插件提供一个 PL/SQL 函数，该函数用于渲染控件的 HTML（及附带的 JavaScript）。\n\
  \n如果你仔细查看之前指定的 PL/SQL 函数，可以看到一条类似如下语句：\n```\nhtp.p('<a href=\"http://www.google.com\"\
  >Jump to Google</a>');\n```\n请注意，`htp` 是一个包，允许你从插件中写入 HTML 输出。使用此函数，你可以渲染实现插件所需功能的任何\
  \ HTML 或 JavaScript。\n\n利用 APEX 中的插件框架，你可以构建大量功能丰富且可重用的插件，以便在同事间共享（甚至在线销售！）。\n\n\
  ## 可视化你的数据\n\nAPEX 真正出色的关键领域之一是其能够创建多种视图来可视化数据库中的数据。如果你的表中至少有一个数字字段，你可以处理数据以创建生动、静态或动画的饼图、环形图、条形图或蜡烛图。如果你的表中至少有一个日期或时间字段，你可以使用该字段神奇地将记录填充到日历上。如果你有一堆销售数据，你可以在高分辨率地图上将其显示在对应的国家/地区上方。\n\
  \n丰富的 APEX 平台允许你（在几分钟内）创建数百种查看数据的新方式——这是你在传统编程中通常无法独自完成的。（尝试自己编写动画图表引擎或地图渲染器吧！）\n\
  \n巧妙的是，APEX 中的视图也被视为页面，因此它们遵循 APEX 的其余架构，这意味着你可以将模板、主题、进程、行为等应用于这些页面。本章重点介绍如何在 APEX\
  \ 中设置和使用一些基本视图。到本章结束时，你将对 APEX 中可用的不同类型视图有所了解。\n\n### 创建经典报表\n\n#### 问题\n\n你有两个表：员工表和员工请假表。你需要从两个表中提取信息并以静态报表的形式呈现。换句话说，你需要创建一个结合数据库中多个表数据的表格型只读报表。\n\
  \n\n\n#### 解决方案\n\n此解决方案包含两个步骤。你必须首先创建示例对象（这些对象将用于本章的其他配方）。之后，你将创建报表本身。\n\n#####\
  \ 步骤 1：创建示例对象\n\n你将创建的示例对象是员工和员工请假表。使用 SQL Workshop 执行 清单 5-1 中所示的代码。\n\n**清单 5-1.**\
  \ 创建示例对象\n\n```\nCREATE table \"EMPLOYEES\" (\n    \"EMPID\"         NVARCHAR2(10),\n\
  \    \"EMPNAME\"       NVARCHAR2(255),\n    \"EMPTITLE\"      NVARCHAR2(255),\n\
  \    \"EMPDEPARTMENT\" NVARCHAR2(255),\n    constraint  \"EMPLOYEES_PK\" primary\
  \ key (\"EMPID\")\n)\n/\n\nCREATE TABLE  \"EMPLEAVE\"\n(   \"EMPID\" NVARCHAR2(50),\n\
  \    \"LEAVEDATE\" DATE,\n    \"LEAVETYPE\" NVARCHAR2(255),\n    \"LEAVEREASON\"\
  \ NVARCHAR2(255),\n    \"LEAVEID\" NVARCHAR2(50),\n    CONSTRAINT \"EMPLEAVE_PK\"\
  \ PRIMARY KEY (\"LEAVEID\") ENABLE\n)\n/\n\nINSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
  \ VALUES('E1','Janet Harris','CFO','Finance')\n/\nINSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
  \ VALUES('E2','Greg Yap','Senior Developer','IT')\n/\nINSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
  VALUES('E1',TO_DATE('20090329', 'YYYYMMDD'),'Sick Leave','Flu','L1')\n/\nINSERT\
  \ INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\nVALUES('E1',TO_DATE('20100517',\
  \ 'YYYYMMDD'),'Maternity Leave','Maternity','L2')\n/\nINSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
  VALUES('E2',TO_DATE('20090314', 'YYYYMMDD'),'Emergency leave','To visit a dying\
  \ friend','L3')\n/\n```\n\n##### 步骤 2：创建报表\n\n要创建经典报表，请按照以下说明操作：\n\n1.  创建一个新应用程序，并选择在此应用程序中创建一个新页面。\n\
  2.  选择“报表”页面类型。\n3.  在向导的下一步中，选择“经典报表”类型，如 图 5-1 所示。\n\n    ![images](img/0501.jpg)\n\
  \n    **图 5-1.** 经典报表\n\n4.  接下来，指定报表的名称。完成后，跳过下一步。你现在将被允许输入报表的 SQL 语句。指定 清单 5-2\
  \ 中所示的 SQL 语句。\n\n    **清单 5-2.** 为经典报表指定 SQL\n\n    ```\n    SELECT * FROM EMPLOYEES\
  \ LEFT JOIN EMPLEAVE ON EMPLOYEES.EMPID=EMPLEAVE.EMPID\n    ```\n\n    你现在应该看到如\
  \ 图 5-2 所示的屏幕截图。\n\n    ![images](img/0502.jpg)\n\n    **图 5-2.** 为经典报表指定 SQL\n\n\
  5.  单击通过向导的其余部分直到结束。\n6.  运行报表。你应该看到如 图 5-3 所示的组合数据列表。\n\n    ![images](img/0503.jpg)\n\
  \n    **图 5-3.** 实际运行中的经典报表\n\n#### 工作原理\n\n你首先在第 2 章中遇到了报表。基本上有两种类型的报表：交互式报表和经典报表。经典报表是静态的——它们只显示信息——而交互式报表允许你与信息进行交互。如本配方所示，两种报表都可以组合多个表的结果。\n\
  \n### 5-2. 创建参数化报表\n\n#### 问题\n\n你的管理层希望能够动态过滤其报表中显示的信息。使用配方 5-1 中的示例数据，你的管理层希望将范围缩小到特定员工的请假记录列表。\n\
  \n![images](img/square.jpg) **注意** 如果你还没有这样做，请执行清单 5-1 来创建本配方使用的示例数据。\n\n#### 解决方案\n\
  \n要创建参数化报表，请按照以下说明操作：\n\n1.  打开一个应用程序并选择创建一个新页面。\n2.  在向导的第一步中选择“报表”页面类型，如 图 5-4\
  \ 所示。\n\n    ![images](img/0504.jpg)\n\n    **图 5-4.** 报表页面类型\n\n3.  在下一步中，选择“交互式报表”类型。\n\
  4.  跳过向导中的所有步骤，直到到达允许你指定报表 SQL 语句的步骤。到达此步骤时，指定 清单 5-3 中所示的 SQL。\n\n    **清单 5-3.**\
  \ 为交互式报表指定 SQL\n\n    ```\n    SELECT e1.EmpName, e1.EmpTitle, e1.EmpDepartment,\
  \ e2.LeaveDate, e2.LeaveType, e2.LeaveReason, e2.LeaveID FROM Employees e1 LEFT\
  \ JOIN EmpLeave e2 ON e1.EmpID=e2.EmpID\n    ```\n5.  在同一步骤中，为“唯一标识行依据”字段选择“唯一列”，为“唯一列”字段选择“LeaveID”。你现在应该看到如\
  \ 图 5-5 所示的屏幕。单击“下一步”继续。\n\n    ![images](img/0505.jpg)\n\n    **图 5-5.** 为交互式报表指定\
  \ SQL\n\n6.  跳到最后一步以完成向导。现在运行你的报表。你应该看到配方 5-1 中看到的数据列表，并在列表顶部添加了一个新的搜索栏。\n7.  单击搜索栏中的放大镜图标并选择“Empname”条目，如\
  \ 图 5-6 所示。\n\n    ![images](img/0506.jpg)\n\n    **图 5-6.** 按员工姓名搜索\n\n8.  完成后，搜索栏现在允许你按员工姓名进行搜索。输入\
  \ Janet，然后单击 Enter 开始搜索。报表中显示的结果列表现在被过滤，仅显示与你的搜索条件匹配的条目（参见 图 5-7）。\n\n![images](img/0507.jpg)\n\
  \n**图 5-7.** 过滤后的结果列表\n\n#### 工作原理\n\n交互式报表带有一个内置的搜索栏，允许最终用户快速、动态地对报表中显示的结果列表应用过滤器。在本配方中，你可以看到如何切换搜索栏的模式，使报表使用特定字段（本例中为“员工姓名”字段）进行搜索。\n\
  \n### 5-3. 用图形图表可视化数据\n\n#### 问题\n\n你希望以图表的形式呈现数据，以便一目了然地分析数据。例如，你希望分析每位员工请假的频率——并且你希望以\
  \ 3D 饼图的形式将此信息可视化。\n\n![images](img/square.jpg) **注意** 如果你还没有这样做，请执行清单 5-1 来创建本配方使用的示例数据。\n\
  \n\n#### 解决方案\n\n要创建一个以 3D 饼图展示数据的页面，请遵循以下指引：\n\n1.  打开一个应用程序，选择创建新页面。\n2.  在向导的第一页中，选择“图表”页面类型，如图\
  \ 5-8 所示。\n    ![images](img/0508.jpg)\n    图 5-8. 图表页面类型\n3.  在下一步中，选择“Flash 图表”。\n\
  4.  在接下来的步骤中，您需要指定要使用的图表类型。请选择“饼图与圆环图”类型。\n5.  在下一步中，您将再次面临图表选择，如图 5-9 所示。选择“3D\
  \ 饼图”。\n    ![images](img/0509.jpg)\n    图 5-9. 选择 3D 饼图\n6.  在向导的下一步中，将页面名称指定为“员工休假频率”。\n\
  7.  点击通过下一步。现在系统将要求您指定图表标题和动画样式。在“图表标题”字段中指定“员工休假频率”，在“图表动画”字段中选择“从左侧滑入”，如图 5-10\
  \ 所示。\n    ![images](img/0510.jpg)\n    图 5-10. 指定图表设置\n8.  在下一步中，您将指定返回用于渲染图表的数据集的\
  \ SQL 语句；使用代码清单 5-4 中的代码。\n    代码清单 5-4. 指定图表的 SQL\n    ```\n    SELECT '',EmpName,count(*)\
  \ FROM Employees INNER JOIN EmpLeave ON\n        Employees.EmpID=EmpLeave.EmpID\
  \ GROUP BY EmpName\n    ```\n9.  您应该会看到如图 5-11 所示的屏幕。\n    ![images](img/0511.jpg)\n\
  \    图 5-11. 为图表指定 SQL\n10. 完成向导并运行该图表页面。您应该能看到一个漂亮的动画饼图，显示每位员工的休假频率（参见图 5-12）。\n\
  \    ![images](img/0512.jpg)\n    图 5-12. 动画图表\n\n#### 工作原理\n\nAPEX 中大多数视图背后的概念是相似的：视图的核心是您提供给它的\
  \ SQL 语句。APEX 只是获取 SQL 查询结果的数据集（该数据集预期具有特定格式）并适当地显示它。\n\n图表视图在概念上与其他任何视图并无不同。具体对于饼图，APEX\
  \ 始终期望 SQL 查询中的第二个字段是图表上为数据系列显示的标签。第三个字段是该系列的数值。\n\n![images](img/square.jpg) **注意**\
  \ 不同类型的图表，其 SQL 查询的格式有所不同。您始终可以参考向导中同一 SQL 定义页面提供的示例 SQL 脚本。（APEX 在其向导中非常贴心地提供了提示。）\n\
  \n### 5-4. 在多系列图表中可视化数据\n\n#### 问题\n\n您的老板要求您检索两组数据系列（全球和本地销售额），并将其金额显示在单个图表中。您立刻意识到您的老板想要查看一个多系列图表，但不确定如何继续。\n\
  \n#### 解决方案\n\n要创建一个多系列图表，您首先需要为此配方创建示例表和数据。请遵循以下指引：\n\n1.  运行以下 SQL 来创建 `COMPANYSALES`\
  \ 表及相应的数据：\n    ```\n    CREATE TABLE  \"COMPANYSALES\"\n       (    \"ID\" NVARCHAR2(50),\n\
  \            \"GLOBALREVENUE\" NUMBER(9,2),\n            \"LOCALREVENUE\" NUMBER(9,2),\n\
  \            \"PRODUCT\" NVARCHAR2(255),\n             CONSTRAINT \"COMPANYSALES_PK\"\
  \ PRIMARY KEY (\"ID\") ENABLE\n      )\n    /\n\n    INSERT INTO \"COMPANYSALES\"\
  \ (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"PRODUCT\")\n    VALUES(1,1000,2000,'CAR\
  \ ENGINES')\n    /\n    INSERT INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\",\"\
  LOCALREVENUE\",\"PRODUCT\")\n    VALUES(2,1500,1900,'SAILBOATS')\n    /\n    INSERT\
  \ INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"PRODUCT\")\n\
  \    VALUES(3,200,4000,'BIKES')\n    /\n    ```\n\n要设置多系列图表，请遵循以下指引：\n\n1.  打开一个现有应用程序，选择创建新页面。\n\
  2.  选择“图表”页面类型。\n3.  在向导的下一页中，选择“Flash 图表”类型。\n4.  在接下来的页面中，选择“柱形图”类型，如图 5-13 所示。\n\
  \    ![images](img/0513.jpg)\n    图 5-13. 柱形 Flash 图表类型\n5.  在下一页中，选择“3D 堆积柱形图”类型，如图\
  \ 5-14 所示。\n    ![images](img/0514.jpg)\n    图 5-14. 3D 堆积柱形图类型\n6.  跳过向导的接下来两个步骤。在“图表属性”步骤中，将图表的标题指定为“全球与本地销售摘要”，如图\
  \ 5-15 所示。\n    ![images](img/0515.jpg)\n    图 5-15. 指定图表标题\n7.  在下一步中，为图表指定以下 SQL\
  \ 数据源查询：`SELECT NULL, PRODUCT, LOCALREVENUE, GLOBALREVENUE FROM COMPANYSALES`\n\
  8.  您现在应该会看到如图 5-16 所示的屏幕截图。\n    ![images](img/0516.jpg)\n    图 5-16. 为图表指定 SQL\
  \ 数据源\n9.  完成向导并运行该表单。您应该能看到如图 5-17 所示的多系列图表。\n    ![images](img/0517.jpg)\n   \
  \ 图 5-17. 运行中的多系列条形图\n\n#### 工作原理\n\nAPEX 支持多系列图表，并且它们易于配置。让我们检查一下您用于该图表的 SQL。\n\
  \n```\nSELECT NULL, PRODUCT, LOCALREVENUE, GLOBALREVENUE FROM COMPANYSALES\n```\n\
  \n第一个 SQL 字段表示一个链接（这允许您为图表中的每个条形指定一个超链接 URL，当您点击它时，可以进一步深入查看另一个图表，或者被重定向到完全不同的页面。\n\
  \n第二个 SQL 字段允许您指定图表的标签。如您在图 5-15 中所见，标签标题显示在每个条形的底部。\n\nSQL 语句中的第三、第四及第 n 个字段表示用于每个数据系列的值。例如，在此配方中，`LOCALREVENUE`\
  \ 和 `GLOBALREVENUE` 字段构成了图表的第一个和第二个数据系列。\n\n### 5-5. 在日历上可视化数据\n\n#### 问题\n\n您希望看到数据绘制在日历上。您创建的用于显示员工休假记录的报告很好，但您需要以更直观的方式对其进行可视化。您希望根据每条记录的休假日期将记录显示在日历上。\n\
  \n![images](img/square.jpg) **注意** 如果您尚未执行，请运行代码清单 5-1 来创建此配方所用的示例数据。\n\n\n### 5-6.\
  \ 在地图上可视化数据\n\n#### 解决方案\n\n要在日历上查看数据，请按照以下步骤创建页面：\n\n1.  要运行此示例中的示例，您需要先向 `EmpLeave`\
  \ 表中添加一条新记录。通过 SQL Workshop 运行如 Listing 5-5 所示的查询。请注意，需将查询中的 `LEAVEDATE` 日期更改为当前月份和年份。\n\
  \n    **清单 5-5.** 插入一条附加示例记录\n\n    ```sql\n    INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
  \    VALUES('E1',TO_DATE('20110110', 'YYYYMMDD'),'Maternity Leave','Maternity','L4')\n\
  \    ```\n2.  打开一个应用程序并选择创建新页面。\n3.  在向导的第一页中选择日历页面类型，如 图 5-18 所示。\n\n    ![images](img/0518.jpg)\n\
  \n    **图 5-18.** 日历页面类型\n\n4.  在下一步中，选择 SQL 日历。\n5.  将页面名称指定为 Employee Leave 日历。\n\
  6.  点击进入下一步。您现在将看到一个可以定义日历 SQL 的区域；指定如 清单 5-6 所示的 SQL。\n\n    **清单 5-6.** 为日历指定\
  \ SQL\n\n    ```sql\n    SELECT EmpName, Leavedate FROM Employees,EmpLeave WHERE\
  \ Employees.EmpID=EmpLeave.EmpID\n    ```\n7.  您现在应该看到如 图 5-19 所示的屏幕。\n\n    ![images](img/0519.jpg)\n\
  \n    **图 5-19.** 为日历指定 SQL\n\n8.  在下一步中，系统将要求您指定用于日期列和显示列的数据库字段。为日期列选择 `LEAVEDATE`，为显示列选择\
  \ `EMPNAME`。\n9.  导航到向导末尾并运行您的日历页面。您应该会看到刚刚创建的记录显示在日历中，如 图 5-20 所示。\n\n![images](img/0520.jpg)\n\
  \n**图 5-20.** 运行中的日历\n\n#### 工作原理\n\n日历视图与图表视图类似，因为您指定的 SQL 必须遵循特定格式。在日历视图中，SQL\
  \ 查询的第一个字段指的是将在日历上显示的标签，而查询中的第二个字段指的是用于在日历上填充记录的日期字段。\n\n### 5-6. 在地图上可视化数据\n\n\
  #### 问题\n\n您有一个包含欧洲多个国家总销售数据的数据库表。您的老板希望您将这些数据填充到欧洲地图上。您只有一天不到的时间来完成，而且不确定如何进行。\n\
  \n#### 解决方案\n\n要在页面上创建可视化地图，您必须首先设置此示例中使用的销售数据示例表。请按照以下说明操作：\n\n1.  通过运行 清单 5-7\
  \ 所示的 SQL 创建示例销售表。\n\n    **清单 5-7.** 创建示例 `SalesData` 表\n\n    ```sql\n    CREATE\
  \ TABLE  \"SALESDATA\"\n       (    \"SALES\" NUMBER(9,2),\n            \"ID\" NVARCHAR2(50),\n\
  \            \"COUNTRY\" NVARCHAR2(255),\n             CONSTRAINT \"SALESDATA_PK\"\
  \ PRIMARY KEY (\"ID\") ENABLE\n       )\n\n    INSERT INTO SALESDATA(SALES,ID,COUNTRY)\
  \ VALUES(5000,1,'UNITED KINGDOM')\n\n    INSERT INTO SALESDATA(SALES,ID,COUNTRY)\
  \ VALUES(6000,2,'IRELAND')\n\n    INSERT INTO SALESDATA(SALES,ID,COUNTRY) VALUES(6780,3,'FRANCE')\n\
  \    ```\n\n要创建地图以显示来自 `SalesData` 表的数据，请按照以下说明操作：\n\n1.  打开现有应用程序并选择创建新页面。在向导的第一页中选择地图页面类型，如\
  \ 图 5-21 所示。\n\n    ![images](img/0521.jpg)\n\n    **图 5-21.** 地图页面类型\n\n2.  在向导的下一页中，选择如\
  \ 图 5-22 所示的“世界和大陆地图”项。我们选择此地图而不是欧洲地图集合，是因为我们希望使用一个能在单一视图中显示所有欧洲国家的地图。欧洲地图集合则显示单个欧洲国家。\n\
  \n    ![images](img/0522.jpg)\n\n    **图 5-22.** “世界和大陆地图”包\n\n3.  在下一页中，选择如 图 5-23\
  \ 所示的“欧洲（不含俄罗斯）”地图。当然，如果您有包含俄罗斯销售统计信息的数据，您可以选择“欧洲”地图。\n\n    ![images](img/0523.jpg)\n\
  \n    **图 5-23.** “欧洲（不含俄罗斯）”地图\n\n4.  跳过向导接下来的两页。\n5.  在向导的“地图属性”步骤，指定地图标题（例如“ACME\
  \ 欧洲销售”）。\n6.  在向导的下一页，指定以下 SQL 查询：`SELECT NULL LINK, COUNTRY, SUM(SALES) FROM SALESDATA\
  \ GROUP BY COUNTRY`\n7.  您现在应该看到如 图 5-24 所示的屏幕。\n\n    ![images](img/0524.jpg)\n\
  \n    **图 5-24.** 为地图指定数据源\n\n8.  跳过向导的下一步，单击“完成”按钮以创建地图。\n9.  运行该页面。您应该会看到地图上每个对应国家都显示了您的销售数据，如\
  \ 图 5-25 所示。\n\n    ![images](img/0525.jpg)\n\n    **图 5-25.** 运行中的地图\n\n10. 如果将鼠标悬停在每个国家上，您可以看到一个显示该国家总销售额的小型工具提示。您还可以使用右侧的导航工具对地图进行缩放/缩小和平移。\n\
  \n#### 工作原理\n\n您可以使用 APEX 软件包中提供的可视化地图来呈现数据。APEX 提供了丰富的世界各地地图，并允许您将统计数据覆盖在这些地图上。\n\
  \n您可能已经注意到，APEX 使用您提供的国家名称将您的数据与可视化地图进行匹配。那么，是否有可能获取 APEX 内部识别的国家名称、州名称或省名称的完整列表？APEX\
  \ 使用第三方 `AnyMap` 组件来渲染其地图（顺便提一下，使用 `AnyCharts` 组件来渲染其 Flash 图表）。前面提到的国家名称实际上是由 `AnyMap`\
  \ 产品定义的。如果您导航到 AnyMap 的在线文档 [`http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html`](http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html)\
  \ 并按照路径 Maps ![images](img/U001.jpg) Maps Reference ![images](img/U001.jpg) World\
  \ ![images](img/U001.jpg) World and Continent Maps ![images](img/U001.jpg) Europe\
  \ without Russia 进行导航，您将看到此区域的国家名称完整列表（如 图 5-26 所示）。\n\n![images](img/0526.jpg)\n\
  \n**图 5-26.** `AnyMap` 文档\n\n![images](img/square.jpg) **注意** 这种地图技术与 Google 地图等不同，因为这些不是导航地图，也不允许使用\
  \ GPS 坐标在地图上定位对象。这些地图更多用于突出显示或补充统计数据（例如，显示每个国家的人口、一个国家内每个省份的总销售额等）。\n\n"
- "# 5-7. 将所有内容整合到一个仪表板页面中\n\n#### 问题\n\n您需要仪表板功能。您需要在同一个页面上同时显示图形图表和报告以供查看。例如，您希望创建一个显示员工请假频率以及所有员工列表的仪表板，并且您希望员工请假频率以饼图形式显示。\n\
  \n\n\n#### 解决方案\n\n要创建一个结合了饼图和报表的仪表板，请按照以下说明操作：\n\n1.  打开一个应用程序并创建一个新页面。\n2.  选择创建一个空白页面。\n\
  3.  当系统要求时，指定 `HR 仪表板` 作为页面的名称。\n4.  点击向导直到完成。页面创建后，选择编辑该页面。\n5.  在页面的“页面呈现”部分，右键单击\
  \ `区域` 节点，并在弹出的菜单（如图 5-27 所示）中点击 `创建` 项。\n\n    ![images](img/0527.jpg)\n\n    **图\
  \ 5-27.** 创建一个新区域\n\n6.  在弹出的向导的第一步中，选择 `图表` 项。在下一步选择 `Flash 图表`，然后下一步选择 `饼图与圆环图`，最后选择\
  \ `3D 饼图`。指定 `员工请假频率` 作为该区域的标题。在向导的下一步中，为图表指定相同的标题，并为动画样式选择 `从左侧滑入`。\n7.  当进入 SQL\
  \ 语句区域时，指定代码清单 5-8 中所示的 SQL。\n\n    **代码清单 5-8.** 为图表区域指定 SQL\n\n    ```sql\n  \
  \  SELECT '',EmpName,count(*) FROM Employees INNER JOIN EmpLeave ON\n    Employees.EmpID=EmpLeave.EmpID\
  \ GROUP BY EmpName\n    ```\n8.  完成向导以创建该区域。您应该能看到新创建的区域，如图 5-28 所示。\n\n    ![images](img/0528.jpg)\n\
  \n    **图 5-28.** 新创建的区域\n\n9.  现在您需要创建另一个区域。再次右键单击 `区域` 节点并选择 `创建`。\n10. 这次，选择\
  \ `报表` 作为区域类型。下一步选择 `SQL 报表` 类型，接下来的步骤中指定区域标题为 `员工列表`。\n11. 当进入 SQL 区域时，指定代码清单 5-9\
  \ 中所示的 SQL。\n\n    **代码清单 5-9.** 为报表区域指定 SQL\n\n    ```sql\n    SELECT EMPID, EMPNAME,\
  \ EMPTITLE, EMPDEPARTMENT FROM Employees\n    ```\n12. 完成向导以创建该区域。现在运行该页面。您应该能在同一个页面上看到您的饼图和员工列表，如图\
  \ 5-29 所示。\n\n![images](img/0529.jpg)\n\n**图 5-29.** 运行中的仪表板\n\n#### 工作原理\n\n区域是\
  \ APEX 在单个页面内组织可视化信息的方式。使用区域，您甚至可以将数据输入表单和图表混合放在同一个页面中。区域非常灵活；它们也可以放置在您希望的任何位置。通过这种方式，您可以创建以不同方式传达来自不同来源信息的仪表板。\n\
  \n## 第六章\n\n## 应用程序全球化\n\n我相信您至少有过一次这样的经历：您乘飞机前往一个外国，自豪地展示了您精心打造的、包含数百个网页和精美用户界面的应用程序，结果却被询问是否所有内容都能用泰语显示。没有？那您真幸运！\n\
  \n与普遍看法相反，世界上超过 60%的人不说英语。此外，每个国家都有不同的本地化规范：美国人使用美元货币，英国人使用英镑或欧元，而很有趣的是，法国人在数字中使用逗号符号而不是小数点。\n\
  \n在当今互联网和云计算兴起真正让世界变得更紧密的环境下，您的应用程序不可避免地会被来自世界各地的人们使用。因此，在开发应用程序时，特别是开发部署在互联网上的应用程序时，考虑您自己国家或地区之外的因素非常重要。通过\
  \ Oracle 的语言和区域设置功能实现全球化，就是解决方案。\n\n全球化支持包括以下领域：\n\n*   输入双字节字符，例如日语或中文中使用的字符。\n\
  *   将应用程序用户界面翻译成各种语言。\n*   货币、时区和日期/时间值的显示与数据输入格式。\n\n本章中的“配方”探讨了这三个关注领域以及 APEX\
  \ 为解决它们所提供的各种功能。\n\n### 6-1. 设置双字节字符输入\n\n#### 问题\n\n您创建了接受双字节字符集（如中文和其他语言使用的字符）输入的表单。您的字段不仅必须接受此类字符，还必须使用户能够使用英语键盘输入这些字符。\n\
  \n#### 解决方案\n\n要将基于 Windows 7 的操作系统设置为支持中文数据输入，请按照以下步骤操作：\n\n![images](img/square.jpg)\
  \ **注意** 此示例说明如何在 Windows 7 上设置中文输入法编辑器。对于其他操作系统，请查阅您的操作系统手册。\n\n1.  单击 Windows\
  \ 开始按钮并导航到控制面板。\n2.  双击控制面板中的 `区域和语言` 图标以启动它，如图 6-1 所示。\n\n    ![images](img/0601.jpg)\n\
  \n    **图 6-1.** 区域和语言设置\n\n3.  在随后出现的弹出窗口中，单击 `键盘和语言` 选项卡，然后单击 `更改键盘` 按钮。另一个弹出窗口（如图\
  \ 6-2 所示）将会出现。\n\n    ![images](img/0602.jpg)\n\n    **图 6-2.** 系统上安装的输入法列表\n\n\
  4.  单击 `添加` 按钮，找到 `中文(简体，中华人民共和国)` 节点。展开此节点，在 `键盘` 节点下，选择 `中文(简体) - 微软拼音 ABC 输入风格`\
  \ 条目，如图 6-3 所示。\n\n    ![images](img/0603.jpg)\n\n    **图 6-3.** 安装中文输入法\n\n5. \
  \ 单击 `确定` 按钮添加键盘。应用新设置并关闭所有窗口。您的操作系统现在应该已经安装了中文输入法。\n6.  打开一个文本编辑器工具，如记事本，并确保该窗口已获得输入焦点。\n\
  7.  在您的 Windows 桌面右下角，当前默认语言应为 `EN`（英语），如图 6-4 所示。\n\n    ![images](img/0604.jpg)\n\
  \n    **图 6-4.** 语言栏\n\n8.  单击 `EN` 符号，将您的键盘更改为 `CH`（中文），如图 6-5 所示。\n\n    ![images](img/0605.jpg)\n\
  \n    **图 6-5.** 将默认语言更改为中文\n\n9.  语言栏应变为稍长一些的栏（带有更多图标），如图 6-6 所示。确保将第二个符号更改为 `中`（如图\
  \ 6-6 中红色方框内突出显示的那样）。\n\n    ![images](img/0606.jpg)\n\n    **图 6-6.** 启用拼音输入\n\n\
  10. 在键盘上输入以下文本：`nihao shijie`。这大致翻译为中文的“你好世界”。\n11. 当您按下空格键时，您的英文文本会立即翻译成中文。您应该会看到如图\
  \ 6-7 所示的屏幕。\n\n![images](img/0607.jpg)\n\n**图 6-7.** 中文的“你好世界”\n\n#### 工作原理\n\n\
  许多书一开始就假设读者知道如何输入双字节字符。我假设我的大多数读者是美国人，因此可能从未体验过用中文、日语或韩语等双字节语言键入数据。\n\n本配方作为在基于\
  \ Windows 的操作系统上设置输入法编辑器并使用它输入双字节字符的快速指南。您在本配方中看到的拼音输入法是用户输入中文字符的众多方式之一，在本例中，是通过输入其罗马字母的语音等效字符。\n\
  \n### 6-2. 支持双字节数据输入\n\n#### 问题\n\n您在 APEX 中创建的一个表单要求用户用日语等双字节语言键入数据。\n\n\n\n####\
  \ 解决方案\n\n此解决方案包含两个步骤。首先，您必须创建示例对象（这些对象也将用于本章的其他配方）。然后，您将在这些示例对象之上创建应用程序。\n\n###\
  \ 步骤 1：创建示例对象\n\n您将创建的示例对象是 `MYCUSTOMERS` 表。通过 SQL 工作坊执行 清单 6-1 来创建它。请注意，表列被定义为\
  \ `NVARCHAR2`，这是 Oracle 的 `VARCHAR2` 的国家语言版本。\n\n**清单 6-1.** 创建示例对象\n\n```sql\n\
  CREATE table \"MYCUSTOMERS\" (\n    \"CUSTNAME\"    NVARCHAR2(255),\n    \"CUSTREMARKS\"\
  \ NVARCHAR2(2000),\n    \"CUSTID\"      NVARCHAR2(50),\n    constraint  \"MYCUSTOMERS_PK\"\
  \ primary key (\"CUSTID\")\n)\n/\n```\n\n### 步骤 2：创建并运行应用程序\n\n现在，创建并运行应用程序以输入一些日文文本。请遵循以下步骤：\n\
  \n1.  创建一个新应用程序。在此应用程序中，基于 `MyCustomers` 表创建一个新表单和交互式报表。\n2.  运行表单。使用日文输入法编辑器（IME），输入一些日文文本，如\
  \ 图 6-8 所示。点击“创建”按钮保存数据。\n\n    ![images](img/square.jpg) **提示** 有关如何在表上创建带报表的表单的更多信息，请参阅配方\
  \ 2-1 和 2-2。\n\n    ![images](img/0608.jpg)\n\n    **图 6-8.** 输入日文字符\n\n3.  运行报表。您应该看到刚刚输入的日文文本，如\
  \ 图 6-9 所示。\n\n    ![images](img/0609.jpg)\n\n    **图 6-9.** 在数据库中查看日文字符\n\n####\
  \ 工作原理\n\n东亚语言使用双字节格式。为了支持双字节数据，数据库表中的字段必须使用带 N 前缀的数据类型来定义。例如，您必须使用 `NVARCHAR2`\
  \ 而不是 `VARCHAR2`，使用 `NCHAR` 而不是 `CHAR`。\n\n对于其他语言，如西班牙语、德语或意大利语（它们是单字节字符语言），您不需要使用带\
  \ N 前缀的数据类型。这将有助于节省数据库空间，因为正如您可能猜到的，带 N 前缀的数据类型在数据库中占用双倍的空间。\n\n### 6-3. 将您的用户界面翻译成另一种语言\n\
  \n#### 问题\n\n根据浏览器的语言偏好设置，您需要您的应用程序以应用程序用户对应的首选语言显示用户界面（所有标签、消息、名称和字段标题）。\n\n####\
  \ 解决方案\n\n要将您的应用程序 UI 翻译成另一种语言，请遵循以下步骤：\n\n*   设置全球化属性。\n*   映射到已翻译的应用程序。\n*   将可翻译文本植入翻译存储库。\n\
  *   导出 XLIFF 文件。\n*   翻译 XLIFF 文件。\n*   导入 XLIFF 文件。\n*   发布已翻译的应用程序。\n*   测试您的已翻译应用程序。\n\
  \n### 步骤 1：设置全球化属性\n\n执行以下步骤来为应用程序设置全球化属性。这些步骤使用配方 6-1 中的应用程序作为示例基础。\n\n1.  打开您在配方\
  \ 6-1 中创建的应用程序，然后点击“共享组件”图标。\n2.  在页面底部，“全球化”部分下，点击“全球化属性”链接（如 图 6-10 所示）。\n\n \
  \   ![images](img/0610.jpg)\n\n    **图 6-10.** 全球化属性设置\n\n3.  将“应用程序主语言”设置为 English（英语），并将“应用程序语言来源”字段设置为\
  \ Browser（浏览器）（使用浏览器语言偏好），如 图 6-11 所示。\n\n    ![images](img/0611.jpg)\n\n    **图\
  \ 6-11.** 设置应用程序的主语言\n\n4.  完成后点击“应用更改”按钮。\n\n### 步骤 2：映射到已翻译的应用程序\n\n要将您的主语言应用程序映射到已翻译的应用程序，请遵循以下步骤：\n\
  \n1.  返回“共享组件”页面。这次，点击“翻译应用程序”链接（也在“全球化”部分）。\n2.  您现在将看到一个类似 图 6-12 的页面。\n\n   \
  \ ![images](img/0612.jpg)\n\n    **图 6-12.** 翻译应用程序的各个步骤\n\n3.  点击第一个链接，“将您的主语言应用程序映射到已翻译的应用程序。”\n\
  4.  点击“创建”按钮创建新映射。在随后出现的向导弹窗中，为“翻译应用程序”字段输入任何唯一的整数值。\n5.  对于语言代码，将语言设置为冰岛语 (`is`)，图像目录设置为\
  \ `is`。您可以指定一些注释（如果需要），但这是可选的。您应该看到类似 图 6-13 的内容。\n\n    ![images](img/0613.jpg)\n\
  \n    **图 6-13.** 定义应用程序语言映射\n\n6.  点击“创建”按钮。您将在以下页面中看到创建的映射记录（如 图 6-14 所示）。\n\n\
  \    ![images](img/0614.jpg)\n\n    **图 6-14.** 创建的映射记录\n\n### 步骤 3：将可翻译文本植入翻译存储库\n\
  \n要将您的主语言应用程序映射到已翻译的应用程序，请遵循以下步骤：\n\n1.  返回主“翻译”页面。点击 图 6-15 中显示的第二个链接，“将可翻译文本植入翻译存储库。”\n\
  \n    ![images](img/0615.jpg)\n\n    **图 6-15.** 将可翻译文本植入翻译存储库\n\n2.  在向导中，从“语言映射”字段的下拉列表中选择“（您的主语言应用程序\
  \ ID） >>116 (is)”条目，然后点击“下一步”继续。值 116 指的是“待翻译的”应用程序 ID。\n3.  点击“植入可翻译文本”按钮以完成向导。\n\
  4.  您应该会看到植入过程的简要摘要，如 图 6-16 所示。\n\n    ![images](img/0616.jpg)\n\n    **图 6-16.**\
  \ 植入统计\n\n### 步骤 4：导出 XLIFF 文件\n\n要将应用程序中使用的文本资源导出到 XLIFF 文件，请遵循以下步骤：\n\n1.  返回主“翻译”页面。点击\
  \ 图 6-17 中显示的第三个链接，“从存储库下载可翻译文本到翻译文件（XLIFF FILE）。”\n\n    ![images](img/0617.jpg)\n\
  \n    **图 6-17.** 导出到 XLIFF 文件\n\n2.  在随后的配置页面中，您需要下载整个应用程序的 XLIFF 文件。将“应用程序翻译”字段设置为“（您的主语言应用程序\
  \ ID） >>116 (is)”条目。\n3.  确保选中“包含 XLIFF 目标元素”复选框。\n4.  选择导出所有可翻译元素，如 图 6-18 所示。\n\
  \n    ![images](img/0618.jpg)\n\n    **图 6-18.** 选择翻译映射\n\n5.  点击“导出 XLIFF”按钮。您可能需要等待几秒钟才能看到下一个提示。提示出现时，您将可以选择下载生成的\
  \ XLIFF 文件，如 图 6-19 所示。\n\n    ![images](img/0619.jpg)\n\n    **图 6-19.** 导出 XLIFF\
  \ 文件\n\n6.  将 XLIFF 文件保存到您 PC 上的任何位置。\n\n\n\n"
- "# 步骤 4：翻译 XLIFF 文件\n\n要翻译 XLIFF 文件，请遵循以下步骤：\n\n1.  XLIFF 文件是一个便捷的小文件，包含了你的应用程序使用的所有文本、消息、标签和名称资源。\n\
  2.  你通常可以将 XLIFF 文件发送给现实中的翻译人员来翻译其内容。XLIFF 格式是一个开放标准，你可以找到许多 XLIFF 编辑器工具，允许你窥探文件内容并手动编辑。\n\
  3.  使用像写字板这样的文本编辑工具打开下载的 XLIFF 文件。\n4.  你应该能看到生成的 XML 及其多个翻译条目，如 图 6-20 所示。\n\n\
  \    ![images](img/0620.jpg)\n\n    **图 6-20.** 窥探 XLIFF 文件内容\n\n5.  每个翻译条目都具有 清单\
  \ 6-2 中所示的格式。`source` 字段代表原始未翻译文本，`target` 字段代表翻译后的文本。\n\n    **清单 6-2.** 翻译条目格式\n\
  \n    ```\n    <trans-unit id=\"XXXXX\">\n              <source>Custname</source>\n\
  \              <target>Custname</target>\n    </trans-unit>\n    ```\n6.  找到 `Custname`\
  \ 条目，并将其 `<target>` 条目更改为对应的冰岛语：`viðskiptavinur nafn`。将 `Custremarks` 的 `<target>`\
  \ 条目更改为 `viðskiptavinur athugasemd`，如 图 6-21 中高亮显示的部分。\n\n    ![images](img/square.jpg)\
  \ **注意** 可能会有多个 `Custname` 和 `Custremarks` 条目，特别是如果你在应用程序中为不同的对象使用了相同的名称。如果不确定应该编辑哪一个，请务必留意对象\
  \ ID（由 `<trans-unit>` 标签的 `ID` 属性指示）。这些标识符映射到应用程序中的实际对象 id。\n\n    ![images](img/0621.jpg)\n\
  \n    **图 6-21.** 手动翻译\n\n7.  保存你所做的更改。\n\n"
