    #### 工作原理


    如前所述，APEX 非常适用于基于 CRUD 的 Web 业务应用程序，并作为平台位于 Oracle 数据库之上。APEX 能很好地做到这一点，因为其核心是利用
    PL/SQL 语言来处理构建于其上的应用程序的业务逻辑，而 PL/SQL 是所有数据库 CRUD 操作的基础。一个好的衡量标准是，如果应用程序中 75% 以上是
    CRUD 操作，那么使用 APEX 将能显著减少开发应用程序所需的时间和精力。


    此外，APEX 是一个快速应用程序开发工具，许多开发人员都曾证实 RAD 产品如何使他们能够在数周内（而非数月）部署大型系统（包括我在本书开篇部分提到的自己）。APEX
    也适用于采用软件开发方法的团队，这些方法的需求集在不断演进，例如敏捷开发，或是那些频繁需要连续原型迭代的方法。APEX 同样适合大规模部署。考虑这些数据：Oracle
    在 [`http://apex.oracle.com`](http://apex.oracle.com) 提供了一个免费的 APEX 实例，平均每周接收 140
    万到 150 万次页面浏览，并托管着超过 10,000 个工作区。


    APEX 应用程序实际上运行在 Oracle 数据库内部；其代码模块主要由 PL/SQL 组成，任何应用程序、表单和报表都作为元数据存储在数据库表中。因为业务逻辑、用户界面和数据都存储在数据库中，APEX
    的优势在于消除了其他平台所需的额外网络往返开销，那些平台需要在业务层和数据层之间频繁通信。因此，APEX 应用程序的性能轻松超越传统的三层架构应用程序。


    然而，APEX 并非独立于数据库，因此存在被数据库供应商锁定的风险。例如，将 APEX 应用程序从 Oracle 数据库迁移到基于 Microsoft SQL
    Server 的数据库，几乎肯定意味着需要从头开始重写整个应用程序。在考虑是否在项目中使用 APEX 时，重要的是考虑应用程序需要支持的数据库范围。


    在使用 APEX 时，还应注意几个技术限制，特别是在单个页面上可托管的数据库项目数量方面。表 1-1 列出了 Oracle 网站上所述的当前 APEX 的一些限制。


    **表 1-1.** APEX 组件限制


    | **组件** | **描述** |

    | --- | --- |

    | `Interactive reports` | 单个页面支持一个交互式报表。每个交互式报表最多 100 列。 |

    | `Classic reports` | 每个经典报表最多 100 列。 |

    | `Forms` | 每页 100 个可输入项（输入字段）。文本区域或富文本编辑控件最多可输入 32767 字节。主键最多两列。 |

    | `Tabular forms` | 每页最多一个向导生成的表单表格。最多 50 个可编辑的表单表格列。 |

    | `Item names` | 使用绑定变量语法引用的项目名称最长 30 个字符。 |

    | `Validations` | 为验证输入的文本最长 3,950 个字符。 |


    APEX 的大部分业务逻辑开发都是使用 PL/SQL 完成的。虽然 PL/SQL 在一定程度上支持函数和代码可重用性，但这并未扩展到业务层之外。例如，在传统的开发工具中，你可以创建不同的按钮，这些按钮都继承自一个包含通用行为集合的通用按钮类。这种面向对象编程在用户界面层面的支持在
    APEX 中并不提供。


    最后，重要的是要记住 APEX 是一个具有标准行为和功能的平台。它不提供与传统开发工具相同的自由度，因此，如果你需要实现 APEX 未开箱即用的某些功能，你将需要亲自动手使用
    JavaScript、AJAX 和 DHTML。


    ### 1-2. 确定 APEX 部署模型


    #### 问题


    你想要部署 APEX。你听说有几种不同的方法，但不确定哪种部署模型适合你的需求。


    #### 解决方案


    部署 APEX 时的主要决策点是决定使用哪个 HTTP 服务器来提供你的 APEX 应用程序服务。Oracle 提供两种类型的 HTTP 服务器：


    *   Oracle XML DB HTTP Server（嵌入式 PL/SQL 网关）

    *   Oracle HTTP Server 和 mod_plsql


    如果符合以下情况，请选择 Oracle XML DB HTTP Server：


    *   你希望采用更简单的两层部署（Web 浏览器和数据库服务器）。

    *   你的首要目标是以最少的配置，在尽可能短的时间内启动并运行。

    *   你不希望安装单独的服务器来托管 HTTP 服务器。

    *   你将 APEX 部署在作为独立系统的个人 PC 上。


    如果符合以下情况，请选择 Oracle HTTP Server 和 mod_plsql 方法：


    *   你希望采用完整的三层部署（Web 浏览器、HTTP Web 服务器和数据库服务器）。

    *   你将 APEX 部署在企业环境中，并且需要访问广泛的 Web 服务器配置和日志设置。

    *   你打算将 APEX 应用程序暴露在互联网上。这涉及到安全目的，将在“工作原理”部分详细解释。

    *   你需要单点登录集成。

    *   你需要中间层负载均衡和故障转移功能。

