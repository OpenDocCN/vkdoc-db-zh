  trans: "\n## 工作原理\n\nAPEX 是一个可供多个开发团队同时使用的平台。每个**工作空间**代表一个开发团队的工作区域。在每个工作空间内部，开发者可以创建多个应用程序。例如，团队\
    \ Alpha 可能正在开发两个应用程序（一个销售团队应用和一个 HRM 应用），而团队 Beta 可能正在开发一个在线书店应用程序。这在图 1-8 中进行了总结。\n\
    \n![images](img/0108.jpg)\n\n`图 1-8. APEX 工作空间`\n\n在 APEX 工作空间的上下文中，可以创建许多不同的对象和子对象。图\
    \ 1-9 展示了这些不同类型对象之间的关系。如果你再次被这些术语弄糊涂，请参考表 1-2 以获取这些对象的定义。\n\n![images](img/0109.jpg)\n\
    \n`图 1-9. 各种 APEX 对象之间的关系`\n\n![images](img/square.jpg) `注意` 数据库应用程序的原子单位是页面。一个数据库应用程序本质上由一堆页面组成，这些页面可以是数据录入界面、报表或数据表格列表的混合。\n\
    \n### 1-5. 为团队开发设置工作空间\n\n#### 问题\n\n你刚刚安装了 APEX。现在你需要创建一个工作空间，以便开发团队 Alpha（Sally\
    \ 和 John）可以开发他们的销售团队应用。\n\n#### 解决方案\n\n以下是为团队开发进行设置的方法：\n\n1.  在浏览器的地址栏中输入 [`http://yourserver:8080/apex`](http://yourserver:8080/apex)\
    \ 登录 APEX 门户。\n    ![images](img/square.jpg) `注意` 请将 `yourserver` 替换为你的服务器名称或\
    \ IP 地址。如果你在本地安装了 APEX，请将 `yourserver` 替换为 `localhost`。\n2.  在登录窗口中，指定 `Internal`\
    \ 作为工作空间，并使用你在配方 1-3 中先前创建的用户名和密码以管理员身份登录。\n3.  成功登录后，点击 `Manage Workspaces` 菜单项。点击\
    \ `Workspace Actions` 部分下的 `Create Workspace` 链接。在随后出现的页面中，指定工作空间名称、ID 和描述。你现在应该看到如图\
    \ 1-10 所示的页面。\n    ![images](img/0110.jpg)\n    `图 1-10. 创建一个工作空间`\n4.  点击 `Next`\
    \ 按钮继续。在此页面，你可以指定使用现有的数据库模式或为该工作空间创建一个新模式。图 1-11 展示了如何为工作空间创建新模式。\n    ![images](img/0111.jpg)\n\
    \    `图 1-11. 为工作空间创建新模式`\n5.  接下来，你将需要指定`工作空间管理员`用户、密码和电子邮件。参见图 1-12。\n    ![images](img/0112.jpg)\n\
    \    `图 1-12. 指定管理员详细信息`\n6.  点击 `Next` 按钮继续。点击向导剩余页面的确认工作空间创建。你可以通过导航至 `Manage\
    \ Workspace` ![images](img/U001.jpg) `Workspace Reports` ![images](img/U001.jpg)\
    \ `Existing Workspaces` 链接来浏览现有工作空间。点击该链接后，你应该能看到你刚刚创建的 `Alpha` 工作空间（在图 1-13 中高亮显示）。\n\
    \    ![images](img/0113.jpg)\n    `图 1-13. 团队 Alpha 工作空间`\n7.  现在你需要将开发者 Sally\
    \ 和 John 的用户账户添加到该工作空间。点击 `Manage Workspaces` 菜单，然后点击 `Workspace Actions` 部分下的\
    \ `Manage Developers and Users` 链接。在随后的页面中，点击黄色的 `Create User` 按钮，并在下一页填写用户详细信息。务必为你创建的用户账户选择先前创建的\
    \ `WORKSPACE ALPHA` 工作空间。图 1-14 详细说明了这一点。填写完表格后点击 `Create` 按钮。\n    ![images](img/0114.jpg)\n\
    \    `图 1-14. 创建一个开发者`\n8.  创建用户后，你应该能在 `Manage Developers and Users` 页面看到新创建的账户。现在是尝试以开发者身份登录你的工作空间的时候了。点击页面右上角的\
    \ `Logout` 链接，然后点击 `Login` 链接再次导航至 `Login` 页面。在登录页面，指定 `WORKSPACE ALPHA` 作为你的工作空间名称，并指定你先前创建的开发者账户的用户名和密码（如图\
    \ 1-15 所示）。\n    ![images](img/0115.jpg)\n    `图 1-15. 登录你的工作空间`\n9.  点击 `Login`\
    \ 按钮。如果你能够成功登录，你应该能看到如图 1-16 所示的工作空间主页。\n    ![images](img/0116.jpg)\n    `图 1-16.\
    \ 工作空间主页`\n\n#### 工作原理\n\n正如前面在配方 1-4 中介绍的，工作空间代表了开发团队的工作区域。例如，在典型的 APEX 部署中，每个部门可能都会获得自己的工作空间，该空间是自我管理的，并且与其他部门分离。\n\
    \n一个 APEX 工作空间可以配置为映射到一个或多个数据库模式。这允许在此 APEX 工作空间中创建的任何应用程序、表单或报表继承关联数据库模式中的所有权限。（你的应用程序代码将有权访问该模式中的所有数据库对象，就像它直接登录到该模式一样）。\n\
    \n在一个典型的组织中，APEX 管理员会根据需要为不同的开发团队创建工作空间，然后为每个工作空间单独添加相应的开发者账户。\n\n![images](img/square.jpg)\
    \ `注意` 不要将 APEX 工作空间与数据库工作空间混淆。后者是一个共享的虚拟环境，用户可以在其中对表中的数据进行版本控制更改。数据库工作空间是 `Oracle\
    \ Workspace Manager` 的一部分，这是 Oracle 数据库的一个特性。\n\n### 1-6. 管理开发过程\n\n#### 问题\n\n\
    作为项目经理，你已为你的开发团队建立了一套功能、里程碑和任务。你需要利用 APEX 的`软件配置管理`功能来跟踪项目进度。\n"
- fmt: "### Solution\n\nTo create and update a feature throughout your project, follow\
    \ these steps:\n\n1.  Login to a workspace in your APEX portal.\n2.  Click on\
    \ `Team Development` -> `Features` -> `Create Feature`.\n3.  Fill in the details\
    \ of the feature you wish to develop in the software (as shown in [Figure 1-17](#Chapter01.html#fig_1_17)).\n\
    \n    ![images](images/0117.jpg)\n\n    **Figure 1-17.** Creating a feature\n\n\
    4.  Click the `Create Feature` button.\n5.  You have created a feature, which\
    \ is now viewable by all developers in the workspace.\n6.  If a developer has\
    \ completed this feature, and he now wishes to change the status of the feature,\
    \ he will first need to navigate `to Team Development` -> `Features` -> `Features\
    \ tab`.\n7.  You should be able to see a list of all your features in this page.\
    \ You can search for your feature through this page as well. Once you have located\
    \ the feature you created earlier, click on the `Edit` icon next to your feature\
    \ (see [Figure 1-18](#Chapter01.html#fig_1_18)).\n\n    ![images](images/0118.jpg)\n\
    \n    **Figure 1-18.** Browsing the list of features\n\n8.  In the next page,\
    \ change the `Status` field of the feature to `Complete - 100%` and click the\
    \ `Apply Changes` button.\n9.  If you navigate to the `Team Development` -> `Features`\
    \ -> `Dashboard` tab, you can see a dashboard containing a summary of your list\
    \ of features (as shown in [Figure 1-19](#Chapter01.html#fig_1_19)).\n\n    ![images](images/0119.jpg)\n\
    \n    **Figure 1-19.** The Features dashboard\n\n10. The `Calendar` tab shows\
    \ your feature development deadlines in a visualize calendar format, the `History`\
    \ tab shows you the latest updates made to the list of features, and the `Focus\
    \ Areas` and `Owners` tab shows the distribution of features among the various\
    \ persons involved in a doughnut chart.\n\n    ![images](images/square.jpg) **Tip**\
    \ The steps involved in creating milestones, tasks, and reporting bugs are very\
    \ similar to those for creating a feature. To access each item, click on the corresponding\
    \ icon in the `Team Development` menu.\n\n### How It Works\n\nThe new `Team Development`\
    \ module provided in version 4.0 of APEX provides a way for stakeholders (your\
    \ end users) to log in and track the status of feature requests and to even insert\
    \ their feedback as they use the application you've developed!\n\n`APEX Team Development`\
    \ is also a great boon for development teams that use a `SCRUM`-based methodology\
    \ like `agile` in their projects. One of the basic tenets of `agile` is that features\
    \ can be added in any order at any time, and more importantly, a working product\
    \ can be released at any iteration.\n\nUsing `Team Development`, you can quickly\
    \ create a new release; group a bunch of features, milestones, and tasks under\
    \ that release; and track its progress through the various dashboards in the portal.\
    \ When the release is made available to the end users, they log on to the portal\
    \ to test your application and provide feedback (through the integrated `Team\
    \ Development Feedback` feature). This allows the project manager to incorporate\
    \ these feedback and establish a new release plus a new set of features, milestones,\
    \ and tasks.\n\nThis iterative process can occur many times to produce incremental\
    \ releases of an application every week or so and suits very well the rapidly\
    \ evolving nature of requirements prevalent in the `agile` development approach.\n\
    \n## CHAPTER 2\n\n## Application Data Entry\n\nMost business database-centric\
    \ applications generally function in the same manner. An application is built\
    \ around a table, say a `Customer` table. An end user needs to add new data to\
    \ this table (in this case, a new customer record). He or she also needs to modify\
    \ existing data and delete customer records from this table. Data records in this\
    \ table usually take the appearance of a grid, accompanied by the `New`, `Edit`,\
    \ and `Delete` buttons that allow the end user to modify the grid's contents.\
    \ The `New` and `Edit` buttons typically take the user to a separate detail page—a\
    \ form—that displays the set of fields in a more streamlined manner for data entry.\n\
    \nAs you move towards increasingly complex examples like sales order forms or\
    \ expense claim request forms, you can dress up your application with increasingly\
    \ sophisticated bells and whistles—data validation, calculated fields, complex\
    \ form behavior, access rights, web service calls and so on. At its heart, though,\
    \ a business application still consists of basic `CRUD` (`Creating`, `Reading`,\
    \ `Updating`, and `Deleting`) operations.\n\nThis recurring pattern is the underlying\
    \ foundation that makes the entire concept of `Oracle APEX` work. It takes care\
    \ of the tedious work of setting up basic data entry screens and binding it to\
    \ the database table. After that, you are given the freedom to add the bells and\
    \ whistles you want to each page to make them behave the way you want them to.\n\
    \nThis chapter provides you with several recipes to help you create the `CRUD`\
    \ foundation for your application. It will guide you through creating two different\
    \ application types—the standard database application and the `Websheet` application\
    \ (a new feature in `APEX 4.0`). You will learn how to generate the data entry\
    \ forms for both and then modify them slightly to use a richer set of UI controls.\
    \ I will also explore how you can speed up data entry by using a special type\
    \ of form called the `tabular form`.\n\n### 2-1. Creating a Database Application\n\
    \n#### Problem\n\nYou need to create a `database application` that contains a\
    \ data entry form to manage a master list of customers and their details.\n\n\
    #### Solution\n\nIt's best to approach this problem in two parts. First, create\
    \ the customer table. Then create the application, including a data entry form."
