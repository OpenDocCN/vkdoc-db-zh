  trans: "\n## 解决方案\n\n要将文本区域的字段类型更改为单行文本框，请按照以下步骤操作：\n\n1.  导航至应用主页，点击 `CUSTOMERS\
    \ 表单`。这将显示页面配置区域。在 `页面渲染` 部分，展开 `区域` → `主体 (3)` → `Form on Customers` → `项目` 节点，并双击您想要修改的字段（参见\
    \ 图 2-20）。\n\n    ![images](img/0220.jpg)\n\n    图 2-20. 表单上的字段设置\n\n2.  在 `编辑页面项`\
    \ 页面中，将该字段的字段类型从 `文本区域` 更改为 `文本字段`（如 图 2-21 所示）。\n\n    ![images](img/0221.jpg)\n\
    \n    图 2-21. 字段设置页面\n\n3.  点击 `应用更改` 按钮。运行应用并打开 `我的客户列表` 页面。选择创建新记录。在表单页面中，您应该能观察到您字段的字段类型已相应改变（如\
    \ 图 2-22 所示）。\n\n    ![images](img/0222.jpg)\n\n    图 2-22. 在 CUSTOMERS 表单中反映的更改\n\
    \n## 工作原理\n\n`页面渲染` 部分提供了每个页面后端配置的概览。它列出了表单上使用的每个字段，并提供了从视觉布局到验证行为等各个方面操作这些字段的工具。\n\
    \n### 2-4. 在表单中从值列表中选择\n\n#### 问题\n\n您需要在客户表单的 `Country` 字段中创建一个作为下拉列表的值列表。此值列表必须是动态的，并且应在单独的表中进行管理。\n\
    \n#### 解决方案\n\n以下是如何创建一个允许用户从值列表中选择的表单字段：\n\n1.  使用 `SQL 工作室` 中的 `对象浏览器` 工具，创建一个名为\
    \ `Countries` 的新表，包含两列：`CountryName` 和 `Remarks`。向表中插入一些示例数据；例如，在 `CountryName`\
    \ 字段中为 `Japan`、`US` 和 `Singapore` 创建记录。\n\n    ![images](img/square.jpg) **提示**\
    \ 配方 2-1 描述了如何使用 `对象浏览器` 工具创建表。\n\n2.  导航至应用主页，点击 `CUSTOMERS 表单`。这将显示页面配置区域。在\
    \ `页面渲染` 部分，展开 `区域` → `主体 (3)` → `Form on Customers` → `项目` 节点，并双击 `Country` 字段。\n\
    3.  在随后的页面中，将 `显示为` 字段类型更改为 `选择列表`。这表示一个下拉列表。当您这样做时，您还会注意到顶部会出现一个名为 `值列表` 的新选项卡。点击此选项卡。\n\
    4.  在随后的页面中，点击 `创建动态值列表` 链接。这将启动一个弹出窗口，允许您配置动态列表。在弹出窗口中，使用默认的表/视图所有者，然后点击 `下一步`\
    \ 按钮。\n5.  在向导的下一页中，选择 `Countries` 表。将 `CountryName` 同时设置为 `显示` 列和 `返回值`。依次点击\
    \ `下一步` 和 `完成` 按钮以完成配置。您将在值列表 `定义` 区域看到生成的 SQL（如 图 2-23 所示）。\n\n    ![images](img/0223.jpg)\n\
    \n    图 2-23. 值列表定义区域中生成的 SQL\n\n6.  点击 `显示` 选项卡，并将 `高度` 设置为 `1`。这将把选择列表从列表框转换为下拉列表。\n\
    7.  点击 `应用更改` 按钮。运行应用，点击 `我的客户列表` 链接，并选择创建新记录。您会注意到 `Country` 字段已更改为一个下拉列表，其中包含存储在\
    \ `Countries` 表中的值（如 图 2-24 所示）。\n\n    ![images](img/0224.jpg)\n\n    图 2-24.\
    \ 国家下拉列表\n\n#### 工作原理\n\nOracle APEX 提供了五种不同类型的控件，允许用户从值列表中选择。它们在 表 2-2 中描述。\n\
    \n表 2-2. 提供值列表功能的项类型\n\n| 项类型 | 描述 |\n| --- | --- |\n| `复选框` | 您可以创建多个复选框（一个检查列表），供用户在表单上勾选。值列表区域允许您定义每个复选框的标题和值。\
    \ |\n| `单选按钮组` | `单选按钮组` 类型允许您使用单选按钮从值列表中选择单个值。值列表区域允许您定义每个单选按钮的标题和值。 |\n| `弹出式值列表`\
    \ | `弹出式值列表` 是一种选择控件，您可以从弹出窗口中的列表中选择一个值。 |\n| `选择列表` | 选择列表可以呈现为列表框（如果 `高度` 属性设置为大于\
    \ 1 的值）或下拉列表（如果 `高度` 属性设置为 1）。`选择列表` 中包含的值列表在值列表区域中定义。 |\n| `穿梭框` | 穿梭框基本上由两个列表框组成，允许您将项目从一个框穿梭（或添加）到另一个框。\
    \ |\n\n### 2-5. 在表单中上传和下载文件\n\n#### 问题\n\n您需要让用户在每条客户记录中上传一个附件——公司简介（任何文件格式）。\n\
    \n#### 解决方案\n\n以下是如何在表单中创建文件上传字段：\n\n1.  使用 `SQL 工作室` 中的 `对象浏览器` 工具，向 `Customers`\
    \ 表添加一个新的 `BLOB` 列，并将列命名为 `CompanyProfile`。\n2.  导航至应用主页，点击 `CUSTOMERS 表单`。这将显示页面配置区域。在\
    \ `页面渲染` 部分，展开 `区域` → `主体 (3)` → `Form on Customers` 节点，并右键单击 `项目` 节点。选择 `创建页面项`\
    \ 菜单项。\n3.  在随后的页面中，选择 `文件浏览` 字段类型并点击 `下一步`。在下一页中，将 `项名称` 更改为 `P9_COMPANYPROFILE`。在向导的其余页面中使用默认设置。创建页面项后，在\
    \ `页面渲染` 部分双击该项。\n4.  在项配置页面中，点击 `源` 选项卡，并将 `源类型` 更改为 `数据库列`。将 `源值或表达式` 字段设置为您的\
    \ `BLOB` 数据库字段的名称，`COMPANYPROFILE`。点击 `应用更改` 按钮保存您的更改。\n5.  现在，运行应用，点击 `我的客户列表`\
    \ 链接，并选择创建新记录。您会在表单中看到新的公司简介字段。点击 `浏览` 按钮并在文件选择器对话框中选择任何基于文本的文件（如 图 2-25 所示）。点击右上角的\
    \ `创建` 按钮以保存记录。文件内容将被写入 `BLOB` 列。\n\n    ![images](img/0225.jpg)\n\n    图 2-25.\
    \ 正在使用的公司简介文件上传字段\n\n6.  现在尝试编辑您刚刚创建的记录。在表单窗口中，您将能够在文件上传控件旁边看到一个小小的 `下载` 链接。点击\
    \ `下载` 链接以下载文件内容（如 图 2-26 所示）。\n\n    ![images](img/0226.jpg)\n\n    图 2-26. 从\
    \ BLOB 字段下载数据\n\n#### 工作原理\n\n当您使用 `BLOB` 字段存储文件附件时，文件附件的内容在通过 APEX 表单上传后存储在 `BLOB`\
    \ 字段中。同样，当启动下载时，`BLOB` 字段的内容会被下载到客户端浏览器。\n\n### 2-6. 使用表单表格加速数据录入\n\n#### 问题\n\
    \n您有大量数据需要输入到您的应用程序中。您需要一种更好、更快的方式来编辑和插入数据记录。\n"
- fmt: "### Solution\n\n执行以下步骤以创建表格数据录入表单：\n\n1.  导航至应用程序主页。创建一个新页面，并选择表格表单作为页面类型。单击“下一步”按钮。\n\
    2.  在向导的下一部分，您可以选择允许在表格表单上执行的操作类型。保留默认设置（更新、插入和删除）并继续到下一页。\n3.  从列表中选择 `Customers`\
    \ 表。在下一页，选择要包含在表格表单中的所有列。如[图 2-27](#Chapter02.html#fig_2_27)所示。\n\n    ![images](images/0227.jpg)\n\
    \n    **图 2-27. 选择要包含在表格表单中的列列表**\n\n4.  在所有后续页面中使用默认设置。在向导结束时，单击“运行页面”图标以运行您的表格表单。\n\
    5.  您应该能够看到表格表单，如[图 2-28](#Chapter02.html#fig_2_28)所示。您可以通过直接在表格单元格中更改值来修改数据。您还可以使用表格顶部和底部提供的按钮删除和添加行。修改数据完成后，单击“提交”按钮保存更改。\n\
    \n![images](images/0228.jpg)\n\n**图 2-28. 运行中的表格表单**\n\n![images](images/square.jpg)\
    \ **提示** 您可能还想从应用程序主页直接链接到此表格表单。配方 2-9 中的步骤 7 到 9 详细解释了如何执行此操作。\n\n### How It\
    \ Works\n\n表格表单可帮助您快速设置网格，允许您对表格数据进行内联编辑。表格表单的目标是允许最终用户修改多条记录并一次性提交所有更改。这在多用户需要频繁更新多条数据记录时，减少了网络流量。\n\
    \n表格表单功能为内联编辑中的每列提供了丰富的 UI 控件。例如，`Country` 列在编辑时可以呈现一个包含国家列表的下拉列表。\n\n## 2-7.\
    \ 创建 Websheet 应用程序\n\n### Problem\n\n您有一个包含大量数据（所有客户的列表）的 Microsoft Excel 电子表格。您需要将此整个列表放到\
    \ Web 上，以便用户可以通过 Web 界面修改它，并且需要在尽可能短的时间内完成。\n\n### Solution\n\n以下是使用 Microsoft\
    \ Excel 电子表格中的数据创建 Websheet 应用程序的方法：\n\n1.  单击 `Application Builder` 主菜单项，然后单击“创建”按钮。选择创建\
    \ Websheet 应用程序。\n2.  将应用程序名称更改为 `CustomersWebSheet`。\n3.  单击“创建”按钮以创建 Websheet。您应该在工作区主页中看到您的\
    \ Websheet 应用程序（参见[图 2-29](#Chapter02.html#fig_2_29)）。\n\n    ![images](images/0229.jpg)\n\
    \n    **图 2-29. 新创建的 CustomersWebSheet 应用程序**\n\n4.  单击您的 Websheet 应用程序，然后单击“运行”按钮。\n\
    5.  使用您的开发者凭据登录到 Websheet 应用程序。\n6.  在应用程序中，单击 `Data` 主菜单项并选择 `Create` 子菜单项。\n\
    7.  在向导中，选择创建数据网格，然后单击“下一步”按钮。\n8.  在下一页中，选择通过复制和粘贴创建数据网格（如[图 2-30](#Chapter02.html#fig_2_30)所示）。\n\
    \n    ![images](images/0230.jpg)\n\n    **图 2-30. 通过剪切和粘贴创建数据网格**\n\n9.  在下一页中，指定\
    \ `Customers` 作为数据网格的名称。您现在需要将所有数据从您的 Excel 电子表格中复制（如[图 2-31](#Chapter02.html#fig_2_31)所示）并粘贴到此页的大文本区域中（如[图\
    \ 2-32](#Chapter02.html#fig_2_32)所示）。\n\n    ![images](images/0231.jpg)\n\n  \
    \  **图 2-31. 从您的 Microsoft Excel 文件复制内容...**\n\n    ![images](images/0232.jpg)\n\
    \n    **图 2-32. ...并将它们粘贴到此处的大文本区域中...**\n\n10. 接下来，单击“上传”按钮。您会发现您的电子表格数据神奇地整齐排列在数据网格中（参见[图\
    \ 2-33](#Chapter02.html#fig_2_33)）！\n\n    ![images](images/0233.jpg)\n\n    **图\
    \ 2-33. ...这就是整齐排列在数据网格中的电子表格数据！**\n\n11. 您现在可以直接通过单击表格中的任何单元格来编辑 Websheet（如[图\
    \ 2-34](#Chapter02.html#fig_2_34)所示）。使用每行左侧的“编辑”图标（该图标会打开一个根据您的 Excel 表列生成的表单）向表格添加新行等。\n\
    \n![images](images/0234.jpg)\n\n**图 2-34. 在 Websheet 中编辑数据**\n\n### How It Works\n\
    \n工作表提供了一种将整个电子表格转换为可编辑网格的便捷方法，该网格提供了报告提供的所有标准功能——包括验证、分页、排序、突出显示等。\n\n请注意，工作表应用程序在底层的工作方式略有不同。工作表数据网格不像表单那样直接映射到数据库表。工作表数据存储在内部的\
    \ `APEX$_WS_ROWS` 表中。\n\n![images](images/square.jpg) **提示** 您可以使用 SQL Workshop\
    \ 中的 Object Browser 工具检查 `APEX$_WS_ROWS` 表的内容。\n\n## 2-8. 更改 Websheet 列的项类型\n\n\
    ### Problem\n\n您需要创建一个 Websheet，其中对不同列使用不同的控件。例如，您的用户希望对 `Country` 列使用下拉列表（包含不同国家的列表）。\n\
    \n### Solution\n\n以下是为 Websheet 中的列创建下拉列表的方法：\n\n1.  导航至 `CustomersWebSheet` 应用程序并运行它。使用您的开发者凭据登录到应用程序。\n\
    2.  打开 `Customers` 数据网格。\n3.  单击“管理”下拉按钮，然后单击 `Columns` ![images](images/U001.jpg)\
    \ `Column Properties` 菜单项。\n4.  您将看到“列属性”页面。从“列名”字段中选择 `Country` 列。\n5.  在“显示为”字段下，选择“选择列表”。\n\
    6.  在[图 2-35](#Chapter02.html#fig_2_35)所示的“值列表”部分下，选择“基于当前值新建值列表”项。这将从您之前粘贴的电子表格数据中的\
    \ `Country` 列检索整个唯一值列表。\n\n    ![images](images/0235.jpg)\n\n    **图 2-35. 修改\
    \ Country 列属性**\n\n7.  完成后单击“添加行”按钮。当您在数据网格中单击 `Country` 列中的任何单元格时，您现在会注意到一个包含国家列表的下拉列表，而不是通常的文本框（参见[图\
    \ 2-36](#Chapter02.html#fig_2_36)）。\n\n![images](images/0236.jpg)\n\n**图 2-36.\
    \ Websheet 数据网格内的下拉列表**\n\n### How It Works\n\n与报表类似，您可以轻松更改 Websheet 中每列的项类型。但是，Websheet\
    \ 可用的项类型仅限于以下几种：\n\n*   日期选择器\n*   只读\n*   选择列表\n*   文本\n*   文本区域\n\n![images](images/square.jpg)\
    \ **注意** 对于 Websheet 中的选择列表，您只能在 LOV 中定义静态项列表（以逗号分隔）。Websheet 中的选择列表不支持像表单那样的动态列表。\n\
    \n## 2-9. 批量修改 Websheet 中的值\n\n### Problem\n\n您的 Websheet 中有一个包含数千行的列表。您需要将所有地址中的单词“Road”更改为“Street”。"
  raw: "#### Solution\n\nExecute the following steps to create a tabular data-entry\
    \ form:\n\n1.  Navigate to the application home. Create a new page, and choose\
    \ the tabular form as the type of the page. Click the Next button.\n2.  In the\
    \ next section of the wizard, you are allowed to choose the type of operations\
    \ allowed on the tabular form. Leave it as the default (Update, Insert, and Delete)\
    \ and proceed to the next page.\n3.  Choose the Customers table from the list.\
    \ In the next page, select all columns to include in the tabular form. This is\
    \ shown in [Figure 2-27](#Chapter02.html#fig_2_27).\n\n    ![images](images/0227.jpg)\n\
    \n    ***Figure 2-27.** Selecting the list of columns to include in a tabular\
    \ form*\n\n4.  Use the default settings on all the subsequent pages. At the end\
    \ of the wizard, click the Run Page icon to run your tabular form.\n5.  You should\
    \ be able to see the tabular form, as shown in [Figure 2-28](#Chapter02.html#fig_2_28).\
    \ You will be able to modify your data by changing values directly in the cells\
    \ of the table. You will also be able to delete and add rows from this table using\
    \ the buttons provided at the top and bottom of the table. Once you are done modifying\
    \ your data, click the Submit button to save your changes.\n\n![images](images/0228.jpg)\n\
    \n***Figure 2-28.** The tabular form in action*\n\n![images](images/square.jpg)\
    \ **Tip** You might also want to include a link from your application home page\
    \ directly to this tabular form. Steps 7 to 9 in Recipe 2-2 explain how to do\
    \ this in detail.\n\n#### How It Works\n\nTabular forms help you to quickly set\
    \ up grids that allow you to do inline editing of tabular data. The objective\
    \ of the tabular form is to allow the end user to modify multiple records and\
    \ to submit all the changes at once. This reduces network traffic when many users\
    \ need to update multiple data records frequently.\n\nThe tabular forms feature\
    \ provides rich UI controls for each column during inline editing. For example,\
    \ a Country column could present a dropdown containing a list of countries to\
    \ pick from when editing the tabular form.\n\n### 2-7. Creating a Websheet Application\n\
    \n#### Problem\n\nYou have a Microsoft Excel spreadsheet containing a huge list\
    \ of data—a list of all your customers. You need to get this entire list onto\
    \ the Web so that users can modify it via a web interface, and you need to do\
    \ this in the shortest possible time.\n\n#### Solution\n\nHere's how to create\
    \ a Websheet application using data from a Microsoft Excel spreadsheet:\n\n1.\
    \  Click on the `Application Builder` main menu item, and click the Create button.\
    \ Choose to create a Websheet application.\n2.  Change the name of the application\
    \ to CustomersWebSheet.\n3.  Click the Create button to create the Websheet. You\
    \ should see your Websheet application in the workspace home (see [Figure 2-29](#Chapter02.html#fig_2_29)).\n\
    \n    ![images](images/0229.jpg)\n\n    ***Figure 2-29.** The newly created CustomersWebSheet\
    \ application*\n\n4.  Click on your Websheet application and click the Run button.\n\
    5.  Login to the Websheet application using your developer credentials\n6.  In\
    \ the application, click the Data main menu item and select the Create submenu\
    \ item.\n7.  In the wizard, choose to create a data grid, and click the Next button.\n\
    8.  In the next page, choose to create the data grid via Copy and Paste (as shown\
    \ in [Figure 2-30](#Chapter02.html#fig_2_30)).\n\n    ![images](images/0230.jpg)\n\
    \n    ***Figure 2-30.** Create data grid via cut and paste*\n\n9.  In the next\
    \ page, specify Customers as the name of your data grid. You will now need to\
    \ copy all the data from your Excel spreadsheet (as shown in [Figure 2-31](#Chapter02.html#fig_2_31))\
    \ and paste it into the large text area in this page (shown in [Figure 2-32](#Chapter02.html#fig_2_32)).\n\
    \n    ![images](images/0231.jpg)\n\n    ***Figure 2-31.** Copy the contents from\
    \ your Microsoft Excel file...*\n\n    ![images](images/0232.jpg)\n\n    ***Figure\
    \ 2-32.** ...and paste them in the large text area here…*\n\n10.  Next, click\
    \ the Upload button. You will find your spreadsheet data magically arranged neatly\
    \ in a data grid (see [Figure 2-33](#Chapter02.html#fig_2_33))!\n\n    ![images](images/0233.jpg)\n\
    \n    ***Figure 2-33.** ...and here's your spreadsheet data neatly arranged in\
    \ a data grid!*\n\n11.  You can now edit the Websheet directly by clicking on\
    \ any cell in the table (as shown in [Figure 2-34](#Chapter02.html#fig_2_34)).\
    \ Use the Edit icon at the left side of each row (which opens up a form generated\
    \ from your Excel sheet columns) to add new rows to the table and so on.\n\n![images](images/0234.jpg)\n\
    \n***Figure 2-34.** Editing data in a Websheet*\n\n#### How It Works\n\nWorksheets\
    \ provide a convenient way of converting an entire spreadsheet into an editable\
    \ grid that provides all the standard functionality a report provides—including\
    \ validation, paging, sorting, highlighting, and so on.\n\nNote that worksheet\
    \ applications work slightly differently under the hood. A worksheet data grid\
    \ does not map directly to a database table as a form does. Worksheet data is\
    \ stored in the internal APEX$_WS_ROWS table.\n\n![images](images/square.jpg)\
    \ **Tip** You can inspect the contents of the APEX$_WS_ROWS table using the Object\
    \ Browser tool in the SQL Workshop.\n\n### 2-8. Changing the Item Type of a Websheet\
    \ Column\n\n#### Problem\n\nYou need to create a Websheet that uses different\
    \ controls for different columns. For example, your users want to use a drop-down\
    \ list (containing the list of different countries) for the Country column.\n\n\
    #### Solution\n\nHere's how to create a drop-down list for a column in the Websheet:\n\
    \n1.  Navigate to the CustomersWebSheet application and run it. Log in to the\
    \ application using your developer credentials.\n2.  Open the Customers data grid.\n\
    3.  Click on the Manage drop-down button, and click the Columns ![images](images/U001.jpg)\
    \ Column Properties menu item.\n4.  You will see the Column Properties page. Select\
    \ the Country column from the Column Name field.\n5.  Under the Display As field,\
    \ choose Select List.\n6.  Under the List of Values section in [Figure 2-35](#Chapter02.html#fig_2_35),\
    \ select the New List of Values `based on` Current Values item. This will retrieve\
    \ the whole list of unique values from the Country column in the spreadsheet data\
    \ you pasted earlier.\n\n    ![images](images/0235.jpg)\n\n    ***Figure 2-35.**\
    \ Modifying Country column properties*\n\n7.  Click the Add Row button when you\
    \ are done. When you click on any cell in the Country column on the data grid,\
    \ you will now notice a drop-down list containing the list of countries instead\
    \ of the usual text box (see [Figure 2-36](#Chapter02.html#fig_2_36)).\n\n![images](images/0236.jpg)\n\
    \n***Figure 2-36.** Drop-down list inside a Websheet data grid*\n\n#### How It\
    \ Works\n\nJust like reports, you can easily change the item type of each column\
    \ in the Websheet. The list of item types available to the Websheet is limited,\
    \ however, to the following item types:\n\n*   Date picker\n*   Read only\n* \
    \  Select list\n*   Text\n*   Text area\n\n![images](images/square.jpg) **Note**\
    \ For select lists in Websheets, you can only define a static list of items (separated\
    \ by comma) in the LOV. The select lists in Websheets do not support dynamic lists\
    \ like forms do.\n\n### 2-9. Modifying Values in a Websheet in Bulk\n\n#### Problem\n\
    \nYou have a thousand-row list of data in your Websheet. You need to change the\
    \ word “Road” in all addresses to “Street.”"
