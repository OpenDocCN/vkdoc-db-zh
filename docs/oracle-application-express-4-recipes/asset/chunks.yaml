    \ Application.”\n\n    ![images](images/0625.jpg)\n\n    ***Figure 6-25.** Publishing\
    \ the translated application*\n\n2.  In the ensuing page, set the Publish Application\
    \ Translation field to the Icelandic mapping, and click the Publish Application\
