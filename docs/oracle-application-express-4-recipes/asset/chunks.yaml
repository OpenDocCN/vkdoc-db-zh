    are still unable to figure out what the problem is, it''s always a good idea to
    peek in the generated APEX installation log files. More troubleshooting information
    is available at: [`http://download.oracle.com/docs/cd/E17556_01/doc/install.40/e15513/trouble.htm#BABCHHAF`](http://download.oracle.com/docs/cd/E17556_01/doc/install.40/e15513/trouble.htm#BABCHHAF)


    Set the workspace name to INTERNAL, the username to ADMIN, the password to admin123,
    and click the Login button. You should be able to see the page shown in [Figure
    1-7](#Chapter01.html#fig_1_7). This will indicate that your installation of APEX
    was successful.


    ![images](images/0107.jpg)


    ***Figure 1-7.** APEX home page*


    #### How It Works


    The first thing you might have noticed when trying to install APEX is that there
    is no installer to speak of. If you look closer, you can see that the APEX installation
    files downloaded from the Oracle site are simply a bunch of PL/SQL script files.


    The reason there is no installer is because Oracle APEX is basically a metadata
    repository. APEX applications, forms, and reports are nothing more than metadata
    and PL/SQL code stored in an Oracle database. An engine called the Application
    Express engine uses this metadata to render and process APEX web pages.


    ![images](images/square.jpg) **Tip** The fact that Oracle APEX, your applications,
    forms, and reports live entirely in the database makes backup a convenient process.
    Backing up an APEX application is no different from backing up any other Oracle
    database. [Chapter 9](#Chapter09.html#ch9) covers the backup process in detail.


    To get an idea what APEX the product consists of, here are some figures from the
    Oracle website: APEX consists of approximately 425 tables and 230 PL/SQL packages
    containing 425,000+ lines of code.


    ### 1-4. Familiarizing Yourself with APEX-speak


    #### Problem


    You find yourself amidst seasoned APEX developers. Tongue-tied, you strain your
    mind to make sense of the jargon they''re tossing across the table every minute
    or so. You don''t speak APEX, and this is a serious problem.


    #### Solution


    Before embarking on APEX, you need to know the difference between workspaces,
    Websheets, and schemas. [Table 1-2](#Chapter01.html#tab_1_2) explores in detail
    the various jargon used in APEX.


    ***Table 1-2.** APEX Jargon*


    | **Jargon** | **Description** |

    | --- | --- |

    | `Workspace` | `A workspace represents the working area for a team of developers.
    It allows different teams of developers to work in their own separate workspaces
    (in the same repository) and not have to interact with each other.` |

    | `Application` | `An application is basically what it sounds like—the traditional
    notion of an “application.” In Apex 4.0, you can build two different types of
    applications: a database application or a Websheet application.` |

    | `Database application` | `A database application is a type of application built
    around an RDBMS. It typically consists of forms, views, and reports.` |

    | `Websheet application` | `The Websheet is the latest addition to Apex 4.0\.
    It is another type of application that lets you build and deploy web-based forms,
    business logic, and reports in a declarative manner.` |

    | `Schema` | `Every APEX workspace is linked to one or more database schemas.
    A database schema stores the various database objects (such as tables) for each
    application.` |

    | `Theme` | `A theme is collection of templates that define the look and feel
    (layout) of an APEX application.` |

    | `Page` | `A page is the most basic unit of an APEX application and correlates
    to a web page. There are six different types of pages you can create: a blank
    page, report, form, tabular form, master detail, and “Report and Form.”` |

    | `Blank page` | `A blank page is an empty page that allows you to customize the
    contents on your own.` |

    | `Report` | `There are two types of reports in APEX: classic reports and interactive
    reports` |

    | `Classic report` | `A classic report is a static report that displays a list
    of records in a tabular format to the user.` |

    | `Interactive report` | `An interactive report is a type of report that allows
    for user interaction—searching, filtering, sorting, column selection, highlighting,
    and so on—at view-time to retrieve the desired set of data in the report.` |

    | `Form` | `A form allows for data entry. A form typically consists of a set of
    data controls and a Submit button.` |

    | `Tabular form` | `A tabular form allows you to perform update, insert, and delete
    operations on multiple records at one time in a single screen. These records are
    displayed in a tabular format.` |

    | `Master detail` | `The master detail page allows you to create forms with master-detail
    relationships from two tables.` |

    | `Report and Form` | `A Report and Form page contains both a report and form
    in the same page. The most common usage of this type of page is when you need
    to key in search parameters in one page and have the search results show up in
    the same page. In this case, the search parameters can be entered through the
    form component, and the search results would show up in the report component of
    the page.` |'
  trans: '### 11. 重置 APEX 图像前缀

    接下来，你需要强制 APEX 使用正确的 APEX 图标图像和 JavaScript 文件路径。如果不执行此步骤，可能会发现 APEX 登录页面加载时没有图标显示，并出现一堆
    JavaScript 错误。打开 Windows 命令提示符，导航到 `C:\APEXFILES\APEX\UTILITIES` 目录。从该目录运行 `sqlplus`
    工具并以 SYSDBA 身份登录。然后，运行以下语句：

    ```

    @reset_image_prefix.sql

    ```

    当提示输入图像前缀时，只需按 Enter 键使用默认值 (`/i/`)。成功完成后，你应该会看到如图 1-5 所示的输出。


    ![images](img/0105.jpg)


    **图 1-5.** 重置图像前缀


    ### 12. 设置管理员密码

    最后，通过运行以下语句为 Administrator 设置密码 `admin123`：

    ```

    @apxxepwd.sql admin123

    ```


    ### 13. 登录 APEX

    现在，尝试使用以下 URL 登录 APEX，将 *yourserver* 替换为你的实际服务器名称、IP 地址或 localhost（如果你将 APEX 作为独立系统安装在本地机器上）：

    ```

    http://yourserver:8080/apex

    ```

    你应该会看到如图 1-6 所示的登录页面。


    ![images](img/0106.jpg)


    **图 1-6.** APEX 登录页面


    ![images](img/square.jpg) **提示** 如果你无法看到图 1-6 中的登录页面，请检查 URL 中指定的端口号是否正确。同时检查是否已将
    APEX 文件解压到正确的文件夹，并在安装过程中正确引用了这些文件夹。如果仍然无法确定问题所在，查看生成的 APEX 安装日志文件总是一个好主意。更多故障排除信息可在此处获取：`http://download.oracle.com/docs/cd/E17556_01/doc/install.40/e15513/trouble.htm#BABCHHAF`


    将工作区名称设置为 `INTERNAL`，用户名设置为 `ADMIN`，密码设置为 `admin123`，然后单击“登录”按钮。你应该能看到如图 1-7 所示的页面。这将表明你的
    APEX 安装已成功。


    ![images](img/0107.jpg)


    **图 1-7.** APEX 主页


    ### 工作原理


    尝试安装 APEX 时，你可能注意到的第一件事是它没有所谓的安装程序。仔细观察，你会发现从 Oracle 站点下载的 APEX 安装文件只是一堆 PL/SQL
    脚本文件。


    没有安装程序的原因是 Oracle APEX 基本上是一个元数据存储库。APEX 应用程序、表单和报表只不过是存储在 Oracle 数据库中的元数据和 PL/SQL
    代码。一个名为 Application Express 引擎的引擎使用这些元数据来渲染和处理 APEX 网页。


    ![images](img/square.jpg) **提示** Oracle APEX、你的应用程序、表单和报表完全存在于数据库中，这使得备份成为一个便捷的过程。备份
    APEX 应用程序与备份任何其他 Oracle 数据库没有什么不同。第 9 章 详细介绍了备份过程。


    为了了解 APEX 产品由什么组成，以下是一些来自 Oracle 网站的数据：APEX 包含大约 425 个表和 230 个 PL/SQL 包，包含超过 425,000
    行代码。


    ### 1-4. 熟悉 APEX 术语


    #### 问题

    你发现自己置身于经验丰富的 APEX 开发人员之中。由于不懂行话，你绞尽脑汁试图理解他们每隔一分钟左右抛出的术语。你不会说 APEX 语，这是一个严重的问题。


    #### 解决方案

    在开始使用 APEX 之前，你需要了解工作区、Websheets 和模式之间的区别。表 1-2 详细探讨了 APEX 中使用的各种术语。


    **表 1-2.** APEX 术语表


    | **术语** | **描述** |

    | --- | --- |

    | `Workspace` | 工作区代表一个开发团队的工作区域。它允许不同的开发团队在各自独立的工作区（位于同一存储库中）中工作，而无需相互交互。 |

    | `Application` | 应用程序基本上就是它的字面意思——“应用程序”的传统概念。在 Apex 4.0 中，你可以构建两种不同类型的应用程序：数据库应用程序或
    Websheet 应用程序。 |

    | `Database application` | 数据库应用程序是一种围绕 RDBMS 构建的应用程序类型。它通常由表单、视图和报表组成。 |

    | `Websheet application` | Websheet 是 Apex 4.0 的最新成员。它是另一种类型的应用程序，允许你以声明方式构建和部署基于
    Web 的表单、业务逻辑和报表。 |

    | `Schema` | 每个 APEX 工作区都链接到一个或多个数据库模式。数据库模式为每个应用程序存储各种数据库对象（如表）。 |

    | `Theme` | 主题是模板的集合，定义了 APEX 应用程序的外观（布局）。 |

    | `Page` | 页面是 APEX 应用程序最基本的单位，与网页相关联。你可以创建六种不同类型的页面：空白页面、报表、表单、表格式表单、主详细信息以及“报表和表单”。
    |

    | `Blank page` | 空白页面是一个空页面，允许你自行定制内容。 |

    | `Report` | APEX 中有两种类型的报表：经典报表和交互式报表。 |

    | `Classic report` | 经典报表是一种静态报表，以表格形式向用户显示记录列表。 |

    | `Interactive report` | 交互式报表是一种允许用户交互的报表类型——在查看时进行搜索、过滤、排序、列选择、高亮显示等操作，以在报表中检索所需的数据集。
    |

    | `Form` | 表单允许数据输入。表单通常由一组数据控件和一个提交按钮组成。 |

    | `Tabular form` | 表格式表单允许你在单个屏幕上一次对多条记录执行更新、插入和删除操作。这些记录以表格格式显示。 |

    | `Master detail` | 主详细信息页面允许你从两个表创建具有主从关系的表单。 |

    | `Report and Form` | 报表和表单页面在同一页面中包含报表和表单。此类页面最常见的用法是当你需要在一页中输入搜索参数，并让搜索结果显示在同一页面中时。在这种情况下，可以通过表单组件输入搜索参数，搜索结果将显示在页面的报表组件中。
    |

