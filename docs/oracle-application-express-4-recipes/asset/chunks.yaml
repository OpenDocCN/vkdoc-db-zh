    \ Tabs` tab, and click the little Add button highlighted in [Figure 10-34](#Chapter10.html#fig_10_34).\n\
    \n    ![images](images/1034.jpg)\n\n    ***Figure 10-34.** Adding a new tab*\n\
    \n8.  Specify “`Book catalogTabs`” for the new tabset name, and skip the next\
    \ few steps until you arrive at the “`Tab Name`” step of the wizard.\n9.  Specify\
    \ “`Store`” as the tab label, as shown in [Figure 10-35](#Chapter10.html#fig_10_35).\n\
    \n    ![images](images/1035.jpg)\n\n    ***Figure 10-35.** Creating the Store\
    \ tab*\n\n10.  Click the `Next` button. Now you'll be able to specify the page\
    \ that is associated with this tab. Choose the My Mini Book catalog page by clicking\
    \ the arrow highlighted in [Figure 10-36](#Chapter10.html#fig_10_36).\n\n    ![images](images/1036.jpg)\n\
    \n    ***Figure 10-36.** Choosing the associated page for the tab*\n\n11.  Complete\
    \ the rest of the wizard using the default settings provided.\n12.  You should\
    \ see your newly created tab displayed in the screen shown in [Figure 10-37](#Chapter10.html#fig_10_37).\n\
    \n    ![images](images/1037.jpg)\n\n    ***Figure 10-37.** The newly created Store\
    \ tab*\n\n13.  Add another tab, and label it “`Administration`”.\n14.  When you\
    \ are prompted to provide the page associated with this tab, choose the Central\
    \ Administration (“`Administration`”) page.\n15.  Complete the rest of the wizard\
    \ using the default settings.\n16.  Now run your application again. You will see\
    \ two tabs at the top of your application, as shown in [Figure 10-38](#Chapter10.html#fig_10_38).\
    \ One will bring you to the catalog front end page and the other will bring you\
    \ to the Central Administration page.\n\n    ![images](images/1038.jpg)\n\n  \
    \  ***Figure 10-38.** The final book catalog site with tabs*\n\n#### How It Works\n\
    \nAPEX takes away most of the work of visual representation of a tab from the\
    \ developer. Once you associate a tab with a particular page, APEX will automatically\
    \ highlight the tab for you (when you are on the page) and unhighlight the other\
    \ tabs.\n\nTabs, like navigation lists, are also reusable throughout the application\
    \ and provide the same benefit of easier maintenance: when a new tab needs to\
    \ be added, just add it to an existing tabset, and voila! The new tab will instantly\
    \ appear on every page in your application.\n\n## Index\n\n### ![images](images/square.jpg)\
    \ Special Characters & Numbers\n\n# symbol\n\nsubstitution strings, [113](#Chapter04.html#page_113)\n\
    \n3D pie charts\n\nvisualizing data in Dashboard page, [171](#Chapter05.html#page_171)\n\
    \nvisualizing data in graphical charts, [147](#Chapter05.html#page_147), [148](#Chapter05.html#page_148)\n\
    \n3D Stacked Column chart type\n\ncreating multi-series chart, [154](#Chapter05.html#page_154)\n\
    \n8080 port\n\nURL explained, [277](#Chapter09.html#page_277)"
  trans: "\n#### 解决方案\n\n首先，您必须设置一个导航列表。为此，请按照以下步骤操作：\n\n1.  在同一个 `Book catalog` 应用程序中，点击\
    \ `Shared Components` 图标。\n2.  在 `Navigation` 区域，点击 图 10-27 所示的 `Lists` 链接。\n\n\
    \    ![images](img/1027.jpg)\n\n    ***图 10-27.** Lists 链接*\n\n3.  点击右上角的 `Create`\
    \ 按钮，创建一个新的导航列表。\n4.  在向导的第一步，将导航列表命名为 \"`AdministrationOptions`\"。\n5.  在向导的下一步，创建以下四个条目：\n\
    \    *   Book Categories\n    *   Inventory & Stockcount\n    *   Books Listing\n\
    \    *   Stockcount by Genre report\n6.  通过点击每个 `Target Page ID or Custom URL`\
    \ 框旁边的小箭头图标，并从弹出窗口中选择要链接到的正确页面，将每个项目绑定到其各自的报表页面。如 图 10-28 所示。\n\n    ![images](img/1028.jpg)\n\
    \n    ***图 10-28.** 设置导航列表*\n\n7.  完成后，完成向导以创建列表。\n\n现在您已经创建了导航列表，需要将其托管在一个页面内——即中央管理页面。要设置此页面，请按照以下步骤操作：\n\
    \n1.  在同一个 `Book catalog` 应用程序中，创建一个新的空白页面。\n2.  指定 \"`Administration`\" 作为页面名称。\n\
    3.  使用默认设置完成向导的其余步骤，以创建一个空白页面。\n4.  选择编辑该页面。\n5.  在 `Page Rendering` 区域，右键单击 `Regions`\
    \ 节点，并选择创建新区域。\n6.  选择 List 区域类型，如 图 10-29 所示。\n\n    ![images](img/1029.jpg)\n\
    \n    ***图 10-29.** 创建 List 区域*\n\n7.  将 \"`Please pick an option below`\" 设置为该区域的标题。\n\
    8.  在向导的 `Source` 步骤中，选择您之前创建的 `AdministrationOptions` 列表，如 图 10-30 所示。\n\n  \
    \  ![images](img/1030.jpg)\n\n    ***图 10-30.** 为区域选择 AdministrationOptions 列表*\n\
    \n9.  点击 `Create List Region` 按钮完成向导。\n10. 现在运行该页面。您应该会看到指向各个管理页面的各种链接，如 图 10-31\
    \ 所示。尝试点击每个链接以确保您能跳转到正确的页面。\n\n    ![images](img/1031.jpg)\n\n    ***图 10-31.**\
    \ 运行中的中央管理页面*\n\n#### 工作原理\n\n导航列表提供了一种简单的方法来设置一组链接，这些链接可以直接显示（如本方案所示），甚至可以托管在下拉菜单中。\n\
    \n设置导航列表实际上还有一个附带好处。一旦设置好，它可以在应用程序中被多次重用。这可以简化您应用程序未来的维护工作。例如，当需要删除一个链接时，您不必遍历应用程序中的每个位置去删除该链接。您只需将其从导航列表中移除，所有使用该导航列表的区域都会立即更新。\n\
    \n### 10-7. 在您的应用程序中创建标签页\n\n#### 问题\n\n您有一个中央管理页面——这很好。但是您如何从您的主目录页面（即前端目录页面）导航到那里呢？您意识到您需要标签页。\n\
    \n#### 解决方案\n\n要在您的应用程序中创建标签页，请按照以下步骤操作：\n\n1.  在同一个 `Book catalog` 应用程序中，点击 `Shared\
    \ Components` 图标。\n2.  在 `Navigation` 区域下，点击 图 10-32 所示的 `Tabs` 链接。\n\n    ![images](img/1032.jpg)\n\
    \n    ***图 10-32.** 导航区域中的 Tabs 链接*\n\n3.  在随后出现的页面上，点击右上角的 `Manage Tabs` 按钮。\n\
    4.  点击 `Edit Standard Tabs` 选项卡。\n5.  从此列表中移除所有现有的标签页（如果存在条目，请点击 `Edit` 图标，然后在后续页面点击\
    \ `Delete` 图标）。\n6.  您现在应该看到如 图 10-33 所示的屏幕。\n\n    ![images](img/1033.jpg)\n\n\
    \    ***图 10-33.** 移除所有标准标签页*\n\n7.  现在点击 `Manage Tabs` 选项卡，然后点击 图 10-34 中高亮显示的小添加按钮。\n\
    \n    ![images](img/1034.jpg)\n\n    ***图 10-34.** 添加新标签页*\n\n8.  为新标签集指定名称 \"\
    `Book catalogTabs`\"，并跳过接下来的几个步骤，直到到达向导的 \"`Tab Name`\" 步骤。\n9.  指定 \"`Store`\"\
    \ 作为标签页标签，如 图 10-35 所示。\n\n    ![images](img/1035.jpg)\n\n    ***图 10-35.** 创建\
    \ Store 标签页*\n\n10. 点击 `Next` 按钮。现在您将能够指定与此标签页关联的页面。通过点击 图 10-36 中高亮显示的箭头，选择 My\
    \ Mini Book catalog 页面。\n\n    ![images](img/1036.jpg)\n\n    ***图 10-36.** 为标签页选择关联的页面*\n\
    \n11. 使用提供的默认设置完成向导的其余部分。\n12. 您应该会看到您新创建的标签页显示在如 图 10-37 所示的屏幕上。\n\n    ![images](img/1037.jpg)\n\
    \n    ***图 10-37.** 新创建的 Store 标签页*\n\n13. 添加另一个标签页，并将其标记为 \"`Administration`\"\
    。\n14. 当系统提示您提供与此标签页关联的页面时，选择中央管理（\"`Administration`\"）页面。\n15. 使用默认设置完成向导的其余部分。\n\
    16. 现在再次运行您的应用程序。您将在应用程序顶部看到两个标签页，如 图 10-38 所示。一个将带您到目录前端页面，另一个将带您到中央管理页面。\n\n\
    \    ![images](img/1038.jpg)\n\n    ***图 10-38.** 带有标签页的最终图书目录网站*\n\n#### 工作原理\n\
    \nAPEX 为开发人员承担了大部分标签页视觉表示的工作。一旦您将标签页与特定页面关联起来，APEX 会自动为您高亮显示该标签页（当您位于该页面时），并取消高亮其他标签页。\n\
    \n与导航列表类似，标签页也可以在整个应用程序中重用，并提供相同的易于维护的好处：当需要添加新标签页时，只需将其添加到现有的标签集中，瞧！新标签页会立即出现在应用程序的每个页面上。\n\
    \n## 索引\n\n### ![images](img/square.jpg) 特殊字符与数字\n\n# 符号\n\n替换字符串, 113\n\n3D 饼图\n\
    \n在仪表板页面中可视化数据, 171\n\n在图形图表中可视化数据, 147, 148\n\n3D 堆积柱形图图表类型\n\n创建多系列图表, 154\n\
    \n8080 端口\n\nURL 解释, 277\n"
