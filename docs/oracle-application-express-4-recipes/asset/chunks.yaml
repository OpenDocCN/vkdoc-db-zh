    \n2.  创建 `Inventory` 表如下：\n    ```sql\n    CREATE TABLE  \"INVENTORY\"\n     \
    \  (    \"ID\" NVARCHAR2(255),\n            \"BOOKID\" NVARCHAR2(255),\n     \
    \       \"COPIESINSTOCK\" NUMBER(9,3),\n             CONSTRAINT \"INVENTORY_PK\"\
    \ PRIMARY KEY (\"ID\") ENABLE\n       )\n    /\n    ```\n    ```sql\n    INSERT\
    \ INTO INVENTORY(ID,BOOKID,COPIESINSTOCK) VALUES('1','B1',10)\n    /\n    ```\n\
    \    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK) VALUES('2','B2',15)\n\
    \    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('3','B3',1)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('4','B4',6)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('5','B5',17)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('6','B6',9)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('7','B7',14)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('8','B8',9)\n    /\n    ```\n\n3.  创建 `Category` 表如下：\n    ```sql\n \
    \   CREATE TABLE  \"CATEGORY\"\n       (    \"CATEGORYID\" NVARCHAR2(255),\n \
    \           \"CATEGORYNAME\" NVARCHAR2(255),\n            \"DESCRIPTION\" NVARCHAR2(255),\n\
    \             CONSTRAINT \"CATEGORY_PK\" PRIMARY KEY (\"CATEGORYID\") ENABLE\n\
    \       )\n    /\n    ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME,\
    \ DESCRIPTION) VALUES('C1','FICTION','Fiction\n        selection')\n    /\n  \
    \  ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION)\n\
    \        VALUES('C2','SCIENCEFICTION','Science Fiction Selection')\n    /\n  \
    \  ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION)\
    \ VALUES('C3','COMPUTERS','Computer\n        Books Selection')\n    /\n    ```\n\
    \    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION) VALUES('C4','HORROR','Best\
    \ Horror\n        Selections')\n    /\n    ```\n\n#### 工作原理\n\n`Books` 表是主表，存储图书目录中的书籍列表；`Inventory`\
    \ 表存储每本可用书籍的库存数量；`Category` 表存储目录中可用的完整图书类别（流派）列表。表 10-1 描述了各个相应表中各种键之间的映射关系。\n\
    \n**表 10-1.** 图书目录应用程序中不同表之间的外键映射\n\n| **外键映射** | **描述** |\n| --- | --- |\n| `Books.BookID\
    \ = Inventory.BookID` | 每本书在 Inventory 表中都有一个对应的条目，用于存储该书的库存数量详情。 |\n| `Books.BookCategory\
    \ = Category.CategoryID` | 每本书属于一个流派/类别，其详细信息存储在 Category 表中。存储在 `Books.BookCategory`\
    \ 列中的 ID 用于查找 `Category` 表中的对应条目。 |\n\n### 10-2. 创建页面以管理书籍列表\n\n#### 问题\n\n店主需要一种管理其图书目录中书籍列表的方法。"
- fmt: "## Solution\n\nYou must first create the forms that allow the storekeeper\
    \ to add, edit, and delete book titles in the book catalog.\n\nTo create the page\
    \ that allows the storekeeper to add/edit/delete books, please follow these instructions:\n\
    \n1.  Create a new `Database` application named `Book catalog`.\n2.  During the\
    \ `Pages` step of the Create Application wizard, choose the `Report and Form`\
    \ page type linked to the `Books` table, as shown in [Figure 10-1](#Chapter10.html#fig_10_1).\n\
    \n![images](images/1001.jpg)\n\n**Figure 10-1.** Adding a Report and Form\n\n\
    3.  Click the `Add Page` button to add the form and report. After doing so, finish\
    \ the wizard to create the application.\n4.  You should now have the screen shown\
    \ in [Figure 10-2](#Chapter10.html#fig_10_2).\n\n![images](images/1002.jpg)\n\n\
    **Figure 10-2.** The current list of pages in your application\n\n5.  If you launch\
    \ the main Books form, you should see the screen shown in [Figure 10-3](#Chapter10.html#fig_10_3).\n\
    \n![images](images/1003.jpg)\n\n**Figure 10-3.** The book details entry form\n\
    \n6.  The book details entry form from [Figure 10-3](#Chapter10.html#fig_10_3)\
    \ lets the storekeeper add a new book to the book catalog, but the form is not\
    \ complete yet. The `BookCategory` field should show a drop-down list of categories\
    \ so that the storekeeper can pick from a list of categories instead of manually\
    \ typing in the category code.\n7.  Edit the form. In the `Page Rendering` section,\
    \ right-click the `P1_BOOKCATEGORY` field, and choose to edit the field (as shown\
    \ in [Figure 10-4](#Chapter10.html#fig_10_4)).\n\n![images](images/1004.jpg)\n\
    \n**Figure 10-4.** Editing the Book Category field\n\n8.  In the Field Properties\
    \ page, change the `Display As` field from `Text Field` to `Select List`, as shown\
    \ in [Figure 10-5](#Chapter10.html#fig_10_5).\n\n![images](images/1005.jpg)\n\n\
    **Figure 10-5.** Changing the Display As field\n\n9.  Scroll down to the `List\
    \ Of Values` area, and specify the following SQL:\n    ```sql\n    SELECT Description,\
    \ CategoryID FROM Category\n    ```\n10. You should now have the screen shown\
    \ in [Figure 10-6](#Chapter10.html#fig_10_6).\n\n![images](images/1006.jpg)\n\n\
    **Figure 10-6.** Specifying the SQL for the list of values area\n\n11. Save your\
    \ changes and run the form. You should be able to select the book category from\
    \ a list of values, as shown in [Figure 10-7](#Chapter10.html#fig_10_7).\n\n![images](images/1007.jpg)\n\
    \n**Figure 10-7.** The book category selection list in action\n\n12. Let's turn\
    \ to the report that was generated earlier. When you run the report in the application,\
    \ you should see the list of books shown in [Figure 10-8](#Chapter10.html#fig_10_8).\n\
    \n![images](images/1008.jpg)\n\n**Figure 10-8.** List of books\n\n13. There's\
    \ still one last thing to do at this point, which is to change the `BookCategory`\
    \ column so that it displays the full category description instead of the category\
    \ code. To do so, edit the report.\n\n![images](images/square.jpg) **Tip** You\
    \ might also want to change the heading of the report columns to display a more\
    \ user friendly/readable title. You can do so by editing the report column and\
    \ changing the `Column Heading` field.\n\n14. In the `Page Rendering` area of\
    \ the report, right click on the `Books` node, and choose the `Edit` link (as\
    \ shown in [Figure 10-9](#Chapter10.html#fig_10_9)).\n\n![images](images/1009.jpg)\n\
    \n**Figure 10-9.** Editing the Books region\n\n15. Scroll down to the source of\
    \ the report, and change the existing SQL to the following:\n    ```sql\n    select\n\
    \      \"BOOKID\",\n      \"BOOKTITLE\",\n      \"CATEGORY\".\"DESCRIPTION\" \"\
    BOOKCATEGORY\",\n      \"BOOKISBN\",\n      \"BOOKPUBLISHER\",\n      \"BOOKEDITION\"\
    ,\n      \"BOOKDESCRIPTION\",\n      \"BOOKPRICE\",\n      \"AUTHOR\",\n     \
    \ dbms_lob.getlength(\"BOOKIMAGE\") \"BOOKIMAGE\"\n    from \"BOOKS\" LEFT JOIN\
    \ \"CATEGORY\" ON \"BOOKS\".\"BOOKCATEGORY\" = \"CATEGORY\".\"CATEGORYID\"\n \
    \   ```\n16. You should now have the screen shown in [Figure 10-10](#Chapter10.html#fig_10_10).\n\
    \n![images](images/1010.jpg)\n\n**Figure 10-10.** Changing the SQL for the region\
    \ source\n\n17. Apply the changes and run the report again. Note that the report\
    \ displays the full category name instead of the category code, as shown in [Figure\
    \ 10-11](#Chapter10.html#fig_10_11).\n\n![images](images/1011.jpg)\n\n**Figure\
    \ 10-11.** The full category name of the book displayed in the report\n\n18. Try\
    \ uploading book photos through your newly created form/report. In the report,\
    \ edit a book by clicking the edit icon at the far left of each row.\n19. Browse\
    \ for an image of the book and upload it through the form, as shown in [Figure\
    \ 10-12](#Chapter10.html#fig_10_12). Save all changes to the record.\n\n![images](images/1012.jpg)\n\
    \n**Figure 10-12.** Uploading a book image\n\n20. To confirm that the image was\
    \ successfully uploaded, edit the record again; this time you see a `Download`\
    \ link next to the control. Clicking the download link will bring you to the uploaded\
    \ image file shown in [Figure 10-13](#Chapter10.html#fig_10_13).\n\n![images](images/1013.jpg)\n\
    \n**Figure 10-13.** Sample book image\n\n21. Upload your own photos for all the\
    \ other books in the `Books` table.\n\n## How It Works\n\nAs demonstrated in the\
    \ earlier chapters of this book, APEX lets you easily create a form and report\
    \ combination from a database table. This, in turn, allows you to easily and quickly\
    \ setup CRUD (Create, Read, Update and Delete) functionality in your application.\n\
    \nAlso covered in the previous chapters of this book was the use of List of Values\
    \ (LOVs) dynamically generated from a specified SQL statement. LOVs can be used\
    \ as the data source for Select Lists (drop-downs), as seen in this recipe.\n\n\
    ## Exercise 10-1: Create Pages to Manage the List of Categories and Book Inventory\n\
    \nAs an exercise, I leave it to you to create the form and report pages to manage\
    \ the list of different categories as well as book inventory in the book catalog\
    \ application. The approach is similar to the steps outlined in this recipe. Use\
    \ the `Category` and `Inventory` tables as the base for these pages.\n\nTo verify\
    \ if what you've done is correct, you should have the List of Categories report\
    \ shown next. This will provide the storekeeper an interface to manage the list\
    \ of available book categories in the book catalog.\n\n![images](images/p296-01.jpg)\n\
    \nFor the inventory report, you should eventually have the report shown next.\
    \ To display the book title in place of the Book ID in the report, you can use\
    \ the following SQL:\n\n```sql\nselect \"ID\",\n  \"BOOKS\".\"BOOKTITLE\" \"BOOKID\"\
    ,\n  \"COPIESINSTOCK\"\nfrom \"#OWNER#\".\"INVENTORY\" LEFT JOIN \"BOOKS\" ON\
    \ \"INVENTORY\".\"BOOKID\"= \"BOOKS\".\"BOOKID\"\n```\n\n![images](images/p297-01.jpg)\n\
    \nThe Inventory report and form will allow the storekeeper to manage (and view)\
    \ the number of copies of each book in stock in the book catalog.\n\n### 10-3.\
    \ Setting Up the Book Catalog Front End\n\n## Problem\n\nYou completed the bulk\
    \ of the catalog back end in Recipe 10-2. Now you need the accompanying front-end\
    \ portal that displays the list of books available in the catalog to the public,\
    \ in a typical online book catalog format."
