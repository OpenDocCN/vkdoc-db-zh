    | `高亮显示` | 最终用户可以选择根据某些条件动态高亮显示行（例如，将金额大于 $10,000 的所有发票记录以红色高亮显示）。 |

    | `创建计算列` | 最终用户可以动态创建由现有列中的数据计算得出的附加列。最终用户可以定义非常复杂的公式来执行此计算。 |

    | `图表` | 最终用户可以动态创建报表中现有数据的图表视图。只需点击几下，最终用户就可以创建一个复杂的饼图，例如，来可视化报表中的数据。 |

    | `聚合` | 最终用户可以使用聚合函数（例如，求和），该函数计算报表中某一列所有数据的聚合值，并将其显示在列的底部。这可以与分组结合使用。 |


    ### 2-3. 更改表单中的字段项类型


    #### 问题


    您需要将表单上几个字段的项目类型从文本区域更改为单行文本框。'
- fmt: "## Solution\n\nTo change the field type of a text area to a single-line text\
    \ box, follow these steps:\n\n1.  Navigate to the application home and click the\
    \ `Form on CUSTOMERS` form. This will display the page configuration area. In\
    \ the `Page Rendering` section, expand the `Regions` → `Body (3)` → `Form on Customers`\
    \ → `Items` node and double-click the field you would like to modify (see [Figure\
    \ 2-20](#Chapter02.html#fig_2_20)).\n\n    ![images](images/0220.jpg)\n\n    Figure\
    \ 2-20. The field setting on the form\n\n2.  In the `Edit Page Item` page, change\
    \ the field type of the field from `Textarea` to a `Text Field` (as shown in [Figure\
    \ 2-21](#Chapter02.html#fig_2_21)).\n\n    ![images](images/0221.jpg)\n\n    Figure\
    \ 2-21. The field settings page\n\n3.  Click the `Apply Changes` button. Run the\
    \ application and open the `My List of Customers` page. Choose to create a new\
    \ record. In the form page, you should be able to observe that the field type\
    \ of your field has changed accordingly (shown in [Figure 2-22](#Chapter02.html#fig_2_22)).\n\
    \n    ![images](images/0222.jpg)\n\n    Figure 2-22. The reflected changes in\
    \ the Form on CUSTOMERS form\n\n## How It Works\n\nThe `Page Rendering` section\
    \ provides an overview of the back-end wiring of each page. It lists every field\
    \ used on the form and provides tools to manipulate every aspect of the fields\
    \ from visual layout to validation behavior.\n\n### 2-4. Selecting from a List\
    \ of Values in a Form\n\n#### Problem\n\nYou need to create a List of Values (LOV)\
    \ as a drop-down list for the `Country` field in the Customers form. This LOV\
    \ must be dynamic and should be managed in a separate table.\n\n#### Solution\n\
    \nHere's how to create a form field allowing users to select from a LOV:\n\n1.\
    \  Using the `Object Browser` tool in the `SQL Workshop`, create a new table named\
    \ `Countries` with two columns: `CountryName` and `Remarks`. Insert some sample\
    \ data into the tables; for example, create records for `Japan`, `US`, and `Singapore`\
    \ in the `CountryName` field.\n\n    ![images](images/square.jpg) **Tip** Recipe\
    \ 2-1 describes how to use the `Object Browser` tool to create tables.\n\n2. \
    \ Navigate to the application home and click the `Form on CUSTOMERS` form. This\
    \ will display the page configuration area. In the `Page Rendering` section, expand\
    \ the `Regions` → `Body (3)` → `Form on Customers` → `Items` node and double-click\
    \ the `Country` field.\n3.  In the ensuing page, change the `Display As` field\
    \ type to a `Select List`. This indicates a drop-down list. When you do this,\
    \ you will also notice that a new tab named `List of Values` will appear at the\
    \ top. Click on this tab.\n4.  In the ensuing page, click the `Create Dynamic\
    \ List of Values` link. This will launch a pop-up window that allows you to configure\
    \ the dynamic list. In the pop-up window, use the default table/view owner, and\
    \ click the `Next` button.\n5.  In the next page of the wizard, choose the `Countries`\
    \ table. Set `CountryName` as both the `Display` column and `Return Value`. Click\
    \ the `Next` and `Finish` buttons consecutively to complete the configuration.\
    \ You will see the generated SQL in the List of Values `definition` area (shown\
    \ in [Figure 2-23](#Chapter02.html#fig_2_23)).\n\n    ![images](images/0223.jpg)\n\
    \n    Figure 2-23. The generated SQL in the LOV definition area\n\n6.  Click the\
    \ `Displayed` tab, and set the `Height` to `1`. This will convert the select list\
    \ from a list box to a drop-down list.\n7.  Click the `Apply Changes` button.\
    \ Run the application, click the `My List of Customers` link, and choose to create\
    \ a new record. You will notice that the field for `Country` has changed to a\
    \ drop-down list containing the values stored in your `Countries` table (shown\
    \ in [Figure 2-24](#Chapter02.html#fig_2_24)).\n\n    ![images](images/0224.jpg)\n\
    \n    Figure 2-24. The Country drop-down list\n\n#### How It Works\n\nOracle APEX\
    \ provides five different types of controls that allow the user to pick from a\
    \ list of values. They are described in [Table 2-2](#Chapter02.html#tab_2_2).\n\
    \nTable 2-2. Item Types Providing LOV Functionality\n\n| Item Type | Description\
    \ |\n| --- | --- |\n| `Checkbox` | You can create multiple checkboxes (a checklist)\
    \ that users can tick on the form. The LOV area allows you to define the caption\
    \ and value of each checkbox. |\n| `Radio Group` | The `Radio Group` type allows\
    \ you to pick a single value from a list of values using radio buttons. The LOV\
    \ area allows you to define the caption and value of each radio button. |\n| `Popup\
    \ LOV` | The `Popup LOV` is a selection control where you can select a value from\
    \ a list in a pop-up window. |\n| `Select List` | A select list can take the appearance\
    \ of a list box (if the `Height` property is set to a value larger than 1) or\
    \ a drop-down list (if the `Height` property is set to 1). The LOV contained in\
    \ a `Select List` are defined in the LOV area. |\n| `Shuttle` | A shuttle basically\
    \ comprises two list boxes that allow you to shuttle (or add) items from one box\
    \ to the other. |\n\n### 2-5. Uploading and Downloading Files in a Form\n\n####\
    \ Problem\n\nYou need to let the user upload an attachment—a company profile (in\
    \ any file format)—along with each customer record.\n\n#### Solution\n\nHere's\
    \ how to create a file upload field in your form:\n\n1.  Using the `Object Browser`\
    \ tool in the `SQL Workshop`, add a new `BLOB` column to the `Customers` table,\
    \ and name the column `CompanyProfile`.\n2.  Navigate to the application home\
    \ and click the `Form on CUSTOMERS` form. This will display the page configuration\
    \ area. In the `Page Rendering` section, expand the `Regions` → `Body (3)` → `Form\
    \ on Customers` node and right-click the `Items` node. Choose the `Create Page\
    \ Item` menu item.\n3.  In the ensuing page, select the `File Browse` field type\
    \ and click `Next`. In the next page, change the `Item Name` to `P9_COMPANYPROFILE`.\
    \ Use the default settings for the rest of the pages in the wizard. After you\
    \ have created the page item, double-click on the item in the `Page Rendering`\
    \ section.\n4.  In the item configuration page, click the `Source` tab, and change\
    \ the `Source type` to `Database Column`. Set the `Source value or expression`\
    \ field to the name of your `BLOB` database field, `COMPANYPROFILE`. Click the\
    \ `Apply Changes` button to save your changes.\n5.  Now, run the application,\
    \ click the `My List of Customers` link, and choose to create a new record. You\
    \ will notice the new company profile field in the form. Click the `Browse` button\
    \ and select any text-based file in the file picker dialog (as shown in [Figure\
    \ 2-25](#Chapter02.html#fig_2_25)). Click the `Create` button in the top right\
    \ corner to save the record. The contents of the file will be written into the\
    \ `BLOB` column.\n\n    ![images](images/0225.jpg)\n\n    Figure 2-25. The Company\
    \ Profile file upload field in action\n\n6.  Now try to edit the record you have\
    \ just created. In the form window, you will be able to see a little `Download`\
    \ link next to the file upload control. Click the `Download` link to download\
    \ the contents of the file (as shown in [Figure 2-26](#Chapter02.html#fig_2_26)).\n\
    \n    ![images](images/0226.jpg)\n\n    Figure 2-26. Downloading data from a BLOB\
    \ field\n\n#### How It Works\n\nWhen you use the `BLOB` field to store your file\
    \ attachments, the content of your file attachments are stored in the `BLOB` field\
    \ after an upload is made via an APEX form. Likewise, when a download is initiated,\
    \ the contents of the `BLOB` field are downloaded to the client browser.\n\n###\
    \ 2-6. Using Tabular Forms to Speed Up Data Entry\n\n#### Problem\n\nYou have\
    \ lots of data to key into your application. You need a better and faster way\
    \ to edit and insert data records."
