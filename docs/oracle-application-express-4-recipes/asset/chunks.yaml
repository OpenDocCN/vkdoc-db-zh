    \ USER FLOWS_030000 CASCADE`\n\nYou will then need to resolve the errors in the\
    \ log file before running the installation again.\n\n![images](images/square.jpg)\
    \ **Tip** The log file names carry the format `Install<YYYY-MM-DD><HH24-MI-SS>.log`\n\
    \n10.  If there are no errors in the installation, logon to SQL*Plus again as\
    \ SYSDBA and load the APEX images into the Oracle database by running the following\
    \ statement:\n\n`@apxldimg.sql C:\\APEXFILES`\n\nYou should see the output shown\
    \ in [Figure 1-4](#Chapter01.html#fig_1_4).\n\n![images](images/0104.jpg)\n\n\
    ***Figure 1-4.** Apxldimg.sql output*\n\n![images](images/square.jpg) **Note**\
    \ When running this step, ensure that the path provided points to the parent folder\
    \ and not the folder where you unzipped your APEX installation files. The `apxldimg`\
    \ script will append the `\\APEX` suffix to your path."
