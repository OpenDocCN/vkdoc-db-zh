    7.  在打开的窗口中，单击“定义”选项卡，并将按钮的类更改为“specialstyle”，如图 4-7 所示。\n\n    ![images](img/0407.jpg)\n\
    \n    **图 4-7.** 引用 `specialstyle` 样式\n\n8.  保存更改并运行表单。您现在应该看到表单上的按钮为红色，如样式表类中所声明（参见图\
    \ 4-8）。\n\n    ![images](img/0408.jpg)\n\n    **图 4-8.** 应用在表单上的 `specialstyle`\
    \ 样式\n\n#### 工作原理\n\n如果您需要快速声明一些样式表类并在表单中使用它们（而无需在其他表单中重用这些类），声明它们的好地方是在“HTML\
    \ 头部和正文属性”部分下，如本食谱前面所见。您在此部分中输入的任何内容都会按原样呈现在 APEX 生成的网页顶部。\n\n声明后，您可以通过样式类的名称直接引用这些样式。\n\
    \n![images](img/square.jpg) **注意** 通过将样式表类放在 HTML 头部和正文属性部分，您使其仅对该表单可用，而对应用程序中的其他表单不可用。要创建可在整个应用程序或工作区中全局使用的样式集，请考虑改用自定义\
    \ CSS 文件（在食谱 4-3 中介绍）。\n\n### 4-3. 使用自定义 CSS 文件\n\n#### 问题\n\n您有大量存储在 `.css` 文件中的样式表类，并且需要在应用程序中引用此\
    \ CSS 文件，以便可以将自定义样式应用于表单上的某些元素。\n"
- fmt: "#### Solution\n\nTo use a custom CSS file, follow these steps:\n\n1.  Create\
    \ a new CSS file (using Notepad or any other editor tool) with the text shown\
    \ in [Listing 4-2](#Chapter04.html#list_4_2).\n\n    `Listing 4-2. A Sample CSS\
    \ File`\n    ```css\n    .buttonstyle_incss\n    {\n      font-family : Verdana;\n\
    \      color : #FFFFFF;\n      font-weight : bold;\n      text-align :left ;\n\
    \      vertical-align : middle;\n      width:150px;\n      height:25px;\n    \
    \  background-color:#000000;\n    }\n    ```\n2.  Click on an existing application\
    \ in the Application Builder.\n3.  Click the `Shared Components` icon. In the\
    \ ensuing page, click the `Cascading Style Sheets` link under the `Files` section.\n\
    4.  Click the `Create` button to add a new style sheet to your application. In\
    \ the ensuing page, browse for your `.CSS` file and click the yellow `Upload`\
    \ button in the top right corner.\n5.  You should now see your CSS file, as shown\
    \ in [Figure 4-9](#Chapter04.html#fig_4_9).\n\n    ![images](images/0409.jpg)\n\
    \n    `Figure 4-9. The newly uploaded myclass.css file`\n\n6.  Navigate to the\
    \ Page Definition area of your form. Right click on the root form node and choose\
    \ the `Edit` menu item.\n7.  In the ensuing page, click the `HTML Header and Body\
    \ Attribute` tab. In the `HTML Header` textbox, type the following code, substituting\
    \ `myclass.css` with the name of your uploaded css class. Take care to note that\
    \ the class name is case sensitive.\n    ```html\n    <link href=\"#WORKSPACE_IMAGES#myclass.css\"\
    \ rel=\"stylesheet\" type=\"text/css\" />\n    ```\n8.  You should now have the\
    \ screen shown in [Figure 4-10](#Chapter04.html#fig_4_10).\n\n    ![images](images/0410.jpg)\n\
    \n    `Figure 4-10. Referencing the myclass.css file`\n\n9.  Save your changes\
    \ and return to the `Page Definition` area of your form. In the `Shared Components`\
    \ section, expand `Templates` ![images](images/U001.jpg) `Button`, right-click\
    \ on the deepest `Button` node, and choose the `Edit` menu item.\n10. Click the\
    \ `Definition` tab in the ensuing page, and set the `Class` property of the button\
    \ to the name of your class in the CSS stylesheet: `buttonstyle_incss`. You should\
    \ have the screen shown in [Figure 4-11](#Chapter04.html#fig_4_11).\n\n    ![images](images/0411.jpg)\n\
    \n    `Figure 4-11. Referencing the buttonstyle_incss style in your CSS file`\n\
    \n11. Save your changes and run the form. The buttons on your form have taken\
    \ on the white-font-on-black-background style defined in your attached CSS file,\
    \ as shown in [Figure 4-12](#Chapter04.html#fig_4_12).\n\n    ![images](images/0412.jpg)\n\
    \n    `Figure 4-12. The CSS file applied on your form`\n\n#### How It Works\n\n\
    CSS files are also treated as resources in APEX. You can upload a CSS file globally\
    \ and reuse it in any application in a workspace. Just like standard web application\
    \ development, you have to declare the CSS file before you can use any of the\
    \ styles inside. You can do so by including the standard HTML declaration for\
    \ CSS files in the `HTML Header and Body Attributes` section of the form, like\
    \ so:\n\n`<link href=\"#WORKSPACE_IMAGES#myclass.css\" rel=\"stylesheet\" type=\"\
    text/css\" />`\n\n![images](images/square.jpg) **Note** The `href` property of\
    \ the HTML declaration needs an actual path to the CSS file, so you need to include\
    \ the `#WORKSPACE_IMAGES#` substitution string to tell APEX where to look for\
    \ it.\n\n### 4-4. Creating a New Theme in Your Application\n\n#### Problem\n\n\
    You like your new white-font-on-black-background button, so much so that you want\
    \ this button to be the de facto standard for all your other applications. You\
    \ wish to create a special theme that includes this button as a default, so that\
    \ the theme can be easily reused by developers for other applications.\n\n####\
    \ Solution\n\nTo use a new theme, you must first create the theme, and then switch\
    \ the application theme to your new theme.\n\n##### Creating a New Theme\n\nTo\
    \ create a new theme, follow these steps:\n\n1.  Click on an existing application\
    \ in the Application Builder.\n2.  Click on the `Shared Components` icon, and\
    \ click on the `Themes` link inside the `User Interface` section (as shown in\
    \ [Figure 4-13](#Chapter04.html#fig_4_13)).\n\n    ![images](images/0413.jpg)\n\
    \n    `Figure 4-13. The Themes link in the User Interface area`\n\n3.  In the\
    \ ensuing window, click the `Create` button to start the Theme Creation wizard.\n\
    4.  In the first step of the wizard, choose to create the theme `from the repository`.\n\
    5.  Next, choose a theme from the list of themes (choose any theme you wish).\
    \ Finally, click the `Create` button to create the theme.\n6.  You should now\
    \ see your newly created theme in the `Themes` area, as shown in [Figure 4-14](#Chapter04.html#fig_4_14).\
    \ I chose the `Theme 8 (Orange)` theme.\n\n    ![images](images/0414.jpg)\n\n\
    \    `Figure 4-14. The newly created theme (Theme 8 (Orange) - 8)`\n\n7.  Now\
    \ that you have a theme, you need to modify it to include your custom button template.\
    \ Click on the theme. You should now see a screen that looks like [Figure 4-15](#Chapter04.html#fig_4_15).\n\
    \n    ![images](images/0415.jpg)\n\n    `Figure 4-15. The contents of a theme`\n\
    \n8.  In this screen, click the `Button` link in the `Button Type` section. In\
    \ the ensuing page, copy the button template from Recipe 4-3, and paste it in\
    \ the `Template` field under the `Definition` area. You should now have the screen\
    \ shown in [Figure 4-16](#Chapter04.html#fig_4_16). Save your changes.\n\n   \
    \ ![images](images/0416.jpg)\n\n    `Figure 4-16. Modifying the button template\
    \ in the theme`\n\n##### Switching the Application Theme\n\nTo switch your application\
    \ theme to the newly created theme, follow these steps:\n\n1.  Return to the `Shared\
    \ Components` section of your application. Under the same `User Interface` area,\
    \ click the `Themes` link again.\n2.  Click the `Switch Theme` button. You should\
    \ now see the screen shown in [Figure 4-17](#Chapter04.html#fig_4_17). Choose\
    \ to switch to your newly created theme.\n\n    ![images](images/0417.jpg)\n\n\
    \    `Figure 4-17. Switching the active theme of an application`\n\n3.  Navigate\
    \ to the next step of the wizard and confirm the theme switch. After you have\
    \ successfully switched the theme, a message stating so will be displayed. Now,\
    \ run your application one more time. You should see the new theme applied, together\
    \ with your custom white-font-on-black-background button template (as shown in\
    \ [Figure 4-18](#Chapter04.html#fig_4_18)).\n\n    ![images](images/0418.jpg)\n\
    \n    `Figure 4-18. The new theme applied on your form`\n\n#### How It Works\n\
    \nAs mentioned in Recipe 4-1, themes are collections of templates, and they are\
    \ a good way to manage your user interfaces. A theme includes a template for every\
    \ single type of user interface element in APEX. Themes allow you to easily skin\
    \ your application and to switch between them.\n\nYou can also easily create new\
    \ variations of a theme by making a duplicate copy of it in APEX and individually\
    \ modifying the templates contained inside.\n\n![images](images/square.jpg) **Note**\
    \ There are web sites that sell or provide APEX themes. ApexSkins is one such\
    \ site; go to [`www.apexskins.com`](http://www.apexskins.com).\n\n### 4-5. Modifying\
    \ Form Control Templates\n\n#### Problem\n\nYour application runs well. One day,\
    \ someone in the office deletes some important data by mistake. High-level politics\
    \ kick in, and your not-so-IT-savvy bosses decide it's a great idea to have all\
    \ buttons in your form prompt for an additional pop-up confirmation before doing\
    \ anything. Given that some of your existing forms have numerous buttons, and\
    \ it wouldn't be very fun changing your forms one button at a time, you look for\
    \ a faster alternative."
