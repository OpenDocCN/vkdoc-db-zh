    \ concerns usually center around three main areas: authentication, authorization,\
    \ and vulnerability exploits.\n\nAuthentication refers to the process of checking\
    \ if the user has rights to access (log in to) the application. This is usually\
    \ done through a username-password challenge. Authorization is the process of\
    \ specifying access rights for each user to a particular resource in the application.\
    \ For instance, an authorization scheme may permit a user to view a report but\
    \ not to delete it. Finally, security vulnerability exploits—events like SQL injection\
    \ attacks and cross-site scripting attacks—work on the premise of cleverly manipulating\
    \ input data so that it ends up being executed by your application.\n\nThe good\
    \ news is that APEX provides ample features and allocation to elegantly handle\
    \ all three concerns. In this chapter, you will learn how to beef up security\
    \ in your application.\n\n### 8-1. Creating Your Own Authentication Scheme\n\n\
    #### Problem\n\nYou have an existing database table containing the list of all\
    \ users in the organization, together with their passwords. This database table\
    \ is a custom table proprietary to your organization. You try to convince your\
    \ bosses to migrate the list of user accounts from the custom table into APEX,\
    \ but they insist that your application authenticate against this table instead\
    \ in real time.\n\nAnd so you embark on this task. You want to create a custom\
    \ authentication scheme to authenticate your APEX application against this external\
    \ database table."
  trans: "### 解决方案\n\n要启用区域缓存，请按照以下步骤操作：\n\n1.  登录 `APEX` 并打开任何包含表单的应用程序。（如需创建表单页面，请参阅配方\
    \ 2-1）。导航到表单页面的“页面渲染”视图。\n2.  展开“区域”节点，右键单击此节点下的任意区域。在弹出菜单中单击“编辑”菜单项。这将带您进入“区域定义”页面。\n\
    3.  单击“缓存”选项卡。将“缓存”下拉列表从“未缓存”更改为“已缓存”。\n4.  您将看到若干字段。将缓存的超时值（区域应保持缓存的时间）设置为 `1`\
    \ 小时，并将“缓存条件类型”设置为“始终”，如图 7-7 所示。\n\n    ![images](img/0707.jpg)\n\n    `图 7-7.`\
    \ 在页面区域中启用缓存\n\n5.  现在运行您的表单。如果您在区域页脚中包含 `#TIMING#` 统计信息，您会观察到连续运行时渲染区域所花费的时间减少了。\n\
    \n### 工作原理\n\n应用程序中的页面几乎不可避免地需要处理动态查询、Web 服务调用等。例如，如果您需要调用远程 Web 服务来获取水果列表以在某个区域显示，这将等同于大量的调用！想象一下，如果有\
    \ 2000 名用户加载此页面——这将产生 2000 次 Web 服务调用。\n\n如果 Web 服务检索到的内容完全相同或很少更改（例如，分支机构联系电话），那么将这些信息缓存起来将是理想的选择，这样\
    \ Web 服务只需调用一次。然后，检索到的数据将存储在本地。当下一个用户请求相同数据时，它将从本地存储中获取，而不是再次调用 Web 服务。\n\n当您缓存一个区域时，您正是在做这件事。整个区域的静态\
    \ HTML（生成的内容）可以由 `APEX` 缓存，因此当下一个用户渲染该区域时，它将直接从本地缓存存储中获取静态 HTML。这节省了大量的处理周期，甚至可以显著减少网络流量（通过减少对物理上远程系统的动态调用次数）。您可以通过将“缓存”属性设置为\
    \ `true` 来选择缓存表单的特定区域。如果您希望始终应用缓存，请选择“始终”条件类型。\n\n您可以明确指定应从缓存中检索数据而不是进行动态渲染的条件。“缓存条件类型”下拉列表允许您指定此条件。例如，如果您正在创建一个在线礼品订购应用程序，您可能希望创建一个检查系统日期的条件，以便仅在十二月应用缓存，因为此时可以预期会有大量假日购物者访问。\n\
    \n## 7-5\\. 启用页面缓存\n\n### 问题\n\n您有一个主要由静态数据组成的页面。您希望提高此页面的渲染性能。\n\n### 解决方案\n\n\
    与区域缓存相反，页面缓存会缓存整个页面的静态 HTML。要启用页面缓存，请按照以下步骤操作：\n\n1.  登录 `APEX` 并打开任何包含表单的应用程序。（如需创建表单页面，请参阅配方\
    \ 2-1）。导航到表单页面的“页面渲染”视图。\n2.  右键单击根节点，并在弹出菜单中选择“编辑”菜单项。这将带您进入“页面定义”页面。\n3.  单击“缓存”选项卡。将“缓存”下拉列表从“否”更改为“是”。\n\
    4.  您现在应能将缓存的超时值（区域应保持缓存的时间）设置为 `1` 小时，并将“缓存条件类型”设置为“始终”，如图 7-8 所示。\n\n    ![images](img/0708.jpg)\n\
    \n    `图 7-8.` 在页面中启用缓存\n\n5.  现在运行您的表单。如果您使用“活动监控”工具检查页面的加权性能，您会观察到连续运行时渲染页面所花费的时间减少了。\n\
    \n### 工作原理\n\n缓存不仅适用于区域级别，也适用于页面级别。页面缓存与区域缓存的不同之处在于，它缓存整个页面的静态 HTML。如果您对页面的目标只是显示一些很少更改的静态信息，那么它非常适合进行页面缓存。\n\
    \n“按用户缓存”设置允许按用户缓存页面，而不是按会话缓存。区别在于，如果您按会话缓存页面，所有其他用户将使用缓存中的同一副本；而如果您按用户缓存页面，则只有首次访问该页面的相同用户再次访问时，才会从缓存中检索数据。\n\
    \n![images](img/square.jpg) **提示** 页面缓存的一个问题是，有时缓存页面的数据可能已经更改，而 `APEX` 仍在检索缓存副本。在这种情况下，根据某个事件使缓存失效可能是有益的。例如，您可以在用户退出应用程序后或在一段不活动时间后，使用\
    \ `APEX_UTIL.CLEAR_PAGE_CACHE(page_number);` 函数使缓存失效。\n\n## 第 8 章\n\n## 保护应用程序安全\n\
    \n您基于 `APEX` 构建的应用程序默认并不会神奇地防黑客。即使是像 `APEX` 这样严格的平台也存在一些安全问题。在 `APEX` 中，这些问题通常围绕三个主要领域：身份验证、授权和漏洞利用。\n\
    \n身份验证是指检查用户是否有权访问（登录）应用程序的过程。这通常通过用户名-密码质询来完成。授权是为每个用户指定对应用程序中特定资源访问权限的过程。例如，授权方案可能允许用户查看报告但不允许删除。最后，安全漏洞利用——例如\
    \ SQL 注入攻击和跨站脚本攻击——其工作前提是巧妙地操纵输入数据，使其最终由您的应用程序执行。\n\n好消息是，`APEX` 提供了充足的功能和分配来优雅地处理所有这三个问题。在本章中，您将学习如何加强应用程序的安全性。\n\
    \n### 8-1\\. 创建您自己的身份验证方案\n\n### 问题\n\n您有一个现有的数据库表，其中包含组织内所有用户的列表及其密码。此数据库表是您组织的专有自定义表。您试图说服您的上司将用户帐户列表从自定义表迁移到\
    \ `APEX` 中，但他们坚持要求您的应用程序针对此表进行实时身份验证。\n\n因此，您着手处理此任务。您希望创建一个自定义身份验证方案，以针对此外部数据库表对您的\
    \ `APEX` 应用程序进行身份验证。"
- fmt: "## Solution\n\n你的首要任务是创建本教程中使用的数据库对象。要创建 Custom Logins 表（及示例记录），请运行以下 SQL：\n\
    \n```sql\nCREATE TABLE \"CUSTOMLOGINS\"\n  (     \"USERID\" VARCHAR2(50),\n  \
    \      \"USERNAME\" VARCHAR2(255),\n        \"PASSWORD\" VARCHAR2(255),\n    \
    \     CONSTRAINT \"CUSTOMLOGINS_PK\" PRIMARY KEY (\"USERID\") ENABLE\n  )\n\n\
    INSERT INTO CUSTOMLOGINS(USERID,USERNAME,PASSWORD) VALUES('01','greg','1234')\n\
    /\nINSERT INTO CUSTOMLOGINS(USERID,USERNAME,PASSWORD) VALUES('02','zehoo','7890')\n\
    /\n```\n\n你的下一个任务是定义实际的认证函数本身。你将创建一个非常简单的认证函数，它仅检查指定的用户名和密码是否存在于表中。如果存在，则授予访问权限。要创建此函数，请打开\
    \ SQL 工作坊，并运行[清单 8-1](#Chapter08.html#list_8_1)中所示的 PL/SQL。\n\n`清单 8-1. 定义认证函数`\n\
    \n```sql\nCREATE OR REPLACE FUNCTION MyCustomAuthenticator (\n  p_username IN\
    \ VARCHAR2,\n  p_password IN VARCHAR2\n)\n  RETURN BOOLEAN\nIS\n  l_count NUMBER;\n\
    BEGIN\n   SELECT COUNT(*) into l_count from CUSTOMLOGINS WHERE Username=p_username\
    \ AND\n        Password=p_password;\n   IF l_count > 0 THEN\n      RETURN TRUE;\n\
    \   ELSE\n      RETURN FALSE;\n   END IF;\nEND;\n```\n\n你的下一个任务是定义一个新的认证方案。为此，请按照以下步骤操作：\n\
    \n1.  打开一个现有应用程序并单击 Shared Components 图标。\n2.  在 Security 部分下，单击 Authentication\
    \ Schemes 链接，如[图 8-1](#Chapter08.html#fig_8_1)所示高亮显示。\n\n    ![images](images/0801.jpg)\n\
    \n    `图 8-1. Authentication Schemes 链接`\n\n3.  在随之出现的页面中，单击 Create 按钮以创建新的认证方案。\n\
    4.  在向导的第一步中，选择从头开始创建方案。\n5.  在下一步中，将你的认证方案命名为 `MYCUSTOMAUTH_SCHEME`。\n6.  单击\
    \ Next 按钮，直到到达 Authentication Function 步骤。\n7.  在此屏幕中，选择 Use my custom function\
    \ to authenticate 选项。这将导致在选项底部出现一个 Authentication Function 文本框。\n8.  在文本框中键入以下文本：`return\
    \ MyCustomAuthenticator`。如[图 8-2](#Chapter08.html#fig_8_2)所示。\n\n    ![images](images/0802.jpg)\n\
    \n    `图 8-2. 定义认证函数调用`\n\n9.  使用提供的默认设置完成向导的其余部分。\n10. 回到 Authentication Schemes\
    \ 页面，你应该会看到新创建的认证方案。现在你需要将其设置为应用程序的当前认证方案。\n11. 在认证方案页面中，单击 Change Current 选项卡。从下拉列表中选择\
    \ `MYCUSTOMAUTH_SCHEME` 方案，如[图 8-3](#Chapter08.html#fig_8_3)所示。\n\n    ![images](images/0803.jpg)\n\
    \n    `图 8-3. 设置当前认证方案`\n\n12. 单击 Make Current 按钮以完成向导并进行更改。\n13. 现在运行应用程序中的登录表单。尝试输入随机的用户名和密码。你会发现无法登录应用程序，如[图\
    \ 8-4](#Chapter08.html#fig_8_4)所示。\n\n    ![images](images/0804.jpg)\n\n    `图\
    \ 8-4. 访问被拒绝`\n\n14. 但是，如果你指定用户名 `greg` 和密码 `1234`，你会发现可以成功登录应用程序。这证明登录页面现在使用的是你的自定义认证方案。\n\
    \n## How It Works\n\nAPEX 足够灵活，允许你修改应用程序底层的认证机制。本教程中所示的方法使用了一个非常简单的认证函数（在 PL/SQL\
    \ 中硬编码了用户名和密码）；然而，本教程的目的是让你了解如何将认证机制从 APEX 的默认设置切换到自定义设置。\n\n![images](images/square.jpg)\
    \ **注意** 使用 APEX 灵活的认证框架，你可以创建方案以针对 LDAP 存储进行认证，或者指定在你的应用程序中根本不进行认证。你可以在认证方案的属性区域更改这些设置。\n\
    \n让我们进一步了解 PL/SQL 认证函数是如何工作的。此函数的骨架描述在[清单 8-2](#Chapter08.html#list_8_2)中。\n\n\
    `清单 8-2. 认证函数骨架`\n\n```sql\nCREATE OR REPLACE FUNCTION AuthenticationFunction\
    \ (\n  p_username IN VARCHAR2,\n  p_password IN VARCHAR2\n)\n  RETURN BOOLEAN\n\
    AS\nBEGIN\n    /* Do your thing here and return TRUE if access should be granted\
    \ and\n       FALSE if access should be denied. */\nEND;\n```\n\n你可以修改此认证函数以执行你需要的任何操作。例如，你可以让该函数针对外部表运行一个\
    \ `SELECT` 查询，如果用户帐户存在，则从函数返回 `TRUE`。\n\n事实上，没有什么能阻止你针对存储在文本文件中的用户名或密码进行实时认证（尽管这样做可能是个相当糟糕的主意）。然而，这让你了解了在\
    \ APEX 灵活的认证方案框架下可以达到的极端程度。\n\n### 8-2. 定义用户访问权限\n\n#### 问题\n\n你有一个显示职位空缺记录列表的交互式报告。你希望允许\
    \ John 创建新的职位空缺记录，但不想给 Barry 相同的权限。换句话说，你需要为这个报告配置访问权限。"
  raw: "#### Solution\n\nYour first task is to create the database objects used in\
    \ this recipe. To create the Custom Logins table (and sample records), run the\
    \ following SQL:\n\n`CREATE TABLE \"CUSTOMLOGINS\"`\n`  (     \"USERID\" VARCHAR2(50),`\n\
    `        \"USERNAME\" VARCHAR2(255),`\n`        \"PASSWORD\" VARCHAR2(255),`\n\
    `         CONSTRAINT \"CUSTOMLOGINS_PK\" PRIMARY KEY (\"USERID\") ENABLE`\n`  )`\n\
    \n`INSERT INTO CUSTOMLOGINS(USERID,USERNAME,PASSWORD) VALUES('01','greg','1234')`\n\
    `/`\n`INSERT INTO CUSTOMLOGINS(USERID,USERNAME,PASSWORD) VALUES('02','zehoo','7890')`\n\
    `/`\n\nYour next task is to define the actual authentication function itself.\
    \ You will create a very simple authentication function that simply checks if\
    \ the specified username and password exists in the table. If they do, access\
    \ is granted. To create this function, open the SQL workshop, and run the PL/SQL\
    \ shown in [Listing 8-1](#Chapter08.html#list_8_1).\n\n***Listing 8-1.** Defining\
    \ the Authentication Function*\n\n`CREATE OR REPLACE FUNCTION MyCustomAuthenticator\
    \ (`\n`  p_username IN VARCHAR2,`\n`  p_password IN VARCHAR2`\n`)`\n`  RETURN\
    \ BOOLEAN`\n`IS`\n`  l_count NUMBER;`\n`BEGIN`\n`   SELECT COUNT(*) into l_count\
    \ from CUSTOMLOGINS WHERE Username=p_username AND`\n`        Password=p_password;`\n\
    `   IF l_count > 0 THEN`\n`      RETURN TRUE;`\n`   ELSE`\n`      RETURN FALSE;`\n\
    `   END IF;`\n`END;`\n\nYour next task will be to define a new authentication\
    \ scheme. To do so, follow these steps:\n\n1.  Open an existing application and\
    \ click the Shared Components icon.\n2.  Under the Security section, click on\
    \ the Authentication Schemes link, as highlighted in [Figure 8-1](#Chapter08.html#fig_8_1).\n\
    \n    ![images](images/0801.jpg)\n\n    ***Figure 8-1.** The Authentication Schemes\
    \ link*\n\n3.  In the ensuing page, click the Create button to create a new authentication\
    \ scheme.\n4.  In the first step of the wizard, choose to create the scheme from\
    \ scratch.\n5.  In the next step, name your authentication scheme MYCUSTOMAUTH_SCHEME.\n\
    6.  Click the Next button until you arrive at the Authentication Function step.\n\
    7.  In this screen, choose the Use my custom function to authenticate option.\
    \ This will cause an Authentication Function textbox to appear at the bottom of\
    \ the option.\n8.  Type the following text into the textbox: return MyCustomAuthenticator.\
    \ This is shown in [Figure 8-2](#Chapter08.html#fig_8_2).\n\n    ![images](images/0802.jpg)\n\
    \n    ***Figure 8-2.** Defining the Authentication Function call*\n\n9.  Complete\
    \ the rest of the wizard using the default settings provided.\n10.  Back in the\
    \ Authentication Schemes page, you should see your newly created authentication\
    \ scheme. Now you will need to set it as the active authentication scheme for\
    \ your application.\n11.  In the authentication schemes page, click the Change\
    \ Current tab. Choose the MYCUSTOMAUTH_SCHEME scheme from the drop-down list,\
    \ as shown in [Figure 8-3](#Chapter08.html#fig_8_3).\n\n    ![images](images/0803.jpg)\n\
    \n    ***Figure 8-3.** Setting the current authentication scheme*\n\n12.  Click\
    \ the Make Current button to complete the wizard and make the change.\n13.  Now\
    \ run the Login form in your application. Try to key in a random username and\
    \ password. You will find that you can’t login to the application, as shown in\
    \ [Figure 8-4](#Chapter08.html#fig_8_4).\n\n    ![images](images/0804.jpg)\n\n\
    \    ***Figure 8-4.** Access denied*\n\n14.  However, if you specify the credentials\
    \ greg with the password 1234, you will find that you can successfully login to\
    \ the application. This proves that the login page is now using your custom authentication\
    \ scheme.\n\n#### How It Works\n\nAPEX is flexible enough to allow you to modify\
    \ even the underlying authentication mechanisms for your applications. The method\
    \ shown in this recipe uses a very simple authentication function (that hardcodes\
    \ the username and password in PL/SQL); the objective of this recipe, however,\
    \ is to give you an idea of how to go about switching the authentication mechanism\
    \ from APEX's default to a custom one.\n\n![images](images/square.jpg) **Note**\
    \ Using APEX's flexible authentication framework, you can create schemes to authenticate\
    \ against LDAP stores or to specify not to have authentication at all in your\
    \ application. You can change these settings in the properties area of the authentication\
    \ scheme.\n\nLet's take a further look at how the PL/SQL authentication function\
    \ works. The skeleton for this function is described in [Listing 8-2](#Chapter08.html#list_8_2).\n\
    \n***Listing 8-2.** Skeleton of the Authentication Function*\n\n`CREATE OR REPLACE\
    \ FUNCTION AuthenticationFunction (`\n`  p_username IN VARCHAR2,`\n`  p_password\
    \ IN VARCHAR2`\n`)`\n`  RETURN BOOLEAN`\n`AS`\n`BEGIN`\n`    /* Do your thing\
    \ here and return TRUE if access should be granted and`\n`       FALSE if access\
    \ should be denied. */`\n`END;`\n\nYou can modify this authentication function\
    \ to do whatever you need. For instance, you could have the function run an SELECT\
    \ query against an external table, and if the user account exists, return `TRUE`\
    \ from the function.\n\nIn fact, there is nothing stopping you from authenticating\
    \ in real-time against usernames or passwords stored in text files (although it\
    \ would be a rather bad idea to do so). This, however, gives you an idea of the\
    \ extremes that you can go to with APEX's flexible authentication schemes framework.\n\
    \n### 8-2. Defining User Access Rights\n\n#### Problem\n\nYou have an interactive\
    \ report showing a list of job vacancy records. You want to allow John to create\
    \ new job vacancy record, but you don’t want to give Barry this same privilege.\
    \ In other words, you need to configure access rights for this report."
  trans: "## 解决方案\n\n你的首要任务是创建本教程中使用的数据库对象。要创建自定义登录表（及示例记录），请运行以下 SQL：\n\n```sql\n\
    CREATE TABLE \"CUSTOMLOGINS\"\n  (     \"USERID\" VARCHAR2(50),\n        \"USERNAME\"\
    \ VARCHAR2(255),\n        \"PASSWORD\" VARCHAR2(255),\n         CONSTRAINT \"\
    CUSTOMLOGINS_PK\" PRIMARY KEY (\"USERID\") ENABLE\n  )\n\nINSERT INTO CUSTOMLOGINS(USERID,USERNAME,PASSWORD)\
    \ VALUES('01','greg','1234')\n/\nINSERT INTO CUSTOMLOGINS(USERID,USERNAME,PASSWORD)\
    \ VALUES('02','zehoo','7890')\n/\n```\n\n你的下一个任务是定义实际的认证函数本身。你将创建一个非常简单的认证函数，它仅检查指定的用户名和密码是否存在于表中。如果存在，则授予访问权限。要创建此函数，请打开\
    \ SQL 工作坊，并运行清单 8-1 中所示的 PL/SQL。\n\n`清单 8-1. 定义认证函数`\n\n```sql\nCREATE OR REPLACE\
    \ FUNCTION MyCustomAuthenticator (\n  p_username IN VARCHAR2,\n  p_password IN\
    \ VARCHAR2\n)\n  RETURN BOOLEAN\nIS\n  l_count NUMBER;\nBEGIN\n   SELECT COUNT(*)\
    \ into l_count from CUSTOMLOGINS WHERE Username=p_username AND\n        Password=p_password;\n\
    \   IF l_count > 0 THEN\n      RETURN TRUE;\n   ELSE\n      RETURN FALSE;\n  \
    \ END IF;\nEND;\n```\n\n你的下一个任务是定义一个新的认证方案。为此，请按照以下步骤操作：\n\n1.  打开一个现有应用程序并单击“共享组件”(Shared\
    \ Components)图标。\n2.  在“安全性”(Security)部分下，单击“认证方案”(Authentication Schemes)链接，如图\
    \ 8-1 所示高亮显示。\n\n    ![images](img/0801.jpg)\n\n    `图 8-1. 认证方案链接`\n\n3.  在随之出现的页面中，单击“创建”(Create)按钮以创建新的认证方案。\n\
    4.  在向导的第一步中，选择从头开始创建方案。\n5.  在下一步中，将你的认证方案命名为 `MYCUSTOMAUTH_SCHEME`。\n6.  单击“下一步”(Next)按钮，直到到达“认证函数”(Authentication\
    \ Function)步骤。\n7.  在此屏幕中，选择“使用我的自定义函数进行认证”(Use my custom function to authenticate)选项。这将导致在选项底部出现一个“认证函数”(Authentication\
    \ Function)文本框。\n8.  在文本框中键入以下文本：`return MyCustomAuthenticator`。如图 8-2 所示。\n\n\
    \    ![images](img/0802.jpg)\n\n    `图 8-2. 定义认证函数调用`\n\n9.  使用提供的默认设置完成向导的其余部分。\n\
    10. 回到“认证方案”(Authentication Schemes)页面，你应该会看到新创建的认证方案。现在你需要将其设置为应用程序的当前认证方案。\n\
    11. 在认证方案页面中，单击“更改当前”(Change Current)选项卡。从下拉列表中选择 `MYCUSTOMAUTH_SCHEME` 方案，如图\
    \ 8-3 所示。\n\n    ![images](img/0803.jpg)\n\n    `图 8-3. 设置当前认证方案`\n\n12. 单击“设为当前”(Make\
    \ Current)按钮以完成向导并进行更改。\n13. 现在运行应用程序中的登录表单。尝试输入随机的用户名和密码。你会发现无法登录应用程序，如图 8-4\
    \ 所示。\n\n    ![images](img/0804.jpg)\n\n    `图 8-4. 访问被拒绝`\n\n14. 但是，如果你指定用户名\
    \ `greg` 和密码 `1234`，你会发现可以成功登录应用程序。这证明登录页面现在使用的是你的自定义认证方案。\n\n## 工作原理\n\nAPEX\
    \ 足够灵活，允许你修改应用程序底层的认证机制。本教程中所示的方法使用了一个非常简单的认证函数（在 PL/SQL 中硬编码了用户名和密码）；然而，本教程的目的是让你了解如何将认证机制从\
    \ APEX 的默认设置切换到自定义设置。\n\n![images](img/square.jpg) **注意** 使用 APEX 灵活的认证框架，你可以创建方案以针对\
    \ LDAP 存储进行认证，或者指定在你的应用程序中根本不进行认证。你可以在认证方案的属性区域更改这些设置。\n\n让我们进一步了解 PL/SQL 认证函数是如何工作的。此函数的骨架描述在清单\
    \ 8-2 中。\n\n`清单 8-2. 认证函数骨架`\n\n```sql\nCREATE OR REPLACE FUNCTION AuthenticationFunction\
    \ (\n  p_username IN VARCHAR2,\n  p_password IN VARCHAR2\n)\n  RETURN BOOLEAN\n\
    AS\nBEGIN\n    /* 在此处执行你的操作，如果应授予访问权限则返回 TRUE，\n       如果应拒绝访问则返回 FALSE。 */\n\
    END;\n```\n\n你可以修改此认证函数以执行你需要的任何操作。例如，你可以让该函数针对外部表运行一个 `SELECT` 查询，如果用户帐户存在，则从函数返回\
    \ `TRUE`。\n\n事实上，没有什么能阻止你针对存储在文本文件中的用户名或密码进行实时认证（尽管这样做可能是个相当糟糕的主意）。然而，这让你了解了在\
    \ APEX 灵活的认证方案框架下可以达到的极端程度。\n\n### 8-2. 定义用户访问权限\n\n#### 问题\n\n你有一个显示职位空缺记录列表的交互式报告。你希望允许\
    \ John 创建新的职位空缺记录，但不想给 Barry 相同的权限。换句话说，你需要为这个报告配置访问权限。"
- fmt: "#### Solution\n\nFirst you need to create the sample objects used in this\
    \ recipe. To do so, please follow these steps:\n1. Create the sample `Jobs` table\
    \ as shown in [Listing 8-3](#Chapter08.html#list_8_3).\n**Listing 8-3.** The Sample\
    \ Jobs Table\n```sql\nCREATE TABLE  \"JOBS\"\n   (   \"JOB_ID\" VARCHAR2(10),\n\
    \       \"JOB_TITLE\" VARCHAR2(35) CONSTRAINT \"JOB_TITLE_NN\" NOT NULL ENABLE,\n\
    \       \"MIN_SALARY\" NUMBER(6,0),\n       \"MAX_SALARY\" NUMBER(6,0),\n    \
    \    CONSTRAINT \"JOB_ID_PK\" PRIMARY KEY (\"JOB_ID\") ENABLE\n  )\n```\n2. Enter\
    \ some sample data in this table using the code in [Listing 8-4](#Chapter08.html#list_8_4).\n\
    **Listing 8-4.** Sample Data in the Jobs Table\n```sql\nINSERT INTO JOBS(JOB_ID,JOB_TITLE,MIN_SALARY,MAX_SALARY)\
    \ VALUES('AD_PRES','President',20000,40000)\nINSERT INTO JOBS(JOB_ID,JOB_TITLE,MIN_SALARY,MAX_SALARY)\
    \ VALUES('AD_VP','Administration Vice President',15000,30000)\n```\n3. Now, create\
    \ a new application. In the application, create a new form, and choose the `Form\
    \ on a Table with Report` template.\n![images](images/square.jpg) **Note** You\
    \ can refer to Recipe 2-1 on how to create a new application and form\n4. When\
    \ you are prompted to specify the base table for your form and report, choose\
    \ the `Jobs` table, as shown in [Figure 8-5](#Chapter08.html#fig_8_5).\n![images](images/0805.jpg)\n\
    **Figure 8-5.** Choosing the base table for your form and report\n5. Step through\
    \ the rest of the wizard using the default settings provided and complete the\
    \ wizard.\n6. Log out from the workspace, and log in to the `INTERNAL` workspace\
    \ using the `ADMIN` account. Navigate to Manage Workspaces ![images](images/U001.jpg)\
    \ Existing workspaces. Click on the workspace you were working on earlier, and\
    \ click the `Manage Users` button.\n7. Create a new user with the username of\
    \ `greg`. Set any password you desire for this account.\n\nNow that you've successfully\
    \ created the sample objects successfully, let's move on to creating an authorization\
    \ scheme. Please follow these instructions to do so:\n1. Open your application\
    \ and click the `Shared Components` icon.\n2. In the Security area of the page,\
    \ click the `Authorization Schemes` link (highlighted in [Figure 8-6](#Chapter08.html#fig_8_6)).\n\
    ![images](images/0806.jpg)\n**Figure 8-6.** Authorization Schemes link\n3. On\
    \ the next page, click the `Create` button to create a new authorization scheme.\n\
    4. Choose to create the scheme from scratch when prompted, as shown in [Figure\
    \ 8-7](#Chapter08.html#fig_8_7).\n![images](images/0807.jpg)\n**Figure 8-7.**\
    \ Creating an authorization scheme from scratch\n5. On the next page, give your\
    \ authorization scheme the name of `CHECKFORGREG`.\n6. Choose `Exists SQL Query`\
    \ as the Scheme Type, and in the Expression 1 field, enter the following PL/SQL:\
    \ `select 1 from jobs where LOWER(v('APP_USER')) = 'greg'`\n7. Specify \"Scheme\
    \ Violated\" as the scheme violated error message. You should now have the screen\
    \ shown in [Figure 8-8](#Chapter08.html#fig_8_8).\n![images](images/0808.jpg)\n\
    **Figure 8-8.** Defining the authorization scheme\n8. Click the `Create` button\
    \ to create the authorization scheme.\n\nNow you will need to apply the authorization\
    \ scheme to the report.\n1. Open the `Jobs` report you created earlier in this\
    \ recipe.\n2. In the Page Rendering area of the report, right-click on the `Create`\
    \ button, and choose to edit it, as shown in [Figure 8-9](#Chapter08.html#fig_8_9).\n\
    ![images](images/0809.jpg)\n**Figure 8-9.** Modifying settings for the Create\
    \ button\n3. On the next page, scroll down to the Security section and select\
    \ `CHECKFORGREG` as the authorization scheme for this button item. This is shown\
    \ in [Figure 8-10](#Chapter08.html#fig_8_10).\n![images](images/0810.jpg)\n**Figure\
    \ 8-10.** Settings the authorization scheme for the Create button\n4. Save your\
    \ changes and run the report. If you log in to the application as `greg`, you\
    \ will see the `Create` button at the top right corner of the report, as shown\
    \ in [Figure 8-11](#Chapter08.html#fig_8_11).\n![images](images/0811.jpg)\n**Figure\
    \ 8-11.** Create button visible for user named greg\n5. Now, log out from the\
    \ application and log in as any other user. You will notice that the `Create`\
    \ button does not show for this user, as illustrated in [Figure 8-12](#Chapter08.html#fig_8_12).\n\
    ![images](images/0812.jpg)\n**Figure 8-12.** Create button missing for user named\
    \ system\n\n#### How It Works\n\nAn authorization scheme lets you define a condition\
    \ (logic) that evaluates to either a true or false. The authorization scheme can\
    \ then be applied to any element in your application, be it a report column, a\
    \ button on a report, or even an entire form itself. When the scheme (your logic)\
    \ returns true, the current user is granted access to the element. If it returns\
    \ false, the current user is denied access.\n\nLet's take a closer look at the\
    \ configuration of the authorization scheme that you created earlier. Note that\
    \ you chose the `Exists SQL Query` scheme type; it means that if the PL/SQL you\
    \ wrote returned a record, then the scheme evaluates to true (access granted).\
    \ If an empty result set was returned, the scheme would evaluate to false (access\
    \ denied).\n\nNow, let's take a look at the PL/SQL from earlier in this recipe:\n\
    ```sql\nselect 1 from jobs where LOWER(v('APP_USER')) = 'greg'\n```\n![images](images/square.jpg)\
    \ **Tip** `v('APP_USER')` is a dynamic field (called a built-in substitution string)\
    \ that returns the username of the currently logged on user. There are other built-in\
    \ substitution strings defined in APEX; a comprehensive list of all the substitution\
    \ strings available in APEX is here:\n[`http://download.oracle.com/docs/cd/B32472_01/doc/appdev.300/b32471/concept.htm#BEIIBAJD`](http://download.oracle.com/docs/cd/B32472_01/doc/appdev.300/b32471/concept.htm#BEIIBAJD)\n\
    \nYou've practically defined that if the current user had the username `greg`,\
    \ then it would return something (here you simply return 1 but it could also be\
    \ `abc` if you desire, as long as a single record was returned). Hence the authorization\
    \ scheme you created in this recipe can be interpreted as: if the current user\
    \ has the username `greg`, he should be granted access to the element.\n\nBased\
    \ on this simple concept, you can apply very complex access rights control to\
    \ your application. For instance, you can create an `Employee` report that shows\
    \ all columns to a manager, but hides the `Current Salary` column when a normal\
    \ clerk views it.\n\n![images](images/square.jpg) **Tip** The hardcoding of data\
    \ (such as username `greg`) in the authorization scheme is for purpose of demonstration\
    \ and is certainly not encouraged. You would usually do something more meaningful\
    \ in the authorization scheme, such as checking if a user is a manager or a Head\
    \ of Department (against another database table and so on).\n\nAs a side note,\
    \ the concept of authorization schemes also promotes reusability and ease of maintenance.\
    \ It is reusable because you can reuse the same logic for multiple elements in\
    \ your application without rewriting the same logic many times. More importantly,\
    \ this makes it easier for you to maintain your application. For instance, if\
    \ the logic changes one day, such that you need to include an additional check\
    \ in your PL/SQL, you can just change it at one location, and it will instantly\
    \ be applied to all elements that use the said authorization scheme.\n\n### 8-3.\
    \ Preventing SQL Injection Attacks\n\n#### Problem\n\nYou have a dynamic report\
    \ showing the list of customers in the system. By default, your application requires\
    \ the end user to specify the customer name before it retrieves the matching customer\
    \ from the database. An APEX hacker has managed to retrieve the full list of all\
    \ customers in the database via an SQL injection attack. You want to protect your\
    \ application against similar attacks in the future."
