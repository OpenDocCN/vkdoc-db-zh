    \    ![images](img/0424.jpg)\n    **`图 4-24.`** 新创建的快捷方式\n\n要从您的表单引用快捷方式，请按照以下步骤操作：\n\
    \n1.  打开一个现有表单。\n2.  在表单的“页面定义”区域中，创建一个新区域（右键单击`页面渲染`部分中的`表单` ![images](img/U001.jpg)\
    \ `区域` ![images](img/U001.jpg) `主体`节点，然后单击`创建`菜单项）。\n3.  在向导中选择`HTML`区域类型。\n4.\
    \  在向导的下一页，选择`HTML 文本（含快捷方式）`，如`图 4-25`所示。\n    ![images](img/0425.jpg)\n    **`图\
    \ 4-25.`** 在区域中使用 HTML 文本（含快捷方式）\n5.  在下一步中，指定区域的标题。\n6.  下一步将允许您指定`HTML 文本区域源`。键入您之前创建的快捷方式的名称，用双引号括起来（如`图\
    \ 4-26`所示）。\n    ![images](img/0426.jpg)\n    **`图 4-26.`** 从区域引用快捷方式\n7.  现在单击`创建区域`按钮。\n\
    8.  现在您应该看到日期值出现在表单的区域中，如`图 4-27`所示。\n    ![images](img/0427.jpg)\n    **`图 4-27.`**\
    \ 运行中的快捷方式\n\n#### 工作原理\n\n您可以选择不将信息直接硬编码在表单中，而是将它们外部表示为一个动态变量，在需要时从您的应用程序中引用。在`APEX`中，这样的变量称为快捷方式。\n\
    \n使用快捷方式有很多好处。例如，如果您的上司决定将文本从“`The date today is`”更改为“`Current date is`”，您只需在快捷方式中更改它，使用该快捷方式的应用程序每个部分都将显示正确的文本。\n\
    \n### 4-7. 通过插件扩展用户界面\n\n#### 问题\n\n您需要创建一个现有`APEX`控件工具箱中没有的表单控件。您还计划与同事共享此控件，因此需要使其可重用。"
- fmt: "## Solution\n\nYou decide to use APEX plug-ins to implement the control. In\
    \ this recipe, you will create a specialized hyperlink control (that will bring\
    \ the user to the Google web site) as an example.\n\n### Creating the Plug-in\n\
    \nTo create the plug-in, follow these steps:\n\n1.  Open an existing application.\n\
    2.  Click on the `Shared Components` icon.\n3.  Click the `Plug-ins` link in the\
    \ User Interface section, as shown in [Figure 4-28](#Chapter04.html#fig_4_28).\n\
    \    ![images](images/0428.jpg)\n    **Figure 4-28. The Plug-ins link**\n4.  In\
    \ the plug-in configuration page, specify `GOOGLELINKIE` as the name of the plug-in\
    \ and `mygooglelinkie` as the internal name of the plug-in. Ensure that the `Type`\
    \ field is set to `Item`.\n5.  In the Source area, type the text shown in [Listing\
    \ 4-4](#Chapter04.html#list_4_4).\n    **Listing 4-4. The Render Function**\n\
    \    ```\n    function RENDER_LINKIE (\n        p_item                  in apex_plugin.t_page_item\n\
    \        , p_plugin              in apex_plugin.t_plugin\n        , p_value  \
    \             in varchar2\n        , p_is_readonly         in boolean\n      \
    \  , p_is_printer_friendly in boolean)\n    return apex_plugin.t_page_item_render_result\n\
    \    is\n       retval apex_plugin.t_page_item_render_result;\n    begin\n   \
    \     htp.p('<a href=\"http://www.google.com\">Jump to Google</a>');\n       \
    \ return retval;\n    end;\n    ```\n6.  Ensure that you set the `Render Function\
    \ Name` (under the `Callbacks` section) to the name of your PL/SQL function (`RENDER_LINKIE`).\
    \ You should now have the screenshot shown in [Figure 4-29](#Chapter04.html#fig_4_29).\n\
    \    ![images](images/0429.jpg)\n    **Figure 4-29. Specifying the details of\
    \ the plug-in**\n7.  Click the `Create` button to create the plug-in.\n\n### Using\
    \ the Plug-in\n\nTo use the plug-in in your application, follow these steps:\n\
    \n1.  Open an existing form.\n2.  In the Page Rendering area of the form, create\
    \ a new Page Item.\n3.  Choose `Plug-ins` from the list of item types available\
    \ in the first step of the wizard, as shown in [Figure 4-30](#Chapter04.html#fig_4_30).\n\
    \    ![images](images/0430.jpg)\n    **Figure 4-30. The Plug-ins item type**\n\
    4.  Choose the `GOOGLELINKIE` plug-in in the next step of the wizard, as shown\
    \ in [Figure 4-31](#Chapter04.html#fig_4_31).\n    ![images](images/0431.jpg)\n\
    \    **Figure 4-31. Choosing the GOOGLELINKIE plug-in**\n5.  Complete the rest\
    \ of the wizard using the default settings to create the page item.\n6.  Now run\
    \ your application. You can see your control show up in the form (\"Jump to Google\"\
    ) shown in [Figure 4-32](#Chapter04.html#fig_4_32). Clicking on it will bring\
    \ you to the Google web page.\n    ![images](images/0432.jpg)\n    **Figure 4-32.\
    \ The Google Linkie plug-in in action**\n\n## How It Works\n\nPlug-ins are a way\
    \ to extend the existing control toolset in APEX. The anatomy of a plug-in is\
    \ quite straightforward. You supply a PL/SQL function for the plug-in, and that\
    \ function is used to render the HTML (and accompanying JavaScript) for the control.\n\
    \nIf you take a closer look at the PL/SQL function you specified earlier, you\
    \ can see a statement that looks like the following:\n```\nhtp.p('<a href=\"http://www.google.com\"\
    >Jump to Google</a>');\n```\nNote that `htp` is a package that allows you to write\
    \ HTML output from your plug-in. Using this function, you can render any HTML\
    \ or JavaScript necessary to achieve the functionality you wish in your plug-in.\n\
    \nUsing the plug-in framework in APEX, you can build an extensive set of functionality-rich\
    \ and reusable plug-ins that you can share among your colleagues (or even sell\
    \ online!).\n\n## Visualizing Your Data\n\nOne of the key areas in which APEX\
    \ really shines is its ability to create many different views to visualize the\
    \ data in your database. If you have at least one numerical field in your table,\
    \ you can massage your data to create vivid pie, doughnut, bar or candlestick\
    \ charts that are either static or animated. If you have at least one date or\
    \ time field in your table, you can magically populate your records on a calendar\
    \ using that field. If you have a bunch of sales data, you can display it on top\
    \ of each country on a beautiful high resolution map.\n\nThe rich platform that\
    \ is APEX allows you to create (in a matter of minutes) hundreds of new ways to\
    \ look at your data—something you wouldn't usually be able to pull off on your\
    \ own in traditional programming. (Try writing your own animated chart engine\
    \ or map renderer!)\n\nThe neat thing is that views in APEX are also considered\
    \ pages, so they conform to the rest of the APEX architecture, which means you\
    \ can apply templates, themes, processes, behavior, and so on to these pages.\
    \ This chapter focuses on how to set up and use some of the basic views in APEX.\
    \ By the end of the chapter, you will have an idea of the different type of views\
    \ available in APEX.\n\n### Creating a Classic Report\n\n#### Problem\n\nYou have\
    \ two tables: an employee table and an employee leave table. You need to extract\
    \ information from both tables and present it in a static report. In other words,\
    \ you need to create a tabular read-only report combining data from multiple tables\
    \ in the database."
  raw: "#### Solution\n\nYou decide to use APEX plug-ins to implement the control.\
    \ In this recipe, you will create a specialized hyperlink control (that will bring\
    \ the user to the Google web site) as an example.\n\n##### Creating the Plug-in\n\
    \nTo create the plug-in, follow these steps:\n\n1.  Open an existing application.\n\
    2.  Click on the `Shared Components` icon.\n3.  Click the Plug-ins link in the\
    \ User Interface section, as shown in [Figure 4-28](#Chapter04.html#fig_4_28).\n\
    \n    ![images](images/0428.jpg)\n\n    ***Figure 4-28.** The Plug-ins link*\n\
    \n4.  In the plug-in configuration page, specify GOOGLELINKIE as the name of the\
    \ plug-in and mygooglelinkie as the internal name of the plug-in. Ensure that\
    \ the `Type` field is set to `Item`.\n5.  In the Source area, type the text shown\
    \ in [Listing 4-4](#Chapter04.html#list_4_4).\n\n    ***Listing 4-4.** The Render\
    \ Function*\n\n    `function RENDER_LINKIE (`\n    `p_item                  in\
    \ apex_plugin.t_page_item`\n    `, p_plugin              in apex_plugin.t_plugin`\n\
    \    `, p_value               in varchar2`\n    `, p_is_readonly         in boolean`\n\
    \    `, p_is_printer_friendly in boolean)`\n    `return apex_plugin.t_page_item_render_result`\n\
    \    `is`\n    `   retval apex_plugin.t_page_item_render_result;`\n    `begin`\n\
    \    `    htp.p('<a href=\"http://www.google.com\">Jump to Google</a>');`\n  \
    \  `    return retval;`\n    `end;`\n6.  Ensure that you set the `Render Function\
    \ Name` (under the `Callbacks` section) to the name of your PL/SQL function (`RENDER_LINKIE`).\
    \ You should now have the screenshot shown in [Figure 4-29](#Chapter04.html#fig_4_29).\n\
    \n    ![images](images/0429.jpg)\n\n    ***Figure 4-29.** Specifying the details\
    \ of the plug-in*\n\n7.  Click the Create button to create the plug-in.\n\n#####\
    \ Using the Plug-in\n\nTo use the plug-in in your application, follow these steps:\n\
    \n1.  Open an existing form.\n2.  In the Page Rendering area of the form, create\
    \ a new Page Item.\n3.  Choose Plug-ins from the list of item types available\
    \ in the first step of the wizard, as shown in [Figure 4-30](#Chapter04.html#fig_4_30).\n\
    \n    ![images](images/0430.jpg)\n\n    ***Figure 4-30.** The Plug-ins item type*\n\
    \n4.  Choose the GOOGLELINKIE plug-in in the next step of the wizard, as shown\
    \ in [Figure 4-31](#Chapter04.html#fig_4_31).\n\n    ![images](images/0431.jpg)\n\
    \n    ***Figure 4-31.** Choosing the GOOGLELINKIE plug-in*\n\n5.  Complete the\
    \ rest of the wizard using the default settings to create the page item.\n6. \
    \ Now run your application. You can see your control show up in the form (“Jump\
    \ to Google”) shown in [Figure 4-32](#Chapter04.html#fig_4_32). Clicking on it\
    \ will bring you to the Google web page.\n\n![images](images/0432.jpg)\n\n***Figure\
    \ 4-32.** The Google Linkie plug-in in action*\n\n#### How It Works\n\nPlug-ins\
    \ are a way to extend the existing control toolset in APEX. The anatomy of a plug-in\
    \ is quite straightforward. You supply a PL/SQL function for the plug-in, and\
    \ that function is used to render the HTML (and accompanying JavaScript) for the\
    \ control.\n\nIf you take a closer look at the PL/SQL function you specified earlier,\
    \ you can see a statement that looks like the following:\n\n`htp.p('<a href=\"\
    http://www.google.com\">Jump to Google</a>');`\n\n`Note that htp` is a package\
    \ that allows you to write HTML output from your plug-in. Using this function,\
    \ you can render any HTML or JavaScript necessary to achieve the functionality\
    \ you wish in your plug-in.\n\nUsing the plug-in framework in APEX, you can build\
    \ an extensive set of functionality-rich and reusable plug-ins that you can share\
    \ among your colleagues (or even sell online!).\n\n## C H A P T E R  5\n\n## Visualizing\
    \ Your Data\n\nOne of the key areas in which APEX really shines is its ability\
    \ to create many different views to visualize the data in your database. If you\
    \ have at least one numerical field in your table, you can massage your data to\
    \ create vivid pie, doughnut, bar or candlestick charts that are either static\
    \ or animated. If you have at least one date or time field in your table, you\
    \ can magically populate your records on a calendar using that field. If you have\
    \ a bunch of sales data, you can display it on top of each country on a beautiful\
    \ high resolution map.\n\nThe rich platform that is APEX allows you to create\
    \ (in a matter of minutes) hundreds of new ways to look at your data—something\
    \ you wouldn't usually be able to pull off on your own in traditional programming.\
    \ (Try writing your own animated chart engine or map renderer!)\n\nThe neat thing\
    \ is that views in APEX are also considered pages, so they conform to the rest\
    \ of the APEX architecture, which means you can apply templates, themes, processes,\
    \ behavior, and so on to these pages. This chapter focuses on how to set up and\
    \ use some of the basic views in APEX. By the end of the chapter, you will have\
    \ an idea of the different type of views available in APEX.\n\n### 5-1. Creating\
    \ a Classic Report\n\n#### Problem\n\nYou have two tables: an employee table and\
    \ an employee leave table. You need to extract information from both tables and\
    \ present it in a static report. In other words, you need to create a tabular\
    \ read-only report combining data from multiple tables in the database."
  trans: "\n## 解决方案\n\n你决定使用 APEX 插件来实现该控件。在本教程中，你将创建一个专门的超链接控件（用于将用户引导至谷歌网站）作为示例。\n\
    \n### 创建插件\n\n要创建插件，请按照以下步骤操作：\n\n1.  打开一个现有应用程序。\n2.  点击 `共享组件` 图标。\n3.  点击用户界面部分中的\
    \ `插件` 链接，如图 4-28 所示。\n    ![images](img/0428.jpg)\n    **图 4-28. 插件链接**\n4. \
    \ 在插件配置页面，指定 `GOOGLELINKIE` 作为插件名称，`mygooglelinkie` 作为插件的内部名称。确保 `类型` 字段设置为 `项`。\n\
    5.  在源代码区域，输入代码清单 4-4 中所示的文本。\n    **代码清单 4-4. 渲染函数**\n    ```\n    function RENDER_LINKIE\
    \ (\n        p_item                  in apex_plugin.t_page_item\n        , p_plugin\
    \              in apex_plugin.t_plugin\n        , p_value               in varchar2\n\
    \        , p_is_readonly         in boolean\n        , p_is_printer_friendly in\
    \ boolean)\n    return apex_plugin.t_page_item_render_result\n    is\n       retval\
    \ apex_plugin.t_page_item_render_result;\n    begin\n        htp.p('<a href=\"\
    http://www.google.com\">Jump to Google</a>');\n        return retval;\n    end;\n\
    \    ```\n6.  确保将 `渲染函数名称` （位于 `回调` 部分下）设置为你的 PL/SQL 函数名称（`RENDER_LINKIE`）。现在你应该拥有如图\
    \ 4-29 所示的截图。\n    ![images](img/0429.jpg)\n    **图 4-29. 指定插件详细信息**\n7.  点击 `创建`\
    \ 按钮以创建插件。\n\n### 使用插件\n\n要在应用程序中使用插件，请按照以下步骤操作：\n\n1.  打开一个现有表单。\n2.  在表单的页面渲染区域，创建一个新的页面项。\n\
    3.  在向导第一步的可用项类型列表中，选择 `插件`，如图 4-30 所示。\n    ![images](img/0430.jpg)\n    **图\
    \ 4-30. 插件项类型**\n4.  在向导的下一步中，选择 `GOOGLELINKIE` 插件，如图 4-31 所示。\n    ![images](img/0431.jpg)\n\
    \    **图 4-31. 选择 GOOGLELINKIE 插件**\n5.  使用默认设置完成向导的其余部分以创建页面项。\n6.  现在运行你的应用程序。你可以看到你的控件显示在表单中（“跳转到谷歌”），如图\
    \ 4-32 所示。点击它将带你前往谷歌网页。\n    ![images](img/0432.jpg)\n    **图 4-32. 运行中的谷歌 Linkie\
    \ 插件**\n\n## 工作原理\n\n插件是扩展现有 APEX 控件工具集的一种方式。插件的结构相当直接。你为插件提供一个 PL/SQL 函数，该函数用于渲染控件的\
    \ HTML（及附带的 JavaScript）。\n\n如果你仔细查看之前指定的 PL/SQL 函数，可以看到一条类似如下语句：\n```\nhtp.p('<a\
    \ href=\"http://www.google.com\">Jump to Google</a>');\n```\n请注意，`htp` 是一个包，允许你从插件中写入\
    \ HTML 输出。使用此函数，你可以渲染实现插件所需功能的任何 HTML 或 JavaScript。\n\n利用 APEX 中的插件框架，你可以构建大量功能丰富且可重用的插件，以便在同事间共享（甚至在线销售！）。\n\
    \n## 可视化你的数据\n\nAPEX 真正出色的关键领域之一是其能够创建多种视图来可视化数据库中的数据。如果你的表中至少有一个数字字段，你可以处理数据以创建生动、静态或动画的饼图、环形图、条形图或蜡烛图。如果你的表中至少有一个日期或时间字段，你可以使用该字段神奇地将记录填充到日历上。如果你有一堆销售数据，你可以在高分辨率地图上将其显示在对应的国家/地区上方。\n\
    \n丰富的 APEX 平台允许你（在几分钟内）创建数百种查看数据的新方式——这是你在传统编程中通常无法独自完成的。（尝试自己编写动画图表引擎或地图渲染器吧！）\n\
    \n巧妙的是，APEX 中的视图也被视为页面，因此它们遵循 APEX 的其余架构，这意味着你可以将模板、主题、进程、行为等应用于这些页面。本章重点介绍如何在\
    \ APEX 中设置和使用一些基本视图。到本章结束时，你将对 APEX 中可用的不同类型视图有所了解。\n\n### 创建经典报表\n\n#### 问题\n\
    \n你有两个表：员工表和员工请假表。你需要从两个表中提取信息并以静态报表的形式呈现。换句话说，你需要创建一个结合数据库中多个表数据的表格型只读报表。\n"
- fmt: "#### 解决方案\n\n此解决方案包含两个步骤。你必须首先创建示例对象（这些对象将用于本章的其他配方）。之后，你将创建报表本身。\n\n#####\
    \ 步骤 1：创建示例对象\n\n你将创建的示例对象是员工和员工请假表。使用 SQL Workshop 执行 [清单 5-1](#Chapter05.html#list_5_1)\
    \ 中所示的代码。\n\n**清单 5-1.** 创建示例对象\n\n```\nCREATE table \"EMPLOYEES\" (\n    \"EMPID\"\
    \         NVARCHAR2(10),\n    \"EMPNAME\"       NVARCHAR2(255),\n    \"EMPTITLE\"\
    \      NVARCHAR2(255),\n    \"EMPDEPARTMENT\" NVARCHAR2(255),\n    constraint\
    \  \"EMPLOYEES_PK\" primary key (\"EMPID\")\n)\n/\n\nCREATE TABLE  \"EMPLEAVE\"\
    \n(   \"EMPID\" NVARCHAR2(50),\n    \"LEAVEDATE\" DATE,\n    \"LEAVETYPE\" NVARCHAR2(255),\n\
    \    \"LEAVEREASON\" NVARCHAR2(255),\n    \"LEAVEID\" NVARCHAR2(50),\n    CONSTRAINT\
    \ \"EMPLEAVE_PK\" PRIMARY KEY (\"LEAVEID\") ENABLE\n)\n/\n\nINSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
    \ VALUES('E1','Janet Harris','CFO','Finance')\n/\nINSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
    \ VALUES('E2','Greg Yap','Senior Developer','IT')\n/\nINSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
    VALUES('E1',TO_DATE('20090329', 'YYYYMMDD'),'Sick Leave','Flu','L1')\n/\nINSERT\
    \ INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\nVALUES('E1',TO_DATE('20100517',\
    \ 'YYYYMMDD'),'Maternity Leave','Maternity','L2')\n/\nINSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
    VALUES('E2',TO_DATE('20090314', 'YYYYMMDD'),'Emergency leave','To visit a dying\
    \ friend','L3')\n/\n```\n\n##### 步骤 2：创建报表\n\n要创建经典报表，请按照以下说明操作：\n\n1.  创建一个新应用程序，并选择在此应用程序中创建一个新页面。\n\
    2.  选择“报表”页面类型。\n3.  在向导的下一步中，选择“经典报表”类型，如 [图 5-1](#Chapter05.html#fig_5_1) 所示。\n\
    \n    ![images](images/0501.jpg)\n\n    **图 5-1.** 经典报表\n\n4.  接下来，指定报表的名称。完成后，跳过下一步。你现在将被允许输入报表的\
    \ SQL 语句。指定 [清单 5-2](#Chapter05.html#list_5_2) 中所示的 SQL 语句。\n\n    **清单 5-2.**\
    \ 为经典报表指定 SQL\n\n    ```\n    SELECT * FROM EMPLOYEES LEFT JOIN EMPLEAVE ON EMPLOYEES.EMPID=EMPLEAVE.EMPID\n\
    \    ```\n\n    你现在应该看到如 [图 5-2](#Chapter05.html#fig_5_2) 所示的屏幕截图。\n\n    ![images](images/0502.jpg)\n\
    \n    **图 5-2.** 为经典报表指定 SQL\n\n5.  单击通过向导的其余部分直到结束。\n6.  运行报表。你应该看到如 [图 5-3](#Chapter05.html#fig_5_3)\
    \ 所示的组合数据列表。\n\n    ![images](images/0503.jpg)\n\n    **图 5-3.** 实际运行中的经典报表\n\n\
    #### 工作原理\n\n你首先在[第 2 章](#Chapter02.html#ch2)中遇到了报表。基本上有两种类型的报表：交互式报表和经典报表。经典报表是静态的——它们只显示信息——而交互式报表允许你与信息进行交互。如本配方所示，两种报表都可以组合多个表的结果。\n\
    \n### 5-2. 创建参数化报表\n\n#### 问题\n\n你的管理层希望能够动态过滤其报表中显示的信息。使用配方 5-1 中的示例数据，你的管理层希望将范围缩小到特定员工的请假记录列表。\n\
    \n![images](images/square.jpg) **注意** 如果你还没有这样做，请执行[清单 5-1](#Chapter05.html#list_5_1)来创建本配方使用的示例数据。\n\
    \n#### 解决方案\n\n要创建参数化报表，请按照以下说明操作：\n\n1.  打开一个应用程序并选择创建一个新页面。\n2.  在向导的第一步中选择“报表”页面类型，如\
    \ [图 5-4](#Chapter05.html#fig_5_4) 所示。\n\n    ![images](images/0504.jpg)\n\n \
    \   **图 5-4.** 报表页面类型\n\n3.  在下一步中，选择“交互式报表”类型。\n4.  跳过向导中的所有步骤，直到到达允许你指定报表 SQL\
    \ 语句的步骤。到达此步骤时，指定 [清单 5-3](#Chapter05.html#list_5_3) 中所示的 SQL。\n\n    **清单 5-3.**\
    \ 为交互式报表指定 SQL\n\n    ```\n    SELECT e1.EmpName, e1.EmpTitle, e1.EmpDepartment,\
    \ e2.LeaveDate, e2.LeaveType, e2.LeaveReason, e2.LeaveID FROM Employees e1 LEFT\
    \ JOIN EmpLeave e2 ON e1.EmpID=e2.EmpID\n    ```\n5.  在同一步骤中，为“唯一标识行依据”字段选择“唯一列”，为“唯一列”字段选择“LeaveID”。你现在应该看到如\
    \ [图 5-5](#Chapter05.html#fig_5_5) 所示的屏幕。单击“下一步”继续。\n\n    ![images](images/0505.jpg)\n\
    \n    **图 5-5.** 为交互式报表指定 SQL\n\n6.  跳到最后一步以完成向导。现在运行你的报表。你应该看到配方 5-1 中看到的数据列表，并在列表顶部添加了一个新的搜索栏。\n\
    7.  单击搜索栏中的放大镜图标并选择“Empname”条目，如 [图 5-6](#Chapter05.html#fig_5_6) 所示。\n\n    ![images](images/0506.jpg)\n\
    \n    **图 5-6.** 按员工姓名搜索\n\n8.  完成后，搜索栏现在允许你按员工姓名进行搜索。输入 Janet，然后单击 Enter 开始搜索。报表中显示的结果列表现在被过滤，仅显示与你的搜索条件匹配的条目（参见\
    \ [图 5-7](#Chapter05.html#fig_5_7)）。\n\n![images](images/0507.jpg)\n\n**图 5-7.**\
    \ 过滤后的结果列表\n\n#### 工作原理\n\n交互式报表带有一个内置的搜索栏，允许最终用户快速、动态地对报表中显示的结果列表应用过滤器。在本配方中，你可以看到如何切换搜索栏的模式，使报表使用特定字段（本例中为“员工姓名”字段）进行搜索。\n\
    \n### 5-3. 用图形图表可视化数据\n\n#### 问题\n\n你希望以图表的形式呈现数据，以便一目了然地分析数据。例如，你希望分析每位员工请假的频率——并且你希望以\
    \ 3D 饼图的形式将此信息可视化。\n\n![images](images/square.jpg) **注意** 如果你还没有这样做，请执行[清单 5-1](#Chapter05.html#list_5_1)来创建本配方使用的示例数据。"
  raw: "#### Solution\n\nThis solution consists of two steps. You must first create\
    \ the sample objects (that will be used for the other recipes in this chapter).\
    \ After that you will create the report itself.\n\n##### Step 1: Creating the\
    \ Sample Objects\n\nThe sample objects you will create are the employee and employee\
    \ leave tables. Execute the code shown in [Listing 5-1](#Chapter05.html#list_5_1)\
    \ using the SQL Workshop.\n\n***Listing 5-1.** Creating the Sample Objects*\n\n\
    `CREATE table \"EMPLOYEES\" (`\n`    \"EMPID\"         NVARCHAR2(10),`\n`    \"\
    EMPNAME\"       NVARCHAR2(255),`\n`    \"EMPTITLE\"      NVARCHAR2(255),`\n`    \"\
    EMPDEPARTMENT\" NVARCHAR2(255),`\n`    constraint  \"EMPLOYEES_PK\" primary key\
    \ (\"EMPID\")`\n`)`\n`/`\n\n`CREATE TABLE  \"EMPLEAVE\"`\n`(   \"EMPID\" NVARCHAR2(50),`\n\
    `    \"LEAVEDATE\" DATE,`\n`    \"LEAVETYPE\" NVARCHAR2(255),`\n`    \"LEAVEREASON\"\
    \ NVARCHAR2(255),`\n`    \"LEAVEID\" NVARCHAR2(50),`\n`    CONSTRAINT \"EMPLEAVE_PK\"\
    \ PRIMARY KEY (\"LEAVEID\") ENABLE`\n`)`\n`/`\n\n`INSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
    \ VALUES('E1','Janet Harris','CFO','Finance')`\n`/`\n`INSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
    \ VALUES('E2','Greg Yap','Senior Developer','IT')`\n`/`\n`INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)`\n\
    `VALUES('E1',TO_DATE('20090329', 'YYYYMMDD'),'Sick Leave','Flu','L1')`\n`/`\n\
    `INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)`\n`VALUES('E1',TO_DATE('20100517',\
    \ 'YYYYMMDD'),'Maternity Leave','Maternity','L2')`\n`/`\n`INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)`\n\
    `VALUES('E2',TO_DATE('20090314', 'YYYYMMDD'),'Emergency leave','To visit a dying\
    \ friend','L3')`\n`/`\n\n##### Step 2: Creating the Report\n\nTo create the classic\
    \ report, follow these instructions:\n\n1.  Create a new application, and choose\
    \ to create a new page in this application.\n2.  Choose the Report page type.\n\
    3.  In the next step of the wizard, choose the Classic Report type, as shown in\
    \ [Figure 5-1](#Chapter05.html#fig_5_1).\n\n    ![images](images/0501.jpg)\n\n\
    \    ***Figure 5-1.** The Classic Report*\n\n4.  Next, specify a name for your\
    \ report. After you've done that, skip past the next step. You will now be allowed\
    \ to enter the SQL statement for the report. Specify the SQL statement shown in\
    \ [Listing 5-2](#Chapter05.html#list_5_2).\n\n    ***Listing 5-2.** Specifying\
    \ the SQL for the Classic Report*\n\n    `SELECT * FROM EMPLOYEES LEFT JOIN EMPLEAVE\
    \ ON EMPLOYEES.EMPID=EMPLEAVE.EMPID`\n\n    You should now see the screenshot\
    \ shown in [Figure 5-2](#Chapter05.html#fig_5_2).\n\n    ![images](images/0502.jpg)\n\
    \n    ***Figure 5-2.** Specifying the SQL for the classic report*\n\n5.  Click\
    \ through the rest of the wizard until the end.\n6.  Run the report. You should\
    \ see the list of combined data as displayed in [Figure 5-3](#Chapter05.html#fig_5_3).\n\
    \n    ![images](images/0503.jpg)\n\n    ***Figure 5-3.** The classic report in\
    \ action*\n\n#### How It Works\n\nYou first encountered reports in [Chapter 2](#Chapter02.html#ch2).\
    \ There are basically two types of reports: Interactive Reports and Classic Reports.\
    \ Classic Reports are static—they simply display information—while Interactive\
    \ Reports allow you to interact with the information. Both reports can combine\
    \ results from more than one table, as shown in this recipe.\n\n### 5-2. Creating\
    \ Parameterized Reports\n\n#### Problem\n\nYour management wants to be able to\
    \ dynamically filter the information shown in their reports. Using the sample\
    \ data from Recipe 5-1, your management wants to be able to narrow down to the\
    \ list of leave records for a specific employee.\n\n![images](images/square.jpg)\
    \ **Note** If you haven't already done so, please execute [Listing 5-1](#Chapter05.html#list_5_1)\
    \ to create the sample data used for this recipe.\n\n#### Solution\n\nTo create\
    \ a parameterized report, follow these instructions:\n\n1.  Open an application\
    \ and choose to create a new page.\n2.  Choose the Report page type in the first\
    \ step of the wizard, as shown in [Figure 5-4](#Chapter05.html#fig_5_4).\n\n \
    \   ![images](images/0504.jpg)\n\n    ***Figure 5-4.** The report page type*\n\
    \n3.  In the next step, choose the Interactive Report type.\n4.  Skip through\
    \ all the steps in the wizard until you reach the step that allows you to specify\
    \ the SQL statement for the report. When you reach this step, specify the SQL\
    \ shown in [Listing 5-3](#Chapter05.html#list_5_3).\n\n    ***Listing 5-3.** Specifying\
    \ the SQL for the Interactive Report*\n\n    `SELECT e1.EmpName, e1.EmpTitle,\
    \ e1.EmpDepartment, e2.LeaveDate, e2.LeaveType, e2.LeaveReason, e2.LeaveID FROM\
    \ Employees e1 LEFT JOIN EmpLeave e2 ON e1.EmpID=e2.EmpID`\n5.  In the same step,\
    \ select Unique Column for the Uniquely Identify Rows by field, and LeaveID for\
    \ the Unique Column field. You should now have the screen shown in [Figure 5-5](#Chapter05.html#fig_5_5).\
    \ Click Next to continue.\n\n    ![images](images/0505.jpg)\n\n    ***Figure 5-5.**\
    \ Specifying the SQL for the Interactive Report*\n\n6.  Skip to the last step\
    \ to complete the wizard. Now run your report. You should see the list of data\
    \ you saw in Recipe 5-1, with the addition of a new search bar at the top of the\
    \ list.\n7.  Click the magnifying glass icon in the search bar and choose the\
    \ Empname entry, as shown in [Figure 5-6](#Chapter05.html#fig_5_6).\n\n    ![images](images/0506.jpg)\n\
    \n    ***Figure 5-6.** Searching by employee name*\n\n8.  Once you have done that,\
    \ the search bar now allows you to search by employee name. Key in Janet, and\
    \ click Enter to begin the search. The list of results shown in the report is\
    \ now filtered to show only those entries that match your search criteria (see\
    \ [Figure 5-7](#Chapter05.html#fig_5_7)).\n\n![images](images/0507.jpg)\n\n***Figure\
    \ 5-7.** The filtered list of results*\n\n#### How It Works\n\nInteractive Reports\
    \ come with a built-in search bar that allows end users to quickly and dynamically\
    \ apply filters on the list of results shown in the report. In this recipe, you\
    \ can see how you were able to switch the mode of the search bar to make the report\
    \ search using a particular field, in this case the Employee name field.\n\n###\
    \ 5-3. Visualizing Data in Graphical Charts\n\n#### Problem\n\nYou wish to present\
    \ data in the form of a chart so that you can analyze the data at a glance. For\
    \ example, you wish to analyze the frequency of leave taken for each employee—and\
    \ you want to visualize this information in the form of a 3D pie chart.\n\n![images](images/square.jpg)\
    \ **Note** If you haven't already done so, please execute [Listing 5-1](#Chapter05.html#list_5_1)\
    \ to create the sample data used for this recipe."
  trans: "\n#### 解决方案\n\n此解决方案包含两个步骤。你必须首先创建示例对象（这些对象将用于本章的其他配方）。之后，你将创建报表本身。\n\n\
    ##### 步骤 1：创建示例对象\n\n你将创建的示例对象是员工和员工请假表。使用 SQL Workshop 执行 清单 5-1 中所示的代码。\n\n\
    **清单 5-1.** 创建示例对象\n\n```\nCREATE table \"EMPLOYEES\" (\n    \"EMPID\"       \
    \  NVARCHAR2(10),\n    \"EMPNAME\"       NVARCHAR2(255),\n    \"EMPTITLE\"   \
    \   NVARCHAR2(255),\n    \"EMPDEPARTMENT\" NVARCHAR2(255),\n    constraint  \"\
    EMPLOYEES_PK\" primary key (\"EMPID\")\n)\n/\n\nCREATE TABLE  \"EMPLEAVE\"\n(\
    \   \"EMPID\" NVARCHAR2(50),\n    \"LEAVEDATE\" DATE,\n    \"LEAVETYPE\" NVARCHAR2(255),\n\
    \    \"LEAVEREASON\" NVARCHAR2(255),\n    \"LEAVEID\" NVARCHAR2(50),\n    CONSTRAINT\
    \ \"EMPLEAVE_PK\" PRIMARY KEY (\"LEAVEID\") ENABLE\n)\n/\n\nINSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
    \ VALUES('E1','Janet Harris','CFO','Finance')\n/\nINSERT INTO EMPLOYEES(EMPID,EMPNAME,EMPTITLE,EMPDEPARTMENT)\
    \ VALUES('E2','Greg Yap','Senior Developer','IT')\n/\nINSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
    VALUES('E1',TO_DATE('20090329', 'YYYYMMDD'),'Sick Leave','Flu','L1')\n/\nINSERT\
    \ INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\nVALUES('E1',TO_DATE('20100517',\
    \ 'YYYYMMDD'),'Maternity Leave','Maternity','L2')\n/\nINSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
    VALUES('E2',TO_DATE('20090314', 'YYYYMMDD'),'Emergency leave','To visit a dying\
    \ friend','L3')\n/\n```\n\n##### 步骤 2：创建报表\n\n要创建经典报表，请按照以下说明操作：\n\n1.  创建一个新应用程序，并选择在此应用程序中创建一个新页面。\n\
    2.  选择“报表”页面类型。\n3.  在向导的下一步中，选择“经典报表”类型，如 图 5-1 所示。\n\n    ![images](img/0501.jpg)\n\
    \n    **图 5-1.** 经典报表\n\n4.  接下来，指定报表的名称。完成后，跳过下一步。你现在将被允许输入报表的 SQL 语句。指定 清单 5-2\
    \ 中所示的 SQL 语句。\n\n    **清单 5-2.** 为经典报表指定 SQL\n\n    ```\n    SELECT * FROM EMPLOYEES\
    \ LEFT JOIN EMPLEAVE ON EMPLOYEES.EMPID=EMPLEAVE.EMPID\n    ```\n\n    你现在应该看到如\
    \ 图 5-2 所示的屏幕截图。\n\n    ![images](img/0502.jpg)\n\n    **图 5-2.** 为经典报表指定 SQL\n\
    \n5.  单击通过向导的其余部分直到结束。\n6.  运行报表。你应该看到如 图 5-3 所示的组合数据列表。\n\n    ![images](img/0503.jpg)\n\
    \n    **图 5-3.** 实际运行中的经典报表\n\n#### 工作原理\n\n你首先在第 2 章中遇到了报表。基本上有两种类型的报表：交互式报表和经典报表。经典报表是静态的——它们只显示信息——而交互式报表允许你与信息进行交互。如本配方所示，两种报表都可以组合多个表的结果。\n\
    \n### 5-2. 创建参数化报表\n\n#### 问题\n\n你的管理层希望能够动态过滤其报表中显示的信息。使用配方 5-1 中的示例数据，你的管理层希望将范围缩小到特定员工的请假记录列表。\n\
    \n![images](img/square.jpg) **注意** 如果你还没有这样做，请执行清单 5-1 来创建本配方使用的示例数据。\n\n####\
    \ 解决方案\n\n要创建参数化报表，请按照以下说明操作：\n\n1.  打开一个应用程序并选择创建一个新页面。\n2.  在向导的第一步中选择“报表”页面类型，如\
    \ 图 5-4 所示。\n\n    ![images](img/0504.jpg)\n\n    **图 5-4.** 报表页面类型\n\n3.  在下一步中，选择“交互式报表”类型。\n\
    4.  跳过向导中的所有步骤，直到到达允许你指定报表 SQL 语句的步骤。到达此步骤时，指定 清单 5-3 中所示的 SQL。\n\n    **清单 5-3.**\
    \ 为交互式报表指定 SQL\n\n    ```\n    SELECT e1.EmpName, e1.EmpTitle, e1.EmpDepartment,\
    \ e2.LeaveDate, e2.LeaveType, e2.LeaveReason, e2.LeaveID FROM Employees e1 LEFT\
    \ JOIN EmpLeave e2 ON e1.EmpID=e2.EmpID\n    ```\n5.  在同一步骤中，为“唯一标识行依据”字段选择“唯一列”，为“唯一列”字段选择“LeaveID”。你现在应该看到如\
    \ 图 5-5 所示的屏幕。单击“下一步”继续。\n\n    ![images](img/0505.jpg)\n\n    **图 5-5.** 为交互式报表指定\
    \ SQL\n\n6.  跳到最后一步以完成向导。现在运行你的报表。你应该看到配方 5-1 中看到的数据列表，并在列表顶部添加了一个新的搜索栏。\n7. \
    \ 单击搜索栏中的放大镜图标并选择“Empname”条目，如 图 5-6 所示。\n\n    ![images](img/0506.jpg)\n\n  \
    \  **图 5-6.** 按员工姓名搜索\n\n8.  完成后，搜索栏现在允许你按员工姓名进行搜索。输入 Janet，然后单击 Enter 开始搜索。报表中显示的结果列表现在被过滤，仅显示与你的搜索条件匹配的条目（参见\
    \ 图 5-7）。\n\n![images](img/0507.jpg)\n\n**图 5-7.** 过滤后的结果列表\n\n#### 工作原理\n\n交互式报表带有一个内置的搜索栏，允许最终用户快速、动态地对报表中显示的结果列表应用过滤器。在本配方中，你可以看到如何切换搜索栏的模式，使报表使用特定字段（本例中为“员工姓名”字段）进行搜索。\n\
    \n### 5-3. 用图形图表可视化数据\n\n#### 问题\n\n你希望以图表的形式呈现数据，以便一目了然地分析数据。例如，你希望分析每位员工请假的频率——并且你希望以\
    \ 3D 饼图的形式将此信息可视化。\n\n![images](img/square.jpg) **注意** 如果你还没有这样做，请执行清单 5-1 来创建本配方使用的示例数据。\n"
- fmt: "## Solution\n\nTo create a page to view your data in a 3D pie chart, follow\
    \ these instructions:\n\n1.  Open an application and choose to create a new page.\n\
    2.  Choose the Chart page type in the first page of the wizard, as shown in [Figure\
    \ 5-8](#Chapter05.html#fig_5_8).\n    ![images](images/0508.jpg)\n    Figure 5-8.\
    \ The chart page type\n3.  In the next step, choose Flash Chart.\n4.  In the following\
    \ step, you need to specify the type of chart you wish to use. Choose the Pie\
    \ & Doughnut chart type.\n5.  In the next step, you are yet again presented with\
    \ a choice of charts, as shown in [Figure 5-9](#Chapter05.html#fig_5_9). Choose\
    \ the 3D pie chart.\n    ![images](images/0509.jpg)\n    Figure 5-9. Choosing\
    \ the 3D pie chart\n6.  Specify Employee Leave Frequency as the name of your page\
    \ in the next step of the wizard.\n7.  Click through the next step. You will now\
    \ be requested to specify the chart title and animation style. Specify Employee\
    \ Leave Frequency as the Chart Title and Side From Left for the Chart Animation\
    \ field, as shown in [Figure 5-10](#Chapter05.html#fig_5_10).\n    ![images](images/0510.jpg)\n\
    \    Figure 5-10. Specifying the chart settings\n8.  In the next step, you will\
    \ specify the SQL statement that returns a dataset used to render the chart; use\
    \ the code in [Listing 5-4](#Chapter05.html#list_5_4).\n    Listing 5-4. Specifying\
    \ the SQL for the Chart\n    ```\n    SELECT '',EmpName,count(*) FROM Employees\
    \ INNER JOIN EmpLeave ON\n        Employees.EmpID=EmpLeave.EmpID GROUP BY EmpName\n\
    \    ```\n9.  You should see the screen shown in [Figure 5-11](#Chapter05.html#fig_5_11).\n\
    \    ![images](images/0511.jpg)\n    Figure 5-11. Specifying the SQL for the chart\n\
    10. Complete the wizard and run the chart page. You should see a nice animated\
    \ pie chart showing the frequency of leave taken for each employee (see [Figure\
    \ 5-12](#Chapter05.html#fig_5_12)).\n    ![images](images/0512.jpg)\n    Figure\
    \ 5-12. The animated chart\n\n## How It Works\n\nThe concept behind most views\
    \ in APEX is similar: the heart of a view consists of the SQL statement that you\
    \ feed it. APEX simply takes the dataset resulting from the SQL query (the dataset\
    \ is expected to be in a certain format) and displays it appropriately.\n\nChart\
    \ views are no different conceptually from any other view. For pie charts specifically,\
    \ APEX always expects the second field in the SQL query to be the label that is\
    \ displayed on the chart for the series. The third field is the numerical value\
    \ for that series.\n\n![images](images/square.jpg) **Note** The format of the\
    \ SQL query differs for different types of charts. You can always refer to the\
    \ sample SQL scripts provided in the same SQL definition page in the wizard. (APEX\
    \ is nice enough to provide hints in their wizards.)\n\n## 5-4. Visualizing Data\
    \ in a Multi-Series Chart\n\n### Problem\n\nYour boss has tasked you to retrieve\
    \ two series of data (global and local sales) and have the amounts displayed in\
    \ a single chart. You instantly recognize that your boss wants to look at a multi-series\
    \ chart but you're unsure how to proceed.\n\n### Solution\n\nTo create a multi-series\
    \ chart, you will first need to create the sample table and data used for this\
    \ recipe. To do so, follow these instructions:\n\n1. Run the following SQL to\
    \ create the `COMPANYSALES` table and the corresponding data:\n    ```\n    CREATE\
    \ TABLE  \"COMPANYSALES\"\n       (    \"ID\" NVARCHAR2(50),\n            \"GLOBALREVENUE\"\
    \ NUMBER(9,2),\n            \"LOCALREVENUE\" NUMBER(9,2),\n            \"PRODUCT\"\
    \ NVARCHAR2(255),\n             CONSTRAINT \"COMPANYSALES_PK\" PRIMARY KEY (\"\
    ID\") ENABLE\n      )\n    /\n\n    INSERT INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\"\
    ,\"LOCALREVENUE\",\"PRODUCT\")\n    VALUES(1,1000,2000,'CAR ENGINES')\n    /\n\
    \    INSERT INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"\
    PRODUCT\")\n    VALUES(2,1500,1900,'SAILBOATS')\n    /\n    INSERT INTO \"COMPANYSALES\"\
    \ (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"PRODUCT\")\n    VALUES(3,200,4000,'BIKES')\n\
    \    /\n    ```\n\nTo setup the multi-series chart, follow these instructions:\n\
    \n1.  Open an existing application and choose to create a new page.\n2.  Choose\
    \ the Chart page type.\n3.  In the next page of the wizard, choose the Flash chart\
    \ type.\n4.  In the next page, choose the Column chart type, as shown in [Figure\
    \ 5-13](#Chapter05.html#fig_5_13).\n    ![images](images/0513.jpg)\n    Figure\
    \ 5-13. The column flash chart type\n5.  In the next page, choose the 3D Stacked\
    \ Column chart type, as shown in [Figure 5-14](#Chapter05.html#fig_5_14).\n  \
    \  ![images](images/0514.jpg)\n    Figure 5-14. The 3D Stacked Column chart type\n\
    6.  Skip the next two steps of the wizard. In the Chart Attributes step, specify\
    \ the title for the chart as Global & Local Sales Summary, as shown in [Figure\
    \ 5-15](#Chapter05.html#fig_5_15).\n    ![images](images/0515.jpg)\n    Figure\
    \ 5-15. Specifying the chart title\n7.  In the next step, specify the following\
    \ SQL datasource query for the chart: `SELECT NULL, PRODUCT, LOCALREVENUE, GLOBALREVENUE\
    \ FROM COMPANYSALES`\n8.  You should now see the screenshot shown in [Figure 5-16](#Chapter05.html#fig_5_16).\n\
    \    ![images](images/0516.jpg)\n    Figure 5-16. Specifying the SQL data source\
    \ for the chart\n9.  Complete the wizard and run the form. You should see the\
    \ multi-series chart shown in [Figure 5-17](#Chapter05.html#fig_5_17).\n    ![images](images/0517.jpg)\n\
    \    Figure 5-17. The multi-series bar chart in action\n\n### How It Works\n\n\
    APEX supports multi-series charts and they are easy to configure. Let's examine\
    \ the SQL you used for the chart.\n\n```\nSELECT NULL, PRODUCT, LOCALREVENUE,\
    \ GLOBALREVENUE FROM COMPANYSALES\n```\n\nThe first SQL field denotes a link (this\
    \ allows you to specify a hyperlink URL to apply on each bar in the chart such\
    \ that when you click on it, you can either drill-down further into yet another\
    \ chart or be redirected to an entirely different page.\n\nThe second SQL field\
    \ allows you to specify the label for the chart. As you can see in [Figure 5-15](#Chapter05.html#fig_5_15),\
    \ the label captions are displayed at the bottom of each bar.\n\nThe third, fourth,\
    \ and nth fields in the SQL statement denote the values to use for each series\
    \ of data. In this recipe, for instance, the `LOCALREVENUE` and `GLOBALREVENUE`\
    \ fields form the first and second series of data for the chart.\n\n## 5-5. Visualizing\
    \ Data on a Calendar\n\n### Problem\n\nYou want to see data plotted on a calendar.\
    \ The report you've created to display the employee leave records is great, but\
    \ you need to visualize it in a more intuitive manner. You wish to have the records\
    \ displayed in a calendar based on the leave date of each individual record.\n\
    \n![images](images/square.jpg) **Note** If you haven't already done so, please\
    \ execute [Listing 5-1](#Chapter05.html#list_5_1) to create the sample data used\
    \ for this recipe."
  raw: "#### Solution\n\nTo create a page to view your data in a 3D pie chart, follow\
    \ these instructions:\n\n1.  Open an application and choose to create a new page.\n\
    2.  Choose the Chart page type in the first page of the wizard, as shown in [Figure\
    \ 5-8](#Chapter05.html#fig_5_8).\n\n    ![images](images/0508.jpg)\n\n    ***Figure\
    \ 5-8.** The chart page type*\n\n3.  In the next step, choose Flash Chart.\n4.\
    \  In the following step, you need to specify the type of chart you wish to use.\
    \ Choose the Pie & Doughnut chart type.\n5.  In the next step, you are yet again\
    \ presented with a choice of charts, as shown in [Figure 5-9](#Chapter05.html#fig_5_9).\
    \ Choose the 3D pie chart.\n\n    ![images](images/0509.jpg)\n\n    ***Figure\
    \ 5-9.** Choosing the 3D pie chart*\n\n6.  Specify Employee Leave Frequency as\
    \ the name of your page in the next step of the wizard.\n7.  Click through the\
    \ next step. You will now be requested to specify the chart title and animation\
    \ style. Specify Employee Leave Frequency as the Chart Title and Side From Left\
    \ for the Chart Animation field, as shown in [Figure 5-10](#Chapter05.html#fig_5_10).\n\
    \n    ![images](images/0510.jpg)\n\n    ***Figure 5-10.** Specifying the chart\
    \ settings*\n\n8.  In the next step, you will specify the SQL statement that returns\
    \ a dataset used to render the chart; use the code in [Listing 5-4](#Chapter05.html#list_5_4).\n\
    \n    ***Listing 5-4.** Specifying the SQL for the Chart*\n\n    `SELECT '',EmpName,count(*)\
    \ FROM Employees INNER JOIN EmpLeave ON`\n    `        Employees.EmpID=EmpLeave.EmpID\
    \ GROUP BY EmpName`\n9.  You should see the screen shown in [Figure 5-11](#Chapter05.html#fig_5_11).\n\
    \n    ![images](images/0511.jpg)\n\n    ***Figure 5-11.** Specifying the SQL for\
    \ the chart*\n\n10.  Complete the wizard and run the chart page. You should see\
    \ a nice animated pie chart showing the frequency of leave taken for each employee\
    \ (see [Figure 5-12](#Chapter05.html#fig_5_12)).\n\n![images](images/0512.jpg)\n\
    \n***Figure 5-12.** The animated chart*\n\n#### How It Works\n\nThe concept behind\
    \ most views in APEX is similar: the heart of a view consists of the SQL statement\
    \ that you feed it. APEX simply takes the dataset resulting from the SQL query\
    \ (the dataset is expected to be in a certain format) and displays it appropriately.\n\
    \nChart views are no different conceptually from any other view. For pie charts\
    \ specifically, APEX always expects the second field in the SQL query to be the\
    \ label that is displayed on the chart for the series. The third field is the\
    \ numerical value for that series.\n\n![images](images/square.jpg) **Note** The\
    \ format of the SQL query differs for different types of charts. You can always\
    \ refer to the sample SQL scripts provided in the same SQL definition page in\
    \ the wizard. (APEX is nice enough to provide hints in their wizards.)\n\n###\
    \ 5-4. Visualizing Data in a Multi-Series Chart\n\n#### Problem\n\nYour boss has\
    \ tasked you to retrieve two series of data (global and local sales) and have\
    \ the amounts displayed in a single chart. You instantly recognize that your boss\
    \ wants to look at a multi-series chart but you're unsure how to proceed.\n\n\
    #### Solution\n\nTo create a multi-series chart, you will first need to create\
    \ the sample table and data used for this recipe. To do so, follow these instructions:\n\
    \n1\\. Run the following SQL to create the COMPANYSALES table and the corresponding\
    \ data:\n\n`CREATE TABLE  \"COMPANYSALES\"`\n`   (    \"ID\" NVARCHAR2(50),`\n\
    `        \"GLOBALREVENUE\" NUMBER(9,2),`\n`        \"LOCALREVENUE\" NUMBER(9,2),`\n\
    `        \"PRODUCT\" NVARCHAR2(255),`\n`         CONSTRAINT \"COMPANYSALES_PK\"\
    \ PRIMARY KEY (\"ID\") ENABLE`\n`  )`\n`/`\n\n`INSERT INTO \"COMPANYSALES\" (\"\
    ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"PRODUCT\")`\n`VALUES(1,1000,2000,'CAR\
    \ ENGINES')`\n`/`\n`INSERT INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\",\"\
    LOCALREVENUE\",\"PRODUCT\")`\n`VALUES(2,1500,1900,'SAILBOATS')`\n`/`\n`INSERT\
    \ INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"PRODUCT\"\
    )`\n`VALUES(3,200,4000,'BIKES')`\n`/`\n\nTo setup the multi-series chart, follow\
    \ these instructions:\n\n1.  Open an existing application and choose to create\
    \ a new page.\n2.  Choose the Chart page type.\n3.  In the next page of the wizard,\
    \ choose the Flash chart type.\n4.  In the next page, choose the Column chart\
    \ type, as shown in [Figure 5-13](#Chapter05.html#fig_5_13).\n\n    ![images](images/0513.jpg)\n\
    \n    ***Figure 5-13.** The column flash chart type*\n\n5.  In the next page,\
    \ choose the 3D Stacked Column chart type, as shown in [Figure 5-14](#Chapter05.html#fig_5_14).\n\
    \n    ![images](images/0514.jpg)\n\n    ***Figure 5-14.** The 3D Stacked Column\
    \ chart type*\n\n6.  Skip the next two steps of the wizard. In the Chart Attributes\
    \ step, specify the title for the chart as Global & Local Sales Summary, as shown\
    \ in [Figure 5-15](#Chapter05.html#fig_5_15).\n\n    ![images](images/0515.jpg)\n\
    \n    ***Figure 5-15.** Specifying the chart title*\n\n7.  In the next step, specify\
    \ the following SQL datasource query for the chart: `SELECT NULL, PRODUCT, LOCALREVENUE,\
    \ GLOBALREVENUE FROM COMPANYSALES`\n8.  You should now see the screenshot shown\
    \ in [Figure 5-16](#Chapter05.html#fig_5_16).\n\n    ![images](images/0516.jpg)\n\
    \n    ***Figure 5-16.** Specifying the SQL data source for the chart*\n\n9.  Complete\
    \ the wizard and run the form. You should see the multi-series chart shown in\
    \ [Figure 5-17](#Chapter05.html#fig_5_17).\n\n![images](images/0517.jpg)\n\n***Figure\
    \ 5-17.** The multi-series bar chart in action*\n\n#### How It Works\n\nAPEX supports\
    \ multi-series charts and they are easy to configure. Let's examine the SQL you\
    \ used for the chart.\n\n`SELECT NULL, PRODUCT, LOCALREVENUE, GLOBALREVENUE FROM\
    \ COMPANYSALES`\n\nThe first SQL field denotes a link (this allows you to specify\
    \ a hyperlink URL to apply on each bar in the chart such that when you click on\
    \ it, you can either drill-down further into yet another chart or be redirected\
    \ to an entirely different page.\n\nThe second SQL field allows you to specify\
    \ the label for the chart. As you can see in [Figure 5-15](#Chapter05.html#fig_5_15),\
    \ the label captions are displayed at the bottom of each bar.\n\nThe third, fourth,\
    \ and nth fields in the SQL statement denote the values to use for each series\
    \ of data. In this recipe, for instance, the `LOCALREVENUE` and `GLOBALREVENUE`\
    \ fields form the first and second series of data for the chart.\n\n### 5-5. Visualizing\
    \ Data on a Calendar\n\n#### Problem\n\nYou want to see data plotted on a calendar.\
    \ The report you've created to display the employee leave records is great, but\
    \ you need to visualize it in a more intuitive manner. You wish to have the records\
    \ displayed in a calendar based on the leave date of each individual record.\n\
    \n![images](images/square.jpg) **Note** If you haven't already done so, please\
    \ execute [Listing 5-1](#Chapter05.html#list_5_1) to create the sample data used\
    \ for this recipe."
  trans: "## 解决方案\n\n要创建一个以 3D 饼图展示数据的页面，请遵循以下指引：\n\n1.  打开一个应用程序，选择创建新页面。\n2.  在向导的第一页中，选择“图表”页面类型，如图\
    \ 5-8 所示。\n    ![images](img/0508.jpg)\n    图 5-8. 图表页面类型\n3.  在下一步中，选择“Flash\
    \ 图表”。\n4.  在接下来的步骤中，您需要指定要使用的图表类型。请选择“饼图与圆环图”类型。\n5.  在下一步中，您将再次面临图表选择，如图 5-9\
    \ 所示。选择“3D 饼图”。\n    ![images](img/0509.jpg)\n    图 5-9. 选择 3D 饼图\n6.  在向导的下一步中，将页面名称指定为“员工休假频率”。\n\
    7.  点击通过下一步。现在系统将要求您指定图表标题和动画样式。在“图表标题”字段中指定“员工休假频率”，在“图表动画”字段中选择“从左侧滑入”，如图 5-10\
    \ 所示。\n    ![images](img/0510.jpg)\n    图 5-10. 指定图表设置\n8.  在下一步中，您将指定返回用于渲染图表的数据集的\
    \ SQL 语句；使用代码清单 5-4 中的代码。\n    代码清单 5-4. 指定图表的 SQL\n    ```\n    SELECT '',EmpName,count(*)\
    \ FROM Employees INNER JOIN EmpLeave ON\n        Employees.EmpID=EmpLeave.EmpID\
    \ GROUP BY EmpName\n    ```\n9.  您应该会看到如图 5-11 所示的屏幕。\n    ![images](img/0511.jpg)\n\
    \    图 5-11. 为图表指定 SQL\n10. 完成向导并运行该图表页面。您应该能看到一个漂亮的动画饼图，显示每位员工的休假频率（参见图 5-12）。\n\
    \    ![images](img/0512.jpg)\n    图 5-12. 动画图表\n\n## 工作原理\n\nAPEX 中大多数视图背后的概念是相似的：视图的核心是您提供给它的\
    \ SQL 语句。APEX 只是获取 SQL 查询结果的数据集（该数据集预期具有特定格式）并适当地显示它。\n\n图表视图在概念上与其他任何视图并无不同。具体对于饼图，APEX\
    \ 始终期望 SQL 查询中的第二个字段是图表上为数据系列显示的标签。第三个字段是该系列的数值。\n\n![images](img/square.jpg)\
    \ **注意** 不同类型的图表，其 SQL 查询的格式有所不同。您始终可以参考向导中同一 SQL 定义页面提供的示例 SQL 脚本。（APEX 在其向导中非常贴心地提供了提示。）\n\
    \n## 5-4. 在多系列图表中可视化数据\n\n### 问题\n\n您的老板要求您检索两组数据系列（全球和本地销售额），并将其金额显示在单个图表中。您立刻意识到您的老板想要查看一个多系列图表，但不确定如何继续。\n\
    \n### 解决方案\n\n要创建一个多系列图表，您首先需要为此配方创建示例表和数据。请遵循以下指引：\n\n1.  运行以下 SQL 来创建 `COMPANYSALES`\
    \ 表及相应的数据：\n    ```\n    CREATE TABLE  \"COMPANYSALES\"\n       (    \"ID\" NVARCHAR2(50),\n\
    \            \"GLOBALREVENUE\" NUMBER(9,2),\n            \"LOCALREVENUE\" NUMBER(9,2),\n\
    \            \"PRODUCT\" NVARCHAR2(255),\n             CONSTRAINT \"COMPANYSALES_PK\"\
    \ PRIMARY KEY (\"ID\") ENABLE\n      )\n    /\n\n    INSERT INTO \"COMPANYSALES\"\
    \ (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"PRODUCT\")\n    VALUES(1,1000,2000,'CAR\
    \ ENGINES')\n    /\n    INSERT INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\"\
    ,\"LOCALREVENUE\",\"PRODUCT\")\n    VALUES(2,1500,1900,'SAILBOATS')\n    /\n \
    \   INSERT INTO \"COMPANYSALES\" (\"ID\",\"GLOBALREVENUE\",\"LOCALREVENUE\",\"\
    PRODUCT\")\n    VALUES(3,200,4000,'BIKES')\n    /\n    ```\n\n要设置多系列图表，请遵循以下指引：\n\
    \n1.  打开一个现有应用程序，选择创建新页面。\n2.  选择“图表”页面类型。\n3.  在向导的下一页中，选择“Flash 图表”类型。\n4. \
    \ 在接下来的页面中，选择“柱形图”类型，如图 5-13 所示。\n    ![images](img/0513.jpg)\n    图 5-13. 柱形\
    \ Flash 图表类型\n5.  在下一页中，选择“3D 堆积柱形图”类型，如图 5-14 所示。\n    ![images](img/0514.jpg)\n\
    \    图 5-14. 3D 堆积柱形图类型\n6.  跳过向导的接下来两个步骤。在“图表属性”步骤中，将图表的标题指定为“全球与本地销售摘要”，如图 5-15\
    \ 所示。\n    ![images](img/0515.jpg)\n    图 5-15. 指定图表标题\n7.  在下一步中，为图表指定以下 SQL\
    \ 数据源查询：`SELECT NULL, PRODUCT, LOCALREVENUE, GLOBALREVENUE FROM COMPANYSALES`\n\
    8.  您现在应该会看到如图 5-16 所示的屏幕截图。\n    ![images](img/0516.jpg)\n    图 5-16. 为图表指定 SQL\
    \ 数据源\n9.  完成向导并运行该表单。您应该能看到如图 5-17 所示的多系列图表。\n    ![images](img/0517.jpg)\n \
    \   图 5-17. 运行中的多系列条形图\n\n### 工作原理\n\nAPEX 支持多系列图表，并且它们易于配置。让我们检查一下您用于该图表的 SQL。\n\
    \n```\nSELECT NULL, PRODUCT, LOCALREVENUE, GLOBALREVENUE FROM COMPANYSALES\n```\n\
    \n第一个 SQL 字段表示一个链接（这允许您为图表中的每个条形指定一个超链接 URL，当您点击它时，可以进一步深入查看另一个图表，或者被重定向到完全不同的页面。\n\
    \n第二个 SQL 字段允许您指定图表的标签。如您在图 5-15 中所见，标签标题显示在每个条形的底部。\n\nSQL 语句中的第三、第四及第 n 个字段表示用于每个数据系列的值。例如，在此配方中，`LOCALREVENUE`\
    \ 和 `GLOBALREVENUE` 字段构成了图表的第一个和第二个数据系列。\n\n## 5-5. 在日历上可视化数据\n\n### 问题\n\n您希望看到数据绘制在日历上。您创建的用于显示员工休假记录的报告很好，但您需要以更直观的方式对其进行可视化。您希望根据每条记录的休假日期将记录显示在日历上。\n\
    \n![images](img/square.jpg) **注意** 如果您尚未执行，请运行代码清单 5-1 来创建此配方所用的示例数据。"
- fmt: "# 5-6. Visualizing Data on a Map\n\n## Solution\n\nHere are the steps to follow\
    \ to create a page to view your data on a calendar:\n\n1.  To run the sample in\
    \ this recipe, you need to first add a new record to the `EmpLeave` table. Run\
    \ the query shown in [Listing 5-5](#Chapter05.html#list_5_5) via SQL workshop.\
    \ Take note to change the date of the `LEAVEDATE` in this query to reflect the\
    \ current month and year.\n\n    **Listing 5-5.** Inserting an Additional Sample\
    \ Record\n\n    ```sql\n    INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
    \    VALUES('E1',TO_DATE('20110110', 'YYYYMMDD'),'Maternity Leave','Maternity','L4')\n\
    \    ```\n2.  Open an application and choose to create a new page.\n3.  Choose\
    \ the Calendar page type in the first page of the wizard, as shown in [Figure\
    \ 5-18](#Chapter05.html#fig_5_18).\n\n    ![images](images/0518.jpg)\n\n    **Figure\
    \ 5-18.** The Calendar page type\n\n4.  In the next step, choose SQL calendar.\n\
    5.  Specify Employee Leave calendar as the name of your page.\n6.  Click through\
    \ the next step. You will now see an area where you can define the SQL for the\
    \ calendar; specify the SQL shown in [Listing 5-6](#Chapter05.html#list_5_6).\n\
    \n    **Listing 5-6.** Specifying the SQL for the Calendar\n\n    ```sql\n   \
    \ SELECT EmpName, Leavedate FROM Employees,EmpLeave WHERE Employees.EmpID=EmpLeave.EmpID\n\
    \    ```\n7.  You should now see the screen shown in [Figure 5-19](#Chapter05.html#fig_5_19).\n\
    \n    ![images](images/0519.jpg)\n\n    **Figure 5-19.** Specifying the SQL for\
    \ the calendar\n\n8.  In the next step, you will be asked to specify the database\
    \ field to use for the date column and the display column. Select `LEAVEDATE`\
    \ for the date column and `EMPNAME` for the display column.\n9.  Navigate to the\
    \ end of the wizard and run your calendar page. You should see the record you've\
    \ just created show up in the calendar, as shown in [Figure 5-20](#Chapter05.html#fig_5_20).\n\
    \n![images](images/0520.jpg)\n\n**Figure 5-20.** The calendar in action\n\n##\
    \ How It Works\n\nCalendar views are also similar to chart views in the sense\
    \ that the SQL you specify has to adhere to a specific format. In the calendar\
    \ view case, the first field in the SQL query refers to the label that will be\
    \ displayed on the calendar while the second field in the query refers to the\
    \ date field that is used to populate your records on the calendar.\n\n# 5-6.\
    \ Visualizing Data on a Map\n\n## Problem\n\nYou have a database table containing\
    \ the total sales data for a number of countries in Europe. Your boss wants you\
    \ to have that data populated on top of a map of Europe. You have less than a\
    \ day to get it done and you are not sure how to proceed.\n\n## Solution\n\nTo\
    \ create a visual map on your page, you must first set up the sales data sample\
    \ table used in this recipe. To do so, follow these instructions:\n\n1.  Create\
    \ the sample sales table by running the SQL shown in [Listing 5-7](#Chapter05.html#list_5_7).\n\
    \n    **Listing 5-7.** Creating the Sample `SalesData` Table\n\n    ```sql\n \
    \   CREATE TABLE  \"SALESDATA\"\n       (    \"SALES\" NUMBER(9,2),\n        \
    \    \"ID\" NVARCHAR2(50),\n            \"COUNTRY\" NVARCHAR2(255),\n        \
    \     CONSTRAINT \"SALESDATA_PK\" PRIMARY KEY (\"ID\") ENABLE\n       )\n\n  \
    \  INSERT INTO SALESDATA(SALES,ID,COUNTRY) VALUES(5000,1,'UNITED KINGDOM')\n\n\
    \    INSERT INTO SALESDATA(SALES,ID,COUNTRY) VALUES(6000,2,'IRELAND')\n\n    INSERT\
    \ INTO SALESDATA(SALES,ID,COUNTRY) VALUES(6780,3,'FRANCE')\n    ```\n\nTo create\
    \ a map to display the data from the `SalesData` table, follow these instructions:\n\
    \n1.  Open an existing application and choose to create a new page. Choose the\
    \ Map page type in the first page of the wizard, as shown in [Figure 5-21](#Chapter05.html#fig_5_21).\n\
    \n    ![images](images/0521.jpg)\n\n    **Figure 5-21.** The Map page type\n\n\
    2.  In the next page of the wizard, choose the World and Continent Maps item shown\
    \ in [Figure 5-22](#Chapter05.html#fig_5_22). We choose this map instead of the\
    \ European maps collection because we want a map that displays all the European\
    \ countries in a single view. The European maps collection displays single European\
    \ countries.\n\n    ![images](images/0522.jpg)\n\n    **Figure 5-22.** The World\
    \ and Continent Maps package\n\n3.  In the next page, choose the Europe (without\
    \ Russia) map shown in [Figure 5-23](#Chapter05.html#fig_5_23). Of course, you\
    \ may choose the Europe map if you have data that includes sales statistics for\
    \ Russia.\n\n    ![images](images/0523.jpg)\n\n    **Figure 5-23.** The Europe\
    \ (without Russia) map\n\n4.  Skip past the next two pages of the wizard.\n5.\
    \  At the Map Attributes step of the wizard, specify a map title (such as ACME\
    \ EUROPEAN SALES).\n6.  In the next page of the wizard, specify the following\
    \ SQL query: `SELECT NULL LINK, COUNTRY, SUM(SALES) FROM SALESDATA GROUP BY COUNTRY`\n\
    7.  You should now see the screen shown in [Figure 5-24](#Chapter05.html#fig_5_24).\n\
    \n    ![images](images/0524.jpg)\n\n    **Figure 5-24.** Specifying the datasource\
    \ for the map\n\n8.  Skip the next step of the wizard and click the Finish button\
    \ to create the map.\n9.  Run the page. You should see the map with your sales\
    \ data displayed on each corresponding country, as shown in [Figure 5-25](#Chapter05.html#fig_5_25).\n\
    \n    ![images](images/0525.jpg)\n\n    **Figure 5-25.** The map in action\n\n\
    10. If you mouseover each country, you can see a little tool tip displaying the\
    \ total sales amount for that country. You can also zoom in/zoom out and pan the\
    \ map using the navigation tools at the right.\n\n## How It Works\n\nYou can represent\
    \ data on visual maps packaged with the APEX software. APEX provides a rich set\
    \ of maps of different parts of the world, and it allows you to overlay statistical\
    \ data on top of these maps.\n\nYou might have noticed that APEX matched your\
    \ data to the visual maps using the name of the country you've provided. Is it\
    \ possible, then, to get the full list of country names, state names, or province\
    \ names that are intrinsically recognized by APEX? APEX uses the third-party `AnyMap`\
    \ component to render its maps (and as a sideline note, the `AnyCharts` component\
    \ to render its Flash charts). The country names mentioned earlier are actually\
    \ defined by the `AnyMap` product. If you navigate to the AnyMap online documentation\
    \ at [`http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html`](http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html)\
    \ and go to Maps ![images](images/U001.jpg) Maps Reference ![images](images/U001.jpg)\
    \ World ![images](images/U001.jpg) World and Continent Maps ![images](images/U001.jpg)\
    \ Europe without Russia, you will see the full list of country names for this\
    \ region (also shown in [Figure 5-26](#Chapter05.html#fig_5_26)).\n\n![images](images/0526.jpg)\n\
    \n**Figure 5-26.** `AnyMap` documentation\n\n![images](images/square.jpg) **Note**\
    \ This type of mapping technology is different compared to, say, Google maps in\
    \ the sense that these are not navigation maps, nor do they allow positioning\
    \ of objects on the maps using GPS coordinates. These maps are used more to highlight\
    \ or complement statistical data (for instance, showing the population of each\
    \ country, total sales for each province in a country, and so on).\n\n# 5-7. Putting\
    \ it all Together into a Dashboard Page\n\n## Problem\n\nYou need dashboard functionality.\
    \ You need to display a graphical chart and report for simultaneous viewing on\
    \ the same page. For example, you'd like to create a dashboard showing employee\
    \ leave frequency along with a list of all employees, and you want the employee\
    \ leave frequency displayed as a pie chart."
  raw: "#### Solution\n\nHere are the steps to follow to create a page to view your\
    \ data on a calendar:\n\n1.  To run the sample in this recipe, you need to first\
    \ add a new record to the EmpLeave table. Run the query shown in [Listing 5-5](#Chapter05.html#list_5_5)\
    \ via SQL workshop. Take note to change the date of the `LEAVEDATE` in this query\
    \ to reflect the current month and year.\n\n    ***Listing 5-5.** Inserting an\
    \ Additional Sample Record*\n\n    `INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)`\n\
    \    `VALUES('E1',TO_DATE('20110110', 'YYYYMMDD'),'Maternity Leave','Maternity','L4')`\n\
    2.  Open an application and choose to create a new page.\n3.  Choose the Calendar\
    \ page type in the first page of the wizard, as shown in [Figure 5-18](#Chapter05.html#fig_5_18).\n\
    \n    ![images](images/0518.jpg)\n\n    ***Figure 5-18.** The Calendar page type*\n\
    \n4.  In the next step, choose SQL calendar.\n5.  Specify Employee Leave calendar\
    \ as the name of your page.\n6.  Click through the next step. You will now see\
    \ an area where you can define the SQL for the calendar; specify the SQL shown\
    \ in [Listing 5-6](#Chapter05.html#list_5_6).\n\n    ***Listing 5-6.** Specifying\
    \ the SQL for the Calendar*\n\n    `SELECT EmpName, Leavedate FROM Employees,EmpLeave\
    \ WHERE Employees.EmpID=EmpLeave.EmpID`\n7.  You should now see the screen shown\
    \ in [Figure 5-19](#Chapter05.html#fig_5_19).\n\n    ![images](images/0519.jpg)\n\
    \n    ***Figure 5-19.** Specifying the SQL for the calendar*\n\n8.  In the next\
    \ step, you will be asked to specify the database field to use for the date column\
    \ and the display column. Select `LEAVEDATE` for the date column and `EMPNAME`\
    \ for the display column.\n9.  Navigate to the end of the wizard and run your\
    \ calendar page. You should see the record you've just created show up in the\
    \ calendar, as shown in [Figure 5-20](#Chapter05.html#fig_5_20).\n\n![images](images/0520.jpg)\n\
    \n***Figure 5-20.** The calendar in action*\n\n#### How It Works\n\nCalendar views\
    \ are also similar to chart views in the sense that the SQL you specify has to\
    \ adhere to a specific format. In the calendar view case, the first field in the\
    \ SQL query refers to the label that will be displayed on the calendar while the\
    \ second field in the query refers to the date field that is used to populate\
    \ your records on the calendar.\n\n### 5-6. Visualizing Data on a Map\n\n####\
    \ Problem\n\nYou have a database table containing the total sales data for a number\
    \ of countries in Europe. Your boss wants you to have that data populated on top\
    \ of a map of Europe. You have less than a day to get it done and you are not\
    \ sure how to proceed.\n\n#### Solution\n\nTo create a visual map on your page,\
    \ you must first set up the sales data sample table used in this recipe. To do\
    \ so, follow these instructions:\n\n1\\. Create the sample sales table by running\
    \ the SQL shown in [Listing 5-7](#Chapter05.html#list_5_7).\n\n***Listing 5-7.**\
    \ Ccreating the Sample SalesData Table*\n\n`CREATE TABLE  \"SALESDATA\"`\n`   (    \"\
    SALES\" NUMBER(9,2),`\n`        \"ID\" NVARCHAR2(50),`\n`        \"COUNTRY\" NVARCHAR2(255),`\n\
    `         CONSTRAINT \"SALESDATA_PK\" PRIMARY KEY (\"ID\") ENABLE`\n`   )`\n\n\
    `INSERT INTO SALESDATA(SALES,ID,COUNTRY) VALUES(5000,1,'UNITED KINGDOM')`\n\n\
    `INSERT INTO SALESDATA(SALES,ID,COUNTRY) VALUES(6000,2,'IRELAND')`\n\n`INSERT\
    \ INTO SALESDATA(SALES,ID,COUNTRY) VALUES(6780,3,'FRANCE')`\n\nTo create a map\
    \ to display the data from the SalesData table, follow these instructions:\n\n\
    1.  Open an existing application and choose to create a new page. Choose the Map\
    \ page type in the first page of the wizard, as shown in [Figure 5-21](#Chapter05.html#fig_5_21).\n\
    \n    ![images](images/0521.jpg)\n\n    ***Figure 5-21.** The Map page type*\n\
    \n2.  In the next page of the wizard, choose the World and Continent Maps item\
    \ shown in [Figure 5-22](#Chapter05.html#fig_5_22). We choose this map instead\
    \ of the European maps collection because we want a map that displays all the\
    \ European countries in a single view. The European maps collection displays single\
    \ European countries.\n\n    ![images](images/0522.jpg)\n\n    ***Figure 5-22.**\
    \ The World and Continent Maps package*\n\n3.  In the next page, choose the Europe\
    \ (without Russia) map shown in [Figure 5-23](#Chapter05.html#fig_5_23). Of course,\
    \ you may choose the Europe map if you have data that includes sales statistics\
    \ for Russia.\n\n    ![images](images/0523.jpg)\n\n    ***Figure 5-23.** The Europe\
    \ (without Russia) map*\n\n4.  Skip past the next two pages of the wizard.\n5.\
    \  At the Map Attributes step of the wizard, specify a map title (such as ACME\
    \ EUROPEAN SALES).\n6.  In the next page of the wizard, specify the following\
    \ SQL query: `SELECT NULL LINK, COUNTRY, SUM(SALES) FROM SALESDATA GROUP BY COUNTRY`\n\
    7.  You should now see the screen shown in [Figure 5-24](#Chapter05.html#fig_5_24).\n\
    \n    ![images](images/0524.jpg)\n\n    ***Figure 5-24.** Specifying the datasource\
    \ for the map*\n\n8.  Skip the next step of the wizard and click the Finish button\
    \ to create the map.\n9.  Run the page. You should see the map with your sales\
    \ data displayed on each corresponding country, as shown in [Figure 5-25](#Chapter05.html#fig_5_25).\n\
    \n    ![images](images/0525.jpg)\n\n    ***Figure 5-25.** The map in action*\n\
    \n10.  If you mouseover each country, you can see a little tool tip displaying\
    \ the total sales amount for that country. You can also zoom in/zoom out and pan\
    \ the map using the navigation tools at the right.\n\n#### How It Works\n\nYou\
    \ can represent data on visual maps packaged with the APEX software. APEX provides\
    \ a rich set of maps of different parts of the world, and it allows you to overlay\
    \ statistical data on top of these maps.\n\nYou might have noticed that APEX matched\
    \ your data to the visual maps using the name of the country you've provided.\
    \ Is it possible, then, to get the full list of country names, state names, or\
    \ province names that are intrinsically recognized by APEX? APEX uses the third-party\
    \ AnyMap component to render its maps (and as a sideline note, the AnyCharts component\
    \ to render its Flash charts). The country names mentioned earlier are actually\
    \ defined by the AnyMap product. If you navigate to the AnyMap online documentation\
    \ at [`http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html`](http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html)\
    \ and go to Maps ![images](images/U001.jpg) Maps Reference ![images](images/U001.jpg)\
    \ World ![images](images/U001.jpg) World and Continent Maps ![images](images/U001.jpg)\
    \ Europe without Russia, you will see the full list of country names for this\
    \ region (also shown in [Figure 5-26](#Chapter05.html#fig_5_26)).\n\n![images](images/0526.jpg)\n\
    \n***Figure 5-26.** AnyMap documentation*\n\n![images](images/square.jpg) **Note**\
    \ This type of mapping technology is different compared to, say, Google maps in\
    \ the sense that these are not navigation maps, nor do they allow positioning\
    \ of objects on the maps using GPS coordinates. These maps are used more to highlight\
    \ or complement statistical data (for instance, showing the population of each\
    \ country, total sales for each province in a country, and so on).\n\n### 5-7.\
    \ Putting it all Together into a Dashboard Page\n\n#### Problem\n\nYou need dashboard\
    \ functionality. You need to display a graphical chart and report for simultaneous\
    \ viewing on the same page. For example, you'd like to create a dashboard showing\
    \ employee leave frequency along with a list of all employees, and you want the\
    \ employee leave frequency displayed as a pie chart."
  trans: "\n# 5-6. 在地图上可视化数据\n\n## 解决方案\n\n要在日历上查看数据，请按照以下步骤创建页面：\n\n1.  要运行此示例中的示例，您需要先向\
    \ `EmpLeave` 表中添加一条新记录。通过 SQL Workshop 运行如 Listing 5-5 所示的查询。请注意，需将查询中的 `LEAVEDATE`\
    \ 日期更改为当前月份和年份。\n\n    **清单 5-5.** 插入一条附加示例记录\n\n    ```sql\n    INSERT INTO EMPLEAVE(EMPID,LEAVEDATE,LEAVETYPE,LEAVEREASON,LEAVEID)\n\
    \    VALUES('E1',TO_DATE('20110110', 'YYYYMMDD'),'Maternity Leave','Maternity','L4')\n\
    \    ```\n2.  打开一个应用程序并选择创建新页面。\n3.  在向导的第一页中选择日历页面类型，如 图 5-18 所示。\n\n    ![images](img/0518.jpg)\n\
    \n    **图 5-18.** 日历页面类型\n\n4.  在下一步中，选择 SQL 日历。\n5.  将页面名称指定为 Employee Leave\
    \ 日历。\n6.  点击进入下一步。您现在将看到一个可以定义日历 SQL 的区域；指定如 清单 5-6 所示的 SQL。\n\n    **清单 5-6.**\
    \ 为日历指定 SQL\n\n    ```sql\n    SELECT EmpName, Leavedate FROM Employees,EmpLeave\
    \ WHERE Employees.EmpID=EmpLeave.EmpID\n    ```\n7.  您现在应该看到如 图 5-19 所示的屏幕。\n\n\
    \    ![images](img/0519.jpg)\n\n    **图 5-19.** 为日历指定 SQL\n\n8.  在下一步中，系统将要求您指定用于日期列和显示列的数据库字段。为日期列选择\
    \ `LEAVEDATE`，为显示列选择 `EMPNAME`。\n9.  导航到向导末尾并运行您的日历页面。您应该会看到刚刚创建的记录显示在日历中，如 图\
    \ 5-20 所示。\n\n![images](img/0520.jpg)\n\n**图 5-20.** 运行中的日历\n\n## 工作原理\n\n日历视图与图表视图类似，因为您指定的\
    \ SQL 必须遵循特定格式。在日历视图中，SQL 查询的第一个字段指的是将在日历上显示的标签，而查询中的第二个字段指的是用于在日历上填充记录的日期字段。\n\
    \n# 5-6. 在地图上可视化数据\n\n## 问题\n\n您有一个包含欧洲多个国家总销售数据的数据库表。您的老板希望您将这些数据填充到欧洲地图上。您只有一天不到的时间来完成，而且不确定如何进行。\n\
    \n## 解决方案\n\n要在页面上创建可视化地图，您必须首先设置此示例中使用的销售数据示例表。请按照以下说明操作：\n\n1.  通过运行 清单 5-7\
    \ 所示的 SQL 创建示例销售表。\n\n    **清单 5-7.** 创建示例 `SalesData` 表\n\n    ```sql\n    CREATE\
    \ TABLE  \"SALESDATA\"\n       (    \"SALES\" NUMBER(9,2),\n            \"ID\"\
    \ NVARCHAR2(50),\n            \"COUNTRY\" NVARCHAR2(255),\n             CONSTRAINT\
    \ \"SALESDATA_PK\" PRIMARY KEY (\"ID\") ENABLE\n       )\n\n    INSERT INTO SALESDATA(SALES,ID,COUNTRY)\
    \ VALUES(5000,1,'UNITED KINGDOM')\n\n    INSERT INTO SALESDATA(SALES,ID,COUNTRY)\
    \ VALUES(6000,2,'IRELAND')\n\n    INSERT INTO SALESDATA(SALES,ID,COUNTRY) VALUES(6780,3,'FRANCE')\n\
    \    ```\n\n要创建地图以显示来自 `SalesData` 表的数据，请按照以下说明操作：\n\n1.  打开现有应用程序并选择创建新页面。在向导的第一页中选择地图页面类型，如\
    \ 图 5-21 所示。\n\n    ![images](img/0521.jpg)\n\n    **图 5-21.** 地图页面类型\n\n2.  在向导的下一页中，选择如\
    \ 图 5-22 所示的“世界和大陆地图”项。我们选择此地图而不是欧洲地图集合，是因为我们希望使用一个能在单一视图中显示所有欧洲国家的地图。欧洲地图集合则显示单个欧洲国家。\n\
    \n    ![images](img/0522.jpg)\n\n    **图 5-22.** “世界和大陆地图”包\n\n3.  在下一页中，选择如 图\
    \ 5-23 所示的“欧洲（不含俄罗斯）”地图。当然，如果您有包含俄罗斯销售统计信息的数据，您可以选择“欧洲”地图。\n\n    ![images](img/0523.jpg)\n\
    \n    **图 5-23.** “欧洲（不含俄罗斯）”地图\n\n4.  跳过向导接下来的两页。\n5.  在向导的“地图属性”步骤，指定地图标题（例如“ACME\
    \ 欧洲销售”）。\n6.  在向导的下一页，指定以下 SQL 查询：`SELECT NULL LINK, COUNTRY, SUM(SALES) FROM\
    \ SALESDATA GROUP BY COUNTRY`\n7.  您现在应该看到如 图 5-24 所示的屏幕。\n\n    ![images](img/0524.jpg)\n\
    \n    **图 5-24.** 为地图指定数据源\n\n8.  跳过向导的下一步，单击“完成”按钮以创建地图。\n9.  运行该页面。您应该会看到地图上每个对应国家都显示了您的销售数据，如\
    \ 图 5-25 所示。\n\n    ![images](img/0525.jpg)\n\n    **图 5-25.** 运行中的地图\n\n10. 如果将鼠标悬停在每个国家上，您可以看到一个显示该国家总销售额的小型工具提示。您还可以使用右侧的导航工具对地图进行缩放/缩小和平移。\n\
    \n## 工作原理\n\n您可以使用 APEX 软件包中提供的可视化地图来呈现数据。APEX 提供了丰富的世界各地地图，并允许您将统计数据覆盖在这些地图上。\n\
    \n您可能已经注意到，APEX 使用您提供的国家名称将您的数据与可视化地图进行匹配。那么，是否有可能获取 APEX 内部识别的国家名称、州名称或省名称的完整列表？APEX\
    \ 使用第三方 `AnyMap` 组件来渲染其地图（顺便提一下，使用 `AnyCharts` 组件来渲染其 Flash 图表）。前面提到的国家名称实际上是由\
    \ `AnyMap` 产品定义的。如果您导航到 AnyMap 的在线文档 [`http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html`](http://anychart.com/products/anychart/docs/users-guide/index.html?maps-overview.html)\
    \ 并按照路径 Maps ![images](img/U001.jpg) Maps Reference ![images](img/U001.jpg) World\
    \ ![images](img/U001.jpg) World and Continent Maps ![images](img/U001.jpg) Europe\
    \ without Russia 进行导航，您将看到此区域的国家名称完整列表（如 图 5-26 所示）。\n\n![images](img/0526.jpg)\n\
    \n**图 5-26.** `AnyMap` 文档\n\n![images](img/square.jpg) **注意** 这种地图技术与 Google 地图等不同，因为这些不是导航地图，也不允许使用\
    \ GPS 坐标在地图上定位对象。这些地图更多用于突出显示或补充统计数据（例如，显示每个国家的人口、一个国家内每个省份的总销售额等）。\n\n# 5-7.\
    \ 将所有内容整合到一个仪表板页面中\n\n## 问题\n\n您需要仪表板功能。您需要在同一个页面上同时显示图形图表和报告以供查看。例如，您希望创建一个显示员工请假频率以及所有员工列表的仪表板，并且您希望员工请假频率以饼图形式显示。\n"
- fmt: "#### Solution\n\nTo create a dashboard that combines a pie chart and a report,\
    \ please follow these instructions:\n\n1.  Open an application and create a new\
    \ page.\n2.  Choose to create a Blank page.\n3.  When requested, specify `HR Dashboard`\
    \ as the name of the page.\n4.  Click through till the end of the wizard. After\
    \ the page is created, choose to Edit the page.\n5.  In the Page Rendering section\
    \ of the page, right-click on the `Regions` node and click the `Create` item in\
    \ the pop-up menu shown in [Figure 5-27](#Chapter05.html#fig_5_27).\n\n    ![images](images/0527.jpg)\n\
    \n    **Figure 5-27.** Creating a new region\n\n6.  In the first step of the wizard\
    \ that pops up, choose the `Chart` item. Choose `Flash Chart` in the next step,\
    \ then `Pie & Doughnut` in the next, and finally `3D Pie`. Specify `Employee Leave\
    \ Frequency` as the title of the region. In the next step of the wizard, specify\
    \ the same title for the Chart and choose `Side from Left` for the animation style.\n\
    7.  When you get to the SQL Statement area, specify the SQL shown in [Listing\
    \ 5-8](#Chapter05.html#list_5_8).\n\n    **Listing 5-8.** Specifying the SQL for\
    \ the Chart Region\n\n    ```sql\n    SELECT '',EmpName,count(*) FROM Employees\
    \ INNER JOIN EmpLeave ON\n    Employees.EmpID=EmpLeave.EmpID GROUP BY EmpName\n\
    \    ```\n8.  Complete the wizard to create the region. You should see your newly\
    \ created region, as shown in [Figure 5-28](#Chapter05.html#fig_5_28).\n\n   \
    \ ![images](images/0528.jpg)\n\n    **Figure 5-28.** The newly created region\n\
    \n9.  Now you need to create another region. Right click on the `Regions` node\
    \ and choose `Create` again.\n10. This time, choose `Report` as the region type.\
    \ Choose the `SQL Report` type in the next step, and specify the region title\
    \ as `Employee Listing` in the following step.\n11. When you get to the SQL area,\
    \ specify the SQL shown in [Listing 5-9](#Chapter05.html#list_5_9).\n\n    **Listing\
    \ 5-9.** Specifying the SQL for the Report Region\n\n    ```sql\n    SELECT EMPID,\
    \ EMPNAME, EMPTITLE, EMPDEPARTMENT FROM Employees\n    ```\n12. Complete the wizard\
    \ to create the region. Now run the page. You should see your pie chart and employee\
    \ list all in the same page, as shown in [Figure 5-29](#Chapter05.html#fig_5_29).\n\
    \n![images](images/0529.jpg)\n\n**Figure 5-29.** The dashboard in action\n\n####\
    \ How It Works\n\nRegions are APEX's way of organizing visual information within\
    \ a single page. Using regions, you can even mix data entry forms and charts together\
    \ in the same page. Regions are highly flexible; they can also be positioned anywhere\
    \ you wish. In this way, you can create dashboards that convey a mix of information\
    \ from different sources in different ways.\n\n## Chapter 6\n\n## Globalizing\
    \ the Application\n\nI am sure there has been at least one occasion when you've\
    \ taken a flight to a foreign country, proudly presented your painstakingly crafted\
    \ application consisting of hundreds of web pages and a beautiful UI, only to\
    \ be asked if everything could be in Thai. No? You’ve been lucky!\n\nContrary\
    \ to popular opinion, more than 60% of the world does not speak English. Moreover,\
    \ each country has different locality specifications: Americans use the USD currency,\
    \ the English use the pound or Euro, and quite interestingly, the French use the\
    \ comma symbol instead of the dot in their numerals.\n\nIn today's environment\
    \ where the Internet and the rise of cloud computing has truly brought the world\
    \ closer together, it is inevitable that your application will be used by people\
    \ from different parts of the world. It is thus important to consider more than\
    \ just your own country or locality when developing applications, and especially\
    \ when developing applications to be deployed on the Internet. Globalization,\
    \ via Oracle’s language and locale features, is the answer.\n\nGlobalization support\
    \ consists of the following areas:\n\n*   Entering of double-byte characters such\
    \ as those used in Japanese or Chinese.\n*   Translation of an application user\
    \ interface into various languages.\n*   Display and data entry formats for currencies,\
    \ time zones, and date/time values.\n\nRecipes in this chapter explore these three\
    \ areas of concern and the various facilities APEX provides to address them.\n\
    \n### 6-1. Setting up for Double-Byte Character Input\n\n#### Problem\n\nYou have\
    \ created forms that accept input in double-byte character sets such as those\
    \ used in Chinese and other languages. Not only must your fields accept such characters,\
    \ but you must enable users to key in such characters using an English-language\
    \ keyboard.\n\n#### Solution\n\nTo set up a Windows 7-based operating system to\
    \ support data entry in Chinese, follow these steps:\n\n![images](images/square.jpg)\
    \ **Note** This example illustrates how to set up the Chinese Input Method Editor\
    \ (IME) on Windows 7\\. For other operating systems, please check your operating\
    \ system manual.\n\n1.  Click the Windows Start button and navigate to the Control\
    \ Panel.\n2.  Double-click the `Region and Language` icon in the control panel\
    \ to launch it, as shown in [Figure 6-1](#Chapter06.html#fig_6_1).\n\n    ![images](images/0601.jpg)\n\
    \n    **Figure 6-1.** The Region and Language settings\n\n3.  In the ensuing pop-up\
    \ window, click the `Keyboards and Languages` tab and click the `Change Keyboards`\
    \ button. Another pop-up window, shown in [Figure 6-2](#Chapter06.html#fig_6_2),\
    \ will appear.\n\n    ![images](images/0602.jpg)\n\n    **Figure 6-2.** The list\
    \ of IMEs installed on your system\n\n4.  Click the `Add` button, and look for\
    \ the `Chinese (Simplified, PRC)` node. Expand this node and under the `Keyboard`\
    \ node, pick the `Chinese (Simplified) - Microsoft Pinyin ABC Input Style` entry,\
    \ as shown in [Figure 6-3](#Chapter06.html#fig_6_3).\n\n    ![images](images/0603.jpg)\n\
    \n    **Figure 6-3.** Installing a Chinese IME\n\n5.  Click the `OK` button to\
    \ add the keyboard. Apply the new settings and close all windows. Your operating\
    \ system should have the Chinese IME installed now.\n6.  Open a text editor tool,\
    \ such as Notepad, and make sure the window has received input focus.\n7.  In\
    \ the bottom right corner of your Windows desktop, the current default language\
    \ should be `EN` (English), as shown in [Figure 6-4](#Chapter06.html#fig_6_4).\n\
    \n    ![images](images/0604.jpg)\n\n    **Figure 6-4.** The language toolbar\n\
    \n8.  Click on the `EN` symbol and change your keyboard to `CH` (Chinese), as\
    \ shown in [Figure 6-5](#Chapter06.html#fig_6_5).\n\n    ![images](images/0605.jpg)\n\
    \n    **Figure 6-5.** Changing the default language to Chinese\n\n9.  The language\
    \ bar should change into a slightly longer one (with more icons), as shown in\
    \ [Figure 6-6](#Chapter06.html#fig_6_6). Make sure to change the second symbol\
    \ to `中` (as highlighted in the red box in [Figure 6-6](#Chapter06.html#fig_6_6)).\n\
    \n    ![images](images/0606.jpg)\n\n    **Figure 6-6.** Enabling Pinyin input\n\
    \n10. Type the following text on your keyboard: `nihao shijie`. This roughly translates\
    \ to \"Hello World\" in Chinese.\n11. When you hit the space character, your English\
    \ text is instantly translated into Chinese. You should see the screen shown in\
    \ [Figure 6-7](#Chapter06.html#fig_6_7).\n\n![images](images/0607.jpg)\n\n**Figure\
    \ 6-7.** Hello World in Chinese\n\n#### How It Works\n\nMany books start off assuming\
    \ that the reader knows how to enter double-byte characters. I assume that most\
    \ of my readers are American and thus might not have ever experienced keying in\
    \ data in a double-byte language like Chinese, Japanese, or Korean.\n\nThis recipe\
    \ serves as a quick guide to setting up an Input Method Editor (IME) on a Windows-based\
    \ operating system and using it to input double-byte characters. The Pinyin IME\
    \ you've seen in this recipe is one of many ways for users to key in Chinese characters,\
    \ in this case by typing their phonetically equivalent via Roman letters.\n\n\
    ### 6-2. Supporting Double-Byte Data Entry\n\n#### Problem\n\nOne of the forms\
    \ you create in APEX requires the user to key in data in a double-byte language\
    \ such as Japanese."
  raw: "#### Solution\n\nTo create a dashboard that combines a pie chart and a report,\
    \ please follow these instructions:\n\n1.  Open an application and create a new\
    \ page.\n2.  Choose to create a Blank page.\n3.  When requested, specify HR Dashboard\
    \ as the name of the page.\n4.  Click through till the end of the wizard. After\
    \ the page is created, choose to Edit the page.\n5.  In the Page Rendering section\
    \ of the page, right-click on the Regions node and click the Create item in the\
    \ pop-up menu shown in [Figure 5-27](#Chapter05.html#fig_5_27).\n\n    ![images](images/0527.jpg)\n\
    \n    ***Figure 5-27.** Creating a new region*\n\n6.  In the first step of the\
    \ wizard that pops up, choose the Chart item. Choose Flash Chart in the next step,\
    \ then Pie & Doughnut in the next, and finally 3D Pie. Specify Employee Leave\
    \ Frequency as the title of the region. In the next step of the wizard, specify\
    \ the same title for the Chart and choose Side from Left for the animation style.\n\
    7.  When you get to the SQL Statement area, specify the SQL shown in [Listing\
    \ 5-8](#Chapter05.html#list_5_8).\n\n    ***Listing 5-8.** Specifying the SQL\
    \ for the Chart Region*\n\n    `SELECT '',EmpName,count(*) FROM Employees INNER\
    \ JOIN EmpLeave ON`\n    `Employees.EmpID=EmpLeave.EmpID GROUP BY EmpName`\n8.\
    \  Complete the wizard to create the region. You should see your newly created\
    \ region, as shown in [Figure 5-28](#Chapter05.html#fig_5_28).\n\n    ![images](images/0528.jpg)\n\
    \n    ***Figure 5-28.** The newly created region*\n\n9.  Now you need to create\
    \ another region. Right click on the Regions node and choose Create again.\n10.\
    \  This time, choose Report as the region type. Choose the SQL Report type in\
    \ the next step, and specify the region title as Employee Listing in the following\
    \ step.\n11.  When you get to the SQL area, specify the SQL shown in [Listing\
    \ 5-9](#Chapter05.html#list_5_9).\n\n    ***Listing 5-9.** Specifying the SQL\
    \ for the Report Region*\n\n    `SELECT EMPID, EMPNAME, EMPTITLE, EMPDEPARTMENT\
    \ FROM Employees`\n12.  Complete the wizard to create the region. Now run the\
    \ page. You should see your pie chart and employee list all in the same page,\
    \ as shown in [Figure 5-29](#Chapter05.html#fig_5_29).\n\n![images](images/0529.jpg)\n\
    \n***Figure 5-29.** The dashboard in action*\n\n#### How It Works\n\nRegions are\
    \ APEX's way of organizing visual information within a single page. Using regions,\
    \ you can even mix data entry forms and charts together in the same page. Regions\
    \ are highly flexible; they can also be positioned anywhere you wish. In this\
    \ way, you can create dashboards that convey a mix of information from different\
    \ sources in different ways.\n\n## C H A P T E R  6\n\n## Globalizing the Application\n\
    \nI am sure there has been at least one occasion when you've taken a flight to\
    \ a foreign country, proudly presented your painstakingly crafted application\
    \ consisting of hundreds of web pages and a beautiful UI, only to be asked if\
    \ everything could be in Thai. No? You’ve been lucky!\n\nContrary to popular opinion,\
    \ more than 60% of the world does not speak English. Moreover, each country has\
    \ different locality specifications: Americans use the USD currency, the English\
    \ use the pound or Euro, and quite interestingly, the French use the comma symbol\
    \ instead of the dot in their numerals.\n\nIn today's environment where the Internet\
    \ and the rise of cloud computing has truly brought the world closer together,\
    \ it is inevitable that your application will be used by people from different\
    \ parts of the world. It is thus important to consider more than just your own\
    \ country or locality when developing applications, and especially when developing\
    \ applications to be deployed on the Internet. Globalization, via Oracle’s language\
    \ and locale features, is the answer.\n\nGlobalization support consists of the\
    \ following areas:\n\n*   Entering of double-byte characters such as those used\
    \ in Japanese or Chinese.\n*   Translation of an application user interface into\
    \ various languages.\n*   Display and data entry formats for currencies, time\
    \ zones, and date/time values.\n\nRecipes in this chapter explore these three\
    \ areas of concern and the various facilities APEX provides to address them.\n\
    \n### 6-1. Setting up for Double-Byte Character Input\n\n#### Problem\n\nYou have\
    \ created forms that accept input in double-byte character sets such as those\
    \ used in Chinese and other languages. Not only must your fields accept such characters,\
    \ but you must enable users to key in such characters using an English-language\
    \ keyboard.\n\n#### Solution\n\nTo set up a Windows 7-based operating system to\
    \ support data entry in Chinese, follow these steps:\n\n![images](images/square.jpg)\
    \ **Note** This example illustrates how to set up the Chinese Input Method Editor\
    \ (IME) on Windows 7\\. For other operating systems, please check your operating\
    \ system manual.\n\n1.  Click the Windows Start button and navigate to the Control\
    \ Panel.\n2.  Double-click the Region and Language icon in the control panel to\
    \ launch it, as shown in [Figure 6-1](#Chapter06.html#fig_6_1).\n\n    ![images](images/0601.jpg)\n\
    \n    ***Figure 6-1.** The Region and Language settings*\n\n3.  In the ensuing\
    \ pop-up window, click the Keyboards and Languages tab and click the Change Keyboards\
    \ button. Another pop-up window, shown in [Figure 6-2](#Chapter06.html#fig_6_2),\
    \ will appear.\n\n    ![images](images/0602.jpg)\n\n    ***Figure 6-2.** The list\
    \ of IMEs installed on your system*\n\n4.  Click the Add button, and look for\
    \ the Chinese (Simplified, PRC) node. Expand this node and under the Keyboard\
    \ node, pick the Chinese (Simplified) - Microsoft Pinyin ABC Input Style entry,\
    \ as shown in [Figure 6-3](#Chapter06.html#fig_6_3).\n\n    ![images](images/0603.jpg)\n\
    \n    ***Figure 6-3.** Installing a Chinese IME*\n\n5.  Click the OK button to\
    \ add the keyboard. Apply the new settings and close all windows. Your operating\
    \ system should have the Chinese IME installed now.\n6.  Open a text editor tool,\
    \ such as Notepad, and make sure the window has received input focus.\n7.  In\
    \ the bottom right corner of your Windows desktop, the current default language\
    \ should be EN (English), as shown in [Figure 6-4](#Chapter06.html#fig_6_4).\n\
    \n    ![images](images/0604.jpg)\n\n    ***Figure 6-4.** The language toolbar*\n\
    \n8.  Click on the EN symbol and change your keyboard to CH (Chinese), as shown\
    \ in [Figure 6-5](#Chapter06.html#fig_6_5).\n\n    ![images](images/0605.jpg)\n\
    \n    ***Figure 6-5.** Changing the default language to Chinese*\n\n9.  The language\
    \ bar should change into a slightly longer one (with more icons), as shown in\
    \ [Figure 6-6](#Chapter06.html#fig_6_6). Make sure to change the second symbol\
    \ to 中 (as highlighted in the red box in [Figure 6-6](#Chapter06.html#fig_6_6)).\n\
    \n    ![images](images/0606.jpg)\n\n    ***Figure 6-6.** Enabling Pinyin input*\n\
    \n10.  Type the following text on your keyboard: nihao shijie. This roughly translates\
    \ to \"Hello World\" in Chinese.\n11.  When you hit the space character, your\
    \ English text is instantly translated into Chinese. You should see the screen\
    \ shown in [Figure 6-7](#Chapter06.html#fig_6_7).\n\n![images](images/0607.jpg)\n\
    \n***Figure 6-7.** Hello World in Chinese*\n\n#### How It Works\n\nMany books\
    \ start off assuming that the reader knows how to enter double-byte characters.\
    \ I assume that most of my readers are American and thus might not have ever experienced\
    \ keying in data in a double-byte language like Chinese, Japanese, or Korean.\n\
    \nThis recipe serves as a quick guide to setting up an Input Method Editor (IME)\
    \ on a Windows-based operating system and using it to input double-byte characters.\
    \ The Pinyin IME you've seen in this recipe is one of many ways for users to key\
    \ in Chinese characters, in this case by typing their phonetically equivalent\
    \ via Roman letters.\n\n### 6-2. Supporting Double-Byte Data Entry\n\n#### Problem\n\
    \nOne of the forms you create in APEX requires the user to key in data in a double-byte\
    \ language such as Japanese."
  trans: "\n#### 解决方案\n\n要创建一个结合了饼图和报表的仪表板，请按照以下说明操作：\n\n1.  打开一个应用程序并创建一个新页面。\n2.\
    \  选择创建一个空白页面。\n3.  当系统要求时，指定 `HR 仪表板` 作为页面的名称。\n4.  点击向导直到完成。页面创建后，选择编辑该页面。\n\
    5.  在页面的“页面呈现”部分，右键单击 `区域` 节点，并在弹出的菜单（如图 5-27 所示）中点击 `创建` 项。\n\n    ![images](img/0527.jpg)\n\
    \n    **图 5-27.** 创建一个新区域\n\n6.  在弹出的向导的第一步中，选择 `图表` 项。在下一步选择 `Flash 图表`，然后下一步选择\
    \ `饼图与圆环图`，最后选择 `3D 饼图`。指定 `员工请假频率` 作为该区域的标题。在向导的下一步中，为图表指定相同的标题，并为动画样式选择 `从左侧滑入`。\n\
    7.  当进入 SQL 语句区域时，指定代码清单 5-8 中所示的 SQL。\n\n    **代码清单 5-8.** 为图表区域指定 SQL\n\n  \
    \  ```sql\n    SELECT '',EmpName,count(*) FROM Employees INNER JOIN EmpLeave ON\n\
    \    Employees.EmpID=EmpLeave.EmpID GROUP BY EmpName\n    ```\n8.  完成向导以创建该区域。您应该能看到新创建的区域，如图\
    \ 5-28 所示。\n\n    ![images](img/0528.jpg)\n\n    **图 5-28.** 新创建的区域\n\n9.  现在您需要创建另一个区域。再次右键单击\
    \ `区域` 节点并选择 `创建`。\n10. 这次，选择 `报表` 作为区域类型。下一步选择 `SQL 报表` 类型，接下来的步骤中指定区域标题为 `员工列表`。\n\
    11. 当进入 SQL 区域时，指定代码清单 5-9 中所示的 SQL。\n\n    **代码清单 5-9.** 为报表区域指定 SQL\n\n    ```sql\n\
    \    SELECT EMPID, EMPNAME, EMPTITLE, EMPDEPARTMENT FROM Employees\n    ```\n\
    12. 完成向导以创建该区域。现在运行该页面。您应该能在同一个页面上看到您的饼图和员工列表，如图 5-29 所示。\n\n![images](img/0529.jpg)\n\
    \n**图 5-29.** 运行中的仪表板\n\n#### 工作原理\n\n区域是 APEX 在单个页面内组织可视化信息的方式。使用区域，您甚至可以将数据输入表单和图表混合放在同一个页面中。区域非常灵活；它们也可以放置在您希望的任何位置。通过这种方式，您可以创建以不同方式传达来自不同来源信息的仪表板。\n\
    \n## 第六章\n\n## 应用程序全球化\n\n我相信您至少有过一次这样的经历：您乘飞机前往一个外国，自豪地展示了您精心打造的、包含数百个网页和精美用户界面的应用程序，结果却被询问是否所有内容都能用泰语显示。没有？那您真幸运！\n\
    \n与普遍看法相反，世界上超过 60%的人不说英语。此外，每个国家都有不同的本地化规范：美国人使用美元货币，英国人使用英镑或欧元，而很有趣的是，法国人在数字中使用逗号符号而不是小数点。\n\
    \n在当今互联网和云计算兴起真正让世界变得更紧密的环境下，您的应用程序不可避免地会被来自世界各地的人们使用。因此，在开发应用程序时，特别是开发部署在互联网上的应用程序时，考虑您自己国家或地区之外的因素非常重要。通过\
    \ Oracle 的语言和区域设置功能实现全球化，就是解决方案。\n\n全球化支持包括以下领域：\n\n*   输入双字节字符，例如日语或中文中使用的字符。\n\
    *   将应用程序用户界面翻译成各种语言。\n*   货币、时区和日期/时间值的显示与数据输入格式。\n\n本章中的“配方”探讨了这三个关注领域以及 APEX\
    \ 为解决它们所提供的各种功能。\n\n### 6-1. 设置双字节字符输入\n\n#### 问题\n\n您创建了接受双字节字符集（如中文和其他语言使用的字符）输入的表单。您的字段不仅必须接受此类字符，还必须使用户能够使用英语键盘输入这些字符。\n\
    \n#### 解决方案\n\n要将基于 Windows 7 的操作系统设置为支持中文数据输入，请按照以下步骤操作：\n\n![images](img/square.jpg)\
    \ **注意** 此示例说明如何在 Windows 7 上设置中文输入法编辑器。对于其他操作系统，请查阅您的操作系统手册。\n\n1.  单击 Windows\
    \ 开始按钮并导航到控制面板。\n2.  双击控制面板中的 `区域和语言` 图标以启动它，如图 6-1 所示。\n\n    ![images](img/0601.jpg)\n\
    \n    **图 6-1.** 区域和语言设置\n\n3.  在随后出现的弹出窗口中，单击 `键盘和语言` 选项卡，然后单击 `更改键盘` 按钮。另一个弹出窗口（如图\
    \ 6-2 所示）将会出现。\n\n    ![images](img/0602.jpg)\n\n    **图 6-2.** 系统上安装的输入法列表\n\n\
    4.  单击 `添加` 按钮，找到 `中文(简体，中华人民共和国)` 节点。展开此节点，在 `键盘` 节点下，选择 `中文(简体) - 微软拼音 ABC 输入风格`\
    \ 条目，如图 6-3 所示。\n\n    ![images](img/0603.jpg)\n\n    **图 6-3.** 安装中文输入法\n\n5.\
    \  单击 `确定` 按钮添加键盘。应用新设置并关闭所有窗口。您的操作系统现在应该已经安装了中文输入法。\n6.  打开一个文本编辑器工具，如记事本，并确保该窗口已获得输入焦点。\n\
    7.  在您的 Windows 桌面右下角，当前默认语言应为 `EN`（英语），如图 6-4 所示。\n\n    ![images](img/0604.jpg)\n\
    \n    **图 6-4.** 语言栏\n\n8.  单击 `EN` 符号，将您的键盘更改为 `CH`（中文），如图 6-5 所示。\n\n    ![images](img/0605.jpg)\n\
    \n    **图 6-5.** 将默认语言更改为中文\n\n9.  语言栏应变为稍长一些的栏（带有更多图标），如图 6-6 所示。确保将第二个符号更改为\
    \ `中`（如图 6-6 中红色方框内突出显示的那样）。\n\n    ![images](img/0606.jpg)\n\n    **图 6-6.**\
    \ 启用拼音输入\n\n10. 在键盘上输入以下文本：`nihao shijie`。这大致翻译为中文的“你好世界”。\n11. 当您按下空格键时，您的英文文本会立即翻译成中文。您应该会看到如图\
    \ 6-7 所示的屏幕。\n\n![images](img/0607.jpg)\n\n**图 6-7.** 中文的“你好世界”\n\n#### 工作原理\n\
    \n许多书一开始就假设读者知道如何输入双字节字符。我假设我的大多数读者是美国人，因此可能从未体验过用中文、日语或韩语等双字节语言键入数据。\n\n本配方作为在基于\
    \ Windows 的操作系统上设置输入法编辑器并使用它输入双字节字符的快速指南。您在本配方中看到的拼音输入法是用户输入中文字符的众多方式之一，在本例中，是通过输入其罗马字母的语音等效字符。\n\
    \n### 6-2. 支持双字节数据输入\n\n#### 问题\n\n您在 APEX 中创建的一个表单要求用户用日语等双字节语言键入数据。\n"
- fmt: "## Solution\n\nThis solution consists of two steps. First, you must create\
    \ the sample objects (these will also be used for the other recipes in this chapter).\
    \ Then you’ll create the application on top of those example objects.\n\n### Step\
    \ 1: Creating the Sample Objects\n\nThe sample object you will create is the `MYCUSTOMERS`\
    \ table. Create it by executing [Listing 6-1](#Chapter06.html#list_6_1) via the\
    \ SQL Workshop. Note that the table columns are defined as `NVARCHAR2`, which\
    \ is Oracle’s national language version of `VARCHAR2`.\n\n**Listing 6-1.** Creating\
    \ the Sample Objects\n\n```sql\nCREATE table \"MYCUSTOMERS\" (\n    \"CUSTNAME\"\
    \    NVARCHAR2(255),\n    \"CUSTREMARKS\" NVARCHAR2(2000),\n    \"CUSTID\"   \
    \   NVARCHAR2(50),\n    constraint  \"MYCUSTOMERS_PK\" primary key (\"CUSTID\"\
    )\n)\n/\n```\n\n### Step 2: Creating and Running the Application\n\nNow, create\
    \ and run the application to key in some Japanese text. Here are the steps to\
    \ follow:\n\n1.  Create a new application. In this application, create a new form\
    \ and interactive report on top of the `MyCustomers` table.\n2.  Run the form.\
    \ Using a Japanese Input Method Editor (IME), key in some Japanese text, as shown\
    \ in [Figure 6-8](#Chapter06.html#fig_6_8). Save the data by clicking the Create\
    \ button.\n\n    ![images](images/square.jpg) **Tip** For further information\
    \ on how to create a form on a table with report, please see Recipes 2-1 and 2-2.\n\
    \n    ![images](images/0608.jpg)\n\n    **Figure 6-8.** Keying in Japanese characters\n\
    \n3.  Run the report. You should see the Japanese text you just entered, as shown\
    \ in [Figure 6-9](#Chapter06.html#fig_6_9).\n\n    ![images](images/0609.jpg)\n\
    \n    **Figure 6-9.** Viewing the Japanese characters in the database\n\n## How\
    \ It Works\n\nEast-Asian languages use the double-byte format. To support double-byte\
    \ data, the fields in the database table must be defined using the N-prefixed\
    \ data types. For instance, you must use `NVARCHAR2` instead of `VARCHAR2`, and\
    \ `NCHAR` instead of `CHAR`.\n\nFor other languages such as Spanish, German, or\
    \ Italian (which are single-byte character languages), you will not need to use\
    \ the N-prefixed data types. This will help save space in your database because,\
    \ as you can probably guess, N-prefixed data types take up double the amount of\
    \ space in the database.\n\n### 6-3. Translating Your User Interface Into Another\
    \ Language\n\n## Problem\n\nDepending on the browser language preference setting,\
    \ you need your application to display the user interface (all labels, messages,\
    \ names, and field captions) in the corresponding preferred language of the application\
    \ user.\n\n## Solution\n\nTo translate your application UI to another language,\
    \ follow these steps:\n\n*   Set globalization attributes.\n*   Map to a translated\
    \ application.\n*   Seed translatable text to the translation repository.\n* \
    \  Export the XLIFF file.\n*   Translate the XLIFF file.\n*   Import the XLIFF\
    \ file.\n*   Publish the translated application.\n*   Test your translated application.\n\
    \n### Step 1: Set Globalization Attributes\n\nExecute the following steps to set\
    \ the globalization attributes for an application. These steps use the application\
    \ from Recipe 6-1 as the basis for an example.\n\n1.  Open the application you\
    \ created in Recipe 6-1, and click the Shared Components icon.\n2.  At the bottom\
    \ of the page, under the Globalization section, click the Globalization Attributes\
    \ link (as shown in [Figure 6-10](#Chapter06.html#fig_6_10)).\n\n    ![images](images/0610.jpg)\n\
    \n    **Figure 6-10.** Globalization Attributes settings\n\n3.  Set the Application\
    \ Primary Language to English and the Application Language Derived From field\
    \ to Browser (use browser language preference), as shown in [Figure 6-11](#Chapter06.html#fig_6_11).\n\
    \n    ![images](images/0611.jpg)\n\n    **Figure 6-11.** Setting the primary language\
    \ of the application\n\n4.  Click the Apply changes button when you’re done.\n\
    \n### Step 2: Mapping to a Translated Application\n\nTo map your primary language\
    \ application to the translated application, follow these steps:\n\n1.  Return\
    \ to the Shared Components page. This time, click the Translate Application link\
    \ (also in the Globalization section).\n2.  You will now see a page that looks\
    \ like [Figure 6-12](#Chapter06.html#fig_6_12).\n\n    ![images](images/0612.jpg)\n\
    \n    **Figure 6-12.** The various steps in translating an application\n\n3. \
    \ Click the first link, “Map your primary language application to a translated\
    \ application.”\n4.  Create a new mapping by clicking the Create button. In the\
    \ ensuing pop-up wizard, key in any unique integer value for the Translation Application\
    \ field.\n5.  For the language code, set the language to Icelandic (`is`), and\
    \ the image directory to `is`. You may specify some comments if you wish, but\
    \ this is optional. You should see something similar to [Figure 6-13](#Chapter06.html#fig_6_13).\n\
    \n    ![images](images/0613.jpg)\n\n    **Figure 6-13.** Defining the application\
    \ language mapping\n\n6.  Click the Create button. You will see the created mapping\
    \ record in the following page (as shown in [Figure 6-14](#Chapter06.html#fig_6_14)).\n\
    \n    ![images](images/0614.jpg)\n\n    **Figure 6-14.** The created mapping record\n\
    \n### Step 3: Seed Translatable Text to the Translation Repository\n\nTo map your\
    \ primary language application to the translated application, follow these steps:\n\
    \n1.  Return to the main Translate page. Click the second link shown in [Figure\
    \ 6-15](#Chapter06.html#fig_6_15), “Seeding translatable text to the translation\
    \ repository.”\n\n    ![images](images/0615.jpg)\n\n    **Figure 6-15.** Seeding\
    \ translatable text to translation repository\n\n2.  In the wizard, choose the\
    \ “(Your primary language Application ID) >>116 (is)” entry from the drop-down\
    \ list for the Language Mapping field, and click Next to continue. The value of\
    \ 116 refers to the \"to-be-translated\" application ID.\n3.  Click the Seed Translatable\
    \ Text button to complete the wizard.\n4.  You should see a brief summary of the\
    \ seeding process, as shown in [Figure 6-16](#Chapter06.html#fig_6_16).\n\n  \
    \  ![images](images/0616.jpg)\n\n    **Figure 6-16.** Seeding statistics\n\n###\
    \ Step 4: Export the XLIFF File\n\nTo export the text resources used in your application\
    \ to an XLIFF file, follow these steps:\n\n1.  Return to the main Translate page.\
    \ Click the third link shown in [Figure 6-17](#Chapter06.html#fig_6_17), “Download\
    \ translatable text from repository to translation file (XLIFF FILE).”\n\n   \
    \ ![images](images/0617.jpg)\n\n    **Figure 6-17.** Exporting to an XLIFF file\n\
    \n2.  In the ensuing configuration page, you need to download the XLIFF file for\
    \ the complete application. Set the Application Translation field to the “(Your\
    \ primary language Application ID) >>116 (is)” entry.\n3.  Ensure that the Include\
    \ XLIFF Target Elements checkbox is selected.\n4.  Choose to export all translatable\
    \ elements, as shown in [Figure 6-18](#Chapter06.html#fig_6_18).\n\n    ![images](images/0618.jpg)\n\
    \n    **Figure 6-18.** Choosing the translation mapping\n\n5.  Click the Export\
    \ XLIFF button. You may need to wait several seconds before you see the next prompt.\
    \ When the prompt appears, you will be given the option to download the generated\
    \ XLIFF file, as shown in [Figure 6-19](#Chapter06.html#fig_6_19).\n\n    ![images](images/0619.jpg)\n\
    \n    **Figure 6-19.** Exporting the XLIFF file\n\n6.  Save the XLIFF file to\
    \ any location on your PC."
  raw: "#### Solution\n\nThis solution consists of two steps. First, you must create\
    \ the sample objects (these will also be used for the other recipes in this chapter).\
    \ Then you’ll create the application on top of those example objects.\n\n#####\
    \ Step 1: Creating the Sample Objects\n\nThe sample object you will create is\
    \ the customers table. Create it by executing [Listing 6-1](#Chapter06.html#list_6_1)\
    \ via the SQL Workshop. Note that the table columns are defined as NVARCHAR2,\
    \ which is Oracle’s national language version of VARCHAR2.\n\n***Listing 6-1.**\
    \ Creating the Sample Objects*\n\n`CREATE table \"MYCUSTOMERS\" (`\n`    \"CUSTNAME\"\
        NVARCHAR2(255),`\n`    \"CUSTREMARKS\" NVARCHAR2(2000),`\n`    \"CUSTID\"\
          NVARCHAR2(50),`\n`    constraint  \"MYCUSTOMERS_PK\" primary key (\"CUSTID\"\
    )`\n`)`\n`/`\n\n##### Step 2: Creating and Running the Application\n\nNow, create\
    \ and run the application to key in some Japanese text. Here are the steps to\
    \ follow:\n\n1.  Create a new application. In this application, create a new form\
    \ and interactive report on top of the MyCustomers table.\n2.  Run the form. Using\
    \ a Japanese Input Method Editor (IME), key in some Japanese text, as shown in\
    \ [Figure 6-8](#Chapter06.html#fig_6_8). Save the data by clicking the Create\
    \ button.\n\n    ![images](images/square.jpg) **Tip** For further information\
    \ on how to create a form on a table with report, please see Recipes 2-1 and 2-2.\n\
    \n    ![images](images/0608.jpg)\n\n    ***Figure 6-8.** Keying in Japanese characters*\n\
    \n3.  Run the report. You should see the Japanese text you just entered, as shown\
    \ in [Figure 6-9](#Chapter06.html#fig_6_9).\n\n![images](images/0609.jpg)\n\n\
    ***Figure 6-9.** Viewing the Japanese characters in the database*\n\n#### How\
    \ It Works\n\nEast-Asian languages use the double-byte format. To support double-byte\
    \ data, the fields in the database table must be defined using the N-prefixed\
    \ data types. For instance, you must use NVARCHAR2 instead of VARCHAR2, and   NCHAR\
    \ instead of CHAR.\n\nFor other languages such as Spanish, German, or Italian\
    \ (which are single-byte character languages), you will not need to use the N-prefixed\
    \ data types. This will help save space in your database because, as you can probably\
    \ guess, N-prefixed data types take up double the amount of space in the database.\n\
    \n### 6-3. Translating Your User Interface Into Another Language\n\n#### Problem\n\
    \nDepending on the browser language preference setting, you need your application\
    \ to display the user interface (all labels, messages, names, and field captions)\
    \ in the corresponding preferred language of the application user.\n\n#### Solution\n\
    \nTo translate your application UI to another language, follow these steps:\n\n\
    *   Set globalization attributes.\n*   Map to a translated application.\n*   Seed\
    \ translatable text to the translation repository.\n*   Export the XLIFF file.\n\
    *   Translate the XLIFF file.\n*   Import the XLIFF file.\n*   Publish the translated\
    \ application.\n*   Test your translated application.\n\n##### Step 1: Set Globalization\
    \ Attributes\n\nExecute the following steps to set the globalization attributes\
    \ for an application. These steps use the application from Recipe 6-1 as the basis\
    \ for an example.\n\n1.  Open the application you created in Recipe 6-1, and click\
    \ the Shared Components icon.\n2.  At the bottom of the page, under the Globalization\
    \ section, click the Globalization Attributes link (as shown in [Figure 6-10](#Chapter06.html#fig_6_10)).\n\
    \n    ![images](images/0610.jpg)\n\n    ***Figure 6-10.** Globalization Attributes\
    \ settings*\n\n3.  Set the Application Primary Language to English and the Application\
    \ Language Derived From field to Browser (use browser language preference), as\
    \ shown in [Figure 6-11](#Chapter06.html#fig_6_11).\n\n    ![images](images/0611.jpg)\n\
    \n    ***Figure 6-11.** Setting the primary language of the application*\n\n4.\
    \  Click the Apply changes button when you’re done.\n\n##### Mapping to a Translated\
    \ Application\n\nTo map your primary language application to the translated application,\
    \ follow these steps:\n\n1.  Return to the Shared Components page. This time,\
    \ click the Translate Application link (also in the Globalization section).\n\
    2.  You will now see a page that looks like [Figure 6-12](#Chapter06.html#fig_6_12).\n\
    \n    ![images](images/0612.jpg)\n\n    ***Figure 6-12.** The various steps in\
    \ translating an application*\n\n3.  Click the first link, “Map your primary language\
    \ application to a translated application.”\n4.  Create a new mapping by clicking\
    \ the Create button. In the ensuing pop-up wizard, key in any unique integer value\
    \ for the Translation Application field.\n5.  For the language code, set the language\
    \ to Icelandic (is), and the image directory to is. You may specify some comments\
    \ if you wish, but this is optional. You should see something similar to [Figure\
    \ 6-13](#Chapter06.html#fig_6_13).\n\n    ![images](images/0613.jpg)\n\n    ***Figure\
    \ 6-13.** Defining the application language mapping*\n\n6.  Click the Create button.\
    \ You will see the created mapping record in the following page (as shown in [Figure\
    \ 6-14](#Chapter06.html#fig_6_14)).\n\n    ![images](images/0614.jpg)\n\n    ***Figure\
    \ 6-14.** The created mapping record*\n\nStep 2: Seed Translatable Text to the\
    \ Translation Repository\n\nTo map your primary language application to the translated\
    \ application, follow these steps:\n\n1.  Return to the main Translate page. Click\
    \ the second link shown in [Figure 6-15](#Chapter06.html#fig_6_15), “Seeding translatable\
    \ text to the translation repository.”\n\n    ![images](images/0615.jpg)\n\n \
    \   ***Figure 6-15.** Seeding translatable text to translation repository*\n\n\
    2.  In the wizard, choose the “(Your primary language Application ID) >>116 (is)”\
    \ entry from the drop-down list for the Language Mapping field, and click Next\
    \ to continue. The value of 116 refers to the \"to-be-translated\" application\
    \ ID.\n3.  Click the Seed Translatable Text button to complete the wizard.\n4.\
    \  You should see a brief summary of the seeding process, as shown in [Figure\
    \ 6-16](#Chapter06.html#fig_6_16).\n\n![images](images/0616.jpg)\n\n***Figure\
    \ 6-16.** Seeding statistics*\n\n##### Step 3: Export the XLIFF File\n\nTo export\
    \ the text resources used in your application to an XLIFF file, follow these steps:\n\
    \n1.  Return to the main Translate page. Click the third link shown in [Figure\
    \ 6-17](#Chapter06.html#fig_6_17), “Download translatable text from repository\
    \ to translation file (XLIFF FILE).”\n\n    ![images](images/0617.jpg)\n\n   \
    \ ***Figure 6-17.** Exporting to an XLIFF file*\n\n2.  In the ensuing configuration\
    \ page, you need to download the XLIFF file for the complete application. Set\
    \ the Application Translation field to the “(Your primary language Application\
    \ ID) >>116 (is)” entry.\n3.  Ensure that the Include XLIFF Target Elements checkbox\
    \ is selected.\n4.  Choose to export all translatable elements, as shown in [Figure\
    \ 6-18](#Chapter06.html#fig_6_18).\n\n    ![images](images/0618.jpg)\n\n    ***Figure\
    \ 6-18.** Choosing the translation mapping*\n\n5.  Click the Export XLIFF button.\
    \ You may need to wait several seconds before you see the next prompt. When the\
    \ prompt appears, you will be given the option to download the generated XLIFF\
    \ file, as shown in [Figure 6-19](#Chapter06.html#fig_6_19).\n\n    ![images](images/0619.jpg)\n\
    \n    ***Figure 6-19.** Exporting the XLIFF file*\n\n6.  Save the XLIFF file to\
    \ any location on your PC."
  trans: "\n## 解决方案\n\n此解决方案包含两个步骤。首先，您必须创建示例对象（这些对象也将用于本章的其他配方）。然后，您将在这些示例对象之上创建应用程序。\n\
    \n### 步骤 1：创建示例对象\n\n您将创建的示例对象是 `MYCUSTOMERS` 表。通过 SQL 工作坊执行 清单 6-1 来创建它。请注意，表列被定义为\
    \ `NVARCHAR2`，这是 Oracle 的 `VARCHAR2` 的国家语言版本。\n\n**清单 6-1.** 创建示例对象\n\n```sql\n\
    CREATE table \"MYCUSTOMERS\" (\n    \"CUSTNAME\"    NVARCHAR2(255),\n    \"CUSTREMARKS\"\
    \ NVARCHAR2(2000),\n    \"CUSTID\"      NVARCHAR2(50),\n    constraint  \"MYCUSTOMERS_PK\"\
    \ primary key (\"CUSTID\")\n)\n/\n```\n\n### 步骤 2：创建并运行应用程序\n\n现在，创建并运行应用程序以输入一些日文文本。请遵循以下步骤：\n\
    \n1.  创建一个新应用程序。在此应用程序中，基于 `MyCustomers` 表创建一个新表单和交互式报表。\n2.  运行表单。使用日文输入法编辑器（IME），输入一些日文文本，如\
    \ 图 6-8 所示。点击“创建”按钮保存数据。\n\n    ![images](img/square.jpg) **提示** 有关如何在表上创建带报表的表单的更多信息，请参阅配方\
    \ 2-1 和 2-2。\n\n    ![images](img/0608.jpg)\n\n    **图 6-8.** 输入日文字符\n\n3.  运行报表。您应该看到刚刚输入的日文文本，如\
    \ 图 6-9 所示。\n\n    ![images](img/0609.jpg)\n\n    **图 6-9.** 在数据库中查看日文字符\n\n##\
    \ 工作原理\n\n东亚语言使用双字节格式。为了支持双字节数据，数据库表中的字段必须使用带 N 前缀的数据类型来定义。例如，您必须使用 `NVARCHAR2`\
    \ 而不是 `VARCHAR2`，使用 `NCHAR` 而不是 `CHAR`。\n\n对于其他语言，如西班牙语、德语或意大利语（它们是单字节字符语言），您不需要使用带\
    \ N 前缀的数据类型。这将有助于节省数据库空间，因为正如您可能猜到的，带 N 前缀的数据类型在数据库中占用双倍的空间。\n\n### 6-3. 将您的用户界面翻译成另一种语言\n\
    \n## 问题\n\n根据浏览器的语言偏好设置，您需要您的应用程序以应用程序用户对应的首选语言显示用户界面（所有标签、消息、名称和字段标题）。\n\n##\
    \ 解决方案\n\n要将您的应用程序 UI 翻译成另一种语言，请遵循以下步骤：\n\n*   设置全球化属性。\n*   映射到已翻译的应用程序。\n* \
    \  将可翻译文本植入翻译存储库。\n*   导出 XLIFF 文件。\n*   翻译 XLIFF 文件。\n*   导入 XLIFF 文件。\n*   发布已翻译的应用程序。\n\
    *   测试您的已翻译应用程序。\n\n### 步骤 1：设置全球化属性\n\n执行以下步骤来为应用程序设置全球化属性。这些步骤使用配方 6-1 中的应用程序作为示例基础。\n\
    \n1.  打开您在配方 6-1 中创建的应用程序，然后点击“共享组件”图标。\n2.  在页面底部，“全球化”部分下，点击“全球化属性”链接（如 图 6-10\
    \ 所示）。\n\n    ![images](img/0610.jpg)\n\n    **图 6-10.** 全球化属性设置\n\n3.  将“应用程序主语言”设置为\
    \ English（英语），并将“应用程序语言来源”字段设置为 Browser（浏览器）（使用浏览器语言偏好），如 图 6-11 所示。\n\n    ![images](img/0611.jpg)\n\
    \n    **图 6-11.** 设置应用程序的主语言\n\n4.  完成后点击“应用更改”按钮。\n\n### 步骤 2：映射到已翻译的应用程序\n\n\
    要将您的主语言应用程序映射到已翻译的应用程序，请遵循以下步骤：\n\n1.  返回“共享组件”页面。这次，点击“翻译应用程序”链接（也在“全球化”部分）。\n\
    2.  您现在将看到一个类似 图 6-12 的页面。\n\n    ![images](img/0612.jpg)\n\n    **图 6-12.** 翻译应用程序的各个步骤\n\
    \n3.  点击第一个链接，“将您的主语言应用程序映射到已翻译的应用程序。”\n4.  点击“创建”按钮创建新映射。在随后出现的向导弹窗中，为“翻译应用程序”字段输入任何唯一的整数值。\n\
    5.  对于语言代码，将语言设置为冰岛语 (`is`)，图像目录设置为 `is`。您可以指定一些注释（如果需要），但这是可选的。您应该看到类似 图 6-13\
    \ 的内容。\n\n    ![images](img/0613.jpg)\n\n    **图 6-13.** 定义应用程序语言映射\n\n6.  点击“创建”按钮。您将在以下页面中看到创建的映射记录（如\
    \ 图 6-14 所示）。\n\n    ![images](img/0614.jpg)\n\n    **图 6-14.** 创建的映射记录\n\n###\
    \ 步骤 3：将可翻译文本植入翻译存储库\n\n要将您的主语言应用程序映射到已翻译的应用程序，请遵循以下步骤：\n\n1.  返回主“翻译”页面。点击 图\
    \ 6-15 中显示的第二个链接，“将可翻译文本植入翻译存储库。”\n\n    ![images](img/0615.jpg)\n\n    **图 6-15.**\
    \ 将可翻译文本植入翻译存储库\n\n2.  在向导中，从“语言映射”字段的下拉列表中选择“（您的主语言应用程序 ID） >>116 (is)”条目，然后点击“下一步”继续。值\
    \ 116 指的是“待翻译的”应用程序 ID。\n3.  点击“植入可翻译文本”按钮以完成向导。\n4.  您应该会看到植入过程的简要摘要，如 图 6-16\
    \ 所示。\n\n    ![images](img/0616.jpg)\n\n    **图 6-16.** 植入统计\n\n### 步骤 4：导出 XLIFF\
    \ 文件\n\n要将应用程序中使用的文本资源导出到 XLIFF 文件，请遵循以下步骤：\n\n1.  返回主“翻译”页面。点击 图 6-17 中显示的第三个链接，“从存储库下载可翻译文本到翻译文件（XLIFF\
    \ FILE）。”\n\n    ![images](img/0617.jpg)\n\n    **图 6-17.** 导出到 XLIFF 文件\n\n2.\
    \  在随后的配置页面中，您需要下载整个应用程序的 XLIFF 文件。将“应用程序翻译”字段设置为“（您的主语言应用程序 ID） >>116 (is)”条目。\n\
    3.  确保选中“包含 XLIFF 目标元素”复选框。\n4.  选择导出所有可翻译元素，如 图 6-18 所示。\n\n    ![images](img/0618.jpg)\n\
    \n    **图 6-18.** 选择翻译映射\n\n5.  点击“导出 XLIFF”按钮。您可能需要等待几秒钟才能看到下一个提示。提示出现时，您将可以选择下载生成的\
    \ XLIFF 文件，如 图 6-19 所示。\n\n    ![images](img/0619.jpg)\n\n    **图 6-19.** 导出 XLIFF\
    \ 文件\n\n6.  将 XLIFF 文件保存到您 PC 上的任何位置。\n"
- fmt: "# Step 4: Translate the XLIFF file\n\nTo translate the XLIFF file, follow\
    \ these steps:\n\n1.  The XLIFF file is a convenient little file that contains\
    \ all the text, messages, labels, and name resources used by your application.\n\
    2.  You can usually send XLIFF files to real-world translators to translate its\
    \ content. The XLIFF format is an open standard, and you can find many XLIFF editor\
    \ tools that allow you to peek into the contents of the file and edit them by\
    \ hand.\n3.  Open the downloaded XLIFF file using a text editor tool such as WordPad.\n\
    4.  You should be able to see the generated XML with multiple translation entries,\
    \ as shown in [Figure 6-20](#Chapter06.html#fig_6_20).\n\n    ![images](images/0620.jpg)\n\
    \n    **Figure 6-20.** Taking a peek in the XLIFF file\n\n5.  Each translation\
    \ entry has the format shown in [Listing 6-2](#Chapter06.html#list_6_2). The `source`\
    \ field represents the original untranslated text and the `target` field the translated\
    \ text.\n\n    **Listing 6-2.** Translation Entry Format\n\n    ```\n    <trans-unit\
    \ id=\"XXXXX\">\n              <source>Custname</source>\n              <target>Custname</target>\n\
    \    </trans-unit>\n    ```\n6.  Look for the `Custname` entry and change its\
    \ `<target>` entry to its Icelandic equivalent: `viðskiptavinur nafn`. Change\
    \ the `<target>` entry for `Custremarks` to `viðskiptavinur athugasemd`, as highlighted\
    \ in [Figure 6-21](#Chapter06.html#fig_6_21).\n\n    ![images](images/square.jpg)\
    \ **Note** There may be several entries for `Custname` and `Custremarks`, especially\
    \ if you've used these same names for different objects in your application. If\
    \ you are unsure which one you should edit, always look out for the object IDs\
    \ (indicated by the `ID` attribute of the `<trans-unit>` tag). These identifiers\
    \ map to the actual object ids in your application.\n\n    ![images](images/0621.jpg)\n\
    \n    **Figure 6-21.** Manual translation\n\n7.  Save the changes you have made.\n\
    \n# Step 5: Import the Translated XLIFF File\n\nTo re-import the translated XLIFF\
    \ file into APEX, follow these steps:\n\n1.  Return to the main Translate page.\
    \ Click the fifth link shown in [Figure 6-22](#Chapter06.html#fig_6_22), “Apply\
    \ XLIFF translation file to translation repository.”\n\n    ![images](images/0622.jpg)\n\
    \n    **Figure 6-22.** Importing the translated XLIFF file\n\n2.  In the ensuing\
    \ window, click the `Upload XLIFF` button. A wizard will pop up, allowing you\
    \ to upload the translated XLIFF file. Specify any title you wish, and browse\
    \ for the translated XLIFF file on your PC. Click the `Upload XLIFF file` button\
    \ when you are done, as shown in [Figure 6-23](#Chapter06.html#fig_6_23).\n\n\
    \    ![images](images/0623.jpg)\n\n    **Figure 6-23.** Importing the XLIFF file\n\
    \n3.  You should see your uploaded XLIFF file in the next window (see [Figure\
    \ 6-24](#Chapter06.html#fig_6_24)).\n\n    ![images](images/0624.jpg)\n\n    **Figure\
    \ 6-24.** The uploaded XLIFF file\n\n# Step 6: Publish the Translated Application\n\
    \nTo publish the translated application, follow these steps:\n\n1.  Return to\
    \ the main Translate page. Click the last link shown in [Figure 6-25](#Chapter06.html#fig_6_25),\
    \ “Publish Translated Application.”\n\n    ![images](images/0625.jpg)\n\n    **Figure\
    \ 6-25.** Publishing the translated application\n\n2.  In the ensuing page, set\
    \ the `Publish Application Translation` field to the Icelandic mapping, and click\
    \ the `Publish Application` button shown in [Figure 6-26](#Chapter06.html#fig_6_26).\n\
    \n    ![images](images/0626.jpg)\n\n    **Figure 6-26.** Publishing an application\
    \ translation\n\n3.  You've now successfully created a (more or less) Icelandic\
    \ version of your application.\n\n# Step 7: Test the Translated Application\n\n\
    To try out your translated application, follow these steps:\n\n1.  If you recall,\
    \ you set the globalization attributes to use the language specified in the browser\
    \ preference settings. To try out your translated application, you will now need\
    \ to set your browser preference settings to render pages in Icelandic.\n\n  \
    \  ![images](images/square.jpg) **Note** The example shown here applies to the\
    \ Microsoft Internet Explorer browser. The screenshots and steps may differ for\
    \ other browsers, so refer to your browser’s documentation on the topic of language\
    \ preference settings.\n\n2.  Open Internet Explorer and navigate to the Internet\
    \ Options window. In the General tab, click the Languages button at the bottom.\
    \ Add a new language to the list: Icelandic [is]. Move its preference order so\
    \ that Icelandic is the top most entry, as shown in [Figure 6-27](#Chapter06.html#fig_6_27).\n\
    \n    ![images](images/0627.jpg)\n\n    **Figure 6-27.** Changing the browser\
    \ language preference\n\n3.  Save and apply all changes. Now run your application\
    \ again. You should see the form rendered using the Icelandic field captions you've\
    \ specified, as shown in [Figure 6-28](#Chapter06.html#fig_6_28).\n\n    ![images](images/0628.jpg)\n\
    \n    **Figure 6-28.** The customers page in Icelandic\n\n## How It Works\n\n\
    To translate an application to another language, you must first extract all the\
    \ resources used in your application— which means, the error messages, labels,\
    \ field captions and so on—into an XML file. This file is called an XLIFF file.\
    \ The XLIFF file can be sent to real-world translators, where each entry is translated.\
    \ The resulting XLIFF file is then reimported into APEX, where APEX will generate\
    \ a new application using the translated text in the XLIFF file.\n\nThe example\
    \ in this recipe translates only two entries from the XLIFF file. If you wish\
    \ to have the entire application in 100% Icelandic, you will need to translate\
    \ every entry in the file, including the form and report names, error messages,\
    \ and so on.\n\n# 6-4. Storing and Displaying Dates with Time Zone Information\n\
    \n## Problem\n\nYou have a requirement to generate a report listing events that\
    \ occur in different locations around the world in various time zones. Additionally,\
    \ the report will be viewed by users from different countries and time zones.\
    \ You need to display dates and times that correspond to the local time zone of\
    \ the accessing user."
  raw: "##### Step 4: Translate the XLIFF file\n\nTo translate the XLIFF file, follow\
    \ these steps:\n\n1.  The XLIFF file is a convenient little file that contains\
    \ all the text, messages, labels, and name resources used by your application.\n\
    2.  You can usually send XLIFF files to real-world translators to translate its\
    \ content. The XLIFF format is an open standard, and you can find many XLIFF editor\
    \ tools that allow you to peek into the contents of the file and edit them by\
    \ hand.\n3.  Open the downloaded XLIFF file using a text editor tool such as WordPad.\n\
    4.  You should be able to see the generated XML with multiple translation entries,\
    \ as shown in [Figure 6-20](#Chapter06.html#fig_6_20).\n\n    ![images](images/0620.jpg)\n\
    \n    ***Figure 6-20.** Taking a peek in the XLIFF file*\n\n5.  Each translation\
    \ entry has the format shown in [Listing 6-2](#Chapter06.html#list_6_2). The source\
    \ field represents the original untranslated text and the target field the translated\
    \ text.\n\n    ***Listing 6-2.** Translation Entry Format*\n\n    `<trans-unit\
    \ id=\"XXXXX\">`\n    `         <source>Custname</source>`\n    `         <target>Custname</target>`\n\
    \    `</trans-unit>`\n6.  Look for the Custname entry and change its <target>\
