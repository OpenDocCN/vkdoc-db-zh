    \ e-mail field. Click the Send Email button. An e-mail should be sent to the address\
    \ you've specified.\n\n#### How It Works\n\nSending an e-mail is also a server-side\
    \ process. Outbound e-mails are not sent out immediately (unless you specified\
    \ to do so in the Process configuration wizard), but are queued until a DBMS_JOB\
    \ job dequeues it and sends it out.\n\n## C H A P T E R  4\n\n## Customizing Look\
    \ and Feel\n\nCustomizing application look and feel is one of the most important\
    \ aspects of solution delivery. It is the process that defines how your application\
    \ is presented to the end user. APEX is extremely flexible in this area, letting\
    \ you customize not just the color schemes, headers and footers of a page, but\
    \ even the attributes for the controls it uses on your form.\n\nHalf of the time,\
    \ users like yourself don't just create standalone web applications for an intranet\
    \ environment. I know many developers that use APEX because they needed an easier\
    \ way to integrate forms into their public-facing web site. Think about the “Apply\
    \ for a job” section of a public web site, for instance. When visitors click on\
    \ the link, they shouldn't feel like they're being redirected to an entirely new\
    \ portal. The “Apply for a job” form should look and feel no different from any\
    \ other page on the site. To achieve that purpose, the developer needs to make\
    \ the form's color scheme, header, and footer conform to the rest of the web site.\n\
    \nAPEX provides the facilities for you to change every aspect of the user interface\
    \ in your applications. You will take a look at the basics of doing so in this\
    \ chapter.\n\n### 4-1. Adding an Image Header to Your Form\n\n#### Problem\n\n\
    You need to add an image in the header area of your form.\n\n#### Solution\n\n\
    To add an image to the header area of your form, follow these steps:\n\n1.  Click\
    \ on an existing application in the Application Builder.\n2.  Click the Shared\
    \ Components icon. In the ensuing page, click the `Images` link under the `Files`\
    \ section, as shown in [Figure 4-1](#Chapter04.html#fig_4_1).\n\n    ![images](images/0401.jpg)\n\
    \n    ***Figure 4-1.** The Images link in the Files section*\n\n3.  In the ensuing\
    \ page, click the yellow Create button in the top right corner. Choose your application\
    \ from the list, and browse for a banner image (GIF, JPG or PNG file) to upload.\
    \ When you're done, click the `Upload` button.\n4.  You should now see your image\
    \ in the application, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).\n\n \
    \   ![images](images/0402.jpg)\n\n    ***Figure 4-2.** The Testsample.gif image*\n\
    \n5.  Now, navigate to an existing form in the application and click on it to\
    \ view its `Page Definition`.\n6.  In the `Shared Components` area of the form,\
    \ expand the `Templates` node, followed by the `Region` node, right-click on the\
    \ `Form Region` node, and choose the `Edit` menu item (as shown in [Figure 4-3](#Chapter04.html#fig_4_3)).\n\
    \n    ![images](images/0403.jpg)\n\n    ***Figure 4-3.** Navigating to the Form\
    \ Region template definition page*\n\n7.  In the ensuing page, click the Definition\
    \ tab. Add the following HTML tag above the DIV tag in the template box: `<img\
    \ border=\"0\" src=\"#APP_IMAGES#Testsample.gif\">`\n8.  You should now have the\
    \ screen shown in [Figure 4-4](#Chapter04.html#fig_4_4).\n\n    ![images](images/0404.jpg)\n\
    \n    ***Figure 4-4.** Including the Testsample.gif image in the template*\n\n\
    9.  Save your changes and run the form. You should now see your image at the top\
