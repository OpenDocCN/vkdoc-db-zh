  trans: "\n#### 解决方案\n\n要使用自定义 CSS 文件，请按照以下步骤操作：\n\n1.  使用记事本或任何其他编辑器工具创建一个新的 CSS\
    \ 文件，内容如 代码清单 4-2 所示。\n\n    `代码清单 4-2. 一个示例 CSS 文件`\n    ```css\n    .buttonstyle_incss\n\
    \    {\n      font-family : Verdana;\n      color : #FFFFFF;\n      font-weight\
    \ : bold;\n      text-align :left ;\n      vertical-align : middle;\n      width:150px;\n\
    \      height:25px;\n      background-color:#000000;\n    }\n    ```\n2.  在应用程序构建器中点击一个现有应用程序。\n\
    3.  点击 `共享组件` 图标。在随后出现的页面中，点击 `文件` 部分下的 `层叠样式表` 链接。\n4.  点击 `创建` 按钮，向您的应用程序添加一个新的样式表。在随后出现的页面中，浏览并找到您的\
    \ `.CSS` 文件，然后点击右上角的黄色 `上载` 按钮。\n5.  您现在应该能看到您的 CSS 文件，如 图 4-9 所示。\n\n    ![images](img/0409.jpg)\n\
    \n    `图 4-9. 新上载的 myclass.css 文件`\n\n6.  导航到您表单的页面定义区域。右键点击根表单节点，选择 `编辑` 菜单项。\n\
    7.  在随后出现的页面中，点击 `HTML 头和主体属性` 选项卡。在 `HTML 头` 文本框中，输入以下代码，将 `myclass.css` 替换为您上载的\
    \ CSS 类的名称。请注意，类名区分大小写。\n    ```html\n    <link href=\"#WORKSPACE_IMAGES#myclass.css\"\
    \ rel=\"stylesheet\" type=\"text/css\" />\n    ```\n8.  您现在应该看到如 图 4-10 所示的屏幕。\n\
    \n    ![images](img/0410.jpg)\n\n    `图 4-10. 引用 myclass.css 文件`\n\n9.  保存您的更改并返回到表单的\
    \ `页面定义` 区域。在 `共享组件` 部分，展开 `模板` ![images](img/U001.jpg) `按钮`，右键点击最深层的 `按钮` 节点，并选择\
    \ `编辑` 菜单项。\n10. 在随后出现的页面中点击 `定义` 选项卡，并将按钮的 `类` 属性设置为您在 CSS 样式表中定义的类的名称：`buttonstyle_incss`。您应该看到如\
    \ 图 4-11 所示的屏幕。\n\n    ![images](img/0411.jpg)\n\n    `图 4-11. 在您的 CSS 文件中引用 buttonstyle_incss\
    \ 样式`\n\n11. 保存您的更改并运行该表单。您表单上的按钮已经采用了您所附加的 CSS 文件中定义的黑底白字样式，如 图 4-12 所示。\n\n\
    \    ![images](img/0412.jpg)\n\n    `图 4-12. 应用在您表单上的 CSS 文件`\n\n#### 工作原理\n\n\
    CSS 文件在 APEX 中也被视为资源。您可以全局上载一个 CSS 文件，并在工作区的任何应用程序中重复使用它。就像标准的 Web 应用程序开发一样，您必须先声明\
    \ CSS 文件，然后才能使用其中的样式。您可以通过在表单的 `HTML 头和主体属性` 部分包含 CSS 文件的标准 HTML 声明来实现，如下所示：\n\
    \n`<link href=\"#WORKSPACE_IMAGES#myclass.css\" rel=\"stylesheet\" type=\"text/css\"\
    \ />`\n\n![images](img/square.jpg) **注意** HTML 声明的 `href` 属性需要一个指向 CSS 文件的实际路径，因此您需要包含\
    \ `#WORKSPACE_IMAGES#` 替换字符串来告诉 APEX 到哪里去查找它。\n\n### 4-4. 在您的应用程序中创建新主题\n\n####\
    \ 问题\n\n您非常喜欢您的新黑底白字按钮，以至于您希望这个按钮成为您所有其他应用程序的事实标准。您希望创建一个包含此按钮作为默认项的特殊主题，以便开发人员可以轻松地将该主题用于其他应用程序。\n\
    \n#### 解决方案\n\n要使用新主题，您必须先创建主题，然后将应用程序主题切换到您的新主题。\n\n##### 创建新主题\n\n要创建新主题，请按照以下步骤操作：\n\
    \n1.  在应用程序构建器中点击一个现有应用程序。\n2.  点击 `共享组件` 图标，并点击 `用户界面` 部分内的 `主题` 链接（如 图 4-13\
    \ 所示）。\n\n    ![images](img/0413.jpg)\n\n    `图 4-13. 用户界面区域中的主题链接`\n\n3.  在随后出现的窗口中，点击\
    \ `创建` 按钮以启动主题创建向导。\n4.  在向导的第一步中，选择 `从存储库创建` 主题。\n5.  接下来，从主题列表中选择一个主题（选择您希望的任意主题）。最后，点击\
    \ `创建` 按钮以创建主题。\n6.  您现在应该能在 `主题` 区域看到您新创建的主题，如 图 4-14 所示。我选择了 `主题 8 (Orange)`。\n\
    \n    ![images](img/0414.jpg)\n\n    `图 4-14. 新创建的主题（主题 8 (Orange) - 8）`\n\n7.\
    \  现在您拥有一个主题，您需要修改它以包含您的自定义按钮模板。点击该主题。您现在应该看到一个类似 图 4-15 的屏幕。\n\n    ![images](img/0415.jpg)\n\
    \n    `图 4-15. 主题的内容`\n\n8.  在此屏幕中，点击 `按钮类型` 部分中的 `按钮` 链接。在随后出现的页面中，从技巧 4-3 复制按钮模板，并将其粘贴到\
    \ `定义` 区域下的 `模板` 字段中。您现在应该看到如 图 4-16 所示的屏幕。保存您的更改。\n\n    ![images](img/0416.jpg)\n\
    \n    `图 4-16. 修改主题中的按钮模板`\n\n##### 切换应用程序主题\n\n要将您的应用程序主题切换到新创建的主题，请按照以下步骤操作：\n\
    \n1.  返回应用程序的 `共享组件` 部分。在相同的 `用户界面` 区域下，再次点击 `主题` 链接。\n2.  点击 `切换主题` 按钮。您现在应该看到如\
    \ 图 4-17 所示的屏幕。选择切换到您新创建的主题。\n\n    ![images](img/0417.jpg)\n\n    `图 4-17. 切换应用程序的活动主题`\n\
    \n3.  导航到向导的下一步并确认主题切换。成功切换主题后，将显示一条确认消息。现在，再次运行您的应用程序。您应该看到应用了新主题，以及您的自定义黑底白字按钮模板（如\
    \ 图 4-18 所示）。\n\n    ![images](img/0418.jpg)\n\n    `图 4-18. 应用在您表单上的新主题`\n\n\
    #### 工作原理\n\n如技巧 4-1 所述，主题是模板的集合，它们是管理用户界面的好方法。一个主题包含 APEX 中每一种用户界面元素类型的模板。主题允许您轻松地为应用程序换肤，并在不同皮肤之间切换。\n\
    \n您还可以通过在 APEX 中制作主题的副本并单独修改其中包含的模板，轻松地创建主题的新变体。\n\n![images](img/square.jpg)\
    \ **注意** 有些网站会出售或提供 APEX 主题。ApexSkins 就是这样一个网站；请访问 [`www.apexskins.com`](http://www.apexskins.com)。\n\
    \n### 4-5. 修改表单控件模板\n\n#### 问题\n\n您的应用程序运行良好。有一天，办公室里有人不小心删除了一些重要数据。高层政治介入，您那些不太懂技术的老板们认为，让表单中的所有按钮在执行任何操作前都额外弹出一个确认提示是个好主意。鉴于您现有的一些表单有大量按钮，并且一个一个地更改表单按钮不会很有趣，您开始寻找更快的替代方案。\n"
- fmt: "#### Solution\n\n修改表单控件模板以一次性更改所有按钮的行为。操作步骤如下：\n\n1.  在您的应用程序中打开现有表单。\n2.\
    \  在表单的“页面定义”区域中，展开“共享组件”部分下的“模板”节点。找到“按钮”节点并将其展开。\n3.  右键单击最深层的“按钮”节点，选择编辑该项（如`图\
    \ 4-19`所示）。\n    ![images](images/0419.jpg)\n    **`图 4-19.`** 在您的表单上应用的新主题\n\
    4.  在弹出的窗口中，找到“定义”面板。在“模板”字段中，修改`APEX`按钮模板，在按钮的`onclick`事件中包含一个确认弹出窗口的`JavaScript`（如`清单\
    \ 4-3`中粗体突出显示的部分）。\n    **`清单 4-3.`** 修改默认按钮模板\n    ```\n    <button value=\"\
    #LABEL#\" onclick=\"if (confirm('Are you sure?')) {#LINK#};\" class=\"button-gray\"\
    \ type=\"button\">\n      <span>#LABEL#</span>\n    </button>\n    ```\n5.  现在您应该看到如`图\
    \ 4-20`所示的屏幕。\n    ![images](images/0420.jpg)\n    **`图 4-20.`** 新的按钮模板\n6.  保存更改并运行表单。单击表单中的任意按钮。现在您应该看到一个`JavaScript`确认弹出窗口出现，允许您取消或确认操作，如`图\
    \ 4-21`所示。\n    ![images](images/0421.jpg)\n    **`图 4-21.`** 运行中的新按钮\n\n####\
    \ 工作原理\n\n对`APEX`而言，一个按钮未必是一个按钮，一个文本框也未必是一个文本框。抛开这种玄妙的说法，`APEX`表示每个表单控件的方式完全可由开发人员自定义。例如，`APEX`附带以下默认的按钮模板：\n\
    \n```\n<button value=\"#LABEL#\" onclick=\"#LINK#;\" class=\"button-gray\" type=\"\
    button\">\n  <span>#LABEL#</span>\n</button>\n```\n\n但`APEX`向您公开此模板并允许您修改它，这意味着您可以，例如，完全用其他内容替换前面的`HTML`。一旦您这样做，每当`APEX`应用程序需要渲染按钮时，它将渲染您的`HTML`。\n\
    \n这种灵活性意味着您可以，例如，通过更改按钮模板将表单中的所有按钮更改为图像按钮。或者，在本示例的案例中，添加默认控件中不具备的附加功能。\n\n###\
    \ 4-6. 创建可重用的代码片段\n\n#### 问题\n\n您的上司指派您在*所有*应用程序表单中创建一个区域，以以下格式显示当前系统日期：“`The\
    \ date today is XXXXXXXX.`” 您知道可以在每个表单中编写一个简单的一行`PL/SQL`来生成此标签，但更了解您上司的话，您知道他们第二天就会改变主意，要求不同的日期显示方式。考虑到这一点，您需要一种方法在应用程序中集中管理变更点，以便当您在一个位置更改文本时，它会自动在您的所有应用程序表单中生效。\n\
    \n#### 解决方案\n\n创建一个快捷方式，并从每个页面引用该快捷方式。\n\n要创建快捷方式，请按照以下步骤操作：\n\n1.  打开一个现有应用程序。\n\
    2.  单击`共享组件`图标。\n3.  在`用户界面`部分，单击`快捷方式`链接，如`图 4-22`所示。\n    ![images](images/0422.jpg)\n\
    \    **`图 4-22.`** 快捷方式链接\n4.  在下一个窗口中，单击“创建”按钮，并选择从头开始创建快捷方式。\n5.  单击`下一步`按钮。指定`MY_DATE_CAPTION`作为快捷方式的名称，将源`类型`更改为`PL/SQL\
    \ 函数体`，并在`快捷方式`字段中键入以下文本：`return 'The date today is ' || to_char(sysdate,'DD/MM/YYYY\
    \ HH24:MI:SS');`\n6.  现在您应该看到如`图 4-23`所示的屏幕。\n    ![images](images/0423.jpg)\n\
    \    **`图 4-23.`** 为快捷方式指定源\n7.  单击“创建”按钮以创建快捷方式。现在您应该看到新创建的快捷方式，如`图 4-24`所示。\n\
    \    ![images](images/0424.jpg)\n    **`图 4-24.`** 新创建的快捷方式\n\n要从您的表单引用快捷方式，请按照以下步骤操作：\n\
    \n1.  打开一个现有表单。\n2.  在表单的“页面定义”区域中，创建一个新区域（右键单击`页面渲染`部分中的`表单` ![images](images/U001.jpg)\
    \ `区域` ![images](images/U001.jpg) `主体`节点，然后单击`创建`菜单项）。\n3.  在向导中选择`HTML`区域类型。\n\
    4.  在向导的下一页，选择`HTML 文本（含快捷方式）`，如`图 4-25`所示。\n    ![images](images/0425.jpg)\n\
    \    **`图 4-25.`** 在区域中使用 HTML 文本（含快捷方式）\n5.  在下一步中，指定区域的标题。\n6.  下一步将允许您指定`HTML\
    \ 文本区域源`。键入您之前创建的快捷方式的名称，用双引号括起来（如`图 4-26`所示）。\n    ![images](images/0426.jpg)\n\
    \    **`图 4-26.`** 从区域引用快捷方式\n7.  现在单击`创建区域`按钮。\n8.  现在您应该看到日期值出现在表单的区域中，如`图 4-27`所示。\n\
    \    ![images](images/0427.jpg)\n    **`图 4-27.`** 运行中的快捷方式\n\n#### 工作原理\n\n您可以选择不将信息直接硬编码在表单中，而是将它们外部表示为一个动态变量，在需要时从您的应用程序中引用。在`APEX`中，这样的变量称为快捷方式。\n\
    \n使用快捷方式有很多好处。例如，如果您的上司决定将文本从“`The date today is`”更改为“`Current date is`”，您只需在快捷方式中更改它，使用该快捷方式的应用程序每个部分都将显示正确的文本。\n\
    \n### 4-7. 通过插件扩展用户界面\n\n#### 问题\n\n您需要创建一个现有`APEX`控件工具箱中没有的表单控件。您还计划与同事共享此控件，因此需要使其可重用。"
  raw: "#### Solution\n\nModify the form control template in order to change the behavior\
    \ for all buttons at once. Here are the steps to follow:\n\n1.  Open the existing\
    \ form in your application.\n2.  In the Page Definition area of the form, expand\
    \ the Templates node in the Shared Components section. Look for the Button node,\
    \ and expand that as well.\n3.  Right-click on the deepest Button node, and choose\
    \ to Edit the item (as shown in [Figure 4-19](#Chapter04.html#fig_4_19)).\n\n\
    \    ![images](images/0419.jpg)\n\n    ***Figure 4-19.** The new theme applied\
    \ on your form*\n\n4.  In the ensuing popup window, look for the Definition panel.\
    \ In the Template field, modify the APEX button template to include a confirmation\
    \ pop-up JavaScript in the onclick event of the button (as highlighted in bold\
    \ in [Listing 4-3](#Chapter04.html#list_4_3)).\n\n    ***Listing 4-3.** Modifying\
    \ the Default Button Template*\n\n    `<button value=\"#LABEL#\" onclick=\"if\
    \ (confirm('Are you sure?')) {#LINK#};\" class=\"button-gray\" type=\"button\"\
    >`\n    `  <span>#LABEL#</span>`\n    `</button>`\n5.  You should now have the\
    \ screen shown in [Figure 4-20](#Chapter04.html#fig_4_20).\n\n    ![images](images/0420.jpg)\n\
    \n    ***Figure 4-20.** The new button template*\n\n6.  Save your changes and\
    \ run the form. Click on any button in your form. You should now see a JavaScript\
    \ confirmation pop-up window appear, allowing you to cancel or confirm your action,\
    \ as shown in [Figure 4-21](#Chapter04.html#fig_4_21).\n\n![images](images/0421.jpg)\n\
    \n***Figure 4-21.** The new button in action*\n\n#### How It Works\n\nTo APEX,\
    \ a button may not necessarily be a button, and a textbox not necessarily a textbox.\
    \ Zen-speak aside, how APEX represents each form control is entirely customizable\
    \ by the developer. For instance, APEX ships with the following default template\
    \ for a button:\n\n`<button value=\"#LABEL#\" onclick=\"#LINK#;\" class=\"button-gray\"\
    \ type=\"button\">`\n\n`  <span>#LABEL#</span>`\n`</button>`\n\nBut the fact that\
    \ APEX exposes this template to you and lets you modify it means that you can,\
    \ for instance, replace the previous HTML with something else entirely. Once you\
    \ do that, every time an APEX application needs to render a button, it would render\
    \ your HTML.\n\nThis flexibility means that you can, for instance, to change all\
    \ buttons in your form to image buttons simply by changing the button template.\
    \ Or, in the case of this recipe, add additional functionality not present in\
    \ the default control.\n\n### 4-6. Creating Reusable Code Snippets\n\n#### Problem\n\
    \nYou have been tasked by your bosses to create an area in *all* your application\
    \ forms to display the current system date in this fashion: “`The date today is\
    \ XXXXXXXX.`” You know you can write a simple one-line PL/SQL to generate this\
    \ label inside every form, but knowing your bosses better, you know they're going\
    \ to change their finicky minds the next day on how the date is presented. With\
    \ this in mind, you need a way to centralize the point of change in your application,\
    \ so that when you change the text in one location, it will automatically take\
    \ effect in all your application forms.\n\n#### Solution\n\nCreate a shortcut\
    \ and reference that shortcut from each of your pages.\n\nTo create a shortcut,\
    \ follow these steps:\n\n1.  Open an existing application.\n2.  Click the `Shared\
    \ Components` icon.\n3.  In the `User Interface` section, click the `Shortcuts`\
    \ link shown in [Figure 4-22](#Chapter04.html#fig_4_22).\n\n    ![images](images/0422.jpg)\n\
    \n    ***Figure 4-22.** The Shortcuts link*\n\n4.  In the next window, click the\
    \ Create button, and choose to create the shortcut from scratch.\n5.  Click the\
    \ `Next` button. Specify `MY_DATE_CAPTION` as the name of the shortcut, change\
    \ the Source `Type` to `PL/SQL Function Body`, and type the following text into\
    \ the `Shortcut` field: `return 'The date today is ' || to_char(sysdate,'DD/MM/YYYY\
    \ HH24:MI:SS');`\n6.  You should now see the screen shown in [Figure 4-23](#Chapter04.html#fig_4_23).\n\
    \n    ![images](images/0423.jpg)\n\n    ***Figure 4-23.** Specifying the source\
    \ for the shortcut*\n\n7.  Click the Create button to create the shortcut. You\
    \ should now see the newly created shortcut shown in [Figure 4-24](#Chapter04.html#fig_4_24).\n\
    \n![images](images/0424.jpg)\n\n***Figure 4-24.** The newly created shortcut*\n\
    \nTo reference the shortcut from your form, follow these steps:\n\n1.  Open an\
    \ existing form.\n2.  In the Page Definition area of the form, create a new region\
    \ (Right-click on the `Form` ![images](images/U001.jpg) `Regions` ![images](images/U001.jpg)\
    \ `Body` node in the `Page Rendering` section and click the `Create` menu item).\n\
    3.  Choose the `HTML` region type in the wizard.\n4.  In the next page of the\
    \ wizard, choose `HTML Text (with shortcuts),` as shown in [Figure 4-25](#Chapter04.html#fig_4_25).\n\
    \n    ![images](images/0425.jpg)\n\n    ***Figure 4-25.** Using HTML Text (with\
    \ shortcuts) in a region*\n\n5.  In the next step, specify a title for the region.\n\
    6.  The next step will allow you to specify the `HTML Text Region source`. Type\
    \ in the name of the shortcut you created earlier, encased between the double\
    \ quotes (as shown in [Figure 4-26](#Chapter04.html#fig_4_26)).\n\n    ![images](images/0426.jpg)\n\
    \n    ***Figure 4-26.** Referencing the shortcut from the region*\n\n7.  Now click\
    \ the `Create Region` button.\n8.  You should now see the date value appear in\
    \ the region of your form, as shown in [Figure 4-27](#Chapter04.html#fig_4_27).\n\
    \n![images](images/0427.jpg)\n\n***Figure 4-27.** The shortcut in action*\n\n\
    #### How It Works\n\nInstead of hardcoding information directly inside a form,\
    \ you can choose to have them externally represented as a dynamic variable, referenced\
    \ from your application whenever required. In APEX, such a variable is called\
    \ a shortcut.\n\nThere are many benefits to using shortcuts. For instance, if\
    \ your boss decides that the text should be changed from “`The date today is`”\
    \ to “`Current date is`”, you can just change it in the shortcut, and every part\
    \ of your application that uses the shortcut will display the correct text\n\n\
    ### 4-7. Extending the UI via Plug-ins\n\n#### Problem\n\nYou need to create a\
    \ form control that isn't available in the existing APEX control toolbox. You\
    \ plan to also share this control with your colleagues, so you need to make this\
    \ control reusable."
