  trans: "\n## 创建客户表\n\n以下是创建客户表的步骤：\n\n1.  以开发者身份登录到现有的 APEX 工作区。\n\n    ![images](img/square.jpg)\
    \ **注意** 关于如何创建工作区的更多信息，您可以参考配方 1-5。\n\n2.  现在需要创建客户表。点击 `SQL Workshop` ![images](img/U001.jpg)\
    \ `Object Browser` 菜单项。在随后出现的窗口中，点击右上角的 `Create` 按钮，并选择 `Table` 菜单项。\n3.  系统将显示一个允许您定义数据库表的窗口。指定表的名称并为表定义几个字段。您可以创建混合的\
    \ `NVARCHAR2`、`NUMBER` 和 `DATE` 类型字段。如图 2-1 所示。\n\n    ![images](img/0201.jpg)\n\
    \n    *图 2-1. 创建客户表*\n\n4.  点击 `Next` 按钮继续。在此屏幕中，如果需要，您可以定义主键。将主键设置为表中的 `ID` 字段，如图\
    \ 2-2 所示。\n\n    ![images](img/square.jpg) **提示** 一些 APEX 功能，例如从报表页面编辑记录，需要在报表所基于的表或视图上定义主键。您可以在配方\
    \ 2-2 中了解更多关于报表页面的信息。\n\n    ![images](img/0202.jpg)\n\n    *图 2-2. 定义主键*\n\n\
    5.  点击 `Next` 按钮。下一页允许您定义外键（如果存在）。由于目前没有外键，跳过此页并再次点击 `Next` 按钮。在下一页中，您可以为表定义约束。例如，您可能不希望有重复记录（同一公司的两条名称相同的记录）。选择在\
    \ `Name` 字段上创建唯一约束，如图 2-3 所示。\n\n    ![images](img/0203.jpg)\n\n    *图 2-3. 在客户表上定义约束*\n\
    \n6.  点击 `Next` 按钮。您将看到即将创建的表的摘要。点击 `Create` 按钮确认请求，之后您的表将被生成。如果您浏览表列表，应该会看到 `Customers`\
    \ 表出现在该列表中（如图 2-4 所示）。\n\n    ![images](img/0204.jpg)\n\n    *图 2-4. 对象浏览器中的客户表*\n\
    \n## 创建数据库应用程序和数据录入表单\n\n现在是创建数据库应用程序的时候了。\n\n1.  要创建新的数据库应用程序，请点击工作区主页中的 `Application\
    \ Builder` ![images](img/U001.jpg) `Database applications` 菜单项。\n2.  应用程序构建器向导将显示（如图\
    \ 2-5 所示）。选择 `Database application` 类型。\n\n    ![images](img/0205.jpg)\n\n   \
    \ *图 2-5. 应用程序构建器向导*\n\n3.  接下来，您需要指定应用程序的名称。使用 `Sales Force` 作为应用程序名称。选择从头开始创建应用程序。点击\
    \ `Next` 按钮。\n4.  您现在将看到向导中名为 `Pages` 的部分。在这里，您可以定义应用程序中包含的页面列表。创建一个空白页面；这将是您应用程序的主页。选择空白页面类型并指定\
    \ `My Home` 作为您的页面名称（参见图 2-6）。完成后，点击 `Add Page` 按钮。\n\n    ![images](img/0206.jpg)\n\
    \n    *图 2-6. 创建空白页面作为主页*\n\n5.  在同一区域，您将能够创建数据录入页面。选择 `Form` 页面类型。在 `Subordinate\
    \ to Page` 字段中，选择 `My Home` 页面。在 `table name` 字段中，从数据库中选择一个现有的表；在您的情况下，就是您之前创建的\
    \ `Customers` 表。完成后，点击 `Add Page` 按钮。此步骤的详细信息如图 2-7 所示。\n\n    ![images](img/square.jpg)\
    \ **提示** `Subordinate to Page` 字段为 APEX 提供了关于您的页面如何结构化的信息。这反过来又定义了 APEX 之后生成的默认导航方案。例如，将\
    \ `Customers` 表单设置为 `My Home` 页面的下级，将导致 APEX 在主页中自动生成一个指向 `Customers` 表单的链接。\n\
    \n    ![images](img/0207.jpg)\n\n    *图 2-7. 创建客户数据录入页面*\n\n6.  完成后，点击 `Next`\
    \ 按钮。在下一页中，您可以为应用程序定义选项卡。使用默认设置并继续到下一页。您现在也可以跳过 `Shared Components`、`Attributes`\
    \ 和 `UI` 向导页面。点击 `Create` 按钮创建应用程序。系统将要求您再次确认您的设置。\n7.  应用程序成功创建后，您将看到图 2-8 所示的截图。（请注意，`Login`\
    \ 页面会在您的应用程序中自动生成）。点击 `Run Application` 图标来试用您的应用程序！\n\n    ![images](img/0208.jpg)\n\
    \n    *图 2-8. SalesForceApp 应用程序创建成功！*\n\n8.  您将首先看到 `Login` 页面。使用您之前登录到工作区时所用的开发者账户的相同凭据登录。登录到应用程序后，您应该会看到如图\
    \ 2-9 所示的主页。请注意，主页上已自动生成了一个指向 `Customers` 页面的链接。\n\n    ![images](img/0209.jpg)\n\
    \n    *图 2-9. 您应用程序的主页*\n\n9.  点击 `Customers` 链接以打开 `Customers` 数据录入表单。您可以在这里看到您的表单（包含来自\
    \ `Customers` 表的完整字段列表）。在此表单中输入一些信息，完成后点击 `Create` 按钮。如图 2-10 所示。\n\n    ![images](img/square.jpg)\
    \ **注意** 表单上生成的控件取决于数据库表中声明的字段类型。例如，数据库中的 `DATE` 字段会在表单上生成一个日期选择器控件。\n\n    ![images](img/0210.jpg)\n\
    \n    *图 2-10. 客户数据录入页面*\n\n10. 创建记录后，从应用程序注销，并点击底部栏中的 `Home` 按钮返回工作区。导航到 `SQL\
    \ Workshop` 中的 `Object Browser`，查看此表中的数据。您应该能够在数据库表中看到新创建的记录（参见图 2-11）。\n\n  \
    \  ![images](img/0211.jpg)\n\n    *图 2-11. 新创建的客户记录*\n\n### 工作原理\n\n`Database\
    \ Application` 类型是 APEX 中最常见的应用程序类型。它允许您设置页面（特别是表单和报表），从而快速围绕现有数据库表生成 CRUD（增删改查）用户界面。\n\
    \n一个典型的 APEX 应用程序从开发者（或数据库设计者）定义应用程序所需的完整数据库表集开始。这可以使用 `Object Browser` 工具或在 APEX\
    \ 的 `SQL Workshop` 部分运行 PL/SQL 脚本来完成。也可以使用外部工具、脚本中的一组 DDL 或从另一个数据库导入模式来创建数据库对象——表、索引、约束、序列等。\n\
    \n一旦表全部生成，APEX 开发者就会从这些数据库表的模式中生成所需的表单和报表。表单就位后，开发者通过添加验证例程、JavaScript 功能、复杂表单行为、访问权限设置等来优化这些生成的页面。\n\
    \n### 2-2. 创建报表以管理您的数据\n\n### 问题\n\n您的用户希望创建两个页面：一个数据录入表单和另一个页面来检索他们刚刚输入的数据。该应用程序还需要以网格（列表）格式逐行向用户显示先前输入的数据，并提供一种让他们编辑和删除其数据的方法。\n"
- fmt: '#### Solution


    执行以下步骤以创建一个显示现有记录的报表：


    1.  在工作区中打开 Sales Force 应用程序（以开发者身份连接）。

    2.  点击右上角的“Create Page”按钮。在弹出的窗口中，选择“Form”页面类型。在下一页（[图 2-12](#Chapter02.html#fig_2_12)）中，选择“Form
    on a Table with Report”页面类型。点击“Next”按钮继续。


    ![images](images/0212.jpg)


    ***Figure 2-12.** 选择页面类型*


    3.  在下一页，使用默认设置。点击“Next”按钮进入表/视图选择页面。选择`Customers`表并点击“Next”按钮。在接下来的向导两页中使用默认设置。您最终将看到如[图
    2-13](#Chapter02.html#fig_2_13)所示的页面，该页面允许您定义报表中可用的列。高亮（选择）所有列，然后点击“Next”按钮。


    ![images](images/0213.jpg)


    ***Figure 2-13.** 指定要包含在报表中的列列表*


    4.  在向导的接下来四页中使用默认设置。之后，您将看到一个页面，允许您选择表单中可用的列。选择所有列。


    ![images](images/square.jpg) **提示** 此时，您可能会遇到 `Column Names must be valid Oracle
    Identifiers` 错误。如果您包含了 Oracle 数据库中的某些保留关键字或包含无效字符的字段，就可能发生这种情况。与 APEX 相比，Oracle
    数据库在字段命名方面具有更高的自由度。您可以在以下链接查看 Oracle 命名数据库对象的规则：[`http://download.oracle.com/docs/cd/E11882_01/server.112/e17118/sql_elements008.htm#SQLRF51129`](http://download.oracle.com/docs/cd/E11882_01/server.112/e17118/sql_elements008.htm#SQLRF51129)。


    5.  在下一页，您可以决定是否允许用户通过报表对`Customers`表执行插入、更新或删除记录的操作。将所有选项保留为“Yes”（参见[图 2-14](#Chapter02.html#fig_2_14)）。


    ![images](images/0214.jpg)


    ***Figure 2-14.** 表单上的处理选项*


    6.  点击“Next”按钮，然后点击“Finish”以完成配置并创建表单和报表。之后，返回您的应用程序主页。您应该能够在应用程序中看到两个新页面：“Report
    on CUSTOMERS”和“Form on CUSTOMERS”。您可以在[图 2-15](#Chapter02.html#fig_2_15)中看到它们。


    ![images](images/0215.jpg)


    ***Figure 2-15.** 新创建的报表和表单*


    7.  现在，您需要在首页创建指向该报表和表单的链接。导航到应用程序主页，点击“1-My Home”页面。这将显示该页面的配置区域。在“Page Rendering”部分下，导航到
    Regions ![images](images/U001.jpg) Body (3)，右键单击“Navigation”项并选择“Edit List”菜单项。这将显示如[图
    2-16](#Chapter02.html#fig_2_16)所示的页面。


    ![images](images/0216.jpg)


    ***Figure 2-16.** “Entries by List”页面*


    8.  点击右上角的“Create List”按钮。这将显示一个新页面，允许您配置导航列表的设置。将“List Entry Label”指定为“My List
    of Customers”（这是链接上显示的标题），并为“Page”字段选择“Report on CUSTOMERS”页面。完成后，点击“Create”按钮。您现在应该能在“Entries
    by List”页面看到您新创建的链接。

    9.  现在，导航到您的应用程序并运行它。您现在应该在应用程序首页区域看到新的“My List of Customers”链接，如[图 2-17](#Chapter02.html#fig_2_17)所示。


    ![images](images/0217.jpg)


    ***Figure 2-17.** 应用程序首页区域*


    10. 点击“My List of Customers”链接。您应该能看到来自`Customers`表的记录显示在表格中。点击“Create”按钮以向列表中添加新记录。您将看到关联的表单显示（如[图
    2-18](#Chapter02.html#fig_2_18)所示）。填写此表单并点击“Create”按钮。


    ![images](images/0218.jpg)


    ***Figure 2-18.** 客户详情表单*


    11. 添加新记录后，您将能够在列表中看到它（如[图 2-19](#Chapter02.html#fig_2_19)所示）。您也可以通过点击表格左侧的小纸笔图标来编辑现有记录。


    ![images](images/0219.jpg)


    ***Figure 2-19.** 新创建的记录*


    #### How It Works


    报表是 APEX 中的一种对象类型，指的是以表格形式显示的多个数据记录的列表。“报表”这个词有点用词不当，因为它在 APEX 中的用途远不止生成传统的数据报告。APEX
    中的报表（特别是交互式报表）通常用于向用户呈现记录列表，以便他/她可以从底层表中修改或删除它们。从这个意义上说，报表的功能可以被认为与视图类似。


    报表也可以用于具有主从关系的明细表单中，此时报表呈现为主表单内的表格形式。然后，可以将多个子记录输入到此表中。


    报表带有很多内置功能；[表 2-1](#Chapter02.html#tab_2_1) 列出了报表提供的一些默认功能。


    ***Table 2-1.** 报表内置功能*


    | **功能** | **描述** |

    | --- | --- |

    | `Filter` | 也许是报表最强大的功能，过滤器允许最终用户（实时地）定义一组过滤器，这些过滤器可以立即应用于报表中显示的完整行集。过滤器实时修改对数据库的查询；这意味着发送到
    APEX 进行处理的数据集只是显示给用户的信息。 |

    | `Paging` | 报表中的记录由 APEX 自动分页。最终用户可以动态更改页面大小（单页中显示的行数）。 |

    | `Sorting` | 最终用户可以轻松地实时按报表中的每一列排序。 |

    | `Grouping` | 最终用户可以按某个字段或字段组合动态分组记录。 |

    | `Highlighting` | 最终用户可以选择根据某些条件动态高亮显示行（例如，将金额大于 $10,000 的所有发票记录以红色高亮显示）。 |

    | `Create Computed Columns` | 最终用户可以动态创建由现有列中的数据计算得出的附加列。最终用户可以定义非常复杂的公式来执行此计算。
    |

    | `Chart` | 最终用户可以动态创建报表中现有数据的图表视图。只需点击几下，最终用户就可以创建一个复杂的饼图，例如，来可视化报表中的数据。 |

    | `Aggregate` | 最终用户可以使用聚合函数（例如，求和），该函数计算报表中某一列所有数据的聚合值，并将其显示在列的底部。这可以与分组结合使用。
    |


    ### 2-3. Changing Field Item Types in a Form


    #### Problem


    您需要将表单上几个字段的项目类型从文本区域更改为单行文本框。'
  raw: '#### Solution


    Execute the following steps to create a report to show existing records:


    1.  Open the Sales Force application in the workspace (connected as a developer).

    2.  Click the Create Page button in the top right corner. In the ensuing window,
    choose the Form page type. In the next page ([Figure 2-12](#Chapter02.html#fig_2_12)),
    choose the Form on a Table with Report page type. Click the Next button to continue.


    ![images](images/0212.jpg)


    ***Figure 2-12.** Choosing the page type*


    3.  In the next page, use the default settings. Click the Next button to proceed
    to the table/view selection page. Choose the Customers table and click the Next
    button. Use the default settings for the next two pages of the wizard. You will
    eventually see the page in [Figure 2-13](#Chapter02.html#fig_2_13) that allows
    you to define the columns available in the report. Highlight (select) all columns
    and click the Next button.


    ![images](images/0213.jpg)


    ***Figure 2-13.** Specifying the list of columns to include in the report*


    4.  Use the default settings for the next four pages of the wizard. After that
    you will see a page that allows you to select the columns available in the form.
    Select all the columns.


    ![images](images/square.jpg) **Tip** At this point, you may run into the **Column
    Names must be valid Oracle Identifiers** error. This may happen if you include
    certain fields from the Oracle database that are reserved keywords or contain
    invalid characters. The Oracle database exercises a higher level of freedom with
    regards to field names compared to APEX. You can view Oracle''s rules for naming
    database objects at the following link: [`http://download.oracle.com/docs/cd/E11882_01/server.112/e17118/sql_elements008.htm#SQLRF51129`](http://download.oracle.com/docs/cd/E11882_01/server.112/e17118/sql_elements008.htm#SQLRF51129).


    5.  In the next page, you can decide if you want to let your users insert, update,
    or delete records from the Customers table through the report. Leave all the options
    as Yes (see [Figure 2-14](#Chapter02.html#fig_2_14)).


    ![images](images/0214.jpg)


    ***Figure 2-14.** Process options on the form*


    6.  Click the Next button and click Finish to finalize your configuration and
    to create the form and report. After that, return to your application home. You
    should be able to see two new pages in your application: Report on CUSTOMERS and
    Form on CUSTOMERS. You can see these in [Figure 2-15](#Chapter02.html#fig_2_15).


    ![images](images/0215.jpg)


    ***Figure 2-15.** The newly created report and form*


    7.  Now you need to create a link to the report and form in your home page. Navigate
    to the application home, and click the 1-My Home page. This should display the
    configuration area for the page. Under the Page Rendering section, navigate to
    Regions ![images](images/U001.jpg) Body (3), right click on the Navigation item
    and choose the Edit List menu item. This should display the page shown in [Figure
    2-16](#Chapter02.html#fig_2_16).


    ![images](images/0216.jpg)


    ***Figure 2-16.** The Entries by List page*


    8.  Click the Create List button in the top right corner. This will display a
    new page allowing you to configure the settings for the navigation list. Specify
    My List of Customers as the List Entry Label (this is the caption that is displayed
    on the link), and choose the Report on CUSTOMERS page for the page field. When
    you are done, click the Create button. You should now see your newly created link
    in the Entries by List page.

    9.  Now, navigate to your application and run the application. You should now
    see the new My List of Customers link in your application home page area, as shown
    in [Figure 2-17](#Chapter02.html#fig_2_17).


    ![images](images/0217.jpg)


    ***Figure 2-17.** The application home page area*


    10.  Click the My List of Customers link. You should be able to see the records
    from the Customers table show in the table. Click the Create button to add a new
    record to the list. You will see the associated form show (as shown in [Figure
    2-18](#Chapter02.html#fig_2_18)). Fill out this form and click the Create button.


    ![images](images/0218.jpg)


    ***Figure 2-18.** The customer details form*


    11.  Once you have added the new record, you will be able to see it in the list
    (as shown in [Figure 2-19](#Chapter02.html#fig_2_19)). You can also edit an existing
    record by clicking the little paper and pen icon to the left of the table.


    ![images](images/0219.jpg)


    ***Figure 2-19.** The newly created record*


    #### How It Works


    A report is an object type in APEX that refers to a listing of multiple data records
    displayed in a tabular format. The word “report” is a bit of a misnomer since
    its usage in APEX covers much more than just generating traditional data reports.
    A report in APEX (specifically an interactive report) is commonly used to present
    a list of records to the user so that he/she can modify or delete them from the
    underlying table. In this manner, the function of the report can be considered
    similar to that of a view.


    Reports can also be used in detail forms with master-child relationships where
    the report takes the appearance of a table inside the master form. Multiple child
    records can then be entered into this table.


    Reports come with a lot of built-in functionality; [Table 2-1](#Chapter02.html#tab_2_1)
    lists some of the default functionality provided with reports.


    ***Table 2-1.** Functionality Built Into Reports*


    | **Functionality** | **Description** |

    | --- | --- |

    | `Filter` | Perhaps the most powerful feature of reports, filters allow the end
    user (in real time) to define a set of filters that can instantly apply to the
    full set of rows displayed in the report. Filters modify the query to the database
    in real time; this means that the dataset sent to APEX for processing is just
    the information displayed to the user. |

    | `Paging` | Records in reports are automatically paged by APEX. The end user
    can dynamically change the page size (number of rows displayed in a single page).
    |

    | `Sorting` | The end user can easily sort via each column in the report in real
    time. |

    | `Grouping` | The end user can dynamically group records by a certain field or
    combination of fields. |

    | `Highlighting` | The end user can choose to dynamically highlight rows based
    on certain criteria (for example, highlight in red all invoice records with amount
    larger than $10,000). |

    | `Create Computed Columns` | The end user can dynamically create additional columns
    that are computed from data in existing columns. The end user can define very
    complex formulas to perform this computation. |

    | `Chart` | The end user can dynamically create a chart view of the existing data
    in the report. With a few clicks, the end user could create a complex pie chart,
    for example, to visualize the data in the report. |

    | `Aggregate` | The end user can use aggregate functions (for example, summation)
    that calculate an aggregate value of all data in a column of the report and displays
    it at the bottom of the column. This can be combined with grouping. |


    ### 2-3. Changing Field Item Types in a Form


    #### Problem


    You need to change the item type of several fields on the form from a text area
    to a single-line text box.'
