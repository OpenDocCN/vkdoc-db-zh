- fmt: "### Solution\n\nTo enable region caching, please follow these steps:\n\n1.\
    \  Log in to `APEX` and open any application that contains a form. (To create\
    \ a form page, please see Recipe 2-1). Navigate to the Page Rendering view of\
    \ the form page.\n2.  Expand the Regions node, and right click on any region under\
    \ this node. Click the Edit menu item in the pop-up menu. This will bring you\
    \ to the Region Definition page.\n3.  Click the Caching tab. Change the Caching\
    \ drop-down list from Not Cached to Cached.\n4.  You should see several fields.\
    \ Set the timeout value for the cache (the amount of time the region should stay\
    \ cached) to 1 hour and the Cache condition type to Always, as shown in [Figure\
    \ 7-7](#Chapter07.html#fig_7_7).\n\n    ![images](images/0707.jpg)\n\n    `Figure\
    \ 7-7.` Enabling caching in a page region\n\n5.  Run your form now. If you include\
    \ `#TIMING#` statistics in the region footer, you should observe that the amount\
    \ of time elapsed in rendering the region is smaller on consecutive runs.\n\n\
    ### How It Works\n\nIt’s almost inevitable that pages in your application will\
    \ have to handle dynamic queries, web service calls, and so on. If, for instance,\
    \ you had to call a remote web service to retrieve the list of fruits for display\
    \ in a region, that would equate to a lot of calls! Imagine a user base of 2000\
    \ loading this page—this would generate 2000 web service calls.\n\nNow if the\
    \ web service retrieves exactly the same thing or something that rarely changes\
    \ (for example, branch outlet phone numbers), it would be ideal to have this information\
    \ cached so that the web service need only be called once. The data retrieved\
    \ is then stored locally. When the next user requests the same data, it would\
    \ fetch it from the local store instead of invoking another web service call.\n\
    \nWhen you cache a region, you are doing exactly this. The static HTML (generated\
    \ content) of an entire region can be cached by `APEX`, so that when the next\
    \ user renders the region, it will just grab the static HTML from the local cache\
    \ store. This saves a huge amount of processing cycles and can even significantly\
    \ reduce network traffic (by reducing the number of dynamic calls to physically\
    \ remote systems). You can choose to cache a particular region of a form by setting\
    \ the Caching property to true. If you wanted caching to be always applied, choose\
    \ the Always condition type.\n\nYou can specifically state the conditions in which\
    \ data should be retrieved from the cache instead of being dynamically rendered.\
    \ The Cache Condition Type drop-down lists allows you to specify this condition.\
    \ For instance, if you are creating an online gift ordering application, you may\
    \ want to create a condition that does a check on the system date so that caching\
    \ will only be applied during the month of December, when you can expect a larger\
    \ number of hits from holiday shoppers.\n\n## 7-5\\. Enabling Page Caching\n\n\
    ### Problem\n\nYou have a page that consists mostly of static data. You want to\
    \ improve the rendering performance of this page.\n\n### Solution\n\nPage caching,\
    \ as opposed to region caching, caches the static HTML of an entire page. To enable\
    \ page caching, please follow these steps:\n\n1.  Log in to `APEX` and open any\
    \ application that contains a form. (To create a form page, please see Recipe\
    \ 2-1). Navigate to the Page Rendering view of the form page.\n2.  Right-click\
    \ on the root node, and choose the Edit menu item in the pop-up menu. This will\
    \ bring you to the Page Definition page.\n3.  Click the Cache tab. Change the\
    \ Cache drop-down list from No to Yes.\n4.  You should now be able to set the\
    \ timeout value for the cache (the amount of time the region should stay cached)\
    \ to 1 hour and the Cache condition type to Always, as shown in [Figure 7-8](#Chapter07.html#fig_7_8).\n\
    \n    ![images](images/0708.jpg)\n\n    `Figure 7-8.` Enabling caching in a page\n\
    \n5.  Run your form now. If you use the Monitor Activity tool to check the weighted\
    \ performance for the page, you should observe that the amount of time elapsed\
    \ in rendering the page is smaller on consecutive runs.\n\n### How It Works\n\n\
    Caching works not only at the region level but also at the page level. Page caching\
    \ is different from region caching in that it caches the static HTML of the entire\
    \ page. If your objective for the page is to simply display some static information\
    \ that rarely changes, it is a good candidate for page caching.\n\nThe Cache By\
    \ User setting allows the page to be cached by user, as opposed to caching by\
    \ session. The difference is that if you cache a page by session, all other users\
    \ will use the same copy from the cache, whereas if you cached a page by user,\
    \ the data is only retrieved from the cache if it was accessed by the same user\
    \ that first accessed the page.\n\n![images](images/square.jpg) **Tip** One problem\
    \ with page caching is that sometimes the data for a cached page might have changed,\
    \ and `APEX` is still retrieving the cached copy. In such cases, it might be fruitful\
    \ to invalidate the cache based on a certain event. You can use the `APEX_UTIL.CLEAR_PAGE_CACHE(page_number);`\
    \ function to invalidate the cache when the user logs out of the application or\
    \ after a period of inactivity, for example.\n\n## Chapter 8\n\n## Securing an\
    \ Application\n\nApplications that you build on top of `APEX` are not, by default,\
    \ magically hacker-proof. Even tight platforms such as `APEX` have several security\
    \ concerns. In `APEX`, these concerns usually center around three main areas:\
    \ authentication, authorization, and vulnerability exploits.\n\nAuthentication\
    \ refers to the process of checking if the user has rights to access (log in to)\
    \ the application. This is usually done through a username-password challenge.\
    \ Authorization is the process of specifying access rights for each user to a\
    \ particular resource in the application. For instance, an authorization scheme\
    \ may permit a user to view a report but not to delete it. Finally, security vulnerability\
    \ exploits—events like SQL injection attacks and cross-site scripting attacks—work\
    \ on the premise of cleverly manipulating input data so that it ends up being\
    \ executed by your application.\n\nThe good news is that `APEX` provides ample\
    \ features and allocation to elegantly handle all three concerns. In this chapter,\
    \ you will learn how to beef up security in your application.\n\n### 8-1\\. Creating\
    \ Your Own Authentication Scheme\n\n### Problem\n\nYou have an existing database\
    \ table containing the list of all users in the organization, together with their\
    \ passwords. This database table is a custom table proprietary to your organization.\
    \ You try to convince your bosses to migrate the list of user accounts from the\
    \ custom table into `APEX`, but they insist that your application authenticate\
    \ against this table instead in real time.\n\nAnd so you embark on this task.\
    \ You want to create a custom authentication scheme to authenticate your `APEX`\
    \ application against this external database table."
