  trans: "## 解决方案\n\n要使用数据库对象依赖关系报告来查看应用程序的所有依赖关系，请遵循以下步骤。\n\n1.  登录应用程序构建器。\n2. \
    \ 打开您希望导出的应用程序。\n3.  点击页面顶部的实用工具图标，如 图 9-2 所示。\n\n    ![images](img/0902.jpg)\n\
    \n    `图 9-2. 实用工具图标`\n\n4.  在后续页面中，点击数据库对象依赖关系图标，如 图 9-3 所示。\n\n    ![images](img/0903.jpg)\n\
    \n    `图 9-3. 数据库对象依赖关系图标`\n\n5.  在接下来的页面中，点击右上角的**计算依赖关系**链接。\n6.  现在，您应该在页面的主区域看到一个表格，描述了应用程序当前使用的所有对象，如\
    \ 图 9-4 所示。\n\n    ![images](img/0904.jpg)\n\n    `图 9-4. 数据库对象依赖关系报告`\n\n## 工作原理\n\
    \n数据库对象依赖关系查看器提供了应用程序使用的所有数据库对象的单页摘要。这在决定要从应用程序中导出哪些对象时非常有用。\n\n## 9-3. 导出应用程序\n\
    \n### 问题\n\n您希望将应用程序从一个模式或实例中导出，以便将其部署到生产环境。\n\n### 解决方案\n\n要导出应用程序，请遵循以下步骤：\n\
    \n1.  登录应用程序构建器。\n2.  打开您希望导出的应用程序。\n3.  点击页面顶部的**导入/导出**图标，如 图 9-5 所示。\n\n  \
    \  ![images](img/0905.jpg)\n\n    `图 9-5. 导出/导入图标`\n\n4.  在下一页，选择**导出**并点击**下一步**按钮。\n\
    5.  在下一页，确认您希望导出的应用程序，并选择 DOS 文件格式，如 图 9-6 所示。\n\n    对于 UNIX 操作系统的用户，请改选 UNIX\
    \ 文件格式。不同导出文件格式的主要区别在于行尾的结束方式：基于 UNIX 的文件格式以 `LF` 字符结尾，而基于 Windows 的文件格式以 `CR/LF`\
    \ 字符结尾。\n\n    ![images](img/0906.jpg)\n\n    `图 9-6. 导出应用程序`\n\n6.  点击**导出应用程序**按钮。这将启动导出过程。过程结束时（应该需要几秒钟），系统将提示您下载生成的文件（一个\
    \ `.sql` 文件），如 图 9-7 所示。\n\n    ![images](img/0907.jpg)\n\n    `图 9-7. 保存导出的 SQL\
    \ 文件`\n\n### 工作原理\n\n`APEX` 中的应用程序由元数据、数据和业务逻辑组成，所有这些都很好地存储在 Oracle 数据库中。当您导出应用程序时，它会将所有元数据导出到一个\
    \ SQL 文件中。通过运行这个 SQL 文件，它将在目标机器上从头开始重建整个应用程序。\n\n如果您在文本编辑器（如记事本）中打开导出的文件，您会看到文件内容主要是\
    \ `PL/SQL` 函数调用和指定数据库模式以及应用程序对象的 `DML`。如 图 9-8 所示。\n\n![images](img/0908.jpg)\n\
    \n`图 9-8. 探查导出 SQL 文件的内容`\n\n**提示** 因此，您可以在文本编辑器中打开 SQL 文件，手动编辑其中的值，然后将更新后的 SQL\
    \ 导入到另一个 `APEX` 实例中。（仅建议在您清楚自己在做什么时才进行此操作！）\n\n## 9-4. 导入应用程序\n\n### 问题\n\n您需要导入一个刚刚从另一个\
    \ `APEX` 实例导出的应用程序。\n\n**注意** 本方法演示的是手动导入方式。方法 9-5 展示了如何使用 `SQL*Plus` 脚本化导入以自动运行。\n\
    \n### 解决方案\n\n使用应用程序构建器，通过便捷的 GUI 界面引导完成导入过程。请遵循以下步骤：\n\n1.  登录应用程序构建器。\n2.  打开您希望导入的应用程序。\n\
    3.  点击页面顶部的**导入/导出**图标。\n4.  在下一页，选择**导入**并点击**下一步**按钮。\n5.  在下一页，在**导入文件**字段中浏览选择\
    \ `.sql` 文件。\n6.  在**文件类型**字段中，选择**数据库应用程序、页面或组件导出**选项，如 图 9-9 所示。\n\n    ![images](img/0909.jpg)\n\
    \n    `图 9-9. 导入 SQL 文件`\n\n7.  点击**下一步**按钮后，页面顶部将出现一个小的进度条，指示导入进度。\n8.  导入成功完成后，系统会提供安装应用程序的选项，如\
    \ 图 9-10 所示。\n\n    ![images](img/0910.jpg)\n\n    `图 9-10. 成功导入消息`\n\n9.  点击**下一步**按钮安装应用程序。\n\
    \n    **提示** 导入文件后，它最终会进入一个名为 APEX 导出存储库的内部仓库。在安装之前，您无法以任何方式使用已导入的文件。\n\n10. 现在，您将看到一个页面，允许您指定新应用程序要使用的模式和应用程序\
    \ ID。\n11. 选择**自动分配新应用程序 ID** 项，如下面的 图 9-11 所示，然后点击**安装**按钮继续。\n\n    ![images](img/0911.jpg)\n\
    \n    `图 9-11. 安装应用程序`\n\n12. 您应该会看到一个指示导入进度的进度条。\n13. 导入完成后，您会看到一个屏幕，让您可以选择为应用程序创建支持对象。在此页面中，为**安装支持对象**字段选择**是**选项，如\
    \ 图 9-12 所示。\n\n    ![images](img/0912.jpg)\n\n    `图 9-12. 创建数据库支持对象`\n\n14.\
    \ 点击**下一步**按钮继续。\n15. 系统将显示一个确认屏幕。点击**安装**按钮继续安装。\n16. 安装完成后，系统将显示如 图 9-13 所示的屏幕。\n\
    \n    ![images](img/0913.jpg)\n\n    `图 9-13. 安装向导的最后一步`\n\n17. 现在回到您的主工作区。您应该能看到您的新应用程序。如果您打开该应用程序，可以看到导出应用程序中的一系列表单已在您的\
    \ `APEX` 实例中创建，如 图 9-14 所示。\n\n    ![images](img/0914.jpg)\n\n    `图 9-14. 已导入的应用程序及其内容`\n\
    \n### 工作原理\n\n有两种导入应用程序的方式。\n\n*   通过 `APEX` 应用程序构建器窗口可视化导入应用程序。\n*   通过 `SQL*Plus`\
    \ 导入应用程序。\n\n方法 9-5 描述了如何通过 `SQL*Plus` 导入应用程序。\n\n## 9-5. 脚本化应用程序导入\n\n### 问题\n\
    \n您需要通过批处理脚本自动化应用程序的导入，因此无法通过应用程序构建器界面导入应用程序。\n"
- fmt: "# 9-5. 使用 SQL*Plus 导入应用\n\n## 解决方案\n\n使用 SQL*Plus 导入该应用程序。通过 SQL*Plus，你用 Application\
    \ Builder 的图形界面换来了编写脚本和自动化导入的能力。请遵循以下步骤：\n\n1.  运行 `SQL*Plus`。\n2.  以系统管理员身份登录到\
    \ `SQL*Plus`。\n3.  将当前活动文件夹更改为导出的 `.sql` 文件所在的位置。例如，如果你的当前活动文件夹是 `d:\\zipdir`，你必须先使用以下代码将活动文件夹更改到此位置：`define\
    \ dir=D:\\zipdir`\n4.  在下一行，键入 `&dir`（前面加上别名符号 `@`），后跟导出的文件名。例如，如果你之前导出的文件是 `f103.sql`，请在\
    \ `SQL*Plus` 命令提示符下键入 `@&dir\\f103`（如[图 9-15](#Chapter09.html#fig_9_15) 所示）。\n\
    \n    ![images](images/square.jpg) **提示** 你也可以直接以这种方式声明完整路径：`@d:\\zipdir\\f103.sql`\n\
    \n    ![images](images/0915.jpg)\n\n    **图 9-15.** 在 `SQL*Plus` 中设置活动目录\n\n5.\
    \  运行脚本时，你应该会看到大量日志信息滚动而过。成功安装结束后，你应该会看到如[图 9-16](#Chapter09.html#fig_9_16) 所示的屏幕。\n\
    \n    ![images](images/0916.jpg)\n\n    **图 9-16.** 执行导出的 `SQL` 文件\n\n6.  [图 9-16](#Chapter09.html#fig_9_16)\
    \ 中没有错误信息，表明应用程序已成功导入。\n7.  现在尝试登录到 Application Builder。你应该能看到新导入的应用程序。\n\n##\
    \ 工作原理\n\n通过 `SQL*Plus` 导入文件的能力使你能够使用批处理脚本等自动化导入过程。例如，你可能会决定创建一个批处理脚本，将应用程序中新的和更新的页面从开发服务器自动导入到生产服务器上。\n\
    \n### 9-6. 导出单个页面\n\n## 解决方案\n\n你已经在客户办公室的生产服务器上部署了你的应用程序。你的团队在办公室更新了应用程序中的一个页面，你想将这个更新的页面带到客户那里部署到他们的服务器上。\n\
    \n要导出单个页面，请遵循以下步骤：\n\n1.  打开一个现有应用程序。\n2.  在你的应用程序中打开你希望导出的页面。\n3.  在“页面定义”区域中，选择“实用工具”“导出”菜单项，如[图\
    \ 9-17](#Chapter09.html#fig_9_17) 所示。\n\n    ![images](images/0917.jpg)\n\n  \
    \  **图 9-17.** 导出单个页面\n\n4.  在下一页中，系统会让你选择导出的文件格式。选择 `DOS` 文件格式，如[图 9-18](#Chapter09.html#fig_9_18)\
    \ 所示。\n\n    ![images](images/0918.jpg)\n\n    **图 9-18.** 导出页面向导\n\n5.  此时应该会提示你下载导出的页面（一个\
    \ `.sql` 文件）。\n\n## 工作原理\n\n当你不希望导出应用程序的其他部分时，导出单个页面非常有用。导出单个页面的其他优点包括：\n\n* \
    \  减小导出应用程序的大小（以保持 `.sql` 文件的大小便于通过互联网传输）。\n*   通过仅将导入本地化到一两个页面文件，减少对生产服务器的影响。\n\
    *   是将错误修复或更新上传到生产或 `UAT` 服务器的便捷方式。\n*   作为将单个页面从开发服务器导出到生产服务器的一种手段。\n\n因此，如果你只更改了一个或几个页面，你可以通过仅移动已更改的页面来最小化对生产环境的影响。\n\
    \n### 9-7. 导入单个页面\n\n## 解决方案\n\n你已经按照 Recipe 9-6 的说明导出了一个页面。现在需要将该页面导入到目标应用程序中。\n\
    \n要将单个页面导入到你的应用程序中，请遵循以下步骤：\n\n1.  打开你希望导入页面的目标应用程序。\n2.  单击页面顶部的 `Export/Import`\
    \ 图标。\n3.  当提示时选择 `Import` 选项。\n4.  在下一页中，浏览找到你之前导出的页面。对于“文件类型”选项，选择“数据库应用程序、页面或组件导出”选项，如[图\
    \ 9-19](#Chapter09.html#fig_9_19) 所示。\n\n    ![images](images/0919.jpg)\n\n  \
    \  **图 9-19.** 导入页面\n\n5.  单击 `Next` 按钮继续。你将看到如[图 9-20](#Chapter09.html#fig_9_20)\
    \ 所示的页面安装确认步骤。单击 `Install Page` 按钮继续。\n\n    ![images](images/0920.jpg)\n\n  \
    \  **图 9-20.** 安装页面确认步骤\n\n6.  因为你正在部署现有页面的更新版本，向导会提示你覆盖该页面，如[图 9-21](#Chapter09.html#fig_9_21)\
    \ 所示。\n\n    ![images](images/0921.jpg)\n\n    **图 9-21.** 替换页面确认\n\n7.  页面成功替换后，你将看到如[图\
    \ 9-22](#Chapter09.html#fig_9_22) 所示的屏幕。你的页面已成功部署。\n\n    ![images](images/0922.jpg)\n\
    \n    **图 9-22.** 页面已安装消息\n\n## 工作原理\n\n你也可以使用本配方中描述的方法，轻松地将页面文件导入到同一个应用程序或另一个\
    \ `APEX` 实例上的其他应用程序中。事实上，大多数其他应用程序资源（如主题文件、图像文件、共享对象等）都可以以相同的方式导出和导入。\n\n### 9-8.\
    \ 发布应用程序 URL\n\n## 解决方案\n\n部署应用程序后，你需要发布应用程序 `URL`，以便最终用户可以访问它，但你不知道它是什么。你需要定位应用程序\
    \ `URL`。\n\n要发现应用程序 `URL`，请按照以下说明操作：\n\n1.  打开一个现有应用程序。\n2.  将鼠标悬停在“运行应用程序”图标上，右键单击它，然后选择查看该图标的快捷方式/链接，如[图\
    \ 9-23](#Chapter09.html#fig_9_23) 所示。\n\n    ![images](images/0923.jpg)\n\n  \
    \  **图 9-23.** 访问应用程序的 `URL`\n\n    ![images](images/square.jpg) **提示** 在 `Microsoft\
    \ Internet Explorer` 中，右键单击图标并选择“复制快捷方式”菜单项。对于其他浏览器，查找允许你检查链接完整 `URL` 的等效菜单项。\n\
    \n3.  如果你将应用程序的链接粘贴到某处（例如，在文本文件中），你将看到应用程序的完整链接类似于这样：`http://localhost:8080/apex/f?p=103:1:1121291168995976:::::`\n\
    4.  你可以在任何浏览器中粘贴此链接以直接访问应用程序的登录页面。\n\n## 工作原理\n\n以下 `URL` 实际上由几个部分组成。让我们详细剖析每个部分以了解它们的含义。[表\
    \ 9-1](#Chapter09.html#tab_9_1) 详细描述了该 `URL`。\n\n`http://localhost:8080/apex/f?p=103:1:1121291168995976:::::`\n\
    \n**表 9-1.** `APEX` 应用程序 `URL` 详解\n\n| **组件** | **描述** |\n| --- | --- |\n| `http://localhost:8080`\
    \ | `localhost` 指的是托管 `APEX` 实例的服务器名称，`8080` 是 `APEX` 服务正在监听的端口号。 |\n| `Apex`\
    \ | 这是数据库访问描述符 (`DAD`) 的名称。此部分描述了 `Oracle HTTP` 服务器如何连接到数据库服务器以满足 `HTTP` 请求。 |\n\
    | `f?p=` | 这是 `APEX` 使用的特殊前缀，用于指示后续数据。 |\n| `103` | 这是被访问应用程序的 `ID`。 |\n| `1`\
    \ | 这是被访问应用程序中的页面编号。 |\n| 1121291168995976 | 这是标识当前会话的 `ID`。值得注意的是，这个值不需要成为暴露给最终用户的\
    \ `URL` 的一部分，因为它是由 `APEX` 为每个会话生成的。因此，向最终用户发布以下 `URL` 就足够了：`http://localhost:8080/apex/f?p=103:1::::::`\
    \ |\n\n# 第 10 章"
  raw: "#### Solution\n\nImport that application using SQL*Plus. By using SQL*Plus,\
    \ you trade the GUI interface of Application Builder for the ability to script\
    \ and automate your import. Here are the steps to follow:\n\n1.  Run SQL*Plus.\n\
    2.  Log in as the System Administrator to SQL*Plus.\n3.  Change your current active\
    \ folder to the location of your exported .sql file. For instance, if your current\
    \ active folder is `d:\\zipdir`, you must first change the active folder to this\
    \ location. You can do so using this code: `define dir=D:\\zipdir`\n4.  In the\
    \ next line, type in `&dir` (prefixed with the alias symbol (@)), followed by\
    \ the name of the exported file. For example, if you exported your file earlier\
    \ as f103.sql, type `@&dir\\f103` in the SQL*Plus command prompt (as shown in\
    \ [Figure 9-15](#Chapter09.html#fig_9_15)).\n\n    ![images](images/square.jpg)\
    \ **Tip** You can also declare the full path directly in this fashion: `@d:\\\
    zipdir\\f103.sql`\n\n    ![images](images/0915.jpg)\n\n    ***Figure 9-15.** Setting\
    \ the active directory in SQL*Plus*\n\n5.  When you run the script, you should\
    \ see a bunch of log messages scroll by. At the end of a successful installation,\
    \ you should see the screen shown in [Figure 9-16](#Chapter09.html#fig_9_16).\n\
    \n    ![images](images/0916.jpg)\n\n    ***Figure 9-16.** Executing the exported\
    \ SQL file*\n\n6.  The lack of error messages in [Figure 9-16](#Chapter09.html#fig_9_16)\
    \ indicates that the application has been successfully imported.\n7.  Now try\
    \ logging on to the Application Builder. You should see your newly imported application.\n\
    \n#### How It Works\n\nThe ability to import a file through SQL*Plus makes it\
    \ possible for you to automate the importing process using batch scripts and so\
    \ on. You might, for example, decide to create a batch script to automate the\
    \ weekly import of new and updated pages from an application sitting in the development\
    \ server to one sitting on the production server.\n\n### 9-6\\. Exporting a Single\
    \ Page\n\n#### Problem\n\nYou've already deployed your application on a production\
    \ server at your customer's office. Your team has updated a page in the application\
    \ back at your office, and you want to bring this updated page to the customer's\
    \ place to deploy it on their servers.\n\n#### Solution\n\nTo export a single\
    \ page, please follow these steps:\n\n1.  Open an existing application.\n2.  Open\
    \ the page you wish to export in your application.\n3.  In the Page Definition\
    \ area, choose the Utilities  Export menu item, as shown in [Figure 9-17](#Chapter09.html#fig_9_17).\n\
    \n    ![images](images/0917.jpg)\n\n    ***Figure 9-17.** Exporting a single page*\n\
    \n4.  In the next page, you are given the option to choose the file format for\
    \ the export. Choose the DOS file format, as shown in [Figure 9-18](#Chapter09.html#fig_9_18).\n\
    \n    ![images](images/0918.jpg)\n\n    ***Figure 9-18.** Export page wizard*\n\
    \n5.  You should now be prompted to download the exported page (a .sql file).\n\
    \n#### How It Works\n\nExporting a single page is useful when you don’t wish to\
    \ export every other part of the application. Other advantages of exporting a\
    \ single page include:\n\n*   Reducing of the size of the exported application\
    \ (to keep sizes of .sql files manageable for transmission over the Internet).\n\
    *   Reducing the impact to a production server by localizing the import to only\
    \ one or two page files.\n*   A convenient way to upload bug fixes or updates\
    \ to a production or UAT server.\n*   As a means of exporting individual pages\
    \ from a development server to a production server.\n\nThus, if you’ve only changed\
    \ one or a few pages, you can minimize the impact on the production environment\
    \ by moving only the pages that you have changed.\n\n### 9-7\\. Importing a Single\
    \ Page\n\n#### Problem\n\nYou have already exported a page following the instructions\
    \ in Recipe 9-6\\. You now need to import the page into the target application.\n\
    \n#### Solution\n\nTo import a single page into your application, please follow\
    \ these steps:\n\n1.  Open the target application you wish to import the page\
    \ to.\n2.  Click the Export/Import icon at the top of the page.\n3.  Choose the\
    \ Import option when prompted.\n4.  In the next page, browse for the page you\
    \ exported earlier. For the File Type option, choose Database Application, Page,\
    \ or Component Export option, as shown in [Figure 9-19](#Chapter09.html#fig_9_19).\n\
    \n    ![images](images/0919.jpg)\n\n    ***Figure 9-19.** Importing a page*\n\n\
    5.  Click the Next button to continue. You will see the page installation confirmation\
    \ step shown in [Figure 9-20](#Chapter09.html#fig_9_20). Click the Install Page\
    \ button to continue.\n\n    ![images](images/0920.jpg)\n\n    ***Figure 9-20.**\
    \ Install page confirmation step*\n\n6.  Because you are deploying an updated\
    \ version of an existing page, the wizard will prompt you to overwrite the page,\
    \ as shown in [Figure 9-21](#Chapter09.html#fig_9_21).\n\n    ![images](images/0921.jpg)\n\
    \n    ***Figure 9-21.** Replace page confirmation*\n\n7.  After the page has been\
    \ replaced successfully, you should see the screen shown in [Figure 9-22](#Chapter09.html#fig_9_22).\
    \ Your page has been successfully deployed.\n\n    ![images](images/0922.jpg)\n\
    \n    ***Figure 9-22.** Page installed message*\n\n#### How It Works\n\nYou can\
    \ also easily import a page file into the same application or another application\
    \ on another APEX instance using the methods described in this recipe. In fact,\
    \ most of the other application resources (such as theme files, image files, shared\
    \ objects, and so on) can be exported and imported in the same manner.\n\n###\
    \ 9-8. Publishing the Application URL\n\n#### Problem\n\nAfter you have deployed\
    \ your application, you need to publish your application URL so that your end\
    \ users can access the application, but you don’t know it. You need to locate\
    \ the application URL.\n\n#### Solution\n\nTo discover the application URL, follow\
    \ these instructions:\n\n1.  Open an existing application.\n2.  Mouseover the\
    \ Run Application icon, right-click on it, and choose to view the shortcut/link\
    \ for the icon, as shown in [Figure 9-23](#Chapter09.html#fig_9_23).\n\n    ![images](images/0923.jpg)\n\
    \n    ***Figure 9-23.** Accessing the URL for the application*\n\n    ![images](images/square.jpg)\
    \ **Tip** In Microsoft Internet Explorer, right-click on the icon and choose the\
    \ `Copy Shortcut` menu item. For other browsers, look for the equivalent menu\
    \ item that lets you inspect the full URL for the link.\n\n3.  If you paste the\
    \ link of your application somewhere (for instance, in a text file), you will\
    \ see that the full link to your application looks something like this: `http://localhost:8080/apex/f?p=103:1:1121291168995976:::::`\n\
    4.  You can paste this link in any browser to directly access the login page of\
    \ your application.\n\n#### How It Works\n\nThe following URL is actually made\
    \ up of a few parts. Let's dissect each part in detail to understand what they\
    \ mean. [Table 9-1](#Chapter09.html#tab_9_1) describes the URL in detail.\n\n\
    `http://localhost:8080/apex/f?p=103:1:1121291168995976:::::`\n\n***Table 9-1.**\
    \ An APEX Application URL in Detail*\n\n| **Component** | **Description** |\n\
    | --- | --- |\n| `http://localhost:8080` | `localhost` refers to the name of the\
    \ server hosting the APEX instance, and `8080` is the port number that the APEX\
    \ service is listening on. |\n| `Apex` | This is the name of the database access\
    \ descriptor (DAD). This portion describes how the Oracle HTTP server connects\
    \ to the database server to fulfill an HTTP request. |\n| `f?p=` | This is a special\
    \ prefix used by APEX to indicate the data that follows. |\n| `103` | This is\
    \ the ID of the application being accessed. |\n| `1` | This is the page number\
    \ in the application being accessed. |\n| 1121291168995976 | This is an ID identifying\
    \ the current session. It is useful to note that this value doesn’t need to be\
    \ part of the URL that is exposed to the end users since it is generated by APEX\
    \ for every session. Hence, it is sufficient to publish the following URL to the\
    \ end users: `http://localhost:8080/apex/f?p=103:1::::::` |\n\n## C H A P T E\
    \ R  10"
