  trans: "#### 解决方案\n\n首先，您需要创建本教程中使用的示例对象。为此，请遵循以下步骤：\n1.  创建如 代码清单 8-3 所示的示例 `Jobs`\
    \ 表。\n**代码清单 8-3.** 示例 Jobs 表\n```sql\nCREATE TABLE  \"JOBS\"\n   (   \"JOB_ID\"\
    \ VARCHAR2(10),\n       \"JOB_TITLE\" VARCHAR2(35) CONSTRAINT \"JOB_TITLE_NN\"\
    \ NOT NULL ENABLE,\n       \"MIN_SALARY\" NUMBER(6,0),\n       \"MAX_SALARY\"\
    \ NUMBER(6,0),\n        CONSTRAINT \"JOB_ID_PK\" PRIMARY KEY (\"JOB_ID\") ENABLE\n\
    \  )\n```\n2.  使用代码清单 8-4 中的代码向此表中输入一些示例数据。\n**代码清单 8-4.** Jobs 表中的示例数据\n```sql\n\
    INSERT INTO JOBS(JOB_ID,JOB_TITLE,MIN_SALARY,MAX_SALARY) VALUES('AD_PRES','President',20000,40000)\n\
    INSERT INTO JOBS(JOB_ID,JOB_TITLE,MIN_SALARY,MAX_SALARY) VALUES('AD_VP','Administration\
    \ Vice President',15000,30000)\n```\n3.  现在，创建一个新应用程序。在应用程序中，创建一个新表单，并选择 `Form\
    \ on a Table with Report` 模板。\n![images](img/square.jpg) **注意** 您可以参考教程 2-1 了解如何创建新应用程序和表单。\n\
    4.  当系统提示您为表单和报表指定基表时，选择 `Jobs` 表，如图 8-5 所示。\n![images](img/0805.jpg)\n**图 8-5.**\
    \ 为表单和报表选择基表\n5.  使用提供的默认设置完成向导的剩余步骤，完成向导。\n6.  从工作区注销，然后使用 `ADMIN` 帐户登录到 `INTERNAL`\
    \ 工作区。导航到“管理工作区” ![images](img/U001.jpg) “现有工作区”。单击您之前正在使用的工作区，然后单击 `管理用户` 按钮。\n\
    7.  创建一个用户名为 `greg` 的新用户。为此帐户设置任何您想要的密码。\n\n现在您已成功创建了示例对象，让我们继续创建授权方案。请遵循以下说明进行操作：\n\
    1.  打开您的应用程序并单击 `共享组件` 图标。\n2.  在页面的安全区域，单击 `授权方案` 链接（在图 8-6 中高亮显示）。\n![images](img/0806.jpg)\n\
    **图 8-6.** 授权方案链接\n3.  在下一页，单击 `创建` 按钮以创建新的授权方案。\n4.  当提示时，选择从头开始创建方案，如图 8-7 所示。\n\
    ![images](img/0807.jpg)\n**图 8-7.** 从头开始创建授权方案\n5.  在下一页，将您的授权方案命名为 `CHECKFORGREG`。\n\
    6.  选择 `存在 SQL 查询` 作为方案类型，并在“表达式 1”字段中输入以下 PL/SQL：`select 1 from jobs where LOWER(v('APP_USER'))\
    \ = 'greg'`\n7.  指定“方案被违反”作为方案违反错误消息。您现在应该看到如图 8-8 所示的屏幕。\n![images](img/0808.jpg)\n\
    **图 8-8.** 定义授权方案\n8.  单击 `创建` 按钮以创建授权方案。\n\n现在您需要将授权方案应用到报表上。\n1.  打开您在本教程中早先创建的\
    \ `Jobs` 报表。\n2.  在报表的“页面呈现”区域，右键单击 `创建` 按钮，并选择编辑它，如图 8-9 所示。\n![images](img/0809.jpg)\n\
    **图 8-9.** 修改“创建”按钮的设置\n3.  在下一页，向下滚动到“安全性”部分，并为该按钮项选择 `CHECKFORGREG` 作为授权方案。如图\
    \ 8-10 所示。\n![images](img/0810.jpg)\n**图 8-10.** 为“创建”按钮设置授权方案\n4.  保存您的更改并运行报表。如果您以\
    \ `greg` 身份登录应用程序，您将在报表的右上角看到 `创建` 按钮，如图 8-11 所示。\n![images](img/0811.jpg)\n**图\
    \ 8-11.** 对于名为 greg 的用户，“创建”按钮可见\n5.  现在，从应用程序注销并以任何其他用户身份登录。您会注意到该用户看不到 `创建`\
    \ 按钮，如图 8-12 所示。\n![images](img/0812.jpg)\n**图 8-12.** 对于名为 system 的用户，“创建”按钮消失\n\
    \n#### 工作原理\n\n授权方案允许您定义一个条件（逻辑），该条件最终评估为真或假。然后，该授权方案可以应用于您应用程序中的任何元素，无论是报表列、报表上的按钮，甚至整个表单本身。当方案（您的逻辑）返回\
    \ true 时，当前用户被授予访问该元素的权限。如果返回 false，则当前用户被拒绝访问。\n\n让我们仔细看看您之前创建的授权方案的配置。请注意您选择了\
    \ `存在 SQL 查询` 方案类型；这意味着如果您编写的 PL/SQL 返回了一条记录，则方案评估为 true（授予访问权限）。如果返回了一个空结果集，方案将评估为\
    \ false（拒绝访问）。\n\n现在，让我们看看本教程前面的 PL/SQL：\n```sql\nselect 1 from jobs where LOWER(v('APP_USER'))\
    \ = 'greg'\n```\n![images](img/square.jpg) **提示** `v('APP_USER')` 是一个动态字段（称为内置替换字符串），它返回当前登录用户的用户名。APEX\
    \ 中定义了其他内置替换字符串；APEX 中所有可用替换字符串的完整列表在此处：\n[`http://download.oracle.com/docs/cd/B32472_01/doc/appdev.300/b32471/concept.htm#BEIIBAJD`](http://download.oracle.com/docs/cd/B32472_01/doc/appdev.300/b32471/concept.htm#BEIIBAJD)\n\
    \n您实际上定义了：如果当前用户的用户名是 `greg`，那么它会返回一些内容（这里您简单地返回 1，但也可以返回 `abc`，只要返回单条记录即可）。因此，您在本教程中创建的授权方案可以解释为：如果当前用户的用户名是\
    \ `greg`，则应授予他访问该元素的权限。\n\n基于这个简单的概念，您可以对您的应用程序应用非常复杂的访问权限控制。例如，您可以创建一个 `员工` 报表，它向经理显示所有列，但在普通职员查看时隐藏\
    \ `当前薪水` 列。\n\n![images](img/square.jpg) **提示** 在授权方案中硬编码数据（例如用户名 `greg`）仅用于演示目的，绝对不鼓励。您通常会在授权方案中做一些更有意义的事情，例如根据另一个数据库表等检查用户是否是经理或部门主管。\n\
    \n另外值得一提的是，授权方案的概念还提高了可重用性和易于维护性。它是可重用的，因为您可以在应用程序中的多个元素上重用相同的逻辑，而无需多次重写相同的逻辑。更重要的是，这使您更容易维护应用程序。例如，如果有一天逻辑发生变化，您需要在\
    \ PL/SQL 中包含一个额外的检查，您只需在一个地方更改它，它就会立即应用到所有使用该授权方案的元素上。\n\n### 8-3. 防止 SQL 注入攻击\n\
    \n#### 问题\n\n您有一个动态报表，显示系统中的客户列表。默认情况下，您的应用程序要求最终用户在从数据库中检索匹配的客户之前指定客户名称。一个 APEX\
    \ 黑客已经通过 SQL 注入攻击设法检索了数据库中所有客户的完整列表。您希望保护您的应用程序免受未来类似攻击的影响。"
- fmt: "## Solution\n\nFirst, you need to set up the sample tables and forms needed\
    \ to duplicate the scenario for the attack. To do this, please follow these steps:\n\
    \n1.  Create the table shown in [Listing 8-5](#Chapter08.html#list_8_5) if it\
    \ doesn't yet exist in your database.\n\n**Listing 8-5.** Sample Customers Table\n\
    \n```sql\nCREATE TABLE  \"CUSTOMERS\"\n   (    \"ID\" NVARCHAR2(255) NOT NULL\
    \ ENABLE,\n        \"NAME\" NVARCHAR2(255),\n        \"ADDRESS\" NVARCHAR2(2000),\n\
    \        \"ZIP_CODE\" NVARCHAR2(6),\n        \"COUNTRY\" NVARCHAR2(255),\n   \
    \     \"EMAIL_ADDRESS\" NVARCHAR2(255),\n        \"PHONENUMBER\" NVARCHAR2(255),\n\
    \        \"EMPLOYEEHEADCOUNT\" NUMBER(9,0),\n         CONSTRAINT \"CUSTOMERS_PK\"\
    \ PRIMARY KEY (\"ID\") ENABLE\n  )\n```\n\n2.  Create the following sample data\
    \ shown in [Listing 8-6](#Chapter08.html#list_8_6).\n\n**Listing 8-6.** Sample\
    \ Data for the Customers Table\n\n```sql\nINSERT INTO CUSTOMERS (ID, NAME, ADDRESS,\
    \ ZIP_CODE, COUNTRY, EMAIL_ADDRESS, PHONENUMBER, EMPLOYEEHEADCOUNT) VALUES ('1','Yakuza\
    \ Corp','Akihabara,Tokyo','551119','Japan','yakuzacorp@test.com','+8112345678',30)\n\
    \nINSERT INTO CUSTOMERS (ID, NAME, ADDRESS, ZIP_CODE, COUNTRY, EMAIL_ADDRESS,\
    \ PHONENUMBER, EMPLOYEEHEADCOUNT) VALUES ('2','ACME Corp','ACME City, Texas','12345','United\
    \ States','acmecity@test.com','987654321',10)\n\nINSERT INTO CUSTOMERS (ID, NAME,\
    \ ADDRESS, ZIP_CODE, COUNTRY, EMAIL_ADDRESS, PHONENUMBER, EMPLOYEEHEADCOUNT) VALUES\
    \ ('3','Shin Corp','Bangrak, Bangkok','123456','Thailand','shincorp@test.com','12468086',15)\n\
    ```\n\n3.  Now, create a new application, and create a report page in the application.\n\
    4.  In the Report Page Creation wizard, choose to create the Classic Report type.\
    \ Use the default settings for all the steps in the wizard, and click the Next\
    \ button until you reach the step that lets you specify the SQL statement for\
    \ the report.\n5.  Just specify `SELECT * FROM CUSTOMERS` in this area for the\
    \ time being.\n6.  When the report has been created successfully, choose to edit\
    \ the report.\n7.  In the Page Rendering area of the report, you should see the\
    \ report node under the Regions ![images](images/U001.jpg) Body node. Right click\
    \ on the report item (`Report 1`), and choose to Create a new page item, as shown\
    \ in [Figure 8-13](#Chapter08.html#fig_8_13).\n\n![images](images/0813.jpg)\n\n\
    **Figure 8-13.** Creating a new page item in the report\n\n8.  In the wizard,\
    \ choose to create a Text field. In the next step of the wizard, name the text\
    \ field `PSEARCH_BYNAME`, and set its label to `Search by Name`. Click Next all\
    \ the way to the end of the wizard and use the default settings provided by APEX.\n\
    9.  After you've created the field, right-click on the `PSEARCH_BYNAME` item in\
    \ the Page Rendering area, and choose the Create Button item in the pop-up menu.\
    \ Name the button `PSEARCH_GO` and create the button. You should now have the\
    \ screen shown in [Figure 8-14](#Chapter08.html#fig_8_14) in the Page Rendering\
    \ area of your report.\n\n![images](images/0814.jpg)\n\n**Figure 8-14.** Your\
    \ newly created buttons in the report\n\n10. Right-click on the `Report 1` item,\
    \ and choose to edit the report. Scroll down to the Source section, and in the\
    \ Region source field, enter the SQL statement shown in [Listing 8-7](#Chapter08.html#list_8_7).\n\
    \n**Listing 8-7.** Specifying the Customer Search SQL\n\n```sql\nSELECT * FROM\
    \ CUSTOMERS WHERE NAME = '&PSEARCH_BYNAME.'\n```\n\n![images](images/square.jpg)\
    \ **Note** There is a full stop right after `PSEARCH_BYNAME`; don't forget to\
    \ leave that out!\n\n11. You should now have the screen shown in [Figure 8-15](#Chapter08.html#fig_8_15).\
    \ Click on the Apply Changes button to save your changes.\n\n![images](images/0815.jpg)\n\
    \n**Figure 8-15.** Defining the SQL for the report\n\n12. Now run the report.\
    \ You should see a blank report (without any data). However, upon entering `Yakuza\
    \ Corp` in the search textbox and clicking the Go button, the report refreshes\
    \ itself, showing the matching customer, as shown in [Figure 8-16](#Chapter08.html#fig_8_16).\n\
    \n![images](images/0816.jpg)\n\n**Figure 8-16.** Running your report\n\nTo perform\
    \ the SQL injection attack, follow these steps:\n\n1.  Specify the text shown\
    \ in [Listing 8-8](#Chapter08.html#list_8_8) in the search field, and click the\
    \ Go button.\n\n**Listing 8-8.** Conducting the SQL Injection Attack\n\n```\n\
    ' OR 1=1--\n```\n\n2.  You should now see every single customer retrieved from\
    \ the table, as shown in [Figure 8-17](#Chapter08.html#fig_8_17).\n\n![images](images/0817.jpg)\n\
    \n**Figure 8-17.** Conducting the SQL injection attack\n\n3.  Congratulations!\
    \ You've successfully hacked your own application.\n\nTo prevent a SQL injection\
    \ attack from being used against your application, follow these steps:\n\n1. \
    \ Navigate to the Page Rendering area of your report again. Right click on the\
    \ `Report 1` node, and choose to edit the report.\n2.  In the Region source field,\
    \ change the SQL query to the one shown in [Listing 8-9](#Chapter08.html#list_8_9).\n\
    \n**Listing 8-9.** Using Bind Variables\n\n```sql\nSELECT * FROM CUSTOMERS WHERE\
    \ NAME = :PSEARCH_BYNAME\n```\n\n3.  You should now have the screen shown in [Figure\
    \ 8-18](#Chapter08.html#fig_8_18).\n\n![images](images/0818.jpg)\n\n**Figure 8-18.**\
    \ Using bind variables to protect against SQL injection attack\n\n4.  Apply your\
    \ changes and run your report one more time. You will find that your report works\
    \ as usual, and you can search for a customer by name. This time, however, if\
    \ you specify `' OR 1=1--` in the search field and click the Go button, instead\
    \ of retrieving the full list of customers from the table, it returns an empty\
    \ result set. This is shown in [Figure 8-19](#Chapter08.html#fig_8_19).\n\n![images](images/0819.jpg)\n\
    \n**Figure 8-19.** Trying the SQL injection attack again, this time on a protected\
    \ form.\n\n5.  You've successfully protected your report against the SQL injection\
    \ attack."
