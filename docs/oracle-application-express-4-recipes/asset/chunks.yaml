    \n    **图 2-31. 从您的 Microsoft Excel 文件复制内容...**\n\n    ![images](img/0232.jpg)\n\
    \n    **图 2-32. ...并将它们粘贴到此处的大文本区域中...**\n\n10. 接下来，单击“上传”按钮。您会发现您的电子表格数据神奇地整齐排列在数据网格中（参见图\
    \ 2-33）！\n\n    ![images](img/0233.jpg)\n\n    **图 2-33. ...这就是整齐排列在数据网格中的电子表格数据！**\n\
    \n11. 您现在可以直接通过单击表格中的任何单元格来编辑 Websheet（如图 2-34 所示）。使用每行左侧的“编辑”图标（该图标会打开一个根据您的\
    \ Excel 表列生成的表单）向表格添加新行等。\n\n![images](img/0234.jpg)\n\n**图 2-34. 在 Websheet 中编辑数据**\n\
    \n### 工作原理\n\nWebsheet 提供了一种将整个电子表格转换为可编辑网格的便捷方法，该网格提供了报表提供的所有标准功能——包括验证、分页、排序、突出显示等。\n\
    \n请注意，Websheet 应用程序在底层的工作方式略有不同。Websheet 数据网格不像表单那样直接映射到数据库表。Websheet 数据存储在内部的\
    \ `APEX$_WS_ROWS` 表中。\n\n![images](img/square.jpg) **提示** 您可以使用 SQL Workshop 中的\
    \ Object Browser 工具检查 `APEX$_WS_ROWS` 表的内容。\n\n## 2-8. 更改 Websheet 列的项类型\n\n###\
    \ 问题\n\n您需要创建一个 Websheet，其中对不同列使用不同的控件。例如，您的用户希望对 `Country` 列使用下拉列表（包含不同国家的列表）。\n\
    \n### 解决方案\n\n以下是为 Websheet 中的列创建下拉列表的方法：\n\n1.  导航至 `CustomersWebSheet` 应用程序并运行它。使用您的开发者凭据登录到应用程序。\n\
    2.  打开 `Customers` 数据网格。\n3.  单击“管理”下拉按钮，然后单击 `Columns` ![images](img/U001.jpg)\
    \ `Column Properties` 菜单项。\n4.  您将看到“列属性”页面。从“列名”字段中选择 `Country` 列。\n5.  在“显示为”字段下，选择“选择列表”。\n\
    6.  在图 2-35 所示的“值列表”部分下，选择“基于当前值新建值列表”项。这将从您之前粘贴的电子表格数据中的 `Country` 列检索整个唯一值列表。\n\
    \n    ![images](img/0235.jpg)\n\n    **图 2-35. 修改 Country 列属性**\n\n7.  完成后单击“添加行”按钮。当您在数据网格中单击\
    \ `Country` 列中的任何单元格时，您现在会注意到一个包含国家列表的下拉列表，而不是通常的文本框（参见图 2-36）。\n\n![images](img/0236.jpg)\n\
    \n**图 2-36. Websheet 数据网格内的下拉列表**\n\n### 工作原理\n\n与报表类似，您可以轻松更改 Websheet 中每列的项类型。但是，Websheet\
    \ 可用的项类型仅限于以下几种：\n\n*   日期选择器\n*   只读\n*   选择列表\n*   文本\n*   文本区域\n\n![images](img/square.jpg)\
    \ **注意** 对于 Websheet 中的选择列表，您只能在 LOV 中定义静态项列表（以逗号分隔）。Websheet 中的选择列表不支持像表单那样的动态列表。\n\
    \n## 2-9. 批量修改 Websheet 中的值\n\n### 问题\n\n您的 Websheet 中有一个包含数千行的列表。您需要将所有地址中的单词“Road”更改为“Street”。"
- fmt: "#### Solution\n\nHere's how to change data en masse in a Websheet:\n\n1. \
    \ Navigate to the `CustomersWebSheet` application and run it. Log in to the application\
    \ using your developer credentials.\n2.  Open the Customers Data grid.\n3.  Click\
    \ on the Manage drop-down button, and click the Rows ![images](images/U001.jpg)\
    \ Replace menu item.\n4.  In the ensuing page, enter Road in the Find What field\
    \ and Street in the Replace With field (as shown in [Figure 2-37](#Chapter02.html#fig_2_37)).\
    \ Click the Apply button when you are done.\n\n    ![images](images/0237.jpg)\n\
    \n    ***Figure 2-37.** Replacing \"Road\" with \"Street\"*\n\n5.  You will find\
    \ all phrases of \"`Road`\" replaced with \"`Street`\" in your Websheet (as shown\
    \ in [Figure 2-38](#Chapter02.html#fig_2_38)).\n\n![images](images/0238.jpg)\n\
    \n***Figure 2-38.** Phrase replacement in a Websheet*\n\n#### How It Works\n\n\
    Websheets provide a few tools to help you modify data en masse in a data grid.\
    \ The following bulk edit actions are supported:\n\n*   Replace a value in a certain\
    \ column with another value for all rows.\n*   Set a column to a certain value\
    \ for all rows.\n*   Fill columns containing null values with data from the previous\
    \ row.\n\n## Chapter 3\n\n## Wiring up Application Logic\n\nIf you are an ASP.NET\
    \ developer, you're probably familiar with the codebehind model introduced by\
    \ Microsoft to separate the presentation from the logic layer. In a codebehind\
    \ page, execution of code is event-based. You specify blocks of code to execute\
    \ when a page loads or when a button is clicked.\n\nThe APEX logic layer works\
    \ in a similar fashion. Perhaps the best way to summarize how it works is this:\
    \ Page execution is segmented into different chronological events—points at which\
    \ application logic can be inserted. For instance, the back end execution of a\
    \ typical APEX page is segmented into two major events, Page Rendering and Page\
    \ Processing, both of which consist of smaller events that can trigger application\
    \ logic.\n\nAn APEX developer can insert application logic using mostly PL/SQL\
    \ statements and JavaScript, both of which can also be generated using the wizards\
    \ provided by APEX. (In fact, if you don't count PL/SQL as \"code,\" it's possible\
    \ to create an entire bookstore or salesforce application from scratch without\
    \ writing a single line of code!)\n\nAPEX is different from traditional development\
    \ tools in that it is geared at churning out business applications in the shortest\
    \ amount of time possible. In meeting that goal, APEX enforces a strict framework\
    \ that expects business applications to be developed in a certain way. For instance,\
    \ every form is expected to display information, provide client-side validation\
    \ and server-side validation, and perform back-end processing at specific points\
    \ in its lifetime. Applications developed on APEX are limited in nature to this\
    \ type of flow, and trying to write logic to do something outside this norm may\
    \ not be as easy as it would be using a traditional development tool. This means\
    \ that you can't use APEX to create games (not great ones, at least), but you\
    \ can certainly use it to create business applications—especially database-centric\
    \ ones—very quickly.\n\nIn this chapter, I explore the APEX logic layer in detail\
    \ and show you how to perform common tasks in APEX.\n\n### 3-1. Adding Server-side\
    \ Validation to Your Form\n\n#### Problem\n\nYou are creating a form to handle\
    \ patient discharges from a hospital. When nurses fill in the form, they are required\
    \ to enter the Social Security number of the patient. Before the record can be\
    \ created, the form data must be validated at the back end—the patient's Social\
    \ Security number must be checked against a payment history table. If the payment\
    \ record exists (if the patient has paid for his or her treatment), the discharge\
    \ is allowed. If not, the discharge form must display an error message.\n\n####\
    \ Solution\n\nBefore you can test the solution in this recipe, you will need to\
    \ set up some sample database and form objects. After that, you will explore how\
    \ you can add server-side validation to these forms. Let's start by creating the\
    \ sample objects.\n\n##### Setting up the Sample Objects\n\nTo create the sample\
    \ objects, please follow these steps:\n\n1.  Create the `PaymentHistory` table\
    \ shown in [Listing 3-1](#Chapter03.html#list_3_1) using the SQL Workshop or PL/SQL.\n\
    \n    ***Listing 3-1.** The `PaymentHistory` Table*\n\n    ```sql\n    CREATE\
    \ table \"PAYMENTHISTORY\" (\n        \"SOCIALSECURITYNO\" NVARCHAR2(9),\n   \
    \     \"AMOUNTPAID\"       NUMBER(6,2)\n    )\n    ```\n\n2.  Create the patient\
    \ discharge table shown in [Listing 3-2](#Chapter03.html#list_3_2) (with the `DISCHARGEID`\
    \ field set as the primary key), then create a database application and set up\
    \ a data entry form on top of this table.\n\n    ***Listing 3-2.** The `PatientDischarge`\
    \ Table*\n\n    ```sql\n    CREATE table \"PATIENTDISCHARGE\" (\n        \"DISCHARGEID\"\
    \              NVARCHAR2(10),\n        \"PATIENTNAME\"              NVARCHAR2(255),\n\
    \        \"PATIENTSOCIALSECURITYNO\"  NVARCHAR2(9),\n        \"DATEOFDISCHARGE\"\
    \          DATE,\n        \"DISCHARGEREMARKS\"         NVARCHAR2(2000),\n    \
    \    constraint  \"PATIENTDISCHARGE_PK\" primary key (\"DISCHARGEID\")\n    )\n\
    \    /\n\n    CREATE sequence \"PATIENTDISCHARGE_SEQ\"\n    /\n\n    CREATE trigger\
    \ \"BI_PATIENTDISCHARGE\"\n      before insert on \"PATIENTDISCHARGE\"\n     \
    \ for each row\n    begin\n      if :NEW.\"DISCHARGEID\" is null then\n      \
    \  select \"PATIENTDISCHARGE_SEQ\".nextval into :NEW.\"DISCHARGEID\" from dual;\n\
    \      end if;\n    end;\n    /\n    ```\n\n    ![images](images/square.jpg) **Tip**\
    \ Refer to Recipe 2-1 for more information on how to set up a data entry form.\n\
    \n3.  Add a sample record to the `PaymentHistory` table with the Social Security\
    \ number `123456789`. This can be done by executing the SQL in [Listing 3-3](#Chapter03.html#list_3_3).\n\
    \n    ***Listing 3-3.** Creating the Sample Record in the `PaymentHistory` Table*\n\
    \n    ```sql\n    INSERT INTO PAYMENTHISTORY(SOCIALSECURITYNO,AMOUNTPAID) VALUES('123456789',500)\n\
    \    ```"
