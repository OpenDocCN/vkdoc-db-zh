    \ Median` | The weighted median (for each page) is the median elapsed multiplied\
    \ by the number of events in each page. |\n\nThese figures are particularly useful\
    \ in that they allow you to zoom in on the pages that need performance optimization.\
    \ For instance, the following is a series of steps you can adopt as a strategy\
    \ for optimization:\n\n5\\. Sort all pages by Median Elapsed time, and take note\
    \ of all the pages that exceed a certain threshold. Consider deriving that threshold\
    \ from your enterprise objectives. For instance, your Quality of Service statement\
    \ might include delivering every page to your end user in less than three seconds.\
    \ Such an objective will let you narrow down to a smaller and more manageable\
    \ subset of pages for optimization.\n\n![images](images/square.jpg) **Tip** It's\
    \ interesting to note that public tenders issued by the Government of Singapore\
    \ for IT projects typically outline the three-second maximum response time as\
    \ one of the requirements for web-based applications.\n\n6\\. Review the Page\
    \ Events values. The Median Elapsed time alone is not a good indicator for the\
    \ performance of the page. Looking at the Page Events column will let you make\
    \ a better assessment, since the number of page events roughly correlates with\
    \ the complexity of the page. For instance, a page that takes three seconds to\
    \ load might actually be more performance-effective than a page that takes one\
    \ second to load if that first page has 20 events and the second page has 1 event.\n\
    \n### 7-3. Measuring Region Performance in APEX\n\n#### Problem\n\nYou now know\
    \ the average elapsed time taken for each page. You want to drill down further\
    \ into the performance of each individual region in a particular page. As in the\
    \ previous recipe, your goal is to focus your optimization efforts on those pages\
    \ and regions consuming the most time.\n\n#### Solution\n\nTo measure region performance,\
    \ please follow these steps:\n\n1.  Log in to APEX and open any application that\
    \ contains a report. (To create a report page, please see Recipe 2-2). Navigate\
    \ to the Page Rendering view of the report page.\n2.  Expand the Regions node,\
    \ and right-click on any region under this node. Click the Edit menu item in the\
    \ pop-up menu (as shown in [Figure 7-4](#Chapter07.html#fig_7_4)).\n\n    ![images](images/0704.jpg)\n\
    \n    ***Figure 7-4.** Editing the report region*\n\n3.  In the Edit Region page,\
    \ click the Header and Footer tab. In the Region Footer section, enter the following\
    \ line: `#ROWS_FETCHED# rows fetched (from a total of #TOTAL_ROWS# rows) in #TIMING#\
    \ seconds`\n4.  You should now see the screenshot shown in [Figure 7-5](#Chapter07.html#fig_7_5).\n\
    \n    ![images](images/0705.jpg)\n\n    ***Figure 7-5.** Specifying substitution\
    \ strings in the region footer to collect performance statistics*\n\n5.  Apply\
    \ your changes and run the report. You should notice a new line at the bottom\
    \ of the Report region which provides you the total time taken to run the query\
    \ and render the region (and its contained items), as shown in [Figure 7-6](#Chapter07.html#fig_7_6).\n\
    \n![images](images/0706.jpg)\n\n***Figure 7-6.** Performance statistics displayed\
    \ in the footer of the region*\n\n#### How It Works\n\nA page may consist of several\
    \ regions; some may already be performance-optimized but others are not. When\
    \ focusing on per-page optimization, it’s useful to break it down further by running\
    \ a quick assessment on the individual components (regions) in that page.\n\n\
    The best way to do this is to capture and print performance statistics for each\
    \ region. This simple step will give you actual run-time statistics for all the\
    \ regions in a page—and instantly reveal the particular region that's giving you\
    \ performance troubles. Oracle APEX provides the substitution strings described\
    \ in [Table 7-3](#Chapter07.html#tab_7_3) to provide real-time information on\
    \ performance statistics.\n\n***Table 7-3.** Useful Substitution Strings for Performance\
    \ Statistics Gathering*\n\n| **Substitution String** | **Description** |\n| ---\
    \ | --- |\n| `#TIMING#` | Shows the elapsed time (in seconds) used in rendering\
    \ a particular region. |\n| `#TOTAL_ROWS#` | Displays the total number of rows\
    \ retrieved by the particular SQL query in a region. |\n| `#ROWS_FETCHED#` | Shows\
    \ the total number of rows fetched by APEX from the query for display. |\n\nYou\
    \ can place these substitution strings in more than one region on a page to find\
    \ out how long each region takes to render. This will allow you to find the performance-poor\
    \ region and to focus your performance tuning efforts there.\n\nAs you've seen\
    \ in this recipe, these three pieces of information are indispensable in the goal\
    \ of profiling your pages (and regions). It is important to look at all three\
    \ parameters and not just the `#TIMING#` info.\n\nFor instance, consider this\
    \ scenario: `Region A` might take three seconds in total to render, but this may\
    \ be due to the fact that there are 500 rows to fetch for display, as opposed\
    \ to `Region B` that takes one second to render but fetches only 100 rows. In\
    \ this case, `Region A` might be better-performing than `Region B` despite `Region\
    \ B` having a shorter rendering time. Thus, you should always consider all three\
    \ parameters before deciding if a region needs performance optimization.\n\n###\
    \ 7-4\\. Enabling Region Caching\n\n#### Problem\n\nYou have a region that retrieves\
    \ a list of fixed/static data from the database for display. You want to improve\
    \ the performance of this region by caching it."
  trans: '


    # 解决方案


    要测量页面性能，请按以下步骤操作：


    1. 登录 APEX 并点击大型的"管理"图标。点击"监视活动"图标，并导航至"页面视图分析"部分。

    2. 向下滚动到"页面视图分析"部分，点击"按加权页面性能"链接。

    3. 在"自"下拉列表中，设置所需的时间范围以收集统计信息。如果您最近访问过应用程序中的任何页面，您应该会看到如图 7-3 所示的截图。您可以在"平均耗时"列下看到渲染每个特定页面所花费的平均时间。


    ![images](img/0703.jpg)

    `图 7-3.` 测量页面性能


    # 工作原理


    "按加权页面性能显示页面视图"页面显示了应用程序中每个独立页面的平均执行统计数据。此报告显示了几项不同的信息，这些信息在表 7-2 中描述。


    `表 7-2.` 页面执行统计信息


    | **列名** | **描述** |

    | --- | --- |

    | `平均耗时` | 显示页面执行所花费的平均时间（以秒为单位）。 |

    | `加权平均值` | 每个页面由页面呈现和处理事件组成，这些事件可能影响渲染页面所需的时间量。加权平均值将平均渲染时间乘以页面上的事件数量。 |

    | `中位数耗时` | 此列显示每个页面平均渲染时间的中位数。这提供了更接近页面实际渲染耗时的准确读数。 |

    | `加权中位数` | （每个页面的）加权中位数是中位数耗时乘以每个页面中的事件数量。 |


    这些数字特别有用，因为它们使您能够放大需要性能优化的页面。例如，以下是一系列您可以作为优化策略采取的步骤：


    4. 按中位数耗时对所有页面排序，并记下所有超过特定阈值的页面。考虑根据您的企业目标推导该阈值。例如，您的服务质量声明可能包括在不到三秒的时间内向最终用户交付每个页面。这样的目标将让您缩小到一个更小、更易于管理的页面子集进行优化。

    ![images](img/square.jpg) **提示** 值得注意的是，新加坡政府发布的 IT 项目公开招标书通常将三秒最大响应时间列为基于 Web
    的应用程序的要求之一。

    5. 查看"页面事件"值。仅凭中位数耗时并不是页面性能的良好指标。查看"页面事件"列将让您做出更好的评估，因为页面事件的数量大致与页面的复杂性相关。例如，一个需要三秒加载的页面，如果该页面有
    20 个事件，而另一个需要一秒加载的页面只有 1 个事件，那么前者实际上可能比后者具有更好的性能效益。


    # 7-3. 在 APEX 中测量区域性能


    ## 问题


    您现在知道了每个页面的平均耗时。您希望进一步深入分析特定页面中每个独立区域的性能。与前面的方案类似，您的目标是将优化工作集中在那些消耗时间最多的页面和区域上。


    ## 解决方案


    要测量区域性能，请按以下步骤操作：


    1. 登录 APEX 并打开任意包含报表的应用程序。（要创建报表页面，请参阅方案 2-2）。导航至报表页面的"页面呈现"视图。

    2. 展开"区域"节点，并右键单击此节点下的任意区域。在弹出菜单中单击"编辑"菜单项（如图 7-4 所示）。

    ![images](img/0704.jpg)

    `图 7-4.` 编辑报表区域

    3. 在"编辑区域"页面中，单击"页眉和页脚"选项卡。在"区域页脚"部分，输入以下行：

    ```

    #ROWS_FETCHED# 行已提取（总共 #TOTAL_ROWS# 行），耗时 #TIMING# 秒

    ```

    4. 您现在应该会看到如图 7-5 所示的截图。

    ![images](img/0705.jpg)

    `图 7-5.` 在区域页脚指定替换字符串以收集性能统计信息

    5. 应用您的更改并运行报表。您应该会注意到报表区域底部新增了一行，它为您提供了运行查询和渲染该区域（及其包含的项目）所花费的总时间，如图 7-6 所示。


    ![images](img/0706.jpg)

    `图 7-6.` 在区域页脚显示的性能统计信息


    ## 工作原理


    一个页面可能包含多个区域；有些区域可能已经过性能优化，但其他区域则没有。在专注于逐页优化时，通过对页面中的各个组件（区域）进行快速评估来进一步分解问题非常有用。

    最好的方法是捕获并打印每个区域的性能统计信息。这个简单的步骤将为您提供页面中所有区域的实际运行时统计信息——并立即揭示出给您带来性能问题的特定区域。Oracle
    APEX 提供了表 7-3 中描述的替换字符串，以提供性能统计信息的实时信息。


    `表 7-3.` 用于收集性能统计信息的实用替换字符串


    | **替换字符串** | **描述** |

    | --- | --- |

    | `#TIMING#` | 显示渲染特定区域所用的耗时（以秒为单位）。 |

    | `#TOTAL_ROWS#` | 显示特定区域中的特定 SQL 查询检索到的总行数。 |

    | `#ROWS_FETCHED#` | 显示 APEX 从查询中为显示而提取的总行数。 |


    您可以将这些替换字符串放置在页面的多个区域中，以找出每个区域的渲染耗时。这将使您能够找到性能不佳的区域，并将性能调整工作集中在那里。

    正如您在此方案中所看到的，这三部分信息对于剖析您的页面（和区域）这一目标来说是不可或缺的。重要的是要查看所有三个参数，而不仅仅是 `#TIMING#` 信息。

    例如，考虑以下场景：`区域 A` 可能总共需要三秒来渲染，但这可能是由于需要提取 500 行进行显示，而 `区域 B` 虽然需要一秒来渲染，但仅提取了 100
    行。在这种情况下，尽管 `区域 B` 的渲染时间更短，`区域 A` 的性能可能实际上比 `区域 B` 更好。因此，在决定一个区域是否需要性能优化时，您应该始终考虑所有三个参数。


    # 7-4. 启用区域缓存


    ## 问题


    您有一个区域，它从数据库中检索固定/静态数据列表进行显示。您希望通过缓存此区域来提高其性能。

