  trans: "### 解决方案\n\n要在整个项目中创建和更新一个功能特性，请遵循以下步骤：\n\n1.  登录到您 APEX 门户中的一个工作区。\n2.\
    \  点击 `Team Development` -> `Features` -> `Create Feature`。\n3.  填写您希望在软件中开发的功能特性的详细信息（如图\
    \ 1-17 所示）。\n\n    ![images](img/0117.jpg)\n\n    **图 1-17。** 创建功能特性\n\n4.  点击\
    \ `Create Feature` 按钮。\n5.  您已创建了一个功能特性，现在工作区中的所有开发者都可以查看它。\n6.  如果某个开发者已完成此功能特性，并且他现在希望更改该特性的状态，他首先需要导航至\
    \ `Team Development` -> `Features` -> `Features` 标签页。\n7.  在此页面中，您应该能够看到所有功能特性的列表。您也可以通过此页面搜索您的功能特性。找到您之前创建的功能特性后，点击其旁边的\
    \ `Edit` 图标（参见图 1-18）。\n\n    ![images](img/0118.jpg)\n\n    **图 1-18。** 浏览功能特性列表\n\
    \n8.  在下一页中，将功能特性的 `Status` 字段更改为 `Complete - 100%`，然后点击 `Apply Changes` 按钮。\n\
    9.  如果您导航至 `Team Development` -> `Features` -> `Dashboard` 标签页，您可以看到一个包含功能特性列表摘要的仪表板（如图\
    \ 1-19 所示）。\n\n    ![images](img/0119.jpg)\n\n    **图 1-19。** 功能特性仪表板\n\n10. `Calendar`\
    \ 标签页以*可视化日历格式*显示您的功能特性开发截止日期，`History` 标签页显示功能特性列表的最新更新，而 `Focus Areas` 和 `Owners`\
    \ 标签页则通过环形图显示功能特性在不同相关人员之间的分布情况。\n\n    ![images](img/square.jpg) **提示** 创建里程碑、任务和报告错误的步骤与创建功能特性的步骤非常相似。要访问各项，请点击\
    \ `Team Development` 菜单中对应的图标。\n\n### 工作原理\n\nAPEX 4.0 版本中提供的新 `Team Development`\
    \ 模块为利益相关者（您的最终用户）提供了一种登录并跟踪功能请求状态的方式，甚至可以在他们使用您开发的应用程序时插入他们的反馈！\n\n`APEX Team\
    \ Development` 对于在项目中使用基于 `SCRUM` 方法（如 `敏捷`）的开发团队来说也是一个巨大的福音。`敏捷` 开发的基本原则之一是，功能特性可以随时以任何顺序添加，更重要的是，可以在任何迭代中发布一个可工作的产品。\n\
    \n使用 `Team Development`，您可以快速创建一个新的发布版本；将一组功能特性、里程碑和任务归入该发布版本下；并通过门户中的各种仪表板跟踪其进度。当发布版本提供给最终用户时，他们登录门户来测试您的应用程序并提供反馈（通过集成的\
    \ `Team Development Feedback` 功能）。这使得项目经理能够纳入这些反馈，并建立一个新的发布版本以及一组新的功能特性、里程碑和任务。\n\
    \n这种迭代过程可以发生多次，以每周左右的速度产生应用程序的增量发布，非常适合 `敏捷` 开发方法中普遍存在的需求快速变化的特性。\n\n## 第 2 章\n\
    \n## 应用程序数据录入\n\n大多数以业务数据库为中心的应用程序通常以相同的方式运作。应用程序围绕一个表构建，例如一个 `Customer` 表。最终用户需要向此表中添加新数据（本例中是新客户记录）。他或她还需要修改现有数据并从此表中删除客户记录。此表中的数据记录通常以网格形式呈现，并伴有\
    \ `新建`、`编辑` 和 `删除` 按钮，允许最终用户修改网格内容。`新建` 和 `编辑` 按钮通常将用户带到单独的详细信息页面——一个表单——该表单以更简化的字段集合显示，用于数据录入。\n\
    \n随着您转向更复杂的示例，如销售订单表单或费用报销申请表，您可以用日益复杂的花哨功能来装饰您的应用程序——数据验证、计算字段、复杂表单行为、访问权限、Web\
    \ 服务调用等等。然而，就其核心而言，一个业务应用程序仍然由基本的 `CRUD`（`创建`、`读取`、`更新` 和 `删除`）操作组成。\n\n这种反复出现的模式是使整个\
    \ `Oracle APEX` 概念运作的基础。它负责设置基本数据录入屏幕并将其绑定到数据库表的繁琐工作。之后，您可以自由地为每个页面添加您想要的花哨功能，使它们按您希望的方式运行。\n\
    \n本章为您提供了一些方法，帮助您为应用程序创建 `CRUD` 基础。它将指导您创建两种不同类型的应用程序——标准数据库应用程序和 `Websheet` 应用程序（`APEX\
    \ 4.0` 中的新功能）。您将学习如何为两者生成数据录入表单，然后稍作修改以使用更丰富的 UI 控件。我还将探讨如何使用一种称为 `表单表格` 的特殊类型表单来加速数据录入。\n\
    \n### 2-1. 创建数据库应用程序\n\n#### 问题\n\n您需要创建一个 `数据库应用程序`，其中包含一个数据录入表单，用于管理主客户列表及其详细信息。\n\
    \n#### 解决方案\n\n最好将此问题分为两部分来处理。首先，创建客户表。然后创建应用程序，包括数据录入表单。"
- fmt: "## Creating the Customers Table\n\nHere's how to create the customers table:\n\
    \n1.  Login to an existing APEX workspace as a developer.\n\n    ![images](images/square.jpg)\
    \ **Note** You can refer to Recipe 1-5 for more information on how to create a\
    \ workspace.\n\n2.  You will now need to create the Customers table. Click on\
    \ the `SQL Workshop` ![images](images/U001.jpg) `Object Browser` menu item. In\
    \ the ensuing window, click the `Create` button in the top right corner, and choose\
    \ the `Table` menu item.\n3.  You will be presented with a window that allows\
    \ you to define your database table. Specify a name for the table and define a\
    \ few fields for the table. You may create a mix of `NVARCHAR2`, `NUMBER`, and\
    \ `DATE` fields. This is shown in [Figure 2-1](#Chapter02.html#fig_2_1).\n\n \
    \   ![images](images/0201.jpg)\n\n    *Figure 2-1. Creating the Customers table*\n\
    \n4.  Click the `Next` button to continue. You can define a primary key in this\
    \ screen, if needed. Set the primary key to the `ID` field of your table, as shown\
    \ in [Figure 2-2](#Chapter02.html#fig_2_2).\n\n    ![images](images/square.jpg)\
    \ **Tip** Several APEX functions, like editing a record from a report page, require\
    \ a primary key to be defined on the table or view upon which the report is based.\
    \ You can read up more about report pages in Recipe 2-2.\n\n    ![images](images/0202.jpg)\n\
    \n    *Figure 2-2. Defining the primary key*\n\n5.  Click the `Next` button. The\
    \ next page allows you to define a foreign key (if available). Since there isn't\
    \ one at the moment, skip this page and click the `Next` button again. In the\
    \ next page, you can define constraints on your table. You may, for example not\
    \ want to have duplicate records (two records of a particular company with the\
    \ same name). Choose to create a unique constraint on the `Name` field, as shown\
    \ in [Figure 2-3](#Chapter02.html#fig_2_3).\n\n    ![images](images/0203.jpg)\n\
    \n    *Figure 2-3. Defining constraints on the Customers table*\n\n6.  Click the\
    \ `Next` button. You can see a summary of the table that will be created. Click\
    \ the `Create` button to confirm the request, after which your table will be generated.\
    \ If you browse your list of tables, you should see the `Customers` table appear\
    \ in that list (shown in [Figure 2-4](#Chapter02.html#fig_2_4)).\n\n    ![images](images/0204.jpg)\n\
    \n    *Figure 2-4. The Customers table in the Object browser*\n\n## Creating the\
    \ Database Application and Data Entry Form\n\nNow it's time to create the database\
    \ application.\n\n1.  To create a new database application, click the `Application\
    \ Builder` ![images](images/U001.jpg) `Database applications` menu item in the\
    \ workspace home.\n2.  The application builder wizard will be displayed (as shown\
    \ in [Figure 2-5](#Chapter02.html#fig_2_5)). Choose the `Database application`\
    \ type.\n\n    ![images](images/0205.jpg)\n\n    *Figure 2-5. Application Builder\
    \ wizard*\n\n3.  Next, you will need to specify a name for your application. Use\
    \ `Sales Force` as the application name. Choose to create the application from\
    \ scratch. Click on the `Next` button.\n4.  You will now see a section of the\
    \ wizard called `Pages`. Here you can define the list of pages contained in your\
    \ application. Create a blank page; this will be the home page of your application.\
    \ Choose the blank page type and specify `My Home` as your page name (see [Figure\
    \ 2-6](#Chapter02.html#fig_2_6)). When you are done, click the `Add Page` button.\n\
    \n    ![images](images/0206.jpg)\n\n    *Figure 2-6. Creating a blank page as\
    \ the home page*\n\n5.  In this same area, you will be able to create the data\
    \ entry page. Choose the `Form` page type. In the `Subordinate to Page` field,\
    \ select the `My Home` page. In the `table name` field, choose an existing table\
    \ from the database; in your case, the `Customers` table you created earlier.\
    \ After you are done, click the `Add Page` button. This step is shown in detail\
    \ in [Figure 2-7](#Chapter02.html#fig_2_7).\n\n    ![images](images/square.jpg)\
    \ **Tip** The `Subordinate to Page` field gives APEX some information on how your\
    \ pages are structured. This, in turn, defines the default navigation scheme generated\
    \ by APEX later. For instance, setting the `Customers` form as the subordinate\
    \ to the `My Home` page will cause APEX to automatically generate a link to the\
    \ `Customers` form in the home page.\n\n    ![images](images/0207.jpg)\n\n   \
    \ *Figure 2-7. Creating the Customers data entry page*\n\n6.  When you are done,\
    \ click the `Next` button. In the next page, you can define tabs for your application.\
    \ Use the default settings and proceed to the next page. You may also skip the\
    \ `Shared Components`, `Attributes`, and `UI` wizard pages for now. Click the\
    \ `Create` button to create the application. You will be required to reconfirm\
    \ your settings one more time.\n7.  After your application is successfully created,\
    \ you will see the screenshot shown in [Figure 2-8](#Chapter02.html#fig_2_8).\
    \ (Note that a `Login` page is automatically generated in your application). Click\
    \ the `Run Application` icon to try out your application!\n\n    ![images](images/0208.jpg)\n\
    \n    *Figure 2-8. The SalesForceApp application was created successfully!*\n\n\
    8.  You will first see the `Login` page. Log in with the same credentials as the\
    \ developer account you used earlier to log in to your workspace. After you've\
    \ logged in to your application, you should see the home page shown in [Figure\
    \ 2-9](#Chapter02.html#fig_2_9). Note that a link to the `Customers` page has\
    \ been automatically generated on the home page.\n\n    ![images](images/0209.jpg)\n\
    \n    *Figure 2-9. The home page of your application*\n\n9.  Click the `Customers`\
    \ link to open the `Customers` data entry form. You can see your form here (with\
    \ the full list of fields from the `Customers` table). Enter some information\
    \ in this form and click the `Create` button when you are done. This is shown\
    \ in [Figure 2-10](#Chapter02.html#fig_2_10).\n\n    ![images](images/square.jpg)\
    \ **Note** The generated controls on the form depend on the field type declared\
    \ in the database table. For instance, a `DATE` field in the database would generate\
    \ a date picker control on the form.\n\n    ![images](images/0210.jpg)\n\n   \
    \ *Figure 2-10. The Customers data entry page*\n\n10. When you have created the\
    \ record, log out from the application and click the `Home` button in the bottom\
    \ bar to return to the workspace. Navigate to the `Object Browser` in the `SQL\
    \ Workshop`, and take a peek at the data in this table. You should be able to\
    \ see the newly created record in your database table (see [Figure 2-11](#Chapter02.html#fig_2_11)).\n\
    \n    ![images](images/0211.jpg)\n\n    *Figure 2-11. The newly created customer\
    \ record*\n\n### How It Works\n\nThe `Database Application` type is the most common\
    \ application type in APEX. It allows you to set up pages (specifically forms\
    \ and reports) that allow you to quickly generate the CRUD user interfaces around\
    \ an existing database table.\n\nA typical APEX application starts off with the\
    \ developer (or database designer) defining the full set of database tables needed\
    \ for the application. This can be done using the `Object Browser` tool or by\
    \ running PL/SQL script in the `SQL Workshop` section of APEX. It is also possible\
    \ to create the database objects—tables, indexes, constraints, sequences, etc.—using\
    \ an external tool, a set of DDL in a script, or importing the schema from another\
    \ database.\n\nOnce the tables are all generated, the APEX developer generates\
    \ the desired forms and reports from the schema of these database tables. Once\
    \ the forms are in place, the developer refines these generated pages by adding\
    \ validation routines, JavaScript functionality, complex form behavior, access\
    \ rights settings, and so on.\n\n### 2-2. Creating a Report to Manage Your Data\n\
    \n### Problem\n\nYour users want to create two pages: a data entry form and another\
    \ page to retrieve the data they have just entered. The application also needs\
    \ to display previously entered data to the users row by row in a grid (listing)\
    \ format and provide a way for them to edit and delete their data."
