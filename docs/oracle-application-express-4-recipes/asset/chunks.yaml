    \n![images](images/0624.jpg)\n\n***Figure 6-24.** The uploaded XLIFF file*\n\n\
    ##### Step 6: Publish the Translated Application\n\nTo publish the translated\
    \ application, follow these steps:\n\n1.  Return to the main Translate page. Click\
