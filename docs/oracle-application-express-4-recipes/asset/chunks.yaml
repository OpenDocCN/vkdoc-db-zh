    \ catalog page is 9, your Home link property should be set to the following: `f?p=&APP_ID.:9:&SESSION.`\n\
    4.  Save and apply your changes. Now run your application by clicking the `Run\
    \ Application` icon. The application will now redirect you to the front end catalog\
    \ page.\n\n#### How It Works\n\nAs mentioned in [Chapter 9](#Chapter09.html#ch9),\
    \ a typical link to a page in APEX has the following format:\n\n`f?p=(ApplicationID):(PageNumber):(SessionID):::::`\n\
    \nThis recipe shows you the `&APP_ID.` and `&SESSION.` substitution tags to dynamically\
    \ place the application ID and session identifier respectively in the final generated\
    \ link. In this recipe, the page number (id: `9`) is hardcoded in the link.\n\n\
    ### 10-5. Creating the Stockcount Report for the Storekeeper\n\n#### Problem\n\
    \nThe storekeeper's boss wants to see a visual report (pie chart) of the number\
    \ of books (stockcount) by genre.\n\n#### Solution\n\nTo create the stockcount\
    \ pie chart, please follow these instructions:\n\n1.  In the same `Book catalog`\
    \ application, create a new page.\n2.  Choose the `Chart` page type, and in the\
    \ next step of the wizard, opt for the `Flash Chart` type.\n3.  Choose the `Pie\
    \ & Doughnut` chart type, as shown in [Figure 10-24](#Chapter10.html#fig_10_24).\n\
    \n    ![images](images/1024.jpg)\n\n    ***Figure 10-24.** The Pie & Doughnut\
    \ chart type*\n\n4.  Choose the `3D Pie` chart type in the next step of the wizard,\
    \ and for the page name and chart title, enter “`Stockcount by Genre`”.\n5.  When\
    \ you are prompted to enter the SQL data source for the chart, enter the following\
    \ SQL: `SELECT NULL LINK,`\n    `        Category.CategoryName LABEL,`\n    `        SUM(Inventory.CopiesInStock)\
    \ VALUE`\n    `FROM Category,Books,Inventory WHERE Category.CategoryID= Books.BookCategory\
    \ AND`\n    `Books.BookID=Inventory.BookID GROUP BY Category.CategoryName`\n6.\
    \  You should now have the screen shown in [Figure 10-25](#Chapter10.html#fig_10_25).\n\
    \n    ![images](images/1025.jpg)\n\n    ***Figure 10-25.** Defining the SQL datasource\
    \ for the chart*\n\n7.  Complete the wizard and run the page. You should see the\
    \ total number of books instantly computed by genre, as shown in [Figure 10-26](#Chapter10.html#fig_10_26).\n\
    \n    ![images](images/1026.jpg)\n\n    ***Figure 10-26.** The stockcount chart\
    \ in action*\n\n#### How It Works\n\nAs you saw earlier in this book, you can\
    \ easily generate a variety of visual charts from an SQL statement. In this recipe's\
    \ example, you combine information from three different tables to retrieve the\
    \ sum of the stockcount for each different book category.\n\n### 10-6. Setting\
    \ Up the Central Administration Page\n\n#### Problem\n\nYou now have various pages,\
    \ but they're all in pieces. You need to provide a central Administration page\
    \ from which the storekeeper can navigate to the various administration pages."
  trans: "\n#### 解决方案\n\n创建目录前端，请按照以下步骤操作：\n\n1.  在同一个 `Book catalog` 应用程序中，创建一个新的报表。\n\
    2.  在向导中，选择创建一个经典报表。\n3.  将此报表命名为 \"`My Mini Book catalog`\"，并将区域标题设置为 \"`Browse\
    \ our books`\"。\n4.  在报表的 SQL 查询部分，编写以下 SQL：`SELECT \"BOOKID\", \"BOOKTITLE\"\
    ,\"BOOKISBN\",\"BOOKPUBLISHER\",\"BOOKEDITION\",\"BOOKCATEGORY\",\"BOOKDESCRIPTION\"\
    ,\"BOOKPRICE\",\"AUTHOR\", dbms_lob.getlength(\"BOOKIMAGE\") \"BOOKIMAGE\" FROM\
    \ Books`\n5.  完成向导以创建报表。创建完成后，再次编辑该报表。你应该能看到如 图 10-14 所示的屏幕。\n\n    ![images](img/1014.jpg)\n\
    \n    **图 10-14.** 更改区域源的 SQL\n\n6.  使用默认设置完成向导的其余部分。\n7.  如果你运行报表，应该会看到如 图 10-15\
    \ 所示的标准布局。\n\n    ![images](img/1015.jpg)\n\n    **图 10-15.** 标准报表布局\n\n8.  当然，这个布局是可行的，但它并不是一个非常用户友好的图书目录。如果能以如\
    \ 图 10-16 所示的格式列出每个条目会更好。\n\n    ![images](img/1016.jpg)\n\n    **图 10-16.** 前端目录中图书列表的期望布局\n\
    \n9.  首先，你需要稍微修改报表，以便实际图书图像能显示在每一行中。为此，请编辑报表。在报表的页面呈现区域中，右键单击 `BookImage` 列并选择编辑。\n\
    10. 在 `Number/Date Format` 字段中，输入以下文本：`IMAGE:BOOKS:BOOKIMAGE:BOOKID`\n11. 现在你应该能看到如\
    \ 图 10-17 所示的屏幕截图。\n\n    ![images](img/1017.jpg)\n\n    **图 10-17.** 设置 Number/Date\
    \ 格式以在报表中显示图像\n\n12. 保存更改并返回到报表的主页定义区域。\n13. 单击 `Report Attributes` 选项卡。更改列的排序，使\
    \ `BookImage` 列首先显示，如 图 10-18 所示。\n\n    ![images](img/1018.jpg)\n\n    **图 10-18.**\
    \ 调整 BOOKIMAGE 列的查看顺序\n\n14. 保存更改并运行报表。现在你应该能看到类似 图 10-19 的内容。\n\n    ![images](img/1019.jpg)\n\
    \n    **图 10-19.** 报表中显示的图书图像\n\n15. 再次编辑报表。在报表的页面呈现区域中，右键单击 \"`Browse our books`\"\
    \ 区域并选择编辑。单击 `Reports Attribute` 选项卡。\n16. 在列列表中，隐藏除 `BOOKIMAGE` 和 `BOOKTITLE`\
    \ 列之外的所有列（取消勾选 `Show` 列中的复选框），如 图 10-20 所示。\n\n    ![images](img/1020.jpg)\n\n\
    \    **图 10-20.** 隐藏所有其他列\n\n17. 保存你的更改，并再次编辑报表。\n18. 在页面呈现区域中，右键单击 `BOOKTITLE`\
    \ 字段并进行编辑。\n19. 滚动到 `Column Formatting` 区域，在 `HTML Expression` 字段中，输入以下 HTML：`<b>Title\
    \ :</b> #BOOKTITLE#<br> <b>Author :</b> #AUTHOR#<br> <b>Publisher :</b> #BOOKPUBLISHER#<br>\
    \ <b>Price :</b> USD #BOOKPRICE#<br> <b>Description :</b> #BOOKDESCRIPTION#<br>`\n\
    20. 现在你应该能看到如 图 10-21 所示的屏幕。\n\n    ![images](img/1021.jpg)\n\n    **图 10-21.**\
    \ 通过 HTML Expression 字段为行定义显示模板\n\n21. 保存并应用更改。现在尝试再次运行报表。你现在应该能看到图书以更用户友好且易读的方式排列，如\
    \ 图 10-22 所示。\n\n    ![images](img/1022.jpg)\n\n    **图 10-22.** 图书目录前端的修订布局\n\
    \n#### 工作原理\n\n`HTML Expression` 字段允许你定义自己的模板，用于显示报表中每一行的列数据。使用 `#FIELDNAME#`\
    \ 符号，你可以在 HTML 块中显示来自任何报表列的数据。\n\n![images](img/square.jpg) **提示** 同样，你可能希望通过提供更直观的列标题来整理你的界面。\n\
    \n### 10-4. 更改应用程序的主页\n\n#### 问题\n\n`Book catalog` 应用程序当前的主页是管理后端图书报告。你希望将其更改为目录前端页面。\n\
    \n#### 解决方案\n\n要更改应用程序的主页，请按照以下说明操作：\n\n1.  在同一个 `Book catalog` 应用程序中，单击 `Shared\
    \ Components` 图标。\n2.  在 `Security` 区域下，单击 `Security Attributes` 链接，如 图 10-23\
    \ 所示。\n\n    ![images](img/1023.jpg)\n\n    **图 10-23.** Security Attributes 链接\n\
    \n3.  在随后出现的页面中，将主页链接属性中的页码从 1 更改为你前端目录页面的页码。例如，如果你的前端目录页面页码是 9，你的主页链接属性应设置为：`f?p=&APP_ID.:9:&SESSION.`\n\
    4.  保存并应用更改。现在通过单击 `Run Application` 图标运行你的应用程序。应用程序现在会将你重定向到前端目录页面。\n\n#### 工作原理\n\
    \n如 第 9 章 所述，APEX 中指向页面的典型链接具有以下格式：\n\n`f?p=(ApplicationID):(PageNumber):(SessionID):::::`\n\
    \n此配方向你展示了 `&APP_ID.` 和 `&SESSION.` 替换标签，它们分别用于在最终生成的链接中动态放置应用程序 ID 和会话标识符。在此配方中，页码（id:\
    \ `9`）在链接中是硬编码的。\n\n### 10-5. 为仓库管理员创建库存统计报告\n\n#### 问题\n\n仓库管理员的老板希望看到按类型（类别）统计图书数量（库存统计）的可视化报告（饼图）。\n\
    \n#### 解决方案\n\n要创建库存统计饼图，请按照以下说明操作：\n\n1.  在同一个 `Book catalog` 应用程序中，创建一个新页面。\n\
    2.  选择 `Chart` 页面类型，并在向导的下一步中，选择 `Flash Chart` 类型。\n3.  选择 `Pie & Doughnut` 图表类型，如\
    \ 图 10-24 所示。\n\n    ![images](img/1024.jpg)\n\n    **图 10-24.** Pie & Doughnut\
    \ 图表类型\n\n4.  在向导的下一步中选择 `3D Pie` 图表类型，并在页面名称和图表标题中输入 \"`Stockcount by Genre`\"\
    。\n5.  当系统提示你输入图表的 SQL 数据源时，输入以下 SQL：`SELECT NULL LINK, Category.CategoryName\
    \ LABEL, SUM(Inventory.CopiesInStock) VALUE FROM Category,Books,Inventory WHERE\
    \ Category.CategoryID= Books.BookCategory AND Books.BookID=Inventory.BookID GROUP\
    \ BY Category.CategoryName`\n6.  现在你应该能看到如 图 10-25 所示的屏幕。\n\n    ![images](img/1025.jpg)\n\
    \n    **图 10-25.** 定义图表的 SQL 数据源\n\n7.  完成向导并运行页面。你应该能立即看到按类别计算的图书总数，如 图 10-26\
    \ 所示。\n\n    ![images](img/1026.jpg)\n\n    **图 10-26.** 运行中的库存统计图表\n\n#### 工作原理\n\
    \n正如你在本书前面看到的，你可以轻松地从 SQL 语句生成各种可视化图表。在此配方的示例中，你结合了三个不同表的信息，以检索每个不同图书类别的库存总量。\n\
    \n### 10-6. 设置中央管理页面\n\n#### 问题\n\n你现在有各种页面，但它们都是分散的。你需要提供一个中央管理页面，仓库管理员可以从这里导航到各个管理页面。\n"
- fmt: "#### Solution\n\nFirst, you must set up a navigation list. To do so, please\
    \ follow these steps:\n\n1.  In the same `Book catalog` application, click the\
    \ `Shared Components` icon.\n2.  In the `Navigation` area, click the `Lists` link\
    \ shown in [Figure 10-27](#Chapter10.html#fig_10_27).\n\n    ![images](images/1027.jpg)\n\
    \n    ***Figure 10-27.** The Lists link*\n\n3.  Create a new navigation list by\
    \ clicking the `Create` button in the top right corner.\n4.  In the first step\
    \ of the wizard, name the navigation list as \"`AdministrationOptions`\".\n5.\
    \  In the next step of the wizard, create the following four entries:\n    * \
    \  Book Categories\n    *   Inventory & Stockcount\n    *   Books Listing\n  \
    \  *   Stockcount by Genre report\n6.  Tie each item to their respective report\
    \ pages by clicking the little arrow icon next to each `Target Page ID or Custom\
    \ URL` box, and choosing the correct page to link to from the pop-up window. This\
    \ is illustrated in [Figure 10-28](#Chapter10.html#fig_10_28).\n\n    ![images](images/1028.jpg)\n\
    \n    ***Figure 10-28.** Setting up a navigation list*\n\n7.  When you are done,\
    \ complete the wizard to create the list.\n\nNow that you've created the navigation\
    \ list, you need to host it inside a page—the Central Administration page. To\
    \ set up this page, please follow these steps:\n\n1.  In the same `Book catalog`\
    \ application, create a new blank page.\n2.  Specify \"`Administration`\" as the\
    \ page name.\n3.  Complete the rest of the steps of the wizard using the default\
    \ settings to create a blank page.\n4.  Choose to Edit the page.\n5.  In the `Page\
    \ Rendering` area, right click on the `Regions` node, and choose to Create a new\
    \ region.\n6.  Choose the List region type, as shown in [Figure 10-29](#Chapter10.html#fig_10_29).\n\
    \n    ![images](images/1029.jpg)\n\n    ***Figure 10-29.** Creating a List region*\n\
    \n7.  Set \"`Please pick an option below`\" as the title of the region.\n8.  In\
    \ the `Source` step of the wizard, choose the `AdministrationOptions` list you\
    \ created earlier, as shown in [Figure 10-30](#Chapter10.html#fig_10_30).\n\n\
    \    ![images](images/1030.jpg)\n\n    ***Figure 10-30.** Choosing the AdministrationOptions\
    \ list for the region*\n\n9.  Click the `Create List Region` button to complete\
    \ the wizard.\n10. Now run the page. You should see the various links to the various\
    \ administration pages, as shown in [Figure 10-31](#Chapter10.html#fig_10_31).\
    \ Try clicking each link to ensure you land at the correct page.\n\n    ![images](images/1031.jpg)\n\
    \n    ***Figure 10-31.** The Central Administration page in action*\n\n#### How\
    \ It Works\n\nNavigation Lists provide an easy way to setup a bunch of links that\
    \ can be displayed as is (as shown in this recipe), or even hosted within a drop-down\
    \ menu.\n\nThere is actually a side-benefit to setting up navigation lists. Once\
    \ it is set up, it can be reused many times in an application. This can lead to\
    \ easier maintenance of your application in the future. For instance, when a link\
    \ is to be dropped, you don't have to go through every place in your application\
    \ looking to delete that link. You could just remove it from the navigation list,\
    \ and all areas that use the navigation list will be instantly updated.\n\n###\
    \ 10-7. Creating Tabs in Your Application\n\n#### Problem\n\nYou have a Central\
    \ Administration page—that's fine. But how do you navigate there from your main\
    \ catalog page (which is the front end catalog page). You realize you need tabs.\n\
    \n#### Solution\n\nTo create tabs in your application, follow these steps:\n\n\
    1.  In the same `Book catalog` application, click the `Shared Components` icon.\n\
    2.  Under the `Navigation` area, click the `Tabs` link shown in [Figure 10-32](#Chapter10.html#fig_10_32).\n\
    \n    ![images](images/1032.jpg)\n\n    ***Figure 10-32.** The Tabs link in the\
    \ Navigation area*\n\n3.  Click on the `Manage Tabs` button in the top right corner\
    \ of the ensuing page.\n4.  Click the `Edit Standard Tabs` tab.\n5.  Remove any\
    \ and all existing tabs from this list (if an entry exists, click the `Edit` icon,\
    \ and then click the `Delete` icon on the following page).\n6.  You should now\
    \ see the screen shown in [Figure 10-33](#Chapter10.html#fig_10_33).\n\n    ![images](images/1033.jpg)\n\
    \n    ***Figure 10-33.** Removing all standard tabs*\n\n7.  Now click the `Manage\
    \ Tabs` tab, and click the little Add button highlighted in [Figure 10-34](#Chapter10.html#fig_10_34).\n\
    \n    ![images](images/1034.jpg)\n\n    ***Figure 10-34.** Adding a new tab*\n\
    \n8.  Specify \"`Book catalogTabs`\" for the new tabset name, and skip the next\
    \ few steps until you arrive at the \"`Tab Name`\" step of the wizard.\n9.  Specify\
    \ \"`Store`\" as the tab label, as shown in [Figure 10-35](#Chapter10.html#fig_10_35).\n\
    \n    ![images](images/1035.jpg)\n\n    ***Figure 10-35.** Creating the Store\
    \ tab*\n\n10. Click the `Next` button. Now you'll be able to specify the page\
    \ that is associated with this tab. Choose the My Mini Book catalog page by clicking\
    \ the arrow highlighted in [Figure 10-36](#Chapter10.html#fig_10_36).\n\n    ![images](images/1036.jpg)\n\
    \n    ***Figure 10-36.** Choosing the associated page for the tab*\n\n11. Complete\
    \ the rest of the wizard using the default settings provided.\n12. You should\
    \ see your newly created tab displayed in the screen shown in [Figure 10-37](#Chapter10.html#fig_10_37).\n\
    \n    ![images](images/1037.jpg)\n\n    ***Figure 10-37.** The newly created Store\
    \ tab*\n\n13. Add another tab, and label it \"`Administration`\".\n14. When you\
    \ are prompted to provide the page associated with this tab, choose the Central\
    \ Administration (\"`Administration`\") page.\n15. Complete the rest of the wizard\
    \ using the default settings.\n16. Now run your application again. You will see\
    \ two tabs at the top of your application, as shown in [Figure 10-38](#Chapter10.html#fig_10_38).\
    \ One will bring you to the catalog front end page and the other will bring you\
    \ to the Central Administration page.\n\n    ![images](images/1038.jpg)\n\n  \
    \  ***Figure 10-38.** The final book catalog site with tabs*\n\n#### How It Works\n\
    \nAPEX takes away most of the work of visual representation of a tab from the\
    \ developer. Once you associate a tab with a particular page, APEX will automatically\
    \ highlight the tab for you (when you are on the page) and unhighlight the other\
    \ tabs.\n\nTabs, like navigation lists, are also reusable throughout the application\
    \ and provide the same benefit of easier maintenance: when a new tab needs to\
    \ be added, just add it to an existing tabset, and voila! The new tab will instantly\
    \ appear on every page in your application.\n\n## Index\n\n### ![images](images/square.jpg)\
    \ Special Characters & Numbers\n\n# symbol\n\nsubstitution strings, [113](#Chapter04.html#page_113)\n\
    \n3D pie charts\n\nvisualizing data in Dashboard page, [171](#Chapter05.html#page_171)\n\
    \nvisualizing data in graphical charts, [147](#Chapter05.html#page_147), [148](#Chapter05.html#page_148)\n\
    \n3D Stacked Column chart type\n\ncreating multi-series chart, [154](#Chapter05.html#page_154)\n\
    \n8080 port\n\nURL explained, [277](#Chapter09.html#page_277)"
