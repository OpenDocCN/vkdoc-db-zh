    #### 工作原理


    Oracle XML DB HTTP 服务器包含嵌入式 PL/SQL 网关，它与标准的 Oracle 数据库安装一起安装。嵌入式 PL/SQL 网关在 Oracle
    XML DB HTTP 服务器中运行。这如 图 1-1 所示。


    ![images](img/0101.jpg)


    `图 1-1.` 使用 Oracle XML DB HTTP 作为您的 Web 服务器


    这种部署是一个两层模型，易于设置。APEX 引擎和嵌入式 PL/SQL 网关存在于同一个数据库中。请注意，在某些情况下，两层部署可能不是理想的选择，尤其是从安全角度来看。例如，如果您计划将
    APEX 应用程序暴露到互联网上，这种部署模型可能就不合适，因为 HTTP 监听器无法与数据库分离，这样您也会将数据库直接暴露给互联网。


    由于 Web 服务器和数据库紧密耦合而产生的另一个缺点是，如果数据库停机，您的 Web 服务器也将关闭；这将阻止访问静态数据，如静态网页或图像。


    嵌入式 PL/SQL 网关也不提供中间层负载均衡或故障转移功能。为了扩展系统，您将需要依赖数据库级别的 Oracle 真应用集群（`RAC`）技术。基于这些原因，嵌入式
    PL/SQL 网关更适用于较小的部署或独立系统。


    ![images](img/square.jpg) `注意` 在 Oracle 数据库版本 11*g* 之前，不支持带有嵌入式 PL/SQL 网关的 Oracle
    XML DB HTTP 服务器。


    Oracle HTTP 服务器和 `mod_plsql` 方法对于企业部署至关重要，因为管理员有更广泛的配置和日志设置可供使用，并且从安全角度来看也是如此。Oracle
    HTTP 服务器运行在 Apache 上，并使用 `mod_plsql` 插件通过 Net8/SQL*Net 连接与 APEX 引擎通信。`mod_plsql`
    插件将 HTTP 请求映射到 Oracle 数据库中的存储过程。图 1-2 详细说明了 Oracle HTTP 服务器部署。


    ![images](img/square.jpg) `提示` Net8/SQL*Net 连接是一种透明连接，用于在客户端机器和 Oracle 数据库之间传输数据。它允许服务和应用程序驻留在不同的机器上，并作为对等应用程序相互通信。


    ![images](img/0102.jpg)


    `图 1-2.` 使用 Oracle HTTP 服务器作为您的 Web 服务器


    ### 1-3. 安装 Oracle APEX


    #### 问题


    您的任务是在现有的 Oracle 数据库安装（恰好运行在基于 Windows 的服务器上）之上安装最新版本的 Oracle APEX，并且您已决定使用嵌入式
    PL/SQL 网关作为 Web 服务器。


    ![images](img/square.jpg) `注意` APEX 安装支持大量平台。本配方中显示的示例和截图将基于 Windows 安装。非 Windows
    操作系统的安装过程保持不变。


    #### 解决方案


    在您的系统上安装 APEX，请执行以下步骤：


    1.  确保存在现有的 Oracle 数据库安装。如果未找到，请先安装 Oracle 数据库（版本 10.2.0.3 及以上）。

    ![images](img/square.jpg) `注意` 某些版本的 Oracle 数据库内置了较早版本的 APEX。无论如何，无论您是全新安装 APEX
    还是升级到更新版本的 APEX，以下步骤仍然适用。

    2.  下载软件。本书撰写时的 Oracle APEX 最新版本是 4.0.2。您可以从以下 URL 下载最新版本的 APEX：[`http://www.oracle.com/technetwork/developer-tools/apex/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/apex/downloads/index.html)

    3.  将下载的 APEX 包解压到系统上的 `APEXFILES\APEX` 文件夹中（例如：`C:\APEXFILES\APEX`）。

    ![images](img/square.jpg) `注意` `C:\APEXFILES\APEX` 将是您的 APEX 主目录。重要的是，您的子文件夹必须命名为
    `APEX`。

    4.  以 `SYSDBA` 身份登录到系统上的 `SQL*Plus`。

    5.  您需要创建两个表空间。在 `SQL*Plus` 中运行 清单 1-1 所示的语句。

    `清单 1-1.` 创建 APEX 表空间

    ```

    CREATE TABLESPACE APEX datafile ''C:\oraclexe\oradata\XE\APEX.dbf''

    SIZE 500M

    EXTENT MANAGEMENT LOCAL

    SEGMENT SPACE MANAGEMENT AUTO;


    CREATE TABLESPACE APEX_FILES datafile ''C:\oraclexe\oradata\XE\APEX_FILES.dbf''
    SIZE 100M

    EXTENT MANAGEMENT LOCAL

    SEGMENT SPACE MANAGEMENT AUTO;

    ```

    ![images](img/square.jpg) `注意` 您的 Oracle 主目录可能安装在不同的路径中。请确保将上面代码中的路径更改为正确的位置。在上面的示例中，Oracle
    数据库主目录路径是 `C:\oraclexe\oradata\XE`。

    6.  现在，将 `SQL*Plus` 的工作目录设置为 `C:\APEXFILES\APEX`。最简单的方法（在 Windows 上）是先打开一个命令提示符窗口，导航到该文件夹，然后从该文件夹运行
    `sqlplus` 命令。

    7.  再次以 `SYSDBA` 身份登录，并键入以下命令：

    ```

    @apxsqler

    ```

    如果中途出错，此命令将回滚随后执行的所有 SQL。

    8.  接下来，通过键入以下命令运行 APEX 安装脚本。执行可能需要几分钟；您应该会看到大量输出流过。

    ```

    @apexins APEX APEX_FILES TEMP /i/

    ```

    运行此语句的输出快照如 图 1-3 所示。

    ![images](img/0103.jpg)

    `图 1-3.` Apex 安装输出

    9.  要检查安装过程中是否有任何错误，您可以检查 `C:\APEXFILES\APEX` 文件夹中生成的日志文件。如果有任何错误，请以 `SYSDBA`
    身份登录到 `SQL*Plus` 并运行以下命令来撤销安装：

    ```

    DROP USER FLOWS_030000 CASCADE

    ```

    然后，您需要在重新运行安装之前解决日志文件中的错误。

    ![images](img/square.jpg) `提示` 日志文件名格式为 `Install<YYYY-MM-DD><HH24-MI-SS>.log`

    10. 如果安装中没有错误，请再次以 `SYSDBA` 身份登录到 `SQL*Plus`，并通过运行以下语句将 APEX 图像加载到 Oracle 数据库中：

    ```

    @apxldimg.sql C:\APEXFILES

    ```

    您应该会看到如 图 1-4 所示的输出。

    ![images](img/0104.jpg)

    `图 1-4.` Apxldimg.sql 输出

    ![images](img/square.jpg) `注意` 运行此步骤时，请确保提供的路径指向父文件夹，而不是解压 APEX 安装文件的文件夹。`apxldimg`
    脚本会将 `\APEX` 后缀附加到您的路径后。

