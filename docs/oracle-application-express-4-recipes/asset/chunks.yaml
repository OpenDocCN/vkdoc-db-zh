  trans: "\n### 3-1. 添加服务器端验证\n\n要为您的表单添加服务器端验证，请按照以下步骤操作：\n\n1.  导航至出院患者表单的“页面定义”区域中的“页面处理”部分。\n\
    2.  在“验证”节点下，右键单击“验证”节点，然后单击“创建”按钮（如图 3-1 所示）。\n\n    ![images](img/0301.jpg)\n\
    \n    ***图 3-1.** 启动创建验证向导*\n\n3.  您现在应该会看到“创建验证”向导。在向导的第一页，选择“项目级验证”项（参见图 3-2）。\n\
    \n    ![images](img/0302.jpg)\n\n    ***图 3-2.** 选择验证类型*\n\n4.  在向导的下一页，选择 `PATIENTDISCHARGE:\
    \ 1. P1_PATIENTSOCIALSECURITYNO` (`Patientsocialsecurityno`) 项作为要验证的项。\n5.  在下一页，选择\
    \ `PL/SQL` 验证方法，接着选择函数返回布尔值 `PL/SQL` 验证类型。\n6.  在下一个（序列和名称）步骤中使用默认值。继续到下一个（验证）步骤，并输入清单\
    \ 3-4 中所示的 `PL/SQL` 验证代码。\n\n    ***清单 3-4.** PL/SQL 验证代码*\n\n    ```\n    DECLARE\n\
    \          CT INTEGER;\n    BEGIN\n          SELECT COUNT(*) INTO CT FROM PAYMENTHISTORY\
    \ WHERE\n          SOCIALSECURITYNO = :P1_PATIENTSOCIALSECURITYNO;\n         \
    \ IF CT>0 THEN\n              return true;\n          ELSE\n              return\
    \ false;\n          END IF;\n    END;\n    ```\n7.  在同一步骤中，指定验证失败时显示的错误消息，如图 3-3\
    \ 所示。\n\n    ![images](img/0303.jpg)\n\n    ***图 3-3.** 指定验证行为*\n\n8.  继续到下一步。为“按下按钮时”字段选择“创建”选项，如图\
    \ 3-4 所示。\n\n    ![images](img/0304.jpg)\n\n    ***图 3-4.** 指定验证行为*\n\n9.  单击“创建”按钮以创建验证规则。\n\
    10. 现在运行该表单。您将看到出院患者表单显示。在“患者社会保障号”字段中输入除 `123456789` 以外的任何值。单击“创建”按钮。您应该会看到验证错误消息显示在页面顶部（如图\
    \ 3-5 所示）。如果您输入值 `123456789`（该值存在于 PaymentHistory 表中），则不会显示错误。\n\n![images](img/0305.jpg)\n\
    \n***图 3-5.** 运行中的验证*\n\n#### 工作原理\n\n首先，简单介绍一下服务器端验证。服务器端验证与客户端验证相对，它需要到服务器的往返行程。APEX\
    \ 中主要有三种类型的服务器端验证。\n\n> **项目级验证**：当您的验证一次只涉及一个页面项时使用此类型。\n>\n> **表格表单验证**：用于验证表格表单（更多内容见配方\
    \ 3-2）。\n>\n> **页面级验证**：当您的验证涉及表单中的多个页面项时使用此类型（例如，确保开始日期早于结束日期）。\n\n“条件类型”字段允许您指定应用验证的条件。例如，如果出院的患者恰好是该医院的\
    \ VIP 患者，您可能不需要检查付款。您可以在出院患者表单中包含一个复选框，如果勾选，则表示该患者是 VIP 会员。条件配置允许您创建一个可以检查此标志的规则，如果勾选，则跳过验证。\n\
    \n### 3-2. 为您的表格表单添加服务器端验证\n\n#### 问题\n\n您有一个“员工”表格表单，需要执行服务器端验证。您需要确保在提交表单时，社会保障号不为空。\n\
    \n#### 解决方案\n\n要为您的表格表单添加服务器端验证，请按照以下步骤操作：\n\n1.  创建清单 3-5 中所示的表。\n\n    ***清单\
    \ 3-5.** 示例员工表*\n\n    ```\n    CREATE table \"EMPLOYEE\" (\n        \"EMPLOYEENAME\"\
    \     NVARCHAR2(255),\n        \"EMPLOYEETYPE\"     NVARCHAR2(10),\n        \"\
    SOCIALSECURITYNO\" NVARCHAR2(10),\n        \"EMPLOYEEID\"       NVARCHAR2(10),\n\
    \        constraint  \"EMPLOYEE_PK\" primary key (\"EMPLOYEEID\")\n    )\n   \
    \ /\n\n    CREATE sequence \"EMPLOYEE_SEQ\"\n    /\n\n    CREATE trigger \"BI_EMPLOYEE\"\
    \n      before insert on \"EMPLOYEE\"\n      for each row\n    begin\n      if\
    \ :NEW.\"EMPLOYEEID\" is null then\n        select \"EMPLOYEE_SEQ\".nextval into\
    \ :NEW.\"EMPLOYEEID\" from dual;\n      end if;\n    end;\n    ```\n2.  基于 `EMPLOYEE`\
    \ 表创建一个数据库应用程序/表格表单。\n\n    ![images](img/square.jpg) **提示** 配方 2-6 展示了如何创建表格表单。\n\
    \n3.  导航到您的表格表单的“页面定义”区域的“页面呈现”部分。\n4.  展开以下节点：`Employee` ![images](img/U001.jpg)\
    \ `区域` ![images](img/U001.jpg) `正文 (3)` ![images](img/U001.jpg) `EMPLOYEE` ![images](img/U001.jpg)\
    \ `报表列`，右键单击 `SOCIALSECURITYNO` 字段，然后单击“创建验证”子菜单项，如图 3-6 所示。\n\n    ![images](img/0306.jpg)\n\
    \n    ***图 3-6.** 为 SOCIALSECURITYNO 字段添加验证*\n\n5.  在下一页，选择“列非空”验证类型（您正在检查以确保\
    \ `SocialSecurityNo` 字段不为空）。在下一页使用默认设置。\n6.  在接下来的页面中，您将可以指定验证失败时显示的错误消息。输入以下错误消息：“请指定员工的社会保障号码。”\n\
    7.  在下一页，为“按下按钮时”字段选择“添加”（添加行）。保存更改并运行您的表格表单。将社会保障号码字段留空并尝试提交表格表单。您应该看到如图 3-7\
    \ 所示的屏幕。\n\n![images](img/0307.jpg)\n\n***图 3-7.** 运行中的表格表单验证*\n\n#### 工作原理\n\n\
    您可以在表格表单的以下四个事件中的任何一个插入简单验证：\n\n*   用户单击“添加”（添加行）按钮时。\n*   用户单击“取消”按钮时。\n*   用户单击“删除”按钮时。\n\
    *   用户单击“提交”按钮时。\n\n![images](img/square.jpg) **注意** 并非所有标准表单的验证选项都适用于表格表单。例如，表格表单不支持您在配方\
    \ 3-1 中看到的复杂类型的 `PL/SQL` 验证。\n\n### 3-3. 为您的表单添加客户端 JavaScript 验证\n\n#### 问题\n\
    \n当焦点移开标准表单上的数值字段时，您需要立即检查输入的值是否在特定范围内，如果不在则显示错误消息。您希望使用 JavaScript 来完成此操作，这样可以消除到服务器的往返行程。\n"
- fmt: "## Solution\n\nTo add client-side validation to your form, follow these steps:\n\
    \n1.  Create the table shown in [Listing 3-6](#Chapter03.html#list_3_6) and create\
    \ a database application/data entry form based on the table.\n\n    **Listing\
    \ 3-6.** The Sample Salaries Table\n\n    ```sql\n    CREATE table \"SALARIES\"\
    \ (\n        \"PAYROLLID\"    NVARCHAR2(255),\n        \"EMPLOYEENAME\" NVARCHAR2(255),\n\
    \        \"SALARY\"       NUMBER(6,2),\n        constraint  \"SALARIES_PK\" primary\
    \ key (\"PAYROLLID\")\n    )\n    /\n\n    CREATE sequence \"SALARIES_SEQ\"\n\
    \    /\n\n    CREATE trigger \"BI_SALARIES\"\n      before insert on \"SALARIES\"\
    \n      for each row\n    begin\n      if :NEW.\"PAYROLLID\" is null then\n  \
    \      select \"SALARIES_SEQ\".nextval into :NEW.\"PAYROLLID\" from dual;\n  \
    \    end if;\n    end;\n    /\n    ```\n\n2.  Navigate to the Page Rendering section\
    \ of the Page Definition area of your form.\n3.  Right click on the root node\
    \ (your data entry form) and choose the Edit submenu item.\n4.  In the next page,\
    \ navigate to the HTML Header and Body Attribute tab. In the HTML Header field,\
    \ enter the JavaScript code shown in [Listing 3-7](#Chapter03.html#list_3_7).\
    \ You should see the screen shown in [Figure 3-8](#Chapter03.html#fig_3_8). Click\
    \ the Apply Changes button.\n\n    **Listing 3-7.** Validation JavaScript\n\n\
    \    ```html\n    <script type=\"text/javascript\">\n      function validSalary(object){\n\
    \        if(parseInt(object.value)>5000)\n       alert('Salary must be a figure\
    \ below $5000');\n      }\n    </script>\n    ```\n    ![images](images/0308.jpg)\n\
    \n    **Figure 3-8.** Specifying the `validSalary` JavaScript function\n\n5. \
    \ After doing this, navigate to the Page Definition area of your form again. Right\
    \ click on the `P1_SALARY` form item under Salaries ![images](images/U001.jpg)\
    \ Regions ![images](images/U001.jpg) Body (3) ![images](images/U001.jpg) Salaries\
    \ ![images](images/U001.jpg) Items menu in the Page Rendering section. Click the\
    \ Edit item in the pop-up menu.\n6.  Navigate to the Element tab, and type the\
    \ code shown in [Listing 3-8](#Chapter03.html#list_3_8) in the HTML Form Element\
    \ Attributes field (as shown in [Figure 3-9](#Chapter03.html#fig_3_9)).\n\n  \
    \  **Listing 3-8.** Adding a JavaScript Event Handler to the Salary Field\n\n\
    \    ```html\n    onblur=\"validSalary(this);\"\n    ```\n    ![images](images/0309.jpg)\n\
    \n    **Figure 3-9.** Adding validation to the SOCIALSECURITYNO field\n\n7.  Apply\
    \ your changes. Now run the form. If you enter a value larger than 5000 in the\
    \ Salary field and navigate away from the field, it will show a JavaScript pop-up\
    \ error message like the one shown in [Figure 3-10](#Chapter03.html#fig_3_10).\n\
    \n![images](images/0310.jpg)\n\n**Figure 3-10.** Client-side validation in action\n\
    \n## How It Works\n\nClient-side validation in APEX is implemented entirely in\
    \ JavaScript, and is useful because it does not incur an additional round trip\
    \ to the server. You typically use client-side validation when you need to:\n\n\
    *   Check for missing values.\n*   Check if a numerical or date value falls within\
    \ a certain range.\n*   Check if the length of a particular value exceeds a maximum\
    \ number of characters.\n\nThe HTML Header and Body Attribute section of the form\
    \ allows you to insert blocks of JavaScript that are included together when a\
    \ particular page is rendered. You can use this section to insert a list of JavaScript\
    \ functions that can be selectively called from any item in the form.\n\nThe HTML\
    \ Form Element attribute field, as you saw earlier, allows you to specify JavaScript\
    \ event handlers for each page item on the form. You can make calls to JavaScript\
    \ functions defined in the `HTML` Header and Body Attribute section from this\
    \ area.\n\n## 3-4. Changing the List of Items in a Drop-down List Dynamically\n\
    \n## Problem\n\nYou have a drop-down list. When you change the values in this\
    \ drop-down list, you want the values in another drop-down list to also change.\
    \ In other words, you want to create a cascading drop-down list.\n\nFor example,\
    \ you have an equipment request form. When you submit a request, you can zoom\
    \ in on a specific equipment using the category and subcategory drop-down list.\
    \ When you change the equipment category, the subcategory list refreshes to show\
    \ only the equipment relevant to that category.\n\n## Solution\n\nTo test the\
    \ solution in this recipe, you will first need to set up some sample database\
    \ and form objects. After that, you will create a cascading relationship between\
    \ the two drop-down lists. Let's start with the sample objects."
