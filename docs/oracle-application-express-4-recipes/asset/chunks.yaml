    \ (LOVs) dynamically generated from a specified SQL statement. LOVs can be used\
    \ as the data source for Select Lists (drop-downs), as seen in this recipe.\n\n\
    **Exercise 10-1: Create Pages to Manage the List of Categories and Book Inventory**\n\
    \nAs an exercise, I leave it to you to create the form and report pages to manage\
    \ the list of different categories as well as book inventory in the book catalog\
    \ application. The approach is similar to the steps outlined in this recipe. Use\
    \ the Category and Inventory tables as the base for these pages.\n\nTo verify\
    \ if what you've done is correct, you should have the List of Categories report\
    \ shown next. This will provide the storekeeper an interface to manage the list\
    \ of available book categories in the book catalog.\n\n![images](images/p296-01.jpg)\n\
    \nFor the inventory report, you should eventually have the report shown next.\
    \ To display the book title in place of the Book ID in the report, you can use\
    \ the following SQL:\n\n`select \"ID\",`\n`\"BOOKS\".\"BOOKTITLE\" \"BOOKID\"\
    ,`\n`\"COPIESINSTOCK\"`\n`from \"#OWNER#\".\"INVENTORY\" LEFT JOIN \"BOOKS\" ON\
    \ \"INVENTORY\".\"BOOKID\"= \"BOOKS\".\"BOOKID\"`\n\n![images](images/p297-01.jpg)\n\
    \nThe Inventory report and form will allow the storekeeper to manage (and view)\
    \ the number of copies of each book in stock in the book catalog.\n\n### 10-3.\
    \ Setting Up the Book Catalog Front End\n\n#### Problem\n\nYou completed the bulk\
    \ of the catalog back end in Recipe 10-2\\. Now you need the accompanying front-end\
    \ portal that displays the list of books available in the catalog to the public,\
    \ in a typical online book catalog format."
  trans: "## 解决方案\n\n您必须首先创建允许仓库管理员在图书目录中添加、编辑和删除书目的表单。\n\n要创建允许仓库管理员添加/编辑/删除图书的页面，请遵循以下说明：\n\
    \n1.  创建一个名为 `图书目录` 的新 `Database` 应用程序。\n2.  在创建应用程序向导的 `页面` 步骤中，选择链接到 `Books`\
    \ 表的 `报表和表单` 页面类型，如 图 10-1 所示。\n\n![images](img/1001.jpg)\n\n**图 10-1.** 添加报表和表单\n\
    \n3.  点击 `添加页面` 按钮以添加表单和报表。完成后，结束向导以创建应用程序。\n4.  您现在应该看到如 图 10-2 所示的界面。\n\n![images](img/1002.jpg)\n\
    \n**图 10-2.** 应用程序中的当前页面列表\n\n5.  如果您启动主 Books 表单，您应该看到如 图 10-3 所示的界面。\n\n![images](img/1003.jpg)\n\
    \n**图 10-3.** 图书详情录入表单\n\n6.  来自 图 10-3 的图书详情录入表单允许仓库管理员向图书目录添加新书，但该表单尚不完整。`BookCategory`\
    \ 字段应显示一个类别下拉列表，以便仓库管理员可以从列表中选择类别，而无需手动输入类别代码。\n7.  编辑该表单。在 `页面渲染` 部分，右键单击 `P1_BOOKCATEGORY`\
    \ 字段，然后选择编辑该字段（如 图 10-4 所示）。\n\n![images](img/1004.jpg)\n\n**图 10-4.** 编辑图书类别字段\n\
    \n8.  在字段属性页面中，将 `显示为` 字段从 `文本字段` 更改为 `选择列表`，如 图 10-5 所示。\n\n![images](img/1005.jpg)\n\
    \n**图 10-5.** 更改“显示为”字段\n\n9.  向下滚动到 `值列表` 区域，并指定以下 SQL：\n    ```sql\n    SELECT\
    \ Description, CategoryID FROM Category\n    ```\n10. 您现在应该看到如 图 10-6 所示的界面。\n\
    \n![images](img/1006.jpg)\n\n**图 10-6.** 为值列表区域指定 SQL\n\n11. 保存您的更改并运行表单。您应该能够从值列表中选择图书类别，如\
    \ 图 10-7 所示。\n\n![images](img/1007.jpg)\n\n**图 10-7.** 实际运行中的图书类别选择列表\n\n12. 让我们转向之前生成的报表。当您在应用程序中运行该报表时，您应该看到如\
    \ 图 10-8 所示的图书列表。\n\n![images](img/1008.jpg)\n\n**图 10-8.** 图书列表\n\n13. 此时还有一件事需要完成，即更改\
    \ `BookCategory` 列，使其显示完整的类别描述而不是类别代码。为此，请编辑报表。\n\n![images](img/square.jpg) **提示**\
    \ 您可能还想更改报表列的标题，以显示更用户友好/可读的标题。您可以通过编辑报表列并更改 `列标题` 字段来实现。\n\n14. 在报表的 `页面渲染` 区域，右键单击\
    \ `Books` 节点，然后选择 `编辑` 链接（如 图 10-9 所示）。\n\n![images](img/1009.jpg)\n\n**图 10-9.**\
    \ 编辑 Books 区域\n\n15. 向下滚动到报表源，并将现有的 SQL 更改为以下内容：\n    ```sql\n    select\n   \
    \   \"BOOKID\",\n      \"BOOKTITLE\",\n      \"CATEGORY\".\"DESCRIPTION\" \"BOOKCATEGORY\"\
    ,\n      \"BOOKISBN\",\n      \"BOOKPUBLISHER\",\n      \"BOOKEDITION\",\n   \
    \   \"BOOKDESCRIPTION\",\n      \"BOOKPRICE\",\n      \"AUTHOR\",\n      dbms_lob.getlength(\"\
    BOOKIMAGE\") \"BOOKIMAGE\"\n    from \"BOOKS\" LEFT JOIN \"CATEGORY\" ON \"BOOKS\"\
    .\"BOOKCATEGORY\" = \"CATEGORY\".\"CATEGORYID\"\n    ```\n16. 您现在应该看到如 图 10-10\
    \ 所示的界面。\n\n![images](img/1010.jpg)\n\n**图 10-10.** 更改区域源的 SQL\n\n17. 应用更改并再次运行报表。请注意，报表显示完整的类别名称而不是类别代码，如\
    \ 图 10-11 所示。\n\n![images](img/1011.jpg)\n\n**图 10-11.** 报表中显示的图书完整类别名称\n\n18.\
    \ 尝试通过您新创建的表单/报表上传图书照片。在报表中，通过单击每行最左侧的编辑图标来编辑一本书。\n19. 浏览图书图片并通过表单上传，如 图 10-12\
    \ 所示。保存对记录的所有更改。\n\n![images](img/1012.jpg)\n\n**图 10-12.** 上传图书图片\n\n20. 要确认图片已成功上传，请再次编辑该记录；这次您会在控件旁边看到一个\
    \ `下载` 链接。单击下载链接将带您到上传的图片文件，如 图 10-13 所示。\n\n![images](img/1013.jpg)\n\n**图 10-13.**\
    \ 示例图书图片\n\n21. 为 `Books` 表中的所有其他图书上传您自己的照片。\n\n## 工作原理\n\n正如本书前面章节所演示的，APEX 允许您轻松地从数据库表创建表单和报表组合。这反过来又让您能够轻松快速地在应用程序中设置\
    \ CRUD（创建、读取、更新和删除）功能。\n\n本书前面章节还介绍了如何使用从指定 SQL 语句动态生成的值列表（LOV）。如本配方所见，LOV 可用作选择列表（下拉菜单）的数据源。\n\
    \n## 练习 10-1：创建页面以管理类别列表和图书库存\n\n作为一个练习，我留给您来创建表单和报表页面，以管理图书目录应用程序中不同的类别列表以及图书库存。方法与本配方中概述的步骤类似。使用\
    \ `Category` 和 `Inventory` 表作为这些页面的基础。\n\n要验证您的操作是否正确，您应该得到如下的类别列表报表。这将为仓库管理员提供一个界面，用于管理图书目录中可用的图书类别。\n\
    \n![images](img/p296-01.jpg)\n\n对于库存报表，您最终应该得到如下的报表。要在报表中显示书名以代替图书 ID，您可以使用以下\
    \ SQL：\n\n```sql\nselect \"ID\",\n  \"BOOKS\".\"BOOKTITLE\" \"BOOKID\",\n  \"\
    COPIESINSTOCK\"\nfrom \"#OWNER#\".\"INVENTORY\" LEFT JOIN \"BOOKS\" ON \"INVENTORY\"\
    .\"BOOKID\"= \"BOOKS\".\"BOOKID\"\n```\n\n![images](img/p297-01.jpg)\n\n库存报表和表单将允许仓库管理员管理（和查看）图书目录中每本图书的库存数量。\n\
    \n### 10-3. 设置图书目录前端\n\n## 问题\n\n您在配方 10-2 中完成了目录后端的大部分工作。现在，您需要配套的前端门户，以典型的在线图书目录格式向公众展示目录中可用的图书列表。"
- fmt: "#### Solution\n\nTo create the catalog front end, follow these steps:\n\n\
    1.  In the same `Book catalog` application, create a new Report.\n2.  In the wizard,\
    \ choose to create a Classic Report.\n3.  Name this report \"`My Mini Book catalog`\"\
    \ and the region title as \"`Browse our books`\".\n4.  In the SQL Query section\
    \ of the report, write the following SQL: `SELECT \"BOOKID\", \"BOOKTITLE\",\"\
    BOOKISBN\",\"BOOKPUBLISHER\",\"BOOKEDITION\",\"BOOKCATEGORY\",\"BOOKDESCRIPTION\"\
    ,\"BOOKPRICE\",\"AUTHOR\", dbms_lob.getlength(\"BOOKIMAGE\") \"BOOKIMAGE\" FROM\
    \ Books`\n5.  Complete the wizard to create the report. After you have done so,\
    \ edit the report again. You should have the screen shown in [Figure 10-14](#Chapter10.html#fig_10_14).\n\
    \n    ![images](images/1014.jpg)\n\n    **Figure 10-14.** Changing the SQL for\
    \ the region source\n\n6.  Complete the rest of the wizard using the default settings.\n\
    7.  If you run your report, you should see the standard layout shown in [Figure\
    \ 10-15](#Chapter10.html#fig_10_15).\n\n    ![images](images/1015.jpg)\n\n   \
    \ **Figure 10-15.** The standard report layout\n\n8.  This layout works, of course,\
    \ but it's not a very user-friendly book catalog. It would be nicer to list each\
    \ item in the format shown in [Figure 10-16](#Chapter10.html#fig_10_16).\n\n \
    \   ![images](images/1016.jpg)\n\n    **Figure 10-16.** The desired layout for\
    \ the book listing in the front end catalog\n\n9.  First, you will need to change\
    \ the report slightly so that the actual book images will appear in each row.\
    \ To do this, edit the report. In the Page Rendering area of the report, right\
    \ click on the `BookImage` column and choose to edit it.\n10. In the Number/Date\
    \ Format field, type in the following text: `IMAGE:BOOKS:BOOKIMAGE:BOOKID`\n11.\
    \ You should now have the screenshot shown in [Figure 10-17](#Chapter10.html#fig_10_17).\n\
    \n    ![images](images/1017.jpg)\n\n    **Figure 10-17.** Setting the Number/Date\
    \ format to display images in a report\n\n12. Save your changes and return to\
    \ the main page definition area of the report.\n13. Click on the `Report Attributes`\
    \ tab. Change the sorting of the columns so that the `BookImage` column appears\
    \ first, as shown in [Figure 10-18](#Chapter10.html#fig_10_18).\n\n    ![images](images/1018.jpg)\n\
    \n    **Figure 10-18.** Shifting the viewing order of the BOOKIMAGE column\n\n\
    14. Save your changes and run the report. You should now have something that looks\
    \ like [Figure 10-19](#Chapter10.html#fig_10_19).\n\n    ![images](images/1019.jpg)\n\
    \n    **Figure 10-19.** The book images displayed in the report\n\n15. Edit the\
    \ report again. In the Page Rendering area of the report, right-click on the \"\
    `Browse our books`\" region and choose to edit it. Click on the `Reports Attribute`\
    \ tab.\n16. In the list of columns, hide all columns (untick the checkbox in the\
    \ `Show` column) except for the `BOOKIMAGE` and `BOOKTITLE` columns, as shown\
    \ in [Figure 10-20](#Chapter10.html#fig_10_20).\n\n    ![images](images/1020.jpg)\n\
    \n    **Figure 10-20.** Hiding all the other columns\n\n17. Save your changes,\
    \ and edit the report again.\n18. In the Page Rendering area, right click on the\
    \ `BOOKTITLE` field and edit it.\n19. Scroll down to the `Column Formatting` area,\
    \ and in the `HTML Expression` field, type the following HTML: `<b>Title :</b>\
    \ #BOOKTITLE#<br> <b>Author :</b> #AUTHOR#<br> <b>Publisher :</b> #BOOKPUBLISHER#<br>\
    \ <b>Price :</b> USD #BOOKPRICE#<br> <b>Description :</b> #BOOKDESCRIPTION#<br>`\n\
    20. You should now have the screen shown in [Figure 10-21](#Chapter10.html#fig_10_21).\n\
    \n    ![images](images/1021.jpg)\n\n    **Figure 10-21.** Defining a display template\
    \ for the row via the HTML Expression field\n\n21. Save and apply your changes.\
    \ Now try running the report again. You should now see the books laid out in a\
    \ more user-friendly and readable fashion, as shown in [Figure 10-22](#Chapter10.html#fig_10_22).\n\
    \n    ![images](images/1022.jpg)\n\n    **Figure 10-22.** The revised layout for\
    \ the book catalog front end\n\n#### How It Works\n\nThe `HTML Expression` field\
    \ allows you to define your own template to display columnar data in a report\
    \ for each row. Using the `#FIELDNAME#` notation, you can display data from any\
    \ report column inside your HTML block.\n\n![images](images/square.jpg) **Tip**\
    \ Again, you might want to tidy up your interface by providing column captions\
    \ that are more intuitive.\n\n### 10-4. Changing the Home Page of the Application\n\
    \n#### Problem\n\nThe current home page of the `Book catalog` application is the\
    \ administration back end Books report. You would like to change it to be the\
    \ catalog front end page.\n\n#### Solution\n\nTo change the home page of an application,\
    \ follow these instructions:\n\n1.  In the same `Book catalog` application, click\
    \ on the `Shared Components` icon.\n2.  Under the `Security` area, click on the\
    \ `Security Attributes` link, as shown in [Figure 10-23](#Chapter10.html#fig_10_23).\n\
    \n    ![images](images/1023.jpg)\n\n    **Figure 10-23.** The Security Attributes\
    \ link\n\n3.  In the ensuing page, change the page number in the Home link property\
    \ from 1 to the page number of the front end catalog page. For example, if the\
    \ page number of your front end catalog page is 9, your Home link property should\
    \ be set to the following: `f?p=&APP_ID.:9:&SESSION.`\n4.  Save and apply your\
    \ changes. Now run your application by clicking the `Run Application` icon. The\
    \ application will now redirect you to the front end catalog page.\n\n#### How\
    \ It Works\n\nAs mentioned in [Chapter 9](#Chapter09.html#ch9), a typical link\
    \ to a page in APEX has the following format:\n\n`f?p=(ApplicationID):(PageNumber):(SessionID):::::`\n\
    \nThis recipe shows you the `&APP_ID.` and `&SESSION.` substitution tags to dynamically\
    \ place the application ID and session identifier respectively in the final generated\
    \ link. In this recipe, the page number (id: `9`) is hardcoded in the link.\n\n\
    ### 10-5. Creating the Stockcount Report for the Storekeeper\n\n#### Problem\n\
    \nThe storekeeper's boss wants to see a visual report (pie chart) of the number\
    \ of books (stockcount) by genre.\n\n#### Solution\n\nTo create the stockcount\
    \ pie chart, please follow these instructions:\n\n1.  In the same `Book catalog`\
    \ application, create a new page.\n2.  Choose the `Chart` page type, and in the\
    \ next step of the wizard, opt for the `Flash Chart` type.\n3.  Choose the `Pie\
    \ & Doughnut` chart type, as shown in [Figure 10-24](#Chapter10.html#fig_10_24).\n\
    \n    ![images](images/1024.jpg)\n\n    **Figure 10-24.** The Pie & Doughnut chart\
    \ type\n\n4.  Choose the `3D Pie` chart type in the next step of the wizard, and\
    \ for the page name and chart title, enter \"`Stockcount by Genre`\".\n5.  When\
    \ you are prompted to enter the SQL data source for the chart, enter the following\
    \ SQL: `SELECT NULL LINK, Category.CategoryName LABEL, SUM(Inventory.CopiesInStock)\
    \ VALUE FROM Category,Books,Inventory WHERE Category.CategoryID= Books.BookCategory\
    \ AND Books.BookID=Inventory.BookID GROUP BY Category.CategoryName`\n6.  You should\
    \ now have the screen shown in [Figure 10-25](#Chapter10.html#fig_10_25).\n\n\
    \    ![images](images/1025.jpg)\n\n    **Figure 10-25.** Defining the SQL datasource\
    \ for the chart\n\n7.  Complete the wizard and run the page. You should see the\
    \ total number of books instantly computed by genre, as shown in [Figure 10-26](#Chapter10.html#fig_10_26).\n\
    \n    ![images](images/1026.jpg)\n\n    **Figure 10-26.** The stockcount chart\
    \ in action\n\n#### How It Works\n\nAs you saw earlier in this book, you can easily\
    \ generate a variety of visual charts from an SQL statement. In this recipe's\
    \ example, you combine information from three different tables to retrieve the\
    \ sum of the stockcount for each different book category.\n\n### 10-6. Setting\
    \ Up the Central Administration Page\n\n#### Problem\n\nYou now have various pages,\
    \ but they're all in pieces. You need to provide a central Administration page\
    \ from which the storekeeper can navigate to the various administration pages."
