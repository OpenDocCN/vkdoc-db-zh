    ***Figure 1-1.** Using Oracle XML DB HTTP as your web server*\n\nThis deployment\
    \ is a two-tier model and is easy to setup. The APEX engine and embedded PL/SQL\
    \ gateway exist in the same database. Do note that a two-tier deployment may not\
    \ be desirable in some cases, especially from the perspective of security. For\
    \ example, if you are planning to expose your APEX applications to the Internet,\
    \ this deployment model may not be desirable because the HTTP listener can't be\
    \ separated from the database, so you would be exposing the database directly\
    \ to the Internet as well.\n\nAnother disadvantage that arises from the tight\
    \ coupling between the web server and the database is that in the event of database\
    \ downtime, your web server will be down as well; this will prevent access to\
    \ static data such as static web pages or images.\n\nAn embedded PL/SQL gateway\
    \ also does not provide mid-tier load balancing or failover features. To scale\
    \ your systems, you will need to depend on Oracle Real Application Clusters (RAC)\
    \ technology at the database level. For these reasons, the embedded PL/SQL gateway\
    \ is suited more for smaller deployments or standalone systems.\n\n![images](images/square.jpg)\
    \ **Note** The Oracle XML DB HTTP Server with embedded PL/SQL gateway is not supported\
    \ prior to Oracle Database Version 11*g*.\n\nThe Oracle HTTP Server and mod_plsql\
    \ approach is essential for enterprise deployments due to the more extensive set\
    \ of configuration and log settings available to the administrator as well as\
    \ from a security standpoint. The Oracle HTTP Server runs on Apache and uses the\
    \ `mod_plsql` plug-in to communicate with the APEX engine. The `mod_plsql` plug-in\
    \ maps HTTP requests to stored procedures in the Oracle database over a Net8/SQL*Net\
    \ connection. [Figure 1-2](#Chapter01.html#fig_1_2) illustrates the Oracle HTTP\
    \ server deployment in detail.\n\n![images](images/square.jpg) **Tip** A Net8/SQL*Net\
    \ connection is a transparent connection that transfers data between a client\
    \ machine and the Oracle database. It allows services and applications to reside\
    \ on different machines and communicate with each other as peer applications.\n\
    \n![images](images/0102.jpg)\n\n***Figure 1-2.** Using Oracle HTTP server as your\
    \ web server*\n\n### 1-3\\. Installing Oracle APEX\n\n#### Problem\n\nYou are\
    \ tasked to install the latest version of Oracle APEX on top of an existing Oracle\
    \ database installation (which happens to be running on a Windows-based server)\
    \ and you have decided to use the embedded PL/SQL gateway as your web server.\n\
    \n![images](images/square.jpg) **Note** APEX installation is supported on a large\
    \ number of platforms. The example and screenshots shown in this recipe will feature\
    \ a Windows-based installation. The installation procedure for non-Windows based\
    \ operating systems remain the same.\n\n#### Solution\n\nExecute the following\
    \ steps to install APEX on your system:\n\n1.  Ensure that an existing Oracle\
    \ database installation exists. If none is found, install an Oracle database (version\
    \ 10.2.0.3 and above) first.\n\n![images](images/square.jpg) **Note** Some versions\
    \ of the Oracle database include an earlier version of APEX built in. In any case,\
    \ the following steps will still apply whether you are installing APEX from scratch\
    \ or upgrading to a newer version of APEX\n\n2.  Download the software. The latest\
    \ version of Oracle APEX (as of the date of writing this book) is version 4.0.2\\\
    . You can download the latest version of APEX from the following URL:\n    [`http://www.oracle.com/technetwork/developer-tools/apex/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/apex/downloads/index.html)\n\
    3.  Unzip the contents of the downloaded APEX package into a folder named APEXFILES\\\
    APEX on your system (e.g.: `C:\\APEXFILES\\APEX`).\n\n![images](images/square.jpg)\
    \ **Note** `C:\\APEXFILES\\APEX` will be your APEX home directory. It is important\
    \ that your subfolder is named `APEX.`\n\n4.  Logon to SQL*Plus on your system\
    \ as the SYSDBA.\n5.  You will need to create two tablespaces. Run the statements\
    \ shown in [Listing 1-1](#Chapter01.html#list_1_1) in SQL*Plus.\n\n***Listing\
    \ 1-1.** Creating the APEX Tablespaces*\n\n`CREATE TABLESPACE APEX datafile 'C:\\\
    oraclexe\\oradata\\XE\\APEX.dbf'`\n    `SIZE 500M`\n    `EXTENT MANAGEMENT LOCAL`\n\
    \    `SEGMENT SPACE MANAGEMENT AUTO;`\n\n`CREATE TABLESPACE APEX_FILES datafile\
    \ 'C:\\oraclexe\\oradata\\XE\\APEX_FILES.dbf' SIZE 100M`\n    `EXTENT MANAGEMENT\
    \ LOCAL`\n    `SEGMENT SPACE MANAGEMENT AUTO;`\n\n![images](images/square.jpg)\
    \ **Note** Your Oracle home directory may be installed in a different path. Ensure\
    \ that you change the path in the code above to reflect the correct location.\
    \ In the example above, the Oracle database home path is `C:\\oraclexe\\oradata\\\
    XE.`\n\n6.  Now, set your working directory for SQL*Plus to `C:\\APEXFILES\\APEX`.\
    \ The easiest way to do this (on Windows) is to first open a command prompt window,\
    \ navigate to the folder, and then run the `sqlplus` command from that folder.\n\
    7.  Login as SYSDBA again and type the following command:\n\n`@apxsqler`\n\nThis\
    \ command will roll back any subsequent SQL executed if an error occurs midway.\n\
    \n8.  Next, run the APEX installation script by typing the following command.\
    \ Execution may take a few minutes; you should see a lot of output stream past.\n\
    \n`@apexins APEX APEX_FILES TEMP /i/`\n\nA snapshot of the output from running\
    \ this statement is shown in [Figure 1-3](#Chapter01.html#fig_1_3).\n\n![images](images/0103.jpg)\n\
    \n***Figure 1-3.** Apex installation output*\n\n9.  To check if there are any\
    \ errors during the installation, you can check the generated log files in the\
    \ `C:\\APEXFILES\\APEX` folder. If there are any errors, undo the installation\
