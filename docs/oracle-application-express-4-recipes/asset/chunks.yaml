    6.  将“显示类型”字段的值设置为“标准报告列”，如图 8-21 所示。\n\n    ![images](img/0821.jpg)\n\n    **图\
    \ 8-21.** 将列的显示类型更改为“标准报告列”\n\n7.  应用你的更改。现在，在同一个应用程序中创建一个新表单。选择“基于表或视图的表单”类型。\n\
    8.  在向导的下一步中，选择`Customers`表或视图。\n9.  使用默认设置完成向导的其余部分。\n\n你现在已经准备好发动攻击了。让我们通过让客户报告在最终用户尝试查看报告时自动重定向到\
    \ Google 网站来激怒他们。\n\n1.  运行你刚刚创建的表单。\n2.  在表单的一个文本字段中，指定清单 8-10 中所示的 JavaScript。\n\
    \n    **清单 8-10.** 恶意脚本\n\n    ```\n    <script>window.location='http://www.google.com';</script>\n\
    \    ```\n3.  你现在应该看到如图 8-22 所示的屏幕。单击“创建”按钮保存你的数据。\n\n    ![images](img/0822.jpg)\n\
    \n    **图 8-22.** 进行跨站脚本攻击\n\n4.  现在运行你之前创建的报告。你会发现不可能查看报告，因为你将不断被重定向到 Google\
    \ 网站。你刚刚成功地进行了跨站脚本攻击。\n\n要防止跨站脚本攻击，你必须执行以下操作：\n\n1.  编辑你之前创建的报告。\n2.  在“页面渲染”区域中，右键单击`NAME`字段并选择编辑它。\n\
    3.  将“显示类型”字段设置为“显示为文本（转义特殊字符）”。\n4.  保存你的更改并再次运行报告。\n5.  你会发现你的报告现在可以显示了；而且，你之前输入的\
    \ JavaScript 已经被适当地转义，现在被视为报告数据而不是代码，如图 8-23 中红色框内所示。\n\n    ![images](img/0823.jpg)\n\
    \n    **图 8-23.** 恶意脚本，现已被处理为无害\n\n6.  你可以对所有其他你希望保护的报告列重复上述步骤 1 到 3。"
- fmt: "#### How It Works\n\n跨站脚本（XSS）攻击试图通过将客户端 JavaScript 代码注入数据输入字段来使其运行。此类攻击可能仅怀有恶作剧的意图（如本示例场景所述），也可能非常危险；想象一下，一种攻击会将您重定向到原始网站的副本，要求您输入密码或个人信息。\n\
    \nXSS 攻击是一种相当简单的攻击类型，其得逞源于以下弱点：\n*   在数据录入端没有对输入数据进行验证。\n*   在数据显示时没有对特殊字符进行转义。\n\
    \n为了说明攻击如何运作，请考虑一个允许您通过文本框输入客户名称的表单。理想情况下，表单会接收数据并将其保存在数据库中。当需要显示时，数据会原样检索并通过\
    \ HTML 显示（例如，放置在表的一行中）。输出结果可能如[清单 8-11](#Chapter08.html#list_8_11)所示。\n\n**清单\
    \ 8-11. 通常的输出**\n```html\n<table>\n        <tr>        \n                <td width='100%'>ACME\
    \ CORP</td>\n        </tr>\n</table>\n```\n\n如果你的应用中没有设置任何检查，并且一个恶意用户输入了一些 JavaScript\
    \ 代码而不是 `ACME CORP`，那么输出结果将如[清单 8-12](#Chapter08.html#list_8_12)所示：\n\n**清单 8-12.\
    \ 包含恶意脚本的输出**\n```html\n<table>\n        <tr>        \n                <td width='100%'>\n\
    \                        <script>window.location='http://www.google.com';</script>\n\
    \                </td>\n        </tr>\n</table>\n```\n\n浏览器会将数据误解为客户端脚本代码并执行其中的\
    \ JavaScript。\n\n防止这种情况发生的一种方法是在数据录入时验证输入数据（例如，拒绝内容中包含 `<script>` 等标签的数据）。这种方法的一个缺点是，如果你真的需要输入一些包含此类标签的数据，它将无法实现。\n\
    \n![images](images/square.jpg) **提示** 可能需要接受包含 HTML 标签数据的一个应用是在线开发者论坛。用户通常会与其他开发者共享他们的代码，将他们代码的示例粘贴到这些数据字段中并不少见。在这种情况下，应用拒绝包含\
    \ HTML 标签的数据没有太大意义。\n\n首选方法是在数据显示时，而不是在数据录入时，转义特殊字符。APEX 提供了一种简单的方法来实现这一点，即更改报表列的“显示类型”属性，如你在本示例前面所见。\n\
    \n![images](images/square.jpg) **注意** 值得高兴的是，随着最新版 APEX 的发布，所有报表列默认都会转义特殊字符，因此如果你创建一个报表，它将自动受到保护，免受跨站脚本攻击。通过进一步结合频繁使用绑定变量而不是替换字符串，你可以将常见的\
    \ Web 和数据库攻击拒之门外。\n\n## C H A P T E R  9\n\n## 部署应用\n\n将你的应用交付给目标受众的最后一步是部署过程。在传统编程中，程序员通常会将应用程序编译成可执行文件，然后将其打包到自动化安装程序中进行分发。\n\
    \n在 APEX 的世界中，你的整个应用程序都位于数据库内。因此，部署只是将所有数据库对象和依赖项从一个数据库实例复制到另一个实例的问题。话虽如此，确保复制正确的对象仍然很重要，以免你意外遗漏对应用程序正常运行至关重要的表或资源。你的用户最不希望看到的就是，在部署了一个无法工作的应用程序后，还要费力地追踪缺失的文件。\n\
    \n显然，一个完整的打包应用程序应该包含运行应用程序所需的所有资源。一个可靠的部署策略将有助于减少匆忙交付中固有的常见“哎呀，我在补丁中遗漏了那个”的问题。正如你将在本章中看到的，APEX\
    \ 提供了几种打包应用程序（或其部分）的方法。你将学习应用程序部署的基础知识以及在此过程中要避免的陷阱。\n\n### 9-1. 选择部署方法\n\n####\
    \ 问题\n\n你在工作区中花费了大量时间创建了一个完美的应用程序。现在你需要部署它，但你需要知道应用程序或工作区中的哪些对象应包含在部署包中。\n\n####\
    \ 解决方案\n\n对于小型组织，如果便利性和部署速度优先于安全性（并且你希望采用最快、最简单的部署方法），请采用以下部署方法：\n1.  为应用程序创建必要的最终用户。\n\
    2.  简单地将应用程序 URL 暴露给最终用户。\n3.  最终用户从你开发它的同一实例中运行应用程序。\n\n如果这些应用程序经常更改（但数据库对象的更改相对较少），请采用以下部署方法：\n\
    1.  导出应用程序。\n2.  使用新的应用程序 ID 将应用程序导入同一工作区/模式。\n\n对于大型组织，应采用独立于生产服务器的开发服务器（用于开发和测试你的应用程序）。在这种情况下，以下部署方法可能更合适：\n\
    1.  导出应用程序。\n2.  将应用程序导入不同的工作区（和/或模式）。\n\n如果你需要部署到完全独立的服务器（例如，在客户办公室部署），请采用以下部署方法：\n\
    1.  导出应用程序。\n2.  将应用程序导入目标 Oracle APEX 实例（使用不同的模式/数据库安装它）。\n\n#### 工作原理\n\n许多大型组织在开发服务器上进行开发，将他们的应用程序转移到预演或用户接受测试（UAT）服务器，并在系统获得用户批准后，再转移到生产服务器。这种类型的部署相当常见，并且有多种方法可以隔离或共享你的\
    \ APEX 实例、工作区和模式。一个常见的设置如[图 9-1](#Chapter09.html#fig_9_1)所示。\n\n![images](images/0901.jpg)\n\
    \n**图 9-1. 典型的部署策略**\n\n对于非常小的部署（和非关键系统），有时可以接受在同一实例和工作区中部署应用程序的开发版本和生产版本。这种方法的好处包括不必管理许多不同的工作区，并通过消除将应用程序交付给用户所需的任何部署来节省时间。\n\
    \n然而，对于其他所有情况，一个好的经验法则是开发实例和生产实例应该完全在不同的 APEX 实例上。由于开发实例通常用作测试平台，将实时生产系统放在同一个\
    \ APEX 实例中从来不是一个好主意。至少，你应该使用不同的工作区来分隔开发实例和生产实例，这样开发人员就不可能修改正在运行的实时应用程序。\n\n###\
    \ 9-2. 生成应用程序依赖项列表\n\n#### 问题\n\n你已准备好导出你的应用程序，但你的应用程序使用了跨多个模式的多种数据库对象，你不确定在导出中是否涵盖了你的应用程序所使用的所有底层数据库对象。"
  raw: '#### How It Works


    The cross site scripting (XSS) attack attempts to get client-side JavaScript code
    to run by injecting it into data entry fields. Such attacks may simply harbor
    mischievous intent (as outlined in this recipe''s example scenario) or can be
    downright dangerous; imagine an attack that redirects you to a replica of the
    original site requesting you to enter your password or personal details.


    The XSS attack is a rather simple type of attack that works due to the following
    weaknesses:


    *   No validation of input data at the data entry-end.

    *   No escaping of special characters during data display.


    To explain how the attack works, consider a form that lets you enter the name
    of a customer via a textbox. Ideally, the form would take in the data and save
    it in the database. When it needs to be displayed, the data is retrieved as-is
    and displayed via HTML (for instance, placed inside a table row of a table). The
    output result might look like [Listing 8-11](#Chapter08.html#list_8_11).


    ***Listing 8-11.** Usual Output*


    `<table>`

    `        <tr>        `

    `                <td width=''100%''>ACME CORP</td>`

    `        </tr>`

    `</table>`


    If you didn''t place any checks in your application and if a malicious user keyed
    in some JavaScript instead of `ACME CORP`, you would get the following (shown
    in [Listing 8-12](#Chapter08.html#list_8_12)) as the output result:


    ***Listing 8-12.** Output with Malicious Script*


    `<table>`

    `        <tr>        `

    `                <td width=''100%''>`

    `                        <script>window.location=''http://www.google.com'';</script>`

    `                </td>`

    `        </tr>`

    `</table>`


    The browser misinterprets the data as client-script code and executes the JavaScript.


    One way to prevent this from happening is by validating input data during data
    entry (for instance, rejecting data with tags such as `<script>` in its content).
    One downside of this approach is that if you really needed to key in some data
    containing such a tag, it would not be possible.


    ![images](images/square.jpg) **Tip** One application that might need to take in
    data containing HTML tags is an online developer forum. Users usually share their
    code for other developers to view, and it wouldn''t be uncommon for them to paste
    examples of their code into these data fields. It would not make much sense in
    this case for the application to reject data with HTML tags.


    The preferred way is to escape special characters, not during data entry but during
    data display. APEX provides an easy way to do this, which is to change the Display
    Type property of the report column, as you saw earlier in this recipe.


    ![images](images/square.jpg) **Note** Happily, with the latest release of APEX,
    all report columns are set to escape special characters by default, so if you
    create a report, it will be protected from cross-site scripting attacks automatically.
    By further coupling this with frequent usage of bind variables instead of substitution
    strings, you can keep common web and database attacks at bay.


    ## C H A P T E R  9


    ## Deploying the Application


    The last mile in getting your application into the hands of your intended audience
    is the deployment process. In traditional programming, a programmer would typically
    compile an application into an executable file and then package it into an automated
    installer for distribution.


    In the world of APEX, your entire application sits inside the database. Deployment
    is therefore just a matter of copying all the database objects and dependencies
    from one database instance to another. Having said that, it is still important
    to make sure you copy the right objects, lest you accidentally leave out a table
    or resource that is crucial to the correct functioning of your application. The
    last thing your users want is to painstakingly track down missing files after
    deploying an application that doesn’t work.


    Obviously, a complete packaged application should contain all the resources necessary
    to run an application. A solid deployment strategy will help reduce the common
    “Oops, I left that out in the patch” problem inherent in rushed deliverables.
    As you will see in this chapter, APEX provides a few ways to package an application
    (or a part of it). You will learn the basics of application deployment and the
    pitfalls to avoid along the way.


    ### 9-1. Deciding on a Deployment Approach


    #### Problem


    You''ve spent a lot of time creating the perfect application in your workspace.
    Now you need to deploy it, but you need to know which objects from your application
    or workspace to include in the deployment package.


    #### Solution


    For smaller organizations where convenience and speed of deployment is favored
    over security (and if you want the quickest and simplest deployment method possible),
    adopt the following deployment approach:


    1.  Create the necessary end users for the application.

    2.  Simply expose the application URL to the end users.

    3.  The end users run the application from the same instance in which you developed
    it.


    If these applications frequently change (but with relatively little changes to
    the database objects), adopt the following deployment approach:


    1.  Export the application.

    2.  Import the application into the same workspace/schema using a new application
    ID.


    For larger organizations, a development server (for development and testing or
    your applications) that is separate from the production server should be adopted.
    In this case, the following deployment approach may be more suitable:


    1.  Export the application.

    2.  Import the application into a different workspace (and/or schema).


    If you need to deploy to an entirely separate server (for example, deploying at
    your customer''s office), adopt the following deployment approach:


    1.  Export the application.

    2.  Import the application into the target Oracle APEX instance (install it using
    a different schema/database).


    #### How It Works


    Many large organizations develop on a development server, move their applications
    over to a staging or User Acceptance Testing (UAT) server, and after the system
    has been approved by the users, to the production server. This type of deployment
    is quite common, and there are numerous ways to segregate or share your APEX instances,
    workspaces, and schema. A common setup is shown in [Figure 9-1](#Chapter09.html#fig_9_1).


    ![images](images/0901.jpg)


    ***Figure 9-1.** A typical deployment strategy*


    For very small deployments (and non-critical systems), it is sometimes acceptable
    to deploy the development and production version of your application in the same
    instance and workspace. The benefits of this approach include not having to manage
    many different workspaces and saving time by eliminating any deployment needed
    to get the application to its users.


    For everything else, however, a good rule of thumb is that the development instances
    and production instances should be on different APEX instances entirely. Since
    development instances are usually used as testbeds, it is never a good idea to
    put a live production system in the same APEX instance. At the very least, you
    should separate the development instance and production instance using different
    workspaces so that it’s not possible for developers to modify a live and running
    application.


    ### 9-2. Generating a List of Application Dependencies


    #### Problem


    You are prepared to export your application, but your application uses a wide
    array of database objects across multiple schemas, and you are unsure if you have
    covered the full list of underlying database objects used by your application
    in the export.'
