  trans: "\n## 从您的表单调用 Web 服务\n\n要在您的表单中使用 Web 服务引用，请遵循以下步骤：\n\n1.  在页面定义 `images/U001.jpg`\
    \ 的“页面处理”区域中，右键单击“提交后”下的 `Processes`（过程），然后单击“创建”按钮。\n2.  选择“Web 服务”过程类型。在下一个页面中，为过程指定一个名称。在随后的页面中，在“Web\
    \ 服务引用”字段中选择 `CurrencyConverter` Web 服务。此时会立即出现另一个“操作”字段。选择 `ConversionRate` 操作。这将依次显示该\
    \ Web 服务方法的输入参数和输出参数列表。\n3.  对于“Web 服务输入参数”部分中的 `From Currency`（来源货币）参数，使用文本字段右侧的小箭头按钮从弹出列表中选择\
    \ `P1_FROMCODE` 字段。为 `To Currency`（目标货币）字段选择 `P1_TOCODE`。确保这两个参数的“来源”均设置为“项”。\n\
    4.  对于“Web 服务输出参数”部分，选择将结果存储在 `Items`（项）中。在 `ConversionRateResult`（汇率转换结果）参数的“值”字段中指定\
    \ `P1_RETURNEDRATE`。完成配置后，您应该看到类似于 图 3-22 中的截图所示的内容。\n\n    ![images](img/0322.jpg)\n\
    \n    图 3-22. 指定 Web 服务详细信息\n\n5.  在向导的下一页中，您可以分别指定 Web 服务调用成功或失败时显示的成功消息和错误消息。继续到向导的下一步，在此您可以选择在单击表单上的“获取汇率”按钮时调用\
    \ Web 服务。在“当按钮被按下时”字段中选择 `P1_GETCURRENCYRATE`（如 图 3-23 所示）。\n\n    ![images](img/0323.jpg)\n\
    \n    图 3-23. 将 Web 服务执行挂接到“获取汇率”按钮\n\n6.  最后，单击“创建过程”按钮以完成向导。现在运行您的表单。在 `FromCode`\
    \ 和 `ToCode` 字段中指定三位字母的货币代码，然后单击“获取汇率”按钮。您应该能够在 `ReturnedRate`（返回汇率）字段中看到返回的货币汇率（如\
    \ 图 3-24 所示）。\n\n    ![images](img/0324.jpg)\n\n    图 3-24. 实际运行中的 Web 服务调用\n\n\
    ![images](img/square.jpg) **注意** 由于本例中使用的 Web 服务托管在网上，您需要确保托管 APEX 实例的服务器具有到互联网的活动连接，此示例才能工作。\n\
    \n### 工作原理\n\n“Web 服务引用”部分提供了一个全局共享区域，允许您定义 Web 服务数据源。将 Web 服务引用集中在一处，而不是在整个应用程序中硬编码它们，可以在\
    \ Web 服务的 URL 或地址发生变更时，使您的应用程序更易于维护。\n\nWeb 服务可以在表单执行过程中的任何时刻被调用——当表单加载时、当按钮被点击时，或者当满足特定条件时。APEX\
    \ 还支持两种不同类型的 Web 服务：RESTful Web 服务和基于 WSDL 的 Web 服务。\n\n## 3-8. 保存页面时运行 PL/SQL\
    \ 过程\n\n### 问题\n\n提交表单后，您希望将通过表单输入的一些数据保存到另一个单独的表中。例如，您有一个“患者出院”表单。当您在此表单中创建一条记录时，需要在“支付历史”表单中创建一个对应的条目。\n\
    \n### 解决方案\n\n要在保存页面时运行 PL/SQL 过程，请遵循以下步骤：\n\n1.  在配方 3-1 中创建示例表。\n2.  基于 `PATIENTDISCHARGE`\
    \ 表创建一个新的数据库应用程序/标准数据录入表单。\n3.  在“患者出院”表单的页面定义 `images/U001.jpg` “页面处理”区域中，右键单击“处理”节点下的\
    \ `Processes`（过程）节点，并选择“创建”菜单项。\n4.  在向导的第一步中，选择 `PL/SQL` 项。\n5.  在向导的下一页中指定过程的名称，并为“点”字段选择“提交后\
    \ - 计算和验证之后”。\n6.  在下一页中，指定 清单 3-11 中所示的 PL/SQL。您现在应该看到如 图 3-25 所示的屏幕。\n\n   \
    \ 清单 3-11. 向另一个表插入数据\n\n    ```sql\n    INSERT INTO PAYMENTHISTORY(SOCIALSECURITYNO,AMOUNTPAID)\
    \ VALUES (:P1_PATIENTSOCIALSECURITYNO,0)\n    ```\n\n    ![images](img/0325.jpg)\n\
    \n    图 3-25. 指定过程详细信息\n\n7.  保存您的更改并立即运行表单。在“社会安全号码”字段中键入 99999999 并创建记录。使用对象浏览器，打开\
    \ `PAYMENTHISTORY` 表。您应该能够看到此表中自动创建了一条社会安全号码为 99999999 的新记录。\n\n### 工作原理\n\n过程是一种服务器端任务，当表单中发生某个事件时执行。通过向导可以生成多种不同类型的过程（例如，运行\
    \ PL/SQL 脚本、发送电子邮件或调用 Web 服务）。您甚至可以创建过程来动态修改应用程序中的会话状态。通过向导，过程还可以绑定到表单上的按钮项，以便当表单上的按钮被点击时，过程会立即执行。\n\
    \n![images](img/square.jpg) **提示** 过程也可以由客户端 JavaScript 事件启动。通过检查回发参数，可以执行不同的服务器端过程。\n\
    \n## 3-9. 从表单发送电子邮件\n\n### 问题\n\n您需要在单击表单上的按钮时发送电子邮件。您还想使用通过表单输入的数据作为电子邮件中的各种参数。\n"
- fmt: "# CHAPTER 4: Customizing Look and Feel\n\nCustomizing application look and\
    \ feel is one of the most important aspects of solution delivery. It is the process\
    \ that defines how your application is presented to the end user. APEX is extremely\
    \ flexible in this area, letting you customize not just the color schemes, headers\
    \ and footers of a page, but even the attributes for the controls it uses on your\
    \ form.\n\nHalf of the time, users like yourself don't just create standalone\
    \ web applications for an intranet environment. I know many developers that use\
    \ APEX because they needed an easier way to integrate forms into their public-facing\
    \ web site. Think about the \"Apply for a job\" section of a public web site,\
    \ for instance. When visitors click on the link, they shouldn't feel like they're\
    \ being redirected to an entirely new portal. The \"Apply for a job\" form should\
    \ look and feel no different from any other page on the site. To achieve that\
    \ purpose, the developer needs to make the form's color scheme, header, and footer\
    \ conform to the rest of the web site.\n\nAPEX provides the facilities for you\
    \ to change every aspect of the user interface in your applications. You will\
    \ take a look at the basics of doing so in this chapter.\n\n## 4-1. Adding an\
    \ Image Header to Your Form\n\n### Problem\n\nYou need to add an image in the\
    \ header area of your form.\n\n### Solution\n\nTo add an image to the header area\
    \ of your form, follow these steps:\n\n1.  Click on an existing application in\
    \ the Application Builder.\n2.  Click the Shared Components icon. In the ensuing\
    \ page, click the `Images` link under the `Files` section, as shown in [Figure\
    \ 4-1](#Chapter04.html#fig_4_1).\n\n    ![images](images/0401.jpg)\n\n    **Figure\
    \ 4-1.** The Images link in the Files section\n\n3.  In the ensuing page, click\
    \ the yellow Create button in the top right corner. Choose your application from\
    \ the list, and browse for a banner image (GIF, JPG or PNG file) to upload. When\
    \ you're done, click the `Upload` button.\n4.  You should now see your image in\
    \ the application, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).\n\n    ![images](images/0402.jpg)\n\
    \n    **Figure 4-2.** The Testsample.gif image\n\n5.  Now, navigate to an existing\
    \ form in the application and click on it to view its `Page Definition`.\n6. \
    \ In the `Shared Components` area of the form, expand the `Templates` node, followed\
    \ by the `Region` node, right-click on the `Form Region` node, and choose the\
    \ `Edit` menu item (as shown in [Figure 4-3](#Chapter04.html#fig_4_3)).\n\n  \
    \  ![images](images/0403.jpg)\n\n    **Figure 4-3.** Navigating to the Form Region\
    \ template definition page\n\n7.  In the ensuing page, click the Definition tab.\
    \ Add the following HTML tag above the DIV tag in the template box: `<img border=\"\
    0\" src=\"#APP_IMAGES#Testsample.gif\">`\n8.  You should now have the screen shown\
    \ in [Figure 4-4](#Chapter04.html#fig_4_4).\n\n    ![images](images/0404.jpg)\n\
    \n    **Figure 4-4.** Including the Testsample.gif image in the template\n\n9.\
    \  Save your changes and run the form. You should now see your image at the top\
    \ of the form, as shown in [Figure 4-5](#Chapter04.html#fig_4_5).\n\n    ![images](images/0405.jpg)\n\
    \n    **Figure 4-5.** The new image header in your form\n\n![images](images/square.jpg)\
    \ **Caution** Image names are case-sensitive! If you don't use the correct case,\
    \ your image may not show up at all.\n\n## Solution (for previous recipe context)\n\
    \nTo test the solution in this recipe, you will first need to create the sample\
    \ database and form objects. Then you will need to invoke the Send Email process\
    \ from your form. Let's start by creating the sample objects used in this recipe.\n\
    \n### Creating the Sample Object\n\nTo create the sample objects used in this\
    \ recipe, follow these steps:\n\n1.  Create the table shown in [Listing 3-12](#Chapter03.html#list_3_12),\
    \ and create a new database application/data entry form over the table.\n\n  \
    \  **Listing 3-12.** The PatientDB Table\n\n    ```sql\n    CREATE table \"PATIENTDB\"\
    \ (\n        \"PATIENTNAME\"      NVARCHAR2(255),\n        \"PATIENTEMAIL\"  \
    \   NVARCHAR2(255),\n        \"PATIENTDIAGNOSIS\" NVARCHAR2(2000),\n        \"\
    PATIENTID\"        NVARCHAR2(10),\n        constraint  \"PATIENTDB_PK\" primary\
    \ key (\"PATIENTID\")\n    )\n    /\n\n    CREATE sequence \"PATIENTDB_SEQ\"\n\
    \    /\n\n    CREATE trigger \"BI_PATIENTDB\"\n      before insert on \"PATIENTDB\"\
    \n      for each row\n    begin\n      if :NEW.\"PATIENTID\" is null then\n  \
    \      select \"PATIENTDB_SEQ\".nextval into :NEW.\"PATIENTID\" from dual;\n \
    \     end if;\n    end;\n    /\n    ```\n\n### Sending the E-mail\n\nTo invoke\
    \ the Send E-mail process from your form, follow these steps:\n\n1.  In the Page\
    \ Definition ![images](images/U001.jpg) Page Rendering section of the `PatientDB`\
    \ form, add a new button item named Send E-mail. Change the button type to a HTML\
    \ button, and set the label of the button to Send Email.\n2.  In the Page Definition\
    \ ![images](images/U001.jpg) Page Processing section of the `PatientDB` form,\
    \ right click on Processes under the Processing node, and choose to create a new\
    \ process.\n3.  In the first page of the wizard, choose the Send E-mail process.\
    \ Next, specify a name for the process. In the next page, specify the contents\
    \ and recipient of the e-mail. You can use the substitution syntax (for example,\
    \ `&P1_PATIENTNAME`) to insert data from your form into the e-mail. The figure\
    \ shown in [Figure 3-26](#Chapter03.html#fig_3_26) shows the configuration for\
    \ a typical e-mail that uses the patient's e-mail address and name entered through\
    \ the form.\n\n    ![images](images/0326.jpg)\n\n    **Figure 3-26.** Specifying\
    \ the details of the e-mail\n\n4.  In the next page, specify the success or failure\
    \ message to display. In the following page of the wizard, specify the `P1_SENDEMAIL`\
    \ field in the When Button Pressed field.\n5.  Save the changes and run the form.\
    \ Specify a functioning e-mail address in the Patient e-mail field. Click the\
    \ Send Email button. An e-mail should be sent to the address you've specified.\n\
    \n## How It Works\n\nSending an e-mail is also a server-side process. Outbound\
    \ e-mails are not sent out immediately (unless you specified to do so in the Process\
    \ configuration wizard), but are queued until a `DBMS_JOB` job dequeues it and\
    \ sends it out."
