    \n5.  此时应该会提示你下载导出的页面（一个 `.sql` 文件）。\n\n## 工作原理\n\n当你不希望导出应用程序的其他部分时，导出单个页面非常有用。导出单个页面的其他优点包括：\n\
    \n*   减小导出应用程序的大小（以保持 `.sql` 文件的大小便于通过互联网传输）。\n*   通过仅将导入本地化到一两个页面文件，减少对生产服务器的影响。\n\
    *   是将错误修复或更新上传到生产或 `UAT` 服务器的便捷方式。\n*   作为将单个页面从开发服务器导出到生产服务器的一种手段。\n\n因此，如果你只更改了一个或几个页面，你可以通过仅移动已更改的页面来最小化对生产环境的影响。\n\
    \n### 9-7. 导入单个页面\n\n## 解决方案\n\n你已经按照 Recipe 9-6 的说明导出了一个页面。现在需要将该页面导入到目标应用程序中。\n\
    \n要将单个页面导入到你的应用程序中，请遵循以下步骤：\n\n1.  打开你希望导入页面的目标应用程序。\n2.  单击页面顶部的 `Export/Import`\
    \ 图标。\n3.  当提示时选择 `Import` 选项。\n4.  在下一页中，浏览找到你之前导出的页面。对于“文件类型”选项，选择“数据库应用程序、页面或组件导出”选项，如图\
    \ 9-19 所示。\n\n    ![images](img/0919.jpg)\n\n    **图 9-19.** 导入页面\n\n5.  单击 `Next`\
    \ 按钮继续。你将看到如图 9-20 所示的页面安装确认步骤。单击 `Install Page` 按钮继续。\n\n    ![images](img/0920.jpg)\n\
    \n    **图 9-20.** 安装页面确认步骤\n\n6.  因为你正在部署现有页面的更新版本，向导会提示你覆盖该页面，如图 9-21 所示。\n\n\
    \    ![images](img/0921.jpg)\n\n    **图 9-21.** 替换页面确认\n\n7.  页面成功替换后，你将看到如图 9-22\
    \ 所示的屏幕。你的页面已成功部署。\n\n    ![images](img/0922.jpg)\n\n    **图 9-22.** 页面已安装消息\n\
    \n## 工作原理\n\n你也可以使用本配方中描述的方法，轻松地将页面文件导入到同一个应用程序或另一个 `APEX` 实例上的其他应用程序中。事实上，大多数其他应用程序资源（如主题文件、图像文件、共享对象等）都可以以相同的方式导出和导入。\n\
    \n### 9-8. 发布应用程序 URL\n\n## 解决方案\n\n部署应用程序后，你需要发布应用程序 `URL`，以便最终用户可以访问它，但你不知道它是什么。你需要定位应用程序\
    \ `URL`。\n\n要发现应用程序 `URL`，请按照以下说明操作：\n\n1.  打开一个现有应用程序。\n2.  将鼠标悬停在“运行应用程序”图标上，右键单击它，然后选择查看该图标的快捷方式/链接，如图\
    \ 9-23 所示。\n\n    ![images](img/0923.jpg)\n\n    **图 9-23.** 访问应用程序的 `URL`\n\n\
    \    ![images](img/square.jpg) **提示** 在 `Microsoft Internet Explorer` 中，右键单击图标并选择“复制快捷方式”菜单项。对于其他浏览器，查找允许你检查链接完整\
    \ `URL` 的等效菜单项。\n\n3.  如果你将应用程序的链接粘贴到某处（例如，在文本文件中），你将看到应用程序的完整链接类似于这样：`http://localhost:8080/apex/f?p=103:1:1121291168995976:::::`\n\
    4.  你可以在任何浏览器中粘贴此链接以直接访问应用程序的登录页面。\n\n## 工作原理\n\n以下 `URL` 实际上由几个部分组成。让我们详细剖析每个部分以了解它们的含义。表\
    \ 9-1 详细描述了该 `URL`。\n\n`http://localhost:8080/apex/f?p=103:1:1121291168995976:::::`\n\
    \n**表 9-1.** `APEX` 应用程序 `URL` 详解\n\n| **组件** | **描述** |\n| --- | --- |\n| `http://localhost:8080`\
    \ | `localhost` 指的是托管 `APEX` 实例的服务器名称，`8080` 是 `APEX` 服务正在监听的端口号。 |\n| `Apex`\
    \ | 这是数据库访问描述符 (`DAD`) 的名称。此部分描述了 `Oracle HTTP` 服务器如何连接到数据库服务器以满足 `HTTP` 请求。 |\n\
    | `f?p=` | 这是 `APEX` 使用的特殊前缀，用于指示后续数据。 |\n| `103` | 这是被访问应用程序的 `ID`。 |\n| `1`\
    \ | 这是被访问应用程序中的页面编号。 |\n| 1121291168995976 | 这是标识当前会话的 `ID`。值得注意的是，这个值不需要成为暴露给最终用户的\
    \ `URL` 的一部分，因为它是由 `APEX` 为每个会话生成的。因此，向最终用户发布以下 `URL` 就足够了：`http://localhost:8080/apex/f?p=103:1::::::`\
    \ |\n\n# 第 10 章\n"
- fmt: "## A Mini Book Catalog Site\n\nIn this last chapter you will explore a real-life\
    \ scenario of an online book catalog and how to apply APEX to create it in a matter\
    \ of hours. Think of this catalog as the bare beginnings of a bookstore—you aren't\
    \ even going to implement anything like shopping-cart functionality but you will\
    \ use the various APEX techniques and features you learned throughout the earlier\
    \ chapters in the book.\n\nBefore you create the online book catalog, let's define\
    \ the scope of what you want to build. The application will be divided into two\
    \ main areas—the Administration part of the web site (where the user can manage\
    \ the list of available books) and the front end (which is the actual book catalog\
    \ visible to the public).\n\nIn addition, you'll create a chart report to let\
    \ the storekeeper view the current stockcount of all books in the store. Last\
    \ of all, you'll pull all these separate pages together by providing a proper\
    \ navigation scheme for your application using navigation lists and tabs.\n\n\
    ### 10-1. Setting Up the Main Objects for Your Book Catalog\n\n#### Problem\n\n\
    You need to set up the underlying database tables and sample records (books) required\
    \ for the book catalog.\n\n#### Solution\n\nTo set up the book catalog tables,\
    \ follow these steps. (Note that you can find the code in the in the example download\
    \ for this book—you don't need to type it in manually.)\n\n1.  Create the main\
    \ `Books` table as follows, together with the sample data:\n    ```sql\n    CREATE\
    \ TABLE \"BOOKS\"\n       (    \"BOOKID\" NVARCHAR2(255),\n            \"BOOKTITLE\"\
    \ NVARCHAR2(255),\n            \"BOOKISBN\" NVARCHAR2(255),\n            \"BOOKPUBLISHER\"\
    \ NVARCHAR2(255),\n            \"BOOKEDITION\" NVARCHAR2(255),\n            \"\
    BOOKCATEGORY\" NVARCHAR2(255),\n            \"BOOKDESCRIPTION\" NVARCHAR2(255),\n\
    \            \"BOOKPRICE\" FLOAT(9),\n            \"AUTHOR\" NVARCHAR2(255),\n\
    \            \"BOOKIMAGE\" BLOB,\n    CONSTRAINT \"BOOKS_PK\" PRIMARY KEY (\"\
    BOOKID\") ENABLE\n       )\n    /\n    ```\n    ```sql\n    INSERT INTO BOOKS(BOOKID,\
    \ BOOKTITLE, BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION,\
    \ BOOKPRICE, AUTHOR) VALUES('B1','PRO ODP.NET\n        PROGRAMMING','9781430228202','APRESS\
    \ PUBLISHING','2010','C3','This book is a comprehensive and\n        easy-to-understand\
    \ guide for using the Oracle Data Provider (ODP) version 11g on the .NET\n   \
    \     Framework',59.99,'ED ZEHOO')\n    /\n    ```\n    ```sql\n    INSERT INTO\
    \ BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n\
    \        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B2','IPHONE PROGRAMMING','9781430228400','WROX\n\
    \        PUBLISHING','2011','C3','This book describes the basics of iPhone and\
    \ iPad development using\n        Objective C',49.99,'GREG YAP')\n    /\n    ```\n\
    \    ```sql\n    INSERT INTO BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER,\
    \ BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B3','HOW\
    \ MASTER CHIEF BECAME MASTER\n        CHEF','1123433328400','TOR BOOKS','2010','C2','Master\
    \ Chief goes on a vacation in China. Read\n        about his exploits in this\
    \ book!',39.99,'JAMES BURKE')\n    /\n    ```\n    ```sql\n    INSERT INTO BOOKS(BOOKID,\
    \ BOOKTITLE, BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION,\
    \ BOOKPRICE, AUTHOR) VALUES('B4','THE CURSE OF AMMATTAR','9781430228400','TOR\n\
    \        BOOKS','2011','C4','Classic horror story set in medieval Thailand',29.99,'SARAH\
    \ HAWKINS')\n    /\n    ```\n    ```sql\n    INSERT INTO BOOKS(BOOKID, BOOKTITLE,\
    \ BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION,\
    \ BOOKPRICE, AUTHOR) VALUES('B5','CHING CHONG: THE RISE AND FALL OF\n        JACKSON','343322221400','NIECA\
    \ BOOKS','2011','C1','A story about the misfortunes of Jackson\n        Junior\
    \ as he travels across Asia',12.99,'TARA WILLIAMS')\n    /\n    ```\n    ```sql\n\
    \    INSERT INTO BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER, BOOKEDITION,\
    \ BOOKCATEGORY,\n        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B6','UNFORTUNATE\n\
    \        CIRCUMSTANCES','115062221400','PARAMOUNT BOOKS','2011','C1','Read about\
    \ the unfortunate\n        circumstances of Ali, someone you will absolutely not\
    \ care about',19.99,'DANA T. ROLLS')\n    /\n    ```\n    ```sql\n    INSERT INTO\
    \ BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER, BOOKEDITION, BOOKCATEGORY,\n\
    \        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B7','SCARY LIONS','11553221400','PARAMOUNT\n\
    \        BOOKS','2011','C1','A book about the greasy politicians in Mootawambaland\
    \ and how Alex becomes\n        one of them',15.99,'TERRY BARRACK')\n    /\n \
    \   ```\n    ```sql\n    INSERT INTO BOOKS(BOOKID, BOOKTITLE, BOOKISBN, BOOKPUBLISHER,\
    \ BOOKEDITION, BOOKCATEGORY,\n        BOOKDESCRIPTION, BOOKPRICE, AUTHOR) VALUES('B8','THE\
    \ LIME TREE','22113221400','ZACK\n        PUBLISHING','2011','C1','A book about\
    \ how Sally became a top salesperson when she decides to\n        sell lime as\
    \ lemon',16.99,'JAMES LEE')\n    /\n    ```\n\n2.  Create the `Inventory` table\
    \ as follows:\n    ```sql\n    CREATE TABLE  \"INVENTORY\"\n       (    \"ID\"\
    \ NVARCHAR2(255),\n            \"BOOKID\" NVARCHAR2(255),\n            \"COPIESINSTOCK\"\
    \ NUMBER(9,3),\n             CONSTRAINT \"INVENTORY_PK\" PRIMARY KEY (\"ID\")\
    \ ENABLE\n       )\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('1','B1',10)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('2','B2',15)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('3','B3',1)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('4','B4',6)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('5','B5',17)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('6','B6',9)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('7','B7',14)\n    /\n    ```\n    ```sql\n    INSERT INTO INVENTORY(ID,BOOKID,COPIESINSTOCK)\
    \ VALUES('8','B8',9)\n    /\n    ```\n\n3.  Create the `Category` table as follows:\n\
    \    ```sql\n    CREATE TABLE  \"CATEGORY\"\n       (    \"CATEGORYID\" NVARCHAR2(255),\n\
    \            \"CATEGORYNAME\" NVARCHAR2(255),\n            \"DESCRIPTION\" NVARCHAR2(255),\n\
    \             CONSTRAINT \"CATEGORY_PK\" PRIMARY KEY (\"CATEGORYID\") ENABLE\n\
    \       )\n    /\n    ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME,\
    \ DESCRIPTION) VALUES('C1','FICTION','Fiction\n        selection')\n    /\n  \
    \  ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION)\n\
    \        VALUES('C2','SCIENCEFICTION','Science Fiction Selection')\n    /\n  \
    \  ```\n    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION)\
    \ VALUES('C3','COMPUTERS','Computer\n        Books Selection')\n    /\n    ```\n\
    \    ```sql\n    INSERT INTO CATEGORY(CATEGORYID, CATEGORYNAME, DESCRIPTION) VALUES('C4','HORROR','Best\
    \ Horror\n        Selections')\n    /\n    ```\n\n#### How It Works\n\nThe `Books`\
    \ table is the main table that stores the list of books in the book catalog; the\
    \ `Inventory` table stores the stockcount of each available book; and the `Category`\
    \ table stores the full list of book categories (genres) available in the catalog.\
    \ Table 10-1 describes the mapping between the various keys in each respective\
    \ table.\n\n**Table 10-1.** Foreign Key Mapping Between Different Tables in the\
    \ Book Catalog Application\n\n| **Foreign key mapping** | **Description** |\n\
    | --- | --- |\n| `Books.BookID = Inventory.BookID` | Each book has a corresponding\
    \ entry in the Inventory table that stores the stockcount details for the book.\
    \ |\n| `Books.BookCategory = Category.CategoryID` | Each book belongs to a genre/category,\
    \ the details of which are stored in the Category table. The ID stored in the\
    \ `Books.BookCategory` column looks up the corresponding entry in the `Category`\
    \ table. |\n\n### 10-2. Creating the Pages to Manage the List of Books\n\n####\
    \ Problem\n\nThe storekeeper needs a way to manage the list of books in his book\
    \ catalog."
