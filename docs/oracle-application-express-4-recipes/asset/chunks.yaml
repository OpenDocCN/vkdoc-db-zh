  trans: "\n## 解决方案\n\n要为表单添加客户端验证，请按照以下步骤操作：\n\n1.  创建如清单 3-6 所示的表，并基于该表创建一个数据库应用/数据录入表单。\n\
    \n    **清单 3-6.** 示例薪资表\n\n    ```sql\n    CREATE table \"SALARIES\" (\n     \
    \   \"PAYROLLID\"    NVARCHAR2(255),\n        \"EMPLOYEENAME\" NVARCHAR2(255),\n\
    \        \"SALARY\"       NUMBER(6,2),\n        constraint  \"SALARIES_PK\" primary\
    \ key (\"PAYROLLID\")\n    )\n    /\n\n    CREATE sequence \"SALARIES_SEQ\"\n\
    \    /\n\n    CREATE trigger \"BI_SALARIES\"\n      before insert on \"SALARIES\"\
    \n      for each row\n    begin\n      if :NEW.\"PAYROLLID\" is null then\n  \
    \      select \"SALARIES_SEQ\".nextval into :NEW.\"PAYROLLID\" from dual;\n  \
    \    end if;\n    end;\n    /\n    ```\n\n2.  导航到表单“页面定义”区域的“页面呈现”部分。\n3.  右键单击根节点（你的数据录入表单），并选择“编辑”子菜单项。\n\
    4.  在下一页中，导航到“HTML 头和主体属性”选项卡。在“HTML 头”字段中，输入如清单 3-7 所示的 JavaScript 代码。你应该会看到如图\
    \ 3-8 所示的屏幕。单击“应用更改”按钮。\n\n    **清单 3-7.** 验证 JavaScript\n\n    ```html\n    <script\
    \ type=\"text/javascript\">\n      function validSalary(object){\n        if(parseInt(object.value)>5000)\n\
    \       alert('Salary must be a figure below $5000');\n      }\n    </script>\n\
    \    ```\n    ![images](img/0308.jpg)\n\n    **图 3-8.** 指定 `validSalary` JavaScript\
    \ 函数\n\n5.  完成此操作后，再次导航到表单的“页面定义”区域。在“页面呈现”部分，在“薪资 ![images](img/U001.jpg) 区域\
    \ ![images](img/U001.jpg) 主体 (3) ![images](img/U001.jpg) 薪资 ![images](img/U001.jpg)\
    \ 项”菜单下，右键单击 `P1_SALARY` 表单项。在弹出菜单中单击“编辑”项。\n6.  导航到“元素”选项卡，并在“HTML 表单元素属性”字段中键入清单\
    \ 3-8 所示的代码（如图 3-9 所示）。\n\n    **清单 3-8.** 向薪资字段添加 JavaScript 事件处理程序\n\n    ```html\n\
    \    onblur=\"validSalary(this);\"\n    ```\n    ![images](img/0309.jpg)\n\n \
    \   **图 3-9.** 向 SOCIALSECURITYNO 字段添加验证\n\n7.  应用你的更改。现在运行表单。如果你在“薪资”字段中输入一个大于\
    \ 5000 的值，然后离开该字段，它将显示一个 JavaScript 弹出错误消息，如图 3-10 所示。\n\n![images](img/0310.jpg)\n\
    \n**图 3-10.** 运行中的客户端验证\n\n## 工作原理\n\nAPEX 中的客户端验证完全通过 JavaScript 实现，它非常有用，因为不会产生到服务器的额外往返。你通常在以下情况使用客户端验证：\n\
    \n*   检查缺失值。\n*   检查数值或日期值是否在特定范围内。\n*   检查特定值的长度是否超过最大字符数。\n\n表单的“HTML 头和主体属性”部分允许你插入\
    \ JavaScript 代码块，这些代码块在渲染特定页面时会被包含在内。你可以使用此部分插入一系列 JavaScript 函数，这些函数可以从表单中的任何项有选择地调用。\n\
    \n如你之前所见，“HTML 表单元素属性”字段允许你为表单上的每个页面项指定 JavaScript 事件处理程序。你可以从此区域调用在“HTML 头和主体属性”部分中定义的\
    \ JavaScript 函数。\n\n## 3-4. 动态更改下拉列表中的项列表\n\n## 问题\n\n你有一个下拉列表。当你更改此下拉列表中的值时，你希望另一个下拉列表中的值也随之更改。换句话说，你希望创建一个级联下拉列表。\n\
    \n例如，你有一个设备请求表单。提交请求时，你可以使用类别和子类别下拉列表来聚焦到特定设备。当你更改设备类别时，子类别列表会刷新，仅显示与该类别相关的设备。\n\
    \n## 解决方案\n\n要测试此配方中的解决方案，你首先需要设置一些示例数据库和表单对象。之后，你将在这两个下拉列表之间创建级联关系。让我们从示例对象开始。\n"
- fmt: "## Setting up the Sample Objects\n\nTo setup the sample objects used in this\
    \ recipe, follow these steps:\n\n1.  Create the tables shown in [Listing 3-9](#Chapter03.html#list_3_9).\n\
    \n    ***Listing 3-9.** Sample Equipment Request Tables*\n\n    ```\n    CREATE\
    \ table \"EQUIPMENTREQUEST\" (\n        \"REQUESTID\"   NVARCHAR2(10),\n        \"\
    CATEGORY\"    NVARCHAR2(255),\n        \"SUBCATEGORY\" NVARCHAR2(255),\n        constraint  \"\
    EQUIPMENTREQUEST_PK\" primary key (\"REQUESTID\")\n    )\n    /\n\n    CREATE\
    \ sequence \"EQUIPMENTREQUEST_SEQ\"\n    /\n\n    CREATE trigger \"BI_EQUIPMENTREQUEST\"\
    \n      before insert on \"EQUIPMENTREQUEST\"\n      for each row\n    begin  \n\
    \      if :NEW.\"REQUESTID\" is null then\n        select \"EQUIPMENTREQUEST_SEQ\"\
    .nextval into :NEW.\"REQUESTID\" from dual;\n      end if;\n    end;\n    /\n\n\
    \    CREATE table \"CATEGORY\" (\n        \"CATEGORYNAME\" NVARCHAR2(255),\n \
    \       \"CATEGORYID\"   NUMBER(6,2),\n        constraint  \"CATEGORY_PK\" primary\
    \ key (\"CATEGORYID\")\n    )\n    /\n\n    CREATE sequence \"CATEGORY_SEQ\"\n\
    \    /\n\n    CREATE trigger \"BI_CATEGORY\"\n      before insert on \"CATEGORY\"\
    \n      for each row\n    begin\n      if :NEW.\"CATEGORYID\" is null then\n \
    \       select \"CATEGORY_SEQ\".nextval into :NEW.\"CATEGORYID\" from dual;\n\
    \      end if;\n    end;\n    /\n\n    CREATE table \"SUBCATEGORY\" (\n        \"\
    SUBCATEGORYNAME\"  NVARCHAR2(255),\n        \"PARENTCATEGORYID\" NUMBER(6,2),\n\
    \        \"SUBCATEGORYID\"    NUMBER(6,2),\n        constraint  \"SUBCATEGORY_PK\"\
    \ primary key (\"SUBCATEGORYID\")\n    )\n    /\n\n    CREATE sequence \"SUBCATEGORY_SEQ\"\
    \n    /\n\n    CREATE trigger \"BI_SUBCATEGORY\"\n      before insert on \"SUBCATEGORY\"\
    \n      for each row\n    begin\n      if :NEW.\"SUBCATEGORYID\" is null then\n\
    \        select \"SUBCATEGORY_SEQ\".nextval into :NEW.\"SUBCATEGORYID\" from dual;\n\
    \      end if;\n    end;\n    /\n    ```\n\n2.  Now create the sample data shown\
    \ in [Listing 3-10](#Chapter03.html#list_3_10). The `MODEM` and `NETWORK CARD`\
    \ subcategory items belong to the parent `HARDWARE` category, whereas the `LOTUS\
    \ NOTES` and `SHAREPOINT` subcategory items belong to the parent `SOFTWARE` category.\
    \ The foreign key in this case is the `PARENTCATEGORYID` column.\n\n    ***Listing\
    \ 3-10.** Creating Sample Data*\n\n    ```\n    INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
    \ VALUES(1,'SOFTWARE')\n    /\n    INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
    \ VALUES(2,'HARDWARE')\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('LOTUS NOTES',1,1)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('SHAREPOINT',1,2)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('NETWORK CARD',2,3)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('MODEM',2,4)\n    /\n    ```\n\n3.  Now create a database application/standard\
    \ entry form on top of the `EquipmentRequest` table. Go to the Page Definition\
    \ > Page Rendering view of the form, and change (edit) the `CATEGORY` field to\
    \ a `Select List`. Choose to create a dynamic LOV for the field, setting `CATEGORY`,\
    \ `CATEGORYNAME`, and `CATEGORYID` as the table name, display column, and return\
    \ value, respectively.\n\n    ![images](images/square.jpg) `Tip` Refer to Recipe\
    \ 2-4 to find out how to create a dynamic drop-down list.\n\n4.  Repeat the same\
    \ for the `SUBCATEGORY` field, using `SUBCATEGORY`, `SUBCATEGORYNAME`, and `SUBCATEGORYID`\
    \ instead as the table name, display column, and return value, respectively.\n\
    \n5.  Edit the `CATEGORY` field again, and under the Default tab, enter `1` as\
    \ the Default value. This will set the default selected value in the category\
    \ drop down to `SOFTWARE`.\n\n6.  Test your form. You should be able to see two\
    \ drop-down lists containing the data you entered earlier, but with no cascading\
    \ relationship between them at the moment, as shown in [Figure 3-11](#Chapter03.html#fig_3_11).\n\
    \n    ![images](images/0311.jpg)\n\n    ***Figure 3-11.** Drop-down lists without\
    \ cascading relationship*\n\n## Creating the Cascading Relationship\n\nTo create\
    \ a cascading relationship between the two drop-down lists, follow these steps:\n\
    \n1.  In the Page Definition > Page Rendering view, edit the `SUBCATEGORY` field.\
    \ Navigate to the List Of Values tab. Set the Cascading LOV Parent Item(s) field\
    \ to `P1_CATEGORY`.\n\n2.  In the List of Values definition area, add the filter\
    \ `WHERE PARENTCATEGORYID=:P1_CATEGORY` to the SQL. You should now have the screen\
    \ shown in [Figure 3-12](#Chapter03.html#fig_3_12).\n\n    ![images](images/0312.jpg)\n\
    \n    ***Figure 3-12.** Creating the cascading relationship*\n\n3.  Apply your\
    \ changes and run the form again. Note that when you change the selected category,\
    \ the subcategory drop-down list will only show the items relevant to that category\
    \ (see [Figure 3-13](#Chapter03.html#fig_3_13)).\n\n    ![images](images/0313.jpg)\n\
    \n    ***Figure 3-13.** The cascading relationship in action*\n\n### How It Works\n\
    \nYou can easily specify the List of Values (LOV) returned in a dynamic drop-down\
    \ list using PL/SQL in the List of Values tab of the `Select List` page item.\n\
    \nYou might also have noticed that you can reference form fields directly in your\
    \ PL/SQL code using the `:ItemName` syntax (a colon, followed by the name of the\
    \ page item). This allows you to create dynamic PL/SQL code that uses data keyed\
    \ in from the form on the fly for further processing.\n\n## 3-5. Disabling or\
    \ Hiding a Section of a Form Dynamically\n\n### Problem\n\nYou have a list of\
    \ fields on a standard form you wish to hide (set invisible) depending on what\
    \ was specified in another field. Taking the sample employee table in Recipe 3-2\
    \ as context, you might choose to hide the employee's Social Security number if\
    \ the employee type was keyed in as `LOCAL`.\n\n### Solution\n\nTo create a dynamic\
    \ action to hide a section of a form, follow the following steps:\n\n1.  Create\
    \ a database application/standard entry form from the `EMPLOYEE` table from Recipe\
    \ 3-2.\n2.  Create a standard entry form from the `EMPLOYEE` table.\n3.  Navigate\
    \ to the `Page Definition` area of the form. Right click on the `P1_EMPLOYEETYPE`\
    \ field and choose the Create Dynamic Action menu item.\n4.  In the first page\
    \ of the wizard, choose the Standard dynamic action type. Next, assign a name\
    \ to your dynamic action.\n5.  In the next page of the wizard, specify `LOCAL`\
    \ in the Value field (as shown in [Figure 3-14](#Chapter03.html#fig_3_14)).\n\n\
    \    ![images](images/0314.jpg)\n\n    ***Figure 3-14.** Configuring the dynamic\
    \ action*\n\n6.  In the next page of the wizard, specify the Hide option. Ensure\
    \ that the Create Opposite Action checkbox is ticked.\n7.  Next, you will be requested\
    \ to select the fields you want to hide. Select `item(s)` from the Selection Type\
    \ field, and add `P1_SOCIALSECURITYNO` to the box on the right (as shown in [Figure\
    \ 3-15](#Chapter03.html#fig_3_15)).\n\n    ![images](images/0315.jpg)\n\n    ***Figure\
    \ 3-15.** Specifying the target of the dynamic action*\n\n8.  Click the Create\
    \ button. Now, run your form. Type `LOCAL` into the Employee Type field. Once\
    \ you have done that, navigate away from the field. The Social Security Number\
    \ field immediately disappears from view (as shown in [Figure 3-16](#Chapter03.html#fig_3_16)).\
    \ If you type anything other than `LOCAL` in the employee type field, the behavior\
    \ will not apply.\n\n    ![images](images/0316.jpg)\n\n    ***Figure 3-16.** Dynamic\
    \ action running in your form*"
