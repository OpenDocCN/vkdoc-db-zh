  trans: "\n# 步骤 4：翻译 XLIFF 文件\n\n要翻译 XLIFF 文件，请遵循以下步骤：\n\n1.  XLIFF 文件是一个便捷的小文件，包含了你的应用程序使用的所有文本、消息、标签和名称资源。\n\
    2.  你通常可以将 XLIFF 文件发送给现实中的翻译人员来翻译其内容。XLIFF 格式是一个开放标准，你可以找到许多 XLIFF 编辑器工具，允许你窥探文件内容并手动编辑。\n\
    3.  使用像写字板这样的文本编辑工具打开下载的 XLIFF 文件。\n4.  你应该能看到生成的 XML 及其多个翻译条目，如 图 6-20 所示。\n\n\
    \    ![images](img/0620.jpg)\n\n    **图 6-20.** 窥探 XLIFF 文件内容\n\n5.  每个翻译条目都具有\
    \ 清单 6-2 中所示的格式。`source` 字段代表原始未翻译文本，`target` 字段代表翻译后的文本。\n\n    **清单 6-2.** 翻译条目格式\n\
    \n    ```\n    <trans-unit id=\"XXXXX\">\n              <source>Custname</source>\n\
    \              <target>Custname</target>\n    </trans-unit>\n    ```\n6.  找到 `Custname`\
    \ 条目，并将其 `<target>` 条目更改为对应的冰岛语：`viðskiptavinur nafn`。将 `Custremarks` 的 `<target>`\
    \ 条目更改为 `viðskiptavinur athugasemd`，如 图 6-21 中高亮显示的部分。\n\n    ![images](img/square.jpg)\
    \ **注意** 可能会有多个 `Custname` 和 `Custremarks` 条目，特别是如果你在应用程序中为不同的对象使用了相同的名称。如果不确定应该编辑哪一个，请务必留意对象\
    \ ID（由 `<trans-unit>` 标签的 `ID` 属性指示）。这些标识符映射到应用程序中的实际对象 id。\n\n    ![images](img/0621.jpg)\n\
    \n    **图 6-21.** 手动翻译\n\n7.  保存你所做的更改。\n\n# 步骤 5：导入翻译后的 XLIFF 文件\n\n要将翻译后的 XLIFF\
    \ 文件重新导入 APEX，请遵循以下步骤：\n\n1.  返回主翻译页面。点击 图 6-22 中显示的第五个链接，“应用 XLIFF 翻译文件到翻译存储库”。\n\
    \n    ![images](img/0622.jpg)\n\n    **图 6-22.** 导入翻译后的 XLIFF 文件\n\n2.  在随后出现的窗口中，点击\
    \ `Upload XLIFF` 按钮。将弹出一个向导，允许你上传翻译后的 XLIFF 文件。指定你想要的任何标题，并浏览到你电脑上的翻译后的 XLIFF\
    \ 文件。完成后点击 `Upload XLIFF file` 按钮，如 图 6-23 所示。\n\n    ![images](img/0623.jpg)\n\
    \n    **图 6-23.** 导入 XLIFF 文件\n\n3.  你应该在下一个窗口中看到你上传的 XLIFF 文件（见 图 6-24）。\n\n\
    \    ![images](img/0624.jpg)\n\n    **图 6-24.** 已上传的 XLIFF 文件\n\n# 步骤 6：发布翻译后的应用程序\n\
    \n要发布翻译后的应用程序，请遵循以下步骤：\n\n1.  返回主翻译页面。点击 图 6-25 中显示的最后一个链接，“发布翻译后的应用程序”。\n\n \
    \   ![images](img/0625.jpg)\n\n    **图 6-25.** 发布翻译后的应用程序\n\n2.  在随后的页面中，将 `Publish\
    \ Application Translation` 字段设置为冰岛语映射，并点击 图 6-26 中显示的 `Publish Application` 按钮。\n\
    \n    ![images](img/0626.jpg)\n\n    **图 6-26.** 发布应用程序翻译\n\n3.  你现在已成功创建了一个（或多或少）冰岛语版本的应用程序。\n\
    \n# 步骤 7：测试翻译后的应用程序\n\n要试用你翻译后的应用程序，请遵循以下步骤：\n\n1.  如果你记得，你将全球化属性设置为使用浏览器首选项设置中指定的语言。要试用你翻译后的应用程序，你现在需要将浏览器首选项设置为以冰岛语渲染页面。\n\
    \n    ![images](img/square.jpg) **注意** 此处显示的示例适用于 Microsoft Internet Explorer\
    \ 浏览器。其他浏览器的屏幕截图和步骤可能有所不同，因此请参阅你的浏览器关于语言首选项设置的文档。\n\n2.  打开 Internet Explorer\
    \ 并导航到“Internet 选项”窗口。在“常规”选项卡中，点击底部的“语言”按钮。向列表中添加一种新语言：冰岛语 [is]。调整其首选项顺序，使冰岛语成为最顶部的条目，如\
    \ 图 6-27 所示。\n\n    ![images](img/0627.jpg)\n\n    **图 6-27.** 更改浏览器语言首选项\n\n\
    3.  保存并应用所有更改。现在再次运行你的应用程序。你应该看到表单使用你指定的冰岛语字段标题呈现，如 图 6-28 所示。\n\n    ![images](img/0628.jpg)\n\
    \n    **图 6-28.** 冰岛语的客户页面\n\n## 工作原理\n\n要将应用程序翻译成另一种语言，你必须首先提取应用程序中使用的所有资源——即错误消息、标签、字段标题等——到一个\
    \ XML 文件中。该文件称为 XLIFF 文件。XLIFF 文件可以发送给现实中的翻译人员，每个条目都会被翻译。然后，生成的 XLIFF 文件被重新导入\
    \ APEX，APEX 将使用 XLIFF 文件中的翻译文本来生成一个新应用程序。\n\n本示例中仅翻译了 XLIFF 文件中的两个条目。如果你希望整个应用程序\
    \ 100% 使用冰岛语，你将需要翻译文件中的每一个条目，包括表单和报表名称、错误消息等。\n\n# 6-4. 存储和显示带时区信息的日期\n\n## 问题\n\
    \n你有一个需求，需要生成一份报告，列出世界各地不同时区发生的事件。此外，该报告将由来自不同国家和时区的用户查看。你需要根据访问用户的本地时区来显示日期和时间。\n"
- fmt: "### Solution\n\nYou will first need to create a table and some data for this\
    \ recipe. Run the SQL in [Listing 6-3](#Chapter06.html#list_6_3) to create an\
    \ `EVENTS` table and add a couple of events for testing purposes.\n\n**Listing\
    \ 6-3.** SQL to Create an `EVENTS` Table and Some Events\n\n```sql\nCREATE TABLE\
    \  \"EVENTS\"\n   (    \"EVENTLAUNCHDATE\" TIMESTAMP (6) WITH LOCAL TIME ZONE,\n\
    \        \"EVENTNAME\" NVARCHAR2(255),\n        \"EVENTID\" NVARCHAR2(50),\n \
    \       CONSTRAINT \"EVENTS_PK\" PRIMARY KEY (\"EVENTID\") ENABLE\n   )\n/\nINSERT\
    \ INTO EVENTS(EVENTID,EVENTLAUNCHDATE,EVENTNAME) VALUES(1,'22-APR-11 08:00:00\
    \ AM','GLOBAL SALES EVENT')\n/\nINSERT INTO EVENTS(EVENTID,EVENTLAUNCHDATE,EVENTNAME)\
    \ VALUES(2,'23-APR-11 04:00:00 PM','PROJECT KICKOFF MEETING')\n/\n```\n\nNext,\
    \ you will need to create the report to display the event information. Here are\
    \ the steps to follow:\n\n1.  Open an existing application.\n2.  Click the `Shared\
    \ Components` icon in the application page.\n3.  Click on the `Globalization Attributes`\
    \ link under the `Globalization` section, as shown in [Figure 6-29](#Chapter06.html#fig_6_29).\n\
    \n    ![images](images/0629.jpg)\n\n    **Figure 6-29.** Modifying Globalization\
    \ Attributes\n\n4.  In the ensuing page, change the `Automatic Time Zone` field\
    \ from `No` to `Yes`, as shown in [Figure 6-30](#Chapter06.html#fig_6_30).\n\n\
    \    ![images](images/0630.jpg)\n\n    **Figure 6-30.** Enabling the automatic\
    \ time zone feature\n\n5.  Save your changes. Now create a new report in the application.\
    \ For the SQL Query for the report, specify the following SQL: `SELECT * FROM\
    \ Events`\n6.  Complete the wizard to create the report. After doing so, edit\
    \ the report definition, and choose to edit the `EVENTLAUNCHDATE` column of the\
    \ report, as shown in [Figure 6-31](#Chapter06.html#fig_6_31).\n\n    ![images](images/0631.jpg)\n\
    \n    **Figure 6-31.** Modifying the Event launch date column\n\n7.  Change the\
    \ date/time format field to the following: `DD-MON-YYYY HH24:MI TZR` (as shown\
    \ in [Figure 6-32](#Chapter06.html#fig_6_32)).\n\n    ![images](images/0632.jpg)\n\
    \n    **Figure 6-32.** Changing the number/date format\n\n8.  Save your changes\
    \ and run the report. You will instantly notice that your date and time data in\
    \ the report shows your local time zone next to it (see [Figure 6-33](#Chapter06.html#fig_6_33)).\n\
    \n    ![images](images/0633.jpg)\n\n    **Figure 6-33.** The dates and times in\
    \ Malaysian (Kuala Lumpur) time zone\n\n9.  Log out from the application. Go to\
    \ your Windows operating system date/time settings and change your local time\
    \ zone to a different one. Let's pretend you now live in Tashkent, which has the\
    \ time zone `UTC+05:00`.\n10. Log in to your `APEX` application one more time.\
    \ You will notice that the date and time data has been automatically adjusted\
    \ to reflect the local time zone in Tashkent, as shown in [Figure 6-34](#Chapter06.html#fig_6_34).\n\
    \n![images](images/0634.jpg)\n\n**Figure 6-34.** The dates and times in Tashkent\
    \ time zone\n\n### How It Works\n\nEnabling time-zone support is as easy as just\
    \ using the `TIMESTAMP WITH LOCAL TIME ZONE` data type in your tables and setting\
    \ the `Automatic Time Zone` support in the application settings to `Yes`. When\
    \ you do so, `APEX` captures your local time zone information in a session and\
    \ transmits it with every request so that the necessary adjustment can be made\
    \ before saving the date/time value in the database.\n\n## Chapter 7 Improving\
    \ Application Performance\n\nPerformance has always been a big issue when it comes\
    \ to Rapid Application Development (RAD). Most developers generally share the\
    \ same opinion: if it's that fast and easy to create an application, the developer\
    \ will have to “pay the price” elsewhere in terms of tool flexibility or application\
    \ performance.\n\nWhile this may hold true for other less integrated RAD tools\
    \ (and to a much lesser degree for `APEX`), there has been no other RAD tool quite\
    \ like `APEX`. The entire business logic layer in `APEX` is written in `PL/SQL`\
    \ and hence executes within the context of the database—leading to far better\
    \ performance than with other tools. In fact, `APEX` is commonly used to host\
    \ mission critical applications. The `APEX` platform has been used to handle thousands\
    \ of online transactions daily for an online e-commerce site based in Singapore,\
    \ to create an application to handle millions of voters in Ukraine, and to handle\
    \ the thousands of leads and opportunities captured hourly during nationwide roadshows\
    \ held in Malaysia. The bottom line: `APEX` performance is good enough to handle\
    \ usage-heavy scenarios.\n\n`APEX` performance can, however, be further improved\
    \ through a mixture of caching, SQL query design, and best practices. The recipes\
    \ in this chapter will give you an idea how to achieve this improved performance.\n\
    \n### 7-1. Measuring Page Access Frequency\n\n#### Problem\n\nNot every page in\
    \ your application will be performance critical. Before you begin on any performance\
    \ tuning task, you need to know which pages are in need of performance tuning—the\
    \ ones that are accessed most frequently by your end users.\n\n#### Solution\n\
    \nTo measure page access frequency using the `Monitor Activity` tool, follow these\
    \ instructions:\n\n1.  Login to `APEX` and click the large `Administration` icon.\n\
    2.  You should see four icons, two of which are labeled `Monitor Activity` and\
    \ `Dashboards` (as shown in [Figure 7-1](#Chapter07.html#fig_7_1)).\n\n    ![images](images/0701.jpg)\n\
    \n    **Figure 7-1.** The `Monitor Activity` icon\n\n3.  Click the `Monitor Activity`\
    \ icon. Scroll down to the `Page View Analysis` section, and click the `Most Viewed\
    \ Pages over All Applications` link.\n4.  You should see a view containing every\
    \ single page and application in the workspace plus the frequency of access in\
    \ the `Count` column (as shown in [Figure 7-2](#Chapter07.html#fig_7_2)). You\
    \ can see that the `MYCUSTOMERS` page in the `PATIENTDBAPP` application is the\
    \ most frequently accessed page, with eight views.\n\n![images](images/0702.jpg)\n\
    \n**Figure 7-2.** Frequency of access of each page in your applications\n\n![images](images/square.jpg)\
    \ **Tip** You will likely get a different page access count on your system, as\
    \ it depends on how many times you actually viewed each corresponding page.\n\n\
    #### How It Works\n\nThe `Monitor Activity` tool provides a wealth of diagnostic\
    \ information pertaining to the execution of your `APEX` applications. The `Page\
    \ View Analysis` section provides an eagle-eye view of application usage statistics.\
    \ [Table 7-1](#Chapter07.html#tab_7_1) describes some of these charts and their\
    \ use. Your solution chose the `Most Viewed Pages over All Applications` chart,\
    \ giving you a list of the most-used pages in your application.\n\n**Table 7-1.**\
    \ Usage Statistic Charts in the `Page View Analysis` Section\n\n| **Chart** |\
    \ **Description** |\n| --- | --- |\n| `Most Viewed Pages over All Applications`\
    \ | Displays the full list of all pages/applications and their access frequency.\
    \ This is useful to find out the most frequently accessed pages in your application.\
    \ |\n| `Monthly Calendar of Page Views by Day` | Displays access frequency (and\
    \ number of users) by date (populated on a visual calendar). This view is useful\
    \ to determine usage peaks over a single month and the number of users accessing\
    \ your applications in any single day. |\n| `Line Chart of Usage by day` | This\
    \ chart displays total page access frequencies as a line chart on a daily or hourly\
    \ timescale. This view is useful for fine-grain monitoring of usage peaks. |\n\
    | `By Weighted Page Performance` | This chart displays the average page rendering\
    \ time for each page across all applications. This view is useful to gauge how\
    \ each individual page performs in your application. |\n\n### 7-2. Measuring Page\
    \ Performance in APEX\n\n#### Problem\n\nYou now know which pages are important\
    \ in your application. Now you want to measure the performance (in terms of rendering\
    \ time) for each of those pages. You want to spend your time on pages that take\
    \ the longest to render and thus maximize the return from your optimization efforts."
  raw: "#### Solution\n\nYou will first need to create a table and some data for this\
    \ recipe. Run the SQL in [Listing 6-3](#Chapter06.html#list_6_3) to create an\
    \ EVENTS table and add a couple of events for testing purposes.\n\n***Listing\
    \ 6-3.** SQL to Create an EVENTS Table and Some Events*\n\n`CREATE TABLE  \"EVENTS\"\
    `\n`   (    \"EVENTLAUNCHDATE\" TIMESTAMP (6) WITH LOCAL TIME ZONE,`\n`        \"\
    EVENTNAME\" NVARCHAR2(255),`\n`        \"EVENTID\" NVARCHAR2(50),`\n`        CONSTRAINT\
    \ \"EVENTS_PK\" PRIMARY KEY (\"EVENTID\") ENABLE`\n`   )`\n`/`\n`INSERT INTO EVENTS(EVENTID,EVENTLAUNCHDATE,EVENTNAME)\
    \ VALUES(1,'22-APR-11 08:00:00 AM','GLOBAL SALES EVENT')`\n`/`\n`INSERT INTO EVENTS(EVENTID,EVENTLAUNCHDATE,EVENTNAME)\
    \ VALUES(2,'23-APR-11 04:00:00 PM','PROJECT KICKOFF MEETING')`\n`/`\n\nNext, you\
    \ will need to create the report to display the event information. Here are the\
    \ steps to follow:\n\n1.  Open an existing application.\n2.  Click the Shared\
    \ Components icon in the application page.\n3.  Click on the Globalization Attributes\
    \ link under the Globalization section, as shown in [Figure 6-29](#Chapter06.html#fig_6_29).\n\
    \n    ![images](images/0629.jpg)\n\n    ***Figure 6-29.** Modifying Globalization\
    \ Attributes*\n\n4.  In the ensuing page, change the Automatic Time Zone field\
    \ from No to Yes, as shown in [Figure 6-30](#Chapter06.html#fig_6_30).\n\n   \
    \ ![images](images/0630.jpg)\n\n    ***Figure 6-30.** Enabling the automatic time\
    \ zone feature*\n\n5.  Save your changes. Now create a new report in the application.\
    \ For the SQL Query for the report, specify the following SQL: `SELECT * FROM\
    \ Events`\n6.  Complete the wizard to create the report. After doing so, edit\
    \ the report definition, and choose to edit the EVENTLAUNCHDATE column of the\
    \ report, as shown in [Figure 6-31](#Chapter06.html#fig_6_31).\n\n    ![images](images/0631.jpg)\n\
    \n    ***Figure 6-31.** Modifying the Event launch date column*\n\n7.  Change\
    \ the date/time format field to the following: `DD-MON-YYYY HH24:MI TZR` (as shown\
    \ in [Figure 6-32](#Chapter06.html#fig_6_32)).\n\n    ![images](images/0632.jpg)\n\
    \n    ***Figure 6-32.** Changing the number/date format*\n\n8.  Save your changes\
    \ and run the report. You will instantly notice that your date and time data in\
    \ the report shows your local time zone next to it (see [Figure 6-33](#Chapter06.html#fig_6_33)).\n\
    \n    ![images](images/0633.jpg)\n\n    ***Figure 6-33.** The dates and times\
    \ in Malaysian (Kuala Lumpur) time zone*\n\n9.  Log out from the application.\
    \ Go to your Windows operating system date/time settings and change your local\
    \ time zone to a different one. Let's pretend you now live in Tashkent, which\
    \ has the time zone UTC+05:00.\n10.  Log in to your APEX application one more\
    \ time. You will notice that the date and time data has been automatically adjusted\
    \ to reflect the local time zone in Tashkent, as shown in [Figure 6-34](#Chapter06.html#fig_6_34).\n\
    \n![images](images/0634.jpg)\n\n***Figure 6-34.** The dates and times in Tashkent\
    \ time zone*\n\n#### How It Works\n\nEnabling time-zone support is as easy as\
    \ just using the TIMESTAMP WITH LOCAL TIME ZONE data type in your tables and setting\
    \ the Automatic Time Zone support in the application settings to Yes. When you\
    \ do so, APEX captures your local time zone information in a session and transmits\
    \ it with every request so that the necessary adjustment can be made before saving\
    \ the date/time value in the database.\n\n## C H A P T E R  7\n\n## Improving\
    \ Application Performance\n\nPerformance has always been a big issue when it comes\
    \ to Rapid Application Development (RAD). Most developers generally share the\
    \ same opinion: if it's that fast and easy to create an application, the developer\
    \ will have to “pay the price” elsewhere in terms of tool flexibility or application\
    \ performance.\n\nWhile this may hold true for other less integrated RAD tools\
    \ (and to a much lesser degree for APEX), there has been no other RAD tool quite\
    \ like APEX. The entire business logic layer in APEX is written in PL/SQL and\
    \ hence executes within the context of the database—leading to far better performance\
    \ than with other tools. In fact, APEX is commonly used to host mission critical\
    \ applications. The APEX platform has been used to handle thousands of online\
    \ transactions daily for an online e-commerce site based in Singapore, to create\
    \ an application to handle millions of voters in Ukraine, and to handle the thousands\
    \ of leads and opportunities captured hourly during nationwide roadshows held\
    \ in Malaysia. The bottom line: APEX performance is good enough to handle usage-heavy\
    \ scenarios.\n\nAPEX performance can, however, be further improved through a mixture\
    \ of caching, SQL query design, and best practices. The recipes in this chapter\
    \ will give you an idea how to achieve this improved performance.\n\n### 7-1.\
    \ Measuring Page Access Frequency\n\n#### Problem\n\nNot every page in your application\
    \ will be performance critical. Before you begin on any performance tuning task,\
    \ you need to know which pages are in need of performance tuning—the ones that\
    \ are accessed most frequently by your end users.\n\n#### Solution\n\nTo measure\
    \ page access frequency using the Monitor Activity tool, follow these instructions:\n\
    \n1.  Login to APEX and click the large Administration icon.\n2.  You should see\
    \ four icons, two of which are labeled Monitor Activity and Dashboards (as shown\
    \ in [Figure 7-1](#Chapter07.html#fig_7_1)).\n\n    ![images](images/0701.jpg)\n\
    \n    ***Figure 7-1.** The Monitor Activity icon*\n\n3.  Click the Monitor Activity\
    \ icon. Scroll down to the Page View Analysis section, and click the Most Viewed\
    \ Pages over All Applications link.\n4.  You should see a view containing every\
    \ single page and application in the workspace plus the frequency of access in\
    \ the Count column (as shown in [Figure 7-2](#Chapter07.html#fig_7_2)). You can\
    \ see that the MYCUSTOMERS page in the PATIENTDBAPP application is the most frequently\
    \ accessed page, with eight views.\n\n![images](images/0702.jpg)\n\n***Figure\
    \ 7-2.** Frequency of access of each page in your applications*\n\n![images](images/square.jpg)\
    \ **Tip** You will likely get a different page access count on your system, as\
    \ it depends on how many times you actually viewed each corresponding page.\n\n\
    #### How It Works\n\nThe Monitor Activity tool provides a wealth of diagnostic\
    \ information pertaining to the execution of your APEX applications. The Page\
    \ View Analysis section provides an eagle-eye view of application usage statistics.\
    \ [Table 7-1](#Chapter07.html#tab_7_1) describes some of these charts and their\
    \ use. Your solution chose the Most Viewed Pages over All Applications chart,\
    \ giving you a list of the most-used pages in your application.\n\n***Table 7-1**.\
    \ Usage Statistic Charts in the Page View Analysis Section*\n\n| **Chart** | **Description**\
    \ |\n| --- | --- |\n| `Most Viewed Pages over All Applications` | Displays the\
    \ full list of all pages/applications and their access frequency. This is useful\
    \ to find out the most frequently accessed pages in your application. |\n| `Monthly\
    \ Calendar of Page Views by Day` | Displays access frequency (and number of users)\
    \ by date (populated on a visual calendar). This view is useful to determine usage\
    \ peaks over a single month and the number of users accessing your applications\
    \ in any single day. |\n| `Line Chart of Usage by day` | This chart displays total\
    \ page access frequencies as a line chart on a daily or hourly timescale. This\
    \ view is useful for fine-grain monitoring of usage peaks. |\n| `By Weighted Page\
    \ Performance` | This chart displays the average page rendering time for each\
    \ page across all applications. This view is useful to gauge how each individual\
    \ page performs in your application. |\n\n### 7-2. Measuring Page Performance\
    \ in APEX\n\n#### Problem\n\nYou now know which pages are important in your application.\
    \ Now you want to measure the performance (in terms of rendering time) for each\
    \ of those pages. You want to spend your time on pages that take the longest to\
    \ render and thus maximize the return from your optimization efforts."
  trans: "### 解决方案\n\n您首先需要为这个示例创建一个数据表及一些数据。运行清单 6-3 中的 SQL 语句来创建一个`EVENTS`表，并添加几个测试用的事件。\n\
    \n**清单 6-3.** 用于创建`EVENTS`表及一些事件的 SQL\n\n```sql\nCREATE TABLE  \"EVENTS\"\n  \
    \ (    \"EVENTLAUNCHDATE\" TIMESTAMP (6) WITH LOCAL TIME ZONE,\n        \"EVENTNAME\"\
    \ NVARCHAR2(255),\n        \"EVENTID\" NVARCHAR2(50),\n        CONSTRAINT \"EVENTS_PK\"\
    \ PRIMARY KEY (\"EVENTID\") ENABLE\n   )\n/\nINSERT INTO EVENTS(EVENTID,EVENTLAUNCHDATE,EVENTNAME)\
    \ VALUES(1,'22-APR-11 08:00:00 AM','GLOBAL SALES EVENT')\n/\nINSERT INTO EVENTS(EVENTID,EVENTLAUNCHDATE,EVENTNAME)\
    \ VALUES(2,'23-APR-11 04:00:00 PM','PROJECT KICKOFF MEETING')\n/\n```\n\n接下来，您需要创建报表来显示事件信息。请按照以下步骤操作：\n\
    \n1.  打开一个现有应用程序。\n2.  在应用程序页面中点击`共享组件`图标。\n3.  在`全球化`部分下，点击`全球化属性`链接，如图 6-29\
    \ 所示。\n\n    ![images](img/0629.jpg)\n\n    **图 6-29.** 修改全球化属性\n\n4.  在随后的页面中，将`自动时区`字段从`否`更改为`是`，如图\
    \ 6-30 所示。\n\n    ![images](img/0630.jpg)\n\n    **图 6-30.** 启用自动时区功能\n\n5.  保存您的更改。现在，在应用程序中创建一个新报表。对于报表的\
    \ SQL 查询，请指定以下 SQL：`SELECT * FROM Events`\n6.  完成创建报表的向导。之后，编辑报表定义，并选择编辑报表的`EVENTLAUNCHDATE`列，如图\
    \ 6-31 所示。\n\n    ![images](img/0631.jpg)\n\n    **图 6-31.** 修改事件启动日期列\n\n7. \
    \ 将日期/时间格式字段更改为：`DD-MON-YYYY HH24:MI TZR`（如图 6-32 所示）。\n\n    ![images](img/0632.jpg)\n\
    \n    **图 6-32.** 更改数字/日期格式\n\n8.  保存您的更改并运行报表。您会立即注意到，报表中的日期和时间数据旁边显示了您本地的时区（参见图\
    \ 6-33）。\n\n    ![images](img/0633.jpg)\n\n    **图 6-33.** 马来西亚（吉隆坡）时区中的日期和时间\n\
    \n9.  从应用程序中注销。进入您的 Windows 操作系统日期/时间设置，将您的本地时区更改为另一个不同的时区。假设您现在住在塔什干，其时区为`UTC+05:00`。\n\
    10. 再次登录到您的`APEX`应用程序。您会注意到，日期和时间数据已自动调整为反映塔什干的本地时区，如图 6-34 所示。\n\n![images](img/0634.jpg)\n\
    \n**图 6-34.** 塔什干时区中的日期和时间\n\n### 工作原理\n\n启用时区支持非常简单，只需在表中使用`TIMESTAMP WITH LOCAL\
    \ TIME ZONE`数据类型，并在应用程序设置中将`自动时区`支持设置为`是`即可。当您这样做时，`APEX`会在会话中捕获您的本地时区信息，并在每次请求时传输该信息，以便在将日期/时间值保存到数据库之前进行必要的调整。\n\
    \n## 第 7 章 提高应用程序性能\n\n性能一直是快速应用程序开发（RAD）领域的一个重要问题。大多数开发者通常都持相同的观点：如果创建应用程序如此快速简便，那么开发者就不得不在工具的灵活性或应用程序性能方面“付出代价”。\n\
    \n虽然这对于其他集成度较低的 RAD 工具可能确实如此（而对于`APEX`来说，这种影响要小得多），但还没有其他 RAD 工具能像`APEX`这样。`APEX`中的整个业务逻辑层都是用`PL/SQL`编写的，因此在数据库上下文中执行——这带来了比其他工具好得多的性能。事实上，`APEX`通常用于托管关键任务应用程序。`APEX`平台已被用于处理新加坡一个电子商务网站每天成千上万的在线交易，用于创建一个处理乌克兰数百万选民的应用程序，并用于处理马来西亚全国路演期间每小时捕获的数千条销售线索和机会。关键点在于：`APEX`性能足以处理使用密集型的场景。\n\
    \n然而，通过缓存、SQL 查询设计和最佳实践的结合，可以进一步优化`APEX`性能。本章中的示例将让您了解如何实现这种性能提升。\n\n### 7-1.\
    \ 测量页面访问频率\n\n#### 问题\n\n并非应用程序中的每个页面都对性能至关重要。在开始任何性能调优任务之前，您需要了解哪些页面需要进行性能调优——即最终用户访问最频繁的那些页面。\n\
    \n#### 解决方案\n\n要使用`监控活动`工具测量页面访问频率，请遵循以下说明：\n\n1.  登录`APEX`并点击大的`管理`图标。\n2.  您应该看到四个图标，其中两个标记为`监控活动`和`仪表板`（如图\
    \ 7-1 所示）。\n\n    ![images](img/0701.jpg)\n\n    **图 7-1.** `监控活动`图标\n\n3.  点击`监控活动`图标。向下滚动到`页面视图分析`部分，然后点击`所有应用程序中最常查看的页面`链接。\n\
    4.  您将看到一个视图，其中包含工作区中的每个页面和应用程序，以及`计数`列中的访问频率（如图 7-2 所示）。您可以看到`PATIENTDBAPP`应用程序中的`MYCUSTOMERS`页面是访问最频繁的页面，有八次查看。\n\
    \n![images](img/0702.jpg)\n\n**图 7-2.** 应用程序中每个页面的访问频率\n\n![images](img/square.jpg)\
    \ **提示** 您系统上的页面访问计数可能会有所不同，因为它取决于您实际查看每个相应页面的次数。\n\n#### 工作原理\n\n`监控活动`工具提供了与`APEX`应用程序执行相关的丰富诊断信息。`页面视图分析`部分提供了应用程序使用情况统计的全局视图。表\
    \ 7-1 描述了其中一些图表及其用途。您的解决方案选择了`所有应用程序中最常查看的页面`图表，从而获得了应用程序中最常用页面的列表。\n\n**表 7-1.**\
    \ `页面视图分析`部分中的使用情况统计图表\n\n| **图表** | **描述** |\n| --- | --- |\n| `所有应用程序中最常查看的页面`\
    \ | 显示所有页面/应用程序的完整列表及其访问频率。这对于找出应用程序中访问最频繁的页面非常有用。 |\n| `按日排列的页面视图月度日历` | 按日期（在可视日历上填充）显示访问频率（及用户数）。此视图可用于确定单个月内的使用高峰以及任何一天访问您应用程序的用户数量。\
    \ |\n| `每日使用情况折线图` | 此图以每日或每小时的时间尺度，以折线图形式显示总页面访问频率。此视图对于精细监控使用高峰非常有用。 |\n| `按加权页面性能`\
    \ | 此图显示所有应用程序中每个页面的平均页面渲染时间。此视图有助于衡量应用程序中每个单独页面的性能。 |\n\n### 7-2. 在 APEX 中测量页面性能\n\
    \n#### 问题\n\n您现在知道了应用程序中哪些页面是重要的。现在您想要测量这些页面中每个页面的性能（以渲染时间计）。您希望将时间花在渲染时间最长的页面上，从而最大化优化工作的回报。"
- fmt: '# Solution


    To measure page performance, please follow these steps:


    1. Login to APEX and click the large Administration icon. Click the Monitor Activity
    icon and navigate to the Page View Analysis section.

    2. Scroll down to the Page View Analysis section, and click the By Weighted Page
    Performance link.

    3. Set the desired time range to collect statistical information in the Since
    drop-down list. If you have accessed any of the pages in your applications recently,
    you should see the screenshot shown in [Figure 7-3](#Chapter07.html#fig_7_3).
    You can see the average time taken to render each particular page under the Average
    Elapsed column.


    ![images](images/0703.jpg)

    `Figure 7-3.` Measuring page performance


    # How It Works


    The Page Views by Weighted Page Performance page shows execution statistics for
    each individual page in your application on an averaged basis. This report shows
    a few different pieces of information, which are described in [Table 7-2](#Chapter07.html#tab_7_2).


    `Table 7-2.` Page Execution Statistics


    | **Column Name** | **Description** |

    | --- | --- |

    | `Average Elapsed` | Displays the average time taken (in seconds) for the execution
    of the page. |

    | `Weighted Average` | Each page consists of page rendering and processing events
    that may affect the amount of time required to render the page. The weighted average
    multiplies the average rendering time by the number of events on the page. |

    | `Median Elapsed` | This column displays the median of the average rendering
    time of each page. This gives a more accurate reading closer to the actual elapsed
    rendering time of the page. |

    | `Weighted Median` | The weighted median (for each page) is the median elapsed
    multiplied by the number of events in each page. |


    These figures are particularly useful in that they allow you to zoom in on the
    pages that need performance optimization. For instance, the following is a series
    of steps you can adopt as a strategy for optimization:


    4. Sort all pages by Median Elapsed time, and take note of all the pages that
    exceed a certain threshold. Consider deriving that threshold from your enterprise
    objectives. For instance, your Quality of Service statement might include delivering
    every page to your end user in less than three seconds. Such an objective will
    let you narrow down to a smaller and more manageable subset of pages for optimization.

    ![images](images/square.jpg) **Tip** It''s interesting to note that public tenders
    issued by the Government of Singapore for IT projects typically outline the three-second
    maximum response time as one of the requirements for web-based applications.

    5. Review the Page Events values. The Median Elapsed time alone is not a good
    indicator for the performance of the page. Looking at the Page Events column will
    let you make a better assessment, since the number of page events roughly correlates
    with the complexity of the page. For instance, a page that takes three seconds
    to load might actually be more performance-effective than a page that takes one
    second to load if that first page has 20 events and the second page has 1 event.


    # 7-3. Measuring Region Performance in APEX


    ## Problem


    You now know the average elapsed time taken for each page. You want to drill down
    further into the performance of each individual region in a particular page. As
    in the previous recipe, your goal is to focus your optimization efforts on those
    pages and regions consuming the most time.


    ## Solution


    To measure region performance, please follow these steps:


    1. Log in to APEX and open any application that contains a report. (To create
    a report page, please see Recipe 2-2). Navigate to the Page Rendering view of
    the report page.

    2. Expand the Regions node, and right-click on any region under this node. Click
    the Edit menu item in the pop-up menu (as shown in [Figure 7-4](#Chapter07.html#fig_7_4)).

    ![images](images/0704.jpg)

    `Figure 7-4.` Editing the report region

    3. In the Edit Region page, click the Header and Footer tab. In the Region Footer
    section, enter the following line:

    ```

    #ROWS_FETCHED# rows fetched (from a total of #TOTAL_ROWS# rows) in #TIMING# seconds

    ```

    4. You should now see the screenshot shown in [Figure 7-5](#Chapter07.html#fig_7_5).

    ![images](images/0705.jpg)

    `Figure 7-5.` Specifying substitution strings in the region footer to collect
    performance statistics

    5. Apply your changes and run the report. You should notice a new line at the
    bottom of the Report region which provides you the total time taken to run the
    query and render the region (and its contained items), as shown in [Figure 7-6](#Chapter07.html#fig_7_6).


    ![images](images/0706.jpg)

    `Figure 7-6.` Performance statistics displayed in the footer of the region


    ## How It Works


    A page may consist of several regions; some may already be performance-optimized
    but others are not. When focusing on per-page optimization, it’s useful to break
    it down further by running a quick assessment on the individual components (regions)
    in that page.

    The best way to do this is to capture and print performance statistics for each
    region. This simple step will give you actual run-time statistics for all the
    regions in a page—and instantly reveal the particular region that''s giving you
    performance troubles. Oracle APEX provides the substitution strings described
    in [Table 7-3](#Chapter07.html#tab_7_3) to provide real-time information on performance
    statistics.


    `Table 7-3.` Useful Substitution Strings for Performance Statistics Gathering


    | **Substitution String** | **Description** |

    | --- | --- |

    | `#TIMING#` | Shows the elapsed time (in seconds) used in rendering a particular
    region. |

    | `#TOTAL_ROWS#` | Displays the total number of rows retrieved by the particular
    SQL query in a region. |

    | `#ROWS_FETCHED#` | Shows the total number of rows fetched by APEX from the query
    for display. |


    You can place these substitution strings in more than one region on a page to
    find out how long each region takes to render. This will allow you to find the
    performance-poor region and to focus your performance tuning efforts there.

    As you''ve seen in this recipe, these three pieces of information are indispensable
    in the goal of profiling your pages (and regions). It is important to look at
    all three parameters and not just the `#TIMING#` info.

    For instance, consider this scenario: `Region A` might take three seconds in total
    to render, but this may be due to the fact that there are 500 rows to fetch for
    display, as opposed to `Region B` that takes one second to render but fetches
    only 100 rows. In this case, `Region A` might be better-performing than `Region
    B` despite `Region B` having a shorter rendering time. Thus, you should always
    consider all three parameters before deciding if a region needs performance optimization.


    # 7-4. Enabling Region Caching


    ## Problem


    You have a region that retrieves a list of fixed/static data from the database
    for display. You want to improve the performance of this region by caching it.'
