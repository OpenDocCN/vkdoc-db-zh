    \ is null then`\n    `    select \"CATEGORY_SEQ\".nextval into :NEW.\"CATEGORYID\"\
    \ from dual;`\n    `  end if;`\n    `end;`\n    `/`\n\n    `CREATE table \"SUBCATEGORY\"\
    \ (`\n    `    \"SUBCATEGORYNAME\"  NVARCHAR2(255),`\n    `    \"PARENTCATEGORYID\"\
    \ NUMBER(6,2),`\n    `    \"SUBCATEGORYID\"    NUMBER(6,2),`\n    `    constraint  \"\
    SUBCATEGORY_PK\" primary key (\"SUBCATEGORYID\")`\n    `)`\n    `/`\n\n    `CREATE\
    \ sequence \"SUBCATEGORY_SEQ\"`\n    `/`\n\n    `CREATE trigger \"BI_SUBCATEGORY\"\
    `\n    `  before insert on \"SUBCATEGORY\"`\n    `  for each row`\n    `begin`\n\
    \    `  if :NEW.\"SUBCATEGORYID\" is null then`\n    `    select \"SUBCATEGORY_SEQ\"\
    .nextval into :NEW.\"SUBCATEGORYID\" from dual;`\n    `  end if;`\n    `end;`\n\
    \    `/`\n2.  Now create the sample data shown in [Listing 3-10](#Chapter03.html#list_3_10).\
    \ The MODEM and NETWORK CARD subcategory items belong to the parent HARDWARE category,\
    \ whereas the LOTUS NOTES and SHAREPOINT subcategory items belong to the parent\
    \ SOFTWARE category. The foreign key in this case is the PARENTCATEGORYID column.\n\
    \n    ***Listing 3-10.** Creating Sample Data*\n\n    `INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
    \ VALUES(1,'SOFTWARE')`\n    `/`\n    `INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
    \ VALUES(2,'HARDWARE')`\n    `/`\n    `INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('LOTUS NOTES',1,1)`\n    `/`\n    `INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('SHAREPOINT',1,2)`\n    `/`\n    `INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('NETWORK CARD',2,3)`\n    `/`\n    `INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('MODEM',2,4)`\n    `/`\n3.  Now create a database application/standard\
    \ entry form on top of the EquipmentRequest table. Go to the Page Definition >\
    \ Page Rendering view of the form, and change (edit) the CATEGORY field to a `Select\
    \ List`. Choose to create a dynamic LOV for the field, setting CATEGORY, CATEGORYNAME,\
    \ and CATEGORYID as the table name, display column, and return value, respectively.\n\
    \n    ![images](images/square.jpg) **Tip** Refer to Recipe 2-4 to find out how\
    \ to create a dynamic drop-down list.\n\n4.  Repeat the same for the SUBCATEGORY\
    \ field, using SUBCATEGORY, SUBCATEGORYNAME, and SUBCATEGORYID instead as the\
    \ table name, display column, and return value, respectively.\n5.  Edit the CATEGORY\
    \ field again, and under the Default tab, enter `1` as the Default value. This\
    \ will set the default selected value in the category drop down to SOFTWARE.\n\
    6.  Test your form. You should be able to see two drop-down lists containing the\
    \ data you entered earlier, but with no cascading relationship between them at\
    \ the moment, as shown in [Figure 3-11](#Chapter03.html#fig_3_11).\n\n![images](images/0311.jpg)\n\
    \n***Figure 3-11.** Drop-down lists without cascading relationship*\n\n##### Creating\
    \ the Cascading Relationship\n\nTo create a cascading relationship between the\
    \ two drop-down lists, follow these steps:\n\n1.  In the Page Definition > Page\
    \ Rendering view, edit the SUBCATEGORY field. Navigate to the List Of Values tab.\
    \ Set the Cascading LOV Parent Item(s) field to P1_CATEGORY.\n2.  In the List\
    \ of Values definition area, add the filter WHERE PARENTCATEGORYID=:P1_CATEGORY\
    \ to the SQL. You should now have the screen shown in [Figure 3-12](#Chapter03.html#fig_3_12).\n\
    \n    ![images](images/0312.jpg)\n\n    ***Figure 3-12.** Creating the cascading\
    \ relationship*\n\n3.  Apply your changes and run the form again. Note that when\
    \ you change the selected category, the subcategory drop-down list will only show\
    \ the items relevant to that category (see [Figure 3-13](#Chapter03.html#fig_3_13)).\n\
    \n![images](images/0313.jpg)\n\n***Figure 3-13.** The cascading relationship in\
    \ action*\n\n#### How It Works\n\nYou can easily specify the List of Values (LOV)\
    \ returned in a dynamic drop-down list using PL/SQL in the List of Values tab\
    \ of the `Select List` page item.\n\nYou might also have noticed that you can\
    \ reference form fields directly in your PL/SQL code using the :ItemName syntax\
    \ (a colon, followed by the name of the page item). This allows you to create\
    \ dynamic PL/SQL code that uses data keyed in from the form on the fly for further\
    \ processing.\n\n### 3-5. Disabling or Hiding a Section of a Form Dynamically\n\
    \n#### Problem\n\nYou have a list of fields on a standard form you wish to hide\
    \ (set invisible) depending on what was specified in another field. Taking the\
    \ sample employee table in Recipe 3-2 as context, you might choose to hide the\
    \ employee's Social Security number if the employee type was keyed in as LOCAL.\n\
    \n#### Solution\n\nTo create a dynamic action to hide a section of a form, follow\
    \ the following steps:\n\n1.  Create a database application/standard entry form\
    \ from the EMPLOYEE table from Recipe 3-2.\n2.  Create a standard entry form from\
    \ the EMPLOYEE table.\n3.  Navigate to the `Page Definition` area of the form.\
    \ Right click on the P1_EMPLOYEETYPE field and choose the Create Dynamic Action\
    \ menu item.\n4.  In the first page of the wizard, choose the Standard dynamic\
    \ action type. Next, assign a name to your dynamic action.\n5.  In the next page\
    \ of the wizard, specify LOCAL in the Value field (as shown in [Figure 3-14](#Chapter03.html#fig_3_14)).\n\
    \n    ![images](images/0314.jpg)\n\n    ***Figure 3-14.** Configuring the dynamic\
    \ action*\n\n6.  In the next page of the wizard, specify the Hide option. Ensure\
    \ that the Create Opposite Action checkbox is ticked.\n7.  Next, you will be requested\
    \ to select the fields you want to hide. Select `item(s)` from the Selection Type\
    \ field, and add P1_SOCIALSECURITYNO to the box on the right (as shown in [Figure\
    \ 3-15](#Chapter03.html#fig_3_15)).\n\n    ![images](images/0315.jpg)\n\n    ***Figure\
    \ 3-15.** Specifying the target of the dynamic action*\n\n8.  Click the Create\
    \ button. Now, run your form. Type LOCAL into the Employee Type field. Once you\
    \ have done that, navigate away from the field. The Social Security Number field\
    \ immediately disappears from view (as shown in [Figure 3-16](#Chapter03.html#fig_3_16)).\
    \ If you type anything other than LOCAL in the employee type field, the behavior\
    \ will not apply.\n\n![images](images/0316.jpg)\n\n***Figure 3-16.** Dynamic action\
    \ running in your form*"
  trans: "## 设置示例对象\n\n要设置本教程中使用的示例对象，请按照以下步骤操作：\n\n1.  创建如清单 3-9 所示的表。\n\n    ***清单\
    \ 3-9.** 示例设备请求表*\n\n    ```\n    CREATE table \"EQUIPMENTREQUEST\" (\n        \"\
    REQUESTID\"   NVARCHAR2(10),\n        \"CATEGORY\"    NVARCHAR2(255),\n        \"\
    SUBCATEGORY\" NVARCHAR2(255),\n        constraint  \"EQUIPMENTREQUEST_PK\" primary\
    \ key (\"REQUESTID\")\n    )\n    /\n\n    CREATE sequence \"EQUIPMENTREQUEST_SEQ\"\
    \n    /\n\n    CREATE trigger \"BI_EQUIPMENTREQUEST\"\n      before insert on\
    \ \"EQUIPMENTREQUEST\"\n      for each row\n    begin\n      if :NEW.\"REQUESTID\"\
    \ is null then\n        select \"EQUIPMENTREQUEST_SEQ\".nextval into :NEW.\"REQUESTID\"\
    \ from dual;\n      end if;\n    end;\n    /\n\n    CREATE table \"CATEGORY\"\
    \ (\n        \"CATEGORYNAME\" NVARCHAR2(255),\n        \"CATEGORYID\"   NUMBER(6,2),\n\
    \        constraint  \"CATEGORY_PK\" primary key (\"CATEGORYID\")\n    )\n   \
    \ /\n\n    CREATE sequence \"CATEGORY_SEQ\"\n    /\n\n    CREATE trigger \"BI_CATEGORY\"\
    \n      before insert on \"CATEGORY\"\n      for each row\n    begin\n      if\
    \ :NEW.\"CATEGORYID\" is null then\n        select \"CATEGORY_SEQ\".nextval into\
    \ :NEW.\"CATEGORYID\" from dual;\n      end if;\n    end;\n    /\n\n    CREATE\
    \ table \"SUBCATEGORY\" (\n        \"SUBCATEGORYNAME\"  NVARCHAR2(255),\n        \"\
    PARENTCATEGORYID\" NUMBER(6,2),\n        \"SUBCATEGORYID\"    NUMBER(6,2),\n \
    \       constraint  \"SUBCATEGORY_PK\" primary key (\"SUBCATEGORYID\")\n    )\n\
    \    /\n\n    CREATE sequence \"SUBCATEGORY_SEQ\"\n    /\n\n    CREATE trigger\
    \ \"BI_SUBCATEGORY\"\n      before insert on \"SUBCATEGORY\"\n      for each row\n\
    \    begin\n      if :NEW.\"SUBCATEGORYID\" is null then\n        select \"SUBCATEGORY_SEQ\"\
    .nextval into :NEW.\"SUBCATEGORYID\" from dual;\n      end if;\n    end;\n   \
    \ /\n    ```\n\n2.  现在创建如清单 3-10 所示的示例数据。`MODEM`和`NETWORK CARD`子类别项属于父类别`HARDWARE`，而`LOTUS\
    \ NOTES`和`SHAREPOINT`子类别项属于父类别`SOFTWARE`。本例中的外键是`PARENTCATEGORYID`列。\n\n    ***清单\
    \ 3-10.** 创建示例数据*\n\n    ```\n    INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
    \ VALUES(1,'SOFTWARE')\n    /\n    INSERT INTO CATEGORY(CATEGORYID,CATEGORYNAME)\
    \ VALUES(2,'HARDWARE')\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('LOTUS NOTES',1,1)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('SHAREPOINT',1,2)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('NETWORK CARD',2,3)\n    /\n    INSERT INTO SUBCATEGORY(SUBCATEGORYNAME,PARENTCATEGORYID,SUBCATEGORYID)\
    \ VALUES('MODEM',2,4)\n    /\n    ```\n\n3.  现在，基于`EquipmentRequest`表创建一个数据库应用程序/标准录入表单。转到表单的“页面定义”\
    \ > “页面渲染”视图，将`CATEGORY`字段更改为`选择列表`。选择为该字段创建动态值列表，分别将`CATEGORY`、`CATEGORYNAME`和`CATEGORYID`设置为表名、显示列和返回值。\n\
    \n    ![images](img/square.jpg) `提示` 请参阅教程 2-4 了解如何创建动态下拉列表。\n\n4.  对`SUBCATEGORY`字段重复相同操作，分别使用`SUBCATEGORY`、`SUBCATEGORYNAME`和`SUBCATEGORYID`作为表名、显示列和返回值。\n\
    \n5.  再次编辑`CATEGORY`字段，在“默认值”选项卡下，输入`1`作为默认值。这将把类别下拉列表中默认选定的值设置为`SOFTWARE`。\n\n\
    6.  测试你的表单。你应该能看到两个包含先前输入数据的下拉列表，但目前它们之间没有级联关系，如图 3-11 所示。\n\n    ![images](img/0311.jpg)\n\
    \n    ***图 3-11.** 没有级联关系的下拉列表*\n\n## 创建级联关系\n\n要在两个下拉列表之间创建级联关系，请按照以下步骤操作：\n\n\
    1.  在“页面定义” > “页面渲染”视图中，编辑`SUBCATEGORY`字段。导航到“值列表”选项卡。将“级联值列表父项”字段设置为`P1_CATEGORY`。\n\
    \n2.  在“值列表定义”区域，在 SQL 中添加过滤条件 `WHERE PARENTCATEGORYID=:P1_CATEGORY`。现在，你应该看到如图\
    \ 3-12 所示的屏幕。\n\n    ![images](img/0312.jpg)\n\n    ***图 3-12.** 创建级联关系*\n\n3.\
    \  应用你的更改并再次运行表单。注意，当你更改选定的类别时，子类别下拉列表将仅显示与该类别相关的项目（参见图 3-13）。\n\n    ![images](img/0313.jpg)\n\
    \n    ***图 3-13.** 运行中的级联关系*\n\n### 工作原理\n\n你可以使用 PL/SQL 在 `选择列表` 页面项的“值列表”选项卡中轻松指定动态下拉列表返回的值列表\
    \ (LOV)。\n\n你可能还注意到，你可以使用 `:ItemName` 语法（冒号后跟页面项名称）在 PL/SQL 代码中直接引用表单字段。这允许你创建动态\
    \ PL/SQL 代码，实时使用表单中输入的数据进行进一步处理。\n\n## 3-5. 动态禁用或隐藏表单的一部分\n\n### 问题\n\n你有一个标准表单上的字段列表，希望根据另一个字段中指定的值来隐藏（设置为不可见）。以教程\
    \ 3-2 中的示例员工表为背景，如果员工类型被输入为 `LOCAL`，你可能会选择隐藏员工的社保号码。\n\n### 解决方案\n\n要创建动态操作以隐藏表单的一部分，请按照以下步骤操作：\n\
    \n1.  从教程 3-2 中的 `EMPLOYEE` 表创建一个数据库应用程序/标准录入表单。\n2.  从 `EMPLOYEE` 表创建一个标准录入表单。\n\
    3.  导航到表单的`页面定义`区域。右键单击`P1_EMPLOYEETYPE`字段，然后选择“创建动态操作”菜单项。\n4.  在向导的第一页，选择“标准”动态操作类型。接下来，为你的动态操作分配一个名称。\n\
    5.  在向导的下一页，在“值”字段中指定`LOCAL`（如图 3-14 所示）。\n\n    ![images](img/0314.jpg)\n\n \
    \   ***图 3-14.** 配置动态操作*\n\n6.  在向导的下一页，指定“隐藏”选项。确保勾选“创建相反操作”复选框。\n7.  接下来，系统将要求你选择要隐藏的字段。从“选择类型”字段中选择`项`，并添加`P1_SOCIALSECURITYNO`到右侧的框中（如图\
    \ 3-15 所示）。\n\n    ![images](img/0315.jpg)\n\n    ***图 3-15.** 指定动态操作的目标*\n\n\
    8.  单击“创建”按钮。现在，运行你的表单。在“员工类型”字段中输入`LOCAL`。完成后，将焦点移离该字段。“社保号码”字段将立即从视图中消失（如图 3-16\
    \ 所示）。如果你在“员工类型”字段中输入除 `LOCAL` 以外的任何内容，此行为将不会应用。\n\n    ![images](img/0316.jpg)\n\
    \n    ***图 3-16.** 表单中运行的动态操作*"
- fmt: "#### How It Works\n\n动态操作是在特定页面项目上应用的客户端行为，通常使用 JavaScript 和 AJAX 的组合实现。APEX\
    \ 提供了向导（例如你之前在本配方中看到的那个）来自动生成客户端行为。如果你想实现以下功能，动态操作非常有用：\n\n*   当表单上发生某些事件时（例如：输入了特定数据或某个字段被双击），动态隐藏或显示表单的某些部分。\n\
    *   当表单上发生某些事件时，启用或禁用表单上的某些字段。\n\n![images](images/square.jpg) **注意** 过去，APEX\
    \ 开发人员必须手动编写 JavaScript/AJAX 代码来创建动态行为。在 Apex 4.0 中，向导允许你轻松生成动态客户端行为——将开发人员从复杂的\
    \ JavaScript 编程中解放出来。\n\n### 3-6\\. 存储计算值\n\n#### 问题\n\n你需要对通过表单输入的某些值进行计算，然后再将最终值存储到数据库中。以配方\
    \ 3-3 中的示例 `Salaries` 表为例，你可能希望在将金额保存到数据库之前，对工资进行一些计算。\n\n#### 解决方案\n\n要在表单中创建计算字段，请按照以下步骤操作：\n\
    \n1.  导航到 Salaries 表单的页面定义区域。在页面处理部分的 `After Submit` 根节点下，右键单击 Computations 节点。\n\
    2.  在向导的第一页，选择“此页面上的项目”位置类型。在下一页中，为 Compute Item 字段选择 `P1_SALARY`，为 `type` 字段选择\
    \ `PL/SQL Function Body`。\n3.  在下一页，你将能够指定要应用的计算。例如，你可以使用以下 PL/SQL 来指定所有输入的工资在存储到数据库时都应增加\
    \ 20%：`return (:P1_SALARY * 20)/100 + :P1_SALARY`\n4.  保存你的更改并运行表单。尝试在工资字段中输入值\
    \ 500（如 [图 3-17](#Chapter03.html#fig_3_17) 所示）并创建记录。\n\n    ![images](images/0317.jpg)\n\
    \n    ***图 3-17.** 运行 Salaries 表单*\n\n5.  现在，使用对象浏览器检查你的数据库。你可以看到计算已应用于你的数据（如\
    \ [图 3-18](#Chapter03.html#fig_3_18) 所示）。\n\n![images](images/0318.jpg)\n\n***图\
    \ 3-18.** 存储在数据库中的计算值*\n\n#### 工作原理\n\nAPEX 计算允许你在表单的不同事件上应用计算算法。它可用于向最终用户显示计算值（例如，货币转换后的金额）（通过只读文本页面项目字段），或将计算值保存在数据库中。\n\
    \n### 3-7. 与 Web 服务交互\n\n#### 问题\n\n当你在表单中单击一个按钮时，需要连接到一个 Web 服务，向其传递一个参数，并让 Web\
    \ 服务返回一个值，然后你可以在表单上显示该值。例如，你可能希望显示通过表单指定的两种不同货币的最新汇率（从 Web 服务检索）。\n\n#### 解决方案\n\
    \n要测试本配方中的解决方案，你首先需要设置一个示例表单。之后，你需要将对 Web 服务的引用添加到你的应用程序中。最后，你需要在表单中使用该引用。让我们从创建示例表单开始。\n\
    \n##### 创建示例表单\n\n要创建本配方中使用的示例表单，请按照以下步骤操作：\n\n1.  你需要做的第一件事是创建一个用于输入货币代码的示例表单（并在同一表单中显示通过\
    \ Web 服务检索到的汇率）。\n2.  创建一个新应用程序并向该应用程序添加一个空白页面。在“页面定义 > 页面呈现”区域中，创建一个名为 `P1_FROMCODE`\
    \ 的新页面项目（文本字段）。为此页面项目使用默认设置。之后，创建另一个文本字段页面项目 `P1_TOCODE`，设置类似。接下来，创建一个名为 `P1_RETURNEDRATE`\
    \ 的数字字段页面项目。\n3.  接下来，在表单中创建一个按钮。右键单击“项目”节点并选择“创建按钮”。指定 `P1_GETCURRENCYRATE` 作为按钮的名称，将“标签”字段设置为“获取货币汇率”，并将\
    \ `按钮样式` 更改为“HTML 按钮”（如 [图 3-19](#Chapter03.html#fig_3_19) 所示）。最后，单击“创建按钮”。\n\n\
    \    ![images](images/0319.jpg)\n\n    ***图 3-19.** 配置“获取货币汇率”按钮*\n\n4.  你现在应该看到如\
    \ [图 3-20](#Chapter03.html#fig_3_20) 所示的屏幕。\n\n![images](images/0320.jpg)\n\n\
    ***图 3-20.** CurrencyRateReq 表单中的页面项目列表*\n\n##### 添加 Web 服务引用\n\n要向你的应用程序添加 Web\
    \ 服务引用，请按照以下步骤操作：\n\n1.  你现在需要添加对 Web 服务的引用。导航到你的应用程序主页，然后单击“共享组件”图标。在“逻辑”部分，单击“Web\
    \ 服务引用”。单击“创建”按钮以添加新的 Web 服务引用。\n2.  在向导的第一页，选择“基于 WSDL”选项。当被问及是否要搜索 UDDI 注册表以查找\
    \ WSDL 时，选择“否”。在向导的下一页，在 WSDL 位置字段中指定 [`www.webservicex.net/CurrencyConvertor.asmx?wsdl`](http://www.webservicex.net/CurrencyConvertor.asmx?wsdl)（如\
    \ [图 3-21](#Chapter03.html#fig_3_21) 所示）。\n\n    ![images](images/0321.jpg)\n\n\
    \    ***图 3-21.** Web 服务 URL*\n\n3.  单击“完成”按钮。Web 服务应成功创建。"
  raw: "#### How It Works\n\nA dynamic action is client-side behavior applied on a\
    \ particular page item, typically implemented using a combination of JavaScript\
    \ and AJAX. APEX provides wizards, such as the one you saw earlier in this recipe\
    \ to auto-generate client-side behavior. Dynamic actions are great if you want\
    \ to:\n\n*   Dynamically hide or show certain sections of your form when something\
    \ happens on your form (eg: a particular piece of data was entered or a field\
    \ was double-clicked).\n*   Enable or disable certain fields on your form when\
    \ something happens on your form.\n\n![images](images/square.jpg) **Note** Previously,\
    \ APEX developers had to manually write JavaScript/AJAX code to create dynamic\
    \ behavior. In Apex 4.0, the wizards allows you to easily generate dynamic client-side\
    \ behavior—shielding the developer from the intricacies of JavaScript programming.\n\
    \n### 3-6\\. Storing Computed Values\n\n#### Problem\n\nYou need to run certain\
    \ values keyed in through the form through some computation before storing the\
    \ final value in the database. Using the sample `Salaries` table in Recipe 3-3\
    \ as an example, you might want run some computations on the salary before saving\
    \ the amount in the database.\n\n#### Solution\n\nTo create a computed field in\
    \ your form, follow these steps:\n\n1.  Navigate to the Page Definition area of\
    \ the Salaries form. Right-click on the Computations node in the `After Submit`\
    \ root node under the Page Processing section.\n2.  In the first page of the wizard,\
    \ choose the Item on This Page location type. In the next page, select P1_SALARY\
    \ for the Compute Item field and PL/SQL Function Body for the `type` field.\n\
    3.  In the next page, you will be able to specify the computation to apply. For\
    \ instance, you may use the following PL/SQL to specify that all salary entered\
    \ should be stored with a 20% extra increment in the database: `return (:P1_SALARY\
    \ * 20)/100 + :P1_SALARY`\n4.  Save your changes and run the form. Try keying\
    \ in a value of 500 in the salary field (as shown in [Figure 3-17](#Chapter03.html#fig_3_17))\
    \ and creating the record.\n\n    ![images](images/0317.jpg)\n\n    ***Figure\
    \ 3-17.** Running the Salaries form*\n\n5.  Now, inspect your database using the\
    \ Object Browser. You can see that the computation has been applied on your data\
    \ (as shown in [Figure 3-18](#Chapter03.html#fig_3_18)).\n\n![images](images/0318.jpg)\n\
    \n***Figure 3-18.** The computed value stored in the database*\n\n#### How It\
    \ Works\n\nAPEX computations allow you to apply computational algorithms at different\
    \ events in your form. It can be used to either display a computed value (for\
    \ example, a monetary amount after a currency conversion) to the end user (through\
    \ a read-only text page item field) or to save the computed value in the database.\n\
    \n### 3-7. Interacting with a Web Service\n\n#### Problem\n\nWhen you click a\
    \ button in your form, you need to connect to a web service, pass it a parameter,\
    \ and have the web service return a value that you can then display on your form.\
    \ For example, you may want to display the latest currency conversion rate (retrieved\
    \ from a web service) for two different currencies specified through your form.\n\
    \n#### Solution\n\nTo test the solution in this recipe, you will first need to\
    \ set up a sample form. After that, you need to add a reference to the web service\
    \ to your application. Finally, you will need to make use of that reference in\
    \ your form. Let's start by creating the sample form.\n\n##### Creating the Sample\
    \ Form\n\nTo create the sample form used in this recipe, follow these steps:\n\
    \n1.  The first thing you need to do is to create a sample form to key in the\
    \ currency codes (and to also display, in the same form, the currency rate retrieved\
    \ via the web service).\n2.  Create a new application and add a blank page to\
    \ the application. In the Page Definition > Page Rendering area, create a new\
    \ page item (a TEXT field) named P1_FROMCODE. Use default settings for this page\
    \ item. After that, create another text field page item named P1_TOCODE with similar\
    \ settings. Next, create a NUMBER field page item named P1_RETURNEDRATE.\n3. \
    \ Next, create a button in the form. Right click on the Items node and choose\
    \ Create Button. Specify P1_GETCURRENCYRATE as the name of the button, set the\
    \ Label field as Get Currency Rate, and change the `button style` to a HTML Button\
    \ (as shown in [Figure 3-19](#Chapter03.html#fig_3_19)). Finally, click Create\
    \ Button.\n\n    ![images](images/0319.jpg)\n\n    ***Figure 3-19.** Configuring\
    \ the Get Currency Rate button*\n\n4.  You should now have the screen shown in\
    \ [Figure 3-20](#Chapter03.html#fig_3_20).\n\n![images](images/0320.jpg)\n\n***Figure\
    \ 3-20.** The list of page items in the CurrencyRateReq form*\n\n##### Adding\
    \ the Web Service Reference\n\nTo add a web service reference to your application,\
    \ follow these steps:\n\n1.  You now need to add the reference to the web service.\
    \ Navigate to your application home, and click the Shared Components icon. In\
    \ the Logic section, click Web Service References. Click on the Create button\
    \ to add a new web service reference.\n2.  In the first page of the wizard, choose\
    \ the Based on WSDL option. Click No when asked if you would like to search a\
    \ UDDI registry to find the WSDL. In the next page of the wizard, specify [`www.webservicex.net/CurrencyConvertor.asmx?wsdl`](http://www.webservicex.net/CurrencyConvertor.asmx?wsdl)\
    \ in the WSDL Location field (as shown in [Figure 3-21](#Chapter03.html#fig_3_21)).\n\
    \n    ![images](images/0321.jpg)\n\n    ***Figure 3-21.** The web service URL*\n\
    \n3.  Click the Finish button. The web service should be created successfully."
  trans: "#### 工作原理\n\n动态操作是在特定页面项目上应用的客户端行为，通常使用 JavaScript 和 AJAX 的组合实现。APEX 提供了向导（例如你之前在本配方中看到的那个）来自动生成客户端行为。如果你想实现以下功能，动态操作非常有用：\n\
    \n*   当表单上发生某些事件时（例如：输入了特定数据或某个字段被双击），动态隐藏或显示表单的某些部分。\n*   当表单上发生某些事件时，启用或禁用表单上的某些字段。\n\
    \n![images](img/square.jpg) **注意** 过去，APEX 开发人员必须手动编写 JavaScript/AJAX 代码来创建动态行为。在\
    \ Apex 4.0 中，向导允许你轻松生成动态客户端行为——将开发人员从复杂的 JavaScript 编程中解放出来。\n\n### 3-6. 存储计算值\n\
    \n#### 问题\n\n你需要对通过表单输入的某些值进行计算，然后再将最终值存储到数据库中。以配方 3-3 中的示例 `Salaries` 表为例，你可能希望在将金额保存到数据库之前，对工资进行一些计算。\n\
    \n#### 解决方案\n\n要在表单中创建计算字段，请按照以下步骤操作：\n\n1.  导航到 Salaries 表单的页面定义区域。在页面处理部分的 `After\
    \ Submit` 根节点下，右键单击 Computations 节点。\n2.  在向导的第一页，选择“此页面上的项目”位置类型。在下一页中，为 Compute\
    \ Item 字段选择 `P1_SALARY`，为 `type` 字段选择 `PL/SQL Function Body`。\n3.  在下一页，你将能够指定要应用的计算。例如，你可以使用以下\
    \ PL/SQL 来指定所有输入的工资在存储到数据库时都应增加 20%：`return (:P1_SALARY * 20)/100 + :P1_SALARY`\n\
    4.  保存你的更改并运行表单。尝试在工资字段中输入值 500（如 图 3-17 所示）并创建记录。\n\n    ![images](img/0317.jpg)\n\
    \n    ***图 3-17.** 运行 Salaries 表单*\n\n5.  现在，使用对象浏览器检查你的数据库。你可以看到计算已应用于你的数据（如\
    \ 图 3-18 所示）。\n\n![images](img/0318.jpg)\n\n***图 3-18.** 存储在数据库中的计算值*\n\n####\
    \ 工作原理\n\nAPEX 计算允许你在表单的不同事件上应用计算算法。它可用于向最终用户显示计算值（例如，货币转换后的金额）（通过只读文本页面项目字段），或将计算值保存在数据库中。\n\
    \n### 3-7. 与 Web 服务交互\n\n#### 问题\n\n当你在表单中单击一个按钮时，需要连接到一个 Web 服务，向其传递一个参数，并让 Web\
    \ 服务返回一个值，然后你可以在表单上显示该值。例如，你可能希望显示通过表单指定的两种不同货币的最新汇率（从 Web 服务检索）。\n\n#### 解决方案\n\
    \n要测试本配方中的解决方案，你首先需要设置一个示例表单。之后，你需要将对 Web 服务的引用添加到你的应用程序中。最后，你需要在表单中使用该引用。让我们从创建示例表单开始。\n\
    \n##### 创建示例表单\n\n要创建本配方中使用的示例表单，请按照以下步骤操作：\n\n1.  你需要做的第一件事是创建一个用于输入货币代码的示例表单（并在同一表单中显示通过\
    \ Web 服务检索到的汇率）。\n2.  创建一个新应用程序并向该应用程序添加一个空白页面。在“页面定义 > 页面呈现”区域中，创建一个名为 `P1_FROMCODE`\
    \ 的新页面项目（文本字段）。为此页面项目使用默认设置。之后，创建另一个文本字段页面项目 `P1_TOCODE`，设置类似。接下来，创建一个名为 `P1_RETURNEDRATE`\
    \ 的数字字段页面项目。\n3.  接下来，在表单中创建一个按钮。右键单击“项目”节点并选择“创建按钮”。指定 `P1_GETCURRENCYRATE` 作为按钮的名称，将“标签”字段设置为“获取货币汇率”，并将\
    \ `按钮样式` 更改为“HTML 按钮”（如 图 3-19 所示）。最后，单击“创建按钮”。\n\n    ![images](img/0319.jpg)\n\
    \n    ***图 3-19.** 配置“获取货币汇率”按钮*\n\n4.  你现在应该看到如 图 3-20 所示的屏幕。\n\n![images](img/0320.jpg)\n\
    \n***图 3-20.** CurrencyRateReq 表单中的页面项目列表*\n\n##### 添加 Web 服务引用\n\n要向你的应用程序添加\
    \ Web 服务引用，请按照以下步骤操作：\n\n1.  你现在需要添加对 Web 服务的引用。导航到你的应用程序主页，然后单击“共享组件”图标。在“逻辑”部分，单击“Web\
    \ 服务引用”。单击“创建”按钮以添加新的 Web 服务引用。\n2.  在向导的第一页，选择“基于 WSDL”选项。当被问及是否要搜索 UDDI 注册表以查找\
    \ WSDL 时，选择“否”。在向导的下一页，在 WSDL 位置字段中指定 [`www.webservicex.net/CurrencyConvertor.asmx?wsdl`](http://www.webservicex.net/CurrencyConvertor.asmx?wsdl)（如\
    \ 图 3-21 所示）。\n\n    ![images](img/0321.jpg)\n\n    ***图 3-21.** Web 服务 URL*\n\
    \n3.  单击“完成”按钮。Web 服务应成功创建。"
- fmt: "## Calling the Web Service from Your Form\n\nTo make use of the web service\
    \ reference in your form, follow these steps:\n\n1.  In the Page Definition `images/U001.jpg`\
    \ Page Processing area, right click on `Processes` under After Submit and click\
    \ the Create button.\n2.  Choose the Web Services process type. In the next page,\
    \ specify a name for the process. In the following page, choose the `CurrencyConverter`\
    \ web service in the Web Service Reference field. Another Operation field will\
    \ appear instantly. Choose the `ConversionRate` operation. This will, in turn,\
    \ show a list of input parameters and output parameters for the webservice method.\n\
    3.  For the `From Currency` parameter in the Webservice Input Parameters section,\
    \ use the little arrow button on the right of the text field to choose the `P1_FROMCODE`\
    \ field from a pop-up list. Choose `P1_TOCODE` for the `To Currency` field. Make\
    \ sure the Source for both parameters is set to Item.\n4.  For the Webservice\
    \ Output Parameters section, choose to store the results in `Items`. Specify `P1_RETURNEDRATE`\
    \ in the Value field of the `ConversionRateResult` parameter. When you are done\
    \ with the configuration, you should have something that looks like the screenshot\
    \ in [Figure 3-22](#Chapter03.html#fig_3_22).\n\n    ![images](images/0322.jpg)\n\
    \n    Figure 3-22. Specifying web service details\n\n5.  In the next page of the\
    \ wizard, you can specify a success and error message to display when the web\
    \ service call succeeds or fails, respectively. Proceed to the next step of the\
    \ wizard where you can choose to have the web service called when the Get Currency\
    \ Rate button on your form is clicked. Choose `P1_GETCURRENCYRATE` in the When\
    \ Button Pressed field (as shown in [Figure 3-23](#Chapter03.html#fig_3_23)).\n\
    \n    ![images](images/0323.jpg)\n\n    Figure 3-23. Hooking up the web service\
    \ execution to the Get Currency Rate button\n\n6.  Finally, click the Create Process\
    \ button to complete the wizard. Now run your form. Specify the three-letter currency\
    \ code in the `FromCode` and `ToCode` fields, and click the Get Currency Rate\
    \ button. You should be able to see the currency rate returned in the `ReturnedRate`\
    \ field (as shown in [Figure 3-24](#Chapter03.html#fig_3_24)).\n\n    ![images](images/0324.jpg)\n\
    \n    Figure 3-24. The web service call in action\n\n![images](images/square.jpg)\
    \ **Note** As the web service used in this example is hosted online, you will\
    \ need to ensure that the server hosting your APEX instance has a live connection\
    \ to the Internet for this sample to work.\n\n### How It Works\n\nThe Web Service\
    \ References section provides a global shared area that allows you to define web\
    \ service data sources. Centralizing your web service references in one location\
    \ instead of hard-coding them all over your application can make your application\
    \ easier to maintain when the URL or address of the web service changes.\n\nWeb\
    \ services can be called at any point in the execution of your form—when your\
    \ form loads up, when a button is clicked, or when a particular condition is met.\
    \ APEX also supports two different types of web-services: RESTful web services\
    \ and WSDL-based web services.\n\n## 3-8. Running a PL/SQL Process when Saving\
    \ the Page\n\n### Problem\n\nUpon submitting a form, you want to save some of\
    \ the data entered through the form in a separate table. For example, you have\
    \ a Patient Discharge form. When you create a record in this form, you need to\
    \ create a corresponding entry in the Payment History form.\n\n### Solution\n\n\
    To run a PL/SQL process when saving the page, follow these steps:\n\n1.  Create\
    \ the sample tables in Recipe 3-1.\n2.  Create a new database application/standard\
    \ data entry form over the `PATIENTDISCHARGE` table.\n3.  In the Page Definition\
    \ `images/U001.jpg` Page Processing area of the Patient Discharge form, right\
    \ click on the `Processes` node under the Processing node, and choose the Create\
    \ menu item.\n4.  In the first step of the wizard, choose the `PL/SQL` item.\n\
    5.  Specify the name of the process in the next page of the wizard, and select\
    \ On Submit - After Computations and Validations for the Point field.\n6.  In\
    \ the next page, specify the PL/SQL shown in [Listing 3-11](#Chapter03.html#list_3_11).\
    \ You should now have the screen shown in [Figure 3-25](#Chapter03.html#fig_3_25).\n\
    \n    Listing 3-11. Inserting Data into Another Table\n\n    ```sql\n    INSERT\
    \ INTO PAYMENTHISTORY(SOCIALSECURITYNO,AMOUNTPAID) VALUES (:P1_PATIENTSOCIALSECURITYNO,0)\n\
    \    ```\n\n    ![images](images/0325.jpg)\n\n    Figure 3-25. Specifying the\
    \ process details\n\n7.  Save your changes and run the form now. Key in 99999999\
    \ in the Social Security Number field and create the record. Using the Object\
    \ Browser, open the `PAYMENTHISTORY` table. You should be able to see a new record\
    \ automatically created in this table with the Social Security number 99999999.\n\
    \n### How It Works\n\nA process is a server-side task that executes when a certain\
    \ event occurs in your form. There are a number of different process types that\
    \ can be generated via the wizard (for example, running a PL/SQL script, sending\
    \ an e-mail, or calling a web service). You can even create processes to dynamically\
    \ modify session states in your application. Through the wizard, processes can\
    \ also be tied to button items on your form such that when a button is clicked\
    \ on the form, the process would immediately execute.\n\n![images](images/square.jpg)\
    \ **Tip** Processes can also be initiated from client-side JavaScript events.\
    \ By inspecting postback parameters, different server-side processes can be made\
    \ to execute.\n\n## 3-9. Sending an E-mail from the Form\n\n### Problem\n\nYou\
    \ need to send an e-mail when you click a button on the form. You also want to\
    \ use data entered through the form as various parameters in the e-mail."
