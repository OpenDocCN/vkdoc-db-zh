    \ 10-1](#Chapter10.html#tab_10_1) describes the mapping between the various keys\
    \ in each respective table.\n\n***Table 10-1.** Foreign Key Mapping Between Different\
    \ Tables in the Book Catalog Application*\n\n| **Foreign key mapping** | **Description**\
    \ |\n| --- | --- |\n| `Books.BookID = Inventory.BookID` | Each book has a corresponding\
    \ entry in the Inventory table that stores the stockcount details for the book.\
    \ |\n| `Books.BookCategory = Category.CategoryID` | Each book belongs to a genre/category,\
    \ the details of which are stored in the Category table. The ID stored in the\
    \ `Books.BookCategory` column looks up the corresponding entry in the `Category`\
    \ table. |\n\n### 10-2. Creating the Pages to Manage the List of Books\n\n####\
    \ Problem\n\nThe storekeeper needs a way to manage the list of books in his book\
    \ catalog."
  trans: "## 一个迷你图书目录网站\n\n在最后一章中，你将探索一个在线图书目录的真实场景，并学习如何运用 APEX 在数小时内创建它。可以将这个目录视为一个书店的初始雏形——你甚至不会实现类似购物车这样的功能，但你会运用贯穿本书前面章节所学的各种\
    \ APEX 技巧和特性。\n\n在创建在线图书目录之前，让我们先定义一下要构建的应用范围。该应用程序将分为两个主要区域——网站的**管理部分**（用户可在其中管理可用书籍列表）和**前端**（即公众可见的实际图书目录）。\n\
    \n此外，你将创建一个图表报表，让店主可以查看商店中所有书籍的当前库存数量。最后，你将通过使用导航列表和标签页为应用程序提供一个合适的导航方案，将所有这些独立的页面整合在一起。\n\
    \n### 10-1. 为你的图书目录设置主要对象\n\n#### 问题\n\n你需要为图书目录设置底层的数据库表和示例记录（书籍）。\n\n#### 解决方案\n\
