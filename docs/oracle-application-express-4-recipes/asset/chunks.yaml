    # Oracle APEX 简介


    我仍然记得十年前为一家猎头公司部署了我的第一个 `Microsoft Access` 应用程序。他们拥有大约 200 名用户（我仿佛已经听到你们中一些人的抱怨声），并且需要一个系统来管理求职者和希望雇佣他们的公司。然后，他们给了我这个只有两个人的微不足道的开发团队一个“不可妥协”的一个月期限，要求我们在这一个月内完成系统的构思、开发和测试——并在之后立即上线。


    任何一个有自尊心的企业开发团队都会对这个荒谬的时间安排一笑置之，但由于一些我们自己也不清楚的原因（尽管我认为这份工作提供的丰厚报酬与我们的决定有关），我们决定尝试一下。我们求助于遥远的
    `快速应用程序开发（RAD）` 领域。我们找到了一个匹配的工具 `Microsoft Access`，在确认实际用户并发率足够低，可以绕过 `Access`
    的并发限制后，我们接下了这份工作。


    我们这个两人团队成功地在一个月的时间内开发并部署了该应用程序，这家机构在升级系统前至少使用了它五年。这个故事的关键点在于，如果没有 `RAD` 工具，有些项目可能永远无法面世。直到今天，像我这样的故事仍在互联网的许多角落回响。


    自那时起，`RAD` 工具已经取得了长足的进步。既然现在大多数企业解决方案完全部署在 `Web` 上，`RAD` 工具跟上这一趋势也就顺理成章了，而它们也确实做到了。从更简单的应用程序创建工具，如基于云的
    `Zoho App Creator` 和 `Google Apps`，到更“严肃”的工具如 `APEX` 和 `Ruby on Rails`，它们都已在 `Web`
    上首次亮相；现在，任何人要建立自己的销售团队应用程序或在线书店应用程序，并将它们全部托管在 `互联网` 上，都变得前所未有的容易，只需（比喻性地）点击一下按钮。


    `RAD` 工具在业务场景中表现得异常出色；首先是因为业务应用程序通常是 `基于 Web 的`，其次是因为它们主要由 `CRUD（创建、读取、更新和删除）`
    操作组成，这些是每个 `以数据库为中心` 的应用程序的核心原子操作。出于同样的原因，`APEX` 是其中的佼佼者；它与 `Oracle` 数据库紧密集成，并通过
    `PL/SQL` 很好地处理 `CRUD`。`APEX` 作为一个平台位于数据库之上，正因如此，你从 `APEX` 开发出的应用程序享有数据库可用的所有好处（例如，集群支持）。


    在本章中，你将通过几个实践案例来了解 `APEX`，这些案例将帮助你快速上手并运行 `APEX`。这些案例也将作为一种入门指南，让你熟悉基本的 `APEX`
    概念。你还将学习如何使用 `APEX` 中提供的一些团队开发工具。


    ## 1-1. 决定是否使用 APEX


    ### 问题


    你的老板刚给你分配了一个新项目。你不确定 `APEX` 是否是适合该项目的工具。


    ### 解决方案


    `APEX` 提供更短的开发时间和易用性，但在某些情况下，它并非项目的最佳工具。在使用一个工具之前，了解其全部功能和局限性很重要。如果满足以下条件，请考虑为项目使用
    `APEX`：


    *   目标应用程序是一个 `基于 Web 的` 应用程序，主要由 `CRUD` 操作组成。

    *   `Oracle` 是你的应用程序唯一需要支持的数据库，或者迁移到不同数据库供应商的可能性极小。

    *   你的项目开发时间紧迫。

    *   你的开发方法论要求快速、连续的原型迭代，或者需求经常变化。

    *   你的应用程序需要处理高交易量。

    *   你的开发团队精通 `PL/SQL` 和 `JavaScript`。


    在以下情况下，请避免使用 `APEX`：


    *   你的应用程序包含需要非 `CRUD` 架构的模块，例如消息驱动或事件驱动的架构。

    *   你的应用程序需要在逻辑层和表示层都有很高的对象重用性，并且需要严格遵循传统的框架，如 `面向对象编程（OOP）` 或 `模型-视图-控制器（MVC）`。

    *   你的应用程序包含复杂的表单，每页超过 100 个数据库项目（例如：可输入字段）。（我想指出，从用户界面的角度来看，在单个页面中放置 100 个或更多字段是非常糟糕的设计。但是，你的项目需求可能无论如何都要求你这样做。如果是这样，请记住
    `APEX` 的这个限制。）

    *   你的应用程序包含的报表需要在同一个报表中显示超过 100 列。

    *   你的应用程序包含的表需要超过两列作为主键。

