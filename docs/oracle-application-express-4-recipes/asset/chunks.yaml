- fmt: "## How It Works\n\nAPEX is a platform that can be used by several development\
    \ teams simultaneously. Each workspace represents the working area for a team\
    \ of developers. Inside each workspace, developers can create multiple applications.\
    \ For instance, Team Alpha might be working on two applications (a sales force\
    \ and a HRM application) while Team Beta might be working on an online bookstore\
    \ application. This is summarized in [Figure 1-8](#Chapter01.html#fig_1_8).\n\n\
    ![images](images/0108.jpg)\n\n`Figure 1-8. APEX workspaces`\n\nWithin the context\
    \ of an APEX workspace, there are a number of different objects and subobjects\
    \ that can be created. [Figure 1-9](#Chapter01.html#fig_1_9) illustrates the relationship\
    \ between these different types of objects. If you get confused by the jargon\
    \ again, refer to [Table 1-2](#Chapter01.html#tab_1_2) for the definitions of\
    \ these objects.\n\n![images](images/0109.jpg)\n\n`Figure 1-9. The relationship\
    \ between various APEX objects`\n\n![images](images/square.jpg) `Note` The atomic\
    \ unit of a database application is a page. A database application essentially\
    \ consists of a bunch of pages that can be a mix of data entry screens, reports,\
    \ or tabular listings of data.\n\n### 1-5. Setting up a Workspace for Team-based\
    \ Development\n\n#### Problem\n\nYou have just installed APEX. You now need to\
    \ create a workspace so that development team Alpha (Sally and John) can develop\
    \ their sales force application.\n\n#### Solution\n\nHere is how to set up for\
    \ team-based development:\n\n1.  Log in to the APEX portal by typing [`http://yourserver:8080/apex`](http://yourserver:8080/apex)\
    \ in the address bar of your browser.\n    ![images](images/square.jpg) `Note`\
    \ Replace `yourserver` with your server name or IP address. If you have installed\
    \ APEX locally, replace `yourserver` with `localhost`.\n2.  In the login window,\
    \ specify `Internal` as the workspace, and login as the Administrator using the\
    \ username and password you created earlier in Recipe 1-3.\n3.  After logging\
    \ in successfully, click the `Manage Workspaces` menu item. Click on the `Create\
    \ Workspace` link under the `Workspace Actions` section. Specify a workspace name,\
    \ ID, and description in the ensuing page. You should now see the page shown in\
    \ [Figure 1-10](#Chapter01.html#fig_1_10).\n    ![images](images/0110.jpg)\n \
    \   `Figure 1-10. Creating a workspace`\n4.  Click the `Next` button to continue.\
    \ In this page, you can specify to use an existing database schema or to create\
    \ a new one for the workspace. [Figure 1-11](#Chapter01.html#fig_1_11) shows how\
    \ you can create a new schema for the workspace.\n    ![images](images/0111.jpg)\n\
    \    `Figure 1-11. Creating a new schema for the workspace`\n5.  Next, you'll\
    \ be required to specify the `Workspace Administrator` user, password, and e-mail.\
    \ See [Figure 1-12](#Chapter01.html#fig_1_12).\n    ![images](images/0112.jpg)\n\
    \    `Figure 1-12. Specifying the Administrator details`\n6.  Click the `Next`\
    \ button to continue. Click through the remaining pages of the wizard to confirm\
    \ workspace creation. You can browse your existing workspaces by navigating to\
    \ the `Manage Workspace` ![images](images/U001.jpg) `Workspace Reports` ![images](images/U001.jpg)\
    \ `Existing Workspaces` link. After you click the link, you should be able to\
    \ see the `Alpha` workspace you have just created (highlighted in [Figure 1-13](#Chapter01.html#fig_1_13)).\n\
    \    ![images](images/0113.jpg)\n    `Figure 1-13. The team Alpha workspace`\n\
    7.  Now you will need to add the user accounts for the developers Sally and John\
    \ to the workspace. Click on the `Manage Workspaces` menu, then click on the `Manage\
    \ Developers and Users` link under the `Workspace Actions` section. In the ensuing\
    \ page, click the yellow-colored `Create User` button, and fill in the details\
    \ of the user in the next page. Be sure to select the `WORKSPACE ALPHA` workspace\
    \ you created earlier as the workspace for this user account. [Figure 1-14](#Chapter01.html#fig_1_14)\
    \ illustrates this in detail. Click the `Create` button after you have filled\
    \ in the form.\n    ![images](images/0114.jpg)\n    `Figure 1-14. Creating a developer`\n\
    8.  Upon creating the user, you should be able to see the newly created account\
    \ in the `Manage Developers and Users` page. It is now time to try logging on\
    \ to your workspace as a developer. Click the `Logout` link in the top right corner\
    \ of the page, and click the `Login` link to navigate to the `Login` page again.\
    \ In the login page, specify `WORKSPACE ALPHA` as your workspace name, and specify\
    \ the username and password for the developer account you created earlier (as\
    \ shown in [Figure 1-15](#Chapter01.html#fig_1_15)).\n    ![images](images/0115.jpg)\n\
    \    `Figure 1-15. Logging on to your workspace`\n9.  Click the `Login` button.\
    \ If you were able to log on successfully, you should be able to see the workspace\
    \ home page shown in [Figure 1-16](#Chapter01.html#fig_1_16).\n    ![images](images/0116.jpg)\n\
    \    `Figure 1-16. The workspace home page`\n\n#### How It Works\n\nWorkspaces,\
    \ as introduced earlier in Recipe 1-4, represent the working area for a development\
    \ team. For instance, in a typical APEX deployment, each department may be given\
    \ their own workspace, which is self-administered and separate from other departments.\n\
    \nAn APEX workspace can be configured to map to one or more database schemas.\
    \ This allows any application, form, or report created in this APEX workspace\
    \ to inherit all the permissions in the associated database schema. (Your application\
    \ code would have access to all the database objects in that schema, as if it\
    \ were logged on directly to that schema).\n\nIn a typical organization, an APEX\
    \ Administrator would create workspaces as required for different development\
    \ teams, then individually add the appropriate developer accounts for each workspace.\n\
    \n![images](images/square.jpg) `Caution` APEX workspaces are not to be confused\
    \ with database workspaces. The latter is a shared virtual environment in which\
    \ users can make version-controlled changes to data in a table. Database workspaces\
    \ are a part of the `Oracle Workspace Manager`, a feature of the Oracle database.\n\
    \n### 1-6. Managing the Development Process\n\n#### Problem\n\nAs project manager,\
    \ you have established a set of features, milestones, and tasks for your development\
    \ team. You need to leverage on the `Software Configuration Management` features\
    \ of APEX to track the progress of your project."
