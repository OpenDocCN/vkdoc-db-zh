    1.  导出应用程序。\n2.  使用新的应用程序 ID 将应用程序导入同一工作区/模式。\n\n对于大型组织，应采用独立于生产服务器的开发服务器（用于开发和测试你的应用程序）。在这种情况下，以下部署方法可能更合适：\n\
    1.  导出应用程序。\n2.  将应用程序导入不同的工作区（和/或模式）。\n\n如果你需要部署到完全独立的服务器（例如，在客户办公室部署），请采用以下部署方法：\n\
    1.  导出应用程序。\n2.  将应用程序导入目标 Oracle APEX 实例（使用不同的模式/数据库安装它）。\n\n#### 工作原理\n\n许多大型组织在开发服务器上进行开发，将他们的应用程序转移到预演或用户接受测试（UAT）服务器，并在系统获得用户批准后，再转移到生产服务器。这种类型的部署相当常见，并且有多种方法可以隔离或共享你的\
    \ APEX 实例、工作区和模式。一个常见的设置如图 9-1 所示。\n\n![images](img/0901.jpg)\n\n**图 9-1. 典型的部署策略**\n\
    \n对于非常小的部署（和非关键系统），有时可以接受在同一实例和工作区中部署应用程序的开发版本和生产版本。这种方法的好处包括不必管理许多不同的工作区，并通过消除将应用程序交付给用户所需的任何部署来节省时间。\n\
    \n然而，对于其他所有情况，一个好的经验法则是开发实例和生产实例应该完全在不同的 APEX 实例上。由于开发实例通常用作测试平台，将实时生产系统放在同一个\
    \ APEX 实例中从来不是一个好主意。至少，你应该使用不同的工作区来分隔开发实例和生产实例，这样开发人员就不可能修改正在运行的实时应用程序。\n\n###\
    \ 9-2. 生成应用程序依赖项列表\n\n#### 问题\n\n你已准备好导出你的应用程序，但你的应用程序使用了跨多个模式的多种数据库对象，你不确定在导出中是否涵盖了你的应用程序所使用的所有底层数据库对象。"
- fmt: "## Solution\n\nTo use the Database Object Dependencies report to view all\
    \ the dependencies of your application, follow these steps.\n\n1.  Log in to the\
    \ application builder.\n2.  Open the application you wish to export.\n3.  Click\
    \ on the Utilities icon at the top of the page, as shown in [Figure 9-2](#Chapter09.html#fig_9_2).\n\
    \n    ![images](images/0902.jpg)\n\n    `Figure 9-2. The Utilities icon`\n\n4.\
    \  Click on the Database Object Dependencies icon in the following page, as shown\
    \ in [Figure 9-3](#Chapter09.html#fig_9_3).\n\n    ![images](images/0903.jpg)\n\
    \n    `Figure 9-3. The Database Object Dependencies icon`\n\n5.  On the following\
    \ page, click the Compute Dependencies link in the top right corner.\n6.  You\
    \ should now see a table in the main area of the page describing all the objects\
    \ currently used by the application, as shown in [Figure 9-4](#Chapter09.html#fig_9_4).\n\
    \n    ![images](images/0904.jpg)\n\n    `Figure 9-4. The Database Object Dependencies\
    \ report`\n\n## How It Works\n\nThe Database Object Dependency viewer provides\
    \ a one-page summary of all the database objects that are used by your application.\
    \ This will be useful when deciding which objects to export from your application.\n\
    \n## 9-3. Exporting an Application\n\n### Problem\n\nYou want to export an application\
    \ from one schema or instance in preparation for deploying that application to\
    \ a production environment.\n\n### Solution\n\nTo export an application, follow\
    \ these steps:\n\n1.  Log in to the application builder.\n2.  Open the application\
    \ you wish to export.\n3.  Click the Import/Export icon at the top of the page,\
    \ as highlighted in [Figure 9-5](#Chapter09.html#fig_9_5).\n\n    ![images](images/0905.jpg)\n\
    \n    `Figure 9-5. The Export/Import icon`\n\n4.  On the next page, choose Export\
    \ and click the Next button.\n5.  On the next page, confirm the application that\
    \ you wish to export, and choose the DOS file format, as shown in [Figure 9-6](#Chapter09.html#fig_9_6).\n\
    \n    For users of UNIX operating systems, choose the UNIX file format instead.\
    \ The main difference in the different exported file formats is how lines end:\
    \ UNIX-based file formats end with an `LF` character and Windows-based file formats\
    \ end with a `CR/LF` character.\n\n    ![images](images/0906.jpg)\n\n    `Figure\
    \ 9-6. Exporting the application`\n\n6.  Click the Export application button.\
    \ This will prompt the export. At the end of the process (which should take a\
    \ few seconds), you will be prompted to download the generated file (an `.sql`\
    \ file), as shown in [Figure 9-7](#Chapter09.html#fig_9_7).\n\n    ![images](images/0907.jpg)\n\
    \n    `Figure 9-7. Saving the exported SQL file`\n\n### How It Works\n\nAn application\
    \ in `APEX` consists of metadata, data, and business logic, and all of it sits\
    \ nicely in the Oracle database. When you export an application, it exports all\
    \ the metadata into an SQL file. By running this SQL file, it will rebuild the\
    \ entire application from scratch on the target machine.\n\nIf you open the exported\
    \ file in a text editor (such as Notepad), you will see that the content of the\
    \ file are mostly `PL/SQL` function calls and `DML` that specifies the schema\
    \ of your database and application objects. This is shown in [Figure 9-8](#Chapter09.html#fig_9_8).\n\
    \n![images](images/0908.jpg)\n\n`Figure 9-8. Exploring the contents of the exported\
    \ SQL file`\n\n**Tip** It is thus possible to open the SQL file in a text editor,\
    \ hand-edit the values and import the updated SQL into another `APEX` instance.\
    \ (This is only recommended if you know what you are doing!)\n\n## 9-4. Importing\
    \ an Application\n\n### Problem\n\nYou need to import an application that you\
    \ have just exported from another instance of `APEX`.\n\n**Note** This recipe\
    \ demonstrates a manual import method. Recipe 9-5 shows how to use `SQL*Plus`\
    \ to script an import to run automatically.\n\n### Solution\n\nUse the Application\
    \ Builder to walk through the import process using a convenient, GUI interface.\
    \ Follow these steps:\n\n1.  Log in to the application builder.\n2.  Open the\
    \ application you wish to import.\n3.  Click the Import/Export icon at the top\
    \ of the page.\n4.  In the next page, choose Import and click the Next button.\n\
    5.  In the next page, browse for the `.sql` file in the Import File field.\n6.\
    \  In the File Type field, choose the Database Application, Page, or Component\
    \ Export option, as shown in [Figure 9-9](#Chapter09.html#fig_9_9).\n\n    ![images](images/0909.jpg)\n\
    \n    `Figure 9-9. Importing an SQL file`\n\n7.  Once you click the Next button,\
    \ a little progress bar will appear at the top of the page indicating the progress\
    \ of the import.\n8.  Once the import has successfully completed, you are given\
    \ the option to install the application, as shown in [Figure 9-10](#Chapter09.html#fig_9_10).\n\
    \n    ![images](images/0910.jpg)\n\n    `Figure 9-10. Successfully imported message`\n\
    \n9.  Click the Next button to install the application.\n\n    **Tip** After you\
    \ import a file, it ends up in an internal repository called the APEX export repository.\
    \ You can't use an imported file in any way until you install it.\n\n10. You are\
    \ now greeted with a page that allows you to specify the schema and the application\
    \ ID to use for the new application.\n11. Choose the Auto Assign New Application\
    \ ID item, as shown in [Figure 9-11](#Chapter09.html#fig_9_11) below, and click\
    \ the Install button to proceed.\n\n    ![images](images/0911.jpg)\n\n    `Figure\
    \ 9-11. Installing the application`\n\n12. You should see a progress bar indicating\
    \ the progress of the import.\n13. Once the import has completed, you should see\
    \ a screen that lets you choose to create the supporting objects for the application.\
    \ In this page, choose the Yes option for the Install Supporting Objects field,\
    \ as shown in [Figure 9-12](#Chapter09.html#fig_9_12).\n\n    ![images](images/0912.jpg)\n\
    \n    `Figure 9-12. Creating the database supporting objects`\n\n14. Click the\
    \ Next button to proceed.\n15. You will be presented with a confirmation screen.\
    \ Click the Install button to continue with the installation.\n16. After the installation\
    \ completes, you will be presented with the screen shown in [Figure 9-13](#Chapter09.html#fig_9_13).\n\
    \n    ![images](images/0913.jpg)\n\n    `Figure 9-13. The last step of the install\
    \ wizard`\n\n17. Now go back to your main workspace area. You should see your\
    \ new application. If you open the application, you can see that the set of forms\
    \ in the exported application has been created in your `APEX` instance, as shown\
    \ in [Figure 9-14](#Chapter09.html#fig_9_14).\n\n    ![images](images/0914.jpg)\n\
    \n    `Figure 9-14. The imported application and its contents`\n\n### How It Works\n\
    \nThere are two ways to import an application.\n\n*   Import an application visually\
    \ through the `APEX` Application Builder window.\n*   Import an application through\
    \ `SQL*Plus`.\n\nRecipe 9-5 describes how you can import an application through\
    \ `SQL*Plus`.\n\n## 9-5. Scripting an Application Import\n\n### Problem\n\nYou\
    \ need to automate the import of an application via batch script, and therefore\
    \ you can't import the application through the Application Builder interface."
