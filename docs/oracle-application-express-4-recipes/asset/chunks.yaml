  trans: "\n## 解决方案\n\n首先，您需要设置复制攻击场景所需的示例表和表单。为此，请按照以下步骤操作：\n\n1.  如果数据库中尚不存在清单 8-5\
    \ 中所示的表，请创建它。\n\n**清单 8-5。** 示例客户表\n\n```sql\nCREATE TABLE  \"CUSTOMERS\"\n  \
    \ (    \"ID\" NVARCHAR2(255) NOT NULL ENABLE,\n        \"NAME\" NVARCHAR2(255),\n\
    \        \"ADDRESS\" NVARCHAR2(2000),\n        \"ZIP_CODE\" NVARCHAR2(6),\n  \
    \      \"COUNTRY\" NVARCHAR2(255),\n        \"EMAIL_ADDRESS\" NVARCHAR2(255),\n\
    \        \"PHONENUMBER\" NVARCHAR2(255),\n        \"EMPLOYEEHEADCOUNT\" NUMBER(9,0),\n\
    \         CONSTRAINT \"CUSTOMERS_PK\" PRIMARY KEY (\"ID\") ENABLE\n  )\n```\n\n\
    2.  创建清单 8-6 中所示的以下示例数据。\n\n**清单 8-6。** 客户表示例数据\n\n```sql\nINSERT INTO CUSTOMERS\
    \ (ID, NAME, ADDRESS, ZIP_CODE, COUNTRY, EMAIL_ADDRESS, PHONENUMBER, EMPLOYEEHEADCOUNT)\
    \ VALUES ('1','Yakuza Corp','Akihabara,Tokyo','551119','Japan','yakuzacorp@test.com','+8112345678',30)\n\
    \nINSERT INTO CUSTOMERS (ID, NAME, ADDRESS, ZIP_CODE, COUNTRY, EMAIL_ADDRESS,\
    \ PHONENUMBER, EMPLOYEEHEADCOUNT) VALUES ('2','ACME Corp','ACME City, Texas','12345','United\
    \ States','acmecity@test.com','987654321',10)\n\nINSERT INTO CUSTOMERS (ID, NAME,\
    \ ADDRESS, ZIP_CODE, COUNTRY, EMAIL_ADDRESS, PHONENUMBER, EMPLOYEEHEADCOUNT) VALUES\
    \ ('3','Shin Corp','Bangrak, Bangkok','123456','Thailand','shincorp@test.com','12468086',15)\n\
    ```\n\n3.  现在，创建一个新应用程序，并在该应用程序中创建一个报表页面。\n4.  在报表页面创建向导中，选择创建经典报表类型。对向导中的所有步骤使用默认设置，并单击“下一步”按钮，直到到达可以指定报表\
    \ SQL 语句的步骤。\n5.  暂时只需在此区域指定 `SELECT * FROM CUSTOMERS`。\n6.  报表成功创建后，选择编辑报表。\n\
    7.  在报表的“页面渲染”区域中，您应该能在“区域” ![images](img/U001.jpg) “正文”节点下看到报表节点。右键单击报表项 (`Report\
    \ 1`)，然后选择“创建新页面项”，如图 8-13 所示。\n\n![images](img/0813.jpg)\n\n**图 8-13。** 在报表中创建新页面项\n\
    \n8.  在向导中，选择创建文本字段。在向导的下一步中，将文本字段命名为 `PSEARCH_BYNAME`，并将其标签设置为 `Search by Name`。一路单击“下一步”直到向导结束，并使用\
    \ APEX 提供的默认设置。\n9.  创建字段后，在“页面渲染”区域中右键单击 `PSEARCH_BYNAME` 项，并在弹出菜单中选择“创建按钮”项。将按钮命名为\
    \ `PSEARCH_GO` 并创建按钮。现在，您应该在报表的“页面渲染”区域中看到如图 8-14 所示的屏幕。\n\n![images](img/0814.jpg)\n\
    \n**图 8-14。** 报表中新创建的按钮\n\n10. 右键单击 `Report 1` 项，然后选择编辑报表。向下滚动到“源”部分，在“区域源”字段中，输入清单\
    \ 8-7 中所示的 SQL 语句。\n\n**清单 8-7。** 指定客户搜索 SQL\n\n```sql\nSELECT * FROM CUSTOMERS\
    \ WHERE NAME = '&PSEARCH_BYNAME.'\n```\n\n![images](img/square.jpg) **注意** `PSEARCH_BYNAME`\
    \ 后面有一个句点；别忘了保留它！\n\n11. 您现在应该看到如图 8-15 所示的屏幕。单击“应用更改”按钮保存您的更改。\n\n![images](img/0815.jpg)\n\
    \n**图 8-15。** 定义报表的 SQL\n\n12. 现在运行报表。您应该会看到一个空白报表（没有任何数据）。但是，在搜索文本框中输入 `Yakuza\
    \ Corp` 并单击“执行”按钮后，报表会刷新自身，显示匹配的客户，如图 8-16 所示。\n\n![images](img/0816.jpg)\n\n\
    **图 8-16。** 运行您的报表\n\n要执行 SQL 注入攻击，请按照以下步骤操作：\n\n1.  在搜索字段中指定清单 8-8 中所示的文本，然后单击“执行”按钮。\n\
    \n**清单 8-8。** 实施 SQL 注入攻击\n\n```\n' OR 1=1--\n```\n\n2.  您现在应该看到从表中检索到的每一个客户，如图\
    \ 8-17 所示。\n\n![images](img/0817.jpg)\n\n**图 8-17。** 实施 SQL 注入攻击\n\n3.  恭喜！您已成功入侵了自己的应用程序。\n\
    \n为了防止您的应用程序受到 SQL 注入攻击，请按照以下步骤操作：\n\n1.  再次导航到报表的“页面渲染”区域。右键单击 `Report 1` 节点，然后选择编辑报表。\n\
    2.  在“区域源”字段中，将 SQL 查询更改为清单 8-9 中所示的查询。\n\n**清单 8-9。** 使用绑定变量\n\n```sql\nSELECT\
    \ * FROM CUSTOMERS WHERE NAME = :PSEARCH_BYNAME\n```\n\n3.  您现在应该看到如图 8-18 所示的屏幕。\n\
    \n![images](img/0818.jpg)\n\n**图 8-18。** 使用绑定变量防御 SQL 注入攻击\n\n4.  应用您的更改并再次运行报表。您会发现报表照常工作，您可以按名称搜索客户。但是，这一次，如果您在搜索字段中指定\
    \ `' OR 1=1--` 并单击“执行”按钮，它不会从表中检索完整的客户列表，而是返回一个空的结果集。如图 8-19 所示。\n\n![images](img/0819.jpg)\n\
    \n**图 8-19。** 再次尝试 SQL 注入攻击，这次是在受保护的表单上。\n\n5.  您已成功保护您的报表免受 SQL 注入攻击。\n"
- fmt: "## How It Works\n\nSQL注入攻击是对网络应用最常见的攻击形式之一。通常涉及恶意用户通过操纵应用程序生成的动态SQL语句来获取未授权的数据访问。这是通过精心构造输入数据，使其成为SQL语句本身的一部分来实现的。例如，看看你原始的SQL语句。\n\
    \n`SELECT * FROM CUSTOMERS WHERE NAME = '<INPUT DATA FROM SEARCH FIELD>'`\n\n\
    如果恶意用户在搜索字段中输入`' OR 1=1--`，这会与你的SQL代码连接，变成：\n\n`SELECT * FROM CUSTOMERS WHERE\
    \ NAME = '' OR 1=1--'`\n\n![images](images/square.jpg) `Tip` 符号`--`是PL/SQL中的注释指示符，它注释掉了最后一个单引号字符，有效地将你活动的SQL语句变成了：\n\
    \n`SELECT * FROM CUSTOMERS WHERE NAME='' OR 1=1`\n\n这允许最终用户从你的数据库中检索整个客户列表！SQL注入攻击可以以多种方式使用。例如，它可以用于攻击未受保护的登录页面，最终用户只需操纵用户名或密码字段中输入的数据，就能获得对应用程序的未授权访问。\n\
    \n在本教程前面，你看到使用了以下符号：`&PSEARCH_BYNAME`。&符号表示这是一个替换变量；替换变量用于从页面上的表单字段检索数据。然后，该数据（如其名称所示）被按原样替换到目标字符串中。\n\
    \n替换变量是大多数SQL注入攻击的根本原因。因为数据只是简单地替换到SQL语句中，这允许最终用户输入的撇号最终出现在最终的SQL字符串中，导致前面提到的情况。\n\
    \n传统上，在大多数网络应用程序中，SQL注入攻击是通过转义输入数据中的单引号字符来防止的。“转义”单引号字符仅仅意味着在输入数据中的每个单引号前放置一个转义字符，使其失效。\n\
    \n在PL/SQL中，复制单引号字符是转义单引号的一种方法。例如，如果输入数据被转义，最终生成的SQL将如下所示：\n\n`SELECT * FROM CUSTOMERS\
    \ WHERE NAME=''' OR 1=1--'`\n\n![images](images/square.jpg) `Note` 上面SQL中的输入短语`'\
    \ OR 1=1--`（在转义其单引号后）被正确地视为字符串，而不是PL/SQL代码。\n\n在Oracle APEX中，有一种更好的方法来防止SQL注入攻击：使用绑定变量。绑定变量的工作方式与向存储过程传递数据非常相似。绑定变量自动将所有输入数据视为“扁平”数据，绝不会将其误认为是SQL代码。\n\
    \n将字段项声明为绑定变量的语法是使用冒号字符（:）。只需在字段项名称前加上冒号，像这样：\n\n`:PSEARCH_BYNAME`\n\n![images](images/square.jpg)\
    \ `Note` 你不必显式指定任何包围的单引号字符。APEX已经知道你变量的数据类型。\n\n在APEX中通常鼓励使用绑定变量。除了防止SQL注入攻击外，它还有其他与性能相关的好处（更多信息请参见[第7章](#Chapter07.html#ch7)）。\n\
    \n## 8-4. 防止跨站脚本（XSS）攻击\n\n### 问题\n\n你的老板打开一份APEX报告，但看到的不是每日财务数据，而是被自动重定向到一个包含不当照片的成人网站。你的老板显然很不高兴。仔细检查报告后，你发现有人在数据库的某个字段中输入了恶意JavaScript。在显示报告时，输出数据（包含JavaScript）被执行，导致恶意脚本运行。你认识到这是跨站脚本攻击。你想通过在检索报告数据进行显示时，使其中发现的任何JavaScript代码失效，来防止未来的攻击。\n\
    \n### 解决方案\n\n首先，尝试建立允许跨站脚本攻击发生的相同环境。请按照以下步骤操作：\n\n1.  在你于教程8-3中创建的相同应用程序中创建一个新报告。\n\
    2.  在报告向导中，选择“交互式报告”类型。\n3.  在向导的SQL查询步骤中，输入以下SQL查询：`SELECT * FROM CUSTOMERS`\n\
    4.  完成报告的向导设置。\n5.  在报告的“页面渲染”区域中，右键单击`NAME`报告列，选择编辑它，如[图8-20](#Chapter08.html#fig_8_20)所示。\n\
    \n    ![images](images/0820.jpg)\n\n    **图8-20.** 编辑报告中的`NAME`列\n\n6.  将“显示类型”字段的值设置为“标准报告列”，如[图8-21](#Chapter08.html#fig_8_21)所示。\n\
    \n    ![images](images/0821.jpg)\n\n    **图8-21.** 将列的显示类型更改为“标准报告列”\n\n7.  应用你的更改。现在，在同一个应用程序中创建一个新表单。选择“基于表或视图的表单”类型。\n\
    8.  在向导的下一步中，选择`Customers`表或视图。\n9.  使用默认设置完成向导的其余部分。\n\n你现在已经准备好发动攻击了。让我们通过让客户报告在最终用户尝试查看报告时自动重定向到Google网站来激怒他们。\n\
    \n1.  运行你刚刚创建的表单。\n2.  在表单的一个文本字段中，指定[清单8-10](#Chapter08.html#list_8_10)中所示的JavaScript。\n\
    \n    **清单8-10.** 恶意脚本\n\n    ```\n    <script>window.location='http://www.google.com';</script>\n\
    \    ```\n3.  你现在应该看到如[图8-22](#Chapter08.html#fig_8_22)所示的屏幕。单击“创建”按钮保存你的数据。\n\
    \n    ![images](images/0822.jpg)\n\n    **图8-22.** 进行跨站脚本攻击\n\n4.  现在运行你之前创建的报告。你会发现不可能查看报告，因为你将不断被重定向到Google网站。你刚刚成功地进行了跨站脚本攻击。\n\
    \n要防止跨站脚本攻击，你必须执行以下操作：\n\n1.  编辑你之前创建的报告。\n2.  在“页面渲染”区域中，右键单击`NAME`字段并选择编辑它。\n\
    3.  将“显示类型”字段设置为“显示为文本（转义特殊字符）”。\n4.  保存你的更改并再次运行报告。\n5.  你会发现你的报告现在可以显示了；而且，你之前输入的JavaScript已经被适当地转义，现在被视为报告数据而不是代码，如[图8-23](#Chapter08.html#fig_8_23)中红色框内所示。\n\
    \n    ![images](images/0823.jpg)\n\n    **图8-23.** 恶意脚本，现已被处理为无害\n\n6.  你可以对所有其他你希望保护的报告列重复上述步骤1到3。"
  raw: "#### How It Works\n\nThe SQL injection attack is one of the most common forms\
    \ of attack against web applications. It usually involves a malicious user gaining\
    \ unauthorized access to data by manipulating dynamic SQL statements generated\
    \ by your application. This is done so by massaging input data so that becomes\
    \ part of the SQL statement itself. For instance, take a look at your original\
    \ SQL statement.\n\n`SELECT * FROM CUSTOMERS WHERE NAME = '<INPUT DATA FROM SEARCH\
    \ FIELD>'`\n\nIf the malicious user keys in `' OR 1=1--` in the search field,\
    \ this is concatenated with your SQL code, and it becomes\n\n`SELECT * FROM CUSTOMERS\
    \ WHERE NAME = '' OR 1=1--'`\n\n![images](images/square.jpg) **Tip** The `--`\
    \ symbol is the comment indicator symbol in PL/SQL, and it comments out the last\
    \ single quote character, effectively turning your active SQL statement into\n\
    \n`SELECT * FROM CUSTOMERS WHERE NAME='' OR 1=1`\n\nThis allows the end user to\
    \ retrieve the entire list of customers from your database! A SQL injection attack\
    \ can be used in many different ways. For instance, it can be used against an\
    \ unprotected login page where an end user can gain unauthorized access to your\
    \ application simply by manipulating the data entered in the username or password\
    \ field.\n\nEarlier in this recipe, you saw that the following notation was used:\
    \ &PSEARCH_BYNAME. The ampersand indicates that this is a substitution variable;\
    \ substitution variables are used to retrieve data from form fields on a page.\
    \ This data is then (as its name implies) substituted as-is into the target string.\n\
    \nSubstitution variables are the root causes of most SQL injection attacks. Since\
    \ data is simply substituted into the SQL statement, this allows apostrophes keyed\
    \ in by the end user to end up in the final SQL string, causing the previously\
    \ mentioned scenario.\n\nTraditionally, in most web applications, SQL injection\
    \ attacks are prevented by escaping single quote characters in the input data.\
    \ “Escaping” the single quote characters simply meant placing an escape character\
    \ at the front of each single quote in the input data to render them harmless.\n\
    \nDuplicating the single quote character is a way to escape the single quote in\
    \ PL/SQL. For instance, the final SQL generated if the input data was escaped\
    \ would look like this:\n\n`SELECT * FROM CUSTOMERS WHERE NAME=''' OR 1=1--'`\n\
    \n![images](images/square.jpg) **Note** The `' OR 1=1--` input phrase in the previous\
    \ SQL (after escaping its single quotes) is correctly treated as a string instead\
    \ of as PL/SQL code.\n\nIn Oracle APEX, there is a better way to prevent SQL injection\
    \ attacks: through the use of bind variables. Bind variables work in much the\
    \ same way as passing data to a stored procedure. Bind variables automatically\
    \ treat all input data as “flat” data and never mistake it for SQL code.\n\nThe\
    \ syntax to declare a field item as a bind variable is through the use of the\
    \ colon character (:). Simply prefix the colon to your field item name, like this:\n\
    \n`:PSEARCH_BYNAME`\n\n![images](images/square.jpg) **Note** You don't have to\
    \ explicitly specify any enclosing single quote characters. APEX is already aware\
    \ of the data type of your variable.\n\nThe use of bind variables is often encouraged\
    \ in APEX. Besides the prevention of SQL injection attacks, there are other performance-related\
    \ benefits to its use (please see [Chapter 7](#Chapter07.html#ch7) for more information).\n\
    \n### 8-4. Preventing Cross-Site Scripting (XSS) Attacks\n\n#### Problem\n\nYour\
    \ boss opens an APEX report, but instead of seeing the daily financial data, he\
    \ is automatically redirected to an adult web site containing inappropriate photos.\
    \ Your boss is obviously not amused. Upon closer inspection of the report, you\
    \ find that someone has entered malicious JavaScript in one of the fields in the\
    \ database. Upon displaying the report, the output data (containing the JavaScript)\
    \ executed, causing the malicious script to run. You recognize this as the cross-site\
    \ scripting attack. You want to prevent future attacks by rendering any JavaScript\
    \ code found in report data harmless when it is retrieved for display.\n\n####\
    \ Solution\n\nFirst, try to set up the same environment that made the cross site\
    \ scripting attack possible. Please follow these steps:\n\n1.  Create a new report\
    \ in the same application you created in Recipe 8-3.\n2.  In the Report wizard,\
    \ choose the Interactive Report Type.\n3.  In the SQL query step of the wizard,\
    \ enter the following SQL query: `SELECT * FROM CUSTOMERS`\n4.  Complete the wizard\
    \ for the report.\n5.  In the Page Rendering area of the report, right-click on\
    \ the NAME report column, and choose to edit it, as shown in [Figure 8-20](#Chapter08.html#fig_8_20).\n\
    \n    ![images](images/0820.jpg)\n\n    ***Figure 8-20.** Editing the NAME column\
    \ in the report*\n\n6.  Set the value of the Display Type field to Standard Report\
    \ Column, as shown in [Figure 8-21](#Chapter08.html#fig_8_21).\n\n    ![images](images/0821.jpg)\n\
    \n    ***Figure 8-21.** Changing the display type of the column to Standard Report\
    \ Column*\n\n7.  Apply your changes. Now create a new form in the same application.\
    \ Choose the Form on a Table or View form type.\n8.  Choose the Customers table\
    \ or view in the next step of the wizard.\n9.  Complete the rest of the wizard\
    \ using the default settings.\n\nYou are now ready to initiate the attack. Let's\
    \ irritate your end users by having the Customers report automatically redirect\
    \ to the Google site every time they try to view the report.\n\n1.  Run the form\
    \ you've just created.\n2.  In one of the text fields on the form, specify the\
    \ JavaScript shown in [Listing 8-10](#Chapter08.html#list_8_10).\n\n    ***Listing\
    \ 8-10.** The Malicious Script*\n\n    `<script>window.location='http://www.google.com';</script>`\n\
    3.  You should now see the screen shown in [Figure 8-22](#Chapter08.html#fig_8_22).\
    \ Click the Create button to save your data.\n\n    ![images](images/0822.jpg)\n\
    \n    ***Figure 8-22.** Conducting the cross-site scripting attack*\n\n4.  Now\
    \ run the report you created earlier. You will find that it is impossible to view\
    \ the report, as you will keep getting redirected to the Google web site. You\
    \ have just successfully conducted the cross-site scripting attack.\n\nTo prevent\
    \ the cross-site scripting attack, you have to do the following:\n\n1.  Edit the\
    \ report you created earlier.\n2.  In the Page Rendering area, right-click on\
    \ the NAME field and choose to edit it.\n3.  Set the Display Type field to Display\
    \ As Text (escape special characters).\n4.  Save your changes and run the report\
    \ one more time.\n5.  You will find that your report now shows; also, the JavaScript\
    \ that you entered earlier has been escaped appropriately and is now treated as\
    \ report data rather than code, as highlighted in the red box in [Figure 8-23](#Chapter08.html#fig_8_23).\n\
    \n    ![images](images/0823.jpg)\n\n    ***Figure 8-23.** The malicious script,\
    \ now rendered harmless*\n\n6.  You can repeat steps 1 to 3 above for all other\
    \ report columns you wish to protect."
