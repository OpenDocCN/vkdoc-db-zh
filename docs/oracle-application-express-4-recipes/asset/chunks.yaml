  trans: "\n#### 解决方案\n\n以下是如何在 Websheet 中批量修改数据：\n\n1.  导航至 `CustomersWebSheet` 应用程序并运行它。使用你的开发者凭据登录到该应用程序。\n\
    2.  打开“客户数据”网格。\n3.  点击“管理”下拉按钮，然后点击“行 ![images](img/U001.jpg) 替换”菜单项。\n4.  在随后打开的页面中，在“查找内容”字段中输入\
    \ `Road`，在“替换为”字段中输入 `Street`（如图 2-37 所示）。完成后点击“应用”按钮。\n\n    ![images](img/0237.jpg)\n\
    \n    ***图 2-37.** 将 “Road” 替换为 “Street”*\n\n5.  你会发现 Websheet 中所有 “`Road`” 短语都被替换为\
    \ “`Street`” 了（如图 2-38 所示）。\n\n![images](img/0238.jpg)\n\n***图 2-38.** Websheet\
    \ 中的短语替换*\n\n#### 工作原理\n\nWebsheets 提供了一些工具来帮助你在数据网格中批量修改数据。支持以下批量编辑操作：\n\n* \
    \  将某列中所有行的某个值替换为另一个值。\n*   将某列的所有行设置为某个特定值。\n*   用前一行的数据填充包含空值的列。\n\n## 第 3 章\n\
    \n## 连接应用逻辑\n\n如果你是一名 ASP.NET 开发人员，你可能对 Microsoft 引入的用于将表示层与逻辑层分离的 **代码隐藏模型**\
    \ 很熟悉。在代码隐藏页面中，代码的执行是基于事件的。你会指定在页面加载或按钮点击时执行的代码块。\n\nAPEX 逻辑层的工作方式与此类似。也许总结其工作原理的最佳方式是：页面执行被划分为不同的时序事件——可以在这些时间点插入应用逻辑。例如，一个典型的\
    \ APEX 页面的后端执行被划分为两个主要事件：页面渲染和页面处理，这两个事件又各自包含可以触发应用逻辑的更小事件。\n\nAPEX 开发人员主要可以使用\
    \ PL/SQL 语句和 JavaScript 来插入应用逻辑，这两者也可以通过 APEX 提供的向导生成。（事实上，如果你不把 PL/SQL 视为“代码”，那么你完全可以从零开始创建一个完整的书店或销售团队应用程序，而无需编写一行代码！）\n\
    \nAPEX 与传统的开发工具不同，它旨在最短时间内快速产出业务应用程序。为了实现这一目标，APEX 强制执行一个严格的框架，期望业务应用程序以某种特定的方式开发。例如，每个表单在其生命周期中的特定点都应显示信息、提供客户端和服务器端验证，并执行后端处理。在\
    \ APEX 上开发的应用程序本质上受限于这种流程，试图编写逻辑来做一些超出此常规范围的事情，可能不如使用传统开发工具那样容易。这意味着你不能用 APEX\
    \ 来创建游戏（至少无法创建出色的游戏），但你当然可以用它来非常快速地创建业务应用程序——尤其是以数据库为中心的应用程序。\n\n在本章中，我将详细探讨 APEX\
    \ 逻辑层，并向你展示如何在 APEX 中执行常见任务。\n\n### 3-1. 为你的表单添加服务器端验证\n\n#### 问题\n\n你正在创建一个处理医院病人出院的表单。当护士填写表单时，他们需要输入病人的社会安全号码。在记录可以被创建之前，表单数据必须在后端进行验证——病人的社会安全号码必须与支付历史记录表进行核对。如果支付记录存在（即病人已支付其医疗费用），则允许出院。否则，出院表单必须显示一条错误消息。\n\
    \n#### 解决方案\n\n在测试本教程中的解决方案之前，你需要先设置一些示例数据库和表单对象。之后，你将探索如何为这些表单添加服务器端验证。让我们从创建示例对象开始。\n\
    \n##### 设置示例对象\n\n要创建示例对象，请按照以下步骤操作：\n\n1.  使用 SQL Workshop 或 PL/SQL 创建清单 3-1\
    \ 所示的 `PaymentHistory` 表。\n\n    ***清单 3-1.** `PaymentHistory` 表*\n\n    ```sql\n\
    \    CREATE table \"PAYMENTHISTORY\" (\n        \"SOCIALSECURITYNO\" NVARCHAR2(9),\n\
    \        \"AMOUNTPAID\"       NUMBER(6,2)\n    )\n    ```\n\n2.  创建清单 3-2 所示的病人出院表（将\
    \ `DISCHARGEID` 字段设为主键），然后创建一个数据库应用程序并在此表上设置一个数据录入表单。\n\n    ***清单 3-2.** `PatientDischarge`\
    \ 表*\n\n    ```sql\n    CREATE table \"PATIENTDISCHARGE\" (\n        \"DISCHARGEID\"\
    \              NVARCHAR2(10),\n        \"PATIENTNAME\"              NVARCHAR2(255),\n\
    \        \"PATIENTSOCIALSECURITYNO\"  NVARCHAR2(9),\n        \"DATEOFDISCHARGE\"\
    \          DATE,\n        \"DISCHARGEREMARKS\"         NVARCHAR2(2000),\n    \
    \    constraint  \"PATIENTDISCHARGE_PK\" primary key (\"DISCHARGEID\")\n    )\n\
    \    /\n\n    CREATE sequence \"PATIENTDISCHARGE_SEQ\"\n    /\n\n    CREATE trigger\
    \ \"BI_PATIENTDISCHARGE\"\n      before insert on \"PATIENTDISCHARGE\"\n     \
    \ for each row\n    begin\n      if :NEW.\"DISCHARGEID\" is null then\n      \
    \  select \"PATIENTDISCHARGE_SEQ\".nextval into :NEW.\"DISCHARGEID\" from dual;\n\
    \      end if;\n    end;\n    /\n    ```\n\n    ![images](img/square.jpg) **提示**\
    \ 有关如何设置数据录入表单的更多信息，请参考教程 2-1。\n\n3.  向 `PaymentHistory` 表中添加一条示例记录，社会安全号码为 `123456789`。可以通过执行清单\
    \ 3-3 中的 SQL 来完成。\n\n    ***清单 3-3.** 在 `PaymentHistory` 表中创建示例记录*\n\n    ```sql\n\
    \    INSERT INTO PAYMENTHISTORY(SOCIALSECURITYNO,AMOUNTPAID) VALUES('123456789',500)\n\
    \    ```\n"
- fmt: "### 3-1. Adding Server-side Validation\n\nTo add server-side validation to\
    \ your form, follow these steps:\n\n1.  Navigate to the Page Processing section\
    \ of the Page Definition area in the patient discharge form.\n2.  Under the Validating\
    \ node, right click the Validations node and click the Create button (as shown\
    \ in [Figure 3-1](#Chapter03.html#fig_3_1)).\n\n    ![images](images/0301.jpg)\n\
    \n    ***Figure 3-1.** Launching the Create Validation wizard*\n\n3.  You should\
    \ now see the Create Validation wizard. In the first page of the wizard, choose\
    \ the Item Level Validation item (see [Figure 3-2](#Chapter03.html#fig_3_2)).\n\
    \n    ![images](images/0302.jpg)\n\n    ***Figure 3-2.** Selecting the type of\
    \ validation*\n\n4.  In the next page of the wizard, select the `PATIENTDISCHARGE:\
    \ 1. P1_PATIENTSOCIALSECURITYNO` (`Patientsocialsecurityno`) item as the item\
    \ to be validated.\n5.  In the next page, choose the `PL/SQL` validation method,\
    \ and next the Function Returning Boolean `PL/SQL` validation type.\n6.  Use the\
    \ default values in the next (Sequence and Name) step. Proceed to the next (Validation)\
    \ step and enter the `PL/SQL` validation code shown in [Listing 3-4](#Chapter03.html#list_3_4).\n\
    \n    ***Listing 3-4.** PL/SQL Validation Code*\n\n    ```\n    DECLARE\n    \
    \      CT INTEGER;\n    BEGIN\n          SELECT COUNT(*) INTO CT FROM PAYMENTHISTORY\
    \ WHERE\n          SOCIALSECURITYNO = :P1_PATIENTSOCIALSECURITYNO;\n         \
    \ IF CT>0 THEN\n              return true;\n          ELSE\n              return\
    \ false;\n          END IF;\n    END;\n    ```\n7.  In the same step, specify\
    \ an error message to display when the validation fails, as shown in [Figure 3-3](#Chapter03.html#fig_3_3).\n\
    \n    ![images](images/0303.jpg)\n\n    ***Figure 3-3.** Specifying validation\
    \ behavior*\n\n8.  Proceed to the next step. Select the CREATE option for the\
    \ When Button Pressed field, as shown in [Figure 3-4](#Chapter03.html#fig_3_4).\n\
    \n    ![images](images/0304.jpg)\n\n    ***Figure 3-4.** Specifying validation\
    \ behavior*\n\n9.  Click the Create button to create the validation rule.\n10.\
    \ Now run the form. You will be able to see the Patient Discharge form show. Key\
    \ in any value other than `123456789` in the PatientSocialSecurityNumber field.\
    \ Click the Create button. You should see your validation error message displayed\
    \ at the top of the page (as shown in [Figure 3-5](#Chapter03.html#fig_3_5)).\
    \ If you key in the value `123456789` (which exists in the PaymentHistory table),\
    \ the error will not show.\n\n![images](images/0305.jpg)\n\n***Figure 3-5.** Validation\
    \ in action*\n\n#### How It Works\n\nFirst, a little about server-side validation.\
    \ Server-side validation, as opposed to client-side validation requires a round\
    \ trip to the server. There are basically three types of server-side validation\
    \ in APEX.\n\n> **Item Level Validation**: Use this when your validation involves\
    \ only one page item at a time.\n>\n> **Tabular Form Validation**: Use this to\
    \ validate tabular forms (more on this in Recipe 3-2).\n>\n> **Page Level Validation**:\
    \ Use this when your validation involves multiple page items in the form (for\
    \ example, ensuring that the start date is earlier than the end date).\n\nThe\
    \ Condition Type field allows you to specify the conditions under which the validation\
    \ will be applied. For example, you might not need to check for payment if the\
    \ person being discharged happens to be a VIP patient at that hospital. You might\
    \ include a checkbox in the Patient Discharge form that indicates that the patient\
    \ is a VIP member if checked. The condition configuration allows you to then create\
    \ a rule that can check for this flag, and if ticked, to skip the validation.\n\
    \n### 3-2. Adding Server-side Validation to Your Tabular Form\n\n#### Problem\n\
    \nYou have a tabular `Employee` form, and you need to perform server-side validation.\
    \ You need to ensure that the Social Security number is not left empty when submitting\
    \ the form.\n\n#### Solution\n\nTo add server-side validation to your tabular\
    \ form, follow these steps:\n\n1.  Create the table shown in [Listing 3-5](#Chapter03.html#list_3_5).\n\
    \n    ***Listing 3-5.** The Sample Employee Table*\n\n    ```\n    CREATE table\
    \ \"EMPLOYEE\" (\n        \"EMPLOYEENAME\"     NVARCHAR2(255),\n        \"EMPLOYEETYPE\"\
    \     NVARCHAR2(10),\n        \"SOCIALSECURITYNO\" NVARCHAR2(10),\n        \"\
    EMPLOYEEID\"       NVARCHAR2(10),\n        constraint  \"EMPLOYEE_PK\" primary\
    \ key (\"EMPLOYEEID\")\n    )\n    /\n\n    CREATE sequence \"EMPLOYEE_SEQ\"\n\
    \    /\n\n    CREATE trigger \"BI_EMPLOYEE\"\n      before insert on \"EMPLOYEE\"\
    \n      for each row\n    begin\n      if :NEW.\"EMPLOYEEID\" is null then\n \
    \       select \"EMPLOYEE_SEQ\".nextval into :NEW.\"EMPLOYEEID\" from dual;\n\
    \      end if;\n    end;\n    ```\n2.  Create a database application/tabular form\
    \ on top of the `EMPLOYEE` table.\n\n    ![images](images/square.jpg) **Tip**\
    \ Recipe 2-6 shows you how to create a tabular form.\n\n3.  Navigate to the Page\
    \ Rendering section of the Page Definition area of your tabular form.\n4.  Expand\
    \ the following node: `Employee` ![images](images/U001.jpg) `Regions` ![images](images/U001.jpg)\
    \ `Body (3)` ![images](images/U001.jpg) `EMPLOYEE` ![images](images/U001.jpg)\
    \ `Report Columns`, right click on the `SOCIALSECURITYNO` field, and click on\
    \ the Create Validation submenu item, as shown in [Figure 3-6](#Chapter03.html#fig_3_6).\n\
    \n    ![images](images/0306.jpg)\n\n    ***Figure 3-6.** Adding validation to\
    \ the SOCIALSECURITYNO field*\n\n5.  On the next page, choose the Column Not Null\
    \ validation type (you are checking to ensure `SocialSecurityNo` field is not\
    \ left empty). Use the default settings on the next page.\n6.  On the page after\
    \ that, you will be allowed to specify the error message shown if the validation\
    \ fails. Enter the following error message: “Please specify the employee's Social\
    \ Security number.”\n7.  In the next page, choose ADD (Add Row) for the When Button\
    \ Pressed field. Save the changes and run your tabular form. Leave the Social\
    \ Security number field empty and try to submit the tabular form. You should see\
    \ the screen shown in [Figure 3-7](#Chapter03.html#fig_3_7).\n\n![images](images/0307.jpg)\n\
    \n***Figure 3-7.** Tabular Form validation in action*\n\n#### How It Works\n\n\
    You can insert simple validation in any of the following four events of the tabular\
    \ form:\n\n*   When the user clicks the ADD (Add row) button.\n*   When the user\
    \ clicks the CANCEL button.\n*   When the user clicks the DELETE button.\n*  \
    \ When the user clicks the SUBMIT button.\n\n![images](images/square.jpg) **Note**\
    \ Not all of the standard form's validation options are available to a tabular\
    \ form. For instance, the tabular form does not support the complex type of `PL/SQL`\
    \ validation you saw in Recipe 3-1.\n\n### 3-3. Adding Client-side JavaScript\
    \ Validation to Your Form\n\n#### Problem\n\nUpon moving the focus away from a\
    \ numerical field on a standard form, you need to instantly check if the value\
    \ entered is within a certain range and display an error message if it isn't.\
    \ You want to do this using JavaScript so that you can eliminate a round trip\
    \ to the server."
