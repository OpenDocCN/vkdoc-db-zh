- fmt: '#### How It Works


    As mentioned, APEX works very well for CRUD-based web-based business applications
    and sits as a platform on top of the Oracle database. APEX does this well because
    at its heart, it leverages the PL/SQL language to handle the business logic for
    the applications developed on top of it, and PL/SQL is the foundation for all
    database CRUD operations. A good benchmark is that if 75% of the application consists
    of CRUD alone, APEX would help to significantly reduce the time and effort needed
    to develop your application.


    Also, APEX is a RAD tool, and many developers have given their testimonials on
    how RAD products have enabled them to deploy large scale systems in weeks instead
    of months (including myself in the opening section of this book). APEX also fits
    development teams that employ software development methodologies with a constantly
    evolving set of requirements, such as agile, or methodologies that frequently
    involve the need for successive iterations of prototyping. APEX is also well-suited
    for large-scale deployments. Consider these figures: Oracle hosts a free instance
    of APEX at [`http://apex.oracle.com`](http://apex.oracle.com), that receives an
    average of 1.4 to 1.5 million page views a week and hosts over 10,000 workspaces.


    APEX applications practically live inside the Oracle database; its code modules
    consist mostly of PL/SQL, and any applications, forms, and reports exist as metadata
    in database tables. Because the business logic, UI, and data are all stored in
    the database, APEX has the benefit of eliminating the additional round trips required
    by other platforms that need to frequently communicate between the business and
    data tiers over the network. Thus, APEX applications easily outperform their traditional
    three-tier counterparts.


    However, APEX is not database-independent, so there is a risk of a database vendor
    lockdown. Migrating an APEX application from an Oracle database to a Microsoft
    SQL Server-based one, for example, would most certainly mean rewriting the entire
    application from scratch. It is important to consider the range of databases that
    need to be supported by the application when considering whether to use APEX in
    your project.


    There are also several technical limitations to note when using APEX, particularly
    in terms of the maximum number of database items that can be hosted on a single
    page. [Table 1-1](#Chapter01.html#tab_1_1) lists a few of the current limitations
    for APEX, as stated on the Oracle website.


    **Table 1-1.** APEX Component Limitations


    | **Component** | **Description** |

    | --- | --- |

    | `Interactive reports` | A single page supports one interactive report. Maximum
    of 100 columns per interactive report. |

    | `Classic reports` | Maximum of 100 columns per classic report. |

    | `Forms` | 100 enterable items (input fields) per page. Maximum of 32767 bytes
    enterable for text area or rich text edit control. Maximum of two columns for
    primary keys. |

    | `Tabular forms` | Maximum of one wizard-generated tabular forms per page. Maximum
    of 50 editable tabular form columns. |

    | `Item names` | Maximum of 30 characters for item names referenced using bind
    variable syntax. |

    | `Validations` | Maximum of 3,950 characters for text entered for validation.
    |


    Most of the business logic development for APEX is done using PL/SQL. Although
    PL/SQL does support function and code reusability to a degree, this does not extend
    outside of the business tier. For instance, in traditional development tools,
    you could create different buttons that all inherit from a single generic button
    class containing a common set of behavior. This level of OOP in the user interface
    is not supported in APEX.


    Lastly, it''s important to keep in mind that APEX is a platform with standard
    behavior and functionality. It doesn''t offer the same freedom that a traditional
    development tool does, so if you need to achieve certain functionality that APEX
    does not provide out of the box, you will need to get your hands dirty with JavaScript,
    AJAX, and DHTML.


    ### 1-2. Identifying an APEX Deployment Model


    #### Problem


    You want to deploy APEX. You''ve heard there are a couple of different ways to
    do it, and you''re not sure which deployment model would suit your needs.


    #### Solution


    The main decision fork when deploying APEX is deciding which HTTP server to use
    to serve your APEX applications. Oracle provides two types of HTTP servers:


    *   Oracle XML DB HTTP Server (embedded PL/SQL gateway)

    *   Oracle HTTP Server and mod_plsql


    Choose the Oracle XML DB HTTP Server if:


    *   You want a simpler two-tier deployment (web browser and database server).

    *   Your priority is to simply get up and running in the shortest time possible
    with as little configuration as possible.

    *   You don''t wish to install a separate server to host the HTTP server.

    *   You are deploying APEX on a personal PC as a standalone system.


    Choose the Oracle HTTP Server and mod_plsql approach if:


    *   You want a full three-tier deployment (web browser, HTTP web server, and database
    server).

    *   You are deploying APEX in an enterprise environment and need access to an
    extensive set of web server configuration and log settings.

    *   You intend to expose the APEX application to the Internet. This is for security
    purposes and will be explained in detail in the “How It Works” section.

    *   You need Single Sign On (SSO) integration.

    *   You need mid-tier load balancing and failover features.'
