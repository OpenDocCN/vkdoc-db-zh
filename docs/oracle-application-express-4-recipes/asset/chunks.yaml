    \ **Caution** Image names are case-sensitive! If you don't use the correct case,\
    \ your image may not show up at all."
  trans: "\n# 第四章：自定义外观与感觉\n\n自定义应用程序的外观与感觉是解决方案交付中最关键的一环。这个过程定义了您的应用如何呈现给最终用户。APEX\
    \ 在这方面极其灵活，允许您自定义的不仅仅是页面的配色方案、页眉和页脚，甚至包括表单上控件使用的属性。\n\n很多时候，像您这样的用户并不仅仅是在为内部网环境创建独立的\
    \ Web 应用程序。我知道许多开发者使用 APEX，是因为他们需要一种更简便的方式将表单集成到面向公众的网站中。试想一下公共网站上的“申请职位”版块。当访问者点击链接时，他们不应该感觉自己被重定向到了一个全新的门户网站。该“申请职位”表单的观感应该与网站上的任何其他页面别无二致。为了实现这个目标，开发者需要使表单的配色方案、页眉和页脚与网站的其余部分保持一致。\n\
    \nAPEX 提供了完善的工具，让您可以更改应用程序中用户界面的方方面面。在本章中，我们将探讨其基本方法。\n\n## 4-1. 为表单添加图片页眉\n\n\
    ### 问题\n\n您需要在表单的页眉区域添加一张图片。\n\n### 解决方案\n\n要向表单的页眉区域添加图片，请按照以下步骤操作：\n\n1.  在应用程序构建器中点击一个现有应用程序。\n\
    2.  点击“共享组件”图标。在随后出现的页面中，点击“文件”部分下的 `图片` 链接，如 图 4-1 所示。\n\n    ![images](img/0401.jpg)\n\
    \n    **图 4-1.** “文件”部分中的“图片”链接\n\n3.  在随后出现的页面中，点击右上角的黄色“创建”按钮。从列表中选择您的应用程序，并浏览选择一个横幅图片（GIF、JPG\
    \ 或 PNG 文件）进行上传。完成后，点击 `上传` 按钮。\n4.  现在，您应该能在应用程序中看到您的图片了，如 图 4-2 所示。\n\n    ![images](img/0402.jpg)\n\
    \n    **图 4-2.** Testsample.gif 图片\n\n5.  现在，导航到应用程序中的一个现有表单并点击它，以查看其 `页面定义`。\n\
    6.  在表单的 `共享组件` 区域，展开 `模板` 节点，然后是 `区域` 节点，右键单击 `表单区域` 节点，并选择 `编辑` 菜单项（如 图 4-3\
    \ 所示）。\n\n    ![images](img/0403.jpg)\n\n    **图 4-3.** 导航到表单区域模板定义页面\n\n7.  在随后出现的页面中，点击“定义”选项卡。在模板框中的\
    \ DIV 标签上方添加以下 HTML 标签：`<img border=\"0\" src=\"#APP_IMAGES#Testsample.gif\">`\n\
    8.  您现在应该能看到如 图 4-4 所示的屏幕。\n\n    ![images](img/0404.jpg)\n\n    **图 4-4.** 在模板中包含\
    \ Testsample.gif 图片\n\n9.  保存您的更改并运行表单。您现在应该能在表单顶部看到您的图片了，如 图 4-5 所示。\n\n    ![images](img/0405.jpg)\n\
    \n    **图 4-5.** 表单中的新图片页眉\n\n![images](img/square.jpg) **注意** 图片名称区分大小写！如果使用不正确的大小写，您的图片可能根本不会显示。\n\
    \n## 解决方案（针对前一个配方上下文）\n\n要测试此配方中的解决方案，您首先需要创建示例数据库和表单对象。然后，您需要从表单中调用“发送电子邮件”过程。让我们首先创建此配方中使用的示例对象。\n\
    \n### 创建示例对象\n\n要创建此配方中使用的示例对象，请按照以下步骤操作：\n\n1.  创建如 清单 3-12 所示的表，并基于该表创建一个新的数据库应用程序/数据录入表单。\n\
    \n    **清单 3-12.** PatientDB 表\n\n    ```sql\n    CREATE table \"PATIENTDB\" (\n\
    \        \"PATIENTNAME\"      NVARCHAR2(255),\n        \"PATIENTEMAIL\"     NVARCHAR2(255),\n\
    \        \"PATIENTDIAGNOSIS\" NVARCHAR2(2000),\n        \"PATIENTID\"        NVARCHAR2(10),\n\
    \        constraint  \"PATIENTDB_PK\" primary key (\"PATIENTID\")\n    )\n   \
    \ /\n\n    CREATE sequence \"PATIENTDB_SEQ\"\n    /\n\n    CREATE trigger \"BI_PATIENTDB\"\
    \n      before insert on \"PATIENTDB\"\n      for each row\n    begin\n      if\
    \ :NEW.\"PATIENTID\" is null then\n        select \"PATIENTDB_SEQ\".nextval into\
    \ :NEW.\"PATIENTID\" from dual;\n      end if;\n    end;\n    /\n    ```\n\n###\
    \ 发送电子邮件\n\n要从表单调用“发送电子邮件”过程，请按照以下步骤操作：\n\n1.  在 `PatientDB` 表单的“页面定义” ![images](img/U001.jpg)\
    \ “页面呈现”部分，添加一个名为“发送电子邮件”的新按钮项。将按钮类型更改为 HTML 按钮，并将按钮标签设置为“发送电子邮件”。\n2.  在 `PatientDB`\
    \ 表单的“页面定义” ![images](img/U001.jpg) “页面处理”部分，右键单击“处理”节点下的“过程”，并选择创建新过程。\n3.  在向导的第一页，选择“发送电子邮件”过程。接着，为该过程指定一个名称。在下一页，指定电子邮件的内容和收件人。您可以使用替换语法（例如，`&P1_PATIENTNAME`）将表单中的数据插入到电子邮件中。图\
    \ 3-26 所示的图展示了一个典型电子邮件的配置，该邮件使用了通过表单输入的患者电子邮件地址和姓名。\n\n    ![images](img/0326.jpg)\n\
    \n    **图 3-26.** 指定电子邮件的详细信息\n\n4.  在下一页，指定要显示的成功或失败消息。在向导的后续页面中，在“当按下按钮时”字段中指定\
    \ `P1_SENDEMAIL` 字段。\n5.  保存更改并运行表单。在“患者电子邮件”字段中指定一个可用的电子邮件地址。点击“发送电子邮件”按钮。一封电子邮件应发送到您指定的地址。\n\
    \n## 工作原理\n\n发送电子邮件也是一个服务器端过程。外发电子邮件不会立即发送（除非您在过程配置向导中特别指定了这样做），而是会进入队列，直到一个 `DBMS_JOB`\
    \ 作业将其出队并发送出去。\n"
- fmt: "# 第4章：自定义样式\n\n### 工作原理\n\n在开始之前，您应该了解 APEX 中用于修改应用程序外观时使用的各种术语。[表 4-1](#Chapter04.html#tab_4_1)\
    \ 描述了其中一些术语。\n\n**表 4-1.** 部分 APEX 术语\n\n| **术语** | **描述** |\n| --- | --- |\n\
    | `Template` | 模板是一个 HTML 字符串，代表 APEX 应用程序中的用户界面元素。例如，标准按钮模板类似于这样：<br>`<button\
    \ value=\"#LABEL#\" onclick=\"#LINK#\" class=\"button-gray\" type=\"button\">`<br>`\
    \  <span>#LABEL#</span>`<br>`</button>` |\n|  | 模板的灵活性在于开发者可以实际修改这些模板，创建在整个应用程序或工作区中使用的标准模板。例如，只需将现有按钮模板修改为包含宽度标签\
    \ `<button width=\"300px\"`，整个应用程序中的所有按钮将立即变为 300 像素宽。实际上，开发者甚至可以完全更改 HTML，将 `<button>`\
    \ 标签替换为 `<img>` 标签以创建图像按钮。 |\n| `Theme` | APEX 中的每种控件和用户界面元素都由模板表示。这些模板的完整集合被称为主题。换句话说，主题就是模板的集合。<br>主题使您的开发者能够轻松地为应用程序换肤，并通过点击几下鼠标即可从一个主题切换到另一个主题。\
    \ |\n| `Substitution String` | 在按钮模板示例中，您可能注意到了像 `#LABEL#` 这样的特殊标签（括在两个井号 `#`\
    \ 之间的短语）。这些称为替换字符串，为开发者提供了一种在模板中插入动态字段的简便方法。<br>例如，`#LABEL#` 实际上代表将在按钮上显示的文本。当您的表单由\
    \ APEX 渲染时，它们会被实际值（在本例中为按钮文本）替换。可以将其视为邮件合并。<br>通过这种方式，您可以重新定位和移动这些替换字符串以实现有趣的效果。例如，您可以编写一个\
    \ `onclick` JavaScript 处理程序来提示确认框，该确认框使用 `#LABEL#` 替换字符串显示按钮文本作为其消息的一部分：<br>`<button\
    \ value=\"#LABEL#\" onclick=\"if (confirm('Are`<br>`you sure you wish to click\
    \ the #LABEL# button'))`<br>`#LINK#\" ...` |\n\n现在您了解了这些术语，让我们看看如何在 APEX 中使用用户上传的图像。APEX\
    \ 将图像视为可以在应用程序或工作区内多次重用的资源。在应用程序中使用任何图像之前的第一步是导入它。应用程序的 `Shared Components` 区域，顾名思义，是一个全局区域，页面可以引用它来检索图像资源。\n\
    \n当图像已上传到此全局区域后，您可以轻松地从页面模板的任何部分引用它。但是，您不能仅仅使用其文件名来引用它；您还必须指定文件名的路径。该路径不是指定为 URL，而是指定为替换字符串；APEX\
    \ 稍后会将其替换为实际的 URL。如果您将图像上传到应用程序，则应使用 `#APP_IMAGES#` 替换字符串，如本食谱前面所见。要使用它，只需在替换字符串后附加文件名（中间没有任何斜杠），如下所示：\n\
    \n`#APP_IMAGES#myfile.jpg`\n\n如果您将图像上传到了工作区（以便工作区中的其他应用程序也可以使用该图像），也可以使用 `#WORKSPACE_IMAGES#`。\n\
    \n### 4-2. 为页面添加自定义 CSS 样式\n\n#### 问题\n\n您需要一种快速方法来声明多个样式表类，并使它们应用于表单中的某些元素。\n\
    \n#### 解决方案\n\n要为页面添加自定义 CSS 样式，请按照以下步骤操作：\n\n1.  在应用程序构建器中单击现有应用程序。\n2.  导航到应用程序中的现有表单并单击它以查看其页面定义。\n\
    3.  在表单的“页面呈现”区域中，右键单击表单根节点并选择“编辑”菜单项。\n4.  在打开的窗口中，单击“HTML 头部和正文属性”选项卡，并粘贴[清单\
    \ 4-1](#Chapter04.html#list_4_1)中显示的样式表类。（您现在应该拥有与[图 4-6](#Chapter04.html#fig_4_6)中所示相同的屏幕）。\n\
    \n    **清单 4-1.** 一个示例样式类\n\n    ```html\n    <style>\n    .specialstyle\n   \
    \    {\n        font-family : Verdana;\n        font-size : 12pt;\n        color\
    \ : #FF0000;\n        font-weight : bold;\n        text-align :left ;\n      \
    \  vertical-align : middle;\n    }\n    </style>\n    ```\n\n    ![images](images/0406.jpg)\n\
    \n    **图 4-6.** 在 HTML 头部声明自定义样式\n\n5.  单击“应用更改”按钮以保存表单。导航回表单的“页面定义”区域。\n6. \
    \ 在“共享组件”部分，展开“模板”节点，并进一步展开“按钮”节点。右键单击最深层的“按钮”节点，然后选择“编辑”菜单项。\n7.  在打开的窗口中，单击“定义”选项卡，并将按钮的类更改为“specialstyle”，如[图\
    \ 4-7](#Chapter04.html#fig_4_7)所示。\n\n    ![images](images/0407.jpg)\n\n    **图\
    \ 4-7.** 引用 `specialstyle` 样式\n\n8.  保存更改并运行表单。您现在应该看到表单上的按钮为红色，如样式表类中所声明（参见[图\
    \ 4-8](#Chapter04.html#fig_4_8)）。\n\n    ![images](images/0408.jpg)\n\n    **图\
    \ 4-8.** 应用在表单上的 `specialstyle` 样式\n\n#### 工作原理\n\n如果您需要快速声明一些样式表类并在表单中使用它们（而无需在其他表单中重用这些类），声明它们的好地方是在“HTML\
    \ 头部和正文属性”部分下，如本食谱前面所见。您在此部分中输入的任何内容都会按原样呈现在 APEX 生成的网页顶部。\n\n声明后，您可以通过样式类的名称直接引用这些样式。\n\
    \n![images](images/square.jpg) **注意** 通过将样式表类放在 HTML 头部和正文属性部分，您使其仅对该表单可用，而对应用程序中的其他表单不可用。要创建可在整个应用程序或工作区中全局使用的样式集，请考虑改用自定义\
    \ CSS 文件（在食谱 4-3 中介绍）。\n\n### 4-3. 使用自定义 CSS 文件\n\n#### 问题\n\n您有大量存储在 `.css` 文件中的样式表类，并且需要在应用程序中引用此\
    \ CSS 文件，以便可以将自定义样式应用于表单上的某些元素。"
  raw: "#### How It Works\n\nBefore proceeding, you should be aware of various terminology\
    \ used in APEX when you embark on modifying the look and feel of an application.\
    \ [Table 4-1](#Chapter04.html#tab_4_1) describes some of this terminology.\n\n\
    ***Table 4-1.** Some APEX Terminology*\n\n| **Term** | **Description** |\n| ---\
    \ | --- |\n| `Template` | A template is an HTML string that represents a User\
    \ Interface element in an APEX application. For example, the standard template\
    \ for a button looks something like this: `<button value=\"#LABEL#\" onclick=\"\
    #LINK#\"` `class=\"button-gray\" type=\"button\">`\n\n`  <span>#LABEL#</span>`\n\
    \n`</button>` |\n|  | The flexibility with templates is that developers can actually\
    \ modify these templates, creating a standard template that is used throughout\
    \ the entire application or workspace. For instance, simply by modifying an existing\
    \ button template to include a width tag `<button width=\"300px\"` all buttons\
    \ in the entire application would instantly have a width of 300 pixels wide. In\
    \ fact, developers can even change the HTML entirely, replacing <button> tags\
    \ with <img> tags to create image buttons. |\n| `Theme` | Every type of control\
    \ and user interface element in APEX is represented by a template. A complete\
    \ collection of these templates is known as a theme. In other words, a theme is\
    \ a collection of templates. \nThemes make it easy for your developers to skin\
    \ your applications and switch from one theme to another with a few clicks of\
    \ the mouse. |\n| `Substitution String` | In the button template example, you\
    \ might have noticed special tags like #LABEL# (phrases enclosed between two hash\
    \ symbols (#)). These are called substitution strings and provide an easy way\
    \ for developers to insert dynamic fields in a template. \nFor instance, #LABEL#\
    \ actually represents the text that will be displayed on top of the button. They\
    \ are substituted with actual values (in this case, the button text) when your\
    \ form is rendered by APEX. Try to think of it as mail merge.\n\nIn this fashion,\
    \ you could reposition and move these substitution strings around to achieve interesting\
    \ effects. For instance, you could write an onclick JavaScript handler to prompt\
    \ a confirmation box that displays the text of the button as part of its message\
    \ using the #LABEL# substitution string. `<button value=\"#LABEL#\" onclick=\"\
    if (confirm('Are`\n`you sure you wish to click the #LABEL# button'))`\n`#LINK#\"\
    \ ...` |\n\nNow that you know these terms, let's look at how user-uploaded images\
    \ are used in APEX. APEX treats images as resources that can be reused many times\
    \ within an application or within a workspace. The first step before you can use\
    \ any images in your application is to import it. The `Shared Components` area\
    \ of your application, as its name indicates, is a global area where pages can\
    \ reference to retrieve an image resource.\n\nWhen an image has been uploaded\
    \ into this global area, you can easily refer to it from any part of your page\
    \ template. However, you can't just refer to it using its file name; you must\
    \ also specify the path to the file name. The path is not specified as a URL,\
    \ but as a substitution string; APEX replaces it with the actual URL later on.\
    \ If you uploaded your image to an application, you should use the `#APP_IMAGES#`\
    \ substitution string, as you've seen earlier in this recipe. To use it, simply\
    \ append the name of the file right after the substitution string (without any\
    \ slash in between), like so:\n\n`#APP_IMAGES#myfile.jpg`\n\nYou can also use\
    \ `#WORKSPACE_IMAGES#` if you have uploaded your image to a workspace instead\
    \ (so that other applications in the workspace can make use of the image).\n\n\
    ### 4-2. Adding Custom CSS Styles to Your Page\n\n#### Problem\n\nYou need a quick\
    \ way to declare several stylesheet classes and have them apply on some elements\
    \ in your form.\n\n#### Solution\n\nTo add a custom CSS style to your page, follow\
    \ these steps:\n\n1.  Click on an existing application in the Application Builder.\n\
    2.  Navigate to an existing form in the application and click on it to view its\
    \ Page Definition.\n3.  In the Page Rendering area of the form, right click on\
    \ the form root node and choose the Edit menu item.\n4.  In the ensuing window,\
    \ click the HTML Header and Body Attribute tab, and paste the style sheet class\
    \ shown in [Listing 4-1](#Chapter04.html#list_4_1). (You should now have the same\
    \ screen as shown in [Figure 4-6](#Chapter04.html#fig_4_6)).\n\n    ***Listing\
    \ 4-1.** A Sample Style Class*\n\n    `<style>`\n    `.specialstyle`\n    `   {`\n\
    \    `    font-family : Verdana;`\n    `    font-size : 12pt;`\n    `    color\
    \ : #FF0000;`\n    `    font-weight : bold;`\n    `    text-align :left ;`\n \
    \   `    vertical-align : middle;`\n    `}`\n    `</style>` ![images](images/0406.jpg)\n\
    \n    ***Figure 4-6.** Declaring a custom style in the HTML header*\n\n5.  Click\
    \ the Apply changes button to save the form. Navigate back to the Page Definition\
    \ area of the form.\n6.  In the Shared Components section, expand the Templates\
    \ node, and further expand the Button node. Right click on the deepest Button\
    \ node, and choose the Edit menu item.\n7.  In the ensuing window, click the `Definition`\
    \ tab, and change the class of the button to “specialstyle,” as shown in [Figure\
    \ 4-7](#Chapter04.html#fig_4_7).\n\n    ![images](images/0407.jpg)\n\n    ***Figure\
    \ 4-7.** Referencing the specialstyle style*\n\n8.  Save your changes, and run\
    \ the form. You should now see your form with the buttons in red, as declared\
    \ in the stylesheet class (see [Figure 4-8](#Chapter04.html#fig_4_8)).\n\n![images](images/0408.jpg)\n\
    \n***Figure 4-8.** The specialstyle style applied on your form*\n\n#### How It\
    \ Works\n\nIf you need to declare some stylesheet classes quickly and use them\
    \ in your forms (without the need to reuse these classes in other forms), a good\
    \ place to declare them is under the `HTML Header and Body Attribute` section,\
    \ as you've seen earlier in this recipe. Whatever you've entered in this section\
    \ is rendered as-is at the top of the web page generated by APEX.\n\nOnce declared,\
    \ you can reference any of those styles directly via the name of the style class.\n\
    \n![images](images/square.jpg) **Caution** By placing your stylesheet class in\
    \ the HTML Header and Body Attribute section, you make it available to the form\
    \ alone and not to other forms in your application. To create a set of styles\
    \ that can be used globally throughout your application or workspace, please consider\
    \ using custom CSS files instead (covered in Recipe 4-3).\n\n### 4-3\\. Using\
    \ a Custom CSS File\n\n#### Problem\n\nYou have a large number of stylesheet classes\
    \ stored in a .css file, and you need to reference this css file in your application\
    \ so that you can apply custom styles to some elements on your form."
