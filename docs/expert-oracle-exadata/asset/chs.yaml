- "# DML 性能\n\n一般而言，需要更新的记录不应被压缩。当您更新 HCC（混合列压缩）表中的一条记录时，该记录将迁移到一个标记为 OLTP（联机事务处理）压缩块的新数据块中。当然，系统会留下一个指针，以便您仍然可以通过其旧的`ROWID`访问该记录，但该记录也会被分配一个新的`ROWID`。由于更新后的记录会被降级为\
  \ OLTP 压缩，因此您需要理解这种压缩机制在更新时是如何工作的。\n\n## OLTP 压缩过程\n\n图 3-5 展示了非直接路径加载到 OLTP 块中的处理过程。\n\
  \n![A978-1-4302-6242-8_3_Fig5_HTML.jpg](img/A978-1-4302-6242-8_3_Fig5_HTML.jpg)\n\
  *图 3-5. 非直接路径加载的 OLTP 压缩过程*\n\n状态的变化从左向右进行。行最初以未压缩状态加载。当块填充到无法再插入更多行时，块中的行数据将被压缩。然后该块将再次可用，并能够接收更多未压缩的行。这意味着在\
  \ OLTP 压缩表中，块可能处于各种压缩状态：所有行都可以被压缩，部分行可以被压缩，或者没有行被压缩。这正是 HCC 块中的记录在被更新时的行为方式。\n\n\
  ## 示例：更新后表大小的增加\n\n下面几个例子将说明这种行为。第一个例子将展示表的大小如何随着更新而膨胀。更新前，该段的大小为 408 MB。未压缩的表在此列出以供比较：\n\
  \n```\nSQL> select segment_name,trunc(bytes/power(1024,2)) m\n  2  from user_segments\
  \ where segment_name in ('T1', 'T1_QH');\n\nSEGMENT_NAME                       \
  \       M\n------------------------------ ----------\nT1                       \
  \              3840\nT1_QH                                   408\n```\n\n接下来，更新整个压缩表。更新完成后，您应该检查其大小：\n\
  \n```\nSQL> update t1_qh set id = id + 1;\n\n33554432 rows updated.\n\nSQL> select\
  \ segment_name,trunc(bytes/power(1024,2)) m\n  2  from user_segments where segment_name\
  \ in ('T1','T1_QH')\n  3  order by segment_name;\n\nSEGMENT_NAME               \
  \                             M\n-------------------------------------- ---------------\n\
  T1                                                 3,841.00\nT1_QH             \
  \                                 5,123.00\n\n2 rows selected.\n```\n\n此时，您会注意到更新后的块类型为\
  \ 64-OLTP，这是由于从 HCC 压缩表更新而导致的压缩。调用`DBMS_COMPRESSION.GET_COMPRESSION_TYPE`可以确认这一点：\n\
  \n```\nSQL> select decode (dbms_compression.get_compression_type(user,'T1_QH',rowid),\n\
  \  2      1,  'COMP_NOCOMPRESS',\n  3      2,  'COMP_FOR_OLTP',\n  4      4,  'COMP_FOR_QUERY_HIGH',\n\
  \  5      8,  'COMP_FOR_QUERY_LOW',\n  6     16,  'COMP_FOR_ARCHIVE_HIGH',\n  7\
  \     32,  'COMP_FOR_ARCHIVE_LOW',\n  8     64,  'COMP_BLOCK',\n  9      'OTHER')\
  \ type\n 10  from T1_QH\n 11* where rownum < 11\nSQL> /\n\nTYPE\n---------------------\n\
  COMP_BLOCK\nCOMP_BLOCK\nCOMP_BLOCK\nCOMP_BLOCK\nCOMP_BLOCK\nCOMP_BLOCK\nCOMP_BLOCK\n\
  COMP_BLOCK\nCOMP_BLOCK\nCOMP_BLOCK\n\n10 rows selected.\n```\n\n以上是 11.2.0.4 版本的例子。`DBMS_COMPRESSION`中的约束在\
  \ Oracle 12c 中已被重命名——移除了“FOR”，`COMP_FOR_OLTP`现在称为`COMP_ADVANCED`。一旦您重新压缩该表，大小就会恢复正常。\n\
  \n```\nSQL> select segment_name,trunc(bytes/power(1024,2)) m\n  2  from user_segments\
  \ where segment_name in ('T1','T1_QH')\n  3  order by segment_name;\n\nSEGMENT_NAME\
  \                                            M\n----------------------------------------\
  \ -------------\nT1                                                 3,841.00\nT1_QH\
  \                                                546.00\n\n2 rows selected.\n```\n\
  \n## 示例：行更新行为\n\n第二个例子演示了更新一行时会发生什么。与软件之前的版本不同，如您所见，更新后的行不会被迁移。它从 CU（压缩单元）中被删除，但不会留下指向该行迁移位置的指针。这有助于避免在“table\
  \ fetch continued row”（表提取继续行）统计信息中追踪到链式行。\n\n以下是所有行被压缩时的表大小。如果您想按照此示例操作，表需要位于`SMALLFILE`表空间上。表不需要包含有用信息，它仅仅是大。\n\
  \n```\nSQL> create table UPDTEST_QL column store compress for query low\n  2  tablespace\
  \ users as select * from UPDTEST_BASE;\n\nTable created.\n\nSQL> select segment_name,\
  \ bytes/power(1024,2) m, compress_for\n  2  from user_segments s left outer join\
  \ user_tables t\n  3  on (s.segment_name = t.table_name)\n  4  where s.segment_name\
  \ like 'UPDTEST%'\n  5  /\n\nSEGMENT_NAME                              M COMPRESS_FOR\n\
  ------------------------------ ---------- ------------------------------\nUPDTEST_QL\
  \                               18 QUERY LOW\nUPDTEST_BASE                     \
  \      1344\n```\n\n对于此示例，您需要获取表中的第一个 ID 以及其他一些元信息：\n\n```\nSQL> select dbms_compression.get_compression_type(user,'UPDTEST_QL',rowid)\
  \ as ctype,\n  2  rowid, old_rowid(rowid) DBA, id from UPDTEST_QL where id between\
  \ 1 and 10\n  3  /\n\nCTYPE ROWID                DBA                         ID\n\
  ---------- -------------------- -------------------- ----------\n8 AAAG6TAAFAALORzAAA\
  \      5.2942067.0                    1\n8 AAAG6TAAFAALORzAAB      5.2942067.1 \
  \                   2\n8 AAAG6TAAFAALORzAAC      5.2942067.2                   \
  \ 3\n8 AAAG6TAAFAALORzAAD      5.2942067.3                    4\n8 AAAG6TAAFAALORzAAE\
  \      5.2942067.4                    5\n8 AAAG6TAAFAALORzAAF      5.2942067.5 \
  \                   6\n8 AAAG6TAAFAALORzAAG      5.2942067.6                   \
  \ 7\n8 AAAG6TAAFAALORzAAH      5.2942067.7                    8\n8 AAAG6TAAFAALORzAAI\
  \      5.2942067.8                    9\n8 AAAG6TAAFAALORzAAJ      5.2942067.9 \
  \                  10\n```\n\n`old_rowid()`函数可从 Enitec 博客和在线代码仓库的文件`create_old_rowid.sql`中获取。它解码`ROWID`以获取数据块地址或磁盘上的位置。在上面的例子中，ID\
  \ 1 位于文件 5、块 2942067、槽位 0。压缩类型为 8 表示 Query Low。现在开始修改：\n\n```\nSQL> update UPDTEST_QL\
  \ set spcol = 'I AM UPDATED' where id between 1 and 10;\n\n10 rows updated.\n\n\
  SQL> commit;\n\nCommit complete.\n\nSQL> select dbms_compression.get_compression_type(user,'UPDTEST_QL',rowid)\
  \ as ctype,\n  2  rowid, old_rowid(rowid) DBA, id from updtest_ql where id between\
  \ 1 and 10;\n\nCTYPE ROWID                DBA                         ID\n----------\
  \ -------------------- -------------------- ----------\n64 AAAG6TAAFAAK4jhAAA  \
  \    5.2853089.0                    1\n64 AAAG6TAAFAAK4jhAAB      5.2853089.1  \
  \                  2\n64 AAAG6TAAFAAK4jhAAC      5.2853089.2                   \
  \ 3\n64 AAAG6TAAFAAK4jhAAD      5.2853089.3                    4\n64 AAAG6TAAFAAK4jhAAE\
  \      5.2853089.4                    5\n64 AAAG6TAAFAAK4jhAAF      5.2853089.5\
  \                    6\n64 AAAG6TAAFAAK4jhAAG      5.2853089.6                 \
  \   7\n1 AAAG6TAAFAAK4jkAAA       5.2853092.0                    8\n1 AAAG6TAAFAAK4jkAAB\
  \       5.2853092.1                    9\n1 AAAG6TAAFAAK4jkAAC       5.2853092.2\
  \                   10\n\n10 rows selected\n```\n\n如您所见，部分更新行的压缩类型已变为 64，这在`DBMS_COMPRESSION`中定义为`COMP_BLOCK`。此特定类型出现在更新块从其原始\
  \ CU 移出并移入 OLTP 压缩块的情况下。在 Oracle 11.2.0.2 及更早版本中，您会看到压缩类型为 2 或`COMP_ADVANCED`/`COMP_FOR_OLTP`。如何判断块已经移动？将新的数据块地址与原始地址进行比较：包含\
  \ ID 1 的块现在位于文件 5、块 2853089、槽位 0，而不是原来的文件 5、块 2942067、槽位 0。\n\n\n## 数据迁移行为\n\n当前的问题是，如果我们使用原始的\
  \ `ROWID` 查询 ID 为 1 的行，数据会发生什么变化：\n```\nSQL> select id,spcol from updtest_ql where\
  \ rowid = 'AAAG6TAAFAALORzAAA';\n```\n```\nno rows selected\n```\n\n这种行为与我们最初描述的更新效果不同。你可以在\
  \ Kerry Osborne 的博客中找到原始的参考资料：\n[`http://kerryosborne.oracle-guy.com/2011/01/ehcc-mechanics-proof-that-whole-cus-are-not-decompressed/`](http://kerryosborne.oracle-guy.com/2011/01/ehcc-mechanics-proof-that-whole-cus-are-not-decompressed/)\n\
  \n旧的 `ROWID` 已经无法访问。那么新的 `ROWID` 呢？你肯定希望它能正常工作：\n```\nSQL> select id,spcol from\
  \ updtest_ql where rowid = 'AAAG6TAAFAAK4jhAAA';\n```\n```\nID SPCOL\n----------\
  \ ----------------------------------------\n1 I AM UPDATED\n```\n\n在为这个更新版本进行研究时，无法创建一个行被真正迁移的测试案例。换句话说，无法使用其旧的\
  \ `ROWID` 检索到更新后的行。乍一听这很奇怪，但另一方面，它简化了处理过程。如果 Oracle 在原地留下一个指向新行的指针，它将需要在新块上执行另一次查找，从而减慢处理速度。\n\
