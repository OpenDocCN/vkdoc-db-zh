  ### 参数


  与`cell smart table scan`事件类似，`cell smart index scan`的参数不包含很多细节。仅提供了存储 cell 哈希号和被扫描段的对象
  ID：


  *   `P1` - 存储 cell 哈希号

  *   `P2` - 未使用

  *   `P3` - 未使用

  *   `obj#` - 被扫描索引的对象号


  ### cell single block physical read


  此事件等同于非 Exadata 平台上使用的`db file sequential read`事件。单块读取最常用于索引访问路径（包括索引块读取和通过索引查找得到的
  rowid 进行的表块读取）。它们也可用于各种其他适合读取单个块的操作。



