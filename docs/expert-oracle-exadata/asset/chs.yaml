  \ * `CPU_COUNT` * 实例数，在本例中是 1 * 24 * 2，等于 48。\n\n### I/O 校准\n\nOracle 数据库版本 11.2.0.2\
  \ 对自动 DOP 引入了一项限制，要求在语句被自动并行化之前，必须先完成 I/O 系统的校准。此限制在版本 12c 中被解除。校准由`DBMS_RESOURCE_MANAGER.CALIBRATE_IO`过程完成，该过程会生成一个随机只读工作负载，并将其分布到\
  \ RAC 集群中的所有实例上。该过程可能会给系统带来显著的负载。文档建议在系统空闲或负载非常低时运行它。以下是一个示例，展示了在校准过程未运行且`PARALLEL_DEGREE_POLICY`在\
  \ 11.2.0.4 上被设置为`limited`、`auto`或`adaptive`时会发生什么：\n\n`SQL> @dplan`\n`Enter value\
  \ for sql_id: 05cq2hb1r37tr`\n`Enter value for child_no:`\n```\nPLAN_TABLE_OUTPUT\n\
  ---------------------------------------------------------------------------------------\n\
  SQL_ID  05cq2hb1r37tr, child number 0\n-------------------------------------\nselect\
