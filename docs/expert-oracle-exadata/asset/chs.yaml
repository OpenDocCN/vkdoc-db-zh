  \ 5853784365\nUNIT_TYPE       2010/12/23            1            1.000000  0   \
  \      1        5853784365\nSKU_TYPE        2010/12/23            54884        \
  \ .000018  0         1        5853784365\nQTY             2010/12/23           \
