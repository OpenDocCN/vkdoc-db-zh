  \ ex01db02.example.com 正向解析为 10.30.20.86\n正常: 10.30.20.86 不响应 ping\n正在处理 CELL 部分\n\
  正常: ex01cel01.example.com 正向解析为 10.30.20.87\n正常: 10.30.20.87 不响应 ping\n正常: ex01cel02.example.com\
  \ 正向解析为 10.30.20.88\n正常: 10.30.20.88 不响应 ping\n...\n正在处理 FACTORY 部分\n正常: 192.168.1.1\
  \ 不响应 ping\n...\n正常: 192.168.1.9 不响应 ping\n正在处理 SWITCHES 部分\n正常: ex01sw-ip.example.com\
  \ 正向解析为 10.30.20.95\n正常: 10.30.20.95 不响应 ping\n...\n正在处理 ILOMS 部分\n正常: ex01db01-ilom.example.com\
  \ 正向解析为 10.30.20.90\n正常: 10.30.20.90 不响应 ping\n...\n验证已完成...\n```\n\n在 `<client>-<cluster>-<checkup>.out`\
  \ 文件中生成的输出报告包含与屏幕上显示相同的信息。如果发生任何验证错误，它们会以 `ERROR` 为前缀，并且描述失败的消息会指出遇到的问题以及预期的结果应该是什么。例如：\n\
  \n```\n正在处理 SCAN 部分\n正常: exa-scan.example.com 解析为 3 个 IP 地址\n错误: exa-scan. ourcompany.com\
  \ 错误地正向解析为 144.77.43.182 144.77.43.181 144.77.43.180，预期为 144.77.43.87\n...\n正在处理\
  \ COMPUTE 部分\n正常: exadb01.example.com 正向解析为 10.80.23.1\n正常: 10.80.23.1 反向解析为 exadb01.example.com.\n\
  错误: 10.80.23.1 响应 ping\n```\n\nCheckIP 的输出必须不包含任何错误。如果您在输出中看到任何错误，必须在运行 OneCommand\
  \ 之前进行纠正。检查 `<client>-<cluster>-checkip.out` 文件，并确保在与网络管理员讨论之前，您没有输入错误的 IP 地址或拼错主机名。有时只需要对\
  \ Exadata 部署助手上的数据录入字段进行简单的更正即可。如果您这边一切看起来正常，请将 `<client>-<cluster>-checkip.out`\
  \ 文件发送给您的网络管理员进行修复。\n\n\n### 第 5 步：为 Exadata 机架布设线缆与电源\n\n网络验证完成后，即可将所需线缆布设至机架预定位置。Exadata\
  \ 机架从 Oracle 发货时，其内部线缆已全部连接完毕。这意味着将 Exadata 机架接入现有网络所需的**外部**线缆数量等于计算节点数量的两倍（每个节点两条），再加上一条管理网络线缆。内部线缆的布设示意图请参考图\
  \ 8-23。\n\n![A978-1-4302-6242-8_8_Fig23_HTML.gif](img/A978-1-4302-6242-8_8_Fig23_HTML.gif)\n\
  \n图 8-23. Exadata 铜缆网络示意图\n\n虽然 Exadata 部署助手允许选择客户端访问网络是否采用绑定模式，但大多数 Exadata 配置会采用绑定网络以实现高可用性。由于此网络在\
  \ Exadata 上被视为关键网络，强烈建议采用绑定客户端访问网络。为此，特定主机上的每个端口需连接到不同的交换机。在使用铜缆连接客户端访问网络的 Exadata\
  \ X5-2 系统上，使用端口 NET1 和 NET2。对于使用光纤连接的 Exadata X5-2 系统，端口 NET4 和 NET5 连接至外部交换机。无论采用哪种配置，都会为此网络创建一个名为\
  \ `bondeth0`（第一个以太网绑定）的绑定接口。绑定客户端访问网络的推荐布线连接方式请参考图 8-24。\n\n![A978-1-4302-6242-8_8_Fig24_HTML.gif](img/A978-1-4302-6242-8_8_Fig24_HTML.gif)\n\
  \n图 8-24. 绑定的铜缆客户端访问网络\n\n线缆布设完成后，请**不要**将其插入 Exadata 机架。由于机架预设了一组“出厂”IP 地址，如果这些地址在网络中其他地方已被使用，可能会导致\
  \ IP 冲突。所有线缆将在运行 `applyElasticConfig.sh` 脚本后再进行连接。\n\n### 第 6 步：执行硬件安装\n\n硬件安装通常由经认证的\
  \ Oracle 现场服务工程师（FSE）执行，该工程师有权访问企业安装服务检查表。此安装步骤相对简单，包括为 Exadata 机架上电、验证所有正确组件均已发货，并确保设备在运输过程中未受损。FSE\
  \ 将执行多项硬件检查，并根据 Exadata 部署助手生成的 `InstallationTemplate.html` 文件中的设定配置网络设备。安装期间，FSE\
  \ 将配置配电单元、所有 InfiniBand 交换机和内部以太网交换机。此时无需网络连接。此外，如果要将多个机架连接成一个集群，将在本步骤中进行多机架布线。\n\
  \n### 第 7 步：准备 OneCommand 文件与 Oracle 软件\n\n在将配置文件复制到即将安装的 Exadata 计算节点之前，必须安装最新版的\
  \ Oracle Exadata 部署助手。该软件可从 My Oracle Support 的 `note #888828.1` 链接下载。下载最新版的 Oracle\
  \ Exadata 部署助手后，需要将其传输到所有计算节点。\n\n将参数和部署文件传输到 Exadata 有几种方法。一种方法是设置临时网络访问第一个计算节点。此网络配置将在后续步骤中被\
  \ `applyElasticConfig.sh` 替换为永久网络设置。另一种选择是将文件保存到便携式 USB 闪存盘，然后使用第一个计算节点前面板的 USB\
  \ 端口，将文件复制到 OEDA 目录。USB 方法在较旧的 Exadata 型号（包含 `KVM`）上更为方便。由于缺少 `KVM`，建议创建到 Exadata\
  \ 机架的临时网络连接。\n\nExadata 机架的出厂 IP 设置旨在确保每个机架到达客户现场时处于相同状态。所有机架将完全相同，无论规模大小——更大的机架系统只是使用了更多\
  \ IP 地址。IP 地址根据机架中的位置和网络组件类型分配。当 Oracle 在 X5-2 上引入弹性配置时，标准机架限制被移除。由于这种灵活性，新节点被配置为查询\
  \ InfiniBand 交换机以确定其默认 IP 地址。现在的标准出厂 IP 地址方案是使用 `172.16.2.0/24` 子网，其中最后八位由 InfiniBand\
  \ 端口号加上 `36` 决定。这意味着，连接到 InfiniBand 端口 `8` 的第一个计算节点，其出厂 IP 地址为 `172.16.2.44`。`ILOM`\
  \ IP 地址按照 `192.168.1.x` 的约定配置，按机架递增。请查阅《Exadata 用户指南》中的 InfiniBand 网络布线表，以确定您机架的\
  \ InfiniBand 端口矩阵。\n\n要从笔记本电脑通过内部网络连接到 Exadata 计算节点，请在工厂网络上分配一个未使用的 IP 地址（例如 `172.16.2.244`，子网掩码\
  \ `255.255.255.0` 即可），并连接到内部以太网交换机端口 `48` 引出的线缆。然后，直接登录第一个计算节点（通常为 `172.16.2.44`），并通过\
  \ `SCP` 上传下载的 OEDA zip 文件。现在，是时候在整个集群上准备文件了。\n\n在第一个计算节点的 `/opt/oracle.SupportTools/onecommand`\
  \ 目录中解压 OEDA 文件。在第一个计算节点上准备配置文件。将 OEDA 软件和配置文件复制到所有计算节点。将 Oracle 安装介质和补丁程序复制到第一个计算节点。\n\
  \n#### 步骤 7-1：解压 OEDA\n\n在此示例中，OEDA 软件已上传到第一个计算节点的 `/tmp/p20974448_121211_Linux-x86-64.zip`。解压该文件，然后为\
  \ OEDA 创建一个新目录，并将 zip 文件的内容解压到该目录中。\n\n```\n# mkdir -p /opt/oracle.SupportTools/onecommand\n\
  # chmod 777 /opt/oracle.SupportTools/onecommand\n# cd /tmp\n# unzip –q p20974448_121211_Linux-x86-64.zip\
  \ –d /opt/oracle.SupportTools/onecommand\n```\n\n#### 步骤 7-2：准备配置文件\n\n现在 OEDA 已在第一个计算节点上准备好，请将\
  \ Exadata 部署助手创建的所有配置文件上传到第一个计算节点的 `/opt/oracle.SupportTools/onecommand/linux-x64`\
  \ 目录。\n\n#### 步骤 7-3：将 OEDA 复制到所有计算节点\n\n需要将 `/opt/oracle.SupportTools/onecommand`\
  \ 目录的内容复制到机架中的所有计算节点。由于主机上未配置无密码访问，您需要使用单独的 `scp` 命令进行复制。以下示例针对半机架配置：\n\n```\n#\
  \ scp –r /opt/oracle.SupportTools/onecommand  172.16.2.46: /opt/oracle.SupportTools\n\
  # scp –r /opt/oracle.SupportTools/onecommand  172.16.2.45: /opt/oracle.SupportTools\n\
  # scp –r /opt/oracle.SupportTools/onecommand  172.16.2.48: /opt/oracle.SupportTools\n\
  ```\n\n\n##### 第 7-4 步：暂存 Oracle 安装介质\n\n最终，执行 Oracle 软件安装所需的软件必须上传至第一个计算节点上的`/opt/oracle.SupportTools/onecommand/linux-x64/WorkDir`目录。无需担心在其它节点上暂存安装文件——OneCommand\
  \ 会根据需要传输这些文件。安装模板应包含一个“必需下载”部分，其中列出了执行安装所需的全部文件列表。该列表通常包括以下内容：\n\n*   Oracle RDBMS\
  \ 和 Grid Infrastructure 安装介质\n*   用于安装介质的季度数据库补丁文件\n    *   特定版本的`OPatch`文件\n  \
  \  *   任何建议的额外单点补丁\n\n所有文件现已上传并暂存，您已准备好开始实际的配置过程。\n\n### 第 8 步：配置操作系统\n\n当 Oracle\
  \ 硬件工程师完成安装后，您就可以首次启动计算节点和存储单元了。出厂时，新发货的 Exadata 中包含的服务器会预设一组 IP 地址，这被称为“**出厂配置**”。对于机架内升级，您将需要经历一个交互式的首次启动过程。首次启动过程在\
  \ Oracle 手册中并未详细记录，因此我们将花点时间讨论一下启动过程，以及首次启动这些服务器和存储单元时会发生什么。通常情况下，您拿到的是一个新的 Exadata\
  \ 机架，它会直接引导至操作系统登录界面。\n\n#### 回收磁盘空间\n\n在配置出厂配置中的计算和存储服务器的网络设置之前，确保计算节点磁盘配置正确非常重要。X3-2\
  \ 和 X4-2 计算节点发货时同时预装了 Linux 和 Solaris，让客户可以选择安装哪个操作系统。X5-2 计算节点发货时可选择物理 Linux 安装（默认）或用于运行虚拟化环境的\
  \ Oracle VM 安装。计算节点上安装了一个脚本(`/opt/oracle.SupportTools/reclaimdisks.sh`)，它将移除不需要的操作系统，并在所有磁盘驱动器上构建一个完全配置的\
  \ RAID-5 阵列。是时候回收可用磁盘空间，清除未使用的操作系统了。\n\n```\n# ./reclaimdisks.sh -free -reclaim\n\
  ```\n\n该脚本将在前台运行，重新配置逻辑卷配置。在 X5-2 计算节点上运行`reclaimdisks.sh`的输出如下所示：\n\n```\n# ./reclaimdisks.sh\
  \ –reclaim -free\nModel is ORACLE SERVER X5-2\nNumber of LSI controllers: 1\nPhysical\
  \ disks found: 4 (252:0 252:1 252:2 252:3)\nLogical drives found: 1\nLinux logical\
  \ drive: 0\nRAID Level for the Linux logical drive: 5\nPhysical disks in the Linux\
  \ logical drive: 4 (252:0 252:1 252:2 252:3)\nDedicated Hot Spares for the Linux\
  \ logical drive: 0\nGlobal Hot Spares: 0\n[INFO     ] Check for Linux system disk\n\
  [INFO     ] Number of partitions on the system device /dev/sda: 4\n[INFO     ] Higher\
  \ partition number on the system device /dev/sda: 4\n[INFO     ] Last sector on\
  \ the system device /dev/sda: 3509760000\n[INFO     ] End sector of the last partition\
  \ on the system device /dev/sda: 3509759000\n[INFO     ] Remove inactive system\
  \ logical volume /dev/VGExaDb/LVDbSys3\n[INFO     ] Remove xen files from /boot\n\
  [INFO     ] Unmount /u01 from /dev/mapper/VGExaDbOra-LVDbOra1\n[INFO     ] Remove\
  \ logical volume /dev/VGExaDbOra/LVDbOra1\n[INFO     ] Remove volume group VGExaDbOra\n\
  [INFO     ] Remove physical volume /dev/sda4\n[INFO     ] Remove partition /dev/sda4\n\
  [INFO     ] Remove device /dev/sda4\n[INFO     ] Remove partition /dev/sda3\n[INFO     ]\
  \ Remove device /dev/sda3\n[INFO     ] Create primary partition 3 using 240132160\
  \ 3509759000\n[INFO     ] Set lvm flag for the primary partition 3 on device /dev/sda\n\
  [INFO     ] Add device /dev/sda3\n[INFO     ] Create physical volume on partition\
  \ /dev/sda3\n[INFO     ] Primary LVM partition /dev/sda3 has size 3269626841 sectors\n\
  [INFO     ] LVM Physical Volume /dev/sda3 has size 3269626841 sectors\n[INFO     ]\
  \ Size of LVM physical volume matches size of primary LVM partition /dev/sda3\n\
  [INFO     ] Extend volume group VGExaDb with physical volume on /dev/sda3\n[INFO     ]\
  \ Create 100Gb logical volume for DBORA partition in volume group VGExaDb\n[INFO     ]\
  \ Make DBORA ext4 file system on logical volume LVDbOra1\n[INFO     ] Create filesystem\
  \ on device /dev/VGExaDb/LVDbOra1\n[INFO     ] Tune filesystem on device /dev/VGExaDb/LVDbOra1\n\
  [INFO     ] Set label DBORA for /dev/VGExaDb/LVDbOra1\n[INFO     ] Mount /dev/mapper/VGExaDb-LVDbOra1\
  \ to /u01\n[INFO     ] Logical volume LVDbSys2 exists in volume group VGExaDb\n\
  ```\n\n整个过程在 X5-2 计算节点上大约需要五分钟。对所有剩余的计算节点重复此步骤，并为处于出厂配置的 Exadata 系统运行`applyElasticConfig.sh`脚本。\n\
  \n#### 首次启动过程\n\n每次服务器启动时，在运行级别 3 会调用`/etc/init.d/precel`脚本。该脚本会调用`/opt/oracle.cellos/cellFirstboot.sh`（首次启动）脚本。首次启动脚本会判断网络设置是否已经配置。这点未在文档中说明，但看起来它是由`/opt/oracle.cellos/cell.conf`文件的存在触发的。该文件由`/opt/oracle.cellos/ipconf.pl`脚本（`ipconf`）创建和维护，并包含有关您网络配置的所有信息。如果该文件存在，系统将假定已经配置完毕并继续启动周期。但如果未找到该文件，首次启动脚本将调用`ipconf`，并引导您通过交互式过程完成网络配置。`ipconf`用于为您的计算节点和存储单元设置以下网络参数：\n\
  \n*   名称服务器（DNS）\n*   时间服务器（NTP）\n*   国家代码\n*   本地时区\n*   主机名\n*   所有网络设备的 IP 地址、子网掩码、网关、类型和主机名。类型是必需的，用于`cell.conf`文件中的内部文档。有效的类型包括`Private`、`Management`、`SCAN`和`Other`。\n\
  *   `ILOM`配置\n\n例如，以下列表显示了在计算节点上配置管理网络时的提示：\n\n```\nSelect interface name to configure\
  \ or press Enter to continue: eth0\nSelected interface. eth0\nIP address or none:\
  \ 192.168.8.217\nNetmask: 255.255.255.0\nGateway (IP address or none) or none: 192.168.8.1\n\
  Select network type for interface from the list below\n1: Management\n2: SCAN\n\
  3: Other\nNetwork type: 1\nFully qualified hostname or none: exadb03.ourcompany.com\n\
  ```\n\n当您完成所有网络设置的输入后，`ipconf`会生成一个新的`cell.conf`文件并重启系统。系统重启完成后，即可运行`reclaimdisks.sh`脚本，并完成由\
  \ OEDA 执行的软件安装。\n\n\n\n### applyElasticConfig\n\n由于 Exadata 机架上的主机已配置了出厂 IP 设置，服务器不会启动至`ipconf`脚本。Oracle\
  \ 提供了一种自动化方法，可通过脚本设置机架上所有主机的网络信息。`applyElasticConfig.sh`脚本实现了这一过程的自动化。该脚本包含在 Oracle\
  \ Exadata 部署助手（Oracle Exadata Deployment Assistant）中。它将确定每个节点（存储或计算）的主机类型，并应用该主机的特定网络设置。这是通过`ipconf`实用程序完成的。Exadata\
  \ 部署助手创建的文件包括`<client>-<cluster>-preconf_rack_#.csv`和`<client>-<cluster>.xml`参数文件。`<client>-<cluster>-preconf_rack_#.csv`文件包含为每个计算节点和存储单元创建`cell.conf`文件所需的所有网络设置。由于`applyElasticConfig.sh`脚本会连接，`applyElasticConfig.sh`会调用`ipconf`脚本生成这些文件，并将它们作为`/opt/oracle.cellos/cell.conf`安装到每个计算节点和存储单元中。要运行`applyElasticConfig.sh`，请以\
  \ root 用户身份登录系统中的第一个计算节点，并按如下方式运行：\n\n```\n[root@exadb01 root]# cd /opt/oracle.SupportTools/onecommand/linux-x64\n\
  [root@exadb01 linux-x64]# ./applyElasticConfig.sh –cf <client>-<cluster>.xml\nApplying\
  \ Elastic Config...\nApplying Elastic configuration...\nSearching Subnet 172.16.2.x..............\n\
  7 live IPs in  172.16.2.x...............\nExadata node found 172.16.2.44..\nConfiguring\
  \ node : 172.16.2.46...............\nDone Configuring node : 172.16.2.46\nConfiguring\
  \ node : 172.16.2.40.............\nDone Configuring node : 172.16.2.40\nConfiguring\
  \ node : 172.16.2.37.............................\nDone Configuring node : 172.16.2.37\n\
  ```\n\n配置每个节点时，它将在配置最终网络设置后重新启动。一旦所有服务器完成启动周期，Exadata 应该已准备好连接到网络并使用 OneCommand\
  \ 进行配置。在所有组件重新启动且机架已连接到网络后，登录第一个计算节点并运行 OneCommand 脚本的第一步，以验证一切是否准备就绪。\n\n### 步骤\
  \ 9：运行 OneCommand\n\nOneCommand（包含在 OEDA zip 文件中）是在 Exadata 上安装 Oracle 软件的首选方法。OneCommand\
  \ 是 Oracle 提供的一个实用程序，由多个配置步骤组成（截至本文撰写时有 20 个）。OneCommand 为 Exadata 客户和 Oracle 的支持人员提供了两个非常重要的好处。首先，它创建了数量有限的标准化（且众所周知的）配置，这使得平台更易于支持。毕竟，当终于联系到支持技术人员时，谁愿意听到“哦，我从未见过那样配置”呢？这是\
  \ Exadata 的关键优势之一。其次，它为从开始到结束配置 Exadata 提供了一个简化且结构化的机制。这意味着，凭借对 Exadata 内部原理的极少了解，经验丰富的技术人员可以在几小时内安装和配置\
  \ Exadata。目前尚不清楚 Oracle 最初是否打算对外提供对 OneCommand 的支持，但大约在 X2 开始发货的同时，Oracle 开始在《Exadata\
  \ 所有者指南》（Exadata Owner’s Guide）中记录 OneCommand 流程。OneCommand 是一个多步骤过程，从一个名为`install.sh`的\
  \ shell 脚本运行。在撰写本文时，`install.sh`脚本支持安装 11.2.0.3 到 12.1.0.2 的版本，包括每个捆绑补丁。这些步骤可以端到端运行，也可以一次运行一个。表\
  \ 8-14 显示了 2015 年 5 月版本中的每个步骤，以及该步骤功能的简要描述。\n\n表 8-14.\nOneCommand 步骤\n\n| 步骤编号\
  \ | 步骤名称 | 描述 |\n| --- | --- | --- |\n| 步骤 1 | `Validate Configuration File` | 执行节点验证，包括检查所有主机是否在线、`<client>-<cluster>.xml`文件中的语法是否正确以及所有必需文件是否可用\
  \ |\n| 步骤 2 | `Update Nodes for Eighth Rack` | 禁用计算节点上的 CPU 核心，移除存储服务器上的闪存卡和磁盘驱动器，然后重新启动所有组件\
  \ |\n| 步骤 3 | `Setup Required Files` | 将所有文件移动到`/opt/oracle.SupportTools/onecommand/Software`目录，将补丁文件复制到整个集群，然后解压缩所有文件\
  \ |\n| 步骤 4 | `Create Users` | 创建配置文件定义的操作系统用户帐户 |\n| 步骤 5 | `Setup Cell Connectivity`\
  \ | 创建`/etc/oracle/cell/network-config/cellip.ora`和`/etc/oracle/cell/network-config/cellinit.ora`文件\
  \ |\n| 步骤 6 | `Verify Infiniband` | 使用`infinicheck`脚本验证 InfiniBand 网络 |\n| 步骤 7\
  \ | `Calibrate Cells` | 使用`cellcli -e calibrate`命令检查单元磁盘。此命令测试单元磁盘的性能特征。如果任何磁盘性能低下，将在此步骤中识别出来。\
  \ |\n| 步骤 8 | `Create Cell Disks` | 在所有存储服务器上配置单元磁盘、闪存缓存（Flash Cache）和闪存日志（Flash\
  \ Log） |\n| 步骤 9 | `Create Grid Disks` | 在所有存储服务器上创建网格磁盘 |\n| 步骤 10 | `Configure\
  \ Alerting` | 配置配置文件定义的 SMTP 和 SNMP 警报目的地 |\n| 步骤 11 | `Install Cluster Software`\
  \ | 安装 Grid Infrastructure 并为配置文件中定义的所有集群应用安装模板中指定的补丁 |\n| 步骤 12 | `Initialize Cluster\
  \ Software` | 在每个集群的所有计算节点上执行`root.sh`集群初始化脚本 |\n| 步骤 13 | `Install Database Software`\
  \ | 安装 Oracle 数据库软件并为配置文件中定义的所有集群应用安装模板中指定的补丁 |\n| 步骤 14 | `Relink Database with\
  \ RDS` | 确保所有数据库和 Grid Infrastructure 主目录都链接为使用 RDS 协议而不是 UDP |\n| 步骤 15 | `Create\
  \ ASM Diskgroups` | 创建配置文件定义的 ASM 磁盘组 |\n| 步骤 16 | `Create Databases` | 创建配置文件定义的数据库\
  \ |\n| 步骤 17 | `Apply Security Fixes` | 关闭集群并应用若干杂项修复 |\n| 步骤 18 | `Install Exachk`\
  \ | 安装`exachk`运行状况检查脚本 |\n| 步骤 19 | `Create Installation Summary` | 创建部署摘要文档，包括\
  \ Exadata 集群的 IP 地址、主机名和序列号 |\n| 步骤 20 | `ResecureMachine` | 对节点应用操作系统安全措施，包括设置密码要求和为\
  \ root 用户删除 SSH 密钥 |\n\n用于运行 OneCommand 的主脚本是`install.sh`。20 个安装步骤可以通过按如下方式运行`install.sh`来列出：\n\
  \n```\n# ./install.sh –cf <client>-<cluster>.xml -l\n1. Validate Configuration File\n\
  2. Update Nodes for Eighth Rack\n3. Setup Required Files\n4. Create Users\n5. Setup\
  \ Cell Connectivity\n6. Verify Infiniband\n7. Calibrate Cells\n8. Create Cell Disks\n\
  9. Create Grid Disks\n10. Configure Alerting\n11. Install Cluster Software\n12.\
  \ Initialize Cluster Software\n13. Install Database Software\n14. Relink Database\
  \ with RDS\n15. Create ASM Disk Groups\n16. Create Databases\n17. Apply Security\
  \ Fixes\n18. Install Exachk\n19. Create Installation Summary\n20. Resecure Machine\n\
  ```\n\n**注意**\nOneCommand 不断变化以改进安装过程并支持额外的捆绑补丁。步骤的数量及其功能很可能随着每个 Exadata 版本而变化。在开始之前，请务必查看\
  \ README 文件，了解如何在您的系统上运行 OneCommand 的说明。\n\n\n\n"
- '# Exadata 安装与升级指南


  ## 使用 install.sh 脚本


  `install.sh` 脚本有多种使用方式。例如，以下命令行选项会处理安装过程的全部 20 个步骤，仅在某个步骤失败时停止：

  ```bash

  # ./install.sh -cf <client><cluster>.xml -r 1-20

  ```

  每个步骤必须成功完成才能进行下一步。Oracle 建议一次运行一个步骤，在继续下一步之前审查每个步骤的输出。`install.sh` 通过 `-s` 命令行选项提供了此功能。例如，安装过程可能如下所示：

  ```bash

  # ./install.sh –cf <client>-<cluster>.xml -s 1

  ```

  检查输出是否有错误...

  ```bash

  # ./install.sh –cf <client>-<cluster>.xml -s 2

  ```

  检查输出是否有错误...

  ```bash

  # ./install.sh –cf <client>-<cluster>.xml -s 3

  ```

  检查输出是否有错误...

  ```bash

  # ./install.sh –cf <client>-<cluster>.xml -s 4

  ```

  依此类推...


  `install.sh` 接受您之前使用 Exadata 部署助手生成的文件中的参数作为输入。每次调用 `install.sh` 执行配置步骤时都会创建日志文件，并且对于某些步骤，它会动态生成并执行一个
  shell 脚本来完成所有必需的任务。查看这些文件对于确定步骤失败的原因非常有用。日志文件和动态生成的 shell 脚本存储在 `/opt/oracle.SupportTools/onecommand/linux-x64/log`
  和 `/opt/oracle.SupportTools/onecommand/linux-x64/tmp` 目录中。


  各个安装步骤生成的输出差异很大。但通常，`install.sh` 会显示一些头部信息，告知您正在运行的步骤、日志文件的位置以及是否成功完成。继续完成所有步骤，直到部署摘要完成。


  ## 升级 Exadata


  随着越来越多的公司采用 Exadata 平台，硬件升级成为一个日益热门的话题。我们进入 Exadata 领域始于六年前的一台 Exadata V2 四分之一机架配置。大约一年后，我们将系统升级到了半机架。当然，V2
  设备已不再用于生产，因此我们的升级形式是两台 X2-2 数据库服务器和四个存储单元。我们考虑的配置选项如下：


  *   将新的 X2 设备配置为一个独立的 RAC 集群和存储网格，在同一个 Exadata 机柜内创建两个略有不同的四分之一机架配置。Oracle 将此称为“split
  rack”配置。

  *   将新的 X2 设备添加到我们现有的四分之一机架集群中，有效地将其升级为半机架。


  ### 创建新的 RAC 集群


  Exadata 部署助手不直接支持以这种方式升级系统，但通过一些调整，它可以用来生成 OneCommand 执行安装所需的所有文件。


  一旦参数和部署文件上传到 Exadata，您应该能够毫无问题地运行所有配置步骤，而不会影响现有集群。一位同事实际上使用此过程在新设备上创建了一个独立的 Exadata
  配置，同时保持现有系统不变。


  在大多数情况下，您只需像创建匹配机架总大小的配置一样填写 Exadata 部署助手。在选择集群中的组件时，通过选择新组件来创建一个额外的集群。使用 Exadata
  部署助手进行此类 Exadata 升级时，需要考虑以下几点：


  *   **名称前缀**：虽然不是必须的，但您可能希望将“数据库机器名称”、“数据库服务器基本名称”和“存储服务器基本名称”的值设置为与您现有的 Exadata
  配置匹配。这样，如果您决定将这些服务器合并到旧集群中，就不必更改主机名。例如，我们的四分之一机架配置的数据库主机名为 `enkdb01` 和 `enkdb02`。添加新服务器后，继续使用名称
  `enkdb03` 和 `enkdb04`。同样，存储单元主机名继续使用 `enkcel04` 到 `enkcel07`。

  *   **客户端访问 SCAN 名称**：此过程将创建一个新的 RAC 集群，因此您需要一个新的 SCAN 名称。您还需要确保它以及所有其他新主机名在您公司的
  DNS 服务器中正确注册（就像您现有 Exadata 系统安装时那样）。

  *   **国家代码/时区**：当然，这些设置应与您现有的 Exadata 系统匹配。

  *   **NTP 和 DNS 服务器**：这些也应与您现有的 Exadata 环境匹配。

  *   **Oracle 数据库机器模型**：此设置决定配置器在创建主机名和 IP 地址时将使用多少计算节点和存储单元。

  *   **网络 IP 地址**：您应继续使用为要升级的 Exadata 机架配置的网络。在 Exadata 部署助手中输入主机的起始 IP 地址时，请确保在“审阅详细信息”屏幕上进行必要的
  IP 地址调整。

  *   **操作系统用户和组账户**：虽然不是必须的，但在配置新集群时，应使用相同的用户/组名和用户/组 ID。如果这些用户账户有可能在新系统和旧系统之间交互，则尤其如此。OneCommand
  不会为您建立新旧服务器之间的用户等效性。因此，这必须在升级完成后手动完成。


  完成输入设置后，像通常一样生成文件。您会注意到每个集群都有单独的 XML 文件，还有一个用于定义整个机架的 XML 文件。


  从此时起，该过程与全新安装没有区别。首先，您需要使用之前讨论的 Firstboot 配置网络组件，然后运行回收磁盘空间的程序。完成后，只需以 root 用户身份登录到第一台新的计算节点，运行
  `install.sh` 配置步骤并调用特定于新集群的 XML 文件。完成后，您将拥有一个新的 RAC 集群，其中包含一个初始数据库。


  #### 升级现有集群


  如果您要将 Exadata 升级到半机架或全机架配置，并希望将新服务器和单元集成到您现有的 RAC 集群中，则必须手动配置新服务器和单元。《Exadata 数据库机器扩展与多机架布线指南》中有一章题为“扩展
  Oracle 数据库机器”，详细讨论了该过程。首先，我们将了解配置新计算节点的基本步骤。然后，我们将了解如何将新单元添加到您现有的存储网格中。


  > **注意**

  >

  > 本节中的步骤并非旨在作为全面的指南，并且可能会发生变化。请参阅您的 Exadata 文档以获取特定于您 Exadata 版本的详细信息。





  '
- "# 配置数据库服务器\n\n以下流程描述了如何配置新的计算节点：\n\n1.  将您的 IB 交换机固件升级到当前版本或最新补丁。为您安装新硬件的 Oracle\
  \ 硬件技术人员可以为您完成此操作，或者您可以自行下载最新补丁并进行安装。推荐的固件补丁可在 MOS 注释中找到：`888828.1`。\n2.  将现有设备上的\
  \ Exadata 存储服务器软件版本更新为与新主机一致。这也包括更新计算节点上的操作系统。\n3.  如果可能，请将 Oracle Grid Infrastructure\
  \ 和数据库软件更新到与您现有系统运行的软件版本相对应的最新捆绑补丁。理想情况下，软件应运行在最新版本和捆绑补丁上。\n4.  使用 Exadata 部署助手为新计算节点和存储单元生成\
  \ IP 地址和主机名。请勿包含与现有主机相关的信息。\n5.  在您的 DNS 服务器中注册新的主机名和 IP 地址。\n6.  逐个启动您的新计算节点。首次启动时，`ipconf`将自动启动，允许您输入网络设置。\n\
  7.  在数据库服务器上，将以下文件从您现有的某个数据库服务器复制到新的数据库服务器：\n    *   `/etc/security/limits.conf`\n\
  \        此文件在所有计算节点上都是相同的。\n    *   `/etc/profile`\n        此文件在所有计算节点上都是相同的。\n\
  8.  将用于运行 Exadata 部署助手的 OEDA 版本安装到第一个新计算节点上，包括步骤 4 中创建的文件。\n9.  在第一个新计算节点上运行`install.sh`，直到但**不包括**`CreateGridDisks`步骤。\n\
  10. 按照《所有者指南》中的步骤，将 Grid Infrastructure 和数据库主目录克隆到新服务器。该过程类似于向任何 Oracle RAC 系统添加新节点。\n\
  \n**注意**\n\n决定是扩展现有集群还是创建新集群可能是一个艰难的选择。对于许多客户而言，选择取决于许多不同的因素；新设备与现有设备之间的硬件差异（例如\
  \ V2/X2-2 组合与 V2/X3-2 组合）、数据库大小、整合工作负载以及停机时间要求都是决策的考量因素。虽然事后逆转决定并非难事，但这确实涉及额外的工作，并且可能对正在被重新配置的设备上运行的数据库产生影响。一如既往，在决定升级方向之前，请坐下来仔细权衡每种方法的利弊。\n\
  \n"
- "# 扩展 Exadata 存储\n\n向您现有的存储网格添加新单元是一个相当简单的过程。执行上述步骤将完成大部分工作。我们将看看剩余的过程，以便您了解所涉及的命令和文件。流程如下：\n\
  \n1.  执行`install.sh`中与配置单元警报相关的步骤。如果您希望手动完成，可以使用`cellcli`实现：\n    ```\n    ALTER\
  \ CELL smtpServer='mail.example.com',\n    smtpFromAddr='Exadata@example.com',\n\
  \    smtpFrom='Exadata',\n    smtpToAddr='all.dba@example.com,all.sa@example.com',\n\
  \    notificationPolicy='critical,warning,clear',\n    notificationMethod='mail'\n\
  \    ```\n    您可以使用`LIST CELL DETAIL`命令显示当前的单元配置。完成单元配置后，停止并重新启动单元服务以确保新设置生效。\n\
  2.  参照您的一台旧存储单元，使用`CREATE GRIDDISK`命令创建您的网格磁盘。我们在第 14 章中讨论了此命令的使用。请确保按正确的顺序创建网格磁盘，因为这会影响磁盘性能。您可以使用`LIST\
  \ GRIDDISK DETAIL`命令的大小和偏移属性来确定网格磁盘的适当大小和创建顺序。通常，您应按此顺序创建网格磁盘：`DATA`、`RECO`，然后是`DBFS_DG`。\n\
  3.  更新所有计算节点（新旧）上的`/etc/oracle/cell/network-config/cellip.ora`文件，以反映所有单元的 InfiniBand\
  \ IP 地址。\n4.  将新的网格磁盘添加到您现有的 ASM 磁盘组中。这可以通过 ASM 中的 SQL*Plus 完成。以下示例显示了在半机架升级中将磁盘添加到`DATA`磁盘组（机架名为“dm01”）——对剩余的磁盘组重复此过程。\n\
  \    ```\n    SQL> ALTER DISKGROUP DATA ADD DISK\n      2> 'o/*/DATA*dm01cel04*',\n\
  \      3> 'o/*/DATA*dm01cel05*',\n      4> 'o/*/DATA*dm01cel06*',\n      5> 'o/*/DATA*dm01cel07*'\n\
  \      6> rebalance power 32;\n    ```\n\n"
- '# 总结


  配置 Exadata 是一个非常详细的过程，随着硬件和软件新版本的发布，某些方面往往会有所变化。本章讨论了配置 Exadata 计算节点和存储单元的一些要点，但它并非官方
  Oracle 文档的替代品。Oracle 在文档编写方面做得非常出色，您会发现《安装与配置指南》和《存储软件用户指南》是学习配置 Exadata 细节的无价资产。本章涵盖的部分主题与第
  9 章和第 15 章讨论的内容有重叠，因此您可能会发现它们对于交叉参考此处讨论的一些配置任务很有帮助。





  '
- '# 9. Exadata 的恢复


  你可能听过“磁盘会转动，也会死亡”这种说法。虽然我们不愿去想，但从你启动新系统的那一刻起，你的磁盘就开始老化了。磁盘在过去 30 年里取得了长足的进步，其预期寿命也显著提高了。但归根结底，问题是磁盘“何时”会发生故障，而不是“是否”会发生。而且我们都知道，许多磁盘的故障远早于其应有寿命。通常，诊断磁盘故障以及故障发生时如何应对，是系统管理员或存储管理员的职责。对许多数据库管理员（DBA）而言，Exadata
  将改变这一现状。现有的许多 Exadata 系统完全由 DBA 团队管理。无论你们数据中心的情况是否如此，在 Exadata 上从磁盘故障中恢复的流程，将与你以往习惯的方式有所不同。


  传统的 Oracle 数据库服务器需要两种备份：操作系统备份和数据库备份。Exadata 计算节点依赖于行业标准的硬件 RAID 和 Linux 逻辑卷，以确保其能抵御硬件故障并易于管理。Exadata
  在此基础上增加了存储单元，随之而来的是一个全新的、需要保护且偶尔需要恢复的子系统。存储单元是相当坚固的硬件设备，它采用 Linux 软件 RAID 来保护操作系统文件系统。因此，单个磁盘故障很可能不需要进行操作系统恢复。更可能的原因包括人为错误、补丁安装失败或软件缺陷。请记住，这些物理磁盘设备也包含了网格磁盘（数据库卷），因此丢失其中一个磁盘很可能也意味着数据库存储的丢失。Oracle
  在 Exadata 中设计了多种功能来保护你的数据并减少此类故障的影响。本章将讨论一些更常见的存储故障场景、如何诊断它们，以及如何以最小的停机时间进行恢复。


  **注意**


  撰写本章最具挑战性的一个方面是，我们讨论的命令和脚本变化迅速。在许多情况下，恢复任务会让你非常贴近 Exadata 的硬件层进行操作。因此，在阅读本章时请牢记，随着
  Exadata 硬件和软件的每个新版本发布，本章讨论的命令和脚本可能会发生变化。请务必查阅 Oracle 文档，获取此处讨论的命令和脚本的最新更新。


  ## Exadata 诊断工具


  Exadata 是一个高度复杂的硬件和软件组合体，它们协同工作，形成一个极其强健的交付平台。这个平台的复杂性起初可能有点令人望而生畏。要有效地维护这个平台，需要理解的组成部分实在太多了。Oracle
  提供了丰富的诊断工具，可用于验证、分析和报告有关系统配置和健康状况的重要信息。在本节中，我们将讨论其中一些工具及其使用方法。


  ### Sun 诊断工具：sundiag.sh


  每台 Exadata 数据库服务器和存储单元上都安装了 `sundiag.sh` 脚本，位于 `/opt/oracle.SupportTools` 目录中。在较新版本的
  Exadata 存储服务器软件上，该脚本通过 `exadata-sun-computenode` 或 `exadata-sun-cellnode` RPM 包安装。如果出于某种原因在你的系统上找不到它，可以从
  My Oracle Support 下载。请参考 MOS 文档 ID 761868.1。该脚本以 root 账户运行，收集用于排查硬件故障所需的诊断信息。它收集的文件以熟悉的
  `tar` 格式打包，然后使用 bzip2 压缩。


  #### sundiag.sh 的输出


  `sundiag.sh` 脚本会创建一个包含主机名、序列号和运行时间戳的存档文件。例如，在我们的实验室系统上运行该脚本会产生一个如下命名的输出文件：


  `/tmp/sundiag_enkcel05_XXXXXXXX_2014_11_17_12_23.tar.bz2`


  现在，让我们看看 `sundiag.sh` 收集的诊断文件。文件压缩在一个存档中，包含以下组件的文件夹：


  *   `asr`：此目录包含与自动服务请求配置相关的文件。

  *   `cell`：此目录包含各种 `CellCLI` 命令的输出以及与 Exadata 存储服务器软件堆栈相关的日志文件。输出包括单元磁盘、网格磁盘和闪存缓存的配置信息，以及
  cellsrv 和管理服务进程的日志文件。当 `sundiag.sh` 在 Exadata 计算节点上运行时，此目录不会出现。

  *   `disk`：此目录包含与硬盘相关的二进制文件，由 LSI 磁盘控制器生成。

  *   `ilom`：如果使用了 ilom 或 snapshot 选项，此目录将包含 ILOM 数据收集输出。

  *   `messages`：此目录包含来自 syslog 工具的 dmesg 和 messages 系统日志的副本。

  *   `net`：此目录包含与节点上各种网络相关的诊断信息。文件包括 InfiniBand 诊断、任何防火墙规则列表以及网络设备配置文件。此外，还包含 `ethtool`
  命令的输出。

  *   `raid`：`raid` 目录包含来自 `parted`、`fdisk` 和 `mdstat` 命令的磁盘控制器配置信息，以及来自 `MegaCli64`
  命令的 RAID 控制器输出。

  *   `sysconfig`：不属于其他类别的文件存放在这里。文件以其生成命令命名。示例包括 `df-hl.out`、`lspci-vvv.out` 和 `CheckHWnFWProfile.log`。


  `sundiag.sh` 脚本创建的一些更重要的文件描述如下。这些文件在计算节点和存储服务器上都可以找到。


  *   `messages`：这是系统 `/var/log/messages` 文件的副本。`messages` 文件会由操作系统自动轮转和清除。如果你的系统已经运行了一段时间，你将看到多个按升序排列的文件，从当前（`messages`）到最旧（`messages.4`）。此文件由
  `syslog` 守护进程维护，包含有关操作系统健康状况和操作的重要信息。

  *   `dmesg`：此文件由 `dmesg` 命令创建，包含来自内核环缓冲区的诊断级内核信息。内核环缓冲区包含发送到或接收自连接到系统的外部设备（如磁盘驱动器、键盘、视频等）的消息。

  *   `lspci`：此文件包含系统中所有 PCI 设备的列表。

  *   `lsscsi`：`lsscsi` 文件包含系统中所有 SCSI 设备的列表。

  *   `fdisk-l` 和 `parted`：`fdisk-l` 和 `parted` 文件包含系统中所有磁盘设备分区的列表。

  *   `megacli64`：`sundiag.sh` 脚本使用各种选项运行 `MegaCli64` 命令，该命令会查询 MegaRAID 控制器以获取有关磁盘控制器和连接磁盘驱动器的配置和状态信息。MegaRAID
  控制器收集的丰富信息可以很容易地通过 `MegaCli64` 命令获取。例如，`megacli64-PdList_short.out` 文件显示了计算节点上磁盘驱动器的
  RAID 配置摘要：


  ```

  Slot 00 Device 11 (HITACHI H106030SDSUN300GA3D01247NLV9ZD  ) status is: Online,

  Slot 01 Device 10 (HITACHI H106030SDSUN300GA3D01247NGXRZF  ) status is: Online,

  Slot 02 Device 09 (HITACHI H106030SDSUN300GA3D01246NLV1JD  ) status is: Online,

  Slot 03 Device 08 (HITACHI H106030SDSUN300GA3D01247NH06DD  ) status is: Online,

  ```




  '
- "# Exadata 存储监控与 `sundiag.sh` 脚本\n\n## 磁盘状态监控\n\n文件中的信息包括事件日志以及控制器和磁盘驱动器的状态摘要。例如，下面的列表显示了连接到我们的一个数据库服务器的物理磁盘驱动器状态摘要（来自\
  \ `megacli64-status.out` 文件）：\n\n```\nChecking RAID status on enkx3db01.enkitec.com\n\
  Controller a0:  LSI MegaRAID SAS 9261-8i\nNo of Physical disks online : 4\nDegraded\
  \ : 0\nFailed Disks : 0\n```\n\n很难说 Exadata 是否使用 `MegaCli64` 命令来监控磁盘驱动器的预测性故障，或者开发人员是否通过\
  \ API 利用了 SMART 指标，但这些信息都可以在命令行获取。关于 `MegaCli64` 的信息不多，但如果你有兴趣深入了解并仔细查看 Exadata\
  \ 收集的用于确定磁盘子系统健康状况的一些指标，`sundiag.sh` 脚本是一个很好的起点。\n\n## `sundiag.sh` 脚本与日志文件\n\n\
  如果你在存储单元上运行 `sundiag.sh` 脚本，它会收集有关单元配置、警报和数据库服务器上不存在的特殊日志文件的附加数据。以下列表描述了由 `sundiag.sh`\
  \ 收集的这些附加日志文件。\n\n*   `cell-detail`：`cell-detail` 文件包含有关存储单元的详细站点特定信息。这是 `CellCLI`\
  \ 命令 `LIST CELL DETAIL` 的输出。\n*   `celldisk-detail`：此文件包含单元磁盘的详细报告。该报告使用 `CellCLI`\
  \ 命令 `LIST CELLDISK DETAIL` 创建。除其他信息外，它还显示单元磁盘的状态、逻辑单元号 (LUN) 和物理设备分区。\n*   `lun-detail`：此报告使用\
  \ `CellCLI` 命令 `LIST LUN DETAIL` 生成。它包含有关配置单元磁盘的底层 LUN 的详细信息。此报告中包括 LUN 的名称、设备类型和物理设备名称（例如\
  \ `/dev/sdw`）。\n*   `physicaldisk-detail`：`physicaldisk-detail` 文件包含存储单元用于数据库类型存储和\
  \ Flash Cache 的所有物理磁盘和 FMOD 的详细报告。它使用 `CellCLI` 命令 `LIST PHYSICALDISK DETAIL` 生成，包括有关这些设备的重要信息，例如设备类型（硬盘或闪盘）、制造商和型号、插槽地址以及设备状态。\n\
  *   `physicaldisk-fail`：此文件包含所有状态不是“正常”的物理磁盘（包括闪盘）的列表。这包括状态为“不存在”的磁盘，即已更换但尚未从配置中移除的故障磁盘。更换物理磁盘后，其旧配置会在系统中保留七天，之后自动清除。\n\
  *   `griddisk-detail`：此文件包含存储单元上配置的所有网格磁盘的详细报告。它使用 `CellCLI` 命令 `LIST GRIDDISK DETAIL`\
  \ 创建，除其他信息外，还包括你在存储单元上配置的所有网格磁盘的网格磁盘名称、单元磁盘名称、大小和状态。\n*   `griddisk-status`：此文件包含存储单元上配置的每个网格磁盘的名称和状态。它使用\
  \ `CellCLI` 命令 `LIST GRIDDISK ATTRIBUTES NAME, STATUS, ASMMODESTATUS, ASMDEACTIVATIONOUTCOME`\
  \ 创建，并包含从存储服务器和 ASM 两个角度看网格磁盘状态的详细信息。\n*   `flashcache-detail`：此报告包含构成单元闪存缓存的所有\
  \ FMOD 的列表。它是 `CellCLI` 命令 `LIST FLASHCACHE DETAIL` 的输出，包括闪存缓存的大小和状态。此报告中还包含所有以降级模式运行的闪存单元磁盘的列表。\n\
  *   `flashlog-detail`：此报告包含构成单元闪存日志区域的所有 FMOD 的列表。它是 `CellCLI` 命令 `LIST FLASHLOG\
  \ DETAIL` 的输出，包括闪存日志区域的大小和状态。此报告中还包含所有以降级模式运行的闪存单元磁盘的列表。\n*   `alerthistory`：`alerthistory`\
  \ 文件包含存储单元上发生的所有警报的详细报告。它使用 `CellCLI` 命令 `LIST ALERTHISTORY` 创建。\n*   `alert.log`：`alert.log`\
  \ 文件由 `cellsrv` 进程写入。与数据库或 ASM 警报日志文件类似，存储单元的 `alert.log` 包含有关存储单元及其磁盘驱动器状态的重要运行时信息。此文件对于诊断单元存储问题非常有用。在运行\
  \ 12c 版本的 Exadata 存储单元上，有多个警报日志，每个卸载服务器一个。\n*   `ms-odl.trc`：`ms-odl.trc` 包含来自单元管理服务器进程的详细运行时跟踪级别信息。\n\
  *   `ms-odl.log`：此文件由单元的管理服务器进程写入。它不包含在 `sundiag.sh` 脚本创建的集合中，但我们发现它对于诊断存储单元中出现的问题非常有用。它还包含日常的操作消息。存储单元通过轮转方式维护其日志文件，类似于操作系统轮转系统日志\
  \ (`/var/log/messages`) 的方式。`ms-odl.log` 文件记录这些任务以及更关键的任务（如磁盘故障）。\n\n\n#### 单元警报\n\
  \n作为监控功能的一部分，Exadata 在存储单元中跟踪超过 70 种警报指标类型。还可以使用 Grid Control 的监控和告警功能定义额外的警报。警报严重性分为四个类别：信息（Information）、警告（Warning）、关键（Critical）和清除（Clear）。这些类别用于管理警报通知。例如，您可以选择仅接收关键警报的电子邮件通知。清除严重性用于在组件恢复正常状态时通知您。可以使用\
  \ `LIST ALERTHISTORY DETAIL` 命令生成系统所产生警报的详细报告。以下是存储单元生成的一个警报示例：\n\n```\nname:  \
  \                 209_1\nalertMessage:           \"All Logical drives are in WriteThrough\
  \ caching mode.\n                        Either battery is in a learn cycle or it\
  \ needs to be\n                        replaced. Please contact Oracle Support\"\
  \nalertSequenceID:        209\nalertShortName:         Hardware\nalertType:    \
  \          Stateful\nbeginTime:              2011-01-17T04:42:10-06:00\nendTime:\
  \                2011-01-17T05:50:29-06:00\nexaminedBy:\nmetricObjectName:     \
  \  LUN_CACHE_WT_ALL\nnotificationState:      1\nsequenceBeginTime:      2011-01-17T04:42:10-06:00\n\
  severity:               critical\nalertAction:            \"Battery is either in\
  \ a learn cycle or it needs\n                        replacement. Please contact\
  \ Oracle Support\"\n```\n\n当电池随后恢复到正常状态时，会生成一个后续警报，其严重性为清除，表明该组件已恢复正常运行状态：\n\n```\n\
  name:                   209_2\nalertMessage:           \"Battery is back to a good\
  \ state\"\n...\nseverity:               clear\nalertAction:            \"Battery\
  \ is back to a good state. No Action Required\"\n```\n\n在检查警报时，您应养成设置警报的 `examinedBy`\
  \ 属性的习惯，以便跟踪哪些警报正在调查中。如果设置了 `examinedBy` 属性，就可以在 `LIST ALERTHISTORY` 命令中将其用作过滤条件，以报告所有当前未被处理的警报。通过添加严重性过滤条件，您可以进一步将输出缩减为仅关键警报。例如：\n\
  \n```\nLIST ALERTHISTORY WHERE severity = 'critical' AND examinedBy = ' ' DETAIL\n\
  ```\n\n要设置警报的 `examinedBy` 属性，请使用 `ALTER ALERTHISTORY` 命令并指定您希望更改的警报名称。例如，我们可以如下设置电池警报的\
  \ `examinedBy` 属性：\n\n```\nCellCLI> alter alerthistory 209_1 examinedBy=\"acolvin\"\
  \nAlert 209_1 successfully altered\n\nCellCLI> list alerthistory attributes name,\
  \ alertMessage, examinedby where name=209_1 detail\n         name:             \
  \      209_1\n         alertMessage:           \"All Logical drives are in WriteThrough\
  \ caching mode.\n                                 Either battery is in a learn cycle\
  \ or it needs to be\n                                 replaced. Please contact Oracle\
  \ Support\"\n         examinedBy:             acolvin\n```\n\n关于管理、报告和自定义 Exadata\
  \ 警报，还有很多内容需要讨论。要详细涵盖这个主题，需要整整一章的篇幅。在本节中，我们只触及了基础。幸运的是，一旦您配置好了用于告警通知的电子邮件，管理这些警报几乎不需要做太多工作。在许多环境中，仅使用电子邮件通知就足以捕获和报告关键警报。\n\
  \n## 备份 Exadata\n\n当我们收到第一台 Exadata 系统时，我们的一个主要问题是：“我们如何备份所有内容，以便在出现严重问题时将其恢复到工作状态？”\
  \ 2010 年 5 月 Exadata 到货时，最新的 Cell 软件版本是 11.2.1.2.1。当时，备份数据库服务器的唯一方法是使用第三方备份软件或标准的\
  \ Linux 命令，如 `tar`。Oracle 不断为 Exadata 开发新功能，不到一年后，搭载原生 Linux 逻辑卷管理器（LVM）的 Exadata\
  \ X-2 数据库服务器发布。这是一个重大进步，因为 LVM 具有内置的快照功能，为备份操作系统提供了一种简便的方法。存储单元使用内置的方法进行备份和恢复。在本节中，我们将看看\
  \ Oracle 推荐用于备份 Exadata 数据库存储服务器和存储单元的各种方法。我们还将简要介绍 Recovery Manager（RMAN）以及 Exadata\
  \ 提供的可改进数据库备份和恢复性能的一些功能。之后，我们将研究如何从一些更常见的系统故障类型中恢复。您可能会感到惊讶，但本章的重点不是数据库恢复。对于数据库备份和恢复，几乎没有特定于\
  \ Exadata 的考虑因素。大多数特定于产品的备份和恢复方法涉及备份和恢复包含操作系统和 Exadata 软件的系统卷。因此，我们将花相当多的时间讨论恢复，从单元磁盘的丢失到数据库服务器或存储单元上系统卷的丢失。\n\
  \n#### 备份数据库服务器\n\nExadata 计算节点默认配置利用 Linux 逻辑卷管理（LVM）。逻辑卷管理器为物理磁盘分区提供了一个抽象层，类似于\
  \ ASM 为其底层物理存储设备所做的那样。LVM 具有类似于 ASM 磁盘组的卷组。这些卷组由一个或多个物理磁盘（或磁盘分区）组成，就像 ASM 磁盘组由一个或多个物理磁盘（或磁盘分区）组成一样。LVM\
  \ 卷组被划分为可以创建文件系统的逻辑卷。类似地，数据库利用 ASM 磁盘组创建用于存储表、索引和其他数据库对象的表空间。将物理存储从文件系统中抽象出来，允许系统管理员根据需要扩展和收缩逻辑卷（以及文件系统）。使用\
  \ LVM 管理 Exadata 数据库存储服务器的存储还有许多其他优势，但我们的重点将是 Linux LVM 提供的新备份和恢复功能，即 LVM 快照。除了方便和易用性之外，LVM\
  \ 快照消除了使用 `tar` 命令或第三方备份产品进行简单备份时面临的许多典型挑战。例如，根据备份集中的数据量，文件系统备份可能需要相当长的时间才能完成。这些备份不是时间点一致的，这意味着如果您必须从备份中恢复文件系统，文件中的数据将代表从备份过程开始到结束的不同时间点。在备份周期内继续运行的应用程序可能持有文件锁，导致这些文件被跳过（未备份）。同样，打开的应用程序不可避免地会在备份周期内更改数据。即使您能够备份这些打开的文件，除非在进行备份前关闭应用程序，否则您无法知道它们是否处于可用状态。LVM\
  \ 快照是瞬时完成的，因为实际上没有复制数据。您可以将快照视为指向构成文件系统内容的物理数据块的指针索引。当文件被更改或删除时，该文件的原始块会被写入快照卷。因此，即使备份需要几个小时才能完成，它仍然与创建快照的时刻保持一致。现在，让我们看看如何使用\
  \ LVM 快照来创建数据库服务器的一致文件系统备份。\n\n\n## 使用 LVM 快照进行系统备份\n\n使用 LVM 快照创建文件系统备份是一个相当简单的过程。首先，你需要为备份的最终副本创建一个目标位置。这可以是\
  \ SAN 或 NAS 存储，或者仅仅是来自另一台服务器共享的 NFS 文件系统。如果你在卷组中有足够的可用空间来存储备份文件，你可以创建一个临时逻辑卷，用于在将备份发送到磁带之前进行暂存。这可以通过\
  \ `lvcreate` 命令来完成。在创建新的逻辑卷之前，请使用 `vgdisplay` 命令确保你的卷组中有足够的可用空间：\n\n```\n[root@enkx4db01\
  \ ~]# vgdisplay\n--- Volume group ---\nVG Name               VGExaDb\n...\nVG Size\
  \               1.63 TB\nPE Size               4.00 MB\nTotal PE              428308\n\
  Alloc PE / Size       47104 / 184.00 GB\nFree  PE / Size       381204 / 1.45 TB\n\
  ...\n```\n\n`vgdisplay` 命令显示了我们卷组的大小、当前正在使用的物理扩展（PE）以及卷组中可用的剩余空间量。`Free PE/Size`\
  \ 属性表明我们的卷组中还有 1.45TB 的剩余空间。\n\n### 创建备份目标位置\n\n首先，我们将从另一台系统挂载一个 NFS 共享作为备份的目标位置。我们将其称为\
  \ `/mnt/nfs`：\n\n```\n[root@enkx4db01 ~]# mount -t nfs -o rw,intr,soft,proto=tcp,nolock\
  \ <ip>/share /mnt/nfs\n```\n\n### 创建并挂载快照\n\n接下来，我们将使用 `lvcreate` 和 `e2label` 命令为\
  \ `/` 和 `/u01` 创建并标记 LVM 快照。请注意我们使用 `–L1G` 和 `-L5G` 选项来创建这些快照。`–L` 参数决定了快照卷的大小。在快照创建后，当数据块被修改或删除时，该块的原始副本将被写入快照。为快照分配足够的大小以存储所有已更改块的原始副本非常重要。快照不会被长期使用，因此通常\
  \ 5GB-10GB 的空间就足够了。如果快照空间用尽，它将被停用。\n\n```\n[root@enkx4db01 ~]# lvcreate –L1G -s\
  \ -n root_snap /dev/VGExaDb/LVDbSys1\nLogical volume \"root_snap\" created\n\n[root@enkx4db01\
  \ ~]# e2label /dev/VGExaDb/root_snap DBSYS_SNAP\n\n[root@enkx4db01 ~]# lvcreate\
  \ –L5G -s -n u01_snap /dev/VGExaDb/LVDbOra1\nLogical volume \"u01_snap\" created\n\
  \n[root@enkx4db01 ~]# e2label /dev/VGExaDb/u01_snap DBORA_SNAP\n```\n\n接下来，挂载快照卷。我们使用文件系统标签（`DBSYS_SNAP`\
  \ 和 `DBORA_SNAP`）来确保挂载的是正确的卷。挂载后，它们就可以被复制到 NFS 挂载点。`df` 命令显示了我们新的文件系统以及我们想要包含在系统备份中的逻辑卷：`VGExaDb-LVDbSys1`（根文件系统的逻辑卷）和\
  \ `VGExaDb-LVDbOra1`（`/u01` 文件系统的逻辑卷）。请注意，`/boot` 文件系统不使用 LVM 进行存储。该文件系统必须使用 `tar`\
  \ 命令进行备份。这不是问题，因为 `/boot` 文件系统相当小且静态，因此我们不担心这些文件在备份周期中被修改、锁定或打开。\n\n```\n[root@enkx4db01\
  \ ~]# mkdir –p /mnt/snaps/u01\n\n[root@enkx4db01 ~]# mount –L DBSYS_SNAP /mnt/snaps\n\
  \n[root@enkx4db01 ~]# mount –L DBORA_SNAP /mnt/snaps/u01\n\n[root@enkx4db01 mnt]#\
  \ df -h\nFilesystem            Size  Used Avail Use% Mounted on\n/dev/mapper/VGExaDb-LVDbSys1\n\
  \                      30G   27G  1.6G  95% /\n/dev/sda1             496M   40M\
  \  431M   9% /boot\n/dev/mapper/VGExaDb-LVDbOra1\n                      99G   53G\
  \   41G  57% /u01\ntmpfs                 252G     0  252G   0% /dev/shm\n192.168.10.9:/nfs/backup\n\
  \                      5.4T  182G  5.2T   4% /mnt/nfs\n/dev/mapper/VGExaDb-root_snap\n\
  \                      30G   27G  1.4G  96% /mnt/snaps\n/dev/mapper/VGExaDb-u01_snap\n\
  \                      99G   53G   41G  57% /mnt/snaps/u01\n```\n\n### 验证快照一致性\n\
  \n现在我们有了确保 `/` 和 `/u01` 文件系统一致性的快照，我们准备好进行备份了。为了证明这些快照是一致的，我们将 `/etc/hosts` 文件复制到\
  \ `/root` 目录中的一个测试文件。如果快照按预期工作，这个文件将不会被包含在我们的备份中，因为它是在快照创建之后创建的。命令如下：\n\n```\n[root@enkx4db01\
  \ ~]# cp /etc/hosts /root/test_file.txt\n```\n\n因为快照已经挂载，我们可以像浏览任何其他文件系统一样浏览它们。快照文件系统看起来和感觉起来都像原始文件系统，只有一个例外。如果我们查看挂载的快照中是否有我们创建的测试文件（或快照拍摄后发生的任何其他更改），我们看不到它。它不在那里，因为该文件是在快照创建之后创建的：\n\
  \n```\n[root@enkx4db01 ~]# ls -l /root/testfile\n-rw-r--r-- 1 root root 1724 Nov\
  \ 24 14:23 /root/test_file.txt   <- 我们创建的测试文件\n\n[root@enkx4db01 ~]# ls -l /mnt/snaps/root/test_file.txt\n\
  ls: /mnt/snaps/root/testfile: No such file or directory    <- 快照中没有测试文件\n```\n\n\
  ### 执行备份\n\n一旦快照挂载，就可以使用任何标准的 Linux 备份软件进行备份。在本测试中，我们将使用 `tar` 命令将 `/` 和 `/u01`\
  \ 文件系统的 tar 包备份创建到 NFS 共享。因为我们备份的是快照，所以不必担心备份期间有文件被打开、锁定或更改。请注意，我们还在此备份中包含了 `/boot`\
  \ 目录。\n\n```\n[root@enkx4db01 ~]# cd /mnt/snaps\n\n[root@enkx4db01 snap]# tar -pjcvf\
  \ /mnt/nfs/backup.tar.bz2 * /boot --exclude \\\nnfs/backup.tar.bz2 --exclude /mnt/nfs\
  \ >         \\\n/tmp/backup_tar.stdout 2> /tmp/backup_tar.stderr\n```\n\n### 清理\n\
  \n备份完成后，你应该检查错误文件 `/tmp/backup_tar.stderr`，查看备份期间记录的任何问题。如果你对备份满意，你可以卸载并删除快照。每次运行备份时，你都将创建一组新的快照。备份副本完成后，你可以选择卸载并删除你创建的临时逻辑卷：\n\
  \n```\n[root@enkx4db01 snap]# cd /\n\n[root@enkx4db01 /]# umount /mnt/snaps/u01\n\
  \n[root@enkx4db01 /]# rm -Rf /mnt/snaps/u01\n\n[root@enkx4db01 /]# umount /mnt/snaps\n\
  \n[root@enkx4db01 /]# rm -Rf /mnt/snaps\n\n[root@enkx4db01 /]# lvremove /dev/VGExaDb/root_snap\n\
  Do you really want to remove active logical volume root_snap? [y/n]: y\nLogical\
  \ volume \"root_snap\" successfully removed\n\n[root@enkx4db01 /]# lvremove /dev/VGExaDb/u01_snap\n\
  Do you really want to remove active logical volume u01_snap? [y/n]: y\nLogical volume\
  \ \"u01_snap\" successfully removed\n```\n\n### 总结\n\n早期的 Exadata V2 模型没有采用 LVM\
  \ 来管理文件系统存储。没有 LVM 快照，要获得干净的系统备份就需要关闭服务器上的应用程序（包括数据库），或者购买第三方备份软件。即便如此，也无法创建所有文件在时间点上一致的备份。LVM\
  \ 快照填补了 Exadata 备份和恢复架构中的一个重要空白，并为备份数据库服务器提供了一种简单、可管理的策略。在本章后面，我们将讨论当文件系统丢失或损坏时，如何使用这些备份来恢复数据库服务器。\n\
  \n\n\n#### 备份存储单元\n\n存储单元中的前两个磁盘包含 Linux 操作系统。这些 Linux 分区通常被称为系统卷。**不建议**使用行业标准的\
  \ Linux 备份软件来备份系统卷。那么，如何备份系统卷呢？答案是：你无需手动备份。Exadata 会通过一个名为 `CELLBOOT` USB 闪存驱动器的内置\
  \ USB 设备自动为你完成此操作。如果你比较谨慎，也可以使用外部 USB 闪存驱动器创建自己的单元恢复镜像。除了 `CELLBOOT` USB 闪存驱动器外，Exadata\
  \ 还会在一组独立的磁盘分区上，保留系统卷在上次补丁安装之前的完整副本。这些备份分区用于回滚补丁。现在，让我们来看看这些备份方法是如何工作的。\n\n####\
  \ `CELLBOOT` USB 闪存驱动器\n\n你可以像对待任何插入笔记本电脑的外部 USB 驱动器一样看待内置的 `CELLBOOT` USB 闪存驱动器。可以使用\
  \ `parted` 命令查看该设备，如下所示：\n\n```\n[root@enkx4cel01 ∼]# parted /dev/sdac print\nModel:\
  \ ORACLE UNIGEN-UFD (scsi)\nDisk /dev/sdac: 4010MB\nSector size (logical/physical):\
  \ 512B/512B\nPartition Table: msdos\nNumber  Start   End     Size    Type     File\
  \ system  Flags\n 1      11.3kB  4008MB  4008MB  primary  ext3\n```\n\n为了有趣起见，我们挂载了这个内置\
  \ USB 闪存驱动器，想看看 Oracle 在这个备份中包含了什么。下面的列表显示了该设备的内容：\n\n```\n[root@enkx4cel01 ∼]#\
  \ mount /dev/sdm1 /mnt/usb\n[root@enkx4cel01 ∼]# ls -al /mnt/usb\ntotal 95816\n\
  drwxr-xr-x  7 root root      4096 Oct  3 21:26 .\ndrwxr-xr-x  9 root root      4096\
  \ Nov 23 15:49 ..\n-r-xr-x---  1 root root      2048 Aug 17  2011 boot.cat\n-r-xr-x---\
  \  1 root root        16 Oct  9  2013 boot.msg\ndrwxr-----  2 root root      4096\
  \ Oct  3 20:14 cellbits\ndrwxrwxr-x  2 root root      4096 Oct  3 20:15 grub\n-rw-r-----\
  \  1 root root        16 Oct  3 20:14 I_am_CELLBOOT_usb\n-rw-r-----  1 root root\
  \       805 Oct  3 19:53 image.id\n-rw-r-----  1 root root       441 Oct  3 19:55\
  \ imgboot.lst\n-rw-rw-r--  1 root root   8280755 Jul 14 04:12 initrd-2.6.32-300.19.1.el5uek.img\n\
  -rw-r-----  1 root root   7381429 Oct  3 20:14 initrd-2.6.39-400.128.17.el5uek.img\n\
  -rw-r-----  1 root root   70198394 Oct  3 19:55 initrd.img\n-r-xr-x---  1 root root\
  \     10648 Aug 17  2011 isolinux.bin\n-r-xr-x---  1 root root       155 Apr 14\
  \  2014 isolinux.cfg\n-rw-r-----  1 root root        25 Oct  3 20:14 kernel.ver\n\
  drwxr-----  4 root root      4096 Nov  7 16:28 lastGoodConfig\ndrwxr-xr-x  3 root\
  \ root      4096 Oct  3 21:38 log\ndrwx------  2 root root     16384 Oct  3 20:11\
  \ lost+found\n-r-xr-x---  1 root root      94600 Aug 17  2011 memtest\n-r-xr-x---\
  \  1 root root      7326 Aug 17  2011 splash.lss\n-r-xr-x---  1 root root      1770\
  \ Oct  9  2013 trans.tbl\n-rwxr-x---  1 root root   4121488 Jul 14 04:12 vmlinuz\n\
  -rwxr-xr-x  1 root root   3688864 Jul 14 04:12 vmlinuz-2.6.32-300.19.1.el5uek\n\
  -rwxr-----  1 root root   4121488 Oct  3 20:08 vmlinuz-2.6.39-400.128.17.el5uek\n\
  ```\n\n在这个备份中，我们看到了 Linux 启动镜像以及启动 Linux 和恢复操作系统所需的所有文件。请注意，你还会看到一个名为 `lastGoodConfig`\
  \ 的目录。此目录是我们存储单元上 `/opt/oracle.cellos/iso/lastGoodConfig` 目录的备份。还有一个名为 `cellbits`\
  \ 的目录，其中包含单元服务器软件。我们不仅在内置 USB 驱动器上拥有将存储单元恢复到可启动状态所需的完整副本，还拥有所有重要单元配置文件和单元服务器二进制文件的在线备份。\n\
  \n#### 外部 USB 驱动器\n\n除了内置的 `CELLBOOT` USB 闪存驱动器外，Exadata 还提供了一种方法，可以使用你在当地电子商店购买的普通\
  \ 1-8GB USB 闪存驱动器创建自己的外部可启动恢复镜像。Exadata 会在它找到的第一个外部 USB 驱动器上创建救援镜像，因此在创建此恢复镜像之前，必须从系统中移除所有其他外部\
  \ USB 驱动器，否则脚本将发出警告并退出。\n\n回想一下，Exadata 存储单元维护着操作系统和单元软件的两个版本：活动和非活动版本。它们作为两组独立的磁盘分区进行管理，分别对应\
  \ `/` 和 `/opt/oracle` 文件系统，可以使用 `imageinfo` 命令确认，如下所示：\n\n```\n[root@enkx4cel01\
  \ ∼]# imageinfo | grep device\nActive system partition on device: /dev/md6\nActive\
  \ software partition on device: /dev/md8\nInactive system partition on device: /dev/md5\n\
  Inactive software partition on device: /dev/md7\n```\n\n`imageinfo` 命令显示了存储单元上当前（活动）和先前（非活动）的系统卷。使用\
  \ `df` 命令，我们可以看到我们确实正在使用 `imageinfo` 命令输出中标识的活动分区（`/dev/md6` 和 `/dev/md8`）：\n\n\
  ```\n[root@enkx4cel01 ∼]# df | egrep 'Filesystem|md6|md8'\nFilesystem          \
  \ 1K-blocks      Used Available Use% Mounted on\n/dev/md6              10317752\
  \   6632836   3160804  68% /\n/dev/md8               2063440    654956   1303668\
  \  34% /opt/oracle\n```\n\n默认情况下，`make_cellboot_usb` 命令将基于你的活动配置（你当前正在运行的配置）创建救援镜像。使用\
  \ `–inactive` 选项，你可以基于先前的配置创建救援镜像。非活动分区是上次安装补丁时处于活动状态的系统卷。\n\n`make_cellboot_usb`\
  \ 命令用于创建可启动的救援镜像。要创建外部救援镜像，你只需将 USB 闪存驱动器插入存储单元前面板上的一个 USB 端口，然后运行 `make_cellboot_usb`\
  \ 命令即可。\n\n**注意**\n\n救援镜像将在系统找到的第一个外部 USB 驱动器上创建。在创建外部救援镜像之前，请从系统中移除所有其他外部 USB 驱动器。\n\
  \n例如，以下列表展示了创建外部 USB 救援镜像的过程。`make_cellboot_usb` 脚本的输出相当长，超过 100 行，因此我们不会在此处显示全部内容。以下列表中省略的部分输出包括用于在\
  \ USB 驱动器上创建分区的 `fdisk` 命令输出、文件系统格式化过程以及为创建可启动救援盘而复制的众多文件。\n\n```\n[root@enkx4cel01\
