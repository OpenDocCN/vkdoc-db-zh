  100.00    0.029337                 12999             total\n```\n\n请注意，在非 Exadata\
  \ 平台上捕获的主要系统调用与 I/O 相关 (`pread`)。前面两个列表的要点在于展示：在 Exadata 上，访问存储在磁盘中的数据所采用的机制与此截然不同。\n\
  \n\n\n#### 存储服务器软件\n\n单元格服务 (`cellsrv`) 是在存储单元上运行的主要软件。它是一个多线程程序，负责处理来自数据库服务器的 I/O\
  \ 请求。这些请求可以通过返回已处理的数据或返回完整的数据块来响应，具体取决于请求类型。`cellsrv` 还实现了 I/O 资源管理器 (`IORM`)，该管理器可用于确保\
  \ I/O 带宽在各种数据库和消费者组之间进行适当分配。\n\n还有另外两个程序在 Exadata 存储单元上持续运行。管理服务器 (`MS`) 是一个 Java\
  \ 程序，提供了 `cellsrv` 与单元格命令行界面 (`cellcli`) 工具之间的接口。`MS` 还提供了 `cellsrv` 与 Grid Control\
  \ Exadata 插件（通过 `ssh` 运行的一组 `cellcli` 命令实现）之间的接口。第二个工具是重启服务器 (`RS`)。`RS` 实际上是一组负责监控其他进程并在必要时重启它们的进程。`ExaWatcher`（以前称为\
  \ `OSWatcher`）也安装在存储单元上，用于使用标准 Unix 工具（如 `vmstat` 和 `netstat`）收集历史操作系统统计信息。请注意，Oracle\
  \ 不授权在存储服务器上安装任何其他软件。\n\n当你第一次接触 Exadata 时，可能想做的事情之一就是登录到存储单元，查看实际正在运行的内容。不幸的是，存储服务器通常只允许指定的系统管理员或\
  \ `DBA` 访问，其他人一概禁止。下面是一个快速列表，显示了在活动存储服务器上执行 `ps` 命令生成的简略输出：\n\n```\n> ps -eo ruser,pid,ppid,cmd\n\
