  `DBM01` 是 I/O 活动的唯一目标。你可以看到利用率主要集中在大型 I/O 请求和闪存设备上。实际上，由于 11.2.3.3.0 及更高版本引入的透明缓存，记录到的磁盘吞吐量非常少。这些数据应该是不言自明的。有趣的是，该脚本还按消费者组报告了细分信息。你在上面输出中看到的就是
  I/O 资源管理器在起作用。作为示例目的，激活了一个数据库内计划，优先处理 `HIGHPRIO` 组的所有活动，而不是 `LOWPRIO` 组。


  ## 总结


  Oracle 数据库和存储节点提供了成千上万的指标。我们在本章中只触及了其中一小部分。另外一些指标已在第 11 章中讨论过。这就引出了显而易见的问题：所有这些指标都重要吗？它们的“良好”值应该是多少？我们应该针对哪些指标采取行动？等等。对所有这些问题的总体回答是，不，你不需要学习、记忆和“调优”所有这些指标（这是不可能的）。你应该始终测量重要的东西——通常这是响应时间。理想情况下，你应该从测量最终用户响应时间开始，然后在需要时向下钻取，有时深入到数据库，有时深入到应用服务器或网络指标。正如你所知，问题并不总是由数据库引起。然而，由于现代多层应用的复杂性，这种端到端的诊断可能不可用，并且实施或改造也不可行。


  在这种情况下，你会退一步，监控数据库查询和事务的响应时间。你只是从应用栈中稍低一点的层次开始采用自顶向下方法，同时记住问题可能实际上仍然发生在应用层或更高层。在监控用户报告和数据仓库查询的响应时间时，如果你拥有相应的许可，可能应该从
  SQL Monitoring 页面（或 ASH 数据）开始，从中识别出有问题的用户查询，然后深入钻取它。使用自顶向下方法并跟随 SQL 计划中最大的时间消耗者，比采用相反的自底向上方法要容易得多——后者可能意味着查看一些数据库范围内的
  Top SQL 报告，并希望弄清楚你的特定用户工作负载出了什么问题。


  当然，在某些情况下，你会监控系统范围内的聚合匿名性能数据（不绑定到任何特定用户或会话），例如在容量规划和利用率监控中。然而，“我的数据库运行良好吗？”这类问题绝不应该通过查看系统利用率报告来回答。这些工具都无法告诉你你的数据库系统是否运行良好；只有你的用户能告诉你。如果用户不满意，你可以从一个不满意的用户开始，并从那里深入钻取响应时间。Oracle
  提供了你所需的所有指标！



  '
- '# 13. 迁移到 Exadata


  重大时刻终于来临。您的 Exadata 数据库一体机已完成安装、配置、优化和调试，随时可以投入使用。至此，您可能已经投入了大量时间学习 Exadata 的知识、向公司论证其价值，并规划如何充分利用这一强大的数据库平台。毫无疑问，这是一段漫长的旅程，但您尚未完全抵达终点。现在，真正的工作才开始——迁移。毕竟，预算负责人需要看到，所有投入的资金都得到了良好的利用并产生了回报！


  这一章比预期的要难写得多，因为几乎无法统计 Enkitec 多年来完成的所有迁移项目。但考虑到 Oracle 的各种版本、可用的迁移工具以及这些工具从一个版本到另一个版本所经历的变化，显然需要缩小范围。因此，为了使内容更有趣并节省篇幅，本章大部分内容将聚焦于
  11.2 和 12.1 版本（企业版）。在此过程中，您可以了解更多关于如何充分利用 Oracle 数据库先前版本中可用功能的知识。“Oracle 的先前版本”总是相对于当前受支持的版本而言。在撰写本文时，11.2.0.3+
  和 12.1.0.1+ 处于错误修正支持阶段，不过您应查阅 Doc ID 742060.1 以获取更准确的概览。您也可以查看 My Oracle Support
  Note 888828.1 了解 Oracle 各个发布版本的支持状态，以及 My Oracle Support 上的认证矩阵。


  有多种方法、工具和技术可用于将数据库从传统硬件迁移到 Exadata，但一般来说，它们可以分为两大类：物理迁移和逻辑迁移，并且这两者可以结合使用。虽然决定最佳方法的因素有几个，但决策过程通常由一个主要因素主导：可用于完成迁移的停机时间。次要因素是您团队的技能组合。本章涵盖的某些内容超出了数据库管理员日常业务的预期范围。可能需要花些时间提升团队成员的技能，使他们能够自信地使用其中一些工具。


  好消息是，有多种策略可以帮助您迁移到 Exadata。每种方法都有其自身的优缺点。在本章中，您将详细了解每一种方法。您将了解到选择某种方法而非其他方法的原因、相对优缺点，以及需要注意的常见陷阱。


  注意


  将您的应用程序从非 Oracle 平台迁移到 Oracle Exadata 不在本章讨论范围之内。


  ### 迁移策略


  一旦您很好地理解了 Exadata 是什么以及它如何工作，就可以开始思考如何迁移数据库了。让我们回到两个大类——逻辑迁移和物理迁移。逻辑迁移涉及从一个数据库中提取数据并加载到另一个数据库中。物理迁移则是指将数据库逐块从一台数据库服务器提取并移动到另一台。在决定最佳迁移方法时，数据库的数据访问特性是一个关键考虑因素，这主要是由于在
  Exadata 上访问数据的方式。OLTP 数据库倾向于使用单块读取并在所有表中更新数据，而数据仓库（DW）数据库通常针对全表扫描进行优化，并且只更新当前数据（如果有的话）。


  Exadata 在存储节点上使用智能闪存缓存来优化单块读取，并提升 OLTP 数据库的整体性能。对于 DW 数据库，Exadata 使用智能扫描技术来优化全表扫描。从
  Exadata 版本 11.2.3.3.x 开始，智能扫描会同时扫描闪存和磁盘存储以实现更高的吞吐量。智能扫描和闪存缓存优化方法的细节在第 2 章和第 5 章以及第
  16 章中有介绍。逻辑迁移让您有机会对数据库进行更改，并针对 Exadata 平台进行优化。这些更改可能包括调整区大小、实施或重新设计当前的分区方案，以及使用混合列压缩压缩表。对于大表，这些都是非常重要的存储考量，对于
  DW 数据库尤其如此。


  由于 OLTP 应用程序倾向于在整个数据库中更新数据，根据您的分区方案实现方式，HCC 压缩可能不太适用。在最坏的情况下，HCC 甚至可能降低性能。虽然大区对
  DW 数据库有益，但对于主要使用基于索引的访问和“随机”单块读取的 OLTP 数据库来说，益处较少。从 11.2.0.2 开始，Oracle 将分区创建为 8MB
  的区，以实现更好的全段扫描性能（记录在 My Oracle Support Doc ID 1295484.1 中）。


  物理迁移本质上不允许更改数据库中表和索引的存储参数，而逻辑迁移在重新定义存储、压缩、分区等方面提供了更大的灵活性。


  将数据库迁移到 Exadata 最令人印象深刻的方式是结合逻辑和物理迁移，正如 Oracle 网站上的各种白皮书所述。其中一个例子涉及使用 Golden Gate
  在大型字节序平台和 Exadata 之间进行近零停机时间迁移，描述了如何利用一个中间数据库作为暂存区。如果您将中间数据库前滚到一个已知的 SCN，您就可以在源端从同一个
  SCN 开始提取事务。当 Golden Gate 提取进程正在捕获源端的更改时，您使用可传输表空间技术（在本章后面描述）将中间数据库转换为 Exadata 格式。字节序转换完成并且表空间插入到
  Exadata 上一个原本为空的数据库后，您就开始传输并应用 Golden Gate 在源端挖掘到的已捕获事务。Golden Gate 应用进程将使用迁移期间源端发生的所有更改来更新
  Exadata 数据库。在深入探讨组合逻辑和物理迁移的技术细节之前，让我们先从基础开始。




  ### 逻辑迁移


  无论使用何种技术，逻辑迁移都包括从源数据库提取对象并将其重新加载到目标数据库。尽管逻辑迁移策略往往比物理策略更复杂，但由于以下优点，它们通常是更可取的选择：


  *   分阶段迁移：不再接收更新的表和分区可以移出迁移窗口，从而减少最终切换期间需要移动的数据量。

  *   选择性迁移：源数据库中通常包含过时的用户账户和不再需要的数据库对象。使用逻辑方法时，这些对象可以从迁移中简单地省略。旧数据库可以保留一段时间，以防之后需要某些未迁移的内容。

  *   平台差异：数据会自动转换为目标数据库的块大小。自动处理从大端序到小端序的转换。

  *   Exadata 混合列压缩（HCC）可以在数据移动前进行配置。也就是说，可以在 Exadata 数据库中定义表时使用 HCC，这样数据在加载到新数据库时就会被压缩。

  *   区大小设定：可以在数据移动前，以最优的区大小预先创建目标表、分区和索引（例如，自 11.2.0.2 起，Oracle 为分区默认使用 8MB）。有关区大小对智能扫描相关性的讨论，请参阅第
  16 章。

  *   允许合并数据库：当 Exadata 用作整合平台时，此特性尤为重要。如果您的 Exadata 是 V2 或 X2-2 型号，数据库服务器上的内存可能是一个限制因素。V2
  数据库服务器每台配置 72GB RAM，而 X2-2 每台服务器配备 96GB RAM（可升级）。在处理 10 个或更少的中大型数据库时，这可能是足够的内存，但在
  Oracle 11.2 中，在一台服务器上托管 15 个或更多数据库已变得相当普遍。例如，Enitec 曾参与一个项目，使用 Exadata 来托管 PeopleSoft
  HR 和财务数据库。实施者为此请求了 15 个数据库。再加上他们计划用于其他应用程序的 10 个数据库，SGA 内存就成了一个真正的问题。解决方案当然是将这些其他独立数据库合并在一起，使它们能更高效地共享内存。数据库合并的问题在
  Oracle 12c 及其可插拔数据库中得到了解决。这些可以是合并和整合数据库的完美工具。对于 X3 及以后的计算节点，内存短缺不再是大问题。它们默认配备 256GB
  RAM，可升级到每节点 768GB。X3-8 和 X4-8 每台服务器拥有 2TB DRAM。每个 X4-8 计算节点最多可配备 6TB DRAM，每个集群总内存可达
  12TB。

  *   预排序：如果使用“创建表为选择”方法或“插入为选择”方法（`CTAS` 或 `IAS`）通过数据库链接进行，在数据加载到目标数据库时也可以对数据进行排序，以提高索引效率、优化
  Exadata 存储索引并实现更好的压缩率。


  逻辑迁移基本上有两种方法。一种涉及从源数据库提取数据并加载到目标数据库。这通常被称为“提取与加载方法”。此方法常用的工具是 `Data Pump`、`Export/Import`
  以及通过数据库链接的 `Create Table as Select`（`CTAS`）（或 `Insert ... as Select` - `IAS`）。另一种方法是在正常业务操作期间复制源数据库。当需要切换到新数据库时，取消复制并将客户端应用程序重定向到新数据库。这种技术通常被称为“基于复制的方法”。基于复制方法常用的工具是
  `Oracle Streams`、`Oracle Data Guard`（逻辑备用）和 `Oracle Golden Gate`。也可以结合使用物理和逻辑迁移，例如在最终切换前很久就将（主要是）只读表空间复制过去，并通过某种复制方法（如
  `Streams`）应用对它们的更改。请注意，`Oracle Streams` 在 12c 中已弃用，且未收到任何增强。


  ### 提取与加载


  一般来说，在所有迁移策略中，提取与加载方法需要的停机时间最多，因为一旦开始提取并在整个迁移期间，所有 DML 活动都必须停止。数据仓库环境是例外，因为数据通常以“移入/移出”的方式组织。由于数据通常按日期范围分区，静态数据与仍在变化的数据是分开的。这些“只读”数据可以提前迁移，在最终迁移窗口之外，甚至可能在业务时间内进行。提取与加载策略的最大优势是其简单性。大多数
  DBA 出于某种原因都使用过 `Data Pump` 或 `CTAS`，因此工具集是熟悉的。另一个巨大优势是它赋予您的控制权。`Exadata` 带来的一个重要新特性是混合列压缩（HCC）。由于您可以完全控制数据如何加载到目标数据库，因此在加载时使用
  HCC 压缩表是一项相对简单的任务。提取与加载还允许您实施分区或更改分区策略。使用 `CTAS` 加载数据允许您在加载时对数据进行排序，这提高了 `Exadata`
  存储索引的效率。有人可能会说所有这些都可以在迁移后完成，这没错，但如果可以在迁移过程中就完成，为什么还要移动两次数据呢？在某些情况下，如果不应用压缩，甚至可能无法将数据装入平台。在接下来的几节中，您可以阅读几种执行提取与加载迁移的方法。




  '
- "# 数据泵\n\n数据泵是在数据库间迁移大量数据的优秀工具。数据泵由两个程序组成：`expdp` 和 `impdp`。两者均在《实用程序指南》中有文档说明。`expdp`\
  \ 命令用于从源数据库提取数据库对象。它可以用于转储整个数据库的内容，或者更具选择性地按模式或表进行转储。与其前身导出工具 (`exp`) 类似，数据泵提取数据并将其保存到一个可移植的数据文件中。然后，该文件可以被复制到\
  \ Exadata，并使用 `impdp` 命令加载到目标数据库中。数据泵首次亮相于 Oracle 10g，因此如果你的数据库版本是 9i 或更早，你将需要使用旧的导出/导入\
  \ (`exp`/`imp`) 工具。\n\n## 导出与导入\n\n导出和导入自 Oracle 7 以来就已存在，尽管它们已经有些过时，但它们仍然是将数据和对象从一个数据库迁移到另一个数据库的非常有效的工具。尽管\
  \ Oracle 多年来一直在谈论弃用 `exp` 和 `imp`，但它们仍然是基础 12c 安装的一部分。\n\n首先，你可以阅读关于数据泵的内容，了解如何使用它迁移到\
  \ Exadata。在介绍完这套新工具之后，你可以看看使用导出和导入迁移旧数据库的方法。请记住，数据泵的每个主要版本都会添加新特性和参数。请查阅 Oracle\
  \ 文档，了解特定于你数据库版本的功能和特性。\n\n在本章中，你将不时看到对我们实验室中进行的测试和计时结果的引用。表 13-1 显示了我们用于这些测试的服务器和数据库的一些相关特性。`LAB112`\
  \ 数据库是源数据库，不在 Exadata 上。`DB12C` 是目标（Exadata）数据库。\n\n表 13-1.\n\n实验室配置\n\n| 数据库 |\
  \ 数据库版本 | 平台 |\n| --- | --- | --- |\n| `LAB112` | `11.2.0.4` | Oracle Linux 6, 64\
  \ 位 |\n| `DB12C` | `12.1.0.2` | Oracle Linux 6, 64 位 |\n\n## 数据泵参数\n\n在继续之前，让我们先了解一下一些最相关的数据泵参数。以下是一些对数据库迁移有用的关键参数。\n\
  \n*   `FULL`, `SCHEMAS`, `TABLES`：这些选项是互斥的，用于指定导出是针对整个数据库、选定的模式，还是选定的单个表。请注意，在执行完整数据库导出时，某些模式（如\
  \ `SYS`、`MDSYS`、`CTXSYS` 和 `DBSNMP`）永远不会被导出。`FULL` 关键字在 12c 中得到了增强，在适用的情况下允许你结合使用可传输表空间技术。\n\
  *   `PARALLEL`：`PARALLEL` 参数指示数据泵将工作拆分成多个部分并并发运行。`PARALLEL` 可以极大地提升导出过程的性能。如果你计划使用\
  \ `PARALLEL` 关键字，请不要忘记在转储文件名中使用 `%U` 标识符来指定多个输出文件。\n*   `NETWORK_LINK`：此参数指定目标数据库中要用于导出的数据库链接。它允许你从远程服务器导出数据库，通过数据库链接（在目标数据库中定义）直接通过网络拉取数据。根据《实用程序指南》，当与\
  \ `impdp` 一起使用此参数时，不涉及转储文件。网络链接被 Grid Control 用于通过“从数据库导入”过程自动化迁移过程，也用于跨平台备份的可传输表空间以及新的\
  \ 12c 完全可传输导入。\n*   如果你选择使用 `FLASHBACK_SCN`，你可以通过运行以下查询获取当前数据库的 SCN：\n    ```\n\
  \    SQL> select current_scn from v$database;\n    ```\n*   `COMPRESSION`：数据泵压缩是\
  \ 11g 的新特性。在 10g 中，你只能压缩元数据，但在 11g 中，此功能扩展到了表数据。有效选项包括 `ALL`、`DATA_ONLY`、`METADATA_ONLY`\
  \ 和 `NONE`。使用 `COMPRESSION=ALL` 选项，数据泵将一次测试导出的大小从 13.4G 减少到 2.5G，压缩率超过五倍。这是对存储空间非常显著的节省。在启用压缩进行测试时，我们完全预期它会减慢导出速度，但相反，它实际上将我们的导出时间从\
  \ 39 分钟减少到了 9 分钟多一点。当然，不能期望总是如此。压缩效果高度依赖于实际数据。在我们的测试系统上，导出明显受 I/O 限制。但这确实表明，压缩可以显著减少导出数据库的存储需求，而不一定会减慢过程。遗憾的是，实时压缩表数据的功能直到\
  \ 11gR1 版本才被引入。如果你的数据库是 10g，并且需要在将转储文件传输到 Exadata 之前进行压缩，你将需要使用外部工具如 `gzip`、`zip`\
  \ 或 `compress` 来完成。请注意，在数据泵中使用数据 `COMPRESSION` 选项需要 Oracle Advanced Compression\
  \ 许可。\n*   `COMPRESSION_ALGORITHM`：Oracle 12c 让你在压缩转储文件时对所使用的算法有更细粒度的控制。你可以选择 `basic`、`low`、`medium`\
  \ 和 `high` 压缩级别。与任何压缩一样，你是在用文件大小换取（CPU）时间。你应该测试是否值得更积极地压缩转储文件。使用此参数需要 Advanced Compression\
  \ 选项。\n*   `FLASHBACK_TIME`, `FLASHBACK_SCN`：数据泵默认不保证导出的读一致性，这可能会让你感到惊讶。要导出数据库的读一致性映像，你必须使用\
  \ `FLASHBACK_SCN` 或 `FLASHBACK_TIME` 参数。如果你使用 `FLASHBACK_TIME`，数据泵会查找与你指定时间相对应的最接近的系统更改号\
  \ (SCN)，并导出截至该 SCN 的所有数据。`FLASHBACK_TIME` 可以按如下方式传递给数据泵：\n    ```\n    FLASHBACK_TIME=\"\
  to_timestamp('05-JUN-2014 21:00:00','DD-MON-YYYY HH24:MI:SS')\"\n    ```\n\n## 导出策略考虑\n\
  \n在导出时，创建多个导出转储文件可能是个好主意。第一个可以是整个数据库的仅元数据导出转储。这样，你可以创建数据库或其子集的有效 DDL 文件 (`SQLFILE`=...)。例如，巧妙地组合使用\
  \ `SQLFILE` 和 `INCLUDE`/`EXCLUDE` 参数，可以让你创建所有用户及其权限的 DDL，而无需使用 `DBMS_METADATA` 提取这些信息。这对于从视图中移除提示也很有用：`DBA_VIEWS`\
  \ 中 `TEXT` 列使用的 `LONG` 数据类型在 11.2 中需要一些巧妙的编码才能读取完整文本（如果视图的代码适合 4000 个字符，在 12.1 中可以从\
  \ `DBA_VIEWS.TEXT_VC` 检索）。将某个模式的所有视图的 DDL 转储到单个文件中，可以让你使用 `perl`、`awk` 或 `sed` 进行全局搜索和替换文本。另一次导出可以是你要导入的模式的小样本。`SAMPLE`\
  \ 关键字可以在导出期间用于限制转储文件中的数据量。你可以在开发系统上使用这样的文件来完善流程。最终的导出文件将包含你迁移 Exadata 系统所需的一切。\n\
  \n**注意**\n在 Exadata 上使用转储文件时，无论是在导出还是导入期间，你都应考虑使用数据库文件系统 (`DBFS`) 来存储文件。`DBFS_DG`\
  \ 中可用的磁盘数量大大超过了计算节点上的内部磁盘数量。从 Grid Infrastructure 12.1.0.2 开始，你还可以选择使用 ASM 集群文件系统\
  \ (`ACFS`)。\n\n\n\n"
- "# 现在让我们将注意力转向导入过程\n\n在迁移数据库时，通常首选模式级别的导入。它允许您将过程分解为更小、更易于管理的部分。但情况并非总是如此，有时进行完整的数据库导入是更好的选择。您在此处已了解到的大多数任务既适用于模式级导入，也适用于全库导入。在本节中，您会看到需要注意的任何例外情况的说明。如果您选择不进行全库导入，请注意系统对象（包括角色、公共同义词、配置文件、公共数据库链接、系统特权等）将不会被导入。您需要使用\
  \ `SQLFILE` 参数和 `FULL=Y` 导出来提取这些对象的 DDL。所需的导出可以仅执行元数据导出。然后，您可以在目标数据库上执行 DDL 来创建缺失的对象。让我们来看一些对数据库迁移有用的\
  \ `impdp` 参数。\n\n*   `REMAP_SCHEMA`：顾名思义，此参数告诉 Data Pump 在导入过程中将对象的所有权从一个模式更改为另一个模式。当将多个数据库合并到一个\
  \ Exadata 数据库时，这对于解决模式冲突特别有用。在导入到 12c PDB 时，这甚至可能不需要。\n*   `REMAP_DATAFILE`：可以使用此参数在导入过程中动态重命名数据文件。这允许\
  \ ASM 根据 Oracle 托管文件 (OMF) 规则自动组织和命名数据文件。\n*   `REMAP_TABLESPACE`：此选项将段的表空间名称引用从一个表空间更改为另一个表空间。当您想在导入期间将表从一个表空间物理迁移到另一个表空间时，这很有用。\n\
  *   `SCHEMAS`：列出要导入的模式。\n*   `SQLFILE`：此参数不将任何内容导入数据库，而是将对象定义 (DDL) 写入 SQL 脚本。如果您想更改对象的物理结构（例如分区或使用\
  \ HCC 压缩），这对于预构建对象非常有用。请注意，从 Oracle 12c 开始，您可以使用 `TRANSFORM` 参数（稍后描述）来进一步更改物理结构，最显著的是压缩级别。\n\
  *   `TABLE_EXISTS_ACTION`：如果导入的对象已存在时要采取的操作。有效关键字为 `APPEND`、`REPLACE`、`SKIP` 和 `TRUNCATE`。SKIP\
  \ 是默认值。\n*   `TABLES`：要导入的表列表。例如，`TABLES=MARTIN.T1,MARTIN.T2`\n*   `TRANSFORM`：此参数允许您在对象创建\
  \ DDL 语句中更改段属性，例如存储属性。这为在 Exadata 中创建表时优化区大小提供了一种便捷的方法。Oracle 12c 极大地增强了此参数的潜力。您现在可以使用\
  \ `DISABLE_ARCHIVE_LOGGING` 参数，将正在导入的段的日志记录属性设置为 `NOLOGGING`。在已经实施物理备用数据库的环境中请务必小心——`NOLOGGING`\
  \ 操作将损坏备用数据库上的数据文件。\n*   其他新参数允许您使用 `TABLE_COMPRESSION_CLAUSE` 更改段的压缩级别，以及使用 `LOB_STORAGE`\
  \ 关键字动态更改 LOB 类型（基本/安全文件）。可能还有其他参数对您的情况有用，请查看文档中的具体说明。\n*   `LOGTIME`：这是 Oracle\
  \ 12c 中一个非常有用的新增功能，允许您请求在 Data Pump 日志文件中输出时间戳。如果过程需要重复，这是预测过程所需时间的非常便捷的方法。\n* \
  \  `NETWORK_LINK`：此参数已在上一节中介绍。\n\n在开始将模式导入到您的 Exadata 数据库之前，请注意，Data Pump 仅在执行全库导入时才会自动创建表空间。如果您是在模式或表级别进行导入，则必须手动创建表空间。为此，请使用导入\
  \ Data Pump 参数 `FULL=yes` 和 `SQLFILE={your_sql_script}` 生成表空间的 DDL。这将生成一个包含 SQL\
  \ 文件中所有对象（包括数据文件）的 DDL 的脚本。您可能会注意到，在 `CREATE TABLESPACE` DDL 中，数据文件的文件名是完全限定的。这完全不是您想要的，因为它绕过了\
  \ OMF 并创建了不易管理的硬编码文件名。`REMAP_DATAFILE` 参数允许您重命名数据文件以反映 Exadata 数据库中的 ASM 磁盘组。语法如下所示：\n\
  \n```\nREMAP_DATAFILE=’/u02/oradata/LAB112/example01.dbf’:’+DATA’\n```\n\n另一种方法是使用\
  \ `REMAP_TABLESPACE`。在继续讨论导出/导入之前，最后要注意一点。源数据库和目标数据库之间的字符集转换是通过 Data Pump 自动完成的。请确保源数据库的字符集是目标数据库字符集的子集，否则在转换过程中可能会丢失一些内容。例如，如果您的源数据库是\
  \ US7ASCII（7 位），目标数据库是 WE8ISO8859P15（8 位），这是可以的。但是，在不同的 8 位字符集之间迁移或从 8 位迁移到 7 位可能会导致特殊字符丢失。\n\
  \n另一个重要的参考是版本兼容性。如有疑问，请查阅文档 ID 553337.1，该文档解释了不同 Oracle 版本 Data Pump 的兼容性。\n\n\n\
  \n## 导出与导入\n\n如果你要迁移到 Exadata 的数据库版本早于 10g，那么 Data Pump 就不是一个可选项。相反，你需要使用其前身工具：导出\
  \ (`exp`) 和导入 (`imp`)。导出/导入功能自 Oracle 9.2 以来变化不大，但如果你是从更早的版本迁移，可能会发现某些功能缺失。希望你已经不再支持\
  \ 8i 甚至 7.x 版本的数据库了，不过也不用担心。尽管在这些较旧的版本中，像 `FLASHBACK_SCN` 和 `PARALLEL` 这样的选项不可用，但总有办法绕过这些缺失的功能。说到版本，MOS\
  \ 文档 ID 132904.1 提供了不同版本导出/导入工具的兼容性矩阵，以及本节中我们认为理所当然的一些其他背景信息。\n\n`PARALLEL` 严格来说是\
  \ Data Pump 的功能，但你仍然可以通过并行运行多个方案导出来实现数据库导出的并行化。这是一种远不那么方便的“并行化”导出过程的方式。如果你必须以这种方式并行化导出过程，就需要自行计算如何将方案分组，使各组大小大致相等，以最小化所有导出完成所需的总时间。\n\
  \n`压缩` 是导出工具缺失的另一项功能。对于支持 Unix/Linux 平台的 DBA 来说，这从来都不是大问题。这些系统提供了通过命名管道将导出输出重定向到\
  \ `compress` 或 `gzip` 命令的能力，大致如下（`$` 符号当然是 shell 提示符）：\n\n```\noracle@solaris:∼$\
  \ mkfifo exp.dmp\noracle@solaris:∼$ ls -l exp.dmp\nprw-r--r--   1 oracle   oinstall\
  \       0 Jun 20 20:08 exp.dmp\noracle@solaris:∼$ cat exp.dmp | gzip > exp_compressed.dmp.gz\
  \ &\n[1] 5140\noracle@solaris:∼$ exp system file=exp.dmp owner=martin consistent=y\
  \ statistics=none \\\n> log=exp_compressed.dmp.log\n[...]\noracle@solaris:∼$ ls\
  \ -lh *exp_compressed*\n-rw-r--r--   1 oracle   oinstall     16M Jun 20 20:12 exp_compressed.dmp.gz\n\
  -rw-r--r--   1 oracle   oinstall    1.4K Jun 20 20:12 exp_compressed.dmp.log\n```\n\
  \n`REMAP_TABLESPACE` 参数在导出/导入中不可用。要解决这个问题，你必须使用 `INDEXFILE` 参数生成一个 SQL 文件，该文件会产生一个类似于\
  \ Data Pump 的 `SQLFILE` 参数的 SQL 脚本。然后，你可以根据需要修改表空间引用并在新表空间中预创建段。使用 `IGNORE` 参数将允许导入工具简单地向你提前手动创建的表中执行插入操作。`REMAP_SCHEMA`\
  \ 参数在导入工具中形式略有不同。要在导入过程中更改方案名称，请使用 `FROMUSER` 和 `TOUSER` 参数。\n\n导出/导入有一个无法规避的限制。导入工具不支持\
  \ Exadata HCC（混合列压缩）。我们的测试表明，使用导入工具导入数据时，你能期望获得的最佳表压缩级别大约相当于为 OLTP 压缩的表（在 11g 中也称为“高级压缩”，这是一个需要额外许可的功能）。无论表配置为\
  \ Exadata 上可用的四种 HCC 压缩模式中的哪一种（查询低/高和归档低/高），结果都一样。这是因为 HCC 压缩只能在通过直接路径插入（例如使用 `insert\
  \ /*+ APPEND */` 语法）时才会发生。根据《Exadata 用户指南》，常规插入和更新可以工作，但无法实现相同的压缩节省。这种“降低的压缩率”实际上与高级压缩选项提供的\
  \ OLTP 压缩相同，当进行常规插入时，HCC 会回退到这种压缩方式。顺便说一句，导入工具对此不会报错或发出任何警告。它只会以低得多的压缩率静默导入数据，悄无声息地消耗掉远比你计划或预期要多的存储空间。除了在导入完成后重建受影响的表之外，你对此无能为力。需要理解的重要一点是，你无法利用\
  \ Exadata 的 HCC 压缩来使用导出/导入工具。\n\n导出/导入方法也不支持透明数据加密。如果你的数据库使用了 TDE，你需要使用 Data Pump\
  \ 来迁移这些数据。如果你在方案级别进行导入，角色、公共同义词、配置文件、公共数据库链接和系统权限等系统对象将不会被导入。这类系统对象可以通过执行完整数据库导入并使用\
  \ `INDEXFILE` 参数来提取创建这些对象的 DDL 语句。这个步骤是最容易出错的环节。这是一个繁琐的过程，必须非常仔细，确保没有任何遗漏。幸运的是，有一些第三方工具能很好地比较两个数据库，并向你展示遗漏之处。大多数此类工具还提供将对象定义同步到新数据库的功能。\n\
  \n如果你仍在考虑使用导出/导入，请注意，由于导入工具的数据加载不使用直接路径加载插入，它会产生高得多的 CPU 使用开销，这源于 undo 和 redo 的生成以及缓冲区缓存管理。你还需要为数组插入设置合适的\
  \ `BUFFER` 参数（你会希望一次插入数千行），并使用 `COMMIT=Y`（这将在每次缓冲区插入后提交），这样就不会因为一个巨大的插入事务而填满 undo\
  \ 段。\n\n## 何时使用 Data Pump 或导出/导入\n\nData Pump 和导出/导入是数据量敏感的操作。也就是说，移动数据库所需的时间将直接与其大小和网络带宽相关。对于\
  \ OLTP 应用程序，可能会有相当长的停机时间。因此，它更适合较小规模的数据库。它也非常适合迁移大型数据仓库数据库，其中只读数据与读写数据是分开的。请查看应用程序的停机时间要求，并运行一些测试来确定\
  \ Data Pump 是否合适。Data Pump 和导出/导入的另一个好处是，它们允许你轻松复制应用程序方案中的所有对象，免除了手动复制 PL/SQL 包、视图、序列定义等的麻烦。使用导出/导入迁移小表和所有其他方案对象，同时使用不同方法迁移最大的表，这种做法并不少见。\n\
  \n在可传输数据库或可传输表空间不适用的情况下（换句话说，存在无法传输和/或转换的对象），你可能最终需要采用双管齐下的方法。第一步，确保数据文件被转换并插入。在迁移的第二部分，移动不可传输的组件。有趣的是，在\
  \ Oracle 12c 中，可传输表空间选项与逻辑导出结合为一个名为“全可传输导出/导入”的新功能。\n\n\n## 使用数据泵或导出/导入时的注意事项\n\n\
  源数据库和目标数据库之间的字符集差异是受支持的，但如果你正在转换字符集，请确保源数据库的字符集是目标数据库字符集的子集。如果在模式级别导入，请检查是否未留下任何系统对象，例如角色和公共同义词，或数据库链接和授权。请记住，HCC（混合列压缩）仅在使用数据泵时才能有效应用。务必使用导出（`CONSISTENT=Y`）或数据泵（`FLASHBACK_SCN`/`FLASHBACK_TIME`）的一致性参数，以确保你的数据以读一致的方式导出。不要忘记考虑你可能给网络带来的负载。\n\
  \n数据泵和导出/导入方法也可能要求你有一些临时磁盘空间（在源服务器和目标服务器上都有）来存放转储文件。请注意，使用数据泵的表数据压缩选项要求你为源数据库和目标数据库都拥有\
  \ Oracle Advanced Compression 许可证（只有 `metadata_only` 压缩选项包含在企业版许可证中）。\n\n#### 通过数据库链接复制数据\n\
  \n当在数据库之间提取和复制非常大量的数据（许多 TB）时，数据库链接可能是一个非常有用的选择。与默认的数据泵选项（即不使用网络链接子句）不同，使用数据库链接，你只需读取一次数据（从源），立即通过网络传输，并写入一次（到目标数据库）。使用传统的数据泵，Oracle\
  \ 必须从源读取数据，然后将其写入一个转储文件。然后你需要使用某种文件传输工具传输该文件（或使用 NFS 进行网络复制操作），然后在将数据写入目标数据库表之前从转储文件中读取数据。除了为写入和读取转储文件而进行的额外磁盘\
  \ I/O 之外，你还需要额外的磁盘空间来在迁移期间存放这些文件。现在你可能会说“等等”。数据泵确实有 `NETWORK_LINK` 选项和通过数据库链接直接传输数据的能力，但这里有一个小陷阱。\n\
  \nOracle 12c 中的数据泵允许进行一些优化，但网络链接方法有一个非常重要的缺点：你无法以并行方式导入表。使用数据泵和网络链接选项时，每个段都有自己唯一的（且唯一的）工作进程用于写入数据。在放弃数据泵之前，你应该阅读它所提供的功能。\n\
  \n对于 Exadata 非常重要的是，12c 中的 `impdp` 允许你使用直接路径插入。这对于 HCC 压缩数据至关重要。请记住 HCC 章节的内容，为了实现压缩，你需要使用直接路径插入。使用传统插入，你会创建标记为\
  \ OLTP 压缩的块，导致段大于其所需大小。下面是一个演示，展示 HCC 压缩与 `impdp` 一起工作。第一步是在目标数据库中创建一个数据库链接。\n\n\
  ```\nCREATE DATABASE LINK sourcedb\nCONNECT TO source:user\nIDENTIFIED BY source:password\n\
  USING 'tns_alias';\n```\n\n在启动 `impdp` 之前，你现在可以利用你的 DDL 文件来预创建要导入的表。稍作编辑，你可以在开始导入之前为特定段添加\
  \ HCC 压缩。在 12c 中，这使用 `impdp` 的 `TRANSFORM` 选项中的 `TABLE_COMPRESSION_CLAUSE` 变得更容易。\n\
  \n> **注意**\n>\n> 创建数据库链接时，你可以使用 USING 子句直接指定数据库链接的 TNS 连接字符串，如下所示：\n>\n> ```\n>\
  \ CREATE DATABASE LINK ... USING '(DESCRIPTION = (ADDRESS = (PROTOCOL = TCP)(HOST\
  \ = source-host)(PORT = 1521)) (CONNECT_DATA = (SERVER = DEDICATED) (SERVICE_NAME\
  \ = ORA10G)))'\n> ```\n>\n> 这样，你就不必在数据库服务器中设置 `tnsnames.ora` 条目。\n\n设置完成后，如下执行 `impdp`：\n\
  \n```\n[oracle@enkdb03 ~]$ impdp network_link=dplink remap_schema=martin:imptest\
  \ \\\n> schemas=martin directory=imptest logfile=nlimp.log\n```\n\n检查系统上的会话时，你将看到主进程以及导入从属进程。在一个特定实例中记录了以下内容：\n\
  \n```\nIMPTEST@DB12C1:1> @as\nSID    SERIAL# USERNAME      PROG       SQL_ID   \
  \      SQL_TEXT\n----- ---------- ------------- ---------- -------------  -----------------------------\n\
  1240      59677 IMPTEST       udi@enkdb0 7wn3wubg7gjds  BEGIN :1 := sys.kupc$que_int...\n\
  264       16273 IMPTEST       oracle@enk 9qhxsv2smtyw9  INSERT /*+ APPEND\n1499\
  \       9287 IMPTEST       oracle@enk bjf05cwcj5s6p  BEGIN :1 := sys.kupc$...\n\
  ```\n\n从这个小 SQL 片段及其输出可以看出，使用数据泵可以实现直接路径插入。如果你不使用 Data Guard 备用数据库或类似的基于重做的复制工具，你甚至可能考虑在\
  \ `NOLOGGING` 模式下操作。另一个 12c 增强功能允许你以这种方式指定操作，而无需修改表 DDL：\n\n```\n[oracle@enkdb03\
  \ ~]$ impdp network_link=dplink remap_schema=martin:imptest schemas=martin \\\n\
  > directory=imptest logfile=nlimp2.log table_exists_action=replace \\\n> transform=disable_archive_logging:Y\n\
  ```\n\n当你有任何类型的基于重做的备用数据库时，请小心。所有使用 `NOLOGGING` 的加载都不会传输到备用数据库，你必须从 SCN 开始进行备份才能使其重新同步。使用网络链接的数据泵方法的重要缺点是，你无法利用段内并行性。如果你想了解更多关于段内并行性的信息，请继续阅读。\n\
  \n\n\n#### 通过数据库链接实现高吞吐量 CTAS 或 IAS\n\n尽管前面的示例很简单，但它们可能无法提供您期望的吞吐量，尤其是当源数据库服务器与目标不在同一网段时。必须对数据库链接和底层\
  \ TCP 协议进行调优，以实现高吞吐量的数据传输。数据传输速度显然受限于您的网络设备吞吐量，并且还取决于源和目标数据库之间的网络往返时间（`RTT`）。\n\n\
  要在短时间内移动数十`TB`的数据，您显然需要大量的网络吞吐量容量。您必须拥有端到端的容量，从源数据库到目标`Exadata`集群。这意味着您的源服务器必须能够以您的`Exadata`集群接收数据的速度发送数据，并且中间的任何网络设备（交换机、路由器）也必须能够处理这一点（此外还要处理所有其他必须流经它们的流量）。处理企业网络拓扑和网络硬件配置是一个非常广泛的主题，超出了本书的范围，但在这里简要提及`Exadata`数据库服务器内置的网络硬件这一主题非常重要。\n\
  \n除了`InfiniBand`端口外，`Exadata`集群还内置了以太网端口。表 `13-2` 列出了所有的以太网和`InfiniBand`端口。\n\n\
  **表 13-2.**\n\n**每个数据库服务器中的 Exadata 以太网和 InfiniBand 端口**\n\n| Exadata 版本 | 硬件 |\
  \ 以太网端口 | InfiniBand 端口 |\n| --- | --- | --- | --- |\n| V2 | Sun | 4 × 1 Gb/s |\
  \ 2 × 40 Gb/s QDR |\n| X2-2 | Sun | 4 × 1 Gb/s 2 × 10 Gb/s | 2 × 40 Gb/s |\n| X2-8\
  \ | Sun | 8 × 1 Gb/s 8 × 10 Gb/s | 8 × 40 Gb/s |\n| X3-2 | Sun | 4 x 1 or 10 Gb/s\
  \ 2 x 10 Gb/s | 2 x 40 Gb/s |\n| X3-8 | Sun | 8 × 1 Gb/s 8 × 10 Gb/s | 8 × 40 Gb/s\
  \ |\n| X4-2 | Sun | 4 x 1 or 10 Gb/s 2 x 10 Gb/s | 2 x 40 GB/s x 40 Gb/s (active/active)\
  \ |\n| X4-8 | Sun | 10 x 1 Gb/s 8 x 10 Gb/s | 8 x 40 Gb/s (active/ active) |\n|\
  \ X5-2 | Sun | 4 x 1 or 10 Gb/s 2 x 10 Gb/s | 2 x 40 GB/s x 40 Gb/s (active/active)\
  \ |\n\n数据库服务器和存储节点各有一个用于服务器管理（`ILOM`）的管理以太网端口。请注意，在撰写本文时没有`X5-8`型号。\n\n请注意，`X2`及更早的代使用`PCIe`版本`2.0`，而`X3`及之后的代使用`PCIe`版本`3`以获得更高的每`PCI`通道吞吐量。然而，直到`X3`代，`InfiniBand`卡能够使用`PCIe`版本`2.0`和`8`条通道，这意味着`InfiniBand`卡与其`PCI`总线通信的最大带宽限制为`8\
  \ x 500MB = 4000MB`（大约`4GB`）。在`Exadata`中使用的四倍链路聚合的四倍数据速率（`QDR`）`InfiniBand`吞吐量的最大数据速率为`40Gb/s`，或`5GB/s`。这可能解释了直到`X3`代`InfiniBand`的主动/被动配置。\n\
  \n表 `13-2` 显示了每个数据库服务器的网络端口数量。虽然`Exadata V2`没有任何`10GbE`端口，但它每个数据库服务器仍然有`4 × 1GbE`端口。一个满配机箱有八个数据库服务器，这总共将提供`32\
  \ × 1 GbE`端口，当仅使用以太网端口时，理论上最大吞吐量为每秒`32`吉比特。考虑到各种开销，如果您设法将所有网络端口均匀地投入使用并且没有其他瓶颈，理论上仍然可以实现每秒`3`千兆字节的传输速度。这意味着您必须要么将网络接口配置为全主动绑定，要么通过不同的网络接口路由不同数据集的`数据传输`。不同的`dblinks`连接可以通过不同的`IP`地址路由，或者通过不同路径传输`数据泵`转储文件。值得庆幸的是，当前的`Exadata`系统可以使用`10Gb/s`以太网，既可以使用内置端口进行铜缆连接，也可以选择使用两个光口实现相同的理论带宽。在`dash-8`系统上，您确实有丰富的网络端口可用。\n\
  \n由于这相当复杂，迁移到`Exadata`的公司经常使用高吞吐量的绑定`InfiniBand`链路来以低停机时间迁移大型数据集。不幸的是，大多数公司现有的数据库网络基础设施不包括`InfiniBand`（在老旧、庞大的服务器中）。标准通常是若干个交换和绑定的`1GbE`以太网端口，或者在某些情况下是`10GbE`端口。这就是为什么对于`Exadata\
  \ V1/V2`迁移，您必须要么在源服务器中安装`InfiniBand`卡，要么使用一个能够同时处理源以太网流量并将其传输到目标`Exadata InfiniBand`网络的交换机。\n\
  \n幸运的是，`Exadata X2`及更新的版本都包含了`10GbE`端口，因此您不再需要经历让旧服务器支持`InfiniBand`的麻烦，可以转而使用`10GbE`连接（如果您的旧服务器或网络交换机已经配备了`10GbE`以太网）。\n\
  \n如果您打算使用网络链接作为将数据传输到`Exadata`的主要手段来迁移系统，您可能考虑使用 `iperf` 检查带宽，这是一个用于测量吞吐量的开源工具。该工具在一个`MOS`说明中突出介绍：How\
  \ to use `iperf` to test network performance, ID: 1507397.1，详细说明了如何对`RAC`互连流量和丢包进行故障排除。我们认为它非常值得使用。\n\
  \n这引出了我们关于高网络吞吐量数据库迁移的软件配置主题。本章的目的不是成为网络调优参考，但我们希望解释一些我们遇到过的挑战。要正确设置`Oracle`数据库链接的吞吐量涉及更改多个设置并需要手动并行化。希望本节内容能帮助您在处理海量数据集和低停机时间要求时避免重复造轮子。在开始为最佳吞吐量调优数据库之前，您应确保网络连接为迁移提供了足够的吞吐量和足够低的延迟。\n\
  \n除了网络硬件层面需要有足够的吞吐量容量外，还有三个主要的软件配置设置会影响`Oracle`的数据传输速度：\n\n*   获取数组大小（`arraysize`）\n\
  *   `TCP`发送和接收缓冲区大小\n*   `Oracle Net`会话数据单元（`SDU`）大小\n\n对于常规应用程序连接，如果您正在传输大量行，则必须将获取数组大小设置为一个较高的值，范围从几百到几千。否则，如果`Oracle`一次发送的行数太少，大部分传输时间可能最终都花在等待客户端和服务器之间的`SQL*Net`数据包往返上。\n\
  \n然而，使用数据库链接时，`Oracle`足够智能，会自动将获取数组大小设置为最大值——它一次传输`32,767`行。因此，我们不需要自己调优它。\n\n\n\
  \n\n#### 调优 TCP 缓冲区大小\n\nTCP 发送和接收缓冲区大小是在操作系统层面配置的，因此每个操作系统和硬件设备对此都有不同的设置。为了实现更高的吞吐量，可能需要在连接的两端增加\
  \ TCP 缓冲区大小。您可以在此处阅读一个 Linux 示例；对于其他操作系统，请参考您的网络文档。此处参考了匹兹堡超级计算中心“实现高性能数据传输”页面（[`http://www.psc.edu/networking/projects/tcptune/`](http://www.psc.edu/networking/projects/tcptune/)）。\n\
  \n作为第一步，您必须确定系统中 TCP（每个连接）的最大缓冲区大小。在 Exadata 服务器上，只需保持 TCP 缓冲区大小设置为标准 Exadata 安装期间设置的值即可。在\
  \ Exadata 上，TCP 协议栈已经从通用的 Linux 默认值进行了更改。请勿基于通用数据库文档（例如“Oracle Database Quick Installation\
  \ Guide for Linux”）配置 Exadata 服务器设置。\n\n许多非 Exadata 系统针对 100Mbit/s 或 1Gbit/s 范围的网络进行了保守配置。通过设置操作系统参数来增大发送和接收缓冲区，可以优化\
  \ 10Gbit/s 以太网的使用。在此背景下，一个有用的指标是带宽延迟积。BDP 是特定时间点上“在途”的最大数据量，您的非 Exadata 系统网络配置应考虑到这一点。不久前，从\
  \ Red Hat Linux 5.x 使用的 2.6.18 内核开始，Linux 引入了发送和接收缓冲区的自动调优。缓冲区的调优可以通过`/proc/sys/net/ipv4/tcp_moderate_rcvbuf`检查；它应设置为\
  \ 1。研究此主题时常见的建议是，您不应试图超越 Linux 的默认行为，而应坚持使用默认值。\n\n最佳缓冲区大小取决于您的网络往返时间和网络链路的最大吞吐量（或期望的吞吐量，取较低者）。最佳缓冲区大小值可以使用\
  \ BDP 公式计算，该公式在前面提到的“实现高性能数据传输”文档中也有解释。请注意，更改前面显示的内核参数意味着在服务器内进行全局更改。如果您的数据库服务器运行大量进程，由于缓冲区大小的增加，内存使用量可能会上升。因此，在实际迁移发生之前，您可能不想增加这些参数。\n\
  \n在您在操作系统级别更改上述任何套接字缓冲区设置之前，如果您的源数据库是 Oracle 10g 或更新版本，则有一个好消息。从 Oracle 10g 开始，Oracle\
  \ 可以在启动新进程时自行请求自定义缓冲区大小。您可以通过在服务器端（源数据库）更改`listener.ora`配置文件和目标数据库侧的`tnsnames.ora`（或数据库链接定义中的原始\
  \ TNS 连接字符串）来实现这一点。在从目标指向源的数据库链接连接中，目标数据库充当客户端。这在 Oracle Database Net Services Administrator's\
  \ Guide 的“优化性能”部分，“配置 I/O 缓冲区空间”一节中有详细说明。\n\n此外，您可以通过增加`SDU`大小来减少 Oracle 用于发送网络数据的系统调用次数。这需要在`listener.ora`中进行更改，并在服务器端的`sqlnet.ora`中设置默认`SDU`大小。您还应该相应地编辑客户端配置文件。有关更多详细信息，请参阅\
  \ Oracle 文档。请注意，在 Oracle 12c 中，对于 12c 到 12c 的通信，`SDU`的最大大小已从 32kb 增加到 2MB。\n\n以下是一个示例，展示了如何在源数据库上启用大的`SDU`。首先，您需要一个监听器。考虑到迁移，您可能希望使用一个新的监听器，而不是修改现有的监听器。这也意味着您不会干扰常规监听器，如果您使用动态注册的数据库，这可能是一个负担。在示例中，您将看到在源数据库上定义为`SDUTEST`的监听器：\n\
  \n```\n$ cat listener.ora\n\nLISTENER_sdutest =\n  (DESCRIPTION_LIST =\n    (DESCRIPTION\
  \ =\n      (SDU = 2097152)\n      (ADDRESS =\n        (PROTOCOL = TCP)\n       \
  \ (HOST = sourcehost)\n        (PORT = 2521)\n        (SEND_BUF_SIZE=4194304)\n\
  \        (RECV_BUF_SIZE=1048576)\n      )\n    )\n  )\n\nSID_LIST_listener_sdutest\
  \ =\n  (SID_DESC=\n    (GLOBAL_DBNAME=source)\n    (ORACLE_HOME = /u01/app/oracle/product/12.1.0.2/dbhome_1)\n\
  \    (SID_NAME = source1)\n  )\n```\n\n除了`listener.ora`文件，您还需要在`sqlnet.ora`中将默认`SDU`设置为\
  \ 2M：\n\n```\nDEFAULT_SDU_SIZE=2097152\n```\n\n您可能希望将`listener.ora`和`sqlnet.ora`文件存储在其正确的`TNS_ADMIN`目录中，而不干扰其他监听器。如果您计划仅在迁移期间修改网络参数，那么修改默认监听器当然是可以的。\n\
  \nExadata 上（作为客户端）的`tnsnames.ora`文件将引用一个类似于此示例的数据库：\n\n```\n$ cat tnsnames.ora\n\
  \nsource =\n  (DESCRIPTION =\n    (SDU=2097152)\n    (ADDRESS =\n      (PROTOCOL\
  \ = TCP)\n      (HOST = sourcehost)\n      (PORT = 2521)\n      (SEND_BUF_SIZE=1048576)\n\
  \      (RECV_BUF_SIZE=4194304)\n    )\n    (CONNECT_DATA =\n      (SERVER = DEDICATED)\n\
  \      (SERVICE_NAME = source)\n    )\n  )\n```\n\n使用这些设置，当在目标（Exadata）数据库中发起数据库链接连接时，`tnsnames.ora`连接字符串的附加信息将使目标\
  \ Oracle 数据库为其连接请求更大的 TCP 缓冲区大小。得益于目标数据库`tnsnames.ora`和源数据库`sqlnet.ora`中的`SDU`设置，目标数据库将协商尽可能大的`SDU`大小。\n\
  \n注意\n\n如果您在旧版 Oracle 中进行过 SQL*Net 性能调优，您可能还记得另一个 SQL*Net 参数：`TDU`。此参数已过时，从 Oracle\
  \ Net8（Oracle 8.0）开始被忽略。\n\n此外，在本书付印时，您更可能正在将非 12c 数据库迁移到 Exadata 中，因此请注意，这些版本中不支持超大`SDU`。\n\
  \n可以请求不同大小的发送和接收缓冲区。这是因为在数据传输期间，大部分数据将从源移动到目标方向。只有部分确认和“fetch more”数据包会从另一个方向发送。这就是为什么您在源数据库（`listener.ora`）中看到发送缓冲区更大，因为源主要进行发送。在目标侧（`tnsnames.ora`），接收缓冲区被配置为更大，因为目标数据库主要进行接收。请注意，这些缓冲区大小仍然受到操作系统级最大缓冲区大小的限制。正如您在上一节中所读到的，在\
  \ Linux 上这个数字是自动调优的。其他操作系统可能有所不同。\n\n\n\n#### 并行化数据加载\n\n如果你为迁移选择了抽取-加载方法，并且计划使用**EHCC**，那么还有一个瓶颈需要克服。你可能希望使用**EHCC**来节省存储空间并获得更好的数据扫描性能（压缩数据意味着需要从磁盘读取的字节更少）。请注意，如果你的查询执行时间大部分花费在数据访问之外的操作上，例如排序、分组、连接，以及在`SELECT`列表或过滤条件中调用的任何昂贵函数，那么更快的扫描可能不会使你的查询明显加速。然而，与经典的块级去重相比，**EHCC**压缩需要多得多的**CPU**周期，因为**EHCC**中的最终压缩是通过**CPU**密集型算法执行的（当前是**LZO**、**Zlib**或**BZip**，具体取决于压缩级别）。此外，虽然解压缩可以在存储单元或数据库层进行，但数据的压缩只能在数据库层进行。因此，如果你使用单个会话将大量数据加载到**EHCC**压缩表中，你将受限于你正在使用的单个**CPU**（核心）。因此，你几乎肯定需要并行化数据加载，以利用数据库层的所有**CPU**，实现更高效、更快速的压缩。\n\
  \n这听起来很简单——只需在目标表上添加一个`PARALLEL`标志，或者在查询中加入一个`PARALLEL`提示，就应该万事大吉了，对吗？或者也许使用`impdp`中的`PARALLEL`关键字来并行完成工作？不幸的是，事情比这稍微复杂一些。有几个问题需要解决；其中一个是简单的，但另一个需要一些努力。\n\
  \n接下来的几节将不会提及`impdp`，原因很简单：当通过网络链路使用`impdp`导入时，该工具无法执行段内并行。它会并行导入段（尊重并行子句），但没有任何段会被并行导入。相反，重点是如何使用你自己的**DIY**段内并行性，通过数据库链路上的插入语句来实现。\n\
  \n##### 问题一：确保数据加载并行执行\n\n这里的问题是，虽然并行查询和数据定义语言（**DDL**）语句在任何会话中默认启用，但数据操作语言（**DML**）语句的并行执行则没有启用。因此，并行**CTAS**语句将端到端地并行运行，但并行**IAS**语句的加载部分将以串行方式完成！查询部分（`SELECT`）将并行执行，因为从站将数据传递给单个查询协调器（**QC**），而正是这个单一的进程在执行数据加载（包括**CPU**密集型的压缩）。\n\
  \n不过，这个问题很容易解决；你只需要在你的会话中启用并行**DML**。让我们先检查一下会话中的并行执行标志：\n\n```sql\nSQL> SELECT\
  \ pq_status, pdml_status, pddl_status, pdml_enabled\n  2> FROM v$session WHERE sid\
  \ = SYS_CONTEXT(’userenv’,’sid’);\n\nPQ_STATUS   PDML_STATUS   PDDL_STATUS   PDML_ENABLED\n\
  ---------   -----------   -----------   ---------------\nENABLED     DISABLED  \
  \    ENABLED       NO\n```\n\n当前会话中并行**DML**被禁用。`PDML_ENABLED`列是为了向后兼容而存在的。让我们启用**PDML**：\n\
  \n```sql\nSQL> ALTER SESSION ENABLE PARALLEL DML;\n\nSession altered.\n\nSQL> SELECT\
  \ pq_status, pdml_status, pddl_status, pdml_enabled\n  2> FROM v$session WHERE sid\
  \ = SYS_CONTEXT(’userenv’,’sid’);\n\nPQ_STATUS   PDML_STATUS   PDDL_STATUS   PDML_ENABLED\n\
  ---------   -----------   -----------   ---------------\nENABLED     ENABLED   \
  \    ENABLED       YES\n```\n\n启用并行**DML**后，**INSERT AS SELECT**语句就能够为**IAS**语句的加载部分使用并行从站了。\n\
  \n关于并行插入，还有另一个重要方面需要注意。在下一个例子中，启动了一个新会话（因此**PDML**被禁用），当前语句是一个并行插入。你可以看到在插入和查询块上都添加了一个“语句级”的`PARALLEL`提示，解释的执行计划输出（`DBMS_XPLAN`包）显示使用了并行性。然而，这个执行计划在加载到压缩表时会非常缓慢，因为并行性只对查询（`SELECT`）部分启用，而不是对数据加载部分！\n\
  \n为什么会这样？请注意实际数据加载发生的位置——在执行计划树中的`LOAD AS SELECT`操作符中。然而，这个`LOAD AS SELECT`位于`PX\
  \ COORDINATOR`行源之上（这是可以从从站拉取行和其他信息到**QC**的行源）。此外，在第 3 行，你可以看到`P->S`操作符，这意味着从第 3\
  \ 行向上传递到执行计划树的任何行都由一个串行进程（**QC**）接收。\n\n```sql\n-------------------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name     | Rows |  Bytes | Cost (%CPU)| Time\
  \      |\n-------------------------------------------------------------------------------------------------\n\
  |   0 | INSERT STATEMENT            |          |      |        | 6591 (100) |  \
  \         |\n|   1 |  LOAD AS SELECT             |          |      |        |  \
  \          |           |\n|   2 |   PX COORDINATOR            |          |     \
  \ |        |            |           |\n|   3 |    PX SEND QC (RANDOM)      | :TQ10000\
  \ |   10M|   1268M| 6591   (1) | 00:00:01 |\n|   4 |     PX BLOCK ITERATOR     \
  \  |          |   10M|   1268M| 6591   (1) | 00:00:01 |\n|*  5 |      TABLE ACCESS\
  \ STORAGE FULL| T1     |   10M|   1268M| 6591   (1) | 00:00:01 |\n-------------------------------------------------------------------------------------------------\n\
  ... continued from previous output:\n-----------------------------\nTQ  |IN-OUT|\
  \ PQ Distrib |\n-----------------------------\n|      |            |\n|      | \
  \           |\nQ1,00 | P->S | QC (RAND)  |\nQ1,00 | PCWP |            |\nQ1,00 |\
  \ PCWC |            |\nQ1,00 | PCWP |            |\n-----------------------------\n\
  ```\n\n\n`谓词信息（由操作 ID 标识）：`\n`---------------------------------------------------`\n\
  `5 - storage(:Z>=:Z AND :Z<=:Z)`\n\n## 注意\n\n执行计划表的输出太宽，无法放入单行；因此，剩余的信息（这些信息非常重要！）已被换行显示。\n\
  \n“并行度为 8 是因为提示”这一消息意味着，Oracle 理解了以并行度 8 运行查询某部分的请求，并且在优化执行计划时，CBO 计算中使用了这个并行度。然而，如上所述，这并不意味着整个执行计划都使用了这个并行度。检查实际的数据加载工作（`LOAD\
  \ AS SELECT`）是由单个 QC（查询协调器）执行还是由 PX 从属进程执行，这一点很重要。\n\n让我们看看启用并行 DML 后会发生什么：\n\n\
  ```sql\nSQL> alter session enable parallel dml;\n\nSession altered.\n\nSQL> insert\
  \ /*+ monitor append parallel(8) */ into t1 select /*+ parallel(8) */ * from t2\n\
  ```\n\n```\nSQL 计划监控详情（计划哈希值=3136303183）\n====================================================================================\n\
  | Id |               操作               |   名称   | 行数 | 代价 |    时间    |\n|    |  \
  \                                 |          | (预估) |      | 活动秒数   |\n====================================================================================\n\
  |  0 | INSERT STATEMENT                  |          |        |      |          \
  \ 1 |\n|  1 |   PX COORDINATOR                  |          |        |      |   \
  \        1 |\n|  2 |    PX SEND QC (RANDOM)            | :TQ10000 |   10M | 3764\
  \ |           1 |\n|  3 |     LOAD AS SELECT                |          |       \
  \ |      |           3 |\n|  4 |      OPTIMIZER STATISTICS GATHERING|          |\
  \   10M | 3764 |           3 |\n|  5 |       PX BLOCK ITERATOR           |     \
  \     |   10M | 3764 |           2 |\n|  6 |        TABLE ACCESS STORAGE FULL  |\
  \ T2       |   10M | 3764 |           3 |\n===================================================================================\n\
  ```\n\n此案例中请求的 DOP（并行度）与之前一样是 8，但请比较这两个计划。此执行计划取自 12c 数据库的 SQL 监控报告。可以看到一个额外的步骤——收集统计信息。这是一个新功能，可确保在新建或填充的段中拥有准确的统计信息。\n\
  \n要理解接下来的讨论，你还需要查看并行分布情况。如下所示——这次取自 11.2 数据库的`DBMS_XPLAN.DISPLAY_CURSOR`：\n\n```\n\
  ------------------------------------------------------------------------------------------------\n\
  | Id  | 操作                       | 名称     | 行数 | 字节数 ||    TQ  | 内外 | PQ 分发    \
  \  |\n------------------------------------------------------------------------------------------------\n\
  |   0 | INSERT STATEMENT            |          |      |        ||        |     \
  \ |              |\n|   1 |  PX COORDINATOR             |          |      |    \
  \    ||        |      |              |\n|   2 |   PX SEND QC (RANDOM)       | :TQ10000\
  \ |   10M|   1268M||  Q1,00 | P->S | QC (RAND)    |\n|   3 |    LOAD AS SELECT \
  \          |          |      |        ||  Q1,00 | PCWP |              |\n|   4 |\
  \     PX BLOCK ITERATOR       |          |   10M|   1268M||  Q1,00 | PCWC |    \
  \          |\n|*  5 |      TABLE ACCESS STORAGE FULL| T1     |   10M|   1268M||\
  \  Q1,00 | PCWP |              |\n------------------------------------------------------------------------------------------------\n\
  ```\n\n在本页两个执行计划所代表的第二种情况下，`LOAD AS SELECT`操作符已下移到执行计划树中；它不再是`PX COORDINATOR`的父操作。如何解读这个简单的执行计划呢？`TABLE\
  \ ACCESS STORAGE FULL`将行发送给`PX BLOCK ITERATOR`（它是实际调用`TABLE ACCESS`并传递下一个要读取的数据块范围的行源）。然后，`PX\
  \ BLOCK ITERATOR`将行发送回`LOAD AS SELECT`，后者立即将行加载到目标表中，完全不传递给 QC。所有的`SELECT`和`LOAD`工作都在同一个从属进程内完成——不需要进程间通信。如何判断呢？因为`IN-OUT`列显示两个操作都是`PCWP`（并行操作，与父操作结合），且两个操作的`TQ`值相同（`Q1,00`）。这表明并行执行从属进程确实在同一个表队列节点下执行所有这些步骤，无需在从属进程组之间传递数据。\n\
  \n## 使用数据库链接的执行计划\n\n从数据库链接读取数据时，实际的执行计划如下所示：\n\n![A978-1-4302-6242-8_13_Figa_HTML.jpg](img/A978-1-4302-6242-8_13_Figa_HTML.jpg)\n\
  \n在此示例中，由于在会话级别启用了并行 DML，数据加载是并行完成的；`LOAD AS SELECT`是一个并行操作（`IN-OUT`列显示`PCWP`），在\
  \ PX 从属进程内执行，而不是在 QC 中执行。\n\n请注意，`DBMS_XPLAN`显示了通过数据库链接发送到远程服务器的 SQL 语句（在上面的远程 SQL\
  \ 信息部分）。没有向远程服务器发送`PARALLEL`提示，而是发送了一个未文档化的`SHARED`提示，它是`PARALLEL`提示的别名。注意输出来自 12c，其中这个加载选择操作会触发一个统计信息收集操作。\n\
  \n这是比较容易解决的问题。如果你的数据量非常大，使用数据库链接还有另一个需要解决的问题，我们现在将进行解释。\n\n\n## 问题二：实现完全并行网络数据传输\n\
  \n数据库链接与并行执行相关的另一个问题是，即使你能在链接两端都成功运行并行执行，实际打开数据库链接并管理网络传输的却是查询协调器。并行执行从属进程无法“神奇地”各自建立到另一数据库的数据库链接连接——所有流量都流经单个查询的查询协调器。因此，即使你可以使用数百个从属进程运行\
  \ `CTAS`/`IAS` 语句，网络传输仍然只使用一个数据库链接连接。虽然你可以通过增大 TCP 缓冲区和 SDU 大小来优化网络吞吐量，但查询协调器进程（运行在单个\
  \ CPU 上）能够处理的数据量仍然存在限制。\n\n图 13-1 展示了尽管采用了所有并行执行，数据如何流经单个查询协调器。\n\n![A978-1-4302-6242-8_13_Fig1_HTML.gif](img/A978-1-4302-6242-8_13_Fig1_HTML.gif)\n\
  \n**图 13-1.**\n数据流在查询协调器处是单线程的\n\n除了单个查询协调器的数据库链接瓶颈外，在查询协调器和从属进程之间发送数据（消息）也需要额外的\
  \ CPU 时间。过去，精细调整 `parallel_execution_message_size` 参数在这方面有所帮助。然而，从 Oracle 11.2 开始，其值默认为\
  \ 16KB，因此进一步调整可能不会有显著收益。如果你在 RAC 实例的多个节点上执行并行数据加载，每个查询仍将只有一个查询协调器和一个网络连接。因此，如果查询协调器在节点\
  \ 1 运行，而并行从属进程在节点 2 运行，查询协调器必须通过 RAC 互联网络将其从数据库链接获取的数据作为 PX 消息发送给从属进程。\n\n如果你选择将数据库链接与并行从属进程一起使用，应在不同实例中运行多个独立的查询，并使用以下命令强制将并行从属进程与查询协调器置于同一实例中：\n\
  \n```sql\nSQL> ALTER SESSION SET parallel_force_local = TRUE;\n\n会话已更改。\n```\n\n\
  这样，你至少可以避免 RAC 实例间流量和远程消息传递的 CPU 开销，但查询协调器到从属进程的实例内消息传递（行分发）开销仍然存在。\n\n尽管进行了所有这些优化，并在不同实例中使用并行查询迁移了不同的大型表，你可能仍会发现单个数据库链接（及其查询协调器）无法提供足够的吞吐量，无法在停机时间内迁移数据库中最大的事实表。如前所述，数据库链接方法最适合用于数据库中的少数几个巨型表，其余的表可以使用\
  \ Data Pump 进行导出/导入。也许你只有几个巨大的事实表，但如果你的满配 Exadata 集群中有八个 RAC 实例，如何才能让所有实例高效地传输和加载数据呢？你可能希望每个实例至少有一个并行查询及其查询协调器和数据库链接，如果单个查询协调器进程无法足够快地拉取和分发数据，甚至可能需要多个这样的查询。\n\
  \n这里显而易见的解决方案是利用分区功能，因为你的大型 TB 级表在源数据库中很可能已经是分区的。你只需将大表作为多个独立的部分复制。然而，这种方法存在几个问题。\n\
  \n第一个问题是，当执行常规的直接路径加载插入（这对于 HCC 和适用的 `NOLOGGING` 加载是必需的）时，你的会话将独占地锁定它正在插入的表。当针对该表存在未提交的直接路径加载事务处于活动状态时，其他任何人都不能修改或向该表插入数据。请注意，其他人仍然可以读取该表，因为\
  \ `SELECT` 语句不会对它们查询的表获取队列锁。\n\n如何解决这个并发问题呢？幸运的是，Oracle 的 `INSERT` 语法允许你通过名称指定要插入的确切分区或子分区：\n\
  \n```sql\nINSERT /*+ APPEND */\nINTO\nfact PARTITION ( Y20080101 )\nSELECT\n*\n\
  FROM\nfact@sourcedb\nWHERE\norder_date >= TO_DATE('20080101 ', 'YYYYMMDD ')\nAND\
  \ order_date  < TO_DATE('20080102', 'YYYYMMDD ')\n```\n\n使用这种语法，直接路径插入语句将只锁定指定的分区，其他会话可以自由地向同一表的其他分区插入数据。Oracle\
  \ 仍将执行分区键检查，以确保数据不会被加载到错误的分区中。如果你尝试向分区插入无效的分区键值，Oracle 将返回错误消息：\n\n`ORA-14401: 插入的分区键值超出指定分区的范围。`\n\
  \n请注意，你不能在查询的 `SELECT` 部分使用 `PARTITION ( partition_name )` 语法。这里的问题是，查询生成器（反解析器）——它负责组合通过数据库链接发送的\
  \ SQL 语句——不支持 `PARTITION` 语法。如果你尝试使用，将会收到错误：\n\n`ORA-14100: 扩展表名的分区不能引用远程对象。`\n\n\
  这就是为什么你必须依赖源数据库端的分区裁剪——例如，通过向 `WHERE` 条件添加过滤谓词，以便只返回目标分区中的数据。在刚才显示的示例中，源表按 `order_date`\
  \ 列进行范围分区。多亏了传递给源数据库的 `WHERE` 子句，该数据库中的分区裁剪优化将只扫描所需的分区，而不是整个表。\n\n注意此示例中没有使用 `BETWEEN`\
  \ 子句，因为它包含了 `WHERE` 子句中指定范围的两端值，而 Oracle 分区选项的“值小于”子句从分区值范围中排除了 DDL 中指定的值。\n\n也可以使用子分区范围的插入语法加载到单个子分区（从而一次只锁定一个子分区）。当即使是单个分区的数据也太大而无法通过单个进程/数据库链接快速加载时，这非常有用，它允许你将数据分割成更小的块。只是注意不要有太多（小的）子分区——你之后可能无法对它们执行智能扫描。以下是上面的示例，这次是针对子分区插入：\n\
  \n```sql\nINSERT /*+ APPEND */\nINTO\nfact SUBPARTITION ( Y20080101_SP01 )\nSELECT\n\
  *\nFROM\nfact@sourcedb\nWHERE\norder_date >= TO_DATE('20080101 ', 'YYYYMMDD ')\n\
  AND order_date  < TO_DATE('20080102', 'YYYYMMDD ')\nAND ORA_HASH(customer_id, 63,\
  \ 0) + 1 = 1\n```\n\n在这个例子中，源表仍然按 `order_date` 进行范围分区，但它被哈希分区为 64 个子分区。由于同样无法通过数据库链接发送\
  \ `SUBPARTITION` 子句，你使用了 `ORA_HASH` 函数来仅获取属于 64 个总子分区中第一个哈希子分区的行。`ORA_HASH` SQL\
  \ 函数内部使用与将行分配到哈希分区和子分区相同的 `kgghash()` 函数。如果有 128 个子分区，你需要将 SQL 语法中的 `63` 改为 `127\
  \ (n – 1)`。\n\n由于你需要传输所有子分区，你可以并行复制其他子分区（当然这取决于服务器负载），只需运行上述查询的略微变体，并仅更改目标子分区名称和\
  \ `ORA_HASH` 输出以匹配相应的子分区位置：\n\n```sql\nINSERT /*+ APPEND */\nINTO\nfact SUBPARTITION\
  \ ( Y20080101_SP02 )\nSELECT\n*\nFROM\nfact@sourcedb\nWHERE\norder_date >= TO_DATE('20080101\
  \ ', 'YYYYMMDD ')\nAND order_date  < TO_DATE('20080102', 'YYYYMMDD ')\nAND ORA_HASH(customer_id,\
  \ 63, 0) + 1 = 2\n```\n\n归根结底，你需要执行 64 个该脚本的略微变体。\n\n\n\n`... INTO fact` `SUBPARTITION\
  \ ( Y20080101_SP03 )` `... WHERE ORA_HASH(customer_id, 63, 0) + 1 =` `3` `...`\n\
  \n`... INTO fact` `SUBPARTITION ( Y20080101_SP04 )` `... WHERE ORA_HASH(customer_id,\
  \ 63, 0) + 1 =` `4` `...`\n\n`...`\n\n`... INTO fact` `SUBPARTITION ( Y20080101_SP64\
  \ )` `... WHERE ORA_HASH(customer_id, 63, 0) + 1 =` `64` `...`\n\n如果你的表在子分区命名中的哈希子分区编号方案与实际的子分区位置（即`ORA_HASH`函数返回值）不对应，那么你需要查询`DBA_TAB_SUBPARTITIONS`，并使用`SUBPARTITION_POSITION`列来找到正确的`subpartition_name`。\n\
  \n还有一个问题需要注意。虽然`order_date`谓词在源数据库中会用于分区修剪，但`ORA_HASH`函数却无法用于此目的；查询执行引擎根本不知道如何利用`ORA_HASH`谓词进行子分区修剪。换句话说，上述查询会读取指定范围分区下的所有\
  \ 64 个子分区，然后对获取的每一行应用`ORA_HASH`函数，并丢弃那些`ORA_HASH`结果不匹配的行。因此，如果你有 64 个会话，每个会话都试图用上述方法读取一个子分区，那么每个会话最终都会扫描该范围分区下的所有子分区，意味着总共需要进行\
  \ 64 × 64 = 4096 次子分区扫描。\n\n可以通过在源数据库的源表上创建视图来解决这个问题。首先要为每个子分区创建一个视图（当然，使用脚本来生成创建视图的命令）。视图名称应遵循类似`V_FACT_Y2008010_SP01`的命名规范，并且每个视图的`SELECT`语句中都包含`SUBPARTITION\
  \ ( xyz )`子句。\n\n请记住，这些视图必须在源数据库中创建，以避免数据库链接语法限制带来的问题。当迁移开始时，在目标 Exadata 数据库中执行的`insert-into-subpartition`语句将根据所需的子分区引用相应的视图。这意味着一些大型事实表上可能会有数千个视图。只要模式所有者对源表拥有选择权限，这些视图可以放在一个单独的模式中。另外，你可能不需要对表的所有分区都使用这个技巧，因为如果你最大的表是按某个`order_date`或类似字段进行时间分区的，你或许可以在停机窗口之前迁移大部分旧分区。因此，你并不需要使用这种巧妙但耗时的变通方法。\n\
  \n刚才讨论的技术可能看起来相当复杂和耗时，但如果你需要提取、传输和压缩数十或数百 TB 的原始数据（并且所有这些操作都必须非常快速地完成），那么这些措施将会非常有用。我们曾使用这些技术迁移过规模高达\
  \ 100TB（使用传统的块压缩进行压缩）的 VLDB 数据仓库，其原始数据集超过四分之一 PB。你现在可能会问自己，刚才展示的方法是否值得。关于何时适合使用数据库链接，何时不适合，请阅读下一节了解更多。\n\
  \n## 何时使用 CTAS 或 IAS 而非数据库链接\n\n如果你有充足的停机时间，要迁移的数据库不是太大，并且你不需要或不想对数据库模式进行重大重组，那么你可能不必通过数据库链接使用数据加载（IAS/CTAS）。如果你有时间，完整的\
  \ Data Pump 导出/导入会容易得多；一切都可以通过一个简单的命令潜在地导出和导入。\n\n然而，如果你要在低停机窗口内迁移 VLDB，数据库链接可以提供一个性能优势——通过数据库链接，你可以创建自己的表内并行度，这是通过网络链接进行\
  \ Data Pump 导入所不具备的。与使用转储文件的“经典” Data Pump 导出相比，网络链接选项和数据库链接技术都具有显著优势，即不需要为导出的数据准备磁盘空间。你不必为了将其复制过去并重新加载到另一台服务器而将数据转储到磁盘文件。此外，使用数据库链接时，你也不需要任何中间磁盘空间来保存转储文件。使用数据库链接，你只需从磁盘读取一次数据（在源数据库中），通过网络传输它，然后在目标数据库写入磁盘一次。\n\
  \n传输大量小表（或表分区）实际上使用 Export/Import 或 Data Pump 方法可能更快。而且，其他模式对象（视图、序列、PL/SQL 等）无论如何都需要迁移。从这个角度来看，只通过数据库链接传输大表，而使用\
  \ Export/Import 或 Data Pump 迁移其他所有内容，可能是一个好主意。在 Data Pump 中巧妙使用 `INCLUDE`（或根据用例使用\
  \ `EXCLUDE`）参数可以使迁移过程减少很多麻烦。另外，请记住 `SQLFILE` 选项可用于为特定的数据库对象创建脚本。如果你需要在模式导入前获取数据库的所有授权，你可以使用以下示例（假设转储文件是从完整数据库导出中仅包含元数据的转储文件）：\n\
  \n```\n[oracle@enkdb03 ∼]> impdp sqlfile=all_grants.sql dumpfile=metadata.dmp \\\
  \n> directory=migration_dir logfile=extract_grants.log include=GRANT\n```\n\n你可以根据所选模式（`FULL`、`SCHEMA`\
  \ 或 `TABLE`），分别查询字典视图 `DATABASE_EXPORT_OBJECTS`、`SCHEMA_EXPORT_OBJECTS` 和 `TABLE_EXPORT_OBJECTS`，以了解要包含或排除的对象。\n\
  \n## 通过数据库链接复制表时需要注意什么\n\n在业务时间复制表可能会影响源数据库的性能。它也会给网络带来负载，即使安装了专用网络硬件以减少生产时间高吞吐量数据传输的影响，有时也难以避免。表\
  \ 13-3 总结了每种提取和加载方法的能力。\n\n**表 13-3.** 何时使用提取和加载\n\n| 需求 | Data Pump | Export/Import\
  \ | Database Link |\n| --- | --- | --- | --- |\n| 模式更改 | 是 | 是 | 是 |\n| 表/索引存储更改\
  \ | 是 | 是 (1) | 是 |\n| 表空间更改 | 是 | 否 | 是 |\n| 数据加密 (TDE) | 是 | 否 | 是 |\n| 数据库版本\
  \ <9i | 否 | 是 | 是 (2) |\n| 混合列式压缩 | 是 | 否 | 是 |\n| 直接路径加载 | 是 | 否 | 是 |\n\n1.  可以通过运行带\
  \ `show=y` 选项的 `imp` 来提取 DDL 语句，修改脚本并在 Sqlplus 中手动创建对象，从而更改对象创建的 DDL。Data Pump 的\
  \ `TRANSFORM` 参数使此类任务变得容易得多。\n2.  对旧客户端连接的支持在《不同 Oracle 版本的客户端/服务器互操作性支持矩阵》（文档 ID\
  \ 207303.1）中有描述。\n\n\n\n\n#### 基于复制的迁移\n\n一般来说，基于复制的迁移是通过创建源数据库的副本，然后通过将更改应用到该副本（或称“目标数据库”）来保持其同步来完成的。应用这些更改有两种截然不同的方法。\n\
  \n物理复制将 `redo` 信息传送到目标端，在那里使用其内部恢复机制应用到数据库。这称为 `Redo Apply`（重做应用）。你可以在本章后面的“物理迁移”部分了解更多关于其工作原理的内容。使用逻辑复制时，源数据库的更改会从\
  \ `redo` 流中提取为 SQL 语句，并在目标数据库上执行。使用 SQL 语句将更改从源复制到目标的技术称为 `SQL Apply`（SQL 应用）。早在上世纪九十年代，当\
  \ Oracle 7 和 8 盛行时，数据库管理员（DBA）普遍使用快照（snapshot）来保持远程数据库中的表与源数据库中的主表同步。这些快照使用触发器来捕获主表的更改并在目标上执行。当目标表不可用时，快照日志用于排队这些更改，以便稍后执行。这是一种简单的逻辑复制形式。当然，这对于少数几个表来说没问题，但当复制一组表或整个模式时，就变得难以管理了。在后续版本中，Oracle\
  \ 为该技术封装了一些可管理性功能，并将其品牌化为“简单复制”。它的下一个演进步骤“高级复制”在版本 8 中很热门，但现在在 12c 中已被弃用，计划用 Oracle\
  \ Golden Gate 取代。\n\n甚至在数据库复制的早期，就有一些公司想出了如何挖掘数据库 `redo` 日志，以比触发器更高效、侵入性更低的方式捕获\
  \ DML。如今，市场上有几种产品利用这种“日志挖掘”技术来复制数据库，效果非常好。逻辑复制相对于物理复制的优势在于其灵活性。例如，逻辑复制允许目标数据库可用于读取访问。在某些情况下，它还允许你在目标数据库中实现表压缩和分区。在接下来的几节中，我们将介绍几种支持基于复制迁移的工具。\n\
  \n#### Oracle Streams 和 Golden Gate\n\n`Oracle Streams` 包含在基础的 `RDBMS` 产品中，并在版本\
  \ `9i` 中作为新功能引入。尽管在撰写本文时数据库软件的当前生产版本 `12.1` 中仍然存在，但它已被弃用。弃用一个功能意味着开发人员和管理员都应尝试减少对其的依赖，因为它将在未来的某个阶段消失。\n\
  \n`Golden Gate` 最初是一个独立产品，但已被 Oracle 收购。这两种产品——`Streams` 和 `Golden Gate`——通过挖掘 `redo`\
  \ 信息以几乎相同的方式复制数据，尽管它们的实现方式不同。为了数据库迁移的目的，会创建（目标）并启动源数据库的副本。这可以通过使用 `Recovery Manager`\
  \ 从完整的数据库备份来完成，或者，如果你想迁移的不是整个数据库，则可以使用 `Data Pump` 来实例化选定的模式。然后，源数据库中的更改会从 `redo`\
  \ 日志中提取或挖掘出来。这些更改随后被转换为等效的 `DML` 和 `DDL` 语句，并在目标数据库中执行。Oracle 将这些步骤称为 `Capture`（捕获）、`Propagation`（传播）和\
  \ `Apply`（应用）。\n\n无论你使用哪种产品，在复制运行期间，目标数据库都保持在线并可供应用程序使用。可以在目标模式或其他模式中创建新表，尽管 Oracle\
  \ 不建议这样做。对目标端的任何限制仅限于正在复制的表。当你的迁移策略涉及整合——将来自多个源数据库的模式整合到一个（可插拔？）数据库中时，这一点特别有用。由于其极高的性能和可扩展性，大多数公司至少在一定程度上使用\
  \ `Exadata` 进行数据库整合，因此这是一个非常有用的特性。如果你仔细琢磨，就会意识到这意味着你可以并发地迁移多个数据库。\n\n`Streams` 和\
  \ `Golden Gate` 的另一个能力是能够即时转换数据。这通常与数据库迁移无关，但如果需要，也可以使用。由于这两种工具都使用 `SQL Apply` 来将数据更改传播到目标端，因此你可以对目标表进行更改以提高效率。例如，你可以将常规目标表转换为分区表。你还可以添加或删除索引，并更改扩展区大小以针对\
  \ `Exadata` 进行优化。请注意，即使复制提供了这种能力，它也可能变得混乱，尤其是当更改数量很多时。如果你计划对源表进行大量更改，请考虑在开始复制之前实施这些更改。\n\
  \n目标数据库中的表可以使用 `Exadata HCC` 进行压缩。要做好在插入数据并使用 `HCC` 压缩时测试性能的准备。正如你在第 3 章中看到的，压缩是一个\
  \ CPU 密集型过程，比 `Basic` 和 `OLTP` 压缩要密集得多。然而，根据查询的性质，其回报在存储节省和查询性能方面通常是显著的。请记住，如果在\
  \ `HCC` 压缩表上执行常规的插入或更新操作，Oracle 会切换到 `OLTP` 压缩（针对受影响的行），并且你的压缩比会显著下降。可以通过实现 `insert\
  \ append` 提示来执行直接路径插入，如下所示：\n\n```\nSQL> insert /*+ append */ into my_hcc_table\
  \ select ...;\n```\n\n```\nSQL> insert /*+ append_values */ into my_hcc_table values\
  \ ( <array of rows> );\n```\n\n\n"
- "# Oracle 数据迁移：Streams 与 Golden Gate 对比\n\n需要注意的是，`append_values`提示仅适用于 Oracle 11gR2\
  \ 及以上版本。与本书第一版所述不同，Golden Gate 现在支持读取压缩表。要支持 Basic、Advanced (OLTP) 和 EHCC 压缩，唯一的方法是配置新的集成捕获机制。与挖掘在线重做日志的经典捕获不同，集成捕获直接与日志挖掘服务器交互，以逻辑更改记录\
  \ (LCR) 的形式接收数据更改。\n\n> **注意**\n>\n> 您不能在 Oracle 12c 多租户数据库中使用经典捕获。\n\n对于 Streams，文档指出其在\
  \ 10g 数据库中不支持直接路径插入。11g 通过直接路径 API 提供了有限的支持。再次强调，请务必查阅 Oracle 文档以了解您的数据库版本支持哪些功能。如有疑问，请运行一些测试，查看是否获得了预期的压缩级别。然而，一个很大的改进是，Oracle\
  \ 11.2 允许 Streams 捕获使用基本表压缩和 OLTP 压缩的表的数据。从 Oracle 11.2.0.2 补丁集开始，Streams/XStream\
  \ 也可以捕获对 HCC 压缩表所做的更改。Oracle Streams 概念与管理指南在附录 B 中对此有更详细的解释。\n\nStreams 支持 Oracle\
  \ 的大多数数据类型，并且列表随每个版本而增加。以下是 Oracle Streams 和 Golden Gate 共有的优势摘要：\n\n*   支持故障转移\
  \ (Oracle RAC 环境)\n*   支持多租户数据库\n*   支持表分区 (目标表)\n*   支持 HCC 压缩，尽管与 CTAS 或 IAS 相比，您可能无法获得最佳的加载压缩率\n\
  *   支持表和索引的存储更改 (目标表)\n*   能够更改索引策略 (目标表)\n*   迁移期间对目标表的只读访问\n*   支持源和目标之间的字节序差异\n\
  *   支持源和目标之间的（某些）字符集差异\n*   支持源和目标之间不同的数据库块大小\n*   支持在目标服务器上进行变更捕获，减少对源系统的性能影响\n\
  *   设置不复杂\n*   与数据库版本无关\n*   切换停机时间非常短\n*   Oracle 企业管理器中存在支持。\n\nStreams 和 Golden\
  \ Gate 共有的缺点包括：\n\n*   复制的表必须具有主键或唯一键。如果源表上没有主键，则必须提供一组能保证唯一性的列。如果不存在这样的组合，则无法复制该表。\n\
  *   某些数据类型不支持复制。\n*   源系统上的日志挖掘会影响性能。考虑将变更捕获移到目标系统。\n*   逻辑复制通常比其他迁移策略更复杂。\n\nStreams\
  \ 相对于 Golden Gate 的缺点：\n\n*   Streams 在 Oracle 12c 中已弃用。它仍然可用（不像变更数据捕获 — CDC），但如\
  \ Streams 概念与管理指南附录 B 所述，它不支持多租户数据库。Golden Gate 通常被视为 Streams 的替代品。\n*   数据挖掘可能严重影响源数据库的性能。\n\
  *   设置和维护更复杂。\n*   支持 DDL 但存在问题。\n*   如果复制中断，修复过程可能很麻烦。通常从头重建目标更容易。\n*   SQL Apply\
  \ 比 Golden Gate 更容易落后于源。\n*   Streams 往往比 Golden Gate 需要更多的 CPU 资源。\n\nStreams 相对于\
  \ Golden Gate 的优势：\n\n*   Streams 包含在您的数据库许可中，而 Golden Gate 需要单独购买。\n*   所有进程信息都存储在数据库中，提供了方便的远程访问。\n\
  \n那么，您应该使用 Streams 还是 Golden Gate？一方面，是技术层面。我们曾与使用过这两种产品的客户和同事交流。在每种情况下，他们都将该产品用于类似数据库迁移的简单复制到远程站点。我们得到的反馈压倒性地倾向于\
  \ Golden Gate。这些用户引用了 Golden Gate 易用性、稳定性和性能作为最重要的原因。除此之外，Golden Gate 支持非 Oracle\
  \ 数据库源。Streams 运行在 Oracle 数据库内部，并且没有被移植到任何其他数据库平台。如前所述，Streams 包含在您的 Oracle 数据库许可中。Golden\
  \ Gate 则不是，其基于源和目标服务器总核心数的成本不容小觑。如果您的数据复制需求超出了 Exadata 迁移，这项投资可能是非常值得的。如果您面临一次性迁移，考虑到成本（忽略团队需要熟悉该工具的事实），Streams\
  \ 可能更合适。但另一方面，Streams 已被 Golden Gate 取代。许多读者可能仍在 11g Release 2 上，因此 Streams 被弃用的事实可能不会立即影响您。然而，当\
  \ Streams 对某些更有趣的 12c 特性缺乏支持成为限制因素时，那一天终将到来。\n\n##### 何时使用 Streams 或 Golden Gate\n\
  \nStreams 和 Golden Gate 都提供了极大的灵活性和接近零的停机时间。它们非常适合需要更改目标表的迁移。这包括调整表和索引的区大小、实现分区策略和压缩表。它们还允许您更改模式、表空间和磁盘组等。\n\
  \n##### 使用 Streams 和 Golden Gate 的注意事项\n\n由于 Streams 和 Golden Gate 通过重做日志传播数据库更改，您必须防止源数据库上的\
  \ `NOLOGGING` 操作。这可以在表空间级别使用 `alter tablespace force logging` 或在数据库级别使用 `alter database\
  \ force logging` 来完成。以下是您必须防止的一些 `NOLOGGING` 操作示例：\n\n*   `CREATE TABLE newtab NOLOGGING\
  \ AS select * from ...`\n*   `insert /*+ append */` ... (针对处于 nologging 模式的表) 或\n\
  *   `insert /*+ append nologging */` (专门覆盖默认的日志记录操作)\n*   直接路径 SQL*Loader (针对处于\
  \ nologging 模式的表)\n\n请注意，一些大型数据仓库数据库设计为使用 `NOLOGGING` 进行大规模数据加载，以节省 CPU 和磁盘空间（生成的归档日志更少）。这些数据库依赖于增量备份加上数据重新加载作为恢复策略。在此类数据库中，强制所有操作进行重做日志记录可能会导致不可接受的性能下降和归档日志生成。在这些情况下，配置\
  \ ETL 引擎在过渡期间对新旧 DW 系统同时执行加载是有意义的。尽管从 nologging 更改为 logging 加载操作看起来很简单，但在孤立的组织中，这可能被证明是无法改变的。相反，如果您使用依赖于挖掘重做日志的复制方法，则可能必须使用\
  \ `alter database force logging`。\n\n#### 逻辑备库\n\n另一种可能对数据库迁移有用的复制类型是逻辑备库数据库。逻辑备库是\
  \ Oracle 数据库的一个内置功能。它在 9i release 2 版本中作为 Data Guard（前身为备用数据库）的一个扩展或附加功能被引入。表面上，此策略听起来与\
  \ Streams 和 Golden Gate 非常相似，因为它基本上执行相同的任务。源数据库的更改从重做日志（或归档重做日志）中挖掘出来，转换为 SQL 语句，并在目标数据库上执行。与其他逻辑复制方法一样，数据库在复制运行时处于打开且可用状态。\n\
  \n逻辑备库比 Streams 或 Golden Gate 限制要多得多。因为逻辑备库实际上是从源数据库的物理、逐块副本实例化而来的，所以有几个规则开始起作用。源数据库和目标数据库的数据库版本必须相同，甚至补丁级别也要一致。\n\
  \nOracle 支持在同一 Data Guard 配置中为 primary 和逻辑备库数据库进行异构配置。主说明可以在 My Oracle Support 上找到：Data\
  \ Guard Support for Heterogeneous Primary and Logical Standbys in Same Data Guard\
  \ Configuration (Doc ID 1085687.1)。阅读此说明会揭示 Oracle Data Guard 支持的操作系统组合矩阵。然而，在你抱有过高期望之前，对于“不能在不同平台甚至不同字节序之间使用\
  \ Data Guard”这一规则，只有极少数例外。\n\n你可能会惊讶地发现，虽然索引和物化视图可以在目标数据库中轻松创建，但实施分区策略则更为困难。你必须暂停复制，使用分区重新创建表，然后恢复复制。如果你的复制表与主库不同步，那你就麻烦了。通常用于使一切恢复正常的\
  \ `DBMS_LOGSTDBY.INSTANTIATE_TABLE` 过程会移除备用数据库上的现有表，并将其替换为主库上存在的表。\n\n表压缩也不是 100%\
  \ 支持的。请记住，HCC 压缩仅适用于直接路径加载，而逻辑备库使用常规插入应用更改。更糟的是，批量更新是通过逐行更新来复制的。实施 EHCC 通常是 Exadata\
  \ 一个非常重要的性能策略。缺乏对此功能的支持是逻辑备库和一次性迁移方法的一个显著缺点。当然，在切换完成后，你可以执行一系列 `alter table move`\
  \ 命令来达到正确的压缩率。\n\n不支持的数据类型列表可以在 Data Guard 概念与管理指南的 附录 C 中找到。\n\n创建逻辑备库比创建其近亲物理备库更为复杂。配置和实例化逻辑备库有很多步骤。列出所有步骤会进一步扩展本章内容。高级步骤已足够：\n\
  \n```\n1.  创建一个物理备库数据库（请注意，这将在后面的“物理备库”部分稍后介绍）。\n2.  停止物理备库数据库上的重做应用。\n3.  在主数据库中配置\
  \ Log Miner。\n4.  将物理备库数据库转换为逻辑备库。\n5.  打开逻辑备库数据库并重启重做应用。\n6.  验证逻辑备库数据库正在应用源数据库的更改。\n\
  ```\n\n逻辑备库使用 SQL 应用（SQL Apply）而非重做应用（Redo Apply）技术将更改从源数据库复制到目标。如前所述，源数据库中的更改被转换为\
  \ SQL 语句并传送到目标端执行。虽然这听起来相当直接，但由于其实现方式，仍有一些有趣的含义需要考虑。对于 DML 语句，有几件事需要记住：\n\n*   批量更新一次执行一行。因此，如果你用一条命令更新\
  \ 100,000 条记录，你将在备用数据库上应用 100,000 条单独的命令。\n*   直接路径插入以常规方式执行。\n*   并行 DML 不会并行执行。\n\
  \nDDL 语句的复制没有任何特殊的配置要求。然而，对于 DDL 语句有一些注意事项：\n\n*   并行 DDL 不会并行执行。\n*   CTAS（Create\
  \ Table As Select）执行为 `create table`、`insert`、`insert`、`insert`。\n\n你应该密切关注备用数据库上的应用过程，以确保批量操作不会过多干扰性能。当在逻辑备库数据库上复制对表的大规模批量插入时，你会看到相当多的开销，并且由于撤销应用和块清理，逻辑备库上查询的性能会受到影响。\n\
  \n##### 何时使用逻辑备库\n\n逻辑备库有一份非常窄的、使其区别于其他更可能的迁移方法的益处清单。它提供完整的数据库复制，并允许在复制期间对备用数据库进行读取访问。因此，在准备好最终切换之前，备用数据库可用于卸载生产数据库上资源密集型的报告操作。可以在备用数据库上创建表和物化视图，并且可以创建或删除索引以提高性能。\n\
  \n##### 逻辑备库需要注意什么\n\n`NOLOGGING` 操作不会产生足够的重做日志，这意味着它们不会被复制到备用数据库。与任何 Data Guard\
  \ 设置一样，请务必使用 SQL*Plus 在主库和逻辑备库数据库上执行 `alter database force logging` 命令来防止 `NOLOGGING`\
  \ 操作。考虑到它缺乏对修改目标表存储、压缩和分区的支持，你可能会选择使用物理备库方法。如果你不需要完整的数据库复制，Streams 和 Golden Gate\
  \ 是很好的替代方案，它们提供了许多逻辑备库数据库所缺乏的功能支持。\n\n#### 并行加载\n\n这有点像“自己动手”的迁移方法。在此策略中，数据更改通过内部开发的应用程序馈送给数据库。因此，配置应用程序以与当前生产数据库并行更新\
  \ Exadata 表是一项小任务。然后，在正常业务时间内将历史数据迁移到 Exadata。根据数据量，这可能需要几天到几周的时间。一旦所有表都迁移到 Exadata，对旧生产系统的馈送就被切断，Exadata\
  \ 成为新的生产数据库。\n\n#### 逻辑迁移总结\n\n在大多数情况下，逻辑迁移为重新配置区大小、实施或修改分区策略以及使用 HCC 压缩表提供了最大的灵活性。这种灵活性是以复杂性和限制为代价的，应该与本章介绍的一些物理迁移策略的简单性进行权衡和考量。归根结底，你需要为大型表正确调整区大小，实施良好的分区策略，并使用\
  \ HCC 压缩只读表。在你切换到 Exadata 之前，使用本文讨论的大多数逻辑迁移策略就可以完成这些工作。\n\n\n### 物理迁移\n\n物理数据库迁移，顾名思义，就是创建源数据库（或数据库部分）的逐块副本并将其移动到`Exadata`的过程。物理迁移比本章前面讨论的一些逻辑迁移策略要简单得多。正如您可能预料的那样，除了选择不迁移某些不必要的表空间外，它不允许对目标数据库进行任何更改。这意味着您将无法修改表和索引的区大小、更改索引策略、实现分区或应用\
  \ HCC 表压缩。此外，如果您的数据库诞生于`7.x`或`8i`时代，由于当时文件系统的限制，您可能拥有数百甚至数千个数据文件。您还记得`2GB`的文件大小限制吗？\n\
  \n所有旨在简化或\"Exadata 化\"您的数据库的任务都必须在迁移后完成。然而，毫无疑问，物理迁移是将数据库迁移到`Exadata`的最快方式。对于所有物理迁移策略，除了可传输表空间（`TTS`）之外，新的`Exadata`数据库开始时都是单实例数据库。迁移后需要执行步骤，将数据库及其所有实例注册到集群就绪服务（网格基础架构）。因为物理迁移创建的是源数据库的精确副本，所以限制列表非常短：\n\
  \n*   源数据库版本必须是`11.2`或更高。\n*   一种选择是在复制到`Exadata`之前将生产数据库升级到`11.2`或更高版本。升级通常是一个快速过程，不依赖于数据库表的大小，而是依赖于数据库中的对象数量和配置的选项。（然而，升级后`PL/SQL`包和视图的重新编译可能需要一些时间。）\n\
  *   源平台必须获得运行`Oracle 11.2`或更高版本的认证。您可以查看`My Oracle Support 认证矩阵`，了解哪些 Linux 发行版分别获得了`Oracle\
  \ 11.2`和`12.1`的认证。\n*   源平台必须是小端格式。当使用在`Exadata`上创建新数据库并使用跨平台可传输表空间的混合解决方案时，源数据库可以位于具有不同字节序的不同平台上（支持的平台列在`v$transportable_platform`视图中）。\n\
  \n执行物理迁移有三种策略：备份与恢复、物理备机以及带增量备份的跨平台可传输表空间。在本节中，我们将讨论这些策略、它们的工作原理以及它们最适用的场景。\n\n\
  ## 备份与恢复\n\n备份与恢复策略使用`Oracle`的恢复管理器（`RMAN`）创建源数据库的完整备份，然后将其恢复到`Exadata`平台。除非您计划在此过程中关闭数据库，否则源数据库必须在`归档日志`模式下运行。备份和恢复过程可以通过一次完整备份完成。这是将较小数据库迁移到`Exadata`的最佳方式，因为较小的数据库所需时间要少得多。较大的数据库可能需要数小时进行备份和恢复。对于这些数据库，可以通过先进行完整备份，然后进行增量备份，分两次完成该过程。\n\
  \n完整备份和恢复是众所周知的过程，此处不详细列出。`RMAN`备份和恢复/还原的一条规则是不能跨平台使用。虽然在`MOS 文档 ID 1079563.1`\"\
  \ `RMAN DUPLICATE/RESTORE/RECOVER 混合平台支持`\"中有记录的少数例外情况，但它们几乎不值一提，因为实在太少了。更有趣的是一个新的`12c`特性，您可以使用备份集创建跨平台备份，并将转换卸载到目标数据库执行。当前的实现不支持移动到不同的字节序，这使得该特性对于迁移到`Exadata`的吸引力降低，因此，出于同样的原因，此处不予讨论。\n\
  \n请注意，除非您的源数据库是`12c`数据库，否则您将无法立即使用新的多租户数据库架构。`11.2`数据库必须先迁移到`12c`，然后才能将其转换为可插拔数据库（`PDB`）。如果您乐意继续将数据库用作非`CDB`，则无需采取进一步措施。但是，如果您正在将多个数据库整合为一个作为`PDB`的容器数据库，则需要进一步的步骤。\n\
  \n\n## 全备份与恢复\n\n使用 RMAN 创建要迁移的数据库的全备份。备份文件暂存在文件系统中，或以其他方式使其对 Exadata 可访问。然后，将备份恢复到\
  \ Exadata 平台。请注意，本节介绍的是全恢复，它无法克服数据库字节序的差异。但是，只要字节序保持一致，您可以执行跨平台转换。这涉及本章未涵盖的额外步骤。换句话说，您不能将数据库从大端转换为小端，但可以将\
  \ Windows 转换为 Linux。在 Exadata 上恢复备份的高级步骤如下：\n\n执行迁移前任务：\n   为 Exadata 上的数据库在 `tnsnames.ora`\
  \ 文件中创建一个条目。\n   将密码文件和参数文件复制到 Exadata。\n   限制用户和应用程序对数据库的访问。\n   执行数据库全备份。\n  \
  \ 将文件复制到 Exadata。\n   在 Exadata 上，使用调整后的服务器参数文件将数据库启动到 `nomount` 模式。\n   恢复控制文件。\n\
  \   挂载数据库。\n   恢复数据库。\n   恢复数据库。\n执行迁移后任务：\n   将数据库转换为 RAC 并创建服务名。\n   重新配置客户端的\
  \ `tnsnames.ora` 文件、用于连接到 Exadata 数据库的配置文件。\n   使数据库可供用户和应用程序使用。\n\n如您所见，这是一个相当直接的过程。遵循这些步骤后，您就得到了一个在\
  \ Exadata 上运行的、与生产数据库完全一致的副本。不过，有几件事需要注意。如果您的源数据库使用文件系统进行数据库存储，或者您使用了 ASM 但 Exadata\
  \ 上的磁盘组名称不同，您可以在开始恢复过程之前，通过更改 `init.ora` 文件中的 `db_create_file_dest` 和 `db_recovery_file_dest`\
  \ 参数，将恢复的文件重定向到新的磁盘组名称。表 13-4 展示了如何使用这些参数将磁盘组名称从源数据库重映射到 Exadata。\n\n表 13-4.\n磁盘组重映射\n\
  \n| Init.ora 参数             | 源数据库            | Exadata 数据库 |\n| :------------------------\
  \ | :------------------ | :------------- |\n| `db_create_file_dest`     | `’+DATA_FILES’`\
  \     | `’+DATA’`      |\n| `db_recovery_file_dest`   | `’+RECOVERY_FILES’` | `’+RECO’`\
  \      |\n\n如果您的数据库使用多个 ASM 磁盘组来存储数据库文件，请使用 RMAN 的 `db_file_name_convert` 子句将文件名重映射到\
  \ ASM 磁盘组。例如：\n```\ndb_file_name_convert= \\\n  (’+DATA_FILES/exdb/datafile/system.737.729723699’,’+DATA’)\n\
  db_file_name_convert= \\\n  (’+DATA_FILES1/exdb/datafile/sysaux.742.729723701’,’+DATA’)\n\
  ```\n\n细心的读者现在无疑会指出，使用 RMAN 的 `duplicate` 命令可以实现完全相同的事情，这当然是正确的。然而，根据我们的经验，管理层对生产环境的访问权限通常极为谨慎，即使对于复制过程也是如此。上面解释的额外步骤通常是值得的——备份可能已经存在，只需要使用归档日志进行前滚。而且，还有一个额外的好处，甚至不需要“接触”生产系统，这个操作通常需要精心设计的变更控制流程。\n\
  \n#### 增量备份\n\n如果您需要迁移的数据库很大，且迁移时间有限，您可以考虑使用增量备份和恢复策略，以减少最终切换到 Exadata 的停机时间。遗憾的是，增量方法也不支持字节序格式转换。基本步骤如下：\n\
  \n执行迁移前任务：\n   为 Exadata 上的数据库在 `tnsnames.ora` 文件中创建一个条目。\n   将密码文件和参数文件复制到 Exadata。\n\
  \   创建数据库的 0 级备份。\n   将备份文件复制到 Exadata。\n   在 Exadata 上，将数据库启动到 `nomount` 模式。\n\
  \   恢复控制文件。\n   挂载数据库。\n   恢复数据库。\n   限制用户和应用程序对数据库的访问。\n   创建源数据库的增量 1 级备份。\n \
  \  将增量备份文件复制到 Exadata。\n   恢复数据库。\n执行迁移后任务：\n   将数据库转换为 RAC 并创建服务名。\n   重新配置客户端的\
  \ `tnsnames.ora` 文件。\n   使数据库可供用户和应用程序使用。\n\n您肯定已经注意到，增量备份方法的步骤与全备份方法几乎相同。重要的区别在于所需的停机时间。迁移数据库的大部分时间花在全备份本身上。这可能需要数小时才能完成，而在全备份方法中，这全部都是数据库停机时间。增量备份方法使用\
  \ 0 级备份代替全备份。实际上，0 级备份与全备份相同，只是它具有特殊属性，可以作为应用增量备份的基线。因此，使用增量方法，数据库在迁移的最长部分期间可以保持在线供用户访问。\n\
  \n在拍摄增量 0 级备份之前，确实应该在源数据库上激活块更改跟踪。启用块更改跟踪后，Oracle 会通过翻转一个小位图文件中的位来跟踪自上次 0 级备份以来所有已更改的块。这意味着当您执行增量\
  \ 1 级备份时，Oracle 不必扫描数据库中的每个块来查看哪些块已更改。它只需在块更改跟踪文件中查找它们即可。使用块更改跟踪文件几乎可以保证减少增量备份所需的时间。我们见过这样的案例：一个\
  \ 13TB 的数据仓库使用 BCT 文件进行增量备份只需 15 分钟，而之前需要 9 小时。要查看块更改跟踪是否处于活动状态，请在 SQL*Plus 中执行以下查询：\n\
  ```\nSQL> SELECT status FROM v$block_change_tracking;\nSTATUS\n----------\nDISABLED\n\
  ```\n您不必关闭数据库来激活块更改跟踪。它可以随时完成。要启用块更改跟踪，请执行以下命令：\n```\nSQL> ALTER DATABASE ENABLE\
  \ BLOCK CHANGE TRACKING;\nDatabase altered.\n```\n默认情况下，块更改跟踪文件创建在 `db_create_file_dest`\
  \ 位置。如果未设置此参数，您需要设置它或为块更改跟踪文件指定文件名：\n```\nALTER DATABASE ENABLE BLOCK CHANGE TRACKING\n\
  USING FILE ’/u01/app/oracle/admin/<ORACLE_SID>/bct/bct.dat’;\n```\n迁移后任务对于将单实例 Exadata\
  \ 数据库转换为多实例 RAC 数据库是必需的。为此，您需要为实例到在线重做日志线程添加映射，并添加额外的撤销表空间。将新的 RAC 数据库注册到 Clusterware\
  \ 中也是非常稳妥的做法。一旦数据库在 Exadata 上恢复并运行，您应该执行一次数据库全备份。假设数据库运行在归档日志模式下，您可以在数据库重新上线并服务于最终用户和应用程序之后进行此操作。\n\
  \n> 注意\n> 增量备份的一个轻微变体是使用 Exadata 数据库作为 Data Guard 物理备库来自动执行前滚副本的过程。本章稍后将介绍此内容。\n\
  \n\n#### 何时使用备份与恢复\n\n使用 RMAN 执行简单的数据库备份与恢复，是所有 DBA 应当能够驾轻就熟的操作。这使得备份与恢复成为一种极具吸引力的策略。它最适用于那些暂时不需要分区和\
  \ HCC 压缩的 OLTP 数据库。它同样适用于已经运行在小端序、64 位平台上的数据仓库数据库，尽管迁移后可能还需要执行一些后续步骤。\n\n#### 考虑备份与恢复策略时的注意事项\n\
  \n增量备份与恢复不支持字节序转换。如果这是必需的要求，您可能更适合使用可传输表空间迁移策略，或者重新考虑本章前面介绍过的一些逻辑迁移策略。迁移到 Exadata\
  \ 后，对象需要重建才能利用其存储特性，例如 HCC。数据文件也是如此。如果您的数据库包含大量版本历史，那么您可能拥有许多小的数据文件。在 Solaris 2.5\
  \ 和早期 AIX 版本的时代，文件系统限制规定您不能创建大于 2GB 的数据文件。在 Exadata 时代，重新组织这些分散的数据文件及其上存储的段是明智之举。\n\
  \n与此相关的问题还包括物化视图、微分区表、块碎片等，可以在新的 Exadata 平台上重新审视这些问题，以求简化并优化数据库。如果一个数据库拥有大量历史数据且从未进行过物理重组，那么行很可能跨越多个块形成行链。\n\
  \n#### 可传输表空间\n\n可传输表空间 (TTS) 可用于将源数据库的子集迁移到 Exadata。为此，您需要在 Exadata 上运行一个数据库来承载这些数据库子集。我们经常将\
  \ TTS 描述为一种“修剪与嫁接”过程。此方法允许将一组表空间从源数据库复制并安装到一个活动的 target 数据库中。与前面描述的完整备份与恢复过程不同，您可以将单个表空间插入到\
  \ 12c 可插拔数据库中。这样，您就省去了将非 CDB 转换为 PDB 的部分工作。如果源数据库中已实施了模式级整合，此任务将进一步简化。假设您的模式都各自良好地包含在自己的（大文件）表空间中。将它们迁移到\
  \ Exadata 是一种非常优雅的迁移方式，不是吗？\n\n标准的 TTS 方法基于数据文件的映像副本。该过程相当简单，尤其是在没有 Data Guard 物理备用数据库的情况下，但在开始之前您需要注意一些重要事项。该过程的重要限制如下所述，如第\
  \ 15 章中提到：\n\n*   TTS 支持不透明类型，如 `RAW` 和 `BFILE`，但这些类型不进行跨平台转换。这些类型的结构仅对应用程序可知，字节序格式的任何差异都必须由应用程序处理。无论对不透明类型的使用是直接的还是间接的，类型和对象都受此限制。\n\
  *   只要目标数据库的版本与源数据库相同或更高，就支持数据库版本差异。\n*   待迁移的表空间在迁移过程中必须置于只读模式。\n*   理想情况下，源数据库和目标数据库的字符集应相同。此规则也有例外。如果您计划在迁移过程中更改字符集，请参阅\
  \ Oracle 文档。\n*   具有底层依赖关系（如物化视图和表分区）的对象不可传输，除非它们包含在同一组中。表空间组是在一个操作中一起移动一组相关表空间的方式。\n\
  *   在传输加密表空间之前，必须先将 Oracle wallet 复制到目标系统并为目标数据库启用。一个数据库只能有一个用于 TDE 的 Oracle wallet。如果您要迁移到的数据库已有\
  \ wallet，则需要使用 Data Pump 来导出和导入表数据。\n*   未使用块级加密但包含使用列加密的表的表空间，无法使用 TTS 传输。在这种情况下，Data\
  \ Pump 可能是最佳替代方案。\n*   自 10g Release 2 起，TTS 支持包含 XML 数据类型的表空间。在该版本中，您需要使用原始的 `exp`/`imp`\
  \ 实用程序来提取元数据。从 11.1 开始，您必须使用 `expdp`/`impdp`。传输 XML 数据还有其他限制和注意事项。完整列表请参阅 Oracle\
  \ XML DB 开发人员指南。要列出包含 XML 数据类型的表空间，请运行以下查询：\n    ```sql\n    SQL> select distinct\
  \ p.tablespace_name\n           from dba_tablespaces p,\n                dba_xml_tables\
  \  x,\n                dba_users       u,\n                all_all_tables  t\n \
  \         where t.table_name = x.table_name\n            and t.tablespace_name =\
  \ p.tablespace_name\n            and x.owner = u.username;\n    ```\n\n跨平台可传输表空间\
  \ (XTTS) 支持大多数但并非所有平台之间的转换。要确定您的平台是否受支持，请运行以下查询：\n\n```sql\nSQL> SELECT * FROM V$TRANSPORTABLE_PLATFORM\
  \ ORDER BY PLATFORM_NAME;\n```\n\n```\nPLATFORM_ID PLATFORM_NAME               \
  \                ENDIAN_FORMAT\n----------- -----------------------------------\
  \ --------------\n          6 AIX-Based Systems (64-bit)                  Big\n\
  ```\n\n\n\n"
