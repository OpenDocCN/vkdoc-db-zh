  最终的开关为补丁过程的每个部分启用了电子邮件警报。启用电子邮件选项将在 `patchmgr` 启动时发送警报，并在存储服务器的补丁状态发生变化时发送更新。这些状态可以是“已启动”、“修补中”、“等待中”、“成功”或“失败”。这对于可能运行很长时间的滚动补丁很有用。指定
