  #### 管理网络


  “管理网络”屏幕（图 8-7）用于定义管理网络。字段描述见表 8-3。管理网络（以前称为管理网络）包含机架中所有物理组件的 IP 地址，包括所有数据库和存储服务器、InfiniBand
  交换机、电源分配单元以及 Cisco 交换机。你可以将此网络视为登录计算节点、存储单元和 InfiniBand 交换机的 SSH 入口点。内部 Cisco 网络交换机为管理网络提供服务。只需要一个网络接口即可将
  Cisco 管理交换机上联到你的公司网络。


