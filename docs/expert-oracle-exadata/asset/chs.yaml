  \ cell 相关等待事件的版本。这些事件如下：\n\n*   cell external table Smart Scan\n*   cell list of\
  \ blocks read request\n*   cell multi-block read request\n*   cell physical read\
  \ no I/O\n*   cell single block read request\n\n除了一个例外，其他事件都将在后面的章节中介绍：外部表扫描事件属于另一个\
  \ Oracle 产品，此处不作讨论。\n\n接下来的章节将涵盖所有相关的 Exadata 等待事件，以及一些对 Exadata 具有特殊适用性的附加事件。\n\
