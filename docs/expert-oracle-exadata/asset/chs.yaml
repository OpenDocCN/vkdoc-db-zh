  \ 11 章中阅读更多内容），您会发现这些有趣的指标：\n\n```\nSTAT    cell IO uncompressed bytes         \
  \                                 136,533,385,216\nSTAT    cell blocks helped by\
  \ minscn optimization                            16,666,678\nSTAT    cell blocks\
