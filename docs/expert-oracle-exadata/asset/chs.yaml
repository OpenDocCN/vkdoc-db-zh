- "# Exadata I/O 性能分析与 iostat 使用\n\n## 服务时间正常但 I/O 性能仍差的情况\n\n如果服务时间正常，但 Oracle (`cellsrv`)\
  \ 仍然看到较差的 I/O 性能，这可能意味着在单元 Linux 服务器内部仍然存在排队现象。`iostat` 命令同样可以显示这些信息。\n\n针对存储控制器\
  \ LUN 的“飞行中”未完成 I/O 数量是有限的。存储控制器需要跟踪每个未完成的 I/O（例如，它必须记住当数据块从磁盘读取并到达控制器时，应在主机 RAM\
  \ 的哪个位置写入），而这些 I/O 插槽是有限的。Linux 内核不允许发送超出存储控制器处理能力的 I/O；否则，将发生 SCSI 重置。这些被限流的 I/O\
  \ 将不得不在操作系统磁盘设备 I/O 队列中等待——并且它们是无用地等待在那里；它们甚至尚未被发送到存储控制器。只有当之前某个未完成的 I/O 操作完成后，队列中的第一个项目才会被发送到磁盘（假设某些请求的\
  \ I/O 延迟截止期限尚未达到；`cellsrv` 使用 Linux 的 “deadline” I/O 调度器）。\n\n## Flash 设备的优势\n\n\
  好消息是，从 X5-2 开始，PCIe Flash 设备采用了 NVMe（非易失性内存主机控制器接口），这有望大幅增加 I/O 队列数量以及每个队列的队列深度。但这仅适用于\
  \ Flash 设备；硬盘仍然受限于上述限制。随着时间的推移，Flash 设备在承担 I/O 工作负载方面承担了更多责任。在 X5-2 高性能单元的情况下，这一点被推向极致。但即使在混合硬盘/Flash\
  \ 内存配置中，您也可以启用 **写回闪存缓存** 来帮助解决硬盘成为写入瓶颈的罕见情况。**智能闪存日志** 可帮助您处理提交操作。而且从 Exadata 11.2.3.3\
  \ 开始，无论对于小型还是大型 I/O 请求，读取操作都会自动缓存在 **智能闪存缓存** 中。总之，您的大部分 I/O 请求理想情况下将由 Flash 而非硬盘满足。小型随机\
  \ I/O 请求从 Flash 内存中获益良多。\n\n## 硬盘 I/O 队列分析\n\n回到对硬盘的讨论。如果您观察到 I/O 等待（排队时间），`iostat`\
  \ 中的 `await`（平均 I/O 完成时间）列将显著高于 `svctm`（估算的 I/O 服务时间）列。请注意，“await”这个名称有些误导性，因为它不仅显示等待（排队）时间——它显示的是总等待时间加上服务时间。同样，`avgqu-sz`\
  \ 列显示的并非仅仅是平均 I/O 等待队列长度，而是 I/O 请求队列中未完成 I/O 的平均总数，无论它们是否已经发送到存储硬件（正在被服务）或仍在 I/O\
  \ 队列中等待（尚未被服务）。\n\nLinux `iostat` 显示磁盘分区和单元软件 RAID 设备（用于单元操作系统分区镜像）的统计信息。我们可以过滤掉这些行，只列出物理磁盘统计信息；LVM\
  \ 和分区信息被排除。下一个示例适用于除 X5-2 高性能单元外的所有型号；这些单元没有任何旋转硬盘。\n\n```\n$ iostat -xm 5 | egrep\
