  30 rows selected.\n```\n\n在此处可以看到回写闪存缓存正在工作。\n\n### V$CELL% 动态性能视图族\n\n本节只能是对 `V$CELL%`\
  \ 视图族的一个介绍。它们在第 11 章也有涉及，你可以了解到这些视图在 Oracle 11.1.0.2 和 `cellOS` 12.1.2.1.x 及更高版本中得到了极大增强。从分析闪存缓存的角度来看，最有趣的视图列在表\
  \ 5-2 中。\n\n**表 5-2. 用于监控闪存缓存的 V$CELL 视图列表**\n\n| 视图名称 | 内容 |\n| --- | --- |\n|\
  \ `V$CELL_DB` | 列出全局层面对所有单元的 I/O 请求。将查询限制到特定源数据库，可以了解其在所有 I/O 请求中的份额。 |\n| `V$CELL_DISK`\
  \ | 列出可以为单元磁盘测量的所有与 I/O 相关的统计信息。应将查询限制到单个单元，或者更好的是，限制到名称以 FD（闪存磁盘）开头的单个单元磁盘。如果您使用的是全闪存存储服务器，则不应依赖此视图中的信息来衡量闪存缓存性能。由于没有硬盘，所有网格磁盘都创建在闪存设备上，您无法轻易在视图中区分闪存缓存\
  \ I/O 和网格磁盘相关 I/O。对于所有其他 Exadata 用户，很可能所有闪存卡都用于闪存缓存（减去用于闪存日志的 512MB），在这种情况下，该视图可以显示一些关于\
  \ I/O 请求数量、大小和延迟的有趣数据。 |\n| `V$CELL_GLOBAL` | 此表中最有趣的视图之一，因为它提供的输出与前面展示的 `cellcli`\
