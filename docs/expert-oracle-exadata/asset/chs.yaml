  值得庆幸的是，随着 Exadata 11.2.3.3 的引入，许多关于将段固定到 Flash Cache 的复杂性问题已得到解决。你甚至无需花费太多时间去思考它。在之前展示的对`user_tables`的查询输出中，你会注意到`cell_flash_cache`的属性是`NONE`和`DEFAULT`，但没有一个被设置为`KEEP`。仅为了\
  \ Smart Scan 的数据透明缓存这一点，就值得升级到 11.2.3.3。\n\n\n\n#### 压缩\n\nExadata 的混合列压缩（HCC）在减少\
  \ Oracle 数据库内存储数据大小的能力上迈出了一大步。使用 HCC 可实现的压缩比率，将传统的信息生命周期管理观念彻底颠覆。HCC 使得考虑使用压缩而非分层存储或归档与清除策略变得切实可行。由于可以为表的不同分区定义不同的压缩方法，因此将分区与压缩相结合，可以为“归档”数据提供比实际将其从数据库中清除更加强健的解决方案。\n\
  \n然而，您应该记住，HCC 不适用于正在进行 DML 操作的数据。更好的方法是进行数据分区，以便 HCC 可以应用于不再更改的数据。这引出了我们的下一个主题——分区。\n\
  \n#### 分区\n\n分区一直是，并且现在仍然是数据仓库系统的一个非常关键的组件。Exadata 提供的优化并不能消除对精心设计的分区策略的需求。当然，从管理角度来看，基于日期的策略非常有用。能够对较旧的数据使用更激进的压缩通常是一个好方法。但分区消除仍然是您会希望使用的一项技术。而且，当然，存储索引可以与分区良好配合，在额外的列上提供与分区消除类似的行为。\n\
  \n您应该记住，分区的大小会影响 Oracle 决定是否使用智能扫描。对分区对象执行串行扫描时，是否进行直接路径读取的决定是基于单个段（表、分区、子分区）的大小，而不是对象的总体大小。这可能导致对某些分区的扫描被下推执行，而对其他分区的扫描则没有。这对于已被压缩的、较冷的分区尤为重要。考虑一个创建时包含许多随机日期、并按月间隔按日期进行范围分区的表：\n\
  \n```sql\nSQL> select segment_name, partition_name, bytes/power(1024,2) m\n  2 \
  \ from user_segments where segment_name= 'SMARTSCANHCC';\n\nSEGMENT_NAME       \
  \            PARTITION_NAME                             M\n------------------------------\
  \ ---------------------------------- ----------\nSMARTSCANHCC                  \
  \ SYS_P9676                                  944\nSMARTSCANHCC                 \
  \  SYS_P9677                                  968\nSMARTSCANHCC                \
  \   SYS_P9678                                  384\n\n3 rows selected.\n```\n\n\
  ```sql\nSQL> select partition_name, high_value from user_tab_partitions\n  2  where\
