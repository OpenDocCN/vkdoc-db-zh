  \ metric_type\n  2  from V$CELL_GLOBAL\n  3  where lower(metric_name) like ’%flash\
  \ cache%’\n  4  and cell_name = ’192.168.12.10’;\n\nMETRIC_NAME                \
  \                          METRIC_VALUE METRIC_TYPE\n--------------------------------------------------\
