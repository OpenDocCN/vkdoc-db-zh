  内核将这些卡作为常规块设备进行寻址，就像自 IDE 磁盘时代以来的旋转硬盘一样。在 Linux 中，它们与任何其他块设备一样可见。实际上，以 `/dev/sdq`
  开头的设备是常规的旋转硬盘。这完全没有问题；在引入非易失性内存主机控制器接口规范 (`NVMHCI`) 或简称 `NVMe` 之前，这在许多设备中一直是直接连接的
  NAND 闪存的标准寻址方式。您可以在下一节中阅读到的 X5-2 存储服务器上找到这些（NVMe）设备。



