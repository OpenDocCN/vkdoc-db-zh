  监控功能的一部分。它内置于 `DBMS_SQLTUNE` 包中，并且（如果你有相应的许可）能提供大量信息。它不仅提供语句是否被卸载的信息，还能显示执行计划中的哪些步骤被卸载。以下是一个已卸载语句的示例。遗憾的是，输出内容太宽了——虽然已经稍微压缩了一点，但仍然包含了必要信息：


