  ### 自动化执行 `exachk`


  建议每月运行 `exachk`，以评估 Exadata 系统的整体运行状况。使用 `exachk` 守护进程时，可以根据您的需求安排周期性的 `exachk`
  执行。这种自动运行功能允许进行类似于标准 Linux `cron` 工具的调度，并可为各种需求设置多个计划。执行 `exachk` 并指定 `AUTORUN_SCHEDULE`
  参数来定义计划。图 D-2 显示了用于调度自动运行功能的选项。


  ![A978-1-4302-6242-8_21_Fig2_HTML.gif](img/A978-1-4302-6242-8_21_Fig2_HTML.gif)

  *图 D-2. AUTORUN_SCHEDULE 选项*


  如您所见，`AUTORUN_SCHEDULE` 与 `cron` 类似，但不允许指定执行 `exachk` 脚本的具体分钟。使用 `AUTORUN_SCHEDULE`
  时，`exachk` 总是在整点执行。除了 `AUTORUN_SCHEDULE`，Oracle 还建议包含一个 `NOTIFICATION_EMAIL` 和 `PASSWORD_CHECK_INTERVAL`。`PASSWORD_CHECK_INTERVAL`
  参数定义了 `exachk` 守护进程验证内存中存储的密码是否仍然有效的频率。如果密码发生更改，守护进程将向 `NOTIFICATION_EMAIL` 定义的地址发送电子邮件。此外，当计划的
  `exachk` 运行完成后，最终的 HTML 报告将被发送到 `NOTIFICATION_EMAIL` 参数中列出的地址。


  以下示例展示了如何创建一个在每周一晚上 10 点执行的自动运行计划：

  ```

  # ./exachk -id Monday_Night -set "AUTORUN_SCHEDULE=22 * * 1;

  NOTIFICATION_EMAIL=user@example.com;

  PASSWORD_CHECK_INTERVAL=1"

  Created autorun_schedule for ID[Monday_Night]

  Created notification_email for ID[Monday_Night]

  Created password_check_interval for ID[Monday_Night]

  ```


  可以使用 `–id` 参数为计划命名。这允许为不同的计划设置不同的选项或配置文件。例如，DBA 可以获得针对数据库子集运行的特定 `exachk` 报告，而系统管理员可以每月收到一份概述存储单元状态的
  `exachk` 报告。如果您想查看通过 `exachk` 守护进程配置的所有计划，请使用 `–get all` 参数启动 `exachk`。


  在以下示例中，有两个计划：`Monday_Night` 和 `Tuesday_Night`。`Tuesday_Night` 计划执行仅检查存储服务器的“storage”配置文件：

  ```

  # ./exachk -get all

  ID: Monday_Night

  ----------------------------------

  autorun_schedule = 22 * * 1

  notification_email = user@example.com

  password_check_interval = 1


  ID: Tuesday_Night

  ----------------------------------

  autorun_schedule = 22 * * 2

  notification_email = sysadmin@example.com

  password_check_interval = 1

  autorun_flags = -profile storage

  ```


  最后，您可以查询 `exachk` 守护进程以查看下一次自动运行何时发生。查询 `exachk` 守护进程并添加 `nextautorun` 参数，将告知下一次
  `exachk` 自动运行发生的时间以及将调用它的计划：

  ```

  # ./exachk -d nextautorun

  ID: Monday_Night

  Next auto run starts on Jul 13, 2015 22:00:00

  ```


  先前的 `exachk` 报告将保存在启动 `exachk` 守护进程的目录中（通常是 `/opt/oracle.SupportTools/exachk`）。当计划了自动运行时，发送的电子邮件通知会将当前运行与上一次进行比较。电子邮件将给出通过、失败和跳过的检查项数量，以及运行之间的对比。同时，还会创建一份详细说明两次运行之间差异的报告，并在电子邮件中引用。如果需要进一步调查，必须从服务器下载此报告。


  ## 总结


  最佳实践并非一旦写就便一成不变的静态建议。Oracle 明白，从这个角度看，Exadata 是一个不断发展的目标。无论是由于开发出了更强大的硬件和软件而导致建议改变，还是由于发现了现有软件的问题，用于验证环境的工具也必须随之改变。虽然它肯定不是一个能在每个问题发生前就将其捕获的工具，但
  `exachk` 能够利用 Exadata 标准化的特性，运行大量验证检查，而这些检查如果是在自建系统上开发，将需要数月时间。




