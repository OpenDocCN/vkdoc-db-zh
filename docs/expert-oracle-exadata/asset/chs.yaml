  \n#### 在数据库层\n\n直到 Oracle Database 12c，数据库都没有真正提供太多关于闪存缓存如何使用的可见信息。更糟糕的是，在 11.2.0.3\
  \ 版本中，没有指标能够区分对（回写）闪存缓存的写入和读取——一切都混在一起。Oracle 12.1.0.2.x 提供了最多的信息，11.2.0.4 紧随其后，尽管本节中您将读到的大部分内容仅适用于\
  \ 12.1.0.2。\n\n您可以查询数据库的以下位置以获取有关闪存使用的信息：\n\n*   会话统计信息，见于`v$mystat`、`v$sesstat`及相关视图\n\
  *   `V$CELL%`系列动态性能视图\n*   AWR 报告\n\n这些将在以下各节中讨论。\n\n\n\n#### 与闪存缓存相关的性能计数器\n\n\
  性能计数器在第 11 章有详细介绍，但在此简要列出很重要，以便您对 Exadata 平台上闪存存储性能监控有一个基本了解。如果您需要关于这些计数器或相关计数器的更多信息，请翻阅第\
  \ 11 章。\n\n在引入写回闪存缓存之前，真正可用于闪存缓存使用或效率的统计信息只有几个：`cell flash cache read hits`以及两个与物理\
  \ I/O 相关的统计信息，即`physical read requests optimized`和密切相关的`physical read total bytes\
  \ optimized`。后两者可能有点误导，因为优化的 I/O 请求可能因为（a）I/O 请求受益于存储索引，或（b）从闪存缓存提供服务而被优化。存储索引节省和闪存优势都归入同一个物理\
  \ I/O 统计中。如果您的查询只能利用闪存缓存，则该统计信息是相关的。这里有一个例子。会话 264 中的用户执行了以下语句：\n\n```\nSQL> select\
  \ /* fctest001 */ count(*) from SOE.ORDER_ITEMS where order_id < 0;\nCOUNT(*)\n\
  ----------\n0\nElapsed: 00:00:16.45\n```\n\n性能分析师从实例范围的`v$sesstat`性能视图中筛选了以下统计信息：\n\
  \n```\nSQL> select sid, name, value from v$sesstat natural join v$statname\n  2\
  \  where sid = 264\n  3  and name in (\n  4    'cell flash cache read hits',\n \
  \ 5    'cell overwrites in flash cache',\n  6    'cell partial writes in flash cache',\n\
  \  7    'cell physical IO bytes saved by storage index',\n  8    'cell writes to\
  \ flash cache',\n  9    'physical read IO requests',\n 10    'physical read requests\
  \ optimized',\n 11    'physical read total bytes optimized',\n 12    'physical write\
  \ requests optimized',\n 13    'physical write total bytes optimized')\n 14  order\
  \ by name;\nSID NAME                                                           \
  \       VALUE\n---------- ----------------------------------------------------------------\
  \ ----------\n264 cell flash cache read hits                                   \
  \           5895\n264 cell overwrites in flash cache                           \
  \                  0\n264 cell partial writes in flash cache                   \
  \                      0\n264 cell physical IO bytes saved by storage index    \
  \                          0\n264 cell writes to flash cache                   \
  \                              0\n264 physical read IO requests                \
  \                               6042\n264 physical read requests optimized     \
  \                                   5895\n264 physical read total bytes optimized\
  \                                 810237952\n264 physical write requests optimized\
  \                                          0\n264 physical write total bytes optimized\
  \                                       0\n10 rows selected.\n```\n\n请忽略写统计信息是统计名称列表一部分的事实——该脚本是通用的，可用于查询前台和后台进程。从输出可以看出，查询的执行没有受益于存储索引，这就是为什么`cell\
  \ physical IO bytes saved by storage index`统计信息未填充的原因。然而，从其他 I/O 统计信息中，您可以推导出，在\
  \ 6042 个物理读 I/O 请求中，有 5895 个（约 97%）的 I/O 请求是从闪存缓存中提供服务的。如果您回顾一下查看语句，您可以看到它查询来自 Swingbench\
  \ 套件一部分的`SOE`模式的数据。如果您之前使用过 Swingbench，您会知道 Swingbench 模拟基于大量索引的联机事务处理风格工作负载。实际上，使用`fsx`（查找\
  \ SQL 执行）和`dplan`脚本，您可以看到查询并未被卸载：\n\n```\nSQL> @fsx4.sql\nEnter value for sql_text:\
  \ %fctest001%\nEnter value for sql_id:\n```\n\n\n"
