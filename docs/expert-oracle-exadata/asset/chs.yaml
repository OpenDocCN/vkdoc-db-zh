  在这里，你可以看到 `make_cellboot_usb` 脚本复制了恢复存储单元所需的所有存储单元软件 (`cellbits`) 和配置文件 (`lastGoodConfig`)。最后，你会看到
  Grub 引导加载程序被安装到了 USB 驱动器上，这样你就可以从它启动系统了。脚本完成后，你可以从系统上移除外接 USB 磁盘。这个救援盘以后可以在需要时用来将你的存储单元恢复到工作状态。


  #### 备份数据库


  Exadata 在容量和性能上代表了一次飞跃。就在几年前，大型数据库还以千兆字节来描述。如今，以太字节为单位的数据库已很常见。就在不久之前，一个包含数千万行的表被认为是非常巨大的。如今，我们通常会看到包含数百亿行的表。这一趋势清楚地表明，我们很快将看到以艾字节为单位的数据库。正如你可能想象的那样，这给备份和恢复带来了一些独特的挑战。备份
  Exadata 数据库的工具并未发生根本性变化，而在合理时间内完成备份的需求却变得越来越难以实现。我们将在这里讨论的一些策略并非全新；然而，我们将探讨如何利用平台的速度，使备份性能能够跟上数据库数据量不断增长的步伐。


  #### 基于磁盘的备份


  Oracle 10g 为我们引入了一项名为 `闪回恢复区` 的新特性，它扩展了 `恢复管理器` 管理备份的结构化方法。最近，该特性已更名为 `快速恢复区` (`FRA`)。`FRA`
  是一个存储区域，与其他数据库存储非常相似。它可以在原始设备、块设备、文件系统以及 `ASM` 上创建。由于 `FRA` 利用了基于磁盘的存储，它为数据库恢复提供了一种非常快速的存储介质。在使用
  Exadata 的高性能存储架构时尤其如此。无需从磁带检索备份可以节省数小时甚至数天的时间来恢复数据库。而且，由于 `FRA` 是数据库的扩展，Oracle 会自动为你管理该空间。当
  `FRA` 中的文件备份到磁带时，它们不会立即被删除。相反，只要有足够的可用空间，它们就会保持在线状态。当需要更多空间时，数据库会（以 FIFO 方式）删除足够多的这些文件以提供所需的空间。




  该请求因被视为高风险而被拒绝。



  #### 等待事件


  有两个与 Exadata 特定相关的等待事件，它们由 Exadata 平台上的数据库备份和恢复操作触发：`cell smart incremental backup`
  和 `cell smart restore from backup`。这些等待事件在第 10 章中有更详细的介绍。


  - `cell smart incremental backup`：当 Exadata 将增量备份处理卸载到存储单元时，会发生此等待事件。`V$SESSION_WAIT`
  视图的 P1 列包含单元哈希号。此哈希值可用于比较每个存储单元的相对备份性能，并确定是否存在性能问题。

  - `cell smart restore from backup`：当 Exadata 在恢复操作期间将初始化文件的任务卸载到存储单元时，会发生此等待事件。`V$SESSION_WAIT`
  的 P1 列包含单元哈希号。此哈希值可用于比较每个存储单元的相对恢复性能，并确定是否存在性能问题。


  ## 恢复 Exadata


  本节更合适的标题可能是“当系统出错时”。毕竟，通常正是在那个时候，我们才意识到自己在系统恢复方面的实践经验是多么匮乏。随着企业界不断榨取我们工作周中每一滴高效产出，数据库管理员和系统管理员即使不是全部，也大部分清醒时间（有时甚至是睡眠时间）都花在了“维持系统运转”上。因此，实际上，练习系统恢复往往被视为那个众所周知的“受气包”——很少被想起，也极少被关注。即使我们发现自己处于令人羡慕的有时间练习系统恢复的境地，也很难有备用设备可供练习。所以，如果你正在阅读本节而系统并未真正出故障，那值得称赞。在本节中，我们将讨论如何使用本章前面“备份
  Exadata”部分介绍的备份方法来进行 Exadata 系统恢复。


  ### 恢复数据库服务器


  备份和恢复数据库服务器可以使用第三方备份软件完成，也可以使用熟悉的命令（如 `tar` 和 `zip`）通过自定义脚本完成。Linux 逻辑卷管理器 (`LVM`)
  提供了通过快照备份数据库服务器的能力，以创建基于时间点的、基于 `tar` 的备份集。恢复 Exadata 数据库服务器的过程是一个非常结构化的过程，且特定于
  Exadata。在本节中，我们将逐步介绍此过程，并假设备份是使用本章前面讨论的备份过程创建的。因此，如果你尚未阅读本章的该部分内容，可能需要在继续之前查看一下。


  **注意**


  在执行本节列出的任何恢复步骤之前，最好先向 Oracle 支持部门提交服务请求。此处描述的许多工具都需要密码或协助，而这通常只能由 Oracle 的支持组织提供。这些步骤应仅作为最后手段来执行。


  #### 使用基于 LVM 快照的备份映像进行恢复


  使用本章前面讨论的 `LVM` 快照备份过程来恢复数据库服务器是一个相当直接的过程。我们在此过程中使用的备份映像 `backup.tar.bz2`，是本章前面创建的，包含了
  `/`、`/boot` 和 `/u01` 文件系统。你需要做的第一件事是将备份映像放置在故障数据库服务器可以挂载的 `NFS` 文件系统上。然后，从所有 Exadata
  服务器上包含的特殊诊断 `ISO` 启动映像启动服务器。当系统从诊断 `ISO` 启动时，你将逐步收到恢复过程的提示。让我们看看从本章前面获取的基于 `LVM`
  快照的备份中恢复故障数据库服务器的基本步骤：


  1.  将 `LVM` 快照备份映像放置在故障服务器可通过 `IP` 地址访问的 `NFS` 共享文件系统上。我们将要操作的文件名为 `backup.tar.bz2`。

  2.  通过 `ILOM` 远程控制台，将 `/opt/oracle.SupportTools/diagnostics.iso` 启动映像（从一台正常运行的服务器获取）附加到故障服务器。

  3.  重新启动故障服务器，并选择 `CD-ROM` 作为启动设备。当系统从诊断 `ISO` 启动时，它将进入特殊的服务器恢复过程。

  4.  从此时起，恢复过程将包含分步指导。例如，以下过程从备份映像 `backup.tar.bz2` 恢复数据库服务器。提示的答案以 _ 粗斜体 _ 显示：


  ```

  Choose from following by typing letter in ’()’:

  (e)nter interactive diagnostics shell. Must use credentials from Oracle support
  to login (reboot or power cycle to exit the shell),

  (r)estore system from NFS backup archive,

  Select: r

  Are you sure (y/n) [n]: y

  The backup file could be created either from LVM or non-LVM based compute node.
  Versions below 11.2.1.3.1 and 11.2.2.1.0 or higher do not support LVM based partitioning.
  Use LVM based scheme(y/n): y

  Enter path to the backup file on the NFS server in format:

  <ip_address_of_the_NFS_share>:/<path>/:<archive_file>

  For example, 10.10.10.10:/export/:operating_system.tar.bz2

  NFS line: 10.160.242.200:/export/:backup.tar.bz2

  IP Address of this host: 10.160.242.170

  Netmask of this host: 255.255.255.0

  Default gateway: 10.160.242.1

  ```

  5.  当所有上述信息输入后，Exadata 将继续通过网络挂载备份映像并恢复系统。恢复完成后，系统将提示你登录。使用 Oracle 文档中提供的密码以 `root`
  身份登录。

  6.  从 `ILOM` 分离诊断 `ISO`。

  7.  使用 `reboot` 命令重新启动系统。此时，故障服务器应已完全恢复。


  系统启动完成后，你可以使用 `imagehistory` 命令验证恢复情况。以下列表显示该映像作为 `restore from nfs backup` 创建并且已成功完成：


  ```

  [enkdb01:oracle:EXDB1] /home/oracle

  > su -

  Password:

  [enkdb01:root] /root

  > imagehistory

  Version                              : 11.2.1.2.3

  Image activation date                : 2010-05-15 05:58:56 -0700

  Imaging mode                         : fresh

  Imaging status                       : success

  ...

  Version                              : 11.2.2.2.0.101206.2

  Image activation date                : 2010-12-17 11:51:53 -0600

  Imaging mode                         : patch

  Imaging status                       : success

  Version                              : 11.2.2.2.0.101206.2

  Image activation date                : 2010-01-23 15:23:05 -0600

  Imaging mode                         : restore from nfs backup

  Imaging status                       : success

  ```


  一般来说，在定制 Exadata 数据库服务器时最好不要过于标新立异。Oracle 允许你为数据库服务器创建新的 `LVM` 分区并添加文件系统，但如果你这样做，你的恢复将需要一些额外的步骤。这些步骤并不特别困难，但如果你选择自定义
  `LVM` 分区，请准备好将更改记录在某处，并熟悉 Oracle 文档中针对自定义系统的恢复过程。此外，Oracle 提供的脚本不会感知到文件系统布局的自定义更改。这可能会在运行这些脚本时导致意外结果——特别是
  Exadata 文档中提供的 `LVM` 备份脚本。




  #### 重建数据库服务器


  如果必须更换或从头重建数据库服务器，且没有备份镜像可供恢复，则可以使用 Oracle 支持部门提供的安装镜像来创建一个镜像。这是一个漫长且高度复杂的过程，但我们会在此介绍主要步骤，以便您对其有个大致了解。


  在重建服务器之前，必须先将其从 RAC 集群中移除。这是从任何 11gR2 或 12cR1 RAC 集群中删除节点的标准流程。首先，必须关闭并禁用故障服务器上的监听程序。然后，从
  Oracle 清单中删除数据库二进制文件的 `ORACLE_HOME`。接着，停止 VIP 并将其从集群配置中删除，最后从集群中删除该节点。最后，从 Oracle
  清单中删除网格基础设施的 `ORACLE_HOME`。


  Oracle 软件交付云（原 e-Delivery）托管着一个 `computeImageMaker` 文件，该文件用于从一台幸存的数据库服务器创建安装镜像。这个镜像制作文件特定于您的
  Exadata 系统的版本和平台，命名如下：


  ```

  `computeImageMaker_` `{exadata_release}` `_LINUX.X64_` `{release_date}`. `{platform}`
  `.tar`

  ```


  使用外部 USB 闪存驱动器在故障服务器上启动恢复镜像。USB 驱动器不需要很大，一个 2-4GB 的 U 盘即可。下一步是在机架中的另一台 Exadata 数据库服务器上，解压您从
  Oracle 支持下载的镜像制作文件。存储单元的类似恢复过程会使用系统找到的第一个 USB 驱动器，因此在继续操作之前，您应该从系统中移除所有其他外部 USB
  设备。要为恢复故障数据库服务器创建可启动的系统镜像，您需要运行 `makeImageMedia.sh` 脚本。当 `makeImageMedia.sh` 脚本完成后，您就可以在故障服务器上安装镜像了。将
  USB 驱动器从完好的服务器上拔下，插入故障服务器。登录到故障服务器的 ILOM 并重启它。服务器启动时，会自动在外部 USB 驱动器上找到可启动的恢复镜像，并开始重建过程。此后，过程是自动化的。首先，它会检查服务器上的固件和
  BIOS 版本，并根据需要将其更新到与其他数据库服务器匹配的版本。如果您重建的服务器原本就是 Exadata 系统的一部分，则不必期望此步骤会执行任何操作，但如果损坏的服务器已被新设备替换，则此步骤是必要的。一旦硬件组件更新完毕，将安装新的镜像。重建过程完成后，您可以拔下外部
  USB 驱动器，并对服务器进行电源循环以启动新的系统镜像。


  重建过程完成且数据库服务器重新上线后，它将被设置为出厂默认值。无论如何，您都应该将重建后的服务器视为一台全新的服务器。服务器将进入首次启动 (`firstboot`)
  过程，期间会询问您完成安装所需的任何相关网络信息，包括主机名、IP 地址、DNS 和 NTP 服务器。操作系统配置完成后，您需要重新安装网格基础设施和数据库软件，并将该节点重新添加到集群中。这是一个记录完善的过程，许多
  RAC DBA 称之为“添加节点”程序。如果您不熟悉此过程，请放心——它远没有您想象的那么令人生畏或耗时。一旦操作系统准备好进行安装，Oracle 安装程序会为您完成大部分繁重的工作。《Exadata
  用户指南》出色地引导您完成此过程的每一步。


  #### 恢复存储单元


  存储单元恢复是一个非常广泛的主题。它可能像更换一个性能低下或故障的数据磁盘一样简单，也可能像应对主板芯片故障等导致的全系统故障一样复杂。在本节中，我们将讨论各种类型的单元恢复，包括物理磁盘的拆卸和更换，以及故障的闪存缓存模块。我们还将讨论如果整个存储单元死亡且必须更换时该怎么办。


  #### 系统卷故障


  回想一下，存储单元中的前两个磁盘包含 Linux 操作系统，通常被称为“系统卷”。Exadata 通过 Linux 操作系统使用软件镜像来保护这些卷。尽管如此，某些情况可能需要您从备份中恢复这些磁盘。执行单元恢复的一些原因如下：


  *   系统卷（磁盘 1 和 2）同时故障。

  *   启动分区损坏到无法修复的程度。

  *   文件系统损坏。

  *   补丁安装或升级失败。


  如果您遇到以上任何一种情况，从备份恢复系统卷可能是必要的，或者至少是更便捷的方法。如前所述，Exadata 使用一个名为 `CELLBOOT` USB 闪存驱动器的
  4GB 内部 USB 闪存驱动器，自动维护最后一个良好启动配置的备份。使用这个内部 USB 闪存磁盘恢复系统卷通常被称为存储单元救援程序。执行单元救援程序的步骤基本上涉及从内部
  USB 驱动器启动，并按照提示选择您想要执行的救援类型。顺便提一下，由于 Exadata 配备了集成的远程管理模块 (`ILOM`)，您可以跨网络远程执行所有单元恢复操作，无需站在机架前从内部
  USB 闪存磁盘执行完整的单元恢复。


  注意


  为了对 USB 恢复介质进行完整性检查，每个 Exadata 存储单元都被配置为使用 USB 设备作为其主要启动介质。单元将利用安装在 USB 恢复介质上的引导加载程序，该程序然后指回系统卷。如果
  USB 恢复介质不可用，单元将回退到从系统卷启动，并生成一个关于 USB 恢复介质不存在或已损坏的警报。


  本节并非存储单元恢复的分步指南，因此我们不会深入探讨从 `CELLBOOT` USB 闪存磁盘恢复的所有细节。应参考 Oracle 文档获取详细信息，但我们会探讨在开始此类恢复之前需要考虑的事项。


  *   单元磁盘和网格磁盘：救援程序仅恢复 Linux 系统卷。单元磁盘及其内容不会被救援程序恢复。如果这些分区损坏，必须先删除再重新创建。一旦网格磁盘上线，就可以将它们添加回
  ASM 磁盘组，随后的重平衡操作将恢复数据。

  *   `ASM` 冗余：从 USB 备份恢复存储单元可能会导致系统卷上的所有数据丢失。这包括这些磁盘驱动器上网格磁盘中的数据库数据。如果您的 `ASM` 磁盘组使用普通冗余，我们强烈建议在执行
  USB 磁盘单元恢复之前进行数据库备份。使用 `ASM` 高冗余时，您总共有三份数据副本，因此无需进行数据库备份即可安全地执行单元恢复。即便如此，如果可能，我们仍然建议进行备份。恢复过程不会破坏数据卷（单元/网格磁盘），除非您在救援程序提示时明确选择这样做。

  *   软件和补丁：救援程序将使单元恢复到执行备份时的状态，包括补丁。恢复中还包括网络设置以及 `root`、`celladmin` 和 `cellmonitor`
  帐户的 `SSH` 密钥。




  '
- '# 单元救援选项


  要访问单元救援选项，需通过带外管理卡连接到虚拟控制台并重启单元。当屏幕上出现 `grub` 菜单时，按任意键调出引导选项。您将看到存储单元上系统磁盘对的几个不同选项。


  可以通过最终选项 `CELL_USB_BOOT_CELLBOOT_usb:in_rescue_mode` 访问 `CELLBOOT` USB 设备。从 `CELLBOOT`
  USB 设备引导后，您有两个初始的恢复选项：进入救援 `shell` 或重新映像存储服务器。如果只需要恢复少数文件，或者可以通过命令行解决故障，救援 `shell`
  会很有帮助。通常情况下，您需要重新映像单元。虽然这听起来像是一个极端的选项，但 `Oracle` 已确保对重建操作系统至关重要的所有内容都已备份。这意味着您无需输入
  `IP` 地址、主机名或重置 `root` 密码。


  选择重新映像存储单元后，系统会询问您是否要擦除所有数据分区和磁盘。此决定取决于您需要执行的恢复类型。


  *   **擦除数据分区和数据磁盘**：如果选择此选项，重新映像过程将删除系统磁盘上的分区，并从非系统磁盘中移除单元磁盘元数据。这将使存储单元处于具有重新映像的操作系统且存储服务器配置中无单元磁盘的状态。

  *   **不擦除数据分区和数据磁盘**：存储单元仍将被重新映像，但只有系统卷分区会受到影响。此选项保留所有单元磁盘元数据完整，这意味着各个单元磁盘仍然可用，并包含重新映像前其上的所有数据。单元磁盘仍需导入，但这可以通过在
  `CellCLI` 中使用一条简单的 `import celldisk all force` 命令完成。如果该单元的 `ASM` 磁盘尚未从 `ASM` 磁盘组中删除，此选项很有价值。导入单元磁盘将避免需要进行
  `I/O` 密集型的重平衡操作。


  那么，如果由于某种原因，内部的 `CELLBOOT` `USB` 闪存盘无法用于救援过程，会发生什么？如果发生这种情况，您可以遵循计算节点重新映像过程，并从 `Oracle
  Software Delivery Cloud` 下载存储单元映像制作软件。创建一个可引导的 `USB` 设备并使用它来引导存储单元。请记住，您需要输入特定于该单元的所有网络信息，因为您使用的映像不包含此数据。所有单元磁盘和网格磁盘也需要重新创建。希望这种情况永远不会发生，因为存储单元会执行持续的验证检查。较新版本的
  `Exadata Storage Server` 软件包含对 `CELLBOOT` `USB` 设备的定期检查，如果设备损坏，将自动重建该设备。


  '
- '# 单元磁盘故障


  `ASM` 通过其冗余故障组技术处理单元磁盘的临时或永久丢失。因此，只要磁盘组定义为普通冗余，丢失一个单元磁盘就不会对数据库造成任何中断。如果使用高冗余，磁盘组可以承受同一故障组内两个单元磁盘同时丢失。回想一下，在
  `Exadata` 上，每个存储单元构成一个独立的故障组。这意味着，使用普通冗余时，您可以丢失整个存储单元（12 个单元磁盘）而不会影响您的数据库。使用高冗余时，您可以同时丢失两个存储单元，而您的数据库将继续为客户端提供服务而不中断。这相当令人印象深刻。然而，冗余并不便宜。例如，考虑一个具有
  30 `TB` 原始空间（配置为外部冗余）的磁盘组。使用普通冗余时，这 30 `TB` 变为 15 `TB` 的可用空间。使用高冗余时，它变为 10 `TB`
  的可用存储空间。还要记住，除非不可用，否则数据库通常会读取数据的主副本。在 `Oracle 12c` 上，磁盘故障将启用均衡读取功能，该功能将读取负载最轻的磁盘，无论其包含的是主副本还是镜像副本。普通和高冗余不提供性能优势。它们严格用于容错。关键在于选择一个在弹性和预算之间取得平衡的冗余级别。


  ## 模拟磁盘故障


  在本节中，我们将测试当一个单元磁盘发生故障时会发生什么。用于这些测试的系统是一个四分之一机架的 Exadata V2。我们创建了一个名为 `SCRATCH_DG`
  的磁盘组，定义如下：


  ```

  SYS:+ASM2> CREATE DISKGROUP SCRATCH_DG NORMAL REDUNDANCY

  FAILGROUP CELL01 DISK ’o/192.168.12.3/SCRATCH_DG_CD_05_cell01’

  FAILGROUP CELL02 DISK ’o/192.168.12.4/SCRATCH_DG_CD_05_cell02’

  FAILGROUP CELL03 DISK ’o/192.168.12.5/SCRATCH_DG_CD_05_cell03’

  attribute ’compatible.rdbms’=’12.1.0.2.0’,

  ’compatible.asm’  =’12.1.0.2.0’,

  ’au_size’=’4M’,

  ’cell.smart_scan_capable’=’true’;

  ```


  请注意，该磁盘组是使用三个网格磁盘创建的。遵循 Exadata 最佳实践，我们从每个存储单元中使用了一个网格磁盘。有趣的是，即使我们没有在三个故障组中各指定一个磁盘，ASM
  也会自动完成此操作。然后，我们使用这个磁盘组创建了一个名为 `SCRATCH` 的小型单实例数据库。该磁盘组配置为普通冗余（每个数据块有两个镜像副本），这意味着我们的数据库应该能够承受丢失一个网格磁盘而不丢失对数据的访问或导致崩溃。由于每个网格磁盘都位于单独的存储单元上，我们甚至可以承受整个存储单元丢失而不丢失数据。我们将在本章后面讨论存储单元故障时会发生什么。


  稍后，我们将看看从存储单元中移除网格磁盘（模拟磁盘故障）时会发生什么。但在这样做之前，我们需要做几件事：


  -   验证没有再平衡或其他卷管理操作正在运行

  -   确保 `SCRATCH_DG` 磁盘组的所有网格磁盘都处于联机状态

  -   验证使磁盘脱机不会影响数据库操作

  -   检查磁盘修复计时器，以确保磁盘在我们能将其重新联机之前不会被自动丢弃


  有几种方法可以验证卷管理活动没有进行。首先，让我们使用 `asmcmd` 检查磁盘组的当前状态。`ls –l` 命令显示磁盘组、冗余类型以及当前是否正在进行再平衡操作。顺便说一下，您也可以使用
  `lsdg` 命令获取此信息，该命令还包括其他有用信息，如空间利用率、联机/脱机状态等。以下列表中的 `Rebal` 列表明当前没有正在执行的再平衡操作。


  ```

  > asmcmd -p

  ASMCMD [+] > ls -l

  State    Type    Rebal  Name

  MOUNTED  NORMAL  N      DATA_DG/

  MOUNTED  NORMAL  N      RECO_DG/

  MOUNTED  NORMAL  N      SCRATCH_DG/

  MOUNTED  NORMAL  N      STAGE_DG/

  MOUNTED  NORMAL  N      SYSTEM_DG/

  ```


  请注意，并非所有卷管理操作都会在 `asmcmd` 命令中显示。如果某个网格磁盘已脱机一段时间，为了使其保持最新状态，可能有大量积压数据需要复制到其上。根据数据量大小，重新同步一个磁盘可能需要几分钟才能完成。尽管此操作与维护所有磁盘间的平衡直接相关，但从技术上讲，它并不是一个“再平衡”操作。因此，它不会出现在列表中。例如，即使前面列表中的
  `ls –l` 命令显示再平衡操作的状态为 `N`，通过运行下一个查询，您可以清楚地看到有一个磁盘当前正在被联机：


  ```

  SYS:+ASM2> select dg.name "Diskgroup", disk.name, disk.failgroup, disk.mode_status

  from v$asm_disk disk,

  v$asm_diskgroup dg

  where dg.group_number = disk.group_number

  and disk.mode_status <> ’ONLINE’;

  Diskgroup         NAME                       FAILGROUP  MODE_ST

  ----------------- ------------------------------ -------  -------

  SCRATCH_DG        SCRATCH_CD_05_CELL01        CELL01     SYNCING

  ```



  检查磁盘的在线/离线状态，只需在 SQL*Plus 中运行以下查询即可轻松完成。在下面的列表中，您可以看到 `SCRATCH_CD_05_CELL01` 磁盘因其
  `MOUNT_STATUS` 为 `MISSING` 且 `HEADER_STATUS` 为 `UNKNOWN` 而处于离线状态：


  ```

  SYS:+ASM2> select d.name, d.MOUNT_STATUS, d.HEADER_STATUS, d.STATE

  from v$asm_disk d

  where d.name like ''SCRATCH%''

  order by 1;

  NAME                                         MOUNT_S HEADER_STATU STATE

  -------------------------------------------------- ------- ------------ ----------

  SCRATCH_CD_05_CELL01                         MISSING UNKNOWN      NORMAL

  SCRATCH_CD_05_CELL02                         CACHED  MEMBER       NORMAL

  SCRATCH_CD_05_CELL03                         CACHED  MEMBER       NORMAL

  ```


  不过，检查 `SCRATCH_DG` 磁盘组中所有磁盘状态的一个更好方法可能是查看 `V$ASM_DISK_STAT` 中的 `mode_status`。下面的列表显示
  `SCRATCH_DG` 磁盘组中的所有网格磁盘都处于在线状态：


  ```

  SYS:+ASM2> select name, mode_status from v$asm_disk_stat where name like ''SCRATCH%'';

  NAME                                         MODE_ST

  -------------------------------------------------- -------

  SCRATCH_CD_05_CELL03                         ONLINE

  SCRATCH_CD_05_CELL01                         ONLINE

  SCRATCH_CD_05_CELL02                         ONLINE

  ```


  接下来我们要看的是磁盘修复计时器。回想一下，磁盘组属性 `disk_repair_time` 决定了当发生读/写错误时，ASM 在将磁盘从磁盘组中永久移除并将数据重新平衡到幸存的网格磁盘之前会等待多长时间。在将磁盘置于离线状态之前，我们应该检查这个计时器，以确保在
  ASM 自动删除磁盘之前，我们有足够的时间将磁盘重新恢复在线。可以使用 SQL*Plus 运行以下查询来显示此属性。（顺便说一下，无论您连接到 ASM 实例还是数据库实例，`V$ASM`
  视图都是可见的。）


  ```

  SYS:+ASM2> select dg.name "DiskGroup",

  attr.name,

  attr.value

  from v$asm_diskgroup dg,

  v$asm_attribute attr

  where dg.group_number = attr.group_number

  and attr.name like ''%repair_time'';

  DiskGroup         NAME                      VALUE

  ----------------- ------------------------- ----------

  DATA_DG           disk_repair_time          3.6h

  DATA_DG           failgroup_repair_time     24.0h

  DBFS_DG           disk_repair_time          3.6h

  DBFS_DG           failgroup_repair_time     24.0h

  RECO_DG           disk_repair_time          3.6h

  RECO_DG           failgroup_repair_time     24.0h

  SCRATCH_DG        disk_repair_time          8.5h

  SCRATCH_DG        failgroup_repair_time     24h

  STAGE_DG          disk_repair_time          72h

  STAGE_DG          failgroup_repair_time     24h

  ```


  磁盘修复计时器的默认值是 3.6 小时。由于此查询是在运行 Oracle 12c 的集群上执行的，因此还有一个 `failgroup_repair_time`
  属性。这是指在发生整个故障组丢失的情况下，在删除磁盘之前将花费的时间。这在硬件故障波及整个存储单元时非常有用。这些属性在存储单元重启或磁盘暂时离线时生效，但在极少数情况下，当发生实际的硬件故障时，它们也可能自发触发。有时，只需将磁盘从机箱中拔出再重新插入，就能清除意外的瞬时错误。任何通常应写入故障磁盘的数据都会排队等待，直到磁盘恢复在线或磁盘修复时间过期。如果
  ASM 删除了磁盘，可以手动将其添加回磁盘组，但这需要进行一次完整的重新平衡操作，这可能是一个漫长的过程。以下命令用于将 `SCRATCH_DG` 磁盘组的磁盘修复计时器设置为
  8.5 小时：




  `SYS:+ASM2> alter diskgroup SCRATCH_DG set attribute ''disk_repair_time''=''8.5h'';`


  现在，我们来验证将一个单元磁盘离线是否会影响磁盘组的可用性。我们可以通过检查网格磁盘的 `asmdeactivationoutcome` 和 `asmmodestatus`
  属性来做到这一点。例如，下面的列表显示了当正常冗余磁盘组中的一个网格磁盘被离线时，`LIST GRIDDISK` 命令的输出。在此示例中，我们有一个 `SCRATCH_DG`
  磁盘组，它由来自三个故障组（`enkcel01`、`enkcel02` 和 `enkcel03`）的各一个网格磁盘组成。首先，我们检查所有磁盘都处于活动状态时网格磁盘的状态：


  ```

  [enkdb02:root] /root

  > dcli -g cell_group -l root " cellcli -e list griddisk \

  attributes name, asmdeactivationoutcome, asmmodestatus " | grep SCRATCH

  enkcel01: SCRATCH_DG_CD_05_cell01   Yes     ONLINE

  enkcel02: SCRATCH_DG_CD_05_cell02   Yes     ONLINE

  enkcel03: SCRATCH_DG_CD_05_cell03   Yes     ONLINE

  ```


  现在，我们将在存储单元上停用其中一个网格磁盘，并再次运行该命令：


  ```

  CellCLI> alter griddisk SCRATCH_DG_CD_05_cell01 inactive

  GridDisk SCRATCH_DG_CD_05_cell01 successfully altered


  [enkdb02:root] /root

  > dcli -g cell_group -l root " cellcli -e list griddisk \

  attributes name, asmdeactivationoutcome, asmmodestatus " | grep SCRATCH

  enkcel01: SCRATCH_DG_CD_05_cell01   Yes     OFFLINE

  enkcel02: SCRATCH_DG_CD_05_cell02   "Cannot de-activate due to other offline disks
  in the diskgroup"        ONLINE

  enkcel03: SCRATCH_DG_CD_05_cell03   "Cannot de-activate due to other offline disks
  in the diskgroup"        ONLINE

  ```


  如你所见，已离线的网格磁盘的 `asmmodestatus` 属性现在被设为 `OFFLINE`，而磁盘组中另外两个磁盘的 `asmdeactivationoutcome`
  属性则警告我们，这些网格磁盘无法被离线。这样做会导致 ASM 卸载 `SCRATCH_DG` 磁盘组。


  注意：我们使用 `dcli` 命令在存储网格的每个单元上运行 `CellCLI` 命令 `LIST GRIDDISK ATTRIBUTES`。基本上，`dcli`
  允许我们在多个节点上并发地运行一个命令。`cell_group` 参数是一个文件，其中包含所有存储单元的列表。


  如果 `LIST GRIDDISK` 命令的输出表明这样做是安全的，我们可以测试将 `SCRATCH_DG` 磁盘组的一个网格磁盘离线时会发生什么。对于此测试，我们将从存储单元机箱中物理移除磁盘驱动器。测试配置将如下所示：


  *   为此测试，我们将创建一个包含一个数据文件的新表空间。该数据文件设置为 `autoextend`，以便随着数据加载而增长到磁盘组中。

  *   接下来，我们将通过创建一个大表在该表空间中生成大量数据；从 `DBA_SEGMENTS` 中生成几十亿行数据应该就够了。

  *   在将数据加载到大表的过程中，我们将从单元机箱中物理移除该磁盘。

  *   数据加载完成后，我们将重新安装磁盘，并观察 Exadata 自动磁盘恢复的过程。


  首要任务是确定磁盘驱动器在存储单元中的位置。为此，我们将使用网格磁盘名称来查找其所在的单元磁盘。然后，我们将使用单元磁盘名称来查找该磁盘驱动器在存储单元内的插槽地址。一旦获得插槽地址，我们将在前面板上点亮服务
  LED，以便知道要移除哪块磁盘。


  在存储单元 3 上，我们可以使用 `LIST GRIDDISK` 命令来查找我们寻找的单元磁盘名称：


  ```

  CellCLI> list griddisk attributes name, celldisk where name like ''SCRATCH.*'' detail

  name:                   SCRATCH_DG_CD_05_cell03

  cellDisk:               CD_05_cell03

  ```


  现在我们有了单元磁盘名称，可以使用 `LIST LUN` 命令来查找我们要移除的物理磁盘的插槽地址。在下面的列表中，我们看到了寻找的插槽地址：16:5。




  '
- "# 定位并更换故障磁盘\n\n`CellCLI> list LUN attributes celldisk, physicaldrives where celldisk=CD_05_cell03\
  \ detail`\n\n`cellDisk:               CD_05_cell03`\n`physicalDrives:         16:5`\n\
  \n通过槽位地址，我们可以使用 `MegaCli64` 命令来激活存储单元前面板上磁盘驱动器的服务 LED。请注意，下面 `MegaCli64` 命令中的 `\\\
  ` 字符用于防止 Bash shell 解释物理驱动器地址周围的括号 (`[]`)。（顺便说一下，单引号也可以起作用。）\n\n```\n/opt/MegaRAID/MegaCli/MegaCli64\
  \ -pdlocate -physdrv \\[16:5\\] -a0\n```\n\n磁盘驱动器前面的琥珀色 LED 应该开始闪烁，如图 9-2 所示。\n\n\
  ![A978-1-4302-6242-8_9_Fig2_HTML.jpg](img/A978-1-4302-6242-8_9_Fig2_HTML.jpg)\n\
  **图 9-2. 磁盘驱动器前面板**\n\n如果你想知道的话，可以使用 `MegaCli64` 命令的 `--stop` 选项来关闭服务 LED，如下所示：\n\
  \n```\n/opt/MegaRAID/MegaCli/MegaCli64 -pdlocate --stop -physdrv \\[16:5\\] -a0\n\
  ```\n\n现在我们已经找到了正确的磁盘，可以通过按下释放按钮并轻轻拉动磁盘前面的拉杆将其从存储单元中移除，如图 9-3 所示。\n\n![A978-1-4302-6242-8_9_Fig3_HTML.jpg](img/A978-1-4302-6242-8_9_Fig3_HTML.jpg)\n\
  **图 9-3. 弹出的磁盘驱动器**\n\n**注意：** 存储单元中的所有磁盘驱动器都是可热插拔的，可以在不关闭存储单元电源的情况下进行更换。\n\n##\
  \ 检查 ASM 磁盘状态\n\n在 `CellCLI` 中检查网格磁盘状态，我们发现它已从 `Active` 更改为 `Inactive`。这使得网格磁盘对\
  \ ASM 存储集群不可用：\n\n```\nCellCLI> list griddisk where name = 'SCRATCH_CD_05_cell03';\n\
  \nSCRATCH_CD_05_cell03    inactive\n```\n\nASM 立即注意到磁盘丢失，将其脱机，并启动磁盘修复计时器。ASM 警告日志\
  \ (`alert_+ASM2.log`) 显示我们大约有 8.5 小时（30596/60/60）的时间将磁盘恢复在线，之后 ASM 会将其从磁盘组中永久移除：\n\
  \n```\nalert_+ASM1.log\n--------------------\nTue Dec 28 08:40:54 2010\nGMON checking\
  \ disk modes for group 5 at 121 for pid 52, osid 29292\nErrors in file /u01/app/oracle/diag/asm/+asm/+ASM2/trace/+ASM2_gmon_5912.trc:\n\
  ORA-27603: Cell storage I/O error, I/O failed on disk o/192.168.12.5/SCRATCH_CD_05_cell03\
  \ at offset 4198400 for data length 4096\nORA-27626: Exadata error: 201 (Generic\
  \ I/O error)\nWARNING: Write Failed. group:5 disk:3 AU:1 offset:4096 size:4096\n\
  ...\nWARNING: Disk SCRATCH_DG_CD_05_CELL03 in mode 0x7f is now being offlined\n\
  WARNING: Disk SCRATCH_DG_CD_05_CELL03 in mode 0x7f is now being taken offline\n\
  ...\nTue Dec 28 08:43:21 2010\nWARNING: Disk (SCRATCH_DG_CD_05_CELL03) will be dropped\
  \ in: (30596) secs on ASM inst: (2)\nTue Dec 28 08:43:23 2010\n```\n\n可以使用以下查询从一个\
  \ ASM 实例查看 ASM 中磁盘的状态。请注意，`SCRATCH` 磁盘组仍然处于挂载（在线）状态：\n\n```\nSYS:+ASM2> select dg.name,\
  \ d.name, dg.state, d.mount_status, d.header_status, d.state\nfrom v$asm_disk d,\n\
  v$asm_diskgroup dg\nwhere dg.name = 'SCRATCH_DG'\nand dg.group_number = d.group_number\n\
  order by 1,2;\n\nNAME          NAME                         STATE      MOUNT_S HEADER_STATU\
  \ STATE\n------------- ---------------------------- ---------- ------- ------------\
  \ ----------\nSCRATCH       SCRATCH_DG_CD_05_CELL01      MOUNTED    CACHED  MEMBER\
  \       NORMAL\nSCRATCH       SCRATCH_DG_CD_05_CELL02      MOUNTED    CACHED  MEMBER\
  \       NORMAL\nSCRATCH       SCRATCH_DG_CD_05_CELL03      MOUNTED    MISSING UNKNOWN\
  \      NORMAL\n```\n\n当磁盘脱机时，ASM 会继续轮询其状态，以查看磁盘是否可用。我们在 ASM 警告日志中看到以下查询在重复：\n\n\
  ```\nalert_+ASM1.log\n--------------------\nWARNING: Exadata Auto Management: OS\
  \ PID: 5918 Operation ID: 3015:   in diskgroup  Failed\nSQL    : /* Exadata Auto\
  \ Mgmt: Select disks in DG that are not ONLINE. */\nselect name from v$asm_disk_stat\n\
  where\nmode_status='OFFLINE'\nand\n```\n\n\n```\ngroup_number in\n(\nselect group_number\
  \ from v$asm_diskgroup_stat\nwhere\nname='SCRATCH_DG'\nand\nstate='MOUNTED'\n)\n\
  ```\n\n我们的测试数据库也检测到了网格磁盘的丢失，这一点可以在数据库告警日志中看到：\n\n`alert_SCRATCH.log`\n\n```\n-----------------------\n\
  Tue Dec 28 08:40:54 2010\nErrors in file /u01/app/oracle/diag/rdbms/scratch/SCRATCH/trace/SCRATCH_ckpt_22529.trc:\n\
  ORA-27603: Cell storage I/O error, I/O failed on disk o/192.168.12.5/SCRATCH_CD_05_cell03\
  \ at offset 26361217024 for data length 16384\nORA-27626: Exadata error: 201 (Generic\
  \ I/O error)\nWARNING: Read Failed. group:5 disk:3 AU:6285 offset:16384 size:16384\n\
  WARNING: failed to read mirror side 1 of virtual extent 0 logical extent 0 of file\
  \ 260 in group [5.1611847437] from disk SCRATCH_CD_05_CELL03  allocation unit 6285\
  \ reason error; if possible, will try another mirror side\nNOTE: successfully read\
  \ mirror side 2 of virtual extent 0 logical extent 1 of file 260 in group [5.1611847437]\
  \ from disk SCRATCH_CD_05_CELL02 allocation unit 224\n...\nTue Dec 28 08:40:54 2010\n\
  NOTE: disk 3 (SCRATCH_CD_05_CELL03) in group 5 (SCRATCH) is offline for reads\n\
  NOTE: disk 3 (SCRATCH_CD_05_CELL03) in group 5 (SCRATCH) is offline for writes\n\
  ```\n\n请注意，数据库会自动切换到镜像副本来读取那些无法从故障网格磁盘读取的数据。这正是 ASM 常规冗余机制在起作用。\n\n当我们重新插入磁盘驱动器后，存储单元会将网格磁盘状态恢复为\
  \ Active（活动），ASM 也会将磁盘重新联机。通过下面的查询，我们可以看到网格磁盘已恢复到 `CACHED` 状态，且 `HEADER_STATUS`\
  \ 为 `NORMAL`：\n\n```\nSYS:+ASM2> select dg.name, d.name, dg.state, d.mount_status,\
  \ d.header_status, d.state\nfrom v$asm_disk d,\nv$asm_diskgroup dg\nwhere dg.name\
  \ = 'SCRATCH'\nand dg.group_number = d.group_number\norder by 1,2;\n\nNAME     \
  \     NAME                      STATE      MOUNT_S HEADER_STATU STATE\n-------------\
  \ ------------------------- ---------- ------- ------------ ----------\nSCRATCH\
  \       SCRATCH_CD_05_CELL01      MOUNTED    CACHED  MEMBER       NORMAL\nSCRATCH\
  \       SCRATCH_CD_05_CELL02      MOUNTED    CACHED  MEMBER       NORMAL\nSCRATCH\
  \       SCRATCH_CD_05_CELL03      MOUNTED    CACHED  MEMBER       NORMAL\n```\n\n\
  ![A978-1-4302-6242-8_9_Figab_HTML.jpg](img/A978-1-4302-6242-8_9_Figab_HTML.jpg)\n\
  \n磁盘组可能需要补写在磁盘离线期间排队等待写入的数据。如果磁盘在 `disk_repair_time` 计时器归零之前被重新插入，磁盘只需补上错过的写入操作即可。否则，整个磁盘组将需要重新平衡，这可能耗费相当长的时间。一般来说，这种延迟不是问题，因为它都在后台发生。在重新同步过程中，ASM\
  \ 冗余机制使我们的数据库能够继续运行，服务不会中断。您可以通过 ASM 中的 `gv$asm_operation` 视图查看重新同步或重新平衡操作的状态。请注意，重新同步操作仅在\
  \ Oracle 12c 及更高版本中可见。\n\n如果这是真实的磁盘故障，并且我们实际更换了磁盘驱动器，我们将需要等待 RAID 控制器确认新磁盘后才能使用。这个过程不会太久，但在使用前您应该检查磁盘状态以确保其状态为正常（Normal）。可以使用\
  \ `CellCLI` 命令 `LIST PHYSICALDISK` 来验证磁盘状态，如下所示：\n\n```\nCellCLI> list physicaldisk\
  \ where diskType=HardDisk AND status=critical detail\n```\n\n当更换磁盘时，存储单元会自动执行以下任务：\n\
  \n*   更新磁盘固件以匹配存储单元中的其他磁盘驱动器。\n*   重新创建单元磁盘，使其与被替换的磁盘匹配。\n*   将新的单元磁盘联机（状态设置为 Normal）。\n\
  *   重新创建故障磁盘上的网格磁盘（或多个网格磁盘）。\n*   将网格磁盘状态设置为 Active。\n\n一旦更换后的网格磁盘被设置为 Active，ASM\
  \ 会自动打开磁盘并开始重新同步过程。Exadata 存储服务器软件会自动处理所有这些任务，使得更换磁盘成为相当轻松的过程。\n\n##### 何时更换单元磁盘\n\
  \n磁盘故障可能突然发生，导致磁盘立即离线；也可能逐渐发生，表现为 I/O 性能下降。存储单元会持续监控磁盘驱动器。这种监控包括驱动器的 I/O 和吞吐量性能，以及\
  \ SMART 指标，如温度、速度和读/写错误。其目标是为可能即将发生故障的磁盘提供早期预警。当存储单元检测到问题时，会生成一个包含具体磁盘更换说明的警报。如果系统已配置电子邮件通知，这些警报会自动通过电子邮件发送给您。警报也会通过其他可用的通知方法发送，包括\
  \ Oracle Enterprise Manager 和自动服务请求。图 9-4 显示了来自 Exadata 存储单元的电子邮件警报示例。请注意，电子邮件包含主机名称、发生故障的磁盘，甚至是一张存储单元前部的图片，故障磁盘周围标有红色圆环。当磁盘被更换且警报清除后，将会发送一封后续电子邮件，新磁盘周围标有绿色圆环。\n\
  \n![A978-1-4302-6242-8_9_Fig4_HTML.jpg](img/A978-1-4302-6242-8_9_Fig4_HTML.jpg)\n\
  \n图 9-4.\n来自故障磁盘驱动器的电子邮件警报示例\n\n在上一节中，我们引导您完成了一次模拟的驱动器故障。如果这是真实的磁盘故障，更换磁盘的步骤将遵循与模拟相同的流程。但是，当\
  \ Exadata 的预警系统确定某个驱动器可能即将发生故障时，会发生什么？当 Exadata 检测到驱动器问题时，它会相应地设置物理磁盘状态属性。以下 `CellCLI`\
  \ 命令显示存储单元中所有磁盘的状态：\n\n```\nCellCLI> list physicaldisk attributes name, status where\
  \ disktype = 'HardDisk'\n         35:0    normal\n         35:1    normal\n    \
  \     ...\n         35:11   normal\n```\n\n表 9-1 显示了各种磁盘状态值及其含义。\n\n表 9-1.\n磁盘状态定义\n\
  \n| 状态 | 描述 |\n| --- | --- |\n| Normal | 驱动器健康。 |\n| Predictive Failure | 磁盘仍在工作，但很可能即将发生故障，应尽快更换。\
  \ |\n| Poor Performance | 磁盘表现出极差的性能，应予以更换。 |\n\n\n\n### 预警性故障\n\n如果磁盘状态显示为 `预警性故障`，`ASM`\
  \ 将自动从驱动器中移除相关的网格磁盘，并根据受影响磁盘组（使用该驱动器的磁盘组）的冗余策略，将数据重平衡到磁盘组中的其他磁盘上。一旦 `ASM` 完成重平衡并执行完移除操作，您就可以更换该磁盘驱动器。下面的清单可用于跟踪\
  \ `ASM` 磁盘的状态。状态为 `Offline` 表示 `ASM` 尚未完成该磁盘组的重平衡。重平衡完成后，该磁盘将不再出现在清单中。顺便一提，查看 `ASM`\
  \ 警报日志也是检查移除进度的绝佳方式。\n\n```sql\nSYS:+ASM2>select name, mode_status\n           \
  \ from v$asm_disk_stat\n           where name like 'SCRATCH%'\n           order\
  \ by 1;\n\nNAME                                               MODE_ST\n--------------------------------------------------\
  \ -------\nSCRATCH_CD_05_CELL01                               ONLINE\nSCRATCH_CD_05_CELL02\
  \                               ONLINE\nSCRATCH_CD_05_CELL03                   \
  \            OFFLINE\n```\n\n**注意事项**\n\n存储单元中的前两个物理磁盘也包含 Linux 操作系统。这两个磁盘上的操作系统分区被配置为彼此的镜像。如果其中一块磁盘发生故障，在您移除它之前，数据必须与镜像磁盘保持同步。更换磁盘前，请使用\
  \ `CellCLI` 命令 `alter cell validate configuration` 来验证不存在任何 `mdadm` 错误。\n\n`CellCLI`\
  \ 命令 `VALIDATE CONFIGURATION` 会为您执行此验证：\n\n```bash\nCellCLI> ALTER CELL VALIDATE\
  \ CONFIGURATION\nCell enkcel01 successfully altered\n```\n\n### 性能低下\n\n如果一块磁盘表现出性能低下，则应予以更换。一块性能不佳的单元磁盘可能会影响其他健康磁盘的性能。当磁盘性能开始极度恶化时，其状态将被设置为\
  \ `性能低下`。与 `预警性故障` 状态类似，`ASM` 会自动从磁盘组中移除所有（位于此单元磁盘上的）网格磁盘，并开始重平衡操作。重平衡完成后，您就可以移除并更换故障磁盘驱动器。您可以使用\
  \ `CellCLI` 命令 `CALIBRATE` 来手动检查存储单元中所有磁盘的性能。此命令运行 Oracle 的 `Orion` 校准工具，以考察每个磁盘的性能和吞吐量。通常，在运行\
  \ `CALIBRATE` 之前应关闭 `cellsrv`，因为它会显著影响使用该存储单元的数据库的 I/O 性能。如果无法为测试关闭 `cellsrv`，您可以使用\
  \ `FORCE` 选项运行 `CALIBRATE`。尽管听起来令人担忧，`FORCE` 选项只是覆盖了安全开关，允许您在 `cellsrv` 运行且应用程序正在使用单元磁盘时运行\
  \ `CALIBRATE`。下面的清单展示了在 `Exadata X4-2` 高容量存储单元的一组健康单元磁盘上运行 `CALIBRATE` 命令的输出。测试大约需要十分钟完成。\n\
  \n```text\nCellCLI> calibrate\n\nCalibration will take a few minutes...\nAggregate\
  \ random read throughput across all hard disk LUNs: 1123 MBPS\nAggregate random\
  \ read throughput across all flash disk LUNs: 8633 MBPS\nAggregate random read IOs\
