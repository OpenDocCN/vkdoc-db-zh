  ```\n\n请注意，额外的列导致了查询完成所需的额外时间，并且`V$SQL`中的列验证了必须传输的数据量增加。你还可以初步了解修改版`fsx.sql`脚本的输出，本章稍后将更详细地讨论该脚本。现在，请接受它向我们展示了语句是否被卸载这一事实。\n\
  \n\n\n#### 谓词过滤\n\n三大智能扫描优化中的第二项是**谓词过滤**。这个术语指的是 Exadata 仅将数据库层感兴趣的行返回的能力。由于与 Exadata\
  \ 存储单元交互时使用的 iDB 协议在其请求中包含了谓词信息，谓词过滤是通过在返回数据之前在存储层执行标准的过滤操作来实现的。在使用非 Exadata 存储的数据库上，过滤总是在数据库服务器上完成。这通常意味着大量最终将被丢弃的记录会被返回到数据库层。在存储层过滤这些行可以显著减少必须传输到数据库层的数据量。虽然这种优化也节省了数据库服务器上的\
  \ CPU 使用，但最大的优势通常是缩短了数据传输所需的时间。\n\n以下是一个示例：\n```\nSQL> alter session set cell_offload_processing=false;\n\
  \nSession altered.\n\nElapsed: 00:00:00.01\nSQL> select count(*) from sales;\n\n\
  \  COUNT(*)\n----------\n294575180\n\nElapsed: 00:00:23.17\nSQL> alter session set\
  \ cell_offload_processing=true;\n\nSession altered.\n\nElapsed: 00:00:00.00\nSQL>\
  \ select count(*) from sales;\n\n  COUNT(*)\n----------\n294575180\n\nElapsed: 00:00:05.68\n\
  SQL> -- 禁用存储索引\nSQL> alter session set \"_kcfis_storageidx_disabled\"=true;\n\n\
  System altered.\n\nElapsed: 00:00:00.12\nSQL> select count(*) from sales where quantity_sold\
  \ = 1;\n\n  COUNT(*)\n----------\n   3006298\n\nElapsed: 00:00:02.78\n```\n\n首先，使用`CELL_OFFLOAD_PROCESSING`参数完全禁用了卸载功能，然后执行了一个没有`WHERE`子句（“谓词”）的查询。虽然没有卸载功能的益处，但由于完全从智能闪存缓存读取，这个查询花了大约\
  \ 23 秒。以下证明数据完全来自智能闪存缓存，使用了你将在第 11 章中找到详细说明的`mystats`脚本。在这个案例中，“optimized”关键字表示使用了闪存缓存：\n\
  ```\nSTAT    cell flash cache read hits                    51,483\n...\nSTAT   \
  \ physical read IO requests                     51,483\nSTAT    physical read bytes\
  \                   16,364,175,360\nSTAT    physical read requests optimized   \
  \           51,483\nSTAT    physical read total IO requests               51,483\n\
  STAT    physical read total bytes             16,364,175,360\nSTAT    physical read\
  \ total bytes optimized   16,364,175,360\n```\n\n接下来，启用了卸载功能，并重新执行了相同的查询。这一次，耗时仅为约六秒。节省的大约\
  \ 18 秒完全归功于列投影（因为没有用于过滤的`WHERE`子句，没有其他优化可以发挥作用）。通过设置隐藏参数`_KCFIS_STORAGEIDX_DISABLED`为`TRUE`（下一节有更多介绍）来禁用存储索引，并添加了`WHERE`子句后，执行时间减少到约两秒。这额外节省的大约三秒钟要归功于谓词过滤。请注意，在示例中必须禁用存储索引，以确保查询性能的提升完全归因于谓词过滤，没有其他性能增强（即存储索引）的干扰。\n\
  \n### 存储索引与区域映射表\n\n存储索引为智能扫描提供了第三级优化。存储索引是存储单元上的内存结构，为每个 1MB 的磁盘存储单元维护表中最多八列的最小值和最大值。它们在段被查询后在存储单元上透明地创建和维护。存储索引与大多数智能扫描优化略有不同。存储索引的目标不是减少传输回数据库层的数据量。事实上，无论在给定查询中是否使用它们，返回到数据库层的数据量都保持不变。相反，存储索引旨在消除存储服务器本身从磁盘读取数据所花费的时间。可以将此功能视为一个预过滤器。由于智能扫描将查询谓词传递给存储服务器，并且存储索引包含了每个\
  \ 1MB 存储区域中最多八列的最小/最大值映射，任何不可能包含匹配行（因为它位于存储索引存储的最小和最大值之外）的区域都可以在不被读取的情况下被排除。你也可以将存储索引视为一种替代分区机制。磁盘\
  \ I/O 的消除方式类似于分区消除。如果一个分区不包含任何感兴趣的记录，该分区的块就不会被读取。类似地，如果一个存储区域不包含任何感兴趣的记录，则无需读取该存储区域。\n\
  \n存储索引并非在所有情况下都能使用，而且几乎无法影响它们何时或如何被使用。但是，在适当的情况下，这种优化技术的效果可能令人震惊。一如既往，最好用一个例子来展示：\n\
  ```\nSQL> -- 禁用存储索引\nSQL> alter session set \"_kcfis_storageidx_disabled\"=true;\n\
  \nSystem altered.\n\nElapsed: 00:00:00.11\nSQL> select count(*) from bigtab where\
  \ id = 8000000;\n\nCOUNT(*)\n----------\n32\n\nElapsed: 00:00:22.02\nSQL> -- 重新启用存储索引\n\
  SQL> alter session set \"_kcfis_storageidx_disabled\"=false;\n\nSystem altered.\n\
  \nElapsed: 00:00:00.01\nSQL> select count(*) from bigtab where id = 8000000;\n\n\
  COUNT(*)\n----------\n32\n\nElapsed: 00:00:00.54\n```\n\n在这个例子中，再次使用前述参数`_KCFIS_STORAGEIDX_DISABLED`故意禁用了存储索引，以提醒你仅使用列投影和谓词过滤读取所有行所需的耗时。请记住，尽管在这种情况下返回到数据库层的数据量非常小，但存储服务器仍然必须读取包含`BIGTAB`表数据的所有块，然后必须检查每一行是否匹配`WHERE`子句。这就是\
  \ 22 秒中大部分时间花费的地方。在重新启用存储索引并重新执行查询后，执行时间减少到约 0.05 秒。执行时间的减少是存储索引被用来避免几乎所有磁盘 I/O\
  \ 以及过滤这些记录所花费时间的结果。\n\n从 Exadata 版本 12.1.2.1.0 和数据库 12.1.0.2 开始，Oracle 引入了在存储服务器的存储索引中保留列最小/最大值的全局最小/最大值的能力。其思想是`min()`和`max()`函数可以直接获取保留的全局值，而无需访问存储索引来计算该值。这应该对使用`min()`和`max()`函数的查询（例如填充有这些值的仪表板的分析工作负载）有益。不幸的是，在撰写本文时，没有额外的工具可以表明使用了缓存的最小或最大值。你只能看到众所周知的统计信息“cell\
  \ physical IO bytes saved by storage index”发生了变化。\n\n\n\n重申一下，列投影和谓词过滤（以及大多数其他 Smart\
  \ Scan 优化）通过减少传输回数据库服务器的数据量（从而缩短数据传输时间）来提升性能。存储索引则通过消除从磁盘读取数据以及在存储服务器上过滤数据所花费的时间来提高性能。关于存储索引的更多细节将在第\
  \ 4 章中详细阐述。\n\n## 区域映射是 Oracle 12.1.0.2 中的新特性\n\n区域映射是 Oracle 12.1.0.2 中的新特性，其概念上与存储索引相似。不同之处在于，区域映射让用户对要监控的段拥有更多控制权。当我们首次听说区域映射时，我们感到非常兴奋，因为这一特性可以看作是将存储索引（需要\
  \ Exadata 存储单元）移植到了非 Exadata 平台上。遗憾的是，区域映射的使用仅限于 Exadata，这使其吸引力大打折扣。在 Oracle 术语中，“区域”指的是磁盘上表的一个区域，通常大约包含\
  \ 1024 个数据块。与存储索引一样，区域映射允许 Oracle 跳过磁盘上与查询无关的区域。区域映射与刚刚讨论的存储索引之间的最大区别在于，后者是在存储服务器上维护的，而区域映射则是在数据库管理员的控制下在数据库级别创建和维护的。存储索引驻留在存储单元上，数据库管理员对其控制权很小。区域映射与物化视图非常相似，但不需要物化视图日志。创建区域映射时，需要决定如何刷新它以防止其变得过时。区域映射信息也存储在数据库的数据字典中。当存在可用的区域映射且可以使用时，你会在执行计划中看到它被用作过滤器。\n\
  \n```sql\nSQL> -- 关闭存储索引，否则可能干扰结果\nSQL> alter session set \"_kcfis_storageidx_disabled\"\
  \ = true;\n\n会话已更改。\n\n已用时间: 00:00:00.00\nSQL> select /*+ gather_plan_statistics\
  \ zmap_example_001 */ count(*)\n  2  from T1_ORDER_BY_ID where id = 121;\n\n  COUNT(*)\n\
  ----------\n        16\n\n已用时间: 00:00:02.65\nSQL> select * from table(dbms_xplan.display_cursor);\n\
  \nPLAN_TABLE_OUTPUT\n-------------------------------------\nSQL_ID  avt7474pb4m1m,\
  \ child number 0\n-------------------------------------\nselect /*+ gather_plan_statistics\
  \ zmap_example_001 */ count(*) from\nT1_ORDER_BY_ID where id = 121\n\nPlan hash\
  \ value: 775109614\n\n--------------------------------------------------------------------------------------\n\
  | Id  | Operation                      | Name           | Rows  | Bytes | Cost (%CPU)|\n\
  --------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT               |                |       |       |   723K(100)|\n\
  |   1 |  SORT AGGREGATE                |                |     1 |     5 |      \
  \      |\n|*  2 |   TABLE ACCESS STORAGE FULL    |                |       |    \
  \   |            |\n|     |    WITH ZONEMAP                | T1_ORDER_BY_ID |  \
  \  16 |    80 |   723K  (1)|\n--------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - storage(\"ID\"=121)\n       filter((SYS_ZMAP_FILTER('/* ZM_PRUNING */ SELECT\
  \ \"ZONE_ID$\", CASE WHEN\n              BITAND(zm.\"ZONE_STATE$\",1)=1 THEN 1 ELSE\n\
  \              CASE WHEN (zm.\"MIN_1_ID\" > :1 OR zm.\"MAX_1_ID\" < :2)\n      \
  \        THEN 3 ELSE 2 END END FROM \"MARTIN\".\"T1_ORDER_BY_ID_ZMAP\" zm\n    \
  \          WHERE zm.\"ZONE_LEVEL$\"=0 ORDER BY\n              zm.\"ZONE_ID$\"',SYS_OP_ZONE_ID(ROWID),121,121)<3\
  \ AND \"ID\"=121))\n\n已选择 24 行。\n```\n\n当你查看该语句的 SQL 跟踪时，你会看到在作为 `SYS` 执行的递归 SQL\
  \ 语句中，会为符合修剪条件的区域查询区域映射。跟踪到的语句看起来与执行计划中报告的过滤器完全一样。\n\n\n### 简单连接（Bloom 过滤器）\n\n\
  在某些情况下，连接处理也可以被下推到存储层完成。这种下推的连接是通过创建一种叫做 Bloom 过滤器（Bloom filter）的结构来实现的。Bloom 过滤器由来已久，自\
  \ Oracle 数据库 10g 第 2 版起就已被 Oracle 使用。因此，它们并非 Exadata 特有。Oracle 使用它们的主要方式之一是减少并行查询从属进程（parallel\
  \ query slaves）之间的流量。从 Oracle 11.2.0.4 和 12c 开始，你也可以在串行查询处理中使用 Bloom 过滤器。\n\nBloom\
  \ 过滤器的优势在于，相对于它们所代表的数据集，其尺寸非常小。然而，这是有代价的——它们可能返回假阳性（false positives）。也就是说，本不应包含在目标结果集中的行，偶尔可能会通过\
  \ Bloom 过滤器检查。因此，在 Bloom 过滤器之后必须应用一个额外的过滤器，以确保消除任何假阳性。从 Exadata 的角度来看，关于 Bloom 过滤器一个有趣的事实是，它们可以被传递到存储服务器并在那里进行评估，从而有效地将一个连接（join）转换为一个过滤器（filter）。这种技术可以显著减少必须传回数据库服务器的数据量。下面的例子演示了这一点：\n\
  \n```\nSQL> show parameter bloom\n\nPARAMETER_NAME                     TYPE    \
  \    VALUE\n----------------------------------- ----------- ------\n_bloom_predicate_offload\
  \           boolean     FALSE\n\nSQL> show parameter kcfis\n\nPARAMETER_NAME   \
  \                  TYPE        VALUE\n----------------------------------- -----------\
  \ ------\n_kcfis_storageidx_disabled         boolean     TRUE\n\nSQL> select /*\
  \ bloom0015 */ * from customers c, orders o\n  2  where o.customer_id = c.customer_id\
  \ and c.cust_email = 'user@example.com';\n\nno rows selected\n\nElapsed: 00:00:13.57\n\
  \nSQL> alter session set \"_bloom_predicate_offload\" = true;\n\nSession altered.\n\
  \nSQL> select /* bloom0015 */ * from customers c, orders o\n  2  where o.customer_id\
  \ = c.customer_id and c.cust_email = 'user@example.com';\n\nno rows selected\n\n\
  Elapsed: 00:00:02.56\n\nSQL> @fsx\nEnter value for sql_text: %bloom0015%\nEnter\
  \ value for sql_id:\n\nSQL_ID        CHILD  PLAN_HASH  EXECS  AVG_ETIME AVG_PX OFFLOAD\
  \ IO_SAVED_% SQL_TEXT\n------------- ------ ---------- ------ ------ ------- ----------\
  \ --------------\n5n3np45j2x9vn      0  576684111      1      13.56      0 Yes \
  \         54.26 select /* bloom0015\n5n3np45j2x9vn      1 2651416178      1    \
  \   2.56      0 Yes          99.98 select /* bloom0015\n\nSQL> --fetch first explain\
  \ plan, without bloom filter\nSQL> select * from table(\n  2   dbms_xplan.display_cursor('5n3np45j2x9vn',0,'BASIC\
  \ +predicate +partition'));\n\nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------\n\
  EXPLAINED SQL STATEMENT:\n------------------------------------------------------------------------\n\
  select /* bloom0015 */ * from customers c, orders o where o.customer_id\n= c.customer_id\
  \ and c.cust_email = 'user@example.com'\n\nPlan hash value: 576684111\n\n-------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name      | Pstart| Pstop |\n-------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |           |       |       |\n|*  1 |  HASH\
  \ JOIN                  |           |       |       |\n|   2 |   PARTITION HASH\
  \ ALL        |           |     1 |    32 |\n|*  3 |    TABLE ACCESS STORAGE FULL|\
  \ CUSTOMERS |     1 |    32 |\n|   4 |   PARTITION HASH ALL        |           |\
  \     1 |    32 |\n|   5 |    TABLE ACCESS STORAGE FULL| ORDERS    |     1 |   \
  \ 32 |\n-------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   1 - access(\"O\".\"CUSTOMER_ID\"=\"C\".\"CUSTOMER_ID\")\n   3 - storage(\"C\"\
  .\"CUST_EMAIL\"='user@example.com')\n       filter(\"C\".\"CUST_EMAIL\"='user@example.com')\n\
  \n25 rows selected.\n\nElapsed: 00:00:00.01\n\nSQL> --fetch second explain plan,\
  \ with bloom filter\nSQL> select * from table(\n  2  dbms_xplan.display_cursor('5n3np45j2x9vn',1,'BASIC\
  \ +predicate +partition'));\n\nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------\n\
  EXPLAINED SQL STATEMENT:\n------------------------------------------------------------------------\n\
  select /* bloom0015 */ * from customers c, orders o where o.customer_id\n= c.customer_id\
  \ and c.cust_email = 'user@example.com'\n\nPlan hash value: 2651416178\n\n---------------------------------------------------------------------------------\n\
  | Id  | Operation                    | Name      | Pstart| Pstop |\n---------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT             |           |       |       |\n|*  1 |  HASH\
  \ JOIN                   |           |       |       |\n|   2 |   JOIN FILTER CREATE\
  \         | :BF0000   |       |       |\n|   3 |    PARTITION HASH ALL        |\
  \           |     1 |    32 |\n|*  4 |     TABLE ACCESS STORAGE FULL| CUSTOMERS\
  \ |     1 |    32 |\n|   5 |   JOIN FILTER USE            | :BF0000   |       |\
  \       |\n|   6 |    PARTITION HASH ALL        |           |     1 |    32 |\n\
  |*  7 |     TABLE ACCESS STORAGE FULL| ORDERS    |     1 |    32 |\n---------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   1 - access(\"O\".\"CUSTOMER_ID\"=\"C\".\"CUSTOMER_ID\")\n   4 - storage(\"C\"\
  .\"CUST_EMAIL\"='user@example.com')\n       filter(\"C\".\"CUST_EMAIL\"='user@example.com')\n\
  \   7 - storage(`SYS_OP_BLOOM_FILTER`(:BF0000,\"O\".\"CUSTOMER_ID\"))\n       filter(`SYS_OP_BLOOM_FILTER`(:BF0000,\"\
  O\".\"CUSTOMER_ID\"))\n\n29 rows selected.\n```\n\n在这个示例中，隐藏参数`_BLOOM_PREDICATE_OFFLOAD`（在\
  \ 11.2 中曾命名为`_BLOOM_PREDICATE_PUSHDOWN_TO_STORAGE`）被用于对比。注意，测试查询在使用 Bloom 过滤器时运行了大约\
  \ 2 秒，而没有使用时则用了 14 秒。同时请注意，两次查询都发生了数据下推（offloaded）。如果你仔细查看执行计划的谓词信息（predicate information），你会看到第二次运行（对应子游标\
  \ 1）时，`SYS_OP_BLOOM_FILTER(:BF0000,\"O\".\"CUSTOMER_ID\")`谓词是在存储服务器上执行的。使用 Bloom\
  \ 过滤器的查询运行得更快，因为存储服务器能够预先连接表，从而消除了大量原本需要传回数据库服务器的数据。Oracle 数据库引擎不仅限于使用单个 Bloom 过滤器，根据查询的复杂程度，可能会有多个。\n\
  \n> 注意\n> 内存聚合（In-Memory Aggregation）功能（需要内存选件）提供了另一种类似于 Bloom 过滤器的优化。使用它，你可以受益于下推作为转换一部分的键向量（key\
  \ vectors）。\n\n## Exadata 优化：函数卸载与 HCC 压缩\n\n### 函数卸载\n\nOracle 对结构化查询语言（SQL）的实现包含许多内置函数。这些函数可以直接在\
  \ SQL 语句中使用。大致可分为两类：单行函数和多行函数。单行函数为查询表的每一行返回一个结果行。这些单行函数可以进一步细分为以下几类：\n\n*   数字函数（`SIN`,\
  \ `COS`, `FLOOR`, `MOD`, `LOG`, ...）\n*   字符函数（`CHR`, `LPAD`, `REPLACE`, `TRIM`,\
  \ `UPPER`, `LENGTH`, ...）\n*   日期时间函数（`ADD_MONTHS`, `TO_CHAR`, `TRUNC`, ...）\n*\
  \   转换函数（`CAST`, `HEXTORAW`, `TO_CHAR`, `TO_DATE`, ...）\n\n几乎所有这些单行函数都可以被卸载到 Exadata\
  \ 存储。第二类主要的 SQL 函数对一组行进行操作。在这个多行函数类别中有两个子类：\n\n*   聚合函数（`AVG`, `COUNT`, `SUM`, ...）\n\
  *   分析函数（`AVG`, `COUNT`, `DENSE_RANK`, `LAG`, ...）\n\n这些函数返回单行（聚合函数）或多行（分析函数）。请注意，有些函数被重载，同时属于这两组。这些函数都不能卸载到\
  \ Exadata，这是合理的，因为许多函数需要访问整组行——这是单个存储单元不具备的。\n\n还有一些额外的函数不完全属于上述任何分组。这些函数可能被卸载到存储单元，也可能不被卸载。例如，`DECODE`和`NVL`是可卸载的，但大多数\
  \ XML 函数则不是。一些数据挖掘函数是可卸载的，但有些不是。同时请记住，可卸载函数列表可能随着新版本的发布而变化。特定版本可卸载函数的权威列表包含在`V$SQLFN_METADATA`中。例如，在\
  \ 11.2.0.3 版本中，923 个 SQL 函数中有 393 个是可卸载的。\n\n```sql\nSQL> select count(*), offloadable\
  \ from v$sqlfn_metadata group by rollup(offloadable);\nCOUNT(*) OFF\n-----------\
  \ ---\n       530 NO\n       393 YES\n       923\n```\n\n在写作时的当前版本 12.1.0.2 中，函数数量有所增加：\n\
  \n```sql\nSQL> select count(*), offloadable from v$sqlfn_metadata group by rollup(offloadable);\n\
  COUNT(*) OFF\n---------- ---\n       615 NO\n       418 YES\n      1033\n```\n\n\
  卸载函数确实允许存储单元完成一些通常由数据库服务器 CPU 完成的工作。然而，CPU 使用率的节省通常是一个相对次要的改进。主要的收益通常来自于限制传回数据库服务器的数据量。能够评估`WHERE`子句中的函数，使得存储单元可以仅将感兴趣的行发送回数据库层。因此，与大多数卸载一样，此优化的主要目标是减少存储层和数据库层之间的流量。如果一个函数已被卸载到存储服务器，你可以在`DBMS_XPLAN.DISPLAY_CURSOR`输出的谓词信息中看到这一点，如下所示：\n\
  \n```sql\nSQL> select count(*) from sales where lower(tax_country) = 'ir';\nCOUNT(*)\n\
  ----------\n    435700\n\nSQL> select * from table(dbms_xplan.display_cursor(null,\
  \ null, 'BASIC +predicate'));\nPLAN_TABLE_OUTPUT\n------------------------------------------------------------------------\n\
  EXPLAINED SQL STATEMENT:\n------------------------------------------------------------------------\n\
  select count(*) from sales where lower(tax_country) = 'ir'\n\nPlan hash value: 3519235612\n\
  \n------------------------------------------------\n| Id  | Operation          \
  \         | Name  |\n------------------------------------------------\n|   0 | SELECT\
  \ STATEMENT            |       |\n|   1 |  SORT AGGREGATE             |       |\n\
  |   2 |   PARTITION RANGE ALL       |       |\n|*  3 |    TABLE ACCESS STORAGE FULL|\
  \ SALES |\n------------------------------------------------\n\nPredicate Information\
  \ (identified by operation id):\n---------------------------------------------------\n\
  \   3 - storage(LOWER(\"TAX_COUNTRY\")='ir')\n       filter(LOWER(\"TAX_COUNTRY\"\
  )='ir')\n```\n\n这与在 select-list 中引用函数的情况不同：\n\n```sql\nSQL> select lower(tax_country)\
  \ from sales where rownum < 11;\nLOW\n---\nzl\nuw\n...\nbg\n\n10 rows selected.\n\
  \nSQL> select * from table(dbms_xplan.display_cursor(null, null, 'BASIC +predicate'));\n\
  PLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------\n\
  EXPLAINED SQL STATEMENT:\n--------------------------------------------------------------------------\n\
  select lower(tax_country) from sales where rownum < 11\n\nPlan hash value: 807288713\n\
  \n------------------------------------------------------------\n| Id  | Operation\
  \                         | Name  |\n------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                  |       |\n|*  1 |  COUNT STOPKEY    \
  \                |       |\n|   2 |   PARTITION RANGE ALL             |       |\n\
  |   3 |    TABLE ACCESS STORAGE FULL FIRST ROWS| SALES |\n------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   1 - filter(ROWNUM<11)\n```\n\n如你所见，谓词信息中没有提到`to_lower()`函数。不过，在这种情况下，你仍然可以从列投影中受益。\n\
  \n#### 压缩/解压缩\n\nExadata 的一个备受关注的特性是 HCC。在 Smart Scan 操作期间，Exadata 会卸载对 HCC 格式存储数据的解压。也就是说，当通过\
  \ Smart Scan 访问压缩数据时，感兴趣的列会在存储单元上被解压。这种解压对于过滤并非必需，因此只有将返回给数据库层的数据才会被解压。请注意，所有的压缩操作都是在数据库层完成的。当数据不是通过\
  \ Smart Scan 访问，或者存储单元非常繁忙时，解压也可能在数据库层完成。为简化起见，表 2-1 显示了工作在何处完成。\n\n表 2-1.\nHCC\
  \ 压缩/解压卸载\n\n| 操作             | 数据库服务器                     | 存储服务器             |\n\
  | ---------------- | -------------------------------- | ---------------------- |\n\
  | 压缩（Compress） | 总是                             | 从不                   |\n| 解压（Decompress）|\
  \ 非 Smart Scan；在单元太忙时可帮忙 | Smart Scan             |\n\n在存储层解压数据与大多数其他 Smart Scan\
  \ 优化的主题背道而驰。那些优化大多旨在减少需要传输回数据库服务器的数据量。由于解压是一项 CPU 密集型任务，特别是在使用更高级别的压缩时，因此决定尽可能在存储服务器上进行解压。然而，这个决定并非一成不变，因为在某些情况下，可能有足够的\
  \ CPU 资源可用，使得在数据库服务器上解压数据成为一个有吸引力的选择。（也就是说，在某些情况下，减少需要传输的数据量可能比减少数据库服务器的 CPU 消耗更重要。）事实上，从`cellsrv`版本\
  \ 11.2.2.3.1 开始，当存储单元繁忙时，Exadata 确实有能力将压缩数据返回给数据库服务器。第 3 章更详细地讨论了 HCC，并将提供此类情况的示例。\n\
  \n有一个隐藏参数控制是否完全卸载解压。不幸的是，它并不能简单地在存储层和数据库层之间来回移动解压操作。如果将`_CELL_OFFLOAD_HYBRIDCOLUMNAR`参数设置为`FALSE`，Smart\
  \ Scan 将完全禁用对 HCC 数据的处理。\n\n#### 加密/解密\n\n加密和解密的处理方式与 HCC 数据的压缩和解压缩非常相似。加密总是在数据库层完成，而解密可由存储服务器或数据库服务器执行。当通过智能扫描访问加密数据时，解密在存储服务器上进行；否则，解密在数据库服务器上进行。请注意，从\
  \ X2 Exadata 这一代开始，存储服务器中的 Intel Xeon 芯片已内置基于硅片的加密能力。现代 Intel 芯片包含一套特殊指令集（`Intel\
  \ AES-NI`），可有效为执行加密或解密的进程提供硬件加速。需要注意的是，需要 Oracle Database 11.2.0.2 或更高版本才能利用这套新指令集。\n\
  \n加密与 HCC 压缩能够良好协同工作。由于压缩先执行，对 HCC 数据进行加密和解密的进程所需完成的工作量便得以减少。请注意，`CELL_OFFLOAD_DECRYPTION`\
  \ 参数控制此行为，并且与隐藏参数 `_CELL_OFFLOAD_HYBRIDCOLUMNAR` 类似，将该参数设置为 `FALSE` 会完全禁用对加密数据的智能扫描，这同时也禁用了存储层的解密。\n\
  \n#### 虚拟列\n\n虚拟列提供了定义伪列的能力，这些伪列可基于表中的其他列计算得出，而无需实际存储计算后的值。虚拟列可用作分区键、用于约束中或建立索引。也可以收集它们的列级统计信息。由于虚拟列的值并未实际存储，因此在访问时必须即时计算。在\
  \ Exadata 平台之外，数据库会话必须自行计算这些值。而在 Exadata 上，通过智能扫描进行段访问时，这些计算可以被卸载执行：\n\n```sql\n\
  SQL> alter table bigtab add idn1 generated always as (id + n1);\n\nTable altered.\n\
  \nSQL> select column_name, data_type, data_default\n  2  from user_tab_columns where\
  \ table_name = 'BIGTAB';\n\nCOLUMN_NAME          DATA_TYPE            DATA_DEFAULT\n\
  -------------------- -------------------- ------------\nIDN1                 NUMBER\
  \               \"ID\"+\"N1\"\nID                   NUMBER\nV1                 \
  \  VARCHAR2\nN1                   NUMBER\nN2                   NUMBER\nN_256K  \
  \             NUMBER\nN_128K               NUMBER\nN_8K                 NUMBER\n\
  PADDING              VARCHAR2\n\n9 rows selected.\n```\n\n现在，您可以查询包含虚拟列的表。为了演示卸载的效果，首先需要一个随机值。在此数据集中，`ID`\
  \ 和 `N1` 的组合应具有较好的唯一性：\n\n```sql\nSQL> select /*+ gather_plan_statistics virtual001\
  \ */ id, n1, idn1 from bigtab where rownum < 11;\n\n        ID         N1      \
  \ IDN1\n---------- ---------- ----------\n   1161826       1826    1163652\n   1161827\
  \       1827    1163654\n   1161828       1828    1163656\n   1161829       1829\
  \    1163658\n   1161830       1830    1163660\n   1161831       1831    1163662\n\
  \   1161832       1832    1163664\n   1161833       1833    1163666\n   1161834\
  \       1834    1163668\n   1161835       1835    1163670\n\n10 rows selected.\n\
  ```\n\n以下是卸载计算如何使执行时间受益的演示：\n\n```sql\nSQL> select /* gather_plan_statistics virtual0002\
  \ */ count(*)\n  2  from bigtab where idn1 = 1163652;\n\n  COUNT(*)\n----------\n\
  \        64\n\nElapsed: 00:00:06.78\n\nSQL> @fsx4\nEnter value for sql_text: %virtual0002%\n\
  Enter value for sql_id:\n\nSQL_ID         CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n\
  ------------- ------ ------- ---------- ---------- ----------------------------------------\n\
  8dyyd6kzycztq      0 Yes          99.99       6.77 select /* virtual0002 */ count(*)\
  \ from b\n\nElapsed: 00:00:00.39\n\nSQL> @dplan\nCopy and paste SQL_ID and CHILD_NO\
  \ from results above\nEnter value for sql_id: 8dyyd6kzycztq\nEnter value for child_no:\n\
  \nPLAN_TABLE_OUTPUT\n-------------------------------------\nSQL_ID  8dyyd6kzycztq,\
  \ child number 0\n-------------------------------------\nselect /* virtual0002 */\
  \ count(*) from bigtab where idn1 = 1163652\n\nPlan hash value: 2140185107\n\n-------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name   | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |        |       |       |  2780K(100)|    \
  \      |\n|   1 |  SORT AGGREGATE             |        |     1 |    13 |       \
  \     |          |\n|*  2 |   TABLE ACCESS STORAGE FULL | BIGTAB |  2560K|    31M|\
  \  2780K  (1)| 00:01:49 |\n-------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - storage(\"ID\"+\"N1\"=1163652)\n       filter(\"ID\"+\"N1\"=1163652)\n```\n\
  \n根据上次执行时 `V$SQL` 中的关键列计算，节省的 I/O 量为 99.99%，该查询耗时 6.78 秒完成。\n\n与 Oracle 世界中的许多功能一样，存在一个参数可影响会话行为。在下一个示例中，将使用相关的下划线参数在存储服务器级别禁用虚拟列处理。这样做是为了模拟相同查询在非\
  \ Exadata 平台上的运行方式：\n\n```sql\nSQL> alter session set \"_cell_offload_virtual_columns\"\
  =false;\n\nSession altered.\n\nElapsed: 00:00:00.00\n\nSQL> select /* virtual0002\
  \ */ count(*)\n  2  from bigtab where idn1 = 1163652;\n\n  COUNT(*)\n----------\n\
  \        64\n\nElapsed: 00:00:23.13\n```\n\n当计算节点必须评估表达式时，执行时间明显增加。比较两条语句的执行情况可以看出这一点：\n\
  \n```sql\nSQL> @fsx4\nEnter value for sql_text: %virtual0002%\nEnter value for sql_id:\n\
  \nSQL_ID         CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n------------- ------\
  \ ------- ---------- ---------- ----------------------------------------\n8dyyd6kzycztq\
  \      0 Yes          99.99       6.77 select /* virtual0002 */ count(*) from b\n\
  8dyyd6kzycztq      1 Yes          94.18      23.13 select /* virtual0002 */ count(*)\
  \ from b\n\n2 rows selected.\n```\n\n您还会注意到，在显示第一个子游标对应的执行计划时，谓词部分缺少了 `storage`\
  \ 关键字：\n\n```sql\nSQL> @dplan\nCopy and paste SQL_ID and CHILD_NO from results above\n\
  Enter value for sql_id: 8dyyd6kzycztq\nEnter value for child_no: 1\n\nPLAN_TABLE_OUTPUT\n\
  -------------------------------------\nSQL_ID  8dyyd6kzycztq, child number 1\n-------------------------------------\n\
  select /* virtual0002 */ count(*) from bigtab where idn1 = 1163652\n\nPlan hash\
  \ value: 2140185107\n\n-------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name   | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |        |       |       |  2780K(100)|    \
  \      |\n|   1 |  SORT AGGREGATE             |        |     1 |    13 |       \
  \     |          |\n|*  2 |   TABLE ACCESS STORAGE FULL | BIGTAB |    64 |   832\
  \ |  2780K  (1)| 00:01:49 |\n-------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - filter(\"ID\"+\"N1\"=1163652)\n\nNote\n-----\n   - statistics feedback used\
  \ for this statement\n```\n\n如果您在 `WHERE` 子句中使用虚拟列，那么您无疑能从 Exadata 平台获益。\n\n\n###\
  \ 对 LOB 卸载的支持\n\n随着 Exadata 软件 12.1.1.1.1 和 RDBMS 12.1.0.2 的引入，针对定义为安全文件的内联 LOB\
  \ 的查询也可以被卸载了。根据相关文档集，`like` 和 `regexp_like` 可以被卸载。为了演示这一新功能，创建了一个新表 `LOBOFFLOAD`，并填充了\
  \ 1600 万行数据。这应能确保它被考虑用于智能扫描。以下是关于 LOB 列的关键信息：\n\n```\nSQL> select table_name, column_name,\
  \ segment_name, securefile, in_row\n  2  from user_lobs where table_name = 'LOBOFFLOAD';\n\
  \nTABLE_NAME              COLUMN_NAME              SEGMENT_NAME                \
  \      SEC IN_\n---------------------   ---------------------   ---------------------------\
  \       --- ---\nLOBOFFLOAD              COMMENTS                SYS_LOB0000096135C00002$$\
  \         YES YES\n```\n\n该表试图模拟一种常见的应用技术，即在表中定义一个 CLOB 字段，用于输入与记录相关的额外非结构化信息。只要这不违背数据模型中的约束条件，并且存储的纯粹是信息性的、在任何形式的处理中都不需要的信息，这应该就是可以的。以下是在\
  \ 12c 中的示例：\n\n```\nSQL> select /*+ monitor loboffload001 */ count(*) from loboffload\
  \ where comments like '%GOOD%';\n\n  COUNT(*)\n----------\n     15840\n\nElapsed:\
  \ 00:00:02.93\n\nSQL> @fsx4.sql\nEnter value for sql_text: %loboffload001%\nEnter\
  \ value for sql_id:\n\nSQL_ID         CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n\
  ------------- ------ ------- ---------- ---------- -----------------------------------------\n\
  18479dnagkkyu      0 Yes          98.94       2.93 select /*+ monitor loboffload001\
  \ */ count\n```\n\n正如你在脚本输出中看到的（我们稍后将详细讨论），该查询已被卸载。在 11.2.0.3 版本中重现此测试用例时，情况则不同：\n\
  \n```\nSQL> select /*+ monitor loboffload001 */ count(*) from loboffload where comments\
  \ like '%GOOD%';\n\n   COUNT(*)\n-----------\n      15840\n\nElapsed: 00:01:34.04\n\
  \nSQL> @fsx4.sql\nEnter value for sql_text: %loboffload001%\nEnter value for sql_id:\n\
  \nSQL_ID         CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n------------- ------\
  \ ------- ---------- ---------- -----------------------------------------\n18479dnagkkyu\
  \      0 No             .00      94.04 select /*+ monitor loboffload001 */ count\n\
  ```\n\n与第一个示例不同，在 11.2.0.3 上执行的第二个查询未被卸载。由于段大小的原因，它使用了直接路径读取，但与第一个示例不同，这些读取并未转变为智能扫描。\n\
  \n### JSON 支持与卸载\n\n随着 Oracle 12.1.0.2 的推出，数据库层添加了 JSON 支持。如果你使用的是 Exadata 12.1.0.2.1.0\
  \ 或更高版本，就可以从卸载部分这些运算符中受益。正如你在函数卸载部分看到的，你可以查询 `v$sqlfn_metadata` 以了解函数是否支持卸载。以下是检查\
  \ JSON 相关函数及其卸载支持情况的结果：\n\n```\nSQL> select count(*), name, offloadable from v$sqlfn_metadata\n\
  \  2  where name like '%JSON%' group by name, offloadable\n  3  order by offloadable,\
  \ name;\n\n  COUNT(*) NAME                       OFF\n---------- ------------------------------\
  \ ---\n         1 JSON_ARRAY                    NO\n         1 JSON_ARRAYAGG   \
  \              NO\n         1 JSON_EQUAL                    NO\n         1 JSON_OBJECT\
  \                   NO\n         1 JSON_OBJECTAGG                NO\n         1\
  \ JSON_QUERY                    NO\n         1 JSON_SERIALIZE                NO\n\
  \         1 JSON_TEXTCONTAINS2            NO\n         1 JSON_VALUE            \
  \        NO\n         2 JSON                          YES\n         1 JSON_EXISTS\
  \                   YES\n         1 JSON_QUERY                    YES\n        \
  \ 1 JSON_VALUE                    YES\n\n13 rows selected.\n```\n\n根据 Oracle 文档，12.1.0.2.1\
  \ 的用户也能从卸载 `XMLExists` 和 `XMLCast` 操作中受益。\n\n#### 数据挖掘模型评分\n\n一些数据模型评分函数可以被卸载。一般来说，这种优化旨在减少传输到数据库层的数据量，而不是纯粹的\
  \ CPU 卸载。与其他函数卸载一样，你可以通过查询 `V$SQLFN_METADATA` 来验证哪些数据挖掘函数可以卸载。输出如下：\n\n```\nSQL>\
  \ select distinct name, version, offloadable\n  2  from V$SQLFN_METADATA\n  3  where\
  \ name like 'PREDICT%'\n  4  order by 1,2\n  5  /\n\nNAME                      \
  \     VERSION      OFF\n------------------------------ ------------ ---\nPREDICTION\
  \                     V10R2 Oracle YES\nPREDICTION_BOUNDS              V11R1 Oracle\
  \ NO\nPREDICTION_COST                V10R2 Oracle YES\nPREDICTION_DETAILS      \
  \       V10R2 Oracle NO\nPREDICTION_PROBABILITY         V10R2 Oracle YES\nPREDICTION_SET\
  \                 V10R2 Oracle NO\n\n6 rows selected.\n```\n\n如你所见，部分函数支持卸载，部分则不支持。支持卸载的函数可以被存储单元用于谓词过滤。以下是一个示例查询，它应该只返回符合\
  \ `WHERE` 子句中指定的评分要求的记录：\n\n```\nSQL> select cust_id\n  2  from customers\n  3 \
  \ where region = 'US'\n  4  and prediction_probability(churnmod,'Y' using *) > 0.8\n\
  \  5  /\n```\n\n此优化旨在卸载 CPU 使用率并减少传输的数据量。然而，在能够减少返回到数据库层的数据量的情况下，它最为有益，如前面的示例所示。\n\
  \n### 非智能扫描卸载\n\n有一些优化与查询处理无关。由于这些不是本章的重点，我们将仅简要提及。\n\n#### 智能/快速文件创建\n\n这个优化的名称有些误导性。它实际上是一种旨在加速块初始化的优化。每当分配块时，数据库都必须对其进行初始化。这种活动在创建表空间时会发生，但当因任何其他原因添加或扩展文件时也会发生。在非\
  \ Exadata 存储上，这些情况要求数据库服务器格式化每个块，然后将其写回磁盘。所有这些读写操作会在数据库服务器和存储单元之间产生大量流量。正如你现在所知，消除层间流量是\
  \ Exadata 的主要目标。正如你可能想象的那样，这种完全不必要的流量已被消除。\n\n此过程已得到进一步改进。从 Oracle Exadata 11.2.3.3.0（这是作者们最喜爱的\
  \ Exadata 版本之一）开始，Oracle 引入了快速数据文件创建。通过使用一个巧妙的技巧，可以进一步减少初始化数据文件所需的时间。你在上一段中读到的第一个优化是将清零数据文件的任务委派给存储单元，这本身就被证明非常有效。下一个合乎逻辑的步骤，也是通过快速文件创建获得的功能，就是仅将元数据写入回写闪存缓存，从而消除实际格式化块的过程。如果存储单元中启用了\
  \ WBFC，默认情况下将使用快速数据文件创建。你可以在第 5 章中阅读更多关于 Exadata 智能闪存缓存的信息。\n\n\n#### RMAN 增量备份\n\
  \nExada 通过提高块更改跟踪的精细度来加速增量备份。在非 Exadata 平台上，块更改是按块组进行跟踪的；而在 Exadata 上，更改是针对单个块进行跟踪的。这可以显著减少需要备份的块数量，从而得到更小的备份大小、更少的\
  \ I/O 带宽，并缩短完成增量备份所需的时间。可以通过将 `_DISABLE_CELL_OPTIMIZED_BACKUPS` 参数设置为 `TRUE` 来禁用此功能。此优化在第\
  \ 10 章中有更详细的介绍。\n\n#### RMAN 恢复\n\n此优化加速了在存储节点上从备份恢复时的文件初始化部分。尽管从备份恢复数据库并不常见，但此优化也有助于加速环境克隆。该优化降低了数据库服务器上的\
  \ CPU 使用率，并减少了两层架构之间的流量。如果将 `_CELL_FAST_FILE_RESTORE` 参数设置为 `FALSE`，则将禁用此行为。此优化同样在第\
  \ 10 章中有所介绍。\n\n## Smart Scan 前置条件\n\n并非在 Exadata 上运行的每个查询都会发生 Smart Scan。必须满足三个基本要求才能发生\
  \ Smart Scan：\n\n*   必须对段（表、分区、物化视图等）进行全扫描。\n*   扫描必须使用 Oracle 的直接路径读取机制。\n*   对象必须存储在\
  \ Exadata 存储上。\n\n这些要求的存在有一个简单的解释。Oracle 是一个 C 程序。执行 Smart Scan 的函数 (`kcfis_read`)\
  \ 由直接路径读取函数 (`kcbldrget`) 调用，而后者又由某个全扫描函数调用。事情就是这么简单。如果没有从全扫描到直接读取的代码路径，就无法到达 `kcfis_read`\
  \ 函数。当然，存储层也必须运行 Oracle 软件，以便处理所有数据文件均位于 Exadata 上的 Smart Scan。我们将依次讨论这些要求。\n\n\
  ### 全扫描\n\n为了使查询能够利用 Exadata 的卸载功能，优化器必须决定对语句执行全表扫描或快速全索引扫描。在此上下文中，这些术语的使用有些泛化。全段扫描也是直接路径读取的前提条件。如前所述，除非做出了直接路径读取的决定，否则不会有\
  \ Smart Scan。\n\n一般来说，（快速）全扫描对应于执行计划中的 `TABLE ACCESS FULL` 和 `INDEX FAST FULL SCAN`\
  \ 操作。在 Exadata 上，这些熟悉的操作名称略有更改，以表明它们正在访问 Exadata 存储。新的操作名称是 `TABLE ACCESS STORAGE\
  \ FULL` 和 `INDEX STORAGE FAST FULL SCAN`。\n\n确定是否发生了全扫描通常相当简单，但你可能需要查看不止一个地方。开始调查最简单的方法是在查询执行完毕后立即调用\
  \ `DBMS_XPLAN.DISPLAY_CURSOR()`：\n\n```\nSQL> select count(*) from bigtab;\n\n \
  \ COUNT(*)\n----------\n 256000000\n\nElapsed: 00:00:07.98\n\nSQL> select * from\
  \ table(dbms_xplan.display_cursor(null, null));\n\nPLAN_TABLE_OUTPUT\n-------------------------------------\n\
  SQL_ID  8c9rzdry8yahs, child number 0\n-------------------------------------\nselect\
  \ count(*) from bigtab\nPlan hash value: 2140185107\n-----------------------------------------------------------------------------\n\
  | Id  | Operation                  | Name   | Rows  | Cost (%CPU)| Time     |\n\
  -----------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT           |        |       |  2779K(100)|          |\n\
  |   1 |  SORT AGGREGATE            |        |     1 |            |          |\n\
  |   2 |   TABLE ACCESS STORAGE FULL | BIGTAB |   256M|  2779K  (1)| 00:01:49 |\n\
  -----------------------------------------------------------------------------\n\
  ```\n\n或者，你可以使用 `fsx.sql` 脚本从共享池中定位查询的 SQL 文本，并使用 `SQL_ID` 和游标子编号调用 `DISPLAY_CURSOR()`\
  \ 函数。`dplan.sql` 脚本是执行此操作的便捷方式。\n\n请注意，这些操作还有一些细微变体，例如 `MAT_VIEW ACCESS STORAGE\
  \ FULL`，它也适用于物化视图的 Smart Scan。然而，你应该意识到，你的执行计划显示 `TABLE ACCESS STORAGE FULL` 操作并不意味着你的查询是通过\
  \ Smart Scan 执行的。它仅仅意味着满足了这个特定的前提条件。在本章后面，你将读到关于如何验证语句是否确实通过 Smart Scan 卸载执行的方法。\n\
  \n\n#### 直接路径读取\n\n除了需要全表扫描操作外，智能扫描还要求读取操作通过 Oracle 的直接路径读取机制执行。直接路径读取机制由来已久。传统上，这种读取机制由并行查询服务器进程使用。因为并行查询最初预期用于访问非常大量的数据（通常大到无法放入\
  \ Oracle 缓冲区缓存），所以决定并行服务器应直接将数据读入它们自己的内存（也称为程序全局区域或 PGA）。直接路径读取机制完全绕过了将数据块放入缓冲区缓存的标准\
  \ Oracle 缓存机制。它依赖于快速对象检查点操作，在“舀取”多块读取之前将脏缓冲区刷新到磁盘。这对于非常大的数据集来说是一件非常好的事情，因为它消除了预期无益的额外工作（缓存可能不会被重用的全表扫描数据），并防止它们将其他数据从缓存中冲刷出去。此外，还消除了硬盘随机寻道的固有延迟。不将读取的缓冲区插入缓冲区缓存也消除大量潜在的\
  \ CPU 开销。\n\n这种情况一直持续到 Oracle 11g，那时非并行查询也开始使用直接路径读取。这在当时有点令人惊讶！\n\n因此，智能扫描并不需要并行执行。为串行查询引入直接路径读取无疑有利于通过智能扫描读取数据的\
  \ Exadata 方式。之前提到过，`kcfis`（内核缓存文件智能存储）函数深藏在`kcbldrget`（内核缓存块直接读取获取）函数之下。因此，只有在使用直接路径读取机制时，才能执行智能扫描。\n\
  \n串行查询并非总是使用智能扫描——那将极其低效。建立直接路径读取，尤其是在集群环境中，可能是一项耗时的任务。因此，只有在条件合适时才会建立和使用直接路径读取。\n\
  \n一个隐藏参数`_SERIAL_DIRECT_READ`控制此功能。当此参数设置为其默认值(`AUTO`)时，Oracle 会自动决定是否对非并行扫描使用直接路径读取。该计算基于多个因素，包括对象的大小、缓冲区缓存的大小以及对象已有多少块被缓存在缓冲区缓存中。还有一个隐藏参数(`_SMALL_TABLE_THRESHOLD`)在决定表必须多大才会被考虑用于串行直接路径读取中起作用。确定在非并行扫描上是否使用直接路径读取机制的算法并未公开。稍加挖掘，你可以发掘出部分决策过程。在数据库的近期版本中，你可以跟踪一个名为`NSMTIO`的\
  \ RDBMS 内核工具。可以调用低级的`oradebug`实用程序来显示数据库中可跟踪的组件，其中一个顶级组件名为 KXD——Exadata 特定内核模块(kxd)：\n\
  \n```sql\nSQL> oradebug doc component kxd\nKXD                        Exadata specific\
  \ Kernel modules (kxd)\nKXDAM                      Exadata Disk Auto Manage (kxdam)\n\
  KCFIS                      Exadata Predicate Push (kcfis)\nNSMTIO              \
  \       Trace Non Smart I/O (nsmtio)\nKXDBIO                     Exadata Block level\
  \ Intelligent Operations (kxdbio)\nKXDRS                      Exadata Resilvering\
  \ Layer (kxdrs)\nKXDOFL                     Exadata Offload (kxdofl)\nKXDMISC  \
  \                  Exadata Misc (kxdmisc)\nKXDCM                      Exadata Metrics\
  \ Fixed Table Callbacks (kxdcm)\nKXDBC                      Exadata Backup Compression\
  \ for Backup Appliance (kxdbc)\n```\n\n跟踪`KXD.*`从研究角度看相当有趣，但由于它可能生成巨大的跟踪文件，绝不应在实验室环境之外进行。`NSMTIO`子组件包含有关直接路径读取决策的有趣信息。这里显示的第一个跟踪是关于一个变成了智能扫描的直接路径读取：\n\
  \n```sql\nSQL> select value from v$diag_info\n  2  where name like 'Default%';\n\
  VALUE\n------------------------------------------------------------------\n/u01/app/oracle/diag/rdbms/dbm01/dbm011/trace/dbm011_ora_32020.trc\n\
  \nSQL> alter session set events 'trace[nsmtio]';\nSession altered.\nElapsed: 00:00:00.00\n\
  \nSQL> select count(*) from bigtab;\n  COUNT(*)\n----------\n 256000000\nElapsed:\
  \ 00:00:08.10\n\nSQL> !cat /u01/app/oracle/diag/rdbms/dbm01/dbm011/trace/dbm011_ora_32020.trc\n\
  NSMTIO: kcbism: islarge 1 next 0 nblks 10250504 type 3, bpid 65535, kcbisdbfc 0\
  \ kcbnhl 262144 kcbstt 44648 keep_nb 0 kcbnbh 2232432 kcbnwp 3\nNSMTIO: kcbism:\
  \ islarge 1 next 0 nblks 10250504 type 2, bpid 3, kcbisdbfc 0 kcbnhl 262144 kcbstt\
  \ 44648 keep_nb 0 kcbnbh 2232432 kcbnwp 3\nNSMTIO: kcbimd: nblks 10250504 kcbstt\
  \ 44648 kcbpnb 223243 kcbisdbfc 3 is_medium 0\nNSMTIO: kcbivlo: nblks 10250504 vlot\
  \ 500 pnb 2232432 kcbisdbfc 0 is_large 0\nNSMTIO: qertbFetch:[MTT < OBJECT_SIZE\
  \ < VLOT]:\nChecking cost to read from caches(local/remote) and checking storage\
  \ reduction factors (OLTP/EHCC Comp)\nNSMTIO: kcbdpc:DirectRead: tsn: 7, objd: 34422,\
  \ objn: 20491 ckpt: 1, nblks: 10250504, ntcache: 2173249, ntdist:2173249\nDirect\
  \ Path for pdb 0 tsn 7  objd 34422 objn 20491\nDirect Path 1 ckpt 1, nblks 10250504\
  \ ntcache 2173249 ntdist 2173249\nDirect Path mndb 0 tdiob 6 txiob 0 tciob 43\n\
  Direct path diomrc 128 dios 2 kcbisdbfc 0\nNSMTIO: Additional Info: VLOT=11162160\n\
  Object# = 34422, Object_Size = 10250504 blocks\nSqlId = 8c9rzdry8yahs, plan_hash_value\
  \ = 2140185107, Partition# = 0\n```\n\n`BIGTAB`相对较大，有 10250504 个块。早期的 Exadata 软件版本会执行段头的单块读取来确定对象大小。自\
  \ 11.2.0.2 起，隐藏参数`_direct_read_decision_statistics_driven`被设置为`TRUE`，这意味着将改为查阅字典统计信息。有\
  \ 2173249 个块被缓存在缓冲区缓存中，这似乎在这里没有起作用。然而，如果有太多块被缓存，则可能会选择带缓冲的访问路径，而不是直接路径读取。\n\n表访问函数(`qertbFetch`)报告该对象大于\
  \ MTT（中等表阈值）而小于 VLOT（非常大对象阈值）。幸运的是，这里显示了相关语句的`SQL_ID`和计划哈希值，以及分区信息。\n\n不幸的是，中等表阈值在区间定义[`MTT\
  \ < OBJECT_SIZE < VLOT`]中有点误导。MTT 计算为`_small_table_threshold`（STT）的五倍，乍一看似乎是开始考虑直接路径读取的分界点。这对于早期的\
  \ 11.2 版本可能是正确的。在 11.2.0.3 及更高版本（包括 12c）中的测试表明，即使段只比 STT 大一点，也符合直接路径读取的条件。此时的决策基于缓冲区缓存中的块数（在\
  \ RAC 中会考虑远程和本地）及其类型。这在跟踪中由“checking cost to read from caches (local/remote) and\
  \ checking storage reduction factors...”这一行指示。\n\n另一方面，如果没有直接路径读取，对于一个非常小的表，你会看到类似这样的内容：\n\
  \n```text\nNSMTIO: kcbism: islarge 0 next 0 nblks 4 type 3, bpid 65535, kcbisdbfc\
  \ 0 kcbnhl 262144 kcbstt 48117 keep_nb 0 kcbnbh 2405898 kcbnwp 3\nNSMTIO: kcbism:\
  \ islarge 0 next 0 nblks 4 type 2, bpid 3, kcbisdbfc 0 kcbnhl 262144 kcbstt 48117\
  \ keep_nb 0 kcbnbh 2405898 kcbnwp 3\nNSMTIO: qertbFetch:NoDirectRead :[- STT < OBJECT_SIZE\
  \ < MTT]:Obect’s size: 4 (blocks), Threshold: MTT(240589 blocks),\n```\n\n\n\n"
- "# Exadata 智能扫描深度解析\n\n`_object_statistics: enabled, Sage: enabled,`\n`Direct Read\
  \ for serial qry: enabled(::::kctfsage::), Ascending SCN table scan: FALSE`\n`flashback_table_scan:\
  \ FALSE, Row Versions Query: FALSE`\n`SqlId: 71acyavyyg1dg, plan_hash_value: 2604480108,\
  \ Object#: 25576, Parition#: 0`\n`DW_scan: disabled`\n\n在此跟踪信息中，您可以看到对象太小——只有四个块。由于段小于\
  \ `_small_table_threshold`，因此未选择直接路径读取。跟踪的最后一个参数也很有趣：`DW_SCAN` 与自动大表缓存（ABTC）相关，而与将查询卸载到存储服务器无关。\n\
  \n还有另一种可以识别的情况。它与 VLOT（非常大对象阈值）有关。您可以在第一个 `NSMTIO` 列表中看到一个引用，其中 `BIGTAB` 小于该阈值。VLOT\
  \ 默认为 500，即缓冲区缓存大小的五倍。第一个 `NSMTIO` 跟踪中提供的附加信息显示 VLOT 为 11162160。实例的缓冲区缓存大小约为 20GB，即\
  \ 2232432 个缓冲区。实例缓冲区缓存中的当前缓冲区数量可以从 `v$db_cache_advise` 中检索，如下所示：\n\n```sql\nSQL>\
  \ select block_size,size_for_estimate,buffers_for_estimate\n  2  from v$db_cache_advice\
  \ where size_factor = 1 and name = 'DEFAULT';\n\nBLOCK_SIZE SIZE_FOR_ESTIMATE BUFFERS_FOR_ESTIMATE\n\
  ---------- ----------------- --------------------\n      8192             20608\
  \              2232432\n```\n\n将 2232432 乘以 5 返回 11162160；请记住，`db_block_buffers`\
  \ 是以块而非字节为单位进行测量的。\n\n虽然执行串行直接路径读取的能力已经存在一段时间，但自 Oracle 11g 以来才变得相对常见。Oracle Database\
  \ 11gR2 对用于确定是否对非并行扫描使用直接路径读取的计算进行了修改。对算法的新修改使得直接路径读取机制比以前版本更有可能发生。这可能是由于 Exadata\
  \ 的智能扫描优化以及希望尽可能触发这些优化而采取的措施。该算法在非 Exadata 平台上可能有些过于激进。\n\n## Exadata 存储\n\n当然，要进行智能扫描，数据必须存储在\
  \ Exadata 存储上。可以在 Exadata 数据库服务器上创建访问非 Exadata 存储的 ASM 磁盘组。当然，任何访问使用这些非 Exadata\
  \ 磁盘组定义的对象的 SQL 语句都将不符合卸载条件。\n\n虽然不常见，但也可以使用 Exadata 和非 Exadata 存储的组合创建 ASM 磁盘组。由于无法将光纤通道主机总线适配器放入\
  \ Exadata 计算节点，因此网络连接存储是唯一的选择。随着 NAS 解决方案（如 ZFS 存储设备）的推出，将较冷的数据移动到更便宜的存储并通过 `dNFS`\
  \ 访问变得越来越普遍。我们在第 3 章中，在自动数据优化（ADO）的上下文中讨论了此场景。\n\n针对段驻留在混合存储上的对象的查询不符合卸载条件。实际上，ASM\
  \ 磁盘组有一个属性（`cell.smart_scan_capable`）指定磁盘组是否能够处理智能扫描。在将非 Exadata 存储分配给 ASM 磁盘组之前，必须将此属性设置为\
  \ `FALSE`。\n\n字典视图 `DBA_TABLESPACES` 有一个名为 `PREDICATE_EVALUATION` 的属性，您也可以查询。以下是针对我们的\
  \ X4-2 半机架实验室数据库查询的输出：\n\n```sql\nSQL> select tablespace_name, bigfile, predicate_evaluation\n\
  \  2  from dba_tablespaces;\n\nTABLESPACE_NAME                BIG PREDICA\n------------------------------\
  \ --- -------\nSYSTEM                         NO  STORAGE\nSYSAUX              \
  \           NO  STORAGE\nUNDOTBS1                       YES STORAGE\nTEMP      \
  \                     YES STORAGE\nUNDOTBS2                       YES STORAGE\n\
  UNDOTBS3                       YES STORAGE\nUNDOTBS4                       YES STORAGE\n\
  USERS                          NO  STORAGE\nSOE                            YES STORAGE\n\
  SH                             YES STORAGE\n```\n\n## 智能扫描禁用器\n\n在某些情况下，智能扫描实际上被禁用。简单的情况是它们在代码中尚未启用，因此智能扫描根本无法发生。还有其他情况是\
  \ Oracle 开始走智能扫描路径，但存储软件决定或被迫恢复为块传输模式。通常，此决策是逐块做出的。智能扫描禁用器的完整列表可在 Exadata 文档集中找到，幸运的是，在撰写本文时该文档是公开可用的。请参阅《存储服务器软件用户指南》第\
  \ 7 章中的“将 SQL EXPLAIN PLAN 命令与 Oracle Exadata 存储服务器软件结合使用”部分。您可能需要时不时地参考它，因为 Oracle\
  \ 不断增强软件，当前的限制可能会在未来的版本中解除。\n\n### 完全不可用\n\n在讨论智能扫描优化时，您了解了启用智能扫描必须满足的先决条件。然而，即使满足这些条件，也有一些情况会阻止智能扫描。以下是其他一些与特定优化无关，但根本无法使用智能扫描的情况：\n\
  \n*   在集群表或索引组织表（IOT）上\n*   查询扫描行外 LOB 或 LONG 数据类型\n*   在启用了 `ROWDEPENDENCIES` 的表上\n\
  *   查询包含 `flashback_query_clause` 的情况\n*   无法对反向键索引卸载查询的情况\n*   在非 Exadata 存储上查询数据的情况\n\
  \n您在前面的部分还看到了一些影响智能扫描行为的参数。如果您将 `CELL_OFFLOAD_PROCESSING` 设置为 `FALSE` 或将 `_SERIAL_DIRECT_READ`\
  \ 设置为 `never`，那么根据定义，您无法拥有智能扫描。\n\n\n\n### 回退至块传输模式\n\n存在一些使用了智能扫描（Smart Scans）的场景，但由于各种原因，`cellsrv`\
  \ 会回退到块传输模式。这是一个非常复杂的话题，我们曾犹豫是否要在关于卸载（offloading）的入门章节中包含它。但由于它是一个基本概念，我们决定在此简要讨论。关于此主题的更多细节，请参阅第\
  \ 11 章。\n\n到目前为止，本章将智能扫描描述为一种避免将大量数据传输到数据库层的手段，其方式是直接将预过滤的数据返回给`PGA`。主要工作由存储单元（storage\
  \ cells）承担——存储单元越多，扫描执行得就越快。你的查询即使只返回表中 2%的数据，也并不意味着你可以避免扫描全部数据，正如你可以在`V$SQL`以及本书后续将介绍的其他地方所看到的那样。请记住，存储单元彼此之间完全独立运行；换句话说，它们在查询处理期间**从不**进行通信。查询处理期间的通信仅限于存储服务器与计算节点（如果查询在集群中并行处理，则是多个节点）之间的信息交换。在此上下文中，另一个重要信息是智能扫描只会返回一致读（consistent\
  \ reads），而不是当前块（current blocks）。\n\n偶尔，智能扫描可以选择（或被强制）将完整的块返回给`SGA`。基本上，任何导致 Oracle\
  \ 需要读取另一个块来完成/回滚记录到某个快照`SCN`（系统更改号）的情况，都会导致此行为发生。链接行（chained row）是另一个，也许是最简单的例子。当\
  \ Oracle 遇到链接行时，该行的头部将包含一个指向包含第二行片（row piece）的块的指针。由于存储单元彼此之间不直接通信，并且链接的块很可能不在同一个存储单元上，`cellsrv`\
  \ 便直接传输整个块，并由数据库层来处理它。\n\n在这个非常简单的情况下，智能扫描会暂停片刻，并有效地执行一次单块读取，这又促使另一次单块读取以获取额外的行片。请记住，这是一个非常简单的情况。\n\
  \n当 Oracle 必须处理读一致性问题时，也会出现同样的行为。例如，如果 Oracle 注意到一个块比当前查询的`SCN`“更新”，那么查找该块适当年龄版本的过程就交由数据库层处理。这实际上会暂停智能扫描处理，同时数据库执行其传统的读一致性处理。延迟块清理（Delayed\
  \ block cleanout）是另一个可能需要暂停智能扫描的类似情况。\n\n> 注意\n>\n> 本节篇幅太短，无法完整恰当地传达全貌；这些场景的复杂程度远超我们在入门章节想要涵盖的范围。所有细节都可以在第\
  \ 11 章中找到。\n\n那么，这真的重要吗？你为什么应该关心？答案当然是：视情况而定。在大多数情况下，你可能无需担心。Oracle 保证读取是一致的，即使在使用智能扫描时也是如此。一些优化措施，例如第\
  \ 11 章中讨论的提交缓存（commit cache），有助于加速处理。从应用的角度来看，无论是否使用智能扫描，Oracle 的行为都完全相同，这一点非常重要。Exadata\
  \ 并非一个高度专业的分析引擎。它使用的仍是与其他所有人完全相同的数据库软件。如果结果是正确的，且性能没有受到严重影响，那么 Oracle 可能在进行智能扫描的同时做一些单块读取这件事就无需过多担心，而且在大多数情况下也不会有影响。然而，在某些情况下，选择执行智能扫描然后回退到块传输模式，从性能角度来看可能会很痛苦。正是在这些情况下，理解底层发生的事情才变得重要。再次说明，你可以在第\
  \ 11 章中找到关于此问题的更多信息。\n\n### 跳过部分卸载处理\n\n我们将要简要提及的另一个非常复杂的行为是 `cellsrv` 拒绝执行某些正常卸载处理的能力。这样做可能是为了避免使存储单元上的\
  \ CPU 资源过载。这种行为的一个很好的例子发生在解压缩 `HCC`（混合列压缩）数据时。解压缩是一项极其消耗 CPU 的任务，特别是对于较高的压缩级别。自\
  \ Exadata 存储软件 11.2.2.3.0 及更高版本起，当存储单元上的 CPU 非常繁忙时，`cellsrv` 可以选择跳过对部分数据的解压缩步骤。这通过强制数据库主机进行解压缩，有效地将部分工作负载移回数据库层。\n\
  \n### 静默跳过卸载处理\n\n有时，Exadata 软件不得不回退到所谓的 `passthrough mode`（直通模式）。这可能是一个令人担忧的问题，因为它并不总是明显发生了这种情况，尤其是在\
  \ 11g Release 2 中。通过一个例子可以最好地解释这个问题。以下查询通常执行时间很短：\n\n```\nSQL> select count(*) from\
  \ bigtab where id = 80000;\n\n  COUNT(*)\n----------\n        32\nElapsed: 00:00:00.83\n\
  ```\n\n假设该语句突然需要 25 秒才能执行。系统化的方法是检查执行计划是否改变、统计数据是否更新、数据量是否变化等等。但这次什么都没变（这次是真的没变）。该语句在不到一秒内执行时是被卸载到存储单元上的，现在检查你也可以看到等待事件也指示了卸载。如果你有使用\
  \ `ASH`（活动会话历史）的许可，你可以使用一个非常基础的查询来验证这一点：\n\n```\nSQL> select count(*), event, session_state\
  \ from v$active_session_history\n  2  where sql_id = '0pmmwn5xq8h9a' group by event,\
  \ session_state;\n\n  COUNT(*) EVENT                        SESSION\n----------\
  \ ---------------------------- -------\n        28                             \
  \  ON CPU\n        46 cell smart table scan        WAITING\n```\n\n有趣的是，正如 `Cell\
  \ Smart Table Scan` 事件的存在所表明的，查询是被卸载处理的。“为什么这么慢？”这个问题的答案，必定在别处。有点超前地说，它在于会话统计信息中。使用第\
  \ 11 章中描述的工具 `snapper` 或 `mystats`，你可以发现存在大量的 `passthrough`（直通）操作：\n\n```\nType\
  \    Statistic Name                                                   Value\n------\
  \  ----------------------------------------------------------------  ----------------\n\
  STAT    cell num bytes in passthru during predicate offload             28,004,319,232\n\
  STAT    cell num smart IO sessions using passthru mode due to cellsrv          \
  \      1\nSTAT    cell physical IO bytes eligible for predicate offload        \
  \   83,886,137,344\nSTAT    cell physical IO bytes saved by storage index      \
  \             51,698,524,160\nSTAT    cell physical IO interconnect bytes returned\
  \ by smart scan      28,004,930,160\n```\n\n`直通模式` 意味着存储单元仍然执行部分智能扫描，但它们不应用谓词过滤，而是将整个块传递给\
  \ `RDBMS` 层。你可以在第 11 章中阅读更多关于 `直通模式` 的内容。\n\n\n## 如何验证智能扫描正在发生\n\n关于 Exadata，你需要学习的最重要的内容之一就是如何识别一个查询是否能够利用智能扫描。有趣的是，由\
  \ `DBMS_XPLAN` 包生成的普通执行计划输出**不会**显示是否使用了智能扫描。下面是一个示例：\n\n```\nPLAN_TABLE_OUTPUT\n\
  -------------------------------------\nSQL_ID  2y17pb7bnmpt0, child number 0\n-------------------------------------\n\
  select count(*) from bigtab where id = 17000\n\nPlan hash value: 2140185107\n\n\
  -------------------------------------------------------------------------------------\n\
  | Id  | Operation                  | Name   | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT           |        |       |       |  2779K(100)|     \
  \     |\n|   1 |  SORT AGGREGATE            |        |     1 |     6 |         \
  \   |          |\n|*  2 |   TABLE ACCESS STORAGE FULL| BIGTAB |    32 |   192 |\
  \  2779K  (1)| 00:01:49 |\n-------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - storage(\"ID\"=17000)\n       filter(\"ID\"=17000)\n```\n\n注意，优化器选择了一个 `TABLE\
  \ ACCESS STORAGE FULL` 操作，并且谓词部分显示了一个与计划第 2 步关联的 `storage()` 谓词。这两个特征都表明**可能**发生了智能扫描，但都不能提供确凿的验证。实际上，这个清单中的语句**并没有**使用智能扫描执行。如果你想知道原因，那是因为我们在执行查询前，在会话中将\
  \ `_serial_direct_read` 设置为了 `never`。\n\n执行计划不显示是否进行了智能扫描，这一点有些令人沮丧。不过，有几种技术可以用来解决这个问题。接下来的几节将介绍一些实用的技术。请注意，关于分析智能扫描是否发生以及其效率如何的主题，在第\
  \ 10 章和第 11 章中有更详细的介绍。\n\n### 10046 跟踪\n\n确定是否使用了智能扫描最直接的方法之一是对目标语句启用 10046 跟踪。不幸的是，这种方法有点繁琐，并且不允许你对过去的执行情况进行调查。尽管如此，跟踪是一种相当可靠的方法来验证是否使用了智能扫描。如果使用了智能扫描，跟踪文件中将包含\
  \ `CELL SMART TABLE SCAN` 或 `CELL SMART INDEX SCAN` 事件。以下是为前述语句收集的跟踪文件摘录（已重新格式化以提高可读性）：\n\
  \n```\nPARSING IN CURSOR #1..4 len=44 dep=0 uid=65 oct=3 lid=65 tim=1625363834946\n\
  \  hv=3611940640 ad='5e7a2e420' sqlid='2y17pb7bnmpt0'\nWAIT #139856525281664: nam='cell\
  \ single block physical read' ela= 1237 ...\nWAIT #139856525281664: nam='cell single\
  \ block physical read' ela= 651 ...\nWAIT #139856525281664: nam='cell single block\
  \ physical read' ela= 598 ...\n...\nWAIT #139856525281664: nam='cell multiblock\
  \ physical read' ela= 1189 ...\nWAIT #139856525281664: nam='cell single block physical\
  \ read' ela= 552 ...\nWAIT #139856525281664: nam='cell multiblock physical read'\
  \ ela= 596 ...\nWAIT #139856525281664: nam='cell multiblock physical read' ela=\
  \ 612 ...\nWAIT #139856525281664: nam='cell multiblock physical read' ela= 607 ...\n\
  WAIT #139856525281664: nam='cell multiblock physical read' ela= 632 ...\nWAIT #139856525281664:\
  \ nam='cell multiblock physical read' ela= 618 ...\n[...]\n```\n\n请注意，此部分跟踪文件中记录的事件是单块读和多块读。Oracle\
  \ 借此机会将 `db file sequential read` 和 `db file scattered read` 等待事件重命名为更不易混淆的 `cell\
  \ single-block read` 和 `cell multi-block read`。下面是一个显示智能扫描的示例：\n\n```\nPARSING IN\
  \ CURSOR #139856525283104 len=44 dep=0 uid=65 oct=3 lid=65 tim=1625653524727\n \
  \ hv=3611940640 ad='5e7a2e420' sqlid='2y17pb7bnmpt0'\nselect count(*) from bigtab\
  \ where id = 17000\nEND OF STMT\nPARSE #139856525283104:c=0,e=117,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=2140185107,...\n\
  EXEC #139856525283104:c=0,e=55,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=2140185107,...\n\
  WAIT #139856525283104: nam='SQL*Net message to client' ela= 3 ...\nWAIT #139856525283104:\
  \ nam='reliable message' ela= 1049 channel context=26855200120 ...\nWAIT #139856525283104:\
  \ nam='enq: KO - fast object checkpoint' ela= 298 ...\nWAIT #139856525283104: nam='enq:\
  \ KO - fast object checkpoint' ela= 156 ...\nWAIT #139856525283104: nam='cell smart\
  \ table scan' ela= 151 ...\nWAIT #139856525283104: nam='cell smart table scan' ela=\
  \ 168 ...\nWAIT #139856525283104: nam='cell smart table scan' ela= 153 ...\nWAIT\
  \ #139856525283104: nam='cell smart table scan' ela= 269 ...\nWAIT #139856525283104:\
  \ nam='cell smart table scan' ela= 209 ...\nWAIT #139856525283104: nam='cell smart\
  \ table scan' ela= 231 ...\nWAIT #139856525283104: nam='cell smart table scan' ela=\
  \ 9 ...\n[...]\n```\n\n在第二个例子中，你可以看到许多 `cell smart table scan` 事件，这表明处理已经下推到了存储层。\n\
  \n### 会话性能统计\n\n另一种方法是查看一些性能视图，例如 `V$SESSSTAT` 和 `V$MYSTAT`。这种方法常常被忽视，但正如你在关于直通模式章节中所见，它非常有用。要调查当前正在执行\
  \ SQL 语句的会话中发生了什么，一个极好的方法是使用 Tanel Poder 的 `Snapper` 脚本。它提供了一个很好的方式来查看语句运行时产生了哪些等待事件。此外，它还可以捕获在观察\
  \ SQL 语句期间会话计数器的变化。`Snapper` 专注于**当前正在执行**的 SQL 语句；它不是用来回溯历史数据的。\n\n只要你能在调查的语句执行期间访问系统，性能统计就是一个可靠的数据源。以下是一个使用\
  \ `V$MYSTATS` 的例子，它只是 `V$SESSSTAT` 的一个版本，将数据限制为当前会话。在这个例子中，重点是 `cell scans` 统计信息，当某个段上发生智能表扫描时，该计数器会增加：\n\
  \n```\nSQL> @mystat\nEnter value for name: cell scans\nNAME                    \
  \   VALUE\n--------------------------------\ncell scans                      0\n\
  Elapsed: 00:00:00.04\n\nSQL> select count(*) from bigtab where id = 17001;\n  COUNT(*)\n\
  ----------\n        32\nElapsed: 00:00:00.44\n\nSQL> @mystat\nEnter value for name:\
  \ cell scans\nNAME                       VALUE\n--------------------------------\n\
  cell scans                      1\nElapsed: 00:00:00.02\n\nSQL>\n```\n\n如你所见，该查询触发了会话计数器的递增。可以肯定地说，在两次执行\
  \ `mystats` 脚本之间发生了一次智能扫描。\n\n**注意**\n\n请不要混淆此脚本与本章中提到的另一个名为 `mystats` 的脚本。`mystat`\
  \ 脚本从 `v$mystat` 中选择数据，并打印给定会话计数器的当前值。而 `mystats`（由 Adrian Billington 编写，可从 `oracle-developer.net`\
  \ 获取）计算在执行 SQL 语句期间会话计数器的变化，类似于默认模式下的 `Snapper`，但它是从开始到结束进行计算的。\n\n关于会话计数器还有很多内容可讲，我们在第\
  \ 11 章中会进行介绍。\n\n\n## 可卸载字节数\n\n判断一条语句是否使用了智能扫描（Smart Scan）还有另一个线索。正如你在前面章节中看到的，`V$SQL`系列视图包含一个名为`IO_CELL_OFFLOAD_ELIGIBLE_BYTES`的列，它显示了有资格进行卸载的字节数。该列可以用作判断语句是否使用了智能扫描的指标。该列似乎只有在使用了智能扫描时才会被设置为大于\
  \ 0 的值。你可以利用这一观察结果编写一个简短的脚本（`fsx.sql`），该脚本根据`V$SQL`中该列的值是否大于 0 返回`YES`或`NO`。该脚本的输出对于书籍格式来说有点过宽，因此在示例中提供了几个精简版本。当然，所有版本都可以在线上代码仓库中找到。你在前面的几个章节中已经看到了该脚本的实际运行。为方便起见，将脚本及其使用示例展示如下：\n\
  \n```sql\n> !cat fsx.sql\n\n----------------------------------------------------------------------------------------\n\
  --\n-- File name:   fsx.sql\n--\n-- Purpose:     Find SQL and report whether it\
  \ was Offloaded and % of I/O saved.\n--\n-- Usage:       This scripts prompts for\
  \ two values.\n--\n--              sql_text: a piece of a SQL statement like %select\
  \ col1, col2 from skew%\n--\n--              sql_id: the sql_id of the statement\
  \ if you know it (leave blank to ignore)\n--\n-- Description:\n--\n--              This\
  \ script can be used to locate statements in the shared pool and\n--              determine\
  \ whether they have been executed via Smart Scans.\n--\n--              It is based\
  \ on the observation that the IO_CELL_OFFLOAD_ELIGIBLE_BYTES\n--              column\
  \ in V$SQL is only greater than 0 when a statement is executed\n--              using\
  \ a Smart Scan. The IO_SAVED_% column attempts to show the ratio of\n--              of\
  \ data received from the storage cells to the actual amount of data\n--              that\
  \ would have had to be retrieved on non-Exadata storage. Note that\n--              as\
  \ of 11.2.0.2, there are issues calculating this value with some queries.\n--\n\
  --              Note that the AVG_ETIME will not be acurate for parallel queries.\
  \ The\n--              ELAPSED_TIME column contains the sum of all parallel slaves.\
  \ So the\n--              script divides the value by the number of PX slaves used\
  \ which gives an\n--              approximation.\n--\n--              Note also\
  \ that if parallel slaves are spread across multiple nodes on\n--              a\
  \ RAC database the PX_SERVERS_EXECUTIONS column will not be set.\n--\n---------------------------------------------------------------------------------------\n\
  set pagesize 999\nset lines 190\ncol sql_text format a70 trunc\ncol child format\
  \ 99999\ncol execs format 9,999\ncol avg_etime format 99,999.99\ncol \"IO_SAVED_%\"\
  \ format 999.99\ncol avg_px format 999\ncol offload for a7\nselect sql_id, child_number\
  \ child, plan_hash_value plan_hash, executions execs,\n(elapsed_time/1000000)/decode(nvl(executions,0),0,1,executions)/\n\
  decode(px_servers_executions,0,1,px_servers_executions/\ndecode(nvl(executions,0),0,1,executions))\
  \ avg_etime,\npx_servers_executions/decode(nvl(executions,0),0,1,executions) avg_px,\n\
  decode(IO_CELL_OFFLOAD_ELIGIBLE_BYTES,0,'No','Yes') Offload,\ndecode(IO_CELL_OFFLOAD_ELIGIBLE_BYTES,0,0,\n\
  100*(IO_CELL_OFFLOAD_ELIGIBLE_BYTES-IO_INTERCONNECT_BYTES)\n/decode(IO_CELL_OFFLOAD_ELIGIBLE_BYTES,0,1,IO_CELL_OFFLOAD_ELIGIBLE_BYTES))\n\
  \"IO_SAVED_%\", sql_text\nfrom v$sql s\nwhere upper(sql_text) like upper(nvl('&sql_text',sql_text))\n\
  and sql_text not like 'BEGIN :sql_text := %'\nand sql_text not like '%IO_CELL_OFFLOAD_ELIGIBLE_BYTES%'\n\
  and sql_id like nvl('&sql_id',sql_id)\norder by 1, 2, 3\n/\n```\n\n\n\n在 `fsx` 脚本中，可以看到\
  \ `OFFLOAD` 列实际上是一个 `DECODE` 函数，用于检查 `IO_CELL_OFFLOAD_ELIGIBLE_BYTES` 列是否等于 0。`IO_SAVED_%`\
  \ 列是通过 `IO_INTERCONNECT_BYTES` 字段计算得出的，它试图显示有多少数据被返回给了数据库服务器。\n\n该脚本可用于多种实用目的。作者主要用它来查找共享池中\
  \ SQL 语句的 `SQL_ID` 和子游标号。在此示例中，它用于判断一条语句是否已被卸载：\n\n```sql\nSQL> select /*+ gather_plan_statistics\
  \ fsx-example-002 */\n  2  avg(id) from bigtab where id between 1000 and 50000;\n\
  \nAVG(ID)\n----------\n     25500\n\nElapsed: 00:00:00.64\n\nSQL> alter session\
  \ set cell_offload_processing=false;\n\nSession altered.\n\nElapsed: 00:00:00.00\n\
  \nSQL> select /*+ gather_plan_statistics fsx-example-002 */\n  2  avg(id) from bigtab\
  \ where id between 1000 and 50000;\n\nAVG(ID)\n----------\n     25500\n\nElapsed:\
  \ 00:00:53.88\n\nSQL> @fsx4\nEnter value for sql_text: %fsx-example-002%\nEnter\
  \ value for sql_id:\n\nSQL_ID          CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n\
  ------------- ------ ------- ---------- ---------- ----------------------------------------\n\
  cj0p52wha5wb8      0 Yes          99.97        .63 select /*+ gather_plan_statistics\
  \ fsx-ex\ncj0p52wha5wb8      1 No             .00      53.88 select /*+ gather_plan_statistics\
  \ fsx-ex\n\n2 rows selected.\n```\n\n执行时间已经能大致说明语句是否被卸载，但如果是事后才介入分析，`fsx` 脚本的输出清晰地显示子游标号\
  \ (`child_number`) 为 1 的语句未被卸载。在此示例中，创建了一个新的子游标，这一点非常重要。当将 `CELL_OFFLOAD_PROCESSING`\
  \ 设置为 `FALSE` 时，优化器由于不匹配而创建了一个新的子游标。创建子游标的原因可以在 `v$sql_shared_cursor` 中找到。该视图包含一长串标志，可用于识别子游标之间的差异，但在\
  \ SQL*Plus 中非常难以阅读。Oracle 在 11.2.0.2 版本中添加了一个包含 XML 数据的 CLOB 列，使得差异更容易发现。利用上一个示例中的\
  \ SQL ID，可以演示其用法。请注意，我将 CLOB 转换为 XML 以增强可读性：\n\n```sql\nSQL> select xmltype(reason)\
  \ from v$sql_shared_cursor\n  2   where sql_id = 'cj0p52wha5wb8' and child_number\
  \ = 0;\n\nXMLTYPE(REASON)\n---------------------------------------------------------------------------\n\
  <ChildNode>\n  <ChildNumber>0</ChildNumber>\n  <ID>3</ID>\n  <reason>Optimizer mismatch(12)</reason>\n\
  \  <size>2x356</size>\n  <cell_offload_processing> true     false  </cell_offload_processing>\n\
  </ChildNode>\n```\n\n将 XML 输出翻译成简单的英文，可以看到存在一个优化器不匹配：参数 `cell_offload_processing`\
  \ 从 `TRUE` 更改为 `FALSE`。\n\n更改参数后并不总是会创建子游标。某些下划线参数（如 `_SERIAL_DIRECT_READ`）不会导致创建新的子游标。同一游标的某些执行可能会被卸载，而其他则不会。这可能相当令人困惑，尽管这种情况应该非常罕见！下面是一个演示效果的示例：\n\
  \n```sql\nSQL> select /*+ gather_plan_statistics fsx-example-004 */ avg(id)\n  2\
  \  from bigtab where id between 1000 and 50002;\n\nAVG(ID)\n----------\n     25501\n\
  \nElapsed: 00:00:00.68\n\nSQL> alter session set \"_serial_direct_read\" = never;\n\
  \nSession altered.\n\nElapsed: 00:00:00.00\n\nSQL> select /*+ gather_plan_statistics\
  \ fsx-example-004 */ avg(id)\n  2  from bigtab where id between 1000 and 50002;\n\
  \nAVG(ID)\n----------\n     25501\n\nElapsed: 00:04:50.32\n\nSQL> SQL> alter session\
  \ set \"_serial_direct_read\" = auto;\n\nSession altered.\n\nElapsed: 00:00:00.00\n\
  \nSQL> select /*+ gather_plan_statistics fsx-example-004 */ avg(id)\n  2  from bigtab\
  \ where id between 1000 and 50002;\n\nAVG(ID)\n----------\n     25501\n\nElapsed:\
  \ 00:00:00.63\n\nSQL> @fsx4\nEnter value for sql_text: %fsx-example-004%\nEnter\
  \ value for sql_id:\n\nSQL_ID          CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n\
  ------------- ------ ------- ---------- ---------- ----------------------------------------\n\
  6xh6qwv302p13      0 Yes          55.17      97.21 select /*+ gather_plan_statistics\
  \ fsx-ex\n```\n\n如你所见，有三次执行使用的是同一个子游标（没有创建新的子游标）。关于 I/O 节省和执行时间的统计信息现在几乎没有价值了：两次执行在不到一秒内完成，一次则花了近五分钟。这就是众所周知的平均值问题：它们掩盖了细节。\n\
  \n\n"
