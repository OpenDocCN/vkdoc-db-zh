- "# Exadata 写回闪存缓存与智能扫描优化\n\n## 写回闪存缓存模式概述\n\n您可以稍后在本节中详细了解**写回闪存缓存**模式，但由于其概念非常重要，此处仍展示其高级步骤。在**写回模式**下运行时，所有的\
  \ I/O 首先进入闪存设备，而不是磁盘，至少初始如此。可以将**闪存缓存**视作企业级存储阵列中的缓存。如果**闪存缓存**已满，一个算法将评估其内容并将数据从**闪存缓存**写出到磁盘。**写透**与**写回**模式的另一个区别在于，缓存内容在重启后是持久的。由于数据可能位于闪存卡上且尚未写出到磁盘，因此也需要使用\
  \ ASM 冗余来保护其免受故障影响。\n\n## Exadata 软件版本 11.2.3.3.0 的变革\n\n从 Exadata 软件版本 `11.2.3.3.0`\
  \ 开始，Oracle 从根本上改变了数据扫描的方式。在此之前，哪个组件负责什么任务有着明确的区分：**智能闪存缓存**主要用于单块 I/O。**智能扫描**由机械磁盘满足。如果您确实希望将**闪存缓存**用于**智能扫描**，则必须更改相关段的存储子句。其背后的逻辑很有说服力：不同的设备在操作系统中有不同的\
  \ I/O 队列，通过将 OLTP 应用程序典型的单块 I/O 与大型多块 I/O 操作分开，可以在相同的 Exadata 硬件上放置具有不同 I/O 工作负载特征的应用程序。再加上\
  \ I/O 资源管理器，每个人都拥有一个行为良好的系统。这在 V2 和 X2 的时代尤其有效，这两款系统与当今的 X5 系统相比，可用的闪存都非常少。您所拥有的容量在大多数情况下可能最好用于\
  \ OLTP 工作负载。您可以在 AWR 的“等待事件直方图”中针对“`cell single block physical read`”事件看到这一点。在绝大多数情况下，您应该会看到平均等待时间约为\
  \ 1 毫秒或更短。\n\n## 硬件进步与策略演进\n\n这里有一个注意事项：硬盘性能的增长速度并未与闪存性能同步，后者能够为每个设备提供数千 IOPS，其持续吞吐量是硬盘的许多倍。由于闪存基于硅而非磁记录，其发展周期比硬盘快得多，从而产生更快、更可靠且比上一代更小的组件。总之，闪存允许越来越大的容量，这在\
  \ Exadata 平台上得到了体现。X5 中可用的 `F160` 卡容量是其前代产品的两倍。X4 和 X5 中的闪存量，以及在较小程度上 X3 中的闪存，现在为架构师提供了更多的空间来缓存数据，甚至包括全表扫描的数据。这只需要对\
  \ `cellsrv` 软件进行更改，该更改随版本 `11.2.3.3.0` 到来。\n\n一旦您使用了这个特定版本（当然，或更新的版本），`cellsrv`\
  \ 将自动缓存值得缓存的热门数据，包括全表扫描。新版本的发布并未改变小 I/O 的缓存方式。主要区别在于，热门数据可以被缓存并供**智能扫描**使用，而无需更改段的默认存储子句。\n\
  \n## 示例演示的调整\n\n在本书的第一版中，我们曾展示一个示例，演示当**智能扫描**同时使用磁盘和**闪存缓存**时速度能快多少，但这需要将段的存储子句更改为\
  \ `CELL_FLASH_CACHE KEEP`。由于默认值已更改，演示也必须随之改变。在本例中，有必要明确禁止对表扫描使用**闪存缓存**以显示差异。为此，创建了两个表：`BIGT`\
  \ 和 `BIGT_ESFC`。\n\n```sql\nSQL> select table_name, num_rows, partitioned, compression,\
  \ cell_flash_cache\n  2  from tabs where table_name in ('BIGT','BIGT_ESFC');\n```\n\
  \n\n\n`TABLE_NAME                       NUM_ROWS PAR COMPRESS CELL_FL`\n`------------------------------\
  \ ---------- --- -------- -------`\n`BIGT_ESFC                       100000000 NO\
  \  DISABLED DEFAULT`\n`BIGT                            100000000 NO  DISABLED NONE`\n\
  `已选择 2 行。`\n\n`SQL> select segment_name, blocks, bytes/power(1024,3) g`\n`2  from\
  \ user_segments where segment_name in (’BIGT’,’BIGT_ESFC’);`\n\n`SEGMENT_NAME  \
  \                     BLOCKS          G`\n`------------------------------ ----------\
  \ ----------`\n`BIGT                             16683456 127.284668`\n`BIGT_ESFC\
  \                        16683456 127.284668`\n`已选择 2 行。`\n\n表`BIGT`将作为这里的参考对象；第一次扫描将尽可能少地使用`ESFC`。结果如下：\n\
