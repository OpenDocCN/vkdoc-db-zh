  OPTIMIZED_PHY_READ_REQUESTS                        NUMBER\nLOCKED_TOTAL        \
  \                               NUMBER\nPINNED_TOTAL                           \
  \            NUMBER\nIO_CELL_UNCOMPRESSED_BYTES                         NUMBER\n\
  IO_CELL_OFFLOAD_RETURNED_BYTES                     NUMBER\nCON_ID              \
