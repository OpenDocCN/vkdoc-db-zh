  你可以看到，在全局部分，报告显示了整个语句的存储单元卸载百分比。在详细信息部分，它还基于 ASH 样本显示了哪些步骤被卸载以及它们做了什么（活动详情）。它也显示了语句的时间花费在哪里（活动百分比）。对于那些有多个步骤适合卸载的更复杂语句来说，这极其有用。并行执行的语句会为每个查询服务器进程列出这些信息，这就引出了下一个值得提及的要点：对于更复杂的语句，SQL
  监控报告的文本版本可能变得难以阅读。你能获得的最有用的输出格式是向 `REPORT_LEVEL` 传递 `ALL`，并为 `TYPE` 参数传递 `ACTIVE`。生成的输出是一个
  HTML 文件，你可以在浏览器中打开并查看。Oracle 企业管理器也提供图形界面来访问 SQL 监控输出。你可以在第 12 章中了解更多关于 SQL 监控各个方面的信息。


  请注意，监控会自动发生在并行化的语句以及优化器预期会运行很长时间的语句上。如果 Oracle 没有自动选择监控你感兴趣的语句，你可以使用 `MONITOR` 提示来告诉
  Oracle 监控该语句，如示例所示。你可以检查 `V$SQL_MONITOR` 来查看是否能根据你的 `SQL_ID` 创建报告。


  ### 参数


  有几个参数适用于卸载。主要的是 `CELL_OFFLOAD_PROCESSING`，它控制卸载的开关。还有其他几个重要性稍低的参数。表 2-2 列出了影响卸载的非隐藏参数列表（截至
  Oracle 数据库版本 12.1.0.2）。请注意，我们还包含了控制这个非常重要的功能的隐藏参数 `_SERIAL_DIRECT_READ`。


  表 2-2.

  控制卸载的重要数据库参数


  | 参数 | 默认值 | 描述 |

  | --- | --- | --- |

  | `cell_offload_decryption` | `TRUE` | 控制是否卸载解密。请注意，当此参数设置为 `FALSE` 时，在加密数据上将完全禁用智能扫描。
  |

  | `cell_offload_plan_display` | `AUTO` | 控制在 `DBMS_XPLAN.DISPLAY%` 函数的执行计划输出中是否使用
  Exadata 操作名称。 |

  | `cell_offload_processing` | `TRUE` | 打开或关闭卸载。 |

  | `_serial_direct_read` | `AUTO` | 控制串行直接路径读取机制。有效值为 `ALWAYS`、`AUTO`、`TRUE`、`FALSE`
  和 `NEVER`。 |


  除了正常的 Oracle 批准的参数外，还有一些所谓的隐藏参数影响卸载的各个方面。你可以使用在线代码仓库中提供的 `parms.sql` 脚本来查看它们，以 SYSDBA
  身份连接并同时指定 `kcfis`（用于内核文件智能存储）和 `cell`（用于所有 cellsrv 相关的参数）。和以往一样，请注意，在未经 Oracle 支持事先讨论和同意的情况下，不应在
  Oracle 系统中使用隐藏参数，但它们确实为一些 Exadata 功能的工作方式和控制方式提供了有价值的线索。


  '
- '# 总结


  卸载确实是 Exadata 的“秘制酱料”。虽然硬件架构在提供存储层交付数据的能力与数据库层消费数据的能力之间更好的平衡方面做得很好，但大部分性能提升是由软件提供的。智能扫描在很大程度上对这些提升负责。这些优化的主要焦点是减少存储层和数据库层之间传输的数据量。如果你从头到尾阅读了整个章节，你无疑已经注意到涵盖的内容非常多。在可能的情况下，我们坚持了理解卸载所必需的基础知识。第
  10 章–11 章会详细介绍各个重要方面。它们介绍了所有相关的 Exadata 等待事件以及 Oracle 为每个会话跟踪的大部分性能计数器。第 12 章最终为你概述了分析
  Exadata 查询性能所需的工具。


  注意


  此页可能是故意留白的，因为每个章节都应在偶数页结束，即使需要在末尾添加一个空白页。



  '
- "# 3. 混合列式压缩\n\n混合列式压缩，或简称`(E)HCC`，曾经可能是`Exadata`中最被误解的功能之一，现在或许依然如此。自本书第一版以来，这一点并未真正改变，这也是我们如此强调它的原因。`HCC`最初是`Exadata`独有的功能，但现在其使用已面向更广泛的受众。在撰写本文时，任何想要使用`HCC`的人都必须使用`Exadata`或`Oracle\
  \ ZFS Storage Appliance`。`Pillar Axiom`系列存储阵列也原生支持处理`HCC`压缩数据，无需先解压缩。`Oracle`最新的存储产品`FS1`阵列，其规格表中也包含`HCC`功能。然而，能够卸载扫描`HCC`数据仍然是`Exadata`存储服务器的专属领域。\n\
  \n本章分为三个主要部分：\n\n*   Oracle 如何在磁盘上物理存储数据的介绍\n*   `HCC`背后的概念及其实施\n*   常见用例和自动化数据生命周期管理\n\
  \n在本章的第一部分，您将更多地了解`Oracle`数据库在所谓的“行式存储”格式中存储信息的方式。它解释了`Oracle`数据库块的结构以及两种可用的压缩方法：`BASIC`和`ADVANCED`。\n\
  \n在继续下一部分之前，了解`Oracle`块的剖析很重要，该部分介绍了`HCC`特有的“列式存储”格式。如果您好奇`HCC`中的“混合”之意，我们也将对此进行解释。然后，我们将讨论数据实际如何存储在磁盘上，以及压缩和解压缩将在何时何地发生。我们还将解释`HCC`压缩数据与传统的`I/O`执行方式相比，对`Smart\
  \ Scans`的影响。\n\n本章最后部分致力于介绍新的`Automatic Data Optimization`选项，该选项有助于自动化和强制实施数据生命周期管理。\n\
  \n## Oracle 存储概述\n\n如您可能已经知道，`Oracle`将数据存储在块结构中。如今这些块通常是`8k`。您在数据库创建期间定义默认块大小。在数据库创建后更改默认块大小即使不是不可能，也是非常困难的。有充分的理由在数据库中坚持使用`8k`块大小，因为`Oracle`似乎对其大部分回归测试都是针对该块大小进行的。而且，如果您确实需要，仍然可以创建具有不同（通常更大）块大小的表空间。\n\
  \n数据库块在更大的图景中处于什么位置？块是`Oracle`中最小的物理存储单元。多个块形成一个区（extent），多个区组成一个段（segment）。段是您在数据库中处理的对象，例如表、分区和子分区。\n\
  \n简单来说，块由头部、表目录、行目录、行数据和空闲空间组成。行头部从块的顶部开始并向下延伸，而行数据从底部开始并向上延伸。图 3-1 详细显示了标准`Oracle`块的各个组件。\n\
  \n![A978-1-4302-6242-8_3_Fig1_HTML.gif](img/A978-1-4302-6242-8_3_Fig1_HTML.gif)\n\
  \n图 3-1.\n\n标准的`Oracle`块格式（行式存储）\n\n行的存储没有特定顺序，但列通常按照它们在该表中定义的顺序存储。对于块中的每一行，都会有一个行头部，然后是每个列的列数据。图\
  \ 3-2 显示了行片段如何在标准`Oracle`块中存储。请注意，它被称为行片段（row piece），因为偶尔一行的数据可能存储在多个块中。在这种情况下，会有一个指向下一个行片段的指针。第\
  \ 11 章 将非常详细地介绍其影响。\n\n![A978-1-4302-6242-8_3_Fig2_HTML.gif](img/A978-1-4302-6242-8_3_Fig2_HTML.gif)\n\
  \n图 3-2.\n\n标准的`Oracle`行格式（行式存储）\n\n请注意，行头部可能包含指向另一个行片段的指针。稍后将对此进行更多说明，但现在，只需意识到存在一种指向另一位置的机制。另请注意，每个列前面都有一个单独的字段，指示列的长度。对于`NULL`值，列值字段中实际上没有存储任何内容。空列的存在由列长度字段中的值\
  \ 0 表示。尾随的`NULL`列甚至不存储列长度字段，因为新行头部的出现表明当前行中没有更多具有值的列。\n\n`PCTFREE`是与块相关的关键值；它控制在插入数据时块被认为已满之前使用了多少空间。其目的是在每个块中保留一些空闲空间用于（未来的）更新。这对于防止行迁移（将行移动到新块）是必要的，行迁移是由于行原始块中空间不足，而行大小增加所引起的。当预期行将被更新为需要更多空间的值时，数据库管理员可以通过设置更高的`PCTFREE`来保留更多空间。当行由于更新预计不会增加大小时，`PCTFREE`可以指定低至\
  \ 0 的值。对于压缩块，通常使用非常低的`PCTFREE`值，因为目标是最大限度地减少空间使用，并且通常不预期更新行。图 3-3 显示了如何根据`PCTFREE`的值保留空闲空间。\n\
  \n![A978-1-4302-6242-8_3_Fig3_HTML.gif](img/A978-1-4302-6242-8_3_Fig3_HTML.gif)\n\
  \n图 3-3.\n\n由`PCTFREE`控制的块空闲空间\n\n图 3-3 显示了一个为其更新保留 20%空间的块。`PCTFREE`设置为 0%的块将允许插入几乎完全填满该块。当记录被更新且新数据不适合存储该记录的块中的可用空闲空间时，数据库会将该行移动到一个新块。此过程称为前述的行迁移。它不会将行从原始块中完全移除，而是留下一个对新定位行的引用，以便仍可以通过其原始`ROWID`找到它。`ROWID`格式定义了数据库查找行的方式。它由数据对象编号、数据文件编号、数据块以及块中的行组成。可以通过在查询表时指定`ROWID`伪列来外部化`ROWID`。`Oracle`提供了一个名为`DBMS_ROWID`的包，允许您解析`ROWID`并提取您需要的相关信息位。当您想通过将数据库块转储到跟踪文件来调查其内部结构时，`ROWID`格式将变得重要。\n\
  \n请注意，将行存储在多个片段中的更通用术语是行链接（row chaining）。行迁移是行链接的一种特殊情况，其中整个行被重新定位。行链接和迁移的示例将在本书的第\
  \ 11 章中介绍。\n\n\n\n## 解析 Oracle 数据块\n\n到目前为止，您只阅读了相关概念，但我们也会尽可能地加以证明。当您开始查看数据块转储时，就能在行头中找到所有行链接的案例。您可以使用\
  \ `alter system dump datafile x block y` 语法转储数据块。尽管该命令并未官方记载，但有许多资料解释了这项技术。以下是一个数据块转储的小片段示例，其中行完全包含在同一个数据块中。为清晰起见，大部分数据块转储信息已被移除。\n\
  \n```\nblock_row_dump:\ntab 0, row 0, @0x1f92\n tl: 6 fb: --H-FL-- lb: 0x2  cc:\
  \ 1\n col  0: [ 2]  c1 02\ntab 0, row 1, @0x1f8c\n tl: 6 fb: --H-FL-- lb: 0x0  cc:\
  \ 1\n col  0: [ 2]  c1 03\n```\n\n表定义被刻意保持为最低限度，表中仅有一个数据类型为 `NUMBER` 的列（名为“ID”）。本次转储中与本讨论相关的关键信息是行头中的标志位：根据\
  \ David Litchfield 的文章《Oracle 数据库数据块》，行头中的标志字节 (`fb`) 可设置以下位：\n\n*   K = 集群键\n*\
  \   C = 集群表成员\n*   H = 行的头部片段\n*   D = 已删除的行\n*   F = 首个数据片段\n*   L = 最后一个数据片段\n\
  *   P = 第一列从前一片段延续而来\n*   N = 最后一列在下一片段中延续\n\n在此数据块转储的上下文中，位 `H`、`F` 和 `L` 已设置，分别对应头部片段、首个片段和最后一个片段。换句话说，后续的列数据足以读取整行。\n\
  \n### 通过 ROWID 高效查找的原理\n\n但在进行行查找时，Oracle 如何知道该读取数据块中的什么内容呢？Oracle 在每个数据块中记录了能找到多少个表。通常，您只会找到一个表，但在某些特殊情况下，例如\
  \ `BASIC`/`ADVANCED` 压缩数据块或集群表，您可能会找到两个。以 `tab 0, row 0...` 开头的行引用数据块中的第一个表，而 row\
  \ 0 的含义不言自明。`@` 符号后的十六进制数是数据块内的偏移量。\n\n为了更好地理解偏移量的重要性，您需要查看行目录之前的头部结构。位于行目录之前的表目录列出了数据块中的行及其位置。结合表目录和行目录，Oracle\
  \ 可以找到目标行，并直接跳转到上述数据块转储输出中显示的行目录中的偏移量——这就是通过 `ROWID` 进行查找如此高效的原因之一！对于上面展示的数据块转储，表目录（加上数据头中的一些细节）如下所示：\n\
  \n```\nntab=1\nnrow=2\nfrre=-1\nfsbo=0x16\nfseo=0x1f8c\navsp=0x1f70\ntosp=0x1f70\n\
  0xe:pti[0]      nrow=2  offs=0\n0x12:pri[0]     offs=0x1f92\n0x14:pri[1]     offs=0x1f8c\n\
  ```\n\n为了定位行，Oracle 需要找到数据块中表 0 的偏移量，并通过该偏移量定位行。对于第一行，偏移量是 `0x1f92`。这可以在行数据中找到：\n\
  \n```\ntab 0, row 0, @0x1f92\n```\n\n这解释了为什么通过 `ROWID` 进行表查找如此快速高效。\n\n### 迁移行和链式行分析\n\
  \n另一方面，迁移行仅设置了头部片段，没有设置其他标志位。以下是另一个表的例子：\n\n```\nblock_row_dump:\ntab 0, row 0,\
  \ @0x1f77\n tl: 9 fb: --H----- lb: 0x3  cc: 0\n nrid:  0x00c813b6.0\ntab 0, row\
  \ 1, @0x1f6e\n tl: 9 fb: --H----- lb: 0x3  cc: 0\n nrid:  0x00c813b6.1\n```\n\n\
  如果您仔细查看转储内容，会注意到一条额外的信息。这些行有一个 `NRID` 或下一个 `ROWID`。这就是指向行延续所在数据块的指针。`NRID` 指针存在于所有链式行中，包括迁移行。\n\
  \n### 解码 NRID 指针\n\n要解码 `NRID`，您可以使用 `DBMS_UTILITY` 包。但需注意——`NRID` 采用十六进制格式编码，需要先转换为十进制值。此外，即使在\
  \ 12c 版本中，它似乎也不适用于大文件表空间，这是一个限制。`NRID` 格式以 “.x” 结尾，其中 x 是行号。要定位 `NRID` `0x00c813b6.0`\
  \ 所在的数据块，您可以使用此脚本（该表位于小文件表空间上）：\n\n```\nSQL> !cat nrid.sql\nselect\n  dbms_utility.data_block_address_file(to_number('&1','xxxxxxxxxxxx'))\
  \ file_no,\n  dbms_utility.data_block_address_block(to_number('&1','xxxxxxxxxxxx'))\
  \ block_no\nfrom dual;\nSQL> @nrid 00c813b6\n   FILE_NO   BLOCK_NO\n---------- ----------\n\
  \         7     529334\n```\n\n因此，该行延续在数据文件 7，块 529334 中。\n\n一行可以起始于一个数据块，并在另一个数据块（甚至多个数据块）中延续，这种现象称为链式行。这里展示一个例子。该行起始于\
  \ `DBA`（数据块地址）为 `0x014000f3` 的数据块：\n\n```\ntab 0, row 0, @0x30\n tl: 8016 fb: --H-F--N\
  \ lb: 0x0  cc: 1\n nrid:  0x014000f4.0\n col  0: [8004]\n```\n\n您可以看到行的开始（头部片段和首个片段）以及表明该行在别处延续（`Next`）的指示。`NRID`\
  \ 指向 `DBA` `0x014000f4`，并在行 0 中延续。\n\n```\ntab 0, row 0, @0x1f\n tl: 8033 fb: ------PN\
  \ lb: 0x0  cc: 1\n nrid:  0x014000f5.0\n```\n\n在这里，您看到该行有一个 `Previous` 片段，并且在 `DBA`\
  \ `0x014000f5` 中还有一个 `Next` 片段待续，同样是行 0。这是一个严重的链式行案例，因为它跨越了两个以上的数据块。在几个行片段之后，我们找到了最后剩下的片段：\n\
  \n```\ntab 0, row 0, @0x1d7c\n tl: 516 fb: -----LP- lb: 0x0  cc: 1\n```\n\n标志字节中的\
  \ `L` 表示这是 `Last` 片段；`P` 标志表示存在 `Previous` 行片段。巧合的是，这就是 `HCC` 超级块，即所谓的压缩单元（`CU`）的构建方式。在之前的例子中，一行被“分散”在多个数据块中，这在行主序格式中通常是不希望出现的。然而，对于采用列主序格式的\
  \ `HCC`，您会发现这是一个非常巧妙的设计，并且对性能完全没有损害。您可以稍后了解更多关于这些压缩单元的信息，但首先让我们关注 `HCC` 出现之前可用的压缩机制。\n\
  \n### 压缩机制\n\n`HCC` 是 Oracle 中一项相对较新的压缩技术。在它引入之前，您可以使用不同的压缩机制。这些技术的命名随时间有所变化，而且确实有些令人困惑。使用它们的语法似乎也随着每个版本而改变。为了保持一个共同的基准，将使用\
  \ `BASIC`、`OLTP` 和 `HCC` 这些名称。\n\n\n### BASIC 压缩\n\n顾名思义，BASIC 压缩是 Oracle 的一项标准特性。要使用\
  \ BASIC 压缩，必须使用直接路径方法将数据行加载到表中。直接路径加载基本上绕过了 SQL 引擎和 Oracle 内置的事务机制，在段的高水位线之上或一个替代的“临时”段中插入数据块。更具体地说，在直接路径插入期间，不使用缓冲区缓存。直接路径加载操作完成后，必须在其他人能对表应用\
  \ DML 之前提交事务。这是对更快加载过程的一种妥协：\n\n```sql\nSQL> insert /*+ append */ into destination\
  \ select * from dba_objects;\n\n20543 rows created.\n\nSQL> select * from destination;\n\
  \nselect * from destination\n             *\nERROR at line 1:\nORA-12838: cannot\
  \ read/modify an object after modifying it in parallel\n```\n\n这是将 BASIC 压缩用于除归档之外的任何用途的主要障碍。另一个“问题”是，对数据的更新会导致更新后的行以未压缩形式存储。对于不使用直接路径加载机制的插入，情况也是如此。\n\
  \n在 Oracle 发布 HCC（混合列压缩）之前，行一直以刚刚所示的格式存储——即所谓的行式存储格式。行式存储格式的对立面是新的 HCC 特有的列式存储格式，你将在本章后面读到相关内容。所有\
  \ BASIC 压缩的数据都将自包含地存储在 Oracle 块中。如果要创建启用 BASIC 压缩的表，可以在创建表时或之后进行：\n\n```sql\nSQL>\
  \ create table T ... compress;\n\nSQL> alter table T compress;\n```\n\n请注意，将表从非压缩状态更改为\
  \ `compress` 并不会压缩其中已存储的数据。你必须先“移动”该表，这会导致数据被压缩。移动表的命令不需要指定表空间，从而允许你将表保留在原处。BASIC\
  \ 压缩在 Oracle 9i 中引入。这种形式的压缩也称为决策支持系统压缩。实际上，“压缩”这个词有点误导性。BASIC 压缩（以及 OLTP 压缩）使用去重方法来减少要存储的数据量。有关此压缩算法的细节将在下一节讨论。\n\
  \n### OLTP 压缩\n\nOLTP 压缩是 Oracle 11g Release 1 推出的创新特性之一，但与 BASIC 压缩不同，其使用需要拥有“高级压缩选项”的许可。“高级压缩选项”不仅限于数据库块压缩，它能做的更多。Oracle\
  \ 的一份白皮书描述了所有用例，你将在本章后面再次遇到它。尽管该特性在 Oracle 12c 中已重命名为“高级行压缩”，但我们决定沿用其旧称，因为我们已经非常习惯了。\n\
  \n回顾上一节关于 BASIC 压缩的内容，你需要使用直接路径操作才能从任何压缩中受益。这一要求使得对表和分区使用压缩变得非常困难，尤其是当它们正频繁进行 DML\
  \ 操作时。如果不在这些操作上使用直接路径，那么你将以不压缩为代价来提高并发性。如果你为了节省存储空间而牺牲并发性，则必须更改代码并在访问段后立即提交。这两种选择都不是解决方案，尤其是最后一种。OLTP\
  \ 压缩消除了这个痛点。使用 OLTP 压缩，你不需要为插入操作使用直接路径，却仍能受益于压缩。并且与默认不为块中未来更新留出空间的 BASIC 压缩不同，OLTP\
  \ 压缩会这样做。\n\n从概念上讲，你开始向一个新块中插入数据。最初行未被压缩。只有当达到阈值时，块才会被压缩。这应该会释放块中的一些空间，并且该块可能最终再次可用于\
  \ DML。随着更多行的插入，再次达到阈值，数据被压缩，如此循环往复，直到块被充分利用和压缩。\n\n使用 OLTP 压缩的语法已经改变；以下是 11g Release\
  \ 1、Release 2 和 12c Release 1 的示例：\n\n```sql\nSQL> -- 11.1 syntax\nSQL> create table\
  \ T ... compress for all operations;\n\nSQL> -- 11.2 syntax\nSQL> create table T\
  \ ... compress for OLTP;\n\nSQL> -- 12.1 syntax\nSQL> create table T ... row store\
  \ compress ADVANCED;\n```\n\n12c Release 1 中的解析器是向后兼容的，但你应该努力将脚本更新为新语法，因为旧的 DDL\
  \ 语句已被弃用。\n\nOLTP 压缩非常重要，即使你主要打算使用 HCC 进行压缩，因为它是任何先前存储在 HCC 压缩段中的更新行的回退压缩方法。无法对\
  \ HCC 压缩数据进行就地更新。相反，行会被迁移到一个 OLTP 压缩块中，该块最初可能因大部分为空而未被压缩。\n\n从技术角度来看，BASIC 和 OLTP\
  \ 压缩是相同的。Oracle 使用去重方法，即用符号替换相同数据的出现。读取表时必须查找该符号；因此，从技术上讲，你在 OLTP 压缩块中找到了两个表。第一个表包含符号表，而第二个表包含“真实”数据。块转储——再次简化到最低必要限度——显示如下：\n\
  \n```\nbdba: 0x01437a2b\n...\nntab=2\nnrow=320\n...\nr0_9ir2=0x0\nmec_kdbh9ir2=0x1c\n\
  76543210\nshcf_kdbh9ir2=----------\n76543210\nflag_9ir2=--R---OC      Archive compression:\
  \ N\nfcls_9ir2[0]={ }\nperm_9ir2[18]={ 8 16 0 17 15 14 10 13 11 1 5 6 2 12 3 4 9\
  \ 7 }\n0x28:pti[0]     nrow=53 offs=0\n0x2c:pti[1]     nrow=267        offs=53\n\
  block_row_dump:\ntab 0, row 0, @0x1dd6\ntl: 7 fb: --H-FL-- lb: 0x0  cc: 15\ncol\
  \  0: *NULL*\ncol  1: [ 5]  56 41 4c 49 44\ncol  2: [ 1]  4e\ncol  3: *NULL*\ncol\
  \  4: [ 4]  4e 4f 4e 45\ncol  5: [ 1]  4e\ncol  6: [ 1]  4e\ncol  7: [ 1]  59\n\
  col  8: [ 3]  53 59 53\ncol  9: *NULL*\ncol 10: [ 7]  78 71 07 11 16 3c 0a\ncol\
  \ 11: [19]  32 30 31 33 2d 30 37 2d 31 37 3a 32 31 3a 35 39 3a 30 39\ncol 12: [\
  \ 2]  c1 05\ncol 13: [ 7]  78 71 07 11 16 3c 0a\ncol 14: [ 5]  49 4e 44 45 58\n\
  bindmp: 00 55 0f 0e 20 1d 23\n...\ntab 1, row 0, @0x1dae\ntl: 14 fb: --H-FL-- lb:\
  \ 0x0  cc: 18\ncol  0: *NULL*\ncol  1: [ 5]  56 41 4c 49 44\ncol  2: [ 1]  4e\n\
  col  3: *NULL*\ncol  4: [ 4]  4e 4f 4e 45\ncol  5: [ 1]  4e\ncol  6: [ 1]  4e\n\
  col  7: [ 1]  59\ncol  8: [ 3]  53 59 53\ncol  9: *NULL*\ncol 10: [ 7]  78 71 07\
  \ 11 16 3c 09\ncol 11: [19]  32 30 31 33 2d 30 37 2d 31 37 3a 32 31 3a 35 39 3a\
  \ 30 38\ncol 12: [ 2]  c1 02\ncol 13: [ 7]  78 71 07 11 16 3c 09\ncol 14: [ 5] \
  \ 54 41 42 4c 45\ncol 15: [ 2]  c1 03\ncol 16: [ 5]  49 43 4f 4c 24\ncol 17: [ 2]\
  \  c1 15\nbindmp: 2c 00 04 03 1c cd 49 43 4f 4c 24 ca c1 15...\n```\n\n上述输出中需要注意的要点已用粗体标出。首先，可以看到块中有两个表，总共有\
  \ 320 行。`pti[0]` 和 `pti[1]` 处的 `ROWID` 解释了每个表的行数和表偏移量。表 0 是符号表，并由“真实”表（表 1）中的 `bindmp`\
  \ 引用。如何使用 `bindmp` 在符号表中定位符号的算法超出了本次讨论的范围。如果你想了解更多关于将符号表映射到数据表以及如何像 Oracle 那样读取行数据的内容，请参考\
  \ Jonathan Lewis 的系列文章“Compression in Oracle”。\n\n\n#### 混合列压缩\n\n经过这么多介绍之后，你终于来到了本章的核心部分——混合列压缩。如前所述，使用\
  \ `HCC` 要求你必须使用 Exadata 或 Oracle `ZFS 存储设备`，或者 Pillar `Axiom` 或 `Oracle FS1` 存储阵列。回顾关于智能扫描的章节（第\
  \ 2 章），一个表空间必须完全存储在 Exadata 存储服务器上才有资格进行卸载处理。\n\n虽然你可以在 Exadata 之外使用前述存储系统来操作 `HCC`\
  \ 压缩数据，但无法在这些设备上获得智能扫描。因此，如果你没有使用上述任何存储设备，那就不太走运了。尽管 `RMAN` 可以愉快地恢复 `HCC` 压缩数据，但在压缩状态下访问它是不行的，你必须在使用前先解压（前提是空间允许）。如果你指定了\
  \ `TRANSFORM` 参数的 `TABLE_COMPRESSION_CLAUSE`，例如将表压缩设置为 `NOCOMPRESS`，那么导入 `HCC` 压缩表是可行的。不过，这是\
  \ `12c` 的功能。\n\n```\n[oracle@enkdb03 ∼]$ impdp ... transform=table_compression_clause:nocompress\n\
  ```\n\n另一方面，这可能需要大量空间。\n\n### “混合列压缩”中的“混合”是什么意思？\n\n大多数关系数据库系统以面向行的格式存储数据。对 Oracle\
  \ 块的讨论阐述了这一概念：Oracle 数据库块包含行。每行有多个列，Oracle 通过读取行、定位列、读取值（如果存在）并将该值显示给最终用户来访问这些列。Oracle\
  \ 数据库引擎操作的基本单位是行。通过 `ROWID` 进行行查找——或基于索引的查找——对于大多数通用型和 `OLTP` 查询引擎来说非常高效。另一方面，如果你只想要表中的一列，并可能对该列的所有值执行聚合操作，就会产生显著的额外开销。你的表越“宽”（换句话说，它包含的列越多），如果你想只检索并处理单个列，产生的开销就越大。\n\
  \n列式数据库引擎对列而非行进行操作，从而减少了上述开销。与标准的 Oracle `8kb` 块不同，列式数据库很可能采用更大的块大小，是我们从 Oracle\
  \ 引擎中已知的 `8k` 的倍数。它还可能将列的值存储在一起（协同定位），并且可能在其存储列的方式中已经包含了大量优化。这很可能使得列式访问非常快。引擎无需读取整行来提取单个列的值，而是可以遍历一个相对较大的块，并通过多块操作检索多个值。因此，列式数据库更倾向于面向分析或以读取为主的工作负载。列式数据库在设计上无法擅长行查找。为了读取完整的行，必须为表中的每一列读取多个相对较大的存储块。因此，列式数据库不太擅长\
  \ `OLTP` 工作负载中常见的（整行）`ROWID` 查找。\n\nOracle 混合列压缩结合了列式数据组织的优势，因为它将列单独存储在一种新的存储类型中，即所谓的压缩单元或\
  \ `CU`。但与纯列式数据库不同，它并不忽视通过索引 `ROWID` 访问表的路径来检索信息。`CU` 以多个标准 Oracle 块的形式连续写入磁盘。属于同一行的信息位于同一个\
  \ `CU` 内，这允许 Oracle 盲目地发出一个或两个与 `CU` 大小匹配的读取请求，并确保行信息已被检索。正如你将在本章后面看到的，Exadata 以两种模式之一访问\
  \ `HCC` 压缩数据：面向块的模式或通过智能扫描。\n\n### 利用混合列压缩\n\n`HCC` 压缩要求你使用直接路径操作（又来了！），就像使用 `BASIC`\
  \ 压缩一样。这听起来像是从 `OLTP` 压缩可能实现的功能倒退了一步，但根据我们的经验，事实并非如此。关于 `HCC` 还有一些值得了解的更多内容，你将在接下来的几段中读到，这些内容阐述了为什么\
  \ `HCC` 需要与精心设计的数据生命周期管理策略结合使用。常规的插入和更新操作会导致记录存储在 `HCC` 特定的 `CU` 之外，而删除操作只会导致更新\
  \ `CU` 的头部信息。在更新的情况下，行将迁移到标记为 `OLTP` 压缩的新块中。任何这些标记为 `OLTP` 压缩的新块不一定立即被压缩。如果它们没有填充到内部阈值，那么最初什么也不会发生，导致段大小随着更新的行数成比例地增长。\n\
  \n使用 `HCC`，你可以从四种不同的压缩类型中选择，如表 3-1 所示。请注意，预期的压缩比是非常粗略的估计值，你的数据的实际压缩比可能与这些数字有显著差异。\n\
  \n表 3-1. HCC 压缩类型\n\n| 压缩类型 | 描述 | 预期压缩比 |\n| --- | --- | --- |\n| 查询低 | `HCC` 级别\
  \ 1 使用算法 1。截至 Oracle `12.1`，这是 `LZO` (Lempel–Ziv–Oberhumer) 压缩算法。此级别提供最低的压缩比，但压缩和解压操作所需的\
  \ CPU 最少。该算法针对最大化速度进行了优化（特别是针对行级访问）。使用此算法的解压非常快。 | 4 倍 |\n| 查询高 | `HCC` 级别 2 在 Oracle\
  \ `12.1` 中使用 `ZLIB` (`gzip`) 压缩算法。 | 6 倍 |\n| 归档低 | `HCC` 级别 3 使用与查询高相同的压缩算法，但压缩级别更高。然而，根据数据的不同，其压缩比可能不会显著超过查询高。\
  \ | 7 倍 |\n| 归档高 | `HCC` 级别 4 压缩在 `12.1` 中使用 `Bzip2` 压缩算法。这是可用的最高压缩级别，但也是迄今为止 CPU\
  \ 密集度最高的。压缩时间通常比级别 2 和 3 慢好几倍。但同样，根据数据的不同，压缩比可能不会比归档低高很多。此级别适用于监管机构要求你保持数据在线，而否则你本会将其归档到三级存储的情况。使用此算法压缩的数据是真正“冷”的，很少被访问。\
  \ | 12 倍 |\n\n压缩算法\n\n表 3-1 中列出的各种压缩算法的实现细节仅在撰写本文时是当前的。Oracle 保留更改算法的权利，并以通用术语进行引用。实际的实现对管理员来说意义不大，因为无论如何都无法控制它们。不变的事实是，压缩级别越高，算法就越激进。在此上下文中，“激进”指的是数据体积可以被缩减的有效程度，并且激进程度与所需的\
  \ CPU 成正比。你可以在本章后面阅读关于压缩数据实际机制的更多内容。\n\n对压缩算法 (`LZO`、`GZIP`、`BZIP2`) 的引用都是从 Oracle\
  \ 代码中的函数名称推断出来的。`ORADEBUG` 工具帮助打印了压缩数据会话的短堆栈跟踪。例如，以下是 `ARCHIVE HIGH` 压缩的 `create\
  \ table` 语句的短堆栈：\n\n```\nBZ2_bzCompress()+144<-kgccbzip2pseudodo()+136<-kgccdo()+51<-kdzc_comp_buffer()+371<-kdzc_comp_colgrp()+595<-kdzc_comp_unit()+1598<-kdzc_comp_full_unit()+80<-kdzcompress()\n\
  ```\n\n\n\n有趣的是，但另一方面也不足为奇，本书第一版中的代码已经发生了变化。如果你发现以 `kdz` 开头的函数引用，那么它们极有可能是用于 HCC\
  \ 的。\n\n## 启用 HCC\n\n你可以在创建表或分区时启用 HCC，也可以在之后启用。以下是一些代码示例：\n\n```sql\nSQL> create\
  \ table t_ql ... column store compress for query low;\n```\n\n```sql\nSQL> create\
  \ table t_ah ... column store compress for archive high;\n```\n\n```sql\nSQL> alter\
  \ table t1 modify partition p_jun_2013 column store compress for query high;\n```\n\
  \n与之前的所有示例一样，请注意，使用 `alter table` 语句更改表或分区的压缩状态，对于段中已存储的数据**没有任何效果**。它仅适用于未来的（直接路径）插入操作。要压缩段中已存储的数据，你必须移动该段。`alter\
  \ table . . . move` 语句不需要你指定目标表空间。\n\n## 查询压缩状态\n\n要查询数据字典以了解段压缩的当前状态，可以使用 `DBA_TABLES`、`DBA_TAB_PARTITIONS`\
  \ 和 `DBA_TAB_SUBPARTITIONS` 中的 `COMPRESSION` 和 `COMPRESS_FOR` 列，例如：\n\n```sql\n\
  SQL> select table_name,compression,compress_for\n  2  from user_tables;\n\nTABLE_NAME\
  \                     COMPRESS COMPRESS_FOR\n------------------------------ --------\
  \ ------------\nT1                             DISABLED\nT1_QL                 \
  \         ENABLED  QUERY LOW\nT1_QH                          ENABLED  QUERY HIGH\n\
  T1_AL                          ENABLED  ARCHIVE LOW\nT1_AH                     \
  \     ENABLED  ARCHIVE HIGH\n```\n\n但再次强调，这些信息**并不反映**段的实际大小，也不表明该段是否真的使用了那种特定的压缩类型。\n\
  \n## 压缩对大小的影响\n\n使用上表展示了压缩对表大小的影响：`T1` 未压缩，作为基线；其他表则使用了 Oracle 12.1 中可用的不同算法进行压缩：\n\
  \n```sql\nSQL> select s.segment_name, s.bytes/power(1024,2) mb, s.blocks,\n  2 \
  \ t.compression, t.compress_for, num_rows\n  3  from user_segments s, user_tables\
  \ t\n  4  where s.segment_name = t.table_name\n  5  and s.segment_name like 'T1%'\n\
  \  6  order by mb;\n\nSEGMENT_NAME                   MB     BLOCKS COMPRESS COMPRESS_FOR\
  \                      NUM_ROWS\n-------------------- ---------- ---------- --------\
  \ -------------------------------- ---------\nT1                           3840\
  \     491520 DISABLED                                       33554432\nT1_QL    \
  \                     936     119808 ENABLED  QUERY LOW                        \
  \     33554432\nT1_QH                         408      52224 ENABLED  QUERY HIGH\
  \                            33554432\nT1_AL                         408      52224\
  \ ENABLED  ARCHIVE LOW                           33554432\nT1_AH               \
  \          304      38912 ENABLED  ARCHIVE HIGH                          33554432\n\
  ```\n\n这些压缩表是使用 `CTAS` 语句在与基线表相同的表空间上创建的，并且行数完全相同。同样，压缩比仅用于说明。你的数据压缩比很可能会有所不同。\n\
  \n## 检查行级压缩类型\n\n要了解某一行使用的压缩算法的更多信息，你可以使用内置包 `DBMS_COMPRESSION`。它提供了 `GET_COMPRESSION_TYPE`\
  \ 函数，该函数以所有者、表名和 `ROWID` 作为参数。\n\n```sql\nSQL> select id, rowid,\n  2  dbms_compression.get_compression_type(user,\
  \ 'T1_QL', rowid) compType\n  3  from t1_ql where rownum < 3;\n\nID ROWID      \
  \          COMPTYPE\n---------- ------------------ ----------\n1 AAAPAgAAKAAJogDAAA\
  \          8\n2 AAAPAgAAKAAJogDAAB          8\n```\n\n这些值的含义在 `DBMS_COMPRESSION`\
  \ 包的 PL/SQL 包和类型参考手册中有解释。压缩类型 \"8\" 表示使用了 Query Low 压缩算法。如果你现在认为可以对查询运行 `count(*)`\
  \ 来获取每个块的压缩类型，那你就错了——这耗时太长，不切实际，即使对于“小”表也是如此。\n\n\n## HCC 内部机制\n\n在介绍 HCC 压缩时，已经提及存储在\
  \ HCC 格式中的数据采用了一种新的存储方式——**列式存储**。你也可以阅读一些关于 HCC 压缩数据内部存储方式的资料。在本节中，你将更深入地了解实际的\
  \ HCC 机制。\n\n首先，压缩后的数据存储在 Oracle 的元数据块中，称为一个 `压缩单元`。这是 `HCC` 众多创新特性中第一个也是最显著的一个。这并不意味着我们熟知的\
  \ `Oracle 块` 不再使用，只是使用方式略有不同。\n\n在深入更多细节之前，我想为你展示一个来自 Oracle 11.2.0.4 的、经过简化编辑的\
  \ `CU` 的象征性块转储。\n\n```\nBlock header dump:  0x014000f3\nObject id on Block? Y\n\
  seg/obj: 0x420f  csc: 0x00.1bec83  itc: 3  flg: E  typ: 1 - DATA\n...\nbdba: 0x014000f3\n\
  data_block_dump,data header at 0x7f190a39b07c\n=============================================\n\
  ...\nntab=1\nnrow=1\nfrre=-1\n...\ntosp=0x14\nr0_9ir2=0x0\nmec_kdbh9ir2=0x0\n76543210\n\
  shcf_kdbh9ir2=----------\n76543210\nflag_9ir2=--R-----      Archive compression:\
  \ Y\nfcls_9ir2[0]={ }\n0x16:pti[0]     nrow=1  offs=0\n0x1a:pri[0]     offs=0x30\n\
  block_row_dump:\ntab 0, row 0, @0x30\ntl: 8016 fb: --H-F--N lb: 0x0  cc: 1\nnrid:\
  \  0x014000f4.0\ncol  0: [8004]\nCompression level: 01 (Query Low)\nLength of CU\
  \ row: 8004\nkdzhrh: ------PC CBLK: 4 Start Slot: 00\nNUMP: 04\nPNUM: 00 POFF: 7954\
  \ PRID: 0x014000f4.0\nPNUM: 01 POFF: 15970 PRID: 0x014000f5.0\nPNUM: 02 POFF: 23986\
  \ PRID: 0x014000f6.0\nPNUM: 03 POFF: 32002 PRID: 0x014000f7.0\nCU header:\nCU version:\
  \ 0   CU magic number: 0x4b445a30\nCU checksum: 0xf47f1618\nCU total length: 32502\n\
  CU flags: NC-U-CRD-OP\nncols: 6\nnrows: 2459\nalgo: 0\nCU decomp length: 32148 \
  \  len/value length: 324421\nrow pieces per row: 1\nnum deleted rows: 0\nSTART_CU:\n\
  00 00 1f 44 0f 04 00 00 00 04 00 00 1f 12 01 40 00 f4 00 00 00 00 3e 62 01\n...\n\
  ```\n\n这并非完整的 `CU`，仅仅是其头部片段。`CU` 的块转储看起来类似于压缩后的 `Oracle 块` 的块转储。从技术上讲，`CU` 是一个跨越多个标准\
  \ `Oracle 块` 的链式行，这些块被连续写入磁盘。每个块存储一个表，而该表仅包含一行（`ntab=1` 且 `nrow=1`）。更奇怪的是，这一行只有一个列（`cc:\
  \ 1`），尽管表的 DDL 定义显示有更多列。`CU` 头部标识该块为 `CU` 的头部片段（设置了 `Head`、`First`、`Next` 标志）。头部描述了\
  \ `CU` 中的压缩数据，例如总长度、列数、行数、解压缩后的长度以及已删除行数。实际数据从 `START_CU` 标签内开始。在更下方你会看到一个 `END_CPU`\
  \ 和 `BINDMP`。`CU` 的头部片段还存储了关于实际列位置的信息。第一个块的 `START_CU` 片段内编码了一个位图，指示哪些行已被删除以及列起始位置的指针。以\
  \ `NUMP` 开头的行列表列出了 `CU` 中的块数。此 `CU` 使用 `Query Low` 作为压缩算法，它由四个片段组成，分别位于块 `0x014000f4`、`...f5`、`...f6`\
  \ 和 `...f7` 中（即连续写入磁盘）。\n\n从概念上讲，你可以将 `CU` 视为一个类似于图 3-4 的逻辑概念。\n\n![A978-1-4302-6242-8_3_Fig4_HTML.gif](img/A978-1-4302-6242-8_3_Fig4_HTML.gif)\n\
  \n图 3-4. 压缩单元示意图\n\n每个块通过 `NRID` 标记和行头中设置的“下一个”位链接到下一个块。这是 `CU` 的第二个块。注意 `DBA` 正是紧邻头部片段的下一个块。\n\
  \n```\nblock_row_dump:\ntab 0, row 0, @0x1f\ntl: 8033 fb: ------PN lb: 0x0  cc:\
  \ 1\nnrid:  0x014000f5.0\ncol  0: [8021]\nCompression level: 01 (Query Low)\n```\n\
  \n同时注意每个块如何描述存储在其中的数据。本例中是 `Query Low`。这种自描述的块允许用户随意更改压缩算法，同时仍为 `Oracle` 提供足够的信息来解压该块。这就是为什么\
  \ `DBMS_COMPRESSION.GET_COMPRESION_TYPE` 如此有用。你从图 3-4 中还可以推导出，行不再像以前在行式存储格式中那样存储在一起。相反，所有数据都在\
  \ `CU` 内按列组织。位于 `CU` 第一个块中、介于 `START_CU` 和 `END_CU` 之间的位图告诉 `Oracle` 在哪里可以找到列以及其中的行。`CU`\
  \ 的布局方式并非纯列式数据库中的那种，而是两者之间的一种“混合”。请记住，排序仅在单个 `CU` 内进行，`Query Low` 除外，因为它为了加快加载速度在加载时不应用排序。下一个\
  \ `CU` 将从第 1 列的更多数据重新开始。这种格式的优势在于，只需读取一个 `CU` 就可以完整地读取一行数据。而纯列式数据库则必须读取多个块，每行中的每列对应一个块。这就是为什么\
  \ `Oracle` 可以有把握地声称，基于索引的 `CU` 查找是可行的，且不会产生与纯列式数据库相同的开销。缺点是读取单个记录将需要读取一个多块的 `CU`，而不是单块。当然，全表扫描不会受到影响，因为无论如何所有块都会被读取。相反，如果你的查询只引用它实际需要的列，全扫描很可能会从列式存储格式中受益。这样，代码可以通过高效的代码路径循环遍历每个\
  \ `CU`，仅引用所需的列。\n\n你稍后会读到更多关于权衡取舍的内容，但你现在应该已经想到，对于需要支持大量单行访问的表来说，必须读取整个 `CU` 而不仅仅是单个块可能是不利的。还要记住，`CU`\
  \ 也是压缩的，解压缩时需要消耗 CPU 周期。\n\n按列排序实际上是为了提高压缩算法的有效性，而不是为了获得列式存储的性能优势。这是 `HCC` “混合”特性的另一个体现。\n\
  \n\n"
- '# 创建 HCC 压缩表时会发生什么？


  HCC 的跟踪和检测代码内嵌在 `ADVCMP` 组件中。通过使用 Oracle 的新型统一跟踪设施（`UTS`）进行跟踪，你实际上可以看到在压缩表时发生了什么。为
  HCC 启用 `UTS` 跟踪的语法记录在 `ORADEBUG` 中。调用 `ORADEBUG` 允许你查看可以被跟踪的内容：


  ```

  SQL> oradebug doc component ADVCMP


  Components in library ADVCMP:

  --------------------------------------------------------------------------

  ADVCMP_MAIN           Archive Compression (kdz)

  ADVCMP_COMP           Archive Compression: Compression (kdzc, kdzh, kdza)

  ADVCMP_DECOMP         Archive Compression: Decompression (kdzd, kdzs)

  ADVCMP_DECOMP_HPK     Archive Compression: HPK (kdzk)

  ADVCMP_DECOMP_PCODE   Archive Compression: Pcode (kdp)

  ```


  尽管该组件在 11g Release 2 中已有文档记录，但本章的示例来自 12.1.0.2。有趣的是，不带参数的 `ORADEBUG doc component`
  命令会向你显示代码位置！从前面的代码可以推断，Oracle 中的 `KDZ*` 例程似乎与 `HCC` 相关。这在查看跟踪文件时会有所帮助。


  考虑以下启用压缩跟踪的语句（警告：这可能生成数 GB 的跟踪数据——切勿在生产环境中运行，仅在专用实验室环境中运行。否则，你可能会填满 `/u01` 并导致严重问题）：


  ```

  SQL> alter session set events ''trace[ADVCMP_MAIN.*] disk=high'';

  ```


  如果你对 `UTS` 语法感到好奇，只需运行 `oradebug doc event`，正如合著者 Tanel Poder 在他的博客中描述的那样。启用跟踪后，你就可以开始压缩。使用
  `alter table ... move` 或 `create table ... column store compress for ...` 语法来开始操作和跟踪。


  ```

  alter session set tracefile_identifier = ''t2ql'';

  alter session set events ''trace[ADVCMP_MAIN.*] disk=high'';


  create table t2_ql

  column store compress for query low

  as select * from t2;


  alter session set events ''trace[ADVCMP_MAIN.*] off'';

  ```


  > **注意**

  >

  > 要注意，该跟踪信息非常非常详细，很容易生成数 GB 的跟踪数据，填满数据库软件的挂载点，从而导致所有数据库停止运行！再次强调，切勿在专用实验室环境之外运行此类跟踪。


  在 Oracle 实际开始压缩之前，它会分析传入的数据以找出压缩列的最佳方式。跟踪将输出类似这样的行：


