  \ 16-1 所示。\n\n![A978-1-4302-6242-8_16_Fig1_HTML.jpg](img/A978-1-4302-6242-8_16_Fig1_HTML.jpg)\n\
  \n图 16-1. 最新版本和补丁新闻\n\n\n\n## Exadata 补丁的类型\n\nExadata 补丁主要可分为两类——Exadata 存储服务器补丁和适用于\
  \ Exadata 的季度数据库补丁。Exadata 存储服务器补丁包含许多不同的组件，全部打包在一个单一的补丁中。除了运行在存储服务器上的 `cellsrv`\
  \ 版本外，Exadata 存储服务器补丁还包含操作系统更新、新版 Linux 内核以及计算和存储服务器内部许多硬件组件的固件更新。Exadata 存储服务器补丁级别通常指代\
  \ Exadata 上运行的软件版本。一个存储服务器补丁发布的版本示例是 `11.2.3.3.1`，如图 16-2 所示。此版本说明了数据库兼容性和 `cellsrv`\
  \ 版本的主要及次要发布版本。请记住，这些规则并非一成不变，例如版本 `11.2.3.3.1` 支持 12c 数据库，但不具备对 12c 执行卸载处理的功能——该功能是在\
  \ 12c 版本的 `cellsrv` 软件中引入的。\n\n![A978-1-4302-6242-8_16_Fig2_HTML.gif](img/A978-1-4302-6242-8_16_Fig2_HTML.gif)\n\
  \n图 16-2. Exadata 存储服务器版本编号\n\n通常，Oracle 在一个日年内会发布两到三个 Exadata 存储服务器补丁。与大多数软件发布一样，对最后一位数字的更改是维护版本，可能只包含少数错误修复或固件更新。对主要或次要发布版本号的更改传统上包括存储服务器级别的新功能。包含新功能的\
  \ Exadata 存储服务器补丁示例有 Exadata 智能闪存日志 (`11.2.2.4.0`)、回写式闪存缓存 (`11.2.3.2.0`) 和闪存缓存压缩\
  \ (`11.2.3.3.0`)。\n\n尽管其名称可能暗示 Exadata 存储服务器补丁仅应用于存储服务器，但也存在相应的补丁应用于计算节点以及（在某些情况下）InfiniBand\
  \ 交换机。由于 Exadata 存储服务器补丁包含操作系统和内核更新，因此有一个额外的组件必须应用于计算节点。这确保了整个堆栈中的所有组件都运行相同版本的 Linux\
  \ 内核，该内核现在包括用于 InfiniBand 堆栈的 OpenFabrics 联盟 (OFA) 驱动程序。从 Exadata 存储服务器版本 `11.2.3.3.0`\
  \ 开始，Oracle 也开始在 Exadata 存储服务器补丁中包含 InfiniBand 交换机的任何固件更新。这有助于简化对这些组件应用补丁的过程，尽管这些更新通常很少且间隔很久。\n\
  \n除了 Exadata 存储服务器补丁外，Oracle 还发布适用于 Exadata 的季度数据库补丁，或称 QDPE。QDPE 的发布时间与季度 PSU（一月、四月、七月、十月）相同。从\
  \ Oracle Database 12c 开始，对 Exadata 和非 Exadata 平台统一发布单个 PSU。在此之前，Exadata 有单独的补丁发布。此外，Oracle\
  \ 为最新的数据库版本发布月度临时“捆绑补丁”，允许客户获得任何可能需要在标准季度发布周期之外修复的关键错误的修复程序。尽管这些补丁在旧版本中是标准实践（运行\
  \ `11.2.0.1` 的 Exadata 管理员会记得月度捆绑补丁），但 Oracle 建议客户坚持使用 QDPE 版本。只有当特定错误影响系统时才应应用月度捆绑补丁。使用“捆绑补丁”这个术语是因为它确实如此——这是一起发布的一组补丁。QDPE\
  \ 和捆绑补丁包含两个独立的补丁——一个用于数据库组件，一个用于集群就绪服务。在 `11.2.0.4` 之前，还有一个 `diskmon` 组件，但此后已合并到集群就绪服务补丁中。\n\
  \n## 适用于 Exadata 的季度数据库补丁\n\n在考虑 Exadata 补丁时，应关注 Exadata “堆栈”的几个不同组件。第一个组件是大多数数据库管理员所熟悉的——构成每个计算节点上各种\
  \ Oracle 主目录的 Oracle 二进制文件。在 Oracle Database 11g 中，适用于 Exadata 的季度数据库补丁 (QDPE) 等同于\
  \ Oracle 发布的标准季度补丁集更新 (PSU)。此补丁应用于每个计算节点上的数据库和网格基础设施主目录。\n\n> **注意**\n>\n> QDPE\
  \ 在 Oracle Database 12c 中已弃用。数据库管理员只需应用用于工程系统和数据库内存的季度网格基础设施补丁集更新 (PSU)。这使得 Exadata\
  \ 上的 Oracle 堆栈的补丁与运行 Oracle Database 12c 的正常 RAC 系统保持一致。\n\n由于 QDPE 在结构和内容上与 PSU\
  \ 类似，因此使用相同的工具应用补丁。Oracle 的补丁实用程序 `OPatch` 承担了所有繁重的工作。要查明系统上安装了哪个 QDPE，管理员可以使用 `OPatch`。`OPatch`\
  \ 有一个 `lspatches` 命令，可以轻松分享此信息：\n\n```\n[oracle@enkx3db01 ∼]$ $ORACLE_HOME/OPatch/opatch\
  \ lspatches\nPatch description:  \"ACFS Patch Set Update : 11.2.0.4.2 (18031731)\"\
  \nPatch description:  \"CRS PATCH FOR EXADATA (APR2014 - 11.2.0.4.6) : (18497417)\"\
  \nPatch description:  \"DATABASE PATCH FOR EXADATA (APR2014 - 11.2.0.4.6) : (18293775)\"\
  \n```\n\n在上面的例子中，这个 `11.2.0.4` 主目录已应用了 2014 年 4 月的 QDPE。从版本号可以推断出，它是 `11.2.0.4`\
  \ 的第 6 个捆绑补丁。ACFS 补丁 `#18031731` 已包含在内，但自捆绑补丁 2 以来未再更新（显然此后没有必要的错误修复）。列出的补丁编号对应于每个组件。所需应用的只是单一的\
  \ QDPE，可以在 Exadata 支持版本说明中找到。\n\n\n\n## 就地应用 QDPE\n\n在运行 11.2 或更高版本的任何其他 Oracle\
  \ RAC 系统上应用 QDPE 与应用季度 PSU 没有区别。由于在 11.2 版本中修补 Grid Infrastructure 主目录的复杂性，Oracle\
  \ 向 `OPatch` 工具引入了 `auto` 功能。因为 Grid Infrastructure 主目录本身由 `root` 账户所有，软件所有者无法在不经过解锁流程的情况下创建新目录。此外，每个数据库主目录都必须运行\
  \ `prepatch` 和 `postpatch` 脚本。最后，单个捆绑补丁或 PSU 中包含的多个补丁必须全部应用。通过使用 `OPatch` 的 `auto`\
  \ 功能，数据库管理员只需发出一条 `OPatch` 命令，即可修补单个节点上的所有 Oracle 主目录。这实现了真正的滚动补丁，这些补丁应用于垂直切片，而非横跨集群水平应用。图\
  \ 16-3 展示了 `OPatch` 工具在 11gR2 集群的 `auto` 模式下运行的命令列表。\n\n![A978-1-4302-6242-8_16_Fig3_HTML.jpg](img/A978-1-4302-6242-8_16_Fig3_HTML.jpg)\
  \  \n*图 16-3. `OPatch auto` 执行的步骤*\n\n在应用 QDPE 之前，应更新将要接收补丁的每个 Oracle 主目录中的 `OPatch`\
  \ 工具。最低版本要求可以在补丁的实际 `README` 文件中找到，但通常建议从 My Oracle Support 下载最新版本的 `OPatch`（补丁\
  \ `6880880`）并暂存在每个 Oracle 主目录中。当应用 QDPE 时，会执行最低版本检查。您应事先完成此操作，以便在维护窗口期间节省时间。在集群资源仍在系统上运行时，暂存\
  \ `OPatch` 二进制文件并运行先决条件检查是安全的。\n\n因为 `OPatch auto` 功能运行需要 `root` 权限的脚本，所以必须以这些权限调用\
  \ `opatch` 命令。这可以直接以 `root` 用户身份执行，也可以通过 `sudo` 命令执行。作为软件所有者，解压缩补丁文件。建议以软件所有者身份解压缩此文件，以确保允许所有必需的访问权限。在角色分离的环境（具有独立的\
