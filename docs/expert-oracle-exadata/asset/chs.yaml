  | 角色分离 | 如果您希望使用角色分离安装，请勾选此框。角色分离环境为集群上的每个 Oracle 主目录创建不同的操作系统用户账户。 |

  | 用户名/ID | 将拥有 Oracle 软件主目录的操作系统账户和 UID |

