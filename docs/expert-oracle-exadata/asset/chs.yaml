  由于此网络被认为是机架中最重要的网络，因此它通常是一个**绑定连接**。在标准配置中，绑定链路配置为**主动-备用绑定**，这不使用任何链路聚合技术。此类配置的主要优点在于无需网络设备进行设置（操作系统处理所有链路故障切换），并且链路故障不会以任何方式降低性能。因为您始终只依赖单条链路的吞吐量，所以即使一侧出现故障，速度也将保持不变。来自数据库服务器的电缆线对应连接到冗余网络交换机，以提供完整的网络冗余。如果使用光网络端口，则接口`eth4`和`eth5`被绑定。对于铜缆网络端口，接口`eth1`和`eth2`被绑定。此绑定接口通常命名为`bondeth0`，但
  Exadata V2 型号使用了名称`bond1`。例如，以下列表显示了从设备`eth1`和`eth2`如何引用主绑定设备`bondeth0`：


  ```shell

  # egrep ''DEVICE|MASTER|SLAVE'' ifcfg-bondeth0 ifcfg-eth1 ifcfg-eth2

  ifcfg-bondeth0:DEVICE=bondeth0

  ifcfg-eth1:DEVICE=eth1

  ifcfg-eth1:MASTER=bondeth0

  ifcfg-eth1:SLAVE=yes

  ifcfg-eth2:DEVICE=eth2

  ifcfg-eth2:MASTER=bondeth0

  ifcfg-eth2:SLAVE=yes

  ```


  **提示**


  Exadata V2 系统不包含 10 千兆以太网（10 GbE）接口，仅支持千兆铜缆。每个 Exadata X2-2/X3-2/X4-2/X5-2 计算节点有两个光
  10GbE 端口，每个 X3-8/X4-8 计算节点有八个光 10GbE 端口。


  #### InfiniBand 网络


  “InfiniBand 网络”屏幕（图 8-9）包含 InfiniBand 网络的配置信息。InfiniBand 网络包含一组默认 IP 地址，使用`192.168.10.1`作为起始地址，子网掩码为`255.255.252.0`。InfiniBand
  网络是用于连接数据库服务器和存储的内部私有互连。由于可能存在路由问题，它需要一个企业网络中其他地方未使用的网络范围。由于 InfiniBand 网络用作内部网络，因此不包含网关。OEDA
  配置实用程序未对 InfiniBand 网络上使用的命名约定引入任何更改。在 Exadata X4-2 及更高版本的机架上，可以选择“主动绑定”功能。此功能打破了先前的绑定配置，并为流量启用了每个
  InfiniBand 端口。选择此选项将使计算节点上使用的 IP 地址数量增加一倍——X4-2 及更新的存储服务器将始终使用主动绑定。表 8-5 描述了“InfiniBand
  网络”屏幕的字段。


