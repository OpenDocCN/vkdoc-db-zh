  \ 中的 HCC 处理存在两种场景。第一种是**智能扫描（Smart Scan）**，此时存储单元负责解压缩 CUs（压缩单元），并将仅与查询相关的信息传递给\
  \ RDBMS 层。在这种场景下，你会发现名为 `cell CU%` 的计数器递增。这些计数器是在存储单元级别递增的。此外，你还会注意到名为 `EHCC%` 的计数器也会递增，正如后文所示，这可能导致**重复计数**。这些\
  \ `EHCC%` 计数器与 RDBMS 层上的 HCC 处理相关。\n\n如果你发现 `EHCC%` 计数器递增而 `cell CU%` 没有递增，那么你的查询并未被**下推（offloaded）**。换句话说，执行过程中没有涉及智能扫描。因此，HCC\
