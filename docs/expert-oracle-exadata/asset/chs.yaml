  ## HCC 性能


  有三个与表压缩相关的性能领域需要考虑。第一个是加载性能，它解决加载数据需要多长时间的问题。由于压缩总是在计算节点上、在直接路径操作期间发生，因此衡量压缩对加载的影响至关重要。第二个关注领域是查询性能，即解压缩和其他副作用对查询压缩数据的影响。第三个关注领域是
  DML 性能，即压缩算法对其他 DML 活动（如更新和删除）的影响。


  #### 加载性能


  正如您可能预料的那样，加载时间往往随着应用的压缩量而增加。正如俗话所说，“天下没有免费的午餐。” 压缩在计算上是昂贵的——这一点毋庸置疑。压缩算法越激进，您将使用的
  CPU 周期就越多。Oracle 当前实现的算法范围从 LZO 到 GZIP 和 BZIP2，其中 LZO 产生最低的压缩比但压缩时间最短。BZIP2 可能为您提供最佳压缩，但代价是巨大的
  CPU 使用率。有一种观点认为，使用 `ARCHIVE HIGH` 压缩的数据在重复查询之前最好先解压缩到 `ARCHIVE LOW`。压缩比在很大程度上取决于数据——一系列重复十亿次的字符“c”可以用很少的数据表示，而已经压缩的数据（如
  JPEG 图像）则无法进一步压缩。


  在介绍之后，是时候看一个例子了。表 T3 中的数据是相当随机的。为了增加数据量，它已被复制多次（`insert into t3 select * from t3`，总大小为
  11.523 GB）。然后，该表已使用 BASIC、OLTP 和所有 HCC 压缩算法进行压缩。结果报告在表 3-3 中。


  表 3-3.


  压缩对示例表的影响。加载是串行执行的


  | 表名 | 压缩方式 | 压缩比 | 加载时间 | 加载时间比 |

  | --- | --- | --- | --- | --- |

  | T3 | 无 | 1.0 | 00:01:16.91 | 1.0 |

  | T3_BASIC | BASIC | 1.1 | 00:03:02.98 | 2.4 |

  | T3_OLTP | OLTP | 1.0 | 00:03:07.22 | 2.4 |

  | T3_QL | Query Low | 6.7 | 00:01:56.98 | 1.5 |

  | T3_QH | Query High | 15.2 | 00:04:23.41 | 3.4 |

  | T3_AL | Archive Low | 15.5 | 00:04:57.51 | 3.9 |

  | T3_AH | Archive High | 20.6 | 00:17:07.17 | 13.4 |


  如您所见，对于这个特定数据集，Query High 和 Archive Low 产生几乎相同的压缩比。加载数据大约多花了 30 秒。启用压缩加载数据肯定会带来影响——创建表的时间大约是没有压缩时的
  2.5 到 4 倍。有趣的是，BASIC 和 OLTP 压缩在使用的存储空间上几乎没有任何区别。并非每个数据集都同样可压缩。这里的时间是从 X2 系统测得的；当前的
  Exadata 系统拥有更快、更高效的 CPU。


  一旦启用 HCC，压缩比会增加几个数量级。加载时间随着存储节省而增加，但 Archive High 除外，我们稍后会回到这一点。然而，在 Exadata 中，串行加载数据是相当慢的，通过并行化加载操作可以显著提高性能。


  注意


  您可以阅读更多关于并行操作的内容，请参见第 6 章。


  需要注意的是，尽管 Exadata 是一个非常强大的平台，但您不应用并行查询和并行 DML 使系统过载！另请注意，您不必插入到 HCC 压缩段中。根据您的策略，您可以在后续阶段引入压缩。


  #### 查询性能


  加载时间只是第一个重要的性能指标。数据加载后，它也需要在合理的时间内可访问！大多数系统加载数据一次，读取数据的次数要多得多。当涉及到压缩时，查询性能好坏参半。根据查询的类型，压缩可以加速查询，也可以减慢查询速度。解压缩会带来额外的
  CPU 使用开销，特别是如果必须在计算节点上执行。使用更多 CPU 来解压缩数据的补偿在于磁盘访问。压缩数据意味着需要从磁盘物理读取的块更少。如果查询有利于 HCC
  压缩行的列式格式，则可能获得额外的收益。这些加起来通常超过解压缩的额外成本。


  HCC 压缩数据主要有两种访问模式：智能扫描（Smart Scan）或传统的块 I/O。这些的重要性在于 HCC 数据的解压缩方式。对于非智能扫描，解压缩将不得不在计算节点上执行。在此背景下一个有趣的问题是，通过其
  `ROWID` 检索一行需要多长时间。逻辑上，CU 越大，解压缩所需的时间越长。您可能在本章前面的部分问过自己，Query High 和 Archive Low
  之间的区别是什么，除了 CU 大小之外。关键在于，Archive High 提供稍好的压缩和卸载的全表扫描。使用 Archive Low 进行的 `ROWID`
  访问（通常不是智能扫描）由于较大的 CU 大小而本质上稍差。与许多架构决策一样，这再次归结为“了解您的数据”。


  另一个重要方面与生命周期管理相关。想象这样一种情况：分区表在其原生形式下符合智能扫描的条件。报告和任何依赖于卸载扫描的数据访问都将以预期的速度执行。在分区生命周期内引入压缩完全有可能将其大小减小到该段不再符合智能扫描条件的程度。这可能会对性能产生影响，但不一定如此。我们已经看到许多案例，其中存储节省加上列式格式远远超过了缺失的智能扫描。


