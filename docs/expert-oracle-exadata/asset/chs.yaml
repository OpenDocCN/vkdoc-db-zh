  \ DOP”）时启用的不同功能。这些参数是下划线参数，这意味着在获得 Oracle 支持部门的许可之前，不应在生产环境中使用它们。\n\n## 选定的控制并行功能的下划线数据库参数\n\
  \n| 参数 | 默认值 | 描述 |\n| --- | --- | --- |\n| `_parallel_statement_queueing` | `FALSE`\
  \ | 与自动 DOP 相关。如果设置为 `TRUE`，则启用并行语句排队。 |\n| `_parallel_cluster_cache_policy` | `ADAPTIVE`\
  \ | 与自动 DOP 相关。如果设置为 `CACHED`，则启用内存中并行执行。 |\n| `_parallel_cluster_cache_pct` | `80`\
  \ | 集群中用于内存中并行执行的总缓冲区缓存大小的百分比。默认情况下，大于总缓冲区缓存大小 80% 的段不被视为内存中并行执行的候选对象。 |\n\n###\
  \ 存储层的并行化\n\nExadata 在存储层拥有强大的处理能力。在 X4 世代及之前的固定八分之一、四分之一、二分之一或全机架配置中，存储层的 CPU 资源比计算层更丰富。对于\
  \ X5 世代，存储服务器从 X4 的两个六核 CPU 升级到 X5 的两个八核 CPU，而计算层对于双路服务器则从 X4 的两个 12 核 CPU 升级到 X5\
  \ 的两个 18 核 CPU，这意味着对于 X5 世代的双路服务器，计算层的核心数更高。不用说，新的“弹性配置”意味着可以创建任何类型的配置，它完全放弃了计算层和存储层之间平衡的概念，应仅作为最后手段并谨慎考虑。\n\
  \n由于 Smart Scans 将大量处理卸载到存储单元上，每个涉及 Smart Scans 的查询实际上都在存储单元的 CPU 上并行执行。这种类型的并行化与传统的数据库并行处理完全独立。即使活动是由单个数据库服务器上的单个进程驱动的，Smart\
  \ Scan 并行化也会发生。这引入了一些有趣的问题，在考虑数据库层的常规并行化时应予以考虑。由于并行查询的主要工作之一是允许多个进程参与 I/O 操作，并且\
  \ I/O 操作已经分布在多个进程上，因此在 Exadata 平台上运行的语句所需的并行度应小于其他平台。\n\n\n\n## 自动并行度 (Auto DOP)\n\
  \nOracle Database 11g Release 2 中并行操作的主要变化之一，是增加了一个被亲切地称为 **Auto DOP** (自动并行度) 的功能。它的设计初衷是为了解决这样一个问题：对于访问特定对象的所有查询，很少有一个单一的并行度值能普遍适用。在\
  \ 11gR2 之前，并行度可以通过提示在语句级别指定，或者通过 `DEGREE` 和 `INSTANCE` 设置在对象级别指定。实际上，基于刚才提到的原因，在大多数情况下在语句级别使用提示更有意义。然而，这要求开发人员了解语句将要运行的平台、执行时硬件将要支持的工作负载，以及其他需要资源的进程的并发情况。正确地进行设置可能是一个繁琐的试错过程，而且不幸的是，并行度在语句运行时无法更改。一旦语句开始执行，你唯一的选择就是让它完成或终止它，然后更改并行度设置，再重试一次。这使得在“在线”环境中进行微调成为一个痛苦的过程。\n\
  \n#### 操作与配置\n\n启用 Auto DOP 后，Oracle 会评估每条语句以确定是否应并行运行，如果是，应使用什么并行度。基本上，任何优化器判断串行运行时间超过\
  \ 10 秒的语句，都将成为并行运行的候选。这个 10 秒的阈值可以通过设置 `PARALLEL_MIN_TIME_THRESHOLD` 参数来控制。做出这个决定时，不会考虑语句所涉及的任何对象是否已被设置并行度。\n\
  \n通过将 `PARALLEL_DEGREE_POLICY` 参数设置为 `AUTO`、`LIMITED` 或 `ADAPTIVE` (12c)，即可启用 Auto\
  \ DOP。该参数的默认设置是 `MANUAL`，它会禁用所有三个 11gR2 的新并行特性 (Auto DOP、并行语句排队、内存中并行执行)。不幸的是，`PARALLEL_DEGREE_POLICY`\
  \ 是那种控制多个事项的参数之一。以下列表显示了该参数不同设置的效果：\n\n*   `MANUAL`: 如果 `PARALLEL_DEGREE_POLICY`\
  \ 设置为 `MANUAL`，则不会启用任何 11gR2 的新并行特性。并行处理将像以前版本一样工作。也就是说，只有使用提示或对象被设置了并行度时，语句才会被并行化。\n\
  *   `LIMITED`: 如果 `PARALLEL_DEGREE_POLICY` 设置为 `LIMITED`，则仅启用 Auto DOP，而并行语句排队和内存中并行执行保持禁用。此外，只有访问那些已被设置为默认并行度的对象的语句，才会被考虑进行\
  \ Auto DOP 计算。\n*   `AUTO`: 如果 `PARALLEL_DEGREE_POLICY` 设置为 `AUTO`，则所有三个新特性都将启用。无论对象级别是否有任何并行设置，语句都将被评估以进行并行执行。\n\
  *   `ADAPTIVE (12c)`: 这个新的 12c 参数启用了与前面讨论的 `AUTO` 值相同的功能。除此之外，Oracle 可能会根据语句执行期间收集的反馈，重新评估语句，以便为后续执行提供更好的并行度。\n\
  \n尽管有文档记载的启用并行语句排队和内存中并行执行的唯一方法是通过 `AUTO` 或 `ADAPTIVE` 这种“全有或全无”的设置，但开发人员贴心地提供了隐藏参数，以便独立控制这些特性。表\
  \ 6-3 展示了这些参数，以及 `PARALLEL_DEGREE_POLICY` 的设置如何影响这些隐藏参数。\n\n表 6-3. 受 PARALLEL_DEGREE_POLICY\
  \ 影响的隐藏参数\n\n| `Parallel_Degree_Policy` | `参数` | `值` |\n| --- | --- | --- |\n| `MANUAL`\
  \ | `_parallel_statement_queuing` | `FALSE` |\n|  | `_parallel_cluster_cache_policy`\
  \ | `ADAPTIVE` |\n| `LIMITED` | `_parallel_statement_queuing` | `FALSE` |\n|  |\
  \ `_parallel_cluster_cache_policy` | `ADAPTIVE` |\n| `AUTO` | `_parallel_statement_queuing`\
  \ | `TRUE` |\n|  | `_parallel_cluster_cache_policy` | `CACHED` |\n| `ADAPTIVE (12c)`\
  \ | `_parallel_statement_queuing` | `TRUE` |\n|  | `_parallel_cluster_cache_policy`\
  \ | `CACHED` |\n\n`_PARALLEL_STATEMENT_QUEUING` 参数的作用非常明显。当它被设置为 `TRUE` 时，排队功能即启用。`_PARALLEL_CLUSTER_CACHE_POLICY`\
  \ 参数的用途则不那么明显。事实证明，它控制着内存中并行执行。将 `_PARALLEL_CLUSTER_CACHE_POLICY` 参数的值设置为 `CACHED`\
  \ 即可启用内存中并行执行。你需要注意，在 Exadata 平台上，内存中并行执行的价值可能相对较低，因为当使用此特性通过并行进程扫描并使用缓冲区高速缓存中的数据时，智能扫描优化将不可用。我们稍后会更详细地讨论这一点。与此同时，这里是一个展示\
  \ Auto DOP 实际操作的示例：\n\n\n\n`SQL> select owner, table_name, status, last_analyzed,\
