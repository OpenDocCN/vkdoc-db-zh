  [oracle@homer ∼]$ strace -cp 57449\nProcess 57449 attached - interrupt to quit\n\
  Process 57449 detached\n% time     seconds  usecs/call     calls    errors syscall\n\
  ------ ----------- ----------- --------- --------- ---------------\n 99.44    0.029174\
  \           4      7709             pread\n  0.40    0.000117           0      3921\
