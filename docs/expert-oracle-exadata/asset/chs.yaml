  ```\n\n使用 Exadata 的一个优点是，尽管每一代新硬件都会增加新功能，但其核心概念保持不变。在上面的例子中，设备是作为块设备还是闪存卡来访问根本不重要——变化的只是设备名。你可以通过限制要报告的设备来调整刚才展示的`iostat`输出。\n\
  \n#### 使用 ExaWatcher 进行高级 Cell 监控\n\n虽然数据库级别的等待概要文件和 SQL 监控应作为性能监控和故障排除的起点，但有时这些方法还不够，你需要更深入地探究。本节介绍一个额外的数据源。Exadata\
  \ 计算节点和存储单元预装了一个名为`ExaWatcher`的工具，它从 Exadata 软件版本 11.2.3.3 开始取代了`OSWatcher`。它位于`/opt/oracle.ExaWatcher`目录下。这个工具只是一组\
  \ shell 脚本，它们定期运行标准的 OS 工具（如`vmstat`、`iostat`和`netstat`）来收集数据。`ExaWatcher`的优势在于它在操作系统级别运行，而不是在数据库内部，因此不受数据库挂起、性能问题或数据库的`V$`视图未显示真实情况或细节不足的影响。此外，高频的`ExaWatcher`收集器每隔几秒采样一次数据，使其能够检测到短暂的“故障”或活动突发。\n\
  \n`ExaWatcher`在机器启动时自动启动。你可以通过简单地搜索进程名中包含“`ExaWatcher`”的任何进程来检查`ExaWatcher`是否正在运行：\n\
  \n```\n# pgrep -lf \"ExaWatcher\"\n4372 /bin/bash ./ExaWatcher.sh --fromconf\n4500\
  \ sh -c /usr/bin/mpstat -P ALL  5  720 2>/dev/null >> /opt/oracle.ExaWatcher/archive/Mpstat.ExaWatcher/2015_01_19_03_02_48_MpstatExaWatcher_enkx3cel01.enkitec.com.dat\n\
  4734 sh -c /usr/bin/iostat -t -x  5  720 2>/dev/null >> /opt/oracle.ExaWatcher/archive/Iostat.ExaWatcher/2015_01_19_03_03_13_IostatExaWatcher_enkx3cel01.enkitec.com.dat\n\
  5116 /usr/bin/perl /opt/oracle.ExaWatcher/ExecutorExaWatcher.pl /opt/oracle.ExaWatcher/ExaWatcher.execonf\n\
  5571 sh -c /opt/oracle.ExaWatcher/ExaWatcherCleanup.sh 1417968473 1733501253 3600\
  \ /opt/oracle.ExaWatcher/archive/ 614400 2>>/dev/null\n5572 /bin/bash /opt/oracle.ExaWatcher/ExaWatcherCleanup.sh\
  \ 1417968473 1733501253 3600 /opt/oracle.ExaWatcher/archive/ 614400\n5578 /usr/bin/perl\
  \ /opt/oracle.ExaWatcher/ExecutorExaWatcher.pl /opt/oracle.ExaWatcher/ExaWatcher.execonf\n\
  6171 sh -c /opt/oracle/cell/cellsrv/bin/cellsrvstat -interval=5 -count=720 2>/dev/null\
  \ >> /opt/oracle.ExaWatcher/archive/CellSrvStat.ExaWatcher/2015_01_19_03_04_23_CellSrvStatExaWatcher_enkx3cel01.enkitec.com.dat\n\
  8202 sh -c /usr/bin/vmstat  5  2 >> /opt/oracle.ExaWatcher/archive/Vmstat.ExaWatcher/2015_01_19_03_04_58_VmstatExaWatcher_enkx3cel01.enkitec.com.dat\n\
  16614 sh -c /usr/bin/top -b -d 5 -n 720 2>/dev/null >> /opt/oracle.ExaWatcher/archive/Top.ExaWatcher/2015_01_19_02_09_22_TopExaWatcher_enkx3cel01.enkitec.com.dat\n\
  ```\n\n如果你想查看`ExaWatcher`进程守护程序的层次结构，在 Linux 上可以使用`ps -H`命令或`pstree`命令，如下所示：\n\n\
