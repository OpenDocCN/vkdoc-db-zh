  \n```sql\nSession1> update t1_ql set spcol = 'UPDATED' where id between 1 and 10;\n\
  ```\n\n```\n10 rows updated.\nElapsed: 00:00:00.06\n```\n\n```sql\nSession2> update\
  \ t1_ql set spcol='UPDATED TOO' where id between 100 and 110;\n```\n\n```\n-- session\
  \ waits\n```\n\n正如你所料，`Session2`必须等待`Session1`提交。毫不意外，这是预期的行为：\n\n```sql\nSQL> select\
  \ sid,serial#,sql_id,seq#,event from v$session where username = 'MARTIN';\n```\n\
  \n```\nSID    SERIAL# SQL_ID              SEQ# EVENT\n---------- ---------- -------------\
  \ ---------- --------------------------------------------\n      328       1679\
  \ fvcbzbm0gak1x         91 SQL*Net message to client\n     1109      13459 39pvwfpfcum\
  \          52 enq: TX - row lock contention\n```\n\n如果你对启用了行级锁的表重复此测试，你会看到两个更新就像在普通表上一样顺利通过：\n\
  \n```sql\nSession1> update t1_ql_rll set spcol = 'UPDATED' where id between 1 and\
  \ 10;\n```\n\n```\n10 rows updated.\nElapsed: 00:00:00.04\n```\n\n```sql\nSession2>\
  \ update t1_ql_rll set spcol='UPDATED TOO' where id between 100 and 110;\n```\n\n\
  ```\n11 rows updated.\nElapsed: 00:00:00.03\n```\n\n在这种情况下，没有等待，没有锁。在你开始重新定义所有表之前，请考虑关于`HCC`和活跃数据的原则。仅仅因为有行级锁的支持，其他`DML`操作仍然最好不要对`HCC`压缩数据执行。\n\
  \n\n#### 单行访问\n\n`HCC` 是为全表扫描而构建且最适合全表扫描的。解压缩是一项 CPU 密集型任务。智能扫描可以将解压缩工作分配到存储单元的\
  \ CPU 上。这使得 CPU 密集型任务变得容易接受得多。然而，智能扫描仅在执行全表扫描时才会发生。这意味着其他访问机制，例如索引访问，必须使用数据库服务器\
  \ CPU 来执行解压缩。在极端情况下，这会给数据库服务器带来巨大的 CPU 负载，例如在高吞吐量的 `OLTP` 型系统中。此外，由于单行数据分散在 `CU`\
  \ 的多个数据块中，检索一整行会导致读取整个 `CU`。对于倾向于使用索引访问数据的系统（即使访问是只读的），这可能对整体数据库效率产生不利影响。\n\n###\
  \ 常见使用场景\n\n`HCC` 提供了如此高的压缩级别，以至于它已被用作传统信息生命周期模型（`ILM`）策略的替代方案。传统的 `ILM` 策略通常涉及将较旧的历史数据完全移出数据库。这些\
  \ `ILM` 策略通常需要某种类型的日期范围分区以及清除或归档过程。这样做是为了释放存储空间，并且在某些情况下是为了提高性能。通常，数据必须以某种备份格式保留，以便日后需要时能够访问。使用\
  \ `HCC`，在许多情况下，可以通过对最旧的分区进行压缩来近乎无限期地保留数据。这种方法与传统地移动数据的方法相比有许多优点。\n\n首先也是最重要的，数据通过标准的应用程序接口仍然可用。在访问旧数据之前，不需要做额外的工作来恢复备份。仅此一项优势通常就足以证明这种方法的合理性。这种方法通常需要保留活动分区不压缩，同时更激进地压缩旧分区。以下是一个使用\
  \ 11.2 语法创建具有混合压缩模式的分区表的简短示例：\n\n```sql\nSQL>   CREATE TABLE \"KSO\".\"CLASS_SALES_P\"\
  \n  2       (    \"TRANS_ID\" VARCHAR2(30),\n  3            \"UNIT_ID\" NUMBER(30,0),\n\
  \  4            \"DAY\" NUMBER(30,0),\n  5            \"TRANS_SEQ\" VARCHAR2(30),\n\
  \  6            \"END_DATE\" DATE,\n  7            \"BEGIN_DATE\" DATE,\n  8   \
  \         \"UNIT_TYPE\" VARCHAR2(30),\n  9            \"CUST_TYPE\" VARCHAR2(1),\n\
  \ 10            \"LOAD_DATE\" DATE,\n 11            \"CURRENCY_TYPE\" CHAR(1)\n\
  \ 12       ) PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255  NOLOGGING\n 13     \
  \ STORAGE(\n 14      BUFFER_POOL DEFAULT FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)\n\
  \ 15      TABLESPACE \"CLASS_DATA\"\n 16      PARTITION BY RANGE (\"BEGIN_DATE\"\
  )\n 17     (PARTITION \"P1\"  VALUES LESS THAN (TO_DATE\n 18        (’ 2008-09-06\
  \ 00:00:00’, ’SYYYY-MM-DD HH24:MI:SS’, ’NLS_CALENDAR=GREGORIAN’))\n 19    SEGMENT\
  \ CREATION IMMEDIATE\n 20      PCTFREE 10 PCTUSED 40 INITRANS 1 MAXTRANS 255 NOCOMPRESS\
  \ NOLOGGING\n 21      STORAGE(INITIAL 8388608 NEXT 1048576 MINEXTENTS 1 MAXEXTENTS\
  \ 2147483645\n 22      PCTINCREASE 0 FREELISTS 1 FREELIST GROUPS 1 BUFFER_POOL DEFAULT\n\
  \ 23      FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)\n 24      TABLESPACE \"\
  CLASS_DATA\",\n 25     PARTITION \"P2\"  VALUES LESS THAN (TO_DATE\n 26        (’\
  \ 2008-09-07 00:00:00’, ’SYYYY-MM-DD HH24:MI:SS’, ’NLS_CALENDAR=GREGORIAN’))\n 27\
  \    SEGMENT CREATION IMMEDIATE\n 28      PCTFREE 0 PCTUSED 40 INITRANS 1 MAXTRANS\
  \ 255 COMPRESS FOR QUERY HIGH NOLOGGING\n 29      STORAGE(INITIAL 8388608 NEXT 1048576\
  \ MINEXTENTS 1 MAXEXTENTS 2147483645\n 30      PCTINCREASE 0 FREELISTS 1 FREELIST\
  \ GROUPS 1 BUFFER_POOL DEFAULT\n 31      FLASH_CACHE DEFAULT CELL_FLASH_CACHE DEFAULT)\n\
  \ 32      TABLESPACE \"CLASS_DATA\",\n 33     PARTITION \"P3\"  VALUES LESS THAN\
  \ (TO_DATE\n 34        (’ 2008-09-08 00:00:00’, ’SYYYY-MM-DD HH24:MI:SS’, ’NLS_CALENDAR=GREGORIAN’))\n\
  \ 35    SEGMENT CREATION IMMEDIATE\n 36      PCTFREE 0 PCTUSED 40 INITRANS 1 MAXTRANS\
  \ 255 COMPRESS FOR ARCHIVE LOW NOLOGGING\n 37      STORAGE(INITIAL 8388608 NEXT\
  \ 1048576 MINEXTENTS 1 MAXEXTENTS 2147483645\n 38      PCTINCREASE 0 FREELISTS 1\
  \ FREELIST GROUPS 1 BUFFER_POOL DEFAULT\n 39      FLASH_CACHE DEFAULT CELL_FLASH_CACHE\
  \ DEFAULT)\n 40      TABLESPACE \"CLASS_DATA\" ) ;\nTable created.\n```\n\nOracle\
  \ `12c` 引入了一项新功能（作为付费选项）来自动化数据生命周期管理过程，这将在下一节中介绍。\n\n### 自动数据优化\n\nOracle 数据优化（`ADO`）是版本\
  \ `12.1.0.1` 中引入的新功能。它可用于 Exadata，但不限于 Exadata。如果高级压缩选项可用，`ADO` 可以帮助管理员实施，更重要的是，强制执行信息生命周期管理。\n\
  \n#### 什么是数据生命周期管理？\n\n数据生命周期管理是有效管理数据和存储的一个重要方面。在许多公司中，你会发现非 Exadata 部署有不同的存储层级。最常见的是，根据你从哪里开始计数，闪存被用作第\
  \ 0 层或第 1 层。最高级别的存储层级为用户提供了尽可能好的性能，但同时，其供应并不充裕。大多数第 0 层存储太昂贵，无法全面使用。而且甚至不需要：由于我们观察到的数据访问模式，一个完全部署在闪存上的数据仓库意义不大。\n\
  \n许多仓库在白天（增量）加载数据。Oracle 架构师和应用程序设计师都发现，在 Oracle 数据仓库中，基于日期键按范围对表进行分区非常高效。许多博客文章和演示文稿都展示了如何有效地使用这种方法进行扩展。`Oak-Table`\
  \ 成员 Tim Gorman 的论文《扩展到无穷大：Oracle 上的数据仓库》很好地概述了如何使用分区选项为超大型数据库（`VLDBs`）扩展 Oracle\
  \ 性能。因此，在可以将表划分为基于范围的段的地方，数据生命周期管理是自然而然的下一步。这并不是什么新鲜事。事实上，在 Exadata 问世很久之前，管理员就经常实施它以节省成本。\n\
  \n当数据是“热的”，或者换句话说，是刚刚加载的，你可以预期大部分活动。加载本身需要足够的带宽来将数据从暂存层移动到最终用户可以访问的查询层。你不仅需要为加载做准备，还需要为\
  \ Oracle 为使数据可用而执行的任何操作做准备。创建或维护索引是加载期间最明显的操作，但你同样会发现 Oracle 执行的任务中包括重做和撤销生成，如果数据库处于归档日志模式并强制执行日志记录，还包括写入归档日志。大多数系统在加载期间并非静止不动，因此你还需要考虑查询性能；处理\
  \ `ETL` 时从存储读取很可能是并发发生的。总之，当前数据的 `I/O` 要求非常高。\n\n一旦数据随着时间推移变得“冷”下来，对其的访问就不再那么猛烈和苛刻了。大多数查询活动集中在当前数据上。因此，许多架构师决定将那些不经常查询或修改的数据移动到较低层级的存储。\n\
  \n继续第 0 层（闪存）的例子，许多用户会转向基于硬盘的存储。这些硬盘不提供与闪存相同的高端性能特性，但作为交换，它们便宜得多。\n\n最后，随着时间的推移，更冷的数据可以被移动到更低层级的存储。这使得管理员和架构师能够以比将所有数据保存在更高层级的\
  \ `SAN` 存储上更低的成本保留更大量的数据。\n\n\n"
- '# 压缩


  到目前为止，我们主要关注的是如何通过更长期或长期归档来降低成本。压缩这个话题尚未涉及，但由于本书是关于 Exadata 的，因此不可避免地要提及它。


  在 Exadata 平台上，你不会像在传统硬件上那样使用这些存储层级。Exadata 管理员无需担心基于闪存/SAN 的二级和三级存储/网络解决方案的确切正确组合。存储是随系统一同提供的。如果你想将所有数据保留在存储服务器上，同时数据量又在不断增长，那么你应该认真考虑**混合列压缩**（HCC）。你在之前的章节中读到过，HCC
  能提供非常好的压缩比，从而节省存储空间。除此之外，你还可以在 HCC 压缩数据上使用**智能扫描**，与非 Exadata 平台相比，这显著提升了吞吐量。例如，通过
  InfiniBand 访问 HCC 压缩数据，应该比通过直接 NFS（dNFS）文件器访问数据更高效。


  '
- "# 自动数据优化 vs. 手动生命周期管理\n\n在 Oracle 12c 之前，执行维护任务是数据库管理员的职责。在许多情况下，维护包括实施**信息生命周期管理**（ILM）策略。通过妥善实施的变更管理，这过去运行良好。然而，在变更管理实施不那么严格的情况下，维护\
  \ ILM 策略可能会变得困难。\n\nOracle 12c 通过允许自动应用 ILM 策略，将数据库管理员从许多此类任务中解放出来。正如你可以在接下来的章节中看到的，你可以向一个段添加一个声明性策略，并将实施工作交给\
  \ Oracle。此功能需要**高级压缩许可**。\n\n**自动数据优化**（ADO）主要基于使用情况跟踪。一个所谓的**热图**在行和段级别跟踪访问和数据修改。热图不仅是\
  \ ADO 的基础，还可以通过数据字典视图进行查询，并通过一组 PL/SQL 应用程序编程接口（API）进行操作。\n\n广义上说，管理员有两个选项，值得庆幸的是它们并非互斥。第一个选项是压缩；另一个选项是使用分层子句。不过，第一步是启用热图。但要小心：启用热图跟踪已经要求你拥有**高级压缩选项**的许可。\n\
  \n```\nSQL> alter system set heat_map = on sid='*' scope=both;\n\n系统已变更。\n```\n\n\
  Oracle 提供了多个视图，你可以用它们来了解更多关于数据库中热图跟踪的信息：\n\n```\nSQL> SELECT table_name\n  2  FROM\
  \ dict\n  3  WHERE table_name LIKE 'V%HEAT%MAP%'\n  4  OR table_name LIKE 'DBA%HEAT%MAP%';\n\
  \nTABLE_NAME\n------------------------------\nDBA_HEATMAP_TOP_OBJECTS\nDBA_HEATMAP_TOP_TABLESPACES\n\
  DBA_HEAT_MAP_SEG_HISTOGRAM\nDBA_HEAT_MAP_SEGMENT\nV$HEAT_MAP_SEGMENT\n```\n\n`V$HEAT_MAP_SEGMENT`是提供实时访问热图的数据字典视图，但它不像`DBA_HEATMAP_TOP_OBJECTS`那样具有“所有者”列。你可以通过`OBJECT_ID`和`DATA_OBJECT_ID`轻松地与`DBA_OBJECTS`进行连接。\n\
  \n## ADO 的示例用例\n\n为了更好地说明 ADO 的概念和实施，将使用以下演示。一个名为`ADODEMO`的简单表将用于此目的。将向其附加多个信息生命周期管理策略，并展示其效果。让我们从表定义开始：\n\
  \n```\nCREATE TABLE adodemo (\nid, t_pad, date_created, state\n)\nenable row movement\n\
  partition by range (date_created)\nINTERVAL(NUMTOYMINTERVAL(1, 'MONTH'))\n(\npartition\
  \ p_manual values less than (to_date('01.01.2005','dd.mm.yyyy'))\n)\nAS -- 感谢 Jonathan\
  \ Lewis!\nWITH v1 AS  (\n  SELECT rownum n FROM dual CONNECT BY level <= 10000\n\
  )\nSELECT\n  rownum id,\n  rpad(rownum,1999) t_pad,\n  TRUNC(sysdate) - 180 + dbms_random.value(0,180)\
  \ date_created,\n  CASE\n    WHEN mod(rownum,100000) = 0\n    THEN CAST('RARE' AS\
  \ VARCHAR2(12))\n    WHEN mod(rownum,10000) = 0\n    THEN CAST('FAIRLY RARE' AS\
  \ VARCHAR2(12))\n    WHEN mod(rownum,1000) = 0\n    THEN CAST('NOT RARE' AS VARCHAR2(12))\n\
  \    WHEN mod(rownum,100) = 0\n    THEN CAST('COMMON' AS   VARCHAR2(12))\n    ELSE\
  \ CAST('THE REST' AS VARCHAR2(12))\n  END state\nFROM v1,\n  v1\nWHERE rownum <=\
  \ 1e7;\n```\n\n该表具有一千万行，但相当窄。`ADODEMO`表主要从分区角度值得关注。你在前一章节中读到分区对于 HCC 的适当实施是多么重要。请注意，该表最初完全没有启用压缩。这是有意为之：使用\
  \ ADO，你无需自己指定压缩——把它留给 Oracle。在我们的 12.1.0.2.0 测试平台上，该表具有以下物理属性：\n\n```\nSQL> select\
  \ table_name,partition_name,num_rows,last_analyzed\n  2  from dba_tab_partitions\
  \ where table_owner = 'MARTIN' and table_name = 'ADODEMO';\n\nTABLE_NAME       \
  \              PARTITION_NAME           NUM_ROWS LAST_ANAL\n------------------------------\
  \ -------------------- ---------- ---------\nADODEMO                        P_MANUAL\n\
  ADODEMO                        SYS_P796                  1721062 09-OCT-14\nADODEMO\
  \                        SYS_P797                  1111364 09-OCT-14\nADODEMO  \
  \                      SYS_P798                  1724376 09-OCT-14\nADODEMO    \
  \                    SYS_P799                  1664931 09-OCT-14\nADODEMO      \
  \                  SYS_P800                  1720722 09-OCT-14\nADODEMO        \
  \                SYS_P801                   389333 09-OCT-14\nADODEMO          \
  \              SYS_P802                  1668212 09-OCT-14\n已选择 8 行。\n```\n\n由于是基于`MONTH`的间隔分区，你无需过多关注分区定义的细节。一个默认分区就足够了；Oracle\
  \ 会在需要时创建新的分区。\n\n\n"
- "# 启用 ILM 实现存储分层\n\n您已经了解到，Oracle 允许您根据所谓的 ILM 策略，自动将“冷”数据从第 1 层存储移动到更低层存储。这些策略可以在创建表时分配给表，或者事后加装。策略可以在行或段级别定义。\n\
  \n首先，需要一个数据移动的目标位置。在本例中，它是一个名为 `ILM_COMPRESS` 的表空间。源表空间名称是 `MARTIN_BIGFILE`。目前，如对\
  \ `DBA_TAB_PARTITIONS` 的查询所示，表 `ADODEMO` 的每个段都位于该表空间上：\n\n```\nTABLESPACE_NAME \
  \               PARTITION_NAME\n------------------------------ --------------\n\
  MARTIN_BIGFILE                 P_MANUAL\nMARTIN_BIGFILE                 SYS_P796\n\
  MARTIN_BIGFILE                 SYS_P797\nMARTIN_BIGFILE                 SYS_P798\n\
  MARTIN_BIGFILE                 SYS_P799\nMARTIN_BIGFILE                 SYS_P800\n\
  MARTIN_BIGFILE                 SYS_P801\nMARTIN_BIGFILE                 SYS_P802\n\
  ```\n\n现在，您可以向最旧的分区添加 ILM 策略。\n\n```\nSQL> alter table ADODEMO modify partition\
  \ SYS_P797\n  2  ilm add policy tier to ILM_COMPRESS;\nTable altered.\nSQL> select\
  \ policy_name,object_name,subobject_name,enabled from user_ilmobjects;\nPOLICY_NAME\
  \                    OBJECT_NAME                    SUBOBJECT_NAME             \
  \    ENA\n------------------------------ ------------------------------ ------------------------------\
  \ ---\nP1                             ADODEMO                        SYS_P797  \
  \                     YES\n1 row selected.\n```\n\n您刚刚看到了与信息生命周期管理相关的一个字典视图的实际应用：`USER_ILMOBJECTS`。此视图列出了所有附加了\
  \ ILM 策略的对象。在示例表发生任何操作之前，需要满足某些条件。您可以在视图 `DBA_ILMPARAMETERS` 中找到当前定义的 ILM 参数：\n\n\
  ```\nSQL> select * from DBA_ILMPARAMETERS;\nNAME                   VALUE\n--------------------\
  \ ----------\nENABLED                      1\nRETENTION TIME              30\nJOB\
  \ LIMIT                    2\nEXECUTION MODE               2\nEXECUTION INTERVAL\
  \          15\nTBS PERCENT USED            85\nTBS PERCENT FREE            25\n\
  POLICY TIME                  0\n8 rows selected.\n```\n\n关于存储分层，最初只有一个参数值得关注。`TBS\
  \ PERCENT USED` 是一个阈值，指示何时应实施“数据移动”策略。翻译成英文就是，当段所在的表空间使用率超过 85% 时，可能会发生数据移动。继续上面的示例，该表空间使用率已超过此阈值，这应该会触发数据移动。\n\
  \n```\nTablespace                    Size (MB)  Free (MB)     % Free     % Used\n\
  ------------------------------ ---------- ---------- ---------- ----------\nMARTIN_BIGFILE\
  \                   209920  6403.4375          3         97\n```\n\nILM 策略的评估作为夜间维护作业窗口的一部分执行。对于大多数系统，除非计划程序窗口已被更改，否则这应该是晚上\
  \ 10 点。如果您比较着急，可以通过调用 `DBMS_ILM` 包中的 `EXECUTE_ILM` 过程来加快开发环境上的处理速度。其参数之一是一个名为 `task_id`\
  \ 的输出变量。它返回与执行 ILM 策略关联的任务的自动创建名称。\n\n您可以在 SQL*Plus 会话中使用命令 `print task_id` 来获取任务的实际值。通过调用\
  \ `DBMS_ILM.EXECUTE_ILM`，您在当前模式中执行 ILM 策略。策略评估的结果在另一个新的字典视图 `USER_ILMEVALUATIONDETAILS`\
  \ 中：\n\n```\nSQL> select selected_for_execution, job_name, policy_name\n  2  from\
  \ user_ilmevaluationdetails\n  3   where task_id = :task_id\n  4  /\nSELECTED_FOR_EXECUTION\
  \         JOB_NAME                       POLICY_NAME\n------------------------------\
  \ ------------------------------ ---------------\nSELECTED FOR EXECUTION       \
  \  ILMJOB408                      P1\n```\n\n在这种情况下，该策略已被选中执行。要了解数据移动结果的更多信息，您可以检查\
  \ `USER_ILMRESULTS`：\n\n```\nSQL> select job_state,start_time,completion_time from\
  \ USER_ILMRESULTS\n  2  where task_id = :task_id and job_name = 'ILMJOB408';\nJOB_STATE\
  \              START_TIME                   COMPLETION_TIME\n----------------------\
  \ ------------------------------ ------------------------------\nCOMPLETED SUCCESSFULLY\
  \ 08-OCT-14 10.00.42.603455 PM 08-OCT-14 10.00.55.250004 PM\n```\n\n作业的执行也记录在计划程序视图中，例如\
  \ `DBA_SCHEDULER_JOB_RUN_DETAILS`。在底层，Oracle 执行一个 PL/SQL 块，如果您有兴趣查看，该块记录在 `SYS.ILM_RESULTS$`\
  \ 中。数据库执行的实际代码存储在 `PAYLOAD` 列中。字典视图已经表明作业执行成功，但您可以自己查看效果。回到 `USER_TAB_PARTITIONS`，您会看到该分区的表空间名称已更改：\n\
  \n```\nSQL> select partition_name,tablespace_name from user_tab_partitions\n  2\
  \  where table_name = 'ADODEMO' and partition_name = 'SYS_P797';\nPARTITION_NAME\
  \                 TABLESPACE_NAME\n------------------------------ ---------------\n\
  SYS_P797                       ILM_COMPRESS\n1 row selected.\n```\n\n作为另一个预期的副作用，您在原始表空间中也获得了一些额外的可用空间。存储分层选项在\
  \ Exadata 中非常有用，特别是当您使用 ZFS 存储设备或 Pillar Axiom/FS1 阵列作为数据移动目标时。请记住，这些存储都不允许您在其上进行\
  \ *Smart Scan*。另一方面，移动到此类表空间的数据可能本来就是冷数据，访问频率不高。\n\n## 启用 ILM 实现压缩\n\n前文已经提及的另一选项，允许你在数据变冷时对其进行压缩。热图对实现此功能至关重要。没有它，Oracle\
  \ 就无法跟踪数据的访问和操作情况。而且，因为 Oracle 内核开发者体恤 DBA，他们甚至添加了一些统计信息来向性能架构师提示热图的使用情况：\n\n```sql\n\
  SQL> select name from v$statname where lower(name) like '%heat%';\n\nNAME\n----------------------------------------------------------------\n\
  Heatmap SegLevel - Write\nHeatmap SegLevel - Full Table Scan\nHeatmap SegLevel -\
  \ IndexLookup\nHeatmap SegLevel - TableLookup\nHeatmap SegLevel - Flush\nHeatmap\
  \ SegLevel - Segments flushed\nHeatmap BlkLevel Tracked\nHeatmap BlkLevel Not Tracked\
  \ - Memory\nHeatmap BlkLevel Not Updated - Repeat\nHeatmap BlkLevel Flushed\nHeatmap\
  \ BlkLevel Flushed to SYSAUX\nHeatmap BlkLevel Flushed to BF\nHeatmap BlkLevel Ranges\
  \ Flushed\nHeatmap BlkLevel Ranges Skipped\nHeatmap BlkLevel Flush Task Create\n\
  Heatmap Blklevel Flush Task Count\n\n16 rows selected.\n```\n\n当你使用合著者 Tanel Poder\
  \ 的 snapper 工具来捕获一段时间内的性能计数器变化时，你实际上可能开始看到其中一些统计信息！为了模拟对数据表`ADODEMO`的访问，编写了一个小程序：\n\
  \n```sql\ncreate or replace procedure ADODEMOPROC as\n  v_id number;\n  v_date date;\n\
  begin\n  v_date :=  to_date('01-AUG-2014') + dbms_random.value(1,10);\n  select\
  \ count(id) into v_id from martin.adodemo where date_created = trunc(v_date);\n\
  end;\n/\n```\n\n其意图是在多个调度器作业中使用该查询来模拟用户活动。这个活动是让下一个示例按预期工作所必需的。由于上述查询最初执行的是全表扫描，因此在`DATE_CREATED`列上添加了一个索引。调度器作业通过直接调用`DBMS_SCHEDULER`来创建：\n\
  \n```sql\nSQL> begin\n  2    for i in 1..5 loop\n  3      dbms_scheduler.create_job(\n\
  \  4        job_name => 'ADODEMOJOB_' || i,\n  5        job_type => 'STORED_PROCEDURE',\n\
  \  6        job_action => 'ADODEMOPROC',\n  6        start_date => systimestamp,\n\
  \  8        repeat_interval => 'freq=secondly;interval=10',\n  9        enabled\
  \ => true);\n 10    end loop;\n 11  end;\n 12  /\n\nPL/SQL procedure successfully\
  \ completed.\n```\n\nILM 策略是演示中缺失的部分。如本例所示，该策略可以分配给整个表，并将被子分区继承：\n\n```sql\nSQL>\
  \ alter table adodemo\n  2  ilm add policy column store compress for query low\n\
  \  3  segment after 30 days of no access;\n\nTable altered.\n\nSQL> select policy_name,\
  \ subobject_name, object_type, inherited_from, enabled\n  2  from user_ilmobjects\
  \ where object_name = 'ADODEMO';\n\nPOLICY_NAM SUBOBJECT_NAME                 OBJECT_TYPE\
  \        INHERITED_FROM       ENA\n---------- ------------------------------ ------------------\
  \ -------------------- ---\nP1         SYS_P797                       TABLE PARTITION\
  \    POLICY NOT INHERITED NO\nP3         P_MANUAL                       TABLE PARTITION\
  \    TABLE                YES\nP3         SYS_P796                       TABLE PARTITION\
  \    TABLE                NO\nP3         SYS_P797                       TABLE PARTITION\
  \    TABLE                YES\nP3         SYS_P798                       TABLE PARTITION\
  \    TABLE                YES\nP3         SYS_P799                       TABLE PARTITION\
  \    TABLE                YES\nP3         SYS_P800                       TABLE PARTITION\
  \    TABLE                YES\nP3         SYS_P801                       TABLE PARTITION\
  \    TABLE                YES\nP3         SYS_P802                       TABLE PARTITION\
  \    TABLE                YES\nP3                                      TABLE   \
  \           POLICY NOT INHERITED YES\n\n10 rows selected.\n```\n\n策略`P1`是在上一节中实现并执行的数据移动策略。策略名称不是用户可定义的。换句话说，是由\
  \ Oracle 分配的。策略`P3`是刚刚通过上述命令添加的新策略。如前段所述，你可以看到分区继承了分配给表的策略。策略的作用域是数据段，对于堆表来说就是分区。与存储分层策略一样，新策略会在维护窗口打开时进行评估。\n\
  \n评估的结果再次被记录在`USER_ILMEVALUATIONDETAILS`中。你的段可能会被选中执行，如下所示：\n\n```sql\nSQL> select\
  \ policy_name POLICY, object_name \"TABLE\", subobject_name \"PARTITION\",\n  2\
  \   selected_for_execution, job_name\n  3  from user_ilmevaluationdetails;\n\nPOLICY\
  \     TABLE      PARTITION       SELECTED_FOR_EXECUTION                     JOB_NAME\n\
  ---------- ---------- --------------- ------------------------------------------\
  \ ----------\nP3         ADODEMO    SYS_P796        SELECTED FOR EXECUTION     \
  \                ILMJOB428\nP1         ADODEMO    SYS_P797        PRECONDITION NOT\
  \ SATISFIED\nP3         ADODEMO    SYS_P797        PRECONDITION NOT SATISFIED\n\
  P3         ADODEMO    SYS_P798        PRECONDITION NOT SATISFIED\n...\n```\n\n你可以在`USER_ILMRESULTS`中核实作业的完成情况。`SYS.ILM_RESULTS$`中的有效负载显示了另一个压缩分区的\
  \ PL/SQL 块。作业成功完成后，你应该能在数据字典中看到结果：\n\n```sql\nSQL> select partition_name, table_name,\
  \ compression, compress_for\n  2    from user_tab_partitions\n  3   where table_name\
  \ = 'ADODEMO'\n  4    and partition_name = 'SYS_P796';\n\nPARTITION_NAME       TABLE_NAME\
  \                     COMPRESS COMPRESS_FOR\n-------------------- ------------------------------\
  \ -------- ------------------------------\nSYS_P796             ADODEMO        \
  \                ENABLED  QUERY LOW\n```\n\n这是关于 ADO 选项功能的一个简短介绍。还有许多其他选项可用，例如使用自定义函数进行分层。与许多出色的\
  \ Oracle 特性一样，使用自动数据优化需要你拥有额外的付费许可（高级压缩）。\n\n## 总结\n\nHCC（混合列压缩）在 Oracle 11g 第 2\
  \ 版中引入，提供了卓越的压缩能力，远超之前版本的任何功能。这主要得益于采用了行业标准的压缩算法，以及将压缩单元的大小从单个数据库块（通常为 8K）增加到更大的\
  \ 32K 或 64K 单元。尽管 12c 版本增强了行级锁机制，但由于锁定问题以及更新的行会被移动到压缩率低得多的格式（OLTP 压缩格式）中，该特性仅适用于不再被修改的数据。因此，HCC\
  \ 应只用于不再修改（或仅偶尔修改）的数据。由于压缩可以在分区级别定义，常见的做法是看到表中包含压缩和未压缩分区的混合体。这种技术在许多情况下可以替代需要将数据移动到备用存储介质然后从数据库中清除的\
  \ ILM 方法。借助 Oracle 12c，数据生命周期管理过程可以实现自动化。\n\n"
- "# 4. 存储索引\n\n存储索引是一个你可能从未听闻过的实用 Exadata 特性。它们并非像 Oracle 传统的 B 树或位图索引那样，是存储在数据库中的索引。事实上，它们根本不是传统意义上的索引。它们无法识别出某列具有特定值的一组记录。相反，它们是存储服务器软件的一项特性，旨在消除磁盘\
  \ I/O。它们有时被称为“反向索引”。这是因为它们标识的是所请求记录不存在的位置，而非相反。其工作原理是为磁盘存储单元（默认大小为 1 兆字节，即 MB）存储某一列的最小值、最大值以及空值存在情况。由于在执行智能扫描时，SQL\
  \ 谓词会被传递到存储服务器，因此存储软件可以在执行请求的 I/O 之前，根据存储索引的元数据（最大值、最小值、空值）来检查这些谓词。任何不可能包含匹配行的存储区域都会被跳过。在许多情况下，这可以显著减少必须执行的\
  \ I/O 量。请记住，由于存储软件需要将谓词与存储索引中的最大值和最小值以及/或空值进行比较，此优化仅对智能扫描可用。\n\n存储软件没有提供记录在案的机制来更改或调整存储索引（尽管在存储服务器上启动\
  \ `cellsrv` 之前，可以设置几个未记录的参数）。事实上，甚至没有太多可用的监控手段。例如，没有等待事件来记录访问或更新存储索引所花费的时间量。尽管没有记录在案的命令来操作存储索引，但它们是一个极其强大的特性，并能带来显著的性能提升。因此，理解它们的工作原理非常重要。\n\
  \n### 结构\n\n存储索引最多包含八个列的最小值、最大值和空值存在情况。此结构默认为 1MB 的存储块（存储区域）进行维护。存储索引仅存储在内存中，从不写入磁盘。\n\
  \n图 4-1 展示了存储索引中所含数据的概念视图。\n\n![A978-1-4302-6242-8_4_Fig1_HTML.gif](img/A978-1-4302-6242-8_4_Fig1_HTML.gif)\n\
  \n图 4-1.\n存储索引的概念图\n\n如图所示，客户表中的第一个存储区域的最大值为 77，表明它可能包含满足查询谓词（`cust_age >35`）的行。图中其他存储区域的最大值不够高，不足以包含任何满足查询谓词的记录。因此，这些存储区域将不会从磁盘读取。\n\
  \n除了最大值和最小值之外，还有一个标志用于指示存储区域中的任何记录是否包含空值。空值竟然会被表示出来，这有点令人惊讶，因为空值在传统的 Oracle 索引中是不存储的。存储索引具备跟踪空值的能力，实际上可能对设计和实现决策产生影响。有些系统根本不使用空值。例如，SAP\
  \ 使用单个空格字符代替空值。SAP 这样做只是为了确保可以通过 B 树索引访问记录（B 树索引不存储空值）。无论如何，存储索引提供了等同于在空值上的位图索引，这使得查找空值成为一个非常高效的过程（假设空值占值的百分比较低）。\n\
  \n### 监控存储索引\n\n监控存储索引的能力非常有限。优化器不知道某个存储索引是否会被用于特定的 SQL 语句。AWR 或 ASH 也不会捕获有关特定 SQL\
  \ 语句是否使用了存储索引的任何信息。有一个统计信息在数据库级别报告存储索引的使用情况，另外还有一个未记录的跟踪机制。\n\n#### 数据库统计信息\n\n\
  只有一个数据库统计信息与存储索引直接相关。该统计信息 `cell physical IO bytes saved by storage index` 跟踪因使用存储索引而避免的累计\
  \ I/O 量。该统计信息在 `v$sesstat`、`v$sysstat` 及相关视图中公开。这是一个奇怪的统计信息，它为它并未实际执行的操作计算了一个精确值。尽管如此，它是唯一可以轻松访问的、指示存储索引是否已被使用的指标。不幸的是，由于该统计信息与\
  \ `v$sesstat` 中的所有统计信息一样是累积的，因此必须在执行给定 SQL 语句前后检查它，才能确定该特定语句是否使用了存储索引。以下是一个示例：\n\
  \n```\nKSO@dbm2> select name, value\n  2       from v$mystat s, v$statname n\n \
  \ 3       where s.statistic# = n.statistic#\n  4       and name like '%storage index%';\n\
  NAME                                                                  VALUE\n----------------------------------------------------------------\
  \ ----------\ncell physical IO bytes saved by storage index                    \
  \         0\n\nKSO@dbm2> select avg(pk_col) from kso.skew2 where col1 is null;\n\
  AVG(PK_COL)\n-----------\n   32000001\n\nKSO@dbm2> select name, value\n  2  from\
  \ v$mystat s, v$statname n\n  3  where s.statistic# = n.statistic#\n  4  and name\
  \ like '%storage index%';\nNAME                                                \
  \                  VALUE\n----------------------------------------------------------------\
  \ ----------\ncell physical IO bytes saved by storage index                    1842323456\n\
  ```\n\n如你所见，第一个查询向 `v$mystat` 请求包含 storage index 一词的统计信息。在当前会话中执行使用了存储索引的 SQL 语句之前，此统计信息的值将为\
  \ 0。在我们的示例中，该查询使用了一个存储索引，消除了大约 1.8 GB 的磁盘 I/O。这是没有存储索引时本应需要的额外 I/O 量。请注意，`v$mystat`\
  \ 是一个视图，它公开了你当前会话的累积统计信息。因此，如果你第二次运行该语句，其值应增加到第一次执行后值的两倍。当然，断开会话连接（例如通过退出 SQL*Plus）会将\
  \ `v$mystat` 公开的大多数统计信息（包括此统计信息）重置为 0。\n\n#### 跟踪\n\n有另一种方法可以在单个存储单元级别监控存储索引的情况。`cellsrv`程序有能力在访问存储索引时创建跟踪文件。可以通过在`cellinit.ora`文件中将`_CELL_STORAGE_INDEX_DIAG_MODE`参数设置为\
  \ 2 来启用此跟踪，以使该设置在单元服务器重启后保持一致，或者在运行时使用以下代码在单元服务器中更改该参数：\n```\nCellCLI> alter cell\
  \ events=\"immediate cellsrv.cellsrv_setparam('_cell_storage_index_diag_mode',2)\"\
  \nCELLSRV parameter changed: _cell_storage_index_diag_mode=2.\nModification is in-memory\
  \ only.\nAdd parameter setting to 'cellinit.ora' if the change needs to be persistent\
  \ across cellsrv reboots.\nCell enkx4cel02 successfully altered\n```\n在正常使用中，显然应将此参数设置为\
  \ 0，以防止存储单元产生写入跟踪文件的开销。为确保此参数设置为正确的值，可以使用以下命令从存储单元查询：\n```\nCellCLI> alter cell\
  \ events=\"immediate cellsrv.cellsrv_getparam('_cell_storage_index_diag_mode')\"\
  \nParameter _cell_storage_index_diag_mode has value 0\nCell enkx4cel01 successfully\
  \ altered\n```\n通过将隐藏的数据库参数`_KCFIS_STORAGEIDX_DIAG_MODE`设置为值 2，也可以为所有使用存储索引的 SQL\
  \ 启用在所有存储服务器上的跟踪。由于这些跟踪机制完全未记载，在没有 Oracle 支持部门批准的情况下不应使用。安全总比后悔好。\n\n由于`cellsrv`进程是多线程的，跟踪工具会创建许多跟踪文件。其结果类似于在数据库服务器上跟踪并行执行的\
  \ select 语句，因为需要合并多个跟踪文件才能显示完整的图景。跟踪文件的命名约定是`svtrc_`，后跟进程 ID，再跟一个线程标识符。进程 ID 与`cellsrv`进程的操作系统进程\
  \ ID 相匹配。由于`cellsrv`默认只启用 100 个线程（`_CELL_NUM_THREADS`），随着请求进入存储单元，文件名会被快速重用。由于这种快速重用，文件名中的线程编号部分很容易回绕。这种回绕不会覆盖之前的跟踪文件，而是在现有文件中追加新数据。在\
  \ Oracle 数据库服务器上，跟踪文件也会发生追加，但这种情况要少见得多，因为默认文件名中的进程 ID 部分来自用户的影子进程。通过在数据库服务器上使用进程\
  \ ID 作为跟踪文件的标识符，基本上每个会话都会获得自己的编号。\n\n从存储单元软件的 12c 版本开始，Oracle 为单元存储服务器创建了卸载服务器的概念。单元卸载服务器是由主单元服务器启动的一个独立的（线程化）进程，目的是能够同时运行不同版本的存储服务器软件。包含使用上述方法生成的信息的跟踪文件是由卸载服务器生成的跟踪文件，而非主单元服务器生成的。这也改变了跟踪文件名——跟踪文件名以`cellofltrc_`开头，并且卸载服务器有自己的诊断目标位置。\n\
  \n还有一个相关的`cellsrv`参数`_CELL_SI_MAX_NUM_DIAG_MODE_DUMPS`，它设置了在跟踪功能关闭之前将创建的最大跟踪文件数。该参数默认值为\
  \ 20。据推测，该参数是一种安全机制，可防止磁盘被跟踪文件填满，因为单个查询可能会创建大量文件。\n\n以下是我们测试系统上生成的跟踪文件片段：\n```\n\
  Trace file /opt/oracle/cell/log/diag/asm/cell/SYS_121111_140712/trace/cellofltrc_16634_15.trc\n\
  ORACLE_HOME = /opt/oracle/cell/cellofl-12.1.1.1.1_LINUX.X64_140712\nSystem name:\
  \    Linux\nNode name:      enkx4cel01.enkitec.com\nRelease:        2.6.39-400.128.17.el5uek\n\
  Version:        #1 SMP Tue May 27 13:20:24 PDT 2014\nMachine:        x86_64\nCELL\
  \ SW Version:        OSS_12.1.1.1.1_LINUX.X64_140712\nCELLOFLSRV SW Version:  OSS_12.1.1.1.1_LINUX.X64_140712\n\
  *** 2015-01-25 05:42:43.299\nUserThread: LWPID: 16684 userId: 15 kernelId: 15 pthreadID:\
  \ 140085391522112\n*** 2015-01-25 06:38:55.655\n4220890033:2 SIerr=0 size=1048576\n\
  2015-01-25 06:38:55.655743 :000031DA: ocl_si_ridx_pin: Pin successful for rgn_hdl:0x6000116c1d28\
  \ rgn_index:10206 rgn_hdr:0x600085fd2de4 group_id:2 si_ridx:0x6000aa687930\n4220890033:2\
  \ SIerr=0 size=1048576\n2015-01-25 06:38:55.655774 :000031DB: ocl_si_ridx_pin: Pin\
  \ successful for rgn_hdl:0x6000116c1d28 rgn_index:10207 rgn_hdr:0x600085fd2df4 group_id:2\
  \ si_ridx:0x6000aa687a18\n4220890033:2 SIerr=0 size=1048576\n2015-01-25 06:38:55.655801\
  \ :000031DC: ocl_si_ridx_pin: Pin successful for rgn_hdl:0x6000116c3048 rgn_index:10240\
  \ rgn_hdr:0x60008eff7004 group_id:2 si_ridx:0x6000aa687db8\n4220890033:2 SIerr=0\
  \ size=1015808\n2015-01-25 06:38:55.655828 :000031DD: ocl_si_ridx_pin: Pin successful\
  \ for rgn_hdl:0x6000116c3048 rgn_index:10241 rgn_hdr:0x60008eff7014 group_id:2 si_ridx:0x6000aa687b00\n\
  ```\n在此跟踪文件中有几点值得指出：\n\n*   前几行是标准的跟踪文件头，包含文件名和软件版本。\n*   （默认的）存储索引跟踪包含的信息量比以前（11g）版本的存储服务器软件在卸载服务器存在之前显示的信息要少得多。\n\
  *   每个存储索引条目描述的区域大小主要为 1048576 字节（`size=1048576`）。\n*   对于使用的每个存储索引条目，该条目都会被“固定”，以保证在使用期间不会被移除或修改（`ocl_si_ridx_pin`）。\n\
  \n为了完整起见，我们在存储服务器版本 11.2.3.3.1 上执行了存储索引的转储。使用 11 版的原因是，从 12 版开始，存储服务器将跳过转储实际的存储索引，正如在先前的转储中可以看到的那样。11.2.3.3.1\
  \ 版本的转储显示了一个存储区域的实际存储索引：\n```\n2015-01-31 05:58:14.530028*: RIDX(0x7f07556eb1c0)\
  \ : st 2(RIDX_VALID) validBitMap 0 tabn 0 id {6507 1 964151215}\n2015-01-31 05:58:14.530028*:\
  \ RIDX: strt 32 end 2048 offset 86312501248 size 1032192 rgnIdx 82314 RgnOffset\
  \ 16384 scn: 0x0000.00e9aa10 hist: 1\n2015-01-31 05:58:14.530028*: RIDX validation\
  \ history:\n2015-01-31 05:58:14.530028*: 0:PartialRead 1:Undef 2:Undef 3:Undef 4:Undef\
  \ 5:Undef 6:Undef 7:Undef 8:Undef 9:Undef\n2015-01-31 05:58:14.530028*: Col id [1]\
  \ numFilt 5 flg 2 (HASNONNULLVALUES):\n2015-01-31 05:58:14.530028*: lo: c2 16 64\
  \ 0 0 0 0 0\n2015-01-31 05:58:14.530028*: hi: c2 19 8 0 0 0 0 0\n2015-01-31 05:58:14.530028*:\
  \ Col id [2] numFilt 4 flg 2 (HASNONNULLVALUES):\n2015-01-31 05:58:14.530028*: lo:\
  \ c5 15 4d c 22 26 0 0\n2015-01-31 05:58:14.530028*: hi: c5 15 4d c 22 26 0 0\n\
  2015-01-31 05:58:14.530028*: Col id [7] numFilt 4 flg 2 (HASNONNULLVALUES):\n2015-01-31\
  \ 05:58:14.530028*: lo: c1 3 0 0 0 0 0 0\n2015-01-31 05:58:14.530028*: hi: c1 3\
  \ 0 0 0 0 0 0\n```\n以下几点值得指出：\n\n\n*   该存储索引条目描述了一个接近 1MB 的区域（`size=1032192`）。\n\
  *   根据`strt`和`end`字段的值来看，这个存储索引条目似乎占用了 2K 内存。\n*   对于每个被评估的列，都有一个`id`字段，该字段与其在表中的位置相关联。\n\
  *   对于每个被评估的列，都有一个`flg`字段。它看起来是一个位掩码的十进制表示。同时，第一位似乎指示当前列所在的存储区域是否包含空值。（也就是说，1 和\
  \ 3 都表示存在空值。）\n*   对于每个被评估的列，都有一个`lo`和`hi`值（以十六进制存储）。\n*   `lo`和`hi`值仅占 8 个字节，这意味着对于那些值的前导部分不具有区分度的列，存储索引将失效（顺便提一下，经验证据也证实了这一点）。\n\
  \n虽然生成和读取跟踪文件非常有帮助，但这并不容易做到，并且需要直接访问存储服务器。除此之外，这种方法完全没有文档记录。它可能最适合在非生产环境中用于调查。\n\
  \n#### 监控总结\n\n无论是数据库统计信息还是跟踪，都不是监控存储索引使用的特别令人满意的方式。如果能在语句级别通过`V$SQL`中的一列来跟踪存储索引使用情况，那将是很好的。与此同时，`cell\
  \ physical IO bytes saved by storage index`（由存储索引节省的单元物理 IO 字节数）统计信息是我们目前拥有的最佳选择。\n\
  \n### 控制存储索引\n\n你能用来控制存储索引行为的操作不多。不过，开发人员内置了一些隐藏参数，提供了一定的灵活性。\n\n有四个数据库参数涉及存储索引（据我们所知）：\n\
  \n*   `_kcfis_storageidx_disabled`（默认值为`FALSE`）\n*   `_kcfis_storageidx_diag_mode`（默认值为\
  \ 0）\n*   `_cell_storidx_mode`（默认值为`EVA`）\n*   `_cell_storidx_minmax_enabled`（默认值为`TRUE`）\n\
  \n这些参数均未记录在案，因此对于我们在本节中讨论的方法需要谨慎。尽管如此，我们还是会告诉你其中一些参数的作用以及它们能做什么。\n\n### _kcfis_storageidx_disabled\n\
  \n`_kcfis_storageidx_disabled`参数允许禁用存储索引。与所有隐藏参数一样，在设置之前最好先咨询 Oracle 支持，但就隐藏参数而言，这个相对无害。我们在测试中广泛使用过它，没有遇到任何负面后果。\n\
  \n你可以使用`alter session`语句在会话级别设置该参数：\n\n```sql\nalter session set \"_kcfis_storageidx_disabled\"\
  =true;\n```\n\n请注意，尽管将`_kcfis_storageidx_disabled`设置为`TRUE`会禁用读取的存储索引，但此设置并不会禁用对现有存储索引的维护。也就是说，即使此参数设置为`TRUE`，当表中的值发生变化时，现有的存储索引仍然会被更新。\n\
  \n### _kcfis_storageidx_diag_mode\n\n第二个参数`__KCFIS_STORAGEIDX_DIAG_MODE`与之前讨论过的`cellinit.ora`参数`_CELL_STORAGE_INDEX_DIAG_MODE`惊人地相似。正如你可能预料的那样，在数据库层设置此参数会导致所有受影响的存储单元上生成跟踪文件。将其设置为值\
  \ 2 可启用跟踪。奇怪的是，将其设置为值 1 会禁用存储索引。不幸的是，跟踪文件是在存储单元上创建的，但这种生成它们的方法比重启存储服务器上的`cellsrv`进程干扰小得多。\n\
  \n你可以使用`alter session`语句在会话级别设置该参数：\n\n```sql\nalter session set \"_kcfis_storageidx_diag_mode\"\
  =2;\n```\n\n该参数可能还有其他有效值，可以启用不同级别的跟踪。请记住，这将在每个涉及使用存储索引的查询所涉及的存储单元上生成大量跟踪文件。\n\n\
  ### _cell_storidx_mode\n\n`_CELL_STORIDX_MODE`参数是在 Oracle Database 11gR2 的第二个补丁集（11.2.0.2）中添加的。虽然此参数没有文档记录，但看起来它控制存储索引将应用于何处。此参数有三个有效值（`EVA,KDST,ALL`）。`EVA`和`KDST`是\
  \ Oracle 内核函数名称。\n\n你可以使用`alter session`语句在会话级别设置该参数：\n\n```sql\nalter session set\
  \ \"_cell_storidx_mode\"=ALL;\n```\n\n此参数的效果在不同版本中有所不同。截至`cellsrv`版本 11.2.2.3.0，`EVA`（默认值）支持所有有效的比较运算符。你应该注意，在旧版本中，`EVA`设置不支持`IS\
  \ NULL`比较运算符。同样重要的是要记住，数据库补丁与存储软件补丁是相关的。如果只升级`cellsrv`版本而不打数据库软件补丁，可能会导致不可预测的行为（例如，禁用存储索引）。\n\
  \n### _cell_storidx_minmax_enabled\n\n`_CELL_STORIDX_MINMAX_ENABLED`参数是在 Oracle\
  \ Database 12.1.0.2 版本中添加的。默认值为`TRUE`。\n\n此参数控制`cellsrv`版本 12.1.2.1.0 及更高版本中的一项新功能，即除了为\
  \ 1MB 数据块所做的最小值和最大值跟踪外，单元服务器还跟踪某个段中某一列的运行最小值和最大值。参数`_CELL_STORIDX_MINMAX_ENABLED`控制数据库层是尝试使用存储服务器上计算的段列最小值和最大值，还是尝试在数据库层计算此值。使用存储层为列计算的最小值和最大值可以加快\
  \ Smart Scan 的处理速度，因为它可以完全跳过为 SQL 中的`min()`和`max()`函数扫描存储索引。单元服务器中段级最小值和最大值的使用情况不会反映在行源操作符中。存储索引使用情况的统计信息（cell\
  \ physical IO bytes saved by storage index）的更新方式与常规存储索引使用情况相同，这使得单元保存的列最小值和最大值的实际使用变得不可见。\n\
  \n#### 存储软件参数\n\n除了数据库参数外，还有许多与存储索引行为相关的、未记录的存储软件参数。可以通过将它们添加到`cellinit.ora`文件（为所有（卸载）服务器设置）并重启`cellsrv`来修改这些参数，或者在卸载服务器特定的`celloffloadinit.ora`文件中设置它们。请注意，`cellinit.ora`将在第\
  \ 8 章中更详细地讨论。正如本章前面所讨论的，有些参数也可以使用`alter cell events=\"immediate cellsrv.cellsrv_setparam('参数',值)\"\
  `在存储服务器上在线设置。以下是`cellinit.ora`存储索引参数及其默认值的列表：\n\n*   `_cell_enable_storage_index_for_loads=TRUE`\n\
  *   `_cell_enable_storage_index_for_writes=TRUE`\n*   `_cell_si_max_num_diag_mode_dumps=20`\n\
  *   `_cell_storage_index_columns=0`\n*   `_cell_storage_index_diag_mode=0`\n*  \
  \ `_cell_storage_index_partial_rd_sectors=512`\n*   `_cell_storage_index_partial_reads_threshold_percent=85`\n\
  *   `_cell_storage_index_sizing_factor=2`\n*   `_cell_si_expensive_debug_tracing=FALSE`\n\
  *   `_cell_si_lock_pool_num_locks=1024`\n*   `_si_write_diag_disable=FALSE`\n\n\
  你已经在监控存储索引部分看到了跟踪参数（`_CELL_STORAGE_INDEX_DIAG_MODE`和`_CELL_SI_MAX_NUM_DIAG_MODE_DUMPS`）。我们认为这两个参数最有用，尽管你应该从列表中看出，还有一些内置的能力可以修改行为，例如为存储索引分配的内存大小以及每个表可以索引的列数。\n\
  \n\n### 行为\n\n在控制存储索引何时使用、何时不使用方面，你能做的操作并不多。除了禁用它们的参数外，你能做的很少。没有特定的提示（hint）可以启用或禁用它们的使用。而且不幸的是，`OPT_PARAM`\
  \ 提示对 `_KCFIS_STORAGEIDX_DISABLED` 参数也无效。事实上，由于没有办法强制使用存储索引，理解这种强大的优化在何时会起作用、何时不会起作用就变得更加重要。\n\
  \n为了使存储索引被使用，一个查询必须包含或利用以下所有条件：\n\n*   **智能扫描**：存储索引只能与执行智能扫描的语句一起使用。这附带了一整套要求，详见第\
  \ 2 章。主要要求是优化器必须选择全表扫描，并且 I/O 必须通过直接路径读取机制完成。\n*   **至少一个谓词**：为了使语句使用存储索引，必须有一个包含至少一个谓词的\
  \ `WHERE` 子句。\n*   **简单的比较运算符**：存储索引可以与以下运算符一起使用：\n    `=, <, >, BETWEEN, >=, <=,\
  \ IN, IS NULL, IS NOT NULL`\n    请注意缺少 \"`!=`\"。\n\n如果一个查询满足至少包含一个涉及简单比较运算符的谓词的要求，并且该查询的执行利用了智能扫描，那么存储软件就可以使用存储索引。它们可以应用于查询的以下任何方面：\n\
  \n*   **多列谓词**：存储索引可以与同一表上的多个谓词一起使用。\n*   **连接**：存储索引可用于访问多表的语句，以在执行连接操作之前最小化磁盘\
  \ I/O。\n*   **并行查询**：存储索引可以被并行查询工作进程使用。事实上，由于启用存储索引需要直接路径读取，因此并行查询对于确保能够使用存储索引非常有用。\n\
  *   **HCC**：存储索引与 HCC 压缩表配合工作。\n*   **绑定变量**：存储索引与绑定变量配合工作。绑定变量的值似乎在每次执行时都会传递给存储单元。\n\
  *   **分区**：存储索引与分区对象配合工作。单个语句可以在同一次执行中受益于分区消除和存储索引。\n*   **子查询**：存储索引与将列与子查询返回的值进行比较的谓词配合工作。\n\
  *   **加密**：存储索引在加密表上工作。\n\n当然也存在限制。以下是一些会阻止使用存储索引的功能和语法：\n\n*   **CLOBs**：不会为 CLOB\
  \ 创建存储索引。\n*   **`!=`**：存储索引不适用于使用 `!=` 比较运算符的谓词。\n*   **通配符**：存储索引不适用于使用 % 通配符的谓词。\n\
  \n另一个限制是存储索引最多可能包含一个表的八列。它们是为每个表创建和维护八列的；然而，这并不意味着具有超过八个谓词的查询无法利用存储索引。在这种情况下，存储软件可以使用现有的索引，但默认情况下最多只能索引八列。存储服务器似乎维护着一种机制来衡量存储索引中列的受欢迎程度，并且可以随着时间的推移，当不同的字段在谓词中使用时，选择将表的不同字段包含在存储索引中。看起来开发者确实参数化了存储索引中列数的设置。因此，在\
  \ Oracle 支持的帮助下，可能可以更改此值，尽管我们从未听说过它被更改过。最后，请记住，存储索引不会持久化到磁盘。每当 `cellsrv` 程序重启时，存储单元必须重建它们。它们通常在存储服务器重启后，第一次引用给定列的智能扫描期间创建。这意味着，启动后创建的存储索引捕获的表和字段几乎肯定会存在差异，除非完全按照与上次启动后相同的顺序执行完全相同的\
  \ SQL。它们也可以在通过 `CREATE TABLE AS SELECT` 语句创建表时，或其他直接路径加载期间创建。当然，存储单元也会根据应用程序对表中数据的更改来更新存储索引。\n\
  \n### 性能\n\n存储索引提供了 Exadata 平台上一些最显著的性能优势。根据特定列的聚簇因子（即该列数据在磁盘上的排序程度），结果可能非常惊人。这里有一个典型的例子，展示了查询在有和没有存储索引优势下的性能：\n\
  \n```sql\nKSO@dbm2> alter session set cell_offload_processing=false;\n\n会话已更改。\n\
  \nKSO@dbm2> alter session set \"_kcfis_storageidx_disabled\"=true;\n\n会话已更改。\n\n\
  KSO@dbm2> select count(*) from skew3;\n\n  COUNT(*)\n----------\n716798208\n已用时间:\
  \ 00:00:22.82\n\nKSO@dbm2> alter session set cell_offload_processing=true;\n\n会话已更改。\n\
  已用时间: 00:00:00.00\n\nKSO@dbm2> select count(*) from skew3;\n\n  COUNT(*)\n----------\n\
  716798208\n已用时间: 00:00:05.77\n\nKSO@dbm2> select count(*) from skew3 where pk_col\
  \ = 7000;\n\n  COUNT(*)\n----------\n        80\n已用时间: 00:00:02.32\n\nKSO@dbm2>\
  \ alter session set \"_kcfis_storageidx_disabled\"=false;\n\n会话已更改。\n已用时间: 00:00:00.00\n\
  \nKSO@dbm2> select count(*) from skew3 where pk_col = 7000;\n\n  COUNT(*)\n----------\n\
  \          80\n已用时间: 00:00:00.14\n```\n\n在此演示开始时，所有下推处理都通过数据库初始化参数 `CELL_OFFLOAD_PROCESSING`\
  \ 被禁用。存储索引也通过隐藏参数 `_KCFIS_STORAGEIDX_DISABLED` 被禁用。运行了一个没有 `WHERE` 子句的查询，它使用直接路径读取完成，但没有进行下推处理。该查询耗时\
  \ 22 秒完成全表扫描，并将整个块返回到数据库网格，就像在非 Exadata 存储环境中一样。然后重新启用下推处理并重复查询。这次它大约在五秒钟内完成。经过时间的改善主要归功于列投影，因为存储层只需返回行计数器，而无需返回任何列值。\n\
  \n随后向查询添加了一个选择性非常高的 `WHERE` 子句；这将时间减少到大约两秒。这种改进得益于谓词过滤和存储服务器闪存缓存开始缓存扫描中使用的数据。请记住，存储索引仍然处于关闭状态。只有\
  \ 80 行的计数器需要返回给数据库机器，但存储单元仍需读取所有数据以确定要返回哪些行。最后，通过将 `_KCFIS_STORAGEIDX_DISABLED`\
  \ 设置为 `FALSE` 重新启用了存储索引，并再次执行了带有 `WHERE` 子句的查询。这次经过时间仅为约 140 毫秒。虽然这种性能提升看起来很极端，但在使用存储索引时相对常见。\n\
  \n"
- "# 空值的特殊优化\n\n对于存储索引而言，空值是一个特例。存储索引结构中有一个单独的标志，用于指示某个存储区域是否包含空值。这个独立的标志使得查询空值（或非空值）的效率比通常进行的最小值/最大值比较更高。以下是一个示例，对比了使用和不使用特殊空值优化时的典型性能：\n\
  \n```\nKSO@dbm2> set timing on\n\nKSO@dbm2> select count(*) from skew3 where col1=1000;\n\
  \n  COUNT(*)\n----------\n         0\nElapsed: 00:00:01.96\n\nKSO@dbm2> select name,\
  \ value\n  2  from v$mystat s, v$statname n\n  3  where s.statistic# = n.statistic#\n\
  \  4  and name like '%storage index%';\nNAME                                   \
  \                               VALUE\n----------------------------------------------------------------\
  \ --------------\ncell physical IO bytes saved by storage index                \
  \       2879774720\nElapsed: 00:00:00.00\n\nKSO@dbm2> select count(*) from skew3\
  \ where col1 is null;\n\n  COUNT(*)\n----------\n        16\nElapsed: 00:00:00.13\n\
  \nKSO@dbm2> select name, value\n  2  from v$mystat s, v$statname n\n  3  where s.statistic#\
  \ = n.statistic#\n  4  and name like '%storage index%';\nNAME                  \
  \                                                 VALUE\n----------------------------------------------------------------\
  \ ---------------\ncell physical IO bytes saved by storage index               \
  \       32299237376\nElapsed: 00:00:00.00\n```\n\n在此示例中，可以看到检索少数空值的速度极快。这是因为任何不包含空值的存储区域都无需被读取，因此不会出现需要读取实际数据的误报情况来拖慢此查询。对于任何其他值（除非是该列的最小值或最大值），很可能存在一些无法被排除的存储区域，即使它们实际上并不包含与谓词匹配的值。这正是前一个示例中的情况：第一个查询虽然花了两秒从磁盘读取所有数据，但未返回任何记录。另请注意，空值查询节省的\
  \ I/O 量略高于 27 千兆字节（GB），而第一个查询节省的 I/O 量仅约 2.5GB。这意味着第一个查询能够排除的存储区域要少得多。\n\n### 值的物理分布\n\
  \n存储索引的行为与常规索引大不相同。它们维护的是磁盘上所存储值的粗略概览。然而，在某些情况下，它们的机制可以非常有效地消除大量磁盘 I/O，同时保持维护它们的成本相对较低。需要牢记的是，数据在磁盘上的物理分布对存储索引的有效性有重大影响。通过一个图示可以更清晰地说明这一点。\n\
  \n假设你有一个表，其中包含一个具有唯一值的列（即没有重复值）。如果数据在磁盘上的存储方式使得各行按该列排序，那么对于该列的任何一个给定值，都将有且仅有一个存储区域可能包含它。任何在该列上带有等值谓词的查询，最多只需读取一个存储区域。图\
  \ 4-2 展示了一个排序列的存储索引概念图。\n\n![A978-1-4302-6242-8_4_Fig2_HTML.jpg](img/A978-1-4302-6242-8_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 排序列上的存储索引\n\n从图 4-2 可以看出，如果你想检索值为 102 的记录，只有一个存储区域可能包含该值。\n\n现在假设相同的数据集以随机顺序存储在磁盘上。你认为需要读取多少个存储区域才能通过等值谓词定位到单行数据？这取决于一个存储区域可以容纳多少行，但答案肯定比排序数据集所需的一个存储区域要大得多。\n\
  \n事情就是这么简单。存储索引在排序数据上更有效。从性能角度看，数据在磁盘上排序得越好，使用存储索引时的平均访问时间就越快。对于一个完全排序的列，访问时间应该非常快，而且无论请求什么值，访问时间的变化都应该很小。对于未排序的数据，访问时间在值范围的两端会较快（因为没有多少存储区域的值范围会包含被查询的值）。分布中间值的平均访问时间会有很大差异。图\
  \ 4-3 是一个比较使用存储索引访问排序和未排序数据的图表。\n\n![A978-1-4302-6242-8_4_Fig3_HTML.jpg](img/A978-1-4302-6242-8_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 存储索引访问时间——排序 vs. 未排序\n\n如你所见，排序数据能提供更好且更一致的结果。既然谈到这一点，我应该指出，在许多情况下，多个列都会受益于存储索引的这种行为特性。在数据仓库环境中，数据通常按日期列进行分区，并且常常有许多其他列也用于跟踪分区键，例如相关的日期（如下单日期、发货日期、插入日期、退货日期）或顺序生成的数字（如订单号）。针对这些列的查询常常存在问题，因为分区消除无法帮助它们。只要在加载前确保数据已预先排序，存储索引就能提供类似于分区消除的益处。这意味着，应将表或分区数据的排序视为数据移动或加载的一部分，以提高不仅限于存储索引，还包括混合列式压缩的效率。然而，一个给定的表或分区只能按一个列进行排序和存储。\n\
  \n### 潜在问题\n\n天下没有免费的午餐。就像生活中的所有事物一样，存储索引也存在一些你应该了解的问题。\n\n\n## 不正确结果\n\n迄今为止，存储索引最大的问题在于\
  \ Exadata 存储软件的早期版本中存在一些导致结果不正确的错误。具体来说，在某些情况下，使用存储索引可能会错误地排除掉实际包含相关记录的存储区域。这种不正确的排除，可能是由于智能扫描使用存储索引时，并发\
  \ DML 操作的时序问题所导致。这些错误已在 11.2.0.2 版本及相应的存储服务器补丁中得到修复。在当前时间（Oracle 11.2.0.4/12.1.0.2），结果出错的可能性极低，意味着其发生概率不高于\
  \ Oracle 数据库其他部分可能出现的问题。如果您遇到或怀疑遇到此问题，通过将隐藏参数 `_KCFIS_STORAGEIDX_DISABLED` 设置为 `TRUE`\
  \ 来禁用存储索引使用，可能是诊断查询结果差异的一个选项。如果查询在使用存储索引时确实产生不同的结果，您可以使用此参数在系统范围内禁用存储索引，或者为会话设置此参数，直到应用了适当的补丁。该参数可以通过\
  \ `alter session` 命令设置，以便只影响有问题的查询。当然，在启用任何隐藏参数之前，您应该先咨询 Oracle 支持。此外，MOS 笔记 1260804.1（如何诊断智能扫描和错误结果）对于诊断潜在的\
  \ Exadata/智能扫描相关问题（包括存储索引返回错误结果）也会有所帮助。\n\n#### 移动目标\n\n存储索引有时会让人感到沮丧，因为它们并不总是在您期望时生效。而且，因为您无法告诉\
  \ Oracle 您真的希望某个存储索引存在并被使用，除了尝试理解在某些情况下它们为何不存在或未被使用，以便将来避免这些条件外，您能做的很少。\n\n在存储服务器软件的早期版本中，存储索引被禁用的主要原因之一是隐式数据类型转换。多年来，Oracle\
  \ 在执行“智能”数据类型转换方面做得越来越好，这些转换不会产生负面的性能后果。例如，如果您编写的 SQL 语句的 `WHERE` 子句将日期字段与字符串进行比较，Oracle\
  \ 通常会对字符串应用 `to_date` 函数，而不是修改日期列（后者可能产生禁用索引的不良副作用）。不幸的是，当 Exadata 存储软件相对较新时，并非所有的细节都已解决，至少没有达到我们从数据库一侧所习惯的程度。日期问题尤其棘手。以下是使用\
  \ `cellsrv` 11.2.1.2.6 的一个示例：\n\n```\nSYS@EXDB1> select count(*) from kso.skew3\
  \ where col3 = '20-OCT-05';\n\nCOUNT(*)\n----------\n         0\n\nElapsed: 00:00:14.00\n\
  SYS@EXDB1> select name, value\n  2  from v$mystat s, v$statname n\n  3  where s.statistic#\
  \ = n.statistic#\n  4  and name like '%storage index%';\n\nNAME                \
  \                                      VALUE\n-------------------------------------------------\
  \ ---------------\ncell physical IO bytes saved by storage index               \
  \ 0\n\nElapsed: 00:00:00.01\nSYS@EXDB1> select count(*) from kso.skew3 where col3\
  \ = '20-OCT-2005';\n\nCOUNT(*)\n----------\n         0\n\nElapsed: 00:00:00.07\n\
  SYS@EXDB1> select name, value\n  2  from v$mystat s, v$statname n\n  3  where s.statistic#\
  \ = n.statistic#\n  4  and name like '%storage index%';\n\nNAME                \
  \                                      VALUE\n-------------------------------------------------\
  \ ---------------\ncell physical IO bytes saved by storage index     15954337792\n\
  \nElapsed: 00:00:00.01\n```\n\n在这个非常简单的例子中，有一个查询的谓词将一个日期列（`col3`）与一个包含日期的字符串进行比较。一种情况下，字符串包含四位数的年份。另一种情况下，只使用了两位数字。只有使用四位年份格式的查询使用了存储索引。让我们看看这两个语句的执行计划，以了解为什么这两个查询被区别对待：\n\
  \n```\nSYS@EXDB1> @fsx2\nEnter value for sql_text: select count(*) from kso.skew3\
  \ where col3 = %\nEnter value for sql_id:\nEnter value for inst_id:\n\nSQL_ID  \
  \          AVG_ETIME  PX OFFLOAD IO_SAVED% SQL_TEXT\n------------- -------------\
  \ --- ------- --------- ----------------------------------------\n2s58n6d3mzkmn\
  \           .07   0 Yes        100.00 select count(*) from kso.skew3 where\n   \
  \                                                col3 = '20-OCT-2005'\nfuhmg9hqdbd84\
  \         14.00   0 Yes         99.99 select count(*) from kso.skew3 where\n   \
  \                                                col3 = '20-OCT-05'\n\n2 rows selected.\n\
  \nSYS@EXDB1> select * from table(dbms_xplan.display_cursor('&sql_id','&child_no','typical'));\n\
  Enter value for sql_id: fuhmg9hqdbd84\nEnter value for child_no:\n\nPLAN_TABLE_OUTPUT\n\
  --------------------------------------------------------------------------------------------\n\
  SQL_ID  fuhmg9hqdbd84, child number 0\n-------------------------------------\nselect\
  \ count(*) from kso.skew3 where col3 = '20-OCT-05'\n\nPlan hash value: 2684249835\n\
  \n--------------------------------------------------------------------------\n|\
  \ Id | Operation                   | Name  | Rows | Bytes | Cost (%CPU)| Time  \
  \   |\n--------------------------------------------------------------------------\n\
  |  0 | SELECT STATEMENT            |       |      |       |  535K(100)|        \
  \  |\n|  1 |  SORT AGGREGATE             |       |    1 |     8 |            | \
  \         |\n|* 2 |   TABLE ACCESS STORAGE FULL | SKEW3 |  384 |  3072 |  535K \
  \  (2)| 01:47:04 |\n```\n\n\n#### 分区大小\n\n存储索引依赖于智能扫描，而智能扫描又依赖于直接路径读取。正如我们在第 2 章中讨论的，Oracle\
  \ 通常会对大型对象使用串行直接路径读取。然而，当对象被分区时，Oracle 可能无法识别该对象是“大”的，因为它查看的是每个单独段的大小。这可能导致某些分区无法通过智能扫描机制读取，从而禁用了该分区的任何存储索引。当历史分区被压缩时，问题变得更加明显，因为压缩分区的减小尺寸更不可能触发串行直接路径读取。这个问题可以通过不依赖串行直接路径读取算法来解决，而是为对象指定并行度或使用提示来强制所需的行为。\n\
  \n#### 不兼容的编码技术\n\n最后，有一些编码技术会禁用存储索引。这里有一个例子展示了 `trunc` 函数对日期列的影响：\n\n```sql\nKSO@dbm2>\
  \ select count(*) from skew3 where trunc(col3) = ’20-OCT-2005’;\n\n  COUNT(*)\n\
  ----------\n         0\n\n1 row selected.\n\nElapsed: 00:00:05.36\n```\n\n```sql\n\
  KSO@dbm2> @expl\nPLAN_TABLE_OUTPUT\n-----------------------------------------------------------------------------------------------------------------------------------------------------------\n\
  SQL_ID  2mkcfrs28z393, child number 0\n-------------------------------------\nselect\
  \ count(*) from skew3 where trunc(col3) = ’20-OCT-2005’\n\nPlan hash value: 2684249835\n\
  \n------------------------------------------------------------------------------------\n\
  | Id  | Operation                  | Name  | Rows  | Bytes | Cost (%CPU)| Time \
  \    |\n------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT           |       |       |       |   995K(100)|      \
  \    |\n|   1 |  SORT AGGREGATE            |       |     1 |     8 |           \
  \ |          |\n|*  2 |   TABLE ACCESS STORAGE FULL| SKEW3 |  7167K|    54M|   995K\
  \  (3)| 00:00:39 |\n------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \n   2 - storage(TRUNC(INTERNAL_FUNCTION(\"COL3\"))=TO_DATE(’ 2005-10-20\n     \
  \         00:00:00’, ’syyyy-mm-dd hh24:mi:ss’))\n       filter(TRUNC(INTERNAL_FUNCTION(\"\
  COL3\"))=TO_DATE(’ 2005-10-20\n              00:00:00’, ’syyyy-mm-dd hh24:mi:ss’))\n\
  \n22 rows selected.\n```\n\n在这个例子中，对日期列应用了一个函数，正如你可能预料的那样，这会禁用存储索引。对列应用函数会禁用存储索令并不太令人惊讶，但\
  \ `trunc` 函数的应用是一种常见的编码技术。许多日期包含时间组件，许多查询希望获取特定日期的数据。众所周知，以这种方式截断日期会禁用正常的 B-tree\
  \ 索引使用。过去，这通常并不重要。许多数据仓库环境中的查询本来就是设计为进行全表扫描，因此确实无需担心禁用索引。存储索引从这个角度改变了游戏规则，可能迫使我们重新思考一些方法。我们将在第\
  \ 16 章更详细地讨论这个问题。\n\n## 总结\n\n存储索引是一种在数据库能够利用智能表扫描时可用的优化技术。它们可以提供显著的性能改进，尽管最近单元格服务器版本中智能扫描数据在闪存缓存中的缓存使得智能扫描性能更接近存储索引优化后的性能。对于通过跟踪主分区键的备用键访问数据的查询尤其有效。\n\
  \n数据的物理存储方式是一个重要的考虑因素，并对存储索引的有效性产生显著影响。迁移到 Exadata 平台时应谨慎，以确保数据在磁盘上的聚集方式能够允许存储索引被有效使用。还应考虑到，存储索引仅限于八个列，并且是依赖于导致智能扫描的\
  \ SQL 谓词而完全自动创建的。\n\n"
- '# 5. `Exadata 智能闪存缓存`


  Oracle 营销部门一定非常喜欢“智能”这个词。他们已将其应用于 `Exadata` 平台上的众多不同功能。他们似乎也喜欢“闪存”这个词，这个词也与至少六项功能相关。更令人困惑的是，`Oracle
  数据库 12c 第 1 版` 中有两个功能的名称几乎完全相同——`数据库智能闪存缓存 (DBFC)` 和 `Exadata 智能闪存缓存 (ESFC)`。虽然这两种功能都利用了基于闪存的内存设备，但它们非常不同。在本章中，我们将重点讨论
  `ESFC` 和 `OLTP` 优化，并仅简单提及 `DBFC`。


  `Exadata V2`（第一个配备 `ESFC` 的版本）的初始目标之一是扩展 `Exadata` 的能力，以提高其在 `OLTP` 工作负载下的性能。为了实现这一目标，`ESFC`
  是添加到 `V2` 配置中的关键组件。基于 `ESFC` 的功能——例如 `Exadata 智能闪存日志 (ESFL)` 以及后来的 `回写闪存缓存 (WBFC)`，还有闪存缓存压缩等——都在后续版本中被引入。除了从
  `V2` 升级到 `X2` 的那一步，每一代新的 `Exadata` 硬件都有更多的闪存可用。在撰写本文时，当前的硬件代次是 `Exadata X5-2`，在一个全机架、配备高容量存储服务器的情况下，您可以拥有大约
  `90TB` 的缓存。在全闪存、`X5-2` 高性能（`HP`）存储节点上，闪存缓存的处理方式略有不同。您可以稍后在本章中详细了解。重要的是要理解，该缓存由 `Oracle`
  软件管理，并且该软件知晓存储层所支持的数据库如何使用数据。`Oracle` 在有效管理数据库缓存的软件方面已经研发了超过 30 年。由于存储软件知道数据库正在请求什么，因此它比传统存储阵列更清楚哪些数据应该或不应该被缓存。


  ## `DBFC` 与 `ESFC`


  `DBFC` 和 `ESFC` 是两种完全不同的东西。`DBFC` 是数据库服务器上缓冲区缓存（`buffer cache`）的扩展。它是 `11g` 的标准组件，作为实例的二级（`tier
  2`）缓冲区缓存实现。它仅在 `Solaris` 和 `Oracle Linux` 上受支持。它通过将闪存磁盘（`SSD`）添加到数据库服务器并告诉单个实例使用它来启用。如果用户需要一个不在缓冲区缓存中的数据块，它会在请求
  `I/O` 之前先查看 `DBFC` 中是否存在该块。当数据块从缓冲池中老化时，它们会被移至 `DBFC`，而不是简单地被刷新。`ESFC` 当然是 `Exadata`
  存储服务器上的磁盘缓存。它为访问存储单元（`storage cell`）的所有实例缓存数据。


  ### 硬件


  在当前的 `Exadata` 代次发布之前，描述硬件一直更容易。从 `V2` 开始直到（但不包括）`X5-2`，每台 `Exadata` 存储服务器都可以用相同的方式描述。每个单元（`cell`）都有四块用于智能闪存缓存的
  `PCI Express` 卡，加上 12 块硬盘，无论它是高性能（`HP`）还是高容量（`HC`）型号。对于 `X5` 系列，关于闪存卡的数量，您需要区分 `HC`
  和 `HP` 单元。后者（`HP`）在 `Exadata` 产品历史上首次不再配备任何硬盘，而是配备了 8 块下一代 `PCIe` 卡，每个单元的原始容量为 `12.8TB`。由于
  `X5-2` 高性能存储服务器没有任何用于数据库存储的硬盘，闪存设备除了作为 `RDBMS` 层 `I/O` 请求的存储层缓存外，还将被用于持久化存储数据库文件。


  每台 `Exadata X5-2` 高容量存储服务器有四块 `Flash Accelerator PCIe` 卡，每块原始容量为 `1.6TB`，每个单元总原始空间为
  `6.4TB`。除了所用闪存设备容量更大外，`HC` 型号遵循与早期硬件代次相同的设计原则。


  查看每块卡的原始存储空间数字，您需要知道这些是规格中引用的数字。实际可用的容量略少。卡硬件设计随时间而变化，篇幅允许我们本章只讨论 `X4` 和 `X5` 代次。在适用的情况下，会提及早期的硬件代次。对于本章，重点将放在
  `HC` 单元上，因为这可能是两种硬件选择中更常见的一种。


  ### Exadata X4-2 存储服务器中的闪存


  您刚刚读到，X4-2 存储服务器的高容量和高性能型号中的闪存是相同的：每个型号都有四块卡。它们作为 PCI Express (版本 2) 扩展卡连接。这些卡所在的
  PCIe 插槽每个有八条通道。Oracle 将这些闪卡称为 `F80`，或者更准确地说，是 Sun Flash Accelerator F80 PCIe 卡。其可用容量很容易记住，为
  800GB——产品名称中已有所暗示。在内部，该卡由四个各为 200 GB 的所谓闪存模块或 `FMODs` 组成。因此，单个 `F80` 卡在操作系统中会呈现为四个独立的块设备。您可以在
  X4-2 cell 上执行的 `lsscsi` 命令输出中看到这一点：


  ```

