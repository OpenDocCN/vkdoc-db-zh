  \ 15 分钟。该过程将导致数据库在所有实例上生成`csnn`进程，这些进程的数量由磁盘数量参数设置。如果过程完成，它将显示校准结果。例如：\n```\nmax_iops\
  \ = 11237\nlatency  = 8\nmax_mbps = 5511\n\nPL/SQL 过程已成功完成。\n```\n\n`SQL> select\
  \ * from V$IO_CALIBRATION_STATUS;`\n\n\n\n`状态        校准时间                      \
  \     连接 ID`\n`------------- ---------------------------------------- ----------`\n\
  `就绪         24-MAY-15 07.17.45.086 上午                                  0`\n\n```\n\
  SQL> select start_time, MAX_IOPS, MAX_MBPS, MAX_PMBPS, LATENCY, NUM_PHYSICAL_DISKS\n\
  from DBA_RSRC_IO_CALIBRATE;\n\nSTART_TIME                      MAX_IOPS   MAX_MBPS\
  \  MAX_PMBPS    LATENCY NUM_PHYSICAL_DISKS\n------------------------------ ----------\
  \ ---------- ---------- ---------- ------------------\n24-MAY-15 07.11.38.691358\
  \ 上午        11237       5511        400          8                 36\n```\n\n这些更改需要重启数据库才能生效。重启后，自动\
  \ DOP 将使用校准详情。在某些情况下，可能无法运行校准，或者存在影响校准的错误（例如 11.2.0.2 在捆绑补丁 4 之前的版本），导致为自动生成过高的\
  \ DOP 数值，这意味着它将不会被考虑。在这些情况下，可以手动设置重要的校准详情。这在 My Oracle Support (MOS) 注意事项 1269321.1\
  \ 中有描述。具体操作如下：\n\n```\nSQL> delete from resource:io_calibrate$;\nSQL> insert into\
  \ resource:io_calibrate$ values(current_timestamp,\n2  current_timestamp, 0, 0,\
  \ 200, 0, 0);\nSQL> commit;\n```\n\n设置该值后需要重启数据库。200 这个值是 Oracle Support 推荐给在 Exadata\
  \ 上运行的客户使用的，也是 Oracle 用于在 Exadata 上测试自动 DOP 的值。\n\n### 自动 DOP 总结\n\n将 `PARALLEL_DEGREE_POLICY`\
  \ 设置为 `AUTO` 的最终结果是，所有类型的语句都将并行运行，即使没有对象被特别标注并行度设置。这确实是真正的自动并行处理，因为数据库决定什么并行运行以及使用多少从属进程。此外，默认情况下，这些从属进程可能会分布在\
  \ RAC 数据库中的多个节点上。不幸的是，这种功能组合有点像狂野西部，事情在各处并行运行。然而，并行语句排队的能力确实提供了一定的秩序感，这引出了下一个主题。\n\
  \n我们发现，在很多情况下，自动 DOP 对计算出的 DOP 过于乐观。一个值得注意的参数是 `PARALLEL_DEGREE_LEVEL`，当该参数的值设置为低于默认值\
  \ 100 时，可用于调低计算出的 DOP。其他限制（自动）DOP 的方法包括 `PARALLEL_DEGREE_LIMIT` 和数据库资源管理器。\n\n###\
  \ 并行语句排队\n\n当 Oracle 在 Oracle 版本 7 中首次引入并行查询功能时，Larry Ellison 在一个多处理器服务器上进行了演示，他是唯一的用户。CPU\
  \ 的利用率以图形方式显示，当演示并行查询功能时，所有 CPU 都在全速运行。我们想知道如果当时数据库中还有其他用户，他们在演示期间会有什么体验。很可能他们的体验不会好。这正是并行语句排队试图解决的问题。\n\
  \nOracle 的并行能力是一份伟大的礼物，但也是一个诅咒，因为在一个多用户试图共享资源的环境中控制这头野兽充其量是困难的。人们曾尝试提出一种合理的方法来限制大的并行语句。但到目前为止，我认为这些尝试并不太成功。\n\
  \nExadata 最有前途的方面之一是它能够运行混合工作负载（OLTP 和 DW）而不损害其中任何一个。为了做到这一点，Oracle 需要某种机制来分离工作负载，同样重要的是，限制资源密集型的并行查询。并行语句排队似乎正是这样一种工具。当与资源管理器结合使用时，它提供了一个相当健壮的机制，可以将工作负载限制在硬件可以支持的水平。\n\
  \n#### 旧方法\n\n在我们介绍新的并行排队功能之前，我们可能应该回顾一下在之前的版本中是如何做的。我们拥有的最佳工具是并行自适应多用户（Parallel\
  \ Adaptive Multiuser），它提供了在查询执行时根据工作负载自动降低给定语句并行度的能力。这实际上是一个强大的机制，也是我们在 11gR2 之前拥有的最佳方法。通过将\
  \ `PARALLEL_ADAPTIVE_MULTI_USER` 参数设置为 `TRUE` 可以启用此功能。顺便说一句，这仍然是 12c 的默认设置，所以这绝对是一个您可能需要考虑更改的参数。这种方法的一个缺点是，并行语句的并行度可能变化很大，因此执行时间也是如此。可以想象，一个语句这次获得了\
  \ 32 个从属进程，而下次却被降级为串行执行，这很可能不会让用户感到高兴。\n\n支持这种方法的论点是，如果系统繁忙，无论你做什么，查询都会运行得更慢，而且用户也期望在系统繁忙时运行得更慢。该论点的第一部分可能是真的，但我不相信第二部分（至少在大多数情况下）。然而，降级机制更大的问题在于，关于使用多少从属进程的决定是基于一个时间点——并行语句开始的时间点。回想一下，一旦为执行计划设置了并行度（DOP），就无法更改。即使在其运行期间有更多资源变得可用，该语句也会以分配给它的从属进程数量运行到完成。\n\
  \n考虑一个需要一分钟执行、使用 32 个从属进程的语句，并假设由于瞬间高负载，同一语句被降级为串行。现在，假设在其开始几秒钟后，系统负载回落到更正常的水平。不幸的是，这个串行语句将继续以其单个进程运行近\
  \ 30 分钟，尽管平均系统负载并不比平时更忙。这种不稳定的性能会对使用系统和支持系统的人造成严重破坏。\n\n\n### 新方式\n\n现在，让我们比较一下**并行自适应多用户**（旧方式）与\
  \ 11gR2 中引入的新机制，该机制允许并行语句排队。这种机制将长时间运行的并行查询与其他工作负载分离开来。其机制相当简单。启用该功能。使用 `PARALLEL_SERVERS_TARGET`\
  \ 参数设置并行从属进程的目标数量。运行一个应该是资源密集型的查询。如果一个需要超过目标数的语句尝试启动，它将被排队，直到所需的从属进程数量可用。当然，有许多细节需要考虑，以及可以应用于管理此过程的其他控制机制。让我们看看它的行为：\n\
  \n```sql\nSQL> alter system set parallel_degree_policy=auto;\n\n系统已更改。\n\nSQL> alter\
  \ system set parallel_servers_target=10;\n\n系统已更改。\n\nSQL> @parms\n\n输入 parameter\
  \ 的值: parallel%\n\n输入 isset 的值:\n\n输入 show_hidden 的值:\n\nNAME                  \
  \                                        VALUE       ISDEFAUL\n--------------------------------------------------\
  \ ---------   --------\nparallel_adaptive_multi_user                           \
  \      TRUE        FALSE\nparallel_automatic_tuning                            \
  \        FALSE       TRUE\nparallel_degree_level                               \
  \         100         TRUE\nparallel_degree_limit                              \
  \          CPU         TRUE\nparallel_degree_policy                            \
  \           AUTO        FALSE\nparallel_execution_message_size                 \
  \             16384       FALSE\nparallel_force_local                          \
  \               FALSE       TRUE\nparallel_instance_group                      \
  \                                  TRUE\nparallel_io_cap_enabled               \
  \                       FALSE       TRUE\nparallel_max_servers                 \
  \                        240         FALSE\nparallel_min_percent               \
  \                            0         TRUE\nparallel_min_servers              \
  \                             0         FALSE\nparallel_min_time_threshold     \
  \                             AUTO        TRUE\nparallel_server                \
  \                              TRUE        TRUE\nparallel_server_instances     \
  \                                 2         TRUE\nparallel_servers_target      \
  \                                  10        TRUE\nparallel_threads_per_cpu    \
  \                                    1        FALSE\n```\n\n为了执行多个使用自动 DOP 的 SQL\
  \ 语句并使它们排队，我们需要一个小脚本，如下所示。该脚本执行 10 个 `sqlplus` 进程，并使用“&”将其置于后台。末尾的 `wait` 命令等待所有后台进程完成。\n\
  \n```bash\nT=0\nwhile [ $T -lt 10 ]; do\necho \"select avg(id) from t1;\" | sqlplus\
  \ -S ts/ts &\nlet T=$T+1\ndone\nwait\necho \"Finished.\"\n```\n\n现在执行上面的脚本。如果我们通过\
  \ `DBMS_XPLAN` 查看输出，我们会看到，由于上面设置的 `PARALLEL_SERVERS_TARGET` 为 10，Auto DOP 计算出执行需要\
  \ 10 个从属进程：\n\n```sql\nSQL> @dplan b46903fft8uz4\n\n输入 sql_id 的值: b46903fft8uz4\n\
  输入 child_no 的值:\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------------------\n\
  SQL_ID  b46903fft8uz4, child number 2\n-------------------------------------\nselect\
  \ avg(id) from t1\n\nPlan hash value: 3110199320\n\n------------------------------------------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name      |   Rows| Bytes | Cost (%CPU)| Time\
  \     |     TQ |IN-OUT| PQ Distrib |\n------------------------------------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |           |       |       | 64140 (100)| \
  \         |        |      |            |\n|   1 |  SORT AGGREGATE             |\
  \           |     1 |     6 |            |          |        |      |          \
  \  |\n|   2 |   PX COORDINATOR            |           |       |       |        \
  \    |          |        |      |            |\n|   3 |    PX SEND QC (RANDOM) \
  \     | :TQ10000  |     1 |     6 |            |          |  Q1,00 | P->S | QC (RAND)\
  \  |\n|   4 |     SORT AGGREGATE          |           |     1 |     6 |        \
  \    |          |  Q1,00 | PCWP |            |\n|   5 |      PX BLOCK ITERATOR \
  \     |           |   100M|   572M| 64140   (1)| 00:00:02 |  Q1,00 | PCWC |    \
  \        |\n|*  6 |       TABLE ACCESS STORAGE FULL| T1       |   100M|   572M|\
  \ 64140   (1)| 00:00:02 |  Q1,00 | PCWP |            |\n------------------------------------------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   6 - storage(:Z>=:Z AND :Z<=:Z)\n\nNote\n-----\n   - automatic DOP: Computed\
  \ Degree of Parallelism is 10\n```\n\n在执行脚本启动多个 `sqlplus` 会话来执行并行化的表扫描之后，我们可以看到语句排队生效。首先，如果我们查看活动的并行查询进程数量，我们发现活动的并行查询进程数量没有超过设置的\
  \ 10 个的限制：\n\n```sql\nSQL> select * from v$px_process_sysstat where statistic like\
  \ '%In Use%';\n\nSTATISTIC                                     VALUE     CON_ID\n\
  ---------------------------------------- ---------- ----------\nServers In Use \
  \                                10          0\n```\n\n实际上，限制未被超过的原因正是并行语句排队，这可以在\
  \ `V$SQL_MONITOR` 和等待接口中看到：\n\n```sql\nSQL> select sid, sql_id, sql_exec_id, sql_text\
  \ from v$sql_monitor where status='QUEUED';\n\nSID SQL_ID            SQL_EXEC_ID\
  \ SQL_TEXT\n----- ------------- ----------- ------------------------------\n  588\
  \ b46903fft8uz4    16777250 select avg(id) from t1\n  396 b46903fft8uz4    16777254\
  \ select avg(id) from t1\n  331 b46903fft8uz4    16777251 select avg(id) from t1\n\
  \  265 b46903fft8uz4    16777253 select avg(id) from t1\n  463 b46903fft8uz4   \
  \ 16777255 select avg(id) from t1\n  654 b46903fft8uz4    16777256 select avg(id)\
  \ from t1\n  263 b46903fft8uz4    16777252 select avg(id) from t1\n  200 b46903fft8uz4\
  \    16777249 select avg(id) from t1\n  166 b46903fft8uz4    16777249 select avg(id)\
  \ from t1\n已选择 9 行。\n\nSQL> @snapper ash=event+wait_class 1 1 all\n\n正在以 1 秒的间隔对所有\
  \ SID 进行采样，获取 1 个快照...\n\n-- Session Snapper v4.11 BETA - by Tanel Poder ( http://blog.tanelpoder.com\
  \ ) - 享受地球上最先进的 Oracle 故障排除脚本吧！ :)\n\n---------------------------------------------------------------\n\
  Active% | EVENT                               | WAIT_CLASS\n---------------------------------------------------------------\n\
  \   800% | resmgr:pq queued                    | Scheduler\n   700% | cell smart\
  \ table scan               | User I/O\n   300% | ON CPU                        \
  \      | ON CPU\n--  ASH 快照 1 结束, 结束时间=2015-05-25 07:17:51, 持续秒数=1, 采样次数=5\n\nPL/SQL\
  \ 过程已成功完成。\n```\n\n\n在此清单中有几处值得注意。为了设置所需条件，我们启用了自动 DOP（Auto DOP），这同时也启用了并行排队（Parallel\
  \ Queueing），然后将`PARALLEL_SERVER_TARGET`参数设置为一个非常低的数值（10），以便更容易触发排队。接着，我们使用一个 Shell\
  \ 脚本来执行 10 条受自动 DOP 影响的语句。查看`V$PX_PROCESS_SYSSTAT`可知，活跃的并行查询服务器不超过 10 个，这与`PARALLEL_SERVERS_TARGET`参数的设置相符。`V$SQL_MONITOR`显示这些语句确实在排队。这一点很重要。所有使用并行查询的语句都会出现在`V$SQL_MONITOR`视图中。请注意，此视图需要\
  \ Tuning Pack 许可。如果它们的状态是`QUEUED`，则表示它们并未实际执行，而是在等待足够的并行从属进程变为可用。我们运行了 Tanel Poder\
  \ 的 Snapper 脚本来查看这些排队语句正在等待什么事件。如你所见，等待事件是`resmgr: pq queued`。\n\n注意\n\n关于等待事件，还有一点你应该了解。与并行排队相关，存在一个等待事件的变化。此示例是使用\
  \ Oracle Database 12.1.0.2 创建的。如果你使用的是 11.2.0.1，你会看到一组不同的等待事件（有两个）。第一个是`PX Queuing:\
  \ statement queue`。这是当一个语句轮到运行时它所等待的事件。另一个是`enq: JX - SQL statement queue`。当语句在队列中前面还有其他语句时，它会等待此事件。这种方案似乎相当笨拙，这可能就是它在后续版本中被更改的原因。\n\
  \n#### 控制并行排队\n\n有几种机制可用于控制并行语句排队（Parallel Statement Queueing）功能的行为。基本方法是使用先进先出（FIFO）的排队机制。但也有办法在排队框架内对工作进行优先级排序。还可以通过提示（hint）完全绕过排队机制。反过来，即使数据库级别未启用并行语句排队功能，也可以通过提示为语句启用排队。还有一些参数会影响排队行为。最后，资源管理器（Resource\
  \ Manager）有能力影响语句的排队方式。\n\n### 使用参数控制排队\n\n有几个参数会影响并行排队的行为。前两个是`PARALLEL_MAX_SERVERS`（设置每个实例的并行查询从属进程的最大数量）和`PARALLEL_SERVERS_TARGET`参数（设置当并行查询从属进程的使用数量达到多少时，希望并行执行的语句需要排队）。\n\
  \n`PARALLEL_MAX_SERVERS`的默认值计算如下：\n\n```\nparallel_threads_per_cpu * cpu_count *\
  \ concurrent_parallel_users * 5\n```\n\n`PARALLEL_SERVERS_TARGET`的默认值计算如下：\n\n```\n\
  parallel_threads_per_cpu * cpu_count * concurrent_parallel_users * 2\n```\n\n`concurrent_parallel_users`的确定方式为：\n\
  \n*   如果设置了`SGA_TARGET`：则为 4。\n*   如果设置了`PGA_AGGREGATE_TARGET`：则为 2。\n*   否则为 1。\n\
  \n对于大多数混合工作负载系统来说，这个计算值几乎肯定高于你想要的值，因为它旨在让并行查询进程完全消耗可用的 CPU 资源。允许长时间运行的并行语句完全消耗服务器，意味着对响应时间敏感的\
  \ OLTP 类型语句可能会受到影响。你还应该注意，活动的服务器进程数量可能超过参数允许的数量。由于分配给一个查询的从属进程数量可能是 DOP（并行度）的两倍，因此偶尔可能会超过目标值。\n\
  \n在 12c 中，如果使用了`PARALLEL_STMT_CRITICAL`资源管理指令（本章稍后讨论），建议将`PARALLEL_SERVERS_TARGET`设置为`PARALLEL_MAX_SERVERS`的\
  \ 50-75%，以便绕过并行队列的关键查询能够利用剩余的并行从属进程。\n\n注意\n\n如果`PARALLEL_MAX_SERVERS`的计算值大于`PROCESSES`参数的值，则`PARALLEL_MAX_SERVERS`参数将被减小到低于`PROCESSES`参数的值。你将在实例启动时的警报日志中看到此行为的发生。\n\
  \n```\nMon May 06 18:43:06 2013\nAdjusting the default value of parameter parallel_max_servers\n\
  from 160 to 135 due to the value of parameter processes (150)\nStarting ORACLE instance\
  \ (normal)\n```\n\n另一个值得讨论的参数是隐藏参数`_PARALLEL_STATEMENT_QUEUING`，它用于开启和关闭此功能。正如在自动\
  \ DOP 部分已经讨论过的，当`PARALLEL_DEGREE_POLICY`参数设置为`AUTO`时，此参数会被设置为`TRUE`。但是，也可以手动设置此隐藏参数，以独立地开启和关闭并行排队。\n\
  \n自动 DOP 计算仍然有点令人担忧，所以很好有一种方法可以开启并行排队功能，而无需让 Oracle 完全控制哪些语句并行运行。当然，由于这涉及设置隐藏参数，在没有\
  \ Oracle 支持部门批准的情况下，你不应在生产环境中这样做。尽管如此，这里再提供一个快速示例，展示可以在不启用自动 DOP 或内存中并行执行的情况下开启排队：\n\
  \n```\nSQL > alter system set parallel_degree_policy=manual sid='*';\nSystem altered.\n\
  SQL > alter table ts.t1 parallel (degree 8);\nTable altered.\nSQL> @parms\nEnter\
  \ value for parameter: parallel\nEnter value for isset:\nEnter value for show_hidden:\n\
  NAME                                               VALUE\n--------------------------------------------------\
  \ ------\nparallel_adaptive_multi_user                       TRUE\nparallel_automatic_tuning\
  \                          FALSE\nparallel_degree_level                        \
  \      100\nparallel_degree_limit                              CPU\nparallel_degree_policy\
  \                             MANUAL\nparallel_execution_message_size          \
  \          16384\nparallel_force_local                               TRUE\nparallel_instance_group\n\
  parallel_io_cap_enabled                            FALSE\nparallel_max_servers \
  \                              128\n```\n\n\n\n\n`parallel_min_percent         \
  \              0`\n\n`parallel_min_servers                       32`\n\n`parallel_min_time_threshold\
  \                AUTO`\n\n`parallel_server                            TRUE`\n\n\
  `parallel_server_instances                  2`\n\n`parallel_servers_target     \
  \               10`\n\n`parallel_threads_per_cpu                   1`\n\n`T=0`\n\
  \n`while [ $T -lt 10 ]; do`\n\n`echo \"select avg(id) from t1;\" | sqlplus -S ts/ts\
  \ &`\n\n`let T=$T+1`\n\n`done`\n\n`wait`\n\n`echo \"Finished.\"`\n\n`SQL> select\
  \ * from v$px_process_sysstat where statistic like '%In Use%';`\n\n`STATISTIC  \
  \                    VALUE     CON_ID`\n\n`------------------------------ -----\
  \ ----------`\n\n`Servers In Use                    80          0`\n\n首先，我们将 `PARALLEL_DEGREE_POLICY`\
  \ 设置为 manual。这会禁用自动并行度、语句排队和内存中并行查询。接着，我们将 T1 表的并行度装饰为八。然后我们查看了名称中包含 `PARALLEL`\
  \ 的参数值。为了示例方便，我们将 `PARALLEL_FORCE_LOCAL` 设置为 `TRUE`，因此上述脚本的所有 `sqlplus` 会话都将在当前实例中使用并行查询从属进程。然后我们执行了该脚本。如你所见，10\
  \ 个会话都分配了它们的八个并行查询从属进程，因为我们看到有 80 个服务器在使用中。\n\n现在将未记录的参数 `_PARALLEL_STATEMENT_QUEUING`\
  \ 设置为 `TRUE`，并重新运行脚本以创建 10 个会话：\n\n`SQL> alter system set \"_parallel_statement_queuing\"\
  =true sid='*';`\n\n`System altered.`\n\n`T=0`\n\n`while [ $T -lt 10 ]; do`\n\n`echo\
  \ \"select avg(id) from t1;\" | sqlplus -S ts/ts &`\n\n`let T=$T+1`\n\n`done`\n\n\
  `wait`\n\n`echo \"Finished.\"`\n\n`SQL> select * from v$px_process_sysstat where\
  \ statistic like '%In Use%';`\n\n`STATISTIC                      VALUE     CON_ID`\n\
  \n`------------------------------ ----- ----------`\n\n`Servers In Use         \
  \           12          0`\n\n此输出表明在未开启自动并行度的情况下启用了语句排队。请注意，这涉及一个隐藏参数，这意味着如果你想在生产环境中应用此技术，应与\
  \ Oracle 支持讨论如何设置此参数。\n\n### 使用 Hint 控制语句排队\n\n有两个 Hint 可用于在语句级别控制并行语句排队。一个 Hint，`NO_STATEMENT_QUEUING`，允许完全绕过排队过程，即使该功能在实例级别已开启。另一个\
  \ Hint，`STATEMENT_QUEUING`，则会开启排队机制，即使该功能在实例级别未启用。`STATEMENT_QUEUING` Hint 提供了一种在不开启自动并行度的情况下使用排队功能的有文档记载的途径。\n\
  \n### 使用资源管理器控制排队\n\nOracle 的数据库资源管理器提供了额外的控制并行语句排队的能力。虽然全面讨论 DBRM 超出了本章范围，但我们将介绍一些与并行查询相关的特定功能。第\
  \ 7 章将更详细地介绍 DBRM。\n\n没有 DBRM 时，并行语句队列严格按先进先出（FIFO）方式运行。DBRM 提供了几个指令属性，可用于在消费者组基础上提供额外控制。这些控制中有许多是在\
  \ 11.2.0.2 版本中引入的。表 6-4 列出了 DBRM 提供的一些额外功能。\n\n**表 6-4.** DBRM 并行语句排队控制\n\n| 控制\
  \ | 描述 |\n| --- | --- |\n| 指定超时 | `PARALLEL_QUEUE_TIMEOUT` 指令属性可用于为消费者组设置最大排队时间。时间限制以秒为单位设置，一旦到期，语句将终止并报错（ORA-07454）。请注意，此指令直到数据库版本\
  \ 11.2.0.2 才可用。 |\n| 指定最大并行度 | `PARALLEL_DEGREE_LIMIT_P1` 指令属性设置可分配给单个语句的并行从属进程的最大数量。这等同于\
  \ `PARALLEL_DEGREE_LIMIT` 数据库参数，但用于基于不同用户集合设置限制。 |\n| 管理出队顺序 | `MGMT_P1`、`MGMT_P2`、...\
  \ `MGMT_P8` 指令属性可用于改变正常的 FIFO 处理。此属性允许在作为 CPU 和 I/O 的资源百分比分配（数据库内 IO 资源管理）之外，对出队进行优先级排序。这八个属性中的每一个基本上都提供一个不同的出队优先级级别。所有带有\
  \ `MGMT_P1` 属性的语句将在任何带有 `MGMT_P2` 的语句之前出队。除了出队优先级外，还可以分配一个概率数字来调节同一级别内语句的出队。 |\n\
  | 限制并行从属进程百分比 | `PARALLEL_TARGET_PERCENTAGE` 指令属性可用于将消费者组限制为系统可用并行从属进程的某个百分比。因此，如果系统在开始排队前允许\
  \ 64 个从属进程处于活动状态，且 `PARALLEL_TARGET_PERCENTAGE` 设置为 50，则该消费者组将只能使用 32 个从属进程。请注意，此指令直到数据库版本\
  \ 11.2.0.2 才可用。在 12c 中，`PARALLEL_SERVER_LIMIT` 取代了此指令。 |\n| 将多个 SQL 作为一组排队 | `DBMS_RESOURCE_MANAGER`\
  \ 包中的 `BEGIN_SQL_BLOCK` 和 `END_SQL_BLOCK` 过程通过将单个语句视为同时提交来配合并行语句排队工作。其思路是块中的所有语句都会一起出队，防止个别语句保持排队状态。该机制需要用\
  \ `BEGIN` 和 `END` 过程调用包围独立的 SQL 语句。请注意，此过程直到数据库版本 11.2.0.2 才可用。 |\n| 关键并行语句优先级 |\
  \ 在 12c 版本中，引入了 `PARALLEL_STMT_CRITICAL` 指令，当该指令为某个消费者组设置为 `BYPASS_QUEUE` 时，可使并行语句绕过语句队列。属于属性设置为\
  \ `BYPASS_QUEUE` 的消费者组的所有用户发出的查询都将绕过并行语句队列并立即执行。通过绕过机制，请求的并行从属进程总数可能超过 `PARALLEL_SERVERS_TARGET`。请注意，无论当前实际使用的并行查询进程有多少，关键查询都会运行，这意味着如果当前并行查询从属进程的使用量已达到\
  \ `PARALLEL_MAX_SERVERS`，则可能会遇到降级，甚至更糟，变为串行执行。这就是为什么你应该在 `PARALLEL_SERVERS_TARGET`\
  \ 和 `PARALLEL_MAX_SERVERS` 之间保留一些缓冲空间。 |\n\nDBRM 指令可能相当复杂。下面是一个修改自《Oracle® Database\
  \ VLDB and Partitioning Guide 12c Release 1 (12.1.0.2)》的示例，展示了如何利用并行语句排队功能：\n\n\
  ```\nBEGIN\nDBMS_RESOURCE_MANAGER.CLEAR_PENDING_AREA();\nDBMS_RESOURCE_MANAGER.CREATE_PENDING_AREA();\n\
  --新计划\nDBMS_RESOURCE_MANAGER.CREATE_PLAN(\n'DAYTIME_PLAN',\n'优先运行短查询的计划'\n);\n--消费者组\n\
  DBMS_RESOURCE_MANAGER.CREATE_CONSUMER_GROUP(\n'MEDIUM_TIME',\n'中等：运行时间在 1 到 10 分钟之间'\n\
  );\nDBMS_RESOURCE_MANAGER.CREATE_CONSUMER_GROUP(\n'LONG_TIME',\n\n\n\n\n`’运行时间超过\
  \ 10 分钟的长时间任务’`\n`);\n\n`--指令`\n`DBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(`\n\
  `’DAYTIME_PLAN’,`\n`’SYS_GROUP’,`\n`’针对 SYS 和高优先级查询的指令’,`\n`MGMT_P1 => 100,`\n`PARALLEL_STMT_CRITICAL\
  \ => ’BYPASS_QUEUE’`\n`);`\n`DBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(`\n`’DAYTIME_PLAN’,`\n\
  `’OTHER_GROUPS’,`\n`’针对运行时间少于 1 分钟的 SQL 的指令’,`\n`MGMT_P2 => 70,`\n`PARALLEL_DEGREE_LIMIT_P1\
  \ => 4,`\n`SWITCH_TIME => 60,`\n`SWITCH_ESTIMATE => TRUE,`\n`SWITCH_FOR_CALL =>\
  \ TRUE,`\n`SWITCH_GROUP => ’MEDIUM_TIME’`\n`);`\n`DBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(`\n\
  `’DAYTIME_PLAN’,`\n`’MEDIUM_TIME’,`\n`’针对运行时间在 1 到 10 分钟之间的 SQL 的指令’,`\n`MGMT_P2\
  \ => 20,`\n`PARALLEL_SERVER_LIMIT => 75,`\n`SWITCH_TIME => 600,`\n`SWITCH_ESTIMATE\
  \ => TRUE,`\n`SWITCH_FOR_CALL => TRUE,`\n`SWITCH_GROUP => ’LONG_TIME’`\n`);`\n`DBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(`\n\
  `’DAYTIME_PLAN’,`\n`’LONG_TIME’,`\n`’针对运行时间超过 10 分钟的 SQL 的指令’,`\n`MGMT_P2 => 10,`\n\
  `PARALLEL_SERVER_LIMIT => 50,`\n`PARALLEL_QUEUE_TIMEOUT => 3600`\n`);`\n`DBMS_RESOURCE_MANAGER.VALIDATE_PENDING_AREA();`\n\
  `DBMS_RESOURCE_MANAGER.SUBMIT_PENDING_AREA();`\n`END;`\n`/`\n\n这个示例需要一些解释：\n\n创建了资源计划`DAYTIME_PLAN`。定义了两个使用者组：`MEDIUM_TIME`和`LONG_TIME`。还有另外两个使用者组（`SYS_GROUP`和`OTHER_GROUPS`）是自动创建的。\n\
  \n第一条指令是针对`SYS_GROUP`使用者组。该组通过`MGMT_P1`配置被分配了 100%的优先级，这意味着它优先于其他组。此外，该组绕过了语句队列。\n\
  \n第二条指令是针对`OTHER_GROUPS`使用者组，这是默认的使用者组。该指令规定，优化器应评估每条 SQL 语句，如果估计执行时间超过 60 秒（`SWITCH_TIME`），会话应切换到`MEDIUM_TIME`使用者组（`SWITCH_GROUP=>’MEDIUM_TIME’`）。一旦\
  \ SQL 执行完毕，会话会切换回`OTHER_GROUPS`使用者组（`SWITCH_FOR_CALL=>TRUE`）。出队优先级（`MGMT_P2`）设置为\
  \ 70%的概率，意味着语句应在任何`MGMT_P1`语句之后出队，并且在与其他`MGMT_P2`语句比较时有 70%的概率出队。最大并行度（DOP）由`PARALLEL_DEGREE_LIMIT_P1`属性设置为\
  \ 4。\n\n第三条指令是针对`MEDIUM_TIME`使用者组。该指令也包含一个切换，如果 Oracle 估计 SQL 语句执行时间将超过 10 分钟，则将会话移动到`LONG_TIME`组。此外，该指令将出队优先级设置为第二优先级组（`MGMT_P2`）的\
  \ 20%。该指令还对可能使用的并行从属进程百分比设置了限制（`PARALLEL_SERVER_LIMIT`）。在这种情况下，系统中允许的总从属进程的 80%是该使用者组中的会话可使用的最大值。\n\
  \n最后一条指令是针对`LONG_TIME`使用者组。该组中的会话与其他组相比，出队优先级非常低（`MGMT_P2=10`）。它还将并行从属进程的百分比限制在\
  \ 50%。最后，由于该组中的语句可能排队很长时间，`PARALLEL_QUEUE_TIMEOUT`属性被设置为 14,400 秒。因此，如果一个语句排队了四个小时，它将因超时错误而失败。\n\
  \n在该计划真正运行之前，还需要完成一些额外的设置。如果使用者组不是`OTHER_GROUPS`，则需要授予会话一个使用者组作为其初始使用者组。在我们的示例中并非如此，因此我们不必使用`DBMS_RESOURCE_MANAGER.SET_INITIAL_CONSUMER_GROUP`过程。但是，我们希望当指令中设置的规则适用时，会话能切换到`MEDIUM_TIME`或`LONG_TIME`组。这意味着在该计划工作之前，我们必须使用`DBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP`过程。在此示例中，`KSO`用户被授予了切换权限。这需要针对所有受此计划影响的数据库用户完成：\n\
  \n```\nBEGIN\nDBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP(’KSO’,’MEDIUM_TIME’,FALSE);\n\
  DBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP(’KSO’,’LONG_TIME’,FALSE);\n\
  END;\n/\n```\n\n#### 并行语句排队总结\n\n本节比 11gR2 中对其他两个新并行特性的介绍要详细得多。它还包含了版本 12c 中添加的一些增强功能。这是因为该特性是使\
  \ Exadata 能够有效处理混合工作负载的关键组件。它使我们能够有效地处理对吞吐量和响应时间都敏感的语句混合。如果没有这个特性，在不严重影响其中一方的情况下提供足够的资源将非常困难。\n\
  \n### 内存中并行执行\n\n在 11gR2 之前，并行化的查询完全忽略了缓冲区缓存。Oracle 假设并行查询只会在非常大的表上进行，而这些表可能永远不会有很大比例的块位于缓冲区缓存中。这一假设导致了这样的结论：直接从磁盘读取数据会更快。此外，用全表扫描的大量块淹没缓冲区缓存是不希望的，因此\
  \ Oracle 开发了一种称为直接路径读取的机制，它绕过了正常的缓存机制，直接将块读入用户的程序全局区（`PGA`）。\n\n内存中并行执行特性采用了一种不同的方法。它试图为并行查询利用缓冲区缓存。该特性具有集群感知性，旨在跨集群节点（即\
  \ RAC 数据库实例）分布数据。数据块也被关联到单个节点，减少了节点之间的通信和数据传输次数。当然，目标是通过消除磁盘 I/O 来加速并行查询。这可能是一种可行的技术，因为现在许多系统拥有非常大的内存，这当然可以提供比磁盘操作显著的速度优势。然而，这种方法也有一些缺点。关于\
  \ Exadata 最大的缺点是，此特性会禁用所有智能扫描优化。在这方面，12c 中通过初始化参数将缓冲区缓存拆分为大表扫描缓存和 OLTP 缓存的新选项几乎没有提供什么安慰——智能扫描很可能比跨多个缓冲区缓存的\
  \ n 路扫描更快。\n\n请注意，我们实际上从未在 Exadata 的野外环境中见过内存中并行查询。这可能是件好事，因为内置于 Exadata 中的许多优化依赖于\
  \ offloading，而 offloading 又依赖于直接路径读取。当然，如果在数据库服务器上访问内存中的块，就不会进行直接路径读取。在大多数平台上，内存访问会比从磁盘直接路径读取快得多。但在\
  \ Exadata 上，消除磁盘 I/O 也消除了大量可用于过滤和其他操作的 CPU。这意味着，对于并行执行访问缓冲区缓存，实际上可能比让存储服务器参与 SQL\
  \ 语句的执行效率更低。\n\n注意\n\n12.1.0.2 数据库补丁集引入了内存中选项（`In-Memory Column Store`，`Vector Processing`和`In-Memory\
  \ Aggregation`）。版本 12.1.0.1 引入了其他内存中缓存（`Automatic Big Table Caching`和`Full Database\
  \ Caching`）特性，在同时运行 OLTP 的同时进一步加速了 Exadata 的分析能力。尽管这些确实是伟大的新特性，但进一步介绍它们超出了本章的范围。\n\
  \n\n\n此时，可能有必要做一个小演示。值得注意的是，要让此特性生效，需要付出相当大的努力。以下是我们为使其工作而采取的基本步骤。首先，我们必须找到一个查询，该查询的优化器估计运行时间将超过\
  \ `PARALLEL_MIN_TIME_THRESHOLD` 参数指定的秒数（假设该语句未被并行化）。此参数的默认值为 `AUTO`，即 10 秒。我们将此参数设置为\
  \ 1 秒，以便更容易触发内存中并行行为。此外，该查询还必须针对一张表，该表应能几乎完全放入由所有参与的 RAC 实例共同提供的聚合缓冲区缓存中。为简化操作，我们通过将\
  \ `PARALLEL_FORCE_LOCAL` 参数设置为 `TRUE`，将处理限制在单个实例上。当然，我们必须将 `PARALLEL_DEGREE_POLICY`\
  \ 设置为 `AUTO` 以启用该特性。我们还将 `PARALLEL_SERVERS_TARGET` 和 `PARALLEL_DEGREE_LIMIT` 设置为非常低的值。以下是我们用于测试该特性的参数设置以及查询的相关信息：\n\
