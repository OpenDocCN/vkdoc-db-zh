  \ read ... optimized”`统计信息中。在 130,411 个 I/O 请求中，有 113,612 个被优化了。该演示特意没有使用`WHERE`子句，以迫使进行全表扫描，而不涉及进一步的优化，例如谓词过滤或存储索引来隔离性能提升。第\
  \ 11 章提供了关于所有这些计数器的更多信息，而第 2 章则解释了智能扫描期间不同类型优化。\n\n### 混合工作负载与 OLTP 优化\n\n当第一版`Exadata`一体机（即所谓的`Exadata\
  \ V1`）首次亮相时，它主要是一个支持决策支持系统的高性能解决方案。正如您刚才所读到的，闪存从最初的硬件版本中就缺席了。这后来被发现是一个限制，因此下一硬件版本`Exadata\
  \ V2`成为第一个引入闪存卡的版本。得益于闪存卡和您在本书中读到的其他功能，`Exadata`能够为许多不同类型的工作负载提供高性能和可扩展性。这些工作负载不一定是统一的——高端硬件与存储服务器软件中发现的优化相结合，形成了一个平衡的组合。支持`OLTP`工作负载的关键驱动因素是`Exadata\
  \ Storage Server Software`和`ESFC`闪存。一旦硬件规格到位，这些组件就能得到很好的利用。就`Exadata`而言，新功能不断被添加到存储服务器软件中。一个重要的`OLTP`优化是在版本`11.2.2.4.x`中引入的，名为智能闪存日志。\n\
  \n\n\n### 使用闪存进行数据库日志记录\n\nExadata Smart Flash Log (`ESFL`) 的目标是优化数据库日志写入。许多有管理\
  \ OLTP 类型应用程序背景的数据库管理员（DBA）都**深有体会**，低日志写入延迟至关重要。延迟上一个微小的“抖动”就可能极大地影响 OLTP 环境的整体性能。Smart\
  \ Flash Logging 通过同时利用磁盘上的重做日志以及在闪存硬件上为`ESFC`分配的一小块空间（称为`Flashlog`）来帮助消除高延迟异常值。理想情况下，顺序的重做日志写入应该全部进入磁盘控制器的缓存。非\
  \ Exadata 环境通常使用企业级磁盘阵列，其前端配有或多或少的 DRAM，用于在数据最终落盘（de-staged）前缓存写入操作。为防止断电时数据损坏，这些缓存由电池，或者更近期的超级电容器进行备份保护。\n\
  \nExadata 数据库一体机的控制器上并没有相同容量的缓存。在 X5-2 型号之前，每个磁盘控制器拥有 512MB 缓存，而 X5-2 型号拥有 1GB。只要缓存未满，写入\
  \ I/O 操作就应该能从中受益。然而，在某些情况下，可能会耗尽缓存，导致后续 I/O 请求直接穿透到连接的物理磁盘。当电池备份缓存的电池进入学习周期时，所有代次的\
  \ Exadata 一体机也可能发生这种情况。长话短说，磁盘控制器中的回写缓存（write-back cache）有可能回退到直写模式（write-through\
  \ mode），这可能会对（重做日志）写入的性能产生影响。Smart Flash Logging 是 Oracle 开发的一项技术，通过将闪存卡作为重做日志写入的备用目标，来抵消此问题的负面影响。\n\
  \nSmart Flash Logging 需要 Exadata 存储软件 11.2.2.4 或更高版本，以及 Oracle Database 11.2.0.2\
  \ 版本配合 Bundle Patch 11。对于 Oracle Database 11.2.0.3 版本，则需要 Bundle Patch 1 或更高版本。即使在闪存较少的系统上，Flash\
  \ Logging 功能也不会造成侵入性影响。在每个存储单元（cell）上，将预留 512MB 作为重做日志的临时存储位置。\n\nSmart Flash Logging\
  \ 功能的工作原理如图 5-3 所示。当数据库发出重做日志写入请求时，`cellsrv`软件会同时向磁盘上的重做日志和`ESFL`发出并行写入。一旦第一个写入完成，`cellsrv`就会向请求进程发送写入确认，数据库将继续处理后续事务。在磁盘控制器缓存未饱和的情况下，对硬盘的写入应该比对\
  \ Flash Log 的写入更快。\n\n![A978-1-4302-6242-8_5_Fig3_HTML.gif](img/A978-1-4302-6242-8_5_Fig3_HTML.gif)\n\
  图 5-3.\n使用 Smart Flash Log 时重做日志写入的 I/O 路径\n\n得益于 Exadata 的检测工具，你可以精确地看到 Flash Log\
  \ 的使用情况（或未使用情况）。了解 Flash Log 使用情况的方法是向每个存储单元请求该信息，理想情况下通过`dcli`工具：\n\n```\n[oracle@enkdb03\
  \ ∼]$ dcli -l cellmonitor -g ./cell_group \\\n> cellcli -e \"list metriccurrent\
  \ where name like 'FL_.*_FIRST'\"\nenkcel04: FL_DISK_FIRST          FLASHLOG   \
  \       10,441,253 IO requests\nenkcel04: FL_FLASH_FIRST         FLASHLOG      \
  \       426,834 IO requests\nenkcel05: FL_DISK_FIRST          FLASHLOG         \
  \ 11,127,644 IO requests\nenkcel05: FL_FLASH_FIRST         FLASHLOG            466,456\
  \ IO requests\nenkcel06: FL_DISK_FIRST          FLASHLOG          11,376,268 IO\
  \ requests\nenkcel06: FL_FLASH_FIRST         FLASHLOG            456,559 IO requests\n\
  ```\n\n通过一个例子可以最好地说明这一点。图 5-4 显示了实施`ESFL`前后的重做日志写入延迟。图中的数据点显示了某条插入语句在凌晨 2 点和早上 7\
  \ 点的负载时段。\n\n![A978-1-4302-6242-8_5_Fig4_HTML.jpg](img/A978-1-4302-6242-8_5_Fig4_HTML.jpg)\n\
  图 5-4.\n实施 Exadata Smart Flash Logging 前后的重做日志写入延迟\n\n如你所见，与日志写入器（log-writer）相关的数据点与你预期的更加吻合。令人欣慰的消息是，在本书出版时，绝大多数——如果不是所有——Exadata\
  \ 系统应该都在使用 Smart Flash Logging。Smart Flash Log 消除了支持者们将闪存用作重做日志的 Grid Disk 的一个论据，从而让你能够将闪存用于真正重要的事情。下一个需要破除的迷思是\
  \ Exadata“写入速度慢”。如果配置正确，它很可能并不慢，正如你可以在下一节中读到的那样。\n\n\n### 使用闪存加速写入\n\n到目前为止，本章主要介绍了智能闪存缓存（Smart\
  \ Flash Cache）的默认操作模式：直写（write-through）（再次说明，X5-2 高性能单元格是例外，其默认模式是回写缓存）。该缓存也可以选择配置为在回写模式下运行。回写闪存缓存（WBFC）显著提升了您当前\
  \ Exadata 配置的写入 IOPS 能力。这项最初在 Exadata X3 代产品中引入的 OLTP 优化功能，向后兼容之前各代的 Exadata 数据库一体机。WBFC\
  \ 将作为数据库所有写入 I/O 请求的主要处理设备，并且缓存内容在重启后仍然保持持久化。闪存卡设备的故障对用户是透明的，因为这将由 ASM 冗余和 Exadata\
  \ 存储软件的组合来自动处理。\n\n启用 WBFC 所需的最低 Exadata 存储软件版本是 11.2.3.2.1。My Oracle Support 笔记\
  \ 888828.1 列出了网格基础设施（Grid Infrastructure）主目录和 RDBMS 主目录的进一步要求。如果需要，请务必应用这些补丁！图 5-5\
  \ 及后续步骤展示了 WBFC 的工作原理。\n\n![A978-1-4302-6242-8_5_Fig5_HTML.gif](img/A978-1-4302-6242-8_5_Fig5_HTML.gif)\n\
  \n图 5-5.\n\n回写模式下闪存缓存使用示意图\n\n如图 5-5 所示，步骤顺序如下：\n当数据库发出写请求时，`cellsrv`会将写 I/O 直接发送到闪存设备（序号\
  \ 1 和 2）。\n一旦写入完成，数据库会立即确认该写入（序号 3）。\n所有脏块将保留在缓存中，可用于未来的读或写 I/O。ASM 为闪存卡提供冗余，以保护系统免受故障影响。\n\
  当某个块不再被访问时，如果出现空间压力，它最终会被淘汰出缓存并写入磁盘（序号 4）。这个过程通常被称为将数据从缓存迁移到磁盘。\n\n为了评估回写闪存缓存的效用，您需要定义一个以写入为主的\
  \ I/O 基准测试。Swingbench 套件以订单录入基准测试最为知名。但该套件中还有许多其他值得探索的基准测试。经过进一步研究，本演示找到了一个合适的测试案例，即压力测试。压力测试是一个相对简单的基准测试，它针对一个恰当地命名为`STRESSTESTTABLE`的表，发起四种不同的潜在事务。这些事务涵盖插入、删除、更新和查询，这并不令人意外。与\
  \ Swingbench 的典型做法一样，您可以单独定义每个事务对负载的贡献比例。如果您想跟随测试，我们定义所有事务中 15%为插入，10%为查询，55%为更新，20%为删除。与所有存储基准测试一样，您需要一个相当小的缓冲区缓存，以减轻\
  \ Oracle 优秀缓存机制的影响。\n\n为了了解 Exadata 系统（在本例中是我们的 X2-2 四分之一机架）能够带来的好处，您需要计算出系统理论上能达到的性能。在这种情况下，X2-2\
  \ 四分之一机架的数据表显示其约有 6,000 个磁盘 IOPS。如果这个未经 RAC 优化的基准测试能够驱动超过此数值的负载，我们就可以得出结论：回写闪存缓存发挥了作用。在执行基准测试后，这一点确实得到了证实。以下是来自\
  \ AWR 报告的 I/O 概况，涵盖了基准测试的执行过程。该测试是在一个 12.1.0.2 数据库的单实例上进行的，使用的是 X2-2 四分之一机架上的 12.1.2.1.0\
  \ Exadata 软件。\n\n```\nIO Profile                  Read+Write/Second     Read/Second\
  \    Write/Second\n---------------------------------------------------------------------------\n\
  Total Requests:             22,376.6        11,088.3        11,288.3\nDatabase Requests:\
  \          20,799.2        11,083.9         9,715.4\nOptimized Requests:       \
  \  20,684.8        11,023.8         9,661.0\nRedo Requests:               1,570.1\
  \             0.0         1,570.1\nTotal (MB):                   219.5         \
  \   86.7           132.7\nDatabase (MB):                194.2            86.7  \
  \         107.5\nOptimized Total (MB):         187.2            86.2           101.1\n\
  Redo (MB):                     18.4             0.0            18.4\nDatabase (blocks):\
  \          24,853.6        11,094.4        13,759.3\nVia Buffer Cache (blocks):\
  \  24,844.1        11,094.3        13,749.7\nDirect (blocks):                 9.5\
  \             0.0             9.5\n```\n\n如您所见，AWR 报告显示“总请求”类别下，由单个数据库实例驱动了每秒 22,376\
  \ 次 I/O 操作，甚至没有针对多实例 RAC 使用进行工作负载优化。这已经超过了数据表中引用的数值。如果我们投入更多时间来调整基准测试，我们相信能够产生更大的负载。不过，请记住引言中提到的，在这个特定基准测试中，读写比例是\
  \ 10:90，这不一定代表您的 I/O 分布！I/O 概况中存在如此多的读操作，与通过表主键的索引唯一扫描来执行更新语句的方式有关。在本章后续部分，您可以阅读更多关于监控闪存缓存使用情况的内容，并且您将看到`STRESSTESTTABLE`及其关联索引是闪存缓存中被缓存最频繁的对象。\n\
  \n### 其他与 WBFC 相关的优化\n\n独立的缓存空间还提供了其他好处，这就是为什么即使在全闪存的高性能 X5-2 单元格服务器上，默认情况下您仍然会获得一个缓存。在\
  \ X5-2 的这些单元格上，闪存缓存被设置为 WBFC，并占用约 5%的可用闪存空间。其中一项优势是快速数据文件创建。以下是一个创建 20GB 表空间的示例。在非\
  \ Exadata 系统中，您的会话必须以单线程执行数据文件初始化，并且该线程受制于 I/O 子系统。在 Exadata 上，该操作被设计为跨所有存储服务器并行执行。快速数据文件创建将此过程更进一步。使用它时，只有关于表空间中已分配块的元数据会持久保存在回写闪存缓存中，实际的格式化操作不会立即进行。\n\
  \n```\nSQL> create tablespace testdata datafile size 20g;\n\nTablespace created.\n\
  \nElapsed: 00:00:00.89\n```\n\n对于创建 20GB 的数据文件来说，这个耗时不算太差。会话级统计信息“智能文件初始化节省的物理写入字节数”（cell\
  \ physical write bytes saved by smart file initialization）和“物理写入总字节数”（physical write\
  \ total bytes）让您了解到所节省的开销。此功能作为 Exadata 11.2.3.3.0 版本的一部分提供。\n\n另一个与回写闪存缓存相关的有趣功能是存储单元能够限制写入\
  \ I/O 的异常值。根据文档集，由老化或损坏的闪存卡引起的写入异常值可能导致 I/O 响应时间变慢，并可以被重定向到不同的卡。如果您使用 Exadata 软件\
  \ 12.1.2.1.0 和 11.2.0.4 BP 8 或更高版本，您将从该功能中受益。\n\n\n### ESFC 和 ESFL 是如何创建的\n\nExadata\
  \ 智能闪存缓存（Smart Flash Cache）是使用每个存储服务器上的 `cellcli` 实用程序创建和管理的。本节仅提供一个使用 `cellcli`\
  \ 命令管理智能闪存缓存和智能闪存日志的示例。如果你想了解更多关于这些命令的信息，请参阅 附录 A。除了在每个单元上本地执行 `cellcli` 命令，你还可以利用\
  \ `dcli` 实用程序，它可以在多个系统上执行命令（并且功能远不止于此）。\n\n在处理存储服务器上的闪存磁盘时，按顺序执行命令非常重要。你需要在创建闪存缓存（Flash\
  \ Cache）之前先创建闪存日志（Flash Log）（大多数 Exadata 用户到此为止）。因此，第一个示例展示了如何配置 Exadata 智能闪存日志。你可以使用\
  \ `CREATE FLASHLOG ALL` 命令来创建它，如下所示：\n\n```\n[root@enkx3cel01 ∼]# cellcli -e create\
  \ flashlog all\n\nFlash log enkx3cel01_FLASHLOG successfully created\n\n[root@enkx3cel01\
  \ ∼]# cellcli -e list flashlog attributes name,size\n\nenkx3cel01_FLASHLOG     512M\n\
  ```\n\n之前的命令自动从 Exadata 闪存中分配了 512MB 的存储空间，将剩余的可用空间留给 ESFC。请记住，必须在 ESFC 之前创建 ESFL，否则闪存空间将只分配给\
  \ ESFC，而不会为闪存日志留下任何空间。\n\n下一步是使用 `CREATE FLASHCACHE` 命令创建闪存缓存。以下是在 X3-2 存储服务器上默认直写（write-through）模式的示例：\n\
  \n```\nCellCLI> create flashcache all\n\nFlash cache enkx3cel01_FLASHCACHE successfully\
  \ created\n```\n\n这种形式的命令指示存储软件将缓存分散到所有闪存卡上的所有 FMod（闪存模块）上。如果你真的、真的需要，并且想忽略 MOS\
  \ 说明 1269706.1 中给出的建议，你可以指定一个大小而不是 \"all\"，以便在闪存卡上留出一些空间用作闪存磁盘。请注意，闪存缓存会自动分配一个包含存储单元名称的名字。要查看闪存缓存的大小，你可以发出\
  \ `LIST FLASHCACHE DETAIL` 命令，如下面 X3-2 单元所示。根据引言所述，当前的 Exadata X5-2 一代拥有更少的 FMOD\
  \ 和更大的闪存磁盘。输出已重新格式化以便于阅读。在你的终端会话中，你将在一行中看到所有闪存磁盘（FD）：\n\n```\n[root@enkx3cel01 ∼]#\
  \ cellcli -e list flashcache detail\n\nname:                   enkx3cel01_FLASHCACHE\n\
  \ncellDisk:               FD_13_enkx3cel01,FD_14_enkx3cel01,FD_12_enkx3cel01,\n\n\
  FD_03_enkx3cel01,FD_09_enkx3cel01,FD_15_enkx3cel01,\n\nFD_11_enkx3cel01,FD_05_enkx3cel01,FD_08_enkx3cel01,\n\
  \nFD_02_enkx3cel01,FD_04_enkx3cel01,FD_06_enkx3cel01,\n\nFD_10_enkx3cel01,FD_00_enkx3cel01,FD_01_enkx3cel01,\n\
  \nFD_07_enkx3cel01\n\ncreationTime:           2014-01-30T22:21:18-06:00\n\ndegradedCelldisks:\n\
  \neffectiveCacheSize:     1488.75G\n\nid:                     15b9e304-586c-4730-910f-0e16de67f751\n\
  \nsize:                   1488.75G\n\nstatus:                 normal\n```\n\n直到\
  \ X5-2 存储服务器，闪存缓存都分布在 16 个单元磁盘上。每个闪存卡上的每个 FMod 都有一个对应的单元磁盘。要获取有关构成闪存缓存的单元磁盘的更多信息，你可以使用\
  \ `LIST CELLDISK` 命令，下面是在 X3-2 系统上的示例：\n\n```\n[root@enkx3cel01 ∼]# cellcli -e list\
  \ celldisk attributes name, \\\n\n> diskType, size where name like ’FD.*’\n\nFD_00_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_01_enkx3cel01        FlashDisk       93.125G\n\nFD_02_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_03_enkx3cel01        FlashDisk       93.125G\n\nFD_04_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_05_enkx3cel01        FlashDisk       93.125G\n\nFD_06_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_07_enkx3cel01        FlashDisk       93.125G\n\nFD_08_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_09_enkx3cel01        FlashDisk       93.125G\n\nFD_10_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_11_enkx3cel01        FlashDisk       93.125G\n\nFD_12_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_13_enkx3cel01        FlashDisk       93.125G\n\nFD_14_enkx3cel01        FlashDisk       93.125G\n\
  \nFD_15_enkx3cel01        FlashDisk       93.125G\n```\n\n由于闪存缓存是在单元磁盘上创建的，因此必须在创建闪存缓存之前先创建单元磁盘，而它们通常在初始配置期间就已经创建好了。如果没有，可以使用\
  \ `CREATE CELLDISK` 命令完成：\n\n```\nCellCLI> create celldisk all flashdisk\n\nCellDisk\
  \ FD_00_enkx3cel01 successfully created\n\nCellDisk FD_01_enkx3cel01 successfully\
  \ created\n\nCellDisk FD_02_enkx3cel01 successfully created\n\nCellDisk FD_03_enkx3cel01\
  \ successfully created\n\nCellDisk FD_04_enkx3cel01 successfully created\n\nCellDisk\
  \ FD_05_enkx3cel01 successfully created\n\nCellDisk FD_06_enkx3cel01 successfully\
  \ created\n\nCellDisk FD_07_enkx3cel01 successfully created\n\nCellDisk FD_08_enkx3cel01\
  \ successfully created\n\nCellDisk FD_09_enkx3cel01 successfully created\n\nCellDisk\
  \ FD_10_enkx3cel01 successfully created\n\nCellDisk FD_11_enkx3cel01 successfully\
  \ created\n\nCellDisk FD_12_enkx3cel01 successfully created\n\nCellDisk FD_13_enkx3cel01\
  \ successfully created\n\nCellDisk FD_14_enkx3cel01 successfully created\n\nCellDisk\
  \ FD_15_enkx3cel01 successfully created\n```\n\n你也可以通过指定特定的单元磁盘列表，在有限的 FMod 集合上创建闪存缓存。在大多数情况下，这不是必需的，但它是可行的。对于\
  \ X5-2，每个闪存卡只有一个 FMod，这种方法就不太实用了。下面是一个例子，仍然在 X3-2 上：\n\n```\nCellCLI> create flashcache\
  \ celldisk=’FD_00_enkx3cel01, FD_01_enkx3cel01’, size=40G\n\nFlash cache enkx3cel01_FLASHCACHE\
  \ successfully created\n\nCellCLI> list flashcache detail\n\nname:                   enkx3cel01_FLASHCACHE\n\
  \ncellDisk:               FD_01_enkx3cel01,FD_00_enkx3cel01\n\ncreationTime:           2014-11-09T15:29:28-06:00\n\
  \ndegradedCelldisks:\n\neffectiveCacheSize:     40G\n\nid:                     ad56aa9d-0de4-4713-85f2-19713a13vn3ebb\n\
  \nsize:                   40G\n\nstatus:                 normal\n```\n\n再次说明，`cellcli`\
  \ 的详细使用方法在附录 A 中有更深入的介绍，但本节应能让你对闪存缓存的创建方式有一个基本的了解。\n\n\n\n"
- "# 启用回写闪存缓存\n\n回写闪存缓存通常在典型代表性工作负载中，读写比例倾向于写入时启用。传统上，人们可能假设工作负载中读取数量多于写入数量。启用 WBFC\
  \ 的另一个原因是当您发现“`空闲缓冲区等待`”占您等待事件的很大比例时。在您的 AWR 报告或跟踪中发现此事件，表明（一个或多个）数据库写入进程无法及时将脏块写入磁盘，以释放新读入缓冲区缓存的缓冲区。\n\
  \n或许可以安全地说，大多数用户以默认的直写模式操作智能闪存缓存。从直写模式切换到回写模式涉及本节说明的步骤（除非您使用的是全闪存单元——即 X5-2 高性能存储服务器——其中回写模式默认已启用）。您可以以滚动或非滚动方式执行切换。\n\
  \n## 先决条件\n\n作为先决条件，您必须确保集群中的所有网格磁盘都处于联机并可用状态：\n\n```\n[root@enkx3db01 ∼]# dcli\
  \ -g cell_group -l root cellcli -e list griddisk attributes \\\n> asmdeactivationoutcome,\
  \ asmmodestatus, name, status\n```\n\n## 验证当前状态\n\n以下列表显示了以滚动方式启用 WBFC 所执行的步骤。在验证集群磁盘的第一个命令返回无问题后，您应继续检查现有闪存缓存和闪存日志的状态，如下所示。状态不应显示任何问题：\n\
  \n```\n[root@enkx3db01 ∼]# dcli -g ./cell_group -l root \\\n> cellcli -e list flashcache\
  \ attributes name,size,status\nenkx3cel01: enkx3cel01_FLASHCACHE      1488.75G \
  \       normal\nenkx3cel02: enkx3cel02_FLASHCACHE      1488.75G        normal\n\
  enkx3cel03: enkx3cel03_FLASHCACHE      1488.75G        normal\n\n[root@enkx3db01\
  \ ∼]# dcli -g ./cell_group -l root \\\n> cellcli -e list flashlog attributes name,size,status\n\
  enkx3cel01: enkx3cel01_FLASHLOG        512M    normal\nenkx3cel02: enkx3cel02_FLASHLOG\
  \        512M    normal\nenkx3cel03: enkx3cel03_FLASHLOG        512M    normal\n\
  ```\n\n在以下示例中，智能闪存缓存正从直写模式更改为回写模式。以下是闪存缓存处于直写模式的证明：\n\n```\n[root@enkx3db01 ∼]#\
  \ dcli -g cell_group -l root \\\n> \"cellcli -e list cell detail\" | grep \"flashCacheMode\"\
  \nenkx3cel01: flashCacheMode:            WriteThrough\nenkx3cel02: flashCacheMode:\
  \            WriteThrough\nenkx3cel03: flashCacheMode:            WriteThrough\n\
  ```\n\n## 删除闪存缓存\n\n接下来，您需要以 `root` 身份连接到第一个单元并删除闪存缓存：\n\n```\n[root@enkx3cel01\
  \ ∼]# cellcli -e drop flashcache\nFlash cache enkx3cel01_FLASHCACHE successfully\
  \ dropped\n```\n\n作为此操作的一部分，由于 ASM 正常或高冗余配置，ASM 应保持运行，能够容忍单元的丢失。下一个列表的输出应显示所有磁盘均为\
  \ `YES`。为使本章篇幅合理，输出被截断：\n\n```\n[root@enkx3cel01 ∼]# cellcli -e list griddisk attributes\
  \ name,asmmodestatus,asmdeactivationoutcome\nDATA_CD_00_enkx3cel01           ONLINE\
  \  Yes\n...\nDATA_CD_11_enkx3cel01           ONLINE  Yes\nDBFS_DG_CD_02_enkx3cel01\
  \        ONLINE  Yes\n...\nDBFS_DG_CD_11_enkx3cel01        ONLINE  Yes\nRECO_CD_00_enkx3cel01\
  \           ONLINE  Yes\n...\nRECO_CD_11_enkx3cel01           ONLINE  Yes\n```\n\
  \n## 停用网格磁盘\n\n验证后，您将单元上的网格磁盘更改为非活动状态。同样，输出经过删节以增强可读性，每个网格磁盘将显示一行：\n\n```\n[root@enkx3cel01\
  \ ∼]# cellcli -e alter griddisk all inactive\nGridDisk DATA_CD_00_enkx3cel01 successfully\
  \ altered\n...\nGridDisk DATA_CD_11_enkx3cel01 successfully altered\nGridDisk DBFS_DG_CD_02_enkx3cel01\
  \ successfully altered\n...\nGridDisk DBFS_DG_CD_11_enkx3cel01 successfully altered\n\
  GridDisk RECO_CD_00_enkx3cel01 successfully altered\n...\nGridDisk RECO_CD_11_enkx3cel01\
  \ successfully altered\n```\n\n## 重新配置缓存模式\n\n现在单元上剩余的步骤不多了。总之，您需要关闭 `cellsrv` 进程，删除闪存缓存，将\
  \ `flashCacheMode` 属性设置为“`WriteBack`”，创建闪存缓存，并使所有服务重新联机。但是，首先让我们使用另一个会话，以 `root`\
  \ 身份连接到 RDBMS 集群中的第一个节点，验证闪存缓存是否确实已被删除：\n\n```\n[root@enkx3db01 ∼]# dcli -g ./cell_group\
  \ -l root \\\n> cellcli -e list flashcache attributes name,size,status\nenkx3cel02:\
  \ enkx3cel02_FLASHCACHE      1488.75G        normal\nenkx3cel02: enkx3cel03_FLASHCACHE\
  \      1488.75G        normal\n```\n\n确实，第一个单元没有报告智能闪存缓存的存在。如您所见，闪存日志不受影响：\n\n```\n\
  [root@enkx3db01 ∼]# dcli -g ./cell_group -l root \\\n> cellcli -e list flashlog\
  \ attributes name,size,status\nenkx3cel01: enkx3cel01_FLASHLOG        512M    normal\n\
  enkx3cel02: enkx3cel02_FLASHLOG        512M    normal\nenkx3cel03: enkx3cel03_FLASHLOG\
  \        512M    normal\n```\n\n在此阶段，您关闭单元软件，更改属性以启用回写缓存，然后再次启动服务：\n\n```\n[root@enkx3cel01\
  \ ∼]# cellcli -e alter cell shutdown services cellsrv\nStopping CELLSRV services...\n\
  The SHUTDOWN of CELLSRV services was successful.\n\n[root@enkx3cel01 ∼]# cellcli\
  \ -e alter cell flashCacheMode=WriteBack\nCell enkx3cel01 successfully altered\n\
  \n[root@enkx3cel01 ∼]# cellcli -e alter cell startup services cellsrv\nStarting\
  \ CELLSRV services...\nThe STARTUP of CELLSRV services was successful.\n```\n\n\
  ## 重新激活网格磁盘\n\n在成功启动 `cellsrv` 守护进程后，您将网格磁盘重新带入 ASM：\n\n```\n[root@enkx3cel01 ∼]#\
  \ cellcli -e alter griddisk all active\nGridDisk DATA_CD_00_enkx3cel01 successfully\
  \ altered\n...\nGridDisk DATA_CD_11_enkx3cel01 successfully altered\nGridDisk DBFS_DG_CD_02_enkx3cel01\
  \ successfully altered\n...\nGridDisk DBFS_DG_CD_11_enkx3cel01 successfully altered\n\
  GridDisk RECO_CD_00_enkx3cel01 successfully altered\n...\nGridDisk RECO_CD_11_enkx3cel01\
  \ successfully altered\n```\n\n这不是一个瞬时操作——您必须耐心等待一小会儿，直到每个网格磁盘的状态都变为 `ONLINE`。在每个磁盘都联机之前，请不要继续。以下是一些仍在恢复为联机状态的网格磁盘的示例输出：\n\
  \n```\n[root@enkx3cel01 ∼]# cellcli -e list griddisk attributes name, asmmodestatus\n\
  DATA_CD_00_enkx3cel01           SYNCING\nDATA_CD_01_enkx3cel01           SYNCING\n\
  DATA_CD_02_enkx3cel01           SYNCING\nDATA_CD_03_enkx3cel01           SYNCING\n\
  DATA_CD_04_enkx3cel01           SYNCING\nDATA_CD_05_enkx3cel01           SYNCING\n\
  DATA_CD_06_enkx3cel01           SYNCING\nDATA_CD_07_enkx3cel01           SYNCING\n\
  DATA_CD_08_enkx3cel01           SYNCING\nDATA_CD_09_enkx3cel01           SYNCING\n\
  DATA_CD_10_enkx3cel01           SYNCING\nDATA_CD_11_enkx3cel01           SYNCING\n\
  DBFS_DG_CD_02_enkx3cel01        ONLINE\n...\nRECO_CD_11_enkx3cel01           ONLINE\n\
  ```\n\n## 重建闪存缓存\n\n当所有磁盘都恢复为 `ONLINE` 后，您可以在单元上重新创建闪存缓存：\n\n```\n[root@enkx3cel01\
  \ ∼]# cellcli -e create flashcache all\nFlash cache enkx3cel01_FLASHCACHE successfully\
  \ created\n```\n\n## 最终验证\n\n辛勤工作的成果是单元使用了回写闪存缓存：\n\n```\n[root@enkx3db01 ∼]# dcli\
  \ -g cell_group -l root \\\n> \"cellcli -e list cell detail\" | grep \"flashCacheMode\"\
  \nenkx3cel01: flashCacheMode:            WriteBack\nenkx3cel02: flashCacheMode:\
  \            WriteThrough\nenkx3cel03: flashCacheMode:            WriteThrough\n\
  ```\n\n\n很遗憾，工作尚未完成——您需要在下一个 Exadata 存储单元节点上重复上述步骤。然而，在关闭其他存储单元之前，您必须确保这不会影响数据库的可用性。使用本节引言中见过的命令列出网格磁盘，并确保属性\
  \ `asmmodestatus` 和 `asmdeactivationoutcome` 允许您将网格磁盘状态更改为“非活动”，以便为删除该单元的闪存缓存做准备。此过程在未来的版本中可能会有变化，因此请务必查阅\
  \ `My Oracle Support` 获取最新文档。\n\n注意\n\n当然，也可以从 `write-back` 模式切换回 `write-through`\
  \ 模式。`My Oracle Support` 的说明文档 `1500257.1` 解释了如何执行这些步骤。\n\n### 闪存缓存压缩\n\nOracle\
  \ Exadata 软件 `11.2.3.3.0` 是首个引入闪存缓存压缩功能的版本。在 Exadata `X3` 和 `X4` 存储单元中发现的 `F40`\
  \ 和 `F80` 卡内置了一个压缩引擎，允许在用户数据写入闪存缓存时进行压缩。由于压缩技术内置于卡的硬件中，与软件解决方案相比，其相关开销应该更小。\n\n\
  与任何压缩技术一样，节省的空间取决于您要压缩的数据。最差的压缩比很可能出现在 `HCC 压缩单元 (CUs)` 上。由于这些单元已包含压缩信息，几乎没有什么可再压缩的了。同样，如果\
  \ `OLTP`（现称为“高级”）压缩块已处于大部分块已去重的状态，它们也不是压缩的最佳候选者。另一方面，未压缩的块是良好的压缩候选对象。\n\n在撰写本文时，`My\
  \ Oracle Support` 说明文档 `1664257.1` “EXADATA Flash Cache Compression - FAQ” 指出，只有\
  \ `F40` 和 `F80` 卡可以使用压缩功能，并且作为先决条件，必须授权许可 `Advanced Compression Option`。`X5-2` 中的\
  \ `F160` 卡不支持本节所述的闪存压缩功能。您应查阅此说明文档以确保您的补丁级别符合最低要求。启用闪存缓存压缩的过程与刚才描述的启用 `Write-back`\
  \ 闪存缓存类似。为了避免重复，我们将指引您查阅 `My Oracle Support` 的说明文档以获取具体步骤。\n\n当您启用闪存缓存压缩后，您的闪存缓存报告大小将远大于物理设备大小。考虑一下在\
  \ `X4-2` 存储服务器上启用压缩后的闪存缓存：\n\n```\n[root@enkx4cel01 ∼]# cellcli -e list flashcache\
  \ detail\nname:                       enkx4cel01_FLASHCACHE\ncellDisk:         \
  \          FD_04_enkx4cel01,FD_06_enkx4cel01,FD_11_enkx4cel01,\n               \
  \             FD_02_enkx4cel01,FD_13_enkx4cel01,FD_12_enkx4cel01,\n            \
  \                FD_00_enkx4cel01,FD_14_enkx4cel01,FD_03_enkx4cel01,\n         \
  \                   FD_09_enkx4cel01,FD_10_enkx4cel01,FD_15_enkx4cel01,\n      \
  \                      FD_08_enkx4cel01,FD_07_enkx4cel01,FD_01_enkx4cel01,\n   \
  \                         FD_05_enkx4cel01\ncreationTime:               2015-01-19T21:33:37-06:00\n\
  degradedCelldisks:\neffectiveCacheSize:         5.8193359375T\nid:             \
  \            3d415a32-f404-4a27-b9f2-f6a0ace2cee2\nsize:                       5.8193359375T\n\
  status:                     normal\n```\n\n如果您观察非常仔细，会发现闪存缓存的大小是 `5.8TB`。这是逻辑缓存大小，因为\
  \ `X4-2` 存储服务器有四张 `800 GB` 大小的闪存卡，总共 `3.2 TB`。要获得这些数字，您必须已启用闪存缓存压缩：\n\n```\nCellCLI>\
  \ list cell attributes FlashCacheCompress\nTRUE\n```\n\n正常情况下，闪存上的每个单元磁盘是 `186GB`，但在启用压缩后会报告更大的空间。这个空间是虚拟的，Oracle\
  \ 在内部管理闪存缓存中的空间：\n\n```\nCellCLI> list celldisk attributes name,diskType,freeSpace,size,status\
  \ where name like 'FD.*'\nFD_00_enkx4cel01         FlashDisk         0         \
  \ 372.515625G          normal\nFD_01_enkx4cel01         FlashDisk         0    \
  \      372.515625G          normal\nFD_02_enkx4cel01         FlashDisk         0\
  \          372.515625G          normal\nFD_03_enkx4cel01         FlashDisk     \
  \    0          372.515625G          normal\nFD_04_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_05_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_06_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_07_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_08_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_09_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_10_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_11_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_12_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_13_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_14_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\nFD_15_enkx4cel01         FlashDisk\
  \         0          372.515625G          normal\n```\n\n闪存缓存压缩是一个很好的功能，可以在 Exadata\
  \ 系列的特定型号上逻辑地扩展闪存缓存。\n\n### 控制 ESFC 使用\n\n一般而言，对象会根据存储软件的自动缓存策略被缓存在 ESFC 中。不过，你可以通过使用\
  \ `CELL_FLASH_CACHE` 存储子句属性来覆盖单个数据库对象的自动策略，尽管你可能应该避免这样做。正如你目前已经读过几遍的那样，自 Exadata\
  \ 11.2.3.3.1 及更高版本起，自动缓存效果非常好。如果你坚持在少数合理的情况下将对象固定在闪存缓存中，你可以将该属性设置为以下三个有效值：\n\n*\
  \   `NONE`: 从不缓存此对象。\n*   `DEFAULT`: 自动缓存机制生效。这是默认值。\n*   `KEEP`: 此对象应被赋予优先状态。请注意，此指定也会更改智能扫描的默认行为，允许它们从缓存和磁盘同时读取。\n\
  \n你可以在创建对象时指定存储子句。存储子句的某些选项也可以使用 `ALTER` 命令进行修改。以下是使用 `ALTER` 命令更改 `CELL_FLASH_CACHE`\
  \ 存储子句的示例：\n\n```sql\nSQL> alter table martin.bigt storage (cell_flash_cache keep);\n\
  ```\n\n你还可以通过查看 `dba_tables` 或 `dba_indexes` 及其分区相关视图的 `cell_flash_cache` 列，来查看哪些对象被指定为更积极的缓存：\n\
  \n```sql\nSQL> @esfc_keep_tables\n\nSQL> select owner, table_name, status, last_analyzed,\n\
  \  2  num_rows, blocks, degree, cell_flash_cache\n  3  from dba_tables\n  4  where\
  \ cell_flash_cache like nvl('&cell_flash_cache','KEEP');\nEnter value for cell_flash_cache:\n\
  old   4: where cell_flash_cache like nvl('&cell_flash_cache','KEEP')\nnew   4: where\
  \ cell_flash_cache like nvl('','KEEP')\n\nOWNER                TABLE_NAME      STATUS\
  \   LAST_ANAL   NUM_ROWS     BLOCKS DEGREE   CELL_FL\n-------------------- ---------------\
  \ -------- --------- ---------- ---------- -------- -------\nMARTIN            \
  \   BIGTAB_QL       VALID    28-JAN-15  256000000     890768 1        KEEP\n```\n\
  \n你之前已经读到，自 `cellsrv` 11.2.3.3.1 及更高版本起，将对象固定在闪存缓存中已不再是真正必需。升级到更新版本的存储软件是一个好机会，可以测试是否可能允许\
  \ Oracle 根据其算法自主缓存对象。固定对象也可能适得其反，尤其是在早期的 Exadata 硬件代（如 V2 和 X2）中，因为可用的闪存容量有限。在我们访问的现场，仍然能看到\
  \ X2 和 V2 系统。\n\n在第 7 章中，你可以阅读关于资源管理的内容。I/O 资源管理器允许 Exadata 管理员限制甚至禁止使用智能闪存缓存。\n\
  \n### 监控\n\n你可以在多个地方监控 Exadata 智能闪存缓存的使用情况。粗略地说，你可以选择查询某些自动工作负载存储库视图或其他最近引入的动态性能视图。另一种选择是向单元软件查询更多信息。本节只能作为数据库可访问信息的一个引子，更多内容你可以在第\
  \ 11 章（关于会话统计）和第 12 章（基于 Enterprise Manager 12c 的图形监控解决方案）中阅读。\n\n自本书第一版印刷以来，存储单元和数据库级别可用的度量指标已大大增强。归根结底，图形工具——AWR\
  \ 报告、Enterprise Manager 12c 和 Enterprise Manager 12c Express——不能凭空捏造数字——它们拥有智能的接口来显示系统提供的度量指标。为了让读者更容易理解，将首先讨论通过\
  \ `cellcli` 可用的存储服务器相关度量指标，然后再将重点转向数据库层。\n\n#### 在存储层\n\n每个 Exadata 存储服务器都会记录自己的度量指标，这些指标最终可以传递到\
  \ RDBMS 层。如果你希望基于命令行深入进行诊断，可以通过连接到每个单元来实现，或者使用计算节点上的 `dcli` 工具从每个存储服务器收集信息。性能工程师可用的第一个选项是使用\
  \ `cellcli` 实用程序中的 `metriccurrent` 类别。关于闪存相关的性能指标，可以查询多种不同的对象类型。连接到 Exadata 12.1.2.1\
  \ 存储单元后，可以识别出以下度量类别：\n\n```bash\n[root@enkx4cel01 ~]# cellcli -e list metriccurrent\
  \ attributes objecttype | sort | uniq | nl\n1                  CELL\n2         \
  \         CELLDISK\n3                  CELL_FILESYSTEM\n4                  FLASHCACHE\n\
  5                  FLASHLOG\n6                  GRIDDISK\n7                  HOST_INTERCONNECT\n\
  8                  IBPORT\n9                  IORM_CATEGORY\n10                \
  \ IORM_CONSUMER_GROUP\n11                 IORM_DATABASE\n12                 IORM_PLUGGABLE_DATABASE\n\
  13                 SMARTIO\n```\n\n仅出于本次讨论的目的，粗体标出的 `objectType` 值值得关注。由于这些度量指标随着每个版本不断变化，你应该查看\
  \ `list metricdefinition` 命令的输出，看看是否有任何新的值得关注的指标。仍然连接到 12.1.2.1 单元服务器，你可以找到以下闪存缓存相关的度量指标：\n\
  \n```sql\nCellCLI> LIST METRICDEFINITION attributes name, description WHERE objectType\
  \ = 'FLASHCACHE'\n```\n\n表 5-1 显示了该命令的输出，仅限于那些具有实际关联值的统计信息。在 `cellsrv` 12.1.2.1\
  \ 中有 111 个与闪存缓存相关的度量指标，其中约 54 个在此处显示，在我们的环境中这些指标的值 > 0。表 5-1 提供了你在存储层可以报告的每个统计信息的简要描述。\n\
  \n表 5-1.\n\n闪存缓存度量定义选摘\n\n| 指标 | 描述 |\n| --- | --- |\n| `FC_BYKEEP_USED` | 闪存缓存上用于保留对象的兆字节数\
  \ |\n| `FC_BY_ALLOCATED` | 闪存缓存中已分配的兆字节数 |\n| `FC_BY_DIRTY` | 闪存缓存中未刷新的兆字节数 |\n\
  | `FC_BY_STALE_DIRTY` | 闪存缓存中因缓存磁盘不可访问而无法刷新的未刷新兆字节数 |\n| `FC_BY_USED` | 闪存缓存上已使用的兆字节数\
  \ |\n| `FC_IO_BYKEEP_R` | 从闪存缓存为保留对象读取的兆字节数 |\n| `FC_IO_BY_ALLOCATED_OLTP` | 闪存缓存中为\
  \ OLTP 数据分配的兆字节数 |\n| `FC_IO_BY_DISK_WRITE` | 从闪存缓存写入硬盘的兆字节数 |\n| `FC_IO_BY_R` |\
  \ 从闪存缓存读取的兆字节数 |\n| `FC_IO_BY_R_ACTIVE_SECONDARY` | 从闪存缓存满足的活动辅助读取的兆字节数 |\n| `FC_IO_BY_R_ACTIVE_SECONDARY_MISS`\
