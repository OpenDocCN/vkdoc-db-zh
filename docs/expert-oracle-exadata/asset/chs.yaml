  \            622           .001608  0         1        5853784365\n==========================================================================================\n\
  ```\n\n以下是为该表实现的压缩比。正如预期，它们非常出色：\n\n```sql\nSQL> @comp_ratio\n输入 original_size 的值:\
  \ 618667\n输入 owner 的值: KSO\n输入 table_name 的值: SALES_HCC%\n输入 type 的值:\n\nOWNER \
  \     SEGMENT_NAME         TYPE               TOTALSIZE_MEGS COMPRESSION_RATIO\n\
  ---------- -------------------- ------------------ -------------- -----------------\n\
  KSO        SALES_HCC1           TABLE                     41,654.6             \
  \  14.9\nKSO        SALES_HCC2           TABLE                     26,542.0    \
  \           23.3\nKSO        SALES_HCC3           TABLE                     26,538.5\
  \               23.3\nKSO        SALES_HCC4           TABLE                    \
  \ 19,633.0               31.5\n                                                \
  \      --------------\nsum                                                    114,368.1\n\
  ```\n\n## 实际案例总结\n\n本节中的示例来自真实的应用程序。它们展示了数据可压缩性方面相当大的差异。这是可以预料的，因为压缩算法的成功与否很大程度上取决于被压缩的数据本身。表\
  \ 3-6 汇总了所有四个示例的数据。\n\n**表 3-6.** 实际案例对比\n\n| 数据类型 | 基表名称 | 特征 | 压缩比 |\n| --- |\
  \ --- | --- | --- |\n| 资产跟踪 | `CP_DAILY` | 窄表，许多低 NDV 列 | 16×-65× |\n| 通话详单记录 |\
  \ `SEE` | 许多`NULL`值，许多唯一列 | 3×-6× |\n| 财务数据 | `REV_ACCRUAL` | 宽表，许多 NULL 值，许多低 NDV\
  \ 列 | 4×-10× |\n| 零售销售数据 | `SALES` | 窄表，大部分为低 NDV 列 | 15×-32× |\n\n希望这些数据能让您对 HCC\
  \ 可实现的压缩比范围以及最能受益于此技术的数据集类型有所了解。当然，预测特定表可压缩性的最佳方法是实际进行测试。这一点无论怎样强调都不为过。\n\n### 限制/挑战\n\
  \n使用 HCC 存在一些挑战。其中许多与 HCC 在大多数非 Exadata 平台上不可用这一事实有关。这一事实为恢复和高可用性解决方案带来了有趣的场景。另一个主要挑战是\
  \ HCC 与正在被主动更新的数据配合不佳。特别是以大量单行更新为特征的系统——我们通常将其描述为 OLTP 工作负载——即使在引入了行级锁的 12c 版本中，也可能无法与\
  \ HCC 良好配合。\n\n\n### 将数据迁移至非 Exadata 平台\n\n使用 `HCC` 的最大障碍可能一直在于将数据迁移至非 Exadata 平台。例如，虽然\
  \ `RMAN` 和 `Data Guard` 都支持 `HCC` 块格式，并且可以顺利地将数据恢复到非 Exadata 环境，但在该环境中运行的数据库在数据解压缩之前将无法对其进行任何操作。此规则的唯一例外是使用\
  \ Oracle 的 `ZFS 存储设备`、`FS1` 存储系统或 `Pillar Axiom` 阵列。必须先解压缩数据，可能意味着在发生故障切换到非 Exadata\
  \ 平台上的备用数据库时，在能够访问数据之前会有很长的延迟。将 `RMAN` 恢复到非 Exadata 平台时也存在同样的问题。恢复操作本身可以工作，但 `HCC`\
  \ 格式块中的数据在被移动到非 `HCC` 格式之前将无法访问。顺便提一下，这可以通过 `ALTER TABLE MOVE NOCOMPRESS` 命令完成。\n\
  \n**注意**\n\n在非 Exadata 平台上解压缩 `HCC` 数据的能力仅在 Oracle 数据库版本 11.2.0.2 中才可用。在 11.2.0.1\
  \ 版本上尝试此操作将导致错误。\n\n除了在访问数据之前解压缩数据所带来的长时间延迟外，还存在空间问题。如果 `HCC` 提供 10 倍的压缩因子，例如，你将需要在目标环境中有当前使用空间的\
  \ 10 倍可用空间，以处理数据增大的尺寸。由于这些原因，`Data Guard` 很少在非 Exadata 平台上设置备用数据库。\n\n在 Oracle 12c\
  \ 之前，将 `HCC` 压缩数据导入非 Exadata 数据库是有问题的。`impdp` 中添加了一个长期请求的功能，允许 DBA 动态指定压缩级别，如下例所示：\n\
  \n```\n[oracle@nonExadata ∼]$ impdp user/password@nonExadata/testpdb1 \\\n> directory=data_pump_dir\
  \ dumpfile=hcc_dump.dmp \\\n> transform=table_compression_clause:nocompress\n```\n\
  \n在导入之前 `HCC` 压缩的表之前，你需要确保存储空间足够，以便导入成功。在导入到非 Exadata 系统时未能提供转换子句将导致导入中止，并显示以下错误消息：\n\
  \n```\nProcessing object type TABLE_EXPORT/TABLE/TABLE\nORA-39083: Object type TABLE:\"\
  MARTIN\".\"UPDTEST_QL\" failed to create with error:\nORA-64307:  Exadata Hybrid\
  \ Columnar Compression is not supported for tablespaces on\n  this storage type\n\
  ```\n\n### 禁用序列直接路径读取\n\n如你在第 2 章中所见，序列 `Direct Path Reads` 允许非并行化的扫描操作使用直接路径读取机制，这是启用\
  \ Exadata 的 `Smart Scan` 功能的先决条件。`序列 Direct Path Reads` 的启用基于一个计算，该计算取决于被扫描对象的大小相对于可用缓冲区缓存的大小。简而言之，只有大型对象才会被考虑使用\
  \ `序列 Direct Path Reads`。`HCC` 的有效性在这里实际上可能适得其反。由于压缩极大地减小了对象的尺寸，它可能导致通常会受益于 `Smart\
  \ Scan` 的语句改用标准读取机制，从而禁用了 Exadata 的许多优化功能。这通常不是一个大问题，因为 `HCC` 显著减少了块的数量。\n\n数据库在运行时做出使用\
  \ `Direct Path Read`（进而触发 `Smart Scan`）的决定。当对象被压缩和分区时，这可能变得有趣。是否使用 `Smart Scan`\
  \ 的算法基于被扫描对象的大小；对于分区对象，这意味着分区的大小。因此，在将分区与 `HCC` 结合使用的情况下，我们经常看到一些分区使用 `Smart Scans`，而一些则无法使用。请记住，不使用\
  \ `Smart Scans` 也意味着解压缩无法在存储层完成，因为此功能仅在执行 `Smart Scans` 时才启用。\n\n\n### 锁定问题\n\n\
  文档过去曾指出，对使用`HCC`压缩的表更新单行数据，会锁定包含该行的整个`CU`。这可能导致`OLTP`类型系统出现严重的争用问题。不过，出于本章前文已阐述的原因，你无论如何都不应该用`HCC`来压缩活跃数据。\n\
  \n对我们而言，锁定整个`CU`是主要的原因，这也是为什么不建议对数据会被更新的表（或分区）使用`HCC`。从 Oracle `12c`开始，这一情况发生了改变。如果需要，你可以在`CU`头部预留一些空间来跟踪`DML`操作。要启用此功能，必须为`HCC`指定新的语法，如本例所示：\n\
  \n```sql\nCREATE TABLE t1_ql_rll\nenable row movement\ncolumn store compress for\
  \ query low row level locking\nAS\nselect * from t1_ql;\n```\n\n```\nTable created.\n\
  ```\n\n表`T1_QL_RLL`已创建，包含一百万行随机数据，使用`Query Low`作为压缩机制。行级锁在`Query Compression`模式下效果最佳（如果可以这么说的话）。其在`Archive\
  \ Compression`模式下的效果有些不可预测。但这完全说得通。归档数据本就不应该被更新，不是吗？比较两个表得出了一个有趣的结果：\n\n```sql\n\
  SQL> select table_name,compression,compress_for,last_analyzed\n  2  from tabs where\
  \ table_name like 'T1_QL%';\n```\n\n```\nTABLE_NAME           COMPRESS COMPRESS_FOR\
  \                   LAST_ANAL\n-------------------- -------- ------------------------------\
  \ ---------\nT1_QL                ENABLED  QUERY LOW                      22-AUG-14\n\
  T1_QL_RLL            ENABLED  QUERY LOW ROW LEVEL LOCKING    22-AUG-14\n```\n\n\
  首先，你可以看到行级锁已被请求并应用于该表。当你比较表的大小时，会注意到为了跟踪`DML`操作而在`CU`头部预留的额外空间带来了一点小小的代价：\n\n```sql\n\
  SQL> select segment_name,bytes/power(1024,2) m, blocks\n  2  from user_segments\n\
  \  3  where segment_name like 'T1_QL%';\n```\n\n```\nSEGMENT_NAME              \
  \       M     BLOCKS\n-------------------- ---------- ----------\nT1_QL        \
  \                  176      22528\nT1_QL_RLL                      192      24576\n\
  ```\n\n在这个仅有一百万行的小示例中，大小差异只有几`MB`。锁定行的信息并不隐藏在`CU`的前几个字节中。正如人们可能预期的那样，它在`CU`头部清晰可见。转储一个带有随机`CU`头部的块就暴露了这一点：\n\
  \n```\ndata_block_dump,data header at 0x7efefa13407c\n===============\ntsiz: 0x1f80\n\
  hsiz: 0x1c\npbl: 0x7efefa13407c\n76543210\nflag=-0------\nntab=1\nnrow=1\nfrre=-1\n\
  fsbo=0x1c\nfseo=0x5e8\navsp=0x5cc\ntosp=0x5cc\nr0_9ir2=0x0\nmec_kdbh9ir2=0x0\n76543210\n\
  shcf_kdbh9ir2=----------\n76543210\nflag_9ir2=--R-----      Archive compression:\
  \ Y\nfcls_9ir2[0]={ }\n0x16:pti[0]     nrow=1  offs=0\n0x1a:pri[0]     offs=0x5e8\n\
  block_row_dump:\ntab 0, row 0, @0x5e8\ntl: 6552 fb: --H-F--N lb: 0x0  cc: 1\nnrid:\
  \  0x0140219c.0\ncol  0: [6540]\nCompression level: 01 (Query Low)\nLength of CU\
  \ row: 6540\nkdzhrh: ------PCL CBLK: 2 Start Slot: 00\nNUMP: 02\nPNUM: 00 POFF:\
  \ 5617 PRID: 0x0140219c.0\nPNUM: 01 POFF: 13633 PRID: 0x0140219d.0\nnum lock bits:\
  \ 7\nlocked rows:\n*---------\nCU header:\nCU version: 0   CU magic number: 0x4b445a30\n\
  CU checksum: 0x22424f63\nCU total length: 17189\nCU flags: NC-U-CRD-OP\nncols: 6\n\
  nrows: 1015\nalgo: 0\nCU decomp length: 17016   len/value length: 1049278\nrow pieces\
  \ per row: 1\nnum deleted rows: 0\nSTART_CU:\n00 00 19 8c 4f 02 00 00 00 02 00 00\
  \ 15 f1 01 40 21 9c 00 00 00 00 35 41 01\n```\n\n在这个特定的`CU`中，你可以看到用于锁定行的`7`个锁位。下一行实际上显示了被锁定的行（如果有的话）。现在，让我们尝试更新压缩单元中的一些行并转储该块。但在此之前，必须找到要更新行的块编号。使用以下查询，可以在块`192700`中识别出`ID`为`1`到`78`的行：\n\
  \n```sql\nSQL> select min(id),max(id),blockn from (\n  2    select id,DBMS_ROWID.ROWID_RELATIVE_FNO(rowid),\n\
