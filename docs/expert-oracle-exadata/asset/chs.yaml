  \ `DESC` 作为缩写。请注意，列式输出没有标题。许多 `LIST` 命令通过使用续行符 (`-`) 被串接在多行上。`LIST` 命令看起来很像 `SQL`，只是用\
  \ `LIST` 代替了 `SELECT`，并且在使用 `LIKE` 关键词时使用了正则表达式进行匹配。你可以看到 `ATTRIBUTES` 和 `WHERE`\
  \ 关键词可以在命令行上出现在 `LIST ObjectType` 关键词之后的任何位置。换句话说，这两个关键词不是位置相关的；任何一个都可以先使用。\n\n\
  前面列表中的第一个示例可以在任何 `Exadata` 单元版本上执行。`LIST` 命令用于显示与单元的 `FLASHCACHE` 性能指标相关的一组特定属性。更具体地说，那些计算“每秒”值的指标被排除了。\n\
  \n第二个示例在前一个示例的基础上进行了扩展，指定了一个 `ORDER BY`，这对于 `12.1.2.1.0` 及更高版本是新的。通常，当指定了 `ORDER\
  \ BY` 时，还必须提供一个 `LIMIT` 子句，否则会引发类似以下的错误：\n\n```cellcli\nCellCLI> list metriccurrent\
  \ where objectType = 'FLASHCACHE' and name not like '.*SEC' -\n> and metricValue\
  \ not like '0.*' attributes name, metricType, metricValue -\n> order by metricValue\
  \ desc\nCELL-02026: The LIMIT parameter is mandatory for \"LIST METRICCURRENT\"\
  \ command when using the ORDER BY option.\n```\n\n避免此限制的一种替代方法是如前所示将输出通过管道传输到 `UNIX`\
  \ `sort` 命令。请注意，你可以按升序 (`ASC`，默认) 或降序 (`DESC`) 排序。你不仅限于只按一列排序。最后一个示例显示了可以按多列排序。\n\
  \n### 从操作系统发送命令\n\n除了你刚才在这些示例中看到的交互式运行 `cellcli` 外，你在介绍中已经了解到，你可以指定 `-e` 选项，从操作系统提示符传入\
  \ `cellcli` 命令（甚至可以通过 `dcli`，你稍后会看到）。例如，以下列表显示了如何使用 `-e` 选项直接从 `OS` 命令行查询 `cellsrv`\
  \ 的状态：\n\n```bash\n[root@enkcel04 ∼]# cellcli -e \"list cell detail\"\n        \
  \  name:                       enkcel04\n          buStatus:                   normal\n\
  \          cellVersion:                OSS_12.1.2.1.0_LINUX.X64_141206.1\n     \
  \     cpuCount:                   24\n          diagHistoryDays:            7\n\
  \          fanCount:                   12/12\n          fanStatus:             \
  \     normal\n          flashCacheMode:             WriteBack\n[...]\n         \
  \ usbStatus:                  normal\n          cellsrvStatus:              running\n\
  \          msStatus:                   running\n          rsStatus:            \
  \       running\n```\n\n在其他方面，当你想要从操作系统 `shell` 脚本内部调用 `cellcli` 时，`-e` 选项很有帮助。使用\
  \ `-e` 参数向 `cellcli` 传递命令时需要小心——转义引号会变得非常重要，正如你将在本章后面看到的那样。\n\n"
- "# 在数据库中使用 cellcli XML 输出\n\n以表格形式解析 `cellcli` 的输出可能有点挑战。幸运的是，性能分析师还有另一种输出方法——XML。结合使用\
  \ `–e` 和 `–xml` 标志，您可以将 `cellcli` 输出读入数据库并使用 SQL 进行处理。以下是一个如何将 XML 格式的 `cellcli`\
  \ 信息加载到数据库中的示例。\n\n第一步是在 SQL*Plus 中使用 `create directory` 命令在数据库中创建一个目录对象。后续段落中使用的目录是\
  \ `ORADIR`。有了目录后，您可以创建一个 `XMLType` 表。存储 XML 信息还有其他方法，但作者发现这个方法可行。\n\n```\nSQL> create\
  \ table metrics_xmltab of xmltype;\n\nTable created.\n```\n\n这个特定的表将保存 `cellcli`\
  \ 性能数据的 XML 表示。在加载 XML 信息之前，需要先将其从单元中提取出来。为了使示例简单，只加载一个单元的性能数据。或者，您也可以使用 `dcli`\
  \ 来同时捕获信息。可以通过 SSH 读取与 `SMARTIO` 类别相关的性能指标的 XML 文件，并将其放入目录 `ORADIR` 中。这只是一个示例。您可以对单元发起任何查询：\n\
  \n```\nssh cellmonitor@enkcel04 \"cellcli -xml -e list metriccurrent where objectType\
  \ = 'SMARTIO'\" \\\n> > oradir/metrics.xml\n```\n\nXML 文件将包含以下内容；后面要显示的重要部分位于 `<metric>`\
  \ 标签中：\n\n```\n[oracle@enkdb03 ~]$ head -n20 oradir/metrics.xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\" ?>\n<cli-output>\n<context cell=\"enkcel04\" realm=\"\"\
  \ ossStartTimestamp=\"1430673687318\" iormResetTimestamp=\"782230633\"/>\n<metric>\
  \ <name>SIO_IO_EL_OF</name>\n<alertState>normal</alertState>\n<collectionTime>1431455744000</collectionTime>\n\
  <metricObjectName>SMARTIO</metricObjectName>\n<metricType>Cumulative</metricType>\n\
  <metricValue>634659.296875</metricValue>\n<objectType>SMARTIO</objectType>\n</metric>\n\
  <metric> <name>SIO_IO_EL_OF_SEC</name>\n<alertState>normal</alertState>\n```\n\n\
  格式良好的 XML——*正是您所需要的*。在下一步中，这可以加载到数据库中：\n\n```\nSQL> insert into metrics_xmltab values\
  \ (xmltype\n  2   (bfilename('ORADIR','metrics.xml'), nls_charset_id('AL32UTF8')));\n\
  \n1 row created.\n\nSQL> commit;\n\nCommit complete.\n\nSQL> select count(*) from\
  \ metrics_xmltab;\n\n  COUNT(*)\n----------\n         1\n```\n\n现在剩下要做的就是使用一些 XMLDB\
  \ 技巧将 XML 信息转换为表格形式，以便人眼更容易理解。`XMLTABLE` 结构可用于生成报告。之后，当插入更多数据时，您可以根据 `collectionTime`\
  \ 来区分记录。XML 文档以 UNIX 纪元时间报告时间。\n\n```\nSQL> select x.name, TO_DATE('1970-01-01',\
  \ 'YYYY-MM-DD') + x.collectionTime/86400000\n  2    as collectedAt, x.metricType,\
  \ x.metricValue, x.objectType\n  3   from metrics_xmltab m,\n  4  xmltable('//metric'\n\
  \  5   passing object_value\n  6   columns\n  7     name           varchar2(25)\
  \          path 'name',\n  8     collectionTime number                path 'collectionTime',\n\
  \  9     metricType     varchar2(20)          path 'metricType',\n 10     metricValue\
  \    number                path 'metricValue',\n 11     objectType     varchar2(50)\
  \          path 'objectType') x;\n\nNAME                      COLLECTEDAT      \
  \    METRICTYPE           METRICVALUE OBJECTTYPE\n------------------------- --------------------\
  \ -------------------- ----------- -------------\nSIO_IO_EL_OF              12.05.2015\
  \ 18:35:44 Cumulative            634659.297 SMARTIO\nSIO_IO_EL_OF_SEC          12.05.2015\
  \ 18:35:44 Rate                           0 SMARTIO\nSIO_IO_OF_RE              12.05.2015\
  \ 18:35:44 Cumulative            14336.6719 SMARTIO\nSIO_IO_OF_RE_SEC          12.05.2015\
  \ 18:35:44 Rate                           0 SMARTIO\nSIO_IO_PA_TH              12.05.2015\
  \ 18:35:44 Cumulative                     0 SMARTIO\nSIO_IO_PA_TH_SEC          12.05.2015\
  \ 18:35:44 Rate                           0 SMARTIO\nSIO_IO_RD_FC              12.05.2015\
  \ 18:35:44 Cumulative            60078.5391 SMARTIO\nSIO_IO_RD_FC_HD           12.05.2015\
  \ 18:35:44 Cumulative            3831.76563 SMARTIO\n```\n\n您可以通过创建另一个 XML 表来扩展此示例，该表包含从每个单元上找到的\
  \ `metricdefinition` 中获取的指标名称及其定义，然后将两者连接起来以获得更易于阅读的输出。视图有助于减少提取相同信息所需的输入量。\n\n\
  ### 配置和管理存储单元\n\n`cellcli` 还以多种方式用于配置从磁盘存储到单元警报的所有内容。您还可以将 `cellcli` 用于管理任务，如启动和关闭。以下是一些如何使用\
  \ `cellcli` 配置和管理存储单元的示例。\n\n可以逐个或全部关闭单元服务。以下命令用于关闭单元服务：\n\n```\n-- 逐个关闭单元服务 --\n\
  CellCLI> alter cell shutdown services cellsrv\nCellCLI> alter cell shutdown services\
  \ ms\nCellCLI> alter cell shutdown services rs\n\n-- 关闭所有单元服务 --\nCellCLI> alter\
  \ cell shutdown services all\n```\n\n单元服务也可以逐个或全部启动。请注意，`RS` 进程必须首先启动，否则 `cellcli`\
  \ 将抛出如下错误：\n\n```\nCellCLI> alter cell startup services cellsrv\nStarting CELLSRV\
  \ services...\nCELL-01509: Restart Server (RS) not responding.\n```\n\n以下命令用于启动单元服务：\n\
  \n```\n-- 逐个启动单元服务 --\nCellCLI> alter cell startup services rs\nCellCLI> alter cell\
  \ startup services ms\nCellCLI> alter cell startup services cellsrv\n\n-- 启动所有单元服务\
  \ --\nCellCLI> alter cell startup services all\n```\n\n要显示 `cellsrv` 的当前状态，请使用 `LIST\
  \ CELL` 命令：\n\n```\nCellCLI> list cell attributes name,cellsrvStatus,cellVersion,flashCacheMode,-\n\
  > msStatus,rsStatus,status detail\n          name:                       enkcel04\n\
  \          cellVersion:                OSS_12.1.2.1.0_LINUX.X64_141206.1\n     \
  \     flashCacheMode:             WriteBack\n          status:                 \
  \    online\n          cellsrvStatus:              running\n          msStatus:\
  \                   running\n          rsStatus:                   running\n```\n\
  \n在 `list cell detail` 输出中看到的某些设置可以使用 `ALTER CELL` 命令进行更改。这些设置可以一次配置一个，也可以通过用逗号分隔一起配置。例如：\n\
  \n```\n-- 配置警报的通知级别 --\nCellCLI> ALTER CELL notificationPolicy='critical,warning,clear'\n\
  \n-- 配置单元的电子邮件通知 --\nCellCLI> ALTER CELL smtpServer='smtp.example.com', -\n    \
  \                smtpFromAddr='exa01@example.com', -\n                    smtpFrom='exa01',\
  \ -\n                    smtpToAddr='all_dba@example.com', -\n                 \
  \   notificationPolicy='critical,warning,clear', -\n                    notificationMethod='mail'\n\
  ```\n\n顺便说一句，如果您还没有发现这个功能，`cellcli` 会存储类似于 bash shell 的命令历史记录。您可以使用上下箭头键滚动浏览历史记录并使用箭头键编辑命令。多亏了查询中的正则表达式支持，您拥有了一个*非常强大*的模式匹配能力可供使用。`cellcli`\
  \ 语法对系统管理员和 DBA 来说可能有些陌生，但一旦您理解了其逻辑，掌握起来真的不难。\n\n## `dcli` 简介\n\n`dcli` 是一种工具，通过它，你可以在所有存储单元或计算节点上执行单条命令。多年来，在多种集群系统上工作后，我们深刻体会到保持所有节点上的脚本（以及某些配置文件）一致的重要性。能够有一个工具在集群的所有节点上一致地执行相同命令，也是非常方便的。Oracle\
  \ 提供了 `dcli` 命令来实现这一点——可惜，它不适用于普通的集群系统。除其他功能外，`dcli` 命令允许你执行以下操作：\n\n*   在所有存储单元和/或数据库服务器之间配置\
  \ `SSH` 等效性\n*   将文件分发到集群中所有服务器/单元的相同位置\n*   在集群中的服务器/单元上分发并执行脚本\n*   在集群中的服务器/单元上执行命令和脚本\n\
  \n`dcli` 使用 `SSH` 等效性来验证你在远程服务器上的会话。如果你没有在服务器/单元之间建立 `SSH` 等效性，你仍然可以使用它，但它会在执行命令前提示你输入每个远程系统的密码。`dcli`\
  \ 并行执行所有命令，将来自每个服务器的输出聚合成一个列表，并在本地机器上显示输出。\n\n与刚刚讨论的 `cellcli` 不同，`dcli` 不是一个 `bash`\
  \ 脚本。它仍然是一个脚本，但是用 `python` 编写的。该脚本可以接受以下命令行选项（取自一个 `12.1.2.1.0` 计算节点）：\n\n```\n\
  [oracle@enkdb03 ∼]$ dcli -h\nDistributed Shell for Oracle Storage\n[...]\nUsage:\
  \ dcli [options] [command]\nOptions:\n  --version            show program's version\
  \ number and exit\n  --batchsize=MAXTHDS  limit the number of target cells on which\
  \ to run the\n                       command or file copy in parallel\n  -c CELLS\
  \             comma-separated list of cells\n  -d DESTFILE          destination\
  \ directory or file\n  -f FILE              files to be copied\n  -g GROUPFILE \
  \        file containing list of cells\n  -h, --help           show help message\
  \ and exit\n  --hidestderr         hide stderr for remotely executed commands in\
  \ ssh\n  -k                   push ssh key to cell's authorized_keys file\n  -l\
  \ USERID            user to login as on remote cells (default: celladmin)\n  --maxlines=MAXLINES\
  \  limit output lines from a cell when in parallel\n                       execution\
  \ over multiple cells (default: 100000)\n  -n                   abbreviate non-error\
  \ output\n  -r REGEXP            abbreviate output lines matching a regular expression\n\
  \  -s SSHOPTIONS        string of options passed through to ssh\n  --scp=SCPOPTIONS\
  \     string of options passed through to scp if different\n                   \
  \    from sshoptions\n  --serial             serialize execution over the cells\n\
  \  --showbanner         show banner of the remote node in ssh\n  -t            \
  \       list target cells\n  --unkey              drop keys from target cells' authorized_keys\
  \ file\n  -v                   print extra messages to stdout\n  --vmstat=VMSTATOPS\
  \   vmstat command options\n  -x EXECFILE          file to be copied and executed\n\
  ```\n\n在大多数情况下，你会发现你要么对所有存储单元，要么对所有计算节点执行命令。该工具依赖于一个简单的文本文件，其中包含以回车符分隔的机器名称，并使用\
  \ `–g` 参数传递。通常这些文件分别被称为 `cell_group`、`dbs_group` 和 `all_group`，这正是 `onecommand`\
  \ 工具在安装后留下的。这些文件可以描述如下：\n\n*   `dbs_group`：此文件包含你的 Exadata 配置中所有数据库服务器的管理主机名。它提供了一种在数据库服务器上执行\
  \ `dcli` 命令的便捷方式。\n*   `cell_group`：此文件包含你的 Exadata 配置中所有存储单元的管理主机名。它提供了一种将 `dcli`\
  \ 命令限制在存储单元上执行的便捷方式。\n*   `all_group`：此文件是 `dbs_group` 和 `cell_group` 文件的组合，包含了你的\
  \ Exadata 配置中所有数据库服务器和存储单元的管理主机名列表。使用此文件，你可以谨慎地在所有数据库服务器和存储单元上执行 `dcli` 命令。\n\n\
  以下是一个四分之一机架的示例：\n\n```\n[root@enkdb03 ∼]# cat cell_group\nenkcel04\nenkcel05\nenkcel06\n\
  ```\n\n除了 `–g` 参数外，你最常做的可能是使用 `dcli` 的 `–l` 参数来提供用户 ID，以指定应使用哪个用户连接到组文件中指定的系统。请记住，连接到存储单元时可以使用\
  \ `root`、`celladmin` 和 `cellmonitor`。当调用 `dcli` 与其他计算节点交互时，`root` 和 `oracle` 是最明显的用户\
  \ ID 候选者。\n\n当你想使用 `cellcli` 命令从所有存储单元收集信息时，`dcli` 特别有用。以下示例展示了如何结合使用 `dcli` 和 `cellcli`\
  \ 命令来报告四分之一机架集群中所有存储单元的状态：\n\n```\n[oracle@enkdb03 ∼] $ dcli -g cell_group -l cellmonitor\
  \ cellcli -e list cell\nenkcel04: enkcel04       online\nenkcel05: enkcel05    \
  \   online\nenkcel06: enkcel06       online\n```\n\n本附录讨论的任何 `cellcli` 命令都可以使用 `dcli`\
  \ 从一个中心位置执行。事实上，唯一的限制是该命令不能是交互式的（例如，在执行期间需要用户输入）。例如，下面的列表说明了如何从存储单元收集当前性能指标：\n\n\
  ```\n[oracle@enkdb03 ∼]$ dcli -l cellmonitor -g cell_group \\\n> cellcli -e \"LIST\
  \ METRICCURRENT  ATTRIBUTES name,metricValue, \\\n> collectionTime where objecttype=’FLASHLOG’\
  \ and name like ’.*FIRST’\"\nenkcel04: FL_DISK_FIRST          525,232,661 IO requests\
  \         2015-05-12T14:33:45-05:00\nenkcel04: FL_FLASH_FIRST         11,914,368\
  \ IO requests         2015-05-12T14:33:45-05:00\nenkcel05: FL_DISK_FIRST       \
  \   555,655,999 IO requests         2015-05-12T14:34:06-05:00\nenkcel05: FL_FLASH_FIRST\
  \         12,418,630 IO requests         2015-05-12T14:34:06-05:00\nenkcel06: FL_DISK_FIRST\
  \          555,696,351 IO requests         2015-05-12T14:34:08-05:00\nenkcel06:\
  \ FL_FLASH_FIRST         12,086,961 IO requests         2015-05-12T14:34:08-05:00\n\
  ```\n\n如你所见，从 `dcli` 使用 `cellcli` 需要在 `where` 子句中进行创造性的引用。\n\n## 总结\n\n`dcli` 和\
  \ `cellcli` 的用途远比我们在此介绍的要多。系统管理员会发现它对于使用 `useradd` 和 `groupadd` 命令在数据库服务器上创建新用户账户等任务非常有用。数据库管理员（DBA）会发现\
  \ `dcli` 对于将脚本和其他文件分发到集群中的其他服务器非常有用。而结合使用 `dcli` 和 `cellcli` 提供了一种管理、提取和报告来自存储单元的关键性能指标的便捷方式。将这些任务安排为\
  \ `cron` 作业，并如那个小示例所示将其加载到数据库中，可以让你为后续分析保留一个很好的性能相关信息存储库。\n\n"
