  \ Snapper 当然也可以打印精确值。\n\n\n### Exadata 性能计数器的含义与解析\n\n在介绍了它们的用途之后，现在是时候深入探讨性能计数器的含义了。无论性能工具利用这些指标绘制出的图表或图片多么精美，如果你不了解其含义，它们在故障排查中的效用将*非常有限*。在撰写本章时，我们面临一个两难境地：市面上有太多有趣的性能计数器，每一个都值得单独用一节来讲解。但是，如果我们那样做，本章将超过\
  \ 100 页。为了将篇幅控制在合理范围内，本章主要涵盖 Exadata 特有的统计信息，并且只涉及最相关的那些。关于未能纳入本章的事件信息，请关注作者的博客。\n\
  \n以下是一个脚本，用于列出`V$STATNAME`中与存储单元相关的所有统计信息及其统计类别，该类别表明了 Oracle 内核工程师预期使用这些计数器的目的：\n\
  \n```sql\nSQL> SELECT\n2      name\n3    , TRIM(\n4        CASE WHEN BITAND(class,\
