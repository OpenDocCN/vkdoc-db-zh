  ### 步骤 3：为主机名创建网络 VLAN 和 DNS 条目


  运行 Exadata 部署助理实用程序后，需要将安装模板发送给网络团队，以便配置适当的网络虚拟局域网（VLAN）。主机名也需要在您的域名系统（DNS）服务器中注册。由于
  OneCommand 过程的最终产品是一个运行中的 Oracle RAC 环境，因此必须为所有主机名配置正向和反向 DNS 查找。如果某个主机名解析不正确，可能会在部署过程中出现问题。



  '
- "# 第 4 步：运行 CheckIP 以验证网络就绪状态\n\nExadata 部署助手创建的文件之一就是 `<client>-<cluster>-checkip.sh`\
  \ 脚本。当 Oracle Exadata 部署助手用 Java 重写后，它就从一个由响应文件驱动的 shell 脚本，变成了一个完整的 Java 程序。如果你查看这个\
  \ shell 脚本的内部，实际上会发现它只是在后台调用 Java 代码。此脚本用于验证网络是否就绪，以及为 Exadata 规划的设置是否存在冲突。CheckIP\
  \ 测试网络以确认满足以下条件：\n\n- 应该响应 ping 的 IP 地址，确实响应。\n- 不应该响应 ping 的 IP 地址，确实不响应。\n- 必须在\
  \ DNS 中注册的主机名，能够使用 `<client>-<cluster>.xml` 文件中指定的信息进行正向和反向解析。\n\n## 运行 CheckIP\
  \ 脚本\n\n在运行 OneCommand 之前，应运行 `<client>-<cluster>-checkip.sh` 脚本（CheckIP）以验证您公司网络的就绪情况。该脚本要求运行它的用户已从\
  \ My Oracle Support 站点下载了 Oracle Exadata 部署助手。用户还需要 `<client>-<cluster>-checkip.sh`\
  \ 脚本以及 `<client>-<cluster>.xml` 文件。\n\n此时，您应该从一个 Exadata 平台外部的主机运行 CheckIP。您选择运行\
  \ CheckIP 的主机必须拥有与您的 Exadata 系统相同的网络可见性。例如，该主机必须能够访问相同的 DNS 和 NTP 服务器，并且必须能够 ping\
