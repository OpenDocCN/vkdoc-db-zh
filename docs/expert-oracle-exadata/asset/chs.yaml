  / `NET5`）作为 `bondeth0` 接口。如果未配置绑定，则将使用 `NET1` 或 `NET4`。 |

  | `Private Subnet Mask` | InfiniBand 网络的子网掩码 |

  | `Backup Subnet Mask` | 可选备份网络的子网掩码 |

  | `Backup Gateway` | 可选备份网络所用网关设备的 IP 地址 |

  | `Backup Bonded / Non-Bonded` | 决定可选备份网络是否将配置为主/被动绑定以实现高可用性 |

  | `Backup Copper Base-T / Optical` | 决定可选备份网络是利用铜缆连接（绑定时为 `NET1` / `NET2`，非绑定时为
  `NET3`）还是光纤连接（`NET4` / `NET5`）作为 `bondeth1` 接口。如果未配置绑定，则将使用 `NET3`。 |


