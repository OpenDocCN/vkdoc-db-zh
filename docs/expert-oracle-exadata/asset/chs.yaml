  \ 944MB 减少到了 16MB。如果您看一下已用时间，这些数据可以被非常快速地读取。\n\n### 混合工作负载\n\n存在第三种类型的系统，它是前两种的结合。事实上，可以说前两种（OLTP\
  \ 和数据仓库）的纯粹形式在现实世界中很少见。有许多系统并不完全符合前面描述的两个主要类别。实际上，大多数系统都表现出两者的特征。例如，考虑这样一个情况：一个“OLTP”系统在白天执行简短、独立的小型事务，而在晚上进行大量报表操作。或者从数据仓库的角度看，您运行大量报表，但有一个计划的\
  \ ELT（提取、加载、转换）过程，该过程大量使用合并子句，这当然需要进行查找。\n\n将长时间运行、对吞吐量敏感的查询与快速、对延迟敏感的语句相结合，肯定会带来一些必须处理的额外问题。这类系统的主要问题之一是如何处理索引。\n\
  \n\n"
- "# 建立索引还是不建立索引？\n\n在 Exadata 实施过程中，我们争论最多的一个问题就是是否要删除索引。声称在 Exadata 上不需要任何索引的说法，在某种程度上加剧了这个问题。使用索引的访问路径通常无法利用\
  \ Exadata 特有的优化。是的，你没看错——这通常是因为在优化器选择对索引执行快速全扫描的情况下可以发生卸载，但这并不是索引最常见的用法模式。更常见的模式是使用索引范围扫描来从表中检索相对较少的记录，而目前这种操作是无法卸载的。一般来说，你会希望在选择性谓词上使用索引范围扫描。然而，由于\
  \ Exadata 在扫描磁盘方面非常高效，在许多情况下，基于索引的访问路径不再比基于扫描的访问操作更快。这个查询执行的频率开始扮演重要的角色。如果你能在几秒钟内扫描一个数百万行的表，那无疑是快的。然而，如果你在一次合并操作中需要执行这个扫描\
  \ 10,000 次，那么在查找表上加一个索引可能会加快速度。这确实是一个需要我们重新审视的问题：何时我们想使用索引，何时我们又期望全扫描表现更好。\n\n当\
  \ Exadata 刚开始出现在客户现场时，我们常听到的一种说法是索引不再必要，应该被删除。对于纯粹的数据仓库工作负载，对于分析性索引来说，这可能确实是相当好的建议。然而，我们很少看到可以称之为“纯粹数据仓库”的工作负载。大多数系统都混合了多种访问模式，一组语句追求低延迟，而另一组则追求高吞吐量。在这些情况下，删除所有索引是行不通的。这就是为什么将讨论保留到本节的原因。\n\
  \n## 混合工作负载的问题\n\n对于混合工作负载，即需要为特定语句集合保留索引的情况，其问题在于优化器在选择使用还是忽略它们方面，并不如人们期望的那样智能。不过，或许有一种方法可以绕过这种情况，那就是创造性地使用不可见索引。这个\
  \ 11g 特性允许你在制定执行计划时对优化器隐藏索引。索引仍然存在并且也会被维护，因此你可能需要重新审视索引的使用情况。并非每个索引都需要删除，同样，也并非每个分析性索引都需要保留。\n\
  \n下面是一个相对简单的实现示例，展示了如何在数据库中保留索引，但只选择性地使用它们。`dbm01` 数据库已被修改，并创建并启动了两个服务。`DSSSRV`，顾名思义，是用户在进行决策支持查询或那些对吞吐量要求高、对低延迟需求较低的查询时应使用的服务。正如你所想，对于\
  \ `OLTPSRV` 则相反。通过该服务连接的用户非常关心低延迟，但对带宽不太在意。可以编写一个小的 PL/SQL 过程来检查会话使用了哪个服务连接，并更改参数\
  \ `optimizer_use_invisible_indexes`。表 `T1_WITH_INDEX` 上的索引是不可见的：\n\n```sql\nSQL>\
  \ select index_name, visibility\n  2  from user_indexes\n  3  where index_name =\
  \ 'I_T1_WITH_INDEXES_1';\n\nINDEX_NAME                     VISIBILIT\n------------------------------\
  \ ---------\nI_T1_WITH_INDEXES_1            INVISIBLE\n```\n\n这里使用的小过程只是检查服务名称并更改优化器对该索引的可见性：\n\
  \n```sql\nSQL> create procedure check_service is\n  2  begin\n  3   if lower(sys_context('userenv','service:name'))\
  \ = 'dsssrv' then\n  4    execute immediate 'alter session set optimizer_use_invisible_indexes\
  \ = false';\n  5   elsif lower(sys_context('userenv','service:name')) = 'oltpsrv'\
  \ then\n  6    execute immediate 'alter session set optimizer_use_invisible_indexes\
  \ = true';\n  7   end if;\n  8  end;\n  9  /\n\nProcedure created.\n```\n\n## SQL\
  \ 查询示例\n\n以下的执行计划显示，根据会话连接所使用的服务，索引会被使用或忽略。\n\n### 第一个 SQL 示例（OLTPSRV 连接）\n\n第一个示例使用\
  \ `OLTPSRV` 连接：\n\n```sql\nSQL> select sys_context('userenv','service:name') from\
  \ dual;\n\nSYS_CONTEXT('USERENV','SERVICE_NAME')\n-----------------------------------------------------------------------------------------\n\
  oltpsrv\n\nSQL> exec check_service\n\nSQL> select /* oltpsrv */ count(*) from t1_with_index\
  \ where id between 200 and 400;\n\nCOUNT(*)\n----------\n201\n\nSQL> select * from\
  \ table(dbms_xplan.display_cursor);\n\nPLAN_TABLE_OUTPUT\n-----------------------------------------------------------------------------------------\n\
  SQL_ID  46auh11c8ddts, child number 0\n-------------------------------------\nselect\
  \ /* oltpsrv */ count(*) from t1_with_index where id between 200\nand 400\n\nPlan\
  \ hash value: 2861271559\n\n-----------------------------------------------------------------------------------------\n\
  | Id  | Operation         | Name                | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-----------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT  |                     |       |       |     3 (100)| \
  \         |\n|   1 |  SORT AGGREGATE   |                     |     1 |     6 | \
  \           |          |\n|*  2 |   INDEX RANGE SCAN| I_T1_WITH_INDEXES_1 |   202\
  \ |  1212 |     3   (0)| 00:00:01 |\n-----------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - access(\"ID\">=200 AND \"ID\"<=400)\n\n20 rows selected.\n```\n\n注意这是由索引驱动的执行计划。\n\
  \n### 第二个 SQL 示例（DSSSRV 连接）\n\n当通过 `DSSSRV` 连接时，情况发生了变化：\n\n```sql\nSQL> select\
  \ sys_context('userenv','service:name') from dual;\n\nSYS_CONTEXT('USERENV','SERVICE_NAME')\n\
