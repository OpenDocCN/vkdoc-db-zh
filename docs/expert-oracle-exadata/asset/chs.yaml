  ### 参数\n\n以下是`reliable message`事件的参数：\n\n*   `P1` - 通道上下文\n*   `P2` - 通道句柄\n*  \
  \ `P3` - 广播消息\n*   `obj#` - 相关对象的对象号（不总是设置）\n\n### 资源管理器事件\n\n在结束本章之前，我们将讨论几个您应该了解的资源管理器事件。虽然这些事件并非\
  \ Exadata 专有，但资源管理器为在 Exadata 上整合混合工作负载提供了关键功能。截至 12.1.0.2 版本，实际上有八个独立的事件。以下对`V$EVENT_NAME`的查询显示了这些事件及其参数：\n\
  \n```\nSQL> select name,parameter1,parameter2,parameter3,wait_class\n  2  from v$event_name\
  \ where name like ’resmgr%’ order by name;\nNAME                           PARAMETER1\
  \ PARAMETER2           PARAMETER3  WAIT_CLASS\n------------------------------ ---------\
  \ -------------------- ---------- ------------\nresmgr:become active           location\
  \                                    Scheduler\nresmgr:cpu quantum             location\
  \   consumer group id                Scheduler\nresmgr:internal state change   location\
  \                                    Concurrency\nresmgr:internal state cleanup\
  \  location                                    Other\nresmgr:large I/O queued  \
  \      location                                    Scheduler\nresmgr:pq queued \
  \              location                                    Scheduler\nresmgr:sessions\
  \ to exit        location                                    Concurrency\nresmgr:small\
  \ I/O queued        location                                    Scheduler\n8 rows\
  \ selected.\n```\n\n其中只有三个事件值得关注。\n\n## resmgr:become active\n\n当会话等待开始执行时，您会看到此事件。例如，假设您定义了一个使用者组，要求在给定时间点具有最大并发会话数。任何额外的会话在开始工作前都会等待“`resmgr:become\
  \ active`”。\n\n### 事件含义\n\n该事件表明资源管理器正在阻止会话开始执行。如果您创建了一个计划指令来限制使用者组中的并发会话数，您将看到类似以下的输出：\n\
  \n```\nSQL> select sid,serial#,username,seq#,event,resource_consumer_group rsrc_cons_grp\n\
  \  2  from v$session where username = ’LMTD’;\n       SID    SERIAL# USERNAME  \
  \       SEQ# EVENT                          RSRC_CONS_GRP\n---------- ----------\
  \ ---------- ---------- ------------------------------ -----------------\n     \
  \  916       1413 LMTD            31124 cell smart table scan          LMTD_GROUP\n\
  \      1045       2667 LMTD            29480 cell smart table scan          LMTD_GROUP\n\
