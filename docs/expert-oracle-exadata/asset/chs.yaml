  \n### 参数\n\n以下是此事件的参数。注意`obj#`参数存在但未使用：\n\n*   `P1` - 位置\n*   `P2` - 未使用\n*   `P3`\
  \ - 未使用\n*   `obj#` - 不适用\n\n`location`参数是一个数值，很可能指的是 Oracle 代码中的一个位置（函数）。我们至少观察到了五个不同的位置。遗憾的是，Oracle\
  \ 没有公开记录这些检查在 Oracle 内核中的具体执行位置。\n\n\n### resmgr:cpu quantum\n\n此事件用于记录因与高优先级任务竞争而被数据库资源管理器强制实施的空闲时间。换句话说，这是一个进程等待数据库资源管理器分配其时间片所花费的时间。有趣的是，在撰写本文时，尚无数据库事件能够反映\
  \ I/O 资源管理层的节流情况。\n\n### 事件含义\n\n数据库资源管理器的行为类似于 CPU 调度算法，因为它将时间划分为单位（量子），并根据系统上的其他工作负载来决定是允许进程运行还是不允许。然而，与\
  \ CPU 调度算法不同，数据库资源管理器节流被注入到 Oracle 代码的关键位置，以消除进程在持有共享资源（如闩锁）时被踢出 CPU 的可能性。这可以防止在高负载系统上可能发生的一些棘手行为，例如优先级反转问题。实际上，进程会在不再持有这些共享资源时自愿休眠。这些检查在代码中有多个实现位置。以下是显示`resmgr:cpu\
