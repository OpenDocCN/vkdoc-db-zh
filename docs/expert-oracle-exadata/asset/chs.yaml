  \n## 用户 I/O 类中的 Exadata 等待事件\n\n用户 I/O 类对于 Exadata 而言，无疑是其中最重要的一类。当然，该类别中最有趣的事件是那两个智能扫描事件（`cell\
  \ smart table scan` 和 `cell smart index scan`）。这些事件记录了 Exadata 提供的主要查询下推优化所消耗的时间，这些优化主要包括谓词过滤、列投影和存储索引的使用。\n\
  \n用户 I/O 类还包含三个被描述为物理 I/O 事件的事件。这三个事件实际上衡量的是使用更为熟悉的多块和单块读取机制进行物理 I/O 所花费的时间——你在非\
  \ Exadata 平台上常见到的那些机制，只不过它们的名字被改得更有意义了一些。\n\n最后，还有两个事件似乎并不真正属于用户 I/O 类别。一个与文件空间分配时块的初始化有关。另一个与从存储单元收集统计信息有关。\n\
  \nOracle 12.1.2.1 和数据库 12.1.0.2 引入了三个与用户 I/O 相关的新次要 cell 事件，这些事件在 12.1.0.1 或 12.1.0.3\
  \ 中不存在。接下来的几个章节将依次介绍每一个等待事件，首先从智能扫描事件开始。\n\n\n"
- '# 单元智能表扫描


  `单元智能表扫描`事件是 Oracle 用来统计因卸载操作而进行全表扫描所花费的等待时间。它是 Exadata 平台上用于报表类工作负载的最重要事件。其存在与否可以用来验证一个语句是否从卸载操作中获益。正如第
  2 章所讨论的，卸载仅在 Oracle 能够进行直接路径读取时发生。因此，在 Exadata 的大多数情况下，此事件取代了`直接路径读取`事件。与非 Exadata
  平台上的直接路径读取一样，数据直接返回到数据库服务器上请求进程的`PGA`（无论是用户的影子进程还是并行从属进程）。数据块不会返回到`缓冲区缓存`。


  ### 事件含义


  尽管通过 InfiniBand 网络执行读取的机制与非 Exadata 平台上的普通读取非常不同，但驱动智能扫描的代码路径实际上与非 Exadata 平台上的直接路径读取非常相似。主要区别在于，每个对存储单元的请求都包含对语句元数据的引用，在
  Exadata 的情况下，这包括谓词和要返回的列列表等信息。由于存储单元可以访问这些信息，它们可以在将数据返回给请求进程之前应用过滤器并进行列投影。这些优化在每次请求一组数据块时都会应用。数据库服务器上请求数据的进程可以访问`ASM`区映射，因此可以从每个存储单元请求所需的分配单元（`AUs`）。在没有存储索引段的情况下，存储单元读取请求的`AU`，并应用谓词过滤器等任务。如果有任何行满足过滤条件，单元格便将投影的列返回给请求进程。然后，该进程请求下一个`AU`，并重复整个例程，直到扫描完所有数据。因此，在大型扫描中，此事件会反复出现。重要的是，与其他一些与
  I/O 相关的事件不同，单个智能扫描事件不能用于推导 I/O 性能。您需要使用`OEM 12c`或`cellcli`命令来访问单元格上的指标信息。我们将在第 12
  章中更详细地讨论这一点。


  ## 注意


  列投影是智能扫描提供的主要优化之一。这个功能有些被误解。它不仅仅是将选择列表中的列传回数据库服务器；它还传回`WHERE`子句中涉及的一些列。旧版本的`cellsrv`会将`WHERE`子句中指定的所有列传回数据库层。后续版本已纠正此行为，只包含涉及连接谓词的列。例如，您可以在`DBMS_XPLAN.DISPLAY_CURSOR`的输出中看到投影的列。


  与所有等待事件一样，`单元智能表扫描`将被记录在 SQL 跟踪中。但对于 Exadata，您可能需要进一步调查，因为跟踪文件不仅限于包含您设置的单个事件的信息。可能不立即显而易见的是，您可以将多个事件的输出组合到一个跟踪文件中。对于智能扫描，您可以包括`LIBCELL`客户端库（主要用于系统间通信）、Exadata
  智能扫描层以及 SQL 跟踪的跟踪信息，以获得正在发生的一切的综合视图。考虑以下启用大量跟踪的代码片段。您通常不需要跟踪如此多的信息，但这对于研究非常有用！不用说，您不应在生产环境中启用这些事件。这仅适用于生产环境和灾难恢复环境之外的开发系统。跟踪中的信息量可能非常大，填满`/u01`挂载点并实际上导致服务中断。


