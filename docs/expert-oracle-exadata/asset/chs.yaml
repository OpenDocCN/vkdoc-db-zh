  '/opt/oracle.ExaWatcher/LsofExaWatcher.sh'  120  30\nroot     23882 23881 /bin/sh\
  \ /opt/oracle.ExaWatcher/FlexIntervalMode.sh\n/opt/oracle.ExaWatcher/LsofExaWatcher.sh\
  \ 120 30\n```\n\n如你所见，有许多看起来像 `cellrsv` `XXX` 的进程。这些是构成重启服务器的进程。第一个进程是 `cellsrv`\
  \ 本身。接下来的两个进程是卸载服务器（在第 2 章中有更详细的讨论），它们是在 Exadata 存储服务器软件的 12c 版本中引入的。另外请注意最后两个进程；这是我们称之为管理服务器的\
  \ `WebLogic` 程序。最后，你会看到几个与 `ExaWatcher` 相关的进程。还请注意所有进程都是由 `root` 启动的。虽然存储服务器上还有其他几个半特权帐户，但这显然不是一个为用户登录而设置的系统。\n\
  \n查看相关进程的另一种有趣方式是使用 `ps –H` 命令，它提供了一个缩进的进程列表，显示了它们彼此之间的关联关系。你可以根据前文中进程 ID (`PID`)\
  \ 和父进程 ID (`PPID`) 之间的关系自己构建一棵树来推导，但 `–H` 选项使这变得容易得多。以下是从 `ps –efH` 命令输出中编辑过的片段：\n\
  \n```\ncellrssrm <= 主重启服务器\n  cellrsbmt\n    cellrsbkm\n  cellrssmt\n  cellrsmmt\n\
  \    startWebLogic.sh <= 管理服务器\n  cellrsomt\n    cellsrv\n```\n\n查看存储服务器上消耗的资源也很有趣。以下是来自\
  \ `top` 的输出片段：\n\n```\ntop - 12:01:30 up 19 days, 17:17,  1 user,  load average:\
  \ 0.49, 0.26, 0.21\nTasks: 428 total,   4 running, 424 sleeping,   0 stopped,  \
  \ 0 zombie\nCpu(s): 11.1%us,  1.7%sy,  0.0%ni, 83.8%id,  3.3%wa,  0.0%hi,  0.0%si,\
  \  0.0%st\nMem:  65963336k total, 21307292k used, 44656044k free,   140216k buffers\n\
  Swap:  2097080k total,        0k used,  2097080k free,  1235320k cached\n  PID USER\
  \      PR  NI  VIRT   RES   SHR  S  %CPU   %MEM   TIME+       COMMAND\n 7988 root\
  \      20   0 22.1g  7.1g   12m  S 246.3  11.3   5581:38     cellsrv\n 7982 root\
  \      20   0 1621m  385m   21m  S   5.3    0.6   851:07.47   java\n 8192 root \
  \     20   0 67960  5232   972  R   2.6    0.0     0:00.08   sh\n  394 root    \
  \  20   0 13016  1408   832  R   0.7    0.0     0:01.33   top\n```\n\n`top` 的输出显示\
  \ `cellsrv` 使用了超过一个完整的 CPU 核心。这在繁忙的系统中很常见，是由于 `cellsrv` 进程的多线程特性所致，这使其能够同时在多个 CPU\
  \ 核心上运行。\n\n\n#### 软件架构\n\n在本节中，我们将简要讨论 Exadata 架构中的关键软件组件以及它们如何连接。有些组件同时运行在数据库层和存储层上。图\
  \ 1-3 描绘了 Exadata 平台的整体架构。\n\n![A978-1-4302-6242-8_1_Fig3_HTML.gif](img/A978-1-4302-6242-8_1_Fig3_HTML.gif)\n\
  \n图 1-3. Exadata 架构图\n\n图的上半部分显示了一台数据库服务器上的关键组件，而下半部分则显示了一台存储服务器上的关键组件。图的上半部分看起来应该相当熟悉，因为它是标准的\
  \ Oracle 数据库架构。它展示了系统全局区（`SGA`），其中包含缓冲区缓存和共享池。它还展示了一些关键进程，例如日志写入器（`LGWR`）和数据库写入器（`DBWR`）。当然，还有更多的进程，也可以提供共享内存的更详细视图，但这应该能让你对数据库服务器上的情况有一个基本的了解。\n\
  \n图的下半部分显示了一台存储服务器上的组件。存储服务器上的架构相当简单。有一个主进程（`cellsrv`）和处理与所有数据库服务器通信的卸载服务器。还有一些用于管理和监控环境的辅助进程。\n\
  \n在架构图中你可能会注意到的一件事是，`cellsrv`使用一个`init.ora`文件并拥有一个告警日志。事实上，存储软件与 Oracle 数据库有着惊人的相似之处。这应该不足为奇。`cellinit.ora`文件包含一组在`cellsrv`启动时被评估的参数。告警日志用于记录值得注意的事件，很像\
  \ Oracle 数据库上的告警日志。另请注意，自动诊断库（`ADR`）作为存储软件的一部分被包含在内，用于捕获和报告诊断信息。\n\n还请注意，有一个独立的进程不附属于任何数据库实例（`DISKMON`），它执行与\
  \ Exadata 存储相关的若干任务。虽然它被称为`DISKMON`，但它实际上是一个网络和单元监控进程，负责检查确认单元是否处于活动状态。`DISKMON`还负责将数据库资源管理器（`DBRM`）计划传播到存储服务器。`DISKMON`每个实例还有一个从属进程，负责在`ASM`与其负责的数据库之间进行通信。\n\
  \n数据库服务器和存储服务器之间的连接由`InfiniBand`结构提供。这两层之间的所有通信都通过此传输机制进行。这包括通过`DBWR`进程和`LGWR`进程进行的写入，以及由用户前台（或影子）进程执行的读取。\n\
  \n图 1-4 提供了架构的另一个系统视图，它侧重于软件栈以及它如何跨越数据库网格和存储网格中的多个服务器。\n\n![A978-1-4302-6242-8_1_Fig4_HTML.gif](img/A978-1-4302-6242-8_1_Fig4_HTML.gif)\n\
  \n图 1-4. Exadata 软件架构\n\n正如我们讨论过的，`ASM`是一个关键组件。请注意，我们将其绘制为一个横跨两层之间所有通信线的对象。这旨在表明`ASM`提供了数据库在存储层上知道的文件与对象之间的映射。然而，`ASM`实际上并不位于存储和数据库之间，它也不是进程每次进行“磁盘访问”都必须触及的栈中的一个层。\n\
  \n图 1-4 还显示了运行在数据库服务器实例上的`DBRM`与在存储服务器上运行的`cellsrv`内部实现的`IORM`之间的关系。\n\n图 1-4 中的最后一个主要组件是`LIBCELL`，这是一个与\
  \ Oracle 内核链接的库。`LIBCELL`包含知道如何通过`iDB`请求数据的代码。这提供了一种非常非侵入性的机制，允许 Oracle 内核通过基于网络的调用与存储层通信，而不是使用操作系统的读写。`iDB`构建在\
  \ OpenFabrics 企业发行版提供的`RDS`协议之上。这是一种低延迟、低 CPU 开销的协议，用于提供进程间通信。你可能还会在 Oracle 的一些营销材料中看到该协议被称为零丢失零拷贝（`ZDP`）`InfiniBand`协议。图\
  \ 1-5 是一个基本的示意图，说明了为什么`RDS`协议比使用传统的基于`TCP`的协议（如`UDP`）更高效。\n\n![A978-1-4302-6242-8_1_Fig5_HTML.gif](img/A978-1-4302-6242-8_1_Fig5_HTML.gif)\n\
  \n图 1-5. RDS 示意图\n\n如图所示，使用`RDS`协议绕过`TCP`处理，消除了通过网络传输数据所需的部分开销。请注意，`RDS`协议也用于`RAC`节点之间的互联流量。\n\
  \n## 总结\n\nExadata 是硬件和软件紧密结合的产物。硬件组件本身并无神奇之处。大部分性能收益来自于组件的集成方式以及在存储层实现的软件。在第 2\
  \ 章中，我们将深入探讨卸载概念，这正是 Exadata 区别于所有其他运行 Oracle 数据库平台的关键所在。\n\n\n## 2. 卸载 / 智能扫描\n\
  \n卸载（Offloading）是 Exadata 平台的关键差异化特性，自从我们接触第一台 Exadata 系统以来，它就令我们兴奋不已。卸载使得 Exadata\
  \ 与 Oracle 运行的其他所有平台都不同。术语“卸载”指的是将处理从数据库层转移到存储层的概念。这也是 Exadata 平台提供的关键范式转变。但它不仅仅是移动工作（就\
  \ CPU 使用而言）。卸载的主要好处是减少了必须返回到数据库服务器的数据量——这是大多数大型数据库的主要瓶颈之一。\n\n术语“卸载”和“智能扫描”（Smart\
  \ Scan）的使用有些互换。我们认为“卸载”是一个更好的描述，因为它指的是传统上由数据库执行的部分 SQL 处理可以“卸载”到存储层。不过，这是一个相当通用的术语，用于指代许多甚至与\
  \ SQL 处理无关的优化，包括改善备份和恢复操作、文件初始化等。\n\n另一方面，“智能扫描”是一个更聚焦的术语，因为它仅指 Exadata 对 SQL 语句的优化。这些优化针对扫描操作——通常是全段扫描。智能扫描的一个更具体的定义是：任何由智能扫描等待事件所覆盖的\
  \ Oracle 内核代码段。重要的是要区分，部分内核代码是在存储单元上执行的。有几个等待事件的名称中包含“智能扫描”术语：`Cell Smart Table\
  \ Scan`、`Cell Smart Index Scan`，以及更近期的 `Cell External Table Smart Scan`。（后者需要 Exadata\
  \ 机架之外的附加技术，这里不作讨论。）你可以在 第 10 章 中详细了解这些等待事件。虽然“智能扫描”这个术语确实带有一些营销色彩，但当它指代这些等待事件所覆盖的代码时，它确实有特定的上下文。无论如何，虽然这两个术语有些互换，但请记住，“卸载”可以指代的不仅仅是加速\
  \ SQL 语句执行。\n\n本章重点介绍智能扫描优化。我们将讨论在智能扫描中可能起作用的各种优化、它们的工作原理，以及它们发生必须满足的要求。我们还将让你先睹为快一些可用于帮助确定给定\
  \ SQL 语句是否发生了智能扫描的技术。对于那些有兴趣深入研究的人，第 10 章、第 11 章 和 第 12 章 提供了更多关于 Exadata 特定等待事件、会话计数器和性能调查的背景知识。其他的卸载优化将仅被简要提及，因为它们在书中的其他地方有介绍。\n\
  \n## 为什么卸载如此重要\n\n我们无法强调卸载概念有多么重要。将数据库处理转移到存储层这一想法——以及实际实现——是一个巨大的飞跃。这个概念已经存在一段时间了。事实上，有传言说\
  \ Oracle 几年前曾向至少一家大型 SAN 制造商提出过这个想法。当时该制造商显然不感兴趣，于是 Oracle 决定自行推进这个想法。Oracle 随后与\
  \ HP 合作构建了最初的 Exadata V1，它就包含了卸载概念。几年后，Oracle 收购了 Sun Microsystems。这次收购使公司能够提供集成的硬件和软件堆栈，并让它完全控制将哪些功能纳入产品中。\n\
  \n卸载之所以重要，是因为大型数据库上的主要瓶颈之一是，在磁盘系统和数据库服务器之间传输满足数据仓库（DWH）类型查询所需的大量数据所需的时间（即由于带宽限制）。这些\
  \ DWH 查询有时被称为决策支持系统（DSS）查询。在本书中你会看到这两个术语——它们本质上是同一个意思。这个瓶颈部分是硬件架构问题，但更大的问题是传统 Oracle\
  \ 数据库移动的数据量巨大。Oracle 数据库在如何处理数据方面非常快速和聪明，但对于访问大量数据的查询，将数据传输到数据库仍然需要很长时间。因此，正如任何优秀的性能分析师所做的那样，Oracle\
  \ 专注于减少在占用了大部分 elapsed time 的事情上花费的时间。在分析过程中，Oracle 团队意识到，每一个需要磁盘访问的查询在需要返回并由数据库服务器处理的数据量方面效率都非常低。Oracle\
  \ 以开发最佳的缓存管理软件而闻名，但对于非常大的数据集，将所有数据都保存在数据库服务器的内存中是不切实际的。尽管现代英特尔服务器可以容纳多 TB 的内存，但数据量的增长早已超过了\
  \ DRAM 容量。这并不意味着技术没有进步。现代处理器——例如在 Exadata x4-8 中发现的 Ivy-Bridge E7-v2 Xeon——每个处理器支持高达\
  \ 6TB DRAM，在双节点集群中总共可达 12TB DRAM。这相当令人印象深刻！\n\n内存列式存储\n\n实际上，Oracle 在发布 12.1.0.2\
  \ 时开始解决近期可用的更大内存容量问题。这是一个相当不寻常的补丁集，因为它包含了很多新功能。其中最受市场推广的功能之一是引入了内存列式存储，这是一个需要额外付费的选项。它允许数据库管理员在\
  \ SGA 中创建一个新区域，名为 in-memory area，用于存储与特定段相关的信息。与纯内存数据库不同，Oracle 的解决方案是混合的，能够在需要时从内存和磁段访问数据。段在内存中的存储方式不同于\
  \ Oracle 以标准块形式在磁盘上持久化信息的方式。为了更好地利用内存，你还可以选择压缩数据。\n\n内存功能非常令人兴奋，但值得专门用一本书来讨论——在本书中我们只是顺带提及。\n\
  \n\n\n"
- "# Exadata 核心概念：卸载与性能优化\n\n想象一下您能想到的最快的查询：从一个表中查询单个行的单个列，并且您确切知道该行存储的位置。在行式存储格式中，访问单个行的最快方式是使用所谓的\
  \ `ROWID`。它作为一个伪列外部化，`ROWID` 指示了数据对象号、数据文件号、数据块以及块中的行号。在传统的 Oracle 数据库中，至少需要将一个数据块（通常为\
  \ 8K）读入内存才能获取那一列。假设您的表平均每个块存储 50 行。从磁盘读取该特定块后，您实际上向数据库服务器传输了 49 行额外的数据，这些数据对于此查询来说纯粹是开销。将其乘以十亿次，您就能开始理解在大型数据仓库中这个问题规模有多大。消除在存储层和数据库层之间传输完全不必要数据所花费的时间，正是\
  \ Exadata 旨在解决的核心问题。\n\n## 卸载：解决方案\n\n为了解决在各层之间移动不相关数据耗时过长的问题，采用了 **卸载** 方法。卸载有三个设计目标，尽管主要目标的重要性远超其他：\n\
  \n*   减少从磁盘系统传输到数据库服务器的数据量\n*   降低数据库服务器上的 CPU 使用率\n*   减少/消除存储层的磁盘访问时间\n\n减少数据量是主要焦点和首要目标。卸载引入的大多数优化都致力于实现这一目标。降低\
  \ CPU 负载也很重要，但它不是 Exadata 提供的主要优势，因此相对于减少数据传输量而言处于次要地位。（然而，正如您将看到的，解压缩是这一普遍规则的一个显著例外，因为它通常在存储服务器上执行。）同时也引入了一些减少磁盘访问时间的优化。虽然某些结果可能相当惊人，但我们并不认为它们是\
  \ Exadata 的核心优化。\n\n## 性能对比示例\n\nExadata 是一个集成的硬件/软件产品，它依赖于这两个组件来提供比非 Exadata 平台显著的性能提升。然而，软件组件带来的性能提升远远超过硬件带来的益处。以下是一个例子：\n\
  \n```\nSQL> alter session set cell_offload_processing=false;\n\nSession altered.\n\
  \nElapsed: 00:00:00.00\n\nSQL> select /*+ gather_plan_statistics monitor statement001\
  \ */\n  2  count(*) from sales where amount_sold = 1;\n\n  COUNT(*)\n----------\n\
  \   3006406\n\nElapsed: 00:00:33.15\n\nSQL> alter session set cell_offload_processing=true;\n\
  \nSession altered.\n\nSQL> select /*+ gather_plan_statistics monitor statement002\
  \ */\n  2  count(*) from sales where amount_sold = 1;\n\n  COUNT(*)\n----------\n\
  \   3006406\n\nElapsed: 00:00:04.68\n```\n\n这个例子展示了一个针对单个分区表扫描的性能。`SALES` 表是使用 Dominic\
  \ Giles 的 `shwizard` 创建的，这是他流行的 Swingbench 基准测试套件的一部分。在这个特定案例中，该表有 294,575,180 行，存储在\
  \ 68 个分区中。\n\n查询首先在禁用卸载的情况下执行，这实际上使用了 Exadata 的所有硬件优势，但没有使用任何软件优势。您会注意到，即使在像这台非常强大的\
  \ X4-2 半机架这样的 Exadata 硬件上，此查询也花了半分多钟。尽管数据被条带化和镜像分布在 7 个单元（即 7 * 12 个磁盘）上，同样地，`智能闪存缓存`也拥有\
  \ 7 * 3.2TB 的原始容量。\n\n在随后执行上述脚本时，越来越多的数据被透明地缓存在`智能闪存缓存`中，将读取性能提升到了我们在早期 Exadata\
  \ 软件版本中未曾梦想过的水平。在 33 秒的表扫描期间，几乎所有数据都来自闪存缓存：\n\n```\nSTAT    cell flash cache read\
  \ hits           31,769\nSTAT    physical read IO requests            31,776\nSTAT\
  \    physical read bytes          15,669,272,576\n```\n\n> **注意**\n> 您可以在第 11 章中阅读有关会话统计信息和用于显示它们的\
  \ `mystats` 脚本的更多信息。\n\n在本书第一版中，我们使用了一个类似的示例查询来演示启用和关闭卸载之间的差异，而且当时的差异更大——部分原因是当时的`智能扫描`默认情况下并未从`智能闪存缓存`中受益。闪存缓存中大型\
  \ I/O 请求的自动缓存将在第 5 章中详细介绍。\n\n重新启用卸载后，查询完成的时间大大减少。显然，两次执行中使用的硬件是相同的。关键在于，正是软件通过卸载实现的能力带来了这种差异。\n\
  \n## 通用版本的 Exadata？\n\n构建通用版本 Exadata 的话题经常被提及。其想法是构建一个在某种程度上模拟 Exadata 的硬件平台，其成本大概比\
  \ Oracle 对 Exadata 的收费要低。当然，这些提议的重点是复制 Exadata 的硬件部分，因为软件组件无法被复制。尽管如此，构建自己的 Exadata\
  \ 听起来很有吸引力，因为单个硬件组件的购买价格可能低于 Oracle 的套件价格。然而，有几点需要考虑。在深入更多细节之前，应该先指出两种通用工作负载类型：`OLTP`（代表在线事务处理）和\
  \ `DSS`（代表决策支持系统）。Exadata 在推出时是为后者设计的，但重要的增强使其现在能够与纯 `OLTP` 平台竞争。更重要的是，Exadata 可以用于混合工作负载环境，而这正是大多数其他平台会遇到困难的领域。在考虑“自己动手”构建系统时，让我们关注几个值得注意的点：\n\
  \n\n## Exadata 硬件与软件优势分析\n\n最受关注的硬件组件是 `Flash Cache`（闪存缓存）。你可以购买具有大容量缓存的 `SAN` 或\
  \ `NAS`。标准配置下的中型 `Exadata` 套装（`半机架`）在各存储服务器上提供约 `44.8` TB 的 `Flash Cache`。这是一个相当庞大的数字，但缓存的内容与缓存本身的大小同等重要。`Exadata`\
  \ 足够智能，不会缓存那些不太可能从缓存中受益的数据。例如，缓存数据块的镜像副本并无帮助，因为 Oracle 通常只读取主副本（除非检测到损坏）。Oracle\
  \ 在编写软件管理缓存方面有着悠久的历史。因此，当进行大表扫描时，它能够出色地处理，避免将所有数据刷新出去，从而使频繁访问的数据块倾向于保留在缓存中，这不足为奇。这种具备数据库感知能力的缓存所带来的结果是，一个普通的\
  \ `SAN` 或 `NAS` 需要大得多的缓存才能与 `Exadata` 的 `Flash Cache` 竞争。同时请记住，在非 `Exadata` 存储上，你需要存储的数据量将会大得多，因为你无法使用\
  \ `混合列式压缩 (HCC)`。\n\n硬件更重要的方面——奇怪的是，在 DIY 方案中偶尔被忽视——是存储层与数据库层之间的吞吐量。`Exadata` 硬件堆栈在存储服务器和数据库服务器之间提供了比大多数当前实现更平衡的通道，因此第二个关注点通常是各层之间的带宽。增加存储与数据库服务器之间的有效吞吐量并不像听起来那么简单。`Exadata`\
  \ 通过 `InfiniBand` 和 `可靠数据报套接字 (RDS)` 协议提供增加的吞吐量。Oracle 开发了 `iDB` 协议以在 `InfiniBand`\
  \ 网络上运行。`iDB` 协议对于运行在非 `Exadata` 硬件上的数据库是不可用的。因此，需要一些其他方法来增加各层之间的带宽。对于大多数用户来说，这意味着在撰写本文时，要么选择通过\
  \ `10Gbit 以太网` 走 `以太网` 路线（`iSCSI`、`NFS`）。无处不在的 `光纤通道` 也提供了 `16Gbit/s` 范围内的替代方案。无论如何，你都需要在服务器中安装多个接口卡（这些卡需要通过快速总线连接）。存储设备（或多个设备）也必须能够提供足够的输出以匹配通道和消耗能力。（这就是\
  \ Oracle 谈及平衡配置时所指的含义，通过标准机架设置你可以获得这一点，与之相对的是 `X5-2 弹性配置`）。你还需要决定使用哪些硬件组件，并测试整个解决方案，以确保你选择的所有不同部分都能良好协作，在从磁盘到数据库服务器的路径上不会出现任何重大瓶颈或驱动程序问题。对于\
  \ `InfiniBand` 的使用尤其如此，它已变得更加普遍。`SCSI RDMA` 是一种非常有吸引力的协议，可以有效地连接存储，但从存储系统到 `HCA`\
  \ 再到内核中 `OFED` 驱动程序的认证可能会使整个工作变得相当费力。\n\nDIY 方案通常会涉及的第三个组件是数据库服务器本身。`Exadata` 硬件规格是公开可用的，因此购买完全相同的\
  \ `Sun` 型号是件简单的事。不幸的是，你可能需要规划更强的 CPU 处理能力，因为你无法将任何处理卸载到 `Exadata` 存储服务器的 CPU 上。这反过来又会增加\
  \ Oracle 数据库许可证的数量。你可能还需要在内存上投入更多，因为你无法依赖 `智能扫描` 来减少从你选择的存储解决方案传输的数据量。另一方面，当涉及在你的平台上整合许多数据库时，你可能发现早期\
  \ `dash two` 系统中的 CPU 核心数量有限。然而，始终有一个选择是使用 `dash eight` 服务器，它提供了 `x86-64` 架构下一些最密集封装的系统。Oracle\
  \ 每一代都增加了核心数量，与 Intel 提供的双路系统进步相匹配。当前一代的 `X5-2` `Exadata` 系统提供双路系统，具有 `36` 核心/ `72`\
  \ 线程。\n\n最后但同样重要的是，需要再次强调 `HCC` 的优势。正如你可以在第 3 章中读到的那样，`HCC` 非常值得考虑——不仅从减少存储的角度，还因为它有可能在无需在数据库会话中解压缩的情况下扫描数据，从而再次释放\
  \ CPU 周期（见第 3 点）。得益于 `HCC` 段中采用的列式格式，它也能非常高效地执行分析查询。\n\n假设有人能在各个方面匹配 `Exadata` 的硬件性能，仍然无法接近\
  \ `Exadata` 提供的性能。这是因为 `Exadata` 性能优势的主要部分是由（`cell`）软件提供的。`Exadata` 软件的优势很容易通过在\
  \ `Exadata` 上禁用卸载功能并进行对比测试来证明。这个演示让我们可以看到没有软件增强情况下的硬件性能。`Exadata` 软件所做的很大一部分工作是彻底消除完全不必要的工作，例如将最终会被丢弃的列和行传输回数据库服务器。\n\
  \n正如俗话所说：\n\n```\n“做任何事情最快的方法就是根本不去做它！”\n```\n\n\n## 卸载（Offloading）包含的内容\n\n有许多优化都可以归类在**卸载**（offloading）的大旗下。本章将重点介绍通过**智能扫描**（Smart\
  \ Scans）实现的 SQL 语句优化。主要的智能扫描优化包括列投影（column projection）、谓词过滤（predicate filtering）和存储索引（storage\
  \ indexes）（当然还有更多！）。大多数智能扫描优化的主要目标是减少在扫描执行期间需要传回数据库服务器的数据量。然而，有些优化也试图卸载 CPU 密集型操作——例如解压缩。本章不会讨论与\
  \ SQL 语句处理无关的优化，例如智能文件创建（Smart File Creation）和与 RMAN 相关的优化。这些主题将在本书的其他地方详细介绍。为了让你更好地了解即将介绍的内容，图\
  \ 2-1 展示了对某个段（segment）进行智能扫描时可以看到的累计特性。\n\n![A978-1-4302-6242-8_2_Fig1_HTML.gif](img/A978-1-4302-6242-8_2_Fig1_HTML.gif)\n\
  \n图 2-1. 潜在的智能扫描优化\n\n这些特性并非必然适用于每一个查询，也不一定按那个顺序应用。因此，“返回数据量”是一个动态目标。正如你可以在第 10\
  \ 章中读到的，智能扫描的仪表化（instrumentation）并不完美，有些细节有待完善。接下来的几节将讨论图 2-1 中发现的各种优化。\n\n一个图 2-1\
  \ 中未列出的、非常重要变化发生在 Exadata 11.2.3.3.0 版本。这个变化被称为“针对表扫描工作负载的自动闪存缓存”（Automatic Flash\
  \ Caching for Table Scan Workloads），对查询性能有显著影响。以前，除非通过将段的存储子句中的`cell_flash_cache`属性设置为`KEEP`来特别标记该段以使用它，否则智能扫描不会利用\
  \ Exadata 智能闪存缓存（Exadata Smart Flash Cache）。这主要有两个目的：首先，在早期的 Exadata 型号中，闪存缓存的容量并不充裕；其次，可用空间更好地用于以小的、单块\
  \ I/O 为主的 OLTP 型工作负载。在更新的 Exadata 型号中，有更多的闪存缓存可用；每一代新产品的容量都会翻倍。目前，X5-2 高容量存储服务器具有\
  \ 4 个通过 NVMe 连接到 PCIe 总线的 1.6TB F160 闪存卡。X5-2 高性能存储服务器是第一个只配备 PCIe 闪存卡而没有旋转磁盘的型号。\n\
  \n在以下章节中，我们偶尔使用性能信息来证明某个观点。请不要因此感到困惑。第 10 章到第 12 章将比我们在这里能提供的更详细地解释这些内容。在讨论卸载时，作者有时会面临棘手的“鸡生蛋还是蛋生鸡”问题。另一方面，也不可能写一个\
  \ 100 页的章节来包含所有可能相关的内容。请随意在本章和刚才提到的性能章节之间翻阅，或者简单地将性能计数器视为额外的、希望有用的见解。\n\n> **注意**\n\
  >\n> 作者在本节中会大量使用下划线参数（underscore parameters）来启用/禁用 Exadata 系统的某些方面。这些参数仅用于教育和学术目的列出，以及演示特定优化的效果。请勿在没有\
  \ Oracle 支持明确许可的情况下在 Oracle 系统中设置任何下划线参数。\n\n### 列投影（Column Projection）\n\n术语“列投影”指的是\
  \ Exadata 通过仅返回感兴趣的列（即那些在选择列表中或对数据库层上的连接操作必需的列）来限制在存储层和数据库层之间传输的数据量的能力。如果你的查询从一个\
  \ 100 列的表中请求 5 列，Exadata 可以消除非 Exadata 存储将返回给数据库服务器的大部分数据。这个特性比你想象的要重要得多，并且它对响应时间可能有非常显著的影响。下面是一个示例：\n\
  \n```sql\nSQL> alter session set \"_serial_direct_read\" = always;\nSession altered.\n\
  Elapsed: 00:00:00.00\n\nSQL> alter session set cell_offload_processing = false;\n\
  Session altered.\nElapsed: 00:00:00.00\n\nSQL> select count(distinct seller) from\
  \ sales;\nCOUNT(DISTINCTSELLER)\n---------------------\n1000\nElapsed: 00:00:53.55\n\
  \nSQL> alter session set cell_offload_processing = true;\nSession altered.\nElapsed:\
  \ 00:00:00.01\n\nSQL> select count(distinct seller) from sales;\nCOUNT(DISTINCTSELLER)\n\
  ---------------------\n1000\nElapsed: 00:00:28.84\n```\n\n这个例子值得讨论一下。为了强制直接路径读（direct\
  \ path reads）——这是智能扫描的先决条件——会话参数`_SERIAL_DIRECT_READ`被设置为`ALWAYS`（稍后会详细介绍）。接下来，通过将`CELL_OFFLOAD_PROCESSING`设置为`FALSE`来明确禁用智能扫描。你可以看到测试查询没有`WHERE`子句。这也是故意为之。这意味着谓词过滤和存储索引不能被用来减少必须从存储层传输的数据量，因为这两种优化只有在有`WHERE`子句时才能进行。这样，列投影就成了唯一生效的优化。列投影单独就能将查询的响应时间减半，这让你感到惊讶吗？我们第一次看到时也很惊讶，但仔细想想就有道理了。而且，在这种特定情况下，该表只有\
  \ 12 列！\n\n```sql\nSQL> @desc sh.sales\nName                      Null?        Type\n\
  -------------------------  -----------  ------------\n1      PROD_ID           \
  \  NOT NULL     NUMBER\n2      CUST_ID             NOT NULL     NUMBER\n3      TIME_ID\
  \             NOT NULL     DATE\n4      CHANNEL_ID          NOT NULL     NUMBER\n\
  5      PROMO_ID            NOT NULL     NUMBER\n6      QUANTITY_SOLD       NOT NULL\
  \     NUMBER(10,2)\n7      SELLER              NOT NULL     NUMBER(6)\n8      FULFILLMENT_CENTER\
  \  NOT NULL     NUMBER(6)\n9      COURIER_ORG         NOT NULL     NUMBER(6)\n10\
  \     TAX_COUNTRY         NOT NULL     VARCHAR2(3)\n11     TAX_REGION          \
  \             VARCHAR2(3)\n12     AMOUNT_SOLD         NOT NULL     NUMBER(10,2)\n\
  ```\n\n你应该意识到，选择列表中的列并不是唯一必须返回到数据库服务器的列。这是一个非常普遍的误解。`WHERE`子句中的连接列也必须返回。事实上，在早期的\
  \ Exadata 版本中，列投影功能并不像它本可以做到的那样有效，实际上会返回`WHERE`子句中包含的所有列，这在许多情况下包括了一些不必要的列。\n\n\
  `DBMS_XPLAN`包可以显示关于列投影的信息，尽管默认情况下不会显示。投影数据也存储在`V$SQL_PLAN`视图的`PROJECTION`列中。下面是一个示例：\n\
  \n```sql\nSQL> select /*+ gather_plan_statistics */\n  2   count(s.prod_id), avg(amount_sold)\n\
  \  3  from sales_nonpart s, products p\n  4  where p.prod_id = s.prod_id\n  5  and\
  \ s.time_id = DATE '2013-12-01'\n  6  and s.tax_country = 'DE';\n\nCOUNT(S.PROD_ID)\
  \ AVG(AMOUNT_SOLD)\n---------------- ----------------\n            124       51.5241935\n\
  Elapsed: 00:00:00.09\n```\n\n\n\n"
