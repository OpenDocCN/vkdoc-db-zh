  \                                where col1 > 0\n\n已选择 1 行。\n```\n\n# 内存中并行查询分析与验证\n\
  \n`DBMS_XPLAN.DISPLAY_CURSOR` 显示该语句已并行执行，这可以从以“PX.”开头的行源中看出。这里最有趣的是 `DISPLAY_CURSOR`\
  \ 输出的 **注意** 部分：其中“针对缓冲区缓存的并行扫描”这一行明确表明扫描使用了缓冲区缓存，这意味着使用了内存中并行查询（In-Memory Parallel\
  \ Query）。\n\n## 获取间接证据\n\n内存中并行查询的间接证据可以通过 `fsx2.sql` 脚本找到。当我们输入查询的 `SQL_ID` 后，可以看到该语句由八个并行查询服务器（`PX`\
  \ 列）执行，并且没有使用智能扫描（`OFFLOAD` 列），而这在常规（非内存中 PX）的并行查询扫描执行中是必然发生的。另请注意，`fsx2.sql` 脚本报告了\
  \ `AVG_ETIME` 的估计值，该值远大于执行实际花费的时间。这是因为 `v$sql` 将耗时报告为所有从属进程耗时的总和。将此数字除以从属进程数可以得到一个估计值，但由于从属进程的耗时可能差异很大，该估计值不会完全准确。\n\
  \n## 禁用内存中并行执行\n\n现在让我们将内存中并行执行与系统在不使用该功能时的行为进行比较。我们可以通过几种方式禁用此功能。文档记载的方法是将 `PARALLEL_DEGREE_POLICY`\
  \ 参数设置为 `MANUAL`。然而，这也会禁用自动并行度（Auto DOP）和并行语句排队（Parallel Statement Queueing）。另一种方法是将隐藏参数\
  \ `_PARALLEL_CLUSTER_CACHE_POLICY` 设置为 `ADAPTIVE`：\n\n```sql\nSYS@dbm2> alter system\
  \ set \"_parallel_cluster_cache_policy\"=adaptive;\n\nSystem altered.\n```\n\n##\
  \ 性能统计对比\n\n### 禁用前（使用内存中并行查询）\n\n```sql\nSYS@dbm2> @mystats\nEnter value for name:\
