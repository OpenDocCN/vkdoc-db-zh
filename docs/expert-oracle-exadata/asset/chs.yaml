  \ select segment_name,partition_name,round(bytes/power(1024,3),2) gb\n2   from user_segments\n\
  3  where segment_name = 'CHAINS';\n\nSEGMENT_NAME                   PARTITION_NAME\
  \                             GB\n------------------------------ ------------------------------\
  \ ----------\nCHAINS                                                     12.75\n\
  \nSQL> alter system flush buffer_cache;\nSystem altered.\n\nSQL> select /*+ gather_plan_statistics\
  \ monitor */ avg(length(col2)) from chains;\nAVG(LENGTH(C))\n--------------\n3990\n\
  1 row selected.\n```\n\n为了调查执行时间花费在哪里，可以使用以下命令：\n\n```\nSQL> select * from table(dbms_xplan.display_cursor);\n\
  \nPLAN_TABLE_OUTPUT\n---------------------------------------------------------------------------------------------\n\
  SQL_ID  6xpsmzknmkutw, child number 0\n-------------------------------------\nselect\
  \ /*+ gather_plan_statistics monitor */ avg(length(col2)) from chains\nPlan hash\
  \ value: 1270987893\n-------------------------------------------------------------------------------------\n\
  | Id  | Operation                  | Name   | Rows  | Bytes | Cost (%CPU)| Time\
  \     |\n-------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT           |        |       |       |   450K(100)|     \
