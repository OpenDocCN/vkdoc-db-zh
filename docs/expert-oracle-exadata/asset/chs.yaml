- '# 引言


  非常感谢您购买《Expert Oracle Exadata》第二版。我们几位作者在编写本书时，始终站在巨人的肩膀上。每当为一本成功的书籍编写第二版时，作者都面临着压力，即需要创作出至少与第一版同样好、甚至更好的版本。而第一版确实非常出色。我们希望，亲爱的读者，我们已为您提供了关于
  Exadata 的合适介绍。事实上，我们的希望是给您足够的信息来开始使用 Exadata。我们常常发现数据库管理员在接触 Exadata 后，会问这样一个问题：“现在该怎么办？”我们尝试构建本书的结构来帮助您回答这个问题。在深入探讨使
  Exadata 在 Oracle 数据库处理硬件领域如此独特的各种优化之前，您会先了解 Exadata 是什么。尽管部分内容，特别是较早的章节，描绘了一幅宏观图景，但我们逐渐深入了许多细节。拥有一台
  Exadata 开发系统对您理解更高级的材料大有裨益。我们已竭尽全力让您能够跟上进度，但请记住，Exadata 平台绝非一成不变；硬件和软件的新版本可能会改变已记录的命令和
  SQL 语句的执行结果。我们将在网站 [`http://www.expertoracleexadata.com/`](http://www.expertoracleexadata.com/)
  以及我们附录 B 中列出的个人博客上尝试说明主要的差异。


  请注意，我们使用了各种未记录的下划线参数和功能来演示软件各个部分的工作原理。请不要将此视为管理系统生产环境的推荐方法！事实上，通常没有理由偏离默认设置。仅当获得
  Oracle Support 的明确许可，并且是您提出的服务请求建议的一部分时，才允许设置下划线参数。请记住，我们曾有机会接触许多系统，可以放心地拆解分析，而无需过多担心操作后果。这为我们研究
  Exadata 在不同硬件代际中的工作方式提供了巨大优势。


  ## 目标读者


  本书假定您已经熟悉 Oracle。除了与 Exadata 平台相关的部分，我们不会深入详细解释 Oracle 的工作原理。这意味着我们对读者的知识做了一些假设。例如，我们不假设您是
  Oracle 性能调优专家，但我们期望您能熟练编写 SQL 语句，并对 Oracle 架构有良好的理解。由于 Exadata 是一个硬件和软件平台，在一些与硬件更密切相关的章节中，您不可避免地会看到对
  Linux 管理的引用。请不要感到畏惧——作为 Exadata 管理员，在日常平台管理中，您只需要掌握少数几个命令。




  ## 一个不断变化的目标


  我们在本书第一版的引言中就有完全相同的这一节，其传达的信息至今依然如故。时至今日，仍让我们惊叹不已的是 Exadata 平台的发展速度。不仅硬件在不断演进，紧跟新技术的发展，软件也在持续突破可能的极限。新的软件版本发布并不要求您升级硬件。除了最早的
  Exadata 系统外，当前的 Exadata 软件版本与每一代硬件都兼容。


  前一段提到的变化包括大量新增功能，这些功能在附录 A 的《Exadata 数据库一体机系统概览》中清晰可见。正如您能想到的，试图跟上 Oracle 快速发布的步伐是本项目最困难的部分。每当新的硬件和软件发布时，每一章都不得不经历多次修订。我们在本书中试图涵盖的最新版本是
  Oracle 12.1.0.2.2 RDBMS 配合 12.1.2.1.x 版本的 cell 软件。与本书第一版出版时 Oracle 11.2.0.2 是当前版本不同，现在
  Exadata 在技术上支持的版本已经相当多了。从 Oracle 支持的角度来看，目前您可能应该正处于向 Oracle 12c 迁移的阶段。这是我们即使在许多用户尚未迁移到该版本的情况下，仍在书中为最新
  RDBMS 版本留出大量篇幅的原因之一。撰写本书时的另一个考虑是，我们必须非常谨慎地引用新功能被引入时的正确版本。如果您刚开始接触 Exadata，可能会对这些版本号感到困惑；然而，一旦您有了最初几周的
  Exadata 管理经验，您就会发现引用 Exadata cell 软件版本会变得自然而然。


  Exadata 的演进方式无疑会使本书的某些内容变得过时，因此，如果您观察到本书涵盖的内容与您所见存在差异，很可能是由于版本不同所致。尽管如此，我们欢迎您的反馈，并将处理您发现的任何不一致之处。


  ## 向所有提供帮助的人致以万分感谢！


  在这个项目中，我们得到了许多人的大力支持。让我们官方的技术评审员亲自撰写其中几章，这几乎像是历史重演。作者和评审员互换了角色，以回应那个古老的问题：“**Quis
  custodiet ipsos custodes?**（谁来监督监督者呢？）”我们同样非常感激 Oracle 的每一个人，他们可能从本书的第一版就认识我们，并帮助我们克服了途中的种种障碍。最后，我们要向
  `@Enkitec` 的所有人说一声大大的“谢谢”，是你们帮助维持机器正常运行，在新版本发布时打补丁，并在出现问题时进行故障排除。需要感谢的人名单真的很长，我们无法一一提及每个人的姓名。然而，可以公平地说，如果在本书撰写期间您曾在
  `@Enkitec` 工作，那么您几乎肯定做出了贡献——谢谢您。


  第一本书帮助激发了大家对第二版的兴趣，我们还在个人博客和网站上发表了一些过于详尽的研究，导致一旦文章上线，电子邮件、推特和评论就开始向我们飞来。我们收到的 Alpha
  计划反馈也是如此；没有社区的反馈，这本书可能不会如此完整，我们要明确感谢您的评论。


  最后但同样重要的是，我们要向本书第一版的作者们致以非常特别的“感谢”，他们允许我们更新他们的著作。Kerry、Tanel 和 Randy 在理解各章的预期信息以及章节布局和测试方面发挥了关键作用。没有你们，我们不可能在完成章节的同时，保持第一本书的精髓。


  ## 各章节作者


  遵循第一版设立的传统，我们想列出我们每个人负责撰写的章节。第二版的作者（按字母顺序排列）是 Karl Arao、Martin Bach、Andy Colvin
  和 Frits Hoogland。这确实是我们所有参与者的团队协作成果，我们甚至无法计算我们之间为交换想法和确保章节内容不重叠而进行的有用对话和即时消息交流所花费的时间。


