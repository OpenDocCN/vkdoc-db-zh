  \n### 参数\n\n以下是此事件的参数。请注意，`obj#` 参数存在但未被使用：\n\n*   `P1` - 位置\n*   `P2` - 消费者组 ID\n\
  *   `P3` - 未使用\n*   `obj#` - 不适用\n\n位置参数是一个数值，很可能指向上文`resmgr:become active`事件中描述的\
  \ Oracle 代码中的位置（函数）。\n\n`P2` 参数中的消费者组编号是不言自明的。它映射到`DBA_RSRC_CONSUMER_GROUPS`视图中的`CONSUMER_GROUP_ID`列。此参数允许您查明进程在\
  \ CPU 使用受到限制时被分配到了哪个消费者组。\n\n### resmgr:pq queued\n\n此事件用于记录在并行查询队列中等待的时间。并行语句排队是\
  \ 11g Release 2 引入的一项新功能。通过将`parallel_degree_policy`设置为 Automatic 启用的新功能之一是语句排队。在\
  \ Oracle 12c 中，您也可以将其值设置为`ADAPTIVE`以达到相同的目的。语句排队允许您在所需并行度无法满足时，为可用的并行服务器从进程排队，而不是像旧的并行自动调整选项那样被降级。有关\
  \ Exadata 上并行执行的更多信息，请参阅第 6 章。\n\n### 事件含义\n\n并行语句排队功能有其自己的等待事件。由于并行服务器进程不足或其他指令而排队的语句会将时间记录到此事件。以下是显示`resmgr:pq\
  \ queued`事件的 10046 跟踪文件摘录：\n\n```\nPARSING IN CURSOR #140583609334256 len=68 dep=0\
  \ uid=205 oct=3 lid=205 tim=4755825333777\n  hv=2381215807 ad='220a20bc0' sqlid='944dxty6ywy1z'\n\
  select /*+ PARALLEL(32) STATEMENT_QUEUING */ count(*) from martin.t3\nEND OF STMT\n\
  PARSE #140583609334256:c=0,e=188,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=3978228158,\n\
  \  tim=4755825333776\nWAIT #140583609334256: nam='resmgr:pq queued' ela= 25193140\
  \ location=1  =0  =0 obj#=-1\n  tim=4755850527127\nWAIT #140583609334256: nam='reliable\
  \ message' ela= 889 channel context=10126085744 channel\n  handle=10164818472 broadcast\
  \ message=10179043672 obj#=-1 tim=4755850529508\nWAIT #140583609334256: nam='enq:\
  \ KO - fast object checkpoint' ela= 197 name|mode=1263468550\n  2=65690 0=1 obj#=-1\
  \ tim=4755850529777\nWAIT #140583609334256: nam='enq: KO - fast object checkpoint'\
  \ ela= 124 name|mode=1263468545\n  2=65690 0=2 obj#=-1 tim=4755850529959\nWAIT #140583609334256:\
  \ nam='PX Deq: Join ACK' ela= 39 sleeptime/senderid=268500992 passes=1\n  p3=9216157728\
  \ obj#=-1 tim=4755850531333\nWAIT #140583609334256: nam='PX Deq: Join ACK' ela=\
  \ 42 sleeptime/senderid=268500993 passes=1\n  p3=9216246432 obj#=-1 tim=4755850531420\n\
  WAIT #140583609334256: nam='PX Deq: Join ACK' ela= 39 sleeptime/senderid=268500994\
  \ passes=1\n  p3=9216266144 obj#=-1 tim=4755850531507\n```\n\n在测试此用例时，发现该事件仅在开始时写入跟踪文件一次。此外，关于排队语句的跟踪信息直到会话实际开始工作才会发出。\n\
  \n### 参数\n\n以下是`resmgr:pq queued`事件的参数：\n\n*   `P1` - 位置\n*   `P2` - 未使用\n*   `P3`\
  \ - 未使用\n*   `obj#` - 不适用\n\n位置参数是一个数值，很可能指向上文`resmgr:become active`事件中描述的 Oracle\
  \ 代码中的位置（函数）。\n\n## 总结\n\n等待接口已扩展到涵盖多个 Exadata 特定功能。在本章中，您了解了应该知道的新等待事件。迄今为止，最有趣的新事件是`cell\
  \ smart table scan`和`cell smart index scan`。这些事件涵盖了等待到存储单元的可卸载读 I/O 请求所花费的时间。在存储层发生的许多处理被归并在这些事件下。重要的是要理解，这些事件取代了`direct\
  \ path read`事件，并且 Smart Scan 事件将数据直接返回到进程 PGA 的机制类似于`direct path read`的处理方式。\n\n\
  \n"
- "# 第 11 章 Exadata 性能指标\n\nOracle Exadata 相较于传统的数据库服务器架构是一次巨大的飞跃；然而，尽管拥有诸多创新特性，它运行的仍然是标准的\
  \ Oracle 数据库软件。大多数经验丰富的数据库性能规则仍然适用，同时增加了一些能够体现 Exadata 功能优势的规则，例如智能扫描、存储节点连接过滤和闪存缓存。在本章中，您将了解到更多关于\
  \ Exadata 特有的及相关的性能主题、指标以及一些相关的内部原理。\n\n幸运的是，Oracle 无论在数据库层还是存储节点层都提供了大量的性能指标供我们使用。然而，在考察任何指标时，您都应该清楚为什么要监控它，以及要寻找什么样的数值。换句话说，如何知道一切正常无需采取行动，又如何知道情况糟糕需要采取行动？为了避免浪费精力解决错误的问题，衡量真正重要的事情至关重要。对于数据库性能而言，没有什么比响应时间更重要，即最终用户（或连接的系统）等待响应所花费的实际时间。因此，如果您想在数据库中让某些操作变得更快，就应该专注于衡量并优化响应时间。所有其他指标和指示器，如\
  \ I/O 请求数或缓存命中率，都是次要的。就像等待报表生成的最终用户，他们只关心需要等待的时间，而不是像 CPU 利用率或 I/O 速率这类次要指标。尽管如此，这些次要指标通常对于理解和解释性能问题非常有用。\n\
  \n分解数据库响应时间的关键指标是 Oracle 等待接口的事件。一些关键的等待事件在 第 10 章 中讨论，而利用这些事件的性能监控工具将在第 12 章 中介绍。然而，Exadata\
  \ 还提供了其他有用的指标，例如智能扫描返回的数据字节数、以及由于存储索引而实际避免的 I/O 量等等。这些指标提供了关于 SQL 执行期间数据库和存储节点内部发生情况的非常重要的附加信息。在本章中，您将读到更多关于这些指标的内容，并学习如何访问和显示它们，最重要的是，理解它们的含义。即使您对每个指标的含义不感兴趣，我们仍然建议您阅读本章，因为它解释了数据库代码和存储服务器中\
  \ Exadata 特有部分的一些重要内部原理和设计决策。\n\n本章的信息将帮助您很好地理解 Exadata 数据库和存储服务器的一些关键内部工作机制，并为您学习第\
  \ 12 章 打下基础，在那一章中，这些知识将在监控和排除 Exadata 性能故障时派上用场。\n\n## 衡量 Exadata 的性能指标\n\n在深入研究\
  \ Exadata 特有的性能指标之前，让我们先审视一些内部原理，并回顾 Exadata 特有功能和指标的一些重要元素。在尝试使用这些信息进行监控或优化之前，必须理解这些性能数字实际代表什么。\n\
  \n至此，您已经知道 Exadata 数据库节点本身并不执行物理磁盘 I/O，而是通过 ASM 层请求存储节点代为执行这些请求。在智能扫描的情况下，存储节点还会处理读取的数据块：提取其内容、过滤行等。因此，从数据库的角度来看，存储节点就像一个黑盒。数据库层请求数据块或数据块范围，而存储节点对数据库层透明地执行物理\
  \ I/O 工作，并返回匹配行的所需列。值得庆幸的是，Oracle Exadata 的架构师、工程师和开发人员在 `cellsrv` 及相关组件中加入了数量惊人的仪表化功能。存储节点会跟踪它们完成了多少工作，并且还可以将指标与结果一起发送回数据库层。这使我们——DBA、开发人员和故障排查人员——能够全面了解在服务用户请求或运行查询时，数据库和存储节点中发生的情况。作为\
  \ DBA，如果您尝试从现有的存储基础设施中获取如此详细的性能信息，您会很快更加欣赏 Exadata。\n\n例如，当通过智能扫描执行查询时，如果您在数据库层查询\
  \ `V$SQLSTATS`，您仍然会看到熟悉的统计信息，如 `physical_reads`，尽管数据库层本身并没有直接执行任何物理读取。另一个例子是“存储索引节省的物理\
  \ I/O 字节数”统计信息，它是在存储节点层而非数据库层计数的。这些数字之所以能在数据库层可见，得益于存储节点在返回查询数据之外，还发送了有用的性能指标。有些指标目前同时在存储节点和数据库级别报告数据，您可能会看到一些重复计数的情况。\n\
  \n除了标准的 Oracle 性能工具外，本章还将介绍两个在本章和第 12 章 中讨论的定制工具。它们更适合灵活和高级的性能分析，允许您超越标准的等待事件和 SQL\
  \ 语句级别的统计信息。第一个工具是 Oracle Session Snapper，它是一个仅包含匿名 PL/SQL 块的脚本，可以从 `V$SESSION`、`V$SESSION_EVENT`、`V$SESS_TIME_MODEL`、`V$SESSTAT`\
  \ 等视图中测量详细的性能指标。列表中的最后一个性能视图 `V$SESSTAT` 对于高级性能分析尤为重要——它包含了实例中每个会话的数百个动态性能计数器（在\
  \ 11.2.0.2 版本中有超过 600 个，在 Oracle 12.1.0.2 中有 1178 个）。除了使用等待事件进行常规监控外，深入分析 `V$SESSTAT`\
  \ 可以让我们更好地了解 Oracle 会话正在进行何种工作，例如它们每秒执行多少 I/O 请求、每秒进行多少次全段扫描、在扫描过程中必须获取多少已迁移/链接的行等等。\n\
  \n### 会话计数器的简要历史\n\nOracle 性能计数器作为数据库引擎的一部分已经存在很长时间了。Oracle 为每个会话维护的计数器数量允许对正在发生的事情进行非常细粒度的分析。如果您计算起始快照和结束快照之间的差值，通常可以很好地概览数据库活动。\n\
  \n## Oracle 会话性能计数器的演变\n\nOracle 持续地通过每个补丁为引擎增加仪表化功能，这非常出色。你可以通过查询 `v$statname`\
  \ 来观察不断增加的数量。这个视图包含一个名为 `class` 的列，该列在 Oracle 参考文档中有记载。\n\n为了展示数据库仪表化不断演进的例子，我们使用以下查询检查了一些主流版本：\n\
  \n```sql\nwith stats as (\nselect name, decode(class,\n1, 'USER',\n2, 'REDO',\n\
  4, 'ENQUEUE',\n8, 'CACHE',\n16, 'OS',\n32, 'RAC',\n64, 'SQL',\n128, 'DEBUG',\n'MULTI-CATEGORY'\n\
  ) as decoded_class from v$statname\n)\nselect count(decoded_class), decoded_class\n\
  from stats\ngroup by rollup(decoded_class)\norder by 1\n```\n\n结果很有启发性。在 11.2.0.3\
  \ 版本中，发现了如下分布：\n\n```\nCOUNT(DECODED_CLASS) DECODED\n-------------------- -------\n\
  9 ENQUEUE\n16 OS\n25 RAC\n32 REDO\n47 MULTI-CATEGORY\n93 SQL\n107 USER\n121 CACHE\n\
  188 DEBUG\n638\n```\n\nOracle 11.2.0.4（在 12.1.0.1 之后发布）显示如下：\n\n```\nCOUNT(DECODED_CLASS)\
  \ DECODED\n-------------------- -------\n9 ENQUEUE\n16 OS\n25 RAC\n34 REDO\n48 MULTI-CATEGORY\n\
  96 SQL\n117 USER\n127 CACHE\n207 DEBUG\n679\n```\n\n如你所见，增加了相当多的计数器，但与 12.1.0.2\
  \ 相比就不算什么了：\n\n```\nCOUNT(DECODED_CLASS) DECODED\n-------------------- -------\n\
  9 ENQUEUE\n16 OS\n35 RAC\n68 REDO\n74 MULTI-CATEGORY\n130 SQL\n130 USER\n151 CACHE\n\
  565 DEBUG\n1178\n```\n\n几乎是 11.2.0.3 的两倍！公平地说，其中大量计数器与内存中选项相关，但尽管如此，仪表化能力的增强仍然是一个受欢迎的补充。\n\
  \n## 重新审视 Exadata 智能扫描的前提条件\n\n在本节中，您将被温和地介绍 Oracle 数据库内核仪表化向我们提供的更详细的指标。重点是 Exadata\
  \ 相关的性能统计。Exadata 等待事件的细节在此不涉及，因为这些已在第 10 章中解释过。在适用的情况下，会补充回顾如何使用等待事件来更好地理解数据库性能，您可能会发现一些已在第\
  \ 2 章中介绍过的卸载和智能扫描材料。这是一个为了帮助您理解本章内容而无需翻回很多页的复习。在理解本章以及监控和排除 Exadata 性能问题的背景下，理解细节很重要。\n\
  \nExadata 平台上数据仓库和报表工作负载的主要性能提升之一就是 Exadata 智能扫描。OLTP 工作负载则极大地受益于 Exadata 智能闪存缓存的使用。本节的第一部分详细说明了如何衡量您的工作负载是否从这两项功能中受益。这些知识构成了后续章节中数据库和查询性能监控的基础。在第二部分，您可以阅读更多关于一些\
  \ Exadata 内部性能计数器的内容。\n\n### Exadata 智能扫描性能\n\n由于智能扫描是一项如此令人兴奋的功能，我们首先介绍其指标。在讨论任何指标之前，让我们回顾一下\
  \ Oracle 中决定执行智能扫描是如何做出的。请注意，智能扫描可用于常规表段，也可用于物化视图段——它们在物理上与常规表没有区别。智能扫描也可用于全扫描 B*树索引段（索引快速全扫描）以及位图索引段（位图索引快速全扫描）。使用“强力”的多块读取方式扫描索引段，而不是采用通常的单块\
  \ I/O 方法，这与对表执行全表扫描非常相似。主要区别在于，索引段有一个称为索引分支块的附加结构，在扫描时需要跳过并忽略，此外还有 ASSM 位图块，在表和索引扫描中也都需要跳过。对表和索引的分区及子分区进行的智能扫描，在内部与对非分区对象的扫描没有区别。一个分区段实际上只是较小段的逻辑分组。请记住，智能扫描可以扫描各种类型的段。\n\
  \n无论段类型如何，智能扫描始终要求 SQL 执行引擎在执行时选择直接路径读取，这不是优化器的决定。因此，在排除为何未使用智能扫描的故障时，您必须首先检查是否使用了直接路径读取。您应该先检查执行计划，看看那里是否报告了全扫描。这里您可以看到在不同段类型上发生全段扫描的简单示例，从全表扫描开始：\n\
  \n```sql\nSELECT AVG(line) FROM t WHERE owner LIKE 'S%'\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation                  | Name | Rows  | Bytes | Cost (%CPU)| Time  \
  \   |\n-----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT           |      |       |       |   295K(100)|       \
  \   |\n|   1 |  SORT AGGREGATE            |      |     1 |    11 |            |\
  \          |\n|*  2 |   TABLE ACCESS STORAGE FULL| T    |  5743K|    60M|   295K\
  \  (1)| 00:59:01 |\n-----------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  2 - storage(\"OWNER\" LIKE 'S%')\n    filter(\"OWNER\" LIKE 'S%')\n```\n\n请注意，这里的\
  \ `TABLE ACCESS STORAGE FULL` 行中的 `STORAGE` 并不意味着 Oracle 试图进行智能扫描。这个关键字仅仅表明 Oracle\
  \ 知道这个段驻留在存储单元上，而不是诸如 NFS 挂载或 iSCSI 设备之类的地方，并且它正在使用能够执行智能扫描的表扫描代码路径。是否实际使用了智能扫描取决于其他多个因素，这些因素在第\
  \ 2 章中讨论过，并且这里也将简要演示。执行计划中是否显示 `storage` 关键字也取决于初始化参数 `cell_offload_plan_display`。此外，智能扫描是一个广义的术语，涵盖了过滤（可能利用存储索引）、列投影、HCC\
  \ 压缩 CU 的解压，以及利用布隆过滤器进行哈希连接提前消除等操作——所有这些都在存储单元中完成。即使您没有利用将过滤谓词卸载到存储（过滤）的功能，存储单元也可能能够减少返回到数据库的数据量。如果使用了智能扫描，列投影在存储单元中完成，它们只返回所需的列，而不是包含整行长数据的整个数据块。\n\
  \n"
- "# 在 Oracle 执行计划中识别 Smart Scan 迹象\n\n在执行计划中找到`STORAGE`关键字固然重要，但检查执行计划下方的“谓词信息”部分是否显示了`storage()`谓词同样关键。这是判断执行计划是否有能力进行智能扫描的谓词下推（智能过滤）的一个良好指标。遗憾的是，这并不意味着谓词下推一定已被尝试。在某些情况下，即使存在`storage()`谓词，也不能保证谓词下推一定会发生。这时，Oracle\
  \ 性能指标就会很有帮助，我们稍后会详细讨论。\n\n总之，执行计划中必须同时包含`STORAGE`关键字和`storage()`谓词，一个全表扫描访问路径才有能力进行智能扫描的谓词下推。如果你在执行计划中看到了`STORAGE`行，但其下没有`storage()`谓词，那么谓词下推甚至不会被尝试，不过你仍然可能受益于列投影下推，即只有所需的列由存储单元返回。在真实的查询计划中，你很可能会看到多个`storage()`谓词（以及多个全表扫描操作），因为你将进行多表连接。\n\
  \n## `STORAGE`关键字与`storage()`谓词的含义\n\n如果你在执行计划中看到了`STORAGE`选项和`storage()`谓词，那么很有可能会尝试进行智能扫描。谓词下推在原则上是可能的，但不能保证每次运行查询时都会发生智能扫描。另一方面，如果在执行计划中没有看到`STORAGE`关键字，那么在该执行计划步骤中，相应的段上就不可能发生智能扫描。当执行计划行中没有`STORAGE`关键字时，意味着此行源操作符无法使用存储单元的智能特性，因此也无法将任何`storage()`谓词下推到存储单元中。\n\
  \n## 在物化视图和索引段上的应用\n\n你之前可能了解到，智能扫描也可以在物化视图表段上进行。这是因为物化视图表段在物理上与常规表完全相同。以下是对应的执行计划摘录：\n\
  \n```sql\nselect count(*) from mv1 where owner like 'S%'\n--------------------------------------------------------------------\n\
  | Id  | Operation                     | Name | E-Rows | Cost (%CPU)|\n--------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT              |      |        |   139K(100)|\n|   1 |  SORT\
  \ AGGREGATE               |      |      1 |            |\n|*  2 |   MAT_VIEW ACCESS\
  \ STORAGE FULL| MV1  |   2089K|   139K  (1)|\n--------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  2 - storage(\"OWNER\" LIKE 'S%')\n    filter(\"OWNER\" LIKE 'S%')\n```\n\n以下是可以尝试智能扫描的另外两个例子。第一个是当扫描常规\
  \ B*树索引段时，请求了索引快速全扫描：\n\n```sql\nSELECT /*+ INDEX_FFS(t2) */ AVG(LENGTH(owner))\
  \ FROM t2 WHERE owner LIKE'S%'\n---------------------------------------------------------------------\n\
  | Id  | Operation                     | Name  | E-Rows | Cost (%CPU)|\n---------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT              |       |        |  5165 (100)|\n|   1 | \
  \ SORT AGGREGATE               |       |      1 |            |\n|*  2 |   INDEX\
  \ STORAGE FAST FULL SCAN| T2_I1 |    597K|  5165   (2)|\n---------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  2 - storage(\"OWNER\" LIKE 'S%')\n    filter(\"OWNER\" LIKE 'S%')\n```\n\n在第二个例子中，在位图索引段上请求了索引快速全扫描：\n\
  \n```sql\nSELECT /*+ INDEX_FFS(t1) */ AVG(LENGTH(owner)) FROM t1 WHERE owner LIKE'S%'\n\
  Plan hash value: 3170056527\n-----------------------------------------------------------------------------------\n\
  | Id  | Operation                             | Name        | E-Rows | Cost (%CPU)|\n\
  -----------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT                      |             |        |   505 (100)|\n\
  |   1 |  SORT AGGREGATE                       |             |      1 |         \
  \   |\n|   2 |   BITMAP CONVERSION TO ROWIDS         |             |    597K|  \
  \ 505   (0)|\n|*  3 |    BITMAP INDEX STORAGE FAST FULL SCAN| BI_T1_OWNER |    \
  \    |            |\n-----------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  3 - storage(\"OWNER\" LIKE 'S%')\n    filter(\"OWNER\" LIKE 'S%')\n```\n\n在这两种情况下，你看到段都是使用快速全扫描进行扫描的，这就像在索引段上进行全表扫描一样。并且，全扫描操作上存在`STORAGE`选项和`storage()`谓词，这表明可以尝试进行智能扫描谓词下推。\n\
  \n## 谓词下推的尝试与实际执行\n\n你可能会奇怪为什么反复读到“可以尝试智能扫描谓词下推”。措辞如此谨慎的原因很简单：在某些情况下，智能扫描要么未被采用，要么在运行时启动但未完成。是的，执行计划的结构可能会让你相信某个查询将使用智能扫描，但智能扫描是否实际执行，首先取决于是否选择了直接路径读取来扫描该段。此外，即使选择了直接路径读取并执行了智能扫描，在智能扫描执行过程中的某个时刻（或开始时），也可能做出不同的决定。这取决于多种因素，我们将在后面讨论其中一些。这时，会话统计数据就真正发挥作用了，它能帮助性能分析师确定所观察到行为的原因。\n\
  \n这个听起来相当抽象的概念最好用一个例子来解释。你可以先尝试在索引组织表段上进行智能扫描，以了解额外的 Oracle 指标有多大价值。请注意，在撰写本文时当前的\
  \ Oracle 版本中，Oracle 尚未在索引组织表段上实现智能扫描功能。因此，这是练习使用智能扫描相关指标的一个好例子。\n\n请查看此处显示的执行计划；它来自一个在索引组织表的索引段上使用索引快速全扫描的查询：\n\
  \n```sql\nselect avg(length(state)) from t1_iot where date_created >\nto_date('07.11.2013','dd.mm.yyyy')\n\
  Plan hash value: 379056979\n-------------------------------------------------------------------------------------------\n\
  | Id  | Operation             | Name              | Rows  | Bytes | Cost (%CPU)|\
  \ Time     |\n-------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT      |                   |       |       |   402 (100)|\
  \          |\n|   1 |  SORT AGGREGATE       |                   |     1 |    17\
  \ |            |          |\n|*  2 |   INDEX FAST FULL SCAN| SYS_IOT_TOP_19445 |\
  \   740K|    12M|   402   (6)| 00:00:01 |\n-------------------------------------------------------------------------------------------\n\
  Predicate Information (identified by operation id):\n---------------------------------------------------\n\
  2 - filter(\"DATE_CREATED\">TO_DATE(' 2013-11-07 00:00:00', 'syyyy-mm-dd\n     \
  \         hh24:mi:ss'))\n```\n\n\n与之前列出的执行计划不同，在该执行计划行源（第 2 行）中未列出 `STORAGE` 选项，也没有\
  \ `storage()` 谓词，这表明存在将筛选谓词下推至存储单元的机会。该计划无法使用任何 Smart Scan 功能；它将进行传统的块 I/O。可以立即跳过查看额外的\
  \ Exadata 和单元指标，因为执行计划本身表明它无法使用兼容 Smart Scan 的行源代码路径。\n\n"
- "# 理解 Exadata Smart Scan 指标与性能计数器\n\n当您使用支持存储感知行源的 Oracle 执行计划时，您仍然无法完全确定是否真正尝试了\
  \ Smart Scan 并且其是否如预期那样工作。在第 10 章中介绍的等待接口是性能相关信息的一个可靠来源。在查询执行期间，可以参考相关的 V$ 视图来确定您的会话正在等待什么。考虑以下可能性：\n\
  \n*   **仅 CPU 使用率**：这似乎意味着使用了缓冲数据访问（而非直接路径），这可以从遍历缓冲区高速缓存且所有数据恰好已缓存时缺少 I/O 等待事件中看出。但请注意：ASH\
  \ 以及从中获取性能数据的工具使用一秒的采样间隔，可能会遗漏非常短暂的物理 I/O 事件。经典的 SQL Trace 或使用 snapper 从 `v$sesstat`/`v$mystat`\
  \ 捕获信息所获取的数据来源与 ASH 不同。\n*   **cell multiblock physical read**：显然使用了缓冲多块读取（看起来像是全段扫描），但多块读取等待也可能针对\
  \ LOB 和 SecureFile 读取操作报告，其中对于 LOB，LOB 块大小大于块大小。否则，对于 LOB 访问将报告单块读取。在 Exadata 单元软件\
  \ 12.1.1.1.1 及更高版本中，内联 LOB 可以被下载。\n*   **cell single block physical read**：显然使用了缓冲单块读取。如果这是您看到的唯一\
  \ I/O 等待事件（且未与多块读取一起出现），那么您似乎根本没有使用全段扫描。有时单块读取的出现是由于执行计划中的其他操作（如某些索引范围扫描）或数据块中的行链接。\n\
  \n如果您在会话中看到常规的 `cell multiblock physical read` 等待事件，那么显然没有使用直接路径读取。这主要发生在串行执行的操作中，例如当您使用\
  \ `parallel_degree_policy = MANUAL` 或 `LIMITED` 时。并行执行从属进程很可能会执行直接路径读取扫描，这些扫描随后将被下载并作为\
  \ Smart Scan 执行。另一方面，当您使用新的自动并行度策略（`parallel_degree_policy = AUTO` 或 `ADAPTIVE`）并且\
  \ Oracle 决定执行内存中并行查询时，即使是并行操作，Oracle 也会使用通过缓冲区高速缓存的读取，其等待事件将显示为“缓冲”读取结果。\n\n除了这些问题之外，还有更多原因和特殊情况会导致\
  \ Smart Scan 被静默地不使用或回退到常规块 I/O 模式——这可能会比您预期的更显著地减慢查询和工作负载。值得庆幸的是，Oracle Exadata\
  \ 提供了非常完善的检测工具，通过使用性能框架，分析人员可以审查性能不佳的查询并进行相应优化。\n\n## Exadata 动态性能计数器\n\n虽然 Oracle\
  \ 等待接口的等待事件为我们提供了关于数据库响应时间消耗在何处的关键信息，但 Exadata 动态性能计数器将我们向前推进了一步，并解释了 Oracle 内核正在执行何种操作或任务——以及执行了多少次。等待事件和性能计数器相辅相成，不应单独使用。Oracle\
  \ 动态性能计数器也称为 `V$SESSTAT` 或 `V$SYSSTAT` 统计信息（或计数器），因为这些视图用于访问它们。当使用 12c 多租户数据库时，您可能也会对\
  \ `V$CON_SYSSTAT` 感兴趣。\n\n\n## 如何及何时使用性能计数器\n\n在排查性能问题时，你应始终从分析等待事件和 SQL ID 级别的活动度量开始排查过程。这些指标追踪了最终用户所关心的**时间**。如果需要更详细的细节，接着再查看性能计数器。如果标准的等待事件信息未能提供足够详情，性能计数器能为你提供关于\
  \ Oracle 会话正在做什么的、非常深入的洞察。例如，如果你的会话似乎消耗了大量 CPU，你可以查看某个会话的 `session logical reads`\
  \ 或 `parse count (hard)` 计数器是否比平常增长得更多。或者，如果你在全表扫描期间看到一些意外的单块读取，你可以检查 `table fetch\
  \ continued row` 或类似 `data blocks consistent reads – undo records applied` 的统计信息是否增加，这些指标表明可能存在链接/迁移的行或一致性读（CR）缓冲区克隆加上回滚开销。另一个有用的度量是\
  \ `user commits`，它能让你了解一个实例（或选定会话中）完成了多少数据库事务。因此，下次当一个会话似乎在等待 `log file sync` 等待事件时，你可以从\
  \ `V$SESSTAT` 中检查其 `user commits` 计数器值，看看该会话提交工作的频率如何。\n\n不幸的是，Oracle 并未记录所有性能计数器。已记录的计数器可以在\
  \ Oracle 12c 参考手册的附录 E “统计信息描述”中找到。一些与单元相关的性能计数器记录在 Exadata 文档集的 Exadata 存储服务器软件用户指南中。然而，文档中的细节程度有时不足以让你完全理解某个给定的性能计数器。经验会告诉你哪些是重要的，哪些不是。\n\
  \n尽管在 AWR 报告中也能找到性能统计信息，但当问题正在发生时使用它们最有价值。在计算这些计数器的变化率（“delta”）时，你可以更详细地观察你的会话正在执行什么操作。\n\
  \n你本章前文已了解到性能计数器被分配到一个类中。但即使在同一个类内，你也可以区分出相关的计数器组。以物理 I/O 为例。有针对读和写的统计信息，不同的读取类型如下所示：\n\
  \n```sql\nSQL> select name from v$statname where name like 'physical reads%' order\
  \ by name;\n\nNAME\n----------------------------------------------------------------\n\
  physical reads\nphysical reads cache\nphysical reads cache for securefile flashback\
  \ block new\nphysical reads cache prefetch\nphysical reads direct\nphysical reads\
  \ direct (lob)\nphysical reads direct for securefile flashback block new\nphysical\
  \ reads direct temporary tablespace\nphysical reads for flashback new\nphysical\
  \ reads prefetch warmup\nphysical reads retry corrupt\n\n11 rows selected.\n```\n\
  \n现在，如果你要执行一条 SQL 语句，并在查询开始和结束时捕获计数器的值，你就可以计算结束值与开始值之间的差值。在下一个例子中，我们针对物理读取做了这件事。会话执行了以下语句：\n\
  \n```sql\nSQL> select count(*) from bigtab union all select count(*) from bigtab;\n\
  ```\n\n在查询执行期间，以下与物理读取相关的统计计数器发生了变化：\n\n```\nphysical read bytes               \
  \                               : 27603034112\nphysical read IO requests       \
  \                                 : 26379\nphysical read requests optimized    \
  \                             : 23671\nphysical reads                          \
  \                         : 3369127\nphysical reads direct                     \
  \                       : 3369127\nphysical read total bytes                   \
  \                     : 27528650752\nphysical read total bytes optimized       \
  \                       : 24767488000\nphysical read total IO requests         \
  \                         : 26310\nphysical read total multi block requests    \
  \                     : 26286\n```\n\n这应该能让你非常清晰地了解数据库层为该特定会话和查询所报告的物理读取情况。请注意，这些并非计入的唯一物理读取——在后面的章节中，你将了解到与智能扫描处理相关的完整\
  \ I/O 事件谱系。\n\n等待接口则会给你以下信息，取自一个经过 tkprof 处理的跟踪文件：\n\n```\nElapsed times include\
  \ waiting on following events:\nEvent waited on                                \
  \         Times   Max. Wait  Total Waited\n--------------------------------------------------------\
  \ Waited  ----------  ------------\nDisk file operations I/O                   \
  \                  2        0.00          0.00\nSQL*Net message to client      \
  \                              2        0.00          0.00\nenq: KO - fast object\
  \ checkpoint                             6        0.00          0.00\nreliable message\
  \                                             2        0.00          0.00\ncell\
  \ smart table scan                                     2969        0.01        \
  \  2.55\nSQL*Net message from client                                   2       \
  \ 1.49          1.49\n```\n\n这两者——统计计数器和等待接口——都提供了关于会话活动的信息。然而，你应该已经清楚的是，会话统计信息能为你提供关于磁盘读取更详细的信息。其他统计信息——请记住，在\
  \ 12.1.0.2 中，Oracle 为你的会话维护了 1178 个统计信息——能让你更深入地了解所执行处理的其他方面。仅仅查看等待信息，你无法确定是否访问了闪存缓存来提供相关数据。性能计数器允许你确认，在\
  \ 26,379 次物理读取请求中，有 23,671 次使用了闪存缓存。在该会话的当前查询中，存储索引被特别禁用，因此并未发挥作用（尽管严格来说，由于缺少 where\
  \ 子句，这并非必要）。\n\n动态性能计数器提供了重要的线索，使你能够更好地引导你的故障排查工作。请注意，像 Statspack 和 AWR 报告这样的工具严重依赖\
  \ `V$SYSSTAT` 计数器。它们只是将这些自实例启动以来不断增长的数字的值存储在其存储库表中。因此，每当你运行 Statspack/AWR 报告时，报告的只是选定快照之间数值的差值。Statspack\
  \ 和 AWR 报告的核心就是向你展示不同时间点的 `V$SYSSTAT`（及其他视图）数值之间的差值。\n\n虽然 `V$SYSSTAT` 视图对于监控和诊断整个实例的性能（如\
  \ AWR 和 Statspack 报告所做的）是没问题的，但它的问题在于，你无法使用全系统范围的统计信息来诊断单个会话的问题。系统级统计信息将你所有（可能数千个）会话的度量数据聚合到一组计数器中。这就是为什么\
  \ Oracle 还有 `V$SESSTAT`，它为每个会话单独跟踪所有这些独立的计数器！实例中的每个会话都有自己成百上千个性能计数器，只跟踪其自身的活动。这个动态性能视图确实是一个金矿——如果实例中只有少数会话（或用户）有问题，你可以只监控他们的活动，而不会被数据库中所有其他用户的噪音所干扰。\n\
  \n\n如前所述，`V$SYSSTAT` 累积了实例范围内的性能计数器；它们从零开始，并且只在实例生命周期内增加。大多数 `V$SESSTAT` 计数器始终是递增的（累计统计），但也有一些例外，例如\
  \ `logons current` 和 `session pga/uga memory`。无论如何，在检查计数器值时，你不应仅仅查看计数器的当前值，特别是当你的会话已经连接了一段时间时。问题在于，即使你在某个长时间运行的连接池会话的\
  \ `V$SESSTAT` 中看到一个看起来很大的数字，你如何知道其中有多少是在今天、此时、当你遇到问题时递增或添加的，而不是几周前该会话登录时累积的呢？换句话说，在排查当前发生的问题时，你应该查看当前时间段内、特定问题时间区间的性能指标。排查过去的问题时，也适用类似的原则。\n\
  \n## Oracle Session Snapper\n\n这就是为什么合著者 Tanel Poder 编写了一个“小巧”的辅助工具，名为 Oracle Session\
  \ Snapper。该工具可以方便地显示来自 `V$SESSTAT` 及其他各种会话级性能视图的会话当前活动。关于此工具的一个重要方面是，它“只”是一个动态解析的匿名\
  \ PL/SQL 块；它不需要在数据库中进行任何安装或拥有 DDL 权限。这应该使其易于部署和使用。当前版本的 Snapper 可在线获取，地址为 `ExpertOracleExadata.com`。\n\
  \n以下是一个如何运行 Snapper 来测量 SID 789 活动度的示例（针对单个五秒的时间间隔）。在此示例中，脚本被重命名为 `snapper4.sql`，以便与之前的版本区分。请阅读\
  \ Snapper 的头部说明以获取详细文档。在此示例中，Snapper 被指示报告会话 789 的性能计数器的任何差异。此外，它还从 `V$SESSION`\
  \ 采样等待事件相关信息，并以类似 ASH 的格式呈现。\n\n**注意**\n\n遗憾的是，Snapper 生成的有关会话统计的输出对于本书来说太宽了。这里使用了一个小过滤器将其修剪到可管理的尺寸。\n\
  \n```sql\nsid username      statistic                                          \
  \                      delta\n--- ------------ --------------------------------------------------------------------------\
  \ ---------\n789 MARTIN       向客户端发送/从客户端接收的请求数                                \
  \                  1\n789 MARTIN       打开的游标累计数                                \
  \                               1\n789 MARTIN       用户调用次数                     \
  \                                                2\n789 MARTIN       当前固定的游标数  \
  \                                                       1\n789 MARTIN       会话逻辑读次数\
  \                                                      2.59M\n789 MARTIN       用户\
  \ I/O 等待时间                                                          166\n789 MARTIN\
  \       非空闲等待时间                                                          166\n789\
  \ MARTIN       非空闲等待次数                                                       8.14k\n\
  789 MARTIN       会话 UGA 内存使用量                                                  \
  \      6.23M\n789 MARTIN       会话 PGA 内存使用量                                    \
  \                     8.85M\n789 MARTIN       锁存等待次数                           \
  \                                     3\n789 MARTIN       锁存请求次数               \
  \                                              2\n789 MARTIN       锁存转换次数      \
  \                                                    4\n789 MARTIN       锁存释放次数\
  \                                                             2\n789 MARTIN    \
  \   全局锁存同步获取次数                                                      6\n789 MARTIN\
  \       全局锁存释放次数                                                       2\n789 MARTIN\
  \       物理读取总 IO 请求数                                         20.24k\n789 MARTIN\
  \       物理读取总多块请求数                                20.22k\n```\n\n\n\n`789 MARTIN       优化后的物理读请求                                             18.31k`\n\
  \n`789 MARTIN       优化后的物理读总字节数                                          19.17G`\n\
  \n`789 MARTIN       物理读总字节数                                                    21.18G`\n\
  \n`789 MARTIN       存储节点物理 IO 互联字节数                                         416.83M`\n\
  \n`789 MARTIN       GES 消息发送数                                                         3`\n\
  \n`789 MARTIN       一致性获取                                                       2.59M`\n\
  \n`789 MARTIN       从缓存中获得的一致性获取                                               13`\n\
  \n`789 MARTIN       从缓存中获得的一致性获取（快速路径）                                    13`\n\n\
  `789 MARTIN       直接一致性获取                                                 2.59M`\n\
  \n`789 MARTIN       从缓存中逻辑读取的字节数                                        106.5k`\n\
  \n`789 MARTIN       物理读次数                                                        2.59M`\n\
  \n`789 MARTIN       直接物理读次数                                                 2.59M`\n\
  \n`789 MARTIN       物理读 IO 请求数                                                    20.24k`\n\
  \n`789 MARTIN       物理读字节数                                                  21.19G`\n\
  \n`789 MARTIN       调用 kcmgcs 的次数                                                          13`\n\
  \n`789 MARTIN       调用获取快照 SCN（kcmgss）的次数                                         1`\n\
  \n`789 MARTIN       文件 IO 等待时间                                                    53.16k`\n\
  \n`789 MARTIN       适合进行谓词下推卸载的存储节点物理 IO 字节数                21.19G`\n\n`789 MARTIN       智能扫描返回的存储节点物理\
  \ IO 互联字节数          417.12M`\n\n`789 MARTIN       存储节点智能 IO 自动内存缓冲区分配尝试次数                       1`\n\
  \n`789 MARTIN       表扫描（长表）                                                         1`\n\
  \n`789 MARTIN       表扫描（直接读）                                                         1`\n\
  \n`789 MARTIN       表扫描获取的行数                                               15.54M`\n\
  \n`789 MARTIN       表扫描获取的数据块数                                              2.59M`\n\
  \n`789 MARTIN       存储节点扫描次数                                                        1`\n\
  \n`789 MARTIN       缓存层处理的数据块数                                          2.59M`\n\
