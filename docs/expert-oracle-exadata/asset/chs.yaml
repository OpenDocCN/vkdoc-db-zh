  从上面的输出可以看出，Oracle 在单元中跳过了大约 28,000 个链式行，并将它们发送到 RDBMS 进行常规处理。另一个问题指标是 `table fetch
  continued row` 的值相对较高。


  另请注意，`consistent gets` 的值（计算了数据库和单元通过智能扫描完成的所有一致性读取）略多于 45,000。同时，子计数器 `consistent
  gets from cache`（由数据库层从缓冲区缓存执行的一致性读取）和 `consistent gets direct`（绕过缓冲区缓存的一致性读取）显示了在单元级别完成了一致性读取工作量，以及在数据库级别额外完成了多少。


  关于链式行的结论是，下次当你看到你的智能扫描正在等待大量的 `cell single block physical reads` 并且在数据库层内（`consistent
  gets from cache`）执行逻辑 I/O 时，需要检查的事情之一就是上述统计信息，以查看是否遇到了链式行并必须在数据库中处理它们。当然，别忘了智能扫描只卸载大型段扫描工作负载，但如果你的查询计划包含其他行源、索引范围扫描或小型缓存表扫描，看到逻辑
  I/O 和单块物理读是预期的。你可以根据你的许可，使用 ASH、`V$SESSION` 或 SQL 跟踪中的等待接口数据来查看这些单块读访问了哪些对象。ASH
  中的 `current_obj#` 列和原始 SQL 跟踪文件中的 `obj#` 字段指的是会话正在读取的表（或索引或分区）的 `object_id`。



