  SELECT COUNT(*) FROM MARTIN.T1\nEND OF STMT\nEXEC #1...4:c=0,e=97,p=0,cr=0,cu=0,mis=0,r=0,dep=1,og=1,plh=3724264953,tim=4695862695326\n\
  WAIT #1...4: nam='enq: KO - fast object checkpoint' ela= 216 name|mode=1263468550\
