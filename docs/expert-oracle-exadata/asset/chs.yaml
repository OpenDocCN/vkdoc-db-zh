  \       136,533,377,024\nSTAT    cell physical IO interconnect bytes           \
  \                        2,690,662,344\nSTAT    cell physical IO interconnect bytes\
  \ returned by smart scan            2,690,662,344\nSTAT    cell scans          \
  \                                                             1\n...\nSTAT    physical\
  \ read IO requests                                            130,411\nSTAT    physical\
  \ read bytes                                         136,533,377,024\nSTAT    physical\
  \ read requests optimized                                      113,612\nSTAT   \
