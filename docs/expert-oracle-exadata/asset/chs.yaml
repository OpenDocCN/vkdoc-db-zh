  scan` 事件取代了这个事件。


  ### 参数


  此事件的参数信息量不大。仅提供被扫描表的对象 ID 和单元哈希号：


  *   `P1` - 单元哈希号

  *   `P2` - 未使用

  *   `P3` - 未使用

  *   `obj#` - 被扫描的表段的数据对象 ID


  您应该使用跟踪中报告的 `obj#` 在 `DBA_OBJECTS` 中查找表名。请记住，智能扫描（Smart Scan）在段级别操作——您需要查询 `data_object_id`
  而不是 `object_id`。您会注意到 `direct path read` 事件（`cell smart table scan` 所取代的事件）提供了更多信息，包括文件号、文件中的偏移量（`first
  dba`）以及读取的连续块数（`block cnt`）。另一方面，对于 `direct path read` 事件，没有指示读取请求如何路由到各个单元。


  许多等待事件中报告的单元哈希号可以在 `V$CELL` 视图中找到。该视图只有两列：`CELL_PATH` 和 `CELL_HASHVAL`。`CELL_PATH`
  列实际上包含存储单元的 IP 地址。如果使用 KXD 和 LIBCELL 组件进行跟踪，您将在每个等待事件前后看到更多信息。这些额外的跟踪信息非常适合让您对智能扫描处理有极其深入的了解。完整解释这些内容超出了本章的范围；请参阅第
  2 章。


  与某些非 Exadata I/O 事件不同，智能扫描事件并不真正适合用于计时 I/O 完成。请回忆第 2 章的内容，智能扫描是针对单元中的各个线程异步触发的——每个都是独立的逻辑工作单元。Oracle
  软件可能会按与执行顺序不同的顺序读取这些 I/O 事件的结果。这一点，以及智能扫描处理的复杂性，使得无法使用此事件来推导 I/O 延迟。


  ### cell smart index scan


  当执行被卸载的快速全索引扫描时，时间会被计入 `cell smart index scan` 事件。此事件类似于 `cell smart table scan`，不同之处在于被扫描的对象是一个索引。不要将此索引访问路径与任何其他可用的索引访问路径（例如索引唯一、范围或全扫描）混淆。后者表示单块
  I/O 调用，根据定义不能被卸载。单元智能索引扫描等待取代了 `direct path read` 事件，并将数据直接返回到请求进程的 PGA，而不是缓冲区缓存。



  ### 事件含义


  在我们观察到的系统上，这个事件并不常见，可能出于以下几个原因：


  *   Exadata 非常擅长执行全表扫描，因此迁移到该平台时倾向于删除大量索引。这可能包括为了查询优化目的而将索引设为不可见。

  *   在索引扫描中执行直接路径读取的频率不如在表扫描中高。Oracle 11.2 的一个重要变化是它在串行表扫描中执行直接路径读取的激进程度。这项增强很可能是为了允许
  Exadata 执行更多智能全表扫描而特别推进的，但无论如何，若没有此功能，则只有并行表扫描才能利用智能扫描。同样的增强也适用于索引快速完全扫描。也就是说，它们也可以通过串行直接路径读取来执行。然而，控制其发生时机的算法似乎不太可能对索引使用此技术（可能是因为索引可能比表小得多）。


  此外，只有索引的快速完全扫描有资格进行智能扫描（范围扫描和全扫描没有资格）。由于这些问题，`cell smart index scans`事件相比`cell smart
  table scans`事件相当罕见。当然，可以通过提示（如`parallel_index`）或为特定索引设置大于 1 的并行度来鼓励使用此功能。以下是显示该事件的
