  #### 存储单元警报


  `存储单元警报`屏幕（图 8-16）允许用户输入将用于从存储单元和计算节点发送警报的信息。`cellsrv`管理服务（在每个存储单元上）监控存储单元的运行状况，并在存储服务器出现问题时能够发出通知。运行镜像版本`12.1.2.1.0`及更高版本的计算节点具有类似的管理服务，也会发送警报。警报可以通过简单邮件传输协议（`SMTP`）或简单网络管理协议（`SNMP`）发送。`SMTP`警报可以发送到多个地址或分发列表。这些警报将在发生故障时由服务器发送。通常，大多数部署仅使用`SMTP`警报。仅在使用第三方监控解决方案时，才在此处选择`SNMP`警报。Oracle
  Enterprise Manager 和 Automatic Service Request 都使用`SNMP`，但将在后续过程中进行配置。存储单元警报是可选的，但强烈建议启用，即使使用其他通知系统。表
  8-8 定义了此屏幕上使用的字段。


