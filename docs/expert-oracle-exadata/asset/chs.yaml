  \   Waited  ----------  ------------\n  enq: IV -  contention                  \
  \        10        0.00          0.00\n  row cache lock                        \
  \          4        0.00          0.00\n  Disk file operations I/O             \
  \           1        0.00          0.00\n  enq: RO - fast object reuse         \
  \            6        0.00          0.00\n  reliable message                   \
  \             2        0.00          0.00\n  log file sync                     \
  \              2        0.00          0.00\n  cell smart flash unkeep          \
  \              18        0.01          0.01\n  cell single block physical read \
  \               12        0.00          0.00\n  local write wait               \
  \                 3        0.00          0.00\n  gc current grant 2-way        \
  \                 16        0.00          0.00\n  DFS lock handle              \
  \                1452        0.00          0.30\n  gc current grant busy       \
  \                    7        0.00          0.00\n  SQL*Net message to client  \
  \                     1        0.00          0.00\n  SQL*Net message from client\
  \                     1        4.00          4.00\n********************************************************************************\n\
  ```\n\n当检查原始跟踪文件时，你会注意到`cell smart flash unkeep`事件之前有少数几个`enq: RO – fast object\
  \ reuse`事件，这些事件用于标记在删除或截断后清理缓冲区缓存所花费的时间。`cell smart flash unkeep`基本上是该事件的扩展，用于同时清理存储服务器上的\
  \ Exadata 智能闪存缓存。\n\n### 参数\n\n此事件使用的唯一参数是`P1`，它显示哪个单元格负责生成该事件：\n\n*   `P1` - 单元格哈希值\n\
  *   `P2` - 未使用\n*   `P3` - 未使用\n\n## 非 Exadata 特定事件\n\n除了新的单元格事件外，还有一些非 Exadata\
  \ 特定的等待事件你也应该了解。这些事件可能在你管理其他平台上的 Oracle 时已经熟悉。它们恰好在 Exadata 环境中也很重要，因此，当你开始管理 Exadata\
  \ 时，你现有的知识和技能可以派上用场并让你处于有利地位。\n\n### direct path read\n\nOracle 使用`Direct path reads`将数据直接读入\
  \ PGA 内存（而不是缓冲区缓存）。它们是 Exadata 卸载的一个组成部分，因为只有使用`direct path read`机制时，SQL 处理才能被卸载到存储单元。当查询被卸载时，`direct\
  \ path read`等待事件实际上被`cell smart table scan`和`cell smart index scan`等待事件所取代。然而，`direct\
  \ path read`机制仍然被这些新等待事件所涵盖的代码使用。也就是说，执行计划必须包含并行（表）扫描，或者 Oracle 必须决定使用串行`direct\
  \ path read`机制，如第 2 章中所述。\n\n### 事件含义\n\n此事件记录 Oracle 等待直接路径读取完成所花费的时间。你应该知道`direct\
  \ path read`等待事件可能非常具有误导性。与智能扫描事件类似，记录的事件数量以及与之相关的时间看起来可能不准确。这是由于直接路径读取是以异步和重叠的方式完成的。本质上，由于\
  \ Oracle 发起 I/O 请求的异步/重叠性质，此事件不是 I/O 延迟等待，而经典的同步 I/O 事件则是。还值得一提的是，从 11gR2 开始，Oracle\
  \ 包含一项增强功能，导致串行直接路径读取比之前的版本更频繁地发生。参见 MOS Note 793845.1，其中简要提到了这一变化。许多 DBA 一定想知道为什么在数据库从\
  \ 10.2 迁移到 11.2 和 12c 之后，I/O 配置文件发生了变化。\n\n尽管不像在其他平台上那么相关，但`direct path read`等待事件仍然会在\
  \ Exadata 平台上因各种操作而出现，但通常不会用于全表扫描，除非表（或分区）相对较小。你可能看到`direct path read`的另一种情况是，当对相关段的扫描不可卸载时，例如对于索引组织表。一个\
  \ 10046 跟踪和直接路径读取的例子在 cell smart table scan 部分的描述中展示。\n\n### 参数\n\n此事件的参数向你准确显示了扫描的是哪个段（obj）以及在此事件期间扫描了哪些块：\n\
  \n*   `P1` - 文件号\n*   `P2` - 第一个数据库块地址\n*   `P3` - 块计数\n*   `obj#` - 被扫描表的对象号\n\n\
  如`cell smart table scan`部分所述，参数包含有关正在访问的文件和对象的更具体信息。文件中的偏移量也在`P2`参数中提供，`P3`参数中提供了连续读取的块数。\n\
  \n### Enq: KO—fast object checkpoint\n\n`enq:KO`事件有一个奇怪的名字。不要被它吓退。该事件本质上是一个`object\
  \ checkpoint`事件。`V$LOCK_TYPE`视图将 KO 锁描述如下：\n\n```\nSQL> select type, name, description\
  \ from v$lock_type\n  2  where type = 'KO';\n\nTYPE  NAME                      \
  \ DESCRIPTION\n----- ------------------------------ ---------------------------------------------\n\
  KO    Multiple Object Checkpoint     Coordinates checkpointing of multiple objects\n\
  ```\n\n\n"
- "# 等待事件详解\n\n## enq: KO - fast object checkpoint\n\n### 事件含义\n\n此事件用于会话在启动`direct\
  \ path read`或`cell smart table scan`或`cell smart index scan`之前，等待所有脏块从缓冲区缓存中为某个段刷新完毕。此事件很重要，因为执行检查点所需的时间可能超过直接路径读取带来的好处。不过，在\
  \ Exadata 存储上，这种情况不太可能发生，因为只有通过`direct path read`机制才能启用额外的智能扫描功能。尽管如此，执行引擎在决定将查询卸载到单元之前，会尝试考虑检查点成本。第\
  \ 2 章包含了关于此机制的更多信息。\n\n### 参数\n\n此事件的参数帮助不大，但它确实显示了正在被扫描的对象。参数定义如下：\n\n*   `P1`\
  \ - 名称/模式\n*   `P2` - 未使用\n*   `P3` - 未使用\n*   `obj#` - 正在被检查点的对象的对象号\n\n## reliable\
  \ message\n\n`reliable message`事件用于记录与后台进程（如检查点进程 `CKPT`）通信所花费的时间。我们在此包含它是因为它与`enq:\
  \ KO – fast object checkpoint`事件密切相关。\n\n### 事件含义\n\n在 Oracle 11.2 及更高版本中，此事件是`enq:\
  \ KO – fast object checkpoint`事件（以及其他事件）的前导事件。通信是通过进程间通信通道完成的，而不是更常规的发布机制。这种通信方式允许发送方在继续之前请求确认（ACK），因此它被称为可靠消息。它通常是一个持续时间非常短的事件，因为它只记录进程间通信的时间。用户的前台进程和\
  \ CKPT 进程在相互通信时都会等待此事件。以下是来自 11.2.0.4 数据库的 10046 跟踪文件摘录，显示了一个完整的`reliable message`事件：\n\
