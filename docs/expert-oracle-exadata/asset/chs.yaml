  \ `sed`、`awk` 和 `perl` 教程的好时机。\n\n\n## 熟悉 cellcli\n\n像任何优秀的命令行实用程序一样，`cellcli` 提供了在线帮助。这个内置的帮助系统比官方文档更准确，而且，作为一个提示，你应该对照帮助命令的输出来检查官方的\
  \ HTML 文档。为了向你展示在 Exadata 12.1.2.1.0 中使用 `cellcli` 能做些什么，以下是其输出：\n\n```\nCellCLI>\
  \ help\n\nHELP [主题]\n\n可用主题：\n\nALTER\nALTER ALERTHISTORY\nALTER CELL\nALTER CELLDISK\n\
  ALTER FLASHCACHE\nALTER GRIDDISK\nALTER IBPORT\nALTER IORMPLAN\nALTER LUN\nALTER\
  \ PHYSICALDISK\nALTER QUARANTINE\nALTER THRESHOLD\nASSIGN KEY\nCALIBRATE\nCREATE\n\
  CREATE CELL\nCREATE CELLDISK\nCREATE FLASHCACHE\nCREATE FLASHLOG\nCREATE GRIDDISK\n\
  CREATE KEY\nCREATE QUARANTINE\nCREATE THRESHOLD\nDESCRIBE\nDROP\nDROP ALERTHISTORY\n\
  DROP CELL\nDROP CELLDISK\nDROP FLASHCACHE\nDROP FLASHLOG\nDROP GRIDDISK\nDROP QUARANTINE\n\
  DROP THRESHOLD\nEXPORT CELLDISK\nIMPORT CELLDISK\nLIST\nLIST ACTIVEREQUEST\nLIST\
  \ ALERTDEFINITION\nLIST ALERTHISTORY\nLIST CELL\nLIST CELLDISK\nLIST DATABASE\n\
  LIST FLASHCACHE\nLIST FLASHCACHECONTENT\nLIST FLASHLOG\nLIST GRIDDISK\nLIST IBPORT\n\
  LIST IORMPLAN\nLIST KEY\nLIST LUN\nLIST METRICCURRENT\nLIST METRICDEFINITION\nLIST\
  \ METRICHISTORY\nLIST PHYSICALDISK\nLIST QUARANTINE\nLIST THRESHOLD\nSET\nSPOOL\n\
  START\n```\n\n每个命令都可以使用 `HELP` 命令进一步描述，例如 `HELP LIST` 或 `HELP LIST CELL`。\n\n```\n\
  CellCLI> help list\n\n用法: LIST <对象类型> [<名称> | <筛选条件>] [<属性列表>] [DETAIL] \\\n[ORDER\
  \ BY <排序属性列表>] [LIMIT 整数]\n\n目的: LIST 命令显示 Oracle Exadata 服务器软件对象的属性。\n显示的对象通过名称或筛选条件来标识。\n\
  每个对象显示的属性由指定的属性列表决定。\n\n参数:\n<对象类型>:   要显示的现有对象的类型。\n<名称>:   要显示的活动请求的名称。\n<筛选条件>:\
  \   确定应显示哪些活动请求的表达式。\n<属性列表>: 要显示的属性。\nATTRIBUTES {ALL | attr1 [, attr2]... }\n\
  <排序属性列表>: 要排序的属性。\n{attr1 [asc|desc] [, attr2 [asc|desc]]}\n\n选项:\n[DETAIL]: 将显示格式化为每行一个属性，并在每个值前加上属性描述符。\n\
  [ORDER BY]: 按属性对对象进行升序或降序排序。默认为升序。\n[LIMIT]: 设置显示对象的数量。\n\n输入 HELP LIST <对象类型> 获取具体的帮助语法。\n\
  <对象类型>:   {ACTIVEREQUEST | ALERTHISTORY | ALERTDEFINITION | CELL\n| CELLDISK | DATABASE\
  \ | FLASHCACHE | FLASHLOG | FLASHCACHECONTENT\n| GRIDDISK | IBPORT | IORMPLAN |\
  \ KEY | LUN\n| METRICCURRENT | METRICDEFINITION | METRICHISTORY\n| PHYSICALDISK\
  \ | QUARANTINE | THRESHOLD }\n```\n\n```\nCellCLI> help list cell\n\n用法: LIST CELL\
  \ [<属性列表>] [DETAIL]\n\n目的: 显示单元的指定属性。\n\n参数:\n<属性列表>: 要显示的属性。\nATTRIBUTES {ALL |\
  \ attr1 [, attr2]... }\n\n选项:\n[DETAIL]: 将显示格式化为每行一个属性，并在每个值前加上属性描述符。\n\n示例:\nLIST\
  \ CELL attributes status, cellnumber\nLIST CELL DETAIL\n```\n\n前面清单中显示的输出取自一个运行\
  \ Exadata 软件版本 12.1.2.1.0 的单元。如你所见，帮助系统允许你查看每个命令的语法。你可能还注意到了几个 SQL*Plus 的**遗留命令**。`SET`、`SPOOL`\
  \ 和 `START` 的功能与预期基本一致。注意 `@` 字符等同于 SQL*Plus 的 `START` 命令，而你能用 `SET` 设置的只有 `ECHO`\
  \ 和 `DATEFORMAT`。现在，这里有几个使用 `LIST` 命令的查询示例：\n\n```\nCellCLI> describe metriccurrent\n\
  name\nalertState\ncollectionTime\nmetricObjectName\nmetricType\nmetricValue\nobjectType\n\
  ```\n\n## CellCLI 命令示例\n\n以下展示了一系列 `CellCLI` 命令及其输出结果。\n\n```cellcli\nCellCLI> list\
