  \ `deleted rows:` 的行实际上列出了已被擦除的行。\n\n## 预期压缩比率\n\nHCC 可以提供非常出色的压缩比。市场宣传材料声称有 10\
  \ 倍的压缩比，信不信由你，对于许多数据集来说，这实际上是一个非常可以实现的数字。当然，压缩量在很大程度上取决于数据以及应用的四种算法中的哪一种。确定你的数据集可以实现何种压缩的最佳方法是进行测试。\n\
  \nOracle 还提供了一个实用程序（通常称为压缩顾问）来压缩表中的样本数据，以计算估计的压缩比。该实用程序甚至可以从 9i Release 2 起在非 Exadata\
  \ 平台上使用。对于 11.2 及更新版本，该软件包包含在标准发行版中。早期版本的用户需要从 Oracle 网站下载该软件包。本节将提供一些关于 Oracle\
  \ 12.1 所提供的压缩顾问的见解。\n\n\n### 压缩建议工具\n\n如果你没有 Exadata 环境但仍想测试 HCC 的有效性，可以使用 `DBMS_COMPRESSION`\
  \ 包中提供的压缩建议功能。`GET_COMPRESSION_RATIO` 过程能够让你对指定表中的样本行进行实际压缩。这并非对压缩率的估算；样本行会被插入到一个临时表中，然后系统会为该临时表创建一个压缩版本。最终返回的比率是压缩版本与非压缩版本大小的对比结果。\n\
  \n压缩建议工具在 Exadata 平台上也可能有用。当然，你本可以直接用不同级别压缩一张表来查看其压缩效果。但如果表非常大，这种方法可能不切实际。此时，你或许会想通过选择\
  \ `rownum < X` 的记录创建一个临时表，然后在该子集上进行压缩测试。这基本就是压缩建议工具的原理，不过它在选择记录集合时更为智能。以下是其在 12c\
  \ 中的使用示例：\n\n```sql\nSQL> ! cat get_comp_ratio_12c.sql\n\nset sqlblanklines on\n\
  set feedback off\n\naccept owner -\nprompt 'Enter Value for owner: ' -\ndefault\
  \ 'MARTIN'\n\naccept table_name -\nprompt 'Enter Value for table_name: ' -\ndefault\
  \ 'T1'\n\naccept comp_type -\nprompt 'Enter Value for compression_type (QH): ' -\n\
  default 'QH'\n\nDECLARE\n  l_blkcnt_cmp      BINARY_INTEGER;\n  l_blkcnt_uncmp \
  \   BINARY_INTEGER;\n  l_row_cmp         BINARY_INTEGER;\n  l_row_uncmp       BINARY_INTEGER;\n\
  \  l_cmp_ratio       NUMBER;\n  l_comptype_str    VARCHAR2 (200);\n  l_comptype\
  \        NUMBER;\nBEGIN\n  case '&&comp_type'\n    when 'BASIC'        then l_comptype\
  \ := DBMS_COMPRESSION.COMP_BASIC;\n    when 'ADVANCED'     then l_comptype := DBMS_COMPRESSION.COMP_ADVANCED;\n\
  \    when 'QL'           then l_comptype := DBMS_COMPRESSION.COMP_QUERY_LOW;\n \
  \   when 'QH'           then l_comptype := DBMS_COMPRESSION.COMP_QUERY_HIGH;\n \
  \   when 'AL'           then l_comptype := DBMS_COMPRESSION.COMP_ARCHIVE_LOW;\n\
  \    when 'AH'           then l_comptype := DBMS_COMPRESSION.COMP_ARCHIVE_HIGH;\n\
  \  END CASE;\n\n  DBMS_COMPRESSION.get_compression_ratio (\n    scratchtbsname \
  \   => 'USERS',              -- where will the temp table be created\n    ownname\
  \           => '&owner',\n    objname           => '&table_name',\n    subobjname\
  \        => NULL,\n    comptype          => l_comptype,\n    blkcnt_cmp        =>\
  \ l_blkcnt_cmp,\n    blkcnt_uncmp      => l_blkcnt_uncmp,\n    row_cmp         \
  \  => l_row_cmp,\n    row_uncmp         => l_row_uncmp,\n    cmp_ratio         =>\
  \ l_cmp_ratio,\n    comptype_str      => l_comptype_str\n  );\n\n  dbms_output.put_line('\
  \ ');\n  DBMS_OUTPUT.put_line ('Estimated Compression Ratio using '||l_comptype_str||':\
  \ '||\n                        round(l_cmp_ratio,3));\n  dbms_output.put_line('\
  \ ');\nEND;\n/\nundef owner\nundef table_name\nundef comp_type\nset feedback on\n\
  ```\n\n以及一些输出示例：\n\n```sql\nSQL> @scripts/get_comp_ratio_12c.sql\nEnter Value for\
  \ owner: MARTIN\nEnter Value for table_name: T2\nEnter Value for compression_type\
  \ (QH): ADVANCED\n\nEstimated Compression Ratio using \"Compress Advanced\": 1.1\n\
  \nSQL> @scripts/get_comp_ratio_12c.sql\nEnter Value for owner: MARTIN\nEnter Value\
  \ for table_name: T2\nEnter Value for compression_type (QH): QL\n\nCompression Advisor\
  \ self-check validation successful. select count(*) on both Uncompressed and EHCC\
  \ Compressed format = 1000001 rows\n\nEstimated Compression Ratio using \"Compress\
  \ Query Low\": 74.8\n```\n\n请注意，该过程可以输出一条验证信息，告诉你用于比较的记录数量。如果需要，可以在调用过程时修改这个数字。`get_comp_ratio_12c.sql`\
  \ 脚本会提示输入表名和压缩类型，然后执行 `DBMS_COMPRESSION.GET_COMPRESSION_RATIO` 过程。\n\n### 实际案例\n\
  \n正如 Yogi Bear 曾经所说，光是观察就能学到很多。市场宣传幻灯片和书籍作者的声称是一回事，但实际数据通常更有用。为了让你对可预期的合理压缩效果有个概念，以下是来自不同行业的几个数据对比。这些数据应该能让你了解\
