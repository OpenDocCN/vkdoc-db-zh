  \ 故障排除并行执行\n\n请注意，在禁用**内存中并行执行**时，统计信息显示物理读取和逻辑读取的数量大致相同，这与首次运行以填充缓冲区缓存的前一个示例类似。但是，现在不是将统计信息\
  \ `physical reads cache` 增加到与 `physical reads` 统计量相同的量，而是统计信息 `physical reads direct`\
  \ 增加到与 `physical reads` 统计量相同的量。另请注意，`fsx2.sql` 脚本显示共享池中有一个新的游标，该游标由八个并行从属进程执行，并卸载到了存储层。这是一个重要的点。内存中并行执行禁用了\
  \ Exadata 通过智能扫描提供的优化。这应该是显而易见的，因为磁盘 I/O 大部分已被内存中并行执行功能消除，但我们认为该功能在 Exadata 平台上不如在其他平台上有用，这也是主要原因。卸载查询显示更短的已用时间（`AVG_ETIME`）的原因在于，大部分处理被卸载到了存储层，这意味着并行进程的处理被进一步并行化，只有结果才会被发送到数据库层。\n\
  \n在 Oracle 11.2 版本之前的时代，当遇到并行执行问题时，清晰地了解整个集群的情况以及并行服务器之间相应工作负载的分布是一项相当大的挑战。更具挑战性的是回答诸如“为什么我的\
  \ SQL 只是部分并行化？”这样的问题。\n\n实时 SQL 监控的引入解决了一些仪表化问题，并通过提供跨并行服务器的资源消耗交互式显示以及执行计划每个步骤的\
  \ SQL 统计详细信息，允许 DBA 和开发人员更详细地分析并行执行。在 11gR2 和 12c 中，`V$SQL_MONITOR` 视图中增加了有关资源管理和并行分配详细信息的额外列，情况已大为改善。本节不会详细讨论如何解读\
  \ SQL 监控报告。相反，它将重点介绍如何利用那些暴露 SQL 监控报告所用信息的视图，以及其他视图，以便进行快速故障排查，并发现降级何时发生以及内存中并行执行何时启动。\n\
  \n使用以下 SQL，您可以收集额外信息，例如 “px_in_memory” 表示查询已针对内存进行亲和性设置，或者用普通话说，正在执行内存中并行查询：\n\n\
  ```\nSQL> !cat other_xml.sql\nselect t.*\nfrom v$sql_plan v,\nxmltable(\n'/other_xml/info'\n\
  passing xmltype(v.other_xml)\ncolumns\ninfo_type varchar2(30) path '@type',\ninfo_value\
  \ varchar2(30) path '/info'\n) t\nwhere v.sql_id = '&sql_id'\nand v.child_number\
  \ = &child_number\nand other_xml is not null;\nSQL> alter session set parallel_degree_policy=manual;\n\
  系统已更改。\nSQL> select avg(pk_col) from kso.skew2;\nAVG(PK_COL)\n-----------\n62500.2406\n\
  SQL> @find_sql\n输入 sql_text 的值: %skew2%\n输入 sql_id 的值:\nSQL_ID          CHILD  PLAN_HASH\
  \  EXECS   ETIME AVG_ETIME USERNAME              SQL_TEXT\n------------- ------\
  \  ---------- ----- ------- --------- -------- ---------------------\natb3q75xavzb6\
  \      0  4220890033     1   10.13     10.13      SYS    select avg(pk_col)\nfrom\
  \ kso.skew2\nSQL> @other_xml\n输入 sql_id 的值: atb3q75xavzb6\n输入 child_number 的值: 0\n\
  INFO_TYPE                       INFO_VALUE\n------------------------------ ---------------\n\
  db_version                      12.1.0.2\nparse_schema                    \"SYS\"\
  \nplan_hash_full                  1438813450\nplan_hash                       4220890033\n\
  plan_hash_2                     1438813450\n```\n\n在这种情况下，额外信息并未揭示很多额外信息。事实上，没有什么大的意外。但是，让我们将\
  \ `PARALLEL_DEGREE_POLICY` 设置为 `AUTO` 并再次执行查询：\n\n```\nSQL> alter session set parallel_degree_policy=auto;\n\
  系统已更改。\nSQL> select avg(pk_col) from kso.skew2;\nAVG(PK_COL)\n-----------\n62500.2406\n\
  SQL> @find_sql\n输入 sql_text 的值: %skew2%\n输入 sql_id 的值:\nSQL_ID          CHILD  PLAN_HASH\
  \  EXECS   ETIME AVG_ETIME USERNAME             SQL_TEXT\n------------- ------ \
  \ ---------- ----- ------- --------- --------------------\natb3q75xavzb6      0\
  \  4220890033     1   10.13     10.13      SYS   select avg(pk_col)\nfrom kso.skew2\n\
  atb3q75xavzb6      2  2117817910     1  113.39    113.39      SYS   select avg(pk_col)\n\
  from kso.skew2\nSQL> @other_xml\n输入 sql_id 的值: atb3q75xavzb6\n输入 child_number 的值:\
  \ 2\nINFO_TYPE                       INFO_VALUE\n------------------------------\
  \ -----------\nderived_cpu_dop                         15\nderived_io_dop      \
  \                     3\ndop                                     15\npx_in_memory_imc\
  \                        no\npx_in_memory                           yes\nio_rate\
  \                                200\nderived_io_dop                           3\n\
  cpu_rate                              1000\nderived_cpu_dop                    \
  \     16\ncpu_rate                              1000\nderived_cpu_dop          \
  \               16\ncpu_rate                              1000\nderived_cpu_dop\
  \                         16\ndb_version                        12.1.0.2\nparse_schema\
  \                      \"SYS\"\nplan_hash_full                  3329629242\nplan_hash\
  \                       2117817910\nplan_hash_2                     3329629242\n\
  ```\n\n这个子游标显示了更多与并行查询相关的信息。事实上，我们现在可以看到发生了内存中并行查询，因为 “px_in_memory” 是 “yes”。另外，我们可以看到并行度为\
  \ 15；“dop” 是 “15”。当不使用自动 DOP 时，`other_xml` 将显示与并行执行相关的额外信息：\n\n```\nINFO_TYPE  \
  \                     INFO_VALUE\n------------------------------ ---------------\n\
  derived_cpu_dop                              0\nderived_io_dop                 \
  \              0\ndop_reason                     table property\ndop           \
  \                             8\npx_in_memory_imc                           no\n\
  px_in_memory                               no\n```\n\n## 总结\n\n语句的并行执行对于最大化 Exadata\
  \ 平台上的吞吐量至关重要。Oracle 数据库版本 11gR2 和 12c 包含多项新特性和增强功能，使并行执行成为一个更可控的功能，这在平台承载混合工作负载时尤为重要。`自动\
  \ DOP` 功能旨在根据单个语句自动做出关于 DOP 的智能决策。`内存中并行执行` 在 Exadata 平台上可能不如在非 Exadata 平台上那样有用，因为它禁用了随\
  \ `智能扫描` 而来的优化。`并行语句排队` 是一个非常有用的功能，因为它允许面向吞吐量的工作与响应时间敏感的工作共存。与 `数据库资源管理器` 的集成通过提供对排队机制的大量额外控制和优先级划分，进一步增强了此功能。\n\
  \n\n# 7. 资源管理\n\n如果资源是无限的，就无需管理它们。我们在日常生活的方方面面都能看到这一点。如果你的车是路上唯一的车，那么交通信号灯就没有必要。如果你是银行里唯一的顾客，那么蜿蜒形成有序队列的绳子就无需存在。但是，众所周知，这种情况很少见，数据库服务器也是如此。当系统负载较轻时，几乎不需要资源管理。进程会在相当一致的时间段内完成。但是当系统变得繁忙、资源变得稀缺时，我们可能会发现自己面对的是一群愤怒的用户。\n\
  \n从数据库的 8i 版本开始，Oracle Database Resource Manager 就已推出，其功能用于管理数据库内部的资源。没有 DBRM，所有数据库连接都被赋予相同的优先级，它们由操作系统调度程序以某种轮询方式提供服务。当系统负载繁重时，所有会话都会受到同等影响。低优先级的应用程序与业务关键型应用程序获得同样高的优先级。我们常常看到一些编写拙劣的即席查询降低了使用相同数据库的关键任务应用程序的性能。如果你担任\
  \ DBA 的时间足够长，尤其是在数据仓库环境中，你可能熟悉 Unix 的`renice`命令。这是一个 root 级别的命令，允许你在操作系统层面影响进程的\
  \ CPU 优先级。多年前，我们曾在一个 DBA 小组工作，支持一个负载特别繁重的数据仓库。`renice`命令经常被用来限制主导系统的数据库会话的 CPU 优先级。这种方法有几个明显的问题。首先，`renice`命令是一个仅对\
  \ root 用户可用的特权命令，系统管理员不太愿意授予 DBA 访问权限。第二个问题是，自动化它来管理 CPU 资源充其量是困难的。Oracle 的 Database\
  \ Resource Manager 是解决这个问题的一种更优雅的解决方案。它允许 DBA 在数据库自身的领域内处理资源分配。这是一个组织良好的框架，设计上是自动化的。它确保关键的系统资源（如\
  \ CPU）在需要时可供你的重要应用程序使用，即使系统处于高负载之下。这是通过创建基于业务需求定义优先级的资源分配方案来实现的。\n\n资源管理的另一个案例是整合。拥有\
  \ Exadata 这样的性能、容量和可扩展性的平台，被许多人视为理想的整合平台是不可避免的。但整合数据库是一个挑战，主要是因为跨数据库管理资源的难度。我们曾与大量客户合作，他们使用\
  \ Exadata 将多个数据库服务器整合到 Exadata 平台上。其中一个客户将 17 个数据库服务器上的 29 个数据库整合到两个 Exadata 全机架中。不用说，如果没有\
  \ Oracle 的资源管理功能，要在如此多的数据库环境之间平衡系统资源将是极其困难的（如果不是不可能的话）。使用数据库资源管理器，实际上没有办法跨数据库对 I/O\
  \ 进行优先级排序。从 Exadata V2 开始，Oracle 在存储服务器中引入了 I/O Resource Manager (IORM)，这使得 DBA\
  \ 能够对 I/O 进行优先级排序。因此，无论你是将多个数据库整合到你的 Exadata 平台上，还是在单个数据库内处理资源密集型应用程序，有效的资源管理都将在你的成功中发挥重要作用。\n\
  \n除了介绍可用于资源管理的 Exadata 和非 Exadata 特定选项之外，我们介绍这些材料的目标是双重的。首先，我们希望提供足够的细节来揭开资源管理的神秘面纱，而不会让读者不知所措。其次，我们旨在展示如何构建一个功能齐全的资源管理模型。这些目标提出了一个独特的挑战。提供太少的信息，读者将只能设置非常简单的配置。提供太多细节，我们有可能使主题复杂化并失去听众。撰写本章最困难的部分一直是两者之间取得平衡。为此，我们创建了简单的、基于共享的单级资源计划。事实上，简单的、单级的资源计划可以解决我们在现实世界中看到的大多数资源管理问题。此外，多级资源计划可能难以设计和测试。在本章中，我们同时演示了多级和单级计划，因为理解它们如何工作很重要。但是，如果你正在考虑使用\
  \ Oracle Resource Manager 或其他资源管理选项，最好的方法是保持简单，并且只在需要时才添加功能。\n\n### 整合\n\n整合的主要驱动力围绕着节省成本。每一代新硬件的发布通常都比前一代更强大，Exadata\
  \ 也是如此。IT 部门可以通过将数据库环境孤岛整合到一个标准化、强大的平台上来利用这一趋势，并通过提高总资源利用率来实现更高的效率——实际上，降低了资本支出和运营支出。在以下部分中，我们将回顾数据库整合的类型。\n\
  \n#### 数据库整合的类型\n\n除了资源需求外，在整合多个数据库时还需要考虑许多因素。这些因素包括但不限于：命名空间、隔离、维护、升级、备份与恢复、克隆和服务水平协议。每种方法都有其自身的优缺点，你很快就会看到。\n\
  \n#### 服务器\n\n这可能是最简单的途径，意味着将多个数据库放到单个数据库服务器上，或者在 Oracle RAC 集群的情况下放到多个服务器上。每个应用程序通过使用专用的数据库进行隔离，这样易于维护和升级。但是随着越来越多的数据库被迁移到服务器上，必须为每个数据库分配的资源数量对可实现的整合密度提出了实际限制。从任何虚拟化整合解决方案的资源角度来看，情况也可能相同，它通常比在服务器上整合数据库有更多的开销，因为每个虚拟机也需要操作系统的资源。对于这类整合，尤其是开发环境（意味着连接数少、使用率低），我们通常看到内存容量首先达到上限。\n\
  \n#### 方案\n\n这种方法将来自多个数据库的独立应用程序方案放入单个实例或 Oracle RAC 数据库中。进行这种类型的整合比服务器方法需要更多的规划和尽职调查。DBA\
  \ 和应用程序团队必须检查是否存在冲突的方案名称或 SQL 与包中硬编码的方案名称。如果存在任何冲突，必须通过一些应用程序和数据库级别的更改来解决。如果所有应用程序方案都能很好地相互适应，意味着没有由于共享数据字典而导致的对象名称冲突，那么整合就会很容易。这种整合的结果是，对于多个应用程序，只需要管理一个数据库和随附的后台进程。这意味着，如果可能，方案级别的整合比服务器级别的整合达到更高的密度。\n\
  \n\n\n#### 多租户\n\nOracle Multitenant 是 Oracle 12c 引入的一个选项，它通过架构变更引入了可插拔数据库的概念。这使得一个\
  \ Oracle 数据库可以成为一个容器，即 CDB。CDB 在实例级别共享一套后台进程、共享内存、undo 表空间、临时表空间、控制文件和重做日志，但可以包含多个隔离的数据库，即\
  \ PDB。PDB 拥有自己独立的数据文件。多租户架构结合了专用数据库的完全隔离与模式整合的高效资源利用率和密度优势。虽然在撰写本文时，我们的大多数客户仍使用\
  \ 11gR2 版本，但 12c 提供的多租户架构在许多情况下都可能带来益处。使用多租户选项后，只需要管理一个数据库。另一方面，PDB 提供了隔离，克服了数据库间的命名冲突问题，这意味着无需更改应用程序。所有\
  \ PDB 都可以在不影响同一 CDB 中其他 PDB 的情况下进行维护，并且它们可以轻松地从某个 CDB 拔出并插入另一个 CDB。多租户架构具有更多的灵活性、功能和优势，本章的本节将对此进行讨论。要了解更多关于\
  \ Oracle Multitenant 的信息，请访问数据库概念指南的第六部分：`http://docs.oracle.com/database/121/CNCPT/part_consol.htm#CHDGDBHJ`。\n\
  \n## 实例限制\n\n实例限制提供了一种在实例级别限制 CPU 资源使用的方法。它依赖于数据库资源管理器来执行限制，因此需要有一个活动的资源管理器计划。请注意，使用数据库资源管理器在数据库内部为消费者组管理\
  \ CPU 资源是一个不同的功能。\n\n实例限制可以解决两个具体问题：\n\n*   管理同一主机上多个数据库实例的 CPU 资源使用，实例限制可以防止一个实例独占\
  \ CPU 资源而影响其他实例。实例限制的重点在于保证数据库性能。\n*   管理同一主机上一个或多个数据库实例的 CPU 资源使用，实例限制可以防止一个或多个数据库实例过度使用\
  \ CPU 资源。实例限制的重点在于防止 CPU 的长时间运行队列。\n\n实例限制本质上是通过计算活动的前台进程和非关键后台进程的数量，并将此数字与 `CPU_COUNT`\
  \ 参数设置的值进行比较来实现的。这一工作由数据库资源管理器完成，这也是它必须处于活动状态的原因。如果活动进程的数量达到或超过 `CPU_COUNT`，数据库资源管理器就会限制下一个想要执行的数据库进程的执行。这种限制可以通过等待事件\
  \ `resmgr: cpu quantum` 观察到。\n\n实例限制一个不太明显的好处是，它只对前台进程和非关键后台进程起作用。这意味着关键后台进程，如日志写入器及其从属进程、LMS\
  \ 进程等，不会被实例限制所限制。因此，在配置了实例限制的实例中，即使活动过多，防止主机 CPU 资源过度使用，也不会导致关键后台进程出现 CPU 饥饿。如果没有实例限制，CPU\
  \ 资源的过度使用将导致所有数据库进程——前台进程和关键后台进程都一样——在长的 CPU 运行队列中等待。关键后台进程在运行队列中等待可能带来严重后果：当日志写入器被排队时，大多数数据库处理将被阻塞；当\
  \ LMS 进程被排队时，集群稳定性可能受到损害，在极端情况下可能导致节点驱逐。\n\n使用实例限制也有一个缺点。当实例限制处于活动状态时，它不会使用超过 `CPU_COUNT`\
  \ 参数配置的更多 CPU 资源，无论资源是否可用。这意味着如果 `CPU_COUNT` 参数设置得过低，主机会显得健康且不繁忙，但数据库处理会因为大量进程被限制而受到影响。\n\
  \n### 配置实例限制\n\n配置实例限制非常简单。设置一个资源计划并将 `CPU_COUNT` 设置为所需的活动进程数。为了谨慎起见，首先查看激活实例限制所必需的参数在\
  \ `spfile` 中的当前内容：\n\n```\nSYS@v12102 AS SYSDBA> show spparameter cpu_count\n\n\
  SID      NAME                          TYPE        VALUE\n-------- -----------------------------\
  \ ----------- ----------------------------\n*        cpu_count                 \
  \    integer\n\nSYS@v12102 AS SYSDBA> show spparameter resource_manager_plan\n\n\
  SID      NAME                          TYPE        VALUE\n-------- -----------------------------\
  \ ----------- ----------------------------\n*        resource_manager_plan     \
  \    string\n```\n\n通过查看 `show spparameter` 的输出，您可以检查 `spfile` 中参数的值。通过 `show parameter`\
  \ 检查这些参数的当前设置，将显示 Oracle 引擎填充的值。在大多数情况下，您会遇到上述情况——`CPU_COUNT` 和 `RESOURCE_MANAGER_PLAN`\
  \ 都未设置。\n\n为了激活实例限制，请将 `CPU_COUNT` 设置为一个值并设置一个资源管理器计划。这两个参数都可以在运行时更改：\n\n```\nSYS@v12102\
  \ AS SYSDBA> alter system set cpu_count=2 scope=both sid='*';\n\nSystem altered.\n\
  \nSYS@v12102 AS SYSDBA> alter system set resource_manager_plan=default_plan scope=both\
  \ sid='*';\n\nSystem altered.\n```\n\n如果您不确定设置哪个资源管理器计划，`DEFAULT_PLAN` 通常是一个不错的选择。`DEFAULT_PLAN`\
  \ 是一个非常简单的计划，它强烈偏向 `SYS_GROUP`，并给 `ORA$AUTOTASK` 组非常低的优先级。\n\n```\nSYS@v12102 AS\
  \ SYSDBA> select group_or_subplan, mgmt_p1, mgmt_p2, mgmt_p3, mgmt_p4\n  2  from\
  \ dba_rsrc_plan_directives where plan = 'DEFAULT_PLAN';\n\nGROUP_OR_SUBPLAN    MGMT_P1\
  \    MGMT_P2    MGMT_P3    MGMT_P4\n---------------- ---------- ---------- ----------\
  \ ----------\nSYS_GROUP                90          0          0          0\nOTHER_GROUPS\
  \              9          0          0          0\nORA$AUTOTASK              1 \
  \         0          0          0\n```\n\n请注意，在维护窗口期间，默认情况下资源管理器计划会在窗口持续时间内更改为 `DEFAULT_MAINTENANCE_PLAN`。在许多情况下，这不是问题。`DEFAULT_MAINTENANCE_PLAN`\
  \ 使用多级计划，其中 `SYS_GROUP` 在第一级获得 75% 的资源，`OTHER_GROUPS` 获得 70%。第二个重要的注意事项是，无论是否设置了实例限制或资源管理器计划，默认维护窗口都会被设置，自动任务也会运行。\n\
  \n但是，如果您在该时段运行时间敏感和/或重要的批处理作业，您可能希望更改或禁用 Oracle 提供的自动任务，使其不与批处理同时运行。有关更改自动任务的更多信息，请参阅《数据库管理员指南》中的“管理自动数据库维护任务”：`http://docs.oracle.com/`。\n\
  \n\n\n### 设置 CPU_COUNT\n\n实例笼统功能依赖于将 `CPU_COUNT` 设置为前台进程和非关键后台进程的总数。如前所述，`CPU_COUNT`\
  \ 可以在线设置和更改。根据 Oracle 的建议，需要提醒一句：不要过于频繁地更改此值，也不要进行大幅度的数值变动。另一个重要的警告是不要将 `CPU_COUNT`\
  \ 的值设置为低于 2，因为在某些情况下这可能阻止前台进程运行。\n\n### 实例笼统的用法与结果\n\n如果你通读了本章，你已经看到我们通过在“配置实例笼统”处将\
  \ `CPU_COUNT` 设置为 2 并将 `DEFAULT_PLAN` 资源管理器计划设置为启用，从而启用了实例笼统。为了展示这意味着什么，我们使用了一个名为\
  \ `burn_cpu.sql` 的小脚本，其内容如下：\n\n```\ndeclare\n  run boolean := true;\nbegin\n  while\
  \ run loop\n    execute immediate 'select sqrt( 9999999999 ) from dual';\n  end\
  \ loop;\nend;\n/\n```\n\n如果我们启动两个普通用户（即非 SYS）会话并让它们运行一段时间，我们就可以使用 `V$RSRCMGRMETRIC`\
  \ 视图来查看资源消耗和资源管理器限流情况。这个视图的特殊之处在于，它显示的是过去一分钟的统计数据。视图内容刷新后，会等待一分钟，在此期间视图内容不会改变，然后随下一分钟的最新测量值而变化：\n\
  \n```\nSYS@v12102 AS SYSDBA> select consumer_group_name,\n  2  cpu_consumed_time/(intsize_csec*10)\
  \ \"CPU_USED\",\n  3  cpu_wait_time/(intsize_csec*10) \"CPU_WAIT\"\n  4  from v$rsrcmgrmetric;\n\
  \nCONSUMER_GROUP_NAME              CPU_USED   CPU_WAIT\n------------------------------\
  \ ---------- ----------\nORA$AUTOTASK                   .000166528          0\n\
  OTHER_GROUPS                   1.91517069 .000066611\nSYS_GROUP                \
  \      .000099917          0\n_ORACLE_BACKGROUND_GROUP_               0        \
  \  0\n```\n\n我们看到的是，“普通用户”会话在 `OTHER_GROUPS` 消费者组中执行，并几乎占用了 2 个 CPU。正在发生极少量的限流，这在\
  \ `CPU_WAIT` 列中可见。发生限流是因为 `ORA$AUTOTASK` 和 `SYS_GROUPS` 有少量的 CPU 使用。\n\n有趣的是，看看如果我们再添加一个执行\
  \ `burn_cpu.sql` 的会话会发生什么：\n\n```\nSYS@v12102 AS SYSDBA> select consumer_group_name,\n\
  \  2  cpu_consumed_time/(intsize_csec*10) \"CPU_USED\",\n  3  cpu_wait_time/(intsize_csec*10)\
  \ \"CPU_WAIT\"\n  4  from v$rsrcmgrmetric;\n\nCONSUMER_GROUP_NAME              CPU_USED\
  \   CPU_WAIT\n------------------------------ ---------- ----------\nORA$AUTOTASK\
  \                   .000133289          0\nOTHER_GROUPS                   1.84096968\
  \ 1.04265245\nSYS_GROUP                      .000166611          0\n_ORACLE_BACKGROUND_GROUP_\
  \               0          0\n```\n\n我们看到 `CPU_USED` 保持在略低于 2，增加一个会话导致 `CPU_WAIT`\
  \ 指标上升。此时，重要的是要指出，使用实例笼统时，会话是在 CPU 上以轮询方式被限流，而不是特定进程被长时间挂起。这在 Linux 的 “top” 工具中非常明显，在这种情况下，它会显示运行\
  \ `burn_cpu.sql` 脚本的进程的 CPU 百分比大约为 66%（66 x 3 = 198%，所以几乎是 200%，即 `CPU_COUNT` 的值）。\n\
  \n### 实例笼统与多租户\n\n当在可插拔数据库上使用实例笼统时，它只能应用于 CDB 级别。这限制了 CDB 及其所有 PDB 的活动进程总数。进一步的\
  \ CPU 管理必须使用资源管理器计划来完成。\n\n### 超量分配\n\n在实例笼统领域的超量分配，指的是将比服务器实际可用的更多的 CPU 资源（服务器上所有实例的\
  \ `CPU_COUNT` 总和）分配给数据库的做法。当你的服务器托管多个具有互补峰值工作负载计划的数据库时，这非常有用。例如，如果一个数据库在白天需要大量 CPU\
  \ 资源来处理类似 OLTP 的事务，但在夜间大部分时间空闲，而另一个数据库在夜间执行类似数据仓库的事务（需要大量 CPU 资源），但在白天大部分时间空闲，那么将两者限制在可用\
  \ CPU 的 50% 是最安全但性能并非最佳的选择。相反，你可能希望将两者都设置为，例如，可用 CPU 的 75%。这引入了这样一个风险：如果两个数据库在同一时间都需要大量\
  \ CPU 资源，尽管预测了不同的 CPU 资源使用高峰时间（75 + 75 = 150%，即超量分配了 50%），它们仍然需要竞争 CPU 资源；但其优势在于使用了否则将无法使用的\
  \ CPU 数量。这意味着，超量分配就像生活中的所有事情一样，是一种权衡。\n\n### 使用 Cgroups 将实例绑定到特定 CPU\n\nLinux 的\
  \ “cgroups” 或 “控制组” 功能提供了一种限制、核算和隔离资源使用的方法，它随内核版本 2.6.24 引入，从带有不可破企业内核 (UEK) 版本\
  \ 2 的 Oracle Linux 5 或 Oracle Linux 6 及更高版本开始可用。随着 Oracle 数据库 12c 版本以及 Oracle 版本\
  \ 11.2.0.4 的发布，数据库通过 `PROCESSOR_GROUP_NAME` 参数集成了 cgroups 功能。\n\ncgroups 功能为你提供了隔离部分资源（具体到\
  \ Oracle 数据库，特别是 CPU 或特定 NUMA 节点）的机会，方法是将它们分配给特定的 cgroups。一个用例是通过将这些数据库组绑定到特定的 CPU，为不同的数据库组设置不同的整合密度。请注意，两路\
  \ Exadata 计算节点（即 “dash two” 服务器，如 X5-2、X4-2 等）是 NUMA 系统，但在 grub 的内核加载行 (`/etc/grub.conf`)\
  \ 中禁用了 NUMA (`numa=off`)。这意味着 cgroups 只能用于隔离到特定的 CPU。正如你可能猜到的，八路 Exadata 计算节点（即\
  \ “dash eight” 服务器）启用了 NUMA，这意味着既可以基于 NUMA 节点，也可以基于 CPU 进行隔离。\n\n在 Oracle 数据库中使用\
  \ cgroups 的最简单方法是使用 My Oracle Support 注释中提供的脚本：“使用 `PROCESSOR_GROUP_NAME` 将数据库实例绑定到\
  \ Linux 上的 CPU 或 NUMA 节点”（文档 ID 1585184.1）。\n\n\n\n# Cgroups 的安装与配置\n\n脚本下载后，最合理的存放位置是\
  \ root 用户的家目录。脚本执行的任何操作都需要以 root 身份进行。首先，我们来查看系统信息：\n\n`# ./setup_processor_group.sh\
  \ -show`\n\n```\nThis is a NUMA system.\nNUMA configuration:\n-------------------\n\
  Node 0\nCPUs: 0-15\nMemory Total: 75488296 kB Free: 13535460 kB\nThis system does\
  \ not have any processor group.\n```\n\n该脚本是在一台 Exadata V2 机器上运行的，这就是显示约 75GB 内存的原因。它表明这是一个\
  \ NUMA 系统，并显示了一个节点。之所以只显示一个节点（节点 0），是因为 Exadata 双路计算节点在内核加载行关闭了 NUMA（请参见 `/etc/grub.conf`\
  \ 中的 \"kernel\" 行，其中列出了 \"numa=off\" 设置）。\n\n为了通过 `setup_processor_group.sh` 脚本使用\
  \ cgroups，系统需要使用该脚本进行“准备”。这只需要执行一次。准备过程如下：\n\n`# ./setup_processor_group.sh -prepare`\n\
  \n```\nSUCCESS: -prepare complete\nNext step: create a new proc group using option\
  \ -create\n```\n\n运行此命令后，使用 `–check` 开关执行 `setup_processor_group.sh` 来验证准备情况：\n\n\
  `# ./setup_processor_group.sh -check`\n\n```\nsetup_processor_group.sh -prepare\
  \ has been run on this system\n```\n\n准备过程会修改 `/etc/rc.local`，并添加脚本 `/etc/ora_autopg`。该脚本\
  \ `/etc/ora_autog` 会在 `/mnt/cgroup` 上挂载 cgroup 伪文件系统，并运行 `setup_processor_group.sh`\
  \ 脚本（该脚本已被复制到 `/etc`），同时加载文件 `/etc/auto_orapg.conf` 中的 cgroup 设置。\n\n现在主机已准备就绪，下一步是了解节点上的\
  \ CPU 拓扑结构。使用此脚本来了解您的系统外观：`cpu_topo.sh。`\n\n```\necho \"== summary ==\"\nCPUINFO=\"\
  /proc/cpuinfo\" || CPUINFO=$1\nawk -F: ’/^physical/ && !ID[$2] { P++; ID[$2]=1 };\
  \ /^cpu cores/ { CORES=$2 };  /^cpu cores/ { T++ }; END { print \"sockets: \"P\"\
  \\ntot cores: \"CORES*P\"\\ntot threads: \"T }’ $CPUINFO\necho \"== cpu map ==\"\
  \necho \" T -  S -  C\"\nC=0\ncat /proc/cpuinfo | egrep \"processor|physical id|core\
  \ id\" | awk ’{ print $(NF) }’ | while read V; do\n[ $C -lt 2 ] && printf \"%2d\
  \ - \" $V || printf \"%2d\\n\" $V\n[ $C -lt 2 ] && let ++C || C=0\ndone\n```\n\n\
  在我的测试系统上，输出如下：\n\n`# ./cpu_topo.sh`\n\n```\n== summary ==\nsockets: 2\ntot cores:\
  \ 8\ntot threads: 16\n== cpu map ==\nT -  S -  C\n0 -  0 -  0\n1 -  0 -  1\n2 -\
  \  0 -  2\n3 -  0 -  3\n4 -  1 -  0\n5 -  1 -  1\n6 -  1 -  2\n7 -  1 -  3\n8 -\
  \  0 -  0\n9 -  0 -  1\n10 -  0 -  2\n11 -  0 -  3\n12 -  1 -  0\n13 -  1 -  1\n\
  14 -  1 -  2\n15 -  1 -  3\n```\n\n这表明我的系统有两个插槽（S 列，插槽 0 和 1），每个插槽有四个核心（C 列，编号 0\
  \ 到 3）。线程号（T 列）是操作系统的 CPU 编号。这意味着在此系统上操作系统可见的 CPU 实际上是（超）线程。如果您仔细观察，会发现线程 0 和 8\
  \ 连接到同一个核心（两者的 S 和 C 都是 0）。为了完全隔离工作负载，根据核心将不同的 cgroups 隔离起来非常重要。这种隔离很重要，因为一个 CPU\
  \ 线程应仅被视为一个执行上下文，需要一个核心来执行。这意味着如果一个 CPU 线程正在使用其连接的核心，另一个线程必须等待该核心变为可用才能执行。当两个线程都想执行时，只有一个能真正执行——另一个则等待。由于这种等待是\
  \ CPU 内部事件，操作系统不可见，并且表现为在 CPU 上运行。换句话说，它是不可见的。\n\n让我们创建一个名为 \"singlecore\" 的 cgroup，并将该组绑定到处理器编号\
  \ 0 和 8，从而将其绑定到一个核心上：\n\n`# ./setup_processor_group.sh -create -name singlecore\
  \ -cpus 0,8 -u:g oracle:dba`\n\n```\nSUCCESS: -create complete for processor group\
  \ singlecore\nTo start an Oracle instance in this processor group,\nset the database\
  \ initialization parameter:\nPROCESSOR_GROUP_NAME=singlecore\n```\n\n请注意 `-u:g`\
  \ 开关。它用于设置系统上配置的 Oracle 可执行文件的用户和组。要查看其配置方式，请列出 `$ORACLE_HOME/bin` 中 oracle 可执行文件的用户和组。\n\
  \n如 `-create` 的输出所述，下一个也是最后一步是设置数据库参数 `PROCESSOR_GROUP_NAME`，以使实例遵守为其配置的 cgroup\
  \ 设置。如果实例在设置了 `PROCESSOR_GROUP_NAME` 指向某个控制组的情况下启动，则 `alert.log` 文件将显示如下内容：\n\n\
  ```\nInstance has been started in processor group singlecore (NUMA Nodes: 0 CPUs:\
  \ 0,8)\n```\n\n当在使用多租户选项的情况下使用 cgroups 和 `PROCESSOR_GROUP_NAME` 数据库参数时，必须在 CDB 级别设置\
  \ `PROCESSOR_GROUP_NAME` 参数。可插拔数据库将继承 cgroup 属性并遵守它们。\n\n# Oracle 12c 的 THREADED_EXECUTION\n\
  \nOracle 12c 引入了一个新的初始化参数 `THREADED_EXECUTION`。当此参数设置为 `TRUE` 时，Oracle 可执行文件将作为进程内的线程运行某些数据库进程。通过将多个数据库进程作为线程组合在一个操作系统进程内，减少了操作系统级别的进程数量。请注意，当启用\
  \ `THREADED_EXECUTION` 时，一些后台进程作为线程运行；但是，通过监听器创建的用户进程仍将是进程，除非监听器参数 `DEDICATED_THROUGH_BROKER_<listener\
  \ name>` 设置为 `ON`。一些关键的后台进程，如 `PMON、DBWn、VKTM 和 PSP`，无论 `THREADED_EXECUTION` 是否设置为\
  \ `TRUE`，仍将继续使用专用进程。\n\n我们尚未对线程执行模型进行彻底测试。我们所做的测试表明，在性能方面，默认的进程模型和线程模型处于同一水平。在我们执行的测试中，两种模型都可能胜出。\n\
  \n进程（独立并拥有自己的地址空间）与线程（共享创建它们的进程的地址空间）之间确实存在概念上的差异。然而，像 Linux 这样的现代操作系统会尽可能努力减少需要完成的工作量。其中一项优化是，在创建进程时，新进程的地址空间几乎完全通过指针与其父进程共享。只有当新进程开始写入内存页面时，才会以写时复制的方式分配新页面。因此，与线程相比，为进程分配内存没有显著的额外开销。\n\
  \n与许多技术功能一样，最好选择大多数用户的选择，以便在 Oracle 内核代码中获得最稳定、经过最充分测试的执行路径。有限的测试表明性能没有显著提升。这些就是当前建议使用常规进程模型并将\
  \ `THREADED_EXECUTION` 保留为其默认值 `FALSE` 的原因。\n\n\n## PGA 内存管理\n\nOracle 数据库 12c 版本引入了参数\
  \ `PGA_AGGREGATE_LIMIT`。这个参数的目的非常明确，即限制数据库实例整体的 PGA 内存使用量。当然，要使用 `PGA_AGGREGATE_LIMIT`，需要先启用\
  \ Oracle 的自动 PGA 管理功能，这意味着必须将 `PGA_AGGREGATE_TARGET` 参数设置为一个非零值。`PGA_AGGREGATE_TARGET`\
  \ 参数的功能是设置您期望实例的 PGA 内存总量所占用的内存量。请注意，本段描述的是专用服务器进程，而非共享服务器/多线程服务器进程。\n\n理解以下这一点很重要：通过设置\
  \ `PGA_AGGREGATE_TARGET` 参数，并不能保证实例不会为 PGA 分配使用更多的内存，因此它才被命名为 `PGA_AGGREGATE_TARGET`。本质上，`PGA_AGGREGATE_TARGET`\
  \ 会限制并分配活动进程的工作区，以努力使整体的 PGA 内存使用量低于通过 `PGA_AGGREGATE_TARGET` 设置的大小。工作区分配指的是执行过程中所需的排序、哈希和位图内存。当然，单个进程的排序量，或者执行哈希连接时哈希表的大小是没有限制的。当所需内存量超过工作区大小时，内容会被移动到会话的临时表空间，并继续处理。\n\
  \n那么，如果 `PGA_AGGREGATE_TARGET` 是通过对进程排序、哈希和位图区域的大小调整来工作的，那是什么原因导致实例使用比 `PGA_AGGREGATE_TARGET`\
  \ 设置值更多的内存呢？以下是我们遇到的一些情况；可能还有更多原因：\n\n*   不能简单地将 `PGA_AGGREGATE_TARGET` 参数设置一个值，就指望实例中的所有会话都遵守它。每个启动的会话都需要一个最小的内存占用空间才能运行。这意味着，相对于正在使用的会话数量，如果\
  \ PGA 目标设置得太小，实例就会分配比设置值更多的内存。\n*   像数组和集合这样的 PL/SQL 变量可以被任何单个会话无限制地使用和扩展。任何一个这样的会话在\
  \ Oracle 11.2 版本中最多可以使用 4GB，在 Oracle 12.1 版本中最多可以使用 32GB（这特指常用于 Exadata 平台的 Linux\
  \ x86-64），前提是操作系统限制允许并且有足够的虚拟内存来容纳。请注意是虚拟内存——物理内存可能在虚拟内存耗尽之前就已耗尽，这意味着操作系统需要通过将当前内存内容交换到交换设备来满足内存分配。\n\
  *   会话中使用排序、哈希或位图内存的每个游标也有一个最小的内存占用。如果在会话中分配了大量使用这些内存区域的游标，那么无论 `PGA_AGGREGATE_TARGET`\
  \ 如何设置，都会分配一定量的内存。\n\n现在让我们退一步看。在大多数情况下，特别是当应用程序通过连接池分配会话时，连接数量是静态的，并且很少或根本不使用 PL/SQL\
  \ 变量。这意味着实例的 PGA 将占用所需的内存，并在其整个生命周期内保持该内存量。因此，实际的 PGA 内存使用量可能远低于实际设置的 `PGA_AGGREGATE_TARGET`\
  \ 值，也可能接近该值或更高，这完全取决于应用程序的请求类型、游标数量以及数据库中的连接数。它也可能高出很多，正如我们刚才描述的，数据库进程会获取所需的内存，而不管设置了什么值。一个良好的实践是定期测量\
  \ `V$PGASTAT` 中的实际 PGA 使用情况，通过在一段正常运行期后查看“maximum PGA allocated”统计信息，来观察实际使用的高水位线与\
  \ `PGA_AGGREGATE_TARGET` 设置值之间是否存在显著差异。\n\n然而，有时 PGA 的使用并非那么静态。如果您的系统上操作系统、Clusterware、ASM\
  \ 和数据库实例之间的内存是精心分配的，这可能导致问题，因为过度的 PGA 分配意味着请求的内存超出了预算。使用的内存无法保留在主内存中，操作系统需要将内存内容交换到磁盘。每当发生这种情况时，都会明显观察到性能的急剧下降。\n\
  \n上面描述的这些情况，正是 `PGA_AGGREGATE_LIMIT` 参数被创建的原因。它将尝试通过终止会话的当前执行来限制 PGA 内存分配，当发现实例中分配给\
  \ PGA 的内存过多，并且该会话正在为不可调整的 PGA 进行分配时，就会终止执行。这种终止会在会话中产生一个 “`ORA-04036: PGA memory\
  \ used by the instance exceeds PGA_AGGREGATE_LIMIT`” 错误。请注意，后台进程和 SYS 连接不受此限制。对于此功能，并行查询进程不被视为后台进程，因此它们也可能被终止，这将针对用于给定执行的整组并行查询进程进行。\n\
  \n然而，测试表明，在 12.1.0.2 版本中，`PGA_AGGREGATE_LIMIT` 远非一个硬性限制。在我们的研究中，我们发现当 PGA 分配超过 `PGA_AGGREGATE_LIMIT`\
  \ 时，内存管理代码会在真正终止一个或多个执行以符合 `PGA_AGGREGATE_LIMIT` 之前，对作为终止候选者的会话进行 4 到 20 次的采样。这样做的好处是短暂的高内存使用峰值不会立即导致执行终止，但缺点是实际内存使用量可能会大大超过\
  \ `PGA_AGGREGATE_LIMIT`，具体取决于分配的速度。\n\n以下代码示例为一个关联数组分配内存。因为我们知道它会触发 ORA-4036，异常处理程序将打印错误代码、开始时的\
  \ PGA 和最后测量的 PGA，以及为 `PGA_AGGREGATE_TARGET` 和 `PGA_AGGREGATE_LIMIT` 设置的值，以便研究进程内存分配情况：\n\
  \n`pga_filler.sql`:\n\n```sql\ndeclare\n  type vc2_ar is table of varchar2(32767)\
  \ index by pls_integer;\n  vc vc2_ar;\n  v varchar2(32767);\n  target number;\n\
  \  start_pga number;\n  current_pga number;\n  agg_target number;\n  agg_limit number;\n\
  \  counter number := 0;\nbegin\n  select value into agg_target from v$parameter\
  \ where name = 'pga_aggregate_target';\n  select value into agg_limit from v$parameter\
  \ where name = 'pga_aggregate_limit';\n  select value into start_pga from v$mystat\
  \ m, v$statname n where m.statistic#=n.statistic# and name = 'session pga memory';\n\
  \  for idx in 1 .. 30000000 loop\n    v := rpad('x',32767,'x');\n    vc(idx) :=\
  \ v;\n    counter := counter + 1;\n    if counter = 300 then\n      select value\
  \ into current_pga from v$mystat m, v$statname n where\n        m.statistic#=n.statistic#\
  \ and name = 'session pga memory';\n      counter := 0;\n    end if;\n  end loop;\n\
  exception when others then\n  dbms_output.put_line('error message :'||SQLERRM);\n\
  \  dbms_output.put_line('start pga     :'||start_pga);\n  dbms_output.put_line('last\
  \ pga      :'||current_pga);\n  dbms_output.put_line('pga agg target:'||agg_target);\n\
  \  dbms_output.put_line('pga agg limit :'||agg_limit);\nend;\n/\n```\n\n请不要使用 `SYS`\
  \ 用户测试此代码，因为 `SYS` 会话不会被限制。如果使用 `SYS` 用户，上面的代码要么会完成执行，要么当 PGA 内存已分配 4G（Oracle 11.2）或\
  \ 32G（Oracle 12.1），或者达到操作系统限制时，会报 `ORA-4030`（out of process memory when trying to\
  \ allocate %s bytes (%s,%s)）错误。\n\n```\nTS@v12102 > @pga_filler\nerror message :ORA-04036:\
  \ PGA memory used by the instance exceeds PGA_AGGREGATE_LIMIT\nstart pga     :3338760\n\
  last pga      :807924232\npga agg target:524288000\npga agg limit :629145600\nPL/SQL\
  \ procedure successfully completed.\n```\n\n\n此示例是执行 `pga_filler.sql` 脚本的输出。本次执行显示\
  \ `PGA_AGGREGATE_TARGET` 设置为 524288000 (500M)，`PGA_AGGREGATE_LIMIT` 设置为 629145600\
  \ (600M)。当 PL/SQL 过程开始执行时，PGA 的大小为 3338760 (略高于 3M)。该 PL/SQL 块确实遇到了一个 ORA-4036 错误，此时\
  \ PGA 已增长到 807924232 (770M)。这清楚地表明，`PGA_AGGREGATE_LIMIT` 所设定的限制更像是一个考虑终止进程的**起点**，而非一个硬性限制。\n\
  \n这意味着，如果您有明确的限制 PGA 内存分配的需求，您应该将其设置为低于您实际所需的 PGA 内存限制。最重要的是，必须非常彻底地进行测试，尤其是在达到\
  \ PGA 限制并用于防止服务器开始交换（从而导致性能死亡螺旋）的情况下。\n\n对于 Oracle 12c 之前的版本，Oracle 在一份关于 Exadata\
  \ 整合的白皮书中引入了一个（未记录的）事件，以限制每个进程的 PGA 分配。这与在实例级别工作的 `PGA_AGGREGATE_LIMIT` 并不完全相同。该事件是\
  \ `10261`，它控制单个进程（包括 SYS 连接）被允许分配的 PGA 量。如果分配的内存量超过为此事件设置的级别（在 Oracle 11.2.0.3 及之前版本中），将引发一个\
  \ ORA-600 错误；在 Oracle 11.2.0.4 版本中则会引发 ORA-10260 错误。请注意，此事件也不是一个硬限制；测试显示它可能比设置值多出大约\
  \ 100MB。设置此事件的方法如下：\n\n```\nalter system set events = '10261 trace name context\
  \ forever, level <PGA LIMIT IN BYTES>';\n```\n\n由于这是一个未记录的事件，它应仅作为**最后手段**的解决方案。如果您确实需要使用这种\
  \ PGA 内存限制方式，您应该寻求 Oracle 支持部门的认可，并获取针对您具体情况的指导。\n\n### 数据库资源管理器\n\n数据库资源管理器自 Oracle\
  \ 8i (1999) 就已存在，其基本目的是在数据库层面管理 CPU 资源。Exadata V2 引入了一项名为 I/O 资源管理器的新特性，正如您可能预料的那样，它旨在管理和优先处理存储单元层的\
  \ I/O。当 Exadata 上的数据库向存储单元请求 I/O 时，它们会随请求发送附加信息，以标识发出请求的数据库以及发出请求的使用者组。存储单元上的软件（Cellserv\
  \ 或 `cellsrv`）知晓数据库内部（DBRM）和/或存储单元（IORM）的使用者组优先级，并据此管理 I/O 的调度方式。DBRM 和 IORM 紧密结合在一起，因此，在您能理解\
  \ IORM 之前，对 DBRM 有扎实的理解非常重要。数据库资源管理器是一个冗长的话题，完全可以单独写成一本书。因此，我们将重点讨论开发有效的 IORM 资源计划所需的基本结构。如果您已有\
  \ DBRM 的经验，或许可以跳过本节内容。\n\n借助（Oracle 12c 的）多租户选项，数据库资源管理器增加了一个额外的层次。如上所述，传统的数据库资源管理器在数据库内部管理资源；然而，有了多租户选项，您实质上拥有了“数据库中的数据库”。为了在根/容器数据库中管理（可插拔）数据库之间的资源，需要在根数据库级别进行资源管理，这被称为\
  \ CDB（容器数据库）资源计划；此外，还需要在可插拔数据库内部进行资源管理，这与上述传统的非容器数据库几乎完全相同。\n\n在开始之前，让我们回顾一下本主题中将使用的术语。表\
  \ 7-1 描述了数据库资源管理器的各种组件。我们将在后续讨论中更详细地阐述它们。\n\n表 7-1.\n资源管理器组件描述\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| 资源使用者组 (Resource consumer group) | 这些是您可能看到资源使用者组被引用的不同名称。资源管理器将资源分配给使用者组，而非用户会话。使用者组是一组可以根据其优先级和/或资源需求分组在一起的数据库会话。\
  \ |\n| 资源计划指令 (Resource plan directive) | 这些是您可能看到资源计划指令被引用的名称。资源分配并非直接分配给使用者组，而是在资源计划指令中定义。然后，将使用者组分配给计划指令，以便可以执行资源分配。在\
  \ CDB 计划的情况下，资源分配被指定给一个可插拔数据库。 |\n| 资源计划 (Resource plan) | 资源计划有时被简称为“计划”或“该计划”。计划指令被分组在一起以创建一个资源计划，从而定义分配给数据库中所有会话的总体资源分配。在多租户选项的情况下，可以有\
  \ CDB 计划来管理可插拔数据库之间的资源，以及常规计划，它们在可插拔数据库内部运作。 |\n\n如表 7-2 所示，根据您是在非 CDB 还是 CDB 中使用\
  \ DBRM，DBRM 包含：\n\n表 7-2.\n基于租户类型的资源管理器组件\n\n| 选项 | 资源管理器组件 |\n| --- | --- |\n|\
  \ 非多租户 | 计划 ➤ 指令 ➤ 使用者组 |\n| 多租户 | CDB: 计划 ➤ 指令 ➤ 可插拔数据库<br>PDB: 计划 ➤ 指令 ➤ 使用者组\
  \ |\n\n\n# 创建 CDB 资源计划\n\n存储单元级别的多租户支持随单元版本 12.1.1.1.0 引入。如果您已创建容器数据库并希望进行资源管理，则必须首先创建一个\
  \ CDB 资源计划，这正是我们现在要做的。请注意，在可插拔数据库内部进行资源管理需要 CDB 资源计划。如果您创建的是常规/非多租户数据库，或者您正在寻找 PDB\
  \ 资源计划，您可能需要跳过本部分，转到“创建（可插拔）数据库资源计划”章节。\n\n下一个示例为一个虚构的容器数据库（包含三个可插拔数据库：`database1`、`database2`和`database3`）创建一个名为`cdb_plan`的\
  \ CDB 资源计划：\n\n```sql\nbegin\nDBMS_RESOURCE_MANAGER.CLEAR_PENDING_AREA;\nDBMS_RESOURCE_MANAGER.CREATE_PENDING_AREA;\n\
  DBMS_RESOURCE_MANAGER.CREATE_CDB_PLAN(plan=>'cdb_plan');\nDBMS_RESOURCE_MANAGER.CREATE_CDB_PLAN_DIRECTIVE(\n\
  \    plan=>'cdb_plan',\n    pluggable_database=>'database1',\n    shares=>4,\n \
  \   utilization_limit=>null,\n    parallel_server_limit=>null);\nDBMS_RESOURCE_MANAGER.CREATE_CDB_PLAN_DIRECTIVE(\n\
  \    plan=>'cdb_plan',\n    pluggable_database=>'database2',\n    shares=>1,\n \
  \   utilization_limit=>10,\n    parallel_server_limit=>0);\nDBMS_RESOURCE_MANAGER.CREATE_CDB_PLAN_DIRECTIVE(\n\
  \    plan=>'cdb_plan',\n    pluggable_database=>'database3',\n    shares=>1,\n \
  \   utilization_limit=>null,\n    parallel_server_limit=>10);\nend;\n/\n```\n\n\
  `PL/SQL procedure successfully completed.`\n\n这个计划需要一些解释。正如您稍后将在（可插拔）数据库资源计划中看到的那样，CDB\
  \ 计划通常比数据库资源计划简单得多。CDB 计划本质上是位于 CDB 根目录中的一个计划，其中包含针对 PDB 的指令。对于每个可插拔数据库，您可以分配一定数量的份额（shares），这用于设置可插拔数据库的优先级。在本例中，总份额为\
  \ 4+1+1=6；`database1`拥有四个份额意味着，如果所有可插拔数据库都需要竞争 CPU 资源，它将获得 4/6*100=66%的 CPU 资源。参数`utilization_limit`是一个百分比，指定了一个可插拔数据库被允许使用的总\
  \ CPU 容量的百分比。`utilization_limit`对于 PDB 不是累积的——您可以为任何 PDB 指定 100（百分比），这与`null`（无限制）的效果相同。您可以使用`parallel_server_limit`来设置并行执行服务器数量的百分比，该数量由`PARALLEL_SERVERS_TARGET`参数设定。\n\
  \n您可能想知道，如果 DBA 创建了一个未在 CDB 计划中指定的可插拔数据库，会发生什么情况：在它被明确指定到 CDB 计划之前，是否可以自由使用任何资源？答案是否定的：如果已启用\
  \ CDB 计划，那么未在 CDB 计划中指定的可插拔数据库将遵循默认指令设置。默认指令设置为：1 个份额，100（%）的`utilization_limit`，以及\
  \ 100（%）的`parallel_server_limit`。您可以使用`DBMS_RESOURCE_MANAGER.UPDATE_CDB_DEFAULT_DIRECTIVE()`过程来更改默认指令设置。\n\
  \n至此，计划`cdb_plan`已创建完成。下一步是验证该计划，如果验证完成且没有警告，则提交该计划：\n\n```sql\nbegin\nDBMS_RESOURCE_MANAGER.VALIDATE_PENDING_AREA();\n\
  end;\n/\n```\n\n`PL/SQL procedure successfully completed.`\n\n```sql\nbegin\nDBMS_RESOURCE_MANAGER.SUBMIT_PENDING_AREA();\n\
  end;\n/\n```\n\n`PL/SQL procedure successfully completed.`\n\n现在，CDB 计划已提交，它被添加到数据字典中，并且可以通过设置`RESOURCE_MANAGER_PLAN`参数来启用。CDB\
  \ 计划只能在容器数据库的根数据库中启用。启用资源管理器计划的方式如下：\n\n```sql\nSQL> alter system set resource_manager_plan=cdb_plan\
  \ sid='*';\n```\n\n`System altered.`\n\n如果此计划导致容器中运行的数据库出现问题，可以发出另一个`alter system\
  \ set resource_manager_plan`命令以恢复到旧的资源管理器计划，或者，如果没有旧的资源管理器计划，则可以将其设置为`''`（单引号，单引号）以重置资源管理器计划。\n\
  \n另一个需要注意的事项是 Oracle 数据库中的自动维护作业。这些作业在安装后默认启用，会在维护窗口期间设置`DEFAULT_MAINTENANCE_PLAN`资源管理器计划。如果您依赖自己的资源管理器计划来满足服务级别要求，您可以更改或禁用维护窗口，或者在通过`alter\
  \ system`设置资源管理器计划时，在计划名称前添加`FORCE:`前缀来强制使用您自己的资源管理器计划。\n\n如果您想获取有关 CDB 计划的更多信息，当前的\
  \ Oracle 12 版本包含以下可从 CDB 根目录访问的 DBA 视图：\n\n*   `DBA_CDB_RSRC_PLANS`\n*   `DBA_CDB_RSRC_PLAN_DIRECTIVES`\n\
  \n#### 创建（可插拔）数据库资源计划\n\n无论您拥有一个可插拔数据库并设置了 CDB 资源管理计划，现在想要管理单个可插拔数据库内部的资源，还是选择不使用多租户选项而只想管理数据库中的资源，本节都将帮助您创建数据库资源管理计划。使用多租户选项时请注意，为了在可插拔数据库中设置资源管理器，需要先有一个活动的\
  \ CDB 资源管理器。\n\n以下将创建一个名为`DAYTIME_PLAN`的数据库资源计划，该计划包含用于联机处理（`OLTP`）、批处理/长时间运行作业（`BATCH`）和维护（`MAINTENANCE`）的使用者组。您需要在\
  \ PDB 中以管理用户身份连接，而不是在 CDB 根目录中，这些命令才会生效：\n\n```sql\nbegin\nDBMS_RESOURCE_MANAGER.CLEAR_PENDING_AREA;\n\
  DBMS_RESOURCE_MANAGER.CREATE_PENDING_AREA;\nDBMS_RESOURCE_MANAGER.CREATE_PLAN(\n\
  plan    =>’DAYTIME_PLAN’,\nmgmt_mth=>’RATIO’);\nDBMS_RESOURCE_MANAGER.CREATE_CONSUMER_GROUP(\n\
  consumer_group   => ’MAINTENANCE’);\nDBMS_RESOURCE_MANAGER.CREATE_CONSUMER_GROUP(\n\
  consumer_group   => ’OLTP’);\nDBMS_RESOURCE_MANAGER.CREATE_CONSUMER_GROUP(\nconsumer_group\
  \   => ’BATCH’);\nDBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(\nplan           \
  \ =>’DAYTIME_PLAN’,\nmgmt_p1         =>20,\ngroup_or_subplan=>’SYS_GROUP’);\nDBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(\n\
  plan            =>’DAYTIME_PLAN_PLAN’,\nmgmt_p1         =>10,\ngroup_or_subplan=>’MAINTENANCE’);\n\
  DBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(\nplan            =>’DAYTIME_PLAN’,\n\
  mgmt_p1         =>5,\ngroup_or_subplan=>’OLTP’);\nDBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(\n\
  plan            =>’DAYTIME_PLAN’,\nmgmt_p1         =>3,\ngroup_or_subplan=>’BATCH’);\n\
  DBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(\nplan            =>’DAYTIME_PLAN’,\n\
  mgmt_p1         =>1,\ngroup_or_subplan=>’OTHER_GROUPS’);\nDBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING(\n\
  attribute      => DBMS_RESOURCE_MANAGER.ORACLE_USER,\nvalue          => ’APP_ADMIN’,\n\
  consumer_group => ’MAINTENANCE’);\nDBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING(\n\
  attribute      => DBMS_RESOURCE_MANAGER.SERVICE_NAME,\nvalue          => ’OLTP’,\n\
  consumer_group => ’OLTP’);\nDBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING(\n\
  attribute      => DBMS_RESOURCE_MANAGER.SERVICE_NAME,\nvalue          => ’BATCH’,\n\
  consumer_group => ’BATCH’);\nend;\n/\n```\n\n`PL/SQL 过程已成功完成。`\n\n现在，资源管理器计划已在挂起区域中创建。这是一个简单的计划，旨在帮助您了解其创建方法。如果您选择在数据库或可插拔数据库中使用数据库资源管理器，这是一个很好的起点。让我们按照前面描述的顺序来理解该计划：计划、指令和使用者组。\n\
  \n上述计划名为`DAYTIME_PLAN`。在计划属性中，`MGMT_MTH`（资源分配方法）已从默认的`EMPHASIS`（允许您在不同层级使用百分比）更改为`RATIO`，后者仅通过将`MGMT_P1`设置为应得的份额来使用单层计划。通过使用基于比率/份额的计划，您不必使用基于权重/百分比的计划，后者可能难以理解和排查问题。对于\
  \ PDB 资源计划，无论如何都无法使用多层计划。\n\n创建计划后，有几条语句用于定义使用者组。为了将连接组映射到资源管理器使用者组，该组必须首先存在，这正是`DBMS_RESOURCE_MANAGER.CREATE_CONSUMER_GROUP`过程的作用。\n\
  \n`DAYTIME_PLAN`中有五条指令：\n\n- 第一条指令针对`SYS_GROUP`，旨在为 SYS 和 SYSTEM 用户分配最多的资源以优先处理。\n\
  - 下一条指令针对`MAINTENANCE`组，用于执行应用程序维护时，其优先级应高于正常使用。\n- 再下一条指令针对`OLTP`组，这是针对正常使用的首条指令。\n\
  - 接下来是针对`BATCH`组的指令，其优先级应低于`OLTP`组。\n- 最后一条指令是针对`OTHER_GROUPS`，它应为任何其他用户提供最低优先级。\n\
  \n查看优先级设置，您会发现比率/份额方法易于阅读和理解：\n\n| 使用者组       | 份额 | 百分比 | 计算公式         |\n|----------------|------|--------|------------------|\n\
  | SYS_GROUP      | 20   | 51%    | (20/39*100)      |\n| MAINTENANCE    | 10   |\
  \ 26%    | (10/39*100)      |\n| OLTP           | 5    | 13%    | (5/39*100)   \
  \    |\n| BATCH          | 3    | 8%     | (3/39*100)       |\n| OTHER_GROUPS  \
  \ | 1    | 3%     | (1/39*100)       |\n| **总计**       | **(39)** | **100%** | \
  \                 |\n\n补充几点说明：如果需要添加指令，使用`RATIO`方法时无需更改其他指令。您可以简单地添加新指令，并在`MGMT_P1`中设置适当的比例/份额数量。当然，这将改变计算结果；增加份额会降低其他组的百分比。非常重要的一点是，比率指示的\
  \ CPU 分配是基于当前`活跃`会话所属的使用者组进行的。这意味着，如果只有`OLTP`和`BATCH`组中的活跃会话，CPU 资源将根据它们的相互份额进行分配：`OLTP`组获得\
  \ 5/(5+3)*100=62.5%，`BATCH`组获得 3/(5+3)*100=37.5%。比率设定了资源划分方式；它并不阻止资源组使用 CPU 资源。\n\
  \n最后一部分是映射规则。本计划中的映射规则非常简单，但展示了我们在实际工作中遇到的两种最常见的数据库连接分组方式。第一条规则将特定数据库用户映射到某个组。接下来的两条规则根据连接数据库时使用的服务，将数据库连接映射到两个组。服务可以使用`srvctl\
  \ add service ...`命令行实用程序创建，该程序会添加一个“服务”类型的集群资源。服务还可用于将数据库的特定用途指向一个或多个实例，并且可以定义为在当前实例宕机时进行故障转移。\n\
  \n当非 SYS 会话进入数据库时，默认属于`OTHER_GROUPS`使用者组。资源管理器计划会自动将会话切换到特定的使用者组并管理资源。但是，会话不能随意切换到任何使用者组——资源管理器计划要将会话切换到某个使用者组，必须先明确授予该会话切换到该组的权限。这是通过`DBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP`过程实现的：\n\
  \n```sql\nbegin\nDBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP(\ngrantee_name\
  \ => ‘APP_ADMIN’,\nconsumer_group => ‘MAINTENANCE’\n);\nDBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP(\n\
  grantee_name => ‘APP_USER’,\nconsumer_group => ‘OLTP’\n);\nDBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP(\n\
  grantee_name => ‘APP_BATCH’,\nconsumer_group => ‘BATCH’\n);\nend;\n/\n```\n\n在我们的示例中，我们有一个用于维护应用程序模式的`APP_ADMIN`用户，他被授予了`MAINTENANCE`使用者组。应用程序用户是`APP_USER`，被授予了`OLTP`使用者组。同样，`APP_BATCH`用户被授予了`BATCH`使用者组。\n\
  \n最佳实践是将`OTHER_GROUPS`（默认使用者组）排除在优先级设置之外。通过为特定使用者组设置优先级，并根据特定规则授予数据库用户访问这些使用者组的权限，任何在显式设置规则之外连接到数据库的会话将自动保留在`OTHER_GROUPS`使用者组中，且不会被赋予优先级。\n\
  \n# 验证并提交资源计划\n\n现在我们已经理解了资源计划，让我们来验证并将其提交到数据字典：\n\n```sql\nbegin\n  DBMS_RESOURCE_MANAGER.VALIDATE_PENDING_AREA();\n\
  end;\n/\n\nPL/SQL procedure successfully completed.\n\nbegin\n  DBMS_RESOURCE_MANAGER.SUBMIT_PENDING_AREA();\n\
  end;\n/\n\nPL/SQL procedure successfully completed.\n```\n\n您可以设置参数 `RESOURCE_MANAGER_PLAN`（在普通数据库或\
  \ PDB 中）来强制执行资源管理器计划。然而，在很多情况下，数据库的资源需求和优先级在一天中的不同时间是不同的，例如在线客户端在白天具有较高优先级，而批处理作业和报表在傍晚和夜间具有较高优先级。下一节将展示如何让数据库使用调度程序窗口切换资源管理器计划。\n\
  \n#### 使用调度程序更改资源计划\n\n几乎每个数据库都有其使用方式发生显著变化的时间段。对于许多数据库来说，白天通常有在线用户以类似 OLTP 的方式请求信息，而晚上或夜间则有用于数据移动的批处理作业。在白天，在线用户应具有优先级，而报告和批处理等其他用途应具有较低的优先级。然而，在晚上，批处理和报告应具有最高优先级。通常，批处理作业会为其他数据库/应用程序提供白天事务处理的数据。\n\
  \n如果我们以 `DAYTIME_PLAN` 为例，可以通过简单修改计划名称来创建一个 `NIGHTTIME_PLAN`，将 `OLTP` 指令的 `MGMT_P1`\
  \ 份额改为 1，并将 `BATCH` 指令的份额改为 5。这样，`SYS_GROUP` 和 `MAINTENANCE` 指令仍然优先于普通使用，但现在在此计划中，任何\
  \ `OLTP` 请求的优先级都将显著低于 `BATCH` 请求。\n\n为了更改活动的资源管理器计划，可以使用调度程序窗口。下一个示例将使数据库根据一周中的时间自动更改资源计划：\n\
  \n```sql\nbegin\n  DBMS_SCHEDULER.CREATE_WINDOW(\n    window_name      => 'WEEKDAY_WINDOW',\n\
  \    resource_plan    => 'DAYTIME_PLAN',\n    start_date       => systimestamp at\
  \ time zone 'EUROPE/AMSTERDAM',\n    duration         => numtodsinterval(660, 'minute'),\n\
  \    repeat_interval  => 'FREQ=WEEKLY;BYDAY=MON,TUE,WED,THU,FRI;BYHOUR=7;BYMINUTE=0;BYSECOND=0',\n\
  \    end_date         => null);\n  DBMS_SCHEDULER.ENABLE('\"SYS\".\"WEEKDAY_WINDOW\"\
  ');\n\n  DBMS_SCHEDULER.CREATE_WINDOW(\n    window_name      => 'WEEKNIGHT_WINDOW',\n\
  \    resource_plan    => 'NIGHTTIME_PLAN',\n    start_date       => systimestamp\
  \ at time zone 'EUROPE/AMSTERDAM',\n    duration         => numtodsinterval(780,\
  \ 'minute'),\n    repeat_interval  => 'FREQ=WEEKLY;BYDAY=MON,TUE,WED,THU,FRI;BYHOUR=18;BYMINUTE=0;BYSECOND=0',\n\
  \    end_date         => null);\n  DBMS_SCHEDULER.ENABLE('\"SYS\".\"WEEKNIGHT_WINDOW\"\
  ');\nend;\n/\n\nPL/SQL procedure successfully completed.\n```\n\n该过程创建了两个窗口：`WEEKDAY_WINDOW`\
  \ 和 `WEEKNIGHT_WINDOW`。参数 `resource_plan` 将资源计划绑定到窗口。工作日窗口在上午 7 点开始；工作日晚间窗口在 18:00（下午\
  \ 6 点）开始。\n\n## 等待事件：resmgr: cpu quantum\n\n资源管理器对进程 CPU 消耗的限制将通过等待事件 `resmgr: cpu\
  \ quantum` 可见。只有在启用了数据库资源管理器时才会发生这种限制。在普通数据库或可插拔数据库中，资源管理器计划处于活动状态的原因包括：\n\n*  \
  \ 实例限制\n*   用户定义的资源管理计划\n*   自动维护作业窗口变为活动状态\n\n**提示**\n\n如果没有资源管理器计划，数据库就无法限制 CPU\
  \ 消耗，因此等待事件 `resmgr: cpu quantum` 也不会出现。\n\n数据库资源管理器会跟踪正在运行和准备运行的数据库进程。只要所有进程都能在\
  \ CPU 上获得完整的时间片，就不需要限制（除了与带有 `UTILIZATION_LIMIT` 指令的资源管理器使用者组绑定的情况，我们稍后会讨论）。然而，一旦正在运行和准备运行的进程数量超过了可见\
  \ CPU 的数量（或在实例限制情况下允许使用的 CPU 数量），资源管理器就会检查正在运行和准备运行的进程的消费组，并根据指令中配置的资源分布来限制这些进程的执行。这种限制在等待接口中显示为“`resmgr:\
  \ cpu quantum`”。在大多数情况下，使用者组中的进程不会被长时间限制，而是在属于受限使用者组的活动进程之间以轮询方式进行一段“量子”时间（100 毫秒）的限制。这意味着被限制的进程在大多数情况下不会停止，而是会根据限制的程度运行得更慢。\n\
  \n## 后续步骤\n\n如前所述，数据库资源管理器是一个很容易就能单独写一本书来讲述的主题。因此，过去几节已经描述了进行数据库资源管理的起点。要了解有关此主题的更多信息并查找特定属性，请参阅\
  \ [`http://docs.oracle.com/database/121/ADMIN/dbrm.htm`](http://docs.oracle.com/database/121/ADMIN/dbrm.htm)\
  \ 的文档。您也可以参考 第 11 章，其中您可以了解其他资源管理器事件。\n\n为完整起见，本段展示了在应用资源管理器时对我们有所帮助的一些数据库资源管理器的特定主题。\n\
  \n### 资源映射优先级\n\n您可能想知道，当使用 `DBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING` 过程映射数据库用户时，如果一个数据库用户有资格映射到多个使用者组会发生什么。例如，如果使用者组像这样映射：\n\
  \n```sql\nDBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING(\n  attribute      =>\
  \ DBMS_RESOURCE_MANAGER.ORACLE_USER,\n  value          => 'APP_ADMIN',\n  consumer_group\
  \ => 'MAINTENANCE');\n```\n\n和\n\n```sql\nDBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING(\n\
  \  attribute      => DBMS_RESOURCE_MANAGER.SERVICE_NAME,\n  value          => 'OLTP',\n\
  \  consumer_group => 'OLTP');\n```\n\n当 `APP_ADMIN` 数据库用户使用 `OLTP` 服务登录时会发生什么？在这种情况下，两种映射都适用！答案可以在\
  \ `DBA_RSRC_MAPPING_PRIORITY` 视图中找到，该视图显示了以何种优先级评估哪些属性：\n\n```sql\nSQL> select *\
  \ from dba_rsrc_mapping_priority;\n\nATTRIBUTE                     PRIORITY STATUS\n\
  ------------------------------ ------- --------\nEXPLICIT                      \
  \        1\nSERVICE_MODULE_ACTION                 2\nSERVICE_MODULE            \
  \            3\nMODULE_NAME_ACTION                    4\nMODULE_NAME           \
  \                5\nSERVICE_NAME                          6\nORACLE_USER       \
  \                    7\nCLIENT_PROGRAM                        8\nCLIENT_OS_USER\
  \                        9\nCLIENT_MACHINE                       10\nCLIENT_ID \
  \                           11\n\n11 rows selected.\n```\n\n如果优先级不符合您的需求，可以使用 `DBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING_PRI`\
  \ 过程更改优先级。\n\n\n### 资源限制\n\n本章中的数据库资源计划，其指令在设置时包含了优先级，旨在根据设定的优先级来获取 CPU 资源的份额。独立于优先级，资源管理器还提供了限制\
  \ CPU 和并行查询服务器使用情况的选项。\n\n此功能在指令中的参数是 `utilization_limit`：\n\n```sql\nDBMS_RESOURCE_MANAGER.CREATE_PLAN_DIRECTIVE(\n\
  \  plan              =>'DAYTIME_PLAN',\n  mgmt_p1           =>3,\n  utilization_limit\
  \ =>10,\n  group_or_subplan  =>'BATCH'\n);\n```\n\n这是前面展示的 `DAYTIME_PLAN` 中的一个指令，但经过修改以包含\
  \ `utilization_limit` 指令参数。其作用与不带 `utilization_limit` 参数时相同，这意味着它的优先级排序完全一致。然而，资源管理器会将使用该指令的使用者组（此处为\
  \ `BATCH`）中所有进程的总 CPU 使用率限制在 10%。除了限制 CPU 使用，它还会将并行查询服务器的使用限制为数据库参数 `PARALLEL_SERVERS_TARGET`\
  \ 中指定的并行服务器数量的该参数值百分比。在这种情况下，你可能希望完全禁用并行查询服务器的使用（以避免与日间使用冲突），此时你可以使用指令参数 `parallel_server_limit`\
  \ 并将其设置为零。设置 `parallel_server_limit` 指令参数会覆盖 `utilization_limit` 指令参数对并行查询服务器使用的限制值。\n\
  \n在 Exadata 上使用 `utilization_limit` 指令参数时，另一个需要意识到的重要点是，Cell 服务器中的 I/O 资源管理器会获取\
  \ `utilization_limit` 指令参数并应用相同的限制百分比，但现在是用于限制来自该使用者组中进程的 I/O 请求。\n\n### 其他限制参数\n\
  \n作为指令参数实现的另一个资源管理器选项，是为某些条件设置阈值。一旦达到阈值，会话将切换到 `switch_group` 指令参数中设置的组，这适用于多个“切换”参数（见表\
  \ 7-3）。\n\n表 7-3. 资源管理器指令切换参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `switch_io_megabytes`\
  \ | 指定一个会话可以发出的 I/O 量（以 MB 为单位）。 |\n| `switch_io_reqs` | 指定一个会话可以发出的 I/O 请求数量。 |\n\
  | `switch_io_logical` | 指定一个会话可以发出的逻辑 I/O 数量。 |\n| `switch_elapsed_time` | 指定会话中的耗时。\
  \ |\n| `switch_time` | 指定会话中的 CPU 时间量。 |\n\n此选项提供了极大的灵活性，例如，参数指定的量是计算整个会话的总计还是每次调用的值。如果设置为按每次调用计算（`switch_for_call`），则在调用期间会切换使用者组，否则不切换（`switch_for_call`）。请注意，要切换使用者组，数据库用户必须已被授予访问这些组的权限，可通过\
  \ `DBMS_RESOURCE_MANAGER_PRIVS.GRANT_SWITCH_CONSUMER_GROUP` 过程实现。\n\n另一组为特定使用情况设置限制的指令参数如下：\n\
  \n表 7-4. 资源管理器指令限制参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `undo_pool` | 限制使用者组的 undo\
  \ 空间大小（以 KB 为单位）。 |\n| `max_idle_time` | 最大会话空闲时间（以秒为单位）。 |\n| `max_idle_blocker_time`\
  \ | 会话在阻塞另一个会话时可以保持空闲的最长时间。 |\n| `max_est_exec_time` | 会话的最大执行时间（以 CPU 秒为单位）。如果优化器估计一个操作将花费更长时间，则该操作不会启动，并会发出\
  \ ORA-7455 错误。 |\n| `active_sess_pool_p1` | 指定当前可以具有活动调用的最大会话数。 |\n| `queueing_p1`\
  \ | 指定非活动会话队列中的调用超时的时间。默认为 `NULL`，表示无限制。 |\n| `parallel_degree_limit_p1` | 指定任何操作的并行度限制。默认为\
  \ `NULL`，表示无限制。值为 0 表示所有操作都将是串行的。 |\n\n### 使用 ORACLE_FUNCTION 的使用者组映射\n\n资源管理器提供了一个选项，可以将少量资源密集型的特定函数映射到使用者组：\n\
  \n表 7-5. 按函数进行资源管理器映射\n\n| ORACLE_FUNCTION | 描述 |\n| --- | --- |\n| `BACKUP` | 使用\
  \ RMAN 进行备份操作。 |\n| `COPY` | 使用 RMAN 进行映像副本。 |\n| `DATALOAD` | 使用 Data Pump 加载数据。\
  \ |\n\n当数据库有严格的性能目标时，将上述函数映射到一个使用者组以管理资源消耗可能是有益的。以下是操作方法：\n\n```sql\nBEGIN\n  DBMS_RESOURCE_MANAGER.CREATE_PENDING_AREA();\n\
  \  DBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING\n    (DBMS_RESOURCE_MANAGER.ORACLE_FUNCTION,\
  \ 'BACKUP', 'MAINTENANCE');\n  DBMS_RESOURCE_MANAGER.SET_CONSUMER_GROUP_MAPPING\n\
  \    (DBMS_RESOURCE_MANAGER.ORACLE_FUNCTION, 'COPY', 'MAINTENANCE');\n  DBMS_RESOURCE_MANAGER.SUBMIT_PENDING_AREA();\n\
  END;\n/\n\n\n### 监控资源管理器\n\n在实施了资源管理器计划后，您可能需要确认该计划是否按预期工作。为此，可以使用动态性能视图来查看资源管理器的行为。`V$RSRC_CONSUMER_GROUP`\
  \ 就是其中一个动态性能视图：\n\n表 7-6.\n\n`V$RSRC_CONSUMER_GROUP` 视图相关字段\n\n| 列名 | 描述 |\n| ---\
  \ | --- |\n| `NAME` | 资源组的名称。 |\n| `ACTIVE_SESSIONS` | 该消费者组中的活动会话数。 |\n| `EXECUTION_WAITERS`\
  \ | 正在等待分配时间片以使用 CPU 的活动会话数。 |\n| `REQUESTS` | 该消费者组中会话发出的累计请求数。 |\n| `CPU_WAIT_TIME`\
  \ | 资源管理器使资源组中的会话等待 CPU 的累计时间总量。此等待时间不包括 I/O 等待、队列或锁存争用延迟等。`CPU_WAIT_TIME` 是分配给该消费者组的\
  \ `resmgr:cpu quantum` 等待事件所经过时间的总和。 |\n| `CPU_WAITS` | 由于资源管理而导致会话等待的累计次数。 |\n\
  | `CONSUMED_CPU_TIME` | 该消费者组中会话累计使用的 CPU 时间总量（以毫秒为单位）。 |\n| `YIELDS` | 由于资源管理，该消费者组中的会话不得不将\
  \ CPU 让给其他会话的累计次数。 |\n\n以下列表是一个您可用于显示从 `V$RSRC_CONSUMER_GROUP` 视图中收集的指标的报告。这些指标是确定在测试期间我们的资源分配对消费者组产生影响的宝贵工具。\n\
  \n```\ncol name                        format a12            heading \"Name\"\n\
  col active_sessions             format 999            heading \"Active|Sessions\"\
  \ncol execution_waiters           format 999            heading \"Execution|Waiters\"\
  \ncol requests                    format 9,999,999      heading \"Requests\"\ncol\
  \ cpu_wait_time               format 999,999,999    heading \"CPU Wait|Time\"\n\
  col cpu_waits                   format 99,999,999     heading \"CPU|Waits\"\ncol\
  \ consumed_cpu_time           format 99,999,999     heading \"Consumed|CPU Time\"\
  \ncol yields                      format 9,999,999      heading \"Yields\"\n\nSELECT\
  \ DECODE(name, '_ORACLE_BACKGROUND_GROUP_', 'BACKGROUND', name) name,\n       active_sessions,\
  \ execution_waiters, requests,\n       cpu_wait_time, cpu_waits, consumed_cpu_time,\
  \ yields\n  FROM v$rsrc_consumer_group\nORDER BY cpu_wait_time;\n```\n\n```\n  \
  \             Active Execution               CPU Wait          CPU      Consumed\n\
  Name          Sessions   Waiters Requests          Time       Waits      CPU Time\
  \     Yields\n------------ -------- --------- -------- ----------- ----------- -------------\
  \ ----------\nBACKGROUND         34         0       76             0           0\
  \             0          0\nAPPS               30        13       30    87,157,739\
  \  11,498,286    47,963,809    365,611\nREPORTS            30        27       31\
  \   145,566,524   2,476,651    10,733,274     78,950\nMAINTENANCE        30    \
  \    29       30   155,018,913   1,281,279     5,763,764     41,368\nOTHER_GROUPS\
  \       34        29      131   155,437,715   1,259,766     5,576,621     40,168\n\
  ```\n\n如果您使用了多租户选项，此视图将按容器/PDB 显示资源管理统计信息。为了将这些统计信息与可插拔数据库关联起来，请在查询中添加 `con_id`\
  \ 字段。\n\n提示\n\n`V$RSRCMGRMETRIC` 和 `V$RSRCMGRMETRIC_HISTORY` 视图对于监控您的 DBRM 资源分配对数据库中会话的影响也非常有用。\n\
  \n#### 资源管理器视图\n\nOracle 提供了许多报告资源管理器配置、历史和指标的视图。让我们来看一些有助于审查和监控 DBRM 配置中资源的视图：\n\
  \n`V$RSRC_PLAN`：此视图显示当前活动资源计划的配置。\n\n`V$RSRC_PLAN_HISTORY`：此视图显示历史信息，包括它们被激活和停用的时间，以及它们是由数据库调度程序还是调度程序窗口启用的。历史记录包含最近的\
  \ 15 个计划。\n\n`V$RSRC_CONSUMER_GROUP`：此视图显示有关当前活动消费者组的信息，包括性能指标。\n\n`V$RSRC_CONS_GROUP_HIST`：此视图显示来自\
  \ `V$RSRC_CONSUMER_GROUP` 视图的历史信息，需要将 `SEQUENCE#` 列与 `V$RSRC_PLAN` 中的相同列连接起来，以获取计划名称和时间。\n\
  \n`V$RSRC_SESSION_INFO`：此视图显示会话的性能统计信息以及资源管理器如何影响了它们。\n\n`V$SESSION`：这并非真正的资源管理器视图；然而，其\
  \ `RESOURCE_CONSUMER_GROUP` 字段对于确定会话被分配到哪个资源组很有用。\n\n`V$RSRCMGRMETRIC`：此视图包含过去一分钟内每个消费者组的资源使用情况，并且每分钟刷新一次。\n\
  \n`V$RSRCMGRMETRIC_HISTORY`：此视图包含 `V$RSRCMGRMETRIC` 内容的一小时历史记录。\n\n`DBA_CDB_RSRC_PLANS`\
  \ / `CDB_CDB_RSRC_PLANS`：CDB 资源计划。\n\n`DBA_CDB_RSRC_PLAN_DIRECTIVES` / `CDB_CDB_RSRC_PLAN_DIRECTIVES`：CDB\
  \ 资源计划指令。\n\n`CDB_RSRC_CATEGORIES`：按容器划分的数据库消费者组类别。\n\n`DBA_RSRC_CATEGORIES`：数据库消费者组类别。\n\
  \n`DBA_RSRC_PLANS`：列出数据字典中的所有数据库资源计划及其计划设置。\n\n`DBA_HIST_RSRC_PLANS`：资源管理器计划的历史信息（AWR；需许可的视图）。\n\
  \n`DBA_RSRC_CONSUMER_GROUPS`：列出字典中创建的所有消费者组。\n\n`DBA_HIST_RSRC_CONSUMER_GROUPS`：资源管理器消费者组的历史信息（AWR；需许可的视图）。\n\
  \n`DBA_RSRC_CONSUMER_GROUP_PRIVS`：列出所有用户以及他们被授予访问权限的消费者组。如前所述，在资源管理器能将用户切换到 `OTHER_GROUPS`\
  \ 之外的任何其他组之前，必须先授予该用户访问该组的权限。\n\n`DBA_RSRC_PLAN_DIRECTIVES`：列出数据字典中存储的所有资源管理器指令。\n\
  \n`DBA_RSRC_GROUP_MAPPINGS`：列出在数据字典中定义的会话到资源组的映射规则。\n\n`DBA_RSRC_MAPPING_PRIORITY`：列出会话属性的优先级，资源管理器使用此优先级来确定评估映射规则的顺序。\n\
  \n`DBA_USERS`：这不是一个资源管理器视图，但其 `INITIAL_RSRC_CONSUMER_GROUP` 字段显示数据库用户被分配的初始资源管理器组。\n\
  \n`DBA_RSRC_IO_CALIBRATE`：此视图与 `DBMS_RESOURCE_MANAGER.CALIBRATE_IO` 过程相关，并显示校准的结果。\n\
  \n`DBA_RSRC_MANAGER_SYSTEM_PRIVS`：此视图显示所有被授予 `ADMINISTER_RESOURCE_MANAGER` 系统权限的用户和角色。此权限必须使用\
  \ `DBMS_RESOURCE_MANAGER_PRIVS` 包来授予。\n\n## I/O 资源管理器\n\n在本章前面，我们讨论了 Oracle 的**数据库资源管理器**，它通过消费者组和计划指令在数据库内部管理\
  \ CPU 资源。会话被分配到资源组，计划指令通过为 `MGMT_P1` 等资源管理属性分配值（如 CPU 百分比或份额）来管理资源分配。然而，数据库资源管理器仅限于管理数据库内部的资源。数据库资源管理器实际上也管理\
  \ I/O 资源，但方式有些间接，即通过限制用户会话可用的 CPU 和并行度（通过优先级排序和限制，这些设置在消费者组所映射到的指令中）。认识到任何会话首先都需要被数据库资源管理器允许运行，然后需要能够在\
  \ CPU 上获得一个时间片来运行（在操作系统层面），之后才能发出 I/O 请求，这一点极其重要。换句话说，CPU 是进行 I/O 所需的最终资源。\n\n在\
  \ Exadata 出现之前，Oracle 在存储层没有存在感，限制数据库会话的 CPU 和并行度是（间接）管理 I/O 的唯一方式。Exadata 将 I/O\
  \ 资源管理提升到了数据库层之上，并以非常直接的方式在存储单元上管理 I/O。安装在 Exadata 上的数据库使用一种称为智能数据库协议（iDB）的专有协议，向存储单元上的\
  \ `cellsrv` 发送 I/O 请求。利用 iDB，数据库在每次对存储单元的 I/O 调用中打包额外的属性。这些附加信息有多种用途。例如，IORM 使用\
  \ I/O 请求所针对的文件类型（重做日志、撤销日志、数据文件、控制文件等）来确定在闪存缓存中缓存这些块是否有益。已知有五个属性嵌入在 I/O 请求中：性能配置文件名称（如果已设置）、数据库、多租户情况下的容器、消费者组以及消费者组的类别。这五点附加信息对于\
  \ Oracle 的智能存储而言非常宝贵。知道是哪个数据库或容器发出的请求，使得 IORM 能够按数据库对 I/O 请求进行优先级排序。\n\n类别（Categories）扩展了\
  \ Exadata 平台上消费者组的概念。使用数据库资源管理器，在数据库内部为消费者组分配类别。然后，可以在多个数据库中定义的通用类别被分配共享的 I/O 优先级。例如，您可能有多个数据库将用户会话映射到\
  \ `INTERACTIVE` 类别。来自 `INTERACTIVE` 类别的 I/O 请求现在可以优先于其他类别（如 `REPORTS`、`BATCH` 或\
  \ `MAINTENANCE`）得到处理。\n\n资源管理配置文件（Resource management profiles）是一种新的、简便的方法，用于将数据库分组以使用特定的\
  \ I/O 资源管理配置文件。资源管理配置文件在 Exadata 版本 12.1.2.1.0 和数据库版本 12.1.0.2 中引入。资源管理配置文件与类别的区别在于，资源管理组对整个数据库进行分组，而类别则根据指令中设置的相同类别，对不同数据库中的会话进行分组。\n\
  \n### IORM 方法\n\nIORM 提供了四种不同的 I/O 资源管理方法：数据库间（Interdatabase）、类别（Category）、数据库内（Intradatabase）和资源配置文件（Resource\
  \ Profile）。这些方法可以单独使用，也可以组合使用。\n\n#### 数据库间资源计划\n\nIORM 根据发起请求的数据库名称及其在 IORM 计划中设置的优先级来确定\
  \ I/O 请求的优先级。当 Exadata 托管多个数据库并且您需要管理数据库之间的 I/O 优先级时，数据库间 IORM 非常有用。这是在每个存储服务器上创建的计划。\n\
  \n#### 类别资源计划\n\nIORM 通过发起请求的类别以及计划中为该类别设置的优先级，在多个数据库中确定 I/O 请求的优先级。当您希望按工作负载类型管理\
  \ I/O 时，按类别管理 I/O 非常有用。例如，您可以在每个数据库中创建 `APPS`、`BATCH`、`REPORTS` 和 `MAINTENANCE`\
  \ 等类别，然后根据这些类别对业务的重要性为其分配 I/O 配额。如果 `APPS` 类别被分配了 70%，那么所有数据库中分配给 `APPS` 类别的会话共享此配额。这是在每个存储服务器上创建的计划，与数据库资源管理器为多个数据库中的消费者组设置的类别协同工作。\n\
  \n#### 数据库内资源计划\n\n与数据库间和类别 IORM 不同，数据库内 IORM 在数据库层使用 DBRM 进行配置。DBRM 经过增强，可与 IORM\
  \ 合作，利用数据库中定义的资源组提供细粒度的 I/O 资源管理。这是通过在存储服务器上使用与分配 CPU 相同的机制（即 `MGMT_Pn` 属性和 `utilization_limit`\
  \ 参数）向消费者组分配 I/O 份额和优先级来实现的。例如，`SALES` 数据库可能通过数据库间 IORM 计划被分配了 50%。这 50% 可以进一步分配给数据库内部的\
  \ `APPS`、`REPORTS`、`BATCH` 和 `OTHER_GROUPS` 消费者组。这确保了关键应用程序可用的 I/O 资源，并防止行为异常或 I/O\
  \ 密集型进程从数据库内部更高优先级的会话中窃取 I/O。可插拔数据库的管理也属于数据库内 IORM 计划的职责范围。\n\n#### 资源管理配置文件\n\n\
  资源管理配置文件，全称为 I/O 资源管理数据库间计划，需要在数据库或容器数据库中设置一个参数（`DB_PERFORMANCE_PROFILE`），将其值设为在存储服务器上定义的某个配置文件名称。与数据库间计划的最大区别在于，dbplan\
  \ 中不再为每个数据库名称设置指令，而是将名称设置为配置文件名称，数据库通过设置 `DB_PERFORMANCE_PROFILE` 参数映射到这些配置文件。这针对数据库数量中等偏多（10\
  \ 个或以上）的环境，旨在通过让所有数据库映射到少数几个配置文件来简化 IORM。为了让存储服务器理解这是一个性能配置文件而非数据库名称，需要在定义中添加 `\"\
  type=profile\"`。配置文件不能与类别计划一起使用。\n\n## IORM 工作原理\n\nIORM 通过根据发起请求的数据库名称、类别或配置文件、或使用者组，将传入的\
  \ I/O 请求组织成队列，从而在存储单元级别管理 I/O。然后，它根据资源计划中为这些队列定义的优先级来服务这些队列。IORM 仅在需要时主动管理 I/O 请求。这意味着当闪存设备或单元磁盘未被充分利用时，I/O\
  \ 请求会立即由 `cellsrv` 分派到设备。然而，当闪存设备或单元磁盘被完全利用时，IORM 会将 I/O 请求排入 I/O 队列（每个设备一个），并根据资源管理器中定义的优先级调度队列中的\
  \ I/O 请求。请注意，在 12.1.2.1.0 之前的存储服务器版本中，闪存被排除在资源管理之外。\n\n例如，有两个数据库使用一个单元服务器，`DB1`\
  \ 和 `DB2`。单元中的 I/O 资源计划定义为优先处理 `DB1` 占 75%，`DB2` 占 25%。当有剩余容量可用时，I/O 请求将以先入先出（FIFO）的方式得到服务。但是，当单元上的设备开始饱和时，I/O\
  \ 请求将被排入队列。一旦排队，IORM 就会强制执行资源计划，这意味着 I/O 请求会按照资源计划中的定义重新排序。后台进程也会根据具有不同 I/O 类型优先级的内部资源计划获得优先处理。不用说，像日志写入器这样的关键后台进程的\
  \ I/O 请求会比前台会话（客户端会话）获得更高的优先级。\n\n请注意，针对闪存和硬盘的 I/O 资源管理是 Exadata 12.1.2.1.0 或更高版本的功能。早期版本的\
  \ IORM 仅管理硬盘。此外，闪存的资源管理与硬盘的资源管理不同。闪存 I/O 的优先级处理方式是，小 I/O（小于 128K）总是优先于大 I/O，而不管任何\
  \ IORM 计划如何。只有对于大 I/O，才会应用资源管理计划。\n\n### IORM 架构\n\n对于存储服务器正在使用的每个物理存储设备，无论是否存在任何资源管理器计划，都会保留一个\
  \ IORM 队列。IORM 队列首先按类别或配置文件进行组织，具体取决于使用哪种类型。这就是配置文件和类别不能协同工作的原因。按类别组织后，数据库会按数据库间计划组织，最后按数据库内计划组织。这是\
  \ IORM 的评估顺序：\n\n**类别/配置文件** &nbsp;&nbsp; **数据库间计划** &nbsp;&nbsp; **可插拔数据库** &nbsp;&nbsp;\
  \ **数据库内计划**\n\n为了亲自查看这一点，您可以从单元守护进程中转储 IORM 信息。此转储未被记录，不应在实时系统上进行。提供此信息是出于完整性和教育目的。IORM\
  \ 转储信息是按单元管理和保存的；单元守护进程不像集群那样协同工作，而是独立工作。\n\n首先，登录到一个单元，启动 `cellcli`，并执行：`alter\
  \ cell events = ’immediate cellsrv.cellsrv_statedump(2,0)’`：\n\n```\nCellCLI> alter\
  \ cell events = ’immediate cellsrv.cellsrv_statedump(2,0)’\n\nDump sequence #11\
  \ has been written to /opt/oracle/cell/log/diag/asm/cell/enkcel04/trace/svtrc_31370_114.trc\n\
  \nCell enkcel04 successfully altered\n```\n\n注意跟踪文件的名称非常重要。转储非常大，包含大量用于错误解决和 Oracle\
  \ 开发诊断的信息。以下是文件中的一个片段，显示了磁盘 `/dev/sdc` 的 IORM 统计信息：\n\n```\nIORM stats for disk=/dev/sdc\n\
  \nHeap stats: Inuse=62KB Total=207KB\n\n--------- IORM Workload State & Characterization\
  \ ---------\n\nIORM: Solo Workload\n\nSolo workload (no db or cg): 0 transitions\n\
  \nIORM boost =429.000000 (cnt = 3395, amt = 1458813)\n\n#Bypassedios=0 #IOs skipped\
  \ for fencing=1932 #IOs cancelled=0\n\n#served=14073 bitmap=0x0 #queued=0 adtime=0ms\
  \ asmrdtime=3ms #cumulserved=56404684 #pending=0 #lpending=0\n\nbusystate=1 #max_conc_io=5\
  \ write_cache_hit_rate=98% iocost=0.66ms\n\n#free_lrg_wrts=11 #free_sml_wrts=85728\
  \ write_cost_adjust=0%\n\ncatidx=0 bitmap=0x0 OTHER\n\nSIO:#served=3249 #queued=0\
  \ Util=2% aqtime=2us ahdtime=445us afdtime=0us\n\ndbidx=0 bitmap=0x0 DBM01\n\nSIO:#served=4\
  \ #queued=0 Util=0% aqtime=2us ahdtime=123us afdtime=0us lastreqtime=Wed Jan  7\
  \ 19:46:46 1970 97 msec\n\ncgidx=0 bitmap=0x0 cgname=ORA$AUTOTASK limit=90\n\ncgidx=1\
  \ bitmap=0x0 cgname=OTHER_GROUPS\n\ncgidx=2 bitmap=0x0 cgname=SYS_GROUP\n\ncgidx=3\
  \ bitmap=0x0 cgname=_ORACLE_BACKGROUND_GROUP_\n\nSIO:#served=4 #queued=0 Util=0%\
  \ aqtime=2us ahdtime=123us afdtime=0us\n\n#concios=4, #fragios=0 #starvedios=0 #maxcapwaits=0\n\
  \ncgidx=4 bitmap=0x0 cgname=_ORACLE_MEDPRIBG_GROUP_\n\ncgidx=5 bitmap=0x0 cgname=_ORACLE_LOWPRIBG_GROUP_\n\
  \ncgidx=6 bitmap=0x0 cgname=_ORACLE_LOWPRIFG_GROUP_\n```\n\n（此转储创建于单元服务器版本 12.1.2.1.0；此信息在早期版本中可能不可用。）\n\
  \n此转储显示统计信息是按设备保存的。如所示，这是第三个物理磁盘，磁盘 `/dev/sdc`。第一个强调的部分是 “catidx=0”；这表明首先评估类别。如果未定义任何类别或配置文件，则存在两个类别，`OTHER`\
  \ 和 `_ASM_`。第二个强调的部分是 “dbidx=0”。这是资源管理器到目前为止在此设备上看到的数据库列表，也是 IORM 可以操作的第二个级别。第三个强调的部分是\
  \ “cgidx=0”，显示了数据库中的使用者组列表。使用者组 3、4、5 和 6 是 Oracle 内部使用者组，本章前面已经提到过。`_ORACLE_BACKGROUND_GROUP_`\
  \ 是用于后台进程关键 I/O 的内部使用者组。如果在数据库中未配置数据库内资源管理器计划，所有用户/前台进程都会映射到 `OTHER_GROUPS` 使用者组。\n\
  \n## IORM 目标\n\n安装后，单元服务器已在运行 IORM 并处于活动状态。11.2.3.2 之前的存储服务器版本在没有 IORM 的情况下运行，需要先创建\
  \ IORM 计划才能启用 IORM。从 Exadata 版本 11.2.3.2 开始，IORM 始终启用并以 `basic` IORM 目标运行。以下是可设置的目标列表：\n\
  \n*   `low_latency`：此设置为对 I/O 延迟极其敏感的应用程序提供优化。它通过显著限制磁盘利用率来提供尽可能低的 I/O 延迟。换句话说，对吞吐量要求高的应用程序将因此优化目标受到显著（负面）影响。\n\
  *   `high_throughput`：此设置通过尝试充分利用存储单元的 I/O 容量，为 DW 事务提供最佳的吞吐量。它与 `low_latency` 相反，因此将显著（负面）影响磁盘\
  \ I/O 延迟。\n*   `Balanced`：此设置试图在低延迟和高吞吐量之间取得平衡。这是通过比上述 `low_latency` 目标更轻微地限制大型\
  \ I/O 操作的磁盘利用率来实现的。当工作负载混合且没有需要极低延迟的应用程序时，请使用此目标。\n*   `Auto`：此设置允许 IORM 为您的工作负载确定最佳优化目标。`Cellsrv`\
  \ 持续监控大/小 I/O 请求，并按最佳匹配原则应用优化方法。如果某个消费者组 75% 或更多的 I/O 操作是小型 I/O（小于 128K），则被视为面向延迟的消费者组并进行相应管理。\n\
  *   `Basic`：此设置是安装后的默认值。此目标意味着存储服务器对低延迟进行有限优化，但不进行节流，而其他目标会进行节流。\n\n可以使用 `cellcli`\
  \ 命令行工具设置目标：\n\n```\nCellCLI> alter iormplan objective='auto';\n\nIORMPLAN successfully\
  \ altered\n```\n\n在大多数情况下，将目标设置为 `auto` 是有益的。这样做，IORM 会尝试根据数据库的使用模式进行优化。\n\n该目标仅适用于硬盘\
  \ I/O。在存储服务器版本 12.1.2.1.0 之前，对闪存执行的 I/O 没有优先级。从存储服务器版本 12.1.2.1.0 开始，闪存 I/O 的目标是优先处理小型\
  \ I/O（128KB 或更小），而不管设置的目标如何。\n\n## 配置跨数据库 IORM\n\n使用 IORM 计划配置跨数据库 I/O 资源管理计划。此计划确定存储单元的数据库\
  \ I/O 优先级。IORM 计划使用 `CellCLI` 命令 `ALTER IORMPLAN` 创建。每个存储单元只能有一个 IORM 计划，无论有多少个数据库实例（集群或单实例）将其用作存储。创建跨数据库\
  \ IORM 计划相当简单。第一步是确定每个数据库的分配策略。您将使用这些分配策略来定义 IORM 计划的指令。`LEVEL` 属性指定数据库相对于计划中其他数据库应获得的优先级。`ALLOCATION`\
  \ 属性确定数据库在其级别上可用总 I/O 中所获得的 I/O 百分比。始终需要为计划中未列出的任何数据库设置一个 `other` 指令。以下示例演示了如何创建\
  \ IORM 计划：\n\n```\nCellCLI> alter iormplan dbplan=((name=database1, level=1, allocation=60),\
  \ -\n> (name=database2, level=2, allocation=80), -\n> (name=other, level=3, allocation=100))\n\
  \nIORMPLAN successfully altered\n```\n\n`CellCLI` 命令 `list iormplan detail` 显示我们的新\
  \ IORM 计划。请注意，`catPlan` 属性为空。这是我们将在下一节中查看的类别 IORM 计划的占位符。\n\n```\nCellCLI> list\
  \ iormplan detail\n          name:                       enkcel04_IORMPLAN\n   \
  \       catPlan:\n          dbPlan:                     name=database1,level=1,allocation=75\n\
  \                                      name=database2,level=2,allocation=80\n  \
  \                                    name=other,level=3,allocation=100\n       \
  \   objective:                  auto\n          status:                     active\n\
  ```\n\n一个级别上所有数据库的总分配额不得超过 100%。如果任何级别的分配额总和超过 100%，`CellCLI` 将抛出错误。例如，以下列表显示了在级别\
  \ 1 上分配超过 100% 时 `CellCLI` 产生的错误：\n\n```\nCellCLI> alter iormplan dbplan=((name=database1,\
  \ level=1, allocation=75), -\n> (name=database2, level=1, allocation=80), -\n> (name=other,\
  \ level=3, allocation=100))\n\nCELL-00006: The IORMPLAN command contains an invalid\
  \ allocation total at level 1.\n```\n\n因为 IORM 始终启用，设置上述（正确的）计划意味着 IORM 数据库计划被强制执行。如果计划未按预期工作，可以通过指定空数据库计划来禁用计划：\n\
  \n```\nCellCLI> alter iormplan dbplan=''\n\nIORMPLAN successfully altered\n```\n\
  \n使用 Data Guard 选项时，可以将数据库在 Data Guard 设置中的角色（主库或备库）包含在 IORM 计划中，以便为两种角色指定不同的资源限制：\n\
  \n```\nCellCLI> alter iormplan dbplan=((name=database1, level=1, allocation=75,\
  \ role=primary), -\n> (name=database1, level=1, allocation=25, role=standby), -\n\
  > (name=database2, level=2, allocation=80), -\n> (name=other, level=3, allocation=100))\n\
  \nIORMPLAN successfully altered\n```\n\n由于每当添加需要除设置 `other` 指令之外的其他资源管理的数据库时都需要更改\
  \ I/O 资源管理器计划，因此本章稍后详细了解用于资源管理的 I/O 资源管理器配置文件是一个好主意。IORM 配置文件需要单元服务器 12.1.2.1.0\
  \ 或更高版本以及数据库版本 12.1.0.2 Exadata 补丁包 4 或更高版本。它们的优点是，您可以创建几个资源配置文件（例如高、中、低），并通过将参数\
  \ `DB_PERFORMANCE_PROFILE` 设置为配置文件名称来将数据库分配给这些资源配置文件。特别是在有新数据库定期添加和旧数据库移除的环境中，例如数据库即服务环境，这可以节省大量工作。\n\
  \n### 配置跨数据库 IORM：份额\n\n从单元服务器版本 11.2.3.1 开始，可以基于份额创建 IORM 计划，以表示数据库的相对权重，而不是百分比。基于百分比的计划最多支持\
  \ 32 个数据库，而基于份额的 IORM 计划最多可支持 1023 个数据库。基于份额的计划不能像基于百分比的计划那样具有多个级别，因此限制稍多。然而，基于份额的计划比基于百分比的计划更易于阅读和理解。以下是基于份额的计划的配置方法：\n\
  \n```\nCellCLI> alter iormplan dbplan=((name=database1, share=10), -\n> (name=database2,\
  \ share=4))\n\nIORMPLAN successfully altered\n```\n\n设置此计划意味着，当 `database1` 和 `database2`\
  \ 是唯一使用单元服务器的数据库时，在发生队列等待的情况下，`database1` 获得 71% (10/(10+4)*100) 的 I/O 资源，`database2`\
  \ 获得 29%。默认情况下，份额计划中未列出的数据库获得份额 1。如果要更改默认设置，可以通过为 `name=default` 添加指令来指定更改。\n\n\n\
  ## 限制超额 I/O 利用率\n\n通常，当有超额 I/O 资源可用时（已分配但未被其他消费者组使用），IORM 允许消费者组使用超过其分配额的资源。例如，如果\
  \ `database1` 数据库在级别 1 分配了 50% 的资源，那么当其他数据库未完全利用其分配额时，它可能会消耗超过此限制的 I/O 资源。你可以通过为特定数据库分配的\
  \ I/O 资源设置绝对限制来覆盖此行为。这为多数据库服务器环境提供了更可预测的 I/O 性能。`LIMIT` IORM 属性用于设置即使存在超额 I/O 容量时，数据库可使用的\
  \ I/O 资源上限。以下列表显示了一个 IORM 计划，它将 `database1` 数据库的 I/O 容量限制在单元的 80%。\n\n```\nalter\
  \ iormplan dbPlan=((name=database1, level=1, allocation=50, limit=80), -\n> (name=other,\
  \ level=2, allocation=100))\nIORMPLAN successfully altered\n```\n\n请注意，通过使用 DBRM\
  \ 资源计划中的 `UTILIZATION_LIMIT` 属性，也可以在消费者组级别定义最大的 I/O 限制。\n\n## 配置数据库间 IORM：闪存属性\n\
  \n在创建计划时，无论是使用 `allocation` 属性设置百分比，还是使用 `shares` 属性设置相对权重，存储服务器都提供了许多计划属性来管理闪存的使用。以下属性可用于管理\
  \ Flash Log 功能和 Flash Cache 功能的使用：\n\n```\nCellCLI> alter iormplan dbplan=((name=database1,share=10,\
  \ flashlog=on,flashcache=on ), -\n> (name=database2,share=4, flashlog=on,flashcache=off\
  \ ), -\n> (name=default,share=1, flashlog=off,flashcache=off ))\nIORMPLAN successfully\
  \ altered\n```\n\nFlash Log 和 Flash Cache 属性的用法非常直接，只有简单的 `on` 或 `off` 选项。在上面的例子中，任何计划中提及的其他数据库都将禁用\
  \ Flash Log 和 Flash Cache 功能，因为 `name=default` 行重新定义了默认设置。Flash Log 和 Flash Cache\
  \ 属性的默认设置（即在 IORM 计划中未明确定义）为开启（on）。\n\n从 Exadata 版本 12.1.2.0 开始，IORM 提供了更多的闪存管理属性：`flashcachemin`\
  \ 和 `flashcachelimit`。`flashcachemin` 属性保证了数据库对象在 Flash Cache 中的最小大小；`flashcachelimit`\
  \ 则设置了数据库可在 Flash Cache 中使用的空间上限：\n\n```\nCellCLI> alter iormplan dbplan=((name=database1,share=10,flashcachemin=1G),\
  \ -\n> (name=database2,share=4,flashcachemin=500M,flashcachelimit=1G), -\n> (name=default,share=1,flashcachelimit=500M))\n\
  IORMPLAN successfully altered\n```\n\n在此示例中，`database1` 的闪存使用最小大小设置为 1G，且无上限。`database1`\
  \ 可能是一个需要闪存来提升性能的重要数据库。另一个命名数据库 `database2` 也保证了在 Flash Cache 中的空间量为 500M，但其上限被限制为\
  \ 1G。任何其他数据库在 Flash Cache 中的空间使用量上限为 500M。\n\n## 类别 IORM\n\nI/O 资源管理器 (IORM) 通过一个称为\
  \ `category` 的属性扩展了资源组的概念。资源组允许 DBRM 在单个数据库内管理资源，而类别则提供了跨多个数据库的 I/O 资源管理。例如，假设我们的两个数据库\
  \ (`database1` 和 `database2`) 有相似的工作负载。它们都托管着执行短时、时间敏感事务的 OLTP 应用程序。在工作时间，这些事务必须具有优先级。这两个数据库也执行相当多的批处理，例如运行报告和维护作业。在工作时间，这些批处理的优先级较低。这两种工作负载可以使用\
  \ IORM 类别进行管理和分配优先级。可以在两个数据库中分别定义类别 `APPS_CATEGORY` 和 `BATCH_CATEGORY`，用于高优先级应用程序和长时间运行的低优先级活动。如果\
  \ `APPS_CATEGORY` 在级别 1 分配了 70%，那么无论存储网格负载多重，分配给此类别（来自两个数据库）的会话都将保证获得所有 I/O 资源的至少\
  \ 70%。\n\n\n\n#### 配置类别 IORM\n\n设置类别 IORM 相当直接明了。一旦创建了 DBRM 使用者组，您需要在数据库中创建类别并将其分配给这些使用者组。最后一步是在存储单元中创建\
  \ IORM 计划，为每个类别建立 I/O 分配和优先级。您可以在类别 IORM 计划中定义最多八个级别。\n\n为了展示 IORM 类别计划的使用，我们将创建两个新类别：`OLTP_CATEGORY`和`BATCH_CATEGORY`，并将它们分配给`OLTP`、`BATCH`和`MAINTENANCE`使用者组。为简洁起见，此处不展示使用者组的创建过程。此示例使用的是“创建（可插拔）数据库资源计划”一节中创建的使用者组。以下清单创建了我们的新类别，并将其分配给资源组。请记住，您需要在参与\
  \ IORM 类别计划的所有数据库上运行这些命令。为便于说明，我们将类别数量保持为两个。`BATCH`和`MAINTENANCE`资源组将被分配到`BATCH_CATEGORY`类别：\n\
  \n```sql\nBEGIN\ndbms_resource_manager.clear_pending_area();\ndbms_resource_manager.create_pending_area();\n\
  \n-- 创建类别 --\ndbms_resource_manager.create_category(\n  category => 'OLTP_CATEGORY',\n\
  \  comment  => 'Category for Interactive Applications');\n\ndbms_resource_manager.create_category(\n\
  \  category => 'BATCH_CATEGORY',\n  comment  => 'Batch and Maintenance Jobs');\n\
  \n-- 将使用者组分配到类别 --\ndbms_resource_manager.update_consumer_group(\n  consumer_group\
  \ => 'OLTP',\n  new_category   => 'OLTP_CATEGORY');\n\ndbms_resource_manager.update_consumer_group(\n\
  \  consumer_group => 'BATCH',\n  new_category   => 'BATCH_CATEGORY');\n\ndbms_resource_manager.update_consumer_group(\n\
  \  consumer_group => 'MAINTENANCE',\n  new_category   => 'BATCH_CATEGORY');\n\n\
  dbms_resource_manager.submit_pending_area();\nEND;\n/\n```\n```\nPL/SQL 过程已成功完成。\n\
  ```\n\n要检查您的使用者组到类别的映射，请按如下方式查询`DBA_RSRC_CONSUMER_GROUPS`视图。请注意，`OTHER_GROUPS`使用者组被分配到了`OTHER`类别。该映射由\
  \ Oracle 自动创建且无法更改：\n\n```sql\nSQL> SELECT consumer_group, category\n    FROM DBA_RSRC_CONSUMER_GROUPS\n\
  \    WHERE consumer_group\n    in ('OLTP','BATCH','MAINTENANCE','OTHER_GROUPS')\n\
  \    ORDER BY category;\n```\n```\nCONSUMER_GROUP                 CATEGORY\n------------------------------\
  \ ------------------------------\nOLTP                           OLTP_CATEGORY\n\
  BATCH                          BATCH_CATEGORY\nMAINTENANCE                    BATCH_CATEGORY\n\
  OTHER_GROUPS                   OTHER\n```\n\n现在，我们可以在存储单元上创建一个新的 IORM 类别计划，并对这些类别设置\
  \ I/O 限制。不过在此之前，我们将先删除上一示例中创建的数据库间 IORM 计划。请记住，每个存储单元维护着自己的 IORM 计划，因此您需要在存储网格中的每个单元上运行这些命令。\n\
  \n```bash\nCellCLI> alter iormplan dbplan= ''\nIORMPLAN 已成功更改\n```\n\n现在我们准备好创建\
  \ IORM 类别计划了。以下命令创建了一个计划，其中`OLTP_CATEGORY`和`BATCH_CATEGORY`在级别 1 上分别分配了总单元 I/O 的\
  \ 70%和 30%。默认类别`OTHER`在级别 2 上分配了 100%。\n\n```bash\nCellCLI> alter iormplan catplan=((name=OLTP_CATEGORY,\
  \ level=1, allocation=70), -\n> (name=BATCH_CATEGORY, level=1, allocation=30), -\n\
  > (name=OTHER, level=2, allocation=100))\nIORMPLAN 已成功更改\n```\n\n再次，我们将使用`CellCLI`命令`list\
  \ iorm detail`来确认我们的 IORM 类别计划已按我们期望的方式配置：\n\n```bash\nCellCLI> list iormplan detail\n\
  name:                       enkcel04_IORMPLAN\ncatPlan:                    name=OLTP_CATEGORY,level=1,allocation=70\n\
  \                            name=BATCH_CATEGORY,level=1,allocation=30\n       \
  \                     name=OTHER,level=2,allocation=100\ndbPlan:\nobjective:   \
  \               auto\nstatus:                     active\n```\n\n由于我们删除了上一练习中的数据库间计划，因此`dbPlan`字段为空。稍后，在本章的\
  \ IORM 指标部分，我们将讨论如何在存储单元上监控 IORM 的效果。\n\n### I/O 资源管理器与可插拔数据库\n\n随着 Oracle 数据库 12c\
  \ 的推出，数据库中实施了一种新架构。该新架构已在多处提及，通常被称为 Oracle 多租户选项。多租户性几乎已在数据库各处实现；容器数据库与非容器数据库之间的功能差距很小。值得庆幸的是，IORM\
  \ 支持可插拔数据库。与数据库内 IORM 计划类似，您通过 CDB 资源管理器计划在 CDB 级别定义的设置，一旦在 RDBMS 层激活，就会被发送到单元。分配给\
  \ PDB 的任何份额都同样适用于 CPU 和 I/O。与数据库中的所有资源管理功能一样，可插拔数据库上的 I/O 资源管理仅在存在 I/O 限制时才会显现出来。\n\
  \n\n\n### I/O 资源管理器配置文件\n\nExadata 存储服务器版本 12.1.2.1.0 引入了一种新机制，可以轻松地将数据库分组为性能类别，称为\
  \ I/O 资源管理配置文件。其思路是在存储服务器上创建一个命名的性能配置文件，并让数据库通过一个参数绑定到该配置文件，该参数被设置为性能配置文件的名称。此功能的数据库部分是一个名为\
  \ `DB_PERFORMANCE_PROFILE` 的参数，它随 Oracle 数据库版本 12.1.0.2 Exadata 补丁包 4 引入。\n\n性能配置文件与类别\
  \ IORM 计划不能同时使用。\n\n使用性能配置文件时，最多可以创建八个配置文件。性能配置文件专为处理大量数据库而设计。为了处理大量数据库，性能配置文件仅使用基于份额的优先级方法。你可能还记得，使用分配（百分比）方法的数据库间资源计划最多只能处理\
  \ 32 个数据库。通过使用基于份额的优先级方法，性能配置文件最多可处理 1023 个数据库。数据库参数 `DB_PERFORMANCE_PROFILE` 不是动态的，这意味着需要重启数据库才能设置它。在容器数据库（多租户选项）上使用\
  \ `DB_PERFORMANCE_PROFILE` 时，它只能在 CDB/根级别设置，而不能在可插拔数据库级别设置。在 CDB/根级别设置时，所有可插拔数据库都从根继承\
  \ `DB_PERFORMANCE_PROFILE` 设置。\n\n这是一个如何设置性能配置文件计划的示例：\n\n```\nCellCLI> alter iormplan\
  \ dbplan=((name=gold, share=12, limit=100, type=profile), -\n> (name=silver, share=5,\
  \ limit=65, type=profile), -\n> (name=bronze, share=3, limit=45, type=profile),\
  \ -\n> (name=default, share=1, limit=10))\n\nIORMPLAN successfully altered\n```\n\
  \n性能配置文件和数据库间计划是存储服务器中两种不同的资源管理选项。这意味着它们可以同时使用，但为了尽可能保持资源管理的简单性，我们不建议这样做。性能配置文件指令可通过\
  \ `type=profile` 识别；数据库间计划没有类型，或者它们被添加了 `type=database` 到 dbplan 指令中。\n\n在所有存储服务器上设置性能配置文件后，就可以在数据库上设置\
  \ `DB_PERFORMANCE_PROFILE` 参数（需要重启）以在存储层使用该配置文件。由于性能配置文件已在类别（第一）级别实现，因此可以使用数据库间计划在配置文件内分配资源，并使用数据库内计划来管理数据库内部的资源。\n\
  \n注意\n\n在大多数情况下，单级 I/O 资源计划就足够了。与 DBRM 一样，多级 IORM 资源计划会增加衡量你的分配方案有效性的复杂性。\n\n在使用多级分配方案时，重要的是要理解，在第\
  \ 1 级由数据库、类别或消费者组分配但未使用的 I/O 资源会立即传递到下一级。例如，如果你在第 1 级为数据库 A 和 B 分配了 70%/30%，并且在第\
  \ 2 级为数据库 C 分配了 100%，那么如果数据库 A 仅使用其分配的 50%，则剩余的 20% 将传递给数据库 C。数据库 B 不能利用数据库 A 分配但未使用的\
  \ I/O 资源，因为 A 和 B 处于同一级别。这是多级计划的一个微妙但重要的区别。如果不小心，你可能会无意中将过多的 I/O 资源给予较低级别的次要数据库，而不是将这些资源提供给你第\
  \ 1 级的高优先级数据库。\n\n基于份额的资源计划在设计上是单级的，并且易于创建和配置。在大多数情况下，使用基于份额的计划是使用 IORM 的最佳方式。除非你有特定的需求只能通过（多级）分配（百分比）计划来解决，否则应使用这些计划。\n\
  \n### 资源管理指令矩阵\n\n考虑到所有可用功能以及一些不能同时使用的功能，以下矩阵试图概述哪些指令可以或不可以使用。这在设计 I/O 资源管理策略时可能会有所帮助。\n\
  \n`LIMIT` 可被 `SHARES` 或 `LEVEL` 和 `ALLOCATION` 使用   应同时设置主备指令   仅当使用份额时   仅当使用级别和分配时\
  \   `UTILIZATION_LIMIT` 和 `PARALLEL_SERVER_LIMIT` 指令   新 PDB 的 `DEFAULT` 份额设置  \
  \ 最简单的方法是使用 `SHARES`   在 `MGMT_P1` 上指定   需要 `OTHER_GROUPS`   使用性能配置文件时不能使用类别计划（反之亦然）\
  \   适用于 DBRM 和 PDB   `DB_PERFORMANCE_PROFILE` 设置在非 CDB 或 CDB 上（PDB 从 `CDB$ROOT`\
  \ 继承）\n\n![A978-1-4302-6242-8_7_Figa_HTML.jpg](img/A978-1-4302-6242-8_7_Figa_HTML.jpg)\n\
  \n### IORM 监控与度量\n\nI/O 性能度量在存储单元中为 IORM 收集和维护。这些度量可用于确定你的 IORM 计划对你在环境中定义的数据库、类别或配置文件以及资源组资源指令的影响。例如，你可以看到特定数据库与其他数据库相比正在使用多少\
  \ I/O。通过观察 IORM 消费者组的实际 I/O 分布，你可以确定是否需要调整以提供足够的 I/O 资源给使用你数据库的应用程序。在本节中，我们将了解这些度量的组织方式并挖掘其中存储的有价值信息。有关\
  \ Exadata 监控的更多信息，包括取自存储服务器的信息，请参见第 11 章和第 12 章。\n\n通过 `cellcli` 可用的度量有两个不同的来源：`METRICCURRENT`（这是在一分钟内测量的度量，之后可通过\
  \ `METRICCURRENT` 获取）和 `METRICHISTORY`（这是通过 `METRICCURRENT` 暴露的度量，是 `METRICCURRENT`\
  \ 已过期的度量，存储一定天数——默认为七天）。可以通过查询单元的 `metrichistorydays` 属性来查看该设置：\n\n```\nCellCLI>\
  \ list cell attributes name, metrichistorydays\n          enkcel04          7\n\
  ```\n\n如果需要更改保留度量历史的时间，可以使用 alter cell 命令完成：\n\n```\nCellCLI> alter cell metricHistoryDays=’14’\n\
  Cell enkcel04 successfully altered\n\nCellCLI> list cell attributes name, metricHistoryDays\n\
  \          enkcel04        14\n```\n\n在大多数情况下，对于单元度量的典型使用，七天的历史记录就足够了。\n\n\n\n####\
  \ 理解 IORM 指标\n\n当遇到关于 I/O 吞吐量的问题时，无论是否创建和设置了 IORM 计划，首先需要在 cell 上检查实际的活动情况。以下`cellcli`命令显示了按存储介质分组的、每个数据库当前的请求数量：\n\
  ```\nCellCLI> list metriccurrent where objecttype='IORM_DATABASE' and name like\
  \ 'DB_(FC_|FD_|)IO_BY_SEC'\n\n          DB_FC_IO_BY_SEC          ASM           \
  \            0 MB/sec\n          DB_FC_IO_BY_SEC          TEST                 \
  \     0 MB/sec\n          DB_FC_IO_BY_SEC          COLVIN                    0 MB/sec\n\
  \          DB_FC_IO_BY_SEC          MBACH                     0 MB/sec\n       \
  \   DB_FC_IO_BY_SEC          _OTHER_DATABASE_          0 MB/sec\n          DB_FD_IO_BY_SEC\
  \          ASM                       0 MB/sec\n          DB_FD_IO_BY_SEC       \
  \   TEST                      0 MB/sec\n          DB_FD_IO_BY_SEC          COLVIN\
  \                    0 MB/sec\n          DB_FD_IO_BY_SEC          MBACH        \
  \             0 MB/sec\n          DB_FD_IO_BY_SEC          _OTHER_DATABASE_    \
  \      0 MB/sec\n          DB_IO_BY_SEC             ASM                       0\
  \ MB/sec\n          DB_IO_BY_SEC             TEST                      0 MB/sec\n\
  \          DB_IO_BY_SEC             COLVIN                    0 MB/sec\n       \
  \   DB_IO_BY_SEC             MBACH                     0 MB/sec\n          DB_IO_BY_SEC\
  \             _OTHER_DATABASE_          0 MB/sec\n```\n该`list`命令列出了对 cell 可见的数据库通过闪存缓存(`DB_FC_IO_BY_SEC`)、闪存盘(`DB_FD_IO_BY_SEC`)和硬盘(`DB_IO_BY_SEC`)所使用的带宽。有几点值得注意。数据库`ASM`是一个特殊的数据库指示符，用于表示\
  \ ASM 启动和相关的任务，例如再平衡。此外，`_OTHER_DATABASE_`是一个特殊的数据库名称，用于表示与计算层 IO 不直接相关的 IO 任务。`_OTHER_DATABASE_`\
  \ IO 的一个例子是将回写闪存缓存数据反洗到磁盘。\n\n#### IORM 指标： metric_iorm.pl\n\n为了使在命令行上获取和解读 cell\
  \ I/O 性能与 I/O 资源管理器统计信息更加容易，Oracle 在 My Oracle Support 注释 1337265.1（用于收集 I/O 资源管理器指标的工具：`metric_iorm.pl`）中提供了一个名为`metric_iorm.pl`的\
  \ Perl 脚本。这个工具对于诊断磁盘和闪存的绝对性能，以及诊断 IO 资源管理的影响非常有价值。关于这个脚本没有太多可说的，因为 My Oracle Support\
  \ 注释在安装方面非常完整（安装是通过将脚本放置在 cell 服务器上要使用的用户的主目录中完成的，通常是 root 或 celladmin），在用法上也很全面（主要是关于如何获取历史数据）。\n\
  \n该脚本获取磁盘和闪存 I/O 性能的统计信息，并获取与 IORM 相关的统计信息，然后以可读的方式提供这些信息。你可以在“IORM 相关指标概述”部分阅读更多关于这些统计信息的内容。第\
  \ 11 章提供了该脚本的进一步示例和用例。\n\n#### 工作负载管理\n\nIORM 指标提供了关于`cellsrv`如何在存储网格中的消费者之间分配 I/O\
  \ 资源的洞察。`Cellsrv`跟踪 I/O 请求，大致分为“小请求”和“大请求”。通过比较 IORM 指标中的大(`LG`)和小(`SM`) I/O 请求，你可以确定你的数据库更倾向于\
  \ DW 工作负载（高吞吐量）还是 OLTP 工作负载（低延迟）。通过将`IORM_MODE`与存储单元上的实际工作负载进行比较，你可以确定当前的 IORM 目标是否合适。例如，如果你发现存储单元中的大多数\
  \ I/O 操作都大于 128K，因此是大的(`LG`)，那么你可以考虑将目标设置为高吞吐量。同样，如果你发现存储单元中的大多数 I/O 操作都小于 128K，你可以考虑将目标设置为低延迟。但是，请注意将目标设置为`basic`或`auto`以外的值的含义；目标`high_throughput`可能会增加延迟时间，而`low_latency`可能会降低吞吐量。我们发现大多数客户使用`basic`或`auto`。\n\
  \ncell 服务器跟踪设置的 IORM 目标，包括（作为快速回顾）`basic`、`auto`、`low_latency`、`balance`和`high_throughput`。然而，cell\
  \ 服务器本身使用三种优化模式来执行 I/O：\n\n*   模式 1：`low_latency`\n*   模式 2：`balanced`\n*   模式 3：`high_throughput`\n\
  \n要查看 cell 服务器当前设置的模式，请使用以下命令：\n```\nCellCLI> list metriccurrent iorm_mode\n\n \
  \         IORM_MODE          enkcel04          2\n```\n当 I/O 延迟或带宽的变化影响数据库处理时间，并且\
  \ IORM 目标被设置为`auto`时，可以使用`METRICHISTORY`值调查`IORM_MODE`统计信息随时间的变化：\n```\nCellCLI>\
  \ list metrichistory where name = 'IORM_MODE' attributes name, metricvalue, collectiontime\n\
  \n          IORM_MODE          2          2015-05-06T07:59:16-05:00\n          IORM_MODE\
  \          2          2015-05-06T08:00:16-05:00\n          IORM_MODE          2\
  \          2015-05-06T08:01:16-05:00\n          IORM_MODE          2          2015-05-06T08:02:16-05:00\n\
  \          IORM_MODE          2          2015-05-06T08:03:16-05:00\n          IORM_MODE\
  \          2          2015-05-06T08:04:16-05:00\n          IORM_MODE          2\
  \          2015-05-06T08:05:16-05:00\n..snip..\n```\n\n\n\n"
- '# IORM 相关指标概览


  我们关注的 IORM 监控指标具有以下 `objectType`：`IORM_DATABASE`、`IORM_CATEGORY`、`IORM_PLUGGABLE_DATABASE`
  和 `IORM_CONSUMER_GROUP`。这些指标通过 `METRICCURRENT` 对象中的 `name` 属性进行进一步组织。指标名称是表示 I/O
  消费者组类型、存储设备类型和描述性名称的缩写组合。`name` 属性的元素格式如下：

  ```

  {consumer_type}_{device type}_{metric}

  ```

  其中 `consumer_type` 代表 IORM 资源组，为以下之一：

  * `DB` = 跨数据库 IORM 计划

  * `CT` = 类别 IORM 计划

  * `CG` = 数据库内 IORM 计划

  * `PDB` = 可插拔数据库 IORM 计划


  而 `device_type` 是服务 I/O 请求的存储类型，为以下之一：

  * `FC` = 闪存缓存

  * `FD` = 基于闪存的网格磁盘

  * `’’` = 如果既非前者也非后者，则指标代表对物理磁盘的 I/O


  属性的最后一部分 `{metric}` 是指标的描述性名称。指标名称可能进一步由 `SM` 或 `LG` 限定，表示其代表小型 I/O 请求或大型 I/O 请求。例如：

  * `CG_FC_IO_RQ_LG`：为 DBRM 消费者组从闪存缓存（FC）服务的大型 I/O 请求总数。

  * `CG_FD_IO_RQ_LG`：为 DBRM 消费者组从基于闪存的网格磁盘（FD）服务的大型 I/O 请求总数。

  * `CG_IO_RQ_LG`：为 DBRM 消费者组从物理磁盘（网格磁盘）服务的大型 I/O 请求总数。


  下表列出了跨数据库、类别、数据库内和可插拔数据库资源计划所共有的指标。此列表并非详尽无遗；还有更多指标。


  | 名称 | 描述 |

  | --- | --- |

  | `{CG,CT,DB,PDB}_IO_BY_SEC` | 为此 I/O 消费者调度的每秒兆字节数。 |

  | `{CG,CT,DB,PDB}_IO_LOAD` | 此 I/O 消费者的平均 I/O 负载。I/O 负载指定磁盘队列长度。它类似于 iostat 的 `avgqu-sz`，但该值根据磁盘类型加权；对于硬盘，大型
  I/O 的权重是小型 I/O 的三倍。对于闪存盘，大型和小型 I/O 权重相同。 |

  | `{CG,CT,DB,PDB}_IO_RQ_{SM,LG}` | 来自此 I/O 消费者的小型或大型 I/O 请求的累计数量。 |

  | `{CG,CT,DB,PDB}_IO_RQ_{SM,LG}_SEC` | 此 I/O 消费者每秒发出的小型或大型 I/O 请求数量。 |

  | `{CG,CT,DB,PDB}_IO_WT_{SM,LG}` | 来自此 I/O 消费者的 I/O 请求等待 IORM 调度所花费的累计时间（毫秒）。 |

  | `{CG,CT,DB,PDB}_IO_WT_{SM,LG}_RQ` | 由上面的 `{CG,CT,DB}_IO_WT_{SM,LG}` 派生而来。它存储了在过去一分钟内
  I/O 请求等待 IORM 调度所花费的平均等待时间（毫秒）。大量的等待表明此 I/O 消费者的 I/O 工作负载超出了其分配量。对于较低优先级的消费者，这可能是期望的效果。对于较高优先级的消费者，这可能表明应分配更多
  I/O 资源以满足组织的目标。 |

  | `{CG,CT,DB,PDB}_IO_UTIL_{SM,LG}` | 此 I/O 消费者消耗的总 I/O 资源的百分比。 |

  | `{CG,CT,DB,PDB}_IO_TM_{SM,LG}` | 此 I/O 消费者读取小型和大型块的累计延迟。 |

  | `{CG,CT,DB,PDB}_IO_TM_{SM,LG}_RQ` | 此 I/O 消费者读取块的平均延迟。 |


  以上所有累计指标在 `cellsrv` 重启、IORM 计划启用或该 I/O 消费者组的 IORM 计划发生变化时，都会被重置为 0。例如，如果 IORM 类别计划被更改，以下累计指标将被重置：

  ```

  CT_IO_RQ_SM

  CT_IO_RQ_LG

  CT_IO_WT_SM

  CT_IO_WT_LG

  CT_IO_TM_SM

  CT_IO_TM_LG

  ```

  这些 IORM 指标进一步使用 `metricObjectName` 属性进行分类。跨数据库资源计划指标存储在详细记录中，其中 `metricObjectName`
  设置为相应的数据库名称。类似地，IORM 类别计划的指标通过与类别名称匹配的 `metricObjectName` 来标识。IORM 消费者组由数据库名称和 DBRM
  消费者组名称的串联来标识。最后，与 PDB 相关的 IORM 信息在 `metricObjectName` 字段中使用 `<database name>.<PDB
  name>` 语法。


  '
- '# 后台进程


  正如我们之前讨论的，数据库后台进程会根据优先级自动分配到内置（内部）IORM 消费者组。下表显示了这些特殊的 IORM 消费者组及其用途描述。


  表 7-7. 资源管理器内部消费者组


  | 消费者组 | 描述 |

  | --- | --- |

  | `_ASM_` | 与 Oracle ASM 卷管理相关的 I/O |

  | `_ORACLE_BG_CATEGORY_` | 数据库后台进程发出的高优先级 I/O 请求 |

  | `_ORACLE_MEDPRIBG_CATEGORY_` | 数据库后台进程发出的中等优先级 I/O 请求 |

  | `_ORACLE_LOWPRIBG_CATEGORY_` | 数据库后台进程发出的低优先级 I/O 请求 |


  重要的是要认识到，高敏感度 I/O 请求（如日志写入器写入）的优先级是通过（内部）消费者组强制执行的。但这在事件链中可能为时已晚。回顾 IORM 的评估步骤：

  类别/配置文件 -> 跨数据库计划 -> 可插拔数据库 -> 数据库内计划


  您可以看到，尽管该组被命名为高优先级 I/O 请求组，但 IORM 的评估对于该组排在第四位，这意味着如果资源已经在较早的步骤（如跨数据库计划）中被分配出去，数据库可能只剩下很少的优先级。这意味着即使被命名为高优先级
  I/O 组，在 I/O 压力出现时的整体情况下，它仍然可能拥有非常低的优先级。当然，这确实意味着，相对于同一数据库中其他消费者组执行的 I/O，该组为其 I/O
  获得了最高优先级。


  当启用类别计划时，情况会有所改变。启用类别计划后，会创建内部类别计划，如上述内部消费者组，后台和 ASM 请求将被直接确定优先级。在内部计划中，优先级划分基于跨数据库计划的优先级。



  '
- '# 总结


  数据库管理员面临的一大挑战是有效管理系统资源以满足业务目标，尤其是在数据库整合的场景下。多年来，Oracle 开发了丰富的功能，使资源管理成为可能。遗憾的是，由于其复杂性，这些功能很少被实施。但请务必注意，随着服务器变得更加强大和高效，数据库整合将变得越来越普遍。在
  Exadata 平台上尤其如此。了解如何使用数据库和 I/O 资源管理，将成为确保您的数据库满足业务需求的一项日益重要的工具。


  我们能提供的最佳建议是保持简单。试图利用 Oracle 资源管理器中的每一个花哨功能可能会导致混淆和不理想的结果。如果您没有对多级资源计划的特定需求，请坚持使用单级方法；或者使用基于份额的方法，该方法在设计上就是单级的。类别计划是另一个很少需要（和使用）的功能。新的
  Exadata `12.1.2.1.0` 和数据库 `12.1.0.2 BP4` 性能配置文件功能看起来很有前景，是一种简便的资源管理方法。您将面临的大多数情况都可以通过实施一个简单的、单级的数据库间资源计划来解决。这意味着，关于资源管理我们能给出的最佳建议是：从小处着手，保持简单，并根据需要添加功能。


  ## 8. 配置 Exadata


  Oracle 提供一项可选服务，负责从头到尾安装和配置您的 Exadata 数据库一体机。许多公司购买此服务以缩短实施时间，并降低将 Exadata 集成到其
  IT 基础设施中的复杂性。如果您正在阅读本章，您可能正在考虑自行执行配置，或者您只是想更好地了解如何完成此过程。我们在此讨论的过程与 Oracle 使用的安装过程非常相似，主要是因为我们将会使用与
  Oracle 相同的工具来配置 Exadata。该工具名为 `OneCommand`。它会获取您提供的特定于站点的信息，并执行从网络到软件再到存储的整个配置过程。完成后，您的
  Exadata 数据库一体机将具备完整功能，包括一个初始数据库。


  ### Exadata 网络组件


  Oracle 数据库网络需求多年来不断演变，使用 Exadata 时，您会注意到一些新术语以及一个新网络的增加。传统上，Oracle 数据库服务器需要一个公共网络链路来提供管理访问（通常是
  `SSH`）和数据库访问（`SQL*Net`）。随着 `11gR2` Grid Infrastructure（以前称为 Oracle Clusterware）的推出，Oracle
  为这个网络创造了一个新术语——客户端访问网络。在 Exadata 平台上，管理流量和数据库流量已经通过创建一个新的管理访问网络而分开。这个新网络被称为管理网络。客户端访问网络不再可通过
  `SSH` 访问，仅用于 Oracle 监听器接收 `SQL*Net` 连接。在 Exadata 术语中（主要在配置上下文中），这两个网络被称为 `NET0`（管理网络）和
  `BONDETH0`（客户端访问网络）。


  计算节点和存储单元上的以太网端口数量和类型在 Exadata 的 `V2`、`X2` 和 `X3` 型号之间有所不同。每个型号的硬件规格在《Exadata 数据库一体机用户指南》中有详细说明。不过，所有型号至少提供四个嵌入式
  `1` 千兆以太网端口。Oracle 将这些端口标识为 `NET0`、`NET1`、`NET2` 和 `NET3`。`X2-2` 及更新型号在端口 `NET4`
  和 `NET5` 上包含一对 `10` 千兆以太网连接（不包括 `SFP+` 模块）。如前所述，`NET0` 用于管理网络（`ETH0`），而一对 `NET1`/`NET2`
  或 `NET4`/`NET5` 用于客户端访问网络（`BONDETH0`）。在 `RAC` 环境中，常见的做法是将两个以太网设备绑定在一起，为客户端访问网络提供硬件冗余。这些链路传统上是主动/被动模式以提供容错能力。`NET3`
  接口未分配，可用作可选网络进行配置。


  #### ILOM


  除了管理网络接口（`NET0`）外，计算节点和存储单元还配备了集成式远程系统管理器（`ILOM`）。在大多数现代服务器中常见，`ILOM` 是每个计算节点和存储单元中的一块适配卡，独立于操作系统运行。一旦服务器通电，`ILOM`
  就会启动，并通过管理网络提供 Web 和 `SSH` 访问。`ILOM` 允许您远程执行许多原本需要物理接触服务器才能完成的任务，包括访问控制台、关闭和开启系统电源、以及重启或重置系统。如果需要，`ILOM`
  提供一个串行端口，可用于直接获得主机的控制台访问权限。此串行端口需要 `DB-9` 转 `RJ-45` 连接。大多数现代客户端设备将需要一个 `USB` 转串口适配器，该适配器包含在
  Exadata 备件套件中。此外，`ILOM` 监控服务器内部硬件组件的配置和状态。如上表所述，`ILOM` 通过其以太网端口连接到 Exadata 机箱内的管理交换机。


  #### 客户端访问网络


  客户端访问网络供 Oracle 监听器使用，以提供到数据库的 `SQL*Net` 连接。在 `RAC` 术语中，这个网络传统上被称为公共网络。来自每个数据库服务器（计算节点）的一条或两条链路（`NET1`/`NET2`
  或 `NET4`/`NET5`）直接连接到您的公司交换机。Oracle 建议绑定连接以为客户端连接提供硬件冗余。铜缆连接应在 `NET1` 和 `NET2` 上进行绑定。对于绑定光纤链路，请使用
  `NET4` 和 `NET5`。如果端口已绑定，那么每条链路应终止于单独的交换机，以提供网络冗余。



  #### 私有网络


  内部的 InfiniBand (IB) 交换机为私有网络提供服务。该网络管理 RAC 互连流量（缓存融合、心跳），以及数据库网格和存储网格之间的 iDB 流量。此网络完全包含在
  InfiniBand 网络交换机结构内，没有到您公司网络的上行链路。网络配置可以在 `/etc/sysconfig/network-scripts` 目录下的
  `ifcfg-ib0` 和 `ifcfg-ib1` 配置文件中找到。在 X4 之前发布的型号中，它们被配置为绑定设备，主设备文件为 `ifcfg-bondib0`。例如，以下列表显示了我们实验室中一台
  X3-2 数据库服务器的 InfiniBand 网络配置文件。注意 `MASTER` 参数如何用于将这些网络设备映射到 `bondib0` 设备：


  ```

  /etc/sysconfig/network-scripts/ifcfg-bondib0


  DEVICE=bondib0

  USERCTL=no

  BOOTPROTO=none

  ONBOOT=yes

  IPADDR=192.168.10.1

  NETMASK=255.255.252.0

  NETWORK=192.168.8.0

  BROADCAST=192.168.11.255

  BONDING_OPTS="mode=active-backup miimon=100 downdelay=5000 updelay=5000 num_grat_arp=100"

  IPV6INIT=no

  MTU=65520

  ```


  ```

  /etc/sysconfig/network-scripts/ifcfg-ib0


  DEVICE=ib0

  USERCTL=no

  ONBOOT=yes

  MASTER=bondib0

  SLAVE=yes

  BOOTPROTO=none

  HOTPLUG=no

  IPV6INIT=no

  CONNECTED_MODE=yes

  MTU=65520

  ```


  ```

  /etc/sysconfig/network-scripts/ifcfg-ib1


  DEVICE=ib1

  USERCTL=no

  ONBOOT=yes

  MASTER=bondib0

  SLAVE=yes

  BOOTPROTO=none

  HOTPLUG=no

  IPV6INIT=no

  CONNECTED_MODE=yes

  MTU=65520

  ```


  在 X4 和 X5 代系统中，每个 InfiniBand 端口都配置有其专用的 IP 地址。下面的示例显示了一个 X4-2 计算节点的 InfiniBand 接口配置文件样本：


  ```

  /etc/sysconfig/network-scripts/ifcfg-ib0


  #### DO NOT REMOVE THESE LINES ####

  #### %GENERATED BY CELL% ####

  DEVICE=ib0

  BOOTPROTO=static

  ONBOOT=yes

  HOTPLUG=no

  IPV6INIT=no

  IPADDR=192.168.12.1

  NETMASK=255.255.255.0

  NETWORK=192.168.12.0

  BROADCAST=192.168.12.255

  MTU=7000

  CONNECTED_MODE=yes

  ```


  ```

  /etc/sysconfig/network-scripts/ifcfg-ib1


  #### DO NOT REMOVE THESE LINES ####

  #### %GENERATED BY CELL% ####

  DEVICE=ib1

  BOOTPROTO=static

  ONBOOT=yes

  HOTPLUG=no

  IPV6INIT=no

  IPADDR=192.168.12.2

  NETMASK=255.255.255.0

  NETWORK=192.168.12.0

  BROADCAST=192.168.12.255

  MTU=7000

  CONNECTED_MODE=yes

  ```


  这种配置方法提供了冗余的活动链路。请注意，IB 网络设备的 `MTU` 大小被设置为 7,000（字节）。`MTU` 代表最大传输单元，它决定了可在网络上传输的网络数据包的最大大小。典型的以太网网络配置的
  `MTU` 大小最多为 1,500 字节。近年来，巨帧技术已成为一种流行的方法，通过减少 Oracle RAC 集群中节点之间缓存融合所需的网络往返次数来提高数据库性能。通常，巨帧支持高达
  9,000 字节的 `MTU`，但某些实现可能支持更大的 `MTU` 大小。


  **注意**


  只有数据库服务器配置了更大的 `MTU` 大小。据推测，这是为了有益于数据库服务器与任何连接到 IB 交换机的外部主机之间的 TCP/IP (`IPoIB`:
  IP over InfiniBand) 流量。您可能会惊讶地了解到，存储单元上的 IB 端口配置的是标准的 1,500 字节 `MTU` 大小。存储单元上不需要大的
  `MTU` 大小，因为数据库网格和存储网格之间的大多数大型 I/O 操作都使用 `RDS` 协议，该协议对于数据库 I/O 效率更高，并且完全绕过了 TCP/IP
  协议栈。在 InfiniBand 网络上，`MTU` 大小仅在处理 InfiniBand 上的 IP (`IPoIB`) 时起作用——而不是 `RDS`。使用
  InfiniBand 网络的进程，如备份或 NFS 挂载，可以从更大的 `MTU` 大小中受益。


  ### 关于配置过程


  配置 Oracle 数据库服务器通常是一个手动且容易出错的过程，尤其是对于 RAC 环境。Exadata 也可以手动配置，但该平台的复杂性可能使这成为一项有风险的任务。Oracle
  通过提供一个名为 Oracle Exadata 部署助手 (`OEDA`) 的实用程序，极大地简化了配置过程。该工具确保所有 Exadata 机架都使用相同的流程和工具集进行配置，这对于该平台的更广泛支持至关重要。`OEDA`
  使用您提供的输入参数，并为您执行所有低级任务。即便如此，收集 `OEDA` 所需的所有正确信息很可能需要协作完成，尤其是在网络组件方面。Exadata 配置过程的最终结果是为您留下一个完全配置好的
  Oracle RAC 系统，该系统已修补到指定的软件版本，并且示例数据库已启动并运行。图 8-1 展示了使用 `OEDA` 的 Exadata 配置过程。


  ![A978-1-4302-6242-8_8_Fig1_HTML.gif](img/A978-1-4302-6242-8_8_Fig1_HTML.gif)


  图 8-1. 配置过程


  如图 8-1 所示，该过程的第一步是收集安装要求并将其输入到 `OEDA` 图形实用程序中。Exadata 需要三个不同网络（管理、客户端访问和 InfiniBand）的
  IP 地址，以及域名服务 (DNS)、网络时间协议 (NTP)、自动服务请求 (ASR) 的信息，如果您希望发送警报，还需要邮件信息。所有这些项目随后都被输入到
  `OEDA` 图形实用程序中。在收集网络需求时，您很可能需要网络管理员的帮助来保留 IP 地址和子网，并向域名服务器注册新的网络名称。理解这些配置设置如何使用很重要，因此我们将在“步骤
  2：运行 `OEDA`”中花大量时间讨论它们。


  `OEDA` 可从 `My Oracle Support` 下载，可以在 `MOS note # 888828.1` 中找到。执行安装的人员可以指导您下载哪些文件。`OEDA`
  包含一个基于 Java 的图形实用程序，它包含在更大的文件集中，其中还包括用于安装和配置 Exadata 的 `OEDA` 配置脚本。`OEDA` 生成 `OneCommand`
  配置系统所需的所有参数和部署文件，以及 `Oracle Enterprise Manager 12c` 用于配置 Exadata 目标的附加文件，还有 `Oracle
  Platinum Support` 用于额外支持的配置文件。完成后，您就可以将这些文件上传到 Exadata。


  在运行 `OEDA` 配置脚本之前，您需要准备好 `Grid Infrastructure` 和数据库（包括任何 Oracle 规定的补丁）的安装介质。该过程的最后一步是执行
  `OEDA` 配置脚本。它的操作包括多个步骤，用于配置 Exadata 数据库机的所有组件。运行 `OEDA` 配置实用程序的顶层脚本名为 `config.sh`。该脚本可以端到端运行，自动执行所有步骤，也可以使用命令行选项指定运行特定步骤。我们强烈建议一次运行一个步骤。这样做使得在某个步骤未能成功完成时更容易进行故障排除。此外，Exadata
  八分之一机架配置包含几个需要重新启动节点的步骤。


  **注意**




  '
- '# 配置 Exadata


  Oracle 并未为其网格基础设施、ASM 和 RDBMS 产品创建专门的 Exadata 版本，而是选择将 Exadata 特定的代码直接集成到您会安装在非
  Exadata 平台上的相同产品中。在 11.2 版本中，Oracle 发布了单独的“捆绑补丁”，其中包含标准 PSU 内容以及额外的 Exadata 特定错误修复。从版本
  12.1.0.1 开始，Oracle 不再为 Exadata 发布单独的捆绑补丁，而是推荐应用标准 PSU。


  当您收到 Exadata 数据库一体机时，Oracle 硬件技术员会完成某些任务。这些任务包括连接 Exadata 机架内的所有网络组件，并为私有网络（IB 交换机）配置
  IP 地址。此过程完成后，所有计算节点和存储单元都将通过 IB 交换机连接在一起。OEDA 配置脚本仅从第一个计算节点运行，并使用管理网络在其他服务器和存储单元上执行配置命令，以及在所有数据库服务器上安装网格基础设施和
  RDBMS 软件。


  ## 步骤 1：收集安装需求


  一如既往，收集需求是着手任何项目最关键（也最令人沮丧）的部分之一。因为 Exadata 是一次性配置完成的，所有内容都必须准备好同时就绪。这意味着网络必须准备就绪，所有主机名必须在
  DNS 中注册，并且诸如哪些电子邮件地址应接收警报等信息都必须在系统安装前收集好。虽然可以跳过此步骤直接进入 QEDA，但如果未填写所有必需信息，则没有机制可以保存进度。我们将通过逐步讲解配置实用程序来介绍实际需要的项目。


  ## 步骤 2：运行 Oracle Exadata 部署助手


  在 X3 发布之前，Oracle 要求客户填写一份冗长的文档，然后发回给 Oracle。收到后，Oracle 会将这些信息输入到一个 Excel 电子表格 (`dbm_configurator.xls`)
  中。2012 年 10 月，Oracle 将这两个步骤合并为一个 Java 实用程序 (`OEDA`)，客户可以直接填写。虽然它确实减少了总工作量，但对于不熟悉所提每个问题的含义的客户来说，`OEDA`
  同样可能令人望而生畏。


  首先，为了获取 `OEDA` 实用程序，客户必须下载将安装在 Exadata 上的软件包。这可以在 My Oracle Support 注释 #888828.1
  的“`OEDA`”部分找到。下载实用程序后，解压缩文件，其中将包含配置实用程序。Windows、Linux 和 Mac OS X 有单独的下载版本，因此请下载与您将运行初始图形实用程序的计算机对应的版本。准备好运行配置实用程序时，根据您的操作系统运行
  `./config.sh` 或 `config.cmd`。欢迎屏幕将会出现（图 8-2）。从这里，用户可以点击“下一步 ➤”继续，或点击“导入”，这允许您修改一组现有的配置文件。


