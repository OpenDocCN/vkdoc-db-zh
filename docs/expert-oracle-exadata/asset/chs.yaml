  100.00    0.000370                  2972       591 total\n```\n\n在此列表中，我们对一个用户的前台进程（有时也称为影子进程）运行了\
  \ `strace`。该进程负责代表用户检索数据。如您所见，`strace` 捕获的绝大多数系统调用都与网络相关 (`setsockopt`)。相比之下，在非\
  \ Exadata 平台上，我们主要看到的是与磁盘 I/O 相关的事件，主要是某种形式的 `read` 调用。以下是非 Exadata 平台的一些输出，供比较：\n\
  \n```\nACOLVIN@AC12> @whoami\n\nUSERNAME          USER#        SID    SERIAL#  PREV_HASH_VALUE\
  \  SCHEMANAME  OS_PID\n------------- --------- ---------- ----------  ---------------\
