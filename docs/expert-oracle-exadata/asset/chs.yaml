  \    |         |\n```\n\n`DBMS_SQLTUNE.REPORT_SQL_MONITOR` 函数也接受 `HTML` 作为 `TYPE`\
  \ 参数的值，而不是 `TEXT`，在这种情况下，输出将以 HTML 格式生成。如果你将此输出假脱机到一个 HTML 文件并在浏览器中打开，你将看到比纯文本好得多的输出。从\
  \ Oracle 11.2 开始，你还可以使用 `ACTIVE` 作为参数，并将其输出假脱机到 HTML 文件。现在，如果你在浏览器中打开这个文件，你将看到 SQL\
  \ 监控页面，几乎与它在 Cloud Control 中的外观一模一样！而且显示该报告所需的所有数据都自包含在假脱机的 HTML 文件中——打开时不需要数据库访问！如果你想通过电子邮件将一份详细、自包含的报告（包含一些\
  \ SQL 执行问题）发送给某人，这将非常有用。\n\n#### 控制 SQL 监控\n\n对于所有使用并行执行的语句，SQL 监控会立即启动——无论它们运行了多长时间。对于串行执行的语句，SQL\
  \ 监控不会立即启动，因为它并非设计用于监控典型的快速 OLTP 查询（这些查询每秒执行多次）。然而，如果一个串行查询消耗了超过五秒的总 CPU 和/或 I/O\
  \ 等待时间，则被视为长时间运行的查询，并为该语句启用 SQL 监控。这是无缝且动态发生的；不需要重新执行语句。\n\n你还可以使用 `MONITOR` 和 `NO_MONITOR`\
  \ 提示来控制语句的 SQL 监控。`V$SQL_HINT` 视图显示了所有可用的提示以及它们被引入的版本。例如：\n\n```sql\nSQL> SELECT\
  \ name, inverse, version, class, sql_feature\n  2  FROM v$sql_hint WHERE name LIKE\
  \ '%MONITOR%';\n\nNAME            INVERSE          VERSION    CLASS           SQL_FEATURE\n\
  --------------- --------------- ---------- --------------- ---------------\nNO_MONITORING\
  \                    8.0.0      NO_MONITORING   QKSFM_ALL\nMONITOR         NO_MONITOR\
  \       11.1.0.6   MONITOR         QKSFM_ALL\nNO_MONITOR      MONITOR          11.1.0.6\
  \   MONITOR         QKSFM_ALL\n```\n\n注意，`NO_MONITORING` 提示尽管名称相似，但完全是另一回事。`NO_MONITORING`\
  \ 提示允许你禁用表列上的谓词使用监控（`sys.col_usage$`），它与 Oracle 11g 中引入的实时 SQL 监控选项无关。\n\n\n\n"
- "# 使用 V$SQL 和 V$SQLSTATS 监控 SQL 语句\n\n在“过去”（Oracle 10g ASH 之前），性能监控通常是通过各种 `V$`\
  \ 视图来完成的，这些视图显示了实例范围内的聚合指标。例如，Statspack 的 TOP-5 等待事件报告部分，仅仅是两个 `V$SYSTEM_EVENT`\
  \ 视图快照之间的增量。TOP SQL 报告则基于 `V$SQL` 快照，该快照将库缓存中仍然存在的每个子游标的执行统计信息和资源消耗情况外化展示。\n\n然而，在一个大型数据库系统中（比如\
  \ ERP 应用程序），库缓存中可能会有数万个游标，因此收集和存储所有这些游标统计信息的增量是不切实际的。出于这个原因，像 Statspack 和 AWR 这样的工具只存储一些顶级资源消耗语句的增量，而忽略那些不重要的语句。请记住，由于这些工具收集的是实例范围的数据，如果只有少数会话执行某个长时间运行的语句，它最终可能会被忽略。一个运行糟糕\
  \ SQL 语句的单一会话，可能会被实例中所有其他会话（可能有成千上万个）的“噪音”所淹没，从而无法被“听”到。这种实例范围的性能数据分析，其能力不如会话级的\
  \ ASH 数据切片和切块。借助 ASH，无论实例中有多少会产生噪音的会话，你都可以深入钻取分析任何一个会话。\n\n如果你使用 Exadata，你至少运行的是\
  \ Oracle 11g R1，因此，假设你的 Exadata 集群拥有诊断包和调优包的许可证，那么所有这些优越的工具在技术上都是可用的。顺便说一句，我们尚未见到很多使用\
  \ Exadata 但没有诊断包和调优包许可证的客户，因此看起来绝大多数 Exadata 用户不必求助于像 Statspack 这样的旧工具，或者自己创建一个自定义的类\
  \ ASH 存储库（尽管用几行 PL/SQL 代码轮询每个实例中的 `V$SESSION` 或其底层的 `X$KSUSE` 视图也并非难事）。\n\n在某些情况下，`V$SQL`\
  \ 和 `V$SQLSTATS` 视图相对于 SQL 监控和类 ASH 采样数据仍然具有一些优势。例如，如果你想度量诸如执行次数、缓冲区获取次数、解析调用次数、获取次数或\
  \ SQL 子游标返回的行数等指标，你可以从实时 SQL 监控（`V$SQL_MONITOR`）或 `V$SQL`/`V$SQLSTATS` 视图中获取这些数据，但无法从\
  \ ASH 中获取。\n\n然而，SQL 监控的问题在于它根本不监控短时间运行的查询，因此无法用于跟踪每秒执行多次的 OLTP 类型的小型查询。即使在应用程序的每个查询中添加\
  \ `MONITOR` 提示也无济于事，因为受监控的执行计划的最大数量是有限的（由 `_sqlmon_max_plan` 参数控制，默认为每个 CPU 20 个计划），而且你最终还可能面临实时计划统计信息的锁存争用问题。SQL\
  \ 监控功能并非旨在持续监控每秒执行多次的短时间运行查询。\n\n这就把我们带回了 `V$SQL` 和 `V$SQLSTATS`。它们都维护着类似的数据，但内部机制不同。当你查询\
  \ `V$SQL` 而没有指定确切的 `SQL_ID` 时，Oracle 必须遍历每一个库缓存哈希桶以及其下的所有游标。如果你有一个繁忙的数据库并且库缓存中有大量游标，这可能会导致库缓存互斥锁争用，因为当你遍历库缓存结构并读取其对象内容时，你必须持有该对象上的一个互斥锁。请注意，从\
  \ Oracle 11g 开始，所有的库缓存锁存器都不复存在，取而代之的是互斥锁。这些相同的互斥锁也用于解析、查找和固定游标以供执行，因此如果你的监控查询频繁轮询\
  \ `V$SQL`，它们最终可能会导致其他会话等待。\n\n`V$SQLSTATS` 视图（在 Oracle 10g 中引入）没有这个问题。从 Oracle 10gR2\
  \ 开始，Oracle 实际上在两个地方维护 SQL 执行统计信息——在子游标本身内部（`V$SQL`）以及存储在共享池中不同位置的单独游标统计信息数组中。这种分离带来的好处是，即使一个游标从共享池中刷出，它在这个单独数组中的统计信息可能仍能保持更长时间。此外，当监控工具查询\
  \ `V$SQLSTATS` 时，由于统计信息存储在单独的数组中，它们无需扫描整个库缓存。这意味着当你的监控工具使用 `V$SQLSTATS` 而不是 `V$SQL`\
  \ 时，不会引起额外的库缓存锁存器（或互斥锁）争用。Statspack 和 AWR 都确实使用 `V$SQLSTATS` 来收集其顶级 SQL 报告的数据。\n\
  \n让我们看看 `V$SQLSTATS`（顺便说一句，`V$SQL` 视图的列与此几乎相同）。这里删除了一些输出以节省空间：\n\n```\nSQL> @desc\
  \ v$sqlstats\n\nName                            Null?    Type\n-------------------------------\
  \ -------- ----------------------\n1      SQL_TEXT                            VARCHAR2(1000)\n\
  2      SQL_FULLTEXT                        CLOB\n3      SQL_ID                 \
  \             VARCHAR2(13)\n...\n6      PLAN_HASH_VALUE                     NUMBER\n\
  ...\n20      CPU_TIME                            NUMBER\n21      ELAPSED_TIME  \
  \                      NUMBER\n...\n26      USER_IO_WAIT_TIME                  \
  \ NUMBER\n...\n33      IO_CELL_OFFLOAD_ELIGIBLE_BYTES      NUMBER\n34      IO_INTERCONNECT_BYTES\
  \               NUMBER\n35      PHYSICAL_READ_REQUESTS              NUMBER\n36 \
  \     PHYSICAL_READ_BYTES                 NUMBER\n37      PHYSICAL_WRITE_REQUESTS\
  \             NUMBER\n38      PHYSICAL_WRITE_BYTES                NUMBER\n...\n\
  41      IO_CELL_UNCOMPRESSED_BYTES          NUMBER\n42      IO_CELL_OFFLOAD_RETURNED_BYTES\
  \      NUMBER\n...\n72      OBSOLETE_COUNT                      NUMBER\n```\n\n\
  以 `IO_CELL` 开头的突出显示行是与 Exadata 存储节点相关的指标（尽管 `IO_INTERCONNECT_BYTES` 在非 Exadata 数据库上同样会被填充）。你可能会希望将这些存储节点指标与数据库指标（例如\
  \ `physical_read_bytes`）进行比较，以了解该 SQL 语句是否受益于 Exadata 智能扫描卸载。\n\n请注意，这些仅仅计数字节的指标不应被用作性能的主要度量；再次强调，主要度量、起点应当始终是响应时间，然后你可以将其分解为各个等待事件，或者通过\
  \ SQL 监控报告或 ASH 分解为执行计划行源活动。你可以在第 11 章中了解更多关于此处所示指标的含义。\n\n请注意，即使 `V$SQLSTATS` 视图也包含\
  \ `PLAN_HASH_VALUE` 列，但它实际上并不为具有不同计划哈希值的相同 `SQL_ID` 存储分开的统计信息。它将同一 SQL ID 下由不同计划生成的所有统计信息聚合在一个存储桶下。这意味着你无法真正从该视图中得知是哪个计划版本消耗了最多的资源。幸运的是，在\
  \ Oracle 11.2 中有一个名为 `V$SQLSTATS_PLAN_HASH` 的新视图，你应该查询它。该视图按 SQL ID 和计划哈希值分解并组织报告统计信息，而不是像\
  \ `V$SQLSTATS` 那样仅按 SQL ID 报告。\n\n\n\n### 监控存储单元层\n\n让我们看看如何监控存储单元层的利用率和效率。如你所知，存储单元是配置了用于存储数据库持久化部分硬盘的行业标准服务器。这些系统使用\
  \ Linux 作为其操作系统。自 Exadata V2 起，它们还配备了 PCIe 连接的闪存驱动器，可用作闪存缓存和闪存日志。Exadata X5-2 高性能单元是首批完全采用闪存而舍弃硬盘的型号。你可以使用常规的\
  \ Linux OS 监控命令和工具来关注单元的 OS 指标，如 CPU 使用率或磁盘 I/O 活动。由于 Exadata 采用特殊通信协议，你无法在计算节点上使用传统的\
  \ I/O 监控工具来监控磁盘 I/O：网格磁盘仅通过 ASM 层对外呈现。在计算节点上，你只能看到用于 OS 和 Oracle 安装的单个磁盘。监控单元本身\
  \ I/O 的唯一难点在于，Oracle 不允许你在单元上安装任何额外的（监控）守护进程和软件——如果你仍然希望保持受支持的配置。\n\n好消息是，Oracle\
  \ 单元服务器软件以及附加的 OS Watcher 或 ExaWatcher（从 11.2.3.3 版本开始）脚本在收集每个单元的详细性能指标方面做得很好。以下部分将展示如何提取、显示和使用其中一些指标。你可能还想回顾第\
  \ 11 章，以获取关于如何使用`V$CELL%`系列视图或`cellsrvstat`实用程序监控单元的更多见解。\n\n### 使用 CellCLI 在单元层访问单元指标\n\
