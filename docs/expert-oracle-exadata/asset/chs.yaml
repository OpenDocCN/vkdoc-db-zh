  \nSQL> select * from table(dbms_xplan.display_cursor);\n\nPLAN_TABLE_OUTPUT\n--------------------------------------------------------------------------------------------\n\
  SQL_ID  0ym2m0whwsn1y, child number 0\n-------------------------------------\nselect\
  \ /* dsssrv */ count(*) from t1_with_index where id between 200\nand 400\n\nPlan\
  \ hash value: 1131101492\n\n--------------------------------------------------------------------------------------------\n\
  | Id  | Operation                   | Name          | Rows  | Bytes | Cost (%CPU)|\
  \ Time     |\n--------------------------------------------------------------------------------------------\n\
  |   0 | SELECT STATEMENT            |               |       |       |   452K(100)|\
  \          |\n|   1 |  SORT AGGREGATE             |               |     1 |    \
  \ 6 |            |          |\n|*  2 |   TABLE ACCESS STORAGE FULL | T1_WITH_INDEX\
  \ |   202 |  1212 |   452K  (1)| 00:00:18 |\n--------------------------------------------------------------------------------------------\n\
  \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
  \   2 - storage((\"ID\"<=400 AND \"ID\">=200))\n       filter((\"ID\"<=400 AND \"\
  ID\">=200))\n\n21 rows selected.\n```\n\n与前面的例子不同，你在执行计划中看不到任何索引。如果你考虑将那个小的 PL/SQL\
  \ 块整理得更美观些，你可以轻松地将其嵌入到一个登录触发器中，并以这种方式控制索引的使用。Exadata 背景下优化器的其他局限性将在下一节中讨论。\n\n\n\
  ### 优化器并不知情\n\n你已经多次在本书中读到，优化器并不知晓它正在 Exadata 上运行。总体而言，指导优化器决策的原则是健全的，无论底层存储平台如何。数据库层的代码是相同的——无论它是否运行在\
  \ Exadata 上——这意味着应用程序在执行计划选择方面，在 Exadata 上会表现出相似的行为。因此，如果你停留在相同的版本和相同的内存设置上，你不应期望任何应用程序仅仅因为迁移到\
  \ Exadata 就经历大量执行计划的变更。使用相同的软件生成执行计划，对稳定性大有裨益！如果你是从较低的 Oracle 版本迁移到 Exadata，例如在\
  \ 11.2 到 12.1 的迁移过程中，或者从单实例迁移到 RAC，情况可能会有所不同，但你也会在 Exadata 平台之外预期到类似的变化。\n\n缺点在于，优化器并不知晓\
  \ Exadata 拥有一些优化措施，这些优化措施可以使全表扫描的性能远优于其他平台——除了你将在下一节读到的`EXADATA`系统统计信息。因此，拥有许多索引的混合负载系统使得优化器的工作更具挑战性。事实上，正如你可能预料的那样，在有索引可用的情况下，优化器倾向于优先选择基于索引的计划，而非基于全表扫描的计划，尽管基于全表扫描的计划往往快得多。\n\
  \n有几种方法可以应对优化器倾向于索引访问而非全表扫描的特性。系统统计信息、优化器参数和提示都作为潜在的解决方案浮现出来。你可以在以下章节中了解更多相关信息。\n\
  \n#### 系统统计信息\n\n系统统计信息向优化器提供有关“系统”的额外信息，包括执行一次单块读（典型于索引查找）和一次多块读（典型于全表扫描）分别需要多长时间。这似乎是一种理想机制，可以通过提供优化器做出正确决策所需的额外信息来操控它。不幸的是，智能扫描并非基于传统的多块读；事实上，智能扫描可以比多块读快上几个数量级。因此，在这种情况下，修改系统统计信息可能并非最佳选择。\n\
  \n事实上，在讨论 Exadata 部署时，是否在`WORKLOAD`模式下收集系统统计信息的问题经常出现。基于上述原因，收集它们可能不是一个明智的想法，因为它可能引入计划退化。引入`WORKLOAD`统计信息也可能产生深远影响。\n\
  \n然而，根据`DOC ID 1274318.1`，对于数据库版本 11.2.0.2 `BP18` 和 11.2.0.3 `BP8` 及更新版本，存在另一种选择：以\
  \ Exadata 方式收集统计信息。My Oracle Support 上的文档明确指出，这不是一个通用建议，而是应该仔细评估。要启用 Exadata 系统统计信息，你可以使用以下命令：\n\
  \n```\nSQL> exec DBMS_STATS.GATHER_SYSTEM_STATS('EXADATA')\n```\n\n作为此调用的结果，数据库引擎被告知它可以在\
  \ Exadata 上通过单次请求读取更多数据，从而降低全表扫描的成本。但这并不会阻止优化器选择索引。成本计算模型的变化正是为什么你应该在仔细测试后才引入此变更的原因！前述说明还建议，如果应用程序是从头开始在\
  \ Exadata 上开发的，那么收集`Exadata 统计信息`的效果可以更容易控制，任何不利的副作用都可以在上线前的测试中被发现。无论哪种方式——都需要仔细测试。\n\
  \n#### 优化器参数\n\n有几个初始化参数可以推动优化器趋向或远离使用索引。参数 `OPTIMZER_INDEX_CACHING` 和 `OPTIMIZER_INDEX_COST_ADJ`\
  \ 都可用于此目的。虽然这些是可能影响优化器核心功能的大型调控旋钮，但它们的设计目的正是为了让索引对优化器更具吸引力或更不具吸引力。在某些情况下，以有限的方式使用这些参数是可行的方法，例如在运行大型批处理过程之前，使用\
  \ `alter session` 命令。这些参数也可以使用 `OPT_PARAM` 提示在语句级别设置。以下是一个非常简单的例子：\n\n```\nSQL>\
