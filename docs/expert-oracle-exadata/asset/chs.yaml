- "# Exadata X5-2 存储服务器中的闪存\n\n直至 X5 代，每台 Exadata 存储服务器都配备了类似于上节所示的、采用多 FMOD 设计的闪存卡。容量当然有所不同，但卡的设计一直保持不变。X5-2\
  \ 是第一代改变了其中部分特性的存储服务器：\n\n*   新的闪存卡——F160——不再由多个 FMOD 组成。\n*   操作系统对这些闪存卡的寻址方式不同。\n\
  *   您可以选择使用全闪存型号的存储服务器。\n\n当您检查 X5-2 高容量（High Capacity）单元上 `cellcli` 命令的输出时，您会很快发现确实只有一张“卡”，没有更多的模块：\n\
  \n```\nCellCLI> list physicaldisk attributes name,deviceName,diskType,makeModel\n\
  \n   8:0             /dev/sda        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:1             /dev/sdb        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:2             /dev/sdc        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:3             /dev/sdd        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:4             /dev/sde        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:5             /dev/sdf        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:6             /dev/sdg        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:7             /dev/sdh        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:8             /dev/sdi        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:9             /dev/sdj        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:10            /dev/sdk        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   8:11            /dev/sdl        HardDisk        \"HGST    H7240AS60SUN4.0T\"\
  \n   FLASH_1_1       /dev/nvme3n1    FlashDisk       \"Oracle Flash Accelerator\
  \ F160 PCIe Card\"\n   FLASH_2_1       /dev/nvme2n1    FlashDisk       \"Oracle\
  \ Flash Accelerator F160 PCIe Card\"\n   FLASH_4_1       /dev/nvme0n1    FlashDisk\
  \       \"Oracle Flash Accelerator F160 PCIe Card\"\n   FLASH_5_1       /dev/nvme1n1\
  \    FlashDisk       \"Oracle Flash Accelerator F160 PCIe Card\"\n```\n\n如果您仔细查看输出，无疑会注意到闪存磁盘不仅数量变少了，而且它们的设备名称也大不相同。这与这些设备可以使用的新\
  \ `NVMHCI` 接口（简称 `NVMe`）有关。长期以来，高性能闪存的寻址方式或多或少与机械磁盘相同。随着近几代处理器的进步，从性能角度来看，这种闪存寻址模式变得日益过时，特别是当存储设备连接到与处理器本身具有极快链路的\
  \ `PCIe` 总线时。最显著的区别是通过 `NVMe` 设备可以处理的队列深度大幅增加，以及可处理的中断数量增加。仅为了证明这一点，您不会在 `lsscsi`\
  \ 命令输出中看到 `NVMe` 设备被列出。因此，它们真正代表了 x86-64 架构中的下一代闪存。\n\n此外，F160 卡是真正的 `PCIe` v3 卡，而\
  \ F80 是 `PCIe` v2 卡。主要区别在于 `PCIe` v3 提供的带宽增加，与上一代相比几乎翻了一番。\n\n根据文档，存储服务器理论上允许在系统运行时更换\
  \ `PCIe` 卡。但是，《Oracle Exadata 存储软件用户指南》和 My Oracle Support 笔记 1993842.1 建议在更换这些卡之前关闭存储服务器电源。幸运的是，您可以在不经历停机的情况下完成此操作，因为\
  \ `ASM` 冗余允许整个存储单元离线而不影响它们所支持的数据库。请注意，更换其中一张闪存卡应该不需要任何重新配置。\n\n## 闪存缓存 vs. 闪存磁盘\n\
  \n除 X5-2 高性能（High Performance）型号外，所有 Exadata 存储服务器都允许您定义如何使用服务器中的闪存卡。本节描述非 X5-2\
  \ 高性能单元——关于全闪存或高性能型号的更多信息，您可以稍后阅读。在所有其他（非 X5-2 高性能）型号上，存储服务器上的闪存可以以两种方式使用。它可以配置为磁盘缓存\
  \ (`ESFC`)，也可以被划分并作为固态（网格）磁盘呈现，供 `ASM` 用于数据库存储。这两种模式并非互斥。闪存可以按所需任意百分比分配给任一格式。推荐的配置是将所有闪存用作闪存缓存（Flash\
  \ Cache）。此配置显著加快了随机访问读取速度，并且自 Exadata 版本 11.2.3.3 起，此功能也扩展到多块读取。闪存缓存可用于两种配置：直写（write-back）和透写（write-through），这两种都将在本章后面描述。目前，只需说明\
  \ `ESFC` 的默认操作模式是透写（write-through）。\n\n在许多系统中，将所有可用闪存分配为透写缓存的方法效果很好。然而，对于写操作非常密集的系统，从\
  \ Exadata 存储软件版本 11.2.3.2.1 开始，从透写更改为回写闪存缓存 (`WBFC`) 可能是有益的。在回写模式下运行，除了缓存读 `I/Os`\
  \ 外，还能缓存写 `I/Os` 到闪存设备。启用此功能将为您提供远超本地硬盘组合所能提供的写 `IOPS`。\n\n您也可以将部分闪存用作网格磁盘。请记住，根据所使用的\
  \ `ASM` 冗余级别（正常或高），选择此选项将消耗物体实际占用闪存容量的两倍或三倍。仅这一事实就使得该选项不那么吸引人，尤其是在闪存容量不像 X4 及更高代际那样丰富的\
  \ Exadata 硬件上。另外请注意，对数据文件的写操作是由 `DBWR` 进程在后台完成的。因此，选择使用部分基于闪存的存储作为网格磁盘，可能不会像您希望的那样带来多大益处，特别是在引入\
  \ `WBFC` 之后。幸运的是，重新分配闪存相当容易，因此除非您没有专用的测试环境，否则测试您的具体情况应该不会太困难。然而，由于本章重点介绍 Exadata\
  \ 智能闪存缓存功能，我们将仅简要介绍在 X5-2 高性能型号之外将 F160 用作网格磁盘的情况。\n\n注意\n\n一个常见的误解是，将在线重做日志放在闪存存储上将显著加快重做日志的写入速度，从而提高高事务系统的吞吐量。我们在\
  \ Exadata 系统以及非 Exadata 硬件上都遇到过这种情况。虽然确实基于 SSD 的存储比传统磁盘能更快地处理小型随机写入，但在高事务系统上对重做日志的写入通常不属于此类，并且实际上从存储在\
  \ SSD 存储中获益并不大。事实上，这些写入应该直接进入阵列的缓存并快速完成。此外，SSD 写入机制可能导致单个写入时间存在很大差异。可能存在个别写入比平均值长几个数量级的情况，这一事实被称为写入悬崖（write\
  \ cliff）。这在非常繁忙的系统上也可能导致问题。为了缓解此问题，Oracle 引入了智能闪存日志（Smart Flash Logging），您将在后面读到相关内容。\n\
  \n\n\n"
- '# 使用闪存作为缓存


  全闪存的 X5-2 高性能计算节点与高容量型号不同。最显著的区别在于没有了机械旋转磁盘。每个新节点配备了八块 `F160` 卡。每块 `F160` 卡拥有 `1.6TB`
  的容量，原始总容量达到 `12.8TB`。在一个完整的机架中，总量为 `179.2 TB`，这比之前的 X4-2 高性能节点的容量略小。尽管 X4-2 节点中的单个磁盘较小（`1.2TB`
  对比 `F160` 卡的 `1.6TB`），但 X4-2 节点有 12 个硬盘（加上四块用于缓存的 `F80` 卡），硬盘原始容量约为 `200TB`。没有了旋转磁盘，你别无选择，只能在闪存上为
  ASM 创建网格磁盘。你可能会问自己，全闪存节点是否也有缓存？答案是肯定的。当你收到系统发货时，Oracle 会为 `智能闪存缓存` 预留 `5%` 的闪存设备，原因将在下一节描述。


  磁盘缓存工作原理的一个非常简化的描述大致如下：当读取请求到达时，I/O 子系统会检查缓存，看请求的数据是否存在于缓存中。如果数据在缓存中，则将其返回给请求进程。如果请求的数据不在缓存中，则从磁盘读取并返回给请求进程。对于未缓存的数据，数据会在返回给请求进程之后被复制到缓存中。这样做是为了确保填充缓存不会减慢
  I/O 处理速度。


  在大多数企业级存储阵列中，“缓存”是在电池或其他方式保护的 DRAM 中实现的，位于磁盘之前。在 Exadata 平台上，实现了一种不同的概念。作为磁盘控制器上
  DRAM 的补充，闪存卡将充当缓存——尽管是一种智能缓存。图 5-1 展示了使用 Oracle 的 `ESFC` 进行读取的 I/O 路径。


  ![A978-1-4302-6242-8_5_Fig1_HTML.gif](img/A978-1-4302-6242-8_5_Fig1_HTML.gif)

  图 5-1. 读取操作 I/O 路径的概念模型


  当从持久层读取数据时，图 5-1 中标为“DB”的数据库会话发出一个读取操作，该操作最终成为多线程 `cellsrv` 二进制文件中的一个请求。为简单起见，忽略
  I/O 资源管理、卸载服务器以及在读取 I/O 异常情况下从区的辅助镜像副本读取的能力，`cellsrv` 软件知道要读取的给定块的位置——无论是从闪存还是从旋转磁盘。根据数据的位置，发出读取操作。图
  5-1 所示两种场景的区别在于非缓存读取。如果在 `闪存缓存` 中找不到一块数据，则针对数据所在的硬盘发出读取操作。如果为后续操作缓存数据是有意义的（可能是因为预计会在后续读取中重用），则该数据块会被移入
  `闪存缓存`，但仅在将其发送回请求会话之后。


  在理想情况下，待扫描的大部分段位于 `闪存缓存` 中，你可以看到这有时会显著降低单块读取和表扫描的响应时间。关于扫描，顺便说一句，速度提升不仅限于智能扫描。如果某个段被缓存在
  `ESFC` 中，自 Exadata 版本 `11.2.3.3` 起，其他未卸载的 I/O 访问方法也将受益。


  写入与刚才描述的情况不同。考虑图 5-2，它涵盖了 `智能闪存缓存` 的两种操作模式：默认的 `直写` 模式以及 `回写` 模式。


  ![A978-1-4302-6242-8_5_Fig2_HTML.gif](img/A978-1-4302-6242-8_5_Fig2_HTML.gif)

  图 5-2. 直写和回写模式下写入操作 I/O 路径的概念模型


  注意：X5-2 高性能节点又有所不同：`闪存缓存` 的默认操作模式是 `回写`。可以切换回 `直写` 模式，但这样做意味着放弃快速数据文件创建等功能，因为该功能需要启用
  `WBFC`。


  此处假设 `ESFC` 在默认的 `直写` 模式下运行，写入操作会绕过（闪存）缓存直接写入磁盘。然而，在向数据库服务器发回确认之后，Oracle 的存储软件随后会将数据复制到缓存中，前提是它适合缓存。这是一个关键点。随写入请求发送的元数据让存储软件知道数据是否可能被再次使用，如果是，数据也会被写入缓存。此步骤在向数据库层发送确认之后完成，以确保写入操作能够尽快完成。




