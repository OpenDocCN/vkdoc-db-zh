  `/dev/md5` 和 `/dev/md7` 上。这反映了 Exadata 存储服务器进程所使用的异地修补机制。在上面显示的存储服务器中，`/dev/md6`
  和 `/dev/md8` 用于操作系统。当应用新补丁时，`/dev/md5` 和 `/dev/md7` 设备将被清除并接收新的操作系统镜像。在镜像部署完成且新镜像设备被激活后，存储服务器将重新启动并使用新镜像，同时保留原有镜像不变。这允许从补丁管理员处回滚补丁，或者在补丁周期内发生故障时进行自动回滚。


  ### 应用 Exadata 存储服务器补丁


  Exadata 存储服务器补丁使用 `patchmgr` 实用程序应用。与需要从实际补丁文件单独下载的 `opatch` 实用程序不同，`patchmgr` 随每个版本一起提供。该实用程序依赖
  SSH 和 `dcli` 实用程序，通过单个命令为集群中的所有存储服务器打补丁。因此，运行 `patchmgr` 的用户在补丁期间必须具有对所有存储服务器 root
  账户的无密码访问权限。由于这些要求，存储服务器补丁通常从集群中的某个计算节点应用，但也可以从任何设置了 SSH 密钥的系统应用。这可以是运行 Oracle Enterprise
  Manager 的主机或 Oracle 的白金服务网关服务器。SSH 密钥可以使用 `dcli` 中的 `-k` 和 `--unkey` 选项进行临时配置和移除。`patchmgr`
  实用程序有两种主要模式——先决条件检查和实际补丁。即使补丁模式会运行先决条件检查，也建议先单独运行一次先决条件检查。


  在升级存储服务器之前，必须在将驱动补丁会话的主机上下载并解压补丁。除了补丁本身，检查 MOS 注释 `#888828.1` 以获取任何推荐的附加插件也很重要。由于补丁应用涉及多次重新启动，它必须在实际被修补的主机之外运行。补丁归档文件包含多个脚本，包括
  `patchmgr`、用于获取状态更新的支持 shell 脚本，以及一个包含整个 Exadata 存储服务器操作系统的 ISO 文件。`11.2.3.3.0`
  之后的版本也可能包含 InfiniBand 交换机的更新，这将在后面讨论。在运行 `patchmgr` 脚本之前，必须创建或复制一个 `cell_group`
  文件到补丁目录。此文件包含将要由 `patchmgr` 打补丁的存储服务器的主机名。


  现在补丁内容已经解压，运行先决条件检查以确保系统已准备好打补丁非常重要。在先决条件模式下运行 `patchmgr` 的语法如下：


  ```

  patchmgr –cells cell_group –patch_check_prereq

  ```


