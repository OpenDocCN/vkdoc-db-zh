  `exachk` 被指示启动守护进程模式，这由 `-d start` 选项表示。如果您想运行 `exachk` 并利用由 `exachk` 守护进程存储的凭证，只需在
  `exachk` 命令中添加 `--daemon`。执行 `exachk` 时使用 `--d status` 或 `--d info` 可以查看有关运行中守护进程的信息：


