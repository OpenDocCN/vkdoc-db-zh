  \ where id < 2500\n  5  ) group by blockn order by blockn;\n```\n\n```\nMIN(ID)\
  \    MAX(ID)     BLOCKN\n---------- ---------- ----------\n         1         78\
  \     192700\n        79        708       8603\n       169        258       8689\n\
