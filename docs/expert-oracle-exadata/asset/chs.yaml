  注意


  此屏幕上最重要的字段是“数据库机前缀”，它将用作 Exadata 机架中所有主机命名的基础。在 Exadata 配置实用程序之前，此前缀仅支持四个字符长度。使用新的配置实用程序，前缀最多支持
  16 个字符。为了统一性，建议将主机名前缀保持为八个字符或更少，这是因为单客户端访问名称 (`SCAN`) 的要求。`SCAN` 仅支持最长 15 个字符的主机名。此外，虽然许多组织支持较长的主机名，但
  Exadata 的命名约定可能相当严格。虽然任何安装看起来都是永久的，但我们见过许多 Exadata 机架被搬迁到不同的数据中心。由于在 RAC 系统中重命名主机的复杂性——更不用说
  Exadata（还需要重命名存储）——许多客户在搬迁到新数据中心时决定干脆拆除并重建整个集群。如果主机名前缀没有包含位置信息，则只需更改 IP——这是一个更简单且非破坏性的过程。


  ### 硬件选择


  “硬件选择”屏幕（图 8-4）用于选择正在安装的 Exadata 机架类型。`OEDA` 支持从 X2 开始的 Exadata 机架以及 SPARC SuperCluster
  平台。在安装 Exadata 机架时，请确保选择正确的存储类型和大小——高容量型号可能配备 2TB、3TB 或 4TB，具体取决于机架的购买时间。较新版本的 `OEDA`
  实用程序支持 Exadata 第五代（X5）中发现的弹性配置。只需选择与您的机架类型对应的“弹性机架”选项——您将在“机架详细信息”屏幕上输入确切的计算或存储服务器数量。


