- "# 16. Exadata 补丁管理\n\n运行自定义构建的 Oracle 系统最大的缺点之一是，它可能是一个独一无二的配置。即使在标准严格控制的环境中，也很难在硬件、固件和操作系统配置之间保持一致性大多数组织没有足够的时间来确保每个构建都具有完全相同的光纤通道\
  \ HBA 卡、内部 RAID 控制器和网卡，且运行相同的固件级别，更不用说在单个维护窗口内对所有这些组件进行升级测试计划。在一整年中，很难在整个技术栈中找到完全匹配的组件。有了\
  \ Exadata，Oracle 提供了一个标准构建，为每个发布版本提供完全相同的硬件、固件和操作系统配置。每个运行存储服务器版本`11.2.3.3.0`的`X3-2`机架的\
  \ Exadata 客户，其`LSI RAID 控制器`都运行版本`12.12.0-178`，`Sun Flash F40`卡的固件版本为`UI5P`，Oracle\
  \ 不可断内核版本为`2.6.39-400.126.1`，等等。如果需要更新，Oracle 会发布一个单独的补丁，一次性升级所有这些组件。这种标准化使 Exadata\
  \ 管理员能够应用大多数系统管理员因担心对其独特配置造成意外变更而不愿应用的错误修复和固件更新。由于每一代产品内部的标准化配置，在 Exadata 上测试这些变更要容易得多。本章将深入探讨\
  \ Exadata 补丁管理，从需要应用于 Exadata 的各种补丁类型开始，介绍每种补丁的应用方式，以及使补丁应用尽可能轻松的选项。\n\n在应用任何补丁之前，请查阅\
  \ Oracle 支持说明编号`888828.1`。该说明是 Oracle Exadata 补丁管理的动态文档，被称为补丁说明，或者更正式的名称是 Exadata\
  \ 数据库一体机和 Exadata 存储服务器支持版本。该说明涵盖软件版本`11g`和`12c`，涵盖了 Exadata 补丁管理的整个范围，包括每个存储服务器软件版本对应的各种内核和固件版本的参考、有关运行在\
