  前面的设备就是 `FMODs`，每卡四个。例如，第一张卡的模块地址是从 `0:0:0:0` 到 `0:0:0:3`。如果您想了解所有细节，需要查看 `dmesg`
  的输出。使用 `egrep` 进行不区分大小写的匹配，查找 "`sas|scsi`"，将向您展示这些设备如何在引导阶段在 `mpt2sas` 内核模块（"Fusion
  MPT SAS Host"）下出现。这与 `cellcli` 的输出相吻合：


