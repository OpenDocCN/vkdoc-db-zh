  ## Exadata 存储服务器补丁


  Exadata 存储服务器补丁这个术语涵盖了驻留在 Exadata 环境整个堆栈中的广泛组件。这些补丁不仅包含存储服务器的更新，还包括计算节点和 InfiniBand
  交换机的更新。除了新功能和操作系统升级外，更新可能还包括 RAID 控制器、闪存卡、BIOS、ILOM 甚至磁盘驱动器本身的固件。


  在深入探讨如何应用补丁之前，最好先了解一下存储服务器操作系统的架构。由于 Exadata 存储服务器运行 Oracle Enterprise Linux，Oracle
  能够考虑到补丁应用来定制操作系统布局。在 Exadata 存储服务器上，前两个硬盘驱动器上划出一小部分空间来存放操作系统。这些分区随后使用标准的 Linux 内核
  md RAID 驱动程序来构建软件 RAID 设备：


