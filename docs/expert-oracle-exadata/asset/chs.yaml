  \ Mac O/S (x86-64)              小端\n19 HP IA Open VMS                      小端\n\
  15 HP Open VMS                         小端\n5 HP Tru64 UNIX                     \
  \   小端\n3 HP-UX (64-bit)                       大端\n4 HP-UX IA (64-bit)         \
  \           大端\n18 IBM Power Based Linux               大端\n9 IBM zSeries Based Linux\
  \              大端\n10 Linux IA (32-bit)                   小端\n11 Linux IA (64-bit)\
  \                   小端\n13 Linux x86 64-bit                    小端\n7 Microsoft Windows\
  \ IA (32-bit)        小端\n8 Microsoft Windows IA (64-bit)        小端\n12 Microsoft\
  \ Windows x86 64-bit        小端\n17 Solaris Operating System (x86)      小端\n20 Solaris\
  \ Operating System (x86-64)   小端\n1 Solaris[tm] OE (32-bit)              大端\n2 Solaris[tm]\
  \ OE (64-bit)              大端\n```\n\n`Exadata` 是小端格式、64 位的 `Linux`（或 `Solaris x86-64`），因此如果源数据库也是小端格式，表空间可以像平台相同一样进行传输。如果源平台是大端格式，则需要一个额外的步骤。\n\
  \n要将表空间从一个平台转换到另一个平台，请使用 `RMAN` 的 `CONVERT TABLESPACE` 或 `CONVERT DATAFILE` 命令。你可以在备份期间使用以下命令转换文件的字节序格式：\n\
  \n```\nRMAN> CONVERT TABLESPACE payroll_data,payroll_mviews\nTO PLATFORM 'Linux\
  \ x86 64-bit'\nFORMAT '/u01/shared_files/%U';\n```\n\n在这个例子中，`RMAN` 将数据文件转换为与 `Exadata`\
  \ 兼容的字节序格式。转换后的数据文件会被自动唯一命名（`%U`）并保存在 `/u01/shared_files` 目录中。这个转换操作可以选择在源系统（如上所示）或目标系统（`Exadata`）上进行。以下命令在\
  \ `Exadata` 的恢复操作期间转换字节序格式：\n\n```\nRMAN> CONVERT DATAFILE payroll_data.dbf, payroll_mviews.dbf\n\
  FROM PLATFORM 'Solaris[tm] OE (64-bit)'\nDB_FILE_NAME_CONVERT\n'/u01/shared_files/payroll_data.dbf','+DATA',\n\
  '/u01/shared_files/payroll_mviews.dbf','+DATA';\n```\n\n这为你提供了同时将文件移动到 `ASM` 的额外优势。一个表空间可以单独传输，也可以作为传输集的一部分进行传输。传输集更常见，因为表空间之间通常存在对象依赖关系。例如，一个表空间可能包含表，而另一个表空间可能包含依赖的物化视图或索引。\n\
  \n为了传输表空间，你必须首先将其置于只读模式。然后，使用 `Data Pump` 导出表空间元数据，并指定 `transportable_tablespaces`\
  \ 参数。你还应该指定 `TRANSPORT_FULL_CHECK` 参数以确保被传输表空间的严格包含性，这能确保没有依赖对象（如索引）存在于传输集之外。\n\n\
  然后，使用 `RMAN` 对传输集中的表空间进行备份。字节序格式的转换可以在 `RMAN` 备份期间进行，也可以在目标系统上恢复时进行。\n\n以下是将表空间传输到\
  \ `Exadata` 的步骤：\n\n1.  识别表空间对象依赖关系。\n2.  将表空间设置为只读模式。\n3.  使用 `Data Pump` 导出传输集的元数据。\n\
  4.  对传输集中的表空间进行 `RMAN` 备份。\n5.  将导出文件与数据文件备份一起复制到 `Exadata`。\n6.  从 `RMAN` 备份中将数据文件恢复到你的\
  \ `Exadata` 数据库。如果需要字节序转换，请使用 `CONVERT DATAFILE` 命令同时恢复和转换数据文件。\n7.  将表空间重新设置为读写模式。\n\
  8.  使用 `Data Pump`，通过 `transport_datafiles` 参数将表空间元数据导入到 `Exadata` 数据库。你还可以选择使用\
  \ `remap_schema` 参数重映射表空间内容的模式。\n\n#### 何时使用可传输表空间\n\n`TTS` 和 `XTTS` 对于利用 `RMAN`\
  \ 的速度迁移源数据库的部分内容非常有用。如果你的数据库中部分数据已准备好迁移到 `Exadata`，而其他部分尚未准备好，`TTS` 可能是一个不错的选择。但要小心，数据字典中的某些对象（如权限、特权、`PL/SQL`\
  \ 代码）不会被迁移，因此必须单独导出。此外，在将表空间插入数据库之前，你还需要预先创建账户。还记得仅包含元数据的 `Data Pump` 导出吗？这可能是创建\
  \ `SQLFILE` 并执行必要 `DDL` 命令的一个好策略。\n\n#### 可传输表空间策略的注意事项\n\n请查阅你的 `Oracle` 文档，了解可能适用于你数据库的具体限制或注意事项。注意目标（可插拔）数据库上可能存在表空间和模式名称冲突。表空间必须置于只读模式才能迁移，这将对需要读写访问这些表空间的应用程序造成停机时间。这个停机窗口不容低估！表空间必须在将副本迁移到\
  \ `Exadata` 所需的时间内保持只读。对于一个 `TB` 级的数据库，这个持续时间可能非常显著，即使不是数周（取决于网络吞吐量或其他将数据传输到 `Exadata`\
  \ 系统的方式），也可能需要数天。\n\n你可以在表空间处于读写模式时运行 `RMAN` 备份，以查看此操作需要多长时间，然后再决定 `TTS` 是否是你迁移的合适方法。一个无需借助逻辑复制工具即可缩短停机窗口的选项是使用**具有增量备份的跨平台可传输表空间**。这不会完全消除停机窗口，但有潜力显著缩短它。\n\
  \n如果你确实需要零停机迁移，你需要使用逻辑迁移工具，在字节序转换到 `Exadata` 的过程中捕获系统上的任何更改。只有在可传输表空间集完全导入到 `Exadata`\
  \ 之后，才能打开闸门，开始在 `Exadata` 上进行这些更改的复制。\n\n\n\n### 跨平台可传输表空间与增量备份\n\n另一个物理迁移数据库子集的选择是使用一个鲜为人知的\
  \ My Oracle Support (MOS) 文档及其记载的步骤。该流程本身并无全新内容，因为它建立在数据库已有功能之上——例如，你刚刚读过的关于 XTTS\
  \ 的介绍。该 MOS 文档标题为“11G - Reduce Transportable Tablespace Downtime using Cross Platform\
  \ Incremental Backup”，其文档 ID 为 1389592.1。其中描述的流程适用于 Oracle 11.2。该 MOS 文档最近已更新至 12c\
  \ 版本，指向另一个文档 ID：2005729.1。正如刚刚提到的，12c 的流程要求源数据库和目标数据库的初始化参数 `compatible` 设置为 12.1.0\
  \ 或更高。鉴于你很可能是在旧硬件上进行迁移，假设你在迁移到 Exadata 之前先将源系统原地升级到 12c 是不现实的。因此，本节将重点介绍 11.2 的流程。一旦数据库安全迁移到\
  \ Exadata 系统上，就可以采取进一步步骤将其升级到更高版本。\n\n顾名思义，整个想法基于跨平台可传输表空间。XTTS 并非新技术——那么为何本节要讨论增量备份？虽然\
  \ XTTS 确实广为人知，但新颖之处在于你使用增量备份来向前滚动数据文件的映像副本。这本身也不新鲜，因为这正是数据库恢复时发生的事情。真正新颖的是，你在源系统上进行增量备份，然后将其应用到目标\
  \ Exadata 数据库上。考虑到你的源系统很可能是 Big Endian 架构，例如基于 Power、SPARC 或安腾的系统，你会开始体会到所提出解决方案的优雅之处。\n\
  \n总而言之，跨平台可传输表空间 (x-platform TTS) 加上增量备份，使你能够将 Big Endian 数据库从旧硬件迁移到 Exadata，且停机成本可能非常低（指停机时间短）。你将产生的停机时间预计大致与你作为可传输表空间迁移的一部分需要导入的元数据量成正比。你正在阅读的流程专注于这些步骤，其中大部分通过一个名为\
  \ `xttdriver.pl` 的 perl 脚本启动：\n\n*   从设置阶段开始，在此阶段设置所有需要的结构、数据库和脚本。\n*   在准备阶段，创建要迁移的数据文件的初始映像副本，并将它们传输到\
  \ Exadata 系统。\n*   在滚动更新阶段，对源系统进行增量备份，并将它们应用到目标系统的映像副本上。\n*   当切换周末最终到来时，将要迁移的表空间置于只读模式，创建最后一个增量备份，应用它，然后插入表空间。\n\
  *   你可以在切换并将其置为读写模式之前，在 Exadata 数据库中验证数据文件。\n\n如果你仔细阅读了上述要点，你会注意到源系统在切换日期之前保持在线和可用。与“传统”TTS\
  \ 方法相比，这是一个巨大的优势，在传统方法中，你需要将表空间置于只读模式，直到其所有数据文件转换完成。\n\n在 2013 年圣诞节之前（以及 Oracle\
  \ 11.2.0.4 之前），你现在读到的流程要稍微复杂一些。除了源数据库和目标数据库之外，你还需要一个转换实例。如果你的目标数据库是 11.2.0.4 或更高版本，则不再需要该实例。如果你想迁移到\
  \ 11.2.0.3（我们希望你不必这么做），则需要一个额外的“转换”实例。此外，该流程过去仅当你迁移到 Exadata 时才受支持。这一限制现已解除，你也可以使用它迁移到\
  \ 64 位 Oracle Linux。\n\n**警告**\n\n跨平台可传输表空间 + 增量备份流程无法施展任何魔法，也无法绕过 TTS 的限制。请务必阅读本章前一节以及\
  \ Oracle 文档集，以了解 TTS 的限制。\n\n#### 设置与配置\n\n对于本节，请假设源数据库位于 SPARC 架构的 Solaris 上（意味着\
  \ Big Endian），并将被迁移到 Exadata（意味着 Little Endian）。源数据库的 `ORACLE_SID` 为 “solaris”，使用\
  \ Oracle 11.2.0.3，而目标数据库 “EXA” 是 11.2.0.4。因此，不需要转换实例。在 Data Guard 环境中要小心——新的数据文件不会自动复制到备用数据库。除了主数据库之外，你有责任确保这些文件物理存在于所有备用数据库上。\n\
  \n通过查阅文档 ID 1389592.1 并下载其附件 zip 文件来开始准备。在撰写本文时，文件名为 `rman_xttconvert_2.0.zip`。将\
  \ zip 文件暂存在源主机上。在以下示例中，我们将在 oracle 用户的主目录中使用一个名为 `xtt` 的新目录来存放脚本和配置文件。\n\n使用版本 2\
  \ 的脚本时，你可以选择使用 `DBMS_FILE_TRANSFER` 或 `RMAN` 来传输文件。前者的优点是你无需担心如何将数据文件导入 Exadata。另一方面，它对最大文件大小有限制，不能超过\
  \ 2 TB。该限制使得 `DBMS_FILE_TRANSFER` 流程存在问题，尤其是在使用大文件表空间时。因此，本示例选择了 `RMAN` 方法。\n\n\
  使用 `RMAN` 方法时，你必须考虑如何在源系统和目标系统之间物理传输文件。对于位置较近的系统，NFS 可能是一个选择。但防火墙和到各种 VLAN 设置的路由问题常常阻碍\
  \ NFS 的使用。备选方案——特别是对于长距离传输——是 SCP。根据你的网络带宽，你可以并行启动多个 SCP 会话，甚至可以在数据通过管道传输时进行压缩。使用\
  \ RMAN 方法的缺点也不应隐瞒：你需要在源端和目标端都有一个暂存区来保存映像副本以及任何增量备份。值得庆幸的是，对于那些一直在为他们的 `DBFS_DG`\
  \ 寻找用途的 Exadata 用户，这里有一个用途：使用数据库文件系统选项，将 `DBFS_DG` 磁盘组中的一个数据库作为暂存区！而且 Oracle 12.1.0.2\
  \ Grid Infrastructure 允许你使用 ACFS 作为 DBFS 的替代方案。\n\n作为准备工作的一部分，你需要编辑 `xtt.properties`\
  \ 文件。它包含了关于源和目标数据库、数据文件备份位置等所有信息，这些都是下一步所需的。以下是一个剥离了所有注释的配置文件示例：\n\n```\noracle@solaris:∼/xtt$\
  \ grep -i ’^[a-z]’ xtt.properties\ntablespaces=DATA_TBS\nplatformid=2\ndfcopydir=/u01/stage/src\n\
  backupformat=/u01/stage/src\nstageondest=/u01/stage/dest\nstorageondest=+DATA/EXA/datafile/\n\
  backupondest=+RECO\nasm_home=/u01/app/11.2.0.4/grid\nasm_sid=+ASM1\nparallel=8\n\
  rollparallel=4\n```\n\n\n\n此处，`tablespaces` 列出了要迁移的表空间。可以列出多个表空间，但需要用逗号分隔。平台 ID\
  \ 是源数据库的 `v$database.platform_id`。`dfcopydir` 所指示的目录是准备阶段（稍后详述）期间表空间映像副本将存放的位置。同样地，`backupformat`\
  \ 需要指定增量备份创建所在的目录。在 Exadata 上，`stageondest` 是该过程期望存放初始映像副本的位置。转换后的数据文件随后将被存储在 `storageondest`\
  \ 中。`backupondest` 所指示的位置指示驱动脚本在向前滚阶段写入增量备份。ASM 参数是自解释的。你还可以利用某些步骤的并行执行：`Parallel`\
  \ 是数据文件转换期间的并行度，而 `roll parallel` 定义了使用来自源的增量备份向前滚动映像副本的并行级别。根据你的需求调整这些参数。如果你决定使用\
  \ `DBMS_FILE_TRANSFER` 方法，你将需要设置一些其他参数。为保持简单，此处未显示这些参数。\n\n注意\n\n是的，没错——你可以在源（大端）平台上进行增量备份，并将其应用到\
  \ Exadata 上的映像副本。这就是我们如此喜欢这个流程的原因。\n\n在源系统上完成配置后，将 `xtt` 目录复制到驱动 Exadata 计算节点的 Oracle\
  \ 用户主目录中。确保所有目录都存在。当然，你也可以利用 NFS——在这种情况下，你由 `dfcopydir`、`backupformat`、`stageondest`\
  \ 指示的目录将是相同的。\n\n#### 实现\n\n步骤完成后，将映像副本传输到 Exadata 系统的 `stageondest` 目录。如果你使用 NFS，此步骤是可选的。你还需要将新创建的元数据文件和脚本复制到\
  \ Exadata 上的 `∼/xtt` 目录。数据文件传输完成后，将其转换为 64 位 Linux x86-64 格式。请注意，此过程耗时多久并不重要。表空间在源数据库上始终处于在线读写状态，因此对源的应用可用性完全没有影响。\n\
  \n下一阶段称为向前滚。你对要迁移的表空间进行增量备份，目的是将之前拍摄的映像副本向前滚动。再次说明，这是此技术的最大卖点：你在大端系统上进行备份，以将已转换为小端格式的数据文件向前滚动。备份文件及其元信息和脚本需要传输到\
  \ Exadata 并在那里应用。这个过程可以重复多次，直到下一阶段开始：传输阶段。\n\n传输阶段与传统的跨平台 TTS（可传输表空间）技术并无太大不同：你在源上将要迁移的表空间更改为只读模式，进行最后一次增量备份，将其传输并应用到\
  \ Exadata。一旦你将源表空间设置为只读模式，就会在源上造成停机。与常规跨平台 TTS 的不同之处在于，你不需要将数据文件传输到 Exadata 并进行转换，这可能大大节省时间。最后一次增量备份确保你\
  \ Exadata 数据库中的映像副本是 100% 最新的。如果你想导入的表空间的数据所有者尚不存在，现在就创建它们，包括授权、角色和权限。一旦最终的向前滚命令完成，你就可以将表空间元数据导入到\
  \ Exadata 数据库。\n\n导入完成后——其完成时间与你导入的表空间相关的字典元数据量成正比——你可以验证表空间的完整性，并在目标端将其设置为读写。\n\
  \n#### 物理备用数据库\n\n在物理备用策略中，目标数据库是从源数据库的完整备份中实例化而来的。该备份以与备份和恢复策略相同的方式还原到 Exadata。数据库还原到\
  \ Exadata 后，它将以挂载模式启动并保持持续恢复状态。随着源数据库中发生变化，会产生重做信息并传输到备用数据库，在那里更改首先被写入备用重做日志，然后才会被应用（重做应用）。与备份和恢复策略不同，此数据库会保持恢复模式一段时间。由于重做信息不断应用到备用数据库，因此不支持从大端到小端格式的转换。备用数据库自\
  \ Oracle 版本 7 以来就已存在。该功能内置于数据库架构中。当然，那时你必须编写脚本来监控源系统上的归档日志目标，然后将它们（通常通过 FTP）复制到备用系统，在那里另一个脚本负责将它们应用到备用数据库。在版本\
  \ 9i 中，Oracle 引入了一个名为 Data Guard 的新产品，用于管理和自动化那些管理监控备用环境的繁琐任务。如今，Data Guard 提供以下服务：\n\
  \n*   重做传输服务\n    *   处理重做信息到目标系统的传输\n    *   解决因网络故障导致的归档重做日志间隔\n    *   通过重新传输替换日志来检测和解决缺失或损坏的归档重做日志\n\
  \n*   应用服务\n    *   尽可能实时地自动将重做信息应用到备用数据库\n    *   可以在重做应用期间允许对备用数据库进行只读访问，这需要 Active\
  \ Data Guard 选项的许可\n    *   提供角色过渡管理：源数据库和备用数据库的角色可以临时或永久切换\n    *   切换（Switchover）：平滑地切换源数据库和备用数据库的角色。不会对\
  \ Data Guard 配置中的数据库产生任何影响。如果在不涉及版本更改的情况下，可用于撤销到旧硬件的迁移。\n    *   故障转移（Failover）：角色的更改，通常是站点故障的结果。需要对前主数据库重新实例化，可以通过可用的闪回数据库功能，或者完全重建。通常不用于迁移。\n\
  \n*   Data Guard 代理（Data Guard Broker）：\n    *   简化备用数据库的配置和管理\n    *   Oracle 企业管理器提供了一个图形用户界面，可以帮助创建\
  \ Data Guard 配置\n    *   用于监控和管理备用数据库环境的集中控制台\n    *   简化备用数据库的切换/故障转移\n    *  \
  \ 同样也存在一个非常通用的命令行界面。\n\nData Guard 提供了三种备用数据库保护模式：\n\n\n### Oracle Data Guard 保护模式与迁移注意事项\n\
  \n*   **最大可用性**：在“最大性能”模式采用的放任方法与严格的“最大保护”设置之间，这是一个很好的折中方案。为了让事务在主数据库提交，至少一个已同步的备用数据库必须已在其某个备用重做日志中接收到相关的重做信息。如果无法实现，主数据库仍将继续运行。从\
  \ 12c 开始，可以在`FASTSYNC`模式下配置最大可用性。在此模式下，备用数据库向主数据库确认已接收到重做信息，而无需等待 I/O 完成（将信息写入磁盘）。此模式提供的稍高性能可能会使您面临更高的数据丢失风险。\n\
  *   **最大性能**：Data Guard 中的默认保护模式。它完全不影响主数据库的可用性，主数据库和备用数据库彼此独立运行。通过实时重做应用，备用数据库仍能与主数据库完全同步。\n\
  *   **最大保护**：唯一能保证零数据丢失的 Data Guard 配置。这听起来是一个非常理想的功能，但它是以可能损失服务为代价的。如果主数据库无法将重做信息写入备用数据库，它将会关闭。很少有客户实施此保护模式。在此保护模式下运行可能会导致主数据库出现性能损失。\n\
  \n请记住，虽然 Data Guard 是数据库迁移的优秀工具，但这并非其唯一目的。Data Guard 的强大之处在于保护数据库免受介质损坏、灾难性介质故障和站点故障的影响。它是\
  \ Oracle 最大可用性架构中不可或缺的组成部分。因此，上述某些复制模式在数据库迁移的上下文中没有意义，也就不足为奇了。**最大性能**是最适合数据库迁移的复制模式，因为它对源数据库的性能没有影响。在最大性能模式下，源数据库将继续按其原有方式运行。事务不会因网络问题或下游复制问题而延迟。同样值得一提的是，Data\
  \ Guard 完全支持单实例备用数据库或 Oracle RAC 备用数据库。并且从 11gR1 开始，如果您购买了 Active Data Guard 选项，可以在备用数据库以只读模式打开时应用重做。它与\
  \ Enterprise Manager Grid Control 也有很强的集成。\n\nData Guard 12c 中一些有趣的新特性包括 Far-Sync\
  \ 备用配置，它允许数据库更容易地将重做发送到真正遥远的位置。对级联备用数据库的支持也得到了极大增强，但这些对于普通的数据库迁移没有增加价值，因此这里不作介绍。\n\
  \n### 使用物理备用数据库\n\n物理备用数据库不允许对数据库进行任何更改（数据文件名更改除外）。因此，它最适用于不需要对目标数据库进行更改的数据库迁移。在这方面，它与本章前面介绍的完整备份和恢复非常相似。如果需要进行更改，则必须在迁移后完成。一般来说，这对于\
  \ OLTP 数据库来说问题较小，因为诸如迁移到大型表分区大小、实施分区和实施 HCC 等更改，不像对大型 DW 数据库那样有益。如果您的目标是快速安全地迁移到\
  \ Exadata，物理备用可能是一个合适的选择。凭借 Exadata 的性能和可扩展性，迁移后任务的实施时间可能比您预期的要短得多。\n\n### 物理备用策略的注意事项\n\
  \n物理备用策略没有太多复杂之处。您应该关注网络稳定性和性能。虽然可以使用 Oracle 的跨平台物理备用功能在某些平台之间进行低停机时间的迁移，但无法在具有不同字节顺序（\
  \ endian ）的平台之间进行此类迁移。此外，还存在一些 Oracle 版本特定的限制。（更多内容请参阅 My Oracle Support 说明 413484.1\
  \ “同一 Data Guard 配置中异构主数据库和物理备用数据库的 Data Guard 支持”。）如果需要在不兼容的平台之间进行低停机时间迁移，您应考虑逻辑备用、Streams\
  \ 或 Golden Gate 策略。\n\n#### 物理迁移部分总结\n\n如果您的应用程序模式足够复杂，以至于您不想采用任何逻辑迁移路径，那么物理迁移可能被证明是一种简单的迁移选项。它也非常适合将大量数据库迁移到\
  \ Exadata。如果您需要快速见效，“物理迁移”（即“直接迁移”）是可行之道，但不要忘记在有机会时进行简化和优化。\n\n此外，通过将生产副本作为物理备用数据库恢复到\
  \ Exadata 数据库，并应用生产归档日志直到切换并使备用数据库成为新的生产数据库，物理迁移有可能以极低的停机时间完成。但是，此方法不能用于字节顺序不同的平台之间，并且还有一些\
  \ Oracle 版本特定的限制。\n\n#### 处理旧的初始化参数\n\n从较旧版本的 Oracle 迁移时，您可能会倾向于保留所有旧的（未记录的）`init.ora`参数以用于“调优”或“稳定性”。事实是，自\
  \ 10g 以来，Oracle 为其参数提供了非常好的默认值，特别是在 11.2 及更高版本中，而您的 Exadata 集群很可能运行在此版本或更高版本上。多年前通过设置这些未记录参数所解决的任何问题，很可能已经在数据库代码中得到了修复。此外，迁移到\
  \ Exadata 带来的变化远大于任何参数调整所能带来的影响，因此稳定性这一点也站不住脚。因此，建议不要从旧数据库迁移任何未记录的参数，除非您的应用程序（如\
  \ Oracle Siebel、SAP）文档明确要求您迁移到的新 Oracle 版本需要这些参数。\n\n#### 规划超大型数据库迁移的停机时间\n\n在估算停机时间或数据迁移时间时，您应仅依赖于在您的环境中、使用您的数据、您的网络连接、数据库设置和压缩选项进行的实际测量。虽然根据\
  \ Oracle 的说法，可以以 5TB/小时（Exadata V2）甚至 21.5 TB/小时（Exadata X5-2）的速度将原始数据加载到满配置的 Rack，但当目标表使用`ARCHIVE`或`QUERY\
  \ HIGH`压缩时，您可能无法获得这样的加载速度。无论您从本书或官方规格中找到什么数字，您都必须自己进行端到端的测试。有一些临时的解决方法可以提高加载速率。例如，如果有足够的磁盘空间，您可以在停机时间窗口内先加载到未压缩或`EHCC\
  \ QUERY LOW`压缩的表中，一旦投入生产，再用更高的压缩率重新压缩各个分区。\n\n## 摘要\n\n在本长篇章节中，你了解了大量可用于将数据迁移到 Exadata\
  \ 的可用工具。你应该选择尽可能最简单的方法，因为这可以降低风险，也能节省你自己的时间。你可能也会考虑评估一下 `Data Pump`；它常被忽视，但它可以传输整个数据库或仅一个模式。在\
  \ `12c` 中，`Full Transportable Export/Import` 在底层利用了 `Transportable Tablespaces`。它可以快速完成工作，甚至在你想在此过程中调整对象\
  \ DDL 元数据时也很灵活。然而，这种方法通常不够快（网络带宽！）或需要过多的临时磁盘空间。这完全取决于你需要传输多少数据以及允许多少停机时间。当移动大小为数十甚至数百\
  \ TB 的 VLDB（超大型数据库）时，你可能需要发挥创意，使用不那么直接的方法，如数据库链接、提前复制只读数据，或者使用某种复制方法进行完全增量迁移。跨平台可传输表空间加上增量备份的方法非常有用，如果元数据导出不消耗太多时间，它能帮助你实现低停机时间窗口。\n\
  \n每个企业的数据库环境和业务需求都不同，但你可以将本章解释的方法作为构建模块。如果要迁移的数据库非常大且允许的停机时间很短，你可能需要组合使用多种技术。无论你使用哪种技术，最重要的事情是记住要测试一切——最好测试多次——以解决过程中出现的任何问题。得益于系统化测试，你很可能会提前发现并修复许多问题。祝你好运！\n\
  \n"
- "# 14. 存储布局\n\n在 Oracle `10gR1` 中，Oracle 引入了 `自动存储管理 (ASM)`，并改变了我们思考数据库存储管理的方式。Exadata\
  \ 是第一款完全依赖 `ASM` 来提供数据库存储的 Oracle 产品。没有 `ASM`，数据库根本无法利用 Exadata 存储服务器。因此，`ASM` 是运行\
  \ Exadata 的硬性要求。虽然 `ASM` 可能不是一项新技术，但存储服务器是在 Exadata 之前未曾使用过的概念。\n\n乍一看，仔细研究单元存储的所有各种复杂性可能有点令人生畏。在物理磁盘和许多\
  \ `DBA` 熟悉的 `ASM` 磁盘组之间有几层抽象。如果你从未使用过 Oracle 的 `ASM` 产品，那里也会有很多新的术语和概念需要理解。在第 8\
  \ 章中，我们讨论了 Exadata 存储的底层，从物理磁盘一直到单元磁盘层。本章将从第 8 章中断的地方继续，讨论如何使用单元磁盘为 `ASM` 存储创建网格磁盘。我们将简要讨论存储单元的底层磁盘架构以及\
  \ `Linux` 如何将物理磁盘呈现给应用层。然后，我们将看看将 Exadata 网格磁盘划分并呈现给数据库层的选项。Oracle 推荐的方法是在所有存储单元上创建几个大的磁盘“池”。虽然从性能角度来看这种方法通常效果很好，但有理由考虑替代策略。有时，隔离一组存储单元以形成单独的存储网格是可取的。这提供了与\
  \ Exadata 机箱内更关键系统的分离，以便可以安装补丁并在生产环境实施前进行测试。在此过程中，我们将看看 `ASM` 如何为数据库提供故障恢复能力和存储虚拟化。最后，我们将看看存储安全性在\
  \ Exadata 上是如何实现的。存储单元是硬件和软件的高度高性能、高度复杂且高度可配置的混合体。本章将仔细研究所有不同部分如何协同工作，为 Oracle 数据库提供灵活、高性能的存储。\n\
  \n## Exadata 磁盘架构\n\n当 `Linux` 启动时，它会运行扫描以识别连接到服务器的磁盘。当找到磁盘时，操作系统会确定所需的设备驱动程序，并创建一个称为\
  \ `LUN` 的块设备供应用程序访问。虽然应用程序可以直接读写这些块设备，但这并不常见。这样做会使应用程序面临难以处理的变化。例如，由于设备名称是在启动时动态生成的，添加或更换磁盘可能导致所有磁盘设备名称发生变化。`ASM`\
  \ 和数据库还需要设置文件权限，以允许对这些设备进行读/写访问。在早期的 `ASM` 版本中，系统管理员通过原生的 `Linux` 实用程序（如 `ASMLib`\
  \ 和 `udev`）管理磁盘名称持久性。Exadata 通过各种抽象层为系统管理员和 `DBA` 屏蔽了这些复杂性。单元磁盘为 `LUN` 提供了第一层抽象。单元磁盘由\
  \ `cellsrv` 用于在存储单元管理 I/O 资源。网格磁盘是下一层抽象，是作为 `ASM` 磁盘呈现给数据库服务器的磁盘设备。图 14-1 展示了单元磁盘和网格磁盘如何融入\
  \ Exadata 存储单元的整体存储架构。\n\n![A978-1-4302-6242-8_14_Fig1_HTML.gif](img/A978-1-4302-6242-8_14_Fig1_HTML.gif)\n\
  \n图 14-1.\n\n物理磁盘与网格磁盘之间的关系\n\n随着 `ASM` 的引入，Oracle 提供了一种将许多物理磁盘组合成一个称为磁盘组的单一存储卷的方法。磁盘组是\
  \ `ASM` 对传统文件系统的替代，用于实现 Oracle 的 `SAME`（条带化和镜像所有内容）方法论以优化磁盘性能。顾名思义，`SAME` 的目标是将\
  \ I/O 均匀地分布在从 `ASM` 实例可见的所有物理磁盘上。以这种方式虚拟化存储允许多个数据库共享相同的物理磁盘。它还允许在不中断数据库操作的情况下添加或移除物理磁盘。如果必须移除磁盘，`ASM`\
  \ 会在其被删除之前将其数据迁移到磁盘组中的其他磁盘。当磁盘添加到磁盘组时，`ASM` 会自动将其他磁盘上的数据重新平衡到新磁盘上，以确保没有单个磁盘包含比其他磁盘更多的数据。在一个非常基础的\
  \ `ASM` 配置中，`LUN` 被作为 `ASM` 磁盘呈现给 `ASM`。`ASM` 磁盘随后用于创建磁盘组，而磁盘组又用于存储数据库文件，如数据文件、控制文件和联机重做日志。`Linux`\
  \ 操作系统将 `LUN` 作为原生块设备（如 `/dev/sda`）呈现给 `ASM`。Exadata 通过使用网格磁盘和 `ASM` 磁盘组来实现物理存储的虚拟化。网格磁盘用于划分单元磁盘，类似于分区用于划分物理磁盘驱动器的方式。图\
  \ 14-2 展示了单元磁盘、网格磁盘和 `ASM` 磁盘组之间的关系。需要记住的重要一点是，Exadata 上的 `ASM` 磁盘与标准系统上的 `ASM`\
  \ 磁盘不同，因为它们并非物理挂载在数据库服务器上。Exadata 上的所有 `ASM` 磁盘都通过 `iDB` 协议访问。\n\n![A978-1-4302-6242-8_14_Fig2_HTML.gif](img/A978-1-4302-6242-8_14_Fig2_HTML.gif)\n\
  \n图 14-2.\n\n包含其底层网格磁盘和单元磁盘的 `ASM` 磁盘组\n\n\n\n### 故障组\n\n在深入探讨网格磁盘之前，我们先简要了解一下 ASM\
  \ 架构中如何处理磁盘冗余。ASM 使用称为**故障组**的冗余磁盘集来提供镜像。传统的 RAID1 镜像维护原始磁盘的块级副本。ASM 故障组则通过将 ASM\
  \ 磁盘分配到不同的故障组来提供冗余，并保证一个数据块的原始副本及其镜像副本不驻留在同一个故障组中。将物理磁盘分离到不同的故障组至关重要。\n\n由于每个存储服务器都是一个独立的、可能随时发生故障的\
  \ Linux 系统，Exadata 将来自一个存储服务器的所有磁盘拆分为一个故障组。这确保了单台存储服务器上的两个磁盘永远不会包含同一数据块的两个副本。例如，下面的列表显示了存储单元\
  \ 1-3 的故障组和网格磁盘。顾名思义，这些故障组对应于存储单元 1-3。这些故障组是在创建网格磁盘时由 ASM 自动创建和命名的。\n\n```sql\n\
  SYS:+ASM1> select failgroup, name from v$asm_disk order by 1,2\n\nFAILGROUP   NAME\n\
  ----------- ----------------------\nCELL01      DATA_CD_00_CELL01\nCELL01      DATA_CD_01_CELL01\n\
  CELL01      DATA_CD_02_CELL01\nCELL01      DATA_CD_03_CELL01\n...\nCELL02      DATA_CD_00_CELL02\n\
  CELL02      DATA_CD_01_CELL02\nCELL02      DATA_CD_02_CELL02\nCELL02      DATA_CD_03_CELL02\n\
  ...\nCELL03      DATA_CD_00_CELL03\nCELL03      DATA_CD_01_CELL03\nCELL03      DATA_CD_02_CELL03\n\
  CELL03      DATA_CD_03_CELL03\n```\n\n图 14-3 展示了 `DATA` 磁盘组与故障组 `CELL01`、`CELL02`\
  \ 和 `CELL03` 之间的关系。请注意，这并不表示正在使用哪个级别的冗余，只表明 `DATA` 磁盘组的数据分配跨越了三个故障组。\n\n![A978-1-4302-6242-8_14_Fig3_HTML.gif](img/A978-1-4302-6242-8_14_Fig3_HTML.gif)\n\
  \n图 14-3. ASM 故障组 CELL01–CELL03\n\nASM 中有三种冗余类型：外部、常规和高：\n\n*   **外部冗余**：ASM 不提供冗余。假定存储阵列（通常是\
  \ SAN）提供了足够的冗余——在大多数情况下是 RAID1、RAID10 或 RAID5。在使用大型存储区域网络作为 ASM 存储时，这已成为最常用的方法。在\
  \ Exadata 存储网格中，ASM 提供了唯一的镜像机制。如果在 Exadata 上使用外部冗余，单个磁盘驱动器的丢失将意味着使用该磁盘的整个 ASM 磁盘组发生灾难性丢失。这也意味着即使是存储单元的临时丢失（重启、崩溃等）也会导致在故障单元上使用的所有磁盘组在停机期间不可用，并且可能需要进行数据库恢复。\n\
  *   **常规冗余**：常规冗余在不同的故障组中维护两个数据块副本。在 Oracle 12c 之前，数据库总是尝试首先从数据块的主副本读取。仅当主副本不可用或损坏时，才读取辅助副本。常规冗余至少需要两个故障组，但可以使用更多。例如，Exadata\
  \ 全机架配置有 14 个存储单元，每个存储单元构成一个故障组。当数据写入数据库时，用于每个块主副本的故障组会以轮询方式在不同故障组间轮换。这确保了所有故障组中的磁盘都参与读取操作。\n\
  *   **高冗余**：高冗余类似于常规冗余，不同之处在于在不同的故障组中维护三个数据块副本。\n\n为了使 ASM 能够正确跟踪数据主副本和辅助副本的位置，每个磁盘都有固定数量的伙伴磁盘，冗余副本可能位于这些伙伴磁盘上。默认情况下，每个磁盘将有八个伙伴。无论使用常规冗余还是高冗余，这个数字都是相同的。磁盘之间的伙伴关系可以通过查询\
  \ ASM 实例内部的 `x$kfdpartner` 视图来查看。例如，查看 `DATA` 磁盘组中的磁盘 0，我们可以看到它的八个伙伴磁盘：\n\n```sql\n\
  SQL> select g.name \"Diskgroup\", d.disk_number \"Number\", d.name \"Disk\"\n2 \
  \ from v$asm_diskgroup g, v$asm_disk d\n3  where g.group_number=d.group_number\n\
  4  and g.name='DATA'\n5  and d.name='DATA_CD_00_ENKCEL01'\n6  /\n\nDiskgroup   \
  \                        Number  Disk\n------------------------------ -----------\
  \ -------------------\nDATA                                     0  DATA_CD_00_ENKCEL01\n\
  \nSQL> select g.name \"Diskgroup\", d.name \"Disk\", p.number_kfdpartner \"Partner\"\
  , d.FAILGROUP \"Failgroup\"\n2    from x$kfdpartner p, v$asm_disk d, v$asm_diskgroup\
  \ g\n3  where p.disk = 0\n4  and g.name='DATA'\n5  and p.grp=g.group_number\n6 \
  \ and d.group_number = g.group_number\n7  and p.number_kfdpartner=d.disk_number\n\
  8  ORDER BY p.number_kfdpartner\n9  /\n\nDiskgroup                      Disk   \
  \                            Partner  Failgroup\n------------------------------\
  \ ------------------------------ ----------- ---------\nDATA                   \
  \        DATA_CD_02_ENKCEL02                     13  ENKCEL02\nDATA            \
  \               DATA_CD_03_ENKCEL02                     14  ENKCEL02\nDATA     \
  \                      DATA_CD_06_ENKCEL02                     17  ENKCEL02\nDATA\
  \                           DATA_CD_07_ENKCEL02                     18  ENKCEL02\n\
  DATA                           DATA_CD_05_ENKCEL03                     28  ENKCEL03\n\
  DATA                           DATA_CD_06_ENKCEL03                     29  ENKCEL03\n\
  DATA                           DATA_CD_08_ENKCEL03                     31  ENKCEL03\n\
  DATA                           DATA_CD_11_ENKCEL03                     34  ENKCEL03\n\
  ```\n\n伙伴磁盘在上面显示的四分之一机架中剩余的两个存储单元上均匀分布。每当 ASM 将数据的主副本放置在 `DATA_CD_00_ENKCEL01` 上时，辅助副本（或在高冗余磁盘组中的第三副本）将被放置在上述第二个查询列出的八个磁盘之一上。从磁盘故障的角度来看，伙伴关系至关重要。在常规冗余磁盘组中，只能有一个包含部分数据的磁盘处于离线状态。在高冗余磁盘组中，一个磁盘及其八个伙伴之一可以同时离线，因为存在数据的第三份副本。如果\
  \ ASM 无法访问任何数据副本，整个磁盘组将被脱机，以防止可能的数据丢失或损坏。\n\n无论数据副本的数量是多少，Oracle ASM 在 11g 版本中只会从数据的主副本读取。如果磁盘故障，ASM\
  \ 将寻找冗余副本。在 Oracle 12c 中，引入了一个“均衡读取”功能。在磁盘故障的情况下，ASM 将尝试通过读取所有数据的主副本和副本来保持磁盘 I/O\
  \ 平衡，无论主副本的状态如何。\n\n\n\n### Grid 磁盘\n\nGrid 磁盘是在单元磁盘内创建的，您可能还记得，单元磁盘由物理磁盘组成。Grid\
  \ 磁盘可以位于基于硬盘的单元磁盘上，也可以位于基于闪存的单元磁盘上。在简单配置中，每个单元磁盘可以创建一个 grid 磁盘。典型的配置是每个单元磁盘有多个 grid\
  \ 磁盘。`CellCLI`命令`list griddisk`用于显示 grid 磁盘的各种特性。例如，下面的输出展示了 grid 磁盘与单元磁盘的关系、创建它们的设备类型及其大小：\n\
  \n```\n[enkcel03:root] root\n\n> cellcli\n\nCellCLI: Release 11.2.1.3.1 - Production\
  \ on Sat Oct 23 17:23:32 CDT 2010\n\nCopyright (c) 2007, 2009, Oracle. All rights\
  \ reserved.\n\nCell Efficiency Ratio: 20M\n\nCellCLI> list griddisk attributes name,\
  \ celldisk, disktype, size\n\nDATA_CD_00_cell03       CD_00_cell03    HardDisk        1282.8125G\n\
  \nDATA_CD_01_cell03       CD_01_cell03    HardDisk        1282.8125G\n\n...\n\n\
  FLASH_FD_00_cell03      FD_00_cell03    FlashDisk       4.078125G\n\nFLASH_FD_01_cell03      FD_01_cell03    FlashDisk       4.078125G\n\
  \n...\n```\n\n`ASM`并不知晓物理磁盘或单元磁盘。Grid 磁盘是存储单元呈现给数据库服务器（作为`ASM`磁盘）用于 Clusterware\
  \ 和数据库存储的资源。`ASM`使用 grid 磁盘创建磁盘组，其方式与在非 Exadata 平台上使用传统块设备相同。为了说明这一点，下面的查询显示了非 Exadata\
  \ 系统上`ASM`磁盘的外观：\n\n```\nSYS:+ASM1> select path, total_mb, failgroup\n\nfrom v$asm_disk\n\
  \norder by failgroup, group_number, path;\n\nPATH              TOTAL_MB FAILGROUP\n\
  \n--------------- ---------- ---------\n\n/dev/sdd1            11444 DATA01\n\n\
  /dev/sde1            11444 DATA02\n\n...\n\n/dev/sdj1             3816 RECO01\n\n\
  /dev/sdk1             3816 RECO02\n\n...\n```\n\n在 Exadata 上执行相同的查询，则会报告已在存储单元创建的\
  \ grid 磁盘：\n\n```\nSYS:+ASM1> select path, total_mb, failgroup\n\nfrom v$asm_disk\n\
  \norder by failgroup, group_number, path;\n\nPATH                                                            TOTAL_MB  FAILGROUP\n\
  \n------------------------------------------------------------    --------  ----------\n\
  \no/192.168.12.9;192.168.12.10/DATA_CD_00_CELL01                  3023872   CELL01\n\
  \no/192.168.12.9;192.168.12.10/DATA_CD_01_CELL01                  3023872   CELL01\n\
  \no/192.168.12.9;192.168.12.10/DATA_CD_02_CELL01                  3023872   CELL01\n\
  \n...\n\no/192.168.12.9;192.168.12.10/RECO_CD_00_CELL01                  756160    CELL01\n\
  \no/192.168.12.9;192.168.12.10/RECO_CD_01_CELL01                  756160    CELL01\n\
  \no/192.168.12.9;192.168.12.10/RECO_CD_02_CELL01                  756160    CELL01\n\
  \n...\n\no/192.168.12.11;192.168.12.12/DATA_CD_00_CELL02                 3023872   CELL02\n\
  \no/192.168.12.11;192.168.12.12/DATA_CD_01_CELL02                 3023872   CELL02\n\
  \no/192.168.12.11;192.168.12.12/DATA_CD_02_CELL02                 3023872   CELL02\n\
  \n...\n\no/192.168.12.11;192.168.12.12/RECO_CD_00_CELL02                 756160    CELL02\n\
  \no/192.168.12.11;192.168.12.12/RECO_CD_01_CELL02                 756160    CELL02\n\
  \no/192.168.12.11;192.168.12.12/RECO_CD_02_CELL02                 756160    CELL02\n\
  \n...\n\no/192.168.12.13;192.168.12.14/DATA_CD_00_CELL03                 3023872   CELL03\n\
  \no/192.168.12.13;192.168.12.14/DATA_CD_01_CELL03                 3023872   CELL03\n\
  \no/192.168.12.13;192.168.12.14/DATA_CD_02_CELL03                 3023872   CELL03\n\
  \n...\n\no/192.168.12.13;192.168.12.14/RECO_CD_00_CELL03                 756160    CELL03\n\
  \no/192.168.12.13;192.168.12.14/RECO_CD_01_CELL03                 756160    CELL03\n\
  \no/192.168.12.13;192.168.12.14/RECO_CD_02_CELL03                 756160    CELL03\n\
  \n...\n\no/192.168.12.15;192.168.12.16/DATA_CD_00_CELL04                 3023872   CELL04\n\
  \no/192.168.12.15;192.168.12.16/DATA_CD_01_CELL04                 3023872   CELL04\n\
  \no/192.168.12.15;192.168.12.16/DATA_CD_02_CELL04                 3023872   CELL04\n\
  \n...\n\no/192.168.12.15;192.168.12.16/RECO_CD_00_CELL04                 756160    CELL04\n\
  \no/192.168.12.15;192.168.12.16/RECO_CD_01_CELL04                 756160    CELL04\n\
  \no/192.168.12.15;192.168.12.16/RECO_CD_02_CELL04                 756160    CELL04\n\
  \n...\n\no/192.168.12.17;192.168.12.18/DATA_CD_00_CELL05                 3023872   CELL05\n\
  \no/192.168.12.17;192.168.12.18/DATA_CD_01_CELL05                 3023872   CELL05\n\
  \no/192.168.12.17;192.168.12.18/DATA_CD_01_CELL06                 3023872   CELL05\n\
  \n...\n\no/192.168.12.17;192.168.12.18/RECO_CD_00_CELL05                 756160    CELL05\n\
  \no/192.168.12.17;192.168.12.18/RECO_CD_01_CELL05                 756160    CELL05\n\
  \no/192.168.12.17;192.168.12.18/RECO_CD_02_CELL05                 756160    CELL05\n\
  \n...\n```\n\n将所有内容结合起来，图 14-4 展示了从存储单元到`ASM`磁盘组的各层存储是如何组合在一起的。请注意，每个存储单元的前两个单元磁盘上的\
  \ Linux 操作系统分区由一个深色分区标识。我们将在本章稍后及第 8 章中更详细地讨论操作系统分区。\n\n![A978-1-4302-6242-8_14_Fig4_HTML.gif](img/A978-1-4302-6242-8_14_Fig4_HTML.gif)\n\
  \n*图 14-4. Exadata 上的存储*\n\n### 存储分配\n\n磁盘驱动器将数据存储在称为磁道的同心环带中。由于磁盘的外圈磁道具有更大的表面积，因此它们能够比内圈磁道存储更多数据。因此，外圈磁道的数据传输速率更高，并随着向最内圈磁道移动而略有下降。图\
  \ 14-5 展示了磁道从最快到最慢在磁盘表面的布局。\n\n![A978-1-4302-6242-8_14_Fig5_HTML.gif](img/A978-1-4302-6242-8_14_Fig5_HTML.gif)\n\
  \n*图 14-5. 磁盘磁道*\n\nExadata 提供了两种策略，用于在磁盘驱动器表面分配 grid 磁盘存储空间。第一种方法是分配单元磁盘空间的默认行为。它没有官方名称，因此为了本次讨论的目的，我将其称为默认策略。Oracle\
  \ 将另一种分配策略称为交错分配。这两种分配策略在创建单元磁盘时确定。必须使用`create celldisk`命令的`interleaving`参数显式启用交错分配。关于创建单元磁盘的完整讨论，请参阅第\
  \ 8 章。\n\n\n#### 创建网格磁盘\n\n## 最快磁道优先\n\n默认策略只是简单地从最快的可用磁道开始分配空间，随着空间的消耗向内移动。使用此策略时，在每个单元磁盘上创建的第一个网格磁盘将获得最快的存储，而创建的最后一个网格磁盘将被分配到磁盘表面较慢的内侧磁道。在规划存储网格时，请记住，网格磁盘是\
  \ ASM 磁盘组的构建块。这些磁盘组随后将用于存储表、索引、联机重做日志、归档重做日志等。为了最大化数据库性能，频繁访问的对象（如表、索引和联机重做日志）应存储在最高优先级的网格磁盘中。低优先级的网格磁盘应用于性能敏感性较低的对象，如数据库备份、归档重做日志和闪回日志。图\
  \ 14-6 展示了使用默认分配策略时网格磁盘是如何分配的。\n\n![A978-1-4302-6242-8_14_Fig6_HTML.gif](img/A978-1-4302-6242-8_14_Fig6_HTML.gif)\n\
  \n图 14-6. 默认分配策略\n\n表 14-1 展示了使用默认分配策略时，从第一个到最后一个创建的网格磁盘对 ASM 磁盘组性能的影响。你在 Oracle\
  \ 文档中找不到“I/O 性能评级”这个术语。这是我在此创造的一个术语，用于描述由于在物理磁盘驱动器表面的位置不同，每个磁盘组所具有的相对性能能力。\n\n表\
  \ 14-1. I/O 性能 — 默认分配策略\n\n| ASM 磁盘组 | I/O 性能评级 |\n| --- | --- |\n| `DATA` | 1 |\n\
  | `RECO` | 2 |\n| `DBFS_DG` | 3 |\n\n## 交错\n\n另一种策略是交错，它试图通过在磁盘的慢速和快速磁道之间交替分配空间，来平衡快速和慢速磁道的性能。这是通过将每个单元磁盘分成两个区域来实现的——外部区域和内部区域。网格磁盘是单元磁盘的切片，将用于创建\
  \ ASM 磁盘组。例如，以下命令在 `Cell03` 上创建 12 个网格磁盘（每个物理磁盘一个；参见图 14-4），用于 `DATA` 磁盘组：\n\n```\n\
  CellCLI> CREATE GRIDDISK ALL HARDDISK PREFIX=DATA, size=744.6813G\n```\n\n这些网格磁盘被用来创建以下\
  \ `DATA` 磁盘组。请注意每个网格磁盘是如何创建在单独的单元磁盘上的：\n\n```\nSYS:+ASM2> select dg.name diskgroup,\n\
  \                  substr(d.name, 6,12) cell_disk,\n                  d.name grid_disk\n\
  \             from v$asm_diskgroup dg,\n                  v$asm_disk d\n       \
  \    where dg.group_number = d.group_number\n             and dg.name =’DATA’\n\
  \             and failgroup = ’CELL03’\n           order by 1,2;\nDISKGROUP   CELL_DISK\
  \     GRID_DISK\n----------  ------------  ---------------------\nDATA        CD_00_CELL03\
  \  DATA_CD_00_CELL03\nDATA        CD_01_CELL03  DATA_CD_01_CELL03\nDATA        CD_02_CELL03\
  \  DATA_CD_02_CELL03\nDATA        CD_03_CELL03  DATA_CD_03_CELL03\n...\nDATA   \
  \     CD_10_CELL03  DATA_CD_10_CELL03\nDATA        CD_11_CELL03  DATA_CD_11_CELL03\n\
  ```\n\n在此示例中使用交错策略，`DATA_CD_00_CELL03`（第一个网格磁盘）被分配到 `CD_00_CELL03` 单元磁盘外部（最快）区域的最外侧磁道。下一个网格磁盘\
  \ `DATA_CD_01_CELL03` 则创建在单元磁盘 `CD_01_CELL03` 较慢的内部区域的最外侧磁道上。此模式持续直到所有 12 个网格磁盘分配完毕。当下一组为\
  \ `RECO` 磁盘组创建网格磁盘时，它们从单元磁盘 1 的内部区域开始，并在内部和外部区域之间交替，直到所有 12 个网格磁盘创建完毕。图 14-7 展示了如果创建了两个网格磁盘组，交错策略会是什么样子。\n\
  \n![A978-1-4302-6242-8_14_Fig7_HTML.gif](img/A978-1-4302-6242-8_14_Fig7_HTML.gif)\n\
  \n图 14-7. 交错分配策略\n\n表 14-2 展示了使用交错分配策略时，从第一个到最后一个创建的网格磁盘对 ASM 磁盘组性能的影响。\n\n表 14-2.\
  \ I/O 性能 — 交错策略\n\n| ASM 磁盘组 | I/O 性能评级 |\n| --- | --- |\n| `DATA` | 1 |\n| `RECO`\
  \ | 1 |\n| `DBFS_DG` | 2 |\n\n正如你所见，默认策略和交错策略的主要区别在于，默认策略提供了对 ASM 磁盘更细粒度的控制。使用默认策略，你可以选择哪一组网格磁盘获得磁盘上绝对最快的位置。交错策略的效果是均衡网格磁盘的性能。在实践中，这使得前两组网格磁盘（用于\
  \ `DATA` 和 `RECO`）具有相同的性能特性。如果前两个磁盘组的性能需求相等，这可能很有用。但根据我们的经验，这种情况很少见。通常，当涉及数据库环境的性能需求时，会有一个明确的优胜者。表、索引和联机重做日志（`DATA`\
  \ 磁盘组）的性能要求远高于通常存储在 `RECO` 磁盘组中的数据库备份、归档重做日志和闪回日志。除非有特定的理由使用交错策略，否则我们建议使用默认策略。\n\
  \n在我们介绍几个如何创建网格磁盘的示例之前，让我们快速了解一下它们的一些关键属性：\n\n*   可以在单个单元磁盘上创建多个网格磁盘，但一个网格磁盘不能跨多个单元磁盘。\n\
  *   网格磁盘的存储以 16M 分配单元为单位进行分配，如果请求的大小不是分配单元大小的倍数，则会向下舍入。\n*   网格磁盘可以一次创建一个，也可以使用共同的名称前缀成组创建。\n\
  *   网格磁盘名称在存储单元内必须是唯一的，并且应在所有存储单元中保持唯一。\n*   网格磁盘名称应包含其所在单元磁盘的名称。\n\n一旦创建了网格磁盘，其名称就可以通过\
  \ ASM 的 `V$ASM_DISK` 视图可见。换句话说，网格磁盘 = ASM 磁盘。以能够轻松关联到其所属物理磁盘的方式命名网格磁盘非常重要，尤其是在发生磁盘故障时。为了便于做到这一点，网格磁盘名称应包含以下两项：\n\
  \n*   它将要使用的 ASM 磁盘组的名称\n*   单元磁盘名称（其中包含存储单元的名称）\n\n图 14-8 展示了一个属于 `TEST` 磁盘组、创建在单元磁盘\
  \ `CD_00_cell03` 上的网格磁盘的规范命名格式。\n\n![A978-1-4302-6242-8_14_Fig8_HTML.gif](img/A978-1-4302-6242-8_14_Fig8_HTML.gif)\n\
  \n图 14-8. 网格磁盘命名\n\n\n#### 创建网格磁盘\n\n`CellCLI`命令`create griddisk`用于创建网格磁盘。它可以一次创建一个单独的网格磁盘，也可以成组创建。如果一次创建一个网格磁盘，您需要提供完整的网格磁盘名称。以下示例在单元格磁盘`CD_00_cell03`上创建一个命名正确的\
  \ 400GB 网格磁盘。如果我们省略了`size=400GB`参数，生成的网格磁盘将占用单元格磁盘上的所有可用空间：\n\n```\nCellCLI> create\
  \ griddisk TEST_CD_00_cell03 –\n           celldisk=’CD_00_cell03’, size=400G\n\
  GridDisk TEST_CD_00_cell03 successfully created\n\nCellCLI> list griddisk attributes\
  \ name, celldisk, size –\n           where name=’TEST_CD_00_cell03’\n         TEST_CD_00_cell03\
  \       CD_00_cell03    400G\n```\n\n每个存储单元有 12 个驱动器，存储单元的数量从四分之一机架的 3 个到满配机架的 14\
  \ 个不等。这意味着您将为四分之一机架创建至少 36 个网格磁盘，最多为满配机架创建 168 个网格磁盘。幸运的是，`CellCLI`提供了一种方式，可以用一条命令为给定的\
  \ ASM 磁盘组创建所有需要的网格磁盘。例如，以下命令为 ASM 磁盘组`TEST`创建所有网格磁盘：\n\n```\nCellCLI> create griddisk\
  \ all harddisk prefix=’TEST’, size=400G\nGridDisk TEST_CD_00_cell03 successfully\
  \ created\nGridDisk TEST_CD_01_cell03 successfully created\n...\nGridDisk TEST_CD_10_cell03\
  \ successfully created\nGridDisk TEST_CD_11_cell03 successfully created\n```\n\n\
  当使用这种变体的`create griddisk`命令时，`CellCLI`会自动在每个单元格磁盘上创建一个网格磁盘，并使用您提供的前缀按以下方式命名：\n`{prefix}`\
  \ `_` `{celldisk_name}`\n\n可选的`size`参数指定每个单独网格磁盘的大小。如果不提供大小，生成的网格磁盘将占用其各自单元格磁盘的所有剩余可用空间。`all\
  \ harddisk`参数指示`CellCLI`仅使用基于磁盘的单元格磁盘。如果您好奇，闪存缓存模块也作为单元格磁盘（类型为`FlashDisk`）呈现，也可以用于创建网格磁盘。我们将在本章后面讨论闪存磁盘。以下命令显示了创建的网格磁盘：\n\
  \n```\nCellCLI> list griddisk attributes name, cellDisk, diskType, size -\n    \
  \       where name like ’TEST_.*’\n         TEST_CD_00_cell03       CD_00_cell03\
  \     HardDisk        96M\n         TEST_CD_01_cell03       CD_01_cell03     HardDisk\
  \        96M\n          ...\n         TEST_CD_10_cell03       CD_10_cell03     HardDisk\
  \        96M\n         TEST_CD_11_cell03       CD_11_cell03     HardDisk       \
  \ 96M\n```\n\n#### 网格磁盘大小调整\n\n正如我们前面讨论的，网格磁盘等同于 ASM 磁盘。它们本质上是您将创建的 ASM 磁盘组的构建块。`DBFS_DG`磁盘组是在站点上安装\
  \ Exadata 时创建的。它主要用于存储 Oracle Clusterware（Grid Infrastructure）使用的 OCR 和投票文件。然而，没有理由`DBFS_DG`不能用于存储其他对象，例如用于数据库文件系统（DBFS）的表空间。除了`DBFS_DG`（以前是`SYSTEMDG`）磁盘组外，Exadata\
  \ 还提供了`DATA`和`RECO`磁盘组，用于数据库文件和快速恢复区。但是这些磁盘组实际上可以使用任何对您的环境最有意义的名称来创建。为保持一致性，本章使用名称`DBFS_DG`、`DATA`和`RECO`。如果您正在考虑为磁盘组配置使用“工厂默认值”以外的其他配置，请记住，在\
  \ Exadata 上使用多个 ASM 磁盘组的一个主要原因是为了优先考虑 I/O 性能。您首先创建的网格磁盘将是最快的，从而为关联的 ASM 磁盘组带来更高的性能。\n\
  \n#### 注意\n\n当 Exadata V2 推出时，`SYSTEMDG`是用于存储 Oracle Clusterware 的 OCR 和投票文件的磁盘组。当\
  \ Exadata X2 推出时，该磁盘组被重命名为`DBFS_DG`，可能是因为有相当多的可用空间剩余，非常适合作为一个中等规模的 DBFS 文件系统的存储位置。此外，当\
  \ X2 推出时，其他默认磁盘组名称也发生了一些变化。Exadata 数据库机器名称被添加为`DATA`和`RECO`磁盘组名称的后缀。例如，我们其中一个实验室系统的机器名称是`ENK`。所以`DATA`变成了`DATA_ENK`，`RECO`变成了`RECO_ENK`。\n\
  \n顺便说一下，Oracle 建议您为 DBFS 创建一个单独的数据库，因为它需要的实例参数设置对于典型的应用程序数据库来说不是最优的。\n\n以下是一些最常见的\
  \ ASM 磁盘组：\n*   `DBFS_DG`：此磁盘组通常是 Clusterware 的 OCR 和投票文件的存储位置，以及 ASM 的 spfile。它也可用于具有类似性能要求的其他文件。对于\
  \ OCR 和投票文件，普通冗余是最低要求。普通冗余将创建三个投票文件和三个 OCR 文件。投票文件必须存储在单独的 ASM 故障组中。回想一下，在 Exadata\
  \ 上，每个存储单元构成一个故障组。这意味着对于 Exadata 八分之一或四分之一机架配置（三个存储单元/故障组），只能使用普通冗余。只有在半机架和满配机架配置（七个或十四个存储单元/故障组）中，才有足够数量的故障组来存储高冗余所需的投票和\
  \ OCR 文件数量。表 14-3 总结了在不同冗余级别下 OCR 和投票文件的存储要求。请注意，外部冗余在 Exadata 上不受支持。我们将其包含在表中仅供参考。如果存在具有足够数量故障组的高冗余磁盘组，脚本化安装过程会将\
  \ OCR 和投票磁盘移至该磁盘组。\n\n表 14-3. OCR 和投票文件存储要求\n| 冗余级别 | 最少磁盘数 | OCR | 投票 | 总计 |\n\
  | --- | --- | --- | --- | --- |\n| 外部 | 1 | 400 MB | 300 MB | 700 MB |\n| 普通 | 3\
  \ | 800 MB | 900 MB | 1.7 GB |\n| 高 | 5 | 1.2 GB | 1.5 GB | 2.7 GB |\n\n\n\n"
- "# Exadata 存储配置：磁盘组与网格磁盘\n\n## 磁盘组用途\n\n*   `DATA`：此磁盘组用于存储与 `db_create_file_dest`\
  \ 数据库参数相关的文件。这些文件包括数据文件、在线重做日志、控制文件和服务器参数文件（spfile）。\n*   `RECO`：此磁盘组即过去所称的闪回恢复区（Flash\
  \ Recovery Area， FRA）。在 11gR1 之后的某个时间，Oracle 将其重命名为“快速恢复区”（Fast Recovery Area）；有传言称这是因为过度使用“Flash”一词导致营销团队感到困惑。为明确起见，此磁盘组用于存储与\
  \ `db_recovery_file_dest` 数据库参数对应的所有内容，包括在线数据库备份和副本、在线重做日志文件副本、控制文件镜像副本、归档重做日志、闪回日志和\
  \ Data Pump 导出文件。\n\n## 存储单元磁盘布局\n\n回想一下，Exadata 存储单元实际上是经过精细调优的 Linux 服务器，配备 12\
  \ 个内置硬盘驱动器。Oracle 本可以专门用其中两个内置磁盘来运行操作系统，但这样做会浪费大量空间。相反，他们在机箱的前两个磁盘上划分了几个小分区。这些分区每个约\
  \ 33GB，造成了单元磁盘（Cell Disk）大小的轻微不平衡。`DBFS_DG` 网格磁盘（Grid Disk）则用于平衡这种不平衡。图 14-9 说明了这种大小不平衡。\n\
  \n![A978-1-4302-6242-8_14_Fig9_HTML.gif](img/A978-1-4302-6242-8_14_Fig9_HTML.gif)\n\
  \n**图 14-9. 单元磁盘布局**\n\n此保留空间可以通过在某个存储单元上运行 `parted` 命令来查看。列表中的 `/dev/sda3` 分区是单元磁盘的位置。所有其他分区均由\
  \ Linux 操作系统使用：\n\n```\n[root@enkx3cel01 ∼]# parted /dev/sda print\nModel: LSI MR9261-8i\
  \ (scsi)\nDisk /dev/sda: 3000GB\nSector size (logical/physical): 512B/512B\nPartition\
  \ Table: gpt\nNumber  Start   End     Size    File system  Name     Flags\n1   \
  \   32.8kB  123MB   123MB   ext3         primary  raid\n2      123MB   132MB   8225kB\
  \  ext2         primary\n3      132MB   2964GB  2964GB               primary\n4\
  \      2964GB  2964GB  32.8kB               primary\n5      2964GB  2975GB  10.7GB\
  \  ext3         primary  raid\n6      2975GB  2985GB  10.7GB  ext3         primary\
  \  raid\n7      2985GB  2989GB  3221MB  ext3         primary  raid\n8      2989GB\
  \  2992GB  3221MB  ext3         primary  raid\n9      2992GB  2994GB  2147MB  linux-swap\
  \   primary  raid\n10      2994GB  2995GB  732MB                primary  raid\n\
  11      2995GB  3000GB  5369MB  ext3         primary  raid\n```\n\n当运行 `list celldisk`\
  \ 命令时，可以在 `size` 属性中看到较小的单元磁盘：\n\n```\nCellCLI> list celldisk attributes name, devicePartition,\
  \ size –\n         where diskType = ’HardDisk’\nCD_00_cell01    /dev/sda3      \
  \ 2760.15625G\nCD_01_cell01    /dev/sdb3       2760.15625G\nCD_02_cell01    /dev/sdc\
  \        2793.953125G\nCD_03_cell01    /dev/sdd        2793.953125G\nCD_04_cell01\
  \    /dev/sde        2793.953125G\nCD_05_cell01    /dev/sdf        2793.953125G\n\
  CD_06_cell01    /dev/sdg        2793.953125G\nCD_07_cell01    /dev/sdh        2793.953125G\n\
  CD_08_cell01    /dev/sdi        2793.953125G\nCD_09_cell01    /dev/sdj        2793.953125G\n\
  CD_10_cell01    /dev/sdk        2793.953125G\nCD_11_cell01    /dev/sdl        2793.953125G\n\
  ```\n\n## 网格磁盘配置示例\n\n让我们看一个相当典型的配置，来说明如何在存储单元中分配网格磁盘。在此示例中，我们将创建网格磁盘以支持三个 ASM 磁盘组。`DBFS_DG`\
  \ 将用于 OCR 和 Voting 文件：\n\n*   `DATA`\n*   `RECO`\n*   `DBFS_DG`\n\n此存储单元配置了 3TB\
  \ 大小、高容量的磁盘，因此每个存储单元的原始空间为 33.45TB。具有更大磁盘大小的新机型会将额外的空间分配在 `DATA` 和 `RECO` 网格磁盘之间。表\
  \ 14-4 展示了分配情况。\n\n**表 14-4. I/O 网格磁盘空间分配（所有大小以千兆字节表示）**\n\n| 单元磁盘 | 操作系统 | DATA\
  \ | DBFS_DG | RECO | 网格磁盘总空间 |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| `CD_00_cel01`\
  \ | 33.796875 | 2607 | 不适用 | 1084.4375 | 3691.4375 |\n| `CD_01_cel01` | 33.796875\
  \ | 2607 | 不适用 | 1084.4375 | 3691.4375 |\n| `CD_02_cel01` | 不适用 | 2607 | 33.796875\
  \ | 1084.4375 | 3725.234375 |\n| `CD_03_cel01` | 不适用 | 2607 | 33.796875 | 1084.4375\
  \ | 3725.234375 |\n| `CD_04_cel01` | 不适用 | 2607 | 33.796875 | 1084.4375 | 3725.234375\
  \ |\n| `CD_05_cel01` | 不适用 | 2607 | 33.796875 | 1084.4375 | 3725.234375 |\n| `CD_06_cel01`\
  \ | 不适用 | 2607 | 33.796875 | 1084.4375 | 3725.234375 |\n| `CD_07_cel01` | 不适用 |\
  \ 2607 | 33.796875 | 1084.4375 | 3725.234375 |\n| `CD_08_cel01` | 不适用 | 2607 | 33.796875\
  \ | 1084.4375 | 3725.234375 |\n| `CD_09_cel01` | 不适用 | 2607 | 33.796875 | 1084.4375\
  \ | 3725.234375 |\n| `CD_10_cel01` | 不适用 | 2607 | 33.796875 | 1084.4375 | 3725.234375\
  \ |\n| `CD_11_cel01` | 不适用 | 2607 | 33.796875 | 1084.4375 | 3725.234375 |\n| **单元总计**\
  \ | **67.59** | **31,284** | **337.97** | **13,013.25** | **44,635.22** |\n\n创建这样的配置相当简单。以下命令根据表\
  \ 14-4 中的分配创建网格磁盘：\n\n```\nCellCLI> create griddisk all prefix=’DATA’ size=2607G\n\
  CellCLI> create griddisk all prefix=’RECO’ size=1084.4375G\nCellCLI> create griddisk\
  \ all prefix=’DBFS_DG’\n```\n\n注意，未为 `DBFS_DG` 网格磁盘指定大小。当未指定大小时，`CellCLI` 会自动计算每个网格磁盘的大小，使其消耗单元磁盘上的剩余可用空间。例如：\n\
  \n```\nCellCLI> list griddisk attributes name, size\nDATA_CD_00_cell01       2607G\n\
  DATA_CD_01_cell01       2607G\nDATA_CD_02_cell01       2607G\n...\nRECO_CD_00_cell01\
  \       1084.4375G\nRECO_CD_01_cell01       1084.4375G\nRECO_CD_02_cell01      \
  \ 1084.4375G\n...\nDBFS_DG_CD_02_cell01    33.796875G\nDBFS_DG_CD_03_cell01    33.796875G\n\
  DBFS_DG_CD_04_cell01    33.796875G\n...\n```\n\n\n\n### 创建基于闪存盘的网格磁盘\n\nExadata\
  \ 利用智能扫描等卸载功能，为通常在 DSS 数据库中出现的直接路径读取提供惊人的快速 I/O。这些功能仅针对数据库中非常特定的数据访问路径激活。为了加速随机读取的\
  \ I/O 性能，Exadata V2 引入了闪存缓存，这是一种基于固态、由存储支持的缓存。在 X4-2 型号中，每个存储节点都配置了四块 `3.2T` 的闪存缓存卡（`2,978G`\
  \ 可用），以提升对频繁访问数据的 I/O 性能。当配置为 Exadata 智能闪存缓存时，这些设备就像是存储节点的一个大型、数据库感知的磁盘缓存。我们在第 5\
  \ 章中详细讨论过这一点。\n\n可选地，可以从闪存缓存中划出部分空间，用作高速固态磁盘。闪存缓存被配置为 `FlashDisk` 类型的单元磁盘，并且正如网格磁盘是在\
  \ `HardDisk` 单元磁盘上创建的一样，它们也可以在 `FlashDisk` 单元磁盘上创建。当 `FlashDisk` 用于数据库存储时，主要是为了在基于磁盘的存储无法跟上时，提升高度写密集型工作负载的性能。随着写回式闪存缓存的出现，对基于闪存的网格磁盘的需求已大大减少。\n\
  \n可以使用 CellCLI 的 `list celldisk` 命令查看 `FlashDisk` 单元磁盘，如下例所示：\n\n```\nCellCLI> list\
  \ celldisk attributes name, diskType, size\n\nCD_00_cel01    HardDisk        3691.484375G\n\
  CD_01_cel01    HardDisk        3691.484375G\nCD_02_cel01    HardDisk        3725.28125G\n\
  ...\nCD_11_cel01    HardDisk        3725.28125G\nFD_00_cel01    FlashDisk       186.25G\n\
  FD_01_cel01    FlashDisk       186.25G\n...\nFD_15_cel01    FlashDisk       186.25G\n\
  ```\n\n`FlashDisk` 类型的单元磁盘以 `FD` 为前缀命名，其 `diskType` 为 `FlashDisk`。不建议将所有闪存缓存空间都用于网格磁盘。创建闪存缓存时，请使用\
  \ `size` 参数保留部分空间用于网格磁盘。以下命令创建了一个 `512GB` 的闪存缓存，并将剩余空间保留给网格磁盘（以下示例来自 X3-2 Exadata）：\n\
  \n```\nCellCLI> create flashcache all size=512G\nFlash cache cel01_FLASHCACHE successfully\
  \ created\n```\n\n请注意，`create flashcache` 命令使用 `size` 参数的方式与 `create griddisk` 命令不同。创建闪存缓存时，`size`\
  \ 参数决定了缓存的总体大小：\n\n```\nCellCLI> list flashcache detail\nname:                   cel01_FLASHCACHE\n\
  cellDisk:               FD_11_cel01,FD_03_cel01,FD_07_cel01, ...\n...\nsize:                   512G\n\
  status:                 normal\n```\n\n```\nCellCLI> list celldisk attributes name,\
  \ size, freespace –\n> where disktype='FlashDisk'\nFD_00_cel01    22.875G         4.078125G\n\
  FD_01_cel01    22.875G         4.078125G\n...\nFD_15_cel01    22.875G         4.078125G\n\
  ```\n\n现在我们可以使用熟悉的 `create griddisk` 命令，在闪存盘剩余的可用空间上创建 16 个网格磁盘。这次我们将指定使用 `flashdisk`\
  \ 作为单元磁盘：\n\n```\nCellCLI> create griddisk all flashdisk prefix='RAMDISK'\nGridDisk\
  \ RAMDISK_FD_00_cel01 successfully created\n...\nGridDisk RAMDISK_FD_14_cel01 successfully\
  \ created\nGridDisk RAMDISK_FD_15_cel01 successfully created\n```\n\n```\nCellCLI>\
  \ list griddisk attributes name, diskType, size –\n> where disktype='FlashDisk'\n\
  RAMDISK_FD_00_cel01    FlashDisk       4.078125G\nRAMDISK_FD_01_cel01    FlashDisk       4.078125G\n\
  ...\nRAMDISK_FD_15_cel01    FlashDisk       4.078125G\n```\n\n一旦创建了网格磁盘，就可以用它们来创建\
  \ ASM 磁盘组，用于存储数据库对象，就像使用任何其他基于磁盘的磁盘组一样。闪存缓存配置的妙处在于，所有这些操作都可以在系统在线并处理 I/O 请求时完成。我们刚刚用来删除和重新配置闪存缓存的所有命令，都无需禁用或关闭数据库或单元服务。\n\
  \n### 存储策略\n\n每个 Exadata 存储节点都是一个智能的小型 SAN，其运行在某种程度上独立于机架中的其他节点。这或许有点扩展了 SAN 的定义，但由于\
  \ Cell Server 软件智能地控制 I/O 访问，我们认为这是合适的。\n\n存储节点可以配置为，机架中的所有节点为机架中的所有数据库提供存储。这为系统中的每个数据库提供了最大的\
  \ I/O 性能和数据传输速率。计算节点也可以配置为使用 `cellip.ora` 文件与特定的单元服务器通信。此外，可以使用单元安全性，通过存储域的使用来限制对特定数据库或\
  \ ASM 实例的访问。\n\n在本节中，我将讨论将节点分组以服务某些数据库服务器或 RAC 集群的策略。借用 SAN 领域的一个熟悉术语，这里我们将讨论如何对一组存储节点进行“分区”，以服务开发、测试和生产环境。虽然这两种选项对\
  \ Exadata 管理员都可用，但“隔离存储节点访问”中描述的方法在 Exadata 环境中更为常见。\n\n### 配置选项\n\n对大多数公司而言，Exadata\
  \ 代表着一项重大投资。出于这样或那样的原因，我们发现许多公司希望购买一个全机架或半机架来整合多个数据库环境。Exadata 的架构使其成为一个非常好的整合平台。以下是我们见过的一些最常见配置：\n\
  \n*   一个全机架服务开发、测试和生产\n*   一个全机架服务多个独立的生产环境\n*   一个半机架服务开发和测试\n*   隔离一个临时环境供 DBA\
  \ 测试和部署软件补丁\n\n对于这些配置中的每一个，将 I/O 隔离到特定的数据库服务器可能是一个关键考虑因素。例如，您的公司可能托管着外部客户的数据库环境，这些环境需要与其他数据库系统分离。或者您的公司可能有法律要求，需要对服务器访问数据进行隔离。在节点级别进行存储细分的另一个原因，可能是为\
  \ DBA 培训或测试软件补丁提供环境。\n\n有两种方法可以隔离 Exadata 存储节点——通过网络访问和通过存储域。根据现场经验，限制数据库服务器和存储节点之间访问的最常用方法是下文描述的第一种方法。\n\
  \n\n\n### 隔离存储单元访问\n\n回想一下，ASM 通过 InfiniBand 网格访问网格磁盘。这是通过在 `cellip.ora` 文件中添加存储单元的\
  \ IP 地址来配置的。例如，在一个满配机架中，所有 14 个存储单元列举如下：\n\n```\n[enkdb02:oracle:EXDB2] /home/oracle\n\
  > cat /etc/oracle/cell/network-config/cellip.ora\ncell=\"192.168.10.17;192.168.10.18\"\
  \ncell=\"192.168.10.19;192.168.10.20\"\ncell=\"192.168.10.21;192.168.10.22\"\ncell=\"\
  192.168.10.23;192.168.10.24\"\ncell=\"192.168.10.25;192.168.10.26\"\ncell=\"192.168.10.27;192.168.10.28\"\
  \ncell=\"192.168.10.29;192.168.10.30\"\ncell=\"192.168.10.31;192.168.10.32\"\ncell=\"\
  192.168.10.33;192.168.10.34\"\ncell=\"192.168.10.35;192.168.10.36\"\ncell=\"192.168.10.37;192.168.10.38\"\
  \ncell=\"192.168.10.39;192.168.10.40\"\ncell=\"192.168.10.41;192.168.10.42\"\ncell=\"\
  192.168.10.43;192.168.10.44\"\n```\n\n上面的例子来自一个具有主动-主动 InfiniBand 链路的满配 X4-2 Exadata。每一行定义了一个存储单元。当\
  \ ASM 启动时，它会查询这些 IP 地址上的存储单元，以寻找可用于配置 ASM 磁盘组的网格磁盘。我们可以通过移除不应使用的存储单元 IP 地址来轻松地将存储单元隔离以服务特定的数据库服务器。显然，这并非由任何安全机制强制执行，但它是一种将数据库服务器与它们应使用的存储单元配对起来的、简单有效的方法。表\
  \ `[14-5]` 展示了一个将满配机架划分为两个独立数据库和存储网格的配置。生产环境配置了六台数据库服务器和十一个存储单元，而测试环境配置了两台数据库服务器和三个存储单元。\n\
  \n表 14-5. 一种存储网络配置\n\n| 生产数据库服务器，1-6 | 生产存储单元，1-11 |\n| --- | --- |\n| `/etc/oracle/cell/network-config/cellip.ora`\
  \ |\n| `cell=\"192.168.10.17;192.168.10.18\"` | `dm01cel01  192.168.10.17;192.168.10.18`\
  \ |\n| `cell=\"192.168.10.19;192.168.10.20\"` | `dm01cel02  192.168.10.19;192.168.10.20`\
  \ |\n| `cell=\"192.168.10.21;192.168.10.22\"` | `dm01cel03  192.168.10.21;192.168.10.22`\
  \ |\n| `cell=\"192.168.10.23;192.168.10.24\"` | `dm01cel04  192.168.10.23;192.168.10.24`\
  \ |\n| `cell=\"192.168.10.25;192.168.10.26\"` | `dm01cel05  192.168.10.25;192.168.10.26`\
  \ |\n| `cell=\"192.168.10.27;192.168.10.28\"` | `dm01cel06  192.168.10.27;192.168.10.28`\
  \ |\n| `cell=\"192.168.10.29;192.168.10.30\"` | `dm01cel07  192.168.10.29;192.168.10.30`\
  \ |\n| `cell=\"192.168.10.31;192.168.10.32\"` | `dm01cel08  192.168.10.31;192.168.10.32`\
  \ |\n| `cell=\"192.168.10.33;192.168.10.34\"` | `dm01cel09  192.168.10.33;192.168.10.34`\
  \ |\n| `cell=\"192.168.10.35;192.168.10.36\"` | `dm01cel10  192.168.10.35;192.168.10.36`\
  \ |\n| `cell=\"192.168.10.37;192.168.10.38\"` | `dm01cel11  192.168.10.37;192.168.10.38`\
  \ |\n| 测试数据库服务器，7-8 | 测试存储单元，12-14 |\n| `/etc/oracle/cell/network-config/cellip.ora`\
  \ |\n| `cell=\"192.168.10.39;192.168.10.40\"` | `dm01cel12  192.168.10.39;192.168.10.40`\
  \ |\n| `cell=\"192.168.10.41;192.168.10.42\"` | `dm01cel13  192.168.10.41;192.168.10.42`\
  \ |\n| `cell=\"192.168.10.43;192.168.10.44\"` | `dm01cel14  192.168.10.43;192.168.10.44`\
  \ |\n\n数据库服务器和存储单元可以根据您的特定需求，以任何最佳组合进行配对。请记住，在 Exadata 上运行 Oracle RAC 的最低要求是两台数据库服务器和三个存储单元，这基本上是一个四分之一机架的配置。表\
  \ `[14-6]` 显示了 Exadata 存储单元在四分之一机架、半机架和满配机架配置下的存储和性能能力。\n\n表 14-6. Exadata 存储单元的性能能力（Exadata\
  \ X4-2）\n\n| 按设备类型划分的 MBPS 和 IOPS | 八分之一机架 | 四分之一机架 | 半机架 | 满配机架 |\n| --- | ---\
  \ | --- | --- | --- |\n| 磁盘传输带宽 |   |   |   |   |\n| 高性能 | 2.6 GB/s | 5.2 GB/s |\
  \ 12 GB/s | 24 GB/s |\n| 高容量 | 2.25 GB/s | 4.5 GB/s | 10 GB/s | 20 GB/s |\n| 闪存磁盘传输带宽\
  \ | 10.7 GB/s | 21.5 GB/s | 50 GB/s | 100 GB/s |\n| 磁盘 IOPS |   |   |   |   |\n\
  | 高性能 | 5,400 | 10,800 | 25,000 | 50,000 |\n| 高容量 | 3,500 | 7,000 | 16,000 | 32,000\
  \ |\n| 闪存磁盘 IOPS | 210,000 | 570,000 | 1,330,000 | 2,660,000 |\n\n如果您的某些环境不需要 Oracle\
  \ RAC，那么没有理由不能将它们配置为独立（非 RAC）数据库服务器。如果这样做，则每个数据库服务器可以最少使用一个存储单元来提供数据库存储。事实上，多个独立数据库服务器甚至可以共享单个存储单元。再次强调，Exadata\
  \ 是一个高度可配置的系统。但是，能够做某事并不意味着应该这样做。存储单元是 Exadata 的主力。每个单元支持有限的数据传输速率（MBPS）和每秒 I/O\
  \ 数（IOPS）。减少数据库环境所占用的存储单元会直接影响您的数据库所能产生的性能。最后，如果单个存储单元服务于多个数据库集群，则某些组件无法被分割（闪存缓存、闪存日志）。\n\
  \n注意\n\n随着时间的推移，Oracle 已经改变了 Exadata 可用的存储类型。在 X4-2 版本之前，高性能磁盘的转速为 15,000 RPM。X4\
  \ 存储单元（包括 2013 年 12 月之后购买的 X3-8 机架）包含了 10,000RPM 的高密度驱动器，而 X5 存储服务器则用 NVMe 闪存卡取代了高性能磁盘。高容量磁盘唯一的变化是容量大小，根据购买\
  \ Exadata 的时间不同，范围从 2TB 到 4TB 不等。\n\n## 单元安全性\n\n除了通过网络地址隔离存储单元外，Exadata 还提供了一种方法来保护对存储单元内特定网格磁盘的访问。访问控制列表（ACL）在存储单元处维护，网格磁盘被定义为可供特定的\
  \ ASM 集群以及（可选的）该 ASM 集群内的数据库访问。如果您已经在 Exadata 系统上工作了一段时间，很可能没有注意到任何此类访问限制。这是因为，在默认情况下，单元安全性是开放的，允许系统中的所有\
  \ ASM 集群和数据库访问所有网格磁盘。单元安全性控制对网格磁盘的访问有两个级别——按 ASM 集群和按数据库：\n\n*   ASM 范围安全性：ASM 范围安全性按\
  \ ASM 集群限制对网格磁盘的访问。这是单元安全性的第一层。它允许 ASM 集群中的所有数据库访问 ASM 实例管理的所有网格磁盘。例如，可以将 Exadata\
  \ 满配配置进行划分，使得四台数据库服务器和七个存储单元可供客户 A 使用，而另外四台数据库服务器和七个存储单元可供客户 B 使用。\n*   数据库范围安全性：一旦配置了\
  \ ASM 范围安全性，可以使用数据库范围安全性在数据库级别进一步控制对网格磁盘的访问。当 ASM 集群内的数据库应该只能访问 ASM 实例管理的网格磁盘子集时，数据库范围安全性最合适。在前面的例子中，客户\
  \ A 的环境可以使用数据库范围安全性，在其半机架配置内将各个数据库环境彼此隔离。\n\n\n\n#### 单元安全术语\n\n在深入探讨之前，我们先来了解一些\
  \ Exadata 单元安全特有的新术语：\n\n*   存储域：共享一个共同安全域的网格磁盘被称为一个**存储域**。\n*   安全密钥：安全密钥用于验证\
  \ ASM 和数据库客户端对存储域的访问权限。它也用于保护存储单元与 ASM 和数据库客户端之间发送的消息。安全密钥使用 CellCLI 命令 `create\
  \ key` 创建，然后通过 CellCLI 的 `assign key` 命令分配给网格磁盘。\n*   `cellkey.ora`：`cellkey.ora`\
  \ 文件存储在数据库服务器上。会为 ASM 作用域安全性创建一个 `cellkey.ora` 文件，而为每个需要数据库作用域安全性的数据库也会创建一个 `cellkey.ora`\
  \ 文件。这些 `cellkey.ora` 文件用于识别安全密钥、存储域以及 ASM 集群或数据库的唯一名称。\n\n表 14-7 显示了 `cellkey.ora`\
  \ 文件中各字段的定义。\n\n表 14-7. cellkey.ora 文件的内容\n\n| 字段 | 描述 |\n| --- | --- |\n| `key`\
  \ | 这是在存储单元上使用 `create key` 命令生成的安全密钥。此密钥用于验证 ASM 集群和数据库对存储域的访问权限。对于 ASM 作用域安全性，此值必须与使用\
  \ `assign key` 命令分配给 ASM 集群的密钥匹配。对于数据库作用域安全性，此值必须与使用 `assign key` 命令分配给数据库的安全密钥匹配。\
  \ |\n| `asm` | 这是在 ASM 实例的 `DB_UNIQUE_NAME` 参数中找到的 ASM 集群的唯一名称。它用于将 ASM 集群与存储域中网格磁盘的\
  \ `availableTo` 属性关联起来。网格磁盘使用 CellCLI 的 `create griddisk` 和 `alter grid disk` 命令分配此值。\
  \ |\n| `realm` | 此字段是可选的。如果使用，其值必须与使用 CellCLI 命令 `alter cell realmName` 分配给存储单元的\
  \ `realmName` 属性匹配。 |\n\n#### 单元安全最佳实践\n\n遵循 Oracle 的最佳实践是配置单元安全的重要一环。它可以帮助你避免那些奇怪的情况，比如某些功能有时能用、有时不能用，或者只在某些存储单元上能用。遵循这些最佳实践将为你节省大量时间和精力：\n\
  \n*   如果使用了数据库作用域安全，请确保对 ASM 集群中的所有数据库都使用它。\n*   确保对于一个 ASM 集群，其所有服务器上的 ASM `cellkey.ora`\
  \ 文件内容、所有权和权限都相同。\n*   就像对待 ASM `cellkey.ora` 文件一样，确保数据库 `cellkey.ora` 文件在所有服务器上的内容、所有权和权限完全一致。\n\
  *   确保属于同一个 ASM 磁盘组的所有网格磁盘在单元端的安全设置相同。\n*   非常重要的一点是，`cellkey.ora` 文件和单元命令必须在所有服务器和单元上一致地执行。使用\
  \ `dcli` 实用程序来分发 `cellkey.ora` 文件，可以减少人为错误的可能性。\n\n## 配置 ASM 作用域安全性\n\n使用 ASM 作用域安全性时，ASM\
  \ 集群通过其 `DB_UNIQUE_NAME` 和一个安全密钥向存储单元进行身份验证。安全密钥在存储单元上创建，并存储在数据库服务器上的 `cellkey.ora`\
  \ 文件中。存储单元上定义了一个访问控制列表，用于验证从 ASM 接收到的安全密钥。每个网格磁盘上的 `availableTo` 属性决定了允许哪些 ASM 集群访问。\n\
  \n现在，让我们看看配置 ASM 作用域安全性的步骤：\n\n1.  使用其中一个 ASM 实例的 `show parameter` 命令，找到你的 ASM 集群的\
  \ `DB_UNIQUE_NAME`：\n    ```\n    SYS:+ASM1>show parameter db_unique_name\n    NAME\
  \              TYPE        VALUE\n    ---------------- ----------- -----\n    db_unique_name\
  \    string      +ASM\n    ```\n2.  关闭 ASM 集群中的所有数据库和 ASM 实例。\n3.  使用 CellCLI 的\
  \ `create key` 命令创建安全密钥：\n    ```\n    CellCLI> create key\n            3648e2a3070169095b799c44f02fea9\n\
  \    ```\n    这只是生成了密钥，不会自动存储在任何地方。`create key` 命令只需运行一次，并且可以在任何存储单元上完成。此安全密钥将通过\
  \ `cellkey.ora` 文件中的 `key` 字段分配给 ASM 集群。\n4.  接下来，为配置了此 ASM 集群的每个数据库服务器创建一个 `cellkey.ora`\
  \ 文件，并将其安装在 `/etc/oracle/cell/network-config` 目录中。将文件的所有权设置为 ASM 软件安装期间指定的用户和组。权限应允许文件所有者读取它。例如：\n\
  \    ```\n    key=3648e2a3070169095b799c44f02fea9\n    asm=+ASM\n    realm=customer_A_realm\n\
  \    ```\n    ```\n    > chown oracle:dba cellkey.ora\n    > chmod 600 cellkey.ora\n\
  \    ```\n    请注意，如果在此文件中定义了 realm，它必须与使用 `alter cell realm=` 命令分配给存储单元的 realm 名称匹配。使用存储域是可选的。\n\
  5.  使用 CellCLI 的 `assign key` 命令将安全密钥分配给正在配置的 ASM 集群。这必须在你希望该 ASM 集群能够访问的每个存储单元上执行：\n\
  \    ```\n    CellCLI> ASSIGN KEY -\n                FOR '+ASM'='3648e2a3070169095b799c44f02fea9'\n\
  \    ```\n6.  使用 CellCLI 的 `create griddisk` 命令，为每个你希望此 ASM 集群访问的网格磁盘设置 `availableTo`\
  \ 属性。可以对单元上的所有网格磁盘执行此操作，如下所示：\n    ```\n    CellCLI> create griddisk all prefix='DATA'\
  \ -\n                 size= 1282.8125G availableTo='+ASM'\n    ```\n    对于现有的网格磁盘，使用\
  \ `alter grid disk` 命令设置安全性：\n    ```\n    CellCLI> alter griddisk all prefix='DATA'\
  \ -\n                   availableTo='+ASM'\n    ```\n    也可以分配一部分网格磁盘，如下所示：\n  \
  \  ```\n    CellCLI> alter griddisk DATA_CD_00_cell03, -\n                     \
  \       DATA_CD_01_cell03, -\n                            DATA_CD_02_cell03, -\n\
  \                            ...\n                   availableTo='+ASM'\n    ```\n\
  \n至此，ASM 作用域的单元安全配置完成。现在可以重启 ASM 集群和所有数据库了。当 ASM 启动时，它会检查 `cellkey.ora` 文件，并将密钥传递给存储单元以获取对网格磁盘的访问权限。请记住，当你使用\
  \ ASM 作用域安全时，每个集群需要一个不同的名称用于识别目的。\n\n## 配置数据库作用域安全性\n\n数据库作用域安全性将数据库访问锁定到 ASM 集群内的特定网格磁盘。当多个数据库共享同一个\
  \ ASM 集群时，这对于控制对网格磁盘的访问非常有用。在实施数据库作用域安全性之前，必须配置并验证 ASM 作用域安全性。\n\n使用数据库作用域安全性时，每个数据库在每个数据库服务器上将有一个\
  \ `cellkey.ora` 文件，并且在存储单元上为每个数据库有一个 ACL 条目。以下步骤可用于为两个数据库（称为 HR（人力资源）和 PAY（薪资））实施简单的数据库作用域安全性。在此示例中，每个数据库都有自己的磁盘组（人力资源数据库使用\
  \ `DATA_HR` 和 `RECO_HR`，薪资数据库使用 `DATA_PAY` 和 `RECO_PAY`）。\n\n\n"
- "# 数据库范围安全配置\n\n使用各数据库的 `show parameter` 命令，获取每个正在配置的数据库的 `DB_UNIQUE_NAME`：\n\n\
  ```\nSYS:+HR>show parameter db_unique_name\nNAME             TYPE        VALUE\n\
  ---------------- ----------- -----\ndb_unique_name   string      HR\n\nSYS:+PAY>show\
  \ parameter db_unique_name\nNAME             TYPE        VALUE\n----------------\
  \ ----------- -----\ndb_unique_name   string      PAY\n```\n\n关闭 ASM 集群中的所有数据库和\
  \ ASM 实例。\n\n使用 CellCLI `create key` 命令创建安全密钥：\n\n```\nCellCLI> create key\n   \
  \     7548a7d1abffadfef95a53185aba0e98\nCellCLI> create key\n        8e7105bdbd6ad9fa53d41736a533b9b1\n\
  ```\n\n`create key` 命令必须为 ASM 集群中的每个数据库运行一次。可以从任何存储单元运行该命令。在数据库 `cellkey.ora` 文件的\
  \ `key` 字段中，将为 ASM 集群内的每个数据库分配一个安全密钥。\n\n对于每个数据库，使用步骤 2 中创建的密钥创建一个 `cellkey.ora`\
  \ 文件。将这些 `cellkey.ora` 文件安装到要配置数据库范围安全的每个数据库服务器的 `ORACLE_HOME/admin/{db_unique_name}/pfile`\
  \ 目录中。\n\n就像为 ASM 范围安全所做的那样，将文件的所有者设置为在 ASM 软件安装期间指定的用户和组。权限应允许文件所有者读取该文件。例如：\n\n\
  ```\n# -- Cellkey.ora file for the HR database --#\nkey=7548a7d1abffadfef95a53185aba0e98\n\
  asm=+ASM\nrealm=customer_A_realm\n# --\n> chown oracle:dba $ORACLE_HOME/admin/HR/cellkey.ora\n\
  > chmod 600 $ORACLE_HOME/admin/HR/cellkey.ora\n\n# -- Cellkey.ora file for the PAY\
  \ database --#\nkey=8e7105bdbd6ad9fa53d41736a533b9b1\nasm=+ASM\nrealm=customer_A_realm\n\
  # --\n> chown oracle:dba $ORACLE_HOME/admin/PAY/cellkey.ora\n> chmod 600 $ORACLE_HOME/admin/PAY/cellkey.ora\n\
  ```\n\n请注意，如果在此文件中定义了 realm，它必须与使用 `alter cell realm=` 命令分配给存储单元的 realm 名称匹配。\n\n\
  使用 CellCLI `assign key` 命令为每个正在配置的数据库分配安全密钥。必须在要让 HR 和 PAY 数据库有权访问的每个存储单元上执行此操作。以下密钥被分配给\
  \ HR 和 PAY 数据库的 `DB_UNIQUE_NAME`：\n\n```\nCellCLI> ASSIGN KEY -\n   FOR HR=’7548a7d1abffadfef95a53185aba0e98’,\
  \ –\n      PAY=’8e7105bdbd6ad9fa53d41736a533b9b1’\nKey for HR successfully created\n\
  Key for PAY successfully created\n```\n\n验证密钥是否已正确分配：\n\n```\nCellCLI> list key\n\
  \         HR      d346792d6adea671d8f33b54c30f1de6\n         PAY     cae17e8fdce7511cc02eb7375f5443a8\n\
  ```\n\n使用 CellCLI `create disk` 或 `alter griddisk` 命令，为每个数据库分配对网格磁盘的访问权限。请注意，ASM\
  \ 唯一名称与数据库唯一名称一起包含在此分配中。\n\n```\nCellCLI> create griddisk DATA_HR_CD_00_cell03,\
  \ -\n                         DATA_HR_CD_01_cell03  -\n                size=1282.8125G\
  \             -\n                availableTo=’+ASM,HR’\nCellCLI> create griddisk\
  \ DATA_PAY_CD_00_cell03, -\n                         DATA_PAY_CD_01_cell03  -\n\
  \                size=1282.8125G             -\n                availableTo=’+ASM,PAY’\n\
  ```\n\n`alter griddisk` 命令可用于更改网格磁盘的安全分配。例如：\n\n```\nCellCLI> alter griddisk DATA_HR_CD_00_cell03,\
  \ -\n                        DATA_HR_CD_01_cell03  -\n               availableTo=’+ASM,HR’\n\
  CellCLI> alter griddisk DATA_PAY_CD_00_cell03, -\n                        DATA_PAY_CD_01_cell03\
  \  -\n               availableTo=’+ASM,PAY’\n```\n\n至此，已完成对 HR 和 PAY 数据库的数据库范围安全配置。现在可以重新启动\
  \ ASM 集群和数据库。人力资源数据库现在可以访问 `DATA_HR` 网格磁盘，而工资单数据库可以访问 `DATA_PAY` 网格磁盘。\n\n### 移除单元安全\n\
  \n实施后，可以通过更新存储单元上的 ACL 列表并更改网格磁盘的 `availableTo` 属性，根据需要修改单元安全。移除单元安全是一个相当直接的过程，包括撤销数据库安全设置，然后移除\
  \ ASM 安全设置。\n\n移除单元安全的第一步是移除数据库范围安全。以下步骤将从系统中移除数据库范围安全：\n\n在移除数据库安全之前，必须关闭数据库和 ASM\
  \ 集群。\n\n使用 CellCLI 命令 `alter griddisk` 从网格磁盘的 `availableTo` 属性中移除数据库。此命令不会从列表中选择性地移除数据库。它只是重新定义了完整的列表。请注意，此时我们只是从列表中移除数据库。ASM\
  \ 唯一名称应暂时保留在列表中。这必须在要移除安全性的每个单元上执行。\n\n```\nCellCLI> alter griddisk DATA_HR_CD_00_cell03,\
  \ -\n                        DATA_HR_CD_01_cell03  -\n               availableTo=’+ASM’\n\
  CellCLI> alter griddisk DATA_PAY_CD_00_cell03, -\n                        DATA_PAY_CD_01_cell03\
  \  -\n               availableTo=’+ASM’\n```\n\n或者，可以使用以下命令从受保护的网格磁盘中移除所有数据库：\n\n\
  ```\nCellCLI> alter griddisk all availableTo=’+ASM’\n```\n\n假设这些数据库尚未在此单元中的任何其他网格磁盘上配置单元安全，则可以从存储单元上的\
  \ ACL 列表中移除安全密钥，如下所示：\n\n```\nCellCLI> assign key for HR=’’, PAY=’’\nKey for HR\
  \ successfully dropped\nKey for PAY successfully dropped\n```\n\n移除位于数据库客户端 `ORACLE_HOME/admin/{db_unique_name}/pfile`\
  \ 目录中的 `cellkey.ora` 文件。\n\n使用以下 CellCLI 命令验证 HR 和 PAY 数据库是否未分配给任何网格磁盘：\n\n```\n\
  CellCLI> list griddisk attributes name, availableTo\n```\n\n一旦移除了数据库范围的安全，就可以移除\
  \ ASM 范围的安全。这将使系统恢复为默认的开放安全状态。以下步骤移除 ASM 范围的安全。完成后，网格磁盘将对存储网络上的所有 ASM 集群和数据库可用。\n\
  \n在继续此过程之前，请确保数据库范围的安全已完全移除。`list key` 命令应仅显示 ASM 集群的密钥分配。此时不应有任何数据库被分配密钥。`list\
  \ griddisk` 命令应显示所有网格磁盘的分配名称，分配对象为 ASM 集群 `’+ASM’`。\n\n```\nCellCLI> list griddisk\
  \ attributes name, availableTo\n```\n\n接下来，从所有网格磁盘的 `availableTo` 属性中移除 ASM 唯一名称。\n\
  \n```\nCellCLI> list griddisk attributes name, availableTo\n```\n\n现在，通过运行以下命令从\
  \ ACL 中移除 ASM 安全：\n\n```\nCellCLI> alter griddisk all assignTo=’’\n```\n\n以下命令为选定的网格磁盘移除\
  \ ASM 集群分配：\n\n```\nCellCLI> alter griddisk DATA_CD_00_cell03, -\n             \
  \           DATA_CD_01_cell03  -\n                        DATA_CD_02_cell03  -\n\
  \                        DATA_CD_03_cell03  -\n               availableTo=’’\n```\n\
  \n`list griddisk` 命令应显示没有分配的客户端。运行 `list griddisk` 命令进行验证。\n\n现在可以使用 CellCLI `assign\
  \ key` 命令从存储单元安全地移除 ASM 集群密钥：\n\n```\nCellCLI> list key detail\n         name: \
  \    +ASM\n         key:      196d7983a9a33fccae276e24e7a9f89\nCellCLI> assign key\
  \ for +ASM=’’\nKey for +ASM successfully dropped\n```\n\n从 ASM 集群中所有数据库服务器的 `/etc/oracle/cell/network-config`\
  \ 目录中移除 `cellkey.ora` 文件。\n\n至此，ASM 范围安全的移除完成。现在可以重新启动 ASM 集群以及它服务的所有数据库。\n\n\n"
- '# 15. 计算节点布局


  ## 摘要


  理解 Exadata 存储架构的各个层级及其如何协同工作，是正确为数据库规划存储布局的关键。在大多数情况下，使用 Oracle 的默认布局就足够了，但如果你需要为了最大性能和安全性而划分磁盘存储，那么理解物理磁盘、LUN、单元盘、网格盘和
  ASM 磁盘组之间的关系是绝对必要的。在本章中，我们讨论了网格盘是什么、它们由什么组成，以及它们如何融入 ASM 存储网格。我们研究了如何创建磁盘组，以便为性能关键的数据文件优先分配
  I/O。划分存储不仅限于磁盘层面，因此我们还讨论了按单元和按单元内的网格盘划分存储的方法。


  ## 15.1 节点布局


  术语“节点”是一个相当通用的词，在 IT 行业中有许多不同的含义。例如，网络工程师将连接到其网络的任何可寻址设备称为节点。Unix 管理员通常将该术语与主机或服务器互换使用。Oracle
  DBA 经常将作为 RAC 集群成员的数据库服务器称为节点。Oracle 的文档在指代平台的数据库服务器层时使用术语“计算节点”。在本章中，我们将讨论配置 Exadata
  计算节点的各种方式，无论它们是 RAC 集群的成员（节点）还是非集群（数据库服务器）。


  一个常见的误解是 Exadata 机架必须配置为单个 Oracle RAC 集群。这完全不是事实。在其最简单的形式中，Exadata 数据库层可以描述为一组独立的数据库服务器，它们硬连接到相同的存储和相同的管理网络。这些服务器中的每一台都可以配置为运行独立的数据库，彼此完全独立。然而，出于两个原因——可扩展性和高可用性，这种做法并不常见。Oracle
  RAC 历史上用于在节点或实例发生故障时提供节点冗余，但 Oracle 的营销一直表明，横向扩展能力同样是重要的目标。传统上，如果我们需要提高数据库性能和容量，我们会通过升级服务器硬件来实现。这种方法变得如此普遍，以至于行业创造了“硬件刷新”一词来描述它。该术语可以指从添加
  CPU、内存或 I/O 带宽到完全更换服务器本身的任何事情。以这种方式提高性能和容量被称为纵向扩展。随着 Exadata 能够为数据库服务器提供极高的 I/O
  性能，总线速度现在已成为纵向扩展的限制因素。那么，当你达到单服务器容量的极限时会发生什么？显而易见的答案是添加更多服务器。要继续扩展你的应用程序，你必须使用 Oracle
  RAC 进行横向扩展。尽管如此，理解数据库服务器并非以某种专有方式捆绑在一起，这阐明了 Exadata 高度可配置的特性。


  在第 14 章中，我们讨论了配置 Exadata 存储子系统以服务特定数据库服务器的各种策略。在本章中，我们将研究数据库层可以如何配置，以创建非常适合满足你业务需求的集群和非集群数据库环境。


  ## 15.2 配置考量


  Exadata 是一个高度可配置的平台。确定最适合你业务的配置需要审查应用程序的性能和正常运行时间需求，并确保为开发、测试和生产系统提供充分的隔离。以下是确定最合适的计算节点布局以支持数据库环境的一些关键考量：


  *   **CPU 资源**：在确定数据库的最佳节点布局时，请记住 Exadata 处理 I/O 工作负载的方式与传统数据库平台非常不同。在非 Exadata
  平台上，数据库服务器负责从存储中检索所有数据块以满足应用程序的 I/O 请求。Exadata 将大量此类工作分载到存储单元上。这可以显著降低数据库服务器的 CPU
  需求。计算你的数据库将需要多少更少的 CPU 是一项艰巨的任务，因为它部分取决于你的数据库利用并行查询和 HCC 压缩的程度，以及你的应用程序 SQL 是否适合分载。一些智能扫描优化，如解密、谓词过滤和
  HCC 解压缩，无论应用程序类型如何，都将降低 CPU 需求。（我们在第 2 章到第 6 章中详细介绍了这些主题。）

  *   需要数千个专用服务器连接的系统可能会压倒单台机器的资源。将这些连接分散到多个计算节点上可以减少系统进程调度器的负担，并允许 CPU 更有效地花费时间来服务客户端请求。跨多个计算节点负载均衡连接也提高了数据库处理并发连接请求的能力。

  *   **内存资源**：需要数千个专用服务器连接的系统也会给内存资源带来负担。每个专用服务器连接都需要一部分内存，无论该连接是否正在被使用。将这些连接分散到多个
  RAC 节点允许数据库处理比单个计算节点所能管理的更多的并发连接。

  *   **I/O 性能与容量**：每个计算节点和存储单元都配备了一个 40Gbps QDR、双端口 InfiniBand 卡，实际上，每个计算节点最大可以传输/接收每秒
  3.2 吉字节（对于 X4-2 和 X5-2 计算节点，每秒 6.4 吉字节）。如果这个带宽足够，那么转向多节点 RAC 配置的决策可能更多是高可用性的考量。如果你有需要超过单个计算节点所能提供的吞吐量的
  I/O 密集型应用程序，RAC 可用于提供高可用性以及额外的 I/O 容量。

  *   **打补丁与测试**：设计稳定数据库环境的另一个关键考量是提供一个独立的区域，用于在将补丁和新功能推出到生产环境之前进行测试。对于非 Exadata 平台，打补丁和升级通常涉及操作系统补丁和
  Oracle RDBMS 补丁。Exadata 是一个高度复杂的数据库平台，由几个必须定期打补丁的额外硬件和软件层组成，例如单元服务器、ILOM 固件、InfiniBand
  交换机固件、InfiniBand 网卡固件和 OFED 驱动程序。因此，建立一个与关键系统隔离的测试环境用于测试补丁是绝对至关重要的。




  ## 非 RAC 配置


  计算节点可以通过多种方式进行配置。如果您的应用程序不需要 Oracle RAC 的高可用性或横向扩展功能，那么 Exadata 为独立数据库服务器提供了卓越的高性能平台。您可以通过配置
  IORM（有关 IORM 的更多信息，请参见第 7 章）来管理独立数据库（无论是单实例还是 Oracle RAC）之间的 I/O 服务级别。在非 RAC 配置中，Oracle
  Grid Infrastructure 仍然为集群配置，但 Oracle 数据库主目录仅为单实例数据库链接。由于 Exadata 存储服务器为所有计算节点提供共享存储，因此可以使用一组集群化的
  ASM 磁盘组为所有计算节点提供存储。这种配置为数据库管理员提供了集群的灵活性，同时仍满足单实例数据库的许可要求。


  使用集群运行单实例数据库可能看起来有违直觉，但使用此配置的用户可以获得共享存储运行的诸多好处，同时极大避免了资源过度分割的弊端。即使您的数据库服务器运行独立数据库，它们仍然可以共享
  Exadata 存储（单元磁盘）。这使得每个数据库都能利用 Exadata 存储子系统的全部 I/O 带宽。数据库的放置取决于计算节点所承受的压力，而不是该计算节点所属的
  ASM 磁盘组。由于 ASM 磁盘组是共享的，数据库可以在集群内以最小的工作量进行迁移。此外，从此配置迁移到成熟的 RAC 配置非常简单——只需重新链接数据库主目录并将数据库转换为支持
  RAC 即可。


  例如，假设您的服务器上有三个名为 `SALES`、`HR` 和 `PAYROLL` 的数据库。所有三个数据库都可以共享相同的磁盘组进行存储。为此，所有三个数据库的实例参数应如下所示：


  ```

  db_create_file_dest=''+DATA''

  db_recovery_file_dest=''+RECO''

  local_listener=''<connect string of local host listener>''

  remote_listener=''<SCAN_HOSTNAME:1521>''

  ```


  在图 15-1 中，我们看到 Exadata 全机架配置中的所有八个计算节点都在运行独立数据库。您会注意到，存储分配与集群配置完全相同。所有节点都使用 `+DATA`
  和 `+RECO` 磁盘组，这些磁盘组由集群化的 ASM 实例提供服务。每个 ASM 实例共享同一组 ASM 磁盘组，这些磁盘组由所有存储单元中的网格磁盘组成。由于
  ASM 磁盘组在所有计算节点之间是共享的，单个节点的故障并不意味着它服务的数据库必须停机。如果在幸存的计算节点上有足够的资源，可以轻松地将单实例数据库迁移到那些节点以恢复服务。通过
  SCAN 接口连接的客户端无需重新配置即可连接。


  ![A978-1-4302-6242-8_15_Fig1_HTML.gif](img/A978-1-4302-6242-8_15_Fig1_HTML.gif)

  *图 15-1. 非 RAC Exadata 配置示例*


  如果为每个计算节点创建单独的磁盘组，管理员将不得不根据计算节点资源和该集群可用的磁盘空间来选择数据库放置位置。由于在 Exadata 上重新配置存储不是一个快速的过程，在节点之间拆分磁盘组迫使需要更多的前期规划。此外，单个存储服务器将被迫跨多个集群管理闪存缓存和资源管理计划，导致管理资源需要额外的开销。最后，在使用独立磁盘组的配置中，创建的网格磁盘数量使集群管理起来要困难得多——一个使用独立的
  `+DATA` 和 `+RECO` ASM 磁盘组的全机架将需要 2688 个网格磁盘。上述配置除了标准的 476 个网格外，不会创建额外的网格磁盘。


  ### 拆分机架集群


  既然我们已经讨论了如何在非 RAC 配置中运行 Exadata，现在让我们看看如何将单个机架划分为多个集群。但在这样做之前，我们将简要绕道说明一下什么是高可用性和可扩展性。


  高可用性（HA）是一个相当容易理解的概念，但它经常与容错性混淆。在一个真正的容错系统中，每个组件都是冗余的。如果一个组件发生故障，另一个组件会接管，服务不会有任何中断。高可用性也涉及组件冗余，但故障可能会导致服务短暂中断，同时系统重新配置以使用冗余组件。中断期间进行中的工作必须在冗余组件上重新提交或继续。在
  HA 系统中，检测故障、重新配置和恢复工作所需的时间差异很大。例如，主动/被动 Unix 集群已被广泛用于在服务器崩溃时提供优雅的故障转移。现在，当您看到“优雅故障转移”和“崩溃”这两个词用在同一个句子里时，您可能会暗自好笑（除非您在航空业工作），所以我来解释一下。在主动/被动集群的语境中，优雅故障转移意味着当系统故障发生或关键组件失效时，构成应用程序、数据库和基础设施的资源会在主系统上自动关闭，并在冗余系统上以尽可能短的停机时间重新启动。另一种不那么优雅的故障转移类型则涉及在凌晨
  3:30 给您的支持人员打电话。在主动/被动集群中，数据库以及可能的其他应用程序一次只在一个节点上运行。使用此配置的故障转移可能需要几分钟才能完成，具体取决于必须迁移的资源和应用程序。Oracle
  RAC 使用主动/主动集群架构。RAC 系统上的故障转移通常在一分钟内完成。真正的容错通常非常难以实现，并且比高可用性昂贵得多。系统类型和故障的影响（或成本）通常决定哪种方案更合适。飞机、空间站或生命支持系统上的关键系统很容易证明容错架构的合理性。相比之下，为公司零售店面提供服务的网络应用程序通常无法证明完全容错架构的成本和复杂性。Exadata
  是一种高可用性架构，提供完全冗余的硬件组件。当使用 Oracle RAC 时，这种冗余和快速故障扩展到了数据库层。



  '
- '# 可扩展性与性能


  当单个服务器的 CPU、内存或 I/O 资源达到极限时，就必须增加服务器以提升容量。术语“可扩展性”常被与“性能”混用，意味着增加容量等同于提升性能。然而，容量与性能之间的关联并非直接。


  例如，一个单线程的 CPU 密集型程序在双 CPU 服务器上需要 15 分钟完成。假设服务器 CPU 未饱和，再增加两个 CPU 并不会使该进程运行得更快。如果它一次只能在一个
  CPU 上运行，那么其执行速度就受限于单个 CPU 的处理能力。只有当增加更多 CPU 能让进程在处理器上获得更长的无中断运行时间时，性能才会提升。同样，即使在四节点集群上运行它，其速度也不会加快。


  然而，**横向扩展**到四个服务器意味着我们可以同时运行该程序的四个副本，从而在相同的 15 分钟内完成大约四倍的工作量。总结来说，横向扩展为你的系统增加了容量。它是否提升性能，取决于你的应用程序的可扩展性以及当前系统的负载程度。


  请记住，对于编写良好的应用程序，Oracle RAC 的扩展性极佳。反之，编写不佳的应用程序往往扩展性很差。


  '
- '# 多 RAC 集群配置


  Exadata 可以配置为多个 RAC 集群，以提供环境间的隔离。这使得集群能够被独立地管理、打补丁和维护。


  在数据库层，这与使用 Oracle Clusterware 对普通服务器集进行集群化的方式相同。为了将存储单元配置到特定的计算节点，每个计算节点上的`cellip.ora`文件列出了它将使用的存储单元。例如，以下的`cellip.ora`文件列出了十四个存储单元中的七个（请记住，从
  X4-2 开始，计算节点支持主动/主动 InfiniBand 连接）：


  ```bash

  [db01:oracle:EXDB1] /home/oracle

  > cat /etc/oracle/cell/network-config/cellip.ora

  cell="192.168.10.17;192.168.10.18"

  cell="192.168.10.19;192.168.10.20"

  cell="192.168.10.21;192.168.10.22"

  cell="192.168.10.23;192.168.10.24"

  cell="192.168.10.25;192.168.10.26"

  cell="192.168.10.27;192.168.10.28"

  cell="192.168.10.29;192.168.10.30"

  ```


  当 ASM 启动时，它会搜索这些 IP 地址上的存储单元，查找可用于配置 ASM 磁盘组的网格磁盘。或者，可以使用单元安全来锁定访问，使得只有特定的存储单元可供计算节点使用。`cellip.ora`文件和单元安全将在第
  14 章中详细讨论。


  为了说明多 RAC Exadata 配置可能的样子，让我们考虑一个分区为三个 Oracle RAC 集群的 Exadata X5-2 满配配置。一个满配提供了八个计算节点和十四个存储单元供我们使用。考虑一个配置如下的
  Exadata 满配：


  *   一个生产 RAC 集群，包含四个计算节点和七个存储单元

  *   一个测试 RAC 集群，包含两个计算节点和三个存储单元

  *   一个开发 RAC 集群，包含两个计算节点和四个存储单元


  表 15-1 显示了这些 RAC 集群的资源分配，每个集群都有自己的存储网格。在阅读此表时，请记住硬件是不断发展的。这些数据来自 Exadata X5-2。在此示例中，我们使用了高容量的
  4TB 磁盘驱动器。


  表 15-1. 集群资源


  | 集群 | 数据库服务器 | 数据库内存 | 数据库 CPU | 存储单元 | 单元磁盘 | 原始存储 |

  | --- | --- | --- | --- | --- | --- | --- |

  | `PROD_CLUSTER` | Prod1-Prod4 | 256G × 4 | 36 × 4 | 1–7 | 84 | 336T |

  | `TEST_CLUSTER` | Test1, Test2 | 256G × 2 | 36× 2 | 8–10 | 36 | 144T |

  | `DEV_CLUSTER` | Dev1, Dev2 | 256G × 2 | 36 × 2 | 11–14 | 48 | 192T |


  这些 RAC 环境可以彼此完全独立地打补丁和升级。它们共享的唯一硬件资源是 InfiniBand fabric。如果你正在考虑像这样的多 RAC 配置，请记住对
  InfiniBand 交换机打补丁将影响所有存储单元和计算节点。


  图 15-2 展示了此集群配置的样子。


  ![A978-1-4302-6242-8_15_Fig2_HTML.gif](img/A978-1-4302-6242-8_15_Fig2_HTML.gif)


  图 15-2. 配置为三个 RAC 集群的 Exadata 满配


