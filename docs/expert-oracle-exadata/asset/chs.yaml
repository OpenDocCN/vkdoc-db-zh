  WAIT #1...0: nam=’SQL*Net message to client’ ela= 1 driver id=1650815232 #bytes=1\
  \ p3=0\n  obj#=18532 tim=1404832965817131\nWAIT #1...0: nam=’reliable message’ ela=\
  \ 1230 channel context=10035861184 channel\n  handle=10055026416 broadcast message=10199413976\
  \ obj#=18532 tim=1404832965818567\nWAIT #1...0: nam=’enq: KO - fast object checkpoint’\
  \ ela= 189 name|mode=1263468550 2=65571 0=1\n  obj#=18532 tim=1404832965818827\n\
  WAIT #1...0: nam=’enq: KO - fast object checkpoint’ ela= 107 name|mode=1263468545\
  \ 2=65571 0=2\n  obj#=18532 tim=1404832965819004\nWAIT #1...0: nam=’cell smart table\
  \ scan’ ela= 199 cellhash#=2133459483 p2=0 p3=0 obj#=18532\n  tim=1404832965820790\n\
  WAIT #1...0: nam=’cell smart table scan’ ela= 182 cellhash#=3176594409 p2=0 p3=0\
  \ obj#=18532\n  tim=1404832965821746\nWAIT #1...0: nam=’cell smart table scan’ ela=\
