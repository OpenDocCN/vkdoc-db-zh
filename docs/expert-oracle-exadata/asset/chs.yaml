  \ 代表 100%，因此将其设置为 50 会将计算出的 DOP 减少一半。 |\n| `parallel_force_local` | `FALSE` | 决定并行查询从属进程是强制在启动查询的节点上执行\
  \ (TRUE)，还是允许扩散到 RAC 集群中的多个节点 (FALSE)。 |\n| `parallel_instance_group` |   | 用于将\
  \ RAC 集群中的并行从属进程限制到特定实例。这是通过指定一个服务名称来实现的，该服务被配置为仅限于有限数量的实例。 |\n| `parallel_io_cap_enabled`\
  \ | `FALSE` | 此参数已弃用，当设置为 `IO` 时，由 `parallel_degree_limit` 替代。它与 `DBMS_RESOURCE_MANAGER.CALIBRATE_IO`\
  \ 函数结合使用，以根据系统的 I/O 能力限制默认的 DOP 计算。 |\n| `parallel_degree_limit` | `CPU` | 在自动并行度模式下，指定要使用的并行度上限。当设置为\
  \ `CPU` 时，上限为 `parallel_threads_per_cpu * cpu_count * instances`。当设置为 `IO` 时，上限取决于每个进程的\
  \ I/O 带宽 / 总系统吞吐量。当设置为一个数字时，它会将语句的最大并行度限制为该数字。 |\n| `pga_aggregate_limit` |   |\
  \ 12c 新增参数。此参数限制实例的 PGA 内存使用量。参见第 7 章（资源管理）。 |\n| `parallel_adaptive_multi_user`\
