  \ optimized`)\n\n此统计信息显示避免了多少次磁盘 I/O 请求，这些请求通过从闪存缓存（Flash Cache）而非磁盘读取数据，和/或得益于存储索引（storage\
  \ index）消除 I/O 而被避免。此统计信息也会传播到 `V$SQL/V$SQLSTATS` 和 `V$SEGMENT_STATISTICS` 视图中。\n\
  \n#### 优化的物理读取总字节数 (`physical read total bytes optimized`)\n\n此统计信息显示避免了多少字节的物理磁盘驱动器\
  \ I/O，这些 I/O 通过从闪存缓存读取和/或得益于存储索引消除 I/O 而被避免。当您同时看到 `cell physical I/O bytes saved\
  \ by storage index` 统计信息也等量增加时，这意味着部分 I/O 完全得益于存储索引而得以避免。如果存储索引节省的字节数小于优化的总字节数，则其余的\
  \ I/O 是通过从闪存缓存读取而优化的，而非老旧的机械硬盘。在这种情况下，您还可以期望看到 `Flash Cache read hits`。\n\n####\
  \ 表获取续行 (`table fetch continued row`)\n\n此统计信息并非 Exadata 特有，但在排查使用智能扫描时数据库意外执行的单块读取问题时，它很有相关性。此统计信息计算当\
  \ Oracle 在 `buffer cache` 中找不到链接行的下一个行片时，不得不使用常规单块读取来获取它的次数。有关更深入的信息，请参阅本章前文关于链接行的描述。\n\
  \n#### 表扫描（直接路径读取） (`table scans (direct read)`)\n\n此统计信息并非 Exadata 特有；在任何使用直接路径读取对表段执行全表扫描的\
  \ Oracle 数据库中都能看到它。在串行执行期间，此统计信息在表或段扫描开始时递增。然而，在并行执行中，每当一个从进程开始扫描分配给它的一个新的 ROWID\
  \ 范围时，它就会递增一次。直接路径读取是智能扫描发生的先决条件。当您没有看到预期的智能扫描时，一个快速的故障排查选项是使用此统计信息检查是否发生了直接路径读取。另一个快速提示：当使用\
  \ Snapper 对正在执行且未扫描多个分区的查询进行故障排查时，您可能看不到此统计信息的条目。这并不意味着没有发生直接路径读取——可能是您在计数器已经递增之后才开始排查该会话。\n\
  \n#### 表扫描（长表） (`table scans (long tables)`)\n\n这是一个与前一个类似的统计信息，但它显示被扫描的表是否被认为是大表。实际上，Oracle\
  \ 对每个段都是单独考虑的，因此表的某些分区可能被认为是小的，有些被认为是大的。被 Oracle 认为是小的段会递增 `table scans (short tables)`\
  \ 计数器。如果在全扫描期间总是读取到高水位标记（high water mark）的段大于 `buffer cache` 的 10%，则该表被认为是大表，即使是串行全段扫描也会考虑使用直接路径读取。请注意，此决策逻辑还考虑了其他因素，这些因素在第\
  \ 2 章中有更详细的解释。缓冲缓存百分之十的规则实际上源自 `_small_table_threshold` 参数。该参数默认为缓冲缓存大小（以块计）的百分之二，但在\
  \ Oracle 11.2 的早期版本中，Oracle 使用 `5 × _small_table_threshold` 作为其直接路径扫描决策阈值（取决于缓冲缓存中的块数和一些其他因素）。在当前版本（包括\
  \ 11.2.0.3）中，即使表的大小只是略大于 `_small_table_threshold`，它也有资格进行直接路径读取/智能扫描。同样，该逻辑在第 2\
  \ 章中有所阐述。\n\n同样值得注意的是，对段头的单块 I/O 不再决定段的大小。Oracle 11.2.0.2 及更高版本使用关于表的字典信息。\n\n\n\
  \n## 理解 SQL 语句性能\n\n本节重点介绍 SQL 语句的性能指标，并帮助理解语句的时间消耗分布及其瓶颈所在。我们将回顾第 10 章中涵盖的指标，重点关注它们的使用方法和时机。各种\
  \ SQL 性能监控工具的主体内容将在下一章介绍。\n\n### 用于 Exadata SQL 统计的监控视图\n\n针对单个 SQL 语句的大多数 Exadata\
  \ 特定性能统计信息，主要可通过以下视图进行监控：\n*   `V$SQL` 和 `V$SQLAREA`\n*   `V$SQLSTATS` 和 `V$SQLSTATS_PLAN_HASH`\n\
  *   `V$SQL_MONITOR` 和 `V$SQL_PLAN_MONITOR`\n*   `V$ACTIVE_SESSION_HISTORY` 以及持久化到\
  \ AWR 存储库的 `DBA_HIST_ACTIVE_SESS_HISTORY`\n\n访问与 AWR 相关的视图需要您获得相应的许可。请注意，您在 `V$SQL%`\
  \ 视图中看到的所有 Exadata 特定指标，实际上与您从 `V$SESSTAT` 视图中看到的指标相同。它们源于相同的数据源，只是累积方式不同。`V$SESSTAT`\
  \ 为会话累积统计信息，而不论哪个 SQL 语句或命令使其递增；而带有 `V$SQL` 前缀的视图则聚合不同 SQL 语句的统计信息，而不论执行它们的会话。因此，可以看到某些\
  \ Exadata 指标按 SQL 语句进行了聚合。\n\n### 示例：V$SQL 视图列\n\n以下是 `V$SQL%` 视图列的示例。（`V$SQL` 视图中还有更多列；这里展示的是在智能扫描上下文中重要的那些。）\n\
