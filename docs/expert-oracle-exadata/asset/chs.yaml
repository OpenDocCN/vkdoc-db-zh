  \n`7 - access(\"A\".\"ID\"=\"B\".\"ID\")`\n\n`9 - storage(\"B\".\"STATE\"='RARE')`\n\
  \n`filter(\"B\".\"STATE\"='RARE')`\n\n`12 - storage(:Z>=:Z AND :Z<=:Z AND SYS_OP_BLOOM_FILTER(:BF0000,\"\
  A\".\"ID\"))`\n\n`filter(SYS_OP_BLOOM_FILTER(:BF0000,\"A\".\"ID\"))`\n\n`Note`\n\
  \n`-----`\n\n`- 使用的动态统计信息：动态采样 (level=AUTO)`\n\n`- 由于提示(Hint)，并行度为 2`\n\n在这个简单的例子中，通过`alter\
  \ session`将优化器推离索引，导致优化器选择了一个明显更快的执行计划。计划显示，运行时间缩短的结果是进行了全表扫描，而不是使用索引。\n\n#### 提示（Hints）\n\
  \n当然，提示也可以用来帮助优化器做出正确的选择，但这多少有些棘手。在前面提到的混合负载场景中尤其如此。尽管如此，告诉 Oracle 你希望执行哈希连接或忽略某个特定索引，是一个可行的选项。正如前一节提到的，`OPT_PARAM`提示对于设置一些可能影响优化器决策的初始化参数也很有用。SQL\
  \ 补丁可以通过向你无法控制的代码中注入提示来提供帮助。在获得修复方案之前，Oracle 12c 引入的自适应优化应该会减少使用提示来影响连接方法的必要性。\n\
  \n### 使用资源管理器（Resource Manager）\n\n不幸的是，人们仍普遍认为 Oracle 数据库无法配置成同时充分处理数据仓库（DW）和在线事务处理（OLTP）工作负载。而且，确实，将它们放在不同的系统上确实使它们更易于管理。这种方法的缺点是成本高昂。许多公司将其大部分计算资源用于在平台之间移动数据。Exadata\
  \ 的强大功能使得将这些环境结合起来颇具吸引力。请记住，Exadata 具有在其他平台上不可用的、用于在多个数据库之间划分资源的附加功能。I/O 资源管理器可以防止长时间运行的数据仓库查询削弱在同一系统上运行的、对延迟敏感的语句的性能。充分理解\
  \ Oracle 的资源管理功能，应该会改变你对在混合负载或整合环境中什么是可能的看法。资源管理在第 7 章中有深入介绍。\n\n## 总结\n\nExadata\
  \ 不同于传统部署的 Oracle 数据库。为了充分利用它，你需要以不同的方式思考。这并不意味着将应用程序迁移到 Exadata 时必须重写它，但这是一个对其进行整体审查的好机会。在当今世界，DBA\
  \ 管理着数十或数百个数据库的情况相当常见。“了解你的数据”在这种情况下往往成了一种奢望。DBA 可能被分配一个需要关闭的问题工单，而大量的待处理工单常常使得只要系统“平稳运行”，就无法对根本原因进行更深入的分析。\n\
  \n当决定将数据库迁移到 Exadata 时，这个决定通常意味着升级到更新的 Oracle 版本。平台变更和数据库版本变更是审查数据库环境以获取进一步性能提升的最佳时机。如果可能，并且你在迁移到\
  \ Exadata 时没有面临巨大的时间压力，我们鼓励你不要在迁移成功后就停止对系统的工作，而是继续拓展可能的边界。当使用智能扫描（Smart Scans）时，Exadata\
  \ 系统非常强大，你应该在可行且有意义的地方利用这种性能。\n\n\n"
- "# CELLCLI 与 DCLI\n\n在前几章中，您已经多次看到对 `dcli` 和 `cellcli` 的引用。尽管其语法看起来相当直观，但更深入地探讨这些工具的功能显然是必要的。您可能是通过另一章的引用来到这里。本附录并非旨在全面讨论您能用这些工具做什么——您有《Exadata\
  \ 存储服务器软件用户指南》的第 8 章（使用 CellCLI 实用程序）和第 9 章（使用 dcli 实用程序）来负责这部分内容。本附录更像是您入门并了解 Exadata\
  \ 系统两个最实用配置工具的指南。`cellcli` 部分稍长一些，以体现这两个实用程序中功能更强者的地位。\n\n`cellcli` 是一个命令解释器，您可以通过它来管理存储单元。可以理解，它在计算节点上不可用。`cellcli`\
  \ 之于存储单元，就如同 `SQL*Plus` 之于数据库实例。本附录将更详细介绍的另一个实用程序是 `dcli`。它是一个可以一次性向所有数据库服务器和/或存储单元发送单一命令的工具。其他功能还包括将文件复制到多个位置以及复制\
  \ SSH 密钥。任何在支持 Exadata 之前曾担任过 RAC 管理员的人，可能都会和作者一样认为，`dcli` 是每个 RAC 系统都应该具备的工具。在八分之一或四分之一机架的情况下，它可能听起来没那么有用，但一旦您开始管理半机架或全机架，您就会开始欣赏这种能够一次在所有集群节点上执行命令的能力。\n\
  \n## CellCLI 简介\n\n顾名思义，Exadata 存储软件使用 `cellcli` 实用程序作为其命令行界面。我们在本书第一版中曾抱怨缺乏 `cellcli`\
  \ 的语法参考。当时，您唯一的帮助是在线帮助或本附录。值得庆幸的是，情况已经好转，《Exadata 存储管理员指南》有一章专门介绍 `cellcli` 的使用。不过，由于您可能不是在电子设备上阅读本书（或者身边可能没有设备），我们还是决定再包含一点参考内容。在编写本附录时，我们还发现文档在某些地方有些滞后，所以我们认为应该包含一些我们在使用过程中学到的内容。\n\
  \n有趣的是，Oracle 选择编写一个全新的命令行工具来管理存储单元。Oracle 本可以使用 `SQL*Plus`，它已成为管理数据库和 ASM 最著名的工具。尽管如此，`cellcli`\
  \ 仍是您将用于管理存储单元的工具。其语法与 `SQL*Plus` 有些不同，但也存在相似之处，特别是在 `LIST` 命令上。`LIST` 用于执行查询，它看起来与\
  \ DBA 已经习惯的 `SELECT` 命令非常相似。和 `SELECT` 一样，它有 `WHERE` 和 `LIKE` 关键字，允许您从输出中过滤掉不需要的信息。\n\
  \n以下是我们总结的关于 `cellcli` 的十大要点：\n\n*   `cellcli` 确实实现了一些 `SQL*Plus` 命令（`START (@)`、`SET\
  \ ECHO ON`、`SPOOL`、`DESCRIBE`、`REM` 和 `HELP`）。\n*   `SELECT` 被 `LIST` 取代，它必须是命令行的第一个关键字。\n\
  *   没有 `FROM` 关键字（`LIST` 关键字后必须紧跟 `ObjectType`，它相当于表名）。\n*   列名使用 `ATTRIBUTES` 关键字指定，后跟您希望显示的列。\n\
  *   存在一个 `DESCRIBE` 命令，用于显示构成 `ObjectType`（表）的属性（列）。\n*   每个 `ObjectType` 都有一组默认列，如果不指定\
  \ `ATTRIBUTES` 关键字，将返回这些列。\n*   有一个 `WHERE` 子句可以应用于任何属性，并且多个条件可以用 `AND` 组合；但是，不支持\
  \ `OR`。\n*   与本书第一版不同，在 12.1.2.1.0 及更高版本中，存在一个等同于 `ORDER BY` 的功能，并且您可以将输出限制为最多 200\
  \ 行。\n*   `DETAIL` 关键字可以附加到任何 `LIST` 命令，以将输出从按列显示更改为按行显示。\n*   `LIKE` 运算符有效，但它不是使用标准的\
  \ SQL 通配符 `%`，而是使用一种简单的正则表达式形式，因此我们熟悉的 `SQL*Plus` 中的 `%` 变成了 `.*`，匹配任意字符零次或多次。\n\
  \n稍加练习后，您就会对 `cellcli` 感到得心应手。在大多数情况下，您将使用 `LIST` 命令来查询存储单元的各个（性能）方面。\n\n\n### 调用\
  \ cellcli\n\n当你在命令行执行 `cellcli` 时，实际启动的是一个 bash 脚本。该脚本是一个封装器，包含健全性检查、加载环境变量，并最终执行\
  \ Java 代码。默认情况下，在连接到存储单元时，于命令行输入 `cellcli` 将进入一个交互式会话。你在会话中享有的权限取决于你用于连接存储单元的账户。你可以选择以\
  \ `root`、`celladmin` 或 `cellmonitor` 的身份连接，其中 `root` 权限最高（请小心！），`cellmonitor` 权限最低。\n\
  \n调用时，你可以传递一些命令行选项。最相关的是 `` `-e` `` 用于在非交互式会话中执行命令，以及 `` `-xml` `` 用于生成 XML 输出。如果遇到问题，你可以使用\
  \ `` `-v` `` 到 `` `-vvv` `` 来生成更详细的日志记录。还存在其他选项，但与本章内容无关。\n\n由于 `cellcli` 将输出写到\
  \ `STDOUT`，你也可以使用你喜欢的 UNIX 工具：只需将 `cellcli` 的输出通过管道传递给 `sed`、`awk`、`grep`、`sort`、`uniq`、`nl`\
  \ 或任何其他众多能帮助你处理文本的 UNIX 工具。这些工具为 12.1.2.1.0 版本之前的存储单元提供了一种执行数据切片和切块的好方法。下面是一个如何模拟缺失的\
  \ `order by` 子句的示例——首先在 12.1.2.1.0 版本上演示，向你展示如何在当前的 Exadata 软件版本中实现：\n\n```\n# cellcli\
  \ -e list metriccurrent where objectType = 'SMARTIO' order by metricValue limit\
  \ 30\nSIO_IO_EL_OF_SEC               SMARTIO         0.000 MB/sec\nSIO_IO_RD_FC_HD_SEC\
  \            SMARTIO         0.000 MB/sec\nSIO_IO_RD_RQ_FC_HD_SEC         SMARTIO\
  \         0.0 IO/sec\nSIO_IO_RD_RQ_FC_SEC            SMARTIO         0.0 IO/sec\n\
  SIO_IO_OF_RE_SEC               SMARTIO         0.000 MB/sec\nSIO_IO_RD_RQ_HD_SEC\
  \            SMARTIO         0.0 IO/sec\nSIO_IO_RV_OF                   SMARTIO\
  \         0.000 MB\nSIO_IO_RV_OF_SEC               SMARTIO         0.000 MB/sec\n\
  SIO_IO_RD_FC_SEC               SMARTIO         0.000 MB/sec\nSIO_IO_SI_SV_SEC  \
  \             SMARTIO         0.000 MB/sec\nSIO_IO_PA_TH                   SMARTIO\
  \         0.000 MB\nSIO_IO_WR_FC_SEC               SMARTIO         0.000 MB/sec\n\
  SIO_IO_RD_HD_SEC               SMARTIO         0.000 MB/sec\nSIO_IO_WR_HD_SEC  \
  \             SMARTIO         0.000 MB/sec\nSIO_IO_PA_TH_SEC               SMARTIO\
  \         0.000 MB/sec\nSIO_IO_WR_RQ_FC_SEC            SMARTIO         0.0 IO/sec\n\
  SIO_IO_WR_RQ_HD_SEC            SMARTIO         0.0 IO/sec\nSIO_IO_RD_FC_HD     \
  \           SMARTIO         577 MB\nSIO_IO_RD_RQ_FC_HD             SMARTIO     \
  \    582 IO requests\nSIO_IO_WR_FC                   SMARTIO         106,126 MB\n\
  SIO_IO_WR_RQ_FC                SMARTIO         106,564 IO requests\nSIO_IO_OF_RE\
  \                   SMARTIO         128,723 MB\nSIO_IO_WR_HD                   SMARTIO\
  \         225,426 MB\nSIO_IO_WR_RQ_HD                SMARTIO         226,354 IO\
  \ requests\nSIO_IO_SI_SV                   SMARTIO         235,694 MB\nSIO_IO_RD_FC\
  \                   SMARTIO         408,460 MB\nSIO_IO_RD_RQ_FC                SMARTIO\
  \         412,032 IO requests\nSIO_IO_RD_HD                   SMARTIO         573,819\
