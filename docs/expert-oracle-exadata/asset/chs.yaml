  `...`\n\n## 总结\n\nExadata 是一个高度冗余的平台，包含许多活动部件。企业投资于此类平台，通常都期望有最短的停机时间。因此，Exadata\
  \ 通常用于托管具有非常严格正常运行时间要求的关键业务应用程序。了解出现问题时该怎么做对于满足这些正常运行时间要求至关重要。在本章中，我们讨论了在组件和系统发生故障时保护您的应用程序和客户的正确流程。在您的系统投入生产之前，请优先练习备份和恢复系统卷、移除和更换磁盘驱动器以及重启存储单元。此外，熟悉您的数据库会发生什么变化。运行我们在本章讨论的诊断工具，并确保您理解如何解读输出结果。如果您将负责为公司维护\
  \ Exadata，那么现在就是熟悉本章所讨论主题的时候。\n\n"
- "# 10. Exadata 等待事件\n\nOracle 数据库是一段高度可监测的代码，并且已保持这种状态相当长一段时间。它通过使用等待事件来跟踪在离散操作上花费的时间量，除非相关会话正在使用\
  \ CPU。尽管数据库软件相当复杂，但等待事件分析允许性能分析师确定数据库将时间花在了哪里。许多困难的性能问题可以通过分析来自等待接口的数据来解决，最近还可以通过活动会话历史\
  \ (ASH) 来解决。Exadata 的引入导致了几个新等待事件的创建，以支持在该平台上执行的独特操作。本章将重点描述这些新事件以及它们如何与实际执行的活动相关联，同时将它们与非\
  \ Exadata 平台上数据库使用的等待事件进行对比。它还将描述一些并非 Exadata 特有但在 Exadata 平台上扮演重要角色的等待事件。\n\n在一些罕见情况下，等待接口的粒度不够细，无法让您弄清楚数据库引擎将时间花在了什么上。如果您使用喜欢的搜索引擎搜索“等待接口不够”，您会找到关于该主题的博客文章，以及\
  \ Oracle 维护的会话统计信息如何提供有关会话所做工作的进一步见解。第 11 章将帮助您更好地理解会话统计信息。不过，在大多数情况下，分析等待事件足以对问题进行故障排除。给本章作者的一条非常有用的建议是：不要太早迷失在细节中！\n\
  \n等待事件实际上是一段被计时并被赋予名称的代码段。这些事件所涵盖的代码段通常是离散的操作系统调用，例如单独的 I/O 请求，但有些等待事件涵盖了相当大段的代码。这些事件甚至可能包含其他等待事件的代码段。多年来，等待事件的命名有些不一致，许多事件的名称略有误导性。尽管一些事件名称被公认为可能有误导性，但\
  \ Oracle 出于可以理解的原因一直不愿更改它们。Exadata 平台为重命名一些与 I/O 相关的事件提供了借口，并且，正如您稍后将看到的，开发人员抓住这个机会就这么做了。\n\
  \n等待事件在数据库的许多地方被外部化。查看等待事件最常见的方法是查询 V-dollar 视图、跟踪和 SQL Monitor。用于查看等待事件信息的常见 V-dollar\
  \ 视图是 `V$SESSSION` 或 `V$SESSION_WAIT`。这些视图显示一个会话的当前等待事件，但不显示事件历史记录。10g 中引入的活动会话历史通过采样活动会话并记录相关的信息给性能分析师，从而改善了这一点，但它需要额外的许可证。请始终确保您所做的事情符合您的许可协议。\n\
  \n如果您想获取一个会话的所有等待记录，您可以选择启用 SQL 跟踪。成熟的 SQL 跟踪允许您记录针对数据库发出的 SQL 语句以及所有相关的等待事件。然后，位于数据库诊断目标中的原始跟踪文件会被后处理并转换为更易于人类阅读的格式。\n\
  \n\n除了 SQL 跟踪，另一种选择是使用 SQL 监控器。值得庆幸的是，在 Exadata 平台上，您不会遇到这个强大工具在技术上不可用的情况（许可问题另当别论）。SQL\
  \ 监控器在 Oracle 11.1 版本中引入，而这是 Exadata 支持的最低版本。SQL 监控器允许您实时窥探单条 SQL 语句的执行过程。在 SQL\
  \ 语句执行期间，您可以确切看到 RDBMS 引擎在 SQL 执行的哪个位置、哪个行源上花费时间，如果适用，还能看到等待事件。所有这些信息，甚至在语句仍在执行时就可获取！要能利用这一强大工具，您必须为数据库获得**诊断包和调优包**的许可。支撑\
  \ SQL 监控器的底层技术同样是活动会话历史（ASH），正如您刚刚读到的，它是在 Oracle 10g 中引入的。ASH 每秒对数据库活动进行采样，收集关于活动会话的信息，并以一秒为间隔存储约一小时。此后，信息被聚合，每第十个样本被保留在`SYSAUX`表空间的磁盘上。持久化部分被称为**活动负载仓库（AWR）**。AWR\
  \ 与`STATSPACK`工具的相似之处仅在于它会随时间记录数据库活动。信息的保留期可由用户配置。存储 AWR 信息所需的空间量可能很大，但不应忘记，更多数据使您能更轻松地与过去事件进行比较。像所有事情一样，您需要在磁盘空间使用与将感知到的性能问题与过去事件进行比较的优势之间找到平衡。在我看来，默认的八天保留期远远不够，应该增加。\n\
  \n## Exadata 特有事件\n\n实际上，不存在专属于 Exadata 平台的事件。等待事件是内置于数据库代码中的。由于 Exadata 上的计算节点运行的是标准的\
  \ Oracle 数据库软件，所有在调用 Exadata 特有功能时使用的等待事件，在非 Exadata 平台上的数据库中同样可用。但因为 Exadata 功能仅在\
  \ Exadata 平台上可用，所以在其他平台上，这些事件永远不会被分配时间。作为证明，请看以下示例，它首先在 Exadata 数据库一体机上，然后在非 Exadata\
  \ 平台的标准 12c Release 1 数据库上，比较了`V$EVENT_NAME`（它暴露了有效的等待事件）中的事件：\n\n`SQL> select count(1)\
  \ from v$event_name;`\n\n   `COUNT(1)`\n\n`-----------`\n\n       `1650`\n\n`SQL>\
  \ select count(1) from v$event_name@lab12c;`\n\n   `COUNT(1)`\n\n`-----------`\n\
  \n       `1650`\n\n`SQL> select name from v$event_name`\n\n  `2  minus`\n\n  `3\
  \  select name from v$event_name@lab12c;`\n\n`no rows selected`\n\n因此，事件之间没有差异。这确实使得列出一个\"\
  Exadata 专属\"事件列表有些困难。不过，事件名称是一个很好的起点。\n\n### “cell”事件\n\n《Oracle Exadata 存储服务器软件用户指南\
  \ 12c Release 1》提供了一个等待事件表。所有这些事件都以单词\"cell\"开头。手册列出了十个这样的事件。其中一个（`cell interconnect\
  \ retransmit during physical read`）实际上仍然不存在。\n\n还有一批名称中包含\"cell\"的事件未包含在文档中。结合已记录和未记录的事件，就得到了完整的\"\
  cell\"事件列表。这个列表将是本章的起点。您可以查询`V$EVENT_NAME`来获取该列表，您将得到以下结果。请注意，大多数事件属于某一 I/O 类。等待事件的数量在\
  \ 12.1.0.1.x 中没有变化；与本章第一版中使用的 11.2.0.2 版本一样，仍然是 17 个事件。\n\n```\nSYS:db12c1> select\
