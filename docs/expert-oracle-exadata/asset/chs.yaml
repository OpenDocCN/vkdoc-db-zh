  \ LAST`作为格式参数。其他有用的工具包括 session snapper 以及第 2 章中提到的`fsx`系列脚本。查询活动会话历史（这同样需要许可）也能提供关于当前正在发生的事情的有趣见解，但请确保你进行了适当的筛选。最终，一个跟踪文件将揭示发生的每一次等待。处理原始跟踪文件后，收集到了以下信息。由于跟踪文件中条目数量庞大，实际处理时间被延长：\n\
