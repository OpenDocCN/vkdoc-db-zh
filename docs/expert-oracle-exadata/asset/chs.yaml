  IM_SCANS                                           NUMBER\nIM_SCAN_BYTES_UNCOMPRESSED\
  \                         NUMBER\nIM_SCAN_BYTES_INMEMORY                       \
  \      NUMBER\n```\n\n以粗体显示的列是针对 Exadata 处理的特定列，但并非 Exadata 独有。如果您在非 Exadata 环境中描述\
  \ `V$SQL`，您将获得完全相同的列。\n\n### 关键列及其含义\n\n表 11-1 列出了最值得关注的列，为了可读性，明确排除了部分物理读列。\n\n\
  **表 11-1. V$SQL 列及其含义**\n\n| 列名 | 指标含义 |\n| --- | --- |\n| `IO_CELL_OFFLOAD_ELIGIBLE_BYTES`\
  \ | 有多少字节的段读取操作被卸载到存储节点。存储节点要么读取了这些数据，要么在存储索引帮助下跳过了块范围。该指标对应于 `V$SESSTAT` 中的 cell\
  \ physical IO bytes eligible for predicate offload 统计信息。 |\n| `IO_INTERCONNECT_BYTES`\
  \ | 在数据库节点和存储节点之间发送的总通信量字节数（读和写）。 |\n| `OPTIMIZED_PHY_READ_REQUESTS` | 因存储索引而完全避免，或针对存储节点闪存缓存卡完成的磁盘\
  \ I/O 请求数量。 |\n| `IO_CELL_UNCOMPRESSED_BYTES` | 存储节点在智能扫描期间扫描过的未压缩数据的大小。请注意，存储节点无需实际解压所有数据即可知道未压缩长度。HCC\
  \ 压缩单元头部在其内部同时存储了压缩和未压缩的 CU 长度信息。此指标对于估算 HCC 压缩带来的 I/O 减少很有用。请注意，此指标仅适用于 HCC 段。对于常规的块级压缩，此指标仅显示数据的压缩后大小。\
  \ |\n| `IO_CELL_OFFLOAD_RETURNED_BYTES` | 此指标显示作为卸载智能扫描访问路径的结果返回了多少数据。当与 `IO_CELL_OFFLOAD_ELIGIBLE_BYTES`\
  \ 比较（用于衡量存储节点和数据库之间的 I/O 减少）或与 `IO_CELL_UNCOMPRESSED_BYTES` 比较（用于衡量因卸载和压缩带来的总 I/O\
  \ 减少）时，这是衡量智能扫描卸载效率的主要指标。 |\n\n### 示例查询分析\n\n以下是一个查询示例的输出，针对一个 EHCC 压缩表，其中表扫描被卸载到存储节点。`V$SQL`\
  \ 表的输出经过了转置和简化，只显示相关详细信息，以提高可读性：\n\n```\nSQL_TEXT                      : select\
  \ /* hccquery001 */ ...\nSQL_ID                        : 5131dsd26qfc5\nDISK_READS\
  \                    : 1304924\nBUFFER_GETS                   : 1304934\nIO_CELL_OFFLOAD_ELIGIBLE_BYTES:\
  \ 10689937408\nIO_INTERCONNECT_BYTES         : 84656896\nPHYSICAL_READ_REQUESTS\
  \        : 10258\nPHYSICAL_READ_BYTES           : 10689937408\nPHYSICAL_WRITE_REQUESTS\
  \       : 0\nPHYSICAL_WRITE_BYTES          : 0\nOPTIMIZED_PHY_READ_REQUESTS   :\
  \ 10110\nLOCKED_TOTAL                  : 1\nPINNED_TOTAL                  : 2\n\
  IO_CELL_UNCOMPRESSED_BYTES    : 27254591356\nIO_CELL_OFFLOAD_RETURNED_BYTES: 84656896\n\
  -----------------\nPL/SQL procedure successfully completed.\n```\n\n在此案例中，`IO_CELL_OFFLOAD_RETURNED_BYTES`\
  \ 远小于 `IO_CELL_OFFLOAD_ELIGIBLE_BYTES`；因此，智能扫描无疑有助于减少存储节点和数据库之间的数据流量。后者是衡量数据库中执行了多少智能扫描的良好指标：\n\
  \n```\nSQL> !cat sscan.sql\nWITH offloaded_yes_no AS\n(SELECT inst_id,\nCASE\nWHEN\
  \ (IO_CELL_OFFLOAD_ELIGIBLE_BYTES > 0)\nTHEN 'YES'\nELSE 'NO'\nEND sscan\nFROM gv$sql\n\
  )\nSELECT COUNT(sscan),\nsscan as smart_scan,\ninst_id\nFROM offloaded_yes_no\n\
  GROUP BY sscan,\ninst_id;\n```\n\n此外，回到前面的例子，`IO_CELL_UNCOMPRESSED_BYTES` 显著大于 `PHYSICAL_READ_BYTES`，这表明\
  \ HCC 帮助减少了存储节点必须从磁盘读取的字节数，这要归功于压缩。请注意，`IO_INTERCONNECT_BYTES` 并不比 `IO_CELL_OFFLOAD_RETURNED_BYTES`\
  \ 大很多，这表明对于此 SQL，几乎所有通信量都是由智能扫描返回的数据引起的。没有由于其他原因（例如非最优排序导致的临时表空间读/写，或由链接行或数据库内一致性读处理引起的哈希连接或其他工作区操作或数据库块\
  \ I/O）产生的额外通信量。\n\n\n\n智能扫描（Smart Scanning）能加快从数据段中检索数据的速度，但它并不能神奇地加速连接、排序和聚合操作。这些操作发生在数据从数据段被检索出来之后。一个值得注意的例外是布隆过滤器（Bloom\
  \ filter）下推到单元格（cells），这使得单元格能够利用在哈希连接中基于驱动行源数据构建的哈希位图来过滤来自探测表的数据。消费者可能会拖慢生产者的速度，但这是所有存储系统的普遍规律。\n\
  \n虽然此示例使用了 `V$SQL` 视图（它显示 SQL 子游标级别的统计信息），但你也可以使用 `V$SQL_PLAN_MONITOR`（其中的 `PLAN_LINE_ID`、`PLAN_OPERATION`\
  \ 等列）来测量每个执行计划行的这些指标。这很有用，因为单个执行计划通常会访问并连接多个表，而不同的表可能从智能扫描下推（Smart Scan offloading）中受益的程度不同。第\
  \ 12 章 介绍了更多使用这些数据的脚本和工具。\n\n## 查询 cellsrv 内部处理统计信息\n\n在 Exadata 软件的早期版本中，深入了解 Exadata\
  \ 的内部处理过程并非总是易事。在大多数情况下，性能分析师必须连接到单元格本身，然后将事件转储到跟踪文件中才能获取这些指标。一个更简单的方法是访问 `V$CELL`\
  \ 系列视图。本节将解释其中一些视图，以及为什么查询它们可以为你提供关于单元格服务器上各种处理步骤的有趣见解——而无需退出 SQL*Plus！`V$CELL`\
  \ 系列包括这些 Oracle 提供了 API 的视图。如果你查询 `V$FIXED_VIEW_DEFINITION` 中以 `GV%CELL%` 开头的视图，你会发现\
  \ `V$CELL` 视图是基于名为 `X$KCFIS%`（内核缓存文件智能存储，Kernel Cache File Intelligent Storage）的\
  \ `X$` 表。并非所有这些 `X$` 表都有对应的“官方” `V$` 视图。\n\n本节将详细阐述 `V$CELL%` 视图，以及本书尚未介绍的另一个单元格上的工具：`cellsrvstat`。\n\
  \n### V$CELL 系列视图\n\n`V$CELL%` 视图的数量随着每个版本稳步增加，12c 也不例外。Oracle 12.1.0.2 列出了以下这些：\n\
  \n```\nSQL> select table_name from dict where regexp_like(table_name, 'DBA.*(ASM|CELL)|^V\\\
  $CELL');\n\nTABLE_NAME\n--------------------------------------------------------------------------------\n\
  DBA_HIST_ASM_BAD_DISK\nDBA_HIST_ASM_DISKGROUP\nDBA_HIST_ASM_DISKGROUP_STAT\nDBA_HIST_CELL_CONFIG\n\
  DBA_HIST_CELL_CONFIG_DETAIL\nDBA_HIST_CELL_DB\nDBA_HIST_CELL_DISKTYPE\nDBA_HIST_CELL_DISK_NAME\n\
  DBA_HIST_CELL_DISK_SUMMARY\nDBA_HIST_CELL_GLOBAL\nDBA_HIST_CELL_GLOBAL_SUMMARY\n\
  DBA_HIST_CELL_IOREASON\nDBA_HIST_CELL_IOREASON_NAME\nDBA_HIST_CELL_METRIC_DESC\n\
  DBA_HIST_CELL_NAME\nDBA_HIST_CELL_OPEN_ALERTS\nV$CELL\nV$CELL_CONFIG\nV$CELL_CONFIG_INFO\n\
  V$CELL_DB\nV$CELL_DB_HISTORY\nV$CELL_DISK\nV$CELL_DISK_HISTORY\nV$CELL_GLOBAL\n\
  V$CELL_GLOBAL_HISTORY\nV$CELL_IOREASON\nV$CELL_IOREASON_NAME\nV$CELL_METRIC_DESC\n\
  V$CELL_OFL_THREAD_HISTORY\nV$CELL_OPEN_ALERTS\nV$CELL_REQUEST_TOTALS\nV$CELL_STATE\n\
  V$CELL_THREAD_HISTORY\n\n33 rows selected.\n```\n\n相比于 11.2.0.4 版本，数量多了不少：\n\n```\n\
  SQL> select table_name from dict where regexp_like(table_name, 'DBA.*CELL|^V\\$CELL');\n\
  \nTABLE_NAME\n------------------------------\nV$CELL\nV$CELL_CONFIG\nV$CELL_OFL_THREAD_HISTORY\n\
  V$CELL_REQUEST_TOTALS\nV$CELL_STATE\nV$CELL_THREAD_HISTORY\n\n6 rows selected.\n\
  ```\n\n由于本章已经非常长，因此精心挑选只包含了其中最重要的视图。这些视图的 AWR 版本被省略了，因为它们本质上允许在 `SYSAUX` 表空间上对信息进行长期归档。\n\
  \n#### V$CELL\n\n首先想到的视图是 `V$CELL`。在 Oracle 12.1.0.2 中，该视图的定义如下所示：\n\n```\nSQL>\
  \ desc v$cell\n\nName                                     Null?    Type\n----------------------------------------\
  \ -------- ----------------------------\nCELL_PATH                             \
  \            VARCHAR2(400)\nCELL_HASHVAL                                      NUMBER\n\
  CON_ID                                            NUMBER\nCELL_TYPE            \
  \                             VARCHAR2(400)\n```\n\n`CON_ID` 和 `CELL_TYPE` 是 12c\
  \ 中新增的；Oracle 11.2 仅显示单元格路径（一个 IP 地址）和单元格哈希值。你可能会使用此视图将单元格哈希值映射到单元格，如在 第 10 章 讨论的与智能扫描相关的等待事件中所发现的那样。\n\
  \n#### V$CELL_OFL_THREAD_HISTORY\n\n这个有趣的视图记录了 `cellsrv` 线程在过去十分钟内的活动历史，从概念上讲，类似于存储单元格的\
  \ ASH。此视图与 `V$CELL_THREAD_HISTORY` 类似，但有额外的列，允许对信息进行类似 ASH 的版本控制。以下是 12.1.0.2 的视图定义：\n\
  \n```\nSQL> desc V$CELL_OFL_THREAD_HISTORY\n\nName                             \
  \        Null?    Type\n---------------------------------------- -------- ----------------------------\n\
  CELL_NAME                                         VARCHAR2(1024)\nGROUP_NAME   \
  \                                     VARCHAR2(1024)\nPROCESS_ID               \
  \                         NUMBER\nSNAPSHOT_ID                                  \
  \     NUMBER\nSNAPSHOT_TIME                                     DATE\nTHREAD_ID\
  \                                         NUMBER\nJOB_TYPE                     \
  \                     VARCHAR2(32)\nWAIT_STATE                                 \
  \       VARCHAR2(32)\nWAIT_OBJECT_NAME                                  VARCHAR2(32)\n\
  SQL_ID                                            VARCHAR2(13)\nDATABASE_ID    \
  \                                   NUMBER\nINSTANCE_ID                        \
  \               NUMBER\nSESSION_ID                                        NUMBER\n\
  SESSION_SERIAL_NUM                                NUMBER\nCON_ID               \
  \                             NUMBER\n```\n\n如你所见，该视图显示了单元格进程，这些进程在内部映射到 `cellsrv`\
  \ 线程。对于每个线程，你可以看到作业类型，例如在智能扫描期间的 `PredicateOflFilter`，以及一个状态。更有趣的是，你可以看到导致负载的 SQL\
  \ ID、数据库 ID、实例号以及会话 SID 和序列号。但要小心——如果信息不可用，`SQL_ID` 由 13 个空格组成，而不是 null 或空字符串：\n\
  \n```\nSQL> select count(''''||sql_id||''''),''''||sql_id||''''\n  2   from v$cell_ofl_thread_history\n\
  \  3  group by ''''||sql_id||'''';\n\nCOUNT(''''||SQL_ID||'''') ''''||SQL_ID||'''\n\
  ------------------------- ---------------\n                       2 'f254uv2p53y7j'\n\
  \                  126363 '              '\n\n2 rows selected.\n```\n\n换句话说，你可以看到在给定时间点是谁导致了多少个工作线程处于忙碌状态。下面是一个如何从系统中获取当前信息的示例：\n\
  \n```\nSELECT CELL_NAME,\n       GROUP_NAME,\n       SNAPSHOT_ID,\n       JOB_TYPE,\n\
  \       WAIT_STATE,\n       WAIT_OBJECT_NAME,\n       SQL_ID\nFROM\n       (SELECT\
  \ CELL_NAME,\n               GROUP_NAME,\n               SNAPSHOT_ID,\n        \
  \       JOB_TYPE,\n               WAIT_STATE,\n               WAIT_OBJECT_NAME,\n\
  \               SQL_ID,\n               DATABASE_ID,\n               INSTANCE_ID,\n\
  \               SESSION_ID,\n               SESSION_SERIAL_NUM,\n              \
  \ CON_ID,\n               MAX (SNAPSHOT_ID) over (partition BY cell_name) max_snap\n\
  \          FROM V$CELL_OFL_THREAD_HISTORY\n       )\nWHERE snapshot_id = max_snap;\n\
  ```\n\n正如视图名称所示，历史信息是可用的，而不仅仅是当前状态的快照。如果你将会话信息和 SQL ID 与 ASH 监控信息关联起来，你应该能够非常准确地描绘出在给定时间点单元格的负载情况。\n\
  \n\n\n#### V$CELL_STATE\n\n此视图提供了关于单元的大量信息。与`V$CELL_CONFIG`类似，它依赖于一个描述 XML 字段的列。在本例中，该列是`STATISTICS_TYPE`。12.1.0.2\
  \ 版本中该视图的定义如下：\n\n```\nSQL> desc v$cell_state\nName                            \
  \                  Null?    Type\n-------------------------------------------------\
  \ -------- ----------------------------\nCELL_NAME                             \
  \                     VARCHAR2(1024)\nSTATISTICS_TYPE                          \
  \                  VARCHAR2(15)\nOBJECT_NAME                                   \
  \             VARCHAR2(1024)\nSTATISTICS_VALUE                                 \
  \          CLOB\nCON_ID                                                     NUMBER\n\
  ```\n\n您可以查询的不同统计信息取决于 RDBMS/单元的版本。对于 12.1.0.2 和 Exadata 版本 12.1.2.1.0，您可以查看以下指标：\n\
  \n*   `IOREASON`：将单元的 I/O 分解为各种可想象的类别\n*   `RCVPORT`：包含接收到的网络流量详情\n*   `FLASHLOG`：关于`FLASHLOG`功能使用的非常详细的信息\n\
  *   `SENDPORT`：包含发送的网络流量详情\n*   `PREDIO`：包含关于 Exadata 如何处理智能扫描的信息\n*   `NPHYSDISKS`：列出每个单元的物理磁盘数量\n\
  *   `CELL`：与`cellsrvstat`输出类似的信息\n*   `THREAD`：关于`cellsrv`工作线程的线程相关信息\n*   `PHASESTAT`：关于智能扫描各个阶段的信息\n\
  *   `CAPABILITY`：单元软件功能\n*   `LOCK`：分解单元中按对象类型统计的互斥锁等待\n*   `OFLGROUP`：卸载服务器统计信息\n\
  \nI/O 原因如此有趣，以至于 Oracle 在 12c 中决定为它们单独提供一个名为`V$CELL_IOREASON`的视图。使用此视图的技巧在于，您必须根据统计类型再次解析输出。它有助于为给定类型仅选择`STATISTICS_VALUE`，并制定如何解析\
  \ XML 数据的策略。以下是一个示例，用于列出给定单元在 12.1.0.2 上的所有`IOREASONS`：\n\n```\nSELECT x.cell_name,\
  \ x.statistics_type, x.object_name, stats.*\nFROM   V$CELL_STATE x,\n       XMLTABLE\
  \ ('/ioreasongroup_stats'\n                 PASSING xmltype(x.STATISTICS_VALUE)\n\
  \                 COLUMNS ioreasons XMLTYPE PATH '*'\n                ) xt,\n  \
  \     xmltable ('/stat'\n                 passing xt.ioreasons\n               \
  \  columns name path './@name',\n                         value path '/stat'\n \
  \               ) stats\nwhere x.statistics_type = 'IOREASON'\n  and stats.name\
  \ <> 'reason'\n  and x.cell_name = '192.168.12.8'\n/\n```\n\n输出（经过缩减）如下：\n\n```\n\
  CELL_NAME            STATISTICS_TYPE OBJECT_NAME          NAME            VALUE\n\
  -------------------- --------------- -------------------- --------------- ---------------------\n\
  192.168.12.8         IOREASON        UNKNOWN              reads           369113\n\
  192.168.12.8         IOREASON        UNKNOWN              writes          170592\n\
  192.168.12.8         IOREASON        RedoLog Write        reads           0\n192.168.12.8\
  \         IOREASON        RedoLog Write        writes          51493\n192.168.12.8\
  \         IOREASON        RedoLog Read         reads           1152\n192.168.12.8\
  \         IOREASON        RedoLog Read         writes          0\n192.168.12.8 \
  \        IOREASON        ArchLog Read         reads           0\n192.168.12.8  \
  \       IOREASON        ArchLog Read         writes          0\n192.168.12.8   \
  \      IOREASON        MediaRecovery Write  reads           0\n192.168.12.8    \
  \     IOREASON        MediaRecovery Write  writes          0\n```\n\n`CELL`统计信息提供了最全面的输出；它产生的信息原本只能从系统状态转储中获得。其中一些信息实际上过于复杂，无法完全解析，此时转储到\
  \ XML 文件会有所帮助。只需将`STATISTICS_VALUE`转换为`XMLType`，然后从动态性能视图中选择，将输出粘贴到文本文件中，并用您喜欢的浏览器打开即可。`PREDIO`和`CELL`统计信息就是真正需要这种处理方式的很好例子。\n\
  \n\n\n"
- "# cellsrvstat 实用程序\n\n长久以来，Oracle 一直将 `cellsrvstat` 实用程序作为其 cell 软件发行版的一部分提供。这是一个用于深入排查故障和研究\
  \ cell 软件工作原理的有用工具。该工具带有内置帮助，但除此之外，Oracle 并未真正为其提供文档。你可以在一些出版物和博客中找到若干参考资料。为了让你对该工具的功能有所了解，请参见以下内容：\n\
  \n```\n用法：\ncellsrvstat [-stat_group=<group name>,<group name>,]\n[-offload_group_name=<offload_group_name>,]\n\
  [-database_name=<database_name>,]\n[-stat=<stat name>,<stat name>,] [-interval=<interval>]\n\
  [-count=<count>] [-table] [-short] [-list]\nstat                     一个代表统计项的、用逗号分隔的短字符串列表。\n\
  \                         默认为全部。（除非指定了 -stat）。\n                         -list 选项会显示所有统计项。\n\
  \                         示例：-stat=io_nbiorr_hdd,io_nbiowr_hdd\nstat_group     \
  \          一个代表统计组的、用逗号分隔的短字符串列表。\n                         默认：除 database 外的全部（除非指定了\
  \ -stat_group）。\n                         -list 选项会显示所有统计组。\n                  \
  \       有效组包括：io, mem, exec, net,\n                         smartio, flashcache,\
  \ offload, database.\n                         示例：-stat_group=io,mem\noffload_group_name\
  \       一个代表卸载组名称的、用逗号分隔的短字符串列表。\n                         默认：cellsrvstat -stat_group=offload\n\
  \                         （所有卸载组，除非指定了 -offload_group_name）。\n                 \
  \        示例：-offload_group_name=SYS_121111_130502\ndatabase_name            一个代表数据库组名称的、用逗号分隔的短字符串列表。\n\
  \                         默认：cellsrvstat -stat_group=database\n                \
  \         （所有数据库，除非指定了 -database_name）。\n                         示例：-database_name=testdb,proddb\n\
  interval                 获取并打印统计信息的间隔时间（以秒为单位）。默认为 1 秒。\ncount                 \
  \   统计信息应被打印的次数。默认为一次。\nlist                     列出所有指标缩写及其描述。所有其他选项将被忽略。\ntable\
  \                    以表格格式输出。如果指定的所有指标都不是基于整数的指标，\n                         此选项将被忽略。\n\
  short                    使用缩写的指标名称，而非描述性名称。\nerror_out                用于打印错误消息的输出文件，主要用于调试。\n\
  ```\n\n在研究智能扫描的机制时，将范围缩小到 `io`、`smartio` 或 `offload` 证明是有效的。秉承 UNIX 的优良传统，对该工具的一次调用会打印自开始收集以来的所有统计数据。如果你对当前的统计信息感兴趣，应指定\
  \ `interval` 和 `count` 参数。五秒的间隔时间配合至少为二的计数被证明是有效的。与 `vmstat` 和 `iostat` 一样，你可以放心地忽略第一批输出，而专注于第二批，因为后者代表了\
  \ cell 上的当前统计信息。以下是一个针对一个 80GB 表进行单次串行模式智能扫描期间 `io` 统计组的输出示例。统计名称后的数字是自上次快照以来的增量；其后的较大数字是自\
  \ cell 开始记录以来的事件累计总数：\n\n```\n== 输入/输出相关统计 ==\n硬盘块 IO 读请求次数                    \
  \                 1860       47269919\n硬盘块 IO 写请求次数                            \
