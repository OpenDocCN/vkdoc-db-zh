  \n### 参数\n\n`cell single block physical read` 事件比大多数单元事件提供了更多信息。这些参数允许你准确判断读取了哪个对象，并提供存储该块的磁盘和单元信息：\n\
  \n*   `P1` - 单元哈希值\n*   `P2` - 磁盘哈希值\n*   `P3` - 读取操作期间传递的总字节数（假设块大小为 8K，则始终为 8192）\n\
  *   `obj#` - 正在读取的对象的对象号\n\n## 单元多块物理读\n\n这是另一个重新命名的事件。它等同于以前名称不太清晰的 `db file scattered\
  \ read` 事件。在非 Exadata 平台上，Oracle Database 11gR2 和 12c 仍然在向操作系统发出连续的多块缓冲区读时使用 `db\
  \ file scattered read` 事件。旧事件名称中的“分散”反映了从磁盘读取的数据在缓冲区缓存中的存储方式：分散各处。它并非反映数据从磁盘读取的方式（实际上是连续的）。\n\
  \n### 事件含义\n\n此事件通常与全表扫描和快速全索引扫描一起使用，尽管它也可用于许多其他操作。在 Exadata 平台上，新名称比旧名称更具描述性。对于报告型工作负载，这种等待事件在\
  \ Exadata 平台上远不如在非 Exadata 平台上普遍，因为 Exadata 使用具有自身等待事件（`cell smart table scan` 和\
  \ `cell smart index scan`）的智能扫描来处理许多全扫描操作。\n\nExadata 平台上的 `cell multiblock physical\
  \ read` 事件用于低于串行直接路径读取阈值的表的串行全扫描操作。也就是说，你最常在此事件用于对相对较小的表进行全扫描时看到它。另一方面，如果你的查询没有进行下推处理（例如由于非常大的缓冲区缓存），你也会看到大量此类事件。在这些情况下，启动智能扫描或直接路径读取之前的阈值非常高。\n\
  \n此事件也用于不以直接路径读取执行的快速全索引扫描。以下查询输出展示了一个活跃生产系统上导致 `cell multiblock physical read`\
  \ 等待事件的操作：\n\n```\nEVENT                             OPERATION                 \
  \                         COUNT(*)\n-------------------------------- ------------------------------------------------\
  \ ----------\ncell multiblock physical read                                    \
  \                  764\n                                 DDL STATEMENT         \
  \                               28\n                                 INDEX FAST\
  \ FULL SCAN                                  2\n                               \
  \  INDEX STORAGE FAST FULL SCAN                        657\n                   \
  \              INDEX STORAGE SAMPLE FAST FULL SCAN                 133\n       \
  \                          TABLE ACCESS BY INDEX ROWID                         \
  \ 74\n                                 TABLE ACCESS BY LOCAL INDEX ROWID       \
  \            1428\n                                 TABLE ACCESS STORAGE FULL  \
  \                         5046\n                                 TABLE ACCESS STORAGE\
  \ SAMPLE                          916\n```\n\n### 参数\n\n`cell multiblock physical\
  \ read` 事件也比大多数单元事件提供了更多信息。以下列表中的参数允许你判断读取了哪个对象，并识别存储块的磁盘和单元。传递的总字节数应是块大小的倍数：\n\n\
  *   `P1` - 单元哈希值\n*   `P2` - 磁盘哈希值\n*   `P3` - 读取操作期间传递的总字节数\n*   `obj#` - 正在读取的对象的对象号\n\
  \n## 单元块列表物理读\n\n此事件替代了非 Exadata 平台上的 `db file parallel read` 事件。看起来开发人员借此机会重命名了一些与磁盘操作相关的事件，这就是其中之一。新名称实际上比之前的名称更具描述性，因为该等待事件与并行查询或并行\
  \ DML 毫无关系。\n\n\n### 事件含义\n\n此事件用于多块读取非连续块。这在异步 I/O 下更为高效，而 Exadata 默认启用异步 I/O。多个操作可能触发此事件。最常见的是索引范围扫描、索引唯一扫描以及通过索引\
  \ ROWID 访问表。触发该事件的最常见原因是索引预提取。以下查询输出显示了在 Exadata 系统上导致此等待事件的操作：\n\n```\nSQL> select\
  \ event, operation, count(*) from (\n  2  select sql_id, event, sql_plan_operation||'\
  \ '||sql_plan_options operation\n  3    from DBA_HIST_ACTIVE_SESS_HISTORY\n  4 \
  \   where event like 'cell list%')\n  5    group by operation, event\n  6    order\
  \ by 1,2,3\n 7 /\n\nEVENT                                    OPERATION         \
  \                        COUNT(*)\n---------------------------------------- -----------------------------------\
  \ -------------\ncell list of blocks physical read                             \
  \                            2\n                                         INDEX RANGE\
  \ SCAN                              156\n                                      \
  \   INDEX STORAGE FAST FULL SCAN                    1\n                        \
  \                 INDEX UNIQUE SCAN                              66\n          \
  \                               TABLE ACCESS BY GLOBAL INDEX ROWID             90\n\
  \                                         TABLE ACCESS BY INDEX ROWID          \
  \        1273\n                                         TABLE ACCESS BY LOCAL INDEX\
  \ ROWID            2593\n                                         TABLE ACCESS STORAGE\
  \ FULL                      20\n                                         TABLE ACCESS\
  \ STORAGE SAMPLE                     1\n```\n\n如您所见，这些事件绝大多数由索引访问路径引发。顺便提一下，在非 Exadata\
  \ 平台上，非连续多块读取仍计入旧的 `db file parallel read` 事件。在某些操作中，此旧等待事件名称也可能出现在 Exadata 平台上。\n\
  \n### 参数\n\n`cell list of blocks physical read` 事件比大多数单元事件提供更多信息。以下参数允许您准确识别读取的对象以及存储该块的磁盘和单元：\n\
  \n*   P1 - 单元哈希值\n*   P2 - 磁盘哈希值\n*   P3 - 读取的块数\n*   obj# - 被读取对象的对象号\n\n### cell\
  \ smart file creation\n\nExadata 拥有一种优化技术，允许存储单元在创建或扩展数据文件时初始化块。这发生在创建表空间或手动向表空间添加数据文件时。但是，在\
  \ DML 操作期间自动扩展数据文件时也可能发生。\n\n#### Event Meaning\n\n您已在本章前面读到，此事件在 User I/O 类类似乎不合时宜。然而，如果它是由\
  \ DML 操作引发的，那么将其归入此类别是合理的。无论如何，将块格式化操作 offload（卸载）消除了数据库服务器的 CPU 使用和 I/O，并将其转移到存储层。当这种情况发生时，时间被计入\
  \ `cell smart file creation` 事件。此事件取代了在非 Exadata 平台上仍使用的 `Data file init write`\
  \ 事件。以下是一个繁忙生产系统的查询输出，显示了产生此事件的操作：\n\n```\nSYS@EXDB1> select event, operation, count(*)\
  \ from (\n  2  select sql_id, event, sql_plan_operation||' '||sql_plan_options operation\n\
  \  3    from DBA_HIST_ACTIVE_SESS_HISTORY\n  4    where event like 'cell smart file%')\n\
  \  5    group by operation, event\n  6    order by 1,2,3\n 7 /\n\nEVENT        \
  \              OPERATION                  COUNT(*)\n-------------------------- -------------------------\
  \ --------\ncell smart file creation                                35\n       \
  \                      DELETE                       3\n                        \
  \     INDEX BUILD NON UNIQUE       5\n                             LOAD AS SELECT\
  \               3\n                             LOAD TABLE CONVENTIONAL      1\n\
  \                             UPDATE                       1\n```\n\n您会注意到，在这个特定系统上，`DELETE`\
  \ 语句偶尔也会生成 `cell smart file creation` 事件。`DELETE` 可能导致此事件可能有点令人惊讶。但请记住，此事件实际上是在为一段执行块格式化的代码计时，而不是为文件创建计时。\n\
  \n#### Parameters\n\n此事件唯一值得关注的参数是 `P1`，它显示生成此事件时正在访问哪个单元：\n\n*   `P1` - 单元哈希值\n\
  *   `P2` - 未使用\n*   `P3` - 未使用\n\n### cell statistics gather\n\n`cell statistics\
  \ gather` 事件记录从各种 `V$` 和 `X$` 表中读取所花费的时间。尽管该事件被归类在 User I/O 类别中，但它并非指读写磁盘意义上的 I/O。\n\
  \n#### Event Meaning\n\n当会话从 `V$CELL` 系列视图以及同一类别中的少数其他 `X$` 表中读取时，时间会计入此事件。我们认为该事件被错误分类，实际上并不属于\
  \ User I/O 类别。以下是一个典型示例：\n\n```\nPARSING IN CURSOR #140003020408112 len=79 dep=0\
  \ uid=0 oct=3 lid=0 tim=4163271218132 hv=2136254865 ad='a2c23650' sqlid='fcjwbgdzp9acj'\n\
  select count(cell_name),cell_name from V$CELL_THREAD_HISTORY group by cell_name\n\
  END OF STMT\nPARSE #14...12:c=17997,e=23189,p=5,cr=99,cu=0,mis=1,r=0,dep=0,og=1,plh=3108513074,tim=4\n\
  WAIT #14...12: nam='Disk file operations I/O' ela= 34 FileOperation=8 fileno=0\n\
  \  filetype=8 obj#=262 tim=4163271218207\nEXEC #14...12:c=0,e=54,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=3108513074,tim=4...\n\
  WAIT #14...12: nam='SQL*Net message to client' ela= 2 driver id=1650815232 #bytes=1\
  \ p3=0\n   obj#=262 tim=4163271218304\nWAIT #14...12: nam=' cell statistics gather\
  \ ' ela= 162 cellhash#=0 p2=0 p3=0 obj#=262 tim=4163\nWAIT #14...12: nam=' cell\
  \ statistics gather ' ela= 248 cellhash#=0 p2=0 p3=0 obj#=262 tim=4163\nWAIT #14...12:\
  \ nam=' cell statistics gather ' ela= 236 cellhash#=0 p2=0 p3=0 obj#=262 tim=4163\n\
  WAIT #14...12: nam=' cell statistics gather ' ela= 250 cellhash#=0 p2=0 p3=0 obj#=262\
  \ tim=4163\n```\n\n注意\n\n您可以在第 11 章阅读更多关于 `V$CELL%` 系列视图的信息。\n\n#### Parameters\n\
  \n此事件的参数不提供额外信息。实际上，此事件的参数值甚至没有被设置。参数定义如下：\n\n*   P1 - 单元哈希值（始终为 0）\n*   P2 - 未使用\n\
  *   P3 - 未使用\n\n### User/IO 类中的次要事件\n\n正如您在引言中所读到的，Oracle 12.1.0.2 是长久以来首个引入新的 Exadata\
  \ 相关等待事件的版本。再次总结一下，这些事件是：\n\n*   cell list of blocks read request\n*   cell multi-block\
  \ read request\n*   cell physical read no I/O\n*   cell single-block read request\n\
  \n尽管在准备本章时非常谨慎，但我们无法找到一种方法来为它们生成等待，但有两个例外：`cell single block read request` 和 `cell\
  \ multi-block read request` 已被发现是执行 `DBMS_STATS.GATHER_SCHEMA_STATS` 的一部分。相应的 `SQL_ID`\
  \ 明确表明这些事件是在统计信息收集作业期间触发的。`TOP_LEVEL_SQL_ID` 可用于确认这一点。\n\n\n\n"
- "# 系统 I/O 类中的 Exadata 等待事件\n\n分配给系统 I/O 类的 Exadata 等待事件重要性较低，通常不会显示出是主要的时间消耗者。备份事件是最值得关注的，因为它们记录了在\
  \ Exadata 平台上已优化代码段的耗时。其他事件则仅是维护性事件。非备份事件列于表 10-1 中，而备份事件将在后续章节中详述。\n\n**表 10-1.\
  \ 其他系统 I/O 类事件**\n\n| 事件 | 描述 |\n| --- | --- |\n| `cell manager closing cell` |\
  \ 这是一个与关机相关的事件。此事件的单元哈希号包含在 `v$session_wait` 视图的 `P1` 列中。`P2` 和 `P3` 列未使用。 |\n|\
  \ `cell manager discovering disks` | 这是一个与启动相关的事件。此事件的单元哈希号包含在 `v$session_wait`\
  \ 视图的 `P1` 列中。`P2` 和 `P3` 列未使用。 |\n| `cell manager opening cell` | 这是一个与启动相关的事件。此事件的单元哈希号包含在\
  \ `v$session_wait` 视图的 `P1` 列中。`P2` 和 `P3` 列未使用。 |\n\n## 单元智能增量备份\n\n此事件用于衡量在进行增量\
  \ 1 级备份时等待 RMAN 的时间。Exadata 通过将大部分处理卸载到存储层来优化增量备份。新增此等待事件是为了计入等待优化的增量备份处理（已卸载到存储单元）所花费的时间。\n\
  \n未经优化的增量备份处理非常消耗资源。备份进程需要捕获自上次增量备份以来数据文件的每一次更改。执行此任务需要大量 I/O，因为必须从头到尾扫描数据文件。为了减少进行\
  \ 1 级备份所需的时间，Oracle 在 Exadata 之前很久就引入了块更改跟踪。块更改跟踪使用一个在生成重做时更新的小型二进制文件来实现。块更改跟踪文件的引入使增量备份速度提升了数倍。\n\
  \n### 事件含义\n\n有趣的是，增量 0 级备份不会导致此等待事件被写入跟踪文件，尽管 RMAN 命令中包含了“增量”一词。这是因为 0 级备份——尽管名称如此——根本不会执行增量备份。它会生成一个完整备份，并将其标记为未来增量备份的基线。以下是一个\
  \ 10046 跟踪文件的摘录，该文件生成于创建增量 1 级备份的进程，时间为 11.2.0.4 版本且启用了块更改跟踪：\n\n```\n*** 2014-07-06\
  \ 15:23:11.171\n*** SESSION ID:(200.471) 2014-07-06 15:23:11.171\n*** CLIENT ID:()\
  \ 2014-07-06 15:23:11.171\n*** SERVICE NAME:(SYS$USERS) 2014-07-06 15:23:11.171\n\
  *** MODULE NAME:(backup incr datafile) 2014-07-06 15:23:11.171\n*** ACTION NAME:(0000048\
  \ STARTED16) 2014-07-06 15:23:11.171\nWAIT #0: nam=’enq: TC - contention’ ela= 30442809\
  \ name|mode=1413677062 checkpoint ID=65586 0=0\n  obj#=-1 tim=1404678191171373\n\
  WAIT #0: nam=’enq: CF - contention’ ela= 223 name|mode=1128660997 0=0 operation=0\
  \ obj#=-1\n  tim=1404678191172055\n...\nWAIT #0: nam=’change tracking file synchronous\
  \ read’ ela= 523 block#=9344 blocks=64 p3=0\n  obj#=-1 tim=1404678192231084\nWAIT\
  \ #0: nam=’change tracking file synchronous read’ ela= 523 block#=9472 blocks=64\
  \ p3=0\n  obj#=-1 tim=1404678192231665\nWAIT #0: nam=’change tracking file synchronous\
  \ read’ ela= 501 block#=9920 blocks=64 p3=0\n  obj#=-1 tim=1404678192232261\nWAIT\
  \ #0: nam=’ cell smart incremental backup ’ ela= 150 cellhash#=379339958 p2=0 p3=0\n\
  \  obj#=-1 tim=1404678192234400\nWAIT #0: nam=’ cell smart incremental backup ’\
  \ ela= 170 cellhash#=2133459483 p2=0 p3=0\n  obj#=-1 tim=1404678192235378\nWAIT\
  \ #0: nam=’ cell smart incremental backup ’ ela= 160 cellhash#=3176594409 p2=0 p3=0\n\
  \  obj#=-1 tim=1404678192237663\nWAIT #0: nam=’KSV master wait’ ela= 70 p1=0 p2=0\
  \ p3=0 obj#=-1 tim=1404678192243295\nWAIT #0: nam=’KSV master wait’ ela= 1438 p1=0\
  \ p2=0 p3=0 obj#=-1 tim=1404678192244762\nWAIT #0: nam=’ASM file metadata operation’\
  \ ela= 57 msgop=33 locn=0 p3=0\n  obj#=-1 tim=1404678192244786\nWAIT #0: nam=’KSV\
  \ master wait’ ela= 63 p1=0 p2=0 p3=0 obj#=-1 tim=1404678192251632\nWAIT #0: nam=’KSV\
  \ master wait’ ela= 1340 p1=0 p2=0 p3=0 obj#=-1 tim=1404678192253010\nWAIT #0: nam=’ASM\
  \ file metadata operation’ ela= 62 msgop=33 locn=0 p3=0\n  obj#=-1 tim=1404678192253032\n\
  WAIT #0: nam=’ cell smart incremental backup ’ ela= 198 cellhash#=379339958 p2=0\
  \ p3=0\n  obj#=-1 tim=1404678192255205\nWAIT #0: nam=’ cell smart incremental backup\
  \ ’ ela= 214 cellhash#=2133459483 p2=0 p3=0\n  obj#=-1 tim=1404678192255495\nWAIT\
  \ #0: nam=’ cell smart incremental backup ’ ela= 212 cellhash#=3176594409 p2=0 p3=0\n\
  \  obj#=-1 tim=1404678192255802\nWAIT #0: nam=’ cell smart incremental backup ’\
  \ ela= 10 cellhash#=379339958 p2=0 p3=0\n  obj#=-1 tim=1404678192256723\nWAIT #0:\
  \ nam=’ cell smart incremental backup ’ ela= 100 cellhash#=2133459483 p2=0 p3=0\n\
  \  obj#=-1 tim=1404678192256846\n```\n\n您可以在 `change tracking file synchronous read`\
  \ 中看到块更改跟踪文件的效果。实际的备份工作——扫描自上次备份以来的数据文件更改——是在单元上执行的，这在 `cell smart incremental backup`\
  \ 事件中可见。您可以在 `v$backup_datafile` 视图中评估卸载到单元的有效性。使用 `blocks_skipped_in_cell` 列并将其与\
  \ `blocks_read` 进行关联。\n\n### 参数\n\n此事件使用的唯一参数是 `P1`，它显示哪个单元负责生成此事件：\n\n*   `P1`\
  \ - 单元哈希号\n*   `P2` - 未使用\n*   `P3` - 未使用\n*   `obj#` - 未使用\n\n**注意**\n`obj#` 字段是许多等待事件的一部分，即使是一些与特定对象无关的事件。请注意，在某些情况下，该值可能由某个事件设置，然后在等待结束时未被适当清除，导致无意义的值保留在下一个等待事件中。在前面的示例中，`obj#`\
  \ 已被清除（设置为值 -1）。\n\n## 单元从备份智能恢复\n\n此事件用于衡量在进行恢复操作时等待 RMAN 的时间。Exadata 通过将处理卸载到存储单元来优化\
  \ RMAN 恢复。\n\n\n\n### 事件含义\n\n此事件实际上记录的是恢复操作期间与文件初始化相关的时间。以下是从一个恢复进行中时采集的 `10046`\
  \ 跟踪文件中截取的片段：\n\n```sql\nWAIT #0: nam='KSV master wait' ela= 68 p1=0 p2=0 p3=0 obj#=-1\
  \ tim=1404740066131406\nWAIT #0: nam='RMAN backup & recovery I/O' ela= 3320 count=1\
  \ intr=256 timeout=4294967295\n  obj#=-1 tim=1404740066135786\nWAIT #0: nam='RMAN\
  \ backup & recovery I/O' ela= 3160 count=1 intr=256 timeout=4294967295\n  obj#=-1\
  \ tim=1404740066139862\nWAIT #0: nam='RMAN backup & recovery I/O' ela= 3201 count=1\
  \ intr=256 timeout=4294967295\n  obj#=-1 tim=1404740066143790\nWAIT #0: nam='RMAN\
  \ backup & recovery I/O' ela= 2 count=1 intr=256 timeout=2147483647\n  obj#=-1 tim=1404740066143822\n\
  WAIT #0: nam='cell smart restore from backup' ela= 853 cellhash#=2133459483 p2=0\
  \ p3=0\n  obj#=-1 tim=1404740066146969\nWAIT #0: nam='cell smart restore from backup'\
  \ ela= 137 cellhash#=379339958 p2=0 p3=0\n  obj#=-1 tim=1404740066148003\nWAIT #0:\
  \ nam='cell smart restore from backup' ela= 167 cellhash#=3176594409 p2=0 p3=0\n\
  \  obj#=-1 tim=1404740066148948\nWAIT #0: nam='cell smart restore from backup' ela=\
  \ 269 cellhash#=2133459483 p2=0 p3=0\n  obj#=-1 tim=1404740066149335\nWAIT #0: nam='cell\
  \ smart restore from backup' ela= 261 cellhash#=379339958 p2=0 p3=0\n  obj#=-1 tim=1404740066149767\n\
  WAIT #0: nam='cell smart restore from backup' ela= 375 cellhash#=3176594409 p2=0\
  \ p3=0\n  obj#=-1 tim=1404740066150294\nWAIT #0: nam='cell smart restore from backup'\
  \ ela= 124 cellhash#=3176594409 p2=0 p3=0\n  obj#=-1 tim=1404740066152236\n```\n\
  \n### 参数\n\n此事件唯一使用的参数是 `P1`，它显示了哪个存储 cell 是产生此事件的责任方。\n- `P1` - Cell 哈希值\n- `P2`\
  \ - 未使用\n- `P3` - 未使用\n\n## Exadata 中的“其他”与“空闲”类等待事件\n\n这些是相对次要的事件，主要在存储 cell 启动、关闭以及发生故障时出现。在正常运行的系统上，您可能看不到它们。但有一个例外，即\
  \ `cell smart flash unkeep` 事件。表 10-2 列出了“其他”类中与“cell”相关的等待事件及其参数。`cell smart flash\
  \ unkeep` 事件将在另一节单独介绍。\n\n**表 10-2：其他与空闲类杂项事件**\n\n| 事件 | 描述 |\n| --- | --- |\n\
  | `cell manager cancel work request` | 此事件信息量不大，因为 `v$session_wait` 视图中其三个参数 (`P1`,\
  \ `P2`, `P3`) 均未使用。 |\n| `cell worker online completion` | 这似乎是一个启动事件。此事件在 `v$session_wait`\
  \ 视图中的 `P1` 列包含了 cell 哈希值。`P2` 和 `P3` 列未使用。 |\n| `cell worker retry` | 此事件在 `v$session_wait`\
  \ 视图中的 `P1` 列包含了 cell 哈希值。`P2` 和 `P3` 列未使用。 |\n| `cell worker idle` | 在此空闲事件中，`v$session_wait`\
  \ 视图中的 `P1`、`P2` 和 `P3` 列均未使用。 |\n\n### cell smart flash unkeep\n\n此事件记录了当 Oracle\
  \ 必须将数据块从 Exadata 智能闪存缓存中刷新出来时所花费的等待时间。当一个表（其存储子句指定它应固定在 Exadata 智能闪存缓存中）被截断 (`TRUNCATE`)\
  \ 或删除 (`DROP`) 时，就可能发生这种情况。这是一个重要的区别。从 Exadata `11.2.3.3.0` 版本开始，cell 软件会自动缓存来自单块\
  \ I/O 以及智能扫描 (`Smart Scans`) 的数据。这使得下一次扫描可以同时从磁盘和闪存读取，从而显著提升性能。在 `11.2.3.3.0` 之前，需要手动将表和分区固定\
  \ (`PIN`) 在闪存缓存中。\n\n通过一个例子来理解会更容易。考虑以下用例：数据库 `DB12C` 中的表 `T1` 的数据对象 ID 为 `79208`。在该表创建并对其进行了一些智能扫描形式的轻量级查询活动后，您可以观察到类似以下模式的输出：\n\
  \n```bash\n[oracle@enkdb03 ~]$ dcli -g cell_group -l cellmonitor \\\n> \"cellcli\
  \ -e list flashcachecontent where objectNumber = 79208 detail\" | grep cache\nenkcel04:\
  \ cachedKeepSize:        0\nenkcel04: cachedSize:            4374528\nenkcel04:\
  \ cachedWriteSize:       4358144\nenkcel05: cachedKeepSize:        0\nenkcel05:\
  \ cachedSize:            5521408\nenkcel05: cachedWriteSize:       5521408\nenkcel06:\
  \ cachedKeepSize:        0\nenkcel06: cachedSize:            5177344\nenkcel06:\
  \ cachedWriteSize:       5177344\n```\n\n如您所见，得益于智能扫描，缓存中已经填充了数据——尽管在 `CELL_FLASH_KEEP`\
  \ 子句中并未指定 `KEEP` 关键字。同样由于此原因，您也可以看到 `KEEP` 大小为 0。\n\n\n\n### 事件含义\n\n在当前阶段，截断或删除表对智能闪存缓存没有即时影响。那么，你何时会看到这个事件呢？\n\
  \n回到`CELL_FLASH_CACHE`子句：一旦存储子句被更改为`KEEP`，单元格将开始缓存表中的数据，填充`cachedKeepSize`的值。在上一个例子中，需要再执行几次查询，直到\
  \ keep 缓存被填充：\n\n```\n[oracle@enkdb03 ~]$ dcli -g cell_group -l cellmonitor \\\n\
  > \"cellcli -e list flashcachecontent where objectNumber = 79208 detail\" | grep\
  \ cache\nenkcel04: cachedKeepSize:        1239744512\nenkcel04: cachedSize:    \
  \        1243955200\nenkcel04: cachedWriteSize:       5365760\nenkcel05: cachedKeepSize:\
  \        1406525440\nenkcel05: cachedSize:            1410203648\nenkcel05: cachedWriteSize:\
  \       5980160\nenkcel06: cachedKeepSize:        1355415552\nenkcel06: cachedSize:\
  \            1358880768\nenkcel06: cachedWriteSize:       6381568\n```\n\n如果你现在截断表，它将显示`cell\
  \ smart flash unkeep`事件。以下是一个针对`truncate`语句的 tkprof 示例：\n\n```\ntruncate table t1\n\
  \ncall     count       cpu    elapsed       disk      query    current        rows\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  Parse        1      0.00       0.00          0          6          0           0\n\
  Execute      1      0.24       0.57         12        480       5667           0\n\
  Fetch        0      0.00       0.00          0          0          0           0\n\
  ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
  total        2      0.24       0.58         12        486       5667           0\n\
  \nMisses in library cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user\
  \ id: 198\n\nElapsed times include waiting on following events:\n  Event waited\
