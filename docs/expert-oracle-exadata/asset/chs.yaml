  ## 定义集群


  “定义集群”界面（图 8-13）允许管理员选择将在单个 Exadata 机架中安装的独立集群的数量。此选择界面简化了在单个 Exadata 机架内创建独立 ASM
  和数据库集群所需的操作。管理员可以选择机架上的哪些计算和存储服务器将专用于每个已定义的集群。典型配置通常只涉及一个集群——这正是本示例中将要配置的情况。


  ![A978-1-4302-6242-8_8_Fig13_HTML.jpg](img/A978-1-4302-6242-8_8_Fig13_HTML.jpg)


  图 8-13. 定义集群界面


  ## 集群 (n)


  在上一界面中定义的每个集群都将拥有自己的集群详细信息页面（图 8-14）。“集群 (n)”界面要求输入该集群的所有特定详细信息。这包括所有虚拟 IP 地址的命名约定、操作系统账户的
  UID 和 GID、Oracle 软件主目录安装详细信息以及 ASM 磁盘组配置。首先，枚举计算节点的 DNS 和 NTP 服务器，然后是软件账户所有权详细信息。接下来，管理员定义
  Oracle 软件主目录和补丁级别。默认情况下，Oracle 使用 `最优灵活架构 (OFA)` 标准来命名软件主目录。大多数 Exadata 安装都采用 `OFA`
  标准，因为使用 `OFA` 时，Oracle 配置实用程序可以保证正常工作。可以更改软件位置，但请记住，出厂 Exadata 映像包含一个较大的 `/u01`
  文件系统和一个非常小的 `/` 文件系统。如果您希望将软件移至 `/u01` 以外的文件系统，此配置将没有足够的磁盘空间。


  ![A978-1-4302-6242-8_8_Fig14_HTML.jpg](img/A978-1-4302-6242-8_8_Fig14_HTML.jpg)


  图 8-14. 集群 (n) 界面


  在目录结构之后，“集群 (n)”界面允许用户设置其 ASM 磁盘组名称和冗余级别。默认情况下，数据库机前缀（在“客户详细信息”界面中选择）会附加到磁盘组名称的末尾。随着磁盘组冗余级别的选择，磁盘大小设置将动态变化。通常，Oracle
  会使用 `DATA` 和 `RECO` 80%/20% 的拆分比例，假设 `DATA` 磁盘组会更大。对于希望为其快速恢复区域 (`FRA`) 创建更大磁盘组的客户，界面中提供了一个复选框，以便为
  `RECO` 磁盘组分配更多空间。在规划 ASM 磁盘组冗余时，请考虑以下因素：


  *   **高冗余**：每个区都写入三个副本。此配置会显著减少磁盘组中的可用空间。根据 Oracle 的建议，它最好在磁盘空间不是问题时，或者在计划以滚动方式应用所有
  Exadata 补丁时使用。

  *   **正常冗余**：每个区写入两个副本。虽然它为磁盘组提供了相当多的可用空间，但请记住，如果包含相同数据的两个磁盘同时丢失，将导致 ASM 卸载您的磁盘组。如果发生这种情况，使用这些磁盘组的数据库也将离线。在应用滚动存储服务器补丁时，一次将有
  12 个磁盘离线，只留下一份数据副本可用。


  在考虑哪种保护方案适合您时，请想想您对系统停机的容忍度。正常冗余提供更多存储空间，但对磁盘/单元故障的保护较少。除非您能承受数据库长时间停机，否则对于 `DATA`
  磁盘组应倾向于选择高冗余。如果您能承受在解决瞬时磁盘/单元故障期间的停机，或者在最坏的情况下等待完整的数据库恢复，那么也许为 `RECO` 磁盘组选择高冗余更合适。如果空间非常紧张，并且您可以容忍此类停机，那么您可以考虑将所有磁盘组的冗余都设置为正常。值得说明的是，大多数
  Exadata 客户将其 Exadata 机架配置为正常冗余。


  您的 `DBFS_DG` 磁盘组的冗余级别（在大多数配置中用于存储 `OCR` 和投票文件）将自动设置为正常冗余。如果可用（在半机架或更大机架的配置中），`OneCommand`
  会将 `OCR` 和投票文件移动到高冗余磁盘组。


  示例数据库的名称（`dbm`）已包含在内，以及块大小和数据库类型。通常，`dbm` 数据库在系统安装后不久即被删除。通常使用 8192 的块大小——请记住，Smart
  Scans 不会返回整个块，而只返回会话请求的数据。`OLTP`/`DW` 数据库类型大多无关紧要，因为 Exadata 配置实用程序会为 `OLTP` 和数据仓库工作负载创建
  `数据库配置助手 (DBCA)` 模板。


  最后，该界面包含与配置集群成员的客户端和备份网络接口相关的信息。在此部分，您可以定义客户端网络上使用的虚拟 IP 接口的命名标准，以及 `单客户端访问名称 (SCAN)`
  功能将使用的主机名。您还可以配置备份网络（如果使用）所使用的命名约定。


  如果配置了多个集群，下一个界面将为要配置的下一个集群请求相同的信息。对所有剩余要构建的集群重复此过程。表 8-7 详细列出了“集群 (n)”界面上的字段。


