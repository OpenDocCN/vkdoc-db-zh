  在应用任何 Exadata 存储服务器补丁之前，请务必查阅该补丁的 `README` 文件以及通过 MOS 注释 #888828.1 找到的补充说明。这些文档将包含已知问题和解决方法，在您的打补丁过程中可能非常有价值。


  ### 升级计算节点


  Exadata 存储服务器补丁中包含的另一个组件是计算节点的相应补丁。由于计算节点和存储服务器都应运行相同的操作系统内核和版本，Oracle 会发布一个单独的补丁，其中包含一个
  `yum` 仓库，该仓库包含升级主机所需的所有 Linux 软件包。由于计算节点不是可以轻松重新镜像的封闭系统，Oracle 通过标准的 Linux `yum
  update` 方法提供操作系统和固件更新。早期的使用 `yum updated` 方法的补丁提供了多种执行更新的方式——通过 Oracle 的 Unbreakable
  Enterprise Linux 网络在互联网上更新、从本地 `yum` 仓库更新，或通过 Oracle 支持通过单独的补丁下载提供的 ISO 镜像文件更新。Oracle
  现在提供了一个名为 `dbnodeupdate.sh` 的辅助脚本，使得升级过程非常直接。使用 `dbnodeupdate.sh` 最常见的补丁应用方法是通过包含
  `yum` 仓库的 ISO 镜像文件。使用基于补丁文件创建的仓库的最大好处之一是它保证了更新之间的一致性。如果您和大多数人一样，您的非生产环境机器会在生产系统之前打补丁。这为补丁的“稳定运行”提供了时间，并且任何问题都可以通过测试发现。当您使用公共仓库获取补丁时，您无法控制应用哪些版本的补丁。Oracle
  支持创建的仓库文件是一个静态文件，除非补丁版本号发生变化，否则不会更新。此外，通过使用本地主机仓库，无需多次下载补丁，也无需服务器直接连接到互联网。




  '
- '# 使用 dbnodeupdate.sh 应用补丁


  `dbnodeupdate.sh` 脚本可用于协助完成计算节点操作系统和固件的升级过程。如前所述，Oracle 支持部门会定期发布新版本的 `dbnodeupdate.sh`
  脚本。该脚本可通过补丁号 #16486998 获取。虽然 `dbnodeupdate.sh` 主要用于升级操作系统，但它还执行若干附加任务。由于“最佳实践”会不断演进，新的实践优于旧版，`dbnodeupdate.sh`
  会例行检查以确保您的计算节点遵循 MOS 笔记 #757552.1 中的指导原则。此类检查的一个例子是 Oracle 更改了分配给 Linux 操作系统的内存量（内核参数
  `vm.min_free_kbytes`）的最低建议值。在许多早期部署中，仅分配了约 50MB。在客户因操作系统内存不足而开始看到节点被逐出集群后，建议值提高到了约
  512MB。由于许多客户可能在篇幅很长的笔记中看不到该建议，`dbnodeupdate.sh` 脚本会检查并在下次运行时更改此设置。这只是 `dbnodeupdate.sh`
  在需要时可以实施的修复措施之一。其他版本将包含针对该版本发布后发现的各种漏洞的安全修复（特别是 BASH 的“Shellshock”漏洞）。


  `dbnodeupdate.sh` 脚本的另一个关键特性是它利用 Linux 原生的逻辑卷管理 (LVM) 功能。由于 Exadata 上的文件系统布局——`/`
  是一个 30GB 的逻辑卷，而 `/u01` 是一个 100GB 的逻辑卷——在进行任何更改之前，可以轻松地对根文件系统进行备份。虽然此选项自 X2-2 发布以来就已可用，但许多客户在升级操作系统前并未进行快照备份。使用
  `dbnodeupdate.sh` 时，会自动创建备份。尽管方法与 Exadata 存储服务器所用的不同，但概念相似。Exadata 存储服务器采用就地补丁机制。在
  Exadata 计算节点上，非活动卷仅在需要回退时使用——除非发生故障，否则补丁是直接应用在原位置的。默认的根文件系统位于 `VGExaDb-LVDbSys1`
  逻辑卷上。首次运行 `dbnodeupdate.sh` 时，将创建一个新的逻辑卷 `VGExaDb-LVDbSys2`。如果之前运行过 `dbnodeupdate.sh`，则该卷将在下次运行时被覆盖。此卷将用于在脚本运行时创建原始活动卷的完整备份。首先，获取根文件系统的快照，并将其挂载到
  `/mnt_snap`。在非活动根卷（通常为 `VGExaDb-LVDbSys2`）创建后，将其挂载到 `/mnt_spare`，并使用 `tar` 工具将快照内容复制到
  `/mnt_spare`。将所有内容复制到 `/mnt_spare` 后，卸载该卷并删除快照卷。现在可能是个好时机提醒一下，如果增大根文件系统的大小，备份肯定会花费更长时间。此外，需要在卷组中预留额外空间以容纳更大的根卷。请记住，只有根文件系统会被
  `dbnodeupdate.sh` 备份，因为该脚本不会修改 `/u01` 上的任何文件。同样也会创建 `/boot` 文件系统的副本，以防需要备份。表 1 描述了可与
  `dbnodeupdate.sh` 一起使用的可用标志。


  表 16-1. 与 dbnodeupdate.sh 一起使用的标志


  | 标志 | 描述 |

  | --- | --- |

  | -u | 将计算节点更新到新版本 |

  | -r | 将计算节点回退到先前版本 |

  | -c | 执行补丁后或回退后操作 |

  | -l -s -q -n -p -v -t -V | 包含 ISO 文件的 zip 文件的 URL 或位置 运行前关闭 Clusterware 栈 安静模式—与
  -t 一起使用 禁用文件系统备份 引导阶段，当从版本 11.2.2.4.2 更新时使用 仅运行—仅验证先决条件 与 –q 一起使用以指定要更新到的版本 打印版本号
  |


  运行 `dbnodeupdate.sh` 之前，请下载包含所需补丁级别对应 ISO 的补丁。将该文件以及包含 `dbnodeupdate.sh` 脚本的补丁放置到每个计算节点上。虽然
  `dbnodeupdate.sh` 可以通过 HTTP 从 yum 仓库拉取，但 ISO 方法已被证明更为直接。`dbnodeupdate.sh` 的每次运行分为两个阶段——升级/回退阶段和收尾阶段。就像
  `OPatch` 的 `auto` 功能一样，`dbnodeupdate.sh` 执行许多原本需要单独执行的不同任务。首先，`dbnodeupdate.sh`
  将关闭并解锁 grid infrastructure 主目录，然后备份根文件系统。接下来，`dbnodeupdate.sh` 将包含补丁仓库的 zip 文件解压到临时位置，挂载该
  ISO，并更新 `/etc/yum.repos.d/Exadata-computenode.repo` 文件以使用 RPM 软件包的位置。执行 yum 更新，系统随后重启。在主机重启期间，固件组件会进行升级。通常，固件更新包括
  InfiniBand HCA、RAID 控制器、BIOS 和 ILOM。升级过程采用与存储服务器相同的方法——运行 `/opt/oracle.cellos/CheckHWnFWProfile`
  脚本，将固件版本与支持的版本注册表进行比较。如果有组件不匹配，则将其刷新到预期版本。所有固件更新应用完毕后，主机将重新启动。


  主机重启后，当 `imageinfo` 命令显示升级成功，必须再次运行 `dbnodeupdate.sh` 脚本来“完成”升级。此模式将验证 yum 更新是否成功，清理
  yum 缓存，为 RDS 协议重新链接 Oracle 主目录，并启动 Clusterware 及其在启动时启用。此步骤完成后，主机即可重新投入使用。


  '
- '# 升级 Exadata 计算节点


  本练习演示如何将 Exadata 计算节点升级到版本 12.1.1.1.1。


  从 MOS 笔记 #888828.1 中找到并下载最新版本的 `dbnodeupdate.sh` 实用程序和所需的补丁 ISO。在此示例中，`dbnodeupdate.sh`
  可作为补丁号 16486998 获取，而 ISO 文件位于补丁号 18889969 中。在此示例中，两个文件都下载到 `/u01/stage/patches`
  目录。解压包含 `dbnodeupdate.sh` 的补丁文件。


  ```

  # cd /u01/stage/patches

  # unzip p16486998_121111_Linux-x86-64.zip

  ```


  运行 `dbnodeupdate.sh` 脚本，指定补丁文件位置。


  ```

  # ./dbnodeupdate.sh –u –l /u01/stage/patches/p18889969_121111_Linux-x86-64.zip -s

  ```


  计算节点重启且 `imageinfo` 显示成功状态后，使用 `dbnodeupdate.sh` 完成升级。


  ```

  # imageinfo

  Kernel version: 2.6.39-400.128.17.el5uek #1 SMP Tue May 27 13:20:24 PDT 2014 x86_64

  Image version: 12.1.1.1.1.140712

  Image activated: 2014-12-08 04:42:43 -0500

  Image status: success

  System partition on device: /dev/mapper/VGExaDb-LVDbSys1


  # cd /u01/stage/patches

  # ./dbnodeupdate.sh –c

  ```


  这些步骤可以逐节点执行以进行滚动补丁，也可以在每个节点上并行执行以进行完全停机更新。





  #### 使用 `dbnodeupdate.sh` 回滚补丁


  回滚计算节点的过程与升级过程非常相似。调用 `dbnodeupdate.sh` 脚本并使用 `-r` 标志即可回滚到计算节点操作系统的先前版本。此操作将更改非活动逻辑卷的文件系统标签（即运行更新时创建的备份），并重新配置
  GRUB 引导加载程序以使用此卷。主机将重新启动，当它恢复运行时，将处于补丁发布之前的状态。因此，在决定回滚之前，务必避免在主机上发生过多变更。任何密码或配置设置都将与补丁发布时的系统相匹配。


  ### 升级 InfiniBand 交换机


  虽然更新发布很少，但 Exadata 环境中的 InfiniBand 交换机必须定期更新。这些更新一直如此罕见，以至于几乎每次发布都包含了不同的安装方法。Oracle
  似乎已标准化将交换机固件与 Exadata 存储服务器补丁版本捆绑在一起，并使用 `patchmgr` 实用程序来应用更新。这是合理的，因为 InfiniBand
  交换机补丁通常与存储服务器版本同时发布。通过使用 `patchmgr`，语法将保持熟悉，方法也将趋于稳定。


  与存储服务器补丁一样，升级 InfiniBand 交换机是一个两步过程。首先进行先决条件检查，然后是交换机的实际升级。虽然步骤相同，但语法略有不同。存储服务器补丁使用
  `-patch_check_prereq` 标志，而 InfiniBand 补丁使用 `-ibswitch_precheck` 标志。存储服务器上的补丁使用 `-patch`
  标志应用，而 `-upgrade` 用于将更新应用到 InfiniBand 交换机。`patchmgr` 脚本仍然使用一个包含 InfiniBand 交换机名称的文件，就像修补存储服务器时一样。InfiniBand
  交换机更新总是以滚动方式应用，一次一个交换机。使用 `patchmgr` 应用这些补丁时，会在每个交换机修补前后执行验证测试。这些补丁可以在 Clusterware
  堆栈联机时应用，无需系统范围内的停机。


  #### 升级 Exadata InfiniBand 交换机


  本练习演示将 Exadata InfiniBand 交换机升级到包含在 Exadata 存储服务器版本 `12.1.1.1.1` 中的 `2.1.3-4` 版本。


  在用于应用 Exadata 存储服务器补丁的同一节点上，收集 InfiniBand 交换机的名称。请注意，在包含其他 Oracle 工程系统的环境中，并非所有
  InfiniBand 交换机都需要升级。（`Exalogic` 和 `Big Data Appliance` 包含使用不同固件的“网关”交换机。）寻找标记为 "SUN
  DCS 36P" 的交换机，这些是需要修补的交换机。


  ```

  [root@enkx3db01 ~]# ibswitches

  Switch : 0x002128ac ports 36 "SUN DCS 36P QDR enkx3sw-ib3 x.x.x.x" enhanced port
  0 lid 1 lmc 0

  Switch : 0x002128ab ports 36 "SUN DCS 36P QDR enkx3sw-ib2 x.x.x.x" enhanced port
  0 lid 2 lmc 0

  ```


  创建一个名为 `ibswitches.lst` 的文本文件，其中包含要修补的 InfiniBand 交换机的名称。


  ```

  # cd /u01/stage/patches/patch_12.1.1.1.1.140712

  # cat ibswitches.lst

  enkx3sw-ib2

  enkx3sw-ib3

  ```


  运行带有 `-ibswitch_precheck` 标志的 `patchmgr` 以确保一切已准备就绪。`patchmgr` 脚本将要求输入所有交换机的 root
  密码，并验证连接性以及其他测试（可用空间、`verify-topology` 输出等）。如果脚本成功返回，即可准备应用补丁。


  ```

  # cd /u01/stage/patches/patch_12.1.1.1.1.140712

  # ./patchmgr –ibswitches ibswitches.lst –upgrade –ibswitch_precheck

  ```


  使用 `patchmgr` 脚本应用补丁。每个交换机将按顺序修补，就像 `patchmgr` 执行滚动 Exadata 存储服务器补丁一样。在所有交换机修补完成或发生错误之前，该脚本不会返回到提示符。


  ```

  # cd /u01/stage/patches/patch_12.1.1.1.1.140712

  # ./patchmgr –ibswitches ibswitches.lst –upgrade

  ```


  与 Exadata 存储服务器补丁不同，InfiniBand 交换机上不需要任何清理操作。补丁完成后，即可进入流程的下一个环节。


  ### 将补丁应用于备用系统


  回顾本章描述的所有补丁，很容易会想，“我永远无法获批停工来应用所有这些补丁！”Oracle 为了减少与补丁相关的实际停机时间，提供了一项功能：自数据库版本 `11.2.0.2`
  以来，每个 Exadata 补丁都支持“备用优先”打补丁。使用此方法，唯一的数据库停机时间就是执行 Data Guard 切换到备用系统所需的时间。只需提前将所有补丁应用到备用系统，将数据库切换到新修补的系统，然后修补原始的主系统。此时，您可以选择切换回原始主系统，或者继续以角色反转的状态运行。在下一个补丁周期，只需重复此过程。使用此方法可以展示审计员喜欢的两点——成功的灾难恢复测试和最新的数据库。在“备用优先”模式下应用补丁的步骤非常简单：


  1.  通过滚动或全停机方法将季度补丁应用于备用系统。补丁可包括 Exadata 存储服务器、计算节点、QDPE 和 InfiniBand 交换机升级。也可以执行
  Grid Infrastructure 补丁集升级，因为它们不影响 Oracle Data Guard。不要在备用数据库上运行修补后脚本（`catbundle.sql`
  或 `datapatch`），因为这些脚本需要在所有 Oracle 主目录修补完成后运行。

  2.  使用 Active Data Guard、快照备用数据库或其他方式对备用数据库执行测试。

  3.  对主集群上的所有数据库执行 Data Guard 角色切换到辅助集群。

  4.  通过滚动或全停机方法将季度补丁应用于主系统。这些补丁应与步骤 1 中应用于备用系统的补丁相同。

  5.  按照补丁自述文件中的说明，在主数据库实例上执行修补后步骤（`catbundle.sql` 或 `datapatch`）。

  6.  如果需要，将数据库切换回原始主集群。


  唯一不能使用“备用优先”方法应用的补丁类型是数据库补丁集升级。这些升级涉及更改版本号（从 `11.2.0.3` 到 `11.2.0.4`，或从任何版本升级到 Oracle
  数据库 `12c`）。这些升级无法通过“备用优先”方法完成，因为它们需要升级数据库目录。这不是 Exadata 的限制，而是 Oracle 数据库本身的限制。从高层次来看，在
  Data Guard 配置中升级数据库需要在具有新版本的主目录中启动备用数据库，并从主库运行升级脚本。这适用于主要版本内的补丁集升级（`11.2.0.3` 到
  `11.2.0.4` 或 `12.1.0.1` 到 `12.1.0.2`），或主要版本之间的升级（例如，`11.2.0.3` 到 `12.1.0.2`）。数据库内的组件被升级，更改通过
  Data Guard 传播。有关此过程的更多详细信息，请参阅 附录 B 中提到的 MOS 说明。它们实际上非常详尽，并系统地逐步讲解了整个过程。





  '
- "# 17. 摒弃一些我们曾自以为知道的东西\n\n## 摘要\n\n希望本章有助于缓解许多人在首次为其 Exadata 打补丁时所感到的焦虑。与其他任何事情一样，随着补丁应用次数的增加，这个过程会越来越熟悉。尽管在\
  \ Exadata 的早期阶段，补丁发布是**成败难料的尝试**，但在过去几年里，补丁版本已经稳定得多。这可归因于多种因素——平台的成熟、更好的测试以及不断增长的客户群。应用\
  \ Exadata 补丁时，最好的建议是多次阅读文档并保持**十足的耐心**。在应用 QDPE 时仔细查看 `OPatch` 日志，会揭示出先前安装的补丁被回滚时的警告。在检查\
  \ Exadata 存储服务器补丁的内部情况时，你可能会看到看似错误的信息。请相信 `patchmgr` 脚本能够筛选出哪些可以忽略，哪些是实际错误。如果确实发生故障，`patchmgr`\
  \ 会给出适当的警告，表明发生了故障。与其他任何软件版本一样，在补丁发布后等待一小段时间再应用是个好主意。该平台能够为堆栈中的每个组件提供一套统一的补丁，这是其他厂商在\
  \ Oracle 数据库方面无法提供的。\n\nOracle 在 Exadata 上运行时，可以做一些与在非 Exadata 平台上运行时非常不同的事情。Exadata\
  \ 提供的优化旨在采取一种不同于 Oracle 传统遵循的方法。这种改变意味着你需要以不同的思路来处理某些问题。这并不是说一切都不同——恰恰相反。事实上，大多数基本原则保持不变。毕竟，在\
  \ Exadata 上运行的数据库软件与在其他平台上运行的是相同的。但有些事情就是不一样。正如你在第 13 章读到的，你可以直接将你的数据库 1:1 地部署到\
  \ Exadata 上。根据部署类型，这可能是可以的。然而，如果你有兴趣从投资中获取最大收益，你可能需要退一步，审视一下你可以做些什么来进一步优化 Exadata\
  \ 上的数据库。由于与标准非 Exadata 部署相比，Exadata 上有一些不同之处，因此本章值得在你迁移的第二阶段阅读。在本章中，我们将重点讨论在 Exadata\
  \ 上运行数据库时，应如何改变我们的方法。\n\n## 两种系统的故事\n\n我们思考运行在 Exadata 上的系统的方式，在很大程度上取决于执行的工作负载。面向在线事务处理（OLTP）的工作负载倾向于让我们专注于使用\
  \ `Smart Flash Cache` 来加速小型物理读取。但坦白说，这类工作负载无法利用 Exadata 提供的大部分性能优势。面向数据仓库（DW）的工作负载倾向于抓住一切机会利用\
  \ `Smart Scans`，并尝试使用所有可用资源（例如，存储和数据库层上的 CPU 资源）。这是 Exadata 内置优势能产生最大影响的地方。不幸的是，大多数系统都同时表现出\
  \ DW 和 OLTP 工作负载的特征。这些“混合工作负载”是最困难的，而且具有讽刺意味的是，也是最常见的。它们之所以最常见，是因为很难找到一个面向 OLTP\
  \ 的系统不包含某些产生长时间运行、对吞吐量敏感的查询的报告组件。同样常见的是，面向 DW 的工作负载具有类似 OLTP 的缓慢滴入式数据流或类似的抽取、加载、转换（`ELT`）处理需求。这些组合系统需要最困难的思考过程，因为根据具体问题，你必须不断重置管理性能的方法。它们也很困难，因为\
  \ DW 工作负载通常受控制吞吐量的数据流动态限制，而 OLTP 系统通常受延迟问题限制。因此，对于混合工作负载，你基本上需要训练自己评估每种情况，并将其归类为延迟敏感型或吞吐量敏感型。这种对工作负载特征的评估应在开始任何分析之前完成。\n\
  \n如果你认为那是一个有趣的挑战，那么第三个变量也可能被引入。如今部署的 Exadata 系统很少只托管一个应用程序。虽然在前两代产品推出时，将关键应用程序放置在\
  \ Exadata 上相当常见，但 `Smart Flash Cache` 以及磁盘容量的增加，加上 Intel 提供的日益增长的 CPU 算力，使得 Exadata\
  \ 成为一个有趣的整合平台。这一点已被许多用户认识到，因此，你经常需要在同一硬件上安排多个数据库的需求——这些数据库可能具有混合的工作负载需求——而不是一个具有混合工作负载需求的数据库。值得庆幸的是，Oracle\
  \ 提供了工具来处理这种情况。\n\n## 面向 OLTP 的工作负载\n\n尽管关于在 Exadata 上运行 OLTP 工作负载没有太多可说的，但对此类系统仍有几点需要牢记。由于\
  \ Exadata 运行标准的 Oracle 数据库软件，因此你无需大幅调整基本方法。\n\n\n\n### Exadata 智能闪存缓存（ESFC）\n\n\
  在处理 `OLTP` 工作负载时，Exadata 的关键组件是 Exadata 智能闪存缓存（`ESFC`），它可以显著减少小规模读取的磁盘访问时间。因此，验证\
  \ `ESFC` 是否正常工作至关重要。对于此类工作负载，您还应该预期大部分物理 `I/O` 操作是由 `ESFC` 满足的。通过查看平均单块读取时间可以相当容易地推断出这一点。如果是由闪存缓存满足的，单块读取应大约需要\
  \ 0.5 毫秒。相比之下，如果是由实际磁盘读取满足的，单块读取平均大约需要 5 毫秒。标准的 `AWR` 报告会提供平均值和等待事件的直方图。如果平均单块读取时间远高于\
  \ 1 毫秒范围，您应该寻找系统性问题——例如闪存卡未工作或关键表被定义为永不缓存（使用 `CELL_FLASH_CACHE NONE` 语法）。还应检查 `I/O`\
  \ 资源管理。还应使用直方图来验证平均值是否掩盖了大量的异常值。以下是用于检查闪存卡状态的 `cellcli` 语法：\n\n```\nCellCLI> list\
  \ flashcache detail\n\n      name:                   dm01cel03_FLASHCACHE\n    \
  \  cellDisk:               FD_00_dm01cel03,FD_01_dm01cel03,FD_02_dm01cel03,\n  \
  \                            FD_03_dm01cel03,FD_04_dm01cel03,FD_05_dm01cel03,\n\
  \                              FD_06_dm01cel03,FD_07_dm01cel03,FD_08_dm01cel03,\n\
  \                              FD_09_dm01cel03,FD_10_dm01cel03,FD_11_dm01cel03,\n\
  \                              FD_12_dm01cel03,FD_13_dm01cel03,FD_14_dm01cel03,FD_15_dm01cel03\n\
  \      creationTime:           2010-03-22T17:39:46-05:00\n      id:            \
  \         850be784-714c-4445-91a8-d3c961ad924b\n      size:                   365.25G\n\
  \      status:                 critical\n```\n\n请注意，此单元上的 `status` 属性是 `critical`。正如您可能预料的那样，这不是一件好事。在这个特定系统上，闪存缓存基本上已经自行禁用。我们注意到它是因为单块读取时间已经变慢。此示例来自早期版本的\
  \ `cellsrv`。后期版本包含更多信息。以下是 `cellsrv` 12.1.2.1.0 的一个示例：\n\n```\nCellCLI> list flashcache\
  \ detail\n\n         name:                   enkx4cel01_FLASHCACHE\n         cellDisk:\
  \               FD_04_enkx4cel01,FD_06_enkx4cel01,FD_11_enkx4cel01,\n          \
  \                       FD_02_enkx4cel01,FD_13_enkx4cel01,FD_12_enkx4cel01,\n  \
  \                               FD_00_enkx4cel01,FD_14_enkx4cel01,FD_03_enkx4cel01,\n\
  \                                 FD_09_enkx4cel01,FD_10_enkx4cel01,FD_15_enkx4cel01,\n\
  \                                 FD_08_enkx4cel01,FD_07_enkx4cel01,FD_01_enkx4cel01,\n\
  \                                 FD_05_enkx4cel01\n         creationTime:     \
  \      2015-01-19T21:33:37-06:00\n         degradedCelldisks:\n         effectiveCacheSize:\
  \     5.8193359375T\n         id:                     3d415a32-f404-4a27-b9f2-f6a0ace2cee2\n\
  \         size:                   5.8193359375T\n         status:              \
  \   normal\n```\n\n注意新属性 `degradedCelldisks`。还要注意，此单元上的闪存缓存显示 `status` 为 `normal`。监控存储软件行为将在第\
  \ 12 章中更详细地介绍。\n\n#### 可扩展性\n\n处理 `OLTP` 工作负载时要记住的另一点是，Exadata 平台提供了卓越的可扩展性。从半机架升级到全机架会使数据库层和存储层的\
  \ CPU 数量都增加一倍。`ESFC` 的数量以及可用内存也增加一倍。这使得 Exadata 对于许多系统能够以近乎线性的方式进行扩展。\n\n为了说明这一点，我们可以分享一个小轶事。在研讨会上介绍\
  \ Exadata 智能扫描功能时，我们过去常常针对一个禁用了所有 Exadata 优化的表运行查询，最初是在 X2-2 四分之一机架上进行纯硬盘访问。当 X4-2\
  \ 推出时，我们有幸使用了一个 X4-2 半机架。抛开 CPU 差异不谈，使用三个单元与七个单元之间的差异是惊人的。再加上表的大部分内容通过 `ESFC` 提供服务，您可以想象响应时间会急剧下降。为了回到我们习惯的耗时水平，我们不得不显著增加表的大小。这只是\
  \ Exadata 在不需要对应用程序本身进行任何更改的情况下扩展得非常好的一个例子。\n\n### 写密集型 OLTP 工作负载\n\n写密集型工作负载是面向\
  \ `OLTP` 的系统的一个子集。有些系统只是不断地执行单行插入然后提交，或者换一种说法，采用“逐行”（slow-by-slow (row-by-row)）的方法。这些系统通常受到提交速度的限制，而提交速度通常取决于写入日志文件的速度。这是\
  \ Exadata 在默认直写模式下运行 `ESFC` 时与其他平台处于相对公平竞争环境的一个领域。对于因写入操作而遇到瓶颈的系统，没有重大增强功能能使 Exadata\
  \ 的运行速度快上几个数量级。闪存日志记录可以在这里提供帮助。从 `cellsrv` 11.2.2.4 开始，Exadata 会同时将重做日志写入磁盘和闪存设备。最先完成的那个“胜出”，允许日志写入器继续处理，而另一个写入则继续完成。此外，随着\
  \ X5 硬件代的推出，磁盘控制器上的缓存已翻倍至 1GB。\n\n智能闪存日志记录并非万能药，对于这些类型的系统来说，已经建立的调优方法——例如最小化提交——要合适得多。将逐行处理改为基于集合的处理所能带来的性能提升会让您感到惊讶，甚至无需考虑硬件！许多网站，最著名的可能是\
  \ Tom Kyte 的 Ask Tom，都有大量参考资料，展示每次完成某些工作后就进行逐行处理并提交的方式对性能是次优的。\n\n日志写入器并不是唯一渴望低延迟\
  \ `I/O` 性能的组件。在 Exadata 版本 11.2.3.2.1 之前，使用直写模式的智能闪存缓存是唯一可用的选项。从 11.2.3.2.1 开始，可以使用回写模式的闪存缓存。顺便说一下，切换到回写模式并不会消除对闪存日志的需求——切换后您仍然会发现它被定义。启用回写模式可以提高写密集型工作负载的性能，正如您在第\
  \ 5 章中看到的那样。但是，您应该使用前述第 5 章中关于闪存缓存的信息，仔细评估使用回写缓存是否值得。\n\n### 面向数据仓库的工作负载\n\nExadata\
  \ 最初设计用于加速针对海量数据的长时间运行查询。因此，数据仓库是我们需要改变一些基本思维模式的地方，这不足为奇。当然，主要技术之一是不断寻找机会让 Exadata\
  \ 优化发挥作用。这意味着确保应用程序能够利用智能扫描。\n\n\n#### 启用智能扫描\n\n在处理面向数据仓库（DW）的工作负载时，需要牢记的最重要的概念是：长运行语句通常应当被卸载执行。以下是需要遵循的步骤：\n\
  \n确定是否正在使用智能扫描。如果未使用，请进行调整以确保其被使用。\n\n这些要点看似如此显然，以至于几乎无需赘述。Exadata 中内置的大部分优化功能仅在启用智能扫描时才生效。你需要做出的首要思维转变之一，就是训练自己持续思考智能扫描是否被恰当地使用。这意味着你需要深入了解哪些语句（或语句的哪些部分）可以被卸载，并能够判断语句是否正在被卸载。本书已广泛涵盖了智能扫描的要求以及一些可用于验证其是否在执行的技术。但为了避免遗漏，这里再次说明。\n\
  \n本质上，智能扫描的发生需要满足两个主要前提条件。第一，优化器必须选择对表或物化视图进行全表扫描，或者优化器必须选择对索引进行快速全索引扫描。请注意，智能扫描不仅限于查询甚至子查询。当会影响大量行时，优化器也可能选择对\
  \ `DELETE` 和 `UPDATE` 语句使用全扫描。但是，如果你的应用程序正在这样做，你或许应该考虑修改它，采用类似截断后重建的方式。俗话说得好，“视情况而定”。\n\
  \n智能扫描的第二个要求是，扫描必须使用直接路径读取机制来执行。请注意，在描述第二个要求时，有意未提及优化器。这是因为优化器并不决定是否使用直接路径读取。这是一个在执行计划确定后做出的启发式决策。因此，它不会被\
  \ `explain plan` 或其他性能相关工具直接显示。在实践中，这意味着验证第一个要求是否满足很容易，但验证第二个要求则更具挑战性。\n\n在大多数 Exadata\
  \ 实施中，相当高比例的长运行查询会被卸载。你可以通过选择所有平均运行时间超过某秒数，或平均逻辑 I/O 值大于某个合理值的语句（从 `v$sql` 中，或者如果你有相应许可的话，从\
  \ AWR 表 `DBA_HIST_SQLSTAT` 中），来检查你的长运行 SQL 语句中有多少百分比被卸载了。实际上，逻辑 I/O 是一个更好的度量标准，因为一些被卸载的语句可能运行得非常快，可能无法满足你的最小时间标准，这会让你对被卸载语句的百分比产生扭曲的看法。以下是一个示例（请注意，脚本包含在在线代码仓库中）：\n\
  \n```\nSQL> @offload_percent\n\nEnter value for sql_text:\n\nEnter value for min_etime:\n\
  \nEnter value for min_avg_lio: 500000\n\nTOTAL  OFFLOADED OFFLOADED_%\n-------------------------------\n\
  13         11      84.62%\n\nSQL> /\n\nEnter value for sql_text: SELECT%\n\nEnter\
  \ value for min_etime:\n\nEnter value for min_avg_lio: 500000\n\nTOTAL  OFFLOADED\
  \ OFFLOADED_%\n-------------------------------\n11         11        100%\n```\n\
  \n此列表使用了 `offload_percent.sql` 脚本，该脚本计算当前位于共享池中且已被卸载的语句的百分比。它最初用于评估所有逻辑 I/O 超过 500,000\
  \ 的语句。第二次运行时，调查范围仅限于以 `SELECT` 单词开头的语句。在下一个列表中，你可以看到另一个脚本 (`fsxo.sql`) 的输出，该脚本允许你查看实际贡献于上一列表中计算的\
  \ `OFFLOAD_%` 的语句：\n\n```\nSQL> @fsxo\n\nEnter value for sql_text:\n\nEnter value\
  \ for sql_id:\n\nEnter value for min_etime:\n\nEnter value for min_avg_lio: 500000\n\
  \nEnter value for offloaded:\n\nSQL_ID          EXECS  AVG_ETIME OFFLOAD IO_SAVED_%\
  \ SQL_TEXT\n----------------------------------------------------------------------------\n\
  0bvt5z48t18by      1        .10 Yes         100.00 select count(*) from skew3 whe\n\
  0jytfr1y0jdr1      1        .09 Yes         100.00 select count(*) from skew3 whe\n\
  12pkwt8zjdhbx      1        .09 Yes         100.00 select count(*) from skew3 whe\n\
  2zbt555tg123s      2       4.37 Yes          71.85 select /*+ parallel (a 8) */\
  \ a\n412n404yughsy      1        .09 Yes         100.00 select count(*) from skew3\
  \ whe\n5zruc4v6y32f9      5      51.13 No             .00 DECLARE job BINARY_INTEGER\
  \ :=\n6dx247rvykr72      1        .10 Yes         100.00 select count(*) from skew3\
  \ whe\n6uutdmqr72smc      2      32.83 Yes          71.85 select /* avgskew3.sql\
  \ */ avg(\n7y09dtyuc4dbh      1       2.87 Yes          71.83 select avg(pk_col)\
  \ from kso.sk\nb6usrg82hwsa3      5      83.81 No             .00 call dbms_stats.gather_databas\n\
  fvx3v0wpvxvwt      1      11.05 Yes          99.99 select count(*) from skew3 whe\n\
  gcq9a53z7szjt      1        .09 Yes         100.00 select count(*) from skew3 whe\n\
  gs35v5t21d9yf      1       8.02 Yes          99.99 select count(*) from skew3 whe\n\
  13 rows selected.\n```\n\n`fsxo.sql` 脚本提供了与 `offload_percent.sql` 脚本相同的限制因素，即最小平均耗时和最小平均逻辑\
  \ I/O。它还允许你选择性地将语句限制为仅那些被卸载的或未被卸载的。请参考脚本获取更多详细信息，并请记住这些技术也可以应用于 AWR 记录的数据，以便进行历史分析。\n\
  \n在下一节中，我们将讨论一些可能使你启用智能扫描的努力复杂化的问题。\n\n### 可能削弱智能扫描的问题\n\n有几种常见的编码“技术”要么会完全禁用智能扫描，要么会导致其效果远低于应有水平。其中一些技术只是不良实践，无论你是否在\
  \ Exadata 平台上。另一些在非 Exadata 平台上不会带来如此显著的性能损失，但在 Exadata 上运行时，它们会阻止存储软件发挥其全部潜能。当开发工作位于非\
  \ Exadata 平台上时，这是一个常见的观察结果。这样的系统使得开发高性能应用程序变得异常困难。确保应用程序在非 Exadata 系统上运行良好，很可能使用的技术并不适合在\
  \ Exadata 平台上获得最佳性能，因此一旦迁移到 Exadata 上，就需要额外的工作来优化代码。\n\n本书通篇已经讨论了许多此类问题。这里有几个你应该牢记的问题，因为它们在\
  \ Exadata 平台上具有根本不同的行为。\n\n#### WHERE 子句中的函数\n\nOracle 提供了大量可直接在 SQL 语句中使用的函数。正如\
  \ 第 2 章 所讨论的，并非所有这些函数都是**可下推的**。了解哪些函数**不可下推**非常重要，因为如果在 `WHERE` 子句中使用这些函数，会禁用谓词过滤，而这原本可能极大地减少需要传回数据库层的数据量。显然，自定义编写的\
  \ PL/SQL 函数也属于“不可下推”函数的范畴。\n\n这个问题在某种程度上有些反直觉，因为在数据仓库系统中你通常无论如何都会进行全表扫描。在非 Exadata\
  \ 平台上，对于通过全表扫描执行的语句，在其 `WHERE` 子句中使用函数不会对必须返回的数据量造成太大影响，因为数据库本来就需要将表的所有数据块返回给数据库服务器。然而，在\
  \ Exadata 上，使用一个可能禁用谓词过滤的函数可能会导致巨大的性能损失。顺便提一句，在非 Exadata 平台上，在 `WHERE` 子句中使用自定义\
  \ PL/SQL 函数通常也是个坏主意，因为处理每一行的 PL/SQL 都需要额外的 CPU，这与 Oracle 提供的、基于 C 代码的优化函数不同。\n\n\
  **注意**\n\n你可以查询 `V$SQLFN_METADATA` 来查看哪些函数是可下推的。\n\n此外，“可下推的”函数也可能带来巨大的性能损失。这里有一个非常简单的示例，展示了在\
  \ `WHERE` 子句中使用可下推函数的负面影响：\n\n```\nSQL> select /* example001 */ count(*) from SALES\
  \ where prod_id < 1;\n\nCOUNT(*)\n----------\n0\n\nElapsed: 00:00:00.75\n\nSQL>\
  \ select /* example001 */ count(*) from SALES where abs(prod_id) < 1;\n\nCOUNT(*)\n\
  ----------\n0\n\nElapsed: 00:00:34.26\n\nSQL> @fsx4\nEnter value for sql_text: %example001%\n\
  Enter value for sql_id:\n\nSQL_ID          CHILD OFFLOAD IO_SAVED_%  AVG_ETIME SQL_TEXT\n\
  ------------- ------ ------- ---------- ---------- ----------------------------------------\n\
  7ttw461bngzn0      0 Yes         100.00        .75 select /* example001 */ count(*)\
  \ from SA\nfktc9145xy6qg      0 Yes          99.98      33.81 select /* example001\
  \ */ count(*) from SA\n\nElapsed: 00:00:00.08\n\nSQL> select name, offloadable from\
  \ v$sqlfn_metadata\n  2  where name = 'ABS';\n\nNAME                       OFF\n\
  ------------------------------ ---\nABS                        YES\nABS        \
  \                YES\nABS                        YES\n\n3 rows selected.\n```\n\n\
  `ABS()` 是一个可下推函数，但在此特定语句的 `WHERE` 子句中使用时，却导致了性能的大幅下降。如果你已经在自己的环境中跟随此示例操作，可能已经很清楚原因了。解决方案如下：\n\
  \n```\nSQL> select name,value from v$statname natural join v$mystat\n  2  where\
  \ name like '%storage index%';\n\nNAME                                         \
  \                         VALUE\n----------------------------------------------------------------\
  \ ----------\ncell physical IO bytes saved by storage index                    \
  \          0\n\nSQL> set timing on\nSQL> select /* example001 */ count(*) from SALES\
  \ where abs(prod_id) < 1;\n\nCOUNT(*)\n----------\n0\n\nElapsed: 00:00:33.90\n\n\
  SQL> select name,value from v$statname natural join v$mystat where name like '%storage\
  \ index%';\n\nNAME                                                             \
  \     VALUE\n---------------------------------------------------------------- ----------\n\
  cell physical IO bytes saved by storage index                              0\n\n\
  Elapsed: 00:00:00.00\n\nSQL> select /* example001 */ count(*) from SALES where prod_id\
  \ < 1;\n\nCOUNT(*)\n----------\n0\n\nElapsed: 00:00:00.76\n\nSQL> select name,value\
  \ from v$statname natural join v$mystat where name like '%storage index%';\n\nNAME\
  \                                                                  VALUE\n----------------------------------------------------------------\
  \ ----------\ncell physical IO bytes saved by storage index                   1.4517E+11\n\
  \nElapsed: 00:00:00.00\n```\n\n就像普通索引一样，存储索引也会被函数禁用。这并不太令人惊讶，但它同样很容易被忽视。当我们看到全表扫描时，我们已经习惯于不去担心\
  \ `WHERE` 子句中可能禁用索引的函数。但 Exadata 的情况不同。\n\n\n#### 链式行\n\n这是一个非常宽泛的概括，但基本上任何 Oracle\
  \ 处理操作如果需要额外读取一个数据块才能完成一行数据的提取，就会导致 Exadata 存储软件回退到块传输模式或直通模式。你在前面的章节中多个地方会读到相关内容——特别是第\
  \ 11 章提供了大部分细节。一个简单的例子是链式行，但还有其他情况也可能导致 Oracle 回退到直通模式。在实践中，这意味着某些在非 Exadata 平台上只会引起轻微延迟的操作，在\
  \ Exadata 上可能对性能产生更严重的影响。该问题的主要诊断症状是存在大量单块读等待事件与单元智能扫描等待事件组合出现。在这种情况下，你可能会发现，在更彻底地解决问题之前，对于有问题的语句，暂时不使用卸载功能可能是更好的补救措施。下面是一个示例，展示了当首次执行从包含链式行的表中进行选择时，Oracle\
  \ 的时间花费情况。此示例是特意设计来夸大问题并使其可复现的，如关于该表的字典信息所示。\n\n```\nSQL> select num_rows,chain_cnt,avg_row_len\
