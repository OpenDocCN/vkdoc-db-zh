  \  500606863872 bytes\npartial writes)\nFlash cache bytes used                 \
  \             360777785344 bytes\nFlash cache bytes used (keep objects)        \
  \          4966318080 bytes\nFlash cache keep victim bytes                     \
  \             0 bytes\nFlash cache write bytes - first writes              107450368000\
  \ bytes\nFlash cache write bytes - overwrites                392564908032 bytes\n\
  Flash cache write bytes - population writes due to   50094088192 bytes\nread misses\n\
  [and many more]\n```\n\n你可以在 `V$CELL_METRIC_DESC` 中找到指标定义。在撰写本文时，并非所有通过 `cellcli`\
  \ 在单元上暴露的指标都在数据库层被同等暴露，但与所有 Exadata 特性一样，这在未来可能会发生变化。\n\n\n\n## AWR 报告\n\nOracle\
  \ Exadata 文档在《数据库机器系统概述》文档中包含一个名为\"Oracle Exadata 数据库一体机的新特性\"的附录。你应该不时查看一下——其内容非常有价值，尤其是因为\
  \ Exadata 功能繁多，有时很难记住某个特定功能是在哪个版本引入的。从版本 `12.1.2.1.0` 开始，Oracle 在 AWR 报告中引入了与 Exadata\
  \ 性能相关的信息。AWR 报告可能更适合展示和呈现性能相关数据。除了性能数据，报告还会显示更多关于系统配置的详细信息以及一份健康报告。该报告的一个优点是，大量信息适用于全局层面，因此你可以查看关于整个系统的信息，而不必局限于单个数据库。\n\
  \n## 总结\n\n`Exadata 智能闪存缓存` 为降低与 Oracle 数据库相关的 `I/O` 成本提供了又一种方法。Exadata 平台提供的大多数优化都需要使用\
  \ `智能扫描`（全表扫描或快速全索引扫描）。`ESFC` 不依赖于 `智能扫描`，事实上，它对于加速单块随机读取最为有用。得益于 Exadata `11.2.3.3.0`\
  \ 引入的全扫描数据透明缓存，多块读取现在也能受益于 `闪存缓存`。单块读取操作通常与 `OLTP` 工作负载相关，因此，`ESFC` 是 Exadata 用于\
  \ `OLTP` 或混合负载的关键组件。在本书的前一版中，我们认为 `ESFC` 不提供写入缓存这一事实，严重限制了它在写入瓶颈系统中的有效性。Exadata\
  \ `11.2.3.3.1` 解决了这一问题，现在你可以在 `写回` 模式下操作 `闪存缓存`。即使是全部使用闪存的 `X5-2` 存储阵列也是如此，其部分容量被专门用作（`写回`\
  \ 模式）`闪存缓存`。`写回闪存缓存` 对写入密集型工作负载提供了显著的性能提升。Exadata 系统中的闪存卡提供的写入 `IOPS` 数值优于所有磁盘组合在一起的性能。在一个根据数据表支持\
  \ 6000 磁盘 `IOPS` 的 `X2-2` 四分之一机架上，我们毫不费力地将 `IOPS` 提升到了 22000。这个数字大大超过了系统纯基于磁盘的 `IOPS`\
  \ 能力。\n\n大容量缓存以及 Oracle 存储软件使用的智能缓存算法，使得 `ESFC` 能够提供与基于固态硬盘的磁盘系统相似的读取性能。将大量随机读取活动从硬盘上卸载，也间接有利于处理尚未缓存的\
  \ `智能扫描` 等操作。一般来说，`X4-2` 和 `X5-2` 硬件中可用的充裕缓存容量使得 Exadata 管理员的工作轻松了许多，而自动数据缓存（这是本书作者近期最喜爱的\
  \ Exadata 功能之一）也同样如此。\n\n虽然 `ESFC` 最初被认为是纯粹针对减少小读取延迟的优化，但现在它对大型 `数据仓库型` 查询也相当有效。事实上，Oracle\
  \ 引用的高吞吐量数据取决于在可能的情况下同时扫描磁盘和 `闪存缓存`。在这种情况下，`闪存缓存` 实际上承担了大部分负担。调整存储子句来修改缓存策略应该不再需要。由于\
  \ `闪存缓存` 已成为 Exadata 平台的关键组件，必须对其进行某种形式的控制。Oracle 已经认识到这一点，并允许使用 `I/O 资源管理器` 来控制\
  \ `闪存缓存`。\n\n"
- '# 6. Exadata 并行操作


  Exadata 在执行并行操作方面并没有什么特殊方法，这是运行 `11gR2` 和 `12c` 的其他平台也具备的。然而，并行处理是 Exadata 的一个关键组件，因为高效处理数据仓库工作负载是
  Exadata 的主要设计目标之一。此外，因为卸载/`智能扫描` 依赖于直接路径读取，而并行查询从进程可以使用直接路径读取，所以并行操作具有了全新的重要性。传统上，高效使用并行查询需要仔细控制并发性，以便在不使系统过载的情况下最大限度地利用可用资源。Oracle
  先前为在多用户环境中使用而尝试对并行操作进行节流的做法并不完全成功。`11gR2` 版本提供了一些控制并行操作的新功能。特别是引入了一种排队机制，允许更有效地管理并发并行进程的数量。与以往的尝试相比，这种方法似乎更适合在不使可用资源过载的情况下实现高度并行化。`11gR2`
  还引入了 Oracle 自动根据每条语句计算并行度的能力。`12c` 版本引入了 `并行语句排队` 增强功能和进程内存使用控制。`12c` 版本还引入了一个 `数据库资源管理器
  (DBRM)` 指令，允许关键查询绕过并行语句队列，以及一个新的数据库参数来限制总的 `程序全局区 (PGA)` 大小，其目的是避免因过度使用物理内存而导致高交换率。


  在本章中，我们将重点讨论并行查询。这里将不涵盖数据库提供的其他形式的并行操作，例如恢复并行性。我们将简要介绍并行查询机制，并具体演示排队机制和自动并行度如何在
  Exadata 上工作。我们还将简要介绍 `11gR2 内存中并行执行` 功能，并讨论 Exadata 存储如何并行化 `I/O` 操作。我们不会涵盖并行查询或并行
  `DML` 的所有细节，并假设读者熟悉基本的 Oracle 并行概念。另请注意，讨论和示例将参考 Oracle 数据库 `11g 第 2 版 (11.2.0.4)`
  和 `12c 第 1 版 (12.1.0.2.0)` 中的行为。在大多数情况下，这些说明也同等适用于 `11.2.0.1` 版本。例外情况会被明确指出。


  ### 参数


  在描述各种新功能及其在 Exadata 上的应用之前，你应该回顾一下影响数据库处理并行查询方式的参数。表 6-1 显示了这些参数及其用途的简要说明。


  表 6-1.

  控制 `11gR2` 和 `12c` 并行功能的数据库参数




  '
- "# 数据库并行参数配置与存储层并行化\n\n| 参数 | 默认值 | 描述 |\n| --- | --- | --- |\n| `parallel_max_servers`\
