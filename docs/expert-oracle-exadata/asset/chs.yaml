  \ 命令或 `cellcli` 来查看操作系统检测到的所有磁盘，但有一个例外：由于 X5-2 单元中的 Flash 设备不是 SCSI 设备，因此您无法在那里看到它们。在上面的例子中，为了演示目的，我们用\
