  \ and 39350 IOPS\nLUN 5_3  on drive [FLASH_5_3] random read throughput: 542.72 MBPS,\
  \ and 39615 IOPS\n\nCALIBRATE results are within an acceptable range.\nCalibration\
  \ has finished.\n```\n\n## 单元闪存缓存故障\n\nExadata X4-2 存储单元配备了四个 F80 PCIe 闪存缓存卡。每张卡有四个闪存缓存磁盘（FDOM），总计\
  \ 16 个闪存磁盘。Exadata X5-2 大容量单元包含四张 F160 PCIe 闪存缓存卡，总共有四个闪存磁盘。这些闪存缓存卡占据存储单元内部的插槽 1、2、4\
  \ 和 5。如果某个闪存缓存模块发生故障，存储单元的性能将会下降，应尽快予以更换。如果您将部分闪存缓存用于基于闪存磁盘的网格磁盘，那么您的磁盘组冗余也将受到影响。这些闪存缓存卡不支持热插拔，因此更换它们需要关闭受影响的单元电源。\n\
  \n如果某个闪存磁盘发生故障，Exadata 会向您发送电子邮件通知故障。邮件将包含该卡的插槽地址。如果特定的 FDOM 故障，邮件还会包含该 FDOM 在卡上的地址（1、2、3\
  \ 或 4）。可以使用 `CellCLI` 命令 `LIST PHYSICALDISK` 查看故障的闪存缓存卡，如下所示：\n\n```\nCellCLI> list\
  \ physicaldisk where disktype=flashdisk and status!=normal detail\n\n         name:\
  \                 FLASH_5_3\n         diskType:             FlashDisk\n        \
  \ flashLifeLeft:        100\n         luns:                 5_3\n         makeModel:\
  \            \"Sun Flash Accelerator F80 PCIe Card\"\n         physicalFirmware:\
  \     UIO1\n         physicalInsertTime:   2014-10-03T20:08:05-05:00\n         physicalSize:\
  \         372.52903032302856G\n         slotNumber:           \"PCI Slot: 5; FDOM:\
  \ 3\"\n         status:               critical\n```\n\n这里的 `slotNumber` 属性显示了卡和\
  \ FDOM 的安装位置。在我们的例子中，该卡安装在 PCIe 插槽 5 中。获得此信息后，您可以关闭存储单元电源并更换故障部件。请记住，当单元离线时，ASM\
  \ 将无法再访问其上的网格磁盘。因此，在关闭单元之前，请确保关闭操作不会影响其所支持磁盘组的可用性。这与本章“单元磁盘故障”一节中描述的步骤相同。更换部件并重新启动单元后，存储单元将自动在更换的卡上配置单元磁盘，如果该卡曾用于闪存缓存，您将看到您的闪存缓存恢复为原来的大小。\n\
  \n## 单元故障\n\n单元故障主要有两种类型——临时性和永久性。临时性单元故障可能无害，如单元重启或断电。持续的单元故障也可能本质上是临时的。例如，如果补丁安装失败或某个组件需要更换，可能会导致单元离线数小时甚至数天。永久性单元故障性质更严重，需要更换整个单元机箱。无论哪种情况，如果您的系统配置得当，都不会中断\
  \ ASM 或您的数据库。在本节中，我们将探讨当单元暂时离线时会发生什么，以及如果您必须更换一个单元时该怎么做。\n\n### 临时性单元故障\n\n如第 14\
  \ 章所述，Exadata 存储单元是运行 Oracle Enterprise Linux 5 或 6 的 Sun 服务器，带有内部磁盘驱动器。如果某个存储单元离线，该单元上的所有磁盘对数据库服务器将变得不可用。这意味着该存储单元上包含数据库数据（以及\
  \ OCR 和 Voting 文件）的所有磁盘组在故障期间都将处于离线状态。ASM 故障组提供冗余，使您的集群和数据库能够在故障期间继续运行，尽管 I/O 性能会降低。在存储单元中创建网格磁盘时，它们会被分配给一个故障组。每个单元构成一个故障组，如下列列表所示：\n\
  \n```\nSYS:+ASM2> select dg.name diskgroup, d.name disk, d.failgroup\nfrom v$asm_diskgroup\
  \ dg,\nv$asm_disk d\nwhere dg.group_number = d.group_number\nand dg.name like 'SCRATCH%'\n\
  order by 1,2,3;\n\nDISKGROUP                      DISK                         \
  \  FAILGROUP\n------------------------------ ------------------------------ ------------------------------\n\
  SCRATCH_DG                     SCRATCH_DG_CD_05_CELL01        CELL01\nSCRATCH_DG\
  \                     SCRATCH_DG_CD_05_CELL02        CELL02\nSCRATCH_DG        \
  \             SCRATCH_DG_CD_05_CELL03        CELL03\n```\n\n因为 `SCRATCH_DG` 是使用普通冗余创建的，所以即使整个存储单元宕机，我们的\
  \ `SCRATCH` 数据库也应该能够继续运行。在本节中，我们将测试当存储单元完全停止运行时会发生什么。我们将使用本章前面用于磁盘故障模拟的相同磁盘组配置。为了引发单元故障，我们将登录到存储单元\
  \ 3 的 ILOM 并关闭其电源。由于每个存储单元构成一个 ASM 故障组，此场景与丢失单个单元磁盘非常相似（I/O 性能除外）。当然，不同之处在于我们丢失的是整个故障组。正如我们在单元磁盘故障测试中所做的那样，我们将在故障期间在\
  \ `SCRATCH` 数据库中生成数据，以验证数据库在单元停机期间是否继续为客户端请求提供服务。\n\n为了生成测试所需的 I/O，我们将反复将 `BIGTAB`\
  \ 表中的 23205888 行插入到 `bigtab2` 表中：\n\n```\nRJOHNSON:SCRATCH> insert /*+ append */\
  \ into bigtab2 nologging (select * from bigtab);\nRJOHNSON:SCRATCH> commit;\n```\n\
  \n在上述插入操作运行时，让我们关闭 Cell03 电源，并查看数据库警报日志。如您所见，当从 Cell03 上的磁盘读取时，数据库抛出错误“failed to\
  \ read mirror side 1”。在日志往下几行，您会看到数据库成功读取了该区的镜像副本“successfully read mirror side\
  \ 2”。\n\n```\nalert_SCRATCH.log\n-----------------------\nFri Jan 16 21:09:45 2015\n\
  Errors in file /u01/app/oracle/diag/rdbms/scratch/SCRATCH/trace/SCRATCH_mmon_31673.trc:\n\
  ORA-27603: Cell storage I/O error, I/O failed on disk o/192.168.12.5/SCRATCH_CD_05_cell03\
  \ at offset 2483044352 for data length 16384\nORA-27626: Exadata error: 12 (Network\
  \ error)\n...\nWARNING: Read Failed. group:3 disk:2 AU:592 offset:16384 size:16384\n\
  WARNING: failed to read mirror side 1 of virtual extent 2 logical extent 0 of file\
  \ 260 in group [3.689477631] from disk SCRATCH_CD_05_CELL03  allocation unit 592\
  \ reason error; if possible,will try another mirror side\nNOTE: successfully read\
  \ mirror side 2 of virtual extent 2 logical extent 1 of file 260 in group [3.689477631]\
  \ from disk SCRATCH_CD_05_CELL01 allocation unit 589\n```\n\n转到 ASM 警报日志，我们看到 ASM\
  \ 也注意到了 Cell03 的问题，并通过将网格磁盘 `SCRATCH_CD_05_CELL03` 置为离线来响应。注意，稍后 ASM 也在将其他网格磁盘置为离线。这个过程一直持续，直到\
  \ Cell03 上的所有网格磁盘都离线：\n\n```\nalert_+ASM2.log\n-------------------\n--- Test Cell03\
  \ Failure ---\nFri Jan 16 21:09:45 2015\n```\n\n`注意：进程 23445 正在使磁盘 2.3915933784\
  \ (SCRATCH_CD_05_CELL03) 脱机，组 3 中的掩码为 0x7e`\n\n`...`\n\n`警告：磁盘 SCRATCH_CD_05_CELL03\
  \ 处于 0x7f 模式，现在正在脱机`\n\n`2015 年 1 月 16 日 星期五 21:09:47`\n\n`注意：进程 19753 正在使磁盘 10.3915933630\
  \ (RECO_CD_10_CELL03) 脱机，组 2 中的掩码为 0x7e`\n\n检查 `V$SESSION` 和 `V$SQL` 视图，我们可以看到插入操作仍在运行：\n\
  \n`SID PROG       SQL_ID         SQL_TEXT`\n`----- ---------- -------------  -----------------------------------------`\n\
  `3 sqlplus@en 9ncczt9qcg0m8  insert /*+ append */ into bigtab2 nologgi`\n\n因此，即使丢失了三分之一的所有存储，我们的数据库仍能继续服务客户端请求。这相当了不起。让我们再次启动\
  \ Cell03，并观察当此存储再次可用时会发生什么。\n\n查看 Cell03 的告警日志，我们看到 `cellsrv` 将我们的网格磁盘重新联机。我们在 Cell03\
  \ 告警日志中看到的最后内容是，它通过与数据库服务器上的 `diskmon`（磁盘监控器）进程建立心跳来重新加入存储网格：\n\n`Cell03 告警日志`\n\
