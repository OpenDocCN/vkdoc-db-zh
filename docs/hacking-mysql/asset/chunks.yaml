    感觉还不错，对吧？在本书的优化部分（就在本章之后），我会带你了解可能的优化技巧——现在先"敲打敲打"你的数据库，然后别忘了也要妥善地让你的代码适应数据库。


    ## 为 MySQL 性能与安全而编码


    一旦你理解了你的服务器如何与 MySQL 交互，并调整了一两个参数来帮助你的基础设施（你已经增加了 `InnoDB` 缓冲池大小并调整了日志文件的大小，对吧？），别忘了也要以有助于数据库的方式编写代码。你会惊讶于有多少开发人员仍在编写让数据库"受伤"的代码——你们中的一些人可能也会在这方面犯错。


    记住几个关键点：


    1.  **切勿将用户输入直接传递给数据库**（这还需要说吗？）：将用户输入直接传递给数据库是通往 SQL 注入的高速公路。


    2.  **连接使用完毕后终止，使用速率限制器和负载均衡器**：这看起来很基础，但搜索引擎、API 应用程序和类似应用的操作员可能都遇到过这种情况：他们注意到应用程序运行缓慢，结果发现迟缓是由数据库中运行的查询数量引起的。好吧。如果你运行的应用程序读操作很重，一定要限制在给定时间段内可执行的查询数量，并在必要时让负载均衡器来平衡其余部分。你不需要发明天才级别的速率限制器：几行
    PHP 代码应该就能搞定。


    3.  **基准测试与性能剖析**：基准测试是一种独特的方法，用于确定当你交给应用程序任务去完成时会发生什么。许多开发人员都遇到过这样的情况：他们计划了 A
    方案、B 方案和 C 方案，然后生活给了他们柠檬（意料之外的难题），他们需要制定 D 方案。好吧，好吧，好吧……这就是为什么你需要对你的应用程序和数据库进行基准测试——基准测试将帮助你了解对数据库的期望是否现实，它将帮助你衡量你的应用和数据库能处理什么，并为增长做计划。等我们开始优化
    MySQL 时，我会带你了解基准测试和性能剖析策略。


    4.  **明智地选择服务器组件**：许多人认为，要实现卓越的性能，就应该使用有史以来最棒的组件。当然，如果你有能力负担，为服务器使用最新的组件会很棒，但由于顶级组件也伴随着高昂的成本，许多人没有这种奢侈。明智地选择组件并研究你的选项——如果你运行一个基于大数据的搜索引擎并且需要大量磁盘空间，你真的需要多个
    TB 级的 NVMe 驱动器吗？也许选择一个更大的 HDD 并购买更多 RAM，或者换一个更好的 CPU？记住 `InnoDB` 使用更多核心的例子：要更聪明地利用组件，而不是蛮干。明智地选择组件并展望未来，你将能够比你想象的更充分地发挥服务器的潜力。


    5.  **为高性能而索引**：如果你使用索引，那肯定是有原因的，对吧？索引提高了 `SELECT` 查询的性能；然而，在 `WHERE` 子句后的第一列上随意添加索引并不总是最明智的做法。不同的数据库管理系统提供不同类型的索引，因此，你可以采用大量的索引策略来实现你的性能目标。剖析你的查询并明智地建立索引。


    6.  **使用代码剖析器找出有问题的代码片段**：如果我告诉你数据库并不是唯一可以剖析的东西呢？PHP 用户可能想看看 [xhprof](https://pecl.php.net/package/xhprof)——这个工具可以剖析
    CPU 周期和内存使用情况，帮助你找出瓶颈的原因。其他编程语言也会有类似的工具。


    7.  **研究 MySQL 的高级功能**：你不需要成为 MySQL 的超级用户也能使用高级功能。这些功能包括触发器、存储过程和函数、分区、预处理语句、全文搜索，甚至是你定义字符集和排序规则的方式。它们的存在是有原因的——触发器可以在我们修改表中数据时自动"调用"某些操作，而存储过程需要手动调用；分区帮助你的数据库将数据拆分到多个底层表中，同时仍将分区表视为一个不可分割的单位；全文搜索使你能够利用显式能力进行搜索，其中某些不同的字符对你的查询可能有不同的含义，并利用不同的搜索模式；而字符集和排序规则使你的数据库能够理解不同语言的数据并显示符号。


    8.  **备份你的数据**：无论你运行什么项目，备份都应该始终放在心上。备份是你很少想到的东西，直到灾难降临——然后每个人都说"哦不，我们上次备份数据库是什么时候？我们的备份能恢复吗？"这就是为什么你需要提前考虑它们。不仅仅是考虑——使用
    `mysqldump`、`mydumper` 或其他方法（我们稍后会讨论备份）备份你的数据，并确保你的备份也是可恢复的。


    9.  **了解 CSRF 令牌**：你知道在 [BreachDirectory](https://breachdirectory.com) 上每周阻止了多少
    CSRF 攻击吗？有时仅搜索引擎页面就有数百起。惊讶吗？不应该。有些人就是混蛋——一旦你的应用获得一点点关注，你肯定会充分认识到这一点。虽然我完全理解为什么人们会从不同的地方通过搜索引擎发起搜索（这是一些封锁的原因），但服务上提供
    API 是有原因的。CSRF 令牌不仅对搜索引擎有用，如果你的应用程序允许用户更改密码、通过点击链接确认购买等——任何可能让恶意方认为"嗯，如果我发送一个请求，也许我也能从中受益？"的事情——它们都极其有用。CSRF
    令牌可以防止 CSRF 攻击，因为它们对于每个请求/会话都是唯一的，并且由无法猜测的随机值组成。在本书的安全部分，我会带你了解如何实现它们。


    10. **编写整洁的代码**：整洁的代码也有助于数据库的持久性。任何不得不重写遗留代码库的人都完全明白我的意思：你浏览着代码库，心里想着"*为什么这个*要包含在这里？！"避免把事情复杂化，保持简单：保持你的代码组织良好、结构清晰，你会看到许多好处：它可能运行得更快，使用更少的内存，而你的数据库、应用程序和未来的自己也会感谢你。


    遵守这十点，你的应用程序和数据库肯定会感谢你。话虽如此，请记住这些并非万能药，它们只有在你的应用程序（以及数据库）构建得当时才会起作用。你会犯错（谁不会呢？）——从中学习。


    听说过最速降线实验吗？它证明了小球沿着曲线滚动比在直线上更快——请注意这一点：你的错误很可能比那些走"直线"道路的人让你走得更远。快速学习并行动：错误不可避免，但它们并非世界末日。


    在编写任何使用 MySQL 的应用程序时，请特别关注你的服务器和数据存储。使用尽可能好的架构并不总是最明智的选择：顶级组件也有着高昂的成本，而摸索 MySQL
    组件的经验有时可能比把钱砸在架构上产生更好的结果。


