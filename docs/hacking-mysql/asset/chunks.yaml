    \ downsides more painful as well. MyISAM takes much less footprint on the disk,\
    \ but since MyISAM maintains no log files, it simply cannot look at them when\
    \ recovering data from a crash and with MyISAM having no support for transactions,\
    \ it cannot ensure their integrity thus coming with a very high probability of\
    \ losing your data when writing to a database. Sounds like a nightmare? That’s\
    \ because it is.\n\nThese things stand to this day making MyISAM an awesome companion\
    \ to InnoDB – but no longer making it a viable replacement option, which is why\
    \ MyISAM is now deprecated.\n\nIf you find yourself running MyISAM, consider converting\
    \ all MyISAM-based tables to InnoDB for ACID compliance:\n\n1.  First, obtain\
    \ a list of tables running MyISAM by running the SQL query below – replace *database*\
    \ with the name of your database:\n\n    `SELECT TABLE_NAME FROM information_schema.TABLES\
    \ WHERE TABLE_SCHEMA = 'database' AND ENGINE = 'MyISAM';`\n\n2.  Make all of those\
    \ tables run InnoDB:\n\n    `ALTER TABLE 'table_name' ENGINE = InnoDB;`\n\n3.\
    \  If necessary, repeat these steps for each of the databases in your database\
    \ management system.\n\nWoohoo! Now all of your tables run InnoDB – as easy as\
    \ that. Time to learn the use cases of other storage engines available in our\
    \ beloved DBMS!\n\n## Storage Engine Use Cases\n\nThere’s no secret why there\
    \ are so many storage engines for us to choose from – some storage engines hold\
    \ our data in memory, some support an Excel-like format, some act as archives,\
    \ some aim to act as blackholes for us to test the functionality of our code,\
    \ and some are built as examples of how to build new storage engines within MySQL.\n\
    \nWhile InnoDB deserves to be the #1 storage engine for many general use cases\
    \ and even for big data if it’s optimized properly, some use cases may require\
    \ you to get acquainted with different storage engines available in MySQL. We’ll\
    \ do that now.\n\n### The MEMORY and TempTable Storage Engines\n\nBefore MySQL\
    \ 4.1, MySQL had a storage engine referred to as “HEAP” – the purpose of the HEAP\
    \ storage engine was to store data in memory, and that’s why starting from MySQL\
    \ 4.1, the storage engine is called MEMORY.\n\nThe secret of the MEMORY storage\
    \ engine is hidden in the name itself – the storage engine stores data in the\
    \ memory, meaning that once we restart the server or if our database crashes for\
    \ any reason whatsoever, our data is gone. Such a storage engine isn’t a very\
    \ practical choice for many applications in the modern world, but it can sometimes\
    \ be useful for data to serve as a read-only cache in the memory.\n\nIn this realm,\
    \ newer versions of MySQL do have another trick up their sleeve – starting from\
    \ MySQL 8.3, the database management system builds all of its internal temporary\
    \ tables based on the *TempTable* storage engine. The storage engine that’s used\
    \ for temporary tables can be swapped to the MEMORY storage engine by fiddling\
    \ with the `internal_tmp_mem_storage_engine` variable.\n\nThe primary difference\
    \ between the TempTable and MEMORY storage engines is that the TempTable storage\
    \ engine stores all data and information related to the table inside of a file\
    \ that’s saved on the disk, while tables based on the MEMORY storage engine store\
    \ data inside of the memory and the disk saves only the .frm – table definition\
    \ – file. The TempTable storage engine is a good choice for storing larger object\
    \ types.\n\nThe TempTable storage engine does have three main parameters that\
    \ may be of interest to those fiddling with temporary tables: these are the `tmp_table_size`\
    \ variable, the `temptable_max_ram` variable, and the `temptable_max_mmap` variable.\
    \ The first variable defines the maximum size of temporary tables, the second\
    \ variable defines the maximum size of a temporary table before it starts storing\
    \ data on the disk (default value – 1GB), and the last variable defines the maximum\
    \ amount of memory a TempTable-based table can accrue before it starts storing\
    \ data on the disk. If TempTable starts storing data on the disk, data is stored\
    \ using the InnoDB storage engine.\n\n### The CSV Storage Engine\n\nThe CSV storage\
    \ engine is just what it sounds like – it stores all of its data in text files\
    \ having an Excel-like format. Values are separated by commas, and tables always\
    \ have a “.CSV” extension attached to them. Writing data into the table means\
    \ writing data into the Excel file.\n\nCSV-based tables can be created like usual\
    \ tables; you just need to specify the appropriate storage engine at the end:\n\
    \n```\nCREATE TABLE `demo_table` (\n`id` INT NOT NULL,\n`message` VARCHAR(225)\
    \ NOT NULL,\n`message_from` VARCHAR(225) NOT NULL,\n`message_to` VARCHAR(225)\
    \ NOT NULL,\n`time_sent` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,\n`time_received`\
    \ VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,\n...\n) ENGINE = CSV;\n```\n\nThe CSV\
    \ storage engine does have upsides and downsides – since data is not stored in\
    \ any file other than Excel-based files, the data inside of the files can be modified\
    \ by modifying data inside of the table or the Excel file itself or by modifying\
    \ the Excel file – but the storage engine also has no support for indexing or\
    \ partitioning."
  trans: "\n### MyISAM 的现状\n\n如今，MyISAM 的主要缺点与数据不一致性和不符合 ACID 规范有关。由于其设计，MyISAM 是一个非事务性存储引擎，这意味着它不支持回滚或原子操作，因此成为许多开发者的“阿喀琉斯之踵”。\n\
    \n另一方面，MyISAM 的设计非常简单，这使得 InnoDB 中无法使用的功能在 MyISAM 中很容易实现——MyISAM 将其元数据中存储了运行该存储引擎的表的精确行数，并显示运行该存储引擎的任何表的行数；并且删除与该存储引擎关联的文件也能完整删除数据而没有任何问题。InnoDB\
    \ 则无法做到这一点，因为它有表空间文件和日志文件，在我们启动恢复过程时需要扫描这些文件。\n\n讽刺的是，MyISAM 的优点也使其缺点更加突出。MyISAM\
    \ 在磁盘上占用的空间要小得多，但由于 MyISAM 不维护日志文件，它在从崩溃中恢复数据时根本无法查看这些日志；而且由于 MyISAM 不支持事务，它无法确保事务的完整性，因此在向数据库写入数据时，数据丢失的风险非常高。听起来像噩梦？因为它确实是。\n\
    \n这些问题一直延续至今，使 MyISAM 成为 InnoDB 的一个极好补充——但不再是一个可行的替代方案，这就是为什么 MyISAM 现在已被弃用。\n\
    \n如果你发现自己在使用 MyISAM，考虑将所有基于 MyISAM 的表转换为 InnoDB 以满足 ACID 规范：\n\n1.  首先，运行下面的 SQL\
    \ 查询获取使用 MyISAM 的表列表——将 *database* 替换为你的数据库名称：\n    `SELECT TABLE_NAME FROM information_schema.TABLES\
    \ WHERE TABLE_SCHEMA = 'database' AND ENGINE = 'MyISAM';`\n2.  将所有这些表改为运行 InnoDB：\n\
    \    `ALTER TABLE 'table_name' ENGINE = InnoDB;`\n3.  如果需要，为你的数据库管理系统中的每个数据库重复这些步骤。\n\
    \n哇哦！现在你所有的表都运行 InnoDB 了——就这么简单。是时候学习我们心爱的 DBMS 中其他可用存储引擎的使用场景了！\n\n### 存储引擎使用场景\n\
    \n为什么有这么多存储引擎供我们选择——其中并无秘密：有些存储引擎将数据保存在内存中，有些支持类似 Excel 的格式，有些充当归档角色，有些旨在作为黑盒来测试我们的代码功能，还有一些是作为如何在\
    \ MySQL 中构建新存储引擎的示例而构建的。\n\n尽管 InnoDB 作为许多通用场景、甚至是大数据（如果经过适当优化）的首选存储引擎当之无愧，但某些使用场景可能需要你熟悉\
    \ MySQL 中可用的不同存储引擎。我们现在就来做这件事。\n\n### MEMORY 和 TempTable 存储引擎\n\n在 MySQL 4.1 之前，MySQL\
    \ 有一个被称为“HEAP”的存储引擎——HEAP 存储引擎的目的是将数据存储在内存中，因此从 MySQL 4.1 开始，该存储引擎被称为 MEMORY。\n\
    \nMEMORY 存储引擎的奥秘就隐藏在名称本身中——该存储引擎将数据存储在内存中，这意味着一旦我们重启服务器或数据库因任何原因崩溃，我们的数据就会丢失。在现代世界，这种存储引擎对许多应用来说并不是一个非常实用的选择，但它有时可用于在内存中充当只读缓存的数据。\n\
    \n在这方面，较新版本的 MySQL 确实还有另一手准备——从 MySQL 8.3 开始，数据库管理系统基于 *TempTable* 存储引擎构建其所有内部临时表。通过调整\
    \ `internal_tmp_mem_storage_engine` 变量，可以将用于临时表的存储引擎切换为 MEMORY 存储引擎。\n\nTempTable\
    \ 和 MEMORY 存储引擎的主要区别在于：TempTable 存储引擎将所有与表相关的数据和信息存储在保存于磁盘上的一个文件中，而基于 MEMORY 存储引擎的表将数据存储在内存中，磁盘只保存\
    \ .frm（表定义）文件。TempTable 存储引擎是存储较大对象类型的一个好选择。\n\nTempTable 存储引擎确实有三个主要参数可能对调整临时表的人有用：它们是\
    \ `tmp_table_size` 变量、`temptable_max_ram` 变量和 `temptable_max_mmap` 变量。第一个变量定义了临时表的最大大小，第二个变量定义了临时表在开始将数据存储到磁盘之前的最大大小（默认值为\
    \ 1GB），最后一个变量定义了基于 TempTable 的表在开始将数据存储到磁盘之前可以占用的最大内存量。如果 TempTable 开始将数据存储到磁盘，数据将使用\
    \ InnoDB 存储引擎进行存储。\n\n### CSV 存储引擎\n\nCSV 存储引擎正如其名——它将所有数据存储在具有类似 Excel 格式的文本文件中。值之间用逗号分隔，表总是带有一个\
    \ “.CSV” 扩展名。向表中写入数据意味着向 Excel 文件中写入数据。\n\n基于 CSV 的表可以像普通表一样创建；你只需要在最后指定合适的存储引擎：\n\
    \n```sql\nCREATE TABLE `demo_table` (\n  `id` INT NOT NULL,\n  `message` VARCHAR(225)\
    \ NOT NULL,\n  `message_from` VARCHAR(225) NOT NULL,\n  `message_to` VARCHAR(225)\
    \ NOT NULL,\n  `time_sent` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,\n  `time_received`\
    \ VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,\n  ...\n) ENGINE = CSV;\n```\n\nCSV\
    \ 存储引擎确实有其优缺点——由于数据除了基于 Excel 的文件外不存储在任何其他文件中，因此可以通过修改表内或 Excel 文件本身的数据来修改文件内的数据——但该存储引擎也不支持索引或分区。\n"
- fmt: '### The ARCHIVE and BLACKHOLE Storage Engines


    The rest of the storage engines aren’t rocket science either. The `ARCHIVE` storage
    engine is intended to act as an archive for your data – its row compression capability
    makes data based on the storage engine have an extremely small footprint on the
    disk, and your data can easily be backed up while it’s stored using row-level
    locking capabilities. At the same time, the tables stored with this storage engine
    won’t have any `MVCC`, `B-Tree`, foreign key, full-text, hash, or geospatial indexing
    capabilities.


    The `BLACKHOLE` storage engine is intended to act as a blackhole and could be
    useful for those performing internal testing – data in the storage engine can
    only be written, but not retrieved as it’s never stored anywhere in the first
    place, hence the name: all data written to tables based on this storage engine
    disappears at the blink of an eye. There are no files that are stored on the disk
    at any time either. This storage engine, just like `ARCHIVE`, provides no support
    for partitioning though it does support all kinds of indexes with the maximum
    available key length being 3072 bytes in size.


    The internal functionality of the `BLACKHOLE` storage engine makes for a bunch
    of interesting use cases: while the storage engine doesn’t store any files on
    the disk, it can copy SQL queries over to replica servers if statement-based binary
    logging is enabled which makes it a good companion in replication setups. Suppose
    you have a table based on the `BLACKHOLE` storage engine:


    ```sql

    CREATE TABLE `demo_table` (

    `id` INT NOT NULL,

    `message` VARCHAR(225) NOT NULL,

    `message_from` VARCHAR(225) NOT NULL,

    `message_to` VARCHAR(225) NOT NULL,

    `time_sent` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,

    `time_received` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,

    ...

    ) ENGINE = BLACKHOLE;

    ```


    Once you perform any (`CRUD`) actions on the table above, `MySQL` will write those
    to the binary log that will then be copied over to the slave servers. This means
    that if you make a table with the same structure on the slave server and set it
    to run the `InnoDB` storage engine, `MySQL` will copy the changes from the binary
    log to the slave server, copying the inserted data as well.


    In other words, if you want to be able to avoid storing data on your master server
    but see it on your slave servers at the same time, `BLACKHOLE` is the storage
    engine for you – just make sure that tables on your slave server have the same
    structure and are based on a reliable storage engine that holds data instead of
    spewing it out.


    Another popular use case of the `BLACKHOLE` storage engine is the verification
    of syntax in backup files – if your logical backups are swallowed into the abyss,
    their syntax is correct.


    ### The MERGE Storage Engine


    `MySQL` also has a storage engine dedicated to merging data derived from `MyISAM`
    – back in the day, this storage was known as `MRG_MyISAM`, but nowadays, it has
    a much simpler title depicting its use case – the storage engine is titled `MERGE`.


    The `MERGE` storage engine is simple to explain: it’s a collection of `MyISAM`
    tables that have the same structure. Once a table based on the `MERGE` storage
    engine emerges inside of your database, you will see no usual files having the
    `.MYD` or `.MYI` extensions on the disk – a file with the extension of `.MRG`
    (merge) will be created instead. The table format of these tables will be stored
    in the data dictionary, and the contents of any `.MRG` file will only contain
    the names of the tables that are running the `MyISAM` storage engine and will
    be treated as one `MyISAM`-based table instead.


    #### Advantages


    You are unlikely to often use the advantages posed by the `MERGE` storage engine
    in `MySQL`, but some may cross your radar more often than you’d think:


    *   As the repair of `MyISAM` tables is inevitable due to `MyISAM` being a non-transactional
    storage engine, if you have a use case that necessitates the usage of large `MyISAM`
    tables, splitting them up into multiple `MERGE` tables and repairing many individual
    tables based on `MERGE` instead are likely to be much faster than repairing a
    single table based on `MyISAM`.

    *   `MERGE` can exceed the maximum file size limit set by your OS. For `MyISAM`,
    adhering to this limit is a necessity – for `MERGE`, it is not.


    #### Drawbacks


    With that being said, `MERGE` does have some problems. `ALTER` queries will mess
    up the merge structure with associated tables, the reliable functionality of `REPLACE`
    queries is likely to be lost, and queries like `ALTER TABLE`, `DROP TABLE`, `OPTIMIZE
    TABLE`, `REPAIR TABLE`, `ANALYZE TABLE` or `DELETE` without a `WHERE` clause may
    provide incorrect results due to `MySQL` referring to the primary table and not
    the merged tables themselves.


    All this makes the `MERGE` storage engine a flawed, though valuable addition even
    when `MyISAM` is obsolete.


    ### The Storage Engine for High Availability


    Aside from data being merged, your data needs to be highly available too. `MySQL`
    does offer a storage engine dedicated to just that – it’s called `NDB`. The preceding
    “N” at the beginning is not there without a reason: the `NDB` storage engine stands
    for Network Database and comes with a shared-nothing architecture. `NDB` is a
    high-availability storage engine that is always connected to a data cluster, and
    that’s why it’s also referred to as `NDBCluster`.


    Each instance of `NDB` has to have at least three nodes, them being the data node,
    the SQL node, and the management node:


    1.  The data node, as suggested by the name, stores the data relevant to the cluster.
    In a typical `NDB` setup, it is recommended you have two or more data nodes to
    provide redundancy for your database.

    2.  The SQL node is used to run SQL queries on the data node. In other words,
    we use the SQL node to access data on the data node using SQL.

    3.  The management node is used to manage all of the nodes within `NDB`.'
