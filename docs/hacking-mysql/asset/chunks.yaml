- fmt: 'Contrary to popular belief though, components aren’t the only thing that makes
    your database tick; your database is only a part of the bigger puzzle that includes
    your application and your server. Understanding how both of these things and your
    database work in conjunction is an essential step to achieving database harmony
    – and that’s why I now invite you to understand your server before telling you
    how you should optimize your database and everything within.


    # 6. Understanding Your Server


    Before jumping into optimization, you need to understand your server and the components
    within it. No matter what’s happening inside of your database, your server can
    become the biggest bottleneck of your database – understanding what server you
    use and how its components work together will allow you to understand how best
    to work with the server to achieve your goals. Some servers will tie your hands
    by default (think shared hosting), but if you have access to the internals of
    your server by using a VPS or a dedicated server, you have a chance to modify
    their parameters as you wish.


    To understand your server, you have to efficiently write queries, simulate errors,
    understand server components and their interaction with `MySQL`, configure `MySQL`
    for your server, code for `MySQL` performance and security, and avoid the things
    you shouldn’t be doing.


    ## Efficiently Using Server Resources


    The first thing related to your database would probably be the queries running
    inside of it. These have to be written efficiently, and this saying may have a
    different meaning depending on what kind of server you find yourself using.


    When talking about shared hosting, there’s not that much that can be done – you’re
    given a small part of a single physical server together with hundreds of users
    keeping your hosting expenses low, but also keeping the space your application
    (and your database) moves in relatively confined. As far as your database is concerned,
    chances are that you will be moving around in a single database too.


    That’s why the best thing you can do for your database in a shared hosting environment
    is modify the things “on top of it” without touching its internals (you wouldn’t
    be able to touch them if you wished): keep a close eye on the structure of your
    tables and monitor resource usage. Don’t forget about things outside of your database
    either – use a CDN, limit the use of plugins (you’re using a couple, aren’t you?),
    and compress files where necessary.


    Some performance advice wouldn’t apply here: partitioning is likely to be unnecessary
    (one wouldn’t have enough space to store bigger data sets to necessitate partitioning
    to begin with), but indexes would do their part. Keep your database clean too
    – don’t store too much unnecessary data and you should be good to go.


    The game changes when everything comes to a VPS or a dedicated server – now we
    have access to the internals of our database and can query the server to know
    what we’re dealing with in the first place:


    *   To display the number of processor units on your server, utilize `nproc`.

    *   To view the CPU information of your server, issue `lscpu` or, if you’re feeling
    fancy, `cat /proc/cpuinfo`.

    *   To check on the memory capacity, issue the command `free -h`.

    *   Don’t forget to check on the version of your back-end language of choice.
    Those using `PHP` will need to employ `php -v`.


    In many cases, these statistics will also be readily available upon logging in
    to your account on your hosting provider of choice, and these details are crucial
    because they determine to what extent you can optimize your database and work
    with your application. Users of smaller VPS services will likely have around 2-4GB
    of RAM and 30-50GB of space in their solid-state drives, while power users will
    have more room to move in, but regardless, any VPS will allow you to open and
    edit your `my.cnf` file and look into the buffer pool, the size of your log files,
    the query cache, the number of tables that can be stored in the cache, and the
    join buffer (it will help `JOIN` queries complete quicker. Before running queries,
    do that: find your `my.cnf` file (it’s most likely located in the `/var/lib/mysql`
    directory – if not, search for it in `/etc/`, `/etc/mysql/`, or the `~/` directory),
    open it up and fiddle with the following:


    *   `innodb_buffer_pool_size`: Set the InnoDB buffer pool to approximately 60-80%
    of available RAM within your operating system (leave some room for the processes
    running in the background, too).

    *   `innodb_log_file_size`: Set it to approximately a quarter (25%) of the InnoDB
    buffer pool size.

    *   `table_open_cache` and `max_connections`: These variables impact the number
    of open tables for all threads and the maximum amount of simultaneous client connections
    your server can handle respectively.

    *   `join_buffer_size`: This variable depicts the maximum size of the buffer that’s
    used when `JOIN` queries that perform full table scans are running.


    Also, remember what `MySQL` looks like from the inside – from top to bottom, we
    have the file system (data, indexes, logs, and other files), storage engines such
    as InnoDB and the like, the optimizer, the parser, the SQL interface, the connection
    pool, and the connectors. Oh, and the global and engine-specific caches and buffers
    somewhere in between storage engines and the connection pool to the side of the
    optimizer, parser, and the SQL interface. In other words, we have `mysqld` and
    his files, connectors, the optimizer, caches, table engines, and other tools (I’ll
    share an illustration with you soon) – we have lots of things to optimize, don’t
    we?


    That’s why this book has an entire part of it dedicated to optimization; but before
    jumping into optimization, we have a bunch of other things to take care of, too!


    ## Understanding and Simulating Errors


    Once you’re sure that you’re using database resources properly, you may want to
    look into errors. Errors are a huge part of any project, especially those projects
    concerning databases; depending on the error condition, we can learn a lot about
    what went wrong and how to fix the problem. When tuning your server, there will
    likely be situations where you will benefit from the ability to simulate errors,
    too.


    To understand errors in our beloved database management system, we have to understand
    that errors in `MySQL` have a lot to do with the values of a return code called
    `SQLSTATE`: This code consists of 5 bytes and is divided into two parts:


    1.  The first and second bytes have to do with the class of the error.

    2.  The other three bytes contain a subclass.


    Each error class can have one of four categories:


    1.  Category S (class 00): Such error classes denote success in doing something.

    2.  Class W (class 01): Such error classes denote a warning.

    3.  Class N (class 02): Such errors inform us that no data was returned, hence
    the letter.

    4.  Class X (all other classes): All other errors have to do with some exceptions,
    hence the letter X.


    `SQLSTATE` codes denote the successful completion of a task, various kinds of
    warnings, dynamic SQL errors, connection and action exceptions, unsupported features,
    invalid and/or malformed SQL statements, data exceptions, integrity constraint
    violations, invalid transaction states, and much more. Here’s what some of the
    `SQLSTATE` codes mean:'
  raw: 'Contrary to popular belief though, components aren’t the only thing that makes
    your database tick; your database is only a part of the bigger puzzle that includes
    your application and your server. Understanding how both of these things and your
    database work in conjunction is an essential step to achieving database harmony
    – and that’s why I now invite you to understand your server before telling you
    how you should optimize your database and everything within.


    # 6. Understanding Your Server


    Before jumping into optimization, you need to understand your server and the components
    within it. No matter what’s happening inside of your database, your server can
    become the biggest bottleneck of your database – understanding what server you
    use and how its components work together will allow you to understand how best
    to work with the server to achieve your goals. Some servers will tie your hands
    by default (think shared hosting), but if you have access to the internals of
    your server by using a VPS or a dedicated server, you have a chance to modify
    their parameters as you wish.


    To understand your server, you have to efficiently write queries, simulate errors,
    understand server components and their interaction with MySQL, configure MySQL
    for your server, code for MySQL performance and security, and avoid the things
    you shouldn’t be doing.


    ## Efficiently Using Server Resources


    The first thing related to your database would probably be the queries running
    inside of it. These have to be written efficiently, and this saying may have a
    different meaning depending on what kind of server you find yourself using.


    When talking about shared hosting, there’s not that much that can be done – you’re
    given a small part of a single physical server together with hundreds of users
    keeping your hosting expenses low, but also keeping the space your application
    (and your database) moves in relatively confined. As far as your database is concerned,
    chances are that you will be moving around in a single database too.


    That’s why the best thing you can do for your database in a shared hosting environment
    is modify the things “on top of it” without touching its internals (you wouldn’t
    be able to touch them if you wished): keep a close eye on the structure of your
    tables and monitor resource usage. Don’t forget about things outside of your database
    either – use a CDN, limit the use of plugins (you’re using a couple, aren’t you?),
    and compress files where necessary.


    Some performance advice wouldn’t apply here: partitioning is likely to be unnecessary
    (one wouldn’t have enough space to store bigger data sets to necessitate partitioning
    to begin with), but indexes would do their part. Keep your database clean too
    – don’t store too much unnecessary data and you should be good to go.


    The game changes when everything comes to a VPS or a dedicated server – now we
    have access to the internals of our database and can query the server to know
    what we’re dealing with in the first place:


    *   To display the number of processor units on your server, utilize `nproc`.


    *   To view the CPU information of your server, issue `lscpu` or, if you’re feeling
    fancy, `cat /proc/cpuinfo`.


    *   To check on the memory capacity, issue the command `free -h`.


    *   Don’t forget to check on the version of your back-end language of choice.
    Those using PHP will need to employ `php -v`.


    In many cases, these statistics will also be readily available upon logging in
    to your account on your hosting provider of choice, and these details are crucial
    because they determine to what extent you can optimize your database and work
    with your application. Users of smaller VPS services will likely have around 2-4GB
    of RAM and 30-50GB of space in their solid-state drives, while power users will
    have more room to move in, but regardless, any VPS will allow you to open and
    edit your my.cnf file and look into the buffer pool, the size of your log files,
    the query cache, the number of tables that can be stored in the cache, and the
    join buffer (it will help `JOIN` queries complete quicker. Before running queries,
    do that: find your my.cnf file (it’s most likely located in the `/var/lib/mysql`
    directory – if not, search for it in `/etc/`, `/etc/mysql/`, or the `~/` directory),
    open it up and fiddle with the following:


    *   `innodb_buffer_pool_size`: Set the InnoDB buffer pool to approximately 60-80%
    of available RAM within your operating system (leave some room for the processes
    running in the background, too).


    *   `innodb_log_file_size`: Set it to approximately a quarter (25%) of the InnoDB
    buffer pool size.


    *   `table_open_cache` and `max_connections`: These variables impact the number
    of open tables for all threads and the maximum amount of simultaneous client connections
    your server can handle respectively.


    *   `join_buffer_size`: This variable depicts the maximum size of the buffer that’s
    used when `JOIN` queries that perform full table scans are running.


    Also, remember what MySQL looks like from the inside – from top to bottom, we
    have the file system (data, indexes, logs, and other files), storage engines such
    as InnoDB and the like, the optimizer, the parser, the SQL interface, the connection
    pool, and the connectors. Oh, and the global and engine-specific caches and buffers
    somewhere in between storage engines and the connection pool to the side of the
    optimizer, parser, and the SQL interface. In other words, we have `mysqld` and
    his files, connectors, the optimizer, caches, table engines, and other tools (I’ll
    share an illustration with you soon) – we have lots of things to optimize, don’t
    we?


    That’s why this book has an entire part of it dedicated to optimization; but before
    jumping into optimization, we have a bunch of other things to take care of, too!


    ## Understanding and Simulating Errors


    Once you’re sure that you’re using database resources properly, you may want to
    look into errors. Errors are a huge part of any project, especially those projects
    concerning databases; depending on the error condition, we can learn a lot about
    what went wrong and how to fix the problem. When tuning your server, there will
    likely be situations where you will benefit from the ability to simulate errors,
    too.


    To understand errors in our beloved database management system, we have to understand
    that errors in MySQL have a lot to do with the values of a return code called
    SQLSTATE: This code consists of 5 bytes and is divided into two parts:


    1.  The first and second bytes have to do with the class of the error.


    2.  The other three bytes contain a subclass.


    Each error class can have one of four categories:


    1.  Category S (class 00): Such error classes denote success in doing something.


    2.  Class W (class 01): Such error classes denote a warning.


    3.  Class N (class 02): Such errors inform us that no data was returned, hence
    the letter.


    4.  Class X (all other classes): All other errors have to do with some exceptions,
    hence the letter X.


    `SQLSTATE` codes denote the successful completion of a task, various kinds of
    warnings, dynamic SQL errors, connection and action exceptions, unsupported features,
    invalid and/or malformed SQL statements, data exceptions, integrity constraint
    violations, invalid transaction states, and much more. Here’s what some of the
    `SQLSTATE` codes mean:'
