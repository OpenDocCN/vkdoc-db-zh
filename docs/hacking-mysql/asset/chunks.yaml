    user table in the mysql database, never trust data provided by the user (that''s
    the primary cause of SQL injection), and consider using a Web Application Firewall
    (WAF) to prevent attacks directed at your application and your database alike.
    |

    | User security and access control | Use strong passwords and don''t store them
    in plain text or using weak algorithms (look into BCrypt or Blowfish for that
    matter), don''t grant more privileges than necessary for users to complete their
    actions, and take a look into account locking and unlocking. |

    | MySQL security components and plugins | MySQL provides you with the ability
    to implement a password security policy where only passwords above a certain length
    can be employed, comes with an enterprise-level firewall specific to itself (see
    enterprise-level security controls), offers a keyring plugin to safely store sensitive
    information for retrieval later on, etc. |

    | Enterprise-level security controls | Enterprise-level security controls include,
    but are not limited to, the MySQL Enterprise Firewall and MySQL Enterprise Audit
    functionalities for auditing and user security, data masking procedures, and the
    like. |


    That’s the basics of security which we’ll dive in deeper in the last part of this
    book, but we’re not ready to get into the security part of your database just
    yet – you secure something that isn’t safe and optimize something that’s broken.
    For now, understand that under the MySQL hood, everything is simple if you tread
    the database road carefully and understand everything it involves. Databases involve
    data, data involves schemas (in the MySQL world, a schema is also a synonym for
    a database), and schemas involve data types, indexes, and the like. Understanding
    your data, schema, and the data types related to them may seem like a simple task,
    but it is far from a piece of cake: it does need careful consideration and attention
    to function properly both now and in the future – with improper schema and data
    types, you could be breaking your database without being aware of it! You’re in
    luck because now I’ll walk you through how to understand your data by choosing
    the proper schema, data types, and collations to avoid just that. How? Well, keep
    reading and find out.


    ## Understanding Your Data


    To understand your data, start by walking yourself through the necessities: chances
    are that you already have a lot of data in your database, right? Well, how did
    the data end up in your database? What did you think about before any data found
    its way into any of the databases within your MySQL Server? That’s right – table
    schemas, data types, and collations. These three things are the three “musketeers”
    powering your data: table schemas define the overview of your tables, data types
    define what data can go into what column, and proper collations make sure that
    data isn’t represented by signs you can’t comprehend.


    Essentially, table schemas, data types, and collations provide you with a highway
    for your data – you choose the speed limit. However, no matter the speed limit,
    if the highway is so badly made that your car can barely make its way through
    it, you won’t reach your destination. That’s why it’s crucial to choose the proper
    schema, data types, character sets, and collations before embarking on any project
    – these things lay the foundation for any project.'
  trans: '### 安全问题


    一旦你确信自己的应用程序性能良好，且可用性水平对你的组织或你个人而言都是可接受的，就该向你的数据库提出另一个问题了——其中的数据是否曾被窃取？


    不幸的是，在许多情况下，答案都是“是”，即使你从未听说过任何数据泄露事件影响到你的公司或与之相关的任何公司的基础设施。事实是，数据泄露很少会登上你公司的头条——而即使登上了，那也几乎肯定不是你公司经历的第一次数据泄露。


    要缓解安全问题，请注意以下几个方面：


    1.  通用安全准则

    2.  用户安全与访问控制

    3.  MySQL 安全组件与插件

    4.  企业级安全控制


    看似要关注的事情很少，对吧？别高兴得太早，因为就像其他所有事情一样，魔鬼藏在细节中。因此，本书有整整一部分专门讨论安全——当我们讲到 MySQL 的安全部分（这是本书的最后一部分）时，我会告诉你所有你需要知道的，但目前，请遵循以下建议：


    | `安全准则` | `建议` |

    | --- | --- |

    | 通用安全准则 | 确保只有 `root` 用户可以访问 `mysql` 数据库中的用户表，永远不要信任用户提供的数据（这是 `SQL 注入` 的主要原因），并考虑使用
    `Web 应用防火墙 (WAF)` 来防护针对你的应用程序和数据库的攻击。 |

    | 用户安全与访问控制 | 使用强密码，不要以明文形式或使用弱算法存储密码（可以研究一下 `BCrypt` 或 `Blowfish`），只授予用户完成其操作所必需的权限，并留意账户的锁定与解锁。
    |

    | MySQL 安全组件与插件 | `MySQL` 提供了实施密码安全策略的能力，只有达到特定长度的密码才能被使用；它自带了专门针对自身的企业级防火墙（参见企业级安全控制）；提供了
    `keyring` 插件来安全存储敏感信息以备后用，等等。 |

    | 企业级安全控制 | 企业级安全控制包括但不限于用于审计和用户安全的 `MySQL Enterprise Firewall` 和 `MySQL Enterprise
    Audit` 功能、数据屏蔽流程等。 |


    以上是安全的基础知识，我们将在本书的最后一部分深入探讨，但我们还没准备好进入数据库的安全环节——你需要先确保不安全的东西的安全，并优化损坏的东西。目前，请理解在
    `MySQL` 的内部，如果你谨慎地对待数据库之路并理解它所涉及的一切，一切都是简单的。数据库涉及数据，数据涉及 `模式`（在 MySQL 世界中，`模式`
    也是数据库的同义词），而 `模式` 又涉及 `数据类型`、`索引` 等。理解你的 `数据`、`模式` 以及与之相关的 `数据类型` 似乎是一项简单的任务，但远非易如反掌：它确实需要仔细的考量和关注，才能确保现在和将来都能正常运行——如果
    `模式` 和 `数据类型` 不当，你可能会在不知不觉中破坏你的数据库！你很幸运，因为现在我将引导你如何通过选择合适的 `模式`、`数据类型` 和 `排序规则`
    来理解你的数据，从而避免这种情况。怎么做？嗯，继续阅读下去，你会发现答案。


    ## 理解你的数据


    要理解你的 `数据`，首先要梳理一下必要的情况：很可能你的数据库中已经有很多 `数据` 了，对吧？那么，这些 `数据` 是如何进入你的数据库的？在任何 `数据`
    进入你 `MySQL 服务器` 中的任何数据库之前，你考虑过什么？没错——就是 `表模式`、`数据类型` 和 `排序规则`。这三样东西是驱动你的 `数据`
    的“三大基石”：`表模式` 定义了表的概览，`数据类型` 定义了什么 `数据` 可以进入哪一列，而合适的 `排序规则` 则确保 `数据` 不会以你无法理解的符号来表示。


    本质上，`表模式`、`数据类型` 和 `排序规则` 为你提供了一条数据的“高速公路”——由你来选择限速。然而，无论限速是多少，如果这条高速公路建造得如此糟糕，以至于你的汽车几乎无法通过，你就无法到达目的地。这就是为什么在开始任何项目之前，选择合适的
    `模式`、`数据类型`、`字符集` 和 `排序规则` 至关重要——这些东西为任何项目奠定了基础。'
- fmt: '## Choosing the Proper Schema and Data Types


    “Properly choose the right schema, character sets, and data types” might sound
    cool, but what does that mean? For you, it means the following:


    1.  Evaluate your use case: What are you using MySQL for? In many cases, your
    use case has a huge weight on your decision to choose one data type or collation
    instead of the other.


    2.  Think about what databases and tables inside of them will be a necessity for
    your use case: How many databases or tables do you need? Why?


    3.  Brainstorm: Think about the structure of your table, look into the available
    data types and collations for your version of MySQL, MariaDB, or Percona Server,
    and choose the one that feels closer to your use case. Schemas, data types, and
    character sets aren’t set in stone and can change as time goes by, so choose wisely,
    but don’t worry too much.


    4.  Think about your server: When brainstorming to choose the best data type or
    collation, think about your server – how much disk space do you have? Do you have
    plans to expand your software appliance in such a way that would necessitate changes
    for your data types or collations in the future? Keep in mind that different data
    types occupy different amounts of database space – while that may not be important
    now, 100 excessive bytes mean a lot when you have a million records or more.


    5.  Choose: Now that you have got these things out of the way, choose the proper
    data types and collations!


    Properly choosing data types and collations can be tricky, and it helps to simplify
    the process. Use simple reasoning and think about the future.


    When thinking about what data type to choose, think about what kind of data you
    intend to store and choose the simplest solution. Here are your options:


    ### Data types for `numeric` data


    *   Data types to store general integer values: `INTEGER` or `INT`, `SMALLINT`,
    `TINYINT`, `MEDIUMINT`, and `BIGINT`. Here, everything’s related to ranges of
    values. For example, `SMALLINT` can store signed integer values from -32768 to
    32767 or unsigned values from 0 to 65535, `TINYINT` can store signed values from
    -128 to 127, or `UNSIGNED` values from 0 to 255. Refer to the tip below and the
    documentation for more information.


    *   Data types to store exact numeric values: `DECIMAL` and `NUMERIC`. Use these
    data types when storing exact numeric values (e.g., data for accounting purposes).


    *   Data types to store approximate and floating-point values: `FLOAT` and `DOUBLE`.
    MySQL needs four (4) bytes if you’re storing single-precision values and eight
    (8) bytes if double-precision values are stored.


    *   The `BIT` data type. Use `BIT` when storing bit values from 1 to 64, and define
    your range in brackets by defining `BIT(number)` where `number` is a number from
    1 to 64.


    ### Data types to store `date` and `time` values


    *   `DATE`, `DATETIME`, and `TIMESTAMP` data types. Use the `DATE` data type if
    you’re storing `YYYY-MM-DD` dates without time, `DATETIME` will help you if you’re
    storing such dates with a time value (`YYYY-MM-DD hh:mm:ss`), and `TIMESTAMP`
    works the same way, just with a smaller range: it only accepts values from `1970-01-01
    00:00:01` to `2038-01-19 03:14:07`. All values are in UTC.


    *   The `TIME` data type for storing time values from -838:59:59 to 838:59:59.


    *   The `YEAR` data type for storing year values. This data type has a data width
    of four characters.


    ### Data types to store `string` values


    *   The `CHAR` and `VARCHAR` data types refer to character or variable character
    values. These data types are similar, and that’s the reason they’re not being
    mentioned separately, but they differ in regard to maximum length and requirements
    for storage space. `CHAR` values are preceded with spaces to the length of your
    choice, and trailing spaces are removed once they’re retrieved, while for `VARCHAR`
    that’s not the case. When `VARCHAR` is in use, MySQL will issue a warning if spaces
    precede a value too.


    *   The `BINARY` and `VARBINARY` data types refer to binary strings; otherwise,
    they’re very similar to the aforementioned `CHAR` and `VARCHAR` data types.


    *   The `BLOB` and `TEXT` data types refer to Binary Large Objects and larger
    text values. Such data types are similar, and their names as well as the maximum
    length of their values correspond. They also have the same storage requirements.
    There are four `BLOB` types, `TINYBLOB`, `BLOB`, `MEDIUMBLOB`, and `LONGBLOB`;
    the same goes for `TEXT`.


    *   The `ENUM` data type refers to a list of permitted values that are enumerated.


    *   The `SET` data type can have any value specified in a defined (set) list.
    This list can have up to 64 members.


    ### Spatial (geospatial) data types to store `geographic` data


    *   `GEOMETRY`, `POINT`, `LINESTRING`, and `POLYGON` data types are intended to
    hold single geometric values.


    *   `MULTIPOINT`, `MULTILINESTRING`, `MULTIPOLYGON`, and `GEOMETRYCOLLECTION`
    data types can be used to hold multiple geometric values. Refer to the documentation
    for more information.


    ### The `JSON` data type


    The `JSON` data type is suitable to store `JSON` data.


    As you can see, your choices are broad – evaluate your use case, think into the
    future, and choose the simplest solution. In other words, if you intend to choose
    email addresses, a `VARCHAR` solution would probably work better than `TEXT`,
    `SMALLINT` will likely be enough if you store integer values that don’t exceed
    30,000, and `DATETIME` will probably be the option you’re looking for if you store
    dates together with a time value, but `DATE` will suffice for storing dates instead.
    In many cases, the simplest (smallest) data type is the best.


    ## Tip


    When choosing integer data types for numeric data, keep in mind that here, everything
    is related to the ranges of integers MySQL accepts and whether you store `SIGNED`
    or `UNSIGNED` values. Signed values mean 0, positive, and negative numbers, while
    unsigned values refer to 0 and positive numbers.'
