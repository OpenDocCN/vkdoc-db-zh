  trans: '

    谨慎选择硬盘驱动器——NVMe 固态硬盘将是最快的选择，但也是最昂贵的。在许多情况下，一块普通的固态硬盘可能就足够了；而在涉及较大数据集的情况下，可以使用机械硬盘存储来存放
    TB 级别的数据。如果不确定，许多人会建议你选择折中方案——固态硬盘，因为它比机械硬盘更快，但同样，“好速度”对不同人可能意味着不同的事情：别忘了，硬盘驱动器只是整个系统的一部分，无论如何它都不能解决你所有的问题，所以无需重复造轮子。同时，你应该根据你的使用场景，权衡机械硬盘、固态硬盘和
    NVMe 固态硬盘的优缺点，并明智地选择：如果你打算存储较大的数据集（超过几个 TB 的数据），请选择机械硬盘；如果你追求高性能并能承受更高的价格，请选择
    NVMe 固态硬盘；对于一般使用场景，请选择固态硬盘。


    谈到 CPU，选择一个具有多个核心（最好是 4 个或更多）和一个不错处理器速度（3.5 GHz 是一个良好的起点）的处理器。请记住，MySQL 及其同类产品都是多线程的，因此你应该不需要额外的配置来让
    MySQL 使用多个核心。


    在做出选择之前，如果可能的话，务必咨询托管公司——那里的工作人员将对可用的服务器有很好的了解，一旦你告诉他们你的使用场景并详细说明需求，他们很可能会为你推荐一台服务器，并在你不喜欢所选服务器时提供退款保证。


    ## 配置 MySQL 参数


    选择之后，请检查你的服务器上是否已经安装了 MySQL。对于某些用户来说，MySQL 很可能已经安装好了，而其他用户则需要自己安装。


    在你抽出时间初步了解服务器后，关闭 MySQL 以便进行配置。复制一份配置文件，以便在必要时恢复默认设置（Linux 用户会在 `/etc/`、`/etc/mysql/`、`/var/lib/mysql`
    或 `~/` 目录中找到配置文件；对于 Windows 用户，该文件很可能位于 `bin` 目录的数据库管理子目录中），然后决定你将使用哪种存储引擎（大多数人会选择
    InnoDB），并配置与之相关的选项。


    一旦配置文件被打开，Windows 用户会注意到里面混杂了一堆不同的注释。


    ![图 7-1：带注释的 my.ini](img/625040_1_En_7_Fig1_HTML.jpg)


    InnoDB 用户需要向下滚动更多（滚动时，如果默认存储引擎尚未调整为 InnoDB，请将其调整为 InnoDB），在存储引擎设置下方，他们会找到一大堆选项。


    ![图 7-2：my.ini 中的 InnoDB 设置](img/625040_1_En_7_Fig2_HTML.jpg)


    这么多选项！好消息是，你不太可能修改每一个——坏消息是，有些参数是必须更改的。


    Linux 用户会比较轻松，因为 Linux 版本的 my.ini——my.cnf——可能只提供与 InnoDB 相关的必要参数，但这些参数同样适用于 Linux
    用户。要详细了解每个参数的作用，请回到本书第 2 章，参考标题为“MySQL 和 MariaDB 中的 InnoDB”的部分——一旦你复习了这些内容，就可以优化以下参数，让
    InnoDB 引擎发挥最佳性能：


    | 参数 | 优化原因 |

    | --- | --- |

    | `innodb_buffer_pool_size` | 这是 InnoDB 缓冲池的大小，用于存储与 InnoDB 相关的数据、索引和 MVCC 数据。将此参数设置为系统可用
    RAM 的至少 60%。 |

    | `innodb_log_file_size` | 此参数描述了 InnoDB 内日志文件的大小。恢复时会筛查日志文件——将此参数设置为大约缓冲池大小的四分之一。较大的日志文件大小对性能更好，但较大的日志文件也会导致
    InnoDB 恢复时间变长。 |

    | `innodb_flush_log_at_trx_commit` | 此参数控制 ACID 合规性与高性能之间的平衡：值为 1 表示符合 ACID，而值为
    0 或 2 将允许更高的速度，但会增加丢失最多一秒事务数据的风险。 |

    | `innodb_flush_method` | 描述了 InnoDB 用于将数据刷新到磁盘的数据刷新方法。某些值仅对 Linux 用户可用。 |

    | `innodb_data_file_path` | 描述了主要 InnoDB 表空间——ibdata1 文件——的文件名和大小。该文件确实可以有任何名称——并且如果我们愿意，可以拆分成独立的文件。
    |


    我已在本书第 2 章中涵盖了与 InnoDB 相关的大部分参数，因此这里不再重复：但是，我希望你特别注意 InnoDB 内的主系统表空间——`ibdata1`文件。它的存在是有原因的，包含了
    InnoDB 正常运行所必需的多类数据，包括数据、索引、多版本并发控制数据、撤销空间、回滚段和两种类型的缓冲——插入缓冲和双写缓冲。这些缓冲具有双重作用：插入缓冲将用于“缓冲”对数据库页面的多次更新，并一次性执行一次大的更新操作；而双写缓冲用于接收从缓冲池刷新的数据：只有当双写缓冲中的数据事先被刷新到磁盘后，InnoDB
    存储引擎才会将数据写入磁盘。


    `ibdata1`的目的就像一座“城堡”，你的部分数据保存在其中。这座城堡通过将与 InnoDB 表相关的数据保存在两个独立的文件中来保持数据彼此分离：一个文件扩展名为“.frm”，另一个为“.ibd”。此特性被称为`file-per-table`特性：通过调整
    InnoDB 中的`file-per-table`变量（可接受的值包括默认值 1 和 0）来控制，从 MySQL 5.6 开始，默认值 1 使得 InnoDB
    能够将与 InnoDB 表相关的数据从`ibdata1`中分离出来，以避免数据存储在一起可能引发的问题。值为 0 会将数据和元数据都“粘合”到`ibdata1`中，这可能是导致一个非常令人沮丧问题的原因：用户将无法从
    InnoDB 中删除数据以减小其表空间的大小。唯一能在磁盘上不留痕迹地从 InnoDB 删除数据（从而缩小`ibdata1`文件）的方法是删除数据库中的数据或直接删除数据库本身，然后删除`ibdata1`和相关的日志文件`ib_logfile*`。然而，这样做将不可避免地彻底破坏所有与
    InnoDB 相关的内容，因此这并不是一个理想的方法。值为 1 会将与 InnoDB 表相关的数据拆分成两个文件——一个保存表数据（`.ibd`文件），另一个保存表元数据（`.frm`文件）。

    '
- fmt: 'This is one of the primary ways that InnoDB keeps our data safe and declutters
    `ibdata1` and also differs from other storage engines – while the data in InnoDB
    is also saved in files similar to MyISAM’s `.MYD` for table data and `.MYI` for
    indexes within, MyISAM doesn’t have a file to “rely on” to power the ACID capability
    while InnoDB does. This makes deleting the data in MyISAM easier (we can just
    delete the `.MYD` files to get rid of MyISAM tables or `.MYI` files to delete
    indexes within them), but ironically, at the same time, this makes MyISAM almost
    unusable for most modern workloads due to instability and frequent data corruption
    issues.


    Aside from that, `ibdata1` can be renamed or split into multiple different files
    by fiddling with the `innodb_data_file_path` variable – advanced users will know
    that the file can extend automatically too. A definition like so:

    ```

    innodb_data_file_path=ibdata1:10M:autoextend

    ```

    Would make the InnoDB data file 10MB in size and allow it to increment in size
    (8MB every time) each time more space is required. One can also define multiple
    data files that InnoDB would store data in together with their sizes like so (in
    this case, we would have three files – `ibdata1`, `ibdata2`, and `ibdata3`, all
    with varying sizes):

    ```

    innodb_data_file_path=ibdata1:10M;ibdata2:100M;ibdata3:500M:autoextend

    ```

    Remember that when `innodb_file_per_table` is enabled (and it will be enabled
    unless you disable it manually), those files would only store metadata related
    to the tables within your infrastructure, so they wouldn’t need to be big either.


    ## Configuring MySQL I/O for Your Operating System

    Once InnoDB is taking the first steps on its own, you should turn your eye toward
    the disk I/O. Disk I/O can become an Achilles heel for your database because it’s
    impossible to run away from I/O operations, and if they aren’t optimized properly,
    they can be a source of much pain and confusion.


    You already know some of the ways disk I/O can be optimized – you’ve increased
    the size of the buffer pool, perhaps adjusted the flush method, and perhaps used
    storage devices facilitating faster access to data (NVMe drives instead of SSDs,
    or SSDs instead of HDDs, etc.)


    Do you know why these ways optimize disk I/O? Everything’s simple:

    *   A bigger InnoDB buffer pool size allows your queries to access the buffer
    pool for a longer period without performing any disk-bound operations, thus reducing
    disk I/O.

    *   Setting the InnoDB flush method to `O_DIRECT` – a default option starting
    from MariaDB 10.6 and only accessible on Unix infrastructure – allows your database
    to avoid the OS cache and allows for more data consistency. Granted, you have
    other options such as `O_DSYNC` which is a faster option than `O_DIRECT`, however,
    when such an option is in use and your database experiences latency or a crash,
    no data consistency would be guaranteed. For a refresher about the flush methods
    available in InnoDB, please go back to Chapter 2.

    *   Using modern drives (think SSD and/or NVMe drives) reduces seek time. This
    is a no-brainer: since SSDs and NVMe drives don’t have any moving parts, their
    seek time can be significantly reduced. That’s why some of us put our OS on NVMe
    drives – we do it for our systems to boot up quickly. According to numerous sources,
    modern hard drives have a seek time of around 5-7 milliseconds, while SSDs have
    a seek time of around 0.10 to 0.20 milliseconds.


    These tips are the bare minimum – to further improve disk I/O, you would have
    to look into a couple of additional parameters:

    *   `innodb_io_capacity` and `innodb_io_capacity_max`: The first variable defines
    how many I/O operations are available to InnoDB, and the second one defines the
    maximum number of I/O operations InnoDB can use when flushing activity lags behind
    the specified capacity.

    *   `innodb_page_size`: Database pages are the backbone of every database providing
    a unit of data storage. Rows of data are stored in database pages, and each page
    has a size – and for InnoDB, that size can be controlled by fiddling with the
    `innodb_page_size` variable. To further optimize InnoDB’s I/O capacity, adjust
    its page size to be close to the sector size of your hard drive.

    *   `innodb_flush_neighbors`: Enable this parameter to help InnoDB optimize disk
    I/O for hard disk drives. Disabled by default.


    Aside from these parameters, one could consider making their log files larger,
    perhaps as large as the buffer pool itself. Such an action would necessitate MySQL
    to take its time when restoring your data as log files need to be read through
    when restoring it, but on the other hand, this could reduce disk I/O during InnoDB
    checkpointing operations.


    Also, in regard to the buffer pool, you can configure InnoDB in such a way that
    allows it to perform operations that read data ahead of time to “warm the buffer
    pool up” to bring data in memory so that reading it wouldn’t necessitate access
    to the disk. Such behavior is already the default starting from MySQL 5.7 – MySQL
    will save the contents of the InnoDB buffer pool and load it on startup.


    Many of you will also know that InnoDB saves a quarter (25%) of the most frequently
    accessed database pages in its buffer pool based on the `innodb_buffer_pool_dump_pct`
    variable.


    ![Figure 7-3](images/625040_1_En_7_Chapter/625040_1_En_7_Fig3_HTML.jpg)

    **Figure 7-3** The default value of the `innodb_buffer_pool_dump_pct` variable


    Since the definition of this parameter is to define the percentage of the recently
    used database pages for a buffer pool to read, this parameter can have a value
    between 1 and 100, and the value of this parameter is a percentage, setting to
    a value of a 100 is also possible and that would mean that InnoDB will try to
    access all of the data in memory without a disk read. Before you set this value
    to 100%, be aware that this variable would only save the percentage of data in
    the buffer pool, but not the entire buffer pool itself, for example, if you have
    a buffer pool of 100GB in size and the buffer pool contains 20GB of data, setting
    this variable to 100% would only save 20GB of data.


    Aside from optimizing disk I/O, keep in mind that certain options in MySQL are
    only available for those using a Unix architecture. The aforementioned `O_DIRECT`
    mode would enable a direct mode for I/O throughput which would bypass the cache
    of the operating system using an option unavailable to be used in Windows.


    Finally, keep in mind that everything running in your operating system is feeding
    on memory, too. Your database is certainly not the only one using your memory,
    and it is said that Windows usually uses more memory than Linux does due to all
    of the additions that come pre-installed with it, but if you install thousands
    of additional appliances on Linux, these will consume memory too. Avoid installing
    applications you don’t need, and you will have more memory you can allocate to
    your database and your application.


    ## Testing Your Hardware

    No matter what kind of operating system you use, hardware is often the limiting
    factor for many databases. No matter if you have billions of rows or if you’re
    just starting out – if your hardware will be a limiting factor, interacting with
    them can become difficult as time goes by. Difficulties can be overcome by properly
    configuring your database, but even that can become a hard task if your hardware
    doesn’t allow for it. Many databases will have certain limiters – and many of
    those limiters have to do with the hardware on your system.'
  raw: 'This is one of the primary ways that InnoDB keeps our data safe and declutters
    ibdata1 and also differs from other storage engines – while the data in InnoDB
    is also saved in files similar to MyISAM’s “.MYD” for table data and “.MYI” for
    indexes within, MyISAM doesn’t have a file to “rely on” to power the ACID capability
    while InnoDB does. This makes deleting the data in MyISAM easier (we can just
    delete the .MYD files to get rid of MyISAM tables or .MYI files to delete indexes
    within them), but ironically, at the same time, this makes MyISAM almost unusable
    for most modern workloads due to instability and frequent data corruption issues.


    Aside from that, ibdata1 can be renamed or split into multiple different files
    by fiddling with the `innodb_data_file_path` variable – advanced users will know
    that the file can extend automatically too. A definition like so:


    ```

    innodb_data_file_path=ibdata1:10M:autoextend

    ```


    Would make the InnoDB data file 10MB in size and allow it to increment in size
    (8MB every time) each time more space is required. One can also define multiple
    data files that InnoDB would store data in together with their sizes like so (in
    this case, we would have three files – ibdata1, ibdata2, and ibdata3, all with
    varying sizes):


    ```

    innodb_data_file_path=ibdata1:10M;ibdata2:100M;ibdata3:500M:autoextend

    ```


    Remember that when `file_per_table` is enabled (and it will be enabled unless
    you disable it manually), those files would only store metadata related to the
    tables within your infrastructure, so they wouldn’t need to be big either.


