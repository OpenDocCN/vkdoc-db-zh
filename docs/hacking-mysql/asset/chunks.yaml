    Now that the basics of security are out of the way, let’s dig deeper into how
    you can secure your most precious assets from data theft. In this chapter, I’ll
    walk you through numerous methodologies that will help you apply security guidelines
    for your specific use case, we’ll dig more into account categories, password management,
    account locking, security plugins, backups, SQL injection, and other attacks that
    may someday target your database instance.


    ## Security Guidelines for Specific Use Cases and Defense in Depth


    Truth be told, security guidelines and appliances often have to be applied and
    used differently depending on the use case. Think about it – having your things
    stolen because you’ve left the door unlocked and went on vacation for a month
    and having your things stolen because you’ve been threatened at gunpoint is different,
    right? The same can be said about security – while basic security principles don’t
