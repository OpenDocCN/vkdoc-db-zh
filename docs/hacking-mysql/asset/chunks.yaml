  trans: '同时，如果你们中有人期待我说出“将 ACID 换成速度，以牺牲持久性为代价，数据库的写入速度将提升 852%”这样的话，那情况很可能并非如此。你的
    `INSERT` 查询确实会显著变快，但关键在于，如果你已经按照我前面展示的方法针对更大数据集优化了你的数据库，那么你一开始很可能就会使用 `LOAD DATA
    INFILE` 而非 `INSERT`。即使你因任何原因无法使用 `LOAD DATA INFILE`，风险也往往不值得那点收益——但说到底，你是自己决策的主人。你可以随意将
    `innodb_flush_log_at_trx_commit` 变量设为 0 或 2，用 ACID 换取速度并观察结果，然后自行判断风险是否值得。


    ## 大数据陷阱与已知问题


    尽管大数据为你的基础设施带来诸多好处，但也要意识到它并非没有缺陷。有起必有落，对吧？在处理启用大数据的项目时，你们中的许多人会很快发现，大数据意味着你有时处理数据会很困难。你不会经历噩梦，但你必须在瓶颈让数据库崩溃或数据损坏之前意识到它们——我将从
    `LOAD DATA INFILE` 开始讲起。


    `LOAD DATA INFILE` 是你的好帮手——它能快速地将数据加载到数据库中。这正是它的设计目的，但它并非没有细微的差别。你们中许多过去使用过这个查询的人可能注意到，在插入一批数据后，这个查询会变慢。过去，人们会争论说解决此问题的方法是将
    InnoDB 切换为 MyISAM，运行像 `DISABLE KEYS` 这样的查询，然后再试一次，但对于当今运行此类查询的人来说，这样的建议已经不合时宜且过时了。`DISABLE
    KEYS` 对 InnoDB 无效，因为该存储引擎的设计根本不支持使用这样的子句——MyISAM 才支持。然而，对于更大数据集使用 MyISAM 绝对是一场噩梦。即使你的用例确实需要精确的行数，使用
    `SELECT … INTO OUTFILE` 导出数据，然后用 EmEditor 或其他能够打开较大数据集的编辑器（Notepad++ 在这里不适用——它会崩溃）来计算文件中的行数，很可能是更好的选择。


    让你尽可能快地运行 `LOAD DATA INFILE` 的最佳方法是：运行 InnoDB、依赖 InnoDB 缓冲池，并在必要时，将要导入 InnoDB
    的数据拆分成许多小块（为了获得良好的性能，目标是一个文件大约在 5–10 万行的范围内），或者在 `LOAD DATA INFILE` 完成任务前调整 `autocommit`。


    还有，你们中有多少人需要在那拥有数亿行的 `ID` 列上建立主索引？仅该列本身就占用多少磁盘空间？30GB？40GB？如果删除该列，那可就是 30GB 的可用硬盘空间。


    考虑到列的问题，你会惊讶地发现我们中有多少人在处理大数据集时遵循着“常规”的数据建议。这些建议本身不一定是“坏”的，但当我们的数据增长时，就需要跳出思维定式。唯一索引就是个完美的例子——如果你最多只有一百万行数据，它们可能是个选择，但对于数亿量级的数据，它们很可能就是一场噩梦：你会堵塞你的数据库！深入研究
    Linux 选项——即使你使用的是 Windows，安装 `Cygwin` 你就能访问几乎所有这些工具。在原始数据上使用它们——它们很可能比通过 CLI 执行的常规
    SQL 查询快得多。


    几年前，我在论坛上看到一个帖子，人们在讨论数据或某种搜索引擎。我记得有人评论了一些关于数据解析的内容——大致是“你们如何将数据保存在数据库中？你们如何分析数据，以及你们用什么来使查询快速？”作者回复的大意是“搜索引擎内部的数据都是经过解析的格式，否则会大得多<…>值得庆幸的是，通过在后端使用
    MySQL，我们可以让数据库为我们处理所有必要的解析——我们甚至在数据到达生产服务器之前就移除了不必要的数据<…>通过确保数据在本地被解析并可用，我们节省了磁盘空间，并使用本地副本执行数据分析<…>”这让我提到了另一个关键点——*数据解析*。


    解析并非什么革命性的东西，但它对于提取你感兴趣的信息来说是绝对必要的。它帮助你将数据转换为结构化格式，以便于阅读、使用，并在必要时进行分析。


    数据分析是另一个值得一提的点——如果你有更大的数据集并且需要，比如说，计算表中某一列的特定字符串出现的次数，你可以将这个任务交给 MariaDB：把所有与数据分析相关的查询放入一个文件，让它们在完成后创建描述结果的独立文件，然后通过
    MariaDB 在本地环境运行该文件——你需要等待，但 MariaDB 会为你分析数据并将结果写入文件——这不是很棒吗？这里有个例子：


    ```sql

    SELECT SUBSTRING_INDEX(column, ''[CHARACTER]'', -1) AS x, COUNT(*) AS total

    FROM `demo_table` GROUP BY `column2`

    INTO OUTFILE ''/tmp/demodata_analysis.txt'';

    ```


    上面的 SQL 查询将获取特定字符右侧的所有内容（负值获取右侧所有内容，正值则相反），将所有内容放入名为 `x` 的变量中，然后计算并将在指定字符之前或之后出现的内容分组后写入文件。这意味着你完全可以去给自己泡杯咖啡，让
    MySQL 分析你的数据并将结果写入文件。


    这种数据分析方法可能并不适合所有人，但对于某些用例（例如，统计特定电子邮件顶级域名被使用的次数等），它们可能是黄金解决方案，这就是为什么你必须自己通过了解其优缺点来选择和使用处理数据的方法。大数据分析总是需要时间，但与此同时，你可以让
    MariaDB 完成所有工作，然后去做其他事情。


    许多大数据陷阱也与索引的使用有关——这不应该令人惊讶，因为索引主要用于加速 `SELECT` 查询，而 `SELECT` 查询构成了许多大数据应用的大部分。它们也必须被恰当地使用——这正是我们现在要探讨的内容。


    ## 总结


    为更大数据集优化 MySQL 或 MariaDB，与为常规用例优化 MariaDB 并没有本质区别。那些在 MariaDB 中运行更大数据集的人必须意识到，有时通过数据库执行某些操作是不可行的，而如果在
    Linux 架构上运行这些命令的等效命令（如果我们使用像 `Cygwin` 这样的工具，同样的命令也可以在 Windows 上运行），操作可能会完成得更快。


    无论如何，当我们在关系数据库管理系统中处理更大数据集时，有一些事情我们应该注意——但这些都不包括为了非关系数据库管理系统而将 MariaDB 弃之不理。如果我们遵循最佳实践，MariaDB、MySQL
    和 Percona Server 都完全有能力处理大数据。索引就是这些最佳实践之一——而且你的数据集越大，它们就会变得越重要。这正是我们现在要探讨的。


    ## 11. MySQL 索引技术'
- fmt: '# 索引是任何数据库的关键部分


    索引是任何数据库的关键部分。许多人甚至会说，没有索引的数据库性能是一个神话——这并非没有原因。索引是一种数据结构，通过利用硬盘空间来促进更快的数据访问；因此，它们并非革命性的发明，但同时，这也是为什么本书有一整章专门讨论键（键是索引的同义词）的原因——如果使用得当，这些键可以以你无法想象的方式打开通往数据库性能天堂的大门。


    索引并非对所有情况都有帮助——它们可以使 `SELECT` 查询更快，但同时会损害 `INSERT`、`UPDATE` 和 `DELETE` 的性能。


    我重复一遍——索引 *可以* 使查询更快，但不能保证它们 *一定* 会。优化 `SELECT` 查询性能也是一项任务——为了让索引使 `SELECT` 查询更快，它们首先必须被你的数据库使用。本章将帮助你理解如何、为何以及何时使用索引来提高查询性能。


    ## 为什么需要索引？MariaDB 中可用的索引类型


    在做任何事情之前，有必要回答“为什么要做”的问题。索引也是如此——为什么要对数据建立索引？是什么让你认为“索引可能在这里有帮助？”答案很简单——索引充当数据的指针，促进对该数据的更快访问。


    把索引想象成书中的目录——如果你想阅读某一特定章节，你会怎么做？你会翻到书的开头，查看里面的所有章节，然后看到该章节从哪一页开始，以确定你应该翻到哪一页。你这样做有充分的理由——如果一本书超过400页，没有目录会使查找该章节的任务困难得多，但当你知道了关于索引的章节从157页开始，你就可以直接翻到第157页开始阅读。


    在数据库方面，事情稍微复杂一些——不同类型的数据库管理系统可能提供不同类型的索引供你选择。因此，索引建议可能因数据库而异。同时，建议也可能因DBMS而异，但其主要方面随着时间的推移保持不变——理解索引的核心原理将使你始终领先一步，因此，你需要时刻熟悉可用的索引类型。


    同时，索引并非解决所有问题的灵丹妙药，从长远来看它们也可能带来问题，但在解决读取数据的速度问题上，它们极其出色和娴熟。


    MySQL、MariaDB 和 Percona Server 中的索引类型如下：


    1.  **B-Tree索引**：B-Tree索引指的是平衡树索引，这种索引是MySQL中最常用的索引类型。一旦我们的查询使用相等运算符搜索数据的精确匹配，或者我们使用
    `LIKE` 或 `BETWEEN` 运算符时，就会使用此类索引。为了使查询能够利用此类索引，我们必须确保查询使用 =、<、<=、> 或 >= 等运算符来指定精确匹配。


    2.  **R-Tree索引**：R-Tree索引被称为空间索引。在MariaDB及其合作伙伴中，这种索引类型专门用于索引地理对象。


    3.  **哈希索引**：此类索引只能与 `MEMORY` 存储引擎一起使用，并且只能与使用相等运算符的SQL查询结合使用。使用此类索引的查询速度会非常快，但此类索引只能保存在内存中而不能保存在磁盘上，因此哈希索引的适用场景有限。


    4.  **覆盖索引**：MariaDB中的覆盖索引“覆盖”了查询执行所需的所有列。它们在MariaDB中是一种特殊类型的索引，因为如果正确实施此类索引，你的数据库将从索引中读取数据而不是从磁盘读取，从而大大减少访问数据所需的时间。


    5.  **聚簇索引**：MariaDB中的聚簇索引是 `PRIMARY KEY`，或者如果表中不存在主键，则是 `UNIQUE` 索引。


    6.  **复合索引**：复合索引覆盖多个列，因此有时被称为多列索引。如果一个索引同时驻留在多个列上，它就是一个复合或多列索引。


    7.  **前缀索引**：最后，前缀索引允许我们只索引列的一小部分。对于那些有大量数据要处理而不想索引特定列整个值的人来说，这种做法可能非常受欢迎。


    请记住，`PRIMARY KEY` 约束也是索引，`UNIQUE` 索引也是。


    如你所见，每种索引类型解决不同的问题；因此，你们大多数人不需要使用所有类型，但了解它们的用法是必要的。同时，请记住每个索引（键）都附带几个相关方面：


    1.  **索引的标题是什么？** 所有索引都会有一个分配给它们的标题——你可以选择分配自定义标题，或者让数据库在索引名称下分配一个标题。


    2.  **索引的类型是什么？** 索引类型决定了你的查询在访问数据时应遵循的规则。


    3.  **索引是否被压缩？** 索引压缩有助于索引在磁盘上占用更少的空间。


    4.  **索引驻留在哪一列上？** 索引驻留的列将决定你在 `WHERE` 子句后形成 `SELECT` 查询时的操作。


    5.  **索引的基数是多少？** 换句话说，索引有多少个唯一值？基数越高越好。


    6.  **注释**：每个索引都可以有与之相关的注释，以方便理解其定义的原因。注释是可选的，在使用某些SQL客户端时可能显示也可能不显示。


    MariaDB中索引的这些方面让你理解它们是如何工作的——它们是数据结构，每个数据结构都有细微差别。鉴于所有索引都可以像创建一样轻松地被删除，它们的方面并不是什么大问题，但每个方面都揭示了与你的数据库性能相关谜题的一部分，在解决了那个谜题之后，你将能够使任何数据库的性能飙升，无论数据量有多大。


    考虑到这些方面，请记住索引并不总是你能采取的最佳路径。索引并不总是有意义——由于索引促进更快的数据访问，它们只有在我们有大量数据需要读取时才有效。它们也有我上面提到的缺点，所以在添加索引之前，想想你将如何回答以下问题：


    1.  你的使用场景是什么？


    2.  你的数据集是否足够大，以至于在列上建立索引有意义？


    3.  你的服务器具体情况如何？有多少硬盘空间可用？


    4.  你以前使用过索引吗？如果是，使用情况如何，结果是什么？


    5.  添加索引时，你需要重新创建表，还是修改现有数据就足够了？


    上述问题的答案将指引你走向你需要采取的路径。并非所有使用场景都需要索引，索引并不总是有意义的，而且你的服务器可能没有足够的磁盘空间让你的索引驻留在特定列上（在这种情况下，考虑前缀索引并审查服务器的具体情况）；之前使用索引的糟糕经历可能是需要克服的某些信念的原因，而向表添加索引的方法也将直接取决于你的使用场景。'
  raw: 'Indexes are a crucial part of any database. Many would even say that database
    performance without indexing is a myth – and that’s not without a reason. Indexes
    are data structures that facilitate faster access to data by making use of hard
    drive space in the process; thus, they aren’t exactly revolutionary, but at the
    same time, the reason why this book has an entire chapter dedicated to keys (keys
    are a synonym to indexes) is that when used properly, these keys can unlock doors
    toward the database performance heaven in ways you couldn’t even imagine.


    Indexes don’t help with everything – they can make `SELECT` queries faster, but
    at the same time harm the performance of `INSERT`s, `UPDATE`s, and `DELETE`s.


    I’ll repeat – indexes *can* make queries faster, but there’s no guarantee that
    they *will*. Optimizing `SELECT` query performance is a task too – for your indexes
    to make `SELECT` queries faster, they have to be used by your database in the
    first place. This chapter will help you understand how, why, and when to use indexes
    to make your query performance faster.


    ## Why Index? Indexes Available in MariaDB


    Before you do anything in life, it’s necessary to have answers to the question
    of why you do it. The same thing applies to indexes – why do you index data? What
    makes you think “Indexes may help here?” The answer is simple – indexes act as
    pointers to data facilitating faster access to that data.


    Think of an index as an index in a book – if you want to read a specific chapter,
    what do you do? You turn to the beginning of the book and observe all of the chapters
    inside of it, then see what page the chapter begins from to see what page you
    should turn to. There’s a good reason why you do it – if there are more than 400
    pages, an index being unavailable would make the task of searching for that chapter
    much harder, but after you know that the chapter about indexes starts from page
    157, you turn to page 157 and start reading.


    When it comes to databases, things are a little more complex – different types
    of database management systems may offer different types of indexes you can choose
    from. Thus, indexing advice may differ from database to database. At the same
    time, advice may differ from DBMS to DBMS, but its main aspects remain the same
    as time goes by – understanding the core principles of indexes will always put
    you ahead of the curve, and thus, you need to be well-acquainted with the types
    of indexes that are available for you to use at all times.


    At the same time, indexes are not a cure for all of your problems, and they may
    also create problems in the long run, but they’re extremely good and adept at
    solving speed problems when reading data.


    The types of indexes in MySQL, MariaDB, and Percona Server are as follows:


    1.  **B-Tree indexes**: B-Tree indexes refer to Balanced Tree indexes, and such
    indexes are the most frequently used index type within MySQL. Such indexes will
    be in use once our query is searching for exact matches of data with the equality
    operator and also if we’re using the `LIKE` or `BETWEEN` operators. For queries
    to make use of such an index, we have to ensure that our queries specify an exact
    match by using operators like =, <, <=, >, or >=.


    2.  **R-Tree indexes**: R-Tree indexes are referred to as spatial indexes. Such
    an index type within MariaDB and its partners is used exclusively to index geographical
    objects.


    3.  **Hash indexes**: Such indexes can be used only with the `MEMORY` storage
    engine, and they can only be used in conjunction with SQL queries that use the
    equality operators. Queries using such indexes will be blazing fast, but such
    indexes can only be held in the memory and not on the disk, so the hash indexes
    have limited use cases.


    4.  **Covering indexes**: Covering indexes within MariaDB “cover” all of the columns
    necessary for a query to execute. They’re a special type of index within MariaDB
    in that if such indexes are implemented correctly, your database will read data
    from the indexes and not from the disk, thus drastically reducing the time needed
    to access your data.


    5.  **Clustered indexes**: Clustered indexes in MariaDB are `PRIMARY KEY`s, or
    if none are present within the table, `UNIQUE` indexes.


    6.  **Composite indexes**: Composite indexes cover multiple columns, and thus,
    they’re sometimes referred to as multicolumn indexes. If an index resides on multiple
    columns at once, it is a composite, or a multicolumn, index.


    7.  **Prefix indexes**: Lastly, prefix indexes allow us to only index a small
    part of a column. Such practice may be very welcome for those who have a lot of
    data to work with and don’t want to index the entire value in a specific column.


    Keep in mind that `PRIMARY KEY` constraints are also indexes, as are `UNIQUE`
    indexes.


    As you can tell, each type of index solves a different problem; thus, most of
    you won’t need to use all of them, but knowing your way around them is necessary.
    Also, keep in mind that every index (key) comes with a couple of aspects related
    to it:


    1.  **What’s the title of the index?** All indexes will have a title assigned
    to them – you have the choice of assigning a custom title or making the database
    assign a title under the index name instead.


    2.  **What’s the type of the index?** The index type determines the rules your
    queries should follow when accessing data.


    3.  **Is the index compressed?** Index compression helps indexes to take less
    space on the disk.


    4.  **What column does the index reside on?** The column the index resides on
    will dictate your actions when forming `SELECT` queries after a `WHERE` clause.


    5.  **What’s the cardinality of the index?** In other words, how many unique values
    does the index have? The higher the cardinality, the better.


    6.  **Comments**: Each index can have comments related to it to ease the understanding
    why they were defined. Comments are optional and may or may not be displayed when
    certain SQL clients are in use.


    These aspects of indexes within MariaDB let you understand how they work – they
    are data structures, and every data structure has nuances. Given that all indexes
    can be deleted just as easily as they can be created, their aspects are not a
    big deal, but each aspect uncovers a piece of the puzzle related to your database
    performance and after solving that puzzle, you will be able to make the performance
    of any database skyrocket, no matter how much data is at the helm.


    With aspects in mind, keep in mind that indexing isn’t always the best path you
    can take. Indexing doesn’t always make sense – since indexes facilitate faster
    access to data, they’re only useful when we have a lot of data that we are reading
    through. They also have drawbacks I’ve covered above, so before adding an index,
    think about how you would answer the following questions:


    1.  What’s your use case?


    2.  Is your data set big enough for an index on a column to make sense?


    3.  What are the specifics of your server? How much hard drive space is available
    to use?


    4.  Have you used indexes previously? If yes, in what capacity and what were the
    results?


    5.  When adding indexes, will you need to create tables anew, or is modifying
    existing data enough?


    The answers to the questions given above will direct you to the path you need
    to take. Not all use cases necessitate indexing, it doesn’t always make sense
    to index, and your server may not have enough disk space for your index to reside
    on a specific column in the first place (in that case, consider prefix indexes
    and review the specifics of your server); sour experiences with indexes previously
    may be the cause of certain beliefs that need to be overcome, and methods of adding
    indexes onto a table will be directly dependent on your use case too.'
