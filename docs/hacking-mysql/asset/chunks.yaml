    \n对于许多数据库管理系统的用户来说，分区是一个熟知的概念——MySQL 用户也不例外。数据库中的表被分区是为了使其中的数据更易于管理和访问，或者是为了负载均衡。在\
    \ MySQL、MariaDB 和 Percona Server 中，只有两种存储引擎支持分区：它们是 InnoDB 和 NDB。\n\n## 为什么要分区数据？\n\
    \n要理解我们为什么要分区数据，我们首先需要理解分区的目的。在这方面，分区与索引的作用类似。一旦我们访问分区中的数据，我们的数据库就会读取更少的数据（例如，1500\
    \ 万行而不是 1 亿行），因此，我们的查询可以更快地完成。*分区也可以与索引结合使用*，以使读取操作的性能更快——这种方法对于拥有数十亿条记录的人可能有益。\n\
    \n分区是有益的，因为它们的目的是将大数据集拆分成更小、可管理的部分，并且由于每个分区包含数据的一个子集，管理拆分到这些子集中的数据变得容易得多。分区数据有助于提高可扩展性、可管理性和性能，代价是空间——就像索引一样，分区有自己独特的文件，存储与该分区相关的数据，这些文件会占用磁盘空间。分区彼此分开存储，你的数据库将每个分区视为一个单独的表，同时通过\
    \ SQL 层将表及其分区视为一个对象。这样做是为了减轻数据访问负担，使分区更易于访问和使用。\n\n## 何时分区数据？\n\n为了回答这个领域可能最重要的问题，我将从一个我在\
    \ Stack Overflow 上看到的例子开始。这个例子的主要观点如下（我将提问的用户称为用户 X，给出被采纳答案的用户称为用户 Y）：\n\n1. \
    \ 用户 X 说他运行一个大约 200 万行、39 列的表，并且该表每天都在增长。然后，他提到查询这样一个数据集需要很长时间，并说有人（可能是他的工作同事）建议他对这个大表进行分区。\n\
    2.  用户 X 有几个问题：\n    1.  什么时候是分区数据的时候？\n    2.  分区表是否可能提高查询性能？\n    3.  如果他对表进行分区，分区是否会导致需要更改任何正在运行的`SELECT`、`INSERT`或其他语句？\n\
    \    4.  执行分区需要很长时间吗？\n    5.  如果分区有帮助，该如何进行？如何识别应该分区的列和应该保持原样的列？\n\n许多用户插话提供建议——一个被用户\
    \ X 采纳的建议以以下方式回答了问题：\n    1.  可能永远不会。\n    2.  分区可能会稍微降低查询性能。查询耗时很长通常是因为缺少适用的索引，可能是一个复合索引。你构建查询的方式也有影响，而且查询的设计对查询的影响可能远大于分区。\n\
    \    3.  视情况而定。\n    4.  视情况而定。\n    5.  分区不会有帮助，因为你的表只有大约 200 万行。从优化运行缓慢的查询性能开始，当你有更大的数据集需要处理时再考虑分区。\n"
- fmt: 'Why did the user Y answer questions in such a way? What’s hidden behind his
    words? Let’s find out:

    1. For partitioning to be particularly effective, one needs to have big data sets
    to work with. “Big” means something with tens of millions of rows at the very
    least. Thus, by saying “probably never,” he meant “you don’t have enough data
    to necessitate partitioning.”

    2. For partitioning to be effective, it has to work in conjunction with queries,
    not replace them and work for them instead. The user needs to take care of query
    design first and add any applicable indexes, then if that doesn’t help, turn to
    partitions.

    3. It depends because no queries were ever provided for inspection – if queries
    through 2 million rows are already slow, there are enough problems aside from
    partitioning.

    4. It depends on the configuration of your database and the resources of an applicable
    server – everything comes down to the storage engine in question, too (I’d guess
    user X is using `InnoDB`), and for partitioning to be completed as quickly as
    possible, certain parameters need to be optimized properly and data needs to be
    inserted in a way that doesn’t obstruct the database.

    5. If queries are already slow, partitioning 2 million rows isn’t likely to do
    much good – in fact, it may do more harm than good because if your queries are
    a mess on 2 million rows to begin with and your data is growing, I can only imagine
    what happens once you reach data exceeding 8 digits.


    The answers may seem a little mean to some, but they have a lot of weight – in
    this case, partitioning isn’t necessary, because there simply isn’t enough data
    to warrant it. So, when does one decide it’s time to partition data?


    There is no “one-rule-fits-all” solution here; the time to partition data arrives
    when you’ve optimized your schemas, queries, and indexes, and see that none of
    your approaches help increase the performance of your queries to a satisfactory
    level. The performance of your queries may still be declining because you search
    through a lot of data and your database thinks that this much data is too much
    to handle. That isn’t likely to happen for many of you, but once or if that happens,
    it’s time to think about partitions. Some of you may decide whether your use case
    necessitates partitions without doing that: if you already know that your use
    case necessitates users searching through more than 100 million rows, is it worth
    your time or effort to postpone partitioning? No.


    In other words, partition your tables when you know that you’re going to store
    a lot of rows inside a table. Exceeded 100 million rows in one table? Time to
    partition. Have reasons to believe that your data set will exceed 100 million
    rows in one table? Partition. Optimized both your database and queries with indexes,
    but queries are still slow? Consider partitioning. One thing you shouldn’t be
    doing, though, is indexing/partitioning everything you see: everything has a price,
    and both indexes and partitions will slow down queries that update, insert, or
    delete data. In other words, partition carefully and only after fully understanding
    the implications of a given partitioning type.


    ## Internals of Database Partitioning


    Partitioning splits data into separate tables, but for many, it’s hard to understand
    because your database deals with partitioning in silence: it doesn’t show information
    on partitioned tables once you run `SHOW TABLES` or provide much information by
    default, so if you don’t know ways to see what’s going on behind the hood partitioning-wise,
    you may have a tough time advising fellow developers what to do and what’s wrong.
    Thankfully, MySQL and its counterparts do provide ways for developers to obtain
    information about partitions existing in a database. One can use the `SHOW CREATE
    TABLE` statement.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig1_HTML.jpg)


    Figure 12-1

    `SHOW CREATE TABLE` in MariaDB


    Alternatively, one can understand if a table is partitioned through the `SHOW
    TABLE STATUS` option – inspecting the `Create_options` column will do the trick
    (note that this query doesn’t display the actual partitions, just whether the
    table is partitioned or not).


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig2_HTML.jpg)


    Figure 12-2

    Partial output of `SHOW TABLE STATUS` in MariaDB


    `SHOW TABLE STATUS` won’t display the names and types of partitions, but it will
    provide many other useful information such as the engine the table is running,
    how many rows exist in a table, what’s the average data length, index length,
    whether the table has an automatically incrementing column, what it’s collation
    looks like, etc.


    For those wanting to do things through the CLI, we can understand if data is partitioned
    if we inspect the data directory in MariaDB or MySQL and see `[table_name]#p#[title].ibd`
    but for the file name to not be misinterpreted, the output would require a bit
    of knowledge to understand what everything means (`table_name` refers to the table
    name, `#p#` refers to the partition, and `title` refers to the name of the partition
    while `.ibd` refers to the data file.)


    As an example, I’ll list the files available within the `hacking_mysql` database.
    Take a look – what partitions do you see here and on what table?


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig3_HTML.jpg)


    Figure 12-3

    Data files in MariaDB


    We see two partitions under the names of `partition_1` and `partition_2`. These
    partitions reside on the `demo_partitioned` table that runs the `InnoDB` storage
    engine – got the idea?


    Granted, files won’t say what type of partitioning is in use, so that’s a downside.
    The type of partitioning may determine the effectiveness of partitions themselves,
    and so when thinking about whether to partition your tables and how to do it,
    it’s wise to return to the roots and understand the options permitted by partitioning
    in the first place.


    ## Types of Partitioning in MySQL


    Options permitted by partitions in MySQL and its counterparts directly depend
    on the type of partitioning you find yourself using. Available partitioning types
    in MySQL and its counterparts include four partitioning types – each of those
    partitioning types comes with its upsides and downsides and those are as follows:


    1. Partitioning by `RANGE` or `RANGE COLUMNS`: Partitioning data by range is one
    of the most frequently used ways to partition data in MariaDB and MySQL. Partitioning
    data by range enables us to spin up separate partitions for data falling within
    a given range, so partitioning by range would allow you to store rows with values
    less than `100` in one partition, values less than `50` in another, and use another
    partition for values less than `25`. Partitioning by `RANGE COLUMNS` lets users
    provide MySQL with a list of one or more columns to be used when defining partitioning
    ranges, too.

    2. Partitioning by `LIST` or `LIST COLUMNS`: Such a partitioning type accepts
    a list of values as the partitioning key. When such a partitioning type is in
    use, data falls into partitions based on whether it’s included in the list or
    not.

    3. Partitioning by `HASH`: Partitioning by hash ensures an even distribution of
    data across a number of defined partitions. Only numeric expressions are accepted
    as the partitioning key.

    4. Partitioning by `KEY`: Partitioning by key is similar to partitioning by hash,
    but where partitioning by hash takes user input, partitioning by key takes input
    provided by the server (i.e., an internal hashing function is used). As a result,
    we only need to define the number of partitions.


    Aside from these types of partitioning, many database management systems support
    subpartitioning, and MySQL is not an exception.


    Partitioning by `RANGE` is perhaps one of the most frequent ways to partition
    data in MySQL. Such a partitioning type is rather easy to understand. Take a look
    at this example:'
