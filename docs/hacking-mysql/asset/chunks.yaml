    also write queries in a way that doesn’t obstruct your database from helping you
    (e.g., if wildcard signs are found to be necessary, avoid using them at the beginning
    of your query, etc.) and close database connections once they’re no longer necessary.


    However, some of these tips are only applicable when the database is being built
    and may not necessarily be applicable once you’ve been working with it for some
    time. As time flies by, more and more database issues occur, and it’s vital to
    know how to tackle them and prevent them from occurring too. Some of you may have
    been working with your database – and breaking your queries – for years too.


    # 4. How You Broke Your Queries


    Understanding the reasons behind why your queries are slow and don’t produce the
    necessary results is an essential skill for both novices and power users alike.
    After all, we optimize something that’s broken – how can we optimize our queries
    if we don’t even know what actions of ours broke them? This is what I’ll help
    you explore in this chapter. This chapter will focus on the essentials of broken
    queries as well as some things you may not know, so make sure to read it carefully.
    Not all advice in this chapter may apply to your specific use case either – weigh
    the ups and downs of my advice, and take from it what you will. If you’re not
    sure about something, you can always consult the latest version of documentation
    concerning your specific DBMS or ask your friendly neighborhood DBA.


    ## The Good, Bad, and the Ugly: Understanding Queries in MySQL


    You may think you understand your queries. After all, queries in MySQL aren’t
    rocket science: there are only so many queries you count on in your daily work.
    These may be `INSERT`, `SELECT`, `UPDATE`, `DELETE`, and a couple of queries you
    turn to when these don’t help. Seriously – that’s kind of it. Yet, people still
    struggle to achieve performance: their SQL queries time out, MySQL greets them
    with errors, or customers contact them in regard to downtime headaches.


    Much of that has to do with improperly written queries – we’ve gone through some
    examples in the last chapter where I walked you through some causes of slow query
    performance, but you’d be surprised at the things you do that break your queries
    from the inside. Some of you don’t even think of them and they’re there – hiding
    in plain sight.


    ## How You Broke Queries in MySQL


    Contrary to popular belief, breaking your queries is easy. So easy in fact, that
    some of your colleagues are probably already breaking them without even knowing
    it.


    You see, both developers and DBAs – no matter how senior they are – know how to
    write queries: who doesn’t? The problems start when we start miscommunicating
    with our databases and biting off more than we can chew. Standard approaches are
    nice and good – until your application notoriety grows. With it grows the load
    onto your database and ways that helped you squash database issues before might
    be not applicable anymore.


    I’ve walked you through a couple of such scenarios in Chapter [3](#625040_1_En_3_Chapter.xhtml):
    remember how I told you that you should take some time to think about your query
    structure? Properly choose data types and collations? Avoid using wildcards at
    the beginning of the queries having a `LIKE` clause? Each of these points of advice
    has merit – and the more points of relevant advice you adhere to, the faster you
    will bring your SQL queries back to their former glory. I will now walk you through
    the types of queries in MySQL, factors that are disliked by your queries, and
    explain why, how, and when that happens so you can head off performance issues.


    ## Types of Queries in MySQL


    MySQL has many types of queries available for you to use. These include the common
    set of four CRUD (Create, Read, Update, and Delete) queries, but also other SQL
    statements exclusive to DDL (Data Definition Language), DML (Data Manipulation
    Language), DCL (Data Control Language), and TCL (Transaction Control Language).
    In the MySQL world, such statements include, but are not limited to, the following
    data languages and statements:


    | Language and Explanation | Clauses and Statements |

    | --- | --- |

    | Data Definition Language (DDL) | `ALTER, CREATE, DROP, RENAME, TRUNCATE` |

    | Data Manipulation Language (DML) | `CALL, DELETE, DO, EXCEPT, INSERT, LOAD [DATA&#124;XML],
    REPLACE, SELECT, UPDATE, UNION, VALUES, WITH (CTEs)` |

    | Data Control Language (DCL) | `GRANT, REVOKE` |

    | Transaction Control Language (TCL) | `COMMIT, ROLLBACK` |


    In other words, queries in MySQL help you define, manipulate, or control your
    data or facilitate work with groups of statements that are handled as a single
    unit – these groups of statements are called *transactions*. As such, transactions
    cannot be inserted or deleted – they are either committed (saved in your database)
    or rolled back (restored to a previously defined state within your database.)


    ### Factors Breaking DML Queries in MySQL


    When it comes to understanding what breaks your queries, it’s crucial to come
    back to the basics: remember what I told you in the last chapter? *Queries are
    tasks that are composed of other tasks. To make their performance faster, make
    the execution of those tasks faster or eliminate those tasks.* That’s a piece
    of advice you can give to any developer who complains about inadequate query performance.


    This piece of advice is a very good starting point – when you start to delve deeper
    into what it means, you start to understand what hinders and breaks your queries,
    and once you understand what hinders your queries from reaching their goal, you
    can start squashing problems.


    Tasks are pieces of work that need to be accomplished to reach a goal. That goal
    differs depending on what query is in use: `INSERT` queries add data into tables
    in a database, `UPDATE` queries update the necessary columns in a table, and so
    on. Each query has a goal – a goal that you will have trouble achieving if your
    queries are broken.


    Take the following table depicting messages sent between users.


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Table used for demonstration purposes


    The table itself is nothing unusual – it’s a simple table depicting sent and received
    messages with a timestamp. Tables with structures given above are a very common
    occurrence in various content management systems.'
  trans: '

    *   注意，如果使用了分区，`UPDATE` 查询可能会比平时更慢，因为 MySQL 需要同时更新分区中的数据和数据本身（并且，如有必要，还需要切换数据所在的分区）。

    *   还需注意，`NULL` 值在更新方面也有一个陷阱——如果你将一个 `NULL` 值插入分区，它将存储在可能的最低分区中。


    最后，为了优化 `DELETE` 查询，可以考虑使用 `LIMIT` 子句来删除数据，如果删除操作耗时很长，可以在删除数据前先删除索引和分区，最终，如果你要删除表中的所有行，可以使用
    `TRUNCATE` 代替 `DELETE`：`TRUNCATE` 查询总是比 `DELETE` 更快，因为它不是逐条删除记录，而是一次性删除表中的所有行。


    ## 总结


    如你所知，MySQL 拥有分层架构——这些层可能被破坏，而破坏任何一层都会影响其他层的性能。本章引导你通过为用例正确选择模式和数据类型来理解你的数据，并让你了解
    MySQL 中可用的字符集和校对规则。


    在可靠的架构上构建 MySQL 并选择与数据库通信的适当方式至关重要——但这还不够。人们还应该以不阻碍数据库帮助你的方式编写查询（例如，如果发现通配符是必要的，请避免在查询开头使用它们等），并在不再需要时关闭数据库连接。


    然而，其中一些建议仅在数据库构建时适用，一旦你使用了一段时间后，可能就不一定适用了。随着时间流逝，越来越多的数据库问题会发生，了解如何处理和预防它们至关重要。你们中的一些人可能多年来一直在使用你们的数据库——并且破坏你们的查询。


    # 4. 你如何破坏了你的查询


    理解你的查询为何缓慢且无法产生必要结果的原因，对于新手和高级用户来说都是一项基本技能。毕竟，我们优化的是坏掉的东西——如果我们甚至不知道自己的哪些行为破坏了它们，又如何能优化查询呢？这就是我将在本章中帮助你探索的内容。本章将重点讨论破坏查询的本质以及一些你可能不知道的事情，所以请务必仔细阅读。本章中的所有建议并非都适用于你的特定用例——权衡我建议的利弊，取你所需。如果对某些内容不确定，你随时可以查阅针对你特定
    DBMS 的最新版本文档，或咨询你友好的本地数据库管理员。


    ## 好的、坏的和丑陋的：理解 MySQL 中的查询


    你可能认为你理解你的查询。毕竟，MySQL 中的查询并非火箭科学：你日常工作中依赖的查询只有那么多。这些可能包括 `INSERT`、`SELECT`、`UPDATE`、`DELETE`，以及当这些查询不起作用时你会求助的几个查询。说真的——差不多就这些。然而，人们仍然难以获得性能：他们的
    SQL 查询超时，MySQL 以错误信息迎接他们，或者客户因停机问题联系他们。


    这在很大程度上与查询编写不当有关——我们在上一章中已经介绍了一些导致查询性能缓慢的原因示例，但你会惊讶于你所做的那些从内部破坏查询的事情。你们中的一些人甚至没有想过它们，但它们就存在——隐藏在显而易见之处。


    ## 你如何在 MySQL 中破坏了查询


    与普遍看法相反，破坏你的查询很容易。事实上如此容易，以至于你的某些同事可能已经在不知不觉中破坏了它们。


    你看，开发者和 DBA——无论他们多么资深——都知道如何编写查询：谁不知道呢？问题始于我们开始与数据库沟通不当，并贪多嚼不烂。标准方法很好——直到你的应用程序名声大振。随之而来的是数据库负载的增加，以前帮助你解决数据库问题的方法可能不再适用。


    我在第[3]章中已经引导你了解了几个这样的场景：还记得我告诉过你应该花些时间思考你的查询结构吗？正确选择数据类型和校对规则？避免在带有 `LIKE` 子句的查询开头使用通配符？这些建议中的每一点都有其价值——你遵循的相关建议点越多，你就越能让
    SQL 查询恢复昔日的辉煌。我现在将引导你了解 MySQL 中的查询类型、查询所不喜欢的因素，并解释为什么、如何以及何时发生这些情况，以便你能防患于性能问题于未然。


    ## MySQL 中的查询类型


    MySQL 为你提供了多种可用的查询类型。这些包括常见的四个 CRUD（创建、读取、更新和删除）查询，还包括专用于 DDL（数据定义语言）、DML（数据操作语言）、DCL（数据控制语言）和
    TCL（事务控制语言）的其他 SQL 语句。在 MySQL 世界中，此类语句包括但不限于以下数据语言和语句：


    | 语言及说明 | 子句和语句 |

    | --- | --- |

    | 数据定义语言（DDL） | `ALTER, CREATE, DROP, RENAME, TRUNCATE` |

    | 数据操作语言（DML） | `CALL, DELETE, DO, EXCEPT, INSERT, LOAD [DATA|XML], REPLACE, SELECT,
    UPDATE, UNION, VALUES, WITH (CTEs)` |

    | 数据控制语言（DCL） | `GRANT, REVOKE` |

    | 事务控制语言（TCL） | `COMMIT, ROLLBACK` |


    换句话说，MySQL 中的查询帮助你定义、操作或控制你的数据，或促进处理被视为单个单元的语句组的工作——这些语句组称为事务。因此，事务不能被插入或删除——它们要么被提交（保存在你的数据库中），要么被回滚（恢复到数据库中先前定义的状态）。


    ### 破坏 MySQL 中 DML 查询的因素


    当涉及到理解是什么破坏了你的查询时，回到基础至关重要：还记得我在上一章告诉你的吗？查询是由其他任务组成的任务。要使其性能更快，就让这些任务的执行更快，或者消除这些任务。这是你可以给任何抱怨查询性能不足的开发者的一条建议。


    这是一个非常好的起点——当你开始深入探究其含义时，你开始理解是什么阻碍和破坏了你的查询，一旦你理解了是什么阻碍了你的查询达到目标，你就可以开始解决问题了。


    任务是为实现目标而需要完成的工作片段。目标因所使用的查询而异：`INSERT` 查询将数据添加到数据库表中，`UPDATE` 查询更新表中必要的列，等等。每个查询都有一个目标——如果你的查询被破坏了，你将很难实现这个目标。


