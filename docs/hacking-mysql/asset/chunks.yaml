  trans: '

    为了在数据传输、存储和显示阶段保障大型数据集的安全，请在系统开发生命周期的最初阶段就考虑安全问题。这样，无论您的用例当前是否已涉及大数据，或未来将涉及，您都能确保数据安全无虞。


    ## 在 SDLC 初始阶段保障大数据与代码的安全


    并不存在特定的方法论来“保障大数据操作”，因为首先就不存在所谓的“大数据操作”。`SELECT` 语句仍然是 `SELECT` 语句，`INSERT` 语句仍然是
    `INSERT` 语句，`UPDATE` 和 `DELETE` 语句的功能也保持不变。当人们问“如何保障大型数据集的安全？”时，他们的实际意思是“如何保障访问更大数据集的代码安全？”，而这可以并且应该*通过在
    SDLC 的初始阶段实施安全措施，并在长期内始终贯彻*来实现。您需要：


    1.  遵循法规和安全方法论编写代码

    2.  根据您的用例执行威胁建模

    3.  执行定期的漏洞扫描，并尽可能自动化此过程

    4.  必要时检查、更新、删除或屏蔽数据库中的数据

    5.  进行代码审查


    换言之，您需要做的大部分事情并不会改变——改变的是您处理这些事情的方式。具体来说：


    1.  遵循安全法规编写代码可能意味着“不存储非必要的数据”，而不是“存储数据并在收到请求后 6-12 小时内删除”。


    2.  通过在系统开发生命周期的早期进行威胁建模，您将能更好地应对应用程序和数据库面临的威胁。恰当的威胁建模甚至可能帮助您构建数据库/表结构，因为如果您识别出攻击者可能感兴趣但并非必须存储的数据，您可以决定从一开始就不存储它，从而降低遭受特定类型攻击的风险。


    3.  在大数据领域，结合威胁建模的定期漏洞扫描，不仅能让您通过*扫描*识别潜在威胁，还能通过*威胁建模*预判这些威胁可能被如何利用，从而能更好地在威胁发生前进行预防。对于某些人来说，大型数据集还能通过利用基于数据结构的
    AI 威胁建模，进一步增强威胁建模能力。


    4.  可能需要频繁地检查、更新或删除数据，以确保我们不再存储非必要数据以遵守法规。


    5.  进行代码审查有助于识别和预防可能出现的安全缺陷。如今，在代码提交到任何代码仓库之前，甚至可以自动进行静态和/或动态代码分析流程，在无需人工干预的情况下识别并修复漏洞！


    在设计软件时，请将安全视为您所做一切工作的默认措施。轮船就是一个绝佳的例子——如果您建造一艘船时，确保其*尽可能多地排开水*，而不是在看到水渗入时才去堵洞，那么只要操控得当，您的船就不太可能沉没。第二种处理问题的方式也是一种选择，但它不太可能救您于危难。


    如果您的船能尽可能多地排开水，那么无论它是在池塘、河流、湖泊、大海还是大洋中航行，只要操控得当，都不太可能沉没。*您的数据也是如此*——遵守安全和隐私法规，利用威胁建模和定期漏洞扫描，经常检查您的数据，并在必要时——更新数据并进行代码审查，这样您就基本没问题了。请注意，我并不是说“您不会遭受数据泄露”，因为永远无法给出绝对保证，一切都可以变得更安全，但这些行动无疑将加固您的数据城堡，抵御攻击者的入侵。


    在探讨安全限制之前，有一件事需要始终牢记：不存在 100% 的安全——而且将来也不太可能存在。系统可以被加固，但绝对安全是一个神话。任何东西都可能被黑——我们作为开发者的任务是将我们的基础设施加固到让攻击者觉得实施入侵得不偿失的程度。


    关于威胁扫描和建模，我甚至听说过一些故事：某些人在准备硕士或博士论文答辩时，利用大数据集、威胁建模和分类算法来预测数据泄露的概率或相关的统计数据。如果我没记错的话，我提到的这个人使用了朴素贝叶斯分类器来预测即将发生的数据泄露的概率，这是一个更有趣的方法，因为这类分类器在我们有大量数据“喂养”它们时效果最好，而黑客领域确实有大量数据可供利用。


    ## 数据、“脚本小子”及其他


    你们中的一些人可能也在想，是否有方法可以保护您的大数据集不被滥用或用于欺诈目的。这并非适用于所有人——要保护大数据免遭滥用/欺诈，通常首先需要将您的数据显示在用户易于访问的地方，并且对员工、软件用户、客户或公众构成足够大的威胁。您看，我说的“防止滥用”是指“防止数据被用来造成伤害”——换句话说，是保护数据的*使用*方式，而非其*存储*方式。如果您的用例需要处理敏感数据，您也需要关注这一点。


    为了给您举例，我将再次聚焦于数据泄露搜索引擎和各种布告论坛。如果您在 2015 年左右至 2017 年期间活跃于安全行业，您很可能注意到一些奇怪的事情，其中主要是：(1)
    数据挖掘式数据泄露搜索引擎的出现，以及 (2) 性质可疑的论坛活动，这也正是我们关注的重点。


    这两件事是相关的，因为数据泄露搜索引擎的运营者或与之相关的人会宣传他们的“服务”，以吸引付费客户购买访问数据泄露数据的权限。据说这些服务最初在黑客论坛上做广告，然后通过口碑进一步传播。


    这些服务在黑客论坛上做广告，是因为除了软件工程师、安全爱好者和工程师之外，此类服务的部分客户是那些想成为黑客的人（所谓的“脚本小子”）。脚本小子是此类服务的完美受众，因为：


    1.  这类人经常使用现有的脚本和服务，可能对他人或服务造成伤害。

    2.  当时可用的数据泄露搜索引擎迅速以提供数据访问用于可疑目的而声名狼藉，而且通常不验证搜索数据的人是否拥有这些数据（例如，搜索电子邮件地址的人是否拥有该地址，搜索用户名的人是否拥有该用户名等）。


    这两者的结合——访问敏感数据的渠道和基于脚本小子的客户群——服务于一个目的：数据被滥用，并常被用于进一步非法访问账户和/或服务。虽然此类服务的性质也吸引了那些希望确保自己没有身份盗窃风险的人（即它也有合法的用例），但安全专家推测，此类服务中的大部分数据吸引了不法分子，他们付费访问数据以便在网络攻击并接管账户。

    '
- fmt: 'It wasn’t long until some of such services shut down by themselves, and some
    were even shut down by law enforcement because those bigger data sets were data
    leaks acquired from other services used to facilitate identity theft attacks!
    Data derived from leaked data breaches was being misused and allegedly used for
    fraudulent purposes – not what we all want to see on the web, is it? The bottom
    line is that if you build data breach search engines, do so ethically intending
    to minimize cybercrime on the web, not to further it: otherwise things aren’t
    going to end nicely.


    Of course, not many of you would’ve even heard of such use cases, and your use
    case may be far from data breach search engines and that’s fine, but protecting
    data against it being misused and being used for questionable purposes still stands
    and there is one important thing to do here – before storing/displaying data,
    think about the other side of things first: is there anyone who could exploit
    the way data is stored/provided for the user to harm other people without any
    special skills or software? If your answer to that question is “yes,” you’ve got
    problems on your hands. Data breach search engines are just one example of this,
    and I’m almost sure that as time goes by, other similar “use cases” will also
    appear.


    Besides these use cases, you need to take care of personal security – even the
    highest security of data within your database instance is likely to be quickly
    nullified if you use one password across 57 different services or stick a password
    to your MySQL database on your front desk. Use password managers, security features
    available within browsers, don’t share too much information about yourself on
    social media and elsewhere on the web, and if necessary, use encrypted communication
    channels too.


    Also, think about using modern browsers like Google Chrome or the like. It’s a
    safe bet that if you’re reading this book, most of you are already using one,
    but keep in mind that Chrome is a very advanced browser that has security features
    some of you wouldn’t even think about – it has many advanced features like the
    ability to mask the IP addresses of its users using proxy servers, the ability
    to detect weak passwords and others, and some privacy-paranoid users may even
    consider alternative browsers like Brave: the browser blocks ads, trackers, and
    protects from browsers being fingerprinted by default, thus furthering your security.


    Finally, there’s no need to be paranoid about personal and corporate security
    in daily life as long as you understand that hackers will always be there and
    data within publicly available systems will always be a target. Don’t store unnecessary
    data, when you’re storing data, only store data you need, to be in safe hands,
    employ security practices, be sensible about things, and avoid pushing things
    too far. Also, coming back to your database, be mindful of possible pitfalls related
    to big data security as well.


    ## What Happens If…?


    Last but not least, I’ll let you in on secrets related to what you should expect
    should flaws like SQL injection, improper access control, or mistakes like the
    usage of weak passwords be exploited and how to go about fixing them.


    As a website/app owner, suspect a compromise if you come across any or all of
    the following points:


    1.  Any files being missing/having their content changed at odd times that you
    know no one worked on the system

    2.  Unusual or a lot of entries in any kind of log files

    3.  Anomalies in account/user activity

    4.  Weird login/registration attempts

    5.  Sudden and unreasonable increase in database read volume

    6.  Anomalies on the DNS front

    7.  Numerous requests for unusual files in unusual locations

    8.  Unexpected software being installed or updated

    9.  Suspicious changes in configuration or other core files

    10. A deface page on any or all of your pages (obviously)


    Most of the time, these IoCs (Indicators of Compromise) are a good telling point
    saying that your system/application has suffered an attack and needs immediate
    support.


    Even having multiple Indicators of Compromise in mind, an attack will likely be
    difficult to detect and mitigate because no attacker will leave a text file saying
    “I’ve breached your system using SQL injection via the following endpoint: `/api.php?request=<payload>`
    where I’ve used a blind union-based SQL injection attack. This attack was made
    possible by your mismanagement of access control privileges, thus allowing me
    to access the API without paying for it in the first place. I’ve also defaced
    the index page and backdoored the forum of your website, backdoors can be found
    in the `admin.php` script on line 227 and in the `install.php` script on line
    56.”


    Not all Indicators of Compromise will be the same either, and these days, after
    finishing an attack, hackers will clear all of the applicable logs from the system,
    too.


    To combat this, I’d advise you to create a system that backs up your logs to a
    remote server every day/week/month/whatever frequency you necessitate. That way,
    even if access logs are cleared, you would still be able to access them via another
    server, thus making it significantly easier for you to identify what’d happened
    and why. After accessing the logs, remember the OWASP Top 10 and skim through
    these security vulnerabilities while aiming to see indicators of compromise coming
    from any of the flaws in the OWASP list.


    Once a potential indicator of compromise is identified, lock your systems down
    (make the entire perimeter of an application unaccessible, only accessible via
    a login, etc.), then follow these steps:


    1.  Contain the data breach.

    2.  Remove access for everyone, except yourself (that may be as simple as setting
    up `.htaccess` settings within your application – don’t sweat).

    3.  Maintain the settings of your audit/firewall appliance.

    4.  Back up all of the logs (if necessary, including the firewall logs) and assess
    the boundaries of the data breach – aim to answer questions *what* has been breached?
    *How* could it have been breached? *When* (at least approximately) could the data
    breach taken place?

    5.  Act on the data breach response plan applicable to your use case – if necessary,
    notify managers and the clients of the breach, have some discussions back & forth,
    consider involving your security engineering team/related people or involve outside
    experts for an audit, and wait until it completes before resetting any passwords
    or performing related activities (if you reset passwords at this stage, an attacker
    who might have retained control will simply re-gain access to them).

    6.  Act on the advice in the data breach audit plan that has been laid out.

    7.  Reset passwords.


    Many things can be said about the points above, but in my opinion, the most important
    ones would be related to how and when the data breach took place. This is why
    you back up your log files because if the content of them (or even the files themselves)
    is deleted which happens more often than you would think, they would still retain
    their value in the sense that they will act as a helping hand for you to initially
    investigate the data breach and identify the possible IP addresses, requests made,
    and other details about the perpetrators.


    From the requests that have been made, often you will have a good enough birds-eye
    view to identify problematic places in your application or website and even tell
    what flaws were exploited within these places. For example, a bunch of requests
    like these in the `access.log`:'
