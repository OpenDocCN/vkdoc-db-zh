  trans: '

    这些问题的答案将引导你走向一种对你和你的数据库都可接受的数据类型路径。例如，索引如果使用得当就非常棒——但并非所有索引都能以相同的方式适用于所有数据类型。一旦创建了索引，请注意以下适用规则：


    *   如果你为 `BLOB` 或 `TEXT` 数据类型的列创建索引，请注意你无法对它们进行完整索引：这类数据类型需要使用前缀索引。前缀大小取决于所使用的行格式——如果我们使用
    `COMPACT` 或 `REDUNDANT` 行存储格式，前缀长度最多可达 767 字节；如果我们使用默认的 (`DYNAMIC`) 或 `COMPRESSED`
    行存储格式，长度限制则跃升至 3072 字节。对于使用 `MyISAM` 的用户，此限制将被设置为 1000 字节。


    *   数据类型会影响索引大小：索引大小越小，所需的分页操作就越少。此外，如果需要进行比较操作，比较整数值通常会比比较变长字符 (`VARCHAR`) 值更快。


    这些规则同样适用于数据库中的分区和其他操作——这些操作直接依赖于你的具体用例。不过，在这里无需“重新发明轮子”：选择合适的数据类型并非难事，你只需要根据具体用例选择最精确的存储单元即可。换句话说，在决定为待存储的值选择何种数据类型之前，请查阅文档。例如，如果你打算存储
    0 到 100 的整数值，可以考虑 `TINYINT`。需要存储较大的文本值并且需要为整列创建索引？可以考虑 `VARCHAR`，等等。


    ### 为大数据优化模式和数据类型


    当涉及更庞大的数据集时，情况就变了。你无需深究就能明白其中存在一种负面看法：“用 MySQL 处理大数据？你疯了吗？！”


    如果我们退后一步，就不难理解，只要正确优化你的服务器和其中的数据，一切都是可能的。当然，如果你发现自己使用的是共享主机，运行大型数据集可能会力不从心；但其余部分则归结于经验、阅读和持续学习，而且即便是在普通规模的
    VPS 上运行大型数据集，一开始也并非难事。我将在下面给你一个很好的例子：


    在以下事项中，当你在中型服务器上为大数据优化数据库时，首先应该关注哪一项？


    1.  数据库中有多少张表。

    2.  在数据库管理系统中运行的查询数量/种类。

    3.  配置文件 (`my.ini` 或 `my.cnf`)。

    4.  数据类型。

    5.  索引。


    思考一下：最合乎逻辑的答案是什么？对——你会查看配置文件。为什么？因为那是一切的起点。你可能已经对所有最紧迫的问题（你的 `INSERT` 查询慢吗？将它们切换到
    `LOAD DATA INFILE`，等等）有了答案，但只有在你理解了这些答案的内在机制——一旦你明白了是什么让它们运转——你才能理解是什么让你的数据库发挥出最佳性能。


    清单中的所有事项都很重要，这一点无可否认——我们将在本书后面专门讨论大数据的章节中深入探讨如何处理大数据，你将发现所有这些元素协同工作的协同效应对于你的数据库是多么关键——但现在，请回到模式和数据类型的领域。你如何为大数据优化它们？


    这个问题很复杂：答案却很简单——保持方法简单，避免复杂的决策。在这个领域，保持简单将为你省去很多麻烦——你已经有大量数据要处理，为什么还要给自己增添额外的问题呢？规则很简单：


    1.  仔细构建你的表结构，并着眼于未来。

    2.  如果你不需要特定的排序规则，请选择通用的用例排序规则。

    3.  保持数据类型简单。

    4.  只为必要的内容创建索引。

    5.  如果进行分区，请研究分区的细节，并选择最适合你用例的分区类型。


    保持简单，并了解数据类型的内在机制，以使自己远离麻烦。始终记住例子——存储 0 到 100 的整数？考虑 `TINYINT`。这同样适用于其他数据类型——查阅文档并与同事交流，以做出明智的决定，这样为大型数据集选择数据类型就不会看起来像一个需要解决的大问题了。


    做出明智的决策除了涉及数据类型外，还涉及许多其他方面，而当涉及更大的数据集时，这些操作可能会变得更加困难，这就是为什么本书有一整章专门讨论大数据：有太多的内容需要讲述，所以请保持好奇并跟随阅读——在你学会优化查询之后，我将告诉你关于大型数据集的内容。


    ## 总结


    优化存储引擎、模式和数据类型并非易事，但为了提升查询性能，必须完成这项工作。存储引擎、模式和数据类型构成了冰山隐藏在水下的部分，但对于那些力求在日常使用 `MySQL`
    或 `MariaDB` 时实现高性能的人来说，理解它们至关重要。


    如果不优化查询本身，很少能实现高性能，而查询的内在机制包含很多内容——现在，我将引导你了解如何做到这一点。


    # 9. 优化查询


    优化 SQL 查询性能是一项重大的任务。要正确理解其原因，我们必须回到基础：数据可以被插入、更新、选择，必要时也可以被删除。这四项任务需要四种类型的 SQL
    查询存在：这些查询是 `INSERT`、`UPDATE`、`SELECT` 和 `DELETE`。还有其他查询，但这四种查询构成了一个“CRUD 三角”：一个可以*创建*、*读取*、*更新*和/或*删除*数据的查询三角。


    为了优化这些查询，我们需要理解一个在本书中已被多次重复的简单真理：查询就是任务——要优化其性能，我们就要优化这些任务的性能或者消除它们。要开始优化任务性能或消除它们，我们必须了解这些任务，而要了解它们，我们必须熟悉其内部机制。回顾第
    4 章——我们在那里已经熟悉了 `SELECT` 查询的性能剖析。我稍后会回到这个问题，但首先，我会回答这个迫切的问题。


    ## 为什么要优化 SQL 查询？


    “我今天真高兴我的 SQL 查询很慢！”——从来没人这么说过。缓慢的 SQL 查询是导致你作为开发者头疼的许多原因，是你公司获得差评的原因，或者是你老板失去客户的原因。在许多情况下，缓慢的
    SQL 查询是任何性能不佳的应用程序的基础：如果我们不优化它们，就别想提升数据库的效率和性能。


    你已经知道什么因素可能破坏你的查询：你的模式设计不完美，数据类型在你的数据库中随意存在，或者你有太少（或太多）的分区或索引。答案取决于你正在运行的查询类型。第
    4 章已经展示了通过使用 `SHOW PROFILES` 来剖析查询性能的方法：性能剖析文件包含查询执行的任务。剖析你的查询——性能剖析会提供一个良好的起点。完成之后，请记住以下内容：

    '
- fmt: '# MySQL 查询优化指南


    ## 优化准则


    *   优化 `INSERT` 查询时，应尽可能延迟“通知数据库”（即提交操作）。理想情况下，仅在将一批数据插入数据库后再提交。应尽可能减少开销，利用磁盘
    I/O，同时牢记基本原则。如果必要数据位于不同的表中，考虑使用 `SELECT` 查询插入数据；在创建表时运行 `SELECT` 操作（见下例）；并记住，原始数据插入将显著快于使用
    `INSERT` 语句插入数据。


    *   优化 `SELECT` 查询时，确保数据库扫描尽可能少的数据。真的就是这样——使用 `SELECT column` 而不是 `SELECT *`（避免从数据库中获取所有列的数据），不要获取超出需要的行，并避免重复获取相同数据。


    *   优化 `UPDATE` 查询时，应批量更新数据。利用锁机制，注意 `NULL` 值，考虑数据库负载，并使用 `WHERE` 和 `LIMIT` 子句。有时，你也可以利用
    `DEFAULT` 子句。稍后会详细说明。


    *   优化 `DELETE` 查询时，使用带有 `WHERE` 或 `LIMIT` 子句的 `DELETE` 查询，或者直接将 `DELETE` 切换为
    `TRUNCATE`。请记住，MySQL 总是提供了删除部分数据的能力，而你所使用的存储引擎也会有影响。


    ## 优化特定类型的查询


    现在，如何优化特定类型的 SQL 查询？假设你的 `my.cnf`（或 `my.ini`）文件中的设置已针对特定存储引擎进行了优化，你需要利用基本建议以及针对你所用存储引擎的具体建议。这现在听起来可能不太明白，但继续看下去你很快就会明白。


    首先，基础知识。一旦我们执行一个 SQL 查询，MySQL 会遵循一个四步流程：


    1.  MySQL 客户端将我们的 SQL 查询发送到服务器。

    2.  数据库服务器在查询缓存中检查是否有匹配项。

    3.  准备并执行查询执行计划。

    4.  返回结果。


    查询缓存是第一站——奇怪吗？不应该；查询缓存是一些使用 MariaDB 或 MySQL 的应用程序能够即时返回结果的主要原因。商业搜索引擎甚至可以利用这一点作为营销技巧——“嘿，我们的搜索引擎能在毫秒内返回结果！看……”
    查询缓存会缓存与特定 SQL 查询对应的结果集：如果找到匹配项，则重用结果集。如果数据库服务器无法从查询缓存返回结果，它将遵循查询执行计划并返回结果。


    ### 查询缓存


    如果 MySQL 首先停留的地方是查询缓存，我们难道不能尽可能多地从查询缓存返回结果吗？嗯，不能，但我们可以利用 SQL 查询缓存中可用的模式。如果我们在
    `SELECT` 语句中指定 `SQL_CACHE`，就启用了 `DEMAND` 模式：


    ```

    SELECT SQL_CACHE customer_id, cat FROM products;

    ```


    我们也可以使用 `SQL_NO_CACHE` 语句告诉 MariaDB 我们完全不想使用 SQL 查询缓存：


    ```

    SELECT SQL_NO_CACHE customer_id, cat FROM products;

    ```


    一般来说，SQL 查询缓存有三种模式——`ON`、`DEMAND` 和 `OFF`。`ON` 将允许查询被缓存，`DEMAND` 允许你按需缓存查询，而将查询缓存设为
    `OFF`（或将 `have_query_cache` 变量设置为 `NO`）将禁用查询缓存。在 MariaDB 中，有 7 个变量与查询缓存相关，如下所示。


    ![图 9-1：MariaDB 中与查询缓存相关的变量](images/625040_1_En_9_Chapter/625040_1_En_9_Fig1_HTML.jpg)


    它们的含义如下：


    | 变量 | 含义 |

    | --- | --- |

    | `have_query_cache` | MariaDB 查询缓存是否存在？可用值为 `YES` 和 `NO`。 |

    | `query_cache_limit` | 超过此大小限制的结果将不会被缓存。 |

    | `query_cache_min_res_unit` | 查询缓存的最小大小（以字节为单位）。 |

    | `query_cache_size` | SQL 查询缓存的大小。 |

    | `query_cache_strip_comments` | 指定在缓存查询前是否删除所有注释。 |

    | `query_cache_type` | 前述的 SQL 查询缓存类型。 |

    | `query_cache_wlock_invalidate` | 如果获取了写锁，查询缓存中的 SQL 查询将失效。 |


    虽然我不建议仅依赖 SQL 查询缓存，但说查询缓存不是一个有用的帮手也不对。查询缓存是第一站——第二站是查询执行计划。查询执行计划将对你的查询进行测试，并展示你的数据库的能力。


    ### 优化 INSERT 查询


    我们的第一站与 `INSERT` 查询有关。数据库中的数据之所以存在是有原因的：有人插入了它！真令人惊讶。可以通过以下方式将数据插入数据库：


    1.  使用普通的 `INSERT` 查询

    2.  使用批量 `INSERT` 功能

    3.  将 `SELECT` 与 `INSERT` 结合使用

    4.  利用 `LOAD DATA INFILE` 查询


    现在，从头开始——首先，我们有像这样的普通 `INSERT` 查询：


    ```

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 1'', ''Value
    2'', ''Value 3'',...);

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 4'', ''Value
    5'', ''Value 6'',...);

    ```


    这样的 `INSERT` 查询也可以这样写：


    ```

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 1'', ''Value
    2'', ''Value 3''), (''Value 4'', ''Value 5'', ''Value 6''), ...;

    ```


    如你所见，如果值同时插入所有列，指定列名也是可选的。第一个查询是你在许多软件工程和数据库教程中会看到的默认 `INSERT` 查询示例——第二个是你在检查备份时最有可能看到的。这两个查询做的是同一件事——插入数据——但第二个比第一个更强大，因为行由逗号（“,”）分隔，这意味着可以一次性插入更多行。


    如果你想进一步加快 `INSERT` 查询性能，可以研究 `autocommit` 参数。此选项可用于将 `COMMIT` 操作延迟到最后一刻，从而使 `INSERT`
    查询性能更快。下面是一个完美的例子。


    ![图 9-2：备份中的 autocommit=0](images/625040_1_En_9_Chapter/625040_1_En_9_Fig2_HTML.jpg)


    只有一个 `INSERT`！是不是很酷？


    你还可以利用锁定和解锁。为此，首先使用 `LOCK TABLE [table_name]` 锁定表，然后插入数据，最后使用 `UNLOCK TABLE [table_name]`
    解锁表。如果你发现行的 `VARCHAR` 列较长，可以一次插入较少的行。


    提高 `INSERT` 查询性能的下一个方法是像下面这样将 `INSERT` 与 `SELECT` 查询结合使用。


    ![图 9-3：INSERT INTO … SELECT](images/625040_1_En_9_Chapter/625040_1_En_9_Fig3_HTML.jpg)'
  raw: '*   *To optimize* *INSERT* *queries**, delay “informing the database” (commit
    operations) for as long as possible.* Ideally, commit only after you’ve inserted
    a batch of data into the database, then repeat. You want to avoid as much overhead
    as possible and make use of disk I/O while remembering the basics. Consider inserting
    data using `SELECT` queries if the necessary data is in a different table, running
    `SELECT` operations when creating a table (example below), and remember that raw
    data inserting will be significantly faster than inserting data using `INSERT`.


    *   *To optimize* *SELECT* *queries**, make sure your database scans through as
    little data as possible.* That’s it, really – use `SELECT column` instead of `SELECT
    *` (avoid fetching data from all columns inside of a database), don’t fetch more
    rows than needed, and avoid fetching the same data repeatedly.


    *   *To optimize* `UPDATE` *queries**, update data in bulk.* Make use of locking,
    beware of `NULL` values, keep the load of your database in mind, and make use
    of `WHERE` and `LIMIT` clauses. Sometimes, you can also make use of the `DEFAULT`
    clause. More on that in a second.


    *   *To optimize* `DELETE` *queries**, run* `DELETE` *queries with* `WHERE` *or*
    `LIMIT` *clauses, or switch* `DELETE` *to* `TRUNCATE` *altogether.* Keep in mind
    that MySQL always provides you with the ability to wipe fractions of data, and
    the storage engine you use has an impact too.


    Some of you may turn to query optimization if you see that a particular query
    looks rather complex. If you see subqueries, `JOIN`s, functions, `GROUP BY` operations,
    and God knows what in one query, the first question that may cross your mind may
    be “Should this SQL query be chopped up into pieces?” and to answer that question,
    you will have to remove unknowns from the equation. What is your table structure?
    What’s the path your query takes? Does it use indexes? What indexes does it use
    and how? etc., and once you remove unknowns from the equation, solve it with knowledge
    – knowledge on how to optimize specific types of SQL queries.


    ## Optimizing Specific Types of Queries


    Right – now how do you optimize specific types of SQL queries? Provided the settings
    in your my.cnf (or my.ini) file are optimized for a specific storage engine, you
    need to make use of basic advice and advice specific to your storage engine. That
    may not make sense for now, but follow along and you will quickly see what I mean.


    First, the basics. Once we execute an SQL query, MySQL follows a four-step process:


    1.  MySQL client sends our SQL query to the server.


    2.  The database server checks for a hit inside of the query cache.


    3.  A query execution plan is prepared and executed.


    4.  Results are returned.


    The query cache is the first stop – weird? Shouldn’t be; the query cache is the
    primary reason why some applications making use of MariaDB or MySQL return results
    in an instant. Commercial search engines can even use this as a marketing trick
    – “Hey, our search engine returns results within milliseconds! Watch...” The query
    cache caches result sets corresponding to specific SQL queries: a result set is
    used anew if a match is found. If the database server cannot return results from
    the query cache, it will follow a query execution plan and return results.


    ### The Query Cache


    If the first thing MySQL stops for is the query cache, can’t we just return as
    many results from the query cache as possible? Well, no, but we can make use of
    the modes available within the SQL query cache. If we specify `SQL_CACHE` within
    a `SELECT` statement, we enable the `DEMAND` mode:


    ```

    SELECT SQL_CACHE customer_id, cat FROM products;

    ```


    We can also tell MariaDB that we don’t want to use the SQL query cache whatsoever
    with the `SQL_NO_CACHE` statement:


    ```

    SELECT SQL_NO_CACHE customer_id, cat FROM products;

    ```


    In general, the SQL query cache has three modes – `ON`, `DEMAND`, and `OFF`. `ON`
    will allow queries to be cached, while `DEMAND` will allow you to cache queries
    on demand, turning the query cache `OFF` (or setting the `have_query_cache` variable
    to `NO`) will disable the query cache. In MariaDB, 7 variables work with the query
    cache, and these are as follows.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Variables having something to do with the query cache in MariaDB


    Here’s what they mean:


    | Variable | Meaning |

    | --- | --- |

    | `have_query_cache` | Does the MariaDB query cache exist? Available values include
    `YES` and `NO`. |

    | `query_cache_limit` | Results exceeding this size limit won’t be cached. |

    | `query_cache_min_res_unit` | The query cache will have this minimum size in
    bytes. |

    | `query_cache_size` | The size of the SQL query cache. |

    | `query_cache_strip_comments` | Specifies whether to remove all comments from
    a query before caching it. |

    | `query_cache_type` | The aforementioned SQL query cache type. |

    | `query_cache_wlock_invalidate` | If a lock for writing operations is acquired,
    the SQL queries in the query cache will be invalidated. |


    While I don’t advise relying on the SQL query cache alone, saying that the query
    cache is not a helpful companion wouldn’t be OK either. The query cache is the
    first stop – the second stop is the query execution plan. The query execution
    plan will put your queries to the test, and it will show what your database is
    capable of.


    ### Optimizing INSERT Queries


    Our first stop has to do with `INSERT` queries. Data inside your database appears
    for a reason: someone inserted it! What a surprise. One can insert data into a
    database by


    1.  Using ordinary `INSERT` queries


    2.  Using bulk `INSERT` capabilities


    3.  Combining `SELECT` with `INSERT`


    4.  Making use of the `LOAD DATA INFILE` query


    Now, from the beginning – first, we have ordinary `INSERT` queries like this one:


    ```

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 1'', ''Value
    2'', ''Value 3'',...);

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 4'', ''Value
    5'', ''Value 6'',...);

    ```


    Such `INSERT` queries can also be written like so:


    ```

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 1'', ''Value
    2'', ''Value 3''), (''Value 4'', ''Value 5'', ''Value 6''), ...;

    ```


    As you can see, specifying the columns is also optional provided values are inserted
    into all of them at once. The first query is the default `INSERT` query you will
    see given as an example in many software engineering and database tutorials –
    the second one is what you’ll most likely see when inspecting a backup. Those
    two queries do the same thing – they insert data – but the second one is more
    powerful than the first one, and that’s because rows are separated by commas (“,”)
    which means more of them can be inserted in one go.


    If you want to speed up `INSERT` query performance even further, look into the
    `autocommit` parameter. This option can be used to delay `COMMIT` operations to
    the very last moment making `INSERT` query performance faster as a result. A perfect
    example can be seen below.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    autocommit=0 inside of a backup


    Only a single `INSERT` too! Isn’t that cool?


    You can also make use of locking and unlocking. To do that, first lock your table
    by making use of `LOCK TABLE [table_name]`, then insert your data, and finally,
    unlock the table by making use of `UNLOCK TABLE [table_name]`. If you find your
    rows to have longer `VARCHAR` columns, insert a smaller number of rows at a time.


    The next way to improve `INSERT` query performance would be to combine `INSERT`s
    with `SELECT` queries like so.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    INSERT INTO … SELECT'
