    2.  The SQL node is used to run SQL queries on the data node. In other words,
    we use the SQL node to access data on the data node using SQL.


    3.  The management node is used to manage all of the nodes within NDB.'
  trans: '

    ### ARCHIVE 与 BLACKHOLE 存储引擎


    其他的存储引擎也并非高深莫测。`ARCHIVE` 存储引擎旨在充当数据的归档库——其行压缩能力使得基于该引擎的数据在磁盘上占用空间极小，并且利用其行级锁功能，可以轻松地对数据进行备份。同时，使用此引擎存储的表不具备任何
    `MVCC`、`B-Tree`、外键、全文索引、哈希或地理空间索引功能。


    `BLACKHOLE` 存储引擎旨在充当一个“黑洞”，对于进行内部测试的人员可能非常有用——写入该引擎的数据只能被写入，但无法被检索，因为数据从一开始就没有被真正存储，因此得名：所有写入基于此引擎的表的数据都会瞬间消失。任何时候磁盘上都不会存储任何文件。此引擎与
    `ARCHIVE` 一样，不支持分区，但它支持各种索引，最大可用键长为 3072 字节。


    `BLACKHOLE` 存储引擎的内在功能使其具有许多有趣的用例：虽然该引擎不在磁盘上存储任何文件，但如果启用了基于语句的二进制日志记录，它可以将 SQL
    查询复制到副本服务器，这使其成为复制设置中的好伙伴。假设你有一个基于 `BLACKHOLE` 存储引擎的表：


    ```sql

    CREATE TABLE `demo_table` (

    `id` INT NOT NULL,

    `message` VARCHAR(225) NOT NULL,

    `message_from` VARCHAR(225) NOT NULL,

    `message_to` VARCHAR(225) NOT NULL,

    `time_sent` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,

    `time_received` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,

    ...

    ) ENGINE = BLACKHOLE;

    ```


    一旦你对上述表执行任何（`CRUD`）操作，`MySQL` 会将这些操作写入二进制日志，然后该日志将被复制到从服务器。这意味着，如果你在从服务器上创建一个具有相同结构的表，并将其设置为使用
    `InnoDB` 存储引擎，`MySQL` 会将二进制日志中的更改复制到从服务器，包括插入的数据。


    换句话说，如果你希望避免在主服务器上存储数据，但同时又想在从服务器上看到这些数据，`BLACKHOLE` 就是适合你的存储引擎——只需确保从服务器上的表具有相同的结构，并且基于一个可靠、能保存数据而非将其排出的存储引擎。


    `BLACKHOLE` 存储引擎的另一个流行用例是验证备份文件的语法——如果你的逻辑备份被“吞入深渊”，则说明它们的语法是正确的。


    ### MERGE 存储引擎


    `MySQL` 还有一个专门用于合并源自 `MyISAM` 的数据的存储引擎——过去，这个存储引擎被称为 `MRG_MyISAM`，但如今，它有了一个更简洁的名称来描述其用途——该引擎被命名为
    `MERGE`。


    `MERGE` 存储引擎很容易解释：它是一组具有相同结构的 `MyISAM` 表的集合。一旦数据库中出现一个基于 `MERGE` 存储引擎的表，你将不会在磁盘上看到具有
    `.MYD` 或 `.MYI` 扩展名的常规文件——取而代之的是会创建一个扩展名为 `.MRG`（merge）的文件。这些表的表格式将存储在数据字典中，而任何
    `.MRG` 文件的内容仅包含运行 `MyISAM` 存储引擎的表名，并且这些表将被视为一个基于 `MyISAM` 的表。


    #### 优点


    在 `MySQL` 中，你可能不会经常用到 `MERGE` 存储引擎提供的优势，但其中一些可能比你想象的要更常遇到：


    *   由于 `MyISAM` 是一个非事务型存储引擎，其表的修复是不可避免的。如果你的应用场景需要使用大型 `MyISAM` 表，那么将它们拆分成多个 `MERGE`
    表，并改为修复多个独立的表，可能会比修复单个基于 `MyISAM` 的表快得多。

    *   `MERGE` 可以突破操作系统设定的文件大小上限。对于 `MyISAM` 而言，遵守此限制是必须的——而对于 `MERGE`，则不是。


    #### 缺点


    话虽如此，`MERGE` 确实存在一些问题。`ALTER` 查询会破坏与关联表的合并结构，`REPLACE` 查询的可靠功能可能会丢失，并且像 `ALTER
    TABLE`、`DROP TABLE`、`OPTIMIZE TABLE`、`REPAIR TABLE`、`ANALYZE TABLE` 或不带 `WHERE`
    子句的 `DELETE` 这样的查询可能会由于 `MySQL` 引用的是主表而非合并表本身，而导致结果不正确。


    所有这些因素使得 `MERGE` 存储引擎成为一个有缺陷但仍有价值的补充，即使在 `MyISAM` 已经过时的情况下也是如此。


    ### 高可用性存储引擎


    除了数据需要合并，你的数据还需要高可用性。`MySQL` 确实提供了一个专门用于此目的的存储引擎——它叫做 `NDB`。开头的“N”并非无缘无故：`NDB`
    存储引擎代表网络数据库，并采用无共享架构。`NDB` 是一个高可用性存储引擎，始终连接到一个数据集群，因此它也被称为 `NDBCluster`。


    每个 `NDB` 实例至少需要三个节点，分别是数据节点、SQL 节点和管理节点：


    1.  数据节点，顾名思义，存储与集群相关的数据。在典型的 `NDB` 设置中，建议拥有两个或更多数据节点以为数据库提供冗余。

    2.  SQL 节点用于在数据节点上运行 SQL 查询。换句话说，我们使用 SQL 节点通过 SQL 来访问数据节点上的数据。

    3.  管理节点用于管理 `NDB` 中的所有节点。

    '
- fmt: '## Installing and Using NDB


    It’s worth mentioning that one can’t create NDB-based tables using the usual engine
    definition so many people are used to. It isn’t uncommon for people to run a SQL
    query similar to the one depicted below and come across the `error #1286` with
    MySQL screaming “Unknown storage engine ‘NDBCLUSTER’”:


    ```

    CREATE TABLE `demo_table` (

    `id` INT NOT NULL,

    `message` VARCHAR(225) NOT NULL,

    `message_from` VARCHAR(225) NOT NULL,

    `message_to` VARCHAR(225) NOT NULL,

    `time_sent` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,

    `time_received` VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,

    ...

    ) ENGINE = NDBCluster;

    ```


    The reason you come across such an error is that the NDB storage engine is not
    supported in the standard releases of MySQL – make sure to use MySQL NDB Cluster
    instead.


    After you’ve successfully downloaded NDB and installed the downloaded files, you
    will usually need to create the data directories for the data nodes running MySQL
    and make sure that the directory is owned by `mysql` like so:


    ```

    mkdir –p /var/lib/mysql/

    chown [–R] mysql:mysql /var/lib/mysql/

    ```


    Here, the `-p` option means “parents” (`mkdir` will create the directory and any
    other directories if they don’t already exist), while the `-R` option in regard
    to `chown` will make it not follow symlinks.


    After, you will need to create a service for the NDB data node by running something
    akin to this:


    ```

    vi /etc/systemd/system/ndbd.service

    ```


    Once you have a service, you will want to edit your `my.cnf` file on all applicable
    nodes to configure `NDBCluster`. Add this below `[mysqld]`:


    ```

    ndbcluster

    ndb-connectstring=#

    ```


    Here `#` is the IP of the management node.


    You will also need to have a `[mysql_cluster]` section with the same `ndb-connectstring`
    specified there as well, so everything will look like this:


    ```

    [mysqld]

    ndbcluster

    ndb-connectstring=#

    [mysql_cluster]

    ndb-connectstring=#

    ```


    Don’t forget to specify the IP of your management node in place of the hashtag.


    Once you’re done, run `systemctl enable ndbd` to enable the NDB service.


    Afterward, you will need to create the management node. On that node, you will
    need to download and install the management server for NDB, then create a directory
    for the NDB Cluster, and finally, create the configuration file. Your configuration
    file should look something like this:


    ```

    [ndbd default]

    # Options affecting the ndbd processes on all data nodes

    NoOfReplicas=2 # Number of replicas

    [ndb_mgmd]

    # NDB Management Node

    hostname=127.0.0.1 # The IP of the management node

    datadir=/usr/ndb-cluster/data  # The data directory

    [ndbd]

    # First Data Node

    hostname=127.0.0.2 # The IP of the first data node

    NodeId=2 # The ID of this data node

    datadir=/var/lib/mysql/ # Data directory

    [ndbd]

    # Second Data Node

    hostname=127.0.0.3 # Hostname/IP of the second data node

    NodeId=3 # The ID of this data node

    datadir=/var/lib/mysql/ # Remote directory for the data files

    [mysqld]

    NodeId=4

    hostname=127.0.0.2 # NDBCluster Node 1

    [mysqld]

    NodeId=5

    hostname=127.0.0.3 # NDBCluster Node 2

    ```


    Now, create the NDB management service on the management node. Create a file called
    `/etc/system/system/ndb_mgmd.service` and make sure it consists of three parts
    – `[Unit]`, `[Service]`, and `[Install]`. You can easily find the structure of
    this file on a GitHub repository. Finally, enable the management service by running
    `systemctl enable ndb_mgmd`.


    Perfect! Proceed to the last step and provide the location of the configuration
    file to your management node by running `ndb-mgmd –-initial –-config-file=[location/of/config/file]`
    on the management node, and then running `ndbd` on each of your data nodes or
    move into the config directory and start your data node using `ndbd`.


    Finally, run `service mysql start` to start MySQL on every data and SQL node,
    and you’re good to go.


    Once you’ve set up NDB, you’ve unlocked a whole new world of opportunities. Now,
    you can set your tables to use the `NDBCLUSTER` or `NDB` storage engine and run
    SQL queries in parallel, enjoy multi-master replication capabilities, and more!


    Use the management client by invoking `ndb_mgm` through the CLI, then check up
    on your cluster configuration by invoking `SHOW` once you’re logged in.


    ## The FEDERATED and EXAMPLE Storage Engines


    Aside from the NDBCluster, there are two more storage engines I need you to be
    aware of. Most of you have probably heard of them both, but never used them –
    and that’s not a problem. These storage engines are not a necessity in your everyday
    work, but they are there lurking in the shadows and waiting for their next chance.
    A chance that rarely comes, indeed – those storage engines are `FEDERATED` and
    `EXAMPLE`.


    The first one allows us to access data from a remote database, and the second
    one acts as an example of how to build new storage engines.


    To make good use of the `FEDERATED` storage engine, make use of the `CONNECTION`
    option defining the table you create on another server like so – here `federated_user`
    is the user in the `remote_server`, `9306` defines the TCP protocol, the `database`
    defines the name of your database, and `demo_table` refers to the table on that
    database:


    ```

    CREATE TABLE `federated_table` (

    `message_id` INT(15) NOT NULL AUTO_INCREMENT PRIMARY KEY,

    `message_title` VARCHAR(120) NOT NULL,

    `message_user` VARCHAR(120) NOT NULL,

    `message_contents` VARCHAR(255) DEFAULT NULL,

    ...

    ) ENGINE = FEDERATED

    DEFAULT CHARSET = ...

    CONNECTION = ''mysql://federated_user@remote_server:9306/database/demo_table'';

    ```


    Great! Now make use of this connection you just made by making an InnoDB-based
    table with the same structure:


    ```

    CREATE TABLE `demo_table` (

    `message_id` INT(15) NOT NULL AUTO_INCREMENT PRIMARY KEY,

    `message_title` VARCHAR(120) NOT NULL,

    `message_user` VARCHAR(120) NOT NULL,

    `message_contents` VARCHAR(255) DEFAULT NULL,

    ...

    ) ENGINE = InnoDB;

    ```


    Good! Now, once you add data to the `demo_table`, the same data will also appear
    in the `federated_table`. Great, right?


    There also is a way to create the same federated table using the `CREATE SERVER`
    query. An example would look like so:


    ```

    CREATE SERVER demo_server FOREIGN DATA WRAPPER mysql OPTIONS (USER ''federated_user'',
    HOST ''federated_host'', PORT 9306, DATABASE ''demo_database'');

    ```


    Here, `demo_server` is the name of your database server, `mysql` defines our DBMS,
    `OPTIONS` defines the username and the host, while `database` defines the title
    of your database.


    Everything’s much more simple with the `EXAMPLE` storage engine – it serves as
    an example of how to build new storage engines. The storage engine doesn’t support
    any necessary CRUD operations, partitioning, or indexing, but is still there waiting
    for a chance to give birth to new storage engines in the future: find its directory
    in the `storage` directory of MySQL and check the `example` subdirectory.'
