    \ before you continue reading – this is where we dive deeper into the realm of\
    \ storage engines."
  raw: "## Basic Use Cases and Initial Considerations\n\nMySQL consists of three architecture\
    \ layers, and that’s not without a reason – each of them is a necessity to properly\
    \ execute requests in regard to our configuration.\n\nMySQL can be configured\
    \ with a configuration file titled “my” – the name of the file is “my.ini” on\
    \ Windows architectures and “my.cnf” on Linux-based systems.\n\nThe configuration\
    \ file consists of a set of different parameters. Some of them are listed below,\
    \ but to properly understand them, you must also understand one crucial thing.\
    \ Go back to Figure [1-1](#625040_1_En_1_Chapter.xhtml#Fig1) and look at the very\
    \ last layer – what does it say? Right, it says “Storage.” Storage refers to the\
    \ storage engines within MySQL. MySQL is built on the principle of storage engines,\
    \ and at the present moment, the RDBMS offers eight storage engines to choose\
    \ from:\n\n*   `port`: Defines the port of our MySQL Server. Defaults to 3306\
    \ can be changed.\n\n*   `key_buffer_size`: Defines the size of key (index) buffers\
    \ in memory. Relevant to users of MyISAM.\n\n*   `max_allowed_packet`: Defines\
    \ the maximum size of the packet that can flow through MySQL. The default value\
    \ on a MySQL 8.0 instance is 1GB.\n\n*   `log_error`: Defines the location where\
    \ log files relevant to MySQL are stored.\n\n*   `log_error_verbosity`: Defines\
    \ what kind of errors to log:\n    *   A value of “1” only logs errors.\n\n  \
    \  *   A value of “2” logs errors and warnings.\n\n    *   A value of “3” logs\
    \ errors, warnings, and notes.\n\n*   `innodb_buffer_pool_size`: The most important\
    \ parameter for the users of the InnoDB storage engine. This setting defines the\
    \ buffer pool size for the InnoDB storage engine. The buffer pool caches table\
    \ and index data as it’s being accessed.\n\n*   `innodb_data_file_path`: The path\
    \ toward the InnoDB data file – ibdata1.\n\nAs you can see, the configuration\
    \ file consists of a set of different parameters. Here, we have a double-edged\
    \ sword: my.ini on Windows provides developers with a lot of comments for them\
    \ to understand how MySQL works at the expense of certain parameters being out\
    \ of reach, while my.cnf on Linux doesn’t provide as many parameters to start\
    \ with and has no comments within itself, but it offers a wider realm in the sense\
    \ of available functionality. The reason why Windows users have fewer choices\
    \ than their Linux counterparts is very simple – Windows is not equipped for certain\
    \ optimization operations to be completed (e.g., the InnoDB flush method of `O_DIRECT`\
    \ is only available on Unix systems because it requires POSIX-based header files).\n\
    \nInteresting, yeah? Stick with me. Go back to Figure [1-1](#625040_1_En_1_Chapter.xhtml#Fig1)\
    \ and look at the very last layer – the Storage layer. Sounds familiar? Storage\
    \ refers to the storage engines within MySQL. MySQL is built on the principle\
    \ of storage engines, and at the present moment, MySQL 8.0 offers 10 storage engines\
    \ you can choose from.\n\n## Storage Engines\n\nAt present, the main storage engines\
    \ offered for use within MySQL are shown in Table [1-1](#625040_1_En_1_Chapter.xhtml#Tab1).\n\
    \nTable 1-1\n\nMain storage engines\n\n| Storage Engine | About |\n| --- | ---\
    \ |\n| InnoDB | • The main storage engine offered by MySQL since MySQL 5.5.• A\
    \ general-purpose storage engine that is recommended for use in most projects\
    \ using MySQL.• The only ACID-compliant storage engine in MySQL.• Offers support\
    \ for foreign keys and, since MySQL 5.6, for full-text indexes.• When MariaDB\
    \ is in use, InnoDB supports virtual columns. |\n| MyISAM | • MyISAM was the default\
    \ storage engine until MySQL 5.5 rolled around – as such, it is the primary competitor\
    \ to InnoDB.• MyISAM provides no ACID compliance and is based on the key buffer.•\
    \ MyISAM offers support for full-text indexes by default.• MyISAM stores an internal\
    \ table row count inside of itself and thus, while generally being a slower alternative\
    \ to InnoDB, offers faster performance for `COUNT(*)` queries. |\n\n### Other\
    \ Storage Engines\n\nAside from InnoDB and MyISAM, MySQL also has other storage\
    \ engines you can choose from. Changing the storage engine of your MySQL infrastructure\
    \ is not generally recommended unless you have a good reason to do so as InnoDB\
    \ has been tried and tested extensively and determined to be the best storage\
    \ engine for the vast majority of use cases, but if you’re feeling a little adventurous,\
    \ here’s what your options are and why you may consider them.\n\n| Storage Engine\
    \ | About |\n| --- | --- |\n| MEMORY (HEAP before MySQL 4.1) | • This storage\
    \ engine stores all of the data in memory.• Provides tables with hash-based storage\
    \ making exact data retrievals extremely fast, but with a downside of storing\
    \ data in memory (once the server is shut down or the memory is cleared, data\
    \ is gone).• Before MySQL 8.0, MySQL used the MEMORY storage engine to store data\
    \ relevant to temporary tables. This engine was replaced by the TempTable storage\
    \ engine for temporary table use cases starting from MySQL 8.0. |\n| TempTable\
    \ | • This storage engine is primarily used by the optimizer to create temporary\
    \ tables and store data relevant to them. |\n| CSV | • As the name suggests, this\
    \ storage engine stores data in a CSV-like format.• No support for indexes or\
    \ partitioned tables. |\n| ARCHIVE | • Intended to be used as an archive for data\
    \ that is no longer used or required for your application to function properly.•\
    \ Has an extremely small footprint on the disk at the expense of not supporting\
    \ `DELETE`, `REPLACE`, or `UPDATE` operations.• No support for indexes or partitions.\
    \ |\n| BLACKHOLE | • Any and all data inserted into this storage engine disappears\
    \ into a blackhole, hence the name.• Intended to be used as a demo solution for\
    \ sandbox projects. |\n| MERGE (formerly MRG_MyISAM) | • This storage engine provides\
    \ a collection of MyISAM tables that are merged and can be used as one table.\
    \ |\n| FEDERATED | • This storage engine enables for querying of remote data without\
    \ replication or clustering. |\n| EXAMPLE | • Intended to act as an example for\
    \ developers building storage engines within MySQL. |\n\nMySQL is a serious beast,\
    \ huh? So many storage engines without even counting the main one? Oh, and did\
    \ you know that Percona has built an enhancement for the main storage engine –\
    \ InnoDB – too? Their enhanced storage engine is called Percona XtraDB or simply\
    \ XtraDB, and it’s known for offering a wide variety of features suitable for\
    \ those needing a high-performance environment.\n\nThat’s the world of MySQL –\
    \ you now have a good idea of how everything works together. Now, you will dive\
    \ deeper into specific storage engines, and then, we will start breaking your\
    \ MySQL instance to figure out how to optimize and secure it.\n\n## Summary\n\n\
    MySQL is a powerful, but very complicated beast – with so many features under\
    \ its hood, it’s no wonder why many developers get lost in its jungle.\n\nThe\
    \ good news is that this beast can be tamed – once you learn more about the storage\
    \ engines available MySQL, you will be able to determine how you broke your instance,\
    \ then – how to optimize everything for it not to be broken again, and finally,\
    \ how to secure your data from data breaches for your infrastructure to be more\
    \ secure.\n\nNow, go grab a coffee and make sure to refresh your memory about\
    \ the storage engines in MySQL before you continue reading – this is where we\
    \ dive deeper into the realm of storage engines."
  trans: "\n## 基本用例和初始考虑因素\n\nMySQL 由三层架构组成，这并非没有道理——每一层对于根据我们的配置正确执行请求都是必不可少的。\n\n\
    MySQL 可以通过一个名为 \"my\" 的配置文件进行配置——该文件在 Windows 系统上的名称是 `my.ini`，在基于 Linux 的系统上是\
    \ `my.cnf`。\n\n配置文件包含一系列不同的参数。其中一些参数如下所列，但要正确理解它们，你还必须理解一个关键点。回到图 1-1 并查看最底层——它写着什么？对，它写着\
    \ “存储”。存储指的是 MySQL 内部的存储引擎。MySQL 基于存储引擎的原理构建，目前，该 RDBMS 提供了八种存储引擎供选择：\n\n*   `port`：定义我们的\
    \ MySQL Server 的端口。默认为 `3306`，可以更改。\n*   `key_buffer_size`：定义内存中键（索引）缓冲区的大小。与\
    \ MyISAM 用户相关。\n*   `max_allowed_packet`：定义可以通过 MySQL 流动的数据包的最大大小。在 MySQL 8.0\
    \ 实例上，默认值为 `1GB`。\n*   `log_error`：定义与 MySQL 相关的日志文件的存储位置。\n*   `log_error_verbosity`：定义要记录哪种类型的错误：\n\
    \    *   值为 `1` 仅记录错误。\n    *   值为 `2` 记录错误和警告。\n    *   值为 `3` 记录错误、警告和注释。\n\
    *   `innodb_buffer_pool_size`：对于使用 InnoDB 存储引擎的用户来说，这是最重要的参数。此设置定义了 InnoDB 存储引擎的缓冲池大小。缓冲池在访问时缓存表和索引数据。\n\
    *   `innodb_data_file_path`：通往 InnoDB 数据文件的路径——`ibdata1`。\n\n如你所见，配置文件包含一系列不同的参数。这里我们面临一个利弊权衡的问题：Windows\
    \ 上的 `my.ini` 为开发者提供了大量注释，以帮助他们理解 MySQL 的工作原理，但代价是某些参数无法直接调整；而 Linux 上的 `my.cnf`\
    \ 起初提供的参数较少，内部也没有注释，但在可用功能方面提供了更广阔的领域。Windows 用户选择比 Linux 用户少的原因非常简单——Windows\
    \ 不适合完成某些优化操作（例如，InnoDB 的 `O_DIRECT` 刷新方法仅在 Unix 系统上可用，因为它需要基于 POSIX 的头文件）。\n\n\
    很有趣，对吧？请继续关注。回到图 1-1 并查看最底层——存储层。听起来熟悉吗？存储指的是 MySQL 内部的存储引擎。MySQL 基于存储引擎的原理构建，目前，MySQL\
    \ 8.0 提供了 10 种可供选择的存储引擎。\n\n## 存储引擎\n\n目前，MySQL 中提供的主要存储引擎如表 1-1 所示。\n\n表 1-1：主要存储引擎\n\
    \n| 存储引擎 | 说明 |\n| --- | --- |\n| InnoDB | • 自 MySQL 5.5 起，MySQL 提供的主要存储引擎。<br>•\
    \ 一个通用存储引擎，推荐在大多数使用 MySQL 的项目中使用。<br>• MySQL 中唯一符合 ACID 的存储引擎。<br>• 提供对外键的支持，并且自\
    \ MySQL 5.6 起，支持全文索引。<br>• 当使用 MariaDB 时，InnoDB 支持虚拟列。 |\n| MyISAM | • 在 MySQL\
    \ 5.5 发布之前，MyISAM 是默认存储引擎——因此，它是 InnoDB 的主要竞争对手。<br>• MyISAM 不提供 ACID 合规性，并且基于键缓冲区。<br>•\
    \ MyISAM 默认支持全文索引。<br>• MyISAM 在内部存储表行数，因此，虽然总体上比 InnoDB 慢，但在执行 `COUNT(*)` 查询时提供更快的性能。\
    \ |\n\n### 其他存储引擎\n\n除了 InnoDB 和 MyISAM，MySQL 还有其他可供选择的存储引擎。通常不建议更改 MySQL 基础架构的存储引擎，除非你有充分的理由这样做，因为\
    \ InnoDB 已经过广泛测试，并被证明是绝大多数用例的最佳存储引擎。但如果你感觉想尝试一些不同的选项，以下就是你的选择以及你可能考虑它们的原因。\n\n\
    | 存储引擎 | 说明 |\n| --- | --- |\n| MEMORY（在 MySQL 4.1 之前称为 HEAP） | • 此存储引擎将所有数据存储在内存中。<br>•\
    \ 提供基于哈希的表存储，使得精确数据检索非常快，但缺点是数据存储在内存中（一旦服务器关闭或内存被清除，数据就会丢失）。<br>• 在 MySQL 8.0\
    \ 之前，MySQL 使用 MEMORY 存储引擎来存储与临时表相关的数据。从 MySQL 8.0 开始，对于临时表用例，此引擎已被 TempTable 存储引擎取代。\
    \ |\n| TempTable | • 此存储引擎主要供优化器用来创建临时表并存储与之相关的数据。 |\n| CSV | • 顾名思义，此存储引擎以类似\
    \ CSV 的格式存储数据。<br>• 不支持索引或分区表。 |\n| ARCHIVE | • 旨在用作不再使用或应用程序正常运行不再需要的数据的归档。<br>•\
    \ 在磁盘上占用空间极小，但代价是不支持 `DELETE`、`REPLACE` 或 `UPDATE` 操作。<br>• 不支持索引或分区。 |\n| BLACKHOLE\
    \ | • 任何插入此存储引擎的数据都会消失在黑洞中，因此得名。<br>• 旨在用作沙盒项目的演示解决方案。 |\n| MERGE（以前称为 MRG_MyISAM）\
    \ | • 此存储引擎提供了一组 MyISAM 表的集合，这些表被合并并可以作为一个表使用。 |\n| FEDERATED | • 此存储引擎支持查询远程数据，而无需复制或集群。\
    \ |\n| EXAMPLE | • 旨在作为开发者在 MySQL 内部构建存储引擎的示例。 |\n\nMySQL 是个强大的家伙，对吧？即使不计算主要的那个，也有这么多存储引擎？哦，你知道\
    \ Percona 也为这个主要存储引擎——InnoDB——构建了一个增强版本吗？他们增强的存储引擎被称为 Percona XtraDB 或简称 XtraDB，以其提供广泛的功能而闻名，适合那些需要高性能环境的人。\n\
    \n这就是 MySQL 的世界——你现在对一切如何协同工作有了很好的了解。接下来，你将更深入地研究特定的存储引擎，然后，我们将开始剖析你的 MySQL 实例，以弄清楚如何优化和保护它。\n\
    \n## 总结\n\nMySQL 是一个强大但非常复杂的家伙——在其内部有如此多的功能，难怪许多开发者会在其丛林中迷失方向。\n\n好消息是，这个家伙是可以被驯服的——一旦你更多地了解了\
    \ MySQL 中可用的存储引擎，你将能够确定你的实例是如何出问题的，然后——如何优化一切使其不再出问题，最后，如何保护你的数据免遭泄露，使你的基础架构更加安全。\n\
    \n现在，去喝杯咖啡，在继续阅读之前，确保你刷新了对 MySQL 中存储引擎的记忆——接下来我们将更深入地研究存储引擎的领域。\n"
- fmt: '# 2. Individual Storage Engines


    For many, the usage of MySQL is a means to an end – some of us create websites,
    while applications may take the cake for others. No matter what your specific
    use case is, you will need to make good use of storage engines within its infrastructure.


    Go back to Chapter [1](#625040_1_En_1_Chapter.xhtml) and take a closer look at
    the MySQL architecture drawing in Figure [1-1](#625040_1_En_1_Chapter.xhtml#Fig1)
    once again. The last layer provides an incomplete list of storage engines, and
    the layer is called “Storage.” The storage layer consists of three objects – `InnoDB`,
    `MyISAM`, and `NDB`. These are the storage engines available in MySQL, and while
    one of them may be considered the “King,” others are no less important too – all
    of them should be considered before you plan the next step in your journey.


    ## The Modern King of Storage Engines


    ### InnoDB in MySQL and MariaDB


    As far as storage engines in MySQL are concerned, one of them – `InnoDB` – unequivocally
    takes the cake. Many of you have probably heard of `InnoDB`: the storage engine
    was introduced to MySQL in version 5.5.5 in July 2010 and is known to support
    many features that are used to tune MySQL servers for high performance and reliability.


    Since its inception, `InnoDB` has replaced `MyISAM` as the primary and default
    storage engine – back in the day, `MyISAM` was still a viable choice for many
    developers, but as the time flew by and engineers introduced features previously
    only available in `MyISAM` into `InnoDB`, the engine has sunk into the past. `MyISAM`
    can still be found in MySQL, but the engine can be rightfully considered obsolete.
    With that being said, `MyISAM` has a feature that‘s worth your attention, but
    don‘t get distracted yet – `InnoDB` is a beast that needs to be dealt with properly,
    too.


    It all starts from the configuration – `my.cnf` on Unix systems or `my.ini` on
    a Windows architecture. The file can be found in various locations. Windows users
    will find the file in the binary folder: `/bin/mysql/mysql*.*.**` where the `*.*.**`
    is the version of your MySQL Server, and users of the Unix infrastructure will
    find the file in one of the following locations:


    ```

    /etc/my.cnf

    /etc/mysql/my.cnf

    /var/lib/mysql/my.cnf

    ~/my.cnf

    ```


    After finding the file in one of the specified locations, open it up and you will
    see a bunch of settings relevant to `InnoDB`. On a Windows architecture, the available
    settings will look like so (example based on MySQL 8.0.31\. Older versions may
    have less available options – the most important options are emboldened):


    ```

    innodb_adaptive_hash_index=on

    innodb_buffer_pool_dump_now=off

    innodb_buffer_pool_dump_at_shutdown=off

    innodb_buffer_pool_instances=2

    innodb_buffer_pool_load_at_startup=off

    innodb_buffer_pool_size=1G

    innodb_data_file_path=ibdata1:12M

    innodb_default_row_format=dynamic

    innodb_doublewrite=on

    ;skip_innodb_doublewrite

    innodb_file_per_table=1

    innodb_flush_log_at_trx_commit=1

    innodb_flush_method=normal

    ;innodb_force_recovery=1

    innodb_ft_enable_stopword=off

    innodb_ft_max_token_size=10

    innodb_ft_min_token_size=0

    innodb_io_capacity=2000

    innodb_max_dirty_pages_pct=90

    innodb_lock_wait_timeout=600

    innodb_log_buffer_size=16M

    innodb_log_file_size=20M

    innodb_log_files_in_group=2

    innodb_optimize_fulltext_only=1

    innodb_page_size=16K

    innodb_purge_threads=10

    innodb_read_io_threads=10

    innodb_stats_on_metadata=0

    innodb_strict_mode=on

    innodb_thread_concurrency=16

    innodb_undo_log_truncate=on

    innodb_write_io_threads=4

    ```


    Here’s what the options mean, one by one:'
