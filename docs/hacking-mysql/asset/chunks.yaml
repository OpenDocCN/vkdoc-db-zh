- fmt: '对于许多开发者而言，关于索引的主要问题并非它们不存在——而是它们虽然存在，却未被你的查询所使用！这是怎么发生的？原因很简单：


    1.  你没有使用相等运算符进行精确匹配搜索。

    2.  你在查询开头使用了通配符进行通配符搜索（还记得我说过`LIKE`查询开头的通配符会导致无法使用任何索引吗？）。

    3.  如果你的列有多个可能的索引，查询使用的不是最具选择性的那个（即它没有找到最少数量的行）。

    4.  如果你的列有一个跨多列的索引（复合索引），你的查询没有使用该索引的最左前缀。


    这四点中的一个或多个，可能就是你的查询在列上已有索引的情况下仍然性能不佳的核心原因——正如并非所有开发者都很优秀，如果某些条件不满足，也并非所有查询都会使用你的索引。


    我将在后面专门讲解索引的章节中带你了解更多的相关知识，但请先理解这四点，你就能具备消除索引问题的充分能力。


    ## 理解分区


    除了索引，还有什么能提升查询性能？没错——分区！


    分区在某种程度上与索引相似，它们都能最小化数据库在查找任何行时必须筛选的数据量。正如索引有多种类型，分区也有多种类型——可以选择按`RANGE`、`LIST`、`COLUMNS`、`HASH`或`KEY`进行分区，或者对表进行子分区。


    分区有一个有趣的功能——它们同样会占用你的磁盘空间，以换取更快的`SELECT`查询。不过，这并非它们的唯一目的——存在于分区中的数据可以通过删除该分区来清除，而这不会对表整体产生删除影响，因为MySQL将分区本身视为“迷你表”。换句话说，分区是将一个较大的东西分割成更小部分的实践。


    这些部分以文件的形式存储在磁盘上——我们称这些文件为分区。一旦分区为你的表提供支持，MySQL会在以任何方式选择或更新数据时选择一个分区函数。有多种方式可以对表进行分区：


    1.  **按`RANGE`分区**：这种分区方法将表分区的方式是，每个分区包含落在给定范围内的值。

    2.  **按`LIST`分区**：MySQL中的这种分区类型与按`RANGE`分区类似，只是按`LIST`分区使用一个不同整数值的列表来定义数据如何被拆分到分区中。如果某个值没有对应的分区，将返回错误。

    3.  **按`COLUMNS`分区**：这种分区类型允许你使用多个列作为分区键。

    4.  **按`HASH`分区**：这种分区类型将一列作为分区键。除了该列，还必须定义必要的分区数量。`HASH`分区将数据均匀地分布在所有分区上，并使用一个哈希函数。

    5.  **按`KEY`分区**：这种分区类型与按`HASH`分区相似。它也将一列作为分区键，但不使用列作为键或哈希函数，而是利用MySQL内部的一个函数。


    MySQL中的分区类型相当容易理解——此外还有子分区，这意味着用户可以选择在分区内再进行分区，但MySQL只允许在已经使用`RANGE`或`LIST`分区时使用子分区，并且子分区只允许使用两种分区类型：我们的子分区必须是`HASH`或`KEY`类型。


    可以在创建表结构后开始使用分区，如下所示——这里我们定义按范围分区：


    ```sql

    CREATE TABLE `demo_table` (

    `id` INT AUTO_INCREMENT PRIMARY KEY,

    `username` VARCHAR(122) DEFAULT ''''

    ) PARTITION BY RANGE(id) (

    PARTITION `p0_title` VALUES LESS THAN (10),

    PARTITION `p1_title` VALUES LESS THAN (15),

    PARTITION `p2_title` VALUES LESS THAN (20),

    ...

    );

    ```


    子分区可以像这样定义：


    ```sql

    CREATE TABLE `demo_table` (

    `id` INT,

    `regdate` DATETIME

    ) PARTITION BY RANGE(YEAR(regdate))

    SUBPARTITION BY HASH(TO_DAYS(regdate)) (

    PARTITION part_0 VALUES LESS THAN (2015) (

    SUBPARTITION sub_0,

    SUBPARTITION sub_1

    ),

    PARTITION part_1 VALUES LESS THAN (2020) (

    SUBPARTITION sub_2,

    SUBPARTITION sub_3

    ),

    PARTITION part_2 VALUES LESS THAN MAXVALUE (

    SUBPARTITION sub_4,

    SUBPARTITION sub_5

    )

    );

    ```


    请记住，在`RANGE`分区中定义`VALUES LESS THAN`时，分区的值必须是递增的。如果你的第一个分区指定小于2015的值，其他分区都不能指定更低的值，因为对于`RANGE`分区，值必须严格递增以避免此错误：


    ```sql

    #1493 – VALUES LESS THAN value must be strictly increasing for each partition

    ```


    每种分区类型都不同，我已在上面解释了它们的核心区别——你将使用的具体分区类型将直接取决于你的用例和需求。


    然而，无论你选择使用何种分区类型，都必须了解所有MySQL分区用户都可能遇到的关键错误。不了解这些问题可能会让你对MySQL分区的体验变得糟糕。


    ### 分区与大数据


    你首先应该意识到的是，分区不会无缘无故地被使用。对许多人来说，原因很明确——分区将数据拆分成更小的表，而数据库的SQL层仍然将它们视为一个表。数据库中分区的这种功能意味着，分区是构建大数据应用程序（如搜索引擎）的人们频繁使用的朋友。[数据泄露搜索引擎](https://breachdirectory.com)就是一个完美的例子——这类搜索引擎的目的是提供一种快速、无麻烦的方式，通过允许用户筛选大量已公开的数据泄露，来检查他们的身份是否面临风险。其目的是教育人们应更频繁地更改密码，并提高对过去发生的数据泄露事件的认识，以避免成为身份盗窃的受害者。由于数据泄露如此猖獗，且数据泄露搜索引擎任务如此艰巨，分区扮演着重要角色。


    根据个人经验，我可以告诉你，为了为我自己的数据泄露搜索引擎获得“良好”的查询性能（我们指的是完成所有相关SQL查询的时间在0.1秒或以下），我不得不将每个数据泄露按英文字母表分成27个部分（26个分区对应每个字母，第27个使用`MAXVALUE`功能处理其余所有内容），并在被搜索的列上添加索引——这导致表在磁盘上占用的空间显著增加（即使所有数据已完全解析并设置好用于搜索，我也必须使用8TB的硬盘驱动器），但也确保了即使在服务器压力下，查询速度也极快。


    这就是分区世界的真相——你不太可能每个项目都需要分区，但当你需要时，它对你的硬盘不会太友好。计算你的分区将在磁盘上占用的空间与计算将要插入其中的值同样至关重要。


    ### 分区中的NULL值与修剪'
  raw: 'For many developers, the main problem concerning indexes isn’t that they’re
    not in place – it’s that they exist, but they are not even used by your queries!
    How did that happen? Well, simple:


    1.  You didn’t search for an exact match using an equality operator.


    2.  You’ve conducted a wildcard search having a wildcard at the beginning of your
    query (remember when I told you that a wildcard at the beginning of a `LIKE` query
    makes it unable to use any indexes?).


    3.  If your column had multiple indexes in question, it wasn’t the most selective
    one (it didn’t find the smallest number of rows).


    4.  If your column had an index spanning multiple columns (a composite index),
    your query was not using the leftmost prefix of the index.


    One or more of these four things are perhaps the core reason why your queries
    are performing slowly even though you have an index present on a column – just
    as not all developers are great, not all queries will use your indexes if certain
    things are not in place.


    I’ll walk you through some more of these things in a chapter dedicated to indexes
    later on, but wrap your head around these four things and you will be well-equipped
    to eliminate your index problems right then and there.


    ## Understanding Partitions


    What else improves query performance aside from indexes? Right – partitions!


    Partitions are similar to indexes in a way that they minimize the amount of data
    your database has to sift through to find any row. Just as there are many types
    of indexes, there are many types of partitions, too – one can elect to partition
    by `RANGE`, `LIST`, `COLUMNS`, `HASH`, or `KEY`, or subpartition their tables
    too.


    Partitions have an interesting function to perform – they too gobble up your disk
    space in return for your `SELECT` queries being faster. That’s not their only
    purpose though – data existing in partitions can be purged by dropping that partition
    without having a dropping effect on your table as a whole because MySQL treats
    partitions as “mini tables” in and of itself. In other words, partitioning is
    the practice of splitting something rather large into smaller parts.


    Those parts are stored as files on the disk – we refer to those files as partitions.
    Once partitions power your tables, MySQL will choose a partitioning function when
    data is selected or updated in any way. There are multiple ways to partition your
    tables:


    1.  **Partitioning by** **RANGE**: Such a partitioning method partitions a table
    in such a way that each partition contains values that fall within a given range.


    2.  **Partitioning by** **LIST**: This type of partitioning in MySQL is similar
    to partitioning by `RANGE`, just that partitioning by `LIST` takes a list of distinct
    integer values to define how data is split into partitions. If a table has no
    partition for a value, an error will be returned.


    3.  **Partitioning by** **COLUMNS**: This type of partitioning allows you to make
    use of multiple columns as partitioning keys.


    4.  **Partitioning by** **HASH**: This type of partitioning takes a column as
    a partitioning key. Alongside the column, the necessary number of partitions must
    also be defined. `HASH` partitioning partitions data evenly across all partitions
    and uses a hash function.


    5.  **Partitioning by** **KEY**: This type of partitioning is similar to partitioning
    by `HASH`. This type of partitioning also takes a column as the partitioning key,
    but instead of employing a column as the key or using a hash function, it makes
    use of an internal function within MySQL.


    Partitioning types within MySQL are quite easy to understand – there’s also subpartitioning
    meaning that users can elect to have partitions with partitions too, but MySQL
    will only allow subpartitioning to be in place when we’re already working with
    partitioning by `RANGE` or `LIST`, and subpartitions are only allowed to use two
    partitioning types: our subpartitions must be of the `HASH` or `KEY` type.


    One can start using partitioning after creating the table structure like so –
    here we define partitioning by range:


    ```

    CREATE TABLE `demo_table` (

    `id` INT AUTO_INCREMENT PRIMARY KEY,

    `username` VARCHAR(122) DEFAULT ''''

    ) PARTITION BY RANGE(id) (

    PARTITION `p0_title` VALUES LESS THAN (10),

    PARTITION `p1_title` VALUES LESS THAN (15),

    PARTITION `p2_title` VALUES LESS THAN (20),

    ...

    );

    ```


    Subpartitions can be defined like so:


    ```

    CREATE TABLE `demo_table` (

    `id` INT,

    `regdate` DATETIME

    ) PARTITION BY RANGE(YEAR(regdate))

    SUBPARTITION BY HASH(TO_DAYS(regdate)) (

    PARTITION part_0 VALUES LESS THAN (2015) (

    SUBPARTITION sub_0,

    SUBPARTITION sub_1

    ),

    PARTITION part_1 VALUES LESS THAN (2020) (

    SUBPARTITION sub_2,

    SUBPARTITION sub_3

    ),

    PARTITION part_2 VALUES LESS THAN MAXVALUE (

    SUBPARTITION sub_4,

    SUBPARTITION sub_5

    )

    );

    ```


    Bear in mind that when you define `VALUES LESS THAN` in `RANGE` partitioning,
    the values of partitions must be increasing. If your first partition specifies
    values less than 2015, none of the other partitions can specify lower values because
    for `RANGE` partitioning, values must be strictly increasing to avoid this error:


    ```

    #1493 – VALUES LESS THAN value must be strictly increasing for each partition

    ```


    Each partitioning type is different, and I’ve explained their core differences
    above – the exact type of partitioning you will use will directly depend on your
    use case and requirements.


    No matter what kind of partitioning type you elect to use though, you must be
    aware of key mistakes applicable to everyone using MySQL partitions. Not being
    aware of these issues may make your experience with partitions in MySQL sour.


    ### Partitions and Big Data


    The first thing you should be aware of is that partitions are not used without
    a reason. For many, that reason is clear – partitions split data into smaller
    tables that are still treated as one table by the SQL layer of your database.
    Such functionality of partitions within your database means that partitions are
    a frequent friend of those who build big data-based applications, such as search
    engines. [Data breach search engines](https://breachdirectory.com) are a perfect
    example of this – the purpose of such search engines is to provide a quick and
    hassle-free way to check whether anyone’s identity is at risk by allowing them
    to sift through massive troves of data breaches that have been made public at
    some point in time to educate people about the fact that they should change their
    passwords frequently and raise awareness about data breaches that have occurred
    in the past to not fall victim to identity theft. With data breaches being so
    rampant and with data breach search engines such a heavy task to accomplish, partitions
    play a big role.


    From personal experience, I can tell you that to acquire “good” query performance
    (we’re talking anywhere below or equal to 0.1sec. to complete all SQL queries
    relevant to the searching capability) for my own data breach search engine, I
    had to partition every data breach into 27 parts as per the English alphabet (26
    partitions for each of the letters and 27th – for everything that remains using
    the capability of `MAXVALUE`) and add indexes on the columns that were searched
    for – that accounted for the fact that tables now occupy significantly more space
    on the disk (I have to make use of 8TB disk drives even when all of the data is
    fully parsed and set up for searching), but also for the fact that queries are
    blazing fast even during stress on the server.


    Such is the truth about the partitioning world – you aren’t likely to need partitions
    for every project, but when you do, it won’t do good for your hard drive. Accounting
    for the space your partitions will occupy on the disk is as crucial as accounting
    for the values that will be inserted in them.


    ### NULL Values and Pruning in Partitions'
