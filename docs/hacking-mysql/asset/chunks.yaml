  trans: '

    ## 在 MySQL 中优化查询时应避免的事项


    就值而言，在使用 MySQL 时，要特别警惕分区中的 `NULL` 值。MySQL 分区的构建方式使得，如果你向按 `RANGE` 分区的表中插入 `NULL`
    值，这些值将存储在可能的最低分区中。MySQL 也将 `NULL` 值视为比普通值“权重更低”。


    我再告诉你一个秘密——除了将数据拆分到 MySQL 仍视为一个表的单独表中外，分区还有一个极其有益的用途，那就是数据的**修剪**。还记得我说过“*每个分区在磁盘上都表示为一个具有特定权重的文件*”吗？反过来也是如此——如果你删除那个分区，文件将被删除，你的数据在磁盘上占用的空间也会减少。分区也可以被**截断**。噗——没了。再想想搜索引擎——假设你的表像这样按范围分区（对于那些在值从
    A 到 Z 的大数据集中进行搜索的人来说，这种分区方式可能很有益——*被分区的值也可以是字符串*）：


    ```sql

    CREATE TABLE `demo` (

    `structure` VARCHAR(115) NOT NULL DEFAULT '''',

    `nicely` VARCHAR(60) DEFAULT NULL,

    `please` VARCHAR(70) DEFAULT '''',

    `define_partitions_too` VARCHAR(90) NOT NULL

    ) ENGINE = InnoDB COLLATE utf8mb4_unicode_ci

    PARTITION BY RANGE COLUMNS(define_partitions_too)

    (

    PARTITION partition_a VALUES LESS THAN (''a''),

    PARTITION partition_b VALUES LESS THAN (''b''),

    PARTITION partition_c VALUES LESS THAN (''c''),

    ...

    PARTITION partition_max VALUES LESS THAN (MAXVALUE)

    );

    ```


    为了这个示例，我将创建两个表——一个带分区，一个不带，但两个表的结构完全相同。


    ![](img/625040_1_En_4_Fig6_HTML.jpg)


    *图 4-6：带分区和不带分区的表*


    这些查询执行后，我们将得到两个表。


    ![](img/625040_1_En_4_Fig7_HTML.jpg)


    *图 4-7：带分区和不带分区的表大小不同*


    如果你还看不出来，那么带分区的表会比不带分区的表更大，而且你拥有的分区越多，这个差异就会变得越大。无论如何，回到我们开始的地方。分区是可以被修剪的。


    我现在已经向两个表中填充了记录。


    ![](img/625040_1_En_4_Fig8_HTML.jpg)


    *图 4-8：两条带有记录的 InnoDB 表*


    我现在将展示删除分区如何影响你的数据库：


    ![](img/625040_1_En_4_Fig9_HTML.jpg)


    *图 4-9：在 MariaDB 中删除一个分区*


    这里的要点很简单——我们的行驻留在第三个分区中（见表结构），一旦我们删除了第三个分区，那行数据就不再存在了。我们修剪了数据——哇呼！


    酷——现在你也对分区有所了解了。既然你知道了什么会破坏你的查询，你也应该意识到在优化它们时应避免的事项——我将在本书的“优化”部分带你了解你需要知道的内容，但在游泳前先用脚试试水总没有坏处。


    *避免重复不良实践*——随着学习的深入，你会了解到一系列糟糕的数据库实践。它们几乎出现在每个 SQL 博客上；在会议、研讨会、技术交流会等场合被提及。它们无处不在——几乎每个供应商都会有一两篇关于你不应在现在或将来重复的不良实践的博客。在数据库世界中，这些包括：除非必要，否则应避免选择所有列（使用
    `SELECT column` 而不是 `SELECT *`）；应避免在 `LIKE` 中使用前导通配符；谨慎在大型数据集上使用 `ORDER BY`（使用
    `LIMIT` 限制）；避免对大型数据集或整个 `InnoDB` 表使用 `COUNT(*)`（`MyISAM` 是此规则的例外，因为它内部存储了行数——而
    `InnoDB` 没有）；避免在大型数据集上使用 `DISTINCT`（在 Unix 上查看 `sort -u file.txt` 命令——更多内容将在优化部分介绍）；并记住
    MySQL 不会阻止你在同一列上放置多种类型的索引。


    *避免把事情复杂化*——SQL 基于标准。ACID 已经存在了几十年，并且不太可能很快消失。你将会使用到的几乎所有 SQL 查询也是如此，备份、安全等方面也是如此。事物会变——但基本的东西保持不变。当你可以采用经过数百次尝试和测试的建议时，为什么要重新发明轮子来实现一个目标？


    *避免过度优化你的数据库*。说真的——有太多的人建议你这样优化数据库，那样优化数据库，不要使用那个，等等，你可以相当肯定，随着时间的推移，给你建议的人会越来越多。并非所有这些建议都是可信的——请记住，即使是
    MySQL 有时也会犯错（如果你想看证据，请看[这里成千上万个 MySQL 漏洞](https://bugs.mysql.com/)），所以在接受任何建议之前，确保你从可信的来源获得它。一旦你收到了你认为解决问题所必需的建议，请务必按所示应用它（否则，你可能会遇到进一步的问题），先在本地环境中运行代码以确保其运行无误，并且在此过程中不会损坏生产数据，同时也要相信你之前的经验。如果上次在某个列上添加索引解决了某个性能相关的问题，现在也试试。看看是否有效。


    *始终将你收到的建议与文档的最新版本进行比较*——尽管在某些情况下文档可能会误导你（如下例），但在大多数情况下，它是由在该领域拥有数十年经验、与最初构建产品的人有密切联系的称职人员编写的。要信任，但要核实。


    ### 不要盲目信任文档


    文档非常棒——它们帮助我们更好地理解产品；这一点毋庸置疑。这正是它们应该做的！当你寻求任何有关查询性能的建议时，你会听到的一件事是，你应该阅读相关产品的文档。这个建议本身并不坏——毕竟，文档应该由构建该产品的公司员工编写，对吧？


    情况并非总是如此：[我希望你和我一起深入研究一个关于 InnoDB 并发性的古老例子](https://dba.stackexchange.com/questions/2918/about-single-threaded-versus-multithreaded-databases-performance/2948%25232948)。这种情况发生在十多年前，但仍然足以说明并非所有被记录的内容在任何时候都是
    100% 正确的——情况如下：


    1.  一个人，为了简单起见，我们称他为 X 先生，在 StackOverflow 上问了一个问题：多线程数据库何时比单线程数据库更有用？

    '
- fmt: '2.  多人加入帮助X。其中大部分人提供了可信且值得注意的建议，指出通常性能瓶颈在于磁盘，大多数数据库会创建临时表来处理数据等。


    3.  最后，有一个人提到了InnoDB中的多线程能力（记住，InnoDB是MySQL及其同类产品提供的主要存储引擎），他说InnoDB的线程并发性可以通过调整MySQL中的`innodb_thread_concurrency`变量来设置。


    4.  此时，有些人可能会查阅关于InnoDB线程并发的文档，文档当时大致是这样说的：“将线程并发设置为5，以将InnoDB内可打开的并发线程数上限设置为5”等等。[但在另一个关于InnoDB的回答中](https://dba.stackexchange.com/questions/5666/possible-to-make-mysql-use-more-than-one-core)，同一个人指出，尽管文档如此说，2011年在纽约举行的Percona
    LIVE会议上，一位MySQL专家表示，无论文档怎么说，最好将`innodb_thread_concurrency`变量保持在其默认值0，这样InnoDB可以决定为MySQL数据库设置打开最优数量的`innodb_concurrency_tickets`。他随后还说，如果你将`innodb_read_io_threads`和`innodb_write_io_threads`都设置为其最大值64，你应该能够使用更多的核心（假设你运行合理数量的核心——如果你运行16核机器，你可能想避免这个建议）。


    明白我的意思了吗？文档是人写的——人会犯错。这些错误可能代价高昂！


    所以，总结一下，要避免：


    1.  重复不良实践。

    2.  把事情过度复杂化。

    3.  过度优化你的数据库（只优化你理解的东西，并确保你知道那个东西是如何工作的）。

    4.  始终将你收到的建议与最新版本的文档进行比较。


    最重要的是，听取来自可靠来源的建议，先在本地环境中运行代码，并相信你过去的经验——从你犯过的错误中学习，为你的应用程序和数据库创造一个更好、更繁荣的未来。


    ## 总结


    在本章中，我带你了解了破坏查询的因素。你现在明白了是什么让查询变慢，以及如何着手为你的数据库构建完美的模式。你也理解了数据类型、字符集和排序规则是如何工作的。我带你了解了索引和分区，揭开了一些围绕分区、`NULL`值和剪枝的秘密，并带你了解了在优化MySQL查询时要避免的一些事情。


    我这样做是带着一个目标。本章帮助你理解是什么让你的查询出错，随着你的阅读和学习，这种理解将变得越来越重要。


    理解如何在你的数据库基础设施中破坏查询至关重要，因为它也能增强你对如何优化和保障数据库安全的理解。我们还没有完成“破坏”的工作。在优化查询和相关基础设施之前，我们必须理解查询组件和你的服务器。我们现在就来做这件事。


    # 5. 理解查询组件


    既然你已经了解了哪些因素会破坏查询，是时候理解它们的组成部分——查询内部的任务了。这里我们回到我在本书中已经提到过几十次的东西——*查询是由其他任务组成的任务*。为了确保这些任务能够成功执行，我们必须理解它们的组成部分。听起来足够简单，但如果真有那么简单，抱怨查询性能的人就会少得多，对吧？这就是为什么理解查询组件如此关键——对查询内部结构的正确理解可以成就或毁掉你的数据库实例。


    ## SQL查询与存储过程


    从表面上看，SQL查询看起来简单且不复杂。但在底层，它们绝非儿戏——它们由许多小任务组成，所有这些任务都需要协同工作，你的数据库才能达到完美。翻回上一章，读一读“为什么查询会慢？”这个标题，你很快就会明白我的意思——有这么多任务要完成，可以合理地假设，读取更大数据集的查询会比那些没有那么多数据要筛选的查询花费更多时间。每种查询完成不同的任务（查询插入、选择、更新或删除数据），但在底层，它们的工作方式都相似。


    正如我在上一章已经提到的，MySQL中有多种类型的查询——包括DML（数据操作语言）查询、DDL（数据定义语言）查询，以及DCL（数据控制语言）和TCL（事务控制语言）查询。这些查询大多工作方式相似——它们在返回任何结果之前会执行大约20个子任务。这些查询通常是捆绑在一起的，意思是，一旦你应用程序的用户对表单或类似的东西进行操作，一个SQL查询就会在后台执行。更精明的开发人员甚至可能意识到存储过程可以帮助他们成功！


    为了理解查询组件对你的SQL查询为何如此关键，我希望你以存储过程为例来看一看。在MySQL中，存储过程是使用`CALL`语句实现的——该语句调用（调用）一个必须使用`CREATE
    PROCEDURE`创建的存储过程。MySQL中的过程是一组存储在数据库中（因此服务器知道）并在使用`CALL procedure`或`CALL procedure()`调用时执行的SQL查询。


    过程可以有两个参数——一个`IN`参数和一个`OUT`参数。用户可以将值传递到`IN`参数定义的列中，而`OUT`参数定义的列将过程中的值传回给用户。可以像这样定义过程。


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig1_HTML.jpg)


    图 5-1


    在MariaDB中定义过程


    在这里，我们将分隔符更改为“`//`”，以防止MariaDB将我们查询的结尾解释为过程的结尾，然后定义了过程并告诉它将其结果放入一个名为`count_cities`的变量中。可以按以下方式使用存储过程。


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig2_HTML.jpg)


    图 5-2


    在MariaDB中调用过程


    我们得到了英国城市的数量！很好。


    *存储过程的组成部分是其中的语句，这意味着存储过程的速度取决于这些语句的速度。*


    如你所见，MariaDB中的过程使用起来相当简单——并且由于过程由你的MySQL实例“记住”的查询组成，这些过程的性能也将直接依赖于那些查询的性能。


    查询性能直接依赖于你的数据库执行查询组件的速度——记住，有20多个这样的组件。这些组件依赖于查询执行计划，而查询执行计划又依赖于解析器和优化器。


    ## 解析器与优化器


    在内部，每个SQL查询都被转换成一个执行计划。在生成执行计划之前，MySQL在解析器阶段检查SQL查询的语法和语法是否正确——它通过逐个检查查询中的所有字符、根据规则进行匹配来检查错误，如果一切正常，则将查询转交给优化器。


    为了让你想象解析器在数据库中如何工作，拿任意一个查询并将其拆分成片段。如果你想看个例子，请看这个：


    ```sql

    SELECT sender,COUNT(*) FROM messages WHERE message LIKE ''%What time%'';

    ```


