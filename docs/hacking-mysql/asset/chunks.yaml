    1.  It takes a set of tables separated by the comma (“,”) sign and treats every
    table separately (that’s a necessity to “feed” the `SELECT` query).


    2.  Provides the name of a table to a `SELECT` query, takes the column specified
    earlier on with the `Column` variable, and binds his search request to the SQL
    query.


    3.  Fetches (“retrieves”) the result set and puts the results into a `Results`
    variable, which is then accessed and worked on as necessary.


    The reason why this query is in a loop is because we have a lot of tables to query
    through, and new tables may be added into the database as time goes by: that way,
    when tables are added, no piece code needs to be updated. There’s no SQL injection
    either – since there are only 4–5 search types and they’re all whitelisted (no
    other values are possible to be provided), we’re OK on that front too.


    Such SQL queries can do the work when dealing with massive data sets – the thing
    that makes them stand out is the fact that they’re as simple as they can get.
    Really – there are no massive `JOIN` operations, 500 `UNION` operations, or anything
    like that. There isn’t even a `LIKE` clause present. Those clauses *can* be present,
    and there’s nothing wrong if your `SELECT` does have them as long as you adhere
    to the rules that make them perform at their best (refer to the previous chapter
    for advice), but for this specific use case, there’s no need for them – that’s
    exactly what makes queries like the above so efficient: *a no-fuss approach to
    operations through a well-optimized database.* Are these queries slow? Make them
    read through less data by adding a `LIMIT` and/or an `OFFSET` clause, add an index
    or a partition or two on the column in question, and the SQL query will return
    results faster than you will blink. Everything’s pretty basic, isn’t it?


    Granted, your `SELECT` queries may necessitate the reading of data from different
    databases/tables using the `JOIN` clause and you may want to make use of `UNION`
    queries, too. Look at this query as an example:


    ```

    SELECT a.user_id, a.owner, a.pc_id AS computer_id,

    o.m_id as monitor_id, o.m_inch

    FROM computers AS a

    LEFT OUTER JOIN monitors AS b

    ON a.owner = b.owner and a.user_id = b.user_id and b.m_inch = 22

    WHERE a.cpu_ghz >= 3.4

    ```


    Look at the way the query is formatted to start with – what does the formatting
    of this SQL query tell you? Because of the formatting, it’s visible what data
    is selected first, and what data we’re after once the first operation completes:
    first, we select data from the `computers` table, then we select data from the
    `monitors` table.


    Assuming both tables have hundreds of millions of rows, how would you optimize
    such an SQL query? That’s right – you’d split the query into pieces, inspect the
    structure of both of the tables, then run an `EXPLAIN` query to dig into the specifics,
    and optimize the SQL query just like everything else keeping in mind the advice
    in the last chapter. Revolutionary, right?


    The same goes for all other `SELECT` queries you have really. It’s a common misconception
    that querying through bigger data sets necessitates millions of operations that
    your database finds difficult to complete and thus, MySQL should be thrown out
    the window – dig into the internals, read through as little data as possible,
    and don’t forget the basics. You’re good to go!


    ### Updating Big Data in MariaDB


    Updating bigger data sets isn’t rocket science either – remember the `UPDATE`
    clause?


    ```

    UPDATE `demo_table` SET [column] = [''value''] WHERE [specific details], [update
    multiple columns here] [LIMIT x]

    ```


    There’s no specific `UPDATE FOR BIG DATA` clause – here, things are the same too.
    No matter how big your data sets are, `UPDATE` clauses don’t change – their internal
    functionality remains the same, they look the same and accept the same parameters
    – they just update different amounts of data. Sure, there are life hacks you can
    employ to avoid them altogether such as creating a table and assigning a column
    a `DEFAULT` value so it gets pre-filled by default without you needing to mess
    with the clause altogether, but aside from that, best practices for `UPDATE` queries
    on big data sets include


    *   **Locking tables, updating data in chunks, and then unlocking them**: Such
    a practice is likely to make `UPDATE`s through bigger amounts of data faster.'
