    `Jonathan Gennick` and `Dr. Charles Bell` have been instrumental in helping me
    find out that an issue regarding an “@” sign on bigger data sets (I share details
    of it in the `Appendix`) is a bug within `MySQL` as well – a big thank you goes
    out to you two as well.


    Those who taught development secrets all these years ago are never to be forgotten
    too: a special thank-you goes out to `Gediminas Kiltinavičius`, `Artūras Lazejevas`,
    and other people involved in shaping me as a person (and as a developer!) in the
    programming school in `Lithuania`.


    Of course, a special thank-you goes to the `Apress` editors `Jonathan Gennick`,
    `Shaul Elson`, `Krishnan Sathyamurthy`, and the rest, without whom this book wouldn’t
    have been able to see daylight in the first finally, a separate thank-you goes
    out to countless people who are contributing their advice, often free of charge,
    on forums and mediums like `Stack Overflow`, the `DBA Stack Exchange`, blogs,
    `YouTube`, conferences, and beyond – bits and pieces of advice on how to solve
    specific issues are always golden. Some of that advice helps developers in their
    darkest moments, some of it helps solve smaller issues, and some of it doesn’t
    work at all, but regardless, the developer community rocks! A big thank you goes
    out to you as well. Whoever you are, whatever you do, sharing your knowledge is
    caring. Thank you for caring for the developer community and providing advice
    where necessary.


    ## About the Author


    ## The History of `MySQL`


    `MySQL` was originally developed in the 1990s by `Michael Widenius`, `David Axmark`,
    and `Allan Larsson`. The development of the database management system began in
    1994, and it was first released to the general public a couple years later.


    In expert circles, `Michael` is often referred to as “`Monty`,” and it is said
    that `Monty` came up with the idea to build `MySQL` after he, while working in
    a small data warehousing company he and `Allan Larsson` founded in 1985, wrote
    a reporting tool using `C`. Sometime after, it is said that customers of the company
    wanted something akin to an interface to deal with their data and `Monty`, fed
    up with solutions that don’t work, started writing a tool – the tool now known
    as `MySQL`. `MySQL` is a name derived from a combination of the name of `Monty`’s
    first daughter (`My`) and `SQL`, the programming language.


    Over the years, `MySQL` has advanced further and further. Many readers will know
    that these days, we have three choices to choose from when working with `MySQL`
    – we can use `MySQL Server`, `MariaDB Server`, or `Percona Server`.


    Both `MariaDB Server` and `Percona Server` are variations of `MySQL Server` –
    they don’t differ much, but offer some things the others don’t. `MariaDB` is known
    for its storage engines, and `Percona Server` comes with many improvements to
    performance and functionality enhancements. `MariaDB` is named after `Monty`’s
    youngest daughter – `Maria` – and includes features developed based on community
    feedback, while `Percona` is known for its database consulting prowess.


    ## The Architecture of `MySQL`


    As is the case with all database management systems, `MySQL` has an architecture
    unique to itself. The `MySQL` architecture has three main parts, them being as
    follows:


    1.  **Client**: The client part of the `MySQL` architecture; the part that users
    interact with when running `MySQL`.

    2.  **Server**: The “brains” of `MySQL`. The client passes the query through the
    server, which performs its own functions. Thread handling handles the query and
    distributes it toward the query cache and the parser, which, in turn, forwards
    it to the query optimizer.

    3.  **Storage**: Finally, once the client has worked on the query and passed it
    on to the server, the server passes everything on to the storage. Storage refers
    to the storage engines powering `MySQL` – at present, the most popular storage
    engine is `InnoDB` followed by `MyISAM`. All of those storage engines have their
    own pluses and minuses which will be discussed a little later.


    The point here is very simple – the three layers described above always work in
    conjunction and oil your server for `MySQL` to work properly. Figure 1-1 will
    help you visualize how these components within `MySQL` interact.


    ![](images/625040_1_En_1_Chapter/625040_1_En_1_Fig1_HTML.jpg)


    Figure 1-1: Architecture of `MySQL`


    Walking yourself through the architecture of `MySQL` is the first step toward
    a better understanding of how your database is broken, optimized, and how it can
    be secured, too.


    Once you understand how the architecture layers connect together, it’s time to
    think about the use cases of `MySQL`. Don’t worry if you don’t understand much
    at this point, too – everything will become more clear as we go along.'
