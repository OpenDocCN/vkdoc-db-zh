  trans: "\n有很多参数可以优化，对吧？然而，虽然了解上述参数的作用可以成为我们在搞坏 MySQL 实例之前的一个良好起点，但你们大多数人可能并不需要修改甚至查看所有参数——优化其中几个就绰绰有余了，其余的参数只有在你日后想要将\
    \ InnoDB 推向极限时才需要触及。\n\n## InnoDB 参数\n\n在最初优化 InnoDB 时，请注意这七个加粗的值：\n\n1.  `innodb_buffer_pool_size`：将缓冲池大小设置为系统可用\
    \ RAM 的 60–80%。缓冲池越大，InnoDB 能够缓存的数据和索引就越多，从而你的 SQL 查询完成得更快。\n2.  `innodb_data_file_path`：这个参数乍一看可能不太重要，但请记住，数据文件（下文解释）存储了与你的表相关的一系列数据。因此，如果你正在进行一个基于大数据的项目，将数据文件路径设置在拥有大量空间的驱动器上至关重要。\n\
    3.  `innodb_file_per_table`：将此参数保留为其默认值 1。这样做，通过让 InnoDB 将表存储在单独的文件中，可以从数据文件中清除不必要的混乱，同时也为未来的维护操作提供更大的灵活性。\n\
    4.  `innodb_flush_log_at_trx_commit`：通常最好将此参数保留为默认值 1，以确保你的数据库保持符合 ACID 原则。虽然可以像上面指定的那样指定\
    \ 0、2、3 等其他值，但那会为了速度而牺牲 ACID。\n5.  `innodb_flush_method`：如上所述，此参数定义了 InnoDB 在事务提交后用于刷新日志的方法。以下是所有可用选项：\n\
    \    1.  `normal`：模拟异步 I/O，缓冲 I/O。\n    2.  `unbuffered`：模拟异步 I/O，非缓冲 I/O。\n \
    \   3.  `async_unbuffered`：Windows 异步 I/O 和非缓冲 I/O。Windows 用户的默认设置。\n    4.  `fsync`：让\
    \ InnoDB 使用 `fsync()` 函数来同步数据库和服务器的状态。Linux 用户的默认设置。\n    5.  `O_DSYNC`：让 InnoDB\
    \ 使用 `O_DSYNC` 函数，以保证数据和元数据在刷新日志文件之前都已写入磁盘。通常比 `O_DIRECT` 更快，但以数据一致性为代价。\n   \
    \ 6.  `nosync`：用于内部测试，不支持生产用例。\n    7.  `littlesync`：用于内部测试，不支持生产用例。\n    8. \
    \ `O_DIRECT`：向 InnoDB 施加一个提示，表示你希望数据绕过 Linux 内核的缓存。通常比 `O_DSYNC` 慢，但更稳定且数据一致。\n\
    \    9.  `O_DIRECT_NO_FSYNC`：向 InnoDB 施加一个提示，表示希望使用 `O_DIRECT` 同时跳过 `fsync()`\
    \ 函数。\n6.  `innodb_log_buffer_size`：日志缓冲区大小对于快速写入磁盘上的日志文件至关重要。增大日志缓冲区将使较大的事务能够更快完成，从而节省磁盘\
    \ I/O。\n7.  `innodb_redo_log_capacity`：这是现已弃用的 `innodb_log_file_size` 和 `innodb_log_files_in_group`\
    \ 变量的替代项。如果未定义此变量，而是定义了日志文件大小和组中的日志文件数，则此参数的值将使用公式计算（`innodb_log_files_in_group\
    \ * innodb_log_file_size`）。否则，InnoDB 将使用此参数中指定的值。\n\n理解上述参数对于实现你的性能目标至关重要，但也要记住，如果没有\
    \ InnoDB 系统表空间——`ibdata1`，这些参数将是不完整的。\n\n如上所述，InnoDB 还有一个数据文件，也称为“系统表空间”。该文件就是前面提到的\
    \ `ibdata1`——它位于你 MySQL Server 安装目录的 `bin` 目录中，并充当与 InnoDB 存储引擎相关的一切的支柱。`ibdata1`\
    \ 存储了所有基于 InnoDB 的表的数据和索引、回滚空间和回滚段、双写缓冲区、辅助索引或插入缓冲区的更改，以及多版本并发控制 (MVCC) 数据。启用\
    \ `innodb_file_per_table` 将有助于减轻损害，但如果 `ibdata1` 被删除或损坏，你的数据就丢失了。\n\n除此之外，关于 `ibdata1`\
    \ 及相关文件还有很多可以说的——当你“拆分和优化”我们的数据库时，你将学习到具体细节。在此之前，你必须了解可用的其余存储引擎选择。\n\n你必须记住的一件事是，不同版本的\
    \ MySQL 也带有不同的搜索引擎选项——Percona Server 以其 XtraDB 产品而闻名，而 MariaDB 可以让你将数据存储在 Amazon\
    \ S3 服务器中，或者提供 MyISAM 的崩溃安全替代方案。但是，让我们从头开始说起……\n\n## Percona Server\n\n### Percona\
    \ Server 中的存储引擎\n\nPercona Server 可以看作是 MySQL Server 的增强版本。该服务器是 MySQL 的一个免费开源替代品，专注于提供极快的性能。\n\
    \nPercona Server 的工作方式与其同类产品类似——它确实支持完整功能的 InnoDB，但它也有自己的独门绝技：Percona 也以其 XtraDB\
    \ 分支而闻名。\n\nXtraDB 是 InnoDB 的增强版本，具有定制的内置选项以增强性能。它并非什么魔法，但如果你正在捣鼓 InnoDB，你也肯定会听说它的兄弟\
    \ XtraDB。\n\n与普遍看法相反，XtraDB 也可以在 MariaDB 中使用，甚至在 MariaDB 10.1 之前一直是其默认存储引擎——但现在情况不同了，因为从\
    \ MariaDB 10.2 开始，团队切换回了 InnoDB，因为 XtraDB 在旧版本的数据库管理系统中比 InnoDB 有许多改进，但随着时间的推移，InnoDB\
    \ 已经迅速赶了上来。\n\n有人认为，在优化选项得当的情况下，XtraDB 只比 InnoDB 略好一点，但无论如何，有几件事你应该知道。\n\nXtraDB\
    \ 建立在 InnoDB 的基础之上，利用其稳健的设计，同时在其基础上添加了更多功能和指标。Percona Server 还支持另外两个 MySQL 中没有的存储引擎——MyRocks\
    \ 和 TokuDB。\n\n### Percona MyRocks 和 TokuDB\n"
- fmt: '## MyRocks


    MyRocks is a storage engine based on RocksDB – a key-value store for faster storage.
    It is known for its ability to take up less footprint on the disk and better I/O
    capacity. It should be known that to work with the storage engine, it’s necessary
    to have Percona MyRocks installed and enabled on your server. A simple `sudo`
    command will do:

    ```bash

    sudo apt install percona-server-rocksdb-OS

    ```

    Here `OS` represents the option you need to specify depending on the operating
    system you find yourself using. If it’s Debian or Ubuntu, specifying `5.7` is
    enough. For RHEL or CentOS, you’d have to specify `57.x86_64`:

    ```bash

    sudo apt install percona-server-rocksdb-57.x86_64

    ```

    Once RocksDB is installed, interact with Percona Server using the Percona Server
    admin – `ps-admin` – script like so, and you will be good to go:

    ```bash

    sudo ps-admin --enable-rocksdb --u [username] --p[password]

    ```

    Once that’s done, you can start familiarizing yourself with RocksDB.


    The first thing you should be aware of is that while most of the storage engines
    within MySQL are based on B+ trees, RocksDB, unlike InnoDB, is an LSM-based storage
    engine. That means that it may not be a very good fit for read-intensive workloads,
    but at the same time, it also means that it’s quite a decent choice if your use
    case is a write-intensive workload with bigger data sets that require efficient
    storage capabilities. Data in MyRocks requires less storage space too, but it
    doesn’t come without downsides:

    - MyRocks doesn’t provide support for online DDL commands.

    - No support for full-text or spatial indexes or foreign keys.

    - No support for gap locks, transportable tablespaces, or group replication.

    - MyRocks doesn’t have any `SAVEPOINT` capabilities either.


    If the downsides don’t scare you and your use case is a write-intensive workload
    and a bigger data set, familiarize yourself with the available options. Some of
    the more interesting options offered by MyRocks include:

    | MyRocks Option | Explanation |

    | --- | --- |

    | `rocksdb_bulk_load` | One can tell MyRocks to ignore certain checks or skip
    the acquisition of locks by enabling the `rocksdb_bulk_load` variable. MyRocks
    also has a couple of options related to this that let you specify when to commit
    a transaction during a bulk load, etc. |

    | `rocksdb_create_checkpoint` | The directory where checkpoint files will be created
    (default – none). |

    | `rocksdb_db_write_buffer_size` | When the tables in the memory reach the value
    specified in this parameter, data is flushed to disk. |

    | `rocksdb_error_if_exists` | Used when building new databases. A value of “1”
    enables an error to be displayed if a database already exists. Off (0) by default.
    |

    | `rocksdb_column_default_value_as_expression` | Allows functions to be used as
    default values for columns. |


    A bulk loading functionality, functions as default values... Interesting, huh?
    Taking a glance at the settings available to be configured alone is enough to
    grasp the fact that this storage engine is for writing. Providing the storage
    engine with data isn’t tricky as long as you remember a couple of key rules:

    1. **Bulk loading**: Enable the `rocksdb_bulk_load` option, load data, disable
    the option. Enabling this option makes the loading of data faster because it enables
    MyRocks to skip certain operations, but it also means that your data may not be
    visible until the bulk load operation is completed.

    2. **Secondary indexes**: If your table has any columns with secondary indexes
    on them, drop the indexes before providing the table with data. After that, restore
    them.

    3. **Unsorted data**: If your data is not sorted by PRIMARY KEYs, enable the `rocksdb_bulk_load_allow_unsorted`
    option before loading your data, and disable it after.

    4. **The memory**: Since MyRocks “memorizes” details about ongoing transactions
    (holds them in the memory), it is wise to keep the transaction size relatively
    small to avoid issues.


    After that, keep up to date by familiarizing yourself with the information available
    in the documentation, and you should be good to go!


    ## TokuDB


    Up until Percona Server 8 and MariaDB 10.5, MySQL had another storage engine up
    its sleeve – TokuDB. The idea of TokuDB was to facilitate the work with bigger
    data sets where data is inserted and queried at the same time; however, as time
    went by, Percona understood that MyRocks provided similar benefits to TokuDB,
    eventually deprecating this storage engine in May 2021.


    TokuDB is not the only storage engine that is considered to be deprecated – old-school
    fanatics of MySQL will remember MyISAM which was the default storage engine for
    MySQL until MySQL Server 5.5 rolled around.


    ## The Primary Contestant of InnoDB


    Back in the day, MyISAM was the only storage engine provided by MySQL and had
    a lot of upsides to itself and was even considered a viable contestant to InnoDB
    for a long period – some developers can be still seen suggesting the usage of
    this storage engine, but DBAs will quickly tell you that InnoDB quickly caught
    up and threw MyISAM to the curb meaning that MyISAM is widely considered to be
    an obsolete storage engine by today’s standards as it has no ACID support and
    is prone to crashes.


    With that said, MyISAM does have two significant upsides to its counterpart InnoDB
    – it does not store its data in any file that cannot shrink (the same cannot be
    said about the InnoDB’s tablespace – `ibdata1`), and it does provide an exact
    row count in all tables running the storage engine.


    ### The Early Days of MyISAM


    Back in the day, MyISAM was an awesome storage engine; it was the only storage
    engine provided by MySQL up until MySQL 5.5, and by the standards of these days,
    it performed its functions exceptionally well.


    MyISAM is based on ISAM – an Indexed Sequential Access Method – that was developed
    by IBM to facilitate access to data sequentially. Such an access method allows
    for easy reading of database files starting from the first record and ending at
    the last with indexes pointing at the correct record in the file thus making the
    method easy and straightforward to understand for everyone involved.


    MyISAM was cheap – the data didn’t take up much space on the disk, tables in the
    database provided an exact row count due to the internal design of the storage
    engine, and there was no file “linked” to other files that could clutter the database
    if not dealt with properly as is the case with InnoDB’s `ibdata1`. To add to that,
    MyISAM supported features that were not supported by InnoDB making it an extremely
    attractive choice for many developers. Even with MyISAM being a non-transactional
    storage engine, considering these factors it’s no wonder why developers thought
    of MyISAM as a viable alternative for InnoDB for so long:

    | Feature in MyISAM | Feature in InnoDB |

    | --- | --- |

    | Support for full-text indexes. | Full-text indexes are supported starting from
    MySQL 5.6. |

    | Support for portable tablespaces. | Portable tablespaces have been supported
    since MySQL 5.6. |

    | Support for spatial indexes. | Spatial indexes became available in InnoDB since
    MySQL 5.7. |

    | Support for the last update time in regard to tables running the storage engine.
    | The functionality was implemented in InnoDB since MySQL 5.7. |


    In general, the functionality was pretty okay, and everyone got on with it. But
    as with everything, MyISAM didn’t come without downsides – and as time went on,
    they became more and more apparent.'
  raw: '#### MyRocks


    MyRocks is a storage engine based on RocksDB – a key-value store for faster storage.
    It is known for its ability to take up less footprint on the disk and better I/O
    capacity. It should be known that to work with the storage engine, it’s necessary
    to have Percona MyRocks installed and enabled on your server. A simple `sudo`
    command will do:


    ```

    sudo apt install percona-server-rocksdb-OS

    ```


    Here OS represents the option you need to specify depending on the operating system
    you find yourself using. If it’s Debian or Ubuntu, specifying `5.7` is enough.
    For RHEL or CentOS, you’d have to specify `57.x86_64`:


    ```

    sudo apt install percona-server-rocksdb-57.x86_64

    ```


    Once RocksDB is installed, interact with Percona Server using the Percona Server
    admin – `ps-admin` – script like so, and you will be good to go:


    ```

    sudo ps-admin --enable-rocksdb --u [username] --p[password]

    ```


    Once that’s done, you can start familiarizing yourself with RocksDB.


    The first thing you should be aware of is that while most of the storage engines
    within MySQL are based on B+ trees, RocksDB, unlike InnoDB, is an LSM-based storage
    engine. That means that it may not be a very good fit for read-intensive workloads,
    but at the same time, it also means that it’s quite a decent choice if your use
    case is a write-intensive workload with bigger data sets that require efficient
    storage capabilities. Data in MyRocks requires less storage space too, but it
    doesn’t come without downsides:


    *   MyRocks doesn’t provide support for online DDL commands.


    *   No support for full-text or spatial indexes or foreign keys.


    *   No support for gap locks, transportable tablespaces, or group replication.


    *   MyRocks doesn’t have any `SAVEPOINT` capabilities either.


    If the downsides don’t scare you and your use case is a write-intensive workload
    and a bigger data set, familiarize yourself with the available options. Some of
    the more interesting options offered by MyRocks include:


    | MyRocks Option | Explanation |

    | --- | --- |

    | `rocksdb_bulk_load` | One can tell MyRocks to ignore certain checks or skip
    the acquisition of locks by enabling the `rocksdb_bulk_load` variable. MyRocks
    also has a couple of options related to this that let you specify when to commit
    a transaction during a bulk load, etc. |

    | `rocksdb_create_checkpoint` | The directory where checkpoint files will be created
    (default – none). |

    | `rocksdb_db_write_buffer_size` | When the tables in the memory reach the value
    specified in this parameter, data is flushed to disk. |

    | `rocksdb_error_if_exists` | Used when building new databases. A value of “1”
    enables an error to be displayed if a database already exists. Off (0) by default.
    |

    | `rocksdb_column_default_value_as_expression` | Allows functions to be used as
    default values for columns. |


    A bulk loading functionality, functions as default values... Interesting, huh?
    Taking a glance at the settings available to be configured alone is enough to
    grasp the fact that this storage engine is for writing. Providing the storage
    engine with data isn’t tricky as long as you remember a couple of key rules:


    1.  **Bulk loading**: Enable the `rocksdb_bulk_load` option, load data, disable
    the option. Enabling this option makes the loading of data faster because it enables
    MyRocks to skip certain operations, but it also means that your data may not be
    visible until the bulk load operation is completed.


    2.  **Secondary indexes**: If your table has any columns with secondary indexes
    on them, drop the indexes before providing the table with data. After that, restore
    them.


    3.  **Unsorted data**: If your data is not sorted by PRIMARY KEYs, enable the
    `rocksdb_bulk_load_allow_unsorted` option before loading your data, and disable
    it after.


    4.  **The** **memory**: Since MyRocks “memorizes” details about ongoing transactions
    (holds them in the memory), it is wise to keep the transaction size relatively
    small to avoid issues.


    After that, keep up to date by familiarizing yourself with the information available
    in the documentation, and you should be good to go!


    #### TokuDB


    Up until Percona Server 8 and MariaDB 10.5, MySQL had another storage engine up
    its sleeve – TokuDB. The idea of TokuDB was to facilitate the work with bigger
    data sets where data is inserted and queried at the same time; however, as time
    went by, Percona understood that MyRocks provided similar benefits to TokuDB,
    eventually deprecating this storage engine in May 2021.


    TokuDB is not the only storage engine that is considered to be deprecated – old-school
    fanatics of MySQL will remember MyISAM which was the default storage engine for
    MySQL until MySQL Server 5.5 rolled around.


    ## The Primary Contestant of InnoDB


    Back in the day, MyISAM was the only storage engine provided by MySQL and had
    a lot of upsides to itself and was even considered a viable contestant to InnoDB
    for a long period – some developers can be still seen suggesting the usage of
    this storage engine, but DBAs will quickly tell you that InnoDB quickly caught
    up and threw MyISAM to the curb meaning that MyISAM is widely considered to be
    an obsolete storage engine by today’s standards as it has no ACID support and
    is prone to crashes.


    With that said, MyISAM does have two significant upsides to its counterpart InnoDB
    – it does not store its data in any file that cannot shrink (the same cannot be
    said about the InnoDB’s tablespace – ibdata1), and it does provide an exact row
    count in all tables running the storage engine.


    ### The Early Days of MyISAM


    Back in the day, MyISAM was an awesome storage engine; it was the only storage
    engine provided by MySQL up until MySQL 5.5, and by the standards of these days,
    it performed its functions exceptionally well.


    MyISAM is based on ISAM – an **I**ndexed **S**equential **A**ccess **M**ethod
    – that was developed by IBM to facilitate access to data sequentially. Such an
    access method allows for easy reading of database files starting from the first
    record and ending at the last with indexes pointing at the correct record in the
    file thus making the method easy and straightforward to understand for everyone
    involved.


    MyISAM was cheap – the data didn’t take up much space on the disk, tables in the
    database provided an exact row count due to the internal design of the storage
    engine, and there was no file “linked” to other files that could clutter the database
    if not dealt with properly as is the case with InnoDB’s ibdata1\. To add to that,
    MyISAM supported features that were not supported by InnoDB making it an extremely
    attractive choice for many developers. Even with MyISAM being a non-transactional
    storage engine, considering these factors it’s no wonder why developers thought
    of MyISAM as a viable alternative for InnoDB for so long:


    | Feature in MyISAM | Feature in InnoDB |

    | --- | --- |

    | Support for full-text indexes. | Full-text indexes are supported starting from
    MySQL 5.6. |

    | Support for portable tablespaces. | Portable tablespaces have been supported
    since MySQL 5.6. |

    | Support for spatial indexes. | Spatial indexes became available in InnoDB since
    MySQL 5.7. |

    | Support for the last update time in regard to tables running the storage engine.
    | The functionality was implemented in InnoDB since MySQL 5.7. |


    In general, the functionality was pretty okay, and everyone got on with it. But
    as with everything, MyISAM didn’t come without downsides – and as time went on,
    they became more and more apparent.'
  trans: '## MyRocks


    MyRocks 是一个基于 RocksDB 的存储引擎——一个用于更快存储的键值存储。它以占用更少的磁盘空间和更好的 I/O 能力而闻名。需要注意的是，要使用该存储引擎，必须在你的服务器上安装并启用
    Percona MyRocks。一个简单的 `sudo` 命令即可完成：

    ```bash

    sudo apt install percona-server-rocksdb-OS

    ```

    这里的 `OS` 代表你需要根据所使用的操作系统指定的选项。如果是 Debian 或 Ubuntu，指定 `5.7` 即可。对于 RHEL 或 CentOS，则需要指定
    `57.x86_64`：

    ```bash

    sudo apt install percona-server-rocksdb-57.x86_64

    ```

    安装好 RocksDB 后，使用 Percona Server 管理脚本 `ps-admin` 与 Percona Server 交互，像这样操作，之后就可以正常使用了：

    ```bash

    sudo ps-admin --enable-rocksdb --u [用户名] --p[密码]

    ```

    完成后，你就可以开始熟悉 RocksDB 了。


    你首先需要了解的是，虽然 MySQL 中的大多数存储引擎都基于 B+ 树，但与 InnoDB 不同，RocksDB 是一个基于 LSM 的存储引擎。这意味着它可能不太适合读密集型工作负载，但与此同时，如果你的应用场景是写密集型工作负载，并且需要高效存储能力来处理更大的数据集，那么它也是一个相当不错的选择。MyRocks
    中的数据所需的存储空间也更少，但这并非没有缺点：

    - MyRocks 不支持在线 DDL 命令。

    - 不支持全文索引、空间索引或外键。

    - 不支持间隙锁、可移植表空间或组复制。

    - MyRocks 也没有任何 `SAVEPOINT` 功能。


    如果这些缺点没有吓退你，并且你的应用场景是写密集型工作负载和更大的数据集，那就熟悉一下可用的选项吧。MyRocks 提供的一些更有趣的选项包括：

    | MyRocks 选项 | 说明 |

    | --- | --- |

    | `rocksdb_bulk_load` | 通过启用 `rocksdb_bulk_load` 变量，可以告诉 MyRocks 忽略某些检查或跳过锁的获取。MyRocks
    还有几个与此相关的选项，允许你指定在批量加载期间何时提交事务等。 |

    | `rocksdb_create_checkpoint` | 将创建检查点文件的目录（默认值 – 无）。 |

    | `rocksdb_db_write_buffer_size` | 当内存中的表达到此参数指定的值时，数据将刷新到磁盘。 |

    | `rocksdb_error_if_exists` | 在构建新数据库时使用。值为“1”时，如果数据库已存在，则显示错误。默认关闭（0）。 |

    | `rocksdb_column_default_value_as_expression` | 允许将函数用作列的默认值。 |


    批量加载功能、函数作为默认值……是不是很有趣？仅仅浏览一下可用的配置选项，就足以让你明白这个存储引擎是为写入而设计的。只要记住几条关键规则，向存储引擎提供数据并不复杂：

    1. **批量加载**：启用 `rocksdb_bulk_load` 选项，加载数据，然后禁用该选项。启用此选项可以使数据加载更快，因为它让 MyRocks
    跳过某些操作，但也意味着在批量加载操作完成之前，你的数据可能不可见。

    2. **二级索引**：如果你的表有带二级索引的列，请在向表提供数据之前删除这些索引。之后，再恢复它们。

    3. **未排序数据**：如果你的数据未按主键排序，请在加载数据之前启用 `rocksdb_bulk_load_allow_unsorted` 选项，并在之后禁用它。

    4. **内存**：由于 MyRocks 会“记忆”正在进行的事务细节（将它们保存在内存中），因此明智的做法是保持事务规模相对较小，以避免问题。


    之后，通过熟悉文档中提供的信息来保持更新，这样你就应该可以顺利使用了！


    ## TokuDB


    直到 Percona Server 8 和 MariaDB 10.5 之前，MySQL 还有一个存储引擎可用——TokuDB。TokuDB 的理念是便于处理数据同时插入和查询的更大数据集；然而，随着时间的推移，Percona
    意识到 MyRocks 提供了与 TokuDB 类似的益处，最终在 2021 年 5 月弃用了这个存储引擎。


    TokuDB 并不是唯一被认为已弃用的存储引擎——MySQL 的老派狂热者会记得 MyISAM，它在 MySQL Server 5.5 推出之前一直是 MySQL
    的默认存储引擎。


    ## InnoDB 的主要竞争对手


    过去，MyISAM 是 MySQL 提供的唯一存储引擎，自身有许多优点，甚至在很长一段时间内被认为是 InnoDB 的有力竞争者——至今仍能看到一些开发者建议使用这个存储引擎，但数据库管理员会很快告诉你，InnoDB
    迅速赶超并将 MyISAM 比了下去，这意味着按今天的标准，MyISAM 被广泛认为是一个过时的存储引擎，因为它不支持 ACID，并且容易崩溃。


    话虽如此，MyISAM 相对于其 counterparts InnoDB 确实有两个显著优势——它不会将数据存储在任何无法收缩的文件中（InnoDB 的表空间
    `ibdata1` 则不然），并且它确实能在运行该存储引擎的所有表中提供精确的行数。


    ### MyISAM 的早期


    过去，MyISAM 是一个了不起的存储引擎；它在 MySQL 5.5 之前是 MySQL 提供的唯一存储引擎，按当时的标准来看，它非常出色地完成了其功能。


    MyISAM 基于 ISAM——一种索引顺序访问方法——由 IBM 开发，用于促进按顺序访问数据。这种访问方法允许轻松读取从第一条记录到最后一条记录的数据库文件，索引指向文件中的正确记录，从而使该方法易于理解。


    MyISAM 很经济——数据在磁盘上占用的空间不大，由于存储引擎的内部设计，数据库中的表提供了精确的行数，并且没有“链接”到其他文件的文件（如果像 InnoDB
    的 `ibdata1` 那样处理不当可能会使数据库混乱）。除此之外，MyISAM 支持一些 InnoDB 不支持的功能，使其成为许多开发者的极具吸引力的选择。即使
    MyISAM 是一个非事务性存储引擎，考虑到这些因素，难怪开发者们长期以来都认为 MyISAM 是 InnoDB 的一个可行替代品：

    | MyISAM 中的功能 | InnoDB 中的功能 |

    | --- | --- |

    | 支持全文索引。 | 从 MySQL 5.6 开始支持全文索引。 |

    | 支持可移植表空间。 | 从 MySQL 5.6 开始支持可移植表空间。 |

    | 支持空间索引。 | 从 MySQL 5.7 开始，InnoDB 中可用空间索引。 |

    | 支持关于运行该存储引擎的表的最后更新时间。 | 该功能从 MySQL 5.7 开始在 InnoDB 中实现。 |


    总的来说，功能相当不错，大家都接受了。但像所有事物一样，MyISAM 也并非没有缺点——随着时间的推移，这些缺点变得越来越明显。'
- fmt: "### MyISAM in the Present Day\n\nThese days, the main downsides of MyISAM\
    \ are related to data inconsistency and no ACID compliance. Due to its design,\
    \ MyISAM is a non-transactional storage engine meaning that the storage engine\
    \ is incapable of supporting rollbacks or atomic operations, thus making it an\
    \ Achilles’ heel for many developers.\n\nOn the flip side, MyISAM has a very simple\
    \ design, thus making functionality unavailable in InnoDB easily accessible in\
    \ MyISAM – MyISAM stores the exact row count of tables running the storage engine\
    \ inside of its metadata and displays the number of rows in any table running\
    \ the storage engine, and deleting files associated with the storage engine deletes\
    \ the data in full without any issues too. The same can’t be said about InnoDB\
    \ because of its tablespace file and the log files that are scanned through when\
    \ we start the recovery process.\n\nIronically, the upsides of MyISAM make its\
    \ downsides more painful as well. MyISAM takes much less footprint on the disk,\
    \ but since MyISAM maintains no log files, it simply cannot look at them when\
    \ recovering data from a crash and with MyISAM having no support for transactions,\
    \ it cannot ensure their integrity thus coming with a very high probability of\
    \ losing your data when writing to a database. Sounds like a nightmare? That’s\
    \ because it is.\n\nThese things stand to this day making MyISAM an awesome companion\
    \ to InnoDB – but no longer making it a viable replacement option, which is why\
    \ MyISAM is now deprecated.\n\nIf you find yourself running MyISAM, consider converting\
    \ all MyISAM-based tables to InnoDB for ACID compliance:\n\n1.  First, obtain\
    \ a list of tables running MyISAM by running the SQL query below – replace *database*\
    \ with the name of your database:\n    `SELECT TABLE_NAME FROM information_schema.TABLES\
    \ WHERE TABLE_SCHEMA = 'database' AND ENGINE = 'MyISAM';`\n2.  Make all of those\
    \ tables run InnoDB:\n    `ALTER TABLE 'table_name' ENGINE = InnoDB;`\n3.  If\
    \ necessary, repeat these steps for each of the databases in your database management\
    \ system.\n\nWoohoo! Now all of your tables run InnoDB – as easy as that. Time\
    \ to learn the use cases of other storage engines available in our beloved DBMS!\n\
    \n### Storage Engine Use Cases\n\nThere’s no secret why there are so many storage\
    \ engines for us to choose from – some storage engines hold our data in memory,\
    \ some support an Excel-like format, some act as archives, some aim to act as\
    \ blackholes for us to test the functionality of our code, and some are built\
    \ as examples of how to build new storage engines within MySQL.\n\nWhile InnoDB\
    \ deserves to be the #1 storage engine for many general use cases and even for\
    \ big data if it’s optimized properly, some use cases may require you to get acquainted\
    \ with different storage engines available in MySQL. We’ll do that now.\n\n###\
    \ The MEMORY and TempTable Storage Engines\n\nBefore MySQL 4.1, MySQL had a storage\
    \ engine referred to as “HEAP” – the purpose of the HEAP storage engine was to\
    \ store data in memory, and that’s why starting from MySQL 4.1, the storage engine\
    \ is called MEMORY.\n\nThe secret of the MEMORY storage engine is hidden in the\
    \ name itself – the storage engine stores data in the memory, meaning that once\
    \ we restart the server or if our database crashes for any reason whatsoever,\
    \ our data is gone. Such a storage engine isn’t a very practical choice for many\
    \ applications in the modern world, but it can sometimes be useful for data to\
    \ serve as a read-only cache in the memory.\n\nIn this realm, newer versions of\
    \ MySQL do have another trick up their sleeve – starting from MySQL 8.3, the database\
    \ management system builds all of its internal temporary tables based on the *TempTable*\
    \ storage engine. The storage engine that’s used for temporary tables can be swapped\
    \ to the MEMORY storage engine by fiddling with the `internal_tmp_mem_storage_engine`\
    \ variable.\n\nThe primary difference between the TempTable and MEMORY storage\
    \ engines is that the TempTable storage engine stores all data and information\
    \ related to the table inside of a file that’s saved on the disk, while tables\
    \ based on the MEMORY storage engine store data inside of the memory and the disk\
    \ saves only the .frm – table definition – file. The TempTable storage engine\
    \ is a good choice for storing larger object types.\n\nThe TempTable storage engine\
    \ does have three main parameters that may be of interest to those fiddling with\
    \ temporary tables: these are the `tmp_table_size` variable, the `temptable_max_ram`\
    \ variable, and the `temptable_max_mmap` variable. The first variable defines\
    \ the maximum size of temporary tables, the second variable defines the maximum\
    \ size of a temporary table before it starts storing data on the disk (default\
    \ value – 1GB), and the last variable defines the maximum amount of memory a TempTable-based\
    \ table can accrue before it starts storing data on the disk. If TempTable starts\
    \ storing data on the disk, data is stored using the InnoDB storage engine.\n\n\
    ### The CSV Storage Engine\n\nThe CSV storage engine is just what it sounds like\
    \ – it stores all of its data in text files having an Excel-like format. Values\
    \ are separated by commas, and tables always have a “.CSV” extension attached\
    \ to them. Writing data into the table means writing data into the Excel file.\n\
    \nCSV-based tables can be created like usual tables; you just need to specify\
    \ the appropriate storage engine at the end:\n\n```sql\nCREATE TABLE `demo_table`\
    \ (\n  `id` INT NOT NULL,\n  `message` VARCHAR(225) NOT NULL,\n  `message_from`\
    \ VARCHAR(225) NOT NULL,\n  `message_to` VARCHAR(225) NOT NULL,\n  `time_sent`\
    \ VARCHAR(225) DEFAULT CURRENT_TIMESTAMP,\n  `time_received` VARCHAR(225) DEFAULT\
    \ CURRENT_TIMESTAMP,\n  ...\n) ENGINE = CSV;\n```\n\nThe CSV storage engine does\
    \ have upsides and downsides – since data is not stored in any file other than\
    \ Excel-based files, the data inside of the files can be modified by modifying\
    \ data inside of the table or the Excel file itself or by modifying the Excel\
    \ file – but the storage engine also has no support for indexing or partitioning."
