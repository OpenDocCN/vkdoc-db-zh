- fmt: '## 安全日志分析


    ```

    127.0.0.1 - [27/Mar/2024 : 17:36:42 +0300] "Get /admin/ HTTP/1.1" 200 1254 "https://website.com/admin/login.php"

    127.0.0.1 - [27/Mar/2024 : 17:38:00 +0300] "Get /admin/ HTTP/1.1" 200 1254 "https://website.com/admin/panel.php"

    127.0.0.1 - [27/Mar/2024 : 17:39:42 +0300] "Get /admin/ HTTP/1.1" 200 1254 "https://website.com/panel.php?do=backup"

    127.0.0.1 - [27/Mar/2024 : 17:42:00 +0300] "Get /admin/ HTTP/1.1" 200 1254 "https://website.com/panel.php?do=modifyroles"

    127.0.0.1 - [27/Mar/2024 : 17:53:00 +0300] "Get /admin/ HTTP/1.1" 200 1254 "https://website.com/admin/logout.php"

    ```


    Combined with a request like this in the `error.log`:


    ```

    [Fri Mar 27 10:42:29.902022 2024] [core:error] [pid 35708:tid 4328636416] [client
    127.0.0.1] File does not exist: https://website.com/backup/backup.sql

    ```


    May indicate the following:


    1.  An IP of `127.0.0.1` is likely to belong to or be somehow related to an attacker.


    2.  The attack took place on or around March 27 and could’ve taken the attacker
    the whole day to complete (approximate timeline: 10AM–6PM).


    3.  The attacker has attempted to locate a backup of the database. The request
    has taken place at 10:42AM and was unsuccessful (the request was in the `error.log`).


    4.  The attacker accessed the admin panel of the website at 17:38:00 GMT +3 and
    stayed there for 15 minutes.


    5.  During those 15 minutes, the attacker has attempted to take a backup of the
    data within the website and modify the roles (privileges?) of certain users, perhaps
    even himself. Judging by the fact that taking the backup has taken a couple of
    minutes (the attacker proceeded to modify roles not even three minutes later),
    we can assume that the attacker didn’t export all data from the database and exported
    only a small portion of our data cake (the `user` table, anyone?).


    Log files are likely to have thousands, or even hundreds of thousands, of requests,
    and not all requests will be malicious – and that’s why you have to pay so much
    attention to the contents of the log files. When you do, experience and attention
    will likely point you in the right direction. You will be able to identify problematic
    sides of an application or a script, patch them, and together with your application
    and database head toward a more prosperous future. So few requests, so much information!


    After the cause of the breach is identified (and your application remains locked
    to the outside world), you can start working on remedying issues. Once you’re
    confident that the security flaws are squashed and after you’ve scanned the perimeter
    of your application for other kinds of security flaws and issues (the `OWASP Top
    10` is always a good place to start) and cleaned up your infrastructure, you can
    issue a mandatory password reset for those logging in to your application, then
    start re-opening your application to the outside world.


    Keep in mind that if your infrastructure has suffered a data breach once, it can
    suffer a data breach again – don’t assume that attackers have gotten tired and
    remain vigilant. Always follow the best practices in the security world, read
    cybersecurity blogs, and stay updated, and no matter how much data you have, your
    database and the application built on top of it should thrive.


    ## 总结


    Security is a crucial aspect within any kind of database, and it’s even more paramount
    when bigger data sets are concerned. When securing bigger data sets, keep in mind
    the three Vs (Volume, Velocity, Variety) and the phases – transfer, storage, and
    display – you need to secure data in. Follow security best practices and frameworks,
    adhere to ways to squash the most prominent attacks on the web and beyond consulting
    with the `OWASP Top 10`, and remain vigilant.


    Aside from these three Vs, be mindful of what the future upholds for you, your
    application, and your database too. Threats evolve – the ways you are protecting
    your database and application against them should too.


    If the unfortunate strikes your database, whatever you do remember to not reset
    passwords until after you’ve completed the steps necessary to secure your application.
    Make sure to keep your users/visitors/customers informed on what’s happening too
    and tell them everything they need to know, because chances are they will figure
    everything out regardless.


    Be smart around social media, protect your devices, beware of phishing attacks,
    shop safely, use password managers to avoid password reuse, and, perhaps most
    importantly, *keep things simple* and retain a cool head on your shoulders.


    Keep things simple, because when your data castle is burning, you need a way to
    escape before finding a firehose or calling firefighters.


    I hope that this book helped you do it all – you now understand how your database
    castle can be broken, how to make use of the data in your database castle in a
    performant way, and how to secure the entire castle from intruders, too.


    Do contact me via the contacts at the beginning of this book, and tell me what
    you’ve thought of it – I’m eager to hear your thoughts on this.


    Until then – au revoir.'
