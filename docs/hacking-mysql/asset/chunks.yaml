  raw: '2.  **Be mindful** **of the impacts of indexes and partitions**: Again, be
    wary that indexes and partitions will slow down the data deletion process for
    the same reasons they slow down updates.


    3.  **Be mindful of storage engines**: Remember MyISAM not being related to a
    tablespace? That means that one can delete the .MYD in the directory of a database
    to delete a table, delete the .MYI file to delete an index on a table, etc.


    4.  **Wipe fractions of data if necessary**: If you have a lot of data, consider
    creating a new table with the `AS` clause to avoid the `DELETE` clause altogether,
    then drop the old table. For example, `CREATE TABLE x AS SELECT a,b FROM table_y;`
    would make the table X only consist of two columns – a and b – from the table
    Y. No other data.


    Again, `DELETE`s are nothing revolutionary – make sure to explicitly tell your
    database what data you’re deleting and on what terms (use the available `WHERE`
    and `LIMIT` clauses), and you should be good to go.


    ## Optimizing Queries for Big Data, Avoiding Deadlocks, and Other Query Optimization
    Tips


    When it comes to bigger data sets, remember how you’ve optimized your database
    to deal with big data: what did you do? You’ve most likely increased the size
    of the InnoDB buffer pool and the InnoDB log files to adhere to the amounts of
    data you’re storing in a database, right? Did you make any other changes? What
    parameters/parts of your database were impacted by those changes?


    You didn’t optimize your database for no reason – make use of those changes! To
    work with queries involving bigger data sets, make use of the query optimization
    advice provided above, and always remember to approach everything in small steps:
    only select data that’s necessary for you to use, insert bigger data sets while
    avoiding overhead posed by `INSERT` queries (use `LOAD DATA INFILE` instead),
    update data in chunks, and delete data making use of the `WHERE` and `LIMIT` clauses
    and other advice.


    No matter what kind of advice you elect to follow, if you want to become a seasoned
    DBA, you will need to trek through hot and cold. Sometimes your database will
    hit you with something that looks completely out of the ordinary like a deadlock
    or two: what then? Deadlock situations occur when our database is completing different
    transactions, but none of them can proceed because each of them is holding resources
    that are necessary for the other transaction to complete. Transaction A is unable
    to proceed because it’s waiting for transaction B, and transaction B is unable
    to proceed because it’s waiting for transaction A. Deadlocks are essentially locks
    “with no way out.”


    How to solve such issues? Easy – follow the advice in the documentation of your
    specific DBMS in question and remember that the most complex problems often require
    the simplest solutions – deadlocks are not an exception to the rule. To solve
    issues posed by deadlocks, restart a transaction and make sure that the so-called
    *Coffman’s conditions* aren’t present in your database – those conditions often
    create opportunities for deadlocks to manifest:


    1.  **Mutual exclusion**: One or more resources should be held in a manner that
    prevents itself from being shared with other resources.


    2.  **Holding of resources**: One or more processes should hold a resource and
    request more resources, some or all of which should be held by another process.


    3.  **Inability to “release” resources**: The process holding resources shouldn’t
    be able to “let go” of them.


    4.  **Circular wait**: Finally, the final predicate for deadlocks is a circular
    wait. A circular wait is an occurrence where one process is waiting for another
    process to finish, while another process is waiting for the first process to finish,
    etc.


    To help your queries be the best version of themselves, avoid these conditions
    – by avoiding them, you will avoid deadlocks.


    Deadlocks are not the only thing you should worry about though – to boost query
    performance, avoid using unnecessary subqueries in `WHERE` or `HAVING` clauses,
    execute SQL queries in batches, make use of the SQL query cache if you‘re in a
    read-heavy environment, consider caching content on a CDN level to reduce the
    load on the database, avoid utilizing functions in predicate statements (that
    way, your database won‘t be able to make use of indexes), and use aggregate functions
    like `AVG`, `SUM`, or `COUNT` sparingly to minimize the amount of data your database
    has to process.


    These tips will be a great place to start not only when optimizing the performance
    of queries on an infrastructure with a low-to-mid-load, but for some instances
    of big data workloads as well.


    ## Summary


    Many people think that optimizing query performance is a rather gruesome task,
    but in reality, it’s a completely normal occurrence, but one that requires familiarity
    with the things happening “under the hood.” Sure, optimizing query performance
    can be tough until you “crack the nut” and gain some experience, but I can assure
    you that gaining that experience will be worth it in the long run. No matter what
    type of queries you find yourself optimizing – be it `INSERT`, `SELECT`, `UPDATE`,
    or `DELETE` queries, all of them have something special to them. At the same time,
    optimizing their performance is not a flight to Mars – we have many tools available
    for us to use to gauge their performance under specific circumstances, and with
    local copies of our application and database always being able to help us, we
    can get rid of many pressing issues rather quickly.


    Gaining experience is fun because once we’re experienced, we can start helping
    our less-experienced colleagues and have a bigger “belt” of problems we can solve.
    Experience is gained by working on all sorts of projects, and for some of us,
    those projects may eventually become rather big – so big that ordinary measures
    to optimize SQL query performance would no longer suffice. Once that happens,
    we need to carefully evaluate our database architecture once again and then use
    measures to optimize our database for bigger data sets.


    # 10. Optimizing MySQL for Big Data


    Once you’ve optimized your database instance and some time has passed, you may
    start to notice that the measures you’ve used to optimize your data for the SQL
    queries behind it are no longer sufficient. They may start to be insufficient
    because your data is growing – and as your data is growing, the measures to deal
    with that growth should grow together with it.


    As your data is growing, you will have a lot of things to consider: from disk
    space and hosting to index and data fragmentation. None of those things are something
    that cannot be worked on, and all of them can be amended and changed as time goes
    on. The point here is that amending them is likely to require a lot of time and
    effort, and that’s not even taking into account the monetary costs. Optimizing
    your database can be a tedious task – and as more and more data is introduced
    into that database, the task is likely to grow out of proportion if you’re not
    ready for what’s to come.


    Not everyone has to optimize their database for big data, but it’s always a good
    idea to keep optimization techniques at bay should you need them. When problems
    knock at your door, many engineers and DBAs turn to StackOverflow to ask questions,
    and I know of DBAs who use Secure Notes within password managers such as 1Password
    to remind themselves of database optimization secrets they find on the web too:
    doing so might be a great idea if you find yourself making use of password managers
    to keep your passwords safe; if not, keep this book somewhere within reach and
    come back to this chapter as your data grows.


    ## Can MySQL Deal with Big Data?'
  trans: "\n2.  **注意索引和分区的影响**：再次提醒，需要注意索引和分区会拖慢数据删除过程，原因与拖慢更新操作相同。\n\n3.  **注意存储引擎**：还记得\
    \ `MyISAM` 与表空间无关吗？这意味着你可以通过删除数据库目录中的 `.MYD` 文件来删除一张表，通过删除 `.MYI` 文件来删除表上的索引，等等。\n\
    \n4.  **必要时仅擦除部分数据**：如果你的数据量很大，考虑使用 `AS` 子句创建一个新表来完全避免使用 `DELETE` 子句，然后删除旧表。例如：\n\
    \    ```\n    CREATE TABLE x AS SELECT a,b FROM table_y;\n    ```\n    这将使得表 X\
    \ 仅由来自表 Y 的两列——a 和 b——组成，不包含其他数据。\n\n再次强调，`DELETE` 操作没什么革命性的——确保明确地告知你的数据库你正在删除什么数据以及基于什么条件（使用可用的\
    \ `WHERE` 和 `LIMIT` 子句），这样就应该没问题了。\n\n## 为大数据优化查询、避免死锁及其他查询优化技巧\n\n当涉及更庞大的数据集时，请回想一下你为处理大数据而优化数据库所做的工作：你做了些什么？你很可能增加了\
    \ InnoDB 缓冲池和 InnoDB 日志文件的大小，以适应你在数据库中存储的数据量，对吧？你还做了其他更改吗？这些更改影响了数据库的哪些参数/部分？\n\
    \n你优化数据库不是没有原因的——利用好那些改动！为了处理涉及更大数据集的查询，请利用上面提供的查询优化建议，并始终记住要循序渐进：只选择你需要使用的必要数据，插入更大数据集时避免\
    \ `INSERT` 查询带来的开销（改用 `LOAD DATA INFILE`），分块更新数据，并在删除数据时利用 `WHERE` 和 `LIMIT` 子句及其他建议。\n\
    \n无论你选择遵循哪种建议，如果你想成为一名经验丰富的 DBA，你都需要经历各种挑战。有时你的数据库会出现一些看似完全异常的情况，比如一两个死锁：那时该怎么办？死锁情况发生在我们的数据库正在完成不同的事务，但每个事务都无法继续，因为它们各自持有着完成另一个事务所必需的资源。事务\
    \ A 无法继续因为它在等待事务 B，而事务 B 也无法继续因为它在等待事务 A。死锁本质上是“无路可出”的锁。\n\n如何解决这类问题？很简单——遵循你所使用的特定\
    \ DBMS 的文档建议，并记住最复杂的问题往往需要最简单的解决方案——死锁也不例外。要解决死锁引发的问题，重启一个事务，并确保所谓的 `Coffman 条件`\
    \ 不在你的数据库中存在——这些条件常常为死锁的产生创造机会：\n\n1.  **互斥**：一个或多个资源应以无法与其他资源共享的方式被持有。\n2.  **持有并等待**：一个或多个进程应持有一些资源，同时请求更多资源，而这些资源中的部分或全部正被另一个进程持有。\n\
    3.  **无法“释放”资源**：持有资源的进程不应能够“释放”它们。\n4.  **循环等待**：最后，死锁的最终判定条件是循环等待。循环等待是指一个进程在等待另一个进程完成，而另一个进程又在等待第一个进程完成，如此循环。\n\
    \n为了帮助你的查询发挥最佳状态，请避免这些条件——避免了它们，你就能避免死锁。\n\n然而，死锁并不是你唯一需要担心的——为了提升查询性能，请避免在 `WHERE`\
    \ 或 `HAVING` 子句中使用不必要的子查询，分批执行 SQL 查询，如果你处于读取密集型环境则利用 SQL 查询缓存，考虑在 CDN 层缓存内容以减轻数据库负载，避免在谓词语句中使用函数（那样你的数据库将无法利用索引），并尽量少用\
    \ `AVG`、`SUM` 或 `COUNT` 等聚合函数，以最小化数据库需要处理的数据量。\n\n这些技巧将是一个很好的起点，不仅适用于在中低负载的基础设施上优化查询性能，对于某些大数据工作负载的实例也同样适用。\n\
    \n### 总结\n\n许多人认为优化查询性能是一项相当艰巨的任务，但实际上，这完全是正常现象，只是需要熟悉“底层”发生的事情。当然，在你“攻克难关”并获得一些经验之前，优化查询性能可能很困难，但我可以向你保证，从长远来看，获得这些经验是值得的。无论你发现自己正在优化哪种类型的查询——无论是\
    \ `INSERT`、`SELECT`、`UPDATE` 还是 `DELETE` 查询，它们都有其特殊之处。同时，优化它们的性能并非登天难事——我们有许多工具可用于衡量它们在特定情况下的性能，并且本地应用程序和数据库副本总能帮助我们，我们可以相当迅速地解决许多紧迫问题。\n\
    \n积累经验很有趣，因为一旦我们经验丰富了，就可以开始帮助经验较少的同事，并拥有一个更大的可以解决问题的“技能包”。经验是通过参与各种各样的项目获得的，对我们中的某些人来说，这些项目最终可能变得相当庞大——大到普通的\
    \ SQL 查询性能优化措施不再足够。一旦发生这种情况，我们需要再次仔细评估我们的数据库架构，然后采取措施为更庞大的数据集优化我们的数据库。\n\n###\
    \ 10. 为大数据优化 MySQL\n\n一旦你优化了数据库实例并且一段时间过去后，你可能会开始注意到，你用来优化 SQL 查询背后数据的措施不再足够。它们可能开始变得不足，因为你的数据在增长——而随着数据的增长，应对这种增长的措施也应该随之增长。\n\
    \n随着数据的增长，你需要考虑很多事情：从磁盘空间和托管到索引和数据碎片。这些事情没有一件是无法处理的，随着时间的推移，所有这些都可以修正和改变。关键在于，修正它们可能需要大量的时间和精力，这甚至还没有考虑到金钱成本。优化你的数据库可能是一项繁琐的任务——而且随着越来越多的数据被引入该数据库，如果你没有为即将到来的情况做好准备，这项任务很可能会变得难以应付。\n\
    \n并非每个人都需要为大数据优化他们的数据库，但将优化技术牢记于心以备不时之需总是一个好主意。当问题找上门时，许多工程师和 DBA 会转向 StackOverflow\
    \ 提问，我也知道一些 DBA 会使用 1Password 等密码管理器中的安全笔记来提醒自己在网上找到的数据库优化秘诀：如果你发现自己使用密码管理器来保护密码安全，这样做可能是个好主意；如果没有，请将这本书放在触手可及的地方，并在数据增长时回顾本章。\n\
    \n#### MySQL 能应对大数据吗？\n"
- fmt: 'There are a lot of misconceptions about the state of databases – and one of
    the primary ones is related to relational databases and bigger data sets. Many
    say that MySQL and its counterparts (MariaDB, Percona Server) aren’t a fit for
    big data sets at all due to them being based on a relational database model, but
    that’s not the problem – improperly optimizing databases for big data is.


    Optimizing MySQL for big data is not that different from optimizing MySQL for
    data sets of an ordinary size; data is still data, there’s just a lot of it. Granted,
    when data sets get bigger, one may have to employ different methods to deal with
    it, but that doesn’t negate the effectiveness of database management systems as
    such.


    The core of the saying “MySQL is not fit for bigger data sets” may stem from the
    premise that non-relational database management systems don’t follow the relational
    database model, and as this model is swapped for a relational model followed by
    MySQL and its counterparts like MariaDB or Percona Server, a pattern emerges –
    you will hear people say


    *   MySQL is only a fit for applications where the ratio between read/write operations
    is no bigger than 80%/20%.


    *   NoSQL databases are meant to serve big data by default!


    *   Only NoSQL databases provide you with a performance benefit for bigger data
    sets; they’re the only option!


    While non-relational databases like MongoDB and its counterparts may be of great
    use for bigger data sets due to their flexible data model and ability to scale
    out when necessary, the bottom line is that MySQL is an extremely capable database
    management system and MySQL *can* deal with big data just as well as other database
    management systems can – it’s just our configuration or use case that is the problem.
    Once your data gets bigger, irrespective of the database vendor, it’s all about
    your server, database configuration, schema, and query design. Don’t get me wrong
    – your database still has to be *optimized* to make use of the setup of your server
    – but that doesn’t mean that MySQL is the worst option you can pick.


    MySQL, MariaDB, or Percona Server will always be an option for bigger data sets
    if you just answer the question “What’s my big data use case?” and *if your big
    data use case necessitates data being stored in databases and tables or rows and
    columns and doesn’t necessitate a flexible data storage model*, you should certainly
    look into MySQL or MariaDB.


    Big data and MariaDB would especially ring a bell for those who run cybercrime
    analytics or open source intelligence tools – think something akin to a data breach
    search engine. In that space, MariaDB is used more frequently than you could imagine
    because such solutions often work with data that’s “ingested” through hacking
    forums, and such data rarely, if ever, consists of `CREATE` or `INSERT` statements.


    It all starts to make a lot of sense when you start to understand how hackers
    operate; hackers usually take copies of databases with the data of hundreds of
    millions of users to sell them on the web (for the buyers, that presents an “upside”
    in that the data can be used for credential stuffing attacks), and if you’d ever
    glance at such data, you would quickly notice that 90% of such data is formatted
    by terminating the columns with the “:” sign. From an attacker’s perspective,
    it all makes a lot of sense as “exfiltrating” data this way takes little time.
    Time can be used to “clean up” (remove traces of a hacker being in a system),
    and data sold in such a manner can be “put to use” to harm other users more quickly.
    What a surprise, everything’s for “convenience...”


    Of course, not every one of you will work with breached data, but the premise
    is the same – I find it unlikely that your systems would ingest millions of rows
    of data built on `INSERT` or `CREATE` queries for the same reason (that doesn’t
    mean you won’t have to ever deal with them, but they won’t be your primary concern
    when importing larger troves of data), and MySQL, MariaDB, and Percona Server
    are capable to insert data in bulk. So, the answer to the question “Can MySQL
    deal with bigger data sets?” is yes if it’s optimized properly and if your use
    case necessitates a “strong” data structure (data should be stored in rows and
    columns).


    MariaDB users also have `ColumnStore` which is a columnar storage engine meaning
    that there’s no need for a separate install either. If your use case necessitates
    big data processing and linear scalability or the insertion of larger volumes
    of data with close to no updates/deletes, `ColumnStore` is also a viable option.


    ## MariaDB and Big Data: Operations with Big Data Sets


    After you’ve made a choice to use MySQL or MariaDB to support bigger data sets,
    inevitably you will have to optimize the database management system for big data
    too. Contrary to popular belief, optimizing MariaDB for bigger data sets is not
    at all different from optimizing your database management system as a whole. That’s
    why I’ve already walked you through the methods you can use to optimize your database
    for performance – once you’re working with big data, you’re going to have to make
    use of the settings you’ve just optimized. There’s nothing new here – really,
    you don’t have to invent a bike or a rocket. With that being said, ordinary `INSERT`s
    won’t cut it, and there are a few things you must know for your work with bigger
    data sets to not become an absolute nightmare – that’s why we’re jumping into
    methods to help facilitate your work with big data.


    Before working with big data, give your data a specific definition: when do you
    consider your application/database to cross the realm into big data? This question
    may seem weird, but people have so many definitions for big data that it’s close
    to absurd. For these examples, we will consider big data “big” once it crosses
    the mark of 100 million records.


    ### Inserting Big Data Into MariaDB


    Before you go ahead and insert bigger data sets into MySQL, there are a couple
    of things you should keep in mind:


    1.  Most of the time, your data insertion will have nothing to do with `INSERT`
    queries. This is because `INSERT` queries come with unnecessary overhead.


    2.  The files you will insert data into your database from will most likely be
    text files, thus having a smaller size than logical/physical backups.


    3.  The columns within your data set(s) are most likely to be terminated by the
    “:”, “|”, “-” signs, or the comma sign (“,”) if Excel (CSV) files are in use.


    4.  You will be able to use your database as your data is inserted into it – your
    storage engine is unlikely to show the row count at first – the row count will
    show up after all of the data is inserted.


    5.  If you need partitions, partition your table before inserting data into it.
    If you need indexes, it is advisable you index after the data is inserted.


    When inserting big data sets into your database, the query you will work with
    will likely concern the `secure-file-priv` variable too. Make sure the variable
    is set to a directory that’s not readily accessible (i.e., outside `public_html`)
    and that the directory resides in a hard drive with plenty of space. Space concerns
    both the file you will be loading the data into your database from, the copies
    of the table/data your database will possibly make (I’m referring to the internal
    functionality of `ALTER` queries), and the amount of space required to store all
    of your precious data in the first place.


