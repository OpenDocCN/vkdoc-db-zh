    Dealing with customers from Israel who interact with data inside of your database?
    Use the Hebrew character set with hebrew_general_ci as your collation.


    For most general use cases, utf8mb4 is your reliable partner. Back in the day,
    some engineers initially preferred utf8, but as utf8mb4 became the standard collation
    method in MySQL, utf8 slowly drifted away. There’s nothing “wrong” if you prefer
    to use utf8 over utf8mb4; it’s just that the original implementation of utf8 doesn’t
    support all Unicode characters – in most cases, you will be okay, but if come
    across scenarios where you need to store emojis or other characters, utf8 won’t
    be enough since it only supports characters from the Basic Multilingual Plane
