  trans: '

    # 2. 个别的存储引擎


    对许多人来说，使用 MySQL 只是达成目的的手段——我们中的一些人用它创建网站，而对另一些人来说，应用程序可能是重中之重。无论你的具体用例是什么，你都需要在其基础设施中善用存储引擎。


    回顾第 1 章，并再次仔细查看图 1-1 中的 MySQL 架构图。最后一层提供了一个不完整的存储引擎列表，该层被称为“存储”。存储层由三个对象组成——`InnoDB`、`MyISAM`
    和 `NDB`。这些是 MySQL 中可用的存储引擎，虽然其中一个可能被视为“王者”，但其他引擎也同样重要——在规划你下一步旅程之前，所有引擎都应被考虑。


    ## 存储引擎的现代王者


    ### MySQL 和 MariaDB 中的 InnoDB


    就 MySQL 中的存储引擎而言，其中一个——`InnoDB`——毫无疑问地拔得头筹。你们中的许多人可能都听说过 `InnoDB`：该存储引擎于 2010
    年 7 月在 MySQL 5.5.5 版本中引入，并以支持许多用于调整 MySQL 服务器以实现高性能和可靠性的功能而闻名。


    自诞生以来，`InnoDB` 已取代 `MyISAM` 成为主要和默认的存储引擎——过去，`MyISAM` 对许多开发者来说仍然是一个可行的选择，但随着时间的推移，工程师们将原本仅在
    `MyISAM` 中可用的功能引入了 `InnoDB`，`MyISAM` 引擎已逐渐成为历史。`MyISAM` 在 MySQL 中仍然可见，但该引擎可以被合理地认为已经过时。话虽如此，`MyISAM`
    有一个值得注意的功能，但现在请先别分心——`InnoDB` 也是一头需要妥善应对的猛兽。


    一切都始于配置——在 Unix 系统上是 `my.cnf`，在 Windows 架构上是 `my.ini`。该文件可以在多个位置找到。Windows 用户可以在二进制文件夹中找到该文件：`/bin/mysql/mysql*.*.**`，其中
    `*.*.**` 是你的 MySQL Server 版本；Unix 基础设施的用户可以在以下位置之一找到该文件：


    ```

    /etc/my.cnf

    /etc/mysql/my.cnf

    /var/lib/mysql/my.cnf

    ~/my.cnf

    ```


    在指定位置之一找到该文件后，打开它，你会看到一堆与 `InnoDB` 相关的设置。在 Windows 架构上，可用的设置将如下所示（示例基于 MySQL 8.0.31。旧版本可能有较少的可用选项——最重要的选项已加粗）：


    ```

    innodb_adaptive_hash_index=on

    innodb_buffer_pool_dump_now=off

    innodb_buffer_pool_dump_at_shutdown=off

    innodb_buffer_pool_instances=2

    innodb_buffer_pool_load_at_startup=off

    innodb_buffer_pool_size=1G

    innodb_data_file_path=ibdata1:12M

    innodb_default_row_format=dynamic

    innodb_doublewrite=on

    ;skip_innodb_doublewrite

    innodb_file_per_table=1

    innodb_flush_log_at_trx_commit=1

    innodb_flush_method=normal

    ;innodb_force_recovery=1

    innodb_ft_enable_stopword=off

    innodb_ft_max_token_size=10

    innodb_ft_min_token_size=0

    innodb_io_capacity=2000

    innodb_max_dirty_pages_pct=90

    innodb_lock_wait_timeout=600

    innodb_log_buffer_size=16M

    innodb_log_file_size=20M

    innodb_log_files_in_group=2

    innodb_optimize_fulltext_only=1

    innodb_page_size=16K

    innodb_purge_threads=10

    innodb_read_io_threads=10

    innodb_stats_on_metadata=0

    innodb_strict_mode=on

    innodb_thread_concurrency=16

    innodb_undo_log_truncate=on

    innodb_write_io_threads=4

    ```


    以下是这些选项的含义，逐一解释：

    '
- fmt: '| Setting | Explanation |

    | --- | --- |

    | `innodb_adaptive_hash_index` | Enables InnoDB to act as an in-memory database.
    Once enabled and if an InnoDB-based table fits in the memory of your server, MySQL
    will enable a direct (and thus quicker) lookup of elements by automatically building
    hash indexes. May not be suitable for all projects – test before using in production.
    |

    | `innodb_buffer_pool_dump_now` | Dumps the most recently cached pages in the
    buffer pool immediately. |

    | `innodb_buffer_pool_dump_at_shutdown` | Dumps the most recently cached pages
    in the buffer pool when the InnoDB engine shuts down. |

    | `innodb_buffer_pool_instances` | Defines the number of the instances of the
    buffer pool is divided into in InnoDB. If the InnoDB buffer pool is extremely
    large, tuning this value and increasing the number of instances may improve performance.
    |

    | `innodb_buffer_pool_load_at_startup` | Whenever MySQL is started, the buffer
    pool is pre-loaded with the same amount of pages it had when it was shut down.
    |

    | `innodb_buffer_pool_size` | Arguably the most important parameter in InnoDB.
    Specifies the size of the buffer pool in InnoDB – since the InnoDB buffer pool
    holds the data and indexes relevant to InnoDB tables, it''s recommended to increase
    its value to be big enough to accommodate your data. Setting the value of this
    parameter to around 60% of the available RAM is a good starting point. Adjust
    as necessary. |

    | `innodb_data_file_path` | The path toward `ibdata1` – the file that holds data,
    metadata, and indexes derived from InnoDB-based tables. |

    | `innodb_default_row_format` | Specifies the default format for rows in tables
    using InnoDB. Available values: 1. `DYNAMIC`. Default value starting from MySQL
    5.0.3. InnoDB tables using this row format will store rows in a manner that enables
    your database to store more data on database pages that overflow. Otherwise, very
    similar to `COMPACT`. 2. `REDUNDANT`. The original row format that was available
    before MySQL 5 rolled around. 3. `COMPACT`. Very similar to `REDUNDANT`. This
    format requires less storage when storing data, hence the name. 4. `COMPRESSED`.
    Compresses as much data as possible, can store even more data on pages that overflow.
    |

    | `innodb_doublewrite` | Enables or disables doublewrite buffering. Available
    values – `ON` and `OFF`. Enabling this parameter will provide InnoDB with the
    ability to have a storage area to “play with” before writing database pages to
    `ibdata1`, thus potentially preventing half-written pages to be written to `ibdata1`.
    |

    | `skip_innodb_doublewrite` | If left uncommented, makes InnoDB skip the doublewrite
    buffer. |

    | `innodb_file_per_table` | Enables InnoDB tables to be stored separately from
    the `ibdata1` file by storing their data in separate files, thus preventing cluttering.
    Leave the value of this parameter `ON` unless you have a good reason to turn it
    off. |

    | `innodb_flush_log_at_trx_commit` | Controls the balance between strict ACID
    compliance and higher performance at the expense of ACID. The value `"0"` will
    make InnoDB flush the redo logs to disk only once a second, a default value of
    `"1"` will make InnoDB ACID compliant, the value of `"2"` will write to logs upon
    commit and flush logs to disk once a second, and `"3"` will write logs to disk
    once they''re prepared and once they''re committed, thus making the process slower.
    |

    | `innodb_flush_method` | Describes the method InnoDB uses to flush logs at the
    transaction commit phase. Available values include: 1. `normal` 2. `unbuffered`
    3. `async_unbuffered` 4. `fsync` 5. `O_DSYNC` 6. `nosync` 7. `littlesync` 8. `O_DIRECT`
    9. `O_DIRECT_NO_FSYNC` I''ll explain what these values mean a little later, but
    for now, leave this setting at default for Windows architectures, and choose `O_DIRECT`
    for Linux. |

    | `innodb_force_recovery` | Enables or disables the crash recovery mode for InnoDB.
    Available values include integers from 0 to 6. |

    | `innodb_ft_enable_stopword` | If left `ON` (default value), will make InnoDB
    fulltext indexes have stopwords. Uses the built-in list of stopwords or takes
    them from the values set in `innodb_ft_user_stopword_table` or `innodb_ft_server_stopword_table`.
    |

    | `innodb_ft_max_token_size` | Specifies the maximum character length of words
    that can use a `FULLTEXT` index. |

    | `innodb_ft_min_token_size` | Specifies the minimum character length of words
    that can use a `FULLTEXT` index. |

    | `innodb_io_capacity` | Defines the number of I/O operations per second InnoDB
    can use for tasks completed in the background. |

    | `innodb_max_dirty_pages_pct` | A percentage-based value that defines the acceptable
    percentage of dirty pages in InnoDB. |

    | `innodb_lock_wait_timeout` | Amount of time in seconds that an InnoDB transaction
    will wait for a row lock before rolling an operation back. |

    | `innodb_log_buffer_size` | The size of the buffer that''s used when InnoDB is
    writing data to the log files. Default value – 16MB, making it larger may improve
    I/O performance. |

    | `innodb_log_file_size` | The size of InnoDB log files. Recommended value – around
    a quarter (25%) of the buffer pool size. Deprecated starting from MySQL 8.0.30
    – adjust the `innodb_redo_log_capacity` variable instead. |

    | `innodb_log_files_in_group` | Specifies the number of InnoDB log files in a
    group. Deprecated starting from MySQL 8.0.30 – adjust the `innodb_redo_log_capacity`
    variable instead. |

    | `innodb_optimize_fulltext_only` | Makes `OPTIMIZE TABLE` only optimize `FULLTEXT`
    indexes. Intended to be used for maintenance operations. |

    | `innodb_page_size` | Specifies the data page size for tables running the InnoDB
    storage engine. |

    | `innodb_purge_threads` | Defines the number of threads to be used once an InnoDB
    purge is underway. |

    | `innodb_read_io_threads` | Specifies the number of I/O threads allocated for
    read operations (`SELECT` queries) in InnoDB. |

    | `innodb_stats_on_metadata` | This parameter applies to the optimizer of MySQL
    when the optimizer statistics aren’t persistent. Available values include `OFF`
    (default) and `ON`. Look into enabling this parameter if you work with bigger
    data sets and deal with `SELECT` queries. |

    | `innodb_strict_mode` | Makes InnoDB behavior more strict in the sense that warnings
    will be treated as errors if this variable is enabled. |

    | `innodb_thread_concurrency` | The maximum number of threads in InnoDB. |

    | `innodb_undo_log_truncate` | If an undo tablespace exceeds a certain threshold
    defined in the `innodb_max_undo_log_size`, the logs are truncated. |

    | `innodb_write_io_threads` | Defines the number of I/O threads for write-based
    operations inside InnoDB. |'
