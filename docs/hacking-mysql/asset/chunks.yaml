    About the Author


    # Part IThe Basics of MySQL


    # 1. The World of MySQL


    MySQL is one of the most widely used database management systems in the world.
    That’s not without a reason – MySQL is a friend to many tech companies including,
    but not limited to, Facebook, Twitter, Netflix, and Uber.


    The reason why so many companies elect to use MySQL as their primary database
    management system of choice is because of its robustness: MySQL supports multiple
    storage engines which makes MySQL flexible enough for an ever-changing world of
    data – those storage engines come with their features related to performance,
    availability, or security, features that can be exploited to get the most out
    of this database management system.


    ## The History of MySQL


    MySQL was originally developed in the 1990s by Michael Widenius, David Axmark,
    and Allan Larsson. The development of the database management system began in
    1994, and it was first released to the general public a couple years later.


    In expert circles, Michael is often referred to as “Monty,” and it is said that
    Monty came up with the idea to build MySQL after he, while working in a small
    data warehousing company he and Allan Larsson founded in 1985, wrote a reporting
    tool using C. Sometime after, it is said that customers of the company wanted
    something akin to an interface to deal with their data and Monty, fed up with
    solutions that don’t work, started writing a tool – the tool now known as MySQL.
    MySQL is a name derived from a combination of the name of Monty’s first daughter
    (My) and SQL, the programming language.


    Over the years, MySQL has advanced further and further. Many readers will know
    that these days, we have three choices to choose from when working with MySQL
    – we can use MySQL Server, MariaDB Server, or Percona Server.


    Both MariaDB Server and Percona Server are variations of MySQL Server – they don’t
    differ much, but offer some things the others don’t. MariaDB is known for its
    storage engines, and Percona Server comes with many improvements to performance
    and functionality enhancements. MariaDB is named after Monty’s youngest daughter
    – Maria – and includes features developed based on community feedback, while Percona
    is known for its database consulting prowess.


    ## The Architecture of MySQL


    As is the case with all database management systems, MySQL has an architecture
    unique to itself. The MySQL architecture has three main parts, them being as follows:


    1.  **Client**: The client part of the MySQL architecture; the part that users
    interact with when running MySQL.


    2.  **Server**: The “brains” of MySQL. The client passes the query through the
    server, which performs its own functions. Thread handling handles the query and
    distributes it toward the query cache and the parser, which, in turn, forwards
    it to the query optimizer.


    3.  **Storage**: Finally, once the client has worked on the query and passed it
    on to the server, the server passes everything on to the storage. Storage refers
    to the storage engines powering MySQL – at present, the most popular storage engine
    is InnoDB followed by MyISAM. All of those storage engines have their own pluses
    and minuses which will be discussed a little later.


    The point here is very simple – the three layers described above always work in
    conjunction and oil your server for MySQL to work properly. Figure [1-1](#625040_1_En_1_Chapter.xhtml#Fig1)
    will help you visualize how these components within MySQL interact.


    ![](images/625040_1_En_1_Chapter/625040_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Architecture of MySQL


    Walking yourself through the architecture of MySQL is the first step toward a
    better understanding of how your database is broken, optimized, and how it can
    be secured, too.


    Once you understand how the architecture layers connect together, it’s time to
    think about the use cases of MySQL. Don’t worry if you don’t understand much at
    this point, too – everything will become more clear as we go along.'
  trans: '# 第一部分 MySQL 基础


    ## 1. MySQL 的世界


    `MySQL`是世界上使用最广泛的数据库管理系统之一。这并非没有原因——`MySQL`是包括但不限于`Facebook`、`Twitter`、`Netflix`和`Uber`在内的许多科技公司的得力伙伴。


    众多公司选择`MySQL`作为其首选数据库管理系统的原因在于其健壮性：`MySQL`支持多种存储引擎，这使得`MySQL`在数据不断变化的当今世界足够灵活——这些存储引擎附带了与性能、可用性或安全相关的特性，充分利用这些特性可以从这个数据库管理系统中获得最大收益。


    ## 本书中的示例


    本书中的代码示例基于`Windows`架构上的`MySQL 8.0`，但也应在其他架构上运行良好。为安全起见，请避免在实际生产环境中运行本书中的代码示例——先测试、验证，然后再将代码推入生产环境。


    使用代码示例时需小心——有些示例可能需要额外的上下文，有些可能会减慢甚至破坏您的查询，还有一些将作为反面示例展示。请务必仔细阅读代码示例前的注释，并在安全环境中，在完全彻底理解您操作后果的前提下运行代码示例。


    ## 评论、问题与关切


    如果您对本书有任何评论、问题或关切，欢迎通过电子邮件`lukas@lukasvileikis.com`联系我——我很乐意就各类查询与您联系，受邀在会议上发言或举办研讨会，或做其他事情，而且我通常回复相当及时。


    有关数据库、网络安全或我本人的更多信息，请访问：


    *   我的网站：[lukasvileikis.com](https://lukasvileikis.com)。

    *   我建立的数据库泄露搜索引擎：[BreachDirectory.com](https://breachdirectory.com)（如果您好奇，它也是基于`MySQL`的！）。

    *   如果您愿意，可以通过[访问](https://databasedive.com) [@DatabaseDive](https://databasedive.com)
    [在 YouTube 或其他平台](https://databasedive.com)观看关于数据库性能的视频。


    现在，让我们深入探索`MySQL`，好吗？


    ## 致谢


    我要感谢一些直接或间接为本书内容、书中分享的知识做出贡献，或起到催化作用的人们。首先想到的是`Zach Naimon`、`Mikael Oldebäck`和`Louis
    "Dr. SQL" Davidson`。


    这些人在本书中扮演了特别重要的角色——无论是通过审阅我的作品、在必要时批评我，还是提供建议——他们永远令人难忘。没有他们，本书的部分内容将不会存在。


    `Zach`，感谢你成为一位很棒的朋友和出色的合作伙伴；`Mikael`，感谢你在必要时推动我前进并成为一位出色的经理；`Louis`，同样感谢你撰写了前言！


    `Jonathan Gennick`和`Dr. Charles Bell`在帮助我查明一个关于大数据集中“@”符号的问题（我在`附录`中分享了细节）是`MySQL`内的一个错误方面发挥了关键作用——也要向你们二位表示衷心感谢。


    那些多年前传授开发秘诀的人们也永远不会被遗忘：特别感谢`Gediminas Kiltinavičius`、`Artūras Lazejevas`以及其他在立陶宛编程学校塑造我（以及作为开发者的我！）的人们。


    当然，要特别感谢`Apress`的编辑`Jonathan Gennick`、`Shaul Elson`、`Krishnan Sathyamurthy`及其他人员，没有他们，本书首先就无法面世。最后，要单独感谢在论坛和诸如`Stack
    Overflow`、`DBA Stack Exchange`、博客、`YouTube`、会议等媒介上无偿贡献建议的无数人们——关于如何解决特定问题的点点滴滴建议总是弥足珍贵。其中一些建议在开发者最黑暗的时刻帮助了他们，一些帮助解决了较小的问题，还有一些则完全不起作用，但无论如何，开发者社区太棒了！也要向你们表示巨大的感谢。无论你是谁，无论你做什么，分享你的知识就是关怀。感谢你关怀开发者社区并在必要时提供建议。


    ## 关于作者


    ## `MySQL`的历史


    `MySQL`最初由`Michael Widenius`、`David Axmark`和`Allan Larsson`在 1990 年代开发。该数据库管理系统的开发始于
    1994 年，并在几年后首次向公众发布。


    在专家圈里，`Michael`常被称为“`Monty`”，据说`Monty`在 1985 年与`Allan Larsson`共同创立的一家小型数据仓库公司工作时，使用`C`编写了一个报告工具，之后萌生了构建`MySQL`的想法。此后不久，据说公司的客户想要一种类似界面的东西来处理他们的数据，而`Monty`受够了不起作用的解决方案，便开始编写一个工具——这个工具就是现在众所周知的`MySQL`。`MySQL`这个名字源于`Monty`长女的名字（`My`）和编程语言`SQL`的结合。


    多年来，`MySQL`不断进步。许多读者会知道，如今我们在使用`MySQL`时有三种选择——我们可以使用`MySQL Server`、`MariaDB Server`或`Percona
    Server`。


    `MariaDB Server`和`Percona Server`都是`MySQL Server`的变体——它们差别不大，但提供了其他版本所没有的一些东西。`MariaDB`以其存储引擎而闻名，而`Percona
    Server`则带来了许多性能改进和功能增强。`MariaDB`以`Monty`最小的女儿`Maria`命名，包含了基于社区反馈开发的功能，而`Percona`则以其数据库咨询能力著称。


    ## `MySQL`的架构


    与所有数据库管理系统一样，`MySQL`有其独特的架构。`MySQL`架构包含三个主要部分，如下所示：


    1.  **客户端**：`MySQL`架构的客户端部分；用户运行`MySQL`时与之交互的部分。

    2.  **服务器**：`MySQL`的“大脑”。客户端将查询传递给服务器，服务器执行其自身功能。线程处理器处理查询并将其分发到查询缓存和解析器，解析器继而将其转发给查询优化器。

    3.  **存储**：最后，一旦客户端处理完查询并将其传递给服务器，服务器就会将所有内容传递给存储。存储指的是为`MySQL`提供支持的存储引擎——目前，最流行的存储引擎是`InnoDB`，其次是`MyISAM`。所有这些存储引擎都有其各自的优缺点，稍后将进行讨论。


    这里的要点很简单——上述三个层始终协同工作，为您的服务器提供动力，以使`MySQL`正常运行。图 1-1 将帮助您形象化`MySQL`内部这些组件是如何交互的。


    ![](img/625040_1_En_1_Fig1_HTML.jpg)


    图 1-1：`MySQL`的架构


    了解`MySQL`的架构是更好地理解您的数据库如何崩溃、如何优化以及如何保障其安全的第一步。


    一旦您理解了架构层如何连接在一起，就该思考`MySQL`的用例了。如果此刻您不太理解也不必担心——随着学习的深入，一切都会变得更加清晰。'
- fmt: "## Basic Use Cases and Initial Considerations\n\nMySQL consists of three architecture\
    \ layers, and that’s not without a reason – each of them is a necessity to properly\
    \ execute requests in regard to our configuration.\n\nMySQL can be configured\
    \ with a configuration file titled “my” – the name of the file is `my.ini` on\
    \ Windows architectures and `my.cnf` on Linux-based systems.\n\nThe configuration\
    \ file consists of a set of different parameters. Some of them are listed below,\
    \ but to properly understand them, you must also understand one crucial thing.\
    \ Go back to Figure [1-1](#625040_1_En_1_Chapter.xhtml#Fig1) and look at the very\
    \ last layer – what does it say? Right, it says “Storage.” Storage refers to the\
    \ storage engines within MySQL. MySQL is built on the principle of storage engines,\
    \ and at the present moment, the RDBMS offers eight storage engines to choose\
    \ from:\n\n*   `port`: Defines the port of our MySQL Server. Defaults to `3306`\
    \ can be changed.\n*   `key_buffer_size`: Defines the size of key (index) buffers\
    \ in memory. Relevant to users of MyISAM.\n*   `max_allowed_packet`: Defines the\
    \ maximum size of the packet that can flow through MySQL. The default value on\
    \ a MySQL 8.0 instance is `1GB`.\n*   `log_error`: Defines the location where\
    \ log files relevant to MySQL are stored.\n*   `log_error_verbosity`: Defines\
    \ what kind of errors to log:\n    *   A value of `1` only logs errors.\n    *\
    \   A value of `2` logs errors and warnings.\n    *   A value of `3` logs errors,\
    \ warnings, and notes.\n*   `innodb_buffer_pool_size`: The most important parameter\
    \ for the users of the InnoDB storage engine. This setting defines the buffer\
    \ pool size for the InnoDB storage engine. The buffer pool caches table and index\
    \ data as it’s being accessed.\n*   `innodb_data_file_path`: The path toward the\
    \ InnoDB data file – `ibdata1`.\n\nAs you can see, the configuration file consists\
    \ of a set of different parameters. Here, we have a double-edged sword: `my.ini`\
    \ on Windows provides developers with a lot of comments for them to understand\
    \ how MySQL works at the expense of certain parameters being out of reach, while\
    \ `my.cnf` on Linux doesn’t provide as many parameters to start with and has no\
    \ comments within itself, but it offers a wider realm in the sense of available\
    \ functionality. The reason why Windows users have fewer choices than their Linux\
    \ counterparts is very simple – Windows is not equipped for certain optimization\
    \ operations to be completed (e.g., the InnoDB flush method of `O_DIRECT` is only\
    \ available on Unix systems because it requires POSIX-based header files).\n\n\
    Interesting, yeah? Stick with me. Go back to Figure [1-1](#625040_1_En_1_Chapter.xhtml#Fig1)\
    \ and look at the very last layer – the Storage layer. Sounds familiar? Storage\
    \ refers to the storage engines within MySQL. MySQL is built on the principle\
    \ of storage engines, and at the present moment, MySQL 8.0 offers 10 storage engines\
    \ you can choose from.\n\n## Storage Engines\n\nAt present, the main storage engines\
    \ offered for use within MySQL are shown in Table [1-1](#625040_1_En_1_Chapter.xhtml#Tab1).\n\
    \nTable 1-1: Main storage engines\n\n| Storage Engine | About |\n| --- | --- |\n\
    | InnoDB | • The main storage engine offered by MySQL since MySQL 5.5.<br>• A\
    \ general-purpose storage engine that is recommended for use in most projects\
    \ using MySQL.<br>• The only ACID-compliant storage engine in MySQL.<br>• Offers\
    \ support for foreign keys and, since MySQL 5.6, for full-text indexes.<br>• When\
    \ MariaDB is in use, InnoDB supports virtual columns. |\n| MyISAM | • MyISAM was\
    \ the default storage engine until MySQL 5.5 rolled around – as such, it is the\
    \ primary competitor to InnoDB.<br>• MyISAM provides no ACID compliance and is\
    \ based on the key buffer.<br>• MyISAM offers support for full-text indexes by\
    \ default.<br>• MyISAM stores an internal table row count inside of itself and\
    \ thus, while generally being a slower alternative to InnoDB, offers faster performance\
    \ for `COUNT(*)` queries. |\n\n### Other Storage Engines\n\nAside from InnoDB\
    \ and MyISAM, MySQL also has other storage engines you can choose from. Changing\
    \ the storage engine of your MySQL infrastructure is not generally recommended\
    \ unless you have a good reason to do so as InnoDB has been tried and tested extensively\
    \ and determined to be the best storage engine for the vast majority of use cases,\
    \ but if you’re feeling a little adventurous, here’s what your options are and\
    \ why you may consider them.\n\n| Storage Engine | About |\n| --- | --- |\n| MEMORY\
    \ (HEAP before MySQL 4.1) | • This storage engine stores all of the data in memory.<br>•\
    \ Provides tables with hash-based storage making exact data retrievals extremely\
    \ fast, but with a downside of storing data in memory (once the server is shut\
    \ down or the memory is cleared, data is gone).<br>• Before MySQL 8.0, MySQL used\
    \ the MEMORY storage engine to store data relevant to temporary tables. This engine\
    \ was replaced by the TempTable storage engine for temporary table use cases starting\
    \ from MySQL 8.0. |\n| TempTable | • This storage engine is primarily used by\
    \ the optimizer to create temporary tables and store data relevant to them. |\n\
    | CSV | • As the name suggests, this storage engine stores data in a CSV-like\
    \ format.<br>• No support for indexes or partitioned tables. |\n| ARCHIVE | •\
    \ Intended to be used as an archive for data that is no longer used or required\
    \ for your application to function properly.<br>• Has an extremely small footprint\
    \ on the disk at the expense of not supporting `DELETE`, `REPLACE`, or `UPDATE`\
    \ operations.<br>• No support for indexes or partitions. |\n| BLACKHOLE | • Any\
    \ and all data inserted into this storage engine disappears into a blackhole,\
    \ hence the name.<br>• Intended to be used as a demo solution for sandbox projects.\
    \ |\n| MERGE (formerly MRG_MyISAM) | • This storage engine provides a collection\
    \ of MyISAM tables that are merged and can be used as one table. |\n| FEDERATED\
    \ | • This storage engine enables for querying of remote data without replication\
    \ or clustering. |\n| EXAMPLE | • Intended to act as an example for developers\
    \ building storage engines within MySQL. |\n\nMySQL is a serious beast, huh? So\
    \ many storage engines without even counting the main one? Oh, and did you know\
    \ that Percona has built an enhancement for the main storage engine – InnoDB –\
    \ too? Their enhanced storage engine is called Percona XtraDB or simply XtraDB,\
    \ and it’s known for offering a wide variety of features suitable for those needing\
    \ a high-performance environment.\n\nThat’s the world of MySQL – you now have\
    \ a good idea of how everything works together. Now, you will dive deeper into\
    \ specific storage engines, and then, we will start breaking your MySQL instance\
    \ to figure out how to optimize and secure it.\n\n## Summary\n\nMySQL is a powerful,\
    \ but very complicated beast – with so many features under its hood, it’s no wonder\
    \ why many developers get lost in its jungle.\n\nThe good news is that this beast\
    \ can be tamed – once you learn more about the storage engines available MySQL,\
    \ you will be able to determine how you broke your instance, then – how to optimize\
    \ everything for it not to be broken again, and finally, how to secure your data\
    \ from data breaches for your infrastructure to be more secure.\n\nNow, go grab\
