    Explore the DBA section of StackOverflow as an example, and you will quickly find
    questions like “My query is slow, how do I…,” “blocking certain queries from being
    visible in the slow query log,” “reorganizing or rebuilding indexes,” and the
    like, and once you glance at the answers, many developers suggest either rebuilding
