- fmt: "To ensure that logical backups complete as quickly as possible, defer auto-commit\
    \ operations (remember – `autocommit=0` goes before `INSERT` operations, `COMMIT`\
    \ comes at the end); if a primary key is present on your table, consider adding\
    \ it before data is inserted because if a primary key will be in place beforehand,\
    \ MySQL (and MariaDB too) will check for the integrity of the `PRIMARY KEY` during\
    \ each `INSERT` operation. The same goes for indexes. On the same note, if multiple\
    \ types of indexes are in place within your tables, first ask yourself whether\
    \ you even need many types of indexes to be present – do you need that B-Tree\
    \ and `FULLTEXT` index to be mashed together? What kind of use case do these indexes\
    \ assist? What kind of full-text search operations are necessary, if at all?\n\
    \n`LOAD DATA INFILE` also has consequences, and you’re welcome to familiarize\
    \ yourself with them by searching for “`LOAD DATA INFILE` slow” through StackOverflow.\
    \ Let me explore one of such use cases with you, and you’ll quickly understand\
    \ what I want to tell you – I’ll call the user who asked the question person A,\
    \ and the one who answered – person B. The problem was as follows:\n\n1.  Person\
    \ A started a thread on StackOverflow saying that he was loading a file of approximately\
    \ 100GB in size into a table inside of one of his databases using `LOAD DATA INFILE`.\n\
    2.  Person A continued that “<…> I’m trying it now using InnoDB <…> The load starts\
    \ fast at around 10MB/sec <…> after some GB of data is inserted, it slows down\
    \ to the 2–3MB/sec range <…>”.\n3.  Person A also stated that the size of his\
    \ InnoDB buffer pool is around 8GB and that he’s running a couple of queries before\
    \ running `LOAD DATA INFILE` – these queries being the following:\n\n    ```\n\
    \    SET @@session.sql_log_bin=0;\n    SET autocommit=0;\n    SET unique_checks=0;\n\
    \    SET foreign_key_checks=0;\n    ALTER TABLE 'tbl_name' DISABLE KEYS;\n   \
    \ ```\n4.  Person A also said that it seems to him that InnoDB doesn’t support\
    \ loading bigger data sets that are over a few GB in size into tables.\n\nThe\
    \ problem here is pretty clear – `LOAD DATA INFILE` starts quickly but slows down\
    \ after a while even though options that would supposedly help the database are\
    \ in place. Why? Let’s explore the accepted answer by person B. It was stated\
    \ that\n\n1.  `DISABLE KEYS` wouldn’t work with InnoDB because such a statement\
    \ shuts down updates to secondary indexes on MyISAM, but since the system tablespace\
    \ in InnoDB includes a structure to deal with secondary indexes, InnoDB doesn’t\
    \ deal with indexes in the same way as MyISAM does, so such an option is not necessary.\n\
    2.  Setting `autocommit` to off piles up data in `ibdata1`, so user A should consider\
    \ keeping it turned on.\n3.  User B stated that the MVCC and ACID features exclusive\
    \ to InnoDB often make the storage engine act as a bottleneck when inserting bigger\
    \ data sets into it and that setting the `ROW_FORMAT` to a value of `Fixed` would\
    \ further speed up `INSERT` queries on MyISAM tables at the expense of making\
    \ the table significantly larger to deal with.\n4.  Other users chimed in to support\
    \ what the user B said saying that MyISAM as a storage engine is simple, but in\
    \ this case, so are the requirements of the user A, and because of that, everything\
    \ should be fine. If the user is facing any further problems, he might need to\
    \ split the files into separate parts. If the user is running a powerful server,\
    \ he should also consider optimizing the server for both MyISAM and InnoDB as\
    \ necessary, but to do that, he would need to modify both mechanisms.\n\nMost\
    \ of this advice is OK, but some of it is outdated by now – first off, never use\
    \ MyISAM in a production environment if your use case doesn’t warrant `COUNT(*)`\
    \ queries. As I’ve already told you in the chapter about storage engines, as MySQL\
    \ advanced, most of the features originally available within the MyISAM storage\
    \ engine became obsolete and are now available in InnoDB. When `LOAD DATA INFILE`\
    \ is in use, you can keep `autocommit` functions at default, but the advice relevant\
    \ to `DISABLE KEYS` still stands. For most of you, things won’t be so complex\
    \ and you don’t need to overthink things – just optimize your database, and when\
    \ recovering big data sets make use of `LOAD DATA INFILE` that makes use of the\
    \ optimized parameters (examples of `LOAD DATA INFILE` in use can be found throughout\
    \ this chapter). Make sure that indexes and any applicable keys are loaded into\
    \ the database after the data has been inserted, too, and you should be good to\
    \ go.\n\n## Summary\n\nBacking up your data is a necessity – there’s no doubt\
    \ about that. Just as your data needs to be backed up, though, it has to be recovered\
    \ properly, and I sincerely hope that the advice in this chapter has helped you\
    \ refine both your data backup and recovery procedures to meet your goals as necessary.\n\
    \nNo matter how you elect to backup or restore your data, always keep in mind\
    \ that backups do have a friend – his name is replication. Database replicas aren’t\
    \ backups and they aren’t a replacement for backups, but rather, they are a way\
    \ to ensure that what’s happening on one database server is quickly replicated\
    \ on the other. Let’s get into them now.\n\n# 14. Optimizing Replication\n\nLike\
    \ backups, replication is top of mind for many DBAs across the globe. Properly\
    \ built replication architectures ensure increased data availability, thus making\
    \ it a fundamental strategy for database architectures as well as disaster recovery.\
    \ However, as fundamental as replication may seem, one should consider both the\
    \ benefits and drawbacks of such an appliance.\n\n## Understanding Replication\n\
    \nAt a high level, replication in database management systems is quite easy to\
    \ understand: replication helps copy data over to another server (of which there\
    \ can be more than one) and keep data across those servers in sync, and by doing\
    \ so, helps improve database availability and reliability. In the MySQL world,\
    \ replication comes in a couple of flavors: we can have synchronous, semi-synchronous,\
    \ or asynchronous replication as well as statement-based, row-based, or mixed-mode\
    \ replication, too. MariaDB only supports asynchronous and semi-synchronous replication\
    \ and comes with a Galera Cluster appliance.\n\nSynchronous replication makes\
    \ sure that changes are received and applied before committing them while asynchronous\
    \ replication commits the transaction at the instant it’s received without waiting\
    \ for the reply from replica servers. Semi-synchronous replication aims to provide\
    \ a compromise between the two by ensuring that one or more of the replica servers\
    \ have confirmed the changes to data. When it comes to replication formats available\
    \ in MySQL and MariaDB, there is statement-based replication that replicates `INSERT`,\
    \ `UPDATE`, and `DELETE` statements on another server and row-based replication\
    \ that replicates the changes to rows, hence the name. Row-based replication is\
    \ said to be more precise; it offers more compatibility in comparison to statement-based\
    \ replication and is the default replication mode in MySQL and MariaDB. Mixed-mode\
    \ replication offers the best of both worlds where the server chooses the best\
    \ way to replicate data based on a specific scenario.\n\nSome of you may undoubtedly\
    \ be familiar with replication and some of its upsides, but nonetheless, I feel\
    \ the need to introduce you to some of the terms surrounding replication:"
