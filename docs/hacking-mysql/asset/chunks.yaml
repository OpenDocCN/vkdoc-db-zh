    # 备份压缩与加密


    谈到加密，一切也很简单：许多使用 GZip 的人会选择用 OpenSSL 加密他们的备份。操作方式看起来与上一个示例几乎一模一样，只是加入了 OpenSSL
    和 AES-256 的相关选项——别忘了在 `-k` 参数后指定你用来加密备份的密码（`.enc` 扩展名表明备份是加密过的）：


    ```

    mariabackup --user=[username] --backup --stream=xbstream | gzip | openssl enc
    –aes-256-cbc –k [encryptionpw] > [backupnamehere].gz.enc

    ```


    要解密同一个备份，请使用带 `-d`（解密）选项的 GZip，如下所示，并确保在 `-in` 参数后将备份文件指定为输入：


    ```

    openssl enc -d -aes-256-cbc -k [encryptionpw] -in [backupnamehere].gz.enc |gzip
    -d| mbstream –x

    ```


    要加密使用 7Zip 创建的备份，请在调用 `7z` 后通过命令行界面（CLI）添加 `-p` 选项，并指定加密备份所需的密码——7Zip 应该内置了 AES-256
    加密模式。


    要压缩和保护逻辑备份，你也可以使用 `mariadb-dump` 或 `mysqldump`，并将其输出通过管道传输到 GZip 或 7Zip 等压缩工具。`mysqldump`
    的用户应该已经熟悉这种选项：


    ```

    mysqldump -u[username] [databasename] | gzip > backup.sql.gz

    ```


    `mariadb-dump` 的操作方式完全相同，只是注意它不支持 7Zip 选项，因此如果你在压缩逻辑备份，就只能使用 `gzip/gunzip`。


    备份压缩和安全并非高不可攀的学问，只要付出一些努力并掌握相关知识，你的备份就能占用更少的磁盘空间，同时也能以加密方式存储。很酷，对吧？


    ## 备份大数据集


    要备份更大的数据集（假设“大数据”指任何达到一亿行量级的数据），你又需要回归基础，理解一个道理：备份如果附带的开销尽可能小，速度就会快，而且你无论如何都得等待备份完成（毕竟，你正在复制更大的数据集，不是吗？）。


    适用于 `mariabackup` 和 `mariadb-dump` 等工具的建议依然有效：*所有内容依然适用*，但在备份更大的数据集时，请记住细节决定成败。对于那些使用
    `mariadb-dump` 备份大数据集的人，我建议：


    1.  在调用 `mariadb-dump` 时，通过选项指定你需要备份哪种数据库和/或其中的哪些表，以避免备份所有内容。

    2.  调整 `--max-allowed-packet` 选项，以设置应发送/接收的最大数据包长度（最大值为 1GB）。

    3.  使用 `--no-autocommit` 选项包裹 `INSERT` 语句，为批量插入操作关闭自动提交。

    4.  在必要时研究 `--add-drop-database` 或 `--add-drop-table` 选项。这不是一个提升性能的选项，但这样你就不必手动删除数据库/表，备份会为你重建它们。

    5.  逐行备份数据，而不是在备份前缓冲数据，以节省内存（你确实有很多数据，对吧？）——为此，请使用 `--opt` 或 `--quick`。

    6.  避免在 `INSERT` 语句中使用 `-c` 或 `--complete-insert` 选项，以跳过指定列名——如果你的表中有很多列，并且你的用例需要逻辑备份，跳过列名应该能显著减小备份文件的大小。

    7.  如有必要，使用 `--default-character-set` 设置默认字符集。MariaDB 设置的默认字符集是 `utf8mb4`，但如果你需要存储其他语言的字符而调整字符集，`--default-character-set`
    就是解决之道。或者，使用 `set-charset` 选项将 `SET NAMES default_character_set` 添加到备份中。

    8.  如果表上有索引，可以尝试使用 `-K` 或 `--disable-keys` 选项。此选项将在所有行插入后，再为表添加必要的键（索引）。

    9.  利用 `--fields-terminated-by` 或 `--fields-escaped-by` 选项。使用它们，备份中的字段将由你选择的字符串进行分隔或转义。

    10. 研究一下 `-f` 或 `--force` 选项。这个选项可以让备份即使遇到错误也继续运行——对于各种用例都非常有用！


    再次强调——这并非什么革命性的创新，只是一些你可以使用的默认选项。我不保证你的备份会瞬间完成——它们几乎肯定不会——但好事多磨，对吧？


    然而，如果你不想/不需要使用 `mariabackup` 或 `mariadb-dump`，你还有另一个我已经多次提到的选项——你可以使用 `SELECT
    ... FROM ... INTO OUTFILE` / `LOAD DATA INFILE`——类似这样的命令会起作用：


    ```

    SELECT * FROM ''table_name'' INTO OUTFILE ''/tmp/table_backup.txt'' FIELDS TERMINATED
    BY ''|'' [other options...];

    ```


    这种方法的问题在于，如果你有很多表（你几乎肯定有），一直手动运行相同的查询就变得不可行了。为了至少自动化部分工作，你可以利用内置的计划任务，像这样：


    ```

    CREATE EVENT event_daily ON SCHEDULE EVERY 1 DAY

    STARTS CURRENT_DATE [+ INTERVAL X DAY + INTERVAL Y MINUTE]

    DO

    此处放置查询...

    ```


    这样的事件将从你指定的日期开始每天运行（例如，如果你指定 `INTERVAL 1 DAY + INTERVAL 1 MINUTE`，事件将在明天 00:01
    开始），并且会运行 `DO` 规范之后的任何查询，这意味着如果你提供像 `UPDATE ''customers'' SET ''days_retained''
    = ''days_retained'' + 1` 这样的查询，它就会更新 `customer` 表的 `days_retained` 列，并将客户的留存期增加
    1 天。使用 `SELECT * INTO OUTFILE` 进行备份也是同样的道理——像这样指定一个事件：


    ```

    CREATE EVENT event_daily ON SCHEDULE EVERY 1 DAY

    STARTS CURRENT_DATE + INTERVAL 1 DAY

    DO

    SELECT * FROM `your_table` INTO OUTFILE ''/tmp/your_table_backup.txt'' FIELDS
    TERMINATED BY ''|'';

    ```


    然后，MariaDB 将每天为你提供一个名为 `your_table_backup.txt` 的备份文件，其中包含 `your_table` 中的所有内容，字段以
    `|` 字符分隔。当然，这种方法的问题是，你将需要创建另一个脚本，每天将文件从 `/tmp/` 目录移动到其他地方，因为同名的两个文件无法共存，但以这种方式备份也是可行的。如果你懒得为将文件移出
    `/tmp/` 目录编写脚本/解决方案，你可以给文件取一个与当前日期相关的名字，但这准备起来会稍微复杂一些。尽管如此，当我们使用这样的查询时，它仍然是可能的：


    ```

    SET @backup_prepare = CONCAT("SELECT * FROM `your_table` INTO OUTFILE ''C:/wamp64/tmp/backups/",
    DATE_FORMAT(NOW(), ''%d%m%Y''), ".csv''");

    PREPARE x FROM @backup_prepare;

    EXECUTE x;

    DROP PREPARE x;

    ```


    完成之后，我们的备份文件将位于 tmp 目录内的 backups 目录中。


    并非每个人都会使用 `SELECT ... INTO OUTFILE`，它也不是适合所有用例，但由于这个语句允许我们备份原始数据，对于处理大数据集的人来说，它是一个非常好的选择。

