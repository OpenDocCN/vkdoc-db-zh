- fmt: 'Having a B-Tree index on a column doesn’t mean that MySQL will use it though:
    MySQL will use indexes according to rules and only if our queries adhere to certain
    standards, but in general, MySQL will consider using B-Tree indexes for queries
    that are searching for exact matches of data. Such queries include comparison
    operators with the dominant equality sign (`=`) as well as queries utilizing the
    less than/more than signs. In other words, B-tree indexes can satisfy most of
    those `SELECT` queries:


    ```

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' = ''value'' ;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' ;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' > value ;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' =;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' >= value ;

    SELECT ... FROM `hacking_mysql` WHERE `column` => value ;

    ```


    Note how I didn’t say that B-Tree indexes can satisfy all of those queries because
    the last one wouldn’t be satisfied either way – MySQL would return a syntax error
    because of our use of the `=>` operator. As a workaround, you may consider using
    the “equal to or less” (`=<`) operator or the “equal to or more” operator (`=>`)
    to achieve the necessary objectives.


    Also, take note that not all of the compared values are strings and that all of
    the aforementioned queries have signs notifying you that they’re incomplete –
    that’s because you’re unlikely to see “simple” SQL queries in the wild, and every
    operation completed in addition to equality checks will provide some more strain
    for your indexes and database as a result.


    ## B-Tree Indexes and Performance


    Anyway, back to B-Tree indexes: the reason they speed `SELECT` queries up is because
    they provide a “key” for our database to faster access required data. They unlock
    doors and when combined with other things that improve the performance of read-based
    queries and proper database design, they can improve our query performance by
    tens, hundreds, or even thousands of times, and that’s because they exchange disk
    space for speed and if our queries are using them, we can avoid a table scan and
    use index scan or index seek operations instead: an *index scan* occurs when our
    database accesses index pages to help us access our data while an *index seek*
    refers to our database accessing selective rows. If you find yourself in the shoes
    of making `SELECT` queries faster, understanding this will be crucial.


    For advice on *how* to index for performance, turn to the chapter on indexing,
    but here’s some high-level advice to increase the performance of your `SELECT`
    queries. I’ll start from a list, then I’ll elaborate further down the line:


    *   Access as little data as possible: Switch `SELECT *` to `SELECT ''column''`
    if possible.


    *   Look into `JOIN` operations: The usage of `JOIN` operations would necessitate
    MySQL to filter data from the first table and the second table. That’s not to
    say that `JOIN` operations would automatically be slower than ordinary `SELECT`
    queries (timing queries is always a good idea), but I’ve heard of cases where
    tens of `SELECT` statements were optimized into a couple of `JOIN` queries and
    those `JOIN` queries had improved overall performance drastically.


    *   Be wary of condition-based filtering: When condition-based filtering is used
    (i.e., when your table has the `AND`, `BETWEEN`, and/or other clauses), additional
    strain on your `SELECT` query is applied. Look into the data you require your
    database to retrieve and examine the character sets and tables, then think: perhaps
    there is a way to split the query into multiple `SELECT` queries? If yes, would
    all `SELECT` queries be a necessity to complete your selected task? If no, is
    that `AND`/`BETWEEN`/`IN()` condition necessary?


    *   Be aware of the `BETWEEN ... AND` and the `IN` clauses: Many say that `BETWEEN`
    should outperform `IN` if your database is optimized for read operations, but
    again, take this advice with a grain of salt: performance would depend on whether
    an index can be used or is your database necessitating a full-table scan.


    *   Be aware of nuances with `NULL`: Many of the readers of this book will know
    that `NULL` necessitates certain functionality within partitions to work differently
    in that `NULL` values may be inserted into the lowest possible partition and that
    statement has truth in itself, but you should also keep in mind that MySQL may
    treat `IS NULL` no differently than other clauses in your database. Try running
    the `EXPLAIN` clause on a query that’s searching for `NULL` values within your
    database: it wouldn’t take long to notice that your database will likely optimize
    the query in the same way as it would optimize a `SELECT` query with an equality
    operator. Interesting, right?


    *   Index to help the `ORDER BY` clause: If your index contains all of the columns
    you’re ordering by in the order you’re ordering by (i.e., `INDEX(a,b)` will satisfy
    `ORDER BY` `a,b`), the database optimizer may avoid sorting thus making SQL queries
    faster.


    *   Make use of the `LIMIT` clause: The `LIMIT` clause is (unsurprisingly) used
    to limit the rows that are returned. For ordinary `SELECT`s where the `LIMIT`
    clause isn’t specified and the table is rather huge, MySQL would only return 25
    rows per page and allow you to flick to other pages. In this case, returning only
    one row (`LIMIT [any number],1`) will be significantly faster no matter how much
    data exists in a database, and you may also want to omit the `HAVING` clause from
    a query that has the `LIMIT` clause to see if it runs faster. If you find yourself
    using `LIMIT` together with `ORDER BY`, consider using an index on the ordered
    columns to speed up the query too.


    *   Use tricks to avoid full table scans: For `SELECT` queries, full table scans
    are rarely a great idea. Use `EXPLAIN` with the `ALL` clause and observe the `type`
    column to tell when MySQL decides to use a full table scan, and you can also take
    a look into `FORCE INDEX` to force MySQL to use an index instead of conducting
    full table scans.


    *   Be wary of the `DISTINCT` clause: If `DISTINCT` is used in conjunction with
    `ORDER BY`, your database may necessitate the usage of temporary tables. If you
    have a lot of data to search through and need to use the `DISTINCT` clause, perhaps
    it could be better to create a separate table containing distinct values, index
    a column or two, and use the table instead? Also, see the explanation below.


    For those of you who work with really big data sets, the `DISTINCT` clause may
    be the cause of even more issues; if you have hundreds of millions of records
    or even more, look into the `uniq` statement in Unix (the statement would also
    be available on a Windows architecture if Cygwin or a similar appliance would
    be installed).


    This command would be very useful to remove duplicates for those that take backups
    using `SELECT ... INTO OUTFILE` or work with raw data to begin with – then, you
    would improve the performance of your SQL queries “on three fronts”:


    1.  The size of your backups would be significantly smaller (`LOAD DATA INFILE/SELECT
    ... INTO OUTFILE` doesn’t contain any `INSERT` statements.)


    2.  Since there would be no `INSERT` statements and your database would deal with
    raw data, your database would deal with less overhead (raw data is always “lighter”).


    3.  Since `uniq` would read raw data, it would be able to deduct duplicates from
    files with billions of records within milliseconds.'
