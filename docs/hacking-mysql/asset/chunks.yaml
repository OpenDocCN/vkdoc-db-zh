  trans: '

    但是，拥有一个 B-树索引并不意味着 MySQL 就会使用它：MySQL 会根据规则使用索引，且仅当我们的查询符合某些标准时才会使用。不过，一般而言，MySQL
    会考虑对那些**精确匹配数据**的查询使用 B-树索引。这类查询包括以等号（`=`）为主的比较运算符查询，以及使用小于号/大于号的查询。换句话说，B-树索引可以满足大多数此类
    `SELECT` 查询：


    ```

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' = ''value'' ;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' ;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' > value ;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' =;

    SELECT ... FROM ''hacking_mysql'' WHERE ''column'' >= value ;

    SELECT ... FROM `hacking_mysql` WHERE `column` => value ;

    ```


    请注意，我并没有说 B-树索引可以满足*所有*这些查询，因为最后一条查询无论如何都不会被满足——由于我们使用了 `=>` 运算符，MySQL 会返回一个语法错误。作为一种变通方法，您可以考虑使用“小于等于”（`=<`）运算符或“大于等于”运算符（`=>`）来实现必要的目标。


    另外，请注意，并非所有被比较的值都是字符串，并且上述所有查询都带有表明它们不完整的符号——这是因为在现实中您不太可能看到“简单”的 SQL 查询，而除了相等性检查之外完成的每个操作都会给您的索引和数据库带来额外的压力。


    ## B-树索引与性能


    言归正传，回到 B-树索引：它们之所以能加速 `SELECT` 查询，是因为它们为我们的数据库提供了一把“钥匙”，可以更快地访问所需数据。它们打开大门，并且当与其他能提升基于读取的查询性能的因素以及合理的数据库设计相结合时，可以将我们的查询性能提升数十、数百甚至数千倍。这是因为它们用磁盘空间换取了速度；如果我们的查询使用了它们，我们就可以避免全表扫描，转而使用索引扫描或索引查找操作：*索引扫描*发生在我们的数据库访问索引页以帮助我们获取数据时，而*索引查找*指的是我们的数据库访问特定的行。如果您正致力于让
    `SELECT` 查询更快，理解这一点至关重要。


    关于*如何*为性能进行索引的建议，请参阅索引章节，但这里提供一些高层次的建议来提升您的 `SELECT` 查询性能。我将从一个列表开始，然后在下文中详细阐述：


    *   尽可能少访问数据：如果可能，将 `SELECT *` 改为 `SELECT ''column''`。


    *   研究 `JOIN` 操作：使用 `JOIN` 操作将迫使 MySQL 从第一张表和第二张表中过滤数据。这并不是说 `JOIN` 操作自动会比普通的
    `SELECT` 查询更慢（计时测试查询始终是个好主意），但我听说过一些案例，其中数十个 `SELECT` 语句被优化为几个 `JOIN` 查询，而这些 `JOIN`
    查询极大地提升了整体性能。


    *   警惕基于条件的过滤：当使用基于条件的过滤时（即您的表中有 `AND`、`BETWEEN` 和/或其他子句时），会给您的 `SELECT` 查询增加额外压力。审视您需要数据库检索的数据，检查字符集和表，然后思考：是否有办法将查询拆分为多个
    `SELECT` 查询？如果可以，所有这些 `SELECT` 查询对于完成您选定的任务都是必要的吗？如果不必要，那个 `AND`/`BETWEEN`/`IN()`
    条件是否必须？


    *   注意 `BETWEEN ... AND` 和 `IN` 子句：许多人认为，如果您的数据库针对读取操作进行了优化，`BETWEEN` 的性能应该优于
    `IN`，但同样，请对这个建议持保留态度：性能取决于是否能使用索引，或者您的数据库是否需要进行全表扫描。


    *   注意 `NULL` 的细微差别：本书的许多读者可能知道，在分区中，`NULL` 值需要特定的功能，因为 `NULL` 值可能会被插入到可能的最低分区中，这本身是事实，但您也应该记住，MySQL
    在处理 `IS NULL` 时可能与处理数据库中的其他子句并无不同。尝试对在数据库中搜索 `NULL` 值的查询运行 `EXPLAIN` 子句：您很快就会注意到，数据库优化该查询的方式很可能与优化带有相等运算符的
    `SELECT` 查询的方式相同。很有趣，对吧？


    *   为 `ORDER BY` 子句创建索引：如果您的索引包含您用于排序的所有列，并且顺序与排序顺序一致（即，`INDEX(a,b)` 将满足 `ORDER
    BY a,b`），那么数据库优化器可能会避免排序，从而使 SQL 查询更快。


    *   使用 `LIMIT` 子句：顾名思义，`LIMIT` 子句用于限制返回的行数。对于未指定 `LIMIT` 子句且表非常庞大的普通 `SELECT`
    查询，MySQL 每页只会返回 25 行，并允许您翻到其他页面。在这种情况下，只返回一行（`LIMIT [任何数字],1`）将会明显更快，无论数据库中有多少数据。您可能还想从带有
    `LIMIT` 子句的查询中省略 `HAVING` 子句，看看运行速度是否会更快。如果您发现将 `LIMIT` 与 `ORDER BY` 一起使用，请考虑也在排序列上使用索引来加速查询。


    *   使用技巧避免全表扫描：对于 `SELECT` 查询，全表扫描很少是个好主意。使用带有 `ALL` 子句的 `EXPLAIN` 并观察 `type`
    列，可以判断 MySQL 何时决定使用全表扫描。您也可以研究 `FORCE INDEX` 来强制 MySQL 使用索引，而不是进行全表扫描。


    *   警惕 `DISTINCT` 子句：如果 `DISTINCT` 与 `ORDER BY` 一起使用，您的数据库可能需要使用临时表。如果您需要搜索大量数据并需要使用
    `DISTINCT` 子句，也许创建一个包含唯一值的单独表、索引一两列并使用该表会更好？另外，请参见下面的解释。


    对于处理超大数据集的您来说，`DISTINCT` 子句可能会引发更多问题；如果您有数亿甚至更多的记录，请研究 Unix 中的 `uniq` 命令（如果安装了
    Cygwin 或类似工具，在 Windows 架构上也可用）。


    对于使用 `SELECT ... INTO OUTFILE` 进行备份或从处理原始数据开始的那些人来说，此命令在去除重复项方面将非常有用——然后，您将在“三个方面”提升
    SQL 查询的性能：


    1.  您的备份大小将显著减小（`LOAD DATA INFILE/SELECT ... INTO OUTFILE` 不包含任何 `INSERT` 语句）。


    2.  由于没有 `INSERT` 语句，并且您的数据库处理的是原始数据，它将减少开销（原始数据总是“更轻量级”）。


    3.  由于 `uniq` 读取原始数据，它可以在几毫秒内从包含数十亿条记录的文件中去除重复项。

    '
- fmt: "See how easy everything becomes? Of course, to properly optimize `SELECT`\
    \ queries, you would also need to dive deeper into indexes and partitions, but\
    \ that’s no problem either – this book has separate chapters on those, too. The\
    \ problem is related to your `UPDATE` and `DELETE` queries – don’t forget to optimize\
    \ those too.\n\n## Optimizing UPDATE Queries\n\nTo optimize `UPDATE` queries,\
    \ one needs to follow the advice provided by MySQL as well. The problem on this\
    \ front is that MySQL isn’t exactly clear on how to do that: the documentation\
    \ provides users with three paragraphs of information essentially saying “optimize\
    \ `UPDATE`s like you would optimize `SELECT`s with an overhead for `INSERT`s.”\
    \ Confusing, right?\n\nIt gets a little less confusing when you understand what\
    \ `UPDATE` queries do – they update the data in the tables within our database.\
    \ So, how do we make the updating process faster? First, let’s look into the internals\
    \ of a basic `UPDATE` query:\n\n```\nUPDATE 'demo_table' SET [column] = ['value']\
    \ WHERE [details] [LIMIT x];\n```\n\nHere:\n\n*   The column after `SET` defines\
    \ a specific column we need to update. If we need to update a singular column,\
    \ specifying the column here is enough. If we’re updating the values of multiple\
    \ columns, these need to be specified after we specify the first value of the\
    \ first column (before the `WHERE` clause.)\n*   The details after the `WHERE`\
    \ clause let us refine what data we need to update. We can specify that we only\
    \ want to update fields that have ID values higher than 500, etc.\n*   The `LIMIT`\
    \ clause lets us define how many rows we want to update. A `LIMIT 0,50` clause\
    \ would update the first 50 rows, `LIMIT 50,100` would update 50 rows starting\
    \ from the 50th row, etc. Essentially, the `LIMIT` clause lets us define an offset\
    \ we need to start the update and limit its reign, hence the title.\n\nNow, how\
    \ exactly to optimize `UPDATE` queries in our database? First, there are a couple\
    \ of tips we have to keep in mind:\n\n*   **Indexes will likely slow your queries\
    \ down**: That doesn’t mean “remove all indexes on all columns you’re updating\
    \ data in,” but rather, be wary of the internal functions of indexes and `UPDATE`\
    \ queries. In other words, be mindful of how `UPDATE` queries interact with indexes.\
    \ For example, if you’re working with a rather small number of rows, indexes aren’t\
    \ likely to be a very big deal, but if your data set is larger and as the `UPDATE`\
    \ query needs to update the data and the index itself, it will likely take a while\
    \ to complete. There are workarounds around this (I’ll let you in on a secret\
    \ in a second), but always be wary of such behavior before you optimize such types\
    \ of queries.\n*   **Partitioning will have nuances**: Partitions are likely to\
    \ slow down `UPDATE` queries too because if partition A holds integer values from\
    \ 0 to 1000 and partition B holds integer values from 1000 to 2000, and we update\
    \ a column to specify that its value would be 1700 like so:\n\n    `UPDATE 'demo_table'\
    \ SET 'int_partitioned_column' = 1700;`\n\n    if the previous value was lower\
    \ than 1000, our database will need to switch the values from partition A to partition\
    \ B. This will take some time as the partition will need to be updated together\
    \ with the data, and you would also need to keep in mind that the updated data\
    \ will now reside in a different partition than usual.\n*   **Keep locking in\
    \ mind**: If you see that your `UPDATE` queries are underperforming, one thing\
    \ you could try is locking the table, performing many updates one after the other,\
    \ and then unlocking it. Such an approach is likely to be faster than running\
    \ a single `UPDATE` at once and would look like so:\n\n    ```\n    LOCK TABLE\
    \ [READ|WRITE] `demo_table`;\n    UPDATE `demo_table` SET `column` = 'value' LIMIT\
    \ 0,10000;\n    UPDATE `demo_table` SET `column` = 'value' LIMIT 10000,20000;\n\
    \    UPDATE `demo_table` SET `column` = 'value' LIMIT 20000,30000;\n    ...\n\
    \    UNLOCK TABLE `demo_table`;\n    ```\n\n    Think of this approach as turning\
    \ `autocommit` to 0, inserting many rows, and then committing a transaction in\
    \ `INSERT` queries.\n\nFor those updating bigger sets of data (think millions,\
    \ billions of rows), things change; if you don’t find much luck in locking and\
    \ unlocking and need to update all rows in a column at once, keep in mind that\
    \ there’s also a neat workaround you can use to replace the `UPDATE` clause and\
    \ avoid the overhead that comes with inserting data into tables, too.\n\nSuppose\
    \ you have a table with millions of rows inside of it – I’m using 20,000 as an\
    \ example – and want to have one column with the same value, but have little space\
    \ on the disk (using `ALTER` to update data is likely to make a copy of the table\
    \ on the disk if the table is rather large.) Here’s how to approach the problem:\n\
    \n1.  Make a copy of the table using a method that doesn’t come with much overhead\
    \ when reimporting the data (back up raw data instead of `INSERT` statements using\
    \ `SELECT INTO OUTFILE` – I’ve talked about this before):\n\n    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Figa_HTML.jpg)\n\
    \n2.  Create a table identical to the table you’re working with by making use\
    \ of a `SHOW CREATE TABLE` statement or just running `CREATE TABLE another_table\
    \ LIKE present_table`, and before you insert data into that table, make sure that\
    \ the column that you need to update has a value that’s necessary by default (for\
    \ this example, I set this column to a value of “Good Value”).\n\n    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig9_HTML.jpg)\n\
    \n    Figure 9-9: Default value on a column\n\n3.  Create the table, and then\
    \ re-import the data without specifying the column that has the default value\
    \ (it will be populated by default) – you may also want to add an `IGNORE` clause\
    \ before the `INTO TABLE` statement to ignore any errors that might arise in connection\
    \ with this query.\n\n    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig10_HTML.jpg)\n\
    \n    Figure 9-10: Importing data into a table with a column with a default value\n\
    \n4.  Import the data, and then observe the value of the column you need to update\
    \ – it should be set to “Good Value” (or any other value you specify) by default\
    \ – now, there’s no need for an additional `UPDATE`.\n\n    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig11_HTML.jpg)\n\
    \n    Figure 9-11: A column with an updated value\n\nBe aware of the internals\
    \ of `ALTER` too – for some developers, it’s an issue of concern when they, “for\
    \ no reason,” run out of disk space when `ALTER` queries are being run. If you\
    \ update a Table X:\n\n1.  A copy of the Table X is made. Let’s call it Table\
    \ Y.\n2.  Data existing within Table X is copied into Table Y.\n3.  All of the\
    \ updates are performed within Table Y.\n4.  Table Y is switched with Table X\
    \ and destroyed.\n\nThat’s the reason your `ALTER`s may run out of disk space\
    \ – be wary of their internals.\n\nFor those of you still using MyISAM, remember\
    \ that MyISAM isn’t “connected” with any tablespace unlike InnoDB, and that means\
    \ you can make use of multiple “tactics” impossible to use in InnoDB. One of those\
    \ tactics has to do with moving MyISAM data to another server that has “better\
    \ gear”: more RAM, better processor, or other things and is optimized for MyISAM,\
    \ updating data there, and moving the data (the .MYD data file itself) back into\
    \ the original server – your data will be updated. Stupid? Perhaps. Working? Yes.\n\
    \n## Optimizing DELETE Queries\n\nWhen it comes to deleting data, it’s really\
    \ nothing revolutionary either – we use the `DELETE` query. Well, not in all cases\
    \ – one can delete all of the rows in a table by making use of the `TRUNCATE`\
    \ SQL query, and it will be significantly faster than `DELETE`s, but in many cases,\
    \ we’re deleting subsets of data and not wiping the entire table off the face\
    \ of the earth.\n\nTo optimize the deletion of data:\n\n1.  **Make use of the**\
    \ **`WHERE`** **and** **`LIMIT`** **clauses**: `WHERE` can be used to filter out\
    \ specific data we do/don’t want to delete, whereas `LIMIT` can help us limit\
    \ the number of rows that are deleted."
  raw: 'See how easy everything becomes? Of course, to properly optimize `SELECT`
    queries, you would also need to dive deeper into indexes and partitions, but that’s
    no problem either – this book has separate chapters on those, too. The problem
    is related to your `UPDATE` and `DELETE` queries – don’t forget to optimize those
    too.


    ### Optimizing UPDATE Queries


    To optimize `UPDATE` queries, one needs to follow the advice provided by MySQL
    as well. The problem on this front is that MySQL isn’t exactly clear on how to
    do that: the documentation provides users with three paragraphs of information
    essentially saying “optimize `UPDATE`s like you would optimize `SELECT`s with
    an overhead for `INSERT`s.” Confusing, right?


    It gets a little less confusing when you understand what `UPDATE` queries do –
    they update the data in the tables within our database. So, how do we make the
    updating process faster? First, let’s look into the internals of a basic `UPDATE`
    query:


    ```

    UPDATE ''demo_table'' SET [column] = [''value''] WHERE [details] [LIMIT x];

    ```


    Here:


    *   **The column after** **SET** **defines** **a specific column we need to update.**
    If we need to update a singular column, specifying the column here is enough.
    If we’re updating the values of multiple columns, these need to be specified after
    we specify the first value of the first column (before the `WHERE` clause.)


    *   **The details after the** **WHERE** **clause** **let us refine what data we
    need to update.** We can specify that we only want to update fields that have
    ID values higher than 500, etc.


    *   **The** `LIMIT` **clause** **lets us define how many rows we want to update.**
    A `LIMIT 0,50` clause would update the first 50 rows, `LIMIT 50,100` would update
    50 rows starting from the 50th row, etc. Essentially, the `LIMIT` clause lets
    us define an offset we need to start the update and limit its reign, hence the
    title.


    Now, how exactly to optimize `UPDATE` queries in our database? First, there are
    a couple of tips we have to keep in mind:


    *   **Indexes** **will likely slow your queries down**: That doesn’t mean “remove
    all indexes on all columns you’re updating data in,” but rather, be wary of the
    internal functions of indexes and `UPDATE` queries. In other words, be mindful
    of how `UPDATE` queries interact with indexes. For example, if you’re working
    with a rather small number of rows, indexes aren’t likely to be a very big deal,
    but if your data set is larger and as the `UPDATE` query needs to update the data
    and the index itself, it will likely take a while to complete. There are workarounds
    around this (I’ll let you in on a secret in a second), but always be wary of such
    behavior before you optimize such types of queries.


    *   **Partitioning will have nuances**: Partitions are likely to slow down `UPDATE`
    queries too because if partition A holds integer values from 0 to 1000 and partition
    B holds integer values from 1000 to 2000, and we update a column to specify that
    its value would be 1700 like so:


    `UPDATE ''demo_table'' SET ''int_partitioned_column'' = 1700;`


    if the previous value was lower than 1000, our database will need to switch the
    values from partition A to partition B. This will take some time as the partition
    will need to be updated together with the data, and you would also need to keep
    in mind that the updated data will now reside in a different partition than usual.


    *   **Keep** **locking in mind**: If you see that your `UPDATE` queries are underperforming,
    one thing you could try is locking the table, performing many updates one after
    the other, and then unlocking it. Such an approach is likely to be faster than
    running a single `UPDATE` at once and would look like so:


    ```

    LOCK TABLE [READ|WRITE] `demo_table`;

    UPDATE `demo_table` SET `column` = ''value'' LIMIT 0,10000;

    UPDATE `demo_table` SET `column` = ''value'' LIMIT 10000,20000;

    UPDATE `demo_table` SET `column` = ''value'' LIMIT 20000,30000;

    ...

    UNLOCK TABLE `demo_table`;

    ```


    Think of this approach as turning `autocommit` to 0, inserting many rows, and
    then committing a transaction in `INSERT` queries.


    For those updating bigger sets of data (think millions, billions of rows), things
    change; if you don’t find much luck in locking and unlocking and need to update
    all rows in a column at once, keep in mind that there’s also a neat workaround
    you can use to replace the `UPDATE` clause and avoid the overhead that comes with
    inserting data into tables, too.


    Suppose you have a table with millions of rows inside of it – I’m using 20,000
    as an example – and want to have one column with the same value, but have little
    space on the disk (using `ALTER` to update data is likely to make a copy of the
    table on the disk if the table is rather large.) Here’s how to approach the problem:


    1.  Make a copy of the table using a method that doesn’t come with much overhead
    when reimporting the data (back up raw data instead of `INSERT` statements using
    `SELECT INTO OUTFILE` – I’ve talked about this before):


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Figa_HTML.jpg)


    1.  Create a table identical to the table you’re working with by making use of
    a `SHOW CREATE TABLE` statement or just running `` CREATE TABLE `another_table`
    LIKE `present_table` ``, and before you insert data into that table, make sure
    that the column that you need to update has a value that’s necessary by default
    (for this example, I set this column to a value of “Good Value”).


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Default value on a column


    1.  Create the table, and then re-import the data without specifying the column
    that has the default value (it will be populated by default) – you may also want
    to add an `IGNORE` clause before the `INTO TABLE` statement to ignore any errors
    that might arise in connection with this query.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Importing data into a table with a column with a default value


    1.  Import the data, and then observe the value of the column you need to update
    – it should be set to “Good Value” (or any other value you specify) by default
    – now, there’s no need for an additional `UPDATE`.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    A column with an updated value


    Be aware of the internals of `ALTER` too – for some developers, it’s an issue
    of concern when they, “for no reason,” run out of disk space when `ALTER` queries
    are being run. If you update a Table X:


    1.  A copy of the Table X is made. Let’s call it Table Y.


    2.  Data existing within Table X is copied into Table Y.


    3.  All of the updates are performed within Table Y.


    4.  Table Y is switched with Table X and destroyed.


    That’s the reason your `ALTER`s may run out of disk space – be wary of their internals.


    For those of you still using MyISAM, remember that MyISAM isn’t “connected” with
    any tablespace unlike InnoDB, and that means you can make use of multiple “tactics”
    impossible to use in InnoDB. One of those tactics has to do with moving MyISAM
    data to another server that has “better gear”: more RAM, better processor, or
    other things and is optimized for MyISAM, updating data there, and moving the
    data (the .MYD data file itself) back into the original server – your data will
    be updated. Stupid? Perhaps. Working? Yes.


    ### Optimizing DELETE Queries


    When it comes to deleting data, it’s really nothing revolutionary either – we
    use the `DELETE` query. Well, not in all cases – one can delete all of the rows
    in a table by making use of the `TRUNCATE` SQL query, and it will be significantly
    faster than `DELETE`s, but in many cases, we’re deleting subsets of data and not
    wiping the entire table off the face of the earth.


    To optimize the deletion of data:


    1.  **Make use of the** **WHERE** **and** **LIMIT** **clauses**: `WHERE` can be
    used to filter out specific data we do/don’t want to delete, whereas `LIMIT` can
    help us limit the number of rows that are deleted.'
  trans: "\n看到一切变得多么简单了吗？当然，要恰当地优化`SELECT`查询，你还需要更深入地研究索引和分区，但这也不成问题——本书也有关于这些内容的独立章节。问题与你的`UPDATE`和`DELETE`查询相关——别忘了也要优化它们。\n\
    \n## 优化 UPDATE 查询\n\n要优化`UPDATE`查询，也需要遵循 MySQL 提供的建议。这方面的问题在于，MySQL 对此说得并不十分清楚：其文档为用户提供了三段信息，本质上是在说“像优化带`INSERT`开销的`SELECT`那样来优化`UPDATE`”。令人困惑，对吧？\n\
    \n当你理解了`UPDATE`查询的作用后，情况会变得稍微清晰一些——它们更新我们数据库中表内的数据。那么，我们如何使更新过程更快呢？首先，让我们探究一个基本`UPDATE`查询的内部机制：\n\
    \n```\nUPDATE 'demo_table' SET [column] = ['value'] WHERE [details] [LIMIT x];\n\
    ```\n\n这里：\n\n*   `SET`之后的列定义了我们需要更新的特定列。如果我们只需要更新一列，在此指定该列就足够了。如果我们要更新多个列的值，在指定第一个列的值之后（在`WHERE`子句之前），需要指定这些列。\n\
    *   `WHERE`子句之后的细节让我们可以细化需要更新的数据。我们可以指定只想更新 ID 值大于 500 的字段，等等。\n*   `LIMIT`子句让我们定义想要更新的行数。`LIMIT\
    \ 0,50`子句将更新前 50 行，`LIMIT 50,100`将更新从第 50 行开始的 50 行，等等。本质上，`LIMIT`子句让我们定义更新开始的偏移量并限制其范围，因此得名。\n\
    \n那么，究竟该如何优化我们数据库中的`UPDATE`查询呢？首先，有几点建议我们必须牢记：\n\n*   **索引很可能会拖慢你的查询速度**：这并不意味着“删除你要更新数据所在的所有列上的所有索引”，而是要警惕索引和`UPDATE`查询的内部工作机制。换句话说，要注意`UPDATE`查询如何与索引交互。例如，如果你处理的行数相当少，索引可能不是什么大问题，但如果你的数据集较大，并且`UPDATE`查询需要同时更新数据和索引本身，那么它可能需要花费一段时间才能完成。有变通方法（我马上告诉你一个秘密），但在优化这类查询之前，要始终警惕这种行为。\n\
    *   **分区会带来一些细微差别**：分区也可能拖慢`UPDATE`查询，因为如果分区 A 包含从 0 到 1000 的整数值，分区 B 包含从 1000\
    \ 到 2000 的整数值，并且我们更新一个列来指定其值为 1700，像这样：\n\n    `UPDATE 'demo_table' SET 'int_partitioned_column'\
    \ = 1700;`\n\n    如果之前的值低于 1000，我们的数据库将需要把值从分区 A 切换到分区 B。这将花费一些时间，因为分区需要连同数据一起更新，而且你还需要记住，更新后的数据现在将驻留在与平常不同的分区中。\n\
    *   **注意锁机制**：如果你发现`UPDATE`查询性能不佳，可以尝试的一种方法是锁定表，连续执行多个更新操作，然后解锁。这种方法可能比一次性运行单个`UPDATE`更快，看起来像这样：\n\
    \n    ```\n    LOCK TABLE [READ|WRITE] `demo_table`;\n    UPDATE `demo_table`\
    \ SET `column` = 'value' LIMIT 0,10000;\n    UPDATE `demo_table` SET `column`\
    \ = 'value' LIMIT 10000,20000;\n    UPDATE `demo_table` SET `column` = 'value'\
    \ LIMIT 20000,30000;\n    ...\n    UNLOCK TABLE `demo_table`;\n    ```\n\n   \
    \ 可以把这种方法想象成在`INSERT`查询中将`autocommit`设为 0，插入多行数据，然后再提交事务。\n\n对于那些需要更新更大数据集（比如数百万、数十亿行）的情况，情况会有所不同；如果你在锁定和解锁上运气不佳，并且需要一次性更新某列的所有行，请记住还有一个巧妙的变通方法可以替代`UPDATE`子句，同时避免向表中插入数据带来的开销。\n\
    \n假设你有一个包含数百万行的表——我以 20,000 行为例——并且希望让某一列具有相同的值，但磁盘空间有限（如果表相当大，使用`ALTER`更新数据可能会在磁盘上创建该表的副本）。以下是解决该问题的方法：\n\
    \n1.  使用一种在重新导入数据时开销不大的方法制作表的副本（使用`SELECT INTO OUTFILE`备份原始数据而不是`INSERT`语句——我之前提到过这个）：\n\
    \n    ![](img/625040_1_En_9_Figa_HTML.jpg)\n\n2.  利用`SHOW CREATE TABLE`语句或直接运行`CREATE\
    \ TABLE another_table LIKE present_table`，创建一个与你正在处理的表相同的表，并在向该表插入数据之前，确保你需要更新的列具有默认所需的值（在此示例中，我将此列设置为“Good\
    \ Value”）。\n\n    ![](img/625040_1_En_9_Fig9_HTML.jpg)\n\n    图 9-9：列上的默认值\n\n\
    3.  创建表，然后在不指定具有默认值的列的情况下重新导入数据（它将被默认填充）——你可能还想在`INTO TABLE`语句之前添加一个`IGNORE`子句，以忽略与此查询可能相关的任何错误。\n\
    \n    ![](img/625040_1_En_9_Fig10_HTML.jpg)\n\n    图 9-10：将数据导入具有默认值列的表\n\n4.\
    \  导入数据，然后观察你需要更新的列的值——它应该被默认设置为“Good Value”（或你指定的任何其他值）——现在，就不需要额外的`UPDATE`操作了。\n\
    \n    ![](img/625040_1_En_9_Fig11_HTML.jpg)\n\n    图 9-11：已更新值的列\n\n也要注意`ALTER`的内部机制——对一些开发者来说，当他们运行`ALTER`查询时，“无缘无故”耗尽磁盘空间是个令人担忧的问题。如果你更新表\
    \ X：\n\n1.  制作表 X 的一个副本。我们称之为表 Y。\n2.  表 X 中存在的数据被复制到表 Y 中。\n3.  所有的更新都在表 Y 中执行。\n\
    4.  表 Y 与表 X 交换并被销毁。\n\n这就是你的`ALTER`操作可能耗尽磁盘空间的原因——要警惕其内部机制。\n\n对于那些仍在使用 MyISAM\
    \ 的人，请记住 MyISAM 不像 InnoDB 那样“连接”到任何表空间，这意味着你可以利用在 InnoDB 中不可能使用的多种“策略”。其中一种策略涉及将\
    \ MyISAM 数据移动到拥有“更好装备”（更多 RAM、更好的处理器或其他方面）并针对 MyISAM 优化的另一台服务器上，在那里更新数据，然后将数据（.MYD\
    \ 数据文件本身）移回原始服务器——你的数据将被更新。愚蠢？也许吧。有效？是的。\n\n## 优化 DELETE 查询\n\n说到删除数据，这确实也没什么革命性的——我们使用`DELETE`查询。嗯，并非在所有情况下——可以使用`TRUNCATE`\
    \ SQL 查询删除表中的所有行，这将比`DELETE`快得多，但在许多情况下，我们删除的是数据的子集，而不是将整个表从地球上抹去。\n\n要优化数据删除：\n\
    \n1.  **使用** **`WHERE`** **和** **`LIMIT`** **子句**：`WHERE`可用于过滤掉我们不想删除的特定数据，而`LIMIT`可以帮助我们限制删除的行数。\n"
- fmt: "2.  **Be mindful** **of the impacts of indexes and partitions**: Again, be\
    \ wary that indexes and partitions will slow down the data deletion process for\
    \ the same reasons they slow down updates.\n\n3.  **Be mindful of storage engines**:\
    \ Remember `MyISAM` not being related to a tablespace? That means that one can\
    \ delete the `.MYD` in the directory of a database to delete a table, delete the\
    \ `.MYI` file to delete an index on a table, etc.\n\n4.  **Wipe fractions of data\
    \ if necessary**: If you have a lot of data, consider creating a new table with\
    \ the `AS` clause to avoid the `DELETE` clause altogether, then drop the old table.\
    \ For example:\n    ```\n    CREATE TABLE x AS SELECT a,b FROM table_y;\n    ```\n\
    \    would make the table X only consist of two columns – a and b – from the table\
    \ Y. No other data.\n\nAgain, `DELETE`s are nothing revolutionary – make sure\
    \ to explicitly tell your database what data you’re deleting and on what terms\
    \ (use the available `WHERE` and `LIMIT` clauses), and you should be good to go.\n\
    \n## Optimizing Queries for Big Data, Avoiding Deadlocks, and Other Query Optimization\
    \ Tips\n\nWhen it comes to bigger data sets, remember how you’ve optimized your\
    \ database to deal with big data: what did you do? You’ve most likely increased\
    \ the size of the InnoDB buffer pool and the InnoDB log files to adhere to the\
    \ amounts of data you’re storing in a database, right? Did you make any other\
    \ changes? What parameters/parts of your database were impacted by those changes?\n\
    \nYou didn’t optimize your database for no reason – make use of those changes!\
    \ To work with queries involving bigger data sets, make use of the query optimization\
    \ advice provided above, and always remember to approach everything in small steps:\
    \ only select data that’s necessary for you to use, insert bigger data sets while\
    \ avoiding overhead posed by `INSERT` queries (use `LOAD DATA INFILE` instead),\
    \ update data in chunks, and delete data making use of the `WHERE` and `LIMIT`\
    \ clauses and other advice.\n\nNo matter what kind of advice you elect to follow,\
    \ if you want to become a seasoned DBA, you will need to trek through hot and\
    \ cold. Sometimes your database will hit you with something that looks completely\
    \ out of the ordinary like a deadlock or two: what then? Deadlock situations occur\
    \ when our database is completing different transactions, but none of them can\
    \ proceed because each of them is holding resources that are necessary for the\
    \ other transaction to complete. Transaction A is unable to proceed because it’s\
    \ waiting for transaction B, and transaction B is unable to proceed because it’s\
    \ waiting for transaction A. Deadlocks are essentially locks “with no way out.”\n\
