    ## Server Components and Their Interaction with MySQL


    After you have a good grasp of the errors you may encounter, you should familiarize
    yourself with your server components and how they interact with your database.
    You already know your way around my.cnf; however, my.cnf is only as effective
    as your server is; your disk, RAM, CPU, and everything else involving your server
    can slow your queries down as well.


    Here’s what the entire MySQL infrastructure looks like:


    ![](images/625040_1_En_6_Chapter/625040_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    MySQL infrastructure


    As you can see, almost everything is backed by your server – the data, indexes,
    and logs are stored in the `/var/lib/mysql/[data]` directory. Depending on what
    storage engine you use, you will likely see some .ibd files in the data directory
    depicting the data of the table and the metadata too.


    The rest of the settings (the parser and the optimizer, global and engine-specific
    caches and buffers, etc.) are directly dependent on your server settings, too:
    if you’re using InnoDB, your data and indexes will most likely be separated from
    the main tablespace (ibdata1), and ibdata1 will only consist of metadata – with
    it, you will also see files ib_logfile0 and ib_logfile1 that would be used to
    restore data in MySQL after a crash.


    To choose a server for MySQL, consider:


    *   **The** **processor****:** Keep an eye on modern CPUs from Intel or AMD and
    choose a CPU based on parameters of importance to you – look into clock speed,
    cache size, and other things.


    *   **The amount of operating memory:** How much memory does your use case necessitate?
    When choosing a server from any hosting provider, don’t forget to check on how
    much operating memory will be available for you to “play with.”


    *   **The operating system:** Keep in mind that the things you can optimize and
    change will slightly differ depending on the operating system that your server
    is running. With that being said, most of the differences are minor.


    *   **Hard drives:** Your hard drive has a direct impact on performance: it impacts
    how quickly your operating system starts, it impacts the speed of SQL queries,
    and it also dictates how much data your database can store. Many things are at
    play here – the good news is that storage space is cheap, and it’s nothing you
    should over-obsess about: keep yourself educated on basic concepts and make a
    reasonable decision looking into the future.


    *   **How much bandwidth do you have?** For some of you, bandwidth would also
    be of concern – consult your hosting provider before making a choice, and keep
    in mind that CDNs can help your server save bandwidth where necessary.


    It will also help if your server can be scaled automatically – if you are reaching
    the bounds of free hard drive space, just drop another hard drive into the mix!


    I’d also like to stress the need to test your InnoDB flush method – just because
    your neighborhood DBA uses the `O_DIRECT` option for his project, doesn’t mean
    that you should use the same option as well: `O_DIRECT` will open the data files
    with `O_DIRECT` and use `fsync()` to flush data and logs. To skip the option,
    you can use `O_DIRECT_NO_FSYNC`, and to use the `O_DSYNC` option to open and flush
    the log files and `fsync()` to flush the data files. Want to use the `fsync` system
    call for everything involving flushing? Set the flush method to `fsync`. Changing
    the flush method will change how MySQL performs flushing operations, and as such,
    you will able to observe how your database acts when different levels of flushing
    are involved.


    Able to put your database through varying levels of load? Even better! For that
    purpose, use `mysqlslap`. We will run three iterations of the MySQL stress testing
    tool:


    1.  `mysqlslap --user=root --host=localhost --auto-generate-sql --verbose`


    2.  `mysqlslap --user=root --host=localhost --concurrency=100 --iterations=10
    --auto-generate-sql --verbose`


    3.  `mysqlslap --user=root --host=localhost --concurrency=50 --iterations=100
    --number-int-cols=5 --number-char-cols=20 --auto-generate-sql –-verbose`


    The first stress-test iteration ran an auto-generated SQL code in a verbose output
    mode. The second one was a little more complex with 100 concurrent connections
    and 10 iterations for the SQL query. Finally, the third one utilized 50 concurrent
    connections with 100 iterations with 5 numeric columns and 20 character-based
    columns. The results?


    ![](images/625040_1_En_6_Chapter/625040_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Results of mysqlslap'
