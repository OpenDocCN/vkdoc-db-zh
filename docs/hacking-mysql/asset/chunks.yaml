- fmt: '### 索引基础与初步设计


    首先，必须遵守所有全文搜索规则：全文索引对搜索的最小字符串长度有要求（InnoDB 为 3 个字符，MyISAM 为 4 个字符），并且包含一个针对特定存储引擎的停用词列表（例如“the”、“it”、“on”等词），因此我们需要确保搜索查询不包含这些词。


    我们的 B-tree 索引需要是一个覆盖索引吗？这完全取决于我们拥有多少记录以及查询的结构。如果我们的数据集不大，覆盖索引可能没有必要；但如果数据集更大，并且我们改变用例，使其需要购买商品本身之外或与购买商品相关的其他数据（例如，购买商品的类型、数量等），覆盖索引将会有所帮助。在这个例子中，我们可以使用覆盖索引（我们有
    50 万行数据，并且想查看哪些用户购买了哪些商品），但一个普通的 B-tree 索引也能很好地工作，并且我们也不需要它是一个前缀索引。


    那么，基于这些事实，我们如何定义索引呢？在这种情况下，一切都很简单。我们的查询如下所示：


    ```sql

    SELECT email,last_login FROM `ecommerce_demo` WHERE `item_purchased` = ;

    ```


    基于此以及我们的用例，我们需要为 `item_purchased` 列建立索引——我们将它命名为 `search_idx`（索引可以任意命名，如果不设置，名称将默认为列名）：


    ```sql

    ALTER TABLE `ecommerce_demo ` ADD INDEX `search_idx`(`item_purchased`);

    ```


    完成了——并不难，对吧？从对索引什么以及如何索引毫无头绪，到几分钟内在表上拥有一个功能性的索引。这是怎么做到的？回答几个问题就像一个漏斗，引导你找到答案：如果你知道要问什么问题，你就会找到答案。


    ### 索引设计与大数据考量


    当你的索引设计非常出色之后（面对现实吧——没有什么是 100% 完美的），你的数据增长了，时间也流逝了一段时间；你们中的一些人会发现自己需要重新评估索引设计的选择。重新评估索引设计可能有几个原因，但大多数都与用例、数据或你获得的经验的变化有关。


    当你拥有大量数据时，你定义的索引结构可能不再像以前那样有效。你们中的一些人甚至可能不再处理与以前相同的数据——也许你已经构建了一个不同的项目，需要处理比之前项目多得多的数据。这很正常——事物在变化，你的索引也需要随之发展。


    当情况发生变化时，重要的是不要随波逐流，并记住数据库本身变化不大。变化更多地与你的用例相关，换句话说，这意味着你发现自己要做的大部分事情，与处理普通数据集时采取的行动不会有太大区别。


    十亿条记录是大量的数据，如果你需要索引这么多数据，首先要回归的还是你的用例：是什么需要在数据库中存储如此多的数据，你的应用程序在做什么？数据是被写入数据库表中，频率如何？或者你的数据库是一个只读环境？*你为什么要从如此庞大的数据中提取洞察？*


    回答这些问题，重新评估索引的基础，你将再次找到应该走的道路。你们中的许多人会惊讶地发现，你需要采取的行动与你通常所做的没有太大不同——只是需要比平时更多的考量。举个例子：


    如果我们决定为列建立索引，我们再次需要知道我们应用程序的核心在做什么。如果我们有数亿行数据需要查询，那么尽可能限制数据量对我们最有利。首先，表中的数亿行数据是如何出现的？它们都是必要的吗？我们能否添加一个唯一索引来处理重复项？我们需要向用户展示什么以及如何展示？


    如果你有那么多数据，网站内的搜索功能也可能不同。对于一些场景，拥有大量数据需要在应用程序内提供一个高级、详细的搜索功能——这种设施的目的在于在两个方面发挥作用：


    1.  帮助用户/客户进一步细化他们正在搜索的内容以及期望找到的结果。

    2.  帮助你的数据库以某种方式访问数据，甚至在考虑使用索引之前就排除某些行。


    这方面的一个完美例子是允许在多个类别中搜索内容的汽车相关网站——我将在括号中提供示例并稍后解释原因：


    1.  汽车品牌（例如，“**Toyota**”）

    2.  汽车的具体型号（例如，“Toyota **Corolla**”）

    3.  汽车的制造年份（例如，“**2019** Toyota Corolla”）

    4.  汽车使用的燃料类型（例如，“**Gasoline** 2019 Toyota Corolla”）

    5.  汽车价格（例如，“Gasoline 2019 Toyota Corolla **Under $10,000**”）

    6.  汽车是否发生过事故（例如，“Gasoline 2019 Toyota Corolla Under $10,000 **without Accidents**”）

    7.  汽车的前任车主数量（例如，“Gasoline 2019 Toyota Corolla Under $10,000 without Accidents
    **with Less than 3 Owners**”）

    8.  你希望如何支付汽车费用（例如，“Gasoline 2019 Toyota Corolla Under $10,000 without Accidents
    with Less than 3 Owners **Available Through a Lease**”）


    等等。所有这些子句都有其意义，并对你的索引及其背后的数据库产生重大影响。许多此类网站使用相当简单的查询来搜索数据——筛选器越多，数据库需要查询的数据就越少，因此，一旦涉及到一个能进一步减少可访问数据量的适用索引，查询仍然能快速完成。这就是为什么你可能同时看到“列表中有
    156,521,776 辆汽车”和“查询在 0.12 秒内完成”的主要原因。


    另一方面，构建索引来帮助此类查询可能并非易事——构建遵循用户指定的所有条件的查询可能需要许多子句来访问表中的各个列数据（我们可能需要 `AND`/`OR`
    等）；我们可能需要访问不同表中的数据（我们为此使用 `UNION` 子句，并且要使用它，两个表需要有相同的结构）或甚至完全不同的数据库。对于更大数据集上的索引，`DESCRIBE`
    和 `EXPLAIN` 都是很好的出发点。


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig25_HTML.jpg)


    图 11-25 `car_data` 表


    注意我们使用的数据类型——所有数据类型都经过仔细考虑，并应用了合理的长度。现在，如果我们正在搜索所有字段（不包括 ID 字段），我们是否需要四个独立的索引分别对应四个字段？不一定。在这种情况下，我们可以使用一个复合索引，因为我们某种程度上隐式地知道用户选择的顺序——首先，他必须选择汽车品牌（例如，“Toyota”），然后是车型（例如，“Corolla”），只有在那之后他才能选择其余选项，包括年份，如果我们的应用程序需要，还可以定义可能的
    VIN 唯一标识符。在选择品牌之前选择车型，或在选择车型之前选择年份，都是不可能的，所以我们某种程度上隐式地知道什么会在什么之后发生。如果我们的应用程序需要使用所有字段，我们的索引甚至可能是覆盖索引！在构建索引时，让我们利用这一点：


    ```sql

    ALTER TABLE `car_data` ADD INDEX `composite_idx`(`car_brand`,`car_model`,`year`,
    `car_vin`);

    ```'
  raw: '4.  Adhere to all of the full-text search rules: full-text indexes have a
    minimum string length for searches (three characters for InnoDB, four characters
    for MyISAM) as well as a list of stopwords for the storage engine in question
    including words like “the,” “it,” “on,” etc., so we’d have to make sure that our
    search query does not include those too.


    Do we need our B-tree index to be a covering index? It all depends on how many
    records we have and on the structure of our query. If our data set isn’t huge,
    a covering index is probably not necessary, but if the data set is bigger and
    we change our use case for it to necessitate other data than the purchased item
    or relevant to the purchased item (e.g., the type of purchased item, amount, etc.),
    a covering index will help. In this case, we can have a covering index (we have
    500k rows and we want to see what users purchased what items), but a B-tree index
    will do fine too, and we don’t need it to be a prefix index either.


    So, based on these facts, how do we define our indexes? In this case, everything’s
    simple. Our query looks like so:


    ```

    SELECT email,last_login FROM `ecommerce_demo` WHERE `item_purchased` = ;

    ```


    Based on that and our use case, we need to index the `item_purchased` column –
    we will name it search_idx (indexes can have any name, and if not set, the name
    will be the name of the column):


    ```

    ALTER TABLE `ecommerce_demo ` ADD INDEX `search_idx`(`item_purchased`);

    ```


    Done – wasn’t hard, was it? From having no idea what and how to index to having
    a functional index on a table in minutes. How did that happen? Answering a couple
    of questions acted like a funnel that led you to the answer: if you know what
    questions to ask, you will find the answer.


    ## Indexing for Performance and Big Data


    After your index design is very good (let’s face it – nothing’s ever 100% perfect),
    your data has grown and some time has flown by; some of you will find yourself
    re-evaluating your index design choices. Re-evaluations of index design may happen
    for a couple of reasons, but most of them will have something to do with changes
    to your use case, data, or the experience you’ve gained.


    When you have a lot of data, the index structures you’ve defined may no longer
    be as effective as they’ve been. Some of you may not even work with the same data
    as before – perhaps you’ve built a different project having to deal with way more
    data than the other. That’s normal – things change and your indexes need to evolve
    together with them.


    When things change, it’s important to not get carried away and remember that databases
    don’t change much. Changes are related to your use case instead, which in other
    words, means that most of the things you will find yourself doing won’t differ
    too much from the actions you took when ordinary data sets were involved.


    A billion records are a lot of data, and if you need to index that much data,
    the first thing you have to come back to is your use case once again: what necessitates
    that much data in a database and what is your application doing? Is data written
    to the tables within the database and how often or is your database a read-only
    environment? *Why do you need to extract insights from that much data?*


    Answer these questions, evaluate the basics of indexes, and you will stumble upon
    a path you should take once again. Many of you will be surprised to notice that
    the actions you need to take don’t differ much from what you would usually do
    – it just necessitates more consideration than usual. Here’s an example:


    If we decide to index our columns, we once again have to know what the backbone
    of our application is doing, and if we have hundreds of millions of rows we need
    to query through, it’s in our best interest to limit as much data as possible.
    How did hundreds of millions of rows appear in our table in the first place? Are
    all of them necessary and could we add a unique index to deal with duplicates?
    What do we need to be shown to the user and how?


    If you have that much data, the search functionality within your website may differ
    too. For some, having that much data necessitates an advanced, detailed search
    accessible within the application – the purpose of such an appliance would be
    to act on two fronts:


    1.  Help users/customers further refine what they’re searching for and what they
    expect to find.


    2.  Help your database access data in a way that eliminates certain rows from
    consideration even before an index is considered for use.


    A perfect example of this are car-related websites that let you search for things
    across multiple categories – I’ll provide examples in brackets and explain why
    later on:


    1.  The brand of the car (e.g., “**Toyota**”)


    2.  Specific title of the car (e.g., “Toyota **Corolla**”)


    3.  The year the car was made (e.g., “**2019** Toyota Corolla”)


    4.  The type of gas that powers the car (e.g., “**Gasoline** 2019 Toyota Corolla”)


    5.  The price of the car (e.g., “Gasoline 2019 Toyota Corolla **Under $10,000**”)


    6.  Whether the car has been in an incident or not (e.g., “Gasoline 2019 Toyota
    Corolla Under $10,000 **without Accidents**”)


    7.  The number of previous owners on the car (e.g., “Gasoline 2019 Toyota Corolla
    Under $10,000 without Accidents **with Less than 3 Owners**”)


    8.  How do you want to pay for the car (e.g., “Gasoline 2019 Toyota Corolla Under
    $10,000 without Accidents with Less than 3 Owners **Available Through a Lease**”)


    And so on. All of these clauses have something to say – and have a big impact
    your indexes and the database behind them. Many such websites use rather simple
    queries to conduct searches through data – the more filters they have, the less
    data the database has to query through, and thus, once an applicable index that
    further lessens the amount of accessible data is involved, queries still complete
    quickly. That’s the primary reason why you might see “156,521,776 cars in the
    listing” and “query completed in 0.12sec.” at the same time.


    On the other hand, constructing indexes to help such queries may not be an easy
    task – building queries adhering to all of the points specified by the user is
    likely to necessitate many clauses to access various columns of data from the
    table (we may need `AND`/`OR`, etc.); we may need to access data in different
    tables (we use the `UNION` clause for that and to use it, both tables need to
    have the same structure) or different databases altogether. As far as indexes
    on bigger data sets are concerned, both `DESCRIBE` and `EXPLAIN` are good points.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig25_HTML.jpg)


    Figure 11-25


    car_data table


    Notice the data types that we’re using – all data types are carefully thought
    out and have reasonable length applied to them. Now, if we’re searching for all
    of the fields (excluding the ID field), we would need four separate indexes on
    four fields, right? Not necessarily. In this case, we can use a composite index
    instead, because we sort of implicitly know the order of the choices of the user
    – first, he’d have to choose the car brand (e.g., “Toyota”), then – the model
    (e.g., “Corolla”), and only after that can he choose the rest of the options including
    the year and define a possible VIN unique identifier if our application necessitates
    that. It’s impossible to choose the model before the brand or the year before
    the model, and so, we sort of implicitly know what’s going to happen after what.
    Our index may even be covering if all fields are required to be used by our application!
    Let’s use that to our advantage when building the index:


    ```

    ALTER TABLE `car_data` ADD INDEX `composite_idx`(`car_brand`,`car_model`,`year`,
    `car_vin`);

    ```'
