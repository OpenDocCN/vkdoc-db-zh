  trans: '# B 树索引：结构、用法与优化


    ## B 树索引简介

    B 树索引是一种带有变体的二叉树索引：这种类型的索引允许其成员拥有两个以上的子节点，这也是其主要区别。以下是 B 树索引的基本示意图。


    ![](img/625040_1_En_11_Fig2_HTML.jpg)


    图 11-2：B 树索引


    B 树索引能提升查询性能，因为其结构使数据库能够跳过遍历不必要的行：它们使用指针快速定位数据，索引的中间层每个节点可以容纳更多条目，但无论单个节点有多少条目，B
    树索引的基本原理保持不变。


    ## 在 MySQL 中定义 B 树索引

    在所有 MySQL 版本中，B 树索引可以在创建表时定义，也可以在修改特定表结构时定义。也就是说，无论你选择如何定义 B 树索引，它们的内部功能不会改变。索引所在的列、其基数以及其他具体细节可能会变，但这些细节中的绝大部分与你的查询和数据库内部机制相关。你的查询内部机制也决定了选择哪种索引。


    要充分利用 B 树索引，请使用等于运算符、`BETWEEN`或不带前导通配符的`LIKE`。如果你发现自己使用`IS [NOT] NULL`子句，B 树索引也会有所帮助；在使用`AND`子句时同样有效。


    ## 实践演示

    好了，现在来看示例。为了测试 B 树索引的功能，我将创建一个用于演示的表。


    ![](img/625040_1_En_11_Fig3_HTML.jpg)


    图 11-3：为演示目的创建表


    请注意我创建表的方式——我没有使用转储文件从备份中恢复表；而是重新创建了表结构（第一个查询），然后插入了一些（并非全部）先前表中存在的数据（第二个查询）。


    我还要说明一点，我们已经在`username`列上有了一个 B 树索引；因此，所讨论的`INSERT`查询的速度会比平时慢。


    如果你生成数据，然后对包含生成数据的列创建索引，那么索引的基数可能会相当低。


    ![](img/625040_1_En_11_Fig4_HTML.jpg)


    图 11-4：在用户名列上的 BTREE 索引


    ![](img/625040_1_En_11_Fig5_HTML.jpg)


    图 11-5：列上索引的较低基数


    现在，如果你正在自己的环境中复制粘贴我的操作来学习，你们中的许多人可能没有 50 万条记录可供操作。为此，可以找一个能生成大量随机数据的网站（generatedata.com
    是个不错的起点），或者从备份中恢复数据并在必要时进行匿名化处理。为此，我们将使用几个查询——并非所有查询都适用于你的具体情况，因此请按需取用并相应地调整表名/列/条目：


    1.  `` UPDATE `demo_data` SET `column` = ELT(FLOOR(RAND()*3) +1, ''Anonymized
    Row'', ''Anonymous'', ''Private''); ``

    2.  `` UPDATE `demo_data` SET `id` = RAND(); ``

    3.  `` UPDATE `demo_data` SET `email` = REPLACE(`email`, ''gmail.com'', ''demo.com'');
    ``

    4.  `` UPDATE `demo_data` SET `ip` = ''127.0.0.1''; ``

    5.  `...`


    你还可以采用许多其他方法，但对于这个例子，这些就足够了——第一个查询会将列的所有值设置为你指定的三个值之一（要提供更多值，请增加`RAND()`乘以的数字，然后添加更多条目），第二个查询会将`id`列中的所有值设置为随机值，第三个查询会将所有`gmail.com`的电子邮件域名替换为`demo.com`，第四个查询会将所有
    IP 地址设置为`127.0.0.1`。你也可以自由发挥，自己想些办法。让我们看看它们是如何工作的。


    ![](img/625040_1_En_11_Fig6_HTML.jpg)


    图 11-6：将用户名设置为随机用户名


    ![](img/625040_1_En_11_Fig7_HTML.jpg)


    图 11-7：将电子邮件设置为随机电子邮件


    很好——它们按预期工作。让我们运行几个查询，看看 MariaDB 是如何使用我们的 B 树索引的。


    ## 测试索引性能

    ![](img/625040_1_En_11_Fig8_HTML.jpg)


    图 11-8：在`username`列上测试 B 树索引：第 1 轮


    ![](img/625040_1_En_11_Fig9_HTML.jpg)


    图 11-9：在`username`列上测试 B 树索引：第 2 轮


    ![](img/625040_1_En_11_Fig10_HTML.jpg)


    图 11-10：在`username`列上测试 B 树索引：第 3 轮


    我假设你的查询看起来与显示的类似——如果是这样，关于在 MySQL 中使用 B 树索引的经验教训如下（我通过判断索引是否可能被使用以及是否被 MariaDB
    使用来推导这些，主要查看`possible_keys`和`key`列）：


    1.  **为了让你的查询能够使用索引，必须“接触”该列。** 看看第一个查询——它与`username`列毫无关系，因此甚至没有考虑该列上的索引。

    2.  **当使用`LIMIT`、`OFFSET`或类似子句时，可以使用 B 树索引。** 如果你在`WHERE`子句后使用了被索引的列，`LIMIT`、`OFFSET`和类似子句不会削弱索引在
    MariaDB 中的实用性。

    3.  **如果存在 B 树索引和`PRIMARY KEY`索引的选择，MySQL 仍然可能选择使用主键索引，无论查询结构是否“允许”MySQL 考虑不同的
    B 树索引。** 进行实验和调整，为你的查询找到最佳匹配。

    4.  **MySQL 可以考虑一个索引，但如果认为它对查询没有好处，就不会使用它。**

    5.  **MySQL 可以在查询的不同部分使用不同的索引。** 在涉及`UNION`或其他子句时尤其如此。

    6.  **“%”并不是唯一可能使你的查询失效的通配符。** 正如你可能知道的，表示单个未知字符的“_”字符也是一个通配符。因此，查询未知字符在前的查询也可能比平时慢。


    ## 关键注意事项与优化

    请注意，如果你将任何列设置为多个随机值，索引基数会相当低。为了确保你对 B 树索引的体验不至于变糟，也要注意索引叶结构的长度——你的索引大小取决于索引中的行数、列数、索引数以及列中值本身的大小。


    也有办法预测索引的大小——方法可能因数据库而异，但对于基于 MariaDB 的索引，你可以利用`mysql`数据库中的`innodb_index_stats`表。


    ![](img/625040_1_En_11_Fig11_HTML.jpg)


    图 11-11：MariaDB 中的 InnoDB 索引详细信息


    你们中的大多数人不会花很长时间查看这些统计数据，因为它们相当复杂，所以为了提取必要的信息，我们可以使用如下查询——这个查询将为我们提供所有数据库中索引的大小（以
    MB 为单位）。该查询将排除主键：


    ```

    SELECT database_name, table_name, index_name,

    ROUND(stat_value * @@innodb_page_size / 1024 / 1024, 2) idxsize_mb

    FROM mysql.innodb_index_stats

    WHERE stat_name = ''size'' AND index_name != ''PRIMARY''

    ORDER BY idxsize_mb DESC;

    ```


    ![](img/625040_1_En_11_Fig12_HTML.jpg)


    图 11-12：显示特定数据库中的索引详细信息


    为了减小索引的大小，考虑尽量减少你所用数据类型的长度，并使用在磁盘上占用空间更少的数据类型（例如，用`VARCHAR`代替`TEXT`）或使用其他类型的索引（记住——你也可以只索引列的一部分）。'
- fmt: "Once you make sure that you only index columns that warrant indexing, remember\
    \ that the query optimizer will always pick the fastest way to provide you with\
    \ data. Always remember one thing – the query optimizer will search for ways to\
    \ make your query faster, and if the chosen way doesn’t involve your index, it’s\
    \ because the optimizer decided that another route would make the query complete\
    \ faster. Perhaps the cardinality of your index is rather low? If not, perhaps\
    \ a different type of index would make your query performance skyrocket.\n\n##\
    \ Covering Indexes\n\nFor many of you, indexing won’t end with a couple of B-tree\
    \ indexes here or there. Every application is different, and once you’ve dipped\
    \ your toes in the indexing water, you will likely begin searching for some other\
    \ solutions that could cover you in other scenarios, too.\n\nEnter covering indexes\
    \ – in essence, they’re the same thing as B-Tree indexes, but with a twist in\
    \ that such indexes cover all of the columns that are required for a query to\
    \ execute, hence the title.\n\nThe functionality of covering indexes doesn’t differ\
    \ much from B-tree indexes because covering indexes are B-tree indexes so there\
    \ are no changes on that front, but with that being said, these kinds of indexes\
    \ come with a key difference – a query using covering indexes will likely complete\
    \ faster than a query using an ordinary B-tree index because covering indexes\
    \ index all columns used by the query, and thus, enable your database to read\
    \ data from the index rather than the disk providing your database with drastic\
    \ performance benefits as a result.\n\nSome common misconceptions about covering\
    \ indexes include saying that a covering index covers all columns in a table,\
    \ which is often not the case. A useful covering index is any singular index that\
    \ exists on columns we’re running a `SELECT` query through. Another common point\
    \ of contention is related to indexes that cover multiple columns. Those indexes\
    \ are not covering indexes if they don’t cover columns required by the query to\
    \ execute, and thus, they belong in a different (yet related) category – they\
    \ are multicolumn indexes.\n\nCovering indexes are B-tree indexes so they are\
    \ defined exactly as B-tree indexes are defined, but keeping in mind the specifics\
    \ of this type of index, they necessitate answers to some questions beforehand.\
    \ All of the most important questions would be somehow related to the columns\
    \ used by our query – what columns is our query using, what data are we searching\
    \ for, what data types are used by our columns, and what results do we expect?\n\
    \nThe answers to those questions will dictate the things we need to do to make\
    \ our queries work in the best way possible. First, consider your use case – what\
    \ data are you searching for and what do you want to achieve? Only by answering\
    \ that question will we be able to define an index that helps our database rather\
    \ than just takes up space on the disk.\n\nOnce we have an answer to that question,\
    \ we’re free to create a table and add the necessary index. I’ll modify an existing\
    \ table and add a covering index on two columns – `username` and `details` – because\
    \ I’m about to search for details about users registered on a mock forum (a covering\
    \ index can be added on top of an existing B-tree index as well).\n\n![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig13_HTML.jpg)\n\
    Figure 11-13\nAdding a covering index on a table\n\nCovering indexes are rather\
    \ easy to understand – the complex part is the order of columns within them and\
    \ that’s the primary challenge with covering indexes: covering indexes makes your\
    \ queries able to read data from the index by satisfying clear requirements. Those\
    \ requirements are the backbone behind the order of the columns in the index and\
    \ coming up with an order that helps your use case and the queries within is no\
    \ easy feat. I’ll give you an example – with a query like so:\n\n```sql\nSELECT\
    \ user, infraction_details FROM demo_forum WHERE last_infraction = `Minor` AND\
    \ referred_by = `Thomas`;\n```\n\nWhich covering index would be the most efficient?\n\
    \n1.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`user`,`infraction_details`,`last_infraction`,`referred_by`);\n\
    \    ```\n\n2.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`referred_by`,`last_infraction`,`infraction_details`,`user`);\n\
    \    ```\n\n3.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`user`,`infraction_details`,`referred_by`,`last_infraction`);\n\
    \    ```\n\n4.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`infraction_details`,`referred_by`,`last_infraction`,`user`);\n\
    \    ```\n\nHard question, right? All of the aforementioned indexes would constitute\
    \ a proper, working covering index, but only one or two of them would be the best\
    \ fit for the task, depending on what kind of MySQL flavor you find yourself using\
    \ – for the users of MySQL < 8.0 and MariaDB, only the first one would cut the\
    \ chase, but if you find yourself running MySQL >= 8.0, the second query is also\
    \ an option because newer versions of MySQL can also perform index scans backward.\n\
    \nSome examples of covering indexes being used can be seen below.\n\n![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig14_HTML.jpg)\n\
    Figure 11-14\nCovering indexes in use in MariaDB\n\n1.  The first query doesn’t\
    \ use a covering index because I’ve only defined `id` after the `WHERE` clause.\n\
    2.  The second query uses a covering index because it’s very clear what we ask:\
    \ even though such queries may not be running in the wild (we essentially select\
    \ two columns after defining their values in the `WHERE` clause), they’re a good\
    \ example of when a covering index would be in use.\n3.  The third query uses\
    \ an index by using a backward index scan (`details,username`.)\n4.  The fourth\
    \ query only uses the primary key index on the `id` column because we’re only\
    \ searching for the `id` and nothing else.\n5.  The last query uses a covering\
    \ index because we’re after the username of a user that has specific details and\
    \ the query is constructed in a way that makes it the perfect fit for a covering\
    \ index without reading it backward.\n\nFinally, keep in mind that indexes that\
    \ cover too many columns while covering the columns necessary for the query to\
    \ execute would also be covering indexes, but they would be overkill. To properly\
    \ work with covering indexes, remember:\n\n1.  To index every column before and\
    \ after a `WHERE` clause.\n2.  To avoid including columns you don’t use.\n3. \
    \ That covering indexes can be read backward.\n4.  That one table can make use\
    \ of multiple covering indexes – it all depends on the structure of your queries.\n\
    \nFinally, keep things simple – simple approaches are often the best.\n\n## Multicolumn\
    \ (Composite) Indexes\n\nNow, we come to multicolumn indexes. Multicolumn, or\
    \ composite, indexes are often confused with covering indexes in that both types\
    \ of indexes make use of multiple columns, but only covering indexes lets your\
    \ database read the data from the index.\n\nMulticolumn indexes are just what\
    \ they sound like – they are indexes on multiple columns. Such indexes are also\
    \ B-tree indexes, and they may or may not “cover” all of the columns required\
    \ for a query to execute, but they are considered composite indexes regardless\
    \ of the outcome.\n\nMulticolumn indexes call home to various specifics unique\
    \ to themselves – MySQL only allows these kinds of indexes to be of B-tree types\
    \ while other database management systems such as PostgreSQL allow for GIN, BRIN,\
    \ and GiST types, and some developers may even liken multicolumn indexes to a\
    \ sorted array.\n\nIn MySQL, composite indexes can consist of up to 16 columns,\
    \ they require queries to use some or all of the columns in the composite index,\
    \ and, just like the composite indexes before them, have a crucially important\
    \ feature – the order of columns within the index.\n\nHere’s a basic definition\
    \ of a composite index:\n\n```sql\nCREATE INDEX `composite_idx` ON `demo_table`(`col_1`,`col_2`,`col_3`);\n\
    ```"
  raw: 'Once you make sure that you only index columns that warrant indexing, remember
    that the query optimizer will always pick the fastest way to provide you with
    data. Always remember one thing – the query optimizer will search for ways to
    make your query faster, and if the chosen way doesn’t involve your index, it’s
    because the optimizer decided that another route would make the query complete
    faster. Perhaps the cardinality of your index is rather low? If not, perhaps a
    different type of index would make your query performance skyrocket.


    ### Covering Indexes


    For many of you, indexing won’t end with a couple of B-tree indexes here or there.
    Every application is different, and once you’ve dipped your toes in the indexing
    water, you will likely begin searching for some other solutions that could cover
    you in other scenarios, too.


    Enter covering indexes – in essence, they’re the same thing as B-Tree indexes,
    but with a twist in that such indexes cover all of the columns that are required
    for a query to execute, hence the title.


    The functionality of covering indexes doesn’t differ much from B-tree indexes
    *because covering indexes are B-tree indexes* so there are no changes on that
    front, but with that being said, these kinds of indexes come with a key difference
    – a query using covering indexes will likely complete faster than a query using
    an ordinary B-tree index because covering indexes index all columns used by the
    query, and thus, enable your database to read data from the index rather than
    the disk providing your database with drastic performance benefits as a result.


    Some common misconceptions about covering indexes include saying that a covering
    index covers all columns in a table, which is often not the case. A useful covering
    index is any singular index that exists on columns we’re running a `SELECT` query
    through. Another common point of contention is related to indexes that cover multiple
    columns. Those indexes are not covering indexes if they don’t cover columns required
    by the query to execute, and thus, they belong in a different (yet related) category
    – they are multicolumn indexes.


    Covering indexes are B-tree indexes so they are defined exactly as B-tree indexes
    are defined, but keeping in mind the specifics of this type of index, they necessitate
    answers to some questions beforehand. All of the most important questions would
    be somehow related to the columns used by our query – what columns is our query
    using, what data are we searching for, what data types are used by our columns,
    and what results do we expect?


    The answers to those questions will dictate the things we need to do to make our
    queries work in the best way possible. First, consider your use case – what data
    are you searching for and what do you want to achieve? Only by answering that
    question will we be able to define an index that helps our database rather than
    just takes up space on the disk.


    Once we have an answer to that question, we’re free to create a table and add
    the necessary index. I’ll modify an existing table and add a covering index on
    two columns – `username` and `details` – because I’m about to search for details
    about users registered on a mock forum (a covering index can be added on top of
    an existing B-tree index as well).


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Adding a covering index on a table


    Covering indexes are rather easy to understand – the complex part is the order
    of columns within them and that’s the primary challenge with covering indexes:
    covering indexes makes your queries able to read data from the index by satisfying
    clear requirements. Those requirements are the backbone behind the order of the
    columns in the index and coming up with an order that helps your use case and
    the queries within is no easy feat. I’ll give you an example – with a query like
    so:


    ```

    SELECT user, infraction_details FROM demo_forum WHERE last_infraction = `Minor`
    AND referred_by = `Thomas`;

    ```


    Which covering index would be the most efficient?


    1.  ``CREATE INDEX `covering_idx` ON `demo_forum`(`user`,`infraction_details`,`last_infraction`,`referred_by`);``


    2.  ``CREATE INDEX `covering_idx` ON `demo_forum`(`referred_by`,`last_infraction`,`infraction_details`,`user`);``


    3.  ``CREATE INDEX `covering_idx` ON `demo_forum`(`user`,`infraction_details`,`referred_by`,`last_infraction`);``


    4.  ``CREATE INDEX `covering_idx` ON `demo_forum`(`infraction_details`,`referred_by`,`last_infraction`,`user`);``


    Hard question, right? All of the aforementioned indexes would constitute a proper,
    working covering index, but only one or two of them would be the best fit for
    the task, depending on what kind of MySQL flavor you find yourself using – for
    the users of MySQL < 8.0 and MariaDB, only the first one would cut the chase,
    but if you find yourself running MySQL >= 8.0, the second query is also an option
    because newer versions of MySQL can also perform index scans backward.


    Some examples of covering indexes being used can be seen below.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig14_HTML.jpg)


    Figure 11-14


    Covering indexes in use in MariaDB


    1.  The first query doesn’t use a covering index because I’ve only defined `id`
    after the `WHERE` clause.


    2.  The second query uses a covering index because it’s very clear what we ask:
    even though such queries may not be running in the wild (we essentially select
    two columns after defining their values in the `WHERE` clause), they’re a good
    example of when a covering index would be in use.


    3.  The third query uses an index by using a backward index scan (`details,username`.)


    4.  The fourth query only uses the primary key index on the `id` column because
    we’re only searching for the `id` and nothing else.


    5.  The last query uses a covering index because we’re after the username of a
    user that has specific details and the query is constructed in a way that makes
    it the perfect fit for a covering index without reading it backward.


    Finally, keep in mind that indexes that cover too many columns while covering
    the columns necessary for the query to execute would also be covering indexes,
    but they would be overkill. To properly work with covering indexes, remember:


    1.  To index every column before and after a `WHERE` clause.


    2.  To avoid including columns you don’t use.


    3.  That covering indexes can be read backward.


    4.  That one table can make use of multiple covering indexes – it all depends
    on the structure of your queries.


    Finally, keep things simple – simple approaches are often the best.


    ### Multicolumn (Composite) Indexes


    Now, we come to multicolumn indexes. Multicolumn, or composite, indexes are often
    confused with covering indexes in that both types of indexes make use of multiple
    columns, but only covering indexes lets your database read the data from the index.


    Multicolumn indexes are just what they sound like – they are indexes on multiple
    columns. Such indexes are also B-tree indexes, and they may or may not “cover”
    all of the columns required for a query to execute, but they are considered composite
    indexes regardless of the outcome.


    Multicolumn indexes call home to various specifics unique to themselves – MySQL
    only allows these kinds of indexes to be of B-tree types while other database
    management systems such as PostgreSQL allow for GIN, BRIN, and GiST types, and
    some developers may even liken multicolumn indexes to a sorted array.


    In MySQL, composite indexes can consist of up to 16 columns, they require queries
    to use some or all of the columns in the composite index, and, just like the composite
    indexes before them, have a crucially important feature – the order of columns
    within the index.


    Here’s a basic definition of a composite index:


    ```

    CREATE INDEX `composite_idx` ON `demo_table`(`col_1`,`col_2`,`col_3`);

    ```'
  trans: "\n一旦你确保只索引了那些值得索引的列，请记住查询优化器总会选择最快的方式为你提供数据。永远记住一点——查询优化器会寻找使你的查询更快的方法，如果它选择的路径没有用到你的索引，那是因为优化器判定另一条路径能让查询更快完成。也许你的索引基数（cardinality）相当低？如果不是，也许换一种不同类型的索引能让你的查询性能飙升。\n\
    \n## 覆盖索引\n\n对你们许多人来说，索引工作不会止步于几个零散的 B-tree 索引。每个应用都不同，一旦你开始涉足索引领域，你很可能会开始寻找其他解决方案，以便在其它场景下也能覆盖你的需求。\n\
    \n这就引出了覆盖索引——本质上，它们与 B-Tree 索引是同一类东西，但有一个关键不同：此类索引“覆盖”了一个查询执行所需的所有列，因此得名。\n\n\
    覆盖索引的功能与 B-tree 索引没有太大区别，因为覆盖索引本身就是 B-tree 索引，所以在这一点上没有变化。但尽管如此，这类索引有一个关键区别——使用覆盖索引的查询很可能比使用普通\
    \ B-tree 索引的查询完成得更快，因为覆盖索引索引了查询所使用的所有列，从而让你的数据库能够直接从索引中读取数据，而不是从磁盘读取，最终为你的数据库带来巨大的性能收益。\n\
    \n关于覆盖索引的一些常见误解包括，声称一个覆盖索引覆盖了表中的所有列，但情况往往并非如此。一个有用的覆盖索引可以是任何建立在我们正在执行 `SELECT`\
    \ 查询所涉及列上的单一索引。另一个常见的争议点与覆盖多列的索引有关。如果这些索引没有覆盖查询执行所需的列，那么它们就不是覆盖索引，因此它们属于一个不同（但相关）的类别——它们是多列索引。\n\
    \n覆盖索引就是 B-tree 索引，因此它们的定义方式与 B-tree 索引完全相同。但考虑到此类索引的特性，它们需要在事前回答一些问题。所有最重要的问题都会以某种方式与我们查询所使用的列相关——我们的查询使用了哪些列，我们在搜索什么数据，我们的列使用了什么数据类型，以及我们期望得到什么结果？\n\
    \n对这些问题的回答将决定我们需要做哪些事情才能让我们的查询以最佳方式工作。首先，考虑你的用例——你在搜索什么数据，你想达到什么目的？只有回答了这个问题，我们才能定义一个真正有助于我们的数据库，而不仅仅是占用磁盘空间的索引。\n\
    \n一旦我们有了那个问题的答案，我们就可以自由地创建表并添加必要的索引。我将修改一个现有的表，并在两个列——`username` 和 `details`——上添加一个覆盖索引，因为我即将搜索注册在模拟论坛上的用户的详细信息（覆盖索引也可以添加在现有的\
    \ B-tree 索引之上）。\n\n![](img/625040_1_En_11_Fig13_HTML.jpg)\n图 11-13\n在表上添加覆盖索引\n\
    \n覆盖索引相当容易理解——复杂的部分是索引中列的顺序，这也是覆盖索引的主要挑战：覆盖索引通过满足明确的要求，使你的查询能够从索引中读取数据。这些要求是索引中列顺序的基石，而构思出一个能帮助你的用例及其中查询的顺序绝非易事。我给你举个例子——对于一个像这样的查询：\n\
    \n```sql\nSELECT user, infraction_details FROM demo_forum WHERE last_infraction\
    \ = `Minor` AND referred_by = `Thomas`;\n```\n\n哪一个覆盖索引会是最高效的？\n\n1.  ```sql\n\
    \    CREATE INDEX `covering_idx` ON `demo_forum`(`user`,`infraction_details`,`last_infraction`,`referred_by`);\n\
    \    ```\n\n2.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`referred_by`,`last_infraction`,`infraction_details`,`user`);\n\
    \    ```\n\n3.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`user`,`infraction_details`,`referred_by`,`last_infraction`);\n\
    \    ```\n\n4.  ```sql\n    CREATE INDEX `covering_idx` ON `demo_forum`(`infraction_details`,`referred_by`,`last_infraction`,`user`);\n\
    \    ```\n\n很难回答，对吧？以上所有索引都能构成一个合适的、可用的覆盖索引，但其中只有一两个是任务的最佳选择，具体取决于你所使用的 MySQL\
    \ 类型——对于 MySQL < 8.0 和 MariaDB 的用户，只有第一个索引能胜任，但如果你运行的是 MySQL >= 8.0，第二个查询也是一种选择，因为新版本的\
    \ MySQL 也可以执行向后的索引扫描。\n\n下面可以看到一些使用覆盖索引的例子。\n\n![](img/625040_1_En_11_Fig14_HTML.jpg)\n\
    图 11-14\nMariaDB 中使用的覆盖索引\n\n1.  第一个查询没有使用覆盖索引，因为我只在 `WHERE` 子句后定义了 `id`。\n2.\
    \  第二个查询使用了覆盖索引，因为我们的要求非常明确：尽管这类查询在现实中可能不常见（我们基本上是在 `WHERE` 子句中定义列值之后再选择这两个列），但它们是覆盖索引何时会被使用的一个好例子。\n\
    3.  第三个查询通过向后扫描索引（`details, username`）来使用索引。\n4.  第四个查询仅使用了 `id` 列上的主键索引，因为我们只搜索\
    \ `id`，没有其他内容。\n5.  最后一个查询使用了覆盖索引，因为我们正在寻找一个具有特定详细信息的用户的用户名，并且该查询的构造方式使其成为覆盖索引的完美应用场景，无需向后读取。\n\
    \n最后，请记住，那些覆盖了太多列，同时也覆盖了查询执行所需列的索引，也属于覆盖索引，但它们可能会显得多余。要正确地使用覆盖索引，请记住：\n\n1.  在\
    \ `WHERE` 子句的前后索引每一列。\n2.  避免包含你未使用的列。\n3.  覆盖索引可以被向后读取。\n4.  一张表可以利用多个覆盖索引——这完全取决于你的查询结构。\n\
    \n最后，保持简单——简单的方法往往是最好的。\n\n## 多列（复合）索引\n\n现在，我们来讨论多列索引。多列或复合索引经常与覆盖索引混淆，因为两种索引都利用了多个列，但只有覆盖索引能让你的数据库直接从索引中读取数据。\n\
    \n多列索引正如其名——它们是建立在多个列上的索引。此类索引也是 B-tree 索引，它们可能“覆盖”也可能不“覆盖”一个查询执行所需的所有列，但无论结果如何，它们都被视为复合索引。\n\
    \n多列索引有其自身独特的一些特性——MySQL 只允许这类索引为 B-tree 类型，而其他数据库管理系统如 PostgreSQL 则允许 GIN、BRIN\
    \ 和 GiST 类型。一些开发者甚至可能将多列索引比作一个排序数组。\n\n在 MySQL 中，复合索引最多可由 16 列组成，它们要求查询使用复合索引中的部分或所有列，并且，正如之前的复合索引一样，它们拥有一个至关重要的特性——索引中列的顺序。\n\
    \n以下是一个复合索引的基本定义：\n\n```sql\nCREATE INDEX `composite_idx` ON `demo_table`(`col_1`,`col_2`,`col_3`);\n\
    ```\n"
- fmt: '# 复合索引、覆盖索引及其他索引类型


    复合索引理解起来并不复杂——要使用它们，我们必须按指定的顺序使用索引中一个或多个列。前述的索引定义将满足使用 `col_1` 列、`col_1` 和 `col_2`
    两列或所有三列组合的查询。


    现在，再次来看例子。我将再次使用覆盖索引，但首先通过运行如下查询来重命名它——这个查询非常直观：


    ```sql

    ALTER TABLE `database`.`table` RENAME INDEX `covering_idx` TO `composite_idx`;

    ```


    这意味着现在我们的表有一个由两列——`username` 和 `details`（最多可包含 16 列）——组成的复合索引；检查时，MariaDB 应在多列索引的第一列的
    Key 列中返回 “MUL”。


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig15_HTML.jpg)


    图 11-15


    MariaDB 中多列索引显示为 “MUL”


    让我们来测试一下。


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig16_HTML.jpg)


    图 11-16


    复合索引：第一轮


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig17_HTML.jpg)


    图 11-17


    复合索引：第二轮


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig18_HTML.jpg)


    图 11-18


    复合索引：第三轮


    我们得到了结果！


    你可以看到，无论我们是查询 `username` 列和 `details` 列，还是 `details` 列和 `username` 列，数据库仍然能够使用该索引。有时
    MariaDB 确实考虑使用索引但决定不使用，因为它认为不使用索引完成查询会更快，有一次 MariaDB 返回了一条注释：`Impossible WHERE
    noticed after reading const tables`。这个错误可能让一些人感到困惑，但它本质上意味着在你的表中没有找到满足 `WHERE`
    子句中一个或多个条件的行。换句话说，你很可能检查了不该检查的东西（在 `NOT NULL` 列中检查 `NULL` 值，或反之），或者某个子句没有匹配任何记录，因此
    MariaDB 没有费心处理其余部分。


    覆盖索引无疑很有趣，并且在使用某些子句时也可以使用——如果你搜索最左边的列，然后使用带有等值运算符的 `ORDER BY` 对其余列进行排序，`ORDER
    BY` 效果最好。覆盖索引也可以向后扫描。


    ### 前缀索引


    覆盖索引和复合索引都很棒——那么在索引整个列空间不足的情况下该怎么办呢？在这种情况下，你需要使用前缀索引——一种只覆盖列中部分字符的索引，因此与其他索引相比相当小，但仍提供足够的选择性，使其成为一个可行的选择。


    前缀索引的定义与常规索引类似，只是用数字表示应覆盖列中的多少个字符。此示例将在 `demo_table` 的 `demo_column` 的前 10 个字符上添加一个前缀索引：


    ```sql

    ALTER TABLE `demo_table` ADD INDEX `prefix_idx`(demo_column(10));

    ```


    可以看出，以这种方式定义的索引选择性较低，但如果定义得当，仍然可以提供可行的性能优势。这实际上是关键所在——`the challenge is defining
    them properly.` 除了前缀索引在磁盘上使用更少的空间外，对于索引 `BLOB` 或 `TEXT` 数据类型来说，它们也是必需的——由于其大小，无论你是否愿意定义，此类数据类型都要求定义前缀索引。


    前缀索引对一些人来说很繁琐——开发人员常常觉得寻找合适的索引长度任务过于繁重，因为他们没有可遵循的“规则”来找到一个黄金平衡点。


    不过，找到一个好的前缀索引长度并非难事——一个简单的做法是深入研究你的用例，并找到相关行的平均长度。行的平均长度应该是一个很好的起点——目标是长度足够长，使其结果与整个列的索引尽可能相似，但不要覆盖整个列以节省磁盘空间。


    定义理想的前缀索引需要实践，而且由于此类索引只能用于“普通” SQL 查询，并且不覆盖列中的所有值，因此它们不能用作覆盖索引。部分索引不能使用 `ORDER
    BY` 或 `GROUP BY` 子句，因此它们也不是适用于所有用例的理想选择。


    ### 空间（R-Tree）、哈希和聚簇索引


    除了前缀索引，你也可能有使用空间索引的用例。有些人可能甚至没听说过它们，这没关系；空间索引有非常特殊的任务——它们索引几何数据，因此，使用此类索引的列必须存储基于
    `POLYGON`、`LINESTRING` 或 `MULTIPOINT` 数据类型的空间数据。空间索引的定义需要 `SPATIAL` 关键字：


    ```sql

    ALTER TABLE `demo_table` ADD SPATIAL INDEX `spatial_idx`(`column`);

    ```


    空间索引的工作方式类似于 B-tree 索引，它们也能加快精确值的搜索速度。


    空间索引通过空间参考标识符（SRID）工作——这些是与几何值关联的 ID 值，为了在使用空间索引时优化数据，建议通过运行如下 SQL 查询来验证列中的所有值是否具有相同的
    SRID：


    ```sql

    SELECT ST_SRID(`column_title`) FROM `demo_table`;

    ```


    MySQL 仅支持 MyISAM 存储引擎的 RTREE 索引——MariaDB 也将 Aria 存储引擎列入支持列表。


    至于哈希索引，它们与 MEMORY 和 InnoDB 存储引擎一起工作。此类索引不支持基于前缀的查询，只与精确匹配运算符一起使用，也不支持 `ORDER BY`
    子句，但通常来说，由于数据存储在内存中，它们异常快速。


    此类索引没有很多用例，但有时可能对测试是必要的：当使用 MEMORY 存储引擎时，其所有数据都保存在内存中，并在关闭时销毁；当使用 InnoDB 存储引擎时，此类索引仍然可用，但在后台被转换为
    B-tree 索引。


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig19_HTML.jpg)


    图 11-19


    在表上添加哈希索引


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig20_HTML.jpg)


    图 11-20


    哈希索引变成了 B-tree 索引


    换句话说，如果你在存储引擎的列上定义哈希索引，InnoDB 不会报错——它很可能会将你的哈希索引更改为 b-tree 索引，因为它认为哈希索引与 b-tree
    索引作用相同，因此不需要单独的定义。


    聚簇索引有点不同——此类索引可以被你的查询使用，但在大多数情况下，MySQL 及其同类将此类索引视为主键。换句话说，聚簇索引是一个包含自动递增值并定义为带有
    `auto-increment` 选项的主键的 B-tree 索引。此类索引可以且将会遵循 B-tree 索引规则被使用。'
  raw: 'Composite indexes are not very complex to understand – to use them, we have
    to use one or more of the columns in the index in an order that we specify. The
    aforementioned index specification would satisfy queries that make use of the
    `col_1` column, both `col_1` and `col_2` columns, or all three columns combined.


    Now, time for examples once again. I’ll use the covering index again, but I’ll
    start by renaming it by running a query like this – it’s pretty self-explanatory:


    ```

    ALTER TABLE `database`.`table` RENAME INDEX `covering_idx` TO `composite_idx`;

    ```


    That means that now our table has a composite index consisting of two columns
    – `username` and `details` (we can have up to 16) – upon inspection, MariaDB should
    return “MUL” in the Key column for the first column in a multicolumn index.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig15_HTML.jpg)


    Figure 11-15


    “MUL” for multicolumn index in MariaDB


    Let’s try them out.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig16_HTML.jpg)


    Figure 11-16


    Composite indexes: Round 1


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig17_HTML.jpg)


    Figure 11-17


    Composite indexes: Round 2


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig18_HTML.jpg)


    Figure 11-18


    Composite indexes: Round 3


    We have results!


    You can see that no matter if we query the `username` column and the `details`
    column or the `details` column and the `username` column, our database is still
    able to use the index. Sometimes MariaDB did consider using the index but decided
    not to because it thought the query could be completed faster without it, and
    on one occasion MariaDB returned with a note that said `Impossible WHERE noticed
    after reading const tables`. This error can be rather confusing for some, but
    it essentially means that no row that satisfied one or more criteria in your `WHERE`
    clause was found in your table. In other words, you’ve most likely checked for
    something that you weren’t supposed to be checking for (a `NULL` value in a `NOT
    NULL` column or the other way around), or one clause didn’t match any records
    so MariaDB didn’t bother with the rest.


    Covering indexes are certainly interesting, and they can be used when certain
    clauses are in use, too – `ORDER BY` will work best if you search for the leftmost
    column, then order by the rest using `ORDER BY` with an equality operator. Covering
    indexes can also be scanned backward.


    ### Prefix Indexes


    Covering and composite indexes are nice – what about situations where you don’t
    have enough space to index an entire column though? In these situations, you would
    need to make use of a prefix index – an index that only covers some characters
    within a column and thus is rather small compared to other indexes but still provides
    enough selectivity for it to be a viable option.


    Prefix indexes are defined like usual indexes, just with numbers denoting how
    many characters in a column should be covered. This example would add a prefix
    index on the first 10 characters of the demo_column in the demo_table:


    ```

    ALTER TABLE `demo_table` ADD INDEX `prefix_idx`(demo_column(10));

    ```


    As you can tell, indexes defined in this way would be less selective, but still
    provide a viable performance benefit if defined properly. That’s kind of the whole
    point – *the challenge is defining them properly.* Aside from prefix indexes using
    less space on the disk, they will also be a necessity for those indexing `BLOB`
    or `TEXT` data types – due to their size, such data types necessitate prefix indexes
    to be defined no matter whether you want to define them or not.


    Prefix indexes are tedious to some – developers often find the task of finding
    an adequate index length too much to bear because they don’t have “rules” to follow
    to find a golden medium.


    Finding a good prefix index length isn’t rocket science though – a simple approach
    you can take involves taking a deeper dive into your use case and finding the
    average length of the rows concerned with it. The average length of rows should
    be a good starting point – aim for the length to be long enough so that its results
    would be as similar to an index on the entire column, but don’t cover the entire
    column to save space on the disk.


    Defining an ideal prefix index takes practice, and since such indexes can only
    be used for “vanilla” SQL queries and don’t cover all of the values in a column,
    they cannot be used as covering indexes. Partial indexes cannot use the `ORDER
    BY` or `GROUP BY` clauses, and as such, they are not ideal for every use case
    either.


    ### Spatial (R-Tree), Hash, and Clustered Indexes


    Aside from prefix indexes, there is a possibility of you having a use case for
    spatial indexes, too. Some of you may have not even heard of them, and that’s
    OK; spatial indexes have a very special task to fulfill – they index geometric
    data, and as such, columns using those kinds of indexes must store spatial data
    based on the `POLYGON`, `LINESTRING`, or `MULTIPOINT` data types. The definition
    of a spatial index necessitates the `SPATIAL` keyword in between:


    ```

    ALTER TABLE `demo_table` ADD SPATIAL INDEX `spatial_idx`(`column`);

    ```


    Spatial indexes work similarly to B-tree indexes in that they also make searches
    for exact values faster.


    Spatial indexes work through Spatial Reference Identifiers (SRIDs) – these identifiers
    are ID values that are associated with geometric values, and to optimize data
    while working with spatial indexes, it’s recommended to verify that all values
    within a column have the same SRID by running a SQL query like so:


    ```

    SELECT ST_SRID(`column_title`) FROM `demo_table`;

    ```


    MySQL only supports RTREE indexes with the MyISAM storage engine – MariaDB includes
    the Aria storage engine in the list as well.


    As far as hash indexes are concerned, they work with the MEMORY and InnoDB storage
    engines. Such indexes don’t support prefix-based queries, only work with exact
    match operators, and do not support the `ORDER BY` clause either, but as a rule,
    are exceptionally fast due to the data being stored in memory.


    Such indexes don’t have many use cases, but may sometimes be necessary for testing:
    when the MEMORY storage engine is in use, all of their data is held in memory
    and is destroyed upon shutdown, and when the InnoDB storage engine is in use,
    such indexes are still usable but are converted to B-tree indexes behind the scenes.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig19_HTML.jpg)


    Figure 11-19


    Adding a hash index on a table


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig20_HTML.jpg)


    Figure 11-20


    Hash index is a B-tree index


    In other words, InnoDB won’t error out if you define hash indexes on columns within
    the storage engine – it’s likely to change your hash index into a b-tree index
    instead because it thinks that hash indexes do the same thing as b-tree indexes,
    so there’s no need for a distinct definition.


    Clustered indexes are a little different – such indexes can be used by your queries,
    but in most cases, MySQL and its counterparts consider such indexes to be primary
    keys. In other words, a clustered index is a B-tree index that contains automatically
    incrementing values and is defined as a primary key with an auto-increment option.
    Such indexes can and will be used in adherence to B-tree indexing rules.'
