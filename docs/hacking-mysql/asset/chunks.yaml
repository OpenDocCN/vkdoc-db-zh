    ## Partitioning Tips: Subpartitioning, Limitations, NULL Values, and More'
  trans: '## 创建分区表示例


    ```sql

    CREATE TABLE `demo_partitioned` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` SMALLINT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY RANGE (work_department_id) (

    PARTITION p0 VALUES LESS THAN (5),

    PARTITION p1 VALUES LESS THAN (10),

    PARTITION p2 VALUES LESS THAN (15),

    PARTITION p3 VALUES LESS THAN (20),

    PARTITION p4 VALUES LESS THAN (25),

    PARTITION p5 VALUES LESS THAN (30)

    );

    ```


    ## 范围分区


    你认为这里发生了什么？我们将 `work_department_id` 列分成了六个独立的分区（`p0` 也是一个分区——我们只是从 0 开始计数）。所有小于
    5 的值都存储在名为 `p0` 的分区中，小于 10 的值存储在 `p1` 分区中，依此类推。这种方法默认会使我们的表变大（96kB 而不是 16kB），但也使得数据驻留在六个独立的“子表”中。


    ![](img/625040_1_En_12_Fig4_HTML.jpg)


    **图 12-4**


    分区表更大。


    在使用分区时，你应该注意的一点是，当对列进行分区时，如果明确定义了复合索引，那么用于分区表达式的列必须是唯一键的一部分。这意味着，如果你在表中包含 `id`
    列并尝试以相同方式对表进行分区，可能会遇到如下错误：


    ```

    #1503 – A PRIMARY KEY must include all columns in the table''s partitioning function

    ```


    回到范围分区，一切都很直观：值 27 将存储在名为 "p5" 的分区中，值 3 将存储在名为 `p0` 的分区中，等等。如果我们插入一个超出分区范围的值，将会出现错误。可以通过添加一个值为
    `MAXVALUE` 的额外分区来解决此类错误——换句话说，就是容纳所有剩余的值：


    ```sql

    PARTITION p6 VALUES LESS THAN MAXVALUE

    ```


    从现在起，任何与分区 0 到 5 中定义的值不匹配的值都将驻留在分区 6 中。如果你使用这种方法，请注意不要在 `MAXVALUE` 分区中放入过多值；这种方法是有益的，但仅在你所有其他分区协同工作时才有益。如果你只有两个分区，而
    `MAXVALUE` 分区容纳了总值的 90%，那就说明有问题，你应该重新考虑你的方法。


    除此之外，范围分区也可以考虑字符串值——这时，可以使用 `RANGE COLUMNS` 分区代替 `RANGE` 分区，一切看起来会像这样：


    ```sql

    CREATE TABLE `demo_partitioned` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` VARCHAR(20) NOT NULL DEFAULT '''',

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY RANGE COLUMNS (work_department_id) (

    PARTITION p0 VALUES LESS THAN (''a''),

    PARTITION p1 VALUES LESS THAN (''b''),

    PARTITION p2 VALUES LESS THAN (''c''),

    ...

    PARTITION p3 VALUES LESS THAN MAXVALUE

    );

    ```


    注意 `work_department_id` 列现在具有 `VARCHAR` 数据类型。


    ## 列表分区


    `LIST` 分区也相当直观：这种分区类型让我们可以根据值来定义分区键。分区表达式必须是列值或基于列值的、返回整数值的表达式。这是一个例子（注意，如果提供整数作为分区键，并且该列有默认值，则默认值也应该是整数）：


    ```sql

    CREATE TABLE `demo_partitioned_list` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` INT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY LIST(work_department_id) (

    PARTITION p0 VALUES IN (1,3,5,7),

    PARTITION p1 VALUES IN (2,4,6,8),

    PARTITION p2 VALUES IN (10,12,14,16),

    PARTITION p3 VALUES IN (11,13,15,17)

    );

    ```


    这样的分区定义会产生四个分区，并且如前所述，与分区中定义的值不匹配的值将被拒绝。


    ![](img/625040_1_En_12_Fig5_HTML.jpg)


    **图 12-5**


    给定值没有对应的分区


    当然，可以改用 `INSERT IGNORE INTO`，但如果你选择这种方法，不要惊讶某些值会丢失。


    ![](img/625040_1_En_12_Fig6_HTML.jpg)


    **图 12-6**


    分区中没有值


    如果 `LIST` 分区不适合你，或者你使用的列的数据类型不是整数，请记住 `LIST COLUMNS` 分区也是可行的。


    ## 哈希分区


    `HASH` 分区也并非不同寻常——这种分区类型使我们能够均匀地拆分表中的值。我们只需定义一个指定适用分区数量的整数，然后 MySQL 会将适用的值均匀地分配到所有分区中：


    ```sql

    CREATE TABLE `demo_partitioned_hash` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` INT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY HASH(salary)

    PARTITIONS 4;

    ```


    哈希分区免去了你指定存储值的分区的负担——你的数据库会为你决定。


    关于哈希分区，Stack Overflow 上有过讨论，称可以通过运行如下查询来确定哈希分区的名称（这里 `[input]` 指定你的输入，`[number]`
    是分区数量）：


    ```sql

    SELECT partition_name from information_schema.partitions

    where table_name = ''table_name''

    and partition_ordinal_position = 1+ ABS(MOD([input], [number]));

    ```


    ## 键分区


    最后，我们有键分区。按键分区的工作方式与按哈希分区几乎相同，唯一的区别是使用的分区函数。当使用键分区时，该函数将从服务器派生。此外，请记住，当使用键分区时，用作分区表达式一部分的所有列必须构成主键的一部分或全部，并且我们还必须指定所需的分区数量。键分区如下所示：


    ```sql

    CREATE TABLE `demo_partitioned_key` (

    `id` INT(20) NOT NULL AUTO_INCREMENT PRIMARY KEY,

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` INT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY KEY(id)

    PARTITIONS 2;

    ```


    ## 分区的好处与数据修剪


    无论使用何种分区类型，你的数据库都会使用分区函数来确定将数据放入哪个分区。分区的主要好处之一是它可以帮助你的数据库将大型数据集拆分为更小的块，以便你的应用程序更轻松地“吸收”或使用。此外，请记住，某些分区类型会限制你可以使用的数据类型。


    除了帮助更快地访问数据外，分区还可用于数据修剪。


    ![](img/625040_1_En_12_Fig7_HTML.jpg)


    **图 12-7**


    修剪分区中的数据


    如果你的表已分区，并且你发现自己处于知道结果将在一个或多个分区中，并且知道某些分区是不必要的场景，那么移除分区将有助于回收磁盘上的一些空间。


    查询优化器也可以执行分区修剪，当查询使用任何等号（`=`、`<`、`>`、`<=`、`>=` 或 `<>`）或 `IN` 子句时，优化器将仅扫描包含该值的分区中的数据。如果你使用这种方法进行分区修剪，数据本身不会从分区中删除——它们只是不会被搜索。


    ## 分区技巧：子分区、限制、NULL 值等'
- fmt: '## MySQL分区：关键概念与操作


    当谈到分区时，MySQL及其同类产品确实有一个特殊的技巧：在这个领域需要记住的第一条规则是，作为DBMS，`MySQL treats` `NULL` `values
    as being less significant than other values`。这并不意味着`NULL`值不被存储在分区中——它们确实会被存储——但某些类型的MySQL分区处理`NULL`值的方式与其他类型不同。


    ### 不同分区类型对NULL值的处理

    如果使用`RANGE`分区，请记住，用于确定分区的任何`NULL`值都将被插入到最低可能的分区中。`LIST`分区如果其列表中包含`NULL`值，则允许插入`NULL`值。对于按`HASH`或`KEY`分区的表，如果插入的值产生`NULL`，则该值被视为零（0）。


    ### 理解子分区

    子分区是另一个你应该记住的相当有趣的概念——如果我们对分区进行再分区，那就是子分区。子分区是明确定义的，通常看起来像这样：


    ```sql

    CREATE TABLE `demo_subpartitioned` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `join_date` DATE NOT NULL,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY RANGE(YEAR(join_date))

    SUBPARTITION BY HASH(salary)

    (

    PARTITION p0 VALUES LESS THAN (60000),

    PARTITION p1 VALUES LESS THAN (80000),

    PARTITION p2 VALUES LESS THAN MAXVALUE

    );

    ```


    在这个例子中，我们按范围对`join_date`进行分区，然后为`salary`添加子分区。在定义任何分区（包括子分区）时，我们需要遵守所有分区规则（见下文）。


    ### 定义分区的关键规则

    在定义分区时，请记住几条关键规则：


    1.  截至MySQL 8.4，只有`InnoDB`和`NDB`存储引擎支持分区。MariaDB增加了更多存储引擎——它们是`MERGE`、`SPIDER`和`CONNECT`。


    2.  分区是你表内的表，但SQL层仍将“粘合一切”，不会按分区显示单独的表。可以通过运行`SHOW CREATE TABLE`或`SHOW TABLE STATUS`查询来观察分区。


    3.  分区有几种类型——按范围分区允许我们为落在给定范围内的数据定义单独的分区，按范围列分区允许用户提供MySQL应按范围分区的列列表，按列表分区接受值列表作为分区键，按哈希分区确保数据在多个分区中均匀分布，按键分区将内部哈希函数作为分区键。


    4.  分区有其限制（见上文）。


    5.  分区不仅对补充搜索操作有用——它们可以被“修剪”，从而释放磁盘空间并清除分区内的数据。


    6.  如果使用`VALUES LESS THAN`，则必须以严格递增的方式定义值。


    7.  分区可以与索引一起使用，反之亦然。如果一个表同时使用分区和索引，其大小将比通常大得多，但同时，你的数据库在读取数据时会更容易。


    8.  `MAXVALUE`意味着“其他分区中未定义的所有内容”。


    ### 索引与分区的结合

    明智的做法是稍作停顿，关注一下索引——分区是数据的划分，但仍被数据库视为一个完整的数据集。因此，*被分区的列也可以被索引*——同时使用分区和索引可以将你的查询性能提升到难以想象的水平。为了理解这个概念，考虑一个有10亿行的表：举例来说，我们假设该表中的所有行平均分布在10个分区中：这已经是10亿行表中有1亿行被分离出来（记住——你的数据库将分区视为表）。索引将通过排序数据并知道在搜索时访问数据的哪个子集来进一步最大化`SELECT`查询的效率。换句话说，没有索引或分区，你的数据库将不得不读取100%的数据，仅使用分区，这个比例会下降到10%甚至更少（取决于指定了多少个分区），而索引将帮助对这10%的数据进行排序，以便你的数据库在搜索特定行时访问更少的数据。


    ### 分区与表的相互转换

    另一个需要注意的点是，MariaDB允许你将分区转换为表，反之亦然。如果我们使用像`CONVERT PARTITION ... TO TABLE ...`这样的查询，我们的分区将被转换为表；如果我们使用像`CONVERT
    TABLE ... TO [partition definition]`这样的查询，我们的表将被转换为分区。此功能在MariaDB 10.7及更高版本中可用。参见下文示例。


    ![图12-8 将分区转换为表](images/625040_1_En_12_Chapter/625040_1_En_12_Fig8_HTML.jpg)


    图12-8 将分区转换为表


    将表转换为分区也是同样的道理。


    ![图12-9 将表转换为分区](images/625040_1_En_12_Chapter/625040_1_En_12_Fig9_HTML.jpg)


    图12-9 将表转换为分区


    ### 分区的维护操作

    请记住，分区像表一样，也可以通过查询进行分析、检查、修复或优化，如下所示：


    ```sql

    ALTER TABLE [table_name] ANALYZE|CHECK|REPAIR|OPTIMIZE PARTITION [partition names];

    ```


    ![图12-10 分析、检查、修复和优化分区](images/625040_1_En_12_Chapter/625040_1_En_12_Fig10_HTML.jpg)


    图12-10 分析、检查、修复和优化分区


    ### 分区的重组

    分区可以被重组——一个分区可以被拆分成多个分区，与现有分区合并，或重命名。哦，你也可以改变它们的内部结构（即它们覆盖的值）。


    分区可以像这样拆分：


    ```sql

    ALTER TABLE `table_name` REORGANIZE PARTITION `p1` INTO (

    PARTITION `reorg_p1` VALUES LESS THAN (2000),

    PARTITION `reorg_p2` VALUES LESS THAN (3000)

    );

    ```


    像这样合并：


    ```sql

    ALTER TABLE `table_name` REORGANIZE PARTITION `p0`,`p1` INTO (

    PARTITION p2 VALUES LESS THAN (3000)

    );

    ```


    以及像这样重命名：


    ```sql

    ALTER TABLE `table_name` REORGANIZE PARTITION `p0` INTO (

    PARTITION `p0_renamed` VALUES LESS THAN (1000)

    );

    ```


    最后，你还可以减少列中的分区数量。为此，请使用`COALESCE PARTITION`语句（此语句适用于所有分区作为一个整体，而非任何单个分区）：


    ```sql

    ALTER TABLE `demo_table` COALESCE PARTITION 2;

    ```


    ### 分区的限制

    在你涉足分区领域之后，请记住分区有其独特的一些限制：


    1.  不能使用存储过程、函数或用户定义变量作为分区表达式。

    2.  除`NDB`外的所有存储引擎最多支持8192个分区。对于`NDB`，数量取决于所使用的`NDBCluster`版本。

    3.  分区表达式不允许使用运算符`|`、`&`、`^`、`<<`、`>>`或`~`。

    4.  `InnoDB`上的分区表不支持外键。

    5.  `ALTER TABLE ORDER BY`——如果我们在分区列上运行像`ALTER TABLE ORDER BY`这样的语句，我们应该注意，只有分区列内的值才会被排序。

    6.  无法在分区表上添加`FULLTEXT`索引。

    7.  不能使用`ENUM`数据类型来表示分区键。

    8.  分区键不能是子查询。

    9.  不能分区日志表。'
  raw: 'When it comes to partitioning, MySQL and its counterparts do have a special
    trick up their sleeves: the first rule to remember in this realm is that as a
    DBMS, *MySQL treats* *NULL* *values as being less significant than other values.*
    That doesn’t mean that `NULL` values are not stored in partitions – they are –
    but some types of MySQL partitioning treat `NULL` values differently than others
    do.


    If you use partitioning by `RANGE`, bear in mind that any `NULL` values used to
    determine the partition will be inserted into the lowest possible partition. Partitioning
    by `LIST` will allow `NULL` values to be inserted if one of its lists contains
    `NULL` values. For tables partitioned by `HASH` or `KEY`, if a value that yields
    `NULL` is inserted into a partition, the value is treated as if it’s a zero (0).


    Subpartitioning is another rather interesting thing you should keep in mind –
    if we partition partitions, we subpartition. Subpartitions are explicitly defined
    and often look something like this:


    ```

    CREATE TABLE `demo_subpartitioned` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `join_date` DATE NOT NULL,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY RANGE(YEAR(join_date))

    SUBPARTITION BY HASH(salary)

    (

    PARTITION p0 VALUES LESS THAN (60000),

    PARTITION p1 VALUES LESS THAN (80000),

    PARTITION p2 VALUES LESS THAN MAXVALUE

    );

    ```


    In this example, we partition the join_date by range and then add a subpartition
    for the salary. When defining any partition including subpartitions, we need to
    adhere to all of the rules of partitioning (see below).


    Finally, when defining partitions, remember a couple of key rules:


    1.  As of MySQL 8.4, partitioning is only supported by the InnoDB and NDB storage
    engines. MariaDB adds more storage engines to the mix – they are MERGE, SPIDER,
    and CONNECT.


    2.  Partitions are tables within your table, but the SQL layer will still “glue
    everything together” and won’t display separate tables per partition. Partitions
    can be observed by running the `SHOW CREATE TABLE` or `SHOW TABLE STATUS` queries.


    3.  Partitions have a couple of types – partitioning by range lets us define separate
    partitions for data falling within a given range, partitioning by range columns
    lets users provide a list of columns that MySQL should partition by range, partitioning
    by list accepts a list of values as partitioning keys, partitioning by hash ensures
    an even distribution of data across several partitions, and partitioning by key
    takes an internal hashing function as the partitioning key.


    4.  Partitioning has limitations (see above).


    5.  Partitions are not only useful to supplement search operations – they can
    be pruned, thus freeing up space on the disk and getting rid of the data inside
    of partitions, too.


    6.  If you use `VALUES LESS THAN`, you must define values in a strictly increasing
    manner.


    7.  Partitions can be used with indexes and vice versa. If a table uses both partitions
    and indexes, its size will be significantly larger than usual, but at the same
    time, your database will have an easier time reading data.


    8.  `MAXVALUE` means “everything not defined in other partitions.”


    It’s wise to stop at indexing for a second – partitions are divisions of data
    that are still treated as a whole data set by your database. As such, *columns
    that are partitioned can also be indexed* – and using both partitions and indexes
    can boost your query performance to levels you can’t even imagine. To understand
    the concept, consider a table with 1 billion rows: for the sake of an example,
    we’ll say that all rows within that table are split equally across 10 partitions:
    that’s already 100 million rows in a table separated from the rest (remember –
    your database treats partitions as tables). Indexing will help further maximize
    the efficiency of your `SELECT` queries by sorting data and knowing what subset
    of the data to access when you search for it. In other words, without indexes
    or partitions, your database would have to read through 100% of the data, with
    partitions alone that percentage drops down to 10% or even less (depending on
    how many partitions are specified), and indexes will help sort that 10% of data
    to help your database access even less data when searching for a specific row.


    Another thing to note is that MariaDB allows you to convert partitions to tables
    and vice versa. If we use a query like `CONVERT PARTITION ... TO TABLE ...,` our
    partition will be converted into a table, and if we use a query like `CONVERT
    TABLE ... TO [partition definition],` our table will be converted into a partition.
    This feature is in place in MariaDB starting from MariaDB 10.7\. See example below.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Converting a partition into a table


    The same can be said about converting tables into partitions, too.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Converting a table into a partition


    Keep in mind that partitions, like tables, can also be analyzed, checked, repaired,
    or optimized with a query like so:


    ```

    ALTER TABLE [table_name] ANALYZE|CHECK|REPAIR|OPTIMIZE PARTITION [partition names];

    ```


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Analyzing, checking, repairing, and optimizing a partition


    Partitions can be reorganized – a partition can be split into multiple partitions,
    merged with existing partitions, or renamed. Oh, and you can change their internal
    structure (i.e., what values they cover) too.


    Partitions can be split like so:


    ```

    ALTER TABLE `table_name` REORGANIZE PARTITION `p1` INTO (

    PARTITION `reorg_p1` VALUES LESS THAN (2000),

    PARTITION `reorg_p2` VALUES LESS THAN (3000)

    );

    ```


    Merged like so:


    ```

    ALTER TABLE `table_name` REORGANIZE PARTITION `p0`,`p1` INTO (

    PARTITION p2 VALUES LESS THAN (3000)

    );

    ```


    And renamed like so:


    ```

    ALTER TABLE `table_name` REORGANIZE PARTITION `p0` INTO (

    PARTITION `p0_renamed` VALUES LESS THAN (1000)

    );

    ```


    Finally, you can also reduce the number of partitions from a column. To do that,
    make use of the `COALESCE PARTITION` statement (this statement applies to all
    partitions as a whole, not to any single partition):


    ```

    ALTER TABLE `demo_table` COALESCE PARTITION 2;

    ```


    After you have dipped your toes in the partitioning water, also keep in mind that
    partitioning has a couple of limitations unique to itself:


    1.  You cannot use stored procedures, functions, or user-defined variables as
    partitioning expressions.


    2.  All storage engines excluding NDB support up to 8,192 partitions. For NDB,
    the number depends on the version of NDBCluster in use.


    3.  Partitioning expressions don’t allow the operators `|`, `&`, `^`, `<<`, `>>`,
    or `~.`


    4.  Partitioned tables on InnoDB don’t support foreign keys.


    5.  `ALTER TABLE ORDER BY` If we run statements like `ALTER TABLE ORDER BY` on
    a partitioned column, we should be mindful that only values within a partitioned
    column will be ordered.


    6.  Adding `FULLTEXT` indexes on a partitioned table is impossible.


    7.  One cannot use the `ENUM` data type to denote partitioning keys.


    8.  A partitioning key cannot be a subquery.


    9.  You cannot partition log tables.'
