    data sets and a thing or two about indexing, partitioning, backups and replication,
    it’s high time to learn how to optimize your database management system for security,
    isn’t it?'
  trans: '

    因此，复制技术并不复杂——它也不是备份的替代品。确实，复制会将数据复制到另一台服务器，这与备份操作非常相似，但任何形式的复制与备份之间的核心区别在于：一旦主服务器上的数据更新，副本服务器上的数据也会随之更新。


    ## 保护复制安全


    当你了解了复制的内部机制后，不可避免地会考虑到所复制数据的安全性。为了确保对业务至关重要的资产——数据——的安全，必须事先采取安全和隐私保护措施，并根据复制的特性来采取行动。


    为确保数据传输安全，请确保在主服务器上启用了 SSL/TLS，更好的做法是在主服务器和副本服务器上都启用。启用 TLS 并不困难，可以通过 `my.ini`（Linux
    系统中为 `my.cnf`）配置，或通过执行 `status` 等简单 SQL 查询的输出来查看。


    ![](img/625040_1_En_14_Fig3_HTML.jpg)


    图 14-3：MariaDB 中 `status` 命令的输出


    注意 SSL 部分——如果使用了 SSL，你会看到不同的输出，例如 `Cipher in use is DHE-RSA-AES256-SHA` 或类似信息。


    你也可以通过配置文件确认服务器是否使用了 SSL：打开配置文件，如果在 `[mariadb]` 标签下看到 `ssl_cert`、`ssl_key` 和 `ssl_ca`
    等 TLS 系统变量定义，那就没问题了。


    `status` 命令的输出也很有用，因为它提供了数据库、连接和客户端的字符集、运行时间，以及可用于连接 MariaDB 的 TCP 端口（对于使用 MariaDB
    支持 WordPress、vBulletin、IPBoard 或 MyBB 等内容管理系统的用户来说，端口信息可能很有用）。


    无论如何，如果你的服务器使用了 SSL，可能需要通过执行 `CHANGE MASTER` 查询来告诉 MariaDB 在复制设置中使用 TLS——为此，可以查看
    `MASTER_SSL`、`MASTER_SSL_CA`、`MASTER_SSL_CAPATH`、`MASTER_SSL_CERT`、`MASTER_SSL_KEY`、`MASTER_SSL_VERIFY_SERVER_CERT`
    以及其他可在 `CHANGE MASTER` 查询中使用的 TLS 相关选项。


    设置好这些选项，应该就可以正常工作了——真的就这么简单。


    当然，如果适用，你还需要遵守 HIPAA 和 GDPR 等隐私标准，但我会在本书最后一部分介绍安全时，为你揭示其中的奥秘。


    ## 总结


    复制是一头难以驯服的野兽——它形态各异，本质上是一种有助于确保数据可用性的过程。复制有几种类型，可以复制行或 SQL 语句，与所有数据库相关的事物一样，复制也有其独特的问题，但无论如何，它是一种完美的机制，可以确保数据“存在于”另一台服务器上，而无需手动干预。


    然而，复制并非数据库唯一的朋友——安全也至关重要。听说过最近的数据泄露事件吗？是的——它们很可怕。十多年前的泄露事件也并不“更好”，影响数千万甚至上亿人，在这样的环境中，如果你不想看到公司名字出现在下一次重大数据泄露的新闻中，妥善保护数据库就至关重要。


    # 15. 安全优化


    现在，你已经对存储引擎、导致 MariaDB 实例及其中查询出错的因素、如何理解服务器并优化服务器、如何优化特定存储引擎、模式、数据类型、排序规则和查询本身、如何为更大数据集优化
    MariaDB，以及索引、分区、备份和复制等有了一定了解，那么是时候学习如何为安全优化你的数据库管理系统了，不是吗？

    '
- fmt: 'Security is paramount – it’s the reason some of you’ve picked this book up
    in the first place, isn’t it? Perhaps you’ve even suffered a data breach and have
    been recommended this book to know how to deal with security issues surrounding
    your MySQL or MariaDB instance?


    ## Understanding Security in MariaDB


    I’ll begin by stating the obvious – securing MariaDB and MySQL in general isn’t
    nearly as hard as you think it is. Sure, there are certain specifics related to
    MariaDB you will need to know, but in general, security-related issues can be
    split into a couple of categories:


    1.  General security guidelines

    2.  Access control

    3.  User security

    4.  Security-related components and plugins

    5.  Enterprise-level security controls


    Would you look at that – so many categories, right? I agree that categories in
    the MariaDB security realm may seem to be few and far between, but when you think
    about it, every MariaDB security issue has its roots somewhere in one or more
    of those categories and as you read along, you should be able to quickly understand
    that this is indeed the truth.


    Let’s begin by looking into your database in general – the first thing you need
    to inspect from a security standpoint would be the classes of data your database
    is storing. That can be done by having a closer look into your use case in general
    – assuming you use MariaDB to house a forum where users interact with one another
    (CMS), your database will contain multiple tables, of which


    *   Some will contain log data.

    *   Some will contain attachments and data related to them (their types, who attached
    what, etc.).

    *   Some will contain ban filters.

    *   Some will contain data related to anti-spam operations (think CAPTCHAs, etc.).

    *   Some will contain forum event-related data.

    *   Some will contain user group data (i.e., data on ordinary users, moderators,
    administrators, VIP users or donators, other user groups, etc.).

    *   Some will contain details on the users themselves (user ranks, usernames,
    email addresses, infraction details, messages sent/received, hashed and salted
    passwords, administrative remarks, etc.).

    *   Some will contain details related to the installation of the CMS and whether
    the installation is locked or not, etc. (once the installation is finished, many
    content management systems lock the directory for it not to be accessible from
    the outside).

    *   Some will contain details relevant to the documentation of the CMS.

    *   Some may contain data on polls that have been created on the forum and what
    users voted on what polls during what time, etc.

    *   Some may contain data relevant to the reputation of the users (e.g., a reputation
    of 100% may mean a “clean slate,” while a reputation of 20% means you should double-check
    the advice given by the user because many users reported him for something).

    *   Some may contain data related to the threads and messages sent and received
    through the forum.

    *   Some will contain message and attachment metadata or similar things.


    Thus, even though you may think your forum isn’t very popular compared to other
    forums, the forum will still have data you need to take care of and secure. There’s
    still something for attackers to steal!


    Granted, many attackers will only be interested in the `user` table of your forum
    and the details within (stolen data is what brings “revenue” to the business of
    the attackers since the data is often sold on the dark web and then re-used for
    identity theft, credential stuffing, and other types of attacks), but other data
    classes shouldn’t be discounted either – taking the 2015 Experian data breach
    as an example, the data breach was said to have included not only sensitive user
    login information, but also user genders, income levels, phone numbers, addresses,
    credit status information, family details, and many other sensitive data classes.
    Other data breaches may include the aforementioned threads and posts within the
    forum, messages that have been sent back and forth over the years, and so on.


    What I’m trying to say here is the things that are included in your database depend
    on your use case – you would need to protect everything inside of a database to
    begin with, but for a CMS use case, you would need to pay extra attention to SSL,
    the password hashing function that is being used, whether passwords are salted,
    and what kind of user data is stored.


    Start from your user table because user data brings the most value to a potential
    attacker (as stated before, user data can be and often is sold to other nefarious
    parties and the data is then used for identity theft attacks) – review the password
    hashing function that is being used, whether your hashes are salted (salts slow
    down password cracking when a lot of hashes are being cracked), and try to look
    at everything from the standpoint of a hacker – if *you* would be an attacker,
    what would you do and what data would be of value to you? Ask any security expert,
    and you will quickly receive advice saying that there have been stolen user databases
    (read: user tables attackers have acquired from a bigger data set and parsed them
    before selling them off) sold on the dark web for tens of thousands of dollars:
    what makes you think your database/use case will not be worth “looking into?”


    After the user table, inspect other tables storing data of interest to a potential
    nefarious party (these may include messages and metadata, too – you never know
    what users are chatting about), and then, you will start to have a good picture
    of what security measures already exist and what can be improved.


    The landscape each of you will see will differ – it should differ because no one
    use case is the same, but that’s also what makes security so exciting. For those
    of you running content management systems, the beginnings of security could look
    something like this.


    ![](images/625040_1_En_15_Chapter/625040_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    User registration on a forum from a security standpoint


    Yes, there are many things you need to consider – and all of them have something
    to do with the security categories mentioned above.


    This specific use case, as you can discern already, has more to do with general
    security guidelines, access control, and user security, but a server behind the
    CMS may also be using security-related components and plugins to complete certain
    actions depicted in the graph. Thus, all components of the security chain are
    equally important, and even though each of them may involve your database working
    on different things, they all work in unison to push your database forward on
    the security landscape:


    | Guidelines | What’s Involved? |

    | --- | --- |

    | General security guidelines | Carefully evaluating the use case, then securing
    and hardening the server as a whole during the architecture, design, and implementation
    phases of the project. |

    | Access control | Not letting users access parts of the forum they shouldn’t
    be able to access, usergroups, warnings, reputation, and related things. |

    | User security | Hashing/salting passwords using a secure mechanism such as `BCrypt`
    or `Blowfish` and advising users on how to further the security of their account
    when registering on the forum and once they have registered. |

    | Components and plugins related to security | Installing and setting up plugins
    and appliances that work in conjunction with the CMS to perform a wide range of
    duties starting from not allowing users to upload certain types of files via upload
    forms that may be available on the forum (.exe, .pdf, .php, files having a double
    extension, etc.) to informing administrators of unauthorized access via email
    or SMS and locking down the entire forum once a data breach is detected by the
    appliance. |


    However, regardless of what your use case is, you’re going to start securing your
    MariaDB installation from the bottom, and you’re on the bottom once you decide
    to *install* MariaDB.


    ## Securing MariaDB upon Installation'
