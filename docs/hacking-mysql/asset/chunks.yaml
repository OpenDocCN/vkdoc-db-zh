    不过请记住，如果你指定了`COPY`之外的算法，MariaDB 不会将其解读为“我必须使用用户指定的算法”。相反，它会将你对算法的决定视为你所能接受的最低效算法，这就是为什么我也在上文提到了各种算法：这意味着如果你选择`INPLACE`作为首选方案，MariaDB
    可以自由选择从`INPLACE`到`INSTANT`之间最高效的算法来执行操作——换句话说，它可以选择使用这三种算法中的任何一种。MariaDB 这样做是因为并非所有算法都支持某些特定操作。例如，如果你正在向表中添加列，只有当你要添加的列是该表的最后一列时，MariaDB
    才能选择`INSTANT`算法。


    在为在线 DDL 操作选择锁时，情况会简单一些——你只有四个选项，如果未指定任何选项，则默认使用`DEFAULT`：


    1.  `DEFAULT`：MariaDB 为你的表选择限制最少的锁。

    2.  `NONE`：MariaDB 根本不会锁定你的表。所有并发的 DML 操作都将按预期运行。

    3.  `SHARED`：MariaDB 将在允许并发 DML 操作的情况下锁定表以供读取，但仅限于只读操作。

    4.  `EXCLUSIVE`：MariaDB 将锁定表以供写入，并且不允许任何并发的 DML 操作。


    在处理 DDL 和 DML 操作时，增加`innodb_buffer_pool_size`也可能有所帮助。由于 InnoDB 缓冲池是主要存储引擎 InnoDB
    的关键组件，它负责在访问时存储表和索引数据，因此缓冲池越大，你的`INSERT`或`ALTER`操作可能完成得越快，特别是当你要修改的表上有索引时。


    ## 导致 MySQL 中 DCL 和 TCL 查询失败的因素


    在控制数据和事务方面，导致这些问题的因素主要与你没有授予用户必要的权限（说实在的——你上一次检查数据库服务器中所有用户的权限是什么时候？），或者在不再需要时没有撤销它们有关。此外，还包括不理解涉及较大数据集的操作可以从延迟`COMMIT`操作中受益（在将任何数据插入数据库之前设置`autocommit=0`，之后再`COMMIT`你的更改），等等。


    要理解，回滚也并不像听起来那么可怕——它们只是将数据库返回到之前状态的操作，但有时它们也可能会失败。如果你听说过“失控的回滚”，你就明白我在说什么了。如果你试图终止一个进程，但它就是不听你的，该怎么办？如果你向你认识的数据库管理员（DBA）询问他们的恐怖故事，他们告诉你一个处于“Sending
    data”状态的进程，他们将其终止了，但它仍保持在那个状态，你会怎么称呼它？这就是*失控的回滚*，因为你的`KILL`操作耗时极长，很可能是因为 InnoDB
    发出的回滚——要解决这个问题，可以尝试将`innodb_force_recovery`设置为 3 以跳过回滚，然后删除导致问题的表。不过，请确保你事先备份了数据。


    ## 为什么查询速度慢？


    现在我们来谈谈数据库领域可能最常被问到的问题：“为什么查询速度慢？”这个问题一直困扰着开发者和 DBA 们。老实说，它很可能也关系到你网站的访客或客户：看看你的支持工单。现在搜索“slow”（慢）或“doesn’t
    load”（无法加载），数一数你收到的工单数量。


    我猜你得到的数字肯定大于 0——如果确实如此，那你现在就有问题了。查询速度慢意味着响应时间长，而响应时间长是性能低下的主要表现。还记得我之前说过什么吗？性能就是响应时间——响应时间越长，对你的数据库、应用程序以及与之相关的每个人来说就越糟糕。


    对，你明白了——你需要高性能的查询。而且要快。我建议从底层解决这类问题——这意味着你首先要问自己的问题不是“如何将查询性能提高到<1 秒？”，而是“为什么我的查询速度慢？”


    想一想——要想出提高查询性能的策略，你必须首先理解是什么导致了它们变慢，对吧？


    那么，回到我们开始的问题——为什么查询速度慢？


    答案很简单，但同时也很复杂——这要看情况。之所以要看情况，是因为不同的开发者以不同的方式“搞砸”了他们的查询：有些是在插入数据时搞砸的，有些是在选择已插入的数据时搞砸的，还有些在更新数据时需要帮助（尤其是当数据集较大时）。


    然而，无论你发现自己需要优化哪种查询，有一个普遍的答案——查询是由其他任务组成的任务。你的查询速度慢，是因为你的主要任务所涉及的子任务完成得慢。要使你的查询性能更快，你需要让这些子任务更快完成，或者让你的数据库完全忽略它们。就是这样。


    好了，现在你得到了为什么查询速度慢的答案：因为其中的子任务速度慢。那么，为什么这些子任务速度慢，它们又是什么？要理解在这一点上是什么破坏了你的查询，你必须进行一些性能剖析（profiling），所以我们现在就来做这件事。


    首先，我们需要告诉数据库，通过为我们运行查询的账户启用监控（可选地，为其他所有人禁用监控）来监控任何运行查询的人。首先，我们禁用监控：


    ```sql

    UPDATE performance_schema.setup_actors SET ENABLED = ''NO'', HISTORY = ''NO''
    WHERE HOST = ''%'' AND USER = ''%'';

    ```


    然后，我们需要修改性能模式中的`setup_actors`表，为我们的特定账户启用监控（将`username`替换为你的用户名）：

    ```sql

    INSERT INTO performance_schema.setup_actors (HOST,USER,ROLE,ENABLED,HISTORY) VALUES(''localhost'',''username'',''%'',''YES'',''YES'');

    ```


    完成后，你需要通过运行以下 SQL 查询来启用语句及其阶段的日志：


    ```sql

    UPDATE performance_schema.setup_consumers SET ENABLED = ''YES'' WHERE NAME LIKE
    ''%events_statements_%'';

    UPDATE performance_schema.setup_consumers SET ENABLED = ''YES'' WHERE NAME LIKE
    ''%events_stages_%'';

    ```


    然后，启用允许监控你的查询的工具（instruments）：


    ```sql

    UPDATE performance_schema.setup_instruments SET ENABLED = ''YES'', TIMED = ''YES''
    WHERE NAME LIKE ''%statement/%'';

    UPDATE performance_schema.setup_instruments SET ENABLED = ''YES'', TIMED = ''YES''
    WHERE NAME LIKE ''%stage/%'';

    ```


    像往常一样执行你的查询（确保它们是在你刚刚启用监控的账户下执行的），然后通过运行这个查询来识别你的查询：


    ```sql

    SELECT EVENT_ID, TRUNCATE(TIMER_WAIT/1000000000000,6) as Duration, SQL_TEXT FROM
    performance_schema.events_statements_history_long WHERE SQL_TEXT LIKE ''%Your
    Query%'';

    ```


    最后，要查看与你的查询相关的信息，将`ID`替换为你的查询 ID，并执行这个查询：


    ```sql

    SELECT event_name AS Stage, TRUNCATE(TIMER_WAIT/1000000000000,6) AS Duration FROM
    performance_schema.events_stages_history_long WHERE NESTING_EVENT_ID = ID;

    ```


    结果将提供大量信息，你可以用来分析你的查询。结果将包含查询的多个阶段，并提供关于查询的特定阶段执行了多长时间的详细信息。

    '
- fmt: '## SQL Query Profiling


    Such an approach works on MySQL and MariaDB since profiling using `SHOW PROFILE`
    has been deprecated since MySQL 5.6.7. There also is a different approach that
    yields the same results and is easier.


    To approach profiling from the other side, employ query profiling by setting `SET
    profiling = 1`, then running a query, issuing `SHOW PROFILES` to select the query
    you need to profile, and finally – `SHOW PROFILE FOR QUERY x` where `x` is your
    query ID. Here’s how everything looks like.


    ![Figure 4-2: Profiling an SQL Query: initializing](images/625040_1_En_4_Chapter/625040_1_En_4_Fig2_HTML.jpg)


    ![Figure 4-3: Profiling an SQL Query: results](images/625040_1_En_4_Chapter/625040_1_En_4_Fig3_HTML.jpg)


    We have 24 status codes to investigate – isn’t that a lot? Keep in mind that for
    newer versions of MySQL, the results can also look a little different and include
    more rows in the set such as "Executing hook on transaction" and "waiting for
    handler commit," but here’s what they mean:


    | ID | Status Code | Explanation |

    | --- | --- | --- |

    | 1 | `Starting` | The database server is initializing the query. |

    | 2 | `checking permissions` | The database server is checking whether our user
    has sufficient permissions to run the query. If that’s not the case, we’re presented
    with an error. |

    | 3 | `Opening tables` | The database server ensures that all tables are open
    to conduct operations on them. |

    | 4 | `After opening tables` | The database server is conducting miscellaneous
    operations after opening tables. |

    | 5 | `System lock` | The database server is waiting for a system lock to be released
    if it’s in place. |

    | 6 | `table lock` | The database server is waiting for a table lock to be released
    if it’s in place. |

    | 7 | `init` | The database server performs initialization processes by flushing
    logs, etc. |

    | 8 | `Optimizing` | The database server is performing internal work to determine
    how to optimize the query in the best way possible. |

    | 9 | `Statistics` | The database server is calculating data related to statistics
    to develop the query execution plan. |

    | 10 | `Preparing` | The database server is preparing to run the query. |

    | 11 | `Unlocking tables` | Necessary tables are being unlocked. |

    | 12 | `Preparing` | The database server is preparing to run the query. |

    | 13 | `Executing` | The database server is executing the query. |

    | 14 | `Sending data` | Our data is being sent to the server for it to return
    the necessary results. |

    | 15 | `End of update loop` | The database server reaches the finish line after
    updating the data. |

    | 16 | `Query end` | The database server finishes executing the query. |

    | 17 | `Commit` | Commit operations are being run – data is saved inside of the
    database. |

    | 18 (2 of such values) | `closing tables` | Tables necessary for our query are
    being closed. |

    | 19 | `Unlocking tables` | Tables are being unlocked. |

    | 20 | `Starting cleanup` | The database server is starting the cleanup process.
    |

    | 21 | `Freeing items` | The database server is freeing resources to deal with
    upcoming queries. |

    | 22 | `Updating status` | The database server is updating its status. |

    | 23 | `Reset for next command` | The database server is getting ready to accept
    upcoming queries. |


    See how many subtasks your query has to accomplish to execute? None of these subtasks
    are there without a reason – and none of them are unnecessary. The more queries
    you run, the more subtasks are on the list. I’ll walk you through how to optimize
    these subtasks in the optimization part of this book – I’ll do that once you understand
    the prerequisites for optimization. You cannot optimize anything that doesn’t
    have a backbone – and for your database, that backbone is your database schema.


    ## Devising the Perfect Schema Design


    Ask 10 DBAs what goes into a perfect schema design, and you will hear 10 different
    things, but most of them will mention normalization, applying efficient constraints
    and indexes, proper relationships between database entities, minimizing disk space
    usage, using proper data types, and so on. The bottom line is that perfect database
    schema design means different things to different people – but is equally important
    no matter what your application is or what data you’re dealing with. To devise
    the perfect schema design, understand the following:


    *   It’s OK if your schema design isn’t perfect now.

    *   You will likely make mistakes in implementing performance-related advice,
    and that’s OK. That’s not the end of the world.

    *   Experience is one of the best teachers you will ever have.

    *   Don’t obsess over coming up with the best schema design ever – simple solutions
    are good, and every schema can be improved further.


    Have a goal of what you’re trying to achieve by modifying your database schema
    and go from there. For most of you, the goal will be related to performance improvement
    or restructurization.


    Once you have a goal in mind, understand that a schema refers to the structure
    of your database. The structure of your database includes everything inside of
    your database – that includes database tables, column types and sizes, attributes,
    all kinds of indexes, partitions, and everything in between. In the MySQL world,
    databases can be also called schemas by themselves – and a schema is the backbone
    for your data. Likely, this backbone won’t be completely straight once you start
    working on it and that’s okay – your schema design isn’t set in stone, and it
    will inevitably evolve once your data set grows and time goes by. Every schema
    can be improved further, but basic advice still stands.


    To begin with, you can create a schema by writing all of its definitions yourself
    or let an SQL client or a framework generate them for you. If you find yourself
    using an SQL client, you will likely have an option to automatically create schemas,
    explore your tables as if they were spreadsheets, and so much more. Make use of
    these features because SQL clients are frequently designed by people who’ve been
    in the industry for at least a decade and who’ve seen databases survive through
    hot and cold. Their database design suggestions provided in the form of outputs
    in an SQL client are likely to supersede anything your neighborhood developers
    say. Such database design suggestions are likely to prevent mistakes you’d otherwise
    make – and if you find yourself using a paid version of the tool, chances are
    that you will also be able to contact a professional team of DBAs to help you
    during a consulting call or two. Did I mention that many such tools can generate
    ERD-like schemas designed precisely for this purpose? Here’s how an ERD schema
    of a popular content management system for forums – MyBB – would look like.


    ![Figure 4-4: ERD schema of a couple of tables in MyBB](images/625040_1_En_4_Chapter/625040_1_En_4_Fig4_HTML.jpg)


    Did I tell you that most of the tables have been exempt from showing? You can
    drag and drop tables for better observability too!


    ERD schemas can be an exceptionally useful tool when observing the posture of
    your databases or creating tables that will contain your most precious data.


    The bottom line is clear – SQL clients can help you create database schemas and
    advise you what to do, make schema recommendations, tell you what things to avoid,
    and even consult you when necessary – but what if you don’t have such a luxury?
    If that’s the case, you need to create your database schema yourself.


    To design a proper database schema, meticulously analyze the requirements of the
    software solution behind your database – consider your project scope, entity specifications,
    and the use case for your project itself. Come up with a sketch of your database
    schema. It doesn’t have to be perfect for now.'
