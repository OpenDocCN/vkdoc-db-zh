    what kind of processor, hard drive, or bandwidth allocation you work with, indexes
    are a specific appliance that “mounts” on your column, and the column “mounts”
    on the disk. Thus, no matter what index type you find yourself using, some of
    its functionality will be directly dependent on the internals of your server.


    Many of us don’t think of this side of indexing. It wouldn’t be fair to blame
    the developers – after all, they’re only doing their work and applying advice
