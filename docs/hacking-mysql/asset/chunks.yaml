    forum, messages that have been sent back and forth over the years, and so on.


    What I’m trying to say here is the things that are included in your database depend
    on your use case – you would need to protect everything inside of a database to
    begin with, but for a CMS use case, you would need to pay extra attention to SSL,
    the password hashing function that is being used, whether passwords are salted,
    and what kind of user data is stored.


    Start from your user table because user data brings the most value to a potential
    attacker (as stated before, user data can be and often is sold to other nefarious
    parties and the data is then used for identity theft attacks) – review the password
    hashing function that is being used, whether your hashes are salted (salts slow
    down password cracking when a lot of hashes are being cracked), and try to look
    at everything from the standpoint of a hacker – if *you* would be an attacker,
    what would you do and what data would be of value to you? Ask any security expert,
    and you will quickly receive advice saying that there have been stolen user databases
    (read: user tables attackers have acquired from a bigger data set and parsed them
    before selling them off) sold on the dark web for tens of thousands of dollars:
    what makes you think your database/use case will not be worth “looking into?”


    After the user table, inspect other tables storing data of interest to a potential
    nefarious party (these may include messages and metadata, too – you never know
    what users are chatting about), and then, you will start to have a good picture
    of what security measures already exist and what can be improved.


    The landscape each of you will see will differ – it should differ because no one
    use case is the same, but that’s also what makes security so exciting. For those
    of you running content management systems, the beginnings of security could look
    something like this.


    ![](images/625040_1_En_15_Chapter/625040_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    User registration on a forum from a security standpoint


    Yes, there are many things you need to consider – and all of them have something
    to do with the security categories mentioned above.


    This specific use case, as you can discern already, has more to do with general
    security guidelines, access control, and user security, but a server behind the
    CMS may also be using security-related components and plugins to complete certain
    actions depicted in the graph. Thus, all components of the security chain are
    equally important, and even though each of them may involve your database working
    on different things, they all work in unison to push your database forward on
    the security landscape:


    | Guidelines | What’s Involved? |

    | --- | --- |

    | General security guidelines | Carefully evaluating the use case, then securing
    and hardening the server as a whole during the architecture, design, and implementation
    phases of the project. |

    | Access control | Not letting users access parts of the forum they shouldn’t
    be able to access, usergroups, warnings, reputation, and related things. |

    | User security | Hashing/salting passwords using a secure mechanism such as BCrypt
    or Blowfish and advising users on how to further the security of their account
    when registering on the forum and once they have registered. |

    | Components and plugins related to security | Installing and setting up plugins
    and appliances that work in conjunction with the CMS to perform a wide range of
    duties starting from not allowing users to upload certain types of files via upload
    forms that may be available on the forum (.exe, .pdf, .php, files having a double
    extension, etc.) to informing administrators of unauthorized access via email
    or SMS and locking down the entire forum once a data breach is detected by the
    appliance. |


    However, regardless of what your use case is, you’re going to start securing your
    MariaDB installation from the bottom, and you’re on the bottom once you decide
    to *install* MariaDB.


    ## Securing MariaDB upon Installation'
  trans: '

    安全至关重要——这正是你们中的一些人拿起这本书的首要原因，不是吗？也许你甚至曾遭遇数据泄露，并因此被推荐本书，以了解如何处理围绕你的 MySQL 或 MariaDB
    实例的安全问题？


    ## 理解 MariaDB 中的安全


    我首先陈述一个显而易见的事实——总体而言，保护 MariaDB 和 MySQL 的安全性远没有你想象的那么难。诚然，你需要了解一些与 MariaDB 相关的具体细节，但总的来说，安全相关问题可以分为几个类别：


    1.  通用安全准则

    2.  访问控制

    3.  用户安全

    4.  安全相关组件和插件

    5.  企业级安全控制


    看看这个——这么多类别，对吧？我同意，MariaDB 安全领域中的类别可能看起来不多，但仔细想想，每一个 MariaDB 安全问题都根源于这些类别中的一个或多个。随着你继续阅读，你应该能够很快明白，这确实是事实。


    让我们从一般性地审视你的数据库开始——从安全角度出发，你需要检查的第一件事是数据库存储的数据类别。这可以通过更仔细地审视你的用例来完成——假设你使用 MariaDB
    托管一个用户相互交互的论坛（CMS），你的数据库将包含多个表，其中：


    *   一些表包含日志数据。

    *   一些表包含附件及其相关数据（类型、谁附加了什么等）。

    *   一些表包含封禁过滤器。

    *   一些表包含与反垃圾邮件操作相关的数据（例如验证码等）。

    *   一些表包含与论坛事件相关的数据。

    *   一些表包含用户组数据（即普通用户、版主、管理员、VIP 用户或捐赠者、其他用户组等的数据）。

    *   一些表包含用户本身的详细信息（用户等级、用户名、电子邮件地址、违规详情、发送/接收的消息、加盐哈希的密码、管理备注等）。

    *   一些表包含与 CMS 安装相关的详细信息，以及安装是否被锁定等（安装完成后，许多内容管理系统会锁定其目录以防外部访问）。

    *   一些表包含与 CMS 文档相关的详细信息。

    *   一些表可能包含论坛上创建的投票数据，以及哪些用户在何时对哪些投票进行了投票等。

    *   一些表可能包含与用户声誉相关的数据（例如，100% 的声誉可能意味着“清白”，而 20% 的声誉则意味着你应该仔细核查该用户的建议，因为有许多用户举报了他）。

    *   一些表可能包含与论坛中发送和接收的帖子及消息相关的数据。

    *   一些表包含消息和附件的元数据或类似内容。


    因此，即使你认为你的论坛与其他论坛相比并不那么受欢迎，论坛中仍然有你需要管理和保护的数据。攻击者仍有东西可偷！


    诚然，许多攻击者可能只对你的论坛的 `user` 表及其内部细节感兴趣（被盗数据能为攻击者的业务带来“收益”，因为这些数据通常在暗网上出售，然后被重新用于身份盗窃、凭证填充和其他类型的攻击），但其他类别的数据也不应被忽视——以
    2015 年 Experian 数据泄露事件为例，据报道，泄露的数据不仅包括敏感的用户登录信息，还包括用户性别、收入水平、电话号码、地址、信用状况信息、家庭详情以及许多其他敏感数据类别。其他数据泄露事件还可能包括前面提到的论坛内的帖子和主题、多年来来回发送的消息等等。


    我想在这里表达的是，你的数据库中包含什么内容取决于你的用例——你首先需要保护数据库内部的一切，但对于 CMS 用例，你还需要格外注意 SSL、所使用的密码哈希函数、密码是否加盐以及存储了何种用户数据。


    从你的用户表开始，因为用户数据能为潜在攻击者带来最大价值（如前所述，用户数据可以且经常被出售给其他恶意方，然后用于身份盗窃攻击）——审查所使用的密码哈希函数，你的哈希值是否加盐（当大量哈希值被破解时，盐值可以减慢密码破解速度），并尝试从黑客的角度看待一切——如果
    *你* 是攻击者，你会做什么，哪些数据对你有价值？问问任何安全专家，你会很快得到建议：暗网上曾有被盗的用户数据库（即攻击者从更大的数据集中获取并解析后出售的用户表）以数万美元的价格出售：你凭什么认为你的数据库/用例不值得被“研究”？


    检查完用户表后，再检查其他存储了潜在恶意方可能感兴趣的表（这些也可能包括消息和元数据——你永远不知道用户在聊什么），然后，你将开始对现有安全措施和可改进之处有一个清晰的图景。


    你们每个人看到的状况都会不同——它理应不同，因为没有一个用例是相同的，但这也正是安全如此令人兴奋的原因。对于那些运行内容管理系统的用户来说，安全的起点可能如下所示。


    ![](img/625040_1_En_15_Fig1_HTML.jpg)


    图 15-1


    从安全角度看论坛用户注册


    是的，有很多事情你需要考虑——所有这些都与上述安全类别有关。


    正如你已经可以看出的，这个特定用例与通用安全准则、访问控制和用户安全关系更密切，但 CMS 后端的服务器也可能使用安全相关组件和插件来完成图中描绘的某些操作。因此，安全链的所有组成部分都同样重要，尽管每个部分都可能涉及你的数据库处理不同的事情，但它们协同工作，共同推动你的数据库在安全格局上向前发展：


    | 准则 | 涉及内容？ |

    | --- | --- |

    | 通用安全准则 | 在项目架构、设计和实施阶段仔细评估用例，然后对服务器进行整体安全保护和加固。 |

    | 访问控制 | 防止用户访问其不应访问的论坛部分，涉及用户组、警告、声誉及相关事项。 |

    | 用户安全 | 使用 `BCrypt` 或 `Blowfish` 等安全机制对密码进行哈希/加盐处理，并在用户注册论坛时及注册后，就如何增强其账户安全提供建议。
    |

    | 安全相关组件和插件 | 安装和设置与 CMS 协同工作的插件和设备，执行广泛职责，从不允许用户通过论坛上可能的上传表单上传某些类型的文件（.exe、.pdf、.php、具有双扩展名的文件等），到通过电子邮件或短信通知管理员存在未经授权的访问，并在设备检测到数据泄露时锁定整个论坛。
    |


    然而，无论你的用例是什么，你都将从基础开始保护你的 MariaDB 安装，而一旦你决定 *安装* MariaDB，你就处于这个基础上。


    ## 在安装时保护 MariaDB

