  trans: '

    这是 InnoDB 保护我们数据安全并清理 `ibdata1` 文件的主要方式之一，同时也使其与其他存储引擎有所区别——虽然 InnoDB 的数据也保存在类似于
    MyISAM 的 `.MYD`（表数据）和 `.MYI`（索引）的文件中，但 MyISAM 没有可以“依赖”来提供 ACID 能力的文件，而 InnoDB
    有。这使得在 MyISAM 中删除数据更容易（我们可以直接删除 `.MYD` 文件来移除 MyISAM 表，或删除 `.MYI` 文件来删除其中的索引），但讽刺的是，这也使得
    MyISAM 因其不稳定性和频繁的数据损坏问题，几乎无法用于大多数现代工作负载。


    除此之外，可以通过调整 `innodb_data_file_path` 变量来重命名或拆分 `ibdata1` 文件为多个不同的文件——高级用户会知道该文件也可以自动扩展。像这样的定义：

    ```

    innodb_data_file_path=ibdata1:10M:autoextend

    ```

    将使 InnoDB 数据文件大小为 10MB，并允许其在每次需要更多空间时递增大小（每次增加 8MB）。也可以定义多个数据文件，让 InnoDB 将数据一起存储在其中，并指定它们的大小，如下所示（在这种情况下，我们将拥有三个文件——`ibdata1`、`ibdata2`
    和 `ibdata3`，大小各不相同）：

    ```

    innodb_data_file_path=ibdata1:10M;ibdata2:100M;ibdata3:500M:autoextend

    ```

    请记住，当 `innodb_file_per_table` 启用时（除非您手动禁用，否则它将被启用），这些文件将只存储与您基础设施中表相关的元数据，因此它们也不需要很大。


    ## 为您的操作系统配置 MySQL I/O

    一旦 InnoDB 开始自行运行，您就应该将目光转向磁盘 I/O。磁盘 I/O 可能成为您数据库的致命弱点，因为无法逃避 I/O 操作，如果它们没有得到适当优化，可能会成为许多痛苦和混乱的根源。


    您已经知道一些优化磁盘 I/O 的方法——您已经增加了缓冲池的大小，可能调整了刷新方法，并且可能使用了有助于更快访问数据的存储设备（NVMe 驱动器代替 SSD，或
    SSD 代替 HDD 等）。


    您知道为什么这些方法能优化磁盘 I/O 吗？一切都很简单：

    *   更大的 InnoDB 缓冲池大小允许您的查询在不执行任何磁盘相关操作的情况下访问缓冲池更长时间，从而减少磁盘 I/O。

    *   将 InnoDB 刷新方法设置为 `O_DIRECT`——从 MariaDB 10.6 开始的默认选项，并且仅在 Unix 基础设施上可用——允许您的数据库绕过操作系统缓存，并实现更高的一致性。当然，您还有其他选项，例如
    `O_DSYNC`，它比 `O_DIRECT` 更快，但是，当使用此选项时，如果您的数据库遇到延迟或崩溃，则无法保证数据一致性。有关 InnoDB 中可用刷新方法的复习，请返回第
    2 章。

    *   使用现代驱动器（例如 SSD 和/或 NVMe 驱动器）可减少寻道时间。这是不言而喻的：由于 SSD 和 NVMe 驱动器没有任何移动部件，它们的寻道时间可以显著减少。这就是为什么我们中的一些人将操作系统放在
    NVMe 驱动器上——我们这样做是为了让系统快速启动。根据众多来源，现代硬盘的寻道时间约为 5-7 毫秒，而 SSD 的寻道时间约为 0.10 到 0.20
    毫秒。


    这些提示是最低要求——要进一步改善磁盘 I/O，您还需要研究一些额外的参数：

    *   `innodb_io_capacity` 和 `innodb_io_capacity_max`：第一个变量定义了 InnoDB 可用的 I/O 操作数，第二个变量定义了当刷新活动落后于指定容量时，InnoDB
    可以使用的最大 I/O 操作数。

    *   `innodb_page_size`：数据库页面是每个数据库的支柱，提供数据存储单位。数据行存储在数据库页面中，每个页面都有一个大小——对于 InnoDB，该大小可以通过调整
    `innodb_page_size` 变量来控制。为了进一步优化 InnoDB 的 I/O 容量，请将其页面大小调整为接近硬盘的扇区大小。

    *   `innodb_flush_neighbors`：启用此参数以帮助 InnoDB 优化硬盘驱动器的磁盘 I/O。默认禁用。


    除了这些参数，还可以考虑增大日志文件，甚至可能与缓冲池本身一样大。这样的操作将需要 MySQL 在恢复数据时花费更多时间，因为恢复时需要读取日志文件，但另一方面，这可以减少
    InnoDB 检查点操作期间的磁盘 I/O。


    另外，关于缓冲池，您可以配置 InnoDB 使其执行提前读取数据的操作以“预热缓冲池”，将数据带入内存，从而读取时无需访问磁盘。从 MySQL 5.7 开始，这种行为已成为默认设置——MySQL
    将保存 InnoDB 缓冲池的内容并在启动时加载它。


    你们中的许多人也会知道，基于 `innodb_buffer_pool_dump_pct` 变量，InnoDB 在其缓冲池中保存了最常访问的数据库页面的四分之一（25%）。


    ![图 7-3](img/625040_1_En_7_Fig3_HTML.jpg)

    **图 7-3** `innodb_buffer_pool_dump_pct` 变量的默认值


    由于此参数的定义是设置缓冲池要读取的最近使用的数据库页面的百分比，因此该参数的值可以在 1 到 100 之间，并且该参数的值是一个百分比，也可以设置为 100，这意味着
    InnoDB 将尝试在不进行磁盘读取的情况下访问内存中的所有数据。在将此值设置为 100% 之前，请注意此变量只会保存缓冲池中数据的百分比，而不是整个缓冲池本身，例如，如果您有一个
    100GB 大小的缓冲池，并且缓冲池包含 20GB 的数据，将此变量设置为 100% 将仅保存 20GB 的数据。


    除了优化磁盘 I/O 之外，请记住 MySQL 中的某些选项仅对使用 Unix 架构的用户可用。前面提到的 `O_DIRECT` 模式将启用 I/O 吞吐量的直接模式，该模式将绕过操作系统的缓存，并使用在
    Windows 中不可用的选项。


    最后，请记住，操作系统中运行的所有程序也在消耗内存。您的数据库肯定不是唯一使用内存的程序，据说 Windows 通常比 Linux 使用更多内存，因为它预装了许多附加组件，但如果您在
    Linux 上安装数千个额外的应用程序，它们也会消耗内存。避免安装不需要的应用程序，您就可以将更多内存分配给数据库和应用程序。


    ## 测试您的硬件

    无论您使用什么操作系统，硬件通常是许多数据库的限制因素。无论您拥有数十亿行数据，还是刚刚起步——如果您的硬件成为限制因素，随着时间的推移，与它们交互可能会变得困难。困难可以通过正确配置数据库来克服，但如果您的硬件不允许，即使配置也可能成为一项艰巨的任务。许多数据库会有某些限制——而其中许多限制与您系统上的硬件有关。

    '
- fmt: '# MySQL数据库优化与ACID特性详解


    ## 实践中的数据库优化


    如果您已经读到这里，很可能已经根据服务器内部的硬件配置，采取了优化数据库的措施。测试硬件当前性能最可靠的方法之一，就是与您的数据进行交互。与您的应用程序一起工作一两周——您注意到了什么？是否出现了任何问题？客户或用户是否会就与数据库相关的任何事情联系您？


    在与数据库交互时，请记住，保持内存和磁盘资源之间的平衡至关重要。谁不希望所有的数据都能从内存中读取，以获得极速的性能？不幸的是，内存比硬盘空间要有限得多；但即便如此，还有许多其他因素在起作用：我们有查询缓存、读写操作、刷盘、I/O操作以及许多其他因素，它们中的每一个都能帮助我们使数据库和硬件协同工作。


    ## 数据库性能测试工具


    有一些工具可以用来测试您的MySQL设置——其中一个是前面提到的`mysqlslap`（在MariaDB中是`mariadb-slap`），它帮助您模拟多个并发连接到MySQL或MariaDB，并帮助查看您的数据库如何处理问题。CentOS用户可以利用`sysbench`。还有`mysqlshow`及其在MariaDB中的等效命令`mariadb-show`，它们显示与数据库、表及其中列相关的信息，以便您了解从何处着手。让我们来试用一下`mariadb-show`。


    ![默认行为下的 mariadb-show](images/625040_1_En_7_Chapter/625040_1_En_7_Fig4_HTML.jpg)

    *图 7-4: 默认行为下的 mariadb-show*


    默认情况下，此工具只会显示数据库服务器中的数据库。可以通过在选项列表中提供其名称来深入查看特定数据库。我将对MyBB数据库进行此操作。


    ![在 MariaDB 中深入查看 MyBB 1.8.38 数据库](images/625040_1_En_7_Chapter/625040_1_En_7_Fig5_HTML.jpg)

    *图 7-5: 在 MariaDB 中深入查看 MyBB 1.8.38 数据库*


    `mysql-show`和`mariadb-show`都有很多选项，可以让我们深入了解表结构和其中的数据。运行如下查询：


    ```

    mariadb-show -uroot mybb1838 --count --status --keys

    ```


    将为我们提供大量信息，范围从行数（`--count`）、MyBB 1.8.38表的额外信息（`--status`），到一些关于索引的信息（`--keys`）。


    ![mariadb-show 实战](images/625040_1_En_7_Chapter/625040_1_En_7_Fig6_HTML.jpg)

    *图 7-6: mariadb-show 实战*


    从`mariadb-show`和`mysqlslap`等工具中收集信息，以了解如何最好地优化服务器，使其发挥全部能力来帮助查询成功，但也不要忽视基本数据库标准和特性的重要性。


    ## 充分利用ACID特性


    最后但同样重要的是，如果优秀的数据库不遵守标准和特性，它们又有什么用？谁会相信数据库能够存储他们最珍贵的数据？数据必须可靠地存储——这是一个事实。如果我们从宏观角度来看，所有数据库都能安全地存储数据，对吧？毕竟，哪家公司会把数据存储在一个明知可能随时崩溃的数据库中呢？


    所有数据库都允许您安全地存储数据——但数据库所基于的模型之间存在根本性差异。有两种模型——一种追求更好的数据一致性，另一种追求更高的可用性。这两种模型就是ACID和BASE，并且在给定时刻只能使用其中一种模型。ACID将用于关系数据库管理系统，而基于NoSQL的系统将使用BASE，因此您无法同时利用两者的优点——但这也正是它们各自魅力的所在。


    ACID是一个缩写词，它与关系数据库管理系统相伴而生，帮助它们实现原子性（**A**tomicity）、一致性（**C**onsistency）、隔离性（**I**solation）和持久性（**D**urability）。这正是该缩写词所代表的含义——这也是为什么您会看到像MySQL这样的关系数据库在断电或灾难来袭后依然屹立不倒，而许多基于BASE的数据库则需要恢复其数据；ACID帮助我们确保即使在灾难发生时，我们的数据也能保持一致性和持久性。


    各种关系数据库管理系统对ACID的实现略有不同，因为没有两个数据库是完全相同的，但对于MySQL，其过程如下：


    *   **原子性**由`COMMIT`和`ROLLBACK`语句处理——它确保事务中的所有查询作为一个团队协同操作。

    *   **一致性**由MySQL日志记录机制和记录InnoDB中所有更改的日志文件（`ib_logfile0`和`ib_logfile1`）处理。一旦需要恢复数据，就会扫描日志文件。

    *   **隔离性**指的是InnoDB中可用的行级锁。

    *   **持久性**由错误日志和其他日志文件的性质保证——对某些人来说，这些文件是防御数据库错误的第一道防线。


    ACID就是为什么有时您会听到开发人员说“对数据的更改应该被提交”并疑惑其含义的原因——“提交对数据的更改”意味着将它们保存到数据库文件中。一旦更改被提交，它们就会永久保存并变得对其他会话可见。


    ACID是所有MySQL变体中InnoDB存储引擎的支柱，这也是为什么InnoDB存储引擎是MySQL和MariaDB中默认可用的存储引擎的原因之一：它遵守ACID特性的能力鲜有对手（RocksDB也支持ACID），并且它对之前仅在MyISAM中可用的功能的支持，使其能够适应即使是最苛刻的工作负载。


    在MySQL中，也可以通过参数`innodb_flush_log_at_trx_commit`关闭ACID合规性，以换取更快的速度，但代价是可能丢失最多一秒的数据。默认情况下，InnoDB会在事务提交时将数据刷新到日志文件，从而确保ACID合规性（这就是为什么该变量初始值设置为1），但一些技术爱好者会知道该变量也可以有其他值——0、2，如果使用MariaDB，还可以是3。每个值执行不同的任务：


    *   **值为0与重做日志有关。** 如果`innodb_flush_log_at_trx_commit`设置为0，重做日志每秒只写入并刷新到磁盘一次，因此不保证ACID合规性，但速度更快。

    *   **值为1与ACID合规性有关。** 如果`innodb_flush_log_at_trx_commit`设置为1，InnoDB将符合ACID标准。

    *   **值为2与提交和刷新操作有关。** 如果`innodb_flush_log_at_trx_commit`设置为2，InnoDB将在事务提交时将数据写入日志文件，但每秒只将数据刷新到磁盘一次。

    *   **值为3与MariaDB有关。** 如果`innodb_flush_log_at_trx_commit`设置为3，MariaDB将在数据准备好和提交时将其刷新到磁盘，这可能会导致操作变慢。


    你们大多数人不需要将`innodb_flush_log_at_trx_commit`参数更改为其他值，但如果需要深入研究数据的原子性、一致性、完整性或持久性，或者需要用速度来交换ACID特性，您就知道该找谁了。


    ACID还有一个姐妹叫BASE——BASE特性确保高可用性并最终一致。换句话说，BASE意味着数据库努力确保我们的数据基本可用、处于软状态，并最终能够变得一致。BASE模型侧重于高可用性，而ACID侧重于数据一致性和完整性：'
  raw: 'If you’ve read this far, chances are that you’ve already taken steps to optimize
    your database based on the hardware that is in place inside of your server: one
    of the most reliable ways to test what your hardware is capable of now is to interact
    with your data. Work with your application for a week or two – what do you notice?
    Do any problems occur? Do clients or users contact you about anything database-related?


    When interacting with your database, remember that it’s vitally important to strike
    and keep a balance between memory and disk resources. Who wouldn’t want all of
    their data to be read from the memory for blazing-fast performance? Unfortunately,
    memory is much more finite than hard drive space is; but even with that being
    the case, there are many other things at play: we have query caches, reading and
    writing, flushing, I/O operations, and many other things, and each of them can
    help us make our database and our hardware work in conjunction.


    There are tools that you can use to test your MySQL setup – one of those is the
    aforementioned `mysqlslap` (or `mariadb-slap` in MariaDB) which helps you emulate
    multiple concurrent connections toward MySQL or MariaDB and helps see how your
    database deals with issues, users of CentOS can make use of `sysbench`, and there’s
    also `mysqlshow` and the `mariadb-show` equivalent in MariaDB that displays information
    relevant to the databases, tables, and columns within them so you can understand
    where to turn. Let’s take `mariadb-show` for a spin.


    ![](images/625040_1_En_7_Chapter/625040_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Default behavior of mariadb-show


    By default, this tool will only show the databases in our database server. One
    can dig into a specific database by providing its name as part of the options
    list. I’ll do that with the MyBB database.


    ![](images/625040_1_En_7_Chapter/625040_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Digging into the MyBB 1.8.38 database in MariaDB


    Both `mysql-show` and `mariadb-show` have a lot of options that let us dig into
    our table structure and the data within. Running a query like so:


    ```

    mariadb-show -uroot mybb1838 --count --status --keys

    ```


    Would provide us with a lot of information ranging from the row count (`--count`),
    extra information about the MyBB 1.8.38 table (`--status`), and some information
    about the indexes (`--keys`).


    ![](images/625040_1_En_7_Chapter/625040_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    mariadb-show in action


    Glean some information from tools like `mariadb-show` and `mysqlslap` to gain
    information on how best to optimize your server to use everything in its power
    to help your queries succeed, but don’t forget the importance of basic database
    standards and properties either.


    ## Taking Advantage of ACID Properties


    Last but not least, what good databases would do if they wouldn’t adhere to standards
    and properties? Who would trust databases to store their most precious data? Data
    must be stored reliably – that’s a fact. And if we look at everything from a birds-eye-view,
    all databases store data safely, right? After all, what company would store data
    in a database knowing their most precious asset can come crashing down at any
    time?


    All databases let you store data safely – but there are fundamental differences
    between the models that databases are based on. There are two models – one that
    strives for better data consistency, and one that strives for higher availability.
    Those two models are ACID and BASE, and only one of those models can be used at
    a given moment. ACID will be used in relational database management systems and
    NoSQL-based systems will make use of BASE, so you can’t make use of the upsides
    of both – but that’s their entire beauty at the same time.


    ACID is an acronym that lives together with relational database management systems
    helping them achieve atomicity, consistency, isolation, and durability. That’s
    precisely what this acronym stands for – and that’s why you see relational databases
    like MySQL still standing after electricity goes out or a disaster strikes while
    many BASE-based databases will need to have their data restored; ACID helps us
    ensure that our data remains consistent and durable even in the event of a disaster.


    Various relational database management systems implement ACID a little differently
    because no two databases are the same, but for MySQL, the process is as follows:


    *   **Atomicity** is handled by the `COMMIT` and `ROLLBACK` statements – it ensures
    that all queries in a transaction operate as a team.


    *   **Consistency** is handled by the MySQL logging mechanism and the log files
    (ib_logfile0 and ib_logfile1) that record all changes inside InnoDB. Once data
    needs to be restored, log files are scanned through.


    *   **Isolation** refers to the row-level locking available in InnoDB.


    *   **Durability** is ensured by the nature of error logs and other log files
    – for some, these files are the first point of defense against database errors.


    ACID is the reason why sometimes you see developers saying that “changes to the
    data should be committed” and wonder what that means – to “commit changes to data”
    means to save them inside of the database files. Once changes are committed, they
    are permanently saved and become visible to other sessions.


    ACID is the backbone of the InnoDB storage engine within all flavors of MySQL,
    and that’s one of the reasons why the InnoDB storage engine is the default storage
    engine available in MySQL and MariaDB: its ability to adhere to ACID properties
    is rivaled by very few (RocksDB supports ACID too), and its support for features
    previously only accessible in MyISAM makes it well-suited for even the most demanding
    workloads.


    In MySQL, ACID compliance can also be turned off in exchange for more speed and
    more risk of losing up to one second’s worth of data and that can be done with
    the parameter `innodb_flush_log_at_trx_commit`. By default, InnoDB will flush
    data to the log files at the time transactions commit, thus ensuring ACID compliance
    (that’s why this variable is set to the value of 1 to begin with), but some geeks
    will know that this variable can also have other values – 0, 2, and if MariaDB
    is in use, 3\. Each of those values performs different tasks:


    *   **A value of 0 has to do with the redo log.** If `innodb_flush_log_at_trx_commit`
    is set to the value of 0, the redo log is written to and flushed to disk only
    once per second, thus guaranteeing no ACID compliance, but more speed.


    *   **A value of 1 has to do with ACID compliance.** If `innodb_flush_log_at_trx_commit`
    is set to the value of 1, InnoDB will be ACID-compliant.


    *   **A value of 2 has to do with committing and flushing operations.** If `innodb_flush_log_at_trx_commit`
    is set to the value of 2, InnoDB will write data to the log files once transactions
    are committed, but flush data to disk only once every second.


    *   **A value of 3 has to do with MariaDB.** If `innodb_flush_log_at_trx_commit`
    is set to the value of 3, MariaDB will flush the data to disk once it’s prepared
    and once it’s committed thus potentially making the operations slow.


    Most of you will not need to change the `innodb_flush_log_at_trx_commit` parameter
    to anything else, but if the need to dig into data atomicity, consistency, integrity,
    or durability arises or if you need to exchange ACID for speed, you know who to
    call.


    ACID also has a sister called BASE – BASE properties ensure high availability
    with eventual consistency. In other words, BASE means that a database puts in
    effort to ensure that our data is basically available, in a soft state, and can
    eventually become consistent. The BASE model has a focus on high availability,
    while ACID focuses on data consistency and integrity:'
  trans: '# MySQL 数据库优化与 ACID 特性详解


    ## 实践中的数据库优化


    如果您已经读到这里，很可能已经根据服务器内部的硬件配置，采取了优化数据库的措施。测试硬件当前性能最可靠的方法之一，就是与您的数据进行交互。与您的应用程序一起工作一两周——您注意到了什么？是否出现了任何问题？客户或用户是否会就与数据库相关的任何事情联系您？


    在与数据库交互时，请记住，保持内存和磁盘资源之间的平衡至关重要。谁不希望所有的数据都能从内存中读取，以获得极速的性能？不幸的是，内存比硬盘空间要有限得多；但即便如此，还有许多其他因素在起作用：我们有查询缓存、读写操作、刷盘、I/O
    操作以及许多其他因素，它们中的每一个都能帮助我们使数据库和硬件协同工作。


    ## 数据库性能测试工具


    有一些工具可以用来测试您的 MySQL 设置——其中一个是前面提到的`mysqlslap`（在 MariaDB 中是`mariadb-slap`），它帮助您模拟多个并发连接到
    MySQL 或 MariaDB，并帮助查看您的数据库如何处理问题。CentOS 用户可以利用`sysbench`。还有`mysqlshow`及其在 MariaDB
    中的等效命令`mariadb-show`，它们显示与数据库、表及其中列相关的信息，以便您了解从何处着手。让我们来试用一下`mariadb-show`。


    ![默认行为下的 mariadb-show](img/625040_1_En_7_Fig4_HTML.jpg)

    *图 7-4: 默认行为下的 mariadb-show*


    默认情况下，此工具只会显示数据库服务器中的数据库。可以通过在选项列表中提供其名称来深入查看特定数据库。我将对 MyBB 数据库进行此操作。


    ![在 MariaDB 中深入查看 MyBB 1.8.38 数据库](img/625040_1_En_7_Fig5_HTML.jpg)

    *图 7-5: 在 MariaDB 中深入查看 MyBB 1.8.38 数据库*


    `mysql-show`和`mariadb-show`都有很多选项，可以让我们深入了解表结构和其中的数据。运行如下查询：


    ```

    mariadb-show -uroot mybb1838 --count --status --keys

    ```


    将为我们提供大量信息，范围从行数（`--count`）、MyBB 1.8.38 表的额外信息（`--status`），到一些关于索引的信息（`--keys`）。


    ![mariadb-show 实战](img/625040_1_En_7_Fig6_HTML.jpg)

    *图 7-6: mariadb-show 实战*


    从`mariadb-show`和`mysqlslap`等工具中收集信息，以了解如何最好地优化服务器，使其发挥全部能力来帮助查询成功，但也不要忽视基本数据库标准和特性的重要性。


    ## 充分利用 ACID 特性


    最后但同样重要的是，如果优秀的数据库不遵守标准和特性，它们又有什么用？谁会相信数据库能够存储他们最珍贵的数据？数据必须可靠地存储——这是一个事实。如果我们从宏观角度来看，所有数据库都能安全地存储数据，对吧？毕竟，哪家公司会把数据存储在一个明知可能随时崩溃的数据库中呢？


    所有数据库都允许您安全地存储数据——但数据库所基于的模型之间存在根本性差异。有两种模型——一种追求更好的数据一致性，另一种追求更高的可用性。这两种模型就是
    ACID 和 BASE，并且在给定时刻只能使用其中一种模型。ACID 将用于关系数据库管理系统，而基于 NoSQL 的系统将使用 BASE，因此您无法同时利用两者的优点——但这也正是它们各自魅力的所在。


    ACID 是一个缩写词，它与关系数据库管理系统相伴而生，帮助它们实现原子性（**A**tomicity）、一致性（**C**onsistency）、隔离性（**I**solation）和持久性（**D**urability）。这正是该缩写词所代表的含义——这也是为什么您会看到像
    MySQL 这样的关系数据库在断电或灾难来袭后依然屹立不倒，而许多基于 BASE 的数据库则需要恢复其数据；ACID 帮助我们确保即使在灾难发生时，我们的数据也能保持一致性和持久性。


    各种关系数据库管理系统对 ACID 的实现略有不同，因为没有两个数据库是完全相同的，但对于 MySQL，其过程如下：


    *   **原子性**由`COMMIT`和`ROLLBACK`语句处理——它确保事务中的所有查询作为一个团队协同操作。

    *   **一致性**由 MySQL 日志记录机制和记录 InnoDB 中所有更改的日志文件（`ib_logfile0`和`ib_logfile1`）处理。一旦需要恢复数据，就会扫描日志文件。

    *   **隔离性**指的是 InnoDB 中可用的行级锁。

    *   **持久性**由错误日志和其他日志文件的性质保证——对某些人来说，这些文件是防御数据库错误的第一道防线。


    ACID 就是为什么有时您会听到开发人员说“对数据的更改应该被提交”并疑惑其含义的原因——“提交对数据的更改”意味着将它们保存到数据库文件中。一旦更改被提交，它们就会永久保存并变得对其他会话可见。


    ACID 是所有 MySQL 变体中 InnoDB 存储引擎的支柱，这也是为什么 InnoDB 存储引擎是 MySQL 和 MariaDB 中默认可用的存储引擎的原因之一：它遵守
    ACID 特性的能力鲜有对手（RocksDB 也支持 ACID），并且它对之前仅在 MyISAM 中可用的功能的支持，使其能够适应即使是最苛刻的工作负载。


    在 MySQL 中，也可以通过参数`innodb_flush_log_at_trx_commit`关闭 ACID 合规性，以换取更快的速度，但代价是可能丢失最多一秒的数据。默认情况下，InnoDB
    会在事务提交时将数据刷新到日志文件，从而确保 ACID 合规性（这就是为什么该变量初始值设置为 1），但一些技术爱好者会知道该变量也可以有其他值——0、2，如果使用
    MariaDB，还可以是 3。每个值执行不同的任务：


    *   **值为 0 与重做日志有关。** 如果`innodb_flush_log_at_trx_commit`设置为 0，重做日志每秒只写入并刷新到磁盘一次，因此不保证
    ACID 合规性，但速度更快。

    *   **值为 1 与 ACID 合规性有关。** 如果`innodb_flush_log_at_trx_commit`设置为 1，InnoDB 将符合
    ACID 标准。

    *   **值为 2 与提交和刷新操作有关。** 如果`innodb_flush_log_at_trx_commit`设置为 2，InnoDB 将在事务提交时将数据写入日志文件，但每秒只将数据刷新到磁盘一次。

    *   **值为 3 与 MariaDB 有关。** 如果`innodb_flush_log_at_trx_commit`设置为 3，MariaDB 将在数据准备好和提交时将其刷新到磁盘，这可能会导致操作变慢。


    你们大多数人不需要将`innodb_flush_log_at_trx_commit`参数更改为其他值，但如果需要深入研究数据的原子性、一致性、完整性或持久性，或者需要用速度来交换
    ACID 特性，您就知道该找谁了。


    ACID 还有一个姐妹叫 BASE——BASE 特性确保高可用性并最终一致。换句话说，BASE 意味着数据库努力确保我们的数据基本可用、处于软状态，并最终能够变得一致。BASE
    模型侧重于高可用性，而 ACID 侧重于数据一致性和完整性：'
- fmt: '# 8. Optimizing Storage Engines, Schemas, and Data Types


    ## Summary


    Every database runs on a server – and no matter what kind of server you find yourself
    running, there is always something that can be improved upon. For most developers,
    optimizing a server for MySQL becomes a simple task once they understand what
    components are used by their database, what issues limit the performance of their
    database, once they properly choose hard drives and other components, and configure
    options related to `InnoDB` disk I/O. After that’s done, it’s safe to say that
    a database is in safe hands.


    Optimizing a server for a database involves many more things than just disk I/O,
    the amount of available memory, or fiddling with your CPU – no one database management
    system is the same, and all databases have lots of internal options that can be
    optimized to achieve database performance goals: for MySQL, it all starts from
    storage engines.


    Once a proper storage engine is chosen and understood, we can proceed to optimize
    our schemas, data types, and finally – SQL queries for a wide variety of use cases
    including big data.


    Storage engines are the backbone of MySQL – they power our data and tell our database
    how to interact with it. I’ve told you about them in Chapter 2 of this book. Storage
    engines don’t walk alone: they harbor database schemas, data types, collations,
    indexes, and other things, and each of those things has its remits on one side
    and downsides on the other. Regardless, storage engines were, are, and will be
    the spark that starts a fire; the fire that makes your data warm, and the users
    of your application happy.


    For that fire to continue burning and for users to be happy, there are numerous
    things you should adhere to when working with your data – your storage engines
    should be optimized, the databases within them should hold data safely, and you
    should pay extra attention to the data types that are being used.


    ## Why Optimize Storage Engines and Data Types?


    First, we have storage engines. Put simply, storage engines are components within
    MySQL that allow MySQL to use certain operations for a variety of data types.
    MySQL supports a wide variety of storage engines, and the internal functionality
    of those storage engines can be modified by modifying `my.ini` on Windows, or
    `my.cnf` on Linux.


    Open up the configuration file pertaining to your operating system, and you will
    quickly notice that not all MySQL storage engines have options available to them;
    the configuration file for Windows users will be much more generous in regard
    to options and comments, while most of the users using Linux will have few options
    to choose from and most of these options will likely pertain to the main storage
    engine – `InnoDB` – to begin with.


    Regardless, `InnoDB` can be optimized as much as your hardware allows: you might
    want to flick back to Chapter 2 to find out what the function of each of the variables
    within the storage engine is, but regardless of what parameters or storage engine
    you find yourself using, the fact is that you will use the storage engine to store
    data inside of it; data comes in a variety of shapes and forms and while data
    types may seem like small fish in a pond, as more and more data will be introduced
    into your databases, their significance will only grow. No production database
    will come without tables inside of it; tables inside of the database signify data
    residing in them, and data residing in them signifies one or more data types that
    it’s being powered with. Data types aren’t set in stone: they can be made bigger,
    smaller, or changed altogether, but no table will come without them.


    ## Optimizing Storage Engines


    For many production environments running MySQL, the optimization of storage engines
    comes down to the optimization of `InnoDB`. Its companion `MyISAM` may appear
    here and there, but it should not be your priority. I’ve already told you about
    the parameters that can be optimized to make `InnoDB` tick in Chapter 2 of this
    book, but there are also other things you should know before you start building
    applications based on them. These things include ways to optimize `InnoDB` for
    appliances running a lot of tables, optimizing `InnoDB` for read-only applications,
    optimizing `InnoDB` redo logs, and properly dealing with transactions within the
    storage engine.


    ### Considerations for Applications with Many Tables


    To begin with, if you’re using `InnoDB` for applications with a lot of tables
    inside of them, you’re doing so with a good reason – regardless of what that reason
    is, it’s crucial to do so with a goal in mind and effectively. To work with lots
    of tables inside of `InnoDB`, consider:


    *   **The collation of your database**: Strings are matched and sorted according
    to a collation. A good collation isn’t a golden ticket that solves all of your
    problems, but it’s a key that unlocks a door to a better future for your data.

    *   **Data types and character sets**: Do all of the tables within a database
    use the same character set? Why/why not? What data types are in use?

    *   **Ways to load/extract data into/from MySQL-based tables**: This will depend
    on your use case, but do think about the way you load and extract data from a
    database, too. Many developers complain about their data loading slowly, and your
    database is only partly at fault. The rest of the responsibility for this is on
    you.

    *   **The type of data/data classes you work with**: Carefully choose the data
    classes you find yourself working with. Adhere to all regulations you and/or your
    company may be privy to (don’t store private data if not necessary), and be careful
    when choosing data length too.

    *   **A backup strategy**: Carefully backup your data. Backing up tables in a
    database is simple, but if you have a lot of data, things may get a little more
    complex. You may make use of a loop of `SELECT ... INTO OUTFILE` queries to back
    up raw data – I’ll walk you through these kinds of queries in the chapter Optimizing
    MySQL for Big Data, and I’ll cover more on backups in a chapter dedicated to them.


    ### Optimizing for Read-Only Operations and Transactions


    To optimize `InnoDB` for read-only operations and properly deal with transactions,
    consider a couple of points:


    *   **Craft and select indexes carefully**: MySQL and its counterparts can offer
    a bunch of indexes you can choose from, and choosing the right type of index and
    employing them carefully can be the difference between life and death for your
    queries and database alike. For indexing advice, turn to the chapter concerning
    indexes.'
  raw: '*   **Basically available**: BASE-based databases ensure the high availability
    of data by copying it across multiple data nodes.


    *   **Soft state**: The BASE model is also known for its temporary nature and
    that’s what Soft State refers to. Data in a non-relational database is likely
    to evolve and change very frequently. The state of data may change regardless
    if any action is taken or not.


    *   **Eventually consistent**: Databases based on the BASE model will put in their
    best effort to ensure the consistency of data; however, it’s never a guarantee.


    BASE sacrifices data consistency for high availability, while ACID will ensure
    that data remains consistent in almost any scenario. ACID databases will focus
    on committing your data to ensure it’s consistent while providing you with a structure
    to work with, while BASE databases will have no need for a database model or structure
    and will give their best attempt to ensure eventual consistency of data with a
    focus on high availability.


    ## Summary


    Every database runs on a server – and no matter what kind of server you find yourself
    running, there is always something that can be improved upon. For most developers,
    optimizing a server for MySQL becomes a simple task once they understand what
    components are used by their database, what issues limit the performance of their
    database, once they properly choose hard drives and other components, and configure
    options related to InnoDB disk I/O. After that’s done, it’s safe to say that a
    database is in safe hands.


    Optimizing a server for a database involves many more things than just disk I/O,
    the amount of available memory, or fiddling with your CPU – no one database management
    system is the same, and all databases have lots of internal options that can be
    optimized to achieve database performance goals: for MySQL, it all starts from
    storage engines.


    Once a proper storage engine is chosen and understood, we can proceed to optimize
    our schemas, data types, and finally – SQL queries for a wide variety of use cases
    including big data.


    # 8. Optimizing Storage Engines, Schemas, and Data Types


    Storage engines are the backbone of MySQL – they power our data and tell our database
    how to interact with it. I’ve told you about them in Chapter [2](#625040_1_En_2_Chapter.xhtml)
    of this book. Storage engines don’t walk alone: they harbor database schemas,
    data types, collations, indexes, and other things, and each of those things has
    its remits on one side and downsides on the other. Regardless, storage engines
    were, are, and will be the spark that starts a fire; the fire that makes your
    data warm, and the users of your application happy.


    For that fire to continue burning and for users to be happy, there are numerous
    things you should adhere to when working with your data – your storage engines
    should be optimized, the databases within them should hold data safely, and you
    should pay extra attention to the data types that are being used.


    ## Why Optimize Storage Engines and Data Types?


    First, we have storage engines. Put simply, storage engines are components within
    MySQL that allow MySQL to use certain operations for a variety of data types.
    MySQL supports a wide variety of storage engines, and the internal functionality
    of those storage engines can be modified by modifying my.ini on Windows, or my.cnf
    on Linux.


    Open up the configuration file pertaining to your operating system, and you will
    quickly notice that not all MySQL storage engines have options available to them;
    the configuration file for Windows users will be much more generous in regard
    to options and comments, while most of the users using Linux will have few options
    to choose from and most of these options will likely pertain to the main storage
    engine – InnoDB – to begin with.


    Regardless, InnoDB can be optimized as much as your hardware allows: you might
    want to flick back to Chapter [2](#625040_1_En_2_Chapter.xhtml) to find out what
    the function of each of the variables within the storage engine is, but regardless
    of what parameters or storage engine you find yourself using, the fact is that
    you will use the storage engine to store data inside of it; data comes in a variety
    of shapes and forms and while data types may seem like small fish in a pond, as
    more and more data will be introduced into your databases, their significance
    will only grow. No production database will come without tables inside of it;
    tables inside of the database signify data residing in them, and data residing
    in them signifies one or more data types that it’s being powered with. Data types
    aren’t set in stone: they can be made bigger, smaller, or changed altogether,
    but no table will come without them.


    ## Optimizing Storage Engines


    For many production environments running MySQL, the optimization of storage engines
    comes down to the optimization of InnoDB. Its companion MyISAM may appear here
    and there, but it should not be your priority. I’ve already told you about the
    parameters that can be optimized to make InnoDB tick in Chapter [2](#625040_1_En_2_Chapter.xhtml)
    of this book, but there are also other things you should know before you start
    building applications based on them. These things include ways to optimize InnoDB
    for appliances running a lot of tables, optimizing InnoDB for read-only applications,
    optimizing InnoDB redo logs, and properly dealing with transactions within the
    storage engine.


    To begin with, if you’re using InnoDB for applications with a lot of tables inside
    of them, you’re doing so with a good reason – regardless of what that reason is,
    it’s crucial to do so with a goal in mind and effectively. To work with lots of
    tables inside of InnoDB, consider:


    *   **The collation of your database**: Strings are matched and sorted according
    to a collation. A good collation isn’t a golden ticket that solves all of your
    problems, but it’s a key that unlocks a door to a better future for your data.


    *   **Data types and character sets**: Do all of the tables within a database
    use the same character set? Why/why not? What data types are in use?


    *   **Ways to load/extract data into/from MySQL-based tables**: This will depend
    on your use case, but do think about the way you load and extract data from a
    database, too. Many developers complain about their data loading slowly, and your
    database is only partly at fault. The rest of the responsibility for this is on
    you.


    *   **The** **type of data/data classes** **you work with**: Carefully choose
    the data classes you find yourself working with. Adhere to all regulations you
    and/or your company may be privy to (don’t store private data if not necessary),
    and be careful when choosing data length too.


    *   **A** **backup strategy**: Carefully backup your data. Backing up tables in
    a database is simple, but if you have a lot of data, things may get a little more
    complex. You may make use of a loop of `SELECT ... INTO OUTFILE` queries to back
    up raw data – I’ll walk you through these kinds of queries in the chapter Optimizing
    MySQL for Big Data, and I’ll cover more on backups in a chapter dedicated to them.


    To optimize InnoDB for read-only operations and properly deal with transactions,
    consider a couple of points:


    *   **Craft and select indexes** **carefully**: MySQL and its counterparts can
    offer a bunch of indexes you can choose from, and choosing the right type of index
    and employing them carefully can be the difference between life and death for
    your queries and database alike. For indexing advice, turn to the chapter concerning
    indexes.'
  trans: '# 8. 优化存储引擎、模式与数据类型


    ## 概要


    每个数据库都运行在服务器上——无论你使用的是哪种服务器，总有可以改进之处。对于大多数开发者来说，一旦他们理解了数据库使用了哪些组件、哪些问题限制了数据库性能、以及如何正确地选择硬盘驱动器和其他组件，并配置与
    `InnoDB` 磁盘 I/O 相关的选项，为 MySQL 优化服务器就变成了一项简单的任务。完成这些后，基本可以放心地说，数据库得到了妥善的管理。


    为数据库优化服务器涉及的事项远不止磁盘 I/O、可用内存量或调整 CPU——没有哪两个数据库管理系统是完全相同的，所有数据库都有大量可以优化的内部选项以实现性能目标：对于
    MySQL 而言，这一切都始于存储引擎。


    一旦选择并理解了合适的存储引擎，我们就可以着手优化我们的模式、数据类型，最终——针对包括大数据在内的各种用例优化 SQL 查询。


    存储引擎是 MySQL 的支柱——它们驱动着我们的数据，并告诉数据库如何与数据交互。我在本书第 2 章中已经介绍过它们。存储引擎并非孤立存在：它们容纳着数据库模式、数据类型、排序规则、索引等内容，而所有这些内容都有其优点和缺点。无论如何，存储引擎过去、现在和将来都将是点燃火焰的火花；这火焰温暖你的数据，并让你的应用程序用户感到愉悦。


    为了让这火焰持续燃烧，让用户感到满意，在处理数据时，你应该遵循许多原则——你的存储引擎应该得到优化，其中的数据库应安全地保存数据，并且你应该格外注意所使用的数据类型。


    ## 为什么要优化存储引擎和数据类型？


    首先，是存储引擎。简而言之，存储引擎是 MySQL 内部的组件，允许 MySQL 对各种数据类型执行特定操作。MySQL 支持多种存储引擎，可以通过修改 Windows
    上的 `my.ini` 或 Linux 上的 `my.cnf` 来修改这些存储引擎的内部功能。


    打开与你的操作系统相关的配置文件，你会很快发现并非所有 MySQL 存储引擎都有可用的配置选项；Windows 用户的配置文件在选项和注释方面会慷慨得多，而大多数
    Linux 用户的可选选项较少，其中大部分选项很可能首先与主要存储引擎——`InnoDB`——相关。


    无论如何，`InnoDB` 可以根据你的硬件能力进行尽可能多的优化：你可能想翻回第 2 章，以了解存储引擎中每个变量的功能，但无论你使用何种参数或存储引擎，事实是你会使用它来存储数据；数据以各种形式和形态出现，虽然数据类型看起来像是池塘里的小鱼，但随着越来越多的数据被引入你的数据库，它们的重要性只会增加。没有生产数据库不包含表；数据库中的表意味着其中驻留着数据，而驻留的数据意味着它由一个或多个数据类型所支撑。数据类型并非一成不变：它们可以被调大、调小或完全更改，但没有表可以脱离它们而存在。


    ## 优化存储引擎


    对于许多运行 MySQL 的生产环境来说，优化存储引擎归结为优化 `InnoDB`。它的伙伴 `MyISAM` 可能会偶尔出现，但它不应该是你的优先事项。我已经在本书第
    2 章中介绍了可以优化以使 `InnoDB` 正常工作的参数，但在你开始基于它们构建应用程序之前，还应该了解其他一些事项。这些事项包括为运行大量表的设备优化
    `InnoDB` 的方法、为只读应用程序优化 `InnoDB`、优化 `InnoDB` 重做日志以及正确处理存储引擎中的事务。


    ### 针对包含大量表的应用程序的注意事项


    首先，如果你为包含大量表的应用程序使用 `InnoDB`，你这样做是有充分理由的——无论这个理由是什么，关键是要有明确的目标并有效地进行。要在 `InnoDB`
    中处理大量表，请考虑：


    *   **数据库的排序规则**：字符串根据排序规则进行匹配和排序。一个好的排序规则并非能解决你所有问题的万能钥匙，但它是为你的数据开启更美好未来的一把钥匙。

    *   **数据类型和字符集**：数据库中的所有表是否使用相同的字符集？为什么使用/不使用？正在使用哪些数据类型？

    *   **向 MySQL 表加载/从中提取数据的方法**：这将取决于你的用例，但也请思考你从数据库加载和提取数据的方式。许多开发者抱怨数据加载缓慢，而你的数据库只负部分责任。其余的责任在你。

    *   **你处理的数据/数据类别类型**：仔细选择你处理的数据类别。遵守你和/或你的公司可能知晓的所有规定（除非必要，否则不要存储私人数据），并且在选择数据长度时也要谨慎。

    *   **备份策略**：仔细备份你的数据。备份数据库中的表很简单，但如果你的数据量很大，事情可能会变得有点复杂。你可以利用一系列 `SELECT ...
    INTO OUTFILE` 查询来备份原始数据——我将在“为大数据优化 MySQL”一章中带你了解这类查询，并在专门介绍备份的章节中更详细地介绍备份。


    ### 针对只读操作和事务的优化


    要为只读操作优化 `InnoDB` 并正确处理事务，请考虑以下几点：


    *   **精心设计和选用索引**：MySQL 及其同类产品提供了多种索引供你选择，选择正确的索引类型并谨慎使用，对于你的查询和数据库来说可能是生死攸关的差别。关于索引的建议，请参阅有关索引的章节。'
- fmt: '## 优化MySQL性能的注意事项


    ### 按需分区数据

    你已经了解了分区的强大功能，分区与索引结合可以形成一个极其强大的组合。我指的是在毫秒内扫描数十亿行数据——如果你的存储引擎经过优化、索引已就位，但对更大数据集的查询仍然完成得很慢，那么索引可能就是罪魁祸首。


    ### 检查InnoDB的缓冲池和日志文件

    确保InnoDB缓冲池和日志文件的大小足够大。我已经多次提到这一点，这样做有助于减轻InnoDB不必要的磁盘刷新和其他活动。旧版本的MySQL有名为`innodb_buffer_pool_read_requests`和`innodb_buffer_pool_reads`的变量，分别描绘了读取缓冲池的请求次数以及实际发生了多少次读取，这些信息也很有用。但如果你使用的是较新版本的数据库管理系统，这些选项很可能已经消失了。


    ### 利用 `START TRANSACTION READ ONLY` 语句

    这个语句虽不广为人知，但对于运行只读事务的用户来说，MySQL 5.6引入了一项重要的更新：MySQL有意通过避免设置事务ID来减少InnoDB中只读事务的开销。这是一个小改动，但由于事务ID仅用于写操作或带有锁定读的操作，只读事务可以变得更快。


    ### 帮助InnoDB检测只读事务

    这可以通过使用前述的只读语句，或者通过开启`autocommit`设置并运行非锁定的select查询来实现。


    ### 插入大量数据时关闭 `autocommit`，待所有数据插入完成后再启用

    执行此操作后，InnoDB将不再在每次插入行时提交——而是会在所有事务完成后才进行提交，从而使你的`INSERT`查询更快。


    ## 数据类型


    ### MySQL中的数据类型

    数据库最佳实践之一与数据类型有关：它们直接决定了你数据的大小，而你的数据集越大，数据类型就越重要。正如本书[第3章](#625040_1_En_3_Chapter.xhtml)已经提到的，MySQL有多种数据类型，但可以简化为几个主要类别：字符串、数值以及日期和时间类型。


    表中的每一列都将有一个数据类型，根据该数据类型，你的数据库将被告知应在该特定列中存储什么数据。此外，请记住，任何表中存储的值都会受到字符集的影响，无论它们使用什么数据类型——根据你所使用的字符集，MySQL为每个存储的字符分配的字节数可能更多或更少。Latin1或ASCII字符集不太可能每个字符需要超过1字节的存储空间，基于utf8的字符集可能需要3字节，而由于utf8mb4涵盖所有Unicode字符，存储一个字符最多需要4字节的空间。


    要完全理解数据类型，你需要比仅仅了解表面更深入——数据类型的存在是有原因的，你插入列中的所有数据也会影响最大列大小。默认情况下，MySQL的列大小限制为767字节，这是导致类似以下错误的主要原因之一：


    ```

    Index column size too large. The maximum column size is 767 bytes.

    ```


    当索引列大小超过767字节时会发生此类错误——换句话说，当我们有大约200个字符的`VARCHAR`或`TEXT`类型列，并且其排序规则要求每个字符超过3字节时，就可能遇到此类错误。可以通过将InnoDB表的格式设置为`DYNAMIC`或`COMPRESSED`来克服此类错误，但说实话，如果你面临此类错误，问题可能要深得多：你首先为什么需要索引一个包含200个字符的列？哪些读取操作能从如此长的列中受益？换句话说，*你的用例是什么？*
    你会惊讶于有多少开发人员在定义列长度时只是随意填个“255”，好像这是定义长度的唯一值似的。你能用更少的字符处理列吗？当然可以——为什么不将列长度设置为你实际预期的最大长度呢？将列长度设置为60甚至40字符可能才是既能节省磁盘空间、防止错误，又能让你免于头疼的最佳选择。


    ### 字符串数据类型

    就字符串数据类型而言，如果我们比较MySQL和MariaDB，会发现大多数数据类型是相同的，但仔细观察会发现MariaDB支持一些MySQL不支持的字符串数据类型，包括`LONG`和`LONG
    VARCHAR`（这些是`MEDIUMTEXT`的同义词）、用于存储过程的`ROW`数据类型，以及`UUID`数据类型和`INET4`或`INET6`数据类型。


    MariaDB在提供如此广泛的字符串数据类型方面是独特的，虽然MySQL不直接提供这些数据类型，但人们可以使用某些函数来实现类似的目标。


    MariaDB提供的字符串数据类型确实独特：该DBMS提供的UUID数据类型让我们可以存储**通用唯一标识符**，它们是128位36字符的字符串，用于唯一标识对象；而INET4或INET6数据类型则适合存储IPv4或IPv6相关数据。


    除了MariaDB特有的数据类型外，该DBMS也支持“普通”字符串数据类型，如`VARCHAR`和`TEXT`。有些人可能会想知道MariaDB对基于字符串的数据类型的支持是否与MySQL的做法不同，简短的答案是肯定的，但只在某些有意义的情况下。例如，由于MariaDB支持MySQL不支持的引擎，如ColumnStore，如果我们在ColumnStore中使用`VARCHAR`数据类型，我们定义的数字将不再代表可以存储的最大字符数——它将代表列的最大字节长度。这是合理的，因为ColumnStore适用于极其庞大的数据集（PB级），如果你在MariaDB中存储如此大量的数据，字节可能比列中的字符数更重要。


    ### 数值数据类型'
  raw: '*   **Partition your data where necessary**: You already know the power of
    partitions and partitions combined with indexes can form an incredibly powerful
    team. I’m talking billions of rows being scanned through in milliseconds – if
    your storage engine is optimized, indexes are in place, but queries through bigger
    data sets still complete slowly, indexes may be the culprit.


    *   **Look at the buffer pool and the log files of InnoDB**: Ensure that the size
    of the InnoDB buffer pool and the log files is large enough. I’ve already mentioned
    this numerous times, but doing so would help relieve InnoDB from unnecessary disk
    flushing and other activities. Older versions of MySQL had variables called `innodb_buffer_pool_read_requests`
    and `innodb_buffer_pool_reads` that depicted the number of requests to read the
    buffer pool and how many reads were made to begin with that would’ve been useful
    too, but if you’re using newer versions of the DBMS, these options are likely
    to be long gone.


    *   **Make use of the** **START TRANSACTION READ ONLY** **statement**: It’s not
    well-known, but an important update was introduced in MySQL 5.6 for those running
    read-only transactions: MySQL did intentionally reduce overhead in InnoDB for
    read-only transactions by avoiding setting up the transaction ID. It’s a small
    change, but since the transaction ID is only needed for write operations or operations
    with locked reads, read-only transactions can be made faster.


    *   **Help** **InnoDB detect read-only transactions**: That can be done by making
    use of the aforementioned read-only statement or by turning on the `autocommit`
    setting and running non-locking select queries.


    *   **Turn off** `autocommit` **when inserting large amounts of data, and then
    enable it once all data is inserted**: After you do this, InnoDB will no longer
    commit every time rows are inserted – instead, commits will be made after all
    transactions complete, thus making your `INSERT` queries faster.


    Finally, to optimize redo logs within InnoDB, consider increasing their size (look
    at the `innodb_redo_log_capacity` variable), keep your log buffer large enough,
    and consider modifying the InnoDB log spin variables (these variables can help
    reduce latency.)


    InnoDB has a lot of variables, and some of those include variables you wouldn’t
    even think about – at the same time, not all of them are necessary even if you
    find yourself working with incredibly big data sets.


    In case you find yourself necessitating the use of MyISAM (I hope that’s to supplement
    InnoDB, not to replace it), look into its `key_buffer_size` (that’s the `innodb_buffer_pool_size`
    equivalent in MyISAM), `thread_cache_size` defines the number of reusable threads
    available for the MyISAM cache, making the `bulk_insert_buffer_size` larger may
    help make bulk `INSERT` operations faster on tables that aren’t empty, and `read_buffer_size`
    and `sort_buffer_size` will help with increasing read and sort buffer sizes for
    MyISAM. Use MyISAM cautiously and weigh your decision before taking any action.
    Finally, remember that following best practices is often enough – the catch is
    that those practices are incredibly nuanced and to follow them, you have to know
    your way around databases and your storage engine internally.


    ## Data Types in MySQL


    One of the database best practices has to do with data types: they’re directly
    responsible for the size of your data, and the bigger your data sets become, the
    more important data types will be. As already mentioned in Chapter [3](#625040_1_En_3_Chapter.xhtml)
    of this book, MySQL has a variety of data types, but these can be dumbed down
    into a couple of categories the main ones being string, numeric, and date and
    time.


    Each column in a table will have a data type, and depending on what that data
    type is, your database will be told what data it should store in that specific
    column. Also, keep in mind that values stored in any table will be affected by
    character sets regardless of what data type they use – depending on the character
    set you find yourself using, MySQL may allocate more or fewer bytes per character
    stored. Latin1 or ASCII character sets are unlikely to require more than 1 byte
    of storage per character, utf8-based character sets may take 3 bytes, while since
    utf8mb4 covers all Unicode characters, it takes up to 4 bytes of space to store
    one character.


    To fully understand data types, you have to go a lot further than just scratch
    the surface – data types exist for a reason and all data you insert into your
    columns has an impact on the maximum column size, too. By default, MySQL‘s column
    size is limited to 767 bytes, and that’s one of the main reasons behind errors
    like these:


    ```

    Index column size too large. The maximum column size is 767 bytes.

    ```


    Such an error occurs where the index column size is above 767 bytes – in other
    words, such an error may be encountered when we have `VARCHAR` or `TEXT`-based
    columns with around 200 characters and a collation that necessitates more than
    3 bytes per character. Such errors can be overcome by setting the format for InnoDB
    tables to either `DYNAMIC` or `COMPRESSED`, but truthfully, if you are facing
    such errors, the issue is likely to be much deeper: why do you need to index a
    column bearing 200 characters in the first place? What read operations benefit
    from such a lengthy column? In other words, *what’s your use case?* You would
    be surprised how many developers just put “255” when defining column length. As
    if that’d be the only value defining length. Can you deal with fewer characters
    in a column? Sure you can – why don’t you set the column length to the actual
    maximum length that you expect? Setting the column length to 60 or even 40 characters
    may be the sweet spot saving you disk space, preventing errors, and saving you
    headaches as a result, too.


    ### String-Based Data Types


    As far as string-based data types go, if we look at MySQL, and then MariaDB, we
    will notice that most of the data types are the same, but if we look closely,
    we will notice that MariaDB supports a bunch of string data types that MySQL does
    not and those include `LONG` and `LONG VARCHAR` (these are synonyms for `MEDIUMTEXT`),
    the `ROW` data type for stored procedures, as well as the `UUID` data type and
    `INET4` or `INET6` data types, too.


    MariaDB is unique in such a wide string data type offering, and while MySQL doesn’t
    offer such data types directly, people can employ certain functions to achieve
    similar goals.


    The string data types offered by MariaDB are indeed unique: the UUID data type
    offered by the DBMS lets us store **U**niversally **U**nique **Id**entifiers which
    are 128-bit 36-character strings that uniquely identify objects, and the INET4
    or INET6 data types are suitable to store IPv4 or IPv6-related data.


    Aside from data types unique to MariaDB, the DBMS also supports “ordinary” string
    data types like `VARCHAR` and `TEXT`, too. Some may wonder if MariaDB’s support
    for string-based data types differs from the approach taken by MySQL, and the
    quick answer is yes, but only in some cases where it makes sense. For example,
    since MariaDB supports engines not supported by MySQL such as ColumnStore, if
    we’re using the `VARCHAR` data type in ColumnStore, our defined number would no
    longer represent the maximum amount of characters that can be stored – it would
    represent the maximum length of the column in bytes. This makes sense because
    ColumnStore is suitable for incredibly big data sets (petabytes), and if you’re
    storing such amounts of data in MariaDB, bytes are likely to be more important
    than the number of characters in a column.


    ### Numeric Data Types'
  trans: '

    ## 优化 MySQL 性能的注意事项


    ### 按需分区数据

    你已经了解了分区的强大功能，分区与索引结合可以形成一个极其强大的组合。我指的是在毫秒内扫描数十亿行数据——如果你的存储引擎经过优化、索引已就位，但对更大数据集的查询仍然完成得很慢，那么索引可能就是罪魁祸首。


    ### 检查 InnoDB 的缓冲池和日志文件

    确保 InnoDB 缓冲池和日志文件的大小足够大。我已经多次提到这一点，这样做有助于减轻 InnoDB 不必要的磁盘刷新和其他活动。旧版本的 MySQL 有名为`innodb_buffer_pool_read_requests`和`innodb_buffer_pool_reads`的变量，分别描绘了读取缓冲池的请求次数以及实际发生了多少次读取，这些信息也很有用。但如果你使用的是较新版本的数据库管理系统，这些选项很可能已经消失了。


    ### 利用 `START TRANSACTION READ ONLY` 语句

    这个语句虽不广为人知，但对于运行只读事务的用户来说，MySQL 5.6 引入了一项重要的更新：MySQL 有意通过避免设置事务 ID 来减少 InnoDB
    中只读事务的开销。这是一个小改动，但由于事务 ID 仅用于写操作或带有锁定读的操作，只读事务可以变得更快。


    ### 帮助 InnoDB 检测只读事务

    这可以通过使用前述的只读语句，或者通过开启`autocommit`设置并运行非锁定的 select 查询来实现。


    ### 插入大量数据时关闭 `autocommit`，待所有数据插入完成后再启用

    执行此操作后，InnoDB 将不再在每次插入行时提交——而是会在所有事务完成后才进行提交，从而使你的`INSERT`查询更快。


    ## 数据类型


    ### MySQL 中的数据类型

    数据库最佳实践之一与数据类型有关：它们直接决定了你数据的大小，而你的数据集越大，数据类型就越重要。正如本书第 3 章已经提到的，MySQL 有多种数据类型，但可以简化为几个主要类别：字符串、数值以及日期和时间类型。


    表中的每一列都将有一个数据类型，根据该数据类型，你的数据库将被告知应在该特定列中存储什么数据。此外，请记住，任何表中存储的值都会受到字符集的影响，无论它们使用什么数据类型——根据你所使用的字符集，MySQL
    为每个存储的字符分配的字节数可能更多或更少。Latin1 或 ASCII 字符集不太可能每个字符需要超过 1 字节的存储空间，基于 utf8 的字符集可能需要
    3 字节，而由于 utf8mb4 涵盖所有 Unicode 字符，存储一个字符最多需要 4 字节的空间。


    要完全理解数据类型，你需要比仅仅了解表面更深入——数据类型的存在是有原因的，你插入列中的所有数据也会影响最大列大小。默认情况下，MySQL 的列大小限制为
    767 字节，这是导致类似以下错误的主要原因之一：


    ```

    Index column size too large. The maximum column size is 767 bytes.

    ```


    当索引列大小超过 767 字节时会发生此类错误——换句话说，当我们有大约 200 个字符的`VARCHAR`或`TEXT`类型列，并且其排序规则要求每个字符超过
    3 字节时，就可能遇到此类错误。可以通过将 InnoDB 表的格式设置为`DYNAMIC`或`COMPRESSED`来克服此类错误，但说实话，如果你面临此类错误，问题可能要深得多：你首先为什么需要索引一个包含
    200 个字符的列？哪些读取操作能从如此长的列中受益？换句话说，*你的用例是什么？* 你会惊讶于有多少开发人员在定义列长度时只是随意填个“255”，好像这是定义长度的唯一值似的。你能用更少的字符处理列吗？当然可以——为什么不将列长度设置为你实际预期的最大长度呢？将列长度设置为
    60 甚至 40 字符可能才是既能节省磁盘空间、防止错误，又能让你免于头疼的最佳选择。


    ### 字符串数据类型

    就字符串数据类型而言，如果我们比较 MySQL 和 MariaDB，会发现大多数数据类型是相同的，但仔细观察会发现 MariaDB 支持一些 MySQL 不支持的字符串数据类型，包括`LONG`和`LONG
    VARCHAR`（这些是`MEDIUMTEXT`的同义词）、用于存储过程的`ROW`数据类型，以及`UUID`数据类型和`INET4`或`INET6`数据类型。


    MariaDB 在提供如此广泛的字符串数据类型方面是独特的，虽然 MySQL 不直接提供这些数据类型，但人们可以使用某些函数来实现类似的目标。


    MariaDB 提供的字符串数据类型确实独特：该 DBMS 提供的 UUID 数据类型让我们可以存储**通用唯一标识符**，它们是 128 位 36 字符的字符串，用于唯一标识对象；而
    INET4 或 INET6 数据类型则适合存储 IPv4 或 IPv6 相关数据。


    除了 MariaDB 特有的数据类型外，该 DBMS 也支持“普通”字符串数据类型，如`VARCHAR`和`TEXT`。有些人可能会想知道 MariaDB
    对基于字符串的数据类型的支持是否与 MySQL 的做法不同，简短的答案是肯定的，但只在某些有意义的情况下。例如，由于 MariaDB 支持 MySQL 不支持的引擎，如
    ColumnStore，如果我们在 ColumnStore 中使用`VARCHAR`数据类型，我们定义的数字将不再代表可以存储的最大字符数——它将代表列的最大字节长度。这是合理的，因为
    ColumnStore 适用于极其庞大的数据集（PB 级），如果你在 MariaDB 中存储如此大量的数据，字节可能比列中的字符数更重要。


    ### 数值数据类型

