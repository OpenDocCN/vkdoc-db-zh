  trans: '# MariaDB 中的数值数据类型


    除了字符串数据类型外，MariaDB 也支持数值数据类型。在这方面，事情稍微简单一些：虽然 MySQL 中不可用的数据类型在这里得到了支持，但这些数据类型并非革命性的，它们更多是代表同义词，而非
    MariaDB 独有的全新数据类型。


    此类同义词包括数据类型 `INT1`、`INT2`、`INT3`、`INT4` 和 `INT8`。这些数据类型分别是 `TINYINT`、`SMALLINT`、`MEDIUMINT`、`INT`
    和 `BIGINT` 的同义词。数值数据类型本身并不特别令人印象深刻，但请记住，它们的类型（如 `TINYINT` 等）与其对应的字符串类型并非完全“直接映射”：例如，`TINYTEXT`
    最多支持 255 个字符，而 `TINYINT` 的大小范围并非 0 到 255，而是 -128 到 127。


    你无需记住每种数据类型的大小，但要记住 `INT` 并非解决所有问题的唯一选择——许多开发者在 `TINYINT` 就已足够的情况下仍定义 `INT` 作为数据类型，这会让你感到惊讶。请注意表的结构并提前思考——数据类型并非一成不变，但提前定义一个考虑周全的数据类型，无论该数据类型是文本还是整数相关的，都可能在未来为你带来诸多好处。


    ## 日期、时间、空间和 JSON 数据类型


    除了字符串和整数数据类型外，还有一些数据类型也非常适合其他各种用途。这些用途可能包括存储时间值、地理约束或 JSON 数组。


    在数据库管理系统中使用多种数据类型的场景不计其数，这就是为什么 MySQL 对字符串或整数数据类型的支持并非终点：许多应用程序会为内部目的记录用户执行操作的时间，这是借助描绘日期和时间值的数据类型完成的。其中最流行的数据类型可能包括
    `TIMESTAMP` 和 `DATETIME` 数据类型，还有一些数据类型支持特定格式：`DATE` 数据类型可以让你以 `YYYY-MM-DD` 格式存储日期，`TIME`
    数据类型可以以 `HH:MM:SS.ssssss` 格式存储精确到毫秒的时间，而 `YEAR` 数据类型则能够存储年份。几何或空间数据类型，如 `GEOMETRY`
    或 `POINT`，有助于存储空间数据，而 `JSON` 数据类型则使开发者能够处理基于 `JSON` 的数据集。


    对 `JSON` 数据类型的支持也并非什么新鲜事：开发者确实需要处理 JSON 数据，自然也需要将其存储在数据库中。MySQL 的高级用户会知道，在 MariaDB
    中，由于与 MySQL 的兼容性问题以及 SQL 标准问题，`JSON` 与 `LONGTEXT` 是相同的。尽管如此，MariaDB 提供了对 `JSON`
    数据的完整支持，甚至为用户提供了函数，允许在向表插入任何数据之前检查其结构的有效性。为此，我们需要创建一个带有 `CHECK` 约束的表，该约束与检查列中数据有效性的
    `JSON_VALID` 函数协同工作。整体看起来大致如下：


    ```sql

    --首先，我们创建带有 CHECK 约束的表：

    CREATE TABLE `json_demo` (

    `json_col` JSON

    CHECK (JSON_VALID(`json_col`))

    );

    --我们的数据库将允许类似这样的 JSON 值：

    INSERT INTO `json_demo` VALUES (''{"id": 1, "information": "This book is cool!",
    "extra": "Read on and learn more things."}'');

    --但禁止以下无效的非 JSON 值：

    INSERT INTO `json_demo` VALUES (`Invalid value`);

    ```


    ![](img/625040_1_En_8_Fig1_HTML.jpg)


    图 8-1：JSON 列验证示例


    ## 数据类型的存储要求


    数据类型并非孤立存在——它们带有你必须考虑的显著开销：该开销与存储要求有关。存储要求不仅取决于数据类型，还取决于你所使用的存储引擎，并且根据你使用的是 InnoDB
    还是 NDB 引擎而有所不同。


    你必须考虑的主要区别在于存储引擎存储数据的方式：InnoDB 以其行存储格式而闻名，这些格式具有多种不同的特性，这就是人们通过更改行存储格式来“克服”诸如“索引列大小过大”之类问题的原因；要理解为什么切换到不同的
    InnoDB 行格式可能解决问题，我们必须了解各种 InnoDB 行格式的特性。下面列出了部分 InnoDB 行格式的特性：


    | InnoDB 行格式 | 特性 |

    | --- | --- |

    | `DYNAMIC` | InnoDB 中的默认行格式。与 `COMPACT` 类似，具有相同的存储要求。支持大索引前缀。 |

    | `COMPACT` | 提供紧凑存储支持，但不支持大索引前缀。存储要求与 `DYNAMIC` 相同。 |

    | `REDUNDANT` | 此行格式是冗余的，因为它大多已不可用；其目的是为旧版 MySQL 提供支持。 |

    | `COMPRESSED` | 以其对表和索引的数据压缩支持而闻名，其他方面与 `DYNAMIC` 行存储格式作用相同。 |


    行格式可以全局更改（为此，我们需要修改 `my.ini` 或 `my.cnf` 中的 `ROW_FORMAT` 变量，并将其设置为上述可用值之一），也可以通过类似下面的
    `ALTER TABLE` 查询按数据库/表进行更改：


    ```sql

    ALTER TABLE [table_name] ROW_FORMAT=[format here];

    ```


    行格式也有两个“姐妹”——Antelope 和 Barracuda。这两个姐妹指的是 InnoDB 中可用的文件格式，并与行格式协同工作：就 InnoDB
    而言，Antelope 支持 `COMPACT` 和 `REDUNDANT` 行格式，在过去，它是 MySQL 中的默认文件格式。Barracuda 支持
    InnoDB 中所有可用的行格式，并且是当今 MySQL 和 MariaDB 中的默认文件格式。


    现在你了解了文件格式和行格式也在起作用，是时候看看特定数据类型的实际存储要求了。为简化呈现，我将使用两个字母——B 表示“以字节为单位的列长度”，C 表示“以字符为单位的列长度”：


    | 数据类型 | 存储要求 |

    | --- | --- |

    | `VARCHAR(C)` 和 `VARBINARY(C)` | 如果 C 小于 255 字符，则为 B + 1 字节。否则为 B + 2 字节。 |

    | `TINYBLOB`/`TINYTEXT`、`BLOB`/`TEXT`、`MEDIUMBLOB`/`MEDIUMTEXT`、`LONGBLOB`/`LONGTEXT`/`JSON`
    | B + 1 字节、B + 2 字节、B + 3 字节、B + 4 字节 |

    | `TINYINT`、`SMALLINT`、`MEDIUMINT`、`INT`/`INTEGER`、`BIGINT` | 分别为 1、2、3、4 和 8
    字节。 |

    | `YEAR`、`DATE`、`TIME`、`TIMESTAMP`、`DATETIME` | 分别为 1 字节、3 字节、3 字节、4 字节和 5 字节。`TIME`、`TIMESTAMP`
    和 `DATETIME` 还需要额外的几个字节来存储小数秒部分。 |


    上表并未涵盖绝对所有数据类型，但它将为你提供一个良好的起点。在有了良好的开端之后，请理解存储要求可能会根据你在列中存储的字符数量以及你使用的字符集而发生变化，因为某些字符集可能由于各种原因需要多于一个字节来存储一个字符。


    ## 选择合适的数据类型


    要为你的用例选择合适的数据类型，请从宏观视角审视你的数据库及其内部的表：存储了什么数据？更新频率如何？是否使用了索引？数据是否分布在多个分区上？'
- fmt: 'The answers to these questions will let you drift toward a data type path
    that’s acceptable both for you and your database. For example, indexes are great
    if you use them properly – but not all of them may be used in the same way with
    all data types. Be aware of rules that apply once indexes are in place:


    *   If you index columns with `BLOB` or `TEXT` data types, be aware that you won’t
    be able to index them in full: Such data types necessitate the usage of prefix
    indexes instead. Prefix size depends on what kind of row format is in use – if
    we use the `COMPACT` or `REDUNDANT` row storage format, they can be up to 767
    bytes long, and if we use the default (`DYNAMIC`) or `COMPRESSED` row storage
    format, the length limit jumps to 3072 bytes. For those of you indexing on `MyISAM`,
    the limit will be set to 1000 bytes.


    *   Data types impact index size: The smaller the size of your index, the fewer
    paging operations are required. Also, if comparison operations are necessary,
    comparing integer values will likely be faster than comparing variable character
    (`VARCHAR`) values.


    Rules also apply for partitioning and other operations running within your database
    – operations that are directly dependent on your use case. However, inventing
    a bike here won’t be necessary: choosing the proper data type isn’t rocket science,
    and all you need to do is choose the most precise storage unit for your use case.
    In other words, refer to the documentation before making decisions on what data
    type to choose for values you intend to store in the column in question. For example,
    if you intend to store integer values from 0 to 100, look into `TINYINT`. Intend
    to store larger text values and have a need to index the entire column? Look into
    `VARCHAR`, etc.


    ### Optimizing Schemas and Data Types for Big Data


    When bigger data sets are involved, the game changes. You don’t need to look far
    to understand that a negative connotation exists: “MySQL with big data? You’re
    crazy?!”


    If we take a step back, it isn’t hard to understand that everything is possible
    if you optimize your server and the data within properly. Sure, you may be hard-pressed
    to run bigger data sets if you find yourself using shared hosting, the rest of
    it comes down to experience, reading, and learning as you go along, and it isn’t
    hard to run big data sets even on a normal-sized VPS to begin with. I’ll give
    you a great example below:


    Out of the following things, what would be the first thing to look at when optimizing
    your database for big data on a mid-sized server?


    1.  How many tables are in the database.

    2.  The amount/variety of queries running within the DBMS.

    3.  The configuration file (`my.ini` or `my.cnf`).

    4.  Data types.

    5.  Indexes.


    Think for a second: what’s the most logical answer? Right – you will look at the
    configuration file. Why? Because that’s where everything begins. You may already
    have answers to all of the most pressing questions (Are your `INSERT` queries
    slow? Switch them to `LOAD DATA INFILE`, etc.), and it’s only after you understand
    the internals of these answers – once you understand what makes them tick – that
    you’re able to understand what makes your database perform the best.


    All the things in the list are important, and there’s no denying that – we’ll
    get into working with big data in a chapter dedicated to it later on in the book,
    and you will find out just how crucial the synergy of all of those things working
    together is for your database – but for now, come back to the schema and data
    type realm. How do you optimize them for big data?


    The question is complex: the answer is simple – you do that by keeping your approach
    simple and avoiding complex decisions. Keeping things simple will save you a lot
    of headaches in this realm – you have a lot of data to begin with, so why do you
    need additional problems? The rules are simple:


    1.  Structure your tables carefully and with a look into the future.

    2.  Choose a general use case collation if you don’t need anything specific.

    3.  Keep data types simple.

    4.  Index what’s necessary.

    5.  If you partition, look into the nuances of partitions and choose the partitioning
    type most suitable for your use case.


    Keep things simple and be aware of the internals of data types to keep yourself
    out of trouble. Always remember examples – storing integers from 0 to 100? Look
    into `TINYINT`. The same applies to other data types – consult the documentation
    and your colleagues to make informed decisions, and choosing data types for bigger
    data sets won’t seem like such a big problem to solve.


    Making informed decisions involves many other things apart from data types, and
    these actions may become harder when bigger data sets are involved, and that’s
    why this book has an entire chapter dedicated to big data: there’s so much more
    that’s needed to be said, so be curious and follow along – I’ll tell you about
    big data sets after you learn to optimize your queries.


    ## Summary


    Optimizing storage engines, schemas, and data types isn’t an easy task, but it’s
    necessary to complete to advance query performance. Storage engines, schemas,
    and data types make up the part of the iceberg that’s invisible, but crucial to
    understand for those striving to achieve high performance in their everyday work
    with `MySQL` or `MariaDB`.


    High performance can seldom be achieved without optimizing queries themselves,
    and there’s a lot that goes into their internals – now, I’ll walk you through
    how to do just that as well.


    # 9. Optimizing Queries


    Optimizing SQL query performance is a big task to perform. To properly understand
    why, we have to come back to the basics: data can be inserted, updated, selected,
    and if necessary, deleted. These four tasks necessitate the existence of four
    types of SQL queries: those queries are `INSERT`, `UPDATE`, `SELECT`, and `DELETE`.
    There are other queries, too, but those four queries form a “CRUD triangle”: a
    triangle of queries that can *Create*, *Read*, *Update*, and/or *Delete* data.


    To optimize these queries, we need to understand a simple truth that has been
    repeated many times throughout the book already to begin with: queries are tasks
    – to optimize their performance, we optimize the performance of those tasks or
    get rid of them. To begin optimizing task performance or getting rid of them,
    we must get to know those tasks and to get to know them, we must familiarize ourselves
    with their internals. Flick back to Chapter [4](#625040_1_En_4_Chapter.xhtml)
    – there, we’ve already familiarized ourselves with the profiling of `SELECT` queries.
    I will come back to them a little later, but first, I’ll answer the burning question.


    ## Why Optimize SQL Queries?


    “I’m so happy my SQL queries are slow today!” said no one ever. Slow SQL queries
    are the cause of many headaches for you as a developer, the reason for bad reviews
    for your company, or the cause of lost customers for your boss. In many cases,
    slow SQL queries are the basis of any slow-performing application: and if we don’t
    optimize them, we can forget about improved database efficiency and performance.


    You already know what factors may break your queries: your schema design isn’t
    perfect, data types live in your database without a care in the world, or perhaps
    you have too few (or too many) partitions or indexes. The answer depends on the
    type of query you find yourself running. Chapter [4](#625040_1_En_4_Chapter.xhtml)
    has shown a way to profile query performance by making use of `SHOW PROFILES`:
    profiles include the tasks performed by a query. Profile your queries – profiles
    will provide a good starting point. After you do that, remember the following:'
