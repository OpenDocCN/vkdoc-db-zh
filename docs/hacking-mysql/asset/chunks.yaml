    useful for search engines, and they can be of immense use if your application
    allows a user to change passwords, confirm a purchase by clicking on a link, etc.
    – anything that could make a nefarious party think “hmm, and if I send a request,
    maybe I’ll benefit from this too?” CSRF tokens prevent CSRF attacks in that they’re
    unique for each request/session and consist of a random value that’s impossible
    to guess. I’ll walk you through how to implement them in the security part of
    this book.


    10.  **Write clean code**: Clean code can contribute to the longevity of your
    databases as well. Anyone who’s ever had to remake a legacy codebase knows exactly
    what I mean: you’re going through the code base, and you’re like “Why did *that*
    get included here?!” Avoid overcomplicating things and keep things simple: keep
    your code well-organized and well-structured, and you will see numerous benefits:
    it’s likely to run faster, use less memory, and your database, application, and
    your future self will thank you too.


    Adhere to those 10 things, and your application and database will surely thank
    you. With that being said, keep in mind that these things aren’t a panacea, and
    they will only work if your application (and database at that) is built properly.
    You will make mistakes (who doesn’t?) – learn from them.


    Ever heard of the Brachistochrone curve experiment? It proves that a ball can
    roll along a curved line faster than on a straight line – take note of that: your
    mistakes are likely to move you further than other people who take a “straight”
    path. Learn and move quickly: mistakes will be inevitable, but they’re not the
    end of the world.


    When coding any application making use of MySQL, take a special interest in your
    server and data storage. Using the best architecture possible isn’t always the
    wisest choice: great components also have a great cost, and experience in fiddling
    with MySQL components is sometimes likely to yield better results than throwing
    money at architecture.'
