    \ specific DBMS in question and remember that the most complex problems often\
    \ require the simplest solutions – deadlocks are not an exception to the rule.\
    \ To solve issues posed by deadlocks, restart a transaction and make sure that\
    \ the so-called `Coffman’s conditions` aren’t present in your database – those\
    \ conditions often create opportunities for deadlocks to manifest:\n\n1.  **Mutual\
    \ exclusion**: One or more resources should be held in a manner that prevents\
    \ itself from being shared with other resources.\n\n2.  **Holding of resources**:\
    \ One or more processes should hold a resource and request more resources, some\
