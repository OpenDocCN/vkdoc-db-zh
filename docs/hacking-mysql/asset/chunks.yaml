    ## Why Optimize SQL Queries?


    “I’m so happy my SQL queries are slow today!” said no one ever. Slow SQL queries
    are the cause of many headaches for you as a developer, the reason for bad reviews
    for your company, or the cause of lost customers for your boss. In many cases,
    slow SQL queries are the basis of any slow-performing application: and if we don’t
    optimize them, we can forget about improved database efficiency and performance.


    You already know what factors may break your queries: your schema design isn’t
    perfect, data types live in your database without a care in the world, or perhaps
    you have too few (or too many) partitions or indexes. The answer depends on the
