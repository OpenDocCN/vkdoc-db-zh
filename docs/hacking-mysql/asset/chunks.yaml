- fmt: "Quite a lot of parameters you can optimize, right? However, while knowing\
    \ what the parameters above do will act as a good starting point before we break\
    \ our MySQL instances, most of you will probably not need to modify or even look\
    \ at all of them – optimizing a couple of them will be more than enough, and the\
    \ rest should be touched upon if you want to push InnoDB to its limits later on.\n\
    \n## InnoDB Parameters\n\nWhen initially optimizing InnoDB, pay attention at the\
    \ seven emboldened values:\n\n1.  `innodb_buffer_pool_size`: Set the buffer pool\
    \ size to 60–80% of the available RAM in your system. The bigger the buffer pool\
    \ is, the more data and indexes InnoDB will be able to cache, and as a result,\
    \ your SQL queries will complete faster.\n2.  `innodb_data_file_path`: This parameter\
    \ may not seem very significant at first glance, but keep in mind that the data\
    \ file (explained below) stores a whole host of data relevant to your tables.\
    \ As such, if you’re working on a big data-based project, it’s crucial to set\
    \ the data file path on a drive that lots of space.\n3.  `innodb_file_per_table`:\
    \ Leave this parameter at its default value of 1. By doing so, you remove unnecessary\
    \ clutter from the data file by enabling InnoDB to store tables in separate files,\
    \ as well as provide yourself with more leniency for maintenance operations in\
    \ the future.\n4.  `innodb_flush_log_at_trx_commit`: It is usually best to leave\
    \ this parameter at the default value – 1 – to ensure your database stays ACID-compliant.\
    \ It’s possible to specify other values like 0, 2, and 3 as specified above, but\
    \ those will sacrifice ACID for speed.\n5.  `innodb_flush_method`: As stated above,\
    \ this parameter defines the method InnoDB will use to flush logs once a transaction\
    \ is committed. Here’s all of your available options:\n    1.  `normal`: Simulated\
    \ asynchronous I/O, buffered I/O.\n    2.  `unbuffered`: Simulated asynchronous\
    \ I/O, non-buffered I/O.\n    3.  `async_unbuffered`: Windows asynchronous I/O\
    \ and non-buffered I/O. The default setting for Windows users.\n    4.  `fsync`:\
    \ Makes InnoDB use the `fsync()` function to synchronize the state of the database\
    \ and the server. The default setting for Linux users.\n    5.  `O_DSYNC`: Makes\
    \ InnoDB use the `O_DSYNC` function to guarantee that both data and metadata have\
    \ been written to the disk before flushing the log files. Usually a faster alternative\
    \ to `O_DIRECT` at the expense of data consistency.\n    6.  `nosync`: Intended\
    \ to be used for internal testing and unsupported for production use cases.\n\
    \    7.  `littlesync`: Intended to be used for internal testing and unsupported\
    \ for production use cases.\n    8.  `O_DIRECT`: Imposes a hint toward InnoDB\
    \ saying that you want the data to bypass the cache of the Linux kernel. Generally\
    \ slower than `O_DSYNC`, but more stable and data consistent.\n    9.  `O_DIRECT_NO_FSYNC`:\
    \ Imposes a hint toward InnoDB stating a desire to use `O_DIRECT` while skipping\
    \ the `fsync()` function.\n6.  `innodb_log_buffer_size`: The log buffer size is\
    \ crucial for quickly writing to the log files on the disk. Making the log buffer\
    \ larger will enable larger transactions to be completed quicker and, thus, save\
    \ disk I/O.\n7.  `innodb_redo_log_capacity`: An alternative to the now-deprecated\
    \ `innodb_log_file_size` and `innodb_log_files_in_group` variables. If this variable\
    \ is left undefined and the log file size and log files in the group are defined\
    \ instead, the value of this parameter is calculated using a formula (`innodb_log_files_in_group\
    \ * innodb_log_file_size`). If not, InnoDB uses the value specified in this parameter.\n\
    \nThe understanding of the parameters described above is crucial to achieve your\
    \ performance objectives, but also bear in mind that these parameters would not\
    \ be complete without the InnoDB system tablespace – `ibdata1`.\n\nInnoDB also\
    \ has a data file that is also referred to as “the system tablespace” as described\
    \ above. The file is the aforementioned `ibdata1` – it resides in the `bin` directory\
    \ of your MySQL Server installation and acts as the backbone for everything related\
    \ to the InnoDB storage engine. `ibdata1` stores the data and indexes from all\
    \ InnoDB-based tables, the undo space and rollback segments, the double-write\
    \ buffer, changes to secondary indexes or insert buffers, and Multiversion Concurrency\
    \ Control (MVCC) data. Enabling `innodb_file_per_table` will help alleviate the\
    \ damage, but if `ibdata1` is deleted or corrupted, your data is gone.\n\nAside\
    \ from that, there’s a lot that can be said about `ibdata1` and related files\
    \ – you will learn the specifics when we Break and Optimize our database. Before\
    \ doing that, you must educate yourself about the rest of the storage engine choices\
    \ available to you.\n\nOne thing you must keep in mind is that various flavors\
    \ of MySQL come with different options for search engines, too – Percona Server\
    \ is famous for its XtraDB offering, while MariaDB can enable you to store data\
    \ in Amazon S3 servers or offer a crash-safe alternative to MyISAM. But about\
    \ everything from the beginning…\n\n## Percona Server\n\n### Storage Engines in\
    \ Percona Server\n\nPercona Server can be thought of as an enhanced version of\
    \ MySQL Server. The server is a free and an open source alternative to MySQL that’s\
    \ focused on offering blazing-fast performance.\n\nPercona Server works similarly\
    \ to its counterparts – it does support InnoDB in all its glory, but it has a\
    \ trick up its sleeve, too: Percona is well known for its XtraDB fork too.\n\n\
    XtraDB is an enhanced version of InnoDB with custom built-in options to enhance\
    \ performance. It’s not anything magic, but if you’re tinkering around with InnoDB,\
    \ you will certainly hear about its brother XtraDB as well.\n\nContrary to popular\
    \ belief, XtraDB can also be used in MariaDB and even was its default storage\
    \ engine up until MariaDB 10.1 – that’s no longer the case because starting from\
    \ MariaDB 10.2, the team switched back to InnoDB as XtraDB had many improvements\
    \ over InnoDB in older versions of the database management system, but over time,\
    \ InnoDB has quickly caught up.\n\nSome argue that with properly optimized options,\
    \ XtraDB is only marginally better than InnoDB, but there are a couple of things\
    \ you should know nonetheless.\n\nXtraDB builds on the foundation of InnoDB and\
    \ exploits its robust design while adding more features and metrics on top. Percona\
    \ Server also supports two other storage engines not available in MySQL – MyRocks\
    \ and TokuDB.\n\n### Percona MyRocks and TokuDB"
