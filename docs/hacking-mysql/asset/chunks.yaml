- fmt: '# 安全框架指南


    ## NIST 网络安全框架


    根据该框架，首先需要识别受保护数据的种类。此步骤包括列出所有正在使用的设备、硬件、软件、适用的插件及其他应用。由于 NIST 针对的是组织行为，此步骤还包括计算机、笔记本电脑、平板电脑、手机、销售点设备等。是的，此步骤还包括列出您当前用于保护数据的所有应用，例如防火墙。


    保护硬件和软件资产说起来容易做起来难，但框架提出了几种方法：考虑使用防火墙、对数据进行加密、测试备份策略，并在组织内引入安全策略。


    采取措施，确保您和您的团队是第一个知晓安全事件发生的人。这意味着要监控网络和设备是否存在未经授权的访问，禁止将 USB 闪存盘、外置硬盘和网络附加存储设备等插入网络。


    NIST 框架还指出需要制定计划，通知客户、员工和软件用户您已遭受数据泄露。制定计划以调查黑客攻击，并在必要时向执法部门报告攻击事件。


    最后，框架建议制定计划，以恢复受数据泄露影响的数据、设备及部分软件。该计划应定期测试，以确保其能够胜任任务并可用。


    ## OWASP Top 10 (2021)


    在关注组织内部事宜（社交工程仍然存在）之后，是时候熟悉 OWASP 框架了。OWASP 框架通常每 4-5 年更新一次，因为列表中会添加/移除新的漏洞。但无论如何，它确实为那些保护数据库和应用程序的人提供了一个良好的起点。以下是最近的——2021
    年—— OWASP Top 10 的内容，缺陷按重要性从高到低排列：


    | 安全问题 | 解释 |

    | --- | --- |

    | 失效的访问控制 | 当应用程序允许任何人访问本应仅对某些特权用户（例如管理员、付费用户等）可用的页面时，就会发生失效的访问控制。 |

    | 加密机制失效 | 加密机制失效（例如，未加密或不正确加密的数据、不正确哈希的密码等）通常会导致系统被入侵。 |

    | 注入 | 每当我们直接将未经验证的用户输入传递到数据库时，就会发生注入。2021 年版的 OWASP 将跨站脚本（XSS）视为注入的一部分，大概是因为其“注入”性质（攻击者必须注入载荷，使用输入字段测试
    XSS 等）。 |

    | 不安全设计 | 应用程序在设计上就应该是安全的：2021 年版的 OWASP 提到了更安全的设计模式和原则的必要性。 |

    | 安全配置错误 | 如果应用程序启用了不必要的功能（例如，在不必要时启用了目录列表、不恰当的错误处理泄露了包含敏感数据的目录、禁用安全更新等），则可能容易受到安全配置错误的影响。
    |

    | 易受攻击和过时的组件 | 使用易受攻击和过时组件的应用程序更容易受到数据泄露的影响。攻击者发现平台使用过时组件后，可能会利用软件中已知的漏洞来访问您的系统内部，从而损害您的公司、客户、用户、员工以及其他所有人。
    |

    | 身份识别和认证失效 | 这类漏洞指的是未能正确验证用户身份，允许通过登录或注册表单进行暴力破解或其他攻击，允许使用弱密码等。无效的密码重置方法也可能属于此类。
    |

    | 软件和数据完整性失效 | 此漏洞类别指的是未能防止完整性违规的软件。一个主要的例子是包含没有 `integrity` 属性的样式表或脚本，该属性提供了脚本的
    SHA-384 哈希值，因此，如果脚本即使只改变了一个比特，哈希值也会不同，样式表或 JavaScript 文件将不再加载到系统中。 |

    | 安全日志和监控失效 | 此漏洞类别指的是未能充分记录和监控安全相关问题、遗漏可审计事件以及相关问题（例如，未记录登录系统的管理员 IP 地址，以作为可能的数据泄露的指标等）。
    |

    | 服务端请求伪造 (SSRF) | 当攻击者操纵服务器向内部资源发出请求，进而推进攻击时，就会发生此漏洞。 |


    除了 NIST 和 OWASP，不要忘记基础——在可能的地方过滤用户输入并对其进行清理（各种编程语言提供了适用于此特定任务的各种函数），并且不要在未经过滤的情况下将用户输入提供给数据库，以避免
    SQL 注入攻击（我稍后会详细介绍），这样您就能为开始保护您的应用程序和数据库铺平道路。


    ## 访问控制


    处理好基础知识后，别忘了您的数据库。数据库安全通常始于访问控制——并非 100% 需要查看/访问特定内容的用户无法访问它。确保您所有用户都使用强密码（如果可能，使用密码管理器），并且他们只能从指定的主机而不是任何可能的主机访问数据库。'
  raw: '1.  **Identification**: According to the framework, first you need to identify
    the kind of data you’re protecting. This step includes listing all equipment,
    hardware, software, applicable plugins, and other appliances you may be using.
    Since NIST is targeting organizational behavior, this step also includes computers,
    laptops, tablets, phones, point-of-sale devices, and so on. And yes, this step
    also includes listing any and all appliances you’re using to protect your data
    at present such as firewalls, too.


    2.  **Protection**: Surely, protecting your hardware and software assets is easier
    said than done, but the framework suggests a couple of ways you can go about this:
    consider using firewalls, encrypt your data, test your backup strategy, and introduce
    security policies into your organization.


    3.  **Detecting**: Take measures to ensure that you and your team are the first
    ones to know when an incident occurs. That means monitoring your networks and
    devices for unauthorized access, disallowing devices like USB sticks, external
    hard drives, and network-attached storage devices to be plugged into networks,
    etc.


    4.  **Responding**: The NIST framework also notes the need to have a plan to notify
    customers, employees, and users of your software that you’ve suffered a data breach.
    Have a plan to investigate the hack, and report the attack to law enforcement
    if necessary.


    5.  **Recovery**: Finally, the framework recommends you have a plan to recover
    your data, equipment, and parts of your software that were affected by the data
    breach. The plan should be tested regularly to ensure it’s up to the task and
    usable.


    Taking care of the internals of your organization (social engineering is still
    a thing), it’s time to familiarize yourself with the OWASP framework. The OWASP
    framework generally changes every 4-5 years as new vulnerabilities are added/removed
    from the list, but regardless, it does provide a good starting point for those
    securing their databases and applications. Here’s what the recent – 2021 – edition
    of the OWASP Top 10 has to say, with flaws ranging from the most to the least
    important:


    | Security Issue | Explanation |

    | --- | --- |

    | Broken access control | Broken access control occurs when an application allows
    anyone to access pages that should be available only for people with certain privileges
    (e.g., administrators, paid users, etc.) |

    | Cryptographic failures | Cryptographic failures (e.g., unencrypted or improperly
    encrypted data, improperly hashed passwords, etc.) often leads to compromise.
    |

    | Injection | Injection occurs whenever we pass unvalidated user input straight
    into a database. The 2021 edition of OWASP considers Cross-site Scripting part
    of Injection, presumably because of its “injectory” nature (attackers have to
    inject payloads, test for XSS using input fields, etc.). |

    | Insecure design | Applications should be built securely by design: the 2021
    edition of OWASP mentions the necessity for more secure design patterns and principles.
    |

    | Security misconfiguration | An application may be susceptible to security misconfiguration
    if it has unnecessary features enabled (e.g., directory listing is enabled where
    it’s not necessary, improper error handling that reveals directories with sensitive
    data inside of them, disabling security updates, etc.). |

    | Vulnerable and outdated components | Applications using vulnerable and outdated
    components are more susceptible to data breaches. After an attacker finds out
    that a platform uses outdated components, he or she may proceed to exploit known
    vulnerabilities within the software to gain access to the internals of your system,
    thus harming your company, customers, users, employees, and everyone else in the
    process. |

    | Identification and authentication failures | Such vulnerabilities refer to failures
    to properly verify the identity of the user, permitting brute-force or other attacks
    via login or registration forms, permitting weak passwords to be used, etc. Ineffective
    ways to reset passwords may also fall under this category. |

    | Software and data integrity failures | This vulnerability category refers to
    software that fails to protect against integrity violations. A prime example of
    this would be the inclusion of stylesheets of scripts without the integrity attribute
    that provides a SHA-384 hash of the script and thus, if the script changes even
    one bit, the hash won’t be the same and the stylesheet or javascript file will
    no longer be loaded into the system, etc. |

    | Security logging and monitoring failures | This vulnerability category refers
    to failure to adequately log and monitor security-related issues, the missing
    of auditable events, and related issues (e.g. not logging administrative IP addresses
    that have logged in to a system to have an indicator of a possible data breach,
    etc.) |

    | Server-Side Request Forgery (SSRF) | This vulnerability occurs when an attacker
    manipulates a server into making requests to internal resources, then furthering
    an attack. |


    Along with NIST and OWASP, don’t forget the basics – filter user input and sanitize
    it wherever possible (various programming languages offer various functions suitable
    for this specific task), and don’t provide user input to a database without filtering
    it to avoid SQL injection attacks (I’ll walk you through those in a second), and
    you should pave a way for beginning securing your applications and database.


    ## Access Control


    After taking care of the basics, don’t forget your database. Database security
    often starts with access control – users who aren’t 100% required to see/access
    specific content aren’t able to access it. Make sure that all of your users have
    strong passwords (use a password manager if possible) and that they’re only able
    to access databases from a specified host rather than any host possible.'
