- fmt: '# 数据库安全：保护您的数据免受攻击


    通常，这些应用程序需要登录详细信息。当用户提供这些信息时，系统会将提供的用户名或电子邮件以及哈希后的密码与数据库中的记录进行匹配。如果一切验证通过，则授予用户访问服务的权限。这种方法的问题在于，每当敏感数据存储在数据库中时，该服务就会成为黑客的目标，他们将这些数据视为可以出售给其他黑客以进行进一步的身份盗窃/凭证填充攻击的资产。然而，为了访问数据，他们不仅需要攻破应用程序，还需要获取数据库中具有相应权限来选择/更新数据的账户，然后进行数据转储，或者至少将数据库中的部分用户数据选择到其他来源。


    用户安全是帮助您保护应用程序和数据库免受此类攻击的支柱——确保使用密码管理器（更好的是，在整个组织的所有团队中强制使用密码管理器），使用强密码保护对数据库有任何类型访问权限的账户，确保数据库中的所有用户/客户账户也使用强密码（密码长度应至少为8个字符，包含大小写字母以及特殊符号），但不要强制执行过于严格的规则集（这是一把双刃剑，您甚至可能失去不愿麻烦的客户），并且避免以
    `root` 身份运行 MySQL/MariaDB，因为 `root` 用户拥有 `FILE` 权限，该权限可能被滥用以创建不必要的文件。


    许多 MariaDB 用户还建议创建一个具有随机/“普通”名称的用户作为 root 用户，并完全禁用对原始 root 用户的访问。这样，您将受益于通过隐匿实现的安全性——如果攻击者尝试访问
    root 账户，他会失败并可能转向其他更容易的目标。为此，您可以再次利用角色：


    1.  `CREATE ROLE rootprivilege WITH ADMIN your_user@localhost`

    2.  `GRANT ALL ON *.* TO rootprivilege WITH GRANT OPTION`

    3.  `Switch to your_user@localhost, then DROP USER root, root@localhost, root@...`

    4.  `GRANT rootprivilege TO account@localhost`


    现在，您拥有一个名为 `rootprivilege` 的权限，可以授予任何用户以赋予他们上帝级别的访问权限，但系统中没有 root 用户。这不是很酷吗？


    ## 保持数据安全的 MariaDB 组件和插件


    除了权限和角色之外，MySQL 和 MariaDB 都附带了一系列有助于保护数据库安全的组件和插件。MySQL 插件可以再次分为不同的类别：有认证插件、连接控制插件、帮助验证密码的插件和组件，以及诸如
    MySQL Enterprise Audit 和 MySQL Enterprise Firewall 等企业解决方案。


    认证插件描述了 MySQL/MariaDB 中可用的可插拔认证方法（本地可插拔认证、SHA-256 可插拔认证、LDAP 可插拔认证、FIDO 可插拔认证等）；连接控制插件指的是检查连接尝试并在必要时引入数据库响应延迟的插件。失败的登录尝试也会被记录在
    `CONNECTION_CONTROL_FAILED_LOGIN_ATTEMPTS` 表中。


    帮助验证密码强度的插件和组件包括一个名为 `validate_password` 的知名组件，该组件可以像这样安装/卸载：


    ```

    [UN]INSTALL COMPONENT ''file://component_validate_password'';

    ```


    默认情况下，`validate_password` 组件使您能够实施数据库范围的密码强度策略，并拒绝使用不符合特定标准的密码，例如长度不超过 8 个字符等。


    要修改 `validate_password` 检查密码强度的方式，请修改以 “`validate_password.`” 开头的系统变量。此类变量可能包括但不限于：


    *   `validate_password.policy`：可用值包括 `LOW`、`MEDIUM`（默认）和 `STRONG`，或其对应的数字值 `0`、`1`（默认）和
    `2`。使用 `LOW` 设置的策略将检查密码长度，`MEDIUM` 级别将检查密码长度以及数字、小写、大写和特殊字符，而 `STRONG` 级别将检查密码长度以及数字、小写、大写和特殊字符，并使用字典文件。

    *   `validate_password.number_count`：接受一个数值，计算密码中数字出现的次数。默认值 - 1。

    *   `validate_password.special_char_count`：接受一个数值，计算特殊字符出现的次数。默认值 - 1。

    *   `validate_password.length`：接受一个数值，指定最小可能的密码长度。此参数的默认值为 8，可以根据需要减少或增加该数值。

    *   `validate_password.mixed_case_count`：表示如果密码策略设置为 `MEDIUM` 或 `HIGH` 所需的最小混合大小写（小写和大写）字符数。

    *   ...


    当涉及企业解决方案时，MySQL 和 MariaDB 都提供企业级解决方案，例如 MySQL/MariaDB Enterprise Audit 和 MySQL
    Enterprise Firewall。正如它们的标题所示，这两款解决方案分别充当企业级审计和防火墙设备。企业级数据库防火墙通过检测或阻止按配置执行的 SQL
    语句（如果 SQL 语句与预定义的允许列表不匹配，它们将被拒绝执行或仍然执行，但数据库将通知管理员策略违规）、阻止 SQL 注入攻击、检测数据库入侵以及记录允许和阻止的
    SQL 查询来保护 MySQL 数据库中的数据。


    MySQL Enterprise Audit 使我们能够监控、记录并在必要时阻止在数据库中运行的查询执行。需要安装该插件，安装后，它会设置并写入审计日志文件（如果需要，可以重命名和/或更改其格式），并允许在必要时对审计日志文件进行加密和/或压缩。


    当然，企业级防火墙和审计插件的缺点在于其企业级定价：防火墙和审计插件都可能花费您数千美元。值得庆幸的是，其他解决方案（如 Web 应用程序防火墙）通常成本较低，并且它们能够很好地一次性保护您的应用程序和数据库。


    ## 防火墙保护 MariaDB


    另一件您可以做来保护 MariaDB 和 MySQL 的事情是在您的应用程序上安装防火墙。这个防火墙 *可以* 是 MySQL Enterprise Firewall——但不必是。如果您愿意并且能够支付资金来提高应用程序的安全性，也可以通过
    CDN 设备（如 CloudFlare、Sucuri 或 Imperva）为 MySQL 或 MariaDB 设置防火墙，但如果您的资金或其他资源紧张，*您也可以构建自己的防火墙。*
    这听起来可能很难，但其实不然——您基本上需要做的就是创建一个文件，然后使用一个循环遍历您指定的每个 POST/GET/或其他请求，查看请求中是否有任何黑名单中的查询。之后，如果识别出可疑查询，防火墙应阻止该请求并向用户返回错误消息。如果没有，请求应照常通过。


    完成后，使用适用于您编程语言的扩展名（例如 `firewall.ext`？）为文件命名，然后将该文件包含到您想要/需要保护的每个文件中。'
  raw: 'Frequently, those applications require login details, and when those are provided,
    they match the details you provide with your username or email and a hashed password
    in their database, and if everything checks out, grant you access to their service.
    The problem with such an approach is that whenever sensitive data is stored in
    a database, the service becomes a target for hackers who see the data as something
    to sell to other hackers to further identity theft/credential stuffing attacks.
    To access the data though, they not only need to break the application but access
    the account in the database that has the appropriate privileges to select/update
    data, proceed with a data dump, or at least select some users within a database
    into some other source.


    User security is the pillar that helps you protect your application and database
    from such attacks – make sure to use a password manager (better yet, make the
    use of password managers mandatory across your entire organization across all
    teams), protect the accounts that have any sort of access to the database with
    strong passwords, make sure that all user/customer accounts in the database have
    strong passwords too (passwords should be 8 or more characters in length, have
    uppercase and lowercase characters as well as special symbols) but don’t enforce
    too rigid of a ruleset (it’s a two-sided sword and you can even lose customers
    who won’t bother with it) and avoid running MySQL/MariaDB as root since the root
    user has the `FILE` privilege which can be used and abused to create unnecessary
    files.


    Many users of MariaDB would also suggest making a user with a random/”normal”
    name the root user and disabling access for the root user altogether. This way
    you would benefit from security through obscurity – if an attacker would try to
    access the root account, he would fail and probably move on to other, easier,
    targets. For that, you can make use of roles once again:


    1.  `CREATE ROLE rootprivilege WITH ADMIN your_user@localhost`


    2.  `GRANT ALL ON *.* TO rootprivilege WITH GRANT OPTION`


    3.  `Switch to your_user@localhost, then DROP USER root, root@localhost, root@...`


    4.  `GRANT rootprivilege TO account@localhost`


    Now you have a privilege called `rootprivilege` that you can grant to any user
    to make them have God-level access, but no root user. Isn’t that cool?


    ## MariaDB Components and Plugins That Keep Data Safe


    Aside from privileges and roles, both MySQL and MariaDB come with a bunch of components
    and plugins that help keep your database safe. MySQL plugins can, once again,
    be split into separate categories: there are authentication plugins, connection-control
    plugins, plugins and components helping validate passwords, as well as enterprise
    solutions such as MySQL Enterprise Audit and MySQL Enterprise Firewall.


    Authentication plugins describe pluggable authentication methods available within
    MySQL/MariaDB (native pluggable authentication, SHA-256 pluggable authentication,
    LDAP pluggable authentication, FIDO pluggable authentication, etc.); connection-control
    plugins refer to plugins that check attempts to connect and introduce a delay
    to the responses given by the database when it’s necessary. Failed logins are
    also logged in the `CONNECTION_CONTROL_FAILED_LOGIN_ATTEMPTS` table.


    Plugins and components helping validate password strength include a well-known
    component called `validate_password,` and the component can be installed/uninstalled
    like so:


    ```

    [UN]INSTALL COMPONENT ''file://component_validate_password'';

    ```


    By default, the `validate_password` component enables you to implement a database-wide
    password strength policy and deny the usage of passwords that don’t match certain
    criteria, for example, aren’t over 8 characters long, etc.


    To modify the way `validate_password` checks for password strength, modify system
    variables beginning with “`validate_password.`” Such variables may include, but
    are not limited to


    *   `validate_password.policy`: Available values include `LOW`, `MEDIUM` (default),
    and `STRONG` or the corresponding numeric values of `0`, `1` (default), and `2`.
    A policy using the `LOW` setting will check for password length, the level of
    `MEDIUM` will check for password length as well as numeric, lowercase, uppercase,
    and special characters, and the level of `STRONG` will check for password length
    as well as numeric, lowercase, uppercase, and special characters, as well as use
    a dictionary file.


    *   `validate_password.number_count`: Takes a numeric value that counts how often
    numbers appear in the password. Default value – 1.


    *   `validate_password.special_char_count`: Takes a numeric value that counts
    the occurrences of special characters. Default value – 1.


    *   `validate_password.length`: Takes a numeric value that specifies the minimum
    possible password length. This parameter has a default value of 8, and the numeric
    value can be either decreased or increased as necessary.


    *   `validate_password.mixed_case_count`: Denotes the minimum number of mixed-case
    (lowercase and uppercase) characters that are required if the password policy
    is set to `MEDIUM` or `HIGH`.


    *   ...


    When it comes to enterprise solutions, both MySQL and MariaDB offer enterprise-level
    solutions such as MySQL/MariaDB Enterprise Audit and MySQL Enterprise Firewall.
    Those two solutions, as their titles suggest, act as enterprise-level auditing
    and firewall appliances. The enterprise-level database firewall protects data
    within your MySQL database by detecting or blocking the execution of SQL statements
    as configured (if SQL statements don’t match a predefined allowlist, they will
    be denied execution or still execute, but the database will notify administrators
    of policy violations), blocking SQL injection attacks, detecting database intrusions,
    and logging both allowed and blocked SQL queries.


    MySQL Enterprise Audit enables us to monitor, log, and, if necessary, block the
    execution of queries running within our database. The plugin needs to be installed,
    and once it’s installed, it sets up and writes to an audit log file (which can
    be renamed and/or have its format changed if necessary) as well as enables the
    audit log files to be encrypted and/or compressed if necessary.


    The downside of both the enterprise-level firewall and the audit plugin is, of
    course, the enterprise-level pricing: both the firewall and the audit plugin can
    set you back thousands of dollars. Thankfully, other solutions such as web application
    firewalls generally cost less, and they’re well-equipped to protect your applications
    and databases in one go.


    ## Firewalling MariaDB


    Another thing you can do to secure MariaDB and MySQL includes having a firewall
    installed on your application. The firewall *can* be MySQL Enterprise Firewall
    – but it doesn’t have to. You can also put a firewall on MySQL or MariaDB through
    a CDN appliance like CloudFlare, Sucuri, or Imperva if you feel like it and can
    pay money to improve the security of your application, but if you are strapped
    for money or other resources, *you can also build your own firewall.* It may sound
    difficult, but it isn’t – all you need to do is to essentially create a file,
    then use a loop that loops through every POST/GET/whatever you specify request
    to see if there are any blacklisted queries in the request. Afterward, if suspicious
    queries are identified, the firewall should block the request and return an error
    message to the user. If not, the request should pass through as usual.


    Once you’re done, title the file appropriately with an extension applicable to
    your programming language (firewall.ext anyone?), then include the file into every
    file you want/need to protect.'
