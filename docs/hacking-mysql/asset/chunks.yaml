    你的数据库性能受其配置所限——而这些配置直接依赖于你的服务器硬件能力。这就是为什么正确选择服务器对每个参与者都至关重要：服务器可能成为高负载数据库的瓶颈，但也可能性能严重过剩。选择一个折中方案，然后进行优化。不，你不需要是个天才系统管理员才能选择合适的装备——搜索引擎在
    MariaDB 上存储了超过 100 亿行数据，并在毫秒内完成搜索，而无需借助最新的 NVMe 驱动器或其他顶级硬件，所以一切皆有可能。


    即使是一台旧服务器也能从 MySQL 中挤出令人印象深刻的性能——这完全取决于你的数据库优化程度。当然，你的应用程序也有发言权：如果你想在严酷的环境中生存（数据泄露事件时有发生，你需要做好准备），你需要遵循最佳的编码和安全实践。但如果你不是使用
    Laravel 这样的成熟框架来构建应用程序，而是自己动手凑合，或者发现自己在使用一台旧 VPS 并且无力升级，也并非毫无希望。


    ## 选择服务器和硬盘


    在选择服务器时，从我之前提到的事情开始：审视你以前的选择，仔细评估你的用例，考虑服务器的地理位置和维护、灵活性以及预算。这些将为你提供一个关于可以考察哪些服务器类型的粗略轮廓——它们将定义你是需要共享服务器、VPS
    还是专用服务器，而你的用例将决定服务器中必须包含哪些组件才能让你的应用程序正常运行。你的服务器承载着数据库，然后通过 `my.ini` 或 `my.cnf`（取决于你使用的操作系统）进行配置。设置也可以通过命令行指定，但基本原则是相同的——配置将帮助你的数据库与服务器协同工作以实现你的目标。


    无论你是使用 MySQL 还是其他数据库管理系统，服务器始终是数据库的限制因素。只有当数据库被配置为利用服务器中可用的组件时，它才能表现良好——而在数据库方面的一个主要限制点就是硬盘及其
    I/O 能力，以及你的 CPU。

    '
- fmt: 'Choose hard drives carefully – an NVMe SSD would be the fastest option, but
    it’s also the most expensive one. In many cases, a simple SSD might make the cut,
    while in cases where bigger data sets are involved, one could use HDD storage
    to store terabytes of data. When in doubt, many would advise you to choose the
    golden medium – an SSD – as it’d be faster than HDD storage, but again, “good
    speed” may mean different things to different people: don’t forget that a hard
    drive is only one part of the equation, and it won’t solve all of your problems
    anyway, so there’s no need to invent a bike here. At the same time, you should
    weigh the upsides and downsides of an HDD, SSD, and SSD NVMe against your use
    case, and choose wisely: choose an HDD if you intend to store bigger data sets
    (more than a couple of terabytes of data), an SSD NVMe if you’re striving for
    high performance and can sustain a higher price point, and an SSD for general
    use cases.


    When it comes to a CPU, choose a processor with multiple (preferably 4 or more)
    cores and a decent processor (a speed of 3.5 GHz is a good starting point). Keep
    in mind that both MySQL and its counterparts are multithreaded, so you shouldn’t
    need additional configuration to make MySQL use multiple cores.


    Before making a choice, make sure to consult the hosting company if possible too
    – people working there will have a good grasp of what servers are available, and
    once you tell them your use case and detail the requirements, they will be likely
    to direct you to a server and offer a money-back guarantee if you don’t like the
    server you’ve chosen.


    ## Configuring MySQL Parameters


    After you’ve made a choice, inspect whether MySQL is already installed on your
    server. For some users, MySQL will likely already be installed, and others will
    have to install it themselves.


    After you find time to scratch the surface of your server, shut MySQL down so
    you can configure it. Take a copy of the configuration file so you can restore
    default settings if/when necessary (Linux users will find the configuration file
    in the `/etc/`, `/etc/mysql/`, `/var/lib/mysql`, or `~/` directories, and for
    Windows users, the file will likely reside in the database management subdirectory
    of the `bin` directory), then decide what storage engine will you be using (most
    of you will choose InnoDB), and configure the options relevant to it.


    Once the configuration file is opened up, Windows users will notice that it contains
    a bunch of different comments all mashed together.


    ![Figure 7-1: my.ini with comments](images/625040_1_En_7_Chapter/625040_1_En_7_Fig1_HTML.jpg)


    InnoDB users will need to scroll further (while scrolling, adjust the default
    storage engine to InnoDB if it’s not already adjusted), and below the storage
    engine, they will find a bunch of options.


    ![Figure 7-2: InnoDB settings in my.ini](images/625040_1_En_7_Chapter/625040_1_En_7_Fig2_HTML.jpg)


    So many options! The good news is that you’re unlikely to modify every one of
    them – the bad news is that some parameters need to be changed without question.


    Linux users will have it easy because Linux’s version of my.ini – my.cnf – will
    likely only provide the necessary parameters relevant to InnoDB, but all of those
    parameters apply to Linux users nonetheless. For a comprehensive explanation of
    what each parameter does, come back to Chapter [2](#625040_1_En_2_Chapter.xhtml)
    and refer to the heading “InnoDB in MySQL and MariaDB” – once you’ve refreshed
    your memory, optimize these parameters to make the InnoDB engine sing:


    | Parameter | Why Optimize? |

    | --- | --- |

    | `innodb_buffer_pool_size` | This is the size of the InnoDB buffer pool that
    stores data, indexes, and MVCC data related to InnoDB. Set this parameter to at
    least 60% of the available RAM in your system. |

    | `innodb_log_file_size` | This parameter depicts the size of the log files within
    InnoDB. Log files are sifted through upon restoration – set this parameter to
    approximately a quarter of the buffer pool size. A larger log file size is better
    for performance, but larger log files will also force InnoDB to take a longer
    time to recover. |

    | `innodb_flush_log_at_trx_commit` | This parameter controls the balance between
    ACID compliance and high performance: a value of 1 means ACID compliance, while
    values of 0 or 2 will allow for more speed, but increase the risk of losing up
    to one second of transaction data. |

    | `innodb_flush_method` | Depicts the data flushing method that InnoDB uses to
    flush data to the disk. Some values are available only to Linux users. |

    | `innodb_data_file_path` | Depicts the file name and the size of the main InnoDB
    tablespace – the ibdata1 file. The file can, indeed, have any name – and can be
    split into separate files if we so desire. |


    I’ve already covered most of the parameters relevant to InnoDB in Chapter [2](#625040_1_En_2_Chapter.xhtml)
    of this book, so I won’t repeat myself here: what I do want you to pay attention
    to, however, is the main system tablespace within InnoDB – the `ibdata1` file.
    It exists for a reason and contains multiple classes of data vital for InnoDB
    to function correctly including data, indexes, Multiversion Concurrency Control
    (MVCC) data, undo space, rollback segments, and two types of buffers – the insert
    buffer and the double-write buffer. The buffers have a dual purpose: the insert
    buffer will be used to “buffer” many updates to database pages and perform a single
    big update at once, and the double-write buffer is used to receive data flushed
    from the buffer pool: the InnoDB storage engine will only write data to the disk
    if the data in the double-write buffer is flushed to the disk beforehand.


    The purpose of `ibdata1` is to act as a “castle” that parts of your data are saved
    in. This castle keeps your data separated from itself by saving data related to
    InnoDB-based tables in two separate files: one under a “.frm” extension, the other
    under “.ibd.” This feature is called the `file-per-table` feature: it’s controlled
    by fiddling with the `file-per-table` variable in InnoDB (acceptable values include
    the default value – 1 – and 0), and a default value of 1 starting from MySQL 5.6
    enables InnoDB to separate data relevant to InnoDB tables from `ibdata1` due to
    issues that can arise if the data is held together. A value of 0 would “glue”
    both data and metadata into `ibdata1` and that can be the cause of a very frustrating
    problem: one wouldn’t be able to delete data from InnoDB to make the size of its
    tablespace smaller. The only way to delete data from InnoDB without a trace on
    the disk (and therefore shrink the `ibdata1` file) would be to delete the data
    in the database or drop the database itself and then delete `ibdata1` and the
    associated log files `ib_logfile*`. By doing so, however, we would inevitably
    destroy everything InnoDB-related altogether, so it wouldn’t exactly be an ideal
    approach. A value of 1 splits data related to InnoDB tables into two files – one
    holding the table data (`.ibd` file) and one holding table metadata (`.frm` file.)'
