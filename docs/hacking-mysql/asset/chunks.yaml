    ![](img/625040_1_En_4_Fig1_HTML.jpg)


    图 4-1


    用于演示的表


    该表本身并不特殊——这是一个简单的表，显示发送和接收的消息以及时间戳。具有上述结构的表在各种内容管理系统中非常常见。

