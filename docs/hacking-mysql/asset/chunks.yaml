- fmt: "# 索引与查询优化\n\n现在，要构建一个查询，我们需要考虑需要返回的数据：在这种特定情况下，我们可能需要选择除ID外的所有内容，因为这类网站的性质需要向客户提供大量信息。结果页面可能包括汽车的标题、年份、类型、VIN代码、动力类型、变速箱以及车主所在的城市。专注于此类用例的表可能更大，但我们的演示表列数不多也不是问题。\n\
    \n对于我们的用例，我们也知道何时需要精确匹配。我们不会在此处使用通配符或`LIKE`查询，所以这也不在考虑范围内。我们是这样处理的：\n\n1.  我们的应用很可能会列出可用的汽车品牌并提供表中的所有数据，所以是`SELECT\
    \ * FROM car_data WHERE car_brand = 'BRAND'`。\n2.  选择品牌后，我们的应用会列出可选的汽车型号——一旦选择了某个型号，我们就需要考虑它（`AND\
    \ car_model = 'Model'`）。\n3.  选择型号后，用户还可以选择该型号汽车的生产年份范围（`AND year [>=|<=] YEAR`）。\n\
    \n综合考虑，通过应用程序搜索2015年或更新的丰田卡罗拉的查询如下所示：\n\n```sql\nSELECT * FROM car_data WHERE\
    \ car_brand = 'Toyota' AND car_model = 'Corolla' AND year >= 2015;\n```\n\n让我们看看这个查询是否使用了索引。\n\
    \n![图 11-26](images/625040_1_En_11_Chapter/625040_1_En_11_Fig26_HTML.jpg)\n\n\
    **图 11-26**\n\n查看查询是否使用索引\n\n无论返回多少行，即使我们甚至没有搜索VIN（那是覆盖索引中的最后一列），我们看到`possible_keys`和`key`列都包含了我们索引的名称。我们的数据库使用索引找到了数据——太好了！\n\
    \n同样的规则适用于许多其他数据集，包括数据泄露搜索引擎。你认为拥有数十亿条记录的数据泄露搜索引擎会运行其他类型的查询吗？回顾上一章或查看下面。\n\n![图\
    \ 11-27](images/625040_1_En_11_Chapter/625040_1_En_11_Fig27_HTML.jpg)\n\n**图 11-27**\n\
    \n在100亿条记录中循环搜索\n\n*这个循环搜索了超过100亿条记录！* 你见过比这看起来更复杂的查询，不是吗？简单的东西往往是最好的——大数据集也不例外。\n\
    \n真的——为大数据集建立索引，你需要做的归结为简单的事情：\n\n1.  你的用例以及其中可用的部分\n2.  合适的数据类型\n3.  对索引类型及其相关知识的理解\n\
    4.  访问有限的数据集\n5.  返回有限的数据集\n\n底线是：在选择索引时，考虑你的用例，选择不会给数据库带来太大压力的数据类型，在做出选择前了解每种可用索引类型的优缺点，并确保在首先访问有限的数据集后再涉及索引。\n\
    \n遵循这个建议将使你定义的索引能够帮助你的数据库，而不是像车轮里的辐条一样碍事，但一如既往，没有什么是绝对的保证——在考虑在实际环境中应用任何东西之前，请反复测试你收到的建议。\n\
    \n## 总结\n\n索引是许多现代应用程序的支柱：正确定义的索引擅长使`SELECT`查询飞速执行，即使你遇到硬盘空间不足、无法使用某些数据类型或其他情况等各种阻碍，索引也能提供帮助。索引通过最小化数据库中的可读数据量来实现这一点，但索引并不是让查询性能飙升的唯一方法。\n\
    \n这时就引入了分区——你表中的迷你表，它们将数据分割成易于访问的块，进一步最小化了可访问数据的范围，并进一步提高了某些类型查询的性能。\n\n# 12.\
    \ 优化分区\n\n当索引没有帮助或只有部分帮助时，开发人员会寻求其他方法来提高查询性能。其中一种方法是分区——分区是一个概念，它允许用户将数据库划分为几个独立的部分，而数据库层仍然将这些部分视为一个整体。\n\
    \n对于许多数据库管理系统的用户来说，分区是一个熟知的概念——MySQL用户也不例外。数据库中的表被分区是为了使其中的数据更易于管理和访问，或者是为了负载均衡。在MySQL、MariaDB和Percona\
    \ Server中，只有两种存储引擎支持分区：它们是InnoDB和NDB。\n\n## 为什么要分区数据？\n\n要理解我们为什么要分区数据，我们首先需要理解分区的目的。在这方面，分区与索引的作用类似。一旦我们访问分区中的数据，我们的数据库就会读取更少的数据（例如，1500万行而不是1亿行），因此，我们的查询可以更快地完成。*分区也可以与索引结合使用*，以使读取操作的性能更快——这种方法对于拥有数十亿条记录的人可能有益。\n\
    \n分区是有益的，因为它们的目的是将大数据集拆分成更小、可管理的部分，并且由于每个分区包含数据的一个子集，管理拆分到这些子集中的数据变得容易得多。分区数据有助于提高可扩展性、可管理性和性能，代价是空间——就像索引一样，分区有自己独特的文件，存储与该分区相关的数据，这些文件会占用磁盘空间。分区彼此分开存储，你的数据库将每个分区视为一个单独的表，同时通过SQL层将表及其分区视为一个对象。这样做是为了减轻数据访问负担，使分区更易于访问和使用。\n\
    \n## 何时分区数据？\n\n为了回答这个领域可能最重要的问题，我将从一个我在Stack Overflow上看到的例子开始。这个例子的主要观点如下（我将提问的用户称为用户X，给出被采纳答案的用户称为用户Y）：\n\
    \n1.  用户X说他运行一个大约200万行、39列的表，并且该表每天都在增长。然后，他提到查询这样一个数据集需要很长时间，并说有人（可能是他的工作同事）建议他对这个大表进行分区。\n\
    2.  用户X有几个问题：\n    1.  什么时候是分区数据的时候？\n    2.  分区表是否可能提高查询性能？\n    3.  如果他对表进行分区，分区是否会导致需要更改任何正在运行的`SELECT`、`INSERT`或其他语句？\n\
    \    4.  执行分区需要很长时间吗？\n    5.  如果分区有帮助，该如何进行？如何识别应该分区的列和应该保持原样的列？\n\n许多用户插话提供建议——一个被用户X采纳的建议以以下方式回答了问题：\n\
    \    1.  可能永远不会。\n    2.  分区可能会稍微降低查询性能。查询耗时很长通常是因为缺少适用的索引，可能是一个复合索引。你构建查询的方式也有影响，而且查询的设计对查询的影响可能远大于分区。\n\
    \    3.  视情况而定。\n    4.  视情况而定。\n    5.  分区不会有帮助，因为你的表只有大约200万行。从优化运行缓慢的查询性能开始，当你有更大的数据集需要处理时再考虑分区。"
  raw: "Now, to craft a query, we need to consider the data we need to return: in\
    \ this specific case, we likely need to select everything except the ID because\
    \ the nature of such websites necessitates informing the customer with a lot of\
    \ data. The result page may include the title of the car, the year, type, VIN\
    \ code, what it’s powered with, what transmission it has, and in what city the\
    \ owner lives. Tables focused on such use cases are likely to be bigger, but our\
    \ demo table not having many columns is not a problem either.\n\nFor our use case,\
    \ we also know when an exact match is necessary. We won’t need to involve wildcards\
    \ or `LIKE` queries inside of this, so that’s out of the question too. Here’s\
    \ how we go about this:\n\n1.  Our app would most likely list the available car\
    \ brands and provide all data in the table, so that’s ``SELECT * FROM `car_data\
    \ WHERE `car_brand` = 'BRAND'``.\n\n2.  Once a brand is chosen, our app would\
    \ list the models of the cars for selection – once a model is selected, we would\
    \ need to consider it (`AND car_model = 'Model'`).\n\n3.  Once the model is selected,\
    \ the user would also be able to select the range of years the model would need\
    \ to be made (`AND year [>=|<=] YEAR`).\n\nAll things considered, a query searching\
    \ for a 2015 or newer Toyota Corolla through the app would look like this:\n\n\
    ```\nSELECT * FROM `car_data` WHERE car_brand = 'Toyota' AND car_model = 'Corolla'\
    \ AND year >= 2015;\n```\n\nLet’s see if the query uses any indexes.\n\n![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig26_HTML.jpg)\n\
    \nFigure 11-26\n\nSeeing if a query uses indexes\n\nRegardless of how many rows\
    \ are returned and although we’re not even searching for a VIN (that was the last\
    \ column in the covering index), we see that both the `possible_keys` and `key`\
    \ columns include the name of our index. Our database has found the data using\
    \ the index – woohoo!\n\nThe same rules apply to many other data sets, including\
    \ data breach search engines. Do you think data breach search engines with billions\
    \ of records run other types of queries? Return to the last chapter or have a\
    \ look below.\n\n![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig27_HTML.jpg)\n\
    \nFigure 11-27\n\nLoop searching through 10 billion records\n\n*This loop searches\
    \ through more than 10 billion records!* You’ve seen queries that look more complex\
    \ than this, didn’t you? Simple things are often the best – and big data sets\
    \ are no exception.\n\nReally – all you need to do to index big data sets boils\
    \ down to simple things:\n\n1.  Your use case and the bits and pieces available\
    \ inside of it\n\n2.  Proper data types\n\n3.  The understanding of index types\
    \ and things surrounding them\n\n4.  Accessing a limited set of data\n\n5.  Returning\
    \ a limited set of data\n\nThe bottom line is this: when choosing an index, consider\
    \ your use case, choose data types that don’t put much of a strain on your database,\
    \ educate yourself about the ups and downs of each index type that you can use\
    \ before making a choice, and make sure to access a limited set of data before\
    \ involving indexes in the first place.\n\nAdhering to this advice will let you\
    \ define indexes that help your database instead of acting like a spoke in a wheel,\
    \ but as always, nothing’s a guarantee – test the advice you receive again and\
    \ again before even considering applying anything in a real-world environment.\n\
    \n## Summary\n\nIndexing is the backbone behind many modern-world applications:\
    \ properly defined indexes excel at making `SELECT` queries blazing fast, and\
    \ indexing can help even if you find yourself obstructed by a variety of factors\
    \ like low disk space on the hard drive, inability to use certain data types,\
    \ or other circumstances. Indexes do that by minimizing the amount of readable\
    \ data in the database, but indexing is not the only way to make query performance\
    \ skyrocket.\n\nEnter partitions – mini tables inside of your table that split\
    \ data into easy-to-access chunks further minimizing the scope of accessible data\
    \ and further improving the performance of certain types of queries.\n\n# 12. Optimizing\
    \ Partitions\n\nWhen indexes don’t help or help only partially, developers seek\
    \ out other ways to improve their query performance. One of those ways is partitions\
    \ – partitioning is a concept that lets users divide a database into several independent\
    \ parts that still get treated as one part by the database layer.\n\nPartitioning\
    \ is a known concept for users of many database management systems – users of\
    \ MySQL are no exception. Tables within databases are partitioned for the data\
    \ within them to be more manageable and accessible or for load-balancing purposes.\
    \ In MySQL, MariaDB, and Percona Server, only two storage engines support partitioning:\
    \ those storage engines are InnoDB and NDB.\n\n## Why Partition Data?\n\nTo understand\
    \ why we partition data, we need to understand the purpose of partitioning in\
    \ the first place. In this regard, partitioning acts similarly to indexing. Once\
    \ we access data in partitions, our database reads through less data (e.g., 15\
    \ million rows instead of 100 million), and thus, our queries can complete faster.\
    \ *Partitioning can also be used together with indexing* to make the performance\
    \ of read operations even faster – such an approach may be beneficial for those\
    \ possessing billions of records.\n\nPartitions are beneficial because their purpose\
    \ is to split big data sets into smaller, manageable pieces, and since each partition\
    \ contains a subset of data, managing data split into these subsets becomes much\
    \ easier. Partitioning data helps with scalability, manageability, and improved\
    \ performance at the price of space – just like indexes, partitions come with\
    \ files unique to themselves that store data relevant to that partition, and those\
    \ files take up space on the disk. Partitions are stored separately from one another,\
    \ and your database considers a partition to be a separate table while still treating\
    \ the table and the partitions within as one object through the SQL layer. This\
    \ is done to alleviate data access burdens and make partitions easier to access\
    \ and use.\n\n## When to Partition Data?\n\nTo answer probably the most important\
    \ question in this realm, I’ll start with an example I’ve seen on Stack Overflow.\
    \ The main points of this example are as follows (I’ll call the user who asked\
    \ the question user X, and the user who gave an accepted answer user Y):\n\n1.\
    \  User X said that he runs a table with approximately 2 million rows and 39 columns\
    \ and that the table is growing every day. Then, touched upon a point that queries\
    \ through such a data set take a very long time, and said that someone (likely\
    \ a colleague of his at work) suggested that he partition the large table.\n\n\
    2.  User X had a couple of questions:\n    1.  When is it time to partition data?\n\
    \n2.  Is partitioning the table likely to improve the performance of queries?\n\
    \n3.  If he partitions the table, will partitioning necessitate changes to any\
    \ `SELECT`, `INSERT`, or other statements that are being run?\n\n4.  Will partitioning\
    \ take a long time to perform?\n\n5.  If partitioning would be helpful, how to\
    \ go about it? How to identify column(s) that should be partitioned and columns\
    \ that should be left intact?\n\nMany users chimed in to give suggestions – a\
    \ suggestion that was accepted by the user X answered the questions the following\
    \ way:\n    1.  Probably never.\n\n2.  Partitioning is likely to decrease the\
    \ performance of queries a little. Queries taking a long time usually do so because\
    \ of a lack of an applicable index, possibly a composite one. The way you craft\
    \ the query also has an effect, and the design of your queries probably affects\
    \ them way more than partitions would.\n\n3.  It depends.\n\n4.  It depends.\n\
    \n5.  Partitioning wouldn’t be helpful since your table has around 2 million rows.\
    \ Start by optimizing the performance of slow-running queries and think about\
    \ partitioning once you have bigger data sets to work with."
