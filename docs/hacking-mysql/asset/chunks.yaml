  trans: '| 建议 | 解释 |

    | --- | --- |

    | *“表上的索引越多，对数据库越好。”* | **错误** – 性能是在索引被数据库**使用**且数据库配置得当的情况下获得的，而索引是否被使用取决于你的查询。
    |

    | *“索引只对简单的 `SELECT` 查询有意义。”* | **错误** – 事实上，索引对复杂查询也有意义。你只需使用 `EXPLAIN` 子句来了解
    MariaDB 是否在利用某个给定的索引。 |

    | *“B-Tree 索引会让所有 `SELECT` 查询执行得更快。”* | **错误** – 首先，存在多种类型索引的原因就在于，每种索引类型在开发者面临的不同特定场景下提供帮助。索引同样只有在被使用时才能帮助你的数据库。
    |

    | *“索引一次就足够了——索引不需要维护或保养。”* | **错误** – 你的索引碎片化越严重，它能帮助数据库的程度就越低。碎片化意味着有问题存在——索引页不再有序，或者数据页中存在大量空闲空间。
    |

    | *“如果索引对性能没有帮助，那就没有其他办法了。”* | **错误** – 索引不是灵丹妙药，要让它们发挥作用，你必须考虑许多其他因素，比如查询的结构、应用程序的流量、数据类型和校对规则、分区以及数据库的配置。应将索引与其他性能优化技巧结合使用：不要把它当作解决所有性能问题的万能膏药。
    |

    | *“在列上使用索引会使向该列插入数据变得极其缓慢。”* | **错误** – 虽然索引确实会减慢 `INSERT` 查询，但并非所有插入数据的查询都会因此一落千丈。有时，你甚至注意不到性能差异——问题通常出现在我们向一个已索引且已包含大量数据的列中再插入更多数据时，即便如此，也有办法绕过这个问题。
    |


    你曾听过这些说法中的一条或多条吗？我肯定你听过。这些迷思之所以出现，并非因为开发者愚蠢——远非如此——而是因为他们做过或听说过某些事情，这些事情在索引被使用时产生了特定的结果。


    索引是精妙的，要让它们帮助查询成功，它们需要充当查询的锚点——锚点可能无法提供必要的结果，因为它们未能履行其职责，或者它们可能随着使用而变得迟钝，可能需要更新或更换。


    当你日复一日地处理数据库时，你有时不得不更新、删除或向一个带有索引的列中插入数据。我们中的一些人经常这样做，以至于一开始甚至没注意到索引的存在——这种对表及其内部列的频繁维护会给我们的索引带来负担。当我们对相关列执行任何操作时，索引都会受到影响，而某些操作的影响比其他操作更为严重。


    我听说过一个情况，一位 DBA 被要求调查查询性能急剧下降的原因，尽管最近数据库并未做出任何更改。查询性能问题似乎凭空出现，没有任何明显原因——经检查，DBA
    注意到该查询正在使用一个索引，而重建索引解决了性能问题。这就是为什么索引，就像数据库中的其他一切一样，需要维护。“那一定是索引的 bug 之类的，”你们中的一些人会说。不，不是的——*问题在于索引列内的数据被频繁更新，从而导致索引随时间产生碎片化。*
    要了解你的索引是否碎片化，可以查看其大小：如果大小比“应该”的要大，那么你就有问题了。


    碎片化有多种形式：有内部碎片化和外部碎片化，这意味着要么数据库页未被数据完全填满，要么索引内的数据页分散且可能不按顺序排列。当这两种情况发生时，查询仍然使用索引，但它们可能会变慢，因为它们将访问比必要更多的数据。


    如果你的索引对查询性能有影响，你就需要它；而如果你需要它，有时你就需要去关心它。把碎片化的索引想象成一本部分页面被水浸湿的书：触摸、握持和阅读都会很不舒服，你首先想到的会是晾干这些页面，或者在这种情况下，*对索引进行碎片整理*。索引碎片整理通常很容易完成，可以通过执行如下所示的
    `ALTER TABLE` 查询来实现：


    ```

    ALTER TABLE `demo_table` ENGINE = InnoDB;

    ```


    或者，你总是可以选择通过删除表并重新加载其中的所有数据来重建表。


    无论你采取哪种方法，请记住，晾干页面只是谜题的一部分——这个谜题始于你最前端的硬件。


    ## 硬件、数据库与索引


    如果要说所有索引都有一个共同点，那就是它们都会占用磁盘空间。它们都伴随着成本——将其添加到数据库的时间成本、对你硬盘的成本以及对查询的成本。


    这个成本有一个不起眼的开始——一切都始于你服务器内部的硬件。你有列上的索引是因为你有数据库，你有数据库是因为你有服务器——移除硬件，你的整个应用程序就会崩溃。


    索引以给硬件带来压力而闻名——无论你使用的是哪种处理器、硬盘或带宽分配，索引是一种“安装”在列上的特定“装备”，而列又“安装”在磁盘上。因此，无论你使用哪种索引类型，它的某些功能都将直接依赖于你服务器的内部构造。


    我们很多人不会想到索引的这一面。责怪开发者是不公平的——毕竟，他们只是在完成自己的工作，并应用通过相关工具的文档或实践经验获得的建议。


    以 StackOverflow 的 DBA 版块为例，你会很快发现诸如“我的查询很慢，我该如何……”、“阻止某些查询出现在慢查询日志中”、“重组或重建索引”之类的问题，而一旦你瞥一眼答案，许多开发者会建议重建查询、研究列数据类型或查阅文档——有些人会建议你查看数据库的配置，但硬件却很少被提及。强大的硬件应该已经是理所当然的了，对吧？*一切都与你的硬件相关*——从你运行的软件，到
    PHP 版本，再到你几乎记不清名字的表中列上的索引。这就是为什么选择硬件是一项不应被忽视的任务。如果你希望你的数据库完成用例所需的任务，你就需要运行足够好的硬件。


    回到索引，键在数据库的心目中占有特殊的位置。对你们大多数人来说，它们是伙伴，但当情况变糟时，它们往往是最先被指责的对象。它们已经存在了很长时间，它们的大部分概念没有改变——它们经常承担过错，因为你数据库背后的硬件没有配备好来处理它们。'
- fmt: '当数据集足够大，索引可能会成为争议点。它们之所以成为争议点，是因为它们会影响你的硬件，因此，如果你的硬件没有准备好应对挑战，索引也无法解决必要的问题。索引会影响你的硬件，因为每个索引都有索引页，其中包含指向所需数据片段所在位置的引用。对于
    MySQL 及其同类产品，默认的数据库页大小是 16KB（16,385 字节），但该大小可以增加到 64KB（65,535 字节）。


    由于数据库使用固定大小的页面来存储数据和索引，它们也存储在缓冲池中，并且你的数据库页越大，它可以处理的数据就越多。在 MySQL 中，绑定到数据库页的最大行长度是可变的（对于其他数据库管理系统也是如此），但在大多数情况下，最大行长大约是数据库页大小的一半，这就是我们使用数据类型的原因，也是为什么我们不能索引基于
    `TEXT` 列的全长，但可以自由索引 `VARCHAR`。


    关于索引的限制也应该引起你的数据库和硬件的兴趣——你不能仅仅因为拥有 PB 级的硬盘空间就把所有列都塞进一个索引，因为你的数据库不会允许你这样做。根据你使用的
    MySQL 版本不同，你可能可以在一个索引中放入 16（MySQL）或 32（MariaDB）列，但不能再多。此外，你的表也不是带有无限数量的列——你最多只能使用
    4096 列。坦率地说，我还没见过任何操作需要如此大量的列，所以在这方面你很可能没问题。


    我知道很多开发人员会觉得索引的内部原理是一个相当无聊的话题，所以我不会在这方面让你太无聊，但我希望你现在能理解，你的硬件不仅对你的数据库至关重要，对其中的索引也至关重要。


    ## 索引类型


    看看这张图。


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig1_HTML.jpg)


    图 11-1


    覆盖索引在行动


    这张图描绘了覆盖索引在数据库管理系统中的功能。诚然，这个图示过于简化（查询可能不同，查询速度也不是以公里/小时衡量的——我添加这个是为了说明目的），但它阐明了要点：*索引可能会让你的查询更快。*


    索引可能对你的查询有帮助，也可能没有。确实存在许多索引类型，每种索引类型都能帮助特定类型的查询更快地完成。如果你过去定义过一两个索引，你可能已经了解围绕索引类型的情况，这使你能够得出结论并决定采用特定的索引类型，但即使你没有，索引类型也不难理解：翻回几页，刷新一下对索引类型的记忆，然后深入了解一下。


    ### B-树索引


    B-树索引指的是平衡树索引。它们被称为 B-树索引，是因为理想情况下，这种索引的所有叶节点在视觉上都位于同一级别，从而提供一种平衡。在现实世界中，结果往往远非完美，因为开发人员经常添加/删除与所讨论的索引列相关的数据，从而为索引碎片化铺平了道路。但无论如何，B-树索引在数据库世界中占有稳固的地位，并且很可能在未来多年保持这一地位。


    要理解 B-树索引，理解二叉搜索树可能有所帮助。一个基本的二叉搜索树（BST）图示如下：


    ```

    A

    /  \

    B    E

    / \     \

    C   D     F

    /

    G

    ```


    二叉搜索树（BST）是一种类似树状的结构，由节点组成。BST 中的节点最多可以有两个子节点在两侧，当你看到这样的结构时，你就会开始理解为什么使用索引的查询通常比从磁盘读取数据的查询快得多。'
  raw: 'Indexes may become a point of contention when your data set is big enough
    to accommodate them. They become a point of contention because they impact your
    hardware and as such, if your hardware isn’t ready for battle, indexes can’t solve
    necessary problems either. Indexes have an impact on your hardware because every
    index has index pages that contain references to where the necessary pieces of
    data are located. For MySQL and its counterparts, the default size of a database
    page is 16KB (16,385 bytes), but the size can be increased up to 64KB (65,535
    bytes).


    Since databases use fixed-size pages to store data and indexes, they are also
    stored in the buffer pool, and the larger your database page is, the more data
    it can work with. In MySQL, the maximum row length bound to a database page varies
    (the same can be said about other database management systems), but in most cases,
    the maximum row length will be approximately half of the database page size which
    is why we use data types and which is also why we cannot index the full length
    of `TEXT`-based columns, but are free to index `VARCHAR`.


    The limitations regarding indexes should also be of interest to both your database
    and hardware – you cannot just mash all columns into an index even if you have
    petabytes of hard drive space because your database won’t let you do that. Depending
    on what flavor of MySQL you use, you may be able to put 16 (MySQL) or 32 (MariaDB)
    columns into an index, but no more. Also, your table doesn’t come with an unlimited
    number of columns either – you can run only up to 4096\. Frankly, I’m yet to see
    tables where such amounts of columns would be necessary for any operations, so
    you’re most likely fine on this front.


    I know that many developers would find the internals of indexes a rather boring
    topic so I won’t bore you too much on that front, but I hope that now you understand
    that your hardware plays a crucial role not only for your database but for the
    indexes within as well.


    ## Types of Indexes


    Take a look at this graph.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    A covering index in action


    This graph depicts the functionality of a covering index within a database management
    system. Granted, the illustration is overly simplified (queries may differ and
    query speed is not measured in km/h – I’ve added that for illustration purposes),
    but it gets the point across: *indexes may make your queries faster.*


    Indexes may help your query – they may not. There are indeed many index types,
    and each index type helps a specific type of query complete faster. If you’ve
    defined an index or two in the past, chances are that you are already aware of
    the circumstances surrounding index types making you competent in coming up with
    conclusions and decisions to employ a specific index type, but even if you didn’t,
    index types are not that hard to understand: flick a couple of pages back and
    refresh your memory around index types and dive into them.


    ### B-Tree Indexes


    B-tree indexes refer to balanced tree indexes. B-tree indexes are called that
    way because an ideal version of such an index would hold all of its leaf nodes
    at the same level visually speaking, thus providing a balance. In the real world,
    results are often far from perfect since developers frequently add/remove data
    concerning the indexed column in question thus paving the way for index fragmentation,
    but regardless, B-Tree indexes have a firm place in the database world and will
    likely retain it for years to come.


    To understand B-Tree indexes, an understanding of a Binary Search Tree may help.
    A basic illustration of a binary search tree (BST) can be seen below:


    ```

    A

    /  \

    B    E

    / \     \

    C   D     F

    /

    G

    ```


    A Binary Search Tree (BST) is a tree-like structure with nodes. Nodes within a
    BST may have up to two children to the sides, and when you see such a structure,
    you begin to understand why queries using indexes are often significantly faster
    than those that read data from the disk.'
  trans: '

    当数据集足够大时，索引可能成为争议点。它们之所以成为争议点，是因为它们会影响你的硬件。因此，如果你的硬件没有准备好应对挑战，索引也无法解决必要的问题。索引会影响硬件，因为每个索引都有索引页，其中包含指向所需数据片段所在位置的引用。对于
    MySQL 及其同类产品，默认的数据库页大小是 16KB（16,385 字节），但这个大小可以增加到 64KB（65,535 字节）。


    由于数据库使用固定大小的页面来存储数据和索引，它们也存储在缓冲池中。你的数据库页越大，它能处理的数据就越多。在 MySQL 中，绑定到数据库页的最大行长度是可变的（其他数据库管理系统也是如此），但在大多数情况下，最大行长大约是数据库页大小的一半。这就是我们使用数据类型的原因，也是为什么我们不能基于
    `TEXT` 列的全长进行索引，但可以自由索引 `VARCHAR`。


    关于索引的限制也应该引起你的数据库和硬件的兴趣——你不能仅仅因为拥有 PB 级的硬盘空间就把所有列都塞进一个索引，因为你的数据库不会允许你这样做。根据你使用的
    MySQL 版本不同，你可能可以在一个索引中放入 16（MySQL）或 32（MariaDB）列，但不能再多。此外，你的表也不是带有无限数量的列——你最多只能使用
    4096 列。坦率地说，我还没见过任何操作需要如此大量的列，所以在这方面你很可能没问题。


    我知道很多开发人员会觉得索引的内部原理是一个相当无聊的话题，所以我不会在这方面让你太无聊。但我希望你现在能理解，你的硬件不仅对你的数据库至关重要，对其中的索引也至关重要。


    ## 索引类型


    看看这张图。


    ![](img/625040_1_En_11_Fig1_HTML.jpg)


    图 11-1


    覆盖索引在行动


    这张图描绘了覆盖索引在数据库管理系统中的功能。诚然，这个图示过于简化（查询可能不同，查询速度也不是以公里/小时衡量的——我添加这个是为了说明目的），但它阐明了要点：*索引可能会让你的查询更快。*


    索引可能对你的查询有帮助，也可能没有。确实存在许多索引类型，每种索引类型都能帮助特定类型的查询更快地完成。如果你过去定义过一两个索引，你可能已经了解围绕索引类型的情况，这使你能够得出结论并决定采用特定的索引类型。但即使你没有，索引类型也不难理解：翻回几页，刷新一下对索引类型的记忆，然后深入了解一下。


    ### B-树索引


    B-树索引指的是平衡树索引。它们之所以被称为 B-树索引，是因为理想情况下，这种索引的所有叶节点在视觉上都位于同一级别，从而提供一种平衡。在现实世界中，结果往往远非完美，因为开发人员经常添加/删除与所讨论的索引列相关的数据，从而为索引碎片化铺平了道路。但无论如何，B-树索引在数据库世界中占有稳固的地位，并且很可能在未来多年保持这一地位。


    要理解 B-树索引，理解二叉搜索树可能有所帮助。一个基本的二叉搜索树（BST）图示如下：


    ```

    A

    /  \

    B    E

    / \     \

    C   D     F

    /

    G

    ```


    二叉搜索树（BST）是一种类似树状的结构，由节点组成。BST 中的节点最多可以有两个子节点在两侧。当你看到这样的结构时，你就会开始理解为什么使用索引的查询通常比从磁盘读取数据的查询快得多。

