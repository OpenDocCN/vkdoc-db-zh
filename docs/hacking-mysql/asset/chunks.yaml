    | 服务端请求伪造 (SSRF) | 当攻击者操纵服务器向内部资源发出请求，进而推进攻击时，就会发生此漏洞。 |


    除了 NIST 和 OWASP，不要忘记基础——在可能的地方过滤用户输入并对其进行清理（各种编程语言提供了适用于此特定任务的各种函数），并且不要在未经过滤的情况下将用户输入提供给数据库，以避免
    SQL 注入攻击（我稍后会详细介绍），这样您就能为开始保护您的应用程序和数据库铺平道路。


    ## 访问控制


    处理好基础知识后，别忘了您的数据库。数据库安全通常始于访问控制——并非 100% 需要查看/访问特定内容的用户无法访问它。确保您所有用户都使用强密码（如果可能，使用密码管理器），并且他们只能从指定的主机而不是任何可能的主机访问数据库。

    '
- fmt: '# MariaDB 用户与权限管理


    ## 创建用户


    在 MariaDB 中，账户是全局性的，即账户并非以任何形式“链接”到特定的数据库或表，但可以通过权限被分配对数据库中数据的某种控制权。用户可以由拥有 `CREATE
    USER` 权限的用户或 root 用户创建。创建方式如下：


    ```

    CREATE USER ''username''@host IDENTIFIED BY ''passwordhere'';

    ```


    例如，在 localhost 创建一个演示用户，可以使用类似下面的查询：


    ```

    CREATE USER ''demouser''@localhost IDENTIFIED BY ''demopassword'';

    ```


    ![图 16-1：在 localhost 创建演示用户](images/625040_1_En_16_Chapter/625040_1_En_16_Fig1_HTML.jpg)


    创建用户后，运行类似 `SELECT user FROM mysql.user` 的查询时，它应该会出现在用户列表中——即使看到多个 `root` 用户也不必惊讶；它们对应不同的主机（127.0.0.1
    和 ::1 只是同一地址的不同表示形式）。


    ![图 16-2：多个 root 用户](images/625040_1_En_16_Chapter/625040_1_En_16_Fig2_HTML.jpg)


    ## 分配权限


    用户创建后，必须为其分配权限。权限可以通过几种方式授予：


    1.  授予所有数据库和所有主机的所有权限。

    2.  授予所有数据库和所有主机的某类权限。

    3.  授予特定数据库或特定主机的所有权限。

    4.  授予特定数据库内特定表的所有权限，可适用于所有主机或特定主机。


    可以使用类似下面的查询设置权限：


    ```

    GRANT [ALL PRIVILEGES/SPECIFIC PRIVILEGE] ON database.table TO ''username''@host;

    ```


    之后，可以使用类似下面的 `SHOW GRANTS FOR` 查询来检查权限（请记住，事先运行 `FLUSH PRIVILEGES` 查询以确保安全是明智的）：


    ```

    SHOW GRANTS FOR ''user''@host;

    ```


    ![图 16-3：授予 SELECT 权限](images/625040_1_En_16_Chapter/625040_1_En_16_Fig3_HTML.jpg)


    我们的 `demouser` 现在拥有了 `SELECT` 权限。MariaDB 中所有可用的权限都可以通过 `SHOW PRIVILEGES` 查询来查看。


    ![图 16-4：MariaDB 中的 SHOW PRIVILEGES](images/625040_1_En_16_Chapter/625040_1_En_16_Fig4_HTML.jpg)


    在这方面，MariaDB 相当慷慨，因为它不仅提供了可授予的权限列表，还提供了这些权限适用的上下文，并附有一些注释说明应用范围。`SHOW PRIVILEGES`
    查询对于那些不熟悉具体该授予哪些权限、也不想花时间阅读文档的人来说非常有用。


    关于密码，MariaDB 中的用户可以自己设置密码，也可以依赖 root 用户来为他们设置密码——`root` 用户可以通过运行 `SET PASSWORD`
    或 `ALTER USER` 查询来完成此任务。


    ## 访问控制


    了解如何授予和保存权限，以及重置密码的基本知识后，接下来可以深入探讨访问控制。在处理访问控制时，明智的做法是首先理解用户使用的环境：你的用例创建了什么样的环境，以及为什么？


    理解你的应用程序客户或用户所使用的环境后，就该考虑访问控制了。如果你身处一个组织中，可以考虑基于 *基于角色的访问控制（RBAC）* 来实施权限：这种方法将权限与组织角色关联起来，并为用户提供获取与其组织内角色直接相关的权限的能力。在
    MySQL/MariaDB 世界中，RBAC 可以这样实现：组织内的开发人员可能对一个或两个数据库拥有 CRUD 和数据修改权限（例如，他们可能拥有 `Insert`、`Select`、`Update`、`Delete`、`Alter`、`Index`、`Trigger`、`Slave
    monitor`、`Replication slave` 等权限），而他们的直属经理（例如工程经理或 CTO）可能拥有更多权限，包括 `File` 权限、`Create
    view` 和 `Create user` 权限，以及 `Grant option` 权限。基于角色的访问控制相当简单，很少需要过多考虑。


    如果你不属于某个组织，可以使用电子表格列出给定用户需要访问的部分，并据此授予权限。


    ## 用户安全


    在用户安全方面，一切也与访问权限密切相关：较新版本的 MySQL 和 MariaDB 都带有角色，角色本质上是权限的集合，因此，当角色被授予用户时，我们授予了与该角色关联的所有权限。


    角色有两个组成部分——首先创建角色，然后向角色授予权限，这样一旦角色被授予用户，用户就可以拥有与该角色相关的必要权限。可以使用 `CREATE ROLE`
    语句创建角色：


    ```

    CREATE ROLE role_name;

    ```


    角色创建后，我们需要使用 `GRANT` 语句向该角色授予权限，如下所示：


    ```

    GRANT [permission] ON [database].[table] TO [role];

    ```


    如果要将 `demo_database` 数据库中所有表的所有权限授予名为 `demo_role` 的角色，可以这样做：


    ```

    GRANT ALL PRIVILEGES ON demo_database.* TO demo_role;

    ```


    我们可以将所有其他权限授予角色，以此构建“角色配置文件”（为经理定制一个配置文件，为开发人员定制另一个，为 DBA 定制第三个，为支持工程师定制第四个，等等），然后可以像下面这样将角色授予特定用户：


    ```

    GRANT demo_role TO demo_user;

    ```


    角色也可以被授予其他角色，用户在使用前需要通过 `SET ROLE` 设置角色，即通过其账户访问 MariaDB 并使用 `SET ROLE [role_name]`
    来设置。


    角色由权限组成，而权限是用户安全的支柱。MariaDB 中用户安全的另一个支柱与密码选择有关，你需要问自己两个问题：


    1.  你是否总是为使用的每个服务创建唯一的密码？

    2.  你的密码是否包含大小写字母、特殊字符和数字，并且长度达到 20 个字符或以上？


    如果你对这两个问题的答案不都是“是”，那么你就存在问题。问题在于你肯定拥有不止几个用于访问网络服务的账户，这还不包括访问各种在线和离线应用程序的登录。'
  raw: 'After that, keep in mind that accounts within MariaDB are a global phenomenon,
    that is, an account is not “linked” to a specific database or tables within in
    any way, shape, or form, but it can be assigned to have a form of control over
    data in databases with permissions. Users can be created with a user that has
    the `CREATE USER` privilege, or with the root user. Users can be created like
    so:


    ```

    CREATE USER ''username''@host IDENTIFIED BY ''passwordhere'';

    ```


    So, to create a demo user in localhost, we would use a query like so:


    ```

    CREATE USER ''demouser''@localhost IDENTIFIED BY ''demopassword'';

    ```


    ![](images/625040_1_En_16_Chapter/625040_1_En_16_Fig1_HTML.jpg)


    Figure 16-1


    Creating a demo user on localhost


    Once you create a user, it should be listed in a list of users when you run a
    query like `SELECT user FROM mysql.user` – don’t be surprised if you see multiple
    `root` users either; they’re for different hosts (127.0.0.1 and ::1 is the same
    thing just under a different expression too).


    ![](images/625040_1_En_16_Chapter/625040_1_En_16_Fig2_HTML.jpg)


    Figure 16-2


    Multiple root users


    Now that your user is created, it has to be assigned privileges. Privileges can
    be granted in a couple of ways:


    1.  You can grant all privileges on every database and every host.


    2.  You can grant a type of privilege on every database and every host.


    3.  You can grant all privileges on a certain database or a certain host.


    4.  You can grant all privileges on a certain table within a certain database
    within all hosts or a certain host.


    Privileges can be set up using a query like the one below:


    ```

    GRANT [ALL PRIVILEGES/SPECIFIC PRIVILEGE] ON database.table TO ''username''@host;

    ```


    Afterward, they can be inspected using a `SHOW GRANTS FOR` query like the one
    below (keep in mind that beforehand, it’d be wise to issue a query like `FLUSH
    PRIVILEGES` for peace of mind too):


    ```

    SHOW GRANTS FOR ''user''@host;

    ```


    Let’s have a gander here.


    ![](images/625040_1_En_16_Chapter/625040_1_En_16_Fig3_HTML.jpg)


    Figure 16-3


    Granting a SELECT privilege


    Our `demouser` now has the `SELECT` privilege. All privileges available in MariaDB
    can be inspected using the `SHOW PRIVILEGES` query.


    ![](images/625040_1_En_16_Chapter/625040_1_En_16_Fig4_HTML.jpg)


    Figure 16-4


    SHOW PRIVILEGES in MariaDB


    In this regard, MariaDB is rather generous because it doesn’t only provide a list
    of privileges that can be granted but also provides the context in which the privileges
    are applicable in and provides a couple of words as comments where to apply them.
    The `SHOW PRIVILEGES` query will be very useful for those who aren’t aware of
    what privileges to grant by heart and don’t want to spend time reading the documentation
    either.


    When it comes to passwords, users within MariaDB can set their passwords by themselves
    or rely on the root user to set passwords for them – `root` users can then run
    the `SET PASSWORD` or `ALTER USER` queries to accomplish the task.


    After you know how to grant and save privileges and know a thing or two about
    resetting passwords, dig into access control. When working on access control,
    it’s wise to understand the environment users are using in the first place: what’s
    the environment created by your use case and why?


    Once you understand the environment in use by the customers or users of your application,
    it’s time to think about access control. If you find yourself to be a part of
    an organization, you can think about implementing privileges based on *role-based
    access control (RBAC)*: such an approach links privileges to organizational roles
    and provides users with the ability to obtain privileges that are directly connected
    to their role within an organization. In the MySQL/MariaDB world, RBAC may be
    implemented in a sense that developers within an organization would have CRUD
    and data altercation privileges on a database or two (e.g., they could have the
    Insert, Select, Update, Delete, Alter, Index, Trigger, Slave monitor, Replication
    slave, and some other privileges) while their direct managers (e.g., an engineering
    manager or a CTO) could have some more privileges including the File privilege,
    Create view and Create user privileges, as well as the Grant option privilege.
    Role-based access control is rather simple and seldom requires many thoughts.


    If you don’t find yourself in an organization, you could make use of a spreadsheet
    to list out what parts are necessary for a given user to access and grant privileges
    based on that.


    ## User Security


    When it comes to user security, everything’s also closely connected to access
    privileges: newer versions of MySQL and MariaDB come with roles that in essence
    are collections of privileges, and thus, when a role is granted to a user, we
    grant all privileges connected to that role.


    Roles have two components – first, we create them, and then we grant privileges
    to the role so that once the role is granted to a user, the user can possess the
    necessary privileges connected to that role. Roles can be created with the `CREATE
    ROLE` statement:


    ```

    CREATE ROLE role_name;

    ```


    Once roles are created, we need to grant privileges to that role using the `GRANT`
    statement like so:


    ```

    GRANT [permission] ON [database].[table] TO [role];

    ```


    If we want to grant all privileges on all tables within the `demo_database` database
    to a role named `demo_role`, we can do that like so:


    ```

    GRANT ALL PRIVILEGES ON demo_database.* TO demo_role;

    ```


    We can grant all other privileges to roles and in such a way build “role profiles”
    (tailor one profile for managers, another for developers, third for DBAs, fourth
    for support engineers, etc.), then grant the roles to a specific user like so:


    ```

    GRANT demo_role TO demo_user;

    ```


    Roles can also be granted to roles, and a user would need to set the role before
    using it using `SET ROLE` by accessing MariaDB through his account and setting
    a role using `SET ROLE [role_name]`.


    Roles consist of privileges and privileges are the pillar of user security. Another
    pillar of user security within MariaDB has to do with password choices where you
    need to ask yourself two questions:


    1.  Do you always create unique passwords for every service you use?


    2.  Do your passwords contain uppercase and lowercase letters, special characters,
    and numbers, and consist of 20 or more characters in length?


    If you don’t answer “yes” to both of these questions, you’ve got problems. You’ve
    got problems because you certainly have more than a couple of accounts you use
    to access services on the web, not even counting logins to access all kinds of
    applications both online and offline.'
