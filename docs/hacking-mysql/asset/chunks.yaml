  raw: '| Function to Sanitize Data | Explanation |

    | --- | --- |

    | `filter_var()` | The `filter_var()` function allows the developer to discern
    whether a certain variable is formatted in a way consistent with a chosen filter.
    For example, `filter_var($variable, FILTER_VALIDATE_BOOLEAN)` would return `true`
    if the variable is a boolean value, and `false` if otherwise enabling a developer
    to take the value returned by the function and return an error if the value of
    `false` is returned. |

    | `filter_input()` | The `filter_input()` function allows the developer to discern
    whether input provided by the user confirms with a chosen filter. For example,
    `filter_input(INPUT_GET, $user_provided_value, FILTER_SANITIZE_SPECIAL_CHARS);`
    would filter and sanitize any special characters provided in a `$user_provided_value`
    variable that is passed via a GET parameter. |

    | `htmlspecialchars()``htmlentities()` | `htmlspecialchars` converts all special
    characters in the string to HTML entities. `htmlentities` act similarly by converting
    all applicable characters in the string to HTML entities, thus preventing Cross-site
    Scripting (XSS) attacks in the process. |

    | `mysqli_real_escape_string()` | `mysqli_real_escape_string()` escapes special
    characters. This function is also unique in that it takes into account the charset
    in the database, and as such, it has its benefits, but keep in mind that the best
    way to protect your database from SQL injection attacks is to use parameterized
    statements (see Corner cases of SQL Injection for more information). |


    The sanitization of user input fields is helpful, but when SQL injection is concerned,
    it is recommended to prevent such an attack by using prepared statements. Prepared
    statements look like so (PHP-based example).


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig5_HTML.jpg)


    Figure 17-5


    Parameterized statements in PHP


    The code above does a couple of things:


    1.  Connects to a database server.


    2.  Assigns user input passed via a POST request to two parameters.


    3.  Parameterizes an SQL query to accept two parameters because there are two
    input values provided by the user.


    4.  Binds two parameters into the SQL query and executes it (we use “s” to specify
    a string value, but we can also specify integers with `i`, double-based values
    with `d`, or BLOB values with `b`).


    Prepared statements make the query no longer susceptible to SQL injection because
    *the query and user input are sent to the server separately*, thus eliminating
    the root cause of the SQL injection problem.


    ### Corner Cases of SQL Injection


    `mysqli_real_escape_string()` and input parameterization both have benefits unique
    to themselves, but neither of them has the cure for all of your database problems.
    When used properly, they are capable of protecting your database from SQL injection
    attacks, but they don’t forbid you from passing user input straight into a database.
    I’ve seen cases where a person has used PDO and put a variable into their SQL
    query – in that case, can you expect protection? You’ve just nullified everything
    that you’ve been told!


    Also, keep in mind that *PDO defaults to emulating prepared statements with MySQL*,
    which for very, very rare cases (when the `gbk` Chinese character set is in use)
    may make issues worse rather than alleviate them because the aforementioned character
    set is considered to be vulnerable and if it’s in use, running certain statements
    would still result in a successful execution of the query, thus paving the way
    to another successful SQL injection attack.


    Disable this behavior by disabling the emulation of prepared statements by setting
    the PDO attribute `ATTR_EMULATE_PREPARES` to `FALSE`:


    ```

    $PDO->setAttribute(PDO::ATTR_EMULATE_PREPARES, FALSE);

    ```


    Alternatively, avoid using the `gbk` character set – more information can be found
    here ([`https://stackoverflow.com/questions/5741187/sql-injection-that-gets-around-mysql-real-escape-string/12118602`](https://stackoverflow.com/questions/5741187/sql-injection-that-gets-around-mysql-real-escape-string/12118602)).


    ## Other Attacks Targeting Your Database


    Once you have a good grasp of how SQL injection may be used to harm your database,
    think of other attacks as well. Attackers aren’t likely to limit themselves to
    a single attack vector, and if injection attacks fail, they will almost certainly
    try other attack vectors to steal data from your organization or access your application.
    I’ve covered other attack vectors in this book, and I’ll come back to my recommendations
    once again:


    1.  **Follow the recent edition of the OWASP Top 10.** OWASP doesn’t only provide
    a list of the top 10 most impactful security issues that harm applications and
    databases but also provides actionable tips centered around how you can prevent
    the outlined security flaws from being introduced into your application as well
    as provides detailed advice related to when an application may be susceptible
    to an attack, example scenarios when such an attack may take place, and ways to
    prevent it. If an attack does take place, the tips provided by OWASP will provide
    a good basis to contain the scale of a data breach and protect your applications
    from further exploitations of security vulnerabilities.


    2.  **Take note of older editions of OWASP and other security-related frameworks.**
    Some attacks may drop in the rating list; some may be included. It’s wise to know
    ways to protect from them all. For example, CSRF isn’t a part of the recent edition
    of OWASP, but it doesn’t mean that the attack ceased to be dangerous, does it?


    3.  **Make use of firewall solutions.** Firewall solutions protect your application
    from an attacker exploiting security flaws, and as such, even if your code would
    be susceptible to a security vulnerability, it couldn’t be exploited. There’s
    no need to choose the most expensive firewall solution for your use case either
    – simple things will do just fine.


    4.  **Chat with the security engineering team if you have access to one**. Software
    engineering and the database world can be scary as it is – why not listen to some
    fresh insight about how to deal with issues?


    5.  **To continue staying on top of cyber security news, follow security blogs**
    such as the ones being written by [BreachDirectory](https://breachdirectory.com/blog/),
    [Cybernews](https://cybernews.com), [Rapid7](https://www.rapid7.com/blog/), and
    others. Video content on cybersecurity is an awesome place to start too.


    To top it off, continue educating yourself on software, database, and security
    issues by attending conferences and workshops, reading the documentation of products
    you find yourself using, and reading books such as this one – you will never know
    what you’ll come across.


    You are capable of combating attacks targeting your database – apply your knowledge
    to thwart them all.


    ## Summary


    This chapter has walked you through a variety of methods to protect your database
    instance and the data within. Many of those methods have lots to do with following
    standards and following given advice by reputable sources.


    Now, let me walk you through some more things necessary to know for those working
    with bigger data sets – security doesn’t end here, does it?


