    OWASP Top 10, input sanitization, and firewall appliance. Possibly enterprise-level
    solutions such as MySQL Enterprise Audit and/or MySQL Enterprise Firewall. |


    As you can see, not all use cases necessitate enterprise-level solutions such
    as Enterprise Audit/Enterprise Firewall, and not every use case necessitates NIST
    and/or GDPR. With that being said, every appliance whether it targets the web
    or not will necessitate security measures being taken – the extent of those security
    measures depends on the specifics of the application, so make sure to carefully
    evaluate your use case before choosing to do one thing or another in the security
    space. Knowing the best practices applicable to your use case isn’t rocket science
    – you just need to look at your use case from a bird’s eye view and with a clear
    head. You can also ask a friend to take a “fresh look” if you’d like – perhaps
    there’s something you’ve missed?


