  trans: '

    1.  服务器、应用程序和数据库的架构至关重要，因为这些因素有助于揭示一系列看似简单实则关键的事项，从允许使用的插件版本到服务器可安装的 `PHP` 版本限制（`PHP`
    版本取决于您的操作系统，旧版操作系统将无法运行新版 `PHP`）。如果我们的应用程序、服务器或数据库的架构已经存在问题，那么在继续之前必须解决这些问题，因为如果不加以处理，它们只会变得更糟。


    2.  我们数据库中的数据量将为我们指明其存储位置的方向（例如，如果我们有十亿行数据，那么可以合理地假设数据库中的某些表会进行分区，而每个分区在磁盘上都会占用一定的空间权重，因此如果一个分区重约
    10GB，我们可能会推测此类数据存储在具有适当空间限制的硬盘驱动器中），而数据存储的空间很可能将回答更多问题：该空间是硬盘驱动器吗？是 `SSD`？还是 `NVMe`
    驱动器？


    3.  我们数据库中的数据类别再次告诉我们是否受到 `GDPR` 或其他法规的约束。


    4.  我们目前为保护数据所采取的措施，将不可避免地影响我们在数据量增长后采取的措施。当数据增长到我们视为“大数据”的级别时，我们不太可能需要重新评估整个安全策略，但完全有可能需要添加一些之前没有的安全方法/设备来改善我们的安全态势。


    简而言之，*我们保护大型数据集的方法与保护“普通”大小的数据集相同，同时也始终牢记基本原则，并使用适用于我们特定用例的措施来保护数据。* 让我们考虑几种安全措施，并看看它们在大数据环境中意味着什么：


    | 安全措施 | 在大数据环境中的含义 |

    | --- | --- |

    | 数据加密/哈希 | 密码应使用被认为是难以破解的函数进行哈希处理——`Blowfish` 或 `BCrypt`——并且应将加密应用于您需要保护的所有内容，以将明文打乱成密文，该密文需要使用密钥进行解密。
    |

    | 数据脱敏 | 数据脱敏是指对数据进行混淆处理。拥有的数据越多，数据脱敏可能变得越重要，因为您可能拥有大量对攻击者有价值的数据，而数据脱敏有助于混淆可能以某种方式造成伤害的敏感数据。
    |

    | 数据分段 | 当涉及较大数据集时，数据分段是根据所选参数将具有相似性的数据分组到不同类别中的最佳方法之一，这样可以更有效地使用数据。或许您甚至会考虑先备份数据片段，而不是备份整个数据集？
    |

    | “被遗忘权”（根据请求删除数据） | 总部位于 `EU` 的公司需遵守所谓的“被遗忘权”，即如果用户/客户要求删除其数据，则应立即删除，无需任何进一步询问/收费。如果您运营一个基于大数据的项目，并存储
    `EU` 用户的数据以方便他们访问您产品的任何部分，您必须遵守这项法律。 |

    | 使用 `CDN` 防护 `DoS`/`DDoS` 攻击 | 大数据集通常是完成某个目标所必需的——而目标必须受到保护，免受外部威胁，如 `DDoS` 攻击。`DDoS`
    攻击非常容易发动，而像 `Sucuri`、`Imperva` 或 `CloudFlare` 提供的 `CDN` 可以帮助您减轻这种风险。 |

    | 防火墙和/或审计设备 | 当您的数据变多时，自然会有更多数据需要保护——正确安装的防火墙设备将保护您免受针对您的应用程序/数据库的威胁，而审计设备将帮助您随时评估您的安全态势。许多审计和防火墙设备是集成的，因为它们彼此构成整体的一部分，帮助您检查和跟踪攻击者的步骤，并因此禁止其访问您应用程序/网站的某些区域。
    |

    | 有效的访问控制 | 您拥有的数据越多，控制谁访问这些数据就变得越重要。确保遵循“知必所需”的访问控制准则，这样应该就没问题了。 |

    | 流量分析 | 经常分析访问您的应用程序/网站的流量以识别潜在的恶意行为者/攻击非常重要。从每天 10,000 个请求突然转变为每小时 70,000,000
    个请求可能表明存在 `DDoS` 攻击，而请求列表中出现“`/script.php?id=8 SELECT @@version`”可能表明存在潜在的 `SQL`
    注入攻击向量。流量分析在您运行较小的数据集时也适用，但一旦您的数据集变大，流量分析的重要性很可能会增加。 |

    | 备份策略 | 始终拥有并测试您的备份策略非常重要。随着数据的增长，一个适当的备份策略的重要性可能会变得越来越关键——遵循本书概述的提示（如有必要，备份原始数据以保证更快的恢复时间），制定适用于您用例的备份策略，并确保您的备份可以被恢复。
    |

    | 威胁检测和事件响应计划 | 手头备有威胁检测和事件响应计划始终很重要。随着数据的增长，您的应用程序很可能成为各种攻击的目标，无论攻击是否成功执行，您*都*必须具备检测和预先防范它们的手段。
    |

    | `GDPR` 与 `NIST` | 随着您的数据量增加，遵守 `GDPR` 和 `NIST` 的规定至关重要。它们可能不适用于您的具体情况，但如果适用，您必须确保严格遵守，以避免日后产生巨额罚款和其他问题。
    |

    '
- fmt: 'To secure bigger data sets during the transfer, storage, and displaying phases,
    think of security in the very first steps of your system development lifecycle.
    Then, no matter if your use case already deals with big data or will deal with
    it in the future, you will be in safe hands.


    ## Security, Big Data, and Code in the Initial Phases of Your SDLC


    There’s no specific methodology to “secure big data operations” because there
    are no “big data operations” to begin with. `SELECT`s will remain `SELECT`s, `INSERT`s
    will remain `INSERT`s, and `UPDATE`s and `DELETE`s will retain their functionality
    as well. What people mean when they say “How do I secure big data sets?” is “How
    to secure the code that accesses bigger data sets?” and that can and should be
    done *by implementing security in the initial phases of your SDLC and never forgetting
    it in the long run.* You need to


    1.  Write code in adherence to regulations and security methodologies


    2.  Perform threat modeling in adherence to your use case


    3.  Perform regular vulnerability scanning and, if possible, automate the process


    4.  Inspect, update, delete, or mask the data inside of your database if necessary


    5.  Conduct code reviews


    In other words, the majority of the things you need to do won’t change – what
    changes is your approach to those things. Let me explain:


    1.  Writing code in adherence to security regulations may mean “not storing data
    that are not necessary to store” instead of “storing data and deleting it within
    6-12 hours of getting a request.”


    2.  By taking on threat modeling early on in the system development life cycle,
    you will be better equipped to counter the threats that are posed to your application(s)
    and database. Proper threat modeling may even help you build out your database/table
    structure because if you identify data that would be of interest to an attacker
    but is not necessary to store, you can make a decision to not store it in the
    first place, and thus, be less susceptible to a certain type of attack.


    3.  In the big data realm, regular vulnerability scanning combined with threat
    modeling enables you to not only identify possible threats by *scanning* but also
    presume how they could be exploited by *threat modeling* and thus, be better equipped
    to preempt them before they take place. For some, bigger data sets also provide
    the ability to further threat modeling capabilities by using AI-based threat modeling
    based on the structure of the data.


    4.  Frequent inspecting, updating, or deleting of data may be necessary to ensure
    that we no longer store unnecessary data to adhere to regulations.


    5.  Conducting code reviews helps to identify and preempt possible security flaws
    that may arise. These days, before a commit is added to any repo, it can even
    be subjected to automatic static and/or dynamic code analysis processes that identify
    and fix vulnerabilities without you doing any work!


    When designing software, think of security as a default measure that comes with
    everything you do. Ships are a perfect example of what I want to say – if you
    build a ship so that *it displaces as much water as possible* instead of plugging
    holes when you see water coming in, your ship is way less likely to sink if controlled
    properly. The second way of dealing with problems is also an option, but it’s
    unlikely to save you.


    If your ship displaces as much water as possible, it doesn’t matter whether it
    floats through a pond, river, lake, sea, or ocean, it will be unlikely to sink
    if you control it properly. *The same goes for your data* – adhere to security
    and privacy regulations, make use of threat modeling and regular vulnerability
    scanning, inspect your data frequently, and if necessary – update it and conduct
    code reviews, and you should be good to go. Notice that I don’t say that “you
    won’t suffer a data breach” because a guarantee can never be given and everything
    can be made more secure, but those actions will certainly fortify your data castle
    and fend off attackers.


    Before jumping into security limitations, one thing to always keep in mind is
    that there’s no such thing as 100% security – and there is unlikely to ever be.
    Systems can be secured, but absolute security is a myth. Everything can be hacked
    – we, as developers, have a task to harden our infrastructure to the level that
    a breach would be unfeasible to conduct.


    As far as threat scanning and modeling are concerned, I’ve even heard of stories
    where certain people preparing for the defense of their Master’s or PhD thesis
    worked with big data sets, threat modeling, and classifier algorithms to predict
    the probability of a data breach or some statistics related to them. If I remember
    correctly, the person I’m talking about employed a Naive Bayes Classifier to predict
    the probability of an upcoming data breach which is an even more interesting approach
    because such classifiers work best when we have a lot of data to “feed” them with
    and the hacking space sure has a lot of data to offer.


    ## Data, Script Kiddies & Co.


    Some of you may also be wondering whether there are ways to protect your big data
    sets from being misused or used for fraudulent purposes. This doesn’t apply to
    everyone – to protect big data against misuse/fraud, your data generally needs
    to be displayed in a place readily accessible by the user first and pose a big
    enough threat to employees, users of the software, clients, or the general public.
    You see, by saying “protecting from misuse,” I mean “protecting data from being
    used to cause harm” – in other words, protecting the way data is *used* rather
    than protecting the way it’s stored. If your use case necessitates you working
    with sensitive data, you need to pay attention to this too.


    To give you an example, I’ll once again focus on data breach search engines and
    various bulletin forums. If you’ve been around the security industry starting
    around 2015 until 2017, you’ve most likely noticed a couple of odd things, the
    main ones of those being (1) the appearance of data-mining data breach search
    engines and (2) the activity on forums of questionable nature, hence our focus.


    Those two things were related because the operators of data breach search engines
    or people related to them advertised their “services” to attract paying customers
    who would pay money to access data in data breaches. The services were said to
    be advertised on hacking forums and then went further through word of mouth.


    The services were advertised on hacking forums because some of the clientele for
    those operating such services aside from software engineers, security enthusiasts,
    and engineers were wanna-be hackers (so-called “script kiddies”). Script kiddies
    were the perfect audience for such services because


    1.  Such people often use existing scripts and services to potentially cause harm
    to other people or services.


    2.  Data breach engines available back in the day quickly grew to infamy for providing
    people access to data for questionable purposes often without verifying that those
    who search for the data own it (i.e., those searching for email addresses own
    such email addresses, those searching for usernames own these usernames, etc.).


    The combination of these two things – access to sensitive data and clientele based
    on script kiddies served a purpose – data was misused and often used to further
    illicit access to accounts and/or services. While the nature of such services
    also attracted people wanting to ensure that they are not at risk of identity
    theft (i.e., it had a legitimate use case, too), security experts presumed that
    most of the data within such services attracted nefarious parties who were paying
    to access the data so they could attack and take over accounts on the web.'
