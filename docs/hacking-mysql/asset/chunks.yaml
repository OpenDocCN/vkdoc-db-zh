    发生这种情况的主要原因之一是，MySQL 是一个非常可靠的数据库管理系统。它之所以可靠，是因为其主要存储引擎以具备 ACID 特性而闻名，并且因为它需要一个数据库模型才能让
    DBMS 大放异彩。


    ACID 是一组属性，它保证了 MySQL 在出现那些会让基于 NoSQL 的数据库“颤抖”的错误和问题时仍能保持功能。这些问题包括突然断电、服务器宕机等。ACID
    确保我们的数据库在出现这些错误时仍能良好运行。


    ACID 代表原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability），在 MySQL
    领域中，一切都转化为：


    *   **A** 原子性：确保任何事务中的语句作为一个不可分割的单元运行，并且它们的效果要么作为一个整体被看到，要么完全不被看到。

    *   **C** 一致性：数据一致性由 MySQL 旗舰存储引擎之一独有的日志功能保证。还记得`InnoDB`及其架构吗？其架构的组件之一是日志文件`ib_logfile*`，这并非没有原因。

    *   **I** 隔离性：行可以被隔离——或者锁定——以免受到可能影响它们的查询的影响。换句话说，行级锁。

    *   **D** 持久性：`InnoDB`维护一个日志文件，跟踪对数据的所有更改。


    换句话说，MySQL——在这种情况下特指`InnoDB`——是一个非常强大的“野兽”，可以在各种不同的场景和用例中帮助你，从列出学校学生到在毫秒级内扫描十亿行数据。这里的问题在于，存储引擎必须经过优化以适应你的特定用例，然后你才能释放其高性能和可靠性。唯一能够遵守
    ACID 特性的存储引擎也是`InnoDB`。

    '
- fmt: '## Problematic Use Cases


    Ironically, even with MySQL being such a resourceful and powerful beast, many
    problems start to arise one after the other even if we think we have everything
    thought out. The problems come up because we avoid optimizing our database or
    say “The database is doing well enough – what is there to optimize?” and then
    get upset when our application takes ages to load.


    Database problems can be conveniently split into multiple categories –availability,
    performance, and security are a good place to start. When walking yourself through
    the issues, keep in mind that the simplest things often cause the most headaches
    and the same is true for MySQL, and while the reasons behind these problems are,
    in most cases, more simple than you think, they must be addressed properly too.


    ### Performance Hiccups


    To start with, something that has plagued every DBA and developer working with
    MySQL (or any database management system for that matter) for ages are database
    performance problems. Database performance issues are at the heart of almost every
    slow-performing application, no matter what kind of skeleton (technologies) your
    database may be supporting.


    No matter the application, database performance is rarely looked into initially.
    That’s not to say that developers dismiss the importance of performance in open
    source databases – they almost certainly don’t – but what frequently ends up happening
    is the developer only looks into performance from the side of an application.
    That means one or more of the following:


    *   Your server is doing more work than it should.

    *   Your database is resource-constrained.

    *   Queries running in your database are not optimized for performance and consume
    excessive or inadequate amounts of resources as a result.

    *   Your database structure is not optimized for the work you’re asking your database
    to perform making your database ill-equipped to finish the work you’re asking
    it to do. That may include columns in your database having no indexes or you not
    making use of them, no partitioning when it’s necessary, etc.


    See the pattern? It’s not your database that’s the problem – it’s you not understanding
    what the tools you employ do to your database that’s at the heart of the issue.


    No worries – at the high level, everything’s more simple than you could imagine.
    Seriously – all you need to do is optimize four types of queries. They’re the
    CRUD neighborhood – Create, Read, Update, Delete. At the most basic level, everything
    works like so:


    | Type of Query | How to Optimize? |

    | --- | --- |

    | Create – `INSERT` | Before executing an `INSERT`, make sure that table locks,
    consistency checking, and index updates are done after the `INSERT` query is complete
    and use bulk inserting capabilities. If that doesn''t work, ditch `INSERT`s for
    `LOAD DATA INFILE`. |

    | Read – `SELECT` | Read through as little data as possible. |

    | Update – `UPDATE` | Keep in mind that MySQL updates the data and anything on
    top of it (indexes or partitions) too. Drop indexes and (or) partitions, if necessary,
    employ locking, and beware of `NULL` values too – if you insert such values into
    any partition in your table, they will reside in the lowest partition. |

    | Delete – `DELETE` | Make use of the `LIMIT` clause and switch `DELETE` to `TRUNCATE`
    where feasible (`TRUNCATE` deletes all rows in a table.) |


    What if you would insert data into your database like so:


    ```

    LOCK TABLE mysql_table;

    INSERT INTO mysql_table VALUES (''demo'', ''demo'', ''demo''), (''data'', ''data'',
    ''data''), (''more data'', ''more data'', ''more data'');

    INSERT INTO mysql_table VALUES (''more data'', ''demo data'', ''some data''),
    (''demo data'', ''more demo data'', ''something here too''), (''data'', ''more
    data'', ''more data'');

    ...

    UNLOCK TABLE mysql_table;

    ```


    Read from your database like so:


    ```

    SELECT demo_column FROM mysql_table WHERE some_column >= 500 LIMIT 0,10;

    ```


    Update data in your database like so:


    ```

    LOCK TABLE mysql_table;

    UPDATE mysql_table SET column = ''value'' LIMIT 0,5000;

    UPDATE mysql_table SET column = ''value'' LIMIT 5000,10000;

    UPDATE mysql_table SET column = ''value'' LIMIT 10000,15000;

    ...

    UNLOCK TABLE mysql_table;

    ```


    Or delete all data in a table like so:


    ```

    TRUNCATE TABLE mysql_table;

    ```


    What do you think would happen? Many of your database performance problems would
    start to disappear. See how easy everything becomes once you follow a couple of
    basic steps? We’ll get into performance optimization in the third part of this
    book, but the aforementioned things will be a good starting point in terms of
    database performance.


    ### Availability Issues


    The next one on the list is availability issues. They’re nothing new – if your
    database is down or application performance is grinding to a halt, you’ve got
    issues. Such issues are discussed very widely, and fixing them isn’t rocket science
    – for your database to be available most of the time (let’s be fair, some downtime
    will inevitably occur), choose a reliable server provider, make sure your application
    is routing its requests through CloudFlare or any other CDN, make sure to backup
    your data and test your backups frequently, optimize the queries running in your
    database, and if necessary, take a look into the way load balancers work in your
    database infrastructure.


    To top it all off, replicate data across multiple servers if necessary, and you
    should be good to go! Don’t stress over making your database accessible 100% of
    the time either – given the fact that even CDN providers can be taken down with
    DDoS attacks, 100% uptime of the service behind your database is never a guarantee;
    however, that doesn’t mean you shouldn’t do everything in your power to thwart
    such attacks to begin with.


    In the database realm, availability issues occur because your database isn’t optimized
    properly, so do remain vigilant and watchful over how the data in your database
    is being used, but once you make sure that your application is behind a CDN thwarting
    DDoS attacks, queries are optimized, data backups are reliable and tested, the
    application employs rate limiters, and you’re behind a load balancer or two, relax
    – nothing’s likely to happen. However, do remain vigilant – security breaches
    are just around the corner too.'
