    透露个秘密，`基于 CDN 的防火墙运作方式也完全一样，只不过不是将文件包含在每个需要保护的文件中，而是利用 DNS 服务器来过滤流量。` 再说一次——上下文相同，防火墙采取的行动也大体一致；不同的只是实现方法。哦，而且你可能还能省下几千美元（并在此过程中学到东西）。双赢，不是吗？


    ## 总结


    在本章中，我们回顾了适用于 MySQL 和 MariaDB 的通用安全准则，并熟悉了用于保护数据安全的访问控制、用户安全、组件和插件，以及适用于我们数据库的安全控制措施。这些措施各有其用武之地，并且针对不同的用例可能有不同的应用方式，这就是为什么接下来我将带您了解适用于特定用例的安全准则，并教您如何进一步加固您的数据库实例。


    # 17. 加固您的数据库实例


    既然安全的基础知识已经介绍完毕，让我们深入探讨如何保护您最珍贵的资产免遭数据盗窃。在本章中，我将带您了解众多方法，帮助您为特定用例应用安全准则；我们将更深入地探讨账户类别、密码管理、账户锁定、安全插件、备份、SQL
    注入以及其他可能有朝一日攻击您数据库实例的攻击方式。


    ## 针对特定用例的安全准则与纵深防御


    坦白说，安全准则和设备往往需要根据用例进行不同的应用和使用。想想看——因为出门度假一个月没锁门导致物品被盗，与在枪口威胁下物品被盗，是不同的，对吧？安全也是同样的道理——虽然基本原则不变，但某些原则可能需要根据您的用例以不同方式应用。为了便于理解，我再次将所有内容拆解成一个表格：


    | 用例/场景 | 适用准则 |

    | --- | --- |

    | 个人拥有的简单计算器应用 | 安全基础、针对 XSS 的输入净化、SSL（如果应用需登录）、GDPR。 |

    | 课程销售公司 | 如果公司不存储客户数据（例如，只存储课程时长、价格等信息，用户通过表格咨询），或公司位于欧盟境外且不处理欧盟公民数据，则 GDPR 不适用。可能采用
    NIST。安全基础、SSL、输入净化、如适用则包括 OWASP Top 10。 |

    | 个人作为爱好开发的汽车目录（列表）搜索应用 | 安全基础、OWASP Top 10、输入净化。 |

    | 组织拥有的销售任何种类产品的电子商店 | GDPR、NIST、OWASP Top 10、输入净化和防火墙设备。可能采用企业级解决方案，如 MySQL 企业审计和/或
    MySQL 企业防火墙。 |


    如您所见，并非所有用例都需要企业级解决方案（如企业审计/企业防火墙），也并非每个用例都需要 NIST 和/或 GDPR。话虽如此，任何设备，无论是否面向网络，都需要采取安全措施——这些措施的范围取决于应用的具体情况，因此在安全领域选择采取某项措施前，请务必仔细评估您的用例。了解适用于您用例的最佳实践并非难事——您只需从全局视角、保持头脑清晰地审视您的用例。如果愿意，也可以请朋友“以新鲜的眼光”看看——或许您遗漏了什么？


    安全专家也了解纵深防御，其目标是分层部署一系列安全机制，以增强应用的安全性并保护其中存储的数据。纵深防御的概念是，如果一层安全/防御失效，其他层仍能到位，以阻断潜在的攻击。举个例子：假设我们有一个基本的
    Web 应用，它使用基于 Web 的防火墙（WAF），其登录表单使用 BCrypt 对用户密码进行哈希处理。它的登录表单受到保护，可抵御暴力破解攻击；除了用户名/密码表单外，该应用还要求输入双因素验证码才能登录；一旦启动登录，应用会检查用户的地理位置是否匹配（如果位置与注册时使用的位置不符，则拒绝访问）；并且超过
    5 分钟未活动的用户会自动注销。据此，我们可以有把握地说：

    1.  如果攻击者在网站上发现了一个安全漏洞，他必须绕过防火墙才能利用它并“得逞”，这是一项艰巨的任务。

    2.  如果攻击者绕过防火墙，并希望找到管理员的用户名/密码，他必须利用该漏洞，从而获得用户名和该用户的 BCrypt 哈希（可能是通过 SQL 注入），因为暴力破解攻击无效。由于防火墙的存在，他的行动会受到一定限制。

    3.  如果攻击者成功发动 SQL 注入攻击，从而获得数据库访问权限，他还需要从数据库中提取数据，而如果他使用的用户没有`SELECT`权限（将数据从数据库中导出需要`SELECT`查询），那他就没戏了。

    4.  如果攻击者访问的用户拥有所有权限，并且他能够提取出用户名/哈希组合，他还需要“破解”那个 BCrypt 哈希。对 BCrypt 哈希进行暴力破解将非常耗时（对于像
    SHA1 或 MD5 这样的哈希则不一定如此）。

    5.  即使攻击者破解了 BCrypt 哈希，获得了用户的密码，并想登录管理控制面板，他也会很快被双因素认证窗口阻止，该窗口会向账户所有者发送一封包含需要输入的
    ID 的短信/电子邮件。

    6.  即使攻击者通过某种方式获得了所有者的电子邮件/手机号，从而拥有了 2FA ID 代码，控制面板也可能从一开始就无法为攻击者提供任何“感兴趣”的东西。


    攻击者花费时间破解所有这些步骤值得吗？答案很可能是否定的，这都归功于您的纵深防御实践。


    ## 账户类别与预留账户


    除了角色，MySQL 和 MariaDB 新版本的用户还应该熟悉账户类别和预留账户。


    MySQL 围绕账户类别的概念构建，共有两种——系统用户和普通用户。换句话说，MySQL 中的用户可以是系统用户，也可以是普通用户，这取决于用户是否具有`SYSTEM_USER`权限：


    ```

    GRANT SYSTEM_USER ON [database].[table] TO [username];

    ```


    没有该权限的账户将是普通用户——拥有该权限的将是系统用户。很简单，对吧？话虽如此，请记住，`SYSTEM_USER`权限仅对 MySQL 用户可用，对使用
    MariaDB 生态系统的用户则不可用，因为 MariaDB 会报错。


    ![](img/625040_1_En_17_Fig1_HTML.jpg)


    图 17-1


    在 MariaDB 中授予`SYSTEM_USER`权限


    然而，MySQL 和 MariaDB 都提供了预留账户和角色的概念。如果一个账户专门用于管理目的、由 MySQL 或 MariaDB 某些功能内部使用等，则应被视为“预留”账户。MySQL
    和 MariaDB 中的预留账户如下：

    '
- fmt: '# 数据库保留账户与安全管理


    ## 保留账户


    | 保留账户 | 解释 |

    | --- | --- |

    | `''root''@''localhost''` | 拥有最高权限的主（root）用户账户，可控制所有数据库中的所有表及其他账户。此账户可为安全起见被重命名或直接删除。
    |

    | `''mysql.sys''@''localhost''` | 当`root`账户被重命名或删除出现问题时，工程师可转向此账户。此账户不能用于登录MariaDB，但用于`sys`架构以支持视图、存储过程和函数——这是一个锁定账户。
    |

    | `''mysql.session''@''localhost''` | 供访问数据库/服务器的插件使用。锁定账户。 |

    | `''mysql.infoschema''@''localhost''` | 用于查看`information_schema`表。锁定账户。 |


    简而言之，保留账户是为数据库执行特定任务而预留的，其中一些（`root`账户除外）被锁定，因此无法从外部访问。


    ## 密码管理与账户锁定


    账户锁定也与数据库安全密切相关。账户锁定功能自MariaDB 10.4.2和MySQL 8.0.19起可用，它使用户能够禁用其他账户的使用或访问。账户锁定/解锁的工作方式如下：


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig2_HTML.jpg)


    **图 17-2 在MariaDB中锁定账户**


    ```sql

    ALTER USER ''username''@''host'' ACCOUNT [LOCK|UNLOCK];

    ```


    在上面的例子中，我将`''demouser''@''localhost''`的密码设置为空字符串，以便能够在不指定密码的情况下登录，然后将其锁定，尝试登录，并收到账户已锁定的错误消息。我们甚至可以执行`SHOW
    CREATE USER`命令来确认这一点（见下例）。反之亦然。


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig3_HTML.jpg)


    **图 17-3 在MariaDB中解锁账户**


    在上面的例子中，我们确认账户已被锁定，然后将其解锁，确认其已解锁，并登录到该账户。理解了这个概念后，就很简单了，不是吗？


    在密码管理方面，此类功能大多为MySQL独有。MySQL可以：


    *   使密码过期并要求更改密码。

    *   帮助实施密码重用限制。

    *   生成强大且安全的密码，并验证它们。

    *   在连续登录尝试失败次数过多后锁定账户。


    以下是密码过期的示例。


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig4_HTML.jpg)


    **图 17-4 在MariaDB中使密码过期**


    请记住，`PASSWORD EXPIRE`语法仅支持基于天的值：我们不能让密码在1个月后过期，因为这会引发错误，但我们可以自由地在30天后使密码过期。


    我们还可以通过使用`password_history`和`password_reuse_interval`变量来设置密码重用策略。我们可以自由地禁止在更改密码时轮换最近使用的任何3个密码，并且可以禁止使用在过去（比如）90天内使用过的任何密码：


    ```ini

    password_history=3

    password_reuse_interval=90

    ```


    这些语句可以在运行时通过使用`SET PERSIST`查询来运行，也可以在创建或更改用户时运行（这里`X`表示一个数值）：


    ```sql

    CREATE USER ''demouser''@''localhost'' PASSWORD HISTORY X;

    CREATE USER ''demouser''@''localhost'' PASSWORD REUSE INTERVAL 90 DAY;

    ALTER USER ''demouser''@''localhost'' PASSWORD REUSE INTERVAL 90 DAY PASSWORD
    HISTORY 3;

    ```


    可以设置一些策略，要求用户在更改密码前指定当前使用的密码，以防止错误——这可以通过将`password_require_current`变量设置为`ON`来实现。


    使用`RANDOM PASSWORD`子句将用户的密码设置为随机密码，并且请记住，用户可以通过使用`RETAIN CURRENT PASSWORD`子句来设置双重密码，如下所示：


    ```sql

    ALTER USER ''demouser''@''somehost'' IDENTIFIED BY ''complex_password'' RETAIN
    CURRENT PASSWORD;

    ```


    `RETAIN CURRENT PASSWORD`子句保留账户的密码，但将指定的密码添加为用户可用于登录的辅助密码。


    最后但同样重要的是，账户可以在指定次数的登录尝试失败后被锁定，如下所示（这里`X`代表一个数值）：


    ```sql

    CREATE USER ''demouser''@''localhost'' IDENTIFIED BY ''password'' FAILED_LOGIN_ATTEMPTS
    5 PASSWORD_TIME [UNBOUNDED|X];

    ```


    一旦用户安全，就该回到你的数据了。


    ## SQL注入、输入净化与MariaDB


    SQL注入是许多针对应用程序和数据库管理系统攻击的核心——根据OWASP的数据，注入攻击在2010年、2013年和2017年都是首要攻击媒介，而在2021年，注入攻击降至第三位。尽管如此，对于那些旨在保护基础设施免受黑客攻击的人来说，注入攻击仍然是一个极其重要的争议点，原因如下：


    1.  注入攻击很容易被发现。

    2.  攻击者可以通过多种方式利用注入攻击向量。

    3.  成功实施的注入攻击的影响通常非常严重。


    尽管安全专家一再警告，注入攻击的风险仍然猖獗，这有一个很好的理由：正如并非每个MySQL DBA都了解数据库管理系统的所有组件一样，也并非每个开发者都精通安全知识，结果可能会写出粗心的代码。事实上，许多开发者都非常清楚SQL注入带来的风险，但他们可能不知道如何防止此类攻击。


    “如何防止针对我的数据库的SQL注入攻击？”这个问题的答案相当简单，且包含两方面：


    1.  永远不要信任用户输入。

    2.  永远不要将用户输入直接提供给数据库查询。


    就是这样——真的不是一项很难完成的任务，不是吗？用开发者的话说，“永远不要信任用户输入”转化为“净化所有输入字段”，而“永远不要将用户输入直接提供给查询”则转化为“参数化你的查询，以便用户提供的输入无法修改你的查询语法，导致意外行为”。


    用户输入字段的净化可以通过多种方式完成，但最流行和推荐的方法是使用编程语言中可用的函数——我将以PHP为例：'
  raw: '| Reserved Account | Explanation |

    | --- | --- |

    | `''root''@''localhost''` | The main – root – user account that has godlike privileges
    across all tables in all databases. This account can control other accounts. This
    account can be renamed for “security through obscurity” purposes or deleted altogether.
    |

    | `''mysql.sys''@''localhost''` | Engineers turn to the `mysql.sys` account if
    the root account is renamed or deleted and problems occur. This account cannot
    be used to login to MariaDB, but it’s used by the sys schema to power views, procedures,
    and functions – it’s a locked account. |

    | `''mysql.session''@''localhost''` | This account is used by plugins that access
    the database/server. Locked account. |

    | `''mysql.infoschema''@''localhost''` | This account helps us view the information_schema
    table. Locked account. |


    In other words, reserved accounts are reserved for your database to accomplish
    specific tasks, and some of them (excluding the `root` account) are locked so
    they cannot be accessed from the outside.


    ## Password Management and Account Locking


    Account locking is also closely related to database security. Account locking
    has been available in MariaDB since MariaDB 10.4.2 and in MySQL since MySQL 8.0.19,
    and it’s a feature that enables users to disable other accounts from being used
    or accessed. Account locking/unlocking works like so:


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig2_HTML.jpg)


    Figure 17-2


    Locking an account in MariaDB


    ```

    ALTER USER ''username''@''host'' ACCOUNT [LOCK|UNLOCK];

    ```


    In the example above, I set the password for `''demouser''@''localhost''` to an
    empty string so that I would be able to log in without specifying a password,
    then locked it, tried to log in, and got an error saying that this account is
    locked. We can even issue a `SHOW CREATE USER` command to make sure that’s the
    case (example below). The same works the other way around, too.


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig3_HTML.jpg)


    Figure 17-3


    Unlocking an account in MariaDB


    In the example above, we’ve made sure our account was locked, then unlocked it,
    made sure it’s unlocked, and logged in to it. Simple when you understand the concept,
    isn’t it?


    When it comes to password management, such capabilities are mostly exclusive to
    MySQL. MySQL can


    *   Expire passwords and require them to be changed.


    *   Help you implement restrictions on password reuse.


    *   Generate strong and secure passwords as well as verify them.


    *   Lock accounts after too many consecutive incorrect login attempts.


    Here’s what password expiration looks like.


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig4_HTML.jpg)


    Figure 17-4


    Expiring passwords in MariaDB


    Keep in mind that the `PASSWORD EXPIRE` syntax only supports day-based values:
    we can’t make a password expire in 1 month since that raises an error, but we’re
    free to expire a password after 30 days if we so desire.


    We can also set a password reuse policy by making use of the `password_history`
    and `password_reuse_interval` variables. We’re free to prohibit the rotation of
    any of the last 3 passwords when a password is changed as well as prohibit any
    passwords to be used if they’ve been used within the last, say, 90 days:


    ```

    password_history=3

    password_reuse_interval=90

    ```


    The same statements can be run at runtime by using `SET PERSIST` queries or also
    when creating or altering a user (here `X` denotes a numeric value):


    ```

    CREATE USER ''demouser''@''localhost'' PASSWORD HISTORY X;

    CREATE USER ''demouser''@''localhost'' PASSWORD REUSE INTERVAL 90 DAY;

    ALTER USER ''demouser''@''localhost'' PASSWORD REUSE INTERVAL 90 DAY PASSWORD
    HISTORY 3;

    ```


    Some policies can be set to require users to specify the currently used password
    before changing it to prevent errors – that can be done by setting the `password_require_current`
    variable to `ON`.


    Use the `RANDOM PASSWORD` clause to set the password of users to a random password,
    and keep in mind that users can be set to have dual passwords by making use of
    the `RETAIN CURRENT PASSWORD` clause like so:


    ```

    ALTER USER ''demouser''@''somehost'' IDENTIFIED BY ''complex_password'' RETAIN
    CURRENT PASSWORD;

    ```


    The `RETAIN CURRENT PASSWORD` clause retains the password of an account but adds
    the specified password as a secondary password the user can use to log in.


    Last but not least, accounts can be locked after a specified amount of failed
    login attempts like so (here `X` represents a numeric value):


    ```

    CREATE USER ''demouser''@''localhost'' IDENTIFIED BY ''password'' FAILED_LOGIN_ATTEMPTS
    5 PASSWORD_TIME [UNBOUNDED|X];

    ```


    Once users are secure, it’s time to come back to your data.


    ## SQL Injection, Input Sanitization, and MariaDB


    SQL injection is the pillar of many attacks targeting applications and database
    management systems – according to OWASP, injection-based attacks were the #1 attack
    vector in 2010, 2013, and 2017, and in 2021, injection moved into third place.
    Regardless, injection attacks remain an immensely important point of contention
    for those aiming to protect their infrastructure from hackers for a couple of
    reasons:


    1.  Injection attacks are rather easy to find.


    2.  Attackers can use injection attack vectors in a couple of ways.


    3.  The impact of a successfully mounted injection attack is often very severe.


    The risks of injection attacks remain rampant despite the warnings of security
    experts, and there’s a good reason for that: just as not every MySQL DBA will
    know his/her way around all components of the database management system, not
    every developer will be security-savvy and may write sloppy code as a result.
    In fact, many developers are very well aware of the risks posed by SQL injection,
    but they may not be aware of what to do to prevent such attacks.


    The answer to the question “How to prevent SQL injection attacks targeting my
    database?” is rather simple and twofold:


    1.  Never trust user input.


    2.  Never provide user input straight into a database query.


    That’s it, really – not a very hard task to accomplish, is it? In developer terms,
    “never trust user input” translates to “sanitize all input fields” and “never
    provide user input straight into a query” translates to “parameterize your queries
    so that the input provided by the user cannot modify the syntax of your query
    to act unexpectedly.”


    The sanitization of user input fields can be done in a couple of ways, but the
    most popular and recommended way to accomplish such a task is by the usage of
    functions available in programming languages – I’ll use PHP as an example:'
