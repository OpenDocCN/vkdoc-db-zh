    ```


    一般来说，SQL 查询缓存有三种模式——`ON`、`DEMAND` 和 `OFF`。`ON` 将允许查询被缓存，`DEMAND` 允许你按需缓存查询，而将查询缓存设为
    `OFF`（或将 `have_query_cache` 变量设置为 `NO`）将禁用查询缓存。在 MariaDB 中，有 7 个变量与查询缓存相关，如下所示。


    ![图 9-1：MariaDB 中与查询缓存相关的变量](img/625040_1_En_9_Fig1_HTML.jpg)


    它们的含义如下：


    | 变量 | 含义 |

    | --- | --- |

    | `have_query_cache` | MariaDB 查询缓存是否存在？可用值为 `YES` 和 `NO`。 |

    | `query_cache_limit` | 超过此大小限制的结果将不会被缓存。 |

    | `query_cache_min_res_unit` | 查询缓存的最小大小（以字节为单位）。 |

    | `query_cache_size` | SQL 查询缓存的大小。 |

    | `query_cache_strip_comments` | 指定在缓存查询前是否删除所有注释。 |

    | `query_cache_type` | 前述的 SQL 查询缓存类型。 |

    | `query_cache_wlock_invalidate` | 如果获取了写锁，查询缓存中的 SQL 查询将失效。 |


    虽然我不建议仅依赖 SQL 查询缓存，但说查询缓存不是一个有用的帮手也不对。查询缓存是第一站——第二站是查询执行计划。查询执行计划将对你的查询进行测试，并展示你的数据库的能力。


    ### 优化 INSERT 查询


    我们的第一站与 `INSERT` 查询有关。数据库中的数据之所以存在是有原因的：有人插入了它！真令人惊讶。可以通过以下方式将数据插入数据库：


    1.  使用普通的 `INSERT` 查询

    2.  使用批量 `INSERT` 功能

    3.  将 `SELECT` 与 `INSERT` 结合使用

    4.  利用 `LOAD DATA INFILE` 查询


    现在，从头开始——首先，我们有像这样的普通 `INSERT` 查询：


    ```

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 1'', ''Value
    2'', ''Value 3'',...);

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 4'', ''Value
    5'', ''Value 6'',...);

    ```


    这样的 `INSERT` 查询也可以这样写：


    ```

    INSERT INTO ''demo_table'' [col_1,col_2,col_3,...] VALUES (''Value 1'', ''Value
    2'', ''Value 3''), (''Value 4'', ''Value 5'', ''Value 6''), ...;

    ```


    如你所见，如果值同时插入所有列，指定列名也是可选的。第一个查询是你在许多软件工程和数据库教程中会看到的默认 `INSERT` 查询示例——第二个是你在检查备份时最有可能看到的。这两个查询做的是同一件事——插入数据——但第二个比第一个更强大，因为行由逗号（“,”）分隔，这意味着可以一次性插入更多行。


    如果你想进一步加快 `INSERT` 查询性能，可以研究 `autocommit` 参数。此选项可用于将 `COMMIT` 操作延迟到最后一刻，从而使 `INSERT`
    查询性能更快。下面是一个完美的例子。


    ![图 9-2：备份中的 autocommit=0](img/625040_1_En_9_Fig2_HTML.jpg)


    只有一个 `INSERT`！是不是很酷？


    你还可以利用锁定和解锁。为此，首先使用 `LOCK TABLE [table_name]` 锁定表，然后插入数据，最后使用 `UNLOCK TABLE [table_name]`
    解锁表。如果你发现行的 `VARCHAR` 列较长，可以一次插入较少的行。


    提高 `INSERT` 查询性能的下一个方法是像下面这样将 `INSERT` 与 `SELECT` 查询结合使用。


    ![图 9-3：INSERT INTO … SELECT](img/625040_1_En_9_Fig3_HTML.jpg)'
- fmt: '# Inserting and Optimizing Data in MySQL/MariaDB


    Inserting 20k rows takes less than a second – not bad, huh? Use a SSD or a NVMe,
    and you will likely see even faster results. Needless to say, `INSERT INTO ...
    SELECT` queries will likely be slower than ordinary `SELECT` queries because our
    example will write to a temporary file, where `SELECT` queries will read data
    from a file on the disk, but this example is a certainly viable option for those
    scattering their data across multiple tables/databases.


    If you find yourself working with bigger data sets (>=100M rows), neither approach
    will work; that’s because `INSERT` queries come with a lot of overhead that must
    be removed for the best performance on bigger data sets. `LOAD DATA INFILE` is
    an awesome fit for the task – it is a query specifically designed to load big
    data sets from a file into the disk by


    *   Requiring little overhead for data parsing

    *   Allowing users to skip lines or columns

    *   Allowing users to load data only into specific columns

    *   Handling errors related to duplicate keys


    `LOAD DATA INFILE` with some of the most frequently used options looks like this:


    ```

    LOAD DATA [LOCAL] INFILE [REPLACE|IGNORE] INTO TABLE `demo_table` [PARTITION (p1)]
    [CHARACTER SET charset] [FIELDS|COLUMNS TERIMNATED BY ''|''] [IGNORE number LINES|ROWS];

    ```


    As you can probably tell, `LOAD DATA INFILE` is a powerful beast. Let’s tame it
    by breaking it down:


    *   The optional `LOCAL` option specifies that the file is located on the host
    owned by the client rather than the server.

    *   `REPLACE` or `IGNORE` options will let you replace characters or ignore certain
    lines/rows.

    *   The `PARTITION` option will load the data into a specific partition if any
    is specified.

    *   The `CHARACTER SET` option will use a specified character set when loading
    the data into the database.

    *   The `FIELDS|COLUMNS TERMINATED BY` option will allow you to specify what character
    denotes another column. In other words, what character would tell MySQL/MariaDB
    that the data should be inserted into another column?

    *   The `IGNORE number LINES|ROWS` option will let you specify the number of lines
    or rows that should be ignored. Useful when the first line denotes the structure
    of the file, etc.


    There are many more options, and those options combined with the capability of
    MySQL/MariaDB instances being configured for InnoDB make `LOAD DATA INFILE` a
    really powerful force that should be reckoned with.


    If you are working with bigger data sets, keep in mind that you can also make
    use of the `DEFAULT` keyword when creating tables. This keyword lets you specify
    a default value of the column, and as such, MySQL/MariaDB will pre-fill the column
    with a specified value without you needing to run any `UPDATE` queries afterward,
    saving you time. Look at the example above once again – when creating the country
    column, I’ve also specified that by default, its value should be set to “Not specified.”


    Last but not least, one can insert data into MyISAM tables by switching data files
    from one server to another. Remember – MyISAM doesn’t come with an attached filespace
    (the same cannot be said about InnoDB), which means that if you find yourself
    working with data and/or index files like so.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig4_HTML.jpg)

    Figure 9-4: MYD and MYI files belonging to MyISAM


    You can copy/move them between servers without any hassle: that means that if
    you have two servers and need to store data based on the MyISAM storage engine,
    you can create a MyISAM-based table, insert data/work with it there, and copy
    underlying the data and index files to copy/move the data to another server. Cool
    – but only for `COUNT` queries.


    ## Optimizing SELECT Queries


    Once `INSERT` queries are out of the way, look at someone they’ve formed a very
    close relationship with over the years – `SELECT` queries. `SELECT` queries are
    pretty self-explanatory: they select data from tables within our database. The
    functionality of these SQL queries is rather simple, and many of us understand
    that they’re only a small part of our database; nonetheless, slow `SELECT` query
    performance can have a drastic impact on the performance of both your database
    and your application.


    One day, I was working on the BreachDirectory data breach search engine as usual,
    and then I noticed that pages started to load abnormally slowly. I’ve started
    searching for a cause and determined that there was a customer who had provided
    BreachDirectory with a file containing more than a million accounts and had asked
    the database to check whether all of them were at risk of identity theft at once.
    A million accounts at once – and I thought the rate limiter was working correctly.
    Not in this case. The issue was promptly fixed, but it just goes to demonstrate
    that `SELECT` query performance is no joke: a couple of mistakes here and there
    could spell doom for your database.


    Have a look through the core functionality of your application and search (CTRL+F)
    for "`SELECT ... FROM`": what queries do you see? What data do they ask your database
    to provide and what functionality within your application do they account for?
    It’d be a safe bet that your application uses a bunch of `SELECT` queries: It’d
    be a safe bet because almost everything within a modern application is stored
    inside of a database and provided to an application from the database too. Remember
    `SHOW PROCESSLIST`? Start from there. I’m using a local MariaDB server, so I’ve
    employed `mysqlslap` for load emulation and used another CLI to check the load
    of the database at the same time, so my results look pretty awful formatting-wise,
    yours will look nicer.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig5_HTML.jpg)

    Figure 9-5: Emulating load on MariaDB with mysqlslap


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig6_HTML.jpg)

    Figure 9-6: Output of SHOW PROCESSLIST after running mysqlslap


    It’s worth noting that `SHOW PROCESSLIST` also has a couple of states allowing
    you to understand what state your database is in regard to a certain query. These
    states can tell you a lot of information, especially if you include the `FULL`
    statement. Here are a couple of states that `SHOW PROCESSLIST` can provide


    *   `starting` means that a query is just starting and hasn’t performed any tasks
    yet.

    *   `Sending data` means that a query is sending data to a server and waiting
    for a response from it. If you see this state and your application performance
    is grinding to a halt, queries with this state should be suspect.

    *   `Commit` means that a query is committing data to a server.

    *   `Writing to net` means that a query is writing packets to a network interface.

    *   `Waiting for source to send event` means that the database is waiting for
    a source to send data.

    *   `Has read all relay log; waiting for the replica I/O thread to update it`
    means that a query has read the relay log (events describing changes in the database)
    and is waiting for the I/O processes of the replica.

    *   `NULL` means that the database is doing nothing in regard to the query (it’s
    probably just in the list because your `SHOW PROCESSLIST` query “caught” it just
    before it finished).


    Familiarizing yourself with `SHOW PROCESSLIST` is a necessity – only once you
    understand which state your queries are in when observing them as they run in
    your database can you start to optimize them.


    Once you understand the state your queries are in, you can start to investigate.
    The investigation process shouldn’t take long: identify the problematic query
    by looking at all of the columns, identify the source of the query, and start
    crunching through the code. As you crunch through the code, search for answers
    to the following questions:'
