    \ and then use measures to optimize our database for bigger data sets.\n\n###\
    \ 10. Optimizing MySQL for Big Data\n\nOnce you’ve optimized your database instance\
    \ and some time has passed, you may start to notice that the measures you’ve used\
    \ to optimize your data for the SQL queries behind it are no longer sufficient.\
    \ They may start to be insufficient because your data is growing – and as your\
    \ data is growing, the measures to deal with that growth should grow together\
    \ with it.\n\nAs your data is growing, you will have a lot of things to consider:\
    \ from disk space and hosting to index and data fragmentation. None of those things\
    \ are something that cannot be worked on, and all of them can be amended and changed\
