    Don’t want to use utf8mb4 or have other plans for your database? Good news – the
    list given by MySQL is extensive, simple, and self-explanatory. Choose the character
    set and collation based on data you store in your database, think into the future,
    and you will be good to go.


    ## Your Architecture Is a Mess


    What do your schema, data types, character sets, and collations have in common?
    Right – they all form a bigger or smaller part of your database architecture as
    a whole. Your data, its schema, data types, character sets, and collations are
    all a part of your database architecture. Some of them make up a bigger part,
    some smaller, but they all play a role. To remember what the architecture of MySQL
    looks like, flick back to Chapter [1](#625040_1_En_1_Chapter.xhtml) and skim through
    the header “The Architecture of MySQL.” I’ll remind you that the architecture
    of your DBMS has three main parts them being the Client, the Server, and the Storage:


    1.  **Client**: We interact with MySQL using a CLI or by using a SQL client.


    2.  **Server**: Every query you run in your database management system is run
    through the server. Initially, your query passes through a thread handler, afterward
    – the query cache and the parser, the parser forwards everything through the query
    optimizer. This is the part where the optimizations of your MySQL Server come
    into the game too: remember my.cnf? my.ini? There’s a reason these files exist
    – these files contain the options used to make your MySQL Server able to consume
    a specified amount of resources on your server in the way you specify. Seems like
    a highway to paradise, right?


    3.  **Storage**: Finally, the storage engine running your database also has a
    point to make. For most of you, the storage part of MySQL will probably refer
    to InnoDB or Percona XtraDB and will be directly dependent on the options set
    in my.cnf.


    When investigating the architecture of your database, it’s crucial to look at
    the things *inside* your server. Imagine your server could speak – what would
    the databases and the data within them ask you?


    *   When was the last time you inspected the structure of your tables?


    *   Take a look at the structure of your tables again. Are all columns you have
    necessary for your use case?


    *   What indexes are visible once you inspect your table structure? Do you know
    why they are in place?


    *   What character sets and collations are used in your database? Why?


    *   If you have more than a couple million rows in your database, are your tables
    normalized? If yes, what normalization form do you use and why? If no, why?


    Inspecting your database architecture isn’t rocket science, and the questions
    you need answers to aren’t complex. That’s the entire beauty – you don’t need
    to invent a bike when optimizing MySQL, but make sure that you use proper character
    sets and collations, employ indexes wisely, partition your tables if you run bigger
    data sets, and normalize your data where necessary. That’s it – you’re off to
    a good start!


    Now you need to learn how to properly communicate with your database to access
    the data it employs. If your server and architecture are set up properly, you
    still need to know how to interact with your database through software appliances
    – you would be surprised how many mistakes developers make here too.'
  trans: '### 字符集与排序规则


    一旦我们选择了数据类型，还需记住每个表都有自己的字符集和排序规则。许多开发者常常忽略这一点——毕竟字符集和排序规则默认已定义，何必费心呢？


    这确实没错——MySQL 默认提供了字符集和排序规则，但 MySQL 的默认选择往往并非最优。毕竟，没有人比你自己更了解你的数据库，对吧？


    从字符集说起，MySQL 和 MariaDB 提供了丰富的字符集选项供你选择——甚至无需切换到数据库即可获取可用字符集列表来支持你的数据。登录 MariaDB
    后，只需执行一次 `SHOW CHARACTER SET` 查询，系统就会列出所有可用字符集及其描述、默认排序规则以及存储单个字符所需的最大字节数。来看看这个。


    ![图 3-1：MariaDB 中可用的字符集和排序规则列表](img/625040_1_En_3_Fig1_HTML.jpg)


    虽然对你和你的数据库而言，最可能的选择是支持 UTF-8 Unicode 的字符集（即 `utf8mb4` 配合排序规则 `utf8mb4_general_ci`），但某些使用场景可能需要其他字符集。处理希腊语数据？使用希腊字符集并搭配
    `greek_general_ci` 作为排序规则。与来自以色列、需与你数据库中数据交互的客户打交道？使用希伯来字符集并搭配 `hebrew_general_ci`
    作为排序规则。


    对于大多数通用场景，`utf8mb4` 是你可靠的伙伴。早些时候，部分工程师最初倾向于使用 `utf8`，但随着 `utf8mb4` 成为 MySQL 的标准排序方法，`utf8`
    逐渐淡出。选择使用 `utf8` 而非 `utf8mb4` 并无“不妥”；只是 `utf8` 的原始实现并不支持所有 Unicode 字符——大多数情况下你可能没问题，但如果遇到需要存储表情符号或其他字符的场景，`utf8`
    将不够用，因为它仅支持基本多文种平面（BMP）中的字符，并未涵盖所有 Unicode 字符，因此才有了 `utf8mb4` 的实现。


    同时也要考虑存储字符所需的最大字节数——几字节的差异看似不大，但如果你存储的是较大数据集，字节数累积的速度会比你想象的快得多。


    不想使用 `utf8mb4` 或对你的数据库有其他规划？好消息——MySQL 提供的列表内容广泛、简洁且一目了然。根据你数据库中存储的数据来选择字符集和排序规则，展望未来需求，你就能顺利前行。


    ## 你的架构一团糟


    你的模式、数据类型、字符集和排序规则有什么共同点？没错——它们共同构成了你数据库架构整体中或大或小的一部分。你的数据、其模式、数据类型、字符集和排序规则都是你数据库架构的一部分。其中一些构成较大份额，一些较小，但它们都扮演着角色。要回顾
    MySQL 架构的模样，请翻回第一章，浏览标题“MySQL 的架构”。我提醒一下，你的 DBMS 架构主要分为三部分：客户端、服务器和存储：


    1.  **客户端**：我们通过命令行界面或 SQL 客户端与 MySQL 交互。


    2.  **服务器**：你在数据库管理系统中运行的每个查询都通过服务器执行。最初，你的查询会经过线程处理器，随后是查询缓存和解析器，解析器再将所有内容传递给查询优化器。这也是
    MySQL 服务器优化发挥作用的部分：还记得 `my.cnf` 吗？`my.ini` 呢？这些文件的存在是有原因的——它们包含的选项用于让你的 MySQL
    Server 能够按照你指定的方式，在服务器上消耗指定数量的资源。这听起来像通往天堂的高速公路，对吧？


    3.  **存储**：最后，运行你的数据库的存储引擎也有其重要性。对大多数人而言，MySQL 的存储部分可能指 InnoDB 或 Percona XtraDB，并将直接依赖于
    `my.cnf` 中设置的选项。


    在探究你的数据库架构时，深入审视服务器内部至关重要。想象一下，如果你的服务器会说话——其中的数据库及其内部数据会问你什么？


    *   你上一次检查表结构是什么时候？


    *   再看一下你的表结构。你拥有的所有列都是你使用场景所必需的吗？


    *   检查表结构时，哪些索引是可见的？你知道它们为何存在吗？


    *   你的数据库中使用了哪些字符集和排序规则？为什么？


    *   如果你的数据库中有超过几百万行数据，你的表是否规范化的？如果是，你采用了哪种规范化形式，为什么？如果不是，为什么？


    检查你的数据库架构并非难事，你需要答案的问题也并不复杂。这正是其美妙之处——优化 MySQL 时你无需重新发明轮子，但务必确保使用了合适的字符集和排序规则，明智地使用索引，处理较大数据集时对表进行分区，并在必要时对数据进行规范化。就这样——你已经有了一个良好的开始！


    现在，你需要学习如何正确地与数据库沟通以访问它所承载的数据。如果你的服务器和架构设置正确，你仍然需要知道如何通过软件工具与你的数据库交互——开发者在此处犯的错误之多，会让你惊讶。'
- fmt: "## Communicating with MySQL Through Software\n\nKnowing how to properly communicate\
    \ with your database is half the battle. Many developers think that they know\
    \ how best to talk to their database, but a glance at code interacting with MySQL\
    \ will often tell you that it’s rarely the case. Open up a piece of code belonging\
    \ to a search engine and inspect some SQL queries – you will likely see something\
    \ similar to the following:\n\n1.  ```sql\n    SELECT * FROM `table_name` WHERE\
    \ `column` = 'Search Query';\n    ```\n\n2.  ```sql\n    SELECT * FROM `table_name`\
    \ WHERE `column` LIKE '%Search Query%';\n    ```\n\n3.  ```sql\n    SELECT * FROM\
    \ `table_name` WHERE(`column`) MATCH('Search Query' [IN ANY FULLTEXT SEARCH MODE]);\n\
    \    ```\n\n4.  ```sql\n    SELECT `product_id`, `product_title`, `category_title`\
    \ FROM `table_1` INNER JOIN `table_2` ON `products`.`cat_id` = `categories`.`cat_id`;\n\
    \    ```\n\nYou could add some `AND`s or `OR`s to the mix and voilà – that’s almost\
    \ the same query you run in your application to return results from a database!\n\
    \n“And what’s wrong with those queries?” – I hear you asking. Nothing – these\
    \ queries aren’t “wrong” as-is, but each of them provides us with unique insight\
    \ into what resources they’re likely to consume in our database, and they act\
    \ as an extremely good starting point once we have the need to understand what\
    \ breaks our database, especially if some of those queries are slow.\n\nNow stop\
    \ and take a closer look into each query – I’ve underlined things worth an extra\
    \ second of your attention:\n\n1.  `SELECT * FROM` `table_name` WHERE `column`\
    \ = 'Search Query';\n\n2.  `SELECT * FROM` `table_name` WHERE `column` `LIKE`\
    \ `%Search Query%`;\n\n3.  `SELECT * FROM` `table_name` WHERE `MATCH`(`column`)\
    \ `MATCH`('Search Query' `[IN ANY FULLTEXT SEARCH MODE]`);\n\n4.  `SELECT` `product_id`,\
    \ `product_title`, `category_title` FROM `table_1` `INNER JOIN` `table_2` ON `products`.`cat_id`\
    \ = `categories`.`cat_id`;\n\nThere are four queries in which I’ve underlined\
    \ 11 things worth paying attention to. I’ve done that with a very good reason:\
    \ each of those things comes with different performance implications both for\
    \ your application and the database behind it. Each query is a task composed of\
    \ smaller tasks: each of those tasks has an impact on performance. Performance\
    \ is response time, and the faster it is, the better for everyone involved.\n\n\
    In other words, higher performance means a shorter response time and to achieve\
    \ a good result – a performant database – we need our response time to be as low\
    \ as possible. To achieve our goal, we need to understand what causes slow query\
    \ performance, understand the internals of our problems, and eliminate them.\n\
    \n### Top Causes of Slow Query Performance\n\nSince we’re after performance when\
    \ communicating with MySQL through any software appliance, it’s crucial to take\
    \ some time and think about the structure of our SQL queries and that’s why you\
    \ see four different examples above. Developers make various performance hiccups,\
    \ and the queries you see are a very good example.\n\nTake a closer look into\
    \ the same queries again: what potential performance hiccups can you spot? How\
    \ many of them exist? I’ve spotted four:\n\n1.  **Query structure**: `SELECT *\
    \ FROM` means that we’re selecting every column from a table. Is selecting everything\
    \ necessary? Probably not. If not, why are you using `SELECT *` instead of `SELECT\
    \ column`? Can you imagine what your database goes through when selecting every\
    \ column in a table with 10,000 records? 100,000 records? 1,000,000 records? The\
    \ more records you have, the less recommended this approach becomes. In many cases,\
    \ it’s enough to issue a query like `SELECT 'column' FROM` to instantly see performance\
    \ improve because our database scans through fewer rows to return results.\n\n\
    2.  **Wildcards**: There’s nothing inherently wrong in using wildcards for search\
    \ operations, but using a wildcard *in front of a query* is just asking for trouble\
    \ because you’re telling your database “Search for anything in front of text I’ll\
    \ give you. Oh, the text may have anything after it, too.” *If you do that, your\
    \ database won't be able to use indexes* because it won’t know the exact query\
    \ you are concerned with. **Never use wildcards in front of a query – if necessary,\
    \ employ them at the end.**\n\n3.  **Fulltext searching may be problematic**:\
    \ Full-text search operations are an old friend of MySQL; there are many valid\
    \ reasons to employ full-text search operations using the database management\
    \ system. Full-text search operations provide MySQL with superpowers rivaled by\
    \ very few things; however, such an approach may become problematic because MySQL\
    \ doesn’t prevent you from putting multiple kinds of indexes on the same column.\
    \ Be wary of the kinds of indexes you use in your database management system,\
    \ and also, keep in mind that queries using full-text indexes on bigger data sets\
    \ may break MySQL 5.7 due to a bug inside of MySQL (see Appendix – Query that\
    \ Breaks MySQL 5.7 for more information.) Newer versions of MySQL aren’t affected\
    \ by this issue.\n\n4.  **Is an INNER JOIN necessary?** There’s nothing wrong\
    \ with using `INNER JOIN` to help your query succeed, but keep in mind that in\
    \ many cases, `INNER JOIN`s mark the start of complex queries – it isn’t unusual\
    \ to see multiple `INNER JOIN`s spanning one query and slowing down its performance\
    \ as a result. After all, is an `INNER JOIN` the join type you need? There are\
    \ four other `JOIN` types you may use – there’s `LEFT OUTER JOIN`, `RIGHT OUTER\
    \ JOIN`, `SELF JOIN`, and `CROSS JOIN`, too.\n\nMany causes of slow `SELECT` query\
    \ performance have something to do with the aforementioned performance hiccups.\
    \ Others will have something to do with indexes being defined, but not used, your\
    \ table not being normalized, or other things. Once your application completes\
    \ the necessary queries, it’s also vitally important to close the connections\
    \ to not run out of the number of connections that MySQL can employ – that’s what\
    \ the `max_connections` variable does. In MySQL, the default number is 151, the\
    \ minimum – 1, and the maximum is 100,000.\n\nI will walk you through the ins\
    \ and outs of optimization of SQL queries in the second part of this book – for\
    \ now, understand that for your `SELECT` queries to be as quick as possible, you\
    \ need to read as little data as you can while making use of indexes and partitions\
    \ after fine-tuning your server resources for MySQL.\n\nIn other words, to speed\
    \ the performance of `SELECT` queries up, select as little data as possible after\
    \ allocating much of your server resources to MySQL.\n\nOnce you find yourself\
    \ in the `INSERT` territory, the advice changes – for your `INSERT` queries to\
    \ be effective, keep in mind that while indexes and partitions help `SELECT`s,\
    \ they harm `INSERT`s, `UPDATE`s, and `DELETE`s because when data is inserted,\
    \ updated, or deleted, the data in the index or partition has to be updated as\
    \ well.\n\nTo optimize `INSERT` queries, aim to insert as much data as possible\
    \ in one go using the bulk `INSERT` capability like so:\n\n```sql\nINSERT INTO\
    \ `demo_table` (`col1`,`col2`,`col3`) VALUES(1,2,3),(4,5,6),(7,8,9),...;\n```\n\
    \nAim to insert data when indexes aren’t in place (if possible, add them after\
    \ you insert data into your table), and if you find yourself working with bigger\
    \ data sets, ditch `INSERT`s altogether and use `LOAD DATA INFILE` instead.\n\n\
    As far as `UPDATE`s are concerned, they work just as `SELECT` queries do with\
    \ the overhead of `INSERT` queries. To optimize `UPDATE`s, beware of indexes,\
    \ partitions, and `NULL` values:\n\n*   Beware that indexes will slow down `UPDATE`s\
    \ if we modify columns that are indexed because of additional overhead (your database\
    \ needs to update data itself and the data in the index as well.)"
  raw: '## Communicating with MySQL Through Software


    Knowing how to properly communicate with your database is half the battle. Many
    developers think that they know how best to talk to their database, but a glance
    at code interacting with MySQL will often tell you that it’s rarely the case.
    Open up a piece of code belonging to a search engine and inspect some SQL queries
    – you will likely see something similar to the following:


    1.  ``SELECT * FROM `table_name` WHERE `column` = ''Search Query'';``


    2.  ``SELECT * FROM `table_name` WHERE `column` LIKE ''%Search Query%'';``


    3.  ``SELECT * FROM `table_name` WHERE(`column`) MATCH(''Search Query'' [IN ANY
    FULLTEXT SEARCH MODE]);``


    4.  ``SELECT `product_id`, `product_title`, `category_title` FROM `table_1` INNER
    JOIN `table_2` ON `products`.`cat_id` = `categories`.`cat_id`;``


    You could add some `AND`s or `OR`s to the mix and voilà – that’s almost the same
    query you run in your application to return results from a database!


    “And what’s wrong with those queries?” – I hear you asking. Nothing – these queries
    aren’t “wrong” as-is, but each of them provides us with unique insight into what
    resources they’re likely to consume in our database, and they act as an extremely
    good starting point once we have the need to understand what breaks our database,
    especially if some of those queries are slow.


    Now stop and take a closer look into each query – I’ve underlined things worth
    an extra second of your attention:


    1.  `SELECT * FROM` `` `table_name` WHERE `column` = ''Search Query''; ``


    2.  `SELECT * FROM` `` `table_name` WHERE `column` `` `LIKE` `''``%``Search Query``%``'';`


    3.  `SELECT * FROM` `` `table_name` WHERE `` `MATCH```(`column`)`` `MATCH``(''Search
    Query''` `[IN ANY FULLTEXT SEARCH MODE]``);`


    4.  `SELECT` `` `product_id`, `product_title`, `category_title` FROM `table_1`
    `` `INNER JOIN` `` `table_2` ON `products`.`cat_id` = `categories`.`cat_id`; ``


    There are four queries in which I’ve underlined 11 things worth paying attention
    to. I’ve done that with a very good reason: each of those things comes with different
    performance implications both for your application and the database behind it.
    Each query is a task composed of smaller tasks: each of those tasks has an impact
    on performance. Performance is response time, and the faster it is, the better
    for everyone involved.


    In other words, higher performance means a shorter response time and to achieve
    a good result – a performant database – we need our response time to be as low
    as possible. To achieve our goal, we need to understand what causes slow query
    performance, understand the internals of our problems, and eliminate them.


    ### Top Causes of Slow Query Performance


    Since we’re after performance when communicating with MySQL through any software
    appliance, it’s crucial to take some time and think about the structure of our
    SQL queries and that’s why you see four different examples above. Developers make
    various performance hiccups, and the queries you see are a very good example.


    Take a closer look into the same queries again: what potential performance hiccups
    can you spot? How many of them exist? I’ve spotted four:


    1.  **Query structure**: `SELECT * FROM` means that we’re selecting every column
    from a table. Is selecting everything necessary? Probably not. If not, why are
    you using `SELECT *` instead of `SELECT column`? Can you imagine what your database
    goes through when selecting every column in a table with 10,000 records? 100,000
    records? 1,000,000 records? The more records you have, the less recommended this
    approach becomes. In many cases, it’s enough to issue a query like `SELECT ''column''
    FROM` to instantly see performance improve because our database scans through
    fewer rows to return results.


    2.  **Wildcards**: There’s nothing inherently wrong in using wildcards for search
    operations, but using a wildcard *in front of a query* is just asking for trouble
    because you’re telling your database “Search for anything in front of text I’ll
    give you. Oh, the text may have anything after it, too.” *If you do that, your
    database won''t be able to use indexes* because it won’t know the exact query
    you are concerned with. **Never use wildcards in front of a query – if necessary,
    employ them at the end.**


    3.  **Fulltext searching may be problematic**: Full-text search operations are
    an old friend of MySQL; there are many valid reasons to employ full-text search
    operations using the database management system. Full-text search operations provide
    MySQL with superpowers rivaled by very few things; however, such an approach may
    become problematic because MySQL doesn’t prevent you from putting multiple kinds
    of indexes on the same column. Be wary of the kinds of indexes you use in your
    database management system, and also, keep in mind that queries using full-text
    indexes on bigger data sets may break MySQL 5.7 due to a bug inside of MySQL (see
    Appendix – Query that Breaks MySQL 5.7 for more information.) Newer versions of
    MySQL aren’t affected by this issue.


    4.  **Is an INNER JOIN necessary?** There’s nothing wrong with using `INNER JOIN`
    to help your query succeed, but keep in mind that in many cases, `INNER JOIN`s
    mark the start of complex queries – it isn’t unusual to see multiple `INNER JOIN`s
    spanning one query and slowing down its performance as a result. After all, is
    an `INNER JOIN` the join type you need? There are four other `JOIN` types you
    may use – there’s `LEFT OUTER JOIN`, `RIGHT OUTER JOIN`, `SELF JOIN`, and `CROSS
    JOIN`, too.


    Many causes of slow `SELECT` query performance have something to do with the aforementioned
    performance hiccups. Others will have something to do with indexes being defined,
    but not used, your table not being normalized, or other things. Once your application
    completes the necessary queries, it’s also vitally important to close the connections
    to not run out of the number of connections that MySQL can employ – that’s what
    the `max_connections` variable does. In MySQL, the default number is 151, the
    minimum – 1, and the maximum is 100,000.


    I will walk you through the ins and outs of optimization of SQL queries in the
    second part of this book – for now, understand that for your `SELECT` queries
    to be as quick as possible, you need to read as little data as you can while making
    use of indexes and partitions after fine-tuning your server resources for MySQL.


    In other words, to speed the performance of `SELECT` queries up, select as little
    data as possible after allocating much of your server resources to MySQL.


    Once you find yourself in the `INSERT` territory, the advice changes – for your
    `INSERT` queries to be effective, keep in mind that while indexes and partitions
    help `SELECT`s, they harm `INSERT`s, `UPDATE`s, and `DELETE`s because when data
    is inserted, updated, or deleted, the data in the index or partition has to be
    updated as well.


    To optimize `INSERT` queries, aim to insert as much data as possible in one go
    using the bulk `INSERT` capability like so:


    ```

    INSERT INTO `demo_table` (`col1`,`col2`,`col3`) VALUES(1,2,3),(4,5,6),(7,8,9),...;

    ```


    Aim to insert data when indexes aren’t in place (if possible, add them after you
    insert data into your table), and if you find yourself working with bigger data
    sets, ditch `INSERT`s altogether and use `LOAD DATA INFILE` instead.


    As far as `UPDATE`s are concerned, they work just as `SELECT` queries do with
    the overhead of `INSERT` queries. To optimize `UPDATE`s, beware of indexes, partitions,
    and `NULL` values:


    *   Beware that indexes will slow down `UPDATE`s if we modify columns that are
    indexed because of additional overhead (your database needs to update data itself
    and the data in the index as well.)'
  trans: "## 通过软件与 MySQL 通信\n\n了解如何正确地与你的数据库通信，就成功了一半。许多开发人员认为自己知道与数据库沟通的最佳方式，但审视一下与\
    \ MySQL 交互的代码，往往会发现事实并非如此。打开搜索引擎的一段代码，检查其中的一些 SQL 查询——你可能会看到类似以下的内容：\n\n1.  ```sql\n\
    \    SELECT * FROM `table_name` WHERE `column` = 'Search Query';\n    ```\n\n\
    2.  ```sql\n    SELECT * FROM `table_name` WHERE `column` LIKE '%Search Query%';\n\
    \    ```\n\n3.  ```sql\n    SELECT * FROM `table_name` WHERE(`column`) MATCH('Search\
    \ Query' [IN ANY FULLTEXT SEARCH MODE]);\n    ```\n\n4.  ```sql\n    SELECT `product_id`,\
    \ `product_title`, `category_title` FROM `table_1` INNER JOIN `table_2` ON `products`.`cat_id`\
    \ = `categories`.`cat_id`;\n    ```\n\n你可能会添加一些 `AND` 或 `OR` 条件，然后——瞧！这几乎就是你在应用程序中运行以从数据库返回结果的查询！\n\
    \n“这些查询有什么问题？”——我听到你在问。没什么问题——这些查询本身并“不错误”，但它们中的每一个都为我们提供了独特的视角，让我们了解它们在数据库中可能消耗的资源。一旦我们需要理解是什么拖垮了我们的数据库，特别是在某些查询运行缓慢时，它们就成为了一个极好的起点。\n\
    \n现在停下来，仔细看看每个查询——我已经为你划出了值得额外关注的重点：\n\n1.  `SELECT * FROM` `table_name` WHERE\
    \ `column` = 'Search Query';\n\n2.  `SELECT * FROM` `table_name` WHERE `column`\
    \ `LIKE` `%Search Query%`;\n\n3.  `SELECT * FROM` `table_name` WHERE `MATCH`(`column`)\
    \ `MATCH`('Search Query' `[IN ANY FULLTEXT SEARCH MODE]`);\n\n4.  `SELECT` `product_id`,\
    \ `product_title`, `category_title` FROM `table_1` `INNER JOIN` `table_2` ON `products`.`cat_id`\
    \ = `categories`.`cat_id`;\n\n这四个查询中，我划出了 11 个值得关注的点。我这么做有充分的理由：每个点都对你的应用程序及其背后的数据库有着不同的性能影响。每个查询都是一个由更小任务组成的任务：每个任务都会影响性能。性能就是响应时间，响应越快，对所有相关方越好。\n\
    \n换句话说，更高的性能意味着更短的响应时间。要实现良好的结果——一个高性能的数据库——我们需要响应时间尽可能低。为了实现这个目标，我们需要理解导致查询性能缓慢的原因，了解问题的内部机理，并消除它们。\n\
    \n### 导致查询性能缓慢的主要原因\n\n既然我们通过任何软件工具与 MySQL 通信时都追求性能，花些时间思考 SQL 查询的结构就至关重要，这也是你看到上面四个不同示例的原因。开发者会犯各种性能上的小错误，你看到的这些查询就是很好的例子。\n\
    \n再仔细看看这些查询：你能发现哪些潜在的性能问题？存在多少个？我发现了四个：\n\n1.  **查询结构**：`SELECT * FROM` 意味着我们要从表中选择所有列。选择所有列是必要的吗？很可能不是。如果不是，那你为什么用\
    \ `SELECT *` 而不是 `SELECT column`？你能想象当选择一个有 10,000 条记录的表中的所有列时，你的数据库经历了什么吗？100,000\
    \ 条？1,000,000 条？记录越多，这种做法就越不推荐。在许多情况下，只需发出类似 `SELECT 'column' FROM` 的查询，就能立即看到性能提升，因为我们的数据库需要扫描的行数更少。\n\
    \n2.  **通配符**：在搜索操作中使用通配符本身没有错，但在**查询开头使用通配符**就是在自找麻烦，因为你告诉数据库的是“搜索我提供的文本之前的任何内容。哦，文本后面也可能有任何内容。”\
    \ *如果你这样做，你的数据库将无法使用索引*，因为它不知道你关心的确切查询是什么。**永远不要在查询开头使用通配符——如有必要，请将它们用在末尾。**\n\
    \n3.  **全文搜索可能有问题**：全文搜索操作是 MySQL 的老朋友了；使用数据库管理系统执行全文搜索操作有很多合理的理由。全文搜索操作为 MySQL\
    \ 提供了极少有东西能匹敌的强大能力；然而，这种方法可能变得有问题，因为 MySQL 不阻止你在同一列上放置多种索引。请警惕你在数据库管理系统中使用的索引类型，并且要记住，在较大数据集上使用全文索引的查询可能会因为\
    \ MySQL 5.7 内部的一个错误而使其崩溃（更多信息请参见附录——使 MySQL 5.7 崩溃的查询）。更新版本的 MySQL 不受此问题影响。\n\n\
    4.  **`INNER JOIN` 是必要的吗？** 使用 `INNER JOIN` 来帮助查询成功本身没有问题，但请记住，在许多情况下，`INNER JOIN`\
    \ 标志着复杂查询的开始——在一个查询中跨越多个 `INNER JOIN` 并因此拖慢其性能的情况并不少见。毕竟，`INNER JOIN` 是你需要的连接类型吗？你还可以使用其他四种\
    \ `JOIN` 类型——还有 `LEFT OUTER JOIN`、`RIGHT OUTER JOIN`、`SELF JOIN` 和 `CROSS JOIN`。\n\
    \n许多导致 `SELECT` 查询性能缓慢的原因都与上述性能问题有关。其他的则可能与定义了但未使用的索引、表未规范化或其他问题有关。一旦你的应用程序完成了必要的查询，关闭连接也至关重要，以免耗尽\
    \ MySQL 可处理的连接数——这就是 `max_connections` 变量的作用。在 MySQL 中，默认值是 151，最小值是 1，最大值是 100,000。\n\
    \n我将在本书的第二部分引导你深入了解 SQL 查询优化的方方面面——现在，请理解为了让你的 `SELECT` 查询尽可能快，你需要在为 MySQL 微调服务器资源后，尽可能少地读取数据，同时利用索引和分区。\n\
    \n换句话说，要提升 `SELECT` 查询的性能，就要在将大部分服务器资源分配给 MySQL 的情况下，选择尽可能少的数据。\n\n一旦你进入 `INSERT`\
    \ 领域，建议就变了——为了让你的 `INSERT` 查询更有效，请记住，虽然索引和分区对 `SELECT` 有帮助，但它们对 `INSERT`、`UPDATE`\
    \ 和 `DELETE` 有害，因为当数据被插入、更新或删除时，索引或分区中的数据也必须更新。\n\n为了优化 `INSERT` 查询，目标是使用批量 `INSERT`\
    \ 功能一次性插入尽可能多的数据，像这样：\n\n```sql\nINSERT INTO `demo_table` (`col1`,`col2`,`col3`)\
    \ VALUES(1,2,3),(4,5,6),(7,8,9),...;\n```\n\n尽量在索引不存在时插入数据（如果可能，在将数据插入表后再添加索引），如果你发现自己正在处理更大的数据集，那就完全舍弃\
    \ `INSERT`，改用 `LOAD DATA INFILE`。\n\n至于 `UPDATE`，它们的工作方式与 `SELECT` 查询类似，但带有 `INSERT`\
    \ 查询的额外开销。为了优化 `UPDATE`，需注意索引、分区和 `NULL` 值：\n\n*   请注意，如果我们修改了已索引的列，索引会拖慢 `UPDATE`\
    \ 速度，因为会产生额外开销（你的数据库需要更新数据本身以及索引中的数据）。"
- fmt: '*   Beware that `UPDATE` queries will be slower than usual if partitions are
    in use due to MySQL needing to update data in the partition and the data itself
    (and, if necessary, switch the partition where the data resides in, too.)

    *   Beware that `NULL` values have a caveat as far as updates are concerned, too
    – if you insert a `NULL` value into a partition, it will reside in the lowest
    possible partition.


    Finally, to optimize `DELETE` queries, consider deleting data using the `LIMIT`
    clause, dropping indexes and partitions before deleting your data if deleting
    takes a lot of time, and finally, using `TRUNCATE` instead of `DELETE` if you’re
    deleting all rows in a table: `TRUNCATE` queries will always be faster than `DELETE`s
    because instead of deleting records one by one, `TRUNCATE` queries will delete
    all rows in a table in one go.


    ## Summary


    As you discovered, MySQL has a layered architecture – those layers can be broken,
    and breaking any one layer impacts the performance of other layers. This chapter
    has walked you through ways to understand your data by properly choosing the schema
    and data types for your use case, as well as provided you with an understanding
    in regard to available character sets and collations in MySQL.


    It’s vitally important to build MySQL on a reliable architecture and choose a
    proper way to communicate with your database – but that’s not enough. One should
    also write queries in a way that doesn’t obstruct your database from helping you
    (e.g., if wildcard signs are found to be necessary, avoid using them at the beginning
    of your query, etc.) and close database connections once they’re no longer necessary.


    However, some of these tips are only applicable when the database is being built
    and may not necessarily be applicable once you’ve been working with it for some
    time. As time flies by, more and more database issues occur, and it’s vital to
    know how to tackle them and prevent them from occurring too. Some of you may have
    been working with your database – and breaking your queries – for years too.


    # 4. How You Broke Your Queries


    Understanding the reasons behind why your queries are slow and don’t produce the
    necessary results is an essential skill for both novices and power users alike.
    After all, we optimize something that’s broken – how can we optimize our queries
    if we don’t even know what actions of ours broke them? This is what I’ll help
    you explore in this chapter. This chapter will focus on the essentials of broken
    queries as well as some things you may not know, so make sure to read it carefully.
    Not all advice in this chapter may apply to your specific use case either – weigh
    the ups and downs of my advice, and take from it what you will. If you’re not
    sure about something, you can always consult the latest version of documentation
    concerning your specific DBMS or ask your friendly neighborhood DBA.


    ## The Good, Bad, and the Ugly: Understanding Queries in MySQL


    You may think you understand your queries. After all, queries in MySQL aren’t
    rocket science: there are only so many queries you count on in your daily work.
    These may be `INSERT`, `SELECT`, `UPDATE`, `DELETE`, and a couple of queries you
    turn to when these don’t help. Seriously – that’s kind of it. Yet, people still
    struggle to achieve performance: their SQL queries time out, MySQL greets them
    with errors, or customers contact them in regard to downtime headaches.


    Much of that has to do with improperly written queries – we’ve gone through some
    examples in the last chapter where I walked you through some causes of slow query
    performance, but you’d be surprised at the things you do that break your queries
    from the inside. Some of you don’t even think of them and they’re there – hiding
    in plain sight.


    ## How You Broke Queries in MySQL


    Contrary to popular belief, breaking your queries is easy. So easy in fact, that
    some of your colleagues are probably already breaking them without even knowing
    it.


    You see, both developers and DBAs – no matter how senior they are – know how to
    write queries: who doesn’t? The problems start when we start miscommunicating
    with our databases and biting off more than we can chew. Standard approaches are
    nice and good – until your application notoriety grows. With it grows the load
    onto your database and ways that helped you squash database issues before might
    be not applicable anymore.


    I’ve walked you through a couple of such scenarios in Chapter [3](#625040_1_En_3_Chapter.xhtml):
    remember how I told you that you should take some time to think about your query
    structure? Properly choose data types and collations? Avoid using wildcards at
    the beginning of the queries having a `LIKE` clause? Each of these points of advice
    has merit – and the more points of relevant advice you adhere to, the faster you
    will bring your SQL queries back to their former glory. I will now walk you through
    the types of queries in MySQL, factors that are disliked by your queries, and
    explain why, how, and when that happens so you can head off performance issues.


    ## Types of Queries in MySQL


    MySQL has many types of queries available for you to use. These include the common
    set of four CRUD (Create, Read, Update, and Delete) queries, but also other SQL
    statements exclusive to DDL (Data Definition Language), DML (Data Manipulation
    Language), DCL (Data Control Language), and TCL (Transaction Control Language).
    In the MySQL world, such statements include, but are not limited to, the following
    data languages and statements:


    | Language and Explanation | Clauses and Statements |

    | --- | --- |

    | Data Definition Language (DDL) | `ALTER, CREATE, DROP, RENAME, TRUNCATE` |

    | Data Manipulation Language (DML) | `CALL, DELETE, DO, EXCEPT, INSERT, LOAD [DATA|XML],
    REPLACE, SELECT, UPDATE, UNION, VALUES, WITH (CTEs)` |

    | Data Control Language (DCL) | `GRANT, REVOKE` |

    | Transaction Control Language (TCL) | `COMMIT, ROLLBACK` |


    In other words, queries in MySQL help you define, manipulate, or control your
    data or facilitate work with groups of statements that are handled as a single
    unit – these groups of statements are called transactions. As such, transactions
    cannot be inserted or deleted – they are either committed (saved in your database)
    or rolled back (restored to a previously defined state within your database.)


    ### Factors Breaking DML Queries in MySQL


    When it comes to understanding what breaks your queries, it’s crucial to come
    back to the basics: remember what I told you in the last chapter? Queries are
    tasks that are composed of other tasks. To make their performance faster, make
    the execution of those tasks faster or eliminate those tasks. That’s a piece of
    advice you can give to any developer who complains about inadequate query performance.


    This piece of advice is a very good starting point – when you start to delve deeper
    into what it means, you start to understand what hinders and breaks your queries,
    and once you understand what hinders your queries from reaching their goal, you
    can start squashing problems.


    Tasks are pieces of work that need to be accomplished to reach a goal. That goal
    differs depending on what query is in use: `INSERT` queries add data into tables
    in a database, `UPDATE` queries update the necessary columns in a table, and so
    on. Each query has a goal – a goal that you will have trouble achieving if your
    queries are broken.


    Take the following table depicting messages sent between users.


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Table used for demonstration purposes


    The table itself is nothing unusual – it’s a simple table depicting sent and received
    messages with a timestamp. Tables with structures given above are a very common
    occurrence in various content management systems.'
