- fmt: "## Introduction\n\nSome of these questions may seem a little weird – for example,\
    \ look at question number 5. “Why would it even matter if I create indexes anew\
    \ or modify data within an existing table?” – you ask. Answers to these questions\
    \ matter because behind each of them is hidden the functionality of your database:\n\
    \n1.  Your use case depicts what type of index may be necessary for you to use.\n\
    2.  The size of your data set dictates whether indexing makes sense in the first\
    \ place.\n3.  The amount of available disk space and other specifics dictate whether\
    \ indexing is an option, and if it is, directs you to a type of index.\n4.  Previous\
    \ experience may help you overcome obstacles related to indexes.\n5.  Creating\
    \ tables anew means that your database won’t need to make a copy of the table\
    \ on the disk – altering an existing table means that your database will make\
    \ a copy of the table, copy all of the data there, perform all of the necessary\
    \ operations, and swap the two tables.\n\nNo matter what the answers to these\
    \ questions are, if you decide to index, you will have to index columns in a proper\
    \ way to help your database and the queries within and when you do decide to use\
    \ indexes, the first question you need an answer to will be *what to index*.\n\
    \n## What and When to Index?\n\nContrary to popular belief, deciding what and\
    \ when to index is pretty easy: index the column accessed by your query if that\
    \ column necessitates your query to read through a lot of data, and index once\
    \ you want to give your query a pointer to the data to quickly find records.\n\
    \nTo get a concrete answer, look at your use case and take a step back. What happened\
    \ to make you realize that an index on a specific column may be an option? Most\
    \ of you will answer “The speed of queries reading data wasn’t satisfactory.”\
    \ Bingo. And what speed will be considered satisfactory for your use case? Most\
    \ of you won’t require queries to complete in 0.00001s., but anything below a\
    \ second would be awesome. Great – indexes are up to the task.\n\nBefore defining\
    \ indexes on any column, look at the problematic query: it’s slow because it accesses\
    \ a lot of data, so make it access only the data that’s necessary. Do that by:\n\
    \n*   **Looking into the types of data that are stored in the table, and especially\
    \ the column you want to index.** The data types of specific columns tell you\
    \ more than you can imagine; some data types aren’t suitable to be indexed to\
    \ begin with.\n*   **Selecting only the necessary data by swapping `SELECT *`\
    \ for `SELECT column`.** That way you will be able to limit the number of rows\
    \ that are accessed and, thus, acted on.\n*   **Limiting the number of rows your\
    \ query needs to access with `LIMIT` or `OFFSET` clauses.** If swapping `` `SELECT\
    \ *` `` for `` `SELECT column` `` doesn’t work, try using the `LIMIT` clause.\n\
    *   **Decluttering the query.** If selecting necessary data and limiting the number\
    \ of results doesn’t work, try decluttering the SQL query. Split the SQL query\
    \ and inspect it “part by part”: since all parts of your SQL query ask for something\
    \ from the database, it may be wise to inspect what part of your query does what.\
    \ For example, inspect the part of the query after the `UNION` clause if one is\
    \ present: what data does it access and why? Remember the tips from the previous\
    \ chapters.\n\nAfter you have a good faith belief that you understand the types\
    \ of data that power your columns and your query is accessing a limited set of\
    \ data (I’ve told you to do that because when indexes are in place, your queries\
    \ will further tighten the scope of data that is being accessed thus improving\
    \ speed), look at the columns that are being accessed after the `WHERE` clause\
    \ – those are the columns you need to index.\n\nYou will find a couple of examples\
    \ below:\n\n1.  ```sql\n    SELECT `regdate`, `activated` FROM `users` WHERE `user_id`\
    \ = User Input;\n    ```\n2.  ```sql\n    SELECT * FROM `demo_data` WHERE `message`\
    \ = \"User Input\";\n    ```\n3.  ```sql\n    SELECT * FROM `demo_data` WHERE\
    \ MATCH(message) AGAINST(\"User Input\");\n    ```\n4.  ```sql\n    SELECT `message_id`\
    \ FROM `demo_data` WHERE `message` LIKE \"User Input%\";\n    ```\n5.  ```sql\n\
    \    SELECT `car_brand`, `available_amount` FROM `demo_shop` WHERE `car_dealership`\
    \ = \"User Input\" AND `car_brand` != \"User Input (Checkbox)\";\n    ```\n6.\
    \  ```sql\n    SELECT * FROM `demo_shop` WHERE `car_brand` = \"User Input\" UNION\
    \ SELECT * FROM `another_shop` WHERE `car_brand` = \"User Input\";\n    ```\n\n\
    What columns do you index and how?\n\n1.  An index on the `user_id` column will\
    \ be enough.\n2.  An index on the `message` column will do.\n3.  You will need\
    \ a full-text index on the `message` column.\n4.  An index on the `message` column\
    \ will be up to the task as long as the wildcard character (“%”) is at the end\
    \ of the search statement.\n5.  This query would need two indexes: one on the\
    \ `car_dealership` column, and another on the `car_brand` column. Queries with\
    \ the “not equal to” (“!=”) sign use indexes too!\n6.  This query would need two\
    \ indexes on two columns between two tables. One index will need to be defined\
    \ for the `car_brand` column in the `demo_shop` table, and the same query will\
    \ necessitate the use of another index on the same column in the table titled\
    \ `another_shop`.\n\nSo many nuances to consider! That’s why indexes are so interesting\
    \ – and so powerful. However, something this powerful and shiny necessitates the\
    \ existence of preconceived notions, and to properly define and work with the\
    \ indexes within your database, you will need to walk yourself through them too.\n\
    \n## Indexing Myths, Misconceptions, and Fragmentation Issues\n\nAs far as myths\
    \ go, there’s no shortage of them. Not every engineer on StackOverflow will be\
    \ correct, not every lecturer will help you in university, and not every colleague\
    \ at work may interpret things correctly either. People understand things from\
    \ their point of view – the same can be said about indexes. Some indexing advice\
    \ may *sound* fair and reasonable, but when you dig in, you quickly understand\
    \ that it’s not the case. Here are a couple of simple examples:"
  raw: 'Some of these questions may seem a little weird – for example, look at question
    number 5\. “Why would it even matter if I create indexes anew or modify data within
    an existing table?” – you ask. Answers to these questions matter because behind
    each of them is hidden the functionality of your database:


    1.  Your use case depicts what type of index may be necessary for you to use.


    2.  The size of your data set dictates whether indexing makes sense in the first
    place.


    3.  The amount of available disk space and other specifics dictate whether indexing
    is an option, and if it is, directs you to a type of index.


    4.  Previous experience may help you overcome obstacles related to indexes.


    5.  Creating tables anew means that your database won’t need to make a copy of
    the table on the disk – altering an existing table means that your database will
    make a copy of the table, copy all of the data there, perform all of the necessary
    operations, and swap the two tables.


    No matter what the answers to these questions are, if you decide to index, you
    will have to index columns in a proper way to help your database and the queries
    within and when you do decide to use indexes, the first question you need an answer
    to will be *what to index*.


    ## What and When to Index?


    Contrary to popular belief, deciding what and when to index is pretty easy: index
    the column accessed by your query if that column necessitates your query to read
    through a lot of data, and index once you want to give your query a pointer to
    the data to quickly find records.


    To get a concrete answer, look at your use case and take a step back. What happened
    to make you realize that an index on a specific column may be an option? Most
    of you will answer “The speed of queries reading data wasn’t satisfactory.” Bingo.
    And what speed will be considered satisfactory for your use case? Most of you
    won’t require queries to complete in 0.00001s., but anything below a second would
    be awesome. Great – indexes are up to the task.


    Before defining indexes on any column, look at the problematic query: it’s slow
    because it accesses a lot of data, so make it access only the data that’s necessary.
    Do that by


    *   **Looking into the types of data that are stored in the table, and especially
    the column you want to index.** The data types of specific columns tell you more
    than you can imagine; some data types aren’t suitable to be indexed to begin with.


    *   **Selecting only the necessary data by swapping** **SELECT *** **for** **SELECT**
    **column.** That way you will be able to limit the number of rows that are accessed
    and, thus, acted on.


    *   **Limiting the number of rows your query needs to access with** **LIMIT**
    **or** **OFFSET** **clauses.** If swapping `SELECT *` for `SELECT column` doesn’t
    work, try using the `LIMIT` clause.


    *   **Decluttering the query.** If selecting necessary data and limiting the number
    of results doesn’t work, try decluttering the SQL query. Split the SQL query and
    inspect it “part by part”: since all parts of your SQL query ask for something
    from the database, it may be wise to inspect what part of your query does what.
    For example, inspect the part of the query after the `UNION` clause if one is
    present: what data does it access and why? Remember the tips from the previous
    chapters.


    After you have a good faith belief that you understand the types of data that
    power your columns and your query is accessing a limited set of data (I’ve told
    you to do that because when indexes are in place, your queries will further tighten
    the scope of data that is being accessed thus improving speed), look at the columns
    that are being accessed after the `WHERE` clause – those are the columns you need
    to index. You will find a couple of examples below:


    1.  ``SELECT `regdate`, `activated` FROM `users` WHERE`` **`user_id`** `= User
    Input;`


    2.  ``SELECT * FROM `demo_data` WHERE`` **`message`** `= "User Input";`


    3.  ``SELECT * FROM `demo_data` WHERE MATCH(message) AGAINST("User Input");``


    4.  ``SELECT `message_id` FROM `demo_data` WHERE`` **`message`** `LIKE "User Input%";`


    5.  ``SELECT `car_brand`, `available_amount` FROM `demo_shop` WHERE`` **`car_dealership`**
    `= "User Input" AND` **`car_brand`** `!= "User Input (Checkbox)";`


    6.  ``SELECT * FROM `demo_shop` WHERE`` **`car_brand`** ``= "User Input" UNION
    SELECT * FROM `another_shop` WHERE`` **`car_brand`** `= "User Input";`


    What columns do you index and how?


    1.  An index on the `user_id` column will be enough.


    2.  An index on the `message` column will do.


    3.  You will need a full-text index on the `message` column.


    4.  An index on the `message` column will be up to the task as long as the wildcard
    character (“%”) is at the end of the search statement.


    5.  This query would need two indexes: one on the `car_dealership` column, and
    another on the `car_brand` column. Queries with the “not equal to” (“!=”) sign
    use indexes too!


    6.  This query would need two indexes on two columns between two tables. One index
    will need to be defined for the `car_brand` column in the `demo_shop` table, and
    the same query will necessitate the use of another index on the same column in
    the table titled `another_shop`.


    So many nuances to consider! That’s why indexes are so interesting – and so powerful.
    However, something this powerful and shiny necessitates the existence of preconceived
    notions, and to properly define and work with the indexes within your database,
    you will need to walk yourself through them too.


    ## Indexing Myths, Misconceptions, and Fragmentation Issues


    As far as myths go, there’s no shortage of them. Not every engineer on StackOverflow
    will be correct, not every lecturer will help you in university, and not every
    colleague at work may interpret things correctly either. People understand things
    from their point of view – the same can be said about indexes. Some indexing advice
    may *sound* fair and reasonable, but when you dig in, you quickly understand that
    it’s not the case. Here are a couple of simple examples:'
  trans: "## 引言\n\n其中一些问题可能看起来有点奇怪——例如，看看第 5 个问题。“为什么我重新创建索引或在现有表中修改数据会有影响呢？”——你可能会问。这些问题的答案之所以重要，是因为每个问题背后都隐藏着你的数据库的功能：\n\
    \n1.  你的使用场景描述了你可能需要使用哪种类型的索引。\n2.  你的数据集大小决定了索引是否首先有意义。\n3.  可用的磁盘空间和其他具体条件决定了索引是否是一个选项，如果是，它会指引你选择一种索引类型。\n\
    4.  之前的经验可以帮助你克服与索引相关的障碍。\n5.  重新创建表意味着你的数据库不需要在磁盘上复制该表——而修改现有表意味着你的数据库将复制该表，将所有数据复制过去，执行所有必要的操作，然后交换这两个表。\n\
    \n无论这些问题的答案是什么，如果你决定使用索引，你都必须以正确的方式为列建立索引，以帮助你的数据库和其中的查询。当你决定使用索引时，你需要回答的第一个问题将是*对什么建立索引*。\n\
    \n## 什么以及何时索引？\n\n与普遍看法相反，决定对什么以及何时建立索引其实相当简单：如果你的查询需要读取大量数据，就对你查询访问的列建立索引；并且一旦你想给你的查询提供一个指向数据的指针以快速找到记录，就建立索引。\n\
    \n要得到具体的答案，请审视你的使用场景并退一步思考。是什么让你意识到在特定列上建立索引可能是一个选项？你们大多数人会回答：“查询读取数据的速度不令人满意。”没错。那么，对于你的使用场景，什么样的速度被认为是令人满意的？你们大多数人并不要求查询在\
    \ 0.00001 秒内完成，但任何低于一秒的速度都会非常棒。很好——索引足以胜任这项任务。\n\n在为任何列定义索引之前，请查看有问题的查询：它之所以慢，是因为它访问了大量数据，因此让它只访问必要的数据。可以通过以下方式实现：\n\
    \n*   **查看表中存储的数据类型，特别是你想要索引的列的数据类型。** 特定列的数据类型告诉你的信息远超你的想象；有些数据类型本来就不适合建立索引。\n\
    *   **通过用 `SELECT column` 替换 `SELECT *` 来只选择必要的数据。** 这样，你将能够限制访问的行数，从而限制被操作的行数。\n\
    *   **使用 `LIMIT` 或 `OFFSET` 子句限制查询需要访问的行数。** 如果用 `SELECT column` 替换 `SELECT *`\
    \ 不起作用，可以尝试使用 `LIMIT` 子句。\n*   **简化查询。** 如果选择必要数据并限制结果数量不起作用，可以尝试简化 SQL 查询。拆分\
    \ SQL 查询并“逐部分”检查：由于 SQL 查询的所有部分都向数据库请求某些内容，明智的做法是检查查询的哪一部分做了什么。例如，如果存在 `UNION`\
    \ 子句，请检查该子句之后的查询部分：它访问了什么数据，为什么？记住前面章节的技巧。\n\n在你确信自己理解了驱动列的数据类型，并且你的查询正在访问有限的数据集之后（我之所以告诉你这样做，是因为当索引到位后，你的查询将进一步收紧被访问的数据范围，从而提高速度），请查看\
    \ `WHERE` 子句之后访问的列——这些就是你需要索引的列。\n\n下面你会找到几个例子：\n\n1.  ```sql\n    SELECT `regdate`,\
    \ `activated` FROM `users` WHERE `user_id` = 用户输入;\n    ```\n2.  ```sql\n    SELECT\
    \ * FROM `demo_data` WHERE `message` = \"用户输入\";\n    ```\n3.  ```sql\n    SELECT\
    \ * FROM `demo_data` WHERE MATCH(message) AGAINST(\"用户输入\");\n    ```\n4.  ```sql\n\
    \    SELECT `message_id` FROM `demo_data` WHERE `message` LIKE \"用户输入%\";\n  \
    \  ```\n5.  ```sql\n    SELECT `car_brand`, `available_amount` FROM `demo_shop`\
    \ WHERE `car_dealership` = \"用户输入\" AND `car_brand` != \"用户输入（复选框）\";\n    ```\n\
    6.  ```sql\n    SELECT * FROM `demo_shop` WHERE `car_brand` = \"用户输入\" UNION SELECT\
    \ * FROM `another_shop` WHERE `car_brand` = \"用户输入\";\n    ```\n\n你要索引哪些列以及如何索引？\n\
    \n1.  在 `user_id` 列上建立索引就足够了。\n2.  在 `message` 列上建立索引即可。\n3.  你需要一个在 `message`\
    \ 列上的**全文索引**。\n4.  只要通配符（“%”）位于搜索语句的末尾，在 `message` 列上建立索引就能胜任这项任务。\n5.  这个查询需要两个索引：一个在\
    \ `car_dealership` 列上，另一个在 `car_brand` 列上。带有“不等于”（“!=”）符号的查询也会使用索引！\n6.  这个查询需要在两个表中的两个列上建立两个索引。需要为\
    \ `demo_shop` 表中的 `car_brand` 列定义一个索引，并且相同的查询将需要在名为 `another_shop` 的表中的同一列上使用另一个索引。\n\
    \n这么多细微差别需要考虑！这就是为什么索引如此有趣——也如此强大。然而，如此强大和闪亮的事物必然伴随着先入为主的观念，为了正确定义和操作数据库中的索引，你也需要亲自梳理一遍这些观念。\n\
    \n## 索引的迷思、误解与碎片化问题\n\n关于迷思，可谓层出不穷。Stack Overflow 上的每个工程师并不总是正确的，大学里的每位讲师也不总能帮到你，工作中的同事对事物的理解也可能有误。人们从自己的角度理解事物——对于索引也是如此。一些索引建议可能*听起来*公平合理，但当你深入探究时，会很快发现事实并非如此。这里有几个简单的例子："
- fmt: '| Advice | Explanation |

    | --- | --- |

    | *“The more indexes on your table, the better for your database.”* | **False**
    – performance is obtained when indexes are *used* by your database and once your
    database is configured properly, and whether they are used or not depends on your
    queries. |

    | *“Indexing only makes sense for simple `SELECT` queries.”* | **False** – in
    fact, indexing makes sense for complex queries too. All you have to do is use
    the `EXPLAIN` clause to understand whether MariaDB is making use of a given index.
    |

    | *“B-Tree indexes will make all `SELECT` queries perform faster.”* | **False**
    – the reason multiple types of indexes exist in the first place is that each index
    type helps developers in specific situations that differ from one another. Indexes
    can only help your database if they are used, too. |

    | *“Indexing once is enough – indexes don’t require maintenance or upkeep.”* |
    **False** – the more fragmented your index is, the less it will be able to help
    your database. Fragmentation means that something is up – index pages are no longer
    in order or there is a lot of free space in the data pages. |

    | *“If indexing doesn’t help performance, nothing else will.”* | **False** – indexes
    are not a magic pill, and for them to help, you have to consider many other things
    like the structure of your queries, the traffic toward your application, data
    types and collations, partitions, and the configuration of your database. Use
    indexes in conjunction with other performance optimization tips: not as a bandaid
    for all of your performance problems. |

    | *“Using an index on a column will make inserting data into that column unfathomably
    slow.”* | **False** – while it’s true that indexes slow down `INSERT` queries,
    not all queries that insert data will dive into the ground because indexes are
    in use. Sometimes, you won’t even notice a performance difference – problems often
    appear when we have a lot of data in a column that’s indexed and we want to insert
    some more data, and even then, there are ways around this problem. |


    Ever heard of one or more of these? I’m sure you did. Myths come into the scene
    not because developers are stupid – far from it – but because they’ve done something
    or heard of something that produced certain results when indexes are in use.


    Indexes are delicate, and for them to help your queries succeed, they need to
    act as an anchor for your queries – anchors may not provide necessary results
    because they’re not fulfilling their purpose or they may become duller as they’re
    used and may necessitate updates or a replacement.


    As you work on a database day by day, you’re sometimes forced to update, delete,
    or insert data into a column that has an index. Some of us do it so often that
    we don’t even notice the index in the first place – such frequent maintenance
    of our tables and the columns within can take a toll on our indexes. Indexes are
    affected when we perform any action on the column in question, and some actions
    affect them more heavily than others do.


    I’ve heard of a situation where a DBA has been asked to look into query performance
    that’s been diving into the ground despite no changes being made to the database
    in recent times. The query performance issue seemed to appear out of thin air
    without any apparent reason – upon inspection, the DBA noticed that the query
    was making use of an index, and rebuilding the index fixed the performance issue.
    This is why indexes, as with everything else within your database, need upkeep.
    “That must’ve been a bug with the index or something,” some of you say. No, it
    wasn’t – *the problem lied within frequent updates to data within an indexed column
    and thus, index fragmentation over time.* To know whether your index is fragmented,
    look at its size: if the size is bigger than it “should” be, you’ve got problems
    on your hands.


    Fragmentation comes in multiple colors: there is internal fragmentation and external
    fragmentation, meaning that either the database pages are not fully packed with
    data or the data pages within the index are scattered and may not be in order.
    When either of those things happens, queries still use the indexes, but they may
    slow down because they will be accessing more data than necessary.


    If your index is making a difference in query performance, you need it: and if
    you need it, sometimes you’re going to need to care for it. Think about a fragmented
    index as a book with some of its pages dipped in water: it’d be uncomfortable
    to touch, hold, and read, and the first thing that would be on your mind would
    be to dry those pages up or, in this case, *defragment the index*. Index defragmentation
    is often easy to accomplish and can be done by issuing `ALTER TABLE` queries into
    the void like so:


    ```

    ALTER TABLE `demo_table` ENGINE = InnoDB;

    ```


    Alternatively, you always have an option of rebuilding the table by dropping and
    re-loading the data into it altogether.


    No matter what approach you take, remember that drying pages are only one piece
    of the puzzle – a puzzle that starts with your hardware at the forefront.


    ## 硬件、数据库与索引


    If there’s one thing all indexes have in common is that they all take up space
    on the disk. They all come with a cost – a cost of time to add them to the database,
    a cost to your hard drive, and a cost to your queries.


    This cost has a humble beginning – it all begins with the hardware within your
    server. You have indexes on a column because you have a database, and you have
    a database because you have a server – remove the hardware, and your whole application
    will come crashing down.


    Indexes are renowned for putting a strain on your hardware – it doesn’t matter
    what kind of processor, hard drive, or bandwidth allocation you work with, indexes
    are a specific appliance that “mounts” on your column, and the column “mounts”
    on the disk. Thus, no matter what index type you find yourself using, some of
    its functionality will be directly dependent on the internals of your server.


    Many of us don’t think of this side of indexing. It wouldn’t be fair to blame
    the developers – after all, they’re only doing their work and applying advice
    gained through documentation of the tools in question or practical experience.


    Explore the DBA section of StackOverflow as an example, and you will quickly find
    questions like “My query is slow, how do I…,” “blocking certain queries from being
    visible in the slow query log,” “reorganizing or rebuilding indexes,” and the
    like, and once you glance at the answers, many developers suggest either rebuilding
    queries, looking into column datatypes, or looking at the documentation – some
    offer you to glance into the configuration of your database, but your hardware
    is a rare reminder. Great hardware should be a given already, right? *Everything
    concerns your hardware* – from the software you run to the PHP version to the
    indexes on a column on a table you barely remember the name of. That’s why choosing
    hardware is a task that shouldn’t be overlooked. If you want your database to
    complete tasks necessary for your use case, you will need to run adequate hardware.


    Coming back to indexes, keys have a special place in the heart of your database.
    For most of you, they’re companions, but when things turn sour, they’re often
    the first ones to blame. They’ve been around for ages and most of their concepts
    don’t change – they’re often taking the blame because the hardware behind your
    database is not equipped to deal with them.'
  raw: '| Advice | Explanation |

    | --- | --- |

    | *“The more indexes on your table, the better for your database.”* | **False**
    – performance is obtained when indexes are *used* by your database and once your
    database is configured properly, and whether they are used or not depends on your
    queries. |

    | *“Indexing only makes sense for simple* *SELECT* *queries.”* | **False** – in
    fact, indexing makes sense for complex queries too. All you have to do is use
    the `EXPLAIN` clause to understand whether MariaDB is making use of a given index.
    |

    | *“B-Tree indexes will make all* *SELECT* *queries perform faster.”* | **False**
    – the reason multiple types of indexes exist in the first place is that each index
    type helps developers in specific situations that differ from one another. Indexes
    can only help your database if they are used, too. |

