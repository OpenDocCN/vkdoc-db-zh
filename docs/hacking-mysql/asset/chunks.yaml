- fmt: '### Using the WHERE, OFFSET, and LIMIT clauses


    Those clauses will let you minimize the work your database has to do to complete
    the update query.


    ### Staying alert about the load on your database


    Updating data at 2 AM will likely be a better option than updating the data within
    your tables at peak usage times.


    That’s it, really – in most use cases, standard practices are golden. Your `UPDATE`s
    are likely to be a little slow if you’re running updates on bigger data sets,
    and you will have to wait depending on how big your InnoDB buffer pool is – I’m
    not promising that if you follow all of the advice I give you they will complete
    in milliseconds – but they will not put as big of a strain on your database and
    their speed will remain reasonable given the amount of rows in your database.


    If you find yourself using `MyISAM` (that may be a necessity for those of you
    counting rows in a table – I’ll get into how storage engines interact with big
    data sets in a second), you may also want to look into the `key_buffer_size` within
    the storage engine.


    ### Deleting Big Data From MariaDB


    As far as deleting goes, `DELETE` queries don’t change either. Yes, deleting big
    chunks of data is likely to be painful, and that pain will only corroborate on
    partitions or indexes – that’s why it’s important to keep things simple and avoid
    performing many operations at once: things may get a little difficult if you’re
    performing CRUD operations and counting or providing your database with another
    task at the same time – those operations will take some time, but again, even
    if they do, you can put all of the necessary SQL queries into a file and “feed”
    your database with the file for it to run the queries and return results in text
    files or something like that.


    When deleting big data sets, keep in mind that such operations are not a piece
    of cake for MariaDB: deleting 1,000,000 rows may be a task your database would
    take on, but I’d lie if I said that deleting 50,000,000 rows from MariaDB is easy
    – truth be told, deleting that many rows may as well be game over for your database
    (I’ve heard you like partitions and indexes too…), *but not for Linux*.


    In this realm, queries like `sed` or `sort` will be much, much faster than standard
    SQL counterparts, they will act on raw data files meaning that those files will
    be smaller in size, and best of all, they will not require much of a strain for
    your PC or server – you won’t need a NASA-level infrastructure to complete tasks.
    What if instead of `DELETE FROM demo_table WHERE column = string;` you would export
    the raw data (even the data within that specific column) from your database with
    `SELECT … INTO OUTFILE`, then used something like `sed -i /string/d data.txt`?
    Yes, perhaps you would wait for 10–15 minutes – operations would still need to
    be completed – but 10 minutes isn’t a week: `-i` would modify the file without
    showing the results via the CLI, `d` would instruct `sed` to delete data, `string`
    would be the string you need to delete, and `data.txt` refers to the file name
    of your file.


    `sort -u` (a sort operation with a unique flag) would replace the need for a unique
    index too: exporting raw data, then running a `sort -u` query on the file you’ve
    received from your database would drop duplicates within minutes, not days.


    Finally, if you need to delete all rows within a table, keep in mind that queries
    like `TRUNCATE TABLE table_name` will be significantly faster than `DELETE` queries.


    Removing indexes and partitions will take a while regardless unless you use `MyISAM`
    – if you use `MyISAM`, you’re free to delete the `.MYI` file(s) associated with
    your table and the index related to that specific table will be gone for good
    unless the file is re-instated. That’s only one upside of using different storage
    engines for bigger data sets.


    ### Storage Engines and Big Data


    Remember storage engines? I’ve covered them in the second chapter of this book.
    MySQL is almost unique in the aspect that it allows us to choose from multiple
    storage engines for our use case – PostgreSQL supports only one storage engine
    conveniently named “PostgreSQL,” MongoDB and other database management systems
    do offer more choices, but rarely choices are as extensive as with MySQL. And
    with MySQL having a couple of flavors including MariaDB and Percona Server, our
    choices are even wider.


    Most of those of you using MariaDB will make use of `InnoDB` – it’s the primary
    storage engine offered by the relational DBMS – but there are other options, too.
    One of those options is MariaDB ColumnStore – a storage engine leveraging the
    benefits of columnar storage within MariaDB. By using the benefits provided by
    columnar storage, MariaDB is able to avoid storing data like so:


    | ID    | Name              | Position                 |

    | ----- | ----------------- | ------------------------ |

    | 52777 | Josh Doe          | Head of Marketing        |

    | 52778 | John Surnamey     | Marketing Manager        |

    | 52779 | Alissa Surname    | Influencer Marketing Manager |

    | …     | …                 | …                        |


    And store data like so instead:


    | 52777 | 52778 | 52779 |

    | ----- | ----- | ----- |

    | Josh Doe | John Surnamey | Alissa Surname |

    | Head of Marketing | Marketing Manager | Influencer Marketing Manager |

    | … | … | … |


    The method of storing data – and, consequentially – the storage engine you will
    need to access bigger data sets – is directly dependent on your specific data
    access pattern.


    Row-based databases and storage engines such as `InnoDB` are ideal for transactional
    processing that involves running online transaction processing (`OLTP`) queries
    and accessing data by rows, while column-based databases are based on the `OLAP`
    – Online Analytical Processing – model. MariaDB’s ColumnStore will also always
    be `ACID`-compliant and provide the ability for online schema changes, high availability,
    and come with a version buffer that will be used to roll back transactions, store
    data that is being modified, etc.


    MariaDB will also provide all of you with the option to stay with the “vanilla”
    storage engines available within itself which means that choosing columnar storage
    is an option, not a necessity. That also means that you can force MariaDB to fold
    to your needs – not the other way around.


    One of those needs may have to do with `ACID` compliance – a basic concept for
    many database management systems and the reliable guard of your database and the
    data within.


    ### ACID and Big Data


    One aspect that’s going to be of crucial importance when you find yourself dealing
    with big data within any database management system is the consistency and durability
    of your data. The last thing you want is your customers/users complaining about
    data being corrupt, inaccessible, or impossible to work with, right?


    MariaDB has a solution – `ACID`. Most of you know what it is and how it works
    and I’ve mentioned it throughout this book already, but as your data gets bigger,
    this concept could become more and more important. Some of you may come to the
    point where you’d ask yourself *does your database even need `ACID`?* Maybe. Maybe
    not. I’m aware of cases where engineers would turn off `ACID` compliance to experiment,
    forget that they’ve done so, and leave the speed trade-off running for weeks,
    even months. Did their database being speedy, but not being `ACID` compliant burn
    their data down? No – turning `ACID` off won’t necessitate the end of your database
    as long as you understand what you’re doing.'
