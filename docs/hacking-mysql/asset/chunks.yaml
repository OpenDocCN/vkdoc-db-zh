  trans: '

    你的数据库需要帮助：这里说的帮助，并非指心理治疗，而是指你将对服务器工作原理的理解付诸实践，以协助数据库执行所需操作。试想一下——如果你在一台拥有`64GB`运行内存、容量为
    TB 级的磁盘驱动器的专用服务器上，使用默认设置构建一个基于数据库的应用程序，这真的有用吗？答案显而易见——没用。但在你急于配置一台性能极其强大的服务器之前，首先你必须明白哪些方面可以优化，而哪些应该保持原样。这正是你的数据库配置发挥作用的地方——对于一些人来说，优化的好处是显而易见的，这类人甚至可能在数据库正式投入使用前就进行优化；但更多人则被一个迫切的问题所困扰：我到底为什么要为
    MySQL 优化我的服务器？


    ## 为何要为 MySQL 优化你的服务器？


    “我为什么要为 MySQL 优化我的服务器？”毕竟，你的服务器是一台性能强劲的“猛兽”，而`MySQL`在默认状态下也能运行无误，不是吗？你并没有遇到任何停机或延迟，也许你已经运行`MySQL`一段时间了，也没有注意到任何查询运行缓慢的情况，那为什么还要优化呢？


    我敢打赌，你内心深处已经知道答案——你需要为`MySQL`优化你的服务器，因为如果它是你主要使用的数据库管理系统，那么它很可能支撑着你应用程序`110%`的运行。它是你应用程序的支柱，如果数据库出了问题，所有人都会受到影响：使用你应用程序的用户、付费的客户、访客、开发应用程序的开发者、你自己，甚至你的会计都可能会打电话来问：“发生什么事了？税务局无法访问你的网站进行检查。”是的，黑客们也会遇到麻烦，但你不该感到高兴——去黑一个本身就无法正常工作的东西，有什么意义呢？


    再想想城堡——你在它周围加固安全措施，是为了让不法之徒更难进入。你需要提前这样做，因为如果敌人正向城堡进军，防御工事需要尽可能长时间地将他们阻挡在远处。在遭受攻击时才开始加固城堡不是个聪明的主意，因为你很可能会被消灭——防御工事无法提供`100%`的保证让你不被消灭，但它们肯定能为你赢得一些时间，以便你为接下来可能发生的事情做准备。


    现在回到你的数据库：你需要提前优化，以帮助使用你应用程序的用户获得尽可能流畅的体验。如果你在使用搜索引擎，你知道它每天要处理多少次搜索吗？`10`次？`100`次？也许是`10,000`次？你可以推测，但不可能事先知晓。这就是优化的用武之地——你需要权衡所有参数，以确保无论运行`10`、`100`还是`10,000`次查询，你的数据库都能平稳运行。一个经过适当优化的数据库能防止你的`A
    计划`失败——而如果你的`A 计划`足够好，`B 计划`就没有必要了。


    当然，你已经知道有很多人愿意给你优化建议——这不是坏事，但在采纳之前，你需要`100%`确定建议的可信度，而要确定这一点，没有比自己了解一些优化秘诀更好的方法了。了解优化之道并不意味着你不再需要建议——它意味着你将有一个良好的基础来判断哪些是可信的，哪些不是。


    要正确地为`MySQL`优化你的服务器，你首先需要选择一台好的服务器。这就引出了第一个难题——什么使一台服务器成为“好”服务器？随之而来的是更多的问题——你怎么知道你的`用例`需要多少运行内存？你怎么知道你需要`AMD`还是`Intel`处理器？如何预估多少硬盘空间才算足够？这源于经验。你知道为什么你的同事看了一眼服务器列表，就在`3`分钟内提出了一个似乎面面俱到的解决方案吗？他在这个领域经验丰富。很多人也几乎不假思索地选择服务器，原因也是一样——经验。


    获取经验相对容易。错误几乎无需成本就能修复，而且许多服务器也可以逐步升级。下面，你将找到一份粗略的指导原则列表，帮助你选择服务器：


    1.  **你之前做过选择吗？** 你是否曾为任何`用例`构建过项目？当时你选择了什么服务器，你的选择明智吗？如果那个决定让你满意，不妨考虑购买类似的服务器，你很可能也不会后悔这次的选择。

    2.  **评估你的用例：** 如果你需要一台新服务器，想想你的应用程序每天会产生/处理多少数据，考虑数据类型和字符集，设想什么样的人会使用你的应用程序，以及你的数据库将支持哪些类型的应用。你计划运行多少个应用？它们会使用什么类型的数据库？并发是否是一个需要考虑的因素？

    3.  **考虑服务器位置和维护需求：** 考虑服务器的位置至关重要——`CDN`有帮助，但如果你的主要客户在美国，在日本部署服务器就不是好选择。你可能还希望选择一台附带维护和保养服务的服务器——随着时间的推移，你很可能会遇到服务器问题（随便问问任何服务器管理员，他们都能讲出恐怖故事），而外包的维护团队能帮助你将头疼的事减到最少。

    4.  **灵活性：** 还要考虑组织提供的服务器是否灵活。如果你计划托管基于大数据的应用，却无法根据需要扩展硬盘，你就会遇到麻烦。

    5.  **预算：** 当然，一切都归结于财务问题。你很可能有一个预算，预算越小，你需要承受的压力就越大。较小的预算可能意味着你的服务器和应用程序可能需要离线一段时间，以承受较少的流量。在这种情况下，将预算扩大到每月数千美元也不明智——试着在选择之前研究服务器（及其公司），向同事寻求选择帮助，或直接与托管服务提供商沟通，以找到一个平衡点。支持渠道的存在是有原因的——好好利用它们！


    还没做决定？别担心——一旦你了解了影响`MySQL`的常见服务器问题，知道如何移除限制`DBMS`性能的障碍，并将你的数据库管理系统配置为充分利用服务器内部的`I/O`能力及其他强大功能，你就能轻松选择服务器组件了——到那时，你将能够充分利用`InnoDB`或（如果你使用`Percona
    Server`）`XtraDB`中的`ACID`特性，你的数据库也将迈向繁荣的未来。


    ## 影响 MySQL 的常见网络服务器问题


    你知道你的应用程序、数据库和服务器有什么共同点吗？问题！这些问题正是客户投诉、查询运行缓慢甚至停机的主要原因。有些问题会直接影响你的数据库，有些则不会，但请确信——所有问题都会发出它们存在的警报。还记得`MySQL`中的错误吗？一旦你看到它们，请确信——肯定有地方出错了。

    '
- fmt: '# MySQL 性能陷阱与基础设施规划


    所有 MySQL 错误都会提醒你数据库内部正在发生的一些事情，有些甚至不会放过你的服务器。犯错是难免的，但要确保你的错误不是下面列出的这些——如果被利用，其代价可能难以承受：


    *   **运行过时、陈旧的软件版本**：这个问题会影响一切：运行旧版本的 PHP，你就无法在 WordPress 中升级插件；不升级 WordPress
    插件，你就有被黑客攻击的风险。如果你发现自己说“WordPress 只是我网站上的一个博客，我不需要太在意”，那你就是在自找麻烦。我甚至不想提你的整个基础设施会暴露在何种恶劣的安全漏洞之下！你的数据库很快就会变成你最不担心的问题。


    *   **避免优化你的应用程序**：如果应用程序使用不当，会消耗大量资源。首先，如果你的 Apache 配置不当，很可能会产生许多不必要的进程。如果你发现自己使用像
    `mod_security` 这样的设备作为防火墙，请记住它也消耗资源——为什么不寻找基于代理服务器的替代方案，比如 CloudFlare 或 Sucuri？见鬼，你甚至可以自己构建一个防火墙，而且并不那么复杂——我就构建过一个，而且当时我对安全了解并不多！


    *   **避免使用 CDN，导致服务器过载**：CDN 提供商将部分流量转移到自己身上：通过它们提供 CSS 或 JS，避免给数据库带来负载。像 CloudFlare、Sucuri
    和 Imperva 这样的提供商以其能够保护你的整个基础设施（无论大小）免受 DDoS 攻击而闻名。DDoS 攻击发生的频率比你想象的要高——甚至一个小孩子也可以使用他从网上找到的脚本或根据教程制作的脚本开始攻击你的整个基础设施。忽略了
    CDN？那就得面对后果。


    *   **磁盘空间不足**：这是一个大问题，即使你确信自己有大量磁盘空间，它也可能出现；一切都可能变化得非常快——想想 `ALTER` 查询。这些查询会在磁盘上创建表的副本；除非你密切关注驱动器并留意
    `ALTER` 查询的进度，否则你不会“看到”这一点。如果你发现自己要为一个大表添加索引，请务必 300% 确定你有足够的磁盘空间——至少以表的大小再加上
    20-30% 的可用空间作为目标。当然，如果你陷入困境，有办法避免在更新数据时耗尽磁盘空间——我会引导你了解这些方法——但请时刻牢记可用磁盘空间的数量。


    *   **没有备份策略**：备份数据至关重要。无论你如何备份宝贵的数据，都必须确保备份可靠且对数据库的影响最小：在凌晨 1 点备份数据可能比在下午 1 点备份影响更小，并且一定要正确地测试你的备份。不时恢复你所做的备份——所有数据是否按你预期的方式恢复了？恢复过程如何？一旦灾难发生，你备份（或忘记备份）的数据很可能将是你的第一道防线。


    一旦你发现上述一个或多个问题，回头看看你的服务器——你确定磁盘空间没快用完吗？你的 CPU 状态如何？你给缓冲池分配了多少操作内存？还记得为服务器的内部进程留出一些内存吗？我们之所以没有直接跳到性能优化——或者很多人喜欢称之为调优——是因为，如果你不了解你的服务器就去调优数据库，你的应用程序将会崩溃。它会不堪重负并崩溃，因为那样的话，你就不知道该向你的数据库要求什么，而由于不知道如何帮助你，你的数据库无论被要求做什么都将无法胜任。从那时起，一切都螺旋式下降，因此忽视任何出现的问题，无论大小，都是不明智的：即使是最小的问题，如果被忽视，也可能毁掉你数据库的未来。一切都归结于基础设施，一旦你确定了如何避免限制数据库性能，你就可以自由选择方向，而无需担心性能、安全或可用性影响。在错误盯上你之前，先关注错误。


    ## 什么限制了 MySQL 的性能？


    与普遍看法相反，限制数据库性能的首要因素不是你编写查询的方式——当然，你可能会忘记这里或那里的几个索引，或者在一个普通的 `LIMIT` 就足够的地方重复造轮子，但这并不是限制你数据库性能的原因——至少这不是罪魁祸首。


    你的数据库性能受其设置的限制——而这些设置直接依赖于你的服务器能力。这就是为什么正确选择服务器对每个参与者都至关重要：服务器可能成为高负载数据库的瓶颈，但也可能严重性能过剩。选择一个折中方案，然后进行优化。不，你不需要是个天才系统管理员才能选择合适的装备——搜索引擎在
    MariaDB 上存储了超过 100 亿行数据，并在毫秒内完成搜索，而无需借助最新的 NVMe 驱动器或其他顶级装备，所以一切皆有可能。


    即使是一台旧服务器也能从 MySQL 中挤出令人印象深刻的性能——这完全取决于你的数据库优化程度。当然，你的应用程序也有发言权：如果你想在野外生存（数据泄露会发生，你需要做好准备），你需要遵循最佳的编码和安全实践。但如果你不是使用
    Laravel 来构建应用程序，而是自己动手凑合，或者发现自己在使用一台旧 VPS 并且无力升级，也并非毫无希望。


    ## 选择服务器和硬盘


    在选择服务器时，从我之前提到的事情开始：审视你以前的选择，仔细评估你的用例，考虑服务器的位置和维护、灵活性以及预算。这些将为你提供一个关于可以考察哪些服务器的粗略轮廓——它们将定义你是需要共享服务器、VPS
    还是专用服务器，而你的用例将决定服务器中必须包含哪些组件才能让你的应用程序正常运行。你的服务器承载着数据库，然后通过 `my.ini` 或 `my.cnf`（取决于你使用的操作系统）进行配置。设置也可以通过命令行指定，但基本原则是相同的——设置将帮助你的数据库与服务器协同工作以实现你的目标。


    无论你是使用 MySQL 还是其他数据库管理系统，服务器始终是数据库的限制因素。只有当数据库配置为利用服务器中可用的组件时，它才能表现良好——而在数据库方面的一个主要限制点就是硬盘及其
    I/O 能力，以及你的 CPU。'
  raw: 'All MySQL errors will alert you of something happening inside of your database,
    and some won’t forget your server either. Making mistakes is inevitable, but ensure
    that your mistakes aren’t the ones listed below – the price if they’re exploited
    can be too much to bear:


    *   **You’re** **running old, outdated versions of software**: This one will affect
    everything: run an old version of PHP, and you won’t be able to upgrade plugins
    in WordPress; don’t upgrade plugins in WordPress, and you will risk getting hacked.
    If you find yourself saying “WordPress is only a blog on my website so I don’t
    need to pay much attention,” you are asking for trouble. I won’t even mention
    what kind of nasty security flaws your entire infrastructure would be exposed
    to! Your database would quickly become the least of your worries.


    *   **You** **avoid optimizing your application**: If your application is used
    badly, it can consume a lot of resources. I’ll begin with the fact that if your
    Apache configuration is configured badly, you’re likely to end up with many unnecessary
    processes. In case you find yourself using an appliance like `mod_security` for
    a firewall, keep in mind that it consumes resources too – why not look for proxy
    server-based alternatives like the same CloudFlare or Sucuri? Heck, you can even
    build a firewall yourself and it isn’t that complex – I’ve built one and I didn’t
    know that much about security at the time!


    *   **You avoid using a** **CDN****, and your server gets** **overloaded**: CDN
    providers offload some of the traffic to themselves: serve CSS or JS through them
    and avoid load toward your database. Some providers like CloudFlare, Sucuri, and
    Imperva are known to be able to protect your entire infrastructure, no matter
    big or small, from DDoS attacks too. DDoS attacks happen more frequently than
    you’d think – even a small kid can start attacking your entire infrastructure
    with a script he’d found online or made using a tutorial. Neglected a CDN? Face
    the consequences.


    *   **You’re** **low on disk space**: This is a big one and can arise even if
    you’re confident that you have lots of disk space; it all can change very quickly
    – think of `ALTER` queries. These make a copy of the table on the disk; you won’t
    “see” that unless you’re paying attention to your drives as an `ALTER` query moves
    along, and if you find yourself adding an index to a large table, be 300% sure
    that you will have more than enough disk space – aim for the table size and additional
    20-30% of free space as a minimum. Granted, there are ways to avoid running out
    of disk space when updating data if you’re stranded – I’ll walk you through them
    – but keep the amount of available disk space in mind at all times.


    *   **You don’t have a** **backup strategy**: Backing up data is vital. No matter
    how you back up your precious data, you must ensure that you do so reliably and
    with a minimal impact on your database: backing up data at 1 AM is likely to have
    less impact than backing up at 1 PM, and make sure to test your backups properly
    too. Restore the backups you took from time to time – is all data restored the
    way you expected it to be restored? How did the restoration process go? Once disaster
    strikes, data you backed up (or neglected to back up) will likely be your first
    line of defense.


    Once you see one or more of these issues, glance back at your server – are you
    sure you’re not running out of disk space? How is your CPU doing and how much
    operating memory did you allocate to the buffer pool? Did you remember to leave
    some memory for internal processes of your server? The reason we did not jump
    straight into performance optimization – or tuning as many like to call it – is
    because if you tune your database without understanding your server, your application
    is going to drown. It’s going to be overwhelmed and drown because in that case,
    you wouldn’t know what to ask your database for, and without knowing how to help
    you, your database wouldn’t be up to the task no matter what it’s asked for. Everything’s
    a downward spiral from there, so it would be unwise to neglect any arising issues,
    big or small: even the smallest of issues can destroy the future of your database
    if neglected. Everything comes down to infrastructure, and once you’re sure how
    to avoid limiting the performance of your database, you can feel free to choose
    where to turn to without performance, security, or availability implications.
    Pay attention to errors before errors pay attention to you.


    ## What Limits the Performance of MySQL?


    Contrary to popular belief, the first limiter for your database isn’t the way
    you write your queries – sure, you may forget a couple of indexes here and there
    or invent a bike where an ordinary `LIMIT` would suffice, but that isn’t what
    limits your database performance – at least that’s not the primary culprit.


    Your database performance is limited by the settings of your database – and the
    settings of your database are directly dependent on your server capabilities.
    That’s why properly choosing a server is so vital for everyone involved: a server
    can become a bottleneck for high-load databases, but it can also be a significant
    overkill. Choose a golden medium, and then optimize. And no, you don’t need to
    be a genius system administrator to choose the proper gear – search engines are
    storing upward of 10 billion rows on MariaDB and completing searches within milliseconds
    without resorting to the newest NVMe drives or other cream-of-the-crop gear, so
    everything’s possible.


    Even an old server can squeeze an impressive performance out of MySQL – it all
    depends on how your database is optimized. Of course, your app has a say here
    too: you will need to adhere to best coding and security practices if you want
    to survive in the wild (data breaches happen and you need to be ready), but if
    you’re not using Laravel to build an app and are winging something yourself or
    find yourself using an old VPS and don’t have the means to upgrade, not everything’s
    lost either.


    ## Choosing Servers and Hard Drives


    When choosing a server, start from the things I’ve mentioned before: look at your
    previous choices, carefully evaluate your use case, consider server location and
    maintenance, flexibility, and your budget. These things will provide you with
    a rough outline of what servers you can look at – they will define whether you
    need a shared server, a VPS, or a dedicated server, and your use case will dictate
    the components that must be in place in your server for your app to run properly.
    Your server harbors the database that is then configured via my.ini or my.cnf
    depending on the OS you find yourself using. Settings can also be specified through
    the command line, but the bottom line remains the same – settings will help your
    database work in conjunction with your server to reach your goals.


    A server will always be a limiting factor for your database, no matter if you
    find yourself using MySQL or other database management systems. Your database
    will only perform well if it’s configured to make use of the components available
    in your server – and one of the main limiting points in regard to your database
    is hard drives and the I/O capability that goes through them, as well as your
    CPU.'
