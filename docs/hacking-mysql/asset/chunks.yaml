    10. 如果定义了子分区，则必须通过 `HASH` 或 `KEY` 进行分区。

    11. 从 MySQL 8.4 开始，MySQL 为每个分区使用 130kB 的内存进行缓冲，以提升 `LOAD DATA INFILE` 语句的性能。


    尽管存在这些限制，分区对许多人来说仍然是一个非常有用的助手——通过一个经过良好优化的数据库、查询结构和明智的索引决策，分区将帮助你在读取数据时克服性能负担。


    但在选择分区之前，请权衡你已做出的所有其他决策——检查数据库结构、数据类型和字符集、可能存在于表中任何列上的索引以及其他因素：分区只能作为辅助工具，而非替代工具。如果你使用的是不同风味的
    MySQL（例如 MariaDB 或 Percona Server），也要格外注意服务器中可用的存储引擎：因为分区直接依赖于你所使用的存储引擎，而且由于不同风味的
    MySQL 配备了不同的存储引擎，这些引擎也将允许你对分区执行许多有趣的操作。MariaDB 的用户会了解 `MERGE`、`SPIDER` 和 `CONNECT`：在这个领域中，`SPIDER`
    允许你通过将同一表的分区移动到不同的服务器上来进行数据分片，而 `CONNECT` 则使你能够构建分区使用不同存储引擎的表，即使这些引擎本身可能不支持分区。


    以下是一个使用 `CONNECT` 存储引擎在 MariaDB 中支持分区的示例：

    ```sql

    CREATE TABLE `demo_table` (

    `id` INT(5),

    `account_name` VARCHAR(20) NOT NULL DEFAULT '''',

    `assigned_supportagent` VARCHAR(20) NOT NULL DEFAULT '''',

    key(`account_name`)

    ) ENGINE = SPIDER COMMENT = ''wrapper "mysql", table "demo_table"''

    PARTITION BY RANGE COLUMNS(`account_name`)

    (

    PARTITION `p1` VALUES LESS THAN (''L'') COMMENT = ''Values stored in server Mercury'',

    PARTITION `p2` VALUES LESS THAN (MAXVALUE) COMMENT = ''Values stored in server
    Venus''

    );

    ```

    在这种情况下，所有小于 K（K 在 L 之前）的值都将存储在名为 Mercury 的服务器中，其余的值将存储在名为 Venus 的服务器中。很有趣！不过，我们还有更多要学习的内容。


    ## 总结


    分区是一种将数据库中的表拆分成若干不同表的方法——在底层，你的数据库会将分区视为一堆不同的表，但由于 SQL 层仍会将分区视为一个表，因此你永远无法在任何
    SQL 客户端或 phpMyAdmin 中将你的分区视为单独的表。不过，你会得到诸如 `SHOW TABLES` 或 `SHOW CREATE TABLE`
    等语句的帮助：第一条语句将显示特定表上是否设置了分区，第二条语句将为你提供一个查询，让你能够重建一个带分区的表。


    然而，分区只是蛋糕的一部分，不应随意进行分区——只有在你拥有足够多的数据（比如 1 亿行或更多）来证明其必要性时再进行分区，并且首先确保你对分区内部机制非常熟悉。


    无论你做什么，请记住分区只是与你的表相关的一个环节，而这些表位于包含数据的数据库之后。为避免问题，该数据库需要得到妥善且频繁的备份，而要制定一个合适的备份计划，你也需要为恢复做好规划。来杯咖啡——是时候备份了。


    ## 13. 优化备份与恢复


    你确实在备份，对吧？说真的——备份和恢复流程的存在是有原因的，这个原因与让你作为开发人员或 DBA 的生活变得更困难或更复杂无关。每个开发人员都知道为什么应该备份他们最宝贵的资产——数据——但并非每个人都付诸行动。


    并非每个人都备份数据——这就是当今网络的现实。当然，也许对你来说，没有必要每天都备份数据——但这并不是完全忘记备份的理由，不是吗？


    在这个瞬息万变的世界里，备份是必需品；备份的存在是为了保护你组织的数据免受硬件故障、人为错误甚至自然灾害的影响。许多人忘记了备份——有些人则忽视了它们。无论你未备份数据的原因是什么，备份都是必需的，如果备份尚未成为你的
    DBA 的例行工作，它应该成为其中之一。


    谈到数据库，许多 DBMS 提供了多种不同的数据库备份和恢复方法。MySQL 和 MariaDB 也不例外，但在深入探讨当你进入 MariaDB 备份和恢复领域时可能涉及的内容之前，首先，我们必须了解人们为何、何时以及如何备份像
    MySQL 这样的数据库。


    ## 为何、何时以及如何备份 MariaDB？


    备份数据是为了在未来灾难来袭时能够恢复数据。备份的方式因应用程序和你的具体用例而异，正如有多种方式可能搞砸并丢失你数据库中的所有数据一样，也有多种方式可以备份
    MySQL 或其任何同类产品中的数据。本书侧重于 MariaDB，因此这里展示的选项对于使用 Percona Server、MySQL，甚至是未来将发布的较新版本
    MariaDB 的用户来说可能会有所不同。


    至于为何你应该备份 MariaDB 中的数据，一切都很明显——频繁地备份和测试你的数据库备份将帮助你避免灾难发生时可能出现的麻烦。如果你尚未这样做，请将备份纳入你作为开发人员的日常工作——你可能不需要每天都完成备份，因此请制定一个你和你的数据库都认为可接受的备份频率计划，并据此执行。将备份加入你的开发流程，你永远不会后悔这个决定。


    如果你还没有备份，现在就备份你的数据。然后，制定一个可行的备份间隔，它不会影响你的工作流程，并能在持有你资产的硬件崩溃时减少你的麻烦。


    接着，要备份 MariaDB 中的数据，我首先建议你从宏观角度审视备份，并决定几件事。考虑回答以下问题：


    *   `你正在备份什么样的数据？` 换句话说，为你的应用程序提供支持的数据库背后有什么样的用例？你正在采取哪种备份？

    *   `你需要备份多少数据，为什么？` 备份更大的数据集将需要你采取不同的操作。

    *   `你以前备份过吗？是什么类型的备份？` 你进行过逻辑备份吗？物理备份？两者都有？频率如何？

    *   `你的备份过程是手动的还是自动的？` 为什么？

    *   `你需要多久备份一次数据？` 换句话说，你的应用程序需要什么样的备份频率，为什么？

    *   `你将数据备份到什么介质上？` 你是将数据备份到云服务、单独的 VPS、网络附加存储设备，也许是外部硬盘驱动器，甚至是 U 盘上？

    *   `你遵循备份最佳实践吗？` 这里，我指的是像“万无一失的备份”这样的事情，它要求将数据备份存储在各种不同的位置，以便无论导致你最初丢失数据的事件规模如何，你都能在必要时访问数据进行恢复。


    回答这些问题以获取关于各种不同事情的了解。这些事情可能包括但不限于以下内容：


    1.  你将必须进行逻辑备份还是物理备份，以及在恢复它们时你有哪些选择。

    2.  你将知道如何更好地备份你的数据。

    '
- fmt: '3.  You will know whether you can use your experience gained in the past to
    help your database in its present state.

    4.  You will be aware of the variety of backup scripts you can use when backing
    up the data inside of your database.

    5.  Finally, you will know the approximate number of backups a specific device
    can store and how often you need to rotate backups (i.e., what number of backups
    to retain/delete, etc.).


    All in all, understanding these things will point you toward a direction you need
    to consider when backing up data. For example, if your backups are logical, you
    would need to look into tools helping you back up SQL statements that recreate
    data. On the other hand, if your backups are physical, you will know that no matter
    what you do, you will need to take copies of the files within your database, and
    thus, you will be forced to look only at the tools that can take physical copies
    of data – copies of files and not of SQL statements that recreate data that’s
    stored inside files.


    From there, appliance gates will open – you will now know what appliances you
    should be using to back up data in the way you desire. Users choosing to back
    up data in a logical way may use appliances like `mariadb-dump`, while users taking
    physical backups may use simple commands available within Windows or Linux.


    Do note that physical backups may be a little harder to restore because such backups
    in MariaDB can only be restored on similar hardware that runs the same database
    management system and the same (or relatively unchanged) version of MariaDB. That’s
    the case because physical backups back up data that is subject to changes as time
    goes along. As such, the restoration of physical backups is often less flexible,
    though such backups may be faster and less resource-intensive at the same time.


    If you know that you back up data into the cloud with a limited amount (say, 5GB)
    of space, you will have a basis for an assumption on how many backups can your
    specific cloud account store. In other words, being delicately aware of your use
    case will help you assume how frequently should you back up data, too. It turns
    out that everything is much simpler than it seems, right?


    When it comes to actually backing up your data, the way you will back up data
    is, once again, directly related to what kind of backups you need to take – physical
    backups will necessitate you to back up files from the database; logical backups
    will necessitate you back up statements that recreate data. One can take logical
    types of backups “by hand” using tools like the Export functionality of your favorite
    SQL client, while physical backups will necessitate some more knowledge.


    ## Backup Types and Tools


    When it comes to backup types available in MySQL, there are multiple types of
    data backup strategies you can choose from. The types of MySQL backups are split
    into multiple categories: some people put backups in categories according to how
    data is backed up (if we back up SQL statements, our backups will be logical,
    and if we back up files, our backups will be physical). Some people split backups
    into categories based on whether backups are hot or cold (hot backups backup data
    while a system behind it is being actively used and cold backups backup data once
    the system is down), or whether they’re completed online or offline. Backups can
    also be full, incremental, differential, or snapshot-based. Backups also can be
    compressed.


    So many distinct features of backups, right? We will get into them, but first,
    backup types. I’ll start by putting everything in place by using a table:


    | What’s Backed Up? | Database State When Backups Are Made | Full, Incremental,
    or Differential Backups? |

    | --- | --- | --- |

    | If SQL queries are being backed up, we are taking `logical backups`. If files
    within the database are being “touched” and backed up, we are taking `physical
    backups`. | Backups will be considered hot when they’re being taken with a database
    being `online`. Backups will be considered cold when they’re being taken with
    a database being `offline`. | `Full backups` back up everything in a database
    (all data). `Differential backups` back up data that has been changed since the
    last full backup has been taken. `Incremental backups` only back up data that
    has changed since the last full or incremental backup. |


    So, as you can see, backups differ in a couple of aspects. They differ in


    *   The data we back up – we can back up SQL statements that recreate data or
    the data itself.

    *   The state of the database when we back up data – the database can be online
    or offline.

    *   The actual types of backups we make – database backups can be full, differential,
    or incremental.


    Coming back to backup types, full backups refer to the process of backing up all
    data related to your use case in a single backup operation. This type of backup
    is called a “Full backup” because it makes a full – a complete – copy of the data
    assets controlled by the organization. In the database world, full backups often
    refer to backing up all tables within all databases excluding databases used/created
    by the system.


    To make a full backup of data residing in MariaDB, first decide whether you’re
    taking a physical or logical backup. Then, follow the appropriate steps.


    To take a logical backup of data residing inside MariaDB, consider a `mysqldump`
    equivalent – `mariadb-dump`. `mariadb-dump` takes a logical backup of the data
    existing in MariaDB, and at the time this book is being written, it’s one of the
    best ways to back up MariaDB-based database instances running mid-sized data sets.
    Up until MariaDB 11.0.1, `mysqldump` was a symlink to `mariadb-dump` – that’s
    no longer the case. To take a backup with `mariadb-dump`, navigate to the MariaDB
    bin directory through the `CLI`, then invoke `mariadb-dump` to see the available
    options. Familiarize yourself with the available options, then invoke `mariadb-dump`
    and add the option necessary for your backup by invoking `mariadb-dump` like so:


    ```

    mariadb-dump [OPTIONS]

    ```


    The options relevant to `mariadb-dump` are numerous and will be displayed on the
    screen once the tool is invoked.


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig1_HTML.jpg)


    Figure 13-1: The options available to use within mariadb-dump


    Some of the most popular options available for you to use include but are not
    limited to (two values mean you can choose either and multiple values are explained):'
