  trans: '

    关于数据库的现状存在很多误解——其中一个主要误解与关系型数据库和更大的数据集有关。许多人说 MySQL 及其同类产品（MariaDB、Percona Server）由于基于关系型数据库模型，根本不适合大数据集，但这并非问题所在——真正的问题在于**没有为大数据正确优化数据库**。


    为大数据优化 MySQL 与为普通大小的数据集优化 MySQL 并无太大不同；数据仍然是数据，只是量更大了。当然，当数据集变大时，可能需要采用不同的方法来处理它，但这并不否定数据库管理系统本身的有效性。


    “MySQL 不适合更大数据集”这种说法的核心，可能源于这样一个前提：非关系型数据库管理系统不遵循关系型数据库模型，而当这个模型被 MySQL 及其同类产品（如
    MariaDB 或 Percona Server）所遵循的关系模型所取代时，一种模式就出现了——你会听到人们说


    *   MySQL 只适合读写操作比例不超过 80%/20%的应用程序。

    *   NoSQL 数据库天生就是为大数据服务的！

    *   只有 NoSQL 数据库能为大数据集提供性能优势；它们是唯一的选择！


    虽然像 MongoDB 及其同类产品这样的非关系型数据库，因其灵活的数据模型和在必要时进行横向扩展的能力，可能对大数据集非常有用，但关键在于，MySQL 是一个极其强大的数据库管理系统，它**能够**像其他数据库管理系统一样处理好大数据——问题仅仅出在我们的配置或使用案例上。一旦你的数据变大，无论数据库供应商是谁，关键都在于你的服务器、数据库配置、模式和查询设计。别误会——你的数据库仍然需要**优化**以利用服务器的配置——但这并不意味着
    MySQL 是你能选择的最差选项。


    只要你回答了“我的大数据用例是什么？”这个问题，并且**如果你的大数据用例需要将数据存储在数据库和表中，或者说行和列中，而不需要灵活的数据存储模型**，那么
    MySQL、MariaDB 或 Percona Server 将始终是处理更大数据集的一个选择。


    大数据和 MariaDB 尤其会引起那些从事网络犯罪分析或开源情报工具开发的人的注意——想象一下类似数据泄露搜索引擎的东西。在这个领域，MariaDB 的使用频率超出你的想象，因为这类解决方案经常处理从黑客论坛“摄取”的数据，而这些数据很少（如果有的话）包含`CREATE`或`INSERT`语句。


    当你开始理解黑客的运作方式时，一切就开始变得非常合理了；黑客通常会窃取包含数亿用户数据的数据库副本在网上出售（对买家而言，其“好处”在于这些数据可用于撞库攻击），如果你曾瞥一眼这类数据，你会很快注意到其中
    90%的数据格式是用冒号“:”来终止列。从攻击者的角度来看，这非常合理，因为以这种方式“渗出”数据几乎不花时间。时间可以用来“清理”（清除黑客进入系统的痕迹），而以这种方式出售的数据可以更快地被“投入使用”去伤害其他用户。毫不意外，一切都是为了“方便”……


    当然，并非你们每个人都会处理泄露数据，但前提是相同的——我认为你的系统不太可能为了同样的原因而摄取数百万行基于`INSERT`或`CREATE`查询构建的数据（这并不意味着你永远不需要处理它们，但在导入更大数据集时，它们不会是你主要关心的问题），而
    MySQL、MariaDB 和 Percona Server 能够批量插入数据。所以，“MySQL 能处理更大的数据集吗？”这个问题的答案是肯定的，前提是它经过了适当的优化，并且你的用例需要一个“强”数据结构（数据应存储在行和列中）。


    MariaDB 用户还有`ColumnStore`，这是一个列式存储引擎，这意味着也不需要单独安装。如果你的用例需要大数据处理和线性可扩展性，或者需要插入大量数据且几乎没有更新/删除操作，`ColumnStore`也是一个可行的选择。


    ## MariaDB 与大数据：处理大数据集


    在你选择使用 MySQL 或 MariaDB 来支持更大的数据集后，不可避免地，你也必须为大数据优化数据库管理系统。与普遍看法相反，为更大的数据集优化 MariaDB
    与优化整个数据库管理系统**并没有**任何不同。这就是为什么我已经带你了解了优化数据库性能的方法——一旦你开始处理大数据，你将必须利用你刚刚优化的那些设置。这里没什么新东西——真的，你不需要重新发明轮子或火箭。话虽如此，普通的`INSERT`语句将无法满足需求，为了让处理更大数据集的工作不至于变成一场彻底的噩梦，你必须了解一些事情——这就是我们接下来要介绍有助于简化大数据工作的方法的原因。


    在处理大数据之前，先给你的数据一个明确的定义：你什么时候认为你的应用程序/数据库跨入了大数据的范畴？这个问题可能看起来很奇怪，但人们对大数据的定义如此之多，近乎荒谬。在以下示例中，我们将大数据定义为一旦记录数超过
    1 亿条即为“大”。


    ### 将大数据插入 MariaDB


    在你继续将更大的数据集插入 MySQL 之前，有几件事需要牢记：


    1.  在大多数情况下，你的数据插入将与`INSERT`查询无关。这是因为`INSERT`查询带有不必要的开销。

    2.  你将用于向数据库插入数据的文件很可能是文本文件，因此其大小小于逻辑/物理备份。

    3.  你的数据集中的列很可能以冒号“:”、竖线“|”、短横线“-”符号终止，或者如果使用的是 Excel (CSV)文件，则以逗号（“,”）终止。

    4.  在数据插入过程中，你将能够使用你的数据库——你的存储引擎起初不太可能显示行数——所有数据插入完毕后才会显示行数。

    5.  如果需要分区，请在将数据插入表之前对表进行分区。如果需要索引，建议在数据插入后再创建索引。


    当将大数据集插入数据库时，你将使用的查询很可能也会涉及到`secure-file-priv`变量。请确保该变量设置为一个不易访问的目录（即，在`public_html`之外），并且该目录位于有足够空间的硬盘上。空间问题既涉及你将要加载到数据库中的数据文件，也涉及你的数据库可能制作的表/数据副本（我指的是`ALTER`查询的内部功能），以及首先存储所有宝贵数据所需的空间量。


