    and are based on a reliable storage engine that holds data instead of spewing
    it out.


    Another popular use case of the BLACKHOLE storage engine is the verification of
    syntax in backup files – if your logical backups are swallowed into the abyss,
    their syntax is correct.


    ### The MERGE Storage Engine


    MySQL also has a storage engine dedicated to merging data derived from MyISAM
    – back in the day, this storage was known as MRG_MyISAM, but nowadays, it has
    a much simpler title depicting its use case – the storage engine is titled MERGE.


    The MERGE storage engine is simple to explain: it’s a collection of MyISAM tables
    that have the same structure. Once a table based on the MERGE storage engine emerges
    inside of your database, you will see no usual files having the “.MYD” or “.MYI”
    extensions on the disk – a file with the extension of “.MRG” (merge) will be created
    instead. The table format of these tables will be stored in the data dictionary,
    and the contents of any “.MRG” file will only contain the names of the tables
    that are running the MyISAM storage engine and will be treated as one MyISAM-based
    table instead.


    You are unlikely to often use the advantages posed by the MERGE storage engine
    in MySQL, but some may cross your radar more often than you’d think:


    *   As the repair of MyISAM tables is inevitable due to MyISAM being a non-transactional
    storage engine, if you have a use case that necessitates the usage of large MyISAM
    tables, splitting them up into multiple MERGE tables and repairing many individual
    tables based on MERGE instead are likely to be much faster than repairing a single
    table based on MyISAM.


    *   MERGE can exceed the maximum file size limit set by your OS. For MyISAM, adhering
    to this limit is a necessity – for MERGE, it is not.


    With that being said, MERGE does have some problems. `ALTER` queries will mess
    up the merge structure with associated tables, the reliable functionality of `REPLACE`
    queries is likely to be lost, and queries like `[ALTER|DROP|OPTIMIZE|REPAIR|ANALYZE]
    TABLE` or `DELETE` without a `WHERE` clause may provide incorrect results due
    to MySQL referring to the primary table and not the merged tables themselves.


    All this makes the MERGE storage engine a flawed, though valuable addition even
    when MyISAM is obsolete.


    ### The Storage Engine for High Availability


