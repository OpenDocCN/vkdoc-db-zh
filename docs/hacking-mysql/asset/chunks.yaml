- fmt: 'Since clustered indexes store row data, each table can have only one index
    of such a type. Most of the time a clustered index will be put on the `id` column
    and will increment automatically, thus fulfilling its purpose. If an automatically
    incrementing column doesn’t exist, MySQL will also have a clustered index because
    then, a clustered index will be the first `UNIQUE` index with its key columns
    defined as `NOT NULL`. If that’s not the case either and you find yourself using
    `InnoDB`, the storage engine will generate an invisible clustered index called
    `GEN_CLUST_INDEX` and order rows by an id assigned by `InnoDB`.


    Queries using such an index are likely to be blazing fast because when the index
    is in use, `InnoDB` is led straight to database pages that contain the data of
    the row, thus saving unnecessary disk I/O.


    Most tables will likely make use of clustered indexes and B-tree indexes: that’s
    a fact. No matter whether your table is storing 100,000 or 100,000,000 records,
    a B-tree index will certainly help. Problems arise once you need to decide on
    the design of your indexes: you may know the ins and outs of indexes, but all
    your knowledge can still make your databases grind to a halt if you don’t know
    how to index in a way that helps your queries in your specific use case. After
    all this, a logical question may arise: *how do you know that?* This is a separate
    question that demands separate answers.


    ## Devising the Perfect Index Design


    To come up with a strategy for a perfect index design, answer a question: what
    do you consider a “perfect” index? For most of you, a perfect index will be an
    index using which query speed is faster than X. What’s that X? Why that number?


    To put you on a path, I’ll backstep a little: around 2016, a bunch of new data
    breach search engines emerged; those who have followed the scene around that time
    will certainly remember their Twitter (now X) feeds: 50% of their tweets were
    focused on *“Look at us – our queries complete within 0.0003s. even under stress,
    and our competitor’s website only sustains a speed of 0.04s! Isn’t that a good
    reason to stop using their service and switch to ours instead?!”* or *“Our competitors
    are only returning 200 rows when returning results, our results aren’t limited!”*


    These tweets popped up because the operators of such engines were seemingly experimenting
    with index/database design; what index makes a certain query complete the fastest
    and why?


    *These tweets likely popped up because the operators of these search engines knew
    that devising the perfect index design is a tough nut to crack for many developers
    because most of them are well-versed in a specific language, but don’t know much
    about databases, especially their spin-offs.* Your use case may be wildly different
    than the use case of data breach search engines and it may be exactly the same,
    but regardless, if you have more than a million rows, you need to take care of
    a proper index design beforehand for your indexes not to cause you problems in
    the long run.


    Many of you won’t care that much about index speed in microseconds and you will
    be fine with the speed as long as your query completes in under a second, but
    keep in mind that your database needs to be stress-tested too: having your use
    case, stress on your database, your hardware and database capacity in mind, what’s
    a reasonable ballpark in terms of speed? Take a wild guess taking into account
    the following:


    *   **Use case**: Your use case will refer you to a possible index type.

    *   **Data types**: The data types in use will hint at an index type as well.
    For example, if your use case necessitates `TEXT` columns, you’d have to consider
    a prefix index regardless. If your searches are based on the `id` column, perhaps
    adding a *clustered index* is enough?

    *   **Stress on your database**: Many of you will choose to index as so not to
    put more strain on your database because of visitor influx or similar reasons;
    what’s the load of your database at the present moment? Average load during a
    busy month? During the last 3 months? Does any of it have to do with query structures
    you are about to index?

    *   **Hardware and database capacity**: What hard drives are in use? What’s their
    size and why? If you have a lot of space but run `HDD`s instead of `NVMe` drives,
    could you think about *covering indexes* to avoid reading data from the disk altogether?
    Can some data existing in your database be deleted in favor of a new one?


    Take these things into account and you will be halfway there – a good start is
    half the work, right? Now, time for the design itself.


    For this example, our use case will be a basic table in a database behind an ecommerce
    shop that depicts users and the latest item they’ve bought.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig21_HTML.jpg)


    Figure 11-21: An ecommerce shop table structure


    In real life, if you’re indexing a table behind an ecommerce shop, you will probably
    have more columns, but in this case, this table will do just fine. Right – what
    about our use case? We’re most likely searching what item was purchased by what
    user using a certain system, right? With such a use case in mind, what about data
    types? Do we need `varchar(255)` everywhere? Probably not, so let’s work on them
    – smaller data types mean less data on the disk.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig22_HTML.jpg)


    Figure 11-22: First stage of `ALTER TABLE`


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig23_HTML.jpg)


    Figure 11-23: Second stage of `ALTER TABLE`


    Don’t be surprised if you see “Stage: 1 of 2…” when running `ALTER` queries: `MariaDB`
    is just explaining the internal process it goes through. Also, bear in mind that
    you can rename columns when resetting their data types by changing the second
    definition of the column too.


    After we’ve worked around with our table a little, here’s what we have.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig24_HTML.jpg)


    Figure 11-24: An ecommerce table with optimized data types


    Much better – we can get ready for indexing.


    To do that, we need to look at our application functionality: what does it do?
    What options does the user have within the search engine? *What data is searched
    for and displayed?* The last question is particularly important because the answer
    to it determines the query structure and the query structure determines the index
    design.


    Let’s say that we’re searching for the last purchased item to determine the last
    login date of a certain customer to check if the customer is still logging in
    to the shop and his email so we can contact him offering discounts and other details.
    That’s an answer to the biggest part of our question – what to index. We usually
    index the column that’s being searched for, so in this case, we need to have an
    index on an `item_purchased` column. If there’s nothing else to assist our search
    efforts (any other columns we add would necessitate the presence of `AND`/`OR`
    clauses), our search on that front is over.


    To decide on an index type, we need to once again dig into our use case: in this
    case, it’s pretty clear that we’re going to need a `B-tree` index due to the nature
    of the app, but do we need a full-text index? In this case, probably not; full-text
    indexes are only necessary if:


    1.  We want to have the capability to include Boolean characters in our search
    query to tell the query to include/exclude something from the search results,
    etc. – that’s what the Boolean search mode is all about.

    2.  We rely on “implied knowledge” in that we search for “cheese” and we want
    our result set to contain “cheddar cheese,” “blue cheese,” etc. – that’s why the
    query expansion mode exists.

    3.  We have larger text fields like `TEXT` that we intend to run queries on.'
