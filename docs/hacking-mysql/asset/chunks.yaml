    That’s it – if your database is optimized, restoring millions or even billions
    of rows in such a fashion shouldn’t be a very hard task either.


    ## Backup and Recovery Pitfalls


    After knowing how to back up and recover your most precious data, you should also
    be aware of backup and recovery pitfalls.


    Start from the basics – inspect the last backup you took on a high level. What
    do you notice? A file with X MB|GB|TB in size. That’s right – all backups come
    with a certain weight. The bigger your data set is, the bigger the weight will
    be. What kind of a file is it? Did you perform a full logical backup? A partial
    logical backup? A raw data backup? Is all of the data in the backup really necessary
    or can you back up only necessary data to save space on the disk? *Can the backup
    be restored?*


    One of the biggest backup and recovery pitfalls is related to data restoration
    – you’d be surprised how often people back up, but don’t try to restore their
    assets! Now imagine being in dire need to restore data and being unable to do
    so. Not a very good scenario, is it? Always test the backups you take – the more
    data you have, the more applicable this advice will become.


    Next, make sure to automate at least some of your backup tasks – I’ve already
    provided an example of how you could go about optimizing and automating a backup
    of billions of rows, and if you can automate backups in regard to billions of
    rows of data, what makes you think you’re incapable of automating smaller backup
    tasks? Seriously – make use of events to automate backup tasks, or take a look
    into cronjobs if necessary.


    When testing whether backups can be restored, consider the locations where the
    backups are stored, too: are your backups making use of the cloud or are they
    using hard drives/SSDs in a separate server? If they are, perhaps it’d be wise
    to move data to the cloud and avoid the costs associated with another server?
    If that’s not an option, perhaps consider storing the backups in a “rolling fashion”
    so that only backups not older than, say, 1 month, are stored? Think of how much
    space you’d save!


    Also, make good use of hot backups – they exist for a reason and they provide
    users with an excellent way to back up data while not obstructing any operations
    running within the database management system: just because MariaDB doesn’t support
    XtraBackup, doesn’t mean that `mariadb-dump` won’t help! To this day, many situations
    make `mariadb-dump` an indispensable component of your database.


    If you’re using stored procedures, triggers, or functions to power your data,
    keep in mind that these are stored separately from your data, and as such, they
    need to be backed up separately as well. No need to invent a bike here (the `--routines`
    flag should be more than enough), but as you’re backing up, take care of these
    too.


    Don’t forget about the configuration files, either – if you restore data on another
    server, it’s likely that you will want an identical configuration to power that
    database server, too. In such a situation, it’s only natural that not having a
    configuration file backed up would mean trouble for you and your database.


    Finally, consider the place where you store the backups – if it’s necessary to
    store backups on another server, store them in a place inaccessible to the public
    (i.e., below `public_html`).


    ### Pitfalls for Big Data


    All the same applies to big data sets too – backups of big data sets are backups
    too, eh?


    From practical experience, I can tell you that many pitfalls for the backup/restoration
    of bigger data sets are somehow related to the following:


    1.  Backing up/restoring logical backups using an improperly configured database,
    then complaining that backup restore times are rather slow


    2.  Not following best practices when using `LOAD DATA INFILE` to restore raw
    backups


    3.  Indexing and/or partitioning


    Yup – these three basic things! Starting from the top, if you’ve taken logical
    backups for your bigger data sets, you must’ve known what you’re doing. I hope
    your database is optimized and that indexes are added after the data is inserted
    into your tables because, otherwise, you’re just asking for a headache.


    Bulk `INSERT` operations for bigger data sets will always be rather slow (yes,
    even if your database is optimized to the max), and unless you’ve exchanged those
    operations for `LOAD DATA INFILE`, you’re going to need to brace for impact on
    your database. Information will still be written, albeit not in such a quick fashion
    as with `LOAD DATA INFILE`.'
  trans: '

    ## 恢复 MariaDB


    在备份数据时，你已经考虑到了为最坏的情况做准备。为最坏情况做准备是必要的，因为最坏的情况有时会以数据损坏、磁盘故障、断电、托管事故等形式降临：一旦发生，你就需要知道如何恢复已备份的数据。


    备份数据而不测试如何在另一台服务器上恢复它，几乎没什么用：只有在数据成功恢复后，你才能安心确认备份没有白做。


    要使用 `mariadb-dump` 恢复逻辑备份，请如下调用 `mariadb-dump`，其中 `backup.sql` 是你的备份文件名：


    ```

    mariadb-dump -u[username] [database_name] < backup.sql

    ```


    如果需要，请提供密码（如果你未在 `my.ini` 或 `my.cnf` 中定义密码，系统应会提示你输入），然后你的备份就会被恢复到你刚刚指定的数据库中。通常无需指定字符集或排序规则——备份时已考虑了这些设置，恢复时应会自动应用这些设置。


    请注意，你也可以通过直接查看备份文件（打开它）并复制必要的 `CREATE TABLE` 和 `INSERT INTO ...` 语句来恢复逻辑备份的 `部分内容`。完全没必要恢复整个文件，虽然这种方法可能不适合所有人，但恢复部分数据是完全可行的。


    回到恢复操作，要恢复压缩的备份（大多数会有 `.gz` —— GZip 扩展名），可以使用类似 `gunzip` 的工具——将 `database_name`
    替换为你的数据库名：


    ```

    gunzip < backup.sql.gz | mysql -uroot [-ppassword] database_name

    ```


    对于物理备份，按我之前展示的那样，使用 `--prepare` 选项进行准备：


    ```

    mariabackup --prepare --target-dir=/tmp/backup/

    ```


    然后，停止 MariaDB，清空数据目录或确保其为空，并使用 `--copy-back` 或 `--move-back` 选项运行 `mariabackup`：


    ```

    mariabackup --copy-back --target-dir=/tmp/backup/

    ```


    就是这样——这里同样不需要高深的数学知识（但你必须确保备份文件位于 `target-dir` 中——别忘了这一点）。


    ### 恢复大数据


    恢复较大的数据集时，采用相同的实践。当然，你等待备份恢复的时间会更长，但如果备份最初是以有助于数据库的方式创建的，它至少应包含 `mariadb-dump`
    中一些有助于尽快恢复的选项（参见“备份大数据集”标题下的选项）。


    如果你是通过运行 `SELECT ... INTO OUTFILE ...` 来备份 MariaDB 实例中的数据（即，你的备份由原始数据组成），则可以通过运行类似以下的查询来恢复（你可能需要根据你的实际情况，替换文件名、表名以及字段终止符）：


    ```

    LOAD DATA INFILE ''/tmp/backup_file.csv'' INTO TABLE `table_name` FIELDS TERMINATED
    BY '','';

    ```


    就是这样——如果你的数据库经过优化，以这种方式恢复数百万甚至数十亿行数据也不应是一项非常困难的任务。


    ## 备份与恢复的陷阱


    了解了如何备份和恢复你最宝贵的数据之后，你还应该意识到备份和恢复过程中的陷阱。


    从基础开始——从高层次检查你最近一次的备份。你注意到了什么？一个大小为 X MB|GB|TB 的文件。没错——所有备份都有一定的体积。你的数据集越大，体积就越大。这是什么类型的文件？你执行了完全逻辑备份？部分逻辑备份？原始数据备份？备份中的所有数据是否都必要，还是可以只备份必要数据以节省磁盘空间？`这个备份能恢复吗？`


    最大的备份与恢复陷阱之一与数据恢复相关——你会惊讶于人们经常备份，却不尝试恢复他们的资产！现在想象一下，当你急需恢复数据时却无法做到。这可不是什么好情景，对吧？务必测试你所作的备份——数据越多，这条建议就越适用。


    其次，确保将至少部分备份任务自动化——我已经提供了一个如何优化和自动化数十亿行数据备份的例子，如果你能自动化数十亿行数据的备份，又有什么理由认为自己无法自动化更小的备份任务呢？说真的——利用事件来自动化备份任务，或者必要时研究一下
    cronjobs。


    在测试备份是否可恢复时，也要考虑存储备份的位置：你的备份是使用云存储，还是使用另一台服务器上的硬盘/SSD？如果是后者，或许明智的做法是将数据迁移到云端，以避免与另一台服务器相关的成本？如果这不是一个选项，或许可以考虑以“滚动方式”存储备份，例如只保留不超过
    1 个月的备份？想想这能节省多少空间！


    此外，充分利用热备份——它们的存在有其道理，为用户提供了一种绝佳的备份数据方式，同时不会妨碍数据库管理系统内的任何操作：仅仅因为 MariaDB 不支持 XtraBackup，并不意味着
    `mariadb-dump` 无用！时至今日，在许多情况下，`mariadb-dump` 仍然是你数据库中不可或缺的组成部分。


    如果你使用存储过程、触发器或函数来支持数据操作，请记住这些是与数据分开存储的，因此也需要单独备份。这里无需重新发明轮子（`--routines` 标志应该就足够了），但在备份时也要照顾到这些。


    也别忘了配置文件——如果你在另一台服务器上恢复数据，你很可能也需要一份相同的配置来驱动那台数据库服务器。在这种情况下，没有备份配置文件自然会给你和你的数据库带来麻烦。


    最后，考虑存储备份的位置——如果有必要将备份存储在另一台服务器上，请将其存放在公众无法访问的地方（例如，在 `public_html` 目录之下）。


    ### 大数据的陷阱


    同样的情况也适用于大数据集——大数据集的备份不也是备份嘛，对吧？


    根据实践经验，我可以告诉你，较大数据集备份/恢复的许多陷阱往往与以下方面有关：


    1.  使用配置不当的数据库备份/恢复逻辑备份，然后抱怨备份恢复时间相当慢

    2.  使用 `LOAD DATA INFILE` 恢复原始备份时未遵循最佳实践

    3.  索引和/或分区


    是的——就是这三件基本的事情！从头说起，如果你对较大的数据集进行了逻辑备份，你必须知道自己在做什么。我希望你的数据库是优化的，并且索引是在数据插入表之后添加的，因为否则，你就是在自找麻烦。


    对于较大的数据集，批量 `INSERT` 操作总是会比较慢（是的，即使你的数据库已经优化到了极致），除非你已经用 `LOAD DATA INFILE` 替换了这些操作，否则你将需要准备好应对对数据库的冲击。信息仍然会被写入，只是速度不如使用
    `LOAD DATA INFILE` 那么快。

