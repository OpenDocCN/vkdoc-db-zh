- fmt: '# MySQL查询解析与优化


    对于一个SQL查询，解析器会解释所有内容。是的，每一个单词和字符！这些单词和字符如下所示：


    1.  `SELECT`

    2.  `sender`

    3.  `,`

    4.  `COUNT`

    5.  `(`

    6.  `*`

    7.  `)`

    8.  `FROM`

    9.  `messages`

    10. `WHERE`

    11. `message`

    12. `LIKE`

    13. `''`

    14. `%`

    15. `What time`

    16. `%`

    17. `''`

    18. `;`


    发现规律了吗？查询解析器必须将任何SQL查询，无论多么简单或复杂，拆分成多个片段并逐一评估。在它从MySQL获得“OK”信号后，它就会转向查询优化器。


    MySQL中的查询优化器试图预测哪些查询执行计划执行得最快，并为MySQL选择可用的最佳选项。在这个场景中，我希望您从“成本”的角度来思考一切——MySQL甚至有一个名为`Last_query_cost`的变量。


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig4_HTML.jpg)


    图 5-4


    MariaDB中的`Last_query_cost`


    变量`Last_query_cost`显示了查询优化器中**上一次编译查询的“成本”**。该变量的作用域是会话，其默认值0表示在当前会话中尚未运行任何查询。变量中的值即为查询的“成本”。成本会被分配给不同的可能性，并且基于MySQL内部的“思考”方式，这意味着它不太可能为您执行的最后一个查询提供极其有用的反馈，但它将作为一个有用的测量变量。请记住，根据MySQL文档，如果您在MySQL
    8.0.16之前的版本中使用此变量，除了简单的`SELECT`之外，运行任何查询都很难得到结果，但这并不能否定它的有用性。有人说这个值甚至与实际执行查询的成本不匹配，而是在实际值的“轨道附近”飞行。尽管如此，就解析器和优化器而言，这个变量肯定是您应该谨慎对待的东西。MySQL还有一个类似的变量——`Last_query_partial_plans`——它显示了查询优化器在为您刚刚运行的查询准备计划时所进行的*迭代*次数。


    *查询优化器*的作用正如其名，且不难量化：它的任务是找到执行查询的最佳方法。优化器提炼查询的复杂部分，评估不同的查询执行计划，并确定执行给定SQL语句的最佳方式。查询优化器将决定，除其他事项外：


    *   **访问数据的最佳方式是什么？** 确定数据访问方式是优化器的任务——您的数据是通过表扫描还是索引扫描访问？询问查询优化器吧！

    *   **如何利用索引或分区的能力？** 由优化器决定是否使用索引来定位相关行，如果使用，使用哪个索引以及何时使用。优化器就是为什么当您在查询前添加`EXPLAIN`子句时，会看到`possible_keys`、`key`和`key_len`列的原因。如果优化器认为全表扫描是更好的选择，它也可以决定完全忽略索引。

    *   **如果存在`JOIN`查询，执行它们的最佳顺序是什么？** 决定执行`JOIN`查询的最有效顺序是优化器的任务。这可能归结为从操作中“删除”未被连接使用的表，等等。

    *   **如何使用`GROUP BY`和`ORDER BY`？** 查询优化器必须决定是否为`GROUP BY`和`ORDER BY`操作使用索引。

    *   **如何处理子查询？** 如果您碰巧在SQL查询中执行任何子查询，您也是在要求优化器以数据库可以理解的方式简化它们，并确定它们的结果是否可以被缓存。


    换句话说，查询优化器将决定优化查询的最佳方法，以使其执行得尽可能快。优化器的任务是帮助您的数据库找到一种高性能执行查询的方式。它之所以被称为优化器，是因为它比解析器承担着更大的任务——解析器检查语法，而优化器不仅需要交付结果，还需要尽可能快地完成。


    在MySQL中，可以通过深入探究`EXPLAIN`来了解优化器——`EXPLAIN`子句向您显示优化器的查询计划部分，以便您更好地理解数据库执行某些操作的原因。如果您是一名开发人员，`EXPLAIN`无论如何都应该是您词汇的一部分，所以我稍后会深入探讨`EXPLAIN`的功能：正确理解`EXPLAIN`的作用对于区分影响查询成败的因素是必要的。您还应该记住，这不是理解查询组件的唯一工具，因为在MySQL上市期间，包括Percona、MariaDB等在内的许多公司都试图生成查询性能指标，但由于查询组件本质上是我们之前讨论过的较小任务，它们也能揭示很多秘密，即使您无法访问专业人士开发的工具，也可以深入研究它们。对于面临问题的许多人来说，一个很好的起点是理解MySQL在运行某些查询后显示的错误信息所传达的内部含义。


    ## 查询与错误消息


    您知道那种点击一个按钮后您的应用程序返回“MySQL Error #XXXX”的感觉吗？是的。那就是您的数据库在说您的代码搞砸了。


    没有人喜欢在运行SQL查询后看到错误消息。这是肯定的——同样肯定的是，错误消息的存在是为了帮助我们；它们不是MySQL想出的用来危害您数据库的邪恶阴谋，而是为了告诉我们为什么我们做出的特定决定是错误的，并帮助我们改进它。是的，它们可能看起来很吓人——有时也确实如此——但它们并不是世界末日。


    MySQL中的错误遵循特定的格式。每个MySQL错误都附带：


    *   **错误编号**：每个错误都有一个特定的对应编号。

    *   **错误消息**：每个错误都附带一个特定的错误消息，详细说明您做了什么以及为什么您刚刚采取的操作出错。

    *   **以`SQLSTATE`值形式表示的错误条件**：`SQLSTATE`值是一个五字符字符串，定义了错误显示后所达到的SQL状态。


    以下是错误的样子。


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig5_HTML.jpg)


    图 5-5


    MariaDB中的错误


    看到我们有多少错误了吗？“Unknown database”、“Table doesn’t exist”、“Unknown column in where
    clause....”。下面，您还将找到黑客在探测SQL注入漏洞时寻找的“圣杯”。


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig6_HTML.jpg)


    图 5-6


    MariaDB语法错误


    “You have an error in your SQL syntax...” 哦，糟了！这是攻击者在探测注入漏洞时寻找的错误，因为这意味着一旦他们添加几个引号、转义字符和一两个分号，您就可以跟您的数据库说再见了。或者至少是里面的数据。噗——没了！这些事情发生是因为开发人员喜欢敞开大门，欢迎用户输入到您的SQL查询中，这是一条通往灾难的道路，但我将在本书的最后一部分——“安全防护”中详细介绍。'
  raw: 'For such an SQL query, the parser would interpret everything. Yes, every word
    and character! These words and characters would be as follows:


    1.  SELECT


    2.  sender


    3.  ,


    4.  COUNT


    5.  (


    6.  *


    7.  )


    8.  FROM


    9.  messages


    10.  WHERE


    11.  message


    12.  LIKE


    13.  ‘


    14.  %


    15.  What time


    16.  %


    17.  ‘


    18.  ;


    See a pattern? The query parser has to split any SQL query, no matter how simple
    or complex, into pieces and evaluate them one by one. After it has gotten the
    OK sign from MySQL, it turns to the query optimizer.


    The query optimizer in MySQL tries to predict what query execution plans would
    execute the quickest and choose the best option available for MySQL to use. In
    this scenario, I’d like you to think of everything in terms of price – MySQL even
    has a variable called `Last_query_cost`.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Last_query_cost in MariaDB


    The variable `Last_query_cost` shows the “cost” of the last compiled query for
    the query optimizer. The variable is scoped by session, and its default value,
    0, means that no queries have been run during this session. A value in the variable
    is the “cost” of the query. Costs are assigned to different possibilities and
    are based on how MySQL “thinks” internally and that means that it’s unlikely to
    give you any incredibly useful feedback for the last query you executed, but it
    will be useful as a measurement variable. Keep in mind that according to the documentation
    of MySQL, if you employ this variable anywhere pre-MySQL 8.0.16, you’d be hard-pressed
    to get any results if you run any queries aside from a simple `SELECT`, but that
    doesn’t negate its usefulness. Some say that the value doesn’t even match the
    actual cost of executing your query, but flies somewhere “within the orbit” of
    the actual value. Nonetheless, this variable is certainly something you should
    be cautious about as far as parsers and optimizers are concerned. MySQL also has
    a similar variable – `Last_query_partial_plans` – that shows the *iterations*
    made by the query optimizer when preparing a plan for the query you just ran.


    The role of the *query optimizer* stands behind the name itself and is not that
    hard to quantify: its task is to find the best approach to execute a query. The
    optimizer distills the complex parts of your query, evaluates different query
    execution plans, and determines the best way to execute a given SQL statement.
    The query optimizer will decide, among other things:


    *   **What’s the best way to access your data?** It’s the task of the optimizer
    to determine the way your data is accessed – will your data be accessed using
    a table scan or an index scan? Ask the query optimizer!


    *   **How to employ the power of indexes or partitions?** It’s up to the optimizer
    to decide whether to use indexes to locate relevant rows and if so, what index
    and when to employ. Optimizers are the reason why you see the “possible_keys,”
    “key,” and “key_len” columns once you add an `EXPLAIN` clause in front of your
    query. The optimizer can also decide to ignore indexes altogether and perform
    a full-table scan if it thinks that’s the better option, too.


    *   **What’s the best order to execute** **JOIN** **queries if they are present?**
    It’s the optimizer’s task to decide the most efficient order to execute `JOIN`
    queries. That may come down to “deleting” tables not used by the join from the
    operation, etc.


    *   **How to use** **GROUP BY** **and** **ORDER BY?** The query optimizer has
    to decide whether to use indexes for `GROUP BY` and `ORDER BY` operations.


    *   **How to work with subqueries?** If you happen to execute any subqueries within
    your SQL query, you’re also asking the optimizer to simplify them in a way your
    database can understand and also determine whether their results can be cached.


    In other words, the query optimizer will decide on the best approach to optimize
    a query so that it executes as quickly as possible. The task of the optimizer
    is to help your database find a way to execute your query in a performant manner.
    The optimizer is called that way because it has a much bigger task than the parser
    – while the parser checks the syntax, the optimizer needs not only to deliver
    the results but also do so as quickly as possible.


    The optimizer in MySQL can be accessed by digging into `EXPLAIN` – the `EXPLAIN`
    clause shows you the query plan part of the optimizer so you can better understand
    the reasons why your database does what it does. If you’re a developer, `EXPLAIN`
    should be a part of your vocabulary regardless so I’ll dig into the functionality
    of `EXPLAIN` a little later: a proper understanding of what `EXPLAIN` does will
    be necessary to distinguish the factors that make or break your queries. You should
    also keep in mind that it’s not the only tool to understand query components because
    during the time MySQL has been on the market, there have been numerous companies
    trying to produce query performance metrics including Percona, MariaDB, and others,
    but since query components are essentially the smaller tasks we’ve talked about
    previously and they can tell a lot of secrets too, you can dig into them even
    if you don’t have access to the tools developed by the professionals. A good starting
    point for many of you facing issues would be an understanding of the internals
    of what MySQL is telling you via error messages shown after you run certain queries.


    ## Queries and Error Messages


    You know that feeling when you click a button and your app returns with the “MySQL
    Error #XXXX?” Yeah. That’s your database saying your code has messed up.


    No one likes to see an error message after they run an SQL query. That’s a certainty
    – what’s also a certainty is the fact that error messages exist to help us; they’re
    not some devious plot MySQL has come up with to harm your database, but rather,
    they exist to tell us why a specific decision we made was wrong and help us improve
    it. Yes, they may seem scary – and they sometimes are – but they’re not the end
    of the world.


    Errors in MySQL follow a specific format. Each MySQL error comes with:


    *   **An** **error number**: Each error has a particular corresponding number.


    *   **An error message**: Each error comes with a specific error message that
    tells you in detail what you did and why the action you just took went wrong.


    *   **An** **error condition** **in the form of an** **SQLSTATE** **value**: An
    `SQLSTATE` value is a five-character string that defines what SQL state the error
    has reached once it’s been displayed.


    Here’s what errors look like.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Errors in MariaDB


    See how many errors we have? “Unknown database,” “Table doesn’t exist,” “Unknown
    column in where clause....” Below, you will also find the “holy grail” hackers
    search for when probing for SQL injection flaws.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    A MariaDB syntax error


    “You have an error in your SQL syntax...” Oh, shoot! This is the error attackers
    search for when probing for injection vulnerabilities because it means that once
    they add a couple of quotes, escaping characters, and a semicolon or two, you
    can say goodbye to your database. Or at least the data in it. Poof – gone! These
    things happen because developers like to hold the doors wide open to welcome user
    input in your SQL queries and that’s a road to disaster, but I’ll tell you more
    about that in the last – Securing – part of this book.'
