    *I dedicate this book to developers sharing their knowledge who often do so free
    of charge – doing so necessitates a lot of effort, and without your effort, books
    like these wouldn’t exist.*


    Foreword


    I am pleased to write this note in front of Lukas’ book *Hacking MySQL*. Over
    the past few years that I have worked with Lukas through his writing about MySQL
    for the Simple Talk website, where I am the editor, I have witnessed his knowledge
    and skill when it comes to working with MySQL.


    The title of the book does sound ominous, but it isn’t really about how to hack
    into a MySQL database, but in reality, what breaks MySQL and what keeps it from
    breaking and being broken into.


    When you finish reading this book, you should be far more knowledgeable about
    all things MySQL and be more equipped to deal with all the common, and not so
    common, issues that come up when setting up and using MySQL for your production
    work.


    I have learned quite a bit over the last two years from Lukas from his writing
    of articles on these subjects and his willingness to dive deep into the subject.
    I think you will get the same experience from this book, and a whole lot more.


    > Louis Davidson


    Preface


    If I’m honest, the reason you’ve picked this book up is most likely because of
    the title, right? What kind of a book has “Hacking” as part of its title? That’s
    crazy! As you can probably already tell by the title, this book isn’t your average
    book about development or database management systems.


    Traditional books about databases often focus on a specific thing – performance,
    indexes, or the like. That’s not necessarily a bad thing, but what many of them
    lack is the explanation of how you broke your database to the point that you need
    optimizations described in the book in the first place. Here’s where this book
    comes in. The aim of this book is to open your eyes to what’s really possible
    in the realm of MySQL and that’s why it is split into three distinct parts – “Breaking,”
    “Optimizing,” and “Securing.” The first part of the book – breaking – will walk
    you through how you broke your database to such a point that you may need optimizations
    for it; optimization will tell you how to optimize your database to be highly
    performant, reliable, and secure; and the last part – securing your database –
    will help you understand how to secure your data you just optimized.


    These days, hacking is everywhere – and I’m not only saying that because we live
    in an AI age. Hacking has a very wide meaning – and its meaning is not only confined
    to computer systems with information on it. Far from it – hacking down a tree
    or hacking your body at the gym also falls within that realm. And who could deny
    that hacking your career onto different heights isn’t hacking, too?


    I hope you will enjoy reading this book as much as I enjoyed writing it – ultimately,
    I do hope that the information within this book helps you in situations beyond
    the scope of this book.


    Now make yourself some coffee, sit back, and enjoy. Not before walking yourself
    through the contents of this book though!


    ## How Is This Book Organized?


    Apart from a nice title, this book is purposefully split into three parts – breaking,
    optimizing, and securing – with an additional part acting as an introduction.


    As I’ve already noted before, each of those parts serves three distinct purposes
    necessary to achieve three different objectives:


    1.  **Breaking** allows you to understand how to break your database, meaning
    that it will walk you through things you’re doing wrong that probably impact your
    database performance, availability, security, or all of those things. OK, I’ll
    come clear – it will walk you through how to intentionally break your database
    too. Such knowledge may be extremely beneficial for those running workshops, speaking
    at conferences, or just wanting to flex their MySQL wizardry on their friends.


    2.  **Optimizing** walks you through how to optimize your database instance for
    your specific use case.


    3.  **Securing** walks you through the necessary security measures to employ to
    secure your database instance and secure your data.


    As such, each part of this book has its own remits, so I’d recommend you read
    it starting from the first part and ending at the last one – you may also elect
    to start reading from the optimization part, but it will likely contain analogs
    to the first part, and the third part is likely to contain analogs to the second
    part.


    Tip


    It’s not necessary to read this book from top to bottom, but as each part of the
    book serves a distinct objective that leads to the next, some things may become
    blurry if you read the book as you see fit. For those wanting quick advice, I’d
    advise you to skip to the specific problem in question using the index.


    ## Who Is This Book For?


    The primary audience of this book are database professionals, but that’s not to
    say that other software professionals won’t be able to apply the advice in this
    book.


    This book is for everyone using MySQL – the catch here is a specific approach
    to the database management system as a whole. Instead of teaching you how to optimize
    database internals, this book tells you what you’re doing wrong first and then
    tells you how to optimize these things and secure them for the future.


    This book will build a solid foundation around MySQL both for junior database
    administrators and for experienced DBAs alike – juniors will learn what not to
    do to a database to avoid problems, while seniors will be provided useful tips
    that will help them deal with issues in everyday work or corner cases that may
    occur in the future.


    ## Conventions Used in This Book


    The conventions used in this book are as follows:


    *   Code formatting indicates parts of code and looks like so:


    *   *Italic* indicates the names of files, directories, file extensions or URLs,
    emphasized text – everything in that realm. It also introduces new terms.


    *   **Text in bold** or underlined text reminds you of something you should be
    wary about.


    ```

    code

    ```


    This book also provides you with tips, warnings (cautions), or notes. These things
    will be outlined like so:


    Tip


    This is a tip.


    Warning or Caution


    This is a warning or a caution!


    Note


    This is a note.'
