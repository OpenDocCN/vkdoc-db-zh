    27 个部分（26 个分区对应每个字母，第 27 个使用`MAXVALUE`功能处理其余所有内容），并在被搜索的列上添加索引——这导致表在磁盘上占用的空间显著增加（即使所有数据已完全解析并设置好用于搜索，我也必须使用
    8TB 的硬盘驱动器），但也确保了即使在服务器压力下，查询速度也极快。


    这就是分区世界的真相——你不太可能每个项目都需要分区，但当你需要时，它对你的硬盘不会太友好。计算你的分区将在磁盘上占用的空间与计算将要插入其中的值同样至关重要。


    ### NULL 值处理与分区修剪

    '
- fmt: '## Things to Avoid When Optimizing Queries in MySQL


    As far as values are concerned, be especially wary of `NULL` values inside partitions
    when using MySQL. MySQL partitions are built in such a way that if you insert
    `NULL` values into your table that is partitioned by `RANGE`, these values will
    reside in the lowest possible partition. MySQL also treats `NULL` values as “less
    powerful” than ordinary values.


    I’ll let you in on another secret too – if there’s one thing partitions are extremely
    beneficial for besides splitting data into separate tables that are still treated
    as one by MySQL, that’s the pruning of data. Remember how I said that *each partition
    is represented as a file on the disk that has a specific weight*? Everything works
    the other way around, too – if you drop that partition, the file will be deleted,
    and your data will occupy less space on the disk. Partitions can be truncated
    too. Poof – gone. Think about search engines again – let’s say your table is partitioned
    by range like so (such a way of partitioning might be beneficial for those searching
    across bigger data sets with values from A to Z – *partitioned values can also
    be strings*):


    ```sql

    CREATE TABLE `demo` (

    `structure` VARCHAR(115) NOT NULL DEFAULT '''',

    `nicely` VARCHAR(60) DEFAULT NULL,

    `please` VARCHAR(70) DEFAULT '''',

    `define_partitions_too` VARCHAR(90) NOT NULL

    ) ENGINE = InnoDB COLLATE utf8mb4_unicode_ci

    PARTITION BY RANGE COLUMNS(define_partitions_too)

    (

    PARTITION partition_a VALUES LESS THAN (''a''),

    PARTITION partition_b VALUES LESS THAN (''b''),

    PARTITION partition_c VALUES LESS THAN (''c''),

    ...

    PARTITION partition_max VALUES LESS THAN (MAXVALUE)

    );

    ```


    For the purposes of this example, I’ll create two tables – one with partitions,
    and one without, but with both tables having an identical structure.


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig6_HTML.jpg)


    *Figure 4-6: Tables with and without partitions*


    After these queries have been executed, we’ll have two tables.


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig7_HTML.jpg)


    *Figure 4-7: Tables with and without partitions differ in size*


    If you can’t already tell, the partitioned table will be bigger than the non-partitioned
    one, and the more partitions you will have the bigger the difference will become.
    Anyway, back to where we started. Partitions can be pruned.


    I’ve now populated both of the tables with records.


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig8_HTML.jpg)


    *Figure 4-8: Two InnoDB tables with records*


    I’ll now showcase how dropping partitions impact your database:


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig9_HTML.jpg)


    *Figure 4-9: Dropping a partition in MariaDB*


    The point here is simple – our row resided in the third partition (see table structure),
    and once we’ve dropped the third partition, the row is no longer there. We’ve
    pruned data – woohoo!


    Cool – now you know a thing or two about partitions too. Now that you know what
    breaks your queries, you should be aware of things to avoid when optimizing them
    too – I’ll walk you through the things you need to know for optimization in the
    Optimization part of this book, but dipping your toes in the water before swimming
    never hurts.


    *Avoid repeating bad practices* – you will be aware of a set of bad database practices
    as you go along. They’re on almost every SQL blog; they’re mentioned in conferences,
    workshops, meetups, etc. They’re everywhere – almost every vendor will have a
    blog or two about bad practices that you should not repeat now or in the future
    too. In the database world, these include the fact that you should avoid selecting
    all columns if they’re not necessary (`SELECT column` instead of `SELECT *`),
    the fact that you should avoid using `LIKE` with leading wildcards, use `ORDER
    BY` on large sets cautiously (employ `LIMIT`ers), avoid using `COUNT(*)` with
    large data sets or on `InnoDB` tables as a whole (`MyISAM` is an exception to
    the rule since it stores an internal row count inside of itself – `InnoDB` does
    not), avoid `DISTINCT` on big data sets (look into `sort -u file.txt` on Unix
    – more on that in the optimization part), and keep in mind that MySQL doesn’t
    keep you from putting multiple types of indexes on the same column.


    *Avoid complicating things* – SQL is based on standards. ACID has been here for
    decades and is unlikely to go away any time soon either. The same can be said
    about almost all SQL queries you will find yourself using, the same about backups,
    security, and so on. Things change – but basic things remain the same. Why reinvent
    the wheel to achieve a goal when you can employ advice that has been tried and
    tested hundreds of times?


    *Avoid over-optimizing your database**.* Seriously – there are so many people
    suggesting you optimize your database that way, optimize another way, don’t use
    that, etc., and you can be pretty confident that as time goes by there will be
    a lot more of those people giving you advice. Not all of that advice is credible
    – keep in mind that even MySQL makes mistakes sometimes (if you want some proof
    of that, have a glance at [thousands of MySQL bugs here](https://bugs.mysql.com/)),
    so before taking any advice, ensure that you receive it from a credible source.
    Once you receive the advice you think is necessary to solve your problem, make
    sure to apply it as shown (if you don’t, you risk running into further issues),
    run the code in a local environment first to make sure it runs without any issues
    and doesn’t corrupt production data in the process, and trust your previous experience
    too. If adding an index on a column solved a certain performance-related problem
    last time, try it now. See if it works.


    *Always compare the advice you receive to the recent version of the documentation*
    – and while there are instances where the documentation may mislead you (example
    below), in most cases, it’s written by competent people who have multiple decades
    of experience in the field that have close ties to the people who built the product
    in the first place. Trust, but verify.


    ### Don’t Blindly Trust Documentation


    Documentations are awesome – they help us to better understand products; there’s
    no question about that. That’s what they’re supposed to do! One thing you will
    hear when you are after advice of any sort concerning query performance is that
    you should read the documentation of the product in question. This piece of advice
    is not bad at all – after all, the documentation should be written by the people
    who work at the company that built the product, right?


    That’s not always the case: [I want you to dig into an older example about the
