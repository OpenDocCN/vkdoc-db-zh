- fmt: 'To let you in on a secret, `that’s exactly how CDN-based firewalls operate,
    too, just instead of including a file in every file you need to protect, they
    use DNS servers to filter the traffic.` Again – the context is the same and the
    actions taken by the firewall are also largely the same; it’s just the approach
    that differs. Oh, and you may save a couple thousand dollars too (and learn something
    in the process). Win-win, isn’t it?


    ## Summary


    In this chapter, we revisited general security guidelines applicable to MySQL
    and MariaDB and familiarized ourselves with access control, user security, components,
    and plugins that keep our data safe, and also security controls applicable to
    our database. Each of those things has a place in your database, and each of those
    things may be applied differently to a different use case, which is why now I’ll
    walk you through security guidelines applicable to specific use cases and teach
    you how to further secure your database instance.


    # 17. Securing Your Database Instance


    Now that the basics of security are out of the way, let’s dig deeper into how
    you can secure your most precious assets from data theft. In this chapter, I’ll
    walk you through numerous methodologies that will help you apply security guidelines
    for your specific use case, we’ll dig more into account categories, password management,
    account locking, security plugins, backups, SQL injection, and other attacks that
    may someday target your database instance.


    ## Security Guidelines for Specific Use Cases and Defense in Depth


    Truth be told, security guidelines and appliances often have to be applied and
    used differently depending on the use case. Think about it – having your things
    stolen because you’ve left the door unlocked and went on vacation for a month
    and having your things stolen because you’ve been threatened at gunpoint is different,
    right? The same can be said about security – while basic security principles don’t
    change, some principles may have to be applied differently depending on your use
    case. For easier understanding, I’ve split everything into a table once again:


    | Use Case/Scenario | Applicable Guidelines |

    | --- | --- |

    | A simple calculator belonging to an individual | The basics of security, input
    sanitization for XSS, SSL, if the app is behind a login, GDPR. |

    | Course-selling company | GDPR is not applicable if the company doesn’t store
    client data (e.g., stores only course-related information such as the duration,
    price, etc., and people enquire using a form) or is based outside the EU and doesn’t
    work with data from EU citizens. May make use of NIST. The basics of security,
    SSL, input sanitization, OWASP Top 10 if applicable. |

    | A directory (listing) of cars with a search functionality belonging to an individual
    who created the application as a hobby | The basics of security, OWASP Top 10,
    input sanitization. |

    | An e-shop selling any kind of product belonging to an organization | GDPR, NIST,
    OWASP Top 10, input sanitization, and firewall appliance. Possibly enterprise-level
    solutions such as MySQL Enterprise Audit and/or MySQL Enterprise Firewall. |


    As you can see, not all use cases necessitate enterprise-level solutions such
    as Enterprise Audit/Enterprise Firewall, and not every use case necessitates NIST
    and/or GDPR. With that being said, every appliance whether it targets the web
    or not will necessitate security measures being taken – the extent of those security
    measures depends on the specifics of the application, so make sure to carefully
    evaluate your use case before choosing to do one thing or another in the security
    space. Knowing the best practices applicable to your use case isn’t rocket science
    – you just need to look at your use case from a bird’s eye view and with a clear
    head. You can also ask a friend to take a “fresh look” if you’d like – perhaps
    there’s something you’ve missed?


    Security experts will also be aware of defense in depth which aims to layer a
    set of security mechanisms to further the security of an application and protect
    the data stored within that application. The concept of defense in depth is that
    if one layer of security/defense fails, others will still be in place to disrupt
    a potential attack. Here’s an example – say we have a basic web application with
    a login form using a web-based firewall (WAF) that is hashing user passwords with
    BCrypt. Its login forms are protected from brute-force attacks; aside from username/password
    forms, the application requires a two-factor code to log in; once a login is initiated,
    the app checks for a geolocation match for the user (if the location doesn’t match
    the location used when registering, access is denied); and users who haven’t been
    active for more than 5 minutes are automatically logged out. Judging by that,
    we can safely say that


    1.  If an attacker finds a security flaw on the website, he will have to bypass
    the firewall to exploit it and “bear fruits,” which is a tough feat.

    2.  If the attacker bypasses the firewall and wants to find the username/password
    of an administrative user, he will have to exploit the flaw such that he possesses
    a username and a BCrypt hash of the user (presumably by using SQL injection) because
    brute-force attacks won’t work. His actions would be somewhat limited thanks to
    the firewall.

    3.  If an attacker successfully mounts an SQL injection attack such that he’s
    granted access to the database, he’d have to extract data from the database, and
    if the user he’s using doesn’t have the `SELECT` privilege (`SELECT` queries are
    necessary to dump data out of the database), he’s out of luck.

    4.  If the user accessed by the attacker has all privileges and he’s able to extract
    a username/hash combination, he’d need to “crack” that BCrypt hash. Brute-force
    attacks on a BCrypt hash would be very time-consuming to accomplish (the same
    can’t be said about hashes like SHA1 or MD5).

    5.  Even if the attacker cracks the BCrypt hash, obtains the password of the user,
    and wants to log in to the administration control panel, he’d quickly be stopped
    by a two-factor authentication window which would send an SMS/email message to
    the account owner with an ID that needs to be entered.

    6.  Even if an attacker would somehow possess the 2FA ID code by accessing the
    email/phone of the owner, it’s possible that the control panel wouldn’t provide
    the attacker with anything “of interest” to begin with.


    Is cracking all of these steps worth the time for an attacker? The most likely
    answer is no, and it’s all thanks to your Defense in Depth practices.


    ## Account Categories and Reserved Accounts


    Aside from roles, users of newer versions of MySQL and MariaDB should also be
    familiar with account categories and reserved accounts.


    MySQL is surrounded by a concept of account categories of which there are two
    – we have system users and regular users. In other words, a user in MySQL can
    either be a system user or a regular user and that’s distinguished by whether
    a user has the `SYSTEM_USER` privilege or not:


    ```

    GRANT SYSTEM_USER ON [database].[table] TO [username];

    ```


    Accounts without the privilege will be regular users – accounts with the privilege
    will be system users. Easy, right? With that being said, keep in mind that the
    `SYSTEM_USER` privilege is only accessible for users of MySQL and not people using
    the MariaDB ecosystem because MariaDB will error out instead.


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig1_HTML.jpg)


    Figure 17-1


    Granting a `SYSTEM_USER` privilege in MariaDB


    However, both MySQL and MariaDB do offer the concepts of reserved accounts and
    roles. One should consider an account to be “reserved” if it’s exclusively used
    for administrative purposes, accounts that are used internally by some features
    of MySQL or MariaDB, and others. Reserved accounts in MySQL and MariaDB are as
