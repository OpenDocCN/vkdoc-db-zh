- fmt: 'Ask any experienced DBA "How do I secure MariaDB upon installation?" and the
    first answer you’re going to hear will have something to do with a Unix script
    called `mariadb-secure-installation`. The downside of this script is that it’s
    only available on Unix (Linux) architecture, and you won’t be able to make use
    of its features on Windows-based servers (Windows users can complete some of the
    steps themselves to achieve similar results), but that doesn’t negate its usefulness.
    The script can be invoked by typing `mariadb-secure-installation` without any
    additional arguments, and when invoked, will guide you through the actions you
    need to perform to secure a freshly installed instance of MariaDB. The script


    1.  Allows you to change the password for the main user of your database (the
    `root` user.) Make sure that the password used by the `root` user is strong.

    2.  Removes anonymous users inside of MariaDB. This step is important because,
    by default, fresh installations of MariaDB will include an anonymous user (i.e.,
    enable anyone to log in to the server without an account.) No production environment
    should contain anonymous accounts.

    3.  Sets boundaries for the `root` user and only allows him to connect from `localhost`
    and not from other places.

    4.  Removes the database named “test” that can be accessed by anyone. As its name
    suggests, this database is set up for testing purposes and should be removed in
    a production environment.

    5.  Reloads the privilege tables (saves all changes made through the completion
    of previous steps).


    These steps will mark the beginning of your security journey with MariaDB. Yes,
    they’re nothing revolutionary, but they will help you set a strong footing when
    beginning to build anything MariaDB-based. If you’re running MariaDB on any Unix
    server, always run `mariadb-secure-installation`, and after securing your MariaDB
    installation, make sure to put security first in all phases of your application
    – architect, design, and implement all of your systems with security in mind.
    Be mindful of the libraries and frameworks used by your application, code to reduce
    attack surfaces, sanitize all inputs provided by the user, never provide direct
    user input to the database, parameterize, encode output if necessary, validate
    input, harden your environment, and if applicable, add a firewall on your application,
    on your database, or both. I’ll walk you through the security measures you can
    take in the security part of this book.


    ## General Security Measures


    After your MariaDB installation is safe, it’s time to follow general security
    measures when building any applications interacting with this database management
    system. Follow these rules:


    1.  Never provide user input straight into a database and always sanitize user
    input before passing it on to a database or/and tables within.

    2.  If you store user data, store only what’s necessary and encrypt or hash sensitive
    data such as passwords. Consider salting data if you have more (~thousands) of
    users.

    3.  Limit user privileges and build upon the “must know” principle: if the answer
    to the question “Does this user have to know this?” begins with “No,” don’t show
    them the information and restrict their access. Remember – the fewer people access
    sensitive data, the less probability for it to be stolen.

    4.  Code systems that are secure by design and harden them whenever applicable/possible
    – “security by design” means that security is integrated into systems from their
    inception and is not an additional thing that is “built” on top of them.

    5.  Code for performance, but keep security in mind. Have a look through the recent
    edition of `OWASP` top 10 and apply those principles to your application at every
    corner possible. Handle errors properly and be careful about exposing potentially
    sensitive data to the end user.

    6.  Make use of threat modeling – after you’re done working on a specific feature
    within your software, examine your code for security vulnerabilities and, better
    yet, ask a security-minded friend to review the code for you. Perhaps he’d notice
    a vulnerability that crossed your eyesight?


    Follow these security measures and you will certainly ensure a bright future for
    both your application and database; however, do keep in mind that these steps
    and measures are only the tip of the iceberg. To ensure that your application,
    database, and the data within are safe, ensure that you instruct your developers/employees/users
    on safety measures benefitting them in their specific scenario, and stay updated
    in the security space by reading cybersecurity news to keep on top on whatever
    is happening within the industry.


    Over time, the advice to further the security within your application and/or database
    may change, basic fundamentals will likely stay intact. Keep in touch with the
    industry, attend conferences, workshops, and seminars, read blogs, books, and
    whitepapers, and you will have a nice head-start toward security in the database
    realm.


    ## Summary


    Optimizing MariaDB for security may seem like a tough feat; however, when you
    discern the things behind the security landscape of the database management system,
    you quickly realize that everything’s simpler than it sounds.


    Security in MariaDB doesn’t require you to be a senior-level security engineer
    to protect all of your assets: all you need is to follow general security advice,
    then advice relevant to your specific use case/scenario and you should be good
    to go.


    With that being said, the optimization part of this book is effectively over –
    now we’re reaching the hacking security realm.


    # Part IV Securing MySQL


    ## 16. The World of Security in MySQL


    Now that you’re somewhat aware of the security world within MariaDB, it’s time
    to dive deeper into the things you can do to secure your relational database management
    system, isn’t it? In this chapter, I’ll provide you with a deeper dive into the
    general security guidelines we’ve talked about, then talk more about access control
    and user security, walk you through MariaDB components and plugins that help you
    keep your data safe, talk about using firewalls together with MariaDB or MySQL,
    and walk you through a couple of enterprise-level security controls. After that,
    we’ll dip into security guidelines for specific use cases, talk about password
    management, account locking, security plugins, and backup security and attacks
    targeting your database.


    ### General Security Guidelines and Measures Revisited


    So, where did we stop? Right – I’ve walked you through general security guidelines
    and mentioned secure coding practices. The truth is, if you want to build a secure
    database, the things you need to start from aren’t exactly related to the database
    to begin with: security must be built-in into everything you do. Remember when
    you first started thinking about the project? About its features? It’d be great
    if you thought of security guidelines applicable to your use case before developing
    those features. Contrary to popular belief, that’s not very hard to do if you
    just act on standards like `OWASP` or the `NIST` framework. Standards will ensure
    you won’t drown in the loads of features you need to implement/work on and if
    you follow them properly, you will enhance your database security, the privacy
    of your users, and the safety of your code by multiple times. Following standards
    like the `OWASP Top 10` or the `NIST` framework isn’t a bad practice, but it depends
    on where you apply them.


    The `NIST` framework will be very useful for those running a business or managing
    it because the framework is designed to make businesses of all sizes better understand,
    manage, and reduce the risk of cyber-attacks and better protect their assets.
    The `NIST` framework has five different aspects:'
