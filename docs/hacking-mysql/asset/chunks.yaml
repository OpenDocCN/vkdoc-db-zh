    您将要加载数据到数据库中的文件很可能是文本（`.txt`）或 Excel（`.csv`）文件——并非文件中的所有列都可能对您的使用场景必要，但文本或 Excel
    文件的大小无论如何都会比包含您数据的表要小，原因多样，从您选择的排序规则和字符集开始，到您可能选择使用的分区和索引结束。请确保您已准备好，并愿意为了大数据的速度而牺牲磁盘空间。`这会很痛苦。`


    解决了`secure-file-priv`的问题后，您将使用`LOAD DATA INFILE`查询将数据插入到您的表中。我并不是在下最后通牒，但问题是您没有其他选择——`INSERT`
    SQL 查询在数据量达到一两千万条记录之前都能正常工作，然后，在等待数据插入的过程中，您会去煮咖啡、去买菜然后回来、看一集您最喜欢的电视节目、跑跑腿，然后会发现进度甚至还不到一半。当然，高级用户不会让他们的服务器（如果是本地工作站，则是
    PC）一直开着，Linux 用户会熟悉`nohup`——“不挂起”命令（查询末尾的“&”具有相同效果）——它会在 Linux 用户注销后忽略 HUP（“挂起/停止”）命令，以便您的`INSERT`语句能一直运行，但这只是掩盖了问题。一批在后台运行的`INSERT`查询肯定会阻碍操作——那该怎么办？`SHOW
    STATUS`, `KILL`？糟糕。只有一半数据导入了。您下周要重新开始吗？您知道的，那时会多出两天，您能确保没人会使用您的应用程序，或者您本地的 MariaDB
    powerhouse 不需要关机。这可以说是小问题演变成了噩梦场景。


    说真的，赶紧把`INSERT`切换成`LOAD DATA INFILE`吧——它能毫无麻烦地插入原始数据，并允许您为正在导入的特定文件定义排序规则，只将数据导入特定列，跳过行/列，以及诸如此类的功能。翻回上一章以保持您的知识更新，您会很快同意——`LOAD
    DATA INFILE`拥有处理将大数据集导入 MariaDB 所需的一切，而且您会注意到，较大数据集的备份也不是以逻辑备份的形式出现的——大数据的形式非常适合`LOAD
    DATA INFILE`！那么，您还在等什么？`对于任何可以用你能想到的任意字符分隔（这种分隔对于 MariaDB/MySQL 确定一列结束和另一列开始是必要的）的、文本或
    Excel 格式的原始数据集，请使用 LOAD DATA INFILE。`


    无论如何，你们中的一些人可能不得不使用`INSERT`命令——如果您要插入数百万行，请利用前面章节中概述的关于`INSERT`查询的技巧，并且永远、*永远*要考虑到磁盘空间。完成了？很好——是时候读取您的大数据集了！


    ## 使用 MariaDB 读取大数据


    当您准备通过大数据集运行`SELECT` SQL 查询时，您可能会惊讶地发现，读取较大数据集与读取普通数据没有太大区别。看看这段描绘 PHP 中`foreach`循环的代码。


    ![](img/625040_1_En_10_Fig1_HTML.jpg)


    *图 10-1：循环中的 SQL 查询*


    这个循环做了几件事：


    1.  它获取一组以逗号（“,”）符号分隔的表，并分别处理每个表（这是“喂养”`SELECT`查询所必需的）。

    2.  将表名提供给`SELECT`查询，获取之前用`Column`变量指定的列，并将其搜索请求绑定到 SQL 查询。

    3.  获取（“检索”）结果集并将结果放入`Results`变量中，然后可以根据需要访问和处理该变量。


    此查询之所以放在循环中，是因为我们有很多表需要查询，并且随着时间的推移，新的表可能会被添加到数据库中：这样，当添加新表时，不需要更新任何代码片段。也没有 SQL
    注入风险——因为只有 4-5 种搜索类型，并且它们都在白名单中（不可能提供其他值），所以在这方面我们也是安全的。


    这样的 SQL 查询在处理海量数据集时可以胜任工作——使它们脱颖而出的是它们尽可能简单这一事实。真的——没有大量的`JOIN`操作，没有 500 个`UNION`操作，或类似的东西。甚至连`LIKE`子句都不存在。这些子句*可以*存在，如果您的`SELECT`确实包含它们，只要您遵循使它们发挥最佳性能的规则（建议参考前一章），这也没问题，但对于这个特定的用例，不需要它们——这正是使上述查询如此高效的原因：通过一个经过良好优化的数据库进行操作的简洁方法。这些查询慢吗？通过添加`LIMIT`和/或`OFFSET`子句让它们读取更少的数据，为相关列添加一个或两个索引或分区，SQL
    查询返回结果的速度会比您眨眼还快。一切都很基础，不是吗？


    当然，您的`SELECT`查询可能需要使用`JOIN`子句从不同的数据库/表中读取数据，并且您可能也想使用`UNION`查询。看看这个查询示例：


    ```sql

    SELECT a.user_id, a.owner, a.pc_id AS computer_id,

    o.m_id as monitor_id, o.m_inch

    FROM computers AS a

    LEFT OUTER JOIN monitors AS b

    ON a.owner = b.owner and a.user_id = b.user_id and b.m_inch = 22

    WHERE a.cpu_ghz >= 3.4

    ```


    首先看看查询的格式化方式——这种 SQL 查询的格式化告诉您什么？由于格式化，可以清楚地看到首先选择了什么数据，以及在第一操作完成后我们寻找什么数据：首先，我们从`computers`表中选择数据，然后从`monitors`表中选择数据。


    假设两个表都有数亿行，您将如何优化这样的 SQL 查询？没错——您会将查询拆分成几部分，检查两个表的结构，然后运行`EXPLAIN`查询以深入了解具体情况，并像处理其他所有事情一样，牢记最后一章的建议来优化
    SQL 查询。很有革命性，对吧？


    实际上，您拥有的所有其他`SELECT`查询也是如此。一个常见的误解是，查询大数据集需要数百万个操作，您的数据库难以完成，因此应该把 MySQL 扔出窗外——深入内部，尽可能少地读取数据，并且不要忘记基础。您就可以开始了！


    ## 在 MariaDB 中更新大数据


    更新较大数据集也不是什么高深莫测的事情——还记得`UPDATE`子句吗？


    ```sql

    UPDATE `demo_table` SET [column] = [''value''] WHERE [specific details], [update
    multiple columns here] [LIMIT x]

    ```


    没有特定的`UPDATE FOR BIG DATA`子句——在这里，情况也是一样的。无论您的数据集有多大，`UPDATE`子句都不会改变——它们的内部功能保持不变，它们看起来一样并接受相同的参数——它们只是更新不同数量的数据。当然，有一些生活技巧可以用来完全避免它们，例如创建一个表并为列分配一个`DEFAULT`值，这样它就会默认预填充，而无需您完全处理该子句，但除此之外，在大数据集上执行`UPDATE`查询的最佳实践包括


    *   锁定表，分块更新数据，然后解锁它们：这种做法可能会使通过更大量数据进行的`UPDATE`操作更快。

