  trans: "\n## 术语与背景\n\n| 术语 | 含义 |\n| --- | --- |\n| Master 或 Master Server | 作为主要数据源的数据库服务器。\
    \ |\n| Slave 或 Slave Server | 作为 Master Server 只读副本的数据库服务器。 |\n| Source 或 Source\
    \ Server | 与 Master Server 相同。 |\n| Secondary, Secondary Server, Replica 或 Replica\
    \ Server | 与 Slave Server 相同。 |\n\n我敢打赌，你听说过上述大部分（或至少部分）术语，因为你们中的许多人会熟悉复制技术能提供什么。然而，你可能没有意识到的是，复制术语在过去几年中发生了一些变化：虽然许多\
    \ DBA 可能知道主-主和主-从拓扑，但你也应该知道，在 2020 年，MySQL 已经承认了诸如“master”和“slave”等初始术语的负面含义，并宣布团队正朝着实施众多术语更改的方向迈进，这些更改应该很快就会被引入\
    \ MySQL：团队还表示，他们正在考虑用“blocklist”替换“blacklist”一词，用“allowlist”替换“whitelist”一词。\n\
    \n这些词的引用不会在单个版本中全部删除，因为这根本不可能做到——根据 MySQL 团队的说法，新语法将成为推荐的语法，而不是替代方案。\n\n## 配置与实施复制\n\
    \n抛开语法问题不谈，要使复制发挥其作用，必须选择要实施的复制类型，然后根据需要进行配置。要配置和实施复制，你首先需要拥有两台或多台安装、配置并运行了 MySQL\
    \ 的服务器。\n\n一旦你确认 MySQL 已在两台服务器上安装、配置并运行，就可以开始配置复制了。在此示例中，我们将配置主从复制，之后我会介绍可能的复制类型。话虽如此，在\
    \ MySQL 中配置复制的基本步骤如下（请注意，Windows 架构上二进制日志的位置可能不同，可以在 `C:\\ProgramData\\MySQL\\\
    MySQL Server *.*` 或 my.ini 中配置的其他位置找到）：\n\n1. 备份 MySQL 或 MariaDB 中的现有数据，备份 my.ini\
    \ 或 my.cnf 文件，然后停止 MySQL（MariaDB）。\n\n2. 打开 my.ini 或 my.cnf，取消注释 `log_bin` 和 `server_id`\
    \ 选项。`server_id` 将使你的数据库能够在复制设置中区分多个服务器，而 `log_bin` 变量允许 MySQL 读取二进制日志，这是复制所必需的（目录可能不同）。另外，你可能需要通过\
    \ `binlog_do_db` 参数后指定数据库名称来包含你希望复制的数据库：\n\n    ```ini\n    [mysqld]\n    log_bin\
    \ = /var/log/mysql/mysql-bin.log\n    server_id = 1\n    binlog_do_db = testdb\n\
    \    ```\n\n3. 确保从（Slave）服务器上有一个拥有足够权限处理复制的用户，可以通过创建用户或如所示授予权限——请记住，我们使用 `mysql_native_password`\
    \ 而不是 `caching_sha2_password`，因为我们可能没有服务器之间的加密连接，并且 `FLUSH PRIVILEGES` 可以保存我们的权限：\n\
    \n    ```sql\n    CREATE USER '[username]'@'[slaveserver_ip]' IDENTIFIED WITH\
    \ mysql_native_password BY '[password]';\n    GRANT REPLICATION SLAVE ON *.* TO\
    \ '[username]'@'[slaveserver_ip]';\n    FLUSH PRIVILEGES;\n    ```\n\n4. 由于复制从日志文件中读取更改，我们需要检索其位置。为此，锁定数据库，以便位置在数据被修改时不会“移动”，可以通过运行类似\
    \ `FLUSH TABLES WITH READ LOCK` 的查询来实现。\n\n5. 然后，通过发出 `SHOW MASTER STATUS` 查询来获取二进制日志文件的状态信息。查询的输出应提供\
    \ bin 文件的名称，格式如 `mysql-bin.000002` 或类似，位置（例如，“761”或类似），以及其他参数，例如在 `Binlog_Do_DB`\
    \ 列中复制了什么数据库，或在 `Binlog_Ignore_DB` 列中忽略了什么数据库，以及其他信息。请记住显示的 bin 文件名称和位置，如果可能，将其复制并粘贴到另一个位置——你稍后会需要它。\n\
    \n6. 我们假设这是一个全新的主从配置，并且主服务器上还没有任何数据——因此，我们可以通过运行 `UNLOCK TABLES` 来解锁数据库。\n\n7.\
    \ 回到从服务器，打开 my.ini 或 my.cnf，将 `server-id` 变量的值更改为 2（数字不能冲突），然后将其他适用的变量设置为与主服务器相同的值（例如，`log_bin`\
    \ 变量应设置为 `SHOW MASTER STATUS` 查询中的 bin 文件值——在本例中是 `mysql-bin.000002`，`binlog_do_db`\
    \ 变量应设置为主服务器上 `Binlog_Do_DB` 变量的值，等等）。\n\n8. 仍在修改 my.ini 或 my.cnf 时，将 `relay-log`\
    \ 变量调整为从服务器内部日志文件的位置。如果你使用的是 Linux 架构，该值很可能是类似 `/var/log/mysql/mysql-relay-bin.log`\
    \ 的值。\n\n9. 保存更改并重新启动 MySQL 或 MariaDB。\n\n10. 指示从服务器二进制日志文件的位置及其内容。这是一个包含源自 `SHOW\
    \ MASTER STATUS` 查询值的单一查询——`SOURCE_USER` 和 `SOURCE_PASSWORD` 是你为复制创建的用户的用户名和密码值：\n\
    \n    ```sql\n    CHANGE REPLICATION SOURCE TO\n    SOURCE_HOST='ip_of_master_server',\n\
    \    SOURCE_USER='replication_user',\n    SOURCE_PASSWORD='replication_user_password',\n\
    \    SOURCE_LOG_FILE='mysql-bin.000002',\n    SOURCE_LOG_POS=761;\n    ```\n\n\
    现在你可以开始复制过程了！在从服务器上运行 `START REPLICA`，你应该就可以开始了。可以通过运行 `SHOW REPLICA STATUS` 来检查副本服务器的状态——当运行此类查询时，MariaDB\
    \ 将返回副本服务器的状态（例如，“Waiting for master to send event”，而 `Source_host` 和 `Source_user`\
    \ 将是主服务器的 IP 和用户名。\n\n如果你的主服务器有想要迁移的数据，可以使用 `scp` 将数据备份“上传”到从服务器（这里，`backup.sql`\
    \ 是你的备份名称，`slave_user` 和 `slave_ip` 分别是用户从服务器的用户名和 IP）。我将备份移动到 `/tmp/` 目录，以便简化即将进行的数据导入过程：\n\
    \n```bash\nscp backup.sql slave_user@slave_ip:/tmp/\n```\n\n完成后，返回从服务器，创建一个数据库，并从\
    \ `/tmp/` 目录导入备份。其余步骤不变。\n\n## 复制类型\n\n如前所述，MariaDB 和 MySQL 中的复制有几种类型：MySQL 支持\
    \ `同步`、`半同步` 和 `异步` 复制，而 MariaDB 支持 `异步` 和 `半同步` 复制选项，并提供对 `Galera Cluster` 的支持。\n"
- fmt: '# MariaDB 复制技术概述


    我已经向您介绍了同步、异步和半同步复制的秘密。就 Galera Cluster 而言，在 MariaDB 上，它只支持 `InnoDB` 存储引擎，尽管开发团队正在实验性地支持
    `MyISAM` 和 `Aria`。Galera Cluster 的缺点在于，该集群组件主要仅在 Linux 架构上可用，但它也有一些独特的优势，包括为用户提供几乎同步的复制，这意味着虽然复制是同步完成的，但数据库节点的写入和提交是异步或独立进行的。Galera
    Cluster 用户可以将读写操作定向到任何数据库节点；它基于认证的复制，失败的数据库节点会自动从数据库集群中移除，且不会对操作造成任何中断。


    考虑到 Galera Cluster 节点具有高可用性和可扩展性，它具有确保没有复制延迟的功能，并且根据上述定义的特性不会丢失任何事务，这就很容易理解为什么
    Galera Cluster 成为许多开发人员和 DBA 的首选解决方案。


    然而，MariaDB 中默认的复制类型是异步主从复制（主-副本复制）。它也支持主-主复制以及所谓的多主复制。


    MariaDB 中可用的“默认”复制类型也是 MySQL 用户最早可用的复制选项，它只需要你拥有一个主服务器和一个或多个副本（从属）服务器。在这种复制设置中，读写操作将分布在多个数据库服务器上，因此可以平衡数据库的负载。上面提供的设置复制的示例就是一个很好的主-副本数据库复制设置示例。


    另一种流行的数据库复制类型是主-主复制设置。这种类型的复制要求你至少有两台服务器充当“主服务器”（即接受读写查询）。每个主服务器可以运行多个副本服务器，同时利用异步复制能力。


    如果你有多个主服务器，你就必须使用 Galera Cluster，并享有上述所有特性。


    如果辨别 MariaDB 中每种复制类型的特性、优点和缺点似乎有点复杂；我也将所有内容整理到了下面的表格中：


    | 数据库复制类型 | 解释与特性 |

    | --- | --- |

    | 主从复制 | MariaDB 中的默认复制模式。当我们拥有一台主服务器和多台副本服务器时，就会使用这种复制设置。 |

    | 主主复制 | 一种至少有两台服务器充当主服务器的复制设置。每个主服务器可以拥有多个节点（从服务器）。 |

    | 多主复制 | 一种有多个数据库节点（服务器）充当主服务器的复制设置。任何 MariaDB 服务器都可用于读写数据。在 MariaDB 中，此设置与 Galera
    Cluster 相同。 |


    无论你选择使用哪种类型的复制，请记住，所有类型的复制在复制之前都会读取写入二进制日志的事件。因此，二进制日志是至关重要的部分，因为它记录了 MariaDB
    数据库中内容的修改。换句话说，二进制日志记录了其他服务器需要执行的数据变更，并使数据与主服务器保持一致。二进制日志驻留在 MariaDB 的 `datadir`
    中。


    在数据库世界中，复制领域也有一些其独有的概念：有“复制延迟”（延迟复制）的概念，有服务器具有全局事务 ID（`GTID`）的概念，有服务器读取包含对数据库所做所有更改记录的二进制日志的概念，等等——它们也很重要，因为在处理复制时，不可避免地会遇到它们。


    复制延迟很容易理解——顾名思义，这个术语指的是在设置任何类型的复制时，服务器与其他服务器不同步。“延迟”指的是服务器返回的状态与“当前”状态（可查看/使用的状态）之间的差异。当事情“不够快”时，就会发生复制延迟，例如，当副本接收或应用数据变更的速度不够快时，或者当主服务器无法足够快地向副本发送数据变更时，等等。


    可以通过最小化源数据库上的事务持续时间（使用我们讨论过的查询优化技巧——它们都适用）、最小化网络延迟或确保我们的磁盘 I/O 操作足够强大来减少复制延迟。


    当涉及到 `GTID` 时，它们指的是全局事务标识符，并且在整个复制拓扑中是唯一的。`GTID` 在事务写入二进制日志时“出现”，每个事务都会被分配一个自动递增的
    ID。自然地，这也意味着未写入二进制日志的事务不会收到 `GTID`。一旦一个带有 `GTID` 的事务在服务器上提交，就不会再执行具有相同 `GTID`
    的其他事务。对有些人来说，全局事务标识符类似于哈希值，每个 `GTID` 的表示形式如下：`hash-like source_id:transaction_id`，它将由一个服务器标识符（很可能是
    `server_uuid`）和一个数字事务 ID 组成。事务 ID #1337 表示它是服务器上提交的第 1337 个事务：


    ```

    7B17FA77-84FD-44D7-9B11-N65FF2978613:1337

    ```


    ## 复制注意事项与技巧


    尽管复制功能强大，但事先有几件事你应该注意，以免淹没在它的能力之中！


    复制提供的远不止几个自动递增的 `GTID`；复制要求在主服务器上启用二进制日志，而这样做时，每个副本服务器都会给主服务器增加一些负载。从高层来看，复制的工作原理如下：


    1.  主服务器读取其二进制日志并注意到数据的更改。

    2.  从（副本）服务器将二进制日志事件复制到其中继日志。

    3.  从（副本）服务器重放中继日志中的事件，从而更新其数据。


    二进制日志通知副本数据的更改，然后这些更改被读入中继日志——中继日志中的事件被重放，数据得到更新。二进制日志文件和中继日志文件通常以相同的方式格式化，在 MariaDB
    中，可以通过运行类似 `SHOW RELAYLOG EVENTS` 的查询来检查中继日志事件——在这种情况下，空的结果集将表明复制尚未设置。


    ![](images/625040_1_En_14_Chapter/625040_1_En_14_Fig1_HTML.jpg)


    图 14-1

    MariaDB 中的 SHOW RELAYLOG EVENTS


    一旦复制设置完成，它总是涉及多个数据库服务器和必须配置为连接并从主服务器读取的账户（请参阅下面标题中的说明）。所有这一切意味着，从高层次来看，复制看起来是这样的。


    ![](images/625040_1_En_14_Chapter/625040_1_En_14_Fig2_HTML.jpg)


    图 14-2

    关系数据库管理系统中的复制'
  raw: 'I’ve already let you in on the secrets of synchronous, asynchronous, and semi-synchronous
    replication, and as far as Galera Cluster is concerned, on MariaDB it only supports
    the InnoDB storage engine though the team is experimenting with support for MyISAM
    and Aria. The downside of the Galera Cluster is that the cluster appliance is
    largely only available on Linux architectures, but it has a couple of upsides
    unique to itself including providing its users with virtually synchronous replication,
    meaning that while replication is done synchronously, database nodes are written
    and committed to asynchronously, or independently. Users of the Galera Cluster
    can direct reads and writes to any database node, it’s based on certification-based
    replication, and failed database nodes are automatically removed from the database
    cluster without any kind of interruption to operations.


    Taking into account that Galera Cluster nodes are highly available and scalable,
    that it has features ensuring no replica lag, and its ability to not lose any
    transactions as per the features defined above, it’s easy to see why Galera Cluster
    is the go-to solution for many developers and DBAs, too.


    The default type of replication available within MariaDB, though, is asynchronous
    master-slave replication (primary-replica) replication. There is also support
    for master-master replication and the so-called multi-master replication as well.


    The “default” type of replication available within MariaDB was also the very first
    replication option available for the users of MySQL and only necessitates you
    to own one primary server and one or more replica (slave) servers. In such a replication
    setup, both read and write operations will be distributed across multiple database
    servers, and as such, the load for the database would be balanced. The example
    of setting up replication available above is a good example of a primary-replica
    database replication setup.


    Another popular type of database replication has to do with a master-master replication
    setup. This type of replication requires you to have at least two servers that
    act as “masters” (i.e., that accept read and write queries). Each primary (master)
    server can run several replica servers while taking advantage of asynchronous
    replication capabilities.


    If you have multiple primary servers, you would have to make use of Galera Cluster
    and have the benefit of all of the features described above.


    If discerning the features, the upsides and downsides of each type of replication
    in MariaDB seem a little complex; I’ve also split everything into the table below:


    | Type of Database Replication | Explanation and Features |

    | --- | --- |

    | Master-slave replication | The default mode of replication in MariaDB. Such
    a replication setup is in use when we possess one primary server and multiple
    replica servers. |

    | Master-master replication | A replication setup with at least two servers acting
    as primary servers. Each primary server can have multiple nodes (slave servers).
    |

    | Multi-master replication | A replication setup where there is more than one
    database node (server) that acts as a primary server. Any MariaDB Server may be
    used to both write and read data. In MariaDB, this setup would be the same as
    the Galera Cluster. |


    No matter what type of replication you elect to use, remember that all types of
    replication will read events written to the binary log before replicating them.
    As such, the binary log is the crucial part as it remembers the modifications
    of contents within a MariaDB database. In other words, binary logs record changes
    to data that have occurred to be executed by other servers and bring the data
    to a consistent manner with the primary server. Binary logs reside in the `datadir`
    of MariaDB.


    In the database world, replication is also home to a couple of concepts unique
    to itself: there is a concept of “replication lag” (delayed replication), a concept
    of servers having a global transaction ID (GTID), a concept of servers reading
    the binary log that contains a record of all of the changes made to the database,
    and others – they’re also important because when dealing with replication, coming
    across them is inevitable.


    Replication lag is quite easy to understand – as the title suggests, this term
    refers to servers being out-of-sync with other servers when any kind of replication
    is set up. The “lag” refers to the difference between the state a server is returning
    and the “current” state of the server (the state available to see/use). Replication
    lag occurs when things aren’t “fast enough,” for example, when the replicas don’t
    receive or apply changes to data fast enough, when the master server can’t send
    data changes to the replicas fast enough, etc.


    Replication lag can be reduced by minimizing the duration of transactions on the
    source database (use the query optimization tips we’ve talked about – they’re
    all applicable), minimizing network latency, or making sure our disk I/O operations
    are powerful enough.


    When it comes to GTIDs, they refer to global transaction identifiers, and they
    are unique across the entire replication topology. A GTID “appears” when a transaction
    is written to the binary log and every transaction will be assigned an auto-incrementing
    ID. Naturally, this also means that transactions not written to the binary log
    will not receive a GTID. Once a transaction with a GTID has been committed on
    a server, no other transaction with the same GTID will be executed. For some,
    global transaction identifiers can be similar to hashes, and each GTID is represented
    like so – `hash-like source_id:transaction_id` and will consist of a server identifier
    (most likely `server_uuid`) and a numeric transaction ID. A transaction ID of
    #1337 means that it’s the 1337th transaction to be committed on the server:


    ```

    7B17FA77-84FD-44D7-9B11-N65FF2978613:1337

    ```


    ## Replication Notes and Tips


    Just as replication is powerful, there are a couple of things you should take
    note of beforehand to not drown in its capabilities!


    Replication offers so much more than just a few auto-incrementing GTIDs; replication
    requires binary logging to be enabled on the master server, and as that happens,
    each replica server adds some load onto the primary server. On a high level, replication
    works like so:


    1.  The primary server reads its binary log and notices changes to data.


    2.  The slave (replica) server copies the binary log events to its relay log.


    3.  The slave (replica) server repeats the events in the relay log, thus updating
    its data.


    The binary log notifies the replica of changes to data, which are then read into
    the relay log – events in the relay log are replayed, and data is updated. The
    binary log files and the relay log files are generally formatted in the same way,
    and relay log events in MariaDB can be inspected by running a query like `SHOW
    RELAYLOG EVENTS` – in this case, an empty result set will indicate that replication
    isn’t set up.


    ![](images/625040_1_En_14_Chapter/625040_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    SHOW RELAYLOG EVENTS in MariaDB


    Once replication is set up, it will always involve multiple database servers and
    accounts that must be instructed to connect to and read from the primary server
    (see instructions in headings below). All that means that at a high level, replication
    looks like this.


    ![](images/625040_1_En_14_Chapter/625040_1_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Replication in relational database management systems'
