- fmt: '# 17. 安全与数据库


    | 数据清理函数 | 解释 |

    | --- | --- |

    | `filter_var()` | `filter_var()` 函数允许开发者判断某个变量是否符合选定过滤器的格式。例如，`filter_var($variable,
    FILTER_VALIDATE_BOOLEAN)` 会在变量是布尔值时返回 `true`，否则返回 `false`，使开发者能够根据函数返回的值在返回 `false`
    时返回错误。 |

    | `filter_input()` | `filter_input()` 函数允许开发者判断用户提供的输入是否符合选定的过滤器。例如，`filter_input(INPUT_GET,
    $user_provided_value, FILTER_SANITIZE_SPECIAL_CHARS);` 会过滤并清理通过 GET 参数传递的 `$user_provided_value`
    变量中的任何特殊字符。 |

    | `htmlspecialchars()` `htmlentities()` | `htmlspecialchars` 将字符串中的所有特殊字符转换为 HTML
    实体。`htmlentities` 通过将字符串中所有适用字符转换为 HTML 实体而起到类似作用，从而在此过程中防止跨站脚本（XSS）攻击。 |

    | `mysqli_real_escape_string()` | `mysqli_real_escape_string()` 转义特殊字符。此函数的独特之处还在于它会考虑数据库中的字符集，因此它有其优点，但请记住，保护数据库免受
    SQL 注入攻击的最佳方法是使用参数化语句（更多信息请参见 SQL 注入的边界情况）。 |


    对用户输入字段进行清理是有帮助的，但当涉及 SQL 注入时，建议使用预处理语句来防止此类攻击。预处理语句如下所示（基于 PHP 的示例）。


    ![](images/625040_1_En_17_Chapter/625040_1_En_17_Fig5_HTML.jpg)


    图 17-5


    PHP 中的参数化语句


    上面的代码做了几件事：


    1.  连接到数据库服务器。

    2.  将通过 POST 请求传递的用户输入赋值给两个参数。

    3.  将 SQL 查询参数化以接受两个参数，因为提供了两个用户输入值。

    4.  将两个参数绑定到 SQL 查询中并执行（我们使用 “s” 来指定字符串值，但也可以用 `i` 指定整数，用 `d` 指定双精度值，或用 `b` 指定
    BLOB 值）。


    预处理语句使查询不再容易受到 SQL 注入攻击，因为*查询和用户输入被分别发送到服务器*，从而消除了 SQL 注入问题的根源。


    ### SQL 注入的边界情况


    `mysqli_real_escape_string()` 和输入参数化各有其独特的优势，但它们都不能解决你所有的数据库问题。如果使用得当，它们能够保护你的数据库免受
    SQL 注入攻击，但它们并不能禁止你将用户输入直接传递到数据库中。我曾见过有人使用 PDO 却在 SQL 查询中放入变量——在这种情况下，你还能指望保护吗？你刚刚抵消了之前所学到的一切！


    另外，请记住，*PDO 默认对 MySQL 使用模拟预处理语句*，这在极少数情况下（当使用 `gbk` 中文字符集时）可能会使问题恶化而不是缓解，因为上述字符集被认为是存在漏洞的，如果它正在使用，运行某些语句仍会导致查询成功执行，从而为另一次成功的
    SQL 注入攻击铺平道路。


    通过将 PDO 属性 `ATTR_EMULATE_PREPARES` 设置为 `FALSE` 来禁用预处理语句的模拟，从而禁用此行为：


    ```

    $PDO->setAttribute(PDO::ATTR_EMULATE_PREPARES, FALSE);

    ```


    或者，避免使用 `gbk` 字符集——更多信息可以在这里找到（[`https://stackoverflow.com/questions/5741187/sql-injection-that-gets-around-mysql-real-escape-string/12118602`](https://stackoverflow.com/questions/5741187/sql-injection-that-gets-around-mysql-real-escape-string/12118602)）。


    ## 针对数据库的其他攻击


    一旦你掌握了 SQL 注入如何被用来危害你的数据库，也要考虑其他攻击。攻击者不太可能将自己限制在单一的攻击向量上，如果注入攻击失败，他们几乎肯定会尝试其他攻击向量来窃取你组织的数据或访问你的应用程序。我在本书中已经介绍了其他攻击向量，我将再次重申我的建议：


    1.  **遵循最新的 OWASP Top 10 版本。** OWASP 不仅提供对应用程序和数据库造成最大影响的前 10 大安全问题列表，还提供围绕如何防止将概述的安全漏洞引入应用程序的可行提示，并就应用程序何时可能易受攻击、此类攻击可能发生的示例场景以及预防方法提供详细建议。如果确实发生攻击，OWASP
    提供的提示将为控制数据泄露的规模并保护你的应用程序免受安全漏洞的进一步利用提供一个良好的基础。

    2.  **注意旧版本的 OWASP 和其他安全相关框架。** 有些攻击可能会在排名列表中下降；有些可能会被包括在内。明智的做法是了解保护自己免受所有攻击的方法。例如，CSRF
    不是最新版 OWASP 的一部分，但这并不意味着这种攻击不再危险，对吧？

    3.  **利用防火墙解决方案。** 防火墙解决方案保护你的应用程序免受攻击者利用安全漏洞的攻击，因此，即使你的代码存在安全漏洞，它也无法被利用。你也不需要为你的用例选择最昂贵的防火墙解决方案——简单的东西就足够了。

    4.  **与安全工程团队交流，如果你能接触到的话。** 软件工程和数据库世界本身就可能很可怕——为什么不听听关于如何处理问题的新见解呢？

    5.  **为了持续掌握网络安全新闻，请关注安全博客**，例如由 [BreachDirectory](https://breachdirectory.com/blog/)、[Cybernews](https://cybernews.com)、[Rapid7](https://www.rapid7.com/blog/)
    等编写的博客。网络安全视频内容也是一个很好的起点。


    最重要的是，通过参加会议和研讨会、阅读你使用的产品的文档以及阅读像本书这样的书籍，继续教育自己关于软件、数据库和安全问题的知识——你永远不知道会遇到什么。


    你有能力打击针对数据库的攻击——运用你的知识来挫败它们。


    ## 总结


    本章引导你了解了保护数据库实例及其内部数据的各种方法。其中许多方法与遵循标准和遵循信誉良好来源的建议有很大关系。


    现在，让我为你介绍处理更大数据集时需要了解的更多内容——安全并未就此结束，不是吗？


