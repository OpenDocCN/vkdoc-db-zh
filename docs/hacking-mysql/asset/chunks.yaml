  trans: '

    向任何有经验的数据库管理员（DBA）提问“如何在安装后加固 MariaDB 安全？”，你听到的第一个答案通常会涉及到一个名为 `mariadb-secure-installation`
    的 Unix 脚本。这个脚本的缺点是它仅适用于 Unix（Linux）架构，你无法在基于 Windows 的服务器上利用其功能（Windows 用户可以手动完成部分步骤以达到类似效果），但这并不减损其有用性。可以通过输入
    `mariadb-secure-installation` 而无需任何额外参数来调用该脚本，调用后，它将引导你完成一系列操作，以确保新安装的 MariaDB
    实例的安全。该脚本：


    1.  允许你更改数据库主用户（即 `root` 用户）的密码。请确保 `root` 用户使用的密码是强密码。

    2.  移除 MariaDB 内部的匿名用户。这一步很重要，因为默认情况下，新安装的 MariaDB 会包含一个匿名用户（即允许任何人无需账户即可登录服务器）。任何生产环境都不应存在匿名账户。

    3.  为 `root` 用户设置限制，仅允许其从 `localhost` 连接，而不允许从其他位置连接。

    4.  移除名为“test”的数据库，该数据库可被任何人访问。顾名思义，该数据库是为测试目的而设置的，应在生产环境中移除。

    5.  重新加载权限表（保存通过完成前述步骤所做的所有更改）。


    这些步骤将标志着你与 MariaDB 的安全之旅的开始。是的，它们并非革命性的举措，但它们将帮助你在开始构建任何基于 MariaDB 的项目时奠定坚实的基础。如果你在任何
    Unix 服务器上运行 MariaDB，请务必运行 `mariadb-secure-installation`，并且在确保 MariaDB 安装安全后，请务必在应用的所有阶段都将安全性放在首位——在构建、设计和实施所有系统时，都要牢记安全。请注意你的应用程序所使用的库和框架，编写代码以减少攻击面，清理用户提供的所有输入，切勿将用户输入直接传递给数据库，使用参数化查询，必要时对输出进行编码，验证输入，加固你的环境，并且如果适用，在你的应用程序、数据库或两者之上添加防火墙。在本书的安全章节，我将指导你了解可以采取的安全措施。


    ## 通用安全措施


    在你的 MariaDB 安装得到加固之后，是时候在构建任何与该数据库管理系统交互的应用程序时遵循通用安全措施了。遵循以下规则：


    1.  切勿将用户输入直接传递给数据库，在将用户输入传递给数据库或/及其内部的表之前，始终进行清理。

    2.  如果你存储用户数据，只存储必要的数据，并对敏感数据（如密码）进行加密或哈希处理。如果你有更多（约数千）用户，请考虑对数据加盐。

    3.  限制用户权限，并基于“必须知晓”原则进行构建：如果对“这个用户必须知道这个信息吗？”这个问题的回答以“不”开头，就不要向他们展示这些信息，并限制他们的访问权限。记住——访问敏感数据的人越少，数据被盗的概率就越低。

    4.  设计上安全的系统，并在适用/可能时对其进行加固——“安全性内嵌于设计”意味着安全性从系统诞生之初就集成其中，而不是后来“添加”在上面的东西。

    5.  为性能而编码，但要牢记安全。浏览最新版的 `OWASP` 十大安全风险，并尽可能在每个角落将这些原则应用到你的应用程序中。妥善处理错误，并谨慎对待向最终用户暴露可能敏感的数据。

    6.  利用威胁建模——在完成软件中某个特定功能的开发后，检查你的代码是否存在安全漏洞，更好的是，请一位具有安全意识的朋友帮你审查代码。也许他会注意到一个你曾忽略的漏洞？


    遵循这些安全措施，你必将为你的应用程序和数据库确保一个光明的未来；然而，请记住，这些步骤和措施仅仅是冰山一角。为了确保你的应用程序、数据库及其中的数据安全，请确保你指导你的开发人员/员工/用户在其特定场景下受益的安全措施，并通过阅读网络安全新闻来保持对该领域最新动态的了解，以掌握行业内发生的任何事情。


    随着时间的推移，关于增强你的应用程序和/或数据库安全的建议可能会发生变化，但基本原则可能保持不变。与行业保持联系，参加会议、研讨会和讲座，阅读博客、书籍和白皮书，你将在数据库安全领域获得一个良好的开端。


    ## 总结


    为安全而优化 MariaDB 看似一项艰巨的任务；然而，当你洞察到数据库管理系统安全格局背后的实质时，你会很快意识到一切都比听起来简单。


    MariaDB 的安全性并不要求你必须是一名高级安全工程师才能保护你的所有资产：你只需要遵循通用安全建议，然后遵循与你的特定用例/场景相关的建议，就应该可以应对自如。


    至此，本书的优化部分实际上已经结束——现在我们将进入黑客安全领域。


    # 第四部分 保障 MySQL 安全


    ## 16. MySQL 的安全世界


    现在你对 MariaDB 内的安全世界已有所了解，是时候深入探讨你可以做些什么来确保你的关系数据库管理系统的安全了，对吧？在本章中，我将更深入地探讨我们之前讨论过的通用安全指南，然后更多地讨论访问控制和用户安全，指导你了解有助于保护数据安全的
    MariaDB 组件和插件，讨论将防火墙与 MariaDB 或 MySQL 结合使用，并指导你了解一些企业级的安全控制措施。之后，我们将探讨针对特定用例的安全指南，讨论密码管理、账户锁定、安全插件以及备份安全和针对你数据库的攻击。


    ### 通用安全指南与措施回顾


    那么，我们上次讲到哪里了？对——我已指导你了解了通用安全指南并提到了安全编码实践。事实是，如果你想构建一个安全的数据库，你需要从头开始的事情起初并不完全与数据库本身相关：安全性必须内置于你所做的一切之中。还记得你最初开始思考这个项目的时候吗？关于它的功能？如果你在开发这些功能之前就考虑到了适用于你用例的安全指南，那将是极好的。与普遍看法相反，如果你只是按照像
    `OWASP` 或 `NIST` 框架这样的标准行事，这并不难做到。标准将确保你不会淹没在你需要实现/处理的众多功能中，如果你正确地遵循它们，你将成倍地增强你的数据库安全、用户隐私和代码安全性。遵循像
    `OWASP Top 10` 或 `NIST` 框架这样的标准并非不良实践，但这取决于你将其应用在何处。


    `NIST` 框架对于那些经营或管理业务的人将非常有用，因为该框架旨在帮助各种规模的企业更好地理解、管理和降低网络攻击的风险，并更好地保护其资产。`NIST`
    框架有五个不同的方面：

