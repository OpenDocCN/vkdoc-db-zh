    does offer a storage engine dedicated to just that – it’s called NDB. The preceding
    “N” at the beginning is not there without a reason: the NDB storage engine stands
    for Network Database and comes with a shared-nothing architecture. NDB is a high-availability
    storage engine that is always connected to a data cluster, and that’s why it’s
    also referred to as NDBCluster.


