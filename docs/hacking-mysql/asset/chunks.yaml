    # SQLSTATE 码、MySQL 错误码与服务器配置


    ## SQLSTATE 码


    | SQLSTATE Code | 含义 |

    | --- | --- |

    | `01006/01007` | 权限未撤销/授予 |

    | `08006` | 连接失败 |

    | `42000` | 语法错误或违反访问规则 |

    | `23001` | 完整性约束违反 |

    | `25000/25001` | 无效的事务状态或存在活动事务时的无效事务状态 |

    | `25006` | 无效的事务状态：只读 SQL 事务 |

    | `2C000` | 无效的字符集名称 |

    | `40000` | 事务回滚 |


    细心的读者可能会注意到一个模式——有一个数字描述一般性错误，末尾还有一个额外的数字描述具体出了什么问题。如果你就是其中一员，那么你是对的！如果我们深入探究，很快就会发现
    `SQLSTATE` 码落在特定的范围内：


    | SQLSTATE 范围 | 解释 |

    | --- | --- |

    | `00000` | 操作成功完成 |

    | `01000-0102F` | 警告（class 01.） |

    | `02000 & 02001` | 无数据（class 02.） |

    | `07000-46130, HW000-HW007, HV000-HV091, HY000-HY108 and HYC00` | 异常（classes
    07,08,09,0A,0D-0Z, 10, 20-28, 2B-2H, 30, 33-36, 38 and 39 等） |


    每个 `SQLSTATE` 都有一个类别、类和子类。很酷，对吧？你们中的很多人可能甚至从未想过这一点！


    好消息是，你不必记住每个 `SQLSTATE` 状态的含义来帮助你的数据库（这真的可能吗？）——很好地掌握所涉及的内容就足够了，而你应该采取的路径会随着经验变得清晰。


    ## MySQL 错误码


    既然你知道了某些 `SQLSTATE` 的含义，以下是一些你也应该了解的 MySQL 错误码：


    | MySQL 错误码 (`mysql_errno`) | 解释 |

    | --- | --- |

    | `1004` | 无法创建或复制文件。 |

    | `1005` | 无法创建表。 |

    | `1007` | 无法创建数据库。数据库已存在。 |

    | `1008` | 无法删除数据库，因为它不存在。 |

    | `1016` | MySQL 在 InnoDB 数据文件中找不到该表。 |

    | `1022` | 表存在重复键。 |

    | `1036` | 表为只读。 |

    | `1037` | 服务器内存不足。 |

    | `1040` | 连接过多——检查并/或调整 `max_connections` 变量。 |

    | `1044/1045` | 你用于访问数据库的用户权限不足。 |

    | `1046` | 未选择数据库。 |

    | `1047` | 未知命令。 |

    | `1048` | 列不能为 NULL。 |

    | `1049` | 未知数据库。 |

    | `1050` | 已存在具有此名称的表。 |

    | `1051` | 未知表。 |

    | `1052` | 列不明确。 |

    | `1053` | 数据库正在关闭。 |


    看到我们有多少错误码了吗？这甚至还不是一个详尽的列表！我敢打赌，前面提到的一些 `SQLSTATE` 和 MySQL 错误码会看起来很熟悉。


    你们中的一些人可能会在这里产生有趣的想法，是的，你也可以故意模拟错误。还记得触发器吗？像这样的触发器怎么样：


    ```

    CREATE TRIGGER insert_trigger

    BEFORE INSERT ON users

    FOR EACH ROW

    BEGIN

    SIGNAL SQLSTATE ‘45000’ SET

    MYSQL_ERRNO = 32000,

    MESSAGE_TEXT = ‘Your INSERT query has failed. Haha, what a surprise!’;

    END;

    ```


    这样的触发器将阻止对用户表进行任何 `INSERT` 操作——这种想法可能并不高明，但如果你想在朋友面前展示你的 SQL 技巧，或者你在举办一两个研讨会时（你可能还需要在查询开头和结尾指定分隔符），它可能有用。


    ## 服务器组件及其与 MySQL 的交互


    在很好地掌握了你可能遇到的错误之后，你应该熟悉你的服务器组件以及它们如何与你的数据库交互。你已经了解了 `my.cnf` 的使用方法；然而，`my.cnf`
    的效果取决于你的服务器；你的磁盘、RAM、CPU 以及涉及服务器的其他所有东西同样会拖慢你的查询速度。


    以下是整个 MySQL 基础设施的样子：


    ![](img/625040_1_En_6_Fig1_HTML.jpg)


    图 6-1: MySQL 基础设施


    如你所见，几乎一切都由你的服务器支持——数据、索引和日志存储在 `/var/lib/mysql/[data]` 目录中。根据你使用的存储引擎，你可能会在数据目录中看到一些
    `.ibd` 文件，描述表的数据和元数据。


    其余的设置（解析器和优化器、全局和引擎特定的缓存和缓冲区等）也直接依赖于你的服务器设置：如果你使用 InnoDB，你的数据和索引很可能会与主表空间（`ibdata1`）分离，`ibdata1`
    将只包含元数据——此外，你还会看到文件 `ib_logfile0` 和 `ib_logfile1`，它们将用于在崩溃后恢复 MySQL 中的数据。


    ## 为 MySQL 选择服务器


    为 MySQL 选择服务器时，请考虑：


    *   **处理器：** 关注英特尔或 AMD 的现代 CPU，并根据对你重要的参数选择 CPU——考察时钟频率、缓存大小和其他因素。

    *   **运行内存大小：** 你的用例需要多少内存？当从任何托管服务提供商处选择服务器时，别忘了检查你有多少操作系统内存可供“使用”。

    *   **操作系统：** 请记住，你可以优化和更改的内容会根据服务器运行的操作系统而略有不同。话虽如此，大多数差异都是微小的。

    *   **硬盘驱动器：** 你的硬盘对性能有直接影响：它影响操作系统启动速度，影响 SQL 查询速度，还决定了你的数据库可以存储多少数据。这里涉及许多因素——好消息是存储空间便宜，这不是你应该过分纠结的事情：让自己了解基本概念，并着眼未来做出合理的决定。

    *   **带宽有多少？** 对你们中的一些人来说，带宽也是一个问题——在做出选择前咨询你的托管服务提供商，并记住 CDN 可以在必要时帮助你的服务器节省带宽。


    如果你的服务器能够自动扩展也会有所帮助——如果你达到了硬盘可用空间的上限，只需再添加一块硬盘即可！


    ## InnoDB 刷新方法与压力测试


    我还想强调测试你的 InnoDB 刷新方法的必要性——仅仅因为你邻居的 DBA 在他的项目中使用 `O_DIRECT` 选项，并不意味着你也应该使用相同的选项：`O_DIRECT`
    将以 `O_DIRECT` 方式打开数据文件，并使用 `fsync()` 刷新数据和日志。要跳过该选项，你可以使用 `O_DIRECT_NO_FSYNC`，或者使用
    `O_DSYNC` 选项打开和刷新日志文件，并使用 `fsync()` 刷新数据文件。想对所有涉及刷新的操作使用 `fsync` 系统调用吗？将刷新方法设置为
    `fsync`。更改刷新方法将改变 MySQL 执行刷新操作的方式，因此，你将能够观察到在涉及不同刷新级别时你的数据库行为如何。


    能够让你的数据库承受不同程度的负载吗？那就更好了！为此，使用 `mysqlslap`。我们将运行三次 MySQL 压力测试工具的迭代：


    1.  `mysqlslap --user=root --host=localhost --auto-generate-sql --verbose`

    2.  `mysqlslap --user=root --host=localhost --concurrency=100 --iterations=10
    --auto-generate-sql --verbose`

    3.  `mysqlslap --user=root --host=localhost --concurrency=50 --iterations=100
    --number-int-cols=5 --number-char-cols=20 --auto-generate-sql --verbose`


    第一次压力测试迭代以详细输出模式运行自动生成的 SQL 代码。第二次稍微复杂一些，有 100 个并发连接和 10 次 SQL 查询迭代。最后，第三次利用了
    50 个并发连接，进行 100 次迭代，包含 5 个数字列和 20 个基于字符的列。结果如何？


    ![](img/625040_1_En_6_Fig2_HTML.jpg)


    图 6-2: mysqlslap 的结果

