  trans: '

    ## 选择适当的模式与数据类型


    “恰当地选择正确的模式、字符集和数据类型”听起来很专业，但这具体意味着什么？对你来说，它意味着以下几点：


    1.  评估你的用例：你使用 MySQL 是为了什么？在许多情况下，你的用例在很大程度上决定了你选择某一种数据类型或排序规则，而不是另一种。


    2.  思考你的用例需要哪些数据库和表：你需要多少个数据库或表？为什么？


    3.  进行头脑风暴：思考你的表结构，研究你所使用的 MySQL、MariaDB 或 Percona Server 版本中可用的数据类型和排序规则，选择最贴近你用例需求的那一个。模式、数据类型和字符集并非一成不变，它们可以随时间而改变，因此要明智选择，但也不必过于担心。


    4.  考虑你的服务器：在进行头脑风暴以选择最佳数据类型或排序规则时，要考虑你的服务器情况——你有多少磁盘空间？你是否有计划扩展你的软件设施，从而在未来需要改变你的数据类型或排序规则？请记住，不同的数据类型占用不同的数据库空间——虽然现在这可能不重要，但当你有百万条或更多记录时，多出的
    100 字节就意义重大了。


    5.  做出选择：既然你已经理清了以上事项，现在就选择合适的数据类型和排序规则吧！


    恰当地选择数据类型和排序规则可能有些棘手，而简化这个过程会很有帮助。使用简单的推理并考虑未来。


    在思考选择何种数据类型时，要考虑你打算存储哪种数据，并选择最简单的解决方案。以下是你的选项：


    ### 用于 `数值` 数据的数据类型


    *   用于存储通用整数值的数据类型：`INTEGER` 或 `INT`、`SMALLINT`、`TINYINT`、`MEDIUMINT` 和 `BIGINT`。这里，一切都与取值范围相关。例如，`SMALLINT`
    可以存储从 -32768 到 32767 的有符号整数值，或从 0 到 65535 的无符号值；`TINYINT` 可以存储从 -128 到 127 的有符号值，或从
    0 到 255 的 `UNSIGNED` 值。请参考下面的提示和文档以获取更多信息。


    *   用于存储精确数值的数据类型：`DECIMAL` 和 `NUMERIC`。在存储精确数值时（例如，用于会计目的的数据）使用这些数据类型。


    *   用于存储近似值和浮点值的数据类型：`FLOAT` 和 `DOUBLE`。如果你存储的是单精度值，MySQL 需要四（4）个字节；如果存储的是双精度值，则需要八（8）个字节。


    *   `BIT` 数据类型。在存储 1 到 64 位的位值时使用 `BIT`，并通过定义 `BIT(number)` 在括号中指定你的范围，其中 `number`
    是 1 到 64 之间的数字。


    ### 用于存储 `日期` 和 `时间` 值的数据类型


    *   `DATE`、`DATETIME` 和 `TIMESTAMP` 数据类型。如果你存储的是没有时间的 `YYYY-MM-DD` 格式日期，请使用 `DATE`
    数据类型；如果你存储的是带时间值（`YYYY-MM-DD hh:mm:ss`）的此类日期，`DATETIME` 会帮到你；`TIMESTAMP` 工作方式相同，只是范围更小：它只接受从
    `1970-01-01 00:00:01` 到 `2038-01-19 03:14:07` 的值。所有值均采用 UTC 时间。


    *   `TIME` 数据类型，用于存储从 -838:59:59 到 838:59:59 的时间值。


    *   `YEAR` 数据类型，用于存储年份值。该数据类型的数据宽度为四个字符。


    ### 用于存储 `字符串` 值的数据类型


    *   `CHAR` 和 `VARCHAR` 数据类型指的是字符或可变字符值。这些数据类型很相似，这也是它们没有被分开提及的原因，但它们在最大长度和存储空间要求方面有所不同。`CHAR`
    值会填充空格至你选择的长度，检索时尾部空格会被移除，而 `VARCHAR` 则不是这样。使用 `VARCHAR` 时，如果值前面有空格，MySQL 也会发出警告。


    *   `BINARY` 和 `VARBINARY` 数据类型指的是二进制字符串；除此之外，它们与前面提到的 `CHAR` 和 `VARCHAR` 数据类型非常相似。


    *   `BLOB` 和 `TEXT` 数据类型指的是二进制大对象和较大的文本值。这类数据类型很相似，它们的名称以及其值的最大长度是对应的。它们也有相同的存储要求。有四种
    `BLOB` 类型：`TINYBLOB`、`BLOB`、`MEDIUMBLOB` 和 `LONGBLOB`；`TEXT` 类型也是如此。


    *   `ENUM` 数据类型指的是一个允许值的枚举列表。


    *   `SET` 数据类型可以具有在定义（集合）列表中指定的任何值。该列表最多可以有 64 个成员。


    ### 用于存储 `地理` 数据的空间（地理空间）数据类型


    *   `GEOMETRY`、`POINT`、`LINESTRING` 和 `POLYGON` 数据类型旨在保存单个几何值。


    *   `MULTIPOINT`、`MULTILINESTRING`、`MULTIPOLYGON` 和 `GEOMETRYCOLLECTION` 数据类型可用于保存多个几何值。请参阅文档以获取更多信息。


    ### `JSON` 数据类型


    `JSON` 数据类型适用于存储 `JSON` 数据。


    如你所见，你的选择范围很广——评估你的用例，考虑未来，并选择最简单的解决方案。换句话说，如果你打算存储电子邮件地址，`VARCHAR` 解决方案可能比 `TEXT`
    更合适；如果你存储的整数值不超过 30,000，`SMALLINT` 很可能就足够了；如果你存储的是带时间值的日期，`DATETIME` 可能就是你要找的选项，但存储不带时间的日期用
    `DATE` 就足够了。在许多情况下，最简单（最小）的数据类型就是最好的。


    ## 提示


    为数值数据选择整数数据类型时，请记住，这里一切都与 MySQL 接受的整数范围以及你存储的是 `SIGNED`（有符号）还是 `UNSIGNED`（无符号）值有关。有符号值包括
    0、正数和负数，而无符号值指的是 0 和正数。

    '
- fmt: '### Character Sets and Collations


    Once we’ve chosen our data types, we have to remember that every table has a character
    set and collation. Many developers conveniently forget about those – after all,
    character sets and collations are defined by default, so why bother?


    And that’s correct – MySQL does provide a character set and collation by default,
    but MySQL’s choices often aren’t the best. After all, no one knows your database
    better than yourself, right?


    Starting from character sets, MySQL and MariaDB offer a wide set of character
    sets you can choose from – there’s no need even to switch to a database to obtain
    the list of character sets you can use to power your data. Simply issue a `SHOW
    CHARACTER SET` query once you log in to MariaDB, and you will be provided with
    a list of all available character sets together with their descriptions, default
    collations, and maximum number of bytes required to store a single character.
    Take a look.


    ![Figure 3-1: A list of character sets and collations available in MariaDB](images/625040_1_En_3_Chapter/625040_1_En_3_Fig1_HTML.jpg)


    While the most likely choice for you and your database will be a character set
    that supports UTF-8 unicode (that’s `utf8mb4` with a collation of `utf8mb4_general_ci`),
    some use cases may require other character sets to be used. Dealing with data
    in Greek? Use the Greek character set with `greek_general_ci` as your collation.
    Dealing with customers from Israel who interact with data inside of your database?
    Use the Hebrew character set with `hebrew_general_ci` as your collation.


    For most general use cases, `utf8mb4` is your reliable partner. Back in the day,
    some engineers initially preferred `utf8`, but as `utf8mb4` became the standard
    collation method in MySQL, `utf8` slowly drifted away. There’s nothing “wrong”
    if you prefer to use `utf8` over `utf8mb4`; it’s just that the original implementation
    of `utf8` doesn’t support all Unicode characters – in most cases, you will be
    okay, but if come across scenarios where you need to store emojis or other characters,
    `utf8` won’t be enough since it only supports characters from the Basic Multilingual
    Plane (BMP) which doesn’t account for all Unicode characters, hence the implementation
    of `utf8mb4`.


    Take the maximum length of bytes required to store a character into account too
    – a difference of a couple of bytes may not seem like much, but if you’re storing
    bigger data sets, the bytes will mount up quicker than you imagine.


    Don’t want to use `utf8mb4` or have other plans for your database? Good news –
    the list given by MySQL is extensive, simple, and self-explanatory. Choose the
    character set and collation based on data you store in your database, think into
    the future, and you will be good to go.


    ## Your Architecture Is a Mess


    What do your schema, data types, character sets, and collations have in common?
    Right – they all form a bigger or smaller part of your database architecture as
    a whole. Your data, its schema, data types, character sets, and collations are
    all a part of your database architecture. Some of them make up a bigger part,
    some smaller, but they all play a role. To remember what the architecture of MySQL
    looks like, flick back to Chapter 1 and skim through the header “The Architecture
    of MySQL.” I’ll remind you that the architecture of your DBMS has three main parts
    them being the Client, the Server, and the Storage:


    1.  **Client**: We interact with MySQL using a CLI or by using a SQL client.


    2.  **Server**: Every query you run in your database management system is run
    through the server. Initially, your query passes through a thread handler, afterward
    – the query cache and the parser, the parser forwards everything through the query
    optimizer. This is the part where the optimizations of your MySQL Server come
    into the game too: remember `my.cnf`? `my.ini`? There’s a reason these files exist
    – these files contain the options used to make your MySQL Server able to consume
    a specified amount of resources on your server in the way you specify. Seems like
    a highway to paradise, right?


    3.  **Storage**: Finally, the storage engine running your database also has a
    point to make. For most of you, the storage part of MySQL will probably refer
    to InnoDB or Percona XtraDB and will be directly dependent on the options set
    in `my.cnf`.


    When investigating the architecture of your database, it’s crucial to look at
    the things inside your server. Imagine your server could speak – what would the
    databases and the data within them ask you?


    *   When was the last time you inspected the structure of your tables?


    *   Take a look at the structure of your tables again. Are all columns you have
    necessary for your use case?


    *   What indexes are visible once you inspect your table structure? Do you know
    why they are in place?


    *   What character sets and collations are used in your database? Why?


    *   If you have more than a couple million rows in your database, are your tables
    normalized? If yes, what normalization form do you use and why? If no, why?


    Inspecting your database architecture isn’t rocket science, and the questions
    you need answers to aren’t complex. That’s the entire beauty – you don’t need
    to invent a bike when optimizing MySQL, but make sure that you use proper character
    sets and collations, employ indexes wisely, partition your tables if you run bigger
    data sets, and normalize your data where necessary. That’s it – you’re off to
    a good start!


    Now you need to learn how to properly communicate with your database to access
    the data it employs. If your server and architecture are set up properly, you
    still need to know how to interact with your database through software appliances
    – you would be surprised how many mistakes developers make here too.'
