- fmt: '# B-tree Indexes: Structure, Usage, and Optimization


    ## Introduction to B-tree Indexes

    B-tree indexes are binary tree indexes with a twist: such types of indexes allow
    for their members to have more than two children and that’s their primary difference.
    Here’s a basic illustration of a B-tree index.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig2_HTML.jpg)


    Figure 11-2: B-Tree index


    B-tree indexes make query performance faster because of their structure allowing
    them to enable our database to skip traversing through unnecessary rows: as they
    use pointers to quickly locate data, the intermediate levels of the index can
    have many more items per node, but regardless of how many items an individual
    node has, the premise of B-tree indexes remains the same.


    ## Defining B-tree Indexes in MySQL

    In all flavors of MySQL, B-tree indexes can be defined upon table creation or
    when modifying the structure of a particular table. With that being said, regardless
    of how you elect to define B-tree indexes, their internal functionality doesn’t
    change. The column that they reside on, their cardinality, and other specifics
    might but a large majority of those specifics are related to the internals of
    your queries and database. The internals of your queries dictate what kind of
    index to choose, too.


    To make good use of a B-tree index, use equality operators, `BETWEEN`, or `LIKE`
    without a preceding wildcard. A B-tree index will also help if you find yourself
    using `IS [NOT] NULL` clauses, and it will also be helpful when using `AND` clauses.


    ## Practical Demonstration

    Alright, now for the examples. To test the functionality of b-tree indexes, I
    will create a table for demonstration purposes.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig3_HTML.jpg)


    Figure 11-3: Creating a table for demonstration purposes


    Note my approach to the creation of the table – I didn’t use a dump file to restore
    a table from a backup; rather, I’ve recreated the table structure (first query)
    and then inserted some (not all) of the data that existed in a previous table
    (second query.)


    I will also note that we already had a B-tree index on the `username` column;
    thus, the speed of the `INSERT` query in question will be slower than usual.


    If you generate data and then index a column that contains generated data, it’s
    possible that the cardinality of the index will be rather low.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig4_HTML.jpg)


    Figure 11-4: A BTREE Index on the Username Column


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig5_HTML.jpg)


    Figure 11-5: Lower cardinality of an index on a column


    Now, if you’re copy-pasting my actions in your own infrastructure to learn, many
    of you probably won’t have 500k records to work with. For that, find a website
    that lets you generate a bunch of random data (generatedata.com is a good place
    to start), or restore data from a backup and anonymize if necessary. To do that,
    we will use a couple of queries – not all of them may be necessary for your specific
    use case, so take what you will and adjust the table name/columns/entries accordingly:


    1.  `` UPDATE `demo_data` SET `column` = ELT(FLOOR(RAND()*3) +1, ''Anonymized
    Row'', ''Anonymous'', ''Private''); ``

    2.  `` UPDATE `demo_data` SET `id` = RAND(); ``

    3.  `` UPDATE `demo_data` SET `email` = REPLACE(`email`, ''gmail.com'', ''demo.com'');
    ``

    4.  `` UPDATE `demo_data` SET `ip` = ''127.0.0.1''; ``

    5.  `...`


    There are many other ways you can go about this, but for this example, these will
    do just fine – the first query will set all values of a column to one of three
    values that you specify (to provide more values, increase the number `RAND()`
    is multiplied by, then add more entries), the second one will set all of the values
    within the `id` column to random values, the third query will replace all email
    domains of `gmail.com` to `demo.com`, and the fourth will set all IP addresses
    to `127.0.0.1`. Feel free to think of something yourself too. Let’s see how they
    work.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig6_HTML.jpg)


    Figure 11-6: Setting usernames to random usernames


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig7_HTML.jpg)


    Figure 11-7: Setting emails to random emails


    Great – they work as expected. Let’s run a couple of queries and see how our B-tree
    index is being used by MariaDB.


    ## Testing Index Performance

    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig8_HTML.jpg)


    Figure 11-8: Testing a B-Tree index on the `username` column: Round 1


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig9_HTML.jpg)


    Figure 11-9: Testing a B-Tree index on the `username` column: Round 2


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig10_HTML.jpg)


    Figure 11-10: Testing a B-Tree index on the `username` column: Round 3


    I assume that your queries would look something similar to those displayed – if
    they do, the lessons surrounding the usage of B-tree indexes in MySQL would be
    as follows (I derive those by judging whether indexes are possible to use and
    if they’re used by MariaDB mostly looking at the `possible_keys` and `key` columns):


    1.  **For your index to be used by your query, `touch` the column.** Take a look
    at the first query – it has nothing to do with the `username` column, hence why
    the index on that column isn’t even considered.

    2.  **B-tree indexes can be used when `LIMIT`, `OFFSET`, or similar clauses are
    in use.** `LIMIT`, `OFFSET`, and similar clauses don’t neglect the usefulness
    of indexes within MariaDB if you use the indexed column after a `WHERE` clause.

    3.  **If there’s a choice between a B-tree and a `PRIMARY KEY` index, MySQL can
    still elect to make use of the primary key instead, no matter whether the structure
    of the query “allows” MySQL to consider a different B-tree index or not.** Experiment
    and fiddle around to find the best fit for your queries.

    4.  **MySQL can consider an index, but not use it if it thinks that it wouldn’t
    do any good for the query.**

    5.  **MySQL can use different indexes for different parts of the query.** This
    is especially true if `UNION` or other clauses are concerned.

    6.  **“%” is not the only wildcard that may nullify your queries.** As you may
    know, the “_” character signifying a single unknown character is also a wildcard.
    Thus, a query searching for an unknown character in front of a query is also likely
    to be slower than usual.


    ## Key Considerations and Optimization

    Be mindful that if you set any column to several random values, index cardinality
    will be rather low, and for your experience with B-tree indexes to not become
    sour, be mindful of the length of your index leaf structures too – the size of
    your indexes depends on the number of rows in the index, the number of columns,
    the number of indexes, and the size of the values in a column themselves.


    There are ways you can predict the size of your indexes, too – approaches may
    differ from database to database, but for indexes based on MariaDB, you can make
    use of the `innodb_index_stats` table within the `mysql` database.


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig11_HTML.jpg)


    Figure 11-11: InnoDB index details within MariaDB


    Most of you won’t spend long looking through the statistics because they’re pretty
    complex, so to squeeze out the necessary information, we can use a query like
    so – this query will provide us with the size of our indexes within all of our
    databases in MB. This query will exclude the primary keys:


    ```

    SELECT database_name, table_name, index_name,

    ROUND(stat_value * @@innodb_page_size / 1024 / 1024, 2) idxsize_mb

    FROM mysql.innodb_index_stats

    WHERE stat_name = ''size'' AND index_name != ''PRIMARY''

    ORDER BY idxsize_mb DESC;

    ```


    ![](images/625040_1_En_11_Chapter/625040_1_En_11_Fig12_HTML.jpg)


    Figure 11-12: Displaying index details in a specific database


    To make the size of your indexes smaller, consider minimizing the length of the
    data types you find yourself using and using data types that occupy less space
    on the disk (e.g., `VARCHAR` instead of `TEXT`) or using other types of indexes
    (remember – you can also index a part of the column).'
