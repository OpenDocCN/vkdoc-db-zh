    `SQLSTATE` codes fall within certain ranges:


    | SQLSTATE Range | Explanation |

    | --- | --- |

    | `00000` | Successful completion of operations |

    | `01000-0102F` | Warnings (class 01.) |

    | `02000 & 02001` | No data (class 02.) |

    | `07000-46130, HW000-HW007, HV000-HV091, HY000-HY108 and HYC00` | Exceptions
    (classes 07,08,09,0A,0D-0Z, 10, 20-28, 2B-2H, 30, 33-36, 38 and 39, etc.) |


    Each `SQLSTATE` has a category, class, and subclass. Cool, yeah? Many of you probably
    never even thought of it!


    The good news is that you don’t have to memorize what every `SQLSTATE` state means
    to help your database (is that even possible?) – having a good grasp of what’s
    involved is enough, and the path you should take will come clear through experience.


