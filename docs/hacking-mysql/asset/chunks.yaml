- fmt: '10. If subpartitions are defined, they must be partitioned by `HASH` or by
    `KEY`.

    11. Starting from MySQL 8.4, MySQL uses 130kB of memory per partition for buffering
    to improve the performance of `LOAD DATA INFILE` statements.


    Even with all of these limitations in sight, partitioning is a really helpful
    companion to many – with a well-optimized database, query structure, and wise
    indexing decisions, partitioning will help you overcome performance burdens when
    reading data.


    Before choosing to partition though, weigh all other decisions you’ve made – inspect
    the database structure, data types and character sets, indexes that may reside
    on any columns within your table, and other things: partitioning will only be
    helpful as an assisting, not a replacing tool. If you find yourself running different
    flavors of MySQL (e.g., MariaDB or Percona Server), pay extra attention to the
    storage engines available within your server, too: since partitioning is directly
    dependent on the storage engine you find yourself using, and since different flavors
    of MySQL come with different storage engines, those engines will allow you to
    perform a bunch of interesting things with partitions too. Users of MariaDB will
    be aware of `MERGE`, `SPIDER`, and `CONNECT`: in this sphere, `SPIDER` would allow
    you to conduct data sharding by moving partitions of the same table across different
    servers, and `CONNECT` would enable you to build tables with partitions running
    different storage engines that may not support partitioning.


    Here’s an example of the `CONNECT` storage engine being used to power partitioning
    in MariaDB:

    ```sql

    CREATE TABLE `demo_table` (

    `id` INT(5),

    `account_name` VARCHAR(20) NOT NULL DEFAULT '''',

    `assigned_supportagent` VARCHAR(20) NOT NULL DEFAULT '''',

    key(`account_name`)

    ) ENGINE = SPIDER COMMENT = ''wrapper "mysql", table "demo_table"''

    PARTITION BY RANGE COLUMNS(`account_name`)

    (

    PARTITION `p1` VALUES LESS THAN (''L'') COMMENT = ''Values stored in server Mercury'',

    PARTITION `p2` VALUES LESS THAN (MAXVALUE) COMMENT = ''Values stored in server
    Venus''

    );

    ```


    In this case, all values up to K (K precedes L) would be stored in the server
    titled Mercury, and the rest of them would be stored in the server titled Venus.
    Interesting! We have much more to learn though.


    ## Summary


    Partitioning is a method to split tables inside of your database into several
    different tables – your database will treat partitions as a bunch of different
    tables under the hood, but since the SQL layer will still treat partitions as
    one table, you won’t ever be able to see your partitions as separate tables in
    any SQL clients or phpMyAdmin. However, you will be assisted with statements like
    `SHOW TABLES` or `SHOW CREATE TABLE`: the first statement will show whether partitions
    are in place on a specific table, and the second statement will provide you with
    a query that lets you recreate a table with partitions.


    Partitions are only one piece of the cake though and partitioning shouldn’t be
    done carelessly – partition only once you have enough data to warrant it (think
    100 million rows or more), and do so only once you’re well-acquainted with the
    internals of partitioning in the first place.


    Whatever you do, remember that partitioning is only a piece related to your tables,
    tables that are behind a database that contains data. To avoid issues, that database
    needs to be backed up properly and often, and to come up with a proper backup
    plan, you need to plan for recovery too. Grab a coffee – time to backup.


    ## 13. Optimizing Backups and Recovery


    You do take backups, don’t you? Seriously – backup and recovery procedures exist
    for a reason, and that reason has nothing to do with making your life as a developer
    or DBA harder or more complex. Every developer knows why they should back up their
    most precious asset – data – but not everyone does.


    Not everyone backs up data – such is the reality of the web today. Sure, perhaps
    for you, there’s no need to back up data every day – but that’s not a reason to
    forget backups altogether, is it?


    In this ever-changing world, backups are a necessity; backups are in place to
    protect the data of your organization from hardware failure, human errors, or
    even natural disasters. Many forget about them – some neglect them. Regardless
    of what’s the reason behind you not backing up your data, backups are a necessity,
    and if taking them is not already a routine for your DBAs, it should become one.


    When it comes to databases, many DBMS offers multiple different ways to take database
    backups and restore them. MySQL and MariaDB are no exception to the rule, but
    before digging deeper into what may be involved when you find yourself in the
    MariaDB backup and recovery realm, first, we have to understand why, when, and
    how people back up databases like MySQL in the first place.


    ## Why, When, and How to Backup MariaDB?


    Data is backed up for it to be restored in the future when disaster strikes. Backups
    are done differently depending on the application and your use case in question,
    and just as there are multiple ways for someone to mess up and lose all of the
    data in your database, there are multiple ways to back up the data inside of MySQL
    or any of its counterparts too. This book has a focus on MariaDB, so the options
    shown here will likely differ for those using Percona Server, MySQL, or even newer
    versions of MariaDB that will be released in the future.


    As for why you should back up data in MariaDB, everything’s pretty obvious – backing
    up and testing your database backups frequently will help you avoid headaches
    that may occur once disaster strikes. If you don’t yet, implement backups into
    your routine as a developer – you may not need to complete them every single day,
    so come up with a plan for what backup frequency is deemed acceptable by you and
    your database, and act accordingly. Add backups to your development routine, and
    you will never regret your decision.


    If you haven’t yet, back up your data now. Then, come up with a feasible backup
    interval that won’t hurt your workflow and that will lessen the amount of headaches
    you get once the hardware holding your assets crashes.


    Then, to back up the data inside of MariaDB, the first thing I would advise you
    to do is to have a look at backups from a birds-eye view and decide on a couple
    of things. Consider answering the following questions:


    *   `What kind of data are you backing up?` In other words, what’s the use case
    behind the database powering your application and what kind of backup are you
    taking?

    *   `How much data do you need to back up and why?` Backing up bigger data sets
    will necessitate different actions you need to take.

    *   `Did you take backups before and what types of backups were they?` Did you
    take logical backups? Physical backups? Both? How often?

    *   `Are your backup processes manual or automated?` Why?

    *   `How often do you need your data to be backed up?` In other words, what backup
    frequency does your application necessitate and why?

    *   `What medium are you backing up data into?` Are you backing up data into a
    cloud service, a separate VPS, a Network Attached Storage device, perhaps an external
    hard drive, or even a USB?

    *   `Do you follow backup best practices?` Here, I’m talking about things like
    “bulletproof backups” that necessitate backups of data to be stored in a variety
    of different locations so that you can access the data to restore it when necessary
    regardless of the magnitude of the incident that caused you to lose it in the
    first place.


    Answer these questions to obtain knowledge about a variety of different things.
    These things may include, but are not limited to, the following:


    1.  Whether you will have to take logical or physical backups and what are your
    options when it comes to restoring them.

    2.  You will know how better to back up your data.'
