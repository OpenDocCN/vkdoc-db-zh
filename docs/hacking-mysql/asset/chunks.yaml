- fmt: '# MariaDB备份工具详解


    ## 备份选项


    | **Option** | **Use Case or Meaning** |

    | --- | --- |

    | `-A` `--all-databases` | Use these options when you need to back up all data
    within all databases. |

    | `-B` `--databases` | These options dump only the specified databases. When these
    options are in use, MariaDB will treat the first title argument as the database
    title. Database names should be separated by spaces (see example below). |

    | `--add-drop-database` `--add-drop-table` `--add-drop-trigger` `--add-locks`
    | Depending on which option is used, add a `DROP DATABASE` option before creating
    each database anew, a `DROP TABLE` option before creating tables, a `DROP TRIGGER`
    option before creating triggers, or add some locking statements before running
    `INSERT` queries. |

    | `--lock-all-tables` `-x` | Lock all tables across all databases during the time
    the backup is running. |

    | `--lock-tables` `-l` | When a database is dumped, tables will be locked before
    the data inside of them will be backed up. |

    | `--no-autocommit` | `INSERT` statements will be preceded with the `SET autocommit=0`
    option, and once all data is inserted into a table, a `COMMIT` will commence.
    |

    | `--no-data` `-d` | Tables will be backed up without any internal information
    related to them (contents). |

    | `--order-by-size` | The backup operation is ordered by size: smallest tables
    first, largest tables last. |

    | `--order-by-primary` | If a primary key exists on a table, table rows are sorted
    according to it. If no primary key exists, rows are sorted according to the first
    unique index. |


    ## 使用示例


    A couple of examples of `mariadb-dump` in use can be seen below.


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Backing up databases using `mariadb-dump`


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Backing up the data in the `car_data` table within the `hacking_mysql` database.
    Before the table is dumped, a `LOCK TABLE` statement is added.


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Backing up all data across all databases while locking all tables across all databases


    To use `mariadb-dump` for a partial backup, back up only some tables or databases.
    For an incremental backup, come up with a way to identify changes to databases
    or tables within, then back up data that changed since the previous backup and
    new data that has been created.


    However, no matter how powerful `mariadb-dump` might seem to be, it should be
    noted that the tool only takes logical backups. If you want physical backups to
    be taken, you’re going to make use of tools built from a different caliber: one
    of those is `Mariabackup`, which can be used to perform physical backups of data
    behind InnoDB, MyRocks, Aria, or MyISAM tables. The tool can take full, incremental,
    or partial backups as well as restore data. According to MariaDB, `Mariabackup`
    should be considered as a replacement for Percona XtraBackup since MariaDB doesn’t
    provide official support for XtraBackup and has no plans to do so for the near
    future – [the issue is known](https://perconadev.atlassian.net/browse/PXB-1550)
    but Percona XtraBackup still isn’t supported in MariaDB, and that’s why MariaDB
    suggests users use `Mariabackup`.


    `Mariabackup` can be used with options similar to Percona XtraBackup like so:


    ```

    mariabackup [--backup|--prepare] [--copy-back|--move-back] [options]

    ```


    To backup data using `mariabackup`, make use of the `--target-dir` option to tell
    MariaDB what directory the backup should be stored in and specify the user and
    password that can take backups like so:


    ```

    mariabackup --backup --target-dir=/tmp/backups/ --user=hackingmysql --password=verystrongpassword

    ```


    Since `mariabackup` works similarly to Percona XtraBackup, backups taken using
    `mariabackup` need to be prepared for restoration before restoring the backup
    since the data files need to be consistent: for that, run a query with the `--prepare`
    option – don’t forget to specify the directory where your backup is located:


    ```

    mariabackup --prepare --target-dir=/tmp/backups/

    ```


    Other available options like `--copy-back` or `--move-back` will specify whether
    the backup files need to be copied or moved back to the `datadir` directory of
    the database server – if you want to keep a copy of the data for yourself for
    whatever reason, use `--copy-back`. Otherwise, use `--move-back`. You will use
    them when restoring the backup:


    ```

    mariabackup --copy-back --target-dir=/tmp/mariadb/backup/

    ```


    ## 增量备份


    To take incremental backups using `mariabackup`, take a full backup with the `--target-dir`
    and `--incremental-basedir` options:


    ```

    mariabackup --backup --target-dir=/tmp/mariadb/incremental1 --incremental-basedir=/tmp/mariadb/backup/
    --user=root --password=verystrongpassword

    ```


    These commands would create files storing incremental changes to data, thus allowing
    you to restore a backup as an incremental backup.


    To restore the incremental backup, prepare the backup once again (see example
    above), and then apply incremental changes to the full backup making use of the
    `--incremental-dir` option:


    ```

    mariabackup --prepare --target-dir=/tmp/mariadb/backup --incremental-dir=/tmp/mariadb/incremental1

    ```


    Only after applying all incremental backups to the base backup will you be able
    to restore the backup using the `--move-back` or `--copy-back` options and making
    use of the `--target-dir` option like usual:


    ```

    mariabackup --copy-back --target-dir=/tmp/mariadb/backup/

    ```


    Aside from knowing your way around backup types, there will be situations where
    you will need to back up massive amounts of data, compress and secure your backups,
    and of course, restore everything you’ve backed up when issues have occurred,
    too.


    ## 备份压缩与安全


    Just as backups can be taken, they can be compressed, too. Backup compression
    enables developers and database administrators to save space on the disk when
    storing backups and restoring compressed backups often reduces disk I/O so that’s
    a win-win all around.


    The same can be said about security – backups can be encrypted when they’re being
    taken and decrypted when they’re being restored. Encryption and decryption are
    done via OpenSSL, while compression and decompression are often done via `gzip`
    or 7Zip. I’ll start from compression, then move into security, and finally, join
    the two.


    Here’s the thing – backup compression in MariaDB isn’t complex, nor is it a thing
    you should learn anew if you were using MySQL or Percona Server in the past. For
    most of you, MariaDB backup compression and decompression will be achieved using
    `gzip` and encryption will be achieved by using `openssl` – when compressing and
    encrypting backups, most of you will also make use of `mariabackup`, so there’s
    no need to invent a bike on this front either.


    A basic use case of `mariabackup` to compress files when backing them up would
    necessitate the `gzip` feature and would look as follows (as always, replace `username`
    with the applicable username):


    ```

    mariabackup --user=[username] --backup --stream=xbstream | gzip > [backupnamehere].gz

    ```


    Here the `--user` option specifies a user that takes the backup, the `--backup`
    option specifies that we’re taking a backup, the `--stream` option specifies `xbstream`
    as an option to copy and compress backups in parallel, and finally, the `gzip`
    option specifies that we want to compress the backup using GZip.


    To compress backups, you can also use 7Zip instead – here, a very similar logic
    applies:


    ```

    mariabackup --user=[username] --backup --stream=xbstream | 7z a --si [backupnamehere].xb.7z

    ```


    To decompress backups taken with `gzip`, we would use `gunzip` like so:


    ```

    gunzip -c [backupnamehere].gz | mbstream -x

    ```


    To decompress backups taken with 7Zip:


    ```

    7z e [backupnamehere].xb.7z -so | mbstream -x

    ```


    Not very complex, is it? There are other approaches you can use to compress backups
    if you wish, but GZip and 7Zip should provide you with a good enough starting
    point.'
  raw: '| **Option** | **Use Case or Meaning** |

    | --- | --- |

    | `-A``--all-databases` | Use these options when you need to back up all data
    within all databases. |

    | `-B``--databases` | These options dump only the specified databases. When these
    options are in use, MariaDB will treat the first title argument as the database
    title. Database names should be separated by spaces (see example below). |

    | `--add-drop-database``--add-drop-table``--add-drop-trigger``--add-locks` | Depending
    on which option is used, add a `DROP DATABASE` option before creating each database
    anew, a `DROP TABLE` option before creating tables, a `DROP TRIGGER` option before
    creating triggers, or add some locking statements before running `INSERT` queries.
    |

    | `--lock-all-tables``-x` | Lock all tables across all databases during the time
    the backup is running. |

    | `--lock-tables``-l` | When a database is dumped, tables will be locked before
    the data inside of them will be backed up. |

    | `--no-autocommit` | `INSERT` statements will be preceded with the `SET autocommit=0`
    option, and once all data is inserted into a table, a `COMMIT` will commence.
    |

    | `--no-data``-d` | Tables will be backed up without any internal information
    related to them (contents). |

    | `--order-by-size` | The backup operation is ordered by size: smallest tables
    first, largest tables last. |

    | `--order-by-primary` | If a primary key exists on a table, table rows are sorted
    according to it. If no primary key exists, rows are sorted according to the first
    unique index. |


    A couple of examples of `mariadb-dump` in use can be seen below.


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Backing up databases using mariadb-dump


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Backing up the data in the car_data table within the hacking_mysql database. Before
    the table is dumped, a LOCK TABLE statement is added.


    ![](images/625040_1_En_13_Chapter/625040_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Backing up all data across all databases while locking all tables across all databases


    To use `mariadb-dump` for a partial backup, back up only some tables or databases.
    For an incremental backup, come up with a way to identify changes to databases
    or tables within, then back up data that changed since the previous backup and
    new data that has been created.


    However, no matter how powerful `mariadb-dump` might seem to be, it should be
    noted that the tool only takes logical backups. If you want physical backups to
    be taken, you’re going to make use of tools built from a different caliber: one
    of those is `Mariabackup`, which can be used to perform physical backups of data
    behind InnoDB, MyRocks, Aria, or MyISAM tables. The tool can take full, incremental,
    or partial backups as well as restore data. According to MariaDB, `Mariabackup`
    should be considered as a replacement for Percona XtraBackup since MariaDB doesn’t
    provide official support for XtraBackup and has no plans to do so for the near
    future – [the issue is known](https://perconadev.atlassian.net/browse/PXB-1550)
    but Percona XtraBackup still isn’t supported in MariaDB, and that’s why MariaDB
    suggests users use `Mariabackup` can be used with options similar to Percona XtraBackup
    like so:


    ```

    mariabackup [--backup|--prepare] [--copy-back|--move-back] [options]

    ```


    To backup data using `mariabackup`, make use of the `--target-dir` option to tell
    MariaDB what directory the backup should be stored in and specify the user and
    password that can take backups like so:


    ```

    mariabackup --backup --target-dir=/tmp/backups/ --user=hackingmysql --password=verystrongpassword

    ```


    Since `mariabackup` works similarly to Percona XtraBackup, backups taken using
    `mariabackup` need to be prepared for restoration before restoring the backup
    since the data files need to be consistent: for that, run a query with the `--prepare`
    option – don’t forget to specify the directory where your backup is located:


    ```

    mariabackup --prepare --target-dir=/tmp/backups/

    ```


    Other available options like `--copy-back` or `--move-back` will specify whether
    the backup files need to be copied or moved back to the `datadir` directory of
    the database server – if you want to keep a copy of the data for yourself for
    whatever reason, use `--copy-back`. Otherwise, use `--move-back`. You will use
    them when restoring the backup:


    ```

    mariabackup --copy-back --target-dir=/tmp/mariadb/backup/

    ```


    To take incremental backups using `mariabackup`, take a full backup with the `--target-dir`
    and `--incremental-basedir` options:


    ```

    mariabackup --backup --target-dir=/tmp/mariadb/incremental1 --incremental-basedir=/tmp/mariadb/backup/
    --user=root --password=verystrongpassword

    ```


    These commands would create files storing incremental changes to data, thus allowing
    you to restore a backup as an incremental backup.


    To restore the incremental backup, prepare the backup once again (see example
    above), and then apply incremental changes to the full backup making use of the
    `--incremental-dir` option:


    ```

    mariabackup --prepare --target-dir=/tmp/mariadb/backup --incremental-dir=/tmp/mariadb/incremental1

    ```


    Only after applying all incremental backups to the base backup will you be able
    to restore the backup using the `--move-back` or `--copy-back` options and making
    use of the `--target-dir` option like usual:


    ```

    mariabackup --copy-back --target-dir=/tmp/mariadb/backup/

    ```


    Aside from knowing your way around backup types, there will be situations where
    you will need to back up massive amounts of data, compress and secure your backups,
    and of course, restore everything you’ve backed up when issues have occurred,
    too.


    ## Backup Compression and Security


    Just as backups can be taken, they can be compressed, too. Backup compression
    enables developers and database administrators to save space on the disk when
    storing backups and restoring compressed backups often reduces disk I/O so that’s
    a win-win all around.


    The same can be said about security – backups can be encrypted when they’re being
    taken and decrypted when they’re being restored. Encryption and decryption are
    done via OpenSSL, while compression and decompression are often done via gzip
    or 7Zip. I’ll start from compression, then move into security, and finally, join
    the two.


    Here’s the thing – backup compression in MariaDB isn’t complex, nor is it a thing
    you should learn anew if you were using MySQL or Percona Server in the past. For
    most of you, MariaDB backup compression and decompression will be achieved using
    `gzip` and encryption will be achieved by using `openssl` – when compressing and
    encrypting backups, most of you will also make use of `mariabackup`, so there’s
    no need to invent a bike on this front either.


    A basic use case of `mariabackup` to compress files when backing them up would
    necessitate the `gzip` feature and would look as follows (as always, replace `username`
    with the applicable username):


    ```

    mariabackup --user=[username] --backup --stream=xbstream | gzip > [backupnamehere].gz

    ```


    Here the `--user` option specifies a user that takes the backup, the `--backup`
    option specifies that we’re taking a backup, the `--stream` option specifies `xbstream`
    as an option to copy and compress backups in parallel, and finally, the `gzip`
    option specifies that we want to compress the backup using GZip.


    To compress backups, you can also use 7Zip instead – here, a very similar logic
    applies:


    ```

    mariabackup --user=[username] --backup --stream=xbstream | 7z a --si [backupnamehere].xb.7z

    ```


    To decompress backups taken with `gzip`, we would use `gunzip` like so:


    ```

    gunzip -c [backupnamehere].gz | mbstream -x

    ```


    To decompress backups taken with 7Zip:


    ```

    7z e [backupnamehere].xb.7z -so | mbstream -x

    ```


    Not very complex, is it? There are other approaches you can use to compress backups
    if you wish, but GZip and 7Zip should provide you with a good enough starting
    point.'
