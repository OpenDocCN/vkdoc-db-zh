- fmt: 'Not too bad, right? I’ll walk you through the possible optimization techniques
    in the optimization part of this book (which is coming up right after this chapter)
    – slap your database around for now, and then don’t forget to wrangle your code
    around the database properly too.


    ## Coding for MySQL Performance and Security


    Once you understand how your server interacts with MySQL and adjusted a parameter
    or two to help your infrastructure (you’ve increased your `InnoDB` buffer pool
    size and adjusted the size of the log files, haven’t you?), don’t forget to write
    code in such a way that helps your database too. You’d be surprised how many developers
    still write code that traumatizes their databases – and some of you may make mistakes
    on this front too.


    Remember a couple of key things:


    1.  **Never pass user input directly to a database** (do I need to say this?):
    Passing user input straight into a database is the highway toward SQL injection.


    2.  **Terminate connections when they finish, use rate limiters, and load balancers**:
    It seems basic, but operators of search engines, API appliances, and similar applications
    may be privy to situations where they’ve noticed their application running slow
    just to notice that the sluggishness was caused by the number of queries running
    in a database. Welp. If you run an application that’s heavy on the reading spectrum,
    definitely rate limit the number of queries that can be executed in a given period
    and let load balancers balance out the rest if necessary. You don’t need to invent
    genius-level rate limiters here: a couple of lines of PHP code should do the trick.


    3.  **Benchmark and profile**: Benchmarking is a unique way to determine what
    happens once you give your application work to complete. Many developers had situations
    where they plan for plan A, plan B, and plan C, and then life gives them lemons
    and they need to make use of plan D. Well, well, well… That’s why you need to
    benchmark your application and databases – benchmarking will help you understand
    whether the expectations for your database are realistic, it will help you measure
    what your app and database can handle, and plan for growth. I’ll walk you through
    benchmarking and profiling tactics once we get into optimizing MySQL.


    4.  **Choose server components wisely**: Many think that to achieve great performance,
    one should use the greatest components ever. Sure, using the newest components
    for your server would be great if you have the means to afford them, but since
    great components also come at great cost, many don’t have such a luxury. Choose
    components wisely and research your options – if you run a big-data-based search
    engine and need a lot of space on the disk, do you really need multiple terabyte-size
    NVMe drives? Perhaps grab a bigger HDD and purchase more RAM or get a better CPU?
    Remember the example of `InnoDB` using more cores: utilize components smarter,
    not harder. Choose components wisely and look into the future, and you will be
    able to push your server further than you think.


    5.  **Index for high performance**: If you’re using an index, it’s a safe bet
    that you’re not using it for no reason, right? Indexes improve the performance
    of `SELECT` queries; however, dropping an index on the first column after a `WHERE`
    clause isn’t always the smartest thing you can do. Various database management
    systems come with various types of indexes, and as such, you have a load of indexing
    strategies you can employ to achieve your performance goals. Profile your queries
    and index wisely.


    6.  **Nail down problematic pieces of code with code profilers**: What if I told
    you that databases aren’t the only things you can profile? PHP users may want
    to look into [xhprof](https://pecl.php.net/package/xhprof) – the tool profiles
    CPU cycles and memory usage and can help you figure out the causes of bottlenecks.
    Other programming languages will have similar appliances.


    7.  **Look into the advanced features of MySQL**: You don’t need to be a power-user
    of MySQL to use advanced features. Those include triggers, stored procedures and
    functions, partitioning, prepared statements, full-text searching, and even the
    way you define character sets and collations. These exist for a reason – triggers
    can be used to “call” something automatically when we modify data in a table while
    stored procedures are to be called manually, partitioning helps your database
    split data into multiple underlying tables while still treating a partitioned
    table as an indivisible unit, full-text searching enables you to search with explicit
    capabilities where certain different characters may have a different meaning for
    your query and utilize different search modes, while character sets and collations
    enable your database to understand data in different languages and display symbols.


    8.  **Backup your data**: No matter what project you run, backups should always
    be top of mind. Backups are something you rarely think about until disaster strikes
    – and then everyone’s like “oh no, when did we last back up our database? Are
    our backups even restorable?” and that’s why you need to think of them beforehand.
    Not only think of them – back up your data with `mysqldump`, `mydumper`, or other
    methods (we’ll talk about backups later on) and make sure your backups are restorable
    too.


    9.  **Look into CSRF tokens**: Do you know how many CSRF attacks are blocked in
    [BreachDirectory](https://breachdirectory.com)? Sometimes hundreds every week
    on the search engine page alone. Surprising? Shouldn’t be. Some people are assholes
    – and once your app gets a little traction, you will certainly notice the full
    extent of that. Now while I fully understand why people would initiate searches
    through a search engine from a different place (that’s the cause of some of the
    blocks), there’s an API on the service for a reason. CSRF tokens are not only
    useful for search engines, and they can be of immense use if your application
    allows a user to change passwords, confirm a purchase by clicking on a link, etc.
    – anything that could make a nefarious party think “hmm, and if I send a request,
    maybe I’ll benefit from this too?” CSRF tokens prevent CSRF attacks in that they’re
    unique for each request/session and consist of a random value that’s impossible
    to guess. I’ll walk you through how to implement them in the security part of
    this book.


    10. **Write clean code**: Clean code can contribute to the longevity of your databases
    as well. Anyone who’s ever had to remake a legacy codebase knows exactly what
    I mean: you’re going through the code base, and you’re like “Why did *that* get
    included here?!” Avoid overcomplicating things and keep things simple: keep your
    code well-organized and well-structured, and you will see numerous benefits: it’s
    likely to run faster, use less memory, and your database, application, and your
    future self will thank you too.


    Adhere to those 10 things, and your application and database will surely thank
    you. With that being said, keep in mind that these things aren’t a panacea, and
    they will only work if your application (and database at that) is built properly.
    You will make mistakes (who doesn’t?) – learn from them.


    Ever heard of the Brachistochrone curve experiment? It proves that a ball can
    roll along a curved line faster than on a straight line – take note of that: your
    mistakes are likely to move you further than other people who take a “straight”
    path. Learn and move quickly: mistakes will be inevitable, but they’re not the
    end of the world.


    When coding any application making use of MySQL, take a special interest in your
    server and data storage. Using the best architecture possible isn’t always the
    wisest choice: great components also have a great cost, and experience in fiddling
    with MySQL components is sometimes likely to yield better results than throwing
    money at architecture.'
