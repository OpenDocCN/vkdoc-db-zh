    # 5. Understanding Query Components


    Now that you understand what factors break your queries, it’s time to understand
    their components – tasks inside of them. Here we come back to something I’ve mentioned
    dozens of times throughout this book already – *queries are tasks composed of
    other tasks.* To ensure these tasks will execute successfully, we have to understand
    their components. Sounds simple enough, but if it were that simple, we would have
    way fewer people complaining about query performance, right? That’s why understanding
    query components is so crucial – a proper understanding of query internals can
    make or break your database instances.


    ## SQL Queries and Stored Procedures


    From the outset, SQL queries look simple and uncomplicated. Under the hood, they’re
    not a child’s play – they’re composed of many small tasks that all need to work
    in unison so that your database can achieve perfection. Flick back to the last
    chapter and read through the “Why Are Queries Slow?” heading, and you will quickly
    understand what I mean – with so many tasks to complete, it’s reasonable to assume
    that queries reading through bigger data sets would take more time than those
    who haven’t got as much data to sift through. Each type of query completes a different
    task (queries insert, select, update, or delete data), but under the hood, they
    all work similarly.


    As I’ve already mentioned in the last chapter, there are multiple types of queries
    in MySQL – those include DML (Data Manipulation Language) queries, DDL (Data Definition
    Language) queries, and also DCL (Data Control Language) and TCL (Transaction Control
    Language) queries. Most of these queries work similarly – they execute 20 or so
    subtasks before returning any results. Those queries are often bundled together
    in the sense that once the user using your application acts on a form or anything
    similar to it, an SQL query executes in the background. More savvy developers
    might even be aware of stored procedures to help them succeed!


    To understand why query components are so crucial to your SQL queries, I’d like
    you to take a look at stored procedures as an example. In MySQL, stored procedures
    are implemented with the `CALL` statement – the statement calls (invokes) a stored
    procedure that has to be created using `CREATE PROCEDURE`. Procedures in MySQL
    are sets of SQL queries stored inside the database (and are thus known to the
    server) and executed once procedures are invoked using `CALL procedure` or `CALL
    procedure()`.


    Procedures can have two parameters – one that goes `IN`, and another that goes
    `OUT`. Users can pass values to the procedure in the column defined in the `IN`
    parameter and the column defined in the `OUT` parameter passes values from the
    procedure back to the user. One can define procedures like so.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Defining procedures in MariaDB


    Here, we changed the delimiter to “`//`” for MariaDB not to interpret the ending
    of our query as the end of the procedure, then defined the procedure and told
    it to put its results into a variable called `count_cities`. One can make use
    of the stored procedure in the following way.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Calling a procedure in MariaDB


    We have the number of cities in Great Britain! Great.


    *The components of stored procedures are the statements within them meaning that
    stored procedures will be as quick as they are.*


    As you can see, procedures in MariaDB are pretty simple to work with – and since
    procedures consist of queries “remembered” by your MySQL instance, the performance
    of those procedures will also be directly dependent on the performance of those
    queries.


    Query performance is directly dependent on how quickly your database can execute
    query components – which, remember, there are slightly over 20 of. Those components
    depend on the query execution plan, which depends on parsers and optimizers.


    ## Parsers and Optimizers


    Internally, every SQL query is turned into an execution plan. Before coming up
    with the execution plan, MySQL checks whether the syntax and grammar of the SQL
    query are correct during the parser phase – it checks for errors by examining
    all characters in the query one by one, matches them against rules, and if everything’s
    OK, turns the query to the optimizer.


    For you to imagine how a parser works within your database, take any query and
    split it into pieces. Take a look at this one if you want an example:


    ```

    SELECT sender,COUNT(*) FROM messages WHERE message LIKE ''%What time%'';

    ```


