    ### 使用 WHERE、OFFSET 和 LIMIT 子句


    这些子句将帮助你最小化数据库在完成更新查询时所需执行的工作。


    ### 保持对数据库负载的警惕


    在凌晨 2 点更新数据，通常比在高峰使用时段更新表中的数据要更好。


    真的，就是这样——在大多数使用场景中，标准做法就是黄金法则。如果你在较大的数据集上运行更新，你的 `UPDATE` 操作可能会有点慢，并且根据你的 InnoDB
    缓冲池大小，你可能需要等待——我并不是承诺，如果你遵循我给出的所有建议，它们就能在毫秒内完成——但它们不会给你的数据库带来那么大的压力，并且考虑到你数据库中的行数，它们的速度将保持合理。


    如果你发现自己正在使用 `MyISAM`（对于那些需要统计表中行数的人来说，这可能是必需的——我稍后会讲到存储引擎如何与大数据集交互），你可能还需要查看存储引擎内的
    `key_buffer_size` 设置。


    ### 从 MariaDB 中删除大数据


    就删除而言，`DELETE` 查询也没有改变。是的，删除大块数据很可能令人头疼，而这种痛苦在涉及分区或索引时会更加明显——这就是为什么保持简单、避免同时执行多个操作很重要：如果你同时执行
    CRUD 操作和进行计数或给你的数据库提供另一项任务，事情可能会变得有点困难——这些操作会花费一些时间，但同样，即使它们需要时间，你也可以将所有必要的 SQL
    查询放入一个文件中，然后“喂”给你的数据库，让它运行查询并将结果返回到文本文件之类的地方。


    在删除大数据集时，请记住，这样的操作对 MariaDB 来说并非易事：删除 1,000,000 行可能是你的数据库能够承担的任务，但如果我说从 MariaDB
    中删除 50,000,000 行很容易，那我就是在撒谎——说实话，删除那么多行对你的数据库来说可能意味着完蛋（我听说你也喜欢分区和索引……），*但对 Linux
    则不然*。


    在这个领域，像 `sed` 或 `sort` 这样的查询会比标准的 SQL 对应物快得多，非常快。它们将作用于原始数据文件，意味着这些文件的尺寸更小，而且最重要的是，它们不会给你的
    PC 或服务器带来太大压力——你不需要 NASA 级别的基础设施来完成任务。与其执行 `DELETE FROM demo_table WHERE column
    = string;`，不如尝试用 `SELECT … INTO OUTFILE` 从你的数据库中导出原始数据（甚至该特定列中的数据），然后使用类似 `sed
    -i /string/d data.txt` 的命令？是的，也许你需要等待 10–15 分钟——操作仍然需要完成——但 10 分钟不是一周：`-i` 会在不通过
    CLI 显示结果的情况下修改文件，`d` 会指示 `sed` 删除数据，`string` 将是你需要删除的字符串，而 `data.txt` 指的是你的文件名。


    `sort -u`（一个带有唯一标志的排序操作）也将取代对唯一索引的需求：导出原始数据，然后在你从数据库接收到的文件上运行 `sort -u` 查询，可以在几分钟内（而不是几天）去除重复项。


    最后，如果你需要删除表中的所有行，请记住，像 `TRUNCATE TABLE table_name` 这样的查询会比 `DELETE` 查询快得多。


    删除索引和分区无论如何都需要一段时间，除非你使用 `MyISAM`——如果你使用 `MyISAM`，你可以自由删除与你的表关联的 `.MYI` 文件，并且与该特定表相关的索引将永久消失，除非文件被重新创建。这只是为大数据集使用不同存储引擎的一个好处。


    ### 存储引擎与大数据


    还记得存储引擎吗？我在本书第二章中已经介绍过它们。MySQL 在允许我们根据用例从多个存储引擎中进行选择方面几乎是独一无二的——PostgreSQL 只支持一个方便地命名为“PostgreSQL”的存储引擎，MongoDB
    和其他数据库管理系统确实提供更多选择，但很少有选择像 MySQL 那样广泛。而且 MySQL 有几个变体，包括 MariaDB 和 Percona Server，我们的选择范围甚至更广。


    你们中大多数使用 MariaDB 的人会使用 `InnoDB`——它是关系型 DBMS 提供的主要存储引擎——但也有其他选择。其中一个选项是 MariaDB
    ColumnStore——一种利用 MariaDB 中列式存储优势的存储引擎。通过利用列式存储提供的优势，MariaDB 能够避免像这样存储数据：


    | ID    | Name              | Position                 |

    | ----- | ----------------- | ------------------------ |

    | 52777 | Josh Doe          | Head of Marketing        |

    | 52778 | John Surnamey     | Marketing Manager        |

    | 52779 | Alissa Surname    | Influencer Marketing Manager |

    | …     | …                 | …                        |


    而是像这样存储数据：


    | 52777 | 52778 | 52779 |

    | ----- | ----- | ----- |

    | Josh Doe | John Surnamey | Alissa Surname |

    | Head of Marketing | Marketing Manager | Influencer Marketing Manager |

    | … | … | … |


    数据存储的方法——以及随之而来的，你访问更大数据集所需的存储引擎——直接取决于你特定的数据访问模式。


    基于行的数据库和存储引擎，如 `InnoDB`，非常适合涉及运行在线事务处理 (`OLTP`) 查询和按行访问数据的事务处理，而基于列的数据库则基于 `OLAP`——在线分析处理——模型。MariaDB
    的 ColumnStore 也将始终符合 `ACID`，并提供在线模式更改、高可用性的能力，并带有一个版本缓冲区，用于回滚事务、存储正在被修改的数据等。


    MariaDB 也将为你们所有人提供使用其自身可用的“原生”存储引擎的选项，这意味着选择列式存储是一种选择，而非必需。这也意味着你可以迫使 MariaDB
    满足你的需求——而不是相反。


    其中一些需求可能与 `ACID` 合规性有关——对于许多数据库管理系统来说是一个基本概念，也是你的数据库及其内部数据的可靠守护者。


    ### ACID 与大数据


    当你在任何数据库管理系统中处理大数据时，有一个方面将变得至关重要，那就是数据的一致性和持久性。你最不希望看到的就是你的客户/用户抱怨数据损坏、无法访问或无法使用，对吧？


    MariaDB 有一个解决方案——`ACID`。你们大多数人都知道它是什么以及它是如何工作的，我在本书中也已经提到过，但随着你的数据变得越来越大，这个概念可能会变得越来越重要。你们中的一些人可能会达到这样一个点，你会问自己
    *你的数据库真的需要 `ACID` 吗？* 也许需要。也许不需要。我知道有些案例，工程师会为了实验而关闭 `ACID` 合规性，然后忘记了他们这样做，让这种速度上的权衡运行了数周，甚至数月。他们的数据库虽然快速，但不遵守
    `ACID`，这导致他们的数据烧毁了吗？没有——只要理解你在做什么，关闭 `ACID` 并不必然意味着你数据库的终结。

