  trans: '## 问题使用场景


    讽刺的是，即使 MySQL 如此功能强大，但即便我们认为自己考虑周全了，许多问题仍会接踵而至。这些问题的出现，是因为我们避免优化数据库，或者说“数据库运行得够好——还有什么可优化的？”，然后当我们的应用程序加载耗时过长时又感到沮丧。


    数据库问题可以方便地分为多个类别——可用性、性能和安全性是一个很好的起点。在梳理这些问题时，请记住，最简单的事情往往最令人头疼，MySQL 也是如此。尽管这些问题背后的原因在大多数情况下比你想象的要简单，但它们也必须得到妥善处理。


    ### 性能小故障


    首先，一个长久以来困扰着每一位使用 MySQL（或任何数据库管理系统）的 DBA 和开发人员的问题就是数据库性能问题。数据库性能问题是几乎所有应用程序运行缓慢的核心，无论你的数据库支撑着何种技术架构。


    无论何种应用程序，数据库性能在初始阶段很少被深入探究。这并不是说开发者忽视了开源数据库中性能的重要性——他们几乎肯定没有——但经常发生的情况是，开发者只从应用程序的角度来看待性能。这意味着以下一个或多个情况：


    *   你的服务器正在做超出其应负荷的工作。

    *   你的数据库资源受限。

    *   在数据库中运行的查询未针对性能进行优化，因此消耗了过多或过少的资源。

    *   你的数据库结构未针对你要求数据库执行的工作进行优化，使得数据库难以胜任你分配的工作。这可能包括数据库中的列没有索引或你未使用它们，在需要时没有进行分区，等等。


    看出规律了吗？问题不在于你的数据库本身，而在于你不理解所使用的工具对数据库做了什么，这才是问题的核心。


    别担心——从高层次来看，一切都比你想象的要简单。说真的——你所需要做的就是优化四种类型的查询。它们就是 CRUD 邻里——创建、读取、更新、删除。在最基本的层面上，一切工作原理如下：


    | 查询类型 | 如何优化？ |

    | --- | --- |

    | 创建 – `INSERT` | 在执行 `INSERT` 之前，确保表锁、一致性检查和索引更新操作在 `INSERT` 查询完成后进行，并利用批量插入功能。如果这不起作用，则用
    `LOAD DATA INFILE` 替代 `INSERT`。 |

    | 读取 – `SELECT` | 尽可能少地读取数据。 |

    | 更新 – `UPDATE` | 请记住，MySQL 也会更新数据及其上的所有内容（索引或分区）。如果需要，请删除索引和/或分区，使用锁机制，并注意 `NULL`
    值——如果你将此类值插入表中的任何分区，它们将驻留在最低的分区中。 |

    | 删除 – `DELETE` | 利用 `LIMIT` 子句，并在可行时将 `DELETE` 切换为 `TRUNCATE`（`TRUNCATE` 会删除表中的所有行）。
    |


    如果你像这样插入数据到数据库中：


    ```

    LOCK TABLE mysql_table;

    INSERT INTO mysql_table VALUES (''demo'', ''demo'', ''demo''), (''data'', ''data'',
    ''data''), (''more data'', ''more data'', ''more data'');

    INSERT INTO mysql_table VALUES (''more data'', ''demo data'', ''some data''),
    (''demo data'', ''more demo data'', ''something here too''), (''data'', ''more
    data'', ''more data'');

    ...

    UNLOCK TABLE mysql_table;

    ```


    像这样从数据库中读取：


    ```

    SELECT demo_column FROM mysql_table WHERE some_column >= 500 LIMIT 0,10;

    ```


    像这样更新数据库中的数据：


    ```

    LOCK TABLE mysql_table;

    UPDATE mysql_table SET column = ''value'' LIMIT 0,5000;

    UPDATE mysql_table SET column = ''value'' LIMIT 5000,10000;

    UPDATE mysql_table SET column = ''value'' LIMIT 10000,15000;

    ...

    UNLOCK TABLE mysql_table;

    ```


    或者像这样删除表中的所有数据：


    ```

    TRUNCATE TABLE mysql_table;

    ```


    你认为会发生什么？你的许多数据库性能问题将开始消失。看，一旦你遵循几个基本步骤，一切变得多么容易？我们将在本书第三部分深入探讨性能优化，但上述内容将是数据库性能方面的一个良好起点。


    ### 可用性问题


    清单上的下一个是可用性问题。这些并非新鲜事——如果你的数据库宕机或应用程序性能陷入停滞，你就遇到了问题。这类问题被广泛讨论，修复它们也并非难事——为了使你的数据库在大部分时间内保持可用（公平地说，一些停机时间不可避免地会发生），请选择可靠的服务器提供商，确保你的应用程序通过
    CloudFlare 或任何其他 CDN 路由请求，务必备份数据并经常测试备份，优化在数据库中运行的查询，并在必要时了解负载均衡器在数据库基础设施中的工作方式。


    最重要的是，如果需要，在多个服务器之间复制数据，这样就万事大吉了！也不要过分纠结于让你的数据库 100% 时间可访问——考虑到即使是 CDN 提供商也可能被
    DDoS 攻击打垮，你数据库背后的服务保证 100% 正常运行时间从来都是不现实的；然而，这并不意味着你不应该尽一切努力来阻止此类攻击的发生。


    在数据库领域，可用性问题的产生是因为你的数据库没有得到适当优化，因此务必保持警惕，关注数据库中数据的使用方式。但一旦你确保应用程序处于 CDN 之后以抵御
    DDoS 攻击、查询已优化、数据备份可靠并经过测试、应用程序采用了速率限制器，并且你部署了一个或两个负载均衡器，那么就可以放宽心——不太可能出什么问题。但是，务必保持警惕——安全漏洞也近在咫尺。'
- fmt: '### Security Problems


    Once you’re sure that your application is performing well and availability levels
    are acceptable to your organization or for yourself, it’s time to ask your database
    another question – has the data in it ever been stolen?


    Unfortunately, in many cases, the answer is “Yes” even if you’ve never heard of
    any data breaches hitting the infrastructure of your company or any companies
    related to it. The truth is that data breaches are rarely announced on the front
    page of your company – and if they are, they’re almost certainly not the first
    data breach that your company has experienced.


    To mitigate security issues, take care of the following aspects:


    1.  General security guidelines

    2.  User security and access control

    3.  MySQL security components and plugins

    4.  Enterprise-level security controls


    Seemingly very few things to take care of, right? Don’t get too excited because
    as with everything, the devil is in the details. That’s why this book has an entire
    part of it dedicated to security – I’ll tell you everything you need to know once
    we reach the security part of MySQL (that’s the last part of this book), but for
    now, follow this advice:


    | `Security Guideline` | `Advice` |

    | --- | --- |

    | General security guidelines | Ensure that only the `root` user has access to
    the user table in the `mysql` database, never trust data provided by the user
    (that''s the primary cause of `SQL injection`), and consider using a `Web Application
    Firewall (WAF)` to prevent attacks directed at your application and your database
    alike. |

    | User security and access control | Use strong passwords and don''t store them
    in plain text or using weak algorithms (look into `BCrypt` or `Blowfish` for that
    matter), don''t grant more privileges than necessary for users to complete their
    actions, and take a look into account locking and unlocking. |

    | MySQL security components and plugins | `MySQL` provides you with the ability
    to implement a password security policy where only passwords above a certain length
    can be employed, comes with an enterprise-level firewall specific to itself (see
    enterprise-level security controls), offers a `keyring` plugin to safely store
    sensitive information for retrieval later on, etc. |

    | Enterprise-level security controls | Enterprise-level security controls include,
    but are not limited to, the `MySQL Enterprise Firewall` and `MySQL Enterprise
    Audit` functionalities for auditing and user security, data masking procedures,
    and the like. |


    That’s the basics of security which we’ll dive in deeper in the last part of this
    book, but we’re not ready to get into the security part of your database just
    yet – you secure something that isn’t safe and optimize something that’s broken.
    For now, understand that under the `MySQL` hood, everything is simple if you tread
    the database road carefully and understand everything it involves. Databases involve
    data, data involves `schemas` (in the MySQL world, a `schema` is also a synonym
    for a database), and `schemas` involve `data types`, `indexes`, and the like.
    Understanding your `data`, `schema`, and the `data types` related to them may
    seem like a simple task, but it is far from a piece of cake: it does need careful
    consideration and attention to function properly both now and in the future –
    with improper `schema` and `data types`, you could be breaking your database without
    being aware of it! You’re in luck because now I’ll walk you through how to understand
    your data by choosing the proper `schema`, `data types`, and `collations` to avoid
    just that. How? Well, keep reading and find out.


    ## Understanding Your Data


    To understand your `data`, start by walking yourself through the necessities:
    chances are that you already have a lot of `data` in your database, right? Well,
    how did the `data` end up in your database? What did you think about before any
    `data` found its way into any of the databases within your `MySQL Server`? That’s
    right – `table schemas`, `data types`, and `collations`. These three things are
    the three “musketeers” powering your `data`: `table schemas` define the overview
    of your tables, `data types` define what `data` can go into what column, and proper
    `collations` make sure that `data` isn’t represented by signs you can’t comprehend.


    Essentially, `table schemas`, `data types`, and `collations` provide you with
    a highway for your `data` – you choose the speed limit. However, no matter the
    speed limit, if the highway is so badly made that your car can barely make its
    way through it, you won’t reach your destination. That’s why it’s crucial to choose
    the proper `schema`, `data types`, `character sets`, and `collations` before embarking
    on any project – these things lay the foundation for any project.'
