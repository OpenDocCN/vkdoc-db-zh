    operations (remember – `autocommit=0` goes before `INSERT` operations, `COMMIT`
    comes at the end); if a primary key is present on your table, consider adding
    it before data is inserted because if a primary key will be in place beforehand,
    MySQL (and MariaDB too) will check for the integrity of the `PRIMARY KEY` during
    each `INSERT` operation. The same goes for indexes. On the same note, if multiple
    types of indexes are in place within your tables, first ask yourself whether you
    even need many types of indexes to be present – do you need that B-Tree and `FULLTEXT`
    index to be mashed together? What kind of use case do these indexes assist? What
    kind of full-text search operations are necessary, if at all?


    `LOAD DATA INFILE` also has consequences, and you’re welcome to familiarize yourself
    with them by searching for “`LOAD DATA INFILE` slow” through StackOverflow. Let
    me explore one of such use cases with you, and you’ll quickly understand what
    I want to tell you – I’ll call the user who asked the question person A, and the
    one who answered – person B. The problem was as follows:


    1.  Person A started a thread on StackOverflow saying that he was loading a file
    of approximately 100GB in size into a table inside of one of his databases using
    `LOAD DATA INFILE`.


    2.  Person A continued that “<…> I’m trying it now using InnoDB <…> The load starts
    fast at around 10MB/sec <…> after some GB of data is inserted, it slows down to
    the 2–3MB/sec range <…>”.


    3.  Person A also stated that the size of his InnoDB buffer pool is around 8GB
    and that he’s running a couple of queries before running `LOAD DATA INFILE` –
    these queries being the following:


    `SET @@session.sql_log_bin=0;`


    `SET autocommit=0;`


    `SET unique_checks=0;`


    `SET foreign_key_checks=0;`


    `ALTER TABLE ''tbl_name'' DISABLE KEYS;`


    4.  Person A also said that it seems to him that InnoDB doesn’t support loading
    bigger data sets that are over a few GB in size into tables.


    The problem here is pretty clear – `LOAD DATA INFILE` starts quickly but slows
    down after a while even though options that would supposedly help the database
    are in place. Why? Let’s explore the accepted answer by person B. It was stated
    that


    1.  `DISABLE KEYS` wouldn’t work with InnoDB because such a statement shuts down
    updates to secondary indexes on MyISAM, but since the system tablespace in InnoDB
    includes a structure to deal with secondary indexes, InnoDB doesn’t deal with
    indexes in the same way as MyISAM does, so such an option is not necessary.


    2.  Setting `autocommit` to off piles up data in ibdata1, so user A should consider
    keeping it turned on.


    3.  User B stated that the MVCC and ACID features exclusive to InnoDB often make
    the storage engine act as a bottleneck when inserting bigger data sets into it
    and that setting the `ROW_FORMAT` to a value of `Fixed` would further speed up
    `INSERT` queries on MyISAM tables at the expense of making the table significantly
    larger to deal with.


    4.  Other users chimed in to support what the user B said saying that MyISAM as
    a storage engine is simple, but in this case, so are the requirements of the user
    A, and because of that, everything should be fine. If the user is facing any further
    problems, he might need to split the files into separate parts. If the user is
    running a powerful server, he should also consider optimizing the server for both
    MyISAM and InnoDB as necessary, but to do that, he would need to modify both mechanisms.


    Most of this advice is OK, but some of it is outdated by now – first off, never
    use MyISAM in a production environment if your use case doesn’t warrant `COUNT(*)`
    queries. As I’ve already told you in the chapter about storage engines, as MySQL
    advanced, most of the features originally available within the MyISAM storage
    engine became obsolete and are now available in InnoDB. When `LOAD DATA INFILE`
    is in use, you can keep `autocommit` functions at default, but the advice relevant
    to `DISABLE KEYS` still stands. For most of you, things won’t be so complex and
    you don’t need to overthink things – just optimize your database, and when recovering
    big data sets make use of `LOAD DATA INFILE` that makes use of the optimized parameters
    (examples of `LOAD DATA INFILE` in use can be found throughout this chapter).
    Make sure that indexes and any applicable keys are loaded into the database after
    the data has been inserted, too, and you should be good to go.


    ## Summary


    Backing up your data is a necessity – there’s no doubt about that. Just as your
    data needs to be backed up, though, it has to be recovered properly, and I sincerely
    hope that the advice in this chapter has helped you refine both your data backup
    and recovery procedures to meet your goals as necessary.


    No matter how you elect to backup or restore your data, always keep in mind that
    backups do have a friend – his name is replication. Database replicas aren’t backups
    and they aren’t a replacement for backups, but rather, they are a way to ensure
    that what’s happening on one database server is quickly replicated on the other.
    Let’s get into them now.


    # 14. Optimizing Replication


    Like backups, replication is top of mind for many DBAs across the globe. Properly
    built replication architectures ensure increased data availability, thus making
    it a fundamental strategy for database architectures as well as disaster recovery.
    However, as fundamental as replication may seem, one should consider both the
    benefits and drawbacks of such an appliance.


    ## Understanding Replication


    At a high level, replication in database management systems is quite easy to understand:
    replication helps copy data over to another server (of which there can be more
    than one) and keep data across those servers in sync, and by doing so, helps improve
    database availability and reliability. In the MySQL world, replication comes in
    a couple of flavors: we can have synchronous, semi-synchronous, or asynchronous
    replication as well as statement-based, row-based, or mixed-mode replication,
    too. MariaDB only supports asynchronous and semi-synchronous replication and comes
    with a Galera Cluster appliance.


    Synchronous replication makes sure that changes are received and applied before
    committing them while asynchronous replication commits the transaction at the
    instant it’s received without waiting for the reply from replica servers. Semi-synchronous
    replication aims to provide a compromise between the two by ensuring that one
    or more of the replica servers have confirmed the changes to data. When it comes
    to replication formats available in MySQL and MariaDB, there is statement-based
    replication that replicates `INSERT`, `UPDATE`, and `DELETE` statements on another
    server and row-based replication that replicates the changes to rows, hence the
    name. Row-based replication is said to be more precise; it offers more compatibility
    in comparison to statement-based replication and is the default replication mode
    in MySQL and MariaDB. Mixed-mode replication offers the best of both worlds where
    the server chooses the best way to replicate data based on a specific scenario.


    Some of you may undoubtedly be familiar with replication and some of its upsides,
    but nonetheless, I feel the need to introduce you to some of the terms surrounding
    replication:'
  trans: "\n为确保逻辑备份尽可能快速完成，请推迟自动提交操作（记住——`autocommit=0`应置于`INSERT`操作之前，`COMMIT`放在末尾）；如果表中存在主键，请考虑在插入数据前添加主键，因为若主键预先存在，MySQL（以及\
    \ MariaDB）会在每次`INSERT`操作时检查`PRIMARY KEY`的完整性。索引亦是同理。同样地，如果表中存在多种类型的索引，首先问问自己是否真的需要多种索引——你确定要把\
    \ B-树索引和`FULLTEXT`索引强行组合在一起吗？这些索引辅助何种使用场景？如果确实需要，又该进行何种全文搜索操作？\n\n`LOAD DATA INFILE`也有其影响，你可以通过\
    \ StackOverflow 搜索“`LOAD DATA INFILE` slow”来熟悉这些影响。让我与你探讨其中一个案例，你将迅速明白我的意图——我将提问者称为\
    \ A，回答者称为 B。问题如下：\n\n1.  A 在 StackOverflow 发帖称，他正使用`LOAD DATA INFILE`将一个约 100GB\
    \ 大小的文件加载到他某个数据库的表中。\n2.  A 继续说道：“<…>我现在正在尝试使用 InnoDB <…>加载开始时速度很快，大约 10MB/秒 <…>在插入几\
    \ GB 数据后，速度降至 2-3MB/秒的范围 <…>”。\n3.  A 还表示他的 InnoDB 缓冲池大小约为 8GB，并且在运行`LOAD DATA\
    \ INFILE`之前执行了几个查询——这些查询如下：\n\n    ```\n    SET @@session.sql_log_bin=0;\n   \
    \ SET autocommit=0;\n    SET unique_checks=0;\n    SET foreign_key_checks=0;\n\
    \    ALTER TABLE 'tbl_name' DISABLE KEYS;\n    ```\n4.  A 还说，他感觉 InnoDB 不支持将超过几\
    \ GB 的大型数据集加载到表中。\n\n这里的问题相当清楚——`LOAD DATA INFILE`启动很快，但即使设置了那些据称能帮助数据库的选项，一段时间后速度仍会下降。为什么？让我们来看看\
    \ B 给出的被采纳的回答。其中指出：\n\n1.  `DISABLE KEYS`对 InnoDB 无效，因为该语句会关闭 MyISAM 上二级索引的更新，但由于\
    \ InnoDB 的系统表空间包含处理二级索引的结构，InnoDB 处理索引的方式与 MyISAM 不同，因此该选项没有必要。\n2.  将`autocommit`设置为关闭会将数据堆积在`ibdata1`中，因此用户\
    \ A 应考虑保持其开启状态。\n3.  用户 B 指出，InnoDB 特有的 MVCC 和 ACID 特性在插入大型数据集时往往会使该存储引擎成为瓶颈，而将`ROW_FORMAT`设置为`Fixed`值可以进一步加快\
    \ MyISAM 表上的`INSERT`查询速度，但代价是表会变得显著更大，更难处理。\n4.  其他用户插话支持用户 B 的说法，称 MyISAM 作为存储引擎很简单，但在这种情况下，用户\
    \ A 的需求也很简单，因此一切应该没问题。如果用户遇到更多问题，他可能需要将文件拆分成单独的部分。如果用户运行的是高性能服务器，他还应考虑根据需要为 MyISAM\
    \ 和 InnoDB 优化服务器，但要做到这一点，他需要修改两种机制。\n\n这些建议大部分没问题，但其中一些现在已经过时了——首先，如果你的用例不需要`COUNT(*)`查询，切勿在生产环境中使用\
    \ MyISAM。正如我在存储引擎章节中已经告诉过你的，随着 MySQL 的发展，最初在 MyISAM 存储引擎中可用的大多数功能已经过时，现在已在 InnoDB\
    \ 中可用。当使用`LOAD DATA INFILE`时，你可以将`autocommit`功能保持为默认设置，但关于`DISABLE KEYS`的建议仍然有效。对你们大多数人来说，事情不会那么复杂，你不需要过度思考——只需优化你的数据库，并在恢复大型数据集时利用采用优化参数的`LOAD\
    \ DATA INFILE`（本章通篇都可以找到`LOAD DATA INFILE`的使用示例）。确保索引和任何适用的键也在数据插入后加载到数据库中，这样应该就没问题了。\n\
    \n## 摘要\n\n备份数据是必要的——这一点毫无疑问。然而，正如数据需要备份一样，它也需要正确地恢复，我衷心希望本章的建议能帮助你完善数据备份和恢复流程，以满足你的必要目标。\n\
    \n无论你选择如何备份或恢复数据，请始终牢记，备份有一个朋友——他的名字是复制。数据库副本不是备份，也不是备份的替代品，而是一种确保一个数据库服务器上发生的事情能快速复制到另一个服务器上的方法。现在让我们来探讨它们。\n\
    \n# 14. 优化复制\n\n与备份一样，复制也是全球许多数据库管理员关注的重点。正确构建的复制架构可提高数据可用性，因此它也是数据库架构以及灾难恢复的基本策略。然而，尽管复制看似基础，但应考虑这种机制的优缺点。\n\
    \n## 理解复制\n\n从高层次来看，数据库管理系统中的复制很容易理解：复制有助于将数据复制到另一台服务器（可以不止一台），并保持这些服务器之间的数据同步，从而帮助提高数据库的可用性和可靠性。在\
    \ MySQL 领域，复制有几种形式：我们可以有同步、半同步或异步复制，以及基于语句、基于行或混合模式的复制。MariaDB 仅支持异步和半同步复制，并附带\
    \ Galera 集群机制。\n\n同步复制确保在提交更改之前，更改已被接收并应用；而异步复制则在收到事务时立即提交，而不等待副本服务器的回复。半同步复制旨在通过确保一个或多个副本服务器已确认数据更改来提供两者之间的折衷方案。当谈到\
    \ MySQL 和 MariaDB 中可用的复制格式时，有基于语句的复制（在另一台服务器上复制`INSERT`、`UPDATE`和`DELETE`语句）和基于行的复制（复制对行的更改，因此得名）。据说基于行的复制更精确；与基于语句的复制相比，它提供了更好的兼容性，并且是\
    \ MySQL 和 MariaDB 中的默认复制模式。混合模式复制则集两者之长，服务器根据特定场景选择最佳的数据复制方式。\n\n你们中有些人无疑对复制及其一些优势很熟悉，但尽管如此，我觉得有必要向你们介绍一些围绕复制的术语：\n"
- fmt: "## 术语与背景\n\n| Term | Meaning |\n| --- | --- |\n| Master or Master Server |\
    \ The database server that serves as the primary source of data. |\n| Slave or\
    \ Slave Server | The database server that acts as a read-only copy of the Master\
    \ Server. |\n| Source or Source Server | The same as a Master Server. |\n| Secondary,\
    \ Secondary Server, Replica or Replica Server | The same as a Slave Server. |\n\
    \nI bet you’ve heard most (or at least some) of the terms mentioned above since\
    \ many of you will be familiar with what replication can provide. What you may\
    \ not be aware of, however, is the fact that replication terminology has changed\
    \ a little during the years: while many DBAs may be aware of a master-slave and\
    \ a master-master topology, you should also be aware that in 2020, MySQL has acknowledged\
    \ the negative connotations of the initial terminology like “master” and “slave”\
    \ and has announced that the team is moving toward implementing numerous terminology\
    \ changes that should soon be introduced into MySQL: the team has also stated\
    \ that they’re thinking of replacing the word “blacklist” with “blocklist” and\
    \ the word “whitelist” with the word “allowlist.”\n\nAll references to these words\
    \ won’t be removed in a single release because it’s simply impossible to do –\
    \ according to the MySQL team, the new syntax will be the recommended syntax instead\
    \ of an alternative one.\n\n## 配置与实施复制\n\nRegardless of the issues concerning\
    \ the syntax, for replication to bear its fruit, one has to choose the type of\
    \ replication to implement, and then configure it as necessary. To configure and\
    \ implement replication, you would first need to have two or more servers with\
    \ MySQL installed, configured, and running.\n\nOnce you’re sure that MySQL is\
    \ installed, configured, and running on both of the servers, start configuring\
    \ replication. In this example, we will configure master-slave replication, and\
    \ I’ll get into the possible types of replication afterward. With that being said,\
    \ the basic steps to configure replication in MySQL are as follows (take note\
    \ that locations of binary logs on a Windows architecture may differ and can be\
    \ found in the `C:\\ProgramData\\MySQL\\MySQL Server *.*` or other locations depending\
    \ on the configuration within my.ini – consult the value of the `log-bin` variable):\n\
    \n1. Take a backup of data existing in MySQL or MariaDB, a backup of my.ini or\
    \ my.cnf, and then stop MySQL (MariaDB).\n\n2. Open up my.ini or my.cnf and uncomment\
    \ the `log_bin` and `server_id` options. The `server_id` will let your database\
    \ distinguish between multiple servers in a replication setup, and the `log_bin`\
    \ variable allows MySQL to read through the binary log which is a necessity for\
    \ replication (the directory may differ). Additionally, you may want to include\
    \ the name of the database you desire to replicate by specifying the database\
    \ name after the `binlog_do_db` parameter:\n\n    ```ini\n    [mysqld]\n    log_bin\
    \ = /var/log/mysql/mysql-bin.log\n    server_id = 1\n    binlog_do_db = testdb\n\
    \    ```\n\n3. Ensure that the secondary (slave) server has a user with enough\
    \ permissions to deal with replication by either creating a user or granting him\
    \ privileges like shown – keep in mind that we use `mysql_native_password` instead\
    \ of `caching_sha2_password` because we may not possess an encrypted connection\
    \ between our servers, and `FLUSH PRIVILEGES` saves our privileges:\n\n    ```sql\n\
    \    CREATE USER '[username]'@'[slaveserver_ip]' IDENTIFIED WITH mysql_native_password\
    \ BY '[password]';\n    GRANT REPLICATION SLAVE ON *.* TO '[username]'@'[slaveserver_ip]';\n\
    \    FLUSH PRIVILEGES;\n    ```\n\n4. Since replication reads changes from the\
    \ log file, we need to retrieve its position. To do so, lock the database so the\
    \ position doesn’t “move” as data is modified by running a query like `FLUSH TABLES\
    \ WITH READ LOCK`.\n\n5. Then, obtain status information on the binary log file\
    \ by issuing a `SHOW MASTER STATUS` query. The output of the query should provide\
    \ you with the name of the bin file in the form of `mysql-bin.000002` or similar,\
    \ the position (e.g., “761” or similar), and other parameters such as what database\
    \ is replicated in the `Binlog_Do_DB` column or what database is ignored in the\
    \ `Binlog_Ignore_DB` column, and other information. Remember the name of the bin\
    \ file and the position that’s shown, if possible copy and paste it into another\
    \ location – you are going to need it in a minute.\n\n6. We’re assuming that this\
    \ is a fresh master-slave configuration and that we don’t have any data on the\
    \ master server yet – as such, we can unlock the database by running `UNLOCK TABLES`.\n\
    \n7. Come back to the slave server, open up my.ini or my.cnf, change the `server-id`\
    \ variable to a value of 2 (the numbers mustn’t clash), and then set the other\
    \ applicable variables to the same values as in the master server (e.g., the `log_bin`\
    \ variable should have the value of the bin file in the `SHOW MASTER STATUS` query\
    \ – in this case, it’s `mysql-bin.000002`, the `binlog_do_db` variable should\
    \ have the value of the `Binlog_Do_DB` variable in the master server, etc.).\n\
    \n8. While still modifying my.ini or my.cnf, adjust the `relay-log` variable to\
    \ the location of the log file inside of the slave server. If you’re under a Linux\
    \ architecture, most likely the value will be something like `/var/log/mysql/mysql-relay-bin.log`.\n\
    \n9. Save changes and restart MySQL or MariaDB.\n\n10. Instruct the slave server\
    \ on the location of the binary log file and its contents. This is a single query\
    \ with values derived from the values in the `SHOW MASTER STATUS` query – the\
    \ `SOURCE_USER` and `SOURCE_PASSWORD` are the username and password values of\
    \ the user you’ve created for replication:\n\n    ```sql\n    CHANGE REPLICATION\
    \ SOURCE TO\n    SOURCE_HOST='ip_of_master_server',\n    SOURCE_USER='replication_user',\n\
    \    SOURCE_PASSWORD='replication_user_password',\n    SOURCE_LOG_FILE='mysql-bin.000002',\n\
    \    SOURCE_LOG_POS=761;\n    ```\n\nNow you’re free to start the replication\
    \ process! Run `START REPLICA` on the slave server, and you should be good to\
    \ go. The status of the replica server can be inspected by running `SHOW REPLICA\
    \ STATUS` – when such a query is run, MariaDB would return with the state of the\
    \ replica server (e.g., “Waiting for master to send event,” while `Source_host`\
    \ and `Source_user` will be the IP and the username of the master server.\n\n\
    If your master server has data you want to migrate, “upload” the backup of the\
    \ data to the slave server by using `scp` (here, `backup.sql` is the name of your\
    \ backup, and `slave_user` and `slave_ip` are the username and IP of the slave\
    \ server, respectively). I move the backup to a `/tmp/` directory to ease an upcoming\
    \ data import process:\n\n```bash\nscp backup.sql slave_user@slave_ip:/tmp/\n\
    ```\n\nOnce done, head back to the slave server, create a database, and import\
    \ the backup from the `/tmp/` directory. The rest of the steps don’t change.\n\
    \n## 复制类型\n\nAs already mentioned, replication in MariaDB and MySQL comes in a\
    \ couple of flavors: MySQL supports `synchronous`, `semi-synchronous`, and `asynchronous`\
    \ replication, while MariaDB supports `asynchronous` and `semi-synchronous` replication\
    \ options as well as provides support for `Galera Cluster`."
