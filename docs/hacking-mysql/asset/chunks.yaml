  trans: '

    为什么用户 Y 会这样回答问题？他话语背后隐藏着什么？让我们一探究竟：


    1.  要让分区特别有效，你需要有大规模的数据集可供处理。“大”至少意味着拥有数千万行的数据。因此，他说“可能永远用不上”，意思其实是“你的数据量还不足以达到需要分区的程度”。

    2.  分区要发挥作用，它必须与查询协同工作，而不是取代查询或替查询完成工作。用户需要先关注查询设计并添加任何适用的索引，如果那还无济于事，再转向分区。

    3.  这要看情况，因为从未提供过查询供检查——如果查询 200 万行数据已经很慢，那么除了分区之外，已经存在足够多的问题。

    4.  这取决于你的数据库配置和适用服务器的资源——一切都归结于所涉及的存储引擎（我猜用户 X 在使用 `InnoDB`），并且为了让分区尽可能快地完成，需要适当地优化某些参数，并且数据插入的方式不能阻碍数据库。

    5.  如果查询已经很慢，对 200 万行数据进行分区可能不会有多大好处——事实上，弊可能大于利，因为如果你的查询在 200 万行数据上就已经一团糟，而且你的数据还在增长，我只能想象一旦你的数据超过
    8 位数会发生什么。


    这些回答对某些人来说可能显得有点刻薄，但它们很有分量——在这个案例中，分区是不必要的，因为根本没有足够的数据来证明其必要性。那么，何时才应该决定是时候对数据进行分区了呢？


    这里没有“一刀切”的解决方案；当您已经优化了模式、查询和索引，但发现这些方法都无法将查询性能提升到令人满意的水平时，就是考虑数据分区的时候了。您的查询性能可能仍在下降，因为您要搜索大量数据，而您的数据库认为如此多的数据难以处理。这对你们中的许多人来说可能不太会发生，但一旦发生，就是时候考虑分区了。你们中的一些人可能无需做到那一步就能判断您的用例是否需要分区：如果您已经知道您的用例需要用户搜索超过
    1 亿行数据，那么推迟分区值得您花费时间和精力吗？不值得。


    换句话说，当您知道将在一个表中存储大量行时，就对表进行分区。一个表的行数超过 1 亿了？是时候分区了。有理由相信您的数据集将超过一个表 1 亿行？分区。用索引优化了数据库和查询，但查询仍然很慢？考虑分区。但是，有一件事您不应该做，那就是对您看到的一切都进行索引/分区：一切皆有代价，索引和分区都会减慢更新、插入或删除数据的查询速度。换句话说，要谨慎分区，并且只有在完全理解给定分区类型的含义之后才进行。


    ## 数据库分区内部原理


    分区将数据拆分到独立的表中，但对许多人来说，这难以理解，因为您的数据库在后台默默处理分区：一旦运行 `SHOW TABLES`，它不会显示关于分区表的信息，默认情况下也不会提供太多信息。因此，如果您不知道如何查看分区背后发生了什么，您可能很难为其他开发人员提供该做什么和哪里出了问题的建议。值得庆幸的是，MySQL
    及其衍生版本确实提供了让开发者获取数据库中分区信息的方法。可以使用 `SHOW CREATE TABLE` 语句。


    ![](img/625040_1_En_12_Fig1_HTML.jpg)


    图 12-1

    MariaDB 中的 `SHOW CREATE TABLE`


    或者，可以通过 `SHOW TABLE STATUS` 选项来了解表是否已分区——检查 `Create_options` 列即可（注意此查询不会显示实际的分区，只显示表是否被分区）。


    ![](img/625040_1_En_12_Fig2_HTML.jpg)


    图 12-2

    MariaDB 中 `SHOW TABLE STATUS` 的部分输出


    `SHOW TABLE STATUS` 不会显示分区的名称和类型，但它会提供许多其他有用的信息，例如表使用的引擎、表中存在的行数、平均数据长度、索引长度、表是否有自动递增列、其排序规则是什么等等。


    对于那些希望通过命令行界面操作的人，如果我们检查 MariaDB 或 MySQL 的数据目录并看到 `[table_name]#p#[title].ibd`
    文件，就可以了解数据是否被分区。但为了避免文件名被误解，输出需要一点知识才能理解每个部分的含义（`table_name` 指的是表名，`#p#` 指的是分区，`title`
    指的是分区的名称，而 `.ibd` 指的是数据文件。）


    例如，我将列出 `hacking_mysql` 数据库中可用的文件。看看——你在这里看到了哪些分区，它们属于哪个表？


    ![](img/625040_1_En_12_Fig3_HTML.jpg)


    图 12-3

    MariaDB 中的数据文件


    我们看到两个分区，名为 `partition_1` 和 `partition_2`。这些分区位于运行 `InnoDB` 存储引擎的 `demo_partitioned`
    表上——明白了吗？


    当然，文件不会说明使用了哪种分区类型，这是一个缺点。分区类型可能决定分区本身的有效性，因此在考虑是否对表进行分区以及如何分区时，明智的做法是追根溯源，首先了解分区允许的选项。


    ## MySQL 中的分区类型


    MySQL 及其衍生版本中允许的分区选项直接取决于您所使用的分区类型。MySQL 及其衍生版本中可用的分区类型包括四种——每种分区类型都有其优缺点，如下所示：


    1.  按 `RANGE` 或 `RANGE COLUMNS` 分区：按范围分区是 MariaDB 和 MySQL 中最常用的数据分区方式之一。按范围分区使我们能够为落入给定范围内的数据启动单独的分区，因此按范围分区允许您将值小于
    `100` 的行存储在一个分区中，值小于 `50` 的行存储在另一个分区中，并使用另一个分区存储值小于 `25` 的行。按 `RANGE COLUMNS`
    分区还允许用户提供一个或多个列的列表，用于定义分区范围。

    2.  按 `LIST` 或 `LIST COLUMNS` 分区：此类分区类型接受一个值列表作为分区键。当使用此类分区类型时，数据会根据是否包含在列表中而落入不同的分区。

    3.  按 `HASH` 分区：按哈希分区可确保数据在定义的多个分区之间均匀分布。只有数字表达式才能作为分区键。

    4.  按 `KEY` 分区：按键分区类似于按哈希分区，但按哈希分区接受用户输入，而按键分区则接受服务器提供的输入（即使用内部哈希函数）。因此，我们只需要定义分区的数量。


    除了这些分区类型之外，许多数据库管理系统还支持子分区，MySQL 也不例外。


    按 `RANGE` 分区可能是 MySQL 中最常用的数据分区方式之一。这种分区类型相当容易理解。看看这个例子：

    '
- fmt: '## 创建分区表示例


    ```sql

    CREATE TABLE `demo_partitioned` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` SMALLINT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY RANGE (work_department_id) (

    PARTITION p0 VALUES LESS THAN (5),

    PARTITION p1 VALUES LESS THAN (10),

    PARTITION p2 VALUES LESS THAN (15),

    PARTITION p3 VALUES LESS THAN (20),

    PARTITION p4 VALUES LESS THAN (25),

    PARTITION p5 VALUES LESS THAN (30)

    );

    ```


    ## 范围分区


    What do you think is happening here? We partition the column `work_department_id`
    into six separate partitions (`p0` is also a partition – we just start counting
    from 0.) All values less than 5 are stored in the partition titled `p0`, values
    less than 10 are stored in the partition `p1`, and so on. Such an approach makes
    our table bigger by default (96kB instead of 16kB), but also makes our data reside
    in separate “sub-tables” of which we have six.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig4_HTML.jpg)


    **Figure 12-4**


    Partitioned table is bigger.


    One thing you should note when making use of partitioning is that when partitioning
    a column, the column that you use in the partitioning expression must be a part
    of a unique key if composite indexes are explicitly defined. That means that if
    you include the `id` column in a table and try to partition the table in the same
    way, you may face an error as follows:


    ```

    #1503 – A PRIMARY KEY must include all columns in the table''s partitioning function

    ```


    Coming back to partitioning by range, everything’s self-explanatory: the value
    of 27 would be stored in the partition titled “p5,” a value of 3 would be stored
    in the partition titled `p0`, and so on. If we insert a value that is outside
    the partition bounds, an error would appear. Such an error can be solved by adding
    a single additional partition with the value of `MAXVALUE` – in other words, every
    value that remains:


    ```sql

    PARTITION p6 VALUES LESS THAN MAXVALUE

    ```


    From now on, any values that don’t match the values defined in partitions 0 to
    5 will reside in partition number 6. If you use this approach, be wary of putting
    too many values in a partition with `MAXVALUE`; such an approach is beneficial,
    but only beneficial once all of your other partitions work in unison. If you have
    two partitions and the `MAXVALUE` partition holds 90% of the total values, something’s
    wrong and you should reconsider your approach.


    Aside from that, partitioning by range can also consider string values – then,
    one could use partitioning by `RANGE COLUMNS` instead of partitioning by `RANGE`
    and everything would look like so:


    ```sql

    CREATE TABLE `demo_partitioned` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` VARCHAR(20) NOT NULL DEFAULT '''',

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY RANGE COLUMNS (work_department_id) (

    PARTITION p0 VALUES LESS THAN (''a''),

    PARTITION p1 VALUES LESS THAN (''b''),

    PARTITION p2 VALUES LESS THAN (''c''),

    ...

    PARTITION p3 VALUES LESS THAN MAXVALUE

    );

    ```


    Notice that the `work_department_id` column now has a `VARCHAR` data type.


    ## 列表分区


    Partitioning by `LIST` is quite self-explanatory, too: this partitioning type
    lets us define partitions based on values as the partitioning keys. The partitioning
    expression must be either a column value or an expression based on it that returns
    an integer value. Here’s an example (note that if you provide integers as partitioning
    keys, if the column has a default value, it should also be an integer):


    ```sql

    CREATE TABLE `demo_partitioned_list` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` INT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY LIST(work_department_id) (

    PARTITION p0 VALUES IN (1,3,5,7),

    PARTITION p1 VALUES IN (2,4,6,8),

    PARTITION p2 VALUES IN (10,12,14,16),

    PARTITION p3 VALUES IN (11,13,15,17)

    );

    ```


    Such a partitioning definition would come up with four partitions, and as mentioned
    before, values not matching those defined in the partitions would be rejected.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig5_HTML.jpg)


    **Figure 12-5**


    No partition for a given value


    Granted, one can use `INSERT IGNORE INTO` instead, but if you choose such an approach,
    don’t be surprised that certain values will be missing.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig6_HTML.jpg)


    **Figure 12-6**


    No values in a partition


    If partitioning by `LIST` is not your type or if you use columns of data types
    other than integer, keep in mind that partitioning by `LIST COLUMNS` is also possible.


    ## 哈希分区


    Partitioning by `HASH` isn’t anything out of the ordinary, either – such a partitioning
    type enables us to split values within a table evenly. All we need to define is
    an integer defining the count of applicable partitions, and then MySQL will split
    applicable values evenly across all of the partitions:


    ```sql

    CREATE TABLE `demo_partitioned_hash` (

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` INT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY HASH(salary)

    PARTITIONS 4;

    ```


    Hash partitioning relieves you of the burden of specifying a partition to store
    values in – your database will decide that for you.


    As far as hash partitioning is concerned, there were talks in Stack Overflow saying
    that the name of a hash partition can be determined by running a query like so
    (here `[input]` determines your input and the `[number]` is the number of partitions):


    ```sql

    SELECT partition_name from information_schema.partitions

    where table_name = ''table_name''

    and partition_ordinal_position = 1+ ABS(MOD([input], [number]));

    ```


    ## 键分区


    Finally, we have partitioning by key. Partitioning a table by key works almost
    the same as partitioning a table by hash, the only difference being the partitioning
    function used. When partitioning by key is in use, the function will be derived
    from the server. Also, keep in mind that when partitioning by key is being used,
    all columns that are used as part of the partitioning expression must form a part
    or an entirety of a primary key and we also have to specify the number of partitions
    necessary. Partitioning by key looks like this:


    ```sql

    CREATE TABLE `demo_partitioned_key` (

    `id` INT(20) NOT NULL AUTO_INCREMENT PRIMARY KEY,

    `first_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `last_name` VARCHAR(30) NOT NULL DEFAULT '''',

    `work_department_id` INT(20) NOT NULL DEFAULT 0,

    `salary` INT(10) NOT NULL DEFAULT 10000

    )

    PARTITION BY KEY(id)

    PARTITIONS 2;

    ```


    ## 分区的好处与数据修剪


    No matter the type of partitioning used, your database will use a partitioning
    function to determine what partition to put the data in. One of the primary benefits
    of partitioning is that it helps your database split large data sets into smaller
    chunks that can be more easily “absorbed” or used by your application. Also, keep
    in mind that some types of partitioning will limit you regarding the data types
    available for you to use.


    Aside from helping access data faster, partitions can also be used for data pruning.


    ![](images/625040_1_En_12_Chapter/625040_1_En_12_Fig7_HTML.jpg)


    **Figure 12-7**


    Pruning data in partitions


    If your table is partitioned and you find yourself in a situation where you know
    that results will be in one or more partitions and you know that some partitions
    are unnecessary, removing partitions will help reclaim some space on the disk.


    Partition pruning can also be performed by the query optimizer in the sense that
    when queries with any of the equality signs (`=`,`<`,`>`,`<=`,`>=` or `<>`) or
    the `IN` clause are in use, the optimizer will only scan through data in a partition
    that contains the value. If you use such an approach to partition pruning, no
    data will be removed from the partitions themselves – they just won’t be searched
    through.


    ## 分区技巧：子分区、限制、NULL 值等'
