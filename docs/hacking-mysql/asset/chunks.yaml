  trans: '

    # 理解 MySQL 错误


    回到错误这个一般性话题，当试图排查故障时，理解 MySQL 错误格式是必要的。这几乎是错误存在的全部意义——错误信息以开发人员和数据库专家都能理解的方式告诉我们哪里出了问题，错误编号让我们可以通过文档或其他方式搜索解决方案，而以
    `SQLSTATE` 值形式存在的错误条件则提供了让开发人员能够向其他开发人员询问出了什么问题并寻求解决帮助的能力。双赢！


    ### 常见的 MySQL 错误代码


    为了让错误最终达成双赢局面，你必须掌握至少一小部分在使用 DBMS 时可能出现的 MySQL 错误代码。这里列举几个：


    *   **错误 1040: 连接数过多**：此错误意味着 MySQL 服务器已达到客户端连接的最大数量，因此无法接受新的连接。解决此问题的一个简单方法是确保在数据库中运行的所有查询都已正确结束——即关闭。

    *   **错误 1045: 访问被拒绝**：你是否有权运行刚刚尝试执行的 SQL 查询？请仔细检查尝试运行该 SQL 查询的用户的权限，一旦你 100%
    确定权限已到位且正确（即允许该用户运行特定查询），请使用 `FLUSH PRIVILEGES;` 语句来保存你的更改。

    *   **错误 1064: 语法错误**：此 MySQL 错误表示存在语法错误。请检查导致此错误的查询的语法。

    *   **错误 1114: 表已满**：此错误表示磁盘空间不足。此类问题主要发生在数据库中的表非常大、对大型表运行 `ALTER TABLE` 查询或为大型数据库创建备份时。

    *   **错误 1659: 字段 “timestamp” 对于此类型的分区是不允许的类型**：一个名为 “timestamp” 的列（字段）不具有特定分区类型所允许的数据类型。我们在上一章中遇到过这个错误，当时我告诉你不能对
    timestamp 值进行分区，还记得吗？

    *   **错误 2006: MySQL 服务器连接已关闭**：此错误表示 MySQL 服务器已超时并关闭了已初始化的连接。请检查 `wait_timeout`
    变量的值，并确保该值对你和你的数据库都是可接受的。

    *   **错误 2008: 客户端内存不足**：此错误意味着 MySQL 客户端在执行特定任务时内存耗尽。导致此问题的一个非常常见的原因是返回数百万甚至数十亿结果的查询；如果你需要返回如此多的结果，MySQL
    开始发出警告或噪音是完全合理的。哔哔。

    *   **错误 2013: 查询期间丢失连接**：此错误也相当不言自明。如果你看到此错误，那就是 MySQL 在告诉你，它在查询执行过程中丢失了与数据库的连接。你确定你的数据库响应查询的时间没有过长吗？如果是，请确保你的互联网连接稳定，你没有遇到任何连接问题，或者尝试增加
    `net-read-timeout` 变量中的数字（此变量表示 MySQL 在中止读取操作之前等待连接数据的秒数）。

    *   **数据包过大**：这是那些常让开发人员感到困惑的、没有代码的错误之一，但一旦你弄清其根本原因，就相当容易理解：此错误与 `max_allowed_packet`
    变量有关，该变量表示服务器和客户端允许的最大数据包大小。如果你遇到此错误，请通过调整 `max_allowed_packet` 变量来增加允许的最大数据包大小。

    *   **无法创建/写入文件**：当你的数据库无法在临时目录中创建或写入文件时，通常会出现此错误。请确保临时文件的目录已在 `tmpdir` 变量中正确定义，并确保
    MySQL 有能力写入到其中指定的目录。


    错误并不是什么可怕的东西——大多数都可以在几分钟内解决，虽然有些确实需要配置更改（更改变量值等），但它们也不是世界末日。随着时间的推移，你会熟悉错误代码，你将明白错误没什么好怕的：深入研究文档，弄清楚像
    `HY000`、`42000` 或其他错误代码的含义，然后查阅同一份文档或向你友好的本地 DBA 寻求如何解决问题的建议。我相信你会比想象中更快地解决问题。


    ## 查询所厌恶的因素


    查询组件直接受到你的服务器、应用程序和数据库内部因素的影响，并且你运行的所有查询对你的数据库也有着不同的负担——你已经知道，要使查询性能高效，你需要通过最小化或消除它们执行的任务数量来最小化它们的工作量，但如果你能避免
    SQL 查询不喜欢的某些事情，效果会更佳。


    ### 隔离你的列！


    要记住的第一件事与搜索——`SELECT`——查询有关。如果你发现运行搜索查询的列有索引、已正确分区，并且你运行的是 `SELECT column` 而不是
    `SELECT *` 来选择数据库中的数据，但它仍然运行缓慢，你可能需要检查 `WHERE` 子句之后的列是否也被隔离了。这意味着像下面这样的查询肯定不会高效：


    ```sql

    SELECT * FROM `demo_table` WHERE column + 786 = 4425;

    ```


    它们不会高效是因为如果 `WHERE` 子句之后的列没有被隔离（可以说“保持独立”），你的数据库将无法使用索引。因此，你的查询可能会变慢。为避免此问题，请确保
    `WHERE` 子句之后的列没有“与他人共谋”来达到某个结果。让它们保持独立——MySQL 将决定如何最好地返回结果。


    ### 消除重复索引


    MySQL 或其任何变体都不会阻止你在同一列上使用重复索引。看看这个例子：


    ```sql

    CREATE TABLE `demo_table` (

    `incrementing_id` INT(25) NOT NULL AUTO_INCREMENT PRIMARY KEY,

    `column_2` VARCHAR(120) NOT NULL DEFAULT '''',

    `column_3` VARCHAR(125) NOT NULL DEFAULT '''',

    ...

    INDEX(incrementing_id),

    UNIQUE(incrementing_id)

    );

    ```


    这可能让缺乏经验的用户感到棘手——有些人可能认为这个 SQL 查询使 `incrementing_id` 列自动递增（理应如此，因此得名），在定义列后在同一列上添加一个索引，并确保该列中的所有值都是唯一的（没有重复值）。一切都很完美，对吧？


    有经验的 DBA 会很快注意到不对劲。确实，我们在同一列上有三个索引！MySQL 使用索引来实现 `PRIMARY KEY` 和 `UNIQUE` 约束，因此我们当时就有两个索引。而且既然我们的列也被索引了，那又在同一列上增加了一个索引。一列上有三个索引？然后开发人员就会纳闷他们的数据库结构出了什么问题。


    ```sql

    请记住，MySQL 不会“保护你”免受在同一列上附加多个索引的影响，因此请仔细选择索引类型。

    ```


    我将在接下来的章节中详细介绍索引的方方面面，但现在，请不要让你的列（以及最终你的数据库）受苦——明智地使用索引。


    ### 使用 EXISTS 而不是 IN


    你们中的一些人可能会选择使用 `IN` 连同子查询，像这样：


    ```sql

    SELECT * FROM `demo_table` WHERE id IN (SELECT id FROM `demo_2` WHERE date >=
    DATEADD(day, -7, GETDATE()));

    ```

    '
- fmt: 'Such a subquery would find records within the last week, but it would also
    likely require MySQL to perform a full-table scan to return the necessary result
    set. Not good!


    Consider switching `IN` to `EXISTS` to avoid a full-table scan on the subquery.
    If we switch the `IN` clause to `EXISTS`, we would now have a query like so:


    ```

    SELECT * FROM `demo_table` d WHERE EXISTS (SELECT 1 FROM demo_2 d2 WHERE d2.id
    = d.id AND d2.date >= DATEADD(day, -7, GETDATE()));

    ```


    No more full-table scans. Woohoo!


    ## Make Use of Stored Procedures and Triggers


    Many developers also face the necessity to complete the same task multiple times
    and so they craft similar queries again, again and again, wasting their time and
    effort (and putting additional strain on databases too) – your databases don’t
    like that either.


    There is a way around that – look into stored procedures and triggers!


    Stored procedures can help you complete certain tasks, and they are an extension
    of the SQL language. Making use of stored procedures allows you to employ procedural
    language within MySQL – they’re SQL code chunks with `IF`s and loops.


    No matter if you’re an SQL expert or not, chances are that you will be able to
    understand 90% or even more of what they have to offer. They can be extremely
    useful if you have to break down complex SQL logic into manageable and reusable
    modules that can be used on demand.


    Here’s where triggers come into the picture too – triggers are essentially objects
    within your database that activate when a particular event takes place. They may
    be used for a variety of different purposes, but most of their use cases come
    down to maintaining the integrity of data within your database. Make use of them!
    They can also be used for calculation purposes or, admittedly, to do some weird
    stuff, too. At the basic level, their syntax looks like this:


    ```

    CREATE TRIGGER trigger_name

    [AFTER|BEFORE] [operation]

    ON table_name FOR EACH ROW

    BEGIN

    --define trigger here

    END;

    ```


    In this case, `operation` means any `INSERT`, `UPDATE`, or `DELETE` operation,
    and triggers need to also be row-based, hence the `ROW` definition.


    All this means that triggers can be used to do a range of different stuff that
    may (or may not) make sense. Look at the one below:


    ```

    CREATE TRIGGER slowinsert_trigger

    BEFORE INSERT ON users

    FOR EACH ROW

    BEGIN

    DO SLEEP(RAND() * 10);

    END;

    ```


    This trigger will make any and all `INSERT` operations on the `users` table slow
    down by generating a random number, multiplying it by 10 times to make the number
    bigger, and then making your database sleep (wait) for this number of seconds
    after every `INSERT` operation. May be useful if you want to make yourself a cup
    of coffee before `INSERT`s of a big data set complete, you know.


    Make use of stored procedures and triggers to minimize the amount of repetitive
    SQL queries you run within your database – they exist for a reason. Even if that
    reason may be something fun!


    ## `SHOW STATUS` and `EXPLAIN`


    Coming back to serious topics, you should look into both `SHOW STATUS` and `EXPLAIN`,
    too. These two are crucial to maintaining high performance – `SHOW STATUS` will
    walk you through the status of your database, while `EXPLAIN` will explain everything
    your queries go through when executing.


    `SHOW STATUS` can be invoked standalone as well as with `LIKE` or `WHERE` expressions.
    The primary purpose of `SHOW STATUS` is to provide information related to the
    status of your server (hence the name): it can provide you with the amount of
    currently open tables, aborted connections, a bunch of information on `InnoDB`
    and performance schema, the number of queries that have run in your database,
    and so on. In MariaDB, invoking `SHOW STATUS` in a vanilla form is likely to return
    hundreds of entries ranging from internal `InnoDB` variables to `SSL` and uptime.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig7_HTML.jpg)


    **Figure 5-7** Output of a Vanilla `SHOW STATUS` Query in MariaDB


    “540 rows in set”! Nuts, isn’t it? So many things to take care of. Geez.


    That’s why `SHOW STATUS` supports the `WHERE` and `LIKE` clauses – they are supported
    so you can filter what’s important to you! Such clauses are very useful when you
    want to observe specific information like the number of queries that have been
    executed since the database has been up or information about the query cache.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig8_HTML.jpg)


    **Figure 5-8** Information about the query cache


    Unfortunately, only knowing your way around `SHOW STATUS` won’t be enough to bring
    your database to perfection. Observing statistics is awesome, but you should act
    for things to change; observing metrics isn’t enough. That’s why `SHOW STATUS`
    has a brother (or a sister, if you will) called `EXPLAIN`: it can’t be invoked
    standalone like `SHOW STATUS` can (if you will, you receive an error), but it
    can be used in front of `SELECT`, `INSERT`, `DELETE`, `REPLACE`, or `DELETE` SQL
    queries. Here’s `EXPLAIN` in action.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig9_HTML.jpg)


    **Figure 5-9** `EXPLAIN` in action


    When `SELECT` queries are being profiled, `EXPLAIN` will return a couple of columns
    depicting all sorts of information:


    | Column | About | Possible Values |

    | --- | --- | --- |

    | `id` | The ID of the query. | Numeric IDs |

    | `select_type` | The `SELECT` query type. If our `SELECT` is not using subqueries
    or the `UNION` clause, the `SELECT` query type will be `SIMPLE`; if the `UNION`
    clause is used, we will see `UNION`; if our select is the first select in a subquery,
    we will see `SUBQUERY`, etc. | `SIMPLE`, `PRIMARY`, `UNION`, `DEPENDENT UNION`,
    `UNION RESULT`, `SUBQUERY`, `DEPENDENT SUBQUERY`, `DERIVED`, `DEPENDENT DERIVED`,
    `MATERIALIZED`, `UNCACHEABLE SUBQUERY`, `UNCACHEABLE UNION` |

    | `table` | The table of concern. | The table that we’re running our queries on.
    |

    | `partitions` | Any applicable partitions. | `NULL` for non-partitioned tables,
    otherwise the name of the partition. |

    | `type` | The type of the `JOIN` query if one is used. | `system`, `const`, `eq_ref`,
    `ref`, `fulltext`...See the documentation for all possible values. |

    | `possible_keys` | What keys (indexes) can MySQL use to help the query? | Any
    applicable index names. |

    | `key` | The key (index) that was used. | The name of the index that was used.
    |

    | `key_len` | The length of the key (index) that was used. | The length of the
    key (index) that was used. |

    | `ref` | What columns are compared to the index to select rows? | Any applicable
    column names or `func` if the value is a result of a function. |

    | `rows` | The number of rows examined by MySQL to execute the query. | The number
    of rows that MySQL believes must be looked at for the query to execute. |

    | `filtered` | The estimated percentage of rows in the table that were filtered
    by a condition. | 0–100% |

    | `Extra` | Any additional information that may be useful to know how MySQL executed
    the query. | `Backward index scan`, `const row not found`, `Deleting all rows`,
    `Distinct`, `FirstMatch`, `Full scan on NULL key`, `No matching min/max row`...See
    the documentation for all possible values. |


    Both `SHOW STATUS` and `EXPLAIN` can be very valuable additions to your database
    toolset – use them when you see fit, but don’t forget that they’re not the only
    tools that can help your database when times become hard.


    ## Summary


    Understanding SQL query components is an essential task for everyone who cares
    about their database. As each SQL query is a task composed of many different tasks
    that help your database, understanding how queries look under the hood and what
    they consist of, what their parsers and optimizers do, and walking yourself through
    the explanatory outputs and error codes provided by your database is an essential
    step toward a brighter and better future for your application, server, and database.'
  raw: 'Such a subquery would find records within the last week, but it would also
    likely require MySQL to perform a full-table scan to return the necessary result
    set. Not good!


    Consider switching `IN` to `EXISTS` to avoid a full-table scan on the subquery.
    If we switch the `IN` clause to `EXISTS`, we would now have a query like so:


    ```

    SELECT * FROM `demo_table` d WHERE EXISTS (SELECT 1 FROM demo_2 d2 WHERE d2.id
    = d.id AND d2.date >= DATEADD(day, -7, GETDATE()));

    ```


    No more full-table scans. Woohoo!


    ### Make Use of Stored Procedures and Triggers


    Many developers also face the necessity to complete the same task multiple times
    and so they craft similar queries again, again and again, wasting their time and
    effort (and putting additional strain on databases too) – your databases don’t
    like that either.


    There is a way around that – look into stored procedures and triggers!


    Stored procedures can help you complete certain tasks, and they are an extension
    of the SQL language. Making use of stored procedures allows you to employ procedural
    language within MySQL – they’re SQL code chunks with IFs and loops.


    No matter if you’re an SQL expert or not, chances are that you will be able to
    understand 90% or even more of what they have to offer. They can be extremely
    useful if you have to break down complex SQL logic into manageable and reusable
    modules that can be used on demand.


    Here’s where triggers come into the picture too – triggers are essentially objects
    within your database that activate when a particular event takes place. They may
    be used for a variety of different purposes, but most of their use cases come
    down to maintaining the integrity of data within your database. Make use of them!
    They can also be used for calculation purposes or, admittedly, to do some weird
    stuff, too. At the basic level, their syntax looks like this:


    ```

    CREATE TRIGGER trigger_name

    [AFTER|BEFORE] [operation]

    ON table_name FOR EACH ROW

    BEGIN

    --define trigger here

    END;

    ```


    In this case, operation means any `INSERT`, `UPDATE`, or `DELETE` operation, and
    triggers need to also be row-based, hence the row definition.


    All this means that triggers can be used to do a range of different stuff that
    may (or may not) make sense. Look at the one below:


    ```

    CREATE TRIGGER slowinsert_trigger

    BEFORE INSERT ON users

    FOR EACH ROW

    BEGIN

    DO SLEEP(RAND() * 10);

    END;

    ```


    This trigger will make any and all `INSERT` operations on the `users` table slow
    down by generating a random number, multiplying it by 10 times to make the number
    bigger, and then making your database sleep (wait) for this number of seconds
    after every `INSERT` operation. May be useful if you want to make yourself a cup
    of coffee before `INSERT`s of a big data set complete, you know.


    Make use of stored procedures and triggers to minimize the amount of repetitive
    SQL queries you run within your database – they exist for a reason. Even if that
    reason may be something fun!


    ## SHOW STATUS and EXPLAIN


    Coming back to serious topics, you should look into both `SHOW STATUS` and `EXPLAIN`,
    too. These two are crucial to maintaining high performance – `SHOW STATUS` will
    walk you through the status of your database, while `EXPLAIN` will explain everything
    your queries go through when executing.


    `SHOW STATUS` can be invoked standalone as well as with `LIKE` or `WHERE` expressions.
    The primary purpose of `SHOW STATUS` is to provide information related to the
    status of your server (hence the name): it can provide you with the amount of
    currently open tables, aborted connections, a bunch of information on InnoDB and
    performance schema, the number of queries that have run in your database, and
    so on. In MariaDB, invoking `SHOW STATUS` in a vanilla form is likely to return
    hundreds of entries ranging from internal InnoDB variables to SSL and uptime.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Output of a Vanilla SHOW STATUS Query in MariaDB


    “540 rows in set”! Nuts, isn’t it? So many things to take care of. Geez.


    That’s why `SHOW STATUS` supports the `WHERE` and `LIKE` clauses – they are supported
    so you can filter what’s important to you! Such clauses are very useful when you
    want to observe specific information like the number of queries that have been
    executed since the database has been up or information about the query cache.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Information about the query cache


    Unfortunately, only knowing your way around `SHOW STATUS` won’t be enough to bring
    your database to perfection. Observing statistics is awesome, but you should act
    for things to change; observing metrics isn’t enough. That’s why `SHOW STATUS`
    has a brother (or a sister, if you will) called `EXPLAIN`: it can’t be invoked
    standalone like `SHOW STATUS` can (if you will, you receive an error), but it
    can be used in front of `SELECT`, `INSERT`, `DELETE`, `REPLACE`, or `DELETE` SQL
    queries. Here’s `EXPLAIN` in action.


    ![](images/625040_1_En_5_Chapter/625040_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    EXPLAIN in action


    When `SELECT` queries are being profiled, `EXPLAIN` will return a couple of columns
    depicting all sorts of information:


    | Column | About | Possible Values |

    | --- | --- | --- |

    | id | The ID of the query. | Numeric IDs |

    | select_type | The `SELECT` query type. If our `SELECT` is not using subqueries
    or the `UNION` clause, the `SELECT` query type will be `SIMPLE`; if the `UNION`
    clause is used, we will see `UNION`; if our select is the first select in a subquery,
    we will see `SUBQUERY`, etc. | `SIMPLEPRIMARYUNIONDEPENDENT UNIONUNION RESULTSUBQUERYDEPENDENT
    SUBQUERYDERIVEDDEPENDENT DERIVEDMATERIALIZEDUNCACHEABLE SUBQUERYUNCACHEABLE UNION`
    |

    | table | The table of concern. | The table that we’re running our queries on.
    |

    | partitions | Any applicable partitions. | `NULL` for non-partitioned tables,
    otherwise the name of the partition. |

    | type | The type of the `JOIN` query if one is used. | `systemconsteq_refreffulltext`...See
    the documentation for all possible values. |

    | possible_keys | What keys (indexes) can MySQL use to help the query? | Any applicable
    index names. |

    | key | The key (index) that was used. | The name of the index that was used.
    |

    | key_len | The length of the key (index) that was used. | The length of the key
    (index) that was used. |

    | ref | What columns are compared to the index to select rows? | Any applicable
    column names or `func` if the value is a result of a function. |

    | rows | The number of rows examined by MySQL to execute the query. | The number
    of rows that MySQL believes must be looked at for the query to execute. |

    | filtered | The estimated percentage of rows in the table that were filtered
    by a condition. | 0–100% |

    | Extra | Any additional information that may be useful to know how MySQL executed
    the query. | `Backward index scanconst row not foundDeleting all rowsDistinctFirstMatchFull
    scan on NULLkeyNo matching min/max row...`See the documentation for all possible
    values. |


    Both `SHOW STATUS` and `EXPLAIN` can be very valuable additions to your database
    toolset – use them when you see fit, but don’t forget that they’re not the only
    tools that can help your database when times become hard.


    ## Summary


    Understanding SQL query components is an essential task for everyone who cares
    about their database. As each SQL query is a task composed of many different tasks
    that help your database, understanding how queries look under the hood and what
    they consist of, what their parsers and optimizers do, and walking yourself through
    the explanatory outputs and error codes provided by your database is an essential
    step toward a brighter and better future for your application, server, and database.'
  trans: '

    这样的子查询能够找出最近一周内的记录，但很可能还需要 MySQL 执行全表扫描来返回所需的结果集。这可不好！


    考虑将 `IN` 改为 `EXISTS`，以避免对子查询进行全表扫描。如果将 `IN` 子句改为 `EXISTS`，我们会得到一个这样的查询：


    ```

    SELECT * FROM `demo_table` d WHERE EXISTS (SELECT 1 FROM demo_2 d2 WHERE d2.id
    = d.id AND d2.date >= DATEADD(day, -7, GETDATE()));

    ```


    不再需要全表扫描。好耶！


    ## 善用存储过程和触发器


    许多开发者还会面临需要多次完成相同任务的情况，因此他们一遍又一遍地编写类似的查询，浪费时间和精力（同时也给数据库带来了额外负担）——你的数据库也不喜欢这样。


    有一个解决办法——研究一下存储过程和触发器！


    存储过程可以帮助你完成某些任务，它们是 SQL 语言的扩展。利用存储过程，你可以在 MySQL 中使用过程化语言——它们是包含 `IF` 语句和循环的 SQL
    代码块。


    无论你是否是 SQL 专家，你都有可能理解它们所提供的 90% 甚至更多的内容。如果你需要将复杂的 SQL 逻辑分解成可管理、可重用的模块并按需使用，它们会非常有用。


    这时触发器就派上用场了——触发器本质上是数据库中的对象，当特定事件发生时会被激活。它们可以用于多种不同的目的，但大多数用例都归结为维护数据库中数据的完整性。使用它们吧！它们也可以用于计算目的，或者，诚然，也可以用来做一些奇怪的事情。基本语法如下所示：


    ```

    CREATE TRIGGER trigger_name

    [AFTER|BEFORE] [operation]

    ON table_name FOR EACH ROW

    BEGIN

    --在此定义触发器

    END;

    ```


    在这个例子中，`operation` 指的是任何 `INSERT`、`UPDATE` 或 `DELETE` 操作，并且触发器也需要是基于行的，因此有了 `ROW`
    定义。


    所有这些意味着触发器可以用来做各种不同的事情，这些事情可能（也可能不）有意义。看看下面这个：


    ```

    CREATE TRIGGER slowinsert_trigger

    BEFORE INSERT ON users

    FOR EACH ROW

    BEGIN

    DO SLEEP(RAND() * 10);

    END;

    ```


    这个触发器会通过生成一个随机数，将其乘以 10 使数字变大，然后在每次 `INSERT` 操作后让你的数据库睡眠（等待）这个数字的秒数，从而使 `users`
    表上的任何和所有 `INSERT` 操作变慢。如果你想在大数据集的 `INSERT` 操作完成前给自己冲杯咖啡，可能挺有用的，你懂的。


    利用存储过程和触发器，可以最大限度地减少你在数据库中运行的重复 SQL 查询数量——它们的存在是有理由的。即使那个理由可能是为了好玩！


    ## `SHOW STATUS` 和 `EXPLAIN`


    回到严肃的话题，你也应该研究一下 `SHOW STATUS` 和 `EXPLAIN`。这两者对于保持高性能至关重要——`SHOW STATUS` 会引导你了解数据库的状态，而
    `EXPLAIN` 则会解释你的查询在执行时所经历的一切。


    `SHOW STATUS` 可以单独调用，也可以配合 `LIKE` 或 `WHERE` 表达式使用。`SHOW STATUS` 的主要目的是提供与服务器状态相关的信息（因此得名）：它可以提供当前打开的表的数量、中止的连接数、一堆关于
    `InnoDB` 和性能模式的信息、数据库中已运行的查询数量等等。在 MariaDB 中，以原始形式调用 `SHOW STATUS` 可能会返回数百个条目，范围从内部
    `InnoDB` 变量到 `SSL` 和运行时间。


    ![](img/625040_1_En_5_Fig7_HTML.jpg)


    **图 5-7** MariaDB 中原始 `SHOW STATUS` 查询的输出


    “540 行结果集”！疯狂，不是吗？有这么多事情要处理。天哪。


    这就是为什么 `SHOW STATUS` 支持 `WHERE` 和 `LIKE` 子句——支持它们是为了让你能够过滤出对你重要的信息！当你想观察特定信息时，比如自数据库启动以来已执行的查询数量或有关查询缓存的信息，这些子句非常有用。


    ![](img/625040_1_En_5_Fig8_HTML.jpg)


    **图 5-8** 关于查询缓存的信息


    不幸的是，只知道如何使用 `SHOW STATUS` 不足以让你的数据库臻于完美。观察统计信息很棒，但你应该采取行动来改变现状；仅仅观察指标是不够的。这就是为什么
    `SHOW STATUS` 有一个兄弟（或者姐妹，如果你愿意的话）叫做 `EXPLAIN`：它不能像 `SHOW STATUS` 那样单独调用（如果你尝试，会收到错误），但它可以用在
    `SELECT`、`INSERT`、`DELETE`、`REPLACE` 或 `DELETE` SQL 查询之前。下面是 `EXPLAIN` 的实际应用。


    ![](img/625040_1_En_5_Fig9_HTML.jpg)


    **图 5-9** `EXPLAIN` 实际应用


    当对 `SELECT` 查询进行性能分析时，`EXPLAIN` 会返回几列，描绘各种信息：


    | 列名 | 说明 | 可能的值 |

    | --- | --- | --- |

    | `id` | 查询的 ID。 | 数字 ID |

    | `select_type` | `SELECT` 查询的类型。如果我们的 `SELECT` 没有使用子查询或 `UNION` 子句，则 `SELECT`
    查询类型为 `SIMPLE`；如果使用了 `UNION` 子句，我们会看到 `UNION`；如果我们的 select 是子查询中的第一个 select，我们会看到
    `SUBQUERY`，等等。 | `SIMPLE`, `PRIMARY`, `UNION`, `DEPENDENT UNION`, `UNION RESULT`,
    `SUBQUERY`, `DEPENDENT SUBQUERY`, `DERIVED`, `DEPENDENT DERIVED`, `MATERIALIZED`,
    `UNCACHEABLE SUBQUERY`, `UNCACHEABLE UNION` |

    | `table` | 相关的表。 | 我们正在其上运行查询的表。 |

    | `partitions` | 任何适用的分区。 | 非分区表为 `NULL`，否则为分区名称。 |

    | `type` | 如果使用了 `JOIN` 查询，则为其类型。 | `system`, `const`, `eq_ref`, `ref`, `fulltext`...
    请参阅文档了解所有可能的值。 |

    | `possible_keys` | MySQL 可以使用哪些键（索引）来帮助查询？ | 任何适用的索引名称。 |

    | `key` | 实际使用的键（索引）。 | 所用索引的名称。 |

    | `key_len` | 所使用的键（索引）的长度。 | 所使用的键（索引）的长度。 |

    | `ref` | 哪些列与索引进行比较以选择行？ | 任何适用的列名，或者如果值是函数的结果，则为 `func`。 |

    | `rows` | MySQL 为执行查询而检查的行数。 | MySQL 认为为了执行查询必须查看的行数。 |

    | `filtered` | 表中被条件过滤掉的行的估计百分比。 | 0–100% |

    | `Extra` | 任何可能有助于了解 MySQL 如何执行查询的附加信息。 | `Backward index scan`, `const row not
    found`, `Deleting all rows`, `Distinct`, `FirstMatch`, `Full scan on NULL key`,
    `No matching min/max row`... 请参阅文档了解所有可能的值。 |


    `SHOW STATUS` 和 `EXPLAIN` 都可以成为你数据库工具集中非常有价值的补充——在适当的时候使用它们，但不要忘记，当情况艰难时，它们并不是唯一能帮助你数据库的工具。


    ## 总结


    理解 SQL 查询组件对于每个关心自己数据库的人来说都是一项基本任务。由于每个 SQL 查询都是由许多不同的任务组成的复合任务，这些任务共同帮助你的数据库，因此理解查询在底层的运作方式、它们的构成、它们的解析器和优化器的作用，并自行梳理数据库提供的解释性输出和错误代码，是通向你的应用程序、服务器和数据库更光明、更美好未来的重要一步。

