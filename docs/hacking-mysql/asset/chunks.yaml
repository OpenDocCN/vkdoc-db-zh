- fmt: '# Understanding MySQL Errors


    Coming back to errors in general, understanding the MySQL error format is a necessity
    when trying to troubleshoot errors. That’s pretty much the entire reason errors
    exist in the first place – an error message tells us what went wrong in a manner
    that’s understandable to both developers and database experts, an error number
    lets us search for solutions to the error via documentation or other manners,
    and an error condition in the form of an `SQLSTATE` value provides developers
    with the ability to ask other developers what went wrong and ask for assistance
    in solving the problem. Win-win!


    ### Common MySQL Error Codes


    For your errors to end in a win-win situation, you have to have a grasp on at
    least a small set of MySQL error codes that can arise during your work with the
    DBMS. Here are a couple:


    *   **Error 1040: Too many connections:** This error means that the MySQL Server
    has reached the maximum number of client connections, so it cannot accept new
    ones. An easy solution to this problem is to make sure all of the queries that
    you run inside of your database are finished – closed – properly.

    *   **Error 1045: Access denied:** Do you have the proper permissions to run the
    SQL query you just attempted to run? Double-check the permissions for the user
    that attempted to run the SQL query, and once you’re 100% sure they’re in place
    and correct (in that they permit this user to run specific queries), use a `FLUSH
    PRIVILEGES;` statement to save your changes.

    *   **Error 1064: Syntax error:** This MySQL error denotes a syntax error. Check
    the syntax of the query you ran that caused this error.

    *   **Error 1114: Table is full:** This error denotes a shortage of space on the
    disk. Such issues mostly occur when the tables in your database are super large,
    when running `ALTER TABLE` queries for large tables, or when creating backups
    for large databases.

    *   **Error 1659: Field “timestamp” is of a not allowed type for this type of
    partitioning:** A column (field) called “timestamp” doesn’t have the allowed data
    type for a specific type of partitioning. We’ve come across this error in the
    last chapter when I told you that you can’t partition timestamp values, remember?

    *   **Error 2006: MySQL Server connection closed:** This error denotes that the
    MySQL server has timed out and closed the initialized connection. Check on the
    value of the `wait_timeout` variable and make sure the value is acceptable to
    both you and your database.

    *   **Error 2008: Client ran out of memory:** This error means that the MySQL
    client has run out of memory when performing a specific task. A very frequent
    cause of this problem is queries that return millions or even billions of results;
    if you need to return so many results, it’s reasonable enough that MySQL would
    start screaming, beeping, or making other noises. Beep boop.

    *   **Error 2013: Lost connection during query:** This error is also quite self-explanatory.
    If you see this error, that’s MySQL telling you that it has lost connection to
    the database during query execution. Are you sure that your database isn’t taking
    too long to respond to queries? If you are, make sure that your Internet connection
    is stable, and you’re not facing any connectivity issues, or try increasing the
    number in the `net-read-timeout` variable (this variable denotes the number of
    seconds MySQL will wait for data from a connection before aborting read operations).

    *   **Packet too large:** This is one of those errors without code that often
    eludes developers, but is rather simple to understand once you get to the bottom
    of it: this error has to do with the `max_allowed_packet` variable that denotes
    the maximum possible packet size for the server and the client alike. If you face
    this error, increase the size of the maximum allowed packet size by fiddling with
    the `max_allowed_packet` variable.

    *   **Can’t create/write file:** This error usually appears when your database
    is unable to create or write to a file in a temporary directory. Make sure that
    the directory for temporary files is defined properly in the `tmpdir` variable
    and ensure that MySQL has the ability to write to the directory specified therein.


    Errors aren’t something terrible – most of them can be squashed within minutes,
    and while some do require configuration changes (changes to the values in variables,
    etc.), they aren’t the end of the world either. As time goes by and you will become
    acquainted with error codes, you will understand that errors are nothing to be
    afraid of: dig into the documentation and find out what error codes like `HY000`,
    `42000`, or others mean, then consult the same documentation or your friendly
    neighborhood DBAs for advice on how to solve the issue. I’m sure you will squash
    the problem sooner than you think.


    ## Factors Disliked by Your Queries


    Query components are directly impacted by factors within your server, application,
    and database, and all queries you run come with a distinct weight toward your
    database too – you already know that to make your queries performant, you need
    to minimize their effort by minimizing or eliminating the number of tasks they
    perform, but that be made even more effective if you avoid certain things that
    SQL queries dislike.


    ### Isolate Your Columns!


    The first thing to keep in mind has to do with search – `SELECT` – queries. If
    you find that the column you run search queries on has an index, is properly partitioned,
    and you run `SELECT column` instead of `SELECT *` to select data inside of your
    database but it is still running slow, you may want to check if the column after
    the `WHERE` clause is isolated, too. That means that queries like the one below
    certainly won’t fly:


    ```sql

    SELECT * FROM `demo_table` WHERE column + 786 = 4425;

    ```


    They won’t fly because if the column after the `WHERE` clause isn’t isolated (“left
    alone” if you will), your database won’t be able to use the index. As such, your
    query may slow down. To avoid such an issue, make sure that the columns after
    the `WHERE` clause aren’t “conspiring together with someone” to achieve a result.
    Leave them alone – MySQL will decide how best to return results.


    ### Get Rid of Duplicate Indexes


    MySQL or any of its flavors won’t protect you from using duplicate indexes on
    the same column either. Take a look at this example:


    ```sql

    CREATE TABLE `demo_table` (

    `incrementing_id` INT(25) NOT NULL AUTO_INCREMENT PRIMARY KEY,

    `column_2` VARCHAR(120) NOT NULL DEFAULT '''',

    `column_3` VARCHAR(125) NOT NULL DEFAULT '''',

    ...

    INDEX(incrementing_id),

    UNIQUE(incrementing_id)

    );

    ```


    This one may become a tough nut to crack for inexperienced users – some may think
    that this SQL query makes the `incrementing_id` column increment automatically
    (it should, hence the name), adds an index on the same column once the columns
    are defined, and also makes sure that all values in the column are unique (there
    are no duplicate values). All fun and roses, right?


    Experienced DBAs will quickly notice that something’s up. Indeed, we have three
    indexes on the same column! MySQL implements the `PRIMARY KEY` and `UNIQUE` constraints
    with indexes, so we have two indexes right then and there. And since our column
    is indexed, too, that adds another index on the same column. Three indexes on
    one column? And then devs wonder what’s up with their database structure.


    ```sql

    Keep in mind that MySQL doesn’t “protect you” from appending multiple indexes
    on the same column, so choose the types of indexes carefully.

    ```


    I’ll walk you through the ins and outs of indexes in an upcoming chapter, but
    for now, please don’t make your columns (and your database as a result) suffer
    – employ indexes wisely.


    ### Use EXISTS Instead of IN


    Some of you may elect to use `IN` together with a subquery like so:


    ```sql

    SELECT * FROM `demo_table` WHERE id IN (SELECT id FROM `demo_2` WHERE date >=
    DATEADD(day, -7, GETDATE()));

    ```'
