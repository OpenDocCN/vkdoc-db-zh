    # MariaDB 备份工具详解


    ## 备份选项


    | **选项** | **用途或含义** |

    | --- | --- |

    | `-A` `--all-databases` | 当需要备份所有数据库中的全部数据时，使用这些选项。 |

    | `-B` `--databases` | 这些选项仅转储指定的数据库。使用这些选项时，MariaDB 会将第一个标题参数视为数据库名称。数据库名称应以空格分隔（参见下面的示例）。
    |

    | `--add-drop-database` `--add-drop-table` `--add-drop-trigger` `--add-locks`
    | 根据所使用的选项，在重新创建每个数据库前添加`DROP DATABASE`选项，在创建表前添加`DROP TABLE`选项，在创建触发器前添加`DROP
    TRIGGER`选项，或在运行`INSERT`查询前添加一些锁定语句。 |

    | `--lock-all-tables` `-x` | 在备份运行期间，锁定所有数据库中的所有表。 |

    | `--lock-tables` `-l` | 当转储数据库时，备份其内部数据之前将锁定表。 |

    | `--no-autocommit` | `INSERT`语句前将添加`SET autocommit=0`选项，并且在所有数据插入表后，将开始执行`COMMIT`。
    |

    | `--no-data` `-d` | 将备份表，但不包含与其相关的任何内部信息（内容）。 |

    | `--order-by-size` | 备份操作按大小排序：最小的表优先，最大的表最后。 |

    | `--order-by-primary` | 如果表上存在主键，则按主键排序表行。如果不存在主键，则按第一个唯一索引排序行。 |


    ## 使用示例


    下面展示了几个`mariadb-dump`的使用示例。


    ![](img/625040_1_En_13_Fig2_HTML.jpg)


    图 13-2


    使用`mariadb-dump`备份数据库


    ![](img/625040_1_En_13_Fig3_HTML.jpg)


    图 13-3


    备份`hacking_mysql`数据库中`car_data`表内的数据。在表转储之前，添加了`LOCK TABLE`语句。


    ![](img/625040_1_En_13_Fig4_HTML.jpg)


    图 13-4


    在锁定所有数据库中的所有表的同时，备份所有数据库中的所有数据


    要使用`mariadb-dump`进行部分备份，只需备份部分表或数据库。对于增量备份，需要设计一种方法来识别数据库或其内部表的更改，然后备份自上次备份以来更改的数据和新创建的数据。


    然而，无论`mariadb-dump`看起来多么强大，都需要注意该工具仅执行逻辑备份。如果希望进行物理备份，则需要使用不同级别的工具：其中之一是`Mariabackup`，可用于对
    InnoDB、MyRocks、Aria 或 MyISAM 表背后的数据执行物理备份。该工具可以执行完全、增量或部分备份，也可以恢复数据。根据 MariaDB
    的说法，`Mariabackup`应被视为 Percona XtraBackup 的替代品，因为 MariaDB 不提供对 XtraBackup 的官方支持，并且在可预见的未来也没有计划提供支持——[该问题已知](https://perconadev.atlassian.net/browse/PXB-1550)，但
    Percona XtraBackup 在 MariaDB 中仍不受支持，这就是 MariaDB 建议用户使用`Mariabackup`的原因。


    `Mariabackup`可以使用与 Percona XtraBackup 类似的选项，如下所示：


    ```

    mariabackup [--backup|--prepare] [--copy-back|--move-back] [options]

    ```


    要使用`mariabackup`备份数据，请使用`--target-dir`选项指定备份应存储的目录，并指定可以执行备份的用户和密码，如下所示：


    ```

    mariabackup --backup --target-dir=/tmp/backups/ --user=hackingmysql --password=verystrongpassword

    ```


    由于`mariabackup`的工作方式与 Percona XtraBackup 类似，使用`mariabackup`获取的备份在恢复之前需要准备好，因为数据文件需要保持一致：为此，使用`--prepare`选项运行查询——别忘了指定备份所在的目录：


    ```

    mariabackup --prepare --target-dir=/tmp/backups/

    ```


    其他可用选项如`--copy-back`或`--move-back`将指定是否将备份文件复制或移动回数据库服务器的`datadir`目录——如果出于任何原因想保留数据副本，请使用`--copy-back`。否则，请使用`--move-back`。您将在恢复备份时使用它们：


    ```

    mariabackup --copy-back --target-dir=/tmp/mariadb/backup/

    ```


    ## 增量备份


    要使用`mariabackup`进行增量备份，请使用`--target-dir`和`--incremental-basedir`选项进行完整备份：


    ```

    mariabackup --backup --target-dir=/tmp/mariadb/incremental1 --incremental-basedir=/tmp/mariadb/backup/
    --user=root --password=verystrongpassword

    ```


    这些命令将创建存储数据增量更改的文件，从而允许您将备份恢复为增量备份。


    要恢复增量备份，需要再次准备备份（参见上面的示例），然后使用`--incremental-dir`选项将增量更改应用到完整备份：


    ```

    mariabackup --prepare --target-dir=/tmp/mariadb/backup --incremental-dir=/tmp/mariadb/incremental1

    ```


    只有在将所有增量备份应用到基础备份后，您才能使用`--move-back`或`--copy-back`选项以及像往常一样使用`--target-dir`选项来恢复备份：


    ```

    mariabackup --copy-back --target-dir=/tmp/mariadb/backup/

    ```


    除了了解备份类型外，在需要备份海量数据、压缩和保护备份，当然还有在问题发生时恢复所有备份的情况下，您也会遇到这些情况。


    ## 备份压缩与安全


    正如可以进行备份一样，备份也可以被压缩。备份压缩使开发人员和数据库管理员在存储备份时能够节省磁盘空间，并且恢复压缩备份通常会减少磁盘 I/O，因此这在各方面都是双赢的。


    安全性也是如此——备份可以在进行时加密，并在恢复时解密。加密和解密通过 OpenSSL 完成，而压缩和解压通常通过`gzip`或 7Zip 完成。我将从压缩开始，然后介绍安全性，最后将两者结合起来。


    问题是——MariaDB 中的备份压缩并不复杂，如果您过去使用过 MySQL 或 Percona Server，也不需要重新学习。对于大多数人来说，MariaDB
    备份的压缩和解压缩将使用`gzip`实现，加密将使用`openssl`实现——在压缩和加密备份时，大多数人也会使用`mariabackup`，因此在这方面也不需要重新发明轮子。


    使用`mariabackup`在备份时压缩文件的基本用例需要`gzip`功能，如下所示（一如既往，请将`username`替换为适用的用户名）：


    ```

    mariabackup --user=[username] --backup --stream=xbstream | gzip > [backupnamehere].gz

    ```


    这里`--user`选项指定了执行备份的用户，`--backup`选项指定我们正在执行备份，`--stream`选项指定`xbstream`作为并行复制和压缩备份的选项，最后，`gzip`选项指定我们希望使用
    GZip 压缩备份。


    您也可以使用 7Zip 代替来压缩备份——这里应用了非常相似的逻辑：


    ```

    mariabackup --user=[username] --backup --stream=xbstream | 7z a --si [backupnamehere].xb.7z

    ```


    要解压缩使用`gzip`获取的备份，我们将使用`gunzip`，如下所示：


    ```

    gunzip -c [backupnamehere].gz | mbstream -x

    ```


    要解压缩使用 7Zip 获取的备份：


    ```

    7z e [backupnamehere].xb.7z -so | mbstream -x

    ```


    不是很复杂，对吧？如果您愿意，还可以使用其他方法来压缩备份，但 GZip 和 7Zip 应该能为您提供一个足够好的起点。

    '
- fmt: '# Backup Compression and Encryption


    When it comes to encryption, everything’s also simple: many people using GZip
    will elect to encrypt their backups using OpenSSL, and doing that would look almost
    identical to the last example, just with OpenSSL and AES-256 options added into
    the mix – don’t forget to specify the password you’d encrypt the backup with after
    the `-k` parameter (the `.enc` extension specifies that the backup is encrypted):


    ```

    mariabackup --user=[username] --backup --stream=xbstream | gzip | openssl enc
    –aes-256-cbc –k [encryptionpw] > [backupnamehere].gz.enc

    ```


    To decrypt the same backup, use GZip with the `-d` (decryption) option like so
    and make sure to specify the backup as the input after the `-in` parameter:


    ```

    openssl enc -d -aes-256-cbc -k [encryptionpw] -in [backupnamehere].gz.enc |gzip
    -d| mbstream –x

    ```


    To encrypt backups taken by using 7Zip, add the `-p` option while specifying the
    password you need to encrypt the backup with through the CLI after invoking `7z`
    – 7Zip should have the AES-256 encryption mode built into the tool.


    To compress and secure logical backups, you can also use `mariadb-dump` or `mysqldump`
    and pipe its output to a compression resource like GZip or 7Zip as well. Users
    of `mysqldump` should already be aware of such an option:


    ```

    mysqldump -u[username] [databasename] | gzip > backup.sql.gz

    ```


    Everything works the same way with `mariadb-dump` as well, just note that the
    7Zip option won’t be supported, so if you’re compressing logical backups, you’re
    going to have to use `gzip/gunzip` instead.


    Backup compression and security aren’t rocket science, and with some effort and
    education, your backups can take up less space on the disk and be stored in an
    encrypted fashion, too. Cool, yeah?


    ## Backing Up Big Data Sets


    To back up bigger data sets (let’s say that “big data” is anything in the 100
    million rows realm), you once again would need to come back to the basics and
    understand that backups will be quick if they come with as little overhead as
    possible and that you will have to wait for a while for the backups to complete
    anyway (after all, you’re copying over bigger data sets, right?)


    Advice relevant to tools like `mariabackup` and `mariadb-dump` still applies:
    *everything’s still valid*, but when backing up bigger data sets, keep in mind
    that small things make a lot of difference. For those backing up bigger data sets
    with `mariadb-dump`, I’d suggest


    1.  Specifying what kind of databases and/or tables within you need to back up
    by specifying them as options when invoking `mariadb-dump` as to not back up everything
    that exists.

    2.  Fiddling with the `--max-allowed-packet` option to set the maximum allowed
    packet length that should be sent/received (maximum – 1GB).

    3.  Enclosing `INSERT` statements with the `--no-autocommit` option to turn off
    automatic commits for bulk inserting operations.

    4.  Looking into the `--add-drop-database` or `--add-drop-table` options if/when
    necessary. Not a performance-enhancing option, but you wouldn’t have to drop databases/tables,
    and the backup would recreate them for you instead.

    5.  Backing up data row-by-row instead of buffering data before backing it up
    for memory reasons (you do have a lot of data, right?) – for that, use `--opt`
    or `--quick`.

    6.  Avoiding using the `-c` or `--complete-insert` options for your `INSERT` statements
    to skip specifying column names – if you have a lot of columns within your tables
    and your use case necessitates logical backups, skipping column names should make
    your backup size significantly smaller.

    7.  Setting the default character set with `--default-character-set` if necessary.
    The default character set set by MariaDB will be `utf8mb4`, but if you need to
    adjust the character set because you store characters from a different language,
    the `--default-character-set` setting is the way to go. Alternatively, use the
    `set-charset` option to add `SET NAMES default_character_set` to the backup.

    8.  Fiddling with the `-K` or `--disable-keys` option if you have indexes on the
    table. This option will add the necessary keys (indexes) on the table after all
    of the rows are inserted.

    9.  Making use of the `--fields-terminated-by` or `--fields-escaped-by` options.
    With them, fields in the backup will be terminated or escaped by a string of your
    choice.

    10. Looking into the `-f` or `--force` option. This option would let the backup
    continue running even if errors would be encountered – very useful for all kinds
    of use cases!


    Again – this is nothing revolutionary, just some of the default options you can
    use. I don’t promise that your backups will complete in an instant – they almost
    certainly won’t – but good things come to those who wait, right?


    However, if you don’t want/need to use `mariabackup` or `mariadb-dump`, you have
    another option that I’ve talked about numerous times already – you can use `SELECT
    ... FROM ... INTO OUTFILE`/`LOAD DATA INFILE` – something like this will work:


    ```

    SELECT * FROM ''table_name'' INTO OUTFILE ''/tmp/table_backup.txt'' FIELDS TERMINATED
    BY ''|'' [other options...];

    ```


    The problem with this approach is that if you have a lot of tables (which you
    almost certainly do), running the same query manually all the time becomes infeasible.
    To automate at least a part of your work, you can make use of built-in scheduling
    tasks like so:


    ```

    CREATE EVENT event_daily ON SCHEDULE EVERY 1 DAY

    STARTS CURRENT_DATE [+ INTERVAL X DAY + INTERVAL Y MINUTE]

    DO

    Query here...

    ```


    Such an event would run every day starting the date you specify (e.g., if you
    specify `INTERVAL 1 DAY + INTERVAL 1 MINUTE`, the event would start tomorrow at
    00:01), and would run any query after the `DO` specification meaning that if you
    provide a query like `UPDATE ''customers'' SET ''days_retained'' = ''days_retained''
    + 1`, it would update the `days_retained` column of the `customer` table and add
    1 more day to the customer’s retention period. The same would work with backups
    with `SELECT * INTO OUTFILE` – specify an event like so:


    ```

    CREATE EVENT event_daily ON SCHEDULE EVERY 1 DAY

    STARTS CURRENT_DATE + INTERVAL 1 DAY

    DO

    SELECT * FROM `your_table` INTO OUTFILE ''/tmp/your_table_backup.txt'' FIELDS
    TERMINATED BY ''|'';

    ```


    Then, MariaDB would provide you with a backup file called `your_table_backup.txt`
    consisting of everything within `your_table` with fields terminated by the `|`
    character every single day. Of course, the problem with this approach would be
    that you would have to create another script that would move the file out of the
    `/tmp/` directory to somewhere else every single day because two files of the
    same simply can’t co-exist, but backing up in such a way would be possible too.
    If you can’t be bothered to come up with scripts/solutions for moving files out
    of the `/tmp/` directory, you can give the file a name related to the current
    date, but that’d be a little more complex to prepare. Nonetheless, it is possible
    when we use a query like so:


    ```

    SET @backup_prepare = CONCAT("SELECT * FROM `your_table` INTO OUTFILE ''C:/wamp64/tmp/backups/",
    DATE_FORMAT(NOW(), ''%d%m%Y''), ".csv''");

    PREPARE x FROM @backup_prepare;

    EXECUTE x;

    DROP PREPARE x;

    ```


    Once done, our backup would reside in the backups directory inside of the tmp
    directory.


    Not everyone will make use of `SELECT ... INTO OUTFILE` and it’s not a fit for
    every use case, but as the statement allows us to back up raw data, it’s a very
    good fit for those working with bigger data sets.'
