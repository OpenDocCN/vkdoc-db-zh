  trans: '

    # 在 MySQL/MariaDB 中插入与优化数据


    插入两万行数据耗时不到一秒——还不错吧？如果使用 SSD 或 NVMe 硬盘，你很可能会看到更快的结果。更不用说，`INSERT INTO ... SELECT`
    查询通常会比普通的 `SELECT` 查询更慢，因为我们的示例会写入临时文件，而 `SELECT` 查询则是从磁盘上的文件读取数据。不过对于将数据分散存储在多个表/数据库中的情况，这个示例无疑是一个可行的选择。


    如果你需要处理更庞大的数据集（≥1 亿行），上述两种方法都将力不从心；这是因为 `INSERT` 查询伴随着大量开销，而对于更大数据集的最佳性能，必须消除这些开销。`LOAD
    DATA INFILE` 是完成此任务的绝佳选择——这是一个专门设计用于将大数据集从文件加载到磁盘的查询，通过以下方式实现：


    *   数据解析所需开销极小

    *   允许用户跳过某些行或列

    *   允许用户仅将数据加载到特定列

    *   处理与重复键相关的错误


    使用了部分最常用选项的 `LOAD DATA INFILE` 如下所示：


    ```

    LOAD DATA [LOCAL] INFILE [REPLACE|IGNORE] INTO TABLE `demo_table` [PARTITION (p1)]
    [CHARACTER SET charset] [FIELDS|COLUMNS TERMINATED BY ''|''] [IGNORE number LINES|ROWS];

    ```


    你可能已经看出，`LOAD DATA INFILE` 是个强大的家伙。让我们通过分解来驯服它：


    *   可选的 `LOCAL` 选项指定文件位于客户端主机上，而非服务器上。

    *   `REPLACE` 或 `IGNORE` 选项可让你替换字符或忽略某些行。

    *   如果指定了任何分区，`PARTITION` 选项会将数据加载到特定分区。

    *   `CHARACTER SET` 选项在将数据加载到数据库时会使用指定的字符集。

    *   `FIELDS|COLUMNS TERMINATED BY` 选项允许你指定哪个字符表示另一列的开始。换句话说，哪个字符会告诉 MySQL/MariaDB
    数据应插入到另一列中？

    *   `IGNORE number LINES|ROWS` 选项可让你指定应忽略的行数。当文件首行表示文件结构等情况时非常有用。


    还有更多选项，这些选项结合 MySQL/MariaDB 实例可配置为 InnoDB 的能力，使得 `LOAD DATA INFILE` 成为一股不可忽视的强大力量。


    如果你在处理更庞大的数据集，请记住在创建表时也可以利用 `DEFAULT` 关键字。此关键字让你指定列的默认值，因此 MySQL/MariaDB 会预先用指定值填充该列，而无需你之后运行任何
    `UPDATE` 查询，从而节省你的时间。再看一下上面的例子——在创建 country 列时，我也指定了其默认值应设置为 "Not specified"（未指定）。


    最后但同样重要的是，可以通过在服务器之间切换数据文件将数据插入 MyISAM 表。请记住——MyISAM 没有附带的文件空间（InnoDB 则不能这么说），这意味着如果你发现自己在处理如下所示的数据和/或索引文件。


    ![](img/625040_1_En_9_Fig4_HTML.jpg)

    图 9-4：属于 MyISAM 的 MYD 和 MYI 文件


    你可以在服务器之间轻松地复制/移动它们：这意味着如果你有两台服务器，并且需要存储基于 MyISAM 存储引擎的数据，你可以创建一个基于 MyISAM 的表，在那里插入数据/进行操作，然后复制底层的数据和索引文件，以将数据复制/移动到另一台服务器。很酷——但这仅适用于
    `COUNT` 查询。


    ## 优化 SELECT 查询


    一旦 `INSERT` 查询处理完毕，就来看一下多年来与它们关系非常密切的 `SELECT` 查询。`SELECT` 查询的含义相当明了：它们从数据库中的表中选择数据。这些
    SQL 查询的功能相当简单，我们许多人都明白它们只是数据库的一小部分；然而，缓慢的 `SELECT` 查询性能会对你的数据库和应用程序的性能产生巨大影响。


    有一天，我像往常一样在处理 BreachDirectory 数据泄露搜索引擎，然后我注意到页面开始异常缓慢地加载。我开始寻找原因，并确定是一位客户向 BreachDirectory
    提供了一个包含超过一百万个账户的文件，并要求数据库一次性检查它们是否都存在身份盗窃风险。一次性一百万个账户——而我原本以为速率限制器工作正常。但这次并非如此。问题很快得到了解决，但这恰恰说明
    `SELECT` 查询性能绝非儿戏：这里那里的几个错误可能给你的数据库带来灾难。


    浏览一下你应用程序的核心功能，并搜索（CTRL+F）"`SELECT ... FROM`"：你看到了哪些查询？它们要求你的数据库提供什么数据？它们对应你应用程序中的哪些功能？几乎可以肯定你的应用程序使用了大量的
    `SELECT` 查询：这是因为现代应用程序中的几乎所有内容都存储在数据库中，也从数据库提供给应用程序。还记得 `SHOW PROCESSLIST` 吗？从那里开始。我使用的是本地
    MariaDB 服务器，所以我用 `mysqlslap` 进行负载模拟，并同时使用另一个 CLI 来检查数据库的负载，所以我的结果在格式方面看起来相当糟糕，而你的会好看些。


    ![](img/625040_1_En_9_Fig5_HTML.jpg)

    图 9-5：使用 mysqlslap 在 MariaDB 上模拟负载


    ![](img/625040_1_En_9_Fig6_HTML.jpg)

    图 9-6：运行 mysqlslap 后 SHOW PROCESSLIST 的输出


    值得注意的是，`SHOW PROCESSLIST` 还有几个状态，可以帮助你了解数据库关于某个查询的状态。这些状态可以告诉你很多信息，特别是如果你包含了 `FULL`
    语句。以下是 `SHOW PROCESSLIST` 可以提供的一些状态：


    *   `starting` 表示查询刚刚开始，尚未执行任何任务。

    *   `Sending data` 表示查询正在向服务器发送数据并等待其响应。如果你看到这个状态并且你的应用程序性能陷入停滞，那么处于此状态的查询应该受到怀疑。

    *   `Commit` 表示查询正在向服务器提交数据。

    *   `Writing to net` 表示查询正在向网络接口写入数据包。

    *   `Waiting for source to send event` 表示数据库正在等待源发送数据。

    *   `Has read all relay log; waiting for the replica I/O thread to update it`
    表示查询已读取中继日志（描述数据库更改的事件），并正在等待副本的 I/O 进程。

    *   `NULL` 表示数据库在处理查询方面无所事事（它可能只是在你的 `SHOW PROCESSLIST` 查询“捕获”它时恰好在列表中，就在它完成之前）。


    熟悉 `SHOW PROCESSLIST` 是必要的——只有当你理解查询在数据库中运行时处于哪个状态后，你才能开始优化它们。


    一旦你了解了查询的状态，你就可以开始调查。调查过程不应该花很长时间：通过查看所有列来识别有问题的查询，确定查询的来源，然后开始钻研代码。在钻研代码时，寻找以下问题的答案：

    '
- fmt: '# 优化 SQL 查询性能


    ## 诊断查询状态与数据


    1.  **查询处于什么状态？** `SHOW PROCESSLIST` 描绘了怎样的查询状态？为什么查询会停留在此状态？

    2.  **SQL 查询处理的是什么数据？** 为什么该查询会在你的数据库中运行，你试图实现什么目标？

    3.  **SQL 查询正在读取什么？** 仔细查看你的查询——你的 `SELECT` 语句在读取哪些数据？

    4.  **SQL 查询是否运行了多次？** 查询是否作为循环的一部分运行？循环重复多少次，其用途是什么？

    5.  **是否多次查询了相同的列？** 曾有过多个查询为获取相似数据而查询同一列的情况——你的情况是否如此？

    6.  **查询是否使用了索引或分区？** 如果是，使用了哪些索引和分区；如果不是，是否有任何因素可能阻碍此类查询的性能？

    7.  **查询是否使用了子查询/存储过程？** 如果是，为什么以及使用了什么类型的子查询/存储过程？

    8.  **你认为查询的哪些部分对数据库来说可能存在问题？** 毕竟，你与应用程序有关——问问你的直觉！


    这些问题的答案将为你提供一个良好的起点，并很可能引导你找到可以开始优化查询性能的路径。从顶部开始：仅 SQL 查询的状态就足以让你意识到是什么导致查询“卡住”，从而拖慢应用程序的性能。然后，深入挖掘查询处理的数据：如果你告诉我你使用的查询类似这样，我不会感到惊讶：


    ```sql

    SELECT * FROM `demo_table` INNER JOIN `demo_table2` ON `demo_table`.`col` = `demo_table2`.`col`;

    ```


    一旦有了查询，就使用 `EXPLAIN` 深入探究其周边情况，理解查询是否多次运行、是否使用索引或分区、子查询或 `INNER JOIN` 以及任何相关方面。一旦这些都明确了，就小步推进所有事情：


    ## 分步检查与优化


    1.  **调查表：** 它有多少行，结构是什么样的？对于使用 DbVisualizer、DBeaver 等 SQL 客户端或 phpMyAdmin 等工具的用户，此步骤会更容易，但使用
    CLI 的用户将利用 `DESCRIBE` 语句（参见下文示例）。

    2.  **你的列发生了什么？** 你使用了多少列？使用了哪些数据类型和排序规则？为什么？你的用例是什么，你的数据类型和排序规则是否针对其进行了优化？

    3.  **你的查询是否在帮助你？** 你的查询是以“原始”方式运行，还是使用了索引或分区？如果是，使用了哪种类型的索引或分区？你的查询采取了什么路径？


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig7_HTML.jpg)

    *图 9-7 DESCRIBE 操作示例*


    4.  **你向数据库请求了多少数据？** 这最有可能是你的错误。当你一次请求数百万行数据时，数据库陷入停滞还令人惊讶吗？


    问题不多，答案很多。第一个问题的答案将决定你针对表结构的操作范围，而表结构决定了你的 `SELECT` 查询的行动方案。在确定查询使用了哪些列之后，考虑正在使用的索引或分区——一旦完成，再查看返回了多少行。


    要更深入地理解 `SELECT` 查询，请记住 SQL 查询分析器。换句话说，记住你的 `SELECT` 查询所经历的任务——要优化查询，就必须优化该查询中的任务，对吧？回顾本书的第四章——在那里，我为你提供了一张描绘简单
    `SELECT` SQL 查询的图片，并解释了它在迈向完成过程中所经历的 24 项任务。


    要优化这些任务，你需要：


    | 任务 | 如何优化该任务？ |

    | :--- | :--- |

    | `Starting` | 拥有一个具有互联网连接的数据库服务器（嘿，基础很重要）。 |

    | `Checking permissions` | 确保你用来运行 `SELECT` 查询的用户具有运行它的必要权限——除非你的 `SELECT` 不访问任何表，否则
    `SELECT` 权限是必需的。 |

    | `OptimizingExecutingSending data` | 确保你的 `SELECT` 扫描尽可能少的数据。 |

    | `Query endCommit` | 要使 `COMMIT` 操作更快，请增大 InnoDB 缓冲池的大小。 |


    现在你已经记起了内部机制，再次查看使用 `EXPLAIN` 的基本 `SELECT` 查询的输出。


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig8_HTML.jpg)

    *图 9-8 基本的 SELECT 查询*


    快速翻回第五章以详细记住这些列的含义，然后记住 `SELECT` 查询是如何被优化的。记住你的查询是什么样子，以及约束条件对你的 `SELECT` 子句意味着什么，然后优化这些约束条件。


    ## 优化索引与约束


    优化 `SELECT` 查询性能的第一站涉及在列上添加索引。你可能以前使用过索引，如果你的 `SELECT` 查询仍然很慢，那是因为它仍然不知道通往数据的最快路径。索引帮助你的数据库为
    `SELECT` 查询提供通往数据的路径——但它们有几种类型，并且必须正确选择。我将在专门讨论索引的章节中深入探讨涉及索引的细节，但要正确理解它们，无论如何你都需要复习一下。首先了解基础：


    *   索引是键的同义词，反之亦然。

    *   所有索引都有一个名称或标题。

    *   所有索引都有一个长度——即索引的大小（以字节为单位），而不是索引中的唯一行数之类的东西。

    *   索引有几种类型。为了使 `SELECT` 更快，你们大多数人将使用 B-Tree 索引，我将在后面专门讨论索引的章节中告诉你所有可用索引类型的秘密。

    *   索引充当指向数据的指针，使我们的数据库能够从考虑中排除不必要的行。

    *   大多数使用索引的人将受益于更快的表扫描。

    *   索引扫描总是比磁盘扫描快，但并非所有索引应用都允许索引扫描。

    *   索引必须正确应用，并考虑到 MySQL 在同一列上存在多个相同类型的索引时不会报错。


    关于索引，请记住 MySQL 中可用的默认索引类型指的是 B-Tree 索引，并且 B-Tree 索引是有序的存在。B-Tree 索引是有序的意味着它们可以从上到下递归地遍历树，既然如此，它们使得使用精确搜索运算符的搜索变得前所未有的快，同时也会占用磁盘空间。索引的这些特性允许围绕它们构建多种不同的属性，MySQL
    有许多可用的索引配置文件（类型），包括空间索引、唯一索引、全文索引、降序索引和主键，但为了使 `SELECT` SQL 查询更快，我们现在将专门关注 B-Tree
    索引，并在专门讨论索引的章节中深入研究其他类型。


    *B-tree 索引是 Balanced Tree 索引的简短缩写。* 这些类型的 SQL 索引是 MySQL Server 及其所有对应产品（如 MariaDB
    和 Percona Server）中的默认索引类型。在高层次上，此类索引是有序值列表，被划分为几个范围。


    B-Tree 索引对于 `SELECT` 查询很有用，因为它们将行与有助于快速访问它们的组件（键）关联起来。这正是此类索引将加速我们的搜索引擎或任何与搜索相关的事物的精确原因。'
  raw: '1.  **What’s the state of your query?** What query state does `SHOW PROCESSLIST`
    depict? Why did the query stop there?


    2.  **What data does the SQL query work with?** Why is the query running in your
    database in the first place and what are you trying to achieve?


    3.  **What is the SQL query reading?** Take a close look at your query – what
    data are your `SELECT` queries reading?


    4.  **Does the SQL query run multiple times?** Does the query run as part of a
    loop? How many times does the loop repeat and what is it used for?


    5.  **Is the same column queried multiple times?** There have been cases where
    multiple queries would query the same column to obtain similar data – is that
    the case for you?


    6.  **Is the query using** **indexes** **or** **partitions****?** If yes, what
    indexes and partitions are in use, and if not, is there anything that could hinder
    the performance of such a query type?


    7.  **Is the query using subqueries/****stored procedures****?** If yes, why and
    what kind of subqueries/stored procedures are being used?


    8.  **What parts of the query do** ***you*** **think would be problematic for
    the database?** After all, you have something to do with the application – ask
    your gut!


    The answers to these questions will provide you with a great starting point and
    will likely lead you to a destination from where you can start optimizing your
    query performance. Start from the top: the state of your SQL query alone should
    be enough for you to realize what makes the query “stuck” and, as a result, slows
    down the performance of your application. Then, dig into the data your query works
    with: I’d be unsurprised if you told me that what you have is a query like so:


    ```

    SELECT * FROM `demo_table` INNER JOIN `demo_table2` ON `demo_table`.`col` = `demo_table2`.`col`;

    ```


    Once you have a query, dig into things surrounding it with `EXPLAIN` and understand
    whether the query runs multiple times, whether it uses indexes or partitions,
    subqueries or `INNER JOIN`s, and anything in that realm. Once that’s cleared,
    approach everything in small steps:


    1.  **Investigate the table(s)****:** How many rows does it have and what does
    its structure look like? For those using SQL clients like DbVisualizer, DBeaver,
    or appliances like phpMyAdmin, this step will be made easier, but those using
    the CLI will make use of the `DESCRIBE` statement (see example below).


    2.  **What’s happening with your** **columns****?** How many columns are you using?
    What data types and collations are being used? Why? What’s your use case and are
    your data types and collations optimized for it?


    3.  **Does your query try to help you?** Is your query running in a “vanilla”
    way or does it use indexes or partitions? If yes, what types of indexes or partitions
    are used? What path does your query take?


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    DESCRIBE in action


    1.  **How much data are you asking your database for?** This is the most likely
    mistake of yours. Is it that surprising that your database is grinding to a halt
    when you are asking it for millions of rows in one go?


    Few questions – a lot of answers. The answer to the first question will determine
    the scope of your actions concerning the table structure, and the table structure
    determines the course of action for your `SELECT` queries. After you identify
    what columns are being used by your query, take into consideration the indexes
    or partitions in use – once that’s out of the way, look into how many rows are
    returned.


    To understand `SELECT` queries on a deeper level, remember the SQL query profiler.
    In other words, remember the tasks your `SELECT` query goes through – to optimize
    the query, you have to optimize the tasks in that query, right? Go back to the
    fourth chapter of the book for a bit – there, I have provided you with an image
    depicting a simple `SELECT` SQL query and provided explanations on the 24 tasks
    it goes through when marching toward completion.


    To optimize those tasks, you need the following:


    | Task | How to Optimize the Task? |

    | --- | --- |

    | `Starting` | Have a database server with an Internet connection (hey, basics
    are important.) |

    | `Checking permissions` | Make sure the user you use to run the `SELECT` query
    has the necessary permissions to run it – a `SELECT` permission will be necessary
    unless your `SELECT` doesn’t access any tables. |

    | `OptimizingExecutingSending data` | Make sure your `SELECT` scans through as
    little data as possible. |

    | `Query endCommit` | To make `COMMIT` operations faster, enlarge the size of
    the InnoDB buffer pool. |


    Now that you remembered the internals, look into the output of a basic `SELECT`
    query using `EXPLAIN` once again.


    ![](images/625040_1_En_9_Chapter/625040_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Basic SELECT query


    Flick back to Chapter [5](#625040_1_En_5_Chapter.xhtml) to remember what each
    of those columns means in detail, and then remember how `SELECT` queries are optimized.
    Remember how your query looks like and what constraints mean the world for your
    `SELECT` clause, and then optimize those constraints.


    #### Optimizing Indexes and Constraints


    The first stop for optimizing `SELECT` query performance involves adding indexes
    onto a column. You’ve probably used indexes before, and if your `SELECT` queries
    are still slow, that’s because it still doesn’t know the quickest path to your
    data. Indexes help your database provide the `SELECT` query with the path toward
    your data – but they have a couple of types, and they must be chosen properly.
    I’ll get into the details involving indexes in a chapter dedicated to them, but
    to properly understand them, you would need to brush up anyway. Basics first:


    *   An index is a synonym for a key and vice versa.


    *   All indexes have a name or a title.


    *   All indexes have a length – that’s the size of the index in bytes (not unique
    rows within the index or anything like that.)


    *   Indexes have a couple of types. To make `SELECT`s faster, most of you will
    use B-Tree indexes, and I’ll let you in on the secrets of all of the available
    index types in the chapter specific to indexes later on.


    *   Indexes act as pointers toward data allowing our database to eliminate unnecessary
    rows from consideration.


    *   Most of you using an index will benefit from a faster table scan.


    *   An index scan is always faster than a disk scan, but not all index appliances
    allow for an index scan.


    *   Indexes must be applied properly and account for the fact that MySQL doesn’t
    error when multiple indexes of the same type are in place on the same column.


    As far as indexes are concerned, keep in mind that the default type of indexes
    available in MySQL refers to B-Tree indexes and that B-Tree indexes are sorted
    beings. B-Tree indexes being sorted means that they can traverse trees from top
    to bottom recursively, and since that’s the case, they make searches with exact
    search operators as fast as never before at the same time crumbling down on disk
    space. These specifics of indexes allow for multiple different properties to be
    built around them, and MySQL has many available index profiles (types) including
    spatial indexes, unique indexes, fulltext indexes, descending indexes, and primary
    keys, but to make `SELECT` SQL queries faster, we’re going to focus exclusively
    on B-Tree indexes for now and dig into the others in the chapter dedicated to
    indexes.


    *B-tree indexes* *are a short abbreviation for Balanced Tree indexes.* These types
    of SQL indexes are the default index type available in MySQL Server and all of
    its counterparts like MariaDB and Percona Server. On a high level, such indexes
    are lists of ordered values that are divided into a couple of ranges.


    B-Tree indexes are useful for `SELECT` queries because they associate rows with
    components that help reach them in a quick fashion – keys. That’s the precise
    reason why such indexes will facilitate the speed of our search engines or anything
    search-related.'
