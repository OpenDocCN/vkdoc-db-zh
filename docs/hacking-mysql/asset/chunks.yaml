    | `TINYINT` | 4 | 127（有符号）或 255（无符号） |

    | `SMALLINT` | 6 | 32767（有符号）或 65535（无符号） |

    | `MEDIUMINT` | 9 | 8388607（有符号）或 16777215（无符号） |

    | `INT` | 11 | 2147483647（有符号）或 4294967295（无符号） |

    | `BIGINT` | 20 | 2⁶³-1（有符号）或 2⁶⁴-1（无符号） |

    | `YEAR` | 4 | 2155 |

    | `DECIMAL, NUMERIC` | `DECIMAL(10,0)` | 最大精度 – 65 |

    | `FLOAT, DOUBLE` | 无法定义 | 无法定义 |

    | `BIT` | 1 | 64 |

    | `JSON` | 无 | 无固定限制 |


    这难道不是一个有趣的数据库吗？一些数据类型有默认的字符数，而一些则没有。


    这一切都有充分的理由——MySQL 及其变体为您提供了广泛的数据类型选择，以便您能为特定的用例选择最合适的数据类型。在仔细考虑后选择数据类型：


    *   **您将要存储的值的种类**：考虑您正在处理的数据——什么数据进入什么列？数据将如何被访问？


    *   **该数据类型所需的磁盘空间量**：一些数据类型比其他类型占用更多磁盘空间，这是为什么您会看到像`TINYINT`、`SMALLINT`、`TINYTEXT`、`SMALLTEXT`这类数据类型的主要原因之一。


    *   **您是否可以对该列进行索引**：如果您要索引`TEXT`值，请记住您必须指定索引长度或使用全文索引，但与此同时，您将能够存储比基于`VARCHAR`的列更多的数据。


    其他一些需要您考虑的事项包括用于存储数据的行格式（基于 InnoDB 的表的默认行格式是`DYNAMIC`），但大致如此。


    除了“普通”数据类型，MySQL 还为您提供了使用`ENUM`或`SET`数据类型向列“指定”值的能力。`ENUM`数据类型考虑一组可能的值，如下所示：


    ```

    `months_choose` ENUM(''March'', ''April'', ''May'',...);

    ```


    `SET`数据类型也允许您指定有效值，如下所示：


    ```

    `availability_days` SET(''Mon'', ''Wed'', ''Fri'',...);

    ```


    这两种数据类型的区别在于，在`ENUM`中，用户只能使用一个感兴趣的值，而在`SET`中，逻辑相同，但用户可以选择多个感兴趣的值。一个`ENUM`列最多可包含
    65,535 个元素，一个`SET`列最多可包含 64 个不同的值。


    MySQL 还能够使用`JSON`数据类型存储 JSON 值，这些值被解释并存储为二进制值以加快执行速度。


    仔细选择您的数据类型——没有一个是板上钉钉的，但一个好的数据类型无论现在还是将来都会为您的数据库创造奇迹。然而，数据集只是方程式的一部分。


    ## 理解字符集和校对规则


    数据类型，无论多么好，也只是您模式方程式中的单一组成部分。无论您选择使用何种数据类型，您都需要在其中存储数据。数据——无论它可能是什么——可能有不同的解释。想想不同的国家——在美国说英语，在西班牙说西班牙语。在芬兰说芬兰语，在瑞典说瑞典语，在土耳其说土耳其语。现在访问中国，我敢打赌您用上述任何一种语言都不会有太多成功的交流，因为他们说汉语！


    面对如此多样化的世界，您的数据库也需要进化。嗯，不完全一样——您不需要制定革命计划来处理来自这些国家的数据——但您需要了解字符集和校对规则。'
- fmt: 'Remember the time when you inserted data in a foreign language in a column
    and MySQL interpreted every character as a “?” sign? That’s because it didn’t
    understand the charset it was written in. Charsets are short for character sets
    – and collations are their friends.


    Character sets define what sets of characters are accepted in a column, and collations
    refer to a set of rules that define how to sort everything that you provide to
    your columns. Together, they perform some magic, and characters are displayed
    as they should be displayed instead of you seeing ??? signs. To explore the character
    sets and collations available in MySQL, MariaDB, or Percona Server, log in to
    your database via the CLI and then execute the query `SHOW CHARACTER SET` – no
    matter what database you find yourself in (you don’t even need to select a database
    to begin with – this query works the same way regardless), you should now see
    all of the available character sets and collations like so.


    ![](images/625040_1_En_4_Chapter/625040_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Character sets and collations in MariaDB


    So many options across four columns! Yet, when you boil them down, everything
    becomes clear as water:


    1.  `Charset` refers to the character set you may choose.

    2.  `Description` helps you understand the use case where that charset may be
    useful by providing a short description of the character set in question.

    3.  `Default collation` describes the default collation mechanism for that specific
    character set.

    4.  `Maxlen` refers to the maximum number of bytes that your database server requires
    to store one character using that specific collation.


    Think of `SHOW CHARACTER SET` as a companion to the documentation – it’s easy
    to be lost in the jungle of documentation, and some of you may not even have time
    to read everything about every specific character set and collation. That’s where
    `SHOW CHARACTER SET` comes in! Run this query, glance at the output, and the path
    should become clear. If it doesn’t, turn to the docs, but most of what you need
    to know is explained there.


    Most of you will have to wing a `utf8mb4` charset together with a `utf8mb4_general_ci`
    or `utf8mb4_unicode_ci` collation or something along that realm, but be aware
    that MySQL does have a couple of “gotchas.” For example, MySQL’s UTF-8 isn’t real
    UTF-8: real UTF-8 requires to support up to 4 bytes per character, while UTF-8
    in MySQL only supports 3. Hence the introduction of `utf8mb4`: the main reason
    you will see `utf8mb4` instead of `utf8` in MySQL installations these days is
    because `utf8mb4` offers full Unicode support meaning that its users can feel
    free to use emojis and other things. Unicode support also means that certain characters
    won’t make MySQL error out and scream `"Incorrect string value: ''\x77\xD0'' for
    column ''demo_column'' at row 1"` when you try to store them.


    `utf8mb4` might not be the primary choice for everyone though because every use
    case is different – however, no matter what character set and collation you intend
    to use, keep in mind that they’re not rocket science; keep in mind that their
    primary purpose is to make data in various languages readable, and you should
    be good to go!


    ## Understanding Indexes


    When you understand character sets and collations, the next thing that will inevitably
    pop up on your radar will be related to query performance in general. By now,
    you probably understand a little about the types of queries, the factors breaking
    them, and what makes them slow. You also know how to devise the perfect schema
    design, and I’ve also walked you through various charsets and collations for your
    schema perfection, but if you’re interested in these things, you will also be
    interested in indexes.


    Most of you probably already use indexes in one form or another and know what
    they are. For those of you who don’t, think of indexes in your database as indexes
    in a book – they help your database quickly find things that it would probably
    take some time to find if they were not in place. The more data you have, the
    more important indexes become.


    They become important because their primary purpose is to help your database quickly
    find rows and return them, but as such, indexes are not without their flaws and
    issues – they slow down queries that insert, update, or delete data in your database
    infrastructure as a result.


    No matter what flavor of MySQL you use – MySQL Server, MariaDB Server, or Percona
    Server, you will always have options to choose from on the index front. I would
    lie to you if I said “All indexes are the same,” “all indexes help your database,”
    or “Index this column and you will never have to worry about query performance
    again” – that’s not the case because indexes are not a holy grail – however, they’re
    extremely good at two things they’re primarily designed to do: occupying storage
    space and making `SELECT` queries faster.


    Remember what I told you before? Queries are tasks composed of other tasks? That’s
    right – indexes help your database sweep through some of those tasks with ease,
    and while all indexes serve a purpose, not all indexes are the same:


    *   A typical index in MySQL is a B-Tree index: Such an index will be used in
    operations where we’re searching for a value with an exact match operator.

    *   A descending index will store all rows in a descending order: Such an index
    may be a necessity for those performing calculation operations or some sort of
    data analysis.

    *   A unique index makes sure all of the values in a column are unique: In other
    words, such an index makes sure that there are no duplicates within a column.
    If duplicate values are found, MySQL will error out (the error can be prevented
    by specifying an `IGNORE` clause, but I won’t get into all of the specifics here
    – we’ll have a chapter about indexes for that instead).


    I would also like to note that a `PRIMARY KEY` is also an index – such indexes
    uniquely identify rows in a table and are often used together with the `AUTO_INCREMENT`
    clause to automatically increment column ID values once new rows are inserted.
    If a primary key index is in place on a column, a `NULL` value inserted in that
    column will manifest in the form of a row ID after MySQL calculates how many rows
    are in a table (e.g., if there are 1,499 rows in a table and we insert a row with
    a `NULL` value in a column that has a primary key, the `NULL` value will become
    1,500).


    Understanding indexes is crucial for any sort of performance operations – keep
    in mind that neither flavor of MySQL prevents you from using multiple indexes
    on the same column and nor does it show a message akin to “your index won’t be
    used if you index this column – you should index another one instead.” Of course,
    there are limitations and tips you can use to get the most out of the indexes
    that are in place in your specific DBMS; however, to get the most out of them,
    you will need to ensure that your indexes are being used in the first place. That’s
    what bothers many databases without their owners being aware – “I’ve already indexed
    this column, why are queries still slow?!” Well, that’s likely because the index
    isn’t even used or considered by your database in the first place.


    How do I know that? Simple – choose one query that has an indexed column and run
    an `EXPLAIN` operation on it. You will see two columns – `possible_keys` and `key`
    – and if any of those columns have a value that isn’t the name of the index you
    want this query to use, you’ve got problems. Why? Because keys are synonyms to
    indexes: keys can unlock the door toward a performance heaven for your queries,
    but they have to be used in a proper way to do that.'
