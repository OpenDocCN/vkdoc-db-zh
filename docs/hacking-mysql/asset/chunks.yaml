  trans: '

    ## SQL 查询性能分析


    此方法适用于 MySQL 和 MariaDB，因为自 MySQL 5.6.7 起，使用 `SHOW PROFILE` 进行性能分析已被弃用。还有另一种可达到相同效果且更简便的方法。


    要从另一个角度进行性能分析，可通过设置 `SET profiling = 1` 来启用查询性能分析，然后运行一个查询，接着使用 `SHOW PROFILES`
    来选择您需要分析的查询，最后执行 `SHOW PROFILE FOR QUERY x`，其中 `x` 是您的查询 ID。以下是整个过程的示意图。


    ![图 4-2: SQL 查询性能分析：初始化](img/625040_1_En_4_Fig2_HTML.jpg)


    ![图 4-3: SQL 查询性能分析：结果](img/625040_1_En_4_Fig3_HTML.jpg)


    我们有 24 个状态码需要研究——是不是很多？请记住，对于更新版本的 MySQL，结果可能看起来略有不同，并且结果集中会包含更多行，例如 "Executing
    hook on transaction" 和 "waiting for handler commit"，但以下是它们的含义：


    | ID | 状态码 | 解释 |

    | --- | --- | --- |

    | 1 | `Starting` | 数据库服务器正在初始化查询。 |

    | 2 | `checking permissions` | 数据库服务器正在检查我们的用户是否有足够的权限来运行查询。如果没有，我们将收到错误提示。 |

    | 3 | `Opening tables` | 数据库服务器确保所有表都已打开，以便对其执行操作。 |

    | 4 | `After opening tables` | 数据库服务器在打开表之后正在执行一些杂项操作。 |

    | 5 | `System lock` | 数据库服务器正在等待系统锁释放（如果存在的话）。 |

    | 6 | `table lock` | 数据库服务器正在等待表锁释放（如果存在的话）。 |

    | 7 | `init` | 数据库服务器正在执行初始化过程，例如刷新日志等。 |

    | 8 | `Optimizing` | 数据库服务器正在执行内部工作，以确定如何以最佳方式优化查询。 |

    | 9 | `Statistics` | 数据库服务器正在计算与统计相关的数据，以制定查询执行计划。 |

    | 10 | `Preparing` | 数据库服务器正在准备运行查询。 |

    | 11 | `Unlocking tables` | 正在解锁必要的表。 |

    | 12 | `Preparing` | 数据库服务器正在准备运行查询。 |

    | 13 | `Executing` | 数据库服务器正在执行查询。 |

    | 14 | `Sending data` | 我们的数据正被发送到服务器，以便其返回所需的结果。 |

    | 15 | `End of update loop` | 数据库服务器在更新数据后到达终点。 |

    | 16 | `Query end` | 数据库服务器完成查询执行。 |

    | 17 | `Commit` | 正在运行提交操作——数据被保存到数据库中。 |

    | 18 (2 个此类值) | `closing tables` | 我们的查询所必需的表正在被关闭。 |

    | 19 | `Unlocking tables` | 表正在被解锁。 |

    | 20 | `Starting cleanup` | 数据库服务器正在开始清理过程。 |

    | 21 | `Freeing items` | 数据库服务器正在释放资源以处理即将到来的查询。 |

    | 22 | `Updating status` | 数据库服务器正在更新其状态。 |

    | 23 | `Reset for next command` | 数据库服务器正在准备接受后续的查询。 |


    看到您的查询为了执行需要完成多少子任务了吗？这些子任务的存在都有其理由——没有一个是多余的。您运行的查询越多，这个列表上的子任务就越多。在本书的优化部分，我将引导您了解如何优化这些子任务——那会在您理解优化的先决条件之后进行。您无法优化没有骨架的东西——而对于您的数据库来说，这个骨架就是您的数据库模式。


    ## 设计完美的模式设计


    问 10 位 DBA 什么是完美的模式设计，您会听到 10 种不同的答案，但他们大多数都会提到规范化、应用高效的约束和索引、数据库实体间的适当关系、最小化磁盘空间使用、使用合适的数据类型等等。归根结底，完美的数据库模式设计对不同的人意味着不同的东西——但无论您的应用程序是什么或您处理什么数据，它都同样重要。要设计出完美的模式设计，请理解以下几点：


    *   您的模式设计现在不完美也没关系。

    *   您在实施性能相关建议时很可能会犯错，这也没关系。这不是世界末日。

    *   经验将是您最好的老师之一。

    *   不要过分执着于想出史上最佳的模式设计——简单的解决方案就很好，而且每个模式都可以进一步改进。


    明确您希望通过修改数据库模式实现什么目标，并以此为起点。对你们大多数人来说，这个目标将与性能改进或重构相关。


    一旦您心中有了目标，请理解模式指的是数据库的结构。您的数据库结构包括其内部的一切——包括数据库表、列类型和大小、属性、各种类型的索引、分区以及其间的所有内容。在
    MySQL 领域，数据库本身也可以被称为模式——而模式是您数据的骨架。很可能，当您开始处理它时，这个骨架不会完全笔直，这没关系——您的模式设计并非一成不变，随着数据集的增长和时间的推移，它必然会不断演变。每个模式都可以进一步改进，但基本的建议仍然成立。


    首先，您可以通过自己编写所有定义来创建模式，或者让 SQL 客户端或框架为您生成。如果您发现自己在使用 SQL 客户端，很可能会有自动创建模式、像浏览电子表格一样探索表等功能。请利用这些功能，因为
    SQL 客户端通常由在该行业至少有十年经验、见证过数据库兴衰存亡的人设计。他们以 SQL 客户端输出形式提供的数据库设计建议，很可能优于您身边开发人员所说的一切。这样的数据库设计建议很可能会防止您原本会犯的错误——而且如果您发现自己使用的是该工具的付费版本，您很可能还能联系专业的
    DBA 团队，在一两次咨询电话中获得帮助。我有没有提到，许多此类工具可以生成为此目的专门设计的类似 ERD 的模式？以下是流行论坛内容管理系统 MyBB 的
    ERD 模式示例。


    ![图 4-4: MyBB 中几个表的 ERD 模式](img/625040_1_En_4_Fig4_HTML.jpg)


    我告诉过您大多数表都被省略显示了吗？您也可以通过拖放表来获得更好的可观察性！


    当观察数据库的状况或创建将容纳您最宝贵数据的表时，ERD 模式可以成为一个非常有用的工具。


    底线很明确——SQL 客户端可以帮助您创建数据库模式并建议您该做什么、提供模式推荐、告诉您要避免什么，甚至在必要时为您提供建议——但是如果您没有这样的便利条件呢？如果是这样，您就需要自己创建数据库模式。


    要设计一个合适的数据库模式，请细致分析数据库背后的软件解决方案的需求——考虑您的项目范围、实体规格以及项目本身的使用场景。草拟一个数据库模式的草图。目前它不必完美。

    '
- fmt: '## 精心设计数据库模式


    下一步是要以某种方式可视化您的数据库模式，以便更清晰——这里很多人会建议您找一个ERD工具来帮助理清思路，让数据库设计更加连贯。ERD工具通常在很多SQL客户端中默认提供（参见上文示例），但如果您手头没有，您也可以随时搜索免费的替代品：有众多ER图工具适用于可视化数据库中的数据，一旦找到，尝试提供您结构的草图，看看整体效果如何。为了优化您的模式，请遵循以下建议：


    1.  **选择小数据类型**：每种数据类型在您的数据库中都占据一定的空间，因此考虑选择尽可能小的数据类型。这里，问问自己：您的用例是否真的需要选择`TEXT`而不是`VARCHAR`？如果使用`VARCHAR`，最大值255是必要的，还是45个字符就够了？您能为数据库分配多少磁盘空间？您有理由相信未来会处理更大的数据集吗？


    2.  **选择简单的列类型**：对数字使用数值数据类型（`SMALLINT`有时比`INT`更好），对较小的基于文本的值使用`VARCHAR`，如果有一组有限的可能值，可以考虑使用`ENUM`，等等。


    3.  **着眼未来设计您的模式，使其准确反映数据的实际情况**：您需要那个可为空的列是可为空的吗？您需要在该列上设置`DEFAULT`值吗？


    遵循这些原则，您将踏上通往性能天堂之路——我将在本书的优化部分详细介绍数据库模式优化，但遵循这些原则将确保您和您的数据库都不会在数据丛林中迷失。


    设计高效的模式至关重要，因为高效的数据库模式设计在涉及快速查询和索引效率时，可能是生死攸关的问题。


    ## 理解数据类型


    除了数据库模式（在MySQL世界中，模式也是数据库的同义词），还有其他多个因素对数据库性能同样关键。其中之一与数据类型相关，这意味着为数据库实例正确选择数据类型，对您的数据库来说也可能是生死攸关的问题。


    MySQL支持几种不同的数据类型：


    1.  **字符串数据类型**：这些MySQL数据类型包括`CHAR`和`VARCHAR`、`BINARY`和`VARBINARY`、`BLOB`和`TEXT`，以及最后的`ENUM`和`SET`。


    2.  **数值数据类型**：这类数据类型包括整数数据类型（`INT`、`SMALLINT`、`TINYINT`、`MEDIUMINT`、`BIGINT`）、定点数据类型——`DECIMAL`和`NUMERIC`、保存近似值的浮点数据类型：`FLOAT`和`DOUBLE`，以及位值数据类型，如`BIT`。


    3.  **日期和时间数据类型**：这类数据类型包括`DATE`、`DATETIME`和`TIMESTAMP`，以及表示`TIME`和`YEAR`的类型。


    4.  **空间数据类型**：这类数据类型包括用于保存单个几何值的数据类型，如`GEOMETRY`、`POINT`、`LINESTRING`和`POLYGON`，以及用于保存多个值的数据类型——`MULTIPOINT`、`MULTILINESTRING`、`MULTIPOLYGON`和`GEOMETRYCOLLECTION`。


    5.  **JSON数据类型**：正如其名，这种数据类型适用于保存JSON值。


    除了支持多种不同的数据类型，所有MySQL变体还为其用户提供了定义特定列需要存储多少字符的能力。不同的数据类型具有不同的可存储字符数：


    | **数据类型** | **默认字符数或数值数据类型的数值范围** | **最大值、精度或字符数** |

    | :--- | :--- | :--- |

    | `CHAR, BINARY` | 1 | 255 |

    | `VARCHAR, VARBINARY` | 无。必须定义 | 255 |

    | `TINYINT` | 4 | 127（有符号）或255（无符号） |

    | `SMALLINT` | 6 | 32767（有符号）或65535（无符号） |

    | `MEDIUMINT` | 9 | 8388607（有符号）或16777215（无符号） |

    | `INT` | 11 | 2147483647（有符号）或4294967295（无符号） |

    | `BIGINT` | 20 | 2^(63)-1（有符号）或2^(64)-1（无符号） |

    | `YEAR` | 4 | 2155 |

    | `DECIMAL, NUMERIC` | `DECIMAL(10,0)` | 最大精度 – 65 |

    | `FLOAT, DOUBLE` | 无法定义 | 无法定义 |

    | `BIT` | 1 | 64 |

    | `JSON` | 无 | 无固定限制 |


    这难道不是一个有趣的数据库吗？一些数据类型有默认的字符数，而一些则没有。


    这一切都有充分的理由——MySQL及其变体为您提供了广泛的数据类型选择，以便您能为特定的用例选择最合适的数据类型。在仔细考虑后选择数据类型：


    *   **您将要存储的值的种类**：考虑您正在处理的数据——什么数据进入什么列？数据将如何被访问？


    *   **该数据类型所需的磁盘空间量**：一些数据类型比其他类型占用更多磁盘空间，这是为什么您会看到像`TINYINT`、`SMALLINT`、`TINYTEXT`、`SMALLTEXT`这类数据类型的主要原因之一。


    *   **您是否可以对该列进行索引**：如果您要索引`TEXT`值，请记住您必须指定索引长度或使用全文索引，但与此同时，您将能够存储比基于`VARCHAR`的列更多的数据。


    其他一些需要您考虑的事项包括用于存储数据的行格式（基于InnoDB的表的默认行格式是`DYNAMIC`），但大致如此。


    除了“普通”数据类型，MySQL还为您提供了使用`ENUM`或`SET`数据类型向列“指定”值的能力。`ENUM`数据类型考虑一组可能的值，如下所示：


    ```

    `months_choose` ENUM(''March'', ''April'', ''May'',...);

    ```


    `SET`数据类型也允许您指定有效值，如下所示：


    ```

    `availability_days` SET(''Mon'', ''Wed'', ''Fri'',...);

    ```


    这两种数据类型的区别在于，在`ENUM`中，用户只能使用一个感兴趣的值，而在`SET`中，逻辑相同，但用户可以选择多个感兴趣的值。一个`ENUM`列最多可包含65,535个元素，一个`SET`列最多可包含64个不同的值。


    MySQL还能够使用`JSON`数据类型存储JSON值，这些值被解释并存储为二进制值以加快执行速度。


    仔细选择您的数据类型——没有一个是板上钉钉的，但一个好的数据类型无论现在还是将来都会为您的数据库创造奇迹。然而，数据集只是方程式的一部分。


    ## 理解字符集和校对规则


    数据类型，无论多么好，也只是您模式方程式中的单一组成部分。无论您选择使用何种数据类型，您都需要在其中存储数据。数据——无论它可能是什么——可能有不同的解释。想想不同的国家——在美国说英语，在西班牙说西班牙语。在芬兰说芬兰语，在瑞典说瑞典语，在土耳其说土耳其语。现在访问中国，我敢打赌您用上述任何一种语言都不会有太多成功的交流，因为他们说汉语！


    面对如此多样化的世界，您的数据库也需要进化。嗯，不完全一样——您不需要制定革命计划来处理来自这些国家的数据——但您需要了解字符集和校对规则。'
  raw: 'The next step would be to somehow visualize your database schema for better
    clarity – here many will advise you to find an ERD tool that helps you bring clarity
    and coherence to your database design. ERD tools usually come by default in many
    SQL clients (see example above), but if you don’t have one at hand, you can always
    search for a free equivalent: there are numerous ER diagram tools suitable for
    visualizing data in your database, and once you find one, try providing it a sketch
    of your structure and see how everything looks like. To refine your schema, follow
    this advice:


    1.  **Pick small data types**: Each data type has some weight inside of your database,
    so consider picking the smallest data type possible. Here, ask yourself questions
    – does your use case necessitate you choosing `TEXT` instead of `VARCHAR`? If
    you’re using `VARCHAR`, is it necessary to have a maximum value of 255, or would
    45 characters be enough? How much disk space can you allocate for your database?
    Do you have reason to believe that you find yourself working with bigger data
    sets in the future?


    2.  **Choose a** **simple column type**: Use numeric data types for numbers (`SMALLINT`
    would sometimes do more good than `INT`), `VARCHAR` for smaller text-based values,
    consider `ENUM` if you have a limited set of possible values, etc.


    3.  **Design your schema by looking into the future and designing it so that it
    accurately depicts the reality of your data**: Do you need that nullable column
    to be nullable? Do you need `DEFAULT` values on that column?


    Follow these principles and you will be on the way toward performance heaven –
    I’ll tell you more about database schema optimization in the optimization part
    of this book, but following these principles will ensure that neither you nor
    your database will get lost in the data jungle.


    Designing efficient schemas is crucial because an efficient database schema design
    can be a matter of life and death when it comes to blazing-fast queries and index
    efficiency.


    ## Understanding Data Types


    Aside from database schemas (schemas, in the MySQL world, are synonyms to databases
    too), multiple other things are just as crucial to your database performance.
    One of those things is related to data types, which means that properly choosing
    data types for your database instance can be a matter of life and death for your
    databases too.


    MySQL supports several different data types:


    1.  **String** **data types**: These MySQL data types include `CHAR` and `VARCHAR`,
    `BINARY` and `VARBINARY`, `BLOB` and `TEXT`, and finally, `ENUM` and `SET`.


    2.  **Numeric** **data types**: Such data types include integer data types (`INT`,
    `SMALLINT`, `TINYINT`, `MEDIUMINT`, `BIGINT`), fixed-point data types – `DECIMAL`
    and `NUMERIC`, floating-point data types holding approximate values: `FLOAT` and
    `DOUBLE`, and bit-value data types, such as `BIT`.


    3.  **Date and time** **data types**: Such data types include `DATE`, `DATETIME`,
    and `TIMESTAMP`, and also the types depicting the `TIME` and the `YEAR`.


    4.  **Spatial** **data types**: Such data types include data types for holding
    singular geometric values, such as `GEOMETRY`, `POINT`, `LINESTRING`, and `POLYGON`,
    as well as data types reserved to hold multiple values – `MULTIPOINT`, `MULTILINESTRING`,
    `MULTIPOLYGON`, and `GEOMETRYCOLLECTION`.


    5.  **The JSON data type**: Such a data type, as its name suggests, is suitable
    to hold JSON values.


    Aside from support for multiple different data types, all flavors of MySQL also
    provide its users with the ability to define how many characters they need stored
    in a specific column. Different data types have different amounts of characters
    that can be stored in a column powering that data type:


    | **Data Type** | **Default Number of Characters or Numbers for Numeric Data Types**
    | **Maximum Value, Precision or Number of Characters** |

    | --- | --- | --- |

    | `CHAR, BINARY` | 1 | 255 |

    | `VARCHAR, VARBINARY` | None. Must be defined | 255 |

    | `TINYINT` | 4 | 127 (signed) or 255 (unsigned) |

    | `SMALLINT` | 6 | 32767 (signed) or 65535 (unsigned) |

    | `MEDIUMINT` | 9 | 8388607 (signed) or 16777215 (unsigned) |

    | `INT` | 11 | 2147483647 (signed) or 4294967295 (unsigned) |

    | `BIGINT` | 20 | 2^(63)-1 (signed) or 2^(64)-1 (unsigned) |

    | `YEAR` | 4 | 2155 |

    | `DECIMAL, NUMERIC` | `DECIMAL(10,0)` | Maximum precision – 65 |

    | `FLOAT, DOUBLE` | Can’t be defined | Can’t be defined |

    | `BIT` | 1 | 64 |

    | `JSON` | None | No fixed limit |


    What an interesting database, huh? Some data types have a default number of characters,
    and some don’t.


    All that has a good reason – MySQL and its flavors provide you with a wide range
    of choices in regard to data types so you could choose the data type most suitable
    for your specific use case. Choose a data type after carefully considering


    *   **The kind of values you’re going to store**: Think of the data you’re working
    with – what kind of data goes into what column? How will the data be accessed?


    *   **The amount of space on the disk the data type requires**: Some data types
    occupy more space on the disk than others do, and that’s one of the primary reasons
    why you see data types like `TINYINT`, `SMALLINT`, `TINYTEXT`, `SMALLTEXT`, and
    the like.


    *   **Whether you can index the column or not**: If you index `TEXT` values, bear
    in mind that you must specify an index length or use a full-text index, but at
    the same time, you will be able to store more data than in `VARCHAR`-based columns.


    Some other things that would need your consideration include the row format you
    use to store your data (the default row format for InnoDB-based tables is `DYNAMIC`),
    but that’s kind of it.


    Aside from “ordinary” data types, MySQL also provides you with the ability to
    “dictate” values to a column using either the `ENUM` or `SET` data type. The `ENUM`
    data type takes a set of possible values into account like so:


    ```

    `months_choose` ENUM(`March`, `April`, `May`,...);

    ```


    The `SET` data type also allows you to specify valid values like so:


    ```

    `availability_days` SET(`Mon`, `Wed`, `Fri`,...);

    ```


    The difference between those two data types is that in `ENUM`, the user may only
    use one value of interest, while in a `SET`, the same logic applies, but the user
    may choose multiple values of interest instead. An `ENUM` column may contain up
    to 65,535 elements, and a `SET` column may contain up to 64 distinct values.


    MySQL is also able to store JSON values with the `JSON` data type, and those are
    interpreted and stored as binary values for faster execution.


    Choose your data types carefully – none of them are set in stone, but a good data
    type will do wonders for your database both now and in the future. However, data
    sets are only a piece of the equation.


    ## Understanding Character Sets and Collations


    Data types, as good as they may be, are only a singular piece of your schema equation.
    No matter what kind of data type you will elect to use, you will need to store
    data in it. Data – no matter what it may be – may be interpreted differently.
    Think of various countries – they speak English in the United States, but Spanish
    in Spain. They speak Finnish in Finland, Swedish in Sweden, and Turkish in Turkey.
    Now visit China, and I bet you won’t have much luck communicating in either of
    those languages because they speak Chinese!


    And with the world being so diverse, your databases need to evolve too. Well,
    not exactly – you won’t need to come up with a plan to execute a revolution to
    deal with data from those countries – but you will need to know your way around
    character sets and collations.'
