- fmt: '# MySQL查询常见错误与优化


    许多用户因为选择了不恰当的表结构和数据类型而破坏了自己的DML查询。请仔细选择这两者——不恰当的结构意味着你所有的查询都需要做更多工作，而不恰当的数据类型则可能在处理数据时导致错误。


    你上面看到的例子使用了四种不同的数据类型：`INT`、`TINYTEXT`、`VARCHAR`和`TIMESTAMP`。这本身没有错——至少在你看向未来之前是这样。想象一下你的数据集变得越来越大：自然地，你会希望在上面添加一些分区或索引，对吧？这样做可以加速读取（`SELECT`）操作，而且从逻辑上讲，你可以添加几个不同的分区来处理在特定时间范围内发送的消息。你的SQL查询看起来就会像这样：


    ```sql

    /* 在消息列上添加B-Tree索引 */

    CREATE INDEX message_idx ON messages(message);

    /* 对消息表进行分区 */

    ALTER TABLE messages

    PARTITION BY RANGE (''timestamp'') (

    PARTITION p0 VALUES LESS THAN (2018),

    PARTITION p1 VALUES LESS THAN (2019),

    PARTITION p2 VALUES LESS THAN (2020),

    PARTITION p3 VALUES LESS THAN (2021),

    PARTITION p4 VALUES LESS THAN (2022),

    PARTITION p5 VALUES LESS THAN (2023),

    PARTITION p6 VALUES LESS THAN (2024),

    PARTITION p7 VALUES LESS THAN (2025),

    ...

    );

    ```


    但你无法对`timestamp`值进行分区——真是可惜！


    ```

    #1659 - Field ''timestamp'' is of a not allowed type for this type of partitioning

    ```


    所有插入的值也必须匹配你列的数据类型，否则MySQL会报错。


    ### 教训


    仔细选择表的结构和数据类型——不恰当的结构或数据类型可能是一条通向地狱的高速路，至少从比喻上来说是这样。


    我们许多人在这一领域忽视的另一个因素是语法错误。看看这个例子：


    ```sql

    INSERT INTO `messages` (id, message, sender, `receiver`, timestamp)

    SELECT id, 10, sender, receiver, timestamp

    FROM `messages_old`

    WHERE message_id = 1;

    ```


    这里的问题是“10”不是任何列的名称——它是一个我们希望插入到表中的值。


    除了`INSERT`查询，下一个可疑对象就是`SELECT`查询——正如我之前简要提到的，你需要确保尽可能少地选择数据。为了有效地做到这一点，你可能需要牺牲那些在数据库中插入、更新或删除数据的SQL查询的性能，但这是你必须付出的代价。`GROUP
    BY`和`ORDER BY`子句同样有代价。记住——任何额外的操作都有性能成本。它可能很小，但小事情累积起来也很快。


    你们中的一些人可能也是`UNION`子句的爱好者——这里的主要错误是使用了太多`UNION`，这对性能有着不可否认的影响。尽量减少你调用`UNION`子句的次数，并考虑将这个子句切换为`WHERE
    [condition] IN()`。


    ## 破坏MySQL中DDL查询的因素


    当涉及到DDL查询时，我们首先需要理解的是，这类查询帮助我们定义数据，因此得名。在MySQL中，它们以五种不同的形式出现，帮助我们`CREATE`、`ALTER`、`RENAME`、`DROP`或`TRUNCATE`我们的数据。


    这些子句各有不同的优点——`CREATE`帮助我们创建包含表的数据库，`ALTER`帮助我们改变表的结构（移动列、改变它们的数据类型、重命名它们，或添加、修改或删除索引结构），`RENAME`帮助我们重命名包含数据的表，`DROP`删除我们的数据库或其中的表，而`TRUNCATE`删除表中的所有数据。因此，有些查询比其他查询使用得更频繁，相应地，它们也更常被发现出现问题。例如，你使用`ALTER`修改表的次数很可能比你删除表的次数要多。还要记住`ALTER`也有多个等效操作：如下所示，`RENAME`映射为`ALTER`，当你在数据库中创建东西时，请记住`CREATE
    INDEX`也映射为`ALTER TABLE ... CREATE INDEX`。根据你的用例，删除操作可能比截断操作更常发生，反之亦然，在你考虑了DDL查询给数据库带来的好处之后，你需要记住几件事来理解它们为什么会出错。


    `CREATE`查询在创建一两个数据库时不太可能变慢；如果你注意到它们变慢了，那很可能是在构建索引时遇到了较慢的性能。在这方面，`CREATE`查询与`ALTER`非常相似。请记住，当构建索引时，这两种子句都以需要MySQL重新创建相同表、向其中添加数据、并对刚创建的表执行修改的方式来*修改*（alter）你的表。然后MySQL会用新创建的表替换旧表。这些过程中，你都不会看到表或数据被添加到其中——运行这些查询后，你不会立即看到一个新表出现，如果你在运行`ALTER`或`CREATE`后注意到性能下降，这很可能是原因。


    当涉及到重命名表时，情况通常是这样的：


    ```sql

    RENAME TABLE `old_table` TO `new_table`;

    ```


    这个语句等同于一个`ALTER`语句：


    ```sql

    ALTER TABLE `old_table` RENAME `new_table`;

    ```


    我将在本书的“优化”部分引导你如何优化你的DDL查询，但现在，请研究一下在线DDL。如果你使用的是MariaDB Server，请记住MariaDB为在线DDL操作提供了支持，在后台执行一些魔法，使你的表在这些操作期间保持可访问。为此，`ALTER
    TABLE`有两个子句——`ALGORITHM`和`LOCK`——它们控制DDL操作的执行方式（`ALGORITHM`）以及为它完成分配了多少并发度（`LOCK`）。MariaDB支持各种算法来促进在线DDL，包括`COPY`、`INPLACE`、`NOCOPY`和`INSTANT`。`INSTANT`是最有效的算法，而`COPY`是效率最低的。


    如果你想利用MariaDB中更改算法的能力，在运行`ALTER TABLE`操作之前，在`SET SESSION`子句中指定你希望MariaDB为`ALTER`操作使用的算法，如下所示：


    ```sql

    SET SESSION alter_algorithm=''INSTANT'';

    ALTER TABLE `demo_table` ADD COLUMN `last_column` VARCHAR(120) DEFAULT NULL;

    ```'
  raw: 'Many of you break your DML queries by using an improper structure of your
    tables and data types. Choose both of them carefully – improper structure means
    more work for all of your queries, and improper data types mean possible errors
    working with data.


    The example you see above has four different data types: that’s `INT`, `TINYTEXT`,
    `VARCHAR`, and `TIMESTAMP`. There’s nothing wrong with that – at least not until
    you look into the future. Imagine your data set is getting bigger: naturally,
    you would want to add some partitions or indexes on top of it, right? By doing
    so, you would speed up read (`SELECT`) operations, and logically, you could add
    a couple of different partitions to account for messages sent within certain timeframes.
    Your SQL query would then look like so:


    ```

    /* Adding a B-Tree Index on the Message Column */

    CREATE INDEX message_idx ON messages(message);

    /* Partitioning the Messages Table */

    ALTER TABLE messages

    PARTITION BY RANGE (''timestamp'') (

    PARTITION p0 VALUES LESS THAN (2018),

    PARTITION p1 VALUES LESS THAN (2019),

    PARTITION p2 VALUES LESS THAN (2020),

    PARTITION p3 VALUES LESS THAN (2021),

    PARTITION p4 VALUES LESS THAN (2022),

    PARTITION p5 VALUES LESS THAN (2023),

    PARTITION p6 VALUES LESS THAN (2024),

    PARTITION p7 VALUES LESS THAN (2025),

    ...

    );

    ```


    Except that you can’t partition timestamp values – what a bummer!


    ```

    #1659 - Field ''timestamp'' is of a not allowed type for this type of partitioning

    ```


    All inserted values must match the data type of your column, too – MySQL will
    scream if that’s not the case.


    Lesson


    Choose the structure of your tables and their data types carefully – improper
    structure or data types can be a highway to hell, at least figuratively speaking.


    Another factor many of us overlook in this realm is syntax errors. Take a look
    at this example:


    ```

    INSERT INTO `messages` (id, message, sender, `receiver`, timestamp)

    SELECT id, 10, sender, receiver, timestamp

    FROM `messages_old`

    WHERE message_id = 1;

    ```


    The problem here is that “10” is not the name of any column – it’s a value that
    we wish to be inserted into our table.


    Aside from `INSERT` queries, the next suspect would be `SELECT` queries – as I’ve
    already briefly mentioned before, you need to ensure that you select as little
    data as possible. To effectively do that, you would likely need to sacrifice the
    performance of SQL queries that insert, update, or delete data in your database,
    but that’s the price you’ll have to pay. `GROUP BY` and `ORDER BY` clauses also
    have a price. Remember – any additional operation has a performance cost. It may
    be small, but small things also add up quickly.


    Some of you may also be fans of the `UNION` clause – the primary mistake here
    is having too many of them, and this has an undeniable impact on performance.
    Minimize the times you invoke the `UNION` clause and consider switching this clause
    to `WHERE [condition] IN()` instead.


    ### Factors Breaking DDL Queries in MySQL


    When it comes to DDL queries, the first thing we need to understand is that such
    types of queries help us define data hence their title, and in MySQL, come in
    five different forms helping us `CREATE`, `ALTER`, `RENAME`, `DROP`, or `TRUNCATE`
    our data.


    Each of those clauses has different merits – `CREATE` helps us create databases
    that contain tables, `ALTER` helps us change the structure of our tables (move
    columns around, change their data types, rename them, or add, modify, or delete
    index structures), `RENAME` helps us rename tables containing our data, `DROP`
    removes our databases or tables within them, and `TRUNCATE` removes all of the
    data within our tables. As such, some queries are used more frequently than others,
    and consequentially, they are found to be broken more often. For example, you
    are likely to be modifying your tables with `ALTER` more often than you would
    be dropping them. Also keep in mind that `ALTER` has multiple equivalents, too:
    `RENAME` maps into `ALTER` as specified below, and when you find yourself creating
    things inside of your database, keep in mind that `CREATE INDEX` also maps into
    `ALTER TABLE ... CREATE INDEX`. Depending on your use case, dropping may occur
    more frequently than truncating or vice versa, and after you consider the upsides
    of DDL queries present to your database, you need to keep a couple of things in
    mind to understand why they might break.


    `CREATE` queries are unlikely to be slow once you’re creating a database or two;
    if you’ve noticed that they slow down, you’re probably facing slower performance
    when building indexes. In that regard, `CREATE` queries are very similar to `ALTER`s.
    Keep in mind that when indexes are being built, both of these clauses modify –
    *alter* – your table in such a way that necessitates MySQL to re-create the same
    table, add data to it, and perform modifications on the table that was just created.
    MySQL then swaps the old table with the newly created table. None of these processes
    involve you seeing the table or data being added to it – you don’t see a new table
    appear straight after you run these queries, and if you’ve noticed a drop in performance
    after running an `ALTER` or `CREATE`, that’s the most likely reason.


    When it comes to renaming tables, everything usually looks like this:


    ```

    RENAME TABLE `old_table` TO `new_table`;

    ```


    The same statement is equal to an `ALTER` statement:


    ```

    ALTER TABLE `old_table` RENAME `new_table`;

    ```


    I’ll walk you through how to optimize your DDL queries in the Optimization part
    of this book, but for now, look into online DDL. If you find yourself using MariaDB
    Server, keep in mind that MariaDB provides support for online DDL operations where
    your database server performs some magic in the background to keep your tables
    accessible throughout those operations. For that, `ALTER TABLE` has two clauses
    – `ALGORITHM` and `LOCK` – that control how the DDL operation is performed (`ALGORITHM`)
    and how much concurrency is allocated for it to complete (`LOCK`). MariaDB supports
    various algorithms to facilitate online DDL, them being `COPY`, `INPLACE`, `NOCOPY`,
    and `INSTANT`. `INSTANT` is the most efficient algorithm, while `COPY` is the
    least efficient.


    If you want to use the power of alter algorithms within MariaDB, specify the algorithm
    you want MariaDB to employ for an `ALTER` operation in a `SET SESSION` clause
    before you run an `ALTER TABLE` operation like so:


    ```

    SET SESSION alter_algorithm=''INSTANT'';

    ALTER TABLE `demo_table` ADD COLUMN `last_column` VARCHAR(120) DEFAULT NULL;

    ```'
  trans: '# MySQL 查询常见错误与优化


    许多用户因选择了不恰当的表结构和数据类型而破坏了自己的 DML 查询。请仔细选择这两者——不恰当的结构意味着你所有的查询都需要做更多工作，而不恰当的数据类型则可能在处理数据时导致错误。


    你上面看到的例子使用了四种不同的数据类型：`INT`、`TINYTEXT`、`VARCHAR`和`TIMESTAMP`。这本身没有错——至少在你看向未来之前是这样。想象一下你的数据集变得越来越大：自然地，你会希望在上面添加一些分区或索引，对吧？这样做可以加速读取（`SELECT`）操作，而且从逻辑上讲，你可以添加几个不同的分区来处理在特定时间范围内发送的消息。你的
    SQL 查询看起来就会像这样：


    ```sql

    /* 在消息列上添加 B-Tree 索引 */

    CREATE INDEX message_idx ON messages(message);

    /* 对消息表进行分区 */

    ALTER TABLE messages

    PARTITION BY RANGE (''timestamp'') (

    PARTITION p0 VALUES LESS THAN (2018),

    PARTITION p1 VALUES LESS THAN (2019),

    PARTITION p2 VALUES LESS THAN (2020),

    PARTITION p3 VALUES LESS THAN (2021),

    PARTITION p4 VALUES LESS THAN (2022),

    PARTITION p5 VALUES LESS THAN (2023),

    PARTITION p6 VALUES LESS THAN (2024),

    PARTITION p7 VALUES LESS THAN (2025),

    ...

    );

    ```


    但你无法对`timestamp`值进行分区——真是可惜！


    ```

    #1659 - Field ''timestamp'' is of a not allowed type for this type of partitioning

    ```


    所有插入的值也必须匹配你列的数据类型，否则 MySQL 会报错。


    ### 教训


    仔细选择表的结构和数据类型——不恰当的结构或数据类型可能是一条通向地狱的高速路，至少从比喻上来说是这样。


    我们许多人在这一领域忽视的另一个因素是语法错误。看看这个例子：


    ```sql

    INSERT INTO `messages` (id, message, sender, `receiver`, timestamp)

    SELECT id, 10, sender, receiver, timestamp

    FROM `messages_old`

    WHERE message_id = 1;

    ```


    这里的问题是“10”不是任何列的名称——它是一个我们希望插入到表中的值。


    除了`INSERT`查询，下一个可疑对象就是`SELECT`查询——正如我之前简要提到的，你需要确保尽可能少地选择数据。为了有效地做到这一点，你可能需要牺牲那些在数据库中插入、更新或删除数据的
    SQL 查询的性能，但这是你必须付出的代价。`GROUP BY`和`ORDER BY`子句同样有代价。记住——任何额外的操作都有性能成本。它可能很小，但小事情累积起来也很快。


    你们中的一些人可能也是`UNION`子句的爱好者——这里的主要错误是使用了太多`UNION`，这对性能有着不可否认的影响。尽量减少你调用`UNION`子句的次数，并考虑将这个子句切换为`WHERE
    [condition] IN()`。


    ## 破坏 MySQL 中 DDL 查询的因素


    当涉及到 DDL 查询时，我们首先需要理解的是，这类查询帮助我们定义数据，因此得名。在 MySQL 中，它们以五种不同的形式出现，帮助我们`CREATE`、`ALTER`、`RENAME`、`DROP`或`TRUNCATE`我们的数据。


    这些子句各有不同的优点——`CREATE`帮助我们创建包含表的数据库，`ALTER`帮助我们改变表的结构（移动列、改变它们的数据类型、重命名它们，或添加、修改或删除索引结构），`RENAME`帮助我们重命名包含数据的表，`DROP`删除我们的数据库或其中的表，而`TRUNCATE`删除表中的所有数据。因此，有些查询比其他查询使用得更频繁，相应地，它们也更常被发现出现问题。例如，你使用`ALTER`修改表的次数很可能比你删除表的次数要多。还要记住`ALTER`也有多个等效操作：如下所示，`RENAME`映射为`ALTER`，当你在数据库中创建东西时，请记住`CREATE
    INDEX`也映射为`ALTER TABLE ... CREATE INDEX`。根据你的用例，删除操作可能比截断操作更常发生，反之亦然，在你考虑了 DDL
    查询给数据库带来的好处之后，你需要记住几件事来理解它们为什么会出错。


    `CREATE`查询在创建一两个数据库时不太可能变慢；如果你注意到它们变慢了，那很可能是在构建索引时遇到了较慢的性能。在这方面，`CREATE`查询与`ALTER`非常相似。请记住，当构建索引时，这两种子句都以需要
    MySQL 重新创建相同表、向其中添加数据、并对刚创建的表执行修改的方式来*修改*（alter）你的表。然后 MySQL 会用新创建的表替换旧表。这些过程中，你都不会看到表或数据被添加到其中——运行这些查询后，你不会立即看到一个新表出现，如果你在运行`ALTER`或`CREATE`后注意到性能下降，这很可能是原因。


    当涉及到重命名表时，情况通常是这样的：


    ```sql

    RENAME TABLE `old_table` TO `new_table`;

    ```


    这个语句等同于一个`ALTER`语句：


    ```sql

    ALTER TABLE `old_table` RENAME `new_table`;

    ```


    我将在本书的“优化”部分引导你如何优化你的 DDL 查询，但现在，请研究一下在线 DDL。如果你使用的是 MariaDB Server，请记住 MariaDB
    为在线 DDL 操作提供了支持，在后台执行一些魔法，使你的表在这些操作期间保持可访问。为此，`ALTER TABLE`有两个子句——`ALGORITHM`和`LOCK`——它们控制
    DDL 操作的执行方式（`ALGORITHM`）以及为它完成分配了多少并发度（`LOCK`）。MariaDB 支持各种算法来促进在线 DDL，包括`COPY`、`INPLACE`、`NOCOPY`和`INSTANT`。`INSTANT`是最有效的算法，而`COPY`是效率最低的。


    如果你想利用 MariaDB 中更改算法的能力，在运行`ALTER TABLE`操作之前，在`SET SESSION`子句中指定你希望 MariaDB 为`ALTER`操作使用的算法，如下所示：


    ```sql

    SET SESSION alter_algorithm=''INSTANT'';

    ALTER TABLE `demo_table` ADD COLUMN `last_column` VARCHAR(120) DEFAULT NULL;

    ```'
- fmt: 'However, keep in mind that if you specify an algorithm other than `COPY`,
    MariaDB won’t interpret it as “I must use the algorithm the user has specified.”
    Instead, it will interpret your decision for the algorithm as the least efficient
    algorithm you will accept and that’s why I’ve also mentioned the algorithms above:
    that means that if you’ve elected `INPLACE` as your solution of choice, MariaDB
    is free to choose the most efficient algorithm for the operation counting from
    `INPLACE` to `INSTANT` – in other words, it can elect to use either of the three.
    MariaDB does that because not all algorithms support certain operations. For example,
    if you find yourself adding columns to a table, MariaDB can only choose `INSTANT`
    if the column you’re adding is the last column for that specific table.


    When choosing locks for online DDL operations, everything’s less complex – you
    only have four options, with the `DEFAULT` being the default one if none are specified:


    1.  `DEFAULT`: MariaDB chooses the least restrictive lock for your table.

    2.  `NONE`: MariaDB won’t lock your table at all. All concurrent DML operations
    will run as expected.

    3.  `SHARED`: MariaDB will lock the table for reading while permitting concurrent
    DML, but only for read-only operations.

    4.  `EXCLUSIVE`: MariaDB will lock the table for writing and won’t permit any
    concurrent DML operations.


    When dealing with DDL and DML operations, increasing the `innodb_buffer_pool_size`
    might be of assistance too. Since the InnoDB buffer pool is a key component of
    the primary storage engine – InnoDB – and it’s accountable for storing table and
    index data as it’s accessed, the bigger it is, the faster your `INSERT` or `ALTER`
    operations are likely to complete, especially if the table you’re modifying has
    indexes on it.


    ## Factors Breaking DCL and TCL Queries in MySQL


    When it comes to controlling data and transactions, factors breaking those things
    will be mostly related to you not granting users the necessary privileges (be
    honest – when was the last time you reviewed the privileges of all users within
    your database server?) or not revoking them once they’re no longer necessary,
    not understanding that operations involving larger data sets can benefit from
    you delaying `COMMIT` operations by including `autocommit=0` before anything is
    inserted into your database and `COMMIT`ing your changes afterward, and the like.


    Understand that rollbacks are not as scary as they sound either – they’re just
    operations that return your database to the previous state, but they can also
    sometimes fail. If you’ve ever heard of a “runaway rollback,” you know what I’m
    talking about. What if you try to terminate a process, but it just doesn’t listen
    to you? If you ask your neighborhood DBA about their horror stories and they tell
    you that they had a process in a “Sending data” state, killed it, but it’d remained
    in that state, what do you call it? That’s a *runaway rollback* because the reason
    your `KILL` operation takes ages is most likely due to rollbacks issued by InnoDB
    – to fix this issue, try employing `innodb_force_recovery` by setting it to 3
    to skip rollbacks and then drop the table that’s causing the problem. Make sure
    you’ve backed up your data beforehand, though.


    ## Why Are Queries Slow?


    Now we move toward perhaps the most frequently asked question in the database
    world – “Why are queries slow?” This question has plagued developers and DBAs
    for ages. To be honest, it most likely concerns the visitors or customers of your
    website too: have a look at your support tickets. Now search for “slow” or “doesn’t
    load,” and count the number of tickets you’ve received.


    I’ll guess that the number you’ve come up with is higher than 0 – and if it is,
    you’ve got problems on your hands. Slow queries mean slow response times, and
    slow response times are the pillar of slow performance. Remember what I told you
    earlier? Performance is response time – and the higher your response time is,
    the worse for your database, application, and everyone related to them.


    Right, you got it – you need high-performing queries. Fast. I recommend solving
    such problems from the bottom – that means that the first question you must ask
    yourself is not “How to increase my query performance to < 1 second?” but “Why
    are my queries slow?”


    Think about it – to come up with strategies to increase your query performance,
    you have to understand what makes them slow in the first place, right?


    So, back to where we started – why are queries slow?


    The answer is simple, but complex at the same time – it depends. It depends because
    different developers shatter their queries in different ways – some break them
    when inserting data, some – when selecting data that has already been inserted,
    and some need assistance in updating data (that’s especially the case when the
    data sets are bigger).


    However, regardless of what kind of query you find yourself optimizing, there
    is a general answer – queries are tasks that are composed of other tasks. Your
    query is slow because the subtasks your primary task is concerned with complete
    slowly. To make your query performance faster, you need to make those subtasks
    complete faster or make your database ignore them altogether. That’s all it is.


    Right, now you’ve got an answer to why your queries are slow: that’s because the
    subtasks within them are slow. So why are those subtasks slow and what are they?
    To understand what breaks your queries in that regard, you must employ some profiling,
    so that’s what we’ll do now.


    First, we need to tell our database to enable monitoring for anyone who runs the
    query by enabling monitoring for your account, and optionally, disabling monitoring
    for everyone else. First, we disable monitoring:


    ```sql

    UPDATE performance_schema.setup_actors SET ENABLED = ''NO'', HISTORY = ''NO''
    WHERE HOST = ''%'' AND USER = ''%'';

    ```


    After, we need to modify the `setup_actors` table in our performance schema to
    enable monitoring for our specific account (replace `username` with your username):

    ```sql

    INSERT INTO performance_schema.setup_actors (HOST,USER,ROLE,ENABLED,HISTORY) VALUES(''localhost'',''username'',''%'',''YES'',''YES'');

    ```


    Once done, you need to enable logs for statements and their stages by running
    the following SQL queries:


    ```sql

    UPDATE performance_schema.setup_consumers SET ENABLED = ''YES'' WHERE NAME LIKE
    ''%events_statements_%'';

    UPDATE performance_schema.setup_consumers SET ENABLED = ''YES'' WHERE NAME LIKE
    ''%events_stages_%'';

    ```


    Then, enable the instruments allowing for the monitoring of your query:


    ```sql

    UPDATE performance_schema.setup_instruments SET ENABLED = ''YES'', TIMED = ''YES''
    WHERE NAME LIKE ''%statement/%'';

    UPDATE performance_schema.setup_instruments SET ENABLED = ''YES'', TIMED = ''YES''
    WHERE NAME LIKE ''%stage/%'';

    ```


    Execute your queries as usual (make sure they’re executed under the account you’ve
    just enabled monitoring on), then identify your query by running this one:


    ```sql

    SELECT EVENT_ID, TRUNCATE(TIMER_WAIT/1000000000000,6) as Duration, SQL_TEXT FROM
    performance_schema.events_statements_history_long WHERE SQL_TEXT LIKE ''%Your
    Query%'';

    ```


    Finally, to see the information in regard to your query, replace `ID` with your
    query ID and execute this query:


    ```sql

    SELECT event_name AS Stage, TRUNCATE(TIMER_WAIT/1000000000000,6) AS Duration FROM
    performance_schema.events_stages_history_long WHERE NESTING_EVENT_ID = ID;

    ```


    The results will provide you with a bunch of information you can use to profile
    your query. The results will contain multiple stages of your query and provide
    you with detailed information on how long a certain duration of the query took
    to execute properly.'
