- fmt: '# Numeric Data Types in MariaDB


    Aside from string data types, MariaDB also supports numeric data types. Here,
    things are a little less complex: while support for data types not available in
    MySQL exists, these data types aren’t revolutionary, and they depict synonyms
    rather than new data types that can’t be found anywhere except MariaDB.


    Such synonyms include the data types `INT1`, `INT2`, `INT3`, `INT4`, and `INT8`.
    These data types are synonyms for `TINYINT`, `SMALLINT`, `MEDIUMINT`, `INT`, and
    `BIGINT` respectively. Numeric data types aren’t anything impressive either, but
    keep in mind that their types (`TINYINT` and the like) don’t exactly have a “direct
    map” to their string equivalents: for example, `TINYTEXT` will support a maximum
    of 255 characters, while the size of `TINYINT` won’t be from 0 to 255, but rather,
    it’s from -128 to 127.


    You don’t need to remember the size of every data type, but do remember that `INT`
    isn’t the only solution to your problems: you would be surprised how many developers
    define `INT` as a data type when `TINYINT` would suffice. Pay attention to the
    structure of your tables and think ahead – data types aren’t set in stone, but
    defining a well-thought-out data type ahead is likely to do you a lot of favors
    in the future, no matter if that data type is text or integer-related.


    ## Date, Time, Spatial, and JSON Data Types


    Aside from string and integer data types, some data types are also a very good
    fit for various other purposes. Such purposes may include the storage of time
    values, geographic constraints, or JSON arrays.


    The number of use cases facilitating the use of numerous data types inside of
    a database management system is countless, and that’s why MySQL’s support for
    string or integer data types doesn’t mark the end: many applications track the
    time when a user performs an action for internal purposes, and that’s done with
    the help of data types depicting date and time values. Perhaps the most popular
    of such data types would include `TIMESTAMP` and `DATETIME` data types, and some
    data types provide support for specific formats too: the `DATE` data type would
    enable you to store dates in a `YYYY-MM-DD` format, the `TIME` data type would
    store exact times to the millisecond in the format of `HH:MM:SS.ssssss`, while
    the `YEAR` data type would be able to store years. Geometric – or spatial – data
    types such as `GEOMETRY` or `POINT` would assist in storing spatial data, while
    the `JSON` data type would enable developers to fiddle with their `JSON`-based
    data sets too.


    Support for `JSON` data type also isn’t something out of the ordinary: developers
    do work with JSON data and, naturally, need to store it inside of their databases.
    Advanced users of MySQL will know that in MariaDB, `JSON` is the same as `LONGTEXT`
    due to compatibility issues with MySQL and issues with SQL standards. Regardless,
    MariaDB provides full support for `JSON` data and even provides its users with
    functions that allow it to check for structure validity before inserting any data
    into a table. For that to work, we need to create a table with a `CHECK` constraint
    working in conjunction with the `JSON_VALID` function that checks for the validity
    of data in a column. Everything would look something like this:


    ```sql

    --First, we create a table with the CHECK constraint:

    CREATE TABLE `json_demo` (

    `json_col` JSON

    CHECK (JSON_VALID(`json_col`))

    );

    --Our database will allow JSON values like this:

    INSERT INTO `json_demo` VALUES (''{"id": 1, "information": "This book is cool!",
    "extra": "Read on and learn more things."}'');

    --But prohibit invalid, non-JSON values like the following:

    INSERT INTO `json_demo` VALUES (`Invalid value`);

    ```


    ![](images/625040_1_En_8_Chapter/625040_1_En_8_Fig1_HTML.jpg)


    Figure 8-1: Example of JSON column validation


    ## Storage Requirements for Data Types


    Data types don’t come alone – they have a significant overhead you must account
    for: that overhead has to do with storage requirements. Storage requirements aren’t
    dependent only on data types either and they also depend on the storage engine
    you find yourself using, and they do differ depending on if you find yourself
    using InnoDB or NDB.


    The primary difference you must account for is the way storage engines store data:
    InnoDB is famous for its row storage formats that have a variety of different
    characteristics and that’s why people “overcome” problems like “Index column size
    too large” by switching the row storage format up; to understand why a switch
    to a different InnoDB row format may solve issues, we have to understand the characteristics
    of various InnoDB row formats. Some InnoDB row format characteristics can be found
    below:


    | InnoDB Row Format | Characteristics |

    | --- | --- |

    | `DYNAMIC` | The default row format in InnoDB. Similar to `COMPACT` in that it
    has the same storage requirements. Includes support for large index prefixes.
    |

    | `COMPACT` | Offers support for compact storage, but no large index prefix support.
    The same storage requirements as `DYNAMIC`. |

    | `REDUNDANT` | This row format is redundant because it’s mostly unusable; its
    purpose is to provide support for older versions of MySQL. |

    | `COMPRESSED` | Famous for its support for data compression for tables and indexes,
    otherwise, acts the same way as the `DYNAMIC` row storage format. |


    Row formats can be changed either globally (for that, we would need to modify
    the `ROW_FORMAT` variable within `my.ini` or `my.cnf` and set it to one of the
    available values shown above) or per database/table with an `ALTER TABLE` query
    like so:


    ```sql

    ALTER TABLE [table_name] ROW_FORMAT=[format here];

    ```


    Row formats also have two sisters – Antelope and Barracuda. Those two sisters
    refer to the file formats available in InnoDB and work in conjunction with row
    formats: as far as InnoDB is concerned, Antelope supports the `COMPACT` and `REDUNDANT`
    row formats, and in the old days, it was the default file format available in
    MySQL. Barracuda supports all of the row formats available in InnoDB and is the
    default file format available in both MySQL and MariaDB of the present day.


    Now that you understand that file and row formats are also at play, it’s time
    to look into the actual storage requirements for specific data types. To simplify
    the presentation, I’ll use two letters – B for “column length in bytes” and C
    for “column length in characters”:


    | Data Type | Storage Requirements |

    | --- | --- |

    | `VARCHAR(C)` and `VARBINARY(C)` | B + 1 bytes if C is lower than 255 characters.
    B + 2 bytes otherwise. |

    | `TINYBLOB`/`TINYTEXT`, `BLOB`/`TEXT`, `MEDIUMBLOB`/`MEDIUMTEXT`, `LONGBLOB`/`LONGTEXT`/`JSON`
    | B + 1 bytes, B + 2 bytes, B + 3 bytes, B + 4 bytes |

    | `TINYINT`, `SMALLINT`, `MEDIUMINT`, `INT`/`INTEGER`, `BIGINT` | 1, 2, 3, 4,
    and 8 bytes, respectively. |

    | `YEAR`, `DATE`, `TIME`, `TIMESTAMP`, `DATETIME` | 1 byte, 3 bytes, 3 bytes,
    4 bytes, and 5 bytes, respectively. `TIME`, `TIMESTAMP`, and `DATETIME` also require
    some bytes to store fractions of seconds. |


    The table above doesn’t cover absolutely all data types, but it will provide you
    with a good starting point. After you’ve started in a good place, understand that
    storage requirements are likely to change depending on how many characters you
    store in a column and what character set you use because some character sets may
    use more than one byte to store one character because of various reasons.


    ## Choosing the Right Data Type


    To choose the right data type for your use case, look at your database and the
    tables within from a birds-eye view: what data is stored? How often is it updated?
    Are indexes in use? Any partitions that data is spread across?'
