    数据库中内容的修改。换句话说，二进制日志记录了其他服务器需要执行的数据变更，并使数据与主服务器保持一致。二进制日志驻留在 MariaDB 的 `datadir`
    中。


    在数据库世界中，复制领域也有一些其独有的概念：有“复制延迟”（延迟复制）的概念，有服务器具有全局事务 ID（`GTID`）的概念，有服务器读取包含对数据库所做所有更改记录的二进制日志的概念，等等——它们也很重要，因为在处理复制时，不可避免地会遇到它们。


    复制延迟很容易理解——顾名思义，这个术语指的是在设置任何类型的复制时，服务器与其他服务器不同步。“延迟”指的是服务器返回的状态与“当前”状态（可查看/使用的状态）之间的差异。当事情“不够快”时，就会发生复制延迟，例如，当副本接收或应用数据变更的速度不够快时，或者当主服务器无法足够快地向副本发送数据变更时，等等。


    可以通过最小化源数据库上的事务持续时间（使用我们讨论过的查询优化技巧——它们都适用）、最小化网络延迟或确保我们的磁盘 I/O 操作足够强大来减少复制延迟。


    当涉及到 `GTID` 时，它们指的是全局事务标识符，并且在整个复制拓扑中是唯一的。`GTID` 在事务写入二进制日志时“出现”，每个事务都会被分配一个自动递增的
    ID。自然地，这也意味着未写入二进制日志的事务不会收到 `GTID`。一旦一个带有 `GTID` 的事务在服务器上提交，就不会再执行具有相同 `GTID`
    的其他事务。对有些人来说，全局事务标识符类似于哈希值，每个 `GTID` 的表示形式如下：`hash-like source_id:transaction_id`，它将由一个服务器标识符（很可能是
    `server_uuid`）和一个数字事务 ID 组成。事务 ID #1337 表示它是服务器上提交的第 1337 个事务：


    ```

    7B17FA77-84FD-44D7-9B11-N65FF2978613:1337

    ```


    ## 复制注意事项与技巧


    尽管复制功能强大，但事先有几件事你应该注意，以免淹没在它的能力之中！


    复制提供的远不止几个自动递增的 `GTID`；复制要求在主服务器上启用二进制日志，而这样做时，每个副本服务器都会给主服务器增加一些负载。从高层次来看，复制的工作原理如下：


    1.  主服务器读取其二进制日志并注意到数据的更改。

    2.  从（副本）服务器将二进制日志事件复制到其中继日志。

    3.  从（副本）服务器重放中继日志中的事件，从而更新其数据。


    二进制日志通知副本数据的更改，然后这些更改被读入中继日志——中继日志中的事件被重放，数据得到更新。二进制日志文件和中继日志文件通常以相同的方式格式化，在 MariaDB
    中，可以通过运行类似 `SHOW RELAYLOG EVENTS` 的查询来检查中继日志事件——在这种情况下，空的结果集将表明复制尚未设置。


    ![](img/625040_1_En_14_Fig1_HTML.jpg)


    图 14-1

    MariaDB 中的 SHOW RELAYLOG EVENTS


    一旦复制设置完成，它总是涉及多个数据库服务器和必须配置为连接并从主服务器读取的账户（请参阅下面标题中的说明）。所有这一切意味着，从高层次来看，复制看起来是这样的。


    ![](img/625040_1_En_14_Fig2_HTML.jpg)


    图 14-2

    关系数据库管理系统中的复制'
- fmt: 'Thus, replication is not exactly rocket science – what replication also isn’t
    is a backup or a substitute for a backup. Yes, replication does copy data to another
    server, and this is very similar to what your backups would do, but the core difference
    between any type of replication and backups is the fact that once data on the
    master server is updated, data on the replica servers will be updated as well.


    ## Securing Replication


    Once you find yourself aware of the internals of replication, you will inevitably
    think about the security of the data you replicate too. To ensure the security
    of the asset so vital to your business – data – it’s crucial to take care of security
    and privacy measures beforehand and act keeping in mind the specifics of replication.


    To ensure your data is being transferred securely, ensure that SSL/TLS is enabled
    on the primary server, or better yet, on both primary and replica servers. Ensuring
    that TLS is enabled isn’t very hard and can be done either via `my.ini` (`my.cnf`
    in Linux) or by observing the output of simple SQL queries like `status`.


    ![](images/625040_1_En_14_Chapter/625040_1_En_14_Fig3_HTML.jpg)


    Figure 14-3: The output of `status` in MariaDB


    Note the SSL part – if SSL is used, you will see a different output, such as `Cipher
    in use is DHE-RSA-AES256-SHA` or similar.


    You can also find out if your server is using SSL via the configuration file:
    open up the file and if you see TLS system variables like `ssl_cert`, `ssl_key`,
    and `ssl_ca` defined under the `[mariadb]` tab, you’re golden.


    The output of `status` is also interesting because it provides the character sets
    of the database, connection and client, uptime, the TCP port you may use to connect
    to MariaDB (port may be useful for those using MariaDB to power content management
    systems like WordPress, vBulletin, IPBoard, or MyBB).


    Regardless, if your server is using SSL, you would likely need to tell MariaDB
    to use TLS for your replication setup by running a `CHANGE MASTER` query to include
    SSL options – to achieve this, take a look into `MASTER_SSL`, `MASTER_SSL_CA`,
    `MASTER_SSL_CAPATH`, `MASTER_SSL_CERT`, `MASTER_SSL_KEY`, `MASTER_SSL_VERIFY_SERVER_CERT`,
    and other TLS-related options that are available to use with the `CHANGE MASTER`
    query.


    Set these options up, and you should be good to go – it’s really that simple.


    Of course, you will also need to adhere to privacy standards like HIPAA and GDPR
    if they apply to your business, but I’ll let you in on their secrets in the last
    part of this book where I cover security.


    ## Summary


    Replication is a difficult beast to tame – that beast comes in many shapes and
    sizes, and in essence, it’s a process that helps ensure the availability of data.
    Replication has a couple of types, one can replicate rows or SQL statements, and
    as with everything database-related, replication has issues unique to itself,
    but regardless, it’s a perfect mechanism to ensure that data “lives” in another
    server without manual intervention.


    Replication is not the only friend of your database though – security is paramount
    too. Heard of the most recent data breaches? Yup – they’re scary. Breaches over
    a decade ago were no “better” too with tens or even hundreds of millions of people
    impacted, and in such an environment, it’s crucial you properly secure your database
    if you don’t want to see the name of your company in the news regarding the next
    major data breach.


    # 15. Optimizing for Security


    Now that you know a thing or two about storage engines, things that break your
    MariaDB instances and the queries within, understand your server and know how
    to optimize your server, what goes into optimizing specific storage engines, schemas,
    data types, collations, queries themselves, know how to optimize MariaDB for bigger
    data sets and a thing or two about indexing, partitioning, backups and replication,
    it’s high time to learn how to optimize your database management system for security,
    isn’t it?'
