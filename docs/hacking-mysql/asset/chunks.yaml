- fmt: 'At the same time, if some of you expect me to say “Switch ACID to speed and
    the speed of your database writing data will increase by 852% at the expense of
    durability,” that’s not likely to be the case. Your `INSERT` queries will be significantly
    faster, but the thing is, if you’ve optimized your database for bigger data sets
    as I’ve already shown you, chances are that you will use `LOAD DATA INFILE`, not
    `INSERT`, to begin with. Even if you’re unable to use `LOAD DATA INFILE` for any
    reason, the risks will rarely be worth the rewards – but at the end of the day,
    you’re the master behind your decisions. Feel free to switch the `innodb_flush_log_at_trx_commit`
    variable to 0 or 2 to exchange ACID for speed and observe the results, and then
    decide if the risk is worth the reward.


    ## Big Data Pitfalls and Known Issues


    With all of the upsides big data brings to your infrastructure, be aware that
    it doesn’t come without downfalls either. What comes up, must come down, right?
    When dealing with big data-enabled projects, many of you will quickly notice that
    big data means that you will sometimes have a hard time working with your data.
    You won’t go through nightmares, but you must be aware of bottlenecks before they
    snap your database and data in half – I’ll start from `LOAD DATA INFILE`.


    `LOAD DATA INFILE` is your friend – it helps load data into a database in a rapid
    fashion. That’s what it’s supposed to do, but it doesn’t come without nuances.
    Many of you who’ve made use of this query in the past could’ve noticed that this
    query slows down after a bunch of data is inserted; in the past, people would
    argue that the solution to this problem would be to switch InnoDB to MyISAM, run
    queries like `DISABLE KEYS`, and then try again, but such pieces of advice would
    be ill-suited and outdated for those running such queries in the present day.
    `DISABLE KEYS` doesn’t work with InnoDB because the storage engine is simply not
    designed to make use of such a clause – MyISAM is. However, using MyISAM with
    bigger data sets is an absolute nightmare. Even if your use case does necessitate
    the need for an exact row count, exporting data with `SELECT … INTO OUTFILE` and
    then counting the rows in the file using EmEditor or any other editors that can
    open bigger data sets (Notepad++ is out of league for this – it will crash) is
    likely to be a better option.


    Your best bet to make `LOAD DATA INFILE` as fast as possible is running InnoDB,
    relying on the InnoDB buffer pool, and if necessary, splitting the data you import
    into InnoDB into many small chunks (for decent performance, aim for a single file
    to have somewhere in the range of 50–100M rows), or fiddling with `autocommit`
    before `LOAD DATA INFILE` completes its mission.


    Also, how many of you need primary indexes on that `ID` column that has hundreds
    of millions of rows? How much disk space does that column alone occupy? 30GB?
    40GB? That’s 30GB of free hard drive space should that column be removed.


    With columns in mind, you’d be surprised how many of us follow “vanilla” advice
    for data when running big data sets. The advice isn’t necessarily “bad,” but when
    our data grows, there would be a need to think outside the box. Unique indexes
    are a perfect example of this – they may be an option if you have up to a million
    rows, but for data in the space of hundreds of millions, they’d likely be a nightmare:
    you would clog your database! Dig into Linux options – even if you’re using Windows,
    install `Cygwin` and you will have access to almost all of them. Use them on raw
    data – chances are that they will be significantly faster than vanilla SQL queries
    through the CLI.


    Years ago, I saw a thread on a forum where people talked about data or a certain
    kind of a search engine. I remember someone commenting something about data parsing
    – something along the lines of “How do you save the data in the database? How
    do you analyze the data and what are you using to make queries quick?” and the
    author replied with something along the lines of “Data within the search engine
    is all in a parsed format and would be much larger otherwise <…> Thankfully, by
    using MySQL in the backend we can let the database take care of all of the necessary
    parsing for us – we remove unnecessary data before the data even hits our production
    server <…> By making sure data is parsed and available locally, we save disk space
    and use the local copy to perform data analysis <…>” which makes me mention another
    crucial point – *data parsing*.


    Parsing is nothing revolutionary, but it’s an absolute necessity to extract information
    of interest to you. It helps you transform data into a structured format for easy
    reading, usage, and if necessary, analysis.


    Data analysis is another point worth mentioning – if you have bigger data sets
    and need to, say, count the times a specific string in a column appears in a table,
    you can divert the task to MariaDB by putting all of the queries relevant to data
    analysis into a file, making them create separate files depicting results when
    they complete, and running that file through MariaDB on a local environment –
    you will have to wait, but MariaDB will analyze data for you and write results
    to a file – isn’t that amazing? Here’s an example:


    ```sql

    SELECT SUBSTRING_INDEX(column, ''[CHARACTER]'', -1) AS x, COUNT(*) AS total

    FROM `demo_table` GROUP BY `column2`

    INTO OUTFILE ''/tmp/demodata_analysis.txt'';

    ```


    The SQL query above will obtain everything to the right of a specific character
    (negative values obtain everything to the right side, positive values work the
    other way around), put everything into a variable titled `x`, and then count and
    group the occurrences of everything before or after a specified character into
    a file. That means that you’re free to go make yourself a coffee as MySQL is analyzing
    your data and writing the results to a file.


    Such methods of data analysis may not be suitable for everyone, but for some use
    cases (e.g., counting the times a specific email TLD was used, etc.), they may
    be golden and that’s why you have to choose and use the methods to work with your
    data yourself by being aware of their upsides and downsides. Big data analytics
    will always take time, but at the same time, you can make MariaDB do all of the
    work and go do something else instead.


    Many big data pitfalls are also related to the usage of indexes, too – that shouldn’t
    come as a surprise as indexes are primarily used to speed up `SELECT` queries,
    which make up most of many big data applications. They must be used adequately,
    too – that’s what we’re going to get into now.


    ## Summary


    Optimizing MySQL or MariaDB for bigger data sets isn’t that different of a task
    than optimizing MariaDB for ordinary use cases. Those who run bigger data sets
    within MariaDB have to be aware that it’s sometimes not feasible to run certain
    operations through the database, and operations may complete faster if the equivalents
    of those commands are run on a Linux architecture (the same commands can be run
    on Windows if we use an appliance like `Cygwin`).


    Regardless, there are certain things we should be aware of when working with bigger
    data sets within a relational database management system – but none of those include
    throwing MariaDB to the curb in favor of a non-relational database management
    system. MariaDB, MySQL, and Percona Server are all perfectly capable of crunching
    big data if we follow best practices. Indexes are one of those best practices
    – and the bigger your data sets get, the more prevalent they will become. That’s
    what we’re getting into now.


    ## 11. Indexing MySQL'
