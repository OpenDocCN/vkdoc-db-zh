  trans: '

    | 设置 | 说明 |

    | --- | --- |

    | `innodb_adaptive_hash_index` | 使 InnoDB 能够作为内存数据库运行。一旦启用，如果基于 InnoDB 的表能完全放入服务器的内存中，MySQL
    将通过自动构建哈希索引来实现对元素的直接（因而更快）查找。可能不适用于所有项目——在生产环境中使用前请进行测试。 |

    | `innodb_buffer_pool_dump_now` | 立即转储缓冲池中最近缓存的页面。 |

    | `innodb_buffer_pool_dump_at_shutdown` | 在 InnoDB 引擎关闭时转储缓冲池中最近缓存的页面。 |

    | `innodb_buffer_pool_instances` | 定义 InnoDB 中缓冲池被划分成的实例数量。如果 InnoDB 缓冲池非常大，调整此值并增加实例数量可能会提升性能。
    |

    | `innodb_buffer_pool_load_at_startup` | 每当 MySQL 启动时，缓冲池会预加载与关闭时相同数量的页面。 |

    | `innodb_buffer_pool_size` | 可以说是 InnoDB 中最重要的参数。指定 InnoDB 中缓冲池的大小——由于 InnoDB
    缓冲池保存着与 InnoDB 表相关的数据和索引，建议将其值增大到足以容纳你的数据。将此参数的值设置为可用 RAM 的 60% 左右是一个良好的起点。根据需要进行调整。
    |

    | `innodb_data_file_path` | 指向 `ibdata1` 的路径——该文件保存着源自基于 InnoDB 的表的数据、元数据和索引。
    |

    | `innodb_default_row_format` | 指定使用 InnoDB 的表的默认行格式。可用值：1. `DYNAMIC`。从 MySQL
    5.0.3 开始的默认值。使用此行格式的 InnoDB 表将以一种能够使数据库在溢出的数据库页面上存储更多数据的方式来存储行。否则，与 `COMPACT`
    非常相似。2. `REDUNDANT`。MySQL 5 版本之前可用的原始行格式。3. `COMPACT`。与 `REDUNDANT` 非常相似。此格式在存储数据时需要的存储空间更少，因此得名。4.
    `COMPRESSED`。尽可能压缩数据，可以在溢出的页面上存储更多数据。 |

    | `innodb_doublewrite` | 启用或禁用双写缓冲。可用值——`ON` 和 `OFF`。启用此参数将为 InnoDB 提供一个在将数据库页面写入
    `ibdata1` 之前可以“操作”的存储区域，从而可能防止只写入一半的页面被写入 `ibdata1`。 |

    | `skip_innodb_doublewrite` | 如果未被注释掉，则使 InnoDB 跳过双写缓冲。 |

    | `innodb_file_per_table` | 通过将数据存储在单独的文件中，使 InnoDB 表能够与 `ibdata1` 文件分开存储，从而防止混乱。除非有充分的理由关闭它，否则请将此参数的值保持为
    `ON`。 |

    | `innodb_flush_log_at_trx_commit` | 控制严格的 ACID 合规性与以牺牲 ACID 为代价的更高性能之间的平衡。值 `"0"`
    将使 InnoDB 每秒仅将重做日志刷新到磁盘一次；默认值 `"1"` 将使 InnoDB 符合 ACID 标准；值 `"2"` 将在提交时写入日志并每秒将日志刷新到磁盘一次；而
    `"3"` 将在日志准备好和提交时分别写入磁盘一次，从而使该过程变慢。 |

    | `innodb_flush_method` | 描述 InnoDB 在事务提交阶段刷新日志所使用的方法。可用值包括：1. `normal` 2. `unbuffered`
    3. `async_unbuffered` 4. `fsync` 5. `O_DSYNC` 6. `nosync` 7. `littlesync` 8. `O_DIRECT`
    9. `O_DIRECT_NO_FSYNC` 我稍后会解释这些值的含义，但就目前而言，对于 Windows 架构请将此设置保留为默认值，对于 Linux 则选择
    `O_DIRECT`。 |

    | `innodb_force_recovery` | 启用或禁用 InnoDB 的崩溃恢复模式。可用值包括从 0 到 6 的整数。 |

    | `innodb_ft_enable_stopword` | 如果保持为 `ON`（默认值），将使 InnoDB 全文索引包含停用词。使用内置的停用词列表，或从
    `innodb_ft_user_stopword_table` 或 `innodb_ft_server_stopword_table` 中设置的值获取。 |

    | `innodb_ft_max_token_size` | 指定可以使用 `FULLTEXT` 索引的词的最大字符长度。 |

    | `innodb_ft_min_token_size` | 指定可以使用 `FULLTEXT` 索引的词的最小字符长度。 |

    | `innodb_io_capacity` | 定义 InnoDB 可用于后台完成任务的每秒 I/O 操作数。 |

    | `innodb_max_dirty_pages_pct` | 一个基于百分比的值，定义了 InnoDB 中可接受的脏页百分比。 |

    | `innodb_lock_wait_timeout` | InnoDB 事务在回滚操作之前等待行锁的时间（以秒为单位）。 |

    | `innodb_log_buffer_size` | InnoDB 将数据写入日志文件时所使用的缓冲区大小。默认值 – 16MB，增大此值可能会提升 I/O
    性能。 |

    | `innodb_log_file_size` | InnoDB 日志文件的大小。推荐值 – 约为缓冲池大小的四分之一（25%）。从 MySQL 8.0.30
    开始已弃用 – 请改为调整 `innodb_redo_log_capacity` 变量。 |

    | `innodb_log_files_in_group` | 指定一个组中 InnoDB 日志文件的数量。从 MySQL 8.0.30 开始已弃用 – 请改为调整
    `innodb_redo_log_capacity` 变量。 |

    | `innodb_optimize_fulltext_only` | 使 `OPTIMIZE TABLE` 仅优化 `FULLTEXT` 索引。旨在用于维护操作。
    |

    | `innodb_page_size` | 指定运行 InnoDB 存储引擎的表的数据页大小。 |

    | `innodb_purge_threads` | 定义 InnoDB 清理操作开始时要使用的线程数。 |

    | `innodb_read_io_threads` | 指定为 InnoDB 中的读操作（`SELECT` 查询）分配的 I/O 线程数。 |

    | `innodb_stats_on_metadata` | 当优化器统计信息非持久化时，此参数适用于 MySQL 的优化器。可用值包括 `OFF`（默认）和
    `ON`。如果你处理较大数据集并涉及 `SELECT` 查询，请考虑启用此参数。 |

    | `innodb_strict_mode` | 使 InnoDB 的行为更加严格，如果启用此变量，警告将被视为错误。 |

    | `innodb_thread_concurrency` | InnoDB 中的最大线程数。 |

    | `innodb_undo_log_truncate` | 如果撤消表空间超过了 `innodb_max_undo_log_size` 中定义的某个阈值，则日志将被截断。
    |

    | `innodb_write_io_threads` | 定义 InnoDB 内部用于写入操作的 I/O 线程数。 |

