- fmt: '# Part III Optimizing MySQL


    ## 7. Optimizing Your Server for MySQL


    Oh, optimization. A favorite among many DBAs and the cause of headaches for many
    developers. Optimization is a necessity for every database – a well-optimized
    database is the reason why your application loads quickly, searches are blazing
    fast, and customers come flowing in. Everything can also work the other way around
    – run a slow, sluggish, and underperforming database, and the best products will
    dive into the ground. Your database is the primary force powering your application
    and everything related to data: data that is inserted, displayed, updated and
    transformed, and sometimes deleted.


    Aside from that, keep an open mind toward security and memorize one thing: there’s
    no such thing as a “completely secure application” or a “completely secure database.”
    You won’t ever achieve 100% security, but that doesn’t mean you should discard
    the security of your database or application as a whole. Avoid providing user
    input to a database and use `PDO` where possible, educate yourself on the top
    10 attacks in the `OWASP` list, use web application firewalls to prevent the most
    prevalent attacks, and don’t forget the human factor either.


    Think of your application as a castle: how would you defend it? Using multiple
    methods, of course! You’d have security guards guarding the perimeter, moats,
    and bridges that can be destroyed if an enemy is advancing, and inside the castle,
    you’d also have a bunch of security cameras to notify you about everything that’s
    going awry. Now use that analogy for your application and database: security guards
    may mean firewall rules that block a request once they are triggered, moats may
    refer to `CDNs` and rate limiters to throttle the number of requests coming into
    your server, and bridges would mean server processes that work together to facilitate
    access to data in your database. The castle is your application, and inside of
    it, you have a database protected by cameras – triggers, a firewall appliance,
    and logs.


    The database is the heart of your castle, and being the heart it necessitates
    special attention – protecting your application from injection, broken authentication,
    and sensitive data exposure is great, but learning how to protect your application
    from these attacks alone will not be sufficient. Secure the accounts you use to
    access `MySQL` – ensure they all have a password, that password is strong, never
    store passwords inside any of your databases in plain text, and ensure you use
    a one-way hashing function like `Bcrypt` or `Blowfish`, and don’t forget the fact
    that you shouldn’t grant any users access to the user table in the `mysql` database
    (except for the `root` user).


    Always remember that there are ways to breach defenses and no application is 100%
    secure – don’t neglect the human factor either.


    ## What Not to Do


    When working with your server and the database within, don’t forget that there
    are things you should avoid doing to not harm your database. First, we have the
    documentation – don’t take advice from the documentation on `MySQL 8.0` if you
    run `MariaDB 11.5`: while the two database management systems are similar, one
    has distinct differences from the other, and even tools that have a similar name
    may work differently. While it’s true that many tools available in `MySQL` will
    act as a symlink to the same tools in `MariaDB` (a prime example of this is the
    `mysqlslap` tool which is a symlink to `mariadb-slap`), in most cases, it’s best
    to base your knowledge on the flavor of the database management system you find
    yourself using.


    Next, we have optimization advice – some people will tell you that you should
    increase your buffer pool size if your `INSERT` queries are still slow after increasing
    it once, that you should make your query cache bigger than some percentage and
    it should be increased again if your queries aren’t making use of it, etc. Before
    taking any tuning advice to heart, ensure it makes sense to begin with: solely
    increasing the buffer pool size isn’t likely to make your `INSERT` queries 100
    times faster; however, ditching `INSERT`s and using `LOAD DATA INFILE` would make
    more sense because `LOAD DATA INFILE` doesn’t have that much overhead as `INSERT`s
    do. The cache hit ratio has nothing to do with the cache size either, and it depends
    on the effectiveness of the I/O operations within your server.


    Avoid testing anything on a live server – even if you’re 99% sure that nothing
    can go wrong and that you run a code block exactly the way it was intended to
    be run, something can go awry depending on your application, database, or server
    configuration. Don’t assume that if you see a code block execute successfully
    in a tutorial, it will also execute the same way on your operating system. Test
    in a staging or demo environment, and then push the changes out to production.
    Trust, but verify.


    The Internet is a great place, and `Stack Overflow` contains a lot of awesome
    advice too, but you shouldn’t take everything you find there for granted either.
    Many people give advice, but it’s not always easy to distinguish who is qualified
    to provide it. Sources affiliated with your database management system of choice
    are a good place to start – look around `Planet MySQL` and `Planet MariaDB`, identify
    vendors from there, and take advice from them. That’s not to say you should blindly
    trust the documentation from official vendors either – test everything before
    rolling anything out to production!


    Never say “This has a small chance of happening, so it probably won’t happen to
    me” either: many of you probably heard of stories where developers told themselves
    something along the lines of “this infrastructure never failed in 5 years, so
    it won’t fail anytime soon either,” and they lost data to a power failure or other
    incident. Expect the best, but prepare for the worst.


    The last thing to remember is that not everyone will have your best interest at
    heart – some people will provide you with advice because they’re jealous or just
    to make themselves feel better by putting others down. Some people are jerks,
    and if you’re a novice, that can make things particularly hard for you and that’s
    why you should always base decisions on research and facts found in official sources
    (documentation, blogs of official vendors, etc.) or reputable people after you
    test and ensure that the advice works as specified.


    ## Summary


    Understanding how the components within your server interact with one another
    is an essential task for any developer and database administrator: we must efficiently
    use the resources within our server, understand how `MySQL` works from the inside,
    understand the causes of errors and what the database wants to say when errors
    are produced and choose the components of our servers carefully.


    Once we’re already writing performant and secure code, we mustn’t forget how our
    database can be optimized and use the necessary tools and knowledge to fine-tune
    our database and provide our database with the tools necessary to ride the high-performance
    highway.


    Now that you know what your server looks like from the inside, how it works, and
    what resources it’s using, it’s time to understand what you can make your database
    do to perform at the best of its ability by optimizing it.'
