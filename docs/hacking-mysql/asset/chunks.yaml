    上面的代码做了几件事：


    1.  连接到数据库服务器。

    2.  将通过 POST 请求传递的用户输入赋值给两个参数。

    3.  将 SQL 查询参数化以接受两个参数，因为提供了两个用户输入值。

    4.  将两个参数绑定到 SQL 查询中并执行（我们使用 “s” 来指定字符串值，但也可以用 `i` 指定整数，用 `d` 指定双精度值，或用 `b` 指定
    BLOB 值）。


    预处理语句使查询不再容易受到 SQL 注入攻击，因为*查询和用户输入被分别发送到服务器*，从而消除了 SQL 注入问题的根源。


    ### SQL 注入的边界情况


    `mysqli_real_escape_string()` 和输入参数化各有其独特的优势，但它们都不能解决你所有的数据库问题。如果使用得当，它们能够保护你的数据库免受
    SQL 注入攻击，但它们并不能禁止你将用户输入直接传递到数据库中。我曾见过有人使用 PDO 却在 SQL 查询中放入变量——在这种情况下，你还能指望保护吗？你刚刚抵消了之前所学到的一切！


    另外，请记住，*PDO 默认对 MySQL 使用模拟预处理语句*，这在极少数情况下（当使用 `gbk` 中文字符集时）可能会使问题恶化而不是缓解，因为上述字符集被认为是存在漏洞的，如果它正在使用，运行某些语句仍会导致查询成功执行，从而为另一次成功的
    SQL 注入攻击铺平道路。


    通过将 PDO 属性 `ATTR_EMULATE_PREPARES` 设置为 `FALSE` 来禁用预处理语句的模拟，从而禁用此行为：


    ```

    $PDO->setAttribute(PDO::ATTR_EMULATE_PREPARES, FALSE);

    ```


    或者，避免使用 `gbk` 字符集——更多信息可以在这里找到（[`https://stackoverflow.com/questions/5741187/sql-injection-that-gets-around-mysql-real-escape-string/12118602`](https://stackoverflow.com/questions/5741187/sql-injection-that-gets-around-mysql-real-escape-string/12118602)）。


    ## 针对数据库的其他攻击


    一旦你掌握了 SQL 注入如何被用来危害你的数据库，也要考虑其他攻击。攻击者不太可能将自己限制在单一的攻击向量上，如果注入攻击失败，他们几乎肯定会尝试其他攻击向量来窃取你组织的数据或访问你的应用程序。我在本书中已经介绍了其他攻击向量，我将再次重申我的建议：


    1.  **遵循最新的 OWASP Top 10 版本。** OWASP 不仅提供对应用程序和数据库造成最大影响的前 10 大安全问题列表，还提供围绕如何防止将概述的安全漏洞引入应用程序的可行提示，并就应用程序何时可能易受攻击、此类攻击可能发生的示例场景以及预防方法提供详细建议。如果确实发生攻击，OWASP
    提供的提示将为控制数据泄露的规模并保护你的应用程序免受安全漏洞的进一步利用提供一个良好的基础。

    2.  **注意旧版本的 OWASP 和其他安全相关框架。** 有些攻击可能会在排名列表中下降；有些可能会被包括在内。明智的做法是了解保护自己免受所有攻击的方法。例如，CSRF
    不是最新版 OWASP 的一部分，但这并不意味着这种攻击不再危险，对吧？

    3.  **利用防火墙解决方案。** 防火墙解决方案保护你的应用程序免受攻击者利用安全漏洞的攻击，因此，即使你的代码存在安全漏洞，它也无法被利用。你也不需要为你的用例选择最昂贵的防火墙解决方案——简单的东西就足够了。

    4.  **与安全工程团队交流，如果你能接触到的话。** 软件工程和数据库世界本身就可能很可怕——为什么不听听关于如何处理问题的新见解呢？

    5.  **为了持续掌握网络安全新闻，请关注安全博客**，例如由 [BreachDirectory](https://breachdirectory.com/blog/)、[Cybernews](https://cybernews.com)、[Rapid7](https://www.rapid7.com/blog/)
    等编写的博客。网络安全视频内容也是一个很好的起点。


    最重要的是，通过参加会议和研讨会、阅读你使用的产品的文档以及阅读像本书这样的书籍，继续教育自己关于软件、数据库和安全问题的知识——你永远不知道会遇到什么。


    你有能力打击针对数据库的攻击——运用你的知识来挫败它们。


    ## 总结


    本章引导你了解了保护数据库实例及其内部数据的各种方法。其中许多方法与遵循标准和遵循信誉良好来源的建议有很大关系。


    现在，让我为你介绍处理更大数据集时需要了解的更多内容——安全并未就此结束，不是吗？


    # 18. 安全与大数据'
- fmt: '1.  The architecture of the server, application, and database are important
    because those things help uncover simple, but important things ranging from the
    versions of plugins we’re allowed to use to the limits of `PHP` versions that
    can be installed on our server (`PHP` versions are dependent on your operating
    system and older versions of operating systems will not power newer versions of
    `PHP`). If the architecture of our application, server, or database is already
    problematic, problems need to be squashed before we move on, because they will
    only get bigger if we don’t do that.


    2.  The amount of data available within our database will point us in a direction
    in regard to where it’s stored (e.g., if we have a billion rows, it’d be safe
    to assume that some of the tables within our database would be partitioned, and
    each partition comes with a certain weight on the disk, so if one partition weighs
    around 10GB, one might assume that such things are stored in a hard drive having
    an appropriate limit for space), and the space where data is stored is likely
    to answer additional questions: is the space a hard drive? An `SSD`? A `NVMe`
    drive?


    3.  The data classes within our database once again tell us whether we’re susceptible
    to `GDPR` or other regulations.


    4.  The measures we take to protect our data at present will inevitably have an
    impact on the measures we’ll take when our data gets bigger. It’s unlikely that
    we’ll need to reevaluate our entire security strategy when our data grows to a
    level where we consider it “big data,” but it’s entirely possible that we’d have
    to add some security methods/appliances that we didn’t have before to improve
    our security posture.


    To put it simply, *we secure big data sets just as we’d secure data sets of “ordinary”
    size while also keeping mindful of the basics and securing data using measures
    applicable to our specific use case.* Let’s consider a couple of security measures
    and see what they would mean in a big data context:


    | Security Measure | Meaning in Big Data Context |

    | --- | --- |

    | Data encryption/hashing | Passwords should be hashed with a function that’s
    considered hard to crack – `Blowfish` or `BCrypt` – and encryption should be applied
    to everything you need to protect to scramble the text into ciphertext that needs
    to be decrypted with a key. |

    | Data masking | Data masking is the obfuscation of data. The more data you have,
    the more important data masking may become in the sense that you may have a lot
    of data that is valuable to attackers and data masking would help obfuscate sensitive
    data that may be used to somehow cause harm. |

    | Data segmentation | When bigger data sets are involved, data segmentation is
    one of the best ways to group data with similarities into groups based on chosen
    parameters so it can be used more effectively. Perhaps you would even consider
    backing up segments of data instead of backing up the entire data set to begin
    with? |

    | “Right to be forgotten” (data erasing upon request) | `EU`-based companies are
    subject to the so-called “right to be forgotten” where if a user/customer asks
    to delete his/her data, the data should be promptly deleted without any further
    questions/charges. If you run a big data-based project and store `EU`-based user
    data to facilitate their access to any part of your product, you have to comply
    with this law. |

    | `CDN` to protect against `DoS`/`DDoS` attacks | Big data sets are usually necessary
    to complete an objective – and objectives must be secured from outside threats
    such as `DDoS` attacks. `DDoS` attacks are very easy to launch, and a `CDN` like
    the one provided by `Sucuri`, `Imperva`, or `CloudFlare` can help you mitigate
    this risk. |

    | Firewall and/or audit appliances | When your data gets bigger, it’s natural
    that you will have more data to protect – a properly installed firewall appliance
    will protect you from threats posed to your application/database and an audit
    appliance will help you evaluate your security posture at all times. Many audit
    and firewall appliances are integrated because they act as integral parts of one
    another and help you inspect and track the steps of an attacker and forbid him
    from accessing certain areas of your application/website as a result. |

    | Effective access control | The more data you have, the more important the control
    who accesses that data becomes. Make sure to follow the “need to know” access
    control guideline, and you should be good to go. |

    | Traffic analysis | It’s important to analyze traffic to your application/website
    often to identify potentially malicious actors/attacks. A sudden shift from 10,000
    requests a day to 70,000,000 requests an hour may indicate a `DDoS` attack, and
    the existence of “`/script.php?id=8 SELECT @@version`” in the request list may
    indicate a possible `SQL` injection attack vector. Traffic analysis applies when
    you run smaller data sets, too, but once your data sets get bigger, the importance
    of traffic analysis is likely to increase. |

    | Backup strategy | It’s important to always have and test your backup strategy.
    As your data grows, the importance of a proper backup strategy is likely to become
    more and more paramount – come up with a backup strategy applicable to your use
    case by following the tips outlined in this book (if necessary, back up raw data
    to guarantee faster restoration times), and make sure your backups can be restored.
    |

    | Threat detection and incident response plan | It’s always important to have
    threat detection and incident response plans at hand. As your data grows, your
    application will be likely to become a target for all kinds of attacks, and no
    matter if they’re executed successfully or not, you *have* to have means to detect
    and preempt them. |

    | `GDPR` & `NIST` | As your data gets bigger, it’s crucial to adhere to the regulations
    of `GDPR` and `NIST`. They may not apply to your specific case, but if they do,
    you have to make sure to follow them to the tea to avoid hefty fines and other
    issues down the way. |'
