  trans: '

    还记得你向 MySQL 的列中插入外语数据时，每个字符都被解释为“？”符号的那次经历吗？那是因为它无法理解数据所使用的**字符集**。字符集（Charsets）是字符集合（character
    sets）的简称——而排序规则（collations）是它们的伙伴。


    字符集定义了列中可以接受哪些字符集合，排序规则则指代一系列规则，用于定义如何对你提供给列的数据进行排序。它们共同施展了某种魔法，使得字符能够正确显示，而不是让你看到
    ??? 符号。要探索 MySQL、MariaDB 或 Percona Server 中可用的字符集和排序规则，请通过 CLI 登录到你的数据库，然后执行查询
    `SHOW CHARACTER SET`——无论你使用的是哪种数据库（你甚至不需要先选择一个数据库——该查询在任何情况下都以相同方式工作），你现在应该能看到所有可用的字符集和排序规则，如下所示。


    ![](img/625040_1_En_4_Fig5_HTML.jpg)


    图 4-5


    MariaDB 中的字符集和排序规则


    四列中有这么多选项！然而，当你深入探究时，一切都会变得如水般清晰：


    1.  `Charset` 指的是你可以选择的字符集。

    2.  `Description` 通过提供该字符集的简短描述，帮助你了解其可能的适用场景。

    3.  `Default collation` 描述了该特定字符集的默认排序机制。

    4.  `Maxlen` 指的是你的数据库服务器使用该特定排序规则存储一个字符所需的字节数上限。


    你可以将 `SHOW CHARACTER SET` 视作文档的伴侣——在文档的丛林中很容易迷失方向，你们中的一些人甚至可能没有时间阅读关于每一个特定字符集和排序规则的所有内容。这就是
    `SHOW CHARACTER SET` 的用武之地！运行这个查询，扫一眼输出，道路应该就会变得清晰。如果仍然不清楚，请查阅文档，但你需要了解的大部分内容都在其中进行了解释。


    你们大多数人可能需要搭配使用 `utf8mb4` 字符集以及 `utf8mb4_general_ci` 或 `utf8mb4_unicode_ci` 排序规则，或类似的组合，但请注意
    MySQL 确实有几个“陷阱”。例如，MySQL 的 UTF-8 并非真正的 UTF-8：真正的 UTF-8 需要支持每个字符最多 4 个字节，而 MySQL
    中的 UTF-8 仅支持 3 个。因此引入了 `utf8mb4`：如今你在 MySQL 安装中看到 `utf8mb4` 而不是 `utf8` 的主要原因是，`utf8mb4`
    提供完整的 Unicode 支持，这意味着用户可以放心地使用表情符号和其他字符。Unicode 支持还意味着，当你尝试存储某些字符时，它们不会导致 MySQL
    报错并提示 `"Incorrect string value: ''\x77\xD0'' for column ''demo_column'' at row
    1"`。


    不过，`utf8mb4` 可能并非所有人的首选，因为每个用例都不同——然而，无论你打算使用什么字符集和排序规则，请记住它们并非火箭科学；记住它们的主要目的是使各种语言的数据可读，这样你就应该能够顺利进行！


    ## 理解索引


    当你理解了字符集和排序规则后，接下来不可避免地会进入你视野的，将是关于查询性能的普遍问题。至此，你可能对查询类型、破坏它们的因素以及导致它们变慢的原因有了一定的了解。你也知道了如何设计完美的模式（Schema），并且我也带你了解了各种字符集和排序规则以实现模式的完美，但如果你对这些感兴趣，你也会对索引感兴趣。


    你们大多数人可能已经以某种形式使用了索引，并且知道它们是什么。对于那些不了解的人，可以把数据库中的索引想象成书中的索引——它们帮助你的数据库快速找到那些如果没有索引就需要花费一些时间才能找到的东西。你的数据越多，索引就越重要。


    它们变得重要是因为其主要目的是帮助你的数据库快速查找并返回行，但即便如此，索引也并非没有缺陷和问题——它们会减慢在你的数据库基础设施中插入、更新或删除数据的查询速度。


    无论你使用哪种 MySQL 分支——MySQL Server、MariaDB Server 还是 Percona Server，在索引方面你总是有选项可以选择。如果我说“所有索引都一样”、“所有索引都帮助你的数据库”或者“索引这个列，你就再也不用担心查询性能了”，那我就是在对你说谎——事实并非如此，因为索引并非万能良药——然而，它们极其擅长它们最初设计的两个主要任务：占用存储空间和加速
    `SELECT` 查询。


    还记得我之前告诉你的吗？查询是由其他任务组成的任务？没错——索引帮助你的数据库轻松处理其中一些任务，虽然所有索引都有其用途，但并非所有索引都相同：


    *   MySQL 中典型的索引是 B-Tree 索引：当我们使用精确匹配运算符搜索值时，将会用到这种索引。

    *   降序索引将按降序存储所有行：对于执行计算操作或某种数据分析的人来说，这种索引可能是必需的。

    *   唯一索引确保列中的所有值都是唯一的：换句话说，这种索引确保列内没有重复项。如果发现重复值，MySQL 将会报错（可以通过指定 `IGNORE` 子句来防止此错误，但我这里不会深入探讨所有细节——我们将会有一章专门讨论索引）。


    我还想指出，`PRIMARY KEY`（主键）也是一种索引——这种索引唯一地标识表中的行，并且经常与 `AUTO_INCREMENT` 子句一起使用，以便在插入新行后自动递增列
    ID 值。如果在某个列上设置了主键索引，那么在 MySQL 计算表中的行数后，插入到该列的 `NULL` 值将表现为一个行 ID（例如，如果表中有 1,499
    行，我们在一个具有主键的列中插入一行 `NULL` 值，那么该 `NULL` 值将变为 1,500）。


    理解索引对于任何性能操作都至关重要——请记住，没有任何一种 MySQL 分支会阻止你在同一列上使用多个索引，也不会显示类似“如果你索引此列，你的索引将不会被使用——你应该索引另一列”这样的消息。当然，存在一些限制和技巧，你可以用来充分利用你的特定
    DBMS 中已有的索引；然而，要充分利用它们，你首先需要确保你的索引正在被使用。这是困扰许多数据库的问题，而它们的主人却没有意识到——“我已经索引了这个列，为什么查询仍然很慢？！”嗯，这很可能是因为该索引甚至没有被你的数据库使用或考虑过。


    我是怎么知道的呢？很简单——选择一个带有已索引列的查询，并对其运行一个 `EXPLAIN` 操作。你会看到两列——`possible_keys` 和 `key`——如果这些列中的任何一列的值不是你希望此查询使用的索引名称，那么你就遇到问题了。为什么？因为键（key）是索引（index）的同义词：键可以为你的查询打开性能天堂之门，但必须以正确的方式使用它们才能做到这一点。

