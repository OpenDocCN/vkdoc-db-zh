    notice that SELECTs from the affected table become significantly slower. The visibility
    map forces recheck to go to the heap blocks; in addition, the number of active
    tuples on a page decreases. This will result in more blocks needing to be read
    into memory for each select operation.


    While there are multiple ways to tune autovacuum on a very busy system, if the
    level of updates/deletes is too high, it might be impossible to reduce table and
    index bloat, even with perfectly tuned autovacuum parameters. You might need to
    evaluate the whole system architecture to see whether the volume of data modification
    is justified. This includes checking whether applications perform several consecutive
    updates on the same set of records or whether it would make sense to partition
    a table and replace mass updates with DROP/DETACH partition and subsequently CREATE/ATTACH
    partition.


    ### Frequent Updates


    Now, let’s consider a different case: a table experiences frequent updates (although
    each of these updates affects a single row or a very small number of rows).


    Depending on the nature of these updates, sometimes it might be possible to reduce
    both the overhead of index updates and the table bloat by setting the table’s
    `fillfactor`. This storage parameter sets the percentage of free space in table
    blocks, and it can be defined in the `WITH` clause of the `CREATE TABLE` statement.
    By default, the value of this parameter is 100, which tells PostgreSQL to fit
    as many rows as possible and minimize the size of free space in every block. Thus,
    usually free space can appear only after updates or deletions followed by vacuuming.


    However, if the size of table rows is small enough to store multiple records in
    one block and updates do not affect indexed attributes, we can specify smaller
    values of `fillfactor`. PostgreSQL allows values as low as 10, leaving 90% of
    block space for updated versions of rows. Of course, small values of the `fillfactor`
    parameter result in an increased number of blocks needed to store table data and
    hence increase the number of reads needed for a heap scan of the table. This significantly
    slows down long queries but might be less significant for short queries, especially
    when only one row is selected from a block. Setting the `fillfactor` to lower
    than 100% increases the likelihood of HOT updates described earlier in this section.


    ## Referential Integrity and Triggers


    The presence of multiple foreign keys in a table can potentially slow DML. This
    is not to suggest that referential integrity checks are bad. On the contrary,
    the ability to maintain referential integrity is one of the most powerful features
    of relational systems. The reason they might slow data manipulation operations
    is that for each `INSERT/UPDATE` operation on a table with integrity constraints,
    the database engine has to check whether the new values of the constrained columns
    are present in the respective parent tables, thus executing additional implicit
    SELECT statements. These checks may take virtually no time, for example, if the
    parent table is a small lookup containing just a handful of rows. However, if
    the parent table size is comparable with the size of the child table, the overhead
    may be more noticeable. As in most other cases, the actual delay time depends
    on system parameters and hardware characteristics.


    The execution times with and without constraints can be compared by creating a
    copy of the flight table:


    ```

    CREATE TABLE flight_no_constr AS

    SELECT * FROM flight LIMIT 0;

    ```


    Then, once again, start adding the same constraints as the `flight` table has
    to the `flight_no_constr` table, and once again, try to perform inserts. You may
    notice that adding an integrity check on the `aircraft_code` attribute does not
    impact the time to insert, but adding constraints on `departure_airport` and `arrival_airport`
    would noticeably slow down inserts.


    Note that operations on the parent table are also affected: when a record in the
    parent table is updated or deleted, the database engine must check that there
    are no records in each of the child tables that reference the updated or deleted
    value.


    Triggers can potentially slow down data modification operations as well, for the
    same reason as referential integrity constraints: each trigger invocation may
    result in executing multiple additional SQL commands. The extent to which each
    trigger slows down execution depends on its complexity.


    It’s worth noting that referential integrity constraints in PostgreSQL are implemented
    using system triggers, so all observations regarding integrity constraints are
    applicable to triggers. However, the potential performance impact of triggers
    does not mean that triggers should not be used. On the contrary, if there are
    some actions or checks that should be performed for any DML operation on the table,
    it is beneficial to implement them using database triggers instead of programming
    these checks in the application. The latter approach will be less efficient and
    would not cover the cases when the data in the table is modified directly in the
    database instead of accessing it through the application.


    ## Summary


    In this chapter, we briefly discussed the implication of data manipulation operations
    on system performance. Typically, DML commands are executed at least an order
    of magnitude less frequently than SELECT statements. However, if data modification
    inefficiencies are not addressed in a timely manner, they may result in blocking
    locks and affect the performance throughout the application.


    # 9. Design Matters


    In the Introduction, we noted that optimization begins during requirements gathering
    and design. To be precise, it starts with system design, including the database
    design, but it is impossible to come up with the right design unless we invest
    time in gathering information about the objects that should be present in the
    database. In this chapter, we will discuss a variety of design options and will
    show how design decisions can impact performance.'
  trans: '

    ## 数据操作语言与清理


    如前所述，PostgreSQL 不会立即移除行的旧版本。`DELETE` 语句将删除的行标记为已移除，而 `UPDATE` 会插入行的新版本，并将之前的版本标记为过时。一旦这些行不再需要用于活动事务，它们就变成了“死行”。随着死行数量增长，这实际上会减少数据块中的活动行数，从而减慢后续的堆扫描速度。


    死行（即已删除的元组）所占用的空间将保持未使用状态，直到被 `VACUUM` 操作回收。这种情况称为表膨胀。大多数情况下，即使更新率相对较高，由 autovacuum
    后台进程发起的常规清理也能及时处理死元组，因此不会导致任何明显的延迟。


    关于调整 `AUTOVACUUM` 系统参数的建议可以在 PostgreSQL 文档和许多咨询公司的网站上找到。在选择这些参数的最佳值时，需要在减少 I/O
    峰值、确保清理能够相对快速完成以及完成任务（即控制住膨胀）之间找到恰当的平衡。


    ### 批量 UPDATE/DELETE


    如果执行批量 `UPDATE/DELETE` 会怎样？即影响表中很大一部分数据的操作。如果您运行这类工作负载，可能会注意到从受影响表中进行的 `SELECT`
    操作显著变慢。可见性映射图强制重新检查需要访问堆数据块；此外，页面上的活动元组数量减少。这将导致每次选择操作需要读取更多数据块到内存中。


    虽然在一个非常繁忙的系统上调整 autovacuum 有多种方法，但如果更新/删除的级别过高，即使 autovacuum 参数调整得非常完美，也可能无法减少表和索引的膨胀。您可能需要评估整个系统架构，看看数据修改量是否合理。这包括检查应用程序是否对同一组记录执行了多次连续更新，或者将表分区并用
    `DROP`/`DETACH` 分区以及随后的 `CREATE`/`ATTACH` 分区来替代批量更新是否有意义。


    ### 频繁更新


    现在，让我们考虑另一种情况：一个表经历频繁的更新（尽管每次更新只影响单行或极少数行）。


    根据这些更新的性质，有时可以通过设置表的 `fillfactor` 来减少索引更新的开销和表膨胀。此存储参数设置了表块中空闲空间的百分比，可以在 `CREATE
    TABLE` 语句的 `WITH` 子句中定义。默认情况下，此参数的值为 100，告诉 PostgreSQL 尽可能多地容纳行，并最小化每个块中的空闲空间大小。因此，通常只有在更新或删除后进行清理时才会出现空闲空间。


    然而，如果表行的尺寸足够小，一个块中可以存储多条记录，并且更新不影响索引属性，我们可以指定较小的 `fillfactor` 值。PostgreSQL 允许的最低值为
    10，为行的更新版本留出 90% 的块空间。当然，`fillfactor` 参数值小会导致存储表数据所需的块数量增加，从而增加表堆扫描所需的读取次数。这显著减慢了长查询的速度，但对于短查询，尤其是当仅从块中选择一行时，影响可能不那么明显。将
    `fillfactor` 设置为低于 100% 会增加本节前面描述的 HOT 更新的可能性。


    ## 引用完整性与触发器


    表中存在多个外键可能会减慢数据操作语言的速度。这并不是说引用完整性检查不好。相反，维护引用关系的能力是关系系统最强大的特性之一。它们可能减慢数据操作的原因是，对于在具有完整性约束的表上执行的每次
    `INSERT`/`UPDATE` 操作，数据库引擎必须检查受约束列的新值是否存在于相应的父表中，从而执行额外的隐式 `SELECT` 语句。如果父表是一个很小的查找表，只包含少量行，这些检查可能几乎不花费时间。然而，如果父表的大小与子表的大小相当，开销可能会更明显。与大多数其他情况一样，实际的延迟时间取决于系统参数和硬件特性。


    可以通过创建 `flight` 表的副本来比较有约束和无约束情况下的执行时间：


    ```sql

    CREATE TABLE flight_no_constr AS

    SELECT * FROM flight LIMIT 0;

    ```


    然后，再次向 `flight_no_constr` 表添加与 `flight` 表相同的约束，并再次尝试执行插入。您可能会注意到，在 `aircraft_code`
    属性上添加完整性检查不会影响插入时间，但在 `departure_airport` 和 `arrival_airport` 上添加约束会明显减慢插入速度。


    请注意，父表上的操作也会受到影响：当更新或删除父表中的记录时，数据库引擎必须检查每个子表中是否存在引用了被更新或删除值的记录。


    触发器也可能减慢数据修改操作，原因与引用完整性约束相同：每次触发器调用都可能导致执行多个额外的 SQL 命令。每个触发器减慢执行的程度取决于其复杂性。


    值得注意的是，PostgreSQL 中的引用完整性约束是使用系统触发器实现的，因此所有关于完整性约束的观察也适用于触发器。然而，触发器的潜在性能影响并不意味着不应该使用触发器。相反，如果有一些操作或检查需要对表上的任何数据操作语言操作执行，使用数据库触发器来实现它们比在应用程序中编程这些检查更有益。后一种方法效率较低，并且无法覆盖直接在数据库中修改表数据而不通过应用程序访问的情况。


    ## 总结


    在本章中，我们简要讨论了数据操作操作对系统性能的影响。通常，数据操作语言命令的执行频率至少比 `SELECT` 语句低一个数量级。然而，如果数据修改的低效问题得不到及时解决，它们可能会导致阻塞锁并影响整个应用程序的性能。


    # 9. 设计至关重要


    在引言中，我们提到优化始于需求收集和设计阶段。准确地说，它始于系统设计，包括数据库设计，但除非我们投入时间收集有关数据库中应包含对象的信息，否则无法得出正确的设计。在本章中，我们将讨论各种设计选项，并展示设计决策如何影响性能。

    '
- fmt: '## Design Matters


    第[1章](#501585_2_En_1_Chapter.xhtml)解释了存储电话号码信息的两种不同方案，如图[1-1](#501585_2_En_1_Chapter.xhtml#Fig1)和[1-2](#501585_2_En_1_Chapter.xhtml#Fig2)所示。让我们回到这个例子。


    清单[9-1](#501585_2_En_9_Chapter.xhtml#PC1)展示了`postgres_air`模式中使用的表定义。`account`表包含用户账户信息，`phone`表包含与账户关联的所有电话号码信息。这种关系通过外键约束来支持。


    清单[9-2](#501585_2_En_9_Chapter.xhtml#PC2)展示了一种替代设计，其中所有电话与账户信息存储在一起。


    ```sql

    /* account table */

    CREATE TABLE account(

    account_id integer,

    login text,

    first_name text,

    last_name text,

    frequent_flyer_id integer,

    home_phone text,

    work_phone text,

    cell_phone text,

    primary_phone text,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    ```

    Listing 9-2

    One-table design


    ```sql

    /* account table */

    CREATE TABLE account(

    account_id integer,

    login text,

    first_name text,

    last_name text,

    frequent_flyer_id integer,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    /*phone table */

    CREATE TABLE phone(

    phone_id integer,

    account_id integer,

    phone text,

    phone_type text,

    primary_phone boolean,

    update_ts timestamp with time zone,

    CONSTRAINT phone_pkey PRIMARY KEY (phone_id),

    CONSTRAINT phone_account_id_fk FOREIGN KEY (account_id)

    REFERENCES account (account_id)

    );

    ```

    Listing 9-1

    Two-table design


    `postgres_air`模式选择两表设计有多重原因；正如第[1章](#501585_2_En_1_Chapter.xhtml)所讨论的，许多人没有家庭固定电话或专用工作电话。许多人拥有不止一部手机或一个虚拟号码，比如Google
    Voice。所有这些场景都可以通过两表解决方案得到支持，而无法适应单表解决方案，除非我们开始增加列来适应每种情况。在单表解决方案中标明主电话需要将其中一个号码重复填入`primary_phone`列，这为不一致创造了空间。从性能角度来看，两表解决方案也更有益。


    在两表解决方案中，通过电话号码搜索账户是一个直接的`SELECT`语句：


    ```sql

    SELECT

    DISTINCT account_id

    FROM phone

    WHERE phone=''8471234567''

    ```


    该查询将使用索引仅扫描执行。


    在单表设计中，类似的查询如下：


    ```sql

    SELECT

    account_id

    FROM account

    WHERE home_phone= ''8471234567''

    OR work_phone= ''8471234567''

    OR cell_phone= ''8471234567''

    ```


    为了避免全表扫描，必须建立三个不同的索引。


    这是否意味着单表设计比两表设计差？这取决于数据的访问方式。如果该模式支持的是旅行社使用的系统，最可能的用例是需要根据电话号码提取客户账户。当客服人员询问客户电话号码时，客户不太可能指明电话的类型。


    另一方面，考虑一份关于过去24小时内更新过的客户账户报告。这份报告应包含家庭电话、工作电话和手机，即使某些为空也应分别列在独立的列中，并且应包含过去24小时内有过任何修改（包括电话号码更新）的账户。在这种情况下，如清单[9-3](#501585_2_En_9_Chapter.xhtml#PC5)所示的单表解决方案要简单和高效得多。


    ```sql

    SELECT *

    FROM account

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now();

    ```

    Listing 9-3

    Usage of one-table design


    在两表设计中产生相同的结果则更为复杂——参见清单[9-4](#501585_2_En_9_Chapter.xhtml#PC6)。


    ```sql

    SELECT

    a.account_id,

    login,

    first_name,

    last_name,

    frequent_flyer_id,

    home_phone,

    work_phone,

    cell_phone,

    primary_phone

    FROM account a

    JOIN (

    SELECT

    account_id,

    max(phone) FILTER (WHERE phone_type=''home'')

    AS home_phone,

    max(phone) FILTER (WHERE phone_type=''work'')

    AS work_phone,

    max(phone) FILTER (WHERE phone_type=''mobile'')

    AS cell_phone,

    max(phone) FILTER (WHERE primary_phone IS true)

    AS primary_phone

    FROM phone

    WHERE account_id IN (

    SELECT

    account_id

    FROM phone

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

    UNION

    SELECT

    account_id

    FROM account

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

    )

    GROUP BY 1)  p

    USING (account_id);

    ```

    Listing 9-4

    Same query with a two-table design


    这两个例子具有启发性的另一个原因是——两表解决方案更优的查询更可能出现在OLTP系统中，而单表解决方案表现更好的查询更可能出现在OLAP系统中。ETL工具可用于将数据从OLTP系统转换为更适合商业智能需求的格式。


    第[6章](#501585_2_En_6_Chapter.xhtml)展示了一个类似的情况，其中非最优的数据库设计导致了非最优的查询（见清单6-26）。即使优化后的查询仍然相对较慢。这些例子说明了数据库设计对性能的影响，有时糟糕设计的负面后果无法通过改进查询或建立额外索引来补救。


    本章后续部分将讨论可能对性能产生负面影响的最常见设计选择。


    ## Why Use a Relational Model?


    虽然之前的所有例子都是关系型的（因为PostgreSQL构建在关系模型之上），但我们知道许多人认为关系数据库已经过时或不流行了。像“关系数据库之后是什么？”这样的公开演讲会定期举行。


    本节并非为关系数据库辩护。关系数据库无需辩护，而且到目前为止，还没有任何潜在的继任者获得接近可比水平的采用率。相反，目标是解释其他模型的局限性。


    ### Types of Databases


    那么，除了关系模型之外还存在哪些替代方案呢？目前使用的数据库系统和数据存储种类繁多，采用了各种各样的数据模型和存储技术。这些系统包括传统的基于行或基于列存储的关系系统、可扩展的分布式系统、流处理系统等等。


    我们已经看到不止一个非关系型数据库系统经历了Gartner炒作周期，从过高期望的顶峰跌入幻灭的低谷。然而，值得注意的是，关系模型的核心是基于布尔逻辑的查询语言，而不是任何特定的数据存储方式。这可能是许多作为传统RDBMS替代品而创建的系统最终采用SQL变体作为高级查询语言，从而也采用了相关布尔逻辑的原因。


    虽然关系数据库似乎远未被取代，但在新系统中开发和验证的技术已被证明有用并被广泛采用。三种流行的方法是实体-属性-值模型、键值存储和分层系统（后者通常被称为文档存储）。'
  raw: '## Design Matters


    Chapter [1](#501585_2_En_1_Chapter.xhtml) explained two different solutions for
    storing information about phone numbers, shown in Figures [1-1](#501585_2_En_1_Chapter.xhtml#Fig1)
    and [1-2](#501585_2_En_1_Chapter.xhtml#Fig2). Let’s return to this example.


    Listing [9-1](#501585_2_En_9_Chapter.xhtml#PC1) shows the table definitions used
    in the `postgres_air` schema. The `account` table contains information about user
    accounts, and the `phone` table contains information about all phone numbers associated
    with accounts. This relationship is supported by a foreign key constraint.


    Listing [9-2](#501585_2_En_9_Chapter.xhtml#PC2) shows an alternative design, where
    all phones are stored together with account information.


    ```

    /* account table */

    CREATE TABLE account(

    account_id integer,

    login text,

    first_name text,

    last_name text,

    frequent_flyer_id integer,

    home_phone text,

    work_phone text,

    cell_phone text,

    primary_phone text,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    Listing 9-2

    One-table design

    ```


    ```

    /* account table */

    CREATE TABLE account(

    account_id integer,

    login text,

    first_name text,

    last_name text,

    frequent_flyer_id integer,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    /*phone table */

    CREATE TABLE phone(

    phone_id integer,

    account_id integer,

    phone text,

    phone_type text,

    primary_phone boolean,

    update_ts timestamp with time zone,

    CONSTRAINT phone_pkey PRIMARY KEY (phone_id),

    CONSTRAINT phone_account_id_fk FOREIGN KEY (account_id)

    REFERENCES account (account_id)

    );

    Listing 9-1

    Two-table design

    ```


    There are multiple reasons the two-table design was chosen for the `postgres_air`
    schema; as discussed in Chapter [1](#501585_2_En_1_Chapter.xhtml), many people
    do not have landlines at home or a dedicated work phone. Many people have more
    than one cell phone or a virtual number, like Google Voice. All these scenarios
    can be supported with the two-table solution and can’t fit into the one-table
    solution, unless we start to add columns to accommodate each of these cases. Indicating
    a primary phone in the one-table solution would require repeating one of the numbers
    in the `primary_phone` column, creating room for inconsistency. From a performance
    perspective, the two-table solution is also more beneficial.


    In the two-table solution, searching for an account by phone number is a straightforward
    SELECT statement:


    ```

    SELECT

    DISTINCT account_id

    FROM phone

    WHERE phone=''8471234567''

    ```


    This query will be executed using an index-only scan.


    In the one-table design, a similar query would look like this:


    ```

    SELECT

    account_id

    FROM account

    WHERE home_phone= ''8471234567''

    OR work_phone= ''8471234567''

    OR cell_phone= ''8471234567''

    ```


    To avoid a full scan, three different indexes must be built.


    Does this mean that the one-table design is worse than the two-table design? It
    depends on how the data is accessed. If the schema is supporting a system used
    by travel agents, the most likely use case is needing to pull a customer account
    based on the phone number. When an agent asks a customer for their phone number,
    the customer is unlikely to specify the type of the phone.


    On the other hand, consider a report on customer accounts that have been updated
    in the last 24 hours. This report should include home phone, work phone, and cell
    phone in separate columns regardless of if any are empty and should include accounts
    that have had any modification in the last 24 hours—including updates to phone
    numbers. In this case, the one-table solution, shown in Listing [9-3](#501585_2_En_9_Chapter.xhtml#PC5),
    is much simpler and more efficient.


    ```

    SELECT *

    FROM account

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now();

    Listing 9-3

    Usage of one-table design

    ```


    Producing the same result in the two-table design is more involved—see Listing
    [9-4](#501585_2_En_9_Chapter.xhtml#PC6).


    ```

    SELECT

    a.account_id,

    login,

    first_name,

    last_name,

    frequent_flyer_id,

    home_phone

    work_phone,

    cell_phone,

    primary_phone

    FROM account a

    JOIN (

    SELECT

    account_id,

    max(phone) FILTER (WHERE phone_type=''home'')

    AS home_phone,

    max(phone) FILTER (WHERE phone_type=''work'')

    AS work_phone,

    max(phone) FILTER (WHERE phone_type=''mobile'')

    AS cell_phone,

    max(phone) FILTER (WHERE primary_phone IS true)

    AS primary_phone

    FROM phone

    WHERE account_id IN (

    SELECT

    account_id

    FROM phone

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

    UNION

    SELECT

    account_id

    FROM account

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

    )

    GROUP BY 1)  p

    USING (account_id);

    Listing 9-4

    Same query with a two-table design

    ```


    These two examples are illustrative for another reason—the query for which the
    two-table solution is preferred is more likely to occur in an OLTP system, and
    the query that is better served by the one-table solution is more likely in an
    OLAP system. ETL tools can be used to transform data from OLTP systems to a format
    that is better suited to business intelligence needs.


    A similar situation was shown in Chapter [6](#501585_2_En_6_Chapter.xhtml), where
    a nonoptimal database design prompted a nonoptimal query (see Listing 6-26). Even
    the optimized version of the query remained relatively slow. These examples illustrate
    impact of database design on performance and that sometimes the negative consequences
    of poor design can’t be remedied by improving the query or building additional
    indexes.


    Subsequent sections of this chapter address the most common design choices that
    may negatively affect performance.


    ## Why Use a Relational Model?


    While all the previous examples are relational, as PostgreSQL is built on a relational
    model, we’re aware that many people think of relational databases as outdated
    or out of fashion. Public talks with titles like “What comes after relational
    databases?” are given at a regular cadence.


    This section isn’t a defense of relational databases. Relational databases don’t
    need defending, and, so far, no would-be successor has had gained even close to
    a comparable level of adoption. Rather, the goal is to explain the limitations
    of other models.


    ### Types of Databases


    So what alternatives exist to relational models? There are a wide variety of database
    systems and data stores currently in use, using a wide variety of data models
    and storage techniques. These include traditional relational systems with row-based
    or column-based storage, scalable distributed systems, stream processing systems,
    and much more.


    We’ve seen more than one non-relational database system work its way through the
    Gartner hype cycle, from the peak of overinflated expectations to the trough of
    disillusionment. It is worth noting, however, that the core of the relational
    model is a query language based on Boolean logic, rather than any specific way
    of storing data. This is likely the reason many systems created as alternatives
    to the traditional RDBMS ended up with variations of SQL as a high-level query
    language and hence the associated Boolean logic.


    While relational databases do not appear close to being dethroned, there are technologies
    developed and validated within new systems that have proven useful and been widely
    adopted. Three popular approaches are entity-attribute-value models, key-value
    stores, and hierarchical systems, the last often referred to as document stores.'
  trans: '

    ## 设计的重要性


    第 1 章解释了存储电话号码信息的两种不同方案，如图 1-1 和 1-2 所示。让我们回到这个例子。


    清单 9-1 展示了`postgres_air`模式中使用的表定义。`account`表包含用户账户信息，`phone`表包含与账户关联的所有电话号码信息。这种关系通过外键约束来支持。


    清单 9-2 展示了一种替代设计，其中所有电话与账户信息存储在一起。


    ```sql

    /* account table */

    CREATE TABLE account(

    account_id integer,

    login text,

    first_name text,

    last_name text,

    frequent_flyer_id integer,

    home_phone text,

    work_phone text,

    cell_phone text,

    primary_phone text,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    ```

    清单 9-2

    单表设计


    ```sql

    /* account table */

    CREATE TABLE account(

    account_id integer,

    login text,

    first_name text,

    last_name text,

    frequent_flyer_id integer,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    /*phone table */

    CREATE TABLE phone(

    phone_id integer,

    account_id integer,

    phone text,

    phone_type text,

    primary_phone boolean,

    update_ts timestamp with time zone,

    CONSTRAINT phone_pkey PRIMARY KEY (phone_id),

    CONSTRAINT phone_account_id_fk FOREIGN KEY (account_id)

    REFERENCES account (account_id)

    );

    ```

    清单 9-1

    两表设计


    `postgres_air`模式选择两表设计有多重原因；正如第 1 章所讨论的，许多人没有家庭固定电话或专用工作电话。许多人拥有不止一部手机或一个虚拟号码，比如
    Google Voice。所有这些场景都可以通过两表解决方案得到支持，而无法适应单表解决方案，除非我们开始增加列来适应每种情况。在单表解决方案中标明主电话需要将其中一个号码重复填入`primary_phone`列，这为不一致创造了空间。从性能角度来看，两表解决方案也更有益。


    在两表解决方案中，通过电话号码搜索账户是一个直接的`SELECT`语句：


    ```sql

    SELECT

    DISTINCT account_id

    FROM phone

    WHERE phone=''8471234567''

    ```


    该查询将使用索引仅扫描执行。


    在单表设计中，类似的查询如下：


    ```sql

    SELECT

    account_id

    FROM account

    WHERE home_phone= ''8471234567''

    OR work_phone= ''8471234567''

    OR cell_phone= ''8471234567''

    ```


    为了避免全表扫描，必须建立三个不同的索引。


    这是否意味着单表设计比两表设计差？这取决于数据的访问方式。如果该模式支持的是旅行社使用的系统，最可能的用例是需要根据电话号码提取客户账户。当客服人员询问客户电话号码时，客户不太可能指明电话的类型。


    另一方面，考虑一份关于过去 24 小时内更新过的客户账户报告。这份报告应包含家庭电话、工作电话和手机，即使某些为空也应分别列在独立的列中，并且应包含过去 24
    小时内有过任何修改（包括电话号码更新）的账户。在这种情况下，如清单 9-3 所示的单表解决方案要简单和高效得多。


    ```sql

    SELECT *

    FROM account

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now();

    ```

    清单 9-3

    单表设计的使用


    在两表设计中产生相同的结果则更为复杂——参见清单 9-4。


    ```sql

    SELECT

    a.account_id,

    login,

    first_name,

    last_name,

    frequent_flyer_id,

    home_phone,

    work_phone,

    cell_phone,

    primary_phone

    FROM account a

    JOIN (

    SELECT

    account_id,

    max(phone) FILTER (WHERE phone_type=''home'')

    AS home_phone,

    max(phone) FILTER (WHERE phone_type=''work'')

    AS work_phone,

    max(phone) FILTER (WHERE phone_type=''mobile'')

    AS cell_phone,

    max(phone) FILTER (WHERE primary_phone IS true)

    AS primary_phone

    FROM phone

    WHERE account_id IN (

    SELECT

    account_id

    FROM phone

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

    UNION

    SELECT

    account_id

    FROM account

    WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

    )

    GROUP BY 1)  p

    USING (account_id);

    ```

    清单 9-4

    使用两表设计的相同查询


    这两个例子具有启发性的另一个原因是——两表解决方案更优的查询更可能出现在 OLTP 系统中，而单表解决方案表现更好的查询更可能出现在 OLAP 系统中。ETL
    工具可用于将数据从 OLTP 系统转换为更适合商业智能需求的格式。


    第 6 章展示了一个类似的情况，其中非最优的数据库设计导致了非最优的查询（见清单 6-26）。即使优化后的查询仍然相对较慢。这些例子说明了数据库设计对性能的影响，有时糟糕设计的负面后果无法通过改进查询或建立额外索引来补救。


    本章后续部分将讨论可能对性能产生负面影响的最常见设计选择。


    ## 为何使用关系模型？


    虽然之前的所有例子都是关系型的（因为 PostgreSQL 构建在关系模型之上），但我们知道许多人认为关系数据库已经过时或不流行了。像“关系数据库之后是什么？”这样的公开演讲会定期举行。


    本节并非为关系数据库辩护。关系数据库无需辩护，而且到目前为止，还没有任何潜在的继任者获得接近可比水平的采用率。相反，目标是解释其他模型的局限性。


    ### 数据库的类型


    那么，除了关系模型之外还存在哪些替代方案呢？目前使用的数据库系统和数据存储种类繁多，采用了各种各样的数据模型和存储技术。这些系统包括传统的基于行或基于列存储的关系系统、可扩展的分布式系统、流处理系统等等。


    我们已经看到不止一个非关系型数据库系统经历了 Gartner 炒作周期，从过高期望的顶峰跌入幻灭的低谷。然而，值得注意的是，关系模型的核心是基于布尔逻辑的查询语言，而不是任何特定的数据存储方式。这可能是许多作为传统
    RDBMS 替代品而创建的系统最终采用 SQL 变体作为高级查询语言，从而也采用了相关布尔逻辑的原因。


    虽然关系数据库似乎远未被取代，但在新系统中开发和验证的技术已被证明有用并被广泛采用。三种流行的方法是实体-属性-值模型、键值存储和分层系统（后者通常被称为文档存储）。

    '
- fmt: '### Entity-Attribute-Value Model


    在实体-属性-值（EAV）模型中，值是标量（通常是文本，以适应多种数据类型）。回顾第 6 章，该模型的特点是一个包含三列的表：第一列是实体的标识符，第二列是该实体属性的标识符，第三列是该实体对应属性的值。这种设计以“灵活性”为名，实际上意味着需求不精确或不明确。不出所料，这种灵活性是以性能为代价的。第
    6 章介绍了 `custom_field` 表，指出这种设计并非最优，并展示了它如何对性能产生负面影响。即使应用了优化技术以避免多次表扫描，执行速度也相对较慢。


    除了性能影响，这种设计还限制了数据质量管理。在第 6 章介绍的案例中，三个自定义字段包含三种不同类型的数据：`passport_num` 是数字，`passport_exp_date`
    是日期，`passport_country` 是文本字段（应包含有效的国家名称）。然而，在 `custom_field` 表中，它们都存储在文本字段 `custom_field_value`
    中，这不允许进行强类型检查或参照完整性约束。


    ### Key-Value Model


    键值模型将复杂对象存储在单个字段中，因此结构不对数据库暴露。这样，提取对象的单个属性就变得非常复杂，实际上严重限制了数据库引擎执行超出通过主键返回单个对象之外的任务。在最极端的情况下，一种设计可能将除主键之外的所有字段打包到一个
    JSON 对象中。


    自从 PostgreSQL 在 9.2 版本中引入 JSON 支持以来，这种方法在数据库和应用程序开发人员中变得非常流行。JSONB 在 9.4 版本中被引入，并且在之后的每个版本中都有更多的增强功能。有了这种支持，定义为
    JSON 的表列变得很常见。例如，来自 `postgres_air` 模式的 `passenger` 表可以按清单 9-5 所示的方式定义。


    ```sql

    CREATE TABLE passenger_json (

    passenger_id INT,

    passenger_info JSON);

    ```

    清单 9-5

    包含 JSON 的表


    清单 9-6 展示了 `passenger_info` JSON 的一个例子。


    ```json

    {"booking_ref" : "8HNB12",

    "passenger_no": "1",

    "first_name" : "MARIAM",

    "last_name" : "WARREN",

    "update_ts" : "2023-04-17T19:45:55.022782-05:00",

    }

    ```

    清单 9-6

    JSON 值示例


    是的，建议的设计看起来是通用的，无论未来添加多少新数据元素，都不需要任何 DDL 更改。然而，同样的问题影响着这种设计，就像影响 EAV 模型一样。这种方法使得对标量值执行类型检查变得不可能，也无法定义参照完整性约束。此外，经常被忽视的是存储
    JSON 所需的数据量大幅增加。确实，键名在每个记录中都是重复的。根据存储的值的类型和大小，数据量可能会增加好几倍。


    本章稍后将讨论用于处理 JSON 字段的工具和方法。


    ### Hierarchical Model


    层次结构易于理解和使用。事实上，由于其易用性和相对较小的内存需求，层次结构在 20 世纪 60 年代首次在数据库中实现。当然，在那个时候，XML 和 JSON
    都还不可用。只要所有内容都适合单一层次结构，这些结构就工作得很好。然而，一旦数据适合多个层次结构，使用层次结构就变得既复杂又低效。


    让我们用 `postgres_air` 模式中的例子来说明，如图 9-1 所示。对于一个机场，离港航班列表是一个层次结构，而到港航班列表是另一个层次结构。登机牌可能与离港航班属于同一个层次结构。同时，它们也可能是完全不同的、从预订开始的层次结构的一部分。请注意，乘客和预订航段不适合在不重复的情况下放入同一个层次结构。


    ![](Images/501585_2_En_9_Fig1_HTML.jpg)


    一个展示 3 个层次结构的框图。左侧：解释乘客预订航班，航班从机场离港。中间：解释航班到达机场。右侧：表示从预订开始的航班和乘客的层次结构。


    图 9-1

    postgres_air 模式中的层次结构示例


    早期的层次数据库（如 IMS/360）向客户端应用程序提供了数据的多个层次视图，但在内部支持更复杂的数据结构。


    ### Combining the Best of Different Worlds


    PostgreSQL 不仅仅是一个关系系统。它是对象关系型的，这意味着列数据类型不一定是标量。实际上，列可以存储结构化类型，包括数组、复合类型或表示为 JSON
    或 XML 文档的对象。


    负责任地使用这些功能，可以结合多种替代方法与更传统的关系功能，提供所有潜在的好处。


    “负责任地”是这里的关键词。例如，PostgreSQL 允许前面部分提到的多层次结构方法。我们可以在数据库内部的关系结构之上为客户端应用程序构建层次结构表示。这种方法结合了两个世界的优点：数据可以通过关系查询的能力高效提取，而应用程序可以以友好的数据交换格式使用复杂对象。更多关于这种方法的细节在第
    14 章中提供。


    尽管本书不涵盖分布式系统，但值得一提的是，PostgreSQL 拥有一套庞大的扩展（不包含在基本发行版中的附加库），这些扩展支持分布式查询，包括查询除 PostgreSQL
    之外的其他 DBMS。这些扩展被称为 `foreign data wrappers (FDWs)`，它们提供了几乎透明的方式来访问驻留在超过 60 种类型的
    DBMS（包括关系型和非关系型）中的数据。'
  raw: '### Entity-Attribute-Value Model


    In the entity-attribute-value (EAV) model, values are scalar (often text, to accommodate
    multiple data types). To review from Chapter [6](#501585_2_En_6_Chapter.xhtml),
    this model features a table with three columns, the first for an identifier for
    an entity, the second an identifier for an attribute of that entity, and the third
    the value of that attribute for that entity. This is done in the name of “flexibility,”
    which in reality means imprecise or unknown requirements. Unsurprisingly, this
    flexibility comes at the expense of performance. Chapter [6](#501585_2_En_6_Chapter.xhtml)
    introduced the `custom_field` table, noted that this design was not optimal, and
    showed how it could negatively affect performance. Even after applying optimization
    techniques to avoid multiple table scans, execution was relatively slow.


    In addition to performance impacts, this design curtails data quality management.
    In the case introduced in Chapter [6](#501585_2_En_6_Chapter.xhtml), three custom
    fields contain data of three different types: `passport_num` is a number, `passport_exp_date`
    is a date, and `passport_country` is a text field, which should contain a valid
    country name. However, in the `custom_field` table, they all are stored in the
    text field `custom_field_value`, which does not allow strong type checks or referential
    integrity constraints.


    ### Key-Value Model


    The key-value model stores complex objects within a single field, so the structure
    is not exposed to the database. Individual attributes of the object then are much
    more complex to extract, effectively kneecapping the database engine in doing
    tasks beyond returning a single object via a primary key. In the most extreme
    case, a design may package all fields other than the primary key into a single
    JSON object.


    Since PostgreSQL introduced JSON support in version 9.2, this approach has become
    very popular with database and application developers. JSONB was introduced in
    version 9.4, and more enhancements have followed in every subsequent version.
    With this support, table columns defined as JSON are commonplace. For example,
    the `passenger` table from the `postgres_air` schema could be defined as shown
    in Listing [9-5](#501585_2_En_9_Chapter.xhtml#PC7).


    ```

    CREATE TABLE passenger_json (

    passenger_id INT,

    passenger_info JSON);

    Listing 9-5

    Table with JSON

    ```


    An example of the `passenger_info` JSON is shown in Listing [9-6](#501585_2_En_9_Chapter.xhtml#PC8).


    ```

    {"booking_ref" : "8HNB12",

    "passenger_no": "1",

    "first_name" : "MARIAM",

    "last_name" : "WARREN",

    "update_ts" : "2023-04-17T19:45:55.022782-05:00",

    }

    Listing 9-6

    Example of a JSON value

    ```


    Yes, the suggested design looks universal and does not require any DDL changes
    no matter how many new data elements are added in the future. However, the same
    issues affect this design as the EAV model. This approach makes it impossible
    to perform type checks on scalar values, and referential integrity constraints
    can’t be defined. Additionally, what is often overlooked is a substantial increase
    in the data volume required to store JSON. Indeed, the names of the keys are repeated
    in each record. Depending on the type and size of values stored, the data volume
    may increase several times over.


    Tools and approaches for working with JSON fields are discussed later in this
    chapter.


    ### Hierarchical Model


    Hierarchical structures are easy to understand and use. In fact, hierarchical
    structures were first implemented in databases in the 1960s due to their ease
    of use, as well as their relatively small memory requirements. Of course, at that
    time, neither XML nor JSON was available. These structures work great as long
    as everything fits into a single hierarchy. However, using hierarchies becomes
    both complex and inefficient as soon as data fits into more than one hierarchy.


    Let’s illustrate with examples from the `postgres_air` schema, shown in Figure
    [9-1](#501585_2_En_9_Chapter.xhtml#Fig1). For an airport, the list of departing
    flights is one hierarchy, and the list of arriving flights is another. Boarding
    passes may fit into the same hierarchy as departing flights. At the same time,
    they can be a part of a completely different hierarchy that starts from bookings.
    Note that passengers and booking legs can’t fit into the same hierarchy without
    duplication.


    ![](Images/501585_2_En_9_Fig1_HTML.jpg)


    A block diagram depicts 3 hierarchies. Left. It explains that the passenger books
    the flight and the flight departs from the airport. Middle. It explains that the
    flight arrives at the airport. Right. It denotes the hierarchy of the flight and
    passenger start from booking.


    Figure 9-1


    Examples of hierarchies in the postgres_air schema


    The early hierarchical databases (IMS/360) provided several hierarchical views
    of data to the client application but supported more complex data structures internally.


    ### Combining the Best of Different Worlds


    PostgreSQL is not just a relational system. It is object-relational, meaning that
    column data types are not necessarily scalar. In fact, columns can store structured
    types including arrays, composite types, or objects represented as JSON or XML
    documents.


    Using these features responsibly provides all the potential benefits of several
    alternative approaches in combination with more traditional relational features.


    “Responsibly” is the operative word here. For example, PostgreSQL allows the multiple-hierarchy
    approach mentioned in the previous section. We can build hierarchical representations
    for a client application on top of an internal relational structure in the database.
    Such an approach combines the best of both worlds: data is extracted efficiently
    via the power of relational query, and the application can consume complex objects
    in a friendly data exchange format. More details on this approach are provided
    in Chapter [14](#501585_2_En_14_Chapter.xhtml).


    Although distributed systems aren’t covered in this book, it’s worth mentioning
    that PostgreSQL has a massive set of extensions (additional libraries not included
    into basic distribution) that support distributed querying including DBMSs other
    than PostgreSQL. These extensions are called *foreign data wrappers (**FDWs)*,
    and they provide almost transparent ways of accessing data that can reside in
    more than 60 types of DBMSs, both relational and non-relational.'
  trans: '

    ### 实体-属性-值模型


    在实体-属性-值（EAV）模型中，值是标量（通常是文本，以适应多种数据类型）。回顾第 6 章，该模型的特点是一个包含三列的表：第一列是实体的标识符，第二列是该实体属性的标识符，第三列是该实体对应属性的值。这种设计以“灵活性”为名，实际上意味着需求不精确或不明确。不出所料，这种灵活性是以性能为代价的。第
    6 章介绍了 `custom_field` 表，指出这种设计并非最优，并展示了它如何对性能产生负面影响。即使应用了优化技术以避免多次表扫描，执行速度也相对较慢。


    除了性能影响，这种设计还限制了数据质量管理。在第 6 章介绍的案例中，三个自定义字段包含三种不同类型的数据：`passport_num` 是数字，`passport_exp_date`
    是日期，`passport_country` 是文本字段（应包含有效的国家名称）。然而，在 `custom_field` 表中，它们都存储在文本字段 `custom_field_value`
    中，这不允许进行强类型检查或参照完整性约束。


    ### 键值模型


    键值模型将复杂对象存储在单个字段中，因此结构不对数据库暴露。这样，提取对象的单个属性就变得非常复杂，实际上严重限制了数据库引擎执行超出通过主键返回单个对象之外的任务。在最极端的情况下，一种设计可能将除主键之外的所有字段打包到一个
    JSON 对象中。


    自从 PostgreSQL 在 9.2 版本中引入 JSON 支持以来，这种方法在数据库和应用程序开发人员中变得非常流行。JSONB 在 9.4 版本中被引入，并且在之后的每个版本中都有更多的增强功能。有了这种支持，定义为
    JSON 的表列变得很常见。例如，来自 `postgres_air` 模式的 `passenger` 表可以按清单 9-5 所示的方式定义。


    ```sql

    CREATE TABLE passenger_json (

    passenger_id INT,

    passenger_info JSON);

    ```

    清单 9-5

    包含 JSON 的表


    清单 9-6 展示了 `passenger_info` JSON 的一个例子。


    ```json

    {"booking_ref" : "8HNB12",

    "passenger_no": "1",

    "first_name" : "MARIAM",

    "last_name" : "WARREN",

    "update_ts" : "2023-04-17T19:45:55.022782-05:00",

    }

    ```

    清单 9-6

    JSON 值示例


    是的，建议的设计看起来是通用的，无论未来添加多少新数据元素，都不需要任何 DDL 更改。然而，同样的问题影响着这种设计，就像影响 EAV 模型一样。这种方法使得对标量值执行类型检查变得不可能，也无法定义参照完整性约束。此外，经常被忽视的是存储
    JSON 所需的数据量大幅增加。确实，键名在每个记录中都是重复的。根据存储的值的类型和大小，数据量可能会增加好几倍。


    本章稍后将讨论用于处理 JSON 字段的工具和方法。


    ### 层次模型


    层次结构易于理解和使用。事实上，由于其易用性和相对较小的内存需求，层次结构在 20 世纪 60 年代首次在数据库中实现。当然，在那个时候，XML 和 JSON
    都还不可用。只要所有内容都适合单一层次结构，这些结构就工作得很好。然而，一旦数据适合多个层次结构，使用层次结构就变得既复杂又低效。


    让我们用 `postgres_air` 模式中的例子来说明，如图 9-1 所示。对于一个机场，离港航班列表是一个层次结构，而到港航班列表是另一个层次结构。登机牌可能与离港航班属于同一个层次结构。同时，它们也可能是完全不同的、从预订开始的层次结构的一部分。请注意，乘客和预订航段不适合在不重复的情况下放入同一个层次结构。


    ![](img/501585_2_En_9_Fig1_HTML.jpg)


    一个展示 3 个层次结构的框图。左侧：解释乘客预订航班，航班从机场离港。中间：解释航班到达机场。右侧：表示从预订开始的航班和乘客的层次结构。


    图 9-1

    postgres_air 模式中的层次结构示例


    早期的层次数据库（如 IMS/360）向客户端应用程序提供了数据的多个层次视图，但在内部支持更复杂的数据结构。


    ### 融合各家所长


    PostgreSQL 不仅仅是一个关系系统。它是对象关系型的，这意味着列数据类型不一定是标量。实际上，列可以存储结构化类型，包括数组、复合类型或表示为 JSON
    或 XML 文档的对象。


    负责任地使用这些功能，可以结合多种替代方法与更传统的关系功能，提供所有潜在的好处。


    “负责任地”是这里的关键词。例如，PostgreSQL 允许前面部分提到的多层次结构方法。我们可以在数据库内部的关系结构之上为客户端应用程序构建层次结构表示。这种方法结合了两个世界的优点：数据可以通过关系查询的能力高效提取，而应用程序可以以友好的数据交换格式使用复杂对象。更多关于这种方法的细节在第
    14 章中提供。


    尽管本书不涵盖分布式系统，但值得一提的是，PostgreSQL 拥有一套庞大的扩展（不包含在基本发行版中的附加库），这些扩展支持分布式查询，包括查询除 PostgreSQL
    之外的其他 DBMS。这些扩展被称为 `foreign data wrappers (FDWs)`，它们提供了几乎透明的方式来访问驻留在超过 60 种类型的
    DBMS（包括关系型和非关系型）中的数据。

    '
- fmt: '## Flexibility vs. Efficiency and Correctness


    A frequent argument for a flexible design is that “the data structure/schema definition
    may change.” Then, the argument goes adding a column is a DDL (data definition)
    change and adding a row (in the key-value model) is just adding a row.


    True, real-life systems evolve, and to adequately reflect these changes, existing
    data structures must be modified. This may entail adding or removing some attributes
    or changing data types or changing the cardinality of relationships. However,
    the inevitability of making changes does not necessitate the use of alternative
    models, such as document stores or key-value systems. The cost of making changes
    to the database schema must always be weighed against the potential performance
    and data integrity pitfalls of these flexible solutions.


    The previous section mentioned the difficulty of creating any integrity constraints
    in a non-relational design. For some reason, there is a widespread belief that
    NoSQL databases are “faster” than relational databases. This statement may be
    true in a very limited number of scenarios, but in most cases, the situation is
    the opposite. There may be performance gains from horizontal distribution, but
    they are counterbalanced by the cost of needing to take additional steps to verify
    data integrity. Additional potential performance problems emerge because of the
    difficulties of creating indexes in EAV and key-value models.


    For example, in the case of the `custom_field` table, `passport_exp_date` should
    be a date, and it is often compared with other dates, for example, with the date
    of the flight to make sure that the passport doesn’t expire prior to the date
    of departure. However, this date is stored in a text field, which means that it
    must be converted to a date to perform a type-specific compare. Moreover, this
    conversion can only be applied to rows that contain date-type values.


    PostgreSQL has partial indexes, so it’s possible to create an index on only those
    rows that contain a passport expiration date. However, they cannot be indexed
    as a date that could be efficiently used as search criteria, because indexes cannot
    be built with mutable functions like so:


    ```

    CREATE INDEX custom_field_exp_date_to_date

    ON custom_field(to_date(custom_field_value, ''MM-DD-YYYY''))

    WHERE custom_field_name=''passport_exp_date''

    ```


    This is because all date/time conversion functions are `mutable`, because they
    depend on the current session settings. In order to be able to use a conversion
    function in an index, one would need to write a custom conversion function. Chapter
    11 covers creating user-defined functions. This function will have to include
    exception handling, which means that a value erroneously added in the wrong format
    won’t be indexed. In addition, the search itself will be significantly slower
    than having a `date` field in the first place.


    What about the case of packaging all the attributes in a JSON column? Similar
    problems with indexing occur. It is possible to create an index on JSON; for example,
    for the table `passenger_json` in Listing 9-5, it is possible to create an index
    on `booking_ref` as shown in Listing 9-7.


    ```

    CREATE INDEX passenger_j_booking_ref

    ON passenger_json ((passenger_info ->> ''booking_ref''));

    Listing 9-7

    Indexing a JSON column

    ```


    It will work slower than an index on the original `passenger` table, but it will
    work better than a sequential scan. However, for any value that is intended to
    be numeric or contain a date, the same conversion as the previous example will
    follow.


    This is not to say there is no justification for any of these non-relational solutions.


    For example, a table describing some regulations in the EU had about 500 columns
    and a single row added every time the regulations changed, approximately one row
    every five years. Replacement of this table with a variation of key-value (augmented
    with a couple of additional columns characterizing the value) made both database
    and application developers happy. There was no issue of efficiency because of
    the size of the data.


    When considering JSON columns, our recommendation is to use them only in cases
    when the data only needs to be used as one whole object, such as when storing
    external documents (e.g., an externally sourced credit report). Even in these
    cases, if some attributes that will be used in search criteria can be isolated,
    it is advisable to parse them into additional, stand-alone columns as well as
    storing them as components of a larger object.'
