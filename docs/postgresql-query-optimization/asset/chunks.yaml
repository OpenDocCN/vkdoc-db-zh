- fmt: "# 3. 关系理论与查询优化\n\n## 关系操作与等价规则\n\n既然我们已经介绍了主要的关系操作，你可能会觉得少了点什么：连接操作在哪里？我们知道连接操作至关重要。答案其实显而易见：一个连接操作可以表示为一个笛卡尔积后接一个过滤操作。从关系理论的角度来看，连接操作是冗余的。这是声明式语言工作方式的完美示例；形式化定义是寻找连接结果的一种方式（但不是唯一方式）。如果我们计算两个关系的笛卡尔积，然后应用一个过滤器，我们将得到期望的结果。但希望没有数据库引擎会在较大的数据集上采用这种方法；这可能真的需要花费数年时间！在第\
    \ [3](#501585_2_En_3_Chapter.xhtml) 章中，我们将讨论如何比基于形式化定义的直接计算更高效地实现连接。\n\n关系操作还包括分组、并集、交集和差集。\n\
    \n我们进行优化所需要的最后一个关系理论部分是*等价规则*。所有关系操作都满足若干等价规则，包括：\n\n*   **交换律** – `JOIN(R,S)\
    \ = JOIN(S,R)`\n    交换律意味着两个关系的顺序并不重要。如果我们有两个关系 R 和 S，那么 `R JOIN S` 将产生与 `S JOIN\
    \ R` 相同的结果。\n\n*   **结合律** – `JOIN(R, JOIN(S,T)) = JOIN(JOIN(R,S), T)`\n    结合律意味着，如果我们有三个关系\
    \ R、S 和 T，我们可以选择先执行 `R JOIN S`，然后将结果与 `T` 连接；或者我们可以先执行 `S JOIN T`，然后将第一次连接的结果与\
    \ `R` 连接，两种情况下的结果将是等价的。\n\n*   **分配律** – `JOIN(R, UNION(S,T)) = UNION(JOIN(R,S),\
    \ JOIN(R,T))`\n    分配律意味着，如果我们将一个关系与另外两个关系的并集进行连接，其结果将等同于分别执行两次连接（`R JOIN S` 和\
    \ `R JOIN T`），然后对结果取并集。\n\n前面列出的等价规则只是数十条规则中的几个例子。为什么了解这些规则很重要？为了效率，可能需要以与列出顺序不同的顺序执行操作。后续章节中将有很多此类转换的示例。等价性确保一个查询可以用几种不同的表达式表示，这为优化器提供了动力。\n\
    \n## 逻辑操作\n\n表示 SQL 查询所需的逻辑操作集合包括所有关系操作，但其语义不同。如前所述，SQL 的 `project` 操作不会删除重复项。因此包含了一个额外的删除重复项的操作。\n\
    \n还需要其他额外操作来表示在关系理论中无法表达的 SQL 结构，例如，左连接、右连接和全外连接产生的结果不是一个关系（但仍然是一个 SQL 表）。\n\n\
    许多等价规则对逻辑操作也有效。对于任何相对复杂的查询，优化器可以从海量的表达式中选择最佳的一个。更多关于关系理论的信息可以在章末注释的参考资料中找到。\n\n\
    ## 查询作为表达式：集合式思维\n\n编写声明式查询对人类来说并非易事。人们更熟悉的是动作，而不是规则或条件。采用集合式思维^([²](#fn2)) 会更容易：我们可以思考对表的操作，而不是对单个对象（或行）的操作。\n\
    \n前面提到的所有逻辑操作都可以用 SQL 轻松表达。这些操作接受表作为参数，无论是存储在数据库中的表，还是先前操作结果输出的表。\n\n一个作为 SQL\
    \ 查询编写的 PostgreSQL 表达式将由优化器处理，并很可能被另一个使用前面讨论的等价规则的等价表达式所替换。\n\n由于任何关系操作的结果都是一个关系，它可以直接传递给下一个关系操作，而无需中间存储。一些数据库开发人员选择创建临时表来存储中间结果，但这种做法会产生不必要的计算开销并阻碍优化器。\n\
    \n用更理论化的语言来说，上一段指出优化器产生高效执行计划的能力取决于两个因素：\n\n*   丰富的等价规则集提供了大量等价表达式的空间。\n*   关系操作不产生副作用，例如临时表——也就是说，产生的唯一东西就是操作的结果。\n\
    \n## 操作与算法\n\n为了使查询可执行，逻辑操作必须被替换为物理操作（也称为算法）。在 PostgreSQL 中，这种替换由查询规划器执行，查询的整体执行时间取决于选择了哪些算法以及选择得是否正确。\n\
    \n当我们从逻辑层转向物理层时，数学关系被转换为存储在数据库中的表，我们需要确定从表中检索数据的方法。任何存储的数据都必须使用下一章讨论的*数据访问算法*之一来提取。通常，数据访问算法与消耗其结果的操作相结合。\n\
    \n更复杂的逻辑操作，如连接、并集和分组，可以用几种替代算法来实现。有时，一个复杂的逻辑操作会被替换为多个物理操作。\n\n这些算法在第 [3](#501585_2_En_3_Chapter.xhtml)\
    \ 章中有详细讨论。\n\n## 总结\n\n数据库引擎通过将 SQL 查询解析为逻辑计划、转换结果、选择算法来实现逻辑计划，最后执行所选算法，来解释 SQL\
    \ 查询。数据库引擎使用的逻辑操作基于从关系理论衍生的操作，理解这些对于像数据库一样思考至关重要。\n\n脚注 [1](#501585_2_En_2_Chapter.xhtml#Fn1_source)\
    \   [2](#501585_2_En_2_Chapter.xhtml#Fn2_source)\n\n# 3. 更多理论：算法\n\n读到这里，那些没有跳过章节、勤奋阅读本书的读者可能已经有些不耐烦了。我们已经进入第\
    \ [3](#501585_2_En_3_Chapter.xhtml) 章，却还在谈论理论！我们什么时候才能开始写代码呢？\n\n很快！本章涵盖了查询处理的最后一部分，到最后，我们将拥有理解执行计划所需的所有组件。\n\
    \n第 [2](#501585_2_En_2_Chapter.xhtml) 章涵盖了关系操作，并指出我们需要物理操作或算法来执行查询。将这些算法映射到逻辑操作并不简单；有时，一个复杂的逻辑操作会被替换为多个物理操作，或者几个逻辑操作被合并为一个单一的物理操作。\n\
    \n本章描述了这些算法，从数据检索算法开始，然后介绍用于更复杂操作的算法。\n\n理解这些算法将使我们能够回到执行计划，并更好地掌握其组成部分。因此，我们距离目标仅一步之遥：学习如何调优查询。"
  raw: 'Now that we have covered these primary relational operations, you may feel
    cheated: Where is the join operation? We know that join operations are essential.
    The answer is hidden in plain sight: a join operation can be expressed as a product
    followed by filtering. From a relational theory point of view, a join operation
    is redundant. This is a perfect example of how a declarative language works; the
    formal definition is one way (but not the only way) to find the result of a join.
    If we compute a Cartesian product of two relations and then apply a filter, we
    will obtain the desired result. But hopefully, no database engine would use this
    approach on a larger dataset; it could literally take years! In Chapter [3](#501585_2_En_3_Chapter.xhtml),
    we will discuss how joins can be implemented more efficiently than straightforward
    computation based on the formal definition.


    Relational operations also include grouping, union, intersection, and set difference.


    The last piece of relational theory that we need for optimization is *equivalence
    rules*. All relational operations satisfy several equivalence rules, including


    *   *Commutativity* – `JOIN(R,S) = JOIN (S,R)`


    Commutativity means that the order of two relations is not important. If we have
    two relations, R and S, then R JOIN S will produce the same result as S JOIN R.


    *   *Associativity* – `JOIN(R, JOIN(S,T) = JOIN(JOIN(R,S), T)`


    Associativity means that if we have three relations, R, S, and T, we can choose
    to first perform R JOIN S and then JOIN T to the result, or we can first perform
    S JOIN T and then JOIN R to the result of the first JOIN, and the results will
    be equivalent in both cases.


    *   *Distributivity* – `JOIN(R, UNION(S,T)) = UNION(JOIN(R,S), JOIN(R, T))`


    Distributivity means that if we are joining a relation with a UNION of two other
    relations, the result will be the same as when we perform two joins, R JOIN S
    and R JOIN T separately, and then UNION the results.


    The equivalence rules listed in the preceding text are just examples among dozens.
    Why is it important to know about these rules? For efficiency, it might be better
    to execute operations in a different order than they are listed in. There will
    be multiple examples of such transformations in subsequent chapters. Equivalences
    ensure that a query may be represented with several different expressions, providing
    the impetus for an optimizer.


    ### Logical Operations


    The set of logical operations needed for representation of SQL queries includes
    all relational operations, but the semantics is different. As noted earlier, the
    SQL project operation does not remove duplicates. An additional operation for
    removal of duplicates is included.


    Other additional operations are needed to represent SQL constructs that cannot
    be expressed in relational theory, for example, left, right, and full outer joins
    produce a result that is not a relation (but still is a SQL table).


    Many equivalence rules are also valid for logical operations. For any relatively
    complex query, an optimizer can choose the best from a huge number of expressions.
    More information about relational theory can be found in the resources found in
    the end notes.


    ### Queries as Expressions: Thinking in Sets


    Writing declarative queries is not an easy task for humans. People are more familiar
    with actions than with rules or conditions. Thinking in sets^([²](#fn2)) makes
    it easier: we can think about actions on tables and operations on tables, rather
    than on individual objects (or rows).


    All logical operations mentioned earlier can be easily expressed in SQL. These
    operations accept tables as arguments, both tables stored in the database and
    tables that are the result output of previous operations.


    A PostgreSQL expression written as a SQL query will be processed by the optimizer
    and will mostly likely be replaced with another, equivalent expression, using
    the equivalence rules discussed earlier.


    Since the result of any relational operation is a relation, it can be passed directly
    to the next relational operation, without the need for intermediate storage. Some
    database developers choose to create temporary tables to store intermediate results,
    but such practices can produce unneeded computational overhead and block the optimizer.


    In more theoretical words, the previous paragraph states that the ability of an
    optimizer to produce an efficient execution plan depends on two factors:


    *   A rich set of equivalences provides for a large space of equivalent expressions.


    *   Relational operations produce no side effects, such as temporary tables—that
    is, the only thing produced is the result of the operation.


    ### Operations and Algorithms


    In order to make a query executable, logical operations must be replaced with
    physical operations (also called algorithms). In PostgreSQL, this replacement
    is performed by the query planner, and the overall execution time of a query depends
    on which algorithms are chosen and whether they are chosen correctly.


    When we move from the logical to the physical level, mathematical relations are
    transformed into tables that are stored in the database, and we need to identify
    ways to retrieve data from the tables. Any stored data must be extracted with
    one of the *data access algorithms* discussed in the next chapter. Usually, data
    access algorithms are combined with operations consuming their results.


    More complex logical operations, such as join, union, and grouping, can be implemented
    with several alternative algorithms. Sometimes a complex logical operation is
    replaced with multiple physical operations.


    These algorithms are discussed in detail in Chapter [3](#501585_2_En_3_Chapter.xhtml).


    ## Summary


    The database engine interprets SQL queries by parsing them into a logical plan,
    transforming the results, choosing algorithms to implement the logical plan, and
    finally executing the chosen algorithms. The logical operations used by the database
    engine are based on operations derived from relational theory, and understanding
    these is crucial to thinking like a database.


    Footnotes [1](#501585_2_En_2_Chapter.xhtml#Fn1_source)   [2](#501585_2_En_2_Chapter.xhtml#Fn2_source)


    # 3. Even More Theory: Algorithms


    By now, those of you who are diligently reading this book without skipping chapters
    might be impatient. We are already in Chapter [3](#501585_2_En_3_Chapter.xhtml),
    and we are still talking about theory! When are we going to get to write code?


    Very soon! This chapter covers the last part of query processing, and by the end,
    we will have all the pieces we need to understand execution plans.


    Chapter [2](#501585_2_En_2_Chapter.xhtml) covered relational operations and stated
    that we need physical operations, or algorithms, to execute queries. Mapping these
    algorithms to logical operations is not straightforward; sometimes, a complex
    logical operation is replaced with multiple physical operations, or several logical
    operations are merged into a single physical operation.


    This chapter describes those algorithms, starting from algorithms for data retrieval
    and then proceeding to algorithms for more complex operations.


    Understanding these algorithms will allow us to go back to execution plans and
    get a better grasp of their components. Thus, we will be only one step away from
    our goal: learning how to tune queries.'
  trans: "\n# 3. 关系理论与查询优化\n\n## 关系操作与等价规则\n\n既然我们已经介绍了主要的关系操作，你可能会觉得少了点什么：连接操作在哪里？我们知道连接操作至关重要。答案其实显而易见：一个连接操作可以表示为一个笛卡尔积后接一个过滤操作。从关系理论的角度来看，连接操作是冗余的。这是*声明式语言*工作方式的完美示例；形式化定义是寻找连接结果的一种方式（但不是唯一方式）。如果我们计算两个关系的笛卡尔积，然后应用一个过滤器，我们将得到期望的结果。但希望没有数据库引擎会在较大的数据集上采用这种方法；这可能真的需要花费数年时间！在第\
    \ 3 章中，我们将讨论如何比基于形式化定义的直接计算更高效地实现连接。\n\n关系操作还包括分组、并集、交集和差集。\n\n我们进行优化所需要的最后一个关系理论部分是*等价规则*。所有关系操作都满足若干等价规则，包括：\n\
    \n*   **交换律** – `JOIN(R,S) = JOIN(S,R)`\n    交换律意味着两个关系的顺序并不重要。如果我们有两个关系 R 和 S，那么\
    \ `R JOIN S` 将产生与 `S JOIN R` 相同的结果。\n\n*   **结合律** – `JOIN(R, JOIN(S,T)) = JOIN(JOIN(R,S),\
    \ T)`\n    结合律意味着，如果我们有三个关系 R、S 和 T，我们可以选择先执行 `R JOIN S`，然后将结果与 `T` 连接；或者我们可以先执行\
    \ `S JOIN T`，然后将第一次连接的结果与 `R` 连接，两种情况下的结果将是等价的。\n\n*   **分配律** – `JOIN(R, UNION(S,T))\
    \ = UNION(JOIN(R,S), JOIN(R,T))`\n    分配律意味着，如果我们将一个关系与另外两个关系的并集进行连接，其结果将等同于分别执行两次连接（`R\
    \ JOIN S` 和 `R JOIN T`），然后对结果取并集。\n\n前面列出的等价规则只是数十条规则中的几个例子。为什么了解这些规则很重要？为了效率，可能需要以与列出顺序不同的顺序执行操作。后续章节中将有很多此类转换的示例。等价性确保一个查询可以用几种不同的表达式表示，这为优化器提供了动力。\n\
    \n## 逻辑操作\n\n表示 SQL 查询所需的逻辑操作集合包括所有关系操作，但其语义不同。如前所述，SQL 的 `project` 操作不会删除重复项。因此包含了一个额外的删除重复项的操作。\n\
    \n还需要其他额外操作来表示在关系理论中无法表达的 SQL 结构，例如，左连接、右连接和全外连接产生的结果不是一个关系（但仍然是一个 SQL 表）。\n\n\
    许多等价规则对逻辑操作也有效。对于任何相对复杂的查询，优化器可以从海量的表达式中选择最佳的一个。更多关于关系理论的信息可以在章末注释的参考资料中找到。\n\n\
    ## 查询作为表达式：集合式思维\n\n编写声明式查询对人类来说并非易事。人们更熟悉的是动作，而不是规则或条件。采用集合式思维^(²) 会更容易：我们可以思考对表的操作，而不是对单个对象（或行）的操作。\n\
    \n前面提到的所有逻辑操作都可以用 SQL 轻松表达。这些操作接受表作为参数，无论是存储在数据库中的表，还是先前操作结果输出的表。\n\n一个作为 SQL\
    \ 查询编写的 PostgreSQL 表达式将由优化器处理，并很可能被另一个使用前面讨论的等价规则的等价表达式所替换。\n\n由于任何关系操作的结果都是一个关系，它可以直接传递给下一个关系操作，而无需中间存储。一些数据库开发人员选择创建临时表来存储中间结果，但这种做法会产生不必要的计算开销并阻碍优化器。\n\
    \n用更理论化的语言来说，上一段指出优化器产生高效执行计划的能力取决于两个因素：\n\n*   丰富的等价规则集提供了大量等价表达式的空间。\n*   关系操作不产生副作用，例如临时表——也就是说，产生的唯一东西就是操作的结果。\n\
    \n## 操作与算法\n\n为了使查询可执行，逻辑操作必须被替换为物理操作（也称为算法）。在 PostgreSQL 中，这种替换由查询规划器执行，查询的整体执行时间取决于选择了哪些算法以及选择得是否正确。\n\
    \n当我们从逻辑层转向物理层时，数学关系被转换为存储在数据库中的表，我们需要确定从表中检索数据的方法。任何存储的数据都必须使用下一章讨论的*数据访问算法*之一来提取。通常，数据访问算法与消耗其结果的操作相结合。\n\
    \n更复杂的逻辑操作，如连接、并集和分组，可以用几种替代算法来实现。有时，一个复杂的逻辑操作会被替换为多个物理操作。\n\n这些算法在第 3 章中有详细讨论。\n\
    \n## 总结\n\n数据库引擎通过将 SQL 查询解析为逻辑计划、转换结果、选择算法来实现逻辑计划，最后执行所选算法，来解释 SQL 查询。数据库引擎使用的逻辑操作基于从关系理论衍生的操作，理解这些对于像数据库一样思考至关重要。\n\
    \n脚注 1   2\n\n# 3. 更多理论：算法\n\n读到这里，那些没有跳过章节、勤奋阅读本书的读者可能已经有些不耐烦了。我们已经进入第 3 章，却还在谈论理论！我们什么时候才能开始写代码呢？\n\
    \n很快！本章涵盖了查询处理的最后一部分，到最后，我们将拥有理解执行计划所需的所有组件。\n\n第 2 章涵盖了关系操作，并指出我们需要物理操作或算法来执行查询。将这些算法映射到逻辑操作并不简单；有时，一个复杂的逻辑操作会被替换为多个物理操作，或者几个逻辑操作被合并为一个单一的物理操作。\n\
    \n本章描述了这些算法，从数据检索算法开始，然后介绍用于更复杂操作的算法。\n\n理解这些算法将使我们能够回到执行计划，并更好地掌握其组成部分。因此，我们距离目标仅一步之遥：学习如何调优查询。\n"
- fmt: '## Algorithm Cost Models


    Chapter [1](#501585_2_En_1_Chapter.xhtml) mentioned several ways of measuring
    the performance of a system, including response time, cost, and user satisfaction.
    These metrics are external to the database, and although external metrics are
    the most valuable, they aren’t available to the query optimizer.

    Instead, the optimizer uses internal metrics based on the amount of computing
    resources needed to execute a query or a single physical operation within a plan.
    The most important resources are those that affect execution time, namely, CPU
    cycles and I/O accesses (read/write disk blocks). Other resources, such as memory
    or disk space, have an indirect impact on execution time; for example, the amount
    of available memory will influence the ratio of CPU cycles and I/O accesses. The
    distribution of memory is almost always controlled by configuration parameters
    and will be covered in Chapter [10](#501585_2_En_10_Chapter.xhtml).

    These two primary metrics, CPU cycles and number of I/O operations, are not directly
    comparable. However, in order to compare query execution plans, the optimizer
    has to combine them into a single cost function: the lower the cost, the better
    the plan. For several decades, the number of I/O operations was the dominating
    component of the cost because rotating hard drives are orders of magnitude slower
    than CPUs. This is not necessarily the case for modern hardware, so the optimizer
    must be tuned to use the correct ratio. This is also controlled via server parameters.

    A cost model of a physical operation estimates the resources needed to execute
    the operation. In this book we outline simplified cost models that are easy to
    understand but are still useful in understanding how more sophisticated cost models
    work. Specifically, we’ll estimate the amount of resources needed for an algorithm
    as the number of low-level operations to be performed for each row or each block
    of tables used as an input or produced as an output of an algorithm. For example,
    we count the number of block accesses but do not distinguish if the access actually
    requires an I/O operation. In our simplified models, an access to a block is an
    access, whether it requires I/O or the block is already on the buffer pool of
    the operating system.

    Generally, the cost depends on the tables given as arguments to the operation.
    To represent cost models, we’ll use simple formulas with the following notation:
    for any table or relation R, `TR` and `BR` denote the number of rows in the table
    and the number of storage blocks occupied by the table, respectively. Additional
    notation will be introduced as needed.

    The following section discusses physical operations, outlining algorithms and
    cost models for each. As the relative speed of CPU and external storage may vary
    in a wide range, CPU costs and I/O costs are considered separately. Two logical
    operations discussed in the previous chapter, project and filter, are not included.
    These are typically combined with the operation that precedes them, because they
    can be applied independently to a single row, without depending on other rows
    in the argument table.

    Of course, the project and filter are not free in terms of cost that is proportional
    to the number of processed rows. However, in most cases these costs are negligible,
    so we do not include these costs into cost models of other algorithms.


    ## Data Access Algorithms


    To begin executing a query, the database engine must extract stored data. This
    section concerns algorithms used to read data from database objects. In practice,
    these operations are often combined with their following operation in the query
    execution plan. This is advantageous in cases where it is possible to save execution
    time by avoiding reading that will be subsequently filtered out.

    The efficiency of such operations depends on the ratio of rows that are retained
    to the total rows in the stored table. This ratio is called *selectivity*. The
    choice of algorithm for a given read operation depends on the selectivity of filters
    that can be simultaneously applied.


    ### Storage Structures


    It should come as no surprise that data is stored in files that reside on hard
    drives. Any file used for database objects is divided in blocks of the same length;
    by default, PostgreSQL uses blocks containing 8192 bytes each. A block is the
    unit that is transferred between the hard drive and the main memory, and the number
    of I/O operations needed to execute any data access is equal to the number of
    blocks that are being read or written.

    Database objects consist of logical items (table rows, index records, etc.). PostgreSQL
    allocates space for these items in blocks. Several small items can reside in the
    same block; items that don’t fit within a single block use a separate storage
    mechanism. The generic structure of a block is shown in Figure [3-1](#501585_2_En_3_Chapter.xhtml#Fig1).


    ![](Images/501585_2_En_3_Fig1_HTML.jpg)

    A diagram of a stack includes the block header, pointers to logical items, free
    space, logical items, and block trailer from top to bottom. The logical items
    include table rows and index records. The arrows from the pointers lead to the
    logical items.

    Figure 3-1

    The generic block structure in PostgreSQL

    The allocation of items to blocks also depends on the type of the database object.
    Table rows are stored using a data structure called a heap: a row can be inserted
    in any block that has sufficient free space, without any specific ordering. Other
    objects (e.g., indexes) may use blocks differently.


    ### Full Scan


    In a full scan, at times referred to as a sequential scan, the database engine
    consecutively reads all of the rows in a table and checks the filtering condition
    for each row. To estimate the cost of this algorithm, we need a more detailed
    description, as shown in the pseudocode in Listing [3-1](#501585_2_En_3_Chapter.xhtml#PC1).


    ```

    FOR each block IN a_table LOOP

    read block;

    FOR each row IN block LOOP

    IF filter_condition (row)

    THEN output (row)

    END IF;

    END LOOP;

    END LOOP;

    Listing 3-1

    Pseudocode for a full-scan data access algorithm

    ```

    The number of I/O accesses is `BR`; the total number of iterations of the inner
    loop is `TR`. We also need to estimate the cost of operations producing the output.
    This cost depends on selectivity, denoted as `S`, and is equal to `S * TR`. Putting
    all these parts together, we can estimate the cost of a full scan as


    ```

    c1 * BR + c2 * TR + c3 * S* TR

    ```

    where constants `c1`, `c2`, and `c3` represent properties of hardware.

    A full scan can be used with any table; additional data structures are not needed.
    Other algorithms depend on the existence of indexes on the table, described in
    the following.'
