  trans: '## 如何计算执行成本？


    在第 3 章中，我们讨论了衡量数据库算法性能的方法。我们介绍了内部度量标准，并确立了算法的成本是通过 I/O 操作次数和 CPU 周期数来衡量的。现在，我们将把这个理论应用到实践中。


    每个执行计划的成本取决于：

    * 计划中所用算法的成本公式

    * 关于表和索引的统计数据，包括值分布

    * 系统设置（参数和偏好），例如 `join_collapse_limit` 或 `cpu_index_tuple_cost`


    第 3 章涵盖了计算每种算法成本的公式。这些公式中的每一个都依赖于所用表的大小，以及结果集的预期大小。最后，用户可以通过系统设置来更改操作的默认成本。可以通过改变成本估算期间使用的优化器参数来隐式控制最优计划的选择。因此，所有这三部分信息都参与了执行计划成本的计算。


    这有违直觉；通常，SQL 开发者潜意识里期望存在一个“最佳计划”，而且对于所有“相似”的查询，这个计划是相同的。然而，由于前面列表中列出的因素，优化器可能会为几乎相同的
    SQL 查询，甚至为同一个查询，产生不同的执行计划。这怎么可能发生呢？优化器选择的是具有最佳成本估算的计划。然而，可能存在几个成本只有细微差别的计划。成本估算是依赖于从随机样本中收集的数据库统计数据。昨天收集的统计数据可能与今天收集的略有不同。由于这些微小的变化，昨天是最佳计划的，今天可能就变成次优了。当然，统计数据也可能因为插入、更新和删除操作而改变。


    让我们看一些例子。清单 4-3 和 4-4 展示了两个看起来几乎相同的查询。唯一的区别在于过滤值。然而，图 4-7 和 4-8 中展示的执行计划却显著不同。


    ```sql

    SELECT flight_id,

    scheduled_departure

    FROM flight f

    JOIN airport a ON departure_airport=airport_code

    AND iso_country=''US''

    ```

    清单 4-3：带有一个条件的简单 SELECT


    ![](img/501585_2_En_4_Fig7_HTML.jpg)

    一个包含 6 行的查询计划，包括哈希连接、哈希条件、对 flight 表的顺序扫描、哈希、对 airport 表的顺序扫描以及过滤函数。

    图 4-7：清单 4-3 的执行计划


    ```sql

    SELECT flight_id,

    scheduled_departure

    FROM flight f

    JOIN airport a ON departure_airport=airport_code

    AND iso_country=''CZ''

    ```

    清单 4-4：与清单 4-3 相同的 SELECT，但搜索值不同


    ![](img/501585_2_En_4_Fig8_HTML.jpg)

    一个包含 7 行的查询计划，包括嵌套循环、对 airport 表的顺序扫描、过滤、对 flight 表的位图堆扫描、重新检查条件、对 flight_departure_airport
    的位图索引扫描以及索引条件。

    图 4-8：清单 4-4 的执行计划


    是什么导致了这种差异？图 4-9 提供了一个线索：第一个查询选择了相当大一部分的机场，而使用索引不会提高性能。相反，第二个查询只选择一个机场，在这种情况下，基于索引的访问会更高效。


    ![](img/501585_2_En_4_Fig9_HTML.jpg)

    一张标题为"Count"的条形图，显示 32 个国家的数据，从左到右呈上升趋势。最低值为 1，对应 CZ 和 ET。最高值为 141，对应美国。数值为近似值。

    图 4-9：值分布直方图


    这个例子也解释了为什么保持数据库统计数据最新如此重要。如果查询规划器没有意识到这种不均匀分布，它可能会选择一个远非最优的执行计划。`ANALYZE`命令会重新计算作为参数传递的表的统计数据，并更新该表索引的统计信息。PostgreSQL
    有一个特殊的机制来自动更新统计信息，我们将在第 8 章更详细地讨论它。但是，如果你正在按照本书的示例在本地副本上重放它们，你应该在构建新索引后手动运行`ANALYZE`。


    ## 优化器如何被误导？


    但我们如何能确定优化器选择的计划确实是可能的最佳计划呢？找到最佳执行计划甚至可能吗？我们花了相当多的时间来解释，如果我们不干涉、不干预，优化器会尽其所能地完成最佳工作。如果这是真的，那本书的其余部分是关于什么的呢？现实是，没有优化器是完美的，即使是
    PostgreSQL 查询规划器也不例外。


    首先，虽然优化算法在数学上是正确的——它找到了具有最佳成本估算的计划——但这些成本估算本身是不精确的。第 3 章中解释的简单公式仅适用于数据均匀分布的情况，但在真实数据库中均匀分布很少出现。实际上，优化器使用更复杂的公式，但这些也只是对现实的不完美近似。正如乔治·博克斯所说：“所有模型都是错的，但有些是有用的。”


    其次，包括 PostgreSQL 在内的数据库系统会维护存储数据的详细统计信息（通常以直方图形式）。直方图显著提高了选择率的估算。不幸的是，直方图不能用于中间结果。估算中间结果的误差是优化器可能无法产生最优计划的主要原因。


    第三，最优计划可能因启发式方法而被排除，或者查询可能太复杂，无法使用精确的优化算法。在后一种情况下，会使用近似的优化算法。


    在所有这些情况下，都需要一些人工干预，而这正是本书的主题！既然我们知道优化过程中发生了什么，如果有什么不太对劲，我们就可以修复它。


    尽管存在这些潜在的瑕疵，优化器在大多数情况下运行良好。然而，人类观察系统的行为，因此拥有比优化器更多的可用信息，并且可以利用这些额外的知识来帮助优化器更好地完成工作。


    本章涵盖了执行计划：它们是如何生成的，以及如何阅读和理解它们。我们还了解了基于成本的优化以及影响执行计划成本的因素。


    尽管基于成本的优化器通常表现良好，但有时它们需要帮助，而我们现在已装备齐全来提供这种帮助。后续章节将介绍多个需要一些人工干预以实现更好性能的查询示例。'
- fmt: '# 5. Short Queries and Indexes


    Chapter [4](#501585_2_En_4_Chapter.xhtml) took a deep dive into understanding
    execution plans. Now, we turn to what to do once the `EXPLAIN` command has been
    run and an execution plan is returned. Where do we start if our goal is to improve
    the query execution plan?


    The first step is to identify whether the query is a short query or a long query.
    This chapter focuses on optimizing short queries. You will learn how to identify
    short queries, what optimization technique to use with short queries, and why
    indexes are critically important for this query type. We also discuss different
    types of indexes available in PostgreSQL and when each index type can be used.


    Before proceeding with this chapter, let’s create several additional indexes:


    ```sql

    SET search_path TO postgres_air;

    CREATE INDEX flight_arrival_airport ON flight  (arrival_airport);

    CREATE INDEX booking_leg_flight_id ON booking_leg  (flight_id);

    CREATE INDEX flight_actual_departure ON flight  (actual_departure);

    CREATE INDEX boarding_pass_booking_leg_id ON boarding_pass  (booking_leg_id);

    CREATE INDEX booking_update_ts ON booking  (update_ts);

    ```


    Don’t forget to run `ANALYZE` on all the tables for which you build new indexes:


    ```sql

    ANALYZE  flight ;

    ANALYZE  booking_leg;

    ANALYZE  booking;

    ANALYZE boarding_pass;

    ```


    ## What Makes a Query “Short”?


    The term *short query* has come up multiple times, without a formal definition.
    What is a short query? First, it has nothing to do with the length of the SQL
    query. Take a look at the two queries shown in Listings [5-1](#501585_2_En_5_Chapter.xhtml#PC3)
    and [5-2](#501585_2_En_5_Chapter.xhtml#PC4), for example. The query in Listing
    [5-1](#501585_2_En_5_Chapter.xhtml#PC3) contains only four lines of code, but
    it represents a *long query*. Listing [5-2](#501585_2_En_5_Chapter.xhtml#PC4)
    contains many more lines but is a short query.


    ```sql

    SELECT

    d.airport_code AS departure_airport,

    a.airport_code AS arrival_airport

    FROM  airport a,

    airport d

    Listing 5-1

    Long query example

    ```


    ```sql

    SELECT

    f.flight_no,

    f.scheduled_departure,

    boarding_time,

    p.last_name,

    p.first_name,

    bp.update_ts as pass_issued,

    ff.level

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    JOIN account a on a.account_id =p.account_id

    JOIN boarding_pass bp on bp.passenger_id=p.passenger_id

    LEFT OUTER JOIN frequent_flyer ff on ff.frequent_flyer_id=a.frequent_flyer_id

    WHERE f.departure_airport = ''JFK''

    AND f.arrival_airport = ''ORD''

    AND f.scheduled_departure BETWEEN

    ''2023-08-05'' AND ''2023-08-07''

    Listing 5-2

    Short query example

    ```


    Second, it is not defined by the size of the result set. The query in Listing
    [5-3](#501585_2_En_5_Chapter.xhtml#PC5) yields only one line; however, it is a
    long query.


    ```sql

    SELECT

    avg(flight_length),

    avg (passengers)

    FROM (SELECT

    flight_no,

    scheduled_arrival -scheduled_departure AS flight_length,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    GROUP BY 1,2) a

    Listing 5-3

    Long query that produces one row

    ```


    So what is a short query?


    A query is short when the number of rows needed to compute its output is small,
    no matter how large the involved tables are. Short queries may read every row
    from small tables but read only a small percentage of rows from large tables.


    The most important part of the preceding definition is the difference between
    *needs* and *accesses*. A poor execution plan for a short query may read and/or
    process many more rows than needed for final output. Although a certain amount
    of redundant processing is unavoidable, our goal is to reduce it.


    How small is a “small percentage”? Unsurprisingly, it depends on system parameters,
    application specifics, actual table sizes, and possibly other factors. Most of
    the time, however, it means less than 10%. Later in this chapter, a case study
    will show how to identify this border line.


    By contrast, the output of a long query depends on a significant fraction of rows
    in a large table or several large tables.


    Our taxonomy of queries is similar to the commonly accepted distinction between
    OLTP and OLAP queries. All OLTP queries are short. However, many modern applications
    require queries that return hundreds of rows but still are short.


    Why is Listing [5-1](#501585_2_En_5_Chapter.xhtml#PC3) a long query? Because all
    the rows from the `airport` table are required to obtain the result. Why is Listing
    [5-2](#501585_2_En_5_Chapter.xhtml#PC4) a short query? Because data from just
    a couple of flights is needed, out of about 200,000. Why isn’t Listing [5-3](#501585_2_En_5_Chapter.xhtml#PC5)
    short? Because data from every booking in the system is required to calculate
    the results.


    When we optimize a short query, we know that in the end, we select a relatively
    small number of records. This means that the optimization goal is to reduce the
    size of the result set as early as possible. If the most restrictive selection
    criterion is applied in the first steps of query execution, further sorting, grouping,
    and even joins will be less expensive. Looking at the execution plan, there should
    be no table scans of large tables. For small tables, a full scan may still work,
    as shown in Figure [3-2](#501585_2_En_3_Chapter.xhtml#Fig2) in Chapter [3](#501585_2_En_3_Chapter.xhtml).


    ## Choosing Selection Criteria


    It might seem easy to make sure that the most restrictive selection criteria are
    applied first; however, this isn’t always straightforward. To acknowledge the
    obvious, this chapter is called “Short Queries and Indexes” for a reason: you
    can’t select a subset of records quickly from a table if there is no index supporting
    the corresponding search. That’s why short queries require indexes for faster
    execution. If there is no index to support a highly restrictive query, in all
    likelihood, one needs to be created.'
