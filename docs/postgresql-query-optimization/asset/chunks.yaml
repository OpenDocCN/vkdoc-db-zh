  trans: '

    ## 为何困难：命令式与声明式


    为什么仅仅写出能返回正确结果的 SQL 语句还不够？在编写应用程序代码时，这就是我们的期望。为什么在 SQL 中情况不同？为什么两个产生相同结果的查询，其执行时间可能天差地别？问题的根本原因在于
    SQL 是一种声明式语言。这意味着当我们编写 SQL 语句时，我们描述的是我们想要获得的结果，但我们并没有指定*如何*获得该结果。相比之下，在命令式语言中，我们指定了*做什么*来获取期望的结果——即应执行的步骤序列。


    如第 2 章所讨论的，数据库优化器会选择最佳执行方式。何为最佳，取决于许多不同的因素，例如存储结构、索引和数据统计信息。


    ### 比较相似的查询


    来看一个简单的例子：查找计划于 2023 年 10 月 14 日到达的航班，包括其出发和到达机场。现在，考虑清单 1-1 和 1-2 中的查询。


    ```

    SELECT

    flight_id

    ,departure_airport

    ,arrival_airport

    FROM flight

    WHERE scheduled_arrival ::date=''2023-10-14'' ;

    清单 1-2

    通过转换为日期类型选择航班的查询

    ```


    ```

    SELECT

    flight_id

    ,departure_airport

    ,arrival_airport

    FROM flight

    WHERE scheduled_arrival >=''2023-10-14''

    AND scheduled_arrival <''2023-10-15'';

    清单 1-1

    使用比较运算符选择航班的查询

    ```


    这两个查询看起来几乎一模一样，也应该产生相同的结果。然而，它们的执行时间将会不同，因为数据库引擎所做的工作会不同。在第 5 章，我们将解释为什么会发生这种情况，以及如何从性能角度选择最佳查询。


    ### 命令式思维的自然性


    以命令式的方式思考对人类来说是很自然的。通常，当我们思考完成一项任务时，我们考虑的是需要采取的步骤。同样，当我们思考一个复杂查询时，我们考虑的是为实现期望结果需要应用的条件序列。然而，如果我们强制数据库引擎严格遵循这个序列，结果可能并非最优。


    例如，我们尝试找出有多少常旅客等级为 4 的乘客在独立日从芝加哥出发。如果第一步你想选择所有等级为 4 的常旅客，你可能会写出类似这样的语句：


    ```

    SELECT * FROM frequent_flyer WHERE level =4;

    ```


    现在你已经找到了所有`level = 4`的记录，可以用它们来查找对应的账户。查询将如下所示：


    ```

    SELECT * FROM account WHERE frequent_flyer_id IN (

    SELECT frequent_flyer_id FROM frequent_flyer WHERE level =4

    );

    ```


    很好，你找到了账户。接下来，你想找出这些账户创建的所有预订：


    ```

    WITH level4 AS (SELECT * FROM account WHERE

    frequent_flyer_id IN (

    SELECT frequent_flyer_id FROM frequent_flyer WHERE level =4

    )

    SELECT * FROM booking WHERE account_id IN

    (SELECT account_id FROM level4);

    ```


    但这还没完！记住，最初的目标是找出在 7 月 3 日前往芝加哥的常旅客。继续以命令式构建查询，我们可以得到清单 1-3 中展示的代码。


    ```

    WITH bk AS (

    WITH level4 AS (SELECT *

    FROM account

    WHERE frequent_flyer_id IN (

    SELECT frequent_flyer_id

    FROM frequent_flyer

    WHERE level =4

    )

    )

    SELECT * FROM booking WHERE account_id IN

    (SELECT account_id FROM level4

    )

    )

    SELECT * FROM bk WHERE bk.booking_id IN

    (SELECT booking_id FROM booking_leg WHERE

    leg_num=1 AND is_returning IS false

    AND flight_id IN (

    SELECT flight_id

    FROM flight

    WHERE departure_airport IN (''ORD'', ''MDW'')

    AND scheduled_departure:: DATE=''2023-07-04'')

    )

    清单 1-3

    以命令式构建的查询

    ```


    现在，想象一下，除此之外，你还需要计算实际的旅客人数。一种方法是使用清单 1-4 中的查询。


    ```

    WITH bk_chi AS (

    WITH bk AS (

    WITH level4 AS (SELECT *

    FROM account

    WHERE frequent_flyer_id IN (

    SELECT frequent_flyer_id

    FROM frequent_flyer

    WHERE level =4

    )

    )

    SELECT * FROM booking WHERE account_id IN

    (SELECT account_id FROM level4

    )

    )

    SELECT * FROM bk WHERE bk.booking_id IN

    (SELECT booking_id FROM booking_leg WHERE

    leg_num=1 AND is_returning IS false

    AND flight_id IN (

    SELECT flight_id

    FROM flight

    WHERE departure_airport IN (''ORD'', ''MDW'')

    AND scheduled_departure:: DATE=''2023-07-04'')

    )

    )

    SELECT count(*) FROM passenger WHERE booking_id IN (

    SELECT booking_id FROM bk_chi)

    清单 1-4

    计算乘客总数

    ```


    以这种方式构建查询，你并没有让查询规划器选择最佳的执行路径，因为操作序列是硬编码的。尽管前面的查询是用声明式语言编写的，但其本质是命令式的。


    ### 编写声明式查询


    相反，要编写声明式查询，只需指定你需要从数据库中检索什么，如清单 1-5 所示。


    ```

    SELECT count(*)

    FROM booking bk

    JOIN booking_leg bl ON bk.booking_id=bl.booking_id

    JOIN flight f ON f.flight_id=bl.flight_id

    JOIN account a ON a.account_id=bk.account_id

    JOIN frequent_flyer ff ON ff.frequent_flyer_id=a.frequent_flyer_id

    JOIN passenger ps ON ps.booking_id=bk.booking_id

    WHERE level=4

    AND leg_num=1

    AND is_returning IS false

    AND departure_airport IN (''ORD'', ''MDW'')

    AND scheduled_departure >= ''2023-07-04''

    AND scheduled_departure <''2023-07-05''

    清单 1-5

    计算乘客数量的声明式查询

    ```


    这样，你就允许数据库自行决定最佳的操作顺序，这个顺序可能因相关列中的值分布而异。


    你可以等到第 5 章所有必需的索引构建完成后再运行这些查询。

    '
- fmt: '## Optimization Goals


    So far, we have implied that a performant query is a query that is executed quickly.
    However, that definition is neither precise nor complete. Even if, for the moment,
    we consider reduction of execution time as the sole goal of optimization, the
    question remains: What execution time is “good enough”?


    For a monthly general ledger of a big corporation, completion within one hour
    may be an excellent execution time. For a daily marketing analysis, minutes might
    be great. For an executive dashboard with a dozen reports, refresh within ten
    seconds may be the best time we can achieve. For a function called from a web
    application, even a hundred milliseconds can be alarmingly slow.


    In addition, for the same query, execution time may vary at different times of
    day or with different database loads. In some cases, we might be interested in
    average execution time. If a system has a hard timeout, we may want to measure
    performance by capping the maximum execution time. There is also a subjective
    component in response time measurement. Ultimately, a company is interested in
    user satisfaction. Most of the time, user satisfaction depends on response time,
    but it is also a subjective characteristic.


    However, beyond execution time, other characteristics may be taken into account.
    For example, a service provider may be interested in maximizing system throughput.
    A small startup may be interested in minimizing resource utilization without compromising
    the system’s response time. We know one company that increased the system’s main
    memory to keep the execution time fast. Their goal was to make sure that the whole
    database could fit into main memory. That worked for a while until the database
    grew bigger than any main memory configuration available.


    How do we define optimization goals? We use the familiar `SMART` goal framework.
    `SMART` goals are:


    - Specific

    - Measurable

    - Achievable (attainable)

    - Result-based (relevant)

    - Time-bound (time-driven)


    Examples of `SMART` goals are presented in Table 1-1.


    **Table 1-1** `SMART` goal examples


    | Characteristic | Bad Example | Good Example |

    | --- | --- | --- |

    | Specific | All pages should respond fast. | Each function execution should be
    completed before a system-defined timeout. |

    | Measurable | Customers shouldn’t wait too long to complete their application.
    | Response time of the registration page should not exceed four seconds. |

    | Achievable | Daily data refresh time in the data warehouse should never increase.
    | When source data volume grows, the daily data refresh time should grow not more
    than logarithmically. |

    | Result-based | Each report refresh should run as fast as possible. | Refresh
    time for each report should be short enough to avoid lock waits. |

    | Time-bound | We will optimize as many reports as we can. | By the end of the
    month, all financial reports should run in under 30 seconds. |


    ## Optimizing Processes


    It is essential to bear in mind that a database does not exist in a vacuum. A
    database is the foundation for multiple, often independent applications and systems.
    For any user (external or internal), overall system performance is the one they
    experience and the one that matters.


    At the organization level, the objective is to improve the performance of the
    whole system. It might be response time or throughput (essential for the service
    provider) or, most likely, a balance of both. Nobody is interested in database
    optimizations that have no impact on overall performance.


    Database developers and DBAs often tend to over-optimize any bad query that comes
    to their attention, just because it is bad. At the same time, their work is often
    isolated from both application development and business analytics. This is one
    reason optimization efforts may appear to be less productive than they could be.
    A SQL query cannot be optimized in isolation, outside the context of its purpose
    and the environment in which it is executed.


    Since queries might not be written declaratively, the original purpose of a query
    might not be evident. Finding out the business intent of what is to be done might
    be the first and the most critical optimization step. Moreover, questions about
    the purpose of a report might lead to the conclusion that it is not needed at
    all. In one case, questioning the purpose of the most long-running reports allowed
    us to cut the total traffic on the reporting server by 40%.


    ### Optimizing `OLTP` and `OLAP`


    There are many ways to classify databases, and different database classes may
    differ in both performance criteria and optimization techniques. Two major classes
    are `OLTP` (Online Transaction Processing) and `OLAP` (Online Analytical Processing).
    `OLTP` databases support applications, and `OLAP` databases support BI and reporting.
    Through the course of this book, we will emphasize different approaches to `OLTP`
    and `OLAP` optimization. We will introduce the concepts of `short` queries and
    `long` queries and explain how to distinguish one from the other.


    **Hint**


    It does not depend on the length of the SQL statement.


    In the majority of cases, in `OLTP` systems we are optimizing `short` queries
    and in `OLAP` systems both `short` and `long` queries.'
  raw: '## Optimization Goals


    So far, we have implied that a performant query is a query that is executed quickly.
    However, that definition is neither precise nor complete. Even if, for the moment,
    we consider reduction of execution time as the sole goal of optimization, the
    question remains: What execution time is “good enough”? For a monthly general
    ledger of a big corporation, completion within one hour may be an excellent execution
    time. For a daily marketing analysis, minutes might be great. For an executive
    dashboard with a dozen reports, refresh within ten seconds may be the best time
    we can achieve. For a function called from a web application, even a hundred milliseconds
    can be alarmingly slow.


    In addition, for the same query, execution time may vary at different times of
    day or with different database loads. In some cases, we might be interested in
    average execution time. If a system has a hard timeout, we may want to measure
    performance by capping the maximum execution time. There is also a subjective
    component in response time measurement. Ultimately, a company is interested in
    user satisfaction. Most of the time, user satisfaction depends on response time,
    but it is also a subjective characteristic.


    However, beyond execution time, other characteristics may be taken into account.
    For example, a service provider may be interested in maximizing system throughput.
    A small startup may be interested in minimizing resource utilization without compromising
    the system’s response time. We know one company that increased the system’s main
    memory to keep the execution time fast. Their goal was to make sure that the whole
    database could fit into main memory. That worked for a while until the database
    grew bigger than any main memory configuration available.


    How do we define optimization goals? We use the familiar SMART goal framework.
    SMART goals are


    *   Specific


    *   Measurable


    *   Achievable (attainable)


    *   Result-based (relevant)


    *   Time-bound (time-driven)


    Examples of SMART goals are presented in Table [1-1](#501585_2_En_1_Chapter.xhtml#Tab1).


    Table 1-1


    SMART goal examples


    | Characteristic | Bad Example | Good Example |

    | --- | --- | --- |

    | Specific | All pages should respond fast. | Each function execution should be
    completed before a system-defined timeout. |

    | Measurable | Customers shouldn’t wait too long to complete their application.
    | Response time of the registration page should not exceed four seconds. |

    | Achievable | Daily data refresh time in the data warehouse should never increase.
    | When source data volume grows, the daily data refresh time should grow not more
    than logarithmically. |

    | Result-based | Each report refresh should run as fast as possible. | Refresh
    time for each report should be short enough to avoid lock waits. |

    | Time-bound | We will optimize as many reports as we can. | By the end of the
    month, all financial reports should run in under 30 seconds. |


    ## Optimizing Processes


    It is essential to bear in mind that a database does not exist in a vacuum. A
    database is the foundation for multiple, often independent applications and systems.
    For any user (external or internal), overall system performance is the one they
    experience and the one that matters.


    At the organization level, the objective is to improve the performance of the
    whole system. It might be response time or throughput (essential for the service
    provider) or, most likely, a balance of both. Nobody is interested in database
    optimizations that have no impact on overall performance.


    Database developers and DBAs often tend to over-optimize any bad query that comes
    to their attention, just because it is bad. At the same time, their work is often
    isolated from both application development and business analytics. This is one
    reason optimization efforts may appear to be less productive than they could be.
    A SQL query cannot be optimized in isolation, outside the context of its purpose
    and the environment in which it is executed.


    Since queries might not be written declaratively, the original purpose of a query
    might not be evident. Finding out the business intent of what is to be done might
    be the first and the most critical optimization step. Moreover, questions about
    the purpose of a report might lead to the conclusion that it is not needed at
    all. In one case, questioning the purpose of the most long-running reports allowed
    us to cut the total traffic on the reporting server by 40%.


    ### Optimizing OLTP and OLAP


    There are many ways to classify databases, and different database classes may
    differ in both performance criteria and optimization techniques. Two major classes
    are *OLTP* (Online Transaction Processing) and *OLAP* (Online Analytical Processing).
    OLTP databases support applications, and OLAP databases support BI and reporting.
    Through the course of this book, we will emphasize different approaches to OLTP
    and OLAP optimization. We will introduce the concepts of *short* queries and *long*
    queries and explain how to distinguish one from the other.


    Hint


    It does not depend on the length of the SQL statement.


    In the majority of cases, in OLTP systems we are optimizing short queries and
    in OLAP systems both short and long queries.'
  trans: '

    ## 优化目标


    到目前为止，我们暗示了高性能的查询是执行速度快的查询。然而，这个定义既不精确也不完整。即使我们暂时将减少执行时间视为优化的唯一目标，问题依然存在：什么样的执行速度才算“足够好”？


    对于一家大公司的月度总分类账，一小时内完成可能就是一个极佳的执行时间。对于每日的营销分析，几分钟可能就很出色。对于包含十几个报告的高管仪表板，十秒内刷新可能就是我们能达到的最佳时间。对于从
    Web 应用程序调用的函数，即使是一百毫秒也可能慢得令人担忧。


    此外，对于同一个查询，执行时间可能在一天中的不同时间或数据库负载不同时发生变化。在某些情况下，我们可能对平均执行时间感兴趣。如果系统有一个硬性的超时限制，我们可能希望通过限制最大执行时间来衡量性能。响应时间的测量也包含主观因素。归根结底，公司关心的是用户满意度。大多数时候，用户满意度取决于响应时间，但它也是一个主观特征。


    然而，除了执行时间，可能还需要考虑其他特征。例如，服务提供商可能对最大化系统吞吐量感兴趣。一家小型初创公司可能希望在不影响系统响应时间的前提下，最小化资源利用率。我们知道有一家公司增加了系统主内存以保持快速的执行时间。他们的目标是确保整个数据库能装入主内存。这在一段时间内有效，直到数据库增长到超出任何可用主内存配置的容量。


    我们如何定义优化目标？我们使用熟悉的 `SMART` 目标框架。`SMART` 目标是：


    -   具体的

    -   可衡量的

    -   可实现的

    -   基于结果的

    -   有时限的


    `SMART` 目标的示例如表 1-1 所示。


    **表 1-1** `SMART` 目标示例


    | 特征 | 坏示例 | 好示例 |

    | --- | --- | --- |

    | 具体的 | 所有页面都应快速响应。 | 每个函数的执行都应在系统定义的超时之前完成。 |

    | 可衡量的 | 客户不应等待太久来完成他们的申请。 | 注册页面的响应时间不应超过四秒。 |

    | 可实现的 | 数据仓库的每日数据刷新时间永远不应增加。 | 当源数据量增长时，每日数据刷新时间的增长不应超过对数级别。 |

    | 基于结果的 | 每个报告刷新都应尽可能快地运行。 | 每个报告的刷新时间应足够短，以避免锁等待。 |

    | 有时限的 | 我们将优化尽可能多的报告。 | 到本月底，所有财务报告的运行时间都应低于 30 秒。 |


    ## 优化流程


    必须牢记，数据库并非存在于真空中。数据库是多个、通常是独立的应用程序和系统的基础。对于任何用户（外部或内部），他们体验到并认为重要的是整个系统的性能。


    在组织层面，目标是提升整个系统的性能。这可能是响应时间，也可能是吞吐量（对服务提供商至关重要），或者最可能是两者之间的平衡。没有人会对那些对整体性能毫无影响的数据库优化感兴趣。


    数据库开发人员和 DBA 往往倾向于过度优化他们注意到的任何糟糕的查询，仅仅因为它糟糕。与此同时，他们的工作常常与应用开发和业务分析相隔离。这就是优化工作可能看起来不如其潜在效率高的原因之一。一个
    SQL 查询不能脱离其目的和执行环境而孤立地进行优化。


    由于查询可能不是以声明方式编写的，其原始目的可能并不明显。弄清楚待执行操作的业务意图，可能是第一步也是最关键的优化步骤。此外，关于报告目的的问题可能导致它根本不需要的结论。在一个案例中，对运行时间最长的报告目的的质疑，使我们能够将报告服务器上的总流量减少
    40%。


    ### 优化 `OLTP` 与 `OLAP`


    数据库有多种分类方式，不同的数据库类别在性能标准和优化技术上可能有所不同。两个主要类别是 `OLTP`（联机事务处理）和 `OLAP`（联机分析处理）。`OLTP`
    数据库支持应用程序，`OLAP` 数据库支持商业智能（BI）和报告。在本书的进程中，我们将强调针对 `OLTP` 和 `OLAP` 的不同优化方法。我们将引入
    `短` 查询和 `长` 查询的概念，并解释如何区分它们。


    **提示**


    这与 SQL 语句的长度无关。


    在大多数情况下，我们在 `OLTP` 系统中优化 `短` 查询，而在 `OLAP` 系统中优化 `短` 和 `长` 查询。

    '
- fmt: '### Database Design and Performance


    We have already mentioned that we do not like the approach of “first write, then
    optimize” and that this book’s goal is to help you write queries right right away.
    When should a developer start thinking about performance of the query they are
    working on? The answer is the sooner, the better. Ideally, optimization starts
    from requirements. In practice, this is not always the case, although gathering
    requirements is essential.


    To be more precise, gathering requirements allows us to come up with the best
    database design, and database design can impact performance.


    If you are a DBA, chances are, from time to time, you get requests to review new
    tables and views, which means you need to evaluate someone else’s database design.
    If you do not have any exposure to what a new project is about and the purpose
    of the new tables and views, there is not much you can do to determine whether
    the proposed design is optimal. The only thing you may be able to evaluate without
    going into the details of the business requirements is whether the database design
    is normalized. Even that might not be obvious without knowing the business specifics.


    The only way to evaluate a proposed database design is to ask the right questions.
    The right questions include questions about what real-life objects the tables
    represent. To illustrate that statement, let’s look at the following example:
    in this database, we need to store user accounts, and we need to store each account
    holder’s phone number(s). Two possible design are shown in Figures `1-1` and `1-2`,
    respectively.


    ![](Images/501585_2_En_1_Fig2_HTML.jpg)


    A design of a database in 2 tables. It has the account i d, email, first name,
    and last name in a table titled Account and the phone i d, account i d, phone
    type, and phone number in the other table titled Phone.


    **Figure 1-2** Two-table design


    ![](Images/501585_2_En_1_Fig1_HTML.jpg)


    A design of a database in a single table titled Account. It has account i d, email,
    first name, last name, home phone, work phone, and cell phone in one table.


    **Figure 1-1** Single-table design


    Which of the two designs is the right one? It depends on the intended usage of
    the data. If phone numbers are never used as search criteria and are selected
    as a part of an account (to be displayed on the customer support screen), if UX
    has fields labeled with specific phone types, then a single-table design is more
    appropriate.


    However, if we want to search by phone number regardless of type, having all phones
    in a separate table will make the search more performant.


    Also, users are often asked to indicate which phone number is their primary phone.
    It is easy to add one Boolean attribute `is_primary` to the two-table design,
    but it will be more complicated in the one-table design. An additional complication
    might arise when somebody does not have a landline or a work phone, which happens
    often. On the other hand, people often have more than one cell phone, or they
    might have a virtual number, like Google Voice, and they might want to record
    that number as the primary number to reach them. All these considerations are
    in favor of the two-table design.


    Lastly, we can evaluate the frequency of each use case and how critical response
    time is in each case.


    ### Application Development and Performance


    We are talking about application development, not just the database side of development
    because once again, database queries are not executed by themselves—they are parts
    of applications. Traditionally, optimizing the individual queries is viewed as
    “optimization,” but we are going to take a broader approach.


    Quite often, although each database query executed by an application returns results
    in less than 0.1 seconds, an application page response time may amount to ten
    seconds or more. Technically speaking, optimization of such processes is not a
    “database optimization” in its traditional meaning, but there is a lot a database
    developer can do to improve the situation. We cover a relevant optimization technique
    in Chapters `10` and `13`.


    ### Other Stages of the Lifecycle


    The life of an application does not end after release in production, and the optimization
    is a continuous process as well. Although our goal should be to optimize long-term,
    it is hard to predict how exactly the system will evolve. It is a good practice
    to continually keep an eye on the system performance, not only on the execution
    times but on trends.


    A query may be very performant, and one might not notice that the execution time
    started to increase because it is still within acceptable limits and no automated
    monitoring system will be alerted.


    Query execution time may change because data volume increased or the data distribution
    changed or execution frequency increased. In addition, we expect new indexes and
    other improvements in each new PostgreSQL release, and some of them may be so
    significant that they prompt rewriting original queries.


    Whatever the cause of the change is, no part of any system should be assumed to
    be optimized forever.'
