- fmt: '# Reading Execution Plans


    To paraphrase Elvis, a little less abstraction, a little more action, please.
    Let’s take a look at an example. The query in Listing 4-1 selects all flights
    that departed from JFK and arrived at ORD with a scheduled departure between August
    10 and August 23, 2023. For each flight, the total number of passengers is calculated.


    ```sql

    SELECT f.flight_no,

    f.actual_departure,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    WHERE f.departure_airport = ''JFK''

    AND f.arrival_airport = ''ORD''

    AND f.actual_departure BETWEEN

    ''2023-08-10'' and ''2023-08-13''

    GROUP BY f.flight_id, f.actual_departure;

    ```

    **Listing 4-1**

    A query selecting the number of passengers on specific flights


    A logical plan for this query is shown in Listing 4-2.


    ```

    project f.flight_no,  f.actual_departure, count(p.passenger_id)[] (

    group [f.flight_no, f.actual_departure] (

    filter [f.departure_airport = ''JFK''] (

    filter [f.arrival_airport = ''ORD''] (

    filter [f.actual_departure >=''2023-08-10''](

    filter [f.actual_departure <=''2023-08-13'' ] (

    join [bl.flight_id = f.flight_id] (

    access (flights f),

    join(bl.booking_id=p.booking_id (

    access (booking_leg bl),

    access (passenger p)

    ))))))))

    ```

    **Listing 4-2**

    The logical plan for the query in Listing 4-1


    The logical plan shows which logical operations should be executed, but it does
    not provide details on how they will be executed. The query planner produces an
    execution plan for the query, shown in Figure 4-1.


    ![Execution plan](Images/501585_2_En_4_Fig1_HTML.jpg)


    **Figure 4-1**

    Execution plan


    A query plan with 17 lines includes the group aggregate, sort, hash join, sequential
    scan on passenger, sequential scan on booking, bitmap heap scan on flight, and
    bitmap index scan on flight departure airport.


    To obtain the execution plan for a query, the `EXPLAIN` command is run. This command
    takes any grammatically correct SQL statement as a parameter and returns its execution
    plan.


    We encourage you to run the code examples throughout this book and examine the
    execution plans. However, a word of caution: Choosing the correct execution plan
    is a nondeterministic process. The plans that your local database produces might
    differ slightly from the plans shown in this book. Even when the plans are identical,
    execution times may vary with differences in hardware and configuration.


    Hopefully, looking at Figure 4-1, the value of the preceding chapters is evident—each
    line represents an operation previously covered, so it’s clear what’s going on
    under the hood. Note that, in addition to the names of the algorithms, each line
    of the execution plan includes several mysterious numbers in parentheses. This
    mystery can be easily resolved by recalling Chapter 3, which discussed how the
    costs of different algorithms are calculated.


    Specifically, a plan contains the expected number of output rows and the expected
    average width of output row, which are calculated from database statistics, and
    estimates of costs, which are calculated based on the previously obtained estimates
    and configuration parameters. The values of costs include the accumulated cost
    of all previous operations. There are two cost estimations for each operation:
    the first shows the cost needed to produce the first row of output, while the
    second estimates the cost of the complete result. For example, in Figure 4-1,
    line 13, 123.95 is the cost of the first row of output and 9371.93 the cost of
    the complete result. Estimates for the number and width of output rows are needed
    to estimate the cost of an operation that consumes the output. How costs are estimated
    will be covered later in this chapter.


    It is important to emphasize that all these numbers are approximate. The actual
    values obtained during execution may differ. If you suspect that the optimizer
    chose a plan that is not optimal, you might need to look at these estimates. Usually,
    the error is small for stored tables, but it inevitably accumulates after each
    operation.


    An execution plan is presented as a tree of physical operations. In this tree,
    nodes represent operations, and arrows point to operands. The tree structure might
    not be apparent from looking at Figure 4-1. There are multiple tools, including
    pgAdmin, which can generate a graphical representation of execution plans. Figure
    4-2 illustrates what an output might look like. (Different graphic tools may use
    different iconography; this example is presented for illustrative purposes only.)
    In fact, this figure represents the execution plan for Listing 4-4, which we discuss
    later in this chapter.


    ![Graphical representation of a simple execution plan (Listing 4-4)](Images/501585_2_En_4_Fig2_HTML.jpg)


    **Figure 4-2**

    Graphical representation of a simple execution plan (Listing 4-4)


    A horizontal flow diagram. Flight departure airport points to flight. The flight
    and airport point to nested loop inner join.


    For more complex queries, the graphical representation of the execution plan may
    be less helpful—see the graphical representation of the execution plan for Listing
    4-1 in Figure 4-3.


    ![Graphical representation of the execution plan for Listing 4-1](Images/501585_2_En_4_Fig3_HTML.png)


    **Figure 4-3**

    Graphical representation of the execution plan for Listing 4-1


    A horizontal step-like flow diagram for arranging the number of passengers in
    a flight includes flight departure airport, flight, hash, booking leg, hash inner
    join, passenger, sort, and aggregate.


    In such cases, a more compact representation could be more useful, like the one
    presented in Figure 4-4.


    ![Alternative representation of the same execution plan](Images/501585_2_En_4_Fig4_HTML.jpg)


    **Figure 4-4**

    Alternative representation of the same execution plan


    A query plan with 10 lines includes the aggregate, sort, hash inner join, sequential
    scan on passenger, hash, sequential scan on booking, bitmap heap scan on flight,
    and bitmap index scan using flight departure airport.


    Now, let’s get back to the actual output of the `EXPLAIN` command, shown in Figure
    4-1. It shows each node of the tree on a separate line starting with `->`, with
    the depth of the node represented by the offset. Subtrees are placed after their
    parent node. Some operations are represented with two lines.


    The execution of a plan starts from the leaves and ends at the root. This means
    that the operation that is executed first will be on the line that has the rightmost
    offset. Of course, a plan may contain several leaf nodes that are executed independently.
    As soon as an operation produces an output row, this row is pushed up to the next
    operation. Thus, there is no need to store intermediate results between operations.


    In Figure 4-1, execution starts from the last line, accessing the table `flight`
    using the index on the `departure_airport` column. Since several filters are applied
    to the table and only one of the filtering conditions is supported by the index,
    PostgreSQL performs a `bitmap index scan` (covered in Chapter 2). The engine accesses
    the index and compiles the list of blocks that could contain needed records. Then,
    it reads the actual blocks from the database using `bitmap heap scan`, and for
    each record extracted from the database, it `rechecks` that rows found via the
    index are current and applies `filter` operations for additional conditions for
    which we do not have indexes: `arrival_airport` and `scheduled_departure`.'
