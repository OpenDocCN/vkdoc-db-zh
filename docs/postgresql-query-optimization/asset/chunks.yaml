  raw: '### Modifying Data in the Database


    NORM can handle any data manipulation operation, that is, `INSERT`, `UPDATE`,
    and `DELETE`, which are collectively called update requests.


    An update request is sent from the application as a complex object and, on the
    database level, may result in multiple update operations applied to different
    tables. Once again, database development is contract-driven. A database function
    receives a JSON object from the application, parses the object, and interprets
    the actions that are required on the database level.


    The NORM approach aims to reduce the number of database operations. Of course,
    it is not possible to update multiple tables in a single SQL statement, so NORM
    needs to execute several SQL statements for an update request. However, it collects
    data from several sub-objects of the update request so that at most one DELETE,
    one UPDATE, and two INSERT statements are performed for each table that can be
    modified through the hierarchy, no matter how many hierarchies and sub-objects
    are modified by the update request.


    The generated NORM code relies on the assumption that all tables have a single-column
    primary key and the values of primary keys are automatically assigned when new
    rows are inserted.


    An update request is sent from the application as a JSON array of hierarchies
    conforming the contract schema and satisfying a few additional rules:


    *   If an object at any level of the hierarchy does not include the key mapped
    to the primary key, this object and all its sub-objects are inserted into the
    appropriate tables.


    *   If an object contains the value of the primary key and an additional key “cmd”:”DELETE”,
    then this object and all its sub-objects are deleted from the database.


    *   If an object contains a primary key and does not contain the “cmd” key, then
    the values of other keys of this object are used in the UPDATE operation.


    An example of an update request is shown in Listing [14-8](#501585_2_En_14_Chapter.xhtml#PC8).
    The modifications specified in this request do not necessarily make sense from
    a business viewpoint; however, they illustrate how modifications are specified.


    ```

    1   [

    2       {

    3           "booking_id": 556470,

    4           "cmd": "DELETE"

    5       },

    6       {

    7           "passengers": [

    8               {

    9                   "last_name": "Jones",

    10                   "account_id": 238648,

    11                   "first_name": "Lucy"

    12               }

    13           ],

    14           "booking_legs": [

    15               {

    16                   "leg_num": 1,

    17                   "flight_id": 558238,

    18               },

    19               {

    20                   "leg_num": 2,

    21                   "flight_id": 563410

    22               }

    23           ],

    24           "booking_reference": "IYZI42"

    25       },

    26       {

    27           "booking_id": 3974917,

    28           "passengers": [

    29               {

    30                   "cmd": "DELETE",

    31                   "passenger_id": 11479596

    32               },

    33               {

    34                   "last_name": "SCOTT",

    35                   "first_name": "MILES",

    36                   "passenger_id": 11479599

    37               }

    38           ],

    39           "booking_legs": [

    40               {

    41                   "flight_id": 432724,

    42                   "booking_leg_id": 11453272

    43               },

    44               {

    45                   "flight_id": 427273,

    46                   "booking_leg_id": 11453273

    47               }

    48           ]

    49       },

    50       {

    51           "booking_id": 2733047,

    52           "booking_reference": "Q8JX22"

    53       }

    54   ]

    Listing 14-8

    An example of an update request

    ```


    The update request shown in Listing [14-8](#501585_2_En_14_Chapter.xhtml#PC8)
    requests the following actions:


    *   Delete a whole booking (lines 2–5).


    *   Insert a new booking (lines 6–25).


    *   Delete one passenger, update first and last names of another passenger, and
    change the flight in two booking_leg entries (lines 26–49).


    *   Update the booking reference in a booking (lines 50–53).


    To support update requests, NORM generates several functions that contain SQL
    DML operations for each table and a function TO_DB that accepts update requests
    and invokes all the other functions as needed to perform the requested modifications.
    This function returns a list of primary keys of the top-level objects of all hierarchies
    that were touched during the execution of the update request.


    The generated code is too long to be included in this book, but is available in
    the NORM repository on GitHub.


    ## Why Not Store JSON?!


    At this point, you might wonder why we go into such trouble when PostgreSQL supports
    the JSON type? Why not store JSON “as is”?


    Some reasons were previously discussed in Chapter [9](#501585_2_En_9_Chapter.xhtml).
    In particular, Chapter [9](#501585_2_En_9_Chapter.xhtml) discussed key-value and
    hierarchical models and explained their limitations. If a booking leg, as defined
    in this chapter, was stored as a JSON object, flight information would be duplicated,
    because it belongs to a different hierarchy. Another reason is that JSON is typeless
    and therefore unreliable in terms of providing a consistent interface to develop
    against.


    In addition, although we can build indexes to facilitate search on specific JSON
    keys, their performance is worse than B-tree indexes on regular columns. Indexing
    JSON and related performance concerns are covered in Chapter [15](#501585_2_En_15_Chapter.xhtml).


    ## Performance Gains


    What is the effect of using NORM on performance? As discussed in Chapter [11](#501585_2_En_11_Chapter.xhtml),
    this kind of performance difference is difficult to benchmark. We need to measure
    overall application performance, rather than comparing the speed of separate operations,
    and the applications themselves in this case are written in very different programming
    styles. We are not providing any examples of application code in this chapter
    since it is out of scope of this book.


    However, based on our industrial experience, this approach used in place of traditional
    ORM can improve the performance of application controllers by 10–50 *times*. Moreover,
    application performance appears to be more consistent, since it avoids the *N
    + 1 problem* (i.e., when the code needs to load the children of a parent-child
    relationship: most ORMs have lazy-loading enabled by default, so queries are issued
    for the parent record and then one query for *each* child record).


    ## Working Together with Application Developers


    As discussed many times, overall system performance is not limited to database
    performance, and optimization starts with gathering requirements. NORM is a very
    good illustration for this statement.


    With NORM, development starts from defining a contract, which allows application
    and database developers to work in parallel on their tasks. In addition, this
    contract means that future performance improvements on the database side can be
    made without making any changes to the application.


    ## Summary


    NORM is an approach to application design and development, which allows seamless
    data exchange between a back end and a data layer eliminating the need for ORM.
    Applied consistently, it helps produce performant systems while simplifying application
    development.


    NORM is one of several potential solutions; however, it has a proven record of
    success and can be used as a template for those who want to avoid the potential
    pitfalls of ORM.


    # 15. More Complex Filtering and Search


    Previous chapters discussed several ways to support filtering and search with
    indexes in PostgreSQL. Why are more needed, and why haven’t these indexes been
    covered yet? Prior discussion of this topic focused on the most common indexes,
    those that are needed in nearly any application. However, there are data types
    that cannot be efficiently supported with indexes such as B-trees.'
  trans: "\n## 修改数据库中的数据\n\n`NORM` 可以处理任何数据操作，即 `INSERT`、`UPDATE` 和 `DELETE`，这些操作统称为更新请求。\n\
    \n一个更新请求由应用程序作为一个复杂对象发送，在数据库层面，可能会导致对多个表执行多个更新操作。重申一次，数据库开发是契约驱动的。一个数据库函数从应用程序接收一个\
    \ JSON 对象，解析该对象，并解释在数据库层面需要执行的操作。\n\n`NORM` 方法旨在减少数据库操作的数量。当然，不可能用单条 SQL 语句更新多个表，因此\
    \ `NORM` 需要为一个更新请求执行多条 SQL 语句。然而，它会从更新请求的多个子对象中收集数据，以便对于可以通过层次结构修改的每个表，最多执行一条\
    \ `DELETE`、一条 `UPDATE` 和两条 `INSERT` 语句，无论该更新请求修改了多少层级和子对象。\n\n生成的 `NORM` 代码基于以下假设：所有表都有单列主键，并且在插入新行时主键值会自动分配。\n\
    \n一个更新请求作为符合契约模式并满足一些附加规则的层级结构的 JSON 数组从应用程序发送：\n\n-   如果层次结构中任何级别的对象不包含映射到主键的键，则该对象及其所有子对象将被插入到相应的表中。\n\
    -   如果一个对象包含主键值以及一个附加键 `\"cmd\":\"DELETE\"`，那么该对象及其所有子对象将从数据库中删除。\n-   如果一个对象包含主键但不包含\
    \ `\"cmd\"` 键，则该对象其他键的值将用于 `UPDATE` 操作。\n\n清单 14-8 展示了一个更新请求的示例。此请求中指定的修改从业务角度来看不一定有意义；然而，它们说明了如何指定修改。\n\
    \n```json\n[\n    {\n        \"booking_id\": 556470,\n        \"cmd\": \"DELETE\"\
    \n    },\n    {\n        \"passengers\": [\n            {\n                \"\
    last_name\": \"Jones\",\n                \"account_id\": 238648,\n           \
    \     \"first_name\": \"Lucy\"\n            }\n        ],\n        \"booking_legs\"\
    : [\n            {\n                \"leg_num\": 1,\n                \"flight_id\"\
    : 558238\n            },\n            {\n                \"leg_num\": 2,\n   \
    \             \"flight_id\": 563410\n            }\n        ],\n        \"booking_reference\"\
    : \"IYZI42\"\n    },\n    {\n        \"booking_id\": 3974917,\n        \"passengers\"\
    : [\n            {\n                \"cmd\": \"DELETE\",\n                \"passenger_id\"\
    : 11479596\n            },\n            {\n                \"last_name\": \"SCOTT\"\
    ,\n                \"first_name\": \"MILES\",\n                \"passenger_id\"\
    : 11479599\n            }\n        ],\n        \"booking_legs\": [\n         \
    \   {\n                \"flight_id\": 432724,\n                \"booking_leg_id\"\
    : 11453272\n            },\n            {\n                \"flight_id\": 427273,\n\
    \                \"booking_leg_id\": 11453273\n            }\n        ]\n    },\n\
    \    {\n        \"booking_id\": 2733047,\n        \"booking_reference\": \"Q8JX22\"\
    \n    }\n]\n```\n\n**清单 14-8**\n一个更新请求的示例\n\n清单 14-8 所示的更新请求要求执行以下操作：\n\n-   删除整个预订（第\
    \ 2-5 行）。\n-   插入一个新预订（第 6-25 行）。\n-   删除一名乘客，更新另一名乘客的名和姓，并更改两个 `booking_leg`\
    \ 条目中的航班（第 26-49 行）。\n-   更新一个预订中的预订参考号（第 50-53 行）。\n\n为了支持更新请求，`NORM` 为每个表生成几个包含\
    \ SQL `DML` 操作的函数，以及一个名为 `TO_DB` 的函数。`TO_DB` 函数接受更新请求，并根据需要调用所有其他函数来执行请求的修改。该函数返回在执行更新请求期间触及的所有层次结构的顶级对象的主键列表。\n\
    \n生成的代码太长，无法包含在本书中，但可以在 GitHub 上的 `NORM` 仓库中找到。\n\n## 为什么不直接存储 JSON？！\n\n此时，你可能想知道，既然\
    \ PostgreSQL 支持 `JSON` 类型，我们为什么要如此麻烦？为什么不直接“原样”存储 `JSON` 呢？\n\n第 9 章已经讨论过一些原因。特别是，第\
    \ 9 章讨论了键值模型和层次模型，并解释了它们的局限性。如果将本章定义的预订航段作为 `JSON` 对象存储，航班信息将会重复，因为它属于不同的层次结构。另一个原因是\
    \ `JSON` 是无类型的，因此在提供一致的开发接口方面是不可靠的。\n\n此外，尽管我们可以构建索引以方便对特定 `JSON` 键进行搜索，但其性能比常规列上的\
    \ `B-tree` 索引要差。对 `JSON` 索引及相关性能问题将在第 15 章中介绍。\n\n## 性能提升\n\n使用 `NORM` 对性能有什么影响？正如第\
    \ 11 章所讨论的，这种性能差异很难进行基准测试。我们需要测量应用程序的整体性能，而不是比较单独操作的速度，而在这种情况下，应用程序本身的编写风格差异很大。由于超出了本书的范围，本章不提供任何应用程序代码示例。\n\
    \n然而，根据我们的行业经验，用这种方法替代传统的 `ORM`，可以将应用程序控制器的性能提高 10 到 50 倍。此外，应用程序性能似乎更加一致，因为它避免了\
    \ `N+1 问题`（即，当代码需要加载父-child 关系中的子记录时：大多数 `ORM` 默认启用延迟加载，因此会为父记录发出一次查询，然后为每个子记录发出一次查询）。\n\
    \n## 与应用程序开发人员协同工作\n\n正如多次讨论过的，整体系统性能不仅仅局限于数据库性能，优化始于需求收集。`NORM` 是这一论点的绝佳例证。\n\
    \n使用 `NORM`，开发从定义契约开始，这使得应用程序和数据库开发人员可以并行开展他们的任务。此外，这种契约意味着未来可以在不更改应用程序的情况下，在数据库端进行性能优化。\n\
    \n## 总结\n\n`NORM` 是一种应用程序设计和开发方法，它允许后端与数据层之间的无缝数据交换，从而消除了对 `ORM` 的需求。始终如一地应用它，有助于构建高性能系统，同时简化应用程序开发。\n\
    \n`NORM` 是几种潜在的解决方案之一；然而，它拥有经过验证的成功记录，可以作为那些希望避免 `ORM` 潜在缺陷的人的模板。\n\n# 15. 更复杂的过滤与搜索\n\
    \n前面的章节讨论了几种在 PostgreSQL 中使用索引支持过滤和搜索的方法。为什么还需要更多？为什么之前没有介绍这些索引？先前关于这个话题的讨论集中在最常见的索引上，即几乎所有应用程序都需要的那些。然而，有些数据类型无法用\
    \ `B-tree` 等索引来高效支持。\n"
- fmt: '## Full Text Search


    Everything discussed in previous chapters is applicable to structured data, and
    all queries considered so far are Boolean. That is, a row is either needed for
    computation of the result or not, and a computed row either belongs to the output
    or not. Nothing resides in between. SQL is a powerful language for structured
    data and lends itself well to this sort of analysis.


    In this section, we consider unstructured data. The most common example of unstructured
    data is text written in natural language. This kind of text is usually called
    a `document`. In contrast with structured data, a search for documents is always
    imprecise, because we are typically interested in a document meaning that is not
    precisely expressed in the content of the document. However, the criteria must
    be precisely expressed in a query. Welcome to the world of uncertainty!


    There are several different models for document search; the one implemented in
    PostgreSQL is called a Boolean model. Note that modern Internet search engines
    use more complex models.


    In a Boolean search model, a document is considered a list of `terms`. Each term
    usually corresponds to a word in the document transformed using certain linguistic
    tools. This conversion is needed to improve the quality of the search. For example,
    we expect that the words “word” and “words” should map to the same term. The transformations
    are not trivial: “a leaf” and “leaves” are the forms of the same word; however,
    “to leave” is different. And it’s not just morphological transformations: meaning
    depends on context. For example, “host” and “computer” have the same meaning in
    a document describing network protocols, but these words are different in a document
    related to organizing a conference.


    In PostgreSQL, the linguistic rules defining the transformations are encapsulated
    in a `configuration`. Several predefined configurations for different languages
    are available, and additional configurations may be defined. One of the predefined
    configurations does not depend on any language.


    The output of this linguistic processing is represented as a value of type `ts_vector`.
    The values of `ts_vector` are lists of terms and not related to any language or
    even text. A `ts_vector` can be built from any list of values.


    Why is text search called `full text search`? In the dark ages (the 1970s), when
    the capacity of hard drives was small, lists of terms were built from titles or
    abstracts. So full text means that all the words in the document are considered
    as a source of terms.


    Similarly, a query for document search is represented as a value of type `ts_query`.
    These values are constructed from a textual representation of a query that can
    contain words and the logical operators `AND`, `OR`, and `NOT`. A simple query
    consists of words only (with an implicit `AND` between them).


    A term (word) in a query yields `true` if it is present in the document and yields
    `false` otherwise. The Boolean values for the terms are combined into a single
    Boolean value using operators contained in the query. For simple queries that
    only contain terms, a document matches if all terms in the query are present in
    the `ts_vector` corresponding to the document.


    The match operator `@@` returns `true` if a document satisfies the query and `false`
    otherwise. It can be used in the `WHERE` clause of a `SELECT` statement or anywhere
    else where a Boolean expression is expected.


    A Boolean search produces definite results: a document either matches a query
    or does not match. Is it still uncertain? Yes, it is. Some information is lost
    when a document is converted to `ts_vector`, and some information is lost when
    a query is converted into `ts_query` as well.


    The text search features of PostgreSQL can work without any indexes. PostgreSQL
    also provides special types of indexes that can speed up text search. We discuss
    these index types later in this chapter.


    ## Multidimensional and Spatial Search


    Filtering conditions considered in previous chapters used scalar attributes. Some
    kinds of indexes, for example, compound indexes, may contain several attributes,
    but the ordering of the attributes is essential: the index is useless if the value
    of the first attribute is not specified.


    A fixed ordering of attributes is not desirable for some applications and data
    types. These applications require that multiple attributes are treated symmetrically,
    without any preference to any attribute. Typical examples are objects on a plane
    or three-dimensional space with coordinates as attributes. These kinds of data
    are collectively called spatial.


    More importantly, spatial data often requires different types of queries. The
    most common queries are

    *   *Range queries* – Find all objects located at a certain distance or closer
    to the specified point in space.

    *   *Nearest-neighbor queries* – Find the k objects closest to the specified point.

    These queries cannot be supported with one-dimensional indexes even if multiple
    indexes are used.


    Of course, this kind of search is not limited to space only. The coordinates might
    have timestamp values or even values in a discrete domain.


    PostgreSQL provides index types suitable for spatial data. These indexes are briefly
    discussed in the next section.


    ## Generalized Index Types in PostgreSQL


    The `CREATE INDEX` operator includes an optional index type specified on index
    creation. So far, this hasn’t been demonstrated in prior examples, because all
    of the previously created indexes were B-tree indexes, and B-tree is the default
    value for the index type. The other possible values are `hash`, `GIST`, `spgist`,
    `GIN`, `BRIN`, and user-defined type (if installed), at the time of writing.


    This section discusses some of these types in more detail.


    ### GIST Indexes


    Some applications use multi-attribute objects like points with coordinates on
    a surface or a plane. Previously, we discussed compound indexes that include multiple
    attributes. However, compound indexes are not symmetric: the attributes are ordered.
    In contrast, the coordinates of a point should be treated symmetrically.


    GIST is a family of index structures, each of which supports a certain data type
    and can be configured to implement several different tree-based index structures.
    Specifically, it implements index structure for spatial data known as an R-tree.
    Support for R-tree and a few other indexes is included in the PostgreSQL distribution;
    more types may be installed as extensions.


    An R-tree implemented as the `GIST` index type does exactly what is needed here:
    it indexes spatial objects (such as points and rectangles). Objects that have
    more complex shape are represented in the index with rectangular bounding boxes.
    Search conditions are expressed with a rectangle. All objects that intersect with
    the search rectangle are returned as the result of the search.


    Of course, the attributes included in a `GIST` index are not necessarily coordinates.
    Such attributes may represent time or other ordered data types.'
  raw: '## Full Text Search


    Everything discussed in previous chapters is applicable to structured data, and
    all queries considered so far are Boolean. That is, a row is either needed for
    computation of the result or not, and a computed row either belongs to the output
    or not. Nothing resides in between. SQL is a powerful language for structured
    data and lends itself well to this sort of analysis.


    In this section, we consider unstructured data. The most common example of unstructured
    data is text written in natural language. This kind of text is usually called
    a *document*. In contrast with structured data, a search for documents is always
    imprecise, because we are typically interested in a document meaning that is not
    precisely expressed in the content of the document. However, the criteria must
    be precisely expressed in a query. Welcome to the world of uncertainty!


    There are several different models for document search; the one implemented in
    PostgreSQL is called a Boolean model. Note that modern Internet search engines
    use more complex models.


    In a Boolean search model, a document is considered a list of *terms*. Each term
    usually corresponds to a word in the document transformed using certain linguistic
    tools. This conversion is needed to improve the quality of the search. For example,
    we expect that the words “word” and “words” should map to the same term. The transformations
    are not trivial: “a leaf” and “leaves” are the forms of the same word; however,
    “to leave” is different. And it’s not just morphological transformations: meaning
    depends on context. For example, “host” and “computer” have the same meaning in
    a document describing network protocols, but these words are different in a document
    related to organizing a conference.


    In PostgreSQL, the linguistic rules defining the transformations are encapsulated
    in a *configuration*. Several predefined configurations for different languages
    are available, and additional configurations may be defined. One of the predefined
    configurations does not depend on any language.


    The output of this linguistic processing is represented as a value of type `ts_vector`.
    The values of `ts_vector` are lists of terms and not related to any language or
    even text. A `ts_vector` can be built from any list of values.


    Why is text search called *full text search*? In the dark ages (the 1970s), when
    the capacity of hard drives was small, lists of terms were built from titles or
    abstracts. So full text means that all the words in the document are considered
    as a source of terms.


    Similarly, a query for document search is represented as a value of type `ts_query`.
    These values are constructed from a textual representation of a query that can
    contain words and the logical operators AND, OR, and NOT. A simple query consists
    of words only (with an implicit AND between them).


    A term (word) in a query yields true if it is present in the document and yields
    false otherwise. The Boolean values for the terms are combined into a single Boolean
    value using operators contained in the query. For simple queries that only contain
    terms, a document matches if all terms in the query are present in the `ts_vector`
    corresponding to the document.


    The match operator `@@` returns true if a document satisfies the query and false
    otherwise. It can be used in the `WHERE` clause of a SELECT statement or anywhere
    else where a Boolean expression is expected.


    A Boolean search produces definite results: a document either matches a query
    or does not match. Is it still uncertain? Yes, it is. Some information is lost
    when a document is converted to ts_vector, and some information is lost when a
    query is converted into ts_query as well.


    The text search features of PostgreSQL can work without any indexes. PostgreSQL
    also provides special types of indexes that can speed up text search. We discuss
    these index types later in this chapter.


    ## Multidimensional and Spatial Search


    Filtering conditions considered in previous chapters used scalar attributes. Some
    kinds of indexes, for example, compound indexes, may contain several attributes,
    but the ordering of the attributes is essential: the index is useless if the value
    of the first attribute is not specified.


    A fixed ordering of attributes is not desirable for some applications and data
    types. These applications require that multiple attributes are treated symmetrically,
    without any preference to any attribute. Typical examples are objects on a plane
    or three-dimensional space with coordinates as attributes. These kinds of data
    are collectively called spatial.


    More importantly, spatial data often requires different types of queries. The
    most common queries are


    *   *Range queries* – Find all objects located at a certain distance or closer
    to the specified point in space.


    *   *Nearest-neighbor queries* – Find the k objects closest to the specified point.


    These queries cannot be supported with one-dimensional indexes even if multiple
    indexes are used.


    Of course, this kind of search is not limited to space only. The coordinates might
    have timestamp values or even values in a discrete domain.


    PostgreSQL provides index types suitable for spatial data. These indexes are briefly
    discussed in the next section.


    ## Generalized Index Types in PostgreSQL


    The `CREATE INDEX` operator includes an optional index type specified on index
    creation. So far, this hasn’t been demonstrated in prior examples, because all
    of the previously created indexes were B-tree indexes, and B-tree is the default
    value for the index type. The other possible values are hash, GIST, spgist, GIN,
    BRIN, and user-defined type (if installed), at the time of writing.


    This section discusses some of these types in more detail.


    ### GIST Indexes


    Some applications use multi-attribute objects like points with coordinates on
    a surface or a plane. Previously, we discussed compound indexes that include multiple
    attributes. However, compound indexes are not symmetric: the attributes are ordered.
    In contrast, the coordinates of a point should be treated symmetrically.


    GIST is a family of index structures, each of which supports a certain data type
    and can be configured to implement several different tree-based index structures.
    Specifically, it implements index structure for spatial data known as an R-tree.
    Support for R-tree and a few other indexes is included in the PostgreSQL distribution;
    more types may be installed as extensions.


    An R-tree implemented as the GIST index type does exactly what is needed here:
    it indexes spatial objects (such as points and rectangles). Objects that have
    more complex shape are represented in the index with rectangular bounding boxes.
    Search conditions are expressed with a rectangle. All objects that intersect with
    the search rectangle are returned as the result of the search.


    Of course, the attributes included in a GIST index are not necessarily coordinates.
    Such attributes may represent time or other ordered data types.'
  trans: '## 全文搜索


    前面章节讨论的所有内容都适用于结构化数据，并且迄今为止考虑的所有查询都是布尔型的。也就是说，一行数据要么需要用于计算结果，要么不需要；计算出的行要么属于输出，要么不属于。不存在中间状态。SQL
    是一种用于处理结构化数据的强大语言，非常适用于这类分析。


    在本节中，我们将探讨非结构化数据。最常见的非结构化数据例子是用自然语言写成的文本。这类文本通常被称为 `document`（文档）。与结构化数据不同，文档搜索总是不精确的，因为我们通常感兴趣的是文档的含义，而这种含义并未在文档内容中精确表达。然而，搜索标准必须在查询中精确表达。欢迎来到不确定的世界！


    文档搜索有几种不同的模型；PostgreSQL 中实现的模型称为布尔模型。请注意，现代互联网搜索引擎使用更复杂的模型。


    在布尔搜索模型中，一个文档被视为一个 `terms`（词项）列表。每个词项通常对应文档中的一个单词，但会使用特定的语言工具进行转换。这种转换是为了提高搜索质量所必需的。例如，我们期望单词
    “word” 和 “words” 应映射到同一个词项。这些转换并非易事：“a leaf” 和 “leaves” 是同一个单词的不同形式；然而，“to leave”
    则是不同的。而且这不仅仅是词形变化：含义取决于上下文。例如，在描述网络协议的文档中，“host” 和 “computer” 具有相同的含义，但在与组织会议相关的文档中，这些词是不同的。


    在 PostgreSQL 中，定义这些转换的语言规则被封装在一个 `configuration`（配置）中。有几种针对不同语言的预定义配置可用，也可以定义额外的配置。其中一个预定义配置不依赖于任何语言。


    这种语言处理的输出表示为 `ts_vector` 类型的值。`ts_vector` 的值是词项列表，与任何语言甚至文本无关。一个 `ts_vector` 可以从任何值列表构建。


    为什么文本搜索被称为 `full text search`（全文搜索）？在黑暗时代（20 世纪 70 年代），硬盘容量很小，词项列表是从标题或摘要中构建的。因此，全文意味着文档中的所有单词都被视为词项的来源。


    类似地，文档搜索的查询表示为 `ts_query` 类型的值。这些值由查询的文本表示构造而成，该表示可以包含单词以及逻辑运算符 `AND`、`OR` 和 `NOT`。一个简单的查询仅由单词组成（单词之间隐含着
    `AND`）。


    查询中的一个词项（单词）如果存在于文档中则产生 `true`，否则产生 `false`。词项的布尔值使用查询中包含的运算符组合成一个布尔值。对于仅包含词项的简单查询，如果查询中的所有词项都存在于文档对应的
    `ts_vector` 中，则该文档匹配。


    匹配运算符 `@@` 如果文档满足查询则返回 `true`，否则返回 `false`。它可以用在 `SELECT` 语句的 `WHERE` 子句中，或任何需要布尔表达式的地方。


    布尔搜索产生明确的结果：文档要么匹配查询，要么不匹配。这仍然不确定吗？是的，仍然不确定。当文档转换为 `ts_vector` 时，一些信息会丢失；当查询转换为
    `ts_query` 时，一些信息同样会丢失。


    PostgreSQL 的全文搜索功能可以在没有任何索引的情况下工作。PostgreSQL 也提供了可以加速文本搜索的特殊索引类型。我们将在本章后面讨论这些索引类型。


    ## 多维和空间搜索


    前面章节考虑的过滤条件使用了标量属性。某些类型的索引，例如复合索引，可能包含多个属性，但属性的顺序至关重要：如果未指定第一个属性的值，索引就毫无用处。


    对于某些应用程序和数据类型来说，属性的固定顺序是不理想的。这些应用程序要求对多个属性进行对称处理，不偏向任何特定属性。典型的例子是平面或三维空间中具有坐标属性的对象。这类数据被统称为空间数据。


    更重要的是，空间数据通常需要不同类型的查询。最常见的查询是：

    *   *范围查询* – 查找位于空间中某指定点一定距离内或更近的所有对象。

    *   *最近邻查询* – 查找最接近指定点的 k 个对象。

    即使使用多个索引，这些查询也无法通过一维索引来支持。


    当然，这类搜索不仅限于空间。坐标可以带有时间戳值，甚至是离散域中的值。


    PostgreSQL 提供了适合空间数据的索引类型。这些索引将在下一节简要讨论。


    ## PostgreSQL 中的广义索引类型


    `CREATE INDEX` 操作符在创建索引时包含一个可选的索引类型。到目前为止，前面的例子中尚未演示这一点，因为之前创建的所有索引都是 B-tree 索引，而
    B-tree 是索引类型的默认值。其他可能的值（在撰写本文时）包括 `hash`、`GIST`、`spgist`、`GIN`、`BRIN` 以及用户定义类型（如果已安装）。


    本节将更详细地讨论其中一些类型。


    ### GIST 索引


    一些应用程序使用多属性对象，例如在表面或平面上具有坐标的点。之前我们讨论了包含多个属性的复合索引。然而，复合索引不是对称的：属性是有序的。相比之下，点的坐标应该被对称处理。


    GIST 是一个索引结构家族，其中的每一个都支持特定的数据类型，并且可以配置为实现几种不同的基于树的索引结构。具体来说，它为空间数据实现了称为 R 树 的索引结构。PostgreSQL
    发行版包含了对 R 树 和其他几种索引的支持；更多类型可以作为扩展安装。


    作为 `GIST` 索引类型实现的 R 树 正是此处所需：它为空间对象（如点和矩形）建立索引。形状更复杂的对象在索引中使用矩形边界框表示。搜索条件用矩形表示。所有与搜索矩形相交的对象都作为搜索结果返回。


    当然，包含在 `GIST` 索引中的属性不一定是坐标。这些属性也可以表示时间或其他有序数据类型。'
- fmt: '### Indexes for Full Text Search


    PostgreSQL provides two kinds of indexes that can support text search. First,
    consider `GIN` indexes, where `GIN` stands for Generalized Inverted.


    For the purpose of indexing, a document is considered as a list of terms (or tokens),
    for example, as a value of the `ts_vector` data type discussed previously.


    For each term contained in at least one document, an inverted index contains a
    list of documents containing the term. Thus, the overall structure is symmetrical:
    a document has a list of terms, and a term has a list of documents. This symmetry
    explains why the index type is called inverted.


    Inverted indexes can efficiently support text search. For example, to find documents
    containing all terms specified in a query, PostgreSQL scans all lists of documents
    for these terms and leaves only the documents that appear in the lists for all
    terms in the query. The lists are ordered, so a single pass over the lists is
    sufficient to produce the result set.


    A `GIN` index can be created as a functional index with an expression converting
    the document being indexed into a `ts_vector`, or values of `ts_vector` can be
    stored as a separate column. The advantage of the former approach is that it uses
    less space, while the advantage of the latter is that the index does not depend
    on the configuration (as the configuration is needed only to compute the value
    of `ts_vector`). If the values of `ts_vector` are stored, an index can refer to
    documents written in different natural languages and converted into `ts_vector`
    with different configurations. Generally, pre-computed `ts_vector`s will perform
    better, but this can depend as always on the function used to generate the vectors
    and system configuration.


    The structure of `GIN` is not derived from or related to a natural language; as
    noted earlier, it treats documents as lists. Thus, it can work with data other
    than documents—in fact, any attribute type containing multiple values, such as
    arrays. The `GIN` index will find all rows with multivalued attributes containing
    all values specified in a query, just as it finds all documents containing specified
    terms.


    Documents (values of `ts_vector` type) can also be indexed with `GIST`. To build
    such an index, the values of `ts_vector` are converted into bitmaps of fixed length.
    To construct the bitmap, each term that appears in any of the documents being
    indexed is hashed to obtain a number that represents its position in the bitmap.
    Each term is a bitmap of the same length, with a single bit equal to 1 (representing
    the term) and all other bits set to zero. A bitmap for a document is a bitwise
    logical `OR` of all the bitmaps that represent terms in the document. Thus, the
    document bitmap has a bit equal to 1 in all positions corresponding to terms appearing
    in that document. A query bitmap is constructed similarly.


    A search on this index is based on the following fact: a document satisfies the
    query if its bitmap contains 1 in every position that the query bitmap has a 1.


    Different terms can be hashed into the same position. Therefore, a `GIST` index
    can return documents that are not relevant for the query; and usually, a recheck
    of `ts_vector` values is needed, but PostgreSQL can recognize this automatically.


    The number of false matches grows as the number of different terms increases.
    Therefore, the `GIST` index is efficient for collections of documents where the
    total number of different terms is small. This is uncommon with texts in natural
    languages, so `GIN` indexes are usually more efficient in this case. `GIST` indexes
    for textual search are still useful in special cases.


    ### Indexing Very Large Tables


    Any index occupies some space, and indexes on large tables can be very large.
    Is it possible to reduce the size of an index?


    Database textbooks distinguish between dense and sparse indexes. All the indexes
    covered so far are dense; that is, they contain all values of the indexed column
    (or columns). A sparse index contains only a fraction of all values but still
    reduces the number of reads needed to find any value of the indexed attribute.
    This differs from conditional indexes that do not speed up search of values not
    included in the index.


    Some database systems always store table rows in the order of the (surrogate)
    primary key. The index on a primary key can then contain only one value per table
    block, and hence it can be a sparse index. More advanced database systems support
    ordering tables on values of other attributes, which do not necessarily need to
    be unique. This organization of tables also provides for sparse indexes. Sometimes
    these indexes are called cluster indexes as the rows with the same value of the
    indexed column are placed close to each other.


    PostgreSQL does not provide any means for explicitly controlling row ordering.
    However, in many cases, rows are ordered naturally. For example, rows registering
    certain kinds of events will be, most likely, appended to the table and will be
    naturally ordered on the arrival timestamp, making sparse indexing possible.


    A generalization of sparse indexes implemented in PostgreSQL is called `BRIN`
    (for Block Range Index). A table for which a `BRIN` index is created is considered
    a sequence of block ranges, where each range consists of a fixed number of adjacent
    blocks. For each range, a `BRIN` index entry contains a summary of column values
    contained in the block range. For example, a summary may contain the minimum and
    maximum values of the timestamp column in an event log table.


    To find any value of the indexed attribute, it is sufficient to find an appropriate
    block range (using the index) and then scan all blocks in the range.


    The structure of the summarization method depends on the type of the column being
    indexed. For intervals, a summary may be an interval containing all intervals
    contained in the block range. For spatial data, a summary can be a bounding box
    containing all boxes in the block range.


    If the column values are not ordered or rows are not ordered in the table, a scan
    of a `BRIN` index will return multiple block ranges to be scanned.


    The summarization is expensive. Therefore, PostgreSQL provides multiple choices
    for `BRIN` index maintenance: a `BRIN` index can be updated automatically with
    triggers; alternatively, delayed summarization can be done automatically together
    with vacuum or started manually.'
