    # 使用具有嵌套结构的复合类型


    复合类型能否用作其他复合类型的元素？是的，PostgreSQL 允许这样做。


    在图 11-4 中，我们展示了复杂对象 `booking_record` 的结构。其组件之一是复杂对象 `booking_leg_record`。为了将此对象的表示构建为复合类型，首先需要创建
    `flight_record` 类型和 `boarding_pass_record` 类型，然后继续创建 `booking_leg_record` 类型，如代码清单
    12-20 所示。


    ```sql

    CREATE TYPE flight_record AS(

    flight_id int,

    flight_no text,

    departure_airport_code text,

    departure_airport_name text,

    arrival_airport_code text,

    arrival_airport_name text,

    scheduled_departure timestamptz,

    scheduled_arrival timestamptz

    );

    CREATE TYPE booking_leg_record AS(

    booking_leg_id int,

    leg_num int,

    booking_id int,

    flight flight_record,

    boarding_passes boarding_pass_record[]

    );

    ```

    **代码清单 12-20: 更多记录类型定义**


    `booking_leg_record` 类型包含的元素之一是复合类型 `flight_record`，另一个组件是 `boarding_pass_record`
    元素的数组。


    看起来我们解决了第 11 章提出的问题：我们可以创建具有嵌套结构的复合类型，也可以创建返回此类对象的函数。然而，仍然有大量问题需要解决。


    为了说明剩余的问题，让我们创建一个函数，它将使用 `booking_leg_id` 返回整个 `booking_leg_record` 对象。该函数的代码如代码清单
    12-21 所示。


    ```sql

    CREATE OR REPLACE FUNCTION booking_leg_select (p_booking_leg_id int)

    RETURNS SETOF booking_leg_record

    AS

    $body$

    BEGIN

    RETURN QUERY

    SELECT

    bl.booking_leg_id,

    leg_num,

    bl.booking_id,

    (SELECT row(

    flight_id,

    flight_no,

    departure_airport,

    da.airport_name,

    arrival_airport,

    aa.airport_name ,

    scheduled_departure,

    scheduled_arrival)::flight_record

    FROM flight f

    JOIN airport da on da.airport_code=departure_airport

    JOIN airport aa on aa.airport_code=arrival_airport

    WHERE flight_id=bl.flight_id

    ),

    (SELECT array_agg (row(

    pass_id,

    bp.booking_leg_id,

    flight_no,

    departure_airport ,

    arrival_airport,

    last_name ,

    first_name ,

    seat,

    boarding_time)::boarding_pass_record)

    FROM flight f1

    JOIN  boarding_pass bp ON f1.flight_id=bl.flight_id

    AND bp.booking_leg_id=bl.booking_leg_id

    JOIN passenger p ON p.passenger_id=bp.passenger_id)

    FROM booking_leg bl

    WHERE bl.booking_leg_id=p_booking_leg_id

    ;

    END;

    $body$ language plpgsql;

    ```

    **代码清单 12-21: 返回具有嵌套结构的复杂对象的函数**


    不要被前面这个冗长的函数吓到——它确实长，但不算太复杂。我们来仔细看看。


    主 `SELECT` 语句从 `booking_leg` 表中提取数据，使用函数参数值作为搜索条件。记录的前三个元素——`booking_leg_id`、`leg_num`、`booking_id`——直接来自
    `booking_leg` 表。记录的下一个元素是 `flight_record`，其中的 `flight_id` 来自所选航段的 `flight_id`。这个条件在内部
    `SELECT` 的 `WHERE` 子句中设置：


    ```sql

    WHERE flight_id=bl.flight_id

    ```


    我们选择与所选航段相关的航班信息。


    内部函数 `row()` 从一组元素构建行，并且这行被强制转换为 `booking_leg_record` 中期望的 `flight_record` 类型。


    `booking_leg_record` 的最后一个元素是登机牌数组——数量与该预订中的乘客数相同。让我们仔细看看这个内部 `SELECT`：


    ```sql

    (SELECT array_agg (row(

    pass_id,

    bp.booking_leg_id,

    flight_no,

    departure_airport ,

    arrival_airport,

    last_name ,

    first_name ,

    seat,

    boarding_time)::boarding_pass_record)

    FROM flight f1

    JOIN  boarding_pass bp ON f1.flight_id=bl.flight_id

    AND bp.booking_leg_id=bl.booking_leg_id

    JOIN passenger p ON p.passenger_id=bp.passenger_id)

    ```


    你首先会注意到，这个查询与我们在 `boarding_pass_flight` 函数中使用的查询基本相同。不同之处在于：


    *   无需再与 `booking_leg` 表连接，因为它已在外部 `SELECT` 中被选中。我们仍然需要来自 `flight` 表的信息，但我们可以使用所选航段的
    `flight_id`。这样，就与 `flight` 表的一行产生了一个笛卡尔积。

    *   同样，对于登机牌，也不需要连接 `booking_leg` 表；我们直接使用已有的 `booking_leg_id`。


    最后，我们使用内部函数 `array_agg()` 创建一个单一的*记录数组*，这正是 `booking_leg_record` 期望的最后一个元素。


    **注意：** 以上只是构建具有嵌套结构的对象的多种方法之一。在后续章节中，我们将介绍其他方法，这些方法在其他情况下可能更有用。


    现在，坏消息来了。我们费了这么大劲创建这个函数，可当执行它时，结果却有些令人失望。执行


    ```sql

    SELECT * FROM booking_leg_select (17564910)

    ```


    结果如图 12-4 所示。


    ![](img/501585_2_En_12_Fig4_HTML.jpg)


    一张截图展示了一个航段选择的结果数据库。它列出了 5 列和 1 行数据。列标题依次为序号、航段 ID、航段编号、预订 ID 和航班。


    **图 12-4: 返回的具有嵌套结构的复杂对象**


    结果集看起来正是我们想要的，但请注意一个重要细节。对于标量元素，PostgreSQL 保留了元素名称（就像我们从表中选择时一样），但当涉及到本身是复杂对象的元素时，其结构并未展现出来。注意，在内部，PostgreSQL
    仍然保留着内部类型结构的概念，但它并未将其传达给上层。


    为什么这是个问题？第 11 章讨论了 ORM 的陷阱，并在图 11-3 中勾勒了一个假设的解决方案。当时，我们没有讨论实现这一目标的任何具体细节，但有了能够返回复杂类型的函数，解决方案似乎触手可及。然而，当应用程序既无法识别元素名称也无法识别其类型时，函数的输出就变得无用了，至少对于直接从应用程序调用的目的而言是这样。


    解决方案在第 14 章，但现在，让我们专注于那些返回不包含嵌套结构的记录的函数。

    '
- fmt: '## Functions and Type Dependencies


    Chapter [7](#501585_2_En_7_Chapter.xhtml) mentioned dependencies in the context
    of views and materialized views. For materialized views, the definition cannot
    be altered without dropping the object first. This, in turn, means all dependent
    objects must be dropped and recreated, even if the names and the number of columns
    in the materialized view didn’t change. If these dependent objects are, in turn,
    used in other views or materialized views, their dependent objects have to be
    dropped as well.


    This may result in some highly undesirable consequences. We’ve observed situations
    in production systems where one change resulted in a cascade drop of over 60 dependent
    objects, which had to be rebuilt following a particular order.


    Fortunately, we do not have this problem with functions. Since SQL statements
    in the function body are not parsed during function creation, there are no dependencies
    on tables, views or materialized views, or other functions and stored procedures,
    which are used in the function body. For this reason, functions need only be recreated
    when needed as the result of an actual change, not simply due to a cascade drop.


    However, functions create a new type of dependencies: functions depend on their
    returned types, including user-defined types. Just as with materialized views,
    user-defined data types cannot be modified without being dropped first. To drop
    a type, all other user-defined types that include it as an element and all functions
    that depend on that type must be dropped. This might sound like an even worse
    problem, but actually, it is exactly the right problem to have. If a user-defined
    type is modified, some of its elements must have been added, removed, or changed.
    That, in turn, means that `SELECT` statements that return that type of record
    must be revised, so the functions should be dropped.


    In addition, unlike the creation of a materialized view, which may take some time,
    creating a function is nearly instantaneous.


    ## Data Manipulation with Functions


    So far, this chapter has only considered functions that select data. But PL/pgSQL
    functions allow any SQL command, including DML functions.


    Listing [12-22](#501585_2_En_12_Chapter.xhtml#PC42) is a function that issues
    a new boarding pass to a passenger.


    ```sql

    CREATE OR REPLACE FUNCTION issue_boarding_pass(

    p_booking_leg_id int,

    p_passenger_id int,

    p_seat text,

    p_boarding_time timestamptz)

    RETURNS SETOF boarding_pass_record

    AS

    $body$

    DECLARE

    v_pass_id int;

    BEGIN

    INSERT INTO boarding_pass

    (passenger_id,

    booking_leg_id,

    seat,

    boarding_time,

    update_ts)

    VALUES (

    p_passenger_id,

    p_booking_leg_id,

    p_seat,

    p_boarding_time,

    now()) RETURNING pass_id INTO v_pass_id;

    RETURN QUERY

    SELECT  * FROM boarding_passes_pass(v_pass_id);

    END;

    $body$

    LANGUAGE plpgsql;

    Listing 12-22

    Create a new boarding pass

    ```


    Note the call to the function `boarding_passes_pass` in this function body. This
    function was created earlier, but even if it didn’t exist, the `CREATE FUNCTION`
    operator wouldn’t signal an error until this function is executed. There are pros
    and cons to this behavior. It gives more flexibility during development, but it
    can also create issues because the fact that the embedded function was removed
    or is not working properly might go unnoticed. Executing this function is the
    same as other functions:


    ```sql

    SELECT * FROM issue_boarding_pass(175820,462972, ''22C'', ''2023-06-16 21:45''::timestamptz)

    ```


    Note that this execution does not make much sense because the flight departed
    in the past, so it is present here for illustrative purposes only. Figure [12-5](#501585_2_En_12_Chapter.xhtml#Fig5)
    presents the result of this execution—the data has the same format as for other
    functions that return boarding passes.


    ![](Images/501585_2_En_12_Fig5_HTML.jpg)


    A screenshot presents a result database of issued boarding passes. It lists 10
    columns and 1 row of data. The column headers are serial number, boarding pass
    and booking leg I Ds, flight number, departure and arrival airports, last name,
    first name, seat, and boarding time.


    Figure 12-5


    DML function returning a user-defined type


    When creating this function, we made some assumptions that we would not hold up
    in real life. For example, the function doesn’t check whether a boarding pass
    for that passenger and that flight was already issued, doesn’t check seat availability
    against the seat chart, and does not capture possible errors on `INSERT`. In a
    production environment, this function would be much more complex.


    ## Functions and Security


    In this book, we do not cover data access control/permissions in PostgreSQL, mostly
    because this topic is not related to performance. However, we will cover a little
    bit about setting up security for PostgreSQL functions and a surprising link between
    function security settings and performance.


    One of the parameters in the `CREATE FUNCTION` operator that was not covered earlier
    is `SECURITY`. This parameter has only two allowed values: `INVOKER` and `DEFINER`.
    The former is a default value; it indicates that the function will be executed
    using the set of privileges of the user who calls the function. That means that
    in order to be able to execute a function, a user should have relevant access
    to all the database objects that are used in the function body. If we explicitly
    specify `SECURITY DEFINER`, a function will be executed with the permissions of
    the user who created the function. Note that in contrast to other database object
    permissions, the execution privilege for any function is granted by default to
    `PUBLIC`.


    Many of you (as well as us, your authors) have been in a situation where a power
    business user needs to have access to some critical data, but you do not want
    to give them `READ ALL` access, because you are not entirely sure about their
    SQL skills and whether their queries might bring the whole system down.


    In this case, a compromise might be in order—you would create a function that
    pulls all the necessary data using a performant query, create this function with
    the `SECURITY DEFINER` parameter, remove execution permission from everybody (from
    `PUBLIC`), and then give this power user the execution permission. The sequence
    of actions is presented in Listing [12-23](#501585_2_En_12_Chapter.xhtml#PC44).


    ```sql

    CREATE FUNCTION critical_function (par1 ...)

    RETURNING SETOF...

    AS $FUNC$

    ...

    END:

    $FUNC$

    LANGUAGE plpgsql

    SECURITY DEFINER;

    --

    REVOKE EXECUTE ON critical_function (par1 ...)

    FROM public;

    GRANT EXECUTE ON critical_function (par1 ...)

    TO powerbusinessuser;

    Listing 12-23

    Usage of the SECURITY DEFINER function

    ```'
