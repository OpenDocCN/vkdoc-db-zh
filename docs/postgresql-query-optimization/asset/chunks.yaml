    from tables in that no data is stored; only the query that defines the view is
    stored in the database.


    Let’s take another look at the query in Listing 6-14\. This query calculates the
    totals for all flights in the `postgres_air` schema, but we want to use this query
    logic to select the totals for specific flights and/or departure airports. Listing
    [7-4](#501585_2_En_7_Chapter.xhtml#PC8) creates a view that encapsulates this
    logic.


    ```

    CREATE VIEW flight_stats AS

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2

    Listing 7-4

    Create a view

    ```


    Now it is easy to select flight statistics for any particular flight:


    ```

    SELECT *

    FROM flight_stats

    WHERE flight_id=222183

    ```


    This query plan looks identical to the plan in Figure [6-13](#501585_2_En_6_Chapter.xhtml#Fig13).
    The reason is that in the first step of query processing, the query parser transforms
    views into inline subqueries. In this case, this works to our advantage, since
    the filtering condition is pushed inside the grouping. But if a nonconstant search
    criterion is used, the results might be disappointing. In Listing [7-5](#501585_2_En_7_Chapter.xhtml#PC10),
    flight statistics from the view `flight_stats` are limited by the flight’s departure
    date.


    ```

    SELECT *

    FROM flight_stats fs

    JOIN (SELECT

    flight_id

    FROM flight f

    WHERE actual_departure between ''2023-08-01'' and ''2023-08-14''

    ) fl

    ON fl.flight_id=fs.flight_id

    Listing 7-5

    Query using the view

    ```


    The execution plan for this query is shown in Figure [7-3](#501585_2_En_7_Chapter.xhtml#Fig3).


    ![](Images/501585_2_En_7_Fig3_HTML.jpg)


    A query plan comprises 24 lines of text. The lines include the hash join, group
    aggregate, hash condition, group key, sort key, sequential scan on booking, and
    other details.


    Figure 7-3


    Execution plan in which the condition can’t be pushed


    Looking at this execution plan, we observe that first, the statistics for all
    flights are calculated, and only after that are the results joined with selected
    flights. The execution time of this query is ten minutes.


    Without using the view, we follow the pattern explained in Chapter [6](#501585_2_En_6_Chapter.xhtml),
    filtering the flights before grouping, as shown in Listing [7-6](#501585_2_En_7_Chapter.xhtml#PC11).


    ```

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    WHERE actual_departure between ''2023-08-01'' AND ''2023-08-14''

    GROUP BY 1,2

    Listing 7-6

    Rewriting the query without the view

    ```


    The execution plan for this query is shown in Figure [7-4](#501585_2_En_7_Chapter.xhtml#Fig4)
    and shows that the restrictions on the `flight` table are applied first. The execution
    time for this query is three minutes.


    ![](Images/501585_2_En_7_Fig4_HTML.jpg)


    A query plan comprises 20 lines of text. The lines include the group aggregate,
    hash condition, group key, sort key, sequential scan on passenger, booking, recheck
    condition, and other details.


    Figure 7-4


    Execution plan for Listing [7-6](#501585_2_En_7_Chapter.xhtml#PC11)


    It is misleading when database textbooks, including those teaching PostgreSQL
    basics, state that views can be used “like tables.” In practice, views that were
    originally created solely to encapsulate a stand-alone query are often used in
    other queries, joined to other tables and views, including joining multiple times
    to tables already included in the view, without knowing what’s going on behind
    the scenes.


    On the one hand, people usually create a view precisely for the purpose of encapsulation,
    so that others can use it without needing to figure out selection logic. On the
    other hand, this opacity is the cause of poor query performance. This effect becomes
    especially pronounced when some columns in a view are the results of transformation.
    Consider the view `flight_departure` in Listing [7-7](#501585_2_En_7_Chapter.xhtml#PC12).


    ```

    CREATE VIEW flight_departure as

    SELECT

    bl.flight_id,

    departure_airport,

    coalesce(actual_departure, scheduled_departure)::date

    AS  departure_date,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2,3

    Listing 7-7

    View with column transformation

    ```


    Executing the query


    ```

    SELECT

    flight_id,

    num_passengers

    FROM flight_departure

    WHERE flight_id =22183

    ```


    …the filter on the flight will be pushed inside the view, and the query will be
    executed in 63 ms. A user who isn’t aware that flight_departure is a view might
    think that all columns have comparable performance and might be surprised to see
    the result when running the following query:


    ```

    SELECT

    flight_id,

    num_passengers

    FROM flight_departure

    WHERE departure_date= ''2023-08-01''

    ```


    This query takes 2.5 sec or forty times longer to execute. The difference is because
    the `departure_date` column is a transformation, and as discussed in Chapter [5](#501585_2_En_5_Chapter.xhtml),
    no indexes can be utilized to apply this filter. The execution plan for this query
    is shown in Figure [7-5](#501585_2_En_7_Chapter.xhtml#Fig5). Notice that although
    indexes on scheduled_departure and actual_departure are not used, PostgreSQL still
    correctly identifies the order of joins and searches the `flight` table first
    and then uses index access for tables `booking` and `passenger`.


    ![](Images/501585_2_En_7_Fig5_HTML.jpg)


    A query plan comprises 18 lines. The lines include the subquery scan on flight
    departure, group aggregate, group key, sort key, nested loop, hash join, hash
    condition, sequential scan on flight, and other details.


    Figure 7-5


    Execution plan when some indexes can’t be utilized


    An even worse case of performance degradation is shown in Listing [7-8](#501585_2_En_7_Chapter.xhtml#PC15).
    Unfortunately, this is a real-life case. When a person using a view does not know
    what query was used to create it, they might use it to select data that is much
    easier to obtain from the underlying tables.


    ```

    SELECT

    flight_id

    FROM flight_departure

    WHERE departure_airport=''ORD''

    Listing 7-8

    Selection of only one column from the view

    ```


    This query doesn’t concern itself with the number of passengers on a flight; it
    merely selects flights departing from ORD for which any tickets were sold. And
    yet, the execution plan for Listing [7-8](#501585_2_En_7_Chapter.xhtml#PC15) is
    quite complex—see Figure [7-6](#501585_2_En_7_Chapter.xhtml#Fig6).


    ![](Images/501585_2_En_7_Fig6_HTML.jpg)


    A query plan comprises 20 lines. They include the subquery scan on flight departure,
    group aggregate, group key, sort key, nested loop, joined filter, hash join, hash
    condition, sequential scan on flight, index condition, and other details.


    Figure 7-6


    Execution plan for the query in Listing [7-8](#501585_2_En_7_Chapter.xhtml#PC15)


    This query runs for 3.1 seconds. However, a query that selects the same information
    without using the view


    ```

    SELECT

    flight_id

    FROM flight

    WHERE departure_airport=''ORD''

    AND flight_id IN (SELECT flight_id FROM booking_leg)

    ```'
