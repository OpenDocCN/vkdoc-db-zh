- fmt: '## Indexes and Join Order


    As mentioned earlier, in short queries, the optimization goal is to avoid large
    intermediate results. That means ensuring that the most restrictive selection
    criteria are applied first. After that, for each join operation, we should ensure
    that the result continues to be small.


    The size of join results may be small either because of restrictions on the joined
    tables (small number of records in join arguments) or because of a semi-join (one
    argument significantly restricts the result size).


    Most of the time, the query planner chooses a correct join order, unless the wrong
    order is forced.


    Let’s start with creation of several more indexes:


    ```sql

    CREATE INDEX account_login ON account(login);

    CREATE INDEX account_login_lower_pattern ON account  (lower(login) text_pattern_ops);

    CREATE INDEX passenger_last_name ON passenger  (last_name);

    CREATE INDEX boarding_pass_passenger_id ON boarding_pass  (passenger_id);

    CREATE INDEX passenger_last_name_lower_pattern ON passenger  (lower(last_name)
    text_pattern_ops);

    CREATE INDEX passenger_booking_id ON passenger(booking_id);

    CREATE INDEX booking_account_id ON booking(account_id);

    CREATE INDEX booking_email_lower_pattern    ON booking

    (lower(email) text_pattern_ops);

    ```


    Now, consider the example in Listing [5-13](#501585_2_En_5_Chapter.xhtml#PC48).


    ```sql

    SELECT

    b.account_id,

    a.login,

    p.last_name,

    p.first_name

    FROM passenger p

    JOIN booking b USING(booking_id)

    JOIN account a ON a.account_id=b.account_id

    WHERE lower(p.last_name) LIKE ''smith%''

    AND lower(login) LIKE ''smith%'';

    ```


    Listing 5-13

    Order of joins example


    The execution plan for this query is shown in Figure [5-21](#501585_2_En_5_Chapter.xhtml#Fig21).
    Note that although the first table listed is the table `passenger` and that the
    first selection criterion is applied to the same table, the execution starts with
    the table `account`.


    ![](Images/501585_2_En_5_Fig21_HTML.jpg)


    A query plan comprises 11 text lines. The lines include nested loop, bitmap heap
    scan on account, filter, bitmap index scan on account login lower pattern, index
    conditions, index scan using booking account I d, and other details.


    Figure 5-21


    Order of joins: execution starts from the smaller table, when selectivity is similar


    The reason is that the table `account` contains significantly fewer records than
    the `passenger` table, and although the selectivity of both filters is approximately
    the same, the corresponding index on the `account` table will yield fewer records.
    Note that in this case the pattern index on the `passenger` table is not used
    at all.


    However, the execution plan changes significantly when the criteria look for passengers
    with an uncommon last name—that is, a last name with a very low selectivity. The
    execution plan in Figure [5-22](#501585_2_En_5_Chapter.xhtml#Fig22) indicates
    that in this case, starting processing from the `passenger` table is more restrictive.
    In this case, the PostgreSQL query planner uses the pattern index on the `passenger`
    table and does not use the pattern index on the `account` table.


    ![](Images/501585_2_En_5_Fig22_HTML.jpg)


    A query plan comprises 10 lines. The lines include nested loop, index scan using
    passenger last name lower pattern, index conditions, filters, index scan using
    booking p key, and other details.


    Figure 5-22


    Different selectivity prompts a different join order


    Another thing worth noting while comparing these two plans is that since the first
    query yields significantly more rows, a bitmap index scan is used, while the second
    query uses the regular index scan due to the lower selectivity.


    The `SELECT` statement in Listing [5-14](#501585_2_En_5_Chapter.xhtml#PC50) is
    similar, but instead of joining with the `passenger` table, the join is to the
    `frequent_flyer` table, which is approximately half of the size of the `account`
    table. Of course, to be able to search this table, two more indexes are required:


    ```sql

    CREATE INDEX frequent_fl_last_name_lower_pattern ON frequent_flyer  (lower(last_name)
    text_pattern_ops);

    CREATE INDEX frequent_fl_last_name_lower ON frequent_flyer  (lower(last_name));

    ```


    In this case, execution will start from the table `frequent_flyer`, as shown in
    Figure [5-23](#501585_2_En_5_Chapter.xhtml#Fig23).


    ```sql

    SELECT

    a.account_id,

    a.login,

    f.last_name,

    f.first_name,

    count(*) AS num_bookings

    FROM frequent_flyer f

    JOIN account a USING(frequent_flyer_id)

    JOIN booking b USING(account_id)

    WHERE lower(f.last_name)=''smith''

    AND lower(login) LIKE ''smith%''

    GROUP BY 1,2,3,4

    ```


    Listing 5-14

    Query selecting the number of bookings for each frequent flyer


    ![](Images/501585_2_En_5_Fig23_HTML.png)


    A query plan comprises 18 text lines. The lines include group aggregate, group
    key, sort key, nested loop, hash join, hash condition, bitmap heap scan on account,
    bitmap index scan on account login lower pattern, and other details.


    Figure 5-23


    The execution plan for the query in Listing [5-14](#501585_2_En_5_Chapter.xhtml#PC50)


    ## When Are Indexes Not Used


    So far, this chapter has covered how indexes are used in queries. This section
    turns to situations where indexes are *not used*. Specifically, it discusses two
    situations: how to prevent PostgreSQL from using indexes in some circumstances
    and what to do when an index isn’t being used and we think it ought to be.


    ### Avoiding Index Usage


    *Why* would it be desirable to avoid using an index? Often, database developers
    believe that using indexes improves the performance of any query. We can each
    recall situations where we were asked “to build some indexes to make this query
    run faster.” However, an index is not always needed and in some cases may be counterproductive.
    Two examples from earlier in this chapter (Figures [5-1](#501585_2_En_5_Chapter.xhtml#Fig1)
    and [5-6](#501585_2_En_5_Chapter.xhtml#Fig6)) showed execution plans with sequential
    reads that are nevertheless quite efficient.


    The two main reasons we may want to avoid using indexes are as follows:


    *   A small table is completely read into main memory.

    *   We need a large proportion of the rows of a table to execute a query.


    Is there a way to avoid using existing indexes? Most of the time, the optimizer
    is smart enough to figure out when it should or shouldn’t use indexes. But on
    the rare occasions when it fails, we can modify selection criteria. Recall from
    the beginning of this chapter that column transformations can block the usage
    of indexes. At that time, it was framed as a negative impact of column transformation,
    but it can also be used to improve performance when the goal is to block index
    usage.


    If a column is of a numeric type, it can be modified by adding zero to its value.
    For example, the condition `attr1+0=p_value` will block the usage of an index
    on column `attr1`. For any data type, the `coalesce()` function will always block
    the usage of indexes, so assuming `attr2` is not nullable, the condition can be
    modified to something like `coalesce(t1.attr2, ''0'')=coalesce(t2.attr2, ''0'')`.'
