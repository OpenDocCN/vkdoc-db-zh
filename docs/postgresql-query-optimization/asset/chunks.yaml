  trans: '# 第 16 章 终极优化算法


    ## JSON 与 JSONB 的索引


    有时，为了寻求灵活性，开发者会将表行转换为文本或半结构化格式（`JSON`或`XML`），然后使用文本搜索而非更特定的索引。这种方法当然比外部索引工具更好，但速度明显慢于特定索引。


    回到我们在第 14 章末尾提出的问题：既然我们可以直接将`JSON`类型存储在数据库中，为什么还要费心构建函数将搜索结果转换为`JSON`呢？


    让我们看看这种方法在实践中如何运作。为此，我们来构建一个将预订信息存储为`JSON`对象的表。我们遇到的第一个问题是，不同的应用程序端点可能需要不同的`JSON`结构（我们已经在第
    12 至 14 章中构建了几种不同的记录类型）。但让我们假设我们可以整合不同的需求，并以能满足大多数用例的方式存储数据。我们可以使用清单 15-1 中的代码。


    ```sql

    --创建简化的预订航段记录类型

    CREATE TYPE booking_leg_record_2 AS

    (booking_leg_id integer,

    leg_num integer,

    booking_id integer,

    flight flight_record);

    --创建简化的预订记录类型

    CREATE TYPE booking_record_2 AS

    (     booking_id integer,

    booking_ref text,

    booking_name text,

    email text,

    account_id integer,

    booking_legs booking_leg_record_2[],

    passengers passenger_record[]

    );

    ---创建表

    CREATE TABLE booking_jsonb AS

    SELECT  b.booking_id,

    to_jsonb ( row (

    b.booking_id,  b.booking_ref,  b.booking_name, b.email, b.account_id,

    ls.legs,

    ps.passengers

    ) :: booking_record_2 ) as cplx_booking

    FROM booking b

    JOIN

    (SELECT booking_id,    array_agg(row (

    booking_leg_id, leg_num, booking_id,

    row(f.flight_id, flight_no, departure_airport,

    dep.airport_name,

    arrival_airport,

    arv.airport_name,

    scheduled_departure, scheduled_arrival

    )::flight_record

    )::booking_leg_record_2)  legs

    FROM  booking_leg l

    JOIN flight  f   ON  f.flight_id = l.flight_id

    JOIN   airport dep  ON dep.airport_code =  f.departure_airport

    JOIN   airport arv  ON arv.airport_code =  f.arrival_airport

    GROUP BY booking_id)  ls

    ON b.booking_id = ls.booking_id

    JOIN

    ( SELECT    booking_id,

    array_agg(

    row(passenger_id, booking_id, passenger_no, last_name, first_name):: passenger_record)  as
    passengers

    FROM passenger

    GROUP by booking_id) ps

    ON ls.booking_id = ps.booking_id

    ) ;

    ```

    清单 15-1

    构建一个包含`JSONB`列类型的表


    请注意，我们创建表时使用的是`JSONB`（`JSON`二进制）列类型，而不是`JSON`。这些类型之间的唯一区别在于，`JSONB`存储的是`JSON`数据的二进制表示形式，而非字符串。对于`JSON`类型，你能构建的唯一索引是针对特定标签的
    B 树索引，然后你需要指定完整的路径，包括数组中的索引，这使得例如索引“任意”预订航段变得不可能。


    如果我们想在`JSON`列上构建高性能的索引，就需要使用`JSONB`类型。


    构建这个表需要一些时间。构建一个 GIN 索引也需要一些时间：


    ```sql

    CREATE INDEX idxgin ON booking_jsonb USING GIN (cplx_booking);

    ```


    然而，在这个索引创建之后，感觉我们所有的问题都解决了。现在我们可以使用简单的查询来检索所有需要的数据，无需任何连接和任何复杂的结构构建，如清单 15-2 所示。


    ```sql

    SELECT  *

    FROM  booking_jsonb

    WHERE

    cplx_booking @@ ''$.**.departure_airport_code == "ORD" && $.**.arrival_airport_code
    == "JFK"''

    ```

    清单 15-2

    使用`JSONB`列上的 GIN 索引进行搜索


    图 15-1 中的执行计划证明使用了 GIN 索引。


    ![](img/501585_2_En_15_Fig1_HTML.jpg)


    一个查询计划的截图。它有 4 行代码，用于在预订期间检查出发机场代码 O R D 和到达机场代码 J F K。


    图 15-1

    带有 GIN 索引的执行计划


    有几个问题使得这种方法不如乍看之下那么吸引人。首先，这种搜索仍然比使用 B 树索引的搜索慢。使用第 14 章描述的技术生成的搜索函数能产生相同的结果，但速度快了两到五倍。


    其次，GIN 索引不支持对日期时间属性的搜索，也不支持使用`like`运算符的搜索，或者对任何转换后的属性值（如`lower()`）的搜索。你可以在`WHERE`子句中使用`json_path`表达式和`JSONB`运算符及函数来指定几个复杂的搜索条件（包括正则表达式），但这些条件将通过堆扫描来检查。一个好主意是将这些条件与那些支持索引的条件结合起来。


    实际上，我们见过一个这样构建的生产系统：来自多个表/模式的数据被用来创建`JSON`类型的“搜索文档”，然后添加了`ts_vector`列并为其创建了索引。


    然而，这种方法还有第三个问题。如前所述，一个`JSON`结构只能支持一个层次结构。如果我们按照前面的描述构建了`booking_jsonb`列，我们可以相对容易地更新预订航段中的航班，但我们无法更新实际的出发时间或航班状态。


    这意味着`booking_jsonb`表必须定期重建才能保持有用。事实上，前面提到的那个生产系统有一个复杂的触发器序列，用于重建所有可能受影响的`JSON`数据。在预期更新数量相对较低的情况下，这个限制可能并不关键，但对于航班延误和时刻表变更的情况则并非如此。


    ## 小结


    PostgreSQL 拥有多种不同的索引。本书涵盖了许多种，但并非全部；几乎每个新版本都会出现新的索引类型。如果在本章撰写完成到本书出版期间发布了新的索引，也不足为奇。


    第 5 章和本章都提供了许多示例，说明如何为支持不同的搜索选择正确的索引。为你的系统、针对特定搜索选择最合适的索引并非一项简单的任务。不要止步于为单个列创建
    B 树索引。你需要复合索引吗？函数索引？GIST 索引能帮助你解决问题吗？这个特定查询的响应时间有多关键？这个特定索引对更新的影响有多大？只有你能回答这些问题。


    前面的章节涵盖了大量的优化技术：不仅包括优化`SQL`语句的不同方法，还包括数据库设计如何影响性能、与应用程序开发人员协作的重要性、函数的使用以及数据库性能的许多其他方面。


    尽管如此，引言中提出的问题仍然存在：当你遇到一个现实世界的问题，当你的用户看到沙漏图标而你却不知缘由时，该从何处着手？一个相关但更具挑战性的任务是弄清楚从一开始该做什么。你还没有遇到问题。你有一个任务，可能是一个查询草案，或者你很幸运拥有详细的需求。你如何确保自己做的是对的？


    在本章中，我们将提供一个分步指南，帮助你立即正确地编写查询，并在有选择时，选择适合你的数据库设计。'
- fmt: '## Major Steps


    Figure [16-1](#501585_2_En_16_Chapter.xhtml#Fig1) presents a flowchart that we
    suggest you can use to identify the best strategy for your query in question.
    In the subsequent sections, we will discuss each step in more detail.


    ![](Images/501585_2_En_16_Fig1_HTML.jpg)


    A flow chart of the ultimate optimization algorithm. It has yes or no conditions
    to check short queries and incremental values. If short, find the most restrictive
    filter, process, and build the rest of the query. If long, find the most restrictive
    join, process, and find the best way to group.


    Figure 16-1


    Steps of the Ultimate Optimization Algorithm


    ## Step-by-Step Guide


    ### Step 1: Short or Long?


    The first step is to determine whether the query in question is short or long.
    As discussed in Chapters [5](#501585_2_En_5_Chapter.xhtml) and [6](#501585_2_En_6_Chapter.xhtml),
    looking at the query itself won’t necessarily help you find the answer. Step 1
    is a great time to recall that query optimization starts from gathering requirements,
    and it’s important to work together with business owners and/or business analysts.


    Check whether the business is interested in the most recent data or they need
    to follow historical trends and so on. The business might say that they need to
    see all canceled flights, but it would be a good idea to ask whether they want
    to see all canceled flights from the beginning of time or within the past 24 hours.


    If you determine that the query in question is short, go to step 2; otherwise
    go, to step 3.


    ### Step 2: Short


    So your query is a short query. Which steps do you need to follow to make sure
    that not only is it written in the best possible way but also that query performance
    will be stable even when data volumes grow?


    #### Step 2.1: The Most Restrictive Criteria


    Find the most restrictive criteria for your query. Remember that often you can’t
    tell which criteria this will be by just looking at the query. Query the tables
    to find the number of distinct values of attributes. Be aware of the value distribution
    (i.e., find out which values are the least frequent). When the most restrictive
    criteria are identified, proceed to the next step.


    #### Step 2.2: Check the Indexes


    In this step, you need to check whether there are indexes that support the search
    on the most restrictive condition. This includes the following:


    *   Check whether all search attributes for the most restrictive condition are
    indexed. If the index(es) is missing, request or create one.

    *   If more than one field is involved, check whether a compound index would perform
    better and whether the performance gains are enough to justify the creation of
    an additional index.

    *   Check whether you can use an index-only scan using either a compound or covering
    index.


    #### Step 2.3: Add an Excessive Selection Criterion, If Applicable


    If the most restrictive condition is based on a combination of attributes from
    different tables and thereby can’t be indexed, consider adding an excessive selection
    criterion.


    #### Step 2.4: Building (or Rebuilding) the Query


    Start writing the query by applying the most restrictive criteria; this may mean
    starting from a select from a single table or a join that incorporates the most
    restrictive criteria.


    Do not omit this step. Often, when database developers know the relationships
    between objects, they tend to write all the joins before applying filtering. While
    we are aware that this is an often-recommended approach, we believe that for complex
    queries with multiple joins, it might complicate development. We suggest starting
    from a `SELECT` that you know is executed efficiently and then adding one table
    at a time.


    Check query performance and the execution plan each time you add a new join. Remember,
    optimizers tend to err in estimating the size of intermediate result sets more
    and more the further from the root of the execution tree they are. If the number
    of joins in the query is approaching ten, you may consider either using `CTEs`,
    if you are on version 12 or higher, or you may consider building dynamic SQL.


    ### Step 3: Long


    Your query is a long query. In this case, the first step would be to determine
    whether you can use incremental refresh. Once again, this is when you need to
    work together with the business owner and/or business analysts to understand better
    what the purpose of the query is. Often, requirements are formulated without considering
    data dynamics. When the results of a query are stored in a table and it is updated
    periodically, it can either be pulled fresh each time (a full refresh, pulling
    all data from the dawn of time to the most recently available data), or it can
    be pulled incrementally, bringing in only data that has changed since the last
    data pull. The latter is what we mean by incremental updates. In the vast majority
    of cases, it is possible to pull data incrementally. For example, instead of creating
    the `passenger_passport` materialized view as shown in Chapter [7](#501585_2_En_7_Chapter.xhtml),
    create it as the table `passenger_passport`, and add/update rows when new passport
    information is entered.


    *   If it is possible to use incremental updates, go to step 4.

    *   Otherwise, go to step 5.


    ### Step 4: Incremental Updates


    Treat the query to select recently added/updated records as a short query with
    time of update being the most restrictive criterion. Go to step 2 and follow the
    steps for optimizing short queries.


    ### Step 5: Non-incremental Long Query


    If running incremental updates is not possible, proceed with the following steps
    of long query optimization:


    *   Find the most restrictive join, semi-join, or anti-join, if applicable (refer
    to Chapter [6](#501585_2_En_6_Chapter.xhtml) for details), and make sure it is
    executed first.

    *   Keep adding tables to your join, one by one, and check the execution time
    and the execution plan each time.

    *   Make sure you do not scan any large tables multiple times. Plan your query
    to go through large tables only once, as described in Chapter [6](#501585_2_En_6_Chapter.xhtml).

    *   Pay attention to grouping. In the majority of cases, you need to postpone
    grouping to the last step, that is, you need to make sure that `GROUP BY` is the
    last statement in the execution plan. Be aware of some cases described in Chapter
    [6](#501585_2_En_6_Chapter.xhtml), when grouping should be performed earlier to
    minimize the size of intermediate datasets.'
