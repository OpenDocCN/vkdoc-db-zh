  trans: '

    ## 灵活性与效率和正确性之间的权衡


    支持灵活设计的一个常见论点是“数据结构/模式定义可能会发生变化”。接着，论点认为添加一列是 DDL（数据定义）变更，而添加一行（在键值模型中）只是添加一行数据。


    诚然，现实系统是演进的，为了充分反映这些变化，必须修改现有的数据结构。这可能涉及添加或删除某些属性、更改数据类型或更改关系的基数。然而，进行变更的必然性并不意味着必须使用替代模型，例如文档存储或键值系统。对数据库模式进行变更的成本，必须始终与这些灵活解决方案可能带来的性能和数据完整性缺陷进行权衡。


    前一节提到了在非关系设计中创建任何完整性约束的困难。出于某种原因，人们普遍认为 NoSQL 数据库比关系数据库“更快”。这种说法在极少数情况下可能是真的，但在大多数情况下，情况恰恰相反。水平分布可能会带来性能提升，但这些提升会被需要采取额外步骤来验证数据完整性所带来的成本所抵消。由于在
    EAV 和键值模型中创建索引的困难，还会出现其他潜在的性能问题。


    例如，在 `custom_field` 表的情况下，`passport_exp_date` 应该是一个日期，并且经常需要与其他日期进行比较，例如与航班日期进行比较，以确保护照不会在出发日期之前过期。然而，这个日期存储在一个文本字段中，这意味着必须将其转换为日期类型才能执行类型特定的比较。此外，这种转换只能应用于包含日期类型值的行。


    PostgreSQL 支持部分索引，因此可以仅为包含护照到期日期的行创建索引。然而，它们无法被索引为一种可以高效用作搜索条件的日期类型，因为无法使用像下面这样的易变函数来构建索引：


    ```

    CREATE INDEX custom_field_exp_date_to_date

    ON custom_field(to_date(custom_field_value, ''MM-DD-YYYY''))

    WHERE custom_field_name=''passport_exp_date''

    ```


    这是因为所有日期/时间转换函数都是 `易变` 的，因为它们依赖于当前的会话设置。为了能够在索引中使用转换函数，需要编写一个自定义的转换函数。第 11 章将介绍如何创建用户定义函数。这个函数必须包含异常处理，这意味着格式错误的值将不会被索引。此外，与一开始就拥有一个
    `date` 字段相比，搜索本身也会显著变慢。


    那么，将所有属性打包到一个 JSON 列中的情况呢？会出现类似的索引问题。可以为 JSON 创建索引；例如，对于清单 9-5 中的 `passenger_json`
    表，可以像清单 9-7 所示那样在 `booking_ref` 上创建索引。


    ```

    CREATE INDEX passenger_j_booking_ref

    ON passenger_json ((passenger_info ->> ''booking_ref''));

    清单 9-7

    为 JSON 列创建索引

    ```


    它的速度会比在原始 `passenger` 表上创建索引慢，但会比顺序扫描效果好。然而，对于任何旨在是数字类型或包含日期的值，将遵循与前面示例相同的转换。


    这并不是说这些非关系解决方案完全没有存在理由。


    例如，一个描述欧盟某些法规的表大约有 500 列，并且每次法规变更时只添加一行，大约每五年添加一行。将该表替换为键值的一种变体（辅以几个描述值的附加列），使得数据库和应用开发人员都感到满意。由于数据规模的原因，不存在效率问题。


    在考虑 JSON 列时，我们建议仅在数据只需要作为一个整体对象使用时才使用它们，例如存储外部文档（例如，外部来源的信用报告）。即使在这些情况下，如果某些将用于搜索条件的属性可以被分离出来，建议也将它们解析为额外的、独立的列进行存储，同时将其作为较大对象的组成部分存储。

    '
- fmt: '## Must We Normalize?


    There is hardly a term in relational theory more misused than “normalization.”
    It is commonplace for any number of DBAs, database developers, system architects,
    and others to declare that a system should be “normalized,” but few could provide
    a description of the outcome they are seeking, let alone a definition for normalization.


    This isn’t just snobbery; it’s not necessary for everyone working in the field
    of data management to memorize the definitions of every normal form. Relational
    normalization algorithms aren’t often used in practice. In this sense, normalization
    is “dead” theory, the way that Latin is a dead language. However, scholars still
    find use in studying Latin, and analogously, some knowledge of normalization is
    essential for good database design.


    Informally, a database schema is normalized if all column values depend only on
    the table primary key, and data is decomposed into multiple tables to avoid repetition.


    One of the ways to create a normalized schema is to start by building an ER model:
    if entities are properly defined, the database schema produced from the ER model
    will be normalized. We can say that ER design implicitly includes discovery of
    dependencies. If it is not normalized, typically this indicates that some entities
    are missing.


    Is it really important to normalize a database schema? Does it help performance?
    As is often the case, it depends.


    The primary purpose of normalization is *not* to improve performance. Normalization
    creates a clean logical structure and helps ensure data integrity, especially
    when it is supported by referential integrity constraints. Normalization is needed
    for the same reasons that the relational model is needed: not necessarily to store
    the data, but to ensure data integrity and to be able to use relational querying
    language. The mapping between logical and storage structures is not necessarily
    one-to-one. Ideally, a clean logical structure should be provided for the application
    based on a storage structure optimized for performance.


    On the other hand, there are many real-world entities that are denormalized and
    where normalization does not provide any benefits. The best-known example is the
    postal address. The US postal address consists of the following components: street
    address, city, zip code, and state.


    It is not normalized, as anyone who has ever sent a package at an automated USPS
    kiosk knows. The automated check won’t allow you to enter a zip code that does
    not match the previously entered address. However, we doubt that anyone would
    decide to normalize addresses when they are stored in a database table.


    An often-heard argument in support of denormalized data structure is that “joins
    take time” and that denormalization is needed if we need queries to execute faster.
    Short queries, as discussed in Chapter 5, when constructed properly, require negligible
    additional time for joins, and this should not be traded for data accuracy.


    However, there are cases when performance can indeed be improved through normalization,
    for example, when we need to select distinct values of some attribute with high
    selectivity or, in general, any subset of columns that are repetitive in a non-normalized
    table. In the `postgres_air` schema, the `status` of flights in the `flight` table
    is specified explicitly, which means that to find the list of possible flight
    statuses, one can execute the following query:


    ```sql

    SELECT DISTINCT status

    FROM flight

    ```


    ## Use and Misuse of Surrogate Keys


    Surrogate keys are unique values generated by the system in order to identify
    objects stored in the database. In PostgreSQL, surrogate values may be obtained
    as values selected from a sequence. When a row is inserted, a column specified
    with pseudo-type `serial` receives the next value from a sequence associated with
    the table automatically.


    Surrogate keys are widely used. Some companies have internal standards that require
    use of surrogate keys for every table. However, surrogates have both advantages
    and disadvantages.


    The advantage of surrogates is that the values assigned to different objects are
    guaranteed to be unique. However, the value of a surrogate is not related to other
    attributes of the object and is useless when a stored object needs to be matched
    to a real-world object.


    Uniqueness of surrogates may hide certain errors. A real-world object may be represented
    in the database multiple times with different surrogate keys. For example, if
    a single purchase is registered in a system twice, a customer’s card will be charged
    twice for a single product, and the issue is difficult to resolve without manual
    intervention. That being said, although our recommendation is to use some real-world
    unique attribute for a primary key, it is not always possible. In a database that
    stores all purchases in the supermarket, there is no way to distinguish between
    two bottles of Coke subsequently scanned by the same customer at the self-checkout.
    These two cases must be distinguishable in the source system: the purchase of
    two Coke bottles in one transaction, as opposed to a duplication of the same transaction
    to purchase a single Coke. Similarly, hospital systems may have multiple medical
    record numbers (MRNs) associated with one patient; it’s critical to have a surrogate
    key in this case so all the patient’s clinical data is stored together.


    Sometimes, the presence of a surrogate key in the table is wrongly associated
    with normalization. A requirement to use surrogate keys is commonly explained
    as a way to make the database schema normalized. And, indeed, if there is a unique
    identifier assigned to each row, everything will be normalized. But since the
    unique identifiers would bear no relation to real-world objects, the result may
    be one real-world object mapped to multiple occurrences in the database. For example,
    we’ve seen a system in which each time a customer would enter their address, the
    system would assign a unique identifier for the city, if the city was not in the
    database yet. This way, the system ended up with six different versions of “Chicago.”
    Needless to say, this has nothing to do with normalization and may jeopardize
    both data accuracy and performance.


    The use of surrogate keys may also result in extra joins. The `flight` table refers
    to the `airport` table using three-character codes that are widely used in the
    real world. Airport codes can be extracted from the flight table in this design:


    ```sql

    SELECT

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight;

    ```


    However, if a surrogate key was used for the airport table, returning airport
    codes would necessitate two trips to the airport table:


    ```sql

    SELECT

    d.airport_code,

    a.airport_code,

    f.scheduled_departure

    FROM flight f

    JOIN airport d ON d.airport_id = f.departure_airport_id

    JOIN airport a ON a.airport_id = f.arrival_airport_id

    ```


    Let’s take a closer look at the use of surrogate keys in the `postgres_air` schema.


    The definition of the `airport` table in the `postgres_air` schema is shown in
    Listing 9-8. The primary key of that table is `airport_code`. This column contains
    three-character codes that are used to identify airports in all flight booking
    systems worldwide, and these codes never change. Hence, they are reliable as unique
    identifiers, and surrogate keys are not needed.'
  raw: '## Must We Normalize?


    There is hardly a term in relational theory more misused than “normalization.”
    It is commonplace for any number of DBAs, database developers, system architects,
    and others to declare that a system should be “normalized,” but few could provide
    a description of the outcome they are seeking, let alone a definition for normalization.


    This isn’t just snobbery; it’s not necessary for everyone working in the field
    of data management to memorize the definitions of every normal form. Relational
    normalization algorithms aren’t often used in practice. In this sense, normalization
    is “dead” theory, the way that Latin is a dead language. However, scholars still
    find use in studying Latin, and analogously, some knowledge of normalization is
    essential for good database design.


    Informally, a database schema is normalized if all column values depend only on
    the table primary key, and data is decomposed into multiple tables to avoid repetition.


    One of the ways to create a normalized schema is to start by building an ER model:
    if entities are properly defined, the database schema produced from the ER model
    will be normalized. We can say that ER design implicitly includes discovery of
    dependencies. If it is not normalized, typically this indicates that some entities
    are missing.


    Is it really important to normalize a database schema? Does it help performance?
    As is often the case, it depends.


    The primary purpose of normalization is *not* to improve performance. Normalization
    creates a clean logical structure and helps ensure data integrity, especially
    when it is supported by referential integrity constraints. Normalization is needed
    for the same reasons that the relational model is needed: not necessarily to store
    the data, but to ensure data integrity and to be able to use relational querying
    language. The mapping between logical and storage structures is not necessarily
    one-to-one. Ideally, a clean logical structure should be provided for the application
    based on a storage structure optimized for performance.


    On the other hand, there are many real-world entities that are denormalized and
    where normalization does not provide any benefits. The best-known example is the
    postal address. The US postal address consists of the following components: street
    address, city, zip code, and state.


    It is not normalized, as anyone who has ever sent a package at an automated USPS
    kiosk knows. The automated check won’t allow you to enter a zip code that does
    not match the previously entered address. However, we doubt that anyone would
    decide to normalize addresses when they are stored in a database table.


    An often-heard argument in support of denormalized data structure is that “joins
    take time” and that denormalization is needed if we need queries to execute faster.
    Short queries, as discussed in Chapter [5](#501585_2_En_5_Chapter.xhtml), when
    constructed properly, require negligible additional time for joins, and this should
    not be traded for data accuracy.


    However, there are cases when performance can indeed be improved through normalization,
    for example, when we need to select distinct values of some attribute with high
    selectivity or, in general, any subset of columns that are repetitive in a non-normalized
    table. In the `postgres_air` schema, the `status` of flights in the `flight` table
    is specified explicitly, which means that to find the list of possible flight
    statuses, one can execute the following query:


    ```

    SELECT DISTINCT status

    FROM flight

    ```


    ## Use and Misuse of Surrogate Keys


    Surrogate keys are unique values generated by the system in order to identify
    objects stored in the database. In PostgreSQL, surrogate values may be obtained
    as values selected from a sequence. When a row is inserted, a column specified
    with pseudo-type `serial` receives the next value from a sequence associated with
    the table automatically.


    Surrogate keys are widely used. Some companies have internal standards that require
    use of surrogate keys for every table. However, surrogates have both advantages
    and disadvantages.


    The advantage of surrogates is that the values assigned to different objects are
    guaranteed to be unique. However, the value of a surrogate is not related to other
    attributes of the object and is useless when a stored object needs to be matched
    to a real-world object.


    Uniqueness of surrogates may hide certain errors. A real-world object may be represented
    in the database multiple times with different surrogate keys. For example, if
    a single purchase is registered in a system twice, a customer’s card will be charged
    twice for a single product, and the issue is difficult to resolve without manual
    intervention. That being said, although our recommendation is to use some real-world
    unique attribute for a primary key, it is not always possible. In a database that
    stores all purchases in the supermarket, there is no way to distinguish between
    two bottles of Сoke subsequently scanned by the same customer at the self-checkout.
    These two cases must be distinguishable in the source system: the purchase of
    two Coke bottles in one transaction, as opposed to a duplication of the same transaction
    to purchase a single Coke. Similarly, hospital systems may have multiple medical
    record numbers (MRNs) associated with one patient; it’s critical to have a surrogate
    key in this case so all the patient’s clinical data is stored together.


    Sometimes, the presence of a surrogate key in the table is wrongly associated
    with normalization. A requirement to use surrogate keys is commonly explained
    as a way to make the database schema normalized. And, indeed, if there is a unique
    identifier assigned to each row, everything will be normalized. But since the
    unique identifiers would bear no relation to real-world objects, the result may
    be one real-world object mapped to multiple occurrences in the database. For example,
    we’ve seen a system in which each time a customer would enter their address, the
    system would assign a unique identifier for the city, if the city was not in the
    database yet. This way, the system ended up with six different versions of “Chicago.”
    Needless to say, this has nothing to do with normalization and may jeopardize
    both data accuracy and performance.


    The use of surrogate keys may also result in extra joins. The `flight` table refers
    to the `airport` table using three-character codes that are widely used in the
    real world. Airport codes can be extracted from the flight table in this design:


    ```

    SELECT

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight;

    ```


    However, if a surrogate key was used for the airport table, returning airport
    codes would necessitate two trips to the airport table:


    ```

    SELECT

    d.airport_code,

    a.airport_code,

    f.scheduled_departure

    FROM flight f

    JOIN airport d ON d.airport_id = f.departure_airport_id

    JOIN airport a ON a.airport_id = f.arrival_airport_id

    ```


    Let’s take a closer look at the use of surrogate keys in the `postgres_air` schema.


    The definition of the `airport` table in the `postgres_air` schema is shown in
    Listing [9-8](#501585_2_En_9_Chapter.xhtml#PC14). The primary key of that table
    is `airport_code`. This column contains three-character codes that are used to
    identify airports in all flight booking systems worldwide, and these codes never
    change. Hence, they are reliable as unique identifiers, and surrogate keys are
    not needed.'
  trans: '## 我们必须进行规范化吗？


    在关系理论中，几乎没有比“规范化”更被滥用的术语了。许多数据库管理员、数据库开发人员、系统架构师等人都宣称一个系统应该被“规范化”，但很少有人能描述出他们期望达成的结果，更不用说给出规范化的定义了。


    这不只是自命不凡；并非所有从事数据管理工作的人都需要记住每种范式的定义。关系规范化算法在实践中并不常用。从这个意义上说，规范化是“已死”的理论，就像拉丁语是一种“已死”的语言。然而，学者们仍然发现学习拉丁语是有用的，同样，一些规范化知识对于良好的数据库设计至关重要。


    非正式地说，如果一个数据库模式中所有列值仅依赖于表的主键，并且数据被分解到多个表中以避免重复，那么这个模式就是规范化的。


    创建规范化模式的方法之一是从构建实体关系模型开始：如果实体被正确定义，从实体关系模型生成的数据库模式将是规范化的。可以说，实体关系设计隐含地包含了依赖关系的发现。如果模式没有规范化，通常表明缺失了一些实体。


    对数据库模式进行规范化真的很重要吗？它有助于提升性能吗？通常情况，这要视情况而定。


    规范化的首要目的*并非*提升性能。规范化创建了一个清晰的逻辑结构，并有助于确保数据完整性，尤其是在有参照完整性约束支持的情况下。规范化之所以必要，原因与关系模型的必要性相同：不一定是为了存储数据，而是为了确保数据完整性，并能够使用关系查询语言。逻辑结构与存储结构之间的映射不一定是一一对应的。理想情况下，应该为应用程序提供一个基于为性能优化的存储结构的清晰逻辑结构。


    另一方面，现实世界中存在许多非规范化的实体，规范化并不能带来任何好处。最著名的例子是邮政地址。美国邮政地址由以下部分组成：街道地址、城市、邮政编码和州。


    正如任何曾在自动化美国邮政局自助服务台寄送包裹的人所知，地址并没有被规范化。自动检查不允许您输入与先前输入的地址不匹配的邮政编码。然而，我们怀疑当地址存储在数据库表中时，是否有人会决定对它们进行规范化。


    一个经常听到的支持非规范化数据结构的论点是“连接需要时间”，并且如果需要查询执行得更快，就需要进行反规范化。正如第 5 章所讨论的，如果构造得当，简短的查询用于连接的额外时间可以忽略不计，这不应该为了数据准确性而进行权衡。


    然而，在某些情况下，规范化确实可以提升性能，例如，当我们需要选择具有高选择性的某个属性的不同值，或者一般来说，选择在非规范化表中重复出现的任何列子集时。在
    `postgres_air` 模式中，`flight` 表中的航班 `status` 是显式指定的，这意味着要查找可能的航班状态列表，可以执行以下查询：


    ```sql

    SELECT DISTINCT status

    FROM flight

    ```


    ## 代理键的使用与误用


    代理键是由系统生成的唯一值，用于标识存储在数据库中的对象。在 PostgreSQL 中，代理值可以通过从序列中选择获取。当插入一行时，使用伪类型 `serial`
    指定的列会自动接收与该表关联序列的下一个值。


    代理键被广泛使用。一些公司有内部标准，要求每个表都使用代理键。然而，代理键既有优点也有缺点。


    代理键的优点是保证了分配给不同对象的值是唯一的。但是，代理键的值与对象的其他属性无关，当需要将存储的对象与现实世界的对象进行匹配时，它是无用的。


    代理键的唯一性可能掩盖某些错误。一个现实世界的对象可能在数据库中以不同的代理键表示多次。例如，如果一次购买在系统中被注册了两次，客户的卡将为单个产品被扣费两次，并且没有人工干预很难解决该问题。话虽如此，虽然我们的建议是使用某个现实世界中唯一的属性作为主键，但这并不总是可行的。在存储超市所有购买的数据库中，无法区分同一客户在自助结账时随后扫描的两瓶可乐。源系统必须能够区分这两种情况：一次交易中购买两瓶可乐，与复制同一交易以购买一瓶可乐。同样，医院系统可能将一个患者与多个病历号关联；在这种情况下拥有一个代理键至关重要，以便将患者的所有临床数据存储在一起。


    有时，表中存在代理键被错误地与规范化联系起来。使用代理键的要求通常被解释为使数据库模式规范化的一种方式。而且，确实，如果为每一行分配一个唯一标识符，一切都将是规范化的。但是，由于唯一标识符与现实世界的对象没有关联，结果可能是一个现实世界的对象映射到数据库中的多个条目。例如，我们曾见过一个系统，每当客户输入他们的地址时，如果该城市尚不在数据库中，系统就会为该城市分配一个唯一标识符。结果，系统最终有了六个不同版本的“芝加哥”。不用说，这与规范化无关，并且可能危及数据准确性和性能。


    使用代理键也可能导致额外的连接。`flight` 表使用在现实世界中广泛使用的三字符代码引用 `airport` 表。在这个设计中，可以从航班表中提取机场代码：


    ```sql

    SELECT

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight;

    ```


    但是，如果机场表使用了代理键，返回机场代码将需要两次访问机场表：


    ```sql

    SELECT

    d.airport_code,

    a.airport_code,

    f.scheduled_departure

    FROM flight f

    JOIN airport d ON d.airport_id = f.departure_airport_id

    JOIN airport a ON a.airport_id = f.arrival_airport_id

    ```


    让我们更仔细地看看 `postgres_air` 模式中代理键的使用。


    `postgres_air` 模式中 `airport` 表的定义如代码清单 9-8 所示。该表的主键是 `airport_code`。此列包含三字符代码，这些代码在全球所有航班预订系统中用于标识机场，并且这些代码永远不会改变。因此，它们作为唯一标识符是可靠的，不需要代理键。'
