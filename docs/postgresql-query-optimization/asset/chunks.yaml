    execution plan can be chosen for the same query.


    ## Index Structures


    This section briefly explores the most common index structures, such as trees
    and hash indexes, and touches on some PostgreSQL specifics.


    We show how to estimate the scale of improvement for different types of indexes
    and how to detect cases when index usage won’t provide any performance benefits.'
  trans: '### 比较数据访问算法


    最佳数据访问算法的选择主要取决于查询选择率。图 3-3 展示了不同数据访问算法的成本与选择率的关系。我们有意省略了此图表上的所有具体数字，因为这些数字取决于硬件和表的大小，而定性比较则不受此影响。


    ![](img/501585_2_En_3_Fig3_HTML.jpg)


    成本与选择率的关系折线图。两条曲线从原点开始上升。上方的曲线表示索引访问，下方的曲线表示仅索引访问。一条位于中间、略微上升的直线与上方曲线部分重叠，表示全表扫描。


    图 3-3


    不同数据访问算法的成本与查询选择率关系


    全表扫描的成本函数是线性的，并且几乎是水平的，因为其增长源于输出的生成。通常，对于这种算法，输出生成的成本与其他成本相比可以忽略不计。


    基于索引的表访问成本函数从（几乎）0 开始，并随着选择率的增长而快速增长。当选择率值较大时，增长会放缓，此时的成本显著高于全表扫描的成本。


    最有趣的一点是两个函数的交点：对于较小的选择率值，基于索引的访问更可取；而对于较大的选择率值，全表扫描则更优。交点的位置取决于硬件，并且可能取决于表的大小。对于相对较慢的旋转硬盘驱动器，仅当选择率不超过
    2-5%时，基于索引的访问才更可取。对于固态硬盘或虚拟环境，此值可能更高。在较旧的旋转磁盘驱动器上，随机块访问可能比顺序访问慢一个数量级，因此对于给定的行比例，索引带来的额外开销更高。


    代表仅索引扫描的线是最低的，这意味着如果该算法适用（即所有需要的列都在索引中），它总是更可取。


    查询优化器会估算查询的选择率以及该表和该索引交点的选择率。清单 3-2 所示的查询具有一个范围过滤条件，该条件选择了表中的很大一部分。


    ```

    SELECT

    flight_no,

    departure_airport,

    arrival_airport

    FROM flight

    WHERE scheduled_departure BETWEEN

    ''2023-05-15''  AND  ''2023-08-31'';

    清单 3-2

    使用全表扫描执行的范围过滤查询

    ```


    在这种情况下，优化器选择了全表扫描。


    然而，在同一查询中使用更小的范围（参见清单 3-3）则会导致基于索引的表访问。


    ```

    SELECT

    flight_no,

    departure_airport,

    arrival_airport

    FROM flight

    WHERE scheduled_departure BETWEEN

    ''2023-08-12''  AND  ''2023-08-13'';

    清单 3-3

    使用基于索引的表访问进行范围过滤

    ```


    实际上，查询优化器的工作要复杂得多：过滤条件可以由具有不同选择率值的多个索引支持。可以组合多个索引以生成位图块，从而减少需要扫描的块数。因此，优化器可用的选择方案数量远不止这三种算法。


    因此，数据访问算法之间没有绝对的赢家和输家。任何算法在特定条件下都可能成为赢家。此外，算法的选择取决于存储结构和数据的统计特性。数据库维护称为统计信息的元数据，其中包括列的基数、稀疏性等指标。通常，这些统计信息在应用程序开发期间是未知的，并且可能在应用程序生命周期内发生变化。因此，查询语言的声明性本质对于系统性能至关重要。更具体地说，当表统计信息发生变化或如果其他成本计算因素被调整时，对于相同的查询可能会选择不同的执行计划。


    ## 索引结构


    本节简要探讨最常见的索引结构，如树和哈希索引，并涉及一些 PostgreSQL 的特定内容。


    我们将展示如何估算不同类型索引的改进规模，以及如何检测索引使用无法带来任何性能优势的情况。'
- fmt: '# What Is an Index?


    One might assume that any person who works with databases knows what an index
    is. Alas, a surprising number of people, including database developers and report
    writers and, in some cases, even DBAs, use indexes, even create indexes, with
    only a superficial understanding of what indexes are and how they are structured.
    To avoid misunderstanding, we’ll begin with a definition of what we mean by an
    index.


    There are many types of indexes, so it is foolhardy to search for structural properties
    to recognize an index. Instead, we define an index based on its usage. A data
    structure is called an index if it is


    * A redundant data structure

    * Invisible to the application

    * Designed to speed up data selection based on certain criteria


    The redundancy means that an index can be dropped without any data loss and can
    be reconstructed from data stored elsewhere (in the tables, of course). Invisibility
    means that an application cannot detect if an index is present or absent. That
    is, any query produces the same results with or without an index. And finally,
    an index is created with the hope (or confidence) that it improves performance
    of a specific query or (even better!) several queries.


    The performance improvement does not come for free. As an index is redundant,
    it must be updated when table data are updated. That produces some overhead for
    update operations that is sometimes not negligible. In particular, PostgreSQL
    indexes may have an outsized impact on vacuum operations. However, many database
    textbooks overestimate this overhead. Modern high-performance DBMSs use algorithms
    that reduce the cost of index updates, so usually, it is beneficial to create
    several indexes on a table.


    Although index structures can differ significantly among index types, the speed-up
    is achieved due to a fast check of some filtering conditions specified in a query.
    Such filtering conditions specify certain restrictions on table attributes.


    Figure [3-4](#501585_2_En_3_Chapter.xhtml#Fig4) shows how an index can speed up
    the access to the specific table rows.


    The right part of Figure [3-4](#501585_2_En_3_Chapter.xhtml#Fig4) shows a table,
    and the left represents an index that can be viewed as a special kind of a table.
    Each row of the index consists of an index key and a pointer to a table row. The
    value of an index key usually is equal to the value of a table attribute. The
    example in Figure [3-4](#501585_2_En_3_Chapter.xhtml#Fig4) has airport code as
    its value; hence, this index supports search by airport code.


    A column can have the same value in multiple rows of a table. If this column is
    indexed, the index must contain pointers to all rows containing this value of
    an index key. That is, a key may be logically associated with a list of pointers
    to rows rather than a single pointer.


    In PostgreSQL, for some of the index types, an index contains multiple records,
    that is, the index key is repeated for every pointer to a table row.


    Figure [3-4](#501585_2_En_3_Chapter.xhtml#Fig4) explains how to reach the corresponding
    table row when an index record is located; however, it does not explain why an
    index row can be found much faster than a table row. Indeed, this depends on how
    the index is structured, and this is exactly what is discussed in the following
    subsections.


    ![](Images/501585_2_En_3_Fig4_HTML.jpg)


    A table with 2 columns and 19 rows on the left is mapped to a table with 3 columns
    and 19 rows on the right. Nine elements from the top of the table on the left
    are mapped to the respective rows on the right table.


    Figure 3-4


    Index access to table rows


    ## B-Tree Indexes


    The most common structure of an index is a B-tree. The structure of a B-tree is
    shown in Figure [3-5](#501585_2_En_3_Chapter.xhtml#Fig5); airport codes are the
    index keys. The tree consists of hierarchically organized nodes that are associated
    with blocks stored on a disk.


    ![](Images/501585_2_En_3_Fig5_HTML.jpg)


    A tree diagram. The index 301 is the source. It is divided into index 201 on the
    left and 202 on the right. Index 201 is divided into 101, 102, and 103. Index
    202 is further divided into 104, 105, and 106. Each node contains records.


    Figure 3-5


    An example of a B-tree


    The leaf nodes (shown in the bottom row in Figure [3-5](#501585_2_En_3_Chapter.xhtml#Fig5))
    contain index records exactly like those in Figure [3-4](#501585_2_En_3_Chapter.xhtml#Fig4);
    these records contain an index key and a pointer to a table row. Non-leaf nodes
    (located at all levels except the bottom) contain records that consist of the
    smallest key (in Figure [3-5](#501585_2_En_3_Chapter.xhtml#Fig5), the lowest alphanumeric
    value) in a block located at the next level and a pointer to this block. All records
    in all blocks are ordered, and at least half of the block capacity is used in
    every block.


    Any search for a key `K` starts from the root node of the B-tree. During the block
    lookup, the largest key `P` not exceeding `K` is found, and then the search continues
    in the block pointed to by the pointer associated with `P` until the leaf node
    is reached, where a pointer refers to table rows. The number of accessed nodes
    is equal to the depth of the tree. Of course, the key `K` is not necessarily stored
    in the index, but the search finds either the key or the position where it could
    be located.


    B-trees also support range search (expressed as a `between` or inequality operations
    in `SQL`). As soon as the lower end of the range is located, all index keys in
    the range are obtained with a sequential scan of leaf nodes until the upper end
    of the range is reached. A scan of leaf nodes is also needed to obtain all pointers
    if the index is not unique (i.e., an index value may correspond to more than one
    row).'
