    # 引言


    “优化”是一个足够宽泛的术语，涵盖了性能调优、个人提升以及通过社交引擎进行营销等范畴，并且总是会引发读者的高度期望和希冀。因此，审慎的做法是，并非从介绍本书涵盖什么内容开始，而是首先说明本书为何存在以及不会涵盖什么内容，以避免那些抱有不当期望的读者感到失望。然后，我们将继续介绍本书的主题、目标读者、涵盖内容以及如何从中获得最大收益。


    ## 我们为何撰写本书


    与许多作者一样，我们撰写本书是因为我们觉得我们 `不得不` 写它。我们是教育工作者和实践者；因此，我们既看到了计算机科学学生在课堂上是如何被教导的，也看到了他们在进入职场时所缺乏的知识。我们不喜欢所看到的现状，并希望本书能有助于弥合这一差距。


    在学习数据管理时，大多数学生从未见过真实的生产数据库，更令人担忧的是，他们的许多教授也从未见过。虽然缺乏接触真实系统的机会影响着所有计算机科学学生，但未来的数据库开发人员和数据库管理员（`DBA`）所受的教育受到的影响最为严重。使用一个小型培训数据库，学生可以学习如何编写语法正确的
    `SQL`，甚至可能编写出能准确检索所需数据的 `SELECT` 语句。然而，学习编写高性能的查询需要生产规模的数据集。此外，如果学生使用的数据集能轻松装入计算机主内存，并且无论查询多复杂都能在毫秒内返回结果，那么性能可能成为问题这一点可能并不明显。


    除了缺乏接触真实数据集的机会外，学生通常也不使用业界广泛使用的 `DBMS`。虽然前面的说法对于许多 `DBMS` 都成立，但对于 `PostgreSQL`
    而言，这尤其令人沮丧。`PostgreSQL` 起源于学术环境，并作为一个开源项目进行维护，这使其成为教授关系理论和展示数据库内部原理的理想选择。然而，到目前为止，很少有学术机构在其教育需求中采用
    `PostgreSQL`。


    随着 `PostgreSQL` 的快速发展并成为一个更强大的工具，越来越多的企业选择它而非专有的 `DBMS`，部分原因是为了降低成本。越来越多的 `IT`
    经理正在寻找熟悉 `PostgreSQL` 的员工。越来越多的潜在候选人自学使用 `PostgreSQL`，却错过了充分利用其潜力的机会。


    我们希望本书能帮助所有相关方：求职者、招聘经理、数据库开发人员以及正在为数据需求转向 `PostgreSQL` 的组织。


    ## 不会涵盖的内容


    通常，当用户开始抱怨“一切都慢”或夜间备份在光天化日之下才完成，并且每个人似乎都在说“数据库需要优化”时，讨论几乎完全集中在数据库配置参数上，偶尔会涉及底层的
    `Linux` 参数。人们常常认为，只要选择了正确的参数值并重启了数据库实例，世界上所有的问题就都会迎刃而解。


    我们无数次与期待神奇咒语和作弊码的客户合作过。无数次，当这些客户所求助的“向导”建议他们查找执行最频繁的查询或检查缺失的索引时，他们表达了深深的失望。在礼貌地听完我们所有的建议后，他们仍然追问：那么你能建议
    `任何其他的参数更改` 吗？


    的确，能够一次性解决所有问题是非常诱人的。这种诱惑导致了一种普遍的信念，即存在某种黑魔法和秘密代码，或者在某个桌子底下隐藏着一个能让数据库运行更快的按钮。


    由于我们意识到这些误解，我们希望从一开始就保持透明。以下是通常在优化书籍中会讨论但本书不会涵盖的主题列表，以及原因：


    *   `服务器优化` – 随着大规模迁移到各种云环境以及现有的组织结构，数据库开发人员不太可能对服务器的配置方式有发言权。

    *   `PostgreSQL 配置参数` – 在本书的第二版中，我们确实涵盖了这个主题。然而，它只占本书相对较小的一部分，因为正如我们将要展示的，它们对性能的影响被高估了，而且通常数据库开发人员没有必要的权限来更改它们（少数例外情况除外）。

    *   `分布式系统` – 我们没有足够的相关工业经验。

    *   `事务` – 它们对性能的影响非常有限（尽管我们将会在一些它们可能产生重大影响的案例中讨论）。

    *   `新颖炫酷的功能` – 这些随着每个新版本的发布而改变，我们的目标是涵盖基础内容。

    *   `魔法、仪式、作弊码等` – 我们并不精通这些优化方法。


    市面上有大量书籍涵盖了上述所有主题（除了最后一项），但本书并不在此列。相反，我们专注于数据库开发人员日常面临的挑战：当某个应用程序页面持续超时，当客户在“合同签署”页面前被踢出应用程序，当
    `CEO` 仪表盘显示的是沙漏而不是昨日的产品 `KPI`，或者当增加硬件不可行时。


    我们在本书中介绍的所有内容都已在工业环境中经过测试和实施，尽管它可能看起来像魔法，但我们将解释任何查询性能的提升或缺乏提升的原因。'
- fmt: '## Target Audience


    Most of the time, a book about optimization is viewed as a book for DBAs. Since
    our goal is to prove that optimization is more than just building indexes, we
    hope that this book will be beneficial for a broader audience.


    This book is for IT professionals working in PostgreSQL who want to develop performant
    and scalable applications. It is for anyone whose job title contains the words
    “database developer” or “database administrator” or who is a backend developer
    charged with programming database calls. It is also useful to system architects
    involved in the overall design of application systems running against a PostgreSQL
    database.


    What about report writers and business intelligence specialists? Unfortunately,
    large analytical reports are most often thought of as being slow by definition.
    However, if a report is written without considering how it will perform, the execution
    time might end up being not just minutes or hours, but years! For most analytical
    reports, execution time can be significantly reduced by using simple techniques
    covered in this book.


    ## What Readers Will Learn


    In this book, the readers will learn how to


    *   Identify optimization goals in OLTP (Online Transaction Processing) and OLAP
    (Online Analytical Processing) systems

    *   Read and understand PostgreSQL execution plans

    *   Identify indexes that will improve query performance

    *   Optimize full table scans

    *   Distinguish between long queries and short queries

    *   Choose the right optimization technique for each query type

    *   Avoid the pitfalls of ORM frameworks


    At the end of the book, we present the *Ultimate Optimization Algorithm*, which
    guides a database developer through the process of producing the most performant
    query.


    ## The Postgres Air Database


    Throughout this book, examples are built on one of the databases of a virtual
    airline company called Postgres Air. This company connects over 600 virtual destinations
    worldwide, offers about 32,000 direct virtual flights weekly, and has over 100,000
    virtual members in its frequent flyer program and many more passengers every week.
    The company fleet consists of virtual aircraft.


    Please note that all data provided in this database is fictional and provided
    for illustrative purposes only. Although some data appears very realistic (especially
    descriptions of airports and aircraft), they cannot be used as sources of information
    about real airports or aircraft. All phone numbers, email addresses, and names
    are generated.


    To install the training database on your local system, please refer to the GitHub
    repo: `github.com/Hettie-d/postgres_air`.


    The `README.md` file contains the link to the data directory and detailed installation
    instructions.


    In addition, after you restore the data, you will need to run the script in Listing
    1 to create several indexes.


    ```sql

    SET search_path TO postgres_air;

    CREATE INDEX flight_departure_airport ON flight(departure_airport);

    CREATE INDEX flight_scheduled_departure ON flight  (scheduled_departure);

    CREATE INDEX flight_update_ts ON flight  (update_ts);

    CREATE INDEX booking_leg_booking_id ON booking_leg  (booking_id);

    CREATE INDEX booking_leg_update_ts ON booking_leg  (update_ts);

    CREATE INDEX account_last_name ON account (last_name);

    ```


    Listing 1

    Initial set of indexes


    We will use this database schema to illustrate the concepts and methods that are
    covered in this book. You can also use this schema to practice optimization techniques.


    This schema contains data that might be stored in an airline booking system. We
    assume that you have booked a flight online, at least once, so the data structure
    should be easily understood. Of course, the structure of this database is much
    simpler than the structure of any real database of this kind.


    Anyone who books a flight needs to create an account, which stores login information,
    first and last names, and contact information. We also store data about frequent
    flyers, which might or might not be attached to an account. A person who makes
    a booking can book for several passengers, who might or might not have their accounts
    in the system. Each booking may include several flights (legs). Before the flight,
    each traveler is issued a boarding pass with a seat number.


    The Entity-Relationship (ER) diagram for this database is presented in Figure
    1.


    ![](Images/501585_2_En_BookFrontmatter_Fig1_HTML.jpg)


    A flow diagram represents the relationships between the Passenger, Phone, Frequent
    Flyer, Booking Leg, Fight, Airport, and Boarding Pass entities in the given schema.
    The lines connect entities indicate relationships and the attributes within each
    entity are listed below the entity name.


    Figure 1

    ER diagram of the booking schema


    *   `airport` stores information about airports and contains the airport’s three-character
    (IATA) code, name, city, geographical location, and time zone.

    *   `flight` stores information about flights between airports. For each flight,
    the table stores a flight number, arrival and departure airports, scheduled and
    actual arrival and departure times, aircraft code, and flight status.

    *   `account` stores login credentials, the account holder’s first and last names,
    and possibly a reference to a frequent flyer program membership; each account
    may potentially have multiple phone numbers, which are stored in the `phone` table.

    *   `frequent_flyer` stores information about membership in the frequent flyer
    program.

    *   `booking` contains information about booked trips; each trip may have several
    booking legs and several passengers.

    *   `booking_leg` stores individual legs of bookings.'
  raw: '## Target Audience


    Most of the time, a book about optimization is viewed as a book for DBAs. Since
    our goal is to prove that optimization is more than just building indexes, we
    hope that this book will be beneficial for a broader audience.


    This book is for IT professionals working in PostgreSQL who want to develop performant
    and scalable applications. It is for anyone whose job title contains the words
    “database developer” or “database administrator” or who is a backend developer
    charged with programming database calls. It is also useful to system architects
    involved in the overall design of application systems running against a PostgreSQL
    database.


    What about report writers and business intelligence specialists? Unfortunately,
    large analytical reports are most often thought of as being slow by definition.
    However, if a report is written without considering how it will perform, the execution
    time might end up being not just minutes or hours, but years! For most analytical
    reports, execution time can be significantly reduced by using simple techniques
    covered in this book.


    ## What Readers Will Learn


    In this book, the readers will learn how to


    *   Identify optimization goals in OLTP (Online Transaction Processing) and OLAP
    (Online Analytical Processing) systems


    *   Read and understand PostgreSQL execution plans


    *   Identify indexes that will improve query performance


    *   Optimize full table scans


    *   Distinguish between long queries and short queries


    *   Choose the right optimization technique for each query type


    *   Avoid the pitfalls of ORM frameworks


    At the end of the book, we present the *Ultimate Optimization Algorithm*, which
    guides a database developer through the process of producing the most performant
    query.


    ## The Postgres Air Database


    Throughout this book, examples are built on one of the databases of a virtual
    airline company called Postgres Air. This company connects over 600 virtual destinations
    worldwide, offers about 32,000 direct virtual flights weekly, and has over 100,000
    virtual members in its frequent flyer program and many more passengers every week.
    The company fleet consists of virtual aircraft.


    Please note that all data provided in this database is fictional and provided
    for illustrative purposes only. Although some data appears very realistic (especially
    descriptions of airports and aircraft), they cannot be used as sources of information
    about real airports or aircraft. All phone numbers, email addresses, and names
    are generated.


    To install the training database on your local system, please refer to the GitHub
    repo: *github.com/Hettie-d/postgres_air*.


    The README.md file contains the link to the data directory and detailed installation
    instructions.


    In addition, after you restore the data, you will need to run the script in Listing
    [1](#501585_2_En_BookFrontmatter_OnlinePDF.xhtml#PC1) to create several indexes.


    ```

    SET search_path TO postgres_air;

    CREATE INDEX flight_departure_airport ON flight(departure_airport);

    CREATE INDEX flight_scheduled_departure ON flight  (scheduled_departure);

    CREATE INDEX flight_update_ts ON flight  (update_ts);

    CREATE INDEX booking_leg_booking_id ON booking_leg  (booking_id);

    CREATE INDEX booking_leg_update_ts ON booking_leg  (update_ts);

    CREATE INDEX account_last_name ON account (last_name);

    Listing 1

    Initial set of indexes

    ```


    We will use this database schema to illustrate the concepts and methods that are
    covered in this book. You can also use this schema to practice optimization techniques.


    This schema contains data that might be stored in an airline booking system. We
    assume that you have booked a flight online, at least once, so the data structure
    should be easily understood. Of course, the structure of this database is much
    simpler than the structure of any real database of this kind.


    Anyone who books a flight needs to create an account, which stores login information,
    first and last names, and contact information. We also store data about frequent
    flyers, which might or might not be attached to an account. A person who makes
    a booking can book for several passengers, who might or might not have their accounts
    in the system. Each booking may include several flights (legs). Before the flight,
    each traveler is issued a boarding pass with a seat number.


    The Entity-Relationship (ER) diagram for this database is presented in Figure
    [1](#501585_2_En_BookFrontmatter_OnlinePDF.xhtml#Fig1).


    ![](Images/501585_2_En_BookFrontmatter_Fig1_HTML.jpg)


    A flow diagram represents the relationships between the Passenger, Phone, Frequent
    Flyer, Booking Leg, Fight, Airport, and Boarding Pass entities in the given schema.
    The lines connect entities indicate relationships and the attributes within each
    entity are listed below the entity name.


    Figure 1


    ER diagram of the booking schema


    *   *airport* stores information about airports and contains the airport’s three-character
    (IATA) code, name, city, geographical location, and time zone.


    *   *flight* stores information about flights between airports. For each flight,
    the table stores a flight number, arrival and departure airports, scheduled and
    actual arrival and departure times, aircraft code, and flight status.


    *   *account* stores login credentials, the account holder’s first and last names,
    and possibly a reference to a frequent flyer program membership; each account
    may potentially have multiple phone numbers, which are stored in the *phone* table.


    *   *frequent_flyer* stores information about membership in the frequent flyer
    program.


    *   *booking* contains information about booked trips; each trip may have several
    booking legs and several passengers.


    *   *booking_leg* stores individual legs of bookings.'
