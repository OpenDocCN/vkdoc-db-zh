- fmt: '

    A screenshot of the 20-line execution plan for listing. It includes group aggregate,
    group key, nested loop, join filter, bitmap heap scan, and index condition.


    Figure 6-14


    Execution plan for Listing 6-17


    However, more complex filtering conditions can’t be pushed inside grouping. Listing
    6-18 calculates the same statistics, but the list of `flight_id` is not passed
    directly but is selected from the `booking_leg` table.


    ```sql

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM (SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2 )a

    WHERE flight_id in

    (SELECT

    flight_id

    FROM flight

    WHERE scheduled_departure BETWEEN ''07-03-2023'' AND ''07-05-2023'');

    ```

    Listing 6-18

    Condition can’t be pushed inside the grouping


    The execution plan (Figure 6-15) shows that grouping is done first and filtering
    is applied to the result of grouping. This means that, first, the calculations
    are performed for all flights in the system and then the subset is selected. The
    total execution time for this query is ten minutes.


    ![](Images/501585_2_En_6_Fig15_HTML.jpg)


    A screenshot of the 25-line execution plan for one flight. It includes merge join,
    merge condition, group aggregate, group key, hash join, hash condition, bitmap
    heap scan, and index condition.


    Figure 6-15


    Execution plan for Listing 6-18


    The query in Listing 6-18 is an example of what we call pessimization—using practices
    that guarantee slowing down the execution of a query. It’s easy to see why this
    query is written the way it is. First, a database developer figures out how to
    perform certain calculations or how to select specific values, and then they apply
    a filter to the result. Thus, they limit the optimizer to a certain order of operations,
    which in this case is not optimal.


    Instead, the filtering can be done in the inner `WHERE` clause. When this change
    is made, there’s no longer a need for an inline `SELECT`—see Listing 6-19.


    ```sql

    SELECT bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    WHERE scheduled_departure

    BETWEEN ''07-03-2023'' AND ''07-05-2023''

    GROUP BY 1,2

    ```

    Listing 6-19

    Condition is pushed inside grouping


    The execution time is about one minute, and the execution plan is shown in Figure
    6-16. This can be expressed as the generalization of the technique explained in
    the previous example.


    ![](Images/501585_2_En_6_Fig16_HTML.jpg)


    A screenshot of the 19-line execution plan with filtering pushed inside grouping.
    It includes group aggregate, group key, hash join, hash condition, bitmap heap
    scan, recheck condition, and index condition.


    Figure 6-16


    Execution plan with filtering pushed inside grouping


    Filter rows are not needed for an aggregate prior to grouping.


    Even the optimal execution of this query is not instantaneous, but it is the best
    we can achieve. Now is a good time to recall that optimization goals should be
    realistic. A long query on large data volumes can’t be executed in a fraction
    of a second, even when executed optimally. The key is to use as few rows as necessary,
    but no fewer.


    ## Grouping: Group First, Select Last


    In some cases, the course of actions should be the opposite: `GROUP BY` should
    be executed as early as possible, followed by other operations. As you might have
    already guessed, this order of actions is desirable when grouping will reduce
    the size of the intermediate dataset.


    The query in Listing 6-20 calculates the number of passengers departing from each
    city by month. In this case, it is not possible to reduce the number of rows needed,
    as all flights are used in the calculation.


    ```sql

    SELECT

    city,

    date_trunc(''month'', scheduled_departure) AS month,

    count(*)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN booking_leg l ON f.flight_id =l.flight_id

    JOIN boarding_pass b ON b.booking_leg_id = l.booking_leg_id

    GROUP BY 1,2

    ORDER BY 3 DESC

    ```

    Listing 6-20

    Calculating number of passengers per city per month


    The execution time for this query is 25 seconds, and the execution plan is in
    Figure 6-17.


    ![](Images/501585_2_En_6_Fig17_HTML.jpg)


    A screenshot of the 19-line execution plan with grouping done last. It includes
    sort, sort key, group aggregate, group key, hash join, hash condition, and sequence
    scan on flight f.


    Figure 6-17


    Execution plan with grouping done last


    The execution of this query is significantly improved with a nontrivial rewrite,
    as shown in Listing 6-21.


    ```sql

    SELECT

    city,

    date_trunc(''month'', scheduled_departure),

    sum(passengers)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN (

    SELECT flight_id, count(*) passengers

    FROM booking_leg l

    JOIN boarding_pass b USING (booking_leg_id)

    GROUP BY flight_id

    ) cnt

    USING (flight_id)

    GROUP BY 1,2

    ORDER BY 3 DESC

    ```

    Listing 6-21

    Query rewrite that forces grouping be done first


    What is happening here? First, the number of departing passengers is summed for
    each flight in the inline view `cnt`. After, the result is joined with the `flight`
    table to retrieve airport code and then joined with the `airport` table to find
    the city where each airport is located. After this, the flight totals are summed
    by city. This way, the execution time is 15 seconds. The execution plan is shown
    in Figure 6-18.


    ![](Images/501585_2_En_6_Fig18_HTML.jpg)


    A screenshot of the 23-line execution plan with grouping forced to be first. It
    includes sort, sort key, group aggregate, group key, hash join, hash condition,
    planned partitions, and sequence scan on flight f.


    Figure 6-18


    Execution plan with grouping forced to be first

