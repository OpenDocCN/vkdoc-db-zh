  trans: '

    ## 阻抗失配


    那么，导致整体性能不佳的根本原因是什么？


    从非常普遍的角度来看，原因在于数据库模型与编程语言模型的不兼容性，这通常被称为 `impedance mismatch`（阻抗失配）。在电气工程中，阻抗是当电压施加时，电路对交流电电阻的广义概念。任何元件的阻抗相位角是该元件两端电压与通过该元件电流之间的相移；如果这个角度接近
    90 度，即使电压和电流都很高，传递的功率也接近 0。


    类似地，数据库查询语言的表达能力和效率与命令式编程语言的优势并不匹配。尽管两者都可能非常强大，但它们结合时可能产生的效果却不如预期。


    命令式编程语言和声明式查询语言各自在完成其设计任务时都表现得极为出色。问题始于我们试图让它们协同工作之时。性能不佳的根源正是数据库模型与编程语言模型的不兼容性。


    应用程序和数据库的设计旨在处理以下方面的操作：


    *   不同大小的对象（粒度）——单个对象 vs. 批量（对象集合）

    *   访问模式（遍历 vs. 通过属性值搜索）

    *   不同的标识方式——地址 vs. 一组属性值


    在本章剩余部分，我们将更详细地讨论这种不兼容性带来的后果。


    ## 一片好心铺就的道路


    上述内容听起来像是我们在将每一个性能问题以及开发者不愿“像数据库一样思考”的责任归咎于应用程序开发者。但是，指责并非解决问题的建设性方式，包括解决糟糕的应用程序性能问题。更具建设性的方法是尝试理解，良好的初衷是如何导致如此痛苦的结果的。


    让我们从审视一些常见的应用程序开发模式开始。


    ### 应用程序开发模式


    最常见的现代软件工程架构模式是分层架构。通常，它包含四个层次：


    *   最终用户界面

    *   业务逻辑

    *   持久化层

    *   数据库


    每一层只允许与相邻层通信，并且鼓励每一层内部，尤其是跨层之间的封装和独立性。在此模型中，业务对象“`customer`”完全不知道数据库表“`Customer`”的存在；事实上，只要持久化层定义了数据库数据与业务层对象之间的映射关系，它可以连接到任何任意的数据库。


    这样做有几个重要原因，主要在于促进快速开发、可维护性、易于应用程序更新以及实现组件的可重用性。表面上显而易见的是，最终用户界面的变更不应实际导致数据库模式的更改。这种严格的分离也有利于并行快速工作：开发者可以处理应用程序的不同部分，并放心地知道，在他们负责的狭窄领域之外，应用程序的其他部分并不依赖于他们正在处理的内部结构或对象实现。当然，多个应用程序可以建立在同一套业务逻辑基础之上似乎也很有用——应用程序的内部逻辑不必为每个新的构建环境重复一遍。


    到目前为止，一切顺利——那么问题出在哪里呢？不幸的是，存在许多陷阱，这种方法并未完全兑现其承诺的收益——至少，在其实现方式中是如此。


    考虑一下集中业务逻辑的想法。首先，当“一个地方”变成了数十万行代码时，将所有逻辑放在一处（即业务层）的好处会有所减弱。在实践中，如此庞大的业务层会导致代码重复——或者更糟，尝试性重复。当业务逻辑层变得臃肿时，很难找到一个完全符合需求的功能——结果往往是，现实世界的业务逻辑在不同方法中以不同方式实现，导致结果各异。


    其次，这种业务逻辑虽然可能可供额外的最终用户界面使用，但它无法供其他直接与数据库交互的业务用途使用——最关键的是报表。因此，报表编写者最终不得不在数据仓库中，或者更糟地在单个报表中，复制应用程序逻辑代码，且无法保证其与应用程序逻辑的等效性。


    此外，采用这种方法时，与持久化层的通信通常仅限于单个对象甚至单个标量值，这实际上削弱了数据库引擎的强大功能。最终用户界面可能知道它需要的所有不同数据元素，但由于它不直接与持久化层通信，数据请求需要通过业务逻辑层进行中介。


    持久化层的典型实现包含与业务对象类一一对应的数据访问类。编写基本的数据库 DML 函数（`INSERT`、`UPDATE`、`DELETE`）是直接了当的，但当需要对这个类的对象集合执行操作时会发生什么？有两条路径：开发者可以创建另一套方法，为对象集合实现相同的功能。然而，这将违反代码复用的原则。或者，更常见的情况是，开发者直接遍历集合，依次调用已定义的用于处理每个单独对象的函数。


    想象一个列出从奥黑尔机场出发的所有乘客的应用程序界面。数据库开发者会认为，要列出所有从奥黑尔机场出发的乘客，他们需要将 `flight` 表与 `boarding_pass`
    表进行连接。所有信息一次性返回。对于应用程序开发者来说，这个任务可能更棘手。他们可能有一个像 `get_flight_by_departure_airport()`
    这样的方法，它接受一个机场代码作为参数并返回一个航班集合。然后，他们可以遍历这些航班，返回每个航班的所有登机牌。实际上，他们在应用程序内部实现了一个嵌套循环连接算法。


    为了避免这种情况，他们可能会采用几种不同的解决方案。他们可以在登机牌对象中添加一个出发机场属性。然而，这会为数据完整性问题打开大门：如果航班记录中的航班起飞时间被更新了，但并非所有登机牌都更新了怎么办？或者，可以定义一个方法，根据航班出发机场检索登机牌，但这将违反对象之间相互不可知的准则。在纯粹的分层方法中，登机牌对象不知道航班对象的存在，航班对象也不知道登机牌。一个同时为两者拉取数据的方法，不应属于其中任何一个对象。

    '
- fmt: '### Shopping List Problem


    Stéphane Faroult^([⁴](#fn4)) 将前面描述的情况称为“购物清单问题”。


    假设你有一张去杂货店的购物清单。在现实生活中，你会去杂货店，推一辆购物车，把清单上的所有物品拿上，结账，打包，带回家，放进冰箱。现在想象一下，如果你不是这样做的，而是每次去商店只拿清单上的第一件物品，然后回家放进冰箱，接着再去商店拿下一件！你会以这种方式处理清单上的每一项。


    这听起来很荒谬吗？是的，但许多应用程序在与数据库交互时，恰恰就是这样做的。


    现在想象一下，为了加快购物速度，专家们建议拓宽杂货店的过道，或者修建更好的道路，或者设计一种新型购物车。


    其中一些建议确实可能有所帮助。但是，即使购物时间减少了30%，与一个简单的流程改进相比——一次性采购所有物品——这也只是九牛一毛。


    “购物清单问题”如何转化为应用程序行为呢？大多数性能问题都是由**太多太小的查询**引起的。正如如果我们继续为每件商品单独跑一趟，更好的高速公路也无法改善购物体验一样，以下常见的建议也无助于提高应用程序性能：


    *   *更强大的计算机* 帮助不大，因为应用程序和数据库有99%的时间都处于等待状态。

    *   *更高的网络带宽* 也无济于事。高带宽网络对于批量数据传输是高效的，但无法显著改善往返所需的时间。时间取决于跳数和消息数量，而不主要取决于消息大小。此外，数据包头的大小与消息大小无关；因此，对于非常短的消息，用于有效载荷的带宽比例很小。

    *   *分布式服务器* 可能提高吞吐量，但不能改善响应时间，因为应用程序是顺序发送数据请求的。


    “太多太小的查询”这种反模式是一个已知了几十年的问题。大约20年前，我们中的一位曾分析过一个应用程序，它需要五到七分钟来生成一个包含约100个字段的HTML表单。应用程序代码结构完美，方法小巧、注释良好、格式漂亮。然而，数据库跟踪显示，为了生成这个表单，应用程序发出了大约16,000次查询——比表单上的字符还多。进一步分析表明，其中几千次查询来自`GetObjectIdByName`方法。每次调用之后，应用程序另一部分（可能由另一位开发者编写）的方法`GetNameByObjectId`又会触发一次查询。由于`name`的值是唯一的，因此第二次调用总是返回第一次调用的参数。而一次提取构建表单所需所有数据的单个查询，在不到200毫秒内就返回了结果。


    面对这些可预见的问题，许多公司尝试了许多相同的、失败的补救措施来提高性能。即使他们最初能取得一些改善，也不会持久。例如，我们曾观察一家公司长达数年的优化努力。


    由于PostgreSQL优化器总是试图利用可用的RAM，这家公司不断增加硬件资源，确保整个数据库能放入主内存。他们从512GB RAM的机器迁移到1TB、2TB，然后是4TB主内存，唯一的限制因素就是相应配置的可用性。每次迁移后，经过短暂的相对满意期，问题会再次出现：数据库增长变大，再次无法完全装入主内存。


    另一种常实施的补救方法是使用键值存储，而不是全功能的数据库管理系统。其理由通常是“应用程序只使用主键访问数据，因此不需要查询引擎”。事实上，这种方法可能会改善单次数据访问的响应时间。然而，它无法改进完成一个业务功能所需的时间。在一个极端案例中，使用主键值检索一条记录平均需要大约十毫秒。同时，一个应用程序控制器操作中执行的数据库调用次数接近一千次，整体性能影响可想而知。


    ### Interfaces


    应用程序与数据库交互次优的另一个原因在于接口层面。通常，应用程序使用诸如ODBC或JDBC之类的通用接口。这些接口将数据库简化视为一组扁平的表。实际上，应用程序和数据库都可以基于复杂的结构化对象进行操作；然而，没有办法通过这种接口传递如此高级别的结构。因此，即使数据库中维护着高级模型，应用程序也无法从中受益。


    要传递一个复杂的数据库对象，应用程序被迫使用单独的查询来获取对象的每个部分，或者使用自定义解析方法，将通过接口返回的扁平表示反序列化为复杂的对象本身。


    主导开发实践的不完善之处对专业人士来说是众所周知的。为什么这些实践如此普遍？


    原因并非技术性的。应用程序开发者几乎总是在时间压力下工作。新产品或新功能有发布截止日期，而这个日期常常是“越快越好”。早期交付带来的经济收益远高于后期交付和更好质量所带来的收益。'
  raw: '### “Shopping List Problem”


    Stephane Faroult^([⁴](#fn4)) describes the situation described previously as the
    “shopping list problem.”


    Suppose you have a shopping list for the grocery store. In real life, you would
    go to the grocery store, get a cart, pick up all the items on your list, check
    out, pack the items up, go home, bring them inside, and put them into your fridge.
    Now imagine that instead, you go to the store, go inside, pick up just the first
    item from your shopping list, go back home, put the item in the fridge, and head
    to the store again! And you would continue in this fashion for every item on your
    list.


    Does this sound ridiculous? Yes, but that’s exactly what many applications do
    when it comes to their interaction with databases.


    Now imagine that in order to speed up the grocery run, experts suggested increasing
    the width of the aisles in the grocery store or building better roads to get there
    or devising a new sort of shopping cart.


    Some of these suggestions could, indeed, help. But even if the shopping time was
    reduced by 30%, it would be a drop in the bucket compared to one simple process
    improvement: picking up all groceries in a single trip.


    How can the shopping list problem be translated to application behavior? Most
    performance problems are caused by **too many queries that are too small.** And
    just as better highways can’t improve the shopping experience if we continue to
    take an extra trip for each item on our list, the following popular suggestions
    do not help application performance:


    *   *More powerful computers* do not help much, as both the application and the
    database are in a wait state for 99% of time.


    *   *Higher network bandwidth* does not help either. High-bandwidth networks are
    efficient for transfer of bulk amounts of data but cannot significantly improve
    the time needed for roundtrips. Time depends on the number of hops and the number
    of messages but does not depend significantly on message size. Furthermore, the
    size of the packet header does not depend on the message size; hence, the fraction
    of bandwidth used for payload is small for very short messages.


    *   *Distributed servers* might improve throughput, but not response time, as
    the application sends requests for data sequentially.


    The anti-pattern of “too many too small queries” has been a known problem for
    several decades. About 20 years ago, one of us had to analyze an application that
    needed five to seven minutes to generate an HTML form containing about 100 fields.
    The application code was perfectly structured into small, well-commented methods
    with nice formatting. However, the database trace showed that to produce this
    form, the application issued about 16,000 queries—more than the characters on
    the form being generated. Further analysis showed that a few thousand of the queries
    were coming from the method `GetObjectIdByName`. Each of these calls was followed
    by a query from the method `GetNameByObjectId` that was invoked from another part
    of the application, probably written by another developer. The values of `name`
    were unique; therefore, the second call always returned the parameter of the first.
    A single query extracting all data needed to build the form returned the output
    in less than 200 milliseconds.


    In the face of these predictable issues, many companies attempt many of the same,
    failed remedies to improve performance. Even if initially they are able to achieve
    some improvement, it does not last long. For example, we observed the optimization
    efforts of one company for several years.


    Since the PostgreSQL optimizer is always trying to take advantage of available
    RAM, this company kept increasing hardware resources, making sure that the whole
    database could fit into main memory. They migrated from machines with 512 GB of
    RAM to 1 TB, 2 TB, and then 4 TB of main memory, when the only limiting factor
    was the availability of the respective configuration. Following each migration,
    after a short period of relative satisfaction, the problem would re-emerge: the
    database would grow bigger and stop fitting into main memory.


    Another remedy that is often implemented is to use a key-value store instead of
    a full-featured DBMS. The argument usually goes something like “the application
    only uses primary keys to access data, so a query engine is not needed.” And,
    in fact, this approach may improve response time for a single data access. However,
    this cannot improve the time needed to complete a business function. In one extreme
    case, a record retrieval using a primary key value would take about ten milliseconds
    on average. At the same time, the number of database calls performed in one application
    controller action was nearly a thousand, with predictable overall performance
    impacts.


    ### Interfaces


    Yet another reason for suboptimal interactions between an application and a database
    is at the level of interfaces. Typically, applications use a generalized interface
    such as ODBC or JDBC. These interfaces provide an oversimplified view of a database
    as a set of flat tables. Actually, both the application and the database can operate
    in terms of complex structured objects; however, there is no way to transfer such
    high-level structures through the interface. Thus, an application cannot benefit
    from the high-level model even if it is maintained in the database.


    To transfer a complex database object, an application is forced to use separate
    queries for each part of a database object or, alternately, to use a custom parsing
    method for deserializing the flat representation as returned over the interface
    into the complex objects themselves.


    The imperfections of dominant development practices are well known to professionals.
    Why are these practices so common?


    The reasons are not technical. Application developers almost always work under
    time pressure. A new product or a new feature has a release deadline, which is
    often “as soon as possible.” The financial gain of early delivery is significantly
    higher than that with later delivery and better quality.'
  trans: '### 购物清单问题


    斯特凡·法鲁尔^(⁴) 将前面描述的情况称为“购物清单问题”。


    假设你有一张去杂货店的购物清单。在现实生活中，你会去杂货店，推一辆购物车，把清单上的所有物品拿上，结账，打包，带回家，放进冰箱。现在想象一下，如果你不是这样做的，而是每次去商店只拿清单上的第一件物品，然后回家放进冰箱，接着再去商店拿下一件！你会以这种方式处理清单上的每一项。


    这听起来很荒谬吗？是的，但许多应用程序在与数据库交互时，恰恰就是这样做的。


    现在想象一下，为了加快购物速度，专家们建议拓宽杂货店的过道，或者修建更好的道路，或者设计一种新型购物车。


    其中一些建议确实可能有所帮助。但是，即使购物时间减少了 30%，与一个简单的流程改进相比——一次性采购所有物品——这也只是九牛一毛。


    “购物清单问题”如何转化为应用程序行为呢？大多数性能问题都是由**太多太小的查询**引起的。正如如果我们继续为每件商品单独跑一趟，更好的高速公路也无法改善购物体验一样，以下常见的建议也无助于提高应用程序性能：


    *   *更强大的计算机* 帮助不大，因为应用程序和数据库有 99%的时间都处于等待状态。

    *   *更高的网络带宽* 也无济于事。高带宽网络对于批量数据传输是高效的，但无法显著改善往返所需的时间。时间取决于跳数和消息数量，而不主要取决于消息大小。此外，数据包头的大小与消息大小无关；因此，对于非常短的消息，用于有效载荷的带宽比例很小。

    *   *分布式服务器* 可能提高吞吐量，但不能改善响应时间，因为应用程序是顺序发送数据请求的。


    “太多太小的查询”这种反模式是一个已知了几十年的问题。大约 20 年前，我们中的一位曾分析过一个应用程序，它需要五到七分钟来生成一个包含约 100 个字段的
    HTML 表单。应用程序代码结构完美，方法小巧、注释良好、格式漂亮。然而，数据库跟踪显示，为了生成这个表单，应用程序发出了大约 16,000 次查询——比表单上的字符还多。进一步分析表明，其中几千次查询来自`GetObjectIdByName`方法。每次调用之后，应用程序另一部分（可能由另一位开发者编写）的方法`GetNameByObjectId`又会触发一次查询。由于`name`的值是唯一的，因此第二次调用总是返回第一次调用的参数。而一次提取构建表单所需所有数据的单个查询，在不到
    200 毫秒内就返回了结果。


    面对这些可预见的问题，许多公司尝试了许多相同的、失败的补救措施来提高性能。即使他们最初能取得一些改善，也不会持久。例如，我们曾观察一家公司长达数年的优化努力。


    由于 PostgreSQL 优化器总是试图利用可用的 RAM，这家公司不断增加硬件资源，确保整个数据库能放入主内存。他们从 512GB RAM 的机器迁移到
    1TB、2TB，然后是 4TB 主内存，唯一的限制因素就是相应配置的可用性。每次迁移后，经过短暂的相对满意期，问题会再次出现：数据库增长变大，再次无法完全装入主内存。


    另一种常实施的补救方法是使用键值存储，而不是全功能的数据库管理系统。其理由通常是“应用程序只使用主键访问数据，因此不需要查询引擎”。事实上，这种方法可能会改善单次数据访问的响应时间。然而，它无法改进完成一个业务功能所需的时间。在一个极端案例中，使用主键值检索一条记录平均需要大约十毫秒。同时，一个应用程序控制器操作中执行的数据库调用次数接近一千次，整体性能影响可想而知。


    ### 接口


    应用程序与数据库交互次优的另一个原因在于接口层面。通常，应用程序使用诸如 ODBC 或 JDBC 之类的通用接口。这些接口将数据库简化视为一组扁平的表。实际上，应用程序和数据库都可以基于复杂的结构化对象进行操作；然而，没有办法通过这种接口传递如此高级别的结构。因此，即使数据库中维护着高级模型，应用程序也无法从中受益。


    要传递一个复杂的数据库对象，应用程序被迫使用单独的查询来获取对象的每个部分，或者使用自定义解析方法，将通过接口返回的扁平表示反序列化为复杂的对象本身。


    主导开发实践的不完善之处对专业人士来说是众所周知的。为什么这些实践如此普遍？


    原因并非技术性的。应用程序开发者几乎总是在时间压力下工作。新产品或新功能有发布截止日期，而这个日期常常是“越早越好”。早期交付带来的经济收益远高于后期交付和更好质量所带来的收益。'
- fmt: '# Welcome to the World of ORM


    The desire to isolate the database language (i.e., SQL) from application developers
    and thus simplify their task (and also reduce the need for the database skills)
    leads to the introduction of software that converts database functions into object
    methods.


    An *object-relational mapper* (ORM) is software that maps a database object to
    an in-memory application object.


    Some ORM developers have claimed that the impedance mismatch problem is solved.
    Objects are mapped one-to-one to database tables, and the underlying structure
    of the database, as well as the generated SQL used to interact with it, is of
    no concern to the application developer. Unfortunately, the cost of this solution
    is unacceptable performance degradation.


    How does ORM work? The process is shown in Figure [11-1](#501585_2_En_11_Chapter.xhtml#Fig1).


    1.  The application disassembles an object into undivisible (scalar) parts.

    2.  The parts are sent to/from the database separately.

    3.  In the database, the complex data structure is present, but all queries run
    separately.


    ![](Images/501585_2_En_11_Fig1_HTML.jpg)


    An architecture diagram of the O R M process to map a database model into an application
    model. Flat tables and J D B C are involved in this process.


    Figure 11-1: How ORM works


    Theoretically, an ORM does not prevent the application from running arbitrary
    database queries; an ORM usually provides methods for that. However, in practice,
    generated queries are almost always used due to time pressures and the simplicity
    with which they are created in the application.


    Because the actual database code is obscured from the developer, database operations
    on sets of objects end up happening very similarly to the non-ORM solution: an
    ORM method returns a list of object IDs from the database, and then each object
    is extracted from the database with a separate query (also generated in the ORM).
    Thus, to process N objects, an ORM issues N + 1 database queries, effectively
    implementing the shopping list pattern described in the previous section.


    Such mapping solves the problem of abstraction from details of data storage but
    does not provide effective means to manipulate datasets.


    In addition, the ORM might hide important implementation details. Take one example,
    observed in a production system: an `IsActive` flag on a `Customer` object to
    denote whether the customer had recent activity. A developer might think that
    this was just an attribute stored in the `customer` table of the database, but
    in actuality, it depended on a complex set of criteria based on customer behavior,
    and this query was run every time the attribute was invoked. Even worse, this
    attribute was used and frequently checked in the code for control flow and visual
    components that displayed differently based on the customer’s status. As a result,
    this complex query ran multiple times to render a single page.


    ## In Search of a Better Solution


    To summarize the preceding, in the application layer, classes and methods for
    tables and sets should be integrated with the database to work effectively (methods
    should be executed by the DB engine). However, most architectures do not allow
    this kind of integration, which leads to reimplementation of database operations
    at the application layer.


    This particular case of impedance mismatch is called *ORIM*—*object-relational
    impedance mismatch**.*


    Consequently, conventional ways of architecting communication between applications
    and databases are the most significant source of application slowness. There is
    no ill will here: application and database developers are doing the best they
    can with the tools they have.


    To address this problem, we need to find a way to *transfer collections of complex
    objects*. Note that in fact, we are looking for a solution for two closely related
    problems. The first problem is inability to transfer “all the data at once,” that
    is, to think and operate in sets. The second problem is inability to transfer
    complex objects without disassembling them before the data transfer to and from
    the application.


    In order to illustrate the desired outcome, let’s look at an example of how a
    web application may interact with the `postgres_air` database. When a user logs
    into the online booking system, the first thing they will see is most likely their
    existing bookings. When they select a specific booking, they will see a screen
    that looks something like the screenshot in Figure [11-2](#501585_2_En_11_Chapter.xhtml#Fig2).


    ![](Images/501585_2_En_11_Fig2_HTML.jpg)


    A screenshot of the reservation. It presents information on flights to Chicago
    on July 2, 2023, from Munich along with return flight details from Chicago to
    Munich on July 9, 2023. Passengers are Kathleen Smith, Doug White, and Martha
    White.


    Figure 11-2: Your reservation screen


    The information that is displayed on your screen is drawn from several different
    tables: `booking`, `booking_leg`, `flight`, `passenger`, and `airport`. After
    check-in, you will also see the boarding passes.


    A web application developed using a traditional approach would access the database
    17 times to display these results: first, to select a `booking_id` list for the
    current user, then select booking details from the booking table, then select
    details for each booking leg (four in total), then select flight details for each
    flight (four more), and then select airport details (another four), and then passenger
    details (another three). However, an application developer knows exactly what
    objects to build to display booking results. On the database side, a database
    developer similarly knows how to select every piece of information needed to build
    this object. The structure of the object should look something like Figure [11-3](#501585_2_En_11_Chapter.xhtml#Fig3).


    ![](Images/501585_2_En_11_Fig3_HTML.jpg)


    A relationship diagram of mapping complex objects. It presents the variables of
    booking record, booking leg record, passenger record, flight record, and boarding
    pass record.


    Figure 11-3: Mapping complex objects


    If we could package data on the database side as such an object and send it to
    the application with one command, the number of database calls would decrease
    dramatically. And fortunately, PostgreSQL can build complex objects. The following
    PostgreSQL features make it possible:


    *   PostgreSQL is an object-relational database.

    *   PostgreSQL supports the creation of custom types.

    *   PostgreSQL functions can return sets, including sets of records.


    Subsequent chapters will discuss functions that return sets of records and support
    of JSON/JSONB data types and custom data types and will show examples of how to
    create these functions and use them in applications.


    ## Summary


    This chapter discussed additional performance aspects that typically are not considered
    related to database optimization. Although, technically speaking, it is not about
    optimizing queries, it presents an approach to optimizing overall application
    performance. As we’ve often stated, SQL queries are not executed in a vacuum;
    they are parts of an application, and the “in between” area of communication between
    the application and database was and still is often omitted from consideration
    by both database and application developers.


    For this reason, we’ve taken the liberty of claiming ownership of this uncharted
    territory and suggesting a path for improvement. Notably, this chapter does not
    provide any practical solutions or any examples of “how to do it right.” Subsequent
    chapters discuss several techniques that together create a powerful mechanism
    to overcome the limitations of traditional ORMs.


    Footnotes [1](#501585_2_En_11_Chapter.xhtml#Fn1_source)   [2](#501585_2_En_11_Chapter.xhtml#Fn2_source)'
