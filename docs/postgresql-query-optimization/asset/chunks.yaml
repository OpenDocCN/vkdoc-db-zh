- fmt: '# Using Multiple Indexes


    In Figure [5-7](#501585_2_En_5_Chapter.xhtml#Fig7), we see an execution plan that
    uses two indexes on the same table—`flight`. The discussion of index-based access
    in Chapter [3](#501585_2_En_3_Chapter.xhtml) was primarily concerned with the
    case of a single index. What happens when there is more than one available? How
    exactly does PostgreSQL use them efficiently?


    The answer is in the word `bitmap`, as seen in the execution plan. Creating in-memory
    bitmaps allows the optimizer to use multiple indexes on one table to speed up
    data access. Let’s look at the query with three filtering criteria for one table,
    all of which are supported by indexes.


    ```sql

    SELECT

    scheduled_departure ,

    scheduled_arrival

    FROM flight

    WHERE departure_airport=''ORD''

    AND arrival_airport=''JFK''

    AND scheduled_departure BETWEEN ''2023-07-03'' AND ''2023-07-04'';

    ```


    *Listing 5-9: A query with three filters on one table*


    The execution plan for this query is shown in Figure [5-10](#501585_2_En_5_Chapter.xhtml#Fig10).


    ![](Images/501585_2_En_5_Fig10_HTML.jpg)


    *Figure 5-10: Execution plan with multiple index scans on one table*


    A query plan comprises 9 lines of text. The lines denote the `Bitmap heap scan
    on the flight`, `recheck condition`, `Bitmap index scan on flight scheduled departure`,
    `flight arrival`, and `index conditions`.


    As discussed in depth in Chapter [3](#501585_2_En_3_Chapter.xhtml), Postgres can
    use the search results from multiple indexes by creating a bitmap of blocks with
    matching records in main memory and then `OR`-ing or `AND`-ing them. After this
    process is completed, the only blocks left are the blocks that satisfy all search
    criteria, and PostgreSQL reads all the records in the remaining blocks to recheck
    the search conditions.


    The blocks will be scanned in physical order, so the index-based ordering will
    be lost.


    Using a bitmap `AND` and `OR` of several index-based searches is a very efficient
    mechanism of applying multiple filters, but not the only one. In the next section,
    we will discuss another option—creating compound indexes.


    # Compound Indexes


    So far, the indexes shown have been on individual columns. This section discusses
    indexes built on multiple columns and their advantages.


    ## How Do Compound Indexes Work?


    Let’s return to the query in Listing [5-9](#501585_2_En_5_Chapter.xhtml#PC32).
    The result of three search criteria applied to the table `flight` can be computed
    by using multiple indexes. Another option would be to create a compound index
    on all three columns:


    ```sql

    CREATE INDEX flight_depart_arr_sched_dep ON  flight(

    departure_airport,

    arrival_airport,

    scheduled_departure)

    ```


    With this index, the execution plan would be as shown in Figure [5-11](#501585_2_En_5_Chapter.xhtml#Fig11).


    ![](Images/501585_2_En_5_Fig11_HTML.jpg)


    *Figure 5-11: A plan that uses a compound index*


    A query plan comprises 2 lines of text. The first line denotes the `index scan
    using flight departure, arrival, and scheduled departure of the flight`. The second
    line denotes the `index condition`.


    This new compound index will support searches by `departure_airport`, by `departure_airport`
    and `arrival_airport`, and by `departure_airport`, `arrival_airport`, and `scheduled_departure`.
    It will not support, however, the searches by `arrival_airport` or `scheduled_departure`.


    The query


    ```sql

    SELECT

    departure_airport,

    scheduled_arrival,

    scheduled_departure

    FROM flight

    WHERE  arrival_airport=''JFK''

    AND scheduled_departure BETWEEN ''2023-07-03'' AND ''2023-07-04''

    ```


    …will produce the execution plan shown in Figure [5-12](#501585_2_En_5_Chapter.xhtml#Fig12).


    ![](Images/501585_2_En_5_Fig12_HTML.jpg)


    *Figure 5-12: A compound index is not used*


    A query plan comprises 7 lines of text. It denotes the `bitmap heap scan on flight`,
    `recheck condition`, `bitmap index scan on flight scheduled departure and arrival`,
    and `index conditions`.


    On the other hand, the query


    ```sql

    SELECT

    scheduled_departure ,

    scheduled_arrival

    FROM flight

    WHERE departure_airport=''ORD'' AND arrival_airport=''JFK''

    AND scheduled_arrival BETWEEN ''2023-07-03'' AND ''2023-07-04'';

    ```


    …will use the compound index, although only for the first two columns, as shown
    in Figure [5-13](#501585_2_En_5_Chapter.xhtml#Fig13).


    ![](Images/501585_2_En_5_Fig13_HTML.jpg)


    *Figure 5-13: A plan that uses the compound index for the first two columns*


    A query plan comprises 5 lines of text. It denotes the `bitmap heap scan on flight`,
    `recheck condition`, `bitmap index scan on flight scheduled departure and arrival`,
    and `index condition`.


    In general, an index on (`X`,`Y`,`Z`) will be used for searches on `X`, (`X`,`Y`),
    and (`X`,`Y`,`Z`) and even (`X`,`Z`) but not on `Y` alone and not on `YZ`. Thus,
    when a compound index is created, it’s not enough to decide which columns to include;
    their order must also be considered.


    Why create compound indexes? After all, the previous section demonstrated that
    using several indexes together will work just fine. There are two major reasons
    to create this type of index: lower selectivity and additional data storage.


    ## Lower Selectivity


    Remember that the lower the selectivity is, the faster the search is, and when
    we are optimizing short queries, our goal is to avoid reading a large number of
    rows at any given point (even if we will be able to filter them out later). Sometimes,
    none of the individual column values are restrictive enough, and only a certain
    combination makes a query short.


    In the example from the previous section, there are 12,922 flights with departure
    airport `ORD` and 10,530 flights that arrive at `JFK`. However, the number of
    flights that originate in `ORD` and land in `JFK` is only 184.


    ## Using Indexes for Data Retrieval


    When all the columns from a `SELECT` statement are included in a compound index,
    they may be retrieved without accessing the table. This is called the `index-only-scan`
    data retrieval method.


    All of the execution plans in the previous section still needed to read records
    from the table after they were located using the `index scan`, because we still
    needed the values from columns that were not included in the index.


    Let’s build one more compound index and include one more column:


    ```sql

    CREATE INDEX flight_depart_arr_sched_dep_sched_arr

    ON flight (departure_airport,

    arrival_airport,

    scheduled_departure,

    scheduled_arrival );

    ```


    The execution plan of the query will instantaneously convert into an `index-only
    scan` as shown in Figure [5-14](#501585_2_En_5_Chapter.xhtml#Fig14).


    ![](Images/501585_2_En_5_Fig14_HTML.jpg)


    *Figure 5-14: A plan with an index-only scan*


    A query plan comprises 2 lines of text. It denotes the `index-only scan using
    departure airport, arrival airport, scheduled departure, and scheduled arrival`,
    along with the `index condition`.


    Note that once again the search was on the first three columns of the index. If
    the search did not include the first column of the index, for example


    ```sql

    SELECT

    departure_airport,

    scheduled_departure ,

    scheduled_arrival

    FROM flight

    WHERE arrival_airport=''JFK''

    AND scheduled_departure BETWEEN ''2023-07-03'' AND ''2023-07-04''

    ```


    …the execution plan will revert to using several indexes with `AND` and `OR`,
    as shown in Figure [5-15](#501585_2_En_5_Chapter.xhtml#Fig15).


    ![](Images/501585_2_En_5_Fig15_HTML.jpg)


    *Figure 5-15: When a search does not include the first index column, a compound
    index is not used*


    A query plan comprises 7 lines of text. It denotes the `bitmap heap scan on flight`,
    `recheck condition`, `bitmap index scan on flight scheduled departure`, `bitmap
    index scan on airport arrival`, and `index conditions`.'
