  trans: '## 索引与连接顺序


    如前所述，在短查询中，优化目标是避免产生大型中间结果。这意味着必须确保最具限制性的选择条件最先被应用。之后，对于每个连接操作，我们都应确保结果集持续保持较小。


    连接结果集较小的原因可能是连接表本身受限（连接参数中的记录数少），或是由于半连接（其中一个参数显著限制了结果集大小）。


    大多数情况下，查询规划器会选择正确的连接顺序，除非被强制指定了错误的顺序。


    让我们从创建更多索引开始：


    ```sql

    CREATE INDEX account_login ON account(login);

    CREATE INDEX account_login_lower_pattern ON account  (lower(login) text_pattern_ops);

    CREATE INDEX passenger_last_name ON passenger  (last_name);

    CREATE INDEX boarding_pass_passenger_id ON boarding_pass  (passenger_id);

    CREATE INDEX passenger_last_name_lower_pattern ON passenger  (lower(last_name)
    text_pattern_ops);

    CREATE INDEX passenger_booking_id ON passenger(booking_id);

    CREATE INDEX booking_account_id ON booking(account_id);

    CREATE INDEX booking_email_lower_pattern    ON booking

    (lower(email) text_pattern_ops);

    ```


    现在，考虑 5-13 清单中的例子。


    ```sql

    SELECT

    b.account_id,

    a.login,

    p.last_name,

    p.first_name

    FROM passenger p

    JOIN booking b USING(booking_id)

    JOIN account a ON a.account_id=b.account_id

    WHERE lower(p.last_name) LIKE ''smith%''

    AND lower(login) LIKE ''smith%'';

    ```


    **清单 5-13**

    连接顺序示例


    此查询的执行计划如图 5-21 所示。注意，尽管列出的第一个表是 `passenger` 表，并且第一个选择条件也作用于该表，但执行却从 `account`
    表开始。


    ![](img/501585_2_En_5_Fig21_HTML.jpg)


    查询计划由 11 行文本组成。这些行包括对 account 表的嵌套循环、位图堆扫描、过滤器、对 account_login_lower_pattern 索引的位图索引扫描、索引条件、使用
    booking_account_id 的索引扫描以及其他细节。


    **图 5-21**

    连接顺序：当选择性相似时，从较小的表开始执行


    原因是 `account` 表包含的记录数远少于 `passenger` 表，尽管两个过滤器的选择性大致相同，但 `account` 表上的相应索引将产生更少的记录。注意，在这种情况下，`passenger`
    表上的模式索引根本未被使用。


    然而，当查询条件寻找姓氏不常见的乘客（即选择性非常低的姓氏）时，执行计划会发生显著变化。图 5-22 中的执行计划表明，在这种情况下，从 `passenger`
    表开始处理更具限制性。此时，PostgreSQL 查询规划器使用了 `passenger` 表上的模式索引，而没有使用 `account` 表上的模式索引。


    ![](img/501585_2_En_5_Fig22_HTML.jpg)


    查询计划由 10 行组成。这些行包括对 passenger_last_name_lower_pattern 的嵌套循环、索引扫描、索引条件、过滤器、使用 booking_pkey
    的索引扫描以及其他细节。


    **图 5-22**

    不同的选择性促使不同的连接顺序


    比较这两个计划时，另一件值得注意的事情是，由于第一个查询产生的行数多得多，因此使用了位图索引扫描；而第二个查询由于选择性较低，使用了常规的索引扫描。


    5-14 清单中的 `SELECT` 语句类似，但不是与 `passenger` 表连接，而是与 `frequent_flyer` 表连接，该表的大小约为
    `account` 表的一半。当然，为了能够搜索这个表，还需要再创建两个索引：


    ```sql

    CREATE INDEX frequent_fl_last_name_lower_pattern ON frequent_flyer  (lower(last_name)
    text_pattern_ops);

    CREATE INDEX frequent_fl_last_name_lower ON frequent_flyer  (lower(last_name));

    ```


    在这种情况下，执行将从 `frequent_flyer` 表开始，如图 5-23 所示。


    ```sql

    SELECT

    a.account_id,

    a.login,

    f.last_name,

    f.first_name,

    count(*) AS num_bookings

    FROM frequent_flyer f

    JOIN account a USING(frequent_flyer_id)

    JOIN booking b USING(account_id)

    WHERE lower(f.last_name)=''smith''

    AND lower(login) LIKE ''smith%''

    GROUP BY 1,2,3,4

    ```


    **清单 5-14**

    查询每位常旅客的预订数量


    ![](img/501585_2_En_5_Fig23_HTML.png)


    查询计划由 18 行文本组成。这些行包括分组聚合、分组键、排序键、嵌套循环、哈希连接、哈希条件、对 account 表的位图堆扫描、对 account_login_lower_pattern
    的位图索引扫描以及其他细节。


    **图 5-23**

    清单 5-14 中查询的执行计划


    ## 何时不使用索引


    到目前为止，本章介绍了索引如何在查询中使用。本节将转向索引*不被使用*的情况。具体来说，它讨论两种情况：如何在某些情况下防止 PostgreSQL 使用索引，以及当索引未被使用而我们认为其应该被使用时该怎么办。


    ### 避免使用索引


    *为什么*需要避免使用索引？通常，数据库开发人员认为使用索引可以提高任何查询的性能。我们每个人都能回忆起被要求“建立一些索引以使此查询运行更快”的情况。然而，索引并非总是必需的，有时甚至可能适得其反。本章前面的两个例子（图
    5-1 和 5-6）展示了尽管包含顺序读取，但仍然相当高效的执行计划。


    我们可能希望避免使用索引的两个主要原因如下：


    *   小表被完全读入主内存。

    *   我们需要执行查询时用到表中很大比例的行。


    是否有办法避免使用现有索引？大多数情况下，优化器足够智能，能够判断何时应该或不应该使用索引。但在极少数失败的情况下，我们可以修改选择条件。回想本章开头提到的，列转换会阻止索引的使用。当时，这被描述为列转换的负面影响，但当目标是阻止索引使用时，它也可以用来提高性能。


    如果列是数字类型，可以通过对其值加零来修改。例如，条件 `attr1+0=p_value` 将阻止对 `attr1` 列上索引的使用。对于任何数据类型，`coalesce()`
    函数总是会阻止索引的使用，因此假设 `attr2` 不可为空，条件可以修改为类似 `coalesce(t1.attr2, ''0'')=coalesce(t2.attr2,
    ''0'')` 的形式。'
- fmt: '### Why Does PostgreSQL Ignore My Index?


    Occasionally, there are extraordinarily frustrating cases, when the appropriate
    index exists, but for some reason, PostgreSQL is not using it. This is the moment
    when a database developer with experience with other systems that allow optimizer
    hints might start really missing them. However, most of the time, there is no
    reason for frustration. Having one of the best optimizers, PostgreSQL does the
    right thing in most cases. So, most likely, there is a good reason, and it is
    possible to find by examining the execution plan.


    Let’s consider an example. This example, as well as some examples in subsequent
    chapters, uses larger tables, which are not included in the `postgres_air` distribution
    due to their size. These tables are necessary to illustrate cases that occur in
    real life and that you might come across. Here, the table `boarding_pass_large`
    is being used, which has the same structure as the `boarding_pass` table, but
    contains three times as many rows—over 75,000,000 boarding passes. To create a
    larger table for experimentation, you can insert every row of the `boarding_pass`
    table three times.


    In the `postgres_air` database, the current date is August 14, 2023. Let’s select
    a sample of 100 passengers who checked in during the last week:


    ```sql

    SELECT * FROM boarding_pass_large

    WHERE update_ts::date BETWEEN ''2023-08-07'' AND ''2023-08-14''

    LIMIT 100

    ```


    Predictably, the execution plan shown in Figure 5-24 shows a sequential scan.


    ```

    [Images/501585_2_En_5_Fig24_HTML.jpg]

    A query plan comprises 3 text lines. The lines include the limit, sequential scan
    on the boarding pass, and filter.

    Figure 5-24

    Sequential scan due to column transformation

    ```


    No problem, we’ve covered how to avoid this issue. Instead of converting the timestamp
    to date, we use an interval:


    ```sql

    SELECT * FROM boarding_pass_large

    WHERE update_ts BETWEEN ''2023-08-07'' AND ''2023-08-15''

    LIMIT 100

    ```


    However, when we check the execution plan, we see that it still uses a sequential
    scan!


    Why didn’t removing the column transformation cause PostgreSQL to use the index?
    The answer is in Figure 5-25. It is the result of the combination of relatively
    high selectivity of this index on a large table and the presence of the `LIMIT`
    operator. The query planner estimates that the specified selection condition will
    select over 700,000 rows, which, recall, might require twice as many disk I/O
    operations. Since only 100 rows are required and since the order is not specified,
    it is faster to go ahead with a sequential scan of the table. There is a higher
    chance that the hundred records that satisfy this criterion will be found faster.


    ```

    [Images/501585_2_En_5_Fig25_HTML.jpg]

    A query plan comprises 3 lines of text. The lines denote the limit, sequential
    scan on the boarding pass, and filter.

    Figure 5-25

    Sequential scan due to high index selectivity

    ```


    The situation would be different if those 100 records needed to be selected in
    a particular order. Unless the sort order is on the indexed attribute, PostgreSQL
    will need to select *all* records before it can decide which ones are first.


    Let’s change the `SELECT` statement to include ordering:


    ```sql

    SELECT * FROM boarding_pass_large

    WHERE update_ts BETWEEN ''2023-08-07'' AND ''2023-08-15''

    ORDER BY boarding_time

    LIMIT 100

    ```


    Now the execution plan (shown in Figure 5-26) looks dramatically different.


    ```

    [Images/501585_2_En_5_Fig26_HTML.jpg]

    A query plan comprises 7 lines. The lines denote the limit, sort, sort key, bitmap
    heap scan on the boarding pass, rechecked condition, bitmap index scan on the
    boarding pass large update, and index condition.

    Figure 5-26

    Execution plan with sorting

    ```


    Comparing the execution time for these two queries, the one with a sequential
    scan ran for 140 milliseconds, and the one with forced index access ran for 620
    milliseconds, so the sequential scan was indeed more efficient in this case.


    ## Let PostgreSQL Do Its Job!


    In this section, we will use several modifications of the queries from the previous
    sections to illustrate how PostgreSQL modifies execution plans based on data statistics.


    We hope that by now, a convincing case has been made that the optimizer does its
    job right most of the time, and our goal in most cases is just to give it enough
    flexibility to make the right choice.


    Let’s get back to the query on a large table from the previous section:


    ```sql

    SELECT * FROM boarding_pass_large

    WHERE update_ts BETWEEN ''2023-08-07'' AND ''2023-08-15''

    LIMIT 100

    ```


    The execution plan for this query is shown in Figure 5-25, and the PostgreSQL
    optimizer chose a sequential scan, because the interval of seven days was too
    large to get any benefits from index access. Now, let’s reduce the time interval:


    ```sql

    SELECT * FROM boarding_pass_large

    WHERE update_ts BETWEEN ''2023-08-12'' AND ''2023-08-15''

    LIMIT 100

    ```


    The execution plan for this query in Figure 5-27 shows that index-based access
    is used.


    ```

    [Images/501585_2_En_5_Fig27_HTML.jpg]

    A query plan comprises 3 lines of text. The lines denote the limit, index scan
    using the boarding pass, and index condition.

    Figure 5-27

    A plan changes to index access when the time interval is smaller

    ```


    Continuing to check different intervals, we will see that eight days is the pivot
    point in this case. If the start of the interval is any date after August 7, the
    execution plan will show index usage.


    Even more interestingly, if `LIMIT 100` is removed from the query, the execution
    plan will show an index scan. If we increase the interval by just one more day,
    the execution plan will divert to a bitmap scan, and if we increase it for one
    more day, it will flip to the sequential scan (see the corresponding execution
    plans in Figures 5-28, 5-29, and 5-30).


    ```

    [Images/501585_2_En_5_Fig30_HTML.jpg]

    A query plan comprises 2 lines. The lines denote the sequential scan on the boarding
    pass large and filter.

    Figure 5-30

    Execution plan using a sequential scan

    ```


    ```

    [Images/501585_2_En_5_Fig29_HTML.jpg]

    A query plan comprises 4 text lines. The lines denote the bitmap heap scan on
    boarding pass large, rechecked condition, bitmap index scan on boarding pass large
    update, and index condition.

    Figure 5-29

    Execution plan using a bitmap scan

    ```


    ```

    [Images/501585_2_En_5_Fig28_HTML.jpg]

    A screenshot denotes a query plan comprising 2 lines of text. The lines denote
    the index scan using the boarding pass large update and index condition. Different
    icons are indicated at the top.

    Figure 5-28

    Execution plan using an index scan

    ```


    Let’s see another example—the query in Listing 5-13. We observed that depending
    on how selective the last name of the passenger is, the order of joins (and applying
    indexes) will change. In fact, experimenting with different last names, it is
    possible to identify the selectivity at which the execution plan flips (around
    200 occurrences).


    Finally, let’s look at one relatively simple SQL statement. Three `SELECT` statements
    in Listing 5-15 are identical except the filtering values for each search criterion.
    In the first query, departure airport has high selectivity, and passenger name
    has low selectivity. In the second query, both values are highly selective, and
    in the last query, departure airport has low selectivity. The plans, shown in
    Figures 5-31, 5-32, and 5-33, differ in join algorithms, the order of joins, and
    the indexes that are used.'
