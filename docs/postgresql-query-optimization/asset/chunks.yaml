    Manifest object as JSON


    ## NORM from a Database Perspective


    In the early stages of the NORM project, the only serious objection to its adoption
    was the necessity of manually creating all data manipulation functions. Agile
    teams didn’t want to spend time on writing additional code, especially when ORMs
    generate code with similar functionality (almost) without human interaction. Nor
    did they want to have an additional person (a database developer) on the team.
    To address these concerns, we added an auto-generation module to NORM, which we
    call NORM-GEN. In this section, we will explain how to generate types and functions
    on the database side, instead of creating them manually. To achieve this goal,
    we need to make one important change to our contract, that is, to find a way to
    define the mapping between application classes and database objects.


    ### Mapping JSON to the Database


    To enable the automatic generation of the database objects, we extend the JSON
    schema syntax with a `db_mapping` key that can be specified for the whole hierarchy,
    an object, or a key. The mapping specifies the database schema, table names and
    column names corresponding to the JSON object and keys, as well as primary and
    foreign key columns that define relationships between objects.


    Listing [14-3](#501585_2_En_14_Chapter.xhtml#PC3) shows how the mapping is specified
    for a part of the contract, namely, for the passenger object. Lines 4–7 of this
    listing define the table corresponding to the JSON object, the primary key of
    the table, the primary key of the parent object, and the name of the complex data
    type that represents the object in the database before conversion to JSON. The
    explicit mapping of lower-level objects can be omitted when JSON key names coincide
    with the table column names.


    ```

