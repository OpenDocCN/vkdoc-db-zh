  trans: '## 业务逻辑如何处理？


    在您能说服应用开发者使用函数与数据库通信的情况下，性能提升是显著的。仅仅消除多次往返这一事实，当我们衡量的是应用程序响应时间而非数据库响应时间时，就足以轻松地将应用程序性能提升数十倍甚至数百倍。


    通往成功道路上最严重的阻碍之一就是 `业务逻辑` 的概念。其中一个定义（来自 [Investopedia.com](http://investopedia.com)）是这样的：


    > `业务逻辑` 是处理数据库和用户界面之间信息交换的定制规则或算法。业务逻辑本质上是计算机程序的一部分，其中包含定义或约束企业如何运营的信息（以业务规则的形式）。


    业务逻辑通常被认为是一个独立的应用层，而当我们将“过多逻辑”放入数据库函数时，应用开发者会不高兴。我们花费了大量时间试图与业务和应用开发者找到共同点。这些讨论的结果可以总结如下：


    *   我们需要一些业务逻辑来执行连接和选择。

    *   选定的结果转换和操作不必在数据库端执行。


    在实践中，这意味着在决定什么可以放入数据库、什么必须留在应用程序中时，一个决定性因素是：将依赖项引入数据库是否会提升性能（促进连接或能够使用索引）。如果可以，则该逻辑被移入函数并被视为“数据库逻辑”；否则，数据将被返回给应用程序，以进行进一步的业务逻辑处理。


    例如，对于航空预订应用程序，可以创建一个函数来返回可用的行程，即可能的预订。该函数的参数包括出发城市、目的地、行程开始日期和返回日期。为了能够高效地检索所有可能的行程，该函数需要知道表
    `airport` 和 `flight` 如何连接，以及如何计算飞行时长。所有这些信息都属于数据库逻辑。


    然而，我们不希望该函数对选择哪个行程做出最终决定。最终的选择标准可能各不相同，并由应用程序处理；它们属于业务逻辑。


    一致地应用这一标准可以很快地融入常规开发周期，并鼓励“一步到位”地开发应用程序。


    ## OLAP 系统中的函数


    至此，我们希望已经说服您在 OLTP 系统中使用 PostgreSQL 函数是有益的。那么 OLAP 呢？


    除非您尝试过，否则您可能不知道许多报告工具，包括 Cognos、Business Objects 和 Looker，都可以展示函数的结果。实际上，执行一个返回记录集的函数类似于执行
    `SELECT * FROM <某些表>`。


    然而，软件能做某事并不意味着它应该做。那么在 OLAP 环境中何时应该使用函数呢？


    ### 参数化


    视图或物化视图无法参数化。如果我们只想运行最近日期、昨天、上周等的报告，这可能不会造成任何问题，因为我们可以利用 `CURRENT_DATE` 或 `CURRENT_TIMESTAMP`
    等内部函数，但如果我们需要为过去的任何时间区间重新运行任何报告，如果不修改视图，这就不是一件容易的事。例如，我们可能有一个视图


    ```sql

    CREATE VIEW recent_flights_v AS

    SELECT flight_id,

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight

    WHERE scheduled_departure BETWEEN CURRENT_DATE-7

    AND CURRENT_DATE

    ```


    如果您需要为不同的日期区间运行相同的查询，您将需要创建另一个视图（或重新创建现有视图）。但是，如果将这个 SELECT 语句打包成函数


    ```sql

    CREATE OR REPLACE FUNCTION recent_flights(p_date date)

    RETURNS SETTOF recent_flights_record AS

    $BODY$

    BEGIN

    RETURN QUERY

    SELECT flight_id,

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight

    WHERE scheduled_departure BETWEEN p_date-7

    AND p_date;

    END; $BODY$;

    ```


    … 您就可以简单地使用不同的参数执行它：


    ```sql

    SELECT * FROM recent_flights(CURRENT_DAY)

    SELECT * FROM recent_flights(‘2023-08-01’)

    ```


    ### 不显式依赖表和视图


    如果报告是通过调用函数来执行的，那么它可以在不需要删除和重建的情况下进行优化。此外，底层表可以被修改，或者我们最终可能使用完全不同的表，而所有这些对最终用户都是不可见的。


    ### 执行动态 SQL 的能力


    函数允许根据参数的值构建 SQL 语句。SQL 语言本身没有在运行时动态构建语句然后执行的选项。您可以在应用程序中构建 SQL 语句，然后发送到数据库执行，或者可以在
    `plpgsql` 函数内部构建它。这是 PostgreSQL 另一个极其强大的功能，但经常未被充分利用，更多细节将在第 13 章讨论。


    ## 存储过程


    与其他数据库管理系统相比，PostgreSQL 有一段时间没有存储过程，这让许多来自商业系统的早期采用者非常失望。至于我们，本书的作者，我们对函数的原子性尤其感到沮丧，因为它不允许任何事务管理，包括提交中间结果。


    ### 无结果函数


    有一段时间，PostgreSQL 开发者除了使用函数代替存储过程外别无选择。您可以使用返回 `VOID` 的函数来做到这一点，例如


    ```sql

    CREATE OR REPLACE function cancel_flight (p_filght_id int) RETURNS VOID AS

    ```


    此外，当从另一个函数或过程调用函数时，还有另一种执行方式：


    ```sql

    PERFORM issue_boarding_pass(175820,462972, ''22C'', ''2020-06-16 21:45''::timestamptz)

    ```


    上述方式将执行函数并创建登机牌，但不会返回结果。


    ### 函数与存储过程


    函数和存储过程的区别在于，过程不返回任何值；因此，我们不需要指定返回类型。清单 12-24 展示了 `CREATE PROCEDURE` 命令，它与 `CREATE
    FUNCTION` 命令非常相似。


    ```sql

    CREATE PROCEDURE procedure_name (par_name1 par_type1, ...)

    AS


    LANGUAGE procedure language;

    ```

    清单 12-24

    `CREATE PROCEDURE` 命令


    过程体的语法与函数体相同，只是不需要 `RETURN` 类型。此外，前面关于函数内部结构的所有章节内容也适用于存储过程。要执行存储过程，使用 `CALL`
    命令：


    ```sql

    CALL cancel_flight(13);

    ```'
- fmt: '### Transaction Management


    函数与存储过程在执行方式上最重要的区别在于，可以在过程体内提交或回滚事务。


    过程执行开始时会启动一个新事务，函数体内的任何 `COMMIT` 或 `ROLLBACK` 命令都会终止当前事务并启动一个新事务。其中一个用例是批量数据加载。我们发现将变更以合理大小的部分进行提交是有益的，例如，每
    50,000 条记录。存储过程的结构可能如清单 [12-25](#501585_2_En_12_Chapter.xhtml#PC52) 所示。


    ```

    CREATE PROCEDURE load_with_transform()

    AS $load$

    DECLARE

    v_cnt int:=0;

    v_record record;

    BEGIN

    FOR v_record IN (SELECT * FROM data_source) LOOP

    PERFORM transform (v_rec.id);

    CALL insert_data (v_rec.*);

    v_cnt:=v_cnt+1;

    IF v_cnt>=50000 THEN

    COMMIT;

    v_cnt:=0;

    END IF;

    END LOOP;

    COMMIT;

    END;

    $load$ LANGUAGE plpgsql;

    Listing 12-25

    Example of a stored procedure with transactions

    ```


    在此示例中，数据在加载前进行处理，并在处理 50,000 条记录时执行 `COMMIT`。在循环结束后需要为剩余的记录（在最后一次循环内提交之后处理的记录）执行一次额外的提交。


    ### Exception Processing


    与函数一样，你可以包含指令来处理某些处理异常的发生。在清单 [12-3](#501585_2_En_12_Chapter.xhtml#PC3) 中，我们提供了函数中异常处理的示例。可以在过程中执行类似的异常处理。


    此外，可以在函数或过程体内创建内部块，并在每个块中使用不同的异常处理。这种情况下的过程体结构如清单 [12-26](#501585_2_En_12_Chapter.xhtml#PC53)
    所示。


    ```

    CREATE PROCEDURE multiple_blocks AS

    $mult$

    BEGIN

    ---case #1

    BEGIN


    EXCEPTION WHEN OTHERS THEN

    RAISE NOTICE ''CASE#1";

    END; --case #1

    ---case #2

    BEGIN


    EXCEPTION WHEN OTHERS THEN

    RAISE NOTICE ''CASE#2";

    END; --case #2

    ---case #3

    BEGIN


    EXCEPTION WHEN OTHERS THEN

    RAISE NOTICE ''CASE#3";

    END; --case #3

    END; ---proc

    $mult$ LANGUAGE plpbsql;

    Listing 12-26

    Nested blocks in the procedure body

    ```


    请注意，过程体中的 `BEGIN` 与启动事务的 `BEGIN` 命令是不同的。


    ## Summary


    PostgreSQL 中的函数和存储过程是极其强大的工具，却被许多数据库开发者忽视。它们既能显著提升性能，也能显著降低性能，并且可以成功地用于 OLTP 和
    OLAP 环境。第 [14](#501585_2_En_14_Chapter.xhtml) 章将提供更多关于如何决策函数使用的指导。


    本章是对函数多种使用方式的初步介绍。关于如何定义和使用函数及存储过程的更多细节，请查阅 PostgreSQL 文档。


    # 13. Dynamic SQL


    ## What Is Dynamic SQL


    动态 SQL 是指首先构建为文本字符串，然后使用 `EXECUTE` 命令执行的任何 SQL 语句。动态 SQL 的示例如清单 [13-1](#501585_2_En_13_Chapter.xhtml#PC2)
    所示。动态 SQL 在大多数关系数据库管理系统中都未得到充分利用，在 PostgreSQL 中尤其如此。本章的建议与许多数据库教科书的常规做法背道而驰，但所有建议都严格基于我们的实践经验。


    ```

    DECLARE

    v_sql text;

    cnt int;

    BEGIN

    v_sql:=$$SELECT count(*)

    FROM booking

    WHERE booking_ref=''0Y7W22''$$;

    EXECUTE v_sql into cnt;


    Listing 13-1

    Dynamic SQL

    ```


    ### Why Dynamic SQL Works Better in Postgres


    相对于其他数据库管理系统，PostgreSQL 有什么特别之处，使得这里的建议如此偏离传统智慧？请考虑以下几点。


    首先，在 PostgreSQL 中，即使对于*预处理查询*（即使用 `PREPARE` 命令进行预解析、分析和重写的查询），执行计划也不会被缓存。这意味着优化总是在执行前立即发生。


    其次，PostgreSQL 中的优化步骤发生得比其他系统更晚。例如，在 Oracle 中，参数化查询的执行计划总是为通用查询准备，即使存在具体值。此外，如果使用不同值执行相同的查询，带有绑定变量的计划会被缓存以供将来使用。优化器会考虑表和索引统计信息，但不考虑参数的具体值。PostgreSQL
    做的相反。执行计划是针对具体值生成的。


    如前所述，动态查询在其他数据库管理系统中也被不公平地忽视。这主要是因为对于长时间运行的查询（数十秒或更久），开销大多可以忽略不计。


    ### What About SQL Injection?


    通常，建议使用动态 SQL 以获得更好性能会引发担忧：SQL 注入怎么办？当然，我们都听说过密码被盗和数据被删的恐怖故事，因为恶意攻击者在表单中传入了危险的命令而非数据。当然，这是一个真实的风险，而且黑客获取本不应访问的数据的方式不止一种。然而，使用动态
    SQL 有防护措施可以最大限度地降低风险。


    在函数调用的参数值直接从数据库获取的情况下（例如，引用 ID），SQL 注入是不可能的。从用户输入获取的值必须使用 PostgreSQL 函数（`quote_literal`、`quote_indent`
    等或 `format`）进行清理——本章稍后将演示这方面的示例。用户输入也可以受益于应用程序端的验证。'
  raw: '### Transaction Management


    The most important difference between how functions and stored procedures are
    executed is that you can commit or roll back a transaction within a procedure
    body.


    At the start of the procedure execution, a new transaction starts, and any `COMMIT`
    or `ROLLBACK` command within a function body will terminate the current transaction
    and start a new one. One of the use cases is the bulk data load. We find it beneficial
    to commit changes in reasonably sized portions, for example, every 50,000 records.
    The structure of the stored procedure might look like Listing [12-25](#501585_2_En_12_Chapter.xhtml#PC52).


    ```

    CREATE PROCEDURE load_with_transform()

    AS $load$

    DECLARE

    v_cnt int:=0;

    v_record record;

    BEGIN

    FOR v_record IN (SELECT * FROM data_source) LOOP

    PERFORM transform (v_rec.id);

    CALL insert_data (v_rec.*);

    v_cnt:=v_cnt+1;

    IF v_cnt>=50000 THEN

    COMMIT;

    v_cnt:=0;

    END IF;

    END LOOP;

    COMMIT;

    END;

    $load$ LANGUAGE plpgsql;

    Listing 12-25

    Example of a stored procedure with transactions

    ```


    In this example, data is processed before loading and `COMMIT` when we process
    50,000 records. An additional commit upon exiting the loop is necessary for the
    remaining records, processed after the last in-loop commit.


    ### Exception Processing


    Same as with functions, you can include instructions on what to do if certain
    processing exceptions occur. In Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3),
    we provided an example of exception processing in a function. Similar exception
    processing can be performed in procedures.


    In addition, it is possible to create inner blocks inside of a function or procedure
    body and to have a different exception processing in each of them. The procedure
    body structure for this case is shown in Listing [12-26](#501585_2_En_12_Chapter.xhtml#PC53).


    ```

    CREATE PROCEDURE multiple_blocks AS

    $mult$

    BEGIN

    ---case #1

    BEGIN


    EXCEPTION WHEN OTHERS THEN

    RAISE NOTICE ''CASE#1";

    END; --case #1

    ---case #2

    BEGIN


    EXCEPTION WHEN OTHERS THEN

    RAISE NOTICE ''CASE#2";

    END; --case #2

    ---case #3

    BEGIN


    EXCEPTION WHEN OTHERS THEN

    RAISE NOTICE ''CASE#3";

    END; --case #3

    END; ---proc

    $mult$ LANGUAGE plpbsql;

    Listing 12-26

    Nested blocks in the procedure body

    ```


    Note that `BEGIN` in the procedure body is different from the BEGIN command that
    starts a transaction.


    ## Summary


    Functions and stored procedures in PostgreSQL are exceptionally powerful tools
    that are all but ignored by many database developers. They can both drastically
    improve and drastically worsen performance and can be successfully used in both
    OLTP and OLAP environments. Chapter [14](#501585_2_En_14_Chapter.xhtml) will provide
    more guidance on making decisions regarding the function usage.


    This chapter serves as a sneak peek of various ways functions can be used. Consult
    PostgreSQL documentation for more details on how to define and use functions and
    stored procedures.


    # 13. Dynamic SQL


    ## What Is Dynamic SQL


    Dynamic SQL is any SQL statement that is first built as a text string and then
    executed using the `EXECUTE` command. An example of dynamic SQL is shown in Listing
    [13-1](#501585_2_En_13_Chapter.xhtml#PC2). Dynamic SQL is underused in most RDBMSs,
    but especially in PostgreSQL. The recommendations in this chapter go against the
    grain of many database textbooks, but all suggestions are based strictly on our
    practical experience.


    ```

    DECLARE

    v_sql text;

    cnt int;

    BEGIN

    v_sql:=$$SELECT count(*)

    FROM booking

    WHERE booking_ref=''0Y7W22''$$;

    EXECUTE v_sql into cnt;


    Listing 13-1

    Dynamic SQL

    ```


    ### Why Dynamic SQL Works Better in Postgres


    What is so special about PostgreSQL relative to other DBMSs, to make the recommendations
    here stray so far from conventional wisdom? Consider the following.


    First, in PostgreSQL, execution plans are not cached even for *prepared queries*
    (i.e., queries that are preparsed, analyzed, and rewritten using the `PREPARE`
    command). That means that optimization always happens immediately before execution.


    Second, the optimization step in PostgreSQL happens later than in other systems.
    For example, in Oracle, the execution plan for a parameterized query is always
    prepared for a generic query, even if the specific values are there. Moreover,
    a plan with binding variables is cached for future usage if the same query with
    different values is executed. The optimizer takes table and index statistics into
    account but does not take into account the specific values of parameters. PostgreSQL
    does the opposite. The execution plan is generated for specific values.


    As mentioned earlier, dynamic queries are unfairly neglected in other DBMSs as
    well. That’s primarily because for long-running queries (dozens of seconds or
    more), the overhead mostly is negligible.


    ### What About SQL Injection?


    Often, the suggestion to use dynamic SQL for better performance is met with alarm:
    What about SQL injection? Of course, we’ve all heard horror stories about stolen
    passwords and deleted data, because a malicious actor passed a dangerous command
    instead of data into a form. Of course, this is a real risk, and there’s more
    than one way for hackers to get access to data they should not have access to.
    However, there are guardrails available to using dynamic SQL that minimize risks.


    In cases when parameter values for a function call are obtained from the database
    directly (e.g., referencing IDs), SQL injection is impossible. Values obtained
    from user input must be sanitized with PostgreSQL functions (`quote_literal`,
    `quote_indent`, etc. or `format`)—examples of this are demonstrated later in this
    chapter. User inputs can also benefit from validation on the application side.'
