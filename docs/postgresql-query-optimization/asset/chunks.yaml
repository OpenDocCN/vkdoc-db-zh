    Recall the query in Listing 6-6, which has two selection criteria: departure airport
    country and the last time the booking was updated. Chapter [6](#501585_2_En_6_Chapter.xhtml)
    demonstrated how PostgreSQL modifies the execution plan depending on specific
    values of these parameters.


    In this chapter, we see what happens with this query if it is executed inside
    a function.


    Let’s start by creating a return type (see Listing [13-2](#501585_2_En_13_Chapter.xhtml#PC3)).


    ```

    DROP TYPE IF EXISTS booking_leg_part ;

    CREATE TYPE booking_leg_part AS(

    departure_airport char (3),

    booking_id int,

    is_returning boolean

    );

    Listing 13-2

    Create a return type

    ```


    Now, let’s create a function with two parameters: ISO country code and the timestamp
    of the last update. This function is shown in Listing [13-3](#501585_2_En_13_Chapter.xhtml#PC4).


    ```

    CREATE OR REPLACE FUNCTION select_booking_leg_country (

    p_country text,

    p_updated timestamptz)

    RETURNS SETOF booking_leg_part

    AS

    $body$

    BEGIN

    RETURN QUERY

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT

    airport_code

    FROM airport

    WHERE iso_country=p_country

    )

    AND bl.booking_id IN

    (SELECT

    booking_id

    FROM booking

    WHERE update_ts>p_updated

    )

    ;

    END; $body$

    LANGUAGE plpgsql;

    Listing 13-3

    SQL from Listing 6-6, packaged in a function

    ```


    Chapter [6](#501585_2_En_6_Chapter.xhtml) demonstrated how PostgreSQL chooses
    different execution plans depending on the values for country and timestamp search
    parameters and how this influences execution time.


    Since functions in PostgreSQL (just as in other systems) are atomic, we can’t
    run the `EXPLAIN` command to see the execution plan for the function (to be precise,
    the `EXPLAIN` will be executed, but the only thing it will show will be the execution
    itself), but since the expected response time for the query is known, we can get
    a good idea what’s going on under the hood.


    Recall that previously, executing the statement in Listing [13-4](#501585_2_En_13_Chapter.xhtml#PC5)
    resulted in an execution time of about 9.5 seconds, with two hash joins executed.


    ```

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT

    airport_code

    FROM airport WHERE iso_country=''US''

    )

    AND bl.booking_id IN

    (SELECT

    booking_id

    FROM booking

    WHERE update_ts>''2023-07-01''

    )

    Listing 13-4

    SELECT with two hash joins

    ```


    Recall also that by moving the bound on `update_ts` closer to the dataset’s “current
    date” of August 17, initially, the execution time doesn’t change significantly.
    Execution time with `update_ts>''2023-08-01` will still be about 7.9 seconds,
    with a reduction attributable to a smaller intermediate dataset. The execution
    plan for that case is shown in Figure [13-1](#501585_2_En_13_Chapter.xhtml#Fig1).


    ![](Images/501585_2_En_13_Fig1_HTML.jpg)


    A screenshot of a query plan. It has 17 lines of code to check the airport booking
    using 2 hash joins.


    Figure 13-1


    Execution plan with two hash joins


    Eventually, as the value of `update_ts` approaches August 17, PostgreSQL will
    choose index access, and for the query in Listing [13-5](#501585_2_En_13_Chapter.xhtml#PC6),
    the execution time is 1.8 seconds.


    ```

    SELECT departure_airport, booking_id, is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT airport_code

    FROM airport WHERE iso_country=''US'')

    AND bl.booking_id IN

    (SELECT booking_id FROM booking

    WHERE update_ts>''2023-08-14'')

    Listing 13-5

    One hash join is replaced with a nested loop

    ```


    The execution plan for this case is shown in Figure [13-2](#501585_2_En_13_Chapter.xhtml#Fig2).


    ![](Images/501585_2_En_13_Fig2_HTML.jpg)


    A screenshot of a query plan. It has 16 lines of code to check the airport booking
    using one hash join and one nested loop.


    Figure 13-2


    Execution plan with one hash join and one nested loop


    Also, if we run the same SELECT with the iso_country=’CZ’, PostgreSQL will produce
    yet another differing execution plan, as shown in Figure [13-3](#501585_2_En_13_Chapter.xhtml#Fig3).
    In this case, the execution time will be around 200 ms.


    ![](Images/501585_2_En_13_Fig3_HTML.jpg)


    A screenshot of a query plan. It has 14 lines of code to check the airport booking
    using nested loops.


    Figure 13-3


    Execution plan with nested loops only


    With these figures as a reference, let’s examine how the function version of the
    query performs.


    Let’s try to replicate the same behavior observed in Chapter [6](#501585_2_En_6_Chapter.xhtml)
    for a long query with different search conditions and execute the statements shown
    in Listing [13-6](#501585_2_En_13_Chapter.xhtml#PC7).


    ```

    #1

    SELECT * FROM select_booking_leg_country(''US'', ''2023-07-01'');

    #2

    SELECT * FROM select_booking_leg_country(''US'', ''2023-08-01'');

    #3

    SELECT * FROM select_booking_leg_country(''US'', ''2023-08-14'');

    #4

    SELECT * FROM select_booking_leg_country(''CZ'', ''2020-08-01'');

    Listing 13-6

    Examples of function calls

    ```


    The execution times observed will differ depending on what parameters are passed
    to the function during the first three to five calls. As a result, the execution
    time for statement #1, which should take around nine seconds, may vary from nine
    seconds up to one minute, depending on the sequence of calls. You can even open
    two or three connections to your local PostgreSQL and try to execute these calls
    in different orders.


    Why is the behavior of the function so inconsistent? Recall Chapter [12](#501585_2_En_12_Chapter.xhtml),
    which stated that PostgreSQL *may* save the execution plan of the prepared statement
    and when a function is called for the first time in a session, each SQL statement
    that it reaches during the execution will be evaluated and the execution plan
    will be optimized and then it *may* be cached for subsequent executions.


    We are purposely not describing a specific behavior with each sequence of calls,
    because it is not guaranteed. And while “not guaranteed” may be acceptable for
    a training database, it is definitely not acceptable in a production environment,
    especially when an OLTP system implements a policy that caps maximum wait time
    and aborts transactions when the wait time exceeds that limit. Also, let’s not
    forget about connection pools. Practically any web application initiates a certain
    number of connections, called a connection pool, and these connections are used
    by application users’ processes, most often, for a single SQL statement. As a
    result, one PostgreSQL session will almost certainly execute each function with
    very different sets of parameters.


    To guarantee that each time a function is executed *the execution plan will be
    evaluated and optimized for the specific values it’s called with*, we create functions
    that execute dynamic SQL.


    Listing [13-7](#501585_2_En_13_Chapter.xhtml#PC8) shows the function `select_booking_leg_country_dynamic`
    that executes the same SQL as the `select_booking_leg_country` function. The only
    difference is that the former function constructs a SELECT statement inside the
    function and then executes it.'
  trans: '## 如何使用动态 SQL 获得最优执行计划


    如第 12 章所述，PostgreSQL 可能会复用函数中参数化 SQL 语句的执行计划，这在某些情况下可能导致性能不佳。为确保构建最优的执行计划，我们可以在函数内部构建动态
    SQL 然后执行，而不是将参数值作为绑定变量传递。让我们看一个例子。


    回顾清单 6-6 中的查询，它有两个选择条件：出发机场国家和预订的最后更新时间。第 6 章演示了 PostgreSQL 如何根据这些参数的具体值来修改执行计划。


    在本章中，我们将看看如果这个查询在函数内部执行会发生什么。


    首先，让我们创建一个返回类型（参见清单 13-2）。


    ```sql

    DROP TYPE IF EXISTS booking_leg_part ;

    CREATE TYPE booking_leg_part AS(

    departure_airport char (3),

    booking_id int,

    is_returning boolean

    );

    ```


    清单 13-2：创建一个返回类型


    现在，让我们创建一个包含两个参数的函数：ISO 国家代码和最后更新的时间戳。此函数如清单 13-3 所示。


    ```sql

    CREATE OR REPLACE FUNCTION select_booking_leg_country (

    p_country text,

    p_updated timestamptz)

    RETURNS SETOF booking_leg_part

    AS

    $body$

    BEGIN

    RETURN QUERY

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT

    airport_code

    FROM airport

    WHERE iso_country=p_country

    )

    AND bl.booking_id IN

    (SELECT

    booking_id

    FROM booking

    WHERE update_ts>p_updated

    )

    ;

    END; $body$

    LANGUAGE plpgsql;

    ```


    清单 13-3：清单 6-6 中的 SQL，打包在一个函数中


    第 6 章演示了 PostgreSQL 如何根据国家和时间戳搜索参数的值选择不同的执行计划，以及这如何影响执行时间。


    由于 PostgreSQL 中的函数（如同其他系统中的函数）是原子性的，我们无法运行`EXPLAIN`命令来查看函数的执行计划（准确地说，`EXPLAIN`会被执行，但它只会显示执行本身），但由于已知查询的预期响应时间，我们可以很好地了解内部发生了什么。


    回顾一下，之前执行清单 13-4 中的语句，执行时间约为 9.5 秒，执行了两个哈希连接。


    ```sql

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT

    airport_code

    FROM airport WHERE iso_country=''US''

    )

    AND bl.booking_id IN

    (SELECT

    booking_id

    FROM booking

    WHERE update_ts>''2023-07-01''

    )

    ```


    清单 13-4：包含两个哈希连接的 SELECT


    还要回顾一下，通过将`update_ts`的边界移近数据集的“当前日期”8 月 17 日，最初执行时间并没有显著变化。`update_ts>''2023-08-01''`的执行时间仍约为
    7.9 秒，减少的原因是中间数据集变小了。该情况的执行计划如图 13-1 所示。


    ![](img/501585_2_En_13_Fig1_HTML.jpg)


    图 13-1：带有两个哈希连接的执行计划


    最终，随着`update_ts`的值接近 8 月 17 日，PostgreSQL 将选择索引访问，对于清单 13-5 中的查询，执行时间为 1.8 秒。


    ```sql

    SELECT departure_airport, booking_id, is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT airport_code

    FROM airport WHERE iso_country=''US'')

    AND bl.booking_id IN

    (SELECT booking_id FROM booking

    WHERE update_ts>''2023-08-14'')

    ```


    清单 13-5：一个哈希连接被替换为嵌套循环


    这种情况下的执行计划如图 13-2 所示。


    ![](img/501585_2_En_13_Fig2_HTML.jpg)


    图 13-2：带有一个哈希连接和一个嵌套循环的执行计划


    此外，如果我们使用`iso_country=’CZ’`运行相同的 SELECT，PostgreSQL 将产生另一个不同的执行计划，如图 13-3 所示。在这种情况下，执行时间约为
    200 毫秒。


    ![](img/501585_2_En_13_Fig3_HTML.jpg)


    图 13-3：仅包含嵌套循环的执行计划


    以这些数据为参考，让我们检查一下函数版本的查询性能如何。


    让我们尝试复现第 6 章中观察到的相同行为，即具有不同搜索条件的长查询，并执行清单 13-6 中所示的语句。


    ```sql

    #1

    SELECT * FROM select_booking_leg_country(''US'', ''2023-07-01'');

    #2

    SELECT * FROM select_booking_leg_country(''US'', ''2023-08-01'');

    #3

    SELECT * FROM select_booking_leg_country(''US'', ''2023-08-14'');

    #4

    SELECT * FROM select_booking_leg_country(''CZ'', ''2020-08-01'');

    ```


    清单 13-6：函数调用示例


    观察到的执行时间将根据前三到五次调用期间传递给函数的参数而有所不同。因此，语句#1 的执行时间（本应大约需要 9 秒）可能从 9 秒到 1 分钟不等，具体取决于调用的顺序。你甚至可以打开到本地
    PostgreSQL 的两三个连接，并尝试以不同的顺序执行这些调用。


    为什么函数的行为如此不一致？回顾第 12 章，其中指出 PostgreSQL *可能*保存预处理语句的执行计划，并且当函数在会话中第一次被调用时，它执行期间到达的每个
    SQL 语句都会被评估，执行计划会被优化，然后*可能*被缓存以供后续执行。


    我们故意不描述每个调用序列的具体行为，因为这是不保证的。虽然“不保证”对于训练数据库可能是可以接受的，但在生产环境中绝对是不可接受的，特别是当 OLTP 系统实施了限制最大等待时间并在等待时间超过该限制时中止事务的策略时。另外，别忘了连接池。实际上，任何
    Web 应用程序都会启动一定数量的连接，称为连接池，这些连接由应用程序用户的进程使用，最常见的是用于单个 SQL 语句。结果，一个 PostgreSQL 会话几乎肯定会使用非常不同的参数集来执行每个函数。


    为了保证每次执行函数时*都会针对其被调用时的具体值评估和优化执行计划*，我们创建执行动态 SQL 的函数。


    清单 13-7 展示了函数`select_booking_leg_country_dynamic`，它执行与`select_booking_leg_country`函数相同的
    SQL。唯一的区别是前者在函数内部构建了一个 SELECT 语句然后执行它。'
- fmt: '**引言**


    考虑下面这个函数定义：


    ```

    CREATE OR REPLACE FUNCTION select_booking_leg_country_dynamic(

    p_country text,

    p_updated timestamptz)

    RETURNS setof booking_leg_part

    AS

    $body$

    BEGIN

    RETURN QUERY

    EXECUTE $$

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT

    airport_code

    FROM airport

    WHERE iso_country=$$|| quote_literal(p_country) ||

    $$ )

    AND bl.booking_id IN

    SELECT

    booking_id

    FROM booking

    WHERE update_ts>$$|| quote_literal(p_updated)||$$)$$;

    END;

    $body$ LANGUAGE plpgsql;

    ```

    Listing 13-7

    A function that executes dynamic SQL


    这个函数接受与 `select_booking_leg_country` 相同的参数集，并返回相同的结果。但请注意，它对每组参数的执行时间是一致的，这正是我们在生产系统中想要的。


    为什么行为会改变？因为SQL是在执行前立即构建的，优化器不会使用缓存的执行计划。相反，它会为每次执行评估执行计划。这看起来可能会花费额外的时间，但实际上，结果恰恰相反。规划时间在100毫秒以下，并且通过获得更好的执行计划来回报，从而节省更多时间。


    另外请注意，此函数使用 `quote_literal()` 函数来防范SQL注入。


    这是在函数中使用动态SQL的第一个但不是唯一的原因。本章后续会提供更多支持这种实践的案例。


    ## 在OLAP系统中使用动态SQL


    本节的标题可能会产生误导。以下演示的技术可以用于任何系统；但是，当结果集很大时，效果最为显著。结果集越大，收益越明显。


    假设为了统计分析，我们需要按年龄对乘客进行排序。定义了一个用于划分年龄类别的函数，如清单[13-8](#501585_2_En_13_Chapter.xhtml#PC9)所示。


    ```

    CREATE OR REPLACE FUNCTION age_category (p_age int)

    RETURNS TEXT language plpgsql AS

    $body$

    BEGIN

    RETURN (CASE

    WHEN p_age <= 2 then ''Infant''

    WHEN p_age <=12 then ''Child''

    WHEN p_age < 65 then ''Adult''

    ELSE ''Senior''

    END);

    END; $body$;

    ```

    Listing 13-8

    A function that assigns the age category


    如果此函数用于统计报告，我们可能需要为每个乘客计算年龄类别。在第[12](#501585_2_En_12_Chapter.xhtml)章中，我们提到在SELECT列表中执行函数可能会减慢速度，但那些函数更复杂。`age_category`
    函数执行的是非常简单的替换。尽管如此，函数调用仍然需要时间。因此，


    ```

    SELECT

    passenger_id,

    age_category(age)

    FROM passenger

    ```


    需要6.5秒执行，而


    ```

    SELECT passenger_id,

    CASE

    WHEN age <= 2 then ''Infant''

    WHEN age <=12 then ''Child''

    WHEN age < 65 then ''Adult''

    ELSE ''Senior''

    END from passenger

    ```


    只需要3.5秒。


    在这种特定情况下，使用函数并非绝对必要，因为它只使用了一次，而且即使Postgres Air中最大的表之一，`passenger`，也只有1600万行。在真实的分析查询中，需要处理的行数可能达到数亿，并且可能需要多个分类函数。在一个实际场景中，使用函数的执行时间为四小时，而将一个函数替换为直接使用
    `CASE` 操作符的执行时间不到1.5小时。


    这是否意味着我们要不惜一切代价避免在SELECT列表中使用函数？可能我们的分析团队希望将年龄类别分配包装在函数中。最有可能的是，他们将在多个查询中使用此函数，并且希望如果年龄类别发生变化，他们的查询能够保持弹性和一致。


    一个更高效且能保持函数可维护性的解决方案是创建一个不同的函数，它包含*部分代码作为文本*，如清单[13-9](#501585_2_En_13_Chapter.xhtml#PC12)所示。


    ```

    CREATE OR REPLACE FUNCTION age_category_dyn (p_age text)

    RETURNS text language plpgsql AS

    $body$

    BEGIN

    RETURN ($$CASE

    WHEN $$||p_age ||$$ <= 2 THEN ''Infant''

    WHEN $$||p_age ||$$<= 12 THEN ''Child''

    WHEN $$||p_age ||$$< 65 THEN ''Adult''

    ELSE ''Senior''

    END$$);

    END; $body$;

    ```

    Listing 13-9

    A function that builds dynamic SQL


    注意区别：当我们执行


    ```

    SELECT age_category(25)

    ```

    ...它会返回值 ''Adult''。


    如果你执行


    ```

    SELECT age_category_dyn(''age'')

    ```

    ...它将返回一个文本行，其中包含代码部分


    ```

    CASE

    WHEN age <= 2 THEN ''Infant''

    WHEN age<= 12 THEN ''Child''

    WHEN age< 65 THEN ''Adult''

    ELSE ''Senior''

    END

    ```


    要使用此函数，你需要将SELECT语句包装到一个函数中，但我们已经知道如何做了——参见清单[13-10](#501585_2_En_13_Chapter.xhtml#PC16)。


    ```

    CREATE TYPE passenger_age_cat_record AS (

    passenger_id int,

    age_category text

    );

    CREATE OR REPLACE FUNCTION passenger_age_category_select ()

    RETURNS setof passenger_age_cat_record

    AS

    $body$

    BEGIN

    RETURN QUERY

    EXECUTE $$SELECT

    passenger_id,

    $$||age_category_dyn(''age'')||$$ AS age_category

    FROM passenger $$

    ;

    END;

    $body$ LANGUAGE plpgsql;

    ```

    Listing 13-10

    Using the `age_category_dyn` function to build a dynamic SQL query


    现在，我们可以执行以下语句：


    ```

    SELECT * FROM passenger_age_category_select ()

    ```


    这大约需要五秒钟执行，比没有任何函数调用的语句要慢，但仍比我们选择执行原始版本的 `age_category` 函数要快。再一次，当我们处理真实的分析查询时，效果将更加明显。事实上，使用更大的表（例如，通过构建
    `passenger_large` 表，类似于第[7](#501585_2_En_7_Chapter.xhtml)章中构建 `boarding_pass_large`
    表的方式），我们可以观察到类似的行为，且执行时间的差异更明显。


    有些人可能会认为，费心创建生成代码的函数不值得那点性能提升。重申一下，对于创建函数是否有益——无论是对于性能、代码提取还是可移植性——并没有普遍原则。第[11](#501585_2_En_11_Chapter.xhtml)章提到，代码提取在PG/PL
    SQL函数中不像在面向对象编程语言中那样工作，并承诺提供一些例子。本节给出了其中一个例子。这里，函数 `age_category_dyn` 有助于代码提取，因为年龄类别分配的更新只需在一个地方进行。同时，它对性能的影响比更传统的带参数的函数要小。大多数情况下，构建一个执行动态SQL的函数在开始时需要一些时间，因为调试更困难。然而，一旦函数就位，进行更改所需的时间就很少。决定哪种时间更关键——是初始开发时间还是平均执行时间——只能由应用程序和/或数据库开发人员来决定。'
  raw: '```

    CREATE OR REPLACE FUNCTION select_booking_leg_country_dynamic(

    p_country text,

    p_updated timestamptz)

    RETURNS setof booking_leg_part

    AS

    $body$

    BEGIN

    RETURN QUERY

    EXECUTE $$

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT

    airport_code

    FROM airport

    WHERE iso_country=$$|| quote_literal(p_country) ||

    $$ )

    AND bl.booking_id IN

    (SELECT

    booking_id

    FROM booking

    WHERE update_ts>$$|| quote_literal(p_updated)||$$)$$;

    END;

    $body$ LANGUAGE plpgsql;

    Listing 13-7

    A function that executes dynamic SQL

    ```


    This function accepts the same set of parameters as `select_booking_leg_country`
    and returns the same result. But observe that its execution time for each set
    of parameters is consistent, which is exactly what we want in production systems.


    Why did this behavior change? Since the SQL is built immediately prior to execution,
    the optimizer does not use a cached plan. Instead, it evaluates the execution
    plan for each execution. It may seem that this would take extra time, but in practice,
    the opposite happens. Planning time is under 100 ms, and it pays off with a better
    execution plan, which saves significantly more time.


    Also note that this function uses the `quote_literal()` function to guard against
    SQL injection.


    This is the first but not the only reason to use dynamic SQL in functions. More
    cases in support of this practice follow later in this chapter.


    ## How to Use Dynamic SQL in OLAP Systems


    The title of this section may be misleading. The technique demonstrated in the
    following can be used in any system; however, the most impressive results are
    observed when the result set is large. The larger the result set is, the more
    pronounced the benefits.


    Let’s assume that for statistical analysis, we need to sort passengers by age.
    A function to define age categories is defined in Listing [13-8](#501585_2_En_13_Chapter.xhtml#PC9).


    ```

    CREATE OR REPLACE FUNCTION age_category (p_age int)

    RETURNS TEXT language plpgsql AS

    $body$

    BEGIN

    RETURN (CASE

    WHEN p_age <= 2 then ''Infant''

    WHEN p_age <=12 then ''Child''

    WHEN p_age < 65 then ''Adult''

    ELSE ''Senior''

    END);

    END; $body$;

    Listing 13-8

    A function that assigns the age category

    ```


    If this function is used for statistical reports, we might need to calculate an
    age category for every passenger. In Chapter [12](#501585_2_En_12_Chapter.xhtml),
    we mentioned that executing functions in the SELECT list may slow things down,
    but the functions were more complex. The `age_category` function performs a very
    simple substitution. Still, function invocation takes time. Thus,


    ```

    SELECT

    passenger_id,

    age_category(age)

    FROM passenger

    ```


    takes 6.5 seconds to execute, while


    ```

    SELECT passenger_id,

    CASE

    WHEN age <= 2 then ''Infant''

    WHEN age <=12 then ''Child''

    WHEN age < 65 then ''Adult''

    ELSE ''Senior''

    END from passenger

    ```


    takes 3.5 seconds.


    In this particular case, using a function is not really imperative, because it
    is used only once, and even one of the biggest tables in Postgres Air, `passenger`,
    has only 16 million rows. In real analytical queries, the number of rows to process
    might be hundreds of millions, and multiple category-assigning functions might
    be needed. In one real-life scenario, execution time with functions was four hours,
    while execution time with just one function substituted by a direct `CASE` operator
    was less than 1.5 hours.


    Does this mean we want to avoid using functions in the SELECT list at all costs?
    There may be a reason our analytics team wants to package the age category assignment
    in the function. Most likely, they are going to use this function in multiple
    selects and with different tables and want their queries to be resilient and consistent
    if age categories ever change.


    A more performant solution that retains the maintainability of the function is
    to create a different function, which contains *part of the code as text,* as
    in Listing [13-9](#501585_2_En_13_Chapter.xhtml#PC12).


    ```

    CREATE OR REPLACE FUNCTION age_category_dyn (p_age text)

    RETURNS text language plpgsql AS

    $body$

    BEGIN

    RETURN ($$CASE

    WHEN $$||p_age ||$$ <= 2 THEN ''Infant''

    WHEN $$||p_age ||$$<= 12 THEN ''Child''

    WHEN $$||p_age ||$$< 65 THEN ''Adult''

    ELSE ''Senior''

    END$$);

    END; $body$;

    Listing 13-9

    A function that builds dynamic SQL

    ```


    Notice the difference: when we execute


    ```

    SELECT age_category(25)

    ```


    …it will return the value ‘Adult’.


    If you execute


    ```

    SELECT age_category_dyn(''age'')

    ```


    …it will return a text line that contains the part of code


    ```

    CASE

    WHEN age <= 2 THEN ''Infant''

    WHEN age<= 12 THEN ''Child''

    WHEN age< 65 THEN ''Adult''

    ELSE ''Senior''

    END

    ```


    To use this function, you will need to package the SELECT statement into a function,
    but we already know how to do that—see Listing [13-10](#501585_2_En_13_Chapter.xhtml#PC16).


    ```

    CREATE TYPE passenger_age_cat_record AS (

    passenger_id int,

    age_category text

    );

    CREATE OR REPLACE FUNCTION passenger_age_category_select ()

    RETURNS setof passenger_age_cat_record

    AS

    $body$

    BEGIN

    RETURN QUERY

    EXECUTE $$SELECT

    passenger_id,

    $$||age_category_dyn(''age'')||$$ AS age_category

    FROM passenger $$

    ;

    END;

    $body$ LANGUAGE plpgsql;

    Listing 13-10

    Using the age_category_dyn function to build a dynamic SQL query

    ```


    Now, we can execute the following statement:


    ```

    SELECT * FROM passenger_age_category_select ()

    ```


    This will take about five seconds to execute, which is more than a statement without
    any function calls, but still less than when we choose to execute the original
    version of the `age_category` function. And once again, when we are dealing with
    real analytical queries, the effect will be more visible. In fact, using a larger
    table (e.g., by building the passenger_large table, similarly to how boarding_pass_large
    was built in Chapter [7](#501585_2_En_7_Chapter.xhtml)), we can observe similar
    behavior with a more pronounced difference in execution time.


    Some might argue that going to the trouble of creating functions that generate
    code is not worth the performance gains. To reiterate, there is no universal principle
    for whether or not creating functions is beneficial—either for performance, code
    factoring, or portability. Chapter [11](#501585_2_En_11_Chapter.xhtml) mentioned
    that code factoring does not work for PG/PL SQL functions the way it works for
    object-oriented programming languages and promised to provide some examples. This
    section gives one of those examples. Here, the function `age_category_dyn` helps
    code factoring, because updates to the age category assignment must be made in
    only one place. At the same time, it has less impact on performance than a more
    traditional function with parameters. Most of the time, building a function that
    executes dynamic SQL takes some time in the beginning, because debugging is more
    difficult. However, when the function is already in place, it takes little time
    to make changes. Deciding which time is more critical—the initial development
    time or average execution time—can only be done by application and/or database
    developers.'
