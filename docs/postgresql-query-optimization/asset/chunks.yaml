- fmt: '## Using SET Operations


    We rarely use set theoretical operations (`UNION`, `EXCEPT`, etc.) in SQL queries.
    For large queries, however, these operations may prompt the optimizer to choose
    more efficient algorithms.


    Use set operations to (sometimes) prompt an alternative execution plan and improve
    readability.


    Often, we can


    *   Use `EXCEPT` instead of `NOT EXISTS` and `NOT IN`.

    *   Use `INTERSECT` instead of `EXISTS` and `IN`.

    *   Use `UNION` instead of complex selection criteria with `OR`.


    Sometimes, there can be significant performance gains, and sometimes the execution
    time changes only slightly, but the code becomes cleaner and easier to maintain.
    Listing 6-22 shows a rewrite of the query in Listing 6-8, returning flights with
    no bookings.


    ```

    SELECT

    flight_id

    FROM flight f

    EXCEPT

    SELECT

    flight_id

    FROM booking_leg

    Listing 6-22

    Using EXCEPT instead of NOT IN

    ```


    Execution time is one minute and three seconds, which is almost twice as fast
    as an anti-join.


    The execution plan with the `EXCEPT` operation is shown in Figure 6-19.


    ![](Images/501585_2_En_6_Fig19_HTML.jpg)


    A screenshot of the 8-line execution plan with except. It includes set operators
    except, sort, sort key, append, subquery scan, and sequence scan on flight f.


    Figure 6-19

    Execution plan with `EXCEPT`


    Listing 6-23 shows a rewrite of the query in Listing 6-4 using set operations,
    showing all flights with a booking.


    ```

    SELECT

    flight_id

    FROM flight f

    INTERSECT

    SELECT

    flight_id

    FROM booking_leg

    Listing 6-23

    Using INTERSECT instead of IN

    ```


    The execution time of this query is 49 seconds. This is less than the version
    of the query using the `IN` keyword and approximately equal to the runtime of
    the query with an index-only scan (see Listing 6-10). The execution plan is shown
    in Figure 6-20.


    ![](Images/501585_2_En_6_Fig20_HTML.jpg)


    A screenshot of the 6-line execution plan with intersect. It includes hash set
    operators intersect, append, subquery scan, and sequence scan on flight f.


    Figure 6-20

    Execution plan with `INTERSECT`


    We rarely need to rewrite complex selection criteria with `OR` into set theoretical
    `UNION ALL`, because most of the time the PostgreSQL optimizer does a decent job
    analyzing such criteria and making use of all suitable indexes. However, sometimes
    rewriting this way makes code more maintainable, especially when the query contains
    a large number of different selection criteria connected with `OR`. Listing 6-24
    is a query that calculates the number of passengers on delayed flights from `FRA`
    using two different sets of selection criteria. The first group is passengers
    on flights delayed by more than an hour, with changes to the boarding pass more
    than 30 minutes after the scheduled departure. The second is passengers on flights
    delayed by more than a half hour but less than an hour.


    ```

    SELECT

    CASE

    WHEN actual_departure>scheduled_departure + interval ''1 hour''

    THEN ''Late group 1''

    ELSE ''Late group 2''

    END AS grouping,

    flight_id,

    count(*) AS num_passengers

    FROM boarding_pass bp

    JOIN booking_leg bl USING (booking_leg_id)

    JOIN booking b USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=''FRA''

    AND actual_departure>''2023-07-01''

    AND

    (

    (actual_departure>scheduled_departure + interval ''30 minute''

    AND actual_departure scheduled_departure + interval ''1 hour''

    AND bp.update_ts >scheduled_departure + interval ''30 minute''

    )

    )

    GROUP BY 1,2

    Listing 6-24

    Query with complex selection criteria with OR

    ```


    The rewrite of this query using `UNION ALL` is shown in Listing 6-25. The execution
    time difference is not significant (about three seconds), but the code is more
    maintainable.


    ```

    SELECT

    ''Late group 1'' AS grouping,

    flight_id,

    count(*) AS num_passengers

    FROM boarding_pass bp

    JOIN booking_leg bl USING (booking_leg_id)

    JOIN booking b USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=''FRA''

    AND actual_departure>scheduled_departure + interval ''1 hour''

    AND bp.update_ts  > scheduled_departure + interval ''30 minutes''

    AND actual_departure>''2023-07-01''

    GROUP BY 1,2

    UNION ALL

    SELECT

    ''Late group 2'' AS grouping,

    flight_id,

    count(*) AS num_passengers

    FROM boarding_pass bp

    JOIN booking_leg bl USING(booking_leg_id)

    JOIN booking b USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=''FRA''

    AND  actual_departure>scheduled_departure + interval ''30 minute''

    AND  actual_departure ''2023-07-01''

    GROUP BY 1,2

    Listing 6-25

    Rewrite of a complex condition with OR using UNION ALL

    ```


    It’s worth noting that with large queries you always need to take into consideration
    how much RAM you have available. For both hash joins and set theoretical operations,
    if the participating datasets can’t fit into main memory, the execution speed
    increases significantly.'
