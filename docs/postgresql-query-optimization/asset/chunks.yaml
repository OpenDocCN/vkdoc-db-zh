- fmt: "Note that this schema represents the contract, that is, the object structure\
    \ that the application expects to receive. It differs significantly from how the\
    \ data is stored in the database, and the most important part is that the database\
    \ implementation has no impact on how the application interacts with it, as long\
    \ as the database response remains in accordance with the contract.\n\nAn example\
    \ `JSON` object following this contract is shown in Figure [14-5](#501585_2_En_14_Chapter.xhtml#Fig5).\n\
    \n![](Images/501585_2_En_14_Fig5_HTML.jpg)\n\nA screenshot of the `JSON` code\
    \ for booking `ID`, 10679. It presents the details of booking, booking legs, passengers,\
    \ and flights. The booking reference is `EN6B12`.\n\nFigure 14-5\n\nTransfer object\
    \ as `JSON`\n\nIn short, the interaction between the application and the database\
    \ can be summarized as follows:\n\n1.  The application serializes data into `JSON`\
    \ format and sends it to the database by calling a corresponding database function.\n\
    2.  A database function parses the `JSON` that was passed as a parameter and executes\
    \ whatever the function is supposed to do: either a search or data transformation.\
    \ `PostgreSQL` has a very well-developed `JSON` support with a rich set of functions,\
    \ which makes it easy to manipulate `JSON` on the database side.\n3.  The result\
    \ set is converted to `JSON` and passed to the application, where it is deserialized\
    \ and is ready to be consumed by the application.\n\n## NORM in the Application\
    \ Perspective\n\nOn the application side, the `Python` classes in Listing [14-2](#501585_2_En_14_Chapter.xhtml#PC2)\
    \ are mapped to the same transfer object.\n\n```python\nfrom typing import List\n\
    from pydantic import BaseModel, Field\nfrom datetime.datetime import datetime,\
    \ timezone\nfrom phonenumber import PhoneNumber\n\nclass Booking(BaseModel):\n\
    \    booking_id: int\n    booking_ref: str\n    booking_legs: List[BookingLeg]\n\
    \    booking_name: str\n    account_id: int\n    email: str\n    phone: PhoneNumber\n\
    \    update_ts: datetime\n    price: decimal\n\nclass BookingLeg(BaseModel):\n\
    \    booking_leg_id: int\n    flight: Flight\n    is_returning: bool\n    update_ts:\
    \ datetime\n\nclass Flight(BaseModel):\n    flight_id: int\n    flight_no: int\n\
    \    scheduled_departure: datetime\n    scehduled_arrival: datetimee\n    departure_airport:\
    \ Airport\n    arrival_airport: Airport\n    status: str\n    aircraft_code: str\n\
    \    actual_departure: datetime\n    actual_arrival: datetime\n    update_ts=datetime\n\
    \nclass Airport(BaseModel):\n    airport_code: str = Field(min_length=3,max_length=3)\n\
    \    airport_name: str\n    airport_tz: timezone\n    city: str\n    continent:\
    \ str\n    iso_country: str\n    iso_region: str\n    intnl: bool\n    update_ts:\
    \ datetime\n\nclass Passenger(BaseModel):\n    passenger_id: int\n    booking:\
    \ Booking\n    passenger_no: int\n    first_name: str\n    last_name: str\n  \
    \  account_id: int\n    update_ts: datetime\n    age: int\n```\n\nListing 14-2\n\
    Postgres Air application classes\n\nIt is worth mentioning that we can build completely\
    \ different transfer objects using the same set of tables. For example, before\
    \ any flight departs, a document that is called manifest has to be produced. This\
    \ document lists all the passengers on the fight along with their seat assignments.\
    \ The transfer object for the manifest is presented in Figure [14-6](#501585_2_En_14_Chapter.xhtml#Fig6).\n\
    \n![](Images/501585_2_En_14_Fig6_HTML.jpg)\n\nA relationship diagram of the transfer\
    \ object. It presents the variables of the manifest record and passenger record.\n\
    \nFigure 14-6\n\nTransfer object for the flight manifest\n\nThe matching `JSON`\
    \ is shown in Figure [14-7](#501585_2_En_14_Chapter.xhtml#Fig7).\n\n![](Images/501585_2_En_14_Fig7_HTML.jpg)\n\
    \nA screenshot of the `JSON` code. It presents the details of flights and boarding\
    \ passes to check the arrival airport code, `CDG`, and the departure airport code,\
    \ `JFK`, during booking.\n\nFigure 14-7\n\nManifest object as `JSON`\n\n## NORM\
    \ from a Database Perspective\n\nIn the early stages of the `NORM` project, the\
    \ only serious objection to its adoption was the necessity of manually creating\
    \ all data manipulation functions. Agile teams didn’t want to spend time on writing\
    \ additional code, especially when `ORMs` generate code with similar functionality\
    \ (almost) without human interaction. Nor did they want to have an additional\
    \ person (a database developer) on the team. To address these concerns, we added\
    \ an auto-generation module to `NORM`, which we call `NORM-GEN`. In this section,\
    \ we will explain how to generate types and functions on the database side, instead\
    \ of creating them manually. To achieve this goal, we need to make one important\
    \ change to our contract, that is, to find a way to define the mapping between\
    \ application classes and database objects.\n\n### Mapping `JSON` to the Database\n\
    \nTo enable the automatic generation of the database objects, we extend the `JSON`\
    \ schema syntax with a `db_mapping` key that can be specified for the whole hierarchy,\
    \ an object, or a key. The mapping specifies the database schema, table names\
    \ and column names corresponding to the `JSON` object and keys, as well as primary\
    \ and foreign key columns that define relationships between objects.\n\nListing\
    \ [14-3](#501585_2_En_14_Chapter.xhtml#PC3) shows how the mapping is specified\
    \ for a part of the contract, namely, for the passenger object. Lines 4–7 of this\
    \ listing define the table corresponding to the `JSON` object, the primary key\
    \ of the table, the primary key of the parent object, and the name of the complex\
    \ data type that represents the object in the database before conversion to `JSON`.\
    \ The explicit mapping of lower-level objects can be omitted when `JSON` key names\
    \ coincide with the table column names.\n\n```json\n{\n    \"passenger\": {\n\
    \        \"type\": \"object\",\n        \"db_mapping\": {\n            \"pk_col\"\
    : \"passenger_id\",\n            \"db_table\": \"passenger\",\n            \"\
    record_type\": \"passenger_record\",\n            \"parent_fk_col\": \"booking_id\"\
    \n        },\n        \"properties\": {\n            \"last_name\": {\n      \
    \          \"type\": \"text\"\n            },\n            \"account_id\": {\n\
    \                \"type\": \"number\"\n            },\n            \"first_name\"\
    : {\n                \"type\": \"text\"\n            },\n            \"passenger_id\"\
    : {\n                \"type\": \"number\"\n            },\n            \"passenger_no\"\
    : {\n                \"type\": \"number\"\n            }\n        }\n    }\n}\n\
    ```\n\nListing 14-3\nDatabase mapping for the passenger object"
  raw: 'Note that this schema represents the contract, that is, the object structure
    that the application expects to receive. It differs significantly from how the
    data is stored in the database, and the most important part is that the database
    implementation has no impact on how the application interacts with it, as long
    as the database response remains in accordance with the contract.


    An example JSON object following this contract is shown in Figure [14-5](#501585_2_En_14_Chapter.xhtml#Fig5).


    ![](Images/501585_2_En_14_Fig5_HTML.jpg)


    A screenshot of the J S O N code for booking I D, 10679\. It presents the details
    of booking, booking legs, passengers, and flights. The booking reference is E
    N 6 B 1 2.


    Figure 14-5


    Transfer object as JSON


    In short, the interaction between the application and the database can be summarized
    as follows:


    1.  The application serializes data into JSON format and sends it to the database
    by calling a corresponding database function.


    2.  A database function parses the JSON that was passed as a parameter and executes
    whatever the function is supposed to do: either a search or data transformation.
    PostgreSQL has a very well-developed JSON support with a rich set of functions,
    which makes it easy to manipulate JSON on the database side.


    3.  The result set is converted to JSON and passed to the application, where it
    is deserialized and is ready to be consumed by the application.


    ## NORM in the Application Perspective


    On the application side, the Python classes in Listing [14-2](#501585_2_En_14_Chapter.xhtml#PC2)
    are mapped to the same transfer object.


    ```

    from typing import List

    from pydantic import BaseModel, Field

    from datetime.datetime import datetime, timezone

    from phonenumber import PhoneNumber

    class Booking(BaseModel):

    booking_id: int

    booking_ref: str

    booking_legs: List[BookingLeg]

    booking_name: str

    account_id: int

    email: str

    phone: PhoneNumber

    update_ts: datetime

    price: decimal

    class BookingLeg(BaseModel):

    booking_leg_id: int

    flight: Flight

    is_returning: bool

    update_ts: datetime

    class Flight(BaseModel):

    flight_id: int

    flight_no: int

    scheduled_departure: datetime

    scehduled_arrival: datetimee

    departure_airport: Airport

    arrival_airport: Airport

    status: str

    aircraft_code: str

    actual_departure: datetime

    actual_arrival: datetime

    update_ts=datetime

    class Airport(BaseModel):

    airport_code: str = Field(min_length=3,max_length=3)

    airport_name: str

    airport_tz: timezone

    city: str

    continent: str

    iso_country: str

    iso_region: str

    intnl: bool

    update_ts: datetime

    class Passenger(BaseModel):

    passenger_id: int

    booking: Booking

    passenger_no: int

    first_name: str

    last_name: str

    account_id: int

    update_ts: datetime

    age: int

