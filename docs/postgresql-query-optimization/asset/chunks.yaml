  trans: '

    ### 基于索引的表访问


    请注意，直到我们讨论到物理操作之前，我们甚至没有提及数据访问算法。我们不需要"读取"关系——它们是抽象对象。如果我们遵循关系被映射为表的理念，那么除了将整个表读入主存之外，就没有其他方法来检索数据了。否则，我们如何知道哪些数据行包含哪些值？但如果关系型数据库仅止步于此，它们就不会成为如此强大的数据处理工具。所有关系型数据库，包括
    PostgreSQL，都允许构建额外的、冗余的数据结构，从而使数据访问速度远快于简单的顺序读取。


    这些额外的结构被称为索引。


    索引的构建方式将在本章后面介绍；目前，我们需要理解关于索引的两个事实。首先，它们是"冗余"的数据库对象；它们不存储任何在源表本身中找不到的额外信息。


    其次，索引提供了额外的数据访问路径；它们使我们能够确定表行中存储了哪些值，而无需实际读取表——这就是基于索引的访问的工作方式。而且，如前所述，这一切对应用程序来说是完全不可见的。


    如果一个过滤条件（或多个条件）被表上的某个索引所涵盖，则可以使用该索引来访问该表的数据。


    要从指针获取表行，必须读取包含该行的数据块。表的底层数据结构是 `heap`（堆），即行是无序存储的。它们的顺序不被保证，也不对应于数据的任何属性。根据索引的选择性，PostgreSQL
    会利用两种方法之一。第一种是 `index scan`（索引扫描）；第二种则依赖于 `bitmap index scan`（位图索引扫描），随后进行 `bitmap
    heap scan`（位图堆扫描）。


    一个索引条目包含与索引值匹配的记录的地址；此地址包含块地址以及记录在块内的偏移量。在 `index scan` 中，数据库引擎读取满足过滤条件的每个索引条目，并按索引顺序检索数据块。因为底层表是
    `heap`（堆），多个索引条目可能指向同一个数据块。如果索引的选择性低，这种情况很少发生，并且很可能没有数据块会被读取（或尝试读取）超过一次。然而，当选择性高、或使用了多个索引、或过滤条件不是等于比较时，情况就不同了。在这些情况下，将会使用
    `bitmap index scan`。这种方法在内存中构建一个 `heap` 位图。整个位图是一个单一的比特数组，其比特数与被扫描表的 `heap` 块数一样多。


    用于满足每个选择条件的索引被依次使用。要执行 `bitmap index scan`，首先创建一个位图，所有条目初始设置为 0（假）。每当找到一个匹配搜索条件的索引条目时，该索引条目所指示的
    `heap` 块对应的位就被设置为 1（真）。第二个及任何附加的 `bitmap index scan` 对其他搜索条件对应的索引执行相同的操作。一旦所有位图都创建完毕，引擎会执行按位逻辑
    `AND`（与）操作，以找出哪些块包含了所有选择条件所请求的值，从而产生最终的候选列表。这意味着，对于逻辑 `AND` 操作，只满足两个条件之一的块永远不需要被访问。如图
    3-2 所示。


    ![图 3-2：使用位图通过多个索引访问表。一个表有 16 列和 4 行。行标题是块哈希、索引 1、索引 2 和逻辑与。列标题是数字 1 到 16。索引 1
    和索引 2 的条目是 0 和 1。执行与操作，结果输入最后一行。](img/501585_2_En_3_Fig2_HTML.jpg)


    在计算出最终的候选列表后，使用 `bitmap heap scan`（基于位图的 `heap` 扫描）顺序读取候选数据块，并且对于每个块，检查其中的各个记录以重新验证搜索条件。请注意，请求的值可能位于同一个块中的不同行。位图确保相关行不会被遗漏，但并不保证所有被扫描的块都包含相关行。为简洁和清晰起见，此解释省略了一些实现细节。实际的实现更加复杂，并处理了各种边缘情况。


    基于索引的访问的成本模型比全表扫描复杂得多。非正式地，可以这样描述：对于选择性小的值，满足过滤条件的行很可能位于不同的块中，因此成本与结果行数成正比。对于选择性大的值，处理的块数接近总块数。在后一种情况下，成本会变得比全表扫描更高，因为访问索引需要资源。


    ### 仅索引扫描


    数据访问操作不一定返回整行。如果某些列对于查询不需要，一旦一行通过了过滤条件（如果有的话），这些列就可以被跳过。更正式地说，这意味着逻辑上的投影操作与数据访问操作相结合。当用于过滤的索引包含查询所需的每一列时，这种组合尤其有用。


    在此算法中，数据从索引中读取，并在必要时应用任何剩余的过滤条件。通常不需要访问表数据，但有时需要额外的检查——这将在第 5 章详细讨论。


    `index-only scan`（仅索引扫描）的成本模型与基于索引的表访问模型类似，只是无需实际访问表数据。对于选择性小的值，成本大约与返回的行数成正比。对于选择性大的值，该算法对索引执行（几乎）完全扫描。索引扫描的成本通常低于全表扫描的成本，因为它包含的数据更少。

    '
- fmt: '### Comparing Data Access Algorithms


    The choice of the best data access algorithm depends mostly on query selectivity.
    The relationship of cost to selectivity for different data access algorithms is
    shown in Figure [3-3](#501585_2_En_3_Chapter.xhtml#Fig3). We intentionally omitted
    all numbers on this chart as they depend on hardware and table size, while the
    qualitative comparison does not.


    ![](Images/501585_2_En_3_Fig3_HTML.jpg)


    A line graph of cost versus selectivity. Two curves increase from the origin.
    The upper curve indicates index access, and the lower curve indicates index only.
    A slightly increasing line at the center overlaps the upper curve and indicates
    the full scan.


    Figure 3-3


    Relationship of cost and query selectivity for different data access algorithms


    The cost function for a full scan is linear and is almost horizontal because the
    growth is due to generation of output. Typically, the cost of output generation
    is negligible in comparison with other costs for this algorithm.


    The cost function of index-based table access starts from (almost) 0 and grows
    quickly with the growth of selectivity. The growth slows down for large values
    of selectivity, where the cost is significantly higher than the cost of a full
    scan.


    The most interesting point is the intersection of the two functions: for smaller
    values of selectivity, index-based access is preferable, while a full scan is
    better for larger values of selectivity. The position of the intersection depends
    on hardware and may depend on the size of the table. For relatively slow rotating
    drives, index-based access is preferable only if selectivity does not exceed 2–5%.
    For SSDs or virtual environments, this value can be higher. On older spinning
    disk drives, random block access can be an order of magnitude slower than sequential
    access, so the additional overhead of indexes is higher for a given proportion
    of rows.


    The line representing an index-only scan is the lowest, meaning that this algorithm
    is always preferable if it is applicable (i.e., all needed columns are in the
    index).


    The query optimizer estimates both the selectivity of a query and the selectivity
    of the intersection point for this table and this index. The query shown in Listing
    [3-2](#501585_2_En_3_Chapter.xhtml#PC3) has a range filtering condition that selects
    a significant portion of the table.


    ```

    SELECT

    flight_no,

    departure_airport,

    arrival_airport

    FROM flight

    WHERE scheduled_departure BETWEEN

    ''2023-05-15''  AND  ''2023-08-31'';

    Listing 3-2

    A range filtering query executed with a full table scan

    ```


    In this case, the optimizer chooses a full scan.


    However, a smaller range in the same query (see Listing [3-3](#501585_2_En_3_Chapter.xhtml#PC4))
    results in index-based table access.


    ```

    SELECT

    flight_no,

    departure_airport,

    arrival_airport

    FROM flight

    WHERE scheduled_departure BETWEEN

    ''2023-08-12''  AND  ''2023-08-13'';

    Listing 3-3

    Range filtering with index-based table access

    ```


    In reality, the job of a query optimizer is much more complex: filtering conditions
    can be supported with multiple indexes with different values of selectivity. Multiple
    indexes can be combined to produce a block bitmap with fewer number of blocks
    to be scanned. As a result, the number of choices available to the optimizer is
    significantly larger than three algorithms.


    Thus, there are no winners and losers among data access algorithms. Any algorithm
    can be a winner under certain conditions. Further, the choice of algorithm depends
    on storage structures and statistical properties of the data. The database maintains
    metadata known as statistics for tables including metrics such as column cardinality,
    sparseness, etc. Usually these statistics are not known during application development
    and may change throughout the application lifecycle. Therefore, the declarative
    nature of the query language is essential for system performance. More specifically,
    as the table statistics change or if other costing factors are adjusted, a different
    execution plan can be chosen for the same query.


    ## Index Structures


    This section briefly explores the most common index structures, such as trees
    and hash indexes, and touches on some PostgreSQL specifics.


    We show how to estimate the scale of improvement for different types of indexes
    and how to detect cases when index usage won’t provide any performance benefits.'
