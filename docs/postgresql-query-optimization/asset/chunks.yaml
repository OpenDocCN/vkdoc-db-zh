  trans: '# 5. 短查询与索引


    第 4 章深入探讨了如何理解执行计划。现在，我们转向在运行`EXPLAIN`命令并返回执行计划之后该做什么。如果我们的目标是改进查询执行计划，我们应该从何处入手？


    第一步是识别查询是短查询还是长查询。本章将重点讨论如何优化短查询。你将学习如何识别短查询、针对短查询应使用何种优化技术，以及为何索引对此类查询至关重要。我们还将讨论
    PostgreSQL 中可用的不同索引类型及其各自的适用场景。


    在继续本章之前，让我们先创建几个额外的索引：


    ```sql

    SET search_path TO postgres_air;

    CREATE INDEX flight_arrival_airport ON flight  (arrival_airport);

    CREATE INDEX booking_leg_flight_id ON booking_leg  (flight_id);

    CREATE INDEX flight_actual_departure ON flight  (actual_departure);

    CREATE INDEX boarding_pass_booking_leg_id ON boarding_pass  (booking_leg_id);

    CREATE INDEX booking_update_ts ON booking  (update_ts);

    ```


    别忘了在你为所有新建索引的表上运行`ANALYZE`：


    ```sql

    ANALYZE  flight ;

    ANALYZE  booking_leg;

    ANALYZE  booking;

    ANALYZE boarding_pass;

    ```


    ## 何为“短”查询？


    术语*短查询*已经多次出现，但尚未给出正式定义。什么是短查询？首先，它与 SQL 查询语句的长度无关。请看示例 5-1 和 5-2 中展示的两个查询。清单
    5-1 中的查询仅包含四行代码，却代表一个*长查询*。而清单 5-2 包含更多行，却是一个短查询。


    ```sql

    SELECT

    d.airport_code AS departure_airport,

    a.airport_code AS arrival_airport

    FROM  airport a,

    airport d

    Listing 5-1

    长查询示例

    ```


    ```sql

    SELECT

    f.flight_no,

    f.scheduled_departure,

    boarding_time,

    p.last_name,

    p.first_name,

    bp.update_ts as pass_issued,

    ff.level

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    JOIN account a on a.account_id =p.account_id

    JOIN boarding_pass bp on bp.passenger_id=p.passenger_id

    LEFT OUTER JOIN frequent_flyer ff on ff.frequent_flyer_id=a.frequent_flyer_id

    WHERE f.departure_airport = ''JFK''

    AND f.arrival_airport = ''ORD''

    AND f.scheduled_departure BETWEEN

    ''2023-08-05'' AND ''2023-08-07''

    Listing 5-2

    短查询示例

    ```


    其次，它也不是由结果集的大小来定义的。清单 5-3 中的查询只返回一行；然而，它是一个长查询。


    ```sql

    SELECT

    avg(flight_length),

    avg (passengers)

    FROM (SELECT

    flight_no,

    scheduled_arrival -scheduled_departure AS flight_length,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    GROUP BY 1,2) a

    Listing 5-3

    产生一行的长查询

    ```


    那么，什么是短查询？


    当计算输出所需的行数较少时，该查询就是短查询，无论涉及的表有多大。短查询可能会读取小表中的每一行，但只读取大表中很小比例的行。


    上述定义最重要的部分是*需要*和*访问*之间的区别。一个短查询的糟糕执行计划可能会读取和/或处理比最终输出所需多得多的行。虽然一定程度的冗余处理是不可避免的，但我们的目标是减少它。


    “很小比例”有多小？不出所料，这取决于系统参数、应用程序的具体情况、实际表大小以及可能的其他因素。但在大多数情况下，它意味着小于 10%。本章后面将通过一个案例研究来说明如何识别这个临界点。


    相比之下，长查询的输出依赖于一个大表或几个大表中相当大比例的行。


    我们对查询的分类类似于普遍接受的 OLTP（联机事务处理）和 OLAP（联机分析处理）查询之间的区别。所有的 OLTP 查询都是短查询。然而，许多现代应用程序需要的查询可能返回数百行，但仍然是短查询。


    为什么清单 5-1 是长查询？因为需要`airport`表中的所有行才能获得结果。为什么清单 5-2 是短查询？因为它只需要大约 200,000 个航班中几个航班的数据。为什么清单
    5-3 不是短查询？因为计算结果需要系统中每个预订的数据。


    当我们优化一个短查询时，我们知道最终我们选择的是相对较少的记录。这意味着优化目标是尽早减少结果集的大小。如果最具限制性的选择标准应用于查询执行的第一步，后续的排序、分组甚至连接操作的成本都会降低。查看执行计划时，应该不存在对大表的表扫描。对于小表，全表扫描可能仍然有效，如第
    3 章图 3-2 所示。


    ## 选择选择标准


    确保最具限制性的选择标准最先应用，这似乎很容易；然而，这并不总是那么简单。显而易见的是，本章名为“短查询与索引”是有原因的：如果没有索引支持相应的搜索，就无法快速从表中选择记录的子集。这就是为什么短查询需要索引来实现更快的执行。如果缺乏支持高限制性查询的索引，很可能就需要创建一个。'
- fmt: '### Index Selectivity


    Chapter [3](#501585_2_En_3_Chapter.xhtml) introduced the concept of query selectivity.
    The same concept can be applied to indexes: the smaller the number of records
    that correspond to one value of the index, the lower the index’s selectivity value.
    We do not want to create indexes with high selectivity; as we saw in Chapter [3](#501585_2_En_3_Chapter.xhtml),
    index-based data retrieval in this case will take more time than a sequential
    scan. Since the PostgreSQL optimizer predetermines the cost of each access method,
    this index would never be used, so performance wouldn’t be compromised. However,
    it is still undesirable to add a database object that requires storage space and
    extra time to update, but doesn’t provide any benefit.


    A database table might have multiple indexes on different columns, each with different
    selectivity. The best performance possible for a short query occurs when the most
    restrictive indexes (i.e., indexes with the lowest selectivity) are used.


    Let’s look at the query in Listing [5-4](#501585_2_En_5_Chapter.xhtml#PC6). Can
    you tell which filtering criterion is the most restrictive?


    ```sql

    SELECT *

    FROM flight

    WHERE departure_airport=''LAX''

    AND update_ts BETWEEN ''2023-08-13'' AND ''2023-08-15''

    AND status=''Delayed''

    AND scheduled_departure BETWEEN ''2023-08-13'' AND ''2023-08-15''

    Listing 5-4

    Index selectivity

    ```


    `Delayed` status might be the most restrictive, because ideally, on any given
    day, there are many more on-time flights than delayed flights.


    In our training database, we have a flight schedule for six months, so limiting
    it by two days might not be very restrictive. On the other hand, usually the flight
    schedule is posted well in advance, and if we are looking for flights where the
    timestamp of the last update is relatively close to the scheduled departure, it
    most likely indicates that these flights were delayed or canceled.


    Another factor that may be taken into consideration is the popularity of the airport
    in question. `LAX` is a popular airport, and for Listing [5-4](#501585_2_En_5_Chapter.xhtml#PC6),
    a restriction on `update_ts` will be more restrictive than on `departure_airport`.
    However, if we change the filtering on `departure_airport` to `FUK`, the airport
    criterion will be more restrictive than selection based on `update_ts`.


    If all the search criteria are indexed, there is no cause for concern; the way
    multiple indexes can work together will be covered in a moment. But if the most
    restrictive criterion is not indexed, the execution plan may be suboptimal, and
    likely, an additional index is needed.


    ### Unique Indexes and Constraints


    The better (lower) the selectivity of an index, the faster the search. Thus, the
    most efficient indexes are unique indexes.


    An index is unique if for each indexed value there is exactly one matching row
    in the table.


    There are several different ways to create a unique index. First, PostgreSQL automatically
    creates a unique index to support any primary key or unique constraint on a table.


    What is the difference between a primary key and a unique constraint? A common
    misconception among SQL developers is that a primary key has to be an incrementing
    numeric value and that each table “has” to have a primary key. Although it often
    helps to have a numeric incremental primary key (called a surrogate key), a primary
    key does not have to be numeric, and moreover, it does not have to be a single-attribute
    constraint. It is possible to define a primary key as a combination of several
    attributes; it just has to satisfy two conditions: the combination must be `UNIQUE`
    and `NOT NULL` for all of the participating attributes. In contrast, unique constraints
    in PostgreSQL allow for `NULL` values.


    A table can have a single primary key (though a primary key is not required) and
    multiple unique constraints. Any non-null unique constraint can be chosen to be
    a primary key for a table; thus, there is no programmatic way to determine the
    best candidate for a table’s primary key. For example, the table `booking` has
    a primary key on `booking_id` and a unique key on `booking_ref`—see Listing [5-5](#501585_2_En_5_Chapter.xhtml#PC7).


    ```sql

    ALTER TABLE booking

    ADD CONSTRAINT booking_pkey PRIMARY KEY (booking_id);

    ALTER TABLE booking

    ADD CONSTRAINT booking_booking_ref_key UNIQUE (booking_ref);

    Listing 5-5

    A primary key and a unique constraint

    ```


    Since `booking_ref` is a non-null attribute, we could choose either `booking_id`
    or `booking_ref` to be the primary key.


    As shown in the ER diagram in Chapter [1](#501585_2_En_1_Chapter.xhtml), the column
    `frequent_flyer_id` in the table `account` is nullable and also unique:


    ```sql

    ALTER TABLE account

    ADD CONSTRAINT account_freq_flyer_unq_key UNIQUE (frequent_flyer_id);

    ```


    It is also possible to create a unique index without formally defining a unique
    constraint. All you have to do is to add the keyword `unique` to the index creation
    statement:


    ```sql

    CREATE UNIQUE INDEX account_freq_flyer ON

    account (frequent_flyer_id);

    ```


    If we create this index after data was already inserted into this table, `CREATE
    UNIQUE INDEX` will validate the uniqueness of values, and if any duplicates are
    found, the index won’t be created. For any subsequent inserts and updates, the
    uniqueness of new values will be validated as well.


    What about foreign keys? Do they automatically create any indexes? A common misconception
    is the belief that the presence of a foreign key necessarily implies the presence
    of an index on the child table. This is not true.


    A foreign key is a referential integrity constraint; it guarantees that for each
    non-null value in the child table (i.e., the table with the foreign key constraint),
    there is a matching unique value in the parent table (i.e., the table it is referencing).


    For example, there is a foreign key constraint on the `flight` table that ensures
    that each arrival airport matches an existing airport code:


    ```sql

    ALTER TABLE flight

    ADD CONSTRAINT arrival_airport_fk FOREIGN KEY (arrival_airport)

    REFERENCES airport (airport_code);

    ```


    This constraint does not automatically create an index; if searches by arrival
    airport are slow, the index must be explicitly created:


    ```sql

    CREATE INDEX flight_arrival_airport

    ON flight (arrival_airport);

    ```


    Chapter [3](#501585_2_En_3_Chapter.xhtml) mentioned that unique indexes make nested
    loops efficient. If you refer to Figure [3-7](#501585_2_En_3_Chapter.xhtml#Fig7),
    you will realize what happens when an index is present.'
  raw: '### Index Selectivity


    Chapter [3](#501585_2_En_3_Chapter.xhtml) introduced the concept of *query selectivity*.
    The same concept can be applied to indexes: the smaller the number of records
    that correspond to one value of the index, the lower the index’s selectivity value.
    We do not want to create indexes with high selectivity; as we saw in Chapter [3](#501585_2_En_3_Chapter.xhtml),
    index-based data retrieval in this case will take *more* time than a sequential
    scan. Since the PostgreSQL optimizer predetermines the cost of each access method,
    this index would never be used, so performance wouldn’t be compromised. However,
    it is still undesirable to add a database object that requires storage space and
    extra time to update, but doesn’t provide any benefit.


    A database table might have multiple indexes on different columns, each with different
    selectivity. The best performance possible for a short query occurs when the most
    restrictive indexes (i.e., indexes with the lowest selectivity) are used.


    Let’s look at the query in Listing [5-4](#501585_2_En_5_Chapter.xhtml#PC6). Can
    you tell which filtering criterion is the most restrictive?


    ```

    SELECT *

    FROM flight

    WHERE departure_airport=''LAX''

    AND update_ts BETWEEN ''2023-08-13'' AND ''2023-08-15''

    AND status=''Delayed''

    AND scheduled_departure BETWEEN ''2023-08-13'' AND ''2023-08-15''

    Listing 5-4

    Index selectivity

    ```


    Delayed status might be the most restrictive, because ideally, on any given day,
    there are many more on-time flights than delayed flights.


    In our training database, we have a flight schedule for six months, so limiting
    it by two days might not be very restrictive. On the other hand, usually the flight
    schedule is posted well in advance, and if we are looking for flights where the
    timestamp of the last update is relatively close to the scheduled departure, it
    most likely indicates that these flights were delayed or canceled.


    Another factor that may be taken into consideration is the popularity of the airport
    in question. LAX is a popular airport, and for Listing [5-4](#501585_2_En_5_Chapter.xhtml#PC6),
    a restriction on `update_ts` will be more restrictive than on `departure_airport`.
    However, if we change the filtering on `departure_airport` to FUK, the airport
    criterion will be more restrictive than selection based on `update_ts`.


    If all the search criteria are indexed, there is no cause for concern; the way
    multiple indexes can work together will be covered in a moment. But if the most
    restrictive criterion is not indexed, the execution plan may be suboptimal, and
    likely, an additional index is needed.


    ### Unique Indexes and Constraints


    The better (lower) the selectivity of an index, the faster the search. Thus, the
    most efficient indexes are unique indexes.


    An index is *unique* if for each indexed value there is exactly one matching row
    in the table.


    There are several different ways to create a unique index. First, PostgreSQL automatically
    creates a unique index to support any primary key or unique constraint on a table.


    What is the difference between a primary key and a unique constraint? A common
    misconception among SQL developers is that a primary key has to be an incrementing
    numeric value and that each table “has” to have a primary key. Although it often
    helps to have a numeric incremental primary key (called a *surrogate key*), a
    primary key does not have to be numeric, and moreover, it does not have to be
    a single-attribute constraint. It is possible to define a primary key as a combination
    of several attributes; it just has to satisfy two conditions: the combination
    must be `UNIQUE` and `NOT NULL` for all of the participating attributes. In contrast,
    unique constraints in PostgreSQL allow for `NULL` values.


    A table can have a single primary key (though a primary key is not required) and
    multiple unique constraints. Any non-null unique constraint can be chosen to be
    a primary key for a table; thus, there is no programmatic way to determine the
    best candidate for a table’s primary key. For example, the table `booking` has
    a primary key on `booking_id` and a unique key on `booking_ref`—see Listing [5-5](#501585_2_En_5_Chapter.xhtml#PC7).


    ```

    ALTER TABLE booking

    ADD CONSTRAINT booking_pkey PRIMARY KEY (booking_id);

    ALTER TABLE booking

    ADD CONSTRAINT booking_booking_ref_key UNIQUE (booking_ref);

    Listing 5-5

    A primary key and a unique constraint

    ```


    Since `booking_ref` is a non-null attribute, we could choose either `booking_id`
    or `booking_ref` to be the primary key.


    As shown in the ER diagram in Chapter [1](#501585_2_En_1_Chapter.xhtml), the column
    `frequent_flyer_id` in the table `account` is nullable and also unique:


    ```

    ALTER TABLE account

    ADD CONSTRAINT account_freq_flyer_unq_key UNIQUE (frequent_flyer_id);

    ```


    It is also possible to create a unique index without formally defining a unique
    constraint. All you have to do is to add the keyword `unique` to the index creation
    statement:


    ```

    CREATE UNIQUE INDEX account_freq_flyer ON

    account (frequent_flyer_id);

    ```


    If we create this index after data was already inserted into this table, `CREATE
    UNIQUE INDEX` will validate the uniqueness of values, and if any duplicates are
    found, the index won’t be created. For any subsequent inserts and updates, the
    uniqueness of new values will be validated as well.


    What about foreign keys? Do they automatically create any indexes? A common misconception
    is the belief that the presence of a foreign key necessarily implies the presence
    of an index on the child table. This is not true.


    A *foreign key* is a referential integrity constraint; it guarantees that for
    each non-null value in the child table (i.e., the table with the foreign key constraint),
    there is a matching unique value in the parent table (i.e., the table it is referencing).


    For example, there is a foreign key constraint on the `flight` table that ensures
    that each arrival airport matches an existing airport code:


    ```

    ALTER TABLE flight

    ADD CONSTRAINT arrival_airport_fk FOREIGN KEY (arrival_airport)

    REFERENCES airport (airport_code);

    ```


    This constraint does not automatically create an index; if searches by arrival
    airport are slow, the index must be explicitly created:


    ```

    CREATE INDEX flight_arrival_airport

    ON flight (arrival_airport);

    ```


    Chapter [3](#501585_2_En_3_Chapter.xhtml) mentioned that unique indexes make nested
    loops efficient. If you refer to Figure [3-7](#501585_2_En_3_Chapter.xhtml#Fig7),
    you will realize what happens when an index is present.'
  trans: '

    ### 索引选择性


    第 3 章介绍了查询选择性的概念。同样的概念也适用于索引：对应于索引中一个值的记录数越少，索引的选择性值就越低。我们不希望创建选择性高的索引；正如我们在第
    3 章所见，这种情况下基于索引的数据检索将比顺序扫描花费更多时间。由于 PostgreSQL 优化器会预先确定每种访问方法的成本，这种索引永远不会被使用，因此性能不会受到影响。然而，添加一个需要存储空间和额外更新时间却无法提供任何收益的数据库对象，仍然是不可取的。


    一个数据库表可能在不同列上有多个索引，每个索引都有不同的选择性。对于短查询来说，可能达到的最佳性能是在使用最具限制性的索引（即选择性最低的索引）时。


    让我们看一下代码清单 5-4 中的查询。你能说出哪个过滤条件是最具限制性的吗？


    ```sql

    SELECT *

    FROM flight

    WHERE departure_airport=''LAX''

    AND update_ts BETWEEN ''2023-08-13'' AND ''2023-08-15''

    AND status=''Delayed''

    AND scheduled_departure BETWEEN ''2023-08-13'' AND ''2023-08-15''

    Listing 5-4

    索引选择性

    ```


    `Delayed`（延误）状态可能是最具限制性的，因为理想情况下，在任何给定的日子里，准点航班都远多于延误航班。


    在我们的培训数据库中，我们有六个月的航班时刻表，所以将其限制在两天内可能限制性不强。另一方面，通常航班时刻表会提前很久发布，如果我们查找的是最后更新时间戳相对接近计划起飞时间的航班，这很可能表明这些航班被延误或取消了。


    另一个可能需要考虑的因素是相关机场的受欢迎程度。`LAX`（洛杉矶国际机场）是一个繁忙的机场，对于代码清单 5-4 来说，基于 `update_ts` 的限制会比基于
    `departure_airport` 的限制更具限制性。然而，如果我们将 `departure_airport` 上的过滤条件改为 `FUK`（福冈机场），那么机场标准的限制性将超过基于
    `update_ts` 的选择。


    如果所有搜索条件都被索引了，那么就不用担心；多个索引如何协同工作的方式稍后会介绍。但如果最具限制性的条件没有被索引，执行计划可能不是最优的，并且很可能需要一个额外的索引。


    ### 唯一索引与约束


    索引的选择性越好（越低），搜索速度就越快。因此，最高效的索引是唯一索引。


    如果对于每个被索引的值，在表中都恰好只有一行与之匹配，那么该索引就是唯一的。


    创建唯一索引有几种不同的方式。首先，PostgreSQL 会自动创建唯一索引来支持表上的任何主键或唯一约束。


    主键和唯一约束之间有什么区别？SQL 开发者中一个常见的误解是，主键必须是一个递增的数值，并且每张表“必须”有一个主键。虽然拥有一个数字递增的主键（称为代理键）通常很有帮助，但主键不一定是数字，而且它也不一定是单一属性的约束。可以将主键定义为多个属性的组合；它只需满足两个条件：该组合对于所有参与的属性必须同时是
    `UNIQUE`（唯一的）和 `NOT NULL`（非空）的。相比之下，PostgreSQL 中的唯一约束允许 `NULL` 值。


    一张表可以有一个主键（尽管主键不是必需的）和多个唯一约束。任何一个非空的唯一约束都可以被选作表的主键；因此，没有编程方式可以确定哪一个是表的主键的最佳候选。例如，`booking`
    表的主键在 `booking_id` 上，唯一键在 `booking_ref` 上——参见代码清单 5-5。


    ```sql

    ALTER TABLE booking

    ADD CONSTRAINT booking_pkey PRIMARY KEY (booking_id);

    ALTER TABLE booking

    ADD CONSTRAINT booking_booking_ref_key UNIQUE (booking_ref);

    Listing 5-5

    一个主键和一个唯一约束

    ```


    由于 `booking_ref` 是一个非空属性，我们可以选择 `booking_id` 或 `booking_ref` 作为主键。


    如第 1 章的 ER 图所示，`account` 表中的 `frequent_flyer_id` 列是可空的，并且也是唯一的：


    ```sql

    ALTER TABLE account

    ADD CONSTRAINT account_freq_flyer_unq_key UNIQUE (frequent_flyer_id);

    ```


    也可以不正式定义唯一约束，而是直接创建一个唯一索引。你只需在索引创建语句中添加关键字 `unique`：


    ```sql

    CREATE UNIQUE INDEX account_freq_flyer ON

    account (frequent_flyer_id);

    ```


    如果我们在这个表已经插入数据之后创建这个索引，`CREATE UNIQUE INDEX` 将会验证值的唯一性，如果发现任何重复，索引将不会被创建。对于任何后续的插入和更新，新值的唯一性也将被验证。


    那么外键呢？它们会自动创建索引吗？一个常见的误解是认为外键的存在必然意味着在子表上存在索引。事实并非如此。


    外键是一种参照完整性约束；它保证在子表（即具有外键约束的表）中每个非空值，在父表（即它引用的表）中都有一个与之匹配的唯一值。


    例如，在 `flight` 表上有一个外键约束，确保每个到达机场都匹配一个现有的机场代码：


    ```sql

    ALTER TABLE flight

    ADD CONSTRAINT arrival_airport_fk FOREIGN KEY (arrival_airport)

    REFERENCES airport (airport_code);

    ```


    这个约束不会自动创建索引；如果通过到达机场进行搜索很慢，就必须显式创建索引：


    ```sql

    CREATE INDEX flight_arrival_airport

    ON flight (arrival_airport);

    ```


    第 3 章提到，唯一索引使嵌套循环变得高效。如果你参考图 3-7，你会意识到当索引存在时会发生什么。

    '
- fmt: '# 嵌套循环连接与索引


    如果表 `S` 的连接条件属性上存在索引，嵌套循环连接算法也可以与基于索引的数据访问相结合。对于自然连接，基于索引的嵌套循环算法的内循环会缩小为针对 `R`
    的每一行仅访问 `S` 的少数几行。如果 `S` 上的索引是唯一的（例如，`S` 的连接属性是其主键），内循环甚至可以完全消失。


    这常常被误解为意味着在连接主键/外键时，嵌套循环总是高效的。然而，如前所述，这仅在子表（即外键）中的列被索引时才成立。


    ## 是否总是为外键列创建索引？


    是否总是为具有外键约束的列创建索引是最佳实践吗？并非总是如此。仅当不同值的数量足够大时才应创建索引。请记住，高选择性的索引不太可能有用。例如，`flight`
    表在 `aircraft_code` 上有一个外键约束：


    ```sql

    ALTER TABLE flight

    ADD CONSTRAINT aircraft_code_fk FOREIGN KEY (aircraft_code)

    REFERENCES aircraft (code);

    ```


    这个外键约束是必要的，因为每个航班必须分配一个有效的飞机。为了支持此外键约束，为 `aircraft` 表添加了主键约束。然而，该表只有 12 行。因此，没有必要在
    `flight` 表的 `aircraft_code` 列上创建索引。该列只有 12 个不同的值，因此该列上的索引不会被使用。


    为了说明这一点，让我们看清单 [5-6](#501585_2_En_5_Chapter.xhtml#PC13) 中的查询。该查询选择 2023 年 8 月
    14 日至 16 日期间从 JFK 机场出发的所有航班。对于每个航班，我们选择航班号、计划起飞时间、飞机型号和乘客数量。


    ```sql

    SELECT

    f.flight_no,

    f.scheduled_departure,

    model,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    JOIN aircraft ac ON ac.code=f.aircraft_code

    WHERE f.departure_airport =''JFK''

    AND f.scheduled_departure BETWEEN

    ''2023-08-14'' AND ''2023-08-16''

    GROUP BY 1,2,3

    ```


    清单 5-6：一个没有使用索引的主键/外键连接


    该查询的执行计划如图 [5-1](#501585_2_En_5_Chapter.xhtml#Fig1) 所示，并且它非常庞大。


    ![](Images/501585_2_En_5_Fig1_HTML.jpg)


    一组文本行表示一个很长的查询计划。它从上到下包含 22 行。一些标签包括 group aggregate、group key、sort、sort key、hash
    join、sequential scan on passenger、nested loop 和 sequential scan on aircraft。


    图 5-1：对小表进行顺序扫描的计划


    我们目前对此计划唯一感兴趣的部分是：


    ```sql

    Hash  (cost=1.12..1.12 rows=12 width=64)

    -> Seq Scan on aircraft ac (cost=0.00..1.12 rows=12

    ```


    PostgreSQL 优化器访问表统计信息，并能够检测到 `aircraft` 表的规模很小，使用索引访问效率不高。相比之下，正如我们在本章前面观察到的，由于低选择性，`flight`
    表的 `departure_airport` 字段上的索引被证明是有用的。


    ## 索引与非等值条件


    第 [3](#501585_2_En_3_Chapter.xhtml) 章描述了 B-tree 索引的结构、构建方式以及如何用于搜索。接下来是它们实际应用的演示。


    前一节涉及简单的 B-tree 索引。如第 [3](#501585_2_En_3_Chapter.xhtml) 章所述，它们可以支持等于、大于、小于和 BETWEEN
    条件的搜索：所有需要比较和排序的搜索。OLTP 系统中的大多数搜索都属于此类，但也存在相当数量的情况，其搜索条件更为复杂。


    ### 索引与列转换


    什么是列转换？当搜索条件针对列中值的某些修改时，就会发生列转换。例如，`lower(last_name)`（将 `last_name` 值转换为小写）和 `update_ts::date`（将带时区的时间戳转换为日期）就是列转换。


    列转换如何影响索引使用？很简单，无法在该属性上使用 B-tree 索引。回顾第 [3](#501585_2_En_3_Chapter.xhtml) 章中 B-tree
    的构建方式和搜索执行方式：在每个节点中，属性的值会与节点中的值进行比较。转换后的值没有记录在任何地方，因此没有东西可以与之比较。因此，如果 `last_name`
    上有一个索引


    ```sql

    CREATE INDEX account_last_name

    ON account (last_name);

    ```


    ……以下搜索将无法利用该索引：


    ```sql

    SELECT *

    FROM account

    WHERE lower(last_name)=''daniels'';

    ```


    我们如何解决这个问题？可能需要进行这样的搜索，因为乘客可能会以不同的大小写输入他们的姓氏。如果你认为覆盖最常见的情况就足够了，你可以像这样修改搜索条件：


    ```sql

    SELECT *

    FROM account

    WHERE last_name=''daniels''

    OR last_name=''Daniels''

    OR last_name =''DANIELS''

    ```


    该查询的执行计划如图 [5-2](#501585_2_En_5_Chapter.xhtml#Fig2) 所示。


    ![](Images/501585_2_En_5_Fig2_HTML.jpg)


    一组文本行表示一个较短的查询计划。它从上到下包含 9 行。它包括对 account 的 bitmap heap scan、recheck condition
    以及对 account_last_name 的 bitmap index scan。


    图 5-2：使用 "like" 操作符重写的执行计划


    更好的解决方案是创建一个（额外的）*函数*索引：


    ```sql

    CREATE INDEX account_last_name_lower

    ON account (lower(last_name));

    ```


    当构建函数索引时，PostgreSQL 会将函数应用于列（或多列）的值，然后将这些值放入 B-tree 中。与常规 B-tree 索引（节点包含列的值）类似，在函数索引中，节点包含函数的值。在我们的例子中，函数是
    `lower()`。创建索引后，清单 [5-7](#501585_2_En_5_Chapter.xhtml#PC19) 中的查询 #1 将不会使用顺序扫描，而是能够利用新索引。相应的执行计划如图
    [5-3](#501585_2_En_5_Chapter.xhtml#Fig3) 所示。


    ```sql

    ---#1

    SELECT * FROM account WHERE lower(last_name)=''daniels'';

    ---#2

    SELECT * FROM account WHERE last_name=''Daniels'';

    ---#3

    SELECT * FROM account WHERE last_name=''daniels'';

    ---#4

    SELECT * FROM account WHERE lower(last_name)=''Daniels'';

    ```


    清单 5-7：不同的搜索条件使用不同的索引


    请注意，如果我们希望特定大小写的值搜索也能被索引支持（例如查询 #2），`last_name` 列上的索引仍然是必要的。此外，值得一提的是，如果表 `account`
    包含一条 `last_name = ''Daniels''` 的记录和另一条 `last_name = ''DANIELS''` 的记录，查询 #1 将返回两条记录，查询
    #2 将只返回第一条记录，而查询 #3 和 #4 将不会返回其中任何一条。


    ![](Images/501585_2_En_5_Fig3_HTML.jpg)


    一组文本行表示一个包含 4 行的查询计划，从上到下。这些行表示对 account 的 Bitmap heap scan、recheck condition、对
    account_last_name_lower_pattern 的 Bitmap index scan 以及 index condition。


    图 5-3：使用函数索引的计划


    注意


    有时，不需要额外的索引。


    每次需要使用列转换进行搜索时都应该创建函数索引吗？不一定。然而，重要的是要识别列转换，这可能是微妙的。


    例如，让我们看下面的 SELECT 语句：


    ```sql

    SELECT *

    FROM flight

    WHERE scheduled_departure ::date

    BETWEEN ''2023-08-17'' AND ''2023-08-18''

    ```'
  raw: 'The nested loop join algorithm can also be combined with index-based data
    access if the table `S` has an index on attributes used in the join condition.
    For natural joins, the inner loop of the index-based nested loop algorithm shrinks
    to few rows of `S` for each row of `R`. The inner loop can even vanish completely
    if the index on `S` is unique, for example, the join attribute of `S` is its primary
    key.


    Often, this is misunderstood to mean that nested loops are always efficient when
    joining on a primary/foreign key. However, as mentioned earlier, this is true
    only if the column in the child table—that is, the foreign key—is indexed.


    Is it a best practice to always create an index on a column that has a foreign
    key constraint? Not always. An index should only be created if the number of distinct
    values is large enough. Remember, indexes with high selectivity are unlikely to
    be useful. For example, the `flight` table has a foreign key constraint on `aircraft_code`:


    ```

    ALTER TABLE flight

    ADD CONSTRAINT aircraft_code_fk FOREIGN KEY (aircraft_code)

    REFERENCES aircraft (code);

    ```


    This foreign key constraint is necessary because for each flight, there must be
    a valid aircraft assigned. In order to support the foreign key constraint, a primary
    key constraint was added to the `aircraft` table. That table, however, has only
    12 rows. Therefore, it is not necessary to create an index on the `aircraft_code`
    column of the `flight` table. This column has only 12 distinct values, so an index
    on that column will not be used.


    To illustrate this statement, let’s look at the query in Listing [5-6](#501585_2_En_5_Chapter.xhtml#PC13).
    This query selects all fights departing from JFK airport between August 14 and
    16, 2023\. For each flight, we select the flight number, scheduled departure,
    aircraft model, and number of passengers.


    ```

    SELECT

    f.flight_no,

    f.scheduled_departure,

    model,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    JOIN aircraft ac ON ac.code=f.aircraft_code

    WHERE f.departure_airport =''JFK''

    AND f.scheduled_departure BETWEEN

    ''2023-08-14'' AND ''2023-08-16''

    GROUP BY 1,2,3

    Listing 5-6

    A join by a primary/foreign key without an index

    ```


    The execution plan for this query is shown in Figure [5-1](#501585_2_En_5_Chapter.xhtml#Fig1),
    and it is massive.


    ![](Images/501585_2_En_5_Fig1_HTML.jpg)


    A set of lines of text denotes a long query plan. It comprises 22 lines from top
    to bottom. Some of the labels include group aggregate, group key, sort, sort key,
    hash join, sequential scan on passenger, nested loop, and sequential scan on aircraft.


    Figure 5-1


    A plan with a sequential scan of a small table


    The only part of this plan we are interested in now is this:


    ```

    Hash  (cost=1.12..1.12 rows=12 width=64)

    -> Seq Scan on aircraft ac (cost=0.00..1.12 rows=12

    ```


    The PostgreSQL optimizer accesses table statistics and is able to detect that
    the size of the `aircraft` table is small and index access won’t be efficient.
    In contrast, as we observed earlier in this chapter, the index on the departure_airport
    field of the flight table proved to be useful due to its low selectivity.


    ## Indexes and Non-equal Conditions


    Chapter [3](#501585_2_En_3_Chapter.xhtml) described the structure of B-tree indexes,
    how they are built, and how they are used for searches. What follows is a demonstration
    of their practical application.


    The previous section relates to simple B-tree indexes. As noted in Chapter [3](#501585_2_En_3_Chapter.xhtml),
    they can support searches by equality, greater than, less than, and between conditions:
    all the searches that require comparison and ordering. The majority of searches
    in an OLTP system fall into this category, but there are also a nontrivial number
    of cases when search criteria are more complex.


    ### Indexes and Column Transformations


    What is a column transformation? A column transformation occurs when the search
    criteria are on some modifications of the values in a column. For example, `lower(last_name)`
    (converting the last_name value to lowercase) and `update_ts::date` (casting timestamp
    with time zone to date) are column transformations.


    How do column transformations affect index use? Quite simply, B-tree indexes on
    the attribute cannot be used. Recall from Chapter [3](#501585_2_En_3_Chapter.xhtml)
    how a B-tree is built and how a search on a B-tree is performed: in each node,
    the value of the attribute is compared to the value in the node. The transformed
    value is not recorded anywhere, so there is nothing to compare it to. Thus, if
    there is an index on last name


    ```

    CREATE INDEX account_last_name

    ON account (last_name);

    ```


    …the following search won’t be able to take advantage of the index:


    ```

    SELECT *

    FROM account

    WHERE lower(last_name)=''daniels'';

    ```


    How do we solve this problem? A search like this might be needed because passengers
    may enter their last names with different cases. If you believe that covering
    the most common cases is sufficient, you could modify the search criterion like
    so:


    ```

    SELECT *

    FROM account

    WHERE last_name=''daniels''

    OR last_name=''Daniels''

    OR last_name =''DANIELS''

    ```


    The execution plan for this query is shown in Figure [5-2](#501585_2_En_5_Chapter.xhtml#Fig2).


    ![](Images/501585_2_En_5_Fig2_HTML.jpg)


    A set of lines of text denotes a short query plan. It comprises 9 lines from top
    to bottom. It includes the bitmap heap scan on the account, recheck condition,
    and bitmap index scan on account last name.


    Figure 5-2


    An execution plan with “like” operator rewrite


    A better solution would be to create an (additional) *functional* index:


    ```

    CREATE INDEX account_last_name_lower

    ON account (lower(last_name));

    ```


    When a functional index is built, PostgreSQL applies the function to the values
    of the column (or columns) and then places these values in the B-tree. Similar
    to a regular B-tree index, where the nodes contain the values of the column, in
    a functional index, a node contains the value of the function. In our case, the
    function is `lower()`. After the index is created, query #1 in Listing [5-7](#501585_2_En_5_Chapter.xhtml#PC19)
    won’t use a sequential scan but will be able to utilize the new index. The corresponding
    execution plan is shown in Figure [5-3](#501585_2_En_5_Chapter.xhtml#Fig3).


    ```

    ---#1

    SELECT * FROM account WHERE lower(last_name)=''daniels'';

    ---#2

    SELECT * FROM account WHERE last_name=''Daniels'';

    ---#3

    SELECT * FROM account WHERE last_name=''daniels'';

    ---#4

    SELECT * FROM account WHERE lower(last_name)=''Daniels'';

    Listing 5-7

    Different search conditions use different indexes

    ```


    Note that an index on the `last_name` column is still necessary if we want a search
    on a case-specific value to be supported by an index (e.g., query #2). Also, it’s
    worth mentioning that if the table account contains one record with last_name
    =’Daniels’ and another record with last_name=’DANIELS’, query #1 will return both,
    query #2 will return only the first record, and queries #3 and #4 won’t return
    either of them.


    ![](Images/501585_2_En_5_Fig3_HTML.jpg)


    A set of lines of text denotes a query plan comprising 4 lines from top to bottom.
    The lines denote Bitmap heap scan on account, recheck condition, Bitmap index
    scan on account last name lower pattern, and index condition.


    Figure 5-3


    A plan that uses a functional index


    Note


    Sometimes, an additional index is not needed.


    Should a functional index be created every time we need to search using a column
    transformation? Not necessarily. However, it is important to recognize a column
    transformation, which can be subtle.


    For example, let’s look at the following SELECT statement:


    ```

    SELECT *

    FROM flight

    WHERE scheduled_departure ::date

    BETWEEN ''2023-08-17'' AND ''2023-08-18''

    ```'
  trans: '# 嵌套循环连接与索引


    如果表 `S` 的连接条件属性上存在索引，嵌套循环连接算法也可以与基于索引的数据访问相结合。对于自然连接，基于索引的嵌套循环算法的内循环会缩小为针对 `R`
    的每一行仅访问 `S` 的少数几行。如果 `S` 上的索引是唯一的（例如，`S` 的连接属性是其主键），内循环甚至可以完全消失。


    这常常被误解为意味着在连接主键/外键时，嵌套循环总是高效的。然而，如前所述，这仅在子表（即外键）中的列被索引时才成立。


    ## 是否总是为外键列创建索引？


    是否总是为具有外键约束的列创建索引是最佳实践吗？并非总是如此。仅当不同值的数量足够大时才应创建索引。请记住，低选择性的索引不太可能有用。例如，`flight`
    表在 `aircraft_code` 上有一个外键约束：


    ```sql

    ALTER TABLE flight

    ADD CONSTRAINT aircraft_code_fk FOREIGN KEY (aircraft_code)

    REFERENCES aircraft (code);

    ```


    这个外键约束是必要的，因为每个航班必须分配一个有效的飞机。为了支持此外键约束，为 `aircraft` 表添加了主键约束。然而，该表只有 12 行。因此，没有必要在
    `flight` 表的 `aircraft_code` 列上创建索引。该列只有 12 个不同的值，因此该列上的索引不会被使用。


    为了说明这一点，让我们看清单 5-6 中的查询。该查询选择 2023 年 8 月 14 日至 16 日期间从 JFK 机场出发的所有航班。对于每个航班，我们选择航班号、计划起飞时间、飞机型号和乘客数量。


    ```sql

    SELECT

    f.flight_no,

    f.scheduled_departure,

    model,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    JOIN aircraft ac ON ac.code=f.aircraft_code

    WHERE f.departure_airport =''JFK''

    AND f.scheduled_departure BETWEEN

    ''2023-08-14'' AND ''2023-08-16''

    GROUP BY 1,2,3

    ```


    清单 5-6：一个没有使用索引的主键/外键连接


    该查询的执行计划如图 5-1 所示，并且它非常庞大。


    ![](img/501585_2_En_5_Fig1_HTML.jpg)


    一组文本行表示一个很长的查询计划。它从上到下包含 22 行。一些标签包括分组聚合、分组键、排序、排序键、哈希连接、对 passenger 的顺序扫描、嵌套循环和对
    aircraft 的顺序扫描。


    图 5-1：对小表进行顺序扫描的计划


    我们目前对此计划唯一感兴趣的部分是：


    ```sql

    Hash  (cost=1.12..1.12 rows=12 width=64)

    -> Seq Scan on aircraft ac (cost=0.00..1.12 rows=12

    ```


    PostgreSQL 优化器访问表统计信息，并能够检测到 `aircraft` 表的规模很小，使用索引访问效率不高。相比之下，正如我们在本章前面观察到的，由于低选择性，`flight`
    表的 `departure_airport` 字段上的索引被证明是有用的。


    ## 索引与非等值条件


    第 3 章描述了 B-tree 索引的结构、构建方式以及如何用于搜索。接下来是它们实际应用的演示。


    前一节涉及简单的 B-tree 索引。如第 3 章所述，它们可以支持等于、大于、小于和 BETWEEN 条件的搜索：所有需要比较和排序的搜索。OLTP 系统中的大多数搜索都属于此类，但也存在相当数量的情况，其搜索条件更为复杂。


    ### 索引与列转换


    什么是列转换？当搜索条件针对列中值的某些修改时，就会发生列转换。例如，`lower(last_name)`（将 `last_name` 值转换为小写）和 `update_ts::date`（将带时区的时间戳转换为日期）就是列转换。


    列转换如何影响索引使用？很简单，无法在该属性上使用 B-tree 索引。回顾第 3 章中 B-tree 的构建方式和搜索执行方式：在每个节点中，属性的值会与节点中的值进行比较。转换后的值没有记录在任何地方，因此没有东西可以与之比较。因此，如果
    `last_name` 上有一个索引


    ```sql

    CREATE INDEX account_last_name

    ON account (last_name);

    ```


    ……以下搜索将无法利用该索引：


    ```sql

    SELECT *

    FROM account

    WHERE lower(last_name)=''daniels'';

    ```


    我们如何解决这个问题？可能需要进行这样的搜索，因为乘客可能会以不同的大小写输入他们的姓氏。如果你认为覆盖最常见的情况就足够了，你可以像这样修改搜索条件：


    ```sql

    SELECT *

    FROM account

    WHERE last_name=''daniels''

    OR last_name=''Daniels''

    OR last_name =''DANIELS''

    ```


    该查询的执行计划如图 5-2 所示。


    ![](img/501585_2_En_5_Fig2_HTML.jpg)


    一组文本行表示一个较短的查询计划。它从上到下包含 9 行。它包括对 account 的位图堆扫描、重新检查条件以及对 account_last_name 的位图索引扫描。


    图 5-2：使用 "like" 操作符重写的执行计划


    更好的解决方案是创建一个（额外的）*函数*索引：


    ```sql

    CREATE INDEX account_last_name_lower

    ON account (lower(last_name));

    ```


    当构建函数索引时，PostgreSQL 会将函数应用于列（或多列）的值，然后将这些值放入 B-tree 中。与常规 B-tree 索引（节点包含列的值）类似，在函数索引中，节点包含函数的值。在我们的例子中，函数是
    `lower()`。创建索引后，清单 5-7 中的查询 #1 将不会使用顺序扫描，而是能够利用新索引。相应的执行计划如图 5-3 所示。


    ```sql

    ---#1

    SELECT * FROM account WHERE lower(last_name)=''daniels'';

    ---#2

    SELECT * FROM account WHERE last_name=''Daniels'';

    ---#3

    SELECT * FROM account WHERE last_name=''daniels'';

    ---#4

    SELECT * FROM account WHERE lower(last_name)=''Daniels'';

    ```


    清单 5-7：不同的搜索条件使用不同的索引


    请注意，如果我们希望特定大小写的值搜索也能被索引支持（例如查询 #2），`last_name` 列上的索引仍然是必要的。此外，值得一提的是，如果表 `account`
    包含一条 `last_name = ''Daniels''` 的记录和另一条 `last_name = ''DANIELS''` 的记录，查询 #1 将返回两条记录，查询
    #2 将只返回第一条记录，而查询 #3 和 #4 将不会返回其中任何一条。


    ![](img/501585_2_En_5_Fig3_HTML.jpg)


    一组文本行表示一个包含 4 行的查询计划，从上到下。这些行表示对 account 的位图堆扫描、重新检查条件、对 account_last_name_lower_pattern
    的位图索引扫描以及索引条件。


    图 5-3：使用函数索引的计划


    注意


    有时，不需要额外的索引。


    每次需要使用列转换进行搜索时都应该创建函数索引吗？不一定。然而，重要的是要识别列转换，这可能是微妙的。


    例如，让我们看下面的 SELECT 语句：


    ```sql

    SELECT *

    FROM flight

    WHERE scheduled_departure ::date

    BETWEEN ''2023-08-17'' AND ''2023-08-18''

    ```'
- fmt: 'At first glance, it appears we are using the column `scheduled_departure`
    as a selection criterion, and since there is an index on this column, it should
    be used. However, the plan in Figure 5-4 diverts to a sequential scan.


    ![](Images/501585_2_En_5_Fig4_HTML.jpg)


    A set of lines of text denotes a query plan comprising 2 lines. The lines denote
    the sequential scan on flight and the filter.


    Figure 5-4: A plan that does not use the index due to the column transformation


    Why doesn’t PostgreSQL use the index? Because when the timestamp is converted
    to a date, a column transformation has been performed.


    So is an additional functional index on `scheduled_departure::date` needed? Not
    necessarily. What does this selection criterion mean? It means that we want to
    select flights that depart on these two specific dates, no matter the time of
    day. This means that the flight could depart any time between midnight of August
    17, 2023, and midnight of August 19, 2023. In order to make the existing index
    work, the selection criteria can be modified to:


    ```sql

    SELECT *

    FROM flight

    WHERE scheduled_departure >=''2023-08-17''

    AND  scheduled_departure <''2023-08-19''

    ```


    Figure 5-5 shows how the execution plan has changed.


    ![](Images/501585_2_En_5_Fig5_HTML.jpg)


    A query plan comprises four lines of text. The lines represent the Bitmap heap
    scan on flight, recheck condition, Bitmap index scan on flight scheduled departure,
    and index condition.


    Figure 5-5: An execution plan that uses the index


    Looking at the execution plan, you can see that the cost estimate for a plan with
    index-based access is more than twice less than a sequential scan (`13857.42`
    vs. `30474`). What is more important, the execution time supports this observation:
    `0.5` seconds for index-based access vs. `1.5` seconds for a sequential scan.


    Pay very close attention to this example. When you read about this example in
    a book, the preceding paragraph looks obvious. However, numerous SQL developers
    and report writers use similar search conditions over and over again. One frequent
    use case is changes made to a table today. Ninety-five percent of the time, this
    condition is written as `update_ts::date=CURRENT_DATE`, which successfully blocks
    the use of an index on the `update_ts` column. To take advantage of the index,
    this criterion should be written as:


    ```sql

    update_ts>= CURRENT_DATE

    ```


    or, if it is possible for values of this timestamp to be in the future, the condition
    should be written as:


    ```sql

    WHERE update_ts>= CURRENT_DATE AND update_ts< CURRENT_DATE +1

    ```


    Let’s examine another example where column transformation often remains unnoticed.
    Let’s say today is August 17, 2023. We are looking for flights that have departed
    or are scheduled to depart today. We know that for flights that have not yet departed,
    the `actual_departure` column may be null.


    The `coalesce()` function in PostgreSQL allows us to use a different value when
    the first argument is null. Thus, `coalesce(actual_departure, scheduled_departure)`
    will return `actual_departure` if it is not null and `scheduled_departure` otherwise.
    Both the `scheduled_departure` and `actual_departure` columns are indexed, and
    you might expect these indexes to be used. For example, look at the execution
    plan for the following SQL statement shown in Figure 5-6:


    ```sql

    SELECT *

    FROM flight

    WHERE coalesce(actual_departure, scheduled_departure)

    BETWEEN ''2023-08-17'' AND ''2023-08-18''

    ```


    ![](Images/501585_2_En_5_Fig6_HTML.jpg)


    A query plan comprises two lines of text. It denotes the sequential scan on flight
    and filter.


    Figure 5-6: A plan with a sequential scan, when indexes are present


    Why aren’t any indexes utilized? Because `coalesce()` is a function, which modifies
    column values. Should we create another functional index? We can, but it is not
    really necessary. Instead, we can rewrite this SQL statement as shown in Listing
    5-8, which will result in the execution plan in Figure 5-7.


    ```sql

    SELECT * FROM flight

    WHERE (actual_departure

    BETWEEN ''2023-08-17'' AND ''2023-08-18'')

    OR (actual_departure IS NULL

    AND scheduled_departure BETWEEN ''2023-08-17'' AND ''2023-08-18'')

    ```

    Listing 5-8: Query that uses both indexes


    ![](Images/501585_2_En_5_Fig7_HTML.jpg)


    A query plan comprises 8 lines of text. The lines denote the Bitmap heap scan
    on flight, recheck condition, filter, Bitmap index scan on flight actual departure,
    Bitmap index scan on flight scheduled departure, and index condition.


    Figure 5-7: Execution plan for the query from Listing 5-8


    ## Indexes and the `like` Operator


    Another group of search conditions that are not a straightforward comparison of
    column value constants are searches using the `like` operator. For example, the
    query:


    ```sql

    SELECT * FROM account

    WHERE lower(last_name) like ''johns%'';

    ```


    will yield all accounts for which the last name begins with “johns.” In the `postgres_air`
    schema, the list of returned last names is:


    ```

    "Johnson"

    "Johns"

    "johns"

    "Johnston"

    "JOHNSTON"

    "JOHNS"

    "JOHNSON"

    "johnston"

    "johnson"

    ```


    The only problem with this query is that it won’t utilize the functional index
    we created in the previous section, because B-tree indexes do not support searches
    with the `like` operator. Once again, if we check the execution plan for this
    query, we will see a sequential scan of the `account` table.


    How can we solve this problem and avoid a scan?


    One possible solution is to rewrite the query, replacing `like` with two conditions:


    ```sql

    SELECT * FROM account

    WHERE (lower(last_name) >=''johns'' and lower(last_name) < ''johnt'')

    ```


    The execution plan for this query is shown in Figure 5-8, and we can see that
    this plan uses an existing index.


    ![](Images/501585_2_En_5_Fig8_HTML.jpg)


    A query plan comprises 4 lines of text. It denotes the Bitmap heap scan on account,
    recheck condition, Bitmap index scan on account last name lower, and index condition.


    Figure 5-8: The plan for a rewritten query that uses an index


    A better solution would be to create a *pattern search* index:


    ```sql

    CREATE INDEX account_last_name_lower_pattern

    ON account (lower(last_name) text_pattern_ops);

    ```


    Why is this index necessary? Because comparison of text values depends on the
    *locale*, a set of rules about character ordering, formatting, and similar things
    that vary by language and country. Although some may think what we have in US
    English is the universal order of things, it is not. The only locale that would
    allow us to use a B-tree index is a “C” locale, which is a standards-compliant
    default locale. Only strict ASCII characters are valid in this locale.


    To see which locale was defined when the database was created, you need to run
    the command:


    ```sql

    SHOW LC_COLLATE;

    ```


    And if you reside in the United States, there’s a good chance you will see:


    ```

    "en_US.UTF-8"

    ```


    This newly created index will be utilized by queries that use the `like` operator.
    The new execution plan for our original query is shown in Figure 5-9, and we can
