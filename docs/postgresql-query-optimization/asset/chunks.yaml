    Even the optimal execution of this query is not instantaneous, but it is the best
    we can achieve. Now is a good time to recall that optimization goals should be
    realistic. A long query on large data volumes can’t be executed in a fraction
    of a second, even when executed optimally. The key is to use as few rows as necessary,
    but no fewer.


    ## Grouping: Group First, Select Last


    In some cases, the course of actions should be the opposite: `GROUP BY` should
    be executed as early as possible, followed by other operations. As you might have
    already guessed, this order of actions is desirable when grouping will reduce
    the size of the intermediate dataset.


    The query in Listing [6-20](#501585_2_En_6_Chapter.xhtml#PC28) calculates the
    number of passengers departing from each city by month. In this case, it is not
    possible to reduce the number of rows needed, as all flights are used in the calculation.


    ```

    SELECT

    city,

    date_trunc(''month'', scheduled_departure) AS month,

    count(*)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN booking_leg l ON f.flight_id =l.flight_id

    JOIN boarding_pass b ON b.booking_leg_id = l.booking_leg_id

    GROUP BY 1,2

    ORDER BY 3 DESC

    Listing 6-20

    Calculating number of passengers per city per month

    ```


    The execution time for this query is 25 seconds, and the execution plan is in
    Figure [6-17](#501585_2_En_6_Chapter.xhtml#Fig17).


    ![](Images/501585_2_En_6_Fig17_HTML.jpg)


    A screenshot of the 19-line execution plan with grouping done last. It includes
    sort, sort key, group aggregate, group key, hash join, hash condition, and sequence
    scan on flight f.


    Figure 6-17


    Execution plan with grouping done last


    The execution of this query is significantly improved with a nontrivial rewrite,
    as shown in Listing [6-21](#501585_2_En_6_Chapter.xhtml#PC29).


    ```

    SELECT

    city,

    date_trunc(''month'', scheduled_departure),

    sum(passengers)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN (

    SELECT flight_id, count(*) passengers

    FROM booking_leg l

    JOIN boarding_pass b USING (booking_leg_id)

    GROUP BY flight_id

    ) cnt

    USING (flight_id)

    GROUP BY 1,2

    ORDER BY 3 DESC

    Listing 6-21

    Query rewrite that forces grouping be done first

    ```


    What is happening here? First, the number of departing passengers is summed for
    each flight in the inline view `cnt`. After, the result is joined with the `flight`
    table to retrieve airport code and then joined with the `airport` table to find
    the city where each airport is located. After this, the flight totals are summed
    by city. This way, the execution time is 15 seconds. The execution plan is shown
    in Figure [6-18](#501585_2_En_6_Chapter.xhtml#Fig18).


    ![](Images/501585_2_En_6_Fig18_HTML.jpg)


    A screenshot of the 23-line execution plan with grouping forced to be first. It
    includes sort, sort key, group aggregate, group key, hash join, hash condition,
    planned partitions, and sequence scan on flight f.


    Figure 6-18


    Execution plan with grouping forced to be first'
