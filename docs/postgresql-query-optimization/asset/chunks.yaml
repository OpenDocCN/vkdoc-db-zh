  trans: '### 嵌套循环


    第一个算法是用于计算**笛卡尔积**，即来自输入表的行的所有配对集合。计算该积的简单方法是循环遍历表 `R`，并对 `R` 的每一行，再循环遍历表 `S`。这个简单算法的伪代码如代码清单
    3-4 所示，其图形化表示如图 3-6 所示。


    ![](img/501585_2_En_3_Fig6_HTML.jpg)


    左侧为一个名为 R 的表（2 列 7 行）映射到右侧名为 S 的表（2 列 5 行）。R 表的每一行都映射到 S 表的每一行。R 表第一列的条目是 5, 8,
    6, 3, 4, 1, 3，S 表的是 3, 1, 2, 空, 1。


    **图 3-6**

    嵌套循环算法


    ```

    FOR row1 IN table1 LOOP

    FOR row2 IN table2 LOOP

    INSERT output row

    END LOOP

    END LOOP

    ```

    **代码清单 3-4**

    嵌套循环伪代码


    这个简单算法所需的时间与输入表大小的乘积成正比：`rows(R) * rows(S)`。


    一个显著的理论事实指出，任何计算笛卡尔积的算法都不可能比这更好；也就是说，任何算法的代价都与其输入大小的乘积成正比或更高。当然，此算法的一些变体可能比其他的执行得更好，但代价仍然与这个乘积成正比。


    对嵌套循环算法稍作修改，就可以计算几乎所有结合两个表数据的逻辑操作。代码清单 3-5 中的伪代码实现了连接操作。


    ```

    FOR row1 IN table1 LOOP

    FOR row2 IN table2 LOOP

    IF match(row1,row2) THEN

    INSERT output row

    END IF

    END LOOP

    END LOOP

    ```

    **代码清单 3-5**

    用于连接操作的嵌套循环算法


    观察发现，嵌套循环连接是连接抽象定义（即笛卡尔积后接一个过滤器）的直接实现。由于嵌套循环连接处理输入的所有行对，尽管输出大小比笛卡尔积的情况要小，但代价保持不变。


    在实践中，一个或两个输入表是存储表，而不是先前操作的结果。如果是这种情况，连接算法可以与数据访问相结合。


    虽然处理代价保持不变，但嵌套循环算法的变体与全表扫描相结合时，会在输入表的块上执行嵌套循环，并在这些块包含的行上再执行另一层嵌套循环。更复杂的算法通过加载第一个表（外层循环）的多个块，并用一次对
    `S` 的扫描处理这些块中的所有行，来最小化磁盘访问次数。


    这些算法可以适用于任何连接条件。然而，我们将来需要执行的大多数连接是**等值连接**，即连接条件要求 `R` 的某些属性等于 `S` 的对应属性。


    如果表 `S` 在连接条件使用的属性上有索引，嵌套循环连接算法也可以与基于索引的数据访问相结合。对于等值连接，基于索引的嵌套循环算法的内层循环会缩小为针对
    `R` 的每一行，只处理 `S` 的少数几行。如果 `S` 上的索引是唯一的（例如，`S` 的连接属性是其主键），内层循环甚至可以完全消失。


    如果 `R` 中的行数也较少，基于索引的嵌套循环算法通常是最佳选择。然而，如第 2 章所讨论的，如果要处理的行数变得很大，基于索引的访问就会变得低效。


    可以正式证明，对于笛卡尔积和具有任意条件的连接，不存在比嵌套循环性能更好的算法。然而，重要的问题是，对于任何特定类型的连接条件，是否存在更好的算法。下一节将表明对于等值连接来说确实如此。


    ### 基于哈希的算法


    等值连接的输出由来自 `R` 和 `S` 的、在连接属性上具有相等值的行对组成。哈希连接算法的思路很简单：如果值相等，那么它们的哈希值也相等。


    该算法根据哈希函数的值对两个输入表进行分区，然后独立地连接每个桶中的行。该算法的示意图如图 3-7 所示。


    ![](img/501585_2_En_3_Fig7_HTML.jpg)


    左侧一个名为 R 的表（2 列 7 行）和右侧一个名为 S 的表（2 列 5 行）被映射到中间的哈希桶。


    **图 3-7**

    哈希连接算法


    哈希连接算法的基本版本包括两个阶段：


    1.  在**构建阶段**，`R` 的所有元组根据哈希函数的值存储到各个桶中。

    2.  在**探测阶段**，表 `S` 的每一行被发送到相应的桶中。如果桶中有匹配的 `R` 表行，则产生输出行。


    在桶中找到匹配行的最简单方法是使用嵌套循环（实际上是对桶中的所有行进行循环，针对 `S` 的每一行）。


    哈希算法的这两个阶段在执行计划中显示为独立的物理操作。


    哈希连接的代价可以用以下公式近似估计，其中 `JA` 是连接属性：


    ```

    cost(hash,R,S)=size(R)+size(S)+size(R)*size(S)/size(JA)

    ```


    此公式中的第一项和第二项近似于对 R 和 S 所有行进行一次扫描的代价。最后一项表示要产生的连接结果的大小。当然，所有连接算法的输出代价是相同的，但我们不需要将其包含在嵌套循环算法的代价估算中，因为它比嵌套循环本身的代价要小。


    这个公式表明，对于大表和连接属性不同值数量多的情况，基于哈希的算法明显优于嵌套循环。例如，如果连接属性在其中一个输入表中是唯一的，那么最后一项就等于另一个表的大小。


    基本哈希连接算法在构建阶段产生的所有桶都能放入主内存时有效。另一种变体称为**混合哈希连接**，用于连接无法全部放入主内存的表。混合哈希连接对两个表进行分区，使得其中一个表的分区可以放入内存，然后对每对相应的分区执行基本算法。混合哈希连接的代价更高，因为分区会临时存储在硬盘上，并且两个表都需要扫描两次。然而，其代价仍然与大小之和成正比，而不是与大小之积成正比。'
- fmt: '### Sort-Merge Algorithm


    Another algorithm (called sort-merge) for equi-joins is schematically shown in
    Figure [3-8](#501585_2_En_3_Chapter.xhtml#Fig8).


    ![](Images/501585_2_En_3_Fig8_HTML.jpg)


    A table titled `R`, with 2 columns and 7 rows on the left, is mapped to table
    `S`, with 2 columns and 5 rows on the right. The entries in the first column of
    table `R` are 1, 3, 3, 4, 5, 6, and 8, and in table `S` are 1, 1, 2, blank, and
    6\. The respective elements are mapped from `R` to `S`.


    Figure 3-8


    Sort-merge algorithm


    The first phase of the algorithm sorts both input tables in ascending order by
    the join attribute.


    When the input tables are properly ordered, the merge phase scans both input tables
    once and, for each value of the join attribute, calculates the Cartesian product
    of rows containing this value of the join attribute. Note that this product is
    a necessary part of the join result. New rows with the same value attribute cannot
    appear in the remaining part of input because the input tables are ordered.


    The cost of the merge phase can be expressed with the same formula as for a hash
    join, that is, proportional to the sum of sizes of input and output. The actual
    cost is somewhat lower because there is no need for the build phase.


    The cost of sorting can be estimated with the following formula:


    ```

    Size(R)*log(size(R)) + size(s)*log(size(S))

    ```


    The sort-merge algorithm is especially efficient if one of both input tables is
    already sorted. This may happen in a series of joins with the same join attribute.


    ### Comparing Algorithms


    Just as with data access algorithms, there are no default winners or losers. Any
    of the algorithms can be the best, depending on the circumstances. The nested
    loop algorithm is more universal and is the best for small index-based joins;
    a sort-merge and hash are more efficient for large tables, when applicable.


    ## Summary


    Having covered cost models for algorithms, data access algorithms, the purpose
    and structure of indexes, and algorithms for more complex operations, such as
    joins, we finally have enough building blocks to move on to the full product of
    the query planner—an execution plan.


    The next chapter covers how to read and understand execution plans and improve
    them.


    # 4. Understanding Execution Plans


    At long last, it’s time to look at execution plans. Before we begin, let’s review
    our theoretical foundations. Chapter [3](#501585_2_En_3_Chapter.xhtml) explained
    how logical operations are mapped to their physical execution, covering data retrieval
    and more complex operations.


    In this chapter, understanding these algorithms will enable us to interpret execution
    plans and get a better grasp of their components.


    ## Putting Everything Together: How an Optimizer Builds an Execution Plan


    The output of the PostgreSQL optimizer is an *execution plan*. While a `SELECT`
    defines *what* needs to be done, an execution plan defines *how* to execute SQL
    operations.


    The job of the optimizer is to build the best possible physical plan that implements
    a given logical plan. This is a complex process: sometimes, a complex logical
    operation is replaced with multiple physical operations, or several logical operations
    are merged into a single physical operation.


    To build a plan, the optimizer uses *transformation rules*, *heuristics*, and
    cost-based *optimization algorithms*. A *rule* converts a plan into another plan
    with better cost. For example, filter and project operations reduce the size of
    the dataset and therefore should be executed as early as possible; a rule might
    reorder operations so that filter and project operations are executed sooner.
    An *optimization algorithm* chooses the plan with the lowest cost estimate. However,
    the number of possible plans (called the *plan space*) for a query containing
    several operations is huge—far too large for the algorithm to consider every single
    possible plan. After all, time spent choosing the correct algorithm contributes
    to the total execution time of the query. *Heuristics* are used to reduce the
    number of plans evaluated by the optimizer.'
