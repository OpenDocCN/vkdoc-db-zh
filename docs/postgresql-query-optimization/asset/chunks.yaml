  trans: "\n请注意，此模式代表了契约，即应用程序期望接收的对象结构。它与数据在数据库中的存储方式有显著差异，最重要的是，只要数据库响应符合契约，数据库的实现方式就不会影响应用程序与其的交互方式。\n\
    \n遵循此契约的示例`JSON`对象如图 14-5 所示。\n\n![](img/501585_2_En_14_Fig5_HTML.jpg)\n\n预订`ID`为\
    \ 10679 的`JSON`代码截图。它展示了预订详情、预订航段、乘客和航班信息。预订参考号为`EN6B12`。\n\n图 14-5\n\n作为`JSON`的传输对象\n\
    \n简而言之，应用程序与数据库之间的交互可总结如下：\n\n1.  应用程序将数据序列化为`JSON`格式，并通过调用相应的数据库函数将其发送至数据库。\n\
    2.  数据库函数解析作为参数传递的`JSON`，并执行该函数应有的功能：无论是搜索还是数据转换。`PostgreSQL`提供了非常完善的`JSON`支持，拥有一套丰富的函数集，这使得在数据库端操作`JSON`变得容易。\n\
    3.  结果集被转换为`JSON`并传递给应用程序，在应用程序中反序列化，供应用程序使用。\n\n## 从应用程序视角看 NORM\n\n在应用程序端，代码清单\
    \ 14-2 中的`Python`类被映射到相同的传输对象。\n\n```python\nfrom typing import List\nfrom pydantic\
    \ import BaseModel, Field\nfrom datetime.datetime import datetime, timezone\n\
    from phonenumber import PhoneNumber\n\nclass Booking(BaseModel):\n    booking_id:\
    \ int\n    booking_ref: str\n    booking_legs: List[BookingLeg]\n    booking_name:\
    \ str\n    account_id: int\n    email: str\n    phone: PhoneNumber\n    update_ts:\
    \ datetime\n    price: decimal\n\nclass BookingLeg(BaseModel):\n    booking_leg_id:\
    \ int\n    flight: Flight\n    is_returning: bool\n    update_ts: datetime\n\n\
    class Flight(BaseModel):\n    flight_id: int\n    flight_no: int\n    scheduled_departure:\
    \ datetime\n    scehduled_arrival: datetimee\n    departure_airport: Airport\n\
    \    arrival_airport: Airport\n    status: str\n    aircraft_code: str\n    actual_departure:\
    \ datetime\n    actual_arrival: datetime\n    update_ts=datetime\n\nclass Airport(BaseModel):\n\
    \    airport_code: str = Field(min_length=3,max_length=3)\n    airport_name: str\n\
    \    airport_tz: timezone\n    city: str\n    continent: str\n    iso_country:\
    \ str\n    iso_region: str\n    intnl: bool\n    update_ts: datetime\n\nclass\
    \ Passenger(BaseModel):\n    passenger_id: int\n    booking: Booking\n    passenger_no:\
    \ int\n    first_name: str\n    last_name: str\n    account_id: int\n    update_ts:\
    \ datetime\n    age: int\n```\n\n代码清单 14-2\nPostgres Air 应用程序类\n\n值得一提的是，我们可以使用同一组表构建完全不同的传输对象。例如，在任何航班起飞前，必须生成一份名为舱单的文件。该文件列出了航班上的所有乘客及其座位分配。舱单的传输对象如图\
    \ 14-6 所示。\n\n![](img/501585_2_En_14_Fig6_HTML.jpg)\n\n传输对象的关系图。它展示了舱单记录和乘客记录的变量。\n\
    \n图 14-6\n\n航班舱单的传输对象\n\n对应的`JSON`如图 14-7 所示。\n\n![](img/501585_2_En_14_Fig7_HTML.jpg)\n\
    \n`JSON`代码截图。它展示了航班和登机牌的详细信息，用于在预订时检查到达机场代码`CDG`和起飞机场代码`JFK`。\n\n图 14-7\n\n作为`JSON`的舱单对象\n\
    \n## 从数据库视角看 NORM\n\n在`NORM`项目的早期，对其采用的唯一严重反对意见是需要手动创建所有数据操作函数。敏捷团队不想花费时间编写额外的代码，特别是当`ORM`几乎可以在没有人工干预的情况下生成功能相似的代码时。他们也不想在团队中增加额外的人员（数据库开发人员）。为了解决这些担忧，我们在`NORM`中添加了一个自动生成模块，我们称之为`NORM-GEN`。在本节中，我们将解释如何在数据库端生成类型和函数，而不是手动创建它们。为了实现这个目标，我们需要对我们的契约进行一个重要更改，即找到一种定义应用程序类与数据库对象之间映射的方法。\n\
    \n### 将`JSON`映射到数据库\n\n为了实现数据库对象的自动生成，我们通过一个`db_mapping`键扩展了`JSON`模式语法，该键可以为整个层次结构、一个对象或一个键指定。该映射指定了与`JSON`对象和键相对应的数据库模式、表名和列名，以及定义对象之间关系的主键和外键列。\n\
    \n代码清单 14-3 展示了如何为契约的一部分（即乘客对象）指定映射。该清单的第 4-7 行定义了与`JSON`对象对应的表、表的主键、父对象的主键，以及在转换为`JSON`之前在数据库中表示该对象的复杂数据类型的名称。当`JSON`键名与表列名一致时，可以省略较低级别对象的显式映射。\n\
    \n```json\n{\n    \"passenger\": {\n        \"type\": \"object\",\n        \"\
    db_mapping\": {\n            \"pk_col\": \"passenger_id\",\n            \"db_table\"\
    : \"passenger\",\n            \"record_type\": \"passenger_record\",\n       \
    \     \"parent_fk_col\": \"booking_id\"\n        },\n        \"properties\": {\n\
    \            \"last_name\": {\n                \"type\": \"text\"\n          \
    \  },\n            \"account_id\": {\n                \"type\": \"number\"\n \
    \           },\n            \"first_name\": {\n                \"type\": \"text\"\
    \n            },\n            \"passenger_id\": {\n                \"type\": \"\
    number\"\n            },\n            \"passenger_no\": {\n                \"\
    type\": \"number\"\n            }\n        }\n    }\n}\n```\n\n代码清单 14-3\n乘客对象的数据库映射\n"
- fmt: "### Generating Database Code\n\nThe contract is used to generate\n\n*   Database\
    \ type definitions that represent the hierarchy in the form of nested complex\
    \ objects and arrays.\n*   A function that selects full hierarchies from the database\
    \ based on a list of primary keys of the root objects. The hierarchy is built\
    \ as a database complex nested object, which is then converted into JSON format.\n\
    *   A function returning a list of root object keys based on a search request\
    \ specified as an input parameter.\n*   A function that performs modifications\
    \ of specified objects or their sub-objects in the hierarchy. Multiple objects\
    \ and/or sub-objects can be inserted, updated, or deleted in the same request.\n\
    \nSome of the interfaces that applications use to access the database, including\
    \ JDBC, do not support JSON as a data type. To bypass this, the JSON is converted\
    \ into a list of text strings right before the transfer and converted back to\
    \ JSON immediately after transfer.\n\nNow, let’s get more specific and show how\
    \ this is achieved.\n\nListing 14-4 shows generated type definitions for the booking\
    \ hierarchy. These definitions are similar to definitions from Listings 12-17\
    \ and 12-20.\n\nWe define the types `passenger_record`, `flight_record`, and `booking_leg_record`,\
    \ which includes a `flight_record` sub-object, and then `booking_record`, which\
    \ has arrays of these types as components.\n\n```sql\n/* entering  : booking */\n\
    /* entering  : passenger */\ndrop type if exists norm.bh_passenger_record cascade;\n\
    create type norm.bh_passenger_record as (\nlast_name  text,\naccount_id  int4,\n\
    first_name  text,\npassenger_id  int4,\npassenger_no  int4\n);\n/* entering  :\
    \ booking_leg */\n/* entering  : flight */\ndrop type if exists norm.bh_flight_record\
    \ cascade;\ncreate type norm.bh_flight_record as (\nflight_no  text,\narrival_city\
    \  text,\ndeparture_city  text,\nscheduled_arrival  timestamptz,\nscheduled_departure\
    \  timestamptz,\narrival_airport_code  bpchar,\narrival_airport_name  text,\n\
    departure_airport_code  bpchar,\ndeparture_airport_name  text\n);\ndrop type if\
    \ exists norm.bh_booking_leg_record cascade;\ncreate type norm.bh_booking_leg_record\
    \ as (\nflight_id  int4,\nflight  norm.bh_flight_record,\nleg_num  int4,\nbooking_leg_id\
    \  int4\n);\ndrop type if exists norm.bh_booking_record cascade;\ncreate type\
    \ norm.bh_booking_record as (\nbooking_id  int8,\npassengers  norm.bh_passenger_record[],\n\
    booking_legs  norm.bh_booking_leg_record[],\nbooking_reference  text\n);\n```\n\
    \nListing 14-4 Booking type definitions\n\nLooking at these type definitions,\
    \ it is clear they do indeed represent the transport object `booking` from Figure\
    \ 14-4.\n\n### Getting Data from the Database\n\nThe contract requires that the\
    \ application should receive all needed data with the smallest possible number\
    \ of interactions with the database. Typically, an application should receive\
    \ a set of complete hierarchies. This implies that the structure of returned data\
    \ depends on the definition of the hierarchy, but not on the specific query. Listing\
    \ 14-5 shows the SELECT clause generated for the booking hierarchy.\n\n```sql\n\
    /* selecting booking_hierarchy booking */\nselect\narray_agg(\n/* Entering booking_record\
    \ */\nrow(top.booking_id  ,\n(\nselect array_agg(  /* Entering passenger_record\
    \ */\nrow(passengers.last_name  ,\npassengers.account_id  ,\npassengers.first_name\
    \  ,\npassengers.passenger_id  ,\npassengers.passenger_no)::norm.bh_passenger_record)\n\
    from  postgres_air.passenger  passengers\nwhere  top.booking_id = passengers.booking_id\n\
    )\n,\n(\nselect array_agg(  /* Entering booking_leg_record */\nrow(booking_legs.flight_id\
    \  ,\n(\nselect  (  /* Entering flight_record */\nrow(flight.flight_no  ,\narrival.city\
    \  ,\ndeparture.city  ,\nflight.scheduled_arrival  ,\nflight.scheduled_departure\
    \  ,\nflight.arrival_airport  ,\narrival.airport_name  ,\nflight.departure_airport\
    \  ,\ndeparture.airport_name)::norm.bh_flight_record)\nfrom  postgres_air.flight\
    \  flight\njoin postgres_air.airport departure on  departure.airport_code = flight.departure_airport\n\
    join postgres_air.airport arrival on  arrival.airport_code = flight.arrival_airport\n\
    where  booking_legs.flight_id = flight.flight_id\n)\n,\nbooking_legs.leg_num \
    \ ,\nbooking_legs.booking_leg_id)::norm.bh_booking_leg_record)\nfrom  postgres_air.booking_leg\
    \  booking_legs\nwhere  top.booking_id = booking_legs.booking_id\n)\n,\ntop.booking_ref)::norm.bh_booking_record)\n\
    from  postgres_air.booking  top\n```\n\nListing 14-5 Generated SELECT clause\n\
    \nThe SELECT clause shown in Listing 14-5 returns a PostgreSQL array of nested\
    \ complex objects. This output is converted into JSON format with a single invocation\
    \ of the `to_json` function.\n\nIn contrast with the SELECT clause, the filtering\
    \ criteria depend on the specific needs of the application and therefore are needed\
    \ for each query. NORM accepts search conditions in the JSON format that resembles\
    \ a format found in some JSON-oriented systems. However, NORM provides neither\
    \ the full power of these languages nor even a subset of them. Essentially, NORM\
    \ supports basic comparison operations on any scalar keys in the JSON contact\
    \ at any level of the hierarchy. An example of search conditions is shown in Listing\
    \ 14-6.\n\n```json\n{\n  \"booking_hierarchy\":{\n    \"departure_airport_code\"\
    :\"ORD\",\n    \"arrival_city\":{\"$like\":\"NEW%\"},\n    \"last_name\":\"Smith\"\
    \n  }\n}\n```\n\nListing 14-6 Search conditions in JSON format\n\nThis search\
    \ will return all bookings that have a passenger with a last name of “Smith” and\
    \ have a leg with flight from ORD to any city whose name starts with “NEW.” For\
    \ all these bookings, all passengers and all legs will be included in the result.\n\
    \nNote that search conditions cannot include any join operations because relationships\
    \ between objects are defined in the hierarchy. If more relationships are needed,\
    \ another hierarchy must be defined. Listing 14-7 shows the SQL code generated\
    \ for this search.\n\n```sql\nbooking_id IN (\nselect booking_id from postgres_air.booking_leg\
    \ where\nflight_id IN (\nselect flight_id from postgres_air.flight where\narrival_airport\
    \ IN (\nselect airport_code from postgres_air.airport where\ncity  LIKE  ('NEW%'::text)\
    \ )\nAND  departure_airport  =  ('ORD'::bpchar) ) )\nAND  booking_id IN (\nselect\
    \ booking_id from postgres_air.passenger where\nlast_name  =  (Smith::text) )\n\
    ```\n\nListing 14-7 Generated filtering conditions\n\nThis generated code is wrapped\
    \ in functions that construct a complete query and execute it. Notice that this\
    \ generated code resembles the code discussed in Chapter 12 and shown in Listing\
    \ 12-21."
  raw: '### Generating Database Code


    The contract is used to generate


    *   Database type definitions that represent the hierarchy in the form of nested
    complex objects and arrays.


    *   A function that selects full hierarchies from the database based on a list
    of primary keys of the root objects. The hierarchy is built as a database complex
    nested object, which is then converted into JSON format.


    *   A function returning a list of root object keys based on a search request
    specified as an input parameter.


    *   A function that performs modifications of specified objects or their sub-objects
    in the hierarchy. Multiple objects and/or sub-objects can be inserted, updated,
    or deleted in the same request.


    Some of the interfaces that applications use to access the database, including
    JDBC, do not support JSON as a data type. To bypass this, the JSON is converted
    into a list of text strings right before the transfer and converted back to JSON
    immediately after transfer.


    Now, let’s get more specific and show how this is achieved.


    Listing [14-4](#501585_2_En_14_Chapter.xhtml#PC4) shows generated type definitions
    for the booking hierarchy. These definitions are similar to definitions from Listings
    [12-17](#501585_2_En_12_Chapter.xhtml#PC29) and [12-20](#501585_2_En_12_Chapter.xhtml#PC37).


    We define the types `passenger_record`, `flight_record`, and `booking_leg_record,`
    which includes a `flight_record` sub-object, and then `booking_record`, which
    has arrays of these types as components.


    ```

    /* entering  : booking */

    /* entering  : passenger */

    drop type if exists norm.bh_passenger_record cascade;

    create type norm.bh_passenger_record as (

    last_name  text,

    account_id  int4,

    first_name  text,

    passenger_id  int4,

    passenger_no  int4

    );

    /* entering  : booking_leg */

    /* entering  : flight */

    drop type if exists norm.bh_flight_record cascade;

    create type norm.bh_flight_record as (

    flight_no  text,

    arrival_city  text,

    departure_city  text,

    scheduled_arrival  timestamptz,

    scheduled_departure  timestamptz,

    arrival_airport_code  bpchar,

    arrival_airport_name  text,

    departure_airport_code  bpchar,

    departure_airport_name  text

    );

    drop type if exists norm.bh_booking_leg_record cascade;

    create type norm.bh_booking_leg_record as (

    flight_id  int4,

    flight  norm.bh_flight_record,

    leg_num  int4,

    booking_leg_id  int4

    );

    drop type if exists norm.bh_booking_record cascade;

    create type norm.bh_booking_record as (

    booking_id  int8,

    passengers  norm.bh_passenger_record[],

    booking_legs  norm.bh_booking_leg_record[],

    booking_reference  text

    );

    Listing 14-4

    Booking type definitions

    ```


    Looking at these type definitions, it is clear they do indeed represent the transport
    object `booking` from Figure [14-4](#501585_2_En_14_Chapter.xhtml#Fig4).


    ### Getting Data from the Database


    The contract requires that the application should receive all needed data with
    the smallest possible number of interactions with the database. Typically, an
    application should receive a set of complete hierarchies. This implies that the
    structure of returned data depends on the definition of the hierarchy, but not
    on the specific query. Listing [14-5](#501585_2_En_14_Chapter.xhtml#PC5) shows
    the SELECT clause generated for the booking hierarchy.


    ```

    /* selecting booking_hierarchy booking */

    select

    array_agg(

    /* Entering booking_record */

    row(top.booking_id  ,

    (

    select array_agg(  /* Entering passenger_record */

    row(passengers.last_name  ,

    passengers.account_id  ,

    passengers.first_name  ,

    passengers.passenger_id  ,

    passengers.passenger_no)::norm.bh_passenger_record)

    from  postgres_air.passenger  passengers

    where  top.booking_id = passengers.booking_id

    )

    ,

    (

    select array_agg(  /* Entering booking_leg_record */

    row(booking_legs.flight_id  ,

    (

    select  (  /* Entering flight_record */

    row(flight.flight_no  ,

    arrival.city  ,

    departure.city  ,

    flight.scheduled_arrival  ,

    flight.scheduled_departure  ,

    flight.arrival_airport  ,

    arrival.airport_name  ,

    flight.departure_airport  ,

    departure.airport_name)::norm.bh_flight_record)

    from  postgres_air.flight  flight

    join postgres_air.airport departure on  departure.airport_code = flight.departure_airport

    join postgres_air.airport arrival on  arrival.airport_code = flight.arrival_airport

    where  booking_legs.flight_id = flight.flight_id

    )

    ,

    booking_legs.leg_num  ,

    booking_legs.booking_leg_id)::norm.bh_booking_leg_record)

    from  postgres_air.booking_leg  booking_legs

    where  top.booking_id = booking_legs.booking_id

    )

    ,

    top.booking_ref)::norm.bh_booking_record)

    from  postgres_air.booking  top

    Listing 14-5

    Generated SELECT clause

    ```


    The SELECT clause shown in Listing [14-5](#501585_2_En_14_Chapter.xhtml#PC5) returns
    a PostgreSQL array of nested complex objects. This output is converted into JSON
    format with a single invocation of the to_json function.


    In contrast with the SELECT clause, the filtering criteria depend on the specific
    needs of the application and therefore are needed for each query. NORM accepts
    search conditions in the JSON format that resembles a format found in some JSON-oriented
    systems. However, NORM provides neither the full power of these languages nor
    even a subset of them. Essentially, NORM supports basic comparison operations
    on any scalar keys in the JSON contact at any level of the hierarchy. An example
    of search conditions is shown in Listing [14-6](#501585_2_En_14_Chapter.xhtml#PC6).


    ```

    {

    "booking_hierarchy":{

    "departure_airport_code":"ORD",

    "arrival_city":{"$like":"NEW%"},

    "last_name":"Smith"}

    }

    Listing 14-6

    Search conditions in JSON format

    ```


    This search will return all bookings that have a passenger with a last name of
    “Smith” and have a leg with flight from ORD to any city whose name starts with
    “NEW.” For all these bookings, all passengers and all legs will be included in
    the result.


    Note that search conditions cannot include any join operations because relationships
    between objects are defined in the hierarchy. If more relationships are needed,
    another hierarchy must be defined. Listing [14-7](#501585_2_En_14_Chapter.xhtml#PC7)
    shows the SQL code generated for this search.


    ```

    booking_id IN (

    select booking_id from postgres_air.booking_leg where

    flight_id IN (

    select flight_id from postgres_air.flight where

    arrival_airport IN (

    select airport_code from postgres_air.airport where

    city  LIKE  (''NEW%''::text) )

    AND  departure_airport  =  (''ORD''::bpchar) ) )

    AND  booking_id IN (

    select booking_id from postgres_air.passenger where

    last_name  =  (Smith::text) )

    Listing 14-7

    Generated filtering conditions

    ```


    This generated code is wrapped in functions that construct a complete query and
    execute it. Notice that this generated code resembles the code discussed in Chapter
    [12](#501585_2_En_12_Chapter.xhtml) and shown in Listing [12-21](#501585_2_En_12_Chapter.xhtml#PC21).'
  trans: "\n### 生成数据库代码\n\n该合约用于生成：\n\n*   以嵌套复杂对象和数组形式表示层次结构的数据库类型定义。\n*   根据根对象的主键列表从数据库中选择完整层次结构的函数。该层次结构被构建为数据库复杂嵌套对象，然后转换为\
    \ JSON 格式。\n*   基于作为输入参数指定的搜索请求返回根对象键列表的函数。\n*   对层次结构中的指定对象或其子对象执行修改操作的函数。可以在同一请求中插入、更新或删除多个对象和/或子对象。\n\
    \n应用程序用于访问数据库的某些接口（包括 JDBC）不支持 JSON 作为数据类型。为了绕过这一点，JSON 在传输前被转换为文本字符串列表，并在传输后立即转换回\
    \ JSON。\n\n现在，让我们更具体地说明这是如何实现的。\n\n清单 14-4 展示了为预订层次结构生成的类型定义。这些定义与清单 12-17 和 12-20\
    \ 中的定义相似。\n\n我们定义了类型 `passenger_record`、`flight_record` 和包含 `flight_record` 子对象的\
    \ `booking_leg_record`，然后是 `booking_record`，它以这些类型的数组作为组成部分。\n\n```sql\n/* entering\
    \  : booking */\n/* entering  : passenger */\ndrop type if exists norm.bh_passenger_record\
    \ cascade;\ncreate type norm.bh_passenger_record as (\nlast_name  text,\naccount_id\
    \  int4,\nfirst_name  text,\npassenger_id  int4,\npassenger_no  int4\n);\n/* entering\
    \  : booking_leg */\n/* entering  : flight */\ndrop type if exists norm.bh_flight_record\
    \ cascade;\ncreate type norm.bh_flight_record as (\nflight_no  text,\narrival_city\
    \  text,\ndeparture_city  text,\nscheduled_arrival  timestamptz,\nscheduled_departure\
    \  timestamptz,\narrival_airport_code  bpchar,\narrival_airport_name  text,\n\
    departure_airport_code  bpchar,\ndeparture_airport_name  text\n);\ndrop type if\
    \ exists norm.bh_booking_leg_record cascade;\ncreate type norm.bh_booking_leg_record\
    \ as (\nflight_id  int4,\nflight  norm.bh_flight_record,\nleg_num  int4,\nbooking_leg_id\
    \  int4\n);\ndrop type if exists norm.bh_booking_record cascade;\ncreate type\
    \ norm.bh_booking_record as (\nbooking_id  int8,\npassengers  norm.bh_passenger_record[],\n\
    booking_legs  norm.bh_booking_leg_record[],\nbooking_reference  text\n);\n```\n\
    \n清单 14-4 预订类型定义\n\n查看这些类型定义，可以清楚地看到它们确实表示了图 14-4 中的传输对象 `booking`。\n\n### 从数据库获取数据\n\
    \n合约要求应用程序应以尽可能少的与数据库交互的次数接收所有需要的数据。通常，应用程序应接收一组完整的层次结构。这意味着返回数据的结构取决于层次结构的定义，而不是具体的查询。清单\
    \ 14-5 显示了为预订层次结构生成的 SELECT 子句。\n\n```sql\n/* selecting booking_hierarchy booking\
    \ */\nselect\narray_agg(\n/* Entering booking_record */\nrow(top.booking_id  ,\n\
    (\nselect array_agg(  /* Entering passenger_record */\nrow(passengers.last_name\
    \  ,\npassengers.account_id  ,\npassengers.first_name  ,\npassengers.passenger_id\
    \  ,\npassengers.passenger_no)::norm.bh_passenger_record)\nfrom  postgres_air.passenger\
    \  passengers\nwhere  top.booking_id = passengers.booking_id\n)\n,\n(\nselect\
    \ array_agg(  /* Entering booking_leg_record */\nrow(booking_legs.flight_id  ,\n\
    (\nselect  (  /* Entering flight_record */\nrow(flight.flight_no  ,\narrival.city\
    \  ,\ndeparture.city  ,\nflight.scheduled_arrival  ,\nflight.scheduled_departure\
    \  ,\nflight.arrival_airport  ,\narrival.airport_name  ,\nflight.departure_airport\
    \  ,\ndeparture.airport_name)::norm.bh_flight_record)\nfrom  postgres_air.flight\
    \  flight\njoin postgres_air.airport departure on  departure.airport_code = flight.departure_airport\n\
    join postgres_air.airport arrival on  arrival.airport_code = flight.arrival_airport\n\
    where  booking_legs.flight_id = flight.flight_id\n)\n,\nbooking_legs.leg_num \
    \ ,\nbooking_legs.booking_leg_id)::norm.bh_booking_leg_record)\nfrom  postgres_air.booking_leg\
    \  booking_legs\nwhere  top.booking_id = booking_legs.booking_id\n)\n,\ntop.booking_ref)::norm.bh_booking_record)\n\
    from  postgres_air.booking  top\n```\n\n清单 14-5 生成的 SELECT 子句\n\n清单 14-5 中显示的\
    \ SELECT 子句返回一个包含嵌套复杂对象的 PostgreSQL 数组。此输出通过一次调用 `to_json` 函数转换为 JSON 格式。\n\n\
    与 SELECT 子句相反，过滤条件取决于应用程序的具体需求，因此每次查询都需要。NORM 接受 JSON 格式的搜索条件，这种格式类似于某些面向 JSON\
    \ 的系统中找到的格式。然而，NORM 既不提供这些语言的完整功能，甚至也不提供它们的子集。本质上，NORM 支持在 JSON 合约中任何层次级别的任何标量键上进行基本的比较操作。搜索条件的示例如清单\
    \ 14-6 所示。\n\n```json\n{\n  \"booking_hierarchy\":{\n    \"departure_airport_code\"\
    :\"ORD\",\n    \"arrival_city\":{\"$like\":\"NEW%\"},\n    \"last_name\":\"Smith\"\
    \n  }\n}\n```\n\n清单 14-6 JSON 格式的搜索条件\n\n此搜索将返回所有包含姓氏为“Smith”的乘客且包含一个航段，该航段的航班从\
    \ ORD 飞往任何名称以“NEW”开头的城市的预订记录。对于所有这些预订，结果中将包含所有乘客和所有航段。\n\n请注意，搜索条件不能包含任何连接操作，因为对象之间的关系已在层次结构中定义。如果需要更多关系，则必须定义另一个层次结构。清单\
    \ 14-7 显示了为此搜索生成的 SQL 代码。\n\n```sql\nbooking_id IN (\nselect booking_id from postgres_air.booking_leg\
    \ where\nflight_id IN (\nselect flight_id from postgres_air.flight where\narrival_airport\
    \ IN (\nselect airport_code from postgres_air.airport where\ncity  LIKE  ('NEW%'::text)\
    \ )\nAND  departure_airport  =  ('ORD'::bpchar) ) )\nAND  booking_id IN (\nselect\
    \ booking_id from postgres_air.passenger where\nlast_name  =  (Smith::text) )\n\
    ```\n\n清单 14-7 生成的过滤条件\n\n此生成的代码被包装在构建完整查询并执行它的函数中。请注意，此生成的代码类似于第 12 章中讨论并显示在清单\
    \ 12-21 中的代码。\n"
- fmt: "## Modifying Data in the Database\n\n`NORM` can handle any data manipulation\
    \ operation, that is, `INSERT`, `UPDATE`, and `DELETE`, which are collectively\
    \ called update requests.\n\nAn update request is sent from the application as\
    \ a complex object and, on the database level, may result in multiple update operations\
    \ applied to different tables. Once again, database development is contract-driven.\
    \ A database function receives a JSON object from the application, parses the\
    \ object, and interprets the actions that are required on the database level.\n\
    \nThe `NORM` approach aims to reduce the number of database operations. Of course,\
    \ it is not possible to update multiple tables in a single SQL statement, so `NORM`\
    \ needs to execute several SQL statements for an update request. However, it collects\
    \ data from several sub-objects of the update request so that at most one `DELETE`,\
    \ one `UPDATE`, and two `INSERT` statements are performed for each table that\
    \ can be modified through the hierarchy, no matter how many hierarchies and sub-objects\
    \ are modified by the update request.\n\nThe generated `NORM` code relies on the\
    \ assumption that all tables have a single-column primary key and the values of\
    \ primary keys are automatically assigned when new rows are inserted.\n\nAn update\
    \ request is sent from the application as a JSON array of hierarchies conforming\
    \ the contract schema and satisfying a few additional rules:\n\n-   If an object\
    \ at any level of the hierarchy does not include the key mapped to the primary\
    \ key, this object and all its sub-objects are inserted into the appropriate tables.\n\
    -   If an object contains the value of the primary key and an additional key `\"\
    cmd\":”DELETE”`, then this object and all its sub-objects are deleted from the\
    \ database.\n-   If an object contains a primary key and does not contain the\
    \ `\"cmd\"` key, then the values of other keys of this object are used in the\
    \ `UPDATE` operation.\n\nAn example of an update request is shown in Listing 14-8.\
    \ The modifications specified in this request do not necessarily make sense from\
    \ a business viewpoint; however, they illustrate how modifications are specified.\n\
    \n```json\n[\n    {\n        \"booking_id\": 556470,\n        \"cmd\": \"DELETE\"\
    \n    },\n    {\n        \"passengers\": [\n            {\n                \"\
    last_name\": \"Jones\",\n                \"account_id\": 238648,\n           \
