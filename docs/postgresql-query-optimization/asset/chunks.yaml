  trans: '## 使用集合操作


    在 SQL 查询中，我们很少使用集合论操作（如 `UNION`, `EXCEPT` 等）。然而，对于大型查询，这些操作可能会促使优化器选择更高效的算法。


    使用集合操作可以（有时）促使采用替代的执行计划并提高代码的可读性。


    通常，我们可以：


    *   使用 `EXCEPT` 代替 `NOT EXISTS` 和 `NOT IN`。

    *   使用 `INTERSECT` 代替 `EXISTS` 和 `IN`。

    *   使用 `UNION` 代替使用 `OR` 的复杂选择条件。


    有时，性能会有显著提升；有时，执行时间变化不大，但代码变得更简洁、更易于维护。代码清单 6-22 展示了对代码清单 6-8 中查询的重写，用于返回没有预订的航班。


    ```

    SELECT

    flight_id

    FROM flight f

    EXCEPT

    SELECT

    flight_id

    FROM booking_leg

    代码清单 6-22

    使用 EXCEPT 代替 NOT IN

    ```


    执行时间是一分三秒，这比反连接快了近一倍。


    带有 `EXCEPT` 操作的执行计划如图 6-19 所示。


    ![](img/501585_2_En_6_Fig19_HTML.jpg)


    使用 EXCEPT 的 8 行执行计划截图。它包含集合操作符 EXCEPT、排序、排序键、追加、子查询扫描以及对 flight f 的顺序扫描。


    图 6-19

    带有 `EXCEPT` 的执行计划


    代码清单 6-23 展示了使用集合操作对代码清单 6-4 中查询的重写，用于显示所有有预订的航班。


    ```

    SELECT

    flight_id

    FROM flight f

    INTERSECT

    SELECT

    flight_id

    FROM booking_leg

    代码清单 6-23

    使用 INTERSECT 代替 IN

    ```


    此查询的执行时间是 49 秒。这比使用 `IN` 关键字的查询版本要短，且大致相当于使用仅索引扫描的查询的运行时间（参见代码清单 6-10）。执行计划如图
    6-20 所示。


    ![](img/501585_2_En_6_Fig20_HTML.jpg)


    使用 INTERSECT 的 6 行执行计划截图。它包含哈希集合操作符 INTERSECT、追加、子查询扫描以及对 flight f 的顺序扫描。


    图 6-20

    带有 `INTERSECT` 的执行计划


    我们很少需要将带有 `OR` 的复杂选择条件重写为集合论的 `UNION ALL`，因为大多数情况下，PostgreSQL 优化器在分析此类条件并利用所有合适的索引方面做得相当不错。然而，有时这种重写方式会使代码更易于维护，尤其是当查询包含大量通过
    `OR` 连接的不同选择条件时。代码清单 6-24 是一个查询，它使用两组不同的选择条件计算从 `FRA` 出发的延误航班上的乘客数量。第一组是延误超过一小时且登机牌在计划起飞时间后
    30 分钟以上有变更的航班上的乘客。第二组是延误超过半小时但不足一小时的航班上的乘客。


    ```

    SELECT

    CASE

    WHEN actual_departure>scheduled_departure + interval ''1 hour''

    THEN ''Late group 1''

    ELSE ''Late group 2''

    END AS grouping,

    flight_id,

    count(*) AS num_passengers

    FROM boarding_pass bp

    JOIN booking_leg bl USING (booking_leg_id)

    JOIN booking b USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=''FRA''

    AND actual_departure>''2023-07-01''

    AND

    (

    (actual_departure>scheduled_departure + interval ''30 minute''

    AND actual_departure scheduled_departure + interval ''1 hour''

    AND bp.update_ts >scheduled_departure + interval ''30 minute''

    )

    )

    GROUP BY 1,2

    代码清单 6-24

    带有复杂 OR 选择条件的查询

    ```


    使用 `UNION ALL` 重写此查询的代码如清单 6-25 所示。执行时间差异不显著（约三秒），但代码更易于维护。


    ```

    SELECT

    ''Late group 1'' AS grouping,

    flight_id,

    count(*) AS num_passengers

    FROM boarding_pass bp

    JOIN booking_leg bl USING (booking_leg_id)

    JOIN booking b USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=''FRA''

    AND actual_departure>scheduled_departure + interval ''1 hour''

    AND bp.update_ts  > scheduled_departure + interval ''30 minutes''

    AND actual_departure>''2023-07-01''

    GROUP BY 1,2

    UNION ALL

    SELECT

    ''Late group 2'' AS grouping,

    flight_id,

    count(*) AS num_passengers

    FROM boarding_pass bp

    JOIN booking_leg bl USING(booking_leg_id)

    JOIN booking b USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=''FRA''

    AND  actual_departure>scheduled_departure + interval ''30 minute''

    AND  actual_departure ''2023-07-01''

    GROUP BY 1,2

    代码清单 6-25

    使用 UNION ALL 重写带有复杂 OR 条件的查询

    ```


    值得注意的是，对于大型查询，始终需要考虑可用 RAM 的大小。对于哈希连接和集合论操作，如果涉及的数据集无法全部装入主内存，执行速度会显著下降。'
- fmt: '## 避免多次扫描


    长查询中另一个导致速度缓慢的原因是存在多次表扫描。这个常见问题是设计不完善的直接结果。设计可以修复，至少在理论上是可以的。但由于我们经常遇到无法控制设计的情况，因此我们将建议一些方法，即使在不完善的模式下也能编写高性能的查询。


    我们在`postgres_air`模式中建模的情况在现实世界中并不少见。系统已经上线运行，突然间，我们需要为数据库中已有的对象存储一些额外的信息。


    在过去的30年里，此类情况下最简单的解决方案是使用实体-属性-值（EAV）表，它可以存储任意属性——现在需要的以及最终可能需要的任何属性。在`postgres_air`模式中，这种模式在`custom_field`表中实现。对于每位乘客，护照号码、护照有效期和护照签发国被存储下来。属性相应地被命名为`''passport_num''`、`''passport_exp_date''`和`''passport_country''`。


    此表未包含在 postgres_air 发行版中。要在本地运行该示例，请从 postgres_air GitHub 存储库执行以下脚本：


    [https://github.com/hettie-d/postgres_air/blob/main/tables/custom_field.sql](https://github.com/hettie-d/postgres_air/blob/main/tables/custom_field.sql)


    现在，想象一个需要生成乘客姓名及其护照信息报告的请求。代码清单[6-26](#501585_2_En_6_Chapter.xhtml#PC34)是一个典型的推荐解决方案：`custom_field`表被扫描了三次！为了防止溢出到磁盘，乘客被限制在前500万，这使我们能够展示真实的执行时间比率。图[6-21](#501585_2_En_6_Chapter.xhtml#Fig21)中的执行计划确认了三次表扫描，该查询的执行时间为5分钟。


    ```sql

    SELECT

    first_name,

    last_name,

    pn.custom_field_value AS passport_num,

    pe.custom_field_value AS passport_exp_date,

    pc.custom_field_value AS passport_country

    FROM passenger p

    JOIN custom_field pn ON pn.passenger_id=p.passenger_id

    AND pn.custom_field_name=''passport_num''

    JOIN custom_field pe ON pe.passenger_id=p.passenger_id

    AND pe.custom_field_name=''passport_exp_date''

    JOIN custom_field pc ON pc.passenger_id=p.passenger_id

    AND pc.custom_field_name=''passport_country''

    WHERE p.passenger_id<5000000

    ```

    **代码清单 6-26**

    对一个大表的多次扫描


    ![](Images/501585_2_En_6_Fig21_HTML.jpg)


    包含多次扫描的17行执行计划的截图。它包括哈希连接、哈希条件、对自定义字段的序列扫描、过滤以及对乘客表`p`的序列扫描。


    **图 6-21**

    包含多次扫描的执行计划


    将这个表扫描三次，就像是从一个黑箱中将苹果、橙子和柠檬分类到三个桶中。具体做法是先挑出所有苹果，将所有橙子和柠檬放回箱子，然后挑出橙子，最后再回去挑柠檬。一个更有效的方法是先把三个桶摆在面前，当你第一次从黑箱中取出水果时，就将其放入正确的桶中。


    当从实体-属性-值表中检索多个属性时，只连接该表一次，并在`SELECT`列表的聚合函数`MAX()`中使用`FILTER`子句，以在每一列中返回适当的值。


    为了在`custom_field`表上实现这种效果，可以如代码清单[6-27](#501585_2_En_6_Chapter.xhtml#PC35)所示重写查询。


    ```sql

    SELECT

    last_name,

    first_name,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM passenger p

    JOIN custom_field cf  USING (passenger_id)

    WHERE cf.passenger_id<5000000

    AND p.passenger_id<5000000

    GROUP by 1,2;

    ```

    **代码清单 6-27**

    一次表扫描以检索多个属性


    代码清单[6-27](#501585_2_En_6_Chapter.xhtml#PC35)的执行计划如图[6-22](#501585_2_En_6_Chapter.xhtml#Fig22)所示。


    ![](Images/501585_2_En_6_Fig22_HTML.jpg)


    包含一次表扫描的10行执行计划的截图。它包括哈希聚合、分组键、计划分区、哈希条件、过滤以及对乘客表`p`的序列扫描。


    **图 6-22**

    一次表扫描


    这看起来好多了——只有一次表扫描——但当你尝试执行它时，它的运行时间会显著延长。仔细观察就会发现原因：可能有很多乘客拥有相同的姓氏和名字，因此不仅耗时更长，而且结果也是不正确的。让我们再次修改查询——见代码清单[6-28](#501585_2_En_6_Chapter.xhtml#PC36)。


    ```sql

    SELECT

    last_name,

    first_name,

    p.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM passenger p

    JOIN custom_field cf  USING (passenger_id)

    WHERE cf.passenger_id<5000000

    AND p.passenger_id<5000000

    GROUP by 3,1,2;

    ```

    **代码清单 6-28**

    对代码清单6-27中查询的修正


    图[6-23](#501585_2_En_6_Chapter.xhtml#Fig23)中的执行计划看起来好多了——分组列现在是`passenger_id`。


    ![](Images/501585_2_En_6_Fig23_HTML.jpg)


    代码清单的10行执行计划的截图。它包括哈希聚合、分组键、计划分区、哈希条件、过滤以及对乘客表`p`的序列扫描。


    **图 6-23**

    代码清单[6-28](#501585_2_En_6_Chapter.xhtml#PC36)的执行计划


    这里还有一个优化点；来自EAV表的属性经常需要与其他表连接，我们可以通过在执行其他连接之前，“折叠”并过滤此表到所需值，来减小中间结果集的大小。这是前面提到的先分组再连接这一通用技术的更具体案例。


    **在连接其他表之前，将来自EAV表的值提取到子查询中。**


    针对护照示例这样做，我们可以如代码清单[6-29](#501585_2_En_6_Chapter.xhtml#PC37)所示，再次修改查询。


    ```sql

    SELECT

    last_name,

    first_name,

    passport_num,

    passport_exp_date,

    passport_country

    FROM  passenger p

    JOIN (

    SELECT

    cf.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM custom_field cf

    WHERE cf.passenger_id<5000000

    GROUP BY 1

    ) info  USING (passenger_id)

    WHERE p.passenger_id<5000000

    ```

    **代码清单 6-29**

    将分组移至子查询


    执行计划如图[6-24](#501585_2_En_6_Chapter.xhtml#Fig24)所示。


    ![](Images/501585_2_En_6_Fig24_HTML.jpg)


    将分组移至子查询的12行执行计划的截图。它包括哈希连接、哈希条件、分组键、分组聚合、排序、排序键、过滤以及对乘客表`p`的序列扫描。


    **图 6-24**

    将分组移至子查询的执行计划'
  raw: '## Avoiding Multiple Scans


    Another source of slowness in long queries is the presence of multiple table scans.
    This common problem is the direct result of imperfect design. Designs can be fixed,
    at least theoretically. But since we often find ourselves in situations where
    we can’t control the design, we are going to suggest ways to write performant
    queries even on an imperfect schema.


    The situation that we are modeling in our `postgres_air` schema is not uncommon
    in the real world. The system is already up and running, and all of a sudden,
    we need to store some additional information for objects that are already present
    in the database.


    For the past 30 years, the easiest solution in such cases is to use an entity-attribute-value
    (EAV) table, which can store arbitrary attributes—those needed now and any that
    will eventually be needed. In the `postgres_air` schema, this pattern is implemented
    in the table `custom_field`. For each passenger, a passport number, a passport
    expiration date, and the country that issued the passport are stored. The attributes
    are accordingly named `''passport_num''`, `''passport_exp_date''`, and `''passport_country''`.


    This table is not included into the postgres_air distribution. To run the example
    locally, execute the following script from the postgres_air GitHub repository:


    [*https://github.com/hettie-d/postgres_air/blob/main/tables/custom_field.sql*](https://github.com/hettie-%25C2%25ADd/postgres_air/blob/main/tables/custom_field.sql)


    Now, imagine a request for a report that lists passenger names and their passport
    information. Listing [6-26](#501585_2_En_6_Chapter.xhtml#PC34) is a typical suggested
    solution: the table `custom_field` is scanned three times! In order to avoid spill
    to the disk, passengers are limited to the first five million, which allows us
    to show the true ratio of execution times. The execution plan in Figure [6-21](#501585_2_En_6_Chapter.xhtml#Fig21)
    confirms three table scans, and the execution time for this query is five minutes.


    ```

    SELECT

    first_name,

    last_name,

    pn.custom_field_value AS passport_num,

    pe.custom_field_value AS passport_exp_date,

    pc.custom_field_value AS passport_country

    FROM passenger p

    JOIN custom_field pn ON pn.passenger_id=p.passenger_id

    AND pn.custom_field_name=''passport_num''

    JOIN custom_field pe ON pe.passenger_id=p.passenger_id

    AND pe.custom_field_name=''passport_exp_date''

    JOIN custom_field pc ON pc.passenger_id=p.passenger_id

    AND pc.custom_field_name=''passport_country''

    WHERE p.passenger_id<5000000

    Listing 6-26

    Multiple scans of a large table

    ```


    ![](Images/501585_2_En_6_Fig21_HTML.jpg)


    A screenshot of the 17-line execution plan with multiple scans. It includes hash
    join, hash condition, sequence scan on custom field, filter, and sequence scan
    on passenger p.


    Figure 6-21


    Execution plan with multiple scans


    Scanning this table three times is like sorting apples, oranges, and lemons from
    one black box into three buckets, doing so by first sorting out all the apples,
    returning all the oranges and lemons back into the box, then sorting the oranges,
    and then finally returning to the box for the lemons. A more effective way to
    do this job would be to place all three buckets before you and sort each fruit
    into the correct bucket when first removing it from the black box.


    When retrieving multiple attributes from an entity-attribute-value table, join
    to the table only once and use FILTER in the aggregate function MAX() in SELECT
    list to return the appropriate values in each column.


    To replicate this effect on the `custom_field` table, the query can be rewritten
    as shown in Listing [6-27](#501585_2_En_6_Chapter.xhtml#PC35).


    ```

    SELECT

    last_name,

    first_name,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM passenger p

    JOIN custom_field cf  USING (passenger_id)

    WHERE cf.passenger_id<5000000

    AND p.passenger_id<5000000

    GROUP by 1,2;

    Listing 6-27

    One table scan to retrieve multiple attributes

    ```


    The execution plan for Listing [6-27](#501585_2_En_6_Chapter.xhtml#PC35) is shown
    in Figure [6-22](#501585_2_En_6_Chapter.xhtml#Fig22).


    ![](Images/501585_2_En_6_Fig22_HTML.jpg)


    A screenshot of the 10-line execution plan of one table scan. It includes hash
    aggregate, group key, planned partitions, hash conditions, filter, and sequence
    scan on passenger p.


    Figure 6-22


    One table scan


    This looks much better—only one table scan—except that when you try to execute
    it, it will run significantly longer. A closer look shows why: there may be many
    passengers with the same first and last names, so not only does it take longer
    but the result is also incorrect. Let’s modify the query one more time—see Listing
    [6-28](#501585_2_En_6_Chapter.xhtml#PC36).


    ```

    SELECT

    last_name,

    first_name,

    p.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM passenger p

    JOIN custom_field cf  USING (passenger_id)

    WHERE cf.passenger_id<5000000

    AND p.passenger_id<5000000

    GROUP by 3,1,2;

    Listing 6-28

    Correction for the query in Listing 6-27

    ```


    The execution plan in Figure [6-23](#501585_2_En_6_Chapter.xhtml#Fig23) looks
    much better—the grouping column is now `passenger_id`.


    ![](Images/501585_2_En_6_Fig23_HTML.jpg)


    A screenshot of the 10-line execution plan for listing. It includes hash aggregate,
    group key, planned partitions, hash conditions, filter, and sequence scan on passenger
    p.


    Figure 6-23


    Execution plan for Listing [6-28](#501585_2_En_6_Chapter.xhtml#PC36)


    There’s one more optimization to make here; attributes from an EAV table are often
    joined to other tables, and we can reduce the size of the intermediate result
    set by “collapsing” and filtering this table to the needed values before executing
    other joins. This is a more specific case of the generalized technique of grouping
    before joining earlier.


    Pull values from an EAV table into a subquery before joining to other tables.


    Doing this for the passport example, we can modify the query one more time, as
    shown in Listing [6-29](#501585_2_En_6_Chapter.xhtml#PC37).


    ```

    SELECT

    last_name,

    first_name,

    passport_num,

    passport_exp_date,

    passport_country

    FROM  passenger p

    JOIN (

    SELECT

    cf.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM custom_field cf

    WHERE cf.passenger_id<5000000

    GROUP BY 1

    ) info  USING (passenger_id)

    WHERE p.passenger_id<5000000

    Listing 6-29

    Moving grouping to the subquery

    ```


    The execution plan is shown in Figure [6-24](#501585_2_En_6_Chapter.xhtml#Fig24).


    ![](Images/501585_2_En_6_Fig24_HTML.jpg)


    A screenshot of the 12-line execution plan with grouping moved to the subquery.
    It includes hash join, hash condition, group key, group aggregate, sort, sort
    key, filter, and sequence scan on passenger p.


    Figure 6-24


    Execution plan with grouping moved to the subquery'
