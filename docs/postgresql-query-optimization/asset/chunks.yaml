- fmt: "# User-Defined Data Types\n\nIn addition to its own rich collection of data\
    \ types, PostgreSQL allows the creation of a virtually unlimited number of user-defined\
    \ data types.\n\nUser-defined types can be simple or composite. Simple user-defined\
    \ types include the following categories: domain, enum, and range.\n\nThe following\
    \ are examples of simple type creation:\n\n```sql\nCREATE DOMAIN timeperiod  AS\
    \ tstzrange;\nCREATE TYPE mood AS ENUM ('sad', 'ok', 'happy’);\nCREATE TYPE mood_range\
    \ AS RANGE...\nCREATE TYPE \n```\n\nJust as we can define arrays of base types,\
    \ we can define arrays of user-defined types:\n\n```sql\nDECLARE\nv_moods_set\
    \ mood[];\n```\n\nEven more options are available when we create a composite type.\n\
    \nA composite type represents a row, or a record. A type definition consists of\
    \ the sequence of field names and their respective data types. For example, Listing\
    \ 12-17 defines the type `boarding_pass_record`.\n\n```sql\nCREATE TYPE boarding_pass_record\
    \ AS (\nboarding_pass_id int,\nbooking_leg_id bigint,\nflight_no text,\ndeparture_airport\
    \ text,\narrival_airport text,\nlast_name text,\nfirst_name text,\nseat text,\n\
    boarding_time timestamptz\n);\n```\n**Listing 12-17**\nType `boarding_pass_record`\n\
    \nNow that the type `boarding_pass_record` is defined, we can declare variables\
    \ of this type, the same as we can declare variables of base types:\n\n```sql\n\
    DECLARE\nv_new_boarding_pass_record boarding_pass_record;\n```\n\nAnd moreover,\
    \ we can create functions, which return sets of composite types.\n\n# Functions\
    \ Returning Composite Types\n\nWhy is the fact that functions can return sets\
    \ of composite types so crucial? Why would we want to do it? Recall from Chapter\
    \ 9 that we need to be able to retrieve the whole object from the database, not\
    \ just one component after another. Now, everything previously discussed can be\
    \ put together.\n\nLet’s build an example. In Listing 12-18, we present a function\
    \ that returns all boarding passes for a specified flight.\n\n```sql\nCREATE OR\
    \ REPLACE FUNCTION boarding_passes_flight (p_flight_id int)\nRETURNS SETOF boarding_pass_record\n\
    AS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\npass_id,\nbp.booking_leg_id,\nflight_no,\n\
    departure_airport::text ,\narrival_airport ::text,\nlast_name ,\nfirst_name ,\n\
    seat,\nboarding_time\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN\
    \ boarding_pass bp USING(booking_leg_id)\nJOIN passenger USING (passenger_id)\n\
    WHERE bl.flight_id=p_flight_id;\nEND;\n$body$\nLANGUAGE plpgsql;\n```\n**Listing\
    \ 12-18**\nFunction returning all boarding passes for the flight\n\nTo execute\
    \ this function, run the following:\n\n```sql\nSELECT * FROM boarding_passes_flight(13);\n\
    ```\n\nThe result of this SELECT is presented in Figure 12-1.\n\n![](Images/501585_2_En_12_Fig1_HTML.jpg)\n\
    \nA screenshot presents a result database of boarding passes flight. It lists\
    \ 10 columns and 5 rows of data. The column headers are serial number, boarding\
    \ pass and booking leg I Ds, flight number, departure and arrival airports, last\
    \ name, first name, seat, and boarding time.\n\n**Figure 12-1**\nResult of the\
    \ execution of the function `boarding_passes_flight`\n\nNow, let’s create another\
    \ function, which will select just one boarding pass by the `pass_id.` Note that\
    \ since both functions accept a single integer parameter, overloading won’t be\
    \ possible in this case. The new function is shown in Listing 12-19.\n\n```sql\n\
    CREATE OR REPLACE FUNCTION boarding_passes_pass (p_pass_id int)\nRETURNS SETOF\
    \ boarding_pass_record\nAS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\npass_id,\nbp.booking_leg_id,\n\
    flight_no,\ndeparture_airport::text ,\narrival_airport ::text,\nlast_name ,\n\
    first_name ,\nseat,\nboarding_time\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\n\
    JOIN boarding_pass bp USING(booking_leg_id)\nJOIN passenger USING (passenger_id)\n\
    WHERE pass_id=p_pass_id;\nEND;\n$body$\nLANGUAGE plpgsql;\n```\n**Listing 12-19**\n\
    Function that returns one boarding pass\n\nWhen we execute this function\n\n```sql\n\
    SELECT * FROM boarding_passes_pass(215158);\n```\n\n…the result will be a set\
    \ that consists of only one row, but its structure will be the same (see Figure\
    \ 12-2).\n\n![](Images/501585_2_En_12_Fig2_HTML.jpg)\n\nA screenshot presents\
    \ a result database of boarding passes pass. It lists 10 columns and 1 row of\
    \ data. The column headers are serial number, boarding pass and booking leg I\
    \ Ds, flight number, departure and arrival airports, last name, first name, seat,\
    \ and boarding time.\n\n**Figure 12-2**\nResult of the execution of the function\
    \ `boarding_passes_pass`\n\nWhy would using these functions improve performance?\
    \ As we discussed in Chapter 10, applications rarely execute SQL statements directly;\
    \ instead, they often use SQL statements generated behind the scenes by ORMs.\
    \ In this case, there is a high likelihood that boarding passes, passengers, and\
    \ flights are accessible using different methods. That means that most likely,\
    \ to select the same data returned by the function `boarding_passes_flight`, we\
    \ will need one method to select departure airport, arrival airport, and scheduled\
    \ departure for a flight, which is passed as a parameter to this function, another\
    \ method to select all booking legs for that flight, another method for boarding\
    \ passes, and yet another for passenger information. If the application developers\
    \ can be convinced, consolidating this into a single function will be a huge performance\
    \ improvement.\n\nSelecting all boarding passes for a flight that has 600 passengers\
    \ with the boarding pass function takes 220 ms, running `SELECT * FROM boarding_passes_flight(13650)`.\
    \ On the other hand, any individual SELECT from any table takes around 150 ms.\
    \ Since each process returns data to the application, making a roundtrip, the\
    \ execution time is summed up—using multiple calls will very quickly exceed the\
    \ execution time of the function.\n\nPreviously, we learned that for scalar functions\
    \ there is no difference between the syntaxes `SELECT * FROM function_name` and\
    \ `SELECT function name`. But when a function returns a composite type, there\
    \ is a difference.\n\nFigure 12-1 shows the results when running\n\n```sql\nSELECT\
    \ * FROM boarding_passes_flight(13)\n```\n\nFigure 12-3 shows the results of\n\
    \n![](Images/501585_2_En_12_Fig3_HTML.jpg)\n\nA screenshot presents a result database\
    \ of boarding passes flight. It lists 2 columns and 5 rows of data. The column\
    \ headers are serial numbers and boarding passes flight.\n\n**Figure 12-3**\n\
    Function results as a set of records\n\n```sql\nSELECT boarding_passes_flight(13)\n\
    ```"
