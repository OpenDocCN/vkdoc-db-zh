  trans: '### 全文搜索的索引


    PostgreSQL 提供了两种可用于支持文本搜索的索引类型。首先考虑 `GIN` 索引，其中 `GIN` 代表广义倒排索引（Generalized Inverted
    Index）。


    就索引而言，一个文档被视为一个词条（或词元）列表，例如前面讨论过的 `ts_vector` 数据类型的值。


    对于至少出现在一个文档中的每个词条，倒排索引包含一个包含该词条的文档列表。因此，整体结构是对称的：一个文档有一个词条列表，而一个词条有一个文档列表。这种对称性解释了为什么这种索引类型被称为“倒排”。


    倒排索引可以高效地支持文本搜索。例如，要查找包含查询中指定的所有词条的文档，PostgreSQL 会扫描这些词条的所有文档列表，并只保留出现在查询中所有词条列表中的文档。这些列表是有序的，因此只需对列表进行一次遍历就足以生成结果集。


    `GIN` 索引可以作为函数索引创建，其表达式将被索引的文档转换为 `ts_vector`，或者 `ts_vector` 的值可以作为单独的列存储。前者的优点是占用空间较少，后者的优点是索引不依赖于配置（因为配置仅用于计算
    `ts_vector` 的值）。如果存储了 `ts_vector` 的值，索引可以引用用不同自然语言编写并使用不同配置转换为 `ts_vector` 的文档。通常，预计算的
    `ts_vector` 性能会更好，但这始终取决于用于生成向量的函数和系统配置。


    `GIN` 的结构并非源自自然语言或与之相关；如前所述，它将文档视为列表。因此，它可以处理文档以外的数据——实际上，任何包含多个值的属性类型都可以，例如数组。`GIN`
    索引会找到所有包含查询中指定的所有值的多值属性的行，就像它找到包含指定词条的所有文档一样。


    文档（`ts_vector` 类型的值）也可以用 `GIST` 进行索引。要构建这样的索引，`ts_vector` 的值会被转换为固定长度的位图。为了构造位图，出现在任何被索引文档中的每个词条都会被哈希处理，以获取一个代表其在位图中位置的数字。每个词条都是一个相同长度的位图，其中只有一位等于
    1（代表该词条），所有其他位都设置为零。一个文档的位图是该文档中所有代表词条的位图的按位逻辑 `OR` 运算结果。因此，文档位图在出现在该文档中的词条对应的所有位置上都有一位等于
    1。查询位图以类似方式构造。


    基于此索引的搜索基于以下事实：如果文档的位图在查询位图有 1 的每个位置上都包含 1，则该文档满足查询。


    不同的词条可能被哈希到相同的位置。因此，`GIST` 索引可能返回与查询无关的文档；通常需要重新检查 `ts_vector` 值，但 PostgreSQL
    可以自动识别这一点。


    随着不同词条数量的增加，错误匹配的数量也会增加。因此，`GIST` 索引对于不同词条总数较小的文档集合是高效的。这在自然语言文本中并不常见，所以 `GIN`
    索引在这种情况下通常更高效。用于文本搜索的 `GIST` 索引在特殊情况下仍然有用。


    ### 索引非常大的表


    任何索引都会占用一定空间，大表上的索引可能非常大。是否有可能减小索引的大小？


    数据库教科书区分了稠密索引和稀疏索引。到目前为止介绍的所有索引都是稠密的；也就是说，它们包含被索引列（或列）的所有值。稀疏索引只包含所有值的一小部分，但仍然减少了查找被索引属性任何值所需的读取次数。这与不加速搜索未包含在索引中的值的条件索引不同。


    一些数据库系统总是按照（代理）主键的顺序存储表行。主键上的索引然后可以为每个表块只包含一个值，因此它可以是一个稀疏索引。更高级的数据库系统支持基于其他属性值对表进行排序，这些值不一定需要是唯一的。这种表组织方式也为稀疏索引提供了条件。有时这些索引被称为聚簇索引，因为具有被索引列相同值的行被放置在一起。


    PostgreSQL 没有提供任何显式控制行顺序的方法。然而，在许多情况下，行是自然排序的。例如，记录特定类型事件的行很可能会附加到表中，并且会自然地按照到达时间戳排序，这使得稀疏索引成为可能。


    PostgreSQL 中实现的稀疏索引的泛化形式称为 `BRIN`（块范围索引）。创建了 `BRIN` 索引的表被视为一系列块范围，每个范围由固定数量的相邻块组成。对于每个范围，`BRIN`
    索引条目包含该块范围中包含的列值的摘要。例如，摘要可能包含事件日志表中时间戳列的最小值和最大值。


    要查找被索引属性的任何值，只需找到适当的块范围（使用索引），然后扫描该范围内的所有块即可。


    摘要方法的结构取决于被索引列的类型。对于区间，摘要可能是一个包含块范围中所有区间的区间。对于空间数据，摘要可以是一个包含块范围中所有框的边界框。


    如果列值未排序或行在表中未排序，扫描 `BRIN` 索引将返回多个需要扫描的块范围。


    摘要操作是昂贵的。因此，PostgreSQL 为 `BRIN` 索引维护提供了多种选择：`BRIN` 索引可以通过触发器自动更新；或者，延迟的摘要可以自动与
    vacuum 操作一起完成，也可以手动启动。'
- fmt: '# 16. Ultimate Optimization Algorithm


    ## Indexing JSON and JSONB


    Sometimes developers looking for flexibility convert table rows into text or semistructured
    format (`JSON` or `XML`) and then use text search instead of more specific indexes.
    This approach definitely works better than external indexing tools, but is significantly
    slower than specific indexes.


    Returning to the question we posed at the end of Chapter [14](#501585_2_En_14_Chapter.xhtml),
    why go to the trouble of building functions that transform search results into
    `JSON` when we can simply store the `JSON` type directly in the database?


    Let’s see how this approach would work in practice. To do so, let’s build a table
    that stores bookings as `JSON` objects. The first problem we encounter is that
    we might need different `JSON` structures for different application endpoints
    (we already built several different record types in Chapters [12](#501585_2_En_12_Chapter.xhtml)–[14](#501585_2_En_14_Chapter.xhtml)).
    But let’s assume we can consolidate different requirements and store the data
    in a way that would satisfy most use cases. We can use the code in Listing [15-1](#501585_2_En_15_Chapter.xhtml#PC1).


    ```sql

    --create simplifies booking leg type

    CREATE TYPE booking_leg_record_2 AS

    (booking_leg_id integer,

    leg_num integer,

    booking_id integer,

    flight flight_record);

    --create simplified booking type

    CREATE TYPE booking_record_2 AS

    (     booking_id integer,

    booking_ref text,

    booking_name text,

    email text,

    account_id integer,

    booking_legs booking_leg_record_2[],

    passengers passenger_record[]

    );

    ---create table

    CREATE TABLE booking_jsonb AS

    SELECT  b.booking_id,

    to_jsonb ( row (

    b.booking_id,  b.booking_ref,  b.booking_name, b.email, b.account_id,

    ls.legs,

    ps.passengers

    ) :: booking_record_2 ) as cplx_booking

    FROM booking b

    JOIN

    (SELECT booking_id,    array_agg(row (

    booking_leg_id, leg_num, booking_id,

    row(f.flight_id, flight_no, departure_airport,

    dep.airport_name,

    arrival_airport,

    arv.airport_name,

    scheduled_departure, scheduled_arrival

    )::flight_record

    )::booking_leg_record_2)  legs

    FROM  booking_leg l

    JOIN flight  f   ON  f.flight_id = l.flight_id

    JOIN   airport dep  ON dep.airport_code =  f.departure_airport

    JOIN   airport arv  ON arv.airport_code =  f.arrival_airport

    GROUP BY booking_id)  ls

    ON b.booking_id = ls.booking_id

    JOIN

    ( SELECT    booking_id,

    array_agg(

    row(passenger_id, booking_id, passenger_no, last_name, first_name):: passenger_record)  as
    passengers

    FROM passenger

    GROUP by booking_id) ps

    ON ls.booking_id = ps.booking_id

    ) ;

    ```

    Listing 15-1

    Building a table with `JSONB` column type


    Note that we create the table with a column type of `JSONB` (`JSON` Binary), not
    `JSON`. The only difference between these types is that `JSONB` stores a binary
    representation of the `JSON` data, rather than a string. For the `JSON` type,
    the only indexes you can build are B-tree indexes on specific tags, and then you
    need to specify a full path, including the indexes in the arrays, which would
    make it impossible, for example, to index “any” booking leg.


    If we want to build highly performant indexes on `JSON` columns, we need to use
    the `JSONB` type.


    Building this table will take a while. And it will take a while to build a GIN
    index:


    ```sql

    CREATE INDEX idxgin ON booking_jsonb USING GIN (cplx_booking);

    ```


    However, after this index is created, it feels like all our problems are solved.
    Now we can retrieve all the data we need without any joins and any complex structure
    builds, using simple queries like the one shown in Listing [15-2](#501585_2_En_15_Chapter.xhtml#PC3).


    ```sql

    SELECT  *

    FROM  booking_jsonb

    WHERE

    cplx_booking @@ ''$.**.departure_airport_code == "ORD" && $.**.arrival_airport_code
    == "JFK"''

    ```

    Listing 15-2

    Search using a GIN index on a `JSONB` column


    The execution plan in Figure [15-1](#501585_2_En_15_Chapter.xhtml#Fig1) proves
    that the GIN index is used.


    ![](Images/501585_2_En_15_Fig1_HTML.jpg)


    A screenshot of a query plan. It has 4 lines of code to check the departure airport
    code, O R D, and the arrival airport code, J F K, during booking.


    Figure 15-1

    Execution plan with a GIN index


    There are several issues that make this approach less appealing than it looks
    at first glance. First, this search is still slower than the search that uses
    B-tree indexes. The search functions generated using techniques described in Chapter
    [14](#501585_2_En_14_Chapter.xhtml) produce the same result but two to five times
    faster.


    Second, GIN indexes do not support searches on date-time attributes or searches
    using the `like` operator or searches on any transformed attribute values, like
    `lower()`. You can specify several complex search conditions with `json_path`
    expressions and `JSONB` operators and functions, including regular expressions,
    in the `WHERE` clause, but these will be checked with a heap scan. A good idea
    is to combine such conditions with others that are supported with indexes.


    In fact, we saw a production system that was built this way: data from multiple
    tables/schemas was used to create “search documents” of type `JSON`, and then
    `ts_vector` columns were added and indexed.


    However, there is a third problem with this approach. As already stated, one `JSON`
    structure would support only one hierarchy. If we built a `booking_jsonb` column
    as described earlier, we could relatively easily update a flight in the booking
    leg, but we couldn’t update the actual departure time or flight status.


    This means that the `booking_jsonb` table will have to be rebuilt periodically
    in order to remain useful. Indeed, the production system mentioned earlier had
    a complex sequence of triggers that rebuilt all potentially affected `JSON` data.
    In cases with a relatively low expected number of updates, this restriction might
    not be critical, but that is not the case with delayed flights and changing flight
    schedules.


    ## Summary


    PostgreSQL has a multitude of different indexes. This book covers many of them,
    but not all of them; new index types appear with nearly every new version. It
    would be unsurprising if new indexes are released between the writing of this
    chapter and this book’s release.


    Both Chapter [5](#501585_2_En_5_Chapter.xhtml) and this chapter provide a number
    of examples of how to choose the right indexes to support different searches.
    Choosing indexes that are best suited for your system, for specific searches,
    is not a straightforward task. Do not stop at creating B-tree indexes for individual
    columns. Do you need compound indexes? Functional indexes? Will a GIST index help
    solve your problem? How critical is response time for this particular query? How
    much does this particular index impact updates? Only you can answer these questions.


    The preceding chapters covered a lot of optimization techniques: not only different
    ways to optimize `SQL` statements but also how database design affects performance,
    the importance of working together with application developers, the use of functions,
    and many other aspects of database performance.


    Still, the question posed in the Introduction remains: Where to start, when you
    have a real-world problem, when your users see an hourglass and you have no idea
    why? A related but more challenging task is to figure out what to do from the
    start. You do not have a problem yet. You have a task, possibly a draft of a query,
    or maybe you are lucky enough to have detailed requirements. How do you make sure
    you are doing it right?


    In this chapter, we will present a step-by-step guide that will help you write
    queries right right away and, when you have the option, choose the database design
    that is right for you.'
