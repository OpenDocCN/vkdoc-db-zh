    Now that we’ve seen so many examples of the negative effects of using views, is
    there anything to say in their defense? Are there any situations in which views
    can improve query performance?


    Internally in PostgreSQL, any creation of a view includes creation of *rules,*
    implicitly, in most cases. The `select` rules may restrict access to underlying
    tables. Rules, triggers, and automatic updates make views in PostgreSQL extremely
    sophisticated and provide functionality very similar to tables.


    However, they do not provide any performance benefit. The best, and perhaps only
    justified, use of views is as a security layer or to define a reporting entity,
    to ensure that all joins and business logic are defined correctly.


    ## Materialized Views


    Most modern database systems allow users to create materialized views, but their
    implementations and precise behavior vary.


    Let’s begin with a definition.


    A *materialized view* is a database object that combines both a query definition
    and a table to store the results of the query at the time it is run.


    A materialized view is different from a view, because query results are stored,
    not just the view definition. This means that a materialized view reflects the
    data at the time it was last refreshed, not current data. It is different from
    a table, because you can’t modify data in a materialized view directly, but you
    can only refresh it using a predefined query.


    ### Creating and Using Materialized Views


    Let’s walk through an example to help illustrate the definition of a materialized
    view. Listing [7-9](#501585_2_En_7_Chapter.xhtml#PC17) creates a materialized
    view.


    ```

    CREATE MATERIALIZED VIEW flight_departure_mv AS

    SELECT

    bl.flight_id,

    departure_airport,

    coalesce(actual_departure, scheduled_departure)::date departure_date,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2,3

    Listing 7-9

    Create a materialized view

    ```


    What happens when this command is run? First, in this particular case, it will
    take a very long time to execute. But when it finishes, there will be a new object
    in the database, which stores the results of this execution of the query in the
    database. In addition, the query itself will be stored along with the data. In
    contrast to views, when materialized views are referenced in queries, they behave
    exactly like tables. The optimizer won’t substitute them with their defining queries,
    and they will be accessed as tables. Indexes can also be created on materialized
    views, although they cannot have primary and foreign keys:


    ```

    CREATE UNIQUE INDEX flight_departure_flight_id

    ON flight_departure_mv(flight_id);

    --

    CREATE INDEX flight_departure_dep_date

    ON flight_departure_mv(departure_date);

    --

    CREATE INDEX flight_departure_dep_airport

    ON flight_departure_mv(departure_airport);

    ```


    Executing this query


    ```

    SELECT

    flight_id,

    num_passengers

    FROM flight_departure_mv

    WHERE departure_date= ''2023-08-01''

    ```


    …will take only 60 ms, and the execution plan will show an index scan.


    ### Refreshing Materialized Views


    A `REFRESH` command populates the materialized view with the results of the base
    query at the time the refresh is executed. The syntax for the REFRESH command
    follows:


    ```

    REFRESH MATERIALIZED VIEW flight_departure_mv

    ```


    Materialized views in PostgreSQL are less mature than in some other DBMS, like
    Oracle. Materialized views cannot be updated incrementally, and the refresh schedule
    can’t be specified in the materialized view definition. Each time the `REFRESH`
    command is executed, the underlying table is truncated, and the results of the
    `SELECT` statement are inserted. If an error occurs during refresh, the refresh
    process is rolled back, and the materialized view remains unchanged.


    During refresh, the materialized view is locked, and its contents are unavailable
    to other processes. To make the prior version of a materialized view available
    during refresh, the `CONCURRENTLY` keyword is added:


    ```

    REFRESH MATERIALIZED VIEW CONCURRENTLY flight_departure_mv

    ```


    A materialized view can only be refreshed concurrently if it has a unique index.
    The concurrent refresh will take longer than regular refresh, but access to the
    materialized view won’t be blocked.


    ### Should I Create a Materialized View?


    It is difficult to provide specific, universal conditions in which creating a
    materialized view is beneficial, but there follow some guidelines for decision-making.
    Since materialized view refreshes take time and selecting from a materialized
    view is going to be much faster than from a view, consider the following:


    *   How often does the data in the base tables change?


    *   How critical is it to have the most recent data?


    *   How often do we need to select this data (or rather how many reads per one
    refresh are expected)?


    *   How many different queries will use this data?


    What should the thresholds for “often” and “many” be? It’s subjective, but let’s
    look at some examples to illustrate. Listing [7-10](#501585_2_En_7_Chapter.xhtml#PC22)
    defines a materialized view very similar to the view in Listing [7-9](#501585_2_En_7_Chapter.xhtml#PC17),
    except that it selects flights that departed yesterday.


    ```

    CREATE MATERIALIZED VIEW flight_departure_prev_day AS

    SELECT

    bl.flight_id,

    departure_airport,

    coalesce(actual_departure, scheduled_departure)::date departure_date,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    WHERE (actual_departure BETWEEN CURRENT_DATE -1

    AND  CURRENT_DATE

    )

    OR (

    actual_departure IS NULL

    AND scheduled_departure BETWEEN CURRENT_DATE -1

    AND CURRENT_DATE

    )

    GROUP BY 1,2,3

    Listing 7-10

    Materialized view for yesterday’s flights

    ```


    Information about flights that departed yesterday is not going to change, so it
    is safe to assume that the view will not need to be refreshed until the next day.
    On the other hand, this materialized view can be used in several different queries
    that will all perform faster if query results are materialized.


    Let’s consider another potential candidate for materializing, Listing 6-29\. Suppose
    a materialized view with the subquery is created, as in Listing [7-11](#501585_2_En_7_Chapter.xhtml#PC23).


    ```

    CREATE MATERIALIZED VIEW passenger_passport AS

    SELECT

    cf.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''') AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''') AS passport_country

    FROM custom_field cf

    GROUP BY 1;

    Listing 7-11

    Create a materialized view from the subquery

    ```


    This materialized view is going to be very helpful. First, it has been shown already
    that this query takes a long time to execute, so time will be saved by pre-calculating
    the results. Second, passport information does not change (this information is
    associated with booking, and the same person will be assigned a different `passenger_id`
    in a different booking). It looks like a great candidate for a materialized view,
    if not for a few potential issues.


    First, passengers are not required to submit their passport information during
    booking. This means that although once it is entered, this information will remain
    the same, for any particular flight, passport information may continue to be entered
    until the gate is closed. Hence, this materialized view will need to be constantly
    refreshed, and each refresh takes about ten minutes.'
  trans: '...将使用可用索引，并且仅需运行 120 毫秒。


    ## 为何要使用视图？


    既然我们已经看到了很多使用视图带来的负面影响例子，那么有没有什么为其辩护的理由呢？是否存在一些场景，使用视图可以提升查询性能？


    在 PostgreSQL 内部，大多数情况下，任何视图的创建都隐式地包含了规则的创建。`select` 规则可能会限制对底层表的访问。规则、触发器和自动更新使得
    PostgreSQL 中的视图极其复杂，并提供了与表非常相似的功能。


    然而，它们并不能带来任何性能上的好处。视图最好且或许是唯一合理的用途，是作为安全层或用于定义报表实体，以确保所有的连接和业务逻辑都正确定义。


    ## 物化视图


    大多数现代数据库系统允许用户创建物化视图，但它们的实现和具体行为各不相同。


    让我们从定义开始。


    物化视图是一种数据库对象，它结合了查询定义和一个表，用于在查询运行时存储其结果。


    物化视图与视图不同，因为查询结果被存储了下来，而不仅仅是视图定义。这意味着物化视图反映的是它最后一次刷新时的数据，而不是当前数据。它也不同于表，因为你不能直接修改物化视图中的数据，只能使用预定义的查询来刷新它。


    ### 创建和使用物化视图


    让我们通过一个例子来帮助说明物化视图的定义。清单 7-9 创建了一个物化视图。


    ```sql

    CREATE MATERIALIZED VIEW flight_departure_mv AS

    SELECT

    bl.flight_id,

    departure_airport,

    coalesce(actual_departure, scheduled_departure)::date departure_date,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2,3

    ```


    清单 7-9

    创建物化视图


    运行此命令时会发生什么？首先，在这个特定的例子中，它需要很长时间来执行。但执行完成后，数据库中将出现一个新对象，该对象存储了此次查询执行的结果。此外，查询本身也会与数据一起存储。与视图相反，当在查询中引用物化视图时，它们的行为完全像表。优化器不会用它们的定义查询来替换它们，而是像访问表一样访问它们。也可以在物化视图上创建索引，尽管它们不能有主键和外键：


    ```sql

    CREATE UNIQUE INDEX flight_departure_flight_id

    ON flight_departure_mv(flight_id);

    --

    CREATE INDEX flight_departure_dep_date

    ON flight_departure_mv(departure_date);

    --

    CREATE INDEX flight_departure_dep_airport

    ON flight_departure_mv(departure_airport);

    ```


    执行此查询


    ```sql

    SELECT

    flight_id,

    num_passengers

    FROM flight_departure_mv

    WHERE departure_date= ''2023-08-01''

    ```


    ...将仅需 60 毫秒，并且执行计划将显示索引扫描。


    ### 刷新物化视图


    `REFRESH` 命令使用基础查询在刷新执行时的结果来填充物化视图。`REFRESH` 命令的语法如下：


    ```sql

    REFRESH MATERIALIZED VIEW flight_departure_mv

    ```


    PostgreSQL 中的物化视图不如 Oracle 等其他一些数据库管理系统成熟。物化视图不能进行增量更新，并且刷新计划无法在物化视图定义中指定。每次执行
    `REFRESH` 命令时，底层表都会被截断，然后插入 `SELECT` 语句的结果。如果在刷新过程中发生错误，刷新过程将回滚，物化视图保持不变。


    在刷新期间，物化视图会被锁定，其内容对其他进程不可用。为了使物化视图的先前版本在刷新期间仍然可用，可以添加 `CONCURRENTLY` 关键字：


    ```sql

    REFRESH MATERIALIZED VIEW CONCURRENTLY flight_departure_mv

    ```


    物化视图只有在具有唯一索引时才能进行并发刷新。并发刷新比常规刷新花费的时间更长，但对物化视图的访问不会被阻塞。


    ### 我应该创建物化视图吗？


    很难提供创建物化视图在哪些具体、普遍条件下是有益的，但可以遵循一些决策指南。由于物化视图的刷新需要时间，而从物化视图中进行选择会比从视图中快得多，请考虑以下因素：


    *   基表中的数据变化频率如何？

    *   获取最新数据有多关键？

    *   我们需要选择这个数据的频率如何（或者更准确地说，每次刷新前预计有多少次读取）？

    *   有多少不同的查询会使用这个数据？


    “频繁”和“许多”的阈值应该是什么？这是主观的，但让我们看一些例子来说明。清单 7-10 定义了一个与清单 7-9 中的视图非常相似的物化视图，不同之处在于它选择了昨天起飞的航班。


    ```sql

    CREATE MATERIALIZED VIEW flight_departure_prev_day AS

    SELECT

    bl.flight_id,

    departure_airport,

    coalesce(actual_departure, scheduled_departure)::date departure_date,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    WHERE (actual_departure BETWEEN CURRENT_DATE -1

    AND  CURRENT_DATE

    )

    OR (

    actual_departure IS NULL

    AND scheduled_departure BETWEEN CURRENT_DATE -1

    AND CURRENT_DATE

    )

    GROUP BY 1,2,3

    ```


    清单 7-10

    用于昨日航班的物化视图


    关于昨日起飞航班的信息不会改变，因此可以安全地假设在第二天之前不需要刷新该视图。另一方面，这个物化视图可以在多个不同的查询中使用，如果查询结果被物化，这些查询都会执行得更快。


    让我们考虑另一个可能适合物化的候选对象，清单 6-29。假设创建了一个带有子查询的物化视图，如清单 7-11 所示。


    ```sql

    CREATE MATERIALIZED VIEW passenger_passport AS

    SELECT

    cf.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''') AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''') AS passport_country

    FROM custom_field cf

    GROUP BY 1;

    ```


    清单 7-11

    基于子查询创建物化视图


    这个物化视图将会非常有用。首先，已经证明这个查询执行需要很长时间，因此通过预先计算结果可以节省时间。其次，护照信息不会改变（此信息与预订相关联，同一个人在不同的预订中会被分配不同的
    `passenger_id`）。如果不考虑几个潜在问题，它看起来是物化视图的绝佳候选。


    首先，乘客在预订时并非必须提交护照信息。这意味着尽管一旦输入，这些信息将保持不变，但对于任何特定航班，护照信息可能会持续输入直到登机口关闭。因此，这个物化视图将需要不断刷新，并且每次刷新大约需要十分钟。'
- fmt: '## 物化视图的增长与优化


    其次，这个物化视图会不断增长。与之前每天刷新只覆盖前一天数据的例子不同，关于乘客护照的数据会持续累积，刷新物化视图所需的时间也会越来越长。这种情况在项目早期经常被忽视，因为那时表中数据很少，物化视图刷新很快。由于
    PostgreSQL 不支持增量刷新物化视图，一个可能的解决方案是创建另一个与清单 [7-11](#501585_2_En_7_Chapter.xhtml#PC23)
    中物化视图结构相同的表，并在新的护照信息可用时定期追加新行。


    然而，如果采用后一种解决方案，如果数据需要以 `passenger_passport` 物化视图指定的格式存在，那么最初为何需要 `custom_field`
    表就变得不明确了。这将是下一章讨论的主题，将探讨设计对性能的影响。


    ### 物化视图是否需要优化？


    虽然物化视图的查询执行频率低于其本身的使用频率，但我们仍需关注其执行时间。即使物化视图是一个快速的查询（例如，如清单 [7-9](#501585_2_En_7_Chapter.xhtml#PC17)
    中只包含前一天的数据），如果没有合适的索引或执行计划不是最优的，它最终也可能对大表进行全表扫描。


    如前所述，我们不能接受“因为运行频率低所以不需要优化”这样的借口，无论是一个月一次、一周一次还是一天一次。没有人会对运行六小时的报表感到满意，无论其频率多低。此外，这些周期性报表通常都被安排在同一时间执行——往往是周一早上8点——以比任何人所需压力更大的方式开启一周。如果物化视图之间存在某些*依赖关系*，这种压力会更加明显。在这种情况下，物化视图需要按特定顺序刷新，增加了最终报告刷新前的总等待时间。


    值得一提的是，刷新缓慢的物化视图可能引发的另一个问题。如果在物化视图刷新开始之后开始数据库备份，并在刷新结束之前完成备份，那么该物化视图将以不一致的状态存储在备份中。如果你从这个备份中恢复（例如，在你的开发环境中），你将既不能删除也无法重建它。综上所述，我们相信很明显物化视图应该像任何其他
    SQL 查询一样进行优化。第 [5](#501585_2_En_5_Chapter.xhtml) 章和第 [6](#501585_2_En_6_Chapter.xhtml)
    章讨论的技术可以并且应该应用于物化视图。


    ### 依赖关系


    当视图和物化视图被创建时，一个副作用是产生*依赖关系*。视图和物化视图都有关联的查询，当这些查询中涉及的任何属性被更改时，相关的视图和物化视图就需要被重新创建。


    实际上，PostgreSQL 甚至不允许对存在依赖视图和物化视图的表或物化视图执行 `alter` 或 `drop` 操作。进行更改需要在 `ALTER`
    或 `DROP` 命令中添加 `CASCADE` 关键字。


    如果视图和物化视图建立在其他视图之上，更改或删除基础表中的一个列可能会导致重建几十个相关的数据库对象。创建一个视图不需要大量时间，但重建多个相关的物化视图却需要，并且在这段时间内，即使它们允许并发刷新，这些物化视图也将不可用。


    后续章节将讨论函数和存储过程，它们可以消除此类依赖关系。


    ## 分区


    到目前为止，本章讨论了将查询分割成更小部分的不同方法。


    分区是另一种划分——划分数据。一个分区表由多个分区组成，每个分区被定义为一张表。分区表本身是一个虚拟表，不存储任何行。相反，根据创建分区表时指定的规则，每一行数据被存储在其中一个分区中。


    分区支持在 PostgreSQL 中相对较新，从 PG 10 开始，每个版本都有改进，使分区表更易于使用。目前，PostgreSQL 支持以下分区方法：范围分区、列表分区和哈希分区。


    最常见的情况是范围分区，这意味着每个分区包含其属性值在分配给该分区的范围内的行。分配给不同分区的范围不能相交，不符合任何分区范围的行无法被插入。


    例如，让我们创建 `boarding_pass` 表的分区版本。命令序列如清单 [7-12](#501585_2_En_7_Chapter.xhtml#PC24)
    所示。


    ```

    ---create table


    CREATE TABLE boarding_pass_part (

    boarding_pass_id SERIAL,

    passenger_id BIGINT NOT NULL,

    booking_leg_id BIGINT NOT NULL,

    seat TEXT,

    boarding_time TIMESTAMPTZ,

    precheck BOOLEAN,

    update_ts TIMESTAMPTZ

    )

    PARTITION BY RANGE (boarding_time);

    --create partitions

    --

    CREATE TABLE boarding_pass_may

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-05-01''::timestamptz)

    TO (''2023-06-01''::timestamptz) ;

    --

    CREATE TABLE boarding_pass_june

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-06-01''::timestamptz)

    TO (''2023-07-01''::timestamptz);

    --

    CREATE TABLE boarding_pass_july

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-07-01''::timestamptz)

    TO (''2023-08-01''::timestamptz);

    --

    CREATE TABLE boarding_pass_aug

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-08-01''::timestamptz)

    TO (''2023-09-01''::timestamptz);

    --

    INSERT INTO boarding_pass_part SELECT * from boarding_pass;

    ```

    清单 7-12 创建一个分区表'
  raw: 'Second, this materialized view will keep growing. Unlike the previous example,
    when each day’s refresh will cover data solely from the previous day, data about
    passengers’ passports will grow, and it will take longer and longer to refresh
    a materialized view. Such situations are frequently overlooked in the early stage
    of a project, when there is little data in any table and materialized views refresh
    quickly. Since PostgreSQL does not allow an incremental materialized view refresh,
    a possible solution could be to create another table, with the same structure
    as the materialized view in Listing [7-11](#501585_2_En_7_Chapter.xhtml#PC23),
    and periodically upend new rows when new passport information becomes available.


    However, if the latter solution is adopted, it’s unclear why the `custom_field`
    table is needed in the first place, if data is needed in the format specified
    by the `passenger_passport` materialized view. This will be a topic in the next
    chapter, which discusses the impact of design on performance.


    ### Do Materialized Views Need to Be Optimized?


    Although the query of a materialized view is executed less frequently than the
    materialized view itself is used, we still need to pay attention to its execution
    time. Even when a materialized view is a short query (e.g., when it contains data
    for the previous day, as in Listing [7-9](#501585_2_En_7_Chapter.xhtml#PC17)),
    it may end up doing full scans of large tables, if proper indexes are not in place
    or an execution plan is suboptimal.


    As mentioned earlier, we don’t accept the excuse that something doesn’t need to
    be optimized because it runs infrequently, whether once a month, once a week,
    or once a day. No one is happy with reports that run for six hours, no matter
    how infrequently. In addition, these periodic reports are often all scheduled
    at the same time—usually 8 AM on a Monday—starting the week with more stress than
    anyone needs. The stress will be even more pronounced if some *dependencies* between
    materialized views are present. In this case, materialized views should be refreshed
    in a specific order, increasing the total wait time till the final report can
    be refreshed.


    It’s worth mentioning one more problem that can be caused by slow-refreshing materialized
    views. If we start to take a database backup after refresh of a materialized view
    started and finish it before the refresh ends, this materialized view will be
    stored in the backup in an inconsistent state, and if you restore from this backup
    (e.g., in your development environment), you won’t be able either drop or recreate
    it. With everything being said, we believe it’s evident that materialized views
    should be optimized in a manner like any other SQL query. The techniques discussed
    in Chapters [5](#501585_2_En_5_Chapter.xhtml) and [6](#501585_2_En_6_Chapter.xhtml)
    can and should be applied to materialized views.


    ### Dependencies


    When views and materialized views are created, a side effect is the creation of
    *dependencies*. Both views and materialized views have queries associated with
    them, and when any attribute involved in those queries is altered, the dependent
    views and materialized views need to be recreated.


    Actually, PostgreSQL doesn’t even permit an alter or drop on a table or materialized
    views if they have dependent views and materialized views. Making a change requires
    adding the `CASCADE` keyword to the `ALTER` or `DROP` command.


    If views and materialized views are built on top of other views, altering or removing
    one column in one base table may result in recreating several dozen dependent
    database objects. Creating a view does not take substantial time, but rebuilding
    multiple dependent materialized views does, and all this time the materialized
    views will be unavailable, even if they allow concurrent refreshes.


    Subsequent chapters discuss functions and stored procedures, which can eliminate
    such dependencies.


    ## Partitioning


    So far, this chapter has discussed different ways of splitting queries into smaller
    parts.


    Partition is a different sort of division—dividing the data. A partitioned table
    consists of several partitions, each of which is defined as a table. The partitioned
    table itself is a virtual table and does not store any rows. Instead, each table
    row is stored in one of the partitions according to rules specified when the partitioned
    table is created.


    Partition support is relatively new in PostgreSQL, and beginning with PG 10, improvements
    are made in every release, making partitioned tables easier to use. Currently,
    PostgreSQL supports the following partitioning methods: range, list, and hash
    partitioning.


    The most common case is range partitioning, meaning that each partition contains
    rows that have values of an attribute in the range assigned to the partition.
    Ranges assigned to different partitions cannot intersect, and a row that does
    not fit into any partition cannot be inserted.


    As an example, let’s create a partitioned version of the `boarding_pass` table.
    The sequence of commands is shown in Listing [7-12](#501585_2_En_7_Chapter.xhtml#PC24).


    ```

    ---create table


    CREATE TABLE boarding_pass_part (

    boarding_pass_id SERIAL,

    passenger_id BIGINT NOT NULL,

    booking_leg_id BIGINT NOT NULL,

    seat TEXT,

    boarding_time TIMESTAMPTZ,

    precheck BOOLEAN,

    update_ts TIMESTAMPTZ

    )

    PARTITION BY RANGE (boarding_time);

    --create partitions

    --

    CREATE TABLE boarding_pass_may

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-05-01''::timestamptz)

    TO (''2023-06-01''::timestamptz) ;

    --

    CREATE TABLE boarding_pass_june

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-06-01''::timestamptz)

    TO (''2023-07-01''::timestamptz);

    --

    CREATE TABLE boarding_pass_july

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-07-01''::timestamptz)

    TO (''2023-08-01''::timestamptz);

    --

    CREATE TABLE boarding_pass_aug

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-08-01''::timestamptz)

    TO (''2023-09-01''::timestamptz);

    --

    INSERT INTO boarding_pass_part SELECT * from boarding_pass;

    Listing 7-12

    Create a partitioned table

    ```'
  trans: '## 物化视图的增长与优化


    其次，这个物化视图会不断增长。与之前每天刷新只覆盖前一天数据的例子不同，关于乘客护照的数据会持续累积，刷新物化视图所需的时间也会越来越长。这种情况在项目早期经常被忽视，因为那时表中数据很少，物化视图刷新很快。由于
    PostgreSQL 不支持增量刷新物化视图，一个可能的解决方案是创建另一个与清单 7-11 中物化视图结构相同的表，并在新的护照信息可用时定期追加新行。


    然而，如果采用后一种解决方案，如果数据需要以 `passenger_passport` 物化视图指定的格式存在，那么最初为何需要 `custom_field`
    表就变得不明确了。这将是下一章讨论的主题，将探讨设计对性能的影响。


    ### 物化视图是否需要优化？


    虽然物化视图的查询执行频率低于其本身的使用频率，但我们仍需关注其执行时间。即使物化视图是一个快速的查询（例如，如清单 7-9 中只包含前一天的数据），如果没有合适的索引或执行计划不是最优的，它最终也可能对大表进行全表扫描。


    如前所述，我们不能接受“因为运行频率低所以不需要优化”这样的借口，无论是一个月一次、一周一次还是一天一次。没有人会对运行六小时的报表感到满意，无论其频率多低。此外，这些周期性报表通常都被安排在同一时间执行——往往是周一早上
    8 点——以比任何人所需压力更大的方式开启一周。如果物化视图之间存在某些*依赖关系*，这种压力会更加明显。在这种情况下，物化视图需要按特定顺序刷新，增加了最终报告刷新前的总等待时间。


    值得一提的是，刷新缓慢的物化视图可能引发的另一个问题。如果在物化视图刷新开始之后开始数据库备份，并在刷新结束之前完成备份，那么该物化视图将以不一致的状态存储在备份中。如果你从这个备份中恢复（例如，在你的开发环境中），你将既不能删除也无法重建它。综上所述，我们相信很明显物化视图应该像任何其他
    SQL 查询一样进行优化。第 5 章和第 6 章讨论的技术可以并且应该应用于物化视图。


    ### 依赖关系


    当视图和物化视图被创建时，一个副作用是产生*依赖关系*。视图和物化视图都有关联的查询，当这些查询中涉及的任何属性被更改时，相关的视图和物化视图就需要被重新创建。


    实际上，PostgreSQL 甚至不允许对存在依赖视图和物化视图的表或物化视图执行 `alter` 或 `drop` 操作。进行更改需要在 `ALTER`
    或 `DROP` 命令中添加 `CASCADE` 关键字。


    如果视图和物化视图建立在其他视图之上，更改或删除基础表中的一个列可能会导致重建几十个相关的数据库对象。创建一个视图不需要大量时间，但重建多个相关的物化视图却需要，并且在这段时间内，即使它们允许并发刷新，这些物化视图也将不可用。


    后续章节将讨论函数和存储过程，它们可以消除此类依赖关系。


    ## 分区


    到目前为止，本章讨论了将查询分割成更小部分的不同方法。


    分区是另一种划分——划分数据。一个分区表由多个分区组成，每个分区被定义为一张表。分区表本身是一个虚拟表，不存储任何行。相反，根据创建分区表时指定的规则，每一行数据被存储在其中一个分区中。


    分区支持在 PostgreSQL 中相对较新，从 PG 10 开始，每个版本都有改进，使分区表更易于使用。目前，PostgreSQL 支持以下分区方法：范围分区、列表分区和哈希分区。


    最常见的情况是范围分区，这意味着每个分区包含其属性值在分配给该分区的范围内的行。分配给不同分区的范围不能相交，不符合任何分区范围的行无法被插入。


    例如，让我们创建 `boarding_pass` 表的分区版本。命令序列如清单 7-12 所示。


    ```

    ---create table


    CREATE TABLE boarding_pass_part (

    boarding_pass_id SERIAL,

    passenger_id BIGINT NOT NULL,

    booking_leg_id BIGINT NOT NULL,

    seat TEXT,

    boarding_time TIMESTAMPTZ,

    precheck BOOLEAN,

    update_ts TIMESTAMPTZ

    )

    PARTITION BY RANGE (boarding_time);

    --create partitions

    --

    CREATE TABLE boarding_pass_may

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-05-01''::timestamptz)

    TO (''2023-06-01''::timestamptz) ;

    --

    CREATE TABLE boarding_pass_june

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-06-01''::timestamptz)

    TO (''2023-07-01''::timestamptz);

    --

    CREATE TABLE boarding_pass_july

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-07-01''::timestamptz)

    TO (''2023-08-01''::timestamptz);

    --

    CREATE TABLE boarding_pass_aug

    PARTITION OF boarding_pass_part

    FOR VALUES

    FROM (''2023-08-01''::timestamptz)

    TO (''2023-09-01''::timestamptz);

    --

    INSERT INTO boarding_pass_part SELECT * from boarding_pass;

    ```

