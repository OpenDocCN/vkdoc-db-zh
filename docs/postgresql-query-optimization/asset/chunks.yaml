  trans: '## 算法成本模型


    第 1 章提到了几种衡量系统性能的方法，包括响应时间、成本和用户满意度。这些指标是数据库外部的，尽管外部指标最有价值，但查询优化器无法直接获取它们。

    因此，优化器使用基于执行一个查询或计划中单个物理操作所需计算资源量的内部指标。最重要的资源是那些影响执行时间的资源，即 CPU 周期和 I/O 访问（读/写磁盘块）。其他资源，如内存或磁盘空间，对执行时间有间接影响；例如，可用内存量将影响
    CPU 周期与 I/O 访问的比率。内存的分配几乎总是由配置参数控制，并将在第 10 章中讨论。

    这两个主要指标——CPU 周期和 I/O 操作次数——不能直接比较。然而，为了比较查询执行计划，优化器必须将它们组合成一个单一的成本函数：成本越低，计划越好。几十年来，I/O
    操作次数一直是成本的主要组成部分，因为旋转硬盘比 CPU 慢几个数量级。对于现代硬件来说，情况不一定如此，因此优化器必须调整以使用正确的比率。这也通过服务器参数进行控制。

    物理操作的成本模型估计执行该操作所需的资源。在本书中，我们概述了简化的成本模型，这些模型易于理解，但对于理解更复杂的成本模型如何工作仍然有用。具体来说，我们将估算算法所需的资源量，即对于作为算法输入或输出的表，每行或每个块需要执行的底层操作数。例如，我们统计块访问的次数，但不区分访问是否实际需要
    I/O 操作。在我们的简化模型中，对一个块的访问就是一次访问，无论它是需要 I/O 还是该块已经存在于操作系统的缓冲池中。

    通常，成本取决于作为操作参数给出的表。为了表示成本模型，我们将使用以下符号的简单公式：对于任何表或关系`R`，`TR`和`BR`分别表示表中的行数和表占用的存储块数。其他符号将根据需要引入。

    以下部分讨论物理操作，概述每种操作的算法和成本模型。由于 CPU 和外部存储的相对速度可能在很大范围内变化，因此 CPU 成本和 I/O 成本被分开考虑。上一章讨论的两个逻辑操作——投影和过滤——不包括在内。它们通常与前面的操作结合使用，因为它们可以独立应用于单行，而不依赖于参数表中的其他行。

    当然，投影和过滤并非没有成本，其成本与处理的行数成正比。然而，在大多数情况下，这些成本可以忽略不计，因此我们不将这些成本纳入其他算法的成本模型中。


    ## 数据访问算法


    要开始执行查询，数据库引擎必须提取存储的数据。本节涉及用于从数据库对象读取数据的算法。实际上，这些操作通常与它们在查询执行计划中的后续操作结合使用。在可以避免读取随后将被过滤掉的数据以节省执行时间的情况下，这是有利的。

    此类操作的效率取决于保留在存储表中的行数与总行数的比例。这个比率称为*选择率*。给定读取操作的算法选择取决于可以同时应用的过滤器的选择率。


    ### 存储结构


    数据存储在硬盘上的文件中，这并不奇怪。任何用于数据库对象的文件都被划分为相同长度的块；默认情况下，PostgreSQL 使用每个 8192 字节的块。块是在硬盘和主内存之间传输的单位，执行任何数据访问所需的
    I/O 操作数等于正在读取或写入的块数。

    数据库对象由逻辑项（表行、索引记录等）组成。PostgreSQL 在块中为这些项分配空间。多个小项可以驻留在同一个块中；不适合单个块的项使用单独的存储机制。块的通用结构如图
    3-1 所示。


    ![](img/501585_2_En_3_Fig1_HTML.jpg)

    一个堆栈图，从上到下包括块头、指向逻辑项的指针、空闲空间、逻辑项和块尾。逻辑项包括表行和索引记录。来自指针的箭头指向逻辑项。

    图 3-1

    PostgreSQL 中的通用块结构

    项到块的分配也取决于数据库对象的类型。表行使用称为堆的数据结构存储：一行可以插入到任何有足够空闲空间的块中，无需任何特定的排序。其他对象（例如索引）可能以不同方式使用块。


    ### 全表扫描


    在全表扫描（有时称为顺序扫描）中，数据库引擎连续读取表中的所有行，并检查每一行的过滤条件。为了估算此算法的成本，我们需要更详细的描述，如代码清单 3-1 中的伪代码所示。


    ```

    FOR each block IN a_table LOOP

    read block;

    FOR each row IN block LOOP

    IF filter_condition (row)

    THEN output (row)

    END IF;

    END LOOP;

    END LOOP;

    代码清单 3-1

    全表扫描数据访问算法的伪代码

    ```

    I/O 访问次数为`BR`；内层循环的总迭代次数为`TR`。我们还需要估算生成输出的操作成本。此成本取决于选择率，表示为`S`，等于`S * TR`。将所有这些部分放在一起，我们可以估算全表扫描的成本为：


    ```

    c1 * BR + c2 * TR + c3 * S* TR

    ```

    其中常数`c1`、`c2`和`c3`代表硬件的特性。

    全表扫描可用于任何表；不需要额外的数据结构。其他算法依赖于表上存在的索引，将在下文描述。'
- fmt: '### Index-Based Table Access


    Note that until we got to physical operations, we did not even mention data access
    algorithms. We do not need to “read” relations—they are abstract objects. If we
    follow the idea that relations are mapped to tables, there is no other way to
    retrieve data than to read the whole table into the main memory. How else will
    we know which rows of data contain which values? But relational databases wouldn’t
    be such a powerful tool for data processing if we stopped there. All relational
    databases, including PostgreSQL, allow for building additional, redundant data
    structures, making data access dramatically faster than a simple sequential read.


    These additional structures are called indexes.


    How indexes are built will be covered later in this chapter; for now, we need
    to understand two facts about indexes. First, they are “redundant” database objects;
    they do not store any additional information that can’t be found in the source
    table itself.


    Second, indexes provide additional data access paths; they allow us to determine
    what values are stored in the rows of a table without actually reading the table—this
    is how index-based access works. And, as mentioned previously, this happens entirely
    invisibly to the application.


    If a filtering condition (or conditions) is encapsulated by an index on a table,
    the index can be used to access data from that table.


    To get a table row from a pointer, the block containing this row must be read.
    The underlying data structure of a table is a `heap`, that is, rows are stored
    unordered. Their order is not guaranteed, nor does it correspond to properties
    of the data. Depending on the index selectivity, PostgreSQL utilizes one of two
    methods. The first is an `index scan`; the second depends on a `bitmap index scan`,
    followed by a `bitmap heap scan`.


    An index entry includes addresses of the records that match the indexed value;
    this address contains the block address and the offset of the record within the
    block. In an `index scan`, the database engine reads each entry of the index that
    satisfies the filter condition and retrieves blocks in index order. Because the
    underlying table is a `heap`, multiple index entries might point to the same block.
    If an index has a low selectivity, these situations are rare, and there are high
    chances that no block will be read (or rather attempted to read) more than once.
    However, the situation is different when the selectivity is high or multiple indexes
    are used or the filtering condition differs from equal. In these cases, a `bitmap
    index scan` will be used. This method builds a `heap` bitmap in memory. The whole
    bitmap is a single bit array, with as many bits as there are `heap` blocks in
    the table being scanned.


    Each index used to satisfy a selection criterion is used sequentially. To perform
    a `bitmap index scan`, first, a bitmap is created with all entries initially set
    to 0 (false). Whenever an index entry that matches the search condition is found,
    the bit corresponding to the `heap` block indicated by the index entry is set
    to 1 (true). The second and any additional `bitmap index scan` do the same thing
    with the indexes corresponding to the additional search conditions. Once all bitmaps
    have been created, the engine performs a bitwise logical `AND` operation to find
    which blocks contain requested values for all selection criteria, producing a
    final candidate list. This means that blocks that satisfy only one of the two
    criteria in a logical `AND` never have to be accessed. An illustration is shown
    in Figure 3-2.


    ![Figure 3-2: Using bitmaps for table access through multiple indexes. A table
    has 16 columns and 4 rows. The row headers are block hash, index 1, index 2, and
    logical AND. The column headers are numbers from 1 to 16. The entries of index
    1 and index 2 are 0s and 1s. The AND operation is performed, and the results are
    entered in the last row.](Images/501585_2_En_3_Fig2_HTML.jpg)


    After the final candidate list is computed, the candidate blocks are read sequentially
    using a `bitmap heap scan` (a `heap` scan based on a bitmap), and for each block,
    the individual records are examined to recheck the search conditions. Note that
    requested values may reside in different rows in the same block. The bitmap ensures
    that relevant rows will not be missed, but does not guarantee that all scanned
    blocks contain a relevant row. This explanation elides some implementation details
    for the sake of brevity and clarity. The actual implementation is more sophisticated
    and handles various edge cases.


    The cost model of index-based access is much more complex than a full scan. Informally,
    it can be described this way: For small values of selectivity, rows satisfying
    the filtering conditions will most likely be located in different blocks and,
    consequently, the cost is proportional to the number of result rows. For larger
    values of selectivity, the number of processed blocks approaches the total number
    of blocks. In the latter case, the cost becomes higher than the cost of a full
    scan because resources are needed to access the index.


    ### Index-Only Scan


    Data access operations do not necessarily return entire rows. If some columns
    are not needed for the query, these columns can be skipped as soon as a row passes
    filtering conditions (if any). More formally, this means that the logical project
    operation is combined with data access. This combination is especially useful
    if an index used for filtering contains every column needed for the query.


    In this algorithm, data is read from the index and any remaining filtering conditions
    are applied, if necessary. Usually there is no need to access table data, but
    sometimes additional checks are needed—this will be discussed in detail in Chapter
    5.


    The cost model for an `index-only scan` is similar to the model for index-based
    table access except that there’s no need to actually access table data. For small
    values of selectivity, the cost is approximately proportional to the number of
    returned rows. For large values of selectivity, the algorithm performs an (almost)
    full scan of the index. The cost of an index scan is usually lower than the cost
    of a full table scan because it contains less data.'
