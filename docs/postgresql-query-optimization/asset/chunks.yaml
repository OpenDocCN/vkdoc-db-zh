    图 5-7：代码清单 5-8 中查询的执行计划


    ## 索引与 `like` 操作符


    另一组并非直接比较列值与常量的搜索条件是使用 `like` 操作符的搜索。例如，查询：


    ```sql

    SELECT * FROM account

