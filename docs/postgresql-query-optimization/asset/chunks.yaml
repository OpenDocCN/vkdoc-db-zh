  trans: '

    ## 函数与类型依赖性


    第 7 章在讨论视图和物化视图时提到了依赖性。对于物化视图，如果不先删除该对象，就无法更改其定义。这反过来意味着所有依赖对象都必须被删除并重新创建，即使物化视图的名称和列数没有改变。如果这些依赖对象又被用于其他视图或物化视图，那么它们的依赖对象也必须被删除。


    这可能导致一些极其不希望看到的后果。我们在生产系统中观察到这样的情况：一次改动导致超过 60 个依赖对象被级联删除，并且必须按照特定顺序重新构建。


    幸运的是，函数没有这个问题。由于函数体中的 SQL 语句在创建函数时不会被解析，因此不存在对函数体中使用的表、视图、物化视图、其他函数或存储过程的依赖。因此，函数只需要在实际需要变更时才重新创建，而不是仅仅因为级联删除。


    然而，函数引入了一种新的依赖类型：函数依赖于其返回的类型，包括用户定义类型。与物化视图类似，用户定义的数据类型如果不先删除，就无法修改。要删除一个类型，所有将其作为元素的其他用户定义类型以及所有依赖该类型的所有函数都必须被删除。这听起来可能是个更糟糕的问题，但实际上，这恰恰是正确的问题。如果修改了一个用户定义类型，那么它的一些元素必定被添加、移除或更改了。这反过来意味着返回该类型记录的
    `SELECT` 语句必须被修订，因此函数应该被删除。


    此外，与创建物化视图可能需要一些时间不同，创建函数几乎是瞬间完成的。


    ## 使用函数进行数据操作


    到目前为止，本章只考虑了选择数据的函数。但 PL/pgSQL 函数允许使用任何 SQL 命令，包括 DML 函数。


    清单 12-22 是一个为乘客签发新登机牌的函数。


    ```sql

    CREATE OR REPLACE FUNCTION issue_boarding_pass(

    p_booking_leg_id int,

    p_passenger_id int,

    p_seat text,

    p_boarding_time timestamptz)

    RETURNS SETOF boarding_pass_record

    AS

    $body$

    DECLARE

    v_pass_id int;

    BEGIN

    INSERT INTO boarding_pass

    (passenger_id,

    booking_leg_id,

    seat,

    boarding_time,

    update_ts)

    VALUES (

    p_passenger_id,

    p_booking_leg_id,

    p_seat,

    p_boarding_time,

    now()) RETURNING pass_id INTO v_pass_id;

    RETURN QUERY

    SELECT  * FROM boarding_passes_pass(v_pass_id);

    END;

    $body$

    LANGUAGE plpgsql;

    Listing 12-22

    创建一个新的登机牌

    ```


    请注意此函数体中对函数 `boarding_passes_pass` 的调用。这个函数是之前创建的，但即使它不存在，`CREATE FUNCTION` 操作符也不会报错，直到这个函数被执行。这种行为有利有弊。它在开发过程中提供了更大的灵活性，但也可能带来问题，因为被嵌入的函数已被移除或无法正常工作这一事实可能未被察觉。执行此函数与其他函数相同：


    ```sql

    SELECT * FROM issue_boarding_pass(175820,462972, ''22C'', ''2023-06-16 21:45''::timestamptz)

    ```


    请注意，这次执行没有太大意义，因为航班已经在过去起飞了，此处仅用于说明目的。图 12-5 展示了这次执行的结果——数据格式与其他返回登机牌的函数相同。


    ![](img/501585_2_En_12_Fig5_HTML.jpg)


    一张截图展示了已签发登机牌的结果数据库。它列出了 10 列和 1 行数据。列标题为序列号、登机牌和预订段 I D、航班号、出发和到达机场、姓氏、名字、座位和登机时间。


    图 12-5


    返回用户定义类型的 DML 函数


    创建此函数时，我们做了一些在现实生活中不一定成立的假设。例如，该函数不检查该乘客和该航班是否已经签发了登机牌，不检查座位图中的座位可用性，并且不捕获 `INSERT`
    时可能出现的错误。在生产环境中，这个函数会复杂得多。


    ## 函数与安全


    在本书中，我们不涉及 PostgreSQL 中的数据访问控制/权限，主要是因为这个主题与性能无关。不过，我们将稍微介绍一下如何为 PostgreSQL 函数设置安全，以及函数安全设置与性能之间一个令人惊讶的联系。


    之前未涉及的 `CREATE FUNCTION` 操作符中的一个参数是 `SECURITY`。该参数只有两个允许的值：`INVOKER` 和 `DEFINER`。前者是默认值；它表示函数将使用调用该函数的用户的权限集来执行。这意味着，为了能够执行函数，用户应该对函数体中使用的所有数据库对象拥有相关的访问权限。如果我们明确指定
    `SECURITY DEFINER`，函数将使用创建该函数的用户的权限执行。请注意，与其他数据库对象权限不同，任何函数的执行权限默认授予 `PUBLIC`。


    你们中的许多人（以及我们，本书作者）都遇到过这样的情况：一个有影响力的业务用户需要访问一些关键数据，但你不想给他们 `READ ALL` 访问权限，因为你对他们的
    SQL 技能以及他们的查询是否会导致整个系统崩溃不完全确定。


    在这种情况下，一个折衷方案可能是——你创建一个函数，使用一个高性能的查询来提取所有必要的数据，用 `SECURITY DEFINER` 参数创建这个函数，从所有人（从
    `PUBLIC`）那里撤消执行权限，然后给这个有影响力的用户执行权限。操作步骤如清单 12-23 所示。


    ```sql

    CREATE FUNCTION critical_function (par1 ...)

    RETURNING SETOF...

    AS $FUNC$

    ...

    END:

    $FUNC$

    LANGUAGE plpgsql

    SECURITY DEFINER;

    --

    REVOKE EXECUTE ON critical_function (par1 ...)

    FROM public;

    GRANT EXECUTE ON critical_function (par1 ...)

    TO powerbusinessuser;

    Listing 12-23

    SECURITY DEFINER 函数的使用

    ```

    '
- fmt: '## What About Business Logic?


    In cases when you can convince your application developers to use functions to
    communicate with the database, the performance gains are dramatic. The sheer fact
    of eliminating multiple roundtrips can easily improve application performance
    tens or even hundreds of times, when we measure the application response time
    rather than the database response time.


    One of the most serious blockers on this road to success is the concept of `business
    logic`. One of the definitions (from [Investopedia.com](http://investopedia.com))
    reads like this:


    > `Business logic` is the custom rules or algorithms that handle the exchange
    of information between a database and user interface. Business logic is essentially
    the part of a computer program that contains the information (in the form of business
    rules) that defines or constrains how a business operates.


    Business logic is often considered a separate application layer, and when we put
    “too much logic” into database functions, it makes application developers unhappy.
    We spent a considerable amount of time trying to find common ground with business
    and application developers alike. The result of these discussions can be summarized
    as follows:


    *   We need some business logic to execute joins and selects.

    *   Selected result transformations and manipulations do not have to be executed
    on the database side.


    In practice, this means that when deciding what can go to the database and what
    has to stay in the application, a decisive factor is whether bringing the dependencies
    into the database would improve performance (facilitate joins or enable the use
    of indexes). If so, the logic is moved into a function and considered “database
    logic”; otherwise, data is returned to the application for further processing
    of business logic.


    For example, for the airline reservation application, a function can be created
    to return available trips, that is, potential bookings. The parameters of this
    function include the departure city, the destination, the trip start date, and
    the return date. To be able to retrieve all possible trips efficiently, the function
    needs to know how the tables `airport` and `flight` can be joined and how to calculate
    the duration of the flight. All this information belongs to database logic.


    However, we do not want the function to make a final decision regarding which
    trip to select. Final selection criteria may vary and are processed by the application;
    they belong to business logic.


    Applying this criterion consistently can be quickly incorporated into the regular
    development cycle and encourages developing applications “right right away.”


    ## Functions in OLAP Systems


    By this time, we hope that we convinced you that using PostgreSQL functions in
    OLTP systems is beneficial. What about OLAP?


    Unless you’ve tried it, you might not know that many reporting tools, including
    Cognos, Business Objects, and Looker, can present the results of a function. In
    fact, executing a function that returns a set of records is similar to performing
    `SELECT * FROM <some table>`.


    However, the fact that software can do something doesn’t means that it should.
    So when should you use functions in an OLAP environment?


    ### Parameterizing


    A view or materialized view can’t be parameterized. This might not pose any problem
    if we want to run a report for the most recent date, for yesterday, for last week,
    and so on, because we can utilize such internal functions as `CURRENT_DATE` or
    `CURRENT_TIMESTEMP`, but if we need to rerun any report for any of the past time
    intervals, it won’t be an easy task without making some changes to the view. For
    example, we might have a view


    ```sql

    CREATE VIEW recent_flights_v AS

    SELECT flight_id,

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight

    WHERE scheduled_departure BETWEEN CURRENT_DATE-7

    AND CURRENT_DATE

    ```


    If you need to run the same query for a different date interval, you will need
    to create another view (or recreate the existing view). But if this SELECT is
    packaged into the function


    ```sql

    CREATE OR REPLACE FUNCTION recent_flights(p_date date)

    RETURNS SETTOF recent_flights_record AS

    $BODY$

    BEGIN

    RETURN QUERY

    SELECT flight_id,

    departure_airport,

    arrival_airport,

    scheduled_departure

    FROM flight

    WHERE scheduled_departure BETWEEN p_date-7

    AND p_date;

    END; $BODY$;

    ```


    …you can simply execute it with different parameters:


    ```sql

    SELECT * FROM recent_flights(CURRENT_DAY)

    SELECT * FROM recent_flights(‘2023-08-01’)

    ```


    ### No Explicit Dependency on Tables and Views


    If a report is executed as a call to a function, it can be optimized without the
    necessity to drop and recreate it. Moreover, the underlying tables can be modified,
    or we can end up using completely different tables, all invisible to the end user.


    ### Ability to Execute Dynamic SQL


    Functions allow building SQL statements based on the values of parameters. The
    SQL language does not have an option of building the statement on the fly and
    then executing it. You can build the SQL statement in the application and then
    send it to the database to execute, or you can build it inside the `plpgsql` function.
    This is another exceptionally powerful feature of PostgreSQL, which is often underused
    and which is discussed in more detail in Chapter [13](#501585_2_En_13_Chapter.xhtml).


    ## Stored Procedures


    In contrast to other DBMSs, PostgreSQL didn’t have stored procedures for some
    time, much to the disappointment of early adopters coming from commercial systems.
    As for us, your authors, we were especially frustrated with the atomic nature
    of functions, which does not allow any transaction management, including committing
    of intermediate results.


    ### Functions with No Results


    For a while, PostgreSQL developers had no option rather than to use functions
    in place of store procedures. You could do it using functions that return `VOID`,
    like


    ```sql

    CREATE OR REPLACE function cancel_flight (p_filght_id int) RETURNS VOID AS

    ```


    Also, there is an alternative way to execute functions when calling them from
    another function or procedure:


    ```sql

    PERFORM issue_boarding_pass(175820,462972, ''22C'', ''2020-06-16 21:45''::timestamptz)

    ```


    The preceding way will execute the function and create a boarding pass, but it
    won’t return the result.


    ### Functions and Stored Procedures


    The difference between functions and stored procedures is that procedures do not
    return any values; thereby, we do not specify a return type. Listing [12-24](#501585_2_En_12_Chapter.xhtml#PC50)
    presents the `CREATE PROCEDURE` command, which is very similar to the `CREATE
    FUNCTION` command.


    ```sql

    CREATE PROCEDURE procedure_name (par_name1 par_type1, ...)

    AS


    LANGUAGE procedure language;

    ```

    Listing 12-24

    `CREATE PROCEDURE` command


    The syntax of the procedure body is the same as that of the function, except there
    is not a need for a `RETURN` type. Also, all the preceding sections on function
    internals apply to stored procedures, as well. To execute a stored procedure,
    the `CALL` command is used:


    ```sql

    CALL cancel_flight(13);

    ```'
