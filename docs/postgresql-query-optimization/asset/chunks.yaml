    It is worth mentioning that we can build completely different transfer objects
    using the same set of tables. For example, before any flight departs, a document
    that is called manifest has to be produced. This document lists all the passengers
    on the fight along with their seat assignments. The transfer object for the manifest
    is presented in Figure [14-6](#501585_2_En_14_Chapter.xhtml#Fig6).


