- fmt: "### Covering Indexes\n\nCovering indexes were first introduced in PostgreSQL\
    \ 11. These indexes can be viewed as a continuation of efforts to support the\
    \ index-only-scan access method. A `covering index` is specifically designed to\
    \ include the columns needed by a particular type of query that you run frequently.\n\
    \nIn the previous section, the column `scheduled_arrival` was added to the index\
    \ solely to avoid an extra trip to the table. It was not intended to be used as\
    \ search criteria. In this case, a covering index can be used instead:\n\n```sql\n\
    CREATE INDEX flight_depart_arr_sched_dep_inc_sched_arr\n   ON flight\n(departure_airport,\n\
    arrival_airport,\nscheduled_departure)\nINCLUDE (scheduled_arrival);\n```\n\n\
    The execution plan for the query\n\n```sql\nSELECT\ndeparture_airport,\nscheduled_departure,\n\
    scheduled_arrival\nFROM flight\nWHERE arrival_airport='JFK' AND departure_airport='ORD'\n\
    AND scheduled_departure BETWEEN '2023-07-03' AND '2023-07-04'\n```\n\nwill look\
    \ like the one shown in Figure [5-16](#501585_2_En_5_Chapter.xhtml#Fig16).\n\n\
    ![](Images/501585_2_En_5_Fig16_HTML.jpg)\n\nA query plan comprises 2 lines of\
    \ text. The first line denotes the index-only scan using flight departure, arrival,\
    \ scheduled departure, and scheduled arrival. The second line includes the index\
    \ condition.\n\nFigure 5-16\nA plan with an index-only scan of a covering index\n\
    \nIn cases like this one, there is not much difference between including an extra\
    \ column in the index vs. creating a covering index. However, if more (or wider)\
    \ columns need to be stored together with the indexed values, a covering index\
    \ will likely be more compact.\n\n### Excessive Selection Criteria\n\nSometimes,\
    \ when filtering logic is complex and involves attributes from multiple tables,\
    \ it is necessary to provide additional, redundant filters to prompt the database\
    \ engine to use specific indexes or reduce the size of join arguments. This practice\
    \ is called using excessive selection criteria. The intent is to use this additional\
    \ filter to preselect a small subset of records from a large table.\n\nFor some\
    \ of these complex criteria, PostgreSQL is able to perform a query rewrite automatically.\n\
    \nFor example, the filtering conditions in the query in Listing [5-10](#501585_2_En_5_Chapter.xhtml#PC40)\
    \ combine values of attributes from the tables `flight` and `passenger`. In earlier\
    \ versions of PostgreSQL, the engine could not start filtering prior to joining\
    \ all the tables, because the AND is applied to the columns of different tables.\n\
    \n```sql\nSELECT\nlast_name,\nfirst_name,\nseat\nFROM boarding_pass bp\nJOIN booking_leg\
    \ bl USING (booking_leg_id)\nJOIN flight f USING (flight_id)\nJOIN booking b USING(booking_id)\n\
    JOIN passenger p USING (passenger_id)\nWHERE\n(departure_airport='JFK'\nAND scheduled_departure\
    \ BETWEEN\n'2023-07-10' AND '2023-07-11'\nAND last_name ='JOHNSON')\nOR\n(departure_airport='EDW'\n\
    AND scheduled_departure BETWEEN '2023-07-13' AND '2023-07-14'\nAND last_name ='JOHNSTON')\n\
    ```\nListing 5-10\nQuery with conditions on two tables\n\nHowever, now the optimizer\
    \ can perform a complex query rewrite, as shown in Figure [5-17](#501585_2_En_5_Chapter.xhtml#Fig17).\n\
    \n![](Images/501585_2_En_5_Fig17_HTML.jpg)\n\nA query plan comprises 24 lines\
    \ of text. It denotes the Nested loop, joined filter, bitmap heap scan on flight,\
    \ scheduled arrival, scheduled departure, airport arrival, airport departure,\
    \ index conditions, and other details.\n\nFigure 5-17\nExecution plan with conditions\
    \ on two tables with query rewrite\n\nNote the lines from 8 to 15. PostgreSQL\
    \ rewrites the logical expression and selects all records from the table `flight`\
    \ that may be needed for both conditions connected with OR.\n\nIn cases like this,\
    \ the only thing to do is to let PostgreSQL do its job.\n\nHowever, there are\
    \ some queries that will run forever without human intervention. Let’s look at\
    \ the query in Listing [5-11](#501585_2_En_5_Chapter.xhtml#PC41). This query looks\
    \ for flights that were more than one hour delayed (of which there should not\
    \ be many). For all of these delayed flights, the query selects boarding passes\
    \ issued after the scheduled departure.\n\n```sql\nSELECT\nbp.update_ts AS boarding_pass_issued,\n\
    scheduled_departure,\nactual_departure,\nstatus\nFROM flight f\nJOIN booking_leg\
    \ bl USING (flight_id)\nJOIN boarding_pass bp USING (booking_leg_id)\nWHERE bp.update_ts\
    \ > scheduled_departure + interval '30 minutes'\nAND f.update_ts >=scheduled_departure\
    \ -interval '1 hour'\n```\nListing 5-11\nShort query with hard-to-optimize filtering\n\
    \nThis might seem like a contrived example, but it is modeled on production exception\
    \ reports. Many companies have some sort of exception reporting in place to identify\
    \ the abnormal system behavior. Crucially, by definition, the output of execution\
    \ reports should be small. Exception reports, to be useful, should report on conditions\
    \ that occur relatively rarely—otherwise, they would just be reports on business\
    \ as usual.\n\nThe described situation certainly sounds abnormal, and there should\
    \ not be many cases like this. However, the execution plan in Figure [5-18](#501585_2_En_5_Chapter.xhtml#Fig18)\
    \ has full scans of large tables and hash joins, even though all the appropriate\
    \ indexes on all the tables involved exist.\n\n![](Images/501585_2_En_5_Fig18_HTML.jpg)\n\
    \nA query plan comprises 11 lines of text. They include the hash joins, hash conditions,\
    \ join filter, sequential scan on the boarding pass, and sequential scan on the\
    \ flight.\n\nFigure 5-18\nSuboptimal execution plan for a short query\n\nSo what\
    \ went wrong?"
  raw: '### Covering Indexes


    Covering indexes were first introduced in PostgreSQL 11\. These indexes can be
    viewed as a continuation of efforts to support the index-only-scan access method.
    A *covering index* is specifically designed to include the columns needed by a
    particular type of query that you run frequently.


    In the previous section, the column `scheduled_arrival` was added to the index
    solely to avoid an extra trip to the table. It was not intended to be used as
    search criteria. In this case, a covering index can be used instead:


    ```

    CREATE INDEX flight_depart_arr_sched_dep_inc_sched_arr   ON flight

    (departure_airport,

    arrival_airport,

    scheduled_departure)

    INCLUDE (scheduled_arrival);

    ```


    The execution plan for the query


    ```

    SELECT

    departure_airport,

    scheduled_departure ,

    scheduled_arrival

    FROM flight

    WHERE arrival_airport=''JFK'' AND departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-03'' AND ''2023-07-04''

    ```


    will look like the one shown in Figure [5-16](#501585_2_En_5_Chapter.xhtml#Fig16).


    ![](Images/501585_2_En_5_Fig16_HTML.jpg)


    A query plan comprises 2 lines of text. The first line denotes the index-only
    scan using flight departure, arrival, scheduled departure, and scheduled arrival.
    The second line includes the index condition.


    Figure 5-16


    A plan with an index-only scan of a covering index


    In cases like this one, there is not much difference between including an extra
    column in the index vs. creating a covering index. However, if more (or wider)
    columns need to be stored together with the indexed values, a covering index will
    likely be more compact.


    ## Excessive Selection Criteria


    Sometimes, when filtering logic is complex and involves attributes from multiple
    tables, it is necessary to provide additional, redundant filters to prompt the
    database engine to use specific indexes or reduce the size of join arguments.
    This practice is called using excessive selection criteria. The intent is to use
    this additional filter to preselect a small subset of records from a large table.


    For some of these complex criteria, PostgreSQL is able to perform a query rewrite
    automatically.


    For example, the filtering conditions in the query in Listing [5-10](#501585_2_En_5_Chapter.xhtml#PC40)
    combine values of attributes from the tables `flight` and `passenger`. In earlier
    versions of PostgreSQL, the engine could not start filtering prior to joining
    all the tables, because the AND is applied to the columns of different tables.


    ```

    SELECT

    last_name,

    first_name,

    seat

    FROM boarding_pass bp

    JOIN booking_leg bl USING (booking_leg_id)

    JOIN flight f USING (flight_id)

    JOIN booking b USING(booking_id)

    JOIN passenger p USING (passenger_id)

    WHERE

    (departure_airport=''JFK''

    AND scheduled_departure BETWEEN

    ''2023-07-10'' AND ''2023-07-11''

    AND last_name =''JOHNSON'')

    OR

    (departure_airport=''EDW''

    AND scheduled_departure BETWEEN ''2023-07-13'' AND ''2023-07-14''

    AND last_name =''JOHNSTON'')

    Listing 5-10

    Query with conditions on two tables

    ```


    However, now the optimizer can perform a complex query rewrite, as shown in Figure
    [5-17](#501585_2_En_5_Chapter.xhtml#Fig17).


    ![](Images/501585_2_En_5_Fig17_HTML.jpg)


    A query plan comprises 24 lines of text. It denotes the Nested loop, joined filter,
    bitmap heap scan on flight, scheduled arrival, scheduled departure, airport arrival,
    airport departure, index conditions, and other details.


    Figure 5-17


    Execution plan with conditions on two tables with query rewrite


    Note the lines from 8 to 15\. PostgreSQL rewrites the logical expression and selects
    all records from the table `flight` that may be needed for both conditions connected
    with OR.


    In cases like this, the only thing to do is to let PostgreSQL do its job.


    However, there are some queries that will run forever without human intervention.
    Let’s look at the query in Listing [5-11](#501585_2_En_5_Chapter.xhtml#PC41).
    This query looks for flights that were more than one hour delayed (of which there
    should not be many). For all of these delayed flights, the query selects boarding
    passes issued after the scheduled departure.


    ```

    SELECT

    bp.update_ts AS boarding_pass_issued,

    scheduled_departure,

    actual_departure,

    status

    FROM flight f

    JOIN booking_leg bl USING (flight_id)

    JOIN boarding_pass bp USING (booking_leg_id)

    WHERE bp.update_ts > scheduled_departure + interval ''30 minutes''

    AND f.update_ts >=scheduled_departure -interval ''1 hour''

    Listing 5-11

    Short query with hard-to-optimize filtering

    ```


    This might seem like a contrived example, but it is modeled on production exception
    reports. Many companies have some sort of exception reporting in place to identify
    the abnormal system behavior. Crucially, by definition, the output of execution
    reports should be small. Exception reports, to be useful, should report on conditions
    that occur relatively rarely—otherwise, they would just be reports on business
    as usual.


    The described situation certainly sounds abnormal, and there should not be many
    cases like this. However, the execution plan in Figure [5-18](#501585_2_En_5_Chapter.xhtml#Fig18)
    has full scans of large tables and hash joins, even though all the appropriate
    indexes on all the tables involved exist.


    ![](Images/501585_2_En_5_Fig18_HTML.jpg)


    A query plan comprises 11 lines of text. They include the hash joins, hash conditions,
    join filter, sequential scan on the boarding pass, and sequential scan on the
    flight.


    Figure 5-18


    Suboptimal execution plan for a short query


    So what went wrong?'
  trans: "\n### 覆盖索引\n\n覆盖索引最早在 PostgreSQL 11 中引入。这些索引可以被视为对支持“仅索引扫描”访问方法的持续努力的延续。一个`覆盖索引`是专门设计用来包含你频繁运行的特定类型查询所需的列。\n\
    \n在上一节中，将 `scheduled_arrival` 列添加到索引中，仅仅是为了避免额外回表查询。它并不打算用作搜索条件。在这种情况下，可以改用覆盖索引：\n\
    \n```sql\nCREATE INDEX flight_depart_arr_sched_dep_inc_sched_arr\n   ON flight\n\
    (departure_airport,\narrival_airport,\nscheduled_departure)\nINCLUDE (scheduled_arrival);\n\
    ```\n\n对于查询\n\n```sql\nSELECT\ndeparture_airport,\nscheduled_departure,\nscheduled_arrival\n\
    FROM flight\nWHERE arrival_airport='JFK' AND departure_airport='ORD'\nAND scheduled_departure\
    \ BETWEEN '2023-07-03' AND '2023-07-04'\n```\n\n的执行计划将如图 5-16 所示。\n\n![](img/501585_2_En_5_Fig16_HTML.jpg)\n\
    \n一个查询计划由 2 行文本组成。第一行表示使用 `flight_departure, arrival, scheduled_departure, and\
    \ scheduled_arrival` 的仅索引扫描。第二行包含了索引条件。\n\n图 5-16\n使用覆盖索引进行仅索引扫描的计划\n\n在这种情况下，在索引中包含一个额外的列与创建一个覆盖索引区别不大。但是，如果需要将更多（或更宽的）列与索引值一起存储，覆盖索引可能会更紧凑。\n\
    \n### 过度选择条件\n\n有时，当过滤逻辑复杂且涉及多个表的属性时，有必要提供额外的、冗余的过滤条件，以促使数据库引擎使用特定的索引或减少连接参数的大小。这种做法被称为使用过度选择条件。其目的是使用这个额外的过滤器从大表中预选出一个小的记录子集。\n\
    \n对于其中一些复杂的条件，PostgreSQL 能够自动执行查询重写。\n\n例如，代码清单 5-10 中的查询的过滤条件结合了表 `flight` 和\
    \ `passenger` 的属性值。在早期版本的 PostgreSQL 中，引擎无法在连接所有表之前开始过滤，因为 AND 条件应用于不同表的列。\n\n\
    ```sql\nSELECT\nlast_name,\nfirst_name,\nseat\nFROM boarding_pass bp\nJOIN booking_leg\
    \ bl USING (booking_leg_id)\nJOIN flight f USING (flight_id)\nJOIN booking b USING(booking_id)\n\
    JOIN passenger p USING (passenger_id)\nWHERE\n(departure_airport='JFK'\nAND scheduled_departure\
    \ BETWEEN\n'2023-07-10' AND '2023-07-11'\nAND last_name ='JOHNSON')\nOR\n(departure_airport='EDW'\n\
    AND scheduled_departure BETWEEN '2023-07-13' AND '2023-07-14'\nAND last_name ='JOHNSTON')\n\
    ```\n代码清单 5-10\n涉及两个表条件的查询\n\n然而，现在优化器可以执行复杂的查询重写，如图 5-17 所示。\n\n![](img/501585_2_En_5_Fig17_HTML.jpg)\n\
    \n一个查询计划由 24 行文本组成。它标示了嵌套循环、连接过滤、对 flight 表的位图堆扫描、scheduled_arrival、scheduled_departure、arrival_airport、departure_airport、索引条件以及其他细节。\n\
    \n图 5-17\n涉及两个表条件并带有查询重写的执行计划\n\n注意第 8 到 15 行。PostgreSQL 重写了逻辑表达式，并选择了 `flight`\
    \ 表中可能同时满足由 OR 连接的两个条件的所有记录。\n\n在这种情况下，唯一能做的就是让 PostgreSQL 自行处理。\n\n然而，有些查询如果没有人工干预，可能会永远运行下去。让我们看看代码清单\
    \ 5-11 中的查询。这个查询寻找延误超过一小时的航班（这种航班应该不多）。对于所有这些延误的航班，查询选择在计划起飞时间之后签发的登机牌。\n\n```sql\n\
    SELECT\nbp.update_ts AS boarding_pass_issued,\nscheduled_departure,\nactual_departure,\n\
    status\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN boarding_pass\
    \ bp USING (booking_leg_id)\nWHERE bp.update_ts > scheduled_departure + interval\
    \ '30 minutes'\nAND f.update_ts >=scheduled_departure -interval '1 hour'\n```\n\
    代码清单 5-11\n带有难以优化的过滤条件的简短查询\n\n这看起来可能是一个刻意设计的例子，但它是基于生产环境中的异常报告建模的。许多公司都有某种异常报告机制来识别异常的系统行为。关键的是，根据定义，执行报告的输出应该很小。异常报告要有用，就应该报告相对罕见的情况——否则，它们就只是常规业务报告了。\n\
    \n所描述的情况听起来肯定不正常，而且应该没有很多这样的案例。然而，图 5-18 中的执行计划包含了大型表的全表扫描和哈希连接，即使所有涉及的表上都存在合适的索引。\n\
    \n![](img/501585_2_En_5_Fig18_HTML.jpg)\n\n一个查询计划由 11 行文本组成。它们包括哈希连接、哈希条件、连接过滤器、对\
    \ boarding_pass 表的顺序扫描以及对 flight 表的顺序扫描。\n\n图 5-18\n一个简短查询的次优执行计划\n\n那么，问题出在哪里呢？\n"
- fmt: '# Let’s go back to the definition of a short query


    It seemed very clear in the beginning, but now it becomes a bit trickier. Recall
    that a query is short if it needs a small number of rows to compute results. Indeed,
    in this case, the number of rows we need is small, but there is no easy way to
    find them. So here is the caveat: it is not just that a short query requires a
    small number of rows, but also that the number of rows in the result of any intermediate
    operation should also be small. If a query with three joins is short and, after
    executing the first of the joins, the intermediate result is huge, it means that
    something is wrong with the execution plan.


    As previously discussed, the only way to read a small number of rows from a table
    is to use an index. However, we do not have any indexes that would support the
    filtering conditions in the query from Listing [5-11](#501585_2_En_5_Chapter.xhtml#PC41).
    Moreover, it is not possible to build such an index, because selection criteria
    from one table depend on values from another table. In this case, there is no
    way to make a selection before joining, which results in full scans and hash joins.


    ## How can this query be improved?


    The answer to this question is not directly related to SQL. Chapter [1](#501585_2_En_1_Chapter.xhtml)
    stated that database optimization starts from gathering requirements, and this
    is a case where gathering precise requirements is the best path toward optimization.


    Notice that, in the original query, the search space is all the flights since
    the dawn of time—or at least, for the entire time period captured by the database.
    However, this is an exception report, which most likely is reviewed on a regular
    cadence, and, likely, the business owner of this report is interested in recent
    cases since the last review. Earlier exceptions would have already appeared in
    previous reports and hopefully have been addressed. The next step would be to
    connect with the business owner of this report and ask whether a report including
    only the most recent exceptions suits their needs.


    If the answer is `yes`, the excessive selection criterion we just got from business
    can be applied to the query. Also, we need one more index:


    ```

    CREATE INDEX boarding_pass_update_ts ON postgres_air.boarding_pass  (update_ts);

    ```


    Listing [5-12](#501585_2_En_5_Chapter.xhtml#PC43) shows the modified query, retaining
    two days of exceptions.


    ```

    SELECT

    bp.update_ts AS boarding_pass_issued,

    scheduled_departure,

    actual_departure,

    status

    FROM flight f

    JOIN booking_leg bl USING (flight_id)

    JOIN boarding_pass bp USING (booking_leg_id)

    WHERE bp.update_ts > scheduled_departure + interval ''30 minutes''

    AND f.update_ts >=scheduled_departure -interval ''1 hour'';

    AND bp.update_ts >=''2023-08-13'' AND bp.update_ts< ''2023-08-14'';

    Listing 5-12

    Query with added excessive selection criteria

    ```


    Now, the search by timestamps will be applied first, as seen in the execution
    plan in Figure [5-19](#501585_2_En_5_Chapter.xhtml#Fig19).


    ![](Images/501585_2_En_5_Fig19_HTML.jpg)


    A query plan comprises 15 lines. They include the nested loop, joined filter,
    bitmap heap scan on the boarding pass, recheck condition, cache key, cache mode,
    and other sets of data.


    Figure 5-19


    Execution plan with excessive selection criteria


    The execution time for this query is less than 200 milliseconds, while the execution
    time for the original query was 2 minutes and 44 seconds.


    A `Memoize` node (lines 8–10) will appear in the execution plan if you run PostgreSQL
    version 14 or higher and have a configuration parameter `enable_memoize` on. Memoized
    plans allow caching results from parameterized scans inside nested loop joins.
    This does not change the index-based access utilized in this plan.


    ## Partial Indexes


    Partial indexes are among the best features of PostgreSQL. As implied by the name,
    a partial index is built on a subset of a table, defined by the `WHERE` clause
    of the `CREATE INDEX` operator.


    For example, for flights scheduled in the future, the `actual_departure` column
    is null. To improve search by `actual_departure`, we can create an index for only
    flights with a non-null actual departure value:


    ```

    CREATE INDEX flight_actual_departure_not_null

    ON flight(actual_departure)

    WHERE actual_departure IS NOT NULL

    ```


    In this particular case, the difference in execution time won’t be dramatic, because
    the `flight` table is not very large and, in the current distribution, only half
    of the flights have a null actual departure. However, if the values in a column
    are distributed unevenly, using a partial index can provide a great advantage.


    For example, the column `status` in the `flight` table has only three possible
    values: “On schedule,” “Delayed,” and “Canceled.” These values are unevenly distributed;
    there are significantly more flights with status “On schedule” than the other
    two. Creating an index on the column status would be impractical due to the very
    high selectivity of this column. However, it would be nice to be able to quickly
    filter out the canceled flights, especially because in contrast to real life,
    there are not that many canceled flights in the postgres_air schema.


    We are going to create an index:


    ```

    CREATE INDEX flight_canceled ON flight(flight_id)

    WHERE status=''Canceled'';

    ```


    This index will be used in all queries where we select canceled flights, regardless
    of any other filtering conditions, for example:


    ```

    SELECT * FROM flight WHERE

    scheduled_departure between ''2023-08-13'' AND ''2023-08-14''

    AND status=''Canceled''

    ```


    The execution plan for this query is shown in Figure [5-20](#501585_2_En_5_Chapter.xhtml#Fig20).


    ![](Images/501585_2_En_5_Fig20_HTML.jpg)


    A query plan comprises 6 lines. They include bitmap heap scan on flight, rechecked
    condition, bitmap index scan on flight canceled, bitmap index scan on flight scheduled
    departure, and index condition.


    Figure 5-20


    The usage of a partial index


    Using the partial index decreases execution time from 0.72 seconds to 0.16 seconds.'
