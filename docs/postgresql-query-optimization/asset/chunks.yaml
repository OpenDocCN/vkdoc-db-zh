    [4-1](#501585_2_En_4_Chapter.xhtml#PC1) in Figure [4-3](#501585_2_En_4_Chapter.xhtml#Fig3).


    ![](Images/501585_2_En_4_Fig3_HTML.png)


    A horizontal step-like flow diagram for arranging the number of passengers in
    a flight includes flight departure airport, flight, hash, booking leg, hash inner
    join, passenger, sort, and aggregate.


    Figure 4-3


    Graphical representation of the execution plan for Listing [4-1](#501585_2_En_4_Chapter.xhtml#PC1)


    In such cases, a more compact representation could be more useful, like the one
    presented in Figure [4-4](#501585_2_En_4_Chapter.xhtml#Fig4).


    ![](Images/501585_2_En_4_Fig4_HTML.jpg)


    A query plan with 10 lines includes the aggregate, sort, hash inner join, sequential
    scan on passenger, hash, sequential scan on booking, bitmap heap scan on flight,
    and bitmap index scan using flight departure airport.


    Figure 4-4


    Alternative representation of the same execution plan


    Now, let’s get back to the actual output of the EXPLAIN command, shown in Figure
    [4-1](#501585_2_En_4_Chapter.xhtml#Fig1). It shows each node of the tree on a
    separate line starting with `->`, with the depth of the node represented by the
    offset. Subtrees are placed after their parent node. Some operations are represented
    with two lines.


    The execution of a plan starts from the leaves and ends at the root. This means
    that the operation that is executed first will be on the line that has the rightmost
    offset. Of course, a plan may contain several leaf nodes that are executed independently.
    As soon as an operation produces an output row, this row is pushed up to the next
    operation. Thus, there is no need to store intermediate results between operations.


    In Figure [4-1](#501585_2_En_4_Chapter.xhtml#Fig1), execution starts from the
    last line, accessing the table `flight` using the index on the `departure_airport`
    column. Since several filters are applied to the table and only one of the filtering
    conditions is supported by the index, PostgreSQL performs a `bitmap index scan`
    (covered in Chapter [2](#501585_2_En_2_Chapter.xhtml)). The engine accesses the
    index and compiles the list of blocks that could contain needed records. Then,
    it reads the actual blocks from the database using `bitmap heap scan`, and for
    each record extracted from the database, it `rechecks` that rows found via the
    index are current and applies `filter` operations for additional conditions for
    which we do not have indexes: `arrival_airport` and `scheduled_departure`.'
  trans: '# 阅读执行计划


    借用猫王的一句话：少一点抽象，多一点行动，拜托。让我们看一个例子。清单 4-1 中的查询选择了所有从 JFK 出发并抵达 ORD，且计划出发时间在 2023
    年 8 月 10 日至 8 月 23 日之间的航班。对于每个航班，计算其乘客总数。


    ```sql

    SELECT f.flight_no,

    f.actual_departure,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    WHERE f.departure_airport = ''JFK''

    AND f.arrival_airport = ''ORD''

    AND f.actual_departure BETWEEN

    ''2023-08-10'' and ''2023-08-13''

    GROUP BY f.flight_id, f.actual_departure;

    ```

    **清单 4-1**

    一个选择特定航班乘客数量的查询


    该查询的逻辑计划如清单 4-2 所示。


    ```

    project f.flight_no,  f.actual_departure, count(p.passenger_id)[] (

    group [f.flight_no, f.actual_departure] (

    filter [f.departure_airport = ''JFK''] (

    filter [f.arrival_airport = ''ORD''] (

    filter f.actual_departure >=''2023-08-10'',

    join(bl.booking_id=p.booking_id (

    access (booking_leg bl),

    access (passenger p)

    ))))))))

    ```

    **清单 4-2**

    清单 4-1 中查询的逻辑计划


    逻辑计划展示了应执行哪些逻辑操作，但并未提供如何执行这些操作的细节。查询规划器会为查询生成一个执行计划，如图 4-1 所示。


    ![执行计划](img/501585_2_En_4_Fig1_HTML.jpg)


    **图 4-1**

    执行计划


    一个包含 17 行的查询计划包括了分组聚合、排序、哈希连接、对 `passenger` 表的顺序扫描、对 `booking` 表的顺序扫描、对 `flight`
    表的位图堆扫描以及对航班出发机场的位图索引扫描。


    要获取查询的执行计划，需要运行 `EXPLAIN` 命令。该命令接受任何语法正确的 SQL 语句作为参数，并返回其执行计划。


    我们鼓励你运行本书中的代码示例并检查其执行计划。但有一点提醒：选择正确的执行计划是一个非确定性过程。你的本地数据库生成的计划可能与本书中展示的计划略有不同。即使计划完全相同，执行时间也可能因硬件和配置的差异而有所不同。


    希望观察图 4-1 后，前几章的价值显而易见——每一行都代表一个之前介绍过的操作，因此其内部机制一目了然。请注意，除了算法名称外，执行计划的每一行还在括号中包含了一些神秘的数字。这个谜团可以通过回顾第
    3 章轻松解开，该章讨论了不同算法的成本如何计算。


    具体来说，一个计划包含预期的输出行数以及预期的输出行平均宽度，这些是根据数据库统计数据计算得出的，还包括成本估算，这些估算是基于先前获得的估算值和配置参数计算的。成本值包含了所有先前操作的累计成本。每个操作有两处成本估算：第一处显示生成第一行输出所需的成本，第二处估算生成完整结果的成本。例如，在图
    4-1 的第 13 行，123.95 是第一行输出的成本，而 9371.93 是完整结果的成本。输出行的数量和宽度的估算值用于估算消耗该输出的操作的成本。如何估算成本将在本章后面介绍。


    需要强调的是，所有这些数字都是近似值。执行期间获得的实际值可能有所不同。如果你怀疑优化器选择了一个非最优的计划，你可能需要查看这些估算值。通常，对于存储表的误差较小，但它不可避免地在每个操作后累积。


    执行计划以物理操作树的形式呈现。在这棵树中，节点代表操作，箭头指向操作数。从图 4-1 中可能看不出树状结构。有多种工具（包括 pgAdmin）可以生成执行计划的图形化表示。图
    4-2 展示了一个输出的可能样子。（不同的图形工具可能使用不同的图标；此示例仅用于说明。）实际上，这张图代表了清单 4-4 的执行计划，我们将在本章后面讨论。


    ![一个简单执行计划的图形化表示（清单 4-4）](img/501585_2_En_4_Fig2_HTML.jpg)


    **图 4-2**

    一个简单执行计划的图形化表示（清单 4-4）


    这是一个水平流程图。航班出发机场指向航班。航班和机场指向嵌套循环内部连接。


    对于更复杂的查询，执行计划的图形化表示可能不那么有用——参见图 4-3 中清单 4-1 的执行计划的图形化表示。


    ![清单 4-1 的执行计划的图形化表示](img/501585_2_En_4_Fig3_HTML.png)


    **图 4-3**

    清单 4-1 的执行计划的图形化表示


    这是一个用于安排航班乘客数量的水平阶梯式流程图，包括航班出发机场、航班、哈希、航段、哈希内部连接、乘客、排序和聚合。


    在这种情况下，更紧凑的表示可能更有用，如图 4-4 所示。


    ![同一执行计划的另一种表示](img/501585_2_En_4_Fig4_HTML.jpg)


    **图 4-4**

    同一执行计划的另一种表示


    一个包含 10 行的查询计划包括了聚合、排序、哈希内部连接、对 `passenger` 表的顺序扫描、哈希、对 `booking` 表的顺序扫描、对 `flight`
    表的位图堆扫描以及使用航班出发机场的位图索引扫描。


    现在，让我们回到 `EXPLAIN` 命令的实际输出，如图 4-1 所示。它将树的每个节点显示在单独的一行，以 `->` 开头，节点的深度由偏移量表示。子树位于其父节点之后。有些操作用两行表示。


    计划的执行从叶子节点开始，到根节点结束。这意味着首先执行的操作将位于偏移量最靠右的那一行。当然，一个计划可能包含多个独立执行的叶子节点。一旦某个操作产生一个输出行，该行就会被推送到下一个操作。因此，操作之间无需存储中间结果。


    在图 4-1 中，执行从最后一行开始，使用 `departure_airport` 列上的索引访问 `flight` 表。由于对该表应用了多个过滤条件，且只有一个过滤条件有索引支持，PostgreSQL
    执行了 `位图索引扫描`（在第 2 章中介绍过）。引擎访问索引并编译可能包含所需记录的数据块列表。然后，它使用 `位图堆扫描` 从数据库中读取实际的数据块，并对从数据库中提取的每条记录，`重新检查`
    通过索引找到的行是否是最新的，并应用 `过滤` 操作来处理那些我们没有索引的附加条件：`arrival_airport` 和 `scheduled_departure`。'
- fmt: 'The result is joined with the table `booking_leg`. PostgreSQL uses a sequential
    read to access this table and a hash join algorithm on the condition `bl.flight_id
    = f.flight_id`.


    Then, the table `passenger` is accessed via a sequential scan (since it doesn’t
    have any indexes), and once again, the hash join algorithm is used on the `p.booking_id
    = bl.booking_id` condition.


    The last operation to be executed is grouping and calculating the aggregate function
    `sum()`. Sorting determines the flights that satisfy the search criteria. Then,
    the count of all passengers on each of the flights is performed.


    The next section addresses what else can be gleaned from the execution plan and
    why it is important.


    ## Understanding Execution Plans


    Understanding small execution plans is easy. Recall that in Chapter [3](#501585_2_En_3_Chapter.xhtml)
    we compared two `SELECT` statements, Listings [3-2](#501585_2_En_3_Chapter.xhtml#PC2)
    and [3-3](#501585_2_En_3_Chapter.xhtml#PC3). We stated that for the first one,
    PostgreSQL would choose a sequential scan, while for the second one it would choose
    index access. How did we know that? Now, you know the answer: we ran the `EXPLAIN`
    command for both statements. The execution plan for Listing [3-2](#501585_2_En_3_Chapter.xhtml#PC2)
    is presented in Figure [4-5](#501585_2_En_4_Chapter.xhtml#Fig5) and the execution
    plan for Listing [3-3](#501585_2_En_3_Chapter.xhtml#PC3) in Figure [4-6](#501585_2_En_4_Chapter.xhtml#Fig6).


    ![](Images/501585_2_En_4_Fig6_HTML.jpg)


    A query plan with 4 lines includes bitmap heap scan on flight, recheck condition,
    bitmap index scan on flight scheduled departure, and index condition.


    **Figure 4-6**


    Execution plan for Listing [3-4](#501585_2_En_3_Chapter.xhtml#PC4)


    ![](Images/501585_2_En_4_Fig5_HTML.jpg)


    A query plan with two lines indicates the sequential scan on flight and the filter
    functions.


    **Figure 4-5**


    Execution plan for Listing [3-3](#501585_2_En_3_Chapter.xhtml#PC3)


    But what if an execution plan is more complex?


    Often, when we explain how to read execution plans in the manner described in
    the preceding text, our audience feels overwhelmed by the size of the execution
    plan for a relatively simple query, especially given that a more complex query
    can produce an execution plan of 100+ lines. Even the plan presented in Figure
    [4-1](#501585_2_En_4_Chapter.xhtml#Fig1) might require some time to read. Sometimes,
    even when each and every single line of a plan can be interpreted, the question
    remains: “I have a query, and it is slow, and you tell me to look at the execution
    plan, and it is 100+ lines long. What should I do? Where should I start?”


    The good news is that most of the time, you do not need to read the whole plan
    to understand what exactly makes the execution slow. In this section, we will
    learn more about interpreting execution plans.


    ### What Is Going On During Optimization?


    As mentioned in Chapter [2](#501585_2_En_2_Chapter.xhtml), the optimizer performs
    two kinds of transformations: it replaces logical operations with corresponding
    physical execution algorithms and (possibly) changes the logical expression structure
    by changing the order in which logical operations are executed.


    After the query is parsed and checked for syntactic correctness, the first step
    is query rewriting. In this step, the PostgreSQL optimizer enhances the code by
    eliminating subqueries, substituting views with their textual presentation, and
    so on. It is essential to keep in mind that this step always happens. When the
    concept of a view is introduced, SQL textbooks often suggest that “views can be
    used like tables,” which is misleading. In most cases, views are substituted by
    their source code. However, “most of the time” does not mean “always.” Chapter
    [7](#501585_2_En_7_Chapter.xhtml) discusses views, how the optimizer processes
    them, and their potential performance pitfalls.


    The next step after query rewrite is what we usually call optimization, which
    includes the following:


    *   Determining the possible orders of operations


    *   Determining the possible execution algorithms for each operation


    *   Comparing the costs of different plans


    *   Selecting the optimal execution plan


    Many SQL developers presume that PostgreSQL executes queries accessing (and joining)
    tables in the same order they appear in the `FROM` clause.


    However, the order of joins is *not* preserved most of the time—the database does
    not expect these instructions. In subsequent chapters, we will discuss in more
    detail what influences the order of operations. For now, let’s consider how to
    evaluate an execution plan.


    ### Why Are There So Many Execution Plans to Choose From?


    We’ve noted several times that one `SQL` statement can be executed in many ways,
    using different execution plans. In fact, there could be hundreds, thousands,
    or even millions of possible ways to execute one statement! This chapter gives
    some sense of where these numbers are coming from. Plans may vary in


    *   Order of operations


    *   Algorithms used for joins and other operations (e.g., nested loops, hash join)


    *   Data retrieval methods (e.g., index usage, full scan)


    Formally speaking, the optimizer finds the best plan by computing the costs for
    all possible plans and then comparing the costs. But since we know that there
    are three basic algorithms to execute each join, even a simple `SELECT` on three
    tables can generate nine possible execution plans; given the 12 possible join
    orders, there are 108 possible plans (3 * 3 * 12 = 108). If we then consider all
    the potential data retrieval methods for each table, there are several thousand
    plans to compare.


    Fortunately, PostgreSQL does not check every possible plan.


    The cost-based optimization algorithm relies on the optimality principle: a sub-plan
    of an optimal plan is optimal for the corresponding subquery. A plan can be considered
    a composition of multiple component pieces, or sub-plans. A sub-plan is a plan
    that includes any operations of the original plan as a root node and all its descendant
    nodes, that is, all operations that contribute to the input arguments for the
    operation chosen as a root of the sub-plan. The optimizer builds the optimal plan
    starting from the smallest sub-plans (i.e., data access to single tables) and
    gradually produces more complex sub-plans, including more operations with only
    a few checks of cost on each step. The algorithm is exhaustive in the sense that
    the optimal plan will be built, despite the fact that a significant portion of
    possible plans will not be tried.


    For example, in the preceding example, once the optimizer selects the correct
    data retrieval algorithm for one of the three tables, it will not consider any
    plans that do not use this optimal algorithm.


    Still, the number of produced sub-plans can be huge. The `geqo_threshold` configuration
    parameter specifies the maximum number of joins in a query for which the near-exhaustive
    search of the best join sequence is performed. If the number of tables exceeds
    the maximum, the joins order is determined by heuristics. Heuristics cut out parts
    of the plan space that are unlikely to contain optimal plans, reducing the number
    of plans examined by the optimization algorithm. While this feature helps the
    optimizer select an execution plan more quickly, it can also affect performance
    negatively: there is a risk that the best execution plan will be accidentally
    dropped before the cost comparison.


    Although heuristics may cut out the optimal plan, the algorithm builds the best
    of the remaining plans.


    Now, let’s take a closer look at how these costs are calculated.'
