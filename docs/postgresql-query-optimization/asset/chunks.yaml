    What kind of optimization goals should we have for long queries? A common misconception
    explicitly refuted in this chapter is that if a query is long, there is no way
    to significantly improve its performance. Moreover, each co-author has had the
    joy of improving the performance of a long query by an order of *several hundred
    times*. Such improvements are made possible when two optimization strategies are
    applied:


    1.  Avoid multiple table scans.


    2.  Reduce the size of the result at the earliest possible stage.


    The remainder of this chapter explains these techniques in detail and will describe
    several methods to achieve this goal.


    ## Long Queries and Full Scans


    Chapter [5](#501585_2_En_5_Chapter.xhtml) stated that short queries require the
    presence of indexes on columns included in search criteria. For long queries,
    it is the converse: indexes are not needed, and if tables are indexed, we want
    to ensure that indexes are not used.


    Why are full table scans desirable for long queries? As shown in Figure [3-3](#501585_2_En_3_Chapter.xhtml#Fig3),
    when the number of rows needed is large enough, index access will require more
    I/O operations. What percentage or number of records is “large enough” varies
    and depends on many different factors. By now, it should not be a surprise that
    most of the time, PostgreSQL estimates this percentage correctly.


    Chapter [5](#501585_2_En_5_Chapter.xhtml) said something very similar about short
    queries. But “how large is large enough” is more difficult to estimate than “how
    small is small enough.”


    The estimate of how many records is too many evolves as better hardware, faster
    disks, and more powerful CPUs become available. For this reason, this book tries
    to avoid giving specific number thresholds that will necessarily change. To build
    representative cases for this chapter, several tables were built with hundreds
    of millions of rows of data. These are too large to be included with the `postgres_air`
    distribution. However, it would be unsurprising if some of the examples in this
    chapter are no longer representative in a few years.'
  trans: '

    # 6. 长查询与全表扫描


    第 5 章讨论了短查询，并解释了如何识别短查询以及适用于它们的优化策略与技术。它还涵盖了索引对于短查询的重要性、最常用的索引类型及其应用。第 5 章也提供了一个实践阅读执行计划的机会，并有望帮助你建立对
    PostgreSQL 优化器的信心。


    本章关注长查询。有些查询，无论写得多好，就是无法在零点几秒内运行完成。这并不意味着它们无法被优化。许多从业者认为，既然分析报表没有严格的响应时间要求，那么它们运行得快或慢并不重要。在极端情况下，报表开发者甚至不努力确保报表在合理时间内完成，借口是查询每天、每周或每月只运行一次。


    这是一种危险的做法。如果忽视报表性能，性能很容易从几分钟退化到几小时甚至更久。我们曾观察到有报表运行了六天才完成！等到情况变得如此严峻时，在有限的时间内修复并非易事。通常，在开发分析报表时，源数据量确实很小，一切表现良好。SQL
    开发者的职责是，即使查询目前运行良好，也要检查执行计划，并采取主动措施以防止未来性能下降。


    ## 哪些查询被视为长查询？


    第 5 章介绍了短查询的正式定义。可以合理地假设，所有非短查询都是长查询。这没错，但基于否定的定义在实践中可能不够直观。


    第 5 章中的两个长查询示例（清单 5-1 和 5-3）分别复制在下面的清单 6-1 和 6-2 中。两者中的第一个查询是结果集庞大的长查询；该查询返回了所有可能的出发和到达机场组合。第二个查询仅产生一行输出——显示
    `postgres_air` 模式中所有航班的平均飞行长度和乘客数量——但仍然被归类为长查询。


    清单 6-2：结果集只有一行的长查询


    ```sql

    SELECT

    avg(flight_length),

    avg (passengers)

    FROM

    (SELECT

    flight_no,

    scheduled_arrival -scheduled_departure AS flight_length,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    GROUP BY 1,2) a

    ```


    清单 6-1：结果集很大的长查询


    ```sql

    SELECT

    d.airport_code AS departure_airport

    a.airport_code AS arrival_airport

    FROM  airport a,

    airport d

    WHERE a.airport_code  d.airport_code

    ```


    那么，究竟什么是长查询？


    当一个查询对于至少一个大表具有高选择性时，即，即使输出规模很小，几乎每一行都对输出有贡献，该查询就被视为 *长查询*。


    对于长查询，我们应该设定什么样的优化目标？本章明确反驳的一个常见误解是，如果一个查询是长查询，就无法显著提升其性能。此外，每位合著者都有幸将长查询的性能提升
    *数百倍*。当应用以下两种优化策略时，这种改进成为可能：


    1.  避免多次表扫描。

    2.  在尽可能早的阶段减少结果的大小。


    本章剩余部分将详细解释这些技术，并描述几种实现此目标的方法。


    ## 长查询与全表扫描


    第 5 章指出，短查询要求在搜索条件中包含的列上存在索引。对于长查询，情况恰恰相反：不需要索引，如果表有索引，我们要确保索引不被使用。


    为什么全表扫描对于长查询是可取的？如图 3-3 所示，当所需的行数足够大时，索引访问将需要更多的 I/O 操作。百分之多少或多少条记录算是“足够大”是变化的，并取决于许多不同的因素。时至今日，PostgreSQL
    在大多数时候都能正确估计这个百分比，应该不足为奇了。


    第 5 章对短查询也说过非常类似的话。但是，“多大算足够大”比“多小算足够小”更难估计。


    对于多少条记录算“太多”的估计，会随着更好的硬件、更快的磁盘和更强大的 CPU 的出现而演变。因此，本书尽量避免给出具体的数字阈值，因为这些阈值必然会变化。为了构成本章的代表性案例，我们构建了几个包含数亿行数据的表。这些表太大了，无法随
    `postgres_air` 一起分发。然而，如果几年后本章中的一些示例不再具有代表性，也无需感到惊讶。

    '
- fmt: '## Long Queries and Hash Joins


    In a majority of examples in this chapter, a hash join algorithm is used. This
    is exactly what we hope to see in the execution plan of a long query. Why is a
    hash join preferable in this case? In Chapter 3, we estimated the costs of both
    nested loop and hash join algorithms.


    For nested loops, the cost of the join of tables `R` and `S` is


    ```

    cost(nl,R,S)=size(R) * size(S)+size(R)*size(S)/size(JA)

    ```


    For a hash join, it is


    ```

    cost(hash,R,S)=size(R)+size(S)+size(R)*size(S)/size(JA)

    ```


    where `JA` represents the number of distinct values of the join attribute. As
    mentioned in Chapter 3, a third term, which represents the size of the result
    set, should be added to the cost of both algorithms, but for the nested loop algorithm,
    this value is significantly less than the cost of the join itself. For long queries,
    the size of `R` and `S` is large (because they are not significantly restricted),
    making the cost of nested loops significantly higher than the cost of a hash join.


    Suppose database statistics estimate the size of table `R` to be 1,000,000 rows
    and the size of table `S` 2,000,000 rows and the join attribute `JA` has 100,000
    distinct values. According to the formulas in Chapter 3, the size of the join
    result will be


    ```

    Z=size(R) * size(S) / size(JA) =20,000,000

    ```


    Then, the number of operations of the nested loop algorithm will be


    ```

    Z+size(R)* size(S)=2,000,020,000,000

    ```


    and the number of operations needed for the hash join algorithm will be


    ```

    Z+size(R)+ size(S)==23,000,000

    ```


    which is almost 10,000 times smaller. The planner will estimate the cost of these
    algorithms based on similar calculations and, of course, will choose the hash
    join algorithm.


    Hash joins work best when the first argument fits into main memory. The size of
    memory available can be tuned with server parameters.


    In some cases, a merge join algorithm is used, for example, in Figure 6-10 later
    in this chapter. Chapter 3 noted that a merge join can be more efficient when
    at least one of the tables is presorted. In this case, since unique values are
    being selected, sorting is indeed performed.


    Summarizing Chapter 5 and this chapter, most of the time, index access works well
    with the nested loop algorithm (and vice versa), and sequential scans work well
    with a hash join.


    Since PostgreSQL does not have optimizer hints, is there any way to force a specific
    join algorithm? As already mentioned multiple times, the best thing we can do
    is not to restrict the optimizer in the manner we write SQL statements.


    ## Long Queries and the Order of Joins


    Join order for small queries was discussed in Chapter 5. For short queries, the
    desired join order is the one that would prompt the usage of indexes with lower
    selectivity first.


    Since we do not expect indexes to be used in long queries, does the order of joins
    make a difference? Perhaps surprisingly, it does. Large tables can differ in size
    significantly. Also, in practice, when selecting "almost all records," the word
    "almost" can mean as little as 30% and as much as 100%. Even when indexes are
    not used, the order of joins matters, because it is important to keep interim
    datasets as small as possible.


    The most restrictive joins (i.e., joins that reduce the result set size the most)
    should be executed first.


    The optimizer will most often choose the correct order; however, it is the responsibility
    of the developer to verify that the optimizer has chosen correctly.


    ### What Is a Semi-join?


    Often, the most restrictive join in a query is a `semi-join`. Let''s pause to
    offer a formal definition.


    A semi-join between two tables `R` and `S` returns rows from table `R` for which
    there is at least one row from table `S` with matching values in the joining columns.


    To clarify, a semi-join is not an extra SQL operation; it is not valid SQL to
    write a statement like `SELECT a.* FROM a SEMI JOIN b`. A semi-join is a special
    kind of join that satisfies two specific conditions: First, only columns from
    the first table appear in the result set. Second, rows from the first table are
    not duplicated where there is more than one match in the second table. Most often,
    a semi-join doesn''t include the `JOIN` keyword at all. The first and most common
    way of specifying a semi-join is shown in Listing 6-3. This query finds all flight
    information for flights with at least one booking.


    ```

    SELECT * FROM flight f WHERE EXISTS

    (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

    Listing 6-3

    Defining a semi-join using the EXISTS keyword

    ```


    This query uses an implicit join with table `booking_leg` to filter records from
    the table `flight`. In other words, instead of supplying values for filtering,
    we use column values from another table.


    An equivalent query showing another way to specify a semi-join is shown in Listing
    6-4.


    ```

    SELECT * FROM flight WHERE flight_id IN

    (SELECT flight_id FROM booking_leg)

    Listing 6-4

    Defining a semi-join using the IN keyword

    ```


    How can these queries contain joins when neither uses the `JOIN` keyword? The
    answer is in the execution plan, which is identical for both queries, shown in
    Figure 6-1.


    ![](Images/501585_2_En_6_Fig1_HTML.jpg)


    A screenshot of the list of query plans. It includes nested loop semi-join, sequence
    scan on flight f, index-only scan, and index condition.


    Figure 6-1


    Execution plan for a semi-join


    You can see a `SEMI JOIN` in this plan, even though the keyword `JOIN` was not
    used in the query itself.


    Although these two ways of writing queries with semi-joins are semantically identical,
    in PostgreSQL, only the first one guarantees the presence of `SEMI JOIN` in the
    execution plan. The plans are identical for both queries in Listings 6-3 and 6-4,
    but in other cases, the optimizer may choose to rewrite it as a regular join.
    This decision is based both on the cardinality of the relationship between two
    tables and filter selectivity.'
