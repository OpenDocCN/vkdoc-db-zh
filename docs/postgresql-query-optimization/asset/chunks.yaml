  trans: "\n# 结论\n\n本章正式定义了长查询，并探讨了其优化技术。\n\n本章的首要重要原则是：索引并不一定能加快查询速度，实际上，它可能使长查询运行得更慢。一个常见的误解是，如果无法构建索引，就无法优化全表扫描。希望本章已明确证明，优化全表扫描存在多种可能性。\n\
    \n与短查询类似，长查询的优化也通过减少中间结果的大小并尽可能少地对行进行必要工作来实现。对于短查询，这是通过对最具限制性的条件应用索引来完成的。对于长查询，则通过注意连接顺序、应用半连接和反连接、在分组前过滤、在连接前分组以及应用集合操作来实现。\n\
    \n# 7. 长查询：附加技术\n\n第 6 章讨论了多种提升长查询性能的方法。到目前为止，所涉及的技术都与重写查询而不创建额外的数据库对象有关。本章将探讨提升长查询性能的其他方法，包括物化中间结果的不同方式。将讨论临时表、CTE（公共表表达式）、视图和物化视图——每种工具何时可以提升性能，以及每种工具如何被滥用并导致性能下降。最后，本章将介绍分区和并行执行。\n\
    \n## 构造查询\n\n熟悉面向对象编程（OOP）的读者会对分解（因式分解）和封装的概念不陌生。OOP 的最佳实践规定，代码应被分解（或因式分解）为许多更小的类和对象，这些类和对象负责系统行为中定义良好的子集，同时应进行封装，限制对组件的直接访问，从而隐藏其实现细节。这两个原则使应用程序代码更易于阅读和管理，并使更改更容易。\n\
    \n基于这种范式，当面对一个超过 500 行的单一 `SELECT` 语句时，人们很自然地会想要应用相同的原则，将代码分解成更小的部分并封装一些逻辑。\n\n\
    然而，SQL 的声明性质决定了它因式分解查询的风格与用于应用程序代码的风格截然不同。在 SQL 中，如同在任何语言中一样，代码应保持易于理解和修改，但不能以牺牲性能为代价。\n\
    \n我们可以通过多种方式在 SQL 中进行因式分解和封装，每种方式都有其自身的优点和陷阱。有些方法（效果各异）用于提升性能和存储中间结果。有些用于使代码可重用。还有一些则影响数据的存储方式。本章将介绍几种方法，其他方法，如函数，将在后续章节中深入探讨。\n\
    \n无论如何，任何分解或封装都应对应一个逻辑实体——例如，一份报告或每日刷新任务。\n\n## 临时表和 CTE\n\n在第 6 章中，我们提到有时 SQL\
    \ 开发人员加速查询执行的尝试可能会适得其反，导致执行变慢。这通常发生在他们决定使用 `temporary tables`（临时表）时。\n\n### 临时表\n\
    \n要创建临时表，需执行常规的 `create table` 语句，并添加关键字 `temporary` 或简写 `temp`：\n\n```sql\nCREATE\
    \ TEMP TABLE interim_results\n```\n\n临时表仅对当前会话可见，如果在会话断开连接前未显式删除，它们会被自动删除。除此之外，它们与常规表一样好，可以在查询中毫无限制地使用，甚至可以创建索引。临时表常用于存储查询的中间结果，因此\
    \ `CREATE` 语句通常如下所示：\n\n```sql\nCREATE TEMP TABLE interim_results AS\nSELECT ...\n\
    ```\n\n这一切看起来非常方便，那么这种方法有什么问题呢？\n\n如果你使用临时表来存储查询结果以便进行一些分析，然后在完成后丢弃它，这完全没问题。但是，当\
    \ SQL 开发人员开始使用 `temporary tables` 来存储每个步骤的结果时，代码往往会变成这样：\n\n```sql\nCREATE TEMP\
    \ TABLE T1 AS SELECT  ;\nCREATE TEMP TABLE T2 AS SELECT \nFROM T1\nINNER JOIN\
    \ \n```\n\n临时表的链条可能会变得相当长。这会导致问题吗？是的，而且问题很多，包括以下几点：\n\n*   `Indexes`（索引） – 数据被选入临时表存储后，我们无法再使用在源表上创建的索引。我们只能选择在没有索引的情况下继续操作，或者在临时表上新建索引，这需要时间。\n\
    *   `Statistics`（统计信息） – 由于我们创建了一个新表，优化器无法使用源表上的值分布统计数据，因此我们只能选择在没有统计信息的情况下操作，或者在临时表上运行\
    \ `ANALYZE` 命令。\n*   `Disk space`（磁盘空间） – 临时表仍然是存储在磁盘上的表，因此当它们被过度使用时，可能导致数据库大小显著增长。\n\
    *   `Excessive I/O`（过量 I/O） – 同样，因为它们是写入磁盘的表，所以写入和读取磁盘需要额外的时间。\n\n过度使用临时表最重要的负面影响是，这种做法阻碍了优化器进行重写。\n\
    \n通过将每个连接的结果保存在临时表中，你阻止了优化器选择最优的连接顺序；你“锁定”了创建临时表的顺序。\n\n当我们查看清单 6-15 中查询的执行计划时，我们观察到\
    \ PostgreSQL 能够将过滤条件下推到分组操作内部。如果为中间结果创建了临时表，会发生什么？\n\n```sql\nCREATE TEMP TABLE\
    \ flights_totals AS\nSELECT\nbl.flight_id,\ndeparture_airport,\n(avg(price))::numeric\
    \ (7,2) AS avg_price,\ncount(DISTINCT passenger_id) AS num_passengers\nFROM booking\
    \ b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\n\
    JOIN passenger p USING (booking_id)\nGROUP BY 1,2;\n\nSELECT\nflight_id,\navg_price,\n\
    num_passengers\nFROM flights_totals\nWHERE departure_airport='ORD';\n```\n**清单\
    \ 7-1** 临时表的低效用法\n\n创建这个临时表耗时 50 秒，产生了超过 500,000 行数据，而我们只需要其中的 10,000 行。与此同时，清单\
    \ 6-15 中的查询仅用 0.1 秒就执行完毕。\n"
- fmt: '## Common Table Expressions (CTEs)


    如果临时表很危险，那么是否应该改用`CTE`（公共表表达式）呢？首先，什么是CTE？


    公共表表达式，或简称`CTE`，可以理解为仅在单个查询中存在的临时表。`WITH`子句中的每条辅助语句都可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`；而`WITH`子句本身则附加到一条主语句上，该主语句同样可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`。


    让我们来尝试一个CTE。在列表7-2中，来自列表7-1的查询被修改为使用CTE而不是临时表。


    ```sql

    WITH flights_totals AS(

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2)

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM flights_totals

    WHERE departure_airport=’ORD’

    ```

    *列表 7-2 使用CTE的查询示例*


    你在执行计划中看到的结果将取决于你运行的是12之前的PostgreSQL版本还是12及以上的版本。对于所有12之前的版本，CTE的处理方式与临时表完全相同。结果会被物化在主内存中，并可能溢出到磁盘。这意味着使用CTE相比临时表没有任何优势。


    公平地说，CTE的预设用途是不同的。CTE背后的理念是，如果你需要多次使用某个（可能很复杂的）子查询，你可以将其定义为CTE，然后在查询中多次引用它。在这种情况下，`PostgreSQL`只会计算一次结果，然后根据需要多次复用。


    由于这种预设的用途，优化器会将`CTE`的执行与查询的其余部分分开规划，并且不会将任何连接条件推入`CTE`内部，从而提供了所谓的*优化壁垒*。当`WITH`用于可能具有副作用的`INSERT/DELETE/UPDATE`语句或递归`CTE`调用时，这一点尤其重要。此外，拥有优化壁垒意味着参与`CTE`的表不计入`join_collapse_limit`的限制。这使得我们能够有效地利用`PostgreSQL`优化器的功能来处理连接大量表的查询。


    对于列表7-2中的查询，在12之前的`PostgreSQL`版本中，`CTE` `flight_totals`会为所有航班计算，之后才会选择一部分航班。


    `PostgreSQL 12`对`CTE`优化带来了巨大改变。对于没有递归的`SELECT`语句，如果一个`CTE`在查询中只被使用一次，它将被内联到外部查询中（移除优化壁垒）。如果它被调用多次，则保留旧行为。


    更重要的是，前面描述的行为是默认的，但可以通过使用关键字`MATERIALIZED`和`NOT MATERIALIZED`来覆盖（参见列表7-3）。第一个关键字强制使用旧行为，第二个关键字强制内联，忽略所有其他考虑因素。


    ```sql

    WITH flights_totals AS MATERIALIZED (

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2)

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM flights_totals

    WHERE departure_airport=''ORD''

    ```

    *列表 7-3 MATERIALIZED关键字的使用*


    图7-1展示了列表7-2在`PostgreSQL 12`中的执行计划。如果添加了`MATERIALIZED`关键字，如列表7-3所示，则会强制使用旧行为，如图7-2所示。


    ![强制物化CTE的查询计划](Images/501585_2_En_7_Fig2_HTML.jpg)

    *图 7-2 强制物化CTE*


    ![CTE内联的执行计划](Images/501585_2_En_7_Fig1_HTML.jpg)

    *图 7-1 CTE内联的执行计划*


    在这些最近的改动之前，当SQL语句看起来像下面这样时，我们会劝阻SQL开发者使用多个嵌入式CTE：


    ```sql

    WITH z AS (

    WITH y AS (

    WITH x AS (SELECT ...)

    SELECT ... FROM a JOIN x ...)

    SELECT ... FROM b

    JOIN y...)

    SELECT ... FROM c

    JOIN z

    ...

    ```


    然而，随着`PostgreSQL 12`中引入的改动，这样的查询变得更容易管理了。我们仍然会鼓励SQL开发者注意不要强制产生次优的执行计划，但使用`CTE`链远比使用一系列临时表要好；在后一种情况下，优化器是无能为力的。


    最后，重要的是要提到，存储中间结果在某些情况下是有益的。然而，几乎总有比使用临时表更好的方法。我们将在本章后面讨论其他选项。'
  raw: '### Common Table Expressions (CTEs)


    If temporary tables are dangerous, should a *CTE* (*common table expression*)
    be used instead? First, what are CTEs?


    Common table expressions, or CTEs, can be thought of as defining temporary tables
    that exist just for one query. Each auxiliary statement in a `WITH` clause can
    be a `SELECT`, `INSERT`, `UPDATE`, or `DELETE`; and the `WITH` clause itself is
    attached to a primary statement that can also be a `SELECT`, `INSERT`, `UPDATE`,
    or `DELETE`.


    Let’s give a CTE a try. In Listing [7-2](#501585_2_En_7_Chapter.xhtml#PC5), the
    query from Listing [7-1](#501585_2_En_7_Chapter.xhtml#PC4) is modified to use
    a CTE instead of a temporary table.


    ```

    WITH flights_totals AS(

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2)

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM flights_totals

    WHERE departure_airport=’ORD’

    Listing 7-2

    Example of a query with a CTE

    ```


    What you will see in the execution plan depends on whether you are running a PostgreSQL
    version below 12 or 12 and above. For all versions below 12, a CTE was processed
    exactly like a temporary table. The results were materialized in main memory with
    possible disk failover. That means that there was no advantage to using a CTE
    instead of a temporary table.


    To be fair, a CTE’s intended purpose was different. The idea behind a CTE was
    that if you needed to use some (possibly complex) subselect more than once, you
    could define it as a CTE and reference it in a query multiple times. In this case,
    PostgreSQL will compute results just once and reuse them as many times as needed.


    Because of this intended usage, the optimizer planned CTE execution separately
    from the rest of the query and did not push any join conditions inside the CTE,
    providing a so-called *optimization fence*. This is especially important if `WITH`
    is used in `INSERT/DELETE/UPDATE` statements where there may be side effects or
    in recursive CTE calls. In addition, having the optimization fence means that
    the tables involved in the CTE are not counted against `join_collapse_limit`.
    This allows us to effectively use PostgreSQL optimizer capabilities with queries
    that join a large number of tables.


    For the query in Listing [7-2](#501585_2_En_7_Chapter.xhtml#PC5), in PostgreSQL
    versions before 12, the CTE `flight_totals` would be calculated for all flights,
    and only after that a subset of flights would be selected.


    PostgreSQL 12 brought a drastic change to CTE optimization. For SELECT statements
    with no recursion, if a CTE is used in a query only once, it will be inlined into
    the outer query (removing the optimization fence). If it is called more than once,
    the old behavior will be preserved.


    What is more important, the behavior described earlier is a default, but it can
    be overwritten by using the keywords `MATERIALIZED` and `NOT MATERIALIZED`. (See
    Listing [7-3](#501585_2_En_7_Chapter.xhtml#PC6).) The first one forces the old
    behavior, and the second one forces inlining, regardless of all other considerations.


    ```

    WITH flights_totals AS MATERIALIZED (

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2)

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM flights_totals

    WHERE departure_airport=''ORD''

    Listing 7-3

    Usage of the MATERIALIZED keyword

    ```


    Figure [7-1](#501585_2_En_7_Chapter.xhtml#Fig1) presents the execution plan for
    Listing [7-2](#501585_2_En_7_Chapter.xhtml#PC5), the way it works in PostgreSQL
    12\. If the keyword MATERIALIZED is added, as shown in Listing [7-3](#501585_2_En_7_Chapter.xhtml#PC6),
    the old behavior will be forced, as shown in Figure [7-2](#501585_2_En_7_Chapter.xhtml#Fig2).


    ![](Images/501585_2_En_7_Fig2_HTML.jpg)


    A query plan comprises 20 lines of text. The lines include the C T E scan on flight
    total, filter, group key, sort key, has condition, hash join, and other details.
    It highlights the filter in the second line.


    Figure 7-2


    Forced materialization of a CTE


    ![](Images/501585_2_En_7_Fig1_HTML.jpg)


    A query plan comprises 20 lines of text. The lines include subquery scan on flight
    totals, group aggregate, group key, sort key, nested loop, joined filter, has
    condition, sequential scan on booking leg, and other details.


    Figure 7-1


    Execution plan for a CTE with inlining


    Prior to these recent changes, we would discourage SQL developers from using multiple
    embedded CTEs, when a SQL statement would look like this:


    ```

    WITH z AS (

    WITH y AS (

    WITH x AS (SELECT ...)

    SELECT ... FROM a JOIN x ...)

    SELECT ... FROM b

    JOIN y...)

    SELECT ... FROM c

    JOIN z

    ...

    ```


    However, with the changes introduced in PostgreSQL 12, such queries are much more
    manageable. We would still encourage SQL developers to be mindful not to force
    a suboptimal execution plan, but using a chain of CTEs is much better than using
    a sequence of temporary tables; in the latter case, the optimizer is helpless.


    To conclude, it’s important to mention that there are situations where storing
    intermediate results is beneficial. However, almost always there are better ways
    than using temporary tables. We will discuss other options later in this chapter.'
  trans: '

    ## 公共表表达式（CTE）


    如果临时表很危险，那么是否应该改用`CTE`（公共表表达式）呢？首先，什么是 CTE？


    公共表表达式，或简称`CTE`，可以理解为仅在单个查询中存在的临时表。`WITH`子句中的每条辅助语句都可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`；而`WITH`子句本身则附加到一条主语句上，该主语句同样可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`。


    让我们来尝试一个 CTE。在列表 7-2 中，来自列表 7-1 的查询被修改为使用 CTE 而不是临时表。


    ```sql

    WITH flights_totals AS(

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2)

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM flights_totals

    WHERE departure_airport=’ORD’

    ```

    *列表 7-2 使用 CTE 的查询示例*


    你在执行计划中看到的结果将取决于你运行的是 12 之前的 PostgreSQL 版本还是 12 及以上的版本。对于所有 12 之前的版本，CTE 的处理方式与临时表完全相同。结果会被物化在主内存中，并可能溢出到磁盘。这意味着使用
    CTE 相比临时表没有任何优势。


