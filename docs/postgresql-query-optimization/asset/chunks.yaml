    hints might start really missing them. However, most of the time, there is no
    reason for frustration. Having one of the best optimizers, PostgreSQL does the
    right thing in most cases. So, most likely, there is a good reason, and it is
    possible to find by examining the execution plan.


    Let’s consider an example. This example, as well as some examples in subsequent
    chapters, uses larger tables, which are not included in the `postgres_air` distribution
