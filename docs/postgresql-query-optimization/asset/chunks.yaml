    About the Authors About the Technical Reviewer


    # 1. Why Optimize?


    This chapter covers why optimization is an important part of database development.
    You will learn the differences between declarative languages, like SQL, and imperative
    languages, like Java, which may be more familiar, and how these differences affect
    programming style. We also demonstrate that optimization applies not only to database
    queries but also to database design and application architecture.


    ## What Do We Mean by Optimization?


    While the majority of people think about database optimization as choosing the
    best system configuration parameters, in the context of this book, optimization
    means any transformation that improves system performance. This definition is
    purposely generic, since we want to emphasize that optimization is not a separate
    development phase. Quite often, database developers try to “just make it work”
    first and optimize later. We do not think that this approach is productive. Writing
    a query without having any idea of how long it will take to run creates a problem
    that could have been avoided altogether by writing it correctly way from the start.
    We hope that by the time you finish this book, you’ll be prepared to optimize
    in precisely this fashion: as an integrated part of query development.


    We will demonstrate some specific techniques; however, the most important thing
    is to understand how a database engine processes a query and how a query planner
    decides what execution path to choose. When we teach optimization in a classroom
    setting, we often say, “Think like a database!” Look at your query from the point
    of view of a database engine, and imagine what it has to do to execute that query;
    imagine that you have to do it yourself instead of the database engine doing it
    for you. By thinking about the scope of work, you can avoid imposing suboptimal
    execution plans. This is discussed in more detail in subsequent chapters.


    If you practice “thinking like a database” long enough, it will become a natural
    way of thinking, and you will be able to write queries correctly right away, often
    without the need for future optimization.'
