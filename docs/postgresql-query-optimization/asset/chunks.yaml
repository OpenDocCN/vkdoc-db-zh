- fmt: '## Using Dynamic SQL for Flexibility


    The technique described here is most commonly used in OLTP systems, although,
    once again, it’s not strictly limited to one type of environment.


    Often, a system allows a user to select an arbitrary list of search criteria,
    perhaps using some drop-down lists or other graphical means to construct a query.


    The user does not (and should not) know anything about the way the data is stored
    in the database. However, the search fields may be located in different tables,
    search criteria may have different selectivity, and, in general, the `SELECT`
    statement may look very different depending on the selection criteria.


    Let’s look at an example. Suppose a function is needed to search for a booking
    using any combination of the following values:


    *   Email (or the beginning portion of email)

    *   Departure airport

    *   Arrival airport

    *   Departure date

    *   Flight ID


    Is there any way to implement this function efficiently without defaulting to
    Elasticsearch?!


    A common approach to this problem is something like Listing 13-11.


    ```

    CREATE TYPE booking_record_basic AS(

    booking_id bigint,

    booking_ref text,

    booking_name text ,

    account_id integer,

    email text );

    CREATE OR REPLACE FUNCTION select_booking (

    p_email text,

    p_dep_airport text,

    p_arr_airport text,

    p_dep_date date,

    p_flight_id int)

    RETURNS SETOF booking_record_basic

    AS

    $func$

    BEGIN

    RETURN QUERY

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    booking_name,

    account_id,

    email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE (p_email IS NULL OR lower(email) LIKE p_email||''%'')

    AND (p_dep_airport IS NULL OR departure_airport=p_dep_airport)

    AND (p_arr_airport IS NULL OR arrival_airport=p_arr_airport)

    AND (p_flight_id IS NULL OR bl.flight_id=p_flight_id);

    END;

    $func$ LANGUAGE plpgsql;

    ```

    **Listing 13-11** Function supporting search using different combinations of parameters


    This function will always return the correct result, but from a performance standpoint,
    its behavior will be, at minimum, difficult to predict. Note that when searching
    by email address, the joins to the `booking_leg` and `flight` tables are not needed,
    but they will be still present.


    In the following, we recoded one possible sequence of calls and the execution
    times we observed for these executions.


    #1. Search on email.


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    WHERE lower(email) like ''lawton52%''

    ```


    As a `SELECT`, this takes 2.1 seconds.


    ```

    SELECT * FROM select_booking (''lawton52'',

    NULL,

    NULL,

    NULL,

    NULL

    )

    ```


    A comparable function execution takes 3.5 seconds.


    #2. Filter on email and `flight_id`.


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    WHERE lower(email) like ''lawton52%''

    AND flight_id= 2605

    ```


    The `SELECT` takes 80 ms.


    ```

    SELECT * FROM select_booking (

    ''lawton52'',

    NULL,

    NULL,

    NULL,

    NULL

    )

    ```


    Function execution takes the same 80 ms.


    #3. Criteria on email, departure airport, and arrival airport.


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton52%''

    AND departure_airport=''ORD''

    AND arrival_airport=''JFK''

    ```


    The `SELECT` takes 80 ms.


    ```

    SELECT * FROM select_booking (

    ''lawton52'',

    ''ORD'',

    ''JFK'',

    NULL,

    NULL

    )

    ```


    Function execution with the same parameters takes 200 ms.


    #4. Criteria on email, departure airport, arrival airport, and scheduled departure.


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton52%''

    AND departure_airport=''ORD''

    AND arrival_airport=''JFK''

    AND scheduled_departure BETWEEN ''07-26-2023'' AND ''07-27-2023''

    ```


    `SELECT` takes 46 ms.


    ```

    SELECT * FROM select_booking (

    ''lawton52'',

    ''ORD'',

    ''JFK'',

    ''2023-07-26'',

    NULL

    )

    ```'
