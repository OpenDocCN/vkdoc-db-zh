    END;

    $func$ LANGUAGE plpgsql;

    ```


    清单 13-12：一个构建动态 SQL 以根据不同条件进行搜索的函数


    这代码量可不少！让我们一步步来看，审视一下这里究竟发生了什么。


    新函数的参数与旧函数完全相同，结果类型也一致，但函数体完全不同。从高层次看，此函数在 `v_sql` 文本变量中构建了一条待执行的语句。


    动态构建查询意味着我们可以选择只包含所需的连接。`booking` 表总是需要的，这就是为什么 `v_sql` 的初始值被设置为


    ```sql

    ''SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    booking_name,

    account_id,

    email

    FROM  booking b '';

    ```


    然后，根据传入了哪些非 `NULL` 的参数，函数决定需要哪些其他表。如果 `p_flight_id` 参数为 `NULL`（即未使用与航班相关的参数），则可能只需要
    `booking_leg` 表。也可能需要两个表：`booking_leg` 和 `flight`。


    在添加了所有必要的表之后，通过用 `''AND''` 分隔符连接所有条件来构建完整的搜索条件。根据搜索条件，最终确定 `v_sql` 语句并执行。要查看不同函数调用下的最终查询是什么，请取消
    `RAISE NOTICE` 语句的注释。


    为了提升性能，这工作量是否太大？尝试编译此函数，并使用前面示例中的相同参数执行它。很快就能发现，对于每一组参数，`select_booking_dyn()`
    函数的执行时间都不超过相应 SQL 语句的执行时间——这在案例 #5 和 #6 中尤为明显。此外，执行时间是可预测的，并不取决于当前会话中的首次执行。


    再次强调，动态函数不易调试，你可能需要包含大量的调试输出，但如果你的生产系统性能至关重要，那么这些努力所带来的回报是非常值得的。'
- fmt: '## Using Dynamic SQL to Aid the Optimizer


    Since this whole chapter is dedicated to ways to improve query performance by
    using dynamic SQL, this section header might be puzzling. However, this section
    concerns a different cause of performance issues. In these examples, dynamic SQL
    is not used to construct case-specific SQL, but to nudge the optimizer to choose
    a better execution plan.


    Looking closely at all the examples in the previous section, one combination of
    the search criteria is performing notably poorly, even though the result set is
    small: the case when the search is on the email on the booking and the departure
    airport. Even in cases when email is restrictive enough, the optimizer fails to
    use the index on `booking_id` in the second join. If we execute the query in Listing
    [13-13](#501585_2_En_13_Chapter.xhtml#PC33), the execution plan shows hash joins—see
    Figure [13-4](#501585_2_En_13_Chapter.xhtml#Fig4).


    ```sql

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.account_id,

    b.email

    FROM booking b

    JOIN  booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton510%''

    AND departure_airport=''JFK''

    Listing 13-13

    Selecting booking by email and departure airport

    ```


    The execution time for this query is about four seconds, and the result contains
    only 16 rows, so this is a small query, and the execution time should be faster.


    The reason for this suboptimal plan has been mentioned before—the PostgreSQL optimizer
    does not estimate the size of intermediate result sets correctly. The actual number
    of rows filtered by the pattern index is 3941, while the estimate in the plan
    is 28219.


    ![](Images/501585_2_En_13_Fig4_HTML.jpg)


    A screenshot of a query plan. It has 23 lines of code to check the airport booking
    using hash joins.


    Figure 13-4


    Execution plan for Listing [13-13](#501585_2_En_13_Chapter.xhtml#PC33) with hash
    joins


    The technique to optimize this query is literally to help the optimizer do its
    job and remove the need to estimate the size of the result set. How? First, find
    the booking IDs that correspond to the email address that is being searched for,
    and then pass the list of `booking_id`s to the main `SELECT` statement. Note:
    The function that we use to illustrate this case is very case-specific and used
    for illustrative purposes only (Listing [13-14](#501585_2_En_13_Chapter.xhtml#PC34)).
    A function with a more generalized approach closer to what would be used in a
    production system would be massive.


    ```sql

    CREATE OR REPLACE FUNCTION select_booking_email_departure(

    p_email text,

    p_dep_airport text)

    RETURNS SETOF booking_record_basic AS

    $body$

    DECLARE

    v_sql text;

    v_booking_ids text;

    BEGIN

    EXECUTE $$SELECT array_to_string(array_agg(booking_id), '','')

    FROM booking

    WHERE lower(email) like $$||quote_literal(p_email||''%'')

    INTO v_booking_ids;

    v_sql=

    $$SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.account_id,

    b.email

    FROM booking b

    JOIN  booking_leg bl USING(booking_id)

    JOIN flight f USING (flight_id)

    WHERE b.booking_id IN ($$||v_booking_ids||$$)

    AND departure_airport=$$||quote_literal(p_dep_airport);

    RETURN QUERY EXECUTE v_sql;

    END;

    $body$ LANGUAGE plpgsql;

    Listing 13-14

    Dynamic SQL to improve the code from Listing 13-13

    ```


    Why does this work? We know that the search by email is going to be relatively
    restrictive, because what is passed is nearly the whole email address or, at least,
    the essential part of it. So, in the first step, the relatively small number of
    bookings with this email is preselected and saved in the text variable `v_booking_ids`.
    Then, the `SELECT` is constructed with an explicit list of `booking_id`s.


    Executing this new function


    ```sql

    SELECT * FROM select_booking_email_departure(''lawton510'',''JFK'')

    ```


    …the execution time will be just 200 ms. Examine the `EXPLAIN` command output
    for the generated SQL, including the execution plan as it appears in Figure [13-5](#501585_2_En_13_Chapter.xhtml#Fig5).


    ![](Images/501585_2_En_13_Fig5_HTML.jpg)


    A screenshot of a query plan. It has 16 lines of code to check the airport booking
    using the list of booking I Ds.


    Figure 13-5


    Execution plan for dynamic SQL with the list of `booking_id`s


    Even with several thousand IDs, the index-based access proves more efficient.


    ## FDWs and Dynamic SQL


    As mentioned in the Introduction, detailed discussion of distributed queries is
    out of the scope of this book. However, since dynamic SQL is covered, this is
    a good opportunity to make a few remarks about working with `foreign data wrappers
    (FDWs)`.


    A foreign data wrapper is a library that can communicate with an external data
    source (i.e., data that resides outside your PostgreSQL server), hiding the details
    of connecting to the data source and obtaining data from it.


    An FDW is a very powerful tool, and more and more foreign data wrappers for different
    types of databases are becoming available. PostgreSQL does an outstanding job
    optimizing queries that include `foreign tables`, that is, mappings of the tables
    from the external systems. However, since the access to external statistics may
    be limited, especially when the external systems are not PostgreSQL based, the
    optimization may be not so precise. We have found it very helpful to use the techniques
    described in the previous section.


    The first way to optimize would be to run the local part of the query identifying
    which records are needed from the remote server and then access a remote table.
    An alternative way is to send a query with constant-defined conditions (e.g.,
    `WHERE update_ts> CURRENT_DATE -3`) to the remote site, pull the remote data to
    the local site, and then execute the rest of the query. Using one of these two
    techniques helps minimize inconsistencies in the execution time.


    ## Summary


    Dynamic SQL is an exceptionally powerful tool in PostgreSQL, which is not utilized
    enough by database developers. Using dynamic SQL can improve performance in situations
    where all other optimization techniques fail.


    Dynamic SQL works best within functions; a SQL statement is generated based on
    function input parameters and then executed. It can be used both in OLTP and OLAP
    environments.


    If you choose to use dynamic SQL for your project, be ready for extensive and
    time-consuming debugging. It might feel discouraging in the beginning, but the
    performance improvements are well worth it.


    # 14. Avoiding the Pitfalls of Object-Relational Mapping


    Chapter [11](#501585_2_En_11_Chapter.xhtml) discussed a typical interaction between
    an application and a database and explained ORIM (object-relational impedance
    mismatch) and how it affects performance. It also stated that any potential solution
    should allow operating with large objects (i.e., datasets) and should support
    the exchange of complex objects. This chapter introduces an approach developed
    by us and successfully utilized in a production environment. This approach is
    called NORM (No-ORM).


    We are by no means pioneers in the quest to overcome object-relational impedance
    mismatch, nor are we the first to propose an alternative to ORM. NORM is only
    one of many possible solutions. However, one feature that makes NORM stand out
    among other tools is the ease of use by application developers.


    The NORM GitHub repo ([`https://github.com/hettie-d/NORM`](https://github.com/hettie-d/NORM))
    contains some documentation on the approach and an example of the code built according
    to the NORM methodology. Most importantly, it contains the set of procedures that
    allow to automate the function code generation. More details will be provided
    later in this chapter.'
