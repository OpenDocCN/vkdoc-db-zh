    ## 关于作者 关于技术审校者


    # 1. 为什么需要优化？


    本章介绍了为什么优化是数据库开发的重要组成部分。您将了解声明式语言（如 SQL）与命令式语言（如 Java，可能更为您熟悉）之间的区别，以及这些区别如何影响编程风格。我们还将证明优化不仅适用于数据库查询，也适用于数据库设计和应用架构。


    ## 我们所说的优化是什么意思？


    虽然大多数人认为数据库优化就是选择最佳的系统配置参数，但在本书的上下文中，优化是指任何能够提升系统性能的转换。这个定义是特意泛化的，因为我们想强调优化并不是一个独立的开发阶段。很多时候，数据库开发者试图先“让它跑起来”，然后再进行优化。我们认为这种方法并不高效。编写一个完全不知道其运行时间的查询，会带来一个本可以通过从一开始就正确编写来完全避免的问题。我们希望到您读完本书时，您能够准备好以恰恰这种方式进行优化：将其作为查询开发的一个组成部分。


    我们将展示一些具体的技术；然而，最重要的事情是理解数据库引擎如何处理一个查询，以及查询规划器如何决定选择何种执行路径。当我们在课堂环境中教授优化时，我们常说，“**像数据库一样思考！**”从数据库引擎的角度审视您的查询，想象它必须做什么来执行该查询；想象一下如果由您自己而不是数据库引擎来执行它，您需要做什么。通过思考工作范围，您可以避免强加次优的执行计划。这一点将在后续章节中更详细地讨论。


    如果您实践“**像数据库一样思考**”足够久，它将成为一种自然的思维方式，您将能够立即正确地编写查询，通常不再需要未来的优化。

    '
- fmt: '## Why It Is Difficult: Imperative and Declarative


    Why isn’t it enough to write a SQL statement that returns a correct result? That’s
    what we expect when we write application code. Why is it different in SQL, and
    why is it that two queries that yield the same result may drastically differ in
    execution time? The underlying source of the problem is that SQL is a declarative
    language. That means that when we write a SQL statement, we describe the result
    we want to get, but we do not specify *how* that result should be obtained. By
    contrast, in an imperative language, we specify *what* to do to obtain a desired
    result—that is, the sequence of steps that should be executed.


    As discussed in Chapter 2, the database optimizer chooses the best way of doing
    it. What is best is determined by many different factors, such as storage structures,
    indexes, and data statistics.


    ### Comparing Similar Queries


    Let’s look at a simple example: find the flights, including their departure and
    arrival airports, that are scheduled to arrive on October 14, 2023. Now, let’s
    consider the queries in Listings 1-1 and 1-2.


    ```

    SELECT

    flight_id

    ,departure_airport

    ,arrival_airport

    FROM flight

    WHERE scheduled_arrival ::date=''2023-10-14'' ;

    Listing 1-2

    A query selecting flights by casting to date

    ```


    ```

    SELECT

    flight_id

    ,departure_airport

    ,arrival_airport

    FROM flight

    WHERE scheduled_arrival >=''2023-10-14''

    AND scheduled_arrival <''2023-10-15'';

    Listing 1-1

    A query selecting flights with the comparison operators

    ```


    These two queries look almost identical and should yield identical results. However,
    the execution time will be different because the work done by the database engine
    will be different. In Chapter 5, we will explain why this happens and how to choose
    the best query from a performance standpoint.


    ### The Naturalness of Imperative Thinking


    Thinking imperatively is natural for humans. Generally, when we think about accomplishing
    a task, we think about the steps that we need to take. Similarly, when we think
    about a complex query, we think about the sequence of conditions we need to apply
    to achieve the desired result. However, if we force the database engine to follow
    this sequence strictly, the result might not be optimal.


    For example, let’s try to find out how many people with frequent flyer level 4
    fly out of Chicago for Independence Day. If at the first step you wanted to select
    all frequent flyers with level 4, you might write something like this:


    ```

    SELECT * FROM frequent_flyer WHERE level =4;

    ```


    Now that you have found all the records with `level = 4`, you can use them to
    find the corresponding accounts. The query will look like this:


    ```

    SELECT * FROM account WHERE frequent_flyer_id IN (

    SELECT frequent_flyer_id FROM frequent_flyer WHERE level =4

    );

    ```


    Great, you found accounts. On the next step, you want to find all bookings made
    by these accounts:


    ```

    WITH level4 AS (SELECT * FROM account WHERE

    frequent_flyer_id IN (

    SELECT frequent_flyer_id FROM frequent_flyer WHERE level =4

    )

    SELECT * FROM booking WHERE account_id IN

    (SELECT account_id FROM level4);

    ```


    But that’s not it! Remember, the original goal was to find frequent flyers who
    traveled to Chicago on July 3. Continuing to build the query imperatively, we
    can come up with the code presented in Listing 1-3.


    ```

    WITH bk AS (

    WITH level4 AS (SELECT *

    FROM account

    WHERE frequent_flyer_id IN (

    SELECT frequent_flyer_id

    FROM frequent_flyer

    WHERE level =4

    )

    )

    SELECT * FROM booking WHERE account_id IN

    (SELECT account_id FROM level4

    )

    )

    SELECT * FROM bk WHERE bk.booking_id IN

    (SELECT booking_id FROM booking_leg WHERE

    leg_num=1 AND is_returning IS false

    AND flight_id IN (

    SELECT flight_id

    FROM flight

    WHERE departure_airport IN (''ORD'', ''MDW'')

    AND scheduled_departure:: DATE=''2023-07-04'')

    )

    Listing 1-3

    Imperatively constructed query

    ```


    Now, imagine that in addition, you need to calculate the actual number of travelers.
    One way to do this would be with the query in Listing 1-4.


    ```

    WITH bk_chi AS (

    WITH bk AS (

    WITH level4 AS (SELECT *

    FROM account

    WHERE frequent_flyer_id IN (

    SELECT frequent_flyer_id

    FROM frequent_flyer

    WHERE level =4

    )

    )

    SELECT * FROM booking WHERE account_id IN

    (SELECT account_id FROM level4

    )

    )

    SELECT * FROM bk WHERE bk.booking_id IN

    (SELECT booking_id FROM booking_leg WHERE

    leg_num=1 AND is_returning IS false

    AND flight_id IN (

    SELECT flight_id

    FROM flight

    WHERE departure_airport IN (''ORD'', ''MDW'')

    AND scheduled_departure:: DATE=''2023-07-04'')

    )

    )

    SELECT count(*) FROM passenger WHERE booking_id IN (

    SELECT booking_id FROM bk_chi)

    Listing 1-4

    Calculating a total number of passengers

    ```


    With a query constructed like this, you are not letting the query planner choose
    the best execution path, because the sequence of actions is hard-coded. Although
    the preceding query is written in a declarative language, it is imperative by
    nature.


    ### Writing a Declarative Query


    Instead, to write a declarative query, simply specify what you need to retrieve
    from the database, as shown in Listing 1-5.


    ```

    SELECT count(*)

    FROM booking bk

    JOIN booking_leg bl ON bk.booking_id=bl.booking_id

    JOIN flight f ON f.flight_id=bl.flight_id

    JOIN account a ON a.account_id=bk.account_id

    JOIN frequent_flyer ff ON ff.frequent_flyer_id=a.frequent_flyer_id

    JOIN passenger ps ON ps.booking_id=bk.booking_id

    WHERE level=4

    AND leg_num=1

    AND is_returning IS false

    AND departure_airport IN (''ORD'', ''MDW'')

    AND scheduled_departure >= ''2023-07-04''

    AND scheduled_departure <''2023-07-05''

    Listing 1-5

    Declarative query to calculate the number of passengers

    ```


    This way, you allow the database to decide which order of operations is best,
    which may vary depending on the distribution of values in the relevant columns.


    You may want to run these queries after all required indexes are built in Chapter
    5.'
