  trans: '

    ## PostgreSQL 的特性


    尽管前一节所述的原则适用于任何关系型数据库，但 PostgreSQL 和其他数据库一样，也有一些需要考虑的特性。如果你之前有优化其他数据库的经验，可能会发现你的大部分知识并不适用。不要认为这是
    PostgreSQL 的缺陷；只需记住 PostgreSQL 在很多方面的处理方式都与众不同。


    对于曾经的 Oracle 用户来说，最重要的一点是要意识到 PostgreSQL 不会缓存查询；它只缓存 `共享缓冲区` 中的数据。Oracle 会生成一个通用的执行计划，可供多个连接使用，而
    PostgreSQL 则会在每次执行查询时生成一个新的执行计划。即使所有必要的数据都已在主内存中，查询本身也必须被执行。这种行为差异在转换到 Oracle
    后可能会严重降低应用程序性能。本书后续章节将讨论解决此问题的方法。


    缺少缓存的查询计划导致了另一个重要区别：参数化查询与动态 SQL 执行之间的差异。本书第 13 章专门讨论了动态 SQL 的使用，这是一个常被忽视的选项。


    你应该注意的另一个重要 PostgreSQL 特性是，它没有优化器提示。如果你之前使用过像 Oracle 这样确实有“提示”选项来指导优化器的数据库，那么面对优化
    PostgreSQL 查询的挑战时，你可能会感到无助。然而，这里有个好消息：PostgreSQL 从设计上就没有提示。PostgreSQL 核心团队相信，应该投入精力开发一个无需提示就能选择最佳执行路径的查询规划器。因此，PostgreSQL
    的优化引擎在商业和开源系统中都是最好的之一。许多强大的数据库内部开发者都因其优化器而被 Postgres 吸引。此外，Postgres 被选为几个商业数据库的创始代码库，部分原因也在于其优化器。对于
    PostgreSQL 来说，以声明式方式编写 SQL 语句，让优化器完成它的工作，就显得更加重要。


    在使用 PostgreSQL 时，特别需要注意每个版本新增的功能和能力。近年来，Postgres 每年新增超过 180 项功能。其中许多功能与优化相关。我们不打算涵盖所有功能；此外，在本章撰写和出版之间，无疑会有更多新功能加入。PostgreSQL
    拥有一套极其丰富的数据类型和索引，总是值得查阅最新的文档，看看你想要的功能是否已经被实现了。


    本书后续部分将讨论更多 PostgreSQL 特性。


    ## 总结


    编写数据库查询与使用命令式语言编写应用程序代码不同。SQL 是一种声明式语言，这意味着我们指定期望的结果，而不指定执行路径。由于产生相同结果的两个查询可能以不同的方式执行，利用不同的资源并花费不同的时间，因此优化和“像数据库一样思考”是
    SQL 开发的核心部分。


    我们的目标不是优化已经写好的查询，而是从一开始就正确地编写查询。理想情况下，优化在收集需求和设计数据库时就开始了。然后，我们可以继续优化单个查询以及从应用程序调用数据库的结构。但优化并不止于此；为了保持系统性能，我们需要在系统的整个生命周期内监控性能，并持续寻找优化的机会。


    ## 2. 理论：是的，我们需要它！


    为了编写高性能的查询，数据库开发者需要理解数据库引擎如何处理查询。要做到这一点，我们需要了解关系理论的基础。如果“理论”这个词听起来太枯燥，我们可以称之为“数据库查询的隐秘生活”。在本章中，我们将探讨这个“隐秘生活”，解释当你点击“执行”或按下回车键，到看到数据库返回的结果集之间，数据库查询经历了什么。


    如前一章所述，SQL 查询指定了需要什么结果或数据库中必须更改什么，但没有指定如何确切地执行请求的操作。将源 SQL 查询转换为可执行代码并执行它是数据库引擎的工作。本章涵盖了数据库引擎在解释
    SQL 查询时所使用的操作及其理论基础。


    ### 查询处理概述


    为了产生查询结果，PostgreSQL 执行以下步骤：


    *   编译 SQL 语句并将其转换为由高级逻辑操作组成的表达式，称为逻辑计划。

    *   优化逻辑计划并将其转换为执行计划。

    *   执行（解释）该计划并返回结果。


    #### 编译


    编译 SQL 查询类似于编译用命令式语言（如 Java 或 Python）编写的代码。源代码被解析，并生成内部表示。然而，SQL 语句的编译有两个本质区别。


    首先，在命令式语言中，标识符的定义通常包含在源代码中，而 SQL 查询中引用的对象的定义则大多存储在数据库中。因此，查询的含义依赖于数据库结构：例如，一个同名的对象在一个数据库中可能是一个表，在另一个数据库中可能是一个视图，在还有一个数据库中可能是一个函数。


    其次，命令式语言编译器的输出通常是（接近）可执行的代码，例如 Java 虚拟机的字节码。相比之下，查询编译器的输出是一个由高级操作组成的表达式，这些操作仍然是声明式的——它们没有给出任何关于如何获取所需输出的指令。此时指定了操作可能的执行顺序，但没有指定执行这些操作的方式。

    '
- fmt: '### Optimization and Execution


    The instructions on how to execute the query appear at the next phase of query
    processing, optimization. The optimizer performs two kinds of transformations:
    it replaces logical operations with their execution algorithms and possibly changes
    the logical expression structure by changing the order in which logical operations
    will be executed.


    Neither of these transformations is straightforward; a logical operation can be
    computed using different algorithms, and the optimizer tries to choose the best
    one. The same query may be represented with several equivalent expressions producing
    the same result but requiring a significantly different amount of computational
    resources for execution. The optimizer tries to find a logical plan and physical
    operations that minimize required resources, including execution time. This search
    requires sophisticated algorithms that are out of scope for this book. However,
    we do cover how an optimizer estimates the amount of resources needed for physical
    operations and how these resources depend on the specifics of how data is stored
    and the amount of data stored.


    The output of the optimizer is an expression containing physical operations. This
    expression is called a (physical) execution plan. For that reason, the PostgreSQL
    optimizer is called the query planner.


    Finally, the query execution plan is interpreted by the query execution engine,
    frequently referred to as the executor in the PostgreSQL community, and output
    is returned to the client application.


    Let’s take a closer look at each step of query processing and the operations each
    uses.


    ## Relational, Logical, and Physical Operations


    To go deeper into how SQL is understood by the database engine, we must at last
    confront this chapter’s titular concern: theory. Many modern database management
    systems, including PostgreSQL, are called relational because they are based on
    relational theory. Despite some bad press (that theory is dry, incomprehensible,
    or irrelevant), understanding a small part of relational theory is essential to
    master optimization—specifically, relational operations. To be more precise, we
    will need to understand how relational operations correspond to logical operations
    and the query language used in queries. The previous section covered three steps
    of query processing at a high level; this section describes each level in more
    detail, starting with descriptions of relational operations.


    Some readers may think the material covered here is trivial and find it already
    familiar, while others may feel that this is introducing an unnecessary complication.
    For now, hang in there and trust that this is building a foundation for what comes
    next.


    ### Relational Operations


    The central concept of relational theory is a *relation*. For our purposes, we
    view a relation as a table, although academics may quibble that this elides some
    subtle but important differences.


    Any relational operation takes one or more relations as its arguments and produces
    another relation as its output. This output can be used as an argument for another
    relational operation producing yet another relation that, in turn, can become
    an argument. This way, we can build complex expressions and represent complex
    queries. The possibility to construct complex expressions makes the set of relational
    operations (called *relational algebra*) a powerful query language.


    Moreover, expressions in relational algebra can be used to define additional operations.


    The first three operations to be discussed are *filter*, *project*, and *product*.


    ![](Images/501585_2_En_2_Fig1_HTML.jpg)


    A three-dimensional model of a cup-shaped filter where 11 droplets poured in get
    filtered to give 6 droplets.


    Figure 2-1


    Filter


    The *filter* operation (represented in Figure 2-1) is often called selection and
    is called restriction in relational theory. We prefer to use the term *filter*
    to avoid confusion with the SQL `SELECT` statement, while the term *restriction*
    has too deep of mathematical origins. This operation accepts a single relation
    as an argument and includes in its output all tuples (or rows) satisfying the
    condition specified as a filtering condition, for example:


    ```sql

    SELECT *

    FROM flight

    WHERE departure_airport=''LAG''

    AND (arrival_airport=''ORD''

    OR arrival_airport=''MDW'')

    AND scheduled_departure BETWEEN ''2023-05-27'' AND

    ''2023-05-28''

    ```


    Here, we start from the relation `flight` and apply restrictions on the values
    of `arrival_airport`, `departure_airport`, and `scheduled_departure` attributes.
    The result is a set of records, that is, also a relation.


    ![](Images/501585_2_En_2_Fig2_HTML.jpg)


    A three-dimensional model of a projector mounted on a tripod projecting a 4 by
    3 grid on a screen.


    Figure 2-2


    Project


    The *project* operation (represented in Figure 2-2) similarly takes a single relation
    as an argument and removes some attributes (columns). The relational project operation
    also removes duplicates from the output, while the SQL project operation does
    not, for example:


    ```sql

    SELECT city, zip FROM address

    ```


    when executed in PostgreSQL will return as many rows as there are records in the
    `address` table. But if we perform the relational operation `project`, it would
    leave one record for each zip code. To achieve the same result in PostgreSQL,
    we would need to add the `DISTINCT` keyword:


    ```sql

    SELECT DISTINCT city, zip FROM address

    ```


    ![](Images/501585_2_En_2_Fig3_HTML.jpg)


    A three-dimensional model of a Cartesian product represented by small bars of
    4 column elements and 3 row elements. The respective products in the matrix are
    small rectangles with their centers positioned at different points.


    Figure 2-3


    Product


    The *product* operation (also called a Cartesian product and represented by Figure
    2-3) produces the set of all pairs of rows from its first and second arguments.
    It is very difficult to find a real-life, useful example of a product, but let’s
    imagine we want to find all possible flights that might exist (from any airport
    in the world to any airport in the world). The product operation will look like
    this:


    ```sql

    SELECT

    d.airport_code AS departure_airport,

    a.airport_code AS arrival_airport

    FROM  airport a,

    airport d

    ```'
