    # Introduction


    “Optimization” is a broad enough term to encompass performance tuning, personal
    improvement, and marketing via social engine and invariably evinces high hopes
    and expectations from readers. As such, it is prudent to begin not by introducing
    what is covered, but rather, why this book exists and what will not be covered,
    to avoid disappointing readers who approach it with inappropriate expectations.
    Then, we proceed with what this book is about, the target audience, what is covered,
    and how to get the most use out of it.


    ## Why We Wrote This Book


    Like many authors, we wrote this book because we felt we could not `not` write
    it. We are educators and practitioners; as such, we see both how and what computer
    science students are taught in class and what knowledge they lack when they enter
    the workforce. We do not like what we see and hope this book will help bridge
    this gap.


    When learning about data management, most students never see a real production
    database, and even more alarming, many of their professors never see one, either.
    While lack of exposure to real-life systems affects all computer science students,
    the education of future database developers and database administrators (`DBA`s)
    suffers the most. Using a small training database, students can learn how to write
    syntactically correct `SQL` and perhaps even write a `SELECT` statement that accurately
    retrieves desired data. However, learning to write performant queries requires
    a production-sized dataset. Moreover, it might not be evident that performance
    might present a problem if a student is working with a dataset that can easily
    fit into the computer’s main memory and return a result in milliseconds regardless
    of the complexity of the query.


    In addition to lacking exposure to realistic datasets, students often don’t use
    `DBMS`s that are widely used in industry. While the preceding statement is true
    in relation to many `DBMS`s, in the case of `PostgreSQL`, it is even more frustrating.
    `PostgreSQL` originated in an academic environment and is maintained as an open
    source project, making it an ideal database for teaching relational theory and
    demonstrating database internals. However, so far, few academic institutions have
    adopted `PostgreSQL` for their educational needs.


    As `PostgreSQL` is rapidly developing and becoming a more powerful tool, more
    and more businesses are choosing it over proprietary `DBMS`s, in part to reduce
    costs. More and more `IT` managers are looking for employees who are familiar
    with `PostgreSQL`. More and more potential candidates learn to use `PostgreSQL`
    on their own and miss opportunities to get the most out of it.


    We hope that this book will help all interested parties: candidates, hiring managers,
    database developers, and organizations that are switching to `PostgreSQL` for
    their data needs.


    ## What Won’t Be Covered


    Often, when users start to complain that “everything is slow” or nightly backups
    finish in broad daylight and everyone seems to be saying that “the database needs
    to be optimized,” conversations are almost exclusively focused on database configuration
    parameters and occasionally on underlying `Linux` parameters. It is often assumed
    that as soon as the correct values for parameters are chosen and the database
    instance has been restarted, all the world’s problems will be solved.


    Countless times, we have worked with customers expecting magical incantations
    and cheat codes. Countless times, these customers have expressed a deep disappointment
    when the “wizards” to whom they have appealed suggest looking for the queries
    that are executed most often or check for missing indexes. After listening politely
    to all our suggestions, they kept asking: So can you suggest `any other parameter
    changes`?


    Indeed, it is tempting to be able to solve every problem at once. That temptation
    leads to the popular belief that there is a sort of dark magic and secret codes,
    a button hidden under a desk somewhere that makes the database run faster.


    Since we are aware of these misconceptions, we want to be transparent from the
    very beginning. The following is the list of topics that are often discussed in
    books about optimization but will not be covered in this book and why:


    *   `Server optimization` – With the mass migration to various cloud environments
    and existing organizational structures, database developers are unlikely to have
    a say in how servers are configured.

    *   `PostgreSQL configuration parameters` – In this second edition of the book,
    we do cover this topic. However, it comprises a relatively small portion of the
    book, as their impact on performance is overrated, as we will demonstrate, and
    usually, database developers do not have the necessary privileges to alter them
    (with a few exceptions).

    *   `Distributed systems` – We do not have enough industrial experience with them.

    *   `Transactions` – Their impact on performance is very limited (although we
    will cover some cases when they can have a major impact).

    *   `New and cool features` – These change with every new release, and our goal
    is to cover the fundamentals.

    *   `Magic, rituals, cheat codes, etc.` – We are not proficient in these approaches
    to optimization.


    There are plenty of books available that cover all of the topics listed previously,
    except the last, but this book is not one of them. Instead, we focus on everyday
    challenges database developers face: when that one application page keeps timing
    out, when a customer is kicked out of the application just before the “Contract
    Signed” page, when the `CEO` dashboard is showing an hourglass instead of yesterday’s
    product `KPI`, or when procuring more hardware is not an option.


    Everything we are presenting in this book has been tested and implemented in an
    industrial environment, and though it may look like magic, we will explain any
    query performance improvement or lack thereof.'
