  trans: '

    ### 函数参数与函数输出：空函数


    大多数情况下，函数会有一个或多个参数，但也可能没有参数。例如，内部函数 `now()` 用于返回当前时间戳，它没有任何参数。我们可以为任何函数参数指定默认值，以便在未显式传递特定值时使用。


    此外，定义函数参数的方式有多种。在清单 12-3 的示例中，参数是 `命名的`，但它们也可以是位置参数（`$1`、`$2` 等）。有些参数可能被定义为 `OUT`
    或 `INOUT`，而不是指定返回类型。同样，本章无意涵盖所有可能的规范，因为函数的性能并不依赖于所有这些规范变化。


    最后，需要重点注意的是，函数可能不返回任何值；在这种情况下，函数被指定为 `RETURNS VOID`。这个选项之所以存在，是因为以前 PostgreSQL
    不支持存储过程，所以将多条语句打包在一起的唯一方式就是在函数内部。


    ### 函数重载


    与其他编程语言类似，PostgreSQL 中的函数可以是多态的，即多个函数可以使用相同的名称但具有不同的签名。这个特性被称为 `函数重载`。如前所述，函数由其名称和输入参数集定义；对于不同的输入参数集，返回类型可以不同，但出于显而易见的原因，两个函数不能同时共享相同的名称和相同的输入参数集。


    让我们看一下清单 12-5 中的例子。在案例 #1 中，创建了一个计算特定航班乘客数量的函数。在案例 #2 中，创建了一个同名函数，用于计算特定日期从特定机场出发的乘客数量。


    但是，如果您尝试运行代码片段 #3 来创建一个计算特定航班号在特定日期的乘客数量的函数，您将收到错误：


    ```

    ERROR: cannot change name of input parameter "p_airport_code".

    ```


    您可以创建一个名称相同但参数集和返回类型不同的函数；因此，您可以创建另一个同名函数，如案例 #4 所示。但是，如果您尝试创建一个名称相同、返回类型不同但参数相同的函数（案例
    #5），数据库将抛出错误：


    ```

    #1

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS integer;

    #2

    CREATE OR REPLACE FUNCTION num_passengers(p_airport_code text, p_departure date)
    RETURNS integer;

    #3

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_no text, p_departure date)
    RETURNS integer;

    #4

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_no text) RETURNS numeric;

    #5

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS numeric;

    清单 12-5

    函数重载

    ```


    ```

    ERROR: cannot change return type of existing function

    ```


    请注意，这些函数的源代码有显著差异。清单 12-6 展示了 `num_passengers(integer)` 函数的源代码，清单 12-7 展示了 `num_passengers(text,
    date)` 函数的代码。


    ```

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS integer

    AS

    $$BEGIN

    RETURN (

    SELECT count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p USING (booking_id)

    WHERE flight_id=p_flight_id);

    END;

    $$ LANGUAGE plpgsql;

    清单 12-6

    num_passengers(int) 的源代码

    ```


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS

    $$BEGIN

    RETURN (

    SELECT count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=p_airport_code

    AND scheduled_departure BETWEEN p_departure AND p_departure +1)

    ;

    END;

    $$ LANGUAGE plpgsql;

    清单 12-7

    num_passengers(text, date) 的源代码

    ```

    '
- fmt: '## Function Execution


    To execute a function, we use the `SELECT` operator. Listing [12-8](#501585_2_En_12_Chapter.xhtml#PC10)
    demonstrates two possible ways to execute the function `num_passengers` with the
    `p_flight_id` parameter set to 13.


    ```

    SELECT num_passengers(13);

    SELECT * FROM num_passengers(13);

    Listing 12-8

    Function execution

    ```


    For functions that return scalar values, either syntax will produce identical
    results. Complex types are covered later in this chapter.


    It is also worth noting that user-defined scalar functions can be used in `SELECT`
    statements, just like internal functions. Recall the function `text_to_numeric`
    in Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3). You might wonder why somebody
    would need to create a user-defined conversion function when PostgreSQL already
    has three different ways to convert a string to an integer. For the record, these
    three ways are


    *   `CAST (text_value AS numeric)`


    *   `text_value::numeric` (this is alternative syntax for `CAST`)


    *   `to_number(text_value, ''999999999999'')`—using an internal function


    Why is a custom conversion function needed? For any of the methods listed in the
    preceding list, if the input text string contains symbols other than numerals,
    the attempted conversion results in an error.


    To make sure that the conversion function does not fail, we include the `exception
    processing section` in the function body. The section starts with the `EXCEPTION`
    keyword; the `WHEN` keyword may identify specific exception types. In this chapter,
    we will use it only in the form `WHEN OTHERS`, which means all exception types
    not included in previous `WHEN` conditions. If, as in Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3),
    `WHEN OTHERS` is used by itself, it means all exceptions should be processed in
    the same way.


    In Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3), this means that any conversion
    error (or, actually, any error) should not fail the function, but instead return
    `NULL`. Why is it so critical for a function not to fail when a “bad” parameter
    is passed? Because this function is being used in a `SELECT` list.


    In Chapter [7](#501585_2_En_7_Chapter.xhtml), we created the materialized view
    `passenger_passport` (see Listing [7-11](#501585_2_En_7_Chapter.xhtml#PC11)).
    Different columns of this materialized view should contain different data types,
    but since in the source data, all these fields are text fields, there is not much
    we can do. Now, if you want to select the `passport_num` as a numeric type, your
    `SELECT` might look like this:


    ```

    SELECT

    passenger_id,

    passport_num::numeric AS passport_number

    FROM passenger_passport

    ```


    If, in even one instance, the `passport_num` column contains a non-numeric value
    (e.g., a blank or an empty string), then the whole `SELECT` statement will fail.
    Instead, we can use the custom function `text_to_integer`:


    ```

    SELECT

    passenger_id,

    text_to_numeric(passport_num) AS passport_number

    FROM passenger_passport

    ```


    Let’s create one more user-defined function, `text_to_date`, which will transform
    a string that contains a date to type `date`—see Listing [12-9](#501585_2_En_12_Chapter.xhtml#PC13).


    ```

    CREATE OR REPLACE FUNCTION text_to_date(input_text text)

    RETURNS date AS

    $BODY$

    BEGIN

    RETURN input_text::date;

    EXCEPTION WHEN OTHERS THEN

    RETURN null::date;

    END;

    $BODY$

    LANGUAGE plpgsql;

    Listing 12-9

    Function converting text to date

    ```


    Now, we can use both functions in Listing [12-10](#501585_2_En_12_Chapter.xhtml#PC14).


    ```

    SELECT

    passenger_id,

    text_to_integer(passport_num) AS passport_num,

    text_to_date(passport_exp_date) AS passport_exp_date

    FROM passenger_passport

    Listing 12-10

    Using functions in a SELECT list

    ```


    Although this example seems like a perfect use case for functions in PostgreSQL,
    in reality it represents a far from ideal solution when it comes to performance—as
    discussed in the following.


    ## Function Execution Internals


    This section explains some specifics of function execution that are unique to
    PostgreSQL. If you have previous experience with a DBMS like Oracle or MS SQL
    Server, you might assume a thing or two about function execution that are not
    true in PostgreSQL.


    The first surprise might come when you execute a `CREATE FUNCTION` statement and
    receive a completion message that looks something like this:


    ```

    CREATE FUNCTION

    Query returned successfully in 127 msec.

    ```


    Reading this, you might assume your function does not contain any errors. To illustrate
    what may go wrong afterward, let’s compile the code in Listing [12-11](#501585_2_En_12_Chapter.xhtml#PC16).
    If you copy and execute this statement, you will receive a successful creation
    message.


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS $$

    BEGIN

    RETURN (

    SELECT

    count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p  USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE airport_code=p_airport_code

    AND scheduled_departure BETWEEN p_date AND p_date +1);

    END;

    $$ LANGUAGE plpgsql;

    Listing 12-11

    Create a function that will complete with no errors

    ```


    However, when you try to execute this function


    ```

    SELECT num_passengers(''ORD'', ''2020-07-05'')

    ```


    …you will receive an error message:


    ```

    ERROR: column "airport_code" does not exist

    ```


    What went wrong? The function uses `airport_code` instead of `departure_airport`.
    This is an easy mistake to make, but you might not expect that PostgreSQL would
    never inform you that you made this mistake in the first place, when you created
    the function.


    Now, if you correct this mistake and run a new `CREATE FUNCTION` statement (see
    Listing [12-12](#501585_2_En_12_Chapter.xhtml#PC20)), you will get yet another
    error:


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS $$

    BEGIN

    RETURN (

    SELECT

    count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p  USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport =p_airport_code

    AND scheduled_departure BETWEEN p_date AND p_date +1);

    END;

    $$ LANGUAGE plpgsql;

    Listing 12-12

    Create a function: one error corrected, one more still there

    ```


    ```

    ERROR: column "p_date" does not exist

    ```


    And PostgreSQL is right, since the name of the parameter is `p_departure_date`,
    not `p_date`. Still, why wasn’t this error reported earlier?


    During function creation, PostgreSQL performs only an initial parsing pass, during
    which only trivial syntax errors are detected. Anything deeper will not be detected
    until execution. If you are fresh from Oracle and assume that when you create
    a function, it is compiled by the database engine and stored compiled, this is
    bad news. Not only are functions stored in the form of source code but moreover,
    in contrast to other DBMSs, functions are interpreted, not compiled.


    The PL/pgSQL interpreter parses the function’s source text and produces an (internal)
    instruction tree the first time the function is called within each session. Even
    then, individual SQL expressions and commands used in the function are not translated
    immediately. Only when the execution path reaches a specific command is it analyzed
    and a `prepared statement` is created. It will be reused if the same function
    is executed again in the same session. One of the implications of this is that
    if your function contains some conditional code (i.e., `IF THEN ELSE` or `CASE`
    statements), you may not even discover the syntax errors in your code, if this
    portion was not reached during execution. We’ve seen these kinds of unpleasant
    discoveries made long after the function went into production. To summarize, when
    you create a PL/pgSQL function


    1.  No execution plan is saved.


    2.  No checks for existence of tables, columns, or other functions are performed.'
  raw: '## Function Execution


    To execute a function, we use the `SELECT` operator. Listing [12-8](#501585_2_En_12_Chapter.xhtml#PC10)
    demonstrates two possible ways to execute the function num_passengers with the
    p_flight_id parameter set to 13.


    ```

    SELECT num_passengers(13);

    SELECT * FROM num_passengers(13);

    Listing 12-8

    Function execution

    ```


    For functions that return scalar values, either syntax will produce identical
    results. Complex types are covered later in this chapter.


    It is also worth noting that user-defined scalar functions can be used in `SELECT`
    statements, just like internal functions. Recall the function `text_to_numeric`
    in Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3). You might wonder why somebody
    would need to create a user-defined conversion function when PostgreSQL already
    has three different ways to convert a string to an integer. For the record, these
    three ways are


    *   `CAST (text_value AS numeric)`


    *   `text_value::numeric` (this is alternative syntax for `CAST`)


    *   `to_number(text_value, ''999999999999'')`—using an internal function


    Why is a custom conversion function needed? For any of the methods listed in the
    preceding list, if the input text string contains symbols other than numerals,
    the attempted conversion results in an error.


    To make sure that the conversion function does not fail, we include the *exception
    processing section* in the function body. The section starts with the `EXCEPTION`
    keyword; the `WHEN` keyword may identify specific exception types. In this chapter,
    we will use it only in the form `WHEN OTHERS`, which means all exception types
    not included in previous `WHEN` conditions. If, as in Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3),
    `WHEN OTHERS` is used by itself, it means all exceptions should be processed in
    the same way.


    In Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3), this means that any conversion
    error (or, actually, any error) should not fail the function, but instead return
    `NULL`. Why is it so critical for a function not to fail when a “bad” parameter
    is passed? Because this function is being used in a `SELECT` list.


    In Chapter [7](#501585_2_En_7_Chapter.xhtml), we created the materialized view
    `passenger_passport` (see Listing [7-11](#501585_2_En_7_Chapter.xhtml#PC11)).
    Different columns of this materialized view should contain different data types,
    but since in the source data, all these fields are text fields, there is not much
    we can do. Now, if you want to select the `passport_num` as a numeric type, your
    SELECT might look like this:


    ```

    SELECT

    passenger_id,

    passport_num::numeric AS passport_number

    FROM passenger_passport

    ```


    If, in even one instance, the `passport_num` column contains a non-numeric value
    (e.g., a blank or an empty string), then the whole `SELECT` statement will fail.
    Instead, we can use the custom function `text_to_integer`:


    ```

    SELECT

    passenger_id,

    text_to_numeric(passport_num) AS passport_number

    FROM passenger_passport

    ```


    Let’s create one more user-defined function, `text_to_date`, which will transform
    a string that contains a date to type date—see Listing [12-9](#501585_2_En_12_Chapter.xhtml#PC13).


    ```

    CREATE OR REPLACE FUNCTION text_to_date(input_text text)

    RETURNS date AS

    $BODY$

    BEGIN

    RETURN input_text::date;

    EXCEPTION WHEN OTHERS THEN

    RETURN null::date;

    END;

    $BODY$

    LANGUAGE plpgsql;

    Listing 12-9

    Function converting text to date

    ```


    Now, we can use both functions in Listing [12-10](#501585_2_En_12_Chapter.xhtml#PC14).


    ```

    SELECT

    passenger_id,

    text_to_integer(passport_num) AS passport_num,

    text_to_date(passport_exp_date) AS passport_exp_date

    FROM passenger_passport

    Listing 12-10

    Using functions in a SELECT list

    ```


    Although this example seems like a perfect use case for functions in PostgreSQL,
    in reality it represents a far from ideal solution when it comes to performance—as
    discussed in the following.


    ## Function Execution Internals


    This section explains some specifics of function execution that are unique to
    PostgreSQL. If you have previous experience with a DBMS like Oracle or MS SQL
    Server, you might assume a thing or two about function execution that are not
    true in PostgreSQL.


    The first surprise might come when you execute a `CREATE FUNCTION` statement and
    receive a completion message that looks something like this:


    ```

    CREATE FUNCTION

    Query returned successfully in 127 msec.

    ```


    Reading this, you might assume your function does not contain any errors. To illustrate
    what may go wrong afterward, let’s compile the code in Listing [12-11](#501585_2_En_12_Chapter.xhtml#PC16).
    If you copy and execute this statement, you will receive a successful creation
    message.


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS $$

    BEGIN

    RETURN (

    SELECT

    count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p  USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE airport_code=p_airport_code

    AND scheduled_departure BETWEEN p_date AND p_date +1);

    END;

    $$ LANGUAGE plpgsql;

    Listing 12-11

    Create a function that will complete with no errors

    ```


    However, when you try to execute this function


    ```

    SELECT num_passengers(''ORD'', ''2020-07-05'')

    ```


    …you will receive an error message:


    ```

    ERROR: column "airport_code" does not exist

    ```


    What went wrong? The function uses `airport_code` instead of `departure_airport`.
    This is an easy mistake to make, but you might not expect that PostgreSQL would
    never inform you that you made this mistake in the first place, when you created
    the function.


    Now, if you correct this mistake and run a new `CREATE FUNCTION` statement (see
    Listing [12-12](#501585_2_En_12_Chapter.xhtml#PC20)), you will get yet another
    error:


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS $$

    BEGIN

    RETURN (

    SELECT

    count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p  USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport =p_airport_code

    AND scheduled_departure BETWEEN p_date AND p_date +1);

    END;

    $$ LANGUAGE plpgsql;

    Listing 12-12

    Create a function: one error corrected, one more still there

    ```


    ```

    ERROR: column "p_date" does not exist

    ```


    And PostgreSQL is right, since the name of the parameter is `p_departure_date`,
    not `p_date`. Still, why wasn’t this error reported earlier?


    During function creation, PostgreSQL performs only an initial parsing pass, during
    which only trivial syntax errors are detected. Anything deeper will not be detected
    until execution. If you are fresh from Oracle and assume that when you create
    a function, it is compiled by the database engine and stored compiled, this is
    bad news. Not only are functions stored in the form of source code but moreover,
    in contrast to other DBMSs, functions are interpreted, not compiled.


    The PL/pgSQL interpreter parses the function’s source text and produces an (internal)
    instruction tree the first time the function is called within each session. Even
    then, individual SQL expressions and commands used in the function are not translated
    immediately. Only when the execution path reaches a specific command is it analyzed
    and a *prepared statement* is created. It will be reused if the same function
    is executed again in the same session. One of the implications of this is that
    if your function contains some conditional code (i.e., `IF THEN ELSE` or `CASE`
    statements), you may not even discover the syntax errors in your code, if this
    portion was not reached during execution. We’ve seen these kinds of unpleasant
    discoveries made long after the function went into production. To summarize, when
    you create a PL/pgSQL function


    1.  No execution plan is saved.


    2.  No checks for existence of tables, columns, or other functions are performed.'
  trans: '## 函数执行


    要执行一个函数，我们使用 `SELECT` 操作符。代码清单 12-8 展示了执行带有 `p_flight_id` 参数（设置为 13）的函数 `num_passengers`
    的两种可能方式。


    ```

    SELECT num_passengers(13);

    SELECT * FROM num_passengers(13);

    代码清单 12-8

    函数执行

    ```


    对于返回标量值的函数，两种语法都会产生相同的结果。复杂类型将在本章后面介绍。


    同样值得注意的是，用户定义的标量函数可以像内置函数一样用在 `SELECT` 语句中。回顾代码清单 12-3 中的函数 `text_to_numeric`。你可能会疑惑，当
    PostgreSQL 已经有三种将字符串转换为整数的方法时，为什么还需要创建用户定义的转换函数。记录一下，这三种方式是：


    *   `CAST (text_value AS numeric)`

    *   `text_value::numeric`（这是 `CAST` 的替代语法）

    *   `to_number(text_value, ''999999999999'')`——使用内置函数


    为什么需要自定义转换函数？对于上述列表中的任何方法，如果输入文本字符串包含数字以外的符号，尝试转换都会导致错误。


    为了确保转换函数不会失败，我们在函数体中包含了 `异常处理部分`。该部分以 `EXCEPTION` 关键字开始；`WHEN` 关键字可以识别特定的异常类型。在本章中，我们将仅使用
    `WHEN OTHERS` 形式，这意味着处理所有未包含在前面的 `WHEN` 条件中的异常类型。如果像代码清单 12-3 那样单独使用 `WHEN OTHERS`，则意味着所有异常都应以相同方式处理。


    在代码清单 12-3 中，这意味着任何转换错误（或者实际上是任何错误）都不会导致函数失败，而是返回 `NULL`。为什么当传递“坏”参数时，函数不失败如此关键？因为这个函数被用在
    `SELECT` 列表中。


    在第 7 章中，我们创建了物态化视图 `passenger_passport`（参见代码清单 7-11）。该物态化视图的不同列应包含不同的数据类型，但由于在源数据中，所有这些字段都是文本字段，我们能做的很有限。现在，如果你想将
    `passport_num` 作为数值类型选择，你的 `SELECT` 可能如下所示：


    ```

    SELECT

    passenger_id,

    passport_num::numeric AS passport_number

    FROM passenger_passport

    ```


    如果在任何一个实例中，`passport_num` 列包含非数值（例如，空格或空字符串），那么整个 `SELECT` 语句将会失败。相反，我们可以使用自定义函数
    `text_to_integer`：


    ```

    SELECT

    passenger_id,

    text_to_numeric(passport_num) AS passport_number

    FROM passenger_passport

    ```


    让我们再创建一个用户定义函数 `text_to_date`，它将把包含日期的字符串转换为 `date` 类型——参见代码清单 12-9。


    ```

    CREATE OR REPLACE FUNCTION text_to_date(input_text text)

    RETURNS date AS

    $BODY$

    BEGIN

    RETURN input_text::date;

    EXCEPTION WHEN OTHERS THEN

    RETURN null::date;

    END;

    $BODY$

    LANGUAGE plpgsql;

    代码清单 12-9

    将文本转换为日期的函数

    ```


    现在，我们可以在代码清单 12-10 中使用这两个函数。


    ```

    SELECT

    passenger_id,

    text_to_integer(passport_num) AS passport_num,

    text_to_date(passport_exp_date) AS passport_exp_date

    FROM passenger_passport

    代码清单 12-10

    在 SELECT 列表中使用函数

    ```


    尽管这个例子似乎是 PostgreSQL 中函数的完美用例，但实际上，就性能而言，这远非理想的解决方案——如下所述。


    ## 函数执行内部原理


    本节解释了函数执行的一些细节，这些细节是 PostgreSQL 特有的。如果你之前有使用 Oracle 或 MS SQL Server 等 DBMS 的经验，你可能会对函数执行做出一些假设，而这些假设在
    PostgreSQL 中并不成立。


    第一个意外可能发生在你执行 `CREATE FUNCTION` 语句并收到类似以下的完成消息时：


    ```

    CREATE FUNCTION

    查询在 127 毫秒内成功返回。

    ```


    读到这里，你可能会认为你的函数不包含任何错误。为了说明之后可能出错的地方，让我们编译代码清单 12-11 中的代码。如果你复制并执行此语句，你将收到创建成功消息。


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS $$

    BEGIN

    RETURN (

    SELECT

    count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p  USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE airport_code=p_airport_code

    AND scheduled_departure BETWEEN p_date AND p_date +1);

    END;

    $$ LANGUAGE plpgsql;

    代码清单 12-11

    创建一个会顺利完成但包含错误的函数

    ```


    然而，当你尝试执行这个函数


    ```

    SELECT num_passengers(''ORD'', ''2020-07-05'')

    ```


    ……你将会收到错误消息：


    ```

    错误：列 "airport_code" 不存在

    ```


    哪里出错了？该函数使用了 `airport_code` 而不是 `departure_airport`。这是一个容易犯的错误，但你可能没想到，PostgreSQL
    在你最初创建函数时永远不会告知你犯了这个错误。


    现在，如果你更正这个错误并运行新的 `CREATE FUNCTION` 语句（参见代码清单 12-12），你将收到另一个错误：


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS $$

    BEGIN

    RETURN (

    SELECT

    count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p  USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport =p_airport_code

    AND scheduled_departure BETWEEN p_date AND p_date +1);

    END;

    $$ LANGUAGE plpgsql;

    代码清单 12-12

    创建一个函数：更正了一个错误，另一个错误仍然存在

    ```


    ```

    错误：列 "p_date" 不存在

    ```


    PostgreSQL 是对的，因为参数的名称是 `p_departure_date`，而不是 `p_date`。那么，为什么这个错误没有在之前报告呢？


    在函数创建期间，PostgreSQL 仅执行初始的解析传递，在此期间仅检测到简单的语法错误。任何更深层次的错误要到执行时才会被发现。如果你刚从 Oracle
    过来，并假设创建函数时它会被数据库引擎编译并以编译形式存储，这是个坏消息。函数不仅以源代码形式存储，而且更甚的是，与其他 DBMS 相比，函数是解释执行的，而不是编译执行的。


    PL/pgSQL 解释器在第一次调用函数时（在每个会话内）解析函数的源文本并生成一个（内部的）指令树。即使到那时，函数中使用的单个 SQL 表达式和命令也不会立即被翻译。只有当执行路径到达特定命令时，才会分析它并创建一个
    `预处理语句`。如果在同一会话中再次执行相同的函数，它将被重用。其含义之一是，如果你的函数包含一些条件代码（即 `IF THEN ELSE` 或 `CASE`
    语句），如果这部分在执行期间未被触及，你甚至可能不会发现代码中的语法错误。我们见过这种令人不快的发现发生在函数投入生产很久之后。总之，当你创建一个 PL/pgSQL
    函数时：


    1.  不保存执行计划。

    2.  不会检查表、列或其他函数的存在性。'
- fmt: '# 3.  You do not know whether your function works or not, until you execute
    it (often more than one time, if there are multiple code paths).


    Another important thing to know about PostgreSQL functions, which can be concluded
    from the preceding explanation, is that functions are “atomic” in several different
    ways. First (to the dismay of Oracle users), you can’t initiate transactions inside
    PostgreSQL functions, so in the case of DML statements, it’s always “all or nothing.”
    Second, the PostgreSQL optimizer knows nothing about function execution when it
    optimizes an execution plan, which includes invocations of user-defined functions.
    For example, if you execute


    ```sql

    EXPLAIN SELECT num_passengers(13)

    ```


    …the execution plan will look something like this:


    ```sql

    "Result (cost=0.00..0.26 rows=1 width=4)"

    ```


    If you need to find out what execution plans are used to execute the `SELECT`
    statements inside the function, you will need to supply some actual values in
    place of parameters and run the `EXPLAIN` command for each of them.


    One of the keywords in the `CREATE FUNCTION` operator (remember, we didn’t list
    all of them!) is `COST`. It allows a developer to explicitly set the cost of function
    execution to be used by the optimizer. The default value is 100, and we do not
    recommend changing it, unless you have a really compelling reason to do so.


    ## Functions and Performance


    With that brief introduction out of the way, it’s time to address this book’s
    central concern. How do functions affect performance? Chapter [7](#501585_2_En_7_Chapter.xhtml)
    addressed the topic of code factoring and outlined the different implications
    of code factoring in imperative languages and in SQL. Several possible techniques
    were covered, and functions were mentioned as deserving a more detailed discussion,
    which follows.


    Why create functions in PostgreSQL? In imperative languages, using functions is
    the obvious choice: functions increase code readability, facilitate code reuse,
    and have no negative impact on performance. By contrast, functions in PostgreSQL
    may increase code readability, but may also decrease code readability and may
    significantly worsen performance. Note the word “may”; the rest of the chapter
    concerns ways to use user-defined functions wisely, so that they provide performance
    benefits rather than performance disaster.


    ### How Using Functions Can Worsen Performance


    In a previous section, we created the function `num_passengers(int)`, which calculates
    the number of passengers on a flight specified by a function parameter. This function
    works great for a single flight, returning a result within 150 ms.


    Let’s take a look at what happens if this function is included in a `SELECT` list.
    Listing [12-13](#501585_2_En_12_Chapter.xhtml#PC23) selects all flights that departed
    from `ORD` between June 13 and July 13 and, for each of these flights, calculates
    a total number of passengers.


    ```sql

    SELECT

    flight_id,

    num_passengers(flight_id) AS num_pass

    FROM flight f

    WHERE departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-05'' AND ''2023-07-13''

    Listing 12-13

    Using a function in the SELECT list decreases performance

    ```


    The execution time for this statement is 13 sec. Now, if instead of using a function,
    a SQL statement performing the exact same calculations is used (Listing [12-14](#501585_2_En_12_Chapter.xhtml#PC24)),
    the execution time will be only 165 ms.


    ```sql

    SELECT

    f.flight_id,

    count(*) AS num_pass

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p USING (booking_id)

    JOIN flight f  USING (flight_id)

    WHERE departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-05'' AND ''2023-07-13''

    GROUP BY 1

    Listing 12-14

    The same results without using a function

    ```


    Why such a big difference? In Chapter [7](#501585_2_En_7_Chapter.xhtml), we explained
    how views and CTEs can work as an optimization fence. The effect is even more
    pronounced with functions. Since a function is a true black box for the surrounding
    SQL statement, the only option for PostgreSQL is to execute each function as many
    times as many rows are selected.


    To be precise, some time is saved because for the subsequent function calls from
    the same session, PostgreSQL uses a prepared statement, but that fact can both
    speed up and slow down the execution, because the execution plan won’t take into
    account the differences in statistics between function calls.


    Even when the difference is not that drastic, and one might argue that a moderate
    slowdown can be tolerated for ease of code maintenance, we are crossing a threshold
    of how long a user is willing to wait. And in this case, the SQL inside the function
    is pretty light and takes milliseconds to be executed.


    Fine, we understand that it is not the greatest idea to execute `SELECT` statements
    embedded into the `SELECT` list of another statement. But what about functions,
    which perform simple data transformations? Like the ones we created for type conversion?
    In this case, the difference may not be so dramatic until the output size becomes
    really big, but it is still visible.


    Let’s compare the execution time for the statement from Listing [12-10](#501585_2_En_12_Chapter.xhtml#PC14)
    with the execution time for the statement in Listing [12-15](#501585_2_En_12_Chapter.xhtml#PC25).


    ```sql

    SELECT

    passenger_id,

    passport_num,

    passport_exp_date

    FROM passenger_passport

    Listing 12-15

    Selecting passport information without type conversion

    ```


    Both of them select data from one single table and do not apply any filters, so
    the only time overhead will be the one incurred from executing the functions in
    the `SELECT` list. The `passenger_passport` materialized view contains over 16
    million rows. The execution time for the statement in Listing [12-15](#501585_2_En_12_Chapter.xhtml#PC25)
    is seven seconds. If we apply type casting without calling the function (Listing
    [12-16](#501585_2_En_12_Chapter.xhtml#PC26))


    ```sql

    SELECT

    passenger_id,

    passport_num::numeric,

    passport_exp_date::date

    FROM passenger_passport

    Listing 12-16

    Selecting passport information with type casting

    ```


    …the execution time will be nine seconds. Running the statement in Listing [12-10](#501585_2_En_12_Chapter.xhtml#PC14),
    the execution time will be 40 seconds! Note that in this case the significant
    execution time increase is a result of exception processing, which creates an
    implicit checkpoint.


    In this particular case, not much can be done to improve performance, except to
    come up with a better design in the first place, but later in this book, we will
    review other examples, where some performance improvements are possible.


    ### Any Chance Functions Can Improve Performance?


    Having reviewed so many examples where functions affected performance negatively,
    one might wonder whether there are ever conditions under which functions can improve
    performance. As in many other cases, it depends.


    If we are talking about improving an individual SQL statement’s performance, wrapping
    it in a function can’t make it run faster. However, functions can be extremely
    helpful when what is being optimized is a process.


    ## Functions and User-Defined Types


    In all of the function examples so far, the functions we built returned scalar
    values. Now, let’s see what some additional benefits are provided by functions
    that return user-defined data types.'
