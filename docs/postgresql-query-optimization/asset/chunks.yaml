  trans: '# 什么是索引？


    人们可能认为，任何使用数据库的人都知道索引是什么。唉，令人惊讶的是，包括数据库开发人员、报表编写人员，甚至在某些情况下，数据库管理员在内的许多人，在使用甚至创建索引时，对索引是什么以及它们如何构造只有一知半解。为了避免误解，我们将从定义“索引”一词的含义开始。


    索引的类型繁多，因此试图寻找特定的结构属性来识别索引是不明智的。相反，我们基于其用途来定义索引。一个数据结构被称为索引，当它满足以下条件时：


    *   是一个冗余的数据结构

    *   对应用程序不可见

    *   旨在加速基于特定条件的数据选择


    冗余意味着可以删除索引而不会丢失任何数据，并且可以从其他地方（当然，是在表中）存储的数据重建。不可见意味着应用程序无法检测到索引是否存在。也就是说，无论有无索引，任何查询都会产生相同的结果。最后，创建索引是希望（或确信）它能提高特定查询或（更妙的是！）多个查询的性能。


    性能的提升并非没有代价。由于索引是冗余的，当表数据更新时，它也必须被更新。这为更新操作带来了一些开销，有时这种开销不容小觑。特别是，PostgreSQL 索引可能对
    vacuum 操作产生巨大影响。然而，许多数据库教科书高估了这种开销。现代高性能数据库管理系统使用算法来降低索引更新的成本，因此，通常在表上创建多个索引是有益的。


    尽管不同类型的索引结构可能差异显著，但加速效果是通过快速检查查询中指定的某些过滤条件实现的。这些过滤条件规定了对表属性的某些限制。


    图 3-4 展示了索引如何加速对特定表行的访问。


    图 3-4 的右侧显示了一个表，左侧则代表一个索引，它可以被视为一种特殊类型的表。索引的每一行由一个索引键和一个指向表行的指针组成。索引键的值通常等于表属性的值。图
    3-4 中的示例以机场代码作为其值；因此，该索引支持按机场代码搜索。


    一列在表的多行中可以有相同的值。如果该列被索引，则索引必须包含指向所有包含此索引键值的行的指针。也就是说，一个键可能在逻辑上关联一个指向行的指针列表，而不是单个指针。


    在 PostgreSQL 中，对于某些索引类型，索引包含多个记录，即每个指向表行的指针都会重复索引键。


    图 3-4 解释了当定位到索引记录后如何到达相应的表行；然而，它并未解释为什么找到索引行比找到表行快得多。实际上，这取决于索引的结构，而这正是后续小节要讨论的内容。


    ![](img/501585_2_En_3_Fig4_HTML.jpg)


    一个包含 2 列 19 行的表（左）映射到一个包含 3 列 19 行的表（右）。左表从顶部开始的九个元素被映射到右表相应的行。


    图 3-4


    通过索引访问表行


    ## B 树索引


    最常见的索引结构是 B 树。B 树的结构如图 3-5 所示；机场代码是索引键。该树由按层次组织的节点组成，这些节点与存储在磁盘上的块相关联。


    ![](img/501585_2_En_3_Fig5_HTML.jpg)


    一个树状图。索引 301 是根节点，它被分为左侧的索引 201 和右侧的索引 202。索引 201 又分为 101、102 和 103。索引 202 进一步分为
    104、105 和 106。每个节点都包含记录。


    图 3-5


    B 树示例


    叶节点（在图 3-5 中显示在底层）包含的索引记录与图 3-4 中的完全相同；这些记录包含一个索引键和一个指向表行的指针。非叶节点（位于除底层外的所有层级）包含的记录由下一层级某个块中的最小键（在图
    3-5 中，是字母数字值最小的键）以及指向该块的指针组成。所有块中的所有记录都是有序的，并且每个块至少使用了其一半的容量。


    任何对键 `K` 的搜索都从 B 树的根节点开始。在块查找过程中，会找到不超过 `K` 的最大键 `P`，然后搜索继续到与 `P` 关联的指针所指向的块中，直到到达叶节点，在那里指针指向表行。访问的节点数等于树的深度。当然，键
    `K` 不一定存储在索引中，但搜索会找到该键或它可能所在的位置。


    B 树也支持范围搜索（在 `SQL` 中表示为 `between` 或不等式操作）。一旦定位到范围的下限，就会通过顺序扫描叶节点来获取范围内的所有索引键，直到达到范围的上限。如果索引不是唯一的（即一个索引值可能对应多行），那么获取所有指针也需要扫描叶节点。'
- fmt: '### Why Are B-Trees Used So Often?


    We know from computer science that no lookup algorithm can find an index key among
    `N` different keys faster than in `log N` time (measured in CPU instructions).
    This performance is achieved with binary search on an ordered list or with binary
    trees. However, the cost of updates (such as insertions of new keys) can be very
    high for both ordered lists and binary trees: an insertion of a single record
    can cause complete restructuring. This makes both structures unusable for external
    storage.


    In contrast, B-trees can be modified without significant overhead. When a record
    is inserted, the restructuring is limited to one block. If the block capacity
    is exceeded, then the block is split into two blocks, and the update is propagated
    to upper levels.


    In the worst case, the number of modified blocks cannot exceed the depth of the
    tree.


    To estimate the cost of a B-tree search, we need to calculate the depth. If each
    block contains `f` pointers, then the number of blocks at each level is `f` times
    larger than in the previous one. Consequently, the depth of a tree containing
    `N` records is `log N / log f`. This formula gives the number of block accesses
    needed for a single key search. The number of CPU instructions is limited for
    each block, and usually binary search is used inside a block.


    Consequently, the CPU cost is only slightly worse than the best that is theoretically
    possible. Block size in PostgreSQL is `8 Kb`. An `8 Kb` block can fit dozens of
    index records; consequently, an index with six to seven levels can accommodate
    billions of index records.


    The depth of the tree is critical for performance of the index. After a split
    of an overfull block, each of new blocks is at least half-filled. As a result,
    the depth of the tree does not grow significantly, and the index remains efficient.
    Theoretically, blocks that are not sufficiently filled should be merged. However,
    none of actual implementations (including PostgreSQL) do the merge. Consequently,
    a large number of deletions may result in too large depth and degrade the performance.
    To avoid the degradation, the index should be rebuilt.


    In PostgreSQL, a B-tree index can be created for any ordinal data type; that is,
    for any two distinct values of the data type, one value is less than the other.
    This includes user-defined types.


    ### Other Kinds of Indexes


    PostgreSQL offers a variety of index structures supporting several data types
    and several classes of search conditions.


    A `hash index` uses a hash function to calculate the address of an index block
    containing an index key. This type of index has better performance than a B-tree
    index for equality conditions. However, this index is completely useless for range
    queries. The cost estimation for hash index search does not depend on index size
    (in contrast with logarithmic dependency for B-trees).


    An `R-tree index` supports a search on spatial data. An index key for an R-tree
    always represents a rectangle in a multidimensional space. A search returns all
    objects having a non-empty intersection with the query rectangle. The structure
    of an R-tree is similar to the structure of a B-tree; however, splitting overflowed
    nodes is much more complicated. R-tree indexes are efficient for a small number
    of dimensions (typically, two to three).


    Other types of indexes available in PostgreSQL are useful for full text search,
    search in very large tables, and much more. Additional details on these topics
    are covered in Chapter [14](#501585_2_En_14_Chapter.xhtml). Any of these indexes
    can be relatively easily configured for user-defined data types. However, we do
    not discuss indexes on user-defined types in this book.


    ## Combining Relations


    The real power of relational theory and SQL databases relies on combining data
    from several tables.


    In this section, we describe algorithms for operations that combine data, including
    a Cartesian product, joins, union, intersection, and even grouping. Surprisingly,
    most of these operations can be implemented with almost identical algorithms.
    For this reason, we discuss algorithms rather than the operations they implement.
    We will use the names `R` and `S` for input tables when describing these algorithms.'
  raw: '### Why Are B-Trees Used So Often?


    We know from computer science that no lookup algorithm can find an index key among
    `N` different keys faster than in `log N` time (measured in CPU instructions).
    This performance is achieved with binary search on an ordered list or with binary
    trees. However, the cost of updates (such as insertions of new keys) can be very
    high for both ordered lists and binary trees: an insertion of a single record
    can cause complete restructuring. This makes both structures unusable for external
    storage.


    In contrast, B-trees can be modified without significant overhead. When a record
    is inserted, the restructuring is limited to one block. If the block capacity
    is exceeded, then the block is split into two blocks, and the update is propagated
    to upper levels.


    In the worst case, the number of modified blocks cannot exceed the depth of the
    tree.


    To estimate the cost of a B-tree search, we need to calculate the depth. If each
    block contains `f` pointers, then the number of blocks at each level is `f` times
    larger than in the previous one. Consequently, the depth of a tree containing
    `N` records is `log N / log f`. This formula gives the number of block accesses
    needed for a single key search. The number of CPU instructions is limited for
    each block, and usually binary search is used inside a block.


    Consequently, the CPU cost is only slightly worse than the best that is theoretically
    possible. Block size in PostgreSQL is 8 Kb. An 8 Kb block can fit dozens of index
    records; consequently, an index with six to seven levels can accommodate billions
    of index records.


    The depth of the tree is critical for performance of the index. After a split
    of an overfull block, each of new blocks is at least half-filled. As a result,
    the depth of the tree does not grow significantly, and the index remains efficient.
    Theoretically, blocks that are not sufficiently filled should be merged. However,
    none of actual implementations (including PostgreSQL) do the merge. Consequently,
    a large number of deletions may result in too large depth and degrade the performance.
    To avoid the degradation, the index should be rebuilt.


    In PostgreSQL, a B-tree index can be created for any ordinal data type; that is,
    for any two distinct values of the data type, one value is less than the other.
    This includes user-defined types.


    ### Other Kinds of Indexes


    PostgreSQL offers a variety of index structures supporting several data types
    and several classes of search conditions.


    A *hash index* uses a hash function to calculate the address of an index block
    containing an index key. This type of index has better performance than a B-tree
    index for equality conditions. However, this index is completely useless for range
    queries. The cost estimation for hash index search does not depend on index size
    (in contrast with logarithmic dependency for B-trees).


    An *R-tree index* supports a search on spatial data. An index key for an R-tree
    always represents a rectangle in a multidimensional space. A search returns all
    objects having a non-empty intersection with the query rectangle. The structure
    of an R-tree is similar to the structure of a B-tree; however, splitting overflowed
    nodes is much more complicated. R-tree indexes are efficient for a small number
    of dimensions (typically, two to three).


    Other types of indexes available in PostgreSQL are useful for full text search,
    search in very large tables, and much more. Additional details on these topics
    are covered in Chapter [14](#501585_2_En_14_Chapter.xhtml). Any of these indexes
    can be relatively easily configured for user-defined data types. However, we do
    not discuss indexes on user-defined types in this book.


    ## Combining Relations


    The real power of relational theory and SQL databases relies on combining data
    from several tables.


    In this section, we describe algorithms for operations that combine data, including
    a Cartesian product, joins, union, intersection, and even grouping. Surprisingly,
    most of these operations can be implemented with almost identical algorithms.
    For this reason, we discuss algorithms rather than the operations they implement.
    We will use the names `R` and `S` for input tables when describing these algorithms.'
  trans: '### 为什么 B 树如此常用？


    根据计算机科学知识，在 `N` 个不同的键中，任何查找算法查找索引键的速度都不可能快于 `log N` 时间（以 CPU 指令衡量）。通过对有序列表进行二分查找或使用二叉树可以达到这种性能。然而，对于有序列表和二叉树，更新（例如插入新键）的成本可能非常高：插入单个记录可能导致完全重构。这使得这两种结构都不适用于外部存储。


    相比之下，修改 B 树不会产生显著开销。当插入一条记录时，重构操作仅限于一个块内。如果块容量超出，则该块会分裂为两个块，并且更新操作会传播到上层。


    在最坏情况下，被修改的块的数量不会超过树的深度。


    要估算 B 树搜索的成本，我们需要计算树的深度。如果每个块包含 `f` 个指针，那么每一层的块数是上一层的 `f` 倍。因此，包含 `N` 条记录的树的深度是
    `log N / log f`。该公式给出了单键搜索所需的块访问次数。每个块的 CPU 指令数是有限的，并且通常在块内使用二分查找。


    因此，CPU 成本仅比理论最优值略差。PostgreSQL 中的块大小为 `8 Kb`。一个 `8 Kb` 的块可以容纳数十条索引记录；因此，一个六到七层深的索引就可以容纳数十亿条索引记录。


    树的深度对索引性能至关重要。一个已满的块分裂后，每个新块至少半满。因此，树的深度不会显著增长，索引保持高效。理论上，填充不足的块应该被合并。然而，现有的实际实现（包括
    PostgreSQL）都没有进行合并。因此，大量的删除操作可能导致深度过大，从而降低性能。为避免性能下降，应重建索引。


    在 PostgreSQL 中，可以为任何序数数据类型创建 B 树索引；也就是说，对于该数据类型的任意两个不同值，其中一个值小于另一个。这包括用户定义的类型。


    ### 其他类型的索引


    PostgreSQL 提供了多种索引结构，支持多种数据类型和多类搜索条件。


    `哈希索引` 使用哈希函数计算包含索引键的索引块的地址。对于等值条件，这种索引类型比 B 树索引性能更好。但是，它对范围查询完全无效。哈希索引搜索的成本估计不依赖于索引大小（与
    B 树的对数依赖相反）。


    `R 树索引` 支持空间数据的搜索。R 树的索引键始终表示多维空间中的一个矩形。搜索返回所有与查询矩形有非空交集的对象。R 树的结构类似于 B 树的结构；然而，分裂溢出节点要复杂得多。R
    树索引在维度数量较少（通常是两到三维）时效率较高。


    PostgreSQL 中可用的其他类型索引对于全文搜索、超大表搜索等非常有用。有关这些主题的更多细节将在第 14 章中介绍。这些索引中的任何一种都可以相对容易地为用户定义的数据类型进行配置。然而，本书不讨论用户定义类型上的索引。


    ## 关系的组合


    关系理论和 SQL 数据库的真正强大之处在于能够组合来自多个表的数据。


    在本节中，我们将描述用于组合数据的操作的算法，包括笛卡尔积、连接、并集、交集甚至分组。令人惊讶的是，大多数这些操作都可以用几乎相同的算法实现。因此，我们讨论的是算法而非它们所实现的操作。在描述这些算法时，我们将使用
    `R` 和 `S` 作为输入表名。'
- fmt: '### Nested Loops


    The first algorithm is for a Cartesian product, that is, the set of all pairs
    of rows from the input tables. The easy way to calculate the product is to loop
    over table `R` and, for each row of `R`, loop over `S.` The pseudocode for this
    simple algorithm is presented in Listing 3-4, and the graphical representation
    of the algorithm is shown in Figure 3-6.


    ![](Images/501585_2_En_3_Fig6_HTML.jpg)


    A table titled R, with 2 columns and 7 rows, on the left is mapped to table S,
    with 2 columns and 5 rows on the right. Each row of table R is mapped to each
    row of table S. The entries in the first column in table R are 5, 8, 6, 3, 4,
    1, 3, and in table S are 3, 1, 2, blank, 1.


    **Figure 3-6**

    Nested loop algorithm


    ```

    FOR row1 IN table1 LOOP

    FOR row2 IN table2 LOOP

    INSERT output row

    END LOOP

    END LOOP

    ```

    **Listing 3-4**

    Pseudocode for nested loops


    The time needed for this simple algorithm is proportional to the product of the
    sizes of the input tables: `rows(R) * rows(S)`.


    A remarkable theoretical fact states that any algorithm that calculates a Cartesian
    product cannot perform better; that is, any algorithm’s cost will be proportional
    to the product of the sizes of its inputs or higher. Of course, some variations
    of this algorithm may perform better than others, but the cost remains proportional
    to the product.


    Slight modifications of the nested loop algorithm can calculate nearly any logical
    operation that combines data from two tables. The pseudocode in Listing 3-5 implements
    the join operation.


    ```

    FOR row1 IN table1 LOOP

    FOR row2 IN table2 LOOP

    IF match(row1,row2) THEN

    INSERT output row

    END IF

    END LOOP

    END LOOP

    ```

    **Listing 3-5**

    Nested loop algorithm for a join operation


    Observe that a nested loop join is a straightforward implementation of the abstract
    definition of a join, as a Cartesian product followed by a filter. As the nested
    loop join processes all pairs of rows from the input, the cost remains the same,
    although the size of the output is smaller than in the case of a Cartesian product.


    In practice, one or both input tables are stored tables, rather than the result
    of preceding operations. If this is the case, a join algorithm can be combined
    with data access.


    Although the processing cost remains the same, variations of the nested loop algorithm
    combined with a full scan execute nested loops on blocks of input tables and another
    level of nested loops on rows contained in these blocks. More sophisticated algorithms
    minimize the number of disk accesses by loading multiple blocks of the first table
    (outer loop) and processing all rows of these blocks with a single pass over `S`.


    These algorithms can work with any join conditions. However, the majority of joins
    we will ever need to execute are equi-joins, that is, the join condition requires
    that some attributes of `R` are equal to the corresponding attributes of `S`.


    The nested loop join algorithm can also be combined with index-based data access
    if the table `S` has an index on attributes used in the join condition. For equi-joins,
    the inner loop of the index-based nested loop algorithm shrinks to few rows of
    `S` for each row of `R`. The inner loop can even vanish completely if the index
    on `S` is unique, for example, the join attribute of `S` is its primary key.


    The index-based nested loop algorithm is usually the best choice if the number
    of rows in `R` is also small. However, index-based access becomes inefficient
    if the number of rows to be processed becomes high, as discussed in Chapter 2.


    It is possible to formally prove that there does not exist an algorithm more performant
    for Cartesian products and joins with arbitrary conditions than nested loops.
    However, the important question is whether there exists a better algorithm for
    any specific types of join conditions. The next section shows this is true for
    equi-joins.


    ### Hash-Based Algorithms


    The output of an equi-join consists of pairs of rows from `R` and `S` that have
    equal values on the join attributes. The idea of the hash join algorithm is simple:
    if the values are equal, then the hash values are also equal.


    The algorithm partitions both input tables according to values of the hash function
    and then joins rows in each bucket independently. The schema of this algorithm
    is shown in Figure 3-7.


    ![](Images/501585_2_En_3_Fig7_HTML.jpg)


    A table titled R, with 2 columns and 7 rows, on the left and table S, with 2 columns
    and 5 rows on the right, are mapped to the hash buckets at the center.


    **Figure 3-7**

    Hash join algorithm


    The basic version of the hash join algorithm includes two phases:


    1.  During the build phase, all tuples of `R` are stored in buckets according
    to the values of the hash function.

    2.  In the probe phase, each row of table `S` is sent to an appropriate bucket.
    If matching rows of table `R` are in the bucket, output rows are produced.


    The easiest way to find matching rows in the bucket is to use nested loops (actually
    loop over all rows in the bucket for each row of `S)`.


    The two phases of the hash-based algorithm are shown as separate physical operations
    in the execution plan.


    The cost of a hash join can be approximately estimated with the following formula,
    where `JA` is the join attribute:


    ```

    cost(hash,R,S)=size(R)+size(S)+size(R)*size(S)/size(JA)

    ```


    The first and second terms in this formula approximate the cost of a single pass
    over all the rows of R and S. The last term represents the size of the join result
    to be produced. Of course, the cost of output is the same for all join algorithms,
    but we did not need to include it in the nested loop algorithm cost estimation
    because it is smaller than the cost of nested loops.


    This formula shows that a hash-based algorithm is significantly better than nested
    loops for large tables and a large number of different values of the join attribute.
    For example, if the join attribute is unique in one of the input tables, then
    the last term will be equal to just the size of the other table.


    The basic hash join algorithm works if all buckets produced at the build phase
    can fit into main memory. Another variation, called hybrid hash join, joins tables
    that cannot fit into main memory. The hybrid hash join partitions both tables
    so that partitions of one table can fit and then executes a basic algorithm for
    each pair of corresponding partitions. The cost of a hybrid hash join is higher
    because partitions are stored temporarily on the hard disk and both tables are
    scanned twice. However, the cost is still proportional to the sum of the sizes,
    rather than the product.'
