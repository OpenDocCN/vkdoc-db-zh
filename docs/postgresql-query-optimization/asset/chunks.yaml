  trans: '# 12. 函数


    本章聚焦于 PostgreSQL 中使用最少且最常被误用的特性——对象，即函数。由于所有现代编程语言都包含用户自定义函数，人们常误以为数据库函数与之同出一辙，并认为如果掌握在应用编程语言中编写函数的时机与方法，便能直接将其应用于
    PostgreSQL。这与事实相去甚远。


    本章将探讨 PostgreSQL 函数与其他编程语言函数的差异，何时应该创建函数、何时不应创建，以及使用函数如何既能提升性能，又可能导致严重的性能下降。


    在开始之前，我们先来探讨一个普遍存在的观点：使用函数会降低可移植性。这话虽有一定道理，但请考虑以下事实：


    -  无论是 SQL 语句还是 ORM，都不是 100%可移植的；总是需要做一些（希望是较小的）适配工作。

    -  为现有生产系统更换数据库始终是一个重大项目，绝不可能一蹴而就。对应用程序本身进行一些修改是不可避免的。相比之下，转换函数所带来的额外工作量相对较小。


    ## 函数创建


    PostgreSQL 既有内置（内部）函数，也有用户自定义函数。在这一点上，它与其他编程语言并无不同。


    ### 内部函数


    内部函数使用 C 语言编写，并与 PostgreSQL 服务器集成。对于 PostgreSQL 支持的每种数据类型，都存在一系列用于对该类型的变量或列值执行不同操作的函数。类似于命令式语言，这里有用于数学运算的函数、用于字符串操作的函数、用于日期时间操作的函数等等。可用函数和支持类型的列表随着每个新版本的发布而不断扩展。


    清单 12-1 展示了一些内置函数的示例。


    ```

    sin(x);

    substr(first_name,1,1);

    now();

    Listing 12-1

    内置函数示例

    ```


    ### 用户自定义函数


    用户自定义函数是由用户创建的函数。PostgreSQL 支持三种用户自定义函数：


    -  查询语言函数，即用 SQL 编写的函数

    -  C 函数（用 C 或类似 C 的语言，如 C++编写）

    -  过程语言函数，用受支持的过程语言（简称 PL）编写


    一个`CREATE FUNCTION`命令如清单 12-2 所示。


    ```

    CREATE FUNCTION function_name (par_name1 par_type1, ...)

    RETURNS return_type

    AS


    LANGUAGE function_language;

    Listing 12-2

    CREATE FUNCTION 命令

    ```


    从 PostgreSQL 的角度看，数据库引擎只捕获函数签名——函数名和参数列表（可能为空）、返回值类型（可能为`void`），以及一些规格说明，如用何种语言编写。对于除
    SQL 外的所有过程语言，函数`主体`被包装在一个字符串字面量中，传递给一个了解该语言细节的特殊处理程序。该处理程序可以自行完成解析、语法分析、执行等所有工作，也可以作为
    PostgreSQL 与现有编程语言实现之间的“粘合剂”。标准的 PostgreSQL 发行版支持四种过程语言：PL/pgSQL、PL/Tcl、PL/Perl
    和 PL/Python。本书将只讨论用 PL/pgSQL 编写的函数。


    ### 过程语言简介


    既然我们正在讨论函数，那么正式介绍编写这些函数所用的语言（或多种语言）似乎是个好主意。


    到目前为止，本书中唯一使用的语言是 SQL，在代码片段中，除了`CREATE`操作符外，唯一使用过的操作符是`SELECT`。现在，是时候介绍过程语言了。在本书中，我们仅讨论
    PostgreSQL 的原生过程语言`PL/pgSQL`。


    用`PL/pgSQL`编写的函数可以包含任何 SQL 操作符（可能带有某些修改）、控制结构（`IF THEN ELSE`、`CASE`、`LOOP`）以及对其他函数的调用。


    清单 12-3 展示了一个用`PL/pgSQL`编写的函数示例，该函数在可能的情况下将文本字符串转换为数值，如果字符串不代表数字则返回 null。


    ```

    CREATE OR REPLACE FUNCTION text_to_numeric(input_text text)

    RETURNS numeric AS

    $BODY$

    BEGIN

    RETURN replace(input_text, '','', '''')::numeric;

    EXCEPTION WHEN OTHERS THEN

    RETURN NULL::numeric;

    END;

    $BODY$

    LANGUAGE plpgsql;

    Listing 12-3

    将文本转换为数值的函数

    ```


    利用清单 12-2 中的信息，我们可以识别所有用户自定义函数的共同部分。函数名为`text_to_numeric`，它只有一个类型为`text`的参数`input_text`。


    `RETURNS`子句定义了函数返回值的类型（`numeric`），`LANGUAGE`子句指定了函数所用的编写语言`plpgsql`。


    现在，让我们更仔细地看看函数主体。


    ### 美元引用


    在上一节中，我们提到函数主体表示为一个字符串字面量；然而，它并非以引号开始和结束，而是以`$BODY$`作为起止。PostgreSQL 中的这种表示法称为`美元引用`，在创建函数时尤其有用。确实，如果你有一个相对较大的函数文本，很可能需要使用单引号或反斜杠，那么你就需要在每次出现时将它们转义（双写）。使用美元引用，你可以使用两个美元符号，中间可能带有某些标签，来定义一个字符串字面量。


    使用标签使得这种定义字符串常量的方式特别方便，因为你可以嵌套带有不同标签的字符串。例如，函数主体的开头可能如清单 12-4 所示。


    ```

    $function$

    DECLARE

    V_error_message text:=''Error:'';

    V_record_id integer;

    BEGIN

    ...

    v_error_message:=v_error_message||$em$Record can''t be updated, #$em$||quote_literal(v_record_id);

    ...

    END;

    $function$

    Listing 12-4

    嵌套美元引用的用法

    ```


    这里，我们对函数主体使用了带有`function`标签的美元引用。请注意，对于可用于函数主体的标签没有限制规则，包括空标签；唯一的要求是字符串字面量的结束标签与开始标签相同。这里的示例将使用不同的标签，以提醒读者标签并非预定义的。


    函数主体以一个`DECLARE`子句开始，这是可选的，如果不需要变量可以省略。`BEGIN`（不带分号）表示语句部分的开始，而`END`关键字应该是函数体中的最后一条语句。


    请注意，本节并非关于函数创建的全面指南。有关更多详细信息，请参阅 PostgreSQL 文档。


    更多细节将在后续示例中介绍。'
- fmt: '### Function Parameters and Function Output: Void Functions


    Most often, a function will have one or more parameters, but it might have none.
    For example, the internal function `now()`, which returns the current timestamp,
    does not have any parameters. We can assign default values to any function parameter,
    to be used if no specific value is explicitly passed.


    In addition, there are multiple ways to define function parameters. In the example
    in Listing [12-3](#501585_2_En_12_Chapter.xhtml#PC3), parameters are `named`,
    but they can also be positioned (`$1`, `$2`, etc.). Some parameters may be defined
    as `OUT` or `INOUT`, instead of specifying a return type. Again, this chapter
    doesn’t intend to cover every possible specification, because function performance
    does not depend on all these specification variations.


    Finally, it’s important to note that a function may return no value; in this case,
    a function is specified as `RETURNS VOID`. This option exists because previously,
    PostgreSQL did not have support for stored procedures, so the only way to package
    multiple statements together was inside a function.


    ### Function Overloading


    Similar to other programming languages, functions in PostgreSQL can be polymorphic,
    that is, multiple functions can use the same name with a different signature.
    This feature is called `function overloading`. As mentioned earlier, a function
    is defined by its name and its input parameter set; the return type may be different
    for different sets of input parameters, but for obvious reasons, two functions
    cannot share both the same name and same set of input parameters.


    Let’s take a look at the examples in Listing [12-5](#501585_2_En_12_Chapter.xhtml#PC7).
    In case #1, a function that calculates the number of passengers on a specific
    flight is created. In case #2, a function with the same name, which calculates
    the number of passengers departing on a specific date from a specific airport,
    is created.


    However, if you try to run snippet #3 to create a function that calculates the
    number of passengers on a specific flight number on a specific date, you will
    get an error:


    ```

    ERROR: cannot change name of input parameter "p_airport_code".

    ```


    You can create a function with the same name and with a different set of parameters
    and a different return type; thereby, you can create another function with the
    same name, as shown in case #4. However, if you try to create a function with
    the same name and with a different return type but the same parameters (case #5),
    the database will throw an error:


    ```

    #1

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS integer;

    #2

    CREATE OR REPLACE FUNCTION num_passengers(p_airport_code text, p_departure date)
    RETURNS integer;

    #3

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_no text, p_departure date)
    RETURNS integer;

    #4

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_no text) RETURNS numeric;

    #5

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS numeric;

    Listing 12-5

    Function overloading

    ```


    ```

    ERROR: cannot change return type of existing function

    ```


    Note that the source code of these functions differs significantly. Listing [12-6](#501585_2_En_12_Chapter.xhtml#PC8)
    shows the source code of the `num_passengers(integer)` function, and Listing [12-7](#501585_2_En_12_Chapter.xhtml#PC9)
    shows the code of the `num_passengers(text, date)` function.


    ```

    CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS integer

    AS

    $$BEGIN

    RETURN (

    SELECT count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p USING (booking_id)

    WHERE flight_id=p_flight_id);

    END;

    $$ LANGUAGE plpgsql;

    Listing 12-6

    Source code of num_passengers(int)

    ```


    ```

    CREATE OR REPLACE FUNCTION num_passengers(

    p_airport_code text,

    p_departure date) RETURNS integer

    AS

    $$BEGIN

    RETURN (

    SELECT count(*)

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE departure_airport=p_airport_code

    AND scheduled_departure BETWEEN p_departure AND p_departure +1)

    ;

    END;

    $$ LANGUAGE plpgsql;

    Listing 12-7

    Source code of num_passengers(text, date)

    ```'
