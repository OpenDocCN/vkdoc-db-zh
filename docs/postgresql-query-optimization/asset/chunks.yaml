    具体的例子包括谷歌报告的数据，显示搜索速度减慢 0.4 秒会导致每天减少 800 万次搜索。另一个例子是亚马逊发现，页面加载时间减慢一秒钟会导致一年损失 16
    亿美元的销售额。像这样的情况下，必须解决什么问题才能改善状况？


    ## 全球等待


    如果你曾与开发数据库应用程序的应用开发者交谈过，或者你本身就是一名应用开发者，下面这句话可能听起来很熟悉：“应用程序运行得很好，直到它遇到了数据库！”


    这句话，我们理解为“应用程序在与数据库交互时经常出现性能问题”，但通常被理解为“数据库很慢”，这让人相当沮丧。毕竟，DBMS 是专门设计用来提供*更快*数据访问的软件，而不是让事情变慢。


    事实上，如果你询问监督同一项目数据库健康的 DBA，他们可能会回复说数据库运行得非常完美。如果是这样，为什么用户会体验到“全球等待”——无休止的加载屏幕和缓慢的响应时间呢？


    通常，即使应用程序执行的每个单独的数据库查询在不到 0.1 秒内返回结果，应用程序页面的响应时间也可能达到十秒或更长。从 DBA 的角度来看，系统是高性能的，但最终用户的体验却很差。那么，问题不在于每个查询的执行速度，而在于应用程序与数据库之间的交互模式。


    ## 性能指标


    第 1 章讨论了优化目标，提到许多性能指标，如客户满意度，是“外部”于数据库的，不能被优化器使用。事实上，这些指标不仅是数据库外部的，而且是整个应用程序外部的。


    执行给定业务功能所需的时间难以衡量，因此也难以改进。追逐易于衡量的优化目标可能产生不良的激励。例如，应用程序开发者可以强迫用户点击十个按钮而不是一个，有时这会减少每个按钮的响应时间。这可能会改善某些基准测试结果，但几乎不会改善用户体验和满意度。


    然而，这正是最终用户感兴趣的指标。他们不关心任何单个查询；他们关心的是整体体验。他们希望应用程序快速响应，不想盯着“等待”和“加载”屏幕。'
- fmt: '## Impedance Mismatch


    So what is the underlying cause of poor overall performance?


    In very general terms, the cause is the incompatibility of database models and
    programming language models, often termed `impedance mismatch`. In electrical
    engineering, impedance is a generalization of the resistance to alternating current
    in a circuit when voltage is applied. The impedance phase angle for any component
    is the phase shift between the voltage across that component and current through
    that component; if this angle is close to 90 degrees, the delivered power is close
    to 0 even if both voltage and current are high.


    Similarly, the expressiveness and efficiency of database query languages does
    not match the strengths of imperative programming languages. Even though both
    can have great strength, they might deliver less power than expected.


    Both imperative programming languages and declarative query languages work extremely
    well to accomplish the tasks they were designed for. The problems start when we
    try to make them work together. The cause of poor performance is an incompatibility
    of database models and programming language models.


    Applications and databases are designed to operate with


    *   Objects of different sizes (granularity)—single objects vs. bulk (sets of)
    objects

    *   Access patterns (navigation vs. search by attribute values)

    *   Different means of identification—address vs. a set of attribute values


    In the remaining sections of this chapter, we discuss the consequences of this
    incompatibility in more detail.


    ## A Road Paved with Good Intentions


    The preceding might sound like we are blaming application developers for every
    performance problem and for their unwillingness to “think like a database.” But
    assigning blame is not a productive way to solve problems, including poor application
    performance. A more productive approach would be to try to understand how good
    intentions can lead to such excruciating results.


    Let’s start by examining some common application development patterns.


    ### Application Development Patterns


    The most common modern software engineering architecture pattern is a layered
    architecture. Typically, there are four layers:


    *   End user interface

    *   Business logic

    *   Persistence

    *   Database


    Each layer may only communicate with adjacent layers, and encapsulation and independence
    are encouraged both within each level and especially across levels. In this model,
    the business object “`customer`” is totally ignorant of the database table “`Customer`”
    and, in fact, could be connected to any arbitrary database so long as the persistence
    layer defined a mapping between the data in the database and the objects in the
    business layer.


    There are a few important reasons for this, chief among them facilitating fast
    development, maintainability, ease of application updates, and making components
    reusable. It seems facially obvious that a change in the end user interfaces shouldn’t
    de facto cause a change in the database schema. This strict separation also facilitates
    rapid work in parallel: developers can work on different parts of the application,
    and rest assured that the other parts of the application outside their narrow
    domains do not depend on the internal structure or implementation of the objects
    the developer is touching. And it of course seems useful that multiple applications
    can be built on the same foundation of business logic—that the internal logic
    of the application does not have to be duplicated for each new built environment.


    So far, so good—-so what is the problem? Unfortunately, there are many pitfalls,
    and the methodology doesn’t quite deliver the promised benefit—at least, as it
    is implemented in the wild.


    Consider the idea of centralizing business logic. First, the benefits of having
    all the logic in one place—the business layer—are somewhat reduced when that “one
    place” is several hundred thousand lines of code. In practice, such a large business
    layer will result in duplication—or, worse, attempted duplication. When the business
    logic layer is bloated, it’s hard to find a function that does exactly what one
    wants—as a result, often, real-world business logic is implemented in different
    ways in different methods, with different results.


    Second, this business logic may be available to additional end user interfaces,
    but it is not available to other business uses that interact directly with the
    database—most crucially, reporting. Thus, report writers end up duplicating application
    logic code, perhaps in a data warehouse or, worse yet, in individual reports,
    with no guarantee of equivalence with application logic.


    Additionally, with this approach, communication with the persistence layer is
    typically limited to individual objects or even single scalar values, effectively
    disabling the power of the database engine. The end user interface might know
    all the different data elements that it needs, but because it doesn’t communicate
    directly with the persistence layer, requests for data are mediated by the business
    logic layer.


    A typical implementation of the persistence layer has data access classes that
    correspond one-to-one with business object classes. It is straightforward to write
    basic database DML functions (`INSERT`, `UPDATE`, `DELETE`), but what happens
    when operations must be performed on a set of objects of this class? There are
    two paths: The developer can create another set of methods that implement the
    same functions for a set of objects. However, this would violate the principle
    of code reuse. Alternately, and more commonly, the developer simply iterates through
    the collection, calling the functions that have already been defined to handle
    each individual object in turn.


    Imagine an application interface that lists all passengers departing from O’Hare
    airport. A database developer would assume that to list all passengers departing
    from O’Hare airport, they need to join the table `flight` with the table `boarding_pass`.
    All the information is returned in one go. For an application developer, the task
    might be trickier. They might have a method like `get_flight_by_departure_airport()`
    that takes an airport code as a parameter and returns a collection of flights.
    Then, they can iterate through the flights, returning all boarding passes for
    the flight. In effect, they are implementing a nested loop join algorithm inside
    the application.


    To avoid this, they might use a few different solutions. They could add a departure
    airport attribute to the boarding pass object. However, this would open the door
    to data integrity problems: what if the flight departure time is updated in the
    flight record but not all boarding passes? Alternately, a method could be defined
    to retrieve boarding passes given a flight departure airport, but this would violate
    the precept of objects being ignorant of one another. In a pure layered approach,
    the boarding pass object is ignorant of the flight object, and the flight object
    is ignorant of the boarding pass. A method that pulls data for both wouldn’t belong
    in either object.'
