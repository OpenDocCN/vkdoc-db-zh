- fmt: '## PostgreSQL Configuration Parameters Overview


    There are over 300 PostgreSQL configuration parameters, and even an experienced
    DBA may not remember all of them. If you are an application developer or a database
    developer, you might not even know that PostgreSQL configuration parameters exist,
    let alone what they are and what they mean. There is a good reason for such ignorance
    since, in real life, ordinary users don’t have any say in how these parameters
    are set. Indeed, configuration parameters are set for the whole PostgreSQL instance,
    which may have multiple databases, so any individual user will get the same settings
    as every other user. To be completely transparent, in some cases, ordinary users
    `can` specify some parameters just for themselves, but let’s hold our horses for
    now.


    Let’s take a look at some configuration parameters that can make the most impact
    on the query performance.


    ### Memory Allocation


    There are a lot of myths related to PostgreSQL memory allocation parameters. Many
    recommendations and formulas, which can be found on the Internet, were issued
    many years and many PostgreSQL versions ago, and many of them have never been
    revisited since. As a result, many of these recommendations are either wrong or
    can be used only as a first approximation and tuned later.


    `shared_buffers`


    The data stored in a PostgreSQL database must be read from a hard drive to main
    memory before anyone can use it. The memory area allocated for this purpose is
    called shared memory buffers. This parameter sets the number of shared memory
    buffers used by the database server. The limit of 64 GB goes back to older versions
    of Linux and nowadays is mythical. This is one of the few memory-related parameters
    that PostgreSQL uses at its face value, meaning that it sets the hard limit for
    shared buffers. Also, resetting this parameter requires an instance restart. The
    only actual limitation to this value is that after subtracting it from total RAM,
    there should be enough memory left for `work_mem` (discussed later).


    *Recommendation*: Start with 25% of RAM and increase it until `cache_hit_ratio`
    is close to 90%.


    `effective_cache_size`


    This parameter is advisory. It does not reserve any memory, and PostgreSQL uses
    it for query planning purposes only. It indicates how much memory the operating
    system has available for caching data (so it includes memory cache, disk cache,
    filesystem cache, etc.). The way the query planner uses it is not straightforward,
    but the higher it is defined, the higher the chance of using indexes rather than
    a sequential scan.


    *Recommendation:* 75% RAM is usually recommended but not required (and this number
    is not related to the `shared_buffers` value).


    ### Connections and Sessions


    The next set of parameters is related to individual user sessions.


    `max_connections`


    This parameter sets the maximum number of concurrent connections to the PostgreSQL
    instance, which can be handled simultaneously. This is a hard limit; if the maximum
    number of connections is reached, the system will become non-responsive. No users
    except for a superuser will be allowed to connect. This situation will persist
    until the superuser kills some connections. Changing this parameter requires a
    system restart. You might wonder why this limit is necessary, and if it can’t
    be changed on the fly, why not set it as high as possible so that we never run
    into these problems?


    Too many connections are undesirable in any database because each connection takes
    up additional resources, even when idle. The most important resource is the memory
    allocated for each session—we will address the details in the next section. On
    the application side, this problem is addressed by setting up an application connection
    pool so that application users do not initiate new database connections but instead
    use one of the already opened connections from the available pool. If we set the
    value of `max_connections` really high, the system may become slow and non-responsive
    because there won’t be enough resources for all connections. In addition, there
    are some internal limitations in the PostgreSQL kernel itself, which makes it
    undesirable to have more than several hundred connections at any given moment.


    Now that we have described many of the problems that occur when there are too
    many connections, we should note that these horror stories are not guaranteed
    and are at least in part exaggerated. If there are enough hardware resources available
    on the host, even several thousand `max_connections` may work perfectly well.


    *Recommendation*: Start from several hundred, observe system behavior, and adjust
    accordingly.


    `work_mem`


    The `work_mem` setting controls the amount of memory that can be used per query
    operation node and is generally used for sorting data and hash tables. This is
    also a hard limit, meaning that this is the maximum size of memory PostgreSQL
    will allocate to any query node.


    Any hash operation that requires more than this amount of memory will resort to
    swapping to disk and will therefore take longer to complete.


    A well-known formula suggests dividing 25% of the total system memory by `max_connections`.
    Therefore, a decrease in `max_connections` will allow for a higher value of `work_mem`.
    Note that in this case, like in many others, it is assumed that the host has only
    one database, so be mindful when assigning the value for this parameter. Remember
    that PostgreSQL won’t perform any calculations to check whether your settings
    make sense. Everyone might be happy until the next session cannot obtain enough
    RAM from the operating system and throws an out-of-memory error.


    Fortunately, `work_mem` is one of the PostgreSQL parameters that can be set dynamically
    within a session or even for a duration of a transaction. So a possible solution
    could be to set the `work_mem` dynamically from the application. Suppose it is
    known that a particular query will be sorting a large dataset. In that case, it
    can be advantageous to increase the `work_mem` of that individual query (being
    careful not to over-allocate).


    For example, if the session requires 200 GB for `work_mem`, you can run the following
    command:


    ```

    set work_mem = ''200GB'';

    ```


    This would set the session’s `work_mem` to a new value and allow subsequent queries
    within that session to utilize more memory for sorting or hashing. To return to
    the standard value, run the following:


    ```

    reset work_mem;

    ```


    `maintenance_work_mem`


    This parameter determines the maximum amount of memory used for maintenance operations
    like `VACUUM`, `CREATE INDEX`, `ALTER TABLE`, `ADD FOREIGN KEY`, and data-loading
    operations (e.g., `COPY`). These operations may increase the I/O on database servers
    while they are running, so allocating more memory to them may lead to these operations
    finishing more quickly. There is a formula to calculate this value as well, but
    we will discuss this parameter in connection with the PostgreSQL `VACUUM` process.'
