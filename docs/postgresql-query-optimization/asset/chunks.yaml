    ```


    The work_mem setting controls the amount of memory that can be used per query
    operation node and is generally used for sorting data and hash tables. This is
    also a hard limit, meaning that this is the maximum size of memory PostgreSQL
    will allocate to any query node.


    Any hash operation that requires more than this amount of memory will resort to
    swapping to disk and will therefore take longer to complete.


    A well-known formula suggests dividing 25% of the total system memory by max_connections.
    Therefore, a decrease in max_connections will allow for a higher value of work_mem.
    Note that in this case, like in many others, it is assumed that the host has only
    one database, so be mindful when assigning the value for this parameter. Remember
    that PostgreSQL won’t perform any calculations to check whether your settings
    make sense. Everyone might be happy until the next session cannot obtain enough
    RAM from the operating system and throws an out-of-memory error.


    Fortunately, work_mem is one of the PostgreSQL parameters that can be set dynamically
    within a session or even for a duration of a transaction. So a possible solution
    could be to set the work_mem dynamically from the application. Suppose it is known
    that a particular query will be sorting a large dataset. In that case, it can
    be advantageous to increase the work_mem of that individual query (being careful
    not to over-allocate).


    For example, if the session requires 200 GB for work_mem, you can run the following
    command:


    ```

    set work_mem = ''200GB'';

    ```


    This would set the session’s work_mem to a new value and allow subsequent queries
    within that session to utilize more memory for sorting or hashing. To return to
    the standard value, run the following:


    ```

    reset work_mem;

    maintenance_work_mem

    ```


    This parameter determines the maximum amount of memory used for maintenance operations
    like VACUUM, CREATE INDEX, ALTER TABLE, ADD FOREIGN KEY, and data-loading operations
    (e.g., COPY). These operations may increase the I/O on database servers while
    they are running, so allocating more memory to them may lead to these operations
    finishing more quickly. There is a formula to calculate this value as well, but
    we will discuss this parameter in connection with the PostgreSQL VACUUM process.'
  trans: '

    ## PostgreSQL 配置参数概述


    PostgreSQL 有超过 300 个配置参数，即使经验丰富的 DBA 也可能无法全部记住。如果你是一名应用开发者或数据库开发者，你可能甚至不知道 PostgreSQL
    配置参数的存在，更不用说它们是什么以及有何含义了。这种“无知”情有可原，因为在实际环境中，普通用户对这些参数的设置没有任何发言权。的确，配置参数是为整个 PostgreSQL
    实例设置的（一个实例可能包含多个数据库），因此任何单个用户获得的设置都与其他用户相同。坦率地说，在某些情况下，普通用户 `可以` 仅为他们自己指定一些参数，但让我们先稍安勿躁。


    让我们来看一些对查询性能影响最大的配置参数。


    ### 内存分配


    关于 PostgreSQL 内存分配参数存在很多迷思。互联网上的许多建议和公式是在多年前、多个 PostgreSQL 版本之前提出的，其中很多自那时起就从未被重新审视过。因此，这些推荐中有许多要么是错误的，要么只能作为初步近似值使用，后续还需要调整。


    `shared_buffers`


    存储在 PostgreSQL 数据库中的数据必须先从硬盘读取到主内存中，然后才能被任何人使用。为此目的分配的内存区域称为共享内存缓冲区。此参数设置数据库服务器使用的共享内存缓冲区的数量。64
    GB 的限制源于旧版本的 Linux，如今已成迷思。这是 PostgreSQL 按其字面意义使用的少数几个与内存相关的参数之一，意味着它为共享缓冲区设置了硬性限制。此外，重置此参数需要重启实例。此值的唯一实际限制是，从总
    RAM 中减去它后，应剩余足够的内存用于 `work_mem`（稍后讨论）。


    *建议*：从 RAM 的 25% 开始，逐步增加，直到 `cache_hit_ratio` 接近 90%。


    `effective_cache_size`


    此参数是建议性的。它不预留任何内存，PostgreSQL 仅将其用于查询规划目的。它表示操作系统有多少内存可用于缓存数据（因此包括内存缓存、磁盘缓存、文件系统缓存等）。查询规划器使用它的方式并不直接，但该值设置得越高，使用索引而非顺序扫描的可能性就越大。


    *建议*：通常建议设为 RAM 的 75%，但不是必须的（且此数字与 `shared_buffers` 的值无关）。


    ### 连接与会话


    下一组参数与单个用户会话相关。


    `max_connections`


    此参数设置 PostgreSQL 实例可以同时处理的最大并发连接数。这是一个硬性限制；如果达到最大连接数，系统将变得无响应。除超级用户外，任何用户都将不被允许连接。这种情况将持续到超级用户终止一些连接为止。更改此参数需要重启系统。你可能会想，为什么这个限制是必要的？如果它不能动态更改，为什么不尽可能设得高一些，这样我们就永远不会遇到这些问题了？


    在任何数据库中，过多的连接都是不可取的，因为每个连接即使在空闲时也会占用额外资源。最重要的资源是为每个会话分配的内存——我们将在下一节讨论细节。在应用端，这个问题通过设置应用连接池来解决，这样应用用户就不会启动新的数据库连接，而是使用可用池中已打开的连接之一。如果我们把
    `max_connections` 的值设得非常高，系统可能会变得缓慢且无响应，因为没有足够的资源来支持所有连接。此外，PostgreSQL 内核本身存在一些内部限制，这使得在任何时候拥有超过几百个连接变得不可取。


    既然我们已经描述了连接过多时可能出现的许多问题，我们应该注意到，这些“恐怖故事”并非必然发生，至少在一定程度上被夸大了。如果主机上有足够的硬件资源可用，即使设置几千个
    `max_connections` 也可能运行良好。


    *建议*：从几百个开始，观察系统行为，并相应调整。


    `work_mem`


    `work_mem` 设置控制每个查询操作节点可以使用的内存量，通常用于数据排序和哈希表。这也是一个硬性限制，意味着这是 PostgreSQL 将分配给任何查询节点的最大内存量。


    任何需要超过此内存量的哈希操作都将 resort 到交换到磁盘，因此需要更长的时间才能完成。


    一个众所周知的公式建议将系统总内存的 25% 除以 `max_connections`。因此，减少 `max_connections` 将允许使用更高的 `work_mem`
    值。请注意，像许多其他情况一样，此公式假设主机只有一个数据库，因此在为该参数赋值时要谨慎。记住，PostgreSQL 不会执行任何计算来检查你的设置是否合理。在下一个会话无法从操作系统获得足够的
    RAM 并抛出内存不足错误之前，每个人可能都很满意。


    幸运的是，`work_mem` 是 PostgreSQL 参数中可以在会话内甚至事务持续时间内动态设置的参数之一。因此，一个可能的解决方案是从应用程序动态设置
    `work_mem`。假设已知某个特定查询将要对大型数据集进行排序，那么增加该单个查询的 `work_mem`（注意不要过度分配）可能是有利的。


    例如，如果会话需要 200 GB 的 `work_mem`，你可以运行以下命令：


    ```

    set work_mem = ''200GB'';

    ```


    这将设置会话的 `work_mem` 为新值，并允许该会话内的后续查询利用更多内存进行排序或哈希操作。要恢复到标准值，请运行：


    ```

    reset work_mem;

    ```


    `maintenance_work_mem`


    此参数决定了用于维护操作（如 `VACUUM`、`CREATE INDEX`、`ALTER TABLE`、`ADD FOREIGN KEY` 和数据加载操作（例如
    `COPY`）的最大内存量。这些操作在运行时可能会增加数据库服务器上的 I/O，因此为它们分配更多内存可能会使这些操作更快完成。也有一个计算此值的公式，但我们将在讨论
    PostgreSQL `VACUUM` 过程时再探讨这个参数。

    '
- fmt: '## Tuning Parameters for Better Performance


    The statements like the one we made in the beginning of this chapter (comparing
    performance gains from parameter tuning to performance gains from query tuning)
    are notably difficult to illustrate. To follow along with the examples in this
    chapter, you will need to restore an additional clean copy of the `postgres_air`
    database. Alternatively, you can temporarily remove the indexes that we created
    in previous chapters and restore them after we are done with our experiments.
    Let’s start with the query presented in Listing [10-1](#501585_2_En_10_Chapter.xhtml#PC7).


    ```sql

    SELECT

    f.flight_no,

    f.actual_departure,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    WHERE f.departure_airport = ''JFK''

    AND f.arrival_airport = ''ORD''

    AND f.actual_departure BETWEEN ''2023-08-08'' and ''2023-08-12''

    GROUP BY f.flight_id, f.actual_departure;

    Listing 10-1

    Query to optimize

    ```


    First, we will run it with default memory allocation parameters:


    ```sql

    shared_buffers=128MB

    work_mem=4MB

    ```


    To observe the changes to buffer use, in this chapter, we use the `EXPLAIN` command
    with additional parameters—`EXPLAIN (ANALYZE, BUFFERS, TIMING)`. The execution
    plan for this query is shown in Figure [10-1](#501585_2_En_10_Chapter.xhtml#Fig1).


    ![](Images/501585_2_En_10_Fig1_HTML.jpg)


    A screenshot of a query plan. It has a few lines of code to check the airport
    booking. The planning time is 2.154 milliseconds and the execution time is 1071.430
    milliseconds.


    Figure 10-1

    Execution plan with default memory allocations


    Looking at this query plan, we see that the optimizer uses two indexes on table
    `flight` and then scans all the blocks checking for the actual departure. Notice,
    also, that the number of `shared_buffers` is insufficient (to achieve consistent
    results, run the same query or `EXPLAIN ANALYZE` more than once) and that PostgreSQL
    chooses to run two parallel workers to speed up the process. The total execution
    time is a just over one second.


    Since we are not modeling the effect of multiple simultaneously running queries,
    the parameters that might make a material impact on the query execution time are
    `shared_buffers` (this change requires restart) and `work_mem` (can be modified
    in session). Let’s first try to increase the size of `work_mem`, then change the
    `shared_buffers` parameter to 1 GB, restart the database, and repeat the `work_mem`
    changes.


    Gradually increasing `work_mem` to up to 1 GB, we won’t notice any significant
    changes in the execution plan and execution time. The limiting factor appears
    to be insufficient `shared_buffers`. We do not see any disk usage, which means
    that there is enough `work_mem` from the start. Figure [10-2](#501585_2_En_10_Chapter.xhtml#Fig2)
    shows the execution plan with 128 MB `shared_buffers` and 500 MB `work_mem`. Execution
    time is fluctuating around 1 sec.


    ![](Images/501585_2_En_10_Fig2_HTML.jpg)


    A screenshot of a query plan. It has a few lines of code to check the airport
    booking with 128 megabytes of shared buffers and 500 megabytes of work memory.
    It uses a hash join and nested loop.


    Figure 10-2

    Execution plan with increased work_mem and default shared_buffers


    Now, let’s increase `shared_buffers` to 1 GB and restart our Postgres instance.
    Before we start measuring the execution time, we run this query a couple of times
    making sure that whatever can fit into the shared buffers is there.


    Unfortunately, the execution time decrease is insignificant. The execution plan
    will stay the same, with slightly fewer reads due to the increase in `shared_buffers`
    (see Figure [10-3](#501585_2_En_10_Chapter.xhtml#Fig3) for a portion of the execution
    plan).


    ![](Images/501585_2_En_10_Fig3_HTML.jpg)


    A screenshot of a query plan. It has a few lines of code to check the airport
    booking after increasing shared buffers. Workers planned is 2 and workers launched
    is 2.


    Figure 10-3

    A part of the execution plan with increased shared_buffers, which shows less reads
    than in Figure [10-2](#501585_2_En_10_Chapter.xhtml#Fig2)


    If we keep increasing the `work_mem` to 200 MB, 500 MB, and 1 GB, we will notice
    a slow decrease in the execution time, finally getting as low as 750 ms. However,
    we need to be mindful that this increase in `work_mem` won’t be possible on a
    production server for multiple sessions simultaneously. Anyway, this query does
    not seem to be too complicated. Are there other ways to improve its performance?


    ## Are There Better Ways?


    In all the execution plans produced during our experiments, there is one major
    deficiency: Postgres has to read the heap (table rows) in order to find records
    where the `actual_departure` is between August 8 and August 12. That indicates
    that an index on this attribute might help. Let’s go ahead and create the missing
    index:


    ```sql

    CREATE INDEX flight_actual_departure

    ON flight (actual_departure);

    ```


    Immediately, there is a difference in the execution plan (see Figure [10-4](#501585_2_En_10_Chapter.xhtml#Fig4)).


    ![](Images/501585_2_En_10_Fig4_HTML.jpg)


    A screenshot of a query plan. It has a few lines of code to check the airport
    booking. The planning time is 0.430 milliseconds and the execution time is 540.307
    milliseconds.


    Figure 10-4

    Execution plan with an index on the actual_departure column


    In addition, the execution time finally decreased, and we are down to a 0.5 sec
    execution time. However, the difference is still not as dramatic as we would like
    it to be. Notice in examining the new execution plan that PostgreSQL performs
    a full scan on the `passenger` table (see Figure [10-5](#501585_2_En_10_Chapter.xhtml#Fig5)).


    ![](Images/501585_2_En_10_Fig5_HTML.jpg)


    A screenshot of a query plan. It has a few lines of code to check the airport
    booking using hash join. The number of buckets is 1024, batches is 1, and memory
    usage is 12 kilobytes.


    Figure 10-5

    A part of the execution plan with a full table scan


    Noticing the join condition and foreign key constraint on the `booking_id` field,
    we might hypothesize that an index on `booking_id` might help. And, in fact, when
    a new index is created


    ```sql

    CREATE INDEX IF NOT EXISTS passenger_booking_id

    ON postgres_air.passenger

    (booking_id);

    ```


    …the execution plan changes dramatically—see Figure [10-6](#501585_2_En_10_Chapter.xhtml#Fig6).
    Now, the total execution time is just 10 ms, **fifty times** less than with the
    best possible parameter tuning.


    ![](Images/501585_2_En_10_Fig6_HTML.jpg)


    A screenshot of a query plan. It has a few lines of code to check the airport
    booking using 2 indexes. The planning time is 1.913 milliseconds and the execution
    time is 8.061 milliseconds.


    Figure 10-6

    Execution plan with two indexes


    More importantly, if we roll back the system parameters to the default settings
    and reduce the `shared_buffers` to 128 MB, nothing will change in either the execution
    plan or the execution time. No wonder—looking closely at the new execution plan
    in Figure [10-6](#501585_2_En_10_Chapter.xhtml#Fig6), now that there are no massive
    table scans, the increased shared buffers are not needed anymore!'
