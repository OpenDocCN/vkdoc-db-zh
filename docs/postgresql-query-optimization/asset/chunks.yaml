- fmt: '# 12. Functions


    This chapter focuses on the most underused and misused features of PostgreSQL,
    objects—functions. Since all modern programming languages include user-defined
    functions, people often assume that database functions are cut from the same cloth
    and if you know how and when to write functions in an application programming
    language, you can apply this directly to PostgreSQL. This could not be further
    from truth.


    This chapter discusses how PostgreSQL functions are different from functions in
    other programming languages, when functions should be created and when they should
    not, how using functions can improve performance, and how it can lead to a major
    performance degradation.


    Before proceeding, let’s address the widespread belief that using functions decreases
    portability. This is true as it goes, but consider the following:


    - Neither SQL statements nor ORMs are 100% portable; some (hopefully minor) work
    will always be required.

    - Swapping databases for an existing production system is always a major project
    and is never done on the fly. Some changes to the application itself are unavoidable.
    Converting functions adds relatively small overhead to the project.


    ## Function Creation


    PostgreSQL has both built-in (internal) functions and user-defined functions.
    In this respect, it is not any different from other programming languages.


    ### Internal Functions


    Internal functions are written in the C language and are integrated with the PostgreSQL
    server. For each data type supported by PostgreSQL, there are a number of functions
    that perform different operations with variables or column values of that type.
    Similar to imperative languages, there are functions for mathematical operations,
    functions to operate on strings, functions to operate on date/time, and many others.
    The list of available functions and supported types expands with each new release.


    Some examples of built-in functions are shown in Listing 12-1.


    ```

    sin(x);

    substr(first_name,1,1);

    now();

    Listing 12-1

    Examples of built-in functions

    ```


    ### User-Defined Functions


    User-defined functions are functions created by users. PostgreSQL supports three
    kinds of user-defined functions:


    - Query language functions, that is, functions written in SQL

    - C functions (written in C or C-like languages, like C++)

    - Procedural language functions, written in a supported procedural language (referred
    to as PL)


    A `CREATE FUNCTION` command is shown in Listing 12-2.


    ```

    CREATE FUNCTION function_name (par_name1 par_type1, ...)

    RETURNS return_type

    AS


    LANGUAGE function_language;

    Listing 12-2

    CREATE FUNCTION command

    ```


    From a PostgreSQL perspective, the database engine captures only the function
    signature—the name of the function and the list of parameters (which may be empty),
    the type of return value (which may be void), and some specifications, such as
    the language in which it is written. For all procedural languages except for SQL,
    the function `body` is packaged into a string literal, which is passed to a special
    handler that knows the details of the language. The handler can either do all
    the work of parsing, syntax analysis, execution, and so on itself, or it can serve
    as the “glue” between PostgreSQL and an existing implementation of a programming
    language. The standard PostgreSQL distribution supports four procedural languages:
    PL/pgSQL, PL/Tcl, PL/Perl, and PL/Python. In this book, we will discuss only functions
    written in PL/pgSQL.


    ### Introducing Procedural Language


    Since we’re covering functions, it seems like a good idea to formally introduce
    the language (or languages) in which these functions can be written.


    So far in this book, the only language that has been used is SQL, and the only
    operator used in code snippets, other than `CREATE` operators, was `SELECT`. Now,
    it is time to introduce procedural languages. In this book, we discuss only the
    PostgreSQL native procedural language `PL/pgSQL`.


    A function written in `PL/pgSQL` can include any SQL operators (potentially with
    some modifications) and control structures (`IF THEN ELSE`, `CASE`, `LOOP`) and
    calls to other functions.


    Listing 12-3 shows an example of a function written in `PL/pgSQL` that converts
    a text string to numeric, if possible, and returns null if the string does not
    represent a number.


    ```

    CREATE OR REPLACE FUNCTION text_to_numeric(input_text text)

    RETURNS numeric AS

    $BODY$

    BEGIN

    RETURN replace(input_text, '','', '''')::numeric;

    EXCEPTION WHEN OTHERS THEN

    RETURN NULL::numeric;

    END;

    $BODY$

    LANGUAGE plpgsql;

    Listing 12-3

    Function converting text to numeric

    ```


    Using the information in Listing 12-2, we can identify the parts common to all
    user-defined functions. The function name is `text_to_numeric`, and it has only
    one parameter, `input_text`, of type `text`.


    The `RETURNS` clause defines the type of value the function returns (`numeric`),
    and the `LANGUAGE` clause specifies the language in which the function is written,
    `plpgsql`.


    Now, let’s take a closer look at the function body.


    ### Dollar Quoting


    In the previous section, we stated that a function body is represented as a string
    literal; however, instead of quotes, it starts and ends with `$BODY$`. This notation
    in PostgreSQL is called `dollar quoting`, and it is especially useful when you
    create a function. Indeed, if you have a relatively large text of a function,
    chances are you will need to use single quotes or backslashes, and then you will
    need to double them at each occurrence. With dollar quoting, you can use two dollar
    signs, possibly with some tag between them to define a string literal.


    Tagging makes this way of defining string constants especially convenient, because
    you can nest strings with different tags. For example, the beginning of a function
    body can look like Listing 12-4.


    ```

    $function$

    DECLARE

    V_error_message text:=''Error:'';

    V_record_id integer;

    BEGIN

    ...

    v_error_message:=v_error_message||$em$Record can''t be updated, #$em$||quote_literal(v_record_id);

    ...

    END;

    $function$

    Listing 12-4

    The usage of nested dollar quoting

    ```


    Here, we use dollar quoting with the tag `function` for a function body. Note
    that there are no rules limiting which tags can be used for the function body,
    including the empty tag; the only requirement is that the string literal ends
    with the same tag as the tag that started it. The examples here will use different
    tags as a reminder that tags are not predefined.


    The function body starts with a `DECLARE` clause, which is optional and can be
    excluded if no variables are needed. `BEGIN` (without a semicolon) denotes the
    start of the statements section, and the `END` keyword should be the last statement
    in the function body.


    Please note this section is not a comprehensive guide to function creation. Please
    refer to PostgreSQL documentation for more details.


    More details are discussed as they are introduced in future examples.'
