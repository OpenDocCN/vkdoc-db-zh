    seat,\nboarding_time\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN\
    \ boarding_pass bp USING(booking_leg_id)\nJOIN passenger USING (passenger_id)\n\
    WHERE pass_id=p_pass_id;\nEND;\n$body$\nLANGUAGE plpgsql;\nListing 12-19\nFunction\
    \ that returns one boarding pass\n```\n\nWhen we execute this function\n\n```\n\
    SELECT * FROM boarding_passes_pass(215158);\n```\n\n…the result will be a set\
    \ that consists of only one row, but its structure will be the same (see Figure\
    \ [12-2](#501585_2_En_12_Chapter.xhtml#Fig2)).\n\n![](Images/501585_2_En_12_Fig2_HTML.jpg)\n\
    \nA screenshot presents a result database of boarding passes pass. It lists 10\
    \ columns and 1 row of data. The column headers are serial number, boarding pass\
    \ and booking leg I Ds, flight number, departure and arrival airports, last name,\
    \ first name, seat, and boarding time.\n\nFigure 12-2\n\nResult of the execution\
    \ of the function boarding_passes_pass\n\nWhy would using these functions improve\
    \ performance? As we discussed in Chapter [10](#501585_2_En_10_Chapter.xhtml),\
    \ applications rarely execute SQL statements directly; instead, they often use\
    \ SQL statements generated behind the scenes by ORMs. In this case, there is a\
    \ high likelihood that boarding passes, passengers, and flights are accessible\
    \ using different methods. That means that most likely, to select the same data\
    \ returned by the function `boarding_passes_flight`, we will need one method to\
    \ select departure airport, arrival airport, and scheduled departure for a flight,\
    \ which is passed as a parameter to this function, another method to select all\
    \ booking legs for that flight, another method for boarding passes, and yet another\
    \ for passenger information. If the application developers can be convinced, consolidating\
    \ this into a single function will be a huge performance improvement.\n\nSelecting\
    \ all boarding passes for a flight that has 600 passengers with the boarding pass\
    \ function takes 220 ms, running `SELECT * FROM boarding_passes_flight(13650)`.\
    \ On the other hand, any individual SELECT from any table takes around 150 ms.\
    \ Since each process returns data to the application, making a roundtrip, the\
    \ execution time is summed up—using multiple calls will very quickly exceed the\
    \ execution time of the function.\n\nPreviously, we learned that for scalar functions\
    \ there is no difference between the syntaxes `SELECT * FROM function_name` and\
    \ `SELECT function name`. But when a function returns a composite type, there\
    \ is a difference.\n\nFigure [12-1](#501585_2_En_12_Chapter.xhtml#Fig1) shows\
    \ the results when running\n\n```\nSELECT * FROM boarding_passes_flight(13)\n\
    ```\n\nFigure [12-3](#501585_2_En_12_Chapter.xhtml#Fig3) shows the results of\n\
    \n![](Images/501585_2_En_12_Fig3_HTML.jpg)\n\nA screenshot presents a result database\
    \ of boarding passes flight. It lists 2 columns and 5 rows of data. The column\
    \ headers are serial numbers and boarding passes flight.\n\nFigure 12-3\n\nFunction\
    \ results as a set of records\n\n```\nSELECT boarding_passes_flight(13)\n```"
  trans: "\n# 用户自定义数据类型\n\n除了其自身丰富的数据类型集合外，PostgreSQL 还允许创建几乎无限数量的用户自定义数据类型。\n\n用户自定义类型可以是简单的或复合的。简单的用户自定义类型包括以下类别：域（domain）、枚举（enum）和范围（range）。\n\
    \n以下是简单类型创建的示例：\n\n```sql\nCREATE DOMAIN timeperiod  AS tstzrange;\nCREATE TYPE\
    \ mood AS ENUM ('sad', 'ok', 'happy’);\nCREATE TYPE mood_range AS RANGE...\nCREATE\
    \ TYPE \n```\n\n正如我们可以定义基本类型的数组一样，我们也可以定义用户自定义类型的数组：\n\n```sql\nDECLARE\nv_moods_set\
    \ mood[];\n```\n\n当我们创建一个复合类型时，会有更多选项可用。\n\n复合类型代表一行或一条记录。一个类型定义由字段名序列及其各自的数据类型组成。例如，清单\
    \ 12-17 定义了类型 `boarding_pass_record`。\n\n```sql\nCREATE TYPE boarding_pass_record\
    \ AS (\nboarding_pass_id int,\nbooking_leg_id bigint,\nflight_no text,\ndeparture_airport\
    \ text,\narrival_airport text,\nlast_name text,\nfirst_name text,\nseat text,\n\
    boarding_time timestamptz\n);\n```\n**清单 12-17**\n类型 `boarding_pass_record`\n\n\
    既然类型 `boarding_pass_record` 已定义，我们就可以声明此类型的变量，就像声明基本类型的变量一样：\n\n```sql\nDECLARE\n\
    v_new_boarding_pass_record boarding_pass_record;\n```\n\n而且，我们还可以创建返回复合类型集合的函数。\n\
    \n# 返回复合类型的函数\n\n为什么函数能够返回复合类型集合这一点如此关键？我们为什么想要这样做呢？回想一下第 9 章，我们需要能够从数据库中检索整个对象，而不是一个接一个地获取其组成部分。现在，之前讨论的一切都可以结合起来了。\n\
    \n让我们构建一个例子。在清单 12-18 中，我们展示了一个返回指定航班所有登机牌的函数。\n\n```sql\nCREATE OR REPLACE FUNCTION\
    \ boarding_passes_flight (p_flight_id int)\nRETURNS SETOF boarding_pass_record\n\
    AS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\npass_id,\nbp.booking_leg_id,\nflight_no,\n\
    departure_airport::text ,\narrival_airport ::text,\nlast_name ,\nfirst_name ,\n\
    seat,\nboarding_time\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN\
    \ boarding_pass bp USING(booking_leg_id)\nJOIN passenger USING (passenger_id)\n\
    WHERE bl.flight_id=p_flight_id;\nEND;\n$body$\nLANGUAGE plpgsql;\n```\n**清单 12-18**\n\
    返回航班所有登机牌的函数\n\n要执行此函数，请运行以下命令：\n\n```sql\nSELECT * FROM boarding_passes_flight(13);\n\
    ```\n\n此 SELECT 语句的结果如图 12-1 所示。\n\n![](img/501585_2_En_12_Fig1_HTML.jpg)\n\n\
    截图展示了登机牌航班的结果数据库。它列出了 10 列和 5 行数据。列标题为序列号、登机牌 ID 和预订航段 ID、航班号、出发和到达机场、姓氏、名字、座位和登机时间。\n\
    \n**图 12-1**\n执行函数 `boarding_passes_flight` 的结果\n\n现在，让我们创建另一个函数，该函数将仅根据 `pass_id`\
    \ 选择一张登机牌。请注意，由于这两个函数都接受单个整数参数，因此在这种情况下无法使用重载。新函数如清单 12-19 所示。\n\n```sql\nCREATE\
    \ OR REPLACE FUNCTION boarding_passes_pass (p_pass_id int)\nRETURNS SETOF boarding_pass_record\n\
    AS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\npass_id,\nbp.booking_leg_id,\nflight_no,\n\
    departure_airport::text ,\narrival_airport ::text,\nlast_name ,\nfirst_name ,\n\
    seat,\nboarding_time\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN\
    \ boarding_pass bp USING(booking_leg_id)\nJOIN passenger USING (passenger_id)\n\
    WHERE pass_id=p_pass_id;\nEND;\n$body$\nLANGUAGE plpgsql;\n```\n**清单 12-19**\n\
    返回一张登机牌的函数\n\n当我们执行此函数时\n\n```sql\nSELECT * FROM boarding_passes_pass(215158);\n\
    ```\n\n……结果将是一个只包含一行的集合，但其结构将相同（参见图 12-2）。\n\n![](img/501585_2_En_12_Fig2_HTML.jpg)\n\
    \n截图展示了登机牌 pass 的结果数据库。它列出了 10 列和 1 行数据。列标题为序列号、登机牌 ID 和预订航段 ID、航班号、出发和到达机场、姓氏、名字、座位和登机时间。\n\
    \n**图 12-2**\n执行函数 `boarding_passes_pass` 的结果\n\n为什么使用这些函数能提高性能？正如我们在第 10 章讨论的，应用程序很少直接执行\
    \ SQL 语句；相反，它们通常使用 ORM 在后台生成的 SQL 语句。在这种情况下，登机牌、乘客和航班很可能可以通过不同的方法访问。这意味着，为了选择函数\
    \ `boarding_passes_flight` 返回的相同数据，我们很可能需要一种方法来选择航班的出发机场、到达机场和计划出发时间（该航班作为参数传递给此函数），另一种方法来选择该航班的所有预订航段，再一种方法选择登机牌，还有一种方法选择乘客信息。如果能够说服应用程序开发人员，将这些操作合并到一个函数中，将带来巨大的性能提升。\n\
    \n使用登机牌函数为拥有 600 名乘客的航班选择所有登机牌需要 220 毫秒，运行 `SELECT * FROM boarding_passes_flight(13650)`。另一方面，从任何表中进行任何单独的\
    \ SELECT 操作大约需要 150 毫秒。由于每个进程都将数据返回给应用程序，进行一次往返通信，因此执行时间会累加——使用多次调用会很快超过函数的执行时间。\n\
    \n之前我们了解到，对于标量函数，语法 `SELECT * FROM function_name` 和 `SELECT function name` 之间没有区别。但是当函数返回复合类型时，就存在区别了。\n\
    \n图 12-1 显示了运行以下语句的结果\n\n```sql\nSELECT * FROM boarding_passes_flight(13)\n```\n\
    \n图 12-3 显示了以下语句的结果\n\n![](img/501585_2_En_12_Fig3_HTML.jpg)\n\n截图展示了登机牌航班的结果数据库。它列出了\
    \ 2 列和 5 行数据。列标题为序列号和 boarding_passes_flight。\n\n**图 12-3**\n作为记录集合的函数结果\n\n```sql\n\
    SELECT boarding_passes_flight(13)\n```\n"
- fmt: '# Using Composite Types with Nested Structure


    Can we use composite types as elements of other composite types? Yes, PostgreSQL
    allows it.


    In Figure 11-4, we presented the structure of a complex object `booking_record`.
    One of its components is a complex object `booking_leg_record`. To build the representation
    of this object as a composite type, begin by creating a `flight_record` type and
    a `boarding_pass_record` type, and then proceed with creating a `booking_leg_record`
    type, as shown in Listing 12-20.


    ```sql

    CREATE TYPE flight_record AS(

    flight_id int,

    flight_no text,

    departure_airport_code text,

    departure_airport_name text,

    arrival_airport_code text,

    arrival_airport_name text,

    scheduled_departure timestamptz,

    scheduled_arrival timestamptz

    );

    CREATE TYPE booking_leg_record AS(

    booking_leg_id int,

    leg_num int,

    booking_id int,

    flight flight_record,

    boarding_passes boarding_pass_record[]

    );

    ```

    **Listing 12-20: More record type definitions**


    The `booking_leg_record` type contains as one of its elements a composite type
    `flight_record` and as another component the array of `boarding_pass_record` elements.


    Looks like we solved the problem stated in Chapter 11: we can create composite
    types with nested structure and create functions that return such objects. However,
    there are still plenty of problems to solve.


    To illustrate the remaining problems, let’s create a function that will return
    the whole object `booking_leg_record` using `booking_leg_id`. The code for this
    function is presented in Listing 12-21.


    ```sql

    CREATE OR REPLACE FUNCTION booking_leg_select (p_booking_leg_id int)

    RETURNS SETOF booking_leg_record

    AS

    $body$

    BEGIN

    RETURN QUERY

    SELECT

    bl.booking_leg_id,

    leg_num,

    bl.booking_id,

    (SELECT row(

    flight_id,

    flight_no,

    departure_airport,

    da.airport_name,

    arrival_airport,

    aa.airport_name ,

    scheduled_departure,

    scheduled_arrival)::flight_record

    FROM flight f

    JOIN airport da on da.airport_code=departure_airport

    JOIN airport aa on aa.airport_code=arrival_airport

    WHERE flight_id=bl.flight_id

    ),

    (SELECT array_agg (row(

    pass_id,

    bp.booking_leg_id,

    flight_no,

    departure_airport ,

    arrival_airport,

    last_name ,

    first_name ,

    seat,

    boarding_time)::boarding_pass_record)

    FROM flight f1

    JOIN  boarding_pass bp ON f1.flight_id=bl.flight_id

    AND bp.booking_leg_id=bl.booking_leg_id

    JOIN passenger p ON p.passenger_id=bp.passenger_id)

    FROM booking_leg bl

    WHERE bl.booking_leg_id=p_booking_leg_id

    ;

    END;

    $body$ language plpgsql;

    ```

    **Listing 12-21: Function returning a complex object with nested structure**


    Don’t be put off by the preceding massive function—it is long, but not too complex.
    Let’s take a closer look.


    The main `SELECT` extracts data from the `booking_leg` table, using the value
    of the function parameter as a search criterion. The first three elements of the
    record—`booking_leg_id`, `leg_num`, `booking_id`—come directly from the table
    `booking_leg`. The next element of the record is `flight_record`, where `flight_id`
    is the `flight_id` from the selected booking leg. This condition is set in the
    `WHERE` clause of the inner `SELECT`:


    ```sql

    WHERE flight_id=bl.flight_id

    ```


    We select the information about the flight, which is referenced in the selected
    booking leg.


    The internal function `row()` builds the row from the set of elements, and this
    row is cast to the type `flight_record`, which is the type expected in the `booking_leg_record`.


    The last element of the `booking_leg_record` is an array of boarding passes—as
    many passes as there are passengers in this reservation. Let’s take a closer look
    at this inner `SELECT`:


    ```sql

    (SELECT array_agg (row(

    pass_id,

    bp.booking_leg_id,

    flight_no,

    departure_airport ,

    arrival_airport,

    last_name ,

    first_name ,

    seat,

    boarding_time)::boarding_pass_record)

    FROM flight f1

    JOIN  boarding_pass bp ON f1.flight_id=bl.flight_id

    AND bp.booking_leg_id=bl.booking_leg_id

    JOIN passenger p ON p.passenger_id=bp.passenger_id)

    ```


    The first thing you notice about this select is that it is essentially the same
    select as we used in the `boarding_pass_flight` function. The differences are
    the following:


    *   There is no need to join with the `booking_leg` table, since it was already
    selected in the outer `SELECT`. We still need information from the `flight` table,
    but we can use the `flight_id` from the selected booking leg. This way, there
    is a Cartesian product with one line from the table `flight`.

    *   Similarly, for the boarding pass, there is no join with the `booking_leg`
    table; we just use the `booking_leg_id`, which is already there.


    Finally, we use the internal function `array_agg()` to create a single *array
    of records* that is expected as the last element of the `booking_leg_record`.


    **Note:** The preceding is only one of multiple ways to build an object with nested
    structure. In subsequent chapters, we will present alternative ways, which might
    be more useful in other circumstances.


    And now, here is the bad news. We put in so much effort to create this function,
    and now, when we execute it, the results are somewhat disappointing. Execute


    ```sql

    SELECT * FROM booking_leg_select (17564910)

    ```


    The result is shown in Figure 12-4.


    ![](Images/501585_2_En_12_Fig4_HTML.jpg)


    A screenshot presents a result database of booking leg selection. It lists 5 columns
    and 1 row of data. The column headers are serial number, booking leg i d, leg
    number, booking i d, and flight.


    **Figure 12-4: Returned complex object with nested structure**


    The result set looks exactly as we wanted it to look, but notice one important
    detail. For the scalar elements, PostgreSQL retains the element names (same as
    if we would select from a table), but when it comes to the elements that are complex
    objects themselves, their structure is not revealed. Note that, internally, PostgreSQL
    still retains the notion of what is the structure of the inner type, but it does
    not communicate it to the upper level.


    Why is this a problem? Chapter 11 covered ORM pitfalls and sketched out a hypothetical
    solution in Figure 11-3. At that time, we did not discuss any specifics of how
    this goal could be achieved, but with functions that can return complex types,
    a solution seems to be reachable. However, when neither an element name nor its
    type can be identified by the application, the function output becomes useless,
    at least for the purpose of being called from an application directly.


    The solution is in Chapter 14, but for now, let’s focus on functions that return
    records without nested structure.'
