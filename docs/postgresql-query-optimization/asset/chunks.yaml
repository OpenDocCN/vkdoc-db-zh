- fmt: '## Does Partitioning Improve Performance?


    There is a common belief that partitioning of a large table improves query performance.
    This is not always the case. Moreover, partitioning can often decrease performance,
    and you may need to rewrite your old queries to make sure that performance won’t
    be negatively affected.


    The way partitioning `can` improve performance is that if a query contains conditions
    on the partitioning key, the search is limited to these partitions only. This
    makes partitioning especially useful for long queries where full scans are the
    best option: partitioning can significantly reduce the time for table scans. For
    index access the difference is negligible: partitioning removes only one level
    from the `B-tree`.


    How should a partitioning key for a table be selected? The way the `Postgres`
    optimizer works, two conditions should be met: 1) the partitioning key should
    be used in (almost) all queries that run on this table, or at least in critical
    queries, 2) these values should be known prior to the SQL statement execution.
    The latter means that this value can’t be passed as a parameter or as a result
    of a subselect.


    Let’s look at an example from Chapter [6](#501585_2_En_6_Chapter.xhtml), Listing
    6-21. If this query is limited to boarding time between July 15 and July 31


    ```

    SELECT

    city,

    date_trunc(''month'', scheduled_departure),

    sum(passengers)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN (

    SELECT

    flight_id,

    count(*) passengers

    FROM   booking_leg l

    JOIN boarding_pass b USING (booking_leg_id)

    WHERE boarding_time > ''07-15-23''

    and boarding_time <''07-31-23''

    GROUP BY flight_id

    ) cnt

    USING (flight_id)

    GROUP BY 1,2

    ORDER BY 3 DESC

    ```


    …this will be still a long query, which will perform a full table scan of the
    `boarding_pass` table. The execution plan is identical to the one in Figure [6-18](#501585_2_En_6_Chapter.xhtml#Fig18).


    However, executing the similar query using the partitioned table `boarding_pass_part`
    (see Listing [7-13](#501585_2_En_7_Chapter.xhtml#PC26)), this query will take
    advantage of partitions.


    ```

    SELECT

    city,

    date_trunc(''month'', scheduled_departure),

    sum(passengers)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN (

    SELECT

    flight_id,

    count(*) passengers

    FROM   booking_leg l

    JOIN boarding_pass_part b USING (booking_leg_id)

    WHERE boarding_time > ''07-15-23''

    and boarding_time <''07-31-23''

    GROUP BY flight_id

    ) cnt

    USING (flight_id)

    GROUP BY 1,2

    ORDER BY 3 DESC

    Listing 7-13

    Querying a partitioned table

    ```


    The execution plan in Figure [7-7](#501585_2_En_7_Chapter.xhtml#Fig7) proves that
    instead of scanning the whole table, the optimizer chooses to scan only one partition,
    since the query is filtered on `boarding_time`. And while query runtime on a non-partitioned
    table is approximately the same regardless of filtering by `boarding_time`, for
    a partitioned table, the execution time is more than twice as fast, because all
    the rows are located in one partition.


    ![](Images/501585_2_En_7_Fig7_HTML.jpg)


    A query plan comprises 24 lines of text. It includes the sort key, group aggregate,
    group key, hash join, hash condition, subquery scan on the count, planned partition,
    sequential scans on booking, flight, and airport, along with other details.


    Figure 7-7


    Execution plan with a partitioned table


    Partitions may have their own indexes that obviously are smaller than an index
    on the whole partitioned table. This option might be beneficial for short queries.
    However, this might significantly improve performance only if almost all queries
    extract data from the same partition. The cost of search in a `B-tree` is proportional
    to its depth. An index on a partition, most likely, will eliminate only one level
    of the `B-tree`, while the choice of needed partition also requires some amount
    of resources. These resources are likely comparable with the amount needed for
    an extra index level. Of course, a query may refer to a partition instead of the
    whole partitioned table, hiding the cost of choosing the partition to the application
    issuing the query.


    Therefore, the benefits of partitioning for short queries should not be overestimated.


    ## Why Create a Partitioned Table?


    After reading the previous section, readers may wonder whether there is any justification
    to create partitioned tables. In fact, there are many, and we cover them in this
    section.


    Partitions can be added to a partitioned table or dropped. The `DROP` command
    is executed significantly faster than bulk `DELETE` and does not require subsequent
    vacuuming. A typical use case is a table partitioned on date ranges (e.g., partition
    per month), a new partition is added, and the oldest one is dropped at the end
    of every month.


    In addition, it is possible to `ATTACH` and `DETACH` partitions. This way, you
    can add an existing table as a partition to a partition table and detach partitions
    without deleting data. For example, you can keep the last three months of data
    in a partitioned table, add a new partition in the beginning of each month, detach
    the oldest partition, and then attach it to the archiving table.


    Partitioning may be used to distribute large amounts of data across several database
    servers: a partition can be a foreign table.


    The primary reason for partitioning, however, is the maintenance. When a table
    reaches terabyte size, it becomes challenging to copy such table or to run `pg_dump`
    on it. Most importantly, it becomes difficult to run `autovacuum` on this table.
    We will cover `autovacuum` and its importance for maintaining a healthy PostgreSQL
    database; for now, we just want to mention that `autovacuum` is extremely unlikely
    to complete on a 1 TB table.


    ## Parallelism


    Starting in version 10, PostgreSQL has capability to enable parallel query execution.
    Two configuration parameters, `max_parallel_workers` and `max_parallel_workers_per_gather`,
    define how many parallel processes are available and how many can be spanned in
    one session.


    We still recall the excitement of the community when this feature was introduced.
    Indeed, parallelism was and often is billed as a silver bullet to solve all performance
    problems, and we feel compelled to warn you about not setting expectations too
    high regarding parallelism—this is true in any RDBMS, not just PostgreSQL.


    Parallel execution can be viewed as yet another way to split up the query: the
    amount of work needed to execute a query is divided between processing units (processors
    or cores).


    Any parallel algorithm has a certain part that must be executed on a single unit.
    Also, additional overheads appear as a cost of synchronizations between parallel
    processes. For these reasons, parallel processing is mostly beneficial when bulk
    data is processed. Specifically, parallel execution is beneficial for massive
    scans and hash joins. Both scans and hash joins are typical for long queries,
    for which the speed-up is usually most significant.


    In contrast, the speed-up for short queries is usually negligible. Parallel execution
    of different queries may improve throughput, but this is not related to parallel
    execution of a single query.


    Sometimes the optimizer may replace index-based access (that would be used within
    sequential execution) with a parallel table scan. This may be caused by imprecise
    cost estimation. In such cases, parallel execution may be slower than sequential
    execution.


    All execution plans in this book were created with parallelism turned off.


    In addition, whatever scalability benefits are provided by parallel execution
    cannot fix poor design or compensate for inefficient code for a simple mathematical
    reason: scalability benefits from parallelism are at best linear, while the cost
    of nested loops is quadratic.'
