  raw: 'At first glance, it appears we are using the column `scheduled_departure`
    as a selection criterion, and since there is an index on this column, it should
    be used. However, the plan in Figure [5-4](#501585_2_En_5_Chapter.xhtml#Fig4)
    diverts to a sequential scan.


    ![](Images/501585_2_En_5_Fig4_HTML.jpg)


    A set of lines of text denotes a query plan comprising 2 lines. The lines denote
    the sequential scan on flight and the filter.


    Figure 5-4


    A plan that does not use the index due to the column transformation


    Why doesn’t PostgreSQL use the index? Because when the timestamp is converted
    to a date, a column transformation has been performed.


    So is an additional functional index on `scheduled_departure::date` needed? Not
    necessarily. What does this selection criterion mean? It means that we want to
    select flights that depart on these two specific dates, no matter the time of
    day. This means that the flight could depart any time between midnight of August
    17, 2023, and midnight of August 19, 2023\. In order to make the existing index
    work, the selection criteria can be modified to


    ```

    SELECT *

    FROM flight

    WHERE scheduled_departure >=''2023-08-17''

    AND  scheduled_departure <''2023-08-19''

    ```


    Figure [5-5](#501585_2_En_5_Chapter.xhtml#Fig5) shows how the execution plan has
    changed.


    ![](Images/501585_2_En_5_Fig5_HTML.jpg)


    A query plan comprises four lines of text. The lines represent the Bitmap heap
    scan on flight, recheck condition, Bitmap index scan on flight scheduled departure,
    and index condition.


    Figure 5-5


    An execution plan that uses the index


    Looking at the execution plan, you can see that the cost estimate for a plan with
    index-based access is more than twice less than a sequential scan (13857.42 vs.
    30474). What is more important, the execution time supports this observation:
    0.5 seconds for index-based access vs. 1.5 seconds for a sequential scan.


    Pay very close attention to this example. When you read about this example in
    a book, the preceding paragraph looks obvious. However, numerous SQL developers
    and report writers use similar search conditions over and over again. One frequent
    use case is changes made to a table today. Ninety-five percent of the time, this
    condition is written as `update_ts::date=CURRENT_DATE`, which successfully blocks
    the use of an index on the `update_ts` column. To take advantage of the index,
    this criterion should be written as


    ```

    update_ts>= CURRENT_DATE

    ```


    or, if it is possible for values of this timestamp to be in the future, the condition
    should be written as


    ```

    WHERE update_ts>= CURRENT_DATE AND update_ts< CURRENT_DATE +1

    ```


    Let’s examine another example where column transformation often remains unnoticed.
    Let’s say today is August 17, 2023\. We are looking for flights that have departed
    or are scheduled to depart today. We know that for flights that have not yet departed,
    the `actual_departure` column may be null.


    The `coalesce()` function in PostgreSQL allows us to use a different value when
    the first argument is null. Thus, `coalesce(actual_departure, scheduled_departure)`
    will return `actual_departure` if it is not null and `scheduled_departure` otherwise.
    Both the `scheduled_departure` and `actual_departure` columns are indexed, and
    you might expect these indexes to be used. For example, look at the execution
    plan for the following SQL statement shown in Figure [5-6](#501585_2_En_5_Chapter.xhtml#Fig6):


    ```

    SELECT *

    FROM flight

    WHERE coalesce(actual_departure, scheduled_departure)

    BETWEEN ''2023-08-17'' AND ''2023-08-18''

    ```


    ![](Images/501585_2_En_5_Fig6_HTML.jpg)


    A query plan comprises two lines of text. It denotes the sequential scan on flight
    and filter.


    Figure 5-6


    A plan with a sequential scan, when indexes are present


    Why aren’t any indexes utilized? Because `coalesce()` is a function, which modifies
    column values. Should we create another functional index? We can, but it is not
    really necessary. Instead, we can rewrite this SQL statement as shown in Listing
    [5-8](#501585_2_En_5_Chapter.xhtml#PC25), which will result in the execution plan
    in Figure [5-7](#501585_2_En_5_Chapter.xhtml#Fig7).


    ```

    SELECT * FROM flight

    WHERE (actual_departure

    BETWEEN ''2023-08-17'' AND ''2023-08-18'')

    OR (actual_departure IS NULL

    AND scheduled_departure BETWEEN ''2023-08-17'' AND ''2023-08-18'')

    Listing 5-8

    Query that uses both indexes

    ```


    ![](Images/501585_2_En_5_Fig7_HTML.jpg)


    A query plan comprises 8 lines of text. The lines denote the Bitmap heap scan
    on flight, recheck condition, filter, Bitmap index scan on flight actual departure,
    Bitmap index scan on flight scheduled departure, and index condition.


    Figure 5-7


    Execution plan for the query from Listing [5-8](#501585_2_En_5_Chapter.xhtml#PC25)


    ## Indexes and the *like* Operator


    Another group of search conditions that are not a straightforward comparison of
    column value constants are searches using the `like` operator. For example, the
    query


    ```

    SELECT * FROM account

    WHERE lower(last_name) like ''johns%'';

    ```


    will yield all accounts for which the last name begins with “johns.” In the `postgres_air`
    schema, the list of returned last names is


    ```

    "Johnson"

    "Johns"

    "johns"

    "Johnston"

    "JOHNSTON"

    "JOHNS"

    "JOHNSON"

    "johnston"

    "johnson"

    ```


    The only problem with this query is that it won’t utilize the functional index
    we created in the previous section, because B-tree indexes do not support searches
    with the “like” operator. Once again, if we check the execution plan for this
    query, we will see a sequential scan of the account table.


    How can we solve this problem and avoid a scan?


    One possible solution is to rewrite the query, replacing `like` with two conditions:


    ```

    SELECT * FROM account

    WHERE (lower(last_name) >=''johns'' and lower(last_name) < ''johnt'')

    ```


    The execution plan for this query is shown in Figure [5-8](#501585_2_En_5_Chapter.xhtml#Fig8),
    and we can see that this plan uses an existing index.


    ![](Images/501585_2_En_5_Fig8_HTML.jpg)


    A query plan comprises 4 lines of text. It denotes the Bitmap heap scan on account,
    recheck condition, Bitmap index scan on account last name lower, and index condition.


    Figure 5-8


    The plan for a rewritten query that uses an index


    A better solution would be to create a *pattern search* index:


    ```

    CREATE INDEX account_last_name_lower_pattern

    ON account (lower(last_name) text_pattern_ops);

    ```


    Why is this index necessary? Because comparison of text values depends on the
    *locale*, a set of rules about character ordering, formatting, and similar things
    that vary by language and country. Although some may think what we have in US
    English is the universal order of things, it is not. The only locale that would
    allow us to use a B-tree index is a “C” locale, which is a standards-compliant
    default locale. Only strict ASCII characters are valid in this locale.


    To see which locale was defined when the database was created, you need to run
    the command


    ```

    SHOW LC_COLLATE;

    ```


    And if you reside in the United States, there’s a good chance you will see


    ```

    "en_US.UTF-8"

    ```


    This newly created index will be utilized by queries that use the `like` operator.
    The new execution plan for our original query is shown in Figure [5-9](#501585_2_En_5_Chapter.xhtml#Fig9),
    and we can see that it takes advantage of the new index.


    ![](Images/501585_2_En_5_Fig9_HTML.jpg)


    A query plan comprises 4 lines of text. It denotes the Bitmap heap scan on account,
    filter, Bitmap index scan on account last name lower pattern, and index condition.


    Figure 5-9


    An execution plan with a pattern index'
