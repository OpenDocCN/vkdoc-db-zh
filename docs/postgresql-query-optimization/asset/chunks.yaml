  trans: '

    结果与 `booking_leg` 表相连接。PostgreSQL 使用顺序读取来访问此表，并使用哈希连接算法，条件为 `bl.flight_id = f.flight_id`。


    接着，通过顺序扫描（因为该表没有任何索引）访问 `passenger` 表，并再次使用哈希连接算法，条件是 `p.booking_id = bl.booking_id`。


    最后执行的操作是分组并计算聚合函数 `sum()`。排序操作确定了满足搜索条件的航班。然后，对每趟航班上的所有乘客数量进行计数。


    下一节将讨论还能从执行计划中解读出什么信息，以及为什么理解这些信息很重要。


    ## 理解执行计划


    理解小型执行计划很容易。回想一下，在第 3 章，我们比较了两个 `SELECT` 语句，即代码清单 3-2 和 3-3。我们曾说明，对于第一个语句，PostgreSQL
    会选择顺序扫描，而对于第二个语句，它会选择索引访问。我们当时是如何得知的？现在，你知道答案了：我们为两个语句都运行了 `EXPLAIN` 命令。代码清单 3-2
    的执行计划展示在图 4-5 中，代码清单 3-3 的执行计划展示在图 4-6 中。


    ![](img/501585_2_En_4_Fig6_HTML.jpg)


    一个包含 4 行的查询计划，包括在 flight 上的位图堆扫描、重新检查条件、在 flight scheduled departure 上的位图索引扫描以及索引条件。


    **图 4-6**


    代码清单 3-4 的执行计划


    ![](img/501585_2_En_4_Fig5_HTML.jpg)


    一个包含两行的查询计划，指示了在 flight 上的顺序扫描和过滤函数。


    **图 4-5**


    代码清单 3-3 的执行计划


    但如果执行计划更复杂呢？


    通常，当我们按照前述方式解释如何阅读执行计划时，我们的听众会被一个相对简单的查询所产生的庞大执行计划吓到，尤其是考虑到一个更复杂的查询可能产生一个 100
    多行的执行计划。即使是图 4-1 中展示的计划也可能需要一些时间来阅读。有时，即使计划中的每一行都能被解释，问题仍然存在：“我有一个查询，它很慢，你告诉我去看执行计划，而它有
    100 多行。我该怎么办？我该从哪里开始？”


    好消息是，在大多数情况下，你不需要阅读整个计划就能准确理解是什么导致了执行缓慢。在本节中，我们将进一步学习如何解读执行计划。


    ### 优化过程中发生了什么？


    正如第 2 章所述，优化器执行两种转换：它用相应的物理执行算法替换逻辑操作，并可能通过改变逻辑操作的执行顺序来改变逻辑表达式结构。


    查询被解析并检查语法正确性后，第一步是查询重写。在此步骤中，PostgreSQL 优化器通过消除子查询、用其文本表示替换视图等方式来增强代码。必须记住，这个步骤总是会发生。当视图的概念被引入时，SQL
    教科书通常建议“视图可以像表一样使用”，这是误导性的。在大多数情况下，视图会被其源代码替代。然而，“大多数时候”并不意味着“总是”。第 7 章将讨论视图、优化器如何处理它们以及它们潜在的性能陷阱。


    查询重写之后的下一个步骤通常就是我们所说的优化，它包括以下内容：


    *   确定操作的可能顺序

    *   确定每个操作的可能执行算法

    *   比较不同计划的成本

    *   选择最优执行计划


    许多 SQL 开发人员假设 PostgreSQL 执行查询访问（和连接）表的顺序与它们在 `FROM` 子句中出现的顺序相同。


    然而，连接顺序*大多时候*并不被保留——数据库并不遵循这些指令。在后续章节中，我们将更详细地讨论什么会影响操作顺序。现在，让我们考虑如何评估一个执行计划。


    ### 为什么有这么多执行计划可供选择？


    我们多次提到，一条 `SQL` 语句可以通过多种方式执行，使用不同的执行计划。实际上，对于一条语句，可能存在数百、数千甚至数百万种可能的执行方式！本章让你对这些数字的来源有所了解。计划可能因以下方面而有所不同：


    *   操作顺序

    *   用于连接和其他操作的算法（例如，嵌套循环、哈希连接）

    *   数据检索方法（例如，索引使用、全表扫描）


    从形式上讲，优化器通过计算所有可能计划的成本，然后比较这些成本来找到最佳计划。但既然我们知道执行每种连接有三种基本算法，那么一个涉及三个表的简单 `SELECT`
    语句就可能产生九种可能的执行计划；考虑到 12 种可能的连接顺序，就有 108 种可能的计划（3 * 3 * 12 = 108）。如果我们再考虑每个表的所有潜在数据检索方法，就有数千个计划需要比较。


    幸运的是，PostgreSQL 并不检查每一个可能的计划。


    基于成本的优化算法依赖于最优性原理：一个最优计划的子计划对于相应的子查询也是最优的。一个计划可以看作是多个组成部分或子计划的组合。一个子计划是指包含原始计划中任何操作作为根节点及其所有后代节点的计划，即所有为作为子计划根节点的操作贡献输入参数的操作。优化器从最小的子计划（即对单个表的数据访问）开始构建最优计划，并逐步生成更复杂的子计划，包含更多操作，而每一步只进行少量的成本检查。该算法在某种意义上是穷尽式的，即最终将构建出最优计划，尽管大部分可能的计划都不会被尝试。


    例如，在前面的例子中，一旦优化器为三个表中的一个选择了正确的数据检索算法，它就不会再考虑任何不使用该最优算法的计划。


    尽管如此，生成的子计划数量仍然可能非常庞大。`geqo_threshold` 配置参数指定了查询中连接数量的上限，对于连接数量不超过此限值的查询，会执行近乎穷尽的搜索以找到最佳连接序列。如果表的数量超过此上限，则通过启发式方法确定连接顺序。启发式方法会剔除不太可能包含最优计划的计划空间部分，从而减少优化算法需要检查的计划数量。虽然此功能有助于优化器更快地选择执行计划，但也可能对性能产生负面影响：存在最佳执行计划在成本比较之前被意外丢弃的风险。


    尽管启发式方法可能会剔除最优计划，但该算法仍会在剩余的计划中构建出最佳的一个。


    现在，让我们更仔细地看看这些成本是如何计算的。

    '
- fmt: '## How Are Execution Costs Calculated?


    In Chapter [3](#501585_2_En_3_Chapter.xhtml), we discussed ways to measure the
    performance of database algorithms. We talked about internal metrics and established
    that the costs of algorithms are measured in the number of I/O operations and
    CPU cycles. Now, we are going to apply this theory to practice.


    The cost of each execution plan depends on:

    * Cost formulas of algorithms used in the plan

    * Statistical data on tables and indexes, including distribution of values

    * System settings (parameters and preferences), such as `join_collapse_limit`
    or `cpu_index_tuple_cost`


    Chapter [3](#501585_2_En_3_Chapter.xhtml) covered the formulas to calculate cost
    for each algorithm. Each of these formulas depends on the size of the table(s)
    used, as well as on the expected size of the result set. And finally, users can
    alter the default cost for operations with system settings. The choice of an optimal
    plan can be implicitly controlled by changes in the optimizer parameters that
    are used during the cost estimation. Thus, all three pieces of information factor
    into the calculation of the cost of execution plans.


    This is counterintuitive; often, SQL developers have the subconscious expectation
    that the “best possible plan” exists and, moreover, that it is the same for all
    “similar” queries. However, due to the factors listed in the preceding list, the
    optimizer may produce different execution plans for nearly identical SQL queries
    or even for the same query. How can this happen? The optimizer chooses the plan
    with the best cost estimation. However, there may be several plans with only slightly
    different costs. The cost estimation depends on the database statistics that are
    gathered from random samples. The statistics gathered yesterday may slightly differ
    from those gathered today. Due to these slight changes, a plan that was the best
    yesterday can become second best today. Of course, statistics may also change
    as a result of insertions, updates, and deletions.


    Let’s look at some examples. Listings [4-3](#501585_2_En_4_Chapter.xhtml#PC3)
    and [4-4](#501585_2_En_4_Chapter.xhtml#PC4) present two queries, which appear
    almost identical. The only difference is in the filtering value. However, the
    execution plans presented in Figures [4-7](#501585_2_En_4_Chapter.xhtml#Fig7)
    and [4-8](#501585_2_En_4_Chapter.xhtml#Fig8) are markedly different.


    ```sql

    SELECT flight_id,

    scheduled_departure

    FROM flight f

    JOIN airport a ON departure_airport=airport_code

    AND iso_country=''US''

    ```

    Listing 4-3: Simple SELECT with one condition


    ![](Images/501585_2_En_4_Fig7_HTML.jpg)

    A query plan with 6 lines includes the hash join, hash condition, sequential scan
    on flight, hash, sequential scan on airport, and filter functions.

    Figure 4-7: Execution plan for Listing [4-3](#501585_2_En_4_Chapter.xhtml#PC3)


    ```sql

    SELECT flight_id,

    scheduled_departure

    FROM flight f

    JOIN airport a ON departure_airport=airport_code

    AND iso_country=''CZ''

    ```

    Listing 4-4: The same SELECT as Listing 4-3, with a different search value


    ![](Images/501585_2_En_4_Fig8_HTML.jpg)

    A query plan with 7 lines includes the nested loop, sequential scan on airport,
    filter, bitmap heap scan on flight, recheck condition, bitmap index scan on flight
    departure airport, and index condition.

    Figure 4-8: Execution plan for Listing [4-4](#501585_2_En_4_Chapter.xhtml#PC4)


    What causes this difference? Figure [4-9](#501585_2_En_4_Chapter.xhtml#Fig9) gives
    a clue: The first query selects a significant portion of all airports, and using
    an index won’t improve performance. The second query, by contrast, will select
    only one airport, and in this case index-based access will be more efficient.


    ![](Images/501585_2_En_4_Fig9_HTML.jpg)

    A bar graph titled Count has an increasing trend from left to right for 32 countries.
    The lowest value is 1 for C Z and E T. The highest value is 141 for the U S. The
    values are approximate.

    Figure 4-9: A histogram of value distribution


    This example also explains why keeping the database statistics up to date is so
    important. If the query planner won’t be aware of such uneven distribution, it
    might choose an execution plan that would be far from optimal. The `ANALYZE` command
    recalculates statistics for a table that is passed as a parameter and updates
    statistics on the table’s indexes. PostgreSQL has a special mechanism to update
    statistics automatically, and we will discuss it in more detail in Chapter [8](#501585_2_En_8_Chapter.xhtml).
    However, if you are following the examples from this book and replay them on your
    local copy, you should manually run `ANALYZE` after building new indexes.


    ## How Can the Optimizer Be Led Astray?


    But how can we be sure that the plan the optimizer has selected is indeed the
    best possible plan? Is it even possible to find the best execution plan? We spent
    quite a bit of time explaining that the optimizer does the best possible job if
    we leave it alone and don’t interfere. If that’s true, what is the rest of the
    book about? The reality is that no optimizer is perfect, even the PostgreSQL query
    planner.


    First, while the optimization algorithm is mathematically correct—it finds the
    plan with the best cost estimation—those cost estimates are intrinsically imprecise.
    The simple formulas explained in Chapter [3](#501585_2_En_3_Chapter.xhtml) are
    valid only for a uniform distribution of data, but a uniform distribution seldom
    occurs in real databases. In reality, optimizers use more complex formulas, but
    these are also imperfect approximations of reality. As George Box said, “All models
    are wrong, but some are useful.”


    Second, database systems, including PostgreSQL, maintain detailed statistics of
    stored data (usually in histograms). Histograms significantly improve estimates
    of selectivity. Unfortunately, histograms cannot be used for intermediate results.
    Errors in estimating intermediate results are the primary reason the optimizer
    may fail to produce an optimal plan.


    Third, an optimal plan may be cut out with heuristics, or a query might be too
    complex for an exact optimization algorithm. In the latter case, approximate optimization
    algorithms are used.


    In all these cases, some human intervention is required, and that’s what this
    book is about! Now that we know what’s going on during optimization, we can fix
    it if something doesn’t work quite right.


    In spite of these potential hiccups, optimizers work well in the majority of cases.
    However, humans observe the behavior of the system and therefore have more information
    available than the optimizer and can use this additional knowledge to help the
    optimizer do its job even better.


    This chapter covered execution plans: how they are generated and how to read and
    understand them. We also learned about cost-based optimization and factors that
    impact the cost of execution plans.


    Although cost-based optimizers usually do a good job, sometimes they need help,
    and now we are well equipped to provide it. Subsequent chapters will go over multiple
    examples of queries that require some human intervention to achieve better performance.'
