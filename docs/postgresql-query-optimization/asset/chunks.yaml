    函数执行耗时 10 秒。


    正如我们之前讨论的，如果在当前会话中，前五次函数执行产生的执行计划对后续执行并非最优，那么不同函数调用的执行时间甚至可能更长。在测试此函数时，我们设法找到一个函数调用顺序，使得最后一个示例的运行时间长达三分钟。但是，即使在预期响应时间低于
    100 毫秒的情况下，十秒的执行时间也可能导致应用程序超时。即便这种情况极为罕见，但在生产系统中也是不可接受的。


    我们能否找到替代解决方案？与前面的示例类似，可以编写一个函数，根据传入的参数动态构建 `SELECT` 语句。此外，它还能在每次执行前受益于分析。


