  trans: '

    ## 使用动态 SQL 辅助优化器


    由于本章全文致力于探讨如何通过动态 SQL 提升查询性能，本节标题或许令人费解。然而本节关注的是另一类性能问题成因。这些示例中，动态 SQL 并非用于构建特定场景的
    SQL 语句，而是用于引导优化器选择更优的执行计划。


    细察前一节所有示例，会发现有一种搜索条件组合表现尤为糟糕——尽管结果集很小，即同时根据预订邮箱和出发机场进行搜索时。即使邮箱条件具有足够筛选性，优化器仍未能利用第二次连接中`booking_id`的索引。若执行代码清单
    13-13，其执行计划显示为哈希连接——参见图 13-4。


    ```sql

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.account_id,

    b.email

    FROM booking b

    JOIN  booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton510%''

    AND departure_airport=''JFK''

    清单 13-13

    通过邮箱和出发机场选择预订记录

    ```


    该查询执行时间约四秒，而结果仅包含 16 行数据。对于如此小规模的查询，其执行速度理应更快。


    此次优计划的原因前文已提及——PostgreSQL 优化器未能准确估算中间结果集的大小。通过模式索引筛选出的实际行数为 3941，而计划中的估算值却是 28219。


    ![](img/501585_2_En_13_Fig4_HTML.jpg)


    查询计划截图。包含 23 行代码，通过哈希连接检查机场预订记录。


    图 13-4


    代码清单 13-13 使用哈希连接的执行计划


    优化此查询的技术本质上是辅助优化器完成工作，消除对结果集大小估算的需求。具体方法是：首先找出与目标邮箱对应的预订 ID，然后将`booking_id`列表传递给主`SELECT`语句。注意：本例使用的函数高度特定于当前场景，仅作演示用途（清单
    13-14）。更接近生产环境通用方案的函数会庞大得多。


    ```sql

    CREATE OR REPLACE FUNCTION select_booking_email_departure(

    p_email text,

    p_dep_airport text)

    RETURNS SETOF booking_record_basic AS

    $body$

    DECLARE

    v_sql text;

    v_booking_ids text;

    BEGIN

    EXECUTE $$SELECT array_to_string(array_agg(booking_id), '','')

    FROM booking

    WHERE lower(email) like $$||quote_literal(p_email||''%'')

    INTO v_booking_ids;

    v_sql=

    $$SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.account_id,

    b.email

    FROM booking b

    JOIN  booking_leg bl USING(booking_id)

    JOIN flight f USING (flight_id)

    WHERE b.booking_id IN ($$||v_booking_ids||$$)

    AND departure_airport=$$||quote_literal(p_dep_airport);

    RETURN QUERY EXECUTE v_sql;

    END;

    $body$ LANGUAGE plpgsql;

    清单 13-14

    通过动态 SQL 改进清单 13-13 的代码

    ```


    为何此方法有效？我们知道邮箱搜索将具有较强限制性，因为传递的参数几乎是完整邮箱地址（或至少是其核心部分）。因此第一步预先筛选出具有该邮箱的较少数量预订记录，并保存至文本变量`v_booking_ids`。随后在`SELECT`语句中显式使用`booking_id`列表构建查询。


    执行这个新函数


    ```sql

    SELECT * FROM select_booking_email_departure(''lawton510'',''JFK'')

    ```


    ……执行时间将仅需 200 毫秒。检查生成的 SQL 语句的`EXPLAIN`命令输出，其执行计划如图 13-5 所示。


    ![](img/501585_2_En_13_Fig5_HTML.jpg)


    查询计划截图。包含 16 行代码，通过预订 ID 列表检查机场预订记录。


    图 13-5


    使用`booking_id`列表的动态 SQL 执行计划


    即使涉及数千个 ID，基于索引的访问方式仍证明更为高效。


    ## 外部数据包装器与动态 SQL


    如引言所述，分布式查询的详细讨论超出本书范围。但由于涵盖动态 SQL，借此机会对外部数据包装器（FDWs）的应用稍作说明。


    外部数据包装器是能与外部数据源通信的库（即位于 PostgreSQL 服务器外的数据），它隐藏了连接数据源及从中获取数据的具体细节。


    FDW 是功能强大的工具，针对不同类型数据库的外部数据包装器正日益增多。PostgreSQL 在优化涉及`foreign tables`（外部系统表的映射）的查询方面表现出色。然而，由于访问外部统计信息可能受限（尤其当外部系统非
    PostgreSQL 时），优化可能不够精确。我们发现运用前节所述技术极具助益。


    优化的第一种方式是先执行查询的本地部分，识别需要从远程服务器获取的记录，再访问远程表。另一种方式是将带常量条件（如`WHERE update_ts> CURRENT_DATE
    -3`）的查询发送至远程站点，将远程数据拉取到本地，再执行查询剩余部分。采用这两种技术之一有助于最小化执行时间的不一致性。


    ## 总结


    动态 SQL 是 PostgreSQL 中极其强大的工具，却未被数据库开发者充分利用。当所有其他优化技术失效时，动态 SQL 能有效提升性能。


    动态 SQL 在函数内效果最佳：基于函数输入参数生成 SQL 语句后执行。它既适用于 OLTP 环境，也适用于 OLAP 环境。


    若选择在项目中使用动态 SQL，请准备好进行大量耗时的调试工作。初期可能令人沮丧，但性能提升绝对物有所值。


    # 14. 规避对象关系映射的陷阱


    第 11 章讨论了应用程序与数据库的典型交互，阐释了 ORMI（对象关系阻抗失配）及其对性能的影响。同时指出，任何潜在解决方案都应支持对大型对象（即数据集）的操作，并应支持复杂对象的交换。本章介绍我们开发并成功应用于生产环境的方法，称为
    NORM（非对象关系映射）。


    在克服对象关系阻抗失配的探索中，我们绝非先驱，也非首个提出 ORM 替代方案者。NORM 只是众多可行方案之一。然而使其在众多工具中脱颖而出的特点，是其对应用程序开发者的易用性。


    NORM GitHub 仓库（[`https://github.com/hettie-d/NORM`](https://github.com/hettie-d/NORM)）包含关于该方法的文档及按
    NORM 方法构建的代码示例。最重要的是，它提供了一套可自动化生成函数代码的程序集。本章后续将提供更详细的说明。

    '
- fmt: '## Why Application Developers Like NORM


    Often, new development methodologies require application developers to make significant
    changes to the development process, which inevitably leads to lower productivity.
    It is not unusual for potential performance gains to fail to justify the increase
    in development time. After all, developer time is the most expensive resource
    in any project.


    In Chapter [12](#501585_2_En_12_Chapter.xhtml), the benefits of using functions
    were preceded by the caveat “if you can convince application developers.” And
    often, you can’t convince them, because of the difficulties of adapting to a new
    programming style. That is not the case with NORM. In the following sections,
    we will explain the appeal of this approach for both application developers and
    database developers.


    ## ORM vs. NORM


    Chapter [11](#501585_2_En_11_Chapter.xhtml) discussed a bottleneck in data exchange
    created by ORM. Figure [14-1](#501585_2_En_14_Chapter.xhtml#Fig1) is a copy of
    Figure 11-1 from Chapter [11](#501585_2_En_11_Chapter.xhtml), and it represents
    the dataflow between an application and a database.


    ![](Images/501585_2_En_14_Fig1_HTML.jpg)


    An architecture diagram of the O R M process to map a database model into an application
    model. Flat tables and J D B C are involved in this process.


    Figure 14-1: How ORM works


    The major problem is that complex objects from the application model are disassembled
    into atomic objects before communicating with the database, generating too many
    too small queries, which bring down system performance. An even more important
    problem is that the correspondence between application complex objects and database
    complex data structures is lost.


    The approach proposed by NORM is presented in Figure [14-2](#501585_2_En_14_Chapter.xhtml#Fig2).


    ![](Images/501585_2_En_14_Fig2_HTML.jpg)


    An architecture diagram of the N O R M process to map a database model into an
    application model. J S O N transfer model is involved in this process.


    Figure 14-2: How NORM works


    In this figure, A-Model is an application model, D-Model is a database model,
    and T-Model is a `transfer model`. The presence of the T-Model is a unique feature
    of the NORM approach, which makes the mapping `symmetrical`. We are not trying
    to build a database model based on an application model, nor are we insisting
    on creating database objects first.


    Instead, we call for `a contract` to be established between the application layer
    and the database, like the way you would see a contract over a RESTful web service.
    The NORM contract requires that an application controller performs at most two
    accesses to the database: one to obtain all data needed for the function and another
    to send request for data modification. Since the whole complex hierarchical object
    is sent or received as a minimal unit of transfer, it is extremely important to
    properly define it for each case (or choose the right class/hierarchy from the
    ones already defined). Different implementations of NORM may use different means
    to represent hierarchies. Our implementation uses one of the most popular notations,
    namely, `JSON`.


    The contract, or a T-Model, comes in a form of a `JSON schema` describing the
    structure of complex objects, their relationships in a hierarchy, and mapping
    of these objects to the database objects (tables and columns).


    Through this contract, it is possible to simplify the persistence of objects by
    serializing the objects into `JSON payloads` that the database can consume. This
    results in one database call to persist an object regardless of its structure
    or complexity.


    Likewise, when retrieving objects, the application can deserialize the result
    coming back from the database to a model in a single database call. It can also
    pass additional parameters as a part of the contract to tell the database that
    it needs additional pieces of the model, similar to an ODATA web service request.


    Many application developers love the simplified implementation of the data access
    layer on the application side. The fact that NORM uses a contract to determine
    the inputs and outputs of every call to the database allows application developers
    to code to the contract and easily mock out any dependencies when testing, as
    the calls to and from the database will abide by the contract. Thus, after a contract
    is established, database and application developers can do their part simultaneously
    and independently from each other. Moreover, different groups of application developers
    can use the same contract for different projects.


    On the application side, almost all modern object-oriented languages have libraries
    for serializing and deserializing objects. As each new database interaction occurs,
    it is possible to reuse the same pattern for implementation.


    This allows application developers to spend more time designing the `JSON payload`
    to ensure it meets the current and future needs of the business. Reusing the same
    pattern of interactions also reduces implementation time, minimizes the likelihood
    of defects, and allows minimal code changes to impact the entire database access
    implementation. More importantly, an application usually needs different complex
    objects and thus requires multiple contracts, although these complex objects can
    be built from the same database.'
  raw: '## Why Application Developers Like NORM


    Often, new development methodologies require application developers to make significant
    changes to the development process, which inevitably leads to lower productivity.
    It is not unusual for potential performance gains to fail to justify the increase
    in development time. After all, developer time is the most expensive resource
    in any project.


    In Chapter [12](#501585_2_En_12_Chapter.xhtml), the benefits of using functions
    were preceded by the caveat “if you can convince application developers.” And
    often, you can’t convince them, because of the difficulties of adapting to a new
    programming style. That is not the case with NORM. In the following sections,
    we will explain the appeal of this approach for both application developers and
    database developers.


    ## ORM vs. NORM


    Chapter [11](#501585_2_En_11_Chapter.xhtml) discussed a bottleneck in data exchange
    created by ORM. Figure [14-1](#501585_2_En_14_Chapter.xhtml#Fig1) is a copy of
    Figure [11-1](#501585_2_En_11_Chapter.xhtml#Fig1) from Chapter [11](#501585_2_En_11_Chapter.xhtml),
    and it represents the dataflow between an application and a database.


    ![](Images/501585_2_En_14_Fig1_HTML.jpg)


    An architecture diagram of the O R M process to map a database model into an application
    model. Flat tables and J D B C are involved in this process.


    Figure 14-1


    How ORM works


    The major problem is that complex objects from the application model are disassembled
    into atomic objects before communicating with the database, generating too many
    too small queries, which bring down system performance. An even more important
    problem is that the correspondence between application complex objects and database
    complex data structures is lost.


    The approach proposed by NORM is presented in Figure [14-2](#501585_2_En_14_Chapter.xhtml#Fig2).


    ![](Images/501585_2_En_14_Fig2_HTML.jpg)


    An architecture diagram of the N O R M process to map a database model into an
    application model. J S O N transfer model is involved in this process.


    Figure 14-2


    How NORM works


    In this figure, A-Model is an application model, D-Model is a database model,
    and T-Model is a *transfer model*. The presence of the T-Model is a unique feature
    of the NORM approach, which makes the mapping *symmetrical*. We are not trying
    to build a database model based on an application model, nor are we insisting
    on creating database objects first.


    Instead, we call for *a contract* to be established between the application layer
    and the database, like the way you would see a contract over a RESTful web service.
    The NORM contract requires that an application controller performs at most two
    accesses to the database: one to obtain all data needed for the function and another
    to send request for data modification. Since the whole complex hierarchical object
    is sent or received as a minimal unit of transfer, it is extremely important to
    properly define it for each case (or choose the right class/hierarchy from the
    ones already defined). Different implementations of NORM may use different means
    to represent hierarchies. Our implementation uses one of the most popular notations,
    namely, JSON.


    The contract, or a T-Model, comes in a form of a JSON schema describing the structure
    of complex objects, their relationships in a hierarchy, and mapping of these objects
    to the database objects (tables and columns).


    Through this contract, it is possible to simplify the persistence of objects by
    serializing the objects into JSON payloads that the database can consume. This
    results in one database call to persist an object regardless of its structure
    or complexity.


    Likewise, when retrieving objects, the application can deserialize the result
    coming back from the database to a model in a single database call. It can also
    pass additional parameters as a part of the contract to tell the database that
    it needs additional pieces of the model, similar to an ODATA web service request.


    Many application developers love the simplified implementation of the data access
    layer on the application side. The fact that NORM uses a contract to determine
    the inputs and outputs of every call to the database allows application developers
    to code to the contract and easily mock out any dependencies when testing, as
    the calls to and from the database will abide by the contract. Thus, after a contract
    is established, database and application developers can do their part simultaneously
    and independently from each other. Moreover, different groups of application developers
    can use the same contract for different projects.


    On the application side, almost all modern object-oriented languages have libraries
    for serializing and deserializing objects. As each new database interaction occurs,
    it is possible to reuse the same pattern for implementation.


    This allows application developers to spend more time designing the JSON payload
    to ensure it meets the current and future needs of the business. Reusing the same
    pattern of interactions also reduces implementation time, minimizes the likelihood
    of defects, and allows minimal code changes to impact the entire database access
    implementation. More importantly, an application usually needs different complex
    objects and thus requires multiple contracts, although these complex objects can
    be built from the same database.'
  trans: '

    ## 为何应用开发者青睐 NORM


    通常，新的开发方法论会要求应用开发者对开发流程进行重大调整，这不可避免地会导致生产力下降。潜在的性能提升往往无法弥补开发时间的增加，这并不罕见。毕竟，开发者的时间是任何项目中最昂贵的资源。


    在第 12 章中，在阐述使用函数的优势之前，有一个告诫：“如果你能说服应用开发者的话”。而通常情况下，你很难说服他们，因为适应新的编程风格存在困难。但 NORM
    的情况并非如此。在接下来的章节中，我们将解释这种方法对应用开发者和数据库开发者的吸引力所在。


    ## ORM vs. NORM


    第 11 章讨论了 ORM 造成的数据交换瓶颈。图 14-1 是第 11 章中的图 11-1 的复本，它展示了应用程序和数据库之间的数据流。


    ![](img/501585_2_En_14_Fig1_HTML.jpg)


    一个展示 O R M 如何将数据库模型映射到应用模型的架构图。此过程涉及平面表和 J D B C。


    图 14-1：ORM 的工作原理


    主要问题在于，来自应用模型的复杂对象在与数据库通信之前被分解为原子对象，产生了过多、过小的查询，这降低了系统性能。一个更严重的问题是，应用复杂对象与数据库复杂数据结构之间的对应关系丢失了。


    NORM 提出的方法如图 14-2 所示。


    ![](img/501585_2_En_14_Fig2_HTML.jpg)


    一个展示 N O R M 如何将数据库模型映射到应用模型的架构图。此过程涉及 J S O N 传输模型。


    图 14-2：NORM 的工作原理


    在此图中，A-Model 是应用模型，D-Model 是数据库模型，T-Model 是`传输模型`。T-Model 的存在是 NORM 方法的一个独特特性，它使得映射是`对称的`。我们不是试图基于应用模型构建数据库模型，也不是坚持先创建数据库对象。


    相反，我们呼吁在应用层和数据库之间建立`契约`，类似于你在 RESTful Web 服务上看到的契约。NORM 契约要求应用控制器对数据库的访问最多两次：一次是获取功能所需的所有数据，另一次是发送数据修改请求。由于整个复杂的层次结构对象是作为最小传输单元发送或接收的，因此为每个用例正确定义它（或从已定义的类/层次结构中选择合适的类/层次结构）至关重要。NORM
    的不同实现可能使用不同的手段来表示层次结构。我们的实现使用了最流行的表示法之一，即`JSON`。


    该契约，或称 T-Model，以`JSON 模式`的形式呈现，该模式描述了复杂对象的结构、它们在层次结构中的关系以及这些对象到数据库对象（表和列）的映射。


    通过此契约，可以将对象序列化为数据库可以处理的`JSON 有效载荷`，从而简化对象的持久化。这导致无论对象结构或复杂度如何，只需一次数据库调用即可持久化一个对象。


    同样，在检索对象时，应用可以通过一次数据库调用将数据库返回的结果反序列化为模型。它还可以传递额外的参数作为契约的一部分，告诉数据库它需要模型的额外部分，类似于
    ODATA Web 服务请求。


    许多应用开发者喜爱应用端数据访问层的简化实现。NORM 使用契约来确定每次数据库调用的输入和输出，这一事实允许应用开发者针对契约进行编码，并在测试时轻松模拟任何依赖项，因为进出数据库的调用都将遵守契约。因此，一旦契约建立，数据库和应用开发者可以独立并同时进行各自的工作。此外，不同的应用开发者团队可以在不同的项目中使用相同的契约。


    在应用端，几乎所有现代面向对象语言都有用于序列化和反序列化对象的库。随着每次新的数据库交互发生，可以重用相同的实现模式。


    这使得应用开发者可以花费更多时间设计`JSON 有效载荷`，以确保其满足当前和未来的业务需求。重用相同的交互模式也减少了实现时间，最大程度地减少了缺陷的可能性，并允许最小的代码更改影响整个数据库访问实现。更重要的是，一个应用程序通常需要不同的复杂对象，因此需要多个契约，尽管这些复杂对象可以从同一个数据库构建。

