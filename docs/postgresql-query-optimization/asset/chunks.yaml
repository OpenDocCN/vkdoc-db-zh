    …the execution plan will look something like this:


    ```

    "Result (cost=0.00..0.26 rows=1 width=4)"

    ```


    If you need to find out what execution plans are used to execute the SELECT statements
    inside the function, you will need to supply some actual values in place of parameters
    and run the EXPLAIN command for each of them.


    One of the keywords in the `CREATE FUNCTION` operator (remember, we didn’t list
    all of them!) is `COST`. It allows a developer to explicitly set the cost of function
    execution to be used by the optimizer. The default value is 100, and we do not
    recommend changing it, unless you have a really compelling reason to do so.


    ## Functions and Performance


    With that brief introduction out of the way, it’s time to address this book’s
    central concern. How do functions affect performance? Chapter [7](#501585_2_En_7_Chapter.xhtml)
    addressed the topic of code factoring and outlined the different implications
    of code factoring in imperative languages and in SQL. Several possible techniques
    were covered, and functions were mentioned as deserving a more detailed discussion,
    which follows.


    Why create functions in PostgreSQL? In imperative languages, using functions is
    the obvious choice: functions increase code readability, facilitate code reuse,
    and have no negative impact on performance. By contrast, functions in PostgreSQL
    may increase code readability, but may also decrease code readability and may
    significantly worsen performance. Note the word “may”; the rest of the chapter
    concerns ways to use user-defined functions wisely, so that they provide performance
    benefits rather than performance disaster.


    ### How Using Functions Can Worsen Performance


    In a previous section, we created the function `num_passengers(int)`, which calculates
    the number of passengers on a flight specified by a function parameter. This function
    works great for a single flight, returning a result within 150 ms.


    Let’s take a look at what happens if this function is included in a `SELECT` list.
    Listing [12-13](#501585_2_En_12_Chapter.xhtml#PC23) selects all flights that departed
    from ORD between June 13 and July 13 and, for each of these flights, calculates
    a total number of passengers.


    ```

    SELECT

    flight_id,

    num_passengers(flight_id) AS num_pass

    FROM flight f

    WHERE departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-05'' AND ''2023-07-13''

    Listing 12-13

    Using a function in the SELECT list decreases performance

    ```


    The execution time for this statement is 13 sec. Now, if instead of using a function,
    a SQL statement performing the exact same calculations is used (Listing [12-14](#501585_2_En_12_Chapter.xhtml#PC24)),
    the execution time will be only 165 ms.


    ```

    SELECT

    f.flight_id,

    count(*) AS num_pass

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN n passenger p USING (booking_id)

    JOIN flight f  USING (flight_id)

    WHERE departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-05'' AND ''2023-07-13''

    GROUP BY 1

    Listing 12-14

    The same results without using a function

    ```


    Why such a big difference? In Chapter [7](#501585_2_En_7_Chapter.xhtml), we explained
    how views and CTEs can work as an optimization fence. The effect is even more
    pronounced with functions. Since a function is a true black box for the surrounding
    SQL statement, the only option for PostgreSQL is to execute each function as many
    times as many rows are selected.


    To be precise, some time is saved because for the subsequent function calls from
    the same session, PostgreSQL uses a prepared statement, but that fact can both
    speed up and slow down the execution, because the execution plan won’t take into
    account the differences in statistics between function calls.


    Even when the difference is not that drastic, and one might argue that a moderate
    slowdown can be tolerated for ease of code maintenance, we are crossing a threshold
    of how long a user is willing to wait. And in this case, the SQL inside the function
    is pretty light and takes milliseconds to be executed.


    Fine, we understand that it is not the greatest idea to execute SELECT statements
    embedded into the SELECT list of another statement. But what about functions,
    which perform simple data transformations? Like the ones we created for type conversion?
    In this case, the difference may not be so dramatic until the output size becomes
    really big, but it is still visible.


    Let’s compare the execution time for the statement from Listing [12-10](#501585_2_En_12_Chapter.xhtml#PC14)
    with the execution time for the statement in Listing [12-15](#501585_2_En_12_Chapter.xhtml#PC25).


    ```

    SELECT

    passenger_id,

    passport_num,

    passport_exp_date

    FROM passenger_passport

    Listing 12-15

    Selecting passport information without type conversion

    ```


    Both of them select data from one single table and do not apply any filters, so
    the only time overhead will be the one incurred from executing the functions in
    the SELECT list. The `passenger_passport` materialized view contains over 16 million
    rows. The execution time for the statement in Listing [12-15](#501585_2_En_12_Chapter.xhtml#PC25)
    is seven seconds. If we apply type casting without calling the function (Listing
    [12-16](#501585_2_En_12_Chapter.xhtml#PC26))


    ```

    SELECT

    passenger_id,

    passport_num::numeric,

    passport_exp_date::date

    FROM passenger_passport

    Listing 12-16

    Selecting passport information with type casting

    ```


    …the execution time will be nine seconds. Running the statement in Listing [12-10](#501585_2_En_12_Chapter.xhtml#PC14),
    the execution time will be 40 seconds! Note that in this case the significant
    execution time increase is a result of exception processing, which creates an
    implicit checkpoint.


    In this particular case, not much can be done to improve performance, except to
    come up with a better design in the first place, but later in this book, we will
    review other examples, where some performance improvements are possible.


    ### Any Chance Functions Can Improve Performance?


    Having reviewed so many examples where functions affected performance negatively,
    one might wonder whether there are ever conditions under which functions can improve
    performance. As in many other cases, it depends.


    If we are talking about improving an individual SQL statement’s performance, wrapping
    it in a function can’t make it run faster. However, functions can be extremely
    helpful when what is being optimized is a process.


    ## Functions and User-Defined Types


    In all of the function examples so far, the functions we built returned scalar
    values. Now, let’s see what some additional benefits are provided by functions
    that return user-defined data types.'
