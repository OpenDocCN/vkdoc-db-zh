    代码清单 6-27 的执行计划如图 6-22 所示。


    ![](img/501585_2_En_6_Fig22_HTML.jpg)


    包含一次表扫描的 10 行执行计划的截图。它包括哈希聚合、分组键、计划分区、哈希条件、过滤以及对乘客表`p`的序列扫描。


    **图 6-22**

    一次表扫描


    这看起来好多了——只有一次表扫描——但当你尝试执行它时，它的运行时间会显著延长。仔细观察就会发现原因：可能有很多乘客拥有相同的姓氏和名字，因此不仅耗时更长，而且结果也是不正确的。让我们再次修改查询——见代码清单
    6-28。


    ```sql

    SELECT

    last_name,

    first_name,

    p.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM passenger p

    JOIN custom_field cf  USING (passenger_id)

    WHERE cf.passenger_id<5000000

    AND p.passenger_id<5000000

    GROUP by 3,1,2;

    ```

    **代码清单 6-28**

    对代码清单 6-27 中查询的修正


    图 6-23 中的执行计划看起来好多了——分组列现在是`passenger_id`。


    ![](img/501585_2_En_6_Fig23_HTML.jpg)


    代码清单的 10 行执行计划的截图。它包括哈希聚合、分组键、计划分区、哈希条件、过滤以及对乘客表`p`的序列扫描。


    **图 6-23**

    代码清单 6-28 的执行计划


    这里还有一个优化点；来自 EAV 表的属性经常需要与其他表连接，我们可以通过在执行其他连接之前，“折叠”并过滤此表到所需值，来减小中间结果集的大小。这是前面提到的先分组再连接这一通用技术的更具体案例。


    **在连接其他表之前，将来自 EAV 表的值提取到子查询中。**


    针对护照示例这样做，我们可以如代码清单 6-29 所示，再次修改查询。


    ```sql

    SELECT

    last_name,

    first_name,

    passport_num,

    passport_exp_date,

    passport_country

    FROM  passenger p

    JOIN (

    SELECT

    cf.passenger_id,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_num'' ),'''')

    AS passport_num,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_exp_date'' ),'''')

    AS passport_exp_date,

    coalesce(max (custom_field_value )

    FILTER (WHERE custom_field_name =''passport_country'' ),'''')

    AS passport_country

    FROM custom_field cf

    WHERE cf.passenger_id<5000000

    GROUP BY 1

    ) info  USING (passenger_id)

    WHERE p.passenger_id<5000000

    ```

    **代码清单 6-29**

    将分组移至子查询


    执行计划如图 6-24 所示。


    ![](img/501585_2_En_6_Fig24_HTML.jpg)


    将分组移至子查询的 12 行执行计划的截图。它包括哈希连接、哈希条件、分组键、分组聚合、排序、排序键、过滤以及对乘客表`p`的序列扫描。


    **图 6-24**

    将分组移至子查询的执行计划'
- fmt: "# Conclusion\n\nThis chapter formally defined long queries and explored optimization\
    \ techniques for them.\n\nThe first important principle of this chapter is that\
    \ indexes do not necessarily make queries run faster and can, in fact, make a\
    \ long query run slower. A common misconception is that if no indexes can be built,\
    \ there is nothing you can do to optimize a full table scan. Hopefully, this chapter\
    \ has definitively demonstrated that there are multiple possibilities to optimize\
    \ a full table scan.\n\nAs with short queries, long queries are optimized by reducing\
    \ the size of intermediate results and doing the necessary work on as few rows\
    \ as possible. In the case of short queries, this is accomplished by applying\
    \ indexes on the most restrictive criteria. In the case of long queries, this\
    \ is accomplished by being mindful of join order, applying semi- and anti-joins,\
    \ and filtering before grouping, grouping before joining, and applying set operations.\n\
    \n# 7. Long Queries: Additional Techniques\n\nChapter [6](#501585_2_En_6_Chapter.xhtml)\
    \ discussed multiple ways of improving the performance of long queries. So far,\
    \ every covered technique related to rewriting queries without creating any additional\
    \ database objects. This chapter addresses additional ways of improving long query\
    \ performance, including different ways to materialize intermediate results. Temporary\
    \ tables, CTEs (common table expressions), views, and materialized views are discussed—when\
    \ each tool can improve performance and how each can be abused and lead to performance\
    \ degradation. Finally, this chapter covers partitioning and parallel execution.\n\
    \n## Structuring Queries\n\nReaders familiar with object-oriented programming\
    \ (OOP) will be familiar with the concepts of decomposition (factoring) and encapsulation.\
    \ OOP best practices dictate that code should be decomposed (or factored) into\
    \ many smaller classes and objects responsible for a well-defined subset of system\
    \ behavior, as well as encapsulated, restricting direct access to components and\
    \ thus obscuring their implementation. These two principles make application code\
    \ more readable and more manageable and make it easier to make changes.\n\nComing\
    \ from this paradigm, when one is confronted with a single `SELECT` statement\
    \ of 500+ lines, it’s understandably tempting to apply these same principles,\
    \ factoring the code into smaller pieces and encapsulating some of the logic.\n\
    \nHowever, SQL’s declarative nature dictates a very different style of factoring\
    \ SQL queries from what would be used with application code. In SQL, as in any\
    \ language, code should be kept easy to understand and modify, but not at the\
    \ expense of performance.\n\nWe can approach factoring and encapsulation in a\
    \ variety of ways in SQL, each with its own advantages and pitfalls. Some are\
    \ used (with varying effectiveness) to improve performance and store intermediate\
    \ results. Others are used to make code reusable. Others impact the way data is\
    \ stored. This chapter covers several approaches, and others, such as functions,\
    \ will be covered in depth in subsequent chapters.\n\nIn any case, any decomposition\
    \ or encapsulation should correspond to a logical entity—for example, a report\
    \ or a daily refresh.\n\n## Temporary Tables and CTEs\n\nIn Chapter [6](#501585_2_En_6_Chapter.xhtml),\
    \ we mentioned that sometimes the attempts of SQL developers to speed up query\
    \ execution may result in slowing execution. This often happens when they decide\
    \ to use `temporary tables`.\n\n### Temporary Tables\n\nTo create a temporary\
    \ table, one executes a regular `create table` statement, adding the keyword `temporary`\
    \ or just `temp`:\n\n```sql\nCREATE TEMP TABLE interim_results\n```\n\nTemporary\
    \ tables are visible to the current session only and are dropped when the session\
    \ disconnects if not dropped explicitly before that. Otherwise, they are as good\
    \ as regular tables, can be used in the queries with no limitations, and can even\
    \ be indexed. Temporary tables are often used to store intermediate results of\
    \ queries, so the `CREATE` statement often looks like\n\n```sql\nCREATE TEMP TABLE\
    \ interim_results AS\nSELECT ...\n```\n\nAll of this looks very convenient, so\
    \ what’s wrong with this approach?\n\nIt all works great if you use a temporary\
    \ table to store results of your query for some analysis and then discard it when\
    \ done. But often, when a SQL developer starts to use `temporary tables` to store\
    \ the results of each step, the code starts to look like this:\n\n```sql\nCREATE\
    \ TEMP TABLE T1 AS SELECT  ;\nCREATE TEMP TABLE T2 AS SELECT \nFROM T1\nINNER\
    \ JOIN \n```\n\nThe chain of temporary tables can become quite long. Does it cause\
    \ any problems? Yes, and there are many of them, including the following:\n\n\
    *   `Indexes` – After selected data is stored in a temporary table, we can’t use\
    \ indexes that were created on the source table(s). We either need to continue\
    \ without indexes or build new ones on temporary tables, which takes time.\n*\
    \   `Statistics` – Since we created a new table, the optimizer can’t use statistical\
    \ data on value distribution from the source table(s), so we need either to go\
    \ without statistics or run the `ANALYZE` command on the temporary table.\n* \
    \  `Disk space` – Temporary tables are still tables that are stored on disk, so\
    \ when they are overused, significant database size growth is possible.\n*   `Excessive\
    \ I/O` – Also, since they are tables written to disk, it takes extra time to write\
    \ to and read from disk.\n\nThe most important negative implication of excessive\
    \ use of temporary tables is that this practice blocks the optimizer from doing\
    \ rewrites.\n\nBy saving the results of each join in a temporary table, you prevent\
    \ the optimizer from choosing the optimal join order; you “lock” in the order\
    \ in which you created the temporary tables.\n\nWhen we looked at the execution\
    \ plan of the query in Listing 6-15, we observed that PostgreSQL was able to push\
    \ the filtering condition inside grouping. What would happen if a temp table was\
    \ created for intermediate results?\n\n```sql\nCREATE TEMP TABLE flights_totals\
    \ AS\nSELECT\nbl.flight_id,\ndeparture_airport,\n(avg(price))::numeric (7,2) AS\
    \ avg_price,\ncount(DISTINCT passenger_id) AS num_passengers\nFROM booking b\n\
    JOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\nJOIN\
    \ passenger p USING (booking_id)\nGROUP BY 1,2;\n\nSELECT\nflight_id,\navg_price,\n\
    num_passengers\nFROM flights_totals\nWHERE departure_airport='ORD';\n```\n**Listing\
    \ 7-1** Inefficient usage of temp tables\n\nCreating the temporary table took\
    \ 50 seconds and produced over 500,000 rows, out of which we needed just 10,000.\
    \ At the same time, the query in Listing 6-15 took just 0.1 seconds to execute."
