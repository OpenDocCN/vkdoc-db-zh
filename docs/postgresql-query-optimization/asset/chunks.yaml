    OLAP 环境。第 14 章将提供更多关于如何决策函数使用的指导。


    本章是对函数多种使用方式的初步介绍。关于如何定义和使用函数及存储过程的更多细节，请查阅 PostgreSQL 文档。


    # 13. 动态 SQL


    ## 什么是动态 SQL


    动态 SQL 是指首先构建为文本字符串，然后使用 `EXECUTE` 命令执行的任何 SQL 语句。动态 SQL 的示例如清单 13-1 所示。动态 SQL
