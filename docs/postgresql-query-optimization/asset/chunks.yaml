  trans: '## 半连接与连接顺序


    由于半连接可能显著减小结果集的大小，且根据其定义绝不会增大结果集，因此半连接通常是查询中**限制性最强**的连接。如前所述，限制性最强的连接应最先执行。


    半连接绝不会增大结果集的大小；需检查首先应用它们是否有益。


    当然，这仅在半连接条件应用于单个表的列时才可能。当半连接条件引用多个表时，必须先连接这些表，然后再应用半连接。


    考虑代码清单 6-5 中的示例，它显示了从位于美国的机场出发的预订信息。


    ```sql

    SELECT departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport

    IN (SELECT

    airport_code

    FROM airport

    WHERE iso_country=''US'')

    ```

    *代码清单 6-5：存在半连接时的连接顺序*


    图 6-2 显示了此查询的执行计划。


    ![包含 10 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的顺序扫描以及过滤器。](img/501585_2_En_6_Fig2_HTML.jpg)

    *图 6-2：代码清单 6-5 中查询的执行计划*


    此执行计划未显示半连接操作，而是显示哈希连接，因为没有重复项需要移除。然而，它在逻辑上仍然是一个半连接，并且限制性最强，因此最先执行。这里也值得简要提一下对
    `airport` 表的顺序扫描。使用顺序扫描是因为 `iso_country` 字段上没有索引。让我们创建此索引，看看它是否会加速查询。


    如果此索引存在：


    ```sql

    CREATE INDEX airport_iso_country

    ON airport(iso_country);

    ```


    ……查询规划器将会使用它，如图 6-3 所示。然而，此时的执行时间与顺序扫描相同或更差，因为索引的选择性不够强。我们现在先删除此索引。


    ![包含带索引扫描的 12 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的位图堆扫描以及索引条件。](img/501585_2_En_6_Fig3_HTML.jpg)

    *图 6-3：带索引扫描的执行计划*


    ## 更多关于连接顺序


    让我们看一下代码清单 6-6 中一个更复杂的例子，这是一个包含多个半连接的长查询。此查询与上一个类似，查找从美国出发的航班的预订，但仅限于 2020 年 7
    月 1 日之后更新的预订。由于我们在 `booking` 表的 `update_ts` 列上没有索引，现在创建它并查看是否会被使用：


    ```sql

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT airport_code

    FROM airport

    WHERE iso_country=''US'')

    AND bl.booking_id IN

    (SELECT booking_id FROM booking

    WHERE update_ts>''2023-07-01'')

    ```

    *代码清单 6-6：一个长查询中的两个半连接*


    ```sql

    CREATE INDEX booking_update_ts ON booking (update_ts);

    ```


    图 6-4 中的执行计划显示，对 `airport.iso_country` 的半连接最先执行。正如前面的代码一样，尽管我们使用了关键字 `IN`，优化器使用的是
    `JOIN` 而非 `SEMI JOIN`，因为无需消除重复项。


    ![包含 2 个半连接的 15 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的顺序扫描、对 booking
    的顺序扫描以及过滤器。](img/501585_2_En_6_Fig4_HTML.jpg)

    *图 6-4：带两个半连接的执行计划*


    此执行计划中有三点值得注意。首先，尽管使用了基于索引的访问来获取一些中间结果，并且我们在此情况下看到使用了嵌套循环连接算法，但最终的连接是基于哈希的，因为使用了两个数据集中的大部分数据。其次，半连接使用了表顺序扫描。即使这种方式我们读取了
    `airport` 表中的所有行，其结果集大小仍小于先连接航班与预订航段再根据机场位置进行过滤的结果集大小。这就是优化器选择限制性最强的半连接的益处。


    最后，尽管 `booking` 表的 `update_ts` 列上存在索引，但此索引未被使用，因为条件 `update_ts>''2023-07-01''`
    覆盖了该表中几乎一半的行。


    但是，如果我们更改此查询（见代码清单 6-6）中的过滤条件，将时间间隔缩减为 `update_ts>''2023-08-10''`，执行计划将发生巨大变化——见图
    6-5。在这个新的执行计划中，我们看到不仅 `update_ts` 上的过滤器限制性更强，而且优化器判断使用索引访问可能是有益的。


    ![包含 2 个半连接且具有不同选择性的 15 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 booking 的位图堆扫描以及索引条件。](img/501585_2_En_6_Fig5_HTML.jpg)

    *图 6-5：具有不同选择性的两个半连接的执行计划*


    在这种情况下，对 `booking` 表的索引访问是否确实是最佳选择？我们可以通过阻止索引访问来进行比较，方法是对 `update_ts` 列应用列转换，按以下方式重写过滤器：`coalesce(update_ts,
    ''2023-08-11'')> ''2023-08-10''`。


    如图 6-6 所示，这强制进行了顺序扫描。事实上，在较大时间间隔上，阻止索引并强制顺序扫描比索引访问执行得更好。随着进一步减小时间间隔，索引访问开始具有优势。''2023-08-07''
    似乎是一个转折点；对于从 ''2023-08-08'' 开始的所有日期，索引访问将工作得更好。


    ![包含强制全表扫描的 15 行程序代码的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的顺序扫描、对 booking
    的顺序扫描以及过滤器。](img/501585_2_En_6_Fig6_HTML.jpg)

    *图 6-6：强制全表扫描*'
- fmt: '### What Is an Anti-join?


    Just like it sounds, an `ANTI JOIN` is the opposite of a `SEMI JOIN`. Formally


    An anti-join between two tables `R` and `S` returns rows from table `R` for which
    there are no rows from table `S` with a matching value in the joining column.


    As in the case of a semi-join, there is no `ANTI JOIN` operator. Instead, a query
    with an anti-join can be written in two different ways, shown in Listings [6-7](#501585_2_En_6_Chapter.xhtml#PC14)
    and [6-8](#501585_2_En_6_Chapter.xhtml#PC15). These queries return flights that
    have no bookings.


    ```sql

    SELECT * FROM flight WHERE flight_id NOT IN

    (SELECT flight_id FROM booking_leg)

    Listing 6-8

    Defining an anti-join using NOT IN

    ```


    ```sql

    SELECT * FROM flight f WHERE NOT EXISTS

    (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

    Listing 6-7

    Defining an anti-join using the NOT EXISTS keyword

    ```


    Just as with semi-joins, although both ways of writing a query with an anti-join
    are semantically equivalent, in `PostgreSQL`, only the `NOT EXISTS` version guarantees
    the anti-join in the execution plan. Figures [6-7](#501585_2_En_6_Chapter.xhtml#Fig7)
    and [6-8](#501585_2_En_6_Chapter.xhtml#Fig8) show the execution plan for Listings
    [6-7](#501585_2_En_6_Chapter.xhtml#PC14) and [6-8](#501585_2_En_6_Chapter.xhtml#PC15),
    respectively. In this particular case, both queries will be executed in approximately
    the same time, and the plan with an anti-join is only slightly faster. There are
    no generic guidelines for which syntax for an anti-join is better. Developers
    should try both ways to see which will perform better in their use case.


    ![](Images/501585_2_En_6_Fig8_HTML.jpg)


    A screenshot of the 5-line execution plan without an anti-join. It includes sequence
    scan on `flight f`, filter, sub-plan 1, materialize, and sequence scan on booking.


    Figure 6-8


    Execution plan without an anti-join


    ![](Images/501585_2_En_6_Fig7_HTML.jpg)


    A screenshot of the 4-line execution plan with an anti-join. It includes nested
    loop anti-join, sequence scan on `flight f`, index-only scan, and index condition.


    Figure 6-7


    Execution plan with an anti-join


    ### Semi- and Anti-joins Using the JOIN Operator


    At this point, an astute reader might wonder why we can’t use an explicit join
    and specify exactly what we need. Why use the `EXISTS` and `IN` operators? The
    answer is it’s possible and, in some cases, it might indeed be a better solution
    than using semi-joins. But it takes care to construct a logically equivalent query.


    The queries in Listings [6-3](#501585_2_En_6_Chapter.xhtml#PC8) and [6-4](#501585_2_En_6_Chapter.xhtml#PC9)
    are semantically equivalent, but Listing [6-9](#501585_2_En_6_Chapter.xhtml#PC16)
    is not. Recall that Listings [6-3](#501585_2_En_6_Chapter.xhtml#PC8) and [6-4](#501585_2_En_6_Chapter.xhtml#PC9)
    return information for flights that have at least one booking.


    ```sql

    SELECT f.*

    FROM flight f

    JOIN booking_leg bl USING (flight_id)

    Listing 6-9

    Join returning duplicates

    ```


    By contrast, Listing [6-9](#501585_2_En_6_Chapter.xhtml#PC16) will return as many
    rows for each flight as the number of bookings with the corresponding `flight_id`.
    To return only one record per flight, like the original query, it would need to
    be rewritten as shown in Listing [6-10](#501585_2_En_6_Chapter.xhtml#PC17).


    ```sql

    SELECT *

    FROM flight f

    JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

    Listing 6-10

    Query with a join returning one row per flight

    ```


    The execution plan for this query is shown in Figure [6-9](#501585_2_En_6_Chapter.xhtml#Fig9),
    and it does not contain a semi-join.


    ![](Images/501585_2_En_6_Fig9_HTML.jpg)


    A screenshot of the 6-line execution plan for the query. It includes hash join,
    hash condition, index-only scan using booking, and sequence scan on `flight f`.


    Figure 6-9


    Execution plan for the query in Listing [6-10](#501585_2_En_6_Chapter.xhtml#PC17)


    It is not obvious from the execution plan whether this query will be faster or
    slower than the query with a semi-join. In practice, it runs more than twice as
    fast as the query from Listing [6-3](#501585_2_En_6_Chapter.xhtml#PC8).


    If you only need the IDs of the flights that have a booking, it may be enough
    to run the query in Listing [6-11](#501585_2_En_6_Chapter.xhtml#PC18).


    ```sql

    SELECT flight_id

    FROM flight f

    JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

    Listing 6-11

    Query with a join returning only flight_id with one row per flight

    ```


    The execution plan for this query, shown in Figure [6-10](#501585_2_En_6_Chapter.xhtml#Fig10),
    differs significantly from the one in Figure [6-9](#501585_2_En_6_Chapter.xhtml#Fig9),
    and the execution is even faster.


    ![](Images/501585_2_En_6_Fig10_HTML.jpg)


    A screenshot of the 5-line execution plan with merge-join. It includes merge join,
    merge condition, index-only scan, and unique.


    Figure 6-10


    Execution plan with a merge join


    What about anti-joins? An anti-join cannot create duplicates, which means that
    an `OUTER JOIN` with subsequent filtering of `NULL` values can be used. Thus,
    the query in Listing [6-7](#501585_2_En_6_Chapter.xhtml#PC14) is equivalent to
    the query in Listing [6-12](#501585_2_En_6_Chapter.xhtml#PC19).


    ```sql

    SELECT f.flight_id

    FROM flight f

    LEFT OUTER JOIN booking_leg bl USING (flight_id)

    WHERE bl.flight_id IS NULL

    Listing 6-12

    Outer join with filtering of NULL values

    ```


    The execution plan for this query includes an anti-join—see Figure [6-11](#501585_2_En_6_Chapter.xhtml#Fig11).


    ![](Images/501585_2_En_6_Fig11_HTML.jpg)


    A screenshot of the 4-line execution plan for the query. It includes nested loop
    anti-join, sequence scan on `flight f`, index-only scan, and index condition.


    Figure 6-11


    Execution plan for the query in Listing [6-12](#501585_2_En_6_Chapter.xhtml#PC19)


    The optimizer recognizes this construct and rewrites it to an anti-join. This
    optimizer behavior is stable and can be relied upon.'
  raw: '### What Is an Anti-join?


    Just like it sounds, an `ANTI JOIN` is the opposite of a `SEMI JOIN`. Formally


    An anti-join between two tables R and S returns rows from table R for which there
    are no rows from table S with a matching value in the joining column.


    As in the case of a semi-join, there is no `ANTI JOIN` operator. Instead, a query
    with an anti-join can be written in two different ways, shown in Listings [6-7](#501585_2_En_6_Chapter.xhtml#PC14)
    and [6-8](#501585_2_En_6_Chapter.xhtml#PC15). These queries return flights that
    have no bookings.


    ```

    SELECT * FROM flight WHERE flight_id NOT IN

    (SELECT flight_id FROM booking_leg)

    Listing 6-8

    Defining an anti-join using NOT IN

    ```


    ```

    SELECT * FROM flight f WHERE NOT EXISTS

    (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

    Listing 6-7

    Defining an anti-join using the NOT EXISTS keyword

    ```


    Just as with semi-joins, although both ways of writing a query with an anti-join
    are semantically equivalent, in PostgreSQL, only the `NOT EXISTS` version guarantees
    the anti-join in the execution plan. Figures [6-7](#501585_2_En_6_Chapter.xhtml#Fig7)
    and [6-8](#501585_2_En_6_Chapter.xhtml#Fig8) show the execution plan for Listings
    [6-7](#501585_2_En_6_Chapter.xhtml#PC14) and [6-8](#501585_2_En_6_Chapter.xhtml#PC15),
    respectively. In this particular case, both queries will be executed in approximately
    the same time, and the plan with an anti-join is only slightly faster. There are
    no generic guidelines for which syntax for an anti-join is better. Developers
    should try both ways to see which will perform better in their use case.


    ![](Images/501585_2_En_6_Fig8_HTML.jpg)


    A screenshot of the 5-line execution plan without an anti-join. It includes sequence
    scan on flight f, filter, sub-plan 1, materialize, and sequence scan on booking.


    Figure 6-8


    Execution plan without an anti-join


    ![](Images/501585_2_En_6_Fig7_HTML.jpg)


    A screenshot of the 4-line execution plan with an anti-join. It includes nested
    loop anti-join, sequence scan on flight f, index-only scan, and index condition.


    Figure 6-7


    Execution plan with an anti-join


    ### Semi- and Anti-joins Using the JOIN Operator


    At this point, an astute reader might wonder why we can’t use an explicit join
    and specify exactly what we need. Why use the `EXISTS` and `IN` operators? The
    answer is it’s possible and, in some cases, it might indeed be a better solution
    than using semi-joins. But it takes care to construct a logically equivalent query.


    The queries in Listings [6-3](#501585_2_En_6_Chapter.xhtml#PC8) and [6-4](#501585_2_En_6_Chapter.xhtml#PC9)
    are semantically equivalent, but Listing [6-9](#501585_2_En_6_Chapter.xhtml#PC16)
    is not. Recall that Listings [6-3](#501585_2_En_6_Chapter.xhtml#PC8) and [6-4](#501585_2_En_6_Chapter.xhtml#PC9)
    return information for flights that have at least one booking.


    ```

    SELECT f.*

    FROM flight f

    JOIN booking_leg bl USING (flight_id)

    Listing 6-9

    Join returning duplicates

    ```


    By contrast, Listing [6-9](#501585_2_En_6_Chapter.xhtml#PC16) will return as many
    rows for each flight as the number of bookings with the corresponding `flight_id`.
    To return only one record per flight, like the original query, it would need to
    be rewritten as shown in Listing [6-10](#501585_2_En_6_Chapter.xhtml#PC17).


    ```

    SELECT *

    FROM flight f

    JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

    Listing 6-10

    Query with a join returning one row per flight

    ```


    The execution plan for this query is shown in Figure [6-9](#501585_2_En_6_Chapter.xhtml#Fig9),
    and it does not contain a semi-join.


    ![](Images/501585_2_En_6_Fig9_HTML.jpg)


    A screenshot of the 6-line execution plan for the query. It includes hash join,
    hash condition, index-only scan using booking, and sequence scan on flight f.


    Figure 6-9


    Execution plan for the query in Listing [6-10](#501585_2_En_6_Chapter.xhtml#PC17)


    It is not obvious from the execution plan whether this query will be faster or
    slower than the query with a semi-join. In practice, it runs more than twice as
    fast as the query from Listing [6-3](#501585_2_En_6_Chapter.xhtml#PC8).


    If you only need the IDs of the flights that have a booking, it may be enough
    to run the query in Listing [6-11](#501585_2_En_6_Chapter.xhtml#PC18).


    ```

    SELECT flight_id

    FROM flight f

    JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

    Listing 6-11

    Query with a join returning only flight_id with one row per flight

    ```


    The execution plan for this query, shown in Figure [6-10](#501585_2_En_6_Chapter.xhtml#Fig10),
    differs significantly from the one in Figure [6-9](#501585_2_En_6_Chapter.xhtml#Fig9),
    and the execution is even faster.


    ![](Images/501585_2_En_6_Fig10_HTML.jpg)


    A screenshot of the 5-line execution plan with merge-join. It includes merge join,
    merge condition, index-only scan, and unique.


    Figure 6-10


    Execution plan with a merge join


    What about anti-joins? An anti-join cannot create duplicates, which means that
    an `OUTER JOIN` with subsequent filtering of `NULL` values can be used. Thus,
    the query in Listing [6-7](#501585_2_En_6_Chapter.xhtml#PC14) is equivalent to
    the query in Listing [6-12](#501585_2_En_6_Chapter.xhtml#PC19).


    ```

    SELECT f.flight_id

    FROM flight f

    LEFT OUTER JOIN booking_leg bl USING (flight_id)

    WHERE bl.flight_id IS NULL

    Listing 6-12

    Outer join with filtering of NULL values

    ```


    The execution plan for this query includes an anti-join—see Figure [6-11](#501585_2_En_6_Chapter.xhtml#Fig11).


    ![](Images/501585_2_En_6_Fig11_HTML.jpg)


    A screenshot of the 4-line execution plan for the query. It includes nested loop
    anti-join, sequence scan on flight f, index-only scan, and index condition.


    Figure 6-11


    Execution plan for the query in Listing [6-12](#501585_2_En_6_Chapter.xhtml#PC19)


    The optimizer recognizes this construct and rewrites it to an anti-join. This
    optimizer behavior is stable and can be relied upon.'
  trans: '

    ### 什么是反连接？


    顾名思义，`反连接`是`半连接`的反面。形式化定义如下：


    两个表 `R` 和 `S` 之间的反连接，返回来自表 `R` 的行，这些行在连接列上没有来自表 `S` 的匹配值。


    与半连接的情况类似，并没有专门的 `反连接` 操作符。相反，带有反连接的查询可以用两种不同的方式编写，如清单 6-7 和 6-8 所示。这些查询返回没有预订的航班。


    ```sql

    SELECT * FROM flight WHERE flight_id NOT IN

    (SELECT flight_id FROM booking_leg)

    清单 6-8

    使用 NOT IN 定义反连接

    ```


    ```sql

    SELECT * FROM flight f WHERE NOT EXISTS

    (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

    清单 6-7

    使用 NOT EXISTS 关键字定义反连接

    ```


    与半连接一样，尽管编写反连接查询的两种方式在语义上是等价的，但在 `PostgreSQL` 中，只有 `NOT EXISTS` 版本能在执行计划中保证使用反连接。图
    6-7 和 6-8 分别展示了清单 6-7 和 6-8 的执行计划。在这种特定情况下，两个查询的执行时间大致相同，带有反连接的计划只快一点点。对于哪种反连接语法更好，没有通用的指导方针。开发者应尝试两种方法，看看哪种在其用例中表现更佳。


    ![](img/501585_2_En_6_Fig8_HTML.jpg)


    一个 5 行执行计划的截图，不含反连接。包括在 `flight f` 上的顺序扫描、过滤、子计划 1、物化，以及在 booking 上的顺序扫描。


    图 6-8


    不含反连接的执行计划


    ![](img/501585_2_En_6_Fig7_HTML.jpg)


    一个 4 行执行计划的截图，包含反连接。包括嵌套循环反连接、在 `flight f` 上的顺序扫描、仅索引扫描和索引条件。


    图 6-7


    包含反连接的执行计划


    ### 使用 JOIN 操作符的半连接和反连接


    此时，细心的读者可能会想，为什么我们不能使用显式连接并精确指定我们需要的内容？为什么使用 `EXISTS` 和 `IN` 操作符？答案是这是可行的，并且在某些情况下，这可能确实比使用半连接是更好的解决方案。但这需要小心构建一个逻辑上等价的查询。


    清单 6-3 和 6-4 中的查询在语义上是等价的，但清单 6-9 不是。回顾一下，清单 6-3 和 6-4 返回至少有一个预订的航班的信息。


    ```sql

    SELECT f.*

    FROM flight f

    JOIN booking_leg bl USING (flight_id)

    清单 6-9

    返回重复项的连接

    ```


    相比之下，清单 6-9 将为每个航班返回与其对应 `flight_id` 的预订数量一样多的行。为了像原始查询那样，每个航班只返回一条记录，需要将其重写为清单
    6-10 所示。


    ```sql

    SELECT *

    FROM flight f

    JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

    清单 6-10

    使用连接为每个航班返回一行的查询

    ```


    此查询的执行计划如图 6-9 所示，它不包含半连接。


    ![](img/501585_2_En_6_Fig9_HTML.jpg)


    一个 6 行查询执行计划的截图。包括哈希连接、哈希条件、在 booking 上的仅索引扫描，以及在 `flight f` 上的顺序扫描。


    图 6-9


    清单 6-10 中查询的执行计划


    从这个执行计划中，无法明显看出此查询是否会比带半连接的查询更快或更慢。在实践中，它的运行速度比清单 6-3 中的查询快一倍以上。


    如果你只需要有预订的航班的 ID，运行清单 6-11 中的查询可能就足够了。


    ```sql

    SELECT flight_id

    FROM flight f

    JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

    清单 6-11

    使用连接只为每个航班返回一行 flight_id 的查询

    ```


    此查询的执行计划如图 6-10 所示，与图 6-9 中的有很大不同，执行速度更快。


    ![](img/501585_2_En_6_Fig10_HTML.jpg)


    一个 5 行执行计划的截图，包含合并连接。包括合并连接、合并条件、仅索引扫描和唯一操作。


    图 6-10


    包含合并连接的执行计划


    那么反连接呢？反连接不会产生重复项，这意味着可以使用 `OUTER JOIN` 并随后过滤 `NULL` 值。因此，清单 6-7 中的查询等价于清单 6-12
    中的查询。


    ```sql

    SELECT f.flight_id

    FROM flight f

    LEFT OUTER JOIN booking_leg bl USING (flight_id)

    WHERE bl.flight_id IS NULL

    清单 6-12

    过滤 NULL 值的外连接

    ```


    此查询的执行计划包含一个反连接——参见图 6-11。


    ![](img/501585_2_En_6_Fig11_HTML.jpg)


    一个 4 行查询执行计划的截图。包括嵌套循环反连接、在 `flight f` 上的顺序扫描、仅索引扫描和索引条件。


    图 6-11


    清单 6-12 中查询的执行计划


    优化器能识别这种结构并将其重写为反连接。这种优化器行为是稳定的，可以依赖。

    '
- fmt: '### When Is It Necessary to Specify Join Order?


    So far, the optimizer has chosen the best join order without any intervention
    from the SQL developer, but this isn’t always the case.


    Long queries are more likely in OLAP systems. In other words, a long query is
    most likely an analytical report that most likely joins a number of tables. This
    number, as anyone who has worked with OLAP systems can attest, can be massive.
    When the number of tables involved in a query becomes too large, the optimizer
    no longer attempts to find the best possible join order. Although most system
    parameters are out of the scope of this book, there is one worth mentioning: `join_collapse_limit`.


    This parameter caps the number of tables in a join that will be still processed
    by the cost-based optimizer. The default value of this parameter is 8. This means
    that if the number of tables in a join is eight or fewer, the optimizer will perform
    a selection of candidate plans, compare plans, and choose the best one. But if
    the number of tables is nine or more, it will simply execute the joins in the
    order the tables are listed in the `SELECT` statement.


    Why not set this parameter to the highest possible value? There is no official
    upper limit to this parameter, so it can be the maximum integer, which is 2147483647.
    However, the higher you set this parameter, the more time will be spent choosing
    the best plan. The number of possible plans to consider for a query joining `n`
    tables is `n!`. Thus, when `n` is 8, a maximum of 40,000 plans can be compared.
    If `n` is increased to 10, the number of plans to consider will increase to three
    million, and the number rises predictably from there—when this parameter is set
    to 20, the total number of plans is already too big to fit the integer. One of
    us once observed a data scientist locally changing this parameter to 30, to deal
    with a query with 30 joins. The results were excruciating—not only did the execution
    stall but even the `EXPLAIN` command couldn’t return a result.


    This is easy to experiment with; this parameter can be set locally on a session
    level, so run the command


    ```

    SET join_collapse_limit = 10

    ```


    and check the runtime of the `EXPLAIN` command.


    In addition, recall that table statistics are not available for intermediate results,
    which may cause the optimizer to choose a suboptimal join order. If the SQL developer
    knows a better order of joins, it is possible to force the desired join order
    by setting `join_collapse_limit` to 1. In this case, the optimizer will generate
    a plan in which the joins will be executed in the order they appear in the `SELECT`
    statement.


    Force a specific join order by setting the `join_collapse_limit` parameter to
    1.


    For example, if the command in Listing 6-13 is executed (i.e., an `EXPLAIN` on
    the query in Listing 6-6), the execution plan in Figure 6-12 shows that joins
    are executed exactly in the order they are listed, and the index on `update_ts`
    is not used (which in this case affects performance negatively).


    ```

    SET join_collapse_limit=1;

    EXPLAIN

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN (

    SELECT

    airport_code

    FROM airport

    WHERE iso_country=''US'')

    AND bl.booking_id IN (

    SELECT

    booking_id

    FROM booking

    WHERE update_ts>''2023-08-08'')

    Listing 6-13

    Partially disabling cost-based optimization

    ```


    ![](Images/501585_2_En_6_Fig12_HTML.jpg)


    A screenshot of the 15-line execution plan with disabled cost-based optimization.
    It includes hash join, hash conditions, sequence scan on booking, sequence scan
    on flight f, bitmap index scan, and index condition.


    Figure 6-12

    Execution plan with disabled cost-based optimization


    Another way to force a specific join order is using common table expressions,
    which will be discussed in Chapter 7.


    ## Grouping: Filter First, Group Last


    In Chapter 5, we mentioned that for short queries, grouping is not time-consuming.
    For long queries, the way we approach grouping may have a very significant impact
    on performance. Suboptimal decisions regarding the point at which grouping is
    performed often become a major source of overall query slowness.


    Listing 6-14 shows a query that calculates the average price of every trip and
    the total number of passengers for each flight for all flights with any bookings.


    ```

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2

    Listing 6-14

    Average ticket price and total number of passengers per flight

    ```


    To calculate these numbers for just one flight, a common anti-pattern is the query
    in Listing 6-15.


    ```

    SELECT *

    FROM

    (SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2) a

    WHERE flight_id=222183

    Listing 6-15

    Average ticket price and total number of passengers on a specific flight

    ```


    In this query, we select the data for one flight from an inline `SELECT`. Earlier
    versions of PostgreSQL could not process such constructs efficiently. The database
    engine would first execute the inner `SELECT` with grouping and only then select
    the line that corresponds to the specific flight. To make sure the query is executed
    efficiently, one would need to write it as shown in Listing 6-16.


    ```

    SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    WHERE flight_id=222183

    GROUP BY 1,2

    Listing 6-16

    Pushing a condition inside the GROUP BY

    ```


    But now, due to ongoing improvements to the optimizer, both queries will be executed
    using the execution plan in Figure 6-13. This plan uses index access, and the
    execution time for this query is about two seconds.


    ![](Images/501585_2_En_6_Fig13_HTML.jpg)


    A screenshot of the 17-line execution plan for one flight. It includes group aggregate,
    group key, nested loop, index scan, bitmap heap scan, and index condition.


    Figure 6-13

    Execution plan for one flight


    For all columns used in the `GROUP BY` clause, filtering should be pushed inside
    the grouping.


    For PostgreSQL 12 and later, the optimizer takes care of this rewrite, but it
    may still be required in older versions.


    Let’s look at another example. Listing 6-17 calculates the same numbers (average
    price and number of customers) for all flights departing from ORD.


    ```

    SELECT

    flight_id,

    avg_price,

    num_passengers

    FROM (SELECT

    bl.flight_id,

    departure_airport,

    (avg(price))::numeric (7,2) AS avg_price,

    count(DISTINCT passenger_id) AS num_passengers

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    JOIN passenger p USING (booking_id)

    GROUP BY 1,2 )a  WHERE departure_airport=''ORD''

    Listing 6-17

    Select for multiple flights

    ```


    The execution plan for this query is shown in Figure 6-14. This query takes about
    1.5 minutes to execute. It is a large query, and most of the joins are executed
    using the hash join algorithm. The important part is that the condition on `departure_airport`
    is applied first before the grouping.


    ![](Images/501585_2_En_6_Fig14_HTML.jpg)'
