  trans: '

    ## 本章小结


    本章介绍了将查询拆分为更小功能单元的不同方法，以及每种方法的优缺点。讨论了一种常用优化工具——临时表——的潜在缺陷，并展示了如何使用公用表表达式作为替代方案，从而避免阻碍查询优化器。本章还探讨了视图与物化视图及其对性能的影响。最后，简要介绍了分区与并行执行。


    # 8. 优化数据修改


    至此，我们一直专注于优化 `查询`，这意味着只涵盖了数据检索。我们尚未涉及任何与数据操作相关的内容，即更新、删除或添加记录。这正是本章的主题，将讨论数据操作如何影响性能以及如何提升这些操作的性能。


    ## 什么是 DML？


    任何数据库系统都有两种语言：DDL（数据定义语言），用于创建表和其他数据库对象；以及 DML（数据操作语言），用于查询和修改数据库中的数据。在 PostgreSQL
    中，DDL 和 DML 都是 SQL 的一部分，但某些命令与 DDL 相关（如 `ALTER TABLE`、`CREATE MATERIALIZED VIEW`、`DROP
    INDEX` 等），而另一些则与 DML 相关（`INSERT`、`UPDATE`、`DELETE`）。通常也将这些命令分别称为 DDL 和 DML，因此提及“运行
    DDL”即指执行数据定义命令，而“运行 DML”则指执行 `INSERT`、`UPDATE` 或 `DELETE`。


    ## 优化数据修改的两种途径


    任何 DML 语句的执行都包含两部分：选择要修改的记录和实际的数据修改。对于 `INSERT` 语句，当插入的是常量时，第一部分可能被省略。然而，如果使用的是
    `INSERT-SELECT` 结构，则必须先找到插入所需的记录。


    因此，优化 DML 语句包含两部分：优化选择操作和优化数据修改操作。


    如果问题出在搜索部分，那么应该优化的是该命令的 `SELECT` 部分。这在之前的章节已有详细讨论。本章将专注于第二部分——优化数据写入操作。


    在绝大多数情况下，即便是 OLTP 系统，执行的 DML 语句也远少于 `SELECT` 语句。这是人们很少讨论优化 DML 的主要原因。然而，长时间运行的
    DML 不仅可能因为更新后的数据无法在系统中及时可用而引发问题，还可能因为它会产生 `阻塞锁`，从而减慢其他语句的执行速度。


    ## DML 是如何工作的？


    为了讨论适用于数据修改 SQL 命令的优化方法，我们需要理解它们是如何执行的。


    ### 底层输入/输出


    归根结底，任何 SQL 操作，无论多么复杂，最终都归结为几个底层操作：读取和写入单个数据库块。原因很简单：只有在将数据库块获取到主内存后，才能处理其中包含的数据；并且所有修改首先在主内存中完成，然后再写入磁盘。


    读取和写入的一个根本区别在于：必须在数据被处理之前完成从磁盘的读取；因此，`SELECT` 语句在所需的所有块被获取到内存之前无法完成。相反，块内部的修改是在写入开始之前完成的；因此，SQL
    操作可以在没有任何延迟的情况下完成。无需等待修改后的数据实际写入磁盘。这有点违反直觉：通常人们会认为更新操作比读取需要更多资源。


    当然，写入确实比读取需要多得多的资源：数据库必须修改索引，并在 WAL（预写日志）中记录更新。然而，就单个 DML 语句而言，这些操作都是在主内存中发生的。WAL
    记录是异步强制刷盘的：默认情况下，PostgreSQL 保证它们在提交时被写入。


    这听起来很棒：任何 `INSERT`、`UPDATE` 或 `DELETE` 操作看起来都比 `SELECT` 运行得快得多。既然如此，为什么仍然需要优化呢？


    主要有两个原因：首先，写操作仍然是必需的，因此会消耗一定量的硬件资源，主要是 I/O 带宽。写入的成本与传输页面的成本相关，不一定在任何单个操作上明显可见，但它仍然会减慢处理速度，甚至可能影响
    `SELECT` 语句的性能。后台（例如，修改后的块被写入磁盘）和维护期间会产生额外的工作负载。通常，这种维护执行数据重组，例如 PostgreSQL 中的
    `VACUUM` 操作。一些重组任务会在整个重组操作期间阻止对修改对象的访问。


    其次，修改操作可能会相互干扰，甚至干扰数据检索。只要数据未被修改，处理的顺序就无关紧要。不同的 `SELECT` 语句可以同时访问数据。相反，修改操作不能同时进行，操作顺序至关重要。为了确保正确性，有些操作必须延迟甚至拒绝。正确性是并发控制（也称为事务处理）子系统的职责。事务处理不是本书的重点；然而，讨论修改操作无法避免一些与
    DBMS 事务行为相关的考量。

    '
- fmt: '### The Impact of Concurrency Control


    To ensure the correct order of operations, transaction dispatchers usually rely
    on locking. If a transaction requires a lock and another transaction already has
    a conflicting lock, the execution is delayed until the conflicting lock is released.
    This is called lock waiting. Lock waiting is the primary cause of delays in modification
    operations.


    Another function of concurrency control is to ensure that updates are not lost.
    Any updates performed by a committed transaction must be reliably stored on a
    hard drive before commit. The mechanism for this is the write-ahead log (`WAL`).
    All data modifications must be registered in `WAL` records on the hard drive before
    a transaction can commit. The `WAL` is written sequentially, and on slow rotating
    drives, sequential reads and writes are two orders of magnitude faster than random
    reads and writes. This difference is negligible on SSDs. Although there is no
    need to wait until all changes are written from the cache to the database, commits
    still must wait until the `WAL` is flushed. As result, committing too frequently
    can significantly slow down processing. An extreme case is running each `DML`
    statement in a separate transaction. This actually happens if an application does
    not use transaction control statements and therefore the database wraps each statement
    into a separate transaction. On the other hand, transactions that are too long
    may cause slowness due to locking.


    The preceding considerations apply to any high-performance database. Let’s look
    at techniques specific to PostgreSQL.


    One of the distinguishing features of PostgreSQL is `MVCC`: multi-version concurrency
    control. PostgreSQL never performs “updates in place,” that is, never “updates”
    a record. Instead, a new version of an item (e.g., a table row) is created and
    stored in a free space in the same or a newly allocated block, while the previous
    version is still accessible.


    Figure [8-1](#501585_2_En_8_Chapter.xhtml#Fig1) shows the structure of a block
    from Figure [3-1](#501585_2_En_3_Chapter.xhtml#Fig1) after a deletion (or update)
    of the second row. The space previously occupied by this row cannot be used for
    another row; and, in fact, the data is still accessible.


    ![](Images/501585_2_En_8_Fig1_HTML.jpg)


    A block diagram exhibits the layers of block header, pointers to logic items,
    free space, table rows, dead row, and block trailer from top to bottom.


    Figure 8-1


    Block layout after deletion of a row


    This feature may have both positive and negative impacts on performance.


    The obsolete versions are not kept forever. A `VACUUM` operation removes them
    and consolidates the free space in a block when old versions are no longer needed
    for currently running transactions.


    PostgreSQL uses the snapshot isolation (`SI`) concurrency control protocol to
    prevent undesirable interference between transactions. Note that database textbooks
    usually explain locking as it is used in a two-phase locking concurrency control
    protocol, which significantly differs from the way locks are used in PostgreSQL.
    Any intuition gained from textbooks or experiences with other systems might be
    misleading.


    Under `SI`, a transaction always reads the latest committed version of a row.
    If another transaction has updated this row but did not commit before the start
    of the read operation, the read operation will return an obsolete version. This
    is an advantage as the older version is available and locking is not needed to
    read it. That is, the multi-version concurrency control improves throughput as
    there is no need to delay read operations.


    According to `SI`, concurrent writes of the same data are not allowed: if two
    concurrent (i.e., running at the same time) transactions attempt to modify the
    same data, one of the two transactions must be aborted. In general, there are
    two strategies to enforce this rule. One is called first update wins, and the
    other is called first commit wins. It is easier to enforce the first strategy:
    we know that an update was executed right away, and the second transaction can
    be aborted without any wait. However, PostgreSQL utilizes the second strategy.


    To enforce this rule, PostgreSQL uses write locks for any modification operation.
    Before a transaction can make any data changes, it has to acquire a lock for updates.
    If a lock cannot be obtained because some other transaction is modifying the same
    data, the operation is delayed until the termination of the transaction that holds
    the conflicting lock. If the lock is released because the holding transaction
    is aborted, the lock is granted to the waiting transaction, and a data modification
    operation can be completed. Otherwise, if the transaction commits successfully,
    the subsequent behavior depends on the transaction isolation level. For `READ
    COMMITTED`, which is the default in PostgreSQL, the waiting transaction will read
    the modified data, acquire a write lock, and complete the modification. This behavior
    is possible because on this isolation level, a read operation can read a version
    committed before the start of the `SELECT` statement, rather than the start of
    the transaction. If the isolation level is `REPEATABLE READ`, the waiting transaction
    will be aborted. This implementation results in waits but avoids unneeded aborts.


    We do not discuss the `SERIALIZABLE` level because it is used vanishingly rarely.


    Now, let’s take a look at some important special cases.


    ## Data Modification and Indexes


    In Chapter [5](#501585_2_En_5_Chapter.xhtml), when we talked about creating new
    indexes, we mentioned that adding indexes to a table can potentially slow `DML`
    operations. How much slower depends on storage and system characteristics (e.g.,
    disk speed, processors, and memory), but according to multiple PostgreSQL experts’
    observations, adding an extra index results in only a 1% increase in `INSERT/UPDATE`
    time.


    You can perform some experiments using the `postgres_air` schema. For example,
    start with a table that has many indexes, such as the `flight` table.


    First, create a copy of the table `flight` with no indexes:


    ```

    CREATE TABLE flight_no_index AS

    SELECT * FROM flight LIMIT 0;

    ```


    Then, insert rows from the table `flight` into the table `flight_no_index`:


    ```

    INSERT INTO flight_no_index

    SELECT * FROM flight LIMIT 100

    ```


    Note the execution time. Then, truncate the new table, and start building the
    same indexes built in Chapter [5](#501585_2_En_5_Chapter.xhtml) for the table
    `flight` on table `flight_no_index`. Repeat the insert. There is no difference
    in execution time for a small number of rows (around a couple hundred rows), but
    some slowness is observed when inserting 100,000 rows. For typical operations
    performed in the `OLTP` environment, however, there will be no material difference.


    Naturally, creating indexes takes time, and it is worth mentioning that the `CREATE
    INDEX` operation in PostgreSQL locks the table for all `DML` operations (reads
    are still allowed). `CREATE INDEX CONCURRENTLY` takes longer to complete but allows
    `DML` to be executed.


    As we mentioned earlier, PostgreSQL inserts new versions of updated rows. This
    has certain negative impacts on performance: in general, new versions are inserted
    into different locations, and therefore all indexes on the table must be modified.
    To reduce this negative effect, PostgreSQL uses a technique that sometimes is
    referred to as `HOT` (heap-only tuples); an attempt is made to insert the new
    version into the same block. If the block has sufficient free space and the update
    does not involve modifying any indexed columns, then there is no need to modify
    any indexes. In reality, things are a little bit more complicated, but we are
    not going to get into internals at this point.'
  raw: '### The Impact of Concurrency Control


    To ensure the correct order of operations, transaction dispatchers usually rely
    on locking. If a transaction requires a lock and another transaction already has
    a conflicting lock, the execution is delayed until the conflicting lock is released.
    This is called lock waiting. Lock waiting is the primary cause of delays in modification
    operations.


    Another function of concurrency control is to ensure that updates are not lost.
    Any updates performed by a committed transaction must be reliably stored on a
    hard drive before commit. The mechanism for this is the write-ahead log (WAL).
    All data modifications must be registered in WAL records on the hard drive before
    a transaction can commit. The WAL is written sequentially, and on slow rotating
    drives, sequential reads and writes are two orders of magnitude faster than random
    reads and writes. This difference is negligible on SSDs. Although there is no
    need to wait until all changes are written from the cache to the database, commits
    still must wait until the WAL is flushed. As result, committing too frequently
    can significantly slow down processing. An extreme case is running each DML statement
    in a separate transaction. This actually happens if an application does not use
    transaction control statements and therefore the database wraps each statement
    into a separate transaction. On the other hand, transactions that are too long
    may cause slowness due to locking.


    The preceding considerations apply to any high-performance database. Let’s look
    at techniques specific to PostgreSQL.


    One of the distinguishing features of PostgreSQL is MVCC: multi-version concurrency
    control. PostgreSQL never performs “updates in place,” that is, never “updates”
    a record. Instead, a new version of an item (e.g., a table row) is created and
    stored in a free space in the same or a newly allocated block, while the previous
    version is still accessible.


    Figure [8-1](#501585_2_En_8_Chapter.xhtml#Fig1) shows the structure of a block
    from Figure [3-1](#501585_2_En_3_Chapter.xhtml#Fig1) after a deletion (or update)
    of the second row. The space previously occupied by this row cannot be used for
    another row; and, in fact, the data is still accessible.


    ![](Images/501585_2_En_8_Fig1_HTML.jpg)


    A block diagram exhibits the layers of block header, pointers to logic items,
    free space, table rows, dead row, and block trailer from top to bottom.


    Figure 8-1


    Block layout after deletion of a row


    This feature may have both positive and negative impacts on performance.


    The obsolete versions are not kept forever. A `VACUUM` operation removes them
    and consolidates the free space in a block when old versions are no longer needed
    for currently running transactions.


    PostgreSQL uses the snapshot isolation (SI) concurrency control protocol to prevent
    undesirable interference between transactions. Note that database textbooks usually
    explain locking as it is used in a two-phase locking concurrency control protocol,
    which significantly differs from the way locks are used in PostgreSQL. Any intuition
    gained from textbooks or experiences with other systems might be misleading.


    Under SI, a transaction always reads the latest committed version of a row. If
    another transaction has updated this row but did not commit before the start of
    the read operation, the read operation will return an obsolete version. This is
    an advantage as the older version is available and locking is not needed to read
    it. That is, the multi-version concurrency control improves throughput as there
    is no need to delay read operations.


    According to SI, concurrent writes of the same data are not allowed: if two concurrent
    (i.e., running at the same time) transactions attempt to modify the same data,
    one of the two transactions must be aborted. In general, there are two strategies
    to enforce this rule. One is called *first update wins*, and the other is called
    *first commit wins*. It is easier to enforce the first strategy: we know that
    an update was executed right away, and the second transaction can be aborted without
    any wait. However, PostgreSQL utilizes the second strategy.


    To enforce this rule, PostgreSQL uses write locks for any modification operation.
    Before a transaction can make any data changes, it has to acquire a lock for updates.
    If a lock cannot be obtained because some other transaction is modifying the same
    data, the operation is delayed until the termination of the transaction that holds
    the conflicting lock. If the lock is released because the holding transaction
    is aborted, the lock is granted to the waiting transaction, and a data modification
    operation can be completed. Otherwise, if the transaction commits successfully,
    the subsequent behavior depends on the transaction isolation level. For `READ
    COMMITTED,` which is the default in PostgreSQL, the waiting transaction will read
    the modified data, acquire a write lock, and complete the modification. This behavior
    is possible because on this isolation level, a read operation can read a version
    committed before the start of the SELECT statement, rather than the start of the
    transaction. If the isolation level is `REPEATABLE READ,` the waiting transaction
    will be aborted. This implementation results in waits but avoids unneeded aborts.


    We do not discuss the `SERIALIZABLE` level because it is used vanishingly rarely.


    Now, let’s take a look at some important special cases.


    ## Data Modification and Indexes


    In Chapter [5](#501585_2_En_5_Chapter.xhtml), when we talked about creating new
    indexes, we mentioned that adding indexes to a table can potentially slow DML
    operations. How much slower depends on storage and system characteristics (e.g.,
    disk speed, processors, and memory), but according to multiple PostgreSQL experts’
    observations, adding an extra index results in only a 1% increase in `INSERT/UPDATE`
    time.


    You can perform some experiments using the `postgres_air` schema. For example,
    start with a table that has many indexes, such as the `flight` table.


    First, create a copy of the table `flight` with no indexes:


    ```

    CREATE TABLE flight_no_index AS

    SELECT * FROM flight LIMIT 0;

    ```


    Then, insert rows from the table `flight` into the table `flight_no_index`:


    ```

    INSERT INTO flight_no_index

    SELECT * FROM flight LIMIT 100

    ```


    Note the execution time. Then, truncate the new table, and start building the
    same indexes built in Chapter [5](#501585_2_En_5_Chapter.xhtml) for the table
    `flight` on table `flight_no_index`. Repeat the insert. There is no difference
    in execution time for a small number of rows (around a couple hundred rows), but
    some slowness is observed when inserting 100,000 rows. For typical operations
    performed in the OLTP environment, however, there will be no material difference.


    Naturally, creating indexes takes time, and it is worth mentioning that the `CREATE
    INDEX` operation in PostgreSQL locks the table for all DML operations (reads are
    still allowed). `CREATE INDEX CONCURRENTLY` takes longer to complete but allows
    DML to be executed.


    As we mentioned earlier, PostgreSQL inserts new versions of updated rows. This
    has certain negative impacts on performance: in general, new versions are inserted
    into different locations, and therefore all indexes on the table must be modified.
    To reduce this negative effect, PostgreSQL uses a technique that sometimes is
    referred to as HOT (heap-only tuples); an attempt is made to insert the new version
    into the same block. If the block has sufficient free space and the update does
    not involve modifying any indexed columns, then there is no need to modify any
    indexes. In reality, things are a little bit more complicated, but we are not
    going to get into internals at this point.'
  trans: '

    ### 并发控制的影响


    为确保操作顺序的正确性，事务调度器通常依赖于加锁机制。如果一个事务需要获取锁，而另一个事务已持有冲突的锁，其执行就会被延迟，直到冲突的锁被释放。这被称为锁等待。锁等待是导致修改操作延迟的主要原因。


    并发控制的另一个功能是确保更新不丢失。已提交事务执行的任何更新都必须在提交前可靠地存储在硬盘上。实现此机制的工具是预写式日志（`WAL`）。在事务能够提交之前，所有数据修改都必须在硬盘上被记录到
    `WAL` 记录中。`WAL` 是顺序写入的，在速度较慢的机械硬盘上，顺序读写比随机读写快两个数量级。这种差异在 SSD 上可以忽略不计。虽然无需等待所有更改从缓存写入数据库，但提交仍然必须等待
    `WAL` 刷新到磁盘。因此，过于频繁地提交会显著减慢处理速度。一个极端情况是将每条 `DML` 语句都放在单独的事务中执行。如果应用程序不使用事务控制语句，从而导致数据库将每条语句自动包装成一个单独的事务，这种情况就真的会发生。另一方面，过长的事务可能因锁机制而导致系统缓慢。


    上述考虑适用于任何高性能数据库。现在，让我们看看 PostgreSQL 特有的技术。


    PostgreSQL 的一个显著特点是 `MVCC`：多版本并发控制。PostgreSQL 从不执行“就地更新”，也就是说，它从不“更新”一条记录。取而代之的是，创建一个数据项（例如表中的一行）的新版本，并将其存储在同一数据块或一个新分配的数据块的空闲空间中，而先前的版本仍然可以访问。


    图 8-1 展示了图 3-1 中的数据块在删除（或更新）第二行后的结构。该行先前占用的空间不能被用于另一行；实际上，该数据仍然可访问。


    ![](img/501585_2_En_8_Fig1_HTML.jpg)


    一个区块图从上到下依次展示了区块头、指向逻辑项的指针、空闲空间、表行、死亡行和区块尾部的各层结构。


    图 8-1


    删除一行后的区块布局


    此特性对性能可能既有积极也有消极的影响。


    过期的版本不会被永久保留。当旧版本不再需要用于当前运行的事务时，`VACUUM` 操作会移除它们并合并区块中的空闲空间。


    PostgreSQL 使用快照隔离（`SI`）并发控制协议来防止事务之间发生不良干扰。请注意，数据库教科书通常解释的是在两阶段锁并发控制协议中使用的锁机制，这与
    PostgreSQL 中锁的使用方式显著不同。从教科书或其他系统经验中获得的任何直觉都可能产生误导。


    在 `SI` 下，事务总是读取一行的最新已提交版本。如果另一个事务在该行已更新但在读取操作开始前尚未提交，读取操作将返回一个过时的版本。这是一个优点，因为旧版本是可用的，且读取它无需加锁。也就是说，多版本并发控制提高了吞吐量，因为无需延迟读取操作。


    根据 `SI` 规则，不允许对相同数据进行并发写入：如果两个并发（即同时运行的事务）尝试修改相同数据，则必须中止其中一个事务。通常，有两种策略来强制执行此规则。一种称为首次更新胜出，另一种称为首次提交胜出。强制执行第一种策略更容易：我们知道更新是立即执行的，第二个事务可以被立即中止而无需任何等待。然而，PostgreSQL
    使用的是第二种策略。


    为了强制执行此规则，PostgreSQL 对任何修改操作都使用写锁。在事务能够更改任何数据之前，它必须先获取一个更新锁。如果因为其他事务正在修改相同数据而无法获得锁，该操作将被延迟，直到持有冲突锁的事务终止。如果持有锁的事务因中止而释放了锁，则该锁将授予等待的事务，数据修改操作即可完成。否则，如果该事务成功提交，后续行为则取决于事务隔离级别。对于
    `READ COMMITTED`（PostgreSQL 中的默认级别），等待的事务将读取已修改的数据，获取写锁，并完成修改。这种行为是可能的，因为在此隔离级别上，读取操作可以读取在
    `SELECT` 语句开始前提交的版本，而非在事务开始前提交的版本。如果隔离级别是 `REPEATABLE READ`，则等待的事务将被中止。这种实现方式导致了等待，但避免了不必要的中止。


    我们不讨论 `SERIALIZABLE` 级别，因为它极少被使用。


    现在，让我们看一些重要的特殊情况。


    ## 数据修改与索引


    在第 5 章讨论创建新索引时，我们提到向表添加索引可能会减慢 `DML` 操作的速度。具体变慢多少取决于存储和系统特性（如磁盘速度、处理器和内存），但根据多位
    PostgreSQL 专家的观察，增加一个额外索引只会使 `INSERT/UPDATE` 时间增加 1%。


    你可以使用 `postgres_air` 模式进行一些实验。例如，从一个拥有许多索引的表开始，比如 `flight` 表。


    首先，创建一个没有索引的 `flight` 表的副本：


    ```

    CREATE TABLE flight_no_index AS

    SELECT * FROM flight LIMIT 0;

    ```


    然后，将 `flight` 表中的行插入到 `flight_no_index` 表中：


    ```

    INSERT INTO flight_no_index

    SELECT * FROM flight LIMIT 100

    ```


    记录执行时间。接着，清空（truncate）新表，并开始为 `flight_no_index` 表构建第 5 章中为 `flight` 表创建的所有相同索引。重复插入操作。对于少量行（大约几百行），执行时间没有差异，但在插入
    100,000 行时，可以观察到一些缓慢。然而，对于在 `OLTP` 环境中执行的典型操作而言，不会有实质性的差异。


    自然地，创建索引需要时间，值得一提的是，PostgreSQL 中的 `CREATE INDEX` 操作会锁定表，禁止所有 `DML` 操作（但仍允许读取）。`CREATE
    INDEX CONCURRENTLY` 操作需要更长的完成时间，但允许执行 `DML`。


    正如我们前面提到的，PostgreSQL 插入更新行的新版本。这对性能有一些负面影响：通常，新版本会被插入到不同的位置，因此表上的所有索引都必须进行修改。为了减少这种负面影响，PostgreSQL
    使用了一种有时被称为 `HOT`（仅堆元组）的技术；它会尝试将新版本插入到同一个数据块中。如果该数据块有足够的空闲空间，并且更新不涉及修改任何索引列，则无需修改任何索引。实际上，情况稍微复杂一些，但我们在此不深入探讨内部细节。

    '
- fmt: '## DML and Vacuum


    As mentioned earlier, PostgreSQL never removes old versions of rows immediately.
    The `DELETE` statement marks deleted rows as removed, while `UPDATE` inserts a
    new version of a row and marks the previous version as outdated. As soon as these
    rows are not needed for active transactions, they become dead. As the number of
    dead rows grows, it effectively reduces the number of active rows in a block and
    thus slows down subsequent heap scans.


    The space occupied by dead rows (i.e., deleted tuples) remains unused until it
    is reclaimed by a `VACUUM` operation. This situation is called table bloat. Most
    of the time, even with a relatively high rate of updates, routine vacuuming initiated
    by the autovacuum daemon addresses the dead tuples promptly, so that they do not
    cause any significant delays.


    The recommendations on tuning `AUTOVACUUM` system parameters can be found in PostgreSQL
    documentation and on many consulting companies’ websites. While choosing the optimal
    values for these parameters, you will need to find a right balance between reducing
    I/O spikes, making sure vacuum can be completed relatively fast, and still having
    the job done (i.e., keeping bloat at bay).


    ### Mass UPDATE/DELETE


    What happens if a mass `UPDATE/DELETE` is performed, that is, an operation that
    affects a large fraction of the table? If you run this type of workload, you might
    notice that `SELECT`s from the affected table become significantly slower. The
    visibility map forces recheck to go to the heap blocks; in addition, the number
    of active tuples on a page decreases. This will result in more blocks needing
    to be read into memory for each select operation.


    While there are multiple ways to tune autovacuum on a very busy system, if the
    level of updates/deletes is too high, it might be impossible to reduce table and
    index bloat, even with perfectly tuned autovacuum parameters. You might need to
    evaluate the whole system architecture to see whether the volume of data modification
    is justified. This includes checking whether applications perform several consecutive
    updates on the same set of records or whether it would make sense to partition
    a table and replace mass updates with `DROP`/`DETACH` partition and subsequently
    `CREATE`/`ATTACH` partition.


    ### Frequent Updates


    Now, let’s consider a different case: a table experiences frequent updates (although
    each of these updates affects a single row or a very small number of rows).


    Depending on the nature of these updates, sometimes it might be possible to reduce
    both the overhead of index updates and the table bloat by setting the table’s
    `fillfactor`. This storage parameter sets the percentage of free space in table
    blocks, and it can be defined in the `WITH` clause of the `CREATE TABLE` statement.
    By default, the value of this parameter is 100, which tells PostgreSQL to fit
    as many rows as possible and minimize the size of free space in every block. Thus,
    usually free space can appear only after updates or deletions followed by vacuuming.


    However, if the size of table rows is small enough to store multiple records in
    one block and updates do not affect indexed attributes, we can specify smaller
    values of `fillfactor`. PostgreSQL allows values as low as 10, leaving 90% of
    block space for updated versions of rows. Of course, small values of the `fillfactor`
    parameter result in an increased number of blocks needed to store table data and
    hence increase the number of reads needed for a heap scan of the table. This significantly
    slows down long queries but might be less significant for short queries, especially
    when only one row is selected from a block. Setting the `fillfactor` to lower
    than 100% increases the likelihood of HOT updates described earlier in this section.


    ## Referential Integrity and Triggers


    The presence of multiple foreign keys in a table can potentially slow DML. This
    is not to suggest that referential integrity checks are bad. On the contrary,
    the ability to maintain referential integrity is one of the most powerful features
    of relational systems. The reason they might slow data manipulation operations
    is that for each `INSERT`/`UPDATE` operation on a table with integrity constraints,
    the database engine has to check whether the new values of the constrained columns
    are present in the respective parent tables, thus executing additional implicit
    `SELECT` statements. These checks may take virtually no time, for example, if
    the parent table is a small lookup containing just a handful of rows. However,
    if the parent table size is comparable with the size of the child table, the overhead
    may be more noticeable. As in most other cases, the actual delay time depends
    on system parameters and hardware characteristics.


    The execution times with and without constraints can be compared by creating a
    copy of the `flight` table:


    ```sql

    CREATE TABLE flight_no_constr AS

    SELECT * FROM flight LIMIT 0;

    ```


    Then, once again, start adding the same constraints as the `flight` table has
    to the `flight_no_constr` table, and once again, try to perform inserts. You may
    notice that adding an integrity check on the `aircraft_code` attribute does not
    impact the time to insert, but adding constraints on `departure_airport` and `arrival_airport`
    would noticeably slow down inserts.


    Note that operations on the parent table are also affected: when a record in the
    parent table is updated or deleted, the database engine must check that there
    are no records in each of the child tables that reference the updated or deleted
    value.


    Triggers can potentially slow down data modification operations as well, for the
    same reason as referential integrity constraints: each trigger invocation may
    result in executing multiple additional SQL commands. The extent to which each
    trigger slows down execution depends on its complexity.


    It’s worth noting that referential integrity constraints in PostgreSQL are implemented
    using system triggers, so all observations regarding integrity constraints are
    applicable to triggers. However, the potential performance impact of triggers
    does not mean that triggers should not be used. On the contrary, if there are
    some actions or checks that should be performed for any DML operation on the table,
    it is beneficial to implement them using database triggers instead of programming
    these checks in the application. The latter approach will be less efficient and
    would not cover the cases when the data in the table is modified directly in the
    database instead of accessing it through the application.


    ## Summary


    In this chapter, we briefly discussed the implication of data manipulation operations
    on system performance. Typically, DML commands are executed at least an order
    of magnitude less frequently than `SELECT` statements. However, if data modification
    inefficiencies are not addressed in a timely manner, they may result in blocking
    locks and affect the performance throughout the application.


    # 9. Design Matters


    In the Introduction, we noted that optimization begins during requirements gathering
    and design. To be precise, it starts with system design, including the database
    design, but it is impossible to come up with the right design unless we invest
    time in gathering information about the objects that should be present in the
    database. In this chapter, we will discuss a variety of design options and will
    show how design decisions can impact performance.'
