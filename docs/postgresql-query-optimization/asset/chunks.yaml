    The `booking_leg` table (Listing [9-11](#501585_2_En_9_Chapter.xhtml#PC17)) links
    bookings to flights. Therefore, a natural key for this table would consist of
    `flight_id` and `booking_id`, that is, of two foreign keys referencing tables
    `flight` and `booking`. This pair of columns would be an excellent primary key.
    The decision to create an additional surrogate key `booking_leg_id` was driven
    by the idea to avoid references to the compound key from the dependent table (the
    `booking_leg` table is referenced from the `boarding_pass` table, which is the
    largest table in the database).


    ```

    CREATE TABLE booking_leg (

    booking_leg_id SERIAL,

    booking_id integer NOT NULL,

    booking_ref text NOT NULL,

    flight_id integer NOT NULL,

    leg_num integer,

    is_returning boolean,

    update_ts timestamp with time zone,

    CONSTRAINT booking_leg_pkey PRIMARY KEY (booking_leg_id),

    CONSTRAINT booking_id_fk FOREIGN KEY (booking_id)

    REFERENCES booking (booking_id),

    CONSTRAINT flight_id_fk FOREIGN KEY (flight_id)

    REFERENCES flight (flight_id)

    );

    Listing 9-11

    The booking_leg table

    ```


    A surrogate key is needed for the `passenger` table (see Listing [9-12](#501585_2_En_9_Chapter.xhtml#PC18))
    because the same person may be a passenger on multiple bookings and a passenger
    is not necessarily registered as a client in the booking system (a flight may
    be booked by someone else on behalf of the passenger).


    ```

    CREATE TABLE passenger(

    passenger_id serial,

    booking_id integer NOT NULL,

    booking_ref text,

    passenger_no integer,

    first_name text NOT NULL,

    last_name text NOT NULL,

    account_id integer,

    update_ts timestamptz,

    CONSTRAINT passenger_pkey PRIMARY KEY (passenger_id),

    CONSTRAINT pass_account_id_fk FOREIGN KEY (account_id)

    REFERENCES account (account_id),

    CONSTRAINT pass_booking_id_fk FOREIGN KEY (booking_id)

    REFERENCES booking (booking_id),

    CONSTRAINT pass_frequent_flyer_id_fk FOREIGN KEY (account_id)

    REFERENCES account (account_id)

    );

    Listing 9-12

    The passenger table

    ```


    There is no obvious way to identify accounts; therefore, a surrogate key must
    be used for the `account` table, shown in Listing [9-13](#501585_2_En_9_Chapter.xhtml#PC19).


    ```

    CREATE TABLE account(

    account_id SERIAL,

    login text NOT NULL,

    first_name textNOT NULL,

    last_name text NOT NULL,

    frequent_flyer_id integer,

    update_ts timestamp with time zone,

    CONSTRAINT account_pkey PRIMARY KEY (account_id),

    CONSTRAINT frequent_flyer_id_fk FOREIGN KEY(frequent_flyer_id)

    REFERENCES frequent_flyer (frequent_flyer_id)

    );

    Listing 9-13

    The account table

    ```


    Loyalty program customers might be identified by card number. However, the separate
    surrogate key `frequent_flyer_id` facilitates replacements for a lost or stolen
    card, without needing to map or migrate data from one customer record to another
    or losing the data for a loyal customer.


    In contrast, the surrogate `flight_id` in the `flight` table is needed. The natural
    identification of a flight consists of `flight_num` and `scheduled_departure`.
    The flight number is the same on different days, while departure time may vary
    on different days and can be changed slightly (e.g., 5–10 minutes later) when
    the flight is already partially booked. The `flight_id` represents a particular
    occurrence of the flight with a specific flight number as shown in Listing [9-14](#501585_2_En_9_Chapter.xhtml#PC20).


    ```

    CREATE TABLE flight (

    flight_id serial,

    flight_no text NOT NULL,

    scheduled_departure timestamptz NOT NULL,

    scheduled_arrival timestamptz NOT NULL,

    departure_airport char(3) NOT NULL,

    arrival_airport char(3) NOT NULL,

    status text NOT NULL,

    aircraft_code char(3) NOT NULL,

    actual_departure timestamptz,

    actual_arrival timestamptz,

    update_ts timestamptz,

    CONSTRAINT flight_pkey PRIMARY KEY (flight_id),

    CONSTRAINT aircraft_code_fk FOREIGN KEY (aircraft_code)

    REFERENCES aircraft (code),

    CONSTRAINT arrival_airport_fk FOREIGN KEY (departure_airport)

    REFERENCES airport (airport_code),

    CONSTRAINT departure_airport_fk FOREIGN KEY (departure_airport)

    REFERENCES airport (airport_code)

    );

    Listing 9-14

    The flight table

    ```


    The table `boarding_pass` (Listing [9-15](#501585_2_En_9_Chapter.xhtml#PC21))
    has a surrogate key, but it is not referenced from any other table and is therefore
    useless. The natural key of this table consists of two columns: `flight_id` and
    `passenger_id`.


    ```

    CREATE TABLE boarding_pass (

    pass_id integer NOT NULL,

    passenger_id bigint,

    booking_leg_id bigint,

    seat text,

    boarding_time timestamptz,

    precheck boolean,

    update_ts timestamptz,

    CONSTRAINT boarding_pass_pkey PRIMARY KEY (pass_id),

    CONSTRAINT booking_leg_id_fk FOREIGN KEY (booking_leg_id)

    REFERENCES booking_leg (booking_leg_id),

    CONSTRAINT passenger_id_fk FOREIGN KEY (passenger_id)

    REFERENCES passenger (passenger_id)

    );

    Listing 9-15

    Boarding pass

    ```


    ## Summary


    This chapter discussed the impact of design decisions on performance. Discussion
    covered both choices within a relational model relating to normalization and surrogate
    keys, as well as popular non-relational models. The limitations of these models
    were explored, along with examples of alternative approaches.


    # 10. What About Configuration Parameters?


    The Introduction to this book mentioned that most of the time, when people talk
    about “database tuning,” they assume that all performance problems can be fixed
    by figuring out optimal PostgreSQL configuration parameters.


    Although some parameter tuning can indeed improve database performance, we are
    usually talking about 10%, 20%, and, in rare cases, up to 50% performance improvement,
    if parameters were previously set poorly. Those might sound like impressive numbers,
    but individual query optimization routinely makes queries run several times faster,
    in some cases, ten or more times faster, and restructuring applications (as we
    will see in Chapter [11](#501585_2_En_11_Chapter.xhtml)) can improve overall system
    performance by hundreds of times.


    This chapter discusses the most important PostgreSQL configuration parameters.
    We will demonstrate their impact on database performance and compare this impact
    with the techniques covered in previous chapters.'
