  trans: '## 长查询与哈希连接


    在本章的大多数示例中，都使用了哈希连接算法。这正是我们希望在长查询的执行计划中看到的。为什么在这种情况下哈希连接更可取呢？在第 3 章中，我们评估了嵌套循环和哈希连接算法的成本。


    对于嵌套循环，表 `R` 和 `S` 连接的成本是


    ```

    cost(nl,R,S)=size(R) * size(S)+size(R)*size(S)/size(JA)

    ```


    对于哈希连接，成本是


    ```

    cost(hash,R,S)=size(R)+size(S)+size(R)*size(S)/size(JA)

    ```


    其中 `JA` 表示连接属性的不同值数量。如第 3 章所述，应在两种算法的成本上都加上第三项，该项代表结果集的大小，但对于嵌套循环算法，这个值远小于连接本身的成本。对于长查询，`R`
    和 `S` 的规模很大（因为它们没有受到显著限制），这使得嵌套循环的成本显著高于哈希连接的成本。


    假设数据库统计信息估计表 `R` 的大小为 1,000,000 行，表 `S` 的大小为 2,000,000 行，连接属性 `JA` 有 100,000 个不同值。根据第
    3 章的公式，连接结果的大小将是


    ```

    Z=size(R) * size(S) / size(JA) =20,000,000

    ```


    那么，嵌套循环算法的操作次数将是


    ```

    Z+size(R)* size(S)=2,000,020,000,000

    ```


    而哈希连接算法所需的操作次数将是


    ```

    Z+size(R)+ size(S)==23,000,000

    ```


    这几乎小了 10,000 倍。优化器将基于类似的计算来估算这些算法的成本，当然会选择哈希连接算法。


    当第一个参数能完全放入主内存时，哈希连接的效果最好。可用内存的大小可以通过服务器参数进行调整。


    在某些情况下，会使用归并连接算法，例如本章后面图 6-10 中的情况。第 3 章指出，当至少有一个表是预排序的时，归并连接可能更高效。在这种情况下，由于正在选择唯一值，排序确实被执行了。


    总结第 5 章和本章的内容，大多数情况下，索引访问与嵌套循环算法配合良好（反之亦然），而顺序扫描与哈希连接配合良好。


    由于 PostgreSQL 没有优化器提示，是否有办法强制使用特定的连接算法呢？正如已经多次提到的，我们能做的最好的事情就是在编写 SQL 语句时不要限制优化器。


    ## 长查询与连接顺序


    第 5 章讨论了小查询的连接顺序。对于短查询，期望的连接顺序是能优先使用选择性较低的索引的顺序。


    既然我们不期望在长查询中使用索引，那么连接的顺序是否重要呢？也许令人惊讶的是，它确实重要。大型表的规模可能差异很大。此外，在实践中，当选择“几乎所有记录”时，“几乎”这个词可能意味着少至
    30%，多至 100%。即使不使用索引，连接的顺序也很重要，因为保持中间数据集尽可能小是至关重要的。


    限制性最强的连接（即能最大程度减少结果集大小的连接）应该最先执行。


    优化器通常会选择正确的顺序；然而，验证优化器是否选择正确是开发者的责任。


    ### 什么是半连接？


    通常，查询中限制性最强的连接是`半连接`。让我们稍作停顿，给出一个正式定义。


    两个表`R`和`S`之间的半连接，返回表`R`中那些在连接列上至少有一个来自表`S`的匹配行的行。


    需要澄清的是，半连接不是额外的 SQL 操作；编写类似`SELECT a.* FROM a SEMI JOIN b`这样的语句是无效的 SQL。半连接是一种特殊的连接，它满足两个特定条件：首先，只有来自第一个表的列出现在结果集中。其次，当第二个表中存在多个匹配时，第一个表中的行不会被重复。大多数情况下，半连接根本不包含`JOIN`关键字。指定半连接的第一种也是最常见的方法如代码清单
    6-3 所示。此查询查找所有至少有一个预订的航班的信息。


    ```

    SELECT * FROM flight f WHERE EXISTS

    (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

    代码清单 6-3

    使用 EXISTS 关键字定义半连接

    ```


    该查询使用与表`booking_leg`的隐式连接来过滤表`flight`中的记录。换句话说，我们不是提供用于过滤的值，而是使用另一个表中的列值。


    显示指定半连接的另一种等效查询方法如代码清单 6-4 所示。


    ```

    SELECT * FROM flight WHERE flight_id IN

    (SELECT flight_id FROM booking_leg)

    代码清单 6-4

    使用 IN 关键字定义半连接

    ```


    这些查询都没有使用`JOIN`关键字，它们如何包含连接呢？答案在于执行计划，两个查询的执行计划是相同的，如图 6-1 所示。


    ![](img/501585_2_En_6_Fig1_HTML.jpg)


    查询计划列表的截图。它包括嵌套循环半连接、对 flight f 的顺序扫描、仅索引扫描和索引条件。


    图 6-1


    半连接的执行计划


    你可以在这个计划中看到一个`SEMI JOIN`，尽管查询本身没有使用`JOIN`关键字。


    尽管这两种编写半连接查询的方式在语义上是相同的，但在 PostgreSQL 中，只有第一种能保证在执行计划中出现`SEMI JOIN`。代码清单 6-3 和
    6-4 中两个查询的计划是相同的，但在其他情况下，优化器可能会选择将其重写为常规连接。这个决定基于两个表之间的基数关系以及过滤器的选择性。'
- fmt: '## Semi-joins and Join Order


    Since a semi-join may significantly reduce the size of the result set and, by
    definition, will never increase its size, semi-joins are often the most restrictive
    join in the query, and as stated earlier, the most restrictive join should be
    executed first.


    Semi-joins never increase the size of the result set; check whether it is beneficial
    to apply them first.


    Of course, this is possible only when a semi-join condition applies to the columns
    of a single table. In cases when a semi-join condition references more than one
    table, those tables must be joined before the semi-join is applied.


    Consider the example in Listing 6-5, which shows bookings departing from airports
    located in the United States.


    ```sql

    SELECT departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport

    IN (SELECT

    airport_code

    FROM airport

    WHERE iso_country=''US'')

    ```

    *Listing 6-5: Order of joins when a semi-join is present*


    Figure 6-2 shows the execution plan for this query.


    ![A screenshot of the 10-line execution plan for query plans. It includes hash
    join, hash conditions, sequence scan on flight f, sequence scan on airport, and
    filter.](Images/501585_2_En_6_Fig2_HTML.jpg)

    *Figure 6-2: Execution plan for the query from Listing 6-5*


    This execution plan does not show a semi-join operation, but rather a hash join,
    since there are no duplicates to remove. However, it’s still a logical semi-join
    and most restrictive, so it is executed first. It is also worth taking a brief
    diversion to note the sequential scan on the `airport` table. The sequential scan
    is used because there is no index on the `iso_country` field. Let’s create this
    index and see whether it will speed things up.


    If this index exists:


    ```sql

    CREATE INDEX airport_iso_country

    ON airport(iso_country);

    ```


    ...the query planner will use it, as shown in Figure 6-3. However, the execution
    time in this case will be the same or worse than the time with a sequential scan,
    because the index is not selective enough. Let’s drop this index for now.


    ![A screenshot of the 12-line execution plan with an index scan. It includes hash
    join, hash conditions, sequence scan on flight f, bitmap heap scan on airport,
    and index condition.](Images/501585_2_En_6_Fig3_HTML.jpg)

    *Figure 6-3: Execution plan with an index scan*


    ## More on Join Order


    Let’s take a look at a more complex example in Listing 6-6, of a long query with
    more than one semi-join. This query, like the previous, finds bookings for flights
    departing from the United States, but is limited to bookings updated since July
    1, 2020. Since we do not have an index on the `update_ts` column of the `booking`
    table, let’s create it now and see whether it will be used:


    ```sql

    SELECT

    departure_airport,

    booking_id,

    is_returning

    FROM booking_leg bl

    JOIN flight f USING (flight_id)

    WHERE departure_airport IN

    (SELECT airport_code

    FROM airport

    WHERE iso_country=''US'')

    AND bl.booking_id IN

    (SELECT booking_id FROM booking

    WHERE update_ts>''2023-07-01'')

    ```

    *Listing 6-6: Two semi-joins in one long query*


    ```sql

    CREATE INDEX booking_update_ts ON booking (update_ts);

    ```


    The execution plan in Figure 6-4 shows that a semi-join on `airport.iso_country`
    is executed first. Just as in the preceding code, although we use the keyword
    `IN`, the optimizer uses `JOIN`, not `SEMI JOIN`, because there is no need to
    eliminate duplicates.


    ![A screenshot of the 15-line execution plan with 2 semi-joins. It includes hash
    join, hash conditions, sequence scan on flight f, sequence scan on airport, sequence
    scan on booking, and filter.](Images/501585_2_En_6_Fig4_HTML.jpg)

    *Figure 6-4: Execution plan with two semi-joins*


    Three things in this execution plan are worth noting. First, although index-based
    access is used to obtain some interim results and we can see that the nested loop
    join algorithm is used in this case, the final join is hash based, because a significant
    portion of both datasets is used. Second, the semi-join uses a table sequential
    scan. And even though this way we are reading all the rows from the `airport`
    table, the result set size is smaller than it would be if we would join flights
    with booking legs and filter by the airport location afterward. That’s the benefit
    of the optimizer choosing the most restrictive semi-join.


    Lastly, although there is an index on the `update_ts` column of the `booking`
    table, this index is not used, because the condition `update_ts>''2023-07-01''`
    covers almost half the rows in this table.


    However, if we change the filtering criteria in this query (shown in Listing 6-6)
    and reduce the interval to `update_ts>''2023-08-10''`, the execution plan will
    change drastically—see Figure 6-5. In this new execution plan, we can see that
    not only is the filter on `update_ts` more restrictive but also the optimizer
    judges that it may be beneficial to use the index access.


    ![A screenshot of the 15-line execution plan with 2 semi-joins and different selectivity.
    It includes hash join, hash conditions, bitmap heap scan on booking, and an index
    condition.](Images/501585_2_En_6_Fig5_HTML.jpg)

    *Figure 6-5: Execution plan with two semi-joins with a different selectivity*


    Is index access to the `booking` table indeed the best option in this case? We
    can compare by blocking index access applying a column transformation to the `update_ts`
    column, rewriting the filter the following way: `coalesce(update_ts, ''2023-08-11'')>
    ''2023-08-10''`.


    As seen in Figure 6-6, this forces a sequential scan. And, in fact, blocking the
    index and forcing the sequential scan performs better than index access on larger
    time intervals. As the time interval is reduced further, index access has the
    advantage. ''2023-08-07'' appears to be a tipping point; for all dates starting
    from ''2023-08-08'', the index access will work better.


    ![A screenshot of the 15-line program code on forcing a full scan. It includes
    hash join, hash conditions, sequence scan on flight f, sequence scan on airport,
    sequence scan on booking, and filter.](Images/501585_2_En_6_Fig6_HTML.jpg)

    *Figure 6-6: Forcing a full scan*'
