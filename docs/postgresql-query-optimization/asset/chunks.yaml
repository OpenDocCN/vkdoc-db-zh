  trans: '## 使用动态 SQL 实现灵活性


    此处描述的技术最常用于**OLTP**系统，尽管再次强调，它并非严格局限于某一种环境类型。


    通常，系统允许用户选择任意搜索条件组合，可能通过下拉列表或其他图形化方式构建查询。


    用户不需要（也不应该）了解数据在数据库中的存储方式。然而，搜索字段可能位于不同表中，搜索条件可能具有不同的选择性，并且总体上，`SELECT`语句可能因选择条件的不同而看起来差异很大。


    让我们看一个示例。假设需要实现一个函数，通过以下值的任意组合搜索预订记录：


    *   电子邮箱（或邮箱的前缀部分）

    *   出发机场

    *   到达机场

    *   出发日期

    *   航班 ID


    是否有办法在不依赖 Elasticsearch 的情况下高效实现此功能？！


    解决此问题的常见方法类似**代码清单 13-11**所示。


    ```

    CREATE TYPE booking_record_basic AS(

    booking_id bigint,

    booking_ref text,

    booking_name text ,

    account_id integer,

    email text );

    CREATE OR REPLACE FUNCTION select_booking (

    p_email text,

    p_dep_airport text,

    p_arr_airport text,

    p_dep_date date,

    p_flight_id int)

    RETURNS SETOF booking_record_basic

    AS

    $func$

    BEGIN

    RETURN QUERY

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    booking_name,

    account_id,

    email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE (p_email IS NULL OR lower(email) LIKE p_email||''%'')

    AND (p_dep_airport IS NULL OR departure_airport=p_dep_airport)

    AND (p_arr_airport IS NULL OR arrival_airport=p_arr_airport)

    AND (p_flight_id IS NULL OR bl.flight_id=p_flight_id);

    END;

    $func$ LANGUAGE plpgsql;

    ```

    **代码清单 13-11** 支持使用不同参数组合进行搜索的函数


    此函数将始终返回正确结果，但从性能角度来看，其行为至少可以说是难以预测的。请注意，当按电子邮箱搜索时，与`booking_leg`和`flight`表的连接并不需要，但它们仍将存在。


    下面，我们记录了一个可能的调用序列以及观察到的执行时间。


    #1. 按电子邮箱搜索。


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    WHERE lower(email) like ''lawton52%''

    ```


    作为`SELECT`语句，此查询耗时 2.1 秒。


    ```

    SELECT * FROM select_booking (''lawton52'',

    NULL,

    NULL,

    NULL,

    NULL

    )

    ```


    等效的函数执行耗时 3.5 秒。


    #2. 按电子邮箱和`flight_id`筛选。


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    WHERE lower(email) like ''lawton52%''

    AND flight_id= 2605

    ```


    `SELECT`语句耗时 80 毫秒。


    ```

    SELECT * FROM select_booking (

    ''lawton52'',

    NULL,

    NULL,

    NULL,

    NULL

    )

    ```


    函数执行同样耗时 80 毫秒。


    #3. 按电子邮箱、出发机场和到达机场筛选。


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton52%''

    AND departure_airport=''ORD''

    AND arrival_airport=''JFK''

    ```


    `SELECT`语句耗时 80 毫秒。


    ```

    SELECT * FROM select_booking (

    ''lawton52'',

    ''ORD'',

    ''JFK'',

    NULL,

    NULL

    )

    ```


    使用相同参数的函数执行耗时 200 毫秒。


    #4. 按电子邮箱、出发机场、到达机场和计划出发时间筛选。


    ```

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton52%''

    AND departure_airport=''ORD''

    AND arrival_airport=''JFK''

    AND scheduled_departure BETWEEN ''07-26-2023'' AND ''07-27-2023''

    ```


    `SELECT`语句耗时 46 毫秒。


    ```

    SELECT * FROM select_booking (

    ''lawton52'',

    ''ORD'',

    ''JFK'',

    ''2023-07-26'',

    NULL

    )

    ```'
- fmt: 'Function execution takes 155 ms.


    ## 5. Search on email and scheduled departure.


    ```sql

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    JOIN flight f USING (flight_id)

    WHERE lower(email) like ''lawton52%''

    AND scheduled_departure BETWEEN ''07-30-2023'' AND ''07-31-2023''

    ```


    `SELECT` takes 1.3 seconds.


    ```sql

    SELECT * FROM select_booking (

    ''lawton52'',

    NULL,

    NULL,

    ''2023-07-30'',

    NULL

    )

    ```


    Function execution takes 35 seconds.


    ## 6. Search on flight_id.


    ```sql

    SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    b.booking_name,

    b.email

    FROM booking b

    JOIN booking_leg bl USING (booking_id)

    WHERE flight_id= 27191

    ```


    `SELECT` takes 56 ms.


    ```sql

    SELECT * FROM select_booking (

    NULL,

    NULL,

    NULL,

    NULL,


    )

    ```


    Function execution takes 10 seconds.


    As we discussed previously, execution times for different function invocations
    could be even longer if the first five function executions in the current session
    produce an execution plan that is suboptimal for subsequent executions. While
    experimenting with this function, we managed to find a sequence of function invocations
    that made the last example run for three minutes. But even a ten-second execution
    time in a situation where the expected response time is under 100 ms can cause
    an application timeout. Even if such situations are extremely rare, they are unacceptable
    in production systems.


    Can we find an alternative solution? Like the previous example, it’s possible
    to write a function that builds a `SELECT` dynamically depending on which parameters
    are passed. In addition, it benefits from being analyzed before each execution.


    The source code for the new function is shown in Listing 13-12.


    ```sql

    CREATE OR REPLACE FUNCTION select_booking_dyn (

    p_email text,

    p_dep_airport text,

    p_arr_airport text,

    p_dep_date date,

    p_flight_id int)

    returns setof booking_record_basic

    AS

    $func$

    DECLARE

    v_sql text:=

    ''SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    booking_name,

    account_id,

    email

    FROM  booking b '';

    v_where_booking text;

    v_where_booking_leg text;

    v_where_flight text;

    BEGIN

    IF p_email IS NOT NULL

    THEN v_where_booking :=$$ lower(email) like $$ ||quote_literal(p_email||''%'');
    END IF;

    IF p_flight_id IS NOT NULL

    THEN v_where_booking_leg:= $$ flight_id=$$||p_flight_id::text;

    END IF;

    IF p_dep_airport IS NOT NULL

    THEN v_where_flight:=concat_ws($$ AND $$, v_where_flight,

    $$departure_airport=$$||

    quote_literal(p_dep_airport));

    END IF;

    IF p_arr_airport IS NOT NULL

    THEN v_where_flight:=concat_ws($$ AND $$,v_where_flight,

    $$arrival_airport=$$||

    quote_literal(p_arr_airport));

    END IF;

    IF p_dep_date IS NOT NULL

    THEN v_where_flight:=concat_ws($$ AND $$,v_where_flight,

    $$scheduled_departure BETWEEN $$||

    quote_literal(p_dep_date)||$$::date AND

    $$||quote_literal(p_dep_date)||

    $$::date+1$$);

    END IF;

    IF v_where_flight IS NOT NULL  OR v_where_booking_leg IS NOT NULL

    THEN v_sql:=v_sql||$$ JOIN booking_leg bl USING (booking_id) $$;

    END IF;

    IF v_where_flight IS NOT NULL

    THEN v_sql:=v_sql ||$$ JOIN flight f USING (flight_id) $$;

    END IF;

    v_sql:=v_sql ||$$ WHERE $$||concat_ws($$ AND $$,v_where_booking, v_where_booking_leg,
    v_where_flight);

    return query EXECUTE (v_sql);

    END;

    $func$ LANGUAGE plpgsql;

    ```


    Listing 13-12: A function that builds dynamic SQL to search by different criteria


    This is a lot of code to read! Let’s walk through it and review what, exactly,
    is going on here.


    The parameters of the new function are exactly the same as those of the old function,
    and the result type is also the same, but the function body is completely different.
    At a high level, this function builds a statement to be executed later in the
    `v_sql` text variable.


    Building the query dynamically means that we have the option to only include the
    joins that are needed. The `booking` table is always needed, which is why the
    initial value of `v_sql` is set to


    ```sql

    ''SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    booking_name,

    account_id,

    email

    FROM  booking b '';

    ```


    Then, depending on what other parameters are passed as `NOT NULL`, the function
    determines which other tables are needed. It may only be the table `booking_leg`.
    This is the case if the `p_flight_id` parameter is null, that is, flight-related
    parameters are not used. Alternately, it might be both tables: `booking_leg` and
    `flight`.


    After adding all necessary tables, the full search criteria are built by concatenating
    all conditions with the separator `''AND''`. With the search criteria, the `v_sql`
    statement is finalized and executed. To see what the final query is for different
    invocations of the function, uncomment the `RAISE NOTICE` statement.


    Is this too much work for a performance improvement? Try to compile this function
    and execute it with the same parameters from the preceding examples. It’ll become
    clear quickly that the `select_booking_dyn()` function execution times do not
    exceed the execution times of the corresponding SQL statements for every set of
    parameters—this is especially evident in cases #5 and #6. Moreover, the execution
    time is predictable and does not depend on the first execution in the current
    session.


    Once again, dynamic functions are not easy to debug, and you may need to include
    a lot of debugging printouts, but if performance in your production system is
    critical, the results are well worth the effort.'
