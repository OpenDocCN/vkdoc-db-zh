    # 3.  在你执行一个函数（通常需要执行多次，如果存在多个代码路径的话）之前，你无法知道它是否正常工作。


    关于 PostgreSQL 函数另一个重要的知识点，可以从前面的解释中总结出来，即函数在多个不同方面具有“原子性”。首先（令 Oracle 用户失望的是），你不能在
    PostgreSQL 函数内启动事务，因此对于 DML 语句来说，总是“要么全部成功，要么全部失败”。其次，PostgreSQL 优化器在优化执行计划时，对函数执行一无所知，该计划包含了对用户定义函数的调用。例如，如果你执行


    ```sql

    EXPLAIN SELECT num_passengers(13)

    ```


    ……执行计划看起来会像这样：


    ```sql

    "Result (cost=0.00..0.26 rows=1 width=4)"

    ```


    如果你需要弄清楚用于执行函数内部 `SELECT` 语句的执行计划是什么，你将需要提供一些实际值来替代参数，并为每个值运行 `EXPLAIN` 命令。


    `CREATE FUNCTION` 操作符中的关键字之一（记住，我们并没有列出所有的关键字！）是 `COST`。它允许开发者显式设置函数执行的成本，供优化器使用。默认值是
    100，我们不建议更改它，除非你有非常充分的理由。


    ## 函数与性能


    简要介绍之后，现在该讨论本书的核心关注点了。函数如何影响性能？第 7 章讨论了代码因子化的主题，并概述了在命令式语言和 SQL 中进行代码因子化的不同影响。其中涵盖了几种可能的技术，并提到函数值得更详细的讨论，接下来就对此展开。


    为什么在 PostgreSQL 中创建函数？在命令式语言中，使用函数是显而易见的选择：函数提高了代码的可读性，促进了代码的重用，并且对性能没有负面影响。相比之下，PostgreSQL
    中的函数可能会提高代码可读性，但也可能降低代码可读性，并可能显著恶化性能。请注意“可能”这个词；本章的其余部分将讨论明智地使用用户定义函数的方法，使它们带来性能优势而非性能灾难。


    ### 使用函数如何降低性能


    在前面的章节中，我们创建了函数 `num_passengers(int)`，它计算由函数参数指定的航班上的乘客数量。这个函数对于单个航班效果很好，在 150
    毫秒内返回结果。


    让我们看看如果这个函数被包含在 `SELECT` 列表中会发生什么。清单 12-13 选择了所有在 6 月 13 日至 7 月 13 日期间从 `ORD`
    出发的航班，并为每个航班计算乘客总数。


    ```sql

    SELECT

    flight_id,

    num_passengers(flight_id) AS num_pass

    FROM flight f

    WHERE departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-05'' AND ''2023-07-13''

    清单 12-13

    在 SELECT 列表中使用函数会降低性能

    ```


    这个语句的执行时间是 13 秒。现在，如果使用执行完全相同计算的 SQL 语句（清单 12-14）来代替，执行时间将只有 165 毫秒。


    ```sql

    SELECT

    f.flight_id,

    count(*) AS num_pass

    FROM booking_leg bl

    JOIN booking b USING (booking_id)

    JOIN passenger p USING (booking_id)

    JOIN flight f  USING (flight_id)

    WHERE departure_airport=''ORD''

    AND scheduled_departure BETWEEN ''2023-07-05'' AND ''2023-07-13''

    GROUP BY 1

    清单 12-14

    不使用函数获得相同的结果

    ```


    为什么会有如此大的差异？在第 7 章中，我们解释了视图和 CTE 如何充当优化屏障。这种效果在函数身上更为明显。由于函数对于周围的 SQL 语句来说是一个真正的黑匣子，PostgreSQL
    唯一的选择就是根据选中的行数尽可能多次地执行每个函数。


    准确地说，由于对于来自同一会话的后续函数调用，PostgreSQL 使用预处理语句，因此可以节省一些时间，但这一事实既可能加速也可能减慢执行速度，因为执行计划不会考虑不同函数调用之间统计信息的差异。


    即使差异不那么剧烈，有人可能会争辩说，为了便于代码维护，可以容忍适度的性能下降，但我们正在跨越一个用户愿意等待的时间阈值。而在这种情况下，函数内部的 SQL
    非常轻量，执行只需几毫秒。


    好吧，我们理解将 `SELECT` 语句嵌入到另一个语句的 `SELECT` 列表中执行并不是最好的主意。但是那些执行简单数据转换的函数呢？就像我们为类型转换创建的那些？在这种情况下，直到输出规模变得非常大之前，差异可能不会那么剧烈，但它仍然是可见的。


    让我们比较一下清单 12-10 中语句的执行时间和清单 12-15 中语句的执行时间。


    ```sql

    SELECT

    passenger_id,

    passport_num,

    passport_exp_date

    FROM passenger_passport

    清单 12-15

    不进行类型转换选择护照信息

    ```


    两者都从一个单独的表中选择数据，且不应用任何过滤器，因此唯一的时间开销将是在 `SELECT` 列表中执行函数所引起的时间。`passenger_passport`
    物化视图包含超过 1600 万行。清单 12-15 中语句的执行时间是七秒。如果我们不调用函数而使用类型转换（清单 12-16）


    ```sql

    SELECT

    passenger_id,

    passport_num::numeric,

    passport_exp_date::date

    FROM passenger_passport

    清单 12-16

    使用类型转换选择护照信息

    ```


    ……执行时间将是九秒。运行清单 12-10 中的语句，执行时间将是 40 秒！请注意，在这种情况下，执行时间的显著增加是异常处理的结果，这创建了一个隐式的检查点。


    在这个特定的情况下，除了从一开始就设计一个更好的方案之外，几乎无法采取什么措施来提高性能，但在本书后面，我们将回顾其他示例，在这些示例中可以实现一些性能改进。


    ### 函数是否有提升性能的机会？


    回顾了这么多函数对性能产生负面影响的例子，人们可能会想，是否存在函数能够提高性能的条件。像许多其他情况一样，这要看情况。


    如果我们谈论的是提高单个 SQL 语句的性能，将其包装在函数中并不能使其运行得更快。然而，当优化一个过程时，函数可能非常有帮助。


    ## 函数与用户定义类型


    到目前为止的所有函数示例中，我们构建的函数都返回标量值。现在，让我们看看返回用户定义数据类型的函数能提供哪些额外的好处。

