    CREATE OR REPLACE FUNCTION select_booking_dyn (

    p_email text,

    p_dep_airport text,

    p_arr_airport text,

    p_dep_date date,

    p_flight_id int)

    returns setof booking_record_basic

    AS

    $func$

    DECLARE

    v_sql text:=

    ''SELECT DISTINCT

    b.booking_id,

    b.booking_ref,

    booking_name,

    account_id,

    email

    FROM  booking b '';

    v_where_booking text;

    v_where_booking_leg text;

