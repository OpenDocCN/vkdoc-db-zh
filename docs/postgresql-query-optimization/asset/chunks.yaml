  trans: '

    ## 主要步骤


    图 16-1 展示了一个建议用于确定针对您所处理查询的最佳策略的流程图。在后续章节中，我们将更详细地讨论每个步骤。


    ![](img/501585_2_En_16_Fig1_HTML.jpg)


    一个最终优化算法的流程图。它包含是或否条件，用于检查短查询和增量值。如果是短查询，则找到最具限制性的筛选条件，进行处理，然后构建查询的其余部分。如果是长查询，则找到最具限制性的连接，进行处理，并找到最佳的分组方式。


    图 16-1


    最终优化算法的步骤


    ## 分步指南


    ### 步骤 1：短查询还是长查询？


    第一步是确定所讨论的查询是短查询还是长查询。如第 5 章和第 6 章所述，仅查看查询本身不一定能帮助您找到答案。步骤 1 是回顾查询优化始于收集需求的好时机，与业务负责人和/或业务分析师合作非常重要。


    确认业务是对最新数据感兴趣，还是需要追踪历史趋势等等。业务方可能会说他们需要查看所有已取消的航班，但最好问一下他们是想查看有史以来所有已取消的航班，还是仅限过去
    24 小时内的。


    如果您确定所讨论的查询是短查询，请转到步骤 2；否则，请转到步骤 3。


    ### 步骤 2：短查询


    因此，您的查询是一个短查询。您需要遵循哪些步骤，以确保它不仅以尽可能最佳的方式编写，而且即使在数据量增长时，查询性能也能保持稳定？


    #### 步骤 2.1：最具限制性的条件


    为您的查询找到最具限制性的条件。请记住，通常仅通过查看查询无法判断哪个条件是。查询表以查找属性的不同值数量。注意值分布（即找出哪些值出现频率最低）。识别出最具限制性的条件后，进行下一步。


    #### 步骤 2.2：检查索引


    在此步骤中，您需要检查是否有支持对最具限制性条件进行搜索的索引。这包括以下内容：


    *   检查最具限制性条件的所有搜索属性是否都已编入索引。如果索引缺失，请请求或创建一个。

    *   如果涉及多个字段，请检查复合索引是否会表现更好，以及性能提升是否足以证明创建额外索引的合理性。

    *   检查是否可以使用复合索引或覆盖索引进行仅索引扫描。


    #### 步骤 2.3：添加额外的选择条件（如果适用）


    如果最具限制性的条件基于来自不同表的属性组合，因此无法编入索引，请考虑添加一个额外的选择条件。


    #### 步骤 2.4：构建（或重建）查询


    通过应用最具限制性的条件开始编写查询；这可能意味着从单表选择开始，或者从包含最具限制性条件的连接开始。


    不要省略此步骤。通常，当数据库开发人员了解对象之间的关系时，他们倾向于在应用筛选条件之前编写所有连接。虽然我们知道这是一种经常被推荐的方法，但我们认为对于具有多个连接的复杂查询，这可能会使开发复杂化。我们建议从您已知执行高效的
    `SELECT` 语句开始，然后一次添加一个表。


    每次添加新连接时，检查查询性能和执行计划。请记住，优化器在估计中间结果集的大小时，离执行树的根节点越远，往往越容易出错。如果查询中的连接数量接近十个，您可以考虑使用
    `CTEs`（如果您的版本是 12 或更高），或者考虑构建动态 SQL。


    ### 步骤 3：长查询


    您的查询是一个长查询。在这种情况下，第一步将是确定是否可以使用增量刷新。再次强调，这是您需要与业务负责人和/或业务分析师合作，以更好地理解查询目的的时候。通常，需求的制定没有考虑数据动态性。当查询的结果存储在表中并定期更新时，可以每次拉取最新数据（完全刷新，从时间起点拉取所有数据到最新可用数据），也可以增量拉取，仅引入自上次数据拉取以来发生变化的数据。后者就是我们所说的增量更新。在绝大多数情况下，可以增量拉取数据。例如，不是像第
    7 章所示那样创建 `passenger_passport` 物化视图，而是将其创建为表 `passenger_passport`，并在输入新的护照信息时添加/更新行。


    *   如果可以使用增量更新，请转到步骤 4。

    *   否则，请转到步骤 5。


    ### 步骤 4：增量更新


    将选择最近添加/更新记录的查询视为一个短查询，其中更新时间是最具限制性的条件。转到步骤 2 并遵循优化短查询的步骤。


    ### 步骤 5：非增量长查询


    如果无法运行增量更新，请继续执行长查询优化的以下步骤：


    *   找到最具限制性的连接、半连接或反连接（如果适用）（有关详细信息，请参阅第 6 章），并确保它首先执行。

    *   逐个向连接中添加表，并在每次添加后检查执行时间和执行计划。

    *   确保您不会多次扫描任何大表。按照第 6 章所述，规划您的查询，使大表只被扫描一次。

    *   注意分组。在大多数情况下，您需要将分组推迟到最后一步，也就是说，您需要确保 `GROUP BY` 是执行计划中的最后一条语句。请注意第 6 章中描述的一些情况，在这些情况下，应提前执行分组以最小化中间数据集的大小。

    '
- fmt: '# 17. Conclusion


    ## But Wait—There Is More!


    Throughout this book, we’ve insisted that database optimization is not limited
    to optimizing individual queries; individual queries do not come from outer space.
    Still, the optimization algorithm described in the previous sections is a guide
    only to the process of optimizing an individual query or rather writing a query
    the right way from the start. However, we’ve covered several other techniques.


    Here are other things to consider:


    *   Parameters – Most likely, the query you are optimizing is parameterized, that
    is, if you have a condition on `flight_id`, it won’t be `flight_id=1234` all the
    time, but rather could be any arbitrary `flight_id`. As we discussed in Chapter
    [5](#501585_2_En_5_Chapter.xhtml), depending on particular filtering values, the
    most restrictive criterion may differ (e.g., “Canceled” flight status will be
    more restrictive than most other criteria).


    *   Dynamic SQL – In the latter situation, the right approach is to use dynamic
    SQL, which will be also the case when the selection criteria themselves vary.


    *   Functions – As discussed in Chapter [12](#501585_2_En_12_Chapter.xhtml), functions
    in and of themselves do not improve performance and may significantly degrade
    the execution times. However, if dynamic SQL is needed, it is difficult to avoid
    using functions.


    *   Database design changes – While working on queries, you might feel the need
    to make some DDL changes, from creating new indexes to changing the table schema.
    You will need to work with your DBAs and system architects to determine which
    changes can be implemented.


    *   Interaction with the application – If your query is executed by an application,
    query performance might be pretty good, while the overall application performance
    may not be. If you and your team choose to use NORM or another similar approach,
    you will need to work with application developers to determine what belongs to
    business logic and what belongs to database logic, as described in Chapters [11](#501585_2_En_11_Chapter.xhtml)
    and [13](#501585_2_En_13_Chapter.xhtml).


    ## Summary


    This chapter provided a step-by-step guide to help you navigate the process of
    writing queries right right away. We encourage you to give it a try and follow
    these steps when working on your next project.


    Like all good things must, this book is coming to an end.


    In the Introduction, we shared that we wrote this book because we felt we could
    not *not* write it. Countless times, we’ve met the question: “Is there a book
    you can recommend for getting started with `PostgreSQL`?”


    In the preponderance of cases, those asking this question were not database development
    novices. `PostgreSQL` is not yet the database of choice for most educational institutions,
    and a typical developer “new to `PostgreSQL`” already knows how to write syntactically
    correct `SELECT` statements, but is not familiar with the particulars of `PostgreSQL`.
    This includes not just any minor language differences, but more importantly, differences
    in how data is stored and how queries are processed.


    Yes, of course, documentation is always available, but it is not always easy to
    find what you need, unless you already know exactly what you are looking for.
    Other resources include many excellent tutorials on various subjects, as well
    as the blogs of leading `PostgreSQL` experts. Most of the time, however, they
    are focused on specific topics, showing off numerous great features of `PostgreSQL`,
    but not necessarily indicating where exactly they fit into the big picture.


    Of course, this book does not present the full picture either—`PostgreSQL` has
    a lot to offer, and we did not attempt to provide exhaustive coverage. Rather,
    we approach `PostgreSQL` from a different perspective: we demonstrate how to make
    these great features work.


    That being said, we hope that this book will become a go-to book for database
    developers who are starting to explore `PostgreSQL`. We also hope that those who
    have already been using `PostgreSQL` for a while will also find some useful information,
    perhaps some techniques that they haven’t used before.


    Our goal is to give you a structure that you can use to navigate the challenges
    of database development and a resource you can consult in “what if” situations.
    Our hope is that having this book as a guide will make it easier for you to find
    more details in the `PostgreSQL` documentation.


    In addition to documentation, there are many other valuable resources available,
    including


    *   [PostgreSQL Wiki](https://wiki.postgresql.org/wiki/Main_Page), which contains
    thousands of helpful hints, usage patterns, and anti-patterns


    *   [*The Art of PostgreSQL*](https://theartofpostgresql.com/), a great book to
    improve your SQL skills and learn about a variety of features for developing `PostgreSQL`-based
    applications


    *   Blogs by `PostgreSQL` experts (the [Planet PostgreSQL](https://planet.postgresql.org/)
    aggregator is a great resource)


    *   [PostgreSQL IRC chat](https://www.postgresql.org/community/irc/)


    Throughout the book, we’ve tried to explain not only what to do but also why it
    works, because if you know the “why,” you will be able to recognize other situations
    in which a similar solution could work. Understanding relational theory is a key
    to understanding these “whys,” which is why this book began with a healthy portion
    of theory. For those who persevered through the theoretical chapters, your work
    will be rewarded. These theoretical foundations bring you one step closer to “thinking
    like a database,” which allows you to write your queries right right away, rather
    than “write first and then optimize.”


    In addition, we’ve introduced the `postgres_air` schema, which is now open sourced
    and is available at [`https://github.com/hettie-d/postgres_air`](https://github.com/hettie-%25C2%25ADd/postgres_air).
    We hope this realistic dataset will be helpful as a training, experimentation,
    and demonstration tool, as well as an educational resource.


    In the Introduction, our target audience was described as IT professionals working
    in `PostgreSQL` who want to develop performant and scalable applications, anyone
    whose job title contains the words “database developer” or “database administrator,”
    or anyone who is a backend developer charged with programming database calls.
    We hope that one of the takeaways from this book will be that collaboration between
    all these groups and business owners is key to developing performant applications.


    Database queries do not run in a vacuum: the database is a service. Database work
    is invisible if everything works well, and it is extremely visible if something
    goes wrong. With that in mind, we hope that your work will remain mostly invisible!


    And now have fun with `PostgreSQL`!'
  raw: '## But Wait—There Is More!


    Throughout this book, we’ve insisted that database optimization is not limited
    to optimizing individual queries; individual queries do not come from outer space.
    Still, the optimization algorithm described in the previous sections is a guide
    only to the process of optimizing an individual query or rather writing a query
    the right way from the start. However, we’ve covered several other techniques.


    Here are other things to consider:


    *   *Parameters* – Most likely, the query you are optimizing is parameterized,
    that is, if you have a condition on `flight_id`, it won’t be `flight_id=1234`
    all the time, but rather could be any arbitrary `flight_id`. As we discussed in
    Chapter [5](#501585_2_En_5_Chapter.xhtml), depending on particular filtering values,
    the most restrictive criterion may differ (e.g., “Canceled” flight status will
    be more restrictive than most other criteria).


    *   *Dynamic SQL* – In the latter situation, the right approach is to use dynamic
    SQL, which will be also the case when the selection criteria themselves vary.


    *   *Functions* – As discussed in Chapter [12](#501585_2_En_12_Chapter.xhtml),
    functions in and of themselves do not improve performance and may significantly
    degrade the execution times. However, if dynamic SQL is needed, it is difficult
    to avoid using functions.


    *   *Database design changes* – While working on queries, you might feel the need
    to make some DDL changes, from creating new indexes to changing the table schema.
    You will need to work with your DBAs and system architects to determine which
    changes can be implemented.


    *   *Interaction with the application* – If your query is executed by an application,
    query performance might be pretty good, while the overall application performance
    may not be. If you and your team choose to use NORM or another similar approach,
    you will need to work with application developers to determine what belongs to
    business logic and what belongs to database logic, as described in Chapters [11](#501585_2_En_11_Chapter.xhtml)
    and [13](#501585_2_En_13_Chapter.xhtml).


