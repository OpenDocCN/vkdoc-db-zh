    ## 如何构建合适的索引


    在本章开头，我们在 `postgres_air` 模式中定义了一组最小索引集。几乎每次我们想要提高查询性能时，都会建议再构建一个索引。所有这些索引确实都有助于缩短执行时间。但从未讨论过的是，创建新索引是否需要额外的依据。


    ### 构建还是不构建


    二十年前，我们在决定是否添加又一个索引时要谨慎得多。反对创建过多索引的两个主要原因是：索引会占用数据库中的额外空间，以及当有太多索引需要与记录本身一起更新时，插入和更新操作会变慢。当时的普遍建议是在批量加载数据之前删除表上的所有索引，然后再重新创建它们。一些数据库教科书至今仍提供相同的建议——不是要删除索引，而是要注意表上索引的数量。


    自那时起，时代已经改变。在当今的硬件和软件条件下，情况有所不同。磁盘存储更便宜，磁盘速度更快，而且总的来说，快速响应比节省磁盘空间更有价值。二十年前，数据库中某个表的索引累计大小超过表本身大小是一个危险信号。如今，这已成为
    OLTP 系统的常态。但是，问题仍然存在：多少才算足够？


    ### 需要哪些索引？


    要就哪些索引是必要的提供任何通用建议是具有挑战性的。在 OLTP 系统中，响应时间通常至关重要，任何短查询都应该有索引支持。


    我们建议在有意义的情况下创建部分索引和覆盖索引。部分索引通常比常规索引小，更有可能完全驻留在内存中。覆盖索引避免了访问表的开销，从而允许引擎在内存中执行大部分处理。


    插入和更新所需的额外时间通常不如快速响应那么关键。但是，您应该始终关注这个时间，如果检测到变慢，就评估索引清单。唯一/主键索引和引用其他唯一/主键字段的外键，以及插入/更新上的触发器，通常是导致变慢的常见原因。在每种情况下，您都需要权衡数据完整性与更新速度的重要性。


    网上有许多查询可以计算每个表上索引的总大小，大多数监控工具都会在索引过度增长时发出警报。


    ### 哪些索引是不需要的？


    尽管我们通常不关心索引所需的额外磁盘空间，但我们不希望创建无用的数据库对象。PostgreSQL 的目录视图 `pg_stat_all_indexes` 显示了自上次重置统计信息以来索引被使用的总次数（扫描、读取和获取）。


    请注意，某些主键索引可能从未用于数据检索；然而，它们对于数据完整性至关重要，不应被移除。


    ## 索引与短查询的可扩展性


    在本节中，我们将讨论如何优化短查询，以便在数据量增长时它们仍能保持良好的性能。


    在第 1 章中，我们提到优化在查询投入生产后并未停止。我们应该持续监控性能，并主动识别性能动态的变化。


    对于短查询，这种性能监控至关重要，因为当数据量增长时，查询行为可能会发生巨大变化，尤其是当不同表的增长速度不同时。


    当一个查询有索引支持时，至少可以保证它具有一定的可扩展性，因为对索引的访问次数相对于表的增长仅呈对数增长。但如果一个表的大小增长过快，索引可能变得太大而无法完全放入内存，或者可能被竞争查询的索引挤出内存。如果发生这种情况，执行时间可能会急剧增加。


    有可能一开始某个查询在没有任何索引的情况下也能快速运行，而我们可能无法确切知道未来需要哪些索引。也有可能某个部分索引的条件最初非常严格，索引访问非常快，但后来，满足该条件的记录越来越多，索引的效率就降低了。


    简而言之，尽管我们努力确保短查询具有可扩展性，并且即使数据量增长也能表现良好，但我们不能假设任何东西是“永远”优化的。我们应该始终关注数据量、值分布以及其他可能干扰性能的特征。


    ## 总结


    本章介绍了短查询以及可用于优化它们的技术。短查询的主要优化目标是首先应用最具限制性的搜索条件，并确保所有中间结果集保持较小。因此，本章讨论了索引在短查询中的作用，并展示了如何确定需要创建哪些索引来支持特定查询。


    本章还展示了各种执行计划以及如何阅读它们以理解连接和过滤的顺序，并讨论了 PostgreSQL 中可用的各种索引类型及其适用场景。更复杂的索引类型将在第 14
    章深入探讨。

    '
- fmt: '# 6. Long Queries and Full Scans


    Chapter [5](#501585_2_En_5_Chapter.xhtml) discussed short queries and explained
    how to identify short queries and optimization strategies and techniques applicable
    to them. It also covered the importance of indexes for short queries, the most
    commonly used index types, and their applications. Chapter [5](#501585_2_En_5_Chapter.xhtml)
    also provided an opportunity to practice reading execution plans and, hopefully,
    acquire confidence in the PostgreSQL optimizer.


    This chapter concerns long queries. Some queries just can’t run in a fraction
    of a second, no matter how well-written. This does not mean they cannot be optimized.
    Many practitioners hold that since analytical reports do not have strict response
    time requirements, it is not important how fast or slow they run. In extreme cases,
    report developers make no effort to make sure that reports are complete in a reasonable
    time, giving the excuse that the query only runs once a day or once a week or
    once a month.


    This is a dangerous practice. If report performance is neglected, performance
    can easily degrade from minutes to hours or more. We have observed reports that
    run for six days before completion! And by the time the situation becomes that
    dire, it is not trivial to fix in a limited time frame. Often, when an analytical
    report is developed, source data volumes are really small, and everything performs
    well. It is the job of SQL developers to examine execution plans even if queries
    are running fine now and to be proactive to prevent future performance degradation.


    ## Which Queries Are Considered Long?


    Chapter [5](#501585_2_En_5_Chapter.xhtml) introduced the formal definition of
    a short query. It is logical to assume that all queries that are not short are
    long. This is true, but a definition based on negation might not be intuitive
    to apply in practice.


    The two examples of long queries from Chapter [5](#501585_2_En_5_Chapter.xhtml)
    (Listings [5-1](#501585_2_En_5_Chapter.xhtml#PC1) and [5-3](#501585_2_En_5_Chapter.xhtml#PC3))
    are copied here in Listings [6-1](#501585_2_En_6_Chapter.xhtml#PC1) and [6-2](#501585_2_En_6_Chapter.xhtml#PC2),
    respectively. The first of the two queries is a long query with massive output;
    the query returns every possible combination of arrival and departure airports.
    The second one produces only one line of output—showing the average length of
    flights and number of passengers for all flights in the `postgres_air` schema—but
    is still classified as a long query.


    Listing 6-2: Long query with a one-row result set


    ```sql

    SELECT

    avg(flight_length),

    avg (passengers)

    FROM

    (SELECT

    flight_no,

    scheduled_arrival -scheduled_departure AS flight_length,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    GROUP BY 1,2) a

    ```


    Listing 6-1: Long query with a large result set


    ```sql

    SELECT

    d.airport_code AS departure_airport

    a.airport_code AS arrival_airport

    FROM  airport a,

    airport d

    WHERE a.airport_code  d.airport_code

    ```


    So what is a long query, anyway?


    A query is considered *long* when query selectivity is high for at least one large
    table; that is, almost every row contributes to the output, even when the output
    size is small.


    What kind of optimization goals should we have for long queries? A common misconception
    explicitly refuted in this chapter is that if a query is long, there is no way
    to significantly improve its performance. Moreover, each co-author has had the
    joy of improving the performance of a long query by an order of *several hundred
    times*. Such improvements are made possible when two optimization strategies are
    applied:


    1.  Avoid multiple table scans.

    2.  Reduce the size of the result at the earliest possible stage.


    The remainder of this chapter explains these techniques in detail and will describe
    several methods to achieve this goal.


    ## Long Queries and Full Scans


    Chapter [5](#501585_2_En_5_Chapter.xhtml) stated that short queries require the
    presence of indexes on columns included in search criteria. For long queries,
    it is the converse: indexes are not needed, and if tables are indexed, we want
    to ensure that indexes are not used.


    Why are full table scans desirable for long queries? As shown in Figure [3-3](#501585_2_En_3_Chapter.xhtml#Fig3),
    when the number of rows needed is large enough, index access will require more
    I/O operations. What percentage or number of records is "large enough" varies
    and depends on many different factors. By now, it should not be a surprise that
    most of the time, PostgreSQL estimates this percentage correctly.


    Chapter [5](#501585_2_En_5_Chapter.xhtml) said something very similar about short
    queries. But "how large is large enough" is more difficult to estimate than "how
    small is small enough."


    The estimate of how many records is too many evolves as better hardware, faster
    disks, and more powerful CPUs become available. For this reason, this book tries
    to avoid giving specific number thresholds that will necessarily change. To build
    representative cases for this chapter, several tables were built with hundreds
    of millions of rows of data. These are too large to be included with the `postgres_air`
    distribution. However, it would be unsurprising if some of the examples in this
    chapter are no longer representative in a few years.'
