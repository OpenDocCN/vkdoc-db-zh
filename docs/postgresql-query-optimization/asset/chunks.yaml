- fmt: "## Views: To Use or Not to Use\n\nViews are the most controversial database\
    \ object. They seem to be easy to understand, and the advantages of creating a\
    \ view seem so obvious. Why might they cause problems?\n\nAlthough we are sure\
    \ that most readers have had a chance to create at least a couple of views for\
    \ some project, let’s give a formal definition. The simplest definition is:\n\n\
    A `view` is a database object that stores a query that defines a virtual table.\n\
    \nA view is a virtual table in the sense that syntactically, views may be used\
    \ in a `SELECT` statement in the same way as a table. However, they differ significantly\
    \ from tables in that no data is stored; only the query that defines the view\
    \ is stored in the database.\n\nLet’s take another look at the query in Listing\
    \ 6-14. This query calculates the totals for all flights in the `postgres_air`\
    \ schema, but we want to use this query logic to select the totals for specific\
    \ flights and/or departure airports. Listing 7-4 creates a view that encapsulates\
    \ this logic.\n\n```sql\nCREATE VIEW flight_stats AS\nSELECT\n  bl.flight_id,\n\
    \  departure_airport,\n  (avg(price))::numeric (7,2) AS avg_price,\n  count(DISTINCT\
    \ passenger_id) AS num_passengers\nFROM booking b\nJOIN booking_leg bl USING (booking_id)\n\
    JOIN flight f USING (flight_id)\nJOIN passenger p USING (booking_id)\nGROUP BY\
    \ 1,2\n```\n\nListing 7-4\nCreate a view\n\nNow it is easy to select flight statistics\
    \ for any particular flight:\n\n```sql\nSELECT *\nFROM flight_stats\nWHERE flight_id=222183\n\
    ```\n\nThis query plan looks identical to the plan in Figure 6-13. The reason\
    \ is that in the first step of query processing, the query parser transforms views\
    \ into inline subqueries. In this case, this works to our advantage, since the\
    \ filtering condition is pushed inside the grouping. But if a nonconstant search\
    \ criterion is used, the results might be disappointing. In Listing 7-5, flight\
    \ statistics from the view `flight_stats` are limited by the flight’s departure\
    \ date.\n\n```sql\nSELECT *\nFROM flight_stats fs\nJOIN (SELECT\n        flight_id\n\
    \      FROM flight f\n      WHERE actual_departure between '2023-08-01' and '2023-08-14'\n\
    \     ) fl\nON fl.flight_id=fs.flight_id\n```\n\nListing 7-5\nQuery using the\
    \ view\n\nThe execution plan for this query is shown in Figure 7-3.\n\n![](Images/501585_2_En_7_Fig3_HTML.jpg)\n\
    \nA query plan comprises 24 lines of text. The lines include the hash join, group\
    \ aggregate, hash condition, group key, sort key, sequential scan on booking,\
    \ and other details.\n\nFigure 7-3\nExecution plan in which the condition can’t\
    \ be pushed\n\nLooking at this execution plan, we observe that first, the statistics\
    \ for all flights are calculated, and only after that are the results joined with\
    \ selected flights. The execution time of this query is ten minutes.\n\nWithout\
    \ using the view, we follow the pattern explained in Chapter 6, filtering the\
    \ flights before grouping, as shown in Listing 7-6.\n\n```sql\nSELECT\n  bl.flight_id,\n\
    \  departure_airport,\n  (avg(price))::numeric (7,2) AS avg_price,\n  count(DISTINCT\
    \ passenger_id) AS num_passengers\nFROM booking b\nJOIN booking_leg bl USING (booking_id)\n\
    JOIN flight f USING (flight_id)\nJOIN passenger p USING (booking_id)\nWHERE actual_departure\
    \ between '2023-08-01' AND '2023-08-14'\nGROUP BY 1,2\n```\n\nListing 7-6\nRewriting\
    \ the query without the view\n\nThe execution plan for this query is shown in\
    \ Figure 7-4 and shows that the restrictions on the `flight` table are applied\
    \ first. The execution time for this query is three minutes.\n\n![](Images/501585_2_En_7_Fig4_HTML.jpg)\n\
    \nA query plan comprises 20 lines of text. The lines include the group aggregate,\
    \ hash condition, group key, sort key, sequential scan on passenger, booking,\
    \ recheck condition, and other details.\n\nFigure 7-4\nExecution plan for Listing\
    \ 7-6\n\nIt is misleading when database textbooks, including those teaching PostgreSQL\
    \ basics, state that views can be used “like tables.” In practice, views that\
    \ were originally created solely to encapsulate a stand-alone query are often\
    \ used in other queries, joined to other tables and views, including joining multiple\
    \ times to tables already included in the view, without knowing what’s going on\
    \ behind the scenes.\n\nOn the one hand, people usually create a view precisely\
    \ for the purpose of encapsulation, so that others can use it without needing\
    \ to figure out selection logic. On the other hand, this opacity is the cause\
    \ of poor query performance. This effect becomes especially pronounced when some\
    \ columns in a view are the results of transformation. Consider the view `flight_departure`\
    \ in Listing 7-7.\n\n```sql\nCREATE VIEW flight_departure as\nSELECT\n  bl.flight_id,\n\
    \  departure_airport,\n  coalesce(actual_departure, scheduled_departure)::date\n\
    \  AS  departure_date,\n  count(DISTINCT passenger_id) AS num_passengers\nFROM\
    \ booking b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\n\
    JOIN passenger p USING (booking_id)\nGROUP BY 1,2,3\n```\n\nListing 7-7\nView\
    \ with column transformation\n\nExecuting the query\n\n```sql\nSELECT\n  flight_id,\n\
    \  num_passengers\nFROM flight_departure\nWHERE flight_id =22183\n```\n\n…the\
    \ filter on the flight will be pushed inside the view, and the query will be executed\
    \ in 63 ms. A user who isn’t aware that `flight_departure` is a view might think\
    \ that all columns have comparable performance and might be surprised to see the\
    \ result when running the following query:\n\n```sql\nSELECT\n  flight_id,\n \
    \ num_passengers\nFROM flight_departure\nWHERE departure_date= '2023-08-01'\n\
    ```\n\nThis query takes 2.5 sec or forty times longer to execute. The difference\
    \ is because the `departure_date` column is a transformation, and as discussed\
    \ in Chapter 5, no indexes can be utilized to apply this filter. The execution\
    \ plan for this query is shown in Figure 7-5. Notice that although indexes on\
    \ `scheduled_departure` and `actual_departure` are not used, PostgreSQL still\
    \ correctly identifies the order of joins and searches the `flight` table first\
    \ and then uses index access for tables `booking` and `passenger`.\n\n![](Images/501585_2_En_7_Fig5_HTML.jpg)\n\
    \nA query plan comprises 18 lines. The lines include the subquery scan on flight\
    \ departure, group aggregate, group key, sort key, nested loop, hash join, hash\
    \ condition, sequential scan on flight, and other details.\n\nFigure 7-5\nExecution\
    \ plan when some indexes can’t be utilized\n\nAn even worse case of performance\
    \ degradation is shown in Listing 7-8. Unfortunately, this is a real-life case.\
    \ When a person using a view does not know what query was used to create it, they\
    \ might use it to select data that is much easier to obtain from the underlying\
    \ tables.\n\n```sql\nSELECT\n  flight_id\nFROM flight_departure\nWHERE departure_airport='ORD'\n\
    ```\n\nListing 7-8\nSelection of only one column from the view\n\nThis query doesn’t\
    \ concern itself with the number of passengers on a flight; it merely selects\
    \ flights departing from `ORD` for which any tickets were sold. And yet, the execution\
    \ plan for Listing 7-8 is quite complex—see Figure 7-6.\n\n![](Images/501585_2_En_7_Fig6_HTML.jpg)\n\
    \nA query plan comprises 20 lines. They include the subquery scan on flight departure,\
    \ group aggregate, group key, sort key, nested loop, joined filter, hash join,\
    \ hash condition, sequential scan on flight, index condition, and other details.\n\
    \nFigure 7-6\nExecution plan for the query in Listing 7-8\n\nThis query runs for\
    \ 3.1 seconds. However, a query that selects the same information without using\
    \ the view\n\n```sql\nSELECT\n  flight_id\nFROM flight\nWHERE departure_airport='ORD'\n\
    AND flight_id IN (SELECT flight_id FROM booking_leg)\n```"
