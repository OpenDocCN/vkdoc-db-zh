  trans: '## 调优参数以获得更好性能


    正如我们在本章开头所做的陈述（比较参数调优与查询调优带来的性能提升），要说明这一点尤为困难。要跟随本章的示例操作，你需要额外恢复一份干净的 `postgres_air`
    数据库副本。或者，你也可以临时删除我们在前面章节中创建的索引，待实验完成后再恢复它们。让我们从清单 10-1 中呈现的查询开始。


    ```sql

    SELECT

    f.flight_no,

    f.actual_departure,

    count(passenger_id) passengers

    FROM flight f

    JOIN booking_leg bl ON bl.flight_id = f.flight_id

    JOIN passenger p ON p.booking_id=bl.booking_id

    WHERE f.departure_airport = ''JFK''

    AND f.arrival_airport = ''ORD''

    AND f.actual_departure BETWEEN ''2023-08-08'' and ''2023-08-12''

    GROUP BY f.flight_id, f.actual_departure;

    Listing 10-1

    待优化的查询

    ```


    首先，我们将使用默认的内存分配参数来运行它：


    ```sql

    shared_buffers=128MB

    work_mem=4MB

    ```


    为了观察缓冲区使用的变化，在本章中，我们使用带额外参数的 `EXPLAIN` 命令——`EXPLAIN (ANALYZE, BUFFERS, TIMING)`。此查询的执行计划如图
    10-1 所示。


    ![](img/501585_2_En_10_Fig1_HTML.jpg)


    查询计划的截图。它包含几行检查机场预订的代码。规划时间为 2.154 毫秒，执行时间为 1071.430 毫秒。


    图 10-1

    使用默认内存分配的执行计划


    查看此查询计划，我们看到优化器使用了 `flight` 表上的两个索引，然后扫描所有块以检查实际起飞时间。另请注意，`shared_buffers` 的数量不足（为获得一致的结果，请多次运行相同的查询或
    `EXPLAIN ANALYZE`），并且 PostgreSQL 选择运行两个并行工作进程来加速此过程。总执行时间刚刚超过一秒。


    由于我们没有对多个同时运行的查询进行建模，可能对查询执行时间产生实质性影响的参数是 `shared_buffers`（此更改需要重启）和 `work_mem`（可在会话中修改）。让我们首先尝试增加
    `work_mem` 的大小，然后将 `shared_buffers` 参数更改为 1 GB，重启数据库，并重复 `work_mem` 的更改。


    逐渐将 `work_mem` 增加到最高 1 GB，我们不会注意到执行计划和执行时间有任何显著变化。限制因素似乎是 `shared_buffers` 不足。我们没有看到任何磁盘使用，这意味着从一开始就有足够的
    `work_mem`。图 10-2 展示了使用 128 MB `shared_buffers` 和 500 MB `work_mem` 的执行计划。执行时间在
    1 秒左右波动。


    ![](img/501585_2_En_10_Fig2_HTML.jpg)


    查询计划的截图。它包含几行检查机场预订的代码，使用 128 兆字节共享缓冲区和 500 兆字节工作内存。它使用了哈希连接和嵌套循环。


    图 10-2

    使用增加的 work_mem 和默认 shared_buffers 的执行计划


    现在，让我们将 `shared_buffers` 增加到 1 GB 并重启我们的 Postgres 实例。在开始测量执行时间之前，我们先运行几次此查询，以确保任何可以放入共享缓冲区的内容都已加载。


    遗憾的是，执行时间的减少微不足道。执行计划将保持不变，由于 `shared_buffers` 的增加，读取次数略有减少（执行计划的一部分见图 10-3）。


    ![](img/501585_2_En_10_Fig3_HTML.jpg)


    查询计划的截图。它包含几行增加共享缓冲区后检查机场预订的代码。计划工作进程数为 2，已启动工作进程数为 2。


    图 10-3

    增加 shared_buffers 后执行计划的一部分，显示比图 10-2 更少的读取量


    如果我们继续将 `work_mem` 增加到 200 MB、500 MB 和 1 GB，我们会注意到执行时间缓慢下降，最终低至 750 毫秒。然而，我们需要意识到，这种
    `work_mem` 的增加对于多个会话同时运行的生产服务器来说是不可能的。无论如何，这个查询似乎并不太复杂。是否有其他方法可以提升其性能？


    ## 是否有更好的方法？


    在我们实验期间产生的所有执行计划中，存在一个主要缺陷：Postgres 必须读取堆（表行）才能找到 `actual_departure` 在 8 月 8 日至
    8 月 12 日之间的记录。这表明在此属性上创建索引可能会有帮助。让我们继续创建缺失的索引：


    ```sql

    CREATE INDEX flight_actual_departure

    ON flight (actual_departure);

    ```


    立即，执行计划出现了差异（见图 10-4）。


    ![](img/501585_2_En_10_Fig4_HTML.jpg)


    查询计划的截图。它包含几行检查机场预订的代码。规划时间为 0.430 毫秒，执行时间为 540.307 毫秒。


    图 10-4

    在 actual_departure 列上带有索引的执行计划


    此外，执行时间终于下降了，我们降到了 0.5 秒的执行时间。然而，差异仍然不如我们希望的那么显著。在检查新的执行计划时请注意，PostgreSQL 对 `passenger`
    表执行了全表扫描（见图 10-5）。


    ![](img/501585_2_En_10_Fig5_HTML.jpg)


    查询计划的截图。它包含几行使用哈希连接检查机场预订的代码。桶数为 1024，批次数为 1，内存使用量为 12 千字节。


    图 10-5

    包含全表扫描的执行计划的一部分


    注意到连接条件和 `booking_id` 字段上的外键约束，我们可能会假设在 `booking_id` 上创建索引可能会有帮助。事实上，当创建新索引时


    ```sql

    CREATE INDEX IF NOT EXISTS passenger_booking_id

    ON postgres_air.passenger

    (booking_id);

    ```


    ……执行计划发生了巨大变化——见图 10-6。现在，总执行时间仅为 10 毫秒，**比最佳参数调优时少了五十倍**。


    ![](img/501585_2_En_10_Fig6_HTML.jpg)


    查询计划的截图。它包含几行使用 2 个索引检查机场预订的代码。规划时间为 1.913 毫秒，执行时间为 8.061 毫秒。


    图 10-6

    使用两个索引的执行计划


    更重要的是，如果我们回滚系统参数至默认设置，并将 `shared_buffers` 减少到 128 MB，执行计划和执行时间都不会有任何变化。这并不奇怪——仔细观察图
    10-6 中的新执行计划，既然现在没有大规模的表扫描，增加的共享缓冲区就不再需要了！'
- fmt: '## Other Limitations of Parameter Tuning


    当我们思考PostgreSQL配置参数的含义时，重要的是要记住，本质上我们只是在告诉查询规划器它有哪些可用的硬件资源。Postgres并不清楚其运行主机的RAM大小、存储类型、可用核心数，以及同一主机上运行的其他系统。我们通过将参数设置为特定值来提供一些“输入参数”以供优化。


    例如，如果在拥有16 GB RAM的主机上定义了`shared_buffers=128MB`，查询规划器将无法使用大部分可用内存。然而，它可能会选择其他方式来加速查询，例如像我们在图[10-3](#501585_2_En_10_Chapter.xhtml#Fig3)中看到的那样，使用多个并行进程来运行查询。


    反之亦然。如果我们有同样的16 GB RAM，并为共享缓冲区分配了4 GB，同时设置了`default work_mem=200MB`和`max_connections=700`，那么Postgres极有可能从操作系统收到“内存不足”的错误。


    另一个例子：`random_page_cost`参数帮助优化器估算基于索引的访问成本。旧版Postgres中的默认值4反映了十年前可用磁盘的特性。如今，将这个值保持在4可能会阻止优化器选择最佳的执行计划。然而，如果系统使用较慢的磁盘，降低这个参数值会产生相反的效果。


    ## Conclusion


    尽管为特定系统最优地设置PostgreSQL配置参数很重要，但这远不足以实现最佳性能。正如我们所展示的，参数调优通常能将系统性能提升百分之几十，在某些情况下甚至更多。同时，创建缺失的索引可以使查询运行快几十倍，并同时减少资源使用。


    # 11. Application Development and Performance


    在本书写到一半，已经介绍过多种技术之后，现在是时候退一步，探讨第[1](#501585_2_En_1_Chapter.xhtml)章中预示的额外性能方面了。我们当时写道，本书的方法比仅仅优化单个查询更为广泛。


    数据库查询是应用程序的一部分，本章关注的是优化流程，而非单个查询。虽然这通常不被认为是传统意义上的“数据库优化”，但不解决流程缺陷很容易抵消掉从优化单个查询中获得的任何性能收益。而且，由于应用程序和数据库开发者都倾向于忽视这个潜在的改进领域，我们将要对此进行阐述。


    ## Response Time Matters


    第[1](#501585_2_En_1_Chapter.xhtml)章列举了性能不佳的原因，并解释了为什么查询优化是必要的。当时没有涉及的是*为什么*应用程序需要高性能。


    希望读到本书一半时，你还没有忘记你最初开始阅读的原因。也许，提升整体系统性能或系统特定部分性能的需求已经变得刻不容缓。然而，尽管听起来令人惊讶，但认为响应时间慢没什么大不了的观点仍然并不罕见。


    我们断然拒绝这种观点：这*确实*是件大事，你无需深究，问问你的市场部门就能得到确认。在当今消费者的期望下，“时间就是金钱”这句老话再贴切不过了。


    多项市场研究^([³](#fn3))表明，网站或移动应用的快速响应时间对于吸引和维持流量至关重要。在大多数情况下，可接受的响应时间低于1.5秒。如果响应时间增加到超过3秒，50%的访问者会放弃该网站，其中超过四分之三的人永远不会回来。


    具体的例子包括谷歌报告的数据，显示搜索速度减慢0.4秒会导致每天减少800万次搜索。另一个例子是亚马逊发现，页面加载时间减慢一秒钟会导致一年损失16亿美元的销售额。像这样的情况下，必须解决什么问题才能改善状况？


    ## World Wide Wait


    如果你曾与开发数据库应用程序的应用开发者交谈过，或者你本身就是一名应用开发者，下面这句话可能听起来很熟悉：“应用程序运行得很好，直到它遇到了数据库！”


    这句话，我们理解为“应用程序在与数据库交互时经常出现性能问题”，但通常被理解为“数据库很慢”，这让人相当沮丧。毕竟，DBMS是专门设计用来提供*更快*数据访问的软件，而不是让事情变慢。


    事实上，如果你询问监督同一项目数据库健康的DBA，他们可能会回复说数据库运行得非常完美。如果是这样，为什么用户会体验到“全球等待”——无休止的加载屏幕和缓慢的响应时间呢？


    通常，即使应用程序执行的每个单独的数据库查询在不到0.1秒内返回结果，应用程序页面的响应时间也可能达到十秒或更长。从DBA的角度来看，系统是高性能的，但最终用户的体验却很差。那么，问题不在于每个查询的执行速度，而在于应用程序与数据库之间的交互模式。


    ## Performance Metrics


    第[1](#501585_2_En_1_Chapter.xhtml)章讨论了优化目标，提到许多性能指标，如客户满意度，是“外部”于数据库的，不能被优化器使用。事实上，这些指标不仅是数据库外部的，而且是整个应用程序外部的。


    执行给定业务功能所需的时间难以衡量，因此也难以改进。追逐易于衡量的优化目标可能产生不良的激励。例如，应用程序开发者可以强迫用户点击十个按钮而不是一个，有时这会减少每个按钮的响应时间。这可能会改善某些基准测试结果，但几乎不会改善用户体验和满意度。


    然而，这正是最终用户感兴趣的指标。他们不关心任何单个查询；他们关心的是整体体验。他们希望应用程序快速响应，不想盯着“等待”和“加载”屏幕。'
  raw: '## Other Limitations of Parameter Tuning


    When we think about the meaning of the Postgres configuration parameters, it’s
    important to remember that, in essence, all we are doing is communicating to the
    query planner what hardware resources it has available. Postgres is agnostic to
    the size of the RAM of the host on which it is running, the type of storage, how
    many cores are available, and what other systems are running on the same host.
    We provide some “input parameters” for optimization by setting up parameters to
    specific values.


    For example, if we define shared_buffers=128MB when the host has 16 GB of RAM,
    the query planner won’t be able to use most of the available memory. However,
    it could choose other ways to make queries faster, such as running them with multiple
    parallel processes, as we saw in Figure [10-3](#501585_2_En_10_Chapter.xhtml#Fig3).


    The opposite is also true. If we have the same 16 GB of RAM and we allocate 4
    GB for shared buffers and at the same time set default work_mem=200MB and max_connections=700,
    there is a high chance that Postgres will get an “out of memory” error from the
    operating system.


    Another example: The `random_page_cost` parameter helps the optimizer estimate
    the cost of index-based access. The default value of 4 in older Postgres versions
    was a reflection of the characteristics of disks available ten years ago. Nowadays,
    keeping this value at 4 might stop the optimizer from choosing the best execution
    plan. However, if a system uses slower disks, reducing this parameter value would
    have the opposite effect.


    ## Conclusion


    Although it is important to set up PostgreSQL configuration parameters optimally
    for a specific system, it is far from enough to achieve the best performance.
    As we demonstrated, parameter tuning usually helps improve system performance
    by tens of percents, in some cases even more. At the same time, the creation of
    missing indexes can make queries run dozens of times faster and, at the same time,
    reduce resource usage.


    # 11. Application Development and Performance


    Midway through this book, having covered multiple techniques along the way, it’s
    time to step back and address the additional performance aspects that were foreshadowed
    in Chapter [1](#501585_2_En_1_Chapter.xhtml). We wrote then that the approach
    of this book is broader than just optimizing individual queries.


    Database queries are parts of applications, and this chapter concerns optimizing
    processes rather than individual queries. Although this is not typically considered
    “database optimization” in its traditional sense, not addressing process deficiencies
    could easily cancel out any performance gains gleaned from optimizing individual
    queries. And since both application and database developers tend to ignore this
    area of potential improvement, we are going to claim it.


    ## Response Time Matters


    Chapter [1](#501585_2_En_1_Chapter.xhtml) enumerated reasons for poor performance,
    as well as covering why query optimization is necessary. What wasn’t covered was
    *why* an application needs to be performant.


    Hopefully, halfway through this book, you have not yet forgotten why you started
    reading it in the first place. Perhaps, the need to improve overall system performance
    or the performance of a specific part of the system became inescapably urgent.
    However, surprising as it may sound, it is still not uncommon to hear the opinion
    that slow response time is not such a big deal.


    We reject this categorically: it *is* a big deal, and you do not need to go any
    further than your marketing department for confirmation. With today’s consumer
    expectations, the saying *time is money* could not be more apt.


    Multiple marketing research studies^([³](#fn3)) have demonstrated that fast response
    time on a website or from a mobile app is critical to attract and maintain incoming
    traffic. In most cases, acceptable response time is below 1.5 seconds. If response
    time increases to over 3 seconds, 50% of visitors abandon a site, and more than
    three quarters of them never come back.


    Specific examples include the numbers reported by Google that demonstrate that
    slowing search by 0.4 seconds results in a loss of eight million searches per
    day. Another example is Amazon finding that slowing page load time by one second
    results in $1.6 billion of lost sales in a year. In cases like these, what problem
    must be addressed to improve the situation?


    ## World Wide Wait


    If you’ve ever talked to an application developer who works on a database application
    or if you are an application developer yourself, the following might sound familiar:
    “the application works perfectly fine until it hits the database!”


    That statement, which we interpret as “an application often has performance issues
    when it interacts with a database,” is often instead understood as “databases
    are slow,” which is quite frustrating to hear. A DBMS is, after all, specialized
    software designed to provide *faster* data access, not to slow things down.


    And in fact, if you ask the DBA overseeing database health on the same project,
    they might reply that the database is performing perfectly. If that’s the case,
    why do users experience the “World Wide Wait”— interminable loading screens and
    slow response times?


    Often, even if each individual database query executed by the application returns
    results in less than 0.1 seconds, the application page response time can be ten
    seconds or more. From the DBA’s perspective, the system is performant, but the
    end user experience is poor. The problem, then, is not in the execution speed
    of each query but in the patterns of interactions between the application and
    the database.


    ## Performance Metrics


    Chapter [1](#501585_2_En_1_Chapter.xhtml) discussed optimization goals, mentioning
    that many performance metrics, such as customer satisfaction, are “external” to
    the database and can’t be used by the optimizer. In fact, these metrics are external
    not only to the database but to the entire application.


    The time needed to perform a given business function is difficult to measure and,
    consequently, difficult to improve. Chasing easily measured optimization goals
    can produce poor incentives. For example, an application developer can force a
    user to click ten buttons instead of one, and sometimes this will reduce the response
    time for each of the ten buttons. This might improve some benchmark results, but
    it would hardly improve user experience and satisfaction.


    However, these are precisely the metrics the end user is interested in. They do
    not care about any individual query; they care about overall experience. They
    want an application to respond quickly, and they do not want to stare at “wait”
    and “loading” screens.'
