  trans: "\n# NORM 解析\n\n为了说明 NORM 的工作原理，让我们回到第 11 章的示例。\n\n## 实体关系图\n\n图 14-3 展示了用于构建示例的\
    \ `postgres_air` 实体关系图的一个子集。\n\n![](img/501585_2_En_14_Fig3_HTML.jpg)\n\n该实体关系图展示了\
    \ `booking`、`booking leg`、`passenger`、`flight` 和 `airport` 等变量。\n\n**图 14-3**\n\
    案例研究的实体关系图\n\n在第 11 章讨论应用程序与数据库的交互时，我们草拟了一个对象（我们现在可以称之为 T 对象层次结构），它代表了与一次 `booking`\
    \ 相关的所有信息。从航空旅客的角度看，一个 `booking` 代表了他们的旅行行程。为了使代码示例保持可读性，我们省略了一些通常可以在行程单上找到的细节。具体来说，我们包含了机场代码，但没有包含机场所在的城市，从而避免了需要包含\
    \ `airport` 表的映射。\n\n图 14-3 中的实体关系图展示了从数据库对象映射到传输对象层次结构所需的所有表和关系。\n\n## 传输对象层次结构\n\
    \n层次结构中传输对象的关系如图 14-4 所示。\n\n![](img/501585_2_En_14_Fig4_HTML.jpg)\n\n该关系图展示了\
    \ `booking`、`booking leg`、`passenger`、`flight`、`departure airport` 和 `arrival\
