    ## How to Build the Right Index(es)


    At the start of this chapter, a minimal set of indexes was defined in the `postgres_air`
    schema. Almost every time we wanted to improve query performance, we suggested
    building yet another index. All of these indexes indeed helped improve execution
    time. What was never discussed was whether additional justification is needed
    to create a new index.


    ### To Build or Not to Build


    Twenty years ago, we were more cautious when deciding whether to add yet another
    index. Two major reasons against creating too many indexes are that indexes take
    up extra space in the database and that insert and update operations become slow
    when there are too many indexes to update along with the record itself. The prevailing
    guidance used to be to drop all indexes on a table before a bulk load and then
    to create them again. Some textbooks on databases still offer the same recommendation—not
    to drop the indexes, but to be mindful regarding the number of indexes on a table.


    Since then, times have changed. With current hard- and software, the situation
    is different. Disk storage is cheaper, disks are faster, and, in general, fast
    response is more valuable than saving disk space. Twenty years ago, having a table
    in your database with the cumulative size of its indexes exceeding the size of
    the table itself was a red flag. These days, it’s the norm for OLTP systems. But
    still, the question remains: When is enough enough?


    ### Which Indexes Are Needed?


    It is challenging to provide any general recommendations regarding which indexes
    are necessary. In OLTP systems, response time is usually critical, and any short
    query should be index-supported.


    We recommend creating partial and covering indexes whenever it makes sense. Partial
    indexes are usually smaller than regular indexes and are more likely to fit in
    main memory. Covering indexes save trips to the table, thus allowing the engine
    to perform most processing in main memory.


    Extra time needed for inserts and updates is usually less critical than fast response.
    However, you should always watch this time and evaluate the inventory of indexes
    if slowness is detected. The unique/primary key indexes and foreign keys that
    reference other unique/primary key fields are usual culprits of slowness, as well
    as triggers on insert/update. In each case, you will need to evaluate the importance
    of data integrity vs. the speed of updates.


    There are a number of queries available online that calculate the total size of
    indexes on each table, and most monitoring tools will alert you about excessive
    growth.


    ### Which Indexes Are Not Needed?


    Even though we are usually not concerned with extra disk space needed for indexes,
    we do not want to create database objects that are useless. The PostgreSQL catalog
    view `pg_stat_all_indexes` shows the total number of index uses (scans, reads,
    and fetches) since the last statistics reset.


    Note that some primary key indexes are never used for data retrieval; however,
    they are vital for data integrity and should not be removed.


    ## Indexes and Short Query Scalability


    In this section, we will discuss how to optimize short queries so that they will
    remain performant when data volumes increase.


    In Chapter [1](#501585_2_En_1_Chapter.xhtml), we mentioned that optimization does
    not stop when a query goes to production. We should continue to monitor performance
    and proactively identify changes in performance dynamics.


    With short queries, such performance monitoring is vital, since query behavior
    can change dramatically when data volumes grow, especially when the speed of growth
    is different for different tables.


    When a query is index-supported, there is at least some assurance that it is scalable,
    because the number of accesses to index grows only logarithmically relative to
    table growth. But if the size of a table grows fast, the index might grow large
    enough not to fit in main memory, or it might be pushed out by indexes for competing
    queries. If this happens, execution time may increase sharply.


    It is possible that in the beginning a query works fast without any indexes, and
    we might not know for sure which indexes will be needed in the future. It is also
    possible that a condition for a partial index was very restrictive and index access
    was very fast, but later, with more and more records satisfying the condition,
    the index became less efficient.


    In short, although we strive to make sure short queries are scalable and will
    perform well even when data volumes grow, we can’t assume that anything is optimized
    “forever.” We should always keep an eye on data volume, value distributions, and
    other characteristics that can interfere with performance.


    ## Summary


    This chapter covered short queries and what techniques can be used to optimize
    them. The primary optimization goal for short queries is to apply the most restrictive
    search criteria first and to ensure that all intermediate results remain small.
    As such, the chapter discussed the role of indexes for short queries and showed
    how to determine what indexes are needed to create to support specific queries.


    This chapter also showed various execution plans and how to read them to understand
    the order of joins and filtering, as well as discussing various types of indexes
    available in PostgreSQL and when they can be useful. More complex index types
    will be considered in depth in Chapter [14](#501585_2_En_14_Chapter.xhtml).'
