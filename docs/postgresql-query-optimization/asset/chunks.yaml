  trans: '### 数据库设计与性能


    我们已经提到过，我们不赞同“先编写，后优化”的方法，本书的目标是帮助你从一开始就写出正确的查询。开发者应该在什么时候开始思考他们正在处理的查询性能？答案是越早越好。理想情况下，优化从需求阶段就开始了。在实践中，情况并非总是如此，尽管收集需求是至关重要的。


    更准确地说，收集需求使我们能够提出最佳的数据库设计，而数据库设计可以影响性能。


    如果你是一名数据库管理员，你可能时不时会收到审查新表和视图的请求，这意味着你需要评估他人的数据库设计。如果你对新项目的背景以及新表和视图的用途一无所知，那么你很难判断所提出的设计是否最优。在不深入了解业务需求细节的情况下，你唯一可能评估的是数据库设计是否规范化。即便如此，如果不知道业务特性，这一点也可能不明显。


    评估一个提议的数据库设计的唯一方法是提出正确的问题。正确的问题包括关于这些表所代表的现实世界对象的问题。为了说明这一点，让我们看下面的例子：在这个数据库中，我们需要存储用户账户，并且需要存储每个账户持有人的电话号码。两种可能的设计分别如图表
    `1-1` 和 `1-2` 所示。


    ![](img/501585_2_En_1_Fig2_HTML.jpg)


    一个包含 2 张表的数据库设计。一个名为“Account”的表中包含账户 ID、邮箱、名字和姓氏；另一个名为“Phone”的表中包含电话 ID、账户 ID、电话类型和电话号码。


    **图 1-2** 双表设计


    ![](img/501585_2_En_1_Fig1_HTML.jpg)


    一个名为“Account”的单表数据库设计。该表中包含账户 ID、邮箱、名字、姓氏、家庭电话、工作电话和手机。


    **图 1-1** 单表设计


    这两种设计中哪一种是正确的？这取决于数据的预期用途。如果电话号码从不作为搜索条件使用，并且只作为账户的一部分被选择（例如在客户支持屏幕上显示），如果用户界面有特定电话类型的标签字段，那么单表设计更为合适。


    然而，如果我们想不考虑类型地通过电话号码进行搜索，那么将所有电话号码放在一个单独的表中会使搜索性能更好。


    此外，用户经常被要求指明哪个电话号码是他们的主要号码。在双表设计中添加一个布尔属性 `is_primary` 很容易，但在单表设计中会变得更复杂。当某人没有固定电话或工作电话时（这种情况经常发生），可能会产生额外的复杂性。另一方面，人们经常拥有不止一部手机，或者可能有一个虚拟号码，比如
    Google Voice，并且他们可能希望将该号码记录为联系他们的主要号码。所有这些考虑都倾向于双表设计。


    最后，我们可以评估每个用例的发生频率以及每个情况下响应时间的关键程度。


    ### 应用程序开发与性能


    我们讨论的是应用程序开发，而不仅仅是数据库端的开发，因为再次强调，数据库查询不会自己执行——它们是应用程序的一部分。传统上，优化单个查询被视为“优化”，但我们将采取更广泛的方法。


    经常会出现这样的情况：尽管应用程序执行的每个数据库查询返回结果的时间都少于 0.1 秒，但一个应用程序页面的响应时间可能达到十秒或更长。从技术上讲，对这种流程的优化不是传统意义上的“数据库优化”，但数据库开发人员可以做很多事情来改善这种情况。我们将在第
    `10` 章和第 `13` 章介绍一种相关的优化技术。


    ### 生命周期的其他阶段


    应用程序的生命并不会在发布到生产环境后就结束，优化也是一个持续的过程。尽管我们的目标应该是长期优化，但很难确切预测系统将如何演变。持续关注系统性能是一个很好的实践，不仅关注执行时间，还要关注趋势。


    一个查询可能性能非常好，人们可能没有注意到它的执行时间开始增加，因为它仍在可接受的范围内，并且不会触发任何自动化监控系统的警报。


    查询执行时间可能发生变化，因为数据量增加了，或者数据分布改变了，或者执行频率增加了。此外，我们预计在每个新的 PostgreSQL 版本中都会有新的索引和其他改进，其中一些可能非常重要，以至于促使我们重写原来的查询。


    无论变化的原因是什么，任何系统的任何部分都不应被假设为是永远优化好的。'
- fmt: '## PostgreSQL Specifics


    Although the principles described in the previous section apply to any relational
    database, PostgreSQL, like any other database, has some specifics that should
    be considered. If you have some previous experience in optimizing other databases,
    you might find a good portion of your knowledge does not apply. Do not consider
    this a PostgreSQL deficiency; just remember that PostgreSQL does lots of things
    differently.


    For former Oracle users, the most important distinction they should be aware of
    is that PostgreSQL does not cache queries; it only caches the data in the `shared
    buffers`. When Oracle would produce a generic execution plan, which will be available
    for multiple connections, PostgreSQL will generate a new execution plan each time
    the query is executed. Even though all the necessary data is already in the main
    memory, the query itself must be executed. This difference in behavior might drastically
    decrease application performance after conversion to Oracle. Later in this book,
    we will discuss the ways to address this problem.


    The absence of the cached query plans leads to another important distinction:
    the difference between the execution of parameterized queries and dynamic SQL.
    Chapter [13](#501585_2_En_13_Chapter.xhtml) of this book is dedicated to the use
    of dynamic SQL, an option that is often overlooked.


    Another important PostgreSQL feature you should be aware of is that PostgreSQL
    does not have optimizer hints. If you previously worked with a database like Oracle,
    which does have the option of “hinting” to the optimizer, you might feel helpless
    when you are presented with the challenge of optimizing a PostgreSQL query. However,
    here is some good news: PostgreSQL does not have hints by design. The PostgreSQL
    core team believes in investing in developing a query planner that is capable
    of choosing the best execution path without hints. As a result, the PostgreSQL
    optimization engine is one of the best among both commercial and open source systems.
    Many strong database internal developers have been drawn to Postgres because of
    the optimizer. In addition, Postgres has been chosen as the founding source code
    base for several commercial databases partly because of the optimizer. With PostgreSQL,
    it is even more important to write your SQL statements declaratively, allowing
    the optimizer to do its job.


    With PostgreSQL, it is especially important to be aware of new features and capabilities
    added with each release. In recent years, Postgres has had over 180 of them each
    year. Many of these features are around optimization. We are not planning to cover
    them all; moreover, between the writing of this chapter and its publication, there
    will indubitably be more. PostgreSQL has an incredibly rich set of types and indexes,
    and it is always worth consulting recent documentation to check whether a feature
    you wanted might have been implemented.


    More PostgreSQL specifics will be addressed later in the book.


    ## Summary


    Writing a database query is different from writing application code using imperative
    languages. SQL is a declarative language, which means that we specify the desired
    outcome, but do not specify an execution path. Since two queries yielding the
    same result may be executed differently, utilizing different resources and taking
    a different amount of time, optimization and “thinking like a database” are core
    parts of SQL development.


    Instead of optimizing queries that are already written, our goal is to write queries
    correctly from the start. Ideally, optimization begins at the time of gathering
    requirements and designing the database. Then, we can proceed with optimizing
    both individual queries and the way the database calls from the application are
    structured. But optimization does not end there; in order to keep the system performant,
    we need to monitor performance throughout the system’s lifecycle and continually
    seek opportunities to optimize it.


    ## 2. Theory: Yes, We Need It!


    In order to write performant queries, database developers need to understand how
    queries are processed by the database engine. And to do that, we need to know
    the basics of relational theory. If the word “theory” sounds too dry, we can call
    it “the secret life of a database query.” In this chapter, we will take a look
    at this “secret life,” explaining what happens to a database query between the
    moment you click “Execute” or press Enter and the moment you see the result set
    returned from the database.


    As discussed in the previous chapter, a SQL query specifies what results are needed
    or what must be changed in the database but does not specify how exactly to execute
    the requested action. It is the job of the database engine to convert the source
    SQL query into executable code and execute it. This chapter covers the operations
    used by the database engine as it interprets a SQL query and their theoretical
    underpinning.


    ### Query Processing Overview


    In order to produce query results, PostgreSQL performs the following steps:


    *   Compile and transform a SQL statement into an expression consisting of high-level
    logical operations, known as a logical plan.

    *   Optimize the logical plan and convert it into an execution plan.

    *   Execute (interpret) the plan and return results.


    #### Compilation


    Compiling a SQL query is similar to compiling code written in an imperative language,
    such as Java or Python. The source code is parsed, and an internal representation
    is generated. However, the compilation of SQL statements has two essential differences.


    First, in an imperative language, the definitions of identifiers are usually included
    in the source code, while definitions of objects referenced in SQL queries are
    mostly stored in the database. Consequently, the meaning of a query depends on
    the database structure: for example, an object with the same name could be a table
    in one database, a view in another one, and a function in yet another one.


    Second, the output of an imperative language compiler is usually (nearly) executable
    code, such as byte code for a Java virtual machine. In contrast, the output of
    a query compiler is an expression consisting of high-level operations that remain
    declarative—they do not give any instruction on how to obtain the required output.
    A possible order of operations is specified at this point, but not the manner
    of executing those operations.'
