  trans: '## 分区能提升性能吗？


    人们普遍认为，对大型表进行**分区**可以提高查询性能。但情况并非总是如此。此外，分区常常会降低性能，你可能需要重写旧查询以确保性能不会受到负面影响。


    分区能够提升性能的方式在于：如果查询包含对分区键的条件判断，那么搜索就仅限于这些特定分区。这使得分区在那些**全表扫描**往往是最佳选择的长查询中特别有用：分区可以显著减少表扫描所需时间。而对于索引访问而言，这种差异可以忽略不计：分区只是从`B-树`中移除了一个层级。


    应如何为表选择分区键？根据`Postgres`优化器的工作方式，需要满足两个条件：1）分区键应在（几乎）所有针对此表运行的查询中使用，或至少在关键查询中使用；2）这些值必须在
    SQL 语句执行前已知。后者意味着该值不能作为参数或子查询的结果传递。


    让我们来看一个来自第 6 章的示例，即代码清单 6-21。如果此查询被限制在 7 月 15 日至 7 月 31 日的登机时间范围内


    ```

    SELECT

    city,

    date_trunc(''month'', scheduled_departure),

    sum(passengers)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN (

    SELECT

    flight_id,

    count(*) passengers

    FROM   booking_leg l

    JOIN boarding_pass b USING (booking_leg_id)

    WHERE boarding_time > ''07-15-23''

    and boarding_time <''07-31-23''

    GROUP BY flight_id

    ) cnt

    USING (flight_id)

    GROUP BY 1,2

    ORDER BY 3 DESC

    ```


    …这仍然将是一个长查询，会对`boarding_pass`表执行全表扫描。其执行计划与图 6-18 中的相同。


    然而，当对分区表`boarding_pass_part`（参见代码清单 7-13）执行类似的查询时，此查询将能够利用分区优势。


    ```

    SELECT

    city,

    date_trunc(''month'', scheduled_departure),

    sum(passengers)  passengers

    FROM airport  a

    JOIN flight f ON airport_code = departure_airport

    JOIN (

    SELECT

    flight_id,

    count(*) passengers

    FROM   booking_leg l

    JOIN boarding_pass_part b USING (booking_leg_id)

    WHERE boarding_time > ''07-15-23''

    and boarding_time <''07-31-23''

    GROUP BY flight_id

    ) cnt

    USING (flight_id)

    GROUP BY 1,2

    ORDER BY 3 DESC

    Listing 7-13

    查询分区表

    ```


    图 7-7 中的执行计划证明，优化器选择仅扫描一个分区，而不是全表扫描，因为查询是基于`boarding_time`进行过滤的。对于非分区表，无论是否按`boarding_time`过滤，其查询运行时间大致相同；而对于分区表，执行时间则快了一倍多，因为所有相关行都位于同一个分区中。


    ![](img/501585_2_En_7_Fig7_HTML.jpg)


    一个查询计划包含 24 行文本。它包括排序键、分组聚合、分组键、哈希连接、哈希条件、对计数结果的子查询扫描、规划的分区、对 booking、flight 和
    airport 表的顺序扫描，以及其他细节。


    图 7-7

    使用分区表的执行计划


    分区可以拥有自己的索引，这些索引显然比整个分区表上的索引要小。对于短查询而言，这个选项可能是有益的。然而，只有当几乎所有查询都从同一分区提取数据时，这才能显著提高性能。在`B-树`中搜索的成本与其深度成正比。分区上的索引很可能只消除`B-树`的一个层级，而选择所需分区也需要消耗一定的资源。这些资源很可能与处理一个额外索引层级所需的资源相当。当然，查询可以指定分区而不是整个分区表，从而将选择分区的开销隐藏在发出查询的应用程序中。


    因此，不应高估分区对短查询的好处。


    ## 为什么要创建分区表？


    读完上一节，读者可能会想，是否有理由去创建分区表。事实上，理由有很多，我们将在本节进行介绍。


    可以向分区表添加分区或删除分区。`DROP`命令的执行速度远快于批量`DELETE`操作，并且不需要后续的`VACUUM`。一个典型的用例是表按日期范围分区（例如，每月一个分区），每月末添加一个新分区并删除最旧的分区。


    此外，还可以`ATTACH`（附加）和`DETACH`（分离）分区。通过这种方式，你可以将现有表作为分区添加到分区表中，也可以分离分区而不删除数据。例如，你可以将最近三个月的数据保留在分区表中，每月初添加一个新分区，分离出最旧的分区，然后将其附加到归档表中。


    分区可用于将大量数据分布到多台数据库服务器上：一个分区可以是外部表（foreign table）。


    然而，分区的主要理由在于维护。当表达到 TB 级别时，复制此类表或对其运行`pg_dump`就变得具有挑战性。最重要的是，在该表上运行`autovacuum`也变得困难。我们将介绍`autovacuum`及其对维护健康
    PostgreSQL 数据库的重要性；现在，我们只想提到，`autovacuum`几乎不可能在 1TB 的表上完成。


    ## 并行处理


    从版本 10 开始，PostgreSQL 具备支持并行查询执行的能力。两个配置参数`max_parallel_workers`和`max_parallel_workers_per_gather`定义了可用并行进程的数量以及单一会话中可生成的并行进程数量。


    我们仍然记得这个功能推出时社区的兴奋之情。的确，并行处理过去乃至现在常常被宣传为解决所有性能问题的“银弹”，我们感到有必要提醒您不要对并行处理抱有过高期望——这在任何关系型数据库管理系统中都是如此，而不仅仅是
    PostgreSQL。


    并行执行可以被视为另一种拆分查询的方式：执行查询所需的工作量被分配到多个处理单元（处理器或核心）之间。


    任何并行算法都有一部分必须在单个单元上执行。此外，作为并行进程间同步的成本，会产生额外的开销。由于这些原因，并行处理主要在处理批量数据时有益。具体来说，对于大规模扫描和哈希连接，并行执行是有益的。扫描和哈希连接都是长查询的典型操作，其性能提升通常最为显著。


    相反，对于短查询的加速效果通常可以忽略不计。不同查询的并行执行可能会提高吞吐量，但这与单个查询的并行执行无关。


    有时，优化器可能会用并行表扫描替代基于索引的访问（后者会在顺序执行中使用）。这可能是由成本估算不准确引起的。在这种情况下，并行执行可能比顺序执行更慢。


    本书中的所有执行计划都是在关闭并行处理的情况下创建的。


    此外，无论并行执行能带来多大的可扩展性优势，都无法修复糟糕的设计或补偿低效代码，原因很简单：并行带来的可扩展性收益最多是线性的，而嵌套循环的成本是二次方的。'
- fmt: '## Summary


    This chapter covered different ways to break queries into smaller functional parts
    and the advantages and disadvantages of each approach. It covered the potential
    pitfalls of one often-used optimization tool—temporary tables—and showed how common
    table expressions can be used as an alternative that doesn’t stymie the query
    optimizer. It also discussed views and materialized views and their impact on
    performance. Finally, it briefly addressed partitioning and parallel execution.


    # 8. Optimizing Data Modification


    Up to this point, our focus has been on optimizing `queries`, which means that
    only data retrieval has been covered. We haven’t touched on anything related to
    data manipulation, that is, updating, removing, or adding records. This is the
    subject of this chapter, which discusses how data manipulation affects performance
    and how performance for these operations can be improved.


    ## What Is DML?


    Any database system has two languages: DDL (data definition language), used to
    create tables and other database objects, and DML (data manipulation language),
    which is used to query and modify data in the database. In PostgreSQL, both DDL
    and DML are parts of SQL, but some commands are related to DDL (`ALTER TABLE`,
    `CREATE MATERIALIZED VIEW`, `DROP INDEX`, etc.), while others are related to DML
    (`INSERT`, `UPDATE`, `DELETE`). It is also common to refer to these commands as
    DDL and DML, respectively, so a reference to “running DDL” means executing data
    definition commands and “running DML” means executing `INSERT`, `UPDATE`, or `DELETE`.


    ## Two Ways to Optimize Data Modification


    The execution of any DML statement consists of two parts: selecting the records
    to be modified and the data modification itself. In the case of `INSERT`, the
    first part may be omitted when constants are being inserted. However, if an `INSERT-SELECT`
    construct is used, the records that are needed for the insert must be found first.


    For this reason, optimizing a DML statement consists of two parts: optimizing
    selection and optimizing data modification.


    If the search part is the problem, then it is the `SELECT` part of the command
    that should be optimized. This is well covered in prior chapters. This chapter
    concerns itself with the second part—optimizing writing data.


    In the overwhelming majority of cases, even OLTP systems execute significantly
    fewer DML statements than `SELECT` statements. This is the primary reason that
    people seldom talk about optimizing DML. However, long-running DML may cause problems
    not only because the updated data isn’t available in the system in a timely manner
    but also because it can create `blocking locks`, which slow down the execution
    of other statements.


    ## How Does DML Work?


    To discuss the optimizations applicable to data modification SQL commands, we
    need to understand how they are executed.


    ### Low-Level Input/Output


    At the end of the day, any SQL operation, no matter how complex, comes down to
    a couple low-level operations: reading and writing individual database blocks.
    The reason is simple: data contained in the database can only be processed when
    blocks are fetched to main memory, and all modifications are first done in main
    memory and then written to disk.


    A fundamental difference between reads and writes is that reads from disk must
    be completed before data can be processed; thus, a `SELECT` statement cannot be
    completed before all needed blocks are fetched into memory. In contrast, the changes
    inside a block are completed before the write starts; thus, a SQL operation can
    be completed without any delays. There is no need to wait until the modified data
    are actually written to the disk. This is somewhat counterintuitive: usually one
    would expect that an update requires more resources than a read.


    Of course, writes do require much more resources than reads: the database must
    modify indexes and register updates in the WAL (write-ahead log). Still, this
    happens in main memory as far as single DML statements are concerned. WAL records
    are forced to disk asynchronously: by default, PostgreSQL guarantees that they
    are written at commit.


    This sounds great: any `INSERT, UPDATE`, or `DELETE` appears to run much faster
    than a `SELECT`. If so, why are optimizations still needed?


    There are two major reasons: First, writes are still needed and hence consume
    some amount of hardware resources, mostly I/O bandwidth. The cost of writes is
    tied to the cost of transferring pages and is not necessarily visible on any individual
    operation, but it still slows down processing and can even affect the performance
    of `SELECT` statements. An additional workload is produced in the background (e.g.,
    modified blocks being written to disk) and during maintenance. Typically, this
    maintenance performs data restructuring, for example, the `VACUUM` operation in
    PostgreSQL. Some restructuring tasks block access to the modified object for the
    entire duration of the restructuring operation.


    Second, modifications may interfere with other modifications and even with retrieval.
    As long as data is not modified, the order of processing is immaterial. Data can
    be accessed from different `SELECT` statements simultaneously. In contrast, modifications
    cannot be simultaneous, and the order of operations is crucial. In order to ensure
    correctness, some operations must be delayed or even declined. Correctness is
    the responsibility of the concurrency control (a.k.a. transaction processing)
    subsystem. Transaction processing is not the focus of this book; however, discussion
    of modifications cannot avoid some considerations related to the transactional
    behavior of the DBMS.'
