  ## 结论


  本章正式定义了长查询，并探讨了其优化技术。


  本章的首要重要原则是：索引并不一定能加快查询速度，实际上，它可能使长查询运行得更慢。一个常见的误解是，如果无法构建索引，就无法优化全表扫描。希望本章已明确证明，优化全表扫描存在多种可能性。


  与短查询类似，长查询的优化也通过减少中间结果的大小并尽可能少地对行进行必要工作来实现。对于短查询，这是通过对最具限制性的条件应用索引来完成的。对于长查询，则通过注意连接顺序、应用半连接和反连接、在分组前过滤、在连接前分组以及应用集合操作来实现。


  '
- "# 7. 长查询：附加技术\n\n第 6 章讨论了多种提升长查询性能的方法。到目前为止，所涉及的技术都与重写查询而不创建额外的数据库对象有关。本章将探讨提升长查询性能的其他方法，包括物化中间结果的不同方式。将讨论临时表、CTE（公共表表达式）、视图和物化视图——每种工具何时可以提升性能，以及每种工具如何被滥用并导致性能下降。最后，本章将介绍分区和并行执行。\n\
  \n## 构造查询\n\n熟悉面向对象编程（OOP）的读者会对分解（因式分解）和封装的概念不陌生。OOP 的最佳实践规定，代码应被分解（或因式分解）为许多更小的类和对象，这些类和对象负责系统行为中定义良好的子集，同时应进行封装，限制对组件的直接访问，从而隐藏其实现细节。这两个原则使应用程序代码更易于阅读和管理，并使更改更容易。\n\
  \n基于这种范式，当面对一个超过 500 行的单一 `SELECT` 语句时，人们很自然地会想要应用相同的原则，将代码分解成更小的部分并封装一些逻辑。\n\n\
  然而，SQL 的声明性质决定了它因式分解查询的风格与用于应用程序代码的风格截然不同。在 SQL 中，如同在任何语言中一样，代码应保持易于理解和修改，但不能以牺牲性能为代价。\n\
  \n我们可以通过多种方式在 SQL 中进行因式分解和封装，每种方式都有其自身的优点和陷阱。有些方法（效果各异）用于提升性能和存储中间结果。有些用于使代码可重用。还有一些则影响数据的存储方式。本章将介绍几种方法，其他方法，如函数，将在后续章节中深入探讨。\n\
  \n无论如何，任何分解或封装都应对应一个逻辑实体——例如，一份报告或每日刷新任务。\n\n## 临时表和 CTE\n\n在第 6 章中，我们提到有时 SQL 开发人员加速查询执行的尝试可能会适得其反，导致执行变慢。这通常发生在他们决定使用\
  \ `temporary tables`（临时表）时。\n\n### 临时表\n\n要创建临时表，需执行常规的 `create table` 语句，并添加关键字\
  \ `temporary` 或简写 `temp`：\n\n```sql\nCREATE TEMP TABLE interim_results\n```\n\n\
  临时表仅对当前会话可见，如果在会话断开连接前未显式删除，它们会被自动删除。除此之外，它们与常规表一样好，可以在查询中毫无限制地使用，甚至可以创建索引。临时表常用于存储查询的中间结果，因此\
  \ `CREATE` 语句通常如下所示：\n\n```sql\nCREATE TEMP TABLE interim_results AS\nSELECT ...\n\
  ```\n\n这一切看起来非常方便，那么这种方法有什么问题呢？\n\n如果你使用临时表来存储查询结果以便进行一些分析，然后在完成后丢弃它，这完全没问题。但是，当\
  \ SQL 开发人员开始使用 `temporary tables` 来存储每个步骤的结果时，代码往往会变成这样：\n\n```sql\nCREATE TEMP\
  \ TABLE T1 AS SELECT  ;\nCREATE TEMP TABLE T2 AS SELECT \nFROM T1\nINNER JOIN \n\
  ```\n\n临时表的链条可能会变得相当长。这会导致问题吗？是的，而且问题很多，包括以下几点：\n\n*   `Indexes`（索引） – 数据被选入临时表存储后，我们无法再使用在源表上创建的索引。我们只能选择在没有索引的情况下继续操作，或者在临时表上新建索引，这需要时间。\n\
  *   `Statistics`（统计信息） – 由于我们创建了一个新表，优化器无法使用源表上的值分布统计数据，因此我们只能选择在没有统计信息的情况下操作，或者在临时表上运行\
  \ `ANALYZE` 命令。\n*   `Disk space`（磁盘空间） – 临时表仍然是存储在磁盘上的表，因此当它们被过度使用时，可能导致数据库大小显著增长。\n\
  *   `Excessive I/O`（过量 I/O） – 同样，因为它们是写入磁盘的表，所以写入和读取磁盘需要额外的时间。\n\n过度使用临时表最重要的负面影响是，这种做法阻碍了优化器进行重写。\n\
  \n通过将每个连接的结果保存在临时表中，你阻止了优化器选择最优的连接顺序；你“锁定”了创建临时表的顺序。\n\n当我们查看清单 6-15 中查询的执行计划时，我们观察到\
  \ PostgreSQL 能够将过滤条件下推到分组操作内部。如果为中间结果创建了临时表，会发生什么？\n\n```sql\nCREATE TEMP TABLE\
  \ flights_totals AS\nSELECT\nbl.flight_id,\ndeparture_airport,\n(avg(price))::numeric\
  \ (7,2) AS avg_price,\ncount(DISTINCT passenger_id) AS num_passengers\nFROM booking\
  \ b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\nJOIN\
  \ passenger p USING (booking_id)\nGROUP BY 1,2;\n\nSELECT\nflight_id,\navg_price,\n\
  num_passengers\nFROM flights_totals\nWHERE departure_airport='ORD';\n```\n**清单 7-1**\
  \ 临时表的低效用法\n\n创建这个临时表耗时 50 秒，产生了超过 500,000 行数据，而我们只需要其中的 10,000 行。与此同时，清单 6-15 中的查询仅用\
  \ 0.1 秒就执行完毕。\n\n\n\n### 公共表表达式（CTE）\n\n如果临时表很危险，那么是否应该改用`CTE`（公共表表达式）呢？首先，什么是 CTE？\n\
  \n公共表表达式，或简称`CTE`，可以理解为仅在单个查询中存在的临时表。`WITH`子句中的每条辅助语句都可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`；而`WITH`子句本身则附加到一条主语句上，该主语句同样可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`。\n\
  \n让我们来尝试一个 CTE。在列表 7-2 中，来自列表 7-1 的查询被修改为使用 CTE 而不是临时表。\n\n```sql\nWITH flights_totals\
  \ AS(\nSELECT\nbl.flight_id,\ndeparture_airport,\n(avg(price))::numeric (7,2) AS\
  \ avg_price,\ncount(DISTINCT passenger_id) AS num_passengers\nFROM booking b\nJOIN\
  \ booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\nJOIN passenger\
  \ p USING (booking_id)\nGROUP BY 1,2)\nSELECT\nflight_id,\navg_price,\nnum_passengers\n\
  FROM flights_totals\nWHERE departure_airport=’ORD’\n```\n*列表 7-2 使用 CTE 的查询示例*\n\
  \n你在执行计划中看到的结果将取决于你运行的是 12 之前的 PostgreSQL 版本还是 12 及以上的版本。对于所有 12 之前的版本，CTE 的处理方式与临时表完全相同。结果会被物化在主内存中，并可能溢出到磁盘。这意味着使用\
  \ CTE 相比临时表没有任何优势。\n\n公平地说，CTE 的预设用途是不同的。CTE 背后的理念是，如果你需要多次使用某个（可能很复杂的）子查询，你可以将其定义为\
  \ CTE，然后在查询中多次引用它。在这种情况下，`PostgreSQL`只会计算一次结果，然后根据需要多次复用。\n\n由于这种预设的用途，优化器会将`CTE`的执行与查询的其余部分分开规划，并且不会将任何连接条件推入`CTE`内部，从而提供了所谓的*优化壁垒*。当`WITH`用于可能具有副作用的`INSERT/DELETE/UPDATE`语句或递归`CTE`调用时，这一点尤其重要。此外，拥有优化壁垒意味着参与`CTE`的表不计入`join_collapse_limit`的限制。这使得我们能够有效地利用`PostgreSQL`优化器的功能来处理连接大量表的查询。\n\
  \n对于列表 7-2 中的查询，在 12 之前的`PostgreSQL`版本中，`CTE` `flight_totals`会为所有航班计算，之后才会选择一部分航班。\n\
  \n`PostgreSQL 12`对`CTE`优化带来了巨大改变。对于没有递归的`SELECT`语句，如果一个`CTE`在查询中只被使用一次，它将被内联到外部查询中（移除优化壁垒）。如果它被调用多次，则保留旧行为。\n\
  \n更重要的是，前面描述的行为是默认的，但可以通过使用关键字`MATERIALIZED`和`NOT MATERIALIZED`来覆盖（参见列表 7-3）。第一个关键字强制使用旧行为，第二个关键字强制内联，忽略所有其他考虑因素。\n\
  \n```sql\nWITH flights_totals AS MATERIALIZED (\nSELECT\nbl.flight_id,\ndeparture_airport,\n\
  (avg(price))::numeric (7,2) AS avg_price,\ncount(DISTINCT passenger_id) AS num_passengers\n\
  FROM booking b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\n\
  JOIN passenger p USING (booking_id)\nGROUP BY 1,2)\nSELECT\nflight_id,\navg_price,\n\
  num_passengers\nFROM flights_totals\nWHERE departure_airport='ORD'\n```\n*列表 7-3\
  \ MATERIALIZED 关键字的使用*\n\n图 7-1 展示了列表 7-2 在`PostgreSQL 12`中的执行计划。如果添加了`MATERIALIZED`关键字，如列表\
  \ 7-3 所示，则会强制使用旧行为，如图 7-2 所示。\n\n![强制物化 CTE 的查询计划](img/501585_2_En_7_Fig2_HTML.jpg)\n\
  *图 7-2 强制物化 CTE*\n\n![CTE 内联的执行计划](img/501585_2_En_7_Fig1_HTML.jpg)\n*图 7-1 CTE\
  \ 内联的执行计划*\n\n在这些最近的改动之前，当 SQL 语句看起来像下面这样时，我们会劝阻 SQL 开发者使用多个嵌入式 CTE：\n\n```sql\n\
  WITH z AS (\nWITH y AS (\nWITH x AS (SELECT ...)\nSELECT ... FROM a JOIN x ...)\n\
  SELECT ... FROM b\nJOIN y...)\nSELECT ... FROM c\nJOIN z\n...\n```\n然而，随着`PostgreSQL\
  \ 12`中引入的改动，这样的查询变得更容易管理了。我们仍然会鼓励 SQL 开发者注意不要强制产生次优的执行计划，但使用`CTE`链远比使用一系列临时表要好；在后一种情况下，优化器是无能为力的。\n\
  \n最后，重要的是要提到，存储中间结果在某些情况下是有益的。然而，几乎总有比使用临时表更好的方法。我们将在本章后面讨论其他选项。\n\n\n\n## 视图：用还是不用\n\
  \n视图是最具争议的数据库对象。它们似乎易于理解，创建视图的好处也显而易见。但它们为何会引发问题？\n\n尽管我们确信大多数读者都有机会为某个项目创建过至少一两个视图，但还是先给出一个正式定义。最简单的定义是：\n\
  \n`视图`是一种数据库对象，它存储一个定义了虚拟表的查询。\n\n视图是虚拟表，这意味着在语法上，视图可以像表一样在 `SELECT` 语句中使用。然而，它们与表有显著区别，即不存储任何数据；数据库中只存储定义该视图的查询。\n\
  \n让我们再看一下清单 6-14 中的查询。这个查询计算了 `postgres_air` 模式下所有航班的总计，但我们希望使用这个查询逻辑来选择特定航班和/或出发机场的统计信息。清单\
  \ 7-4 创建了一个视图来封装这个逻辑。\n\n```sql\nCREATE VIEW flight_stats AS\nSELECT\n  bl.flight_id,\n\
  \  departure_airport,\n  (avg(price))::numeric (7,2) AS avg_price,\n  count(DISTINCT\
  \ passenger_id) AS num_passengers\nFROM booking b\nJOIN booking_leg bl USING (booking_id)\n\
  JOIN flight f USING (flight_id)\nJOIN passenger p USING (booking_id)\nGROUP BY 1,2\n\
  ```\n清单 7-4\n创建一个视图\n\n现在，很容易就能选择任何特定航班的统计信息：\n\n```sql\nSELECT *\nFROM flight_stats\n\
  WHERE flight_id=222183\n```\n\n这个查询计划看起来与图 6-13 中的计划完全相同。原因是在查询处理的第一步，查询解析器将视图转换为内联子查询。在这种情况下，这对有利的，因为过滤条件被推入到了分组操作之内。但如果使用了非常量搜索条件，结果可能会令人失望。在清单\
  \ 7-5 中，视图 `flight_stats` 的航班统计信息被航班的出发日期所限制。\n\n```sql\nSELECT *\nFROM flight_stats\
  \ fs\nJOIN (SELECT\n        flight_id\n      FROM flight f\n      WHERE actual_departure\
  \ between '2023-08-01' and '2023-08-14'\n     ) fl\nON fl.flight_id=fs.flight_id\n\
  ```\n清单 7-5\n使用视图进行查询\n\n此查询的执行计划如图 7-3 所示。\n\n![](img/501585_2_En_7_Fig3_HTML.jpg)\n\
  \n一个查询计划包含 24 行文本。这些行包括哈希连接、分组聚合、哈希条件、分组键、排序键、对 `booking` 表的顺序扫描以及其他细节。\n\n图 7-3\n\
  条件无法被推入的执行计划\n\n查看这个执行计划，我们观察到，首先计算所有航班的统计信息，之后才将结果与选定的航班进行连接。该查询的执行时间为十分钟。\n\n\
  不使用视图，我们遵循第 6 章解释的模式，在分组之前过滤航班，如清单 7-6 所示。\n\n```sql\nSELECT\n  bl.flight_id,\n\
  \  departure_airport,\n  (avg(price))::numeric (7,2) AS avg_price,\n  count(DISTINCT\
  \ passenger_id) AS num_passengers\nFROM booking b\nJOIN booking_leg bl USING (booking_id)\n\
  JOIN flight f USING (flight_id)\nJOIN passenger p USING (booking_id)\nWHERE actual_departure\
  \ between '2023-08-01' AND '2023-08-14'\nGROUP BY 1,2\n```\n清单 7-6\n不使用视图重写查询\n\n\
  该查询的执行计划如图 7-4 所示，显示对 `flight` 表的限制被首先应用。该查询的执行时间为三分钟。\n\n![](img/501585_2_En_7_Fig4_HTML.jpg)\n\
  \n一个查询计划包含 20 行文本。这些行包括分组聚合、哈希条件、分组键、排序键、对 `passenger`、`booking` 的顺序扫描、重新检查条件以及其他细节。\n\
  \n图 7-4\n清单 7-6 的执行计划\n\n当数据库教科书，包括那些教授 PostgreSQL 基础知识的书，声称视图可以“像表一样”使用时，这是一种误导。在实践中，最初仅为封装独立查询而创建的视图，经常被用于其他查询中，与其他表和视图连接，包括多次连接到视图中已包含的表，而用户并不知道幕后发生了什么。\n\
  \n一方面，人们创建视图的目的通常就是为了封装，以便其他人无需弄清楚选择逻辑就能使用它。另一方面，这种不透明性正是查询性能不佳的原因。当视图中的某些列是转换结果时，这种影响尤其明显。考虑清单\
  \ 7-7 中的视图 `flight_departure`。\n\n```sql\nCREATE VIEW flight_departure as\nSELECT\n\
  \  bl.flight_id,\n  departure_airport,\n  coalesce(actual_departure, scheduled_departure)::date\n\
  \  AS  departure_date,\n  count(DISTINCT passenger_id) AS num_passengers\nFROM booking\
  \ b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\nJOIN\
  \ passenger p USING (booking_id)\nGROUP BY 1,2,3\n```\n清单 7-7\n带有列转换的视图\n\n执行查询\n\
  \n```sql\nSELECT\n  flight_id,\n  num_passengers\nFROM flight_departure\nWHERE flight_id\
  \ =22183\n```\n……对航班的过滤条件会被推入视图内部，查询将在 63 毫秒内执行完毕。一个不知道 `flight_departure` 是视图的用户可能会认为所有列的性能都差不多，并在运行以下查询时对结果感到惊讶：\n\
  \n```sql\nSELECT\n  flight_id,\n  num_passengers\nFROM flight_departure\nWHERE departure_date=\
  \ '2023-08-01'\n```\n\n这个查询需要 2.5 秒或更长的执行时间，是前者的四十倍。差异的原因是 `departure_date` 列是一个转换结果，如第\
  \ 5 章所讨论的，无法利用任何索引来应用此过滤条件。此查询的执行计划如图 7-5 所示。请注意，尽管 `scheduled_departure` 和 `actual_departure`\
  \ 上的索引未被使用，PostgreSQL 仍然正确识别了连接顺序，先搜索 `flight` 表，然后使用索引访问 `booking` 和 `passenger`\
  \ 表。\n\n![](img/501585_2_En_7_Fig5_HTML.jpg)\n\n一个查询计划包含 18 行。这些行包括对 `flight departure`\
  \ 的子查询扫描、分组聚合、分组键、排序键、嵌套循环、哈希连接、哈希条件、对 `flight` 表的顺序扫描以及其他细节。\n\n图 7-5\n某些索引无法被利用时的执行计划\n\
  \n清单 7-8 展示了一个更严重的性能下降案例。不幸的是，这是一个真实案例。当使用视图的人不知道创建它用了什么查询时，他们可能会用它来选择那些从底层表中更容易获取的数据。\n\
  \n```sql\nSELECT\n  flight_id\nFROM flight_departure\nWHERE departure_airport='ORD'\n\
  ```\n清单 7-8\n仅从视图中选择一列\n\n这个查询不关心航班上的乘客数量；它仅仅是选择所有从 `ORD` 出发且已售出任何机票的航班。然而，清单 7-8\
  \ 的执行计划相当复杂——见图 7-6。\n\n![](img/501585_2_En_7_Fig6_HTML.jpg)\n\n一个查询计划包含 20 行。它们包括对\
  \ `flight departure` 的子查询扫描、分组聚合、分组键、排序键、嵌套循环、连接过滤器、哈希连接、哈希条件、对 `flight` 表的顺序扫描、索引条件以及其他细节。\n\
  \n图 7-6\n清单 7-8 中查询的执行计划\n\n该查询运行了 3.1 秒。然而，一个不使用视图而选择相同信息的查询\n\n```sql\nSELECT\n\
  \  flight_id\nFROM flight\nWHERE departure_airport='ORD'\nAND flight_id IN (SELECT\
  \ flight_id FROM booking_leg)\n```\n\n\n...将使用可用索引，并且仅需运行 120 毫秒。\n\n## 为何要使用视图？\n\
  \n既然我们已经看到了很多使用视图带来的负面影响例子，那么有没有什么为其辩护的理由呢？是否存在一些场景，使用视图可以提升查询性能？\n\n在 PostgreSQL\
  \ 内部，大多数情况下，任何视图的创建都隐式地包含了规则的创建。`select` 规则可能会限制对底层表的访问。规则、触发器和自动更新使得 PostgreSQL\
  \ 中的视图极其复杂，并提供了与表非常相似的功能。\n\n然而，它们并不能带来任何性能上的好处。视图最好且或许是唯一合理的用途，是作为安全层或用于定义报表实体，以确保所有的连接和业务逻辑都正确定义。\n\
  \n## 物化视图\n\n大多数现代数据库系统允许用户创建物化视图，但它们的实现和具体行为各不相同。\n\n让我们从定义开始。\n\n物化视图是一种数据库对象，它结合了查询定义和一个表，用于在查询运行时存储其结果。\n\
  \n物化视图与视图不同，因为查询结果被存储了下来，而不仅仅是视图定义。这意味着物化视图反映的是它最后一次刷新时的数据，而不是当前数据。它也不同于表，因为你不能直接修改物化视图中的数据，只能使用预定义的查询来刷新它。\n\
  \n### 创建和使用物化视图\n\n让我们通过一个例子来帮助说明物化视图的定义。清单 7-9 创建了一个物化视图。\n\n```sql\nCREATE MATERIALIZED\
  \ VIEW flight_departure_mv AS\nSELECT\nbl.flight_id,\ndeparture_airport,\ncoalesce(actual_departure,\
  \ scheduled_departure)::date departure_date,\ncount(DISTINCT passenger_id) AS num_passengers\n\
  FROM booking b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\n\
  JOIN passenger p USING (booking_id)\nGROUP BY 1,2,3\n```\n\n清单 7-9\n创建物化视图\n\n运行此命令时会发生什么？首先，在这个特定的例子中，它需要很长时间来执行。但执行完成后，数据库中将出现一个新对象，该对象存储了此次查询执行的结果。此外，查询本身也会与数据一起存储。与视图相反，当在查询中引用物化视图时，它们的行为完全像表。优化器不会用它们的定义查询来替换它们，而是像访问表一样访问它们。也可以在物化视图上创建索引，尽管它们不能有主键和外键：\n\
  \n```sql\nCREATE UNIQUE INDEX flight_departure_flight_id\nON flight_departure_mv(flight_id);\n\
  --\nCREATE INDEX flight_departure_dep_date\nON flight_departure_mv(departure_date);\n\
  --\nCREATE INDEX flight_departure_dep_airport\nON flight_departure_mv(departure_airport);\n\
  ```\n\n执行此查询\n\n```sql\nSELECT\nflight_id,\nnum_passengers\nFROM flight_departure_mv\n\
  WHERE departure_date= '2023-08-01'\n```\n\n...将仅需 60 毫秒，并且执行计划将显示索引扫描。\n\n### 刷新物化视图\n\
  \n`REFRESH` 命令使用基础查询在刷新执行时的结果来填充物化视图。`REFRESH` 命令的语法如下：\n\n```sql\nREFRESH MATERIALIZED\
  \ VIEW flight_departure_mv\n```\n\nPostgreSQL 中的物化视图不如 Oracle 等其他一些数据库管理系统成熟。物化视图不能进行增量更新，并且刷新计划无法在物化视图定义中指定。每次执行\
  \ `REFRESH` 命令时，底层表都会被截断，然后插入 `SELECT` 语句的结果。如果在刷新过程中发生错误，刷新过程将回滚，物化视图保持不变。\n\n\
  在刷新期间，物化视图会被锁定，其内容对其他进程不可用。为了使物化视图的先前版本在刷新期间仍然可用，可以添加 `CONCURRENTLY` 关键字：\n\n```sql\n\
  REFRESH MATERIALIZED VIEW CONCURRENTLY flight_departure_mv\n```\n\n物化视图只有在具有唯一索引时才能进行并发刷新。并发刷新比常规刷新花费的时间更长，但对物化视图的访问不会被阻塞。\n\
  \n### 我应该创建物化视图吗？\n\n很难提供创建物化视图在哪些具体、普遍条件下是有益的，但可以遵循一些决策指南。由于物化视图的刷新需要时间，而从物化视图中进行选择会比从视图中快得多，请考虑以下因素：\n\
  \n*   基表中的数据变化频率如何？\n*   获取最新数据有多关键？\n*   我们需要选择这个数据的频率如何（或者更准确地说，每次刷新前预计有多少次读取）？\n\
  *   有多少不同的查询会使用这个数据？\n\n“频繁”和“许多”的阈值应该是什么？这是主观的，但让我们看一些例子来说明。清单 7-10 定义了一个与清单 7-9\
  \ 中的视图非常相似的物化视图，不同之处在于它选择了昨天起飞的航班。\n\n```sql\nCREATE MATERIALIZED VIEW flight_departure_prev_day\
  \ AS\nSELECT\nbl.flight_id,\ndeparture_airport,\ncoalesce(actual_departure, scheduled_departure)::date\
  \ departure_date,\ncount(DISTINCT passenger_id) AS num_passengers\nFROM booking\
  \ b\nJOIN booking_leg bl USING (booking_id)\nJOIN flight f USING (flight_id)\nJOIN\
  \ passenger p USING (booking_id)\nWHERE (actual_departure BETWEEN CURRENT_DATE -1\n\
  AND  CURRENT_DATE\n)\nOR (\nactual_departure IS NULL\nAND scheduled_departure BETWEEN\
  \ CURRENT_DATE -1\nAND CURRENT_DATE\n)\nGROUP BY 1,2,3\n```\n\n清单 7-10\n用于昨日航班的物化视图\n\
  \n关于昨日起飞航班的信息不会改变，因此可以安全地假设在第二天之前不需要刷新该视图。另一方面，这个物化视图可以在多个不同的查询中使用，如果查询结果被物化，这些查询都会执行得更快。\n\
  \n让我们考虑另一个可能适合物化的候选对象，清单 6-29。假设创建了一个带有子查询的物化视图，如清单 7-11 所示。\n\n```sql\nCREATE MATERIALIZED\
  \ VIEW passenger_passport AS\nSELECT\ncf.passenger_id,\ncoalesce(max (custom_field_value\
  \ )\nFILTER (WHERE custom_field_name ='passport_num' ),'')    AS passport_num,\n\
  coalesce(max (custom_field_value )\nFILTER (WHERE custom_field_name ='passport_exp_date'\
  \ ),'') AS passport_exp_date,\ncoalesce(max (custom_field_value )\nFILTER (WHERE\
  \ custom_field_name ='passport_country' ),'') AS passport_country\nFROM custom_field\
  \ cf\nGROUP BY 1;\n```\n\n清单 7-11\n基于子查询创建物化视图\n\n这个物化视图将会非常有用。首先，已经证明这个查询执行需要很长时间，因此通过预先计算结果可以节省时间。其次，护照信息不会改变（此信息与预订相关联，同一个人在不同的预订中会被分配不同的\
  \ `passenger_id`）。如果不考虑几个潜在问题，它看起来是物化视图的绝佳候选。\n\n首先，乘客在预订时并非必须提交护照信息。这意味着尽管一旦输入，这些信息将保持不变，但对于任何特定航班，护照信息可能会持续输入直到登机口关闭。因此，这个物化视图将需要不断刷新，并且每次刷新大约需要十分钟。\n\
  \n## 物化视图的增长与优化\n\n其次，这个物化视图会不断增长。与之前每天刷新只覆盖前一天数据的例子不同，关于乘客护照的数据会持续累积，刷新物化视图所需的时间也会越来越长。这种情况在项目早期经常被忽视，因为那时表中数据很少，物化视图刷新很快。由于\
  \ PostgreSQL 不支持增量刷新物化视图，一个可能的解决方案是创建另一个与清单 7-11 中物化视图结构相同的表，并在新的护照信息可用时定期追加新行。\n\
  \n然而，如果采用后一种解决方案，如果数据需要以 `passenger_passport` 物化视图指定的格式存在，那么最初为何需要 `custom_field`\
  \ 表就变得不明确了。这将是下一章讨论的主题，将探讨设计对性能的影响。\n\n### 物化视图是否需要优化？\n\n虽然物化视图的查询执行频率低于其本身的使用频率，但我们仍需关注其执行时间。即使物化视图是一个快速的查询（例如，如清单\
  \ 7-9 中只包含前一天的数据），如果没有合适的索引或执行计划不是最优的，它最终也可能对大表进行全表扫描。\n\n如前所述，我们不能接受“因为运行频率低所以不需要优化”这样的借口，无论是一个月一次、一周一次还是一天一次。没有人会对运行六小时的报表感到满意，无论其频率多低。此外，这些周期性报表通常都被安排在同一时间执行——往往是周一早上\
  \ 8 点——以比任何人所需压力更大的方式开启一周。如果物化视图之间存在某些*依赖关系*，这种压力会更加明显。在这种情况下，物化视图需要按特定顺序刷新，增加了最终报告刷新前的总等待时间。\n\
  \n值得一提的是，刷新缓慢的物化视图可能引发的另一个问题。如果在物化视图刷新开始之后开始数据库备份，并在刷新结束之前完成备份，那么该物化视图将以不一致的状态存储在备份中。如果你从这个备份中恢复（例如，在你的开发环境中），你将既不能删除也无法重建它。综上所述，我们相信很明显物化视图应该像任何其他\
  \ SQL 查询一样进行优化。第 5 章和第 6 章讨论的技术可以并且应该应用于物化视图。\n\n### 依赖关系\n\n当视图和物化视图被创建时，一个副作用是产生*依赖关系*。视图和物化视图都有关联的查询，当这些查询中涉及的任何属性被更改时，相关的视图和物化视图就需要被重新创建。\n\
  \n实际上，PostgreSQL 甚至不允许对存在依赖视图和物化视图的表或物化视图执行 `alter` 或 `drop` 操作。进行更改需要在 `ALTER`\
  \ 或 `DROP` 命令中添加 `CASCADE` 关键字。\n\n如果视图和物化视图建立在其他视图之上，更改或删除基础表中的一个列可能会导致重建几十个相关的数据库对象。创建一个视图不需要大量时间，但重建多个相关的物化视图却需要，并且在这段时间内，即使它们允许并发刷新，这些物化视图也将不可用。\n\
  \n后续章节将讨论函数和存储过程，它们可以消除此类依赖关系。\n\n## 分区\n\n到目前为止，本章讨论了将查询分割成更小部分的不同方法。\n\n分区是另一种划分——划分数据。一个分区表由多个分区组成，每个分区被定义为一张表。分区表本身是一个虚拟表，不存储任何行。相反，根据创建分区表时指定的规则，每一行数据被存储在其中一个分区中。\n\
  \n分区支持在 PostgreSQL 中相对较新，从 PG 10 开始，每个版本都有改进，使分区表更易于使用。目前，PostgreSQL 支持以下分区方法：范围分区、列表分区和哈希分区。\n\
  \n最常见的情况是范围分区，这意味着每个分区包含其属性值在分配给该分区的范围内的行。分配给不同分区的范围不能相交，不符合任何分区范围的行无法被插入。\n\n例如，让我们创建\
  \ `boarding_pass` 表的分区版本。命令序列如清单 7-12 所示。\n\n```\n---create table\n\nCREATE TABLE\
  \ boarding_pass_part (\nboarding_pass_id SERIAL,\npassenger_id BIGINT NOT NULL,\n\
  booking_leg_id BIGINT NOT NULL,\nseat TEXT,\nboarding_time TIMESTAMPTZ,\nprecheck\
  \ BOOLEAN,\nupdate_ts TIMESTAMPTZ\n)\nPARTITION BY RANGE (boarding_time);\n--create\
  \ partitions\n--\nCREATE TABLE boarding_pass_may\nPARTITION OF boarding_pass_part\n\
  FOR VALUES\nFROM ('2023-05-01'::timestamptz)\nTO ('2023-06-01'::timestamptz) ;\n\
  --\nCREATE TABLE boarding_pass_june\nPARTITION OF boarding_pass_part\nFOR VALUES\n\
  FROM ('2023-06-01'::timestamptz)\nTO ('2023-07-01'::timestamptz);\n--\nCREATE TABLE\
  \ boarding_pass_july\nPARTITION OF boarding_pass_part\nFOR VALUES\nFROM ('2023-07-01'::timestamptz)\n\
  TO ('2023-08-01'::timestamptz);\n--\nCREATE TABLE boarding_pass_aug\nPARTITION OF\
  \ boarding_pass_part\nFOR VALUES\nFROM ('2023-08-01'::timestamptz)\nTO ('2023-09-01'::timestamptz);\n\
  --\nINSERT INTO boarding_pass_part SELECT * from boarding_pass;\n```\n清单 7-12 创建一个分区表\n\
  \n## 分区能提升性能吗？\n\n人们普遍认为，对大型表进行**分区**可以提高查询性能。但情况并非总是如此。此外，分区常常会降低性能，你可能需要重写旧查询以确保性能不会受到负面影响。\n\
  \n分区能够提升性能的方式在于：如果查询包含对分区键的条件判断，那么搜索就仅限于这些特定分区。这使得分区在那些**全表扫描**往往是最佳选择的长查询中特别有用：分区可以显著减少表扫描所需时间。而对于索引访问而言，这种差异可以忽略不计：分区只是从`B-树`中移除了一个层级。\n\
  \n应如何为表选择分区键？根据`Postgres`优化器的工作方式，需要满足两个条件：1）分区键应在（几乎）所有针对此表运行的查询中使用，或至少在关键查询中使用；2）这些值必须在\
  \ SQL 语句执行前已知。后者意味着该值不能作为参数或子查询的结果传递。\n\n让我们来看一个来自第 6 章的示例，即代码清单 6-21。如果此查询被限制在\
  \ 7 月 15 日至 7 月 31 日的登机时间范围内\n\n```\nSELECT\ncity,\ndate_trunc('month', scheduled_departure),\n\
  sum(passengers)  passengers\nFROM airport  a\nJOIN flight f ON airport_code = departure_airport\n\
  JOIN (\nSELECT\nflight_id,\ncount(*) passengers\nFROM   booking_leg l\nJOIN boarding_pass\
  \ b USING (booking_leg_id)\nWHERE boarding_time > '07-15-23'\nand boarding_time\
  \ <'07-31-23'\nGROUP BY flight_id\n) cnt\nUSING (flight_id)\nGROUP BY 1,2\nORDER\
  \ BY 3 DESC\n```\n\n…这仍然将是一个长查询，会对`boarding_pass`表执行全表扫描。其执行计划与图 6-18 中的相同。\n\n\
  然而，当对分区表`boarding_pass_part`（参见代码清单 7-13）执行类似的查询时，此查询将能够利用分区优势。\n\n```\nSELECT\n\
  city,\ndate_trunc('month', scheduled_departure),\nsum(passengers)  passengers\n\
  FROM airport  a\nJOIN flight f ON airport_code = departure_airport\nJOIN (\nSELECT\n\
  flight_id,\ncount(*) passengers\nFROM   booking_leg l\nJOIN boarding_pass_part b\
  \ USING (booking_leg_id)\nWHERE boarding_time > '07-15-23'\nand boarding_time <'07-31-23'\n\
  GROUP BY flight_id\n) cnt\nUSING (flight_id)\nGROUP BY 1,2\nORDER BY 3 DESC\nListing\
  \ 7-13\n查询分区表\n```\n\n图 7-7 中的执行计划证明，优化器选择仅扫描一个分区，而不是全表扫描，因为查询是基于`boarding_time`进行过滤的。对于非分区表，无论是否按`boarding_time`过滤，其查询运行时间大致相同；而对于分区表，执行时间则快了一倍多，因为所有相关行都位于同一个分区中。\n\
  \n![](img/501585_2_En_7_Fig7_HTML.jpg)\n\n一个查询计划包含 24 行文本。它包括排序键、分组聚合、分组键、哈希连接、哈希条件、对计数结果的子查询扫描、规划的分区、对\
  \ booking、flight 和 airport 表的顺序扫描，以及其他细节。\n\n图 7-7\n使用分区表的执行计划\n\n分区可以拥有自己的索引，这些索引显然比整个分区表上的索引要小。对于短查询而言，这个选项可能是有益的。然而，只有当几乎所有查询都从同一分区提取数据时，这才能显著提高性能。在`B-树`中搜索的成本与其深度成正比。分区上的索引很可能只消除`B-树`的一个层级，而选择所需分区也需要消耗一定的资源。这些资源很可能与处理一个额外索引层级所需的资源相当。当然，查询可以指定分区而不是整个分区表，从而将选择分区的开销隐藏在发出查询的应用程序中。\n\
  \n因此，不应高估分区对短查询的好处。\n\n## 为什么要创建分区表？\n\n读完上一节，读者可能会想，是否有理由去创建分区表。事实上，理由有很多，我们将在本节进行介绍。\n\
  \n可以向分区表添加分区或删除分区。`DROP`命令的执行速度远快于批量`DELETE`操作，并且不需要后续的`VACUUM`。一个典型的用例是表按日期范围分区（例如，每月一个分区），每月末添加一个新分区并删除最旧的分区。\n\
  \n此外，还可以`ATTACH`（附加）和`DETACH`（分离）分区。通过这种方式，你可以将现有表作为分区添加到分区表中，也可以分离分区而不删除数据。例如，你可以将最近三个月的数据保留在分区表中，每月初添加一个新分区，分离出最旧的分区，然后将其附加到归档表中。\n\
  \n分区可用于将大量数据分布到多台数据库服务器上：一个分区可以是外部表（foreign table）。\n\n然而，分区的主要理由在于维护。当表达到 TB 级别时，复制此类表或对其运行`pg_dump`就变得具有挑战性。最重要的是，在该表上运行`autovacuum`也变得困难。我们将介绍`autovacuum`及其对维护健康\
  \ PostgreSQL 数据库的重要性；现在，我们只想提到，`autovacuum`几乎不可能在 1TB 的表上完成。\n\n## 并行处理\n\n从版本 10\
  \ 开始，PostgreSQL 具备支持并行查询执行的能力。两个配置参数`max_parallel_workers`和`max_parallel_workers_per_gather`定义了可用并行进程的数量以及单一会话中可生成的并行进程数量。\n\
  \n我们仍然记得这个功能推出时社区的兴奋之情。的确，并行处理过去乃至现在常常被宣传为解决所有性能问题的“银弹”，我们感到有必要提醒您不要对并行处理抱有过高期望——这在任何关系型数据库管理系统中都是如此，而不仅仅是\
  \ PostgreSQL。\n\n并行执行可以被视为另一种拆分查询的方式：执行查询所需的工作量被分配到多个处理单元（处理器或核心）之间。\n\n任何并行算法都有一部分必须在单个单元上执行。此外，作为并行进程间同步的成本，会产生额外的开销。由于这些原因，并行处理主要在处理批量数据时有益。具体来说，对于大规模扫描和哈希连接，并行执行是有益的。扫描和哈希连接都是长查询的典型操作，其性能提升通常最为显著。\n\
  \n相反，对于短查询的加速效果通常可以忽略不计。不同查询的并行执行可能会提高吞吐量，但这与单个查询的并行执行无关。\n\n有时，优化器可能会用并行表扫描替代基于索引的访问（后者会在顺序执行中使用）。这可能是由成本估算不准确引起的。在这种情况下，并行执行可能比顺序执行更慢。\n\
  \n本书中的所有执行计划都是在关闭并行处理的情况下创建的。\n\n此外，无论并行执行能带来多大的可扩展性优势，都无法修复糟糕的设计或补偿低效代码，原因很简单：并行带来的可扩展性收益最多是线性的，而嵌套循环的成本是二次方的。\n\
  \n\n## 本章小结\n\n本章介绍了将查询拆分为更小功能单元的不同方法，以及每种方法的优缺点。讨论了一种常用优化工具——临时表——的潜在缺陷，并展示了如何使用公用表表达式作为替代方案，从而避免阻碍查询优化器。本章还探讨了视图与物化视图及其对性能的影响。最后，简要介绍了分区与并行执行。\n\
  \n"
- '# 8. 优化数据修改


  至此，我们一直专注于优化 `查询`，这意味着只涵盖了数据检索。我们尚未涉及任何与数据操作相关的内容，即更新、删除或添加记录。这正是本章的主题，将讨论数据操作如何影响性能以及如何提升这些操作的性能。


  ## 什么是 DML？


  任何数据库系统都有两种语言：DDL（数据定义语言），用于创建表和其他数据库对象；以及 DML（数据操作语言），用于查询和修改数据库中的数据。在 PostgreSQL
  中，DDL 和 DML 都是 SQL 的一部分，但某些命令与 DDL 相关（如 `ALTER TABLE`、`CREATE MATERIALIZED VIEW`、`DROP
  INDEX` 等），而另一些则与 DML 相关（`INSERT`、`UPDATE`、`DELETE`）。通常也将这些命令分别称为 DDL 和 DML，因此提及“运行
  DDL”即指执行数据定义命令，而“运行 DML”则指执行 `INSERT`、`UPDATE` 或 `DELETE`。


  ## 优化数据修改的两种途径


  任何 DML 语句的执行都包含两部分：选择要修改的记录和实际的数据修改。对于 `INSERT` 语句，当插入的是常量时，第一部分可能被省略。然而，如果使用的是
  `INSERT-SELECT` 结构，则必须先找到插入所需的记录。


  因此，优化 DML 语句包含两部分：优化选择操作和优化数据修改操作。


  如果问题出在搜索部分，那么应该优化的是该命令的 `SELECT` 部分。这在之前的章节已有详细讨论。本章将专注于第二部分——优化数据写入操作。


  在绝大多数情况下，即便是 OLTP 系统，执行的 DML 语句也远少于 `SELECT` 语句。这是人们很少讨论优化 DML 的主要原因。然而，长时间运行的 DML
  不仅可能因为更新后的数据无法在系统中及时可用而引发问题，还可能因为它会产生 `阻塞锁`，从而减慢其他语句的执行速度。


  ## DML 是如何工作的？


  为了讨论适用于数据修改 SQL 命令的优化方法，我们需要理解它们是如何执行的。


  ### 底层输入/输出


  归根结底，任何 SQL 操作，无论多么复杂，最终都归结为几个底层操作：读取和写入单个数据库块。原因很简单：只有在将数据库块获取到主内存后，才能处理其中包含的数据；并且所有修改首先在主内存中完成，然后再写入磁盘。


  读取和写入的一个根本区别在于：必须在数据被处理之前完成从磁盘的读取；因此，`SELECT` 语句在所需的所有块被获取到内存之前无法完成。相反，块内部的修改是在写入开始之前完成的；因此，SQL
  操作可以在没有任何延迟的情况下完成。无需等待修改后的数据实际写入磁盘。这有点违反直觉：通常人们会认为更新操作比读取需要更多资源。


  当然，写入确实比读取需要多得多的资源：数据库必须修改索引，并在 WAL（预写日志）中记录更新。然而，就单个 DML 语句而言，这些操作都是在主内存中发生的。WAL
  记录是异步强制刷盘的：默认情况下，PostgreSQL 保证它们在提交时被写入。


  这听起来很棒：任何 `INSERT`、`UPDATE` 或 `DELETE` 操作看起来都比 `SELECT` 运行得快得多。既然如此，为什么仍然需要优化呢？


  主要有两个原因：首先，写操作仍然是必需的，因此会消耗一定量的硬件资源，主要是 I/O 带宽。写入的成本与传输页面的成本相关，不一定在任何单个操作上明显可见，但它仍然会减慢处理速度，甚至可能影响
  `SELECT` 语句的性能。后台（例如，修改后的块被写入磁盘）和维护期间会产生额外的工作负载。通常，这种维护执行数据重组，例如 PostgreSQL 中的 `VACUUM`
  操作。一些重组任务会在整个重组操作期间阻止对修改对象的访问。


  其次，修改操作可能会相互干扰，甚至干扰数据检索。只要数据未被修改，处理的顺序就无关紧要。不同的 `SELECT` 语句可以同时访问数据。相反，修改操作不能同时进行，操作顺序至关重要。为了确保正确性，有些操作必须延迟甚至拒绝。正确性是并发控制（也称为事务处理）子系统的职责。事务处理不是本书的重点；然而，讨论修改操作无法避免一些与
  DBMS 事务行为相关的考量。




  ### 并发控制的影响


  为确保操作顺序的正确性，事务调度器通常依赖于加锁机制。如果一个事务需要获取锁，而另一个事务已持有冲突的锁，其执行就会被延迟，直到冲突的锁被释放。这被称为锁等待。锁等待是导致修改操作延迟的主要原因。


  并发控制的另一个功能是确保更新不丢失。已提交事务执行的任何更新都必须在提交前可靠地存储在硬盘上。实现此机制的工具是预写式日志（`WAL`）。在事务能够提交之前，所有数据修改都必须在硬盘上被记录到
  `WAL` 记录中。`WAL` 是顺序写入的，在速度较慢的机械硬盘上，顺序读写比随机读写快两个数量级。这种差异在 SSD 上可以忽略不计。虽然无需等待所有更改从缓存写入数据库，但提交仍然必须等待
  `WAL` 刷新到磁盘。因此，过于频繁地提交会显著减慢处理速度。一个极端情况是将每条 `DML` 语句都放在单独的事务中执行。如果应用程序不使用事务控制语句，从而导致数据库将每条语句自动包装成一个单独的事务，这种情况就真的会发生。另一方面，过长的事务可能因锁机制而导致系统缓慢。


  上述考虑适用于任何高性能数据库。现在，让我们看看 PostgreSQL 特有的技术。


  PostgreSQL 的一个显著特点是 `MVCC`：多版本并发控制。PostgreSQL 从不执行“就地更新”，也就是说，它从不“更新”一条记录。取而代之的是，创建一个数据项（例如表中的一行）的新版本，并将其存储在同一数据块或一个新分配的数据块的空闲空间中，而先前的版本仍然可以访问。


  图 8-1 展示了图 3-1 中的数据块在删除（或更新）第二行后的结构。该行先前占用的空间不能被用于另一行；实际上，该数据仍然可访问。


  ![](img/501585_2_En_8_Fig1_HTML.jpg)


  一个区块图从上到下依次展示了区块头、指向逻辑项的指针、空闲空间、表行、死亡行和区块尾部的各层结构。


  图 8-1


  删除一行后的区块布局


  此特性对性能可能既有积极也有消极的影响。


  过期的版本不会被永久保留。当旧版本不再需要用于当前运行的事务时，`VACUUM` 操作会移除它们并合并区块中的空闲空间。


  PostgreSQL 使用快照隔离（`SI`）并发控制协议来防止事务之间发生不良干扰。请注意，数据库教科书通常解释的是在两阶段锁并发控制协议中使用的锁机制，这与
  PostgreSQL 中锁的使用方式显著不同。从教科书或其他系统经验中获得的任何直觉都可能产生误导。


  在 `SI` 下，事务总是读取一行的最新已提交版本。如果另一个事务在该行已更新但在读取操作开始前尚未提交，读取操作将返回一个过时的版本。这是一个优点，因为旧版本是可用的，且读取它无需加锁。也就是说，多版本并发控制提高了吞吐量，因为无需延迟读取操作。


  根据 `SI` 规则，不允许对相同数据进行并发写入：如果两个并发（即同时运行的事务）尝试修改相同数据，则必须中止其中一个事务。通常，有两种策略来强制执行此规则。一种称为首次更新胜出，另一种称为首次提交胜出。强制执行第一种策略更容易：我们知道更新是立即执行的，第二个事务可以被立即中止而无需任何等待。然而，PostgreSQL
  使用的是第二种策略。


  为了强制执行此规则，PostgreSQL 对任何修改操作都使用写锁。在事务能够更改任何数据之前，它必须先获取一个更新锁。如果因为其他事务正在修改相同数据而无法获得锁，该操作将被延迟，直到持有冲突锁的事务终止。如果持有锁的事务因中止而释放了锁，则该锁将授予等待的事务，数据修改操作即可完成。否则，如果该事务成功提交，后续行为则取决于事务隔离级别。对于
  `READ COMMITTED`（PostgreSQL 中的默认级别），等待的事务将读取已修改的数据，获取写锁，并完成修改。这种行为是可能的，因为在此隔离级别上，读取操作可以读取在
  `SELECT` 语句开始前提交的版本，而非在事务开始前提交的版本。如果隔离级别是 `REPEATABLE READ`，则等待的事务将被中止。这种实现方式导致了等待，但避免了不必要的中止。


  我们不讨论 `SERIALIZABLE` 级别，因为它极少被使用。


  现在，让我们看一些重要的特殊情况。


  ## 数据修改与索引


  在第 5 章讨论创建新索引时，我们提到向表添加索引可能会减慢 `DML` 操作的速度。具体变慢多少取决于存储和系统特性（如磁盘速度、处理器和内存），但根据多位
  PostgreSQL 专家的观察，增加一个额外索引只会使 `INSERT/UPDATE` 时间增加 1%。


  你可以使用 `postgres_air` 模式进行一些实验。例如，从一个拥有许多索引的表开始，比如 `flight` 表。


  首先，创建一个没有索引的 `flight` 表的副本：


  ```

  CREATE TABLE flight_no_index AS

  SELECT * FROM flight LIMIT 0;

  ```


  然后，将 `flight` 表中的行插入到 `flight_no_index` 表中：


  ```

  INSERT INTO flight_no_index

  SELECT * FROM flight LIMIT 100

  ```


  记录执行时间。接着，清空（truncate）新表，并开始为 `flight_no_index` 表构建第 5 章中为 `flight` 表创建的所有相同索引。重复插入操作。对于少量行（大约几百行），执行时间没有差异，但在插入
  100,000 行时，可以观察到一些缓慢。然而，对于在 `OLTP` 环境中执行的典型操作而言，不会有实质性的差异。


  自然地，创建索引需要时间，值得一提的是，PostgreSQL 中的 `CREATE INDEX` 操作会锁定表，禁止所有 `DML` 操作（但仍允许读取）。`CREATE
  INDEX CONCURRENTLY` 操作需要更长的完成时间，但允许执行 `DML`。


  正如我们前面提到的，PostgreSQL 插入更新行的新版本。这对性能有一些负面影响：通常，新版本会被插入到不同的位置，因此表上的所有索引都必须进行修改。为了减少这种负面影响，PostgreSQL
  使用了一种有时被称为 `HOT`（仅堆元组）的技术；它会尝试将新版本插入到同一个数据块中。如果该数据块有足够的空闲空间，并且更新不涉及修改任何索引列，则无需修改任何索引。实际上，情况稍微复杂一些，但我们在此不深入探讨内部细节。




  ## 数据操作语言与清理


  如前所述，PostgreSQL 不会立即移除行的旧版本。`DELETE` 语句将删除的行标记为已移除，而 `UPDATE` 会插入行的新版本，并将之前的版本标记为过时。一旦这些行不再需要用于活动事务，它们就变成了“死行”。随着死行数量增长，这实际上会减少数据块中的活动行数，从而减慢后续的堆扫描速度。


  死行（即已删除的元组）所占用的空间将保持未使用状态，直到被 `VACUUM` 操作回收。这种情况称为表膨胀。大多数情况下，即使更新率相对较高，由 autovacuum
  后台进程发起的常规清理也能及时处理死元组，因此不会导致任何明显的延迟。


  关于调整 `AUTOVACUUM` 系统参数的建议可以在 PostgreSQL 文档和许多咨询公司的网站上找到。在选择这些参数的最佳值时，需要在减少 I/O 峰值、确保清理能够相对快速完成以及完成任务（即控制住膨胀）之间找到恰当的平衡。


  ### 批量 UPDATE/DELETE


  如果执行批量 `UPDATE/DELETE` 会怎样？即影响表中很大一部分数据的操作。如果您运行这类工作负载，可能会注意到从受影响表中进行的 `SELECT`
  操作显著变慢。可见性映射图强制重新检查需要访问堆数据块；此外，页面上的活动元组数量减少。这将导致每次选择操作需要读取更多数据块到内存中。


  虽然在一个非常繁忙的系统上调整 autovacuum 有多种方法，但如果更新/删除的级别过高，即使 autovacuum 参数调整得非常完美，也可能无法减少表和索引的膨胀。您可能需要评估整个系统架构，看看数据修改量是否合理。这包括检查应用程序是否对同一组记录执行了多次连续更新，或者将表分区并用
  `DROP`/`DETACH` 分区以及随后的 `CREATE`/`ATTACH` 分区来替代批量更新是否有意义。


  ### 频繁更新


  现在，让我们考虑另一种情况：一个表经历频繁的更新（尽管每次更新只影响单行或极少数行）。


  根据这些更新的性质，有时可以通过设置表的 `fillfactor` 来减少索引更新的开销和表膨胀。此存储参数设置了表块中空闲空间的百分比，可以在 `CREATE
  TABLE` 语句的 `WITH` 子句中定义。默认情况下，此参数的值为 100，告诉 PostgreSQL 尽可能多地容纳行，并最小化每个块中的空闲空间大小。因此，通常只有在更新或删除后进行清理时才会出现空闲空间。


  然而，如果表行的尺寸足够小，一个块中可以存储多条记录，并且更新不影响索引属性，我们可以指定较小的 `fillfactor` 值。PostgreSQL 允许的最低值为
  10，为行的更新版本留出 90% 的块空间。当然，`fillfactor` 参数值小会导致存储表数据所需的块数量增加，从而增加表堆扫描所需的读取次数。这显著减慢了长查询的速度，但对于短查询，尤其是当仅从块中选择一行时，影响可能不那么明显。将
  `fillfactor` 设置为低于 100% 会增加本节前面描述的 HOT 更新的可能性。


  ## 引用完整性与触发器


  表中存在多个外键可能会减慢数据操作语言的速度。这并不是说引用完整性检查不好。相反，维护引用关系的能力是关系系统最强大的特性之一。它们可能减慢数据操作的原因是，对于在具有完整性约束的表上执行的每次
  `INSERT`/`UPDATE` 操作，数据库引擎必须检查受约束列的新值是否存在于相应的父表中，从而执行额外的隐式 `SELECT` 语句。如果父表是一个很小的查找表，只包含少量行，这些检查可能几乎不花费时间。然而，如果父表的大小与子表的大小相当，开销可能会更明显。与大多数其他情况一样，实际的延迟时间取决于系统参数和硬件特性。


  可以通过创建 `flight` 表的副本来比较有约束和无约束情况下的执行时间：


  ```sql

  CREATE TABLE flight_no_constr AS

  SELECT * FROM flight LIMIT 0;

  ```


  然后，再次向 `flight_no_constr` 表添加与 `flight` 表相同的约束，并再次尝试执行插入。您可能会注意到，在 `aircraft_code`
  属性上添加完整性检查不会影响插入时间，但在 `departure_airport` 和 `arrival_airport` 上添加约束会明显减慢插入速度。


  请注意，父表上的操作也会受到影响：当更新或删除父表中的记录时，数据库引擎必须检查每个子表中是否存在引用了被更新或删除值的记录。


  触发器也可能减慢数据修改操作，原因与引用完整性约束相同：每次触发器调用都可能导致执行多个额外的 SQL 命令。每个触发器减慢执行的程度取决于其复杂性。


  值得注意的是，PostgreSQL 中的引用完整性约束是使用系统触发器实现的，因此所有关于完整性约束的观察也适用于触发器。然而，触发器的潜在性能影响并不意味着不应该使用触发器。相反，如果有一些操作或检查需要对表上的任何数据操作语言操作执行，使用数据库触发器来实现它们比在应用程序中编程这些检查更有益。后一种方法效率较低，并且无法覆盖直接在数据库中修改表数据而不通过应用程序访问的情况。


  ## 总结


  在本章中，我们简要讨论了数据操作操作对系统性能的影响。通常，数据操作语言命令的执行频率至少比 `SELECT` 语句低一个数量级。然而，如果数据修改的低效问题得不到及时解决，它们可能会导致阻塞锁并影响整个应用程序的性能。


  '
- '# 9. 设计至关重要


  在引言中，我们提到优化始于需求收集和设计阶段。准确地说，它始于系统设计，包括数据库设计，但除非我们投入时间收集有关数据库中应包含对象的信息，否则无法得出正确的设计。在本章中，我们将讨论各种设计选项，并展示设计决策如何影响性能。




  ## 设计的重要性


  第 1 章解释了存储电话号码信息的两种不同方案，如图 1-1 和 1-2 所示。让我们回到这个例子。


  清单 9-1 展示了`postgres_air`模式中使用的表定义。`account`表包含用户账户信息，`phone`表包含与账户关联的所有电话号码信息。这种关系通过外键约束来支持。


  清单 9-2 展示了一种替代设计，其中所有电话与账户信息存储在一起。


  ```sql

  /* account table */

  CREATE TABLE account(

  account_id integer,

  login text,

  first_name text,

  last_name text,

  frequent_flyer_id integer,

  home_phone text,

  work_phone text,

  cell_phone text,

  primary_phone text,

  update_ts timestamp with time zone,

  CONSTRAINT account_pkey PRIMARY KEY (account_id),

  CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

  REFERENCES frequent_flyer (frequent_flyer_id)

  );

  ```

  清单 9-2

  单表设计


  ```sql

  /* account table */

  CREATE TABLE account(

  account_id integer,

  login text,

  first_name text,

  last_name text,

  frequent_flyer_id integer,

  update_ts timestamp with time zone,

  CONSTRAINT account_pkey PRIMARY KEY (account_id),

  CONSTRAINT frequent_flyer_id_fk FOREIGN KEY (frequent_flyer_id)

  REFERENCES frequent_flyer (frequent_flyer_id)

  );

  /*phone table */

  CREATE TABLE phone(

  phone_id integer,

  account_id integer,

  phone text,

  phone_type text,

  primary_phone boolean,

  update_ts timestamp with time zone,

  CONSTRAINT phone_pkey PRIMARY KEY (phone_id),

  CONSTRAINT phone_account_id_fk FOREIGN KEY (account_id)

  REFERENCES account (account_id)

  );

  ```

  清单 9-1

  两表设计


  `postgres_air`模式选择两表设计有多重原因；正如第 1 章所讨论的，许多人没有家庭固定电话或专用工作电话。许多人拥有不止一部手机或一个虚拟号码，比如
  Google Voice。所有这些场景都可以通过两表解决方案得到支持，而无法适应单表解决方案，除非我们开始增加列来适应每种情况。在单表解决方案中标明主电话需要将其中一个号码重复填入`primary_phone`列，这为不一致创造了空间。从性能角度来看，两表解决方案也更有益。


  在两表解决方案中，通过电话号码搜索账户是一个直接的`SELECT`语句：


  ```sql

  SELECT

  DISTINCT account_id

  FROM phone

  WHERE phone=''8471234567''

  ```


  该查询将使用索引仅扫描执行。


  在单表设计中，类似的查询如下：


  ```sql

  SELECT

  account_id

  FROM account

  WHERE home_phone= ''8471234567''

  OR work_phone= ''8471234567''

  OR cell_phone= ''8471234567''

  ```


  为了避免全表扫描，必须建立三个不同的索引。


  这是否意味着单表设计比两表设计差？这取决于数据的访问方式。如果该模式支持的是旅行社使用的系统，最可能的用例是需要根据电话号码提取客户账户。当客服人员询问客户电话号码时，客户不太可能指明电话的类型。


  另一方面，考虑一份关于过去 24 小时内更新过的客户账户报告。这份报告应包含家庭电话、工作电话和手机，即使某些为空也应分别列在独立的列中，并且应包含过去 24
  小时内有过任何修改（包括电话号码更新）的账户。在这种情况下，如清单 9-3 所示的单表解决方案要简单和高效得多。


  ```sql

  SELECT *

  FROM account

  WHERE update_ts BETWEEN now()- interval ''1 day'' AND now();

  ```

  清单 9-3

  单表设计的使用


  在两表设计中产生相同的结果则更为复杂——参见清单 9-4。


  ```sql

  SELECT

  a.account_id,

  login,

  first_name,

  last_name,

  frequent_flyer_id,

  home_phone,

  work_phone,

  cell_phone,

  primary_phone

  FROM account a

  JOIN (

  SELECT

  account_id,

  max(phone) FILTER (WHERE phone_type=''home'')

  AS home_phone,

  max(phone) FILTER (WHERE phone_type=''work'')

  AS work_phone,

  max(phone) FILTER (WHERE phone_type=''mobile'')

  AS cell_phone,

  max(phone) FILTER (WHERE primary_phone IS true)

  AS primary_phone

  FROM phone

  WHERE account_id IN (

  SELECT

  account_id

  FROM phone

  WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

  UNION

  SELECT

  account_id

  FROM account

  WHERE update_ts BETWEEN now()- interval ''1 day'' AND now()

  )

  GROUP BY 1)  p

  USING (account_id);

  ```

  清单 9-4

  使用两表设计的相同查询


  这两个例子具有启发性的另一个原因是——两表解决方案更优的查询更可能出现在 OLTP 系统中，而单表解决方案表现更好的查询更可能出现在 OLAP 系统中。ETL
  工具可用于将数据从 OLTP 系统转换为更适合商业智能需求的格式。


  第 6 章展示了一个类似的情况，其中非最优的数据库设计导致了非最优的查询（见清单 6-26）。即使优化后的查询仍然相对较慢。这些例子说明了数据库设计对性能的影响，有时糟糕设计的负面后果无法通过改进查询或建立额外索引来补救。


  本章后续部分将讨论可能对性能产生负面影响的最常见设计选择。


  ## 为何使用关系模型？


  虽然之前的所有例子都是关系型的（因为 PostgreSQL 构建在关系模型之上），但我们知道许多人认为关系数据库已经过时或不流行了。像“关系数据库之后是什么？”这样的公开演讲会定期举行。


  本节并非为关系数据库辩护。关系数据库无需辩护，而且到目前为止，还没有任何潜在的继任者获得接近可比水平的采用率。相反，目标是解释其他模型的局限性。


  ### 数据库的类型


  那么，除了关系模型之外还存在哪些替代方案呢？目前使用的数据库系统和数据存储种类繁多，采用了各种各样的数据模型和存储技术。这些系统包括传统的基于行或基于列存储的关系系统、可扩展的分布式系统、流处理系统等等。


  我们已经看到不止一个非关系型数据库系统经历了 Gartner 炒作周期，从过高期望的顶峰跌入幻灭的低谷。然而，值得注意的是，关系模型的核心是基于布尔逻辑的查询语言，而不是任何特定的数据存储方式。这可能是许多作为传统
  RDBMS 替代品而创建的系统最终采用 SQL 变体作为高级查询语言，从而也采用了相关布尔逻辑的原因。


  虽然关系数据库似乎远未被取代，但在新系统中开发和验证的技术已被证明有用并被广泛采用。三种流行的方法是实体-属性-值模型、键值存储和分层系统（后者通常被称为文档存储）。




  ### 实体-属性-值模型


  在实体-属性-值（EAV）模型中，值是标量（通常是文本，以适应多种数据类型）。回顾第 6 章，该模型的特点是一个包含三列的表：第一列是实体的标识符，第二列是该实体属性的标识符，第三列是该实体对应属性的值。这种设计以“灵活性”为名，实际上意味着需求不精确或不明确。不出所料，这种灵活性是以性能为代价的。第
  6 章介绍了 `custom_field` 表，指出这种设计并非最优，并展示了它如何对性能产生负面影响。即使应用了优化技术以避免多次表扫描，执行速度也相对较慢。


  除了性能影响，这种设计还限制了数据质量管理。在第 6 章介绍的案例中，三个自定义字段包含三种不同类型的数据：`passport_num` 是数字，`passport_exp_date`
  是日期，`passport_country` 是文本字段（应包含有效的国家名称）。然而，在 `custom_field` 表中，它们都存储在文本字段 `custom_field_value`
  中，这不允许进行强类型检查或参照完整性约束。


  ### 键值模型


  键值模型将复杂对象存储在单个字段中，因此结构不对数据库暴露。这样，提取对象的单个属性就变得非常复杂，实际上严重限制了数据库引擎执行超出通过主键返回单个对象之外的任务。在最极端的情况下，一种设计可能将除主键之外的所有字段打包到一个
  JSON 对象中。


  自从 PostgreSQL 在 9.2 版本中引入 JSON 支持以来，这种方法在数据库和应用程序开发人员中变得非常流行。JSONB 在 9.4 版本中被引入，并且在之后的每个版本中都有更多的增强功能。有了这种支持，定义为
  JSON 的表列变得很常见。例如，来自 `postgres_air` 模式的 `passenger` 表可以按清单 9-5 所示的方式定义。


  ```sql

  CREATE TABLE passenger_json (

  passenger_id INT,

  passenger_info JSON);

  ```

  清单 9-5

  包含 JSON 的表


  清单 9-6 展示了 `passenger_info` JSON 的一个例子。


  ```json

  {"booking_ref" : "8HNB12",

  "passenger_no": "1",

  "first_name" : "MARIAM",

  "last_name" : "WARREN",

  "update_ts" : "2023-04-17T19:45:55.022782-05:00",

  }

  ```

  清单 9-6

  JSON 值示例


  是的，建议的设计看起来是通用的，无论未来添加多少新数据元素，都不需要任何 DDL 更改。然而，同样的问题影响着这种设计，就像影响 EAV 模型一样。这种方法使得对标量值执行类型检查变得不可能，也无法定义参照完整性约束。此外，经常被忽视的是存储
  JSON 所需的数据量大幅增加。确实，键名在每个记录中都是重复的。根据存储的值的类型和大小，数据量可能会增加好几倍。


  本章稍后将讨论用于处理 JSON 字段的工具和方法。


  ### 层次模型


  层次结构易于理解和使用。事实上，由于其易用性和相对较小的内存需求，层次结构在 20 世纪 60 年代首次在数据库中实现。当然，在那个时候，XML 和 JSON
  都还不可用。只要所有内容都适合单一层次结构，这些结构就工作得很好。然而，一旦数据适合多个层次结构，使用层次结构就变得既复杂又低效。


  让我们用 `postgres_air` 模式中的例子来说明，如图 9-1 所示。对于一个机场，离港航班列表是一个层次结构，而到港航班列表是另一个层次结构。登机牌可能与离港航班属于同一个层次结构。同时，它们也可能是完全不同的、从预订开始的层次结构的一部分。请注意，乘客和预订航段不适合在不重复的情况下放入同一个层次结构。


  ![](img/501585_2_En_9_Fig1_HTML.jpg)


  一个展示 3 个层次结构的框图。左侧：解释乘客预订航班，航班从机场离港。中间：解释航班到达机场。右侧：表示从预订开始的航班和乘客的层次结构。


  图 9-1

  postgres_air 模式中的层次结构示例


  早期的层次数据库（如 IMS/360）向客户端应用程序提供了数据的多个层次视图，但在内部支持更复杂的数据结构。


  ### 融合各家所长


  PostgreSQL 不仅仅是一个关系系统。它是对象关系型的，这意味着列数据类型不一定是标量。实际上，列可以存储结构化类型，包括数组、复合类型或表示为 JSON
  或 XML 文档的对象。


  负责任地使用这些功能，可以结合多种替代方法与更传统的关系功能，提供所有潜在的好处。


  “负责任地”是这里的关键词。例如，PostgreSQL 允许前面部分提到的多层次结构方法。我们可以在数据库内部的关系结构之上为客户端应用程序构建层次结构表示。这种方法结合了两个世界的优点：数据可以通过关系查询的能力高效提取，而应用程序可以以友好的数据交换格式使用复杂对象。更多关于这种方法的细节在第
  14 章中提供。


  尽管本书不涵盖分布式系统，但值得一提的是，PostgreSQL 拥有一套庞大的扩展（不包含在基本发行版中的附加库），这些扩展支持分布式查询，包括查询除 PostgreSQL
  之外的其他 DBMS。这些扩展被称为 `foreign data wrappers (FDWs)`，它们提供了几乎透明的方式来访问驻留在超过 60 种类型的 DBMS（包括关系型和非关系型）中的数据。




  ## 灵活性与效率和正确性之间的权衡


  支持灵活设计的一个常见论点是“数据结构/模式定义可能会发生变化”。接着，论点认为添加一列是 DDL（数据定义）变更，而添加一行（在键值模型中）只是添加一行数据。


  诚然，现实系统是演进的，为了充分反映这些变化，必须修改现有的数据结构。这可能涉及添加或删除某些属性、更改数据类型或更改关系的基数。然而，进行变更的必然性并不意味着必须使用替代模型，例如文档存储或键值系统。对数据库模式进行变更的成本，必须始终与这些灵活解决方案可能带来的性能和数据完整性缺陷进行权衡。


  前一节提到了在非关系设计中创建任何完整性约束的困难。出于某种原因，人们普遍认为 NoSQL 数据库比关系数据库“更快”。这种说法在极少数情况下可能是真的，但在大多数情况下，情况恰恰相反。水平分布可能会带来性能提升，但这些提升会被需要采取额外步骤来验证数据完整性所带来的成本所抵消。由于在
  EAV 和键值模型中创建索引的困难，还会出现其他潜在的性能问题。


  例如，在 `custom_field` 表的情况下，`passport_exp_date` 应该是一个日期，并且经常需要与其他日期进行比较，例如与航班日期进行比较，以确保护照不会在出发日期之前过期。然而，这个日期存储在一个文本字段中，这意味着必须将其转换为日期类型才能执行类型特定的比较。此外，这种转换只能应用于包含日期类型值的行。


  PostgreSQL 支持部分索引，因此可以仅为包含护照到期日期的行创建索引。然而，它们无法被索引为一种可以高效用作搜索条件的日期类型，因为无法使用像下面这样的易变函数来构建索引：


  ```

  CREATE INDEX custom_field_exp_date_to_date

  ON custom_field(to_date(custom_field_value, ''MM-DD-YYYY''))

  WHERE custom_field_name=''passport_exp_date''

  ```


  这是因为所有日期/时间转换函数都是 `易变` 的，因为它们依赖于当前的会话设置。为了能够在索引中使用转换函数，需要编写一个自定义的转换函数。第 11 章将介绍如何创建用户定义函数。这个函数必须包含异常处理，这意味着格式错误的值将不会被索引。此外，与一开始就拥有一个
  `date` 字段相比，搜索本身也会显著变慢。


  那么，将所有属性打包到一个 JSON 列中的情况呢？会出现类似的索引问题。可以为 JSON 创建索引；例如，对于清单 9-5 中的 `passenger_json`
  表，可以像清单 9-7 所示那样在 `booking_ref` 上创建索引。


  ```

  CREATE INDEX passenger_j_booking_ref

  ON passenger_json ((passenger_info ->> ''booking_ref''));

  清单 9-7

  为 JSON 列创建索引

  ```


  它的速度会比在原始 `passenger` 表上创建索引慢，但会比顺序扫描效果好。然而，对于任何旨在是数字类型或包含日期的值，将遵循与前面示例相同的转换。


  这并不是说这些非关系解决方案完全没有存在理由。


  例如，一个描述欧盟某些法规的表大约有 500 列，并且每次法规变更时只添加一行，大约每五年添加一行。将该表替换为键值的一种变体（辅以几个描述值的附加列），使得数据库和应用开发人员都感到满意。由于数据规模的原因，不存在效率问题。


  在考虑 JSON 列时，我们建议仅在数据只需要作为一个整体对象使用时才使用它们，例如存储外部文档（例如，外部来源的信用报告）。即使在这些情况下，如果某些将用于搜索条件的属性可以被分离出来，建议也将它们解析为额外的、独立的列进行存储，同时将其作为较大对象的组成部分存储。



  ## 我们必须进行规范化吗？


  在关系理论中，几乎没有比“规范化”更被滥用的术语了。许多数据库管理员、数据库开发人员、系统架构师等人都宣称一个系统应该被“规范化”，但很少有人能描述出他们期望达成的结果，更不用说给出规范化的定义了。


  这不只是自命不凡；并非所有从事数据管理工作的人都需要记住每种范式的定义。关系规范化算法在实践中并不常用。从这个意义上说，规范化是“已死”的理论，就像拉丁语是一种“已死”的语言。然而，学者们仍然发现学习拉丁语是有用的，同样，一些规范化知识对于良好的数据库设计至关重要。


  非正式地说，如果一个数据库模式中所有列值仅依赖于表的主键，并且数据被分解到多个表中以避免重复，那么这个模式就是规范化的。


  创建规范化模式的方法之一是从构建实体关系模型开始：如果实体被正确定义，从实体关系模型生成的数据库模式将是规范化的。可以说，实体关系设计隐含地包含了依赖关系的发现。如果模式没有规范化，通常表明缺失了一些实体。


  对数据库模式进行规范化真的很重要吗？它有助于提升性能吗？通常情况，这要视情况而定。


  规范化的首要目的*并非*提升性能。规范化创建了一个清晰的逻辑结构，并有助于确保数据完整性，尤其是在有参照完整性约束支持的情况下。规范化之所以必要，原因与关系模型的必要性相同：不一定是为了存储数据，而是为了确保数据完整性，并能够使用关系查询语言。逻辑结构与存储结构之间的映射不一定是一一对应的。理想情况下，应该为应用程序提供一个基于为性能优化的存储结构的清晰逻辑结构。


  另一方面，现实世界中存在许多非规范化的实体，规范化并不能带来任何好处。最著名的例子是邮政地址。美国邮政地址由以下部分组成：街道地址、城市、邮政编码和州。


  正如任何曾在自动化美国邮政局自助服务台寄送包裹的人所知，地址并没有被规范化。自动检查不允许您输入与先前输入的地址不匹配的邮政编码。然而，我们怀疑当地址存储在数据库表中时，是否有人会决定对它们进行规范化。


  一个经常听到的支持非规范化数据结构的论点是“连接需要时间”，并且如果需要查询执行得更快，就需要进行反规范化。正如第 5 章所讨论的，如果构造得当，简短的查询用于连接的额外时间可以忽略不计，这不应该为了数据准确性而进行权衡。


  然而，在某些情况下，规范化确实可以提升性能，例如，当我们需要选择具有高选择性的某个属性的不同值，或者一般来说，选择在非规范化表中重复出现的任何列子集时。在 `postgres_air`
  模式中，`flight` 表中的航班 `status` 是显式指定的，这意味着要查找可能的航班状态列表，可以执行以下查询：


  ```sql

  SELECT DISTINCT status

  FROM flight

  ```


  ## 代理键的使用与误用


  代理键是由系统生成的唯一值，用于标识存储在数据库中的对象。在 PostgreSQL 中，代理值可以通过从序列中选择获取。当插入一行时，使用伪类型 `serial`
  指定的列会自动接收与该表关联序列的下一个值。


  代理键被广泛使用。一些公司有内部标准，要求每个表都使用代理键。然而，代理键既有优点也有缺点。


  代理键的优点是保证了分配给不同对象的值是唯一的。但是，代理键的值与对象的其他属性无关，当需要将存储的对象与现实世界的对象进行匹配时，它是无用的。


  代理键的唯一性可能掩盖某些错误。一个现实世界的对象可能在数据库中以不同的代理键表示多次。例如，如果一次购买在系统中被注册了两次，客户的卡将为单个产品被扣费两次，并且没有人工干预很难解决该问题。话虽如此，虽然我们的建议是使用某个现实世界中唯一的属性作为主键，但这并不总是可行的。在存储超市所有购买的数据库中，无法区分同一客户在自助结账时随后扫描的两瓶可乐。源系统必须能够区分这两种情况：一次交易中购买两瓶可乐，与复制同一交易以购买一瓶可乐。同样，医院系统可能将一个患者与多个病历号关联；在这种情况下拥有一个代理键至关重要，以便将患者的所有临床数据存储在一起。


  有时，表中存在代理键被错误地与规范化联系起来。使用代理键的要求通常被解释为使数据库模式规范化的一种方式。而且，确实，如果为每一行分配一个唯一标识符，一切都将是规范化的。但是，由于唯一标识符与现实世界的对象没有关联，结果可能是一个现实世界的对象映射到数据库中的多个条目。例如，我们曾见过一个系统，每当客户输入他们的地址时，如果该城市尚不在数据库中，系统就会为该城市分配一个唯一标识符。结果，系统最终有了六个不同版本的“芝加哥”。不用说，这与规范化无关，并且可能危及数据准确性和性能。


  使用代理键也可能导致额外的连接。`flight` 表使用在现实世界中广泛使用的三字符代码引用 `airport` 表。在这个设计中，可以从航班表中提取机场代码：


  ```sql

  SELECT

  departure_airport,

  arrival_airport,

  scheduled_departure

  FROM flight;

  ```


  但是，如果机场表使用了代理键，返回机场代码将需要两次访问机场表：


  ```sql

  SELECT

  d.airport_code,

  a.airport_code,

  f.scheduled_departure

  FROM flight f

  JOIN airport d ON d.airport_id = f.departure_airport_id

  JOIN airport a ON a.airport_id = f.arrival_airport_id

  ```


  让我们更仔细地看看 `postgres_air` 模式中代理键的使用。


  `postgres_air` 模式中 `airport` 表的定义如代码清单 9-8 所示。该表的主键是 `airport_code`。此列包含三字符代码，这些代码在全球所有航班预订系统中用于标识机场，并且这些代码永远不会改变。因此，它们作为唯一标识符是可靠的，不需要代理键。



  ### airport (机场)


  ```sql

  CREATE TABLE airport(

  airport_code char(3)NOT NULL,

  airport_name text NOT NULL,

  city text COLLATE NOT NULL,

  airport_tz text NOT NULL,

  continent text,

  iso_country text,

  iso_region text,

  intnl boolean NOT NULL,

  update_ts timestamptz,

  CONSTRAINT airport_pkey PRIMARY KEY (airport_code)

  );

  ```

  代码清单 9-8

  airport 表


  同样，`aircraft`（航空器）由三位字符代码标识，我们使用这些代码作为 `aircraft` 表的主键——参见代码清单 9-9。


  ### aircraft (航空器)


  ```sql

  CREATE TABLE aircraft (

  model text,

  range numeric NOT NULL,

  class integer NOT NULL,

  velocity numeric NOT NULL,

  code text NOT NULL,

  CONSTRAINT aircraft_pkey PRIMARY KEY (code)

  );

  ```

  代码清单 9-9

  aircraft 表


  对于 `booking`（预订）表（参见代码清单 9-10），我们使用了代理主键 `booking_id`，尽管预订有一个六字符的 `booking_ref`
  可以唯一标识预订且永不改变。`booking_ref` 也是一个代理键，尽管它并非源自数据库序列。我们本可以使用 `booking_ref` 作为主键。因此，`booking_id`
  列是冗余的，但如果预期未来需要从多个预订应用程序接收预订数据，它提供了一些面向未来的保障。这也使得该表的定义与许多工业系统中的定义相似。


  ### booking (预订)


  ```sql

  CREATE TABLE booking (

  booking_id bigint NOT NULL,

  booking_ref text NOT NULL,

  booking_name text,

  account_id integer,

  email text NOT NULL,

  phone text NOT NULL,

  update_ts timestamptz,

  price numeric(7,2),

  CONSTRAINT booking_pkey PRIMARY KEY (booking_id),

  CONSTRAINT booking_booking_ref_key UNIQUE (booking_ref),

  CONSTRAINT booking_account_id_fk FOREIGN KEY (account_id)

  REFERENCES account (account_id)

  );

  ```

  代码清单 9-10

  `booking` 表


  `booking_leg`（预订航段）表（代码清单 9-11）将预订与航班关联起来。因此，该表的一个自然键应由 `flight_id` 和 `booking_id`
  组成，即引用 `flight` 和 `booking` 表的两个外键。这对列本可以成为一个极好的主键。选择创建额外的代理键 `booking_leg_id` 是为了避免从依赖表（`booking_pass`
  表，它是数据库中最大的表）引用复合键。


  ### booking_leg (预订航段)


  ```sql

  CREATE TABLE booking_leg (

  booking_leg_id SERIAL,

  booking_id integer NOT NULL,

  booking_ref text NOT NULL,

  flight_id integer NOT NULL,

  leg_num integer,

  is_returning boolean,

  update_ts timestamp with time zone,

  CONSTRAINT booking_leg_pkey PRIMARY KEY (booking_leg_id),

  CONSTRAINT booking_id_fk FOREIGN KEY (booking_id)

  REFERENCES booking (booking_id),

  CONSTRAINT flight_id_fk FOREIGN KEY (flight_id)

  REFERENCES flight (flight_id)

  );

  ```

  代码清单 9-11

