  \ JOIN S` 和 `R JOIN T`），然后对结果取并集。\n\n前面列出的等价规则只是数十条规则中的几个例子。为什么了解这些规则很重要？为了效率，可能需要以与列出顺序不同的顺序执行操作。后续章节中将有很多此类转换的示例。等价性确保一个查询可以用几种不同的表达式表示，这为优化器提供了动力。\n\
