  对一个大表的多次扫描


  ![](img/501585_2_En_6_Fig21_HTML.jpg)


  包含多次扫描的 17 行执行计划的截图。它包括哈希连接、哈希条件、对自定义字段的序列扫描、过滤以及对乘客表`p`的序列扫描。


  **图 6-21**

