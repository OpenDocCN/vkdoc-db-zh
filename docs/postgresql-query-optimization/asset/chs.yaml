  一个包含 6 行的查询计划，包括哈希连接、哈希条件、对 flight 表的顺序扫描、哈希、对 airport 表的顺序扫描以及过滤函数。

  图 4-7：清单 4-3 的执行计划


  ```sql

  SELECT flight_id,

  scheduled_departure

  FROM flight f

  JOIN airport a ON departure_airport=airport_code

  AND iso_country=''CZ''

  ```

  清单 4-4：与清单 4-3 相同的 SELECT，但搜索值不同


