  \ OLTP 查询都是短查询。然而，许多现代应用程序需要的查询可能返回数百行，但仍然是短查询。\n\n为什么清单 5-1 是长查询？因为需要`airport`表中的所有行才能获得结果。为什么清单\
  \ 5-2 是短查询？因为它只需要大约 200,000 个航班中几个航班的数据。为什么清单 5-3 不是短查询？因为计算结果需要系统中每个预订的数据。\n\n\
  当我们优化一个短查询时，我们知道最终我们选择的是相对较少的记录。这意味着优化目标是尽早减少结果集的大小。如果最具限制性的选择标准应用于查询执行的第一步，后续的排序、分组甚至连接操作的成本都会降低。查看执行计划时，应该不存在对大表的表扫描。对于小表，全表扫描可能仍然有效，如第\
  \ 3 章图 3-2 所示。\n\n## 选择选择标准\n\n确保最具限制性的选择标准最先应用，这似乎很容易；然而，这并不总是那么简单。显而易见的是，本章名为“短查询与索引”是有原因的：如果没有索引支持相应的搜索，就无法快速从表中选择记录的子集。这就是为什么短查询需要索引来实现更快的执行。如果缺乏支持高限制性查询的索引，很可能就需要创建一个。\n\
  \n\n### 索引选择性\n\n第 3 章介绍了查询选择性的概念。同样的概念也适用于索引：对应于索引中一个值的记录数越少，索引的选择性值就越低。我们不希望创建选择性高的索引；正如我们在第\
  \ 3 章所见，这种情况下基于索引的数据检索将比顺序扫描花费更多时间。由于 PostgreSQL 优化器会预先确定每种访问方法的成本，这种索引永远不会被使用，因此性能不会受到影响。然而，添加一个需要存储空间和额外更新时间却无法提供任何收益的数据库对象，仍然是不可取的。\n\
  \n一个数据库表可能在不同列上有多个索引，每个索引都有不同的选择性。对于短查询来说，可能达到的最佳性能是在使用最具限制性的索引（即选择性最低的索引）时。\n\n\
  让我们看一下代码清单 5-4 中的查询。你能说出哪个过滤条件是最具限制性的吗？\n\n```sql\nSELECT *\nFROM flight\nWHERE\
  \ departure_airport='LAX'\nAND update_ts BETWEEN '2023-08-13' AND '2023-08-15'\n\
  AND status='Delayed'\nAND scheduled_departure BETWEEN '2023-08-13' AND '2023-08-15'\n\
  Listing 5-4\n索引选择性\n```\n\n`Delayed`（延误）状态可能是最具限制性的，因为理想情况下，在任何给定的日子里，准点航班都远多于延误航班。\n\
  \n在我们的培训数据库中，我们有六个月的航班时刻表，所以将其限制在两天内可能限制性不强。另一方面，通常航班时刻表会提前很久发布，如果我们查找的是最后更新时间戳相对接近计划起飞时间的航班，这很可能表明这些航班被延误或取消了。\n\
  \n另一个可能需要考虑的因素是相关机场的受欢迎程度。`LAX`（洛杉矶国际机场）是一个繁忙的机场，对于代码清单 5-4 来说，基于 `update_ts` 的限制会比基于\
  \ `departure_airport` 的限制更具限制性。然而，如果我们将 `departure_airport` 上的过滤条件改为 `FUK`（福冈机场），那么机场标准的限制性将超过基于\
  \ `update_ts` 的选择。\n\n如果所有搜索条件都被索引了，那么就不用担心；多个索引如何协同工作的方式稍后会介绍。但如果最具限制性的条件没有被索引，执行计划可能不是最优的，并且很可能需要一个额外的索引。\n\
  \n### 唯一索引与约束\n\n索引的选择性越好（越低），搜索速度就越快。因此，最高效的索引是唯一索引。\n\n如果对于每个被索引的值，在表中都恰好只有一行与之匹配，那么该索引就是唯一的。\n\
  \n创建唯一索引有几种不同的方式。首先，PostgreSQL 会自动创建唯一索引来支持表上的任何主键或唯一约束。\n\n主键和唯一约束之间有什么区别？SQL 开发者中一个常见的误解是，主键必须是一个递增的数值，并且每张表“必须”有一个主键。虽然拥有一个数字递增的主键（称为代理键）通常很有帮助，但主键不一定是数字，而且它也不一定是单一属性的约束。可以将主键定义为多个属性的组合；它只需满足两个条件：该组合对于所有参与的属性必须同时是\
  \ `UNIQUE`（唯一的）和 `NOT NULL`（非空）的。相比之下，PostgreSQL 中的唯一约束允许 `NULL` 值。\n\n一张表可以有一个主键（尽管主键不是必需的）和多个唯一约束。任何一个非空的唯一约束都可以被选作表的主键；因此，没有编程方式可以确定哪一个是表的主键的最佳候选。例如，`booking`\
  \ 表的主键在 `booking_id` 上，唯一键在 `booking_ref` 上——参见代码清单 5-5。\n\n```sql\nALTER TABLE\
  \ booking\nADD CONSTRAINT booking_pkey PRIMARY KEY (booking_id);\nALTER TABLE booking\n\
  ADD CONSTRAINT booking_booking_ref_key UNIQUE (booking_ref);\nListing 5-5\n一个主键和一个唯一约束\n\
  ```\n\n由于 `booking_ref` 是一个非空属性，我们可以选择 `booking_id` 或 `booking_ref` 作为主键。\n\n如第\
  \ 1 章的 ER 图所示，`account` 表中的 `frequent_flyer_id` 列是可空的，并且也是唯一的：\n\n```sql\nALTER\
  \ TABLE account\nADD CONSTRAINT account_freq_flyer_unq_key UNIQUE (frequent_flyer_id);\n\
  ```\n\n也可以不正式定义唯一约束，而是直接创建一个唯一索引。你只需在索引创建语句中添加关键字 `unique`：\n\n```sql\nCREATE UNIQUE\
  \ INDEX account_freq_flyer ON\naccount (frequent_flyer_id);\n```\n\n如果我们在这个表已经插入数据之后创建这个索引，`CREATE\
  \ UNIQUE INDEX` 将会验证值的唯一性，如果发现任何重复，索引将不会被创建。对于任何后续的插入和更新，新值的唯一性也将被验证。\n\n那么外键呢？它们会自动创建索引吗？一个常见的误解是认为外键的存在必然意味着在子表上存在索引。事实并非如此。\n\
  \n外键是一种参照完整性约束；它保证在子表（即具有外键约束的表）中每个非空值，在父表（即它引用的表）中都有一个与之匹配的唯一值。\n\n例如，在 `flight`\
  \ 表上有一个外键约束，确保每个到达机场都匹配一个现有的机场代码：\n\n```sql\nALTER TABLE flight\nADD CONSTRAINT\
  \ arrival_airport_fk FOREIGN KEY (arrival_airport)\nREFERENCES airport (airport_code);\n\
  ```\n\n这个约束不会自动创建索引；如果通过到达机场进行搜索很慢，就必须显式创建索引：\n\n```sql\nCREATE INDEX flight_arrival_airport\n\
  ON flight (arrival_airport);\n```\n\n第 3 章提到，唯一索引使嵌套循环变得高效。如果你参考图 3-7，你会意识到当索引存在时会发生什么。\n\
  \n\n## 嵌套循环连接与索引\n\n如果表 `S` 的连接条件属性上存在索引，嵌套循环连接算法也可以与基于索引的数据访问相结合。对于自然连接，基于索引的嵌套循环算法的内循环会缩小为针对\
  \ `R` 的每一行仅访问 `S` 的少数几行。如果 `S` 上的索引是唯一的（例如，`S` 的连接属性是其主键），内循环甚至可以完全消失。\n\n这常常被误解为意味着在连接主键/外键时，嵌套循环总是高效的。然而，如前所述，这仅在子表（即外键）中的列被索引时才成立。\n\
  \n## 是否总是为外键列创建索引？\n\n是否总是为具有外键约束的列创建索引是最佳实践吗？并非总是如此。仅当不同值的数量足够大时才应创建索引。请记住，低选择性的索引不太可能有用。例如，`flight`\
  \ 表在 `aircraft_code` 上有一个外键约束：\n\n```sql\nALTER TABLE flight\nADD CONSTRAINT aircraft_code_fk\
  \ FOREIGN KEY (aircraft_code)\nREFERENCES aircraft (code);\n```\n\n这个外键约束是必要的，因为每个航班必须分配一个有效的飞机。为了支持此外键约束，为\
  \ `aircraft` 表添加了主键约束。然而，该表只有 12 行。因此，没有必要在 `flight` 表的 `aircraft_code` 列上创建索引。该列只有\
  \ 12 个不同的值，因此该列上的索引不会被使用。\n\n为了说明这一点，让我们看清单 5-6 中的查询。该查询选择 2023 年 8 月 14 日至 16 日期间从\
  \ JFK 机场出发的所有航班。对于每个航班，我们选择航班号、计划起飞时间、飞机型号和乘客数量。\n\n```sql\nSELECT\nf.flight_no,\n\
  f.scheduled_departure,\nmodel,\ncount(passenger_id) passengers\nFROM flight f\n\
  JOIN booking_leg bl ON bl.flight_id = f.flight_id\nJOIN passenger p ON p.booking_id=bl.booking_id\n\
  JOIN aircraft ac ON ac.code=f.aircraft_code\nWHERE f.departure_airport ='JFK'\n\
  AND f.scheduled_departure BETWEEN\n'2023-08-14' AND '2023-08-16'\nGROUP BY 1,2,3\n\
  ```\n\n清单 5-6：一个没有使用索引的主键/外键连接\n\n该查询的执行计划如图 5-1 所示，并且它非常庞大。\n\n![](img/501585_2_En_5_Fig1_HTML.jpg)\n\
  \n一组文本行表示一个很长的查询计划。它从上到下包含 22 行。一些标签包括分组聚合、分组键、排序、排序键、哈希连接、对 passenger 的顺序扫描、嵌套循环和对\
  \ aircraft 的顺序扫描。\n\n图 5-1：对小表进行顺序扫描的计划\n\n我们目前对此计划唯一感兴趣的部分是：\n\n```sql\nHash  (cost=1.12..1.12\
  \ rows=12 width=64)\n-> Seq Scan on aircraft ac (cost=0.00..1.12 rows=12\n```\n\n\
  PostgreSQL 优化器访问表统计信息，并能够检测到 `aircraft` 表的规模很小，使用索引访问效率不高。相比之下，正如我们在本章前面观察到的，由于低选择性，`flight`\
  \ 表的 `departure_airport` 字段上的索引被证明是有用的。\n\n## 索引与非等值条件\n\n第 3 章描述了 B-tree 索引的结构、构建方式以及如何用于搜索。接下来是它们实际应用的演示。\n\
  \n前一节涉及简单的 B-tree 索引。如第 3 章所述，它们可以支持等于、大于、小于和 BETWEEN 条件的搜索：所有需要比较和排序的搜索。OLTP 系统中的大多数搜索都属于此类，但也存在相当数量的情况，其搜索条件更为复杂。\n\
  \n### 索引与列转换\n\n什么是列转换？当搜索条件针对列中值的某些修改时，就会发生列转换。例如，`lower(last_name)`（将 `last_name`\
  \ 值转换为小写）和 `update_ts::date`（将带时区的时间戳转换为日期）就是列转换。\n\n列转换如何影响索引使用？很简单，无法在该属性上使用 B-tree\
  \ 索引。回顾第 3 章中 B-tree 的构建方式和搜索执行方式：在每个节点中，属性的值会与节点中的值进行比较。转换后的值没有记录在任何地方，因此没有东西可以与之比较。因此，如果\
  \ `last_name` 上有一个索引\n\n```sql\nCREATE INDEX account_last_name\nON account (last_name);\n\
  ```\n\n……以下搜索将无法利用该索引：\n\n```sql\nSELECT *\nFROM account\nWHERE lower(last_name)='daniels';\n\
  ```\n\n我们如何解决这个问题？可能需要进行这样的搜索，因为乘客可能会以不同的大小写输入他们的姓氏。如果你认为覆盖最常见的情况就足够了，你可以像这样修改搜索条件：\n\
  \n```sql\nSELECT *\nFROM account\nWHERE last_name='daniels'\nOR last_name='Daniels'\n\
  OR last_name ='DANIELS'\n```\n\n该查询的执行计划如图 5-2 所示。\n\n![](img/501585_2_En_5_Fig2_HTML.jpg)\n\
  \n一组文本行表示一个较短的查询计划。它从上到下包含 9 行。它包括对 account 的位图堆扫描、重新检查条件以及对 account_last_name 的位图索引扫描。\n\
  \n图 5-2：使用 \"like\" 操作符重写的执行计划\n\n更好的解决方案是创建一个（额外的）*函数*索引：\n\n```sql\nCREATE INDEX\
  \ account_last_name_lower\nON account (lower(last_name));\n```\n\n当构建函数索引时，PostgreSQL\
  \ 会将函数应用于列（或多列）的值，然后将这些值放入 B-tree 中。与常规 B-tree 索引（节点包含列的值）类似，在函数索引中，节点包含函数的值。在我们的例子中，函数是\
  \ `lower()`。创建索引后，清单 5-7 中的查询 #1 将不会使用顺序扫描，而是能够利用新索引。相应的执行计划如图 5-3 所示。\n\n```sql\n\
  ---#1\nSELECT * FROM account WHERE lower(last_name)='daniels';\n---#2\nSELECT *\
  \ FROM account WHERE last_name='Daniels';\n---#3\nSELECT * FROM account WHERE last_name='daniels';\n\
  ---#4\nSELECT * FROM account WHERE lower(last_name)='Daniels';\n```\n\n清单 5-7：不同的搜索条件使用不同的索引\n\
  \n请注意，如果我们希望特定大小写的值搜索也能被索引支持（例如查询 #2），`last_name` 列上的索引仍然是必要的。此外，值得一提的是，如果表 `account`\
  \ 包含一条 `last_name = 'Daniels'` 的记录和另一条 `last_name = 'DANIELS'` 的记录，查询 #1 将返回两条记录，查询\
  \ #2 将只返回第一条记录，而查询 #3 和 #4 将不会返回其中任何一条。\n\n![](img/501585_2_En_5_Fig3_HTML.jpg)\n\
  \n一组文本行表示一个包含 4 行的查询计划，从上到下。这些行表示对 account 的位图堆扫描、重新检查条件、对 account_last_name_lower_pattern\
  \ 的位图索引扫描以及索引条件。\n\n图 5-3：使用函数索引的计划\n\n注意\n\n有时，不需要额外的索引。\n\n每次需要使用列转换进行搜索时都应该创建函数索引吗？不一定。然而，重要的是要识别列转换，这可能是微妙的。\n\
  \n例如，让我们看下面的 SELECT 语句：\n\n```sql\nSELECT *\nFROM flight\nWHERE scheduled_departure\
  \ ::date\nBETWEEN '2023-08-17' AND '2023-08-18'\n```\n\n\n乍一看，我们似乎是在使用 `scheduled_departure`\
  \ 列作为选择条件，并且由于该列存在索引，理应会被使用。然而，图 5-4 中的执行计划却转而进行了一次顺序扫描。\n\n![](img/501585_2_En_5_Fig4_HTML.jpg)\n\
  \n一组文本行表示一个包含两行的查询计划。这两行分别表示对 flight 表的顺序扫描和过滤操作。\n\n图 5-4：由于列转换而未使用索引的执行计划\n\n\
  为什么 PostgreSQL 不使用索引？因为当时间戳被转换为日期时，已经对列进行了转换。\n\n那么，是否需要为 `scheduled_departure::date`\
  \ 创建一个额外的函数索引呢？不一定。这个选择条件意味着什么？它意味着我们想选择在特定这两个日期出发的航班，无论具体时间是几点。这意味着航班可以在 2023 年\
  \ 8 月 17 日午夜到 2023 年 8 月 19 日午夜之间的任何时间出发。为了让现有的索引生效，可以修改选择条件为：\n\n```sql\nSELECT\
  \ *\nFROM flight\nWHERE scheduled_departure >='2023-08-17'\nAND  scheduled_departure\
  \ <'2023-08-19'\n```\n\n图 5-5 展示了执行计划的变化。\n\n![](img/501585_2_En_5_Fig5_HTML.jpg)\n\
  \n一个查询计划包含四行文本。这几行分别表示对 flight 表的位图堆扫描、重新检查条件、对 flight scheduled departure 的位图索引扫描以及索引条件。\n\
  \n图 5-5：使用了索引的执行计划\n\n观察执行计划可以看出，使用基于索引的访问方法，其成本估算比顺序扫描低了一倍多（`13857.42` 对比 `30474`）。更重要的是，执行时间也证实了这一点：基于索引的访问耗时\
  \ `0.5` 秒，而顺序扫描耗时 `1.5` 秒。\n\n请非常仔细地关注这个例子。当你在书中读到这个例子时，前面的段落看起来显而易见。然而，许多 SQL 开发人员和报表编写者却一再使用类似的搜索条件。一个常见的用例是处理对表的当日更改。百分之九十五的情况下，这个条件被写成\
  \ `update_ts::date=CURRENT_DATE`，这成功地阻止了在 `update_ts` 列上使用索引。为了利用索引，这个条件应该写成：\n\n\
  ```sql\nupdate_ts>= CURRENT_DATE\n```\n\n或者，如果这个时间戳的值可能在未来，条件应写为：\n\n```sql\nWHERE\
  \ update_ts>= CURRENT_DATE AND update_ts< CURRENT_DATE +1\n```\n\n让我们再检查一个列转换常常被忽视的例子。假设今天是\
  \ 2023 年 8 月 17 日。我们正在寻找今天已经起飞或计划今天起飞的航班。我们知道，对于尚未起飞的航班，`actual_departure` 列可能为空。\n\
  \nPostgreSQL 中的 `coalesce()` 函数允许我们在第一个参数为 null 时使用一个不同的值。因此，`coalesce(actual_departure,\
  \ scheduled_departure)` 会在 `actual_departure` 不为 null 时返回它，否则返回 `scheduled_departure`。`scheduled_departure`\
  \ 和 `actual_departure` 这两列都有索引，你可能期望这些索引会被使用。例如，查看以下 SQL 语句的执行计划，如图 5-6 所示：\n\n\
  ```sql\nSELECT *\nFROM flight\nWHERE coalesce(actual_departure, scheduled_departure)\n\
  BETWEEN '2023-08-17' AND '2023-08-18'\n```\n\n![](img/501585_2_En_5_Fig6_HTML.jpg)\n\
  \n一个查询计划包含两行文本。它表示对 flight 表的顺序扫描和过滤。\n\n图 5-6：尽管存在索引，但仍进行顺序扫描的计划\n\n为什么没有使用任何索引？因为\
  \ `coalesce()` 是一个函数，它修改了列的值。我们应该创建另一个函数索引吗？可以，但这并非真正必要。我们可以改写这个 SQL 语句，如代码清单 5-8\
  \ 所示，这将导致如图 5-7 所示的执行计划。\n\n```sql\nSELECT * FROM flight\nWHERE (actual_departure\n\
  BETWEEN '2023-08-17' AND '2023-08-18')\nOR (actual_departure IS NULL\nAND scheduled_departure\
  \ BETWEEN '2023-08-17' AND '2023-08-18')\n```\n代码清单 5-8：同时使用两个索引的查询\n\n![](img/501585_2_En_5_Fig7_HTML.jpg)\n\
  \n一个查询计划包含 8 行文本。这些行分别表示对 flight 表的位图堆扫描、重新检查条件、过滤、对 flight actual departure 的位图索引扫描、对\
  \ flight scheduled departure 的位图索引扫描以及索引条件。\n\n图 5-7：代码清单 5-8 中查询的执行计划\n\n## 索引与\
  \ `like` 操作符\n\n另一组并非直接比较列值与常量的搜索条件是使用 `like` 操作符的搜索。例如，查询：\n\n```sql\nSELECT *\
  \ FROM account\nWHERE lower(last_name) like 'johns%';\n```\n\n将返回所有姓氏以“johns”开头的账户。在\
  \ `postgres_air` 模式中，返回的姓氏列表为：\n\n```\n\"Johnson\"\n\"Johns\"\n\"johns\"\n\"Johnston\"\
  \n\"JOHNSTON\"\n\"JOHNS\"\n\"JOHNSON\"\n\"johnston\"\n\"johnson\"\n```\n\n这个查询的唯一问题是它不会利用我们在前一节创建的函数索引，因为\
  \ B-tree 索引不支持使用 `like` 操作符的搜索。再次，如果我们检查这个查询的执行计划，将会看到对 `account` 表的顺序扫描。\n\n我们如何解决这个问题并避免扫描？\n\
  \n一个可能的解决方案是重写查询，用两个条件替换 `like`：\n\n```sql\nSELECT * FROM account\nWHERE (lower(last_name)\
  \ >='johns' and lower(last_name) < 'johnt')\n```\n\n这个查询的执行计划如图 5-8 所示，我们可以看到该计划使用了现有的索引。\n\
  \n![](img/501585_2_En_5_Fig8_HTML.jpg)\n\n一个查询计划包含 4 行文本。它表示对 account 表的位图堆扫描、重新检查条件、对\
  \ account last name lower 的位图索引扫描以及索引条件。\n\n图 5-8：重写后使用索引的查询计划\n\n更好的解决方案是创建一个*模式搜索*索引：\n\
  \n```sql\nCREATE INDEX account_last_name_lower_pattern\nON account (lower(last_name)\
  \ text_pattern_ops);\n```\n\n为什么需要这个索引？因为文本值的比较依赖于*区域设置*，这是一组关于字符排序、格式等规则，因语言和国家而异。尽管有些人可能认为我们在美国英语中使用的是通用的顺序，但事实并非如此。唯一允许我们使用\
  \ B-tree 索引的区域设置是“C”区域设置，这是一个符合标准的默认区域设置。只有严格的 ASCII 字符在此区域设置中有效。\n\n要查看数据库创建时定义了哪个区域设置，你需要运行命令：\n\
  \n```sql\nSHOW LC_COLLATE;\n```\n\n如果你居住在美国，很可能会看到：\n\n```\n\"en_US.UTF-8\"\n```\n\
  \n这个新创建的索引将被使用 `like` 操作符的查询所利用。我们原始查询的新执行计划如图 5-9 所示，我们可以看到它利用了新索引。\n\n![](img/501585_2_En_5_Fig9_HTML.jpg)\n\
  \n一个查询计划包含 4 行文本。它表示对 account 表的位图堆扫描、过滤、对 account last name lower pattern 的位图索引扫描以及索引条件。\n\
  \n图 5-9：带有模式索引的执行计划\n\n\n\n## 使用多个索引\n\n在图 5-7 中，我们看到一个执行计划，它在同一个表`flight`上使用了两个索引。第\
  \ 3 章中关于基于索引的访问的讨论主要关注的是单个索引的情况。当有多个可用索引时会发生什么？PostgreSQL 究竟如何高效地使用它们？\n\n答案就在执行计划中看到的`位图`一词中。创建内存位图使得优化器能够使用一个表上的多个索引来加速数据访问。让我们来看一个对一个表有三个筛选条件的查询，这些条件都受到索引的支持。\n\
  \n```sql\nSELECT\nscheduled_departure ,\nscheduled_arrival\nFROM flight\nWHERE departure_airport='ORD'\n\
  AND arrival_airport='JFK'\nAND scheduled_departure BETWEEN '2023-07-03' AND '2023-07-04';\n\
  ```\n\n*清单 5-9：一个对单表应用三个过滤条件的查询*\n\n此查询的执行计划如图 5-10 所示。\n\n![](img/501585_2_En_5_Fig10_HTML.jpg)\n\
  \n*图 5-10：在单个表上使用多个索引扫描的执行计划*\n\n查询计划包含 9 行文本。这些行表示`对 flight 的位图堆扫描`、`重新检查条件`、`对\
  \ flight_scheduled_departure 的位图索引扫描`、`对 flight_arrival 的位图索引扫描`以及`索引条件`。\n\n正如第\
  \ 3 章深入讨论的那样，Postgres 可以通过在主内存中创建一个包含匹配记录的数据块的位图，然后对它们进行`OR`或`AND`操作，从而使用来自多个索引的搜索结果。在此过程完成后，剩下的唯一数据块是满足所有搜索条件的数据块，PostgreSQL\
  \ 会读取剩余数据块中的所有记录以重新检查搜索条件。\n\n数据块将按物理顺序扫描，因此基于索引的排序将会丢失。\n\n使用多个基于索引的搜索的位图`AND`和`OR`是应用多个过滤条件的一种非常高效的机制，但不是唯一的一种。在下一节中，我们将讨论另一种选择——创建复合索引。\n\
  \n## 复合索引\n\n到目前为止，展示的索引都是建立在单个列上的。本节讨论建立在多列上的索引及其优势。\n\n## 复合索引如何工作？\n\n让我们回到清单\
  \ 5-9 中的查询。对表`flight`应用三个搜索条件的结果可以通过使用多个索引来计算。另一种选择是在所有三个列上创建一个复合索引：\n\n```sql\n\
  CREATE INDEX flight_depart_arr_sched_dep ON  flight(\ndeparture_airport,\narrival_airport,\n\
  scheduled_departure)\n```\n\n有了这个索引，执行计划将如图 5-11 所示。\n\n![](img/501585_2_En_5_Fig11_HTML.jpg)\n\
  \n*图 5-11：使用复合索引的计划*\n\n查询计划包含 2 行文本。第一行表示`使用 flight_departure_arrival_scheduled_departure\
  \ 索引对 flight 进行索引扫描`。第二行表示`索引条件`。\n\n这个新的复合索引将支持按`departure_airport`、按`departure_airport`和`arrival_airport`以及按`departure_airport`、`arrival_airport`和`scheduled_departure`进行搜索。但是，它将不支持仅按`arrival_airport`或`scheduled_departure`进行搜索。\n\
  \n查询\n\n```sql\nSELECT\ndeparture_airport,\nscheduled_arrival,\nscheduled_departure\n\
  FROM flight\nWHERE  arrival_airport='JFK'\nAND scheduled_departure BETWEEN '2023-07-03'\
  \ AND '2023-07-04'\n```\n\n...将产生如图 5-12 所示的执行计划。\n\n![](img/501585_2_En_5_Fig12_HTML.jpg)\n\
  \n*图 5-12：未使用复合索引*\n\n查询计划包含 7 行文本。它表示`对 flight 的位图堆扫描`、`重新检查条件`、`对 flight_scheduled_departure_arrival\
  \ 的位图索引扫描`和`索引条件`。\n\n另一方面，查询\n\n```sql\nSELECT\nscheduled_departure ,\nscheduled_arrival\n\
  FROM flight\nWHERE departure_airport='ORD' AND arrival_airport='JFK'\nAND scheduled_arrival\
  \ BETWEEN '2023-07-03' AND '2023-07-04';\n```\n\n...将使用复合索引，尽管只使用了前两列，如图 5-13 所示。\n\
  \n![](img/501585_2_En_5_Fig13_HTML.jpg)\n\n*图 5-13：对前两列使用复合索引的计划*\n\n查询计划包含 5 行文本。它表示`对\
  \ flight 的位图堆扫描`、`重新检查条件`、`对 flight_departure_arrival_scheduled_departure 的位图索引扫描`和`索引条件`。\n\
  \n一般来说，建立在(`X`,`Y`,`Z`)上的索引将被用于搜索`X`、(`X`,`Y`)、(`X`,`Y`,`Z`)甚至(`X`,`Z`)，但不会用于仅搜索`Y`或搜索`YZ`。因此，在创建复合索引时，不仅要决定包含哪些列，还必须考虑它们的顺序。\n\
  \n为什么要创建复合索引？毕竟，上一节已经证明同时使用多个索引同样有效。创建此类索引有两个主要原因：降低选择性和额外的数据存储。\n\n## 降低选择性\n\n\
  记住，选择性越低，搜索速度越快。当我们优化短查询时，我们的目标是避免在任何给定点读取大量行（即使以后能够过滤掉它们）。有时，单个列值都不够具有限制性，只有特定的组合才能使查询变短。\n\
  \n在上一节的例子中，有 12,922 个出发机场是`ORD`的航班和 10,530 个到达机场是`JFK`的航班。然而，从`ORD`起飞并降落在`JFK`的航班数量仅为\
  \ 184。\n\n## 使用索引进行数据检索\n\n当`SELECT`语句中的所有列都包含在复合索引中时，可以在不访问表的情况下检索它们。这被称为`仅索引扫描`数据检索方法。\n\
  \n上一节中的所有执行计划在通过`索引扫描`定位记录后，仍然需要从表中读取记录，因为我们仍然需要索引中未包含的列的值。\n\n让我们再构建一个复合索引，并包含一个额外的列：\n\
  \n```sql\nCREATE INDEX flight_depart_arr_sched_dep_sched_arr\nON flight (departure_airport,\n\
  arrival_airport,\nscheduled_departure,\nscheduled_arrival );\n```\n\n该查询的执行计划将立即转换为`仅索引扫描`，如图\
  \ 5-14 所示。\n\n![](img/501585_2_En_5_Fig14_HTML.jpg)\n\n*图 5-14：包含仅索引扫描的计划*\n\n查询计划包含\
  \ 2 行文本。它表示`使用 departure_airport、arrival_airport、scheduled_departure 和 scheduled_arrival\
  \ 的仅索引扫描`，以及`索引条件`。\n\n请注意，搜索再次是在索引的前三列上进行的。如果搜索没有包含索引的第一列，例如\n\n```sql\nSELECT\n\
  departure_airport,\nscheduled_departure ,\nscheduled_arrival\nFROM flight\nWHERE\
  \ arrival_airport='JFK'\nAND scheduled_departure BETWEEN '2023-07-03' AND '2023-07-04'\n\
  ```\n\n...执行计划将恢复为使用多个索引并进行`AND`和`OR`操作，如图 5-15 所示。\n\n![](img/501585_2_En_5_Fig15_HTML.jpg)\n\
  \n*图 5-15：当搜索不包含索引首列时，不使用复合索引*\n\n查询计划包含 7 行文本。它表示`对 flight 的位图堆扫描`、`重新检查条件`、`对\
  \ flight_scheduled_departure 的位图索引扫描`、`对 flight_arrival 的位图索引扫描`和`索引条件`。\n\n\n\n\
  ### 覆盖索引\n\n覆盖索引最早在 PostgreSQL 11 中引入。这些索引可以被视为对支持“仅索引扫描”访问方法的持续努力的延续。一个`覆盖索引`是专门设计用来包含你频繁运行的特定类型查询所需的列。\n\
  \n在上一节中，将 `scheduled_arrival` 列添加到索引中，仅仅是为了避免额外回表查询。它并不打算用作搜索条件。在这种情况下，可以改用覆盖索引：\n\
  \n```sql\nCREATE INDEX flight_depart_arr_sched_dep_inc_sched_arr\n   ON flight\n\
  (departure_airport,\narrival_airport,\nscheduled_departure)\nINCLUDE (scheduled_arrival);\n\
  ```\n\n对于查询\n\n```sql\nSELECT\ndeparture_airport,\nscheduled_departure,\nscheduled_arrival\n\
  FROM flight\nWHERE arrival_airport='JFK' AND departure_airport='ORD'\nAND scheduled_departure\
  \ BETWEEN '2023-07-03' AND '2023-07-04'\n```\n\n的执行计划将如图 5-16 所示。\n\n![](img/501585_2_En_5_Fig16_HTML.jpg)\n\
  \n一个查询计划由 2 行文本组成。第一行表示使用 `flight_departure, arrival, scheduled_departure, and scheduled_arrival`\
  \ 的仅索引扫描。第二行包含了索引条件。\n\n图 5-16\n使用覆盖索引进行仅索引扫描的计划\n\n在这种情况下，在索引中包含一个额外的列与创建一个覆盖索引区别不大。但是，如果需要将更多（或更宽的）列与索引值一起存储，覆盖索引可能会更紧凑。\n\
  \n### 过度选择条件\n\n有时，当过滤逻辑复杂且涉及多个表的属性时，有必要提供额外的、冗余的过滤条件，以促使数据库引擎使用特定的索引或减少连接参数的大小。这种做法被称为使用过度选择条件。其目的是使用这个额外的过滤器从大表中预选出一个小的记录子集。\n\
  \n对于其中一些复杂的条件，PostgreSQL 能够自动执行查询重写。\n\n例如，代码清单 5-10 中的查询的过滤条件结合了表 `flight` 和 `passenger`\
  \ 的属性值。在早期版本的 PostgreSQL 中，引擎无法在连接所有表之前开始过滤，因为 AND 条件应用于不同表的列。\n\n```sql\nSELECT\n\
  last_name,\nfirst_name,\nseat\nFROM boarding_pass bp\nJOIN booking_leg bl USING\
  \ (booking_leg_id)\nJOIN flight f USING (flight_id)\nJOIN booking b USING(booking_id)\n\
  JOIN passenger p USING (passenger_id)\nWHERE\n(departure_airport='JFK'\nAND scheduled_departure\
  \ BETWEEN\n'2023-07-10' AND '2023-07-11'\nAND last_name ='JOHNSON')\nOR\n(departure_airport='EDW'\n\
  AND scheduled_departure BETWEEN '2023-07-13' AND '2023-07-14'\nAND last_name ='JOHNSTON')\n\
  ```\n代码清单 5-10\n涉及两个表条件的查询\n\n然而，现在优化器可以执行复杂的查询重写，如图 5-17 所示。\n\n![](img/501585_2_En_5_Fig17_HTML.jpg)\n\
  \n一个查询计划由 24 行文本组成。它标示了嵌套循环、连接过滤、对 flight 表的位图堆扫描、scheduled_arrival、scheduled_departure、arrival_airport、departure_airport、索引条件以及其他细节。\n\
  \n图 5-17\n涉及两个表条件并带有查询重写的执行计划\n\n注意第 8 到 15 行。PostgreSQL 重写了逻辑表达式，并选择了 `flight`\
  \ 表中可能同时满足由 OR 连接的两个条件的所有记录。\n\n在这种情况下，唯一能做的就是让 PostgreSQL 自行处理。\n\n然而，有些查询如果没有人工干预，可能会永远运行下去。让我们看看代码清单\
  \ 5-11 中的查询。这个查询寻找延误超过一小时的航班（这种航班应该不多）。对于所有这些延误的航班，查询选择在计划起飞时间之后签发的登机牌。\n\n```sql\n\
  SELECT\nbp.update_ts AS boarding_pass_issued,\nscheduled_departure,\nactual_departure,\n\
  status\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN boarding_pass\
  \ bp USING (booking_leg_id)\nWHERE bp.update_ts > scheduled_departure + interval\
  \ '30 minutes'\nAND f.update_ts >=scheduled_departure -interval '1 hour'\n```\n\
  代码清单 5-11\n带有难以优化的过滤条件的简短查询\n\n这看起来可能是一个刻意设计的例子，但它是基于生产环境中的异常报告建模的。许多公司都有某种异常报告机制来识别异常的系统行为。关键的是，根据定义，执行报告的输出应该很小。异常报告要有用，就应该报告相对罕见的情况——否则，它们就只是常规业务报告了。\n\
  \n所描述的情况听起来肯定不正常，而且应该没有很多这样的案例。然而，图 5-18 中的执行计划包含了大型表的全表扫描和哈希连接，即使所有涉及的表上都存在合适的索引。\n\
  \n![](img/501585_2_En_5_Fig18_HTML.jpg)\n\n一个查询计划由 11 行文本组成。它们包括哈希连接、哈希条件、连接过滤器、对\
  \ boarding_pass 表的顺序扫描以及对 flight 表的顺序扫描。\n\n图 5-18\n一个简短查询的次优执行计划\n\n那么，问题出在哪里呢？\n\
  \n\n\n## 回到短查询的定义\n\n起初这似乎非常清楚，但现在变得有点棘手了。回想一下，如果一个查询只需要少量行来计算结果，它就是短查询。诚然，在这种情况下，我们确实只需要少量行，但却没有简单的方法找到它们。所以这里有个需要注意的地方：短查询不仅要求需要的行数少，还要求任何中间操作结果的行数也少。如果一个包含三个连接的查询是短查询，但在执行第一个连接后，中间结果却非常庞大，那就说明执行计划有问题。\n\
  \n如前所述，从表中读取少量行的唯一方法是使用索引。然而，对于清单 5-11 中的查询，我们没有任何索引可以支持其过滤条件。此外，也不可能构建这样的索引，因为一个表的筛选条件依赖于另一个表的值。在这种情况下，无法在连接之前进行筛选，这导致了全表扫描和哈希连接。\n\
  \n## 如何改进这个查询？\n\n这个问题的答案与 SQL 本身没有直接关系。第 1 章提到，数据库优化始于收集需求，而在这个案例中，收集精确的需求就是通往优化的最佳途径。\n\
  \n请注意，在原始查询中，搜索空间是自古以来的所有航班——或者至少是数据库所涵盖的整个时间段。然而，这是一份异常报告，很可能是定期审阅的，并且报告的业务所有者很可能只关注自上次审阅以来的近期案例。更早的异常应该已经出现在之前的报告中，并且希望已经得到处理。下一步将是联系这份报告的业务所有者，询问一份仅包含最新异常的报告是否满足他们的需求。\n\
  \n如果答案是 `是`，我们就可以将从业务方获得的这一额外筛选条件应用到查询中。同时，我们还需要再建一个索引：\n\n```\nCREATE INDEX boarding_pass_update_ts\
  \ ON postgres_air.boarding_pass  (update_ts);\n```\n\n清单 5-12 展示了修改后的查询，保留了两天的异常数据。\n\
  \n```\nSELECT\nbp.update_ts AS boarding_pass_issued,\nscheduled_departure,\nactual_departure,\n\
  status\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN boarding_pass\
  \ bp USING (booking_leg_id)\nWHERE bp.update_ts > scheduled_departure + interval\
  \ '30 minutes'\nAND f.update_ts >=scheduled_departure -interval '1 hour';\nAND bp.update_ts\
  \ >='2023-08-13' AND bp.update_ts< '2023-08-14';\n清单 5-12\n添加了额外筛选条件的查询\n```\n\n\
  现在，将首先按时间戳进行搜索，如图 5-19 中的执行计划所示。\n\n![](img/501585_2_En_5_Fig19_HTML.jpg)\n\n查询计划包含\
  \ 15 行。其中包括嵌套循环、连接过滤器、对 boarding_pass 的位图堆扫描、重新检查条件、缓存键、缓存模式以及其他数据集。\n\n图 5-19\n\
  \n带有额外筛选条件的执行计划\n\n该查询的执行时间少于 200 毫秒，而原始查询的执行时间是 2 分 44 秒。\n\n如果你运行的是 PostgreSQL\
  \ 14 或更高版本，并且配置参数 `enable_memoize` 开启，执行计划中会出现一个 `Memoize` 节点（第 8-10 行）。记忆化计划允许在嵌套循环连接内部缓存参数化扫描的结果。这并没有改变本计划中所使用的基于索引的访问方式。\n\
  \n## 部分索引\n\n部分索引是 PostgreSQL 的最佳特性之一。顾名思义，部分索引是建立在表的一个子集上的，由 `CREATE INDEX` 语句的\
  \ `WHERE` 子句定义。\n\n例如，对于计划在未来起飞的航班，`actual_departure` 列为空。为了改进按 `actual_departure`\
  \ 的搜索，我们可以仅为实际起飞值非空的航班创建一个索引：\n\n```\nCREATE INDEX flight_actual_departure_not_null\n\
  ON flight(actual_departure)\nWHERE actual_departure IS NOT NULL\n```\n\n在这个特定案例中，执行时间的差异不会很显著，因为\
  \ `flight` 表不是很大，并且在当前数据分布下，只有一半的航班实际起飞时间为 null。然而，如果一个列中的值分布不均匀，使用部分索引可以带来很大的优势。\n\
  \n例如，`flight` 表中的 `status` 列只有三个可能的值：\"On schedule\"（按计划）、\"Delayed\"（延误）和 \"Canceled\"\
  （取消）。这些值的分布不均；状态为 \"On schedule\" 的航班数量远多于其他两种。在 status 列上创建索引将不切实际，因为该列的选择性非常高。然而，如果能快速筛选出取消的航班将会很有用，特别是因为与现实生活相比，postgres_air\
  \ 模式中取消的航班并不多。\n\n我们将创建一个索引：\n\n```\nCREATE INDEX flight_canceled ON flight(flight_id)\n\
  WHERE status='Canceled';\n```\n\n这个索引将被用于所有我们选择取消航班的查询，无论其他过滤条件如何，例如：\n\n```\nSELECT\
  \ * FROM flight WHERE\nscheduled_departure between '2023-08-13' AND '2023-08-14'\n\
  AND status='Canceled'\n```\n\n该查询的执行计划如图 5-20 所示。\n\n![](img/501585_2_En_5_Fig20_HTML.jpg)\n\
  \n查询计划包含 6 行。其中包括对 flight 的位图堆扫描、重新检查条件、对 flight_canceled 的位图索引扫描、对 flight_scheduled_departure\
  \ 的位图索引扫描以及索引条件。\n\n图 5-20\n\n部分索引的使用\n\n使用部分索引将执行时间从 0.72 秒减少到了 0.16 秒。\n\n\n##\
  \ 索引与连接顺序\n\n如前所述，在短查询中，优化目标是避免产生大型中间结果。这意味着必须确保最具限制性的选择条件最先被应用。之后，对于每个连接操作，我们都应确保结果集持续保持较小。\n\
  \n连接结果集较小的原因可能是连接表本身受限（连接参数中的记录数少），或是由于半连接（其中一个参数显著限制了结果集大小）。\n\n大多数情况下，查询规划器会选择正确的连接顺序，除非被强制指定了错误的顺序。\n\
  \n让我们从创建更多索引开始：\n\n```sql\nCREATE INDEX account_login ON account(login);\nCREATE\
  \ INDEX account_login_lower_pattern ON account  (lower(login) text_pattern_ops);\n\
  CREATE INDEX passenger_last_name ON passenger  (last_name);\nCREATE INDEX boarding_pass_passenger_id\
  \ ON boarding_pass  (passenger_id);\nCREATE INDEX passenger_last_name_lower_pattern\
  \ ON passenger  (lower(last_name) text_pattern_ops);\nCREATE INDEX passenger_booking_id\
  \ ON passenger(booking_id);\nCREATE INDEX booking_account_id ON booking(account_id);\n\
  CREATE INDEX booking_email_lower_pattern    ON booking\n(lower(email) text_pattern_ops);\n\
  ```\n\n现在，考虑 5-13 清单中的例子。\n\n```sql\nSELECT\nb.account_id,\na.login,\np.last_name,\n\
  p.first_name\nFROM passenger p\nJOIN booking b USING(booking_id)\nJOIN account a\
  \ ON a.account_id=b.account_id\nWHERE lower(p.last_name) LIKE 'smith%'\nAND lower(login)\
  \ LIKE 'smith%';\n```\n\n**清单 5-13**\n连接顺序示例\n\n此查询的执行计划如图 5-21 所示。注意，尽管列出的第一个表是\
  \ `passenger` 表，并且第一个选择条件也作用于该表，但执行却从 `account` 表开始。\n\n![](img/501585_2_En_5_Fig21_HTML.jpg)\n\
  \n查询计划由 11 行文本组成。这些行包括对 account 表的嵌套循环、位图堆扫描、过滤器、对 account_login_lower_pattern 索引的位图索引扫描、索引条件、使用\
  \ booking_account_id 的索引扫描以及其他细节。\n\n**图 5-21**\n连接顺序：当选择性相似时，从较小的表开始执行\n\n原因是 `account`\
  \ 表包含的记录数远少于 `passenger` 表，尽管两个过滤器的选择性大致相同，但 `account` 表上的相应索引将产生更少的记录。注意，在这种情况下，`passenger`\
  \ 表上的模式索引根本未被使用。\n\n然而，当查询条件寻找姓氏不常见的乘客（即选择性非常低的姓氏）时，执行计划会发生显著变化。图 5-22 中的执行计划表明，在这种情况下，从\
  \ `passenger` 表开始处理更具限制性。此时，PostgreSQL 查询规划器使用了 `passenger` 表上的模式索引，而没有使用 `account`\
  \ 表上的模式索引。\n\n![](img/501585_2_En_5_Fig22_HTML.jpg)\n\n查询计划由 10 行组成。这些行包括对 passenger_last_name_lower_pattern\
  \ 的嵌套循环、索引扫描、索引条件、过滤器、使用 booking_pkey 的索引扫描以及其他细节。\n\n**图 5-22**\n不同的选择性促使不同的连接顺序\n\
  \n比较这两个计划时，另一件值得注意的事情是，由于第一个查询产生的行数多得多，因此使用了位图索引扫描；而第二个查询由于选择性较低，使用了常规的索引扫描。\n\n\
  5-14 清单中的 `SELECT` 语句类似，但不是与 `passenger` 表连接，而是与 `frequent_flyer` 表连接，该表的大小约为 `account`\
  \ 表的一半。当然，为了能够搜索这个表，还需要再创建两个索引：\n\n```sql\nCREATE INDEX frequent_fl_last_name_lower_pattern\
  \ ON frequent_flyer  (lower(last_name) text_pattern_ops);\nCREATE INDEX frequent_fl_last_name_lower\
  \ ON frequent_flyer  (lower(last_name));\n```\n\n在这种情况下，执行将从 `frequent_flyer` 表开始，如图\
  \ 5-23 所示。\n\n```sql\nSELECT\na.account_id,\na.login,\nf.last_name,\nf.first_name,\n\
  count(*) AS num_bookings\nFROM frequent_flyer f\nJOIN account a USING(frequent_flyer_id)\n\
  JOIN booking b USING(account_id)\nWHERE lower(f.last_name)='smith'\nAND lower(login)\
  \ LIKE 'smith%'\nGROUP BY 1,2,3,4\n```\n\n**清单 5-14**\n查询每位常旅客的预订数量\n\n![](img/501585_2_En_5_Fig23_HTML.png)\n\
  \n查询计划由 18 行文本组成。这些行包括分组聚合、分组键、排序键、嵌套循环、哈希连接、哈希条件、对 account 表的位图堆扫描、对 account_login_lower_pattern\
  \ 的位图索引扫描以及其他细节。\n\n**图 5-23**\n清单 5-14 中查询的执行计划\n\n## 何时不使用索引\n\n到目前为止，本章介绍了索引如何在查询中使用。本节将转向索引*不被使用*的情况。具体来说，它讨论两种情况：如何在某些情况下防止\
  \ PostgreSQL 使用索引，以及当索引未被使用而我们认为其应该被使用时该怎么办。\n\n### 避免使用索引\n\n*为什么*需要避免使用索引？通常，数据库开发人员认为使用索引可以提高任何查询的性能。我们每个人都能回忆起被要求“建立一些索引以使此查询运行更快”的情况。然而，索引并非总是必需的，有时甚至可能适得其反。本章前面的两个例子（图\
  \ 5-1 和 5-6）展示了尽管包含顺序读取，但仍然相当高效的执行计划。\n\n我们可能希望避免使用索引的两个主要原因如下：\n\n*   小表被完全读入主内存。\n\
  *   我们需要执行查询时用到表中很大比例的行。\n\n是否有办法避免使用现有索引？大多数情况下，优化器足够智能，能够判断何时应该或不应该使用索引。但在极少数失败的情况下，我们可以修改选择条件。回想本章开头提到的，列转换会阻止索引的使用。当时，这被描述为列转换的负面影响，但当目标是阻止索引使用时，它也可以用来提高性能。\n\
  \n如果列是数字类型，可以通过对其值加零来修改。例如，条件 `attr1+0=p_value` 将阻止对 `attr1` 列上索引的使用。对于任何数据类型，`coalesce()`\
  \ 函数总是会阻止索引的使用，因此假设 `attr2` 不可为空，条件可以修改为类似 `coalesce(t1.attr2, '0')=coalesce(t2.attr2,\
  \ '0')` 的形式。\n\n\n### 为什么 PostgreSQL 会忽略我的索引？\n\n偶尔会遇到极其令人沮丧的情况：明明存在合适的索引，但出于某种原因，PostgreSQL\
  \ 就是不使用它。这时，熟悉其他支持优化器提示的系统的数据库开发者可能真的会开始怀念它们。然而，大多数情况下，并没有理由感到沮丧。PostgreSQL 拥有顶尖的优化器之一，在绝大多数情况下都会做出正确的选择。因此，很有可能存在一个合理的原因，并且通过检查执行计划是能够找到的。\n\
  \n让我们考虑一个例子。这个例子，以及后续章节中的一些例子，使用了较大的表。由于这些表的体积，它们没有包含在 `postgres_air` 发行版中。但这些表对于说明现实生活中可能遇到的情况是必要的。这里使用的是\
  \ `boarding_pass_large` 表，它与 `boarding_pass` 表结构相同，但包含的行数是后者的三倍——超过 75,000,000 张登机牌。为了创建一个更大的表以供实验，你可以将\
  \ `boarding_pass` 表的每一行插入三次。\n\n在 `postgres_air` 数据库中，当前日期是 2023 年 8 月 14 日。让我们选取过去一周办理登机手续的\
  \ 100 名乘客样本：\n\n```sql\nSELECT * FROM boarding_pass_large\nWHERE update_ts::date\
  \ BETWEEN '2023-08-07' AND '2023-08-14'\nLIMIT 100\n```\n\n不出所料，如图 5-24 所示的执行计划显示了一个顺序扫描。\n\
  \n```\n[Images/501585_2_En_5_Fig24_HTML.jpg]\n查询计划包含 3 行文本。各行内容包括 limit、在 boarding_pass\
  \ 上的 sequential scan 和 filter。\n图 5-24\n由于列转换导致的顺序扫描\n```\n\n没问题，我们已经讲过如何避免这个问题。我们不将时间戳转换为日期，而是使用一个区间：\n\
  \n```sql\nSELECT * FROM boarding_pass_large\nWHERE update_ts BETWEEN '2023-08-07'\
  \ AND '2023-08-15'\nLIMIT 100\n```\n\n然而，当我们检查执行计划时，发现它仍然在使用顺序扫描！\n\n为什么移除列转换后，PostgreSQL\
  \ 仍然没有使用索引？答案在图 5-25 中。这是该索引在大表上相对较高的选择性与 `LIMIT` 操作符的存在共同作用的结果。查询规划器估计指定的筛选条件将选出超过\
  \ 700,000 行，回想一下，这可能需要两倍的磁盘 I/O 操作。由于只需要 100 行，并且没有指定顺序，直接进行表的顺序扫描会更快。满足此条件的前一百条记录有更大的概率被更快地找到。\n\
  \n```\n[Images/501585_2_En_5_Fig25_HTML.jpg]\n查询计划包含 3 行文本。各行内容包括 limit、在 boarding_pass\
  \ 上的 sequential scan 和 filter。\n图 5-25\n由于高索引选择性导致的顺序扫描\n```\n\n如果这 100 条记录需要按特定顺序选出，情况就会不同。除非排序顺序是在索引属性上，否则\
  \ PostgreSQL 将需要选出*所有*记录，然后才能决定哪些是排在前面的。\n\n让我们修改 `SELECT` 语句，加入排序：\n\n```sql\n\
  SELECT * FROM boarding_pass_large\nWHERE update_ts BETWEEN '2023-08-07' AND '2023-08-15'\n\
  ORDER BY boarding_time\nLIMIT 100\n```\n\n现在执行计划（如图 5-26 所示）看起来大不相同了。\n\n```\n[Images/501585_2_En_5_Fig26_HTML.jpg]\n\
  查询计划包含 7 行文本。各行内容包括 limit、sort、sort key、在 boarding_pass 上的 bitmap heap scan、rechecked\
  \ condition、在 boarding_pass_large_update 上的 bitmap index scan 和 index condition。\n\
  图 5-26\n包含排序的执行计划\n```\n\n比较这两个查询的执行时间，顺序扫描的那个运行了 140 毫秒，而强制使用索引访问的那个运行了 620 毫秒，因此在这种情况下顺序扫描确实更高效。\n\
  \n## 让 PostgreSQL 做它该做的事！\n\n在本节中，我们将使用前几节中查询的几个修改版本来说明 PostgreSQL 如何根据数据统计信息修改执行计划。\n\
  \n我们希望到目前为止，已经有力地证明了优化器在大多数情况下都做得很对，而我们在大多数情况下的目标只是给它足够的灵活性来做出正确的选择。\n\n让我们回到上一节中对大表的查询：\n\
  \n```sql\nSELECT * FROM boarding_pass_large\nWHERE update_ts BETWEEN '2023-08-07'\
  \ AND '2023-08-15'\nLIMIT 100\n```\n\n这个查询的执行计划如图 5-25 所示，PostgreSQL 优化器选择了顺序扫描，因为七天的区间太大，无法从索引访问中获得任何好处。现在，让我们缩小时间区间：\n\
  \n```sql\nSELECT * FROM boarding_pass_large\nWHERE update_ts BETWEEN '2023-08-12'\
  \ AND '2023-08-15'\nLIMIT 100\n```\n\n图 5-27 中这个查询的执行计划显示使用了基于索引的访问。\n\n```\n[Images/501585_2_En_5_Fig27_HTML.jpg]\n\
  查询计划包含 3 行文本。各行内容包括 limit、使用 boarding_pass 的 index scan 和 index condition。\n图 5-27\n\
  当时间区间变小时，计划转为索引访问\n```\n\n继续检查不同的区间，我们会发现在这个案例中，八天是一个临界点。如果区间的开始日期是 8 月 7 日之后的任何日期，执行计划就会显示使用索引。\n\
  \n更有趣的是，如果从查询中移除 `LIMIT 100`，执行计划将显示索引扫描。如果我们将区间再增加一天，执行计划将转向位图扫描；如果再增加一天，它就会翻转为顺序扫描（参见图\
  \ 5-28、5-29 和 5-30 中相应的执行计划）。\n\n```\n[Images/501585_2_En_5_Fig30_HTML.jpg]\n查询计划包含\
  \ 2 行文本。各行内容包括在 boarding_pass_large 上的 sequential scan 和 filter。\n图 5-30\n使用顺序扫描的执行计划\n\
  ```\n\n```\n[Images/501585_2_En_5_Fig29_HTML.jpg]\n查询计划包含 4 行文本。各行内容包括在 boarding_pass_large\
  \ 上的 bitmap heap scan、rechecked condition、在 boarding_pass_large_update 上的 bitmap\
  \ index scan 和 index condition。\n图 5-29\n使用位图扫描的执行计划\n```\n\n```\n[Images/501585_2_En_5_Fig28_HTML.jpg]\n\
  一张截图显示了一个包含 2 行文本的查询计划。各行内容包括使用 boarding_pass_large_update 的 index scan 和 index\
  \ condition。顶部指示了不同的图标。\n图 5-28\n使用索引扫描的执行计划\n```\n\n让我们看另一个例子——清单 5-13 中的查询。我们观察到，根据乘客姓氏的选择性不同，连接顺序（以及应用索引的方式）也会改变。事实上，通过尝试不同的姓氏，可以识别出执行计划发生翻转时的选择性（大约\
  \ 200 次出现）。\n\n最后，让我们看一个相对简单的 SQL 语句。清单 5-15 中的三个 `SELECT` 语句除了每个搜索条件的过滤值不同外，其余完全相同。在第一个查询中，出发机场具有高选择性，乘客姓名具有低选择性。在第二个查询中，两个值都具有高选择性。在最后一个查询中，出发机场具有低选择性。如图\
  \ 5-31、5-32 和 5-33 所示的计划在连接算法、连接顺序和使用的索引上有所不同。\n\n\n\n## 代码清单 5-15 使用三组不同参数的 SELECT\
  \ 语句\n\n```sql\n--#1\nSELECT\np.last_name,\np.first_name\nFROM passenger p\nJOIN\
  \ boarding_pass bp USING (passenger_id)\nJOIN booking_Leg bl USING (booking_leg_id)\n\
  JOIN flight USING(flight_id)\nWHERE departure_airport='LAX'\nAND lower(last_name)='clark'\n\
  --#2\nSELECT\np.last_name,\np.first_name\nFROM passenger p\nJOIN boarding_pass bp\
  \ USING (passenger_id)\nJOIN booking_Leg bl USING (booking_leg_id)\nJOIN flight\
  \ USING(flight_id)\nWHERE departure_airport='LAX'\nAND lower(last_name)='smith'\n\
  --#3\nSELECT\np.last_name,\np.first_name\nFROM passenger p\nJOIN boarding_pass bp\
  \ USING (passenger_id)\nJOIN booking_Leg bl USING (booking_leg_id)\nJOIN flight\
  \ USING(flight_id)\nWHERE departure_airport='FUK'\nAND lower(last_name)='smith'\n\
  ```\n\n![](img/501585_2_En_5_Fig31_HTML.png)\n\n**图 5-31** 查询 #1 的执行计划\n\n一个查询计划由\
  \ 17 行组成。这些行表示哈希连接、哈希条件、嵌套循环、对 passenger 表的位图堆扫描、对乘客姓氏小写模式的位图索引扫描、索引条件和其他细节。\n\n\
  ![](img/501585_2_En_5_Fig32_HTML.png)\n\n**图 5-32** 查询 #2 的执行计划\n\n一个查询计划由 17 行文本组成。这些行表示哈希连接、哈希条件、嵌套循环、对\
  \ passenger 表的位图堆扫描、对乘客姓氏小写模式的位图索引扫描、登机牌上的乘客 ID、索引条件和其他细节。\n\n![](img/501585_2_En_5_Fig33_HTML.jpg)\n\
  \n**图 5-33** 查询 #3 的执行计划\n\n一个查询计划由 14 行文本组成。它高亮显示了第四行，该行表示对 flight 表的位图堆扫描，以及括号内的成本、行数和宽度等详细信息。\n\
  \n## 如何构建合适的索引\n\n在本章开头，我们在 `postgres_air` 模式中定义了一组最小索引集。几乎每次我们想要提高查询性能时，都会建议再构建一个索引。所有这些索引确实都有助于缩短执行时间。但从未讨论过的是，创建新索引是否需要额外的依据。\n\
  \n### 构建还是不构建\n\n二十年前，我们在决定是否添加又一个索引时要谨慎得多。反对创建过多索引的两个主要原因是：索引会占用数据库中的额外空间，以及当有太多索引需要与记录本身一起更新时，插入和更新操作会变慢。当时的普遍建议是在批量加载数据之前删除表上的所有索引，然后再重新创建它们。一些数据库教科书至今仍提供相同的建议——不是要删除索引，而是要注意表上索引的数量。\n\
  \n自那时起，时代已经改变。在当今的硬件和软件条件下，情况有所不同。磁盘存储更便宜，磁盘速度更快，而且总的来说，快速响应比节省磁盘空间更有价值。二十年前，数据库中某个表的索引累计大小超过表本身大小是一个危险信号。如今，这已成为\
  \ OLTP 系统的常态。但是，问题仍然存在：多少才算足够？\n\n### 需要哪些索引？\n\n要就哪些索引是必要的提供任何通用建议是具有挑战性的。在 OLTP\
  \ 系统中，响应时间通常至关重要，任何短查询都应该有索引支持。\n\n我们建议在有意义的情况下创建部分索引和覆盖索引。部分索引通常比常规索引小，更有可能完全驻留在内存中。覆盖索引避免了访问表的开销，从而允许引擎在内存中执行大部分处理。\n\
  \n插入和更新所需的额外时间通常不如快速响应那么关键。但是，您应该始终关注这个时间，如果检测到变慢，就评估索引清单。唯一/主键索引和引用其他唯一/主键字段的外键，以及插入/更新上的触发器，通常是导致变慢的常见原因。在每种情况下，您都需要权衡数据完整性与更新速度的重要性。\n\
  \n网上有许多查询可以计算每个表上索引的总大小，大多数监控工具都会在索引过度增长时发出警报。\n\n### 哪些索引是不需要的？\n\n尽管我们通常不关心索引所需的额外磁盘空间，但我们不希望创建无用的数据库对象。PostgreSQL\
  \ 的目录视图 `pg_stat_all_indexes` 显示了自上次重置统计信息以来索引被使用的总次数（扫描、读取和获取）。\n\n请注意，某些主键索引可能从未用于数据检索；然而，它们对于数据完整性至关重要，不应被移除。\n\
  \n## 索引与短查询的可扩展性\n\n在本节中，我们将讨论如何优化短查询，以便在数据量增长时它们仍能保持良好的性能。\n\n在第 1 章中，我们提到优化在查询投入生产后并未停止。我们应该持续监控性能，并主动识别性能动态的变化。\n\
  \n对于短查询，这种性能监控至关重要，因为当数据量增长时，查询行为可能会发生巨大变化，尤其是当不同表的增长速度不同时。\n\n当一个查询有索引支持时，至少可以保证它具有一定的可扩展性，因为对索引的访问次数相对于表的增长仅呈对数增长。但如果一个表的大小增长过快，索引可能变得太大而无法完全放入内存，或者可能被竞争查询的索引挤出内存。如果发生这种情况，执行时间可能会急剧增加。\n\
  \n有可能一开始某个查询在没有任何索引的情况下也能快速运行，而我们可能无法确切知道未来需要哪些索引。也有可能某个部分索引的条件最初非常严格，索引访问非常快，但后来，满足该条件的记录越来越多，索引的效率就降低了。\n\
  \n简而言之，尽管我们努力确保短查询具有可扩展性，并且即使数据量增长也能表现良好，但我们不能假设任何东西是“永远”优化的。我们应该始终关注数据量、值分布以及其他可能干扰性能的特征。\n\
  \n## 总结\n\n本章介绍了短查询以及可用于优化它们的技术。短查询的主要优化目标是首先应用最具限制性的搜索条件，并确保所有中间结果集保持较小。因此，本章讨论了索引在短查询中的作用，并展示了如何确定需要创建哪些索引来支持特定查询。\n\
  \n本章还展示了各种执行计划以及如何阅读它们以理解连接和过滤的顺序，并讨论了 PostgreSQL 中可用的各种索引类型及其适用场景。更复杂的索引类型将在第 14\
  \ 章深入探讨。\n\n\n\n"
- '# 6. 长查询与全表扫描


  第 5 章讨论了短查询，并解释了如何识别短查询以及适用于它们的优化策略与技术。它还涵盖了索引对于短查询的重要性、最常用的索引类型及其应用。第 5 章也提供了一个实践阅读执行计划的机会，并有望帮助你建立对
  PostgreSQL 优化器的信心。


  本章关注长查询。有些查询，无论写得多好，就是无法在零点几秒内运行完成。这并不意味着它们无法被优化。许多从业者认为，既然分析报表没有严格的响应时间要求，那么它们运行得快或慢并不重要。在极端情况下，报表开发者甚至不努力确保报表在合理时间内完成，借口是查询每天、每周或每月只运行一次。


  这是一种危险的做法。如果忽视报表性能，性能很容易从几分钟退化到几小时甚至更久。我们曾观察到有报表运行了六天才完成！等到情况变得如此严峻时，在有限的时间内修复并非易事。通常，在开发分析报表时，源数据量确实很小，一切表现良好。SQL
  开发者的职责是，即使查询目前运行良好，也要检查执行计划，并采取主动措施以防止未来性能下降。


  ## 哪些查询被视为长查询？


  第 5 章介绍了短查询的正式定义。可以合理地假设，所有非短查询都是长查询。这没错，但基于否定的定义在实践中可能不够直观。


  第 5 章中的两个长查询示例（清单 5-1 和 5-3）分别复制在下面的清单 6-1 和 6-2 中。两者中的第一个查询是结果集庞大的长查询；该查询返回了所有可能的出发和到达机场组合。第二个查询仅产生一行输出——显示
  `postgres_air` 模式中所有航班的平均飞行长度和乘客数量——但仍然被归类为长查询。


  清单 6-2：结果集只有一行的长查询


  ```sql

  SELECT

  avg(flight_length),

  avg (passengers)

  FROM

  (SELECT

  flight_no,

  scheduled_arrival -scheduled_departure AS flight_length,

  count(passenger_id) passengers

  FROM flight f

  JOIN booking_leg bl ON bl.flight_id = f.flight_id

  JOIN passenger p ON p.booking_id=bl.booking_id

  GROUP BY 1,2) a

  ```


  清单 6-1：结果集很大的长查询


  ```sql

  SELECT

  d.airport_code AS departure_airport

  a.airport_code AS arrival_airport

  FROM  airport a,

  airport d

  WHERE a.airport_code  d.airport_code

  ```


  那么，究竟什么是长查询？


  当一个查询对于至少一个大表具有高选择性时，即，即使输出规模很小，几乎每一行都对输出有贡献，该查询就被视为 *长查询*。


  对于长查询，我们应该设定什么样的优化目标？本章明确反驳的一个常见误解是，如果一个查询是长查询，就无法显著提升其性能。此外，每位合著者都有幸将长查询的性能提升 *数百倍*。当应用以下两种优化策略时，这种改进成为可能：


  1.  避免多次表扫描。

  2.  在尽可能早的阶段减少结果的大小。


  本章剩余部分将详细解释这些技术，并描述几种实现此目标的方法。


  ## 长查询与全表扫描


  第 5 章指出，短查询要求在搜索条件中包含的列上存在索引。对于长查询，情况恰恰相反：不需要索引，如果表有索引，我们要确保索引不被使用。


  为什么全表扫描对于长查询是可取的？如图 3-3 所示，当所需的行数足够大时，索引访问将需要更多的 I/O 操作。百分之多少或多少条记录算是“足够大”是变化的，并取决于许多不同的因素。时至今日，PostgreSQL
  在大多数时候都能正确估计这个百分比，应该不足为奇了。


  第 5 章对短查询也说过非常类似的话。但是，“多大算足够大”比“多小算足够小”更难估计。


  对于多少条记录算“太多”的估计，会随着更好的硬件、更快的磁盘和更强大的 CPU 的出现而演变。因此，本书尽量避免给出具体的数字阈值，因为这些阈值必然会变化。为了构成本章的代表性案例，我们构建了几个包含数亿行数据的表。这些表太大了，无法随
  `postgres_air` 一起分发。然而，如果几年后本章中的一些示例不再具有代表性，也无需感到惊讶。



  ## 长查询与哈希连接


  在本章的大多数示例中，都使用了哈希连接算法。这正是我们希望在长查询的执行计划中看到的。为什么在这种情况下哈希连接更可取呢？在第 3 章中，我们评估了嵌套循环和哈希连接算法的成本。


  对于嵌套循环，表 `R` 和 `S` 连接的成本是


  ```

  cost(nl,R,S)=size(R) * size(S)+size(R)*size(S)/size(JA)

  ```


  对于哈希连接，成本是


  ```

  cost(hash,R,S)=size(R)+size(S)+size(R)*size(S)/size(JA)

  ```


  其中 `JA` 表示连接属性的不同值数量。如第 3 章所述，应在两种算法的成本上都加上第三项，该项代表结果集的大小，但对于嵌套循环算法，这个值远小于连接本身的成本。对于长查询，`R`
  和 `S` 的规模很大（因为它们没有受到显著限制），这使得嵌套循环的成本显著高于哈希连接的成本。


  假设数据库统计信息估计表 `R` 的大小为 1,000,000 行，表 `S` 的大小为 2,000,000 行，连接属性 `JA` 有 100,000 个不同值。根据第
  3 章的公式，连接结果的大小将是


  ```

  Z=size(R) * size(S) / size(JA) =20,000,000

  ```


  那么，嵌套循环算法的操作次数将是


  ```

  Z+size(R)* size(S)=2,000,020,000,000

  ```


  而哈希连接算法所需的操作次数将是


  ```

  Z+size(R)+ size(S)==23,000,000

  ```


  这几乎小了 10,000 倍。优化器将基于类似的计算来估算这些算法的成本，当然会选择哈希连接算法。


  当第一个参数能完全放入主内存时，哈希连接的效果最好。可用内存的大小可以通过服务器参数进行调整。


  在某些情况下，会使用归并连接算法，例如本章后面图 6-10 中的情况。第 3 章指出，当至少有一个表是预排序的时，归并连接可能更高效。在这种情况下，由于正在选择唯一值，排序确实被执行了。


  总结第 5 章和本章的内容，大多数情况下，索引访问与嵌套循环算法配合良好（反之亦然），而顺序扫描与哈希连接配合良好。


  由于 PostgreSQL 没有优化器提示，是否有办法强制使用特定的连接算法呢？正如已经多次提到的，我们能做的最好的事情就是在编写 SQL 语句时不要限制优化器。


  ## 长查询与连接顺序


  第 5 章讨论了小查询的连接顺序。对于短查询，期望的连接顺序是能优先使用选择性较低的索引的顺序。


  既然我们不期望在长查询中使用索引，那么连接的顺序是否重要呢？也许令人惊讶的是，它确实重要。大型表的规模可能差异很大。此外，在实践中，当选择“几乎所有记录”时，“几乎”这个词可能意味着少至
  30%，多至 100%。即使不使用索引，连接的顺序也很重要，因为保持中间数据集尽可能小是至关重要的。


  限制性最强的连接（即能最大程度减少结果集大小的连接）应该最先执行。


  优化器通常会选择正确的顺序；然而，验证优化器是否选择正确是开发者的责任。


  ### 什么是半连接？


  通常，查询中限制性最强的连接是`半连接`。让我们稍作停顿，给出一个正式定义。


  两个表`R`和`S`之间的半连接，返回表`R`中那些在连接列上至少有一个来自表`S`的匹配行的行。


  需要澄清的是，半连接不是额外的 SQL 操作；编写类似`SELECT a.* FROM a SEMI JOIN b`这样的语句是无效的 SQL。半连接是一种特殊的连接，它满足两个特定条件：首先，只有来自第一个表的列出现在结果集中。其次，当第二个表中存在多个匹配时，第一个表中的行不会被重复。大多数情况下，半连接根本不包含`JOIN`关键字。指定半连接的第一种也是最常见的方法如代码清单
  6-3 所示。此查询查找所有至少有一个预订的航班的信息。


  ```

  SELECT * FROM flight f WHERE EXISTS

  (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

  代码清单 6-3

  使用 EXISTS 关键字定义半连接

  ```


  该查询使用与表`booking_leg`的隐式连接来过滤表`flight`中的记录。换句话说，我们不是提供用于过滤的值，而是使用另一个表中的列值。


  显示指定半连接的另一种等效查询方法如代码清单 6-4 所示。


  ```

  SELECT * FROM flight WHERE flight_id IN

  (SELECT flight_id FROM booking_leg)

  代码清单 6-4

  使用 IN 关键字定义半连接

  ```


  这些查询都没有使用`JOIN`关键字，它们如何包含连接呢？答案在于执行计划，两个查询的执行计划是相同的，如图 6-1 所示。


  ![](img/501585_2_En_6_Fig1_HTML.jpg)


  查询计划列表的截图。它包括嵌套循环半连接、对 flight f 的顺序扫描、仅索引扫描和索引条件。


  图 6-1


  半连接的执行计划


  你可以在这个计划中看到一个`SEMI JOIN`，尽管查询本身没有使用`JOIN`关键字。


  尽管这两种编写半连接查询的方式在语义上是相同的，但在 PostgreSQL 中，只有第一种能保证在执行计划中出现`SEMI JOIN`。代码清单 6-3 和 6-4
  中两个查询的计划是相同的，但在其他情况下，优化器可能会选择将其重写为常规连接。这个决定基于两个表之间的基数关系以及过滤器的选择性。


  ## 半连接与连接顺序


  由于半连接可能显著减小结果集的大小，且根据其定义绝不会增大结果集，因此半连接通常是查询中**限制性最强**的连接。如前所述，限制性最强的连接应最先执行。


  半连接绝不会增大结果集的大小；需检查首先应用它们是否有益。


  当然，这仅在半连接条件应用于单个表的列时才可能。当半连接条件引用多个表时，必须先连接这些表，然后再应用半连接。


  考虑代码清单 6-5 中的示例，它显示了从位于美国的机场出发的预订信息。


  ```sql

  SELECT departure_airport,

  booking_id,

  is_returning

  FROM booking_leg bl

  JOIN flight f USING (flight_id)

  WHERE departure_airport

  IN (SELECT

  airport_code

  FROM airport

  WHERE iso_country=''US'')

  ```

  *代码清单 6-5：存在半连接时的连接顺序*


  图 6-2 显示了此查询的执行计划。


  ![包含 10 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的顺序扫描以及过滤器。](img/501585_2_En_6_Fig2_HTML.jpg)

  *图 6-2：代码清单 6-5 中查询的执行计划*


  此执行计划未显示半连接操作，而是显示哈希连接，因为没有重复项需要移除。然而，它在逻辑上仍然是一个半连接，并且限制性最强，因此最先执行。这里也值得简要提一下对 `airport`
  表的顺序扫描。使用顺序扫描是因为 `iso_country` 字段上没有索引。让我们创建此索引，看看它是否会加速查询。


  如果此索引存在：


  ```sql

  CREATE INDEX airport_iso_country

  ON airport(iso_country);

  ```


  ……查询规划器将会使用它，如图 6-3 所示。然而，此时的执行时间与顺序扫描相同或更差，因为索引的选择性不够强。我们现在先删除此索引。


  ![包含带索引扫描的 12 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的位图堆扫描以及索引条件。](img/501585_2_En_6_Fig3_HTML.jpg)

  *图 6-3：带索引扫描的执行计划*


  ## 更多关于连接顺序


  让我们看一下代码清单 6-6 中一个更复杂的例子，这是一个包含多个半连接的长查询。此查询与上一个类似，查找从美国出发的航班的预订，但仅限于 2020 年 7 月
  1 日之后更新的预订。由于我们在 `booking` 表的 `update_ts` 列上没有索引，现在创建它并查看是否会被使用：


  ```sql

  SELECT

  departure_airport,

  booking_id,

  is_returning

  FROM booking_leg bl

  JOIN flight f USING (flight_id)

  WHERE departure_airport IN

  (SELECT airport_code

  FROM airport

  WHERE iso_country=''US'')

  AND bl.booking_id IN

  (SELECT booking_id FROM booking

  WHERE update_ts>''2023-07-01'')

  ```

  *代码清单 6-6：一个长查询中的两个半连接*


  ```sql

  CREATE INDEX booking_update_ts ON booking (update_ts);

  ```


  图 6-4 中的执行计划显示，对 `airport.iso_country` 的半连接最先执行。正如前面的代码一样，尽管我们使用了关键字 `IN`，优化器使用的是
  `JOIN` 而非 `SEMI JOIN`，因为无需消除重复项。


  ![包含 2 个半连接的 15 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的顺序扫描、对 booking
  的顺序扫描以及过滤器。](img/501585_2_En_6_Fig4_HTML.jpg)

  *图 6-4：带两个半连接的执行计划*


  此执行计划中有三点值得注意。首先，尽管使用了基于索引的访问来获取一些中间结果，并且我们在此情况下看到使用了嵌套循环连接算法，但最终的连接是基于哈希的，因为使用了两个数据集中的大部分数据。其次，半连接使用了表顺序扫描。即使这种方式我们读取了
  `airport` 表中的所有行，其结果集大小仍小于先连接航班与预订航段再根据机场位置进行过滤的结果集大小。这就是优化器选择限制性最强的半连接的益处。


  最后，尽管 `booking` 表的 `update_ts` 列上存在索引，但此索引未被使用，因为条件 `update_ts>''2023-07-01''` 覆盖了该表中几乎一半的行。


  但是，如果我们更改此查询（见代码清单 6-6）中的过滤条件，将时间间隔缩减为 `update_ts>''2023-08-10''`，执行计划将发生巨大变化——见图
  6-5。在这个新的执行计划中，我们看到不仅 `update_ts` 上的过滤器限制性更强，而且优化器判断使用索引访问可能是有益的。


  ![包含 2 个半连接且具有不同选择性的 15 行执行计划的屏幕截图。包括哈希连接、哈希条件、对 booking 的位图堆扫描以及索引条件。](img/501585_2_En_6_Fig5_HTML.jpg)

  *图 6-5：具有不同选择性的两个半连接的执行计划*


  在这种情况下，对 `booking` 表的索引访问是否确实是最佳选择？我们可以通过阻止索引访问来进行比较，方法是对 `update_ts` 列应用列转换，按以下方式重写过滤器：`coalesce(update_ts,
  ''2023-08-11'')> ''2023-08-10''`。


  如图 6-6 所示，这强制进行了顺序扫描。事实上，在较大时间间隔上，阻止索引并强制顺序扫描比索引访问执行得更好。随着进一步减小时间间隔，索引访问开始具有优势。''2023-08-07''
  似乎是一个转折点；对于从 ''2023-08-08'' 开始的所有日期，索引访问将工作得更好。


  ![包含强制全表扫描的 15 行程序代码的屏幕截图。包括哈希连接、哈希条件、对 flight f 的顺序扫描、对 airport 的顺序扫描、对 booking
  的顺序扫描以及过滤器。](img/501585_2_En_6_Fig6_HTML.jpg)

  *图 6-6：强制全表扫描*



  ### 什么是反连接？


  顾名思义，`反连接`是`半连接`的反面。形式化定义如下：


  两个表 `R` 和 `S` 之间的反连接，返回来自表 `R` 的行，这些行在连接列上没有来自表 `S` 的匹配值。


  与半连接的情况类似，并没有专门的 `反连接` 操作符。相反，带有反连接的查询可以用两种不同的方式编写，如清单 6-7 和 6-8 所示。这些查询返回没有预订的航班。


  ```sql

  SELECT * FROM flight WHERE flight_id NOT IN

  (SELECT flight_id FROM booking_leg)

  清单 6-8

  使用 NOT IN 定义反连接

  ```


  ```sql

  SELECT * FROM flight f WHERE NOT EXISTS

  (SELECT flight_id FROM booking_leg WHERE flight_id=f.flight_id)

  清单 6-7

  使用 NOT EXISTS 关键字定义反连接

  ```


  与半连接一样，尽管编写反连接查询的两种方式在语义上是等价的，但在 `PostgreSQL` 中，只有 `NOT EXISTS` 版本能在执行计划中保证使用反连接。图
  6-7 和 6-8 分别展示了清单 6-7 和 6-8 的执行计划。在这种特定情况下，两个查询的执行时间大致相同，带有反连接的计划只快一点点。对于哪种反连接语法更好，没有通用的指导方针。开发者应尝试两种方法，看看哪种在其用例中表现更佳。


  ![](img/501585_2_En_6_Fig8_HTML.jpg)


  一个 5 行执行计划的截图，不含反连接。包括在 `flight f` 上的顺序扫描、过滤、子计划 1、物化，以及在 booking 上的顺序扫描。


  图 6-8


  不含反连接的执行计划


  ![](img/501585_2_En_6_Fig7_HTML.jpg)


  一个 4 行执行计划的截图，包含反连接。包括嵌套循环反连接、在 `flight f` 上的顺序扫描、仅索引扫描和索引条件。


  图 6-7


  包含反连接的执行计划


  ### 使用 JOIN 操作符的半连接和反连接


  此时，细心的读者可能会想，为什么我们不能使用显式连接并精确指定我们需要的内容？为什么使用 `EXISTS` 和 `IN` 操作符？答案是这是可行的，并且在某些情况下，这可能确实比使用半连接是更好的解决方案。但这需要小心构建一个逻辑上等价的查询。


  清单 6-3 和 6-4 中的查询在语义上是等价的，但清单 6-9 不是。回顾一下，清单 6-3 和 6-4 返回至少有一个预订的航班的信息。


  ```sql

  SELECT f.*

  FROM flight f

  JOIN booking_leg bl USING (flight_id)

  清单 6-9

  返回重复项的连接

  ```


  相比之下，清单 6-9 将为每个航班返回与其对应 `flight_id` 的预订数量一样多的行。为了像原始查询那样，每个航班只返回一条记录，需要将其重写为清单
  6-10 所示。


  ```sql

  SELECT *

  FROM flight f

  JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

  清单 6-10

  使用连接为每个航班返回一行的查询

  ```


  此查询的执行计划如图 6-9 所示，它不包含半连接。


  ![](img/501585_2_En_6_Fig9_HTML.jpg)


  一个 6 行查询执行计划的截图。包括哈希连接、哈希条件、在 booking 上的仅索引扫描，以及在 `flight f` 上的顺序扫描。


  图 6-9


  清单 6-10 中查询的执行计划


  从这个执行计划中，无法明显看出此查询是否会比带半连接的查询更快或更慢。在实践中，它的运行速度比清单 6-3 中的查询快一倍以上。


  如果你只需要有预订的航班的 ID，运行清单 6-11 中的查询可能就足够了。


  ```sql

  SELECT flight_id

  FROM flight f

  JOIN (select distinct flight_id FROM booking_leg) bl USING (flight_id)

  清单 6-11

  使用连接只为每个航班返回一行 flight_id 的查询

  ```


  此查询的执行计划如图 6-10 所示，与图 6-9 中的有很大不同，执行速度更快。


  ![](img/501585_2_En_6_Fig10_HTML.jpg)


  一个 5 行执行计划的截图，包含合并连接。包括合并连接、合并条件、仅索引扫描和唯一操作。


