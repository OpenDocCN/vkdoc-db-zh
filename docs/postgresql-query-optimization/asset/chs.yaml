  \ int\n```\n\n代码清单 14-2\nPostgres Air 应用程序类\n\n值得一提的是，我们可以使用同一组表构建完全不同的传输对象。例如，在任何航班起飞前，必须生成一份名为舱单的文件。该文件列出了航班上的所有乘客及其座位分配。舱单的传输对象如图\
  \ 14-6 所示。\n\n![](img/501585_2_En_14_Fig6_HTML.jpg)\n\n传输对象的关系图。它展示了舱单记录和乘客记录的变量。\n\
  \n图 14-6\n\n航班舱单的传输对象\n\n对应的`JSON`如图 14-7 所示。\n\n![](img/501585_2_En_14_Fig7_HTML.jpg)\n\
  \n`JSON`代码截图。它展示了航班和登机牌的详细信息，用于在预订时检查到达机场代码`CDG`和起飞机场代码`JFK`。\n\n图 14-7\n\n作为`JSON`的舱单对象\n\
  \n## 从数据库视角看 NORM\n\n在`NORM`项目的早期，对其采用的唯一严重反对意见是需要手动创建所有数据操作函数。敏捷团队不想花费时间编写额外的代码，特别是当`ORM`几乎可以在没有人工干预的情况下生成功能相似的代码时。他们也不想在团队中增加额外的人员（数据库开发人员）。为了解决这些担忧，我们在`NORM`中添加了一个自动生成模块，我们称之为`NORM-GEN`。在本节中，我们将解释如何在数据库端生成类型和函数，而不是手动创建它们。为了实现这个目标，我们需要对我们的契约进行一个重要更改，即找到一种定义应用程序类与数据库对象之间映射的方法。\n\
  \n### 将`JSON`映射到数据库\n\n为了实现数据库对象的自动生成，我们通过一个`db_mapping`键扩展了`JSON`模式语法，该键可以为整个层次结构、一个对象或一个键指定。该映射指定了与`JSON`对象和键相对应的数据库模式、表名和列名，以及定义对象之间关系的主键和外键列。\n\
  \n代码清单 14-3 展示了如何为契约的一部分（即乘客对象）指定映射。该清单的第 4-7 行定义了与`JSON`对象对应的表、表的主键、父对象的主键，以及在转换为`JSON`之前在数据库中表示该对象的复杂数据类型的名称。当`JSON`键名与表列名一致时，可以省略较低级别对象的显式映射。\n\
  \n```json\n{\n    \"passenger\": {\n        \"type\": \"object\",\n        \"db_mapping\"\
  : {\n            \"pk_col\": \"passenger_id\",\n            \"db_table\": \"passenger\"\
  ,\n            \"record_type\": \"passenger_record\",\n            \"parent_fk_col\"\
  : \"booking_id\"\n        },\n        \"properties\": {\n            \"last_name\"\
  : {\n                \"type\": \"text\"\n            },\n            \"account_id\"\
  : {\n                \"type\": \"number\"\n            },\n            \"first_name\"\
  : {\n                \"type\": \"text\"\n            },\n            \"passenger_id\"\
  : {\n                \"type\": \"number\"\n            },\n            \"passenger_no\"\
  : {\n                \"type\": \"number\"\n            }\n        }\n    }\n}\n\
  ```\n\n代码清单 14-3\n乘客对象的数据库映射\n\n\n\n### 生成数据库代码\n\n该合约用于生成：\n\n*   以嵌套复杂对象和数组形式表示层次结构的数据库类型定义。\n\
  *   根据根对象的主键列表从数据库中选择完整层次结构的函数。该层次结构被构建为数据库复杂嵌套对象，然后转换为 JSON 格式。\n*   基于作为输入参数指定的搜索请求返回根对象键列表的函数。\n\
  *   对层次结构中的指定对象或其子对象执行修改操作的函数。可以在同一请求中插入、更新或删除多个对象和/或子对象。\n\n应用程序用于访问数据库的某些接口（包括\
  \ JDBC）不支持 JSON 作为数据类型。为了绕过这一点，JSON 在传输前被转换为文本字符串列表，并在传输后立即转换回 JSON。\n\n现在，让我们更具体地说明这是如何实现的。\n\
  \n清单 14-4 展示了为预订层次结构生成的类型定义。这些定义与清单 12-17 和 12-20 中的定义相似。\n\n我们定义了类型 `passenger_record`、`flight_record`\
  \ 和包含 `flight_record` 子对象的 `booking_leg_record`，然后是 `booking_record`，它以这些类型的数组作为组成部分。\n\
  \n```sql\n/* entering  : booking */\n/* entering  : passenger */\ndrop type if exists\
  \ norm.bh_passenger_record cascade;\ncreate type norm.bh_passenger_record as (\n\
  last_name  text,\naccount_id  int4,\nfirst_name  text,\npassenger_id  int4,\npassenger_no\
  \  int4\n);\n/* entering  : booking_leg */\n/* entering  : flight */\ndrop type\
  \ if exists norm.bh_flight_record cascade;\ncreate type norm.bh_flight_record as\
  \ (\nflight_no  text,\narrival_city  text,\ndeparture_city  text,\nscheduled_arrival\
  \  timestamptz,\nscheduled_departure  timestamptz,\narrival_airport_code  bpchar,\n\
  arrival_airport_name  text,\ndeparture_airport_code  bpchar,\ndeparture_airport_name\
  \  text\n);\ndrop type if exists norm.bh_booking_leg_record cascade;\ncreate type\
  \ norm.bh_booking_leg_record as (\nflight_id  int4,\nflight  norm.bh_flight_record,\n\
  leg_num  int4,\nbooking_leg_id  int4\n);\ndrop type if exists norm.bh_booking_record\
  \ cascade;\ncreate type norm.bh_booking_record as (\nbooking_id  int8,\npassengers\
  \  norm.bh_passenger_record[],\nbooking_legs  norm.bh_booking_leg_record[],\nbooking_reference\
  \  text\n);\n```\n\n清单 14-4 预订类型定义\n\n查看这些类型定义，可以清楚地看到它们确实表示了图 14-4 中的传输对象 `booking`。\n\
  \n### 从数据库获取数据\n\n合约要求应用程序应以尽可能少的与数据库交互的次数接收所有需要的数据。通常，应用程序应接收一组完整的层次结构。这意味着返回数据的结构取决于层次结构的定义，而不是具体的查询。清单\
  \ 14-5 显示了为预订层次结构生成的 SELECT 子句。\n\n```sql\n/* selecting booking_hierarchy booking\
  \ */\nselect\narray_agg(\n/* Entering booking_record */\nrow(top.booking_id  ,\n\
  (\nselect array_agg(  /* Entering passenger_record */\nrow(passengers.last_name\
  \  ,\npassengers.account_id  ,\npassengers.first_name  ,\npassengers.passenger_id\
  \  ,\npassengers.passenger_no)::norm.bh_passenger_record)\nfrom  postgres_air.passenger\
  \  passengers\nwhere  top.booking_id = passengers.booking_id\n)\n,\n(\nselect array_agg(\
  \  /* Entering booking_leg_record */\nrow(booking_legs.flight_id  ,\n(\nselect \
  \ (  /* Entering flight_record */\nrow(flight.flight_no  ,\narrival.city  ,\ndeparture.city\
  \  ,\nflight.scheduled_arrival  ,\nflight.scheduled_departure  ,\nflight.arrival_airport\
  \  ,\narrival.airport_name  ,\nflight.departure_airport  ,\ndeparture.airport_name)::norm.bh_flight_record)\n\
  from  postgres_air.flight  flight\njoin postgres_air.airport departure on  departure.airport_code\
  \ = flight.departure_airport\njoin postgres_air.airport arrival on  arrival.airport_code\
  \ = flight.arrival_airport\nwhere  booking_legs.flight_id = flight.flight_id\n)\n\
  ,\nbooking_legs.leg_num  ,\nbooking_legs.booking_leg_id)::norm.bh_booking_leg_record)\n\
  from  postgres_air.booking_leg  booking_legs\nwhere  top.booking_id = booking_legs.booking_id\n\
  )\n,\ntop.booking_ref)::norm.bh_booking_record)\nfrom  postgres_air.booking  top\n\
  ```\n\n清单 14-5 生成的 SELECT 子句\n\n清单 14-5 中显示的 SELECT 子句返回一个包含嵌套复杂对象的 PostgreSQL 数组。此输出通过一次调用\
  \ `to_json` 函数转换为 JSON 格式。\n\n与 SELECT 子句相反，过滤条件取决于应用程序的具体需求，因此每次查询都需要。NORM 接受 JSON\
  \ 格式的搜索条件，这种格式类似于某些面向 JSON 的系统中找到的格式。然而，NORM 既不提供这些语言的完整功能，甚至也不提供它们的子集。本质上，NORM\
  \ 支持在 JSON 合约中任何层次级别的任何标量键上进行基本的比较操作。搜索条件的示例如清单 14-6 所示。\n\n```json\n{\n  \"booking_hierarchy\"\
  :{\n    \"departure_airport_code\":\"ORD\",\n    \"arrival_city\":{\"$like\":\"\
  NEW%\"},\n    \"last_name\":\"Smith\"\n  }\n}\n```\n\n清单 14-6 JSON 格式的搜索条件\n\n此搜索将返回所有包含姓氏为“Smith”的乘客且包含一个航段，该航段的航班从\
  \ ORD 飞往任何名称以“NEW”开头的城市的预订记录。对于所有这些预订，结果中将包含所有乘客和所有航段。\n\n请注意，搜索条件不能包含任何连接操作，因为对象之间的关系已在层次结构中定义。如果需要更多关系，则必须定义另一个层次结构。清单\
  \ 14-7 显示了为此搜索生成的 SQL 代码。\n\n```sql\nbooking_id IN (\nselect booking_id from postgres_air.booking_leg\
  \ where\nflight_id IN (\nselect flight_id from postgres_air.flight where\narrival_airport\
  \ IN (\nselect airport_code from postgres_air.airport where\ncity  LIKE  ('NEW%'::text)\
  \ )\nAND  departure_airport  =  ('ORD'::bpchar) ) )\nAND  booking_id IN (\nselect\
  \ booking_id from postgres_air.passenger where\nlast_name  =  (Smith::text) )\n\
  ```\n\n清单 14-7 生成的过滤条件\n\n此生成的代码被包装在构建完整查询并执行它的函数中。请注意，此生成的代码类似于第 12 章中讨论并显示在清单\
  \ 12-21 中的代码。\n\n\n\n## 修改数据库中的数据\n\n`NORM` 可以处理任何数据操作，即 `INSERT`、`UPDATE` 和 `DELETE`，这些操作统称为更新请求。\n\
  \n一个更新请求由应用程序作为一个复杂对象发送，在数据库层面，可能会导致对多个表执行多个更新操作。重申一次，数据库开发是契约驱动的。一个数据库函数从应用程序接收一个\
  \ JSON 对象，解析该对象，并解释在数据库层面需要执行的操作。\n\n`NORM` 方法旨在减少数据库操作的数量。当然，不可能用单条 SQL 语句更新多个表，因此\
  \ `NORM` 需要为一个更新请求执行多条 SQL 语句。然而，它会从更新请求的多个子对象中收集数据，以便对于可以通过层次结构修改的每个表，最多执行一条 `DELETE`、一条\
  \ `UPDATE` 和两条 `INSERT` 语句，无论该更新请求修改了多少层级和子对象。\n\n生成的 `NORM` 代码基于以下假设：所有表都有单列主键，并且在插入新行时主键值会自动分配。\n\
  \n一个更新请求作为符合契约模式并满足一些附加规则的层级结构的 JSON 数组从应用程序发送：\n\n-   如果层次结构中任何级别的对象不包含映射到主键的键，则该对象及其所有子对象将被插入到相应的表中。\n\
  -   如果一个对象包含主键值以及一个附加键 `\"cmd\":\"DELETE\"`，那么该对象及其所有子对象将从数据库中删除。\n-   如果一个对象包含主键但不包含\
  \ `\"cmd\"` 键，则该对象其他键的值将用于 `UPDATE` 操作。\n\n清单 14-8 展示了一个更新请求的示例。此请求中指定的修改从业务角度来看不一定有意义；然而，它们说明了如何指定修改。\n\
  \n```json\n[\n    {\n        \"booking_id\": 556470,\n        \"cmd\": \"DELETE\"\
  \n    },\n    {\n        \"passengers\": [\n            {\n                \"last_name\"\
  : \"Jones\",\n                \"account_id\": 238648,\n                \"first_name\"\
  : \"Lucy\"\n            }\n        ],\n        \"booking_legs\": [\n           \
  \ {\n                \"leg_num\": 1,\n                \"flight_id\": 558238\n  \
  \          },\n            {\n                \"leg_num\": 2,\n                \"\
  flight_id\": 563410\n            }\n        ],\n        \"booking_reference\": \"\
  IYZI42\"\n    },\n    {\n        \"booking_id\": 3974917,\n        \"passengers\"\
  : [\n            {\n                \"cmd\": \"DELETE\",\n                \"passenger_id\"\
  : 11479596\n            },\n            {\n                \"last_name\": \"SCOTT\"\
  ,\n                \"first_name\": \"MILES\",\n                \"passenger_id\"\
  : 11479599\n            }\n        ],\n        \"booking_legs\": [\n           \
  \ {\n                \"flight_id\": 432724,\n                \"booking_leg_id\"\
  : 11453272\n            },\n            {\n                \"flight_id\": 427273,\n\
  \                \"booking_leg_id\": 11453273\n            }\n        ]\n    },\n\
  \    {\n        \"booking_id\": 2733047,\n        \"booking_reference\": \"Q8JX22\"\
  \n    }\n]\n```\n\n**清单 14-8**\n一个更新请求的示例\n\n清单 14-8 所示的更新请求要求执行以下操作：\n\n-   删除整个预订（第\
  \ 2-5 行）。\n-   插入一个新预订（第 6-25 行）。\n-   删除一名乘客，更新另一名乘客的名和姓，并更改两个 `booking_leg` 条目中的航班（第\
  \ 26-49 行）。\n-   更新一个预订中的预订参考号（第 50-53 行）。\n\n为了支持更新请求，`NORM` 为每个表生成几个包含 SQL `DML`\
  \ 操作的函数，以及一个名为 `TO_DB` 的函数。`TO_DB` 函数接受更新请求，并根据需要调用所有其他函数来执行请求的修改。该函数返回在执行更新请求期间触及的所有层次结构的顶级对象的主键列表。\n\
  \n生成的代码太长，无法包含在本书中，但可以在 GitHub 上的 `NORM` 仓库中找到。\n\n## 为什么不直接存储 JSON？！\n\n此时，你可能想知道，既然\
  \ PostgreSQL 支持 `JSON` 类型，我们为什么要如此麻烦？为什么不直接“原样”存储 `JSON` 呢？\n\n第 9 章已经讨论过一些原因。特别是，第\
  \ 9 章讨论了键值模型和层次模型，并解释了它们的局限性。如果将本章定义的预订航段作为 `JSON` 对象存储，航班信息将会重复，因为它属于不同的层次结构。另一个原因是\
  \ `JSON` 是无类型的，因此在提供一致的开发接口方面是不可靠的。\n\n此外，尽管我们可以构建索引以方便对特定 `JSON` 键进行搜索，但其性能比常规列上的\
  \ `B-tree` 索引要差。对 `JSON` 索引及相关性能问题将在第 15 章中介绍。\n\n## 性能提升\n\n使用 `NORM` 对性能有什么影响？正如第\
  \ 11 章所讨论的，这种性能差异很难进行基准测试。我们需要测量应用程序的整体性能，而不是比较单独操作的速度，而在这种情况下，应用程序本身的编写风格差异很大。由于超出了本书的范围，本章不提供任何应用程序代码示例。\n\
  \n然而，根据我们的行业经验，用这种方法替代传统的 `ORM`，可以将应用程序控制器的性能提高 10 到 50 倍。此外，应用程序性能似乎更加一致，因为它避免了\
  \ `N+1 问题`（即，当代码需要加载父-child 关系中的子记录时：大多数 `ORM` 默认启用延迟加载，因此会为父记录发出一次查询，然后为每个子记录发出一次查询）。\n\
  \n## 与应用程序开发人员协同工作\n\n正如多次讨论过的，整体系统性能不仅仅局限于数据库性能，优化始于需求收集。`NORM` 是这一论点的绝佳例证。\n\n\
  使用 `NORM`，开发从定义契约开始，这使得应用程序和数据库开发人员可以并行开展他们的任务。此外，这种契约意味着未来可以在不更改应用程序的情况下，在数据库端进行性能优化。\n\
  \n## 总结\n\n`NORM` 是一种应用程序设计和开发方法，它允许后端与数据层之间的无缝数据交换，从而消除了对 `ORM` 的需求。始终如一地应用它，有助于构建高性能系统，同时简化应用程序开发。\n\
  \n`NORM` 是几种潜在的解决方案之一；然而，它拥有经过验证的成功记录，可以作为那些希望避免 `ORM` 潜在缺陷的人的模板。\n\n"
- '# 15. 更复杂的过滤与搜索


  前面的章节讨论了几种在 PostgreSQL 中使用索引支持过滤和搜索的方法。为什么还需要更多？为什么之前没有介绍这些索引？先前关于这个话题的讨论集中在最常见的索引上，即几乎所有应用程序都需要的那些。然而，有些数据类型无法用
  `B-tree` 等索引来高效支持。



  ## 全文搜索


  前面章节讨论的所有内容都适用于结构化数据，并且迄今为止考虑的所有查询都是布尔型的。也就是说，一行数据要么需要用于计算结果，要么不需要；计算出的行要么属于输出，要么不属于。不存在中间状态。SQL
  是一种用于处理结构化数据的强大语言，非常适用于这类分析。


  在本节中，我们将探讨非结构化数据。最常见的非结构化数据例子是用自然语言写成的文本。这类文本通常被称为 `document`（文档）。与结构化数据不同，文档搜索总是不精确的，因为我们通常感兴趣的是文档的含义，而这种含义并未在文档内容中精确表达。然而，搜索标准必须在查询中精确表达。欢迎来到不确定的世界！


  文档搜索有几种不同的模型；PostgreSQL 中实现的模型称为布尔模型。请注意，现代互联网搜索引擎使用更复杂的模型。


  在布尔搜索模型中，一个文档被视为一个 `terms`（词项）列表。每个词项通常对应文档中的一个单词，但会使用特定的语言工具进行转换。这种转换是为了提高搜索质量所必需的。例如，我们期望单词
  “word” 和 “words” 应映射到同一个词项。这些转换并非易事：“a leaf” 和 “leaves” 是同一个单词的不同形式；然而，“to leave”
  则是不同的。而且这不仅仅是词形变化：含义取决于上下文。例如，在描述网络协议的文档中，“host” 和 “computer” 具有相同的含义，但在与组织会议相关的文档中，这些词是不同的。


  在 PostgreSQL 中，定义这些转换的语言规则被封装在一个 `configuration`（配置）中。有几种针对不同语言的预定义配置可用，也可以定义额外的配置。其中一个预定义配置不依赖于任何语言。


  这种语言处理的输出表示为 `ts_vector` 类型的值。`ts_vector` 的值是词项列表，与任何语言甚至文本无关。一个 `ts_vector` 可以从任何值列表构建。


  为什么文本搜索被称为 `full text search`（全文搜索）？在黑暗时代（20 世纪 70 年代），硬盘容量很小，词项列表是从标题或摘要中构建的。因此，全文意味着文档中的所有单词都被视为词项的来源。


  类似地，文档搜索的查询表示为 `ts_query` 类型的值。这些值由查询的文本表示构造而成，该表示可以包含单词以及逻辑运算符 `AND`、`OR` 和 `NOT`。一个简单的查询仅由单词组成（单词之间隐含着
  `AND`）。


  查询中的一个词项（单词）如果存在于文档中则产生 `true`，否则产生 `false`。词项的布尔值使用查询中包含的运算符组合成一个布尔值。对于仅包含词项的简单查询，如果查询中的所有词项都存在于文档对应的
  `ts_vector` 中，则该文档匹配。


  匹配运算符 `@@` 如果文档满足查询则返回 `true`，否则返回 `false`。它可以用在 `SELECT` 语句的 `WHERE` 子句中，或任何需要布尔表达式的地方。


  布尔搜索产生明确的结果：文档要么匹配查询，要么不匹配。这仍然不确定吗？是的，仍然不确定。当文档转换为 `ts_vector` 时，一些信息会丢失；当查询转换为
  `ts_query` 时，一些信息同样会丢失。


  PostgreSQL 的全文搜索功能可以在没有任何索引的情况下工作。PostgreSQL 也提供了可以加速文本搜索的特殊索引类型。我们将在本章后面讨论这些索引类型。


  ## 多维和空间搜索


  前面章节考虑的过滤条件使用了标量属性。某些类型的索引，例如复合索引，可能包含多个属性，但属性的顺序至关重要：如果未指定第一个属性的值，索引就毫无用处。


  对于某些应用程序和数据类型来说，属性的固定顺序是不理想的。这些应用程序要求对多个属性进行对称处理，不偏向任何特定属性。典型的例子是平面或三维空间中具有坐标属性的对象。这类数据被统称为空间数据。


  更重要的是，空间数据通常需要不同类型的查询。最常见的查询是：

  *   *范围查询* – 查找位于空间中某指定点一定距离内或更近的所有对象。

  *   *最近邻查询* – 查找最接近指定点的 k 个对象。

  即使使用多个索引，这些查询也无法通过一维索引来支持。


  当然，这类搜索不仅限于空间。坐标可以带有时间戳值，甚至是离散域中的值。


  PostgreSQL 提供了适合空间数据的索引类型。这些索引将在下一节简要讨论。


  ## PostgreSQL 中的广义索引类型


  `CREATE INDEX` 操作符在创建索引时包含一个可选的索引类型。到目前为止，前面的例子中尚未演示这一点，因为之前创建的所有索引都是 B-tree 索引，而
  B-tree 是索引类型的默认值。其他可能的值（在撰写本文时）包括 `hash`、`GIST`、`spgist`、`GIN`、`BRIN` 以及用户定义类型（如果已安装）。


  本节将更详细地讨论其中一些类型。


  ### GIST 索引


  一些应用程序使用多属性对象，例如在表面或平面上具有坐标的点。之前我们讨论了包含多个属性的复合索引。然而，复合索引不是对称的：属性是有序的。相比之下，点的坐标应该被对称处理。


  GIST 是一个索引结构家族，其中的每一个都支持特定的数据类型，并且可以配置为实现几种不同的基于树的索引结构。具体来说，它为空间数据实现了称为 R 树 的索引结构。PostgreSQL
  发行版包含了对 R 树 和其他几种索引的支持；更多类型可以作为扩展安装。


  作为 `GIST` 索引类型实现的 R 树 正是此处所需：它为空间对象（如点和矩形）建立索引。形状更复杂的对象在索引中使用矩形边界框表示。搜索条件用矩形表示。所有与搜索矩形相交的对象都作为搜索结果返回。


  当然，包含在 `GIST` 索引中的属性不一定是坐标。这些属性也可以表示时间或其他有序数据类型。


  ### 全文搜索的索引


  PostgreSQL 提供了两种可用于支持文本搜索的索引类型。首先考虑 `GIN` 索引，其中 `GIN` 代表广义倒排索引（Generalized Inverted
  Index）。


  就索引而言，一个文档被视为一个词条（或词元）列表，例如前面讨论过的 `ts_vector` 数据类型的值。


  对于至少出现在一个文档中的每个词条，倒排索引包含一个包含该词条的文档列表。因此，整体结构是对称的：一个文档有一个词条列表，而一个词条有一个文档列表。这种对称性解释了为什么这种索引类型被称为“倒排”。


  倒排索引可以高效地支持文本搜索。例如，要查找包含查询中指定的所有词条的文档，PostgreSQL 会扫描这些词条的所有文档列表，并只保留出现在查询中所有词条列表中的文档。这些列表是有序的，因此只需对列表进行一次遍历就足以生成结果集。


  `GIN` 索引可以作为函数索引创建，其表达式将被索引的文档转换为 `ts_vector`，或者 `ts_vector` 的值可以作为单独的列存储。前者的优点是占用空间较少，后者的优点是索引不依赖于配置（因为配置仅用于计算
  `ts_vector` 的值）。如果存储了 `ts_vector` 的值，索引可以引用用不同自然语言编写并使用不同配置转换为 `ts_vector` 的文档。通常，预计算的
  `ts_vector` 性能会更好，但这始终取决于用于生成向量的函数和系统配置。


  `GIN` 的结构并非源自自然语言或与之相关；如前所述，它将文档视为列表。因此，它可以处理文档以外的数据——实际上，任何包含多个值的属性类型都可以，例如数组。`GIN`
  索引会找到所有包含查询中指定的所有值的多值属性的行，就像它找到包含指定词条的所有文档一样。


  文档（`ts_vector` 类型的值）也可以用 `GIST` 进行索引。要构建这样的索引，`ts_vector` 的值会被转换为固定长度的位图。为了构造位图，出现在任何被索引文档中的每个词条都会被哈希处理，以获取一个代表其在位图中位置的数字。每个词条都是一个相同长度的位图，其中只有一位等于
  1（代表该词条），所有其他位都设置为零。一个文档的位图是该文档中所有代表词条的位图的按位逻辑 `OR` 运算结果。因此，文档位图在出现在该文档中的词条对应的所有位置上都有一位等于
  1。查询位图以类似方式构造。


  基于此索引的搜索基于以下事实：如果文档的位图在查询位图有 1 的每个位置上都包含 1，则该文档满足查询。


  不同的词条可能被哈希到相同的位置。因此，`GIST` 索引可能返回与查询无关的文档；通常需要重新检查 `ts_vector` 值，但 PostgreSQL 可以自动识别这一点。


  随着不同词条数量的增加，错误匹配的数量也会增加。因此，`GIST` 索引对于不同词条总数较小的文档集合是高效的。这在自然语言文本中并不常见，所以 `GIN` 索引在这种情况下通常更高效。用于文本搜索的
  `GIST` 索引在特殊情况下仍然有用。


  ### 索引非常大的表


  任何索引都会占用一定空间，大表上的索引可能非常大。是否有可能减小索引的大小？


  数据库教科书区分了稠密索引和稀疏索引。到目前为止介绍的所有索引都是稠密的；也就是说，它们包含被索引列（或列）的所有值。稀疏索引只包含所有值的一小部分，但仍然减少了查找被索引属性任何值所需的读取次数。这与不加速搜索未包含在索引中的值的条件索引不同。


  一些数据库系统总是按照（代理）主键的顺序存储表行。主键上的索引然后可以为每个表块只包含一个值，因此它可以是一个稀疏索引。更高级的数据库系统支持基于其他属性值对表进行排序，这些值不一定需要是唯一的。这种表组织方式也为稀疏索引提供了条件。有时这些索引被称为聚簇索引，因为具有被索引列相同值的行被放置在一起。


  PostgreSQL 没有提供任何显式控制行顺序的方法。然而，在许多情况下，行是自然排序的。例如，记录特定类型事件的行很可能会附加到表中，并且会自然地按照到达时间戳排序，这使得稀疏索引成为可能。


  PostgreSQL 中实现的稀疏索引的泛化形式称为 `BRIN`（块范围索引）。创建了 `BRIN` 索引的表被视为一系列块范围，每个范围由固定数量的相邻块组成。对于每个范围，`BRIN`
  索引条目包含该块范围中包含的列值的摘要。例如，摘要可能包含事件日志表中时间戳列的最小值和最大值。


  要查找被索引属性的任何值，只需找到适当的块范围（使用索引），然后扫描该范围内的所有块即可。


  摘要方法的结构取决于被索引列的类型。对于区间，摘要可能是一个包含块范围中所有区间的区间。对于空间数据，摘要可以是一个包含块范围中所有框的边界框。


  如果列值未排序或行在表中未排序，扫描 `BRIN` 索引将返回多个需要扫描的块范围。


  摘要操作是昂贵的。因此，PostgreSQL 为 `BRIN` 索引维护提供了多种选择：`BRIN` 索引可以通过触发器自动更新；或者，延迟的摘要可以自动与 vacuum
  操作一起完成，也可以手动启动。


  '
- '# 第 16 章 终极优化算法


  ## JSON 与 JSONB 的索引


  有时，为了寻求灵活性，开发者会将表行转换为文本或半结构化格式（`JSON`或`XML`），然后使用文本搜索而非更特定的索引。这种方法当然比外部索引工具更好，但速度明显慢于特定索引。


  回到我们在第 14 章末尾提出的问题：既然我们可以直接将`JSON`类型存储在数据库中，为什么还要费心构建函数将搜索结果转换为`JSON`呢？


  让我们看看这种方法在实践中如何运作。为此，我们来构建一个将预订信息存储为`JSON`对象的表。我们遇到的第一个问题是，不同的应用程序端点可能需要不同的`JSON`结构（我们已经在第
  12 至 14 章中构建了几种不同的记录类型）。但让我们假设我们可以整合不同的需求，并以能满足大多数用例的方式存储数据。我们可以使用清单 15-1 中的代码。


  ```sql

  --创建简化的预订航段记录类型

  CREATE TYPE booking_leg_record_2 AS

  (booking_leg_id integer,

  leg_num integer,

  booking_id integer,

  flight flight_record);

  --创建简化的预订记录类型

  CREATE TYPE booking_record_2 AS

  (     booking_id integer,

  booking_ref text,

  booking_name text,

  email text,

  account_id integer,

  booking_legs booking_leg_record_2[],

  passengers passenger_record[]

  );

  ---创建表

  CREATE TABLE booking_jsonb AS

  SELECT  b.booking_id,

  to_jsonb ( row (

  b.booking_id,  b.booking_ref,  b.booking_name, b.email, b.account_id,

  ls.legs,

  ps.passengers

  ) :: booking_record_2 ) as cplx_booking

  FROM booking b

  JOIN

  (SELECT booking_id,    array_agg(row (

  booking_leg_id, leg_num, booking_id,

  row(f.flight_id, flight_no, departure_airport,

  dep.airport_name,

  arrival_airport,

  arv.airport_name,

  scheduled_departure, scheduled_arrival

  )::flight_record

  )::booking_leg_record_2)  legs

  FROM  booking_leg l

  JOIN flight  f   ON  f.flight_id = l.flight_id

  JOIN   airport dep  ON dep.airport_code =  f.departure_airport

  JOIN   airport arv  ON arv.airport_code =  f.arrival_airport

  GROUP BY booking_id)  ls

  ON b.booking_id = ls.booking_id

  JOIN

  ( SELECT    booking_id,

  array_agg(

  row(passenger_id, booking_id, passenger_no, last_name, first_name):: passenger_record)  as
  passengers

  FROM passenger

  GROUP by booking_id) ps

  ON ls.booking_id = ps.booking_id

  ) ;

  ```

  清单 15-1

  构建一个包含`JSONB`列类型的表


  请注意，我们创建表时使用的是`JSONB`（`JSON`二进制）列类型，而不是`JSON`。这些类型之间的唯一区别在于，`JSONB`存储的是`JSON`数据的二进制表示形式，而非字符串。对于`JSON`类型，你能构建的唯一索引是针对特定标签的
  B 树索引，然后你需要指定完整的路径，包括数组中的索引，这使得例如索引“任意”预订航段变得不可能。


  如果我们想在`JSON`列上构建高性能的索引，就需要使用`JSONB`类型。


  构建这个表需要一些时间。构建一个 GIN 索引也需要一些时间：


  ```sql

  CREATE INDEX idxgin ON booking_jsonb USING GIN (cplx_booking);

  ```


  然而，在这个索引创建之后，感觉我们所有的问题都解决了。现在我们可以使用简单的查询来检索所有需要的数据，无需任何连接和任何复杂的结构构建，如清单 15-2 所示。


  ```sql

  SELECT  *

  FROM  booking_jsonb

  WHERE

  cplx_booking @@ ''$.**.departure_airport_code == "ORD" && $.**.arrival_airport_code
  == "JFK"''

  ```

  清单 15-2

  使用`JSONB`列上的 GIN 索引进行搜索


  图 15-1 中的执行计划证明使用了 GIN 索引。


  ![](img/501585_2_En_15_Fig1_HTML.jpg)


  一个查询计划的截图。它有 4 行代码，用于在预订期间检查出发机场代码 O R D 和到达机场代码 J F K。


  图 15-1

  带有 GIN 索引的执行计划


  有几个问题使得这种方法不如乍看之下那么吸引人。首先，这种搜索仍然比使用 B 树索引的搜索慢。使用第 14 章描述的技术生成的搜索函数能产生相同的结果，但速度快了两到五倍。


  其次，GIN 索引不支持对日期时间属性的搜索，也不支持使用`like`运算符的搜索，或者对任何转换后的属性值（如`lower()`）的搜索。你可以在`WHERE`子句中使用`json_path`表达式和`JSONB`运算符及函数来指定几个复杂的搜索条件（包括正则表达式），但这些条件将通过堆扫描来检查。一个好主意是将这些条件与那些支持索引的条件结合起来。


  实际上，我们见过一个这样构建的生产系统：来自多个表/模式的数据被用来创建`JSON`类型的“搜索文档”，然后添加了`ts_vector`列并为其创建了索引。


  然而，这种方法还有第三个问题。如前所述，一个`JSON`结构只能支持一个层次结构。如果我们按照前面的描述构建了`booking_jsonb`列，我们可以相对容易地更新预订航段中的航班，但我们无法更新实际的出发时间或航班状态。


  这意味着`booking_jsonb`表必须定期重建才能保持有用。事实上，前面提到的那个生产系统有一个复杂的触发器序列，用于重建所有可能受影响的`JSON`数据。在预期更新数量相对较低的情况下，这个限制可能并不关键，但对于航班延误和时刻表变更的情况则并非如此。


  ## 小结


  PostgreSQL 拥有多种不同的索引。本书涵盖了许多种，但并非全部；几乎每个新版本都会出现新的索引类型。如果在本章撰写完成到本书出版期间发布了新的索引，也不足为奇。


  第 5 章和本章都提供了许多示例，说明如何为支持不同的搜索选择正确的索引。为你的系统、针对特定搜索选择最合适的索引并非一项简单的任务。不要止步于为单个列创建 B
  树索引。你需要复合索引吗？函数索引？GIST 索引能帮助你解决问题吗？这个特定查询的响应时间有多关键？这个特定索引对更新的影响有多大？只有你能回答这些问题。


  前面的章节涵盖了大量的优化技术：不仅包括优化`SQL`语句的不同方法，还包括数据库设计如何影响性能、与应用程序开发人员协作的重要性、函数的使用以及数据库性能的许多其他方面。


  尽管如此，引言中提出的问题仍然存在：当你遇到一个现实世界的问题，当你的用户看到沙漏图标而你却不知缘由时，该从何处着手？一个相关但更具挑战性的任务是弄清楚从一开始该做什么。你还没有遇到问题。你有一个任务，可能是一个查询草案，或者你很幸运拥有详细的需求。你如何确保自己做的是对的？


  在本章中，我们将提供一个分步指南，帮助你立即正确地编写查询，并在有选择时，选择适合你的数据库设计。



  ## 主要步骤


  图 16-1 展示了一个建议用于确定针对您所处理查询的最佳策略的流程图。在后续章节中，我们将更详细地讨论每个步骤。


