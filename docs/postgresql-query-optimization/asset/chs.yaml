- '# 12. 函数


  本章聚焦于 PostgreSQL 中使用最少且最常被误用的特性——对象，即函数。由于所有现代编程语言都包含用户自定义函数，人们常误以为数据库函数与之同出一辙，并认为如果掌握在应用编程语言中编写函数的时机与方法，便能直接将其应用于
  PostgreSQL。这与事实相去甚远。


  本章将探讨 PostgreSQL 函数与其他编程语言函数的差异，何时应该创建函数、何时不应创建，以及使用函数如何既能提升性能，又可能导致严重的性能下降。


  在开始之前，我们先来探讨一个普遍存在的观点：使用函数会降低可移植性。这话虽有一定道理，但请考虑以下事实：


  -  无论是 SQL 语句还是 ORM，都不是 100%可移植的；总是需要做一些（希望是较小的）适配工作。

  -  为现有生产系统更换数据库始终是一个重大项目，绝不可能一蹴而就。对应用程序本身进行一些修改是不可避免的。相比之下，转换函数所带来的额外工作量相对较小。


  ## 函数创建


  PostgreSQL 既有内置（内部）函数，也有用户自定义函数。在这一点上，它与其他编程语言并无不同。


  ### 内部函数


  内部函数使用 C 语言编写，并与 PostgreSQL 服务器集成。对于 PostgreSQL 支持的每种数据类型，都存在一系列用于对该类型的变量或列值执行不同操作的函数。类似于命令式语言，这里有用于数学运算的函数、用于字符串操作的函数、用于日期时间操作的函数等等。可用函数和支持类型的列表随着每个新版本的发布而不断扩展。


  清单 12-1 展示了一些内置函数的示例。


  ```

  sin(x);

  substr(first_name,1,1);

  now();

  Listing 12-1

  内置函数示例

  ```


  ### 用户自定义函数


  用户自定义函数是由用户创建的函数。PostgreSQL 支持三种用户自定义函数：


  -  查询语言函数，即用 SQL 编写的函数

  -  C 函数（用 C 或类似 C 的语言，如 C++编写）

  -  过程语言函数，用受支持的过程语言（简称 PL）编写


  一个`CREATE FUNCTION`命令如清单 12-2 所示。


  ```

  CREATE FUNCTION function_name (par_name1 par_type1, ...)

  RETURNS return_type

  AS


  LANGUAGE function_language;

  Listing 12-2

  CREATE FUNCTION 命令

  ```


  从 PostgreSQL 的角度看，数据库引擎只捕获函数签名——函数名和参数列表（可能为空）、返回值类型（可能为`void`），以及一些规格说明，如用何种语言编写。对于除
  SQL 外的所有过程语言，函数`主体`被包装在一个字符串字面量中，传递给一个了解该语言细节的特殊处理程序。该处理程序可以自行完成解析、语法分析、执行等所有工作，也可以作为
  PostgreSQL 与现有编程语言实现之间的“粘合剂”。标准的 PostgreSQL 发行版支持四种过程语言：PL/pgSQL、PL/Tcl、PL/Perl
  和 PL/Python。本书将只讨论用 PL/pgSQL 编写的函数。


  ### 过程语言简介


  既然我们正在讨论函数，那么正式介绍编写这些函数所用的语言（或多种语言）似乎是个好主意。


  到目前为止，本书中唯一使用的语言是 SQL，在代码片段中，除了`CREATE`操作符外，唯一使用过的操作符是`SELECT`。现在，是时候介绍过程语言了。在本书中，我们仅讨论
  PostgreSQL 的原生过程语言`PL/pgSQL`。


  用`PL/pgSQL`编写的函数可以包含任何 SQL 操作符（可能带有某些修改）、控制结构（`IF THEN ELSE`、`CASE`、`LOOP`）以及对其他函数的调用。


  清单 12-3 展示了一个用`PL/pgSQL`编写的函数示例，该函数在可能的情况下将文本字符串转换为数值，如果字符串不代表数字则返回 null。


  ```

  CREATE OR REPLACE FUNCTION text_to_numeric(input_text text)

  RETURNS numeric AS

  $BODY$

  BEGIN

  RETURN replace(input_text, '','', '''')::numeric;

  EXCEPTION WHEN OTHERS THEN

  RETURN NULL::numeric;

  END;

  $BODY$

  LANGUAGE plpgsql;

  Listing 12-3

  将文本转换为数值的函数

  ```


  利用清单 12-2 中的信息，我们可以识别所有用户自定义函数的共同部分。函数名为`text_to_numeric`，它只有一个类型为`text`的参数`input_text`。


  `RETURNS`子句定义了函数返回值的类型（`numeric`），`LANGUAGE`子句指定了函数所用的编写语言`plpgsql`。


  现在，让我们更仔细地看看函数主体。


  ### 美元引用


  在上一节中，我们提到函数主体表示为一个字符串字面量；然而，它并非以引号开始和结束，而是以`$BODY$`作为起止。PostgreSQL 中的这种表示法称为`美元引用`，在创建函数时尤其有用。确实，如果你有一个相对较大的函数文本，很可能需要使用单引号或反斜杠，那么你就需要在每次出现时将它们转义（双写）。使用美元引用，你可以使用两个美元符号，中间可能带有某些标签，来定义一个字符串字面量。


  使用标签使得这种定义字符串常量的方式特别方便，因为你可以嵌套带有不同标签的字符串。例如，函数主体的开头可能如清单 12-4 所示。


  ```

  $function$

  DECLARE

  V_error_message text:=''Error:'';

  V_record_id integer;

  BEGIN

  ...

  v_error_message:=v_error_message||$em$Record can''t be updated, #$em$||quote_literal(v_record_id);

  ...

  END;

  $function$

  Listing 12-4

  嵌套美元引用的用法

  ```


  这里，我们对函数主体使用了带有`function`标签的美元引用。请注意，对于可用于函数主体的标签没有限制规则，包括空标签；唯一的要求是字符串字面量的结束标签与开始标签相同。这里的示例将使用不同的标签，以提醒读者标签并非预定义的。


  函数主体以一个`DECLARE`子句开始，这是可选的，如果不需要变量可以省略。`BEGIN`（不带分号）表示语句部分的开始，而`END`关键字应该是函数体中的最后一条语句。


  请注意，本节并非关于函数创建的全面指南。有关更多详细信息，请参阅 PostgreSQL 文档。


  更多细节将在后续示例中介绍。



  ### 函数参数与函数输出：空函数


  大多数情况下，函数会有一个或多个参数，但也可能没有参数。例如，内部函数 `now()` 用于返回当前时间戳，它没有任何参数。我们可以为任何函数参数指定默认值，以便在未显式传递特定值时使用。


  此外，定义函数参数的方式有多种。在清单 12-3 的示例中，参数是 `命名的`，但它们也可以是位置参数（`$1`、`$2` 等）。有些参数可能被定义为 `OUT`
  或 `INOUT`，而不是指定返回类型。同样，本章无意涵盖所有可能的规范，因为函数的性能并不依赖于所有这些规范变化。


  最后，需要重点注意的是，函数可能不返回任何值；在这种情况下，函数被指定为 `RETURNS VOID`。这个选项之所以存在，是因为以前 PostgreSQL 不支持存储过程，所以将多条语句打包在一起的唯一方式就是在函数内部。


  ### 函数重载


  与其他编程语言类似，PostgreSQL 中的函数可以是多态的，即多个函数可以使用相同的名称但具有不同的签名。这个特性被称为 `函数重载`。如前所述，函数由其名称和输入参数集定义；对于不同的输入参数集，返回类型可以不同，但出于显而易见的原因，两个函数不能同时共享相同的名称和相同的输入参数集。


  让我们看一下清单 12-5 中的例子。在案例 #1 中，创建了一个计算特定航班乘客数量的函数。在案例 #2 中，创建了一个同名函数，用于计算特定日期从特定机场出发的乘客数量。


  但是，如果您尝试运行代码片段 #3 来创建一个计算特定航班号在特定日期的乘客数量的函数，您将收到错误：


  ```

  ERROR: cannot change name of input parameter "p_airport_code".

  ```


  您可以创建一个名称相同但参数集和返回类型不同的函数；因此，您可以创建另一个同名函数，如案例 #4 所示。但是，如果您尝试创建一个名称相同、返回类型不同但参数相同的函数（案例
  #5），数据库将抛出错误：


  ```

  #1

  CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS integer;

  #2

  CREATE OR REPLACE FUNCTION num_passengers(p_airport_code text, p_departure date)
  RETURNS integer;

  #3

  CREATE OR REPLACE FUNCTION num_passengers(p_flight_no text, p_departure date) RETURNS
  integer;

  #4

  CREATE OR REPLACE FUNCTION num_passengers(p_flight_no text) RETURNS numeric;

  #5

  CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS numeric;

  清单 12-5

  函数重载

  ```


  ```

  ERROR: cannot change return type of existing function

  ```


  请注意，这些函数的源代码有显著差异。清单 12-6 展示了 `num_passengers(integer)` 函数的源代码，清单 12-7 展示了 `num_passengers(text,
  date)` 函数的代码。


  ```

  CREATE OR REPLACE FUNCTION num_passengers(p_flight_id int) RETURNS integer

  AS

  $$BEGIN

  RETURN (

  SELECT count(*)

  FROM booking_leg bl

  JOIN booking b USING (booking_id)

  JOIN passenger p USING (booking_id)

  WHERE flight_id=p_flight_id);

  END;

  $$ LANGUAGE plpgsql;

  清单 12-6

  num_passengers(int) 的源代码

  ```


  ```

  CREATE OR REPLACE FUNCTION num_passengers(

  p_airport_code text,

  p_departure date) RETURNS integer

  AS

  $$BEGIN

  RETURN (

  SELECT count(*)

  FROM booking_leg bl

  JOIN booking b USING (booking_id)

  JOIN passenger p USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE departure_airport=p_airport_code

  AND scheduled_departure BETWEEN p_departure AND p_departure +1)

  ;

  END;

  $$ LANGUAGE plpgsql;

  清单 12-7

  num_passengers(text, date) 的源代码

  ```



  ## 函数执行


  要执行一个函数，我们使用 `SELECT` 操作符。代码清单 12-8 展示了执行带有 `p_flight_id` 参数（设置为 13）的函数 `num_passengers`
  的两种可能方式。


  ```

  SELECT num_passengers(13);

  SELECT * FROM num_passengers(13);

  代码清单 12-8

  函数执行

  ```


  对于返回标量值的函数，两种语法都会产生相同的结果。复杂类型将在本章后面介绍。


  同样值得注意的是，用户定义的标量函数可以像内置函数一样用在 `SELECT` 语句中。回顾代码清单 12-3 中的函数 `text_to_numeric`。你可能会疑惑，当
  PostgreSQL 已经有三种将字符串转换为整数的方法时，为什么还需要创建用户定义的转换函数。记录一下，这三种方式是：


  *   `CAST (text_value AS numeric)`

  *   `text_value::numeric`（这是 `CAST` 的替代语法）

  *   `to_number(text_value, ''999999999999'')`——使用内置函数


  为什么需要自定义转换函数？对于上述列表中的任何方法，如果输入文本字符串包含数字以外的符号，尝试转换都会导致错误。


  为了确保转换函数不会失败，我们在函数体中包含了 `异常处理部分`。该部分以 `EXCEPTION` 关键字开始；`WHEN` 关键字可以识别特定的异常类型。在本章中，我们将仅使用
  `WHEN OTHERS` 形式，这意味着处理所有未包含在前面的 `WHEN` 条件中的异常类型。如果像代码清单 12-3 那样单独使用 `WHEN OTHERS`，则意味着所有异常都应以相同方式处理。


  在代码清单 12-3 中，这意味着任何转换错误（或者实际上是任何错误）都不会导致函数失败，而是返回 `NULL`。为什么当传递“坏”参数时，函数不失败如此关键？因为这个函数被用在
  `SELECT` 列表中。


  在第 7 章中，我们创建了物态化视图 `passenger_passport`（参见代码清单 7-11）。该物态化视图的不同列应包含不同的数据类型，但由于在源数据中，所有这些字段都是文本字段，我们能做的很有限。现在，如果你想将
  `passport_num` 作为数值类型选择，你的 `SELECT` 可能如下所示：


  ```

  SELECT

  passenger_id,

  passport_num::numeric AS passport_number

  FROM passenger_passport

  ```


  如果在任何一个实例中，`passport_num` 列包含非数值（例如，空格或空字符串），那么整个 `SELECT` 语句将会失败。相反，我们可以使用自定义函数
  `text_to_integer`：


  ```

  SELECT

  passenger_id,

  text_to_numeric(passport_num) AS passport_number

  FROM passenger_passport

  ```


  让我们再创建一个用户定义函数 `text_to_date`，它将把包含日期的字符串转换为 `date` 类型——参见代码清单 12-9。


  ```

  CREATE OR REPLACE FUNCTION text_to_date(input_text text)

  RETURNS date AS

  $BODY$

  BEGIN

  RETURN input_text::date;

  EXCEPTION WHEN OTHERS THEN

  RETURN null::date;

  END;

  $BODY$

  LANGUAGE plpgsql;

  代码清单 12-9

  将文本转换为日期的函数

  ```


  现在，我们可以在代码清单 12-10 中使用这两个函数。


  ```

  SELECT

  passenger_id,

  text_to_integer(passport_num) AS passport_num,

  text_to_date(passport_exp_date) AS passport_exp_date

  FROM passenger_passport

  代码清单 12-10

  在 SELECT 列表中使用函数

  ```


  尽管这个例子似乎是 PostgreSQL 中函数的完美用例，但实际上，就性能而言，这远非理想的解决方案——如下所述。


  ## 函数执行内部原理


  本节解释了函数执行的一些细节，这些细节是 PostgreSQL 特有的。如果你之前有使用 Oracle 或 MS SQL Server 等 DBMS 的经验，你可能会对函数执行做出一些假设，而这些假设在
  PostgreSQL 中并不成立。


  第一个意外可能发生在你执行 `CREATE FUNCTION` 语句并收到类似以下的完成消息时：


  ```

  CREATE FUNCTION

  查询在 127 毫秒内成功返回。

  ```


  读到这里，你可能会认为你的函数不包含任何错误。为了说明之后可能出错的地方，让我们编译代码清单 12-11 中的代码。如果你复制并执行此语句，你将收到创建成功消息。


  ```

  CREATE OR REPLACE FUNCTION num_passengers(

  p_airport_code text,

  p_departure date) RETURNS integer

  AS $$

  BEGIN

  RETURN (

  SELECT

  count(*)

  FROM booking_leg bl

  JOIN booking b USING (booking_id)

  JOIN passenger p  USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE airport_code=p_airport_code

  AND scheduled_departure BETWEEN p_date AND p_date +1);

  END;

  $$ LANGUAGE plpgsql;

  代码清单 12-11

  创建一个会顺利完成但包含错误的函数

  ```


  然而，当你尝试执行这个函数


  ```

  SELECT num_passengers(''ORD'', ''2020-07-05'')

  ```


  ……你将会收到错误消息：


  ```

  错误：列 "airport_code" 不存在

  ```


  哪里出错了？该函数使用了 `airport_code` 而不是 `departure_airport`。这是一个容易犯的错误，但你可能没想到，PostgreSQL
  在你最初创建函数时永远不会告知你犯了这个错误。


  现在，如果你更正这个错误并运行新的 `CREATE FUNCTION` 语句（参见代码清单 12-12），你将收到另一个错误：


  ```

  CREATE OR REPLACE FUNCTION num_passengers(

  p_airport_code text,

  p_departure date) RETURNS integer

  AS $$

  BEGIN

  RETURN (

  SELECT

  count(*)

  FROM booking_leg bl

  JOIN booking b USING (booking_id)

  JOIN passenger p  USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE departure_airport =p_airport_code

  AND scheduled_departure BETWEEN p_date AND p_date +1);

  END;

  $$ LANGUAGE plpgsql;

  代码清单 12-12

  创建一个函数：更正了一个错误，另一个错误仍然存在

  ```


  ```

  错误：列 "p_date" 不存在

  ```


  PostgreSQL 是对的，因为参数的名称是 `p_departure_date`，而不是 `p_date`。那么，为什么这个错误没有在之前报告呢？


  在函数创建期间，PostgreSQL 仅执行初始的解析传递，在此期间仅检测到简单的语法错误。任何更深层次的错误要到执行时才会被发现。如果你刚从 Oracle 过来，并假设创建函数时它会被数据库引擎编译并以编译形式存储，这是个坏消息。函数不仅以源代码形式存储，而且更甚的是，与其他
  DBMS 相比，函数是解释执行的，而不是编译执行的。


  PL/pgSQL 解释器在第一次调用函数时（在每个会话内）解析函数的源文本并生成一个（内部的）指令树。即使到那时，函数中使用的单个 SQL 表达式和命令也不会立即被翻译。只有当执行路径到达特定命令时，才会分析它并创建一个
  `预处理语句`。如果在同一会话中再次执行相同的函数，它将被重用。其含义之一是，如果你的函数包含一些条件代码（即 `IF THEN ELSE` 或 `CASE`
  语句），如果这部分在执行期间未被触及，你甚至可能不会发现代码中的语法错误。我们见过这种令人不快的发现发生在函数投入生产很久之后。总之，当你创建一个 PL/pgSQL
  函数时：


  1.  不保存执行计划。

  2.  不会检查表、列或其他函数的存在性。



  '
- "# 3.  在你执行一个函数（通常需要执行多次，如果存在多个代码路径的话）之前，你无法知道它是否正常工作。\n\n关于 PostgreSQL 函数另一个重要的知识点，可以从前面的解释中总结出来，即函数在多个不同方面具有“原子性”。首先（令\
  \ Oracle 用户失望的是），你不能在 PostgreSQL 函数内启动事务，因此对于 DML 语句来说，总是“要么全部成功，要么全部失败”。其次，PostgreSQL\
  \ 优化器在优化执行计划时，对函数执行一无所知，该计划包含了对用户定义函数的调用。例如，如果你执行\n\n```sql\nEXPLAIN SELECT num_passengers(13)\n\
  ```\n\n……执行计划看起来会像这样：\n\n```sql\n\"Result (cost=0.00..0.26 rows=1 width=4)\"\n```\n\
  \n如果你需要弄清楚用于执行函数内部 `SELECT` 语句的执行计划是什么，你将需要提供一些实际值来替代参数，并为每个值运行 `EXPLAIN` 命令。\n\n\
  `CREATE FUNCTION` 操作符中的关键字之一（记住，我们并没有列出所有的关键字！）是 `COST`。它允许开发者显式设置函数执行的成本，供优化器使用。默认值是\
  \ 100，我们不建议更改它，除非你有非常充分的理由。\n\n## 函数与性能\n\n简要介绍之后，现在该讨论本书的核心关注点了。函数如何影响性能？第 7 章讨论了代码因子化的主题，并概述了在命令式语言和\
  \ SQL 中进行代码因子化的不同影响。其中涵盖了几种可能的技术，并提到函数值得更详细的讨论，接下来就对此展开。\n\n为什么在 PostgreSQL 中创建函数？在命令式语言中，使用函数是显而易见的选择：函数提高了代码的可读性，促进了代码的重用，并且对性能没有负面影响。相比之下，PostgreSQL\
  \ 中的函数可能会提高代码可读性，但也可能降低代码可读性，并可能显著恶化性能。请注意“可能”这个词；本章的其余部分将讨论明智地使用用户定义函数的方法，使它们带来性能优势而非性能灾难。\n\
  \n### 使用函数如何降低性能\n\n在前面的章节中，我们创建了函数 `num_passengers(int)`，它计算由函数参数指定的航班上的乘客数量。这个函数对于单个航班效果很好，在\
  \ 150 毫秒内返回结果。\n\n让我们看看如果这个函数被包含在 `SELECT` 列表中会发生什么。清单 12-13 选择了所有在 6 月 13 日至 7\
  \ 月 13 日期间从 `ORD` 出发的航班，并为每个航班计算乘客总数。\n\n```sql\nSELECT\nflight_id,\nnum_passengers(flight_id)\
  \ AS num_pass\nFROM flight f\nWHERE departure_airport='ORD'\nAND scheduled_departure\
  \ BETWEEN '2023-07-05' AND '2023-07-13'\n清单 12-13\n在 SELECT 列表中使用函数会降低性能\n```\n\n\
  这个语句的执行时间是 13 秒。现在，如果使用执行完全相同计算的 SQL 语句（清单 12-14）来代替，执行时间将只有 165 毫秒。\n\n```sql\n\
  SELECT\nf.flight_id,\ncount(*) AS num_pass\nFROM booking_leg bl\nJOIN booking b\
  \ USING (booking_id)\nJOIN passenger p USING (booking_id)\nJOIN flight f  USING\
  \ (flight_id)\nWHERE departure_airport='ORD'\nAND scheduled_departure BETWEEN '2023-07-05'\
  \ AND '2023-07-13'\nGROUP BY 1\n清单 12-14\n不使用函数获得相同的结果\n```\n\n为什么会有如此大的差异？在第 7\
  \ 章中，我们解释了视图和 CTE 如何充当优化屏障。这种效果在函数身上更为明显。由于函数对于周围的 SQL 语句来说是一个真正的黑匣子，PostgreSQL\
  \ 唯一的选择就是根据选中的行数尽可能多次地执行每个函数。\n\n准确地说，由于对于来自同一会话的后续函数调用，PostgreSQL 使用预处理语句，因此可以节省一些时间，但这一事实既可能加速也可能减慢执行速度，因为执行计划不会考虑不同函数调用之间统计信息的差异。\n\
  \n即使差异不那么剧烈，有人可能会争辩说，为了便于代码维护，可以容忍适度的性能下降，但我们正在跨越一个用户愿意等待的时间阈值。而在这种情况下，函数内部的 SQL\
  \ 非常轻量，执行只需几毫秒。\n\n好吧，我们理解将 `SELECT` 语句嵌入到另一个语句的 `SELECT` 列表中执行并不是最好的主意。但是那些执行简单数据转换的函数呢？就像我们为类型转换创建的那些？在这种情况下，直到输出规模变得非常大之前，差异可能不会那么剧烈，但它仍然是可见的。\n\
  \n让我们比较一下清单 12-10 中语句的执行时间和清单 12-15 中语句的执行时间。\n\n```sql\nSELECT\npassenger_id,\n\
  passport_num,\npassport_exp_date\nFROM passenger_passport\n清单 12-15\n不进行类型转换选择护照信息\n\
  ```\n\n两者都从一个单独的表中选择数据，且不应用任何过滤器，因此唯一的时间开销将是在 `SELECT` 列表中执行函数所引起的时间。`passenger_passport`\
  \ 物化视图包含超过 1600 万行。清单 12-15 中语句的执行时间是七秒。如果我们不调用函数而使用类型转换（清单 12-16）\n\n```sql\nSELECT\n\
  passenger_id,\npassport_num::numeric,\npassport_exp_date::date\nFROM passenger_passport\n\
  清单 12-16\n使用类型转换选择护照信息\n```\n\n……执行时间将是九秒。运行清单 12-10 中的语句，执行时间将是 40 秒！请注意，在这种情况下，执行时间的显著增加是异常处理的结果，这创建了一个隐式的检查点。\n\
  \n在这个特定的情况下，除了从一开始就设计一个更好的方案之外，几乎无法采取什么措施来提高性能，但在本书后面，我们将回顾其他示例，在这些示例中可以实现一些性能改进。\n\
  \n### 函数是否有提升性能的机会？\n\n回顾了这么多函数对性能产生负面影响的例子，人们可能会想，是否存在函数能够提高性能的条件。像许多其他情况一样，这要看情况。\n\
  \n如果我们谈论的是提高单个 SQL 语句的性能，将其包装在函数中并不能使其运行得更快。然而，当优化一个过程时，函数可能非常有帮助。\n\n## 函数与用户定义类型\n\
  \n到目前为止的所有函数示例中，我们构建的函数都返回标量值。现在，让我们看看返回用户定义数据类型的函数能提供哪些额外的好处。\n\n\n\n## 用户自定义数据类型\n\
  \n除了其自身丰富的数据类型集合外，PostgreSQL 还允许创建几乎无限数量的用户自定义数据类型。\n\n用户自定义类型可以是简单的或复合的。简单的用户自定义类型包括以下类别：域（domain）、枚举（enum）和范围（range）。\n\
  \n以下是简单类型创建的示例：\n\n```sql\nCREATE DOMAIN timeperiod  AS tstzrange;\nCREATE TYPE\
  \ mood AS ENUM ('sad', 'ok', 'happy’);\nCREATE TYPE mood_range AS RANGE...\nCREATE\
  \ TYPE \n```\n\n正如我们可以定义基本类型的数组一样，我们也可以定义用户自定义类型的数组：\n\n```sql\nDECLARE\nv_moods_set\
  \ mood[];\n```\n\n当我们创建一个复合类型时，会有更多选项可用。\n\n复合类型代表一行或一条记录。一个类型定义由字段名序列及其各自的数据类型组成。例如，清单\
  \ 12-17 定义了类型 `boarding_pass_record`。\n\n```sql\nCREATE TYPE boarding_pass_record\
  \ AS (\nboarding_pass_id int,\nbooking_leg_id bigint,\nflight_no text,\ndeparture_airport\
  \ text,\narrival_airport text,\nlast_name text,\nfirst_name text,\nseat text,\n\
  boarding_time timestamptz\n);\n```\n**清单 12-17**\n类型 `boarding_pass_record`\n\n\
  既然类型 `boarding_pass_record` 已定义，我们就可以声明此类型的变量，就像声明基本类型的变量一样：\n\n```sql\nDECLARE\n\
  v_new_boarding_pass_record boarding_pass_record;\n```\n\n而且，我们还可以创建返回复合类型集合的函数。\n\
  \n## 返回复合类型的函数\n\n为什么函数能够返回复合类型集合这一点如此关键？我们为什么想要这样做呢？回想一下第 9 章，我们需要能够从数据库中检索整个对象，而不是一个接一个地获取其组成部分。现在，之前讨论的一切都可以结合起来了。\n\
  \n让我们构建一个例子。在清单 12-18 中，我们展示了一个返回指定航班所有登机牌的函数。\n\n```sql\nCREATE OR REPLACE FUNCTION\
  \ boarding_passes_flight (p_flight_id int)\nRETURNS SETOF boarding_pass_record\n\
  AS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\npass_id,\nbp.booking_leg_id,\nflight_no,\n\
  departure_airport::text ,\narrival_airport ::text,\nlast_name ,\nfirst_name ,\n\
  seat,\nboarding_time\nFROM flight f\nJOIN booking_leg bl USING (flight_id)\nJOIN\
  \ boarding_pass bp USING(booking_leg_id)\nJOIN passenger USING (passenger_id)\n\
  WHERE bl.flight_id=p_flight_id;\nEND;\n$body$\nLANGUAGE plpgsql;\n```\n**清单 12-18**\n\
  返回航班所有登机牌的函数\n\n要执行此函数，请运行以下命令：\n\n```sql\nSELECT * FROM boarding_passes_flight(13);\n\
  ```\n\n此 SELECT 语句的结果如图 12-1 所示。\n\n![](img/501585_2_En_12_Fig1_HTML.jpg)\n\n截图展示了登机牌航班的结果数据库。它列出了\
  \ 10 列和 5 行数据。列标题为序列号、登机牌 ID 和预订航段 ID、航班号、出发和到达机场、姓氏、名字、座位和登机时间。\n\n**图 12-1**\n\
  执行函数 `boarding_passes_flight` 的结果\n\n现在，让我们创建另一个函数，该函数将仅根据 `pass_id` 选择一张登机牌。请注意，由于这两个函数都接受单个整数参数，因此在这种情况下无法使用重载。新函数如清单\
  \ 12-19 所示。\n\n```sql\nCREATE OR REPLACE FUNCTION boarding_passes_pass (p_pass_id\
  \ int)\nRETURNS SETOF boarding_pass_record\nAS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\n\
  pass_id,\nbp.booking_leg_id,\nflight_no,\ndeparture_airport::text ,\narrival_airport\
  \ ::text,\nlast_name ,\nfirst_name ,\nseat,\nboarding_time\nFROM flight f\nJOIN\
  \ booking_leg bl USING (flight_id)\nJOIN boarding_pass bp USING(booking_leg_id)\n\
  JOIN passenger USING (passenger_id)\nWHERE pass_id=p_pass_id;\nEND;\n$body$\nLANGUAGE\
  \ plpgsql;\n```\n**清单 12-19**\n返回一张登机牌的函数\n\n当我们执行此函数时\n\n```sql\nSELECT * FROM\
  \ boarding_passes_pass(215158);\n```\n\n……结果将是一个只包含一行的集合，但其结构将相同（参见图 12-2）。\n\n\
  ![](img/501585_2_En_12_Fig2_HTML.jpg)\n\n截图展示了登机牌 pass 的结果数据库。它列出了 10 列和 1 行数据。列标题为序列号、登机牌\
  \ ID 和预订航段 ID、航班号、出发和到达机场、姓氏、名字、座位和登机时间。\n\n**图 12-2**\n执行函数 `boarding_passes_pass`\
  \ 的结果\n\n为什么使用这些函数能提高性能？正如我们在第 10 章讨论的，应用程序很少直接执行 SQL 语句；相反，它们通常使用 ORM 在后台生成的 SQL\
  \ 语句。在这种情况下，登机牌、乘客和航班很可能可以通过不同的方法访问。这意味着，为了选择函数 `boarding_passes_flight` 返回的相同数据，我们很可能需要一种方法来选择航班的出发机场、到达机场和计划出发时间（该航班作为参数传递给此函数），另一种方法来选择该航班的所有预订航段，再一种方法选择登机牌，还有一种方法选择乘客信息。如果能够说服应用程序开发人员，将这些操作合并到一个函数中，将带来巨大的性能提升。\n\
  \n使用登机牌函数为拥有 600 名乘客的航班选择所有登机牌需要 220 毫秒，运行 `SELECT * FROM boarding_passes_flight(13650)`。另一方面，从任何表中进行任何单独的\
  \ SELECT 操作大约需要 150 毫秒。由于每个进程都将数据返回给应用程序，进行一次往返通信，因此执行时间会累加——使用多次调用会很快超过函数的执行时间。\n\
  \n之前我们了解到，对于标量函数，语法 `SELECT * FROM function_name` 和 `SELECT function name` 之间没有区别。但是当函数返回复合类型时，就存在区别了。\n\
  \n图 12-1 显示了运行以下语句的结果\n\n```sql\nSELECT * FROM boarding_passes_flight(13)\n```\n\
  \n图 12-3 显示了以下语句的结果\n\n![](img/501585_2_En_12_Fig3_HTML.jpg)\n\n截图展示了登机牌航班的结果数据库。它列出了\
  \ 2 列和 5 行数据。列标题为序列号和 boarding_passes_flight。\n\n**图 12-3**\n作为记录集合的函数结果\n\n```sql\n\
  SELECT boarding_passes_flight(13)\n```\n\n\n\n## 使用具有嵌套结构的复合类型\n\n复合类型能否用作其他复合类型的元素？是的，PostgreSQL\
  \ 允许这样做。\n\n在图 11-4 中，我们展示了复杂对象 `booking_record` 的结构。其组件之一是复杂对象 `booking_leg_record`。为了将此对象的表示构建为复合类型，首先需要创建\
  \ `flight_record` 类型和 `boarding_pass_record` 类型，然后继续创建 `booking_leg_record` 类型，如代码清单\
  \ 12-20 所示。\n\n```sql\nCREATE TYPE flight_record AS(\nflight_id int,\nflight_no\
  \ text,\ndeparture_airport_code text,\ndeparture_airport_name text,\narrival_airport_code\
  \ text,\narrival_airport_name text,\nscheduled_departure timestamptz,\nscheduled_arrival\
  \ timestamptz\n);\nCREATE TYPE booking_leg_record AS(\nbooking_leg_id int,\nleg_num\
  \ int,\nbooking_id int,\nflight flight_record,\nboarding_passes boarding_pass_record[]\n\
  );\n```\n**代码清单 12-20: 更多记录类型定义**\n\n`booking_leg_record` 类型包含的元素之一是复合类型 `flight_record`，另一个组件是\
  \ `boarding_pass_record` 元素的数组。\n\n看起来我们解决了第 11 章提出的问题：我们可以创建具有嵌套结构的复合类型，也可以创建返回此类对象的函数。然而，仍然有大量问题需要解决。\n\
  \n为了说明剩余的问题，让我们创建一个函数，它将使用 `booking_leg_id` 返回整个 `booking_leg_record` 对象。该函数的代码如代码清单\
  \ 12-21 所示。\n\n```sql\nCREATE OR REPLACE FUNCTION booking_leg_select (p_booking_leg_id\
  \ int)\nRETURNS SETOF booking_leg_record\nAS\n$body$\nBEGIN\nRETURN QUERY\nSELECT\n\
  bl.booking_leg_id,\nleg_num,\nbl.booking_id,\n(SELECT row(\nflight_id,\nflight_no,\n\
  departure_airport,\nda.airport_name,\narrival_airport,\naa.airport_name ,\nscheduled_departure,\n\
  scheduled_arrival)::flight_record\nFROM flight f\nJOIN airport da on da.airport_code=departure_airport\n\
  JOIN airport aa on aa.airport_code=arrival_airport\nWHERE flight_id=bl.flight_id\n\
  ),\n(SELECT array_agg (row(\npass_id,\nbp.booking_leg_id,\nflight_no,\ndeparture_airport\
  \ ,\narrival_airport,\nlast_name ,\nfirst_name ,\nseat,\nboarding_time)::boarding_pass_record)\n\
  FROM flight f1\nJOIN  boarding_pass bp ON f1.flight_id=bl.flight_id\nAND bp.booking_leg_id=bl.booking_leg_id\n\
  JOIN passenger p ON p.passenger_id=bp.passenger_id)\nFROM booking_leg bl\nWHERE\
  \ bl.booking_leg_id=p_booking_leg_id\n;\nEND;\n$body$ language plpgsql;\n```\n**代码清单\
  \ 12-21: 返回具有嵌套结构的复杂对象的函数**\n\n不要被前面这个冗长的函数吓到——它确实长，但不算太复杂。我们来仔细看看。\n\n主 `SELECT`\
  \ 语句从 `booking_leg` 表中提取数据，使用函数参数值作为搜索条件。记录的前三个元素——`booking_leg_id`、`leg_num`、`booking_id`——直接来自\
  \ `booking_leg` 表。记录的下一个元素是 `flight_record`，其中的 `flight_id` 来自所选航段的 `flight_id`。这个条件在内部\
  \ `SELECT` 的 `WHERE` 子句中设置：\n\n```sql\nWHERE flight_id=bl.flight_id\n```\n\n我们选择与所选航段相关的航班信息。\n\
  \n内部函数 `row()` 从一组元素构建行，并且这行被强制转换为 `booking_leg_record` 中期望的 `flight_record` 类型。\n\
  \n`booking_leg_record` 的最后一个元素是登机牌数组——数量与该预订中的乘客数相同。让我们仔细看看这个内部 `SELECT`：\n\n```sql\n\
  (SELECT array_agg (row(\npass_id,\nbp.booking_leg_id,\nflight_no,\ndeparture_airport\
  \ ,\narrival_airport,\nlast_name ,\nfirst_name ,\nseat,\nboarding_time)::boarding_pass_record)\n\
  FROM flight f1\nJOIN  boarding_pass bp ON f1.flight_id=bl.flight_id\nAND bp.booking_leg_id=bl.booking_leg_id\n\
  JOIN passenger p ON p.passenger_id=bp.passenger_id)\n```\n\n你首先会注意到，这个查询与我们在 `boarding_pass_flight`\
  \ 函数中使用的查询基本相同。不同之处在于：\n\n*   无需再与 `booking_leg` 表连接，因为它已在外部 `SELECT` 中被选中。我们仍然需要来自\
  \ `flight` 表的信息，但我们可以使用所选航段的 `flight_id`。这样，就与 `flight` 表的一行产生了一个笛卡尔积。\n*   同样，对于登机牌，也不需要连接\
  \ `booking_leg` 表；我们直接使用已有的 `booking_leg_id`。\n\n最后，我们使用内部函数 `array_agg()` 创建一个单一的*记录数组*，这正是\
  \ `booking_leg_record` 期望的最后一个元素。\n\n**注意：** 以上只是构建具有嵌套结构的对象的多种方法之一。在后续章节中，我们将介绍其他方法，这些方法在其他情况下可能更有用。\n\
  \n现在，坏消息来了。我们费了这么大劲创建这个函数，可当执行它时，结果却有些令人失望。执行\n\n```sql\nSELECT * FROM booking_leg_select\
  \ (17564910)\n```\n\n结果如图 12-4 所示。\n\n![](img/501585_2_En_12_Fig4_HTML.jpg)\n\n\
  一张截图展示了一个航段选择的结果数据库。它列出了 5 列和 1 行数据。列标题依次为序号、航段 ID、航段编号、预订 ID 和航班。\n\n**图 12-4:\
  \ 返回的具有嵌套结构的复杂对象**\n\n结果集看起来正是我们想要的，但请注意一个重要细节。对于标量元素，PostgreSQL 保留了元素名称（就像我们从表中选择时一样），但当涉及到本身是复杂对象的元素时，其结构并未展现出来。注意，在内部，PostgreSQL\
  \ 仍然保留着内部类型结构的概念，但它并未将其传达给上层。\n\n为什么这是个问题？第 11 章讨论了 ORM 的陷阱，并在图 11-3 中勾勒了一个假设的解决方案。当时，我们没有讨论实现这一目标的任何具体细节，但有了能够返回复杂类型的函数，解决方案似乎触手可及。然而，当应用程序既无法识别元素名称也无法识别其类型时，函数的输出就变得无用了，至少对于直接从应用程序调用的目的而言是这样。\n\
  \n解决方案在第 14 章，但现在，让我们专注于那些返回不包含嵌套结构的记录的函数。\n\n\n\n## 函数与类型依赖性\n\n第 7 章在讨论视图和物化视图时提到了依赖性。对于物化视图，如果不先删除该对象，就无法更改其定义。这反过来意味着所有依赖对象都必须被删除并重新创建，即使物化视图的名称和列数没有改变。如果这些依赖对象又被用于其他视图或物化视图，那么它们的依赖对象也必须被删除。\n\
  \n这可能导致一些极其不希望看到的后果。我们在生产系统中观察到这样的情况：一次改动导致超过 60 个依赖对象被级联删除，并且必须按照特定顺序重新构建。\n\n\
  幸运的是，函数没有这个问题。由于函数体中的 SQL 语句在创建函数时不会被解析，因此不存在对函数体中使用的表、视图、物化视图、其他函数或存储过程的依赖。因此，函数只需要在实际需要变更时才重新创建，而不是仅仅因为级联删除。\n\
  \n然而，函数引入了一种新的依赖类型：函数依赖于其返回的类型，包括用户定义类型。与物化视图类似，用户定义的数据类型如果不先删除，就无法修改。要删除一个类型，所有将其作为元素的其他用户定义类型以及所有依赖该类型的所有函数都必须被删除。这听起来可能是个更糟糕的问题，但实际上，这恰恰是正确的问题。如果修改了一个用户定义类型，那么它的一些元素必定被添加、移除或更改了。这反过来意味着返回该类型记录的\
  \ `SELECT` 语句必须被修订，因此函数应该被删除。\n\n此外，与创建物化视图可能需要一些时间不同，创建函数几乎是瞬间完成的。\n\n## 使用函数进行数据操作\n\
  \n到目前为止，本章只考虑了选择数据的函数。但 PL/pgSQL 函数允许使用任何 SQL 命令，包括 DML 函数。\n\n清单 12-22 是一个为乘客签发新登机牌的函数。\n\
  \n```sql\nCREATE OR REPLACE FUNCTION issue_boarding_pass(\np_booking_leg_id int,\n\
  p_passenger_id int,\np_seat text,\np_boarding_time timestamptz)\nRETURNS SETOF boarding_pass_record\n\
  AS\n$body$\nDECLARE\nv_pass_id int;\nBEGIN\nINSERT INTO boarding_pass\n(passenger_id,\n\
  booking_leg_id,\nseat,\nboarding_time,\nupdate_ts)\nVALUES (\np_passenger_id,\n\
  p_booking_leg_id,\np_seat,\np_boarding_time,\nnow()) RETURNING pass_id INTO v_pass_id;\n\
  RETURN QUERY\nSELECT  * FROM boarding_passes_pass(v_pass_id);\nEND;\n$body$\nLANGUAGE\
  \ plpgsql;\nListing 12-22\n创建一个新的登机牌\n```\n\n请注意此函数体中对函数 `boarding_passes_pass`\
  \ 的调用。这个函数是之前创建的，但即使它不存在，`CREATE FUNCTION` 操作符也不会报错，直到这个函数被执行。这种行为有利有弊。它在开发过程中提供了更大的灵活性，但也可能带来问题，因为被嵌入的函数已被移除或无法正常工作这一事实可能未被察觉。执行此函数与其他函数相同：\n\
  \n```sql\nSELECT * FROM issue_boarding_pass(175820,462972, '22C', '2023-06-16 21:45'::timestamptz)\n\
  ```\n\n请注意，这次执行没有太大意义，因为航班已经在过去起飞了，此处仅用于说明目的。图 12-5 展示了这次执行的结果——数据格式与其他返回登机牌的函数相同。\n\
  \n![](img/501585_2_En_12_Fig5_HTML.jpg)\n\n一张截图展示了已签发登机牌的结果数据库。它列出了 10 列和 1 行数据。列标题为序列号、登机牌和预订段\
  \ I D、航班号、出发和到达机场、姓氏、名字、座位和登机时间。\n\n图 12-5\n\n返回用户定义类型的 DML 函数\n\n创建此函数时，我们做了一些在现实生活中不一定成立的假设。例如，该函数不检查该乘客和该航班是否已经签发了登机牌，不检查座位图中的座位可用性，并且不捕获\
  \ `INSERT` 时可能出现的错误。在生产环境中，这个函数会复杂得多。\n\n## 函数与安全\n\n在本书中，我们不涉及 PostgreSQL 中的数据访问控制/权限，主要是因为这个主题与性能无关。不过，我们将稍微介绍一下如何为\
  \ PostgreSQL 函数设置安全，以及函数安全设置与性能之间一个令人惊讶的联系。\n\n之前未涉及的 `CREATE FUNCTION` 操作符中的一个参数是\
  \ `SECURITY`。该参数只有两个允许的值：`INVOKER` 和 `DEFINER`。前者是默认值；它表示函数将使用调用该函数的用户的权限集来执行。这意味着，为了能够执行函数，用户应该对函数体中使用的所有数据库对象拥有相关的访问权限。如果我们明确指定\
  \ `SECURITY DEFINER`，函数将使用创建该函数的用户的权限执行。请注意，与其他数据库对象权限不同，任何函数的执行权限默认授予 `PUBLIC`。\n\
  \n你们中的许多人（以及我们，本书作者）都遇到过这样的情况：一个有影响力的业务用户需要访问一些关键数据，但你不想给他们 `READ ALL` 访问权限，因为你对他们的\
  \ SQL 技能以及他们的查询是否会导致整个系统崩溃不完全确定。\n\n在这种情况下，一个折衷方案可能是——你创建一个函数，使用一个高性能的查询来提取所有必要的数据，用\
  \ `SECURITY DEFINER` 参数创建这个函数，从所有人（从 `PUBLIC`）那里撤消执行权限，然后给这个有影响力的用户执行权限。操作步骤如清单\
  \ 12-23 所示。\n\n```sql\nCREATE FUNCTION critical_function (par1 ...)\nRETURNING SETOF...\n\
  AS $FUNC$\n...\nEND:\n$FUNC$\nLANGUAGE plpgsql\nSECURITY DEFINER;\n--\nREVOKE EXECUTE\
  \ ON critical_function (par1 ...)\nFROM public;\nGRANT EXECUTE ON critical_function\
  \ (par1 ...)\nTO powerbusinessuser;\nListing 12-23\nSECURITY DEFINER 函数的使用\n```\n\
  \n\n## 业务逻辑如何处理？\n\n在您能说服应用开发者使用函数与数据库通信的情况下，性能提升是显著的。仅仅消除多次往返这一事实，当我们衡量的是应用程序响应时间而非数据库响应时间时，就足以轻松地将应用程序性能提升数十倍甚至数百倍。\n\
  \n通往成功道路上最严重的阻碍之一就是 `业务逻辑` 的概念。其中一个定义（来自 [Investopedia.com](http://investopedia.com)）是这样的：\n\
  \n> `业务逻辑` 是处理数据库和用户界面之间信息交换的定制规则或算法。业务逻辑本质上是计算机程序的一部分，其中包含定义或约束企业如何运营的信息（以业务规则的形式）。\n\
  \n业务逻辑通常被认为是一个独立的应用层，而当我们将“过多逻辑”放入数据库函数时，应用开发者会不高兴。我们花费了大量时间试图与业务和应用开发者找到共同点。这些讨论的结果可以总结如下：\n\
  \n*   我们需要一些业务逻辑来执行连接和选择。\n*   选定的结果转换和操作不必在数据库端执行。\n\n在实践中，这意味着在决定什么可以放入数据库、什么必须留在应用程序中时，一个决定性因素是：将依赖项引入数据库是否会提升性能（促进连接或能够使用索引）。如果可以，则该逻辑被移入函数并被视为“数据库逻辑”；否则，数据将被返回给应用程序，以进行进一步的业务逻辑处理。\n\
  \n例如，对于航空预订应用程序，可以创建一个函数来返回可用的行程，即可能的预订。该函数的参数包括出发城市、目的地、行程开始日期和返回日期。为了能够高效地检索所有可能的行程，该函数需要知道表\
  \ `airport` 和 `flight` 如何连接，以及如何计算飞行时长。所有这些信息都属于数据库逻辑。\n\n然而，我们不希望该函数对选择哪个行程做出最终决定。最终的选择标准可能各不相同，并由应用程序处理；它们属于业务逻辑。\n\
  \n一致地应用这一标准可以很快地融入常规开发周期，并鼓励“一步到位”地开发应用程序。\n\n## OLAP 系统中的函数\n\n至此，我们希望已经说服您在 OLTP\
  \ 系统中使用 PostgreSQL 函数是有益的。那么 OLAP 呢？\n\n除非您尝试过，否则您可能不知道许多报告工具，包括 Cognos、Business\
  \ Objects 和 Looker，都可以展示函数的结果。实际上，执行一个返回记录集的函数类似于执行 `SELECT * FROM <某些表>`。\n\n然而，软件能做某事并不意味着它应该做。那么在\
  \ OLAP 环境中何时应该使用函数呢？\n\n### 参数化\n\n视图或物化视图无法参数化。如果我们只想运行最近日期、昨天、上周等的报告，这可能不会造成任何问题，因为我们可以利用\
  \ `CURRENT_DATE` 或 `CURRENT_TIMESTAMP` 等内部函数，但如果我们需要为过去的任何时间区间重新运行任何报告，如果不修改视图，这就不是一件容易的事。例如，我们可能有一个视图\n\
  \n```sql\nCREATE VIEW recent_flights_v AS\nSELECT flight_id,\ndeparture_airport,\n\
  arrival_airport,\nscheduled_departure\nFROM flight\nWHERE scheduled_departure BETWEEN\
  \ CURRENT_DATE-7\nAND CURRENT_DATE\n```\n\n如果您需要为不同的日期区间运行相同的查询，您将需要创建另一个视图（或重新创建现有视图）。但是，如果将这个\
  \ SELECT 语句打包成函数\n\n```sql\nCREATE OR REPLACE FUNCTION recent_flights(p_date date)\n\
  RETURNS SETTOF recent_flights_record AS\n$BODY$\nBEGIN\nRETURN QUERY\nSELECT flight_id,\n\
  departure_airport,\narrival_airport,\nscheduled_departure\nFROM flight\nWHERE scheduled_departure\
  \ BETWEEN p_date-7\nAND p_date;\nEND; $BODY$;\n```\n\n… 您就可以简单地使用不同的参数执行它：\n\n```sql\n\
  SELECT * FROM recent_flights(CURRENT_DAY)\nSELECT * FROM recent_flights(‘2023-08-01’)\n\
  ```\n\n### 不显式依赖表和视图\n\n如果报告是通过调用函数来执行的，那么它可以在不需要删除和重建的情况下进行优化。此外，底层表可以被修改，或者我们最终可能使用完全不同的表，而所有这些对最终用户都是不可见的。\n\
  \n### 执行动态 SQL 的能力\n\n函数允许根据参数的值构建 SQL 语句。SQL 语言本身没有在运行时动态构建语句然后执行的选项。您可以在应用程序中构建\
  \ SQL 语句，然后发送到数据库执行，或者可以在 `plpgsql` 函数内部构建它。这是 PostgreSQL 另一个极其强大的功能，但经常未被充分利用，更多细节将在第\
  \ 13 章讨论。\n\n## 存储过程\n\n与其他数据库管理系统相比，PostgreSQL 有一段时间没有存储过程，这让许多来自商业系统的早期采用者非常失望。至于我们，本书的作者，我们对函数的原子性尤其感到沮丧，因为它不允许任何事务管理，包括提交中间结果。\n\
  \n### 无结果函数\n\n有一段时间，PostgreSQL 开发者除了使用函数代替存储过程外别无选择。您可以使用返回 `VOID` 的函数来做到这一点，例如\n\
  \n```sql\nCREATE OR REPLACE function cancel_flight (p_filght_id int) RETURNS VOID\
  \ AS\n```\n\n此外，当从另一个函数或过程调用函数时，还有另一种执行方式：\n\n```sql\nPERFORM issue_boarding_pass(175820,462972,\
  \ '22C', '2020-06-16 21:45'::timestamptz)\n```\n\n上述方式将执行函数并创建登机牌，但不会返回结果。\n\n###\
  \ 函数与存储过程\n\n函数和存储过程的区别在于，过程不返回任何值；因此，我们不需要指定返回类型。清单 12-24 展示了 `CREATE PROCEDURE`\
  \ 命令，它与 `CREATE FUNCTION` 命令非常相似。\n\n```sql\nCREATE PROCEDURE procedure_name (par_name1\
  \ par_type1, ...)\nAS\n\nLANGUAGE procedure language;\n```\n清单 12-24\n`CREATE PROCEDURE`\
  \ 命令\n\n过程体的语法与函数体相同，只是不需要 `RETURN` 类型。此外，前面关于函数内部结构的所有章节内容也适用于存储过程。要执行存储过程，使用 `CALL`\
  \ 命令：\n\n```sql\nCALL cancel_flight(13);\n```\n\n\n### 事务管理\n\n函数与存储过程在执行方式上最重要的区别在于，可以在过程体内提交或回滚事务。\n\
  \n过程执行开始时会启动一个新事务，函数体内的任何 `COMMIT` 或 `ROLLBACK` 命令都会终止当前事务并启动一个新事务。其中一个用例是批量数据加载。我们发现将变更以合理大小的部分进行提交是有益的，例如，每\
  \ 50,000 条记录。存储过程的结构可能如清单 12-25 所示。\n\n```\nCREATE PROCEDURE load_with_transform()\n\
  AS $load$\nDECLARE\nv_cnt int:=0;\nv_record record;\nBEGIN\nFOR v_record IN (SELECT\
  \ * FROM data_source) LOOP\nPERFORM transform (v_rec.id);\nCALL insert_data (v_rec.*);\n\
  v_cnt:=v_cnt+1;\nIF v_cnt>=50000 THEN\nCOMMIT;\nv_cnt:=0;\nEND IF;\nEND LOOP;\n\
  COMMIT;\nEND;\n$load$ LANGUAGE plpgsql;\nListing 12-25\n带事务的存储过程示例\n```\n\n在此示例中，数据在加载前进行处理，并在处理\
  \ 50,000 条记录时执行 `COMMIT`。在循环结束后需要为剩余的记录（在最后一次循环内提交之后处理的记录）执行一次额外的提交。\n\n### 异常处理\n\
  \n与函数一样，你可以包含指令来处理某些处理异常的发生。在清单 12-3 中，我们提供了函数中异常处理的示例。可以在过程中执行类似的异常处理。\n\n此外，可以在函数或过程体内创建内部块，并在每个块中使用不同的异常处理。这种情况下的过程体结构如清单\
  \ 12-26 所示。\n\n```\nCREATE PROCEDURE multiple_blocks AS\n$mult$\nBEGIN\n---case\
  \ #1\nBEGIN\n\nEXCEPTION WHEN OTHERS THEN\nRAISE NOTICE 'CASE#1\";\nEND; --case\
  \ #1\n---case #2\nBEGIN\n\nEXCEPTION WHEN OTHERS THEN\nRAISE NOTICE 'CASE#2\";\n\
  END; --case #2\n---case #3\nBEGIN\n\nEXCEPTION WHEN OTHERS THEN\nRAISE NOTICE 'CASE#3\"\
  ;\nEND; --case #3\nEND; ---proc\n$mult$ LANGUAGE plpbsql;\nListing 12-26\n过程体中的嵌套块\n\
  ```\n\n请注意，过程体中的 `BEGIN` 与启动事务的 `BEGIN` 命令是不同的。\n\n## 总结\n\nPostgreSQL 中的函数和存储过程是极其强大的工具，却被许多数据库开发者忽视。它们既能显著提升性能，也能显著降低性能，并且可以成功地用于\
  \ OLTP 和 OLAP 环境。第 14 章将提供更多关于如何决策函数使用的指导。\n\n本章是对函数多种使用方式的初步介绍。关于如何定义和使用函数及存储过程的更多细节，请查阅\
  \ PostgreSQL 文档。\n\n"
- '# 13. 动态 SQL


  ## 什么是动态 SQL


  动态 SQL 是指首先构建为文本字符串，然后使用 `EXECUTE` 命令执行的任何 SQL 语句。动态 SQL 的示例如清单 13-1 所示。动态 SQL 在大多数关系数据库管理系统中都未得到充分利用，在
  PostgreSQL 中尤其如此。本章的建议与许多数据库教科书的常规做法背道而驰，但所有建议都严格基于我们的实践经验。


  ```

  DECLARE

  v_sql text;

  cnt int;

  BEGIN

  v_sql:=$$SELECT count(*)

  FROM booking

  WHERE booking_ref=''0Y7W22''$$;

  EXECUTE v_sql into cnt;


  Listing 13-1

  动态 SQL

  ```


  ### 为什么动态 SQL 在 Postgres 中效果更好


  相对于其他数据库管理系统，PostgreSQL 有什么特别之处，使得这里的建议如此偏离传统智慧？请考虑以下几点。


  首先，在 PostgreSQL 中，即使对于*预处理查询*（即使用 `PREPARE` 命令进行预解析、分析和重写的查询），执行计划也不会被缓存。这意味着优化总是在执行前立即发生。


  其次，PostgreSQL 中的优化步骤发生得比其他系统更晚。例如，在 Oracle 中，参数化查询的执行计划总是为通用查询准备，即使存在具体值。此外，如果使用不同值执行相同的查询，带有绑定变量的计划会被缓存以供将来使用。优化器会考虑表和索引统计信息，但不考虑参数的具体值。PostgreSQL
  做的相反。执行计划是针对具体值生成的。


  如前所述，动态查询在其他数据库管理系统中也被不公平地忽视。这主要是因为对于长时间运行的查询（数十秒或更久），开销大多可以忽略不计。


  ### 那么 SQL 注入呢？


  通常，建议使用动态 SQL 以获得更好性能会引发担忧：SQL 注入怎么办？当然，我们都听说过密码被盗和数据被删的恐怖故事，因为恶意攻击者在表单中传入了危险的命令而非数据。当然，这是一个真实的风险，而且黑客获取本不应访问数据的方式不止一种。然而，使用动态
  SQL 有防护措施可以最大限度地降低风险。


  在函数调用的参数值直接从数据库获取的情况下（例如，引用 ID），SQL 注入是不可能的。从用户输入获取的值必须使用 PostgreSQL 函数（`quote_literal`、`quote_indent`
  等或 `format`）进行清理——本章稍后将演示这方面的示例。用户输入也可以受益于应用程序端的验证。



  ## 如何使用动态 SQL 获得最优执行计划


  如第 12 章所述，PostgreSQL 可能会复用函数中参数化 SQL 语句的执行计划，这在某些情况下可能导致性能不佳。为确保构建最优的执行计划，我们可以在函数内部构建动态
  SQL 然后执行，而不是将参数值作为绑定变量传递。让我们看一个例子。


  回顾清单 6-6 中的查询，它有两个选择条件：出发机场国家和预订的最后更新时间。第 6 章演示了 PostgreSQL 如何根据这些参数的具体值来修改执行计划。


  在本章中，我们将看看如果这个查询在函数内部执行会发生什么。


  首先，让我们创建一个返回类型（参见清单 13-2）。


  ```sql

  DROP TYPE IF EXISTS booking_leg_part ;

  CREATE TYPE booking_leg_part AS(

  departure_airport char (3),

  booking_id int,

  is_returning boolean

  );

  ```


  清单 13-2：创建一个返回类型


  现在，让我们创建一个包含两个参数的函数：ISO 国家代码和最后更新的时间戳。此函数如清单 13-3 所示。


  ```sql

  CREATE OR REPLACE FUNCTION select_booking_leg_country (

  p_country text,

  p_updated timestamptz)

  RETURNS SETOF booking_leg_part

  AS

  $body$

  BEGIN

  RETURN QUERY

  SELECT

  departure_airport,

  booking_id,

  is_returning

  FROM booking_leg bl

  JOIN flight f USING (flight_id)

  WHERE departure_airport IN

  (SELECT

  airport_code

  FROM airport

  WHERE iso_country=p_country

  )

  AND bl.booking_id IN

  (SELECT

  booking_id

  FROM booking

  WHERE update_ts>p_updated

  )

  ;

  END; $body$

  LANGUAGE plpgsql;

  ```


  清单 13-3：清单 6-6 中的 SQL，打包在一个函数中


  第 6 章演示了 PostgreSQL 如何根据国家和时间戳搜索参数的值选择不同的执行计划，以及这如何影响执行时间。


  由于 PostgreSQL 中的函数（如同其他系统中的函数）是原子性的，我们无法运行`EXPLAIN`命令来查看函数的执行计划（准确地说，`EXPLAIN`会被执行，但它只会显示执行本身），但由于已知查询的预期响应时间，我们可以很好地了解内部发生了什么。


  回顾一下，之前执行清单 13-4 中的语句，执行时间约为 9.5 秒，执行了两个哈希连接。


  ```sql

  SELECT

  departure_airport,

  booking_id,

  is_returning

  FROM booking_leg bl

  JOIN flight f USING (flight_id)

  WHERE departure_airport IN

  (SELECT

  airport_code

  FROM airport WHERE iso_country=''US''

  )

  AND bl.booking_id IN

  (SELECT

  booking_id

  FROM booking

  WHERE update_ts>''2023-07-01''

  )

  ```


  清单 13-4：包含两个哈希连接的 SELECT


  还要回顾一下，通过将`update_ts`的边界移近数据集的“当前日期”8 月 17 日，最初执行时间并没有显著变化。`update_ts>''2023-08-01''`的执行时间仍约为
  7.9 秒，减少的原因是中间数据集变小了。该情况的执行计划如图 13-1 所示。


  ![](img/501585_2_En_13_Fig1_HTML.jpg)


  图 13-1：带有两个哈希连接的执行计划


  最终，随着`update_ts`的值接近 8 月 17 日，PostgreSQL 将选择索引访问，对于清单 13-5 中的查询，执行时间为 1.8 秒。


  ```sql

  SELECT departure_airport, booking_id, is_returning

  FROM booking_leg bl

  JOIN flight f USING (flight_id)

  WHERE departure_airport IN

  (SELECT airport_code

  FROM airport WHERE iso_country=''US'')

  AND bl.booking_id IN

  (SELECT booking_id FROM booking

  WHERE update_ts>''2023-08-14'')

  ```


  清单 13-5：一个哈希连接被替换为嵌套循环


  这种情况下的执行计划如图 13-2 所示。


  ![](img/501585_2_En_13_Fig2_HTML.jpg)


  图 13-2：带有一个哈希连接和一个嵌套循环的执行计划


  此外，如果我们使用`iso_country=’CZ’`运行相同的 SELECT，PostgreSQL 将产生另一个不同的执行计划，如图 13-3 所示。在这种情况下，执行时间约为
  200 毫秒。


  ![](img/501585_2_En_13_Fig3_HTML.jpg)


  图 13-3：仅包含嵌套循环的执行计划


  以这些数据为参考，让我们检查一下函数版本的查询性能如何。


  让我们尝试复现第 6 章中观察到的相同行为，即具有不同搜索条件的长查询，并执行清单 13-6 中所示的语句。


  ```sql

  #1

  SELECT * FROM select_booking_leg_country(''US'', ''2023-07-01'');

  #2

  SELECT * FROM select_booking_leg_country(''US'', ''2023-08-01'');

  #3

  SELECT * FROM select_booking_leg_country(''US'', ''2023-08-14'');

  #4

  SELECT * FROM select_booking_leg_country(''CZ'', ''2020-08-01'');

  ```


  清单 13-6：函数调用示例


  观察到的执行时间将根据前三到五次调用期间传递给函数的参数而有所不同。因此，语句#1 的执行时间（本应大约需要 9 秒）可能从 9 秒到 1 分钟不等，具体取决于调用的顺序。你甚至可以打开到本地
  PostgreSQL 的两三个连接，并尝试以不同的顺序执行这些调用。


  为什么函数的行为如此不一致？回顾第 12 章，其中指出 PostgreSQL *可能*保存预处理语句的执行计划，并且当函数在会话中第一次被调用时，它执行期间到达的每个
  SQL 语句都会被评估，执行计划会被优化，然后*可能*被缓存以供后续执行。


  我们故意不描述每个调用序列的具体行为，因为这是不保证的。虽然“不保证”对于训练数据库可能是可以接受的，但在生产环境中绝对是不可接受的，特别是当 OLTP 系统实施了限制最大等待时间并在等待时间超过该限制时中止事务的策略时。另外，别忘了连接池。实际上，任何
  Web 应用程序都会启动一定数量的连接，称为连接池，这些连接由应用程序用户的进程使用，最常见的是用于单个 SQL 语句。结果，一个 PostgreSQL 会话几乎肯定会使用非常不同的参数集来执行每个函数。


  为了保证每次执行函数时*都会针对其被调用时的具体值评估和优化执行计划*，我们创建执行动态 SQL 的函数。


  清单 13-7 展示了函数`select_booking_leg_country_dynamic`，它执行与`select_booking_leg_country`函数相同的
  SQL。唯一的区别是前者在函数内部构建了一个 SELECT 语句然后执行它。




  **引言**


  考虑下面这个函数定义：


  ```

  CREATE OR REPLACE FUNCTION select_booking_leg_country_dynamic(

  p_country text,

  p_updated timestamptz)

  RETURNS setof booking_leg_part

  AS

  $body$

  BEGIN

  RETURN QUERY

  EXECUTE $$

  SELECT

  departure_airport,

  booking_id,

  is_returning

  FROM booking_leg bl

  JOIN flight f USING (flight_id)

  WHERE departure_airport IN

  (SELECT

  airport_code

  FROM airport

  WHERE iso_country=$$|| quote_literal(p_country) ||

  $$ )

  AND bl.booking_id IN

  SELECT

  booking_id

  FROM booking

  WHERE update_ts>$$|| quote_literal(p_updated)||$$)$$;

  END;

  $body$ LANGUAGE plpgsql;

  ```

  清单 13-7

  一个执行动态 SQL 的函数


  这个函数接受与 `select_booking_leg_country` 相同的参数集，并返回相同的结果。但请注意，它对每组参数的执行时间是一致的，这正是我们在生产系统中想要的。


  为什么行为会改变？因为 SQL 是在执行前立即构建的，优化器不会使用缓存的执行计划。相反，它会为每次执行评估执行计划。这看起来可能会花费额外的时间，但实际上，结果恰恰相反。规划时间在
  100 毫秒以下，并且通过获得更好的执行计划来回报，从而节省更多时间。


  另外请注意，此函数使用 `quote_literal()` 函数来防范 SQL 注入。


  这是在函数中使用动态 SQL 的第一个但不是唯一的原因。本章后续会提供更多支持这种实践的案例。


  ## 在 OLAP 系统中使用动态 SQL


  本节的标题可能会产生误导。以下演示的技术可以用于任何系统；但是，当结果集很大时，效果最为显著。结果集越大，收益越明显。


  假设为了统计分析，我们需要按年龄对乘客进行排序。定义了一个用于划分年龄类别的函数，如清单 13-8 所示。


  ```

  CREATE OR REPLACE FUNCTION age_category (p_age int)

  RETURNS TEXT language plpgsql AS

  $body$

  BEGIN

  RETURN (CASE

  WHEN p_age <= 2 then ''Infant''

  WHEN p_age <=12 then ''Child''

  WHEN p_age < 65 then ''Adult''

  ELSE ''Senior''

  END);

  END; $body$;

  ```

  清单 13-8

  一个分配年龄类别的函数


  如果此函数用于统计报告，我们可能需要为每个乘客计算年龄类别。在第 12 章中，我们提到在 SELECT 列表中执行函数可能会减慢速度，但那些函数更复杂。`age_category`
  函数执行的是非常简单的替换。尽管如此，函数调用仍然需要时间。因此，


  ```

  SELECT

  passenger_id,

  age_category(age)

  FROM passenger

  ```


  需要 6.5 秒执行，而


  ```

  SELECT passenger_id,

  CASE

  WHEN age <= 2 then ''Infant''

  WHEN age <=12 then ''Child''

  WHEN age < 65 then ''Adult''

  ELSE ''Senior''

  END from passenger

  ```


  只需要 3.5 秒。


  在这种特定情况下，使用函数并非绝对必要，因为它只使用了一次，而且即使 Postgres Air 中最大的表之一，`passenger`，也只有 1600 万行。在真实的分析查询中，需要处理的行数可能达到数亿，并且可能需要多个分类函数。在一个实际场景中，使用函数的执行时间为四小时，而将一个函数替换为直接使用
  `CASE` 操作符的执行时间不到 1.5 小时。


  这是否意味着我们要不惜一切代价避免在 SELECT 列表中使用函数？可能我们的分析团队希望将年龄类别分配包装在函数中。最有可能的是，他们将在多个查询中使用此函数，并且希望如果年龄类别发生变化，他们的查询能够保持弹性和一致。


  一个更高效且能保持函数可维护性的解决方案是创建一个不同的函数，它包含*部分代码作为文本*，如清单 13-9 所示。


  ```

  CREATE OR REPLACE FUNCTION age_category_dyn (p_age text)

  RETURNS text language plpgsql AS

  $body$

  BEGIN

  RETURN ($$CASE

  WHEN $$||p_age ||$$ <= 2 THEN ''Infant''

  WHEN $$||p_age ||$$<= 12 THEN ''Child''

  WHEN $$||p_age ||$$< 65 THEN ''Adult''

  ELSE ''Senior''

  END$$);

  END; $body$;

  ```

  清单 13-9

  一个构建动态 SQL 的函数


  注意区别：当我们执行


  ```

  SELECT age_category(25)

  ```

  ...它会返回值 ''Adult''。


  如果你执行


  ```

  SELECT age_category_dyn(''age'')

  ```

  ...它将返回一个文本行，其中包含代码部分


  ```

  CASE

  WHEN age <= 2 THEN ''Infant''

  WHEN age<= 12 THEN ''Child''

  WHEN age< 65 THEN ''Adult''

  ELSE ''Senior''

  END

  ```


  要使用此函数，你需要将 SELECT 语句包装到一个函数中，但我们已经知道如何做了——参见清单 13-10。


  ```

  CREATE TYPE passenger_age_cat_record AS (

  passenger_id int,

  age_category text

  );

  CREATE OR REPLACE FUNCTION passenger_age_category_select ()

  RETURNS setof passenger_age_cat_record

  AS

  $body$

  BEGIN

  RETURN QUERY

  EXECUTE $$SELECT

  passenger_id,

  $$||age_category_dyn(''age'')||$$ AS age_category

  FROM passenger $$

  ;

  END;

  $body$ LANGUAGE plpgsql;

  ```

  清单 13-10

  使用 `age_category_dyn` 函数构建动态 SQL 查询


  现在，我们可以执行以下语句：


  ```

  SELECT * FROM passenger_age_category_select ()

  ```


  这大约需要五秒钟执行，比没有任何函数调用的语句要慢，但仍比我们选择执行原始版本的 `age_category` 函数要快。再一次，当我们处理真实的分析查询时，效果将更加明显。事实上，使用更大的表（例如，通过构建
  `passenger_large` 表，类似于第 7 章中构建 `boarding_pass_large` 表的方式），我们可以观察到类似的行为，且执行时间的差异更明显。


  有些人可能会认为，费心创建生成代码的函数不值得那点性能提升。重申一下，对于创建函数是否有益——无论是对于性能、代码提取还是可移植性——并没有普遍原则。第 11
  章提到，代码提取在 PG/PL SQL 函数中不像在面向对象编程语言中那样工作，并承诺提供一些例子。本节给出了其中一个例子。这里，函数 `age_category_dyn`
  有助于代码提取，因为年龄类别分配的更新只需在一个地方进行。同时，它对性能的影响比更传统的带参数的函数要小。大多数情况下，构建一个执行动态 SQL 的函数在开始时需要一些时间，因为调试更困难。然而，一旦函数就位，进行更改所需的时间就很少。决定哪种时间更关键——是初始开发时间还是平均执行时间——只能由应用程序和/或数据库开发人员来决定。



  ## 使用动态 SQL 实现灵活性


  此处描述的技术最常用于**OLTP**系统，尽管再次强调，它并非严格局限于某一种环境类型。


  通常，系统允许用户选择任意搜索条件组合，可能通过下拉列表或其他图形化方式构建查询。


  用户不需要（也不应该）了解数据在数据库中的存储方式。然而，搜索字段可能位于不同表中，搜索条件可能具有不同的选择性，并且总体上，`SELECT`语句可能因选择条件的不同而看起来差异很大。


  让我们看一个示例。假设需要实现一个函数，通过以下值的任意组合搜索预订记录：


  *   电子邮箱（或邮箱的前缀部分）

  *   出发机场

  *   到达机场

  *   出发日期

  *   航班 ID


  是否有办法在不依赖 Elasticsearch 的情况下高效实现此功能？！


  解决此问题的常见方法类似**代码清单 13-11**所示。


  ```

  CREATE TYPE booking_record_basic AS(

  booking_id bigint,

  booking_ref text,

  booking_name text ,

  account_id integer,

  email text );

  CREATE OR REPLACE FUNCTION select_booking (

  p_email text,

  p_dep_airport text,

  p_arr_airport text,

  p_dep_date date,

  p_flight_id int)

  RETURNS SETOF booking_record_basic

  AS

  $func$

  BEGIN

  RETURN QUERY

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  booking_name,

  account_id,

  email

  FROM booking b

  JOIN booking_leg bl USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE (p_email IS NULL OR lower(email) LIKE p_email||''%'')

  AND (p_dep_airport IS NULL OR departure_airport=p_dep_airport)

  AND (p_arr_airport IS NULL OR arrival_airport=p_arr_airport)

  AND (p_flight_id IS NULL OR bl.flight_id=p_flight_id);

  END;

  $func$ LANGUAGE plpgsql;

  ```

  **代码清单 13-11** 支持使用不同参数组合进行搜索的函数


  此函数将始终返回正确结果，但从性能角度来看，其行为至少可以说是难以预测的。请注意，当按电子邮箱搜索时，与`booking_leg`和`flight`表的连接并不需要，但它们仍将存在。


  下面，我们记录了一个可能的调用序列以及观察到的执行时间。


  #1. 按电子邮箱搜索。


  ```

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.email

  FROM booking b

  WHERE lower(email) like ''lawton52%''

  ```


  作为`SELECT`语句，此查询耗时 2.1 秒。


  ```

  SELECT * FROM select_booking (''lawton52'',

  NULL,

  NULL,

  NULL,

  NULL

  )

  ```


  等效的函数执行耗时 3.5 秒。


  #2. 按电子邮箱和`flight_id`筛选。


  ```

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.email

  FROM booking b

  JOIN booking_leg bl USING (booking_id)

  WHERE lower(email) like ''lawton52%''

  AND flight_id= 2605

  ```


  `SELECT`语句耗时 80 毫秒。


  ```

  SELECT * FROM select_booking (

  ''lawton52'',

  NULL,

  NULL,

  NULL,

  NULL

  )

  ```


  函数执行同样耗时 80 毫秒。


  #3. 按电子邮箱、出发机场和到达机场筛选。


  ```

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.email

  FROM booking b

  JOIN booking_leg bl USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE lower(email) like ''lawton52%''

  AND departure_airport=''ORD''

  AND arrival_airport=''JFK''

  ```


  `SELECT`语句耗时 80 毫秒。


  ```

  SELECT * FROM select_booking (

  ''lawton52'',

  ''ORD'',

  ''JFK'',

  NULL,

  NULL

  )

  ```


  使用相同参数的函数执行耗时 200 毫秒。


  #4. 按电子邮箱、出发机场、到达机场和计划出发时间筛选。


  ```

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.email

  FROM booking b

  JOIN booking_leg bl USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE lower(email) like ''lawton52%''

  AND departure_airport=''ORD''

  AND arrival_airport=''JFK''

  AND scheduled_departure BETWEEN ''07-26-2023'' AND ''07-27-2023''

  ```


  `SELECT`语句耗时 46 毫秒。


  ```

  SELECT * FROM select_booking (

  ''lawton52'',

  ''ORD'',

  ''JFK'',

  ''2023-07-26'',

  NULL

  )

  ```



  函数执行耗时 155 毫秒。


  ## 5. 按邮箱和计划出发时间搜索。


  ```sql

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.email

  FROM booking b

  JOIN booking_leg bl USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE lower(email) like ''lawton52%''

  AND scheduled_departure BETWEEN ''07-30-2023'' AND ''07-31-2023''

  ```


  `SELECT` 耗时 1.3 秒。


  ```sql

  SELECT * FROM select_booking (

  ''lawton52'',

  NULL,

  NULL,

  ''2023-07-30'',

  NULL

  )

  ```


  函数执行耗时 35 秒。


  ## 6. 按 flight_id 搜索。


  ```sql

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.email

  FROM booking b

  JOIN booking_leg bl USING (booking_id)

  WHERE flight_id= 27191

  ```


  `SELECT` 耗时 56 毫秒。


  ```sql

  SELECT * FROM select_booking (

  NULL,

  NULL,

  NULL,

  NULL,


  )

  ```


  函数执行耗时 10 秒。


  正如我们之前讨论的，如果在当前会话中，前五次函数执行产生的执行计划对后续执行并非最优，那么不同函数调用的执行时间甚至可能更长。在测试此函数时，我们设法找到一个函数调用顺序，使得最后一个示例的运行时间长达三分钟。但是，即使在预期响应时间低于
  100 毫秒的情况下，十秒的执行时间也可能导致应用程序超时。即便这种情况极为罕见，但在生产系统中也是不可接受的。


  我们能否找到替代解决方案？与前面的示例类似，可以编写一个函数，根据传入的参数动态构建 `SELECT` 语句。此外，它还能在每次执行前受益于分析。


  新函数的源代码如清单 13-12 所示。


  ```sql

  CREATE OR REPLACE FUNCTION select_booking_dyn (

  p_email text,

  p_dep_airport text,

  p_arr_airport text,

  p_dep_date date,

  p_flight_id int)

  returns setof booking_record_basic

  AS

  $func$

  DECLARE

  v_sql text:=

  ''SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  booking_name,

  account_id,

  email

  FROM  booking b '';

  v_where_booking text;

  v_where_booking_leg text;

  v_where_flight text;

  BEGIN

  IF p_email IS NOT NULL

  THEN v_where_booking :=$$ lower(email) like $$ ||quote_literal(p_email||''%'');
  END IF;

  IF p_flight_id IS NOT NULL

  THEN v_where_booking_leg:= $$ flight_id=$$||p_flight_id::text;

  END IF;

  IF p_dep_airport IS NOT NULL

  THEN v_where_flight:=concat_ws($$ AND $$, v_where_flight,

  $$departure_airport=$$||

  quote_literal(p_dep_airport));

  END IF;

  IF p_arr_airport IS NOT NULL

  THEN v_where_flight:=concat_ws($$ AND $$,v_where_flight,

  $$arrival_airport=$$||

  quote_literal(p_arr_airport));

  END IF;

  IF p_dep_date IS NOT NULL

  THEN v_where_flight:=concat_ws($$ AND $$,v_where_flight,

  $$scheduled_departure BETWEEN $$||

  quote_literal(p_dep_date)||$$::date AND

  $$||quote_literal(p_dep_date)||

  $$::date+1$$);

  END IF;

  IF v_where_flight IS NOT NULL  OR v_where_booking_leg IS NOT NULL

  THEN v_sql:=v_sql||$$ JOIN booking_leg bl USING (booking_id) $$;

  END IF;

  IF v_where_flight IS NOT NULL

  THEN v_sql:=v_sql ||$$ JOIN flight f USING (flight_id) $$;

  END IF;

  v_sql:=v_sql ||$$ WHERE $$||concat_ws($$ AND $$,v_where_booking, v_where_booking_leg,
  v_where_flight);

  return query EXECUTE (v_sql);

  END;

  $func$ LANGUAGE plpgsql;

  ```


  清单 13-12：一个构建动态 SQL 以根据不同条件进行搜索的函数


  这代码量可不少！让我们一步步来看，审视一下这里究竟发生了什么。


  新函数的参数与旧函数完全相同，结果类型也一致，但函数体完全不同。从高层次看，此函数在 `v_sql` 文本变量中构建了一条待执行的语句。


  动态构建查询意味着我们可以选择只包含所需的连接。`booking` 表总是需要的，这就是为什么 `v_sql` 的初始值被设置为


  ```sql

  ''SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  booking_name,

  account_id,

  email

  FROM  booking b '';

  ```


  然后，根据传入了哪些非 `NULL` 的参数，函数决定需要哪些其他表。如果 `p_flight_id` 参数为 `NULL`（即未使用与航班相关的参数），则可能只需要
  `booking_leg` 表。也可能需要两个表：`booking_leg` 和 `flight`。


  在添加了所有必要的表之后，通过用 `''AND''` 分隔符连接所有条件来构建完整的搜索条件。根据搜索条件，最终确定 `v_sql` 语句并执行。要查看不同函数调用下的最终查询是什么，请取消
  `RAISE NOTICE` 语句的注释。


  为了提升性能，这工作量是否太大？尝试编译此函数，并使用前面示例中的相同参数执行它。很快就能发现，对于每一组参数，`select_booking_dyn()` 函数的执行时间都不超过相应
  SQL 语句的执行时间——这在案例 #5 和 #6 中尤为明显。此外，执行时间是可预测的，并不取决于当前会话中的首次执行。


  再次强调，动态函数不易调试，你可能需要包含大量的调试输出，但如果你的生产系统性能至关重要，那么这些努力所带来的回报是非常值得的。



  ## 使用动态 SQL 辅助优化器


  由于本章全文致力于探讨如何通过动态 SQL 提升查询性能，本节标题或许令人费解。然而本节关注的是另一类性能问题成因。这些示例中，动态 SQL 并非用于构建特定场景的
  SQL 语句，而是用于引导优化器选择更优的执行计划。


  细察前一节所有示例，会发现有一种搜索条件组合表现尤为糟糕——尽管结果集很小，即同时根据预订邮箱和出发机场进行搜索时。即使邮箱条件具有足够筛选性，优化器仍未能利用第二次连接中`booking_id`的索引。若执行代码清单
  13-13，其执行计划显示为哈希连接——参见图 13-4。


  ```sql

  SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.account_id,

  b.email

  FROM booking b

  JOIN  booking_leg bl USING (booking_id)

  JOIN flight f USING (flight_id)

  WHERE lower(email) like ''lawton510%''

  AND departure_airport=''JFK''

  清单 13-13

  通过邮箱和出发机场选择预订记录

  ```


  该查询执行时间约四秒，而结果仅包含 16 行数据。对于如此小规模的查询，其执行速度理应更快。


  此次优计划的原因前文已提及——PostgreSQL 优化器未能准确估算中间结果集的大小。通过模式索引筛选出的实际行数为 3941，而计划中的估算值却是 28219。


  ![](img/501585_2_En_13_Fig4_HTML.jpg)


  查询计划截图。包含 23 行代码，通过哈希连接检查机场预订记录。


  图 13-4


  代码清单 13-13 使用哈希连接的执行计划


  优化此查询的技术本质上是辅助优化器完成工作，消除对结果集大小估算的需求。具体方法是：首先找出与目标邮箱对应的预订 ID，然后将`booking_id`列表传递给主`SELECT`语句。注意：本例使用的函数高度特定于当前场景，仅作演示用途（清单
  13-14）。更接近生产环境通用方案的函数会庞大得多。


  ```sql

  CREATE OR REPLACE FUNCTION select_booking_email_departure(

  p_email text,

  p_dep_airport text)

  RETURNS SETOF booking_record_basic AS

  $body$

  DECLARE

  v_sql text;

  v_booking_ids text;

  BEGIN

  EXECUTE $$SELECT array_to_string(array_agg(booking_id), '','')

  FROM booking

  WHERE lower(email) like $$||quote_literal(p_email||''%'')

  INTO v_booking_ids;

  v_sql=

  $$SELECT DISTINCT

  b.booking_id,

  b.booking_ref,

  b.booking_name,

  b.account_id,

  b.email

  FROM booking b

  JOIN  booking_leg bl USING(booking_id)

  JOIN flight f USING (flight_id)

  WHERE b.booking_id IN ($$||v_booking_ids||$$)

  AND departure_airport=$$||quote_literal(p_dep_airport);

  RETURN QUERY EXECUTE v_sql;

  END;

  $body$ LANGUAGE plpgsql;

  清单 13-14

  通过动态 SQL 改进清单 13-13 的代码

  ```


  为何此方法有效？我们知道邮箱搜索将具有较强限制性，因为传递的参数几乎是完整邮箱地址（或至少是其核心部分）。因此第一步预先筛选出具有该邮箱的较少数量预订记录，并保存至文本变量`v_booking_ids`。随后在`SELECT`语句中显式使用`booking_id`列表构建查询。


  执行这个新函数


  ```sql

  SELECT * FROM select_booking_email_departure(''lawton510'',''JFK'')

  ```


  ……执行时间将仅需 200 毫秒。检查生成的 SQL 语句的`EXPLAIN`命令输出，其执行计划如图 13-5 所示。


  ![](img/501585_2_En_13_Fig5_HTML.jpg)


  查询计划截图。包含 16 行代码，通过预订 ID 列表检查机场预订记录。


  图 13-5


  使用`booking_id`列表的动态 SQL 执行计划


  即使涉及数千个 ID，基于索引的访问方式仍证明更为高效。


  ## 外部数据包装器与动态 SQL


  如引言所述，分布式查询的详细讨论超出本书范围。但由于涵盖动态 SQL，借此机会对外部数据包装器（FDWs）的应用稍作说明。


  外部数据包装器是能与外部数据源通信的库（即位于 PostgreSQL 服务器外的数据），它隐藏了连接数据源及从中获取数据的具体细节。


  FDW 是功能强大的工具，针对不同类型数据库的外部数据包装器正日益增多。PostgreSQL 在优化涉及`foreign tables`（外部系统表的映射）的查询方面表现出色。然而，由于访问外部统计信息可能受限（尤其当外部系统非
  PostgreSQL 时），优化可能不够精确。我们发现运用前节所述技术极具助益。


  优化的第一种方式是先执行查询的本地部分，识别需要从远程服务器获取的记录，再访问远程表。另一种方式是将带常量条件（如`WHERE update_ts> CURRENT_DATE
  -3`）的查询发送至远程站点，将远程数据拉取到本地，再执行查询剩余部分。采用这两种技术之一有助于最小化执行时间的不一致性。


  ## 总结


  动态 SQL 是 PostgreSQL 中极其强大的工具，却未被数据库开发者充分利用。当所有其他优化技术失效时，动态 SQL 能有效提升性能。


  动态 SQL 在函数内效果最佳：基于函数输入参数生成 SQL 语句后执行。它既适用于 OLTP 环境，也适用于 OLAP 环境。


  若选择在项目中使用动态 SQL，请准备好进行大量耗时的调试工作。初期可能令人沮丧，但性能提升绝对物有所值。


