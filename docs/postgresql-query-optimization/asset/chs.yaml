  \n## 查询作为表达式：集合式思维\n\n编写声明式查询对人类来说并非易事。人们更熟悉的是动作，而不是规则或条件。采用集合式思维^(²) 会更容易：我们可以思考对表的操作，而不是对单个对象（或行）的操作。\n\
  \n前面提到的所有逻辑操作都可以用 SQL 轻松表达。这些操作接受表作为参数，无论是存储在数据库中的表，还是先前操作结果输出的表。\n\n一个作为 SQL 查询编写的\
  \ PostgreSQL 表达式将由优化器处理，并很可能被另一个使用前面讨论的等价规则的等价表达式所替换。\n\n由于任何关系操作的结果都是一个关系，它可以直接传递给下一个关系操作，而无需中间存储。一些数据库开发人员选择创建临时表来存储中间结果，但这种做法会产生不必要的计算开销并阻碍优化器。\n\
