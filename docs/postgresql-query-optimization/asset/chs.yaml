  \n上述定义最重要的部分是*需要*和*访问*之间的区别。一个短查询的糟糕执行计划可能会读取和/或处理比最终输出所需多得多的行。虽然一定程度的冗余处理是不可避免的，但我们的目标是减少它。\n\
  \n“很小比例”有多小？不出所料，这取决于系统参数、应用程序的具体情况、实际表大小以及可能的其他因素。但在大多数情况下，它意味着小于 10%。本章后面将通过一个案例研究来说明如何识别这个临界点。\n\
