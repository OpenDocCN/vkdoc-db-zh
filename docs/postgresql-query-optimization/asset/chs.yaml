  最后进行分组的执行计划


  如代码清单 6-21 所示，通过一个巧妙的重写，该查询的执行得到了显著改善。


  ```sql

  SELECT

  city,

  date_trunc(''month'', scheduled_departure),

  sum(passengers)  passengers

  FROM airport  a

  JOIN flight f ON airport_code = departure_airport

  JOIN (

  SELECT flight_id, count(*) passengers

  FROM booking_leg l

  JOIN boarding_pass b USING (booking_leg_id)

  GROUP BY flight_id

  ) cnt

  USING (flight_id)

  GROUP BY 1,2

  ORDER BY 3 DESC

  ```

  代码清单 6-21

  强制先进行分组的查询重写


  这里发生了什么？首先，在内联视图 `cnt` 中对每个航班的出发乘客数量进行求和。之后，将结果与 `flight` 表连接以检索机场代码，再与 `airport`
  表连接以找出每个机场所在的城市。然后，按城市对航班总数进行求和。这样，执行时间缩短为 15 秒。执行计划如图 6-18 所示。


