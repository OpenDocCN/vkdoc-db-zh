  忠诚度计划客户可能通过卡号识别。然而，独立的代理键 `frequent_flyer_id` 便于替换丢失或被盗的卡片，无需将数据从一个客户记录映射或迁移到另一个，也不会丢失忠诚客户的数据。


  相比之下，`flight` 表中的代理键 `flight_id` 是必需的。航班的自然标识由 `flight_num`（航班号）和 `scheduled_departure`（计划离港时间）组成。航班号在不同日期是相同的，而离港时间在不同日期可能不同，并且当航班已部分售出时，可能会有轻微更改（例如，晚
  5-10 分钟）。`flight_id` 代表了具有特定航班号的航班的特定实例，如代码清单 9-14 所示。


