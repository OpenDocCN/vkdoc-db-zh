  \ 中使用 `indices of` 选项\n\n\n\n## `values of` 子句的用法\n\n如果你想将一个集合用作另一个集合中的一组指针，可以使用\
  \ `values of` 子句。\n\n将表中的所有行获取到我们的集合后，用具有 `driver_number` 值的记录填充另一个集合 (`l_drivers_with_number`)。该集合的索引就是\
  \ `driver_number`。同时，将 `driver_number` 保存到另一个不同的集合 (`l_driver_numbers`) 中。这些就是我们指向\
