  PL/SQL 过程已成功完成。\n代码清单 1-3\n使用 limit 子句显示荷兰籍车手的姓名\n```\n\n## forall\n\n既然你可以从数据库中批量获取数据，你也可以使用\
  \ `forall` 语句将数据批量写回数据库。\n\n`forall` 语句的语法看起来很像循环语句，但它不是将单个语句发送到 SQL 引擎，而是将它们打包在一起一次性发送。\n\
  \n你可以用三种方式使用 `forall` 语句。最简单的使用方法是为密集集合指定一个范围。如果你的集合是稀疏的，你可以使用 `indices of`（索引）子句。如果你想将你集合的值用作指向另一个集合的指针，你可以使用\
  \ `values of`（值）子句。对于这些示例，创建一个表来保存拥有固定车手编号的车手。\n\n```\ncreate table drivers_with_number\n\
  as\nselect drv.*\nfrom   f1data.drivers drv\nwhere  1=2\n/\n```\n\n注意\n所有这些示例都可以使用单条\
  \ SQL 语句完成，但此处是为了展示不同的可能用法。\n\n\n#### 范围\n\n当你在语句中指定要使用的集合的起始和结束索引时，会使用到 `forall`\
  \ 语句的（隐式）`range` 选项。该集合必须是一个密集集合。清单 1-4 展示了一个在 `forall` 语句中使用 `range` 子句的示例。如果你指定的范围中缺少某个元素，将会引发异常。\n\
  \n```sql\ndeclare\n  cursor c_drivers\n  is\n    select drv.*\n    from   f1data.drivers\
  \ drv\n    where  drv.driver_number is not null\n    order  by drv.dob\n  ;\n  type\
  \ drivers_tt is table of f1data.drivers%rowtype\n    index by pls_integer;\n  l_drivers\
  \ drivers_tt;\nbegin\n  open  c_drivers;\n  fetch c_drivers\n    bulk  collect into\
  \ l_drivers;\n  close c_drivers;\n  if l_drivers.count > 0\n  then\n    forall indx\
  \ in l_drivers.first .. l_drivers.last\n      insert into drivers_with_number\n\
  \        values l_drivers( indx );\n  end if;\nend;\n/\n```\n\n清单 1-4\n在 `forall`\
  \ 中使用 `range` 选项\n\n```sql\nORA-22160: element at index [xxx] does not exist\n```\n\
  \n### indices of\n\n如果你有一个稀疏集合（即，在该范围中缺少某些元素），你可以使用 `indices of` 选项。与之前的例子（首先就没有选择没有固定\
  \ `driver_number` 的车手）不同，你现在将所有车手从数据库选择到我们的集合中。\n\n```sql\nopen c_drivers;\nfetch\
  \ c_drivers\n  bulk  collect into l_drivers;\nclose c_drivers;\n```\n\n然后从集合中删除没有固定\
  \ `driver_number` 的车手，创建一个稀疏集合。\n\n```sql\nfor indx in l_drivers.first .. l_drivers.last\n\
  loop\n  if l_drivers( indx ).driver_number is null\n  then\n    l_drivers.delete(\
  \ indx );\n  end if;\nend loop;\n```\n\n现在你有了一个稀疏集合，使用 `forall` 语句的 `indices of`\
  \ 选项将这些行从稀疏集合插入到数据库中。\n\n```sql\nforall indx in indices of l_drivers\n  insert into\
  \ drivers_with_number values l_drivers( indx );\n```\n\n清单 1-5 是完整的脚本。\n\n```sql\n\
  declare\n  cursor c_drivers\n  is\n    select drv.*\n    from   f1data.drivers drv\n\
  \  ;\n  type drivers_tt is table of f1data.drivers%rowtype\n    index by pls_integer;\n\
  \  l_drivers drivers_tt;\nbegin\n  open c_drivers;\n  fetch c_drivers\n    bulk\
  \  collect into l_drivers;\n  close c_drivers;\n  if l_drivers.count > 0\n  then\n\
  \    for indx in l_drivers.first .. l_drivers.last\n    loop\n      if l_drivers(\
  \ indx ).driver_number is null\n      then\n        l_drivers.delete( indx );\n\
  \      end if;\n    end loop;\n  end if;\n  if l_drivers.count > 0\n  then\n   \
  \ forall indx in indices of l_drivers\n      insert into drivers_with_number values\
  \ l_drivers( indx );\n  end if;\nend;\n/\n```\n```sql\nselect dwn.driverid     \
  \ as id\n, dwn.driverref     as ref\n, dwn.driver_number as num\nfrom   drivers_with_number\
  \ dwn\norder  by dwn.driver_number\n/\n```\n```\nID REF                  NUM\n-----\
