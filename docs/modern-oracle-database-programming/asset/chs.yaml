- "# 第一部分：高级基础\n\n### 1. 未充分利用的功能与增强特性\n\n随着每个 Oracle 数据库版本的发布，越来越多的功能被添加进来，以使数据库开发更轻松、更简单和/或性能更高。其中一些增强功能对于普通开发人员来说仍然相对陌生，这很可惜。Oracle\
  \ 数据库功能丰富，在你自行构建解决方案之前，应该充分发挥其潜力。本章的重点是那些值得更多关注的功能，例如批量操作、复合触发器和错误日志等。本章简要介绍并举例说明如何使用它们，以提高意识并供你进一步探索。有关示例中使用的表，请参阅引言。\n\
  \n\n### 合并\n\n假设你想根据 `RESULTS`（结果）表来更新 `CONSTRUCTORRESULTS`（ constructors 结果）表。你可以创建一个\
  \ PL/SQL 块来判断哪些行已存在需要更新、哪些需要新建。但你可以用一条 `merge`（合并）语句来完成这一切。\n\n`merge` 语句（在 Oracle\
  \ 数据库 9i 中引入）根据数据在表中的存在情况，有条件地向表中插入或更新数据。如果记录不存在，则插入；如果记录已存在，则更新。可以在 `matched`（匹配）子句中添加一个可选的\
  \ `delete where`（删除条件）子句。这仅删除那些同时符合 `on`（关联）子句和 `delete where` 子句的行。此技术在代码清单 1-1\
  \ 中展示。\n\n```\nmerge into constructorresults tgt\nusing (select rsl.raceid     \
  \     as raceid\n, rsl.constructorid   as constructorid\n, sum( rsl.points )   as\
  \ points\nfrom   f1data.results rsl\nwhere  rsl.raceid = g_raceids(indx).raceid\n\
  and    rsl.constructorid = g_raceids(indx).constructorid\ngroup  by rsl.raceid\n\
  , rsl.constructorid) src\non (    tgt.raceid = src.raceid\nand tgt.constructorid\
  \ = src.constructorid )\nwhen matched\nthen\nupdate\nset    tgt.points = src.points\n\
  when not matched\nthen\ninsert\n( constructorresultsid\n, raceid\n, constructorid\n\
  , points)\nvalues\n( f1data.constructorresults_seq.nextval\n, src.raceid\n, src.constructorid\n\
  , src.points)\n/\n代码清单 1-1\n将 RESULTS 表合并到 CONSTRUCTORRESULTS 表\n```\n\n### 集合\n\
  \n集合（Collections）在 PL/SQL 中自其被引入 Oracle 数据库起就已存在。如今，你可以选择三种类型的集合。\n\n*   `associative\
  \ array`（关联数组）\n*   `nested table`（嵌套表）\n*   `varray`（可变数组）\n\n`associative array`\
  \ 仅在 PL/SQL 中可用。其他两种在 SQL 中也可用，因此它们可以作为表中的列数据类型或独立的 SQL 对象使用。\n\n这些集合有许多相似之处，但也有一些重要区别，如表\
  \ 1-1 所述。\n\n表 1-1\n集合比较\n\n|   | `关联数组` | `嵌套表` | `可变数组` |\n| --- | --- | --- |\
  \ --- |\n| **使用的语言** | 仅 PL/SQL | SQL 和 PL/SQL | SQL 和 PL/SQL |\n| **索引类型** | （字母）数字\
  \ | 数字 | 数字 |\n| **范围** | 不受限制 – 2³¹+1 到 2³¹–1 | 不受限制 1 到 2³¹–1 | 受限制 |\n| **稀疏性**\
  \ | 稀疏 | 初始密集/删除后稀疏 | 密集 |\n| **有序性** | 无序 | 无序 | 有序 |\n| **存储在数据库表中时** | 不适用 |\
  \ 行外存储 | 行内存储 |\n| **用途** | 任何数据集 | 任何数据集 | 小型数据集 |\n\n当将数据从数据库选取到 PL/SQL 变量中或将数据从\
  \ PL/SQL 变量写回数据库时，你可以逐行进行（也称为慢速逐行处理）。但是，自 Oracle 数据库 8i 起，你就有了批量操作可用。要实现这一点，集合至关重要。\n\
  \n#### 批量收集\n\n你可以使用 `bulk collect`（批量收集）选项从数据库中检索数据。与其从数据库中选择单条记录，不如从数据库中选择整个记录集，并在一次数据库访问中将它们存储在一个集合中。\n\
  \n如果你想仅从数据库中检索荷兰籍车手，你必须创建一个集合类型来保存数据。在这种情况下，基于游标的结构创建一个记录的集合。\n\n```\ndeclare\n\
  cursor c_dutch_drivers\nis\nselect *\nfrom   f1data.drivers drv\nwhere  drv.nationality\
  \ = 'Dutch'\n;\ntype dutch_drivers_tt is table of f1data.drivers%rowtype\nindex\
  \ by pls_integer;\n```\n\n然后基于此集合类型创建一个变量。\n\n```\nl_dutch_drivers dutch_drivers_tt;\n\
  ```\n\n接着在游标中，使用 `bulk collect` 批量收集到集合变量中，而不是提取到单个记录。\n\n```\nbegin\nopen  c_dutch_drivers;\n\
  fetch c_dutch_drivers\nbulk  collect\ninto  l_dutch_drivers;\nclose c_dutch_drivers;\n\
  ```\n\n这样，整个结果集在一次数据库访问中被提取到本地变量中。\n\n此语句在找不到数据时不会生成错误；相反，它返回一个空集合。因此，在开始处理集合之前，良好的做法是先检查是否有内容需要处理。\n\
  \n```\nif l_dutch_drivers.count > 0\nthen\nfor indx in l_dutch_drivers.first ..\n\
  l_dutch_drivers.last\nloop\ndbms_output.put_line(  l_dutch_drivers( indx ).forename\n\
  || ' '\n|| l_dutch_drivers( indx ).surname);\nend loop;\nend if;\nend;\n```\n\n\
  代码清单 1-2 是完整的匿名块。\n\n```\ndeclare\ncursor c_dutch_drivers\nis\nselect drv.*\nfrom\
  \   f1data.drivers drv\nwhere  drv.nationality = 'Dutch'\n;\ntype dutch_drivers_tt\
  \ is table of f1data.drivers%rowtype\nindex by pls_integer;\nl_dutch_drivers dutch_drivers_tt;\n\
  begin\nopen  c_dutch_drivers;\nfetch c_dutch_drivers\nbulk  collect\ninto  l_dutch_drivers;\n\
  close c_dutch_drivers;\nif l_dutch_drivers.count > 0\nthen\nfor indx in l_dutch_drivers.first\
  \ ..\nl_dutch_drivers.last\nloop\ndbms_output.put_line(  l_dutch_drivers( indx ).forename\n\
  || ' '\n|| l_dutch_drivers( indx ).surname);\nend loop;\nend if;\nend;\n/\n代码清单\
  \ 1-2\n显示荷兰籍车手的姓名\n```\n\n##### 限制\n\n如果你将结果集 `bulk collect` 批量收集到一个集合变量中，请注意所有数据都会传输到内存中。这可能会占用大量内存，并且由于可能有多个进程正在运行并执行类似的查询，你可能会耗尽可用内存。Oracle\
  \ 数据库提供了 `limit`（限制）子句来限制使用的内存量。\n\n这需要多写一点代码，因为你必须构建一个循环来分多次获取所有记录。代码清单 1-3 实现了相同的代码，但现在使用了\
  \ `limit` 子句。\n\n```\ndeclare\ncursor c_dutch_drivers\nis\nselect drv.*\nfrom  \
  \ f1data.drivers drv\nwhere  drv.nationality = 'Dutch'\n;\ntype dutch_drivers_tt\
  \ is table of f1data.drivers%rowtype\nindex by pls_integer;\nl_dutch_drivers dutch_drivers_tt;\n\
  begin\nopen  c_dutch_drivers;\nloop\nfetch c_dutch_drivers\nbulk  collect\ninto\
  \  l_dutch_drivers\nlimit 5;\ndbms_output.put_line(  '----- '\n|| to_char( l_dutch_drivers.count\
  \ )\n|| ' -----');\nif l_dutch_drivers.count > 0\nthen\nfor indx in l_dutch_drivers.first\
  \ ..\nl_dutch_drivers.last\nloop\ndbms_output.put_line(  l_dutch_drivers( indx ).forename\n\
  || ' '\n|| l_dutch_drivers( indx ).surname);\nend loop;\nelse\nexit;\nend if;\n\
  end loop;\nclose c_dutch_drivers;\nend;\n/\n----- 5 -----\nMichael Bleekemolen\n\
  Boy Lunger\nRoelof Wunderink\nGijs van Lennep\nChristijan Albers\n----- 5 -----\n\
