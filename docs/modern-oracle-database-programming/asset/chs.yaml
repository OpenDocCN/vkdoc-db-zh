- '# 前言


  `SQL` 是一种强大的语言。寥寥数行代码，便能解答复杂的查询。


  `PL/SQL` 包含许多扩展功能，使得 `SQL` 更易于使用。这种紧密的集成使这些语言非常适合数据管理。


  然而，面对问题时，*究竟应该使用* `SQL` 或 `PL/SQL` 的*哪些*特性，有时并不清晰。Oracle 数据库的文档体量庞大。希望通过浏览文档找到能帮助你的语法或特性，是一项无止境的任务。


  不幸的是，这意味着许多应用程序的代码长达数页，仅仅是为了重新实现 Oracle 数据库已有的功能。这通常是因为开发人员未能意识到这些功能已触手可及。


  因此，看到 Alex 和 Patrick 撰写此书，我感到非常兴奋。他们长期以来一直致力于分享知识，帮助他人使用 Oracle 数据库。他们基于实际经验并乐于助人理解
  Oracle `SQL` 和 `PL/SQL` 的意愿，使他们双双赢得了当之无愧的 Oracle ACE Director 认可。这使他们成为撰写此指南的理想人选。


  阅读本书将教会你如何使用更强大的数据库选项，其中许多是其他平台所不具备的。书中充满了示例，向你展示这些 `SQL` 和 `PL/SQL` 语言特性如何工作。但最重要的是，这些脚本有助于说明何时以及为何应该使用这些选项。


  在使用任何技术时，我认为你应该了解它提供了哪些功能。利用内置功能可以节省你的时间并简化你的代码。Alex 和 Patrick 在展示如何做到这一点方面做得非常出色。


  多年来，我从他们两位身上学到了很多。希望这本书也能帮助你编写出更好的 `SQL` 和 `PL/SQL`。


  —Chris Saxon, Oracle Developer Advocate


  #### 引言


  在撰写一本关于数据库技术的书籍时，你需要构思一个数据集来编写示例。我们本可以使用在 `SCOTT` 模式中存在已久的那套标准 `EMP` 和 `DEPT` 表。然而，由于这是一本关于现代
  Oracle 数据库编程的书，我们希望使用一个不同的数据集。


  因为我们两人都是一级方程式赛车的粉丝，而 Oracle 正好是红牛车队（我们国家的车手 Max Verstappen 恰好效力于该车队）的重要赞助商，我们便开始寻找一个与一级方程式相关的数据集。当然，本书中的示例并非全部与
  Max 有关；许多其他车手和赛事结果也扮演着重要角色。


  Ergast Developer API ([`https://ergast.com/mrd/`](https://ergast.com/mrd/)) 允许你查询各种赛车数据，并以多种格式获取。该网站还以
  CSV 格式提供了所有表格，因此我们创建了一个 `F1DATA` 模式来导入这些数据。原始数据集是 MySQL 数据库，因此我们不得不对数据模型做一些微小的调整。


  本书的源文件可在 GitHub 上找到：[`https://github.com/Apress/modern-oracle-database-programming`](https://github.com/Apress/modern-oracle-database-programming)。


  '
- '# 第一部分：高级基础


  本书的第一部分汇集了几个主题，这些主题应当成为每位 Oracle 数据库开发人员工具箱中的必备内容。我们经常遇到经验丰富的开发人员不熟悉集合（collections）和批量操作（bulk
  operations），而这些特性早已存在多年。ANSI 连接、分析函数、行模式匹配或条件编译的情况也是如此。


  '
- '# 第二部分：多种技术与语言


  本书的第二部分重点介绍了 `SQL` 与 `PL/SQL` 之间的集成。尽量减少 `SQL` 引擎与 `PL/SQL` 引擎之间的上下文切换，通常对性能更为有利。


  自 `JSON` 被引入 Oracle 数据库以来，其在功能和性能方面都取得了长足发展。在数据库中处理 `JSON` 有很多需要学习的内容，本书用几个章节来助你入门。


  '
- '# 第三部分：Oracle 提供的功能


  Oracle 数据库开箱即用，提供了大量可用的功能。在本书的第三部分，其中一些功能将占据核心地位。


  即使 `APEX` 未被用于前端开发，它也提供了一些非常有用的包，可用于日常的数据库开发。基于版本的重定义（Edition-based redefinition）能够实现定制应用程序的零停机升级。获取当前基于有效期的数据，可以通过数据库处理，而无需编写复杂的
  `SQL` 语句。




  ## Oracle 云中的模式


  本书中大部分示例使用的数据模型取自 Ergast 赛车数据网站（[`https://ergast.com/mrd/`](https://ergast.com/mrd/)），并导入到
  Oracle 数据库 19c 和 21c 中。


  Ergast F1 数据模型的示意图如 I-1 图所示。我们使用 Oracle Always Free 云服务作为数据库。我们通过以下步骤使模式（schema）启动并运行。假设你已经创建了数据库并有权访问`admin`用户。


  ![](img/536316_1_En_BookFrontmatter_Fig1_HTML.png)


  F1 数据状态、排位赛、车手、冲刺赛结果、车队、车队结果、比赛、赛道、赛季、进站、车手积分榜、单圈时间和比赛结果的流程结构图。


  图 I-1：F1DATA 模式


  使用列出的模式执行以下脚本。


  - **ADMIN**：创建用户`F1DATA`。脚本：`F1Data_Create_User`

  - **F1DATA**：创建表。脚本：`F1Data_Tables`

  - **F1DATA**：对列添加注释。脚本：`F1Data_Comments`

  - **F1DATA**：创建公共同义词并向公众授予表的访问权限。脚本：`F1Data_Grants_And_Synonyms`

  - **F1DATA**：创建多态表函数以拆分 CSV 行。该函数在第 8 章中解释。脚本：`F1Data_Separated_PTF`


  在云控制台中，执行以下步骤。


  在你的云环境中创建一个存储桶（bucket）来存放 CSV 文件。为此存储桶创建一个预认证请求。转到*创建预认证请求*。


  ![](img/536316_1_En_BookFrontmatter_Fig2_HTML.jpg)


  屏幕显示菜单视图：查看存储桶详情、创建预认证请求、移动资源、编辑可见性、添加标签、查看标签和删除。


  图 I-2：创建预认证请求菜单


  填写详细信息，然后单击*创建预认证请求*。


  ![](img/536316_1_En_BookFrontmatter_Fig3_HTML.jpg)


  屏幕显示创建预认证请求，包含名称、请求目标、存储桶、对象和带前缀的对象、允许的对象读取、写入和读写选项、过期日期，以及底部的创建请求按钮。


  图 I-3：创建预认证请求


  复制预认证请求 URL 并将其存储在安全的地方。*它不会再次显示。*


  ![](img/536316_1_En_BookFrontmatter_Fig4_HTML.jpg)


  屏幕显示创建预认证请求：名称只读、请求 URL 只读，以及“复制此 URL 以备记录。它不会再次显示。”底部是关闭按钮。


  图 I-4：预认证请求详情


  从 Ergast 开发者 API 网站下载最新的 CSV 文件：[`http://ergast.com/downloads/f1db_csv.zip`](http://ergast.com/downloads/f1db_csv.zip)。


  将 CSV 解压缩到你的本地机器。将文件上传到你的存储桶。


  创建一个对象存储认证令牌。转到*用户设置*。


  ![](img/536316_1_En_BookFrontmatter_Fig5_HTML.jpg)


  屏幕显示配置文件，包含用户设置、控制台设置和注销。


  图 I-5：用户设置


  在资源下点击*认证令牌*。


  ![](img/536316_1_En_BookFrontmatter_Fig6_HTML.jpg)


  屏幕显示资源，包含选项：组、API 密钥、认证令牌、客户机密钥、数据库密码、OAuth 2.0 客户端凭据和 SMTP 凭据。


  图 I-6：认证令牌


  点击*生成令牌*。


  ![](img/536316_1_En_BookFrontmatter_Fig7_HTML.jpg)


  屏幕显示认证令牌，带有一个生成令牌按钮。


  图 I-7：生成令牌


  复制生成的令牌并将其存储在安全的地方。*它不会再次显示。*


  ![](img/536316_1_En_BookFrontmatter_Fig8_HTML.jpg)


  屏幕显示生成的令牌：复制此令牌以备记录。它不会再次显示。下方是显示、复制和关闭按钮选项。


  图 I-8：已生成的令牌


  在`ADMIN`模式中，执行以下文件。


  - **ADMIN**：创建凭据。将`<<Authorization Token>>`替换为你在上一步生成的令牌。脚本：`F1Data_Create_Credential`

  - **ADMIN**：将数据导入表中。将`<<URL Path (URI)>>`替换为你的预认证请求 URL 路径。脚本：`F1Data_Import_Data`


