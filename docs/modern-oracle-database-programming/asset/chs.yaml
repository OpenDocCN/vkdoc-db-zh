- "# DBMS_DB_VERSION 包\n\nOracle 提供了一个包，其中包含一个用于当前 RDBMS 版本号的常量和一个用于当前发行号的常量。该包的名称为\
  \ `DBMS_DB_VERSION`。它还包含一组布尔值，可用于确定当前版本。代码清单 6-1 显示了随 Oracle Database 21c 提供的当前\
  \ `DBMS_DB_VERSION` 包。\n\n```sql\npackage sys.dbms_db_version is\nversion constant\
  \ pls_integer :=\n21; -- RDBMS 版本号\nrelease constant pls_integer := 0;  -- RDBMS\
  \ 发行号\n/* 以下的布尔常量遵循一种命名约定。\n   每个常量为一个布尔表达式命名。\n   例如，\n   ver_le_9_1  表示 version\
  \ <=  9 且 release <= 1\n   ver_le_10_2 表示 version <= 10 且 release <= 2\n   ver_le_10\
  \   表示 version <= 10\n   引用这些布尔常量（而不是直接引用 version 和 release）的代码，\n   将随着 version\
  \ 和 release 值的变化而受益于细粒度失效。\n   这些布尔常量的典型用法是：\n   $if dbms_db_version.ver_le_10 $then\n\
  \   version 10 及更早版本的代码\n   $elsif dbms_db_version.ver_le_11 $then\n   version 11\
  \ 代码\n   $else\n   version 12 及之后版本的代码\n   $end\n   这种代码结构将保护对 version 12 代码的任何引用。\n\
  \   它还防止在 version 10 下编译程序时，引用控制包常量 dbms_db_version.ver_le_11。\n   对 version 11\
  \ 的观察也类似。\n   即使在 version 10 数据库中未定义静态常量 ver_le_11，此方案也有效，\n   因为如果 dbms_db_version.ver_le_10\
  \ 为 TRUE，条件编译会保护 $elsif 子句不被求值。\n*/\n/* 弃用针对不支持版本的布尔常量 */\nver_le_9_1    constant\
  \ boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_9_1);\nver_le_9_2    constant boolean\
  \ := FALSE;\nPRAGMA DEPRECATE(ver_le_9_2);\nver_le_9      constant boolean := FALSE;\n\
  PRAGMA DEPRECATE(ver_le_9);\nver_le_10_1   constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_10_1);\n\
  ver_le_10_2   constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_10_2);\nver_le_10\
  \     constant boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_10);\nver_le_11_1   constant\
  \ boolean := FALSE;\nPRAGMA DEPRECATE(ver_le_11_1);\nver_le_11_2   constant boolean\
  \ := FALSE;\nver_le_11     constant boolean := FALSE;\nver_le_12_1   constant boolean\
  \ := FALSE;\nver_le_12_2   constant boolean := FALSE;\nver_le_12     constant boolean\
  \ := FALSE;\nver_le_18     constant boolean := FALSE;\nver_le_19     constant boolean\
  \ := FALSE;\nver_le_20     constant boolean := FALSE;\nver_le_21     constant boolean\
  \ := TRUE;\nend dbms_db_version;\n代码清单 6-1\n21c 版本的 DBMS_DB_VERSION 包\n```\n\n在所有较低版本的数据库中，这些标志均为\
  \ `FALSE`。只有当前版本被设置为 `TRUE`。\n\n如果您使用 `DBMS_DB_VERSION` 常量，请从可用的最低版本号开始查询。如果某个查询指令求值为\
  \ true，则 `$then` 块中的代码将被包含，而其余代码将被忽略，因此不会被包含。由于此代码不再被求值，因此该块是否引用对象（例如包中不存在的常量）并不重要。\n\
  \n如果您的应用程序当前运行在 Oracle 12c 实例上，您的条件编译块应开始查询版本是否为 12（或更早）。\n\n```sql\n$if dbms_db_version.ver_le_12\
  \ $then\ndbms_output.put_line( '这将运行 12c 代码。' );\n```\n\n如果您希望程序包含多个版本的代码，以使用每个数据库版本中可用的最佳功能，请使用\
  \ `$elsif` 指令来处理多个查询指令，类似于 case 语句。\n\n```sql\n$elsif dbms_db_version.ver_le_18\
  \ $then\ndbms_output.put_line( '这将运行 18c 代码。' );\n$elsif dbms_db_version.ver_le_19\
  \ $then\ndbms_output.put_line( '这将运行 19c 代码。' );\n$elsif dbms_db_version.ver_le_20\
  \ $then\ndbms_output.put_line( '这将运行 20c 代码。' );\n$elsif dbms_db_version.ver_le_21\
  \ $then\ndbms_output.put_line( '这将运行 21c 代码。' );\n```\n\n如果所有查询指令都不为 true，则包含一个捕获所有情况的\
  \ `$else` 指令。\n\n```sql\n$else\ndbms_output.put_line( '此版本不受支持' );\n```\n\n代码清单\
  \ 6-2 显示了完整的脚本。\n\n```sql\nbegin\n$if dbms_db_version.ver_le_12 $then\ndbms_output.put_line(\
  \ '这将运行 12c 代码。' );\n$elsif dbms_db_version.ver_le_18 $then\ndbms_output.put_line(\
  \ '这将运行 18c 代码。' );\n$elsif dbms_db_version.ver_le_19 $then\ndbms_output.put_line(\
  \ '这将运行 19c 代码。' );\n$elsif dbms_db_version.ver_le_20 $then\ndbms_output.put_line(\
  \ '这将运行 20c 代码。' );\n$elsif dbms_db_version.ver_le_21 $then\ndbms_output.put_line(\
  \ '这将运行 21c 代码。' );\n$else\ndbms_output.put_line( '此版本不受支持' );\n$end\nend;\n代码清单\
  \ 6-2\n正在运行哪个版本？\n```\n\n如果您构建一个包含多个条件的块（即类 case 语句），请确保包含所有可能的标志，以便您的代码能在每个版本的数据库上编译。\n\
  \n以下代码无法在 Oracle 20c 实例上编译，因为尽管 `ver_le_21` 表示“版本小于或等于 21”，但该变量在 Oracle 20c 数据库的\
  \ `DBMS_DB_VERSION` 包中并未声明。因此，编译会抛出错误。\n\n```sql\nbegin\n$if dbms_db_version.ver_le_12\
  \ $then\ndbms_output.put_line( '这将运行 12c 代码。' );\n$elsif dbms_db_version.ver_le_18\
  \ $then\ndbms_output.put_line( '这将运行 18c 代码。' );\n$elsif dbms_db_version.ver_le_19\
  \ $then\ndbms_output.put_line( '这将运行 19c 代码。' );\n$elsif dbms_db_version.ver_le_21\
  \ $then\ndbms_output.put_line( '这将运行 21c 代码。' );\n$else\ndbms_output.put_line( '此版本不受支持'\
  \ );\n$end\nend;\n```\n\n此外，条件编译不进行短路求值，因此请确保不要在一个语句中混合多个可能非法的条件。\n\n```sql\nbegin\n\
  $if dbms_db_version.ver_le_12\nor dbms_db_version.ver_le_18\nor dbms_db_version.ver_le_19\
  \ $then\ndbms_output.put_line( '这将运行 20c 之前的代码。' );\n$elsif dbms_db_version.ver_le_20\
  \ $then\ndbms_output.put_line( '这将运行 20c 代码。' );\n$elsif dbms_db_version.ver_le_21\
  \ $then\ndbms_output.put_line( '这将运行 21c 代码。' );\n$else\ndbms_output.put_line( '此版本不受支持'\
  \ );\n$end\nend;\n```\n\n例如，此代码无法在 Oracle 12c 实例上编译。同样，`DBMS_DB_VERSION.VER_LE_18`\
  \ 和 `DBMS_DB_VERSION.VER_LE_19` 常量根本还不存在。\n\n#### 预定义的 CCFLAGS\n\n对于任何程序单元，都自动定义了一些\
  \ `CCFLAGS`。这些标志作为选择指令中的查询指令可能不是很有用，但它们可以提供有关程序的有用信息。例如，在对代码进行插桩时，了解操作发生的行号可能会很有帮助。表\
  \ 6-1 显示了预定义 `CCFLAGS` 的列表。\n\n**表 6-1 预定义的 CCFLAGS**\n\n| 标志 | 描述 |\n| --- | ---\
  \ |\n| `$$PLSQL_LINE` | 一个 `PLS_INTEGER` 字面量，其值为该指令在当前 PL/SQL 单元中出现的源代码行号。 |\n|\
  \ `$$PLSQL_UNIT` | 一个 `VARCHAR2` 字面量，包含当前 PL/SQL 单元的名称。如果当前 PL/SQL 单元是匿名块，则 `$$PLSQL_UNIT`\
  \ 包含 `NULL` 值。仅限顶级对象，不包括子程序。 |\n| `$$PLSQL_UNIT_OWNER` | 一个 `VARCHAR2` 字面量，包含当前\
  \ PL/SQL 单元所有者的名称。如果当前 PL/SQL 单元是匿名块，则 `$$PLSQL_UNIT_OWNER` 包含 `NULL` 值。 |\n| `$$PLSQL_UNIT_TYPE`\
  \ | 一个 `VARCHAR2` 字面量，包含当前 PL/SQL 单元的类型——`ANONYMOUS BLOCK`（匿名块）、`FUNCTION`（函数）、`PACKAGE`（包）、`PACKAGE\
  \ BODY`（包体）、`PROCEDURE`（过程）、`TRIGGER`（触发器）、`TYPE`（类型）或 `TYPE BODY`（类型体）。在匿名块或非 DML\
  \ 触发器内部，`$$PLSQL_UNIT_TYPE` 的值为 `ANONYMOUS BLOCK`。 |\n\n\n\n### 条件编译指令\n\n#### 错误指令\n\
  \n要完全停止编译（例如，因为某些条件未满足），你可以使用 `error` 指令。`error` 指令由这个构造块组成。\n\n```sql\n$error 'error\
  \ message' $end\n```\n\n一旦这段代码被包含在编译的程序中，它就保持在一个无效状态。清单 6-3 展示了一个无法编译的包。\n\n```sql\n\
  create or replace package willnotcompile as\nthe_answer constant number := 42;\n\
  $error 'This package should not be compiled' $end\nwear_towel constant boolean :=\
  \ true;\nend willnotcompile;\n```\n\n这段代码将无法成功编译。\n\n清单 6-3 中的代码会导致编译失败。\n\n```sql\n\
  Warning: Package created with compilation errors\nErrors for PACKAGE BOOK.CCWILLNOTCOMPILE:\n\
  LINE/COL ERROR\n-------- ------------------------------------------------------\n\
  3/3      PLS-00179: $ERROR: This package should not be compiled\n```\n\n编译在此指令后立即终止。其余的代码甚至不会被解析。由于程序处于无效状态，你无法从中引用任何内容，甚至包括在错误指令之前定义的常量。\n\
  \n#### DEPRECATE 编译指示指令\n\n如果 `error` 指令过于严厉，因为它会完全阻止代码编译，那么使用 `DEPRECATE` 编译指示指令可能是个好主意。这样，代码仍然可以编译，但会有一个警告，提示这部分代码已弃用，并将在未来的版本中移除。`DEPRECATE`\
  \ 编译指示应紧接在声明之后。如果你在代码的其他位置添加编译指示，它会引发 `plw-06021` 警告。你可以弃用过程、函数或包。如果你尝试在包体中弃用包，则会引发\
  \ `plw-06022` 警告。\n\n清单 6-4 展示了可能发出的一些警告。\n\n```sql\ncreate or replace package deprecatedwarnings\
  \ is\nprocedure deprecate_this_later;\nprocedure deprecate_this_now;\npragma deprecate(\
  \ deprecate_this_now,\n'This will raise PLW-6019, when this program is compiled'\
  \ );\npragma deprecate( deprecate_this_later,\n'This will raise PLW-6021, because\
  \ this pragma is misplaced' );\nprocedure call_the_deprecated_procedure;\nend deprecatedwarnings;\n\
  ```\n\n弃用警告。\n\n在调用程序中会引发 `plw-06020` 异常。如果使用以下语句启用，则在编译时会引发警告。\n\n```sql\nalter\
  \ session set plsql_warnings='enable:(6019,6020,6021,6022)';\n```\n\n可以发出的警告如表 6-2\
  \ 所示。\n\n表 6-2. 弃用警告\n\n| 警告 | 含义 |\n| --- | --- |\n| 6019 | 该实体已被弃用，并可能在未来的版本中移除。请勿使用已弃用的实体。\
  \ |\n| 6020 | 引用的实体已被弃用，并可能在未来的版本中移除。请勿使用已弃用的实体。如果警告中提供了具体说明，请遵循这些说明。 |\n| 6021\
  \ | 编译指示位置错误。`DEPRECATE` 编译指示应紧接在被弃用实体的声明之后。将编译指示放在被弃用实体声明的紧后方。 |\n| 6022 | 此实体不能被弃用。弃用仅适用于可在包或类型规范中声明的实体，以及顶级过程和函数定义。请移除此编译指示。\
  \ |\n\n要查看发出的警告，编译器警告必须在编译时启用。\n\n```sql\nalter session set plsql_warnings='enable:(6019,6020,6021,6022)'\n\
  ```\n\n或者你可能希望启用所有警告。\n\n```sql\nalter session set plsql_warnings='enable:all'\n\
  ```\n\n在编译特定对象时也可以进行设置。\n\n```sql\nalter package deprecatedwarnings compile\nplsql_warnings\
  \ = 'enable:(6019,6020,6021,6022)'\n```\n\n#### 使用指令\n\n条件编译块通常以 `$if` 选择指令开始。\n\
  \n```sql\n$if dbms_db_version.version <= 19 $then\n```\n\n如果此条件评估为真，则包含 `$then`\
  \ 指令之后的代码。包含所有代码，直到找到下一个指令。\n\n```sql\ndbms_output.put_line( 'pre Oracle 19c code'\
  \ );\n```\n\n如果你想包含不同的代码部分，可以包含一个 `$else` 指令和不同的代码块。\n\n```sql\n$else\ndbms_output.put_line(\
  \ 'post Oracle 19c code' );\n```\n\n条件编译块以 `$end` 指令结束。\n\n清单 6-5 展示了完整的脚本。\n\n\
  ```sql\nbegin\n$if dbms_db_version.version <= 19 $then\ndbms_output.put_line( 'pre\
  \ Oracle 19c code' );\n$else\ndbms_output.put_line( 'post Oracle 19c code' );\n\
  $end\nend;\n```\n\n根据数据库版本包含代码。\n\n如果你在 Oracle 19c 实例上运行此匿名块，会得到以下输出。\n\n```sql\n\
  pre Oracle 19c code\n```\n\n如果你在 Oracle 21c 实例上运行相同的匿名块，会得到以下输出。\n\n```sql\npost\
  \ Oracle 19c code\n```\n\n### 用例\n\n有无数情况可以使条件编译变得有用。例如，你可以使用条件编译来为新的数据库版本准备你的应用程序，测试私有程序，检查数据库是用于开发、测试还是生产，检查编译器优化级别，并根据环境包含或排除代码。可能还有更多你能想到的用例。\n\
  \n#### 检查新功能的存在\n\n如果你可以访问沙箱数据库（例如，免费套餐），你可能知道你想在应用程序中使用的新功能。然而，由于你的生产环境仍在运行旧版本的数据库，你无法实现它们。在这种情况下，你有（至少）两个选择。\n\
  \n*   你记录该功能、你想使用它的地方以及在哪里可以找到文档，这样当你的生产环境升级到新版本时，你就可以开始开发新的解决方案。现在，你必须记住在数据库升级时你想使用此功能。\n\
  \n*   你可以在当前代码库中实现新的解决方案，并使用条件编译将此代码对旧数据库“隐藏”。\n\n让我们看一个简单的例子。Oracle 21c 附带了更简单的步进迭代器实现。首先，检查你为其编译程序的实例版本。\n\
  \n```sql\n$if dbms_db_version.version >= 21 $then\n```\n\n如果运行至少版本 21 的数据库，你可以使用新的迭代器结构。\n\
  \n```sql\n-- code using the iterators available from 21c\nfor n in 2 .. 10 by 2\
  \ loop\ndbms_output.put_line(n);\nend loop;\n```\n\n如果你运行的是旧版本，则必须使用自 Oracle 7 以来可用的构造。\n\
  \n```sql\n-- code using the iterators as available before 21c\nfor n in 2 .. 10\
  \ loop\nif mod(n, 2) = 0 then\ndbms_output.put_line(n);\nend if;\nend loop;\n```\n\
  \n完整的脚本可以在清单 6-6 中找到。\n\n```sql\nbegin\n$if dbms_db_version.version >= 21 $then\n\
  -- code using the iterators available from 21c\nfor n in 2 .. 10 by 2 loop\ndbms_output.put_line(n);\n\
  end loop;\n$else\n-- code using the iterators as available before 21c\nfor n in\
  \ 2 .. 10 loop\nif mod(n, 2) = 0 then\ndbms_output.put_line(n);\nend if;\nend loop;\n\
  $end\nend;\n```\n\n如果可用，则使用新的迭代器。\n\n\n#### 显示调试和测试代码的输出\n\n条件编译还能够暴露和隐藏包中的过程与函数。如果希望测试包中的私有过程或函数，必须修改包规范以公开该程序。随后，在发布代码时，又必须再次将其隐藏。\n\
  \n通过条件编译，你可以根据 `CCFLAGS` 设置中的标志值来使这些程序可见或隐藏。如果该标志未被定义，其查询求值结果为 `false`，因此你无需在编译源代码之前定义它。\n\
  \n使用你自定义的标志，在选择指令中定义程序是否可见。\n\n```\n$if $$expose_for_test $then\nprocedure private_procedure;\n\
  $end\n```\n\n你可以将此代码放在包规范中的任何位置。如果在编译包源代码时未定义该标志或将其设置为 `false`，则该代码将不会被包含在编译后的程序中。\n\
  \n完整的包规范如列表 6-7 所示。\n\n```\ncreate or replace package cctestdemo as\n$if $$expose_for_test\
  \ $then\nprocedure private_procedure;\n$end\nprocedure public_procedure;\nend cctestdemo;\n\
  Listing 6-7\n包含条件暴露程序的包规范\n```\n\n列表 6-8 展示了此包的实现。\n\n```\ncreate or replace package\
  \ body cctestdemo as\nprocedure private_procedure\nis\nbegin\ndbms_output.put_line('=>\
  \ This is the private_procedure  This is the public_procedure <=');\nend public_procedure;\n\
  end cctestdemo;\nListing 6-8\n实现了所有程序的包体\n```\n\n如果你描述当前包，只会看到定义的公共过程。\n\n```\n\
  SQL> desc cctestdemo\nPROCEDURE PUBLIC_PROCEDURE\n```\n\n如果你想执行私有过程，将会收到一个错误，提示该过程必须被声明。\n\
  \n```\nSQL> exec cctestdemo.private_procedure\nBEGIN ccdemo.private_procedure; END;\n\
  *\nERROR at line 1:\nORA-06550: line 1, column 14:\nPLS-00302: component 'PRIVATE_PROCEDURE'\
  \ must be declared\nORA-06550: line 1, column 7:\nPL/SQL: Statement ignored\n```\n\
  \n你可以使用 `alter session` 语句定义查询指令的值，从而在不更改源代码的情况下暴露代码进行测试。\n\n```\nSQL> alter session\
  \ set PLSQL_CCFLAGS = 'expose_for_test:true'\n```\n\n然后重新编译数据库中的现有包。\n\n```\nSQL>\
  \ alter package cctestdemo compile\n```\n\n通过此操作，你可以暴露该过程，使其可用于测试。\n\n或者，你也可以在编译时直接指定\
  \ `CCFLAGS`。\n\n```\nalter package cctestdemo compile plsql_ccflags='expose_for_test:true'\n\
  ```\n\n如果你现在描述该包，会看到私有过程已经被暴露。\n\n```\nSQL> desc cctestdemo\nPROCEDURE PRIVATE_PROCEDURE\n\
  PROCEDURE PUBLIC_PROCEDURE\n```\n\n你现在可以访问私有过程来测试其内容。\n\n```\nSQL> exec cctestdemo.private_procedure\n\
  => This is the private_procedure <=\n```\n\n要使用条件编译标志的最后设置来重新编译程序，请在编译语句中使用 `reuse\
  \ settings`。\n\n```\nalter package cctestdemo compile reuse settings\n```\n\n如果你的程序在不同的环境中依赖于不同的设置，此功能将特别有用。\n\
  \n使用以下语句查找程序编译时使用了哪些设置。\n\n```\nselect plsql_ccflags\nfrom   all_plsql_object_settings\n\
  where  name  = :object_name\nand    owner = :object_owner\nand    type  = :object_type\n\
  ```\n\n你可以测试私有程序，并检查你的程序是否优雅地处理了所有异常，即使是那些不太可能发生的异常。\n\n例如，如果你依赖于唯一约束的存在，你不太可能遇到\
  \ `too_many_rows` 异常。如果该约束缺失或被禁用，你希望你的代码能优雅地处理此异常，而不是抛出错误。\n\n首先，你必须实现代码并包含异常处理器。\n\
  \n```\nfunction getdobfordriver( driverid_in in number )\nreturn date\nis\nl_dob\
  \ date;\nbegin\nbegin\nselect drv.dob\ninto   l_dob\nfrom   f1data.drivers drv\n\
  where  drv.driverid = driverid_in;\nexception\nwhen no_data_found\nthen\nl_dob :=\
  \ null;\nwhen too_many_rows\nthen\nl_dob := to_date('19721229', 'YYYYMMDD');\nend;\n\
  return l_dob;\nend getdobfordriver;\n```\n\n然后，使用查询指令，你可以包含测试异常所需的所有代码。\n\n```\n\
  begin\n$if $$testexceptions $then\ncase\nwhen mod( driverid_in, 2 ) = 0\nthen raise\
  \ no_data_found;\nelse raise too_many_rows;\nend case;\n$else\nselect drv,dob\n\
  into   l_dob\nfrom   f1data.drivers drv\nwhere  drv.driverid = driverid_in;\n$end\n\
  ```\n\n如果你想查看引发了哪个异常以及处理了哪个异常，在异常处理器中扩展以显示它们处理了哪种异常可能是个好主意。\n\n```\nexception\n\
  when no_data_found\nthen\n$if $$testexceptions $then\ndbms_output.put_line( 'no_data_found'\
  \ );\n$end\nl_dob := null;\nwhen too_many_rows\nthen\n$if $$testexceptions $then\n\
  dbms_output.put_line( 'too_many_rows' );\n$end\nl_dob := to_date('19721229', 'YYYYMMDD');\n\
  end;\n```\n\n列表 6-9 显示了包规范，列表 6-10 显示了包体。\n\n```\ncreate or replace package body\
  \ ccexception as\nfunction getdobfordriver( driverid_in in number )\nreturn date\n\
  is\nl_dob date;\nbegin\nbegin\n$if $$testexceptions $then\ncase\nwhen mod( driverid_in,\
  \ 2 ) = 0\nthen raise no_data_found;\nelse raise too_many_rows;\nend case;\n$else\n\
  select drv.dob\ninto   l_dob\nfrom   f1data.drivers drv\nwhere  drv.driverid = driverid_in;\n\
  $end\nexception\nwhen no_data_found\nthen\n$if $$testexceptions $then\ndbms_output.put_line(\
  \ 'no_data_found' );\n$end\nl_dob := null;\nwhen too_many_rows\nthen\n$if $$testexceptions\
  \ $then\ndbms_output.put_line( 'too_many_rows' );\n$end\nl_dob := to_date('19721229',\
  \ 'YYYYMMDD');\nend;\nreturn l_dob;\nend getdobfordriver;\nend ccexception;\n/\n\
  Listing 6-10\n测试异常的包体\n```\n\n```\ncreate or replace package ccexception as\nfunction\
  \ getdobfordriver( driverid_in in number )\nreturn date;\nend ccexception;\n/\n\
  Listing 6-9\n测试异常的包规范\n```\n\n如果你在不设置查询指令的情况下运行 `getdobfordriver` 函数，你会得到预期的输出。\n\
  \n```\nbegin\ndbms_output.put_line( 'Date or birth for unknown: '\n|| ccexception.getdobfordriver\
  \ ( -1 )\n);\ndbms_output.put_line( 'Date or birth for Hamilton: '\n|| ccexception.getdobfordriver\
  \ ( 1 )\n);\ndbms_output.put_line( 'Date or birth for Verstappen: '\n|| ccexception.getdobfordriver\
  \ ( 830 )\n);\nend;\n/\nDate or birth for unknown:\nDate or birth for Hamilton:\
  \ 07-JAN-85\nDate or birth for Verstappen: 30-SEP-97\n```\n\n为了得到不同的结果，在重新编译包体时设置查询指令。\n\
  \n```\nalter package ccexception compile\nplsql_ccflags = 'testexceptions:true'\n\
  ```\n\n现在，当你运行代码时，你还会看到可能引发的不同异常。\n\n```\nbegin\ndbms_output.put_line( 'Date or\
  \ birth for unknown: '\n|| ccexception.getdobfordriver ( -1 )\n);\ndbms_output.put_line(\
  \ 'Date or birth for Hamilton: '\n|| ccexception.getdobfordriver ( 1 )\n);\ndbms_output.put_line(\
  \ 'Date or birth for Verstappen: '\n|| ccexception.getdobfordriver ( 830 )\n);\n\
  end;\n/\ntoo_many_rows\nDate or birth for unknown: 29-DEC-72\ntoo_many_rows\nDate\
  \ or birth for Hamilton: 29-DEC-72\nno_data_found\nDate or birth for Verstappen:\n\
  ```\n\n#### 检查正确的数据库环境\n\n使用条件编译指令，你可以防止代码在不同环境（例如你的生产环境）中被编译。你可以创建一些不应在生产环境中编译的代码，因为它们包含的工具在开发环境中可能非常有用但被认为不安全。\n\
  \n你可以使用选择指令和查询指令来检查你的环境。\n\n```\n$if environment_pkg.development $then\n```\n\n\
  如果你的环境正确，就包含该代码。\n\n```\nprocedure still_in_development;\n```\n\n如果环境不正确，则使用 `$error`\
  \ 指令来阻止代码编译。\n\n```\n$else\n$error 'This package is for the development environment\
  \ only'\n$end\n$end\n```\n\n清单 6-11 展示了完整的实现。\n\n```\ncreate or replace package\
  \ only_for_dev is\n$if environment_pkg.development $then\nprocedure still_in_development;\n\
  $else\n$error 'This package is for the development environment only'\n$end\n$end\n\
  end only_for_dev;\nListing 6-11\n仅用于开发环境的代码\n```\n\n通过使用包含不同标志的环境包，你可以根据环境来编译代码。清单\
  \ 6-12 创建了具有正确标志值的环境包。\n\n```\ndeclare\nl_pack_spec varchar2( 32767 );\nl_env  \
  \     varchar2( 128 );\nfunction tochar(\np_val in boolean)\nreturn varchar2\nas\n\
  begin\nreturn case p_val\nwhen true then 'TRUE'\nwhen false then 'FALSE'\nelse null\n\
  end;\nend tochar;\nbegin\nl_env       := sys_context( 'userenv', 'db_name' );\n\
  l_pack_spec := 'create or replace package environment_pkg'\n|| chr( 10 );\nl_pack_spec\
  \ := l_pack_spec || 'is' || chr( 10 );\nl_pack_spec := l_pack_spec || '   --=='\
  \ || chr( 10 );\nl_pack_spec := l_pack_spec\n|| '   -- Environment Information'\n\
  || chr( 10 );\nl_pack_spec := l_pack_spec\n|| '   development constant boolean :=\
  \ '\n|| lower( tochar( l_env like '%DEV%' ) )\n|| ';' || chr( 10 );\nl_pack_spec\
  \ := l_pack_spec\n|| '   test        constant boolean := '\n|| lower( tochar( l_env\
  \ like '%TST%' ) )\n|| ';' || chr( 10 );\nl_pack_spec := l_pack_spec\n|| '   acceptance\
  \  constant boolean := '\n|| lower( tochar( l_env like '%ACC%' ) )\n|| ';' || chr(\
  \ 10 );\nl_pack_spec := l_pack_spec\n|| '   production  constant boolean := '\n\
  || lower( tochar( l_env like '%PRD%' ) )\n|| ';' || chr( 10 );\nl_pack_spec := l_pack_spec\
  \ || '   --==' || chr( 10 );\nl_pack_spec := l_pack_spec || 'end environment_pkg;'\n\
  || chr( 10 );\nexecute immediate l_pack_spec;\nend;\n/\nListing 6-12\n创建环境包\n```\n\
  \n如果你在部署脚本中包含这个匿名块，你就可以确保标志包含正确的值，并且你的代码将根据这些标志的设置进行编译。你必须创建一个包来保存这些值，因为查询指令必须包含静态常量，而\
  \ `SYS_CONTEXT` 不被视为静态布尔表达式。\n\n使用环境检查还可以防止代码在不同环境中执行。一个很好的例子是防止程序在非生产环境中发送电子邮件。\n\
  \n#### 展示已编译内容\n\n你可以执行以下命令来查看根据你的 `CCFLAGS` 设置、数据库版本或环境设置编译后的代码。\n\n```\ndbms_preprocessor.print_post_processed_source\n\
  ```\n\n查看代码编译后的样子对于分析代码的行为非常有用。\n\n清单 6-13 展示了实际的源代码。\n\n```\ncreate or replace\
  \ package postprocesseddemo as\n$if $$exposeprocedure $then\nprocedure private_procedure;\n\
  $end\nprocedure public_procedure;\nend postprocesseddemo;\nListing 6-13\n预处理演示\n\
  ```\n\n当你使用正确的参数调用该过程时。\n\n```\nbegin\ndbms_preprocessor.print_post_processed_source\n\
  (object_type => 'PACKAGE'\n,schema_name => 'BOOK'\n,object_name => 'POSTPROCESSEDDEMO');\n\
  end;\n```\n\n你会得到类似下面的结果。\n\n```\npackage ccdemo as\nprocedure public_procedure;\n\
  end ccdemo;\n```\n\n注意输出中的空行。这些空行是为所有未进入编译源代码的行插入的，包括包含指令的行。这样做是为了在报告错误时保留行号。\n\n\
  如果你重新编译包并将标志设置为 `TRUE`。\n\n```\nalter package postprocesseddemo compile plsql_ccflags\
  \ = 'exposeprocedure:true'\n```\n\n你会得到不同的结果。\n\n```\npackage postprocesseddemo\
  \ as\nprocedure private_procedure;\nprocedure public_procedure;\nend postprocesseddemo;\n\
  ```\n\n**提示**\n\n使用此实用程序时，请确保在设置 `server output` 时启用了格式包装；否则，空行会被删除。`set serveroutput\
  \ on size unlimited format wrapped`\n\n### 总结\n\n本章介绍了选择、查询和错误指令，这些是条件编译的构建块。通过条件编译，你可以为不同的\
  \ Oracle 数据库版本创建单一代码库，确保代码被部署到正确的环境（例如，仅部署到开发环境而绝不部署到生产环境），以及出于测试目的暴露私有过程。文中还讨论了条件编译的几个用例和一些技巧。\n\
  \n## 7. 迭代和限定表达式\n\n自 Oracle 首次在数据库中引入 PL/SQL 以来，循环语句就一直存在。通过一些编码和创建特殊逻辑，所有类型的循环都是可能的。许多这些“自制”的循环类型，如步进循环和有条件退出点的循环，现在已通过标准代码实现。\n\
  \n### 迭代\n\n`for` 循环指定了一个迭代器及其迭代控制。如果需要，可以堆叠迭代控制，从而将多个循环浓缩为一个循环。迭代器的作用域仅限于循环内部。循环外的语句不能引用迭代器，迭代器在循环结束后是未定义的。\n\
  \n### 迭代控制\n\n在 Oracle Database 21c 之前发布的版本中，`for` 循环具有静态签名 `for <iterator> in [reverse]\
  \ <iteration_start> .. <iteration_end>`，这是唯一的迭代控制。循环变量始终是整数，从起始值运行到结束值，或者如果指定了 `reverse`，则从结束值运行到起始值，访问起始值和结束值之间的所有值。当你想跳过值或想做一些特殊处理时，必须由你自己来构建。\n\
  \n##### 多重迭代控制\n\n以前，一个迭代器只能有一个迭代控制，因此如果你想对多个集合做相同的事情，你就必须设计多个循环并复制逻辑。当然，你会为此创建一个（局部）过程，但即便如此，你仍然在创建代码，如清单\
  \ 7-1 所示。\n\n```\nbegin\nfor i in 1 .. 3\nloop\ndbms_output.put_line(i);\nend loop;\n\
  for i in 100 .. 104\nloop\ndbms_output.put_line(i);\nend loop;\nfor i in 200 ..\
  \ 202\nloop\ndbms_output.put_line(i);\nend loop;\nend;\n/\n\nListing 7-1\n21c 之前的多重迭代\n\
  ```\n\n从 Oracle Database 21c 开始，你可以在一个循环内堆叠多个迭代控制。为了实现相同的逻辑，你可以编写如清单 7-2 所示的代码。\n\
  \n```\nbegin\nfor i in 1 .. 3, 100 .. 104, 200 .. 202\nloop\ndbms_output.put_line(i);\n\
  end loop;\nend;\n/\n\nListing 7-2\n21c 及更高版本的多重迭代\n```\n\n\n##### 步进迭代控制\n\n如果您有一个需要步进控制的迭代循环，则必须自行构建。您可以构建一个简短的\
  \ `for` 循环，然后对迭代器值进行一些算术运算，或者构建一个长循环，然后跳过您不想使用的迭代器值。后一种解决方案如清单 7-3 所示。\n\n```\n\
  begin\nfor i in 1 .. 20\nloop\nif mod(i, 3) = 1\nthen\ndbms_output.put_line(i);\n\
  end if;\nend loop;\nend;\n/\n```\n\n**清单 7-3** 21c 版本之前的步进迭代\n\n自 Oracle Database\
  \ 21c 起，您可以将步长直接写入迭代中，如清单 7-4 所示。\n\n```\nbegin\nfor i in 1 .. 20 by 3\nloop\ndbms_output.put_line(i);\n\
  end loop;\nend;\n/\n```\n\n**清单 7-4** 21c 及以上版本的步进迭代\n\n如果您将迭代器声明为非整数变量而非整数，则甚至可以使用分数步长。清单\
  \ 7-5 是一个示例。\n\n```\nbegin\nfor i number(3, 1) in 1 .. 10 by 0.5\nloop\ndbms_output.put_line(i);\n\
  end loop;\nend;\n/\n```\n\n```\n1.5\n2.5\n3.5\n4.5\n5.5\n6.5\n7.5\n8.5\n9.5\n```\n\
  \n**清单 7-5** 21c 及以上版本的分数步进迭代\n\n## 迭代控制中的 while 循环\n\n在之前的 Oracle Database 版本中，您可以构建\
  \ `while` 循环，但这意味着要声明一个变量、初始化它并构建循环。问题始终在于，如何初始化变量，以及在哪里更改其值？清单 7-6 展示了 21c 版本之前数据库中的一个\
  \ `while` 循环。\n\n```\ndeclare\npower2 number;\nbegin\npower2 := 1;\nwhile power2\
  \ <= 1024 loop\ndbms_output.put_line( power2 );\npower2 := power2 * 2;\nend loop;\n\
  end;\n/\n```\n\n**清单 7-6** while 循环\n\n在 Oracle Database 21c 中，您可以将 `while` 循环包含在\
  \ `for` 循环中，如清单 7-7 所见。\n\n```\nbegin\nfor power2 in 1, repeat power2 * 2 while\
  \ power2 <= 1024\nloop\ndbms_output.put_line(power2);\nend loop;\nend;\n/\n```\n\
  \n**清单 7-7** 迭代控制中的 while 循环\n\n## 迭代控制中的 when\n\n在通常情况下，您会运行循环中的所有迭代，并在每次迭代中检查指定条件是否满足，然后才执行某些逻辑。现在，这些条件可以直接在迭代控制本身中处理。\n\
  \n如果您创建一个返回 `BOOLEAN` 值的函数，如清单 7-8 所示，您可以将其用作迭代控制中的条件的一部分，如清单 7-9 所用。\n\n```\ncreate\
  \ or replace function is_prime(number_in in number)\nreturn boolean is\nl_returnvalue\
  \ boolean := true;\nbegin\nfor indx in 2 .. number_in / 2\nloop\nif mod(number_in,\
  \ indx) = 0\nthen\nl_returnvalue := false;\nexit;\nend if;\nend loop;\nreturn l_returnvalue;\n\
  end;\n/\n```\n\n**清单 7-8** `is_prime` 函数\n\n使用此函数，您可以确保仅在条件满足时才执行循环。清单 7-9 中的示例展示了如何使用此函数来确定执行代码块内逻辑的条件。\n\
  \n```\nbegin\nfor i in 1 .. 100 when is_prime(i) and i not in (19, 37)\nloop\ndbms_output.put_line(i);\n\
  end loop;\nend;\n/\n```\n\n**清单 7-9** 迭代控制中的 `when`\n\n该循环仅针对满足 `when` 子句中指定条件的值执行。\n\
  \n##### 迭代控制中的游标\n\n自 Oracle 数据库首次实现 PL/SQL 以来，游标 `for loop` 语句就已可用。您可以使用迭代器记录来处理游标的数据。清单\
  \ 7-10 展示了这种游标 `for loop` 的实现。\n\n```\nbegin\ndbms_output.put_line( 'Drivers:');\n\
  for rec in (select d.driverid\n, d.driverref\n, d.forename || ' ' || d.surname as\
  \ name\n, d.nationality\nfrom   f1data.drivers d\n) loop\ndbms_output.put_line(\
  \ rec.driverid\n||'('\n||rec.driverref\n||')'\n||rec.name\n||'-'\n||rec.nationality\n\
  );\nend loop;\ndbms_output.put_line( 'Constructors:');\nfor rec in (select c.constructorid\n\
  , c.constructorref\n, c.name\n, c.nationality\nfrom   f1data.constructors c\n) loop\n\
  dbms_output.put_line( rec.constructorid\n||'('\n||rec.constructorref\n||')'\n||rec.name\n\
  ||'-'\n||rec.nationality\n);\nend loop;\nend;\n/\n```\n\n```\nDrivers:\n1(hamilton)Lewis\
  \ Hamilton-British\n2(heidfeld)Nick Heidfeld-German\n3(rosberg)Nico Rosberg-German\n\
  4(alonso)Fernando Alonso-Spanish\n5(kovalainen)Heikki Kovalainen-Finnish\n6(nakajima)Kazuki\
  \ Nakajima-Japanese\n7(bourdais)Sébastien Bourdais-French\n8(raikkonen)Kimi Räikkönen-Finnish\n\
  9(kubica)Robert Kubica-Polish\n10(glock)Timo Glock-German\n>\nConstructors:\n1(mclaren)McLaren-British\n\
  2(bmw_sauber)BMW Sauber-German\n3(williams)Williams-British\n4(renault)Renault-French\n\
  5(toro_rosso)Toro Rosso-Italian\n6(ferrari)Ferrari-Italian\n7(toyota)Toyota-Japanese\n\
  8(super_aguri)Super Aguri-Japanese\n9(red_bull)Red Bull-Austrian\n10(force_india)Force\
  \ India-Indian\n>\n```\n\n**清单 7-10** 显示信息的游标 for 循环\n\n如您所见，要显示信息，您必须在两个游标 `for\
  \ loop` 语句之间复制逻辑。在 Oracle Database 21c 中，可以将迭代器定义为预定义的记录类型，您可以将其用作显示过程的参数。清单 7-11\
  \ 是此用法的示例；它声明了一个记录类型 `info_t`，并使用此类型作为迭代器，而不是标准的标量值。\n\n```\ndeclare\ntype info_t\
  \ is record\n( id          number(11)\n, ref         varchar2(255)\n, name     \
  \   varchar2(255)\n, nationality varchar2(255)\n);\nprocedure printit(rec_in in\
  \ info_t)\nis\nbegin\ndbms_output.put_line\n( rec_in.id\n||'('\n||rec_in.ref\n||')'\n\
  ||rec_in.name\n||'-'\n||rec_in.nationality\n);\nend;\nbegin\ndbms_output.put_line(\
  \ 'Drivers:');\nfor rec info_t in (select d.driverid\n, d.driverref\n, d.forename\
  \ || ' ' || d.surname\n, d.nationality\nfrom   f1data.drivers d\nwhere  rownum <=\
  \ 10) loop\nprintit(rec);\nend loop;\ndbms_output.put_line( 'Constructors:');\n\
  for rec info_t in (select c.constructorid\n, c.constructorref\n, c.name\n, c.nationality\n\
  from   f1data.constructors c\nwhere  rownum <= 10) loop\nprintit(rec);\nend loop;\n\
  end;\n/\n```\n\n```\nDrivers:\n1(hamilton)Lewis Hamilton-British\n2(heidfeld)Nick\
  \ Heidfeld-German\n3(rosberg)Nico Rosberg-German\n4(alonso)Fernando Alonso-Spanish\n\
  5(kovalainen)Heikki Kovalainen-Finnish\n6(nakajima)Kazuki Nakajima-Japanese\n7(bourdais)Sébastien\
  \ Bourdais-French\n8(raikkonen)Kimi Räikkönen-Finnish\n9(kubica)Robert Kubica-Polish\n\
  10(glock)Timo Glock-German\n>\nConstructors:\n1(mclaren)McLaren-British\n2(bmw_sauber)BMW\
  \ Sauber-German\n3(williams)Williams-British\n4(renault)Renault-French\n5(toro_rosso)Toro\
  \ Rosso-Italian\n6(ferrari)Ferrari-Italian\n7(toyota)Toyota-Japanese\n8(super_aguri)Super\
  \ Aguri-Japanese\n9(red_bull)Red Bull-Austrian\n10(force_india)Force India-Indian\n\
  >\n```\n\n**清单 7-11** 使用预定义记录类型的游标 for 循环\n\n此技术还可以创建将 ref 游标作为参数之一的过程或函数。清单 7-12\
  \ 在包中实现了这一点。您不是创建游标 `for loop`，而是基于游标变量的 `values of` 创建循环。\n\n\n\n"
- "# 信息包定义与调用\n\n```\ncreate or replace package information is\nprocedure display(refcursor_in\
  \ in sys_refcursor);\nend information;\n/\ncreate or replace package body information\
  \ is\ntype rec_t is record\n( id          number(11)\n, ref         varchar2(255)\n\
  , name        varchar2(255)\n, nationality varchar2(255)\n);\nprocedure printit(rec_in\
  \ in rec_t)\nis\nbegin\ndbms_output.put_line\n( rec_in.id\n||'('\n||rec_in.ref\n\
  ||')'\n||rec_in.name\n||'-'\n||rec_in.nationality\n);\nend;\nprocedure display(refcursor_in\
  \ in sys_refcursor)\nis\nbegin\nfor rec rec_t in values of refcursor_in loop\nprintit(rec_in\
  \ => rec);\nend loop;\nend display;\nend information;\n/\n代码清单 7-12\n显示信息包\n```\n\
  \n你可以使用任何 ref 游标来调用此过程，前提是返回的记录类型符合定义的记录结构。\n\n```\ndeclare\nrc sys_refcursor;\n\
  begin\nopen rc for select d.driverid\n, d.driverref\n, d.forename || ' ' || d.surname\n\
  , d.nationality\nfrom   f1data.drivers d;\ninformation.display(rc);\nend;\n/\n1(hamilton)Lewis\
  \ Hamilton-British\n2(heidfeld)Nick Heidfeld-German\n3(rosberg)Nico Rosberg-German\n\
  4(alonso)Fernando Alonso-Spanish\n5(kovalainen)Heikki Kovalainen-Finnish\n6(nakajima)Kazuki\
  \ Nakajima-Japanese\n7(bourdais)Sébastien Bourdais-French\n8(raikkonen)Kimi Räikkönen-Finnish\n\
  9(kubica)Robert Kubica-Polish\n10(glock)Timo Glock-German\n>\ndeclare\nrc sys_refcursor;\n\
  begin\nopen rc for select c.constructorid\n, c.constructorref\n, c.name\n, c.nationality\n\
  from   f1data.constructors c;\ninformation.display(rc);\nend;\n/\n1(mclaren)McLaren-British\n\
  2(bmw_sauber)BMW Sauber-German\n3(williams)Williams-British\n4(renault)Renault-French\n\
  5(toro_rosso)Toro Rosso-Italian\n6(ferrari)Ferrari-Italian\n7(toyota)Toyota-Japanese\n\
  8(super_aguri)Super Aguri-Japanese\n9(red_bull)Red Bull-Austrian\n10(force_india)Force\
  \ India-Indian\n>\n```\n\n#### 可变迭代器\n\n你曾多少次试图给你的迭代器赋值？例如，你想在迭代中跳过任意数量的步骤。考虑代码清单\
  \ 7-13 中所示的脚本。\n\n```\nbegin\nfor i in 1 .. 10\nloop\ndbms_output.put_line(i);\n\
  i := i + 3;\nend loop;\nend;\n/\nORA-06550: line 7, column 7:\nPLS-00363: expression\
  \ 'I' cannot be used as an assignment target\nORA-06550: line 7, column 7:\nPL/SQL:\
  \ Statement ignored\n代码清单 7-13\n尝试给迭代器赋值\n```\n\nOracle Database 21c 引入了一个新选项：`mutable`\
  \ 迭代器。在迭代器名称后使用关键字 `mutable` 使其在循环执行期间可被修改，这样代码清单 7-14 中的代码就能运行了。\n\n```\nbegin\n\
  for i mutable in 1 .. 10\nloop\ndbms_output.put_line(i);\ni := i + 3;\nend loop;\n\
  end;\n/\n\n代码清单 7-14\n使迭代器可变\n```\n\n默认行为是使用 `immutable`（不可变）迭代器，也可以用更冗长的方式指定，如代码清单\
  \ 7-15 所示。\n\n```\nbegin\nfor i immutable in 1 .. 10\nloop\ndbms_output.put_line(i);\n\
  i := i + 3;\nend loop;\nend;\n/\nORA-06550: line 7, column 7:\nPLS-00363: expression\
  \ 'I' cannot be used as an assignment target\nORA-06550: line 7, column 7:\nPL/SQL:\
  \ Statement ignored\n代码清单 7-15\n使迭代器不可变\n```\n\n#### 增强迭代器\n\n数值迭代器除非你明确指定 `mutable`\
  \ 关键字，否则不是 `mutable` 的，而游标 `for` 循环中的记录却是可变的；也就是说，尽管迭代器本身未被声明为可变，但其各个属性的值是可变的。假设你有一个用于反转字符串的过程，如代码清单\
  \ 7-16 所示。\n\n```\ncreate or replace procedure\nreversestring(string_inout in out\
  \ varchar2)\nis\nl_reversed varchar2( 32767 );\nl_strlen number;\nbegin\nl_strlen\
  \ := length( string_inout );\nfor i in reverse 1..l_strlen\nloop\nl_reversed :=\
  \ l_reversed || substr( string_inout, i, 1 );\nend loop;\nstring_inout := l_reversed;\n\
  end;\n/\n代码清单 7-16\n反转字符串过程\n```\n\n如果你创建一个游标 `for` 循环，其中的迭代器是来自游标的一条记录，那么即使该迭代器未定义为可变，你仍然可以给记录的不同元素赋值。这从\
  \ Oracle Database 版本 7 开始就已可行。\n\n```\nbegin\nfor driver in (select *\nfrom   f1data.drivers\
  \ d\nwhere  d.nationality = 'Dutch')\nloop\ndbms_output.put_line( driver.forename\n\
  || ' '\n|| driver.surname );\nreversestring( driver.forename );\nreversestring(\
  \ driver.surname );\ndbms_output.put_line( driver.surname\n|| ' '\n|| driver.forename\
  \ );\nend loop;\nend;\n/\n```\n\n#### 数组中的循环\n\n你不必像代码清单 7-17 中那样，先创建一个 `for` 循环，然后在循环内部给关联数组赋值；你可以在赋值语句内部定义循环，如代码清单\
  \ 7-18 所示。\n\n```\ndeclare\ntype num_list is table of int index by pls_integer;\n\
  s1 num_list;\ns2 num_list;\nbegin\ns1 := num_list( for i in 1 .. 10 => i );\ns2\
  \ := num_list( for i in 2 .. 10 by 2 => s1( i ) );\nend;\n/\n代码清单 7-18\n在 21c 中于数组内部使用循环\n\
  ```\n\n```\ndeclare\ntype num_list is table of int index by pls_integer;\ns1 num_list;\n\
  s2 num_list;\nbegin\nfor i in 1 .. 10\nloop\ns1(i) := i * 10;\nend loop;\nfor i\
  \ in 1 .. 10\nloop\nif mod(i, 2) = 0\nthen\ns2(i) := s1(i);\nend if;\nend loop;\n\
  end;\n/\n代码清单 7-17\n在 21c 之前使用循环赋值\n```\n\n##### 数组的索引\n\n与用于单次从数据库检索数据的 `bulk collect`\
  \ 构造语句互补的是 `forall` 语句，它用于单次将更改写回数据库。`forall` 语句除了对密集集合使用 `<collection>.first ..\
  \ <collection>.last` 构造外，还可以使用 `indices of` 和 `values of` 构造。从 Oracle Database 21c\
  \ 开始，可以在 `for` 循环中使用这些构造。你可以使用 `indices of` 构造，如代码清单 7-20 所示，而不必像代码清单 7-19 中展示的那样编写\
  \ `while` 循环。\n\n```\ndeclare\ntype num_list is table of int index by pls_integer;\n\
  s2 num_list;\nbegin\ns2 := num_list(for i in 2 .. 10 by 2 => i * 10);\nfor idx in\
  \ indices of s2\nloop\ndbms_output.put_line(idx || '=' || s2(idx));\nend loop;\n\
  end;\n/\n2=20\n4=40\n6=60\n8=80\n10=100\n代码清单 7-20\n自 21c 起显示稀疏集合\n```\n\n```\n\
  declare\ntype num_list is table of int index by pls_integer;\ns2 num_list;\nidx\
  \ int;\nbegin\ns2 := num_list(2  => 20\n,4  => 40\n,6  => 60\n,8  => 80\n,10 =>\
  \ 100);\nidx := s2.first;\nwhile idx is not null\nloop\ndbms_output.put_line(idx\
  \ || '=' || s2(idx));\nidx := s2.next(idx);\nend loop;\nend;\n/\n2=20\n4=40\n6=60\n\
  8=80\n10=100\n代码清单 7-19\n在 21c 之前显示稀疏集合\n```\n\n提示\n\n`s2` 变量是在迭代控制中使用限定表达式初始化的。更多内容请参阅本章后面的限定表达式部分。\n\
  \n\n\n##### 数组的值\n\n如果您只对数组的值感兴趣，可以使用 `values of` 操作符调用 `for` 循环，如代码清单 7-21 所示。\n\
  \n```sql\ndeclare\n  type num_list is table of int index by pls_integer;\n  s2 num_list;\n\
  begin\n  s2 := num_list(for i in 2 .. 10 by 2 => i * 10);\n  for idx in values of\
  \ s2\n  loop\n    dbms_output.put_line(idx);\n  end loop;\nend;\n/\n```\n代码清单 7-21\n\
  自 21c 起显示集合的值\n\n迭代器不一定必须是标量；它也可以是一个记录，如代码清单 7-22 所示。\n\n```sql\ndeclare\n  type\
  \ driver_aa is table of f1data.drivers%rowtype\n    index by pls_integer;\n  l_drivers\
  \ driver_aa;\n  cursor drivers is\n    select d.driverid\n         , d.driverref\n\
  \         , d.driver_number\n         , d.code\n         , d.forename\n        \
  \ , d.surname\n         , d.dob\n         , d.nationality\n         , d.url\n  \
  \  from   f1data.drivers d\n    where  d.nationality = 'Dutch';\nbegin\n  l_drivers\
  \ := driver_aa( for i in drivers\n                           index i.driverid =>\
  \ i );\n  for driver in values of l_drivers\n  loop\n    dbms_output.put_line( 'l_drivers['\n\
  \                        || driver.driverid\n                        || ']='\n \
  \                       || driver.driverref\n                        );\n  end loop;\n\
  end;\n/\nl_drivers[27]=albers\nl_drivers[38]=doornbos\nl_drivers[50]=verstappen\n\
  l_drivers[136]=lammers\nl_drivers[179]=rothengatter\nl_drivers[247]=bleekemolen\n\
  l_drivers[257]=hayje\nl_drivers[295]=wunderink\nl_drivers[298]=lennep\nl_drivers[430]=beaufort\n\
  l_drivers[450]=vos\nl_drivers[457]=pon\nl_drivers[458]=slotemaker\nl_drivers[758]=lof\n\
  l_drivers[759]=flinterman\nl_drivers[823]=garde\nl_drivers[830]=max_verstappen\n\
  ```\n代码清单 7-22\n在记录中使用 `values of`\n\n注意\n\n集合的初始化将在本章后面的限定表达式部分进行解释。\n\n##### 数组的对\n\
  \n在 Oracle Database 21c 中，您可以使用 `pairs of` 构造。您无需创建索引迭代器并用它从集合中获取值（参见代码清单 7-23），而是可以在循环中同时获取索引和值作为迭代器（参见代码清单\
  \ 7-24）。这也适用于稀疏集合。\n\n```sql\ndeclare\n  type num_list is table of int index by\
  \ pls_integer;\n  s1 num_list;\n  s2 num_list;\nbegin\n  s1 := num_list(10, 20,\
  \ 30, 40, 50, 60, 70, 80, 90, 1000);\n  s2 := num_list(for i in 2 .. 10 by 2 =>\
  \ s1(i));\n  for x, y in pairs of s2\n  loop\n    dbms_output.put_line(x || ','\
  \ || y);\n  end loop;\nend;\n/\n2,20\n4,40\n6,60\n8,80\n10,1000\n```\n代码清单 7-24\n\
  使用 `pairs of` 获取索引和值\n\n```sql\ndeclare\n  type num_list is table of int index by\
  \ pls_integer;\n  s1 num_list;\n  s2 num_list;\nbegin\n  s1 := num_list(10, 20,\
  \ 30, 40, 50, 60, 70, 80, 90, 1000);\n  s2 := num_list(for i in 2 .. 10 by 2 =>\
  \ s1(i));\n  for idx in values of s2\n  loop\n    dbms_output.put_line(idx);\n \
  \ end loop;\nend;\n/\n```\n代码清单 7-23\n使用索引迭代器获取值\n\n值不一定必须是标量值；它也可以是一个记录，如代码清单 7-25\
  \ 所示。\n\n```sql\ndeclare\n  type driver_aa is table of f1data.drivers%rowtype\n\
  \    index by pls_integer;\n  l_drivers driver_aa;\n  cursor drivers is\n    select\
  \ d.driverid\n         , d.driverref\n         , d.driver_number\n         , d.code\n\
  \         , d.forename\n         , d.surname\n         , d.dob\n         , d.nationality\n\
  \         , d.url\n    from   f1data.drivers d\n    where  d.nationality = 'Dutch';\n\
  begin\n  l_drivers := driver_aa( for i in drivers\n                           index\
  \ i.driverid => i );\n  for driverid, driver in pairs of l_drivers\n  loop\n   \
  \ dbms_output.put_line( 'l_drivers[' || driverid || ']=' ||\n                  \
  \         driver.driverref );\n  end loop;\nend;\n/\nl_drivers[27]=albers\nl_drivers[38]=doornbos\n\
  l_drivers[50]=verstappen\nl_drivers[136]=lammers\nl_drivers[179]=rothengatter\n\
  l_drivers[247]=bleekemolen\nl_drivers[257]=hayje\nl_drivers[295]=wunderink\nl_drivers[298]=lennep\n\
  l_drivers[430]=beaufort\nl_drivers[450]=vos\nl_drivers[457]=pon\nl_drivers[458]=slotemaker\n\
  l_drivers[758]=lof\nl_drivers[759]=flinterman\nl_drivers[823]=garde\nl_drivers[830]=max_verstappen\n\
  ```\n代码清单 7-25\n在记录中使用 `pairs of`\n\n### PL/SQL 限定表达式\n\n自 Oracle Database 18c 起，可以使用限定表达式。限定表达式看起来很像使用命名参数调用过程或函数。\n\
  \n#### 记录\n\n在之前的 Oracle Database 版本中，您可以通过初始化变量然后为记录的所有属性提供值来初始化记录（参见代码清单 7-26）。\n\
  \n```sql\ndeclare\n  type circuit_t is record\n    ( circuitid  number(11)\n   \
  \ , circuitref varchar2(255)\n    , name       varchar2(255)\n    , location   varchar2(255)\n\
  \    , country    varchar2(255)\n    , lat        float\n    , lng        float\n\
  \    , alt        number(11)\n    , url        varchar2(255));\n  l_circuit circuit_t;\n\
  begin\n  l_circuit := circuit_t();\n  l_circuit.circuitid  := 2912;\n  l_circuit.circuitref\
  \ := 'tt_circuit';\n  l_circuit.name       := 'TT Circuit Assen';\n  l_circuit.location\
  \   := 'Assen';\n  l_circuit.country    := 'Netherlands';\n  l_circuit.lat     \
  \   := 52.961667;\n  l_circuit.lng        := 6.523333;\n  l_circuit.url        :=\n\
  \    'https://en.wikipedia.org/wiki/TT_Circuit_Assen';\n  dbms_output.put_line(\
  \ 'Name     : ' || l_circuit.name );\n  dbms_output.put_line( 'Location : ' || l_circuit.location\
  \ );\n  dbms_output.put_line( 'Latitude : ' || l_circuit.lat );\n  dbms_output.put_line(\
  \ 'Lngitude : ' || l_circuit.lng );\n  dbms_output.put_line( 'Altitude : ' || l_circuit.alt\
  \ );\nend;\n/\nName     : TT Circuit Assen\nLocation : Assen\nLatitude : 52.961667\n\
  Lngitude : 6.523333\nAltitude :\n```\n代码清单 7-26\n18c 之前初始化变量\n\n也可以通过在初始化时提供这些值作为参数来完成赋值。如果值未知，您可以提供\
  \ `NULL`（参见代码清单 7-27）。\n\n```sql\ndeclare\n  type circuit_t is record\n    ( circuitid\
  \  number(11)\n    , circuitref varchar2(255)\n    , name       varchar2(255)\n\
  \    , location   varchar2(255)\n    , country    varchar2(255)\n    , lat     \
  \   float\n    , lng        float\n    , alt        number(11)\n    , url      \
  \  varchar2(255));\n  l_circuit circuit_t;\nbegin\n  l_circuit := circuit_t\n  \
  \  ( 2912\n    , 'tt_circuit'\n    , 'TT Circuit Assen'\n    , 'Assen'\n    , 'Netherlands'\n\
  \    , 52.961667\n    , 6.523333\n    , null\n    , 'https://en.wikipedia.org/wiki/TT_Circuit_Assen'\n\
  \    );\n  dbms_output.put_line( 'Name     : ' || l_circuit.name );\n  dbms_output.put_line(\
  \ 'Location : ' || l_circuit.location );\n  dbms_output.put_line( 'Latitude : '\
  \ || l_circuit.lat );\n  dbms_output.put_line( 'Lngitude : ' || l_circuit.lng );\n\
  \  dbms_output.put_line( 'Altitude : ' || l_circuit.alt );\nend;\n/\nName     :\
  \ TT Circuit Assen\nLocation : Assen\nLatitude : 52.961667\nLngitude : 6.523333\n\
  Altitude :\n```\n代码清单 7-27\n18c 之前在初始化中初始化变量\n\n自 Oracle Database 18c 起，您可以使用限定表达式来初始化记录（参见代码清单\
  \ 7-28）。\n\n```sql\ndeclare\n  type circuit_t is record\n    ( circuitid  number(11)\n\
  \    , circuitref varchar2(255)\n    , name       varchar2(255)\n    , location\
  \   varchar2(255)\n    , country    varchar2(255)\n    , lat        float\n    ,\
  \ lng        float\n    , alt        number(11)\n    , url        varchar2(255));\n\
  \  l_circuit circuit_t;\nbegin\n  l_circuit := circuit_t\n    ( circuitid  => 2912\n\
  \    , circuitref => 'tt_circuit'\n    , name       => 'TT Circuit Assen'\n    ,\
  \ location   => 'Assen'\n    , country    => 'Netherlands'\n    , lat        =>\
  \ 52.961667\n    , lng        => 6.523333\n    , url        => 'https://en.wikipedia.org/wiki/TT_Circuit_Assen'\n\
  \    );\n  dbms_output.put_line( 'Name     : ' || l_circuit.name );\n  dbms_output.put_line(\
  \ 'Location : ' || l_circuit.location );\n  dbms_output.put_line( 'Latitude : '\
  \ || l_circuit.lat );\n  dbms_output.put_line( 'Lngitude : ' || l_circuit.lng );\n\
  \  dbms_output.put_line( 'Altitude : ' || l_circuit.alt );\nend;\n/\nName     :\
  \ TT Circuit Assen\nLocation : Assen\nLatitude : 52.961667\nLngitude : 6.523333\n\
  Altitude :\n```\n代码清单 7-28\n在 18c 中初始化变量\n\n\n### 集合\n\n与记录类似，您也可以使用 `qualified\
  \ expressions` 来初始化集合。在之前的 Oracle 数据库版本中，您必须逐项初始化集合（参见清单 7-29）。\n\n```\ndeclare\n\
  \  type numbers_tt is table of number index by pls_integer;\n  l_numbers numbers_tt;\n\
  begin\n  l_numbers(72) := 29;\n  l_numbers(76) := 6;\n  l_numbers(98) := 18;\n \
  \ l_numbers(69) := 5;\n  for indx in indices of l_numbers loop\n    dbms_output.put_line(\
  \ '('\n                        ||indx\n                        ||') '\n        \
  \                ||l_numbers(indx)\n                        );\n  end loop;\nend;\n\
  /\n(69) 5\n(72) 29\n(76) 6\n(98) 18\n清单 7-29\n18c 版本之前的集合初始化\n```\n\n使用限定表达式后，相同的脚本变得更加清晰和简洁（参见清单\
  \ 7-30）。\n\n```\ndeclare\n  type numbers_tt is table of number index by pls_integer;\n\
  \  l_numbers numbers_tt;\nbegin\n  l_numbers := numbers_tt( 72 => 29\n         \
  \                , 76 => 6\n                         , 98 => 18\n              \
  \           , 69 => 5\n                         );\n  for indx in indices of l_numbers\
  \ loop\n    dbms_output.put_line( '('\n                        ||indx\n        \
  \                ||') '\n                        ||l_numbers(indx)\n           \
  \             );\n  end loop;\nend;\n/\n(69) 5\n(72) 29\n(76) 6\n(98) 18\n清单 7-30\n\
  18c 版本中的集合初始化\n```\n\n如果您想初始化一个索引从数字 1 开始的稠密集合，Oracle 数据库 21c 不需要使用限定表达式（参见清单 7-31）。\n\
  \n```\ndeclare\n  type numbers_tt is table of number index by pls_integer;\n  l_numbers\
  \ numbers_tt;\nbegin\n  l_numbers := numbers_tt( 29, 6, 18, 5 );\n  for indx in\
  \ indices of l_numbers loop\n    dbms_output.put_line( '('\n                   \
  \     ||indx\n                        ||') '\n                        ||l_numbers(indx)\n\
  \                        );\n  end loop;\nend;\n/\n(1) 29\n(2) 6\n(3) 18\n(4) 5\n\
  清单 7-31\n21c 版本中的稠密集合初始化\n```\n\n您还可以直接在构造函数中使用游标。有两种方法可以使用游标填充集合。您可以像使用 `bulk collect`\
  \ 填充集合那样，将其填充为一个稠密集合。在这种情况下，您在集合中使用 `sequence` 关键字作为索引（参见清单 7-32）。\n\n```\ndeclare\n\
  \  type circuit_tt is table of f1data.circuits%rowtype\n    index by pls_integer;\n\
  \  l_circuits circuit_tt;\nbegin\n  l_circuits := circuit_tt\n    (for rec in\n\
  \      (select c.circuitid\n             , c.circuitref\n             , c.name\n\
  \             , c.location\n             , c.country\n             , c.lat\n   \
  \          , c.lng\n             , c.alt\n             , c.url\n       from   f1data.circuits\
  \ c\n       order  by c.circuitref\n      ) sequence => rec);\n  dbms_output.put_line(\
  \ l_circuits(1).name\n                      ||' ('\n                      ||l_circuits(1).location\n\
  \                      ||' ['\n                      ||l_circuits(1).lat\n     \
  \                 ||','\n                      ||l_circuits(1).lng\n           \
  \           ||'])'\n                      );\nend;\n/\nCircuit Park Zandvoort (Zandvoort\
  \ [52.3888,4.54092])\n清单 7-32\n在 21c 版本中使用游标初始化稠密集合\n```\n\n有时，使用表的主键作为索引，或者像本例中使用唯一键\
  \ `circuitref` 字段更有意义。在这里，您使用 `index` 关键字将游标中的一个字段指定为索引（参见清单 7-33）。\n\n```\ndeclare\n\
  \  type circuit_tt is table of f1data.circuits%rowtype\n    index by varchar2(256);\n\
  \  l_circuits circuit_tt;\nbegin\n  l_circuits := circuit_tt\n    (for rec in\n\
  \      (select c.circuitid\n             , c.circuitref\n             , c.name\n\
  \             , c.location\n             , c.country\n             , c.lat\n   \
  \          , c.lng\n             , c.alt\n             , c.url\n       from   f1data.circuits\
  \ c\n      ) index rec.circuitref => rec);\n  dbms_output.put_line( l_circuits('zandvoort').name\n\
  \                      ||' ('\n                      ||l_circuits('zandvoort').location\n\
  \                      ||' ['\n                      ||l_circuits('zandvoort').lat\n\
  \                      ||','\n                      ||l_circuits('zandvoort').lng\n\
  \                      ||'])'\n                      );\nend;\n/\nCircuit Park Zandvoort\
  \ (Zandvoort [52.3888,4.54092])\n清单 7-33\n在 21c 版本中使用游标初始化稀疏集合\n```\n\n### 总结\n\n\
  自 Oracle 数据库 21c 起，您在循环中拥有了广泛的可用性。迭代器不必是整数，也可以是非整数或字符串值。迭代器现在可以声明为可变的，因此您可以在循环内部更改其值。迭代控制可以被步进和堆叠。\n\
  \n使用 `qualified expressions` 使您的代码清晰且更具自描述性。\n\n"
- "# 第二部分 多重技术与语言\n\n## 8. 多态表函数与 SQL 宏\n\nOracle 数据库开箱即用地提供了大量功能。大多数常见的函数和过程都触手可及。但是，当您需要一些\
  \ Oracle 未提供的功能时，它们能提供什么呢？假设您只有签到和签退时间，需要计算总工作时间。一个能够对开始时间和结束时间之间的间隔差进行求和的聚合函数将非常有用。遗憾的是，Oracle\
  \ 数据库目前尚未提供这样的聚合函数。（您永远不知道他们什么时候会实现这样的功能。）您可以创建一个“普通”的 PL/SQL 函数，但那样您总是会承受性能损失。\n\
  \n如果您正在从其他数据库（如 SQL Server）迁移，那里有一个用于确定当前日期和时间的函数（`SYSDATE`），而您不想更改应用程序使用的所有代码，该怎么办？\n\
  \n在之前的 Oracle 数据库版本中，您可以利用 Oracle 数据盒式接口（`ODCI`），但正确实现它并非易事。最难实现的事情之一是使您的 `ODCI`\
  \ 函数能够与并行查询处理正确协作。\n\n随着 *多态表函数*（`PTF`）的引入，实现您自己的 SQL 函数变得简单多了，尽管并非微不足道。Oracle 负责底层的“管道铺设”，以确保\
  \ `PTF` 与并行查询良好协作。\n\nSQL 宏也可以用于此领域，使一些 `PTF` 的实现变得稍微容易一些。使用 SQL 宏，您可以创建可重用的 SQL\
  \ 片段。一次实现，即可在您的 SQL 语句中使用，并且不会带来常规 PL/SQL 函数调用所导致的性能影响。\n\n### 多态表函数\n\nSQL:2016\
  \ 标准对 *多态表函数* 的描述如下。\n\n> *... 可以在 FROM 子句中调用的用户定义函数。它们可以处理在定义时行类型未声明的表，并生成一个在定义时行类型可能已声明也可能未声明的结果表。多态表函数允许应用程序开发者利用长期定义的动态\
  \ SQL 功能来创建强大而复杂的自定义函数。*\n\nOracle 数据库 18c 引入了这一概念。根据输入参数的不同，返回类型在运行时定义。这与传统的表函数不同，传统表函数的返回类型在编译时是固定的。\n\
  \n一个多态表函数由两部分组成。\n\n*   一个包含 `PTF` 实现所有代码的 PL/SQL 包。\n*   一个独立的或打包的函数，它作为接口命名 `PTF`\
  \ 及其关联的实现包。\n\nPL/SQL 包包含实现 `PTF` 的程序。这些程序接受接口函数中提供的参数的 PL/SQL 版本。\n\n\n#### 函数\n\
  \n包装函数（wrapper function）负责从 SQL 语句到 PTF 的接口转换。`table` 伪运算符用于将表对象转换为 `dbms_tf.table_t`\
  \ PL/SQL 类型。引入了一个新的伪运算符 `columns`，以方便将列转换为 `dbms_tf.columns_t` 类型。其他参数（如果有）则使用其对应的\
  \ SQL 形式。包装函数没有函数体。它仅仅是通往 PTF 包的接口。\n\n该函数指定了以下内容。\n\n*   PTF 名称\n*   恰好一个类型为 `table`\
  \ 的参数，以及任意数量的 `non-table` 参数\n*   返回类型是 `table`\n*   PTF 的类型，即 `row` 或 `table` 语义\n\
  *   实现 PTF 的包名称\n\n```\ncreate [ or replace ] [ editionable | noneditionable ]\n\
  function [ schema. ] function_name\n[ ( parameter_declaration [, parameter_declaration]...\
  \ ) ]\nreturn table\npipelined ( row | table ) polymorphic\nusing [ schema. ] implementation_package\n\
  ```\n\n如果 PTF 定义为 `row semantics`（行语义），则输入为单行。PTF 所需的所有信息都包含在此单行中。PTF 不知道也不需要知道其他行的任何信息。如果\
  \ PTF 定义为 `table semantics`（表语义），则输入是一组行。PTF 可以利用来自多行的信息，例如，用于构建你自己的聚合函数。当你拥有一个\
  \ `table semantics` PTF 时，你可以选择使用 `partition by` 子句和/或 `order by` 子句来扩展表参数。\n\n\
  #### 包\n\n该包包含实现 PTF 所需的所有代码。它必须包含一个 `describe` 函数，但也可以包含 `open`、`fetch_rows` 和\
  \ `close` 过程。`describe` 函数是必需的；所有其他过程都是可选的。\n\n#### describe\n\n传递给 `describe` 函数的参数可以是可传递给常规表函数的标准标量参数。但\
  \ PTF 也接受一个表参数。表参数必须是一个基本表名，它可以是一个 `with` 子句查询，或者是 `from` 子句中允许的任何模式级对象（表、视图或表函数）。`describe`\
  \ 函数也可以接受一个 `columns` 参数。\n\n在 `describe` 函数中，你可以指定哪些输入表列应被读取 (`for_read`)，以及哪些列应被传递\
  \ (`pass_through`) 到结果中。如果某列的 `for_read` 属性设置为 `true`，则其 `values` 在 PTF 的其他过程中可用。如果设置为\
  \ `FALSE`，则不可用。\n\n如果你希望该列出现在结果列中，你必须将 `pass_through` 属性设置为 `true`。如果此属性设置为 `FALSE`，则该列在结果列中不可见。\n\
  \n你不仅可以选择显示或隐藏现有列，还可以创建仅存在于结果集中的全新列。\n\n#### open\n\n如果存在 `open` 过程，它会在 `fetch_rows`\
  \ 过程之前被调用一次。它可用于初始化和分配特定状态。这在实现 `table semantics` PTF 时尤为有用。由于执行状态是会话和游标私有的（如同普通包一样），`table\
  \ semantics` PTF 可以使用包全局变量来存储执行状态。PTF 使用数据库提供的唯一执行 ID 来标识该状态。你可以使用 `get_xid` 函数获取此执行状态的唯一\
  \ ID。此 ID 对于 PTF 的所有执行函数保持不变。\n\n#### fetch_rows\n\n`fetch_rows` 过程是真正执行工作的地方。它产生一个输出行集，该行集被发送回请求进程。根据数据情况，此过程可能会被多次调用。调用的频率在查询执行期间确定。看起来这个过程似乎是每批\
  \ 1024 行调用一次，但这一点似乎没有在任何地方有文档记载。\n\n#### close\n\n`close` 过程在 PTF 执行结束时被调用一次。使用此过程释放与\
  \ PTF 执行状态关联的资源。你还可以将全局设置重置回其原始值。\n\n#### 用法\n\n在开发 PTF 时，你可能希望使用跟踪功能来查看程序的运行情况。你可以为此使用\
  \ `dbms_output.put_line`，但 `DBMS_TF` 包提供了一个重载的 `trace` 过程。你不仅可以编写类似于 `dbms_output.put_line`\
  \ 的消息，它还具有重载功能，可以打印整个行集、表信息、完整环境等。\n\n```\nprocedure trace(msg                 \
  \  varchar2,\nwith_id               boolean   default false,\nseparator        \
  \     varchar2  default null,\nprefix                varchar2  default null);\n\
  procedure trace(rowset             in row_set_t);\nprocedure trace(env         \
  \       in env_t);\nprocedure trace(columns_new        in columns_new_t);\nprocedure\
  \ trace(cols               in columns_t);\nprocedure trace(columns_with_type  in\
  \ columns_with_type_t);\nprocedure trace(tab                in table_t);\nprocedure\
  \ trace(col                in column_metadata_t);\n```\n\n这在开发过程中可以提供大量信息。你可能希望使用条件编译（参见第\
  \ 6 章）来包含对跟踪函数的调用，这样你就可以在编译时开启或关闭此功能，而无需更改源代码。\n\n### 用例\n\n一个常见的需求是根据分隔符将字符串拆分为更小的部分。由于\
  \ SQL 中没有内置功能来实现这一点，这正是 PTF 可以填补的空白。\n\n\n\n### 拆分\n\n假设你有许多需要加载到数据库中的 CSV 文件。可能存在多种不同的布局，因此你必须为每种布局创建不同的代码。这不仅是一项繁琐的工作，而且容易出错。你可能会从早期的程序中复制代码并根据需要进行调整，但很可能会遗漏一两个细节。\n\
  \n如果你使用一个 PTF，不仅能大大简化使用，还能减少出错的可能性。\n\n对于这个 PTF，假设需要拆分的行位于结果集（表、视图等）的第一列，并且使用分号\
  \ (`;`) 作为分隔符。你需要一个包含强制 `describe` 函数和一个 `fetch_rows` 过程的包（`split_ptf`），因为你想要单独处理每一行。此\
  \ PTF 具有行语义，因此不需要 `open` 和 `close` 过程。\n\n`describe` 函数需要接受表参数的 PL/SQL 版本（在以下代码中称为\
  \ `tab`）以及一个参数 (`cols`)，以告知 PTF 在输出中创建哪些列。\n\n```\nfunction describe\n(\ntab  in\
  \ out dbms_tf.table_t\n, cols in     dbms_tf.columns_t default null\n) return dbms_tf.describe_t;\n\
  ```\n\n`fetch_rows` 过程不需要任何参数。\n\n清单 8-1 是完整的包头。\n\n```\ncreate or replace package\
  \ split_ptf is\nfunction describe\n(\ntab  in out dbms_tf.table_t\n, cols in   \
  \  dbms_tf.columns_t default null\n) return dbms_tf.describe_t;\nprocedure fetch_rows;\n\
  end split_ptf;\n/\nListing 8-1\nsplit_ptf 包头\n```\n\n函数的设置在 `describe` 函数中完成。由于表的第一列必须保存要拆分的数据，因此将此列标记为由引擎读取，该引擎将分号分隔的字符串转换为单独的部分。\n\
  \n```\ntab.column( 1 ).for_read     := true;\n```\n\n将字符串拆分为单独的部分后，你就不希望它再出现在结果集中了。要将其从结果集中移除，需将\
  \ `pass_through` 参数设置为 FALSE。\n\n```\ntab.column( 1 ).pass_through := false;\n```\n\
  \n完成此操作后，根据 `cols` 参数中的指定创建新列。此参数的类型是 `dbms_tf.columns`，但只包含列名。你将所有这些列定义为 VARCHAR2\
  \ 类型，最大长度为 4000。你可以依赖这些值的默认值，但我们希望使代码更加明确。这样，即使默认值发生变化，代码也能以相同的方式工作。\n\n```\nl_new_col\
  \ := dbms_tf.column_metadata_t\n( type    => dbms_tf.type_varchar2\n, max_len =>\
  \ 4000\n, name    => cols( indx )\n);\n-- 将新列添加到新列列表中\nl_new_cols( l_new_cols.count\
  \ + 1 ) := l_new_col;\n```\n\n当你构建一组新列时，会返回以下内容。\n\n```\nreturn dbms_tf.describe_t(\
  \ new_columns => l_new_cols );\n```\n\n现在是 `fetch_rows` 过程的时间了。此过程每次调用处理 1024 行，因此它不是逐行处理。因此，你必须创建集合来保存传入的数据和产生的数据。\n\
  \n```\ntype colset is table of dbms_tf.tab_varchar2_t\nindex by pls_integer;\n--\
  \ 用于保存检索到的行集的变量\nl_rowset dbms_tf.row_set_t;\n-- 用于保存检索到的行数的变量\nl_rowcount pls_integer;\n\
  -- 用于保存（输出）列数的变量\nl_putcolcount pls_integer :=\ndbms_tf.get_env().put_columns.count;\n\
  -- 用于保存新值的变量\nl_newcolset colset;\n```\n\n现在所有的变量和设置都已就绪，让我们开始实际的代码。首先，将行获取到本地行集中。这将产生一个最多包含\
  \ 1024 行的集合。第二个参数给出当前集的行数，你也可以获取列数，但对于此函数可以忽略。\n\n```\ndbms_tf.get_row_set( rowset\
  \    => l_rowset\n, row_count =>  l_rowcount );\n```\n\n现在你已将行放入集合中，是时候开始处理数据了。因此，从两个循环开始。第一个循环遍历每一行。\n\
  \n```\nfor rowindx in 1 .. l_rowcount\nloop\n```\n\n在该循环内，启动一个循环遍历输出集中定义的每一列。\n\n\
  ```\nfor colindx in 1 .. l_putcolcount\nloop\n```\n\n使用 `dbms_tf.col_to_char` 函数，通过正则表达式检索要拆分的列，为正确的输出列提取正确的部分。\n\
  \n```\nl_columnvalue := trim(both '\"' from\ndbms_tf.col_to_char( l_rowset( 1 )\n\
  , rowindx ) );\nl_newcolset(colindx)(rowindx) := trim( ';' from\nregexp_substr(\
  \ l_columnvalue\n, '[^;]*;{0,1}'\n, 1\n, colindx\n)\n);\n```\n\n处理完当前集中的每一行后，将结果集合添加到输出行集中。\n\
  \n```\nfor indx in 1 .. l_putcolcount\nloop\ndbms_tf.put_col( columnid   => indx\n\
  , collection => l_newcolset( indx )\n);\nend loop;\n```\n\n清单 8-2 展示了 `split_ptf`\
  \ 包体的完整实现。\n\n```\ncreate or replace package body split_ptf as\nsubtype maxvarchar2\
  \ is varchar2( 32767 );\nfunction describe\n(\ntab  in out dbms_tf.table_t\n, cols\
  \ in     dbms_tf.columns_t default null\n) return dbms_tf.describe_t as\n-- 要添加列的元数据\n\
  l_new_col dbms_tf.column_metadata_t;\n-- 要添加的列的表\nl_new_cols dbms_tf.columns_new_t;\n\
  begin\n-- 将第一列标记为读取，并且不再显示它\ntab.column( 1 ).for_read     := true;\ntab.column(\
  \ 1 ).pass_through := false;\n-- 添加新列，如 cols 参数中所指定\nfor indx in 1 .. cols.count\n\
  loop\n-- 为名为 cols(indx) 的列定义元数据\nl_new_col := dbms_tf.column_metadata_t\n( type\
  \    => dbms_tf.type_varchar2\n, max_len => 4000\n, name    => cols( indx )\n);\n\
  -- 将新列添加到新列列表中\nl_new_cols( l_new_cols.count + 1 ) := l_new_col;\nend loop;\n--\
  \ 现在我们返回一个特定的 DESCRIBE_T 来添加新列\nreturn dbms_tf.describe_t( new_columns => l_new_cols\
  \ );\nend;\nprocedure fetch_rows is\n-- 定义一个 varchar2 表的表类型\ntype colset is table\
  \ of dbms_tf.tab_varchar2_t\nindex by pls_integer;\n-- 用于保存检索到的行集的变量\nl_rowset dbms_tf.row_set_t;\n\
  -- 用于保存检索到的行数的变量\nl_rowcount pls_integer;\n-- 用于保存（输出）列数的变量\nl_putcolcount pls_integer\
  \ :=\ndbms_tf.get_env().put_columns.count;\n-- 用于保存新值的变量\nl_newcolset colset;\n\
  -- 列的值\nl_columnvalue maxvarchar2;\nbegin\n-- 将行获取到本地行集中\n-- 此时，行将包含\n-- 从传入的表/视图/查询中获取的列\n\
  dbms_tf.get_row_set( rowset    => l_rowset\n, row_count =>  l_rowcount\n);\n-- 对于行集中的每一行...\n\
  for rowindx in 1 .. l_rowcount\nloop\n-- 对于每一列\nfor colindx in 1 .. l_putcolcount\n\
  loop\nl_columnvalue := trim(both '\"' from\ndbms_tf.col_to_char( l_rowset( 1 )\n\
  , rowindx ) );\nl_newcolset(colindx)(rowindx) := trim( ';' from\nregexp_substr(\
  \ l_columnvalue\n, '[^;]*;{0,1}'\n, 1\n, colindx\n)\n);\nend loop; -- 每一列\nend loop;\
  \ -- 行集中的每一行\n-- 将新填充的列添加到行集中\nfor indx in 1 .. l_putcolcount\nloop\ndbms_tf.put_col(\
  \ columnid   => indx\n, collection => l_newcolset( indx )\n);\nend loop;\nend;\n\
  end split_ptf;\n/\nListing 8-2\nsplit_ptf 包体\n```\n\n现在包已完成，让我们为这个 PTF 编写包装函数。包装函数具有与包中\
  \ `describe` 函数相同的参数，只是这次使用的是 PL/SQL 类型的 SQL 等价物。此外，还声明了 PTF 的语义类型。在本例中，它是一个行语义函数，因为\
  \ PTF 是按行工作的。\n\n清单 8-3 展示了包装函数。\n\n```\ncreate or replace function split\n(\ntab\
  \  in table\n, cols in columns default null\n) return table\npipelined row polymorphic\
  \ using split_ptf;\n/\nListing 8-3\nSplit 包装函数\n\n\n\n#### 调用多态表函数\n\n表 8-1 列出了\
  \ F1 赛车手。\n\n表 8-1 以分号分隔格式列出的 F1 赛车手\n\n| `DRIVER` |\n| 44;HAM;Lewis;Hamilton;1985-01-07;British\
  \ |\n| 16;LEC;Charles;Leclerc;1997-10-16;Monegasque |\n| 4;NOR;Lando;Norris;1999-11-13;British\
  \ |\n| 11;PER;Sergio;Pérez;1990-01-26;Mexican |\n| 3;RIC;Daniel;Ricciardo;1989-07-01;Australian\
  \ |\n| 63;RUS;George;Russell;1998-02-15;British |\n| 55;SAI;Carlos;Sainz;1994-09-01;Spanish\
  \ |\n| 33;VER;Max;Verstappen;1997-09-30;Dutch |\n\nPTF（多态表函数）使得将这些分隔的值转换成独立的列变得轻而易举。\n\
  \n```sql\nselect permanentNumber\n, code\n, givenName\n, familyName\n, dateOfBirth\n\
  , nationality\nfrom   split( tab  => f1drivers\n, cols => columns( permanentNumber\n\
  , code\n, givenName\n, familyName\n, dateOfBirth\n, nationality\n)\n)\n/\n```\n\n\
  注意：确保你在包装函数中使用的参数名称与包中使用的名称相同；否则，使用具名表示法会失败。\n\n表 8-2 拆分多态表函数的输出\n\n| PERMANENTNUMBER\
  \ | CODE | GIVENNAME | FAMILYNAME | DATEOFBIRTH | NATIONALITY |\n| --- | --- | ---\
  \ | --- | --- | --- |\n| 44 | HAM | Lewis | Hamilton | 1985-01-07 | British |\n\
  | 16 | LEC | Charles | Leclerc | 1997-10-16 | Monegasque |\n| 4 | NOR | Lando |\
  \ Norris | 1999-11-13 | British |\n| 11 | PER | Sergio | Pérez | 1990-01-26 | Mexican\
  \ |\n| 3 | RIC | Daniel | Ricciardo | 1989-07-01 | Australian |\n| 63 | RUS | George\
  \ | Russell | 1998-02-15 | British |\n| 55 | SAI | Carlos | Sainz | 1994-09-01 |\
  \ Spanish |\n| 33 | VER | Max | Verstappen | 1997-09-30 | Dutch |\n\n#### 求和时间间隔\n\
  \n如果你有一组想要相加的时间间隔值，Oracle 数据库目前没有提供现成的求和聚合函数来实现这一点。使用多态表函数，你可以自己构建此功能。\n\n让我们从构建包规范开始。`describe`\
  \ 函数需要一个用于表的参数（必需）和一个用于你想要计算其总和的列的参数。\n\n```sql\nfunction describe\n(\ntab  in out\
  \ dbms_tf.table_t\n, cols in     dbms_tf.columns_t default null\n) return dbms_tf.describe_t;\n\
  /\n```\n\n`fetch_rows` 过程不需要任何特定参数。\n\n清单 8-4 展示了用于求和间隔的多态表函数的完整包规范。\n\n```sql\n\
  create or replace package suminterval_ptf is\nfunction describe\n(\ntab  in out\
  \ dbms_tf.table_t\n, cols in     dbms_tf.columns_t default null\n) return dbms_tf.describe_t;\n\
  procedure fetch_rows;\nend suminterval_ptf;\n/\n```\n清单 8-4 `suminterval_ptf` 包规范\n\
  \n在 `describe` 函数中，标记所有不需要传递到结果集的列，因为你对这些列的值不感兴趣，只对它们产生的聚合值感兴趣。\n\n```sql\nfor indx\
  \ in tab.column.first .. tab.column.last\nloop\ntab.column(indx).pass_through :=\
  \ false;\n```\n\n只有你感兴趣的列才应被标记为需要读取。所有其他列可以被忽略（即，将 `for_read` 设置为 `FALSE`）。标记为需要读取的列会将其时间间隔值相加。\n\
  \n```sql\ntab.column(indx).for_read := false;\nfor colindx in cols.first .. cols.last\n\
  loop\nif tab.column(indx).description.name = cols(colindx)\nthen\ntab.column(indx).for_read\
  \ := true;\n```\n\n由于这是一列你感兴趣的列，请创建一个新列以将其与实际列区分开来，新列具有特定的名称（`SUM_<列名>_`），但类型与原始列相同。\n\
  \n```sql\n-- 并添加一个相同类型但名称为 SUM_colname_ 的新列\nsum_cols(colindx) :=\ndbms_tf.column_metadata_t\n\
  ( name => 'SUM_' ||\nreplace( tab.column(indx).description.name\n, '\"'\n) ||\n\
  '_'\n, type => tab.column( indx ).description.type );\n```\n\n在构建完新的列集后，返回以下内容。\n\
  \n```sql\n-- 现在我们返回一个特定的 DESCRIBE_T，它添加了新列\nreturn dbms_tf.describe_t( new_columns\
  \ => sum_cols );\n```\n\n在 `fetch_rows` 过程中，初始化一个变量来保存此函数的环境。\n\n```sql\nenv dbms_tf.env_t\
  \ := dbms_tf.get_env();\n```\n\n此记录包含有关多态表函数执行时属性的元数据。此记录的属性之一是 `get_columns` 集合。这些是数据在多态表函数中可用（`for_read\
  \ = true`）的列。\n\n遍历此集合，检查列的数据类型，因为支持的两种数据类型需要不同的处理。\n\n```sql\nfor colindx in 1\
  \ .. env.get_columns.count\nloop\ncase env.get_columns( colindx ).type\n```\n\n\
  对于每种支持的类型，将整个列获取到本地集合中。\n\n```sql\n-- 当列类型为 INTERVAL YEAR TO MONTH 时\nwhen dbms_tf.type_interval_ym\
  \ then\n-- 获取列的内容\ndbms_tf.get_col( columnid   => colindx\n, collection => l_intervalym\n\
  );\n```\n\n然后遍历此集合中的所有值，并将它们简单地相加。\n\n```sql\n-- 遍历所有值并将它们相加\nfor indx in 1 .. l_intervalym.count\n\
  loop\nl_sum_recs( colindx ).sumym :=\nl_sum_recs( colindx ).sumym + l_intervalym(\
  \ indx );\nend loop;\n```\n\n对于另一种时间间隔类型 `INTERVAL DAY TO SECOND`，添加类似的代码。\n\n当处理完所有列后，就该构建要返回的行集了。这仅包含一行，但具有求和后的值。\n\
  \n```sql\n-- 从现在起完全忽略当前的行集，只需\n-- 开始一个新的集合，其中只包含总计\n-- 遍历 put_columns 以填充结果行\nfor\
  \ colindx in 1 .. env.put_columns.count\nloop\ncase env.put_columns( colindx ).type\n\
  -- 当列类型为 INTERVAL YEAR TO MONTH 时\nwhen dbms_tf.type_interval_ym then\n-- 将此值添加到结果行\n\
  l_rowset( colindx ).tab_interval_ym( 1 ) :=\nl_sum_recs( colindx ).sumym;\n-- 当列类型为\
  \ INTERVAL DAY TO SECOND 时\nwhen dbms_tf.type_interval_ds then\n-- 将此值添加到结果行\nl_rowset(colindx\
  \ ).tab_interval_ds( 1 ) :=\nl_sum_recs( colindx ).sumds;\nend case;\nend loop;\n\
  ```\n\n然后返回此行集，而不是所有传入的数据。\n\n```sql\ndbms_tf.put_row_set( l_rowset );\n```\n\n\
  清单 8-5 展示了用于求和间隔的多态表函数的包主体的完整实现。\n\n\n\n### SQL 宏\n\n```\ncreate or replace package\
  \ body suminterval_ptf as\n-- 用于保存不同 INTERVAL 求和结果的记录类型\ntype sum_rec is record(\n\
  sumym interval year to month\n, sumds interval day to second\n);\n-- 每列对应的集合类型\n\
  type sum_recs is table of sum_rec index by pls_integer;\n--\nfunction describe\n\
  (\ntab  in out dbms_tf.table_t\n, cols in     dbms_tf.columns_t default null\n)\
  \ return dbms_tf.describe_t as\nsum_cols dbms_tf.columns_new_t;\nbegin\n-- 检查源表中的每一列\n\
  for indx in tab.column.first .. tab.column.last\nloop\n-- 将每一列的 pass_through 标记为\
  \ false，这样它\n-- 将不再出现在结果中\ntab.column( indx ).pass_through := false;\n-- 首先标记该列不被读取，除非...\n\
  tab.column( indx ).for_read     := false;\nfor colindx in cols.first .. cols.last\n\
  loop\nif tab.column( indx ).description.name = cols( colindx )\nthen\n-- ...请求该列的求和结果\n\
  -- 则读取此列\ntab.column( indx ).for_read := true;\n-- 并添加一个同类型的新列，命名为 SUM_ 列名 _\nsum_cols(\
  \ colindx ) :=\ndbms_tf.column_metadata_t\n( name => 'SUM_' ||\nreplace( tab.column(indx).description.name\n\
  , '\"' ) ||\n'_'\n, type => tab.column( indx ).description.type\n);\nend if;\nend\
  \ loop;\nend loop;\n-- 我们不是返回 NULL，而是返回一个特定的\n-- DESCRIBE_T，用于添加新列\nreturn dbms_tf.describe_t(\
  \ new_columns => sum_cols );\nend;\nprocedure fetch_rows is\n-- 用于保存检索到的行集的变量\n\
  l_rowset dbms_tf.row_set_t;\n-- 用于保存每列求和值的变量\nl_sum_recs sum_recs;\n-- 用于保存环境值的变量\n\
  env dbms_tf.env_t := dbms_tf.get_env();\n-- 用于保存所有 YEAR TO MONTH INTERVAL 的变量\n\
  l_intervalym dbms_tf.tab_interval_ym_t;\n-- 用于保存所有 DAY TO SECOND INTERVAL 的变量\n\
  l_intervalds dbms_tf.tab_interval_ds_t;\nbegin\nfor colindx in 1 .. env.get_columns.count\n\
  loop\ncase env.get_columns( colindx ).type\n-- 当列类型为 INTERVAL YEAR TO MONTH 时\n\
  when dbms_tf.type_interval_ym then\n-- 获取该列的内容\ndbms_tf.get_col( columnid   => colindx\n\
  , collection => l_intervalym\n);\n-- 初始化记录值，否则将某物加到 NULL 上结果仍为 NULL\nl_sum_recs(\
  \ colindx ).sumym := interval '0-0' year\nto month;\n-- 遍历所有值并求和\nfor indx in 1\
  \ .. l_intervalym.count\nloop\nl_sum_recs( colindx ).sumym :=\nl_sum_recs( colindx\
  \ ).sumym + l_intervalym( indx );\nend loop;\n-- 当列类型为 INTERVAL DAY TO SECOND 时\n\
  when dbms_tf.type_interval_ds then\n-- 获取该列的内容\ndbms_tf.get_col( columnid   => colindx\n\
  , collection => l_intervalds\n);\n-- 初始化记录值，否则将某物加到 NULL 上结果仍为 NULL\nl_sum_recs(\
  \ colindx ).sumds := interval '0 0:0:0' day\nto second;\n-- 遍历所有值并求和\nfor indx in\
  \ 1 .. l_intervalds.count\nloop\nl_sum_recs( colindx ).sumds :=\nl_sum_recs( colindx\
  \ ).sumds + l_intervalds( indx );\nend loop;\nelse\n-- 捕获所有其他类型\ndbms_output.put_line(\
  \ q'[此类型（]' ||\nenv.get_columns(colindx).type ||\nq'[）的列暂不支持（尚未实现）。]'\n);\nend case;\n\
  end loop;\n-- 从现在起完全忽略当前的行集，直接\n-- 创建一个只包含总计的新集合\n-- 遍历 put_columns 以填充结果行\nfor\
  \ colindx in 1 .. env.put_columns.count\nloop\ncase env.put_columns( colindx ).type\n\
  -- 当列类型为 INTERVAL YEAR TO MONTH 时\nwhen dbms_tf.type_interval_ym then\n-- 将此值添加到结果行\n\
  l_rowset( colindx ).tab_interval_ym( 1 ) :=\nl_sum_recs( colindx ).sumym;\n-- 当列类型为\
  \ INTERVAL DAY TO SECOND 时\nwhen dbms_tf.type_interval_ds then\n-- 将此值添加到结果行\nl_rowset(\
  \ colindx ).tab_interval_ds( 1 ) :=\nl_sum_recs( colindx ).sumds;\nend case;\nend\
  \ loop;\ndbms_tf.put_row_set( l_rowset );\nend;\nend suminterval_ptf;\n/\n```\n\
  代码清单 8-5 `suminterval_ptf` 包体\n\n现在包已完成，让我们为这个 PTF 编写包装器函数。包装器函数的参数与包中 `describe`\
  \ 函数的参数相同，只是这次使用的是 PL/SQL 类型对应的 SQL 等效类型。同时，也声明了 PTF 的类型。在本例中，它是一个表语义函数，因为需要多行来计算最终结果。\n\
  \n代码清单 8-6 展示了包装器函数。\n\n```\ncreate or replace function suminterval_fnc\n(\ntab\
  \  in table\n,cols in columns default null\n) return table\npipelined table polymorphic\
  \ using suminterval_ptf;\n/\n```\n代码清单 8-6 `suminterval` 包装器函数\n\n#### 聚合时间间隔\n\n\
  假设你有一张一级方程式赛车的单圈时间表。注意，单圈时间以间隔形式记录：`INTERVAL_DAY_TO_SECOND`。表 8-3 列出了部分单圈时间样本。\n\
  \n表 8-3 单圈时间表\n\n| **RACENUMBER** | **LAPNUMBER** | **DRIVERID** | **POSITION**\
  \ | **LAPTIME** |\n| --- | --- | --- | --- | --- |\n| 15 | 1 | max_verstappen |\
  \ 1 | +000000000 00:01:17.665000000 |\n| 15 | 2 | max_verstappen | 1 | +000000000\
  \ 00:01:14.978000000 |\n| 15 | 3 | max_verstappen | 1 | +000000000 00:01:14.813000000\
  \ |\n| 15 | 4 | max_verstappen | 1 | +000000000 00:01:14.917000000 |\n... | 15 |\
  \ 21 | max_verstappen | 1 | +000000000 00:01:18.594000000 |\n| 15 | 22 | max_verstappen\
  \ | 2 | +000000000 00:01:32.574000000 |\n| 15 | 23 | max_verstappen | 2 | +000000000\
  \ 00:01:14.223000000 |\n| 15 | 24 | max_verstappen | 2 | +000000000 00:01:14.257000000\
  \ |\n| 15 | 25 | max_verstappen | 2 | +000000000 00:01:14.607000000 |\n| 15 | 26\
  \ | max_verstappen | 2 | +000000000 00:01:15.352000000 |\n| 15 | 27 | max_verstappen\
  \ | 2 | +000000000 00:01:14.393000000 |\n| 15 | 28 | max_verstappen | 2 | +000000000\
  \ 00:01:14.683000000 |\n| 15 | 29 | max_verstappen | 2 | +000000000 00:01:15.222000000\
  \ |\n| 15 | 30 | max_verstappen | 1 | +000000000 00:01:16.362000000 |\n| 15 | 31\
  \ | max_verstappen | 1 | +000000000 00:01:15.134000000 |\n| 15 | 32 | max_verstappen\
  \ | 1 | +000000000 00:01:14.886000000 |\n...\n\n使用该 PTF 计算马克斯·维斯塔潘的总比赛用时非常简单。\n\n\
  ```\nwith verstappen_zandvoort as\n( select l.laptime\nfrom   laps l\nwhere  l.racenumber\
  \ = 15\nand    l.driverid = 'max_verstappen'\n)\nselect *\nfrom   suminterval_fnc(\
  \ tab  => verstappen_zandvoort\n, cols => columns( laptime ) )\nwhere  rownum =\
  \ 1\n/\nSUM_LAPTIME_\n\n+0 01:30:05\n```\n\n注意\n\n行并未被聚合；添加 `where rownum = 1` 以仅获取一行结果。\n\
  \n### SQL 宏\n\nOracle Database 21c (21.1) 引入了 SQL 宏。它被 backport（向后移植）到 19c (19.10)，但仅支持表类型的\
  \ SQL 宏。通过 SQL 宏，你可以利用 PL/SQL 的全部功能——包括 PTF 中引入的所有功能——在运行时创建一个 SQL 片段，该片段会被包含在 SQL\
  \ 引擎执行的 SQL 语句中。\n\n你可以将在 PTF 中学到的很多知识应用于 SQL 宏。PTF 允许你访问流经处理过程的实际数据，而 SQL 宏仅提供在\
  \ SQL 语句执行前对其进行操纵的权限。你只调用一次 PL/SQL 函数（在 SQL 语句执行前），并返回一个 SQL 片段，该片段会被插入到待执行的文本中。你可以使用\
  \ SQL 宏来集中实现那些之前可能封装在 PL/SQL 函数中的功能，但无需承担所有上下文切换的开销。\n\n函数中不应包含 PL/SQL 逻辑；传入的字符串参数为\
  \ null。所有逻辑都应放入 SQL 表达式中。\n\nSQL 宏有两种类型：标量（scalar）和表（table）。它们有什么区别？\n\n表类型的 SQL\
  \ 宏可用于 SQL 语句的`from`子句。标量类型的 SQL 宏可用于 SQL 语句中其他任何地方，例如`select`列表、`where`、`having`、`group\
  \ by`和`order by`子句。\n\n当你有一个封装在 PL/SQL 函数中的公式用于集中其实现，并且该公式可以用纯 SQL 编写时，那么你就有了一个使用\
  \ SQL 宏的用例。\n\n\n#### 表类型 SQL 宏\n\n表类型 SQL 宏返回一段 SQL 文本，该文本的结果是一组行。参数化视图是表类型 SQL\
  \ 宏的一种用例。视图让你访问有限的数据集。SQL 宏中的参数化视图可以根据你提供的参数，让你访问该数据集的一个子集。\n\n当然，你可以通过利用应用上下文并在视图的\
  \ `where` 子句中使用 `SYS_CONTEXT` 来实现一个伪参数化视图，但这需要更多的组件，并且可能并不总是能明显地看出如何使用该视图。而使用 SQL\
  \ 宏，你可以传递一个参数来限制结果集的输出，这一点是显而易见的。\n\n```\nselect *\nfrom   drivers( nationality\
  \ => 'Dutch' )\n/\n```\n\n注意\n关于如何实现此 SQL 宏，请参见列拆分器用例中的“参数化视图”。\n\n但你也可以操作为每一行返回的数据。只要你能用纯\
  \ SQL 构建它，你就可以为其构建 SQL 宏。\n\n#### 标量类型 SQL 宏\n\n标量类型 SQL 宏返回一段 SQL 文本，该文本的结果是一个标量值。标量类型\
  \ SQL 宏不能有表参数，只能有标量参数。\n\n### 用例\n\nSQL 宏的用例无穷无尽。你可以构建一个列拆分器，就像用 PTF 实现的那个——只是简单得多。你可以构建参数化视图。你可以构建标量宏来捕获你通常在\
  \ PL/SQL 函数中实现的公式。你还可以实现对其他数据库（如 MySQL）中可用功能的支持。\n\n##### 参数化视图\n\n如果你想显示特定比赛中每位车手的总时间、圈数和平均圈速，可以创建一个视图来返回所有比赛的这些值（参见清单\
  \ 8-7）。\n\n```\ncreate or replace view v_averagelaptime as\nselect ltm.raceid  \
  \            as raceid\n, ltm.driverid            as driverid\n, sum( ltm.milliseconds\
  \ ) as totalmilliseconds\n, count( ltm.lap )        as lapcount\n, avg( ltm.milliseconds\
  \ ) as averagemilliseconds\nfrom   f1data.laptimes ltm\ngroup  by ltm.raceid\n,\
  \ ltm.driverid\n/\n清单 8-7\nv_averagelaptime 视图\n```\n\n在你的查询中，必须通过添加一个谓词来限制返回的结果。\n\
  \n```\nselect *\nfrom   v_averagelaptime alp\nwhere  alp.raceid = 1093 -- 2022 年美国大奖赛\n\
  and  alp.driverid = 830 -- 马克斯·维斯塔潘\n/\nRACEID DRIVERID TOTALMILLISECONDS LAPCOUNT\
  \ AVERAGEMILLISECONDS\n------ -------- ----------------- -------- -------------------\n\
  1093      830           6131687       56    109494,410714286\n\nselect *\nfrom \
  \  v_averagelaptime alp\nwhere  alp.raceid = 1093 -- 2022 年美国大奖赛\nand  alp.driverid\
  \ = 1  -- 刘易斯·汉密尔顿\n/\nRACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS\n\
  ------ -------- ----------------- -------- -------------------\n1093        1  \
  \         6136710       56    109584,107142857\n```\n\n如果你将此视图封装在一个 SQL 宏中，它就变成了一个参数化视图。\n\
  \n```\ncreate or replace\nfunction averagelaptime( raceid_in   in number\n, driverid_in\
  \ in number )\nreturn varchar2 sql_macro( table ) is\nbegin\nreturn q'[\nselect\
  \ ltm.raceid              as raceid\n, ltm.driverid            as driverid\n, sum(\
  \ ltm.milliseconds ) as totalmilliseconds\n, count( ltm.lap )        as lapcount\n\
  , avg( ltm.milliseconds ) as averagemilliseconds\nfrom   f1data.laptimes ltm\nwhere\
  \  ltm.raceid   = raceid_in\nand    ltm.driverid = driverid_in\ngroup  by ltm.raceid\n\
  , ltm.driverid\n]';\nend;\n/\n清单 8-8\naveragelaptime SQL 宏\n```\n\n然后你的查询就变得更简单了。\n\
  \n```\nselect *\nfrom   averagelaptime( raceid_in   => 1093\n, driverid_in => 830\
  \ )\n/\nRACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS\n------ --------\
  \ ----------------- -------- -------------------\n1093      830           6131687\
  \       56    109494,410714286\n\nselect *\nfrom   averagelaptime( raceid_in   =>\
  \ 1093\n, driverid_in => 1 )\n/\nRACEID DRIVERID TOTALMILLISECONDS LAPCOUNT AVERAGEMILLISECONDS\n\
  ------ -------- ----------------- -------- -------------------\n1093        1  \
  \         6136710       56    109584,107142857\n```\n\n#### 列拆分器（表）\n\n你已经看到了使用\
  \ PTF 将一列拆分为多列的示例。让我们重新审视该功能，但这次使用 SQL 宏。\n\n对于这个函数，你需要一个表参数来指定要处理的表（或视图或结果集），以及一个参数来告诉宏在输出中创建哪些列。\n\
  \n```\ncreate or replace function split\n(\ntable_in   in dbms_tf.table_t\n, columns_in\
  \ in dbms_tf.columns_t default null\n)\n```\n\n该函数返回一个 `VARCHAR2`，即一个 `table` 类型的\
  \ `sql_macro`。\n\n```\nreturn varchar2 sql_macro( table ) is\n```\n\n在宏中，构建 SQL\
  \ 文本以将列拆分为新列。\n\n```\nfor cols in columns_in.first .. columns_in.last\nloop\nl_split\
  \ := l_split || q'[, trim( ';]' ||\nq'[' from regexp_substr( ]' ||\ntable_in.column(\
  \ 1 ).description.name ||\nq'[, '{0,1}', 1, ]' ||\ncols || q'[ ) ) ]' ||\ncolumns_in(\
  \ cols );\nend loop;\n```\n\n这与在 PTF 示例中使用的代码大致相同。\n\n因为每个新列都有一个前导空格，最终你会得到一个列列表，你必须去除前导逗号（`,`）才能使其成为有效的\
  \ SQL 文本。\n\n```\nl_split := trim( leading ',' from l_split );\n```\n\n现在让我们构建完整的\
  \ SQL 语句，该语句将生成你可以从中选择的表。\n\n```\nl_sql   := q'[select t.*, ]' ||\nl_split ||\n\
  q'[ from table_in t]';\n```\n\n在上面的语句中，`table_in` 被 `table_in` 参数的值所替换。\n\n清单 8-9\
  \ 是完整的脚本。\n\n```\ncreate or replace function split\n(\ntable_in   in dbms_tf.table_t\n\
  , columns_in in dbms_tf.columns_t default null\n)\nreturn varchar2 sql_macro( table\
  \ ) is\nl_sql         varchar2( 32767 );\nl_split       varchar2( 32767 );\nbegin\n\
  for cols in columns_in.first .. columns_in.last\nloop\nl_split := l_split ||\nq'[,\
  \ trim( ';' from regexp_substr( ]'||\ntable_in.column( 1 ).description.name ||\n\
  q'[, '[^;]*;{0,1}', 1, ]' ||\ncols || q'[ ) ) ]' ||\ncolumns_in( cols );\nend loop;\n\
  l_split := trim( leading ',' from l_split );\nl_sql   := q'[select t.*, ]' ||\n\
  l_split ||\nq'[ from table_in t]';\ndbms_tf.trace( l_sql );\nreturn l_sql;\nend;\n\
  /\n清单 8-9\n拆分 SQL 宏\n```\n\n##### 使用 SQL 宏拆分列\n\n使用与拆分函数的 PTF 示例中相同的表，你可以使用类似的 SQL\
  \ 语句将这些分隔值转换为单独的列。\n\n```\nselect permanentNumber\n, code\n, givenName\n, familyName\n\
  , dateOfBirth\n, nationality\nfrom split( f1drivers\n, columns( permanentNumber\n\
  , code\n, givenName\n, familyName\n, dateOfBirth\n, nationality\n)\n)\n/\n```\n\n\
  你会得到与使用 PTF 相同的结果。如你所见，这种方法涉及的代码量要少得多。\n\n\n##### 参数化视图\n\n您不能在 SQL 宏中嵌套 SQL 宏，但可以基于此查询构建视图，如`Listing\
  \ 8-10`所示。\n\n```\ncreate or replace view v_f1drivers as\nselect permanentNumber\n\
  , code\n, givenName\n, familyName\n, dateOfBirth\n, nationality\nfrom split( table_in\
  \   => f1drivers\n, columns_in => columns( permanentNumber\n, code\n, givenName\n\
  , familyName\n, dateOfBirth\n, nationality\n)\n)\n/\nListing 8-10\nview v_f1drivers\n\
  ```\n\n您必须通过添加谓词来限制查询中返回的结果。\n\n```\nselect d.givenname\n, d.familyname\n, d.nationality\n\
  from   v_f1drivers d\nwhere  d.nationality like 'British'\n/\nGIVENNAME       FAMILYNAME\
  \      NATIONALITY\n--------------- --------------- ---------------\nLewis     \
  \      Hamilton        British\nLando           Norris          British\nGeorge\
  \          Russell         British\nselect d.givenname\n, d.familyname\n, d.nationality\n\
  from   v_f1drivers d\nwhere  d.givenname like 'M%'\n/\nGIVENNAME       FAMILYNAME\
  \      NATIONALITY\n--------------- --------------- ---------------\nMax       \
  \      Verstappen      Dutch\n```\n\n如果将此视图封装在 SQL 宏中，就可以使其参数化。您可以使用多个可选参数，如`Listing\
  \ 8-11`所示。\n\n```\ncreate or replace\nfunction drivers( code            in varchar2\
  \ default null\n, givenName       in varchar2 default null\n, familyName      in\
  \ varchar2 default null\n, nationality     in varchar2 default null\n) return varchar2\
  \ sql_macro( table )\nis\nbegin\nreturn q'[\nselect f1d.permanentnumber\n, f1d.code\n\
  , f1d.givenname\n, f1d.familyname\n, f1d.dateofbirth\n, f1d.nationality\nfrom  \
  \ v_f1drivers                 f1d\nwhere  (   drivers.code            is null\n\
  or f1d.code                like drivers.code)\nand    (   drivers.givenname    \
  \   is null\nor f1d.givenname           like drivers.givenname)\nand    (   drivers.familyname\
  \      is null\nor f1d.familyname          like drivers.familyname)\nand    (  \
  \ drivers.nationality     is null\nor f1d.nationality         like drivers.nationality)\n\
  ]';\nend;\n/\nListing 8-11\ndrivers SQL Macro\n```\n\n现在您可以使用参数来查询该视图。\n\n```\n\
  select d.givenname\n, d.familyname\n, d.nationality\nfrom   drivers( nationality\
  \ => 'British' ) d\n/\nGIVENNAME       FAMILYNAME      NATIONALITY\n---------------\
  \ --------------- ---------------\nLewis           Hamilton        British\nLando\
  \           Norris          British\nGeorge          Russell         British\nselect\
  \ d.givenname\n, d.familyname\n, d.nationality\nfrom   drivers( givenname => 'M%'\
  \ ) d\n/\nGIVENNAME       FAMILYNAME      NATIONALITY\n--------------- ---------------\
  \ ---------------\nMax             Verstappen      Dutch\n```\n\n#### 模仿其他数据库（标量函数）\n\
  \n如果您的代码在其他数据库（例如 MySQL）中有效，并且您正在迁移到 Oracle 数据库，您可能会遇到 SQL 语句中使用的某些函数在 Oracle 数据库中不可用的问题。您可以构建一组\
  \ SQL 宏来确保语句正常工作，并执行正确的 Oracle SQL。\n\n##### 日期函数\n\n表`Table 8-4`描述了针对几个 MySQL 日期函数的\
  \ SQL 宏。\n\n**Table 8-4**\n**MySQL 日期函数**\n\n| 函数 | 描述 |\n| --- | --- |\n| CURDATE()\
  \ | 获取当前日期。 |\n| NOW() | 返回语句执行的日期和时间。 |\n| DAY() | 返回指定日期的天数。 |\n| DAYNAME() |\
  \ 返回指定日期的星期名称。 |\n| DAYOFWEEK() | 返回指定日期的星期索引。 |\n| MONTH() | 返回指定日期的月份编号。 |\n|\
  \ WEEK() | 返回指定日期的周数。 |\n| WEEKDAY() | 返回指定日期的星期索引。 |\n| YEAR() | 返回指定日期的年份。 |\n\
  \n`curdate()`函数返回不带时间组件的当前日期。Oracle 日期始终包含时间组件，因此我们返回`sysdate`的不带时间组件的字符串表示。\n\n\
  ```\ncreate or replace function curdate\n( format_in in varchar2 default 'DD/MM/YYYY'\
  \ )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn 'to_char( sysdate, format_in\
  \ )';\nend;\n/\nListing 8-12\ncurdate SQL Macro\n```\n\n`now()`函数返回包含时间组件的当前日期。这与`sysdate`相同。\n\
  \n```\ncreate or replace function now\nreturn varchar2 sql_macro( scalar ) is\n\
  begin\nreturn 'sysdate';\nend;\n/\nListing 8-13\nnow SQL Macro\n```\n\n`day()`函数返回指定日期的月份中的天数。这可以通过`extract(\
  \ day from date_in )`实现。\n\n```\ncreate or replace function day( date_in in date\
  \ )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn q'[extract( day from\
  \ date_in )]';\nend;\n/\nListing 8-14\nday SQL Macro\n```\n\n`dayname()`函数返回指定日期的星期名称。这可以通过`to_char(\
  \ date_in, 'DAY' )`实现。\n\n```\ncreate or replace function dayname( date_in in date\
  \ )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn q'[to_char( date_in,\
  \ 'DAY' )]';\nend;\n/\nListing 8-15\ndayname SQL Macro\n```\n\n`dayofweek()`函数返回指定日期是星期几（1-7）。这可以通过`to_char(\
  \ date_in, 'D' )`实现。\n\n```\ncreate or replace function dayofweek( date_in in date\
  \ )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn q'[to_char( date_in,\
  \ 'D' )]';\nend;\n/\nListing 8-16\ndayofweek SQL Macro\n```\n\n`month()`函数返回指定日期的月份编号。这可以通过`extract(\
  \ month from date_in )`实现。\n\n```\ncreate or replace function month( date_in in\
  \ date )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn q'[extract( month\
  \ from date_in )]';\nend;\n/\nListing 8-17\nmonth SQL Macro\n```\n\n`week()`函数返回指定日期的周数。这可以通过`to_char(\
  \ date_in, 'IW' )`实现。\n\n```\ncreate or replace function week( date_in in date )\n\
  return varchar2 sql_macro( scalar ) is\nbegin\nreturn q'[to_char( date_in, 'IW'\
  \ )]';\nend;\n/\nListing 8-18\nweek SQL Macro\n```\n\n`weekday()`函数返回指定日期是星期几（1-7）。这与`dayofweek()`函数相同。与其返回另一个字符串，您也可以调用另一个\
  \ SQL 宏。由于它返回一个字符串，您只需调用不同的函数。\n\n```\ncreate or replace function weekday( date_in\
  \ in date )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn dayofweek( date_in\
  \ );\nend;\n/\nListing 8-19\nweekday SQL Macro\n```\n\n`year()`函数返回指定日期的年份。这可以通过`extract(\
  \ year from date_in )`实现。\n\n```\ncreate or replace function year( date_in in date\
  \ )\nreturn varchar2 sql_macro( scalar ) is\nbegin\nreturn q'[extract( year from\
  \ date_in )]';\nend;\n/\nListing 8-20\nyear SQL Macro\n```\n\n\n\n# 8. SQL 宏\n\n\
  ##### 字符串函数\n\nMySQL 数据库提供了 `left` 和 `right` 字符串操作函数。这些函数在 Oracle SQL 中并不直接可用。但你可以使用\
  \ `substr` 功能来实现它们，并将其封装在 SQL 宏中，这样就能将你的 MySQL 查询直接移植到 Oracle 数据库（参见表 8-5）。\n\n\
  表 8-5\n\nMySQL 字符串函数\n\n| 函数 | 结果 |\n| --- | --- |\n| left ('Oracle Database', 6)\
  \ | 'Oracle' |\n| left ('Oracle Database', 0) | '' |\n| left ('Oracle Database',\
  \ -6) | '' |\n| right ('Oracle Database', 8) | 'Database' |\n| right ('Oracle Database',\
  \ 0) | '' |\n| right ('Oracle Database', -8) | '' |\n\n`left` 函数很容易实现。它是一个子字符串，从位置\
  \ 1 开始，然后获取指定数量的字符。\n\n```sql\ncreate or replace function left\n(\nstring_in in\
  \ varchar2\n, left_in   in number\n) return varchar2 sql_macro( scalar ) is\nl_sql\
  \ varchar2( 64 );\nbegin\nl_sql := 'substr( string_in, 1, left_in )';\nreturn l_sql;\n\
  end left;\n/\n```\n\n代码清单 8-21\n`left` SQL 宏\n\n`right` 函数稍微复杂一些。你必须自己处理好边界情况。如果请求的字符数为\
  \ 0 或负数，函数应返回 NULL 值。如果请求的字符数大于可用字符数，则返回整个字符串。否则，从右侧开始返回指定数量的字符。\n\n```sql\ncreate\
  \ or replace function right\n(\nstring_in in varchar2\n, right_in  in number\n)\
  \ return varchar2 sql_macro( scalar ) is\nl_sql varchar2( 32767 );\nbegin\nl_sql\
  \ := '\ncase\nwhen right_in <= 0 then null\nwhen right_in > length( string_in )\
  \ then  string_in\nelse substr( string_in, -right_in )\nend\n';\nreturn l_sql;\n\
  end right;\n/\n```\n\n代码清单 8-22\nRight SQL 宏\n\n### expand_sql_text\n\n`dbms_utility.expand_sql_text`\
  \ 可以让你检查实际执行的是哪条语句。假设你有一个简单的 SQL 宏。\n\n```sql\ncreate or replace\nfunction total_laptime(\
  \ raceid_in   in number\n, driverid_in in number )\nreturn varchar2 sql_macro( table\
  \ ) is\nbegin\nreturn q'[\nselect ltm.raceid              as raceid\n, ltm.driverid\
  \            as driverid\n, sum( ltm.milliseconds ) as totalmilliseconds\nfrom \
  \  f1data.laptimes ltm\nwhere  ltm.raceid   = raceid_in\nand    ltm.driverid = driverid_in\n\
  group  by ltm.raceid\n, ltm.driverid\norder  by ltm.raceid\n, ltm.driverid\n]';\n\
  end;\n/\n```\n\n代码清单 8-23\n`total_laptime` SQL 宏\n\n以下是你执行的语句。\n\n```sql\nselect\
  \ * from total_laptime(1093, 830)\n```\n\n如果你将这个语句作为参数传递给 `dbms_utility.expand_sql_text`\
  \ 过程，如下所示。\n\n```sql\ndeclare\noutput_text clob;\nbegin\ndbms_utility.expand_sql_text(\n\
  input_sql_text  => q'[select * from total_laptime(1093, 830)\n]'\n, output_sql_text\
  \ => output_text\n);\ndbms_output.put_line( output_text );\nend;\n/\n```\n\n你会得到实际执行的语句（为了可读性进行了格式化）。\n\
  \n```sql\nselect \"A1\".\"RACEID\"            \"RACEID\"\n, \"A1\".\"DRIVERID\"\
  \          \"DRIVERID\"\n, \"A1\".\"TOTALMILLISECONDS\" \"TOTALMILLISECONDS\"\n\
  from   (select \"A2\".\"RACEID\"            \"RACEID\"\n, \"A2\".\"DRIVERID\"  \
  \        \"DRIVERID\"\n, \"A2\".\"TOTALMILLISECONDS\" \"TOTALMILLISECONDS\"\nfrom\
  \   (select \"A3\".\"RACEID\" \"RACEID\"\n, \"A3\".\"DRIVERID\" \"DRIVERID\"\n,\
  \ sum(\"A3\".\"MILLISECONDS\")\n\"TOTALMILLISECONDS\"\nfrom   \"F1DATA\".\"LAPTIMES\"\
  \ \"A3\"\nwhere  \"A3\".\"RACEID\"   = 1093\nand    \"A3\".\"DRIVERID\" = 830\n\
  group  by \"A3\".\"RACEID\"\n, \"A3\".\"DRIVERID\"\norder  by \"A3\".\"RACEID\"\n\
  , \"A3\".\"DRIVERID\") \"A2\") \"A1\"\n```\n\n### 本章小结\n\n本章讨论了多态表函数以及如何构建和使用它们。你还了解了\
  \ SQL 宏，它有时能提供比 PTF 更简单的解决方案。那么，为什么你还应该学习多态表函数呢？嗯，有些问题无法用纯 SQL 解决，但可以使用 PL/SQL 来解决。SQL\
  \ 宏总是返回一段 SQL 代码片段。PL/SQL 被用来构建这个代码片段，但其使用方式是纯 SQL 的。PTF 允许你访问查询中的实际值，因此你可以操作从查询中输出的内容。你可以使用\
  \ SQL 宏在执行前操作语句，但这仍然是在创建纯 SQL。\n\n## 9. 子查询因式分解，WITH 子句详解\n\n子查询因式分解也称为公共表表达式（CTE）。通常被称为\
  \ `with` 子句。CTE 是一个命名的临时结果集，它存在于单条语句的作用域内，并且可以在该语句的后面部分被引用，可能被多次引用。\n\n你可以在查询的 `from`\
  \ 子句中指定一个子查询，这称为内联视图；但如果你想多次连接同一个查询，你就必须多次重复该子查询。而且如果那个内联视图发生了变化，你就不得不在多处进行相同的更改。使用子查询因式分解后，情况就不同了。你只需定义一次子查询，然后通过名称引用它，这遵循了“一次定义，多次重用”的模式。\n\
  \n\n\n### 摩纳哥领奖台\n\n数据库中包含了自 1950 年以来在摩纳哥举行的所有比赛结果。我们的目标是检索摩纳哥赛道的前三名车手，并将他们以不同列的形式漂亮地展示在领奖台上。这个例子是人为设计的，虽然可以简化，但被用来演示子查询因子化子句。子查询因子化几乎让编写\
  \ SQL 查询有了过程化的感觉。\n\n第一步是获取摩纳哥赛道的前三名车手。这可以通过连接 `CIRCUITS`、`RACES` 和 `RESULTS` 表来完成。以下查询展示了一个名为\
  \ `monaco` 的子查询。这个命名子查询在 `WITH` 子句之后的主查询中被使用。\n\n```sql\nwith monaco as (\nselect\
  \ rsl.driverid\n, rsl.position\n, rcs.year\nfrom   f1data.circuits cct\njoin   f1data.races\
  \ rcs\non   cct.circuitid = rcs.circuitid\njoin   f1data.results rsl\non   rcs.raceid\
  \ = rsl.raceid\nwhere  cct.circuitref = 'monaco'\nand    rsl.position >\n)\n```\n\
  \n这给出了一个包含车手 ID、他们的名次以及他们登上领奖台的年份的列表。由于 `driverid` 没有意义，添加车手的名字会更有帮助。在 `monaco`\
  \ 子查询的最后一个括号之后，添加了以下命名子查询以提供格式良好的车手姓名。\n\n```sql\n, motorists as (\nselect drv.driverid\n\
  , drv.forename\n|| ' ' ||\ndrv.surname as driver\nfrom   f1data.drivers drv\n)\n\
  ```\n\n现在可以修改主查询以包含车手姓名。\n\n```sql\nselect year\n, position\n, driver\nfrom   monaco\
  \ mon\njoin   motorists mtt\non   mon.driverid = mtt.driverid\n/\nYEAR   POSITION\
  \ DRIVER\n------ ---------- -------------------------\n1950          3 Louis Chiron\n\
  1950          2 Alberto Ascari\n1950          1 Juan Fangio\n1955          1 Maurice\
  \ Trintignant\n1955          3 Cesare Perdisa\n1955          3 Jean Behra\n1955\
  \          2 Eugenio Castellotti\n1956          2 Juan Fangio\n1956          3 Jean\
  \ Behra\n1956          2 Peter Collins\n1956          1 Stirling Moss\n1957    \
  \      2 Tony Brooks\n1957          1 Juan Fangio\n1957          3 Masten Gregory\n\
  >\n```\n\n结果集包括年份、领奖台名次和车手全名。这个查询被添加到子查询因子化子句中，并命名为 `monaco_podiums`。\n\n```sql\n\
  monaco_podiums as (\nselect mon.year\n, mon.position\n, mtt.driver\nfrom   monaco\
  \ mon\njoin   motorists mtt\non   mon.driverid = mtt.driverid\n)\n```\n\n`PIVOT`\
  \ 子句可以将第一名、第二名和第三名的领奖台位置显示在不同的列中。这完成了任务。\n\n```sql\nselect year\n, first\n, second\n\
  , third\nfrom monaco_podiums\npivot (\nmin(driver)\nfor position in ( 1 as first\n\
  , 2 as second\n, 3 as third\n)\n)\n/\n```\n\n以下是包含所有子查询因子化的完整查询。\n\n```sql\nwith\
  \ monaco as (\nselect rsl.driverid\n, rsl.position\n, rcs.year\nfrom   f1data.circuits\
  \ cct\njoin   f1data.races rcs\non   cct.circuitid = rcs.circuitid\njoin   f1data.results\
  \ rsl\non   rcs.raceid = rsl.raceid\nwhere  cct.circuitref = 'monaco'\nand    rsl.position\
  \ >\nListing 9-1\n检索摩纳哥前三名\n```\n\n> 注意\n>\n> 这些结果并不反映现实。1955 年，有两位并列第三名：Jean Behra\
  \ 和 Cesare Perdisa。由于名次在一年内不是唯一的，`MIN` 函数按名字的字母顺序解决了这个问题。1956 年也是如此，当时有两位并列第二名：Peter\
  \ Collins 和 Juan Fangio。\n\n### 在 WITH 子句中使用函数\n\n从 Oracle Database 12c 开始，可以在 `WITH`\
  \ 子句中构建 PL/SQL 函数。从 SQL 语句调用 PL/SQL 函数由于上下文切换而代价高昂，应尽可能避免。当一个函数被添加到子查询因子化子句时，该函数会在\
  \ SQL 引擎中编译。这不完全准确，但可以这样理解，从而消除了昂贵的上下文切换。\n\n在下面的例子中，在 `WITH` 子句中构建了两个函数。一个函数用于将车手和制造商的名字格式化为单个字符串，另一个用于将前三名车手格式化为单个列。\n\
  \n第一个函数名为 `fullname`，接受三个参数。\n\n```sql\nfunction fullname( forename_in    in varchar2\n\
  , surname_in     in varchar2\n, constructor_in in varchar2 )\nreturn varchar2\n\
  is\nbegin\nreturn forename_in\n|| ' ' || surname_in\n|| ' (' || constructor_in ||\
  \ ')';\nend fullname;\n```\n\n第二个函数名为 `formattop3`，也接受三个参数。\n\n```sql\nfunction\
  \ formattop3( pos1 in varchar2\n, pos2 in varchar2\n, pos3 in varchar2 )\nreturn\
  \ varchar2\nis\nbegin\nreturn '1) ' || pos1 || chr(10)\n|| '2) ' || pos2 || chr(10)\n\
  || '3) ' || pos3 || chr(10);\nend formattop3;\n```\n\n函数必须在 `WITH` 子句的开头声明，也就是在任何因子化子句之前。与子查询不同，函数之间不用逗号分隔。第一个命名查询之前也没有逗号。另一个特殊之处在于，在\
  \ SQL 语句中使用的函数不能使用命名表示法来指定哪个参数被赋予哪个值。\n\n由于也希望列出制造商，因此清单 9-1 中的命名子查询应替换为以下内容。\n\n\
  ```sql\n, motorists as (\nselect drv.driverid\n, fullname ( drv.forename\n, drv.surname\n\
  , ctr.name\n) as driver\nfrom   f1data.drivers      drv\njoin   f1data.results \
  \     rsl\non   drv.driverid = rsl.driverid\njoin   f1data.constructors ctr\non\
  \   rsl.constructorid = ctr.constructorid\n)\n```\n\n这通过调用 `fullname` 函数，按要求格式化了车手姓名和制造商。\n\
  \n清单 9-1 中的透视查询被包装到名为 `monaco_pivot` 的子查询中。该查询在最终查询中使用，如清单 9-2 所示。（仅显示了截至 1957 年的结果。）\n\
  \n\n\n### 使用 PL/SQL 与递归子查询因子化\n\n```\nwith\nfunction fullname( forename_in    in\
  \ varchar2\n, surname_in     in varchar2\n, constructor_in in varchar2 )\nreturn\
  \ varchar2\nis\nbegin\nreturn forename_in\n|| ' ' || surname_in\n|| ' (' || constructor_in\
  \ || ')';\nend fullname;\nfunction formattop3( pos1 in varchar2\n, pos2 in varchar2\n\
  , pos3 in varchar2 )\nreturn varchar2\nis\nbegin\nreturn '1) ' || pos1 || chr(10)\n\
  || '2) ' || pos2 || chr(10)\n|| '3) ' || pos3 || chr(10);\nend formattop3;\nmonaco\
  \ as (\nselect rsl.driverid\n, rsl.position\n, rcs.year\nfrom   f1data.circuits\
  \ cct\njoin   f1data.races rcs\non   cct.circuitid = rcs.circuitid\njoin   f1data.results\
  \ rsl\non   rcs.raceid = rsl.raceid\nwhere  cct.circuitref = 'monaco'\nand    rsl.position\
  \ <= 3\n)\n, motorists as (\nselect drv.driverid\n, fullname ( drv.forename\n, drv.surname\n\
  , ctr.name\n) as driver\nfrom   f1data.drivers      drv\njoin   f1data.results \
  \     rsl\non   drv.driverid = rsl.driverid\njoin   f1data.constructors ctr\non\
  \   rsl.constructorid = ctr.constructorid\n)\n, monaco_podiums as (\nselect mon.year\n\
  , mon.position\n, mtt.driver\nfrom   monaco mon\njoin   motorists mtt\non   mon.driverid\
  \ = mtt.driverid\n)\n, monaco_pivot as (\nselect year\n, first\n, second\n, third\n\
  from   monaco_podiums\npivot  (\nmin(driver)\nfor position in ( 1 as first\n, 2\
  \ as second\n, 3 as third\n)\n)\n)\nselect year\n, formattop3 ( first\n, second\n\
  , third\n) as formatted\nfrom   monaco_pivot\nwhere  year < 1958\norder by year\n\
  /\nYEAR FORMATTED\n------ ----------------------------------------\n1950 1) Juan\
  \ Fangio (Alfa Romeo)\n2) Alberto Ascari (Ferrari)\n3) Louis Chiron (Lancia)\n1955\
  \ 1) Maurice Trintignant (Aston Martin)\n2) Eugenio Castellotti (Ferrari)\n3) Cesare\
  \ Perdisa (Ferrari)\n1956 1) Stirling Moss (BRM)\n2) Juan Fangio (Alfa Romeo)\n\
  3) Jean Behra (BRM)\n1957 1) Juan Fangio (Alfa Romeo)\n2) Tony Brooks (BRM)\n3)\
  \ Masten Gregory (BRM)\n列表 9-2\n获取格式化的摩纳哥前三名\n```\n\n也可以在 `with` 子句中创建过程，但无法从 SQL\
  \ 中调用它们，因为过程没有返回值。在因子化查询中使用 PL/SQL 的优势是上下文切换的开销远低于调用 PL/SQL 函数。而在查询中使用 PL/SQL 的缺点是代码不可复用。第\
  \ 10 章提供了更多关于从 SQL 调用 PL/SQL 的信息。如果你要在不同的查询中使用相同的代码，必须在那里复制一份代码。另一种选择是使用 SQL 宏（参见第\
  \ 8 章）。\n\n### 递归子查询因子化\n\n传统上，数据模型中的递归关系是指存在指向同一表主键的外键关系。典型的例子是在 SCOTT 方案中，特别是\
  \ `EMP` 表。该表中存储了员工以及经理。`mgr` 列（作为外键）引用同一表的主键 `empno`，从而在两者之间创建了层级关系。\n\n本书使用的数据模型中不存在这种关系。以下示例探讨了\
  \ `CONSTRUCTORS`（车队）与 `DRIVERS`（车手）之间的层级关系。\n\n第一步是创建一个仅涉及三列的车队和车手列表。\n\n*   一个伪“主键”，由字母\
  \ `'c'` 和真实的 `constructorid` 组成（当是车手记录时，则是 `'d'` 和 `driverid`）\n*   车队或车手的名称\n*\
  \   指向该“主键”的“外键”\n\n这是在一个命名的子查询中完成的。\n\n```\nwith constructor_drivers as (\nselect\
  \ 'c'||to_char (ctr.constructorid) as pk\n, ctr.name\n, null as fk\nfrom   f1data.constructors\
  \ ctr\nwhere  ctr.constructorref in ('ferrari', 'mercedes')\nunion all\nselect distinct\n\
  'd'||to_char (drv.driverid)\n, drv.surname as driver\n, 'c'||to_char (rst.constructorid)\
  \ ctr_id\nfrom   f1data.results rst\njoin   f1data.drivers drv\non   drv.driverid\
  \ = rst.driverid)\nselect *\nfrom constructor_drivers\n/\nPK         NAME      \
  \                     FK\n---------- ------------------------------ ----------\n\
  c6         Ferrari\nc131       Mercedes\nd17        Webber                     \
  \    c9\nd14        Coulthard                      c9\nd13        Massa        \
  \                  c6\nd8         Räikkönen                      c6\nd847      \
  \ Russell                        c131\nd1         Hamilton                     \
  \  c131\nd844       Leclerc                        c6\nd832       Sainz        \
  \                  c6\nd20        Vettel                         c6\nd608      \
  \ Castellotti                    c6\nd802       Serafini                       c6\n\
  d791       Biondetti                      c6\n>\n```\n\n从输出中可以看到，第一列 (`PK`) 是字母“c”（代表\
  \ constructor）或“d”（代表 driver）与底层表真实主键的组合。`name` 列显示车队*或*车手的名称。最后一列 (`FK`) 对于车手记录，显示他曾经或正在为之效力的车队。当记录是车队时，`FK`\
  \ 列为空。\n\n将底层表的主键与一个字母组合的原因是为了防止父子关系之间出现歧义。`FK` 列值为 6 可能指向车队 Ferrari，也可能指向车手 Kazuki\
  \ Nakajima。\n\n采用这种格式的数据，递归关系可以很容易地发现：`FK` 列引用结果集中的 `PK` 列。\n\n递归子查询因子化子句*必须*包含两个通过\
  \ `union all` 集合运算符组合的查询块。查询的第一个块定义了锚记录，表示递归的开始。该结果集的锚点可以按如下方式查询。\n\n```\nselect\
  \ pk\n, name\n, fk\nfrom   constructor_drivers\nwhere  fk is null\n```\n\n此锚点查询*仅*选择那些包含车队的记录。对于它们，`FK`\
  \ 列始终为空。\n\n下一个块，即递归成员，选择与刚刚选定的锚点相关的子记录，并且必须引用一次查询名称。\n\n```\nselect cdv.pk\n, cdv.name\n\
  , cdv.fk\nfrom   constructor_drivers cdv\njoin   hierarchy hier\non   hier.pk =\
  \ cdv.fk\n```\n\n前面查询中的表“hierarchy”就是命名查询本身，指的是自身。查询块中的这种自引用使其成为一个递归子查询。请注意，名为 `constructor_drivers`\
  \ 的查询也有一个 `union all`，但它没有自引用，因此不是递归的。\n\n\n\n### 递归子查询示例\n\n列别名（在下例中为 `hierarchy`）后括号内列出的是必需的。以下是完整的递归子查询。\n\
  \n```\nhierarchy (pk, name, fk)\nas (\nselect pk\n, name\n, fk\nfrom   constructor_drivers\n\
  where  fk is null\nunion  all\nselect cdv.pk\n, cdv.name\n, cdv.fk\nfrom   constructor_drivers\
  \ cdv\njoin   hierarchy hier\non   hier.pk = cdv.fk\n)\n```\n\n在主查询中，“`hierarchy`”显示了\
  \ `CONSTRUCTORS` 和 `DRIVERS` 之间的层级关系。将所有部分组合起来，得到以下查询。\n\n```\nwith constructor_drivers\
  \ as\n(\nselect 'c'||to_char (ctr.constructorid) as pk\n, ctr.name\n, null as fk\n\
  from   f1data.constructors ctr\nwhere  ctr.constructorref in ('ferrari', 'mercedes')\n\
  union  all\nselect distinct\n'd'||to_char (drv.driverid)\n, drv.surname as driver\n\
  , 'c'||to_char (rst.constructorid) ctr_id\nfrom   f1data.results rst\njoin   f1data.drivers\
  \ drv\non   drv.driverid = rst.driverid\n)\n, hierarchy (pk, name, fk)\nas (\nselect\
  \ pk\n, name\n, fk\nfrom   constructor_drivers\nwhere  fk is null\nunion  all\n\
  select cdv.pk\n, cdv.name\n, cdv.fk\nfrom   constructor_drivers cdv\njoin   hierarchy\
  \ hier\non   hier.pk = cdv.fk\n)\nselect pk\n, name\n, fk\nfrom   hierarchy\n/\n\
  PK         NAME                           FK\n---------- ------------------------------\
  \ ----------\nc6         Ferrari\nc131       Mercedes\nd3         Rosberg      \
  \                  c131\nd579       Fangio                         c131\nd475  \
  \     Moss                           c131\nd609       Simon                    \
  \      c131\nd691       Lang                           c131\nd478       Herrmann\
  \                       c131\nd30        Schumacher                     c131\nd641\
  \       Taruffi                        c131\nd1         Hamilton               \
  \        c131\nd648       Kling                          c131\nd822       Bottas\
  \                         c131\nd847       Russell                        c131\n\
  d386       Ginther                        c6\nd435       Mairesse              \
  \         c6\nd577       Musso                          c6\nd607       Perdisa \
  \                       c6\nd387       Parkes                         c6\nd483 \
  \      Scarlatti                      c6\n代码清单 9-3\n构造者与车手的层级列表\n```\n\n结果看起来与之前显示的非常相似。最大的区别是并未列出所有车手，仅列出了法拉利或梅赛德斯的车手，并且执行了树遍历。\n\
  \n#### 模拟内置递归函数\n\n对于传统的递归查询 (`start with ... connect by`)，递归子查询因子分解中不提供某些内置函数，但这些函数可以轻松模拟。本节仅显示名为\
  \ `hierarchy` 的查询。名为 `constructor_drivers` 的查询定义如下。\n\n```\nwith constructor_drivers\
  \ as\n(\nselect 'c'||to_char (ctr.constructorid) as pk\n, ctr.name\n, null as fk\n\
  from   f1data.constructors ctr\nwhere  ctr.constructorref in ('ferrari', 'mercedes')\n\
  union  all\nselect distinct\n'd'||to_char (drv.driverid)\n, drv.surname as driver\n\
  , 'c'||to_char (rst.constructorid) ctr_id\nfrom   f1data.results rst\njoin   f1data.drivers\
  \ drv\non   drv.driverid = rst.driverid\nunion  all\nselect 'champ'||to_char (min\
  \ (dsg.driverstandingsid))\n, to_char (rce.year)\n||' (' || to_char (max (dsg.points)\
  \ )\n|| ' points)' as points\n, 'd'||to_char (\nmax (dsg.driverid)\nkeep (dense_rank\
  \ first\norder by dsg.points desc\n)) as driver\nfrom f1data.races rce\njoin f1data.driverstandings\
  \ dsg\non rce.raceid = dsg.raceid\ngroup by rce.year\n)\n```\n\n前面的命名查询添加了第三级，列出了历年的冠军，其中\
  \ `PK` 列是“`champ`”和一个 `ID` 的缩写，`FK` 列是“`d`”和该年冠军的 `driverid` 的缩写。`NAME` 列显示年份和所得积分。部分结果如下所示。\n\
  \n```\nPK         NAME               FK\n---------- ------------------ ----------\n\
  champ43201 1950 (30 points)   d642\nchamp43620 1951 (31 points)   d579\nchamp44133\
  \ 1952 (36 points)   d647\nchamp44723 1953 (34.5 points) d647\nchamp51463 1954 (42\
  \ points)   d579\nchamp46077 1955 (40 points)   d579\nchamp46506 1956 (30 points)\
  \   d579\nchamp46985 1957 (40 points)   d579\nchamp48974 1958 (42 points)   d578\n\
  champ61951 1959 (31 points)   d356\n```\n\n#### Level 伪列\n\n`level` 伪列返回一个整数，指示层级的级别。根级别为\
  \ 1，下面的级别为 2，再下一级为 3，依此类推。\n\n为了模拟 `level` 伪列，递归子查询因子分解的锚点成员被赋予一个值为 1 的整数。在每次迭代中，该值增加一。在以下查询中，添加了\
  \ `LVL` 列。\n\n```\n, hierarchy (pk, name, fk, lvl)\nas (\nselect pk\n, name\n, fk\n\
  , 1 as lvl\nfrom   constructor_drivers\nwhere  fk is null\nunion  all\nselect cdv.pk\n\
  , lpad ('.', hier.lvl * 2, '.')||cdv.name\n, cdv.fk\n, hier.lvl + 1\nfrom   constructor_drivers\
  \ cdv\njoin   hierarchy hier\non   hier.pk = cdv.fk\n)\nselect *\nfrom   hierarchy\n\
  /\nPK         NAME                      FK                LVL\n---------- -------------------------\
  \ ---------- ----------\nc6         Ferrari                                    \
  \   1\nc131       Mercedes                                      1\nd63        ..Salo\
  \                    c6                  2\nd203       ..Villeneuve            \
  \  c6                  2\nd832       ..Sainz                   c6              \
  \    2\nd477       ..Allison                 c6                  2\nd278       ..Amon\
  \                    c6                  2\nd581       ..Collins               \
  \  c6                  2\n\nchamp43201 ....1950 (30 points)      d642          \
  \      3\nchamp20433 ....1985 (73 points)      d117                3\nchamp19944\
  \ ....1986 (72 points)      d117                3\nchamp18159 ....1989 (76 points)\
  \      d117                3\nchamp9351  ....1993 (99 points)      d117        \
  \        3\nchamp63737 ....2010 (256 points)     d20                 3\n\n```\n\n\
  `LVL` 列也用于格式化输出中的名称。法拉利和梅赛德斯的记录位于第 1 级，车手位于第 2 级，冠军信息位于第 3 级。\n\n\n\n# sys_connect_by_path,\
  \ connect_by_root, connect_by_isleaf\n\n`sys_connect_by_path` 函数返回从层次结构的根节点到当前节点的路径。\n\
  \n为了在递归子查询因子化中模拟此功能，在锚定成员中添加一列并将其指定为根节点，在以下查询中别名为 `SCBP`。在每次迭代中，通过从递归成员中连接一个值来扩展此值，如清单\
  \ 9-4 所示。\n\n`connect_by_root` 一元操作符返回当前行用作其根节点的列。清单 9-4 在 `CBR` 列中模拟了这一点。根节点的值在锚定成员中设置，并在递归成员中重复。\n\
  \n`connect_by_isleaf` 伪列在当前行是层次结构中的叶节点时返回 1；否则返回 0。此函数可以在最终查询中使用 `CASE` 表达式和分析函数来实现。然而，有一个注意事项：所示的\
  \ `CASE` 表达式和分析函数仅在搜索条件设置为 `search depth first` 时才有效。\n\n这一点在清单 9-4 中展示。\n\n```sql\n\
  with constructor_drivers as\n(\nselect 'c'||to_char (ctr.constructorid) as pk\n\
  , ctr.name\n, null as fk\nfrom   f1data.constructors ctr\nwhere  ctr.constructorref\
  \ in ('ferrari', 'mercedes')\nunion  all\nselect distinct\n'd'||to_char (drv.driverid)\n\
  , drv.surname as driver\n, 'c'||to_char (rst.constructorid) ctr_id\nfrom   f1data.results\
  \ rst\njoin   f1data.drivers drv\non   drv.driverid = rst.driverid\nunion  all\n\
  select 'champ'||to_char (min (dsg.driverstandingsid)),\nto_char (rce.year)||' ('\n\
  || to_char (max (dsg.points)|| ' points)') as points,\n'd'||to_char (max (dsg.driverid)\
  \ keep (dense_rank first order  by dsg.points desc)) as driver\nfrom   f1data.races\
  \ rce\njoin   f1data.driverstandings dsg\non   rce.raceid = dsg.raceid\ngroup  by\
  \ rce.year\n)\n, hierarchy (pk, name, fk, lvl, scbp, cbr)\nas (\nselect pk\n, name\n\
  , fk\n, 1    as lvl\n, name as scbp\n, name as cbr\nfrom   constructor_drivers\n\
  where  fk is null\nunion  all\nselect cdv.pk\n, lpad ('.', hier.lvl * 2, '.')||cdv.name\n\
  , cdv.fk\n, hier.lvl + 1\n, hier.scbp ||', '||cdv.name\n, hier.cbr\nfrom   constructor_drivers\
  \ cdv\njoin   hierarchy hier\non   hier.pk = cdv.fk\n) search depth first by name\
  \ set seq\nselect lvl\n, scbp\n, cbr\n, case\nwhen lvl >= lead ( lvl, 1, 1 )\nover\
  \ ( order by seq )\nthen 'Y'\nelse 'N'\nend as leaf\nfrom   hierarchy\norder  by\
  \ seq\n/\nLV SCBP                                     CBR        L\n-- ----------------------------------------\
  \ ---------- -\n1 Ferrari                                  Ferrari    N\n2 Ferrari,\
  \ Adolff                          Ferrari    Y\n2 Ferrari, Alboreto            \
  \            Ferrari    Y\n2 Ferrari, Alesi                           Ferrari  \
  \  Y\n2 Ferrari, Allison                         Ferrari    Y\n2 Ferrari, Alonso\
  \                          Ferrari    N\n3 Ferrari, Alonso, 2005 (133 points)  \
  \     Ferrari    Y\n3 Ferrari, Alonso, 2006 (134 points)       Ferrari    Y\n2 Ferrari,\
  \ Amon                            Ferrari    Y\n2 Ferrari, Andretti            \
  \            Ferrari    N\n3 Ferrari, Andretti, 1978 (64 points)      Ferrari  \
  \  Y\n2 Ferrari, Arnoux                          Ferrari    Y\n\nListing 9-4\nsys_connect_by_path\
  \ simulation\n```\n\n### 对结果排序\n\n递归子查询因子化提供了两种对结果集进行排序的选项。层次结构可以从根级别遍历到其节点，然后再转到下一个根节点及其节点。使用传统编写层次查询的方法时，这是唯一的方式。\n\
  \n层次结构可以遍历所有根节点，然后再向下深入一级。它输出该级别的所有记录，再深入下一级，输出这些记录，依此类推。\n\n通过指定以下内容之一，将 `search`\
  \ 子句添加到递归子查询因子化查询中：\n\n```sql\nsearch depth first by  set \n```\n\n或\n\n```sql\n\
  search breadth first by  set \n```\n\n`search depth` 在转到下一个根节点之前，从根节点导航到叶节点。`search\
  \ breadth` 在导航到下一级别之前，输出同一级别的所有内容。\n\n> **注意**\n> 与所有未指定 `order by` 子句的查询一样，返回的结果集没有特定顺序。对于递归子查询也是如此。当需要排序时，需要在查询中添加\
  \ `order by` 子句。似乎递归子查询的默认排序是执行 `breadth first` 搜索，并且在每个级别内的顺序是不确定的。\n\n它可以是任何用于对结果排序的列。在\
  \ `set` 关键字之后，指定一个排序列，类似于搜索条件的别名。\n\n```sql\n, hierarchy (pk, name, fk, lvl)\nas\
  \ (\nselect pk\n, name\n, fk\n, 1    as lvl\nfrom   constructor_drivers\nwhere \
  \ fk is null\nunion  all\nselect cdv.pk\n, lpad ('.', hier.lvl * 2, '.')||cdv.name\n\
  , cdv.fk\n, hier.lvl + 1\nfrom   constructor_drivers cdv\njoin   hierarchy hier\n\
  on   hier.pk = cdv.fk\n) search depth first by name set seq\nselect lvl\n,name\n\
  from   hierarchy\norder  by seq\n/\nLV NAME\n-- -------------------------\n1 Ferrari\n\
  2 ..Adolff\n2 ..Alboreto\n2 ..Alesi\n2 ..Allison\n2 ..Alonso\n3 ....2005 (133 points)\n\
  3 ....2006 (134 points)\n2 ..Amon\n2 ..Andretti\n3 ....1978 (64 points)\n2 ..Arnoux\n\
  2 ..Ascari\n3 ....1952 (36 points)\n3 ....1953 (34.5 points)\n\n1 Mercedes\n2 ..Bottas\n\
  2 ..Fangio\n3 ....1951 (31 points)\n3 ....1954 (42 points)\n3 ....1955 (40 points)\n\
  3 ....1956 (30 points)\n3 ....1957 (40 points)\n\n```\n\n前面的结果集显示了构造函数 Ferrari，然后是其车手（按字母顺序排列），以及该车手成为冠军的年份。在列出所有车手之后，显示了构造函数\
  \ Mercedes 及其车手。\n\n将搜索条件更改为：\n\n```sql\nsearch breadth first by name set seq\n\
  ```\n\n它产生以下结果：\n\n```sql\nLV NAME\n-- -------------------------\n1 Ferrari\n1 Mercedes\n\
  2 ..Adolff\n2 ..Alboreto\n2 ..Alesi\n2 ..Allison\n2 ..Alonso\n2 ..Amon\n\n2 ..de\
  \ Tomaso\n2 ..de Tornaco\n2 ..von Stuck\n2 ..von Trips\n3 ....1950 (30 points)\n\
  3 ....1951 (31 points)\n3 ....1951 (31 points)\n3 ....1952 (36 points)\n3 ....1953\
  \ (34.5 points)\n3 ....1954 (42 points)\n\n```\n\n首先，显示级别 1 的所有记录（按字母顺序），然后是级别 2\
  \ 的所有记录，最后是级别 3 的所有记录。\n\n\n### 循环检测\n\n在以下示例中，名为 `constructor_drivers` 的子查询定义如下。\n\
  \n```\nwith constructor_drivers as\n(\nselect ctr.constructorid as pk\n, ctr.name\n\
  , null as fk\nfrom   f1data.constructors ctr\nwhere  ctr.constructorid in ( 1  \
  \ -- McLaren\n, 131 -- Mercedes\n)\nunion all\nselect distinct\ndrv.driverid\n,\
  \ drv.surname as driver\n, rst.constructorid\nfrom   f1data.results rst\njoin  \
  \ f1data.drivers drv\non   drv.driverid = rst.driverid\nwhere  drv.driverid in (\
  \ 1   -- Hamilton\n, 131 -- Modena\n)\n)\n/\nPK NAME                           \
  \   FK\n---------- ------------------------- ----------\n1 McLaren\n131 Mercedes\n\
  1 Hamilton                           1\n131 Modena                            17\n\
  131 Modena                            25\n131 Modena                           \
  \ 34\n131 Modena                            44\n1 Hamilton                     \
  \    131\n```\n\n这里仅选择了两个车队和两位车手。与之前示例的主要区别在于，`PK` 和 `FK` 列的前缀被移除，这导致了错误的关联关系（假阳性），并在数据中造成了循环。\n\
  \n使用传统的 `start with ... connect by` 语法也可以进行循环检测。当数据中存在循环时，会引发以下错误。\n\n```\nORA-01436:\
  \ CONNECT BY loop in user data\n```\n\n`connect_by_iscycle` 伪列在当前行的子记录同时也是其父记录之一（直系父级、祖父级等）时返回\
  \ 1。此伪列仅在 `connect by` 子句中指定了 `nocycle` 时才能使用。\n\n使用递归子查询分解时，循环关系是指当前行也是其祖先之一。可以在递归子查询分解中添加\
  \ `cycle` 子句来检测循环关系。当递归子查询分解中存在循环关系时，会引发以下异常。\n\n```\nORA-32044: cycle detected\
  \ while executing recursive WITH query\n```\n\n以下示例展示了 `cycle` 子句的用法。\n\n```\n,\
  \ hierarchy (pk, name, fk)\nas (\nselect pk\n, name\n, fk\nfrom   constructor_drivers\n\
  where  fk is null\nunion  all\nselect cdv.pk\n, cdv.name\n, cdv.fk\nfrom   constructor_drivers\
  \ cdv\njoin   hierarchy hier\non   hier.pk = cdv.fk\n) search depth first by name\
  \ set seq\ncycle name set is_cycle to 'Y' default 'N'\nselect pk\n, name\n, fk\n\
  , is_cycle\nfrom   hierarchy\n/\nPK NAME                    FK I\n---------- ---------------\
  \ ---------- -\n1 McLaren                    N\n1 Hamilton                 1 N\n\
  1 Hamilton                 1 Y\n131 Mercedes                   N\n1 Hamilton   \
  \            131 N\n1 Hamilton                 1 Y\n```\n\n如最后一列所示，检测到了循环关系。用于循环检测的列可以设置为任何列，不一定是直接参与层次结构的列，而这在\
  \ `connect by` 层次查询中是无法实现的。\n\n### 总结\n\n子查询分解是编写 SQL 语句的一项非常有用的技术。因为它可以将结果集分解为更小的、易于理解的部分，所以它几乎具有过程化的感觉。子查询分解有助于保持\
  \ SQL 语句的清晰，而不是编写一个庞大的查询。\n\n递归子查询分解提供了与传统 `start with .. connect by` 语法几乎相同的功能，但具有更高级的循环检测能力。因为递归成员是一个独立的子查询，所以它可以更加灵活，可以包含多个表、更复杂的列表达式以及先前迭代的结果。当需要时，它允许更大的灵活性和处理更复杂的情况。\n\
  \n## 10. 从 SQL 调用 PL/SQL\n\n调用存储在 PL/SQL 函数（打包的或独立的）中的可重用代码会导致上下文切换。SQL 引擎会停止正在执行的操作，并将控制权交给\
  \ PL/SQL 引擎，后者完成其工作，然后将控制权交还给 SQL 引擎。这些上下文切换的开销相对较大。在真正的工作开始之前，两个引擎都需要做大量工作来传递所有相关信息。Oracle\
  \ 数据库提供了多种可能的解决方案来最小化这种开销。\n\n### UDF 编译指示\n\nUDF 编译指示告诉编译器此函数主要在 SQL 中使用，因此代码会为此进行优化，这可能会提高性能。UDF\
  \ 代表 *用户定义函数*。你能得到的唯一保证是，当从 SQL 调用时，它不比未使用此编译指示的函数慢。如果此函数从 PL/SQL 调用，你可能会看到性能下降。清单\
  \ 10-1 是一个带有 UDF 编译指示的函数示例。\n\n```\ncreate or replace function fullname_udf\n( forename_in\
  \ in varchar2\n, surname_in  in varchar2 )\nreturn varchar2\nis\npragma udf;\nl_returnvalue\
  \ varchar2( 32767 );\nbegin\nl_returnvalue := initcap( forename_in )\n|| ' '\n||\
  \ initcap( surname_in );\nreturn l_returnvalue;\nend;\n/\n清单 10-1\n带有 UDF 编译指示的函数\n\
  ```\n\n你可能会看到显著的性能提升，也可能完全没有提升。效果可能因情况而异。如果你确定该函数仅从 SQL 调用，那么包含此编译指示可能是个好主意，否则，请务必测试不同场景，然后决定是否要使用它。\n\
  \n\n#### 确定性\n\n声明为确定性的函数会在执行 SQL 语句期间缓存其参数。如果输入参数与之前某次执行时相同，则不会再次执行函数体。结果将直接从缓存中获取并返回。当你将一个函数标记为确定性时，你是在告诉数据库：对于相同的输入，该函数\
  \ `总是` 返回相同的输出。这意味着一个确定性函数的输出绝不能依赖于表数据、`SYSDATE` 之类的因素——其输出必须 `仅仅` 依赖于输入。\n\n这可以带来显著的性能提升，因为函数体不再需要被执行。而且，无论你的代码有多快，不执行它总是更快的。\n\
  \n为了演示性能提升，先创建一个包含单列的简单表。\n```\ncreate table t ( c number )\n/\n```\n\n然后向这个表中插入十行，包含三个不同的值。\n\
  ```\nbegin\ninsert into t( c ) values ( 1 );\ninsert into t( c ) values ( 2 );\n\
  insert into t( c ) values ( 3 );\ninsert into t( c ) values ( 1 );\ninsert into\
  \ t( c ) values ( 2 );\ninsert into t( c ) values ( 3 );\ninsert into t( c ) values\
  \ ( 1 );\ninsert into t( c ) values ( 2 );\ninsert into t( c ) values ( 3 );\ninsert\
  \ into t( c ) values ( 1 );\ncommit;\nend;\n/\n```\n\n出于演示目的，创建一个函数，它除了在返回 `in`\
  \ 参数提供的值之前休眠一秒钟外，什么也不做（参见清单 10-2）。\n```\ncreate or replace function myslowfunction(\
  \ p_in in number )\nreturn number\nis\nbegin\ndbms_session.sleep( 1 );\nreturn p_in;\n\
  end;\n/\n清单 10-2\n一个非常慢的函数\n```\n\n然后对表中的每一行调用该函数。\n```\nset timing on\nselect myslowfunction(\
  \ t.c ) from t\n/\nset timing off\nMYSLOWFUNCTION(T.C)\n\n10 rows selected\nExecuted\
  \ in 10,384 seconds\n```\n\n如你所见，执行花了 10 秒多一点，这是合理的，因为该函数被调用了十次，而且除了休眠一秒外没做太多事情。\n\
  \n如果你修改该函数并添加关键字 `deterministic`，你可以再次运行相同的查询（参见清单 10-3）。\n```\ncreate or replace\
  \ function myslowfunction( p_in in number )\nreturn number\ndeterministic\nis\n\
  begin\ndbms_session.sleep( 1 );\nreturn p_in;\nend;\n/\nset timing on\nselect myslowfunction(\
  \ t.c ) from t\n/\nset timing off\nMYSLOWFUNCTION(T.C)\n\n10 rows selected\nExecuted\
  \ in 3,234 seconds\n清单 10-3\n一个非常慢的确定性函数\n```\n\n如你所见，现在语句执行花了 3 秒多一点。该函数只需要执行三次，因为有三个不同的值。每次使用已经见过的参数调用该函数时，都不会执行函数体，结果直接从缓存中返回。\n\
  \n#### 结果缓存\n\n当一个函数使用 `result_cache` 关键字声明时，其效果与函数被声明为确定性时几乎相同；但在这种情况下，函数可以依赖表数据。当表数据发生变化时，Oracle\
  \ 数据库会自动使缓存失效。\n\n将其声明为结果缓存的另一个优势是，缓存在数据库的会话之间共享。这意味着第一个使用某组参数调用该函数的人将承担执行整个函数的开销。同时，还需要一点时间来填充缓存。当该函数被（任何会话）第二次调用时，将直接从缓存返回结果，而不执行函数体（参见清单\
  \ 10-4）。\n```\ncreate or replace function myslowfunction( p_in in number )\nreturn\
  \ number\nresult_cache\nis\nbegin\ndbms_session.sleep( 1 );\nreturn p_in;\nend;\n\
  /\nset timing on\nselect myslowfunction( t.c ) from t\n/\nset timing off\nMYSLOWFUNCTION(T.C)\n\
  \n10 rows selected\nExecuted in 3,237 seconds\ndisconnect\nconnect book/>\nset timing\
  \ on\nselect myslowfunction( t.c ) from t\n/\nset timing off\nMYSLOWFUNCTION(T.C)\n\
  \n10 rows selected\nExecuted in 0,097 seconds\n清单 10-4\n一个非常慢的 result_cache 函数\n\
  ```\n\n### 分层分析器\n\n为了确定你应该将注意力集中在哪里以提高性能，深入了解程序的时间消耗点是个好主意。你可以通过分析代码来实现这一点。启动一个分析会话并执行你的程序。分层分析器可以在这个过程中提供帮助。\n\
  \n如果你有一段代码需要分析，可以采取几个步骤。首先，编译你要跟踪的程序。让我们创建一个包来显示给定年份的车队及其车手的信息。\n\n注意\n\n这不是构建显示车队和车手信息的存储过程的最佳和/或最快方法，这样做是为了演示分层分析器的用法。\n\
  \n包规范只包含一个过程，如清单 10-5 所示。\n```\ncreate or replace package f1info is\nprocedure show_season(year_in\
  \ in number);\nend f1info;\n/\n清单 10-5\nf1info 包\n```\n\n在包体中，构建一个私有过程来显示车手信息。\n\
  ```\nprocedure show_driver(driverid_in in number)\nis\nl_forename    f1data.drivers.forename%type;\n\
  l_surname     f1data.drivers.surname%type;\nl_nationality f1data.drivers.nationality%type;\n\
  begin\nselect d.forename\n, d.surname\n, d.nationality\ninto   l_forename\n, l_surname\n\
  , l_nationality\nfrom   f1data.drivers d\nwhere  d.driverid = driverid_in;\ndbms_output.put_line(\
  \ '  '\n||l_forename\n||' '\n||l_surname\n||'('\n||l_nationality\n||')'\n);\nend\
  \ show_driver;\n```\n\n另外，创建一个过程来显示车队的信息。该过程为在请求年份为该车队效力的所有车手调用 `show_driver` 过程。\n\
  ```\nprocedure show_constructor( year_in          in number\n, constructorid_in\
  \ in number\n)\nis\nl_name        f1data.constructors.name%type;\nl_nationality\
  \ f1data.constructors.nationality%type;\nbegin\nselect c.name\n, c.nationality\n\
  into   l_name\n, l_nationality\nfrom   f1data.constructors c\nwhere  c.constructorid\
  \ = constructorid_in;\ndbms_output.put_line( l_name\n||'('\n||l_nationality\n||')'\n\
  );\nfor driver in\n(select distinct res.driverid\nfrom   f1data.results res\njoin\
  \   f1data.races   r\non   (res.raceid = r.raceid)\nwhere  1=1\nand    r.year =\
  \ year_in\nand    res.constructorid = constructorid_in\n) loop\nshow_driver( driverid_in\
  \ => driver.driverid );\nend loop;\nend show_constructor;\n```\n\n最后，实现 `show_season`\
  \ 过程。\n```\nprocedure show_season(year_in in number)\nis\nbegin\nfor constructor\
  \ in\n(select distinct res.constructorid\nfrom   f1data.results res\njoin   f1data.races\
  \   r\non   (res.raceid = r.raceid)\nwhere  1=1\nand    r.year = year_in\n) loop\n\
  show_constructor\n( year_in          => year_in\n, constructorid_in => constructor.constructorid\n\
  );\nend loop;\nend show_season;\n```\n\n清单 10-6 是完整的包体，可以从本书的 GitHub 页面下载。\n\n####\
  \ DBMS_HPROF\n\n为了帮助分析你的代码，你可以使用 `DBMS_HPROF` 包。该包包含一个过程，用于创建启动和停止分析以及分析所获取数据所需的表、过程和函数。\n\
  \n### create_tables\n\n`create_tables` 过程创建存储所有分析数据所需的表。\n```\nbegin\ndbms_hprof.create_tables;\n\
  end;\n/\n```\n\n如果你第二次运行此过程，会收到一个错误，提示表已存在。如果你想删除并重新创建这些表，可以将 `force_it` 参数设置为 `TRUE`\
  \ 来调用该过程。\n```\nbegin\ndbms_hprof.create_tables( force_it => true );\nend;\n/\n\
  ```\n\n此过程也会重新创建两个序列。\n\n\n### start_profiling\n\n要启动性能分析会话，你需要调用 `start_profiling`\
  \ 函数。\n\n```\nfunction start_profiling( max_depth   PLS_INTEGER DEFAULT NULL\n,\
  \ profile_uga BOOLEAN     DEFAULT NULL\n, profile_pga BOOLEAN     DEFAULT NULL\n\
  , sqlmonitor  BOOLEAN     DEFAULT TRUE\n, run_comment VARCHAR2    DEFAULT NULL\n\
  ) return number;\n```\n\n表 10-1 解释了这些参数的含义。\n\n**表 10-1**\n\n**dbms_hprof.start_profiling\
  \ 函数参数**\n\n| 参数 | 描述 |\n| --- | --- |\n| `max_depth` | 当为 `NULL` 时，收集所有调用深度级别的函数的性能分析信息。当提供非\
  \ `NULL` 值时，收集到指定调用深度级别的所有函数的性能分析信息。在深度大于指定级别的函数中所花费的时间，会计入其祖先函数。 |\n| `profile_uga`\
  \ | 意为分析会话内存使用情况（未文档化，仅供内部使用）。 |\n| `profile_pga` | 意为分析进程内存使用情况（未文档化，仅供内部使用）。 |\n\
  | `sqlmonitor` | 当为 `TRUE` 时，分析器运行结束时会生成一份实时监控报告。 |\n| `run_comment` | 意为此次性能分析数据收集运行的任意注释。\
  \ |\n\n收集的数据存储在 `DBMSHP_TRACE_DATA` 表中（见表 10-2）。\n\n**表 10-2**\n\n**DBMSHP_TRACE_DATA**\n\
  \n| 名称 | 类型 | 可空 |\n| --- | --- | --- |\n| `trace_id` | `NUMBER` |  |\n| `Rawdata`\
  \ | `CLOB` | y |\n| `Sqlmonitor` | `CLOB` | y |\n| `trace_timestamp` | `TIMESTAMP(6)`\
  \ | y |\n| `run_comment` | `VARCHAR2(2047)` | y |\n\n当数据生成并存储在此表中时，会使用同样被创建的 `dbmshp_tracenumber`\
  \ 序列生成一个唯一的 `trace_id`。此 `trace_id` 由函数返回。\n\n现在告诉 Oracle 数据库开始分析。将 `trace_id` 检索到一个本地变量中供后续使用。为性能分析添加一个注释是个好主意，这样以后可以轻松找到它。\n\
  \n```\nl_trace_id := dbms_hprof.start_profiling( run_comment => 'HProf Demo' );\n\
  ```\n\n接下来是对要追踪的程序的调用。\n\n```\nf1info.show_season(2022);\n```\n\n### stop_profiling\n\
  \n一旦程序执行完毕，就告诉 Oracle 数据库结束你的性能分析会话。\n\n```\ndbms_hprof.stop_profiling;\n```\n\n\
  所有收集的数据都会被刷新到 `dbmshp_trace_data` 表中。你也可以调用 `stop_profiling` 函数，它会将性能分析结果返回到一个 CLOB\
  \ 变量中。\n\n```\nfunction stop_profiling return clob;\n```\n\n该 CLOB 包含一个类似如下的文本文档。\n\
  \n```\nP#V PLSHPROF Internal Version 1.0\nP#! PL/SQL Timer Started\nP#C SQL.\"SYS\"\
  .\"DBMS_HPROF\"::11.\"__static_sql_exec_line700\" #700.\"8ggw94h7mvxd7\"\nP#! COMMIT\n\
  P#X 100\nP#R\nP#C PLSQL.\"BOOK\".\"F1INFO\"::11.\"SHOW_SEASON\"#e17d780a3c3eae3d\
  \ #58\nP#X 22\nP#C SQL.\"BOOK\".\"F1INFO\"::11.\"__sql_fetch_line62\" #62.\"dajrzh30ttucf\"\
  \nP#! SELECT DISTINCT RES.CONSTRUCTORID FROM F1DATA.RESU\nP#X 84115\nP#R\n>\n```\n\
  \n表 10-3 展示了对前缀的解释。\n\n**表 10-3**\n\n**文档中的前缀**\n\n| 前缀 | 含义 |\n| --- | --- |\n\
  | `P#V` | 带版本号的 PLSHPROF 标识 |\n| `P#C` | 对子程序的调用（调用事件） |\n| `P#R` | 从子程序返回 |\n|\
  \ `P#X` | 前一个事件与后一个事件之间经过的时间 |\n| `P#!` | 注释 |\n\n与其自己审阅和分析文档，你可以调用 `analyze` 过程或函数。\n\
  \n### analyze\n\n`analyze` 过程（也有一个重载的同名函数）分析性能分析器数据表中的数据，并生成一个包含性能分析器报告的 HTML 文档，或者生成一组表中的行，以便你构建自己的报告。\n\
  \n```\nprocedure analyze\n(\ntrace_id    number\n, report_clob out clob\n, trace\
  \       varchar2 default null\n, skip        pls_integer default 0\n, collect  \
  \   pls_integer default null\n, profile_uga boolean default null\n, profile_pga\
  \ boolean default null\n);\n```\n\n`analyze` 过程接受表 10-4 中描述的参数，并通过其 `out` 参数返回一个\
  \ CLOB。\n\n**表 10-4**\n\n**分析过程参数**\n\n| 参数 | 必填 | 描述 |\n| --- | --- | --- |\n|\
  \ `trace_id` | Y | 性能分析器数据表（`dbmshp_data`）中的 `traceid` 条目 |\n| `report_clob` | Y\
  \ | 分析得到的 HTML 报告，以 CLOB 形式输出（输出） |\n| `Trace` |  | 当为 `NULL`（默认）时，为整个运行生成分析/报告。仅为以指定“`trace`”条目为根的子树进行分析。必须以限定格式指定；例如，“BOOK”.”F1INFO”.”SHOW_DRIVER”（如果过程或函数被重载，则分析所有重载版本。）\
  \ |\n| `Skip` |  | 仅在指定了“`trace`”时使用。跳过对“`trace`”的前“`skip`”次调用。默认值为 0。 |\n| `Collect`\
  \ |  | 仅在指定了“`trace`”时使用。分析“`collect`”次对“`trace`”的调用（从第“`skip`”+1 次调用开始）。默认只分析 1\
  \ 次调用。 |\n| `profile_uga` |  | 报告 UGA 使用情况。 |\n| `profile_pga` |  | 报告 PGA 使用情况。\
  \ |\n\n```\nfunction analyze\n(\ntrace_id     number\n, summary_mode boolean default\
  \ false\n, trace        varchar2 default null\n, skip         pls_integer default\
  \ 0\n, collect      pls_integer default null\n, run_comment  varchar2 default null\n\
  , profile_uga  boolean default null\n, profile_pga  boolean default null\n) return\
  \ number;\n```\n\n`analyze` 函数返回 `runnumber`，这是它在不同表中生成的行的键。该函数接受表 10-5 中描述的参数。\n\
  \n**表 10-5**\n\n**分析函数参数**\n\n| 参数 | 必填 | 描述 |\n| --- | --- | --- |\n| `trace_id`\
  \ | Y | 性能分析器数据表（`dbmshp_data`）中的 `traceid` 条目 |\n| `summary_mode` |  | 当为 `FALSE`（默认）时，进行完整分析。当为\
  \ `TRUE` 时，只生成顶层摘要。 |\n| `Trace` |  | 当为 `NULL`（默认）时，为整个运行生成分析/报告。仅为以指定“`trace`”条目为根的子树进行分析。必须以限定格式指定；例如，“BOOK”.”F1INFO”.”SHOW_DRIVER”（如果过程或函数被重载，则分析所有重载版本。）\
  \ |\n| `Skip` |  | 仅在指定了“`trace`”时使用。跳过对“`trace`”的前“`skip`”次调用。默认值为 0。 |\n| `collect`\
  \ |  | 仅在指定了“`trace`”时使用。分析“`collect`”次对“`trace`”的调用（从第“`skip`”+1 次调用开始）。默认分析 1\
  \ 次调用。 |\n| `run_comment` |  | 分析运行的任意注释。 |\n| `profile_uga` |  | 报告 UGA 使用情况。 |\n\
  | `profile_pga` |  | 报告 PGA 使用情况。 |\n\n`analyze` 函数使用以下三个表（均使用 `dbms_hprof.create_tables`\
  \ 过程创建）。\n\n*   `dbmshp_runs`\n*   `dbmshp_function_info`\n*   `dbmshp_parent_child_info`\n\
  \n对于每条已被分析的追踪记录，会在 `dbmshp_runs` 表中添加一条记录（见表 10-6）。\n\n**表 10-6**\n\n**dbmshp_runs**\n\
  \n| 名称 | 类型 | 可空 |\n| --- | --- | --- |\n| `Runid` | `NUMBER` |  |\n| `run_timestamp`\
  \ | `TIMESTAMP(6)` | y |\n| `total_elapsed_time` | `INTEGER` | y |\n| `run_comment`\
  \ | `VARCHAR2(2047)` | y |\n| `trace_id` | `NUMBER` | y |\n\n每个过程、函数和 SQL 语句都会在\
  \ `dbmshp_function_info` 表中获得一行，使用与 `dbmshp_runs` 表中记录相同的运行 ID（见表 10-7）。\n\n**表\
  \ 10-7**\n\n**dbmshp_function_info**\n\n### Oracle 层级分析器 数据表与使用指南\n\n#### 数据表结构\n\
  \n### dbmshp_function_info 表\n\n该表包含函数级的性能分析信息。\n\n| 名称 | 类型 | 可为空 |\n| --- | ---\
  \ | --- |\n| Runid | NUMBER |   |\n| Symbolid | NUMBER |   |\n| Owner | VARCHAR2(128)\
  \ | y |\n| Module | VARCHAR2(128) | y |\n| Type | VARCHAR2(32) | y |\n| Function\
  \ | VARCHAR2(4000) | y |\n| line# | NUMBER | y |\n| Hash | RAW(32) | y |\n| Namespace\
  \ | VARCHAR2(32) | y |\n| subtree_elapsed_time | INTEGER | y |\n| function_elapsed_time\
  \ | INTEGER | y |\n| Calls | INTEGER | y |\n| sql_id | VARCHAR2(13) | y |\n| sql_text\
  \ | VARCHAR2(4000) | y |\n\n### dbmshp_parent_child_info 表\n\n`dbmshp_parent_child_info`\
  \ 表包含父级与子级层级的性能分析信息。它还包含此过程/函数的计时信息，以及在子过程或函数中累积花费的时间（参见表 10-8）。\n\n表 10-8\n\n**dbmshp_parent_child_info**\n\
  \n| 名称 | 类型 | 可为空 |\n| --- | --- | --- |\n| Runid | NUMBER | y |\n| Parentsymid\
  \ | NUMBER | y |\n| Childsymid | NUMBER | y |\n| subtree_elapsed_time | INTEGER\
  \ | y |\n| function_elapsed_time | INTEGER | y |\n| Calls | INTEGER | y |\n\n唯一的运行编号由\
  \ `dbmshp_runnumber` 序列生成。\n\n性能分析数据存储在 `dbmshp_trace_data` 表中。您可以调用 `analyze` 过程来获取包含跟踪报告的\
  \ CLOB。\n\n```sql\ndbms_hprof.analyze( trace_id => l_trace_id\n, report_clob =>\
  \ l_clob\n);\n```\n\n您也可以调用 `analyze` 函数将所有信息写入表中。\n\n```sql\nl_analyze_id := dbms_hprof.analyze(\
  \ trace_id => l_trace_id\n, run_comment => 'HProf Demo'\n);\n```\n\n#### 生成报告\n\n\
  在分析收集到的跟踪信息时，您可以选择两种选项之一。清单 10-7 中的脚本将收集到的数据分析为 HTML 报告。\n\n```sql\ncreate table\
  \ profiler\n( reports clob )\n/\ndeclare\nl_trace_id number;\nl_clob clob;\nbegin\n\
  dbms_hprof.create_tables( force_it => true );\nl_trace_id := dbms_hprof.start_profiling\n\
  ( run_comment => 'HProf Demo' );\nf1info.show_season(2022);\ndbms_hprof.stop_profiling;\n\
  dbms_hprof.analyze( trace_id => l_trace_id\n, report_clob => l_clob\n);\ninsert\
  \ into profiler(reports) values (l_clob);\nend;\n/\n```\n清单 10-7\n生成 HTML 文档的脚本\n\
  \n生成的报告部分内容如图 10-1 所示。\n\n![](img/536316_1_En_10_Fig1_HTML.jpg)\n\n图 10-1\n层级分析器输出\n\
