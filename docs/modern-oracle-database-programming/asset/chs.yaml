  \ 255 )\n, dob          date\n, nationality  varchar2( 255 )\n, url          varchar2(\
  \ 255 )\n) on commit drop definition\n/\n```\n\n##### 在提交时填充与删除\n\n填充私有临时表。\n\n\
  ```sql\ninsert into ora$ptt_drivers\nselect *\nfrom   f1data.drivers drv\nwhere\
