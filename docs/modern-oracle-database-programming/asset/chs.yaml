  如您所见，大部分时间花在第 48 行的一个 SQL 获取操作上。该行被调用了十次，因此平均花费时间为 1306 毫秒。第 64 行的 SQL 获取只执行了一次，但耗时\
  \ 2020 毫秒。如果您能改进第 48 行 SQL 获取的性能，该改进对整体性能的影响将是单个改进的十倍，因此这可能是一个很好的优化候选。但也许您可以对第 64\
  \ 行 SQL 获取的改进幅度超过第 48 行改进幅度的十倍。分析器报告不会告诉您应该将优化工作聚焦在何处，但它可以帮助您做出选择。\n\n> 注意\n>\n\
  > 分析器的工作方式有时会因版本而异。本示例使用的是 Oracle Database 19c。\n\n### 摘要\n\n在 Oracle 数据库中，有多种方法可以加速你的\
  \ PL/SQL 代码。`UDF`编译指示告知编译器该函数主要用于 SQL，从而可以针对此场景进行优化。`deterministic`和`result_cache`函数则能最小化代码的执行次数。如果参数相同，预期结果也相同，那么就可以从先前的运行中检索结果。\n\
  所有这些选项都伴随着一定的成本，例如内存消耗、性能开销、缓存未填充或值被从缓存中清除等。为了深入了解何处可以尝试优化，你可以使用`DBMS_HPROF`包中的过程和函数。\n\
  \n## 11. 在数据库中存储 JSON\n\n处理 JSON 文档时，你必须决定*是否*以及*如何*在数据库中存储 JSON。第一个决策，*是否*，需要尽早做出。你是否需要保留\
  \ JSON 文档的原始格式？在以下情况下，你可以选择这样做：你没有将所有数据存储在关系表中，并且 JSON 文档可能包含未来可能有价值的数据。\n当所有 JSON\
  \ 数据都以关系格式存储时，你是否还需要保留 JSON 文档？\n一旦决定按原样存储 JSON 文档，最好的存储方式是什么？本章将探讨各种可能性。\n\n###\
  \ 在处理前暂存数据\n\n当你将数据导入数据库时（例如通过调用一个应返回 JSON 文档的 Web 服务），将返回的值存储到一个没有限制的表中可能是有益的。\n\
  一个常见的问题是，当无法访问应返回 JSON 文档的 Web 服务时，它可能返回一个 HTML 文档。如果 Web 服务宕机或防火墙限制了访问，就会返回 HTML\
  \ 文档。\n试图将 HTML 文档当作 JSON 文档来解析，必然会引发异常。在处理 JSON 文档之前，建议先存储响应，然后在加载后再决定如何处理该文档。首先将结果转储到临时暂存表还有一个好处：调用\
  \ Web 服务的耗时不会超过实际需要。文档的处理可以推迟到以后进行。当解析 JSON 文档需要相当长的时间时，这一点尤其有用。\n\n### 选择哪种数据类型？\n\
  \n由于 JSON 文档只是文本，但采用特殊格式，大多数开发人员倾向于将其存储在“可读”的东西中，例如`VARCHAR2`或`CLOB`列，但这可能并非总是最佳选择。\n\
  将 JSON 文档存储在文本列中，对于检查文档内容非常方便。你不需要特殊的查询来提取相关信息，只需选择该列即可检查 JSON 文档。\n当你只处理非常小的 JSON\
  \ 文档（小于 4000 字节）时，`VARCHAR2`列就足够了。稍大的文档（启用扩展数据类型后，最大可达 32,767 字节）也可以存储在`VARCHAR2`列中。\n\
  如果需要存储大于 32K 的文档，那么请选择`BLOB`列。此建议在使用 Oracle Database 19c 或更低版本时尤其适用。对于 Oracle Database\
  \ 21c（或更高版本），Oracle 推荐使用原生 JSON 数据类型。\n为什么选择`BLOB`而不是`CLOB`列？主要原因是存储空间。`CLOB`列使用`UCS2`（类似于`UTF16`）对字符进行编码，这意味着每个字符占用两个字节。这可能导致你原本\
  \ 100 字节的 JSON 文档，存储在`CLOB`列中会占用 200 字节。\n文本格式的 JSON 使用 Unicode 编码（`UTF-8`或`UTF-16`），但加载到数据库时会自动转换为`UTF-8`。`BLOB`列则按原样存储\
  \ JSON 文档，避免了字符集转换。这比`CLOB`列占用更少空间，加载所需的 IO 也更少。\n使用`BLOB`列有一个缺点，主要是对于需要检查整个 JSON\
  \ 文档的开发人员来说，因为二进制数据不易阅读。你需要类似如下的查询使 JSON 文档可读：\n```\nselect json_query\n(stg.json_payload\n\
  ,'$' returning clob pretty)\nfrom staging stg\n/\n```\n此查询将 JSON 文档作为`CLOB`返回，并带有良好的格式，包含换行和缩进。\n\
  \n### JSON 约束\n\n无论你使用哪种数据类型存储 JSON 文档，都希望确保其中包含的值是格式正确的 JSON 文档。对于原生 JSON 数据类型，只要\
  \ JSON 文档中使用的键是唯一的，此约束是隐式的。\n让我们看一个实现 JSON 检查约束的示例，从一个包含`VARCHAR2`列的表开始。\n```\n\
  create table json_test\n(json_document varchar2(500))\n/\n```\n实现以下检查约束，以确保仅在`json_document`列中存储\
  \ JSON 文档。\n```\nalter table json_test\nadd constraint jt_chk check (json_document\
  \ is json)\n/\n```\n`is json`条件确保输入数据遵循格式良好的 JSON 格式。考虑以下插入语句。\n```\ninsert into\
  \ json_test\nvalues ('{\ndriverId: \"max_verstappen\",\n\"permanentNumber\": \"\
  33\",\n\"code\": \"VER\",\n\"url\": \"http://en.wikipedia.org/wiki/Max_Verstappen\"\
  ,\n\"givenName\": \"Max\",\n\"familyName\": \"Verstappen\",\n\"dateOfBirth\": \"\
  1997-09-30\",\n\"nationality\": \"Dutch\"\n}')\n/\n1 row inserted.\n```\n在此 JSON\
  \ 文档中，第一个键（driverId）没有引号，而所有其他键都有引号。这是不正确的，因为所有键都应该用引号括起来。不幸的是，并非每个人都遵循此标准，因此你可能会收到键未加引号的数据。默认情况下，`is\
  \ json`检查以宽容模式工作，允许键不加引号。\n这种行为并非总是可取的，你可能希望阻止它。在这种情况下，应如下创建约束。\n```\nalter table\
  \ json_test\nadd constraint jt_chk check (json_document is json strict)\n/\n```\n\
  在检查约束定义中添加`strict`关键字，可防止键不加引号。\n尝试执行相同的插入语句会引发异常。\n```\ninsert into json_test\n\
  values ('{\ndriverId: \"max_verstappen\",\n\"permanentNumber\": \"33\",\n\"code\"\
  : \"VER\",\n\"url\": \"http://en.wikipedia.org/wiki/Max_Verstappen\",\n\"givenName\"\
  : \"Max\",\n\"familyName\": \"Verstappen\",\n\"dateOfBirth\": \"1997-09-30\",\n\"\
  nationality\": \"Dutch\"\n}')\n/\nError starting at line : 1 in command -\ninsert\
  \ into json_test\nvalues ('{\ndriverId: \"max_verstappen\",\n\"permanentNumber\"\
  : \"33\",\n\"code\": \"VER\",\n\"url\": \"http://en.wikipedia.org/wiki/Max_Verstappen\"\
  ,\n\"givenName\": \"Max\",\n\"familyName\": \"Verstappen\",\n\"dateOfBirth\": \"\
  1997-09-30\",\n\"nationality\": \"Dutch\"\n}')\nError report -\nORA-02290: check\
  \ constraint (BOOK.JT_CHK) violated\n```\n在检查约束中添加了`strict`后，不再允许键不加引号。\n不幸的是，JSON\
  \ 规范没有提及重复键的问题。以下插入语句创建了一个技术上正确的 JSON 文档。\n```\ninsert into json_test\nvalues ('{\n\
  \"driverId\": \"max_verstappen\",\n\"driverId\": \"lewis_hamilton\",\n\"permanentNumber\"\
  : \"33\",\n\"code\": \"VER\",\n\"url\": \"http://en.wikipedia.org/wiki/Max_Verstappen\"\
  ,\n\"givenName\": \"Max\",\n\"familyName\": \"Verstappen\",\n\"dateOfBirth\": \"\
  1997-09-30\",\n\"nationality\": \"Dutch\"\n}')\n/\n1 row inserted.\n```\n在上述插入语句的\
  \ JSON 文档中，键“driverId”出现了两次，如你所见，这是允许的。尽管允许，但你可以想象，这是非常不可取的。幸运的是，JSON 文档中出现重复键的情况很少发生。\n\
  修改检查约束可以防止重复键。\n```\nalter table json_test\nadd constraint jt_chk check\n(json_document\
  \ is json with unique keys)\n```\n添加`with unique keys`检查约束可确保键在 JSON 文档中只出现一次。\n\
  \n### 内部机制\n\n在向列添加正确的 JSON 检查约束后，这些列在数据字典中将显示为 JSON 列。你可以通过三个数据字典表来检查这些 JSON 列：\n\
  *   `USER_JSON_COLUMNS`\n*   `ALL_JSON_COLUMNS`\n*   `DBA_JSON_COLUMNS`\n\n让我们看看当你创建不同的数据类型来存储\
  \ JSON 文档并添加适当的 `is json` 检查约束时，数据字典会显示什么。首先是原生 JSON 数据类型。\n\n```\ncreate table\
  \ native_json\n(json_document json)\n```\n\n这个列不需要检查约束来确保输入的数据是格式良好的 JSON。查询数据字典时，你会看到以下结果。\n\
  \n```\nselect object_type\n,column_name\n,format\n,data_type\nfrom user_json_columns\n\
  where table_name = 'NATIVE_JSON'\n/\nOBJECT_TYPE COLUMN_NAME              FORMAT\
  \    DATA_TYPE\n----------- ------------------------ --------- -------------\nTABLE\
  \       JSON_DOCUMENT            OSON      JSON\n```\n\n结果集中突出的是 `FORMAT` 列。原生 JSON\
  \ 数据类型的格式是 `OSON`。Oracle 使用这种内部二进制格式来加载和扫描 JSON 文档。这种 `OSON` 格式是 Oracle 独有的。\n\n\
  由于 `OSON` 是 JSON 文档的二进制表示，这是否意味着当你使用 `BLOB` 列来保存数据时，它也以 `OSON` 格式存储？让我们接下来检查这一点。\n\
  \n```\ncreate table blob_json\n(json_document blob)\n/\nalter table blob_json\n\
  add constraint blob_chk check (json_document is json)\n/\n```\n\n`BLOB_JSON` 表在\
  \ `JSON_DOCUMENT` 列上有一个检查约束以确保其为 JSON。数据字典揭示了以下信息。\n\n```\nselect object_type\n\
  ,column_name\n,format\n,data_type\nfrom user_json_columns\nwhere table_name = 'BLOB_JSON'\n\
  /\nOBJECT_TYPE COLUMN_NAME              FORMAT    DATA_TYPE\n----------- ------------------------\
  \ --------- -------------\nTABLE       JSON_DOCUMENT            TEXT      BLOB\n\
  ```\n\n简短的回答：否，`BLOB` 列使用文本格式来存储 JSON 文档。如前所述，它按原样存储 JSON 文档，不进行字符集转换。\n\n对于其他数据类型，`VARCHAR2`\
  \ 和 `CLOB` 也是如此。这些列使用 `TEXT` 格式。\n\n```\ncreate table clob_json\n(json_document\
  \ clob)\n/\nalter table clob_json\nadd constraint clob_chk check (json_document\
  \ is json)\n/\ncreate table varchar2_json\n(json_document varchar2(4000))\n/\nalter\
  \ table varchar2_json\nadd constraint varchar2_chk check (json_document is json)\n\
  /\nselect object_type\n,column_name\n,format\n,data_type\nfrom user_json_columns\n\
  where table_name in ('CLOB_JSON', 'VARCHAR_JSON')\n/\nOBJECT_TYPE COLUMN_NAME  \
  \            FORMAT    DATA_TYPE\n----------- ------------------------ ---------\
  \ -------------\nTABLE       JSON_DOCUMENT            TEXT      CLOB\nTABLE    \
  \   JSON_DOCUMENT            TEXT      VARCHAR2\n```\n\n在数据字典中，当一个列在投影 JSON 文档时，对象也会出现。假设你有一个暂存表，包含\
  \ JSON 和非 JSON 数据。两个视图覆盖此表：一个只暴露 JSON 数据，另一个只暴露非 JSON 数据。以下表定义用于此示例。\n\n```\ncreate\
  \ table no_constraint_json\n(document clob)\n/\n```\n\n`document` 列保存 JSON 或非 JSON\
  \ 数据。覆盖视图定义如下。\n\n```\ncreate view json_view\nas\nselect treat (document as json)\
  \ as json_document\nfrom no_constraint_json\nwhere document is json\n/\ncreate view\
  \ non_json_view\nas\nselect document\nfrom no_constraint_json\nwhere document is\
  \ not json\n/\n```\n\n视图中的 `where` 条件决定了哪些数据通过视图暴露。请注意，暴露 JSON 文档的视图使用了 `treat`\
  \ 函数将 `DOCUMENT` 列投影为 JSON。\n\n`JSON_VIEW` 出现在 `USER_JSON_COLUMNS` 数据字典视图中，其特征与使用\
  \ `CLOB` 作为存储 JSON 文档的数据类型时类似。\n\n```\nselect object_type\n,column_name\n,format\n\
  ,data_type\nfrom user_json_columns\nwhere table_name = 'JSON_VIEW'\n/\nOBJECT_TYPE\
  \ COLUMN_NAME              FORMAT    DATA_TYPE\n----------- ------------------------\
  \ --------- -------------\nVIEW        JSON_DOCUMENT            TEXT      CLOB\n\
  ```\n\n在视图定义中使用 `treat`，此技术可用于 Oracle Database 21 之前的版本。从版本 21 开始，你也可以使用 `JSON`\
  \ 构造函数将列投影为原生 JSON 格式。\n\n```\ncreate view native_json_view\nas\nselect json (document)\
  \ as json_document\nfrom no_constraint_json\nwhere document is json\n/\nView NATIVE_JSON_VIEW\
  \ created.\nselect object_type\n,column_name\n,format\n,data_type\nfrom user_json_columns\n\
  where table_name = 'NATIVE_JSON_VIEW'\n/\nOBJECT_TYPE COLUMN_NAME              FORMAT\
  \    DATA_TYPE\n----------- ------------------------ --------- -------------\nVIEW\
  \        JSON_DOCUMENT            OSON      JSON\n```\n\n如数据字典视图中的结果所示，现在视图以 `OSON`\
  \ 格式暴露 JSON 列。\n\n**提示** 当你为 JSON 文档列选择名称时，添加一些标识以便于识别。例如，总是将它们命名为 `JSON_DOCUMENT`\
  \ 或添加标识其为 JSON 的后缀。这样，你可以使用数据字典视图 `*_JSON_COLUMNS` 和 `*_TAB_COLUMNS` 来识别那些应该具有 `is\
  \ json` 检查约束但缺失的列。\n\n```\ninsert into json_test\nvalues ('{\n\"driverId\": \"max_verstappen\"\
  ,\n\"driverId\": \"lewis_hamilton\",\n\"permanentNumber\": \"33\",\n\"code\": \"\
  VER\",\n\"url\": \"http://en.wikipedia.org/wiki/Max_Verstappen\",\n\"givenName\"\
  : \"Max\",\n\"familyName\": \"Verstappen\",\n\"dateOfBirth\": \"1997-09-30\",\n\"\
  nationality\": \"Dutch\"\n}')\n/\nError starting at line : 1 in command -\ninsert\
  \ into json_test\nvalues ('{\n\"driverId\": \"max_verstappen\",\n\"driverId\": \"\
  lewis_hamilton\",\n\"permanentNumber\": \"33\",\n\"code\": \"VER\",\n\"url\": \"\
  http://en.wikipedia.org/wiki/Max_Verstappen\",\n\"givenName\": \"Max\",\n\"familyName\"\
  : \"Verstappen\",\n\"dateOfBirth\": \"1997-09-30\",\n\"nationality\": \"Dutch\"\n\
  }')\nError report -\nORA-02290: check constraint (BOOK.JT_CHK) violated\n```\n\n\
  键的唯一性只适用于可能发生歧义的相同层级。因此，即使在以下插入语句中，`driverId`、`givenName` 和 `familyName` 键在 JSON\
  \ 文档中多次出现，但它们位于不同的层级，因此是被允许的。\n\n```\ninsert into json_test\nvalues ('{\n\"driverId\"\
  : \"max_verstappen\",\n\"permanentNumber\": \"33\",\n\"code\": \"VER\",\n\"url\"\
  : \"http://en.wikipedia.org/wiki/Max_Verstappen\",\n\"givenName\": \"Max\",\n\"\
  familyName\": \"Verstappen\",\n\"dateOfBirth\": \"1997-09-30\",\n\"nationality\"\
  : \"Dutch\",\n\"teammate\": {\"driverId\": \"sergio_perez\",\n\"givenName\": \"\
  Sergio\",\n\"familyName\": \"Pérez\"\n}\n}')\n/\n1 row inserted.\n```\n\n你可以在检查约束中指定\
  \ `strict` 和 `with unique keys`。这确保所有键都被引号包围，并且在 JSON 文档中只出现一次。\n\n原生 JSON 数据类型，添加于\
  \ Oracle Database 21，是一种受约束的数据类型。除了显而易见的 `is json` 约束外，只隐含了 `with unique keys`。当使用\
  \ JSON 数据类型时，无法强制执行 `strict` 条件或禁用 `with unique keys` 条件。存储在 JSON 列中的 JSON 文档键被引号包围，即使原始文本中的键没有引号。\n\
  \n\n### TREAT 与 JSON 构造函数之间的主要区别\n\n在 Oracle Database 21 中，使用 JSON 构造函数将列（`VARCHAR2`、`CLOB`、`BLOB`）映射到\
  \ `JSON` 数据类型，听起来似乎不假思索。因为它使用 `OSON` 内部二进制格式，所以这必定是将任何字符串转换为 `JSON` 的最佳方式。而 `treat`\
  \ 函数则将其转换为 `JSON`，但仍使用 `TEXT` 格式来生成 JSON 文档。\n\n这两种选项的行为存在重大差异。让我们重新审视那个包含 JSON\
  \ 和非 JSON 数据的表，以及覆盖该表的视图。这次，我们使用两个视图将列映射到 `JSON` 数据类型，一个使用 `treat` 函数，另一个使用 JSON\
  \ 构造函数。\n\n```sql\ncreate table staging_table\n(document varchar2(500))\n/\n```\n\
  \n同时，向该表添加一些数据，一行是格式正确的 JSON 数据，另一行则不是。\n\n```sql\ninsert into staging_table\nvalues\
  \ ('{\"this\":\"that\"}')\n/\ninsert into staging_table\nvalues ('this is surely\
  \ no json data')\n/\n```\n\n对于覆盖该表的视图，使用以下定义。\n\n```sql\ncreate or replace\nview\
  \ treat_json_view\nas\nselect treat (document as json) as document\nfrom staging_table\n\
  /\ncreate or replace\nview native_json_view\nas\nselect json (document) as document\n\
  from staging_table\n/\n```\n\n请注意，两个视图定义都没有谓词来过滤掉有效的 JSON 数据。所有数据，无论是 JSON 还是非 JSON，都通过视图暴露出来。\n\
  \n查询使用 `treat` 函数的视图时，会从底层表返回所有数据，甚至是那些明显不是 JSON 的数据。\n\n```sql\nselect *\nfrom\
  \ treat_json_view\n/\n```\n\n```\nDOCUMENT\n------------------------------------------------------------\n\
  {\"this\":\"that\"}\nthis is surely no json data\n```\n\n另一个将列映射到原生 `JSON` 的视图行为则不同。在下面的\
  \ `SELECT` 语句中，你会看到抛出了一个异常。\n\n```sql\nselect *\nfrom native_json_view\n/\n```\n\
  \n```\nError starting at line : 1 in command -\nselect *\nfrom native_json_view\n\
  Error report -\nORA-40441: JSON syntax error\n```\n\n添加一个谓词来过滤 JSON 文档，仍然会导致相同的异常。\n\
  \n```sql\nselect *\nfrom native_json_view\nwhere document is json\n/\n```\n\n```\n\
  Error starting at line : 1 in command -\nselect *\nfrom native_json_view\nwhere\
  \ document is json\nError report -\nORA-40441: JSON syntax error\n```\n\n实际上，除非修改该视图，仅使用带有\
  \ `is json` 谓词的 `where` 子句来暴露 JSON 文档，否则该视图无法使用。这里的经验教训是，在覆盖包含 JSON 和非 JSON 数据的表，并应用函数将其转换为\
  \ `JSON` 时，需要格外小心。\n\n### 确定结构\n\n一旦将 JSON 文档加载到数据库中，其结构可能未知。要获取结构信息，你可以使用聚合函数 `json_dataguide`\
  \ 来辅助理解。\n\n我们的示例采用了 Ergast Developer API ([`http://ergast.com/mrd/`](http://ergast.com/mrd/))\
  \ Web 服务返回的 JSON 文档。该 Web 服务提供一级方程式数据。如何调用此 Web 服务在第 15 章有概述。\n\n在表 `native_json`\
  \ 中，我加载了所有已完成赛季（1950 – 2021）的车手积分榜。请参考本书 GitHub 页面可下载的 `load_json_docs.sql` 代码文件。\n\
  \n使用聚合函数 `json_dataguide`，可以返回有关 JSON 结构的信息。`json_dataguide` 分析表中的所有 JSON 文档，识别每个属性、其类型、长度以及检索它所需的路径。结果是另一个称为\
  \ JSON 模式的 JSON 文档。目前没有内置功能来验证此 JSON 模式，也没有功能根据此 JSON 模式验证传入的 JSON 文档。\n\n以下查询显示了\
  \ JSON 模式的开头部分（为简洁起见，省略了其余部分）。\n\n```sql\nselect json_dataguide (json_document)\
  \ as guide\nfrom native_json\n/\n```\n\n```\nGUIDE\n--------------------------------------------------------------------------------\n\
  [{\"o:path\":\"$\",\"type\":\"object\",\"o:length\":1},{\"o:path\":\"$.MRData\"\
  ,\"type\":\"object\n```\n\n由于结果是另一个 JSON 文档，因此很容易以关系格式获取结果（未列出所有结果）。\n\n```sql\n\
  with dataguide\nas\n(select json_dataguide (json_document) as guide\nfrom native_json)\n\
  select jt.*\nfrom dataguide dg\ncross\njoin json_table (dg.guide, '$[*]'\ncolumns\
  \ (\njson_path path '$.\"o:path\"'\n,json_type path '$.\"type\"'\n,len       path\
  \ '$.\"o:length\"'\n)\n) jt\n/\n```\n\n```\nJSON_PATH                          \
  \            JSON_TYPE    LEN\n---------------------------------------------- ------------\
  \ ---\n$                                              object       1\n$.MRData \
  \                                      object       1\n$.MRData.url            \
  \                       string       64\n$.MRData.limit                        \
  \         string       4\n$.MRData.total                                 string\
  \       4\n$.MRData.xmlns                                 string       32\n$.MRData.offset\
  \                                string       1\n$.MRData.series               \
  \                 string       2\n$.MRData.StandingsTable                      \
  \  object       1\n$.MRData.StandingsTable.season                 string       4\n\
  $.MRData.StandingsTable.StandingsLists         array        1\n$.MRData.StandingsTable.StandingsLists.round\
  \   string       2\n$.MRData.StandingsTable.StandingsLists.season  string      \
  \ 4\n```\n\n对 JSON 文档的分析显示，顶层（`$`）是一个 JSON 对象，而 `limit` 属性是一个字符串，`StandingsLists`\
  \ 是一个数组。JSON 路径表达式可以从 JSON 文档中提取值。\n\n因为 `json_dataguide` 分析所有 JSON 文档，所以完成分析可能需要相当长的时间。也可以使用\
  \ JSON 搜索索引永久存储数据指南。\n\n要创建支持数据指南的搜索索引，请执行以下语句。\n\n```sql\ncreate search index standing_idx\
  \ on\nnative_json (json_document)\nfor json parameters ('dataguide on')\n/\n```\n\
  \n有了数据指南，你就拥有了将 JSON 文档映射为关系格式所需的所有信息。`DBMS_JSON` 包中有两个过程可以为你生成视图。\n\n*   `CREATE_VIEW`。此过程根据你作为参数传入的数据指南，创建一个包含关系列的视图。数据指南参数可通过\
  \ `json_dataguide` 创建。当存在支持数据指南的搜索索引时，也可以使用此过程。在这种情况下，你需要使用 `dbms_json.get_index_dataguide`\
  \ 函数作为参数传入。数据指南参数必须采用分层格式。\n\n\n# CREATE_VIEW_ON_PATH 过程\n\n`CREATE_VIEW_ON_PATH`\
  \ 过程基于启用了数据指南的搜索索引创建一个包含关系列的视图。这种方法更灵活，因为您可以传入用于创建视图的 JSON 路径表达式和一个最小频率阈值。该频率阈值由对\
  \ JSON 文档收集的统计信息指导。\n\n您可以运行以下语句，在具有启用了数据指南的搜索索引的表中为 JSON 文档生成一个视图。\n\n```sql\n\
  begin\ndbms_json.create_view\n(viewname  => 'standingsview'\n,tablename => 'native_json'\n\
  ,jcolname  => 'json_document'\n,dataguide => dbms_json.get_index_dataguide\n(tablename\
  \ => 'native_json'\n,jcolname  => 'json_document'\n,format    => dbms_json.format_hierarchical\n\
  )\n);\nend;\n/\n```\n\n创建的视图具有以下结构。\n\n```\nName                          Null?\
  \    Type\n----------------------------- -------- -------------\nID            \
  \                NOT NULL NUMBER\nJSON_DOCUMENT$url                      VARCHAR2(64)\n\
  JSON_DOCUMENT$limit                    VARCHAR2(4)\nJSON_DOCUMENT$total        \
  \            VARCHAR2(4)\nJSON_DOCUMENT$xmlns                    VARCHAR2(32)\n\
  JSON_DOCUMENT$offset                   VARCHAR2(1)\nJSON_DOCUMENT$series       \
  \            VARCHAR2(2)\nJSON_DOCUMENT$season                   VARCHAR2(4)\nJSON_DOCUMENT$round\
  \                    VARCHAR2(2)\nJSON_DOCUMENT$season_1                 VARCHAR2(4)\n\
  JSON_DOCUMENT$wins                     VARCHAR2(2)\nJSON_DOCUMENT$url_2        \
  \            VARCHAR2(128)\nJSON_DOCUMENT$code                     VARCHAR2(4)\n\
  JSON_DOCUMENT$driverId                 VARCHAR2(32)\nJSON_DOCUMENT$givenName   \
  \             VARCHAR2(32)\nJSON_DOCUMENT$familyName               VARCHAR2(32)\n\
  JSON_DOCUMENT$dateOfBirth              VARCHAR2(16)\nJSON_DOCUMENT$nationality \
  \             VARCHAR2(32)\nJSON_DOCUMENT$permanentNumber          VARCHAR2(2)\n\
  JSON_DOCUMENT$points                   VARCHAR2(8)\nJSON_DOCUMENT$position     \
  \            VARCHAR2(4)\nJSON_DOCUMENT$positionText             VARCHAR2(4)\nJSON_DOCUMENT$url_3\
  \                    VARCHAR2(128)\nJSON_DOCUMENT$name                     VARCHAR2(32)\n\
  JSON_DOCUMENT$nationality_4            VARCHAR2(16)\nJSON_DOCUMENT$constructorId\
  \            VARCHAR2(32)\n```\n\n所有列名都基于数据指南，并且区分大小写。要查询视图，您必须在列名上使用引号。\n\n```sql\n\
  select \"JSON_DOCUMENT$url\"\nfrom standingsview\n/\n```\n\n正如您能想到的，这远非理想情况。可以使用过程\
  \ `dbms_json.rename_column` 重命名列。但是，有一个注意事项：这需要在视图（重新）创建之前完成，并且只能在存在已启用数据指南的搜索索引（该索引已创建）时进行。\n\
  \n> 提示\n>\n> 您可以多次运行 `dbms_json.create_view` 而无需先删除视图。这会自动为您处理。\n\n您可以使用以下语句重命名列。\n\
  \n```sql\nbegin\ndbms_json.rename_column\n(tablename.     => 'native_json'\n,jcolname\
  \       => 'json_document'\n,path           => '$.MRData.url'\n,type           =>\
  \ dbms_json.type_string\n,preferred_name => 'URL'\n);\nend;\n/\n```\n\n请注意，前面代码中的\
  \ `preferred_name` 参数区分大小写。当您为列指定小写名称时，它会按原样创建，从而使列再次区分大小写。\n\n当为您创建视图时，JSON 文档中的所有数组都会被取消嵌套。这意味着原始的\
  \ 71 个 JSON 文档现在变成了超过 3000 行。当您检查视图定义、`JSON_TABLE` 与用于展开 JSON 文档的几个 `NESTED PATH`\
  \ 表达式结合使用时，可以观察到这一点。这是 `FROM` 子句的摘录。为简洁起见，大多数列已被移除。\n\n```sql\nfrom\n\"BOOK\".\"\
  NATIVE_JSON\" rt,\njson_table ( \"JSON_DOCUMENT\", '$[*]'\ncolumns\n\"URL\" varchar2\
  \ ( 64 ) path '$.MRData.url',\n...\nnested path '$.MRData.StandingsTable.StandingsLists[*]'\n\
  columns (\n\"JSON_DOCUMENT$season_1\" varchar2 ( 4 ) path '$.season',\nnested path\
  \ '$.DriverStandings[*]'\ncolumns (\n\"JSON_DOCUMENT$wins\" varchar2 ( 2 ) path\
  \ '$.wins',\n...\nnested path '$.Constructors[*]'\ncolumns (\n\"JSON_DOCUMENT$url_3\"\
  \ varchar2 ( 128 ) path '$.url',\n...\n),\n...\n)))   jt\n```\n\n### 索引 JSON 文档\n\
  \n由于 JSON 文档可能相当大，对其进行索引以快速查找所需内容是有意义的。\n\n有几种索引 JSON 文档的方法，您选择的方法很大程度上取决于您的需求。本节探讨其中几种技术。\n\
  \n为了生成以下各节中不同查询的执行计划，每条语句都按如下方式运行。\n\n```sql\nexplain plan for\n<statement>\n```\n\
  \n要检查执行计划，使用以下查询。\n\n```sql\nselect *\nfrom dbms_xplan.display (format => 'BASIC')\n\
  /\n```\n\n基本格式显示最少的信息，例如操作和名称，这足以演示特定索引的使用。\n\n#### 查找特定键值\n\n假设你需要查询某个特定赛季。\n\n\
  ```sql\nselect *\nfrom native_json\nwhere json_value (\n    json_document\n    ,'$.MRData.StandingsTable.StandingsLists.season'\n\
  ) = :season\n/\n```\n\n这个查询的执行计划显示需要进行全表扫描。目前看来，没有其他方式可以获取该信息。\n\n```sql\n| Id \
  \ | 操作              | 名称         |\n|---|---|---|\n|   0 | SELECT STATEMENT  | \
  \             |\n|   1 |  全表扫描          | NATIVE_JSON |\n```\n\n要为此查询创建索引，你可以使用查询中相同的表达式创建一个基于函数的索引。\n\
  \n```sql\ncreate index race_season_idx on\nnative_json (\n    json_value ( json_document\n\
  \    ,'$.MRData.StandingsTable.StandingsLists.season' )\n)\n/\n```\n\n这种技术只能为每个\
  \ JSON 文档索引一个值。数组无法用这种方式索引。并且，由于无法保证 JSON 文档始终保持不变（Web 服务的创建者可能会改变主意），这可能导致意外的结果。以下是一种更好、更清晰的方式来定义这个索引。\n\
  \n```sql\ncreate index race_season_idx on\nnative_json (\n    json_value (\n   \
  \     json_document\n        ,'$.MRData.StandingsTable.StandingsLists.season'\n\
  \        error on error\n        null on empty\n    )\n)\n/\n```\n\n有了这个索引后，执行计划发生了变化，你可以看到*索引范围扫描*。\n\
  \n```sql\n| Id  | 操作                             | 名称             |\n|---|---|---|\n\
  |   0 | SELECT STATEMENT                 |                  |\n|   1 |  通过索引 ROWID\
  \ 批量访问表         | NATIVE_JSON      |\n|   2 |   索引范围扫描                    | RACE_SEASON_IDX\
  \  |\n```\n\n关于索引能否被使用，有相同的规则适用。其中之一是索引列的数据类型与谓词中用作绑定变量的数据类型是否匹配。\n\n在前面的例子中，`season`属性被索引，其数据类型是`VARCHAR2(4000)`。这意味着当查询谓词将索引列与数字进行比较时，索引无法被使用。\n\
  \n```sql\nwhere json_value (\n    json_document\n    ,'$.MRData.StandingsTable.StandingsLists.season'\n\
  ) = 1969 --<-- number\n/\n\n| Id  | 操作              | 名称         |\n|---|---|---|\n\
  |   0 | SELECT STATEMENT  |              |\n|   1 |  全表扫描          | NATIVE_JSON\
  \ |\n```\n\n谓词需要将索引值与字符串进行比较。\n\n```sql\nwhere json_value (\n    json_document\n\
  \    ,'$.MRData.StandingsTable.StandingsLists.season'\n) = '1969' --<-- string\n\
  /\n\n| Id  | 操作                             | 名称             |\n|---|---|---|\n\
  |   0 | SELECT STATEMENT                 |                  |\n|   1 |  通过索引 ROWID\
  \ 批量访问表         | NATIVE_JSON      |\n|   2 |   索引范围扫描                    | RACE_SEASON_IDX\
  \  |\n```\n\n当你将索引定义改为使用`number()`项方法时，你明确指定了索引值是数值类型。对于编写查询的人来说，因为他们需要使用与基于函数的索引中定义的相同的表达式，所以也很清楚在比较中应该使用数值。\n\
  \n```sql\ncreate index race_season_idx on\nnative_json (\n    json_value (\n   \
  \     json_document\n        ,'$.MRData.StandingsTable.StandingsLists.season.number()'\n\
  \        error on error\n        null on empty\n    )\n)\n/\n```\n\n使用此索引进行测试后发现，即使你在谓词中使用字符串，索引仍然会被使用。只要\
  \ JSON 路径表达式与基于函数的索引中的表达式相同，这就是成立的。\n\n这种索引类型，即基于函数的索引，在你确切知道要查找什么时是有效的。这听起来像是一个缺点，但在实际处理\
  \ JSON 文档时，你通常确实知道自己要找什么。\n\n#### 使用 JSON 搜索索引进行即时搜索\n\n从 Oracle Database 12.2 开始，可以使用\
  \ JSON 搜索索引来索引 JSON 文档。其行为类似于 Oracle Text 索引，因此可能看起来很熟悉。在后台，会为 JSON 文档创建一个 Oracle\
  \ Text 索引。\n\nJSON 搜索索引的语法非常简单，但效果很好。\n\n```sql\ncreate search index standing_idx\
  \ on\nnative_json (\n    json_document\n)\nfor json\n/\n```\n\n创建 JSON 搜索索引可能需要一些时间，并且它会在你的模式中创建各种`DR$`表，类似于\
  \ Oracle Text。\n\n**提示**\n\n要将持久化的数据指南信息作为 JSON 搜索索引的一部分创建，你可以在`parameters`子句中指定。\n\
  \n```sql\ncreate search index standing_idx on native_json (json_document) for json\
  \ parameters ('dataguide on');\n```\n\n或者，你也可以稍后通过重建 JSON 搜索索引来完成。\n\n```sql\nalter\
  \ index standing_idx rebuild parameters ('dataguide on');\n```\n\n一旦索引创建完成，你就可以查询出现在\
  \ JSON 文档中任何位置的任何属性。例如，让我们搜索任何提到“verstappen”的 JSON 文档。\n\n```sql\nselect *\nfrom\
  \ native_json\nwhere json_textcontains (\n    json_document\n    ,'$'\n    ,'verstappen'\n\
  )\n/\n```\n\n正如你在前面的查询中看到的，就像使用 Oracle Text 一样，你可以使用一个特殊的谓词来利用 JSON 搜索索引，尽管这并非严格必要。\n\
  \n```sql\n| Id  | 操作                      | 名称          |\n|---|---|---|\n|   0\
  \ | SELECT STATEMENT          |               |\n|   1 |  通过索引 ROWID 访问表      |\
  \ NATIVE_JSON   |\n|   2 |   域索引                  | STANDING_IDX  |\n```\n\n重要的是要知道，你搜索的词需要精确匹配。传递“stap”作为搜索词不会产生任何结果。搜索“VER”或“ver”会产生结果，仅仅因为那是静态的车手代码，就像“HAM”代表汉密尔顿，“LEC”代表勒克莱尔一样（尽管在\
  \ 1973 年和 1977 年也有一个制造商（LEC Refrigeration）拥有相同的标识）。\n\n即使你使用`json_value`在谓词中查询 JSON\
  \ 文档，JSON 搜索索引也可以被使用（在此示例中，之前创建的基于函数的索引已被删除）。\n\n```sql\nselect *\nfrom native_json\n\
  where json_value (\n    json_document\n    , '$.MRData.StandingsTable.StandingsLists.season'\n\
  ) = :season\n/\n```\n\n这会显示以下执行计划。\n\n```sql\n| Id  | 操作                      |\
  \ 名称          |\n|---|---|---|\n|   0 | SELECT STATEMENT          |            \
  \   |\n|   1 |  通过索引 ROWID 访问表      | NATIVE_JSON   |\n|   2 |   域索引           \
  \       | STANDING_IDX  |\n```\n\n#### 多值索引\n\n当使用 JSON 数据类型存储 JSON 文档时，还可以创建多值索引来优化使用\
  \ `json_exists` 条件的查询，无论是单独作为标量值还是位于数组中。\n\n以下示例创建了一个包含所有 F1 世界冠军的表。\n\n```\ncreate\
  \ table f1_champions\n(driver varchar2(50)\n,season json\n)\n/\n```\n\n在 `season`\
  \ JSON 列中，存储了一个 JSON 文档，列出了该车手获得世界冠军的所有赛季，例如：\n\n```\n{\"winner\":[1994, 1995, 2000,\
  \ 2001, 2002, 2003, 2004]}\n```\n\n要查询所有自 2010 年以来成为世界冠军的车手，可以编写带有 `json_exists`\
  \ 条件的查询。\n\n```\nselect driver\nfrom f1_champions f\nwhere json_exists (f.season\n\
  ,'$.winner?(@.number() >= 2010)')\n/\nDRIVER\n--------------------\nSebastian Vettel\n\
  Lewis Hamilton\nNico Rosberg\nMax Verstappen\n```\n\n多值索引可以有效地搜索所有 JSON 文档。为确保查询能使用多值索引，索引必须指定要索引的数据类型，且查询谓词必须与索引指定的类型匹配。在这种情况下，可以使用\
  \ JSON 路径表达式中的点表示法创建多值索引。\n\n```\ncreate multivalue index season_idx on f1_champions\
  \ f\n(f.season.winner.number())\n/\n```\n\n用于查找自 2010 年以来所有 F1 冠军的查询的执行计划如下。\n\n\
  ```\n| Id  | Operation                           | Name         |\n|-----|-------------------------------------|--------------|\n\
  |   0 | SELECT STATEMENT                    |              |\n|   1 |  TABLE ACCESS\
  \ BY INDEX ROWID BATCHED| F1_CHAMPIONS |\n|   2 |   HASH UNIQUE                \
  \       |              |\n|   3 |    INDEX RANGE SCAN (MULTI VALUE)   | SEASON_IDX\
  \   |\n```\n\n多值索引也可以索引标量值，但一个简单的基于函数的索引通常就足够了。\n\n### 本章小结\n\n本章介绍了在 Oracle 数据库中存储\
  \ JSON 文档时的不同选择以及一些索引 JSON 文档的技术。通过 JSON 数据指南可以熟悉 JSON 文档的结构，它可以帮助你基于 JSON 文档生成视图。存储方式的最佳选择取决于你使用的版本。当你使用\
  \ Oracle Database 21 或更高版本时，选择 JSON 数据类型是合乎逻辑的，这为创建多值索引提供了可能。\n\n## 12. JSON 中的路径表达式\n\
  \n要有效地使用 JSON，从基础功能开始很重要。最重要的一点是学习路径表达式、导航和定位正确的 JSON 键。路径表达式在 SQL 和 PL/SQL 中都是必需的。本章介绍路径表达式及其过滤功能和错误处理。最后，你将了解如何使用易于理解的\
  \ SQL 语句，通过点表示法从 JSON 文档中提取值。\n\n### 示例数据\n\n本章的示例使用了如下创建的表。\n\n```\ncreate table\
  \ f1_drivers_json\n(json_document json)\n/\n```\n\n列表 12-1 中的 JSON 文档存储在此表中。\n\n\
  ```\n{\n\"MRData\": {\n\"series\": \"f1\",\n\"DriverTable\": {\n\"Drivers\": [\n\
  {\n\"driverId\": \"coulthard\",\n\"code\": \"COU\",\n\"givenName\": \"David\",\n\
  \"familyName\": \"Coulthard\",\n\"dateOfBirth\": \"1971-03-27\",\n\"nationality\"\
  : \"British\",\n\"champion\": false,\n\"nickname\": \"DC\"\n},\n{\n\"driverId\"\
  : \"vettel\",\n\"permanentNumber\": \"5\",\n\"code\": \"VET\",\n\"givenName\": \"\
  Sebastian\",\n\"familyName\": \"Vettel\",\n\"dateOfBirth\": \"1987-07-03\",\n\"\
  nationality\": \"German\",\n\"champion\": true,\n\"nickname\": null,\n\"Constructors\"\
  : [\n{\n\"constructorId\": \"red_bull\",\n\"name\": \"Red Bull\",\n\"nationality\"\
  : \"Austrian\"\n},\n{\n\"constructorId\": \"aston_martin\",\n\"name\": \"Aston Martin\"\
  ,\n\"nationality\": \"British\"\n}]\n}\n]\n}\n}\n}\n```\n列表 12-1\n示例 JSON 文档\n\n\
  脚本 `f1_drivers_json.sql`（可在本书的 GitHub 页面上找到）创建了该表并插入了 JSON 文档。\n\n该 JSON 文档包含对象和数组。请注意，JSON\
  \ 文档中的键包含大写和小写字符。并非两位车手的所有属性都存在，例如永久号码。Coulthard 没有，而 Vettel 有。\n\n### JSON 数据类型\n\
  \nJSON 文档可以由对象、数组和/或标量值组成。\n\nJSON 文档内值的数据类型可以是 OBJECT、ARRAY 或标量类型：NUMBER、STRING、BOOLEAN\
  \ 或 NULL。\n\n从 JSON 文档中提取值时，JSON 数据类型必须映射到可比较的 SQL 数据类型才能有用。JSON 数据不能用于排序、分组或比较。\n\
  \n如何将 JSON 值映射到 SQL 数据类型由开发者决定。例如，JSON 字符串可以映射到 `VARCHAR2`、`CLOB`、`BLOB`，甚至当值为数字时可以映射到\
  \ `NUMBER`。这些 JSON 值的映射方式取决于你使用的 SQL 函数；例如，通过 `json_value` 函数的 `returning` 子句，你可以指定希望\
  \ JSON 值映射到哪种 SQL 类型。\n\n由于没有与 JSON BOOLEAN（只有 true 或 false）匹配的数据类型，开发者必须决定如何处理它，要么将其映射为\
  \ 0 和 1，要么映射为 \"true\" 或 \"false\" 字符串。\n\n可以使用 `type()` 项方法检查 JSON 数据类型，关于项方法的更多信息请参见本章相关章节。\n\
  \n\n### 路径表达式与过滤器\n\n无论您是在使用 SQL 还是 PL/SQL，在 JSON 文档中进行导航都至关重要。这是通过 JSON 路径表达式实现的。\n\
  \nJSON 路径表达式在某种程度上可与用于 XML 文档的 XQuery 或 XPath 表达式相媲美。JSON 路径表达式描述了获取目标值的路径。JSON\
  \ 路径表达式的起点由一个特殊符号定义——上下文项。JSON 路径表达式以绝对上下文项符号 (`$`) 开头，后跟零个或多个步骤。在过滤条件中，相对上下文项符号是\
  \ at 符号 (`@`)。当 JSON 路径表达式中只包含绝对上下文项符号时，即表示整个 JSON 文档。\n\nJSON 路径表达式中的每个步骤可以是对象、数组或后代步骤。这些被称为\
  \ `非函数步骤`，并用句点 (`.`) 分隔。每个 `非函数步骤` 后可以跟一个过滤表达式和/或一个函数步骤。`函数步骤`，也称为项方法，是可应用于 JSON\
  \ 路径表达式最后一个步骤的内置函数。\n\n让我们看一个仅包含 `非函数步骤` 的简单路径表达式。以下查询中的 `json_value` 函数根据 JSON\
  \ 路径表达式的指示从 JSON 文档中提取一个标量值。\n\n```\nselect json_value (\nf.json_document\n,'$.MRData.series'\n\
  ) as series\nfrom f1_drivers_json f\n/\nSERIES\n\nf1\n```\n\n该 JSON 路径表达式提取了 `series`\
  \ 字段的值。上下文项 (`$`) 后紧跟一个句点 (`.`) 以导航到 `MRData`，这是一个 JSON 对象。\n\n在下面的示例中，提取了所有车手的代码。车手代码位于\
  \ `Drivers` 数组中。要从数组中提取值，需使用方括号。方括号中的星号 (`*`) 表示要提取所有值。在这种情况下，由于结果是值的数组而非标量值，因此不能使用\
  \ `json_value` 函数，而应改用 `json_query` 函数，并搭配 `with array wrapper` 子句。查询的结果是一个 JSON\
  \ 数组。\n\n```\nselect json_query (\nf.json_document\n,'$.MRData.DriverTable.Drivers[*].code'\n\
  with array wrapper\n) as driver_codes\nfrom f1_drivers_json f\n/\nDRIVER_CODES\n\
  \n[\"COU\",\"VET\"]\n```\n\n除了在方括号中使用星号，也可以指定要提取的数组中的特定条目。由于 JSON 数组的索引从零开始，因此 `[0]`\
  \ 提取第一个值，`[1]` 提取第二个值，依此类推。也可以在方括号中指定多个索引值或一个索引值范围，如下面的示例所示。\n\n```\nselect json_query\
  \ (\nf.json_document\n,'$.MRData.DriverTable.Drivers[0 to 1].code'\nwith array wrapper\n\
  ) as codes\nfrom f1_drivers_json f\n/\nCODES\n\n[\"COU\",\"VET\"]\n```\n\n通过指定 `[0,1]`\
  \ 也能得到相同的结果。在处理 JSON 数组时，也可以使用类似 `[0,2 to 6, 10]` 的写法来提取数组中索引为第一、第三到第七以及第十一的值。\n\
  \n除了前面示例中采用的对象和数组步骤外，还有一个 `后代步骤`。`后代步骤` 由两个句点 (`..`) 组成。`后代步骤` 会递归地深入到前一步骤下的每个对象或数组中，并收集所有与字段名称匹配的字段值。以下查询提取了所有的国籍信息，无论\
  \ `nationality` 键出现在 JSON 文档的哪个位置。有些在车手信息内，另一些在 `Constructors` 对象内。\n\n```\nselect\
  \ json_query (f.json_document\n,'$..nationality'\nwith array wrapper\n) as nationalities\n\
  from f1_drivers_json f\n/\nNATIONALITIES\n\n[\"British\",\"German\",\"Austrian\"\
  ,\"British\"]\n```\n\n#### 使用过滤条件\n\n除了可用于遍历 JSON 文档的步骤外，还可以在 JSON 路径表达式中添加过滤器。当值与过滤器匹配时，它返回\
  \ `true`；否则返回 `false`。\n\n过滤表达式以问号 (`?`) 开头，后跟括号中的过滤条件。在过滤条件内部，您使用相对路径表达式，这些表达式以\
  \ at 符号 (`@`) 作为上下文项符号，而不是美元符号。\n\n一个过滤条件可能如下所示。\n\n```\n?(@.code == \"COU\")\n\
  ```\n\n将属性 `code` 与字符串 `\"COU\"` 进行相等比较。由于过滤条件应用于前面的 JSON 路径表达式，因此过滤器之前的 JSON 路径表达式很重要，它只有在所选的\
  \ JSON 对象中出现 `code` 属性时才有可能评估为 `true`。在我们的示例 JSON 文档中，`code` 属性仅出现在 `Drivers` 数组中，因此完整的\
  \ JSON 路径表达式如下。\n\n```\n$.MRData.DriverTable.Drivers[*]?(@.code == \"COU\")\n```\n\
  \n可以在过滤条件内指定多个条件，每个条件都有自己的括号。\n\n表 12-1 展示了组合过滤条件的概览。\n\n表 12-1\n\n组合过滤条件\n\n| 条件\
  \ | 含义 |\n| --- | --- |\n| ( condition ) | 使用括号进行分组，并将过滤条件与其他过滤条件分开 |\n| && | 与\
  \ (AND)；两侧的条件都必须评估为 true |\n| &#124;&#124; | 或 (OR)；必须有一个条件评估为 true，或者两个条件都评估为 true\
  \ |\n| ! ( condition ) | 条件的否定，该条件不得被满足 |\n| exists ( condition ) | 条件中的目标必须存在 |\n\
  | == | 等于 |\n| <> or != | 不等于 |\n| < | 小于 |\n| <= | 小于或等于 |\n| > | 大于 |\n| >= |\
  \ 大于或等于 |\n| has substring | 匹配的数据值包含指定的子字符串 |\n| starts with | 匹配的数据值以指定的字符串为前缀\
  \ |\n| like | 类似于 SQL `like`；`%` 匹配零个或多个字符，`_` 匹配单个字符 |\n| like_regex | 类似于 SQL\
  \ `regexp_like`。使用正则表达式将数据值与指定字符串匹配 |\n| eq_regex | 根据其正则表达式语法匹配整个 JSON 字符串数据值 |\n\
  | in (value1, value2) | 匹配的数据值是指定值列表中的一个，值列表用括号括起来，并以逗号分隔 |\n\n过滤表达式应用的层级对返回的结果有影响。以下两个过滤表达式看起来非常相似，它们具有相同的过滤条件（将\
  \ `code` 与 `\"COU\"` 进行相等比较），但结果却大不相同。\n\n```\n$.MRData.DriverTable.Drivers[*]?(@.code\
  \ == \"COU\")\n```\n\n该 JSON 路径表达式返回 `Drivers` 数组中 `code` 属性值为 `\"COU\"` 字符串的对象。\n\
  \n下面的 JSON 路径表达式返回 `DriverTable` 的对象，前提是存在一个 `Drivers` 数组，其中某个 `code` 属性的值为 `\"\
  COU\"` 字符串。\n\n```\n$.MRData.DriverTable?(@.Drivers[*].code == \"COU\")\n```\n\n\
  在查询中同时使用这两个过滤条件时，可以看到不同的结果。\n\n```\nselect json_query (f.json_document\n,'$.MRData.DriverTable\n\
  ?(@.Drivers[*].code == \"COU\")\n.Drivers[*].familyName'\nwith array wrapper\n)\
  \ as drivertable\n,json_query (f.json_document\n,'$.MRData.DriverTable\n.Drivers[*]?(@.code\
  \ == \"COU\")\n.familyName'\nwith array wrapper\n) as drivers\nfrom f1_drivers_json\
  \ f\n/\nDRIVERTABLE                    DRIVERS\n------------------------------ ------------------------------\n\
  [\"Coulthard\",\"Vettel\"]         [\"Coulthard\"]\n```\n\n\n\n### SQL/JSON 路径过滤：条件应用与变量传递\n\
  \n过滤条件并不一定作用于同一个对象。让我们看下面这个例子，其目标是检索一位英国冠军的名字（请注意，在我们这个小的示例 JSON 中，只有一位英国车手，但他不是世界冠军；另一位车手是德国人，他是世界冠军）。在\
  \ `DriverTable` 对象上使用以下过滤条件能得到结果，但并非预期的结果。\n\n```sql\n?(@.Drivers[*].champion ==\
  \ true\n&& @.Drivers[*].nationality==\"British\")\n```\n\n两个过滤条件都必须为真。这里有一个 `and`\
  \ 条件 (`&&`)。第一个过滤条件检查 `Drivers` 数组内的 `champion` 属性是否为 `true`。\n\n第二个过滤条件检查 `Drivers`\
  \ 数组内的 `nationality` 属性是否为 `British`。然而，它并没有检查这两个条件是否在 `Drivers` 数组内的同一个对象上都为真。\n\
  \n当此过滤条件在查询中使用时，你会得到以下结果。\n\n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable\n\
  ?(@.Drivers[*].champion == true\n&& @.Drivers[*].nationality==\"British\"\n).Drivers[*].familyName\n\
  '\nwith array wrapper\n) as champions\nfrom f1_drivers_json f\n/\nCHAMPIONS\n\n\
  [\"Coulthard\",\"Vettel\"]\n```\n\n测试是在 `DriverTable` 对象上进行的。在 `DriverTable` 对象中，有一个值为\
  \ `true` 的 `champion` 属性，也有一个值为 `British` 的 `nationality` 属性。两个条件都满足了，因此返回了完整的对象。\n\
  \n正确的过滤方式，用于查找曾是世界冠军的英国车手，应该是再向下导航一层到 `Drivers` 数组，然后再应用过滤条件。\n\n```sql\nselect\
  \ json_query (f.json_document\n,'$.MRData.DriverTable\n.Drivers[*]?(@.champion ==\
  \ true\n&& @.nationality==\"British\"\n).familyName\n'\nwith array wrapper\n) as\
  \ champions\nfrom f1_drivers_json f\n/\nCHAMPIONS\n\nnull\n```\n\n现在，两个过滤条件都在同一层级上应用，即\
  \ `Drivers` 数组中的各个独立对象上。\n\n#### 传递变量\n\n到目前为止，过滤条件只包含静态值。在过滤条件中也可以使用绑定变量。\n\n在过滤条件中，绑定变量以美元符号\
  \ (`$`) 开头，后跟变量名。绑定变量的名称区分大小写。传入的值在 `passing` 子句中定义。在下面的例子中，有一个绑定变量 `$nationality`，传入的值是\
  \ `\"British\"`。\n\n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[*]\n\
  ?(@.nationality == $nationality).familyName'\npassing 'British' as \"nationality\"\
  \n) as lastname\nfrom f1_drivers_json f\n/\nLASTNAME\n\n\"Coulthard\"\n```\n\n命名变量可以在过滤条件中多次使用。在下面的例子中，绑定变量用于比较车手的国籍和车队的国籍。\n\
  \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[*]\n\
  ?(@.nationality == $nationality\n|| @.Constructors[*].nationality == $nationality\n\
  ).familyName'\npassing 'British' as \"nationality\"\nwith conditional array wrapper\n\
  ) as lastname\nfrom f1_drivers_json f\n/\nLASTNAME\n\n[\"Coulthard\",\"Vettel\"\
  ]\n```\n\n#### 空字符串与 NULL\n\n处理 `NULL` 总是棘手的，在 JSON 领域更是如此。在 JSON 中，`NULL` 是其自身的数据类型。JSON\
  \ 中的 `NULL` 与 SQL 的 `NULL` 并不相同，即使它们看起来可能一样。这些值会相互映射。当你使用 `NULL` 进行 JSON 相等性比较时，这一点变得很明显。\n\
  \n```sql\n[*]?(@.nickname == null)\n```\n\n但是，像下面这样将 `NULL` 作为绑定变量传入是不允许的，它会引发错误。\n\
  \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[*]\n\
  ?(@.nickname == $bind ).code'\npassing null as \"bind\"\n) as drivercode\nfrom f1_drivers_json\
  \ f\n/\nError at Command Line : 6 Column : 11\nError report -\nSQL Error: ORA-40576:\
  \ Invalid use of bind variable in SQL/JSON path.\n40576. 00000 -  \"Invalid use\
  \ of bind variable in SQL/JSON path.\"\n*Cause:    An attempt was made to bind a\
  \ non-runtime constant to\na bind variable in SQL/JSON path.\n*Action:   Bind either\
  \ compile time constant or runtime SQL bind variable value to a bind variable for\
  \ SQL/JSON path.\n```\n\n传入空字符串不会引发错误。\n\n```sql\nselect json_query (f.json_document\n\
  ,'$.MRData.DriverTable.Drivers[*]\n?(@.nickname == $bind ).code'\npassing '' as\
  \ \"bind\"\n) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n\n```\n\n当引用调用环境（如下例中的\
  \ `SQLcl`）中的绑定变量时，也不会引发错误。\n\n```sql\nvar b varchar2 (3)\nselect json_query (f.json_document\n\
  ,'$.MRData.DriverTable.Drivers[*]\n?(@.nickname == $bind ).code'\n.       passing\
  \ :b as \"bind\"\n) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n\n```\n\
  \n最后两个例子不会引发错误，但它们也没有返回正确的结果。当搜索 JSON `null` 时，唯一的选择是进行不使用绑定变量的相等性比较。\n\n**注意**\n\
  在 JSON 中，空字符串和 `NULL` 是有区别的，而 Oracle SQL 中不存在这种区别。JSON 空字符串等于 SQL 空字符串，但不等于 SQL\
  \ `NULL`。\n\n```sql\nselect 'empty strings are the equal' as same\nfrom dual where\
  \ json_exists('{a:\"\"}'       ,'$?(@.a == $b)'       passing '' as \"b\"      \
  \ )/\nSAME\n______________________________\nempty strings are the equal\n```\n\n\
  \n\n### 项方法\n\n在“使用过滤条件”章节的最后一个查询中，过滤器尝试匹配一位英国冠军车手，返回了一个 `null` 的 JSON 数据类型值。\n\n\
  当使用 CTAS（`Create Table As Select`）将查询具体化为表时，这一点变得非常清晰。\n\n```\ncreate table champions\n\
  as\nselect json_query (f.json_document\n,'$.MRData.DriverTable\n.Drivers[*]?(@.champion\
  \ == true\n&& @.nationality==\"British\"\n).familyName\n'\nwith array wrapper\n\
  ) as champions\nfrom f1_drivers_json f\n/\nTable CHAMPIONS created.\n```\n\n对新建表进行描述（`desc`）显示其数据类型为\
  \ JSON。\n\n```\ndesc champions\nName      Null? Type\n--------- ----- ----\nCHAMPIONS\
  \       JSON\n```\n\n此语句在具有 JSON 数据类型的 Oracle Database 21c 中执行。如果在 Oracle Database\
  \ 19c 中执行前面的语句，数据类型将是 `varchar2(4000)`。\n\n到目前为止，JSON 路径表达式的结果始终是 JSON 数据类型。让查询返回\
  \ JSON 并不是很有用。它们无法被比较、排序或分组；相反，返回 SQL 标量数据类型更有意义。\n\n借助*项方法*，你可以将返回的数据类型转换为 SQL\
  \ 数据类型，如 `VARCHAR2`、`NUMBER` 或 `DATE`。它还可以为你提供有关返回值的信息，例如 JSON 数据类型或数组的长度。\n\n项方法应用于\
  \ JSON 路径表达式的末尾。以下是最常见的用于转换为相应 SQL 数据类型的方法。\n\n*   `number()`、`numberOnly()`、`string()`、`stringOnly()`、`boolean()`、`booleanOnly()`、`date()`\
  \ 和 `timestamp()`。\n\n`number()` 项方法将匹配的 JSON 值转换为 SQL 数字，即使 JSON 数据类型是字符串。当使用 `numberOnly()`\
  \ 项方法时，JSON 数据类型*必须*也是数字，不会发生隐式数据类型转换。这对于其他带有 `Only()` 变体的项方法也是如此，例如 `stringOnly()`\
  \ 和 `booleanOnly()`。可以安全地说，这些项方法也充当过滤器。\n\n在以下示例中，提取了 Vettel 的 `permanentNumber`\
  \ 属性，并应用 `number()` 项方法将其转换为 SQL NUMBER 数据类型。\n\n```\nselect json_value (f.json_document\n\
  ,'$.MRData.DriverTable\n.Drivers[1]\n.permanentNumber.number()'\n)  as permanentNumber\n\
  from f1_drivers_json f\n/\nPERMANENTNUMBER\n```\n\n如前面的结果所示，`permanentNumber` 在列中右对齐，就像\
  \ SQL 中的数字一样。而当应用 `numberOnly()` 项方法时，结果为 `null`。JSON 文档中 `permanentNumber` 属性的数据类型是字符串，与请求的数据类型不匹配。\n\
  \n```\nselect json_value (f.json_document\n,'$.MRData.DriverTable\n.Drivers[1]\n\
  .permanentNumber.numberOnly()'\n)  as permanentNumber\nfrom f1_drivers_json f\n\
  /\nPERMANENTNUMBER\n```\n\n对于 `date()` 和 `timestamp()`，目标 JSON 值必须符合 ISO-8601 标准。由于车手的出生日期采用\
  \ ISO 8601 标准，你可以提取它并将其转换为 SQL 日期。\n\n```\nalter session set nls_date_format ='dd-mm-yyyy'\n\
  /\nSession altered.\nselect json_value (f.json_document\n,'$.MRData.DriverTable\n\
  .Drivers[0]\n.dateOfBirth.date()'\n)  as birthdate\nfrom f1_drivers_json f\n/\n\
  BIRTHDATE\n27-03-1971\n```\n\n与 JSON 路径表达式不同，你应用的项方法不会引发错误；返回的值是 SQL `NULL`。\n\n\
  有四个项方法提供有关目标 JSON 值的信息：`type()`、`size()`、`count()` 和 `length()`。\n\n`type()` 方法可以返回的值列于表\
  \ 12-2 中。\n\n表 12-2\n`type()` 返回的数据类型名称\n\n| JSON 数据类型 |          | 备注 |\n| ---\
  \ | --- | --- |\n| \"array\" | 数组 |          |\n| \"object\" | 对象 |          |\n\
  | \"string\" | 对应于 `varchar2` 的值 |          |\n| \"null\" | `null` |          |\n\
  | \"boolean\" | True 或 false |          |\n| \"double\" | 对应于 `binary_double` 的数字\
  \ | 仅当使用 JSON 数据类型时 |\n| \"float\" | 对应于 `binary_float` 的数字 | 仅当使用 JSON 数据类型时 |\n\
  | \"binary\" | 对应于 `raw` 的值 | 仅当使用 JSON 数据类型时 |\n| \"date\" | 对应于 `date` 的值 | 仅当使用\
  \ JSON 数据类型时 |\n| \"timestamp\" | 对应于 `timestamp` 的值 | 仅当使用 JSON 数据类型时 |\n| \"daysecondInterval\"\
  \ | 对应于 `interval day to second` 的值 | 仅当使用 JSON 数据类型时 |\n| \"yearmonthInterval\"\
  \ | 对应于 `interval year to month` 的值 | 仅当使用 JSON 数据类型时 |\n\n`type()` 项方法在其应用的级别提供信息。当在\
  \ Drivers 数组上应用 `type()` 项方法时，结果是 \"array\"。当将相同的项方法应用于 Drivers 数组的*内容*时，结果是一个包含两个\
  \ \"object\" 的数组，因为每个车手都是其自身的对象。\n\n```\n$.MRData.DriverTable.Drivers.type()\n\"\
  array\"\n$.MRData.DriverTable.Drivers[*].type()\n[\"object\",\"object\"]\n```\n\n\
  再往下一层可以提供有关属性的信息。\n\n```\n$.MRData.DriverTable.Drivers[*].nickname.type()\n[\"string\"\
  ,\"null\"]\n```\n\n`size()` 项方法提供有关目标元素数量的信息。当 JSON 路径表达式的目标是标量时，`size()` 为一。对于对象也是如此。当目标是数组时，`size()`\
  \ 给出数组中元素的数量。\n\n```\n$.MRData.DriverTable.Drivers.size()\n```\n\n`count()` 项方法提供有关目标\
  \ JSON 值数量的信息，无论其类型如何。如果没有目标 JSON 值，则会引发错误。\n\n`length()` 项方法提供字符串中字符数的信息，它不适用于任何其他数据类型。\n\
  \nJSON 路径表达式最多可以长达 32 KB，但很难达到这个限制。\n\n\n\n### JSON 路径表达式中的错误处理\n\nJSON 路径表达式的每个步骤都会尝试进行匹配。当某个匹配步骤失败时，其他步骤将不会被评估，整个\
  \ JSON 路径表达式即告失败。即使 JSON 路径表达式失败，默认情况下查询仍会成功执行。对于失败的 JSON 路径表达式，将返回一个`NULL`。这意味着，当你看到`NULL`时，它可能表示\
  \ JSON 路径表达式失败（其中可能存在错误），也可能表示该属性*确实*存在，但其值为`NULL`。\n\n#### 错误子句\n\n根据指定的错误子句（可用于`json_value()`、`json_query()`和`json_table()`函数），返回值可以是`NULL`、特定的错误信息，也可能是默认值。并非所有\
  \ SQL 函数都有相同的选项；例如，`json_query()`不允许定义默认值。\n\n以下示例尝试使用不同的错误子句从 JSON 文档中一个不存在的节点提取值。首先，使用默认错误子句`null\
  \ on error`，不会引发异常，而是返回`NULL`。\n\n```sql\nselect json_value (\nf.json_document\n\
  ,'$.MRData.non_existing_node'\nnull on error\n) as nothing\nfrom f1_drivers_json\
  \ f\n/\n```\n\n```\nNOTHING\n---------\n```\n\n当错误子句设置为`error on error`时，语句将失败并引发异常，指出`json_value()`函数评估后没有值。\n\
  \n```sql\nselect json_value (\nf.json_document\n,'$.MRData.non_existing_node'\n\
  error on error\n) as nothing\nfrom f1_drivers_json f\n/\n```\n\n```\nError starting\
  \ at line : 1 in command -\nselect json_value (\nf.json_document\n,'$.MRData.non_existing_node'\n\
  error on error\n) as nothing\nfrom f1_drivers_json f\nError report -\nORA-40462:\
  \ JSON_VALUE evaluated to no value\n```\n\n对于某些 SQL 函数，还可以在遇到错误时定义一个默认值。默认值必须是一个常量。以下语句展示了如何使用`default\
  \ <constant> on error`。\n\n```sql\nselect json_value (\nf.json_document\n,'$.MRData.non_existing_node'\n\
  default 'node does not exist' on error\n) as nothing\nfrom f1_drivers_json f\n/\n\
  ```\n\n```\nNOTHING\n---------------------------------\nnode does not exist\n```\n\
  \n当使用的函数期望标量值，但 JSON 路径表达式定位到了多个值时，同样会引发错误。\n\n#### 处理空结果\n\n缺少属性是一种特殊情况，由`on error`子句处理，但也可以由`on\
  \ empty`子句处理。当两者同时存在时，`on empty`子句优先于`on error`子句。以下语句定位 JSON 文档中一个不存在的属性，并同时包含了`on\
  \ error`和`on empty`子句。\n\n```sql\nselect json_value (\nf.json_document\n,'$.MRData.non_existing_node'\n\
  default 'node error' on error\ndefault 'node empty' on empty\n) as nothing\nfrom\
  \ f1_drivers_json f\n/\n```\n\n```\nNOTHING\n-----------\nnode empty\n```\n\n####\
  \ 处理类型不匹配\n\n当应用一个项方法，尝试将选定的 JSON 值转换为不兼容的 SQL 数据类型时，也可能引发错误。针对这种情况也有一个特殊的子句：`on\
  \ mismatch`。在下面的例子中，尝试使用`number()`项方法将`Driver`代码转换为 SQL `NUMBER`类型。当两者同时存在时，`on\
  \ mismatch`子句会覆盖`on error`子句。\n\n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].code.number()'\n\
  default '-10' on error\nerror on mismatch\n)\nfrom f1_drivers_json f\n/\n```\n\n\
  ```\nError starting at line : 1 in command -\nselect json_value (f.json_document\n\
  ,'$.MRData.DriverTable.Drivers[0].code.number()'\ndefault '-10' on error\nerror\
  \ on mismatch\n)\nfrom f1_drivers_json f\nError report -\nORA-01722: invalid number\n\
  ```\n\n### 点表示法\n\n从 JSON 文档中提取值的最简单方法是使用点表示法语法。点表示法语法使用表别名、JSON 列名以及 JSON 文档中的一个或多个字段名，所有部分用句点分隔。这可以用于\
  \ JSON 对象和 JSON 数组。\n\n返回值取决于存储 JSON 文档的列的数据类型。当列的数据类型为`JSON`时，返回值是`JSON`数据类型的实例。在所有其他情况下，返回值是`VARCHAR2`。\n\
  \n点表示法语法*仅*在 JSON 文档以以下方式之一存储时才能使用。\n\n*   `JSON`数据类型\n*   `VARCHAR2`、`CLOB`、`BLOB`列，并且存在`is\
  \ json`检查约束\n*   `VARCHAR2`、`CLOB`、`BLOB`列，并且在查询中使用`treat (<column_name> as json)`。\n\
  \n#### 点表示法基本示例\n\n让我们从使用点表示法提取键“series”的值开始。\n\n```sql\nselect f.json_document.\"\
  MRData\".\"series\"\nfrom f1_drivers_json f\n/\n```\n\n```\nMRDATA\n-------\n\"\
  f1\"\n```\n\nJSON 文档中的键是大小写敏感的；因此在早期的 Oracle 数据库版本中，键必须用引号括起来。在较新的 Oracle 数据库版本（18\
  \ 及更高版本）中，这不再是必需的。必须遵循 JSON 中键的大小写。以下查询省略了引号，仍然得到相同的结果。\n\n```sql\nselect f.json_document.MRData.series\n\
  from f1_drivers_json f\n/\n```\n\n```\nMRDATA\n-------\n\"f1\"\n```\n\n在本章的剩余部分，除非绝对必要，否则查询中不会使用引号。当\
  \ JSON 键与 SQL 中的保留字同名，或者存在与 SQL 配合不佳的特殊字符（如星号*）时，可能需要使用引号。\n\n**注意**：当您使用代码格式化程序时，请注意使用\
  \ JSON 路径表达式的查询会发生什么变化。如果所有文本都被转换为（例如）小写，查询可能不再产生原来的结果。\n\n查询返回的结果是`JSON`数据类型。使用的数据库版本是\
  \ Oracle 21c 数据库。前面的查询返回了一个 JSON 标量。当 JSON 路径表达式定位单个值时，返回值可以是 JSON 标量、对象或数组。当 JSON\
  \ 路径表达式定位多个值时，将返回 JSON 数组。\n\n前面讨论的项方法，如`number()`、`string()`、`size()`，也可以在点表示法语法中使用。\n\
  \n你可以使用项方法将返回值转换为相应的 SQL 标量。在下面的查询中，`series`属性作为字符串返回，车手的`permanentNumber`作为数字返回。\n\
  \n```sql\nselect f.json_document.MRData.series.string() as serie\n,f.json_document.MRData.DriverTable\n\
  .Drivers.permanentNumber\n.number() as permanentnumber\nfrom f1_drivers_json f\n\
  /\n```\n\n```\nSERIE      PERMANENTNUMBER\n---------- ---------------\nf1      \
  \                 5\n```\n\n前面的查询之所以能“工作”，是因为 JSON 文档中只有一名车手（维特尔）拥有永久号码。这个 JSON\
  \ 标量值可以被转换为 SQL `number`数据类型。\n\n让我们看看当你尝试提取两名车手（车手们在一个名为`Drivers`的数组中）的出生日期，并对结果应用`date()`项方法时会发生什么。以下查询同时显示了\
  \ JSON 结果（在`j_dateofbirth`列中）和`date()`项方法的应用结果。\n\n```sql\nselect f.json_document.MRData\n\
  .DriverTable.Drivers.dateOfBirth as j_dateOfBirth\n,f.json_document.MRData\n.DriverTable.Drivers.dateOfBirth.date()\
  \ as dateOfBirth\nfrom f1_drivers_json f\n/\n```\n\n```\nJ_DATEOFBIRTH         \
  \         DATEOFBIR\n------------------------------ ---------\n[\"1971-03-27\",\"\
  1987-07-03\"]\n```\n\n\n\n由于两位车手都有出生日期，返回值是一个数组，而数组无法转换为 `scalar` SQL 数据类型。要获取每位车手的出生日期，你需要修改查询以反映这一点，并在点符号语法中引入数组步骤。数组步骤使用方括号和索引号来指示你想从数组中检索的哪个元素。数组索引从零开始。\n\
  \n```\nselect f.json_document.MRData\n.DriverTable.Drivers[0]\n.dateOfBirth.date()\
  \ as dateOfBirth\n,f.json_document.MRData\n.DriverTable.Drivers[1]\n.dateOfBirth.date()\
  \ as dateOfBirth\nfrom f1_drivers_json f\n/\nDATEOFBIR DATEOFBIR\n--------- ---------\n\
  27-MAR-71 03-JUL-87\n```\n\n表 12-3 列出了一些点符号语法的例子。在路径表达式中，省略了表别名和列名。这些应作为前缀添加到路径表达式中以形成完整的路径表达式：`f.json_document.MRData.series`。\n\
  \n表 12-3: 点符号语法示例\n\n| 路径表达式 | 含义 |\n| --- | --- |\n| `MRData.series` | `series`\
  \ 字段的值，它是 `MRData` 的子级 |\n| `MRData.DriverTable.Drivers[1]` | `Drivers` 数组的第二个元素\
  \ |\n| `MRData.DriverTable.Drivers[*]` | `Drivers` 数组的所有元素。星号 (`*`) 是通配符 |\n| `MRData.DriverTable.Drivers.code`\
  \ | 字段 `code` 的值，该字段出现在 `Drivers` 数组中。返回值是一个字符串数组：`[\"COU\",\"VET\"]` |\n\n### 总结\n\
  \n处理 JSON 文档时有很多需要学习的地方。掌握路径表达式和过滤器可能是本章最重要的内容。理解路径表达式和过滤器的工作原理可以使处理 JSON 文档变得简单得多。处理路径表达式中的错误可以澄清何时遇到空值。\n\
  \n最后，介绍了点符号语法，这是一种将 JSON 文档转换为关系格式的简便方法。\n\n## 13. SQL/JSON 与条件\n\n将 JSON 文档存储在数据库中是一回事，知道如何遍历文档是另一回事，但将数据提取为关系格式才是其核心目的。\n\
  \n本章重点介绍这种转换，即使用 SQL 语句从 JSON 文档创建关系输出。\n\n本章的示例使用了上一章的示例数据。\n\n### SQL/JSON 函数\n\
  \n有四个 SQL 函数可用于从 JSON 文档中提取值。\n\n*   `json_value` 提取标量 JSON 值并返回等效的 SQL 值\n*   `json_query`\
  \ 提取 JSON 文档的一个片段\n*   `json_table` 将 JSON 文档转换为关系格式\n*   `json_serialize` 转换 JSON\
  \ 文档并返回其文本表示形式\n\n这些函数将在接下来的小节中逐一探讨。\n\n#### JSON_VALUE\n\nSQL/JSON `json_value`\
  \ 函数*必须*针对标量 JSON 值。当它针对非标量值、`OBJECT` 或 `ARRAY` 时，会引发错误。默认情况下，JSON 路径表达式中的错误会返回\
  \ `NULL` 值，这可以在 `on error` 子句中被覆盖。\n\n错误可能由多种原因引起，可以在 `on error` 子句中进行处理。\n\n* \
  \  JSON 文档格式不正确。\n*   当 JSON 数据由 JSON 路径表达式求值时，发现非标量值。\n*   当 JSON 数据求值时未找到匹配项，例如属性不存在；这种情况也可以通过\
  \ `on empty` 子句处理，该子句优先于 `on error`。\n*   返回值数据类型不足以容纳返回的值。\n\n传递给 `json_value`\
  \ 函数的第一个参数可以是任何文本字面量、`BLOB` 或 `JSON`。如果文本字面量或 `BLOB` 不是格式正确的 JSON，则会引发错误。\n\n第二个参数是目标为感兴趣值的\
  \ JSON 路径表达式。此 JSON 路径表达式可以包括过滤条件以及项目方法。项目方法可以影响从 JSON 文档中检索的数据类型；但是，也可以在 `returning`\
  \ 子句中指定 `json_value` 应返回的数据类型。\n\n在 `returning` 子句中，可以指定 SQL 数据类型以决定如何返回 JSON 值。默认情况下，当省略\
  \ `returning` 子句时，返回 `varchar2(4000)`。\n\n**提示：** 使用 `returning` 子句可以更好地控制返回的数据类型。例如，可以指定字符串的长度，如\
  \ `varchar2(10)`。这在 `string()` 项目方法中是无法实现的。\n\n本节涵盖了最常见的数据类型，如 `STRING`、`NUMBER`、`DATE`\
  \ 和 `BOOLEAN`，但也可以返回其他数据类型，如 `TIMESTAMP`（带或不带时区）、`INTERVAL`、`CHAR`、`BLOB`、`CLOB`\
  \ 或 `SDO_GEOMETRY`。\n\n在下面的查询中，目标是车手的姓氏，并返回一个 `varchar2(6)`。\n\n```\nselect json_value\
  \ (f.json_document\n,'$.MRData.DriverTable.Drivers[1].familyName'\nreturning varchar2(6)\n\
  ) as familyname\nfrom f1_drivers_json f\n/\nFAMILY\n------\nVettel\n```\n\n车手的名字是六个字符，`returning`\
  \ 子句指定了 `varchar2(6)`。上面的查询工作正常。当 JSON 路径表达式针对另一个名字有九个字符的车手时，会引发错误（默认情况下，发生错误时返回\
  \ null）。\n\n```\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].familyName'\n\
  returning varchar2(6)\n) as familyname\nfrom f1_drivers_json f\n/\nFAMILY\n------\n\
  ```\n\n除了增加返回值的大小，还可以在 `returning` 子句中添加 `truncate` 子句。每当目标值超过请求的长度时，返回值都会被截断。\n\
  \n```\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].familyName'\n\
  returning varchar2(6) truncate\n) as familyname\nfrom f1_drivers_json f\n/\nFAMILY\n\
  ------\nCoulth\n```\n\n车手的永久号码是数字类型，但在 JSON 文档中，它是一个字符串。使用 `returning` 子句，可以将其转换为数字。结果集中的右对齐表明它是一个真正的数字。\n\
  \n```\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[1].permanentNumber'\n\
  returning number\n) as permanentNumber\nfrom f1_drivers_json f\n/\nPERMANENTNUMBER\n\
  ---------------\n```\n\nJSON 文档中的出生日期是一个字符串。JSON 没有日期数据类型。`dateOfBirth` 字符串采用 ISO\
  \ 8601 格式，因此可以将其转换为 SQL 日期数据类型。\n\n```\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].dateOfBirth'\n\
  returning date\n) as dateofbirth\nfrom f1_drivers_json f\n/\nDATEOFBIR\n---------\n\
  27-MAR-71\n```\n\n\n### Oracle 数据库中的 JSON 处理：json_value 与 json_query 函数\n\n####\
  \ 日期与时间处理\n\n`ISO 8601`格式可以包含时间部分，但使用的示例`JSON`没有。在`returning`子句中，可以指定如何处理日期的时间部分，是保留还是移除。由于示例`JSON`文档中的日期没有时间部分，以下示例使用了`SYSDATE`，通过在子查询因子化子句（`with`子句，命名为`datesampler`）中使用`json_scalar`函数转换为`JSON`值。此会话的日期格式被修改为显示日期的时间部分。\n\
  \n```sql\nalter session set nls_date_format = 'dd-mm-yyyy hh24:mi:ss'\n/\nSession\
  \ altered.\nwith datesampler\nas\n(select json_scalar (sysdate) as dt\nfrom dual)\n\
  select json_value (dt, '$' returning date) as d1\n,json_value (dt, '$' returning\
  \ date truncate time) as d2\n,json_value (dt, '$' returning date preserve time)\
  \ as d3\nfrom datesampler\n/\nD1                  D2                  D3\n-------------------\
  \ ------------------- -------------------\n05-08-2022 00:00:00 05-08-2022 00:00:00\
  \ 05-08-2022 12:33:07\n```\n\n默认情况下，返回日期时，时间部分会被截断（列`D1`）。这也可以通过添加`truncate time`来显式完成（列`D2`）。当需要保留时间部分时，在将`JSON`值作为日期返回时添加`preserve\
  \ time`（列`D3`）。\n\n#### 布尔值处理\n\n`JSON`具有并需要映射到`SQL`数据类型的另一种数据类型是布尔值。目前，`SQL`没有原生的布尔数据类型。根据偏好，布尔值可以表示为数字（`0`或`1`）或字符串（`true`或`false`）。这两种符号格式都可以在`returning`子句中指定。\n\
  \n示例中的驾驶员信息用一个布尔值指明他是否曾是冠军。当使用`returning varchar2`并且目标是布尔值时，会返回`true`或`false`。\n\
  \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\n\
  returning varchar2\n) as champion\nfrom f1_drivers_json f\n/\nCHAMPION\n--------------------------------\n\
  false\n```\n\n如果希望返回数字值，简单地指定`returning number`是不起作用的。\n\n```sql\nselect json_value\
  \ (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\nreturning number\n\
  ) as champion\nfrom f1_drivers_json f\n/\nCHAMPION\n----------\n```\n\n前面查询中返回的`null`表明有问题；添加`on\
  \ error`子句可以揭示原因。\n\n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\n\
  returning number\nerror on error\n) as champion\nfrom f1_drivers_json f\n/\nError\
  \ report -\nORA-40799: cannot convert Boolean value to number\n```\n\n必须显式声明允许将`JSON`布尔值转换为数字。\n\
  \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[0].champion'\n\
  returning number\nallow boolean to number conversion\n) as champion\nfrom f1_drivers_json\
  \ f\n/\nCHAMPION\n----------\n```\n\n在`Oracle Database 21`之前，前面查询中的布尔关键字``must``必须省略。\n\
  \n## json_query 函数\n\n使用`json_query`可以提取`JSON`文档的一个片段。与`json_value`最大的区别是，`json_query`可以将多个目标值作为`JSON`片段返回。\n\
  \n默认情况下，返回值的`数据类型`是`varchar2(4000)`，但这可以在`returning`子句中更改，并且始终是格式良好的`JSON`。截断返回值可能看起来像是格式不良的`JSON`，但事实并非如此。截断是在值被`json_query`定位之后进行的。唯一允许的返回类型是`VARCHAR2`、`CLOB`、`BLOB`或`JSON`。\n\
  \n使用`json_query`可以模仿`json_value`来提取标量值，但有一个细微差别。`json_query`函数返回的是`JSON`片段的字符串化版本，当目标是标量时，它会被括在引号中，使其成为格式良好的`JSON`。下面查询中的`drivercode`长度为五个字符。\n\
  \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[0].code'\n\
  ) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------\n\
  \"COU\"\n```\n\n当请求与`JSON`类型不同的`SQL`数据类型时，会尝试进行隐式转换，如果成功则返回。以下示例返回驾驶员的永久编号（在`JSON`示例中是一个字符串），并将其转换为数字。\n\
  \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[1].permanentNumber'\n\
  returning number\n) as permanentnumber\nfrom f1_drivers_json f\n/\nPERMANENTNUMBER\n\
  ---------------\n```\n\n查询结果的右对齐表明它是数字`SQL`数据类型。使用`JSON`路径表达式中的`number()`项方法也可以得到相同的查询结果。\n\
  \n与`json_value`不同，`json_query`可以返回对象或数组。在以下示例中，返回了第一位驾驶员的驾驶员对象。通过添加`returning varchar2\
  \ pretty`，结果通过添加换行和缩进变得更易于阅读。\n\n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[0]'\n\
  returning varchar2 pretty\n) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n\
  --------------------------------------------------------------------------------\n\
  {\n  \"driverId\" : \"coulthard\",\n  \"code\" : \"COU\",\n  \"givenName\" : \"\
  David\",\n  \"familyName\" : \"Coulthard\",\n  \"dateOfBirth\" : \"1971-03-27\"\
  ,\n  \"nationality\" : \"British\",\n  \"champion\" : false,\n  \"nickname\" : \"\
  DC\"\n}\n```\n\n当定位多个值并希望结果是格式良好的`JSON`时，这些值可能需要一个数组包装器。这意味着结果被包装在方括号中。在以下查询中，定位了驾驶员代码。示例`JSON`中有两个代码。两个标量值必须包装在方括号中，使结果再次成为有效的`JSON`。\n\
  \n```sql\nselect json_query (f.json_document\n,'$.MRData.DriverTable.Drivers[*].code'\n\
  with array wrapper\n) as drivercode\nfrom f1_drivers_json f\n/\nDRIVERCODE\n--------------------------------\n\
  [\"COU\",\"VET\"]\n```\n\n默认的包装子句是`without array wrapper`，当定位到多个值时，会引发错误，默认情况下导致`null`。\n\
  \n> 提示\n> > 当您不希望*总是*将结果括在数组中时，也可以使用`with conditional array wrapper`，让`Oracle Database`来决定何时需要将结果包装在数组中。\n\
  \n有几种原因可能导致错误，这些错误可以在`on error`子句中处理。\n\n*   传递给函数的输入不是格式良好的`JSON`数据。\n*   `JSON`路径表达式未找到匹配项。属性可能不存在。此错误也可以由`on\
  \ empty`子句处理，该子句优先于`on error`子句。\n*   返回值数据类型不足以容纳返回值。\n*   返回值数据类型无法隐式转换为请求的返回类型。此错误也可以由`on\
  \ mismatch`子句处理，该子句优先于`on error`子句。\n*   定位了多个值，并且省略了`with array wrapper`。\n\n###\
  \ JSON 值处理与 JSON_TABLE 函数\n\n默认处理方法是返回空值。这可以通过`null on error`、`null on empty`和`null\
  \ on mismatch`子句来显式指定。\n\n除了使用`error on error`和`error on empty`来传播错误外，还可以通过指定`empty\
  \ object on error`、`empty array on error`、`empty object on empty`或`empty array on\
  \ empty`来返回空对象或数组。\n\n当返回值超出`returning`子句指定的范围时，会引发错误。除了调整返回数据类型，也可以截断结果。\n\n```sql\n\
  select json_query (f.json_document\n, '$.MRData.DriverTable.Drivers[0].familyName'\n\
  returning varchar2(3) truncate\n) as familyname\nfrom f1_drivers_json f\n/\nFAM\n\
  \n\"Co\n```\n\n为了演示`on mismatch`子句，下面的查询针对车手代码（`code`），并请求在查询结果中返回一个 SQL 数值。这行不通，因为代码不是数字。默认情况下，会返回空值。\n\
  \n```sql\nselect json_value (f.json_document\n,'$.MRData.DriverTable.Drivers[1].code'\n\
  returning number\n) as numericCode\nfrom f1_drivers_json f\n/\nNUMERICCODE\n\n```\n\
  \n可以同时使用`on error`子句和`on mismatch`子句。`on mismatch`子句具有优先权。\n\n```sql\nselect json_value\
  \ (f.json_document\n,'$.MRData.DriverTable.Drivers[0].code'\nreturning number\n\
  default -99 on error\nerror on mismatch\n)\nfrom f1_drivers_json f\n/\nORA-01722:\
  \ invalid number\n```\n\n当省略`on mismatch`子句时，会返回-99。`on mismatch`子句可以处理`returning`子句数据类型不匹配，以及上述案例中的`number()`项方法。\n\
  \n#### JSON_TABLE\n\n使用`json_table`函数，可以创建 JSON 数据的关系视图。此函数只能出现在 SQL 语句的`from`子句中。\n\
  \nJSON 路径表达式决定了用于将 JSON 数据投影为关系格式的行源。在`json_table`函数内部，`columns`子句对行源进行求值以找到 JSON\
  \ 值，并将其作为 SQL 值返回到关系数据行的列中。\n\n在以下示例中，`Drivers`数组的一部分被投影为关系格式。\n\n```sql\nselect\
  \ d.*\nfrom   f1_drivers_json f\ncross\napply  json_table\n( f.json_document\n,\
  \ '$.MRData.DriverTable.Drivers[*]'\ncolumns\n( driverid  varchar2(10) path '$.driverId'\n\
  , code      varchar2(3)  path '$.code'\n, firstname varchar2(10) path '$.givenName'\n\
  , lastname  varchar2(10) path '$.familyName'\n, dob       date         path '$.dateOfBirth'\n\
  )\n) d\n/\nDRIVERID   COD FIRSTNAME  LASTNAME   DOB\n---------- --- ---------- ----------\
  \ -------------------\ncoulthard  COU David      Coulthard  27-03-1971 00:00:00\n\
  vettel     VET Sebastian  Vettel     03-07-1987 00:00:00\n```\n\n关系表`f1_drivers_json`与`json_table`进行连接以创建笛卡尔积。JSON\
  \ 路径表达式将`Drivers`数组作为行源。在`columns`子句中，路径表达式指示相对于行源可以在何处找到 JSON 值。`columns`子句中的`$`上下文项指的是`json_table`级别路径表达式的输出。\n\
  \n> 提示：\n> 除了使用`cross apply`，也可以使用`cross join`将 JSON 文档投影为关系格式。使用`cross apply`反映了连接是横向的（`lateral`），因为关系表与`json_table`之间存在关联。\n\
  \n在当前的 Oracle Database 版本中，也可以只指定行源的键。只要 JSON 文档中的键名匹配（区分大小写！），就可以返回值。以下查询返回与之前相同的数据，但存在一些显著差异。\n\
  \n```sql\nselect d.*\nfrom   f1_drivers_json f\ncross\napply  json_table\n( f.json_document\n\
  , '$.MRData.DriverTable.Drivers[*]'\ncolumns\n( driverId\n, code\n, givenName\n\
  , familyName\n, dateOfBirth\n)\n) d\n/\nDRIVERID   COD GIVENNAME  FAMILYNAME DATEOFBIRT\n\
  ---------- --- ---------- ---------- ----------\ncoulthard  COU David      Coulthard\
  \  1971-03-27\nvettel     VET Sebastian  Vettel     1987-07-03\n```\n\n为每一列返回的 SQL\
  \ 数据类型是`varchar2(4000)`，列名源自 JSON 键。\n\n可以通过在`columns`子句中添加所需的类型来更改特定列的 SQL 数据类型。在以下示例中，指定了数据类型，例如出生日期为\
  \ SQL 日期，通过截断`givenName`属性的其余部分，只返回了车手名的首字母。\n\n```sql\nselect d.*\nfrom   f1_drivers_json\
  \ f\ncross\napply  json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\n\
  columns\n( driverId    varchar2(10)\n, code        varchar2(3)\n, givenName   varchar2(1)\
  \ truncate\n, familyName  varchar2(10)\n, dateOfBirth date\n)\n) d\n/\nDRIVERID\
  \   COD G FAMILYNAME DATEOFBIR\n---------- --- - ---------- ---------\ncoulthard\
  \  COU D Coulthard  27-MAR-71\nvettel     VET S Vettel     03-JUL-87\n```\n\n对于每一列，可以使用`json_value`和`json_query`函数中所有可用的选项，例如`on\
  \ error`或`on empty`子句。由于之前已经讨论过，本节将不再赘述。\n\n除了为每一列指定`error on error`，也可以在最高级别定义一次。这需要在`columns`子句之前完成。列中的错误子句优先于表级别的子句。以下查询演示了在表级别使用`error\
  \ on error`以及在列级别进行覆盖。\n\n\n#### 基础查询与结果\n\n```sql\nselect d.*\nfrom   f1_drivers_json\
  \ f\ncross\napply  json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\n\
  error on error\ncolumns\n( driverId\n, does_not_exist default 'x' on empty\n)\n\
  ) d\n/\nDRIVERID   DOES_\n---------- -----\ncoulthard  x\nvettel     x\n```\n只有一名车手（Vettel）拥有\
  \ `permanentNumber` 属性。Coulthard 没有这个属性。两人都有 `nickname` 属性，但只有 Coulthard 拥有非空值。当你提取\
  \ `familyName` 属性时，Coulthard 的 `permanentNumber` 为 null（属性缺失），而 Vettel 的昵称为 null（因为其\
  \ JSON 值为 null）。\n\n```sql\nselect d.*\nfrom   f1_drivers_json f\ncross\napply \
  \ json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\ncolumns\n\
  ( familyName\n, permanentNumber\n, nickname\n)\n) d\n/\nFAMILYNAME      PERM NICKN\n\
  --------------- ---- -----\nCoulthard            DC\nVettel          5\n```\n在查询结果中，无法直接看出\
  \ NULL 值产生的原因。在列级别，可以使用 `exists` 子句来测试属性是否存在。在以下示例中，添加了两个额外列来测试指定路径上属性的存在性。对 `permanentNumber`\
  \ 属性的存在性测试返回一个 VARCHAR2（true 或 false），而对 “nickname” 的测试返回一个数字（0 或 1）。紧接在列名（`has_nickname`）之后，在\
  \ `exists` 关键字之前指定了要返回的数据类型。\n\n```sql\nselect d.*\nfrom   f1_drivers_json f\ncross\n\
  apply  json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\ncolumns\n\
  ( familyName\n, permanentNumber\n, has_permanentNumber exists path permanentNumber\n\
  , nickname\n, has_nickname number exists path nickname\n)\n) d\n/\nFAMILYNAME  \
  \    PERM HAS_P NICKN HAS_N\n--------------- ---- ----- ----- -----\nCoulthard \
  \           false DC        1\nVettel          5    true            1\n```\n在结果中，`permanentNumber`\
  \ 的 null 是由 Coulthard 缺失该属性导致的（`has_permanentnumber` 列为 false），而 Vettel 的昵称有一个 NULL\
  \ JSON 值（`has_nickname` 列为 1）。\n\n示例 JSON 文档有两个数组：Drivers 和 Constructors。`nested\
  \ path` 子句及其自身的 `columns` 子句将嵌套数组中的数据转换为关系格式。\n\n以下查询展示了在 `columns` 子句中使用 `nested\
  \ path`。\n\n```sql\nselect d.*\nfrom   f1_drivers_json f\ncross\napply  json_table\n\
  ( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\ncolumns\n( code\n, nested\
  \ path '$.Constructors[*]'\ncolumns\n( constructorId\n, name\n, nationality\n)\n\
  )\n) d\n/\nCODE  CONSTRUCTORID   NAME              NATIONALITY\n----- ---------------\
  \ ----------------- ------------\nCOU\nVET   red_bull        Red Bull          Austrian\n\
  VET   aston_martin    Aston Martin      British\n```\n当 JSON 文档中的一个属性出现多次并需要以关系格式显示时，需要特别小心。在示例\
  \ JSON 中，`nationality` 属性同时出现在 Drivers 数组和 Constructors 数组中。将两者都添加到查询中会导致错误。\n\n\
  ```sql\n00918. 00000 -  \"column ambiguously defined\"\n```\n发生这种情况时，需要为其中一个列分配不同的名称。在以下示例中，构造器的国籍被重命名为\
  \ `cnationality`。\n\n```sql\nselect d.*\nfrom   f1_drivers_json f\ncross\napply\
  \  json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\ncolumns\n\
  ( code\n, nationality\n, nested path '$.Constructors[*]'\ncolumns\n( name\n, cnationality\
  \ path '$.nationality'\n)\n)\n) d\n/\nCODE  NATIONALITY     NAME            CNATIONALITY\n\
  ----- --------------- --------------- ---------------\nCOU   British\nVET   German\
  \          Red Bull        Austrian\nVET   German          Aston Martin    British\n\
  ```\n请注意，在上面的查询结果中，车手代码 VET 在结果集中出现了两次。这是因为 Constructors 数组中有两个条目。\n\n由于示例 JSON\
  \ 文档的大小有限，很容易看出哪些数据是属于一起的，但情况并非总是如此。\n\n可以添加 `for ordinality` 子句来生成行号，以阐明关系视图中的哪些记录属于一起。每个\
  \ `json_table` 或 `nested` 子句只能有一个序数列。以下示例为车手和构造器分别添加了一个序数列。\n\n```sql\nselect d.*\n\
  from   f1_drivers_json f\ncross\napply  json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\n\
  columns\n( dseq for ordinality\n, code\n, nationality\n, nested path '$.Constructors[*]'\n\
  columns\n( cseq for ordinality\n, name\n)\n)\n) d\n/\nDSEQ CODE  NATIONALITY   \
  \        CSEQ NAME\n---------- ----- --------------- ---------- ---------------\n\
  1 COU   British\n2 VET   German                   1 Red Bull\n2 VET   German   \
  \                2 Aston Martin\n```\n\n#### JSON 片段提取与注意事项\n\n在某些情况下，需要提取 JSON\
  \ 文档的一个片段以供后续处理。例如，当提供的 JSON 文档包含客户信息（多个客户）及其所有相关订单时。为了将该 JSON 文档分发到多个数据库表中，可能需要先提取客户数据并将其存储在客户表中，同时以\
  \ JSON 格式提取相关的订单数据，以便传递给下一个 `json_table` 函数来解析该客户的订单数据。这样，就无需多次解析完整的 JSON 文档，而只需解析特定任务所需的部分。\n\
  \n以下查询提取了构造器的 JSON 片段，在 `columns` 子句中添加了 `format json`。\n\n```sql\nselect d.*\n\
  from   f1_drivers_json f\ncross\napply  json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\n\
  columns\n( code\n, constructors format json path '$.Constructors'\n)\n) d\n/\nCODE\
  \  CONSTRUCTORS\n----- --------------------------------------------------\nCOU\n\
  VET   [{\"constructorId\":\"red_bull\",\"name\":\"Red Bull\",\"na\ntionality\":\"\
  Austrian\"},{\"constructorId\":\"aston_mar\ntin\",\"name\":\"Aston Martin\",\"nationality\"\
  :\"British\"\n}]\n```\n只有一名车手关联了一个 Constructors 数组。\n\n**Caution**\n\nCoulthard\
  \ 没有 Constructors 数组，上面的查询结果反映了这一点。当仅使用表级别或列级别的 `error on error` 子句与 `format json`\
  \ 时，会引发错误。错误指出没有目标值，这在当前情况下是正确的。在这种情况下，还需要添加 `null on empty` 子句。当在 `columns` 子句中使用\
  \ `nested path` 时，也会发生这种情况。\n\n\n### JSON_SERIALIZE\n\n`json_serialize`函数可以将 JSON\
  \ 文档转换为文本表示形式。当 JSON 文档存储在 BLOB 中并且需要读取其内容时，这特别有用。\n\n复制了示例 JSON 表，以演示`json_serialize`如何将\
  \ JSON 文档转换为不同的数据类型，但这次使用二进制格式的 JSON。\n\n```\ncreate table f1_drivers_blob\nas\n\
  select json_serialize\n( json_document returning blob ) as json_document\nfrom \
  \  f1_drivers_json\n/\n```\n\n在这种情况下，`returning`子句指定了所需的 BLOB 数据类型。\n\n在`returning`子句后添加`pretty`可以使文本表示更易于阅读。\n\
  \n```\nselect json_serialize\n( json_document returning clob pretty ) as json_document\n\
  from f1_drivers_blob\n/\nJSON_DOCUMENT\n\n{\n\"MRData\" :\n{\n\"series\" : \"f1\"\
  ,\n\"DriverTable\" :\n{\n\"Drivers\" :\n\n{\n\"driverId\" : \"coulthard\",\n```\n\
  \n当 JSON 文档包含非 ASCII 字符时，可以通过在`returning`子句后添加`ascii`来转义这些字符。由于我们的示例数据不包含此类特殊字符，以下示例使用从\
  \ dual 中选择来演示`ascii`子句的作用。\n\n![\n\n一张图片显示了一个编码窗口。它以文本开头，select jason underscore\
  \ serialize。第一个代码不包含 A S C I I，而第二个包含。\n\n### SQL 条件\n\n过滤掉满足特定条件的行是在查询的`where`子句中完成的。当这些条件涉及\
  \ JSON 文档时，有几种选项可用。\n\n当有一个包含 JSON 文档和其他非 JSON 文档的表时，可以使用`is json`和`is not json`条件。\n\
  \n以下示例创建了一个暂存表（`f1_staging`）来存储所有数据。目的是稍后处理这些数据。\n\n```\ncreate table f1_staging\n\
  (all_data clob)\n/\n```\n\n插入了两条记录：一条非 JSON 和另一条 JSON。\n\n```\ninsert into f1_staging\n\
  values ('David Marshall Coulthard MBE born 27 March 1971) is a British former racing\
  \ driver from Scotland, later turned presenter, commentator and journalist. Nicknamed\
  \ \"DC\", he competed in 15 seasons of Formula One between 1994 and 2008, taking\
  \ 13 Grand Prix victories and 62 podium finishes. He was runner-up in the 2001 championship,\
  \ driving for McLaren.')\n/\ninsert into f1_staging\nvalues ('{\"driverId\":\"coulthard\"\
  ,\"code\":\"COU\",\"givenName\":\"David\",\"familyName\":\"Coulthard\",\"dateOfBirth\"\
  :\"1971-03-27\",\"nationality\":\"British\",\"champion\":false,\"nickname\":\"DC\"\
  }')\n/\ncommit\n/\n```\n\n使用以下语句过滤掉非 JSON 数据。\n\n```\nselect *\nfrom   f1_staging\n\
  where  all_data is not json\n/\nALL_DATA\n\nDavid Marshall Coulthard MBE born 27\
  \ March 1971) is a British\n```\n\n以下语句用于过滤 JSON 数据。\n\n```\nselect *\nfrom   f1_staging\n\
  where  all_data is json\n/\nALL_DATA\n\n{\"driverId\":\"coulthard\",\"code\":\"\
  COU\",\"givenName\":\"David\",\"familyName\":\"Coulthard\n```\n\n可以使用`json_exists`在\
  \ JSON 文档中过滤特定属性和/或与该属性关联的值。\n\n在以下示例中，驾驶员对象已在`f1_drivers_obj`表中被分成两行。Coulthard\
  \ 一行，Vettel 一行。\n\nJSON 路径表达式定位要测试其属性是否存在的属性。以下查询测试`driverId`属性的存在性。\n\n```\nselect\
  \ f.driver.givenName.string() as firstname\nfrom   f1_drivers_obj f\nwhere  json_exists\
  \ ( f.driver\n, '$.driverId'\n)\n/\nFIRSTNAME\n\nDavid\nSebastian\n```\n\n两个驾驶员都有`driverId`属性，因此两行都被返回。\n\
  \n以下示例使用`json_exists`条件从表中过滤正确的 JSON 文档。使用过滤条件测试`driverId`是否为名称“coulthard”。\n\n\
  ```\nselect f.driver.givenName.string() as firstname\nfrom   f1_drivers_obj f\n\
  where  json_exists ( f.driver\n, '$?(@.driverId == \"coulthard\")'\n)\n/\nFIRSTNAME\n\
  \nDavid\n```\n\n两个驾驶员都有`nickname`属性，一个值为 DC，另一个值为 JSON NULL（不是 SQL NULL）。以下过滤条件查找昵称为`null`的驾驶员。\n\
  \n```\nselect f.driver.givenName.string() as firstname\nfrom   f1_drivers_obj f\n\
  where  json_exists ( f.driver\n, '$?(@.nickname == null)'\n)\n/\nFIRSTNAME\n\nSebastian\n\
  ```\n\n`json_exists`条件也可以在 CASE 表达式中使用，如以下示例所示。\n\n```\nselect case\nwhen json_exists\
  \ ( f.driver\n, '$?(@.champion ==true)'\n)\nthen\n'We''ve got a winner'\nend as\
  \ champion\nfrom   f1_drivers_obj f\n/\nCHAMPION\n\nWe've got a winner\n```\n\n\
  返回了两行，每个驾驶员一行，但因为条件只对其中一个驾驶员满足，所以只有一行有“We've got a winner”文本，而另一行是 null。\n\n可以通过组合\
  \ JSON 路径过滤条件来测试多个条件（参见第 12 章）。然而，测试一个属性具有某个值*和*另一个属性的存在需要一个`exists`过滤器。\n\n以下条件尝试过滤国籍为芬兰*或*存在\
  \ Constructors 数组的驾驶员。\n\n```\n$?(@.nationality == \"Finnish\" || @.Constructors[*])\n\
  ```\n\n这会导致以下错误。\n\n```\nSQL Error: ORA-40597: JSON path expression syntax error\
  \ ('$?(@.nationality == \"Finnish\" || @.Constructors[*])')\nJZN-00224: Unexpected\
  \ characters in comparison operator\nat position 51\n40597\\. 00000 -  \"JSON path\
  \ expression syntax error ('%s')%s\\nat position %s\"\n*Cause:    The specified\
  \ JavaScript Object Notation (JSON) path expression\nhad invalid syntax and could\
  \ not be parsed.\n*Action:   Specify JSON path expression with the correct syntax.\n\
  ```\n\n以下是用于测试这些条件的正确 JSON 路径表达式。\n\n```\n$?(@.nationality == \"Finnish\" || exists(@.Constructors[*]))\n\
  ```\n\n在`json_exists`条件中使用这个会返回以下结果。尽管驾驶员是德国人，不是芬兰人，但为他存在一个 Constructors 数组。\n\n\
  ```\nselect f.driver.familyName.string() as lastname\n, f.driver.nationality.string()\
  \ as nationality\n, f.driver.Constructors[*].nationality as c_nationalities\nfrom\
  \   f1_drivers_obj f\nwhere  json_exists ( f.driver\n, '$?(@.nationality == \"Finnish\"\
  \n|| exists(@.Constructors[*]))'\n)\n/\nLASTNAME        NATIONALITY     C_NATIONALITIES\n\
  --------------- --------------- ----------------------\nVettel          German \
  \         [\"Austrian\",\"British\"]\n```\n\n当然，也可以将绑定变量传递给`json_exists`子句。以下查询显示所有驾驶员，其中*要么*他们的国籍是英国，*要么*构造函数的国籍是英国，*或者*两个条件都为真。\n\
  \n```\nselect f.driver.familyName.string() as lastname\n, f.driver.nationality.string()\
  \ as nationality\n, f.driver.Constructors[*].nationality as c_nationalities\nfrom\
  \   f1_drivers_obj f\nwhere  json_exists ( f.driver\n, '$?(@.nationality == $nationality\n\
  || @.Constructors[*].nationality\n== $nationality)'\npassing 'British' as \"nationality\"\
  \n)\n/\nLASTNAME        NATIONALITY     C_NATIONALITIES\n--------------- ---------------\
  \ ----------------------\nCoulthard       British         null\nVettel         \
  \ German          [\"Austrian\",\"British\"]\n```\n\n可以为 JSON 文档的全文搜索创建 JSON 搜索索引。JSON\
  \ 搜索索引类似于 Oracle Text 索引。有关 JSON 搜索索引以及如何创建和使用它的更多信息，请参见第 11 章。\n\n\n## 14. 生成、比较和操作\
  \ JSON\n\n### 概要\n\n本章重点介绍了 SQL/JSON 函数。`json_value` 函数可以从 JSON 文档中提取标量值。`json_query`\
  \ 函数允许从 JSON 文档中提取 JSON 片段。`json_table` 函数在将 JSON 文档以关系格式投影方面起着关键作用。`json_serialize`\
  \ 函数可以将 JSON 文档转换为文本格式。\n\n最后，解释了`json_exists`的用法以及如何在`where`子句或`CASE`表达式中应用它。\n\
  \n从关系数据生成 JSON 文档是一个常见的需求，Oracle 数据库提供了必要的工具。本章探讨了 SQL 和 PL/SQL 中的这些可能性。\n\n还包括在\
  \ PL/SQL 中处理 JSON 文档的信息，例如提取数据和修改 JSON 文档。\n\n### 生成 JSON 文档\n\n要在 SQL 中生成 JSON\
  \ 文档，有多个可用的函数。\n\n* `json` 是 Oracle Database 21c 新引入的一种非常灵活的生成 JSON 文档的方式。`JSON`\
  \ 构造函数可以接受任何格式正确的 JSON 字符串并返回 JSON 数据类型，包括 JSON 标量。它也可以与花括号一起使用来构造 JSON 对象，或与方括号一起使用来生成\
  \ JSON 数组。\n* `json_scalar` 接受一个 SQL 值并返回其 JSON 等效值。这在将日期、时间戳或间隔转换为正确的 ISO 8601\
  \ 格式时特别有用，该功能在 Oracle Database 21c 中是新的。\n* `json_object` 接受键值对并返回一个 JSON 对象。你可以使用通配符或列名作为输入。\n\
  * `json_objectagg` 是一个聚合函数，接受键值对并返回一个单一的 JSON 对象。通常，键或值是表中的列。\n* `json_array` 接受一个或多个标量\
  \ SQL 表达式或列，将它们转换为 JSON 标量，并返回一个数组。\n* `json_arrayagg` 是一个聚合函数，接受一个列或 SQL 表达式并返回一个单一的\
  \ JSON 数组。\n\n所有这些函数都允许你从关系数据生成从简单到复杂的 JSON 文档。\n\n`json_scalar` 函数在将`date`、`timestamp`和`interval`转换为其\
  \ JSON 等效值时特别有用。以下示例将这些数据类型转换为 ISO-8601 格式的 JSON。\n\n```\nselect json_scalar (current_date)\
  \ as now\nfrom dual\n/\nNOW\n\n\"2022-08-24T08:53:29\"\n```\n\n`json_scalar` 函数知道其源\
  \ SQL 数据类型。使用`json_value`函数配合相应的项方法可以将其转换回原始数据类型。以下示例显示了到 JSON 标量（作为 VARCHAR2 格式的\
  \ ISO-8601）的转换，并且数据类型被保留。\n\n```\nselect json_value\n( json_scalar (current_timestamp)\n\
  , '$'\n) as now\n, json_value\n( json_scalar (current_timestamp)\n, '$.type()'\n\
  ) as now_datatype\nfrom   dual\n/\nNOW                            NOW_DATATYPE\n\
  ------------------------------ ------------------------\n2022-08-24T07:13:42.365662Z\
  \    timestamp with time zone\n```\n\n以下示例使用 ISO-8601 标准将间隔转换为 JSON 等效值。\n\n```\n\
  select json_scalar ( to_dsinterval ( '1 2:45:15' ) ) as ds\n, json_scalar ( to_yminterval\
  \ ( '2-3' ) ) as ym\nfrom   dual\n/\nDS                   YM\n--------------------\
  \ -------\n\"P1DT2H45M15S\"       \"P2Y3M\"\n```\n\n提示：在 Oracle Database 21c 中，也可以在`to_dsinterval`和`to_yminterval`函数中使用\
  \ ISO-8601 间隔表示法。\n```\nselect to_dsinterval ('P1DT2H45M15S') as ds\nfrom dual\n\
  /\nDS\n--------------------\n+01 02:45:15.000000\n```\n\n在以下示例中，使用了四种不同的方法来生成一个简单的对象。第一列使用显式的“key”和“value”关键字，第二列使用冒号\
  \ (`:`) 分隔键和值。第三列使用列名生成 JSON 对象。最后，`json`操作符使用花括号和冒号来定义 JSON 对象。\n每种方法都生成相同的 JSON\
  \ 对象（因此只显示一次）。\n\n```\nselect json_object ( key 'driverid' value driverid ) as verbose\n\
  , json_object ( 'driverid' : driverid )  as colon\n, json_object ( driverid ) as\
  \ col\n, json {'driverid' : driverid} as curly_braces\nfrom   f1_drivers\nwhere\
  \  givenname = 'David'\nand    familyname = 'Coulthard'\n/\n{\"driverid\":\"coulthard\"\
  }\n```\n\n需要注意的是，可以传入多个列名来生成 JSON 对象，甚至可以使用星号 (`*`) 来选择所有列。\n\n```\nselect json_object\
  \ ( familyname\n, nationality\n) as estebans\nfrom   f1_drivers\nwhere  givenname\
  \ = 'Esteban'\n/\nESTEBANS\n\n{\"familyname\":\"Tuero\",\"nationality\":\"Argentine\"\
  }\n{\"familyname\":\"Gutiérrez\",\"nationality\":\"Mexican\"}\n{\"familyname\":\"\
  Ocon\",\"nationality\":\"French\"}\n```\n\n为`f1_drivers`表中的每条记录返回一个 JSON 对象。当需要一个单一的\
  \ JSON 对象而不是三个独立的对象时，可以使用`json_objectagg`函数。\n\n```\nselect json_objectagg\n( key\
  \ familyname value nationality ) as estebans\nfrom   f1_drivers\nwhere  givenname\
  \ = 'Esteban'\n/\nESTEBANS\n\n{\"Tuero\":\"Argentine\",\"Gutiérrez\":\"Mexican\"\
  ,\"Ocon\":\"French\"}\n```\n\n`json_objectagg`函数只能聚合单个键值对，但这个键值对可以是另一个 JSON 对象，以创建对象之中的对象（为了可读性，JSON\
  \ 输出已被格式化）。\n\n```\nselect json_objectagg\n( key givenname value json_object ( familyname\n\
  , nationality\n)\n) as estebans\nfrom   f1_drivers\nwhere  givenname = 'Esteban'\n\
  /\nESTEBANS\n\n{\n\"Esteban\": {\n\"familyname\": \"Tuero\",\n\"nationality\": \"\
  Argentine\"\n},\n\"Esteban\": {\n\"familyname\": \"Gutiérrez\",\n\"nationality\"\
  : \"Mexican\"\n},\n\"Esteban\": {\n\"familyname\": \"Ocon\",\n\"nationality\": \"\
  French\"\n}\n}\n```\n\n生成 JSON 数组可以通过使用`json_array`函数来完成。使用新的`json`构造函数，当使用方括号时也可以实现这一点。以下示例显示了两种表示法。每行显示一个数组。\n\
  \n```\nselect json_array ( familyname, nationality ) as estebans\n, json [familyname,\
  \ nationality] as estebans\nfrom f1_drivers\nwhere givenname = 'Esteban'\n/\nESTEBANS\
  \                ESTEBANS\n----------------------- -----------------------\n[\"\
  Tuero\",\"Argentine\"]   [\"Tuero\",\"Argentine\"]\n[\"Gutiérrez\",\"Mexican\"]\
  \ [\"Gutiérrez\",\"Mexican\"]\n[\"Ocon\",\"French\"]       [\"Ocon\",\"French\"\
  ]\n```\n\n要生成一个单一的 JSON 数组，请使用`json_arrayagg`。以下示例显示了一个包含对象的单一数组。\n\n```\nselect\
  \ json_arrayagg\n( json {key familyname value nationality} ) as estebans\nfrom \
  \  f1_drivers\nwhere  givenname = 'Esteban'\n/\nESTEBANS\n\n[{\"Tuero\":\"Argentine\"\
  },{\"Gutiérrez\":\"Mexican\"},{\"Ocon\":\"French\"}]\n```\n\n提示：当创建可能超过默认 4000 字节的较大、较复杂的\
  \ JSON 文档时，请在每个对象和数组级别使用返回`CLOB`/`BLOB`或返回`JSON`（Oracle Database 21c 及以上）。特别是在遇到以下错误时：`ORA-40478:\
  \ output value too large`。\n\n以下示例展示了`json_object`、`json_array`和`json_arrayagg`的组合使用，以生成更复杂的\
  \ JSON 文档。JSON 文档的第一部分也被显示（以格式化形式）。在生成的 JSON 文档中，有几点需要注意。\n\n* 场次在数组内按场次编号排序（`order\
  \ by rce.round`）。\n* 前三名由相关子查询确定。\n* 当未来计划的比赛没有前三名时，前三名属性不会包含在 JSON 文档中（`absent\
  \ on null`）。\n* 由于 JSON 文档的大小，它作为`CLOB`返回。当至少使用 Oracle Database 21c 时，它也可以作为`JSON`返回。\n\
  * 为每一年创建一个 JSON 文档。当需要所有年份的单一文档时，请将`'raceresults'`属性的`json_array`改为`json_arrayagg`，并删除最后的`where`子句。\n\
  \n\n\n```sql\nselect json_object (\n'raceresults' value json_array(\njson_object\
  \ (\nrce.year\n, 'races' value (json_arrayagg(\njson_object(\nrce.round\n,key 'circuit'\
  \ value cct.name\n,rce.race_date\n,key 'top3' value(\nselect\njson_arrayagg(winners\
  \ returning clob)\nfrom\n(select json_object(\nrst.position\n,'driver' value dvr.forename\n\
  ||' '\n|| dvr.surname\n,'constructor' value csr.name\n,dvr.nationality\n) as winners\n\
  from results rst\njoin drivers      dvr\non rst.driverid = dvr.driverid\njoin constructors\
  \ csr\non csr.constructorid = rst.constructorid\nwhere rst.raceid = rce.raceid\n\
  order by rst.position\nfetch first 3 rows only\n)\n)\nabsent on null returning clob)\n\
  order by rce.round\nreturning clob))\nreturning clob)\nreturning clob)\nreturning\
  \ clob)\nreturning clob)\nfrom races rce\njoin circuits cct\non rce.circuitid =\
  \ cct.circuitid\nwhere rce.year = 2022\ngroup by rce.year\n/\n```\n\n```json\n{\n\
  \"raceresults\": [\n{\n\"year\": 2022,\n\"races\": [\n{\n\"round\": 1,\n\"circuit\"\
  : \"Bahrain International Circuit\",\n\"race_date\": \"2022-03-20T00:00:00\",\n\"\
  top3\": [\n{\n\"position\": 1,\n\"driver\": \"Charles Leclerc\",\n\"constructor\"\
  : \"Ferrari\",\n\"nationality\": \"Monegasque\"\n},\n{\n\"position\": 2,\n\"driver\"\
  : \"Carlos Sainz\",\n\"constructor\": \"Ferrari\",\n\"nationality\": \"Spanish\"\
  \n},\n{\n\"position\": 3,\n\"driver\": \"Lewis Hamilton\",\n\"constructor\": \"\
  Mercedes\",\n\"nationality\": \"British\"\n}\n]\n},\n{\n\"round\": 15,\n\"circuit\"\
  : \"Circuit Park Zandvoort\",\n\"race_date\": \"2022-09-04T00:00:00\"\n}\n]\n}\n\
  ]\n}\n```\n\n### 比较 JSON 文档\n\n对于 JSON 文档，空白和属性顺序无关紧要。因此，尽管下面的 JSON 片段在文本视角下看起来不同，但从\
  \ JSON 视角来看它们是相同的。\n\n```json\n{\"code\":\"COU\",\"givenName\":\"David\",\"familyName\"\
  :\"Coulthard\"}\n```\n\n```json\n{\n\"givenName\" : \"David\",\n\"familyName\" :\
  \ \"Coulthard\",\n\"code\" : \"COU\"\n}\n```\n\n`json_equal` 函数可以比较 JSON 文档。无法直接使用\
  \ JSON 路径表达式比较 JSON 文档的一部分；只有完整的 JSON 文档是可比较的。可以使用 `json_query` 传入 JSON 文档的片段。在下面的例子中，比较了\
  \ JSON 片段。\n\n```sql\nselect *\nfrom   dual\nwhere  json_equal ('{\"code\":\"COU\"\
  ,\"givenName\":\"David\",\"familyName\":\"Coulthard\"}'\n,'\n{\n\"givenName\" :\
  \ \"David\",\n\"familyName\" : \"Coulthard\",\n\"code\" : \"COU\"\n}')\n/\n```\n\
  \n```\nD\n-\nX\n```\n\n即使 JSON 文档是二进制格式（例如存储在 BLOB 列中），比较也能进行。下面的查询比较了一个 JSON 字符串和同一\
  \ JSON 文档的二进制表示。\n\n```sql\nwith test as\n(\nselect utl_raw.cast_to_raw\n('{\"code\"\
  :\"COU\",\"givenName\":\"David\",\"familyName\":\"Coulthard\"}') as bin_json\n,\
  \ json ('{\"code\":\"COU\",\"givenName\":\"David\",\"familyName\":\"Coulthard\"\
  }') as j_json\nfrom   dual)\nselect 'The JSON documents are the same' as result\n\
  from   test t\nwhere  json_equal ( t.bin_json, t.j_json )\n/\n```\n\n```\nRESULT\n\
  -------------------------------\nThe JSON documents are the same\n```\n\n当此函数用于\
  \ `SELECT` 子句时，可能会遇到错误：`ORA-40600: JSON_EQUAL used outside predicate`。这可能会给人留下它只能用于查询的\
  \ `WHERE` 子句中的印象，但事实并非如此。它也可以用于 `CASE` 表达式。\n\n### 修改 JSON 文档\n\n可以使用 `json_transform`\
  \ 函数更改 JSON 文档的结构。这个函数就像一把瑞士军刀；几乎可以对 JSON 文档进行所有可能的操作。最常见的用法是与 `UPDATE` 语句结合使用，以持久化更改后的\
  \ JSON 文档。还有 `json_mergepatch` 函数可用于更改 JSON 文档，但由于其功能有限，此处不作介绍。\n\n表 14-1 展示了可以完成的可能修改。\n\
  \n**表 14-1**\n\n使用`json_transform`进行的修改\n\n| 修改操作 | 描述 |\n| --- | --- |\n| `Remove`\
  \ | 删除由路径表达式定位的输入数据。 |\n| `Append` | 将值追加到目标数组。如果目标不是数组，则引发错误。 |\n| `Keep` | 删除所有未被路径表达式定位的输入。可以指定多个路径表达式。\
  \ |\n| `Rename` | 重命名由路径表达式定位的属性。 |\n| `Set` | 用新值替换现有的目标数据，或者当它不存在时创建新属性。 |\n|\
  \ `Replace` | 替换现有的目标数据。类似于 `set ignore on missing`。 |\n| `Insert` | 当不存在时添加新值。当它已存在时引发错误。类似于\
  \ `set create on missing`。 |\n\n下面的示例显示了一个修改后的 JSON 文档。输入是第 12 章清单 12-1 中定义的示例 JSON\
  \ 文档。\n\n```sql\nselect json_transform (f.json_document\n, remove  '$.MRData.DriverTable.Drivers[1]'\n\
  , replace '$.MRData.series' = 'Formula 1'\n, set '$.FIA' = 'Fédération Internationale\
  \ de l''Automobile'\n, append  '$.MRData.DriverTable.Drivers' =\njson { 'code':\
  \ 'RIC'\n, 'givenName':'Daniel'\n, 'familyName':'Ricciardo'\n, 'nickname':'Honey\
  \ Badger'\n}\n, insert  '$.MRData.Constructors' =\njson ['Red Bull', 'Ferrari',\
  \ 'Mercedes', 'Renault']\n, rename  '$.MRData' = 'F1Data'\n)\nfrom f1_drivers_json\
  \ f\n/\n```\n\n```json\n{\n\"FIA\": \"Fédération Internationale de l'Automobile\"\
  ,\n\"F1Data\": {\n\"series\": \"Formula 1\",\n\"DriverTable\": {\n\"Drivers\": [\n\
  {\n\"driverId\": \"coulthard\",\n\"code\": \"COU\",\n\"givenName\": \"David\",\n\
  \"familyName\": \"Coulthard\",\n\"dateOfBirth\": \"1971-03-27\",\n\"nationality\"\
  : \"British\",\n\"champion\": false,\n\"nickname\": \"DC\"\n},\n{\n\"code\": \"\
  RIC\",\n\"givenName\": \"Daniel\",\n\"familyName\": \"Ricciardo\",\n\"nickname\"\
  : \"Honey Badger\"\n}\n]\n},\n\"Constructors\": [\n\"Red Bull\",\n\"Ferrari\",\n\
  \"Mercedes\",\n\"Renault\"\n]\n}\n}\n```\n\n前面查询中所做的修改。\n\n*   从 `Drivers` 数组中删除了第二个驱动程序（数组索引\
  \ 1）。\n*   `series` 属性的值被更改为 `Formula 1`。\n*   在根级别添加了一个额外的 `FIA` 属性，其值为全名。\n* \
  \  一个新的驱动程序被添加到 `Drivers` 数组。\n*   添加了一个构造函数的数组。\n*   `MRData` 属性的名称被更改为 `F1Data`。\n\
  \n使用 `keep` 修改，你可以指定应保留的 JSON 文档部分。所有其他键都会被删除。下面的示例修改了 JSON 文档，以便仅在昵称等于 `DC` 时保留\
  \ `Driver` 对象。输出已格式化以便阅读。\n\n```sql\nselect json_transform\n( f.json_document\n\
  , keep\n'$.MRData.DriverTable.Drivers[*]?(@.nickname==\"DC\")'\n) with_nickname\n\
  from   f1_drivers_json f\n/\n```\n\n```\nWITH_NICKNAME\n--------------------------------------------------------------------------------\n\
  {\n\"MRData\": {\n\"DriverTable\": {\n\"Drivers\": [\n{\n\"driverId\": \"coulthard\"\
  ,\n\"code\": \"COU\",\n\"givenName\": \"David\",\n\"familyName\": \"Coulthard\"\
  ,\n\"dateOfBirth\": \"1971-03-27\",\n\"nationality\": \"British\",\n\"champion\"\
  : false,\n\"nickname\": \"DC\"\n}\n]\n}\n}\n}\n```\n\n`keep` 修改是唯一可以处理多个 JSON 路径表达式的操作。下面的示例保留了所有驱动程序的昵称和\
  \ `Drivers` 数组中第一个驱动程序的 `code`。\n\n```sql\nselect json_transform\n( f.json_document\n\
  , keep '$.MRData.DriverTable.Drivers[*].nickname'\n, '$.MRData.DriverTable.Drivers[0].code'\n\
  ) nickname_code\nfrom   f1_drivers_json f\n/\n```\n\n```\nNICKNAME_CODE\n--------------------------------------------------------------------------------\n\
  {\n\"MRData\": {\n\"DriverTable\": {\n\"Drivers\": [\n{\n\"code\": \"COU\",\n\"\
  nickname\": \"DC\"\n}\n]\n}\n}\n}\n```\n\n\n\n{\n\"MRData\": {\n\"DriverTable\"\
  : {\n\"Drivers\": [\n{\n\"code\": \"COU\",\n\"nickname\": \"DC\"\n},\n{\n\"nickname\"\
  : null\n}\n]\n}\n}\n}\n```\n\n进行更复杂的修改，例如为每位车手添加一个 `fullname` 属性并用 `givenName` 和\
  \ `familyName` 属性的值填充它，则需要更多工作。在下面的示例中，操作如下：使用 `json_table` 提取每个 `givenname` 和 `familyname`，以及来自\
  \ `Drivers` 数组的 `Driver` 对象。`json_transform` 函数向 `Driver` 对象添加一个新属性 `fullName`，并用连接起来的\
  \ `givenname` 和 `familyname` 填充它。最后，结合使用 `json_arrayagg` 和 `json_object` 来最终生成 JSON\
  \ 文档。为了使输出简洁，仅保留了新的 `fullName` 属性。\n\n```\nselect json_object\n( 'DriversList' value\
  \ json_arrayagg\n( json_transform ( jt.driver\n, insert '$.fullName' =\njt.givenname||'\
  \ '||jt.familyname\n, keep '$.fullName'\n)\n)\n) as just_names\nfrom   f1_drivers_json\
  \ f\ncross\njoin   json_table\n( f.json_document\n, '$.MRData.DriverTable.Drivers[*]'\n\
  columns\n( givenName\n, familyName\n, driver json path '$'\n)\n) jt\n/\nJUST_NAMES\n\
  \n{\n\"DriversList\": [\n{\n\"fullName\": \"David Coulthard\"\n},\n{\n\"fullName\"\
  : \"Sebastian Vettel\"\n}\n]\n}\n```\n\n### JSON 与 PL/SQL\n\n为了在 PL/SQL 中支持 JSON，专门设计了几种对象类型来读写\
  \ JSON 文档。这可以提高性能，尤其是在需要多次解析文档时。\n\n通过这些对象类型，可以在内存中以编程方式操作 JSON，以验证、构造或转换 JSON 文档。\n\
  \nPL/SQL 对象类型列于表 14-2 中。\n\n**表 14-2：与 JSON 相关的 PL/SQL 对象类型**\n\n| 对象类型 | 描述 |\n\
  | --- | --- |\n| `json_element_t` | 所有其他类型的超类型此类型是可实例化的使用 `treat` 函数，可以将 `json_element_t`\
  \ 类型的变量实例化为某个子类型 |\n| `json_object_t` | `json_element_t` 的子类型对应于 JSON 对象类型 |\n|\
  \ `json_array_t` | `json_element_t` 的子类型对应于 JSON 数组类型 |\n| `json_scalar_t` | `json_element_t`\
  \ 的子类型对应于 JSON 标量类型 |\n| `json_key_list` | `json_element_t` 的子类型设计用于保存 `json_object_t`\
  \ 键的 VARCHAR2(4000) 可变数组 |\n\n对于接下来的示例，使用的 JSON 文档与第 12 章中的清单 12-1 相同，这次作为一个名为 `l_f1data`、数据类型为\
  \ `CLOB` 的局部变量。\n\n当已知 JSON 文档的结构时，车手信息包含在一个 JSON 对象中。可以直接将其解析为相应的数据类型。\n\n```\n\
  declare\nl_f1data clob := '';\nl_object json_object_t;\nbegin\nl_object := json_object_t.parse\
  \ ( l_f1data );\nend;\n/\n```\n\n一旦文本表示形式被解析为 JSON 文档，就可以根据需要提取对象和数组。示例中的顶级对象名为\
  \ `MRData`；为了提取此对象，在下面的示例中使用了 `get_object` 方法函数。\n\n```\ndeclare\nl_f1data clob\
  \ := '';\nl_object json_object_t;\nl_mrdata json_object_t;\nbegin\nl_object := json_object_t.parse\
  \ ( l_f1data );\nl_mrdata := l_object.get_object ( 'MRData' );\nend;\n/\n```\n\n\
  同样的方法可用于提取 `Drivers` 数组，为 JSON 文档中的每一层声明适当的数据类型，并使用 `get_object` 和 `get_array` 方法函数。\n\
  \n```\ndeclare\nl_f1data clob := '';\nl_object json_object_t;\nl_mrdata json_object_t;\n\
  l_drivertable json_object_t;\nl_drivers_array json_array_t;\nbegin\nl_object :=\
  \ json_object_t.parse ( l_f1data );\nl_mrdata := l_object.get_object ( 'MRData'\
  \ );\nl_drivertable := l_mrdata.get_object ( 'DriverTable' );\nl_drivers_array :=\
  \ l_drivertable.get_array( 'Drivers' );\nend;\n/\n```\n\n也可以将其浓缩，连续应用方法函数，结果是一样的。\n\
  \n```\ndeclare\nl_f1data clob := '';\nl_drivers_array json_array_t;\nbegin\nl_drivers_array\
  \ := json_object_t.parse (l_f1data)\n.get_object ('MRData')\n.get_object ('DriverTable')\n\
  .get_array  ('Drivers');\nend;\n/\n```\n\n当 JSON 文档的结构未知时，可以检查 JSON 文档的内容。在以下示例中，JSON\
  \ 文档被解析。使用 `json_element_t` 超类型以及 `is_object` 和 `is_array` 自省函数来确定 JSON 数据类型。\n\n\
  ```\ndeclare\nl_f1data clob := '';\nl_element json_element_t;\nbegin\nl_element\
  \ := json_element_t.parse ( l_f1data );\nif l_element.is_object\nthen\nsys.dbms_output.put_line\
  \ ( 'It is an Object' );\nelsif l_element.is_array\nthen\nsys.dbms_output.put_line\
  \ ( 'It is an Array' );\nend if;\nend;\n/\nIt is an Object\n```\n\n`Drivers` 数组内包含的是表示车手的\
  \ JSON 对象。使用 `get` 方法函数可以提取这些 JSON 对象。请注意，`get` 方法函数返回的是超类型 `json_element_t`。因此，需要使用\
  \ `treat` 函数将其转换为 JSON 对象。\n\n\n\n#### 从 JSON 对象获取属性值\n\n转换为 JSON 对象后，可以使用 `get_string`、`get_number`、`get_date`\
  \ 等方法函数来检索各个属性。以下示例展示了如何获取 JSON 对象中特定键的值。\n\n```\ndeclare\n  l_f1data clob := '';\n\
  \  l_drivers_array json_array_t;\n  l_driver json_object_t;\nbegin\n  l_drivers_array\
  \ := json_object_t.parse (l_f1data)\n                       .get_object ('MRData')\n\
  \                       .get_object ('DriverTable')\n                       .get_array\
  \  ('Drivers');\n  for i in 0 .. l_drivers_array.get_size -1\n  loop\n    l_driver\
  \ := treat (l_drivers_array.get (i)\n                       as json_object_t);\n\
  \    sys.dbms_output.put_line (l_driver.get_string ('driverId'));\n    sys.dbms_output.put_line\
  \ (l_driver.get_string ('code'));\n    sys.dbms_output.put_line (l_driver.get_date\
  \ ('dateOfBirth'));\n  end loop;\nend;\n/\ncoulthard\nCOU\n27-MAR-71\nvettel\nVET\n\
  03-JUL-87\n```\n\n#### 通用方式获取键值对\n\n除了通过在 JSON 文档中查找每个键来获取属性值外，还可以采用更通用的方法。\n\n\
  `get_keys` 方法函数返回一个 `VARCHAR2` 类型的变长数组，最好存储在 `json_key_list` 类型的变量中。在以下示例中，`get_keys`\
  \ 用于提取属性名称及其关联的值。\n\n```\ndeclare\n  l_f1data clob := '';\n  l_drivers_array json_array_t;\n\
  \  l_driver json_object_t;\n  l_driver_keys json_key_list;\nbegin\n  l_drivers_array\
  \ := json_object_t.parse (l_f1data)\n                       .get_object ('MRData')\n\
  \                       .get_object ('DriverTable')\n                       .get_array\
  \  ('Drivers');\n  for i in 0 .. l_drivers_array.get_size -1\n  loop\n    l_driver\
  \ := treat (l_drivers_array.get (i)\n                       as json_object_t);\n\
  \    l_driver_keys := l_driver.get_keys;\n    for key_idx in 1 .. l_driver_keys.count\n\
  \    loop\n      sys.dbms_output.put_line (\n        l_driver_keys (key_idx)||'\
  \ : '||\n        l_driver.get_string (l_driver_keys (key_idx))\n      );\n    end\
  \ loop;\n  end loop;\nend;\n/\ndriverId : coulthard\ncode : COU\ngivenName : David\n\
  familyName : Coulthard\ndateOfBirth : 1971-03-27\nnationality : British\nchampion\
  \ : false\nnickname : DC\ndriverId : vettel\npermanentNumber : 5\ncode : VET\ngivenName\
  \ : Sebastian\nfamilyName : Vettel\ndateOfBirth : 1987-07-03\nnationality : German\n\
  champion : true\nnickname :\nConstructors :\n```\n\n在上面的输出中，`Constructors` 属性没有显示关联的值。仔细查看示例\
  \ JSON 中的这个属性，其值是一个对象数组。为了使这些值也可见，可以创建类似的嵌套循环结构：一个循环用于获取对象，另一个循环用于从对象中获取键值对。\n\n\
  ```\n    l_constructor_array := l_driver.get_array (\n                         \
  \    l_driver_keys (key_idx));\n    for ci in 0 .. l_constructor_array.get_size\
  \ -1\n    loop\n      l_constructor := treat (l_constructor_array.get (ci)\n   \
  \                           as json_object_t);\n      l_constructor_keys := l_constructor.get_keys;\n\
  \      for constructor_idx in 1 .. l_constructor_keys.count\n      loop\n      \
  \  sys.dbms_output.put_line (\n          l_constructor.get_string (\n          \
  \  l_constructor_keys (constructor_idx))\n        );\n      end loop;\n    end loop;\n\
  ```\n\n#### 判断 JSON 数据类型\n\n您可以使用 `get_type` 方法函数来确定遇到的 JSON 数据类型。\n\n以下代码使用 `dbms_output`\
  \ 显示示例 JSON 内容。为简洁起见，省略了输出。\n\n```\ndeclare\n  l_f1data clob := '';\n  l_drivers_array\
  \ json_array_t;\n  l_driver        json_object_t;\n  l_driver_keys.  json_key_list;\n\
  \  l_constructor_array json_array_t;\n  l_constructor_keys  json_key_list;\n  l_constructor\
  \       json_object_t;\nbegin\n  l_drivers_array := json_object_t.parse (l_f1data)\n\
  \                       .get_object ('MRData')\n                       .get_object\
  \ ('DriverTable')\n                       .get_array  ('Drivers');\n  for i in 0\
  \ .. l_drivers_array.get_size -1\n  loop\n    l_driver := treat (l_drivers_array.get\
  \ (i)\n                       as json_object_t);\n    l_driver_keys := l_driver.get_keys;\n\
  \    for key_idx in 1 .. l_driver_keys.count\n    loop\n      case l_driver.get_type\
  \ (l_driver_keys (key_idx))\n        when 'SCALAR'\n        then\n          sys.dbms_output.put_line\
  \ (\n            l_driver_keys (key_idx)||' : '||\n            l_driver.get_string\
  \ (l_driver_keys (key_idx)));\n        when 'ARRAY'\n        then\n          l_constructor_array\
  \ := l_driver.get_array (\n                                   l_driver_keys (key_idx));\n\
  \          for ci in 0 .. l_constructor_array.get_size -1\n          loop\n    \
  \        l_constructor := treat (l_constructor_array.get (ci)\n                \
  \                    as json_object_t);\n            l_constructor_keys := l_constructor.get_keys;\n\
  \            for constructor_idx in 1 .. l_constructor_keys.count\n            loop\n\
  \              sys.dbms_output.put_line (\n                l_constructor.get_string\
  \ (\n                  l_constructor_keys (constructor_idx))\n              );\n\
  \            end loop;\n          end loop;\n      end case;\n    end loop;\n  end\
  \ loop;\nend;\n```\n\n#### 在 PL/SQL 中使用 SQL/JSON 函数\n\n在 PL/SQL 代码中，也可以使用 SQL/JSON\
  \ 函数，如 `json_value` 和 `json_query`。因为 PL/SQL 中 *有* 布尔数据类型，所以它可以从 JSON 直接映射。以下示例展示了\
  \ `json_value` 和 `json_query` 在 PL/SQL 中的用法。\n\n```\ndeclare\n  l_f1data clob :=\
  \ '';\n  l_boolean boolean;\nbegin\n  l_boolean := json_value\n                \
  \ ( l_drivers\n                 ,'$.MRData.DriverTable.Drivers[1].champion'\n  \
  \                 returning boolean\n                 );\n  sys.dbms_output.put_line\n\
  \    ( json_value\n        ( l_drivers\n        , '$.MRData.DriverTable.Drivers[1].givenName'\n\
  \          returning varchar2\n        )\n    );\n  sys.dbms_output.put_line\n \
  \   ( json_query\n        ( l_drivers\n        , '$.MRData.DriverTable.Drivers[*].champion'\n\
  \          returning varchar2\n          with conditional array wrapper\n      \
  \  )\n    );\nend;\n/\n```\n\n> **注意**\n> 请注意从 SQL/JSON 函数返回的数据类型。如果不使用项方法函数（如 `string()`、`number()`）或指定数据类型的\
  \ `returning` 子句，当使用 Oracle Database 21c 或更高版本时，它们返回 JSON；否则返回 `VARCHAR2(4000)`。\n\
  \n\n### 使用 PL/SQL 构建与操作 JSON\n\n生成 JSON 通常基于关系型数据，但有时需要使用 PL/SQL 来创建或操作 JSON 文档。\n\
  \n借助 JSON PL/SQL 对象的构造函数，生成 JSON 文档变得轻而易举。在下面的示例中，一个表示 JSON 对象的字符串作为参数传递给 `json_object_t`\
  \ 构造函数。它返回一个 `json_object_t` 对象，并通过 `dbms_output` 显示。\n\n```\ndeclare\nl_driver\
  \ json_object_t;\nbegin\nl_driver := new json_object_t (\n'{\n\"firstname\": \"\
  Stirling\",\n\"lastname\": \"Moss\",\n\"extra\": {\n\"dob\": \"1929-09-17\",\n\"\
  nationality\": \"British\"\n}\n}');\nsys.dbms_output.put_line ( l_driver.to_string\
  \ );\nend;\n/\n{\"firstname\":\"Stirling\",\"lastname\":\"Moss\",\"extra\":{\"dob\"\
  :\"1929-09-17\",\"nationality\":\"British\"}}\n```\n\n提取嵌套对象或数组是通过引用完成的。对提取出的对象或数组进行的更改会反映在包含它的对象中。在下面的示例中，`extra`\
  \ 对象被提取出来并通过添加一个额外的键值对进行修改。当检查原始对象时，这个新增的键值对也会出现。\n\n```\ndeclare\nl_driver json_object_t;\n\
  l_extra  json_object_t;\nbegin\nl_driver := new json_object_t (\n'{\n\"firstname\"\
  : \"Stirling\",\n\"lastname\": \"Moss\",\n\"extra\": {\n\"dob\": \"1929-09-17\"\
  ,\n\"nationality\": \"British\"\n}\n}');\nl_extra := l_driver.get_object ( 'extra'\
  \ );\nl_extra.put ( 'notRelated', 'Bill' );\nsys.dbms_output.put_line ( l_extra.to_string\
  \ );\nsys.dbms_output.put_line ( l_driver.to_string );\nend;\n/\n{\"dob\":\"1929-09-17\"\
  ,\"nationality\":\"British\",\"notRelated\":\"Bill\"}\n{\"firstname\":\"Stirling\"\
  ,\"lastname\":\"Moss\",\"extra\":{\"dob\":\"1929-09-17\",\"nationality\":\"British\"\
  ,\"notRelated\":\"Bill\"}}\n```\n\n`clone` 函数在提取嵌套对象或数组时会创建一个副本；对此副本对象或数组所做的更改不会反映在包含对象中。下面的示例展示了这一行为。包含对象中的\
  \ `extra` 嵌套对象没有改变。\n\n```\ndeclare\nl_driver json_object_t;\nl_extra  json_object_t;\n\
  begin\nl_driver := new json_object_t (\n'{\n\"firstname\": \"Stirling\",\n\"lastname\"\
  : \"Moss\",\n\"extra\": {\n\"dob\": \"1929-09-17\",\n\"nationality\": \"British\"\
  \n}\n}');\nl_extra := l_driver.get_object ( 'extra' ).clone;\nl_extra.put ( 'notRelated',\
  \ 'Bill' );\nsys.dbms_output.put_line ( l_extra.to_string );\nsys.dbms_output.put_line\
  \ ( l_driver.to_string );\nend;\n/\n{\"dob\":\"1929-09-17\",\"nationality\":\"British\"\
  ,\"notRelated\":\"Bill\"}\n{\"firstname\":\"Stirling\",\"lastname\":\"Moss\",\"\
  extra\":{\"dob\":\"1929-09-17\",\"nationality\":\"British\"}}\n```\n\n`put` 过程用于设置\
  \ JSON 对象中特定键的值。如果对象中不存在该键，则会添加它。如果键已存在，则其值会被覆盖。对于 JSON 数组，`put` 过程的工作方式略有不同：需要指定值要添加到的位置，并且默认情况下不会覆盖该位置原有的值。但可以指定在值存在时进行覆盖。\n\
  \n在对象中移除和重命名键分别使用 `remove` 和 `rename_key` 过程完成。下一个示例移除了 `extra` 嵌套对象，基于名字和姓氏构造了一个占位符值，并将该键重命名为\
  \ `fullName`。\n\n```\ndeclare\nl_driver json_object_t;\nbegin\nl_driver := new json_object_t\
  \ (\n'{\n\"firstname\": \"Stirling\",\n\"lastname\": \"Moss\",\n\"extra\": {\n\"\
  dob\": \"1929-09-17\",\n\"nationality\": \"British\"\n}\n}');\nl_driver.remove (\
  \ 'extra' );\nl_driver.put ( 'placeholder'\n, 'Sir '||\nl_driver.get_string ('firstname')\n\
  ||' '||\nl_driver.get_string ('lastname')\n);\nl_driver.remove ( 'firstname' );\n\
  l_driver.remove ( 'lastname' );\nl_driver.rename_key ( 'placeholder', 'fullName'\
  \ );\nsys.dbms_output.put_line ( l_driver.to_string );\nend;\n/\n{\"fullName\":\"\
  Sir Stirling Moss\"}\n```\n\nSir Stirling Moss 从 1951 年到 1961 年参加比赛并赢得了许多胜利。下面的示例使用一个简单的\
  \ `for` 循环将比赛年份捕获到一个 JSON 数组中。`append` 过程在数组末尾添加值。使用 `put` 过程，将年份 1900 添加到第一个位置，然后用\
  \ 2022 覆盖，最后将其移除。\n\n```\ndeclare\nl_races  json_array_t;\nbegin\nl_races := new\
  \ json_array_t ();\nfor i in 1951 .. 1961\nloop\nl_races.append(i);\nend loop;\n\
  sys.dbms_output.put_line\n( 'Race year count: '\n|| l_races.get_size\n);\nl_races.put\
  \ ( 0,1900, false );\nsys.dbms_output.put_line\n( 'First race year in the Array:\
  \ '\n|| l_races.get_string ( 0 )\n);\nl_races.put ( 0,2022, true );\nsys.dbms_output.put_line\n\
  ( 'First race year in the Array: '\n|| l_races.get_string ( 0 )\n);\nl_races.remove\
  \ ( 0 );\nsys.dbms_output.put_line\n( 'First race year in the Array: '\n|| l_races.get_string\
  \ ( 0 )\n);\nend;\n/\nRace year count: 11\nFirst race year in the Array: 1900\n\
  First race year in the Array: 2022\nFirst race year in the Array: 1951\n```\n\n\
  ### 总结\n本章讨论了如何从 SQL 生成 JSON 文档。使用各种函数 (`json`、`json_object`、`json_objectagg`、`json_array`、`json_arrayagg`)，可以从关系型数据构建所有\
  \ JSON 文档。使用 `json_transform` 可以轻松更改 JSON 文档，以及移除、添加或重命名键。最后，重点介绍了使用 JSON 和 PL/SQL\
  \ 来提取值、操作和生成完整的 JSON 文档。\n\n"
- "# 第三部分：Oracle 提供的功能\n\n## 15. 实用的 APEX 包\n\nOracle Application Express (APEX) 是一个低代码开发平台，允许您构建可扩展、安全的企业应用程序，并可部署在任何地方。嗯，几乎是任何地方；APEX\
  \ 引擎仍然需要一个 Oracle 数据库。APEX 是 Oracle 数据库的一个免费选项，从 Always Free 云层到 XE 再到企业版都可用。\n\n\
  所有 APEX 包在使用 APEX 时都非常有用。然而，即使您并非将 APEX 用于其设计初衷——创建前端应用程序，您仍然可以从其功能中受益。而这些包正是本主题讨论的对象。\n\
  \n因为 APEX 驻留在 Oracle 数据库内部，所以您可以将其与自己的代码无缝集成。APEX 包由 Oracle 维护。自行开发的解决方案则需要由您自己维护。\n\
  \n从 PL/SQL 调用 Web 服务可能相当具有挑战性，但使用 APEX 包，这变得轻而易举。使用 APEX 开箱即用的功能，可以轻松创建 ZIP 文件和解析\
  \ CSV 数据。\n\n\n### APEX 可用性\n\n只有当你的数据库中安装了 APEX 时，你才能利用它的功能。安装后，请保持其为最新版本，因为新功能和特性在不断加入，安全修复也在持续实施。\n\
  \nAPEX 作为一个独立的模式（schema）存在于数据库中，因此检查 APEX 是否已安装的一个简单方法是查询 APEX 用户。\n\n```sql\nselect\
  \ username\nfrom all_users\nwhere username like 'APEX%'\n```\n\n该查询产生的结果会告诉你 APEX\
  \ 模式是否存在，如果存在，还会显示已安装的版本。\n\n当你安装了 22.1 版本时，结果如下：\n\n```\nAPEX_220100\n```\n\n如果你从这个查询中没有得到任何结果，那仅仅意味着\
  \ APEX 未安装。安装 APEX 超出了本书的范围，请参考相关文档。始终推荐使用最新版本的 APEX。最新版本的文档可以通过以下 URL 找到。\n\n```\n\
  https://apex.oracle.com/doc\n```\n\n对于特定版本的文档，你可以在 URL 后附加你正在查找的版本号，如下所示。\n\n```\n\
  https://apex.oracle.com/doc212\n```\n\n由于本章重点介绍 APEX 提供的一些内置包，因此能够方便地访问文档非常有帮助。有一个\
  \ URL 可以直接带你进入 PL/SQL API 文档。\n\n```\nhttps://apex.oracle.com/api\n```\n\n注意\n\n\
  当数据库管理员（DBA）可能以“让 Web 服务器访问数据库风险太大”为由，导致无法充分利用 APEX 提供的全部功能时，或许可以请求*只*安装 APEX 包而*不*设置\
  \ Web 服务器。拥有 APEX 包可以使 PL/SQL 开发工作轻松许多。\n\n### 调用 Web 服务\n\n一个常见的需求是将本地数据库中的数据与不同数据源中可用的数据结合起来。想想天气信息、货币汇率、运费报价或交换发票数据。\n\
  \n实现此目标的一种方法是调用 Web 服务。以前，在与 Web 服务交互时，你必须使用 `UTL_HTTP` 并处理许多底层细节。Oracle APEX 使得调用\
  \ Web 服务变得非常简单。APEX 包同时支持 SOAP Web 服务和 REST 风格的 API。\n\n本部分讨论的示例使用了 Ergast Developer\
  \ API (`http://ergast.com/mrd/`)，该 API 提供了赛车运动的历史数据记录。通过此 Web 服务，可以获取 XML 或 JSON\
  \ 格式的结果。我们更倾向于使用 JSON。\n\n本章中的示例使用 Oracle Database 21c Express Edition。根据你的数据库设置，你可能需要你的\
  \ DBA 配置网络访问控制列表（ACL）。\n\n注意\n\n配置网络 ACL 超出了本书的范围。这在 *Oracle APEX 安装指南* 的第 [6] 章“安装和配置\
  \ Oracle APEX 与 Oracle REST 数据服务”中有所讨论。\n\n在 `apex_web_service` 包中，有两个用于调用 REST\
  \ 风格 Web 服务的过程；一个返回 `CLOB`，另一个返回 `BLOB`。在示例中，调用了 `CLOB` 变体，以便可以轻松检查结果。当你需要将 JSON\
  \ 文档存储在数据库中时，请参考第 [11] 章。\n\n调用 Web 服务所需的最低限度是 URL 和 HTTP 方法，本例中是 `GET` 请求。\n\n\
  ```sql\ndeclare\n  l_response clob;\n  l_part     varchar2(4000 char);\n  l_offset\
  \   pls_integer;\nbegin\n  l_response := apex_web_service.make_rest_request\n  \
  \               (p_url         => 'http://ergast.com/api/f1/current.json'\n    \
  \             ,p_http_method => 'GET'\n                 );\n```\n\n该 URL 指定了要检索的内容：以\
  \ JSON 文档形式呈现的当前年份的一级方程式数据。如果从 URL 中省略 .json 扩展名，则会返回 XML。URL 语法由你所使用的 Web 服务决定。\n\
  \n调用 Web 服务后，最佳实践是验证调用是否成功。可以通过检查 `apex_web_service` 包中声明的全局变量 `g_status_code` 来获取此值。成功的响应可能与错误响应大相径庭，因此你的解析方法也必须不同，以便从失败的响应中提取有用信息。\n\
  \n响应状态码在 200 到 299 之间表示响应成功。\n\n```sql\nif apex_web_service.g_status_code between\
  \ 200 and 299 then\n```\n\n为了显示响应的内容，让我们使用另一个 APEX 包 `apex_string` 来获取 `CLOB` 变量的各个部分，并用\
  \ `dbms_output` 显示它们。\n\n```sql\nwhile apex_string.next_chunk (\n        p_str \
  \   => l_response\n       ,p_chunk  => l_part\n       ,p_offset => l_offset\n  \
  \     ,p_amount => 4000)\nloop\n  sys.dbms_output.put_line (l_part);\nend loop;\n\
  ```\n\n代码清单 [15-1] 展示了完整的代码示例和输出的第一部分。完整的消息太长，无法在此全部显示。\n\n```sql\ndeclare\n  l_response\
  \ clob;\n  l_part     varchar2(4000 char);\n  l_offset   pls_integer;\nbegin\n \
  \ l_response := apex_web_service.make_rest_request\n                 (p_url    \
  \     => 'http://ergast.com/api/f1/current.json'\n                 ,p_http_method\
  \ => 'GET'\n                 );\n  sys.dbms_output.put_line (apex_web_service.g_status_code);\n\
  \  if apex_web_service.g_status_code between 200 and 299 then\n    while apex_string.next_chunk\
  \ (\n            p_str    => l_response\n           ,p_chunk  => l_part\n      \
  \     ,p_offset => l_offset\n           ,p_amount => 4000)\n    loop\n      sys.dbms_output.put_line\
  \ (l_part);\n    end loop;\n  end if;\nend;\n{\"MRData\":{\"xmlns\":\"http:\\/\\\
  /ergast.com\\/mrd\\/1.5\",\"series\":\"f1\",\"url\":\"http://ergast.com/api/f1/current.json\"\
  ,\"limit\":\"30\",\"offset\":\"0\",\"total\":\"22\",\"RaceTable\":{\"season\":\"\
  2022\",\"Races\":[{\"season\":\"2022\",\"round\":\"1\",...\n```\n\n代码清单 15-1\n从\
  \ Web 服务获取当前赛季的 F1 比赛数据\n\n\n\n### 在 Oracle APEX 中处理 Web 服务请求头与 JSON 数据\n\n当 Web\
  \ 服务要求您指定请求头时，最初可能不太清楚该如何操作。\n\n设置请求头是通过为全局变量 `g_request_headers` 赋值来完成的，该变量在 `apex_web_service`\
  \ 包中定义。\n\n清单 15-2 展示了如何设置用于 Bearer 令牌授权的请求头，将文本 “Bearer ”（带一个尾随空格）与局部变量 `l_bearer_token`\
  \ 连接起来，以及一个包含在通过 HTTP GET 请求调用 Web 服务时发送的请求体内容类型的请求头。\n\n```\napex_web_service.g_request_headers(1).name\
  \  := 'Authorization';\napex_web_service.g_request_headers(1).value := 'Bearer '\
  \ || l_bearer_token;\napex_web_service.g_request_headers(2).name  := 'Content-Type';\n\
  apex_web_service.g_request_headers(2).value := 'application/json';\n```\n\n清单 15-2\
  \ 设置请求头\n\n由于请求头是设置在全局变量中的，建议在 Web 服务调用后将其清除。这可以防止其他 Web 服务调用重用于特定 Web 服务的相同请求头。可以通过以下方式清除请求头。\n\
  \n```\napex_web_service.clear_request_headers;\n```\n\n虽然前述设置请求头的方法有效，但一个打包过程可以一步到位。\n\
  \n```\napex_web_service.set_request_headers (\n    p_name_01  => 'Authorization'\n\
  \   ,p_value_01 => 'Bearer ' || l_bearer_token\n   ,p_name_02  => 'Content-Type'\n\
  \   ,p_value_02 => 'application/json'\n);\n```\n\n调用此过程的优点在于默认重置请求头；您无需担心它们。它们仅用于当前的\
  \ Web 服务调用。最多可以通过 `set_request_headers` 过程设置五个请求头。\n\n`APEX_WEB_SERVICE` 包还能实现更多功能，例如基本认证、OAuth\
  \ 认证、指定使用哪个 Oracle Wallet 以及向 Web 服务发送 multipart/form 请求体。\n\n一个常见的需求是根据环境让 Web\
  \ 服务指向多个不同的端点。对于开发环境，您希望指向端点 A，而生产环境则应指向端点 B。这可以通过条件编译实现（更多详情参见第 6 章）。\n\n清单 15-3\
  \ 是一个变量声明的示例，它根据 `environment_pkg` 中的静态布尔值指向不同的端点。\n\n```\nl_url constant varchar2(50)\
  \ :=\n$if environment_pkg.development\n$then 'url to endpoint A'\n$elsif environment_pkg.production\n\
  $then 'url to endpoint B'\n$end;\n```\n\n清单 15-3 一个变量，不同环境指向不同端点\n\n`environment_pkg`\
  \ 中的静态布尔值声明如下所示。\n\n```\ndevelopment constant boolean := TRUE;\nproduction  constant\
  \ boolean := FALSE;\n```\n\n#### 从 JSON 获取数据\n\n当使用 Oracle Database 12 或更高版本时，最好使用内置的\
  \ JSON 功能（参见第 11、12、13 和 14 章），而不是 APEX 的功能。内置 JSON 功能的性能远优于 `apex_json`。\n\n您已经检索了一个包含\
  \ Formula 1 数据的 JSON 文档。清单 15-4 是此响应的一个格式化的小样本。\n\n```\n{\n  \"MRData\": {\n   \
  \ \"xmlns\": \"http:\\/\\/ergast.com\\/mrd\\/1.5\",\n    \"series\": \"f1\",\n \
  \   \"url\": \"http://ergast.com/api/f1/current.json\",\n    \"limit\": \"30\",\n\
  \    \"offset\": \"0\",\n    \"total\": \"22\",\n    \"RaceTable\": {\n      \"\
  season\": \"2022\",\n      \"Races\": [\n        {\n          \"season\": \"2022\"\
  ,\n          \"round\": \"1\",\n          \"url\": \"http:\\/\\/en.wikipedia.org\\\
  /wiki\\/2022_Bahrain_Grand_Prix\",\n          \"raceName\": \"Bahrain Grand Prix\"\
  ,\n          // 为简洁起见省略\n          // 此部分包含 22 场比赛的详细信息，例如赛道\n        }\n      ]\n\
  \    }\n  }\n}\n```\n\n清单 15-4 格式化的 JSON 响应\n\n在从此 JSON 文档中提取数据之前，您需要将 JSON 文档解析为内部格式。\n\
  \n```\napex_json.parse ( p_values => races\n                 ,p_source => l_races\n\
  \                );\n```\n\n其中 `races` 是类型为 `apex_json.t_values` 的局部变量，这是所需的内部格式。在局部变量中，`l_races`\
  \ 是调用 Web 服务的响应，其数据类型为 CLOB。\n\n本赛季的比赛数量存储在 `MRData` 对象的 `total` 属性中。因为此值预期是一个数字，所以可以使用\
  \ `get_number` 函数提取它。\n\n```\napex_json.get_number (\n    p_path   => 'MRData.total'\n\
  \   ,p_values => races\n);\n```\n\n使用点表示法，您指出了通往比赛总数的路径。同样，您可以提取位于 `RaceTable` 对象中更深层的赛季值。\n\
  \n```\napex_json.get_number (\n    p_path   => 'MRData.RaceTable.season'\n   ,p_values\
  \ => races\n);\n```\n\n注意\n\n路径中的名称区分大小写。如果使用错误的大小写，则无法找到您要查找的节点。\n\n所有赛季比赛的名称位于\
  \ `Races` 属性中的一个对象数组中。可以通过相应地调整路径来获取本赛季的第一场比赛名称。\n\n```\napex_json.get_varchar2\n\
  \   (p_path => 'MRData.RaceTable.Races[1].raceName'\n   ,p_values => races\n   );\n\
  ```\n\n清单 15-5 是一个完整的示例，包含对 Web 服务的调用并显示 JSON 文档中的不同值。\n\n```\ndeclare\n    races\
  \      apex_json.t_values;\n    l_races    clob;\n    l_elements apex_t_varchar2;\n\
  begin\n    l_races := apex_web_service.make_rest_request\n                   (p_url\
  \         => 'http://ergast.com/api/f1/current.json'\n                   ,p_http_method\
  \ => 'GET'\n                   );\n    if apex_web_service.g_status_code between\
  \ 200 and 299\n    then\n        apex_json.parse ( p_values => races\n         \
  \                ,p_source => l_races\n                        );\n        sys.dbms_output.put_line\
  \ (\n            'Season: '||\n            apex_json.get_number\n              \
  \           (p_path   => 'MRData.RaceTable.season'\n                         ,p_values\
  \ => races)\n        );\n        sys.dbms_output.put_line (\n            'Nr of\
  \ races: '||\n            apex_json.get_number\n                         (p_path\
  \   => 'MRData.total'\n                         ,p_values => races)\n        );\n\
  \        sys.dbms_output.put_line (\n            'First Race: '||\n            apex_json.get_varchar2\n\
  \                         (p_path => 'MRData.RaceTable.Races[1].raceName'\n    \
  \                     ,p_values => races)\n        );\n    end if;\nend;\nSeason:\
  \ 2022\nNr of races: 22\nFirst Race: Bahrain Grand Prix\n```\n\n清单 15-5 从 JSON 文档中提取值\n\
  \n\n\n### 基础空间功能\n\n本章使用的 Web 服务还包含了赛道的坐标——纬度（lat）和经度（long）。这些值可以在以下 JSON 片段（并非完整的\
  \ JSON 文档）的 `Location` 对象中看到。\n\n```\n\"Races\": [\n{\n\"season\": \"2022\",\n\"\
  round\": \"15\",\n\"url\": \"http:\\/\\/en.wikipedia.org\\/wiki\\/2022_Dutch_Grand_Prix\"\
  ,\n\"raceName\": \"Dutch Grand Prix\",\n\"Circuit\": {\n\"circuitId\": \"zandvoort\"\
  ,\n\"url\": \"http:\\/\\/en.wikipedia.org\\/wiki\\/Circuit_Zandvoort\",\n\"circuitName\"\
  : \"Circuit Park Zandvoort\",\n\"Location\": {\n\"lat\": \"52.3888\",\n\"long\"\
  : \"4.54092\",\n\"locality\": \"Zandvoort\",\n\"country\": \"Netherlands\"\n}\n\
  },\n```\n\n以下表达式提取了第 15 场比赛（赞德沃特）的纬度，该值位于 `Location` 对象中，也是数组中的第 15 个对象。\n\n```\n\
  apex_json.get_number (p_path => 'MRData.RaceTable.Races[15].Circuit.Location.lat'\n\
  ,p_values => races)\n```\n\n经度的提取方式类似。\n\n要使用 Oracle 数据库提供的所有空间函数，需要将坐标转换为正确的数据类型\
  \ `mdsys.sdo_geometry`。\n\n以下代码片段展示了如何进行此转换，其中 `l_circuit` 是一个局部变量。\n\n```\nl_circuit\
  \ := apex_spatial.point\n(p_lon =>  apex_json.get_number\n(p_path => 'MRData.RaceTable.Races[15].Circuit.Location.long'\n\
  ,p_values => races)\n,p_lat => apex_json.get_number\n(p_path => 'MRData.RaceTable.Races[15].Circuit.Location.lat'\n\
  ,p_values => races)\n);\n```\n\n现在 JSON 文档中的值已经转换为真实的几何对象，让我们使用空间函数来计算荷兰 Oosterhout\
  \ 与赞德沃特赛道之间的距离。清单 15-6 是一个完整的代码示例，其中用 `apex_spatial.` 构建了两个几何对象。`sdo_distance` 空间函数用于确定两者之间的距离（以公里为单位）。例如，你可以使用\
  \ Google Maps 查找你家乡的坐标。\n\n```\ndeclare\nl_circuit  mdsys.sdo_geometry;\nl_hometown\
  \ mdsys.sdo_geometry;\nraces      apex_json.t_values;\nl_races    clob;\nbegin\n\
  l_hometown := apex_spatial.point\n(p_lon => 4.861316883708699\n,p_lat => 51.64485385756768\n\
  );\nl_races := apex_web_service.make_rest_request\n(p_url         => 'http://ergast.com/api/f1/current.json'\n\
  ,p_http_method => 'GET'\n);\napex_json.parse (p_values => races\n,p_source => l_races\n\
  );\nl_circuit := apex_spatial.point\n(p_lon =>  apex_json.get_number (p_path =>\
  \ 'MRData.RaceTable.Races[15].Circuit.Location.long'\n,p_values => races)\n,p_lat\
  \ => apex_json.get_number (p_path => 'MRData.RaceTable.Races[15].Circuit.Location.lat'\n\
  ,p_values => races)\n);\nsys.dbms_output.put_line (\n'The distance from my hometown\
  \ to the circuit is '\n||sdo_geom.sdo_distance\n(geom1 => l_hometown\n,geom2 =>\
  \ l_circuit\n,unit  => 'unit=KM')\n||' km'\n);\nend;\nThe distance from my hometown\
  \ to the circuit is 85.64951103008 km\n清单 15-6\n我的家乡距离赞德沃特赛道有多远？\n```\n\n### 文本处理实用工具\n\
  \n你已经学习了如何利用 `apex_string.next_chunk` 包函数来显示 CLOB，但还有许多其他很酷的函数值得研究。\n\n我们个人最喜欢的功能之一是\
  \ `split`。清单 15-7 展示了该函数的示例。\n\n```\nselect column_value\nfrom apex_string.split\n\
  (p_str => 'this:should:be:shown:as:a:table'\n,p_sep => ':')\nCOLUMN_VALUE\n\nthis\n\
  should\nbe\nshown\nas\na\ntable\n清单 15-7\napex_string.split 用法示例\n```\n\n如清单 15-7\
  \ 所示，`split` 函数将一个字符分隔的字符串（也可以是 CLOB）转换为一个嵌套表类型。\n\n既然有 `split` 函数，那也一定有 `join`\
  \ 函数。输入的嵌套表类型为 `apex_t_varchar2`。你可以在清单 15-8 中看到此功能的示例及其输出。\n\n```\ndeclare\nl_ename_t\
  \ apex_t_varchar2;\nbegin\nselect ename\nbulk collect\ninto l_ename_t\nfrom emp;\n\
  sys.dbms_output.put_line (\napex_string.join (p_table => l_ename_t\n,p_sep   =>\
  \ '~'\n)\n);\nend;\nSMITH~ALLEN~WARD~JONES~MARTIN~BLAKE~CLARK~SCOTT~KING~TURNER~ADAMS~JAMES~FORD~MILLER\n\
  清单 15-8\napex_string.join 用法示例\n```\n\n必须指出的是，上述 `apex_string.join` 函数的功能也可以通过 SQL\
  \ 函数 `listagg` 实现。`listagg` 函数能处理的最大长度取决于 `max_string_size` 初始化参数的设置。当 `listagg`\
  \ 函数不适用（超出长度限制）时，`apex_string.join_clobs` 可以填补这个空缺。\n\n#### 格式化消息\n\n当你需要格式化消息时，`format`\
  \ 函数非常有用。此函数允许你创建包含最多 19 个替换变量占位符的消息。清单 15-9 是一个带有替换参数的格式化错误消息示例。\n\n```\nraise_application_error\n\
  (-20000\n,apex_string.format (p_message => q'{The combination %0, %1, and %2 is\
  \ not allowed}'\n,p0 => 'A'\n,p1 => 'B'\n,p2 => 'C'\n)\n);\nError report -\nORA-20000:\
  \ The combination A, B, and C is not allowed\nORA-06512: at line 2\n清单 15-9\n一个带有变量的、格式良好的错误消息\n\
  ```\n\n此函数还提供了一个参数 `p_max_length`，用于防止消息变得过长。该参数的默认值为 1000。\n\n当你需要保留多行消息的布局时，`p_prefix`\
  \ 参数就非常有用。指定的前导前缀和空白将从每一行中移除。清单 15-10 展示了一个多行消息及其输出的示例。注意，所有的前导空白都被移除了，但结果文本按照预期进行了缩进。\n\
  \n```\nbegin\nsys.dbms_output.put_line (\napex_string.format (\np_message => q'{Things\
  \ you should do:\n!   * Get quality sleep\n!   * Eat Healthy\n!   * Exercise regularly\n\
  !and all will be well}'\n,p_prefix => '!'\n));\nend;\n/\nThings you should do:\n\
  * Get quality sleep\n* Eat Healthy\n* Exercise regularly\nand all will be well\n\
  清单 15-10\n保留多行消息的布局\n```\n\n#### 请在此处签上姓名首字母\n\nAPEX_STRING 包中一个实用的小工具是 `get_initials`。此函数将姓名转换为姓名首字母缩写。它输出每个单词的首字母（大写），数量上限由你指定。默认返回两个字母。如果单词数量超过\
  \ `p_cnt`，则返回 *前* `p_cnt` 个单词的首字母。清单 15-11 是此函数的示例。注意，输入的名字是小写，并指定了最多返回四个字母。由于输入字符串中只有两个单词，结果是两个大写字母。\n\
  \n```\nbegin\nsys.dbms_output.put_line (\napex_string.get_initials (\np_str => 'alex\
  \ nuijten'\n,p_cnt => 4\n)\n);\nend;\nAN\n清单 15-11\n获取姓名首字母\n```\n\n一种更动态地获取给定姓名中所有首字母的方法是使用正则表达式来统计姓名中的单词数量，类似于下面的示例：\n\
  \n```\ndeclare\nl_str varchar2(140) := 'Willem-Alexander Claus George Ferdinand';\n\
  begin\nsys.dbms_output.put_line (\napex_string.get_initials (\np_str => l_str\n\
  ,p_cnt => regexp_count (l_str, '[[:punct:][:space:]]') + 1\n)\n);\nend;\nWACGF\n\
  ```\n\n### 解析数据\n\n一个常见的需求是将文件（例如 Excel 或 CSV 文件）上传到数据库，然后解析它以获取内容并将其存储到数据库表中。这个需求可能相当具有挑战性，特别是当\
  \ Excel 文件中有多个工作表，或者需要转义某些值等情况时。这正是 `apex_data_parser` 大放异彩的地方，它可以让你的程序变得优雅。\n\n\
  \n\n### 业务案例\n\n本节中的示例是一个业务案例的一部分。我们应用的用户可以将 CSV 文件上传到数据库。这些文件存储在一个 `BLOB` 列中。在此案例中，保存已上传文件的\
  \ `TEMP_FILES` 表包含表 15-1 中概述的列。\n\n**表 15-1**\n\n**TEMP_FILES 表中的列**\n\n| 列名 | 用途\
  \ |\n| --- | --- |\n| ID | 用于识别要处理文件的主键 |\n| Filename | 已上传文件的名称，应包含文件扩展名 |\n| Mime_type\
  \ | Mime 类型，在此案例中应为 \"text/csv\" |\n| Blob_content | 以二进制格式存储的已上传文件 |\n\n**注意**\n\
  \n文件扩展名被 `APEX_DATA_PARSER` 包用于识别应如何解析文件。在此案例中，文件名应以 `.csv` 为后缀。\n\n这些文件包含支付数据，例如\
  \ `payment_date`、`payment_method`、`currency`、`amount` 等。CSV 文件中使用的分隔符可能各不相同；有时是逗号，有时是分号。有些文件的标题行带引号；有些则不带。\n\
  \n由于应用允许上传不同的文件，每个文件的结构可能差异很大。文件中的标题行决定了你应如何使用其中的数据。文件中可能包含比你需要的多得多的列，但这些列可以忽略。\n\
  \n对于每个文件，你都知道相关信息在哪里可以找到。\n\n一个名为 `DESTINATION_TBL` 的目标表用于存储解析后的数据。\n\n你需要处理许多变化；实现这一点绝非易事。\n\
  \n#### 让我们开始解析吧！\n\n实现需求的第一步是确定你正在处理哪种变化的支付文件。\n\n因为文件的变化种类是有限的，所以在此案例中，你可以为每个已知的标题行结构定义常量。清单\
  \ 15-12 定义了两种不同标题的常量：一个是 Mollie 文件的，另一个是 PayPal 文件的。常量的数据类型是 `apex_t_varchar2`，这是一种嵌套表类型。即使文件中的每一列并不都用于提取数据，你仍然需要在常量中声明它们。如你所见，这两种文件的结构差异很大。\n\
  \n```sql\nl_mollie_headers constant apex_t_varchar2\n:= apex_t_varchar2\n('DATE_'\n\
  ,'PAYMENT_METHOD'\n,'CURRENCY'\n,'AMOUNT'\n,'STATUS'\n,'ID'\n,'DESCRIPTION'\n,'CONSUMER_NAME'\n\
  ,'CONSUMER_BANK_ACCOUNT'\n,'CONSUMER_BIC'\n,'SETTLEMENT_CURRENCY'\n,'SETTLEMENT_AMOUNT'\n\
  ,'SETTLEMENT_REFERENCE'\n,'AMOUNT_REFUNDED'\n);\nl_paypal_headers constant apex_t_varchar2\n\
  := apex_t_varchar2\n('DATE_'\n,'TIME'\n,'TIME_ZONE'\n,'DESCRIPTION'\n,'CURRENCY'\n\
  ,'GROSS'\n,'FEE'\n,'NET'\n,'BALANCE'\n,'TRANSACTION_ID'\n,'FROM_EMAIL_ADDRESS'\n\
  ,'NAME'\n,'BANK_NAME'\n,'BANK_ACCOUNT'\n,'SHIPPING_AND_HANDLING_AMOUNT'\n,'SALES_TAX'\n\
  ,'INVOICE_ID'\n,'REFERENCE_TXN_ID'\n);\n```\n\n*清单 15-12*\n*用于不同文件头的常量*\n\n下一步是从上传的\
  \ CSV 文件中提取第一行，即标题行。这个文件标题存储在一个局部变量中，也是一个 `apex_t_varchar2` 类型。\n\n你可以使用 `APEX_DATA_PARSER`\
  \ 包中的 `discover` 函数来识别你正在处理的文件。该函数返回一个 `CLOB` 值，其中包含文件的列配置信息。你可以通过将此配置信息传递给 `get_columns`\
  \ 函数来获取有关列的信息，例如以下内容。\n\n- 列位置\n- 列名\n- 数据类型\n- 格式掩码\n\n使用一个简单的 select 语句，你可以提取清单\
  \ 15-13 中显示的信息。参数是 `P_ID`。它需要你想要处理的已上传文件的主键。\n\n```sql\nselect column_name\nbulk\
  \ collect\ninto l_file_headers\nfrom temp_files tf\ncross\njoin table (apex_data_parser.get_columns\n\
  (apex_data_parser.discover\n(p_content   => tf.blob_content\n,p_file_name => tf.filename\n\
  )))\nwhere tf.id = p_id;\n```\n\n*清单 15-13*\n*从文件中提取列名*\n\n**提示**\n\n清单 15-13 中的\
  \ `table` 运算符自 Oracle Database 12.2 起已是可选的。你不再需要使用它。但它可以使你的代码更易读、更容易理解。\n\n一旦你获得了文件的配置信息以及该文件中的列名，你就可以将其与预定义的文件模式（之前声明的常量）进行比较。\n\
  \n```sql\ncase l_file_headers\nwhen l_mollie_headers\nthen\nprocess_mollie;\nwhen\
  \ l_paypal_headers\nthen\nprocess_paypal;\nend case;\n```\n\n我们更倾向于使用搜索式 case 语句。当没有匹配项时（上传了未知文件），它会引发\
  \ `CASE_NOT_FOUND` 异常。这个异常可以被捕获，并向应用提供反馈，告知上传了错误的文件。\n\n找到匹配项后，文件终于可以开始处理了。你需要为每种文件类型编写单独的\
  \ procedure 来提取相关信息。\n\n你可以使用 `APEX_DATA_PARSER` 包中的 `parse` 函数从上传的文件中检索所有数据。最多支持\
  \ 300 列。\n\n清单 15-14 展示了如何使用 `parse` 函数将相关数据插入到 `DESTINATION_TBL` 中。\n\n```sql\n\
  insert into destination_tbl\n(date_\n,payment_method\n,currency\n,amount\n,status\n\
  ,description\n)\nselect to_date (col001, 'yyyy-mm-dd hh24:mi:ss')\n,col002\n,col003\n\
  ,col004\n,col005\n,col007\nfrom temp_files tf\ncross\njoin table (apex_data_parser.parse\n\
  (p_content   => tf.blob_content\n,p_file_name => tf.filename\n,p_skip_rows => 1\
  \ -- 跳过标题行\n))\nwhere tf.id = p_id;\n```\n\n*清单 15-14*\n*将数据从文件移动到表中*\n\n这让你对 `apex_data_parser`\
  \ 的功能有了初步了解，但它还可以更加灵活。在你从 `discover` 函数获取的文件配置信息中，还包含有关列中使用的格式掩码和小数字符的信息。这些信息可以将文件中的数据转换为数据库中的正确数据。\n\
  \n**提示**\n\n使用 `validate_conversion` 函数，你可以确定一个表达式是否可以转换为指定的数据类型。此外，`to_date` 和\
  \ `to_number` 的 `default on conversion error` 子句在这方面也能提供帮助。\n\n### 处理 ZIP 文件\n\n\
  上一节讨论了将文件上传到数据库，但对于应用用户来说，这可能相当繁琐。在这些情况下，如果用户能够上传包含所有需要上传到数据库的文件的 ZIP 文件，可能会更有益。\n\
  \n反之亦然。当用户想要从数据库下载多个文件时，下载单个 ZIP 文件比下载十个单独的文件更有效率。\n\n\n## 16. 后台数据处理\n\n处理数据可能相当耗时；例如，当一个文件被上传到数据库时，它需要被解析并加载到多个表中。对于最终用户而言，在处理完成之前，应用程序的使用会陷入停滞。\n\
  通常，文件（或任何其他类型的数据流入——如网络服务）的处理可以延迟到稍后进行。将进程转移到后台，可以将应用程序的控制权交还给用户，给人一种应用程序快速响应的感觉，从而改善用户体验。\n\
  \n### 资源密集型\n\n数据处理可能是资源密集型的，这可能会妨碍应用程序的用户。在系统负载高峰期过后再处理数据将是有益的，因为它不会妨碍任何用户。\n任何非时间依赖性的进程，例如通过外部网络服务生成文档或从数据库发送电子邮件，都可以卸载到后台进程。您最了解自己的系统，能够判断某个进程是否可以卸载到后台。\n\
  \n### 队列\n\nMerriam-Webster 词典将*队列*定义为“一种数据结构，由记录列表组成，记录从一端添加，从另一端移除。”\n在最基本的层面，消息被入队到队列中，每条消息由消费者出队并处理一次。消息会一直保留在队列中，直到被出队移除或消息过期。消息的生产者决定消息何时过期。消息不一定按照入队的顺序出队。\n\
  在 Oracle 数据库中，队列是一个功能齐全的消息传递解决方案。支持点对点、发布/订阅、持久性和非持久性消息传递。有多种方式可以与队列功能交互，包括 PL/SQL、JMS、JDBC、.NET、Python\
  \ 和 Node.js。\nOracle 数据库提供两种类型的队列系统：事务性事件队列（`TEQ`）和高级队列（`AQ`）。`TEQ`是一个高性能的分区实现，每个队列支持多个事件流。`AQ`是一个基于磁盘的实现，适用于更简单的工作流用例。本章重点介绍`AQ`。\n\
  \n### 用例\n\n通过应用程序上传几个包含最新详细信息的 CSV 文件，以保持一级方程式数据库的更新。需要存储许多细节，如单圈时间、进站信息、排位赛结果等。\n\
  处理文件中所有不同的结果需要相当长的时间，并且可能是资源密集型的。在这些文件被解析和处理时，应用程序无法响应，用户对此表示不满。\n通过将文件的解析和处理推迟到稍后的时间点，可以将应用程序的控制权交还给用户。\n\
  从高层次来看，计划是将文件存储在数据库表中。包含新创建记录主键的消息被放置在队列上。完成此操作后，控制权即交还给用户。\n稍后，检索队列上的消息，指示哪些文件仍需要处理。处理完成后，可以从队列中移除消息，并且可以从临时表中移除记录（但这对于流程并非必要，为了以防万一，保留它们可能有用）。\n\
  可以通过调度器作业以定时间隔读取队列中的消息，但`AQ`有更好的方法，将在后面探讨。\n\n### 解压文件\n\n上传的`ZIP`文件存入数据库后，从中提取文件是直接了当的。良好的做法是将文件上传到单独的表中。\n\
  要解压文件，首先需要根据`ZIP`文件的名称将其提取到本地的`BLOB`变量中。这个本地`BLOB`变量作为参数传递给`get_files()`函数。返回值是`apex_zip.t_files`数据类型，这是一个关联数组。它是`ZIP`文件内的文件名列表。\n\
  ```sql\ndeclare\nl_zip_file      blob;\nl_unzipped_file blob;\nl_files         apex_zip.t_files;\n\
  begin\nselect blob_content\ninto l_zip_file\nfrom zip_files\nwhere filename = 'archive.zip';\n\
  l_files := apex_zip.get_files\n(p_zipped_blob => l_zip_file);\n```\n下一步是从`ZIP`文件中获取实际的文件。为此，使用`get_file_content()`函数，它接受`ZIP`文件内部的文件名。此示例使用一个简单的`for\
  \ 循环`将`ZIP`内的文件插入到之前创建的表中。\n```sql\nfor i in 1 .. l_files.count\nloop\nl_unzipped_file\
  \ := apex_zip.get_file_content\n(p_zipped_blob => l_zip_file\n,p_file_name   =>\
  \ l_files(i)\n);\ninsert into temp_files\n(filename\n,blob_content\n)\nvalues\n\
  (l_files (i)\n,l_unzipped_file\n);\nend loop;\nend;\n```\n这就是解压`ZIP`文件并将文件存储到数据库表中所需的全部操作。\n\
  当`ZIP`文件包含文件夹时，文件名会以`dir/subdir/filename`的形式反映出来。\n\n### 压缩文件\n\n在数据库内部创建一个可供应用程序下载的`ZIP`文件，对用户可能很有用。\n\
  首先，必须检索要压缩到`ZIP`文件中的文件。对于此示例，使用了一个游标`for 循环`；它对 100 行数据进行隐式的批量获取。本地变量（数据类型为`BLOB`）就是`ZIP`文件。\n\
  ```sql\ndeclare\nl_zip_file blob;\nbegin\nfor r in (select tf.filename\n,tf.blob_content\n\
  from temp_files tf\n)\nloop\n```\n`add_file()`过程接受三个参数：本地变量（一个`ZIP`文件）、文件名和文件内容。\n\
  ```sql\napex_zip.add_file (p_zipped_blob => l_zip_file\n,p_file_name   => r.filename\n\
  ,p_content     => r.blob_content\n);\nend loop;\n```\n要完成`ZIP`文件，您需要告知压缩进程不再向压缩包中添加文件。\n\
  ```sql\napex_zip.finish (p_zipped_blob => l_zip_file);\n```\n下面的示例将结果存储在一个现有的表中。\n\
  ```sql\ninsert into zip_files\n(filename\n,mime_type\n,blob_content\n)\nvalues\n\
  ('all_files.zip'\n,'application/zip'\n,l_zip_file\n);\nend;\n```\n\n### 小结\n\n本章详细探讨了`APEX`包。即使您不使用`APEX`来开发应用程序，您仍然可以利用它的一些功能。\n\
  您学习了如何调用网络服务以及如何从`JSON`文档中提取信息。该`JSON`文档包含空间信息，因此可以使用`APEX`函数将它们转换为真正的空间几何对象。借助`apex_string`，格式化字符串和提取首字母缩写变得很容易。\n\
  使用`apex_data_parser`可以轻松解析来自文件的数据并提取相关信息。\n最后，您了解了如何在数据库中压缩和解压文件。\n\n\n### 设置\n\n\
  要使用 AQ，需要额外的权限。与 AQ 相关的权限在表 16-1 中概述。\n\n#### 权限\n\n| 操作 | 所需权限 |\n| --- | --- |\n\
  | 创建、删除和监控自己的队列 | 对 `DBMS_AQADM` 的执行权限 |\n| 创建、删除和监控任何队列 | 对 `DBMS_AQADM` 的执行权限和\
  \ `AQ_ADMINISTRATOR_ROLE` 角色 |\n| 向自己的队列入队和出队 | 对 `DBMS_AQ` 的执行权限 |\n| 向其他队列入队和出队\
  \ | 对 `DBMS_AQ` 的执行权限。该队列的所有者可以使用 `DBMS_AQADM.GRANT_QUEUE_PRIVILEGE` 授予权限 |\n| 向任何队列入队和出队\
  \ | 对 `DBMS_AQ` 的执行权限。AQ 管理员必须使用 `DBMS_AQADM.GRANT_SYSTEM_PRIVILEGE` 授予 `ENQUEUE\
  \ ANY QUEUE` 和 `DEQUEUE ANY QUEUE` 权限 |\n\n对于此用例，需要 `dbms_aqadm` 和 `dbms_aq` 的执行权限。这允许你创建和删除队列，以及入队和出队消息。\n\
  \n如高层计划所述，需要一个暂存表来保存上传的文件。该表包含表 16-2 中概述的列。\n\n#### 暂存表结构\n\n| 列名 | 用途 |\n| ---\
  \ | --- |\n| `FileID` | 主键，用于标识要处理的文件 |\n| `Filename` | 上传文件的名称，应包含文件扩展名 |\n| `Mime_type`\
  \ | MIME 类型，在本例中应为 \"text/csv\" |\n| `Blob_content` | 上传文件的二进制格式 |\n| `Processed`\
  \ | 一个 是/否 标志，指示文件是否已处理 |\n| `Uploaded_ts` | 记录文件上传时间的时间戳，默认值：`systimestamp` |\n\
  | `Processed_ts` | 记录处理完成时间的时间戳 |\n\n### 队列表与队列\n\n要放置在队列中的消息（也称为*有效负载*）由一个对象类型定义。本例中，对象类型定义如下。\n\
  \n```\ncreate noneditionable\ntype file_payload_ot as object\n(fileid number)\n\
  /\n```\n\n这个用例非常直接，但你可以创建一个具有更多属性的对象类型。\n\n基于此对象类型，可以使用 `DBMS_AQADM` 包创建队列表。\n\n\
  ```\nbegin\nsys.dbms_aqadm.create_queue_table (\nqueue_table        => 'file_process_qt'\n\
  , queue_payload_type => 'file_payload_ot'\n);\nend;\n/\n```\n\n这基于之前创建的有效负载对象类型创建了一个队列表。\n\
  \n在此队列表中，需要一个队列来放置和移除消息。可以在单个队列表中有多个队列，但这超出了本用例的范围。队列通过以下语句创建并启动。\n\n```\nbegin\n\
  sys.dbms_aqadm.create_queue\n( queue_name  => 'file_process_q'\n, queue_table =>\
  \ 'file_process_qt'\n);\nsys.dbms_aqadm.start_queue\n( queue_name => 'file_process_q'\
  \ );\nend;\n/\n```\n\n当队列启动后，它就准备好接受要入队的消息了。\n\n这些操作之后，数据库中会新增几个支持队列功能的对象。\n\n```\n\
  select object_name\n, object_type\nfrom   user_objects\nwhere  object_name like\
  \ 'AQ%'\n/\nOBJECT_NAME               OBJECT_TYPE\n------------------------- -----------------------\n\
  AQ$FILE_PROCESS_QT        VIEW\nAQ$_FILE_PROCESS_QT_E     QUEUE\nAQ$_FILE_PROCESS_QT_F\
  \     VIEW\nAQ$_FILE_PROCESS_QT_H     TABLE\nAQ$_FILE_PROCESS_QT_I     INDEX\nAQ$_FILE_PROCESS_QT_T\
  \     INDEX\n6 rows selected.\n```\n\n### 入队与出队\n\n通过调用 `dbms_aq.enqueue` 将消息放置到队列上。在入队消息时，可以设置许多属性，例如指定延迟或消息何时应过期，但对于简单的入队操作，默认设置完全足够。例如，默认情况下，入队跟随主事务。当入队消息的会话回滚事务时，消息将从队列中移除。此行为可以被覆盖；即使主事务回滚，消息也会保持入队状态。\n\
  \n入队的选项通过以下类型的变量设置。\n\n```\nsys.dbms_aq.enqueue_options_t\n```\n\n以下代码将一个消息入队。\n\
  \n```\ndeclare\nl_enqueue_options    sys.dbms_aq.enqueue_options_t;\nl_message_properties\
  \ sys.dbms_aq.message_properties_t;\nl_msgid              raw( 16 );\nl_payload\
  \            file_payload_ot;\nbegin\nl_payload := file_payload_ot (1234);\nsys.dbms_aq.enqueue\n\
  ( queue_name         => 'file_process_q'\n, enqueue_options    => l_enqueue_options\n\
  , message_properties => l_message_properties\n, payload            => l_payload\n\
  , msgid              => l_msgid\n);\nend;\n/\n```\n\n> 注意\n>\n> 入队和出队的 `queue_name`\
  \ 参数指的是队列的名称，而不是队列表。\n\n查询 `file_process_qt` 队列表时，消息会出现在结果集中。\n\n```\nselect user_data\n\
  from file_process_qt\n/\nUSER_DATA(FILEID)\n\nFILE_PAYLOAD_OT(1234)\n```\n\n回滚事务会再次移除它。\n\
  \n```\nrollback\n/\nRollback complete.\nselect user_data\nfrom file_process_qt\n\
  /\nno rows selected\n```\n\n要从队列中出队一个消息，使用 `dbms_aq.dequeue` 过程。与入队过程类似，出队过程的默认设置很合理，在大多数情况下已经足够。默认情况下，出队过程跟随主事务。当消息出队后事务被回滚，消息不会从队列中移除。\n\
  \n出队选项通过以下类型的局部变量设置。\n\n```\nsys.dbms_aq.dequeue_options_t;\n```\n\n以下代码从队列中出队一个消息。\n\
  \n```\ndeclare\nl_dequeue_options    sys.dbms_aq.dequeue_options_t;\nl_message_properties\
  \ sys.dbms_aq.message_properties_t;\nl_msgid              raw( 16 );\nl_payload\
  \            file_payload_ot;\nbegin\nsys.dbms_aq.dequeue\n( queue_name        \
  \ => 'file_process_q'\n, dequeue_options    => l_dequeue_options\n, message_properties\
  \ => l_message_properties\n, payload            => l_payload\n, msgid          \
  \    => l_msgid\n);\nsys.dbms_output.put_line\n( '要处理的文件是 [' || l_payload.fileid\
  \ || ']' );\nend;\n/\n要处理的文件是 [1234]\n```\n\n当没有消息可供出队时，该过程会等待直到有消息出现。`wait` 的默认设置是*永远等待*。这可以通过将\
  \ `wait` 出队选项设置为 `no_wait` 或特定的秒数来覆盖。\n\n```\nl_dequeue_options.wait := dbms_aq.no_wait;\n\
  ```\n\n等待最长时间三秒。\n\n```\nl_dequeue_options.wait := 3;\n```\n\n当等待时间结束，或指定了 `no_wait`\
  \ 且队列上没有消息时，会引发异常。\n\n```\nORA-25228: timeout or end-of-fetch during message dequeue\
  \ from BOOK.FILE_PROCESS_Q\n```\n\n\n\n\n### 包装过程\n\n对于此用例，需要一个过程将文件存储在暂存表中，并在队列上放置一条消息。用于入队消息的包装过程定义如下。\n\
  \n```sql\nprocedure process_later (p_fileid in staging.fileid%type)\nis\nl_enqueue_options\
  \    sys.dbms_aq.enqueue_options_t;\nl_message_properties sys.dbms_aq.message_properties_t;\n\
  l_msgid              raw( 16 );\nl_payload            file_payload_ot;\nbegin\n\
  l_payload := file_payload_ot( p_fileid );\nsys.dbms_aq.enqueue\n( queue_name   \
  \      => 'file_process_q'\n, enqueue_options    => l_enqueue_options\n, message_properties\
  \ => l_message_properties\n, payload            => l_payload\n, msgid          \
  \    => l_msgid\n);\nend process_later;\n```\n\n应用程序调用的用于将文件存储在暂存表中的过程定义如下。\n\n\
  ```sql\nprocedure upload_file\n( p_filename     in staging.filename%type\n, p_mime_type\
  \    in staging.mime_type%type\n, p_blob_content in staging.blob_content%type\n\
  )\nis\nl_fileid staging.fileid%type;\nbegin\ninsert into staging\n( filename\n,\
  \ mime_type\n, blob_content\n, upload_ts\n, processed)\nvalues\n( p_filename\n,\
  \ p_mime_type\n, p_blob_content\n, systimestamp\n, 'N')\nreturning fileid\ninto\
  \ l_fileid;\n-- 当文件存储在表中后\n-- 在队列上放置一条消息以\n-- 在稍后时间启动处理\nprocess_later( p_fileid\
  \ => l_fileid );\nend;\n/\n```\n\n还需要一个过程来处理文件并将数据分发到正确的表中。对于本章，该过程的实现并不重要。实现了以下过程来模拟文件的处理。\n\
  \n```sql\nprocedure process_file (p_fileid in staging.fileid%type)\nis\nbegin\n\
  sys.dbms_session.sleep( 3 ); -- 模拟耗时操作\nupdate staging\nset    processed = 'Y'\n\
  , processed_ts = systimestamp\nwhere  fileid = p_fileid;\nend process_file;\n/\n\
  ```\n\n此过程首先等待三秒钟，之后将处理标志设置为 `'Y'`，并用当前时间戳填充 `processed_ts`。\n\n### PL/SQL 回调通知\n\
  \n一旦文件被上传到暂存表，并且消息被放入队列，如何启动处理？\n\n一种方法是安排一个作业运行，比如每天在指定时间运行。安排作业的缺点是，即使没有文件需要处理，作业也会运行。文件也可能在作业运行后上传，导致处理延迟。这也意味着即使系统在该时间非常繁忙，作业也会运行，从而妨碍系统用户。\n\
  \n#### 回调通知机制\n\n队列有一个更好的技巧：PL/SQL 回调通知。当消息添加到队列时，回调通知可以启动一个 PL/SQL 过程。当消息入队时，回调过程会自动启动。当这种情况发生时，它由数据库处理，很可能是在数据库“安静”时。缺点是无法控制*何时*处理文件。\n\
  \n#### 设置回调\n\n必须采取一些步骤来设置 PL/SQL 回调通知。首先，队列表必须允许多个消费者出队消息。消费者是读取队列中消息的代理。\n\n不幸的是，队列表不能被修改以允许多个消费者。这只能在创建时指定。要删除队列表和队列，请执行以下代码。\n\
  \n```sql\nbegin\ndbms_aqadm.stop_queue\n( queue_name => 'file_process_q' );\ndbms_aqadm.drop_queue\n\
  ( queue_name => 'file_process_q' );\ndbms_aqadm.drop_queue_table\n( queue_table\
  \ => 'file_process_qt' );\nend;\n/\n```\n\n队列在启动时无法被删除。必须先停止它。\n\n以下代码创建一个新的队列表，启用了多消费者功能，并基于相同的对象类型。\n\
  \n```sql\nbegin\nsys.dbms_aqadm.create_queue_table\n( queue_table        => 'file_process_qt'\n\
  , queue_payload_type => 'file_payload_ot'\n, multiple_consumers => true\n);\nend;\n\
  /\n```\n\n重新创建队列表后，也必须重建队列。\n\n```sql\nbegin\nsys.dbms_aqadm.create_queue\n( queue_name\
  \  => 'file_process_q'\n, queue_table => 'file_process_qt'\n);\nsys.dbms_aqadm.start_queue\n\
  ( queue_name => 'file_process_q' );\nend;\n/\n```\n\n这些操作会导致数据库中创建额外的对象。\n\n```sql\n\
  select object_name\n, object_type\nfrom   user_objects\nwhere  object_name like\
  \ 'AQ%'\n/\nOBJECT_NAME               OBJECT_TYPE\n------------------------- -----------------------\n\
  AQ$FILE_PROCESS_QT        VIEW\nAQ$FILE_PROCESS_QT_R      VIEW\nAQ$FILE_PROCESS_QT_S\
  \      VIEW\nAQ$_FILE_PROCESS_QT_E     QUEUE\nAQ$_FILE_PROCESS_QT_F     VIEW\nAQ$_FILE_PROCESS_QT_G\
  \     TABLE\nAQ$_FILE_PROCESS_QT_H     TABLE\nAQ$_FILE_PROCESS_QT_I     TABLE\n\
  AQ$_FILE_PROCESS_QT_L     TABLE\nAQ$_FILE_PROCESS_QT_N     SEQUENCE\nAQ$_FILE_PROCESS_QT_S\
  \     TABLE\nAQ$_FILE_PROCESS_QT_T     TABLE\nAQ$_FILE_PROCESS_QT_V     EVALUATION\
  \ CONTEXT\n13 行已选择。\n```\n\n#### 回调过程\n\n在消费者可以订阅队列并指定要调用的 PL/SQL 例程之前，必须创建 PL/SQL\
  \ 回调过程。PL/SQL 回调过程必须遵循以下签名。\n\n```sql\nprocedure plsqlcallback(\ncontext  IN  RAW\n\
  , reginfo  IN  SYS.AQ$_REG_INFO\n, descr    IN  SYS.AQ$_DESCRIPTOR\n, payload  IN\
  \  RAW\n, payloadl IN  NUMBER\n);\n```\n\n对于这个简单的用例，`descr` 参数包含了所有需要的信息。其他参数可用于更高级的用例。PL/SQL\
  \ 回调过程的主要目的是出队消息并调用文件处理功能。\n\n```sql\nprocedure process_file_callback( context \
  \ in raw\n, reginfo  in sys.aq$_reg_info\n, descr    in sys.aq$_descriptor\n, payload\
  \  in raw\n, payloadl in number)\nis\nl_dequeue_options    sys.dbms_aq.dequeue_options_t;\n\
  l_message_properties sys.dbms_aq.message_properties_t;\nl_msgid              raw(16);\n\
  l_payload            file_payload_ot;\nbegin\n-- 从队列中检索消息\nl_dequeue_options.msgid\
  \ := descr.msg_id;\nl_dequeue_options.consumer_name := descr.consumer_name;\nsys.dbms_aq.dequeue\n\
  ( queue_name         => descr.queue_name\n, dequeue_options    => l_dequeue_options\n\
  , message_properties => l_message_properties\n, payload            => l_payload\n\
  , msgid              => l_msgid\n);\n-- 一旦消息出队，就可以在处理文件\n-- 过程中完成实际工作，以解析和处理\n--\
  \ 文件内容\nprocess_file (p_fileid => l_payload.fileid);\n-- 必须提交事务以\n-- 确保消息从队列中\n\
  -- 被移除\ncommit;\nend process_file_callback;\n/\n```\n\n该过程应使用 `commit` 完成事务，以确保消息从队列中明确移除。\n\
  \n#### 注册订阅者和回调\n\n有了这个 PL/SQL 回调通知，就可以创建一个消费者来订阅队列。订阅者的名称是 `file_process_subscriber`，并被添加到\
  \ `file_process_q`。\n\n```sql\nbegin\nsys.dbms_aqadm.add_subscriber\n( queue_name\
  \ => 'file_process_q'\n, subscriber => sys.aq$_agent\n( name     => 'file_process_subscriber'\n\
  , address  => null\n, protocol => null\n)\n);\nend;\n/\n```\n\n最后一步是注册实际的回调过程。\n\
  \n```sql\nbegin\nsys.dbms_aq.register\n( reg_list =>\nsys.aq$_reg_info_list\n( sys.aq$_reg_info\n\
  ( name      => 'file_process_q:file_process_subscriber'\n, namespace => dbms_aq.namespace_aq\n\
  , callback  => 'plsql://process_file_callback'\n, context   => null\n)\n)\n, reg_count\
  \ => 1\n);\nend;\n/\n```\n\n`context` 参数可用于将信息（以 RAW 格式）传递给回调过程。在回调过程中，您可以使用此信息，例如，来区分队列的不同订阅者。对于此用例，由于只有一个订阅者，因此不需要这样做。\n\
  \n\n\n\n### 实际应用观察\n\n一旦所有组件准备就绪，应用程序用于将文件上传到数据库的代码就会启动整个流程。由于文件尚未被解析和处理，控制权会立即返回给应用程序用户。\n\
  \n```\nbegin\nupload_file\n( p_filename     => 'latest.csv'\n, p_mime_type    =>\
  \ 'text/csv'\n, p_blob_content => :file\n);\nend;\n/\n```\n\n前端应用程序管理着事务。用户通过发出\
  \ `commit` 或 `rollback` 命令来控制事务的结束。\n\n一旦事务以 `commit` 结束，队列中的消息就会被存储，并且回调过程会被调用。\n\
  \n在使用上述例程上传文件后，可以在临时表中观察到以下内容。\n\n```\nselect to_char (upload_ts, 'hh24:mi:ss.ff9')\
  \    as upload_ts\n, to_char (processed_ts, 'hh24:mi:ss.ff9') as processed_ts\n\
  , processed_ts - upload_ts                 as elapsed_time\nfrom   staging\n/\n\
  UPLOAD_TS          PROCESSED_TS       ELAPSED_TIM\n------------------ ------------------\
  \ -----------\n12:28:54.873961000\n```\n\n等待几秒钟后，可以看到以下结果。\n\n```\nUPLOAD_TS   \
  \       PROCESSED_TS       ELAPSED_TIME\n------------------ ------------------ -------------------\n\
  12:28:54.873961000 12:28:58.108458000 +00 00:00:03.234497\n```\n\n当然，这很大程度上取决于数据库的“繁忙”或“空闲”程度。当数据库繁忙时，回调函数会延迟执行。没有\
  \ API 可以控制或定义并发 `PL/SQL` 通知出队进程的数量。这是因为 `AQ` 消息可能以突发式到达，固定数量的进程可能并不总是能高效工作。`AQ`\
  \ 通知会根据总工作量和执行用户定义的 `PL/SQL` 回调过程所需的时间，自动启动合适数量的后台进程（又称 `EMON` 从属进程）。\n\n当消息入队时，用户\
  \ `SYS` 会在后台启动一个新会话。模块是 `DBMS_SCHEDULER`，因此这个包必然涉及该机制。操作（action）被设置为类似“`AQ$_PLSQL_NTFN_`”后跟一个数字的内容。该操作信号涉及\
  \ `AQ` 和 `PL/SQL` 通知。这可以通过查询 `gv$session` 观察到。\n\n```\nselect username\n, module\n\
  , action\nfrom   gv$session\n/\nUSERNAME    MODULE              ACTION\n-----------\
  \ ------------------- -------------------------\nSYS         DBMS_SCHEDULER    \
  \  AQ$_PLSQL_NTFN_4107371948\n```\n\n### 异常队列\n\n创建队列表时会自动添加一个异常队列。当在执行回调过程期间发生意外异常时，队列上的消息会被移至异常队列。\n\
  \n查询 `user_queues` 数据字典视图，可以看到 `file_process_qt` 队列表中有两个队列：一个是常规队列，一个是异常队列。\n\n\
  ```\nselect name\n, queue_table\n, queue_type\nfrom   user_queues\n/\nNAME     \
  \             QUEUE_TABLE     QUEUE_TYPE\n--------------------- ---------------\
  \ --------------------\nFILE_PROCESS_Q        FILE_PROCESS_QT NORMAL_QUEUE\nAQ$_FILE_PROCESS_QT_E\
  \ FILE_PROCESS_QT EXCEPTION_QUEUE\n```\n\n出于演示目的，对最终从回调过程调用的 `process_file` 过程进行了修改，通过在过程体中包含以下行，使其\
  \ `总是` 引发异常。\n\n```\nraise zero_divide;\n```\n\n此异常在 `process_file` 过程中未被处理，并传播到调用它的\
  \ `process_file_callback` 过程。由于回调过程是 `无客户端` 调用的，因此没有客户端能观察到此异常。该消息被移至异常队列。\n\n这不会立即发生；系统会多次尝试成功执行该过程。这些尝试的频率以及尝试之间的延迟时间可以在创建队列时进行控制。有两个参数控制这些设置：`max_retries`\
  \ 和 `retry_delay`。如果未填写这些参数，系统将尝试执行回调过程六次，然后才将消息移至异常队列。每次尝试都会立即进行，没有延迟。\n\n当连续查询队列表\
  \ `file_process_qt` 时，可以观察到消息从常规队列移动到异常队列的过程。\n\n```\nselect qt.q_name\n, qt.msgid\n\
  , to_char (systimestamp, 'hh24:mi:ss.ff9') as ts\nfrom   file_process_qt qt\n/\n\
  Q_NAME                MSGID                    TS\n--------------------- ------------------------\
  \ ------------------\nFILE_PROCESS_Q        ECA2CF1D94B3043FE0539518 13:45:55.842533000\n\
  >\nQ_NAME                MSGID                    TS\n--------------------- ------------------------\
  \ ------------------\nFILE_PROCESS_Q        ECA2CF1D94B3043FE0539518 13:46:12.811844000\n\
  >\nQ_NAME                MSGID                    TS\n--------------------- ------------------------\
  \ ------------------\nAQ$_FILE_PROCESS_QT_E ECA2CF1D94B3043FE0539518 13:46:15.315077000\n\
  ```\n\n一旦问题得到解决，异常情况消失，就可以将异常队列中的消息放回常规队列，这将再次触发回调过程的执行。\n\n在可以从异常队列中出队消息之前，必须启动异常队列以进行出队操作。必须执行以下代码才能为出队操作启动异常队列。\n\
  \n```\nbegin\nsys.dbms_aqadm.start_queue\n( queue_name => 'AQ$_FILE_PROCESS_QT_E'\n\
  , enqueue    => false\n, dequeue    => true\n);\nend;\n/\n```\n\n无法为入队操作启动异常队列。\n\
  \n将消息从异常队列移动到常规队列，可以通过从异常队列出队消息，然后将它们入队到常规队列来完成。以下代码使用一个简单的 `for-loop` 结构，对异常队列上的所有消息执行此操作。\n\
  \n```\ndeclare\nl_dequeue_options    sys.dbms_aq.dequeue_options_t;\nl_message_properties\
  \ sys.dbms_aq.message_properties_t;\nl_message_handle     raw(16);\nl_payload  \
  \          file_payload_ot;\nl_enqueue_options    sys.dbms_aq.enqueue_options_t;\n\
  begin\nfor r in (select qt.msgid\nfrom   file_process_qt qt\nwhere  qt.q_name =\
  \ 'AQ$_FILE_PROCESS_QT_E')\nloop\nl_dequeue_options.msgid := r.msgid;\nsys.dbms_aq.dequeue\n\
  ( queue_name         => 'AQ$_FILE_PROCESS_QT_E'\n, dequeue_options    => l_dequeue_options\n\
  , message_properties => l_message_properties\n, payload            => l_payload\n\
  , msgid              => l_message_handle\n);\nsys.dbms_aq.enqueue\n( queue_name\
  \         => 'file_process_q'\n, enqueue_options    => l_enqueue_options\n, message_properties\
  \ => l_message_properties\n, payload            => l_payload\n, msgid          \
  \    => l_message_handle\n);\nend loop;\ncommit;\nend;\n/\n```\n\n在某些情况下，消息位于异常队列上且需要被移除。此时，可以使用\
  \ `DBMS_AQADM` 包中的 `purge_queue_table` 过程清除异常队列。\n\n```\ndeclare\nl_purge_options\
  \ sys.dbms_aqadm.aq$_purge_options_t;\nbegin\nsys.dbms_aqadm.purge_queue_table\n\
  ( 'file_process_qt'\n, 'qtview.queue = ''AQ$_FILE_PROCESS_QT_E'''\n, l_purge_options\n\
  );\nend;\n/\n```\n\n\n\n### 高级队列与 JSON\n\n自 Oracle 数据库 21c 起，高级队列（AQ）也支持原生 JSON\
  \ 负载。此版本引入了原生 JSON 数据类型。在此之前，处理 JSON 负载虽然可行，但始终是基于文本的；例如，使用 `sys.aq$_jms_text_message`\
  \ 作为负载数据类型。\n\n要创建处理 JSON 负载的队列表，请为 `queue_payload_type` 参数指定 JSON。\n\n```sql\n\
  begin\nsys.dbms_aqadm.create_queue_table (\nqueue_table        => 'json_qt'\n,queue_payload_type\
  \ => 'json'\n);\nend;\n/\n```\n\n在队列表中创建和启动队列的操作与之前相同。\n\n```sql\nbegin\nsys.dbms_aqadm.create_queue\
  \ (\nqueue_name  => 'jq'\n,queue_table => 'json_qt'\n);\nsys.dbms_aqadm.start_queue\
  \ (\nqueue_name => 'jq'\n);\nend;\n/\n```\n\n当然，放入队列的消息应该是 JSON 格式。\n\n```sql\n\
  declare\nl_enqueue_options    sys.dbms_aq.enqueue_options_t;\nl_message_properties\
  \ sys.dbms_aq.message_properties_t;\nl_msgid              raw (16);\nl_payload \
  \           json;\nbegin\nl_payload := json ('{\"Hello\" : \"World\"}');\nsys.dbms_aq.enqueue\n\
  (queue_name         => 'jq'\n,enqueue_options    => l_enqueue_options\n,message_properties\
  \ => l_message_properties\n,payload            => l_payload\n,msgid            \
  \  => l_msgid\n);\ncommit;\nend;\n/\n```\n\n当消息出队时，请记住负载是 JSON。这意味着在 `dbms_output`\
  \ 中使用时，应将其视为 JSON 处理。在下面的示例中，返回值应转换为字符串。\n\n```sql\nset serveroutput on\ndeclare\n\
  l_dequeue_options    sys.dbms_aq.dequeue_options_t;\nl_message_properties sys.dbms_aq.message_properties_t;\n\
  l_msgid              raw(16);\nl_payload            json;\nbegin\nsys.dbms_aq.dequeue(\n\
  queue_name         => 'jq',\ndequeue_options    => l_dequeue_options,\nmessage_properties\
  \ => l_message_properties,\npayload            => l_payload,\nmsgid            \
  \  => l_msgid\n);\nsys.dbms_output.put_line(\n'Retrieved from the JSON-payload ['\n\
  || json_value (l_payload, '$.Hello' returning varchar2 )\n|| ']'\n);\nend;\n/\n\
  Retrieved from the JSON-payload [World]\n```\n\n### 总结\n\n本章通过一个常见用例探讨了如何提升用户体验，并讨论了高级队列（AQ）在其中发挥的作用。将处理任务卸载给后台进程，能够在控制权交还给用户时，让应用程序显得响应非常迅速。\n\
  \n生成 PDF 文档可能耗时且耗费资源。当此生成过程被卸载到后台进程时，就不会因过度消耗资源而妨碍任何用户。\n\n由于回调过程在后台运行，必须监控任何导致消息传播到异常队列的异常，以确保该消息本应执行的工作得以完成。\n\
  \n本章还包含一个简短示例，展示了 Oracle 数据库 21c 中引入的原生 JSON 数据类型。\n\n## 17. 内省 PL/SQL\n\n了解正在执行的\
  \ PL/SQL 块中发生了什么可以提供有价值的信息。从 PL/SQL 块内部设置 client_identifier、module 和 action 有助于跟踪每个会话正在执行的操作。`DBMS_SESSION`\
  \ 包中为此提供了支持性的过程和函数。\n\n在 `DBMS_UTILITY` 包中，有可以在发生意外异常时识别调用堆栈的过程和函数。甚至可以使用本章同样涵盖的\
  \ `utl_call_stack` 来检索关于调用堆栈的更多信息。\n\n### DBMS_SESSION\n\n使用 `DBMS_SESSION`，您可以从\
  \ PL/SQL 中执行 `alter session` 命令。通常在 SQL*Plus 或 SQLcl 会话中进行的设置，现在可以通过您的 PL/SQL 过程和函数来完成。\n\
  \n### current_is_role_enabled\n\n如果程序的某部分需要您启用某个角色，您可以使用 `dbms_session.current_is_role_enabled`\
  \ 来检查指定角色当前是否已启用。您向函数提供要检查的角色名称。如果角色已启用，函数返回 `TRUE`；否则返回 `FALSE`。\n\n```sql\nfunction\
  \ current_is_role_enabled(rolename varchar2)\nreturn boolean;\n```\n\n### set_role\n\
  \n如果所需角色未启用但已授予您，您可以使用 `dbms_session.set_role` 在运行时设置角色。如果角色已经启用，再次发出 set role 命令会执行而不会报错。参数中的文本被附加到\
  \ \"SET ROLE\" SQL 语句后，然后作为动态 SQL 执行。\n\n```sql\nprocedure set_role(role_cmd varchar2);\n\
  ```\n\n### set_nls\n\n有时您的程序依赖于特定的 NLS 设置；例如，在将字符串转换为日期或反向转换时。如果您想确保 NLS 设置正确完成，而不依赖于用户的设置，可以使用\
  \ `dbms_session.set_nls` 来设置这些特定设置。该过程接受两个参数：参数名称和其值。\n\n```sql\nprocedure set_nls(param\
  \ varchar2, value varchar2);\n```\n\n调用此过程等效于执行 `alter session set <nls_parameter>\
  \ = <value>`。\n\n参数名称必须以 NLS 开头。如果值是文本字面量，则需要用单引号括起来。下面是一个示例。\n\n```sql\nset_nls('nls_date_format','''DD-MON-YY''')\n\
  ```\n\n如果参数需要很多引号，您可能希望使用替代引用法。\n\n```sql\ndbms_session.set_nls('nls_date_format',\
  \ q'['DD-MON-YY']')\n```\n\n**注意**\n\n使用 `execute immediate 'alter session ...'`\
  \ 具有更好的性能。此外，`execute immediate` 允许在一条语句中指定多个参数，这比多次调用 `dbms_session.set_nls` 更高效。\n\
  \n\n#### 设置上下文\n\n要使用上下文设置功能，您必须通过清单 17-1 中的 SQL 命令创建一个上下文。\n\n```\ncreate or replace\
  \ context modp_ctx using modp_pkg\n/\n清单 17-1\n创建应用程序上下文\n```\n\n如果您想在此上下文中设置或清除值，您不能直接调用\
  \ `DBMS_SESSION` 包。\n\n```\nbegin\ndbms_session.set_context( namespace => 'modp_ctx'\n\
  , attribute => 'author1'\n, value     => 'Alex Nuijten'\n);\ndbms_session.set_context(\
  \ namespace => 'modp_ctx'\n, attribute => 'author2'\n, value     => 'Patrick Barel'\n\
  );\nend;\n/\nORA-01031: 权限不足\nORA-06512: 在 \"SYS.DBMS_SESSION\", 第 141 行\nORA-06512:\
  \ 在第 2 行\n```\n\n您必须创建一个包来访问 `DBMS_SESSION` 包中的过程。这可以是一个简单的包装器包，如清单 17-2 所示。正如您在清单\
  \ 17-1 创建应用程序上下文的语句中所见，此包与上下文相关联。\n\n```\ncreate or replace package modp_pkg as\n\
  procedure set_context\n( namespace_in in varchar2\n, attribute_in in varchar2\n\
  , value_in     in varchar2\n, username_in  in varchar2 default null\n, client_id_in\
  \ in varchar2 default null\n);\nprocedure clear_context\n( namespace_in in varchar2\n\
  , client_id_in in varchar2 default null\n, attribute_in in varchar2 default null\n\
  );\nprocedure clear_all_context\n( namespace_in in varchar2 );\nend modp_pkg;\n\
  /\ncreate or replace package body modp_pkg as\nprocedure set_context\n( namespace_in\
  \ in varchar2\n, attribute_in in varchar2\n, value_in     in varchar2\n, username_in\
  \  in varchar2 default null\n, client_id_in in varchar2 default null\n) is\nbegin\n\
  dbms_session.set_context(namespace => namespace_in\n,attribute => attribute_in\n\
  ,value     => value_in\n,username  => username_in\n,client_id => client_id_in);\n\
  end set_context;\nprocedure clear_context\n( namespace_in in varchar2\n, client_id_in\
  \ in varchar2 default null\n, attribute_in in varchar2 default null\n) is\nbegin\n\
  dbms_session.clear_context(namespace => namespace_in\n,client_id => client_id_in\n\
  ,attribute => attribute_in);\nend clear_context;\nprocedure clear_all_context\n\
  ( namespace_in in varchar2 ) is\nbegin\ndbms_session.clear_all_context(namespace\
  \ => namespace_in);\nend clear_all_context;\nend modp_pkg;\n/\n清单 17-2\n用于与上下文通信的\
  \ modp_pkg\n```\n\n现在，当您尝试运行与之前相同的代码块时，只需调用包装器包，您就可以设置上下文值。\n\n```\nbegin\nmodp_pkg.set_context(\
  \ namespace_in => 'modp_ctx'\n, attribute_in => 'author1'\n, value_in     => 'Alex\
  \ Nuijten'\n);\nmodp_pkg.set_context( namespace_in => 'modp_ctx'\n, attribute_in\
  \ => 'author2'\n, value_in     => 'Patrick Barel'\n);\nend;\n/\nPL/SQL 过程已成功完成\n\
  ```\n\n注意：包装器包可用于多个上下文。如果该包仅用于单个上下文，则最好删除 `namespace_in` 参数。\n\n您可以使用简单的 select\
  \ 语句检查上下文中的值，如下所示。\n\n```\nselect sys_context('modp_ctx','author1') author1\n, sys_context('modp_ctx','author2')\
  \ author2\nfrom   dual\n/\nAUTHOR1              AUTHOR2\n-------------------- --------------------\n\
  Alex Nuijten         Patrick Barel\n```\n\n但您也可以在 `where` 子句的谓词中使用上下文值。\n\n```\n\
  select 'author2 = Patrick Barel'\nfrom   dual\nwhere  sys_context('modp_ctx','author2')\
  \ = 'Patrick Barel'\n/\n'AUTHOR2=PATRICKBAREL'\n\nauthor2 = Patrick Barel\n```\n\
  \n注意：此技术有时用于 *参数化视图*，其中上下文谓词用作过滤器。\n\n#### 清除上下文\n\n您可以调用 `dbms_session.clear_context`\
  \ 过程来清除上下文中的属性。与 `set_context` 过程一样，您必须编写一个包装器过程来调用此过程。\n\n```\nbegin\ndbms_session.clear_context(\
  \ namespace => 'modp_ctx'\n, attribute => 'author1' );\ndbms_session.clear_context(\
  \ namespace => 'modp_ctx'\n, attribute => 'author2' );\nend;\n/\nORA-01031: 权限不足\n\
  ORA-06512: 在 \"SYS.DBMS_SESSION\", 第 155 行\nORA-06512: 在第 2 行\n```\n\n您可以使用清单 17-2\
  \ 所示的包来清除属性。\n\n```\nbegin\nmodp_pkg.clear_context( namespace_in => 'modp_ctx'\n\
  , attribute_in => 'author1' );\nmodp_pkg.clear_context( namespace_in => 'modp_ctx'\n\
  , attribute_in => 'author2' );\nend;\n/\nPL/SQL 过程已成功完成\n```\n\n#### 清除所有上下文\n\n\
  如果要清除上下文中的所有属性，请使用 `dbms_session.clear_all_context` 过程。与其他上下文过程一样，这不能直接调用，只能通过用户定义的包调用。\n\
  \n#### 设置标识符\n\n当您想在 `v$session` 数据字典视图中标识连接的会话时，可以使用 `dbms_session.set_identifier`\
  \ 过程。您可以在参数中设置任何内容，但仅使用前 64 个字符。\n\n```\nbegin\ndbms_session.set_identifier\n( client_id\
  \ => 'Whatever you want, whatever you need.' );\nend;\n/\n```\n\n如果您有权访问 `v$session`\
  \ 视图，则可以看到该标识符。\n\n```\nselect username\n,client_identifier\nfrom   v$session\n\
  /\nUSERNAME   CLIENT_IDENTIFIER\n---------- ----------------------------------------\n\
  BOOK\nBOOK       Whatever you want, whatever you need.\n```\n\n#### 清除标识符\n\n要清除标识符，您可以使用空字符串调用\
  \ `set_identifier` 过程，但更有意义的做法是调用 `dbms_session.clear_identifier` 过程。\n\n```\nbegin\n\
  dbms_session.clear_identifier;\nend;\n/\n```\n\n如您所见，标识符已被清除。\n\n```\nselect username\n\
  ,client_identifier\nfrom   v$session\n/\nUSERNAME   CLIENT_IDENTIFIER\n----------\
  \ ----------------------------------------\nBOOK\nBOOK\n```\n\n#### 休眠\n\n有时您希望会话暂停一小段时间。您可以使用\
  \ `dbms_session.sleep` 过程来实现这一点。\n\n```\nprocedure sleep(seconds in number);\n```\n\
  \n该参数也接受秒的小数部分。最大分辨率为百分之一秒；例如，1.5、1.01 和 0.99 都是合法值。\n\n调用此过程比调用 `dbms_lock.sleep`\
  \ 更可取，后者功能相同，但此过程避免了需要授予 `dbms_lock` 权限并暴露更敏感的方法。\n\n### DBMS_APPLICATION_INFO\n\
  \n使用 `DBMS_APPLICATION_INFO` 中的过程来设置有关程序的运行时信息。您可以在通用的日志记录过程和函数中使用此信息。模块和操作也用于数据库工具。它们被记录用于跟踪和各种企业管理器报告，这与\
  \ `set_client_info` 不同，后者不被数据库使用，仅用于您的自定义代码。\n\n#### 设置模块\n\n此过程将当前模块的名称设置为一个新模块。在日志记录框架中使用此过程时，应注意以下事项：如果过程或函数终止，应将其设置为先前的值，这样当调用程序恢复时，它会被设置为正确的值。如果没有先前的值，则应将其设置为\
  \ `NULL`。\n\n```\nprocedure set_module(module_name varchar2, action_name varchar2);\n\
  ```\n\n参数的最大长度为 64 字节。较长的名称将被截断。\n\n#### 设置操作\n\n此过程在当前模块内设置当前操作的名称。可以使用 `set_module`\
  \ 过程设置模块。\n\n```\nprocedure set_action(action_name varchar2);\n```\n\n参数的最大长度为 64\
  \ 字节。较长的名称将被截断。\n\n\n### DBMS_UTILITY\n\n## read_module\n\n此过程读取当前模块和操作字段中的值。\n\n\
  ```sql\nprocedure read_module( module_name out varchar2\n, action_name out varchar2);\n\
  ```\n\n如代码清单 17-3 所示，这是这些过程的一般用法。\n\n```sql\ndeclare\nl_old_module_name varchar2(64);\n\
  l_old_action_name varchar2(64);\nbegin\nsys.dbms_application_info.read_module\n\
  ( module_name => l_old_module_name\n, action_name => l_old_action_name\n);\nsys.dbms_application_info.set_module\n\
  ( module_name => 'ModernOracleDatabaseProgramming'\n, action_name => 'DemoDBMS_Application_Info'\n\
  );\n-- do the real work of this program\n--\n-- at the end, reset the module and\
  \ action\nsys.dbms_application_info.set_module\n( module_name => l_old_module_name\n\
  , action_name => l_old_action_name\n);\nend;\n/\n```\n\n代码清单 17-3\n模块和操作的用法\n\n\
  该实用程序包包含各种实用程序例程，如 `compile_schema`、`format_call_stack` 和 `expand_sql_text`。在升级应用程序后，`compile_schema`\
  \ 非常有用，可确保在需要时重新编译代码库。检查与视图或嵌套视图相关的内容可以通过 `expand_sql_text` 轻松完成。这消除了手动检查源代码的需要。\n\
  \n## compile_schema\n\n`compile_schema` 过程不是您希望在程序执行期间调用的过程，而是您希望在安装新版本代码库后调用的过程。它会编译指定模式中的所有过程、函数、包和触发器。由于没有必要重新编译已经有效的对象，因此建议将标志\
  \ `compile_all` 设置为 FALSE。\n\n调用此过程后，您可以使用 `ALL_OBJECTS` 或 `USER_OBJECTS` 视图检查所有对象是否已成功编译。参数在表\
  \ 17-1 中描述。\n\n表 17-1\n\ncompile_schema 过程的参数\n\n| 参数 | 是否必填 | 描述 |\n| --- | ---\
  \ | --- |\n| schema | Y | 要（重新）编译的模式 |\n| compile_all |   | 一个布尔标志，指示是否应编译所有模式对象，无论对象当前是否无效。默认值为\
  \ TRUE |\n| reuse_settings |   | 一个布尔标志，指示应重用对象中的会话设置，还是应改用当前会话设置。默认值为 FALSE |\n\
  \n## format_call_stack\n\n在调试期间，检索调用栈可能非常有用。`dbms_utility.format_call_stack` 过程返回当前调用栈的格式化字符串，包括私有包过程和函数的名称。此字符串的大小最多可达\
  \ 2000 字节。为了演示这一点，请查看代码清单 17-4 中的包。\n\n注意\n\n与其编写自己的调用栈解析器，不如查看本章后面 `utl_call_stack`\
  \ 中提供的功能。\n\n```sql\ncreate or replace package call_stack_demo is\nprocedure packageprocedure;\n\
  end call_stack_demo;\n/\ncreate or replace package body call_stack_demo is\nprocedure\
  \ privateprocedure is\nbegin\ndbms_output.put_line('-- call stack in PRIVATEPROCEDURE\
  \ --');\ndbms_output.put_line( dbms_utility.format_call_stack );\ndbms_output.put_line('------------------------------------');\n\
  end privateprocedure;\nprocedure packageprocedure is\nbegin\ndbms_output.put_line('--\
  \ call stack in PACKAGEPROCEDURE --');\ndbms_output.put_line( dbms_utility.format_call_stack\
  \ );\ndbms_output.put_line('------------------------------------');\nprivateprocedure;\n\
  end packageprocedure;\nend call_stack_demo;\n/\n```\n\n代码清单 17-4\n用于演示 dbms_utility.format_call_stack\
  \ 的包\n\n以下是调用包过程的输出。\n\n```\nbegin\ndbms_output.put_line( '-- call stack in ANONYMOUS\
  \ BLOCK    --' );\ndbms_output.put_line( dbms_utility.format_call_stack );\ndbms_output.put_line(\
  \ '--------------------------------------' );\ncall_stack_demo.packageprocedure;\n\
  end;\n/\n-- call stack in ANONYMOUS BLOCK    --\n----- PL/SQL Call Stack -----\n\
  object  line   object\nhandle  number name\n0x2138aa190  3 anonymous block\n\n--\
  \ call stack in PACKAGEPROCEDURE --\n----- PL/SQL Call Stack -----\nobject  line\
  \   object\nhandle  number name\n0x6863c2600 13 package body BOOK.CALL_STACK_DEMO.PACKAGEPROCEDURE\n\
  0x2138aa190  5 anonymous block\n\n-- call stack in PRIVATEPROCEDURE --\n----- PL/SQL\
  \ Call Stack -----\nobject  line   object\nhandle  number name\n0x6863c2600  6 package\
  \ body BOOK.CALL_STACK_DEMO.PRIVATEPROCEDURE\n0x6863c2600 15 package body BOOK.CALL_STACK_DEMO.PACKAGEPROCEDURE\n\
  0x2138aa190  5 anonymous block\n\nPL/SQL procedure successfully completed\n```\n\
  \n## format_error_stack\n\n当异常发生时，了解错误栈可能比检索调用栈更重要。有两个过程可以检索此信息，`dbms_utility.format_error_stack`\
  \ 包含发生的错误代码和描述，而 `dbms_utility.format_error_backtrace` 不提供错误代码，但它返回完整的调用栈。它不是返回过程或函数名称，而是返回发生错误或调用下一个过程或函数的行号。为了演示这一点，请查看代码清单\
  \ 17-5 中的包。\n\n```sql\ncreate or replace package body error_stack_demo is\nprocedure\
  \ privateprocedure is\nbegin\nraise no_data_found;\nend privateprocedure;\nprocedure\
  \ packageprocedure is\nbegin\nprivateprocedure;\nexception\nwhen others\nthen\n\
  dbms_output.put_line('-- error stack in PACKAGEPROCEDURE--');\ndbms_output.put_line(\
  \ dbms_utility.format_error_stack );\ndbms_output.put_line('------------------------------------');\n\
  dbms_output.put_line('-error backtrace in PACKAGEPROCEDURE');\ndbms_output.put_line(\
  \ dbms_utility.format_error_backtrace );\ndbms_output.put_line('------------------------------------');\n\
  end packageprocedure;\nend error_stack_demo;\n/\n```\n\n代码清单 17-5\n用于演示错误栈过程的包\n\
  \n以下是调用包过程的输出。\n\n```\nbegin\nerror_stack_demo.packageprocedure;\nend;\n/\n-- error\
  \ stack in PACKAGEPROCEDURE--\nORA-01403: no data found\nORA-06512: at \"BOOK.ERROR_STACK_DEMO\"\
  , line 5\n\n-- error backtrace in PACKAGEPROCEDURE--\nORA-06512: at \"BOOK.ERROR_STACK_DEMO\"\
  , line 5\nORA-06512: at \"BOOK.ERROR_STACK_DEMO\", line 10\n\nPL/SQL procedure successfully\
  \ completed\n```\n\n根据您的需求，您可以使用这两个过程中的任何一个。\n\n\n\n`comma_to_table` 通过 `comma_to_table``,`\
  \ 可以将逗号分隔的字符串拆分为关联数组中的值。如果数据库表中的某一列包含逗号分隔的值，而你希望单独处理每个值，这将非常有用，尤其是当每行中的元素数量可能不同时。\n\
  \n**注意**\n\n`dbms_utility.comma_to_table` 适用于标识符的逗号分隔列表，因此本节示例中使用的 `uncl_array`\
  \ 是 `table of varchar2(227)`，其中 227 是 `\"user\".\"name\".\"column\"@link` 格式标识符可能的最大长度。你不能将\
  \ `comma_to_table` 用于任何通用值列表，最大长度仅限 227。如果需要更通用的解决方案，请查阅 `apex_string.split`（参见第\
  \ 15 章）。\n\n假设你有一个视图，其中一列包含某个车队的所有车手，如清单 17-6 所示。\n\n```\ncreate or replace view\
  \ drivers_for_constructors\nas\nselect dcr.constructorid                       \
  \  as constructorid\n, ctr.name                                  as name\n, listagg(\
  \ distinct( drv.driverref ), ',' ) as drivers\nfrom   driverconstructors  dcr\n\
  join   f1data.constructors ctr\non ( dcr.constructorid = ctr.constructorid )\njoin\
  \   f1data.drivers      drv\non ( dcr.driverid      = drv.driverid )\ngroup  by\
  \ dcr.constructorid\n, ctr.name\n/\n清单 17-6\n包含每个车队所有车手的视图\n```\n\n有些车队只有两名车手，例如，因为他们只参加了一个赛季。有些车队则拥有大量车手，因为他们自一级方程式开始以来就一直参赛。\n\
  \n如果你想为每个车队分别显示车手，可以构建一个如清单 17-7 所示的脚本。\n\n```\ndeclare\nl_tablen binary_integer;\n\
  l_tab dbms_utility.uncl_array;\nl_drivername varchar2( 32767 );\nbegin\nfor rec\
  \ in (select distinct ctr.name\n, dfc.drivers\nfrom   drivers_for_constructors dfc\n\
  join   driverconstructors as of period\nfor    drivercontract to_date( '20220320'\n\
  , 'YYYYMMDD') dcr\non     ( dfc.constructorid = dcr.constructorid )\njoin   f1data.constructors\
  \ ctr\non     ( dfc.constructorid = ctr.constructorid )\n)\nloop\ndbms_output.put_line(\
  \ rec.name );\ndbms_utility.comma_to_table( list   => rec.drivers\n, tablen => l_tablen\n\
  , tab    => l_tab );\ndbms_output.put_line(  'Nr of drivers: '\n|| to_char( l_tablen\
  \ )\n);\nfor indx in 1 .. l_tablen\nloop\nselect d.forename || ' ' || d.surname\
  \ as drivername\ninto   l_drivername\nfrom   f1data.drivers d\nwhere  d.driverref\
  \ = l_tab( indx );\ndbms_output.put_line(  to_char( indx )\n|| ') '\n|| l_drivername\n\
  );\nend loop;\nend loop;\nend;\n/\nAston Martin\nNr of drivers: 3\n1) Nico Hülkenberg\n\
  2) Lance Stroll\n3) Sebastian Vettel\nMercedes\nNr of drivers: 5\n1) Valtteri Bottas\n\
  2) Lewis Hamilton\n3) Michael Schumacher\n4) Nico Rosberg\n5) George Russell\nRed\
  \ Bull\nNr of drivers: 12\n1) Alexander Albon\n2) David Coulthard\n3) Robert Doornbos\n\
  4) Pierre Gasly\n5) Christian Klien\n6) Daniil Kvyat\n7) Vitantonio Liuzzi\n8) Max\
  \ Verstappen\n9) Sergio Pérez\n10) Daniel Ricciardo\n11) Sebastian Vettel\n12) Mark\
  \ Webber\n>\nHaas F1 Team\nNr of drivers: 6\n1) Romain Grosjean\n2) Esteban Gutiérrez\n\
  3) Kevin Magnussen\n4) Nikita Mazepin\n5) Mick Schumacher\n6) Pietro Fittipaldi\n\
  PL/SQL procedure successfully completed\n清单 17-7\n显示每个车队的车手\n```\n\n**注意**\n\n此代码未经过优化；它仅展示了\
  \ `dbms_utility.comma_to_table` 的用法。\n\n## expand_sql_text\n\n如果你想查看执行了什么 SQL，可以使用\
  \ `dbms_utility.``expand_sql_text`。它会递归地将输入 SQL 中的任何视图引用替换为视图的实际子查询。此过程在调试 SQL 宏时也非常有用。\n\
  \n```\nprocedure expand_sql_text( input_sql_text  in  clob,\noutput_sql_text out\
