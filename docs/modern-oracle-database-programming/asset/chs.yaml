  \ commit preserve rows`的全局临时表添加索引，可能会遇到此错误。\n\n```\nORA-14452: attempt to create,\
  \ alter or drop an index on temporary table already in use\n```\n\n如果发生这种情况，并且你的会话是唯一使用该表的会话，你可以通过断开并重新连接或发出`truncate\
  \ table`语句来解决这个问题。\n\n##### 使用 CTAS 创建\n\n你也可以使用`create table as select`结构来创建全局临时表。\n\
  \n```sql\ncreate global temporary table gtt_drivers\nas\nselect *\nfrom   f1data.drivers\
  \ drv\nwhere  drv.nationality = 'Dutch'\n/\n```\n\n由于默认选项是`on commit delete rows`，并且任何\
  \ DDL 操作都会执行隐式提交，因此表定义被创建，但行会立即被移除。要保留行，你必须使用`on commit preserve rows`选项创建表。\n\n\
  ```sql\ncreate global temporary table gtt_drivers\non commit preserve rows\nas\n\
  select *\nfrom   f1data.drivers drv\nwhere  drv.nationality = 'Dutch'\n/\n```\n\n\
  #### 私有临时表\n\nOracle 数据库 18c 引入了`私有临时表`。它是一种仅对当前会话私有的临时表。私有临时表必须使用前缀：`ora$ptt_`。以下语句创建了一个私有临时表。\n\
  \n```sql\ncreate private temporary table ora$ptt_drivers\n( driverid     number\
  \  (  11 )\n, driverref    varchar2( 255 )\n, drivernumber number  (  11 )\n, code\
