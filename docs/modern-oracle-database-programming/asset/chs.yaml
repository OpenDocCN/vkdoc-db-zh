  \n### 复合触发器\n\n在对表（或视图）执行 DML 时，Oracle 数据库可以在语句执行的四个不同时间点触发触发器。\n\n*   触发语句执行前\n\
  *   触发语句影响的每一行之前\n*   触发语句影响的每一行之后\n*   触发语句执行后\n\n可以为每个 DML 操作（`insert`、`update`\
  \ 和 `delete`）构建不同的触发器。\n\n复合触发器的概念是在 Oracle Database 11g 中引入的。所有操作都可以构建到一个复合触发器中。这不仅限制了所需对象（从而也是源文件）的数量，而且复合触发器允许使用变量在所有触发点之间共享状态。复合触发器有一个声明部分，类似于包的声明部分。公共状态在触发语句开始时创建，并在触发器完成时销毁。\n\
  \n在引入复合触发器之前，相同的（并且现在仍然可以）通过使用包来共享数据来实现，只是你必须自己负责数据结构的创建和销毁。以下是复合触发器的框架，并附有每个部分的简短说明。\n\
  \n```sql\ncreate or replace trigger compound_trigger_name\nfor [insert | delete\
  \ | update] [of column] on table\ncompound trigger\n    -- 声明部分（可选）\n    -- 此处声明的变量具有触发语句持续时间。\n\
  \    -- 在 DML 语句之前执行\n    before statement is\n    begin\n        null;\n    end\
  \ before statement;\n    -- 在每一行更改之前执行 - :new, :old 可用\n    before each row is\n\
  \    begin\n        null;\n    end before each row;\n    -- 在每一行更改之后执行 - :new, :old\
  \ 可用\n    after each row is\n    begin\n        null;\n    end after each row;\n\
  \    -- 在 DML 语句之后执行\n    after statement is\n    begin\n        null;\n    end\
  \ after statement;\nend compound_trigger_name;\n/\n```\n\n存在两个常见用例，其中复合触发器优于传统的触发器和包组合。第一个是表上的自定义日志记录，第二个是变通解决变异表问题。这两个用例将在接下来的章节中更详细地描述。\n\
  \n\n### 日志记录\n\n当需要对某个表上的所有事务保留日志表时，使用复合触发器可以通过批量处理来加速这个过程。你可以在复合触发器中将受影响行的数据累积到集合中，然后使用批量操作将这些数据推送到日志表中，而不是在每一行处理后都向日志表插入一行。\n\
  \n首先，创建一个日志表。\n\n```sql\ncreate table constructors_jn\nas\nselect constructorid\n\
  , constructorref\n, name\n, nationality\n, url\n, CAST( null as varchar2( 1 ) )\
  \ jn_action\n, systimestamp jn_date\nfrom   f1data.constructors\nwhere  1 = 2\n\
  /\n```\n\n你可以为插入、更新和删除事件创建一个单一的复合触发器。\n\n```sql\ncreate or replace trigger tr_constructors_cti\n\
  for insert or update or delete on constructors\ncompound trigger\n```\n\n在复合触发器中，为日志记录声明一个集合类型。\n\
  \n```sql\n-- 声明部分（可选）\ntype constructors_tt is table of constructors_jn%rowtype\n\
  index by pls_integer;\n```\n\n接下来，声明一个全局变量来保存该集合。\n\n```sql\n-- 此处声明的变量具有触发语句的持续时间。\n\
  g_constructors_jn constructors_tt;\n```\n\n然后，在 `after each row` 部分记录日志表所需的所有信息。\n\
  \n```sql\n-- 在每行变更后执行 - :new, :old 可用\nafter each row is\nl_constructor constructors_jn%rowtype;\n\
  begin\nif inserting\nor updating\nthen\nl_constructor.constructorid  := :new.constructorid;\n\
  l_constructor.constructorref := :new.constructorref;\nl_constructor.name := :new.name;\n\
  l_constructor.nationality    := :new.nationality;\nl_constructor.url  := :new.url;\n\
  else\nl_constructor.constructorid  := :old.constructorid;\nl_constructor.constructorref\
  \ := :old.constructorref;\nl_constructor.name := :old.name;\nl_constructor.nationality\
  \    := :old.nationality;\nl_constructor.url  := :old.url;\nend if;\nif inserting\n\
  then\nl_constructor.jn_action := 'I';\nelsif updating\nthen\nl_constructor.jn_action\
  \ := 'U';\nelse\nl_constructor.jn_action := 'D';\nend if;\nl_constructor.jn_date\
  \ := systimestamp;\ng_constructors_jn(g_constructors_jn.count + 1) :=\nl_constructor;\n\
  end after each row;\n```\n\n最后，在 `after statement` 部分，执行批量操作将数据推送到数据库。\n\n```sql\n\
  -- 在 DML 语句之后执行\nafter statement is\nbegin\nforall indx in g_constructors_jn.first\
  \ ..\ng_constructors_jn.last\ninsert\ninto   constructors_jn\nvalues g_constructors_jn(\
  \ indx );\nend after statement;\n```\n\n清单 1-7 是完整的复合触发器。\n\n**提示**\n\n如果你预计日志集合会变得非常大，可以在复合触发器的\
  \ `AFTER EACH ROW` 部分，当集合大小达到某个阈值时，构建一个 `FORALL BULK INSERT`，然后清空该集合。\n\n```sql\n\
  create or replace trigger tr_constructors_cti\nfor insert or update or delete on\
  \ constructors\ncompound trigger\n-- 声明部分（可选）\ntype constructors_tt is table of\
  \ constructors_jn%rowtype\nindex by pls_integer;\n-- 此处声明的变量具有触发语句的持续时间。\ng_constructors_jn\
  \ constructors_tt;\n-- 在每行变更后执行 - :new, :old 可用\nafter each row is\nl_constructor\
  \ constructors_jn%rowtype;\nbegin\nif inserting\nor updating\nthen\nl_constructor.constructorid\
  \  := :new.constructorid;\nl_constructor.constructorref := :new.constructorref;\n\
  l_constructor.name           := :new.name;\nl_constructor.nationality    := :new.nationality;\n\
  l_constructor.url            := :new.url;\nelse\nl_constructor.constructorid  :=\
  \ :old.constructorid;\nl_constructor.constructorref := :old.constructorref;\nl_constructor.name\
  \           := :old.name;\nl_constructor.nationality    := :old.nationality;\nl_constructor.url\
  \            := :old.url;\nend if;\nif inserting\nthen\nl_constructor.jn_action\
  \ := 'I';\nelsif updating\nthen\nl_constructor.jn_action := 'U';\nelse\nl_constructor.jn_action\
  \ := 'D';\nend if;\nl_constructor.jn_date := systimestamp;\ng_constructors_jn(g_constructors_jn.count\
  \ + 1) :=\nl_constructor;\nend after each row;\n-- 在 DML 语句之后执行\nafter statement\
  \ is\nbegin\nforall indx in g_constructors_jn.first ..\ng_constructors_jn.last\n\
  insert\ninto   constructors_jn\nvalues g_constructors_jn( indx );\nend after statement;\n\
  end tr_constructors_cti;\n/\n```\n\n**清单 1-7**\n复合触发器 `tr_constructors_cti`\n\n\
  ### 变异表\n\n假设你想在将比赛结果添加到 `RESULTS` 表时更新 `CONSTRUCTORRESULTS` 表。如果你尝试在触发器中执行此操作，如清单\
  \ 1-8 所示，当你尝试在 `RESULTS` 表中插入或更新行时，会收到错误。\n\n```sql\ncreate or replace trigger tr_results_ariu\n\
  after insert or update on f1data.results\nfor each row\nbegin\nmerge into f1data.constructorresults\
  \ tgt\nusing (select rsl.raceid        as raceid\n, rsl.constructorid as constructorid\n\
  , sum( rsl.points ) as points\nfrom   f1data.results rsl\nwhere  rsl.raceid    \
  \    = :new.raceid\nand    rsl.constructorid = :new.constructorid\ngroup  by rsl.raceid\n\
  , rsl.constructorid) src\non (    tgt.raceid        = src.raceid\nand tgt.constructorid\
  \ = src.constructorid)\nwhen matched then\nupdate\nset    tgr.points = src.points\n\
  when not matched then\ninsert\n( constructorresultsid\n, raceid\n, constructorid\n\
  , points)\nvalues\n( f1data.constructorresults_seq.nextval\n, src.raceid\n, src.constructorid\n\
  , src.points);\nend tr_results_ariu;\n/\n```\n\n**清单 1-8**\n在 `RESULTS` 上的行后触发器，用于更新\
  \ `CONSTRUCTORRESULTS`\n\n```\nORA-04091: table F1DATA.RESULTS is mutating, trigger/function\
  \ may not see it\n```\n\n你可以通过创建一个复合触发器来解决这个问题，该触发器在 after row 部分将不同的构造函数添加到一个集合中，然后在\
  \ after statement 触发器中使用该集合来执行实际的合并语句。\n\n```sql\ncreate or replace trigger f1data.tr_results_cti\n\
  for insert or update or delete on f1data.results\ncompound trigger\n-- 声明部分（可选）\n\
  type raceid_t is record\n( raceid        number\n, constructorid number);\ntype\
  \ raceids_tt is table of raceid_t\nindex by pls_integer;\n-- 此处声明的变量具有触发语句的持续时间。\n\
  g_raceids raceids_tt;\n-- 在 DML 语句之前执行\nbefore statement is\nbegin\nnull;\nend before\
  \ statement;\n-- 在每行变更后执行 - :new, :old 可用\nafter each row is\nbegin\ng_raceids(:new.constructorid).raceid\
  \ :=\n:new.raceid;\ng_raceids(:new.constructorid).constructorid :=\n:new.constructorid;\n\
  end after each row;\n-- 在 DML 语句之后执行\nafter statement is\nbegin\nforall indx in\
  \ indices of g_raceids\nmerge into f1data.constructorresults tgt\nusing (select\
  \ rsl.raceid\n, rsl.constructorid\n, sum( rsl.points ) as points\nfrom   f1data.results\
  \ rsl\nwhere  rsl.raceid =\ng_raceids( indx ).raceid\nand    rsl.constructorid =\n\
  g_raceids(indx).constructorid\ngroup  by rsl.raceid\n,rsl.constructorid) src\non\
  \ (    tgt.raceid        = src.raceid\nand tgt.constructorid = src.constructorid)\n\
  when matched then\nupdate\nset    tgt.points = src.points\nwhen not matched then\n\
  insert\n( constructorresultsid\n, raceid\n, constructorid\n, points)\nvalues\n(\
  \ f1data.constructorresults_seq.nextval\n, src.raceid\n, src.constructorid\n, src.points);\n\
  end after statement;\nend tr_results_cti;\n/\n```\n\n**清单 1-9**\n在 `RESULTS` 上的复合触发器，用于更新\
  \ `CONSTRUCTORRESULTS`\n\n### DML 错误日志\n\n执行 DML 时，可能会出现问题。例如，当违反约束时，操作无法完成，事务会被回滚。如果你正在处理单条记录，这不是问题：要么修复数据并重新运行语句，要么将错误记录到某处。但是，如果你运行一条插入一百万行的语句，而第一百万行失败了，整个事务都会被回滚。Oracle\
  \ 数据库提供了一种机制来解决这个问题。\n\n#### 记录错误\n\n创建一个表，用于存放所有被分配了永久编号的车手。\n\n```\ncreate table\
  \ drivers_with_number\nas\nselect drv.*\nfrom   f1data.drivers drv\nwhere  1=2\n\
  /\n```\n\n为确保永久编号的唯一性，需要为该表添加一个唯一性约束。\n\n```\nalter table drivers_with_number add\
  \ constraint un_driver_number\nunique (driver_number)\n/\n```\n\n要使用此功能，必须创建一个表来保存有问题的记录。`dbms_errlog`\
  \ 包提供了一个名为 `create_error_log` 的过程来简化此操作。\n\n```\nprocedure create_error_log\n( dml_table_name\
  \ varchar2\n, err_log_table_name  varchar2 default NULL\n, err_log_table_owner varchar2\
  \ default NULL\n, err_log_table_space varchar2 default NULL\n, skip_unsupported\
  \    boolean  default FALSE\n);\n```\n\n使用此过程时，可以指定所有默认值，如下所示。\n\n```\nbegin\ndbms_errlog.create_error_log\n\
  (dml_table_name => 'drivers_with_number');\nend;\n/\n```\n\n这将在当前模式中创建一个名为 `ERR$_DRIVERS_WITH_NUMBER`\
  \ 的表。该表包含五个描述错误的列。\n\n```\ndesc err$_drivers_with_number\nName            Type \
  \           Nullable Default Comments\n--------------- --------------- --------\
  \ ------- --------\nORA_ERR_NUMBER$ NUMBER          Y\nORA_ERR_MESG$   VARCHAR2(2000)\
  \  Y\nORA_ERR_ROWID$  UROWID          Y\nORA_ERR_OPTYP$  VARCHAR2(2)     Y\nORA_ERR_TAG$\
  \    VARCHAR2(2000)  Y\n```\n\n并且，对于源表中的每一列，它都会创建一个 `VARCHAR2` 类型的列。如果原始列的类型是 `VARCHAR2`，则新列也是\
  \ `VARCHAR2` 类型，但长度为最大字符串大小。其他所有列的类型都是 `VARCHAR2(4000)`。在 `max_string_size=extended`\
  \ 的数据库中，您会看到类似下面这样类型为 `VARCHAR2(32767)` 的列。\n\n```\nDRIVERID        VARCHAR2(4000)\
  \  Y\nDRIVERREF       VARCHAR2(32767) Y\nDRIVER_NUMBER   VARCHAR2(4000)  Y\nCODE\
  \            VARCHAR2(32767) Y\nFORENAME        VARCHAR2(32767) Y\nSURNAME     \
  \    VARCHAR2(32767) Y\nDOB             VARCHAR2(4000)  Y\nNATIONALITY     VARCHAR2(32767)\
  \ Y\nURL             VARCHAR2(32767) Y\n```\n\n要将此表用作错误日志，必须在 DML 语句中添加 `log errors`\
  \ 子句。\n\n- `into` 子句允许您指定错误日志表的名称。默认为当前模式下的 `err$_<tablename>`。\n- `error_tag` 允许您指定一个字符串，用于标识与此语句相关的记录。\n\
  - `reject limit` 允许您在引发异常之前指定希望接受的错误数量。\n\n```\ninsert into drivers_with_number\n\
  select *\nfrom   f1data.drivers drv\nwhere  drv.driver_number is not null\nlog errors\
  \ into err$_drivers_with_number ('with limit unlimited') reject limit unlimited\n\
  /\n```\n\n```\nlog errors\n[into [schema_name.]table_name]\n[('error_tag')]\n[reject\
  \ limit integer|unlimited]\n```\n\n所有错误都被写入错误日志表。表 1-2 展示了其中一个错误。\n\n表 1-2\n\n一条错误记录\n\
  \n| **ORA_ERR_NUMBER$** | 1 |\n| **ORA_ERR_MESG$** | ORA-00001: unique constraint\
  \ (BOOK.UN_DRIVER_NUMBER) violated |\n| **ORA_ERR_ROWID$** |  |\n| **ORA_ERR_OPTYP$**\
  \ | I |\n| **ORA_ERR_TAG$** | with limit unlimited |\n| **DRIVERID** | 846 |\n|\
  \ **DRIVERREF** | Norris |\n| **DRIVER_NUMBER** | 4 |\n| **CODE** | NOR |\n| **FORENAME**\
  \ | Lando |\n| **SURNAME** | Norris |\n| **DOB** | 13-NOV-99 |\n| **NATIONALITY**\
  \ | British |\n| **URL** | [`http://en.wikipedia.org/wiki/Lando_Norris`](http://en.wikipedia.org/wiki/Lando_Norris)\
  \ |\n\n目标表包含未引发错误的记录。所有有问题的记录都被记录在错误日志表中。错误日志表中的数据会被持久化保存，无论您是 `commit` 还是 `rollback`\
  \ 该事务。\n\n> **注意：** `ORA_ERR_ROWID$` 指向原始记录的行 ID；因此，在执行插入操作时该字段为空。当执行更新操作时，它会包含一个值。\n\
  \n#### 保存异常\n\n在 PL/SQL 中使用 `forall` 语句执行批量 DML 操作时，有一个类似的选择。在这种情况下，错误不会被记录到表中，而是记录到内存中的一个集合里。\n\
  \nOracle 数据库会引发一个特殊的异常，您可以捕获并处理它。\n\n```\nfailure_in_forall exception;\npragma exception_init(\
  \ failure_in_forall, -24381 );\n```\n\n所有异常都被保存到一个伪集合中：`sql%bulk_exceptions`。此集合中包含以下可用属性。\n\
  \n- `error_code`: 保存相应的错误代码。\n- `error_index`: 保存当前 `forall` 语句的迭代编号。\n- `count`:\
  \ 保存异常的总数量。\n\n```\ndeclare\ncursor c_drivers is\nselect drv.*\nfrom   f1data.drivers\
  \ drv\nwhere  drv.driver_number is not null\norder  by drv.dob;\ntype drivers_tt\
  \ is table of f1data.drivers%rowtype\nindex by pls_integer;\nl_drivers drivers_tt;\n\
  failure_in_forall exception;\npragma exception_init( failure_in_forall, -24381 );\n\
  begin\nopen  c_drivers;\nfetch c_drivers\nbulk  collect into l_drivers;\nclose c_drivers;\n\
  if l_drivers.count > 0\nthen\nbegin\nforall indx in l_drivers.first .. l_drivers.last\n\
  save exceptions\ninsert\ninto drivers_with_number values l_drivers(indx);\nexception\n\
  when failure_in_forall then\nfor indx in 1 .. sql%bulk_exceptions.count\nloop\n\
  dbms_output.put_line(  'Error '\n|| indx\n|| ' occurred on index '\n|| sql%bulk_exceptions(\
  \ indx ).\nerror_index\n|| '.'\n);\ndbms_output.put_line(  'Oracle error is '\n\
  || sqlerrm( -1 *\nsql%bulk_exceptions( indx ).\nerror_code)\n);        end loop;\n\
  end;\nend if;\nend;\n/\nError 1 occurred on index 25.\nOracle error is ORA-00001:\
  \ unique constraint (.) violated\nError 2 occurred on index 31.\nOracle error is\
  \ ORA-00001: unique constraint (.) violated\nError 3 occurred on index 32.\nOracle\
  \ error is ORA-00001: unique constraint (.) violated\nError 4 occurred on index\
  \ 36.\nOracle error is ORA-00001: unique constraint (.) violated\nError 5 occurred\
  \ on index 39.\nOracle error is ORA-00001: unique constraint (.) violated\nError\
  \ 6 occurred on index 47.\nOracle error is ORA-00001: unique constraint (.) violated\n\
  Error 7 occurred on index 50.\nOracle error is ORA-00001: unique constraint (.)\
  \ violated\nError 8 occurred on index 51.\nOracle error is ORA-00001: unique constraint\
  \ (.) violated\nPL/SQL procedure successfully completed\nListing 1-10\nUsing forall\
  \ with save exceptions\n```\n\n> **注意：** 错误代码是一个正数，但 Oracle 错误代码是负数，因此必须将代码乘以 -1\
  \ 才能获得正确的错误消息。\n\n### 总结\n\n本章探讨了如何利用集合和批量操作从数据库检索数据并将其写回数据库表。集合与复合触发器结合用于日志记录，或者用于规避\
  \ *变异表* 问题时也非常有用。\n\n本章还涵盖了针对直接 DML（插入、更新、删除）和批量操作的错误处理。\n\n## 2. 分析函数与（逆）透视\n\n\
  数据库应用程序的最终用户经常要求导出 Excel 文件，以便他们能够操作数据来获取做出业务决策所需的信息，这种情况太过常见了。通常，所需的信息可以通过使用 SQL\
  \ 以最终用户期望的格式检索到，从而消除了导出后手动操作数据的需要。您对 SQL 的了解越深入，就越有能力满足最终用户的各种需求。本章讨论两种重要的技术：分析函数和透视。\n\
  \n分析函数是一个需要掌握的重要工具，尽管它已有超过 23 年的历史，但仍然相对不为人知。\n\n将结果集进行透视是将行转换为列的常见需求，同样地，逆透视则是将列转换为行。\n\
  \n\n### 分析函数\n\n分析函数在 Oracle 数据库 8.1.6 企业版中被引入，但至今仍鲜为人知。分析函数使得访问多行数据的值成为可能，而无需使用自连接，也不需要\
  \ `group by` 子句即可创建聚合值。分析函数大放异彩的另一个例子是确定一组值内的排名。\n\n包含分析函数的查询，其处理顺序分为三个阶段。在第一阶段，解析连接、`where`\
  \ 条件、`group by` 和 `having` 子句。分析函数在第二阶段应用于结果集。最后，`order by` 作用于完整的结果集。处理顺序之所以重要，是因为有时使用标准的聚合函数可能就足够了。一个典型的迹象是查询同时结合了分析函数和\
  \ `distinct` 操作符。这种查询很可能可以用普通的聚合函数来编写。\n\n聚合函数会减少最终结果集的行数——例如 `count(*)` 只返回一行——而分析函数则不然。分析函数会为最终结果集中的每一行返回一个值。\n\
  \n#### 构成要素\n\n使用分析函数的第一步是决定需要哪个函数，即“做什么”。许多聚合函数都有对应的分析函数，例如 `count`、`sum` 或 `avg`。以下示例展示了\
  \ `avg` 函数对应的分析函数的骨架。\n\n```\navg () over ()\n```\n\n关键字 `over` 表明该函数确实是一个分析函数。\n\
  \n在决定了使用哪个函数之后，下一步是确定该函数应应用于结果集的哪些部分。结果集中的行被“分组”在一起，称为*分区*，分析函数被应用于这些分区。\n\n注意\n\
  \n分析函数上下文中的分区与表分区无关。分析分区是数据的一种逻辑分组。\n\n分区可以小到只有一行，也可以大到整个结果集。分区子句中的标准决定了有多少个不同的组——每个记录至少一个分区，每个结果集至少一个分区。当省略分区子句时，整个结果集被视为单个分区。所选函数的结果被应用于单个分区。它不能跨分区工作。以下示例展示了包含分区子句的分析函数的骨架。\n\
  \n```\navg () over (partition by )\n```\n\n在分区内部，可以指定一个*窗口*。窗口决定了当前分区中哪些行范围可用于执行函数。分析函数总是从当前行的角度执行。窗口大小可以基于物理行数，也可以基于逻辑区间，例如数值或时间。\n\
  \n目前有三种选项来定义开窗子句。Oracle 数据库 21c 引入了 groups 窗口。\n\n*   `rows` 指定相对于当前行的行数。可以是当前行之前或之后的行。\n\
  *   `range` 指定相对于当前行的值范围。行的数量取决于当前行的值。排序键必须支持加法或减法运算，例如数值、日期或间隔数据类型。\n*   `groups`\
  \ 是根据有序值将数据进行划分的方式。值相等的行属于同一组。指定的偏移量指的是前一组或后一组。\n\n由于开窗子句依赖于有序的结果集，因此必须在分析子句中包含\
  \ `order by`。当存在 `order by` 时，开窗子句默认为 `range unbounded preceding and current row`。清单\
  \ 2-2 是 `rows`、`range` 和 `groups` 之间差异的示例。\n\n除非另有说明，示例中使用 `DRIVERS`、`RACES` 和 `LAPTIMES`\
  \ 表来演示分析函数的工作原理。\n\n#### 累计总和\n\n使用分析函数创建累计总和（即随着行的推进累积总量）是轻而易举的。`laptimes` 表记录了完成一圈赛道所需的时间（以毫秒为单位）。以下示例筛选了\
  \ 2022 赛季巴林大奖赛中 Charles Leclerc 的数据，仅使用前 10 圈。\n\n`sum` 函数的分析函数版本被用来创建累计总和。关键字 `over`\
  \ 表明它是一个分析函数。下面的例子中缺少分区子句，表明整个结果集就是一个分区。然而，由于分析子句中的 `order by` 子句，存在一个随每行扩展的窗口。在这种情况下，隐式的窗口是默认窗口：`range\
  \ unbounded preceding and current row`，所有前面的圈速都会加到当前行的值上，形成累计总和，同时也包括那些与当前行值相同的圈速。尽管在此情况下它*看起来*有效，但这仅仅是因为圈速值是唯一的。当存在重复值时，所有前面的圈速以及任何与当前行值相同的后续圈速都会被加进来。一个真正的累计总和需要以下显式窗口：`rows\
  \ between unbounded preceding and current row`。\n\n在清单 2-1 中，结果集中的 `running_total`\
  \ 列显示了 Charles Leclerc 前十圈的累计总时间。第三行（第 3 圈）显示了前三行（99070 + 97853 + 98272 = 295195）的总时间（以毫秒为单位）。\n\
  \n```\nselect ltm.lap\n, ltm.milliseconds\n, sum (ltm.milliseconds) over (\n   \
  \ order by ltm.lap\n    rows between unbounded preceding\n             and current\
  \ row\n    ) as running_total\nfrom   f1data.laptimes ltm\njoin   f1data.races rcs\n\
  \  on   rcs.raceid = ltm.raceid\nwhere  rcs.race_date between trunc (sysdate, 'yy')\
  \ and sysdate\n  and    ltm.driverid = 844 -- Charles Leclerc\n  and    rcs.raceid\
  \ = 1074 -- Bahrain Grand Prix\n  and    ltm.lap between 1 and 10\norder  by ltm.lap\n\
  /\nLAP MILLISECONDS RUNNING_TOTAL\n---------- ------------ -------------\n     \
  \    1        99070         99070\n         2        97853        196923\n     \
  \    3        98272        295195\n         4        98414        393609\n     \
  \    5        98471        492080\n         6        98712        590792\n     \
  \    7        98835        689627\n         8        98951        788578\n     \
  \    9        98807        887385\n        10        99123        986508\nListing\
  \ 2-1\n单一车手的累计总和\n```\n\n要为每位车手创建累计总和，需要添加分区子句，如下例所示。结果被筛选为仅四位车手的前三圈数据。\n\n```\n\
  select ltm.lap\n, drv.forename||' '||drv.surname as driver\n, ltm.milliseconds\n\
  , sum (ltm.milliseconds)\n    over (partition by ltm.driverid\n          order by\
  \ ltm.lap) as running_total\nfrom   f1data.laptimes ltm\njoin   f1data.races rcs\n\
  \  on   rcs.raceid = ltm.raceid\njoin   f1data.drivers drv\n  on   drv.driverid\
  \ = ltm.driverid\nwhere  rcs.race_date between trunc (sysdate, 'yy') and sysdate\n\
  \  and    rcs.raceid = 1074 -- Bahrain Grand Prix\n  and    ltm.lap between 1 and\
  \ 3\n  and    ltm.driverid in (1, 815, 830, 844)\norder  by ltm.lap\n        ,ltm.milliseconds\n\
  \        ,ltm.driverid\n/\nLAP DRIVER          MILLISECONDS RUNNING_TOTAL\n----------\
  \ --------------- ------------ -------------\n         1 Charles Leclerc       \
  \ 99070         99070\n         1 Max Verstappen        100236        100236\n \
  \        1 Lewis Hamilton        101555        101555\n         1 Sergio Pérez \
  \         102993        102993\n         2 Charles Leclerc        97853        196923\n\
  \         2 Max Verstappen         97880        198116\n         2 Lewis Hamilton\
  \         99002        200557\n         2 Sergio Pérez           99092        202085\n\
  \         3 Charles Leclerc        98272        295195\n         3 Max Verstappen\
  \         98357        296473\n         3 Lewis Hamilton         99075        299632\n\
  \         3 Sergio Pérez           99473        301558\n12 rows selected.\n```\n\
  \n\n\n最终的`order by`子句（上述查询的最后一行）决定了结果集的排序方式。运行总计可能不会立即显现，但当聚焦于查尔斯·勒克莱尔的运行总计时，其结果与清单\
  \ 2-1 中第一个查询的结果一致。\n\n为了帮助可视化窗口，可以使用`first_value`和`last_value`函数。在以下查询中，`first_value`和`last_value`与`sum`函数使用相同的分析子句，并分别显示窗口开始（在`win_start`列中）和窗口结束（在`win_end`列中）的圈数。\n\
  \n```sql\nselect lt.lap\n, lt.milliseconds\n, sum (lt.milliseconds)\nover (partition\
  \ by lt.driverid\norder by lap) as running_total\n, first_value (lt.lap)\nover (partition\
  \ by lt.driverid\norder by lt.lap) as win_start\n, last_value (lt.lap)\nover (partition\
  \ by lt.driverid\norder by lt.lap) as win_end\nfrom   f1data.laptimes lt\njoin \
  \  f1data.races r\non   r.raceid = lt.raceid\nwhere  race_date between trunc (sysdate,\
  \ 'yy') and sysdate\nand    r.raceid = 1074 -- 巴林大奖赛\nand    lt.lap between 1 and\
  \ 3\nand    lt.driverid = 844 -- 查尔斯·勒克莱尔\norder  by lt.lap\n,lt.milliseconds\n\
  /\nLAP MILLISECONDS RUNNING_TOTAL  WIN_START    WIN_END\n---------- ------------\
  \ ------------- ---------- ----------\n1        99070         99070          1 \
  \         1\n2        97853        196923          1          2\n3        98272\
  \        295195          1          3\n```\n\n在上述结果集中，`win_start`列保持值 1 作为窗口起点，而`win_end`列显示该值随行数增加而递增。\n\
  \n注意\n\n当你想知道的是分区（`partition`）中的最后一个值，而非窗口中当前的最后一行时，请指定`unbounded following`。这会将窗口从当前行扩展到最后一行。\n\
  \n自 Oracle Database 21c 起，可以定义可重用的窗口子句。以下查询是前述查询的一个变体，其中窗口可通过`first_value`和`last_value`函数进行可视化。这个可重用的窗口子句被命名为“win”，并在所有三个分析函数中使用。\n\
  \n```sql\nselect ltm.lap\n, ltm.milliseconds\n, sum (ltm.milliseconds) over win\
  \ as running_total\n, first_value (ltm.lap) over win as win_start\n, last_value\
  \ (ltm.lap) over win as win_end\nfrom   f1data.laptimes ltm\njoin   f1data.races\
  \ rcs\non   rcs.raceid = ltm.raceid\nwhere  rcs.race_date between trunc (sysdate,\
  \ 'yy') and sysdate\nand    rcs.raceid = 1074 -- 巴林大奖赛\nand    ltm.lap between 1\
  \ and 3\nand    ltm.driverid = 844 -- 查尔斯·勒克莱尔\nwindow win as (partition by ltm.driverid\n\
  order by ltm.lap)\norder  by ltm.lap\n, ltm.milliseconds\n/\nLAP MILLISECONDS RUNNING_TOTAL\
  \  WIN_START    WIN_END\n---------- ------------ ------------- ---------- ----------\n\
  1        99070         99070          1          1\n2        97853        196923\
  \          1          2\n3        98272        295195          1          3\n有关可重用窗口子句的更多内容，请参见“可重用窗口子句”一节。\n\
  ```\n\n#### 访问其他行的值\n\n有几个函数允许访问结果集中其他行的值，而无需自连接。在前面的例子中，已经展示了`first_value`和`last_value`有助于可视化窗口的开始和结束位置。这些函数的一个变体是`nth_value`。\n\
  \n`first_value`从窗口中的第一行检索值，`last_value`从窗口中的最后一行检索值，而`nth_value`允许从窗口中的任意行检索值。\n\
  \n`nth_value`函数的第一个参数指定需要检索的值。第二个参数指定需要返回的行的偏移量。这可以是一个常量、绑定变量、列或涉及它们的表达式（如果解析为正整数）。\n\
  \n在以下示例中，比较了每位车手的当前圈（当前行）与第二圈所用时间之间的差异。与第二圈的差异显示在标记为`diff`的列中。\n\n在此示例中，每一行都与结果集中的第二行进行比较，包括第一行。窗口`rows\
  \ between unbounded preceding and unbounded following`不仅限于“向后看”，它也可以“向前看”。\n\n刘易斯·汉密尔顿和塞尔吉奥·佩雷斯在第四圈比第二圈更快。\n\
  \n```sql\nselect ltm.lap\n, drv.forename||' '||drv.surname as driver\n, ltm.milliseconds\n\
  , ltm.milliseconds\n- nth_value (ltm.milliseconds, 2)\nover (partition by ltm.driverid\n\
  order by ltm.lap\nrows between unbounded preceding\nand unbounded following)\nas\
  \ diff\nfrom   f1data.laptimes ltm\njoin   f1data.races rcs\non   rcs.raceid = ltm.raceid\n\
  join   f1data.drivers drv\non   drv.driverid = ltm.driverid\nwhere  rcs.race_date\
  \ between trunc (sysdate, 'yy') and sysdate\nand    rcs.raceid = 1074 -- 巴林大奖赛\n\
  and    ltm.lap between 1 and 4\nand    ltm.driverid in (1, 815, 830, 844)\norder\
  \  by ltm.lap\n, ltm.milliseconds\n/\nLAP DRIVER          MILLISECONDS       DIFF\n\
  ---------- --------------- ------------ ----------\n1 查尔斯·勒克莱尔        99070    \
  \   1217\n1 马克斯·维斯塔潘        100236       2356\n1 刘易斯·汉密尔顿        101555       2553\n\
  1 塞尔吉奥·佩雷斯          102993       3901\n2 查尔斯·勒克莱尔        97853          0\n2 马克斯·维斯塔潘\
  \         97880          0\n2 刘易斯·汉密尔顿         99002          0\n2 塞尔吉奥·佩雷斯    \
  \       99092          0\n3 查尔斯·勒克莱尔        98272        419\n3 马克斯·维斯塔潘       \
  \  98357        477\n3 刘易斯·汉密尔顿         99075         73\n3 塞尔吉奥·佩雷斯           99473\
  \        381\n4 查尔斯·勒克莱尔        98414        561\n4 马克斯·维斯塔潘         98566     \
  \   686\n4 塞尔吉奥·佩雷斯           98741       -351\n4 刘易斯·汉密尔顿         98892       -110\n\
  已选择 16 行。\n```\n\n比较一圈与下一圈的圈速，可以使用`lag`和`lead`函数。使用`lag`可以从前一行检索值，而`lead`则从结果集中的后续行检索值。\n\
  \n以下示例将单一车手的圈速与前一圈的圈速进行比较。因为筛选器只选择了一位车手，所以分析函数中省略了分区子句。从结果集可见，第二圈明显比第一圈快。\n\n```sql\n\
  select ltm.lap\n, ltm.milliseconds\n, ltm.milliseconds\n- lag (ltm.milliseconds)\n\
  over (partition by ltm.driverid\norder by ltm.lap)\nas diff\nfrom   f1data.laptimes\
  \ ltm\njoin   f1data.races rcs\non   rcs.raceid = ltm.raceid\njoin   f1data.drivers\
  \ drv\non   drv.driverid = ltm.driverid\nwhere  rcs.race_date between trunc (sysdate,\
  \ 'yy') and sysdate\nand    rcs.raceid = 1074 -- 巴林大奖赛\nand    ltm.lap between 1\
  \ and 4\nand    ltm.driverid = 830 -- 马克斯·维斯塔潘\norder  by ltm.lap\n, ltm.milliseconds\n\
  /\nLAP MILLISECONDS       DIFF\n---------- ------------ ----------\n1       100236\n\
  2        97880      -2356\n3        98357        477\n4        98566        209\n\
  ```\n\n\n"
- "# SQL 窗口函数：lag、lead 与排名分析\n\n#### 引言\n\n默认情况下，`lag`函数访问前一行的值。偏移量为一行。`lead`函数同样如此，偏移量为一行，但它检索当前行之后一行的值。这两个函数都可以接受第二个参数来更改行偏移量。当需要回看两行时，可以使用以下语句。\n\
  \n```sql\nlag (ltm.milliseconds, 2)\nover (partition by ltm.driverid\norder by ltm.lap)\n\
  ```\n\n前面结果集中的第一行在`diff`列没有值，这是可以解释的，因为没有前一行。该函数超出了窗口的范围。默认情况下，当出现这种情况时，返回值是`NULL`。第三个参数可以覆盖此行为；这样，就可以区分`NULL`值（指向前一行值为`NULL`的行）和分析函数指向窗口外行的情况。可以通过以下表达式修改前面的示例，通过将默认值设置为第一圈的圈速，在\
  \ diff 列中显示适当的值。\n\n```sql\nlag (ltm.milliseconds, 1, ltm.milliseconds)\nover (partition\
  \ by ltm.driverid\norder by ltm.lap)\n```\n\n这将产生以下结果。\n\n```\nLAP MILLISECONDS\
  \       DIFF\n---------- ------------ ----------\n1       100236          0\n2 \
  \       97880      -2356\n3        98357        477\n4        98566        209\n\
  ```\n\n#### 最快圈速与最慢圈速\n\n与聚合函数不同，分析函数不会减少行数。同时显示所有圈速并标记最快和最慢的圈速，使用分析函数很容易做到，无需自连接。最快的圈速是圈速最低的那一圈，这需要`min`函数，而最慢的圈速需要`max`函数。\n\
  \n以下示例使用`case`表达式将当前行的圈速与整体最快圈速进行比较。当圈速匹配时，显示单词 *F A S T*。对最慢圈速也做了类似处理。\n\n由于结果集对比赛（巴林大奖赛）和车手（夏尔·勒克莱尔）进行了筛选，因此在分析函数中无需使用分区子句。\n\
  \n```sql\nselect ltm.lap\n, ltm.milliseconds\n, case\nwhen min (ltm.milliseconds)\
  \ over ()\n= ltm.milliseconds\nthen 'F A S T'\nend as fastest\n, case\nwhen max\
  \ (ltm.milliseconds) over ()\n= ltm.milliseconds\nthen 'S L O W'\nend as slowest\n\
  from   f1data.laptimes ltm\njoin   f1data.races rcs\non   rcs.raceid = ltm.raceid\n\
  where  rcs.race_date between trunc (sysdate, 'yy') and sysdate\nand    ltm.driverid\
  \ = 844 -- Charles Leclerc\nand    rcs.raceid = 1074 -- Bahrain Grand Prix\n/\n\
  LAP MILLISECONDS FASTEST SLOWEST\n---------- ------------ ------- -------\n1   \
  \     99070\n2        97853\n3        98272\n4        98414\n5        98471\n6 \
  \       98712\n7        98835\n\n46       125151\n47       163846         S L O\
  \ W\n48       151364\n49       146221\n50       144429\n51        94570 F A S T\n\
  52        95027\n53        95127\n\n```\n\n#### 排名：Top-N\n\n谈论比赛数据离不开排名，因为每场比赛都以前三名登上领奖台结束。三种不同的分析函数处理排名，其差异很细微。对相等值的处理方式不同。\n\
  \n有三种排名函数：\n\n*   `rank`表示相等的值被分配相同的排名。下一个排名会跳过相等值的数量，这会导致非连续的排名。这种排名被称为 *奥林匹克排名法*。\n\
  \n*   `dense_rank`表示相等的值被分配相同的排名。下一个排名不会跳过数值；它创建连续的排名。\n\n*   `row_number`忽略重复值，其工作方式类似于`rownum`，创建连续的排名。\n\
  \n在该示例中，对每位车手的总积分（不考虑赛季或比赛）进行排名。`DRIVERSTANDINGS`表包含车手累积的所有积分。行按`DRIVERID`分区，并按积分降序排序。结果仅显示了积分为\
  \ 190 分的塞尔吉奥·佩雷斯。\n\n`rank()`分析函数（下面结果集中的 rk 列）将前三行排名为 1，而第四行的值为 4。`dense_rank()`函数（dr\
  \ 列）也将前三行的值分配为 1，而第四行的值为 2。最后，`row_number()`函数（rn 列）为每一行分配任意值。\n\n```sql\nselect\
  \ drv.forename ||' '|| drv.surname as driver\n, drs.points\n, rank () over win rk\n\
  , dense_rank () over win dr\n, row_number() over win rn\nfrom   f1data.driverstandings\
  \ drs\njoin   f1data.drivers drv\non   drv.driverid = drs.driverid\nwhere  drv.driverid\
  \  = 815\nwindow win as (partition by drv.driverid\norder by drs.points desc)\n\
  /\nDRIVER              POINTS         RK         DR         RN\n---------------\
  \ ---------- ---------- ---------- ----------\nSergio Pérez           190      \
  \    1          1          1\nSergio Pérez           190          1          1 \
  \         2\nSergio Pérez           190          1          1          3\nSergio\
  \ Pérez           178          4          2          4\nSergio Pérez           165\
  \          5          3          5\n```\n\n#### 数据去重\n\n当需要对数据进行去重时，`row_number()`排名函数非常有用。在以下示例中，基于`DRIVERS`表创建了一个新表`DUP_DRIVERS`，并且其中的数据被复制了。\n\
  \n```sql\ncreate table dup_drivers\nas\nselect *\nfrom f1data.drivers\n/\ninsert\
  \ into dup_drivers\nselect *\nfrom dup_drivers\n/\ncommit\n/\n```\n\n目前，此表中有超过 1700\
  \ 名车手。\n\n```sql\nselect count(*)\nfrom dup_drivers\n/\nCOUNT(*)\n\n```\n\n使用`row_number()`排名函数进行去重的思路是：基于重复值（如`driverid`）创建分区，为该分区中的每一行分配一个任意的排名，并删除所有排名大于\
  \ 1 的记录。\n\n第一步，数据集按`driverid`分区，并使用`row_number()`为每一行分配排名（仅显示八行）。在这种情况下，分区内行的顺序并不重要。分析函数中的排序反映了这一点（`order\
  \ by null`）。\n\n```sql\nselect rowid as rid\n, forename ||' '|| surname as driver\n\
  , row_number() over\n(partition by driverid\norder by null\n) as rn\nfrom   dup_drivers\n\
  fetch  first 8 rows only\n/\nRID                DRIVER                  RN\n------------------\
  \ --------------- ----------\nAAAYwqAAAAABAB7AAA Lewis Hamilton           1\nAAAYwqAAAAABAEHAAA\
  \ Lewis Hamilton           2\nAAAYwqAAAAABAB7AAB Nick Heidfeld            1\nAAAYwqAAAAABAEHAAB\
  \ Nick Heidfeld            2\nAAAYwqAAAAABAB7AAC Nico Rosberg             1\nAAAYwqAAAAABAEHAAC\
  \ Nico Rosberg             2\nAAAYwqAAAAABAB7AAD Fernando Alonso          1\nAAAYwqAAAAABAEHAAD\
  \ Fernando Alonso          2\n8 rows selected.\n```\n\n下一步是过滤掉所有排名大于 1 的记录。因为分析函数不能在最终谓词（where\
  \ 子句）中使用，所以需要将前面的查询推入到一个内联视图中。\n\n```sql\nselect rid\n, driver\nfrom   (select rowid\
  \ as rid\n, forename ||' '|| surname as driver\n, row_number() over\n(partition\
  \ by driverid\norder by null\n) as rn\nfrom   dup_drivers\nfetch  first 8 rows only)\n\
  where  rn > 1\n/\nRID                DRIVER\n------------------ ---------------\n\
  AAAYwqAAAAABAEHAAA Lewis Hamilton\nAAAYwqAAAAABAEHAAB Nick Heidfeld\nAAAYwqAAAAABAEHAAC\
  \ Nico Rosberg\nAAAYwqAAAAABAEHAAD Fernando Alonso\n```\n\n最后一步是从表中删除这些行。查询中移除了对前八行的限制。\n\
  \n```sql\ndelete\nfrom   dup_drivers\nwhere  rowid in (\nselect rid\nfrom   (select\
  \ rowid as rid\n, row_number() over\n(partition by driverid\norder by null\n) as\
  \ rn\nfrom   dup_drivers)\nwhere  rn > 1)\n/\n854 rows deleted.\n```\n\n\n#### 可重用窗口子句\n\
  \n自 Oracle Database 21c 起，可以定义可重用的命名窗口子句。命名窗口子句允许您在查询中为多个分析函数使用相同的定义，而无需复制该定义。命名窗口子句还可以包含其他命名窗口。\n\
  \n在示例 2-2 中，定义了五个命名窗口。第一个窗口 (`w_part`) 按 `driverid` 定义分区。第二个窗口使用 `w_part` 并按积分降序对数据排序。第三、第四和第五个窗口使用排序后的分区，每个窗口分别使用\
  \ `rows`、`range` 和 `groups` 偏移量指定了不同的窗口子句。\n\n```sql\nselect points\n, whole_partition\n\
  , rows_\n, groups_\n, range_\nfrom (\nselect drv.driverid\n, drs.points\n, max (drs.points)\
  \ over w_part  as whole_partition\n, max (drs.points) over w_rows  as rows_\n, max\
  \ (drs.points) over w_group as groups_\n, max (drs.points) over w_range as range_\n\
  from   f1data.driverstandings drs\njoin   f1data.drivers drv\non   drv.driverid\
  \ = drs.driverid\nwindow w_part  as (partition by drv.driverid)\n,w_sort  as (w_part\
  \ order by drs.points desc)\n,w_rows  as (w_sort rows   between 10 preceding\nand\
  \ current row)\n,w_group as (w_sort groups between 10 preceding\nand current row)\n\
  ,w_range as (w_sort range  between 10 preceding\nand current row)\n)\nwhere  driverid\
  \ = 815\nand    rownum <= 20\norder  by driverid, points desc\n/\n```\n\n```\nPOINTS\
  \ WHOLE_PARTITION      ROWS_    GROUPS_     RANGE_\n---------- --------------- ----------\
  \ ---------- ----------\n190             190        190        190        190\n\
  190             190        190        190        190\n190             190      \
  \  190        190        190\n178             190        190        190        178\n\
  165             190        190        190        165\n150             190      \
  \  190        190        150\n147             190        190        190        150\n\
  135             190        190        190        135\n129             190      \
  \  190        190        135\n129             190        190        190        135\n\
  125             190        190        190        135\n125             190      \
  \  190        190        135\n120             190        190        190        129\n\
  118             190        178        190        125\n110             190      \
  \  165        190        120\n108             190        150        178        118\n\
  104             190        147        165        110\n104             190      \
  \  135        165        110\n104             190        129        165        110\n\
  104             190        129        165        110\n20 rows selected.\n```\n\n\
  示例 2-2\n可重用窗口子句\n\n`rows` 窗口子句使用物理偏移量。前面的示例显示，在窗口内最多包含当前行之前的十行。`range` 窗口子句使用逻辑偏移量。值小于当前行值\
  \ 10 以内的数据都在范围内。`groups` 窗口子句将值分组，其中具有相同值的行位于同一组中。在前面的示例中，偏移量是指当前行之前的组数。\n\n注意\n\
  \n在前面的示例中，使用了语法 `over <window_name>`。也可以使用括号括住窗口名：`over (<window_name>)`。两者并不等效。后者意味着复制并修改窗口规范，如果引用的窗口规范包含窗口子句，则会被拒绝。\n\
  \n### 透视和逆透视\n\n最终用户并不总是希望看到数据在页面上纵向排列；他们更喜欢数据横向展示。`pivot` 子句是一个聚合运算符，可将行转换为列。类似地，有时相反的操作更有意义，`unpivot`\
  \ 子句可以协助完成此操作。\n\n### 透视\n\n对于示例，使用 `results` 表。该表是反规范化的，包含有关车手、车队、所得积分和每场比赛完成圈数的信息。以下是该表的一部分摘录。\n\
  \n```sql\nselect rcs.year\n, drv.driverref\n, rsl.points\n, rsl.laps\nfrom   f1data.results\
  \ rsl\njoin   f1data.races rcs\non   rcs.raceid = rsl.raceid\njoin   f1data.drivers\
  \ drv\non   drv.driverid = rsl.driverid\nwhere  drv.driverref in ('norris', 'bottas')\n\
  /\n```\n\n```\nYEAR DRIVERREF      POINTS       LAPS\n---------- ---------- ----------\
  \ ----------\n2013 bottas              0         57\n2013 bottas              0\
  \         56\n2013 bottas              0         56\n2013 bottas              0\
  \         57\n2013 bottas              0         52\n2022 norris              2\
  \         51\n2022 bottas              0         50\n2022 bottas              6\
  \         70\n2022 norris              0         70\n2022 norris              8\
  \         52\n2022 bottas              0         20\n```\n\n目标是汇总 Norris 和 Bottas\
  \ 每年的所有积分，并将两位车手的结果并排显示。\n\n对于这个初始需求，只需要 `year`、`driverref` 和 `points`。前面数据集中的 `laps`\
  \ 现在可以忽略。前面的查询是 `pivot` 子句的输入。聚合函数是 `sum`（用于汇总所有积分）。聚合函数和透视列需要在 `pivot` 子句中指定。透视列不是动态的。\n\
  \n在下面的查询中，输入查询已被提取到一个命名的子查询（称为 `results`）中，并对车手 Norris 和 Bottas 的积分进行了汇总。属于输入查询的一部分但未在\
  \ `pivot` 子句中使用的列（如 `year`）可以被视为“分组依据”列。所有属于输入查询的一部分但未在 `pivot` 子句中使用的列都隐式用作“分组依据”列。\n\
  \n提示\n\n即使只使用单个表，在透视结果集时也建议使用内联视图或子查询因子化（`with` 子句）。这样，如果基础表或视图新增了列，也能保障透视操作的安全性。\n\
  \n```sql\nwith results as (\nselect rcs.year\n, drv.driverref\n, rsl.points\nfrom\
  \   f1data.results rsl\njoin   f1data.races rcs\non   rcs.raceid = rsl.raceid\n\
  join   f1data.drivers drv\non   drv.driverid = rsl.driverid\nwhere  drv.driverref\
  \ in ('norris', 'bottas')\n)\nselect year\n, norris\n, bottas\nfrom   results\n\
  pivot  (\nsum (points)\nfor driverref in ( 'norris' as norris\n, 'bottas' as bottas\n\
  )\n)\n/\n```\n\n```\nYEAR     NORRIS     BOTTAS\n---------- ---------- ----------\n\
  2013                     4\n2014                   186\n2015                   136\n\
  2016                    85\n2017                   305\n2018                   247\n\
  2019         49        326\n2020         97        223\n2021        160        219\n\
  2022         54         44\n```\n\n透视列被赋予了别名，以防止列名变为区分大小写的形式，即列名会是包含引号的 `‘norris’`。\n\
  \n`pivot` 子句中可以有多个聚合函数。当还需要汇总完成圈数时，`laps` 必须包含在输入查询中，并且完成圈数的聚合函数必须包含在 `pivot` 子句中。\n\
  \n\n\n## 3. 连接\n\n## 透视（PIVOT）\n\n```\nwith results as (\nselect rcs.year\n, drv.driverref\n\
  , rsl.points\n, rsl.laps --<----- 输入中添加了圈数\nfrom   f1data.results rsl\njoin   f1data.races\
  \ rcs\non   rcs.raceid = rsl.raceid\njoin   f1data.drivers drv\non   drv.driverid\
  \ = rsl.driverid\nwhere  drv.driverref in ('norris', 'bottas')\n)\nselect year\n\
  , norris_points\n, norris_laps\n, bottas_points\n, bottas_laps\nfrom   results\n\
  pivot  ( sum (points) as points\n, sum (laps)   as laps\nfor driverref in ( 'norris'\
  \ as norris\n, 'bottas' as bottas\n)\n)\norder  by year\n/\nYEAR NORRIS_POINTS NORRIS_LAPS\
  \ BOTTAS_POINTS BOTTAS_LAPS\n---------- ------------- ----------- -------------\
  \ -----------\n2013                                       4        1070\n2014  \
  \                                   186        1110\n2015                      \
  \               136        1037\n2016                                      85  \
  \      1186\n2017                                     305        1168\n2018    \
  \                                 247        1202\n2019            49        1102\
  \           326        1233\n2020            97        1015           223      \
  \   994\n2021           160        1223           219        1134\n2022        \
  \    54         570            44         541\n10 行 已选择。\n```\n\n聚合函数也被赋予别名，以区分它们所代表的值。列名来源于透视列，而别名则来源于聚合。\n\
  \n## 逆透视（UNPIVOT）\n\n如果说透视（pivot）是将行变为列的操作，那么逆透视（unpivot）则做相反的事情。`排位赛`表有三列，分别对应每次排位。排位赛在比赛前一天进行，用于确定发车顺位以及谁获得杆位。每一轮排位都是淘汰赛，只有最快的车手进入下一轮。以下是罗伯特·多恩博斯（Robert\
  \ Doornbos）的排位赛表摘录；他只进入过两次第二轮，一次进入最终轮。\n\n```\nselect drv.forename ||' '||drv.surname\
  \ as driver\n, rcs.name\n, qlf.q1\n, qlf.q2\n, qlf.q3\nfrom   f1data.qualifying\
  \ qlf\njoin   f1data.drivers drv\non   drv.driverid = qlf.driverid\njoin   f1data.races\
  \ rcs\non   rcs.raceid = qlf.raceid\nwhere  drv.driverref = 'doornbos'\nand    qlf.q1\
  \ is not null\n/\nDRIVER          NAME                 Q1       Q2       Q3\n---------------\
  \ -------------------- -------- -------- --------\nRobert Doornbos Chinese Grand\
  \ Prix   1:46.387 1:45.747 1:48.021\nRobert Doornbos Japanese Grand Prix  1:32.402\n\
  Robert Doornbos Brazilian Grand Prix 1:12.530 1:12.591\nRobert Doornbos German Grand\
  \ Prix    1:18.313\nRobert Doornbos Hungarian Grand Prix 1:25.484\nRobert Doornbos\
  \ Italian Grand Prix   1:24.904\nRobert Doornbos Belgian Grand Prix   1:49.779\n\
  Robert Doornbos Japanese Grand Prix  1:52.894\nRobert Doornbos Chinese Grand Prix\
  \   1:39.460\n9 行 已选择。\n```\n\n目标是将三个排位时间列（`Q1`、`Q2` 和 `Q3`）转换为行。\n\n输入查询与前面的查询相同，只是现在作为一个命名的查询块。需要逆透视的列必须包含在输入查询中，本例中就是三个排位列。在逆透视子句中，新列被标记为\
  \ `qtime`，它包含三个排位列逆透视后的值，而 `quali_round` 标签表示它所代表的轮次。\n\n```\nwith qualies as (\n\
  select drv.forename ||' '||drv.surname as driver\n, rcs.name\n, qlf.q1\n, qlf.q2\n\
  , qlf.q3\nfrom   f1data.qualifying qlf\njoin   f1data.drivers drv\non   drv.driverid\
  \ = qlf.driverid\njoin   f1data.races rcs\non   rcs.raceid = qlf.raceid\nwhere \
  \ drv.driverref = 'doornbos'\nand    qlf.q1 is not null\n)\nselect driver\n, name\n\
  , quali_round\n, qtime\nfrom   qualies\nunpivot (\nqtime for quali_round in (q1,\
  \ q2, q3)\n)\n/\nDRIVER          NAME                 QU QTIME\n---------------\
  \ -------------------- -- --------\nRobert Doornbos Chinese Grand Prix   Q1 1:46.387\n\
  Robert Doornbos Chinese Grand Prix   Q2 1:45.747\nRobert Doornbos Chinese Grand\
  \ Prix   Q3 1:48.021\nRobert Doornbos Japanese Grand Prix  Q1 1:32.402\nRobert Doornbos\
  \ Brazilian Grand Prix Q1 1:12.530\nRobert Doornbos Brazilian Grand Prix Q2 1:12.591\n\
  Robert Doornbos German Grand Prix    Q1 1:18.313\nRobert Doornbos Hungarian Grand\
  \ Prix Q1 1:25.484\nRobert Doornbos Italian Grand Prix   Q1 1:24.904\nRobert Doornbos\
  \ Belgian Grand Prix   Q1 1:49.779\nRobert Doornbos Japanese Grand Prix  Q1 1:52.894\n\
  Robert Doornbos Chinese Grand Prix   Q1 1:39.460\n12 行 已选择。\n```\n\n默认情况下，`NULL`\
  \ 列会从结果集中排除。输出中没有 `Q2` 或 `Q3` 为 `NULL` 的行。可以通过在逆透视子句后声明 `include nulls` 来覆盖此行为。\n\
  \n##### 处理 NULL 值\n\n```\nwith qualies as (\nselect drv.forename ||' '||drv.surname\
  \ as driver\n, rcs.name\n, qlf.q1\n, qlf.q2\n, qlf.q3\nfrom   f1data.qualifying\
  \ qlf\njoin   f1data.drivers drv\non   drv.driverid = qlf.driverid\njoin   f1data.races\
  \ rcs\non   rcs.raceid = qlf.raceid\nwhere  drv.driverref = 'doornbos'\nand    qlf.q1\
  \ is not null\n)\nselect driver\n, name\n, quali_round\n, qtime\nfrom   qualies\n\
  unpivot include nulls (\nqtime for quali_round in (q1, q2, q3)\n)\n/\nDRIVER   \
  \       NAME                 QU QTIME\n--------------- -------------------- -- --------\n\
  Robert Doornbos Chinese Grand Prix   Q1 1:46.387\nRobert Doornbos Chinese Grand\
  \ Prix   Q2 1:45.747\nRobert Doornbos Chinese Grand Prix   Q3 1:48.021\nRobert Doornbos\
  \ Japanese Grand Prix  Q1 1:32.402\nRobert Doornbos Japanese Grand Prix  Q2\nRobert\
  \ Doornbos Japanese Grand Prix  Q3\nRobert Doornbos Brazilian Grand Prix Q1 1:12.530\n\
  Robert Doornbos Brazilian Grand Prix Q2 1:12.591\nRobert Doornbos Brazilian Grand\
  \ Prix Q3\n\n```\n\n### 总结\n\n本章讨论了分析函数及其最常见的应用场景。一旦开始使用分析函数，你会发现更多的可能性。这里也存在一个警示：分析函数是在结果集确定之后（`连接`、`where`、`group\
  \ by`、`having`）和最终排序之前（`order by`）应用的。当你在分析函数中使用 `distinct` 操作符时，可能你需要的是聚合函数而不是分析函数。\n\
  \n本章最后讨论了结果集的透视（pivoting）和逆透视（unpivoting）。要透视结果，需要在 `pivot` 子句中聚合度量值。使用 `pivot`，行变为列；使用\
  \ `unpivot`，列变为行。\n\n## 3. 连接\n\n与其他数据库开发人员讨论连接语法几乎总是会引向关于首选数据连接方式的讨论。有些人是 `ANSI`\
  \ 风格连接的狂热支持者，而另一些人则倾向于坚持传统方式。我们偏爱的方法是前者——`ANSI` 风格。\n\n本章讨论了使用 `ANSI` 风格连接的优势，并描述了最常见的连接：`外连接`、`内连接`和`全连接`。它还涵盖了一些不太为人所知的连接，如\
  \ `分区外连接` 和 `横向连接`。当提到表时，指的是可以在查询中使用的所有类型的数据源，例如视图或物化视图。\n\n\n### 为什么选择 ANSI 连接？\n\
  \n使用 ANSI 风格连接语法的主要优势在于将连接条件与过滤条件分离。传统语法会将连接条件与过滤条件混在一起，而使用 ANSI 风格则完全避免了这种情况。连接条件指定了表如何关联，而过滤条件则位于\
  \ `where` 子句中。\n\n传统的表连接方式是在 `from` 子句中列出表，并在 `where` 子句中指定连接条件。当数据需要额外过滤时，这些过滤条件也会进入\
  \ `where` 子句。这可能导致混淆，无法确定 `where` 子句中的条件究竟是连接条件还是过滤条件。\n\nANSI 风格的语法强制要求将连接条件指定在\
  \ `on` 子句或 `using` 子句中。而过滤条件则始终放在 `where` 子句中。\n\n在传统风格中，如果忘记指定连接条件，会导致产生笛卡尔积。\n\
  \n使用 ANSI 风格语法则不会意外产生笛卡尔积。当传统风格的代码确实意图创建笛卡尔积时，需要添加适当的注释，以告知后续开发者这个笛卡尔积是故意为之。而 ANSI\
  \ 风格的笛卡尔积则一目了然：`cross join`。这直接向后续开发者表明该笛卡尔积是故意的，无需额外注释。\n\n使用外连接表时，传统风格不那么直观。外连接符号\
  \ `(+)` 应该加在外连接的表上，还是加在另一张表上？必须对外连接的所有列都应用 `(+)` 符号，连接才能保持为外连接。其他数据库厂商的数据库开发者不会熟悉这种\
  \ Oracle 风格的外连接语法。\n\nANSI 风格的外连接更容易理解。要编写一个查询，对表 A 和 B 执行外连接，并返回 A 表（位于连接关键字左侧的表）的所有行，只需在\
  \ `from` 子句中指定 `left outer join`。而使用传统风格编写外连接时，必须对外连接操作符 `(+)` 应用于表 B 的所有列，这可能有违直觉。\n\
  \n实际上，底层使用哪种连接风格并不重要。优化器会重写它们，并以相同的方式执行。\n\n无论你偏好哪种连接风格，一个共识是：不应在同一个查询中混合使用这两种风格。虽然这是可能的，但被认为是不良实践。最常见的是，所有数据库开发者在项目开始时就商定好查询风格。\n\
  \n### 自然连接\n\n自然连接是指连接条件由两表中列的 `名称` 推导而来。这种设计堪称 ANSI 标准中的一个败笔，不应被使用。\n\n以下用 `DRIVERS`、`RESULTS`\
  \ 和 `CONSTRUCTORS` 表来演示自然连接的荒谬之处。使用自然连接组合这些表，并执行以下查询：\n\n```\nselect ctr.name\n\
  ,drv.forename\n,drv.surname\nfrom f1data.drivers drv\nnatural\njoin f1data.results\
  \ rst\nnatural\njoin f1data.constructors ctr\n/\nno rows selected\n```\n\n该查询没有返回任何结果，检查执行计划后，原因一目了然。\n\
  \n```\nexplain plan for\nselect ctr.name\n, drv.forename\n, drv.surname\nfrom  \
  \ f1data.drivers drv\nnatural\njoin   f1data.results rst\nnatural\njoin   f1data.constructors\
  \ ctr\n/\nselect *\nfrom   table (dbms_xplan.display (format => 'BASIC +PREDICATE'\
  \ ))\n/\n\n| Id  | Operation                    | Name         |\n\n|   0 | SELECT\
  \ STATEMENT             |              |\n|*  1 |  HASH JOIN                   |\
  \              |\n|   2 |   JOIN FILTER CREATE         | :BF0000      |\n|*  3 |\
  \    HASH JOIN                 |              |\n|   4 |     TABLE ACCESS STORAGE\
  \ FULL| CONSTRUCTORS |\n|   5 |     TABLE ACCESS STORAGE FULL| DRIVERS      |\n\
  |   6 |   JOIN FILTER USE            | :BF0000      |\n|*  7 |    TABLE ACCESS STORAGE\
  \ FULL | RESULTS      |\n\nPredicate Information (identified by operation id):\n\
  \n1 - access(\"RST\".\"CONSTRUCTORID\"=\"CTR\".\"CONSTRUCTORID\" AND\n\"DRV\".\"\
  DRIVERID\"=\"RST\".\"DRIVERID\")\n3 - access(\"DRV\".\"URL\"=\"CTR\".\"URL\" AND\n\
  \"DRV\".\"NATIONALITY\"=\"CTR\".\"NATIONALITY\")\n7 - storage(SYS_OP_BLOOM_FILTER(:BF0000,\"\
  RST\".\"DRIVERID\"))\nfilter(SYS_OP_BLOOM_FILTER(:BF0000,\"RST\".\"DRIVERID\"))\n\
  ```\n\n从访问谓词信息中可以看到，自然连接执行的连接条件是基于列名的相似性。有些是正确的，比如 constructorid 和 driverid，但其他的则毫无意义，比如\
  \ nationality 或 url。重申一次，这个 ANSI 标准中的败笔不应被使用。\n\n### 内连接\n\n将两个表关联起来的最常用方法是内连接。表根据连接条件中指定的某些列进行连接。以下示例展示了\
  \ `drivers` 表和 `results` 表之间的内连接。\n\n```\nselect crt.raceid\n, crt.points\n, csr.name\n\
  , csr.nationality\nfrom   f1data.constructors csr\ninner\njoin   f1data.constructorresults\
  \ crt\non   csr.constructorid = crt.constructorid\n/\nRACEID     POINTS NAME   \
  \         NATIONALITY\n---------- ---------- --------------- ---------------\n18\
  \         14 McLaren         British\n18          8 BMW Sauber      German\n18 \
  \         9 Williams        British\n18          5 Renault         French\n18  \
  \        2 Toro Rosso      Italian\n18          1 Ferrari         Italian\n18  \
  \        0 Toyota          Japanese\n18          0 Super Aguri     Japanese\n18\
  \          0 Red Bull        Austrian\n18          0 Force India     Indian\n```\n\
  \n在这个查询中，通过使用可选关键字 `inner`，明确指定了这是一个内连接。连接条件在 `on` 子句中指定。也可以使用 `using` 子句，它表示两表之间存在一个同名公共列。`using`\
  \ 子句会在两个列之间进行相等性比较。而 `on` 子句允许在连接列之间进行其他类型的比较。以下示例与前一个示例等价，但在连接条件中使用了 `using` 子句。\n\
  \n```\nselect crt.raceid\n, crt.points\n, csr.name\n, csr.nationality\nfrom   f1data.constructors\
  \ csr\njoin   f1data.constructorresults crt\nusing  (constructorid)\n/\nRACEID \
  \    POINTS NAME            NATIONALITY\n---------- ---------- --------------- ---------------\n\
  18         14 McLaren         British\n18          8 BMW Sauber      German\n18\
  \          9 Williams        British\n18          5 Renault         French\n18 \
  \         2 Toro Rosso      Italian\n18          1 Ferrari         Italian\n18 \
  \         0 Toyota          Japanese\n18          0 Super Aguri     Japanese\n18\
  \          0 Red Bull        Austrian\n18          0 Force India     Indian\n\n\
  ```\n\n`using` 子句中指定的、用于连接条件的列，在查询的任何地方都不能使用表别名作为前缀。需要明确的是，这些列是可以使用的；只是不能在前面加上表别名。毕竟，用于连接表的列是表之间的公共列。\n\
  \n### 外连接\n\n外连接会显示一张表中的所有行，无论其在另一张表中是否存在匹配记录。可能有些车队目前还没有任何比赛结果。\n\n使用 ANSI 风格的外连接时，查询中表的顺序很重要。一个`左`外连接会指定显示连接关键字左侧表中的*所有行*，即使它与连接关键字右侧的表没有匹配项。`右`外连接也是同样的道理，但针对的是连接关键字右侧的行。\n\
  \n> 注意\n>\n> 在网络论坛和各种示例中，书写外连接最常见的方式是使用`左外`连接。这可能是因为主表通常被首先书写。尽管常见，但这并非强制要求，而是一种最佳实践。本章及全书都将使用`左外连接`。\n\
  \n在以下示例中，将显示所有车队，即使它们在`constructorresults`表中没有任何积分。\n\n```sql\nselect crt.raceid\n\
  ,      crt.points\n,      csr.name\n,      csr.nationality\nfrom   f1data.constructors\
  \ csr\nleft outer\njoin   f1data.constructorresults crt\non     csr.constructorid\
  \ = crt.constructorid\n/\nRACEID     POINTS NAME            NATIONALITY\n----------\
  \ ---------- --------------- -----------\n18         14 McLaren         British\n\
  19         10 McLaren         British\n20          4 McLaren         British\n\n\
  Pawl            American\nRae             American\nAdams           American\n```\n\
  \n> 注意\n>\n> `outer`和`inner`关键字是可选的，但强烈建议使用它们以使语法更清晰。\n\n## 几乎外连接\n\n“几乎外连接”是指在查询中书写了外连接，但被`where`子句中的额外条件所否定。\n\
  \n在以下示例中，目标是查看所有车队及其车队成绩；但是，如果车队是`红牛`，你还想看到他们的积分。对于其他车队，此信息无关紧要，无需显示。该查询的首次尝试如下。\n\
  \n```sql\nselect crt.raceid\n,      crt.points\n,      csr.name\n,      csr.nationality\n\
  from   f1data.constructors csr\nleft outer\njoin   f1data.constructorresults crt\n\
  on     csr.constructorid = crt.constructorid\nwhere  csr.constructorref = 'red_bull'\n\
  /\nRACEID     POINTS NAME            NATIONALITY\n---------- ---------- ---------------\
  \ ---------------\n1062          2 Red Bull        Austrian\n1063       12.5 Red\
  \ Bull        Austrian\n\n1072         18 Red Bull        Austrian\n1073       \
  \  26 Red Bull        Austrian\n1074          0 Red Bull        Austrian\n1075 \
  \        37 Red Bull        Austrian\n1076         18 Red Bull        Austrian\n\
  1077         58 Red Bull        Austrian\n336 rows selected.\n```\n\n如示例所示，查询中使用了外连接，但结果只显示了`红牛`的数据。所有其他车队的成绩都缺失了。这个查询并没有显示先前陈述的目标结果。要获得所需的查询结果集，过滤条件必须是一个连接条件。\n\
  \n```sql\nselect crt.raceid\n,      crt.points\n,      csr.name\n,      csr.nationality\n\
  from   f1data.constructors csr\nleft outer\njoin   f1data.constructorresults crt\n\
  on     csr.constructorid  = crt.constructorid\nand    csr.constructorref = 'red_bull'\n\
  /\nRACEID     POINTS NAME            NATIONALITY\n---------- ---------- ---------------\
  \ ---------------\n1062          2 Red Bull        Austrian\n1063       12.5 Red\
  \ Bull        Austrian\n\nAlpine F1 Team  French\nMcLaren         British\nMartini\
  \         French\nPawl            American\nCooper-BRM      British\n546 rows selected.\n\
  ```\n\n现在查询按指定方式显示了结果，仅显示`红牛`车队的积分。\n\n#### 全外连接\n\n数据模型中没有一个可以应用全外连接的合适例子，但为了演示目的，将`RACES`和`CIRCUITS`之间的外键从必需改为可选。其思路是，未来应该可以安排一场比赛，而赛道是未知的。也可能存在一个赛道，但目前还没有为它安排任何比赛。\n\
  \n在每个表中，都添加了一条带有虚构数据的额外记录。\n\n```sql\nInsert into f1data.races\n( raceid\n, year\n\
  , round\n, circuitid\n, name\n, race_date\n)\nvalues\n( 0\n, 2023\n, 42\n, null\n\
  , 'Hitchhiker Race'\n, date '2023-10-07'\n)\n/\n```\n\n```sql\ninsert into f1data.circuits\n\
  ( circuitid\n, circuitref\n, name\n, location\n, country\n)\nvalues\n( 0\n, 'brabantbaan'\n\
  , 'Brabant Baan'\n, 'Oosterhout'\n, 'Netherlands')\n/\n```\n\n在以下示例中，执行了一个全外连接，并对结果进行了过滤，仅显示在前面代码中刚刚添加的行。\n\
  \n```sql\nselect rce.name      as race\n,      rce.race_date\n,      cct.name  \
  \    as circuit\n,      cct.location\nfrom   f1data.races rce\nfull outer\njoin\
  \   f1data.circuits cct\non     rce.circuitid = cct.circuitid\nwhere  rce.rowid\
  \ is null\nor     cct.rowid is null\n/\nRACE             RACE_DATE  CIRCUIT    \
  \      LOCATION\n---------------  ---------  ---------------  -----------\nHitchhiker\
  \ Race  07-OCT-23  Brabant Baan     Oosterhout\n```\n\n一条来自`RACES`表的记录被显示出来，即使没有赛道来举办该赛事；同时一个没有安排比赛的赛道也被显示出来。\n\
  \n### 交叉连接\n\n在笛卡尔积中，第一张表的所有记录都与第二张表的记录相连接。使用 ANSI 连接语法，可以清楚地看出这是有意为之，而不是意外缺少了连接条件。在\
  \ ANSI 连接语法中，这被称为`交叉连接`。以下示例创建了一个车手的笛卡尔积；`drivers`表与自身相连接。为了展示交叉连接的效果，使用了一个计数。\n\
  \n```sql\nselect count(*)\nfrom   f1data.drivers drv\n/\nCOUNT(*)\n\n```\n\n表中有\
  \ 854 名车手。当这张表与自身进行笛卡尔积连接时，会生成所有可能的车手组合，结果是 854 × 854 条记录：729316 条记录。\n\n```sql\n\
  select count(*)\nfrom   f1data.drivers drv\ncross\njoin   f1data.drivers drv2\n\
  /\nCOUNT(*)\n\n```\n\n由于使用了明确的`交叉连接`语法，下一个阅读此代码的开发者会清楚地知道这个笛卡尔积是特意为之。\n\n\n### 分区外连接\n\
  \n常规外连接通过向结果集添加空记录来弥补连接条件中缺少匹配行的情况。然而，有时仅添加单行记录是不够的。\n\n本章前面部分，日历中添加了一场额外的比赛。这场比赛没有比赛结果。我们的目标是显示每位车手在这场比赛中的结果，即使没有结果（实际上也没有）。\n\
  \n涉及的表有 `RACES`（比赛）、`RESULTS`（结果）和 `DRIVERS`（车手，用于显示每位车手的姓名）。第一次尝试是将结果表与比赛表和车手表进行外连接。\n\
  \n```sql\nselect rce.name\n, drv.forename||' '||drv.surname as driver\n, rst.result_number\n\
  from   f1data.races rce\nleft outer\njoin   f1data.results rst\non   rce.raceid\
  \ = rst.raceid\nleft outer\njoin   f1data.drivers drv\non   drv.driverid = rst.driverid\n\
  where  rce.raceid = 0\n/\n```\n```\nNAME            DRIVER          RESULT_NUMBER\n\
  --------------- --------------- -------------\nHitchhiker Race\n```\n\n这个结果并非我们所求。比赛只有一行记录。没有列出任何车手，而这正是我们要求的。与\
  \ `RESULTS` 表的外连接只添加了一行，因为没有匹配项，但它应该为每位车手添加一行。`RESULTS` 表应按 `driverid` 细分并与 `RACES`\
  \ 表进行外连接；这样，每位车手就有一条记录。通过对表添加 `partition by` 子句，外连接变为*按分区*执行，而非针对整张表。由于分区是按 `driverid`\
  \ 进行的，每位车手都有一条 `RESULTS` 记录。因为每位车手都有了结果记录，就不再需要对 `drivers` 表进行外连接了。以下查询仅对当前赛季（2022\
  \ 年）的车手显示分区外连接。\n\n```sql\nselect rce.name\n, drv.forename||' '||drv.surname as\
  \ driver\n, rst.result_number\nfrom   f1data.races rce\nleft outer\njoin   f1data.results\
  \ rst partition by (rst.driverid)\non   rce.raceid = rst.raceid\njoin   f1data.drivers\
  \ drv\non   drv.driverid = rst.driverid\nwhere  rce.raceid = 0\nand    drv.driverid\
  \ in ( 1, 4, 830, 815, 847\n, 844, 832, 846, 839\n, 20, 822, 817, 842\n, 855, 854,\
  \ 825, 840\n, 852, 848, 849)\n/\n```\n```\nNAME            DRIVER             RESULT_NUMBER\n\
  --------------- ------------------ -------------\nHitchhiker Race Lewis Hamilton\n\
  Hitchhiker Race Fernando Alonso\nHitchhiker Race Sebastian Vettel\nHitchhiker Race\
  \ Sergio Pérez\nHitchhiker Race Daniel Ricciardo\nHitchhiker Race Valtteri Bottas\n\
  Hitchhiker Race Kevin Magnussen\nHitchhiker Race Max Verstappen\nHitchhiker Race\
  \ Carlos Sainz\nHitchhiker Race Esteban Ocon\nHitchhiker Race Lance Stroll\nHitchhiker\
  \ Race Pierre Gasly\nHitchhiker Race Charles Leclerc\nHitchhiker Race Lando Norris\n\
  Hitchhiker Race George Russell\nHitchhiker Race Alexander Albon\nHitchhiker Race\
  \ Nicholas Latifi\nHitchhiker Race Yuki Tsunoda\nHitchhiker Race Mick Schumacher\n\
  Hitchhiker Race Guanyu Zhou\n```\n\n当记录没有被过滤以仅显示特定车手的数据时，`RESULTS` 表中列出的每位车手都会有一条记录。由于结果表包含了自\
  \ 1950 年代以来所有比赛的记录，数据量会更大。\n\n### 横向连接\n\n除非使用横向连接，否则无法将表与关联子查询连接。使用横向内联视图，你可以在查询的\
  \ `from` 子句中指定出现在横向内联视图左侧的表。\n\n横向连接最常见的用例是使用 `JSON_TABLE` 运算符将 JSON 文档转换为关系格式，或使用\
  \ `XML_TABLE` 运算符将 XML 文档进行类似转换。\n\n以下查询从 `driverstandings` 表中选取了一组特定的车手及其积分，但只取积分排名前两位（按积分从高到低排序）且积分大于零的记录。横向内联视图与\
  \ `drivers` 表在 `driverid` 列上存在关联。\n\n```sql\nselect drv.driverid\n, drv.forename\
  \ ||' '||drv.surname as driver\n, dsg.points\n, dsg.position\nfrom   f1data.drivers\
  \ drv\ncross\njoin lateral\n(select dsg.points\n, dsg.position\nfrom   f1data.driverstandings\
  \ dsg\nwhere  dsg.driverid = drv.driverid\nand    dsg.points > 0\norder  by dsg.points\
  \ desc\nfetch  first 2 rows only) dsg\nwhere  drv.driverid in ( 855, 854, 840, 852,\
  \ 848, 849)\norder  by driverid desc\n/\n```\n```\nDRIVERID DRIVER             \
  \ POINTS   POSITION\n---------- --------------- ---------- ----------\n855 Guanyu\
  \ Zhou              6         17\n855 Guanyu Zhou              6         18\n854\
  \ Mick Schumacher         12         15\n854 Mick Schumacher         12        \
  \ 15\n852 Yuki Tsunoda            32         14\n852 Yuki Tsunoda            20\
  \         14\n849 Nicholas Latifi          7         17\n849 Nicholas Latifi   \
  \       7         16\n848 Alexander Albon        105          7\n848 Alexander Albon\
  \         93          8\n840 Lance Stroll            75         11\n840 Lance Stroll\
  \            74         10\n```\n\n在结果中，从关联子查询中选择了两列。使用标量子查询是无法做到这一点的。标量子查询只能返回一个值。\n\
  \n注意：除了 `cross join lateral`，你也可以使用 `inner join lateral`；然而，内连接还需要一个连接条件（`on` 子句或\
  \ `using` 子句）。由于表和内联视图之间已经存在关联，再有连接条件就是多余的，并且无助于提高可读性或可维护性。不推荐使用 `inner join lateral`。\n\
  \n`cross apply` 连接是 `cross join` 的一种变体，与后者不同，它可以使用关联子查询。前面例子的相同结果可以使用 `cross apply`\
  \ 而非 `cross join lateral` 来实现。在下面的例子中，应用了 `cross apply` 连接。\n\n```sql\nselect drv.driverid\n\
  , drv.forename ||' '||drv.surname as driver\n, dsg.points\nfrom   f1data.drivers\
  \ drv\ncross\napply  (select dsg.points\n, dsg.driverid\nfrom   f1data.driverstandings\
  \ dsg\nwhere  dsg.driverid = drv.driverid\nand    dsg.points > 0\norder  by dsg.points\
  \ desc\nfetch  first 2 rows only\n) dsg\nwhere  drv.driverid in ( 855, 854, 840,\
  \ 852, 848, 849)\norder  by driverid desc\n/\n```\n```\nDRIVERID DRIVER        \
  \         POINTS\n---------- ------------------ ----------\n855 Guanyu Zhou    \
  \             5\n855 Guanyu Zhou                 5\n854 Mick Schumacher        \
  \     4\n852 Yuki Tsunoda               32\n852 Yuki Tsunoda               20\n\
  849 Nicholas Latifi             7\n849 Nicholas Latifi             7\n848 Alexander\
  \ Albon           105\n848 Alexander Albon            93\n840 Lance Stroll     \
  \          75\n840 Lance Stroll               74\n```\n\n为了演示 `outer apply` 连接，我们向\
  \ drivers 表添加了一个额外的车手。\n\n```sql\ninsert into f1data.drivers\n( driverid\n, driverref\n\
  , driver_number\n, code\n, forename\n, surname\n)\nvalues\n( 0\n, 'alxntn'\n, 53\n\
  , 'ALX'\n, 'Alex'\n, 'Nuijten'\n)\n/\n```\n\n`outer apply` 连接是左外连接的一种变体，可以使用关联的内联视图。以下示例显示了与之前相同的结果，但包含了刚刚创建的、没有任何车手积分记录的额外车手（因为他水平没那么好）。\n\
  \n\n\n\n### 概要\n\n本章介绍了 ANSI 连接。将连接条件与过滤条件分开的写法，使得这类连接比传统的表连接方式更加优雅。开发者之间对于哪种方式更好的讨论会一直存在，这通常也取决于个人偏好。请根据你最熟悉的方式选择，但要了解\
  \ ANSI 连接的可能性，并知道在需要时如何解读和应用它们。一旦你习惯了 ANSI 连接，就再也不想回去了。\n\n有一点希望持不同意见的双方都能认同：**不要**在同一个查询中混合使用传统语法和\
  \ ANSI 连接。\n\n## 4. 发现模式\n\nOracle Database 12c 引入了行模式匹配功能，可以对数据集中的模式进行分析。`match_recognize`子句实现了这一点。在某种程度上，分析函数也可用于进行一些基本的模式匹配，但这有其局限性。过去在行序列中寻找模式的其他变通方法编写困难，往往难以理解且执行效率低下。`match_recognize`子句使用原生\
  \ SQL 解决了这些问题，允许在数据集中进行模式检测。\n\n### 寻找合同\n\n数据模型中没有关于车队与车手之间合同的信息。或许可以通过观察比赛来推断合同。当一名车手为某支车队比赛时，你可以假设他们之间存在合同。\n\
  \n现有的信息包括比赛、车手和车队（制造商）。这里做出的假设是：在一场比赛期间，车手受雇于制造商，合同从赛季第一场比赛开始，到赛季最后一场比赛结束。以下查询检索了历年关于基米·莱科宁的信息。\n\
  \n```\nselect rcs.year\n, ctr.name            as constructor\n, min (rcs.race_date)\
  \ as startrace\n, max (rcs.race_date) as endrace\nfrom f1data.results rsl\njoin\
  \ f1data.races rcs\non rsl.raceid = rcs.raceid\njoin f1data.constructors ctr\non\
  \ ctr.constructorid = rsl.constructorid\nwhere rsl.driverid = 8 -- Kimi Räikkönen\n\
  group by rcs.year\n,ctr.name\norder by rcs.year\n/\nYEAR CONSTRUCTO STARTRACE ENDRACE\n\
  ---------- ---------- --------- ---------\n2001 Sauber     04-MAR-01 14-OCT-01\n\
  2002 McLaren    03-MAR-02 13-OCT-02\n2003 McLaren    09-MAR-03 12-OCT-03\n2004 McLaren\
  \    07-MAR-04 24-OCT-04\n2005 McLaren    06-MAR-05 16-OCT-05\n2006 McLaren    12-MAR-06\
  \ 22-OCT-06\n2007 Ferrari    18-MAR-07 21-OCT-07\n2008 Ferrari    16-MAR-08 02-NOV-08\n\
  2009 Ferrari    29-MAR-09 01-NOV-09\n2012 Lotus F1   18-MAR-12 25-NOV-12\n2013 Lotus\
  \ F1   17-MAR-13 03-NOV-13\n2014 Ferrari    16-MAR-14 23-NOV-14\n2015 Ferrari  \
  \  15-MAR-15 29-NOV-15\n2016 Ferrari    20-MAR-16 27-NOV-16\n2017 Ferrari    26-MAR-17\
  \ 26-NOV-17\n2018 Ferrari    25-MAR-18 25-NOV-18\n2019 Alfa Romeo 17-MAR-19 01-DEC-19\n\
  2020 Alfa Romeo 05-JUL-20 13-DEC-20\n2021 Alfa Romeo 28-MAR-21 12-DEC-21\n```\n\n\
  这个结果集基于基米·莱科宁历年为不同制造商参赛的成绩。他的职业生涯始于索伯车队，随后是迈凯伦、法拉利、路特斯、再次法拉利，最后在阿尔法·罗密欧结束。\n\n目标是对连续的值进行分组，即当制造商在连续多个赛季中保持不变时，将它们折叠成一个单一的组。基米在迈凯伦比赛的那些年（2002\
  \ 年至 2006 年）将被折叠成一个组。\n\n前面的查询是模式匹配`match_recognize`子句的*输入*。在下面的例子中，它被命名为`races`，并用于子查询因子化子句（`with`子句）中。\n\
  \n我们想要的模式是基于*连续*年份中相同的制造商对记录进行分组。这意味着基米曾为法拉利效力的两个独立时期将被识别出来。\n\n在数据集中寻找连续模式时，排序顺序很重要。在这个例子中，按年份排序是最合理的。这在`match_recognize`子句中通过`order\
  \ by`来实现：\n\n```\norder by year\n```\n\n\n\n\n#### 对记录进行分类\n\n在寻找模式之前，必须对每一行数据进行分类。行的分类方式取决于具体需求。以下定义通过比较当前行的构造函数与组中\
  \ `first` （第一个）构造函数来进行分类。\n\n```\ndefine eq as constructor = first (constructor)\n\
  ```\n\n对于结果集中的第一行，组的开始就是当前行（索伯车队）。结果集中的第二行是下一个组的开始（迈凯伦车队）。第三行仍然属于迈凯伦车队组，依此类推。有了这个定义，就可以确定模式了。模式定义如下。\n\
  \n```\npattern (eq+)\n```\n\n这意味着一个或多个被分类为“eq”的记录属于同一个组。在模式子句中，可以使用正则表达式来指定需要在数据集中匹配的模式。表\
  \ 4-1 概述了最常见的正则表达式量词。\n\n表 4-1\n正则表达式量词\n\n| 类型 | 描述 |\n| --- | --- |\n| `*` | 零个或多个\
  \ |\n| `+` | 一个或多个 |\n| `?` | 零个或一个 |\n| `{n}` | 恰好 n 个 |\n| `{n,}` | 至少 n 个 |\n\
  | `{,m}` | 最多 m 个 |\n| `{n, m}` | 介于 n 和 m 个之间 |\n| `&#124;` | 或；尝试此模式，否则尝试彼模式 |\n\
  \n下面的查询使用内置的 `match_number()` 函数来展示此数据集中的不同分组。\n\n```\nwith race_years as (\nselect\
  \ rcs.year\n, ctr.name as constructor\n, min (rcs.race_date) as startrace\n, max\
  \ (rcs.race_date) as endrace\nfrom   f1data.results rsl\njoin   f1data.races rcs\n\
  on   rsl.raceid = rcs.raceid\njoin   f1data.constructors ctr\non   ctr.constructorid\
  \ = rsl.constructorid\nwhere  rsl.driverid = 8 -- 基米·莱科宁\ngroup  by rcs.year\n,\
  \ ctr.name\n)\nselect rce.mnr\n, rce.constructor\n, rce.startrace\n, rce.endrace\n\
  from   race_years\nmatch_recognize (\norder by year\nmeasures\nmatch_number() as\
  \ mnr\nall rows per match\npattern (eq+)\ndefine eq as constructor = first (constructor)\n\
  ) rce\norder  by year\n/\nMNR CONSTRUCTOR               STARTRACE ENDRACE\n----------\
  \ ------------------------- --------- ---------\n1 Sauber                    04-MAR-01\
  \ 14-OCT-01\n2 McLaren                   03-MAR-02 13-OCT-02\n2 McLaren        \
  \           09-MAR-03 12-OCT-03\n2 McLaren                   07-MAR-04 24-OCT-04\n\
  2 McLaren                   06-MAR-05 16-OCT-05\n2 McLaren                   12-MAR-06\
  \ 22-OCT-06\n3 Ferrari                   18-MAR-07 21-OCT-07\n3 Ferrari        \
  \           16-MAR-08 02-NOV-08\n3 Ferrari                   29-MAR-09 01-NOV-09\n\
  4 Lotus F1                  18-MAR-12 25-NOV-12\n4 Lotus F1                  17-MAR-13\
  \ 03-NOV-13\n5 Ferrari                   16-MAR-14 23-NOV-14\n5 Ferrari        \
  \           15-MAR-15 29-NOV-15\n5 Ferrari                   20-MAR-16 27-NOV-16\n\
  5 Ferrari                   26-MAR-17 26-NOV-17\n5 Ferrari                   25-MAR-18\
  \ 25-NOV-18\n6 Alfa Romeo                17-MAR-19 01-DEC-19\n6 Alfa Romeo     \
  \           05-JUL-20 13-DEC-20\n6 Alfa Romeo                28-MAR-21 12-DEC-21\n\
  ```\n\n如结果所示，`MNR` 列显示了 `match_number()` 以识别不同的分组。这是对找到的匹配项进行的连续编号。在前面的查询中，显示了所有行。`all\
  \ rows per match` 子句返回所有行，因此很容易识别哪些记录被分在了一组。`all rows per match` 子句还确保返回输入数据集的所有列，以及\
  \ `measures` 子句中列出的所有内容。\n\n##### 表别名\n\n表别名放在 `match_recognize` 子句的最终括号之后。\n\n\
  现在已经清楚哪些记录应该归为一组，可以修改查询以仅显示 `one row per match` （每个匹配一行）。度量值是在查询其他部分可用的表达式。以下是一些值得关注的度量值。\n\
  \n*   组的构造函数：为此，使用了 `first (constructor)` 表达式。在这种情况下，也可以使用 `last (constructor)`，因为组内的构造函数保持不变。\n\
  *   与该构造函数合同的第一年：此度量值的表达式是 `first (startrace)`。\n*   与该构造函数合同的最后一年：此度量值的表达式是 `last\
  \ (endrace)`。\n\n```\n    with race_years as (\n    select rcs.year\n    , ctr.name\
  \ as constructor\n    , min (rcs.race_date) as startrace\n    , max (rcs.race_date)\
  \ as endrace\n    from   f1data.results rsl\n    join   f1data.races rcs\n    on\
  \   rsl.raceid = rcs.raceid\n    join   f1data.constructors ctr\n    on   ctr.constructorid\
  \ = rsl.constructorid\n    where  rsl.driverid = 8\n    group  by rcs.year\n   \
  \ , ctr.name\n    )\n    select rce.constructor\n    , rce.strt\n    , rce.stp\n\
  \    from   race_years\n    match_recognize (\n    order by year\n    measures\n\
  \    first (constructor) as constructor\n    , extract (year from first (startrace))\
  \ as strt\n    , extract (year from last (endrace)) as stp\n    one row per match\n\
  \    pattern (eq+)\n    define eq as constructor = first (constructor)\n    ) rce\n\
  \    order by rce.strt\n    /\n    CONSTRUCTOR                     STRT        STP\n\
  \    ------------------------- ---------- ----------\n    Sauber               \
  \           2001       2001\n    McLaren                         2002       2006\n\
  \    Ferrari                         2007       2009\n    Lotus F1             \
  \           2012       2013\n    Ferrari                         2014       2018\n\
  \    Alfa Romeo                      2019       2021\n    6 rows selected.\n   \
  \ ```\n\n使用了 `extract` 函数来获取年份。它只显示年份而非具体日期。\n\n##### 度量值子句的别名设置\n\n度量值子句中的表达式必须始终设置别名，即使该表达式是输入表的列也是如此。\n\
  \n\n### 逻辑组\n\n与分析函数类似，也可以在 `match_recognize` 子句中对输入数据集进行分区。这样，模式就会应用于每个逻辑数据集组。下一个示例以与之前相同的方式确定\
  \ 2021 年之后的合同，但这次涵盖所有车手。子查询因子化子句被修改为包含车手的姓名。接着，在 `match_recognize` 子句中添加了下面的分区子句。\n\
  \n```\npartition by driver\n```\n\n这将为每位车手创建一个逻辑组，并应用相同的模式检测。以下是确定自 2021 年以来每位车手合同的完整查询。\n\
  \n```\nwith race_years as (\nselect drv.forename || ' ' || drv.surname as driver\n\
  , rcs.year\n, ctr.name as constructor\n,min (rcs.race_date) as startrace\n,max (rcs.race_date)\
  \ as endrace\nfrom   f1data.results rsl\njoin   f1data.races rcs\non   rsl.raceid\
  \ = rcs.raceid\njoin   f1data.constructors ctr\non   ctr.constructorid = rsl.constructorid\n\
  join   f1data.drivers drv\non   drv.driverid = rsl.driverid\nwhere  rcs.year >=\
  \ 2021\ngroup  by rcs.year\n,ctr.name\n,drv.forename\n,drv.surname\n)\nselect rce.driver\n\
  , rce.constructor\n, rce.strt\n, rce.stp\nfrom   race_years\nmatch_recognize (\n\
  partition by driver\norder by year\nmeasures\nfirst (constructor) as constructor\n\
  , extract (year from first (startrace)) as strt\n, extract (year from last (endrace))\
  \ as stp\n, match_number() as mnr\none row per match\npattern (eq+)\ndefine eq as\
  \ constructor = first (constructor)\n) rce\norder  by rce.constructor\n, rce.strt\n\
  /\nDRIVER               CONSTRUCTOR             STRT        STP\n--------------------\
  \ ----------------- ---------- ----------\nRobert Kubica        Alfa Romeo     \
  \         2021       2021\nAntonio Giovinazzi   Alfa Romeo              2021   \
  \    2021\nKimi Räikkönen       Alfa Romeo              2021       2021\nValtteri\
  \ Bottas      Alfa Romeo              2022       2022\nGuanyu Zhou          Alfa\
  \ Romeo              2022       2022\nYuki Tsunoda         AlphaTauri          \
  \    2021       2022\nPierre Gasly         AlphaTauri              2021       2022\n\
  Fernando Alonso      Alpine F1 Team          2021       2022\nEsteban Ocon     \
  \    Alpine F1 Team          2021       2022\nSebastian Vettel     Aston Martin\
  \            2021       2022\nLance Stroll         Aston Martin            2021\
  \       2022\nNico Hülkenberg      Aston Martin            2022       2022\nCharles\
  \ Leclerc      Ferrari                 2021       2022\nCarlos Sainz         Ferrari\
  \                 2021       2022\nMick Schumacher      Haas F1 Team           \
  \ 2021       2022\nNikita Mazepin       Haas F1 Team            2021       2021\n\
  Kevin Magnussen      Haas F1 Team            2022       2022\nLando Norris     \
  \    McLaren                 2021       2022\nDaniel Ricciardo     McLaren     \
  \            2021       2022\nValtteri Bottas      Mercedes                2021\
  \       2021\nLewis Hamilton       Mercedes                2021       2022\nGeorge\
  \ Russell       Mercedes                2022       2022\nSergio Pérez         Red\
  \ Bull                2021       2022\nMax Verstappen       Red Bull           \
  \     2021       2022\nGeorge Russell       Williams                2021       2021\n\
  Nicholas Latifi      Williams                2021       2022\nAlexander Albon  \
  \    Williams                2022       2022\nNyck de Vries        Williams    \
  \            2022       2022\n```\n\n### 末圈更快\n\n每场比赛的耗时记录在 `LAPTIMES` 表中。你常听说比赛末圈的单圈时间更短，因为赛车油量更少，车重更轻。然而，轮胎衰变会导致单圈耗时更长。让我们来验证一下这个理论，看看实际情况如何。\n\
  \n首先，你需要判断一圈是比前一圈慢还是快。以下是“更快”和“更慢”的定义。\n\n```\nfaster as laptime  prev (laptime)\n\
  ```\n\n该定义使用 `prev()` 函数将当前单圈时间与前一圈时间进行比较。\n\n在本例中，所有记录都需要被标记为 `FASTER` 或 `SLOWER`，因此使用了\
  \ `all rows per match`。使用的模式如下。\n\n```\npattern ( faster* slower* )\n```\n\n该模式解读为：零个或多个被标记为\
  \ `FASTER` 的记录，后跟零个或多个被标记为 `SLOWER` 的记录。将所有部分组合在一起，得到以下查询。\n\n```\nwith cota as\
  \ (\nselect ltm.lap\n, numtodsinterval( ltm.milliseconds / 1000\n, 'second') as\
  \ laptime\nfrom   f1data.laptimes ltm\nwhere  ltm.raceid = 1093  -- Circuit of the\
  \ Americas\nand    ltm.driverid = 830 -- Max Verstappen\n)\nselect *\nfrom   cota\n\
  match_recognize (\norder by lap\nmeasures\nmatch_number() as mnr\n,classifier()\
  \ as cls\nall rows per match\npattern (faster* slower* )\ndefine\nfaster as laptime\
  \  prev (laptime)\n)\norder  by lap\n/\nLAP        MNR CLS     LAPTIME\n----------\
  \ ---------- ------- -------------------\n1          1         +00 00:01:41.343000\n\
  2          2 SLOWER  +00 00:01:41.696000\n3          2 SLOWER  +00 00:01:41.893000\n\
  4          2 SLOWER  +00 00:01:42.581000\n5          2 SLOWER  +00 00:01:42.870000\n\
  6          3 FASTER  +00 00:01:42.826000\n7          3 FASTER  +00 00:01:42.314000\n\
  8          3 SLOWER  +00 00:01:42.830000\n9          4 FASTER  +00 00:01:42.412000\n\
  10          4 SLOWER  +00 00:01:42.492000\n>\n37         13 FASTER  +00 00:01:39.541000\n\
  38         13 SLOWER  +00 00:01:40.211000\n39         13 SLOWER  +00 00:01:40.337000\n\
  40         14 FASTER  +00 00:01:40.108000\n41         14 FASTER  +00 00:01:40.077000\n\
  42         14 FASTER  +00 00:01:40.010000\n43         14 FASTER  +00 00:01:39.776000\n\
  44         14 SLOWER  +00 00:01:40.410000\n45         15 FASTER  +00 00:01:39.986000\n\
  46         15 FASTER  +00 00:01:39.945000\n47         15 SLOWER  +00 00:01:40.058000\n\
  48         15 SLOWER  +00 00:01:40.271000\n49         16 FASTER  +00 00:01:40.230000\n\
  50         16 SLOWER  +00 00:01:40.830000\n51         17 FASTER  +00 00:01:40.152000\n\
  52         17 SLOWER  +00 00:01:40.431000\n53         18 FASTER  +00 00:01:40.297000\n\
  54         18 FASTER  +00 00:01:40.168000\n55         18 SLOWER  +00 00:01:40.674000\n\
  56         19 FASTER  +00 00:01:40.654000\n```\n\n第一圈没有分类，因为没有前一圈可供比较。第二圈到第五圈被归类为更慢，这可以从\
  \ `laptime` 列的数据中推断出来。最后，第六圈是第一次单圈时间比前一圈快。\n\n**注意**\n\n在上面的结果集中，还有一个 `MNR` 列，显示匹配编号。具有相同\
  \ `match_number` 的记录属于同一个匹配模式。第五圈是匹配该模式的最后一圈。第六圈被分类为更快的记录，这使模式重新开始。\n\n现在，也可以分析是否存在连续多圈都比前一圈快的情况。当连续超过两圈更快时，这些圈应该出现在输出中。模式如下。\n\
  \n```\nfaster{2,}\n```\n\n该模式解读为：至少两条被分类为更快的记录。\n\n\n### 分析单圈用时模式\n\n```sql\nwith\
  \ cota as (\nselect ltm.lap\n, numtodsinterval( ltm.milliseconds / 1000\n, 'second')\
  \ as laptime\nfrom   f1data.laptimes ltm\nwhere  ltm.raceid = 1093  -- 美洲赛道\nand\
  \    ltm.driverid = 830 -- 马克斯·维斯塔潘\n)\nselect first_lap\n, last_lap\n, lap_count\n\
  from   cota\nmatch_recognize (\norder by lap\nmeasures\nfirst (lap) as first_lap\n\
  , last (lap)  as last_lap\n, count(*)    as lap_count\none row per match\npattern\
  \ ( faster{2,} )\ndefine\nfaster as laptime < prev (laptime)\n)\n/\nFIRST_LAP  \
  \ LAST_LAP  LAP_COUNT\n---------- ---------- ----------\n6          7          2\n\
  15         16          2\n25         26          2\n40         43         4\n45\
  \         46         2\n53         54         2\n已选择 6 行。\n```\n\n从第 40 圈开始，每一圈都比前一圈更快，并且持续了四圈。输出中也包含了更快圈数的计数。\n\
  \n稍微放宽模式条件，比如允许在一系列快圈中出现一个慢圈。模式如下：\n\n```\nfaster{2,} slower {1} faster{1,}\n```\n\
  \n该模式的含义是：两圈（或更多）更快的圈，接着一圈（且仅一圈）更慢的圈，再接着一圈（或更多）更快的圈。\n\n使用此模式并定义了什么是慢圈之后，结果如下：\n\
  \n```\nFIRST_LAP   LAST_LAP  LAP_COUNT\n---------- ---------- ----------\n6    \
  \      9          4\n40         46         7\n53         56         4\n```\n\n基于这些结果，尽管存在轮胎磨损，但在比赛末段圈速变快是非常可能的。\n\
  \n### 胜场分析\n\n`CONSTRUCTORSTANDINGS` 表包含了每场比赛、车队和记录的累计胜场数。以下是 2022 赛季前五场比赛中法拉利和红牛车队的输出结果。\n\
  \n```sql\nselect ctr.name\n, cts.wins\n, rcs.name as race_name\n, rcs.round\n, rcs.year\n\
  from   f1data.constructorstandings cts\njoin   f1data.constructors ctr\non   ctr.constructorid\
  \ = cts.constructorid\njoin   f1data.races rcs\non   rcs.raceid = cts.raceid\nwhere\
  \  rcs.year = 2022\nand    ctr.constructorid in (6,9)\nand    rcs.round <= 5\norder\
  \  by ctr.name\n, rcs.round\n/\nNAME     WINS RACE_NAME                 ROUND  \
  \ YEAR\n-------- ---- ------------------------- ----- ------\n法拉利       1 巴林大奖赛\
  \                    1   2022\n法拉利       1 沙特阿拉伯大奖赛              2   2022\n法拉利 \
  \      2 澳大利亚大奖赛                3   2022\n法拉利       2 艾米利亚-罗马涅大奖赛          4   2022\n\
  法拉利       2 迈阿密大奖赛                  5   2022\n红牛         0 巴林大奖赛               \
  \     1   2022\n红牛         1 沙特阿拉伯大奖赛              2   2022\n红牛         1 澳大利亚大奖赛\
  \                3   2022\n红牛         2 艾米利亚-罗马涅大奖赛          4   2022\n红牛      \
  \   3 迈阿密大奖赛                  5   2022\n```\n\n`wins` 列是累计胜场数。法拉利赢得了第一轮，但输掉了第二轮，所以胜场数保持为\
  \ 1。他们赢得了第三轮，所以胜场数增加到二，以此类推。\n\n基于这些数据，可以做出如下 *获胜* 的定义：\n\n```\nwinning as (wins\
  \ > prev (wins))\n```\n\n当当前胜场数大于前一次胜场数时，即认为该轮获胜。类似地，*未获胜* 的定义如下：\n\n```\nnot_winning\
  \ as (wins = prev (wins))\n```\n\n当当前记录的胜场数与前一次相比保持不变时，意味着其他车队赢得了该轮（即当前记录对应的车队未获胜）。\n\
  \n以下是用于对数据集中的每条记录进行分类的模式：\n\n```\n( winning | not_winning )\n```\n\n这意味着一条记录要么被分类为\
  \ winning，要么为 not winning。让我们测试一下。\n\n```sql\nwith ctrs as (\nselect ctr.name\n\
  , cts.wins\n, rcs.name as race_name\n, rcs.round\n, rcs.year\nfrom   f1data.constructorstandings\
  \ cts\njoin   f1data.constructors ctr\non   ctr.constructorid = cts.constructorid\n\
  join   f1data.races rcs\non   rcs.raceid = cts.raceid\nwhere  rcs.year = 2022\n\
  and    ctr.constructorid in (6,9)\nand    rcs.round <= 5\n)\nselect round\n, race_name\n\
  , name\n, cls\n, wins\nfrom   ctrs\nmatch_recognize (\npartition by name, year\n\
  order by round\nmeasures\nclassifier () as cls\nall rows per match\npattern ( winning\
  \ | not_winning )\ndefine\nwinning as (wins > prev (wins))\n, not_winning as (wins\
  \ = prev (wins))\n)\norder  by year, round, name\n/\nROUND RACE_NAME           \
  \      NAME     CLS          WINS\n----- ------------------------- -------- ------------\
  \ ----\n2 沙特阿拉伯大奖赛              法拉利   NOT_WINNING     1\n2 沙特阿拉伯大奖赛            \
  \  红牛     WINNING         1\n3 澳大利亚大奖赛                法拉利   WINNING         2\n\
  3 澳大利亚大奖赛                红牛     NOT_WINNING     1\n4 艾米利亚-罗马涅大奖赛          法拉利  \
  \ NOT_WINNING     2\n4 艾米利亚-罗马涅大奖赛          红牛     WINNING         2\n5 迈阿密大奖赛 \
  \                 法拉利   NOT_WINNING     2\n5 迈阿密大奖赛                  红牛     WINNING\
  \         3\n```\n\n现在结果集中只有八条记录。第一轮的数据缺失了。这条记录无法与前一条进行比较，因此还没有分类。\n\n#### 未定义的分类\n\
  \n解决第一轮缺失问题的一个方法是向模式中添加一个额外的分类。\n\n```\npattern ( winning | not_winning | unknown\
  \ )\n```\n\n这需要在 `define` 子句中添加一个额外的定义，但实际上并不需要。当模式遇到未定义的定义时，它会被假定为真。由于第一轮不匹配任何其他已定义的分类，它会与“始终为真”的定义匹配，该定义被命名为\
  \ unknown。结果集中最前面的记录将变为：\n\n```\nROUND RACE_NAME                 NAME     CLS  \
  \        WINS\n----- ------------------------- -------- ------------ ----\n1 巴林大奖赛\
  \                    法拉利   UNKNOWN         1\n1 巴林大奖赛                    红牛    \
  \ UNKNOWN         0\n2 沙特阿拉伯大奖赛              法拉利   NOT_WINNING     1\n2 沙特阿拉伯大奖赛\
  \              红牛     WINNING         1\n```\n\n这解决了记录缺失的问题，但却是不正确的。法拉利赢得了赛季第一场比赛，但它被标记为\
  \ UNKNOWN。红牛也是如此；已知他们没有赢得第一场比赛。也许会想把 winning 的定义改为：\n\n```\nwinning as (wins > prev\
  \ (wins) or wins = 1)\n```\n\n但这也不正确；它会正确标记法拉利的第一场比赛，但法拉利的第二场比赛也会被标记为 WINNING（因为胜场数保持为\
  \ 1）。应用这个修改后的定义将导致以下结果：\n\n```\nROUND RACE_NAME                 NAME     CLS   \
  \       WINS\n----- ------------------------- -------- ------------ ----\n1 巴林大奖赛\
  \                    法拉利   WINNING         1\n1 巴林大奖赛                    红牛    \
  \ UNKNOWN         0\n2 沙特阿拉伯大奖赛              法拉利   WINNING         1\n2 沙特阿拉伯大奖赛\
  \              红牛     WINNING         1\n```\n\n解决方案是扩展 `winning` 的定义，如下所示：\n\n\
  ```\nwinning as (wins > prev (wins)\nor (wins = 1 and round = 1))\n```\n\n这专门检查是否赢得了当年的第一轮比赛。`match_recognize`\
  \ 子句变为：\n\n```sql\nmatch_recognize (\npartition by name\n,year\norder by round\n\
  measures\nclassifier () as cls\nall rows per match\npattern ( winning | not_winning\
  \ )\ndefine\nwinning as (wins > prev (wins)\nor (wins = 1 and round = 1))\n, not_winning\
  \ as (wins = prev (wins)\nor  wins = 0)\n)\n```\n\n结果如下：\n\n```\nROUND RACE_NAME\
  \                 NAME     CLS          WINS\n----- ------------------------- --------\
  \ ------------ ----\n1 巴林大奖赛                    法拉利   WINNING         1\n1 巴林大奖赛\
  \                    红牛     NOT_WINNING     0\n2 沙特阿拉伯大奖赛              法拉利   NOT_WINNING\
  \     1\n2 沙特阿拉伯大奖赛              红牛     WINNING         1\n3 澳大利亚大奖赛           \
  \     法拉利   WINNING         2\n3 澳大利亚大奖赛                红牛     NOT_WINNING     1\n\
  4 艾米利亚-罗马涅大奖赛          法拉利   NOT_WINNING     2\n4 艾米利亚-罗马涅大奖赛          红牛     WINNING\
  \         2\n5 迈阿密大奖赛                  法拉利   NOT_WINNING     2\n5 迈阿密大奖赛       \
  \           红牛     WINNING         3\n```\n\n现在每条记录都有了正确的分类：WINNING 或 NOT_WINNING。\n\
  \n\n### 最长连胜纪录\n\n本书撰写时，2022 赛季尚未结束，仅法拉利和红牛车队赢得过分站赛。但哪支车队拥有最多的连续胜利？让我们一探究竟。\n\n\
  上一节通过以下`define`子句将比赛标识为胜利。\n\n```\nwinning as (wins > prev (wins)\nor (wins = 1\
  \ and round = 1))\n```\n\n基于此定义，可应用以下模式查找至少一条符合此分类的记录。\n\n```\n( winning+ )\n```\n\
  \n以下是查找车队最长连胜纪录的完整查询。\n\n```\nwith ctr as (\nselect ctr.name\n, cts.wins\n, rcs.name\
  \ as race_name\n, rcs.round\n, rcs.year\nfrom   f1data.constructorstandings cts\n\
  join   f1data.constructors ctr\non   ctr.constructorid = cts.constructorid\njoin\
  \   f1data.races rcs\non   rcs.raceid = cts.raceid\nwhere  rcs.year = 2022\n)\n\
  select *\nfrom   ctr\nmatch_recognize (\npartition by name\norder by round\nmeasures\n\
  classifier () as cls\n, first (round) as first_win\n, last (round)  as last_win\n\
  , count(*)      as race_count\none row per match\npattern ( winning+ )\ndefine\n\
  winning as (wins > prev (wins)\nor (wins = 1 and round = 1))\n)\norder  by race_count\
  \ desc\n/\nNAME     CLS           FIRST_WIN   LAST_WIN RACE_COUNT\n-------- ------------\
  \ ---------- ---------- ----------\nRed Bull WINNING              12         19\
  \          8\nRed Bull WINNING               4          9          6\nFerrari  WINNING\
  \              10         11          2\nRed Bull WINNING               2      \
  \    2          1\nFerrari  WINNING               1          1          1\nFerrari\
  \  WINNING               3          3          1\n6 rows selected.\n```\n\n红牛车队取得了八连胜：从第\
  \ 12 轮到第 19 轮。\n\n### 进站维修与危险状况\n\n分析单圈用时也能洞察比赛中何时发生进站维修。当车手进站维修时，下一圈（出场圈）的用时会比赛事平均用时更长。类似地，可以检测到危险状况。当出现黄旗情况时，赛车需要减速，导致单圈用时增加。若车手在危险状况下进站（这通常是一项好策略），这些情况则无法被检测到。\n\
  \n在使用模式匹配之前，必须对输入数据进行预处理。除了车手、圈数和单圈用时外，还需要（每位车手的）平均单圈用时。为此，使用了`avg`分析函数，如下例所示。\n\
  \n```\nselect drv.driverid\n, drv.forename||' '||drv.surname as driver\n, ltm.lap\n\
  , ltm.milliseconds\n, avg (ltm.milliseconds)\nover (partition by drv.driverid\n\
  ) as avg_laptime\nfrom   f1data.laptimes ltm\njoin   f1data.drivers drv\non   drv.driverid\
  \ = ltm.driverid\nwhere  ltm.raceid = 1093 -- 美洲赛道\norder  by drv.driverid\n, ltm.lap\n\
  /\nDRIVERID DRIVER                  LAP MILLISECONDS AVG_LAPTIME\n---------- ----------------\
  \ ---------- ------------ -----------\n1 Lewis Hamilton            1       102630\
  \  109584.107\n1 Lewis Hamilton            2       102325  109584.107\n1 Lewis Hamilton\
  \            3       102175  109584.107\n1 Lewis Hamilton            4       102798\
  \  109584.107\n1 Lewis Hamilton            5       103196  109584.107\n1 Lewis Hamilton\
  \            6       102576  109584.107\n1 Lewis Hamilton            7       102702\
  \  109584.107\n1 Lewis Hamilton            8       103212  109584.107\n>\n855 Guanyu\
  \ Zhou              52       103373  110854.482\n855 Guanyu Zhou              53\
  \       105200  110854.482\n855 Guanyu Zhou              54       104102  110854.482\n\
  855 Guanyu Zhou              55       103812  110854.482\n855 Guanyu Zhou      \
  \        56       103881  110854.482\n```\n\n根据以下定义，可以定义`faster_than_avg`和`slow_lap`。\n\
  \n```\nfaster_than_avg as milliseconds  avg_laptime\n```\n\n定义完成后，最简单的方法是从显示所有记录开始，并使用以下模式进行分类。\n\
  \n```\nfaster_than_avg* slow_lap*\n```\n\n这导出了以下的`match_recognize`子句。\n\n```\nmatch_recognize\
  \ (\npartition by driverid\norder by lap\nmeasures\nclassifier() as what\nall rows\
  \ per match\npattern (\nfaster_than_avg* slow_lap*\n)\ndefine\nfaster_than_avg as\
  \ milliseconds  avg_laptime\n)\n```\n\n仔细观察周冠宇的前 26 圈并据此分类每一圈，得到以下结果。\n\n```\nDRIVER\
  \                  LAP MILLISECONDS WHAT\n---------------- ---------- ------------\
  \ ----------------\nGuanyu Zhou               1       112824 SLOW_LAP\nGuanyu Zhou\
  \               2       105535 FASTER_THAN_AVG\nGuanyu Zhou               3    \
  \   104538 FASTER_THAN_AVG\nGuanyu Zhou               4       104511 FASTER_THAN_AVG\n\
  Guanyu Zhou               5       104904 FASTER_THAN_AVG\nGuanyu Zhou          \
  \     6       104476 FASTER_THAN_AVG\nGuanyu Zhou               7       104454 FASTER_THAN_AVG\n\
  Guanyu Zhou               8       105360 FASTER_THAN_AVG\nGuanyu Zhou          \
  \     9       105956 FASTER_THAN_AVG\nGuanyu Zhou              10       127583 SLOW_LAP\n\
  Guanyu Zhou              11       103895 FASTER_THAN_AVG\nGuanyu Zhou          \
  \    12       104152 FASTER_THAN_AVG\nGuanyu Zhou              13       104739 FASTER_THAN_AVG\n\
  Guanyu Zhou              14       103824 FASTER_THAN_AVG\nGuanyu Zhou          \
  \    15       103741 FASTER_THAN_AVG\nGuanyu Zhou              16       104030 FASTER_THAN_AVG\n\
  Guanyu Zhou              17       104266 FASTER_THAN_AVG\nGuanyu Zhou          \
  \    18       134425 SLOW_LAP\nGuanyu Zhou              19       138587 SLOW_LAP\n\
  Guanyu Zhou              20       144384 SLOW_LAP\nGuanyu Zhou              21 \
  \      142312 SLOW_LAP\nGuanyu Zhou              22       133593 SLOW_LAP\nGuanyu\
  \ Zhou              23       169446 SLOW_LAP\nGuanyu Zhou              24      \
  \ 184224 SLOW_LAP\nGuanyu Zhou              25       139116 SLOW_LAP\nGuanyu Zhou\
  \              26       105555 FASTER_THAN_AVG\n```\n\n从输出可见，第一圈比他平均单圈用时慢。这不太可能由进站维修或危险状况导致。第\
  \ 10 圈是慢圈，可能是进站维修所致。同样清晰可见的是，在第 18 圈到第 25 圈期间发生了某些状况，因为这些圈的用时明显慢于其他圈。\n\n如前所述，进站维修后的下一圈用时更长。要确定进入维修通道的圈数，必须减去一圈以获得正确的圈号。这可以在最终查询中修正。\n\
  \n基于这些假设，进站维修后单圈用时会增加一圈，而发生危险状况时则会增加多圈。可以推导出以下模式。\n\n```\nfaster_than_avg{1} slow_lap{1,}\
  \ faster_than_avg{1}\n```\n\n该模式表示：仅一圈（单圈用时）快于平均值，后跟一圈或多圈慢圈，再后跟一圈（且仅一圈）快于平均值的圈。这排除了当第一圈是慢圈的情况，例如周冠宇的情况。\n\
  \n以下是检测（可能的）进站维修和危险状况的完整查询。\n\n"
- '# 4. 使用 MATCH_RECOGNIZE 进行行模式匹配


  #### SQL 查询示例


  ```sql

  with laps

  as (

  select drv.driverid

  , drv.forename||'' ''||drv.surname as driver

  , ltm.lap

  , ltm.milliseconds

  , avg (ltm.milliseconds)

  over (partition by drv.driverid) as avg_laptime

  from   f1data.laptimes ltm

  join   f1data.drivers drv

  on   drv.driverid = ltm.driverid

  where  ltm.raceid = 1093 -- 美洲赛道

  )

  select driver

  , case lap_count

  when 1

  then ''可能是在第 ''||to_char (firstlap -1)||'' 圈进站''

  else

  ''** 从第 ''

  ||to_char (firstlap - 1)

  ||'' 圈开始的危险阶段，持续 ''

  ||to_char (lap_count)

  ||'' 圈''

  ||''，结束于第 ''||to_char (lastlap)||'' 圈''

  end as what_happened

  from   laps

  match_recognize (

  partition by driverid

  order by lap

  measures

  first (slow_lap.lap) as firstlap

  , last  (slow_lap.lap) as lastlap

  , count (slow_lap.lap) as lap_count

  , driver               as driver

  one row per match

  pattern (

  faster_than_avg{1} slow_lap{1,} faster_than_avg{1}

  )

  define

  faster_than_avg as milliseconds  avg_laptime

  )

  /

  ```


  #### 查询结果


  ```

  DRIVER           WHAT_HAPPENED

  ---------------- ----------------------------------------

  Lewis Hamilton   可能是在第 12 圈进站

  Lewis Hamilton   ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  Lewis Hamilton   可能是在第 34 圈进站

  Fernando Alonso  ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  Sebastian Vettel ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  Sebastian Vettel 可能是在第 41 圈进站

  Sergio Pérez     可能是在第 14 圈进站

  Sergio Pérez     ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  Sergio Pérez     可能是在第 38 圈进站

  >

  Yuki Tsunoda     可能是在第 10 圈进站

  Yuki Tsunoda     ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  Yuki Tsunoda     可能是在第 33 圈进站

  Mick Schumacher  ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  Mick Schumacher  可能是在第 33 圈进站

  Guanyu Zhou      可能是在第 9 圈进站

  Guanyu Zhou      ** 从第 17 圈开始的危险阶段，持续 8 圈，结束于第 25 圈

  已选择 43 行。

  ```


  ### 总结


  在数据集中搜索特定模式对业务可能非常有用。在引入 `match_recognize` 子句之前，在数据集中寻找模式是一项艰巨的任务。将行模式匹配功能靠近数据执行，使其运行非常高效。


  本章仅仅触及了 `match_recognize` 功能可能性的皮毛。行模式匹配还有许多其他用例，例如解决**装箱问题**。


  ## 5. 分页与集合操作


  使用 Oracle 数据库时，处理大型数据集相当常见。但并非所有数据都应该展示给数据库应用程序的用户。通常，仅前 50 条记录就足以供用户交互。本章探讨了一个典型的
  Top-N 查询，用于检索前 50 条记录。展示接下来的 50 条记录，或任何偏移量，是分页类查询的示例，这也是本章的重点。


  此外，本章还将探讨不同的集合操作符，用于获取多个数据集之间的差异和共同元素。在这方面，Oracle Database 21c 增加了更多功能，以更好地符合 ANSI
  标准。


  ### Top-N 与分页


  在 Oracle 中，获取较大集合的前几条记录，例如前 5 条，一直是可以实现的，但方法总是有点“笨拙”，而且并非总是像它本应那样直接。


  对于以下示例，使用如下定义创建了一个视图。


  ```sql

  create view all_driverstandings

  as

  select rcs.year

  , rcs.round

  , cct.name

  , drs.position

  , drv.driverid

  , drv.forename ||'' ''||drv.surname as driver

  , drs.points

  , drs.wins

  from   f1data.driverstandings drs

  join   f1data.drivers drv

  on   drv.driverid = drs.driverid

  join   f1data.races rcs

  on   rcs.raceid = drs.raceid

  join   f1data.circuits cct

  on   cct.circuitid = rcs.circuitid

  /

  ```


  `ALL_DRIVERSTANDINGS` 视图展示了按年份和场次划分的车手排名。该视图显示了超过 33,000 条记录，因为数据可追溯至 20 世纪 50 年代。


  以下是首次尝试，用于获取 2021 赛季且仅针对两位车手的该视图中的前五行。


  ```sql

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2021

  and    driverid in (830, 844) -- Leclerc, Verstappen

  and    rownum <= 5

  order  by round

  /

  ```


  ```

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1          2 Max Verstappen             18          0

  1          6 Charles Leclerc             8          0

  2          4 Charles Leclerc            20          0

  20          1 Max Verstappen          351.5          9

  20          6 Charles Leclerc           152          0

  ```


  如输出所示，结果集是不正确的。在前五行中，不应该包含第 20 圈的数据。这个查询的问题在于，`rownum` 伪列是在最终的排序操作*之前*确定的。当一行因符合过滤条件而被考虑输出时，`rownum`
  会为其分配一个值，从 1 开始。下一个符合过滤条件的行被分配值 2，依此类推。当 `rownum` 达到 5（在前面的查询中）时，不再选择更多记录。在此步骤之后，结果集才按照
  `order by` 子句指定的按场次排序。可以在执行计划中观察到此行为（仅显示相关部分）。


  ```sql

  select *

  from dbms_xplan.display_cursor(null, null, ''BASIC PREDICATE'')

  /

  ```


  ```

  PLAN_TABLE_OUTPUT


  | Id  | Operation                          | Name            |


  |   0 | SELECT STATEMENT                   |                 |

  |   1 |  SORT ORDER BY                     |                 |

  |*  2 |   COUNT STOPKEY                    |                 |

  >

  Predicate Information (identified by operation id):


  2 - filter(ROWNUM>

  ```


  过滤器在操作 ID 2 中应用（`rownum <= 5`）。结果数据集在步骤 1 中进行排序。


  要正确获取预期的输出，需要将排序后的数据集推入一个内联视图（或子查询因子化子句）中。


  ```sql

  select *

  from   (select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2021

  and    driverid in (830, 844) -- Leclerc, Verstappen

  order  by round

  )

  where  rownum <= 5

  /

  ```


  ```

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1          2 Max Verstappen             18          0

  1          6 Charles Leclerc             8          0

  2          4 Charles Leclerc            20          0

  2          2 Max Verstappen             43          1

  3          2 Max Verstappen             61          1

  ```


  现在优化器理解了意图，这反映在执行计划中（仅显示相关部分）。


  ```

  |   0 | SELECT STATEMENT                    |

  |*  1 |  COUNT STOPKEY                      |

  |   2 |   VIEW                              |

  |*  3 |    SORT ORDER BY STOPKEY            |

  >

  Predicate Information (identified by operation id):


  1 - filter(ROWNUM>

  ```



  #### 行限制子句


  自 Oracle Database 12c 起，这种 Top-N 查询被极大简化，并提供了额外的功能，例如通过行限制子句实现分页。


  以下查询将获取两位车手在本赛季的前五名成绩。


  ```

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    driverid in (830, 844) -- Leclerc, Verstappen

  order  by round

  fetch  first 5 rows only

  /

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1         19 Max Verstappen              0          0

  1          1 Charles Leclerc            26          1

  2          1 Charles Leclerc            45          1

  2          3 Max Verstappen             25          1

  3          1 Charles Leclerc            71          2

  ```


  查询的意图立即变得清晰：获取前五条记录。而“前五条”由查询中的排序子句决定。


  行限制子句可以容纳一个静态的、需要查询的固定行数，也可以是一个绑定变量。以下示例使用 SQLcl 声明了一个名为 `b` 的绑定变量并执行。


  ```

  var b number

  begin

  :b := 5;

  end;

  /

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    driverid in (830, 844) -- Leclerc, Verstappen

  order  by round

  fetch  first :b rows only

  /

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1         19 Max Verstappen              0          0

  1          1 Charles Leclerc            26          1

  2          1 Charles Leclerc            45          1

  2          3 Max Verstappen             25          1

  3          1 Charles Leclerc            71          2

  ```


  如请求所示，前面的查询返回了五行数据，但如果存在并列值怎么办？在这种情况下，你可能会认为查询应该返回六条记录，因为两位车手都参与了前三轮比赛。当排序依据的值不是确定的（本例中是
  `round`），最后一条记录是任意的。行限制子句也可以处理并列值，使用 `rows with ties` 子句代替 `rows only`。


  ```

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    driverid in (830, 844) -- Leclerc, Verstappen

  order  by round

  fetch  first 5 rows with ties

  /

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1         19 Max Verstappen              0          0

  1          1 Charles Leclerc            26          1

  2          1 Charles Leclerc            45          1

  2          3 Max Verstappen             25          1

  3          1 Charles Leclerc            71          2

  3          6 Max Verstappen             25          1

  ```


  除了通过行限制子句返回一个固定行数（静态或绑定变量），还可以返回总行数的百分比。以下示例返回百分之六的记录。本例中，总结果集有 38 条记录，百分之六是 2.28
  条记录。


  ```

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    driverid in (830, 844)

  order  by round

  fetch  first 6 percent rows only

  /

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1         19 Max Verstappen              0          0

  1          1 Charles Leclerc            26          1

  2          1 Charles Leclerc            45          1

  ```


  百分比会向上取整（后台使用了 `ceil` 函数），导致前面的结果显示三条记录。当然，百分比也可以与 `rows with ties` 结合使用。


  ```

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    driverid in (830, 844)

  order  by round

  fetch  first 6 percent rows with ties

  /

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1         19 Max Verstappen              0          0

  1          1 Charles Leclerc            26          1

  2          1 Charles Leclerc            45          1

  2          3 Max Verstappen             25          1

  ```



  ### 分页


  行限制子句还提供了用于分页类型查询的功能。除了显示前 x 行外，还可以跳过前 x 行并显示下一组记录。以下示例显示了一个 `offset` 子句，它跳过 2022
  年第一轮比赛中的前十行。


  ```sql

  select round

  , position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    round = 1

  order  by points desc

  offset 10 rows

  /

  ROU   POSITION DRIVER                 POINTS       WINS

  --- ---------- ------------------ ---------- ----------

  1         11 Mick Schumacher             0          0

  1         12 Lance Stroll                0          0

  1         13 Alexander Albon             0          0

  1         14 Daniel Ricciardo            0          0

  1         15 Lando Norris                0          0

  1         16 Nicholas Latifi             0          0

  1         17 Nico Hülkenberg             0          0

  1         18 Sergio Pérez                0          0

  1         20 Pierre Gasly                0          0

  1         19 Max Verstappen              0          0

  ```


  `offset` 子句仅限于 x 行；不能指定行的百分比。如果表达式计算结果为数值，则可以指定该表达式。


  对数据集进行分页的最常见方法是首先显示一组行（假设是五条记录），当导航到下一页时，跳过已经看过的前五行，显示接下来的五行。这可以使用 `offset` 子句和
  `fetch` 子句来实现。以下示例跳过前五行并返回接下来的五行。


  ```sql

  select position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    round = 1

  order  by position

  offset 5 rows

  fetch  next 5 rows only

  /

  POSITION DRIVER                 POINTS       WINS

  ---------- ------------------ ---------- ----------

  6 Valtteri Bottas             8          0

  7 Esteban Ocon                6          0

  8 Yuki Tsunoda                4          0

  9 Fernando Alonso             2          0

  10 Guanyu Zhou                 1          0

  ```


  对于分页，使用 `fetch next` 而不是 `fetch first`。在分页查询中将行数硬编码是没有意义的，很可能使用此查询的应用程序希望指定偏移量以及向用户显示多少行。以下查询使用
  SQLcl 中的绑定变量显示了获取接下来五条记录的分页查询。


  ```sql

  var offset number

  var next  number

  begin

  :offset := 10;

  :next := 5;

  end;

  /

  select position

  , driver

  , points

  , wins

  from   all_driverstandings

  where  year = 2022

  and    round = 1

  order  by position

  offset :offset rows

  fetch  next :next rows only

  /

  POSITION DRIVER                 POINTS       WINS

  ---------- ------------------ ---------- ----------

  11 Mick Schumacher             0          0

  12 Lance Stroll                0          0

  13 Alexander Albon             0          0

  14 Daniel Ricciardo            0          0

  15 Lando Norris                0          0

  ```


  使用此查询，当偏移量使用 0 时，也可以显示结果集中的前五行。


  ```sql

  begin

  :offset := 0;

  end;

  /

  >

  POSITION DRIVER                 POINTS       WINS

  ---------- ------------------ ---------- ----------

  1 Charles Leclerc            26          1

  2 Carlos Sainz               18          0

  3 Lewis Hamilton             15          0

  4 George Russell             12          0

  5 Kevin Magnussen            10          0

  ```


  根据所使用的查询，获取第十页可能比获取第一页更耗时。


  #### 底层机制


  在底层，行限制子句利用了分析函数，如 `row_number()` 或 `rank()`，当检查行限制部分中第一个查询的执行计划的谓词信息时可以观察到这一点（仅显示相关信息）。


  ```sql

  select *

  from dbms_xplan.display_cursor (null, null, ''BASIC PREDICATE'')

  /

  PLAN_TABLE_OUTPUT


  | Id  | Operation                          | Name            |


  |   0 | SELECT STATEMENT                   |                 |

  |*  1 |  VIEW                              |                 |

  |*  2 |   WINDOW SORT PUSHED RANK          |                 |

  Predicate Information (identified by operation id):


  1 - filter("from$_subquery$_002"."rowlimit_$$_rownumber"<=5)

  2 - filter(ROW_NUMBER() OVER ( ORDER BY "RCS"."ROUND")<=5)

  ```


  正如在谓词信息中所看到的，分析函数 `row_number()` 与原始查询中的排序结合使用。


  **注意**

  从查询中省略 `order by` 子句不会引发错误或给出警告。在查询中省略 `order by` 可能导致分析函数中的“order by null”可能不会给出预期的结果。


  ### 集合操作符


  让我们使用来自 `drivers` 表的两个数据子集来演示集合操作符的工作原理。首先，有一组名字是 Graham 的车手。


  ```sql

  create view grahams

  as

  select drv.driverid

  , drv.driverref

  , drv.forename

  , drv.surname

  , drv.nationality

  from   f1data.drivers drv

  where  drv.forename = ''Graham''

  /

  ```


  该视图显示以下结果集。


  ```sql

  DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

  -------- ------------------- ---------- ---------- --------------

  336 mcrae               Graham     McRae      New Zealander

  289 hill                Graham     Hill       British

  745 graham_whitehead    Graham     Whitehead  British

  ```


  其次，有一组姓氏是 Hill 的车手。


  ```sql

  create view hills

  as

  select drv.driverid

  , drv.driverref

  , drv.forename

  , drv.surname

  , drv.nationality

  from   f1data.drivers drv

  where  drv.surname = ''Hill''

  /

  ```


  该视图显示以下结果集。


  ```sql

  DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

  -------- ------------------- ---------- ---------- --------------

  71 damon_hill          Damon      Hill       British

  289 hill                Graham     Hill       British

  403 phil_hill           Phil       Hill       American

  ```


  这些视图基于同一个表，每个视图包含数据的一个子集。



  ## 联合 (Union)


  将之前创建的两个视图结合起来，可以使用 `union` 操作符。对于此操作符，两个集合必须具有相同的形状和形式；也就是说，每列的数据类型必须匹配或至少属于同一族。整数和浮点数可以混合匹配，但不能将
  `VARCHAR2` 与数字混合。


  将两个结果集联合起来会得到以下结果。


  ```sql

  select g.driverid

  , g.driverref

  , g.forename

  , g.surname

  , g.nationality

  from   grahams g

  union

  select h.driverid

  , h.driverref

  , h.forename

  , h.surname

  , h.nationality

  from   hills h

  /

  DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

  ---------- ---------------- ------ --------- -------------

  71 damon_hill       Damon  Hill      British

  289 hill             Graham Hill      British

  336 mcrae            Graham McRae     New Zealander

  403 phil_hill        Phil   Hill      American

  745 graham_whitehead Graham Whitehead British

  ```


  `union` 操作符不仅仅是连接两个结果集。它还会对它们进行排序，并从最终结果中删除重复的行。这种行为可以在前面查询的执行计划中观察到。


  ```sql

  select *

  from dbms_xplan.display_cursor(null, null, ''BASIC'')

  /

  PLAN_TABLE_OUTPUT


  | Id  | Operation                   | Name    |


  |   0 | SELECT STATEMENT            |         |

  |   1 |  SORT UNIQUE                |         |

  |   2 |   UNION-ALL                 |         |

  |*  3 |    TABLE ACCESS STORAGE FULL| DRIVERS |

  |*  4 |    TABLE ACCESS STORAGE FULL| DRIVERS |


  ```


  执行计划的步骤 1 中可见 `sort unique` 步骤，导致输出中有 5 条记录。`Graham Hill` 只出现一次，尽管他在两个视图中都存在。


  从 Oracle Database 21c 开始，这个联合操作符可以通过添加 `distinct` 来更明确地编写。


  ```sql

  union distinct

  ```


  工作原理保持不变；它增加了语法清晰度。


  当需要所有数据，无论是否存在重复时，使用 `union all` 操作符。这消除了执行计划中对 `sort unique` 步骤的需要。


  ```sql

  select g.driverid

  , g.driverref

  , g.forename

  , g.surname

  , g.nationality

  from   grahams g

  union all

  select h.driverid

  , h.driverref

  , h.forename

  , h.surname

  , h.nationality

  from   hills h

  /

  DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

  ---------- ---------------- ------ --------- -------------

  336 mcrae            Graham McRae     New Zealander

  289 hill             Graham Hill      British

  745 graham_whitehead Graham Whitehead British

  71 damon_hill       Damon  Hill      British

  289 hill             Graham Hill      British

  403 phil_hill        Phil   Hill      American

  ```


  正如你在最终结果中看到的，驾驶员 289 (`Graham Hill`) 出现了两次。在执行计划中，不再有 `sort unique`。


  ```sql

  | Id  | Operation                  | Name    |


  |   0 | SELECT STATEMENT           |         |

  |   1 |  UNION-ALL                 |         |

  |   2 |   TABLE ACCESS STORAGE FULL| DRIVERS |

  |   3 |   TABLE ACCESS STORAGE FULL| DRIVERS |


  ```


  ## 减去 (Minus) 与排除 (Except)


  添加以下视图以演示 `minus` 和 `minus all` 操作符的工作原理。


  ```sql

  create or replace view grahams_and_hills

  as

  select g.driverid

  , g.driverref

  , g.forename

  , g.surname

  , g.nationality

  from   grahams g

  union all

  select h.driverid

  , h.driverref

  , h.forename

  , h.surname

  , h.nationality

  from   hills h

  /

  ```


  此视图暴露以下数据。


  ```sql

  DRIVERID DRIVERREF        FORENA SURNAME   NATIONALITY

  ---------- ---------------- ------ --------- -------------

  336 mcrae            Graham McRae     New Zealander

  289 hill             Graham Hill      British

  745 graham_whitehead Graham Whitehead British

  71 damon_hill       Damon  Hill      British

  289 hill             Graham Hill      British

  403 phil_hill        Phil   Hill      American

  ```


  请注意，`Graham Hill` 在结果集中出现了两次。


  `minus` 操作符仅过滤出存在于第一个输入集合但不存在于第二个输入集合中的行。为了演示这个操作，让我们使用 `grahams_and_hills` 视图，并通过一个选择所有
  `British` 驾驶员的查询来使用 `minus` 操作符。


  ```sql

  select gh.driverid

  , gh.driverref

  , gh.forename

  , gh.surname

  , gh.nationality

  from grahams_and_hills gh

  minus

  select drv.driverid

  , drv.driverref

  , drv.forename

  , drv.surname

  , drv.nationality

  from   f1data.drivers drv

  where  drv.nationality = ''British''

  /

  DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

  -------- ------------------- ---------- ---------- --------------

  336 mcrae               Graham     McRae      New Zealander

  403 phil_hill           Phil       Hill       American

  ```


  如你所见，尽管 `Graham Hill`（一位 `British` 驾驶员）在第一个集合（`grahams_and_hills` 视图）中出现了两次，但他不再出现在最终结果集中。`Graham
  Hill` 的两次出现都从第一个结果集中移除了。


  从 Oracle Database 21c 开始，这个 `minus` 操作符可以通过添加 `distinct` 来更明确地编写。


  ```sql

  minus distinct

  ```


  工作原理保持不变；它增加了语法清晰度。


  自 Oracle Database 21c 起，`minus` 操作符也有一个 `all` 版本。如果将脚本改为使用 `minus all` 操作符，你会得到不同的结果。


  ```sql

  select gh.driverid

  , gh.driverref

  , gh.forename

  , gh.surname

  , gh.nationality

  from   grahams_and_hills gh

  minus all

  select drv.driverid

  , drv.driverref

  , drv.forename

  , drv.surname

  , drv.nationality

  from   f1data.drivers drv

  where  drv.nationality = ''British''

  /

  DRIVERID DRIVERREF           FORENAME   SURNAME    NATIONALITY

  -------- ------------------- ---------- ---------- --------------

  336 mcrae               Graham     McRae      New Zealander

  289 hill                Graham     Hill       British

  403 phil_hill           Phil       Hill       American

  ```


  在这种情况下，`Graham Hill` 确实出现在最终结果集中。这是因为他出现在第一个集合（`grahams_and_hills` 视图）中两次，但在第二个集合中只出现一次。该记录只被移除了一次，而不是所有出现都被移除。


  还实现了 `except` 操作符以符合 ANSI 标准。`except` 的工作原理类似于 `minus`，包括所有变体。


  ```sql

  except

  except distinct

  except all

  ```




  ## 6. 条件编译


  条件编译自 Oracle 10g 起就已可用。此功能在无数场景中都非常有用。例如，您可以使用条件编本来检查数据库环境（开发、测试、生产）、检查编译器优化级别、根据环境包含或排除代码，并为未来数据库版本的发布准备代码。


  ### 指令


  条件编译语法由三条指令组成：选择指令、查询指令和错误指令。这些指令以美元符号（`$`）为前缀，以区别于普通的 PL/SQL 语法。


  #### 选择指令


  选择指令使用以下构建块。


  ```

  $if $then [ $elsif ] [ $else ] $end

  ```


  一个代码块可能如下所示。


  ```

  $if some_condition = true $then

  select ''Patrick'' into l_name from dual;

  $else

  select ''Alex'' into l_name from dual;

  $end

  ```


  这看起来很像普通的 PL/SQL 条件，但美元符号告诉编译器它正在进入一个条件编译块。如果条件（`查询指令`）求值为 true，则跟在 `$then` 之后的代码块会被包含在编译后的程序中。如果查询指令为
  false，则编译器会评估 `$elsif` 条件（如果可用）。如果没有条件为 true，则会包含 `$else` 分支中的块（如果可用）。


  #### 查询指令


  在选择指令之后，您需要指定一个查询指令，以确定选择指令的哪个分支应被包含在编译后的程序中。查询指令可以是一个标志，使用 `plsql_ccflags` 设置来定义。您可以使用
  `alter session` 语句来设置这些标志。


  ```

  alter session set plsql_ccflags = ''myflag:true''

  ```


  但您也可以在编译程序时指定标志。


  ```

  alter package mypackage compile plsql_ccflags=''myflag:true''

  ```


  如果一个标志不存在，则它会被求值为 false。标志只能保存静态布尔值。要使用数值，您必须创建一个包来将这些值保存为常量。在 Oracle Database 19c
  之前，您只能使用整数或 `pls_integer`；从该版本起，所有数值数据类型都已可用。查询指令必须是静态布尔表达式。


  注意


  您不能在查询指令中使用 `VARCHAR2` 常量。


  ### 总结


  本章探讨了前 N 条和分页查询。内联视图、分析函数以及 `offset` 和 `fetch` 子句使查询更具可读性且更易于维护。


  对集合操作的增强增加了语法清晰度，并提高了对 ANSI 标准的遵循度。


